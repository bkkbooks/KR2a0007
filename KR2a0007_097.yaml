body:
  text: 王莽傳第六十九上王莽字巨君孝元皇后之弟子也元后父及兄弟皆以元成世封侯居位輔政家凡九侯五大司馬語在元后傳唯莽父曼蚤死不侯莽群兄弟皆將軍五侯子乘時侈靡以輿馬聲色佚游相高莽獨孤貧因折節為恭儉受禮經師事沛郡陳參勤身博學被服如儒生事母及寡嫂養孤兄子行甚敕備又外交英俊內事諸父曲有禮意陽朔中世父大將軍鳳病莽侍疾親嘗藥亂首垢面不解衣帶連月鳳且死以託太后及帝拜為黃門郎遷射聲校尉久之叔父成都侯商上書願分戶邑以封莽及長樂少府戴崇侍中金涉胡騎校尉箕閎上谷都尉陽並中郎陳湯皆當世名士咸為莽言上由是賢莽永始元年封莽為新都侯國南陽新野之都鄉千五百戶遷騎都尉光祿大夫侍中宿衛謹敕爵位益尊節操愈謙散輿馬衣裘振施賓客家無所餘收贍名士交結將相卿大夫甚衆故在位更推薦之游者為之談說虛譽隆洽傾其諸父矣敢為激發之行處之不慚恧莽兄永為諸曹蚤死有子光莽使學博士門下莽休沐出振車騎奉羊酒勞遺其師恩施下竟同學諸生縱觀長老嘆息光年小於莽子宇莽使同日內婦賓客滿堂須臾一人言太夫人苦某痛當飲某藥比客罷者數起焉嘗私買侍婢昆弟或頗聞知莽因曰後將軍朱子元無子莽聞此兒種宜子為買之即日以婢奉子元其匿情求名如此是時太后姊子淳于長以材能為九卿先進在莽右莽陰求其罪過因大司馬曲陽侯根白之長伏誅莽以獲忠直語在長傳根因乞骸骨薦莽自代上遂擢為大司馬是歲綏和元年也年三十八矣莽既拔出同列繼四父而輔政欲令名譽過前人遂克己不倦聘諸賢良以為掾史賞賜邑錢悉以享士愈為儉約母病公卿列侯遣夫人問疾莽妻迎之衣不曳地布蔽膝見之者以為僮使問知其夫人皆驚輔政歲餘成帝崩哀帝即位尊皇太后為太皇太后太后詔莽就第避帝外家莽上疏乞骸骨哀帝遣尚書令詔莽曰先帝委政於君而棄群臣朕得奉宗廟誠嘉與君同心合意今君移病求退以著朕之不能奉順先帝之意朕甚悲傷焉已詔尚書待君奏事又遣丞相孔光大司空何武左將軍師丹衛尉傅喜白太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聽政太后復令莽視事時哀帝祖母定陶傅太后母丁姬在高昌侯董宏上書言春秋之義母以子貴丁姬宜上尊號莽與師丹共劾宏誤朝不道語在丹傳後日未央宮置酒內者令為傅太后張幄坐於太皇太后坐旁莽案行責內者令曰定陶太后藩妾何以得與至尊並徹去更設坐傅太后聞之大怒不肯會重怨恚莽莽復乞骸骨哀帝賜莽黃金五百斤安車駟馬罷就第公卿大夫多稱之者上乃加恩寵置使家中黃門十日一賜餐下詔曰新都侯莽憂勞國家執義堅固朕庶幾與為治太皇太后詔莽就第朕甚閔焉其以黃郵聚戶三百五十益封莽位特進給事中朝朔望見禮如三公車駕乘緑車從後二歲傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義抑貶尊號虧損孝道當伏顯戮幸蒙赦令不宜有爵土請免為庶人上曰以莽與太皇太后有屬勿免遣就國莽杜門自守其中子獲殺奴莽切責獲令自殺在國三歲吏上書冤訟莽者以百數元壽元年日食賢良周護宋崇等對策深頌功德上於是徵莽始莽就國南陽太守以莽貴重選門下掾宛孔休守新都相休謁見莽莽盡禮自納休亦聞其名與相答後莽疾休候之莽緣恩意進其玉具寶劍欲以為好休不肯受莽因曰誠見君面有瘢美玉可以滅瘢欲獻其瑑耳即解其瑑休復辭讓莽曰君嫌其賈邪遂椎碎之自裹以進休休乃受及莽徵去欲見休休稱疾不見莽還京師歲餘哀帝崩無子而傅太后丁太后皆先薨太皇太后即日駕之未央宮收取璽綬遣使者馳召莽詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽莽白大司馬高安侯董賢年少不合衆心收印綬賢即日自殺太后詔公卿舉可大司馬者大司徒孔光大司空彭宣舉莽前將軍何武後將軍公孫祿互相舉太后拜莽為大司馬與議立嗣安陽侯王舜莽之從弟其人修飭太后所信愛也莽白以舜為車騎將軍使迎中山王奉成帝後是為孝平皇帝帝年九歲太后臨朝稱制委政於莽莽白趙氏前害皇子傅氏驕僭遂廢孝成趙皇后孝哀傅皇后皆令自殺語在外戚傳莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不說者莽皆傅致其罪為請奏令邯持與光光素畏慎不敢不上之莽白太后輒可其奏於是前將軍何武後將軍公孫祿坐互相舉免丁傅及董賢親屬皆免官爵徙遠方紅陽侯立太后親弟雖不居位莽以諸父內敬憚之畏立從容言太后令己不得肆意乃復令光奏立舊惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝後白以官婢楊寄私子為皇子衆言曰呂氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聽莽曰今漢家衰比世無嗣太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從今以私恩逆大臣議如此群下傾邪亂從此起宜可且遣就國安後復徵召之太后不得已遣立就國莽之所以脅持上下皆此類也於是附順者拔擢忤恨者誅滅王舜王邑為腹心甄豐甄邯主擊斷平晏領機事劉歆典文章孫建為爪牙豐子尋歆子棻涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言方欲有所為微見風采黨與承其指意而顯奏之莽稽首涕泣固推讓焉上以惑太后下用示信於衆庶始風益州令塞外蠻夷獻白雉元始元年正月莽白太后下詔以白雉薦宗廟群臣因奏言太后委任大司馬莽定策安宗廟故大司馬霍光有安宗廟之功益封三萬戶疇其爵邑比蕭相國莽宜如光故事太后問公卿曰誠以大司馬有大功當著之邪將以骨肉故欲異之也於是群臣乃盛陳莽功德致周成白雉之瑞千載同符聖王之法臣有大功則生有美號故周公及身在而託號於周莽有定國安漢家之大功宜賜號曰安漢公益戶疇爵邑上應古制下準行事以順天心太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定策今願獨條光等功賞寢置臣莽勿隨輩列甄邯白太后下詔曰無偏無黨王道蕩蕩屬有親者義不得阿君有安宗廟之功不可以骨肉故蔽隱不揚君其勿辭莽復上書讓太后詔謁者引莽待殿東箱莽稱疾不肯入太后使尚書令恂詔之曰君以選故而辭以疾君任重不可闕以時亟起莽遂固辭太后復使長信太僕閎承制召莽莽固稱疾左右白太后宜勿奪莽意但條孔光等莽乃肯起太后下詔曰太傅博山侯光宿衛四世世為傅相忠孝仁篤行義顯著建議定策益封萬戶以光為太師與四輔之政車騎將軍安陽侯舜積纍仁孝使迎中山王折衝萬里功德茂著益封萬戶以舜為太保左將軍光祿勳豐宿衛三世忠信仁篤使迎中山王輔導共養以安宗廟封豐為廣陽侯食邑五千戶以豐為少傅皆授四輔之職疇其爵邑各賜第一區侍中奉車都尉邯宿衛勤勞建議定策封邯為承陽侯食邑二千四百戶四人既受賞莽尚未起群臣復上言莽雖克讓朝所宜章以時加賞明重元功無使百僚元元失望太后乃下詔曰大司馬新都侯莽三世為三公典周公之職建萬世策功德為忠臣宗化流海內遠人慕義越裳氏重譯獻白雉其以召陵新息二縣戶二萬八千益封莽復其後嗣疇其爵邑封功如蕭相國以莽為太傅幹四輔之事號曰安漢公以故蕭相國甲第為安漢公第定著於令傳之無窮於是莽為惶恐不得已而起受策策曰漢危無嗣而公定之四輔之職三公之任而公幹之群僚衆位而公宰之功德茂著宗廟以安蓋白雉之瑞周成象焉故賜嘉號曰安漢公輔翼于帝期於致平毋違朕意莽受太傅安漢公號讓還益封疇爵邑事云願須百姓家給然後加賞群公復爭太后詔曰公自期百姓家給是以聽之其令公奉舍人賞賜皆倍故百姓家給人足大司徒大司空以聞莽復讓不受而建言宜立諸侯王後及高祖以來功臣子孫大者封侯或賜爵關內侯食邑然後及諸在位各有第序上尊宗廟增加禮樂下惠士民鰥寡恩澤之政無所不施語在平紀莽既說衆庶又欲專斷知太后猒政乃風公卿奏言往者吏以功次遷至二千石及州部所舉茂材異等吏率多不稱宜皆見安漢公又太后不宜親省小事令太后下詔曰皇帝幼年朕且統政比加元服今衆事煩碎朕春秋高精氣不堪殆非所以安躬體而育養皇帝者也故選忠賢立四輔群下勸職永以康寧孔子曰巍巍乎舜禹之有天下而不與焉自今以來惟封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問致密恩意厚加贈送其不合指顯奏免之權與人主侔矣莽欲以虛名說太后白言親承前孝哀丁傅奢侈之後百姓未贍者多太后宜且衣繒練頗損膳以視天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉莽帥群臣奏言陛下春秋尊久衣重練減御膳誠非所以輔精氣育皇帝安宗廟也臣莽數叩頭省戶下白爭未見許今幸賴陛下德澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徵同時並至臣莽等不勝大願願陛下愛精休神闊略思慮遵帝王之常服復太官之法膳使臣子各得盡歡心備共養惟哀省察莽又令太后下詔曰蓋聞母后之義思不出乎門閾國不蒙佑皇帝年在襁褓未任親政戰戰兢兢懼於宗廟之不安國家之大綱微朕孰當統之是以孔子見南子周公居攝蓋權時也勤身極思憂勞未綏故國奢則視之以儉矯枉者過其正而朕不身帥將謂天下何夙夜夢想五穀豐孰百姓家給比皇帝加元服委政而授焉今誠未皇于輕靡而備味庶幾與百僚有成其勗之哉每有水旱莽輒素食左右以白太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰公勤於職以時食肉愛身為國莽念中國已平唯四夷未有異乃遣使者齎黃金幣帛重賂胸奴單于使上書言聞中國譏二名故名囊知牙斯今更名知慕從聖制又遣王昭君女須卜居次入侍所以誑耀媚事太后下至旁側長御方故萬端莽既尊重欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宮未建液廷媵未充乃者國家之難本從亡嗣配取不正請考論五經定取禮正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女事下有司上衆女名王氏女多在選中者莽恐其與己女爭即上言身亡德子材下不宜與衆女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省戶下咸言明詔聖德巍巍如彼安漢公盛勳堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生而上書者愈甚太后不得已聽公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以二正統莽白願見女太后遣長樂少府宗正尚書令納采見女還奏言公女漸漬德化有窈窕之容宜承天序奉祭祀有詔遣大司徒大司空策告宗廟雜加卜筮皆曰兆遇金水王相卦遇父母得位所謂康強之占逢吉之符也信鄉侯佟上言春秋天子將娶於紀則褒紀子稱侯安漢公國未稱古制事下有司皆曰古者天子封后父百里尊而不臣以重宗廟孝之至也佟言應禮可許請以新野田二萬五千六百頃益封莽滿百里莽謝曰臣莽子女誠不足以配至尊復聽衆議益封臣莽伏自惟念得託肺腑獲爵土如使子女誠能奉稱聖德臣莽國邑足以共朝貢不須復加益地之寵願歸所益太后許之有司奏故事聘皇后黃金二萬斤為錢二萬萬莽深辭讓受四千萬而以其三千三百萬豫十一媵家群臣復言今皇后受聘踰群妾亡幾有詔復益二千三百萬合為三千萬莽復以其千萬分豫九族貧者陳崇時為大司徒司直與張敞孫竦相善竦者博通士為崇草奏稱莽功德崇奏之曰竊見安漢公自初束修值世俗隆奢麗之時蒙兩宮厚骨肉之寵被諸父赫赫之光財饒勢足亡所忤意然而折節行仁克心履禮拂世矯俗確然特立惡衣惡食陋車駑馬妃匹無二閨門之內孝友之德衆莫不聞清靜樂道溫良下士惠于故舊篤于師友孔子曰未若貧而樂富而好禮公之謂矣及為侍中故定陵侯淳于長有大逆罪公不敢私建白誅討周公誅管蔡季子鴆叔牙公之謂矣是以孝成皇帝命公大司馬委以國統孝哀即位高昌侯董宏希指求美造作二統公手劾之以定大綱建白定陶太后不宜在乘輿幄坐以明國體詩曰柔亦不茹剛亦不吐不侮鰥寡不畏強圉公之謂矣深執謙退推誠讓位定陶太后欲立僭號憚彼面刺幄坐之義佞惑之雄朱博之疇懲此長宏手劾之事上下一心讒賊交亂詭辟制度遂成篡號斥逐仁賢誅殘戚屬而公被胥原之訴遠去就國朝政崩壞綱紀廢弛危亡之禍不隧如髮詩云人之云亡邦國殄悴公之謂矣當此之時宮亡儲主董賢據重加以傅氏有女之援皆自知得罪天下結讎中山則必同憂斷金相翼藉假遺詔頻用賞誅先除所憚急引所附遂誣往冤更徵遠屬事勢張見其不難矣賴公立入即時退賢及其黨親當此之時公運獨見之明奮亡前之威盱衡厲色振揚武怒乘其未堅厭其未發震起機動敵人摧折雖有賁育不及持刺雖有樗里不及回知雖有鬼谷不及造次是故董賢喪其魂魄遂自絞殺人不還踵日不移晷霍然四除更為寧朝非陛下莫引立公非公莫克此禍詩云惟師尚父時惟鷹揚亮彼武王孔子曰敏則有功公之謂矣於是公乃白內故泗水相豐斄令邯與大司徒光車騎將軍舜建定社稷奉節東迎皆以功德受封益土為國名臣書曰知人則哲公之謂也公卿咸歎公德同盛公勳皆以周公為比宜賜號安漢公益封二縣公皆不受傳曰申包胥不受存楚之報晏平仲不受輔齊之封孔子曰能以禮讓為國乎何有公之謂也將為皇帝定立妃后有司上名公女為首公深辭讓迫不得已然後受詔父子之親天性自然欲其榮貴甚於為身皇后之尊侔於天子當時之會千載希有然而公惟國家之統揖大福之恩事事謙退動而固辭書曰舜讓于德不嗣公之謂矣自公受策以至于今斖斖翼翼日新其德增修雅素以命下國俊儉隆約以矯世俗割財損家以帥群下彌躬執平以逮公卿教子尊學以隆國化僮奴衣布馬不秼穀食飲之用不過凡庶詩云溫溫恭人如集于木孔子曰食無求飽居無求安公之謂矣克身自約糴食逮給物物卬市日闋亡儲又上書歸孝哀皇帝所益封邑入錢獻田殫盡舊業為衆倡始於是大小鄉和承風從化外則王公列侯內則帷幄侍御翕然同時各竭所有或入金錢或獻田畝以振貧窮收贍不足者昔令尹子文朝不及夕魯公儀子不茹園葵公之謂矣開門延士下及白屋婁省朝政綜管衆治親見牧守以下考迹雅素審知白黑詩云夙夜匪解以事一人易曰終日乾乾夕惕若厲公之謂矣比三世為三公再奉送大行秉冢宰職填安國家四海輻湊靡不得所書曰納于大麓列風雷雨不迷公之謂矣此皆上世之所鮮禹稷之所難而公包其終始一以貫之可謂備矣是以三年之間化行如神嘉瑞疊纍豈非陛下知人之效得賢之致哉故非獨君之受命也臣之生亦不虛矣是以伯禹錫玄圭周公受郊祀蓋以達天之使不敢擅天之功也揆公德行為天下紀觀公功勳為萬世基基成而賞不配紀立而褒不副誠非所以厚國家順天心也高皇帝褒賞元功相國蕭何邑戶既倍又蒙殊禮奏事不名入殿不趨封其親屬十有餘人樂善無厭班賞亡遴苟有一策即必爵之是故公孫戎位在充郎選繇旄頭一明樊噲封二千戶孝文皇帝褒賞絳侯益封萬戶賜黃金五千斤孝武皇帝恤録軍功裂三萬戶以封衛青青子三人或在繈褓皆為通侯孝宣皇帝顯著霍光增戶命疇封者三人延及兄孫夫絳侯即因漢藩之固杖朱虛之鯁依諸將之遞據相扶之勢其事雖醜要不能遂霍光即席常任之重乘大勝之威未嘗遭時不行陷假離朝朝之執事亡非同類割斷歷久統政曠世雖曰有功所因亦易然猶有計策不審過徵之纍及至青戎摽末之功一言之勞然猶皆蒙丘山之賞課功絳霍造之與因也比於青戎地之與天也而公又有宰治之效乃當上與伯禹周公等盛齊隆兼其褒賞豈特與若云者同日而論哉然曾不得蒙青等之厚臣誠惑之臣聞功亡原者賞不限德亡首者褒不檢是故成王之於周公也度百里之限越九錫之檢開七百里之宇兼商奄之民賜以附庸殷民六族大路大旗封父之繁弱夏后之璜祝宗卜史備物典策官司彝器白牡之牲效望之禮王曰叔父建爾元子子父俱延拜而受之可謂不檢亡原者矣非特止此六子皆封詩曰亡言不讎亡德不報報當如之不如非報也近觀行事高祖之約非劉氏不王然而番君得王長沙下詔稱忠定著於令明有大信不拘於制也春秋晉悼公用魏絳之策諸夏服從鄭伯獻樂悼公於是以半賜之絳深辭讓晉侯曰微子寡人不能濟河夫賞國之典不可廢也子其受之魏絳於是有金石之樂春秋善之取其臣竭忠以辭功君知臣以遂賞也今陛下既知公有周公功德不行成王之褒賞遂聽公之固辭不顧春秋之明義則民臣何稱萬世何述誠非所以為國也臣愚以為宜恢公國令如周公建立公子令如伯禽所賜之品亦皆如之諸子之封皆如六子即群下較然輸忠黎庶昭然感德臣誠輸忠民誠感德則於王事何有唯陛下深惟祖宗之重敬畏上天之戒儀形虞周之盛敕盡伯禽之賜無遴周公之報令天法有設後世有祖天下幸甚太后以視群公群公方議其事會呂寬事起初莽欲擅權白太后前哀帝立背恩義自貴外家丁傅撓亂國家幾危社稷今帝以幼年復奉大宗為成帝後宜明一統之義以戒前事為後代法於是遣甄豐奉璽綬即拜帝母衛姬為中山孝王后賜帝舅衛寶寶弟玄爵關內侯皆留中山不得至京師莽子宇非莽隔絶衛氏恐帝長大後見怨宇即私遣人與寶等通書教令帝母上書求入語在衛后傳莽不聽宇與師吳章及婦兄呂寬議其故章以為莽不可諫而好鬼神可為變怪以驚懼之章因推類說令歸政於衛氏宇即使寬夜持血灑莽第門吏發覺之莽執宇送獄飲藥死宇妻焉懷子繫獄須産子已殺之莽奏言宇為呂寬等詿誤流言惑衆與管蔡同罪臣不敢隱其誅甄邯等白太后下詔曰夫唐堯有丹朱周文王有管蔡此皆上聖亡奈下愚子何以其性不可移也公居周公之位輔成王之主而行管蔡之誅不以親親害尊尊朕甚嘉之昔周公誅四國之後大化乃成至於刑錯公其專意翼國期於致平莽因是誅滅衛氏窮治呂寬之獄連引郡國豪桀素非議己者內及敬武公主梁王立紅陽侯立平阿侯仁使者迫守皆自殺死者以百數海內震焉大司馬護軍褒奏言安漢公遭子宇陷於管蔡之辜子愛至深為帝室故不敢顧私惟宇遭罪喟然憤發作書八篇以戒子孫宜班郡國令學官以教授事下群公請令天下吏能誦公戒者以著官簿比孝經四年春郊祀高祖以配天宗祀孝文皇帝以配上帝四月丁未莽女立為皇后大赦天下遣大司徒司直陳崇等八人分行天下覽觀風俗太保舜等奏言春秋列功德之義太上有立德其次有立功其次有立言唯至德大賢然後能之其在人臣則生有大賞終為宗臣殷之伊尹周之周公是也及民上書者八千餘人咸曰伊尹為阿衡周公為太宰周公享七子之封有過上公之賞宜如陳崇言章下有司有司請還前所益二縣及黃郵聚新野田采伊尹周公稱號加公為宰衡位上公掾史秩六百石三公言事稱敢言之群吏毋得與公同名出從期門二十人羽林三十人前後大車十乘賜公太夫人號曰功顯君食邑二千戶黃金印赤韍封公子男二人安為褒新侯臨為賞都侯加后聘三千七百萬合為一萬萬以明大禮太后臨前殿親封拜安漢公拜前二子拜後如周公故事莽稽首辭讓出奏封事願獨受母號還安臨印韍及號位戶邑事下太師光等皆曰賞未足以直功謙約退讓公之常節終不可聽莽求見固讓太后下詔曰公每見叩頭流涕固辭今移病固當聽其讓令視事邪將當遂行其賞遣歸就第也光等曰安臨親受印韍策號通天其義昭昭黃郵召陵新野之田為入尤多皆止於公公欲自損以成國化宜可聽許治平之化當以時成宰衡之官不可世及納徵錢乃以尊皇后非為公也功顯君戶止身不傳褒新賞都兩國合三千戶甚少矣忠臣之節亦宜自屈而信主上之義宜遣大司徒大司空持節承制詔公亟入視事詔尚書勿復受公之讓奏奏可莽乃起視事上書言臣以元壽二年六月戊午倉卒之夜以新都侯引入未央宮庚申拜為大司馬充三公位元始元年正月丙辰拜為太傅賜號安漢公備四輔官今年四月甲子復拜為宰衡位上公臣莽伏自惟爵為新都侯號為安漢公官為宰衡太傅大司馬爵貴號尊官重一身蒙大寵者五誠非鄙臣所能堪據元始三年天下歲已復官屬宜皆置穀梁傳曰天子之宰通于四海臣愚以為宰衡官以正百僚平海內為職而無印信名實不副臣莽無兼官之材今聖朝既過誤而用之臣請御史刻宰衡印章曰宰衡太傅大司馬印成授臣莽上太傅與大司馬之印太后詔曰可韍如相國朕親臨授焉莽乃復以所益納徵錢千萬遺與長樂長御奉共養者太保舜奏言天下聞公不受千乘之土辭萬金之幣散財施豫千萬數莫不鄉化蜀郡男子路建等輟訟慚怍而退雖文王卻虞芮何以加宜報告天下奏可宰衡出從大車前後各十乘直事尚書郎侍御史謁者中黃門期門羽林宰衡常持節所止謁者代持之宰衡掾史秩六百石三公稱敢言之是歲莽奏起明堂辟雍靈臺為學者築舍萬區作市常滿倉制度甚盛立樂經益博士員經各五人徵天下通一藝教授十一人以上及有逸禮古書毛詩周官爾雅天文圖讖鍾律月令兵法史篇文字通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記說廷中將令正乖繆一異說云群臣奏言昔周公奉繼體之嗣據上公之尊然猶七年制度乃定夫明堂辟雍墮廢千載莫能興今安漢公起于第家輔翼陛下四年于茲功德爛然公以八月載生魄庚子奉使朝用書臨賦營築越若翊辛丑諸生庶民大和會十萬衆並集平作二旬大功畢成唐虞發舉成周造業誠亡以加宰衡位宜在諸侯王上賜以束帛加璧大國乘車安車各一驪馬二駟詔曰可其議九錫之法冬大風吹長安城東門屋瓦且盡五年正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢封孝宣曾孫信等三十六人為列侯餘皆益戶賜爵金帛之賞各有數是時吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞於安漢公於是莽上書曰臣以外屬越次備位未能奉稱伏念聖德純茂承天當古制禮以治民作樂以移風四海奔走百蠻並轃辭去之日莫不隕涕非有款誠豈可虛致自諸侯王已下至於吏民咸知臣莽上與陛下有葭莩之故又得典職每歸功列德者輒以臣莽為餘言臣見諸侯面言事於前者未嘗不流汗而慚愧也雖性愚鄙至誠自知德薄位尊力少任大夙夜悼栗常恐污辱聖朝今天下治平風俗齊同百蠻率服皆陛下聖德所自躬親太師光太保舜等輔政佐治群卿大夫莫不忠良故能以五年之間至致此焉臣莽實無奇策異謀奉承太后聖詔宣之于下不能得什一受群賢之籌畫而上以聞不能得什伍當被無益之辜所以敢且保首領須臾者誠上休陛下餘光而下依群公之故也陛下不忍衆言輒下其章於議者臣莽前欲立奏止恐其遂不肯止今大禮已行助祭者畢辭不勝至願願諸章下議者皆寢勿上使臣莽得盡力畢制禮作樂事事成以傳示天下與海內平之即有所間非則臣莽當被詿上誤朝之罪如無他譴得全命賜骸骨歸家避賢者路是臣之私願也惟陛下哀憐財幸甄邯等白太后詔曰可唯公功德光於天下是以諸侯王公列侯宗室諸生吏民翕然同辭連守闕庭故下其章諸侯宗室辭去之日復見前重陳雖曉喻罷遣猶不肯去告以孟夏將行厥賞莫不歡悅稱萬歲而退今公每見輒流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聽公制作畢成群公以聞究于前議其九錫禮儀亟奏於是公卿大夫博士議郎列侯張純等九百二人皆曰聖帝明王招賢勸能德盛者位高功大者賞厚故宗臣有九命上公之尊則有九錫登等之寵今九族親睦百姓既章萬國和協黎民時雍聖瑞畢溱太平已洽帝者之盛莫隆於唐虞而陛下任之忠臣茂功莫著於伊周而宰衡配之所謂異時而興如合符者也謹以六藝通義經文所見周官禮記宜於今者為九命之錫臣請命錫奏可策曰惟元始五年五月庚寅太皇太后臨于前殿延登親詔之曰公進虛聽朕言前公宿衛孝成皇帝十有六年納策盡忠白誅故定陵侯淳于長以彌亂發姦登大司馬職在內輔孝哀皇帝即位驕妾窺欲姦臣萌亂公手劾高昌侯董宏改正故定陶共王母之僭坐自是之後朝臣論議靡不據經以病辭位歸于第家為賊臣所陷就國之後孝哀皇帝覺寤復還公長安臨病加劇猶不忘公復特進位是夜倉卒國無儲主姦臣充朝危殆甚矣朕惟定國之計莫宜于公引納于朝即日罷退高安侯董賢轉漏之間忠策輒建綱紀咸張綏和元壽再遭大行萬事畢舉禍亂不作輔朕五年人倫之本正天地之位定欽承神祇經緯四時復千載之廢矯百世之失天下和會大衆方輯詩之靈臺書之作雒鎬京之制商邑之度於今復興昭章先帝之元功明著祖宗之令德推顯嚴父配天之義修立郊禘宗祀之禮以光大孝是以四海雍雍萬國慕義蠻夷殊俗不召自至漸化端冕奉珍助祭尋舊本道遵術重古動而有成事得厥中至德要道通於神明祖考嘉享光耀顯章天符仍臻元氣大同麟鳳龜龍衆祥之瑞七百有餘遂制禮作樂有綏靖宗廟社稷之大勳普天之下惟公是賴官在宰衡位為上公今加九命之錫其以助祭共文武之職乃遂及厥祖於戲豈不休哉於是莽稽首再拜受緑韍袞冕衣裳瑒琫瑒珌句履鸞路乘馬龍旗九旒皮辨素積戎路乘馬彤弓矢盧弓矢左建朱鉞右建朱鉞右建金戚甲胄一具秬鬯二卣主瓚二九命青玉圭二朱戶納陛署宗官祝官卜官史官虎賁三百人家令丞各一人宗祝卜史官皆置嗇夫佐安漢公在中府外第虎賁為門衛當出入者傅籍自四輔三公有事府第皆用傳以楚王邸為安漢公第大繕治通周衛祖禰廟及寢皆為朱戶納陛陳崇又奏安漢公祠祖禰出城門城門校尉宜將騎士從入有門衛出有騎士所以重國也奏可其秋莽以皇后有子孫瑞通子午道子午道從杜陵直絶南山徑漢中風俗使者八人還言天下風俗齊同詐為郡國造歌謠頌功德凡三萬言莽奏定著令又奏為市無二賈官無獄訟邑無盜賊野無飢民道不拾遣男女異路之制犯者象刑劉歆陳崇等十二人皆以治明堂宣教化封為列侯莽既致太平北化胸奴東致海外南懷黃支唯西方未有加乃遣中郎將平憲等多持金幣誘塞外羌使獻地願內屬憲等奏言羌豪良願等種人口可萬二千人願為內臣獻鮮水海允谷鹽池平地美草皆豫漢民自居險阻處為藩蔽問良願降意對曰太皇太后聖明安漢公至仁天下太平五穀成孰或禾長丈餘或一粟三米或不種自生或繭不蠶自成甘露從天下醴泉自地出鳳皇來儀神爵降集從四歲以來羌人無所疾苦故思樂內屬宜以時處業置屬國領護事下莽莽復奏曰太后秉統數年恩澤洋溢和氣四塞絶域殊俗靡不慕義越裳氏重譯獻白雉黃支自三萬里貢生犀東夷王度大海奉國珍胸奴單于順制作去二名今西域良願等復舉地為臣妾昔唐堯橫被四表亦亡以加之今謹案已有東海南海北海郡未有西海郡請受良願等所獻地為西海郡臣又聞聖王序天文定地理因山川民俗以制州界漢家地廣二帝三王凡十二州州名及界多不應經堯典十有二州後定為九州漢家廓地遼遠州牧行部遠者三萬餘里不可為九謹以經義正十二州名分界以應正始奏可又增法五十條犯者徙之西海徙者以千萬數民始怨矣泉陵侯劉慶上書言周成王幼少稱孺子周公居攝今帝富於春秋宜令安漢公行天子事如周公群臣皆曰宜如慶言冬熒惑入月中平帝疾莽作策請命於泰畤戴璧秉圭願以身代藏策金滕置于前殿敕諸公勿敢言十二月平帝崩大赦天下莽徵明禮者宗伯鳳等與定天下吏六百石以上皆服喪三年奏尊孝成廟曰統宗孝平廟曰元宗時元帝世絶而宣帝曾孫有見王五人列侯廣戚侯顯等四十八人莽惡其長大曰兄弟不得相為後乃選玄孫中最幼廣戚侯子嬰年二歲託以為卜相最吉是月前輝光謝囂奏武功長孟通浚井得白石上圓下方有丹書著石文曰告安漢公莽為皇帝符命之起自此始矣莽使群公以白太后太后曰此誣罔天下不可施行太保舜謂太后事已如此無可奈何沮之力不能止又莽非敢有它但欲稱攝以重其權填服天下耳太后聽許舜等即共令太后下詔曰蓋聞天生衆民不能相治為之立君以統理之君年幼稚必有寄託而居攝焉然後能奉天施而成地化群生茂育書不云乎天工人其代之朕以孝平皇帝幼年且統國政幾加元服委政而屬之今短命而崩鳴呼哀哉已使有司徵孝宣皇帝玄孫二十三人差度宜者以嗣孝平皇帝之後玄孫年在繈褓不得至德君子孰能安之安漢公莽輔政三世比遭際會安光漢室遂同殊風至于制作與周公異世同符今前輝光囂武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也夫有法成易非聖人者亡法其令安漢公居攝踐祚如周公故事以武功縣為安漢公采地名曰漢光邑具禮儀奏於是群臣奏言太后聖德昭然深見天意詔令安漢公居攝臣聞周成王幼少周道未成成王不能共事天地修文武之烈周公權而居攝則周道成王室安不居攝則恐周隊失天命書曰我嗣事子孫大不克共上下遏失前人光在家不知命不易天應棐諶乃亡隊命說曰周公服天子之冕南面而朝群臣發號施令常稱王命召公賢人不知聖人之意故不說也禮明堂記曰周公朝諸侯於明堂天子負斧依南面而立謂周公踐天子位六年朝諸侯制禮作樂而天下大服也召公不說時武王崩縗粗未除由是言之周公始攝則居天子之位非乃六年而踐阼也書逸嘉禾篇曰周公奉鬯立于阼階延登贊曰假王蒞政勤和天下此周公攝政贊者所稱成王加元服周公則致政書曰朕復子明辟周公常稱王命專行不報故言我復子明君也臣請安漢公居攝踐祚服天子韍冕背斧依于戶牖之間南面朝群臣聽政事車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭群神贊曰假皇帝民臣謂之攝皇帝自稱曰豫平決朝事常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義隆治平之化其朝見太皇太后帝皇后皆復臣節自施政教於其宮家國采如諸侯禮儀故事臣昧死請太后詔曰可明年改元曰居攝居攝元年正月莽祀上帝於南郊迎春於東郊行大射禮於明堂養三老五更成禮而去置柱下五史秩如御史聽政事侍旁記疏言行三月己丑立宣帝玄孫嬰為皇太子號曰孺子以王舜為太傅左輔甄豐為太阿右拂甄邯為太保後承又置四少秩皆二千石四月安衆侯劉崇與相張紹謀曰安漢公莽專制朝政必危劉氏天下非之音乃莫敢先舉此宗室恥也吾帥宗族為先海內必和紹等從者百餘人遂進攻宛不得入而敗紹者張竦之從兄也竦與崇族父劉喜詣闕自歸莽赦弗罪竦因為嘉作奏曰建平元壽之間大統幾絶宗室幾棄賴蒙陛下聖德扶服振救遮扞匡衛國命復延宗室明目臨朝統政發號施令動以宗室為始登用九族為先並録支親建立王侯南面之孤計以百數收復絶屬存亡續廢得比肩首復為人者嬪然成行所以藩漢國輔漢宗也建辟雍立明堂班天法流聖化朝群后昭文德宗室諸侯咸益土地天下喁喁引領而歎頌聲洋洋滿耳而入國家所以服此美膺此名饗此福受此榮者豈非太皇太后日昃之思陛下夕惕之念哉何謂亂則統其理危則致其安禍則引其福絶則繼其統幼則代其任晨夜屑屑寒暑勤勤無時休息孳孳不已者凡以為天下厚劉氏也臣無愚智民無男女皆諭至意而安衆侯崇乃獨懷悖惑之心操畔逆之慮興兵動衆欲危宗廟惡不忍聞罪不容誅誠臣子之仇宗室之讎國家之賊天下之害也是故親屬震落而告其罪民人潰畔而棄其兵進不跬步退伏其殃百歲之母孩提之子同時斷斬懸頭竿杪珠珥在耳首飾猶存為計若此豈不悖哉臣聞古者畔逆之國既以誅討則豬其宮室以為汙池納垢濁焉名曰凶虛雖生菜茹而人不食四牆其社覆上棧下示不得通辨社諸侯出門見之著以為戒方今天下聞崇之反也咸欲騫衣手劍而叱之其先至者則拂其頸衡其胸刃其軀切其肌後至者欲撥其門仆其牆夷其屋焚其器應聲滌地則時成創而宗室尤甚言必切齒焉何則以其背畔恩義而不知重德之所在也宗室所居或遠嘉幸得先聞不勝憤憤之願願為宗室倡始父子兄弟負籠荷鍤馳之南陽豬崇宮室令如古制及崇社宜如亳社以賜諸侯用永監戒願下四輔公卿大夫議以明好惡視四方於是莽大說公卿曰皆宜如嘉言莽白太后下詔曰惟嘉父子兄弟雖與崇有屬不敢阿私或見萌牙相率告之及其禍成同共讎之應合古制忠孝著焉其以杜衍戶千封嘉為帥禮侯嘉子七人皆賜爵關內侯後又封竦為淑德侯長安為之語曰欲求封過張伯松力戰鬭不如巧為奏莽又封南陽吏民有功者百餘人汙池劉崇室宅後謀反者皆汙池云群臣復白劉崇等謀逆者以莽權輕也宜尊重以填海內五月甲辰太后詔莽朝見太后稱假皇帝冬十月丙辰朔日有食之十二月群臣奏請益安漢公宮及家吏置率更令廟廄廚長丞中庶子虎賁以下百餘人又置衛士三百人安漢公盧為攝省府為攝殿第為攝宮奏可莽白太后下詔曰故太師光雖前薨功效已列太保舜大司空豐輕車將軍邯步兵將軍建皆為誘進單于籌策又典靈臺明堂辟雍四郊定制度開子午道與宰衡同心說德合意并力功德茂著封舜子匡為同心侯林為說德侯光孫壽為合意侯豐孫匡為并力侯益邯建各三千戶是歲西羌龐恬傅幡等怨莽奪其地作西海郡反攻西海太守程永永奔走莽誅永遣護羌校尉竇況擊之二年春竇況等擊破西羌五月更造貨錯刀一直五千契刀一直五百大錢一直五十與五銖錢並行民多盜鑄者禁列侯以下不得挾黃金輸御府受直然卒不與直九月東郡太守翟義都試勒車騎因發奔命立嚴鄉侯劉信為天子移檄郡國言莽毒殺平帝攝天子位欲絶漢室今共行天罰誅莽郡國疑惑衆十餘萬莽惶懼不能食晝夜抱孺子告禱郊廟放大誥作策遣諫大夫桓談等班於天下諭以攝位當反政孺子之意遣王邑孫建等八將軍擊義分屯諸關守厄塞槐里男子趙明霍鴻等起兵以和翟義相與謀曰諸將精兵悉東京師空可攻長安衆稍多至且十萬人莽恐遣將軍王奇王級將兵拒之以太保甄邯為大將軍受鉞高廟領天下兵左杖節右把鉞屯城外王舜甄豐晝夜循行殿中十二月王邑等破翟義於圉司威陳崇使監軍上書言陛下奉天洪範心合寶龜膺受元命豫知成敗咸應兆占是謂配天配天之主慮則移氣言則動物施則成化臣崇伏讀詔書下日竊計其時聖思始發而反虜仍破詔文始書反虜大敗制書始下反虜畢斬衆將未及齊其鋒芒崇未及盡其愚慮而事已決矣莽大說制書始下反虜畢斬衆將未及齊其鋒芒臣崇未及盡其愚慮而事已決矣莽大說三年春地震大赦天下王邑等還京師西與王級等合擊明鴻皆破滅語在翟義傳莽大置酒未央宮白虎殿勞賜將帥詔陳崇治校軍功第其高下莽乃上奏曰明聖之世國多賢人故唐虞之時可比屋而封至功成事就則加賞焉至於夏后塗山之會執玉帛者萬國諸侯執玉附庸執帛周武王孟津之上尚有八百諸侯周公居攝郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭蓋諸侯千八百矣禮記王制千七百餘國是以孔子著孝經曰不敢遺小國之臣而況於公侯伯子男乎故得萬國之歡心以事其先王此天子之孝也秦為亡道殘滅諸侯以為郡縣欲擅天下之利故二世而亡高皇帝受命除殘考功施賞建國數百後稍衰微其餘僅存太皇太后躬統大綱廣封功德以勸善興滅繼絶以永世是以大化流通旦暮且成遭羌寇害西海郡反虜流言東郡逆賊惑衆西土忠臣孝子莫不奮怒所征殄滅盡備厥辜天下咸寧今制禮作樂實考周爵五等地四等有明文殷爵三等有其說無其文孔子曰周監於二代郁郁乎文哉吾從周臣請諸將帥當受爵邑者爵五等地四等奏可於是封者高為侯伯次為子男當賜爵關內侯者更名曰附城凡數百人擊西海者以羌為號槐里以武為號翟義以虜為號群臣復奏言太后修功録德遠者千載近者當世或以文封或以武爵深淺大小靡不畢舉今攝皇帝背依踐祚宜異於宰國之時制作雖未畢已宜進二子爵皆為公春秋善善及子孫賢者之後宜有土地成王廣封周公庶子六人皆有茅土及漢家名相大將蕭霍之屬咸及支庶兄子光可先封為列侯諸孫制度畢已大司徒大司空上名如前詔書太后詔曰進攝皇帝子褒新侯安為新舉公賞都侯臨為褒新公封光為衍功侯是時莽還歸新都國群臣復白以封莽孫宗為新都侯莽既滅翟義自謂威德日盛獲天人助遂謀即真之事矣九月莽母功顯君死意不在哀令太后詔議其服少阿羲和劉歆與博士諸儒七十八人皆曰居攝之義所以統立天功興崇帝道成就法度安輯海內也昔殷成湯既沒而太子蚤夭其子太甲幼少不明伊尹放諸桐宮而居攝以興殷道周武王既沒周道未成成王幼少周公屏成王而居攝以成周道是以殷有翼翼之化周有刑錯之功今太皇太后比遭家之不造委任安漢公宰尹群僚衡平天下遭孺子幼少未能共上下皇天降瑞出丹石之符是以太皇大后則天明命詔安漢公居攝踐祚將以成聖漢之業與唐虞三代比隆也攝皇帝遂開祕府會群儒制禮作樂卒定庶官茂成天功聖心周悉卓爾獨見發得周禮以明因監則天稽古而損益焉猶仲尼之聞韶日月之不可階非聖哲之至孰能若茲綱紀咸張成在一匱此其所以保佑聖漢安靖元元之效也今功顯君薨禮庶子為後為其母緦傳曰與尊者為體不敢服其私親也攝皇帝以聖德承皇天之命受太后之詔居攝踐祚奉漢大宗之後上有天地社稷之重下有元元萬機之憂不得顧其私親故太皇太后建厥元孫俾侯新都為哀侯後明攝皇帝與尊者為體承宗廟之祭奉共養太皇大后不得服其私親也周禮曰王為諸侯緦縗辨而加環絰同姓則麻異姓則葛攝皇帝當為功顯君緦縗辨而加麻環絰如天子弔諸侯服以應聖制莽遂行焉凡一弔再會而令新都侯宗為主服喪三年云司威陳崇奏衍功侯光私報執金吾竇況令殺人況為收繫致其法莽大怒切責光光母曰女自視孰與長孫中孫遂母子自殺及況皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉令光子嘉嗣爵為侯莽下書曰遏密之義訖于季冬正月郊祀八音當奏王公卿士樂凡幾等五聲八音條各云何其與所部儒生各盡精思悉陳其義是歲廣饒侯劉京車騎將軍千人扈雲大保屬臧鴻奏符命京言齊郡新井雲言巴郡石牛鴻言扶風雍石莽皆迎受十一月甲子莽上奏太后曰陛下至聖遭家不造遇漢十二世三七之厄承天威命詔臣莽居攝受孺子之託任天下之寄臣莽兢兢業業懼於不稱宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井入地且百尺十一月壬子直建冬至巴郡石牛戊午雍石文皆到于未央宮之前殿臣與太保安陽侯舜等視天風起塵冥風止得銅符帛圖於石前文曰天告帝符獻者封侯承天命用神令騎都尉崔發等視說及前孝哀皇帝建平二年六月甲子下詔書更為太初元將元年案其本事甘忠可夏賀良讖書臧蘭臺臣莽以為元將元年者大將居攝改元之文也於今信矣尚書康誥王若曰孟侯朕其弟小子封此周公居攝稱王之文也春秋隱公不言即位攝也此二經周公孔子所定蓋為後法孔子曰畏天命畏大人畏聖人之言臣莽敢不承用臣請共事神祇宗廟奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為初始元年漏劾以百二十為度用應天命臣莽夙夜養育隆就孺子令與周之成王比德宣明太皇太后威德於萬方期於富而教之孺子加元服復子明辟如周公故事奏可衆庶知其奉符命指意群臣博議別奏以視即真之漸矣期門郎張充等六人謀共劫莽立楚王發覺誅死梓潼人哀章學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝行璽某傳豫黃帝金策書某者高皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名凡為十一人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黃衣持匱至高廟以付僕射僕射以聞戊辰莽至高廟拜受金匱神嬗御王冠謁太后還坐未央宮前殿下書曰豫以不德託于皇初祖考黃帝之後皇始祖考虞帝之苗裔而太皇太后之末屬皇天上帝隆顯大佑成命統序符契圖文金匱策書神明詔告屬豫以天下兆民赤帝漢氏高皇帝之靈承天命傳國金策之書豫甚祗畏敢不欽受以戊辰直定御王冠即真天子位定有天下之號曰新其改正朔易服色變犧牲殊徽幟異器制以十二月朔癸酉為建國元年正月之朔以雞鳴為時服色配德上黃犧牲應正用白使節之旄幡皆純黃其署曰新使五威節以承皇天上帝威命也
