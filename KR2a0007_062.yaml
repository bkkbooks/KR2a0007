body:
  text: 霍光金日磾傳第三十八霍光字子孟票騎將軍去病弟也父中孺河東平陽人也以縣吏給事平陽侯家與侍者衛少兒私通而生去病中孺吏畢歸家娶婦生光因絶不相聞久之少兒女弟子夫得幸於武帝立為皇后去病以皇后姊子貴幸既壯大乃自知父為霍中孺未及求問會為票騎將軍擊胸奴道出河東河東太守郊迎負弩矢先驅至平陽傳舍遣吏迎霍中孺中孺趨入拜謁將軍迎拜因跪曰去病不早自知為大人遺體也中孺扶服叩頭曰老臣得託命將軍此天力也去病大為中孺買田宅奴婢而去還復過焉乃將光西至長安時年十餘歲任光為郎稍遷諸曹侍中去病死後光為奉車都尉光祿大夫出則奉車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信征和二年衛太子為江充所敗而燕王旦廣陵王胥皆多過失是時上年老寵姬鉤弋趙倢妤有男上心欲以為嗣命大臣輔之察群臣唯光任大重可屬社稷上乃使黃門畫者畫周公負成王朝諸侯以賜光後元二年春上游五柞宮病篤光涕泣問曰如有不諱誰當嗣者上曰君未諭前畫意邪立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光上以光為大司馬大將軍日磾為車騎將軍及太僕上官桀為左將軍搜粟都尉桑弘羊為御史大夫皆拜臥內床下受遺詔輔少主明日武帝崩太子襲尊號是為孝昭皇帝帝年八歲政事一決於光先是後元年侍中僕射莽何羅與弟重合侯通謀為逆時光與金日磾上官桀等共誅之功未録武帝病封璽書曰帝崩發書以從事遺詔封金日磾為秺侯上官桀為安陽侯光為博陸侯皆以前捕反者功封時衛尉王莽子男忽侍中揚語曰帝崩忽常在左右安得遺詔封三子事群兒自相貴耳光聞之切讓王莽莽鴆殺忽光為人沈靜詳審長財七尺三寸白晳疏眉目美須䫇每出入下殿門止進有常處郎僕射竊識視之不失尺寸其資性端正如此初輔幼主政自己出天下想聞其風采殿中嘗有怪一夜群臣相驚光召尚符璽郎郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光光與左將軍桀結婚相親光長女為桀子安妻有女年與帝相配桀因帝姊鄂邑蓋主內安女後宮為倢妤數月立為皇后父安為票騎將軍封桑樂侯光時休沐出桀輒入代光決事桀父子既尊盛而德長公主公主內行不修近幸河間丁外人桀安欲為外人求封幸依國家故事以列侯尚公主者光不許又為外人求光祿大夫欲令得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慚自先帝時桀已為九卿位在光右及父子並為將軍有椒房中宮之重皇后親安女光乃其外祖而顧專制朝事繇是與光爭權燕王旦自以昭帝兄常懷怨望及御史大夫桑弘羊建造酒榷鹽鐵為國興利伐其功欲為子弟得官亦怨恨光於是蓋主上官桀安及弘羊皆與燕王旦通謀詐令人為燕王上書言光出都肄郎羽林道上稱䟆太官先置又引蘇武前使胸奴拘留二十年不降還乃為典屬國而大將軍長史敞亡功為搜粟都尉又擅調益莫府校尉光專權自恣疑有非常臣旦願歸符璽入宿衛察姦臣變候司光出沐日奏之桀欲從中下其事桑弘羊當與諸大臣共執退光書奏帝不肯下明旦光聞之止畫室中不入上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍亡罪光曰陛下何以知之上曰將軍之廣明都郎屬耳調校尉以來未能十日燕王何以得知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毀者坐之自是桀等不敢復言乃謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子事發覺光盡誅桀安弘羊外人宗族燕王蓋主皆自殺光威震海內昭帝既冠遂委任光訖十三年百姓充實四夷賓服元平元年昭帝崩亡嗣武帝六男獨有廣陵王胥在群臣議所立咸持廣陵王王本以行失道先帝所不用光內不自安郎有上書言周太王廢太伯立王季文王舍伯邑考立武王唯在所宜雖廢長立少可也廣陵王不可以承宗廟言合光意光以其書視丞相敞等擢郎為九江太守即日承皇太后詔遣行大鴻臚事少府樂成宗正德光祿大夫吉中郎將利漢迎昌邑王賀賀者武帝孫昌邑哀王子也既至即位行淫亂光憂悶獨以問所親故吏大司農田延年延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此否延年曰伊尹相殷廢太甲以安宗廟後世稱其忠將軍若能行此亦漢之伊尹也光乃引延年給事中陰與車騎將軍張安世圖計遂召丞相御史將軍列侯中二千石大夫博士會議未央宮光曰昌邑王行昏亂恐危社稷如何群臣皆驚鄂失色莫敢發言但唯唯而已田延年前離席按劍曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今群下鼎沸社稷將傾且漢之傳諡常為孝者以長有天下令宗廟血食也如令漢家絶祀將軍雖死何面目見先帝於地下乎今日之議不得旋踵群臣後應者臣請劍斬之光謝曰九卿責光是也天下胸胸不安光當受難於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令光即與群臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央承明殿詔諸禁門毋內昌邑群臣王入朝太后還乘輦欲歸溫室中黃門宦者各持門扇王入門閉昌邑群臣不得入王曰何為大將軍跪曰有皇太后詔毋內昌邑群臣王曰徐之何乃驚人如是光使盡驅出昌邑群臣置金馬門外車騎將軍安世將羽林騎收縛二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守王光敕左右謹宿衛卒有物故自裁令我負天下有殺主名王尚未自知當廢謂左右我故群臣從官安得罪而大將軍盡繫之乎頃之有太后詔召王王聞召意恐乃曰我安得罪而召我哉太后被珠襦盛服坐武帳中侍御數百人皆持兵期門武士陛戟陳列殿下群臣以次上殿召昌邑王伏前聽詔光與群臣連名奏王尚書令讀奏曰丞相臣敞大司馬大將軍臣光車騎將軍臣安世度遼將軍臣明友前將軍臣增後將軍臣充國御史大夫臣誼宜春侯臣談當塗侯臣聖隨桃侯臣昌樂杜侯臣屠耆堂太僕臣延年太常臣昌大司農臣延年宗正臣德少府臣樂成廷尉臣光執金吾臣延壽大鴻臚臣賢左馮翊臣廣明右扶風臣德長信少府臣嘉典屬國臣武京輔都尉臣廣漢司隸校尉臣辟兵諸吏文學光祿大夫臣遷臣畸臣吉臣賜臣管臣勝臣梁臣長幸臣夏侯勝太中大夫臣德臣卬昧死言皇太后陛下臣敞等頓首死罪天子所以永保宗廟總一海內者以慈孝禮誼賞罰為本孝昭皇帝早棄天下亡嗣臣敞等議禮曰為人後者為之子也昌邑王宜嗣後遣宗正大鴻臚光祿大夫奉節使徵昌邑王典喪服斬縗亡悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前就次發璽不封從官更持節引內昌邑從官騶宰官奴二百餘人常與居禁闥內敖戲自之符璽取節十六朝暮臨令從官更持節從為書曰皇帝問侍中君卿使中御府令高昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引內昌邑樂人擊鼓歌吹作俳倡會下還上前殿擊鐘磬召內泰一宗廟樂人輦道牟首鼓吹歌舞悉奏衆樂發長安廚三太牢具祠閣室中祀已與從官飲啖駕法駕皮軒鸞旗驅馳北宮桂宮弄彘鬭虎召皇太后御小馬車使官奴騎乘遊戲掖庭中與孝昭皇帝宮人蒙等淫亂詔掖庭令敢泄言要斬大后曰止為人臣子當悖亂如是邪王離席伏尚書令復讀曰取諸侯王列侯二千石綬及墨綬黃綬以并佩昌邑郎官者免奴變易節上黃旄以赤發御府金錢刀劍玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒詔太官上乘輿食如故食監奏未釋服未可御故食復詔太官趣具無關食監太官不敢具即使從官出買雞豚詔殿門內以為常獨夜設九賓溫室延見姊夫昌邑關內侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徵發凡千一百二十七事文學光祿大夫夏侯勝等及侍中傅嘉數進諫以過失使人簿責勝縛嘉繫獄荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諫不變更日以益甚恐危社稷天下不安臣敞等謹與博士臣霸臣雋舍臣德臣虞舍臣射臣倉議皆曰高皇帝建功業為漢太祖孝文皇帝慈仁節儉為太宗今陛下嗣孝昭皇帝後行淫辟不軌詩云籍曰未知亦既抱子五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭繇不孝出之絶之於天下也宗廟重於君陛下未見命高廟不可以承天序奉祖宗廟子萬姓當廢臣請有司御史大夫臣誼宗正臣德太常臣昌與太祝以一太牢具告祠高廟臣敞等昧死以聞皇太后詔曰可光令王起拜受詔王曰聞天子有爭臣七人雖無道不失天下光曰皇太后詔廢安得天子乃即持其手解脫其璽組奉上太后扶王下殿出金馬門群臣隨送王西面拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣等駑怯不能殺身報德臣寧負王不敢負社稷願王自愛臣長不復見左右光涕泣而去群臣奏言古者廢放之人屏於遠方不及以政請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千戶昌邑群臣坐亡輔導之誼陷王於惡光悉誅殺二百餘人出死號呼市中曰當斷不斷反受其亂光坐庭中會丞相以下議定所立廣陵王已前不用及燕剌王反誅其子不在議中近親唯有衛太子孫號皇曾孫在民間咸稱述焉光遂復與丞相敞等上奏曰禮曰人道親親故尊祖尊祖故敬宗大宗亡嗣擇支子孫賢者為嗣孝武皇帝曾孫病已武帝時有詔掖庭養視至今年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正劉德至曾孫家尚冠里洗沐賜御衣太僕以軨獵車迎曾孫就齊宗正府入未央宮見皇太后封為陽武侯已而光奉上皇帝璽綬謁于高廟是為孝宣皇帝明年下詔曰夫褒有德賞元功古今通誼也大司馬大將軍光宿衛忠正宣德明恩守節秉誼以安宗廟其以河北東武陽益封光萬七千戶與故所食凡二萬戶賞賜前後黃金七千斤錢六千萬雜繒三萬匹奴婢百七十人馬二千匹甲第一區自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宮衛尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據於朝廷光自後元秉持萬機及上即位乃歸政上謙讓不受諸事皆先關白光然後奏御天子光每朝見上虛己斂容禮下之已甚光秉政前後二十年地節二年春病篤車駕自臨問光病上為之涕泣光上書謝恩曰願分國邑三千戶以封兄孫奉車都尉山為列侯奉兄票騎將軍去病祀事下丞相御史即日拜光子禹為右將軍光薨上及皇太后親臨光喪太中大夫任宣與侍御史五人持節護喪事中二千石治莫府冢上賜金錢繒絮繡被百領衣五十篋璧珠璣玉衣梓宮便房黃腸題湊各一具樅木外臧椁十五具東園溫明皆如乘輿制度載光尸柩以轀輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿復土起冢祠堂置園邑三百家長丞奉守如舊法既葬封山為樂平侯以奉車都尉領尚書事天子思光功德下詔曰故大司馬大將軍博陸侯宿衛孝武皇帝三十有餘年輔孝昭皇帝十有餘年遭大難躬秉誼率三公九卿大夫定萬世冊以安社稷天下蒸庶咸以康寧功德茂盛朕甚嘉之復其後世疇其爵邑世世無有所與功如蕭相國明年夏封太子外祖父許廣漢為平恩侯復下詔曰宣成侯光宿衛忠正勤勞國家善善及後世其封光兄孫中郎將雲為冠陽侯禹既嗣為博陸侯太夫人顯改光時所自造塋制而侈大之起三出闕築神道北臨昭靈南出承恩盛飾祠室輦閣通屬永巷而幽良人婢妾守之廣治第室作乘輿輦加畫繡絪馮黃金塗韋絮薦輪侍婢以五采絲挽顯游戲第中初光愛幸監奴馮子都常與計事及顯寡居與子都亂而禹山並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出多從賓客張圍獵黃山苑中使蒼頭奴上朝謁莫敢譴者而顯及諸女晝夜出入長信宮殿中亡期度宣帝自在民間聞知霍氏尊盛日久內不能善光薨上始躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業今大夫給事中他人一間女能復自救邪後兩家奴爭道霍氏奴入御史府欲踏大夫門御史為叩頭謝乃去人以謂霍氏顯等始知憂會魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山自若領尚書上令吏民得奏封事不關尚書群臣進見獨往來於是霍氏甚惡之宣帝始立立微時許妃為皇后顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后因勸光內成君代立為后語在外戚傳始許后暴崩吏捕諸醫劾衍侍疾亡狀不道下獄吏簿問急顯恐事敗即具以實語光光大驚欲自發舉不忍猶與會奏上因署衍勿論光薨後語稍泄於是上始聞之而未察乃徙光女壻度遼將軍未央衛尉平陵侯范明友為光祿勳次壻諸吏中郎將羽林監任勝出為安定太守數月復出光姊壻給事中光祿大夫張朔為蜀郡太守群孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衛尉鄧廣漢為少府更以禹為大司馬冠小冠亡印綬罷其右將軍屯兵官屬特使禹官名與光俱大司馬者又收范明友度遼將軍印綬但為光祿勳及光中女壻趙平為散騎騎都尉光祿大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宮衛將屯兵悉易以所親信許史子弟代之禹為大司馬稱病禹故長史任宣候問禹曰我何病縣官非我家將軍不得至是今將軍墳墓未乾盡外我家反任許史奪我印綬令人不省死宣見禹恨望深乃謂曰大將軍時何可復行持國權柄殺生在手中廷尉李种王平左馮翊賈勝胡及車丞相女壻少府徐仁皆坐逆將軍意下獄死使樂成小家子得幸將軍至九卿封侯百官以下但事馮子都王子方等視丞相亡如也各自有時今許史自天子骨肉貴正宜耳大司馬欲用是怨恨愚以為不可禹默然數日起視事顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令以公田賦與貧民發揚大將軍過失又諸儒生多窶人子遠客飢寒喜妄說狂言不避忌諱大將軍常讎之今陛下好與諸儒生語人人自使書對事多言我家者嘗有上書言大將軍時主弱臣強專制擅權今其子孫用事昆弟益驕恣恐危宗廟災異數見盡為是也其言絶痛山屏不奏其書後上書者益黠盡奏封事輒下中書令出取之不關尚書益不信人顯曰丞相數言我家獨無罪乎山曰丞相廉正安得罪我家昆弟諸壻多不謹又聞民間歡言霍氏毒殺許皇后寧有是邪顯恐急即具以實告山雲禹山雲禹驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小奈何於是始有邪謀矣初趙平客石夏善為天官語平曰熒惑守御星御星太僕奉車都尉也不黜則死平內憂山等雲舅李竟所善張赦見雲家卒卒謂竟曰今丞相與平恩侯用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦石夏等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也然惡端已見又有弒許后事陛下雖寬仁恐左右不聽久之猶發發即族矣不如先也遂令諸女各歸報其夫皆曰安所相避會李竟坐與諸侯王交通辭語及霍氏有詔雲山不宜宿衛免就第光諸女遇太后無禮馮子都數犯法上并以為讓山禹等甚恐顯夢第中井水溢流庭下竈居樹上又夢大將軍謂顯曰知捕兒不亟下捕之第中鼠暴多與人相觸以尾畫地梟數鳴殿前樹上第門自壞雲尚冠里宅中門亦壞巷端人共見有人居雲屋上徹瓦投地就視亡有大怪之禹夢車騎聲正歡來捕禹舉家憂愁山曰丞相擅減宗廟羔菟蛙可以此罪也謀令太后為博平君置酒召丞相平恩侯以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為玄菟太守太中大夫任宣為代郡太守山又坐寫祕書顯為上書獻城西第入馬千匹以贖山罪書報聞會事發覺雲山明友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市唯獨霍后廢處昭臺宮與霍氏相連坐誅滅者數千家上乃下詔曰乃者東織室令史張赦使魏郡豪李竟報冠陽侯雲謀為大逆朕以大將軍故抑而不揚冀其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟子冠陽侯雲樂平侯山諸姊妹壻謀為大逆欲詿誤百姓賴宗廟神靈先發得咸伏其辜朕甚悼之諸為霍氏所詿誤事在丙申前未發覺在吏者皆赦除之男子張章先發覺以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上書以聞侍中史高與金安上建發其事言無入霍氏禁闥卒不得遂其謀皆讎有功封章為博成侯忠高昌侯惲平通侯安上都成侯高樂陵侯初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突遠徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺生置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客耶主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福說得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上乃賜福帛十匹後以為郎宣帝始立謁見高廟大將軍光從驂乘上內嚴憚之若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乘至成帝時為光置守冢百家吏卒奉祠焉元始二年封光從父昆弟曾孫陽為博陸侯千戶金日磾字翁叔本胸奴休屠王太子也武帝元狩中票騎將軍霍去病將兵擊胸奴右地多斬首虜獲休屠王祭天金人其夏票騎復西過居延攻祁連山大克獲於是單于怨昆邪休屠居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其衆降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃門養馬時年十四矣久之武帝游宴見馬後宮滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上奇焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾既親近未嘗有過失上甚信愛之賞賜纍千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉日磾母教誨兩子甚有法度上聞而嘉之病死詔圖畫於甘泉宮署曰休屠王閼氏日磾每見畫常拜鄉之涕泣然後乃去日磾子二人皆愛為帝弄兒常在旁側弄兒或自後擁上項日磾在前見而目之弄兒走且啼曰翁怒上謂日磾何怒吾兒為其後弄兒壯大不謹自殿下與宮人戲日磾適見之惡其淫亂遂殺弄兒弄兒即日磾長子也上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀為之泣已而心敬日磾初莽何羅與江充相善及充敗衛太子何羅弟通用誅太子時力戰得封後上知太子冤乃夷滅充宗族黨與何羅兄弟懼及遂謀為逆日磾視其志意有非常心疑之陰獨察其動靜與俱上下何羅亦覺日磾意以故久不得發是時上行幸林光宮日磾小疾臥廬何羅與通及小弟安成矯制夜出共殺使者發兵明旦上未起何羅亡何從外入日磾奏廁心動立入坐內戶下須臾何羅袖白刃從東箱上見日磾色變走趨臥內欲入行觸寶瑟僵日磾得抱何羅因傳曰莽何羅反上驚起左右拔刃欲格之上恐并中日磾止勿格日磾捽胡投何羅殿下得禽縛之窮治皆伏辜繇是著忠孝節日磾自在左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯其篤慎如此上尤奇異之及上病屬霍光以輔少主光讓日磾日磾曰臣外國人且使胸奴輕漢於是遂為光副光以女妻日磾嗣子賞初武帝遺詔以討莽何羅功封日磾為秺侯日磾以帝少不受封輔政歲餘病困大將軍光白封日磾臥授印綬一日薨賜葬具冢地送以輕車介士軍陳至茂陵諡曰敬侯日磾兩子賞建俱侍中與昭帝略同年共臥起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪霍光對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功乃得封侯時年俱八九歲宣帝即位賞為太僕霍氏有事萌牙上書去妻上亦自哀之獨得不坐元帝時為光祿勳薨亡子國除元始中繼絶世封建孫當為秺侯奉日磾後初日磾所將俱降弟倫字少卿為黃門郎早卒日磾兩子貴及孫則衰矣而倫後嗣遂盛子安上始貴顯封侯安上字子侯少為侍中惇篤有智宣帝愛之頗與發舉楚王延壽反謀賜爵關內侯食邑三百戶後霍氏反安上傳禁門闥無內霍氏親屬封為都成侯至建章衛尉薨賜冢塋杜陵諡曰敬侯四子常敞岑明岑明皆為諸曹中郎將常光祿大夫元帝為太子時敞為中庶子幸有寵帝即位為騎都尉光祿大夫中郎將侍中元帝崩故事近臣皆隨陵為園郎敞以世名忠孝太后詔留侍成帝為奉車水衡都尉至衛尉敞為人正直敢犯顏色左右憚之唯上亦難焉病甚上使使者問所欲以弟岑為託上召岑拜為使主客敞子涉本為左曹上拜涉為侍中使待幸緑車載送衛尉舍須臾卒敞三子涉參饒涉明經儉節譇儒稱之成帝時為侍中騎都尉領三輔胡越騎哀帝即位為奉車都尉至長信少府而參使胸奴胸奴中郎將越騎校尉關內都尉安定東海太守饒為越騎校尉涉兩子湯融皆侍中諸曹將大夫而涉之從父弟欽舉明經為太子門大夫哀帝即位為太中大夫給事中欽從父弟遷為尚書令兄弟用事帝祖母傅太后崩欽使護作職辦擢為泰山弘農太守著威名平帝即位徵為大司馬司直京兆尹帝年幼選置師友大司徒孔光以明經高行為孔氏師京兆尹金欽以家世忠孝為金氏友徙光祿大夫侍中秩中二千石封都成侯時王莽新誅平帝外家衛氏召明禮少府宗伯鳳入說為人後之誼白令公卿將軍侍中朝臣並聽欲以內厲平帝而外塞百姓之議欽與族昆弟秺侯當俱封初當曾祖父日磾傳子節侯賞而欽祖父安上傳子夷侯常皆亡子國絶故莽封欽當奉其後當母南即莽母功顯君同産弟也當上南大行為太夫人欽因緣謂當詔書陳日磾功亡有賞語當名為以孫繼祖也自當為父祖父立廟賞故國君使大夫主其祭時甄邯在旁庭叱欽因劾奏曰欽幸得以通經術超擢侍帷幄重蒙厚思封襲爵號知聖朝以世有為人後之誼前遭故定陶太后背本逆天孝哀不獲厥福乃者呂寬衛寶復造姦謀至於反逆咸伏厥辜太皇太后懲艾悼懼逆天之咎非聖誣法大亂之殃誠欲奉承天心遵明聖制專一為後之誼以安天下之命數臨正殿延見群臣講習禮經孫繼祖者謂亡正統持重者也賞見嗣日磾後成為君持大宗重則禮所謂尊祖故敬宗大宗不可以絶者也欽自知與當俱拜同誼即數揚言殿省中教當云云當即如其言則欽亦欲為父明立廟而不入夷侯常廟矣進退異言頗惑衆心亂國大綱開禍亂原誣祖不孝罪莫大焉尤非大臣所宜大不敬秺侯當上母南為太夫人失禮不敬莽白太后下四輔公卿大夫博士議郎皆曰欽宜以時即罪謁者召欽詣詔獄欽自殺邯以綱紀國體亡所阿私忠孝尤著益封千戶更封長信少府涉子右曹湯為都成侯湯受封日不敢還歸家以明為人後之誼益封之後莽復用欽弟遵封侯歷九卿位贊曰霍光以結髮內侍起於階闥之間確然秉志誼形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此然光不學亡術暗於大理陰妻邪謀立女為后湛溺盈溢之欲以增顛覆之禍死財三年宗族誅夷哀哉昔霍叔封於晉晉即河東光豈其苗裔乎金日磾夷狄亡國羈虜漢庭而以篤敬寤主忠信自著勒功上將傳國後嗣世名忠孝七世內侍何其盛也本以休屠作金人為祭天主故因賜姓金氏云
