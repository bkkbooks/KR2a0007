body:
  text: 成帝紀第十孝成皇帝元帝太子也母曰王皇后元帝在太子宮生甲觀畫堂為世嫡皇孫宣帝愛之字曰太孫常置左右年三歲而宣帝崩元帝即位帝為太子壯好經書寬博謹慎初居桂宮上嘗急召太子出龍樓門不敢絶馳道西至直城門得絶乃度還入作室門上遲之問其故以狀封上大説乃著令令太子得絶馳道云其後幸酒樂燕樂上不以為能而定陶恭王有材藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢竟寧元年五月元帝崩六月己未太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后以元舅侍中衛尉陽平侯王鳳為大司馬大將軍領尚書事乙未有司言乘輿車牛馬禽獸皆非禮不宜以葬奏可七月大赦天下建始元年春正月乙丑皇曾祖悼考廟災立故河間王弟上郡庫令良為王有星孛于營室罷上林詔獄二月右將軍長史姚尹等使胸奴還去塞百餘里暴風火發燒殺尹等七人賜諸侯王丞相將軍列侯王太后公主王主吏二千石黃金宗室諸官吏千石以下至二百石及宗室子有屬籍者三老孝弟力田鰥寡孤獨錢帛各有差吏民五十戶牛酒詔曰乃者火災降於祖廟有星孛于東方始正而虧咎孰大焉書云惟先假王正厥事群公孜孜帥先百寮輔朕不逮崇寬大長和睦凡事恕己毋行苛刻其大赦天下使得自新封舅諸吏光祿大夫關內侯王崇為安成侯賜舅王談商立根逢時爵關內侯夏四月黃霧四塞博問公卿大夫無有所諱六月有青蠅無萬數集未央宮殿中朝者坐秋罷上林宮館希御幸者二十五所八月有雨月相承晨見東方九月戊子流星光燭地長四五丈委曲蛇形貫紫宮十二月作長安南北郊罷甘泉汾陰祠是日大風拔甘泉畤中大木十韋以上郡國被災什四以上毋收田租二年春正月罷雍五畤辛巳上始郊祀長安南郊詔曰乃者徙泰畤后土于南郊北郊朕親飭躬郊祀上帝皇天報應神光並見三輔長無共張繇役之勞赦奉郊縣長安長陵及中都官耐罪徒減天下賦錢算四十閏月以渭城延陵亭部為初陵二月詔三輔內郡舉賢良方正各一人三月北宮井水溢出辛丑上始祠后土于北郊丙午立皇后許氏罷六廄技巧官夏大旱東平王宇有罪削樊亢父縣秋罷太子博望苑以賜宗室朝請者減乘輿廄馬三年春三月赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收秋關內大水七月虒上小女陳持弓聞大水至走入橫城門闌入尚方掖門至未央宮鉤盾中吏民驚上城九月詔曰乃者郡國被水災流殺人民多至千數京師無故訛言大水至吏民驚恐奔走乘城殆苛暴深刻之吏未息元元冤失職者衆遣諫大夫林等循行天下冬十二月戊申朔日有蝕之夜地震未央宮殿中詔曰蓋聞天生衆民不能相治為之立君以統理之君道得則草木昆蟲咸得其所人君不德謫見天地災異婁發以告不治朕涉道日寡舉錯不中乃戊申日蝕地震朕甚懼焉公卿其各思朕過失明白陳之女無面從退有後言丞相御史與將軍列侯中二千石及內郡國舉賢良方正能直言極諫之士詣公車朕將覽焉越嶲山崩四年春罷中書宦官初置尚書員五人夏四月雨雪五月中謁者丞陳臨殺司隸校尉轅豐於殿中秋桃李實大水河決東郡金隄冬十月御史大夫尹忠以河決不憂職自殺河平元年春三月詔曰河決東郡流漂二州校尉王延世隄塞輒平其改元為河平賜天下吏民爵各有差夏四月己亥晦日有蝕之既詔曰朕獲保宗廟戰戰栗栗未能奉稱傳曰男教不修陽事不得則日為之蝕天著厥異辜在朕躬公卿大夫其勉悉心以輔不逮百寮各修其職惇任仁人退遠殘賊陳朕過失無有所諱大赦天下六月罷典屬國并大鴻臚秋九月復太上皇寢廟園二年春正月沛郡鐵官冶鐵飛語在五行志夏六月封舅談商立根逢時皆為列侯三年春二月丙戌犍為地震山崩雍江水水逆流秋八月乙卯晦日有蝕之光祿大夫劉向校中祕書謁者陳農使使求遺書於天下四年春正月胸奴單于來朝赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收二月單于罷歸國三月癸丑朔日有蝕之遣光祿大夫博士嘉等十一人行舉瀕河之郡水所毀傷困乏不能自存者財振貸其為水所流壓死不能自葬令郡國給槥櫝葬埋已葬者與錢人二千避水它郡國在所冗食之謹遇以文理無令失職舉惇厚有行能直言之士壬申長陵臨涇岸崩雍涇水夏六月庚戌楚王囂薨山陽火生石中改元為陽朔陽朔元年春二月丁未晦日有蝕之三月赦天下徒冬京兆尹王章有罪下獄死二年春寒詔曰昔在帝堯立羲和之官命以四時之事令不失其序故書云黎民於蕃時雍明以陰陽為本也今公卿大夫或不信陰陽薄而小之所奏請多違時政傳以不知周行天下而欲望陰陽和調豈不謬哉其務順四時月令三月大赦天下夏五月除吏八百石五百石秩秋關東大水流民欲入函谷天井壺口五阮關者勿苛留遣諫大夫博士分行視八月甲申定陶王康薨九月奉使者不稱詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵原宜皆明於古今溫故知新通達國體故謂之博士否則學者無述焉為下所輕非所以尊道德也工欲善其事必先利其器丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀是歲御史大夫張忠卒三年春三月壬戌隕石東郡八夏六月潁川鐵官徒申屠聖等百八十人殺長吏盜庫兵自稱將軍經歷九郡遣丞相長史御史中丞逐捕以軍興從事皆伏辜秋八月丁巳大司馬大將軍王鳳薨四年春正月詔曰夫洪範八政以食為首斯誠家給刑錯之本也先帝劭農薄其租稅寵其強力令與孝弟同科間者民彌惰怠卿本者少趨末者衆將何以矯之方東作時其令二千石勉勸農桑出入阡陌致勞來之書不云乎服田力嗇乃亦有秋其勗之哉二月赦天下秋九月壬申東平王宇薨閏月壬戌御史大夫于永卒鴻嘉元年春二月詔曰朕承天地獲保宗廟明有所蔽德不能綏刑罰不中衆冤失職趨闕告訴者不絶是以陰陽錯謬寒暑失序日月不光百姓蒙辜朕甚閔焉書不云乎即我御事罔克耆壽咎在厥躬方春生長時臨遣諫大夫理等舉三輔三河弘農冤獄公卿大夫部刺史明申敕守相稱朕意焉其賜天下民爵一級女子百戶牛酒加賜鰥寡孤獨高年帛逋貸未入者勿收壬午行幸初陵赦作徒以新豐戲鄉為昌陵縣奉初陵賜百戶牛酒上始為微行出冬黃龍見真定二年春行幸雲陽三月博士行飲酒禮有雉蜚集于庭歷階升堂而雊後集諸府又集承明殿詔曰古之選賢傅納以言明試以功故官無廢事下無逸民教化流行風雨和時百穀用成衆庶樂業咸以康寧朕承鴻業十有餘年數遭水旱疾疫之災黎民婁困於飢寒而望禮義之興豈不難哉朕既無以率道帝王之道日以陵夷意乃招賢選士之路鬱滯而不通與將舉者未得其人也其舉敦厚有行義能直言者冀聞切言嘉謀匡朕之不逮夏徙郡國豪傑資五百萬以上五千戶于昌陵賜丞相御史將軍列侯公主中二千石冢地第宅六月立中山憲王孫雲客為廣德王三年夏四月赦天下令吏民得買爵賈級千錢大旱秋八月乙卯孝景廟闕災冬十一月甲寅皇后許氏廢廣漢男子鄭躬等六十餘人攻官寺篡囚徒盜庫兵自稱山君四年春正月詔曰數敕有司務行寬大而禁苛暴訖今不改一人有辜舉宗拘繫農民失業怨恨者衆傷害和氣水旱為災關東流冗者衆青幽冀部尤劇朕甚痛焉未聞在位有惻然者孰當助朕憂之已遣使者循行郡國被災害什四以上民資不滿三萬勿出租賦逋貸未入皆勿收流民欲入關輒籍內所之郡國謹遇以理務有以全活之思稱朕意秋勃海清河河溢被災者振貸之冬廣漢鄭躬等黨與濅廣犯歷四縣衆且萬人拜河東都尉趙護為廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪旬月平遷護為執金吾賜黃金百斤永始元年春正月癸丑太官凌室火戊午戾后園闕火夏四月封婕妤趙氏父臨為成陽侯五月封舅曼子侍中騎都尉光祿大夫王莽為新都侯六月丙寅立皇后趙氏大赦天下秋七月詔曰朕執德不固謀不盡下過聽將作大匠萬年言昌陵三年可成作治五年中陵司馬殿門內尚未加功天下虛耗百姓罷勞客土疏惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下毋有動搖之心立城陽孝王子俚為王八月丁丑太皇太后王氏崩二年春正月己丑大司馬車騎將軍王音薨二月癸未夜星隕如雨乙酉晦日有蝕之詔曰乃者龍見于東萊日有蝕之天著變異以顯朕郵朕甚懼焉公卿申敕百寮深思天誡有可省減便安百姓者條奏所振貸貧民勿收又曰關東比歲不登吏民以義收食貧民入穀物助縣官振贍者已賜直其百萬以上加賜爵右更欲為吏補三百石其吏也遷二等三十萬以上賜爵五大夫吏亦遷二等民補郎十萬以上家無出租賦三歲萬錢以上一年冬十一月行幸雍祠五畤十二月詔曰前將作大匠萬年知昌陵卑下不可為萬歲居奏請營作建置郭邑妄為巧詐積土增高多賦斂繇役興卒暴之作卒徒蒙辜死者連屬百姓罷極天下匱竭常侍閎前為大司農中丞數奏昌陵不可成侍中衛尉長數白宜早止徙家反故處朕以長言下閎章公卿議者皆合長計長首建至策閎典主省大費民以康寧閎前賜爵關內侯黃金百斤其賜長爵關內侯食邑千戶閎五百戶萬年佞邪不忠毒流衆庶海內怨望至今不息雖蒙赦令不宜居京師其徙萬年敦煌郡是歲御史大夫王駿卒三年春正月己卯晦日有蝕之詔曰天災仍重朕甚懼焉惟民之失職臨遣大中大夫嘉等循行天下存問耆老民所疾苦其與部刺史舉惇朴遜讓有行義者各一人冬十月庚辰皇太后詔有司復甘泉泰畤汾陰后土雍五畤陳倉陳寶祠語在郊祀志十一月尉氏男子樊並等十三人謀反殺陳留太守劫略吏民自稱將軍徒李談等五人共格殺並等皆封為列侯十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盜庫兵自稱將軍經歷郡國十九殺東郡太守汝南都尉遣丞相長史御史中丞持節督趣逐捕汝南太守嚴欣捕斬令等遷欣為大司農賜黃金百斤四年春正月行幸甘泉郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百戶牛酒鰥寡孤獨高年帛三月行幸河東祠后土賜吏民如雲陽行所過無出田租夏四月癸未長樂臨華殿未央宮東司馬門皆災六月甲午霸陵園門闕災出杜陵諸未嘗御者歸家詔曰乃者地震京師火災婁降朕甚懼之有司其悉心明對厥咎朕將親覽焉又曰聖王明禮制以序尊卑異車服以章有德雖有其財而無其尊不得踰制故民興行上義而下利方今世俗奢僭罔極靡有厭足公卿列侯親屬近臣四方所則未聞修身遵禮同心憂國者也或乃奢侈逸豫務廣第宅治園池多畜奴婢被服綺穀設鐘鼓備女樂車服嫁娶葬埋過制吏民慕效濅以成俗而欲望百姓儉節家給人足豈不難哉詩不云乎赫赫師尹民具爾瞻其申敕有司以漸禁之青緑民所常服且勿止列侯近臣各自省改司隸校尉察不變者秋七月辛未晦日有蝕之元延元年春正月己亥朔日有蝕之三月行幸雍祠五畤夏四月丁酉無雲有雷聲光耀耀四面下至地昏止赦天下秋七月有星孛于東井詔曰乃者日蝕星隕謫見于天大異重仍在位默然罕有忠言今孛星見于東井朕甚懼焉公卿大夫博士議郎其各悉心惟思變意明以經對無有所諱與內郡國舉方正能直言極諫者各一人北邊二十二郡舉勇猛知兵法者各一人封蕭相國後喜為酇侯冬十二月辛亥大司馬大將軍王商薨是歲昭儀趙氏害後宮皇子二年春正月行幸甘泉郊泰畤三月行幸河東祠后土夏四月立廣陵孝王子守為王冬行幸長楊宮從胡客大校獵宿萯陽宮賜從官三年春正月丙寅蜀郡岷山崩雍江三日江水竭二月封侍中衛尉淳于長為定陵侯三月行幸雍祠五畤四年春正月行幸甘泉郊泰畤二月罷司隸校尉官三月行幸河東祠后土甘露降京師賜長安民牛酒綏和元年春正月大赦天下二月癸丑詔曰朕承太祖鴻業奉宗廟二十五年德不能綏理宇內百姓怨望者衆不蒙天祐至今未有繼嗣天下無所係心觀于往古近事之戒禍亂之萌皆由斯焉定陶王欣於朕為子慈仁孝順可以承天序繼祭祀其立欣為皇太子封中山王舅諫大夫馮參為宜鄉侯益中山國三萬戶以慰其意賜諸侯王列侯金天下當為父後者爵三老孝弟力田帛各有差又曰蓋聞王者必存二王之後所以通三統也昔成湯受命列為三代而祭祀廢絶考求其後莫正孔吉其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里行幸雍祠五畤夏四月以大司馬票騎將軍為大司馬罷將軍官御史大夫為大司空封為列侯益大司馬大司空奉如丞相秋八月庚戌中山王興薨冬十一月立楚孝王孫景為定陶王定陵侯淳于長大逆不道下獄死廷尉孔光使持節賜貴人許氏藥飲藥死十二月罷部刺史更置州牧秩二千石二年春正月行幸甘泉郊泰畤二月壬子丞相翟方進薨三月行幸河東祠后土丙戌帝崩于未央宮皇太后詔有司復長安南北郊四月己卯葬延陵贊曰臣之姑充後宮為婕妤父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不內顧不疾言不親指臨朝淵默尊嚴若神可謂穆穆天子之容者矣博覽古今容受直辭公卿稱職奏議可述遭世承平上下和睦然湛于酒色趙氏亂內外家擅朝言之可為於邑建始以來王氏始執國命哀平短祚莽遂篡位蓋其威福所由來者漸矣
