body:
  text: 哀帝紀第十一孝哀皇帝元帝庶孫定陶恭王子也母曰丁姬年三歲嗣立為王長好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上怪之以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅在何法令不能對令誦尚書又廢及賜食於前後飽起下韤係解成帝由此以為不能而賢定陶王數稱其材時王祖母傅太后隨王來朝私賂遺上所幸趙昭儀及帝舅票騎將軍曲陽侯王根昭儀及根見上亡子亦欲豫自結為長久計皆更稱定陶王勸帝以為嗣成帝亦自美其材為加元服而遣之時年十七矣明年使執金吾任宏守大鴻臚持節徵定陶王立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宮陛下聖德寬仁敬承祖宗奉順神祇宜蒙福祐子孫千億之報臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞後月餘立楚孝王孫景為定陶王奉恭王祀所以獎厲太子專為後之誼語在外戚傳綏和二年三月成帝崩四月丙午太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后大赦天下賜宗室王子有屬者馬各一駟吏民爵百戶牛酒三老孝弟力田鰥寡孤獨帛太皇太后詔尊定陶恭王為恭皇五月丙戌立皇后傅氏詔曰春秋母以子貴尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宮中宮追尊傅父為崇祖侯丁父為襃德侯封舅丁明為陽安侯舅子滿為平周侯追諡滿父忠為平周懷侯皇后父晏為孔鄉侯皇太后弟侍中光祿大夫趙欽為新成侯六月詔曰鄭聲淫而亂樂聖王所放其罷樂府曲陽侯根前以大司馬建社稷策益封二千戶太僕安陽侯舜輔導有舊恩益封五百戶及丞相孔光大司空氾鄉侯何武益封各千戶詔曰河間王良喪太后三年為宗室儀表益封萬戶又曰制節謹度以防奢淫為政所先百王不易之道也諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民爭利百姓失職重困不足其議限列有司條奏諸王列侯得名田國中列侯在長安及公主名田縣道關內侯吏民名田皆無得過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人年六十以上十歲以下不在數中賈人皆不得名田為吏犯者以律論諸名田畜奴婢過品皆沒入縣官齊三服官諸官織綺繡難成害女紅之物皆止無作輸除任子令及誹謗詆欺法掖庭宮人年三十以下出嫁之官奴婢五十以上免為庶人禁郡國無得獻名獸益吏三百石以下奉察吏殘賊酷虐者以時退有司無得舉赦前往事博士弟子父母死予寧三年秋曲陽侯王根成都侯王況皆有罪根就國況免為庶人歸故郡詔曰朕承宗廟之重戰戰兢兢懼失天心間者日月亡光五星失行郡國比比地動乃者河南潁川郡水出流殺人民壞敗廬舍朕之不德民反蒙辜朕甚懼焉已遣光祿大夫循行舉籍賜死者棺錢人三千其令水所傷縣邑及他郡國災害什四以上民貲不滿十萬皆無出今年租賦建平元年春正月赦天下侍中騎都尉新成侯趙欽成陽侯趙訢皆有罪免為庶人徙遼西太皇太后詔外家王氏田非冢塋皆以賦貧民二月詔曰蓋聞聖王之治以得賢為首其與大司馬列侯將軍中二千石州牧守相舉孝弟惇厚能直言通政事延于側陋可親民者各一人三月賜諸侯王公主列侯丞相將軍中二千石中都官郎吏金錢帛各有差冬中山孝王太后媛弟宜鄉侯馮參有罪皆自殺二年春三月罷大司空復御史大夫夏四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宮恭皇后曰帝太后稱中安宮立恭皇廟于京師赦天下徒罷州牧復刺史六月庚申帝太后丁氏崩上曰朕聞夫婦一體詩云穀則異室死則同穴昔季武子成寑杜氏之殯在西階下請合葬而許之附葬之禮自周興焉郁郁乎文哉吾從周孝子事亡如事存帝太后宜起陵恭皇之園遂葬定陶發陳留濟陰近郡國五萬人穿復土待詔夏賀良等言赤精子之讖漢家曆運中衰當再受命宜改元易號詔曰漢興二百載曆數開元皇天降非材之佑漢國再獲受命之符朕之不德曷敢不通夫基事之元命必與天下自新其大赦天下以建平二年為太初元將元年號曰陳聖劉太平皇帝漏刻以百二十為度七月以渭城西北原上永陵亭部為初裬勿徙郡國民使得自安八月詔曰待詔夏賀良等建言改元易號增益漏刻可以永安國家朕過聽賀良等言冀為海內獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之賀良等反道惑眾下有司皆伏辜丞相博御史大夫玄孔鄉侯晏有罪博自殺玄減死二等論晏削戶四分之一語在博傳三年春正月立廣德夷王弟廣漢為廣平王癸卯帝太太后所居桂宮正殿火三月己酉丞相當薨有星孛于河鼓夏六月立魯頃王子郚鄉侯閔為王冬十一月壬子復甘泉泰畤汾陰后土祠罷南北郊東平王雲雲后謁安成恭侯夫人放皆有罪雲自殺謁放棄市四年春大旱關東民傳行西王母籌經歷郡國西入關至京師民又會聚祠西王母或夜持火上屋擊鼓號呼相驚恐二月封帝太太后從弟侍中傅商為汝昌侯太后同母弟子侍中鄭業為陽信侯三月侍中駙馬都尉董賢光祿大夫息夫躬南陽太守孫寵皆以告東平王封列侯語在賢傳夏五月賜中二千石至六百石及天下男子爵六月尊帝太太后為皇太太后秋八月恭皇園北門災冬詔將軍中二千石舉明兵法有大慮者元壽元年春正月辛丑朔日有蝕之詔曰朕獲保宗廟不明不敏宿夜憂勞未皇寧息惟陰陽不調元元不贍未睹厥咎婁敕公卿庶幾有望至今有司執法未得其中或上暴虐假勢獲名溫良寬柔陷於亡滅是故殘賊彌長和睦日衰百姓愁怨靡所錯躬乃正月朔日有蝕之厥咎不遠在余一人公卿大夫其各悉心勉帥百寮敦任仁人黜遠殘賊期於安民陳朕之過失無有所諱其與將軍列侯中二千石舉賢良方正能直言者各一人大赦天下丁巳皇太太后傅氏崩三月丞相嘉有罪下獄死秋九月大司馬票騎將軍丁明免孝元廟殿門銅龜蛇鋪首鳴二年春正月匈奴單于烏孫大昆彌來朝二月歸國單于不說語在匈奴傳夏四月壬辰晦日有蝕之五月正三公官分職大司馬衛將軍董賢為大司馬丞相孔光為大司徒御史大夫彭宣為大司空封長平侯正司直司隸造司寇職事未定六月戊午帝崩于未央宮秋九月壬寅葬義陵贊曰孝哀自為藩王及充太子之宮文辭博敏幼有令聞睹孝成世祿去王室權柄外移是故臨朝婁誅大臣欲彊主威以則武宣雅性不好聲色時覽卞射武戲即位痿痺末年浸劇饗國不永哀哉
