body:
  text: 公孫劉田王楊蔡陳鄭傳第三十六公孫賀字子叔北地義渠人也賀祖父昆邪景帝時為隴西守以將軍擊吳楚有功封平曲侯著書十餘篇賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷至太僕賀夫人君孺衛皇后姊也賀由是有寵元光中為輕車將軍軍馬邑後四歲出雲中後五歲以車騎將軍從大將軍青出有功封南窖侯後再以左將軍出定襄無功坐酎金失侯復以浮沮將軍出五原二千餘里無功後八歲遂代石慶為丞相封葛繹侯時期廷多事督責大臣自公孫弘後丞相李蔡嚴青翟趙周三人比坐事死石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣賀子敬聲代賀為太僕父子並居公卿位敬聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得上求之急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世者京師大俠也聞賀欲以贖子笑曰丞相禍及宗矣南山之竹不足受我辭斜谷之木不足為我械安世遂從獄中上書告敬聲與陽石公主私通及使人巫祭祠詛上且上甘泉當馳道埋偶人祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗語在江充戾園傳劉屈氂武帝庶兄中山靖王子也不知其始所以進征和二年春制詔御史故丞相賀倚舊故乘高勢而為邪興美田以利子弟賓客不顧元元無益邊穀貨賂上流朕忍之久矣終不自革乃以邊為援使內郡自省作車又令耕者自轉以困農煩擾畜者重馬傷耗武備衰減下吏妄賦百姓流亡又詐為詔書以姦傳朱安世獄已正於理其以涿郡太守屈氂為左丞相分丞相長史為兩府以待天下遠方之選夫親親任賢周唐之道也以澎戶二千二百封左丞相為澎侯其秋戾太子為江充所譖殺充發兵入丞相府屈氂挺身逃亡其印綬是時上避暑在甘泉宮丞相長史乘疾置以聞上問丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓毋接短兵多殺傷士衆堅閉城門毋令反者得出太子既誅充發兵宣言帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉來幸城西建章宮詔發三輔近縣兵部中二千石以下丞相兼將太子亦遣使者嬌制赦長安中都官囚徒發武庫兵命少傅石德及賓客張光等分將使長安囚如侯持節發長水及宣曲胡騎皆以裝會侍郎莽通使長安因追捕如侯告胡人曰節有詐勿聽也遂斬如侯引騎入長安又發輯濯士以豫大鴻臚商丘成初漢節純赤以太子持赤節故更為黃旄加上以相別太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子太子引兵去驅四市人凡數萬衆至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中丞相附兵浸多太子軍敗南奔覆盎城門得出會夜司直田仁部閉城門坐令太子得出丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請奈何擅斬之丞相釋仁上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之皇恐自殺及北軍使者任安坐受太子節懷二心司直田仁縱太子皆要斬上曰侍郎莽通獲反將如侯長安男子景建從通獲少傅石德可謂元功矣大鴻臚商丘成力戰獲反將張光其封通為重合侯建為德侯成為秺侯諸太子賓客嘗出入宮門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡以太子在外始置屯兵長安諸城門後二十餘日太子得於湖語在太子傳其明年二師將軍李廣利將兵出擊胸奴丞相為祖道送至渭橋與廣利辭決廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈氂許諾昌邑王者二師將軍女弟李夫人子也二師女為屈氂子妻故共欲立焉是時治巫蠱獄急內者令郭穰告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與二師共禱祠欲令昌邑王為帝有司奏請案驗罪至大逆不道有詔載屈氂廚車以徇要斬東市妻子梟首華陽街二師將軍妻子亦收二師聞之降胸奴宗族遂滅車千秋本姓田氏其先齊諸田徙長陵千秋為高寢郎會衛太子為江充所譖敗久之千秋上急變訟太子冤曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而說之謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚數月遂代劉屈氂為丞相封富民侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至胸奴單于問曰聞漢新拜丞相何用得之使者曰以上書言事故單于曰苟如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝以為辱命欲下之吏良久乃貰之然千秋為人敦厚有智居位自稱踰於前後數公初千秋始視事見上連年治太子獄誅罰尤多群下恐懼思欲寬廣上意尉安衆庶乃與御史中二千石共上壽頌德美勸上施恩惠緩刑罰玩聽音樂養志和神為天下自虞樂上報曰朕之不德自左丞相與二師陰謀逆亂巫蠱之禍流及士大夫朕日一食者纍月乃何樂之聽痛士大夫常在心既事不咎雖然巫蠱始發詔丞相御史督二千石求捕廷尉治未聞九卿廷尉有所鞫也曩者江充先治甘泉宮人轉至未央椒房以及敬聲之疇李禹之屬謀入胸奴有司無所發今丞相親掘蘭臺蠱驗所明知也至今餘巫頗脫不止陰賊侵身遠近為蠱朕愧之甚何壽之有敬不舉君之觴謹謝丞相二千石各就館書曰毋偏毋黨王道蕩蕩毋有復言後歲餘武帝疾立皇子鉤弋夫人男為太子拜大將軍霍光車騎將軍金日磾御史大夫桑弘羊及丞相千秋並受遺詔輔道少主武帝崩昭帝初即位未任聽政政事一決大將軍光千秋居丞相位謹厚有重德每公卿朝會光謂千秋曰始與君侯俱受先帝遺詔今光治內君侯治外宜有以教督使光毋負天下千秋曰唯將軍留意即天下幸甚終不肯有所言光以此重之每有吉祥嘉應數褒賞丞相訖昭帝世國家少事百姓稍益充實始元六年詔郡國舉良文學士問以民所疾苦於是鹽鐵之議起焉千秋為相十二年薨諡曰定侯初千秋年老上優之朝見得乘小車入宮殿中故因號曰車丞相子順嗣侯官至雲中太守宣帝時以虎牙將軍擊胸奴坐盜增鹵獲自殺國除桑弘羊為御史大夫八年自以為國家興榷管之利伐其功欲為子弟得官怨望霍光與上官桀等謀反遂誅滅王欣濟南人也以郡縣吏積功稍遷為被陽令武帝末軍旅數發郡國盜賊群起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬欣欣已解衣伏質仰言曰使君顓殺生之柄威震郡國今復斬一欣不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅因與欣相結厚勝之使還薦欣徵為右輔都尉守右扶風上數出幸安定北地過扶風宮館馳道修治供張辦武帝嘉之駐車拜欣為真視事十餘年昭帝時為御史大夫代車千秋為丞相封宜春侯明年薨諡曰敬侯子談嗣以列侯與謀廢昌邑王立宣帝益封三百戶薨子咸嗣王莽妻即咸女莽篡位宜春氏以外戚寵自欣傳國至玄孫莽敗乃絶楊敞華陰人也給事大將軍莫府為軍司馬霍光愛厚之稍遷至大司農元鳳中稻田使者燕蒼知上官桀等反謀以告敞敞素謹畏事不敢言乃移病臥以告諫大夫杜延年延年以聞蒼延年皆封敞以九卿不輒言故不得侯後遷御史大夫代王欣為丞相封安平侯明年昭帝崩昌邑王徵即位淫亂大將軍光與車騎將軍張安世謀欲廢王更立議既定使大司農田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已延年起至更衣敞夫人遽從東箱謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍教令遂共廢昌邑王立宣帝宣帝即位月餘敞薨諡曰敬侯子忠嗣以敞居位定策安宗廟益封三千五百戶忠弟惲字子幼以忠任為郎補常侍騎惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱好交英俊諸儒名顯朝廷擢為左曹霍氏謀反惲先聞知因侍中金安上以聞召見言狀霍氏伏誅惲等五人皆封惲為平通侯遷中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎移病盡一日輒償一沐或至歲餘不得沐其豪富郎日出游戲或行錢得善部貨賂流行傳相放效惲為中郎將罷山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎謁者有罪過輒奏免薦舉其高弟有行能者至郡守九卿郎官化之莫不自厲絶請謁貨賂之端令行禁止宮殿之內翕然同聲由是擢為諸吏光祿勳親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆豫惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此惲居殿中廉潔無私郎官稱公平然惲伐其行治又性刻害好發人陰伏同位有忤己者必欲害之以其能高人由是多怨於朝廷與太僕戴長樂相失卒以是敗長樂者宣帝在民間時與相知及即位拔擢親近長樂嘗使行事肄宗廟還謂掾史曰我親面見受詔副帝肄秺侯御人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪高昌侯車奔入北掖門惲語富平侯張延壽曰聞前曾有奔車抵殿門門關折馬死而昭帝崩今復如此天時非人力也左馮翊韓延壽有罪下獄惲上書訟延壽郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也我不能自保真人所謂鼠不容穴銜窶數者也又中書謁者令宣持單于使者語視諸將軍中朝二千石惲曰冒頓單于得漢美食好物謂之殠惡單于不來明甚惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣畫人有堯舜禹湯不稱而舉桀紂惲聞胸奴降者道單于見殺惲曰得不肖君大臣為畫善計不用自令身無處所若秦時但任小臣誅殺忠良竟以滅亡令親任大臣即至今耳古與今如一丘之貉惲妄引亡國以誹謗當世無人臣禮又語長樂曰正月以來天陰不雨此春秋所記夏侯君所言行必不至河東矣以主上為戲語尤悖逆絶理事下廷尉廷尉定國考問左驗明白奏惲不服罪而召戶將尊欲令戒飭富平侯延壽曰太僕定有死罪數事朝暮人也惲幸與富平侯婚姻今獨三人坐語侯言時不聞惲語自與太僕相觸也尊曰不可惲怒持大刀曰蒙富平侯力得族罪毋泄惲語令太僕聞之亂餘事惲幸得列九卿諸吏宿衛近臣上所信任與聞政事不竭忠愛盡臣子義而妄怨望稱引為訞惡言大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庶人惲既失爵位家居治産業起室宅以財自娛歲餘其友人安定太守西河孫會宗知略士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意不當治産業通賓客有稱譽惲宰相子少顯朝廷一朝以暗昧語言見廢內懷不服報會宗書曰惲材朽行穢文質無所底幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍會足下哀其愚蒙賜書教督以所不及殷勤甚厚然竊恨足下不深惟其終始而猥隨俗之毀譽也言鄙陋之愚心若逆指而文過默而息乎恐違孔氏各言爾志之義故敢略陳其愚唯君子察焉惲家方隆盛時乘朱輪者十人位在列卿爵為通侯總領從官與聞政事曾不能以此時有所建明以宣德化又不能與群僚同心并力陪輔朝廷之遺忘已負竊位素餐之責久矣懷祿貪勢不能自退遭遇變故橫被口語身幽北闕妻子滿獄當此之時自以夷滅不足以塞責豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子游道樂以忘憂小人全軀說以忘罪竊自思念過已大矣行已虧矣長為農夫以沒世矣是故身率妻子戮力耕桑灌園治産以給公上不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親送其終世有時而既臣之得罪已三年矣田家作苦歲時伏臘亨羊炮羔斗酒自勞家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時是日也拂衣而喜奮褎低卬頓足起舞誠淫荒無度不知其不可也惲幸有餘祿方糴賤販貴逐什一之利此賈豎之事汙辱之處惲親行之下流之人罪毀所歸不寒而栗雖雅知惲者猶隨風而靡尚何稱譽之有董生不云乎明明求仁義常恐不能化民者卿大夫意也明明求財利常恐困乏者庶人之事也故道不同不相為謀今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有段干木田子方之遺風漂然皆有節概知去就之分頃者足下離舊土臨安定安定山谷之間昆戎舊壤子弟貪鄙豈習俗之移人哉於今乃睹子之志矣方當盛漢之隆願勉旃毋多談又惲兄子安平侯談為典屬國謂惲曰西河太守建平杜侯前以罪過出今徵為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力惲素與蓋寬饒韓延壽善談即曰縣官實然蓋司隸韓馮翊皆盡力吏也俱坐事誅會有日食變騶馬猥佐成上書告惲驕奢不悔過日食之咎此人所致章下廷尉案驗得所豫會宗書宣帝見而惡之廷尉當惲大逆無道要斬妻子徙酒泉郡談坐不諫正惲與相應有怨望語免為庶人召拜成為郎諸在位與惲厚善者未央衛尉韋玄成京兆尹張敞及孫會宗等皆免官蔡義河內溫人也以明經給事大將軍莫府家貧常步行資禮不逮衆門下好事者相合為義買犢車令乘之數歲遷補覆盎城門候久之詔求能為韓詩者徵義待詔久不進見義上疏曰臣山東草萊之人行能亡所比容貌不及衆然而不棄人倫者竊以聞道於先師自託於經術也願賜清閒之燕得盡精思於前上召見義說詩甚說之擢為光祿大夫給事中進授昭帝數歲拜為少府遷御史大夫代楊敞為丞相封陽平侯又以定策安宗廟益封加賜黃金二百斤義為丞相時年八十餘短小無須眉貌似老嫗行步俯僂常兩吏扶夾乃能行時大將軍光秉政議者或言光置宰相不選賢苟用可顓制者光聞之謂侍中左右及官屬曰以為人主師當為宰相何謂云云此語不可使天下聞也義為相四歲薨諡曰節侯無子國除陳萬年字幼公沛郡相人也為郡吏察舉至縣令遷廣陵太守以高弟入為右扶風遷太僕萬年廉平內行修然善事人賂遺外戚許史傾家自盡尤事樂陵侯史高丞相丙吉病中二千石上謁問疾遣家丞出謝謝已皆去萬年獨留昏夜乃歸及吉病甚上自臨問以大臣行能吉薦于定國杜延年及萬年萬年竟代定國為御史大夫八歲病卒子咸字子康年十八以萬年任為郎有異材抗直數言事刺譏近臣書數十上遷為左曹萬年嘗病召咸教戒於床下語至夜半咸睡頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聽吾言何也咸叩頭謝曰具曉所言大要教咸讇也萬年乃不復言萬年死後元帝擢咸為御史中丞總領州郡奏事課第諸刺史內執法殿中公卿以下皆敬憚之是時中書令石顯用事顓權咸頗言顯短顯等恨之時槐里令朱雲殘酷殺不辜有司舉奏未下咸素善雲雲從刺候教令上書自訟於是石顯微伺知之白奏咸漏泄省中語下獄掠治減死髡為城旦因廢成帝初即位大將軍王鳳以咸前指言石顯有忠直節奏請咸補長史遷冀州刺史奉使稱意徵為諫大夫復出為楚內史北海東郡太守坐為京兆尹王章所薦章誅咸免官起家復為南陽太守所居以殺伐立威豪猾吏及大姓犯法輒論輸府以律程作司空為地臼木杵舂不中程或私解脫鉗釱衣服不如法輒加罪笞督作劇不勝痛自絞死歲數百千人久者蟲出腐爛家不得收其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食然操持掾史郡中長吏皆令閉門自斂不得踰法公移敕書曰即各欲求索自快是一郡百太守也何得然哉下吏畏之豪彊執服令行禁止然亦以此見廢咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絶在咸後皆以廉儉先至公卿而咸滯於郡守時車騎將軍王音輔政信用陳湯咸數賂遺湯豫書曰即蒙子公力得入帝城死不恨後竟徵入為少府少府多寶物屬官咸皆鉤校發其姦臧沒入辜榷財物官屬及諸中宮黃門鉤盾掖庭官吏舉奏按論畏咸皆失氣為少府三歲與翟方進有隙方進為丞相奏咸前為郡守所在殘酷毒螫加於吏民主守盜受所監而官媚邪臣陳湯以求薦舉苟得無恥不宜處位咸坐免頃之紅陽侯立舉咸方正為光祿大夫給事中方進復奏免之後數年立有罪就國方進奏歸咸故郡以憂死鄭弘字稚卿泰山剛人也兄昌字次卿亦好學皆明經通法律政事次卿為太原涿郡太守弘為南陽太守皆著治迹條教法度為後所述次卿用刑罰深不如弘平遷淮陽相以高弟入為右扶風京師稱之代韋玄成為御史大夫六歲坐與京房論議免語在房傳贊曰所謂鹽鐵議者起始元中徵文學賢良問以治亂皆對願罷郡國鹽鐵酒榷均輸務本抑末毋與天下爭利然後教化可興御史大夫弘羊以為此乃所以安邊竟制四夷國家大業不可廢也當時相詰難頗有其議文至宣帝時汝南桓寬次公治公羊春秋舉為郎至廬江太守丞博通善屬文推衍鹽鐵之議增廣條目極其論難著數萬言亦欲以究治亂成一家之法焉其辭曰觀公卿賢良文學之議異乎吾所聞聞汝南朱生言當此之時英俊並進賢良茂陵唐生文學魯國萬生之徒六十有餘人咸聚闕庭舒六藝之風陳治平之原知者贊其慮仁者明其施勇者見其斷辨者騁其辭齗齗焉行行焉雖未詳備斯可略觀矣中山劉子推言王道嬌當世反諸正彬彬然弘博君子也九江祝生奮史魚之節發憤悶譏公卿介然直而不撓可謂不畏彊圉矣桑大夫據當世合時變上權利之略雖非正法巨儒宿學不能自解博物通達之士也然攝公卿之柄不師古始放於末利處非其位行非其道果隕其性以及厥宗車丞相履伊呂之列當軸處中括囊不言容身而去彼哉彼哉若夫丞相御史兩府之士不能正議以輔宰相成同類長同行阿意苟合以說其上斗筲之徒何足選也
