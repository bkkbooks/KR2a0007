body:
  text: 趙充國辛慶忌傳第三十九趙充國字翁孫隴西上邽人也後徙金城令居始為騎士以六郡良家子善騎射補羽林為人沈勇有大略少好將帥之節而學兵法通知四夷事武帝時以假司馬從二師將軍擊胸奴大為虜所圍漢軍乏食數日死傷者多充國乃與壯士百餘人潰圍陷陳二師引兵隨之遂得解身被二十餘創二師奏狀詔徵充國詣行在所武帝親見視其創嗟歎之拜為中郎遷車騎將軍長史昭帝時武都氐人反充國以大將軍護軍都尉將兵擊定之遷中郎將將屯上谷還為水衡都尉擊胸奴獲西祁王擢為後將軍兼水衡如故與大將軍霍光定冊尊立宣帝封營平侯本始中為蒲類將軍征胸奴斬虜數百級還為後將軍少府胸奴大發十餘萬騎南旁塞至符奚廬山欲入為寇亡者題除渠堂降漢言之遣充國將四萬騎屯緣邊九郡單于聞之引去是時光祿大夫義渠安國使行諸羌先零豪言願時渡湟水北逐民所不田處畜牧安國以聞充國劾安國奉使不敬是後羌人旁緣前言抵冒渡湟水郡縣不能禁元康三年先零遂與諸羌種豪二百餘人解仇交質盟詛上聞之以問充國對曰羌人所以易制者以其種自有豪數相攻擊勢不一也往三十餘歲西羌反時亦先解仇合約攻令居與漢相距五六年乃定至征和五年先零豪封煎等通使胸奴胸奴使人至小月氏傳告諸羌曰漢二師將軍衆十餘萬人降胸奴羌人為漢事苦張掖酒泉本我地地肥美可共擊居之以此觀胸奴欲與羌合非一世也間者胸奴困於西方聞烏桓來保塞恐兵復從東方起數使使尉黎危須諸國設以子女貂裘欲沮解之其計不合疑胸奴更遣使至羌中道從沙陰地出鹽澤過長坑入窮水塞南抵屬國與先零相直臣恐羌變未止此且復結聯他種宜及未然為之備後月餘羌侯狼何果遣使至胸奴藉兵欲擊鄯善敦煌以絶漢道充國以為狼何小月氏種在陽關西南勢不能獨造此計疑胸奴使已至羌中先零罕开乃解仇礷作約到秋馬肥變必起矣宜遣使者行邊兵豫為備敕視諸羌毋令解仇以發覺其謀於是兩府復白遣義渠安國行視諸羌分別善惡安國至召先零諸豪三十餘人以尤桀黠皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹為虜所擊失亡車重兵器甚衆安國引還至令居以聞是歲神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略然羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂上笑曰諾充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陳會明畢遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中亡虜夜引兵上至落都召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數千人守杜田四望狹中兵豈得入哉充國常以遠斥候為務行必為戰備此必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守捕得生口言羌豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬭而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒胡越騎為支兵至令居虜並出絶轉道卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間虜通轉道津渡初罕开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪乃遣歸告種豪大兵誅有罪者明白自別毋取并滅天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降罕开及劫略者解散虜謀徼極乃擊之時上已發三輔太常徒弛刑三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛勢不可久或曰至秋冬乃進兵此虜在竟外之冊今虜朝夕為寇土地寒苦漢馬不能冬屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵並出張掖酒泉合擊罕开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子復引兵還冬復擊之大兵仍出虜必震壞天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回遠千里以一馬自他負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍引去逐水屮入山林隨而深入虜即據前險守後厄以絶糧道必有傷危之憂為夷狄笑千載不可復而武賢以為可奪其畜産虜其妻子此殆空言非至計也又武威縣張掖日勒皆當北塞有通谷水草臣恐胸奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域其郡兵尤不可發先零首為畔逆它種劫略故臣愚冊欲捐罕开暗昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者撫循和輯此全師保勝安邊之冊天子下其書公卿議者咸以為先零兵盛而負罕开之助不先破罕开則先零未可圖也上乃拜侍中樂成侯許延壽為強弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其冊以書敕讓充國曰皇帝問後將軍甚苦暴露將軍計欲至正月乃擊罕羌羌人當獲麥已遠其妻子精兵萬人欲為酒泉敦煌寇邊兵少民守保不得田作今張掖以東粟石百餘芻槀束數十轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食欲至冬虜皆當畜食多藏匿山中依險阻將軍士寒手足皸瘃寧有利哉將軍不念中國之費欲以歲數而勝微將軍誰不樂此者今詔破羌將軍武賢將兵六千一百人敦煌太守快將二千人長水校尉富昌酒泉候奉世將婼月氏兵四千人亡慮萬二千人齎三十日食以七月二十二日擊罕羌入鮮水北句廉上去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來分散其心意離其黨與雖不能殄滅當有瓦解者已詔中郎將卬將胡越佽飛射士步兵二校益將軍兵今五星出東方中國大利蠻夷大敗太白出高用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外便宜有守以安國家乃上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使罕諭告以大軍當至漢不誅罕以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛德至計亡已故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零羌楊玉將騎四千及煎鞏騎五千阻石山木候便為寇罕羌未有所犯今置先零先擊罕釋有罪誅亡辜起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今罕羌欲為敦煌酒泉寇飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與罕解仇結約然其私心不能亡恐漢兵至而罕开背之也臣愚以為其計常欲先赴罕开之急以堅其約先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫須之屬不輕得離也如是虜兵寖多誅之用力數倍臣恐國家憂纍繇十年數不二三歲而已臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至孰悉也於臣之計先誅先零已則罕开之屬不煩兵而服矣先零已誅而罕开不服涉正月擊之得計之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚解弛望見大軍棄車重欲渡湟水道厄狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦腳脛寒泄將軍年老加疾一朝之變不可諱朕甚憂之今詔破羌將軍詣屯所為將軍副急因天時大利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌彊弩將軍時羌降者萬餘人矣充國度其必壞欲罷騎兵屯田以待其敝作奏未上會得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中穀斛八錢吾謂耿中丞糴二百萬斛穀羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二冊羌人故敢為逆失之毫釐差以千里是既然矣今兵久不決四夷卒有動搖相因而起雖有知者不能善其後羌獨足憂邪吾固以死守之明主可為忠言遂上屯田奏曰臣聞兵者所以明德除害也故舉得於外則福生於內不可不慎臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛茭槀二十五萬二百八十六石難久不解繇役不息又恐它夷卒有不虞之變相因並起為明主憂誠非素定廟勝之冊且羌虜易以計破難用兵碎也故臣愚以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壞敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南步兵與吏士私從者合凡萬二百八十一人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠治湟狹以西道橋七十所令可至鮮水左右田事出賦人二十畝至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉穀至者足支萬人一歲食謹上田處及器用簿唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時伏誅兵當何時得決孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於寄託遠遁骨肉離心人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威德並行一也又因排折羌虜令不得歸肥饒之墬貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以視羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患坐得必勝之道七也亡經阻遠追死傷之害八也內不損威武之重外不令虜得乘間之勢九也又亡驚動河南大开小开使生它變之憂十也治湟狹中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長冊唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之虜雖未伏誅兵決可期月而望期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分別人而并擊我其意常恐今兵不出得亡變生與先零為一將軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地遠客分散飢凍罕幵莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破可日月冀遠在來春故曰兵決可期月而望竊見北邊自敦煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大衆攻之而不能害今留步士萬人屯田地勢平易多高山遠望之便部曲相保為塹壘木樵校聯不絶便兵弩飭鬭具熢火幸通勢及并力以逸待勞兵之利者也臣愚以為屯田內有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸德宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於他種中遠涉河山而來為寇又見屯田之士精兵萬人終不敢復將其纍重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之冊也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不苟接刃攻不必取不苟勞衆誠令兵出雖不能滅先零亶能令虜絶不為小寇則出兵可也即令同是而釋坐勝之道從乘危之勢往終不見利空內自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且胸奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以淡一隅臣愚以為不便校尉臨衆幸得承威德奉厚幣拊循衆羌諭以明詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡它心不足以故出兵臣竊自惟念奉詔出塞引軍遠擊窮天子之精兵散車甲於山野雖亡尺寸之功偷得避慊之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寬仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍冊其言常是臣任其計可必用也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聽將軍將軍計善其上留屯田及當罷者人馬數將軍強食慎兵事自愛上以破羌強弩將軍數言當擊又用充國屯田處離散恐虜犯之於是兩從其計詔兩將軍與中郎將卬出擊強弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田明年五月充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還所善浩星賜迎說充國曰衆人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以為虜勢窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵勢國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者卒以其意對上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉其秋羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黃羝之屬四千餘人降漢封若零弟澤二人為帥衆王離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨衆時湯已拜受節有詔更用臨衆後臨衆病免五府復舉湯湯數醉䣱羌人羌人反畔卒如充國之言初破羌將軍武賢在軍中時與中郎將卬宴語卬道車騎將軍張安世始嘗不快上上欲誅之卬家將軍以為安世本持橐簪筆事孝武帝數十年見謂忠謹宜全度之安世用是得免及充國還言兵事武賢罷歸故官深恨上書告卬泄省中語卬坐禁止而入至充國莫府司馬中亂屯兵下吏自殺充國乞骸骨賜安車駟馬黃金六十斤罷就第朝庭每有四夷大議常與參兵謀問籌策焉年八十六甘露二年薨諡曰壯侯傳子至孫欽欽尚敬武公主主亡子主教欽良人習詐有身名它人子欽薨子岑嗣侯習為太夫人岑父母求錢財亡已忿恨相告岑坐非子免國除元始中修功臣後復封充國曾孫伋為營平侯初充國以功德與霍光等列畫未央宮成帝時西羌嘗有警上思將帥之臣追美充國乃召黃門郎楊雄即充國圖畫而頌之曰明靈惟宣戎有先零先零昌狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震既臨其域諭以威德有守矜功謂之弗克請奮其旅于罕之羌天子命我從之鮮陽營平守節婁奏封章料敵制勝威謀靡亢遂克西戎還師於京鬼方賓服罔有不庭昔周之宣有方有虎詩人歌功乃列于雅在漢中興充國作武赳赳桓桓亦紹厥後充國為後將軍徙杜陵辛武賢自羌軍還後七年復為破羌將軍征烏孫至敦煌後不出徵未到病卒子慶忌至大官辛慶忌字子真少以父任為右校丞隨長羅侯常惠屯田烏孫赤谷城與歙侯戰陷陳卻敵惠奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將朝庭多重之者輔為校尉遷張掖太守徙酒泉所在著名成帝初徵為光祿大夫遷左曹中郎將至執金吾始武賢與趙充國有隙後充國家殺辛氏至慶忌為執金吾坐子殺趙氏左遷酒泉太守歲餘大將軍王鳳薦慶忌前在兩郡著功迹徵入歷位朝廷莫不信鄉質行正直仁勇得衆心通於兵事明略威重任國柱石父破羌將軍武賢顯名前世有威西夷臣鳳不宜久處慶忌之右乃復徵為光祿大夫執金吾數年坐小法左遷雲中太守復徵為光祿勳時數有災異丞相司直何武上封事曰虞有宮之奇晉獻不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒士不素厲則難使死敵是以先帝建列將之官近戚主內異姓距外故姦軌不得萌動而破滅誠萬世之長冊也光祿勳慶忌行義修正柔毅敦厚謀慮深遠前在邊郡數破敵獲虜外夷莫不聞乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞其後拜為右將軍諸吏散騎給事中歲餘徙為左將軍慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平胸奴西域親附敬其威信年老卒官長子通為護羌校尉中子遵函谷關都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人元始中安漢公王莽秉政見慶忌本大將軍鳳所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷水衡都尉茂自見名臣子孫兄弟並列不甚詘事兩甄時平帝幼外家衛氏不得在京師而護羌校尉通長子次兄素與帝從舅衛子伯相善兩人俱游俠賓客甚盛及呂寬事起莽誅衛氏兩甄搆言諸辛陰與衛子伯為心腹有背恩不說安漢公之謀於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢慶忌本狄道人為將軍徙昌陵昌陵罷留長安贊曰秦漢已來山東出相山西出將秦將軍白起郿人王翦頻陽人漢興郁郅王圍甘延壽義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武廉褒狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地處勢迫近羌胡民俗修習戰備高上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行其風聲氣俗自古而然今之歌謠慷慨風流猶存耳
