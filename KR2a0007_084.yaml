body:
  text: 循吏傳第五十九漢興之初反秦之敝與民休息凡事簡易禁罔疏闊而相國蕭曹以寬厚清靜為天下帥民作畫一之歌孝惠垂拱高后女主不出房闥而天下晏然民務稼穡衣食滋殖至於文景遂移風易俗是時循吏如河南守吳公蜀守文翁之屬皆謹身帥先居以廉平不至於嚴而民從化孝武之世外攘四夷內改法度民用雕敝姦軌不禁時少能以化治稱者惟江都相董仲舒內史公孫弘兒寬居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之仲舒數謝病去弘寬至三公孝昭幼沖霍光秉政承奢侈旅之後海內虛耗光因循守職無所改作至於始元元鳳之間胸奴鄉化百姓益富舉賢良文學問民所疾苦於是罷酒榷而議鹽鐵矣及至孝宣繇仄陋而登至尊興于閭閻知民事之囏難自霍光薨後始躬萬機厲精為治五日一聽事自丞相已下各奉職而進及拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎以為太守吏民之本也數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是故漢世良吏於是為盛稱中興焉若趙廣漢韓延壽尹翁歸嚴延年張敞之屬皆稱其位然任刑罰或抵罪誅王成黃霸朱邑龔遂鄭弘召信臣等所居民富所去見思生有榮號死見奉祀此廩廩庶幾德讓君子之遺風矣文翁廬江舒人也少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士數歲蜀生皆成就還歸文翁以為右職用次察舉官有至郡守刺史者又修起學官於成都市中招下縣子弟以為學官弟子為除更繇高者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閣縣邑吏民見而榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云文翁終於蜀吏民為立祠堂歲時祭祀不絶至今巴蜀好文雅文翁之化也王成不知何郡人也為膠東相治甚有聲宣帝最先褒之地節三年下詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞來不怠流民自占八萬餘口治有異等之效其賜成爵關內侯秩中二千石未及徵用會病卒官後詔使丞相御史問郡國上計長吏守丞以政令得失或對言前膠東相成偽自增加以蒙顯賞是後俗吏多為虛名云黃霸字次公淮陽陽夏人也以豪桀役使徙雲陵霸少學律令喜為吏武帝末以待詔入錢賞官補侍郎謁者坐同産有罪劾免後復入穀沈黎郡補左馮翊二百石卒史馮翊以霸入財為官不署右職使領郡錢穀計簿書正以廉稱察補河東均輸長復察廉為河南太守丞霸為人明察內敏又習文法然溫良有讓足知善御衆為丞處議當於法合人心太守甚任之吏民愛敬焉自武帝末用法深昭帝立幼大將軍霍光秉政大臣爭權上官桀等與燕王謀作亂光既誅之遂遵武帝法度以刑罰痛繩群下繇是俗吏上嚴酷以為能而霸獨用寬和為名會宣帝即位在民間時知百姓苦吏急也聞霸持法平召以為廷尉正數決疑獄庭中稱平守丞相長史坐公卿大議廷中知長信少府夏侯勝非議詔書大不敬霸阿從不舉劾皆下廷尉繫獄當死霸因從勝受尚書獄中再隃冬積三歲乃出語在勝傳勝出復為諫大夫令左馮翊宋畸舉霸賢良勝又口薦霸於上上擢霸為揚州刺史三歲宣帝下詔曰制詔御史其以賢良高第揚州史霸為潁川太守秩比二千石居官賜車蓋特高一丈別駕主簿車緹油屏泥於軾前以章有德時上垂意於治數下恩澤詔書吏不奉宣太守霸為選擇良吏分部宣布詔令令民咸知上意使郵亭鄉官皆畜雞豚以贍鰥寡貧窮者然後為條教置父老師帥伍長班行之於民間勸以為善防姦之意及務耕桑節用殖財種樹畜養去食穀馬米鹽靡密初若煩碎然霸精力能推行之吏民見者語次尋繹問它陰伏以相參考嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問豪氂不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭豬子可以祭吏往皆如言其識事聰明如此吏民不知所出咸稱神明姦人去入它郡盜賊日少霸力行教化而後誅罰務在成就全安長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及姦吏緣絶簿書盜財物公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寬內明得吏民心戶口歲增治為天下第一徵守京兆尹秩二千石坐發民治馳道不先以聞又發騎士詣北軍馬不適士劾乏軍興連貶秩有詔歸潁川太守官以八百石治如其前前後八年郡中愈治是時鳳皇神爵數集郡國潁川尤多天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子弟弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年亡重罪囚吏民鄉于教化興於行誼可謂賢人君子矣書不云乎股肱良哉其賜爵關內侯黃金百斤秩中二千石而潁川孝弟有行義民三老力田皆以差賜爵及帛後數月微霸為太子太傅遷御史大夫五鳳三年代丙吉為丞相封建成侯食邑六百戶霸材長於治民及為丞相總綱紀號令風采不及丙魏于定國功名損於治郡時京兆尹張敞舍鶡雀飛集丞相府霸以為神雀議欲以聞敞奏霸曰竊見丞相請與中二千石博士雜問郡國上計長吏守丞為民興利除害成大化條其對有耕者讓畔男女異路道不拾遺及舉孝子弟弟貞婦者為一輩先上殿舉而不知其人數者次之不為條教者在後叩頭謝丞相雖口不言而心欲其為之也長吏守丞對時臣敞舍有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏曰臣問上計長吏守丞以興化條皇天報下神雀後知從臣敞舍來乃止郡國吏竊笑丞相仁厚有知略微信奇怪也昔汲黯為淮陽守辭去之官謂大行李息曰御史大夫張湯懷詐阿意以傾朝廷公不早白與俱受戮矣息畏湯終不敢言後湯誅敗上聞黯與息語乃抵息罪而秩黯諸侯相取其思竭忠也臣敞非敢毀丞相也誠恐群臣莫白而長吏守丞畏丞相指歸舍法令各為私教務相增加澆淳散朴並行偽貌有名亡實傾搖解怠甚者為妖假令京師先行讓畔異路道不拾遺其實亡益廉貪貞淫之行而以偽先天下固未可也即諸侯先行之偽聲軼於京師非細事也漢家承敝通變造起律令所以勸善禁姦條貫詳備不可復加宜令貴臣明飭長吏守丞歸告二千石舉三老孝弟力田孝廉廉吏務得其人郡事皆以義法令撿式毋得擅為條教敢挾詐偽以姦名譽者必先受戮以正明好惡天子嘉納敞言召上計吏使侍中臨飭如敞指意霸甚慚又樂陵侯史高以外屬舊恩侍中貴重霸薦高可大尉天子使尚書召問霸太尉官罷久矣丞相兼之所以偃武興文也如國家不虞邊境有事左右之臣皆將率也夫宣明教化通達幽隱使獄無冤刑邑無盜賊君之職也將相之官朕之任焉侍中樂陵侯高帷幄近臣朕之所自親君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃決自是後不敢復有所請然自漢興言治民吏以霸為首為丞相五歲甘露三年薨諡日定侯霸死後樂陵侯高竟為大司馬霸子思侯賞嗣為關都尉薨子忠侯輔嗣至衛尉九卿薨子忠嗣侯訖王莽乃絶子孫為吏二千石者五六人始霸少為陽夏遊徼與善相人者共載出見一婦人相者言此婦人當富貴不然相書不可用也霸推問之乃其鄉里巫家女也霸即取為妻與之終身為丞相後徙杜陵朱邑字仲卿廬江舒人也少時為舒桐鄉嗇夫廉平不苛以愛利為行未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉遷補太守卒史舉賢良為大司農丞遷北海太守以治行第一入為大司農為人淳厚篤於故舊然性公正不可交以私天子器之朝廷敬焉是時張敞為膠東相與邑書曰明主遊心太古廣延茂士此誠忠臣竭思之時也直敞遠守劇郡馭於繩墨胸臆約結固亡奇也雖有亦安所施足下以清明之德掌周稷之業猶飢者甘糟粳穰歲餘梁肉何則有亡之勢異也昔陳平雖賢須魏倩而後進韓信雖奇賴蕭公而後信故事各達其時之英俊若必伊尹呂望而後薦之則此人不因足下而進矣邑感敞言貢薦賢士大夫多得其助者身為列卿居處儉節祿賜以九族鄉黨家亡餘財神爵元年卒天子閔惜下詔稱揚曰大司農邑廉潔守節退食自公亡強外之交束修之餽可謂淑人君子遭離凶災朕甚閔之其賜邑子黃金百斤以奉其祭祀初邑病且死屬其子曰我故為桐鄉吏其民愛我必葬我桐鄉後世子孫奉嘗我不如桐鄉民及死其子葬之桐鄉西郭外民果共為邑起冢立祠歲時祠祭至今不絶龔遂字少卿山陽南平陽人也以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面刺王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗久與騶奴宰人遊戲飲食賞賜亡度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也願賜清間竭愚王辟左右遂曰大王知膠西王所以為無道亡乎王曰不知也曰臣聞膠西王有諛臣侯得王所為擬於桀紂也得以為堯舜也王説其諂諛嘗與寢處唯得所言以至於是今大王親近群小漸漬邪惡所習存亡之機不可不慎也臣請選郎通經術有行義者王起居坐則誦詩書立則習禮容宜有益王許之遂乃選郎中張安等十人侍王居數日王皆逐去安等久之宮中數有妖怪王以問遂遂以為有大憂宮室將空語在昌邑王傳會昭帝崩亡子昌邑王賀嗣立官屬皆徵入王相安樂遷衛尉遂見安樂流涕謂曰王立為天子日益驕溢諫之不復聽今哀痛未盡日與近臣飲食作樂鬭虎豹召皮軒車九流驅馳東西所為悖道古制寬大臣有隱退今去不得陽狂恐知身死為世戮奈何君陛下故相宜極諫爭王即位二十七日卒以淫亂廢昌邑群臣坐陷王於惡不道皆誅死者二百餘人唯遂與中尉王陽以數諫爭得減死髡為城旦宣帝即位久之渤海左右郡歲飢盜賊並起二千石不能禽制上選能治者丞相御史舉遂可用上以為渤海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心內輕焉謂遂曰渤海廢亂朕甚憂之君欲何以息其盜賊以稱朕意遂對曰海瀕遐遠不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上聞遂對甚説答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盜賊吏諸持鉏鉤田器者皆為良民吏無得問持兵者乃為盜賊遂單車獨行至府郡中翕然盜賊亦皆罷渤海又多劫略相隨聞遂教令即時解散棄其兵弩而持鉤鉏盜賊於是悉平民安土樂業遂乃聞倉廩假貧民選用良吏尉安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑令口種一樹榆百本薤五十本蔥一畦韭家二母彘五雞民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畝秋冬課收斂益蓄困實蓤芡勞來循行郡中皆有蓄積吏民皆富實獄訟止息數年上遣使者徵遂議曹王生願從功曹以為王生素耆酒亡節度不可使遂不忍逆從至京師王生日飲酒不視太守會遂引入宮王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生言天子説其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也上以遂年老不任公卿拜為水衡都尉議曹王生為水衡丞以褒顯遂云水衡典上林禁苑共張宮館為宗廟取牲官職親近上甚重之以官壽卒召信臣字翁卿九江壽春人也以明經甲科為郎出補穀陽長舉高第遷上蔡長其治視民如子所居見稱述超為零陵太守病歸復徵為諫大夫遷南陽太守其治如上蔡信臣為人勤力有方略好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌歲歲增加多至萬頃民得其利畜積有餘信臣為民作均水約束刻石立於田畔以防分爭禁止嫁娶送終奢靡務出於儉約府縣吏家子弟好遊敖不以田作為事輒斥罷之甚者案其不法以視好惡其化大行郡中莫不耕稼力田百姓歸之戶口增倍盜賊獄訟衰止吏民親愛信臣號之曰召父荊州刺史奏信臣為百姓興利郡以殷富賜黃金四十斤遷河南太守治行常為第一復數增秩賜金竟寧中徵為少府列於九卿奏請上林諸離遠宮館稀幸御者勿復繕治共張又奏省樂府黃門倡優諸戲及宮館兵弩什器減過泰半太官園種冬生蔥韭菜茹覆以屋廡晝夜燃蘊火待溫氣乃生信臣以為此皆不時之物有傷於人不宜以奉供養及它非法食物悉奏罷省費歲數千萬信臣年老以官卒元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠
