body:
  text: 衛青霍去病傳第二十五衛青字仲卿其父鄭季河東平陽人也以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛媼通生青青有同母兄衛長君及姊子夫子夫自平陽公主家得幸武帝故青冒姓為衛氏衛媼長女君孺次女少兒次女則子夫子夫男弟步廣皆冒衛氏青為侯家人少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟數青嘗從人至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎青壯為侯家騎從平陽主建元二年春青姊子夫得入宮幸上皇后大長公主女也無子妒大長公主聞衛子夫幸有身妒之乃使人捕青青時給事建章未知名大長公主執囚青欲殺之其友騎郎公孫敖與壯士往篡之故得不死上聞乃召青為建章監侍中及母昆弟貴賞賜數日間纍千金君孺為太僕公孫賀妻少兒故與陳掌通上召貴掌公孫敖由此益顯子夫為夫人青為太中大夫元光六年拜為車騎將軍擊胸奴出上谷公孫賀為輕車將軍出雲中太中大夫公孫敖為騎將軍出代郡衛尉李廣為驍騎將軍出雁門軍各萬騎青至籠城斬首虜數百騎將軍敖亡七千騎衛尉廣為虜所得得脫歸皆當斬贖為庶人賀亦無功唯青賜爵關內侯是後胸奴仍侵犯邊語在胸奴傳元朔元年春衛夫人有男立為皇后其秋青復將三萬騎出雁門李息出代郡青斬首虜數千明年青復出雲中西至高闕遂至於隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡以三千八百戶封青為長平侯青校尉蘇建為平陵侯張次公為岸頭侯使建築朔方城上曰胸奴逆天理亂人倫暴長虐老以盜竊為務行詐諸蠻夷造謀籍兵數為邊害故興師遣將以征厥罪詩不云乎薄伐獫允至于太原出車彭彭城彼朔方今車騎將軍青度西河至高闕獲首二千三百級車輜畜産畢收為鹵已封為列侯遂西定河南地案榆溪舊塞絶梓領梁北河討蒲泥破符離斬輕鋭之卒捕伏聽者三千一十七級執訊獲醜驅馬牛羊百有餘萬全甲兵而還益封青三千八百戶其後胸奴比歲入代郡雁門定襄上郡朔方所殺略甚衆語在胸奴傳元朔五年春令青將三萬騎出高闕衛尉蘇建為遊擊將軍左內史李沮為強弩將軍太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平胸奴右賢王當青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢裨王十餘人衆男女萬五千餘人畜數十百萬於是引兵而還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸上曰大將軍青躬率戎士師大捷獲胸奴王十有餘人益封青八千七百戶而封青子伉為宜替侯子不疑為陰安侯子登為發干侯青固謝曰臣幸得待罪行間賴陛下神靈軍大捷皆諸校力戰之功也陛下幸已益封臣青臣青子在繈褓中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封上曰我非忘諸校功也今固且圖之乃詔御史曰護軍都尉公孫敖三從大將軍擊胸奴常護軍傅校獲王封敖為合騎侯都尉韓説從大軍出填渾至胸奴右賢王庭為戲下搏戰獲王封説為龍額侯騎將軍賀從大將軍獲王封賀為南窖侯輕車將軍李蔡再從大將軍獲王封蔡為樂安侯校尉李朔趙不虞公孫戎奴各三從大將軍獲王封朔為陟軹侯不虞為隨成侯戎奴為從平侯將軍李沮李息及校尉豆如意中郎將綰皆有功賜爵關內侯沮息如意食邑各三百戶其秋胸奴入代殺都尉明年春大將軍青出定襄合騎侯敖為中將軍太僕賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左內史李沮為強弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急胸奴誘之遂將其餘騎可八百奔降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間不患無威而霸説我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所是歲也霍去病始侯霍去病大將軍青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后尊少兒更為詹事陳掌妻去病以皇后姊子年十八為侍中善騎射再從大將軍大將軍受詔豫壯士為票姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是上曰票姚校尉去病斬首捕虜二千二十八級得相國當戶斬單于大父行藉若侯産捕季父羅姑比再冠軍以二千五百戶封去病為冠軍侯上谷太守郝賢四從大將軍捕首虜千三百級封賢為終利侯騎士孟已有功賜爵關內侯邑二百戶是歲失兩將軍亡翕侯功不多故青不益封蘇建至上弗誅贖為庶人青賜千金是時王夫人方幸於上寧乘説青曰將軍所以功未甚多身食萬戶三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親壽青以五百金為王夫人親壽上聞問青青以實對上乃拜寧乘為東海都尉校尉張騫從大將軍以嘗使大夏留胸奴中久道軍知善水草處軍得以無飢渴因前使絶國功封騫為博望侯去病侯三歲元狩二年春為票騎將軍將萬騎出隴西有功上曰票騎將軍率戎士隃烏盩討遫濮涉狐奴歷五王國輜重人衆攝讋者弗取幾獲單于子轉戰六日過焉支山千有餘里合短兵鏖皋蘭下殺折蘭王斬盧侯王鋭悍者誅全甲獲醜執渾邪王子及相國都尉捷首虜八千九百六十級收休屠祭天金人師率減什七益封去病二千二百戶其夏去病與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道廣將四千騎先至騫將萬騎後胸奴左賢王將數萬騎圍廣廣與戰二日死者過半所殺亦過當騫至胸奴引兵去騫坐行留當斬贖為庶人而去病出北地遂深入合騎侯失道不相得去病至祁連山捕道虜甚多上曰票騎將軍涉鈞耆濟居延遂臻小月氏攻祁連山揚武乎鱳得得單于單桓酋塗王及相國都尉以衆降下者二千五百人可謂能舍服知成而止矣捷首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戶都尉六十三人師大率減什三益封去病五千四百戶賜校尉從至小月氏者爵左庶長鷹擊司馬破奴再從票騎將軍斬遫濮王捕稽且王右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人封破奴為從票侯校尉高不識從票騎將軍捕呼于耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為輝渠侯合騎侯敖坐行留不與票騎將軍會當斬贖為庶人諸宿將所將士馬兵亦不如去病去病所將常選然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絶也然而諸宿將常留落不耦由此去病日以親貴比大將軍其後單于怒渾邪王居西方數為漢所破亡數萬人以票騎之兵也欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先要道邊是時大行李息將城河上得渾邪王使即馳傳以聞上恐其以詐降而襲邊乃令去病將兵往迎之去病既度河與渾邪衆相望渾邪裨王將見漢軍而多欲不降者頗遁去去病乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆度河降者數萬人號稱十萬既至長安天子所以賞賜數十巨萬封渾邪王萬戶為漯陰侯封其裨王呼毒尼為下摩侯鷹疪為輝渠侯禽黎為河綦侯大當戶調雖為常樂侯於是上嘉去病之功曰票騎將軍去病率師征胸奴西域王渾邪王及厥衆萌咸奔於率以軍糧接食并將控弦萬有餘人誅獟悍捷首虜八千餘級降異國之王三十二戰士不離傷十萬之衆畢懷集服仍興之勞爰及河塞庶幾亡患以千七百戶益封票騎將軍減隴西北地上郡戍卒之半以寬天下繇役乃分處降者於邊五郡故塞外而皆在河南因其故俗為屬國其明年胸奴入右北平定襄殺略漢千餘人其明年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發卒其勢必得所欲是歲元狩四年也春上令大將軍青票騎將軍去病各五萬騎步兵轉者踵軍數十萬而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東乃更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍平陽侯襄為後將軍皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷胸奴可坐收虜耳乃悉遠北其輜重皆以精兵待幕北而適直青軍出塞千餘里見單于兵陳而待於是青令武剛車自環為營而縱五千騎往當胸奴胸奴亦縱萬騎會日且入而大風起沙礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚強戰而胸奴不利薄莫單于遂乘六裸壯騎可數百直冒漢圍西北馳去昏漢胸奴相紛拿殺傷大當漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之青因隨其後胸奴兵亦散走會明行二百餘里不得單于頗捕斬首虜萬餘級遂至填顏山趙信城得胸奴積粟食軍軍留一日而還悉燒其城餘粟以歸青之與單于會也而前將軍廣右將軍食其軍別從東道或失道大將軍引還過幕南乃相逢青欲使使歸報令長史簿責廣廣自殺食其贖為庶人青軍入塞凡斬首虜萬九千級是時胸奴衆失單于十餘日右谷蠡王自立為單于單于後得其衆右王乃去單于之號去病騎兵車重與大將軍軍等而亡裨將悉以李敢等為大校當裨將出代右北平二千餘里直左方兵所斬捕功已多於青既皆還上曰票騎將軍去病率師躬將所獲葷允之士約輕齎絶大幕涉獲單于章渠以誅北車耆轉擊左大將雙獲旗鼓歷度難侯濟弓盧獲屯頭王韓王等三人將軍相國當戶都尉八十三人封狼居胥山禪於姑衍登臨翰海執訊獲醜七萬有四百四十三級師率減什二取食於敵卓行殊遠而糧不絶以五千八百戶益封票騎將軍右北平太守路博德屬票騎將軍會興城不失期從至檮余山斬首捕虜二千八百級封博德為邳離侯北地都尉衛山從票騎將軍獲王封山為義陽侯故歸義侯因淳王復陸支樓剸王伊即靬皆從票騎將軍有功封復陸支為杜侯伊即靬為衆利侯從票侯破奴昌武侯安稽從票騎有功益封各三百戶漁陽太守解校尉敢皆獲鼓旗賜爵關內侯解食邑三百戶敢二百戶校尉自為爵左庶長軍吏卒為官賞賜甚多而青不得益封吏卒無封者唯西河太守常惠雲中太守遂成受賞遂成秩諸侯相賜食邑二百戶黃金百斤惠爵關內侯兩軍之出塞塞閲官及私馬凡十四萬匹而後入塞者不滿三萬匹乃置大司馬位大將軍票騎將軍皆為大司馬定令令票騎將軍秩祿與大將軍等自是後青日衰而去病日益貴青故人門下多去事去病輒得官爵唯獨任安不肯去去病為人少言不泄有氣敢往上嘗欲教之吳孫兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰胸奴不滅無以家為也由此上益重愛之然少而侍中貴不省士其從軍上為遣太官齎數十乘既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而去病尚穿域踏鞠也事多此類青仁喜士退讓以和柔自媚於上然於天下未有稱也去病自四年軍後三歲元狩六年薨上悼之發屬國玄甲軍陳自長安至茂陵為冢象祁連山諡之并武與廣地曰景桓侯子嬗嗣嬗字子侯上愛之幸其壯而將之為奉車都尉從封泰山而薨無子國除自去病死後青長子宜春侯伉坐法失侯後五歲伉弟二人陰安侯不疑發干侯登皆坐酎金失侯後二歲冠軍侯國絶後四年元封五年青薨諡曰烈侯子伉嗣六年坐法免自青圍單于後十四歲而卒竟不復擊胸奴者以漢馬少又方南誅兩越東伐朝鮮擊羌西南夷以故久不伐胡初青既尊貴而平陽侯曹壽有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是長公主風白皇后皇后言之上乃詔青尚平陽主與主合葬起冢象廬山云最大將軍青凡七出擊胸奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡再益封凡萬六千三百戶封三子為侯侯千三百戶并之二萬二百戶其裨將及校尉侯者九人為特將者十五人李廣張騫公孫賀李蔡曹襄韓説蘇建皆自有傳李息郁郅人也事景帝至武帝立八歲為材官將軍軍馬邑後六歲為將軍出代後三歲為將軍從大將軍出朔方皆無功凡三為將軍其後常為大行公孫敖義渠人以郎事景帝至武帝立十二歲為騎將軍出代亡卒七千人當斬贖為庶人後五歲以校尉從大將軍封合騎侯後一歲以中將軍從大將軍再出定襄無功後二歲以將軍出北地後票騎失期當斬贖為庶人後二歲以校尉從大將軍無功後十四歲以因杅將軍築受降城七歲復以因杅將軍再出擊胸奴至余吾亡士多下吏當斬詐死亡居民間五六歲後覺復繫坐妻為巫蠱族凡四為將軍李沮雲中人事景帝武帝立十七歲以左內史為強弩將軍後一歲復為強弩將軍張次公河東人以校尉從大將軍封岸頭侯其後太后崩為將軍軍北軍後一歲復從大將軍凡再為將軍後坐法失侯趙信以胸奴相國降為侯武帝立十八年為前將軍與胸奴戰敗降胸奴趙食其祋祤人武帝立十八年以主爵都尉從大將軍斬首六百六十級元狩三年賜爵關內侯黃金百斤明年為右將軍從大將軍出定襄迷失道當斬贖為庶人郭昌雲中人以校尉從大將軍元封四年以太中大夫為拔胡將軍屯朔方還擊昆明無功奪印荀彘太原廣武人以御見侍中用校尉數從大將軍元封三年為左將軍擊朝鮮無功坐捕樓船將軍誅最票騎將軍去病凡六出擊胸奴其四出以將軍斬首虜十一萬餘級渾邪王以衆降數萬開河西酒泉之地西方益少胡寇四益封凡萬七千七百戶其校尉吏有功侯者六人為將軍者二人路博德西河平州人以右北平太守從票騎將軍封邳離侯票騎死後博德以衛尉為伏波將軍伐破南越益封其後坐法失侯為強弩都尉屯居延卒趙破奴太原人嘗亡入胸奴已而歸漢為票騎將軍司馬出北地封從票侯坐酎金失侯後一歲為胸河將軍攻胡至胸河水無功後一歲擊虜樓蘭王後為浞野侯後六歲以浚稽將軍將二萬騎擊胸奴左王左王與戰兵八萬騎圍破奴破奴為虜所得遂沒其軍居胸奴中十歲復與其太子安國亡入漢後坐巫蠱族自衛氏興大將軍青首封其後支屬五人為侯凡二十四歲而五侯皆奪國征和中戾太子敗衛氏遂滅而霍去病弟光貴盛自有傳贊曰蘇建嘗説責大將軍至尊重而天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士票騎亦方此意為將如此
