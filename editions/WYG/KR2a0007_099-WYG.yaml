body:
  text: 前漢書卷九十九上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注王莽𫝊第六十九上王莽字巨君孝元皇后之弟子也元后父及兄弟皆以元成世封侯居位輔政家凡九侯五大司馬語在元后傳師古曰外戚𫝊言十侯此云九者以鳳本嗣禁為侯唯莽父曼蚤死不侯師古曰蚤古早字莽羣兄弟皆將軍五侯子乗時侈靡師古曰乗因也因貴盛之時以輿馬聲色佚遊相髙師古曰佚字與逸同莽獨孤貧因折節為恭儉受禮經師事沛郡陳參勤身博學被服如儒生師古曰被音皮義反事母及寡嫂養孤兄子行甚敕備師古曰敕整也又外交英俊内事諸父曲有禮意陽朔中世父大將軍鳳病師古曰謂伯父也以居長嫡而繼統也莽侍疾親甞藥亂首垢面不解衣帶連月鳳且死以託太后及帝拜為黄門郎遷射聲校尉久之叔父成都侯商上書願分户邑以封莽及長樂少府戴崇侍中金渉胡騎校尉箕閎上谷都尉陽並中郎陳湯皆當世名士咸為莽言上由是賢莽永始元年封莽為新都侯國南陽新野之都鄉千五百户遷騎都尉光祿大夫侍中宿衛謹敕爵位益尊節操愈謙􅄆輿馬衣裘振施賓客師古曰振舉也家無所餘收贍名士交結將相卿大夫甚衆故在位更推薦之師古曰更音工衡反游者為之談說虚譽隆洽傾其諸父矣敢為激發之行處之不慙恧師古曰激急動也恧愧也激音工歴反恧音女六反莽兄永為諸曺蚤死有子光莽使學博士門下莽休沐出振車騎師古曰振整也一曰振張起也奉羊酒勞遺其師恩施下竟同學師古曰竟周徧也諸生縱觀長老歎息光年小於莽子宇莽使同日内婦賔客滿堂須臾一人言太夫人苦某痛當飲某藥比客罷者數起焉師古曰比音必寐反數音所角反嘗私買侍婢昆弟或頗聞知莽因曰後將軍朱子元無子師古曰謂朱博莽聞此兒種宜子師古曰此兒謂所買婢也為買之即日以婢奉子元其匿情求名如此是時太后姊子淳于長以材能為九卿先進在莽右師古曰名位居其右在前也莽隂求其罪過因大司馬曲陽侯根白之長伏誅莽以獲忠直語在長𫝊根因乞骸骨薦莽自代上遂擢為大司馬是嵗綏和元年也年三十八矣莽既㧞出同列繼四父而輔政師古曰鳳商音根四人皆為大司馬而莽之諸父也欲令名譽過前人遂克已不倦聘諸賢良宋祁曰聘諸當作聘請以為掾史賞賜邑錢悉以享士愈為儉約母病公卿列侯遣夫人問疾莽妻迎之衣不曵地布蔽膝見之者以為僮使問知其夫人皆驚輔政嵗餘成帝崩哀帝即位尊皇太后為太皇太后太后詔莽就第避帝外家莽上疏乞骸骨哀帝遣尚書令詔莽曰先帝委政於君而棄羣臣朕得奉宗廟誠嘉與君同心合意今君移病求退師古曰移書言病也一曰以病而移居也以著朕之不能奉順先帝之意師古曰著明也朕甚悲傷焉已詔尚書待君奏事又遣丞相孔光大司空何武左將軍師丹衛尉𫝊喜白太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聽政太后復令莽視事時哀帝祖母定陶傅太后母丁姬在髙昌侯董宏上書言春秋之義母以子貴丁姬宜上尊號莽與師丹共劾宏誤朝不道語在丹傳後日未央宫置酒内者令為傅太后張幄坐於太皇太后坐旁師古曰坐並音材卧反莽案行責内者令曰定陶太后藩妾何以得與至尊並徹去更設坐傅太后聞之大怒不肯㑹重怨恚莽師古曰會謂至置酒所也重音直用反莽復乞骸骨哀帝賜莽黄金五百斤安車駟馬罷就第公卿大夫多稱之者上乃加㤙寵置使家中黄門蘇林曰使黄門在其家中為使令十日一賜餐下詔曰新都侯莽憂勞國家執義堅固朕庶㡬與為治太皇太后詔莽就第朕甚閔焉其以黄郵聚户三百五十益封莽服䖍曰黄郵在南陽􅁄陽縣宋祁曰郵說文曰郵境上行書舎也倉頡篇曰郵過書之官也廣雅曰驛也益封莽别本越本無莽字位特進給事中朝朔望見禮如三公師古曰見天子之禮也見音胡電反車駕乗綠車從師古曰綠車皇孫之車天子出行令莽乗之以從所以寵也後二嵗傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義抑貶尊號虧損孝道當伏顯戮幸䝉赦令不宜有爵土請免為庶人上曰以莽與太皇太后有屬勿免遣就國莽杜門自守其中子獲殺奴師古曰獲者莽子之名也今書本有作護字者流俗所改耳莽切責獲令自殺在國三嵗吏上書􅁈訟莽者以百數師古曰言其合管朝政不當就國也宋祁曰吏字下當有民字元夀元年日食賢良周護宋崇等對䇿深訟莽功徳上於是徴莽始莽就國南陽太守以莽貴重選門下掾宛孔休守新都相師古曰姓孔名休宛縣人休謁見莽莽盡禮自納休亦聞其名與相答後莽疾休候之莽縁恩意進其玉具寳劍欲以為好師古曰結歡好也音呼到反休不肯受莽因曰誠見君面有瘢師古曰瘢創痕也痕音下㤙反羙玉可以滅瘢欲獻其瑑耳宋祁曰耳字當刪即解其瑑服䖍曰瑑音衛蘇林曰劒鼻也師古曰瑑字本作璏從玉彘聲後轉寫者訛也瑑自雕瑑字耳音篆也休復辭讓莽曰君嫌其賈邪師古曰賈讀曰價言其所有價值也遂椎碎之師古曰椎音直追反其字從木自裹以進休休乃受及莽徴去欲見休休稱疾不見莽還京師嵗餘哀帝崩無子而傅太后丁太后皆先薨太皇太后即日駕之未央宫收取璽綬遣使者馳召莽詔尚書諸發兵符節百官奏事中黄門期門兵皆屬莽莽白大司馬髙安侯董賢年少不合衆心收印綬賢即日自殺太后詔公卿舉可大司馬者大司徒孔光大司空彭宣舉莽前將軍何武後將軍公孫祿互相舉太后拜莽為大司馬與議立嗣安陽侯王舜莽之從弟其人脩飭師古曰飭讀與敕同敕整也太后所信愛也莽白以舜為車騎將軍使迎中山王奉成帝後是為孝平皇帝帝年九嵗太后臨朝稱制委政於莽莽白趙氏前害皇子傅氏驕僭遂廢孝成趙皇后孝哀傅皇后皆令自殺語在外戚𫝊莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不說者師古曰說讀曰恱莽皆傅致其罪師古曰傅讀曰附附益而引致之令入罪為請奏令邯持與光光素畏慎不敢不上之莽白太后輙可其奏於是前將軍何武後將軍公孫禄坐互相舉免丁傅及董賢親屬皆免官爵徙逺方紅陽侯立太后親弟雖不居位莽以諸父内敬憚之畏立從容言太后令已不得肆意乃復令光奏立舊惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝師古曰妄稱譽之誤惑朝廷也後白以官婢楊寄私子為皇子衆言曰吕氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聽莽曰今漢家衰比世無嗣師古曰比頻也太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從師古曰力勉力今以私恩逆大臣議如此羣下傾邪亂從此起宜可且遣就國安後復徴召之師古曰安猶徐也太后不得已遣立就國莽之所以脅持上下皆此類也於是附順者㧞擢忤恨者誅滅王舜王邑為腹心甄豐甄邯主撃斷平晏領機事劉歆典文章孫建為爪牙豐子尋歆子棻師古曰棻或作􅀈字音扶云反涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言之師古曰外示凛厲之色而假為方直之言宋祁曰而言之當作而言方欲有所為微見風采師古曰見音胡電反黨與承其指意而顯奏之莽稽首涕泣固推讓焉上以惑太后下用示信於衆庶始風益州令塞外蠻夷獻白雉師古曰風讀曰諷下皆類此元始元年正月莽白太后下詔以白雉薦宗廟羣臣因奏言太后委任大司馬莽定䇿安宗廟故大司馬霍光有安宗廟之功益封三萬户疇其爵邑比蕭相國莽宜如光故事太后問公卿曰宋祁曰問字上當有召字誠以大司馬有大功當著之邪師古曰著眀也將以骨肉故欲異之也於是羣臣乃盛陳莽功徳致周成白雉之瑞千載同符聖王之法臣有大功則生有美號故周公及身在而託號於周莽有定國安漢家之大功宜賜號曰安漢公益户疇爵邑上應古制下準行事劉敞曰行事即已行之事以順天心太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定䇿今願獨條光等功賞寢置臣莽勿随輩列甄邯白太后下詔曰無偏無黨王道蕩蕩師古曰尚書洪範之言也蕩蕩廣平之貌也故引之屬有親者義不得阿君有安宗廟之功不可以骨肉故蔽隱不揚君其勿辭莽復上書讓太后詔謁者引莽待殿東廂莽稱疾不肯入太后使尚書令恂詔之曰君以選故而辭以疾師古曰選善也國家欲襃其善加號疇邑乃以疾辭君任重不可闕以時亟起師古曰亟急也音居力反莽遂固辭太后復使長信太僕閎承制召莽莽固稱疾左右白太后宜勿奪莽意但條孔光等莽乃肯起太后下詔曰太傅博山侯光宿衛四世世為傅相忠孝仁篤行義顯著建議定䇿益封萬户以光為太師與四輔之政師古曰與讀曰豫車騎將軍安陽侯舜積累仁孝使迎中山王折衝萬里功徳茂著益封萬户以舜為太保左將軍光禄勲豐宿衛三世忠信仁篤師古曰篤厚也使迎中山王輔導共養以安宗廟師古曰共音居用反養音弋亮反封豐為廣陽侯食邑五千户以豐為少傅皆授四輔之職疇其爵邑各賜第一區侍中奉車都尉邯宿衛勤勞建議定䇿封邯為承陽侯食邑二千四百户師古曰承音蒸四人既受賞莽尚未起羣臣復上言莽雖克讓朝所宜章以時加賞眀重元功無使百僚元元失望太后乃下詔曰大司馬新都侯莽三世為三公典周公之職建萬世䇿功徳為忠臣宗化流海内逺人慕義越裳氏重譯獻白雉宋祁曰熙寧監本越本無裳字其以召陵新息二縣户二萬八千益封莽復其後嗣疇其爵邑師古曰復音扶目反封功如蕭相國宋祁曰邵本云封加如蕭相國劉敞曰封字衍以莽為太傅幹四輔之事號曰安漢公以故蕭相國甲第為安漢公第定著於令𫝊之無窮於是莽為惶恐不得已而起受䇿䇿曰漢危無嗣而公定之四輔之職三公之任而公幹之羣僚衆位而公宰之功徳茂著宗廟以安蓋白雉之瑞周成象焉師古曰言莽致白雉之瑞有周公相成王之象故賜嘉號曰安漢公輔翼于帝期於致平師古曰致太平毋違朕意莽受太傅安漢公號讓還益封疇爵邑事云願須百姓家給然後加賞師古曰給足也家給家家給足羣公復爭太后詔曰公自期百姓家給是以聽之其令公奉舎人賞賜皆倍故師古曰奉所食之奉也舎人私府吏員也倍故數多於故各一倍也奉音扶用反百姓家給人足大司徒大司空以聞莽復讓不受而建言宜立諸侯王後及髙祖以来功臣子孫大者封侯或賜爵闗内侯食邑然後及諸在位各有第序上尊宗廟増加禮樂下恵士民鰥寡恩澤之政無所不施語在平紀莽既說衆意師古曰說讀曰悅又欲專斷知太后猒政乃風公卿師古曰風讀曰諷奏言往者吏以功次遷至二千石及州部所舉茂材異等吏率多不稱宜皆見安漢公又太后不宜親省小事令太后下詔曰皇帝幼年朕且統政比加元服師古曰比至平帝加元服以来太后且統政也比音必寐反宋祁曰元服下當有者字今衆事煩碎朕春秋髙精氣不堪殆非所以安躬體而育養皇帝者也故選忠賢立四輔羣下勸職永以康寧孔子曰巍巍乎舜禹之有天下而不與焉師古曰論語載孔子之言也巍巍髙貌也言舜禹之治天下委任賢臣以成其功而不身親其事也與讀曰豫自今以来惟封爵乃以聞他事安漢公四輔平决州牧二千石及茂材吏初除奏事者輙引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問致宻恩意厚加贈送其不合指顯奏免之權與人主侔矣莽欲以虚名說太后師古曰說讀曰悅白言親承前孝哀丁傅奢侈之後百姓未贍者多太后宜且衣繒練頗損膳以視天下師古曰繒練謂帛無文者視讀曰示莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉莽帥羣臣奏言陛下春秋尊久衣重練減御膳誠非所以輔精氣育皇帝安宗廟也臣莽數叩頭省戸下白爭未見許今幸賴陛下徳澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徴同時並至師古曰休美也徵證也臣莽等不勝大願願陛下愛精休神闊略思慮師古曰闊寛也略簡也遵帝王之常服復大官之法膳使臣子各得盡驩心備其養惟哀省察莽又令太后下詔曰蓋聞母后之義思不出乎門閾師古曰閾門橛也音域宋祁曰監本無門字國不䝉佑皇帝年在襁褓未任親政戰戰兢兢懼於宗廟之不安國家之大綱微朕孰當統之師古曰微無也是以孔子見南子周公居攝盖權時也師古曰南子衛靈公夫人孔子欲說靈公以治道故見南子也勤身極思憂勞未綏故國奢則視之以儉師古曰視讀曰示矯枉者過其正而朕不身帥將謂天下何夙夜夢想五榖豐孰百姓家給比皇帝加元服委政而授焉師古曰比音必寐反今誠未皇于輕靡而備味師古曰皇暇也靡細也庶㡬與百僚有成其勗之㢤師古曰朂勉也每有水旱莽輙素食師古曰素食即菜食也解在霍光𫝊左右以白太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰公勤於職以時食肉愛身為國莽念中國已平惟四夷未有異乃遣使者齎黄金幣帛重賂匈奴單于使上書言聞中國譏二名故名囊知牙斯今更名知慕從聖制又遣王昭君女須卜居次入侍所以誑耀媚事太后下至旁側長御方故萬端莽既尊重欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宮未建液廷媵未充師古曰液與掖同音古字通用乃者國家之難本從亡嗣配取不正請考論五經定取禮師古曰取皆讀曰娶正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女師古曰適讀曰嫡嫡妻所生女也事下有司上衆女名王氏女多在選中者莽恐其與己女爭即上言身亡徳子材下不宜與衆女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省戸下咸言明詔聖徳巍巍如彼安漢公盛勲堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生師古曰分音扶問反而上書者愈甚太后不得已聴公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以貳正統師古曰言皇后之位當在莽女也莽白願見女太后遣長樂少府宗正尚書令納采見女還奏言公女漸漬徳化有窈窕之容師古曰窈窕幽閑也宜承天序奉祭祀有詔遣大司徒大司空䇿告宗廟雜加卜筮皆曰兆遇金水王相卦遇父母得位孟康曰金水相生也張晏曰金王則水相也遇父母謂泰卦乾下坤上天下於地是配享之卦師古曰王音于放反劉攽曰予謂但言父母得位安知是泰卦乎所謂康強之占逢吉之符也信鄉侯佟上言師古曰王子侯表清河綱王子豹始封新鄉侯傳爵至曽孫佟王莽簒位賜姓王即謂此也而此傳作信鄉侯古者新信同音故耳佟音徒冬反春秋天子將娶於紀則襃紀子稱侯師古曰解在外戚恩澤侯表也安漢公國未稱古制師古曰稱副也音尺孕反其下亦同事下有司皆曰古者天子封后父百里尊而不臣以重宗廟孝之至也佟言應禮可許請以新野田二萬五千六百頃益封莽滿百里莽謝曰臣莽子女誠不足以配至尊復聴衆議益封臣莽伏自惟念得託肺腑獲爵土如使子女誠能奉稱聖徳臣莽國邑足以共朝貢師古曰共讀曰供不須復加益地之寵願歸所益太后許之有司奏故事聘皇后黄金二萬斤為錢二萬萬莽深辭讓受四千萬而以其三千三百萬予十一媵家羣臣復言今皇后受聘踰羣妾亡㡬師古曰亡㡬不多也亡讀曰無㡬音居豈反其下並同有詔復益二千三百萬合為三千萬莽復以其千萬分予九族貧者陳崇時為大司徒司直與張敞孫竦相善竦者博通士為崇草奏稱莽功徳師古曰草謂創立其文也崇奏之曰竊見安漢公自初束脩師古曰束脩謂初學官之時值世俗隆奢麗之時䝉兩宫厚骨肉之寵師古曰兩宫謂成帝及太后被諸父赫赫之光師古曰被音皮義反財饒埶足亡所牾意師古曰牾逆也無人能逆其意也牾音五故反然而折節行仁克心履禮拂世矯俗確然特立師古曰拂違也矯正也拂音弗惡衣惡食陋車駑馬妃匹無二閨門之内孝友之徳衆莫不聞清靜樂道温良下士師古曰下音胡嫁反恵于故舊篤于師友孔子曰未若貧而樂富而好禮師古曰論語子貢問曰貧而無諂富而無驕何如孔子曰可也未若貧而樂富而好禮者也公之謂矣及為侍中故定陵侯淳于長有大逆罪公不敢私建白誅討師古曰首言其事也周公誅管蔡季子鴆叔牙師古曰解並在前公之謂矣是以孝成皇帝命公大司馬委以國統孝哀即位髙昌侯董宏希指求美造作二統晉灼曰欲令丁姬為帝太后也公手劾之以定大綱建白定陶太后不宜在乗輿幄坐師古曰坐音才卧反以眀國體詩曰柔亦不茹剛亦不吐不侮鰥寡不畏彊圉師古曰大雅烝民之詩美仲山甫之徳茹食也強圉強梁圉扞也宋祁曰監本越本無不侮鰥寡四字公之謂矣深執謙退推誠讓位定陶太后欲立僭號憚彼面刺幄坐之義佞惑之雄朱博之疇懲此長宏手劾之事上下一心䜛賊交亂詭辟制度遂成簒號師古曰詭違也辟讀曰僻斥逐仁賢誅殘戚屬而公被胥原之訴逺去就國應劭曰胥原子胥屈原也師古曰逺去朝廷而就其侯國朝政崩壊綱紀廢弛危亡之禍不隧如髪師古曰弛解也音式爾反隧音直類反詩云人之云亡邦國殄顇師古曰大雅瞻仰之詩也殄盡也顇病也言為政不善賢人奔亡矣天下邦國盡困病也顇與悴同音才醉反公之謂矣當此之時宫亡儲主董賢據重加以傅氏有女之援師古曰謂哀帝傅皇后皆自知得罪天下結讐中山張晏曰傅太后譖中山馮太后陷以祝詛之罪則必同憂斷金相翼師古曰引易繫辭二人同心其利斷金翼助也藉假遺詔頻用賞誅先除所憚急引所附遂誣往􅁈更徴逺屬事埶張見其不難矣師古曰言哀帝既崩丁傅董賢欲稱遺詔樹立黨親共立幼主以據國權也逺屬國之宗室疎逺者也宋祁曰徴字當作懲其字下當有然字矣字當刪賴公立入即時退賢及其黨親當此之時公運獨見之明奮亡前之威師古曰無前謂無有敢當之者盱衡厲色振揚武怒孟康曰眉上曰衡盱衡舉眉揚目也師古曰盱音許于反乗其未堅厭其未發師古曰厭音一渉反震起機動敵人摧折雖有賁育不及持刺師古曰孟賁夏育皆古勇士也持刺謂持兵刃以刺雖有樗里不及回知師古曰樗里子名疾秦恵王之弟也為秦相時人號曰智嚢雖有鬼谷不及造次師古曰鬼谷先生蘇秦之師善談說是故董賢喪其魂魄遂自絞殺人不還踵日不移晷師古曰還讀曰旋晷景也言其速疾霍然四除更為寧朝非陛下莫引立公非公莫克此禍詩云惟師尚父時惟鷹揚亮彼武王師古曰大雅大明之詩也師尚父太公也亮助也言太公武毅若鷹之飛揚佐助武王以克殷也孔子曰敏則有功師古曰論語載孔子對子張之言也敏疾也言應事疾速乃能成功公之謂矣於是公乃白内故泗水相豐斄令邯師古曰甄豐甄邯也斄讀曰邰與大司徒光宋祁曰徒當作馬車騎將軍舜建定社稷奉節東迎皆以功徳受封益土為國名臣書曰知人則哲師古曰虞書咎繇謨之辭也哲智也公之謂也公卿咸歎公徳同盛公勲皆以周公為比師古曰比音必寐反宜賜號安漢公益封二縣公皆不受𫝊曰申包胥不受存楚之報晏平仲不受輔齊之封師古曰申包胥楚大夫也吳師入郢楚昭王出奔包胥如秦乞師秦出師以救楚昭王反國欲賞包胥辭曰吾為君也非為身也遂不受晏平仲齊大夫晏嬰也以道佐齊景公景公欲封之讓而不受孔子曰能以禮讓為國乎何有師古曰論語載孔子之言也解在董仲舒𫝊公之謂也將為皇帝定立妃后有司上名公女為首公深辭讓廹不得已然後受詔父子之親天性自然欲其榮貴甚於為身皇后之尊侔於天子當時之㑹千載希有然而公惟國家之統揖大福之恩師古曰揖謂讓而不當也事事謙退動而固辭書曰舜讓于徳不嗣書曰虞書舜典之辭言舜自讓徳薄不足以繼帝堯之事也公之謂矣自公受䇿以至于今斖斖翼翼日新其徳師古曰斖斖勉也翼翼敬也斖音武匪反増脩雅素以命下國儉隆約以矯世俗師古曰退也矯正也音千旬反其字從彳割財損家以帥羣下彌躬執平以逮公卿師古曰彌讀與弭同教子尊學以隆國化僮奴衣布馬不秣榖食飲之用不過凡庶詩云溫溫恭人如集于木師古曰小雅小宛之詩温温柔貌也如集于木恐堕墜耳孔子曰食無求飽居無求安師古曰論語載孔子之言也謂君子好學樂道故志不在安飽公之謂矣克身自約糴食逮給師古曰纔得粗及僅足而已物物卬市日闋亡儲師古曰物物卬市言其衣食所須皆買之於市不自營作而不奪工商利也闋盡也日闋言當日即盡不蓄積也卬音牛向反闋音空穴反又上書歸孝哀皇帝所益封邑入金錢獻田殫盡舊業為衆倡始師古曰倡音尺尚反於是小大鄉和承風從化師古曰鄉讀曰嚮外則王公列侯内則帷幄侍御翕然同時各竭所有或入金錢或獻田畝以振貧窮收贍不足者昔令尹子文朝不及夕魯公儀子不茹園葵張晏曰令尹子文自毁其家以紓楚國之難仕而逃祿朝不及夕也師古曰子文楚令尹鬭榖於菟也公儀子魯國相公儀休也㧞其園葵不奪園夫之利食菜曰茹音人諸反公之謂矣開門延士下及白屋師古曰白屋謂庶人以白茅覆屋者也婁省朝政師古曰婁古屢字綜管衆治親見牧守以下考迹雅素審知白黒詩云夙夜匪解以事一人師古曰大雅烝民之詩也一人天子也解讀曰懈易曰終日乾乾夕惕若厲師古曰乾卦九三爻辭也乾乾自彊之意惕懼也厲病也公之謂矣比三世為三公再奉送大行師古曰比頻也秉冢宰職填安國家師古曰填音竹刃反四海輻湊靡不得所書曰納于大麓烈風雷雨不迷師古曰虞書舜典叙舜之徳麓録也言堯使舜大錄萬機之政一曰山足曰麓言舜有聖徳雖遇雷風不迷惑也公之謂矣此皆上世之所鮮師古曰鮮音先踐反禹稷之所難而公包其終始一以貫之師古曰論語稱孔子謂曽子曰參乎吾道一以貫之謂忠恕可謂備矣是以三年之間化行如神嘉瑞疉累豈非陛下知人之效得賢之致哉故非獨君之受命也臣之生亦不虚矣是以伯禹錫元圭周公受郊祀師古曰尚書禹貢云禹錫元圭吿厥成功言賞治水功成也禮記明堂位曰成王幼弱周公踐天子之位以治天下七年乃致政於成王成王以周公為有勲勞於天下封周公於曲阜地方七百里革車千乗命魯公世世祀周公以天子禮樂是以魯君孟春乗大輅旂十有二旒日月之章祀帝於郊配以后稷天子之禮也蓋以達天之使不敢擅天之功也師古曰言天降賢材以助王者王者當申逹其用而不敢自専揆公徳行為天下紀師古曰揆度也紀理也觀公功勲為萬世基基成而賞不配紀立而襃不副師古曰配對也誠非所以厚國家順天心也髙皇帝襃賞元功相國蕭何邑户既倍又䝉殊禮奏事不名入殿不趨封其親屬十有餘人樂善無厭班賞亡遴師古曰遴與􅈔同茍有一䇿即必爵之是故公孫戎位在充郎選繇旄頭壹眀樊噲封二千户孟康曰公孫戎奴也髙帝時為旄頭郎晉灼曰楚漢春秋上東圍項羽聞樊噲反旄頭公孫戎明之卒不反封戎二千户師古曰此公孫戎耳非戎奴也戎奴自武帝時人孟說誤矣繇讀與由同孝文皇帝襃賞絳侯益封萬户賜黄金五千斤孝武皇帝䘏録軍功裂三萬户以封衛青青子三人或在襁褓皆為通侯孝宣皇帝顯著霍光増戸命疇封者三人延及兄孫夫絳侯即因漢藩之固杖朱虚之鯁依諸將之遞據相扶之埶其事雖醜要不能遂李竒曰言勃之功不遂而霍光據席常任也晉灼曰醜衆也言勃欲誅諸吕其事雖衆要不能以吕后在時而遂意也師古曰二說皆非也遞繞也謂相圍繞也言絳侯之時漢家外有藩屏盤石之固内有朱虚骨鯁之強諸将同心圍繞扶翼吕氏之黨雖欲作亂心懐醜惡事必不成言勃之功不足多也遞音滯霍光即席常任之重乗大媵之威未嘗遭時不行陷假離朝服䖍曰言光未嘗陷假不遇而離去朝也莽嘗退就國是陷假也師古曰假升也陷假者被陷害而去所升之位也韋昭曰陷隧也假音下下猶瘕也朝之執事無非同類割斷歴久統政曠世雖曰有功所因亦易然猶有計䇿不審過徴之累師古曰光誤徴昌邑王不得其人也累音力瑞反及至青戎摽末之功服䖍曰摽音刀末之摽謂衛青公孫戎也師古曰摽音匹遥反宋祁曰予案字林摽刀削末銅也音匹么反一言之勞然猶皆䝉邱山之賞課功絳霍造之與因也比於青戎地之與天也而公又有宰治之效乃當上與伯禹周公等盛齊隆兼其襃賞豈特與若云者同日而論哉師古曰若云謂若向者所云絳霍青戎也然曽不得䝉青等之厚臣誠惑之臣聞功亡原者賞不限徳亡首者襃不檢師古曰無原謂不可測其本原也無首謂無出其上者也檢局也是故成王之於周公也度百里之限師古曰度亦踰越也越九錫之檢開七百里之宇師古曰解並見前兼商奄之民師古曰商奄二國名賜以附庸殷民六族師古曰謂條氏徐氏蕭氏索氏長勺氏尾勺氏也大路大旂師古曰解巳見前封父之繁弱夏后之璜師古曰封父古諸侯也繁弱大弓名也半璧曰璜父讀曰甫祝宗卜史師古曰太祝太宗太卜太史凡四官備物典䇿師古曰既有備物而加之䇿書也一曰典䇿春秋之制也官司彞器師古曰官司百官也彛器常用之器也一曰彞祭宗廟酒器也周禮有六彞彞法也言器有所法象之貌耳白牡之牲師古曰眀堂位曰季夏六月以禘禮祀周公於太廟牲用白牡郊望之禮師古曰郊即祀上帝于郊也望謂望山川而祭之也王曰叔父建爾元子師古曰魯頌閟宫之詩曰王曰叔父建爾元子俾侯于魯謂命周公以封伯禽而為魯公也子父俱延拜而受之師古曰謂周公拜前魯公拜後可謂不檢亡原者矣非特止此六子皆封師古曰周公六子伯禽之弟也詩曰亡言不讐亡徳不報師古曰大雅抑之詩也讐用也有善言則用之有徳者必報之一曰讐對也賞當其言也報當如之不如非報也服䖍曰報賞當如其徳不如徳者非報也近觀行事髙祖之約非劉氏不王然而番君得王長沙下詔稱忠定著於令師古曰謂吳芮也解在芮傳番音蒲河反眀有大信不拘於制也春秋晉悼公用魏絳之䇿諸夏服從鄭伯獻樂悼公於是以半賜之絳深辭讓晉侯曰微子寡人不能濟河夫賞國之典不可廢也子其受之魏絳於是有金石之樂春秋善之師古曰事見左傳襄十一年㣲無也取其臣竭忠以辭功君知臣以遂賞也今陛下既知公有周公功徳不行成王之襃賞宋祁曰徳字下當有而字遂聴公之固辭不顧春秋之眀義則民臣何稱萬世何述誠非所以為國也臣愚以為宜恢公國令如周公師古曰恢大也建立公子令如伯禽所賜之品亦皆如之諸子之封皆如六子即羣下較然輸忠黎庶昭然感徳師古曰較明貌也宋祁曰輸浙本作諭下文輸同臣誠輸忠民誠感徳則於王事何有師古曰言臻其極無闕遺唯陛下深惟祖宗之重敬畏上天之戒儀刑虞周之盛師古曰儀刑謂則而象之敕盡伯禽之賜無遴周公之報師古曰敕備也遴與􅈔同令天法有設後世有祖師古曰祖始也以此為法之始天下幸甚太后以視羣公師古曰視讀曰示羣公方議其事㑹吕寛事起初莽欲擅權白太后前哀帝立背恩義自貴外家丁傅撓亂國家幾危社稷師古曰撓擾也音女髙反㡬音巨依反今帝以幼年復奉大宗為成帝後宜眀一統之義以戒前事為後代法於是遣甄豐奉璽綬即拜帝母衛姬為中山孝王后賜帝舅衛寳寳弟𤣥爵闗内侯皆留中山不得至京師莽子宇非莽隔絶衛氏恐帝長大後見怨宇即私遣人與寳等通書教令帝母上書求入語在衛后𫝊莽不聴宇與師吳章及婦兄吕寛議其故章以為莽不可諫而好鬼神可為變怪以驚懼之章因推類説令歸政於衛氏宇即使寛夜持血灑莽第門吏發覺之莽執宇送獄飲藥死宇妻焉懐子師古曰焉其名繫獄須産子已殺之師古曰須待也莽奏言宇為吕寛等所詿誤流言惑衆惡與管蔡同罪宋祁曰越本邵本無惡字臣不敢隱其誅甄邯等白太后下詔曰夫唐堯有丹朱周文王有管蔡此皆上聖亡奈下愚子何以其性不可移也公居周公之位輔成王之主而行管蔡之誅不以親親害尊尊朕甚嘉之昔周公誅四國之後大化乃成至於刑錯師古曰四國謂三監及淮夷耳公其専意翼國期於致平師古曰翼助也莽因是誅滅衛氏窮治吕寛之獄連引郡國豪桀素非議己者内及敬武公主師古曰元帝女弟也梁王立紅陽侯立平阿侯仁使者廹守皆自殺死者以百數海内震焉大司馬護軍襃奏言安漢公􅇜子宇陷於管蔡之辜子愛至深為帝室故不敢顧私惟宇遭辠喟然憤發作書八篇以戒子孫宜班郡國令學官以教授事下羣公請令天下吏能誦公戒者以著官簿比孝經師古曰著官簿言用之得選舉也四年春郊祀髙祖以配天宗祀孝文皇帝以配上帝四月丁未莽女立為皇后大赦天下遣大司徒司直陳崇等八人分行天下師古曰行音下更反覽觀風俗太保舜等奏言春秋列功徳之義太上有立徳其次有立功其次有立言唯至徳大賢然後能之其在人臣則生有大賞終為宗臣殷之伊尹周之周公是也及民上書者八千餘人咸曰伊尹為阿衡周公為太宰周公享七子之封有過上公之賞宜如陳崇言章下有司有司請還前所益二縣及黄郵聚新野田采伊尹周公稱號加公為宰衡位上公據史秩六百石三公言事稱敢言之羣吏毋得與公同名出從期門二十人羽林三十人前後大車十乗賜公太夫人號曰功顯君食邑二千户黄金印赤韍師古曰韍印之組也封公子男二人安為襃新侯臨為賞都侯加后聘三千七百萬合為一萬萬以明大禮太后臨前殿親封拜安漢公拜前二子拜後如周公故事莽稽首辭讓出奏封事願獨受母號還安臨印韍及號位户邑事下太師光等皆曰賞未足以直功師古曰直當也謙約退讓公之常節終不可聴莽求見固讓太后下詔曰公每見叩頭流涕固辭今移病固當聴其讓令眡事邪師古曰眡古視字將當遂行其賞遣歸就第也光等曰安臨親受印韍䇿號通天其義昭昭黄郵召陵新野之田為入尤多師古曰召讀曰邵皆止於公公欲自損以成國化宜可聴許治平之化當以時成宰衡之官不可世及納徴錢乃以尊皇后非為公也功顯君戸止身不𫝊襃新賞都兩國合三千户甚少矣忠臣之節亦宜自屈而信主上之義師古曰信讀曰申宜遣大司徒大司空持節承制詔公亟入眡事師古曰亟急也音居力反詔尚書勿復受公之讓奏奏可莽乃起眡事上書言臣以元夀二年六月戊午倉卒之夜以新都侯引入未央宫庚申拜為大司馬充三公位元始元年正月丙辰拜為太傅賜號安漢公備四輔官今年四月甲子復拜為宰衡位上公臣莽伏自惟爵為新都侯號為安漢公官為宰衡太傅大司馬爵貴號尊官重一身䝉大寵者五誠非鄙臣所能堪據元始三年天下嵗已復官屬宜皆置如淳曰前時饑省官職今豐宜復之也師古曰復音扶目反榖梁𫝊曰天子之宰通于四海師古曰宰治也治衆事者謂大臣也臣愚以為宰衡官以正百僚平海内為職而無印信名實不副臣莽無兼官之材今聖朝既過誤而用之臣請御史刻宰衡印章曰宰衡太傅大司馬印成授臣莽上太傅與大司馬之印太后詔曰可韍如相國師古曰韍亦謂組也朕親臨授焉莽乃復以所益納徴錢千萬遺與長樂長御奉共養者師古曰太后之長御也共音居用反養音弋亮反太保舜奏言天下聞公不受千乗之土辭萬金之幣散財施予千萬數莫不鄉化師古曰鄉讀曰嚮蜀郡男子路建等輟訟慙怍而退雖文王卻虞芮何以加師古曰卻退也虞芮二國名也並在河之東二國之君相與爭田久而不平聞文王之德乃往斷焉入周之境則耕者讓畔行者讓路乃相謂曰我小人也不可以履君子之庭遂相讓以其所爭為閑田而退宜報吿天下奏可宰衡出從大車前後各十乗直事尚書郎侍御史謁者中黄門期門羽林師古曰自此以上皆從宰衡出宰衡常持節所止謁者代持之師古曰相代而持也宰衡掾史秩六百石三公稱敢言之劉攽曰宰衡以下前已有其事此復重出當刪並從上是嵗莽奏起明堂辟雍靈臺為學者築舎萬區作市常滿倉制度甚盛立樂經益博士員經各五人徴天下通一蓺教授十一人以上及有逸禮古書毛詩周官爾雅天文圗讖鍾律月令兵法史篇文字孟康曰史籀所作十五篇古文書也師古曰周宣王太史史籀所作大篆書也籀音直救反通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記說廷中將令正乖繆壹異說云羣臣奏言昔周公奉繼體之嗣據上公之尊然猶七年制度乃定夫明堂辟雍堕廢千載莫能興師古曰堕毁也音火規反今安漢公起於第家輔翼陛下四年于兹功徳爛然師古曰爛然章明之貌公以八月載生魄庚子師古曰載始也魄月魄也奉使朝用書孟康曰賦功􅃥之書臨賦營築越若翊辛丑師古曰翊明也辛丑者庚子之明日也越發語辭也諸生庶民大和㑹十萬衆並集平作二旬大功畢成師古曰平作謂不促遽也平字或作丕丕亦大也唐虞發舉成周造業誠亡以加宰衡位宜在諸侯王上賜以束帛加璧大國乗車安車各一服䖍曰大國乗車如大國王之乗車也驪馬二駟師古曰驪馬併駕也詔曰可其議九錫之法冬大風吹長安城東門屋瓦且盡五年正月祫祭眀堂諸侯王二十八人列侯百二十人宗室子九百餘人徴助祭宋祁曰淳化本祭字下有祀字禮畢封孝宣曽孫信等三十六人為列侯餘皆益户賜爵金帛之賞各有數是時吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞於安漢公師古曰亟急也於是莽上書曰臣以外屬越次備位未能奉稱師古曰稱音尺證反伏念聖徳純茂承天當古制禮以治民作樂以移風四海奔走百蠻並轃師古曰轃即臻字也辭去之日莫不隕涕非有欵誠豈可虚致自諸侯王以下至于吏民咸知臣莽上與陛下有葭莩之故師古曰葭蘆也莩者其筩裏白皮也言其輕薄而附著也故以為喻葭音加莩音孚又得典職每歸功列徳者輙以臣莽為餘言臣見諸侯面言事於前者未甞不流汗而慙愧也雖性愚鄙至誠自知徳薄位尊力少任大夙夜悼栗常恐汚辱聖朝今天下治平風俗齊同百蠻率服皆陛下聖徳所自躬親太師光太保舜等輔政佐治羣卿大夫莫不忠良故能以五年之間至致此焉臣莽實無竒䇿異謀奉承太后聖詔宣之于下不能得什一受羣賢之籌畫而上以聞不能得什伍師古曰言皆不曉又遺忘也當被無益之辜所以敢且保首領須㬰者誠上休陛下餘光而下依羣公之故也師古曰休庇廕也宋祁曰晉灼音義作艸下休陛下不忍衆言輙下其章於議者臣莽前欲立奏止恐其遂不肯止今大禮己行助祭者畢辭不勝至願願諸章下議者皆寢勿上使臣莽得盡力畢制禮作樂事事成以𫝊示天下與海内平之即有所間非則臣莽當被詿上誤朝之罪師古曰間音居莧反如無他譴得全命賜骸骨歸家避賢者路是臣之私願也惟陛下哀憐財幸師古曰財與裁同甄邯等白太后詔曰可惟公功徳光于天下是以諸侯王公列侯宗室諸生吏民翕然同辭連守闕庭故下其章諸侯宗室辭去之日復見前重陳師古曰重音直用反宋祁曰復見前重陳當依越本作復重見前陳雖曉喻罷遣猶不肯去告以孟夏將行厥賞莫不驩悅稱萬嵗而退今公毎見輙流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聴公制作畢成羣公以聞究于前議師古曰究竟也其九錫禮儀亟奏師古曰亟急也於是公卿大夫博士議郎列侯富平侯張純等宋祁曰越本無富平侯三字九百二人皆曰聖帝明王招賢勸能徳盛者位髙功大者賞厚故宗臣有九命上公之尊則有九錫登等之寵張晏曰宗臣有勲勞為上公國所宗者也周禮上公九命九命九錫也師古曰登等謂升於常等也今九族親睦百姓既章萬國和協黎民時雍師古曰章明也時是也雍亦和也此已上皆取堯典叙堯徳之言也聖瑞畢溱太平已洽師古曰溱與臻同帝者之盛莫隆於唐虞而陛下任之忠臣茂功莫著於伊周而宰衡配之所謂異時而興如合符者也謹以六蓺通義經文所見周官禮記宜於今者為九命之錫師古曰禮含文嘉云九錫者車馬衣服樂懸朱户納陛武賁鈇鉞弓矢秬鬯也臣請命錫奏可䇿曰惟元始五年五月庚寅太皇太后臨于前殿延登親詔之曰公進虚聴朕言師古曰進前虚已而聴也前公宿衛孝成皇帝十有六年納䇿盡忠白誅故定陵侯淳于長以彌亂發姦師古曰彌讀曰弭止也登大司馬職在内輔孝哀皇帝即位驕妾窺欲姦臣萌動公手劾髙昌侯董宏改正故定陶共王母之僭坐自是之後朝臣論議靡不據經以病辭位歸于第家為賊臣所陷就國之後孝哀皇帝覺寤復還公長安臨病加劇猶不忘公復特進位是夜倉卒國無儲主姦臣充朝危殆甚矣朕惟定國之計莫宜於公引納于朝即日罷退髙安侯董賢轉漏之間忠䇿輙建綱紀咸張綏和元夀再􅇜大行萬事畢舉禍亂不作輔朕五年人倫之本正天地之位定張晏曰定冠婚之儀徙南北之郊也欽承神祇經緯四時復千載之廢矯百世之失張晏曰封先代之後立古文經定迭毀之禮也天下和㑹大衆方輯師古曰輯與集同詩之靈臺書之作雒鎬京之制商邑之度於今復興師古曰靈臺所以觀氣象者也文王受命作邑于豐始立此臺兆庶自勸就其功作故大雅靈臺之詩曰經始靈臺經之營之庶人攻之不日成之作雒謂周公營洛邑以為王都所謂成周也周書洛誥曰召公既相宅周公往營成周使来吿卜作洛誥豐鎬相近故總曰鎬京成周既成遷殷頑民使居之故云商邑之度也昭章先帝之元功眀著祖宗之令徳推顯嚴父配天之義修立郊禘宗祀之禮以光大孝是以四海雍雍萬國慕義蠻夷殊俗不召自至漸化端冕奉珍助祭師古曰蠻夷漸染朝化而正衣冠奉其國珍来助祭尋舊本道遵術重古動而有成事得厥中至徳要道通於神明祖考嘉享光耀顯章天符仍臻元氣大同麟鳳龜龍衆祥之瑞七百有餘遂制禮作樂有綏靖宗廟社稷之大勲普天之下惟公是賴官在宰衡位為上公今加九命之錫其以助祭共文武之職師古曰共讀曰供乃遂及厥祖師古曰榮寵之命上延其先祖也於戲豈不休哉師古曰於戲讀曰嗚呼休羙也於是莽稽首再拜受緑韍衮冕衣裳師古曰此韍謂蔽膝也或謂韍韠韍音弗韠音畢瑒琫瑒珌孟康曰瑒玉名也佩刀之飾上曰琫下曰珌詩云韠琫有珌是也師古曰瑒音蕩琫音布孔反珌音必劉攽曰瑒字宜從昜宋祁同句履孟康曰今齊祀履舄頭飾也出履二寸師古曰其形岐頭句音巨俱反宋祁曰韋昭曰句履頭飾形如刀鼻音劬禮記作絇亦是鸞路乗馬師古曰鸞路路車之施鸞者也解在禮樂志四馬曰乗音食證反下亦同龍旂九旒皮弁素積師古曰素積素裳也戎路乗馬師古曰戎路戎車也彤弓矢盧弓矢師古曰彤赤色盧黒色左建朱鉞右建金戚師古曰鉞戚皆斧屬甲胄一具師古曰胄兠鍪秬鬯二卣師古曰秬鬯香酒也卣中樽也音攸又羊九反宋祁曰字書曰秬黒黍一稃二米也圭瓚二師古曰以圭為勺末九命青玉珪二師古曰青者春色東方生而長育萬物也朱户納陛孟康曰納内也謂鑿殿基際為陛不使露也師古曰孟說是也尊者不欲露而升陛故内之於霤下也諸家之釋文句雖煩義皆不了故無取云署宗官祝官卜官史官虎賁三百人家令丞各一人宗祝卜史官皆置嗇夫佐安漢公在中府外第虎賁為門衛當出入者傅籍師古曰傅猶著也音附自四輔三公有事府第皆用𫝊孟康曰𫝊苻也師古曰音張戀反韋昭曰𫝊二封啟也以楚王邸為安漢公第大繕治通周衛祖禰廟及寢皆為朱户納陛陳崇又奏安漢公祠祖禰出城門城門校尉宜將騎士從入有門衛出有騎士所以重國也奏可其秋莽以皇后有子孫瑞通子午道張晏曰時年十四始有婦人之道也子水午火也水以天一為牡火以地二為牝故火為水妃今通子午以協之子午道從杜陵直絶南山徑漢中師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城直南山有谷通梁漢道名子午谷又宜州西界慶州東界有山名子午嶺計南北直相當此則北山者是子南山者是午共為子午道劉奉世曰史文以從杜陵徑漢中為子午道耳顔之所見非史意也風俗使者八人還言天下風俗齊同詐為郡國造歌謡頌功徳凡三萬言莽奏定著令又奏為市無二賈師古曰言純質也賈音價官無獄訟邑無盜賊野無饑民道不拾遺男女異路之制犯者象刑師古曰象刑解在武紀及刑法志劉歆陳崇等十二人皆以治明堂宣教化封為列侯莽既致太平北化匈奴東致海外南懐黄支唯西方未有加廼遣中郎將平憲等多持金幣誘塞外𦍑使獻地願内屬憲等奏言𦍑豪良願等種人口可萬二千人願為内臣獻鮮水海􅁢谷鹽池平地美草皆予漢民自居險阻處為藩蔽問良願降意對曰太皇太后聖明安漢公至仁天下太平五榖成熟或禾長丈餘或一粟三米或不種自生或蠒不􅁞自成甘露從天下醴泉自地出鳳皇來儀神爵降集從四嵗以来𦍑人無所疾苦故思樂内屬宜以時處業置屬國領護事下莽莽復奏曰太后秉統數年恩澤洋溢和氣四塞絶域殊俗靡不慕義越裳氏重譯獻白雉黄支自三萬里貢生犀東夷王度大海奉國珍匈奴單于順制作去二名今西域良願等復舉地為臣妾昔唐堯横被四表亦亡以加之今謹案已有東海南海北海郡未有西海郡請受良願等所獻地為西海郡臣又聞聖王序天文定地理因山川民俗以制州界漢家地廣二帝三王服䖍曰唐虞及周要服之内方七千里夏殷方三千里漢地南北萬三千里也凡十二州州名及界多不應經堯典十有二州後定為九州漢家廓地遼逺州牧行部逺者三萬餘里不可為九謹以經義正十二州名分界以應正始奏可又増法五十條犯者徙之西海徙者以千萬數民始怨矣泉陵侯劉慶上書師古曰王子侯年表衆陵節侯賢長沙定王子本始四年戴侯真定嗣二十二年薨黄龍元年頃侯慶嗣此則是也此傳及翟義傳並云泉陵地理志泉陵屬零陵郡而表作衆陵表為誤也言周成王幼少稱孺子周公居攝今帝富於春秋宜令安漢公行天子事如周公羣臣皆曰宜如慶言冬熒惑入月中平帝疾莽作䇿請命於泰畤戴璧秉圭願以身代蔵䇿金縢置于前殿敕諸公勿敢言師古曰詐依周公為武王請命作金縢也十二月平帝崩大赦天下莽徴明禮者宗伯鳳等與定天下吏六百石以上皆服䘮三年奏尊孝成廟曰統宗孝平廟曰元宗時元帝世絶而宣帝曽孫有見王五人師古曰王之見在者列侯廣戚侯顯等四十八人莽惡其長大曰兄弟不得相為後廼選𤣥孫中最幼廣戚侯子嬰年二嵗託以為卜相最吉是月前煇光謝囂奏武功長孟通浚井得白石師古曰浚抒治之也囂音許驕反浚音峻抒音直吕反上圓下方有丹書著石師古曰著音直略反文曰告安漢公莽為皇帝符命之起自此始矣莽使羣公以白太后太后曰此誣㒺天下不可施行太保舜謂太后事已如此無可奈何沮之力不能止師古曰沮壊也音才汝反又莽非敢有它但欲居攝以重其權填服天下耳師古曰填音竹刃反太后聴許舜等即共令太后下詔曰蓋聞天生衆民不能相治為之立君以統理之君年幼稚必有寄託而居攝焉然後能奉天施而成地化羣生茂育書不云乎天工人其代之師古曰虞書咎繇謨之辭也言人代天以理治工事也朕以孝平皇帝幼年且統國政㡬加元服委政而屬之師古曰屬付也幾音曰兾屬音之欲反今短命而崩嗚呼哀哉已使有司徴孝宣皇帝元孫二十三人差度宜者以嗣孝平皇帝之後師古曰差度謂擇也度音大各反𤣥孫年在繈褓不得至徳君子孰能安之安漢公莽輔政三世比􅇜際㑹安光漢室師古曰比頻也遂同殊風至于制作與周公異世同符今前煇光囂武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也夫有法成易非聖人者亡法其令安漢公居攝踐阼如周公故事以武功縣為安漢公采地師古曰采官也以官受地故謂之采名曰漢光邑具禮儀奏於是羣臣奏言太后聖徳昭然深見天意詔令安漢公居攝臣聞周成王幼少周道未成成王不能共事天地修文武之烈師古曰共讀曰恭烈業也周公權而居攝則周道成王室安不居攝則恐周隊失天命師古曰隊音直類反書曰我嗣事子孫大不克共上下遏失前人光在家不知命不易天應棐諶乃亡隊命師古曰周書君奭之篇也邵公為保周公為師相成王為左右邵公不說周公作君奭以告之奭召公名也尊而呼之故曰君也言我恐後嗣子孫大不能恭承天地絶失先王光大之道不知受命之難天所應輔唯在有誠所以亡失其命也共音恭棐音匪説曰師古曰謂説經義也周公服天子之冕南面而朝羣臣發號施令常稱王命召公賢人不知聖人之意故不説也師古曰召讀曰邵說讀曰悅次下並同禮明堂記曰周公朝諸侯於明堂天子負斧依南面而立師古曰依讀曰扆此下亦同謂周公踐天子位六年朝諸侯制禮作樂而天下大服也召公不說時武王崩縗麤未除師古曰縗音千回反由是言之周公始攝則居天子之位非乃六年而踐阼也書􅇣嘉禾篇曰周公奉鬯立于阼階延登贊曰假王莅政勤和天下此周公攝政贊者所稱師古曰贊謂祭祀之辭也成王加元服周公則致政書曰朕復子明辟師古曰周書洛誥載周公吿成王之辭言我復還明君之政於子也復音扶目反周公常稱王命専行不報故言我復子明君也臣請安漢公居攝踐阼服天子韍冕師古曰此韍亦謂裳韍也背斧依于户牖之間南面朝羣臣聴政事車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭羣神贊曰假皇帝師古曰贊謂祭祝之辭也共音恭民臣謂之攝皇帝自稱曰予平決朝事常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義隆治平之化師古曰遂成也其朝見太皇太后帝皇后皆復臣節自施政教於其宫家國采如諸侯禮儀故事臣昧死請太后詔曰可明年改元曰居攝居攝元年正月莽祀上帝於南郊迎春於東郊行大射禮于明堂養三老五更成禮而去師古曰更音工衡反置柱下五史秩如御史聴政事侍旁記疏言行三月己丑立宣帝元孫嬰為皇太子號曰孺子以王舜為太傅左輔甄豐為太阿右拂師古曰拂讀曰弼甄邯為太保後丞又置四少秩皆二千石四月安衆侯劉崇與相張紹謀曰師古曰安衆康侯月長沙定王子崇即月之元孫子也見王子侯表安漢公莽専制朝政必危劉氏天下非之者乃莫敢先舉此宗室恥也吾帥宗族為先海内必和紹等從者百餘人遂進攻宛不得入而敗紹者張竦之從兄也竦與崇族父劉嘉詣闕自歸莽赦弗罪竦因為嘉作奏曰建平元夀之間大統幾絶宗室幾棄師古曰幾音巨依反賴䝉陛下聖徳扶服振救師古曰陛下謂莽也服音蒲北反遮扞匡衛國命復延宗室明目臨朝統政發號施令動以宗室為始登用九族為先並録支親建立王侯南面之孤計以百數收復絶屬存亡續廢師古曰復音扶目反得比肩首復為人者嬪然成行師古曰嬪然多貌也行列也嬪音匹人反行音下郎反所以藩漢國輔漢宗也建辟雍立明堂班天法流聖化朝羣后昭文徳宗室諸侯咸益土地天下喁喁引領而歎師古曰喁喁衆口向上也音顒頌聲洋洋滿耳而入師古曰論語載孔子曰師摯之始闗雎之亂洋洋乎盈耳哉故竦引之也洋音羊又音翔國家所以服此美膺此名饗此福受此榮者豈非太皇太后日吳之思陛下夕惕之念哉何謂師古曰先為設問復陳其事也亂則統其理危則致其安禍則引其福絶則繼其統幼則代其任晨夜屑屑寒暑勤勤師古曰屑屑猶切切動作之意也無時休息孳孳不已者師古曰孳孳不怠之意也音與孜同凡以為天下厚劉氏也師古曰為音于偽反臣無愚智民無男女皆諭至意師古曰諭曉也而安衆侯崇乃獨懐悖惑之心師古曰悖乖也操畔逆之憲興兵動衆欲危宗廟惡不忍聞罪不容誅誠臣子之仇宗室之讎國家之賊天下之害也是故親屬震落而吿其罪民人潰畔而棄其兵進不跬步退伏其殃師古曰半歩曰跬謂一舉足也音空橤反百嵗之母孩提之子師古曰嬰兒始孩人所提挈故曰孩提也孩者小兒笑也宋祁曰景本作一百嵗同時斷斬懸頭竿杪師古曰杪末也音莫小反珠珥在耳首飾猶存為計若此豈不誖哉師古曰誖惑也音布内反臣聞古者畔逆之國既以誅討則豬其宫室以為汙池納垢濁焉李竒曰掘其宫以為池用貯水也師古曰豬謂畜水汙下也汙音烏名曰凶虚師古曰虚讀曰墟墟故居也言凶人所居也雖生菜茹而人不食師古曰所食之菜曰茹音人庶反四牆其社覆上棧下示不得通師古曰棧謂以簀蔽之也下則棧之上則覆之所以隔塞不通隂陽之氣韋昭曰棧柴也辨社諸侯孟康曰辨布也布崇社國國各作一見以為戒也師古曰辨讀曰班出門見之著以為戒師古曰著明也方今天下聞崇之反也咸欲褰衣手劍而叱之其先至者則拂其頸師古曰拂戾也音佛衝其匈刃其軀切其肌後至者欲撥其門仆其牆師古曰仆倒也宋祁曰刃其軀舊作􅞟其體鄧展􅞟音近跣晉灼音􅞟字林曰􅞟切也夷其屋焚其器應聲滌地則時成創師古曰滌地猶言塗地則時即時也創傷也音初良反而宗室尤甚言必切齒焉何則以其背畔恩義而不知重徳之所在也宗室所居或逺嘉幸得先聞不勝憤憤之願願為宗室倡始師古曰倡音昌向反父子兄弟負籠􅀝鍤馳之南陽師古曰籠所以盛土也鍤鍫也宋祁曰􅀝當作荷鍤或作臿音丈涉反豬崇宫室令如古制及崇社宜如亳社以賜諸侯用永監戒願下四輔公卿大夫議以明好惡視四方師古曰視讀曰示於是莽大說師古曰說讀曰悦公卿曰皆宜如嘉言莽白太后下詔曰惟嘉父子兄弟雖與崇有屬不敢阿私或見萌芽相率吿之及其禍成同共讎之應合古制忠孝著焉其以杜衍户千封嘉為師禮侯嘉子七人皆賜爵闗内侯後又封竦為淑徳侯長安為之語曰欲求封過張伯松師古曰竦之字力戰鬭不如巧為奏莽又封南陽吏民有功者百餘人汙池劉崇室宅後謀反者皆汙池云羣臣復白劉崇等謀逆者以莽權輕也宜尊重以填海内師古曰填音竹刃反五月甲辰太后詔莽朝見太后稱假皇帝冬十月丙辰朔日有食之十二月羣臣奏請益安漢公宫及家吏置率更令廟廐廚長丞中庶子虎賁以下百餘人又置衛士三百人安漢公廬為攝省府為攝殿第為攝宫奏可莽白太后下詔曰故太師光雖前薨功效已列太保舜大司空豐輕車將軍邯歩兵將軍建皆為誘進單于籌䇿又典靈臺明堂辟雍四郊定制度開子午道與宰衡同心説徳師古曰說音悦下同合意并力功徳茂著封舜子匡為同心侯林為說徳侯光孫夀為合意侯豐孫匡為并力侯益邯建各三千户是嵗西羌龐恬傅幡等師古曰幡音敷元反其字從巾怨莽奪其地作西海郡反攻西海太守程永永奔走莽誅永遣護羌校尉竇况擊之二年春竇况等擊破西羌五月更造貨錯刀一直五千契刀一直五百大錢一直五十與五銖錢並行民多盜鑄者禁列侯以下不得挾黄金輸御府受直然卒不與直九月東郡太守翟義都試勒車騎因發犇命立嚴鄉侯劉信為天子師古曰東平煬王之子移檄郡國言莽毒殺平帝攝天子位欲絶漢室今共行天罰誅莽師古曰共讀曰恭郡國疑惑衆十餘萬莽惶懼不能食晝夜抱孺子吿禱郊廟放大誥作䇿師古曰放依也大誥周書篇名周公所作也放音甫往反遣諫大夫桓譚等班於天下諭以攝位當反政孺子之意師古曰諭曉告之遣王邑孫建等八將軍撃義分屯諸闗守阸塞槐里男子趙明霍鴻等起兵以和翟義師古曰和音胡卧反相與謀曰諸將精兵悉東京師空可攻長安衆稍多至且十萬人莽恐遣將軍王竒王級將兵拒之以太保甄邯為大將軍受鉞髙廟領天下兵左杖節右把鉞屯城外王舜甄豐晝夜循行殿中師古曰行音下更反十二月王邑等破翟義於圉司威陳崇使監軍師古曰為使而監軍於外韋昭曰圉故屬淮陽後屬陳留吕静曰圉音語上書言陛下奉天洪範心合寳龜師古曰心與龜合也膺受元命豫知成敗咸應兆占是謂配天配天之主慮則移氣言則動物施則成化臣崇伏讀詔書下日竊計其時聖思始發而反虜仍破師古曰思慮也詔文始書反虜大敗制書始下反虜畢斬衆將未及齊其鋒芒臣崇未及盡其愚慮而事已決矣莽大説師古曰説讀曰悅三年春地震大赦天下王邑等還京師西與王級等合擊明鴻皆破滅語在翟義𫝊莽大置酒未央宫白虎殿勞賜將帥詔陳崇治校軍功第其髙下莽乃上奏曰明聖之世國多賢人故唐虞之時可比屋而封至功成事就則加賞焉至于夏后塗山之㑹執玉帛者萬國諸侯執玉附庸執帛周武王孟津之上尚有八百諸侯周公居攝郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之内各以其職来祭蓋諸侯千八百矣禮記王制千七百餘國是以孔子著孝經曰不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事先王宋祁曰邵本先字上有其字此天子之孝也秦為亡道殘滅諸侯以為郡縣欲擅天下之利故二世而亡髙皇帝受命除殘考功施賞建國數百後稍衰㣲其餘僅存太皇太后躬統大綱廣封功徳以勸善興滅繼絶以永世是以大化流通旦暮且成􅇜𦍑冦害西海郡反虜流言東郡逆賊惑衆西土忠臣孝子莫不奮怒所征殄滅盡備厥辜天下咸寧今制禮作樂宋祁曰越本寧字下無今字實考周爵五等地四等有明文蘇林曰爵五等公侯伯子男也地四等公一等侯伯二等子男三等附庸四等殷爵三等有其說無其文師古曰公一等侯二等伯子男三等孔子曰周監於二代郁郁乎文哉吾從周師古曰論語載孔子之言也監視也二代夏殷也郁郁文章貌臣請諸將帥當受爵邑者爵五等地四等奏可於是封者髙為侯伯次為子男當賜爵闗内侯者更名曰附城凡數百人擊西海者以羌為號槐里以武為號翟義以虜為號羣臣復奏言太后脩功録徳逺者千載近者當世或以文封或以武爵深淺大小靡不畢舉今攝皇帝背依踐阼宜異於宰國之時制作雖未畢己師古曰已止也宜進二子爵皆為公春秋善善及子孫賢者之後宜有土地成王廣封周公庶子六人皆有茅土及漢家名相大將蕭霍之屬咸及支庶兄子光可先封為列侯諸孫制度畢已大司徒大司空上名如前詔書太后詔曰進攝皇帝子襃新侯安為新舉公賞都侯臨為襃新公封光為衍功侯是時莽還歸新都國羣臣復白以封莽孫宗為新都侯莽既滅翟義自謂威徳日盛獲天人助遂謀即真之事矣九月莽母功顯君死意不在哀令太后詔議其服少阿羲和劉歆與博士諸儒七十八人皆曰居攝之義所以統立天功興崇帝道成就法度安輯海内也師古曰輯字與集同昔殷成湯既没而太子蚤夭其子太甲幼少不明伊尹放諸桐宫而居攝以興殷道周武王既沒周道未成成王幼少周公屏成王而居攝以成周道師古曰屏猶擁也劉敞曰予謂屏者即荀子所言屏成王而及武王屏猶却也是以殷有翼翼之化師古曰商頌殷武之詩曰商邑翼翼四方之極言商邑禮俗翼翼然可則傚乃四方之中正也周有刑錯之功師古曰謂成康之世囹圄空虚今太皇太后比遭家之不造師古曰比頻也周頌閔予小子之篇曰遭家不造造成也故議者引之委任安漢公宰尹羣僚衡平天下師古曰宰治也尹正也衡平也言如稱之衡􅇜孺子幼少未能共上下師古曰共讀曰恭上下謂天地皇天降瑞出丹石之符是以太皇太后則天明命詔安漢公居攝踐阼將以成聖漢之業與唐虞三代比隆也攝皇帝遂開秘府㑹羣儒制禮作樂卒定庶官茂成天功師古曰茂美也聖心周悉卓爾獨見發得周禮以明因監李竒曰殷因於夏禮周監於二代則天稽古而損益焉猶仲尼之聞韶師古曰孔子至齊郭門之外遇一嬰兒挈一壺相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作孔子至彼而及韶聞之三月不知肉味言天縱多能而識微也故取喻耳日月之不可階師古曰論語載子貢叙孔子徳云它人賢者丘陵也猶可踰也仲尼日月也無得而踰焉又曰夫子之不可及猶天之不可階而升也非聖哲之至孰能若兹綱紀咸張成在一匱師古曰論語云孔子曰譬如為山未成一匱止吾止也譬如平地雖覆一匱進吾往也匱者織草為器所以盛土也言人脩行道徳有若為山雖於平地始覆一匱之土而作不止可以得成故吾欲往觀之今此議者云莽脩行政化致於太平本由一匱也劉敞曰予謂此言莽制作已成尚有未足欲留之者也當引書云譬如為山九仞功􅉛一匱以解之此其所以保佑聖漢安靖元元之效也今功顯君薨禮庶子為後為其母緦𫝊曰與尊者為體不敢服其私親也攝皇帝以聖徳承皇天之命受太后之詔居攝踐阼奉漢大宗之後上有天地社稷之重下有元元萬機之憂不得顧其私親故太皇太后建厥元孫俾侯新都師古曰建立也元長也謂立莽孫宗為新都侯也俾使也為哀侯後明攝皇帝與尊者為體承宗廟之祭奉共養太皇太后不得服其私親也周禮曰王為諸侯緦縗弁而加環絰師古曰於弁上加環絰也謂之環者言其輕細如環之形同姓則麻異姓則葛攝皇帝當為功顯君緦縗弁而加麻環經如天子弔諸侯服以應聖制莽遂行焉凡壹弔再㑹而令新都侯宗為主服喪三年云司威陳崇奏衍功侯光私報執金吾竇況令殺人況為收繫致其法莽大怒切責光光母曰女自眡孰與長孫中孫師古曰長孫中孫莽子宇及獲字也皆為莽所殺故云然中讀曰仲遂母子自殺及況皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉服䖍曰不舎光罪為公義劉奉世曰莽不服喪亦以示公義令光子嘉嗣爵為侯莽下書曰遏宻之義訖于季冬張晏曰平帝以元始五年十二月崩至此再朞年也師古曰虞書放勲乃徂百姓如喪考妣三載四海遏密八音遏止也宻靜也謂不作樂也故莽引之劉奉世曰平帝崩至居攝之年十二月實三朞非再朞也蓋莽自謂義經遏宻實非三朞不以二十五月也或曰此事當在三年冬誤記於此年耳正月郊祀八音當奏王公卿士樂凡㡬等五聲八音條各云何其與所部儒生各盡精思悉陳其義是嵗廣饒侯劉京車騎將軍千人扈雲大保屬臧鴻奏符命師古曰千人官名也屬車騎將軍扈其姓雲其名京言齊郡新井雲言巴郡石牛鴻言扶風雍石莽皆迎受十一月甲子莽上奏太后曰陛下至聖􅇜家不造遇漢十二世三七之阸承天威命詔臣莽居攝受孺子之託任天下之寄臣莽兢兢業業懼於不稱師古曰兢兢慎也業業危也宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我吿亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井師古曰誠實也入地且百尺十一月壬子直建冬至師古曰壬子之日冬至而其日當建巴郡石牛戊午雍石文皆到于未央宫之前殿臣與太保安陽侯舜等視天風起塵㝠風止得銅符帛圖於石前文曰天吿帝符獻者封侯承天命用神令騎都尉崔𤼵等眡說師古曰眡古視字也視其文而說其意也及前孝哀皇帝建平二年六月甲子下詔書更為太初元將元年案其本事甘忠可夏賀良䜟書臧蘭臺師古曰蘭臺掌圖籍之所臣莽以為元將元年者大將居攝改元之文也於今信矣尚書康誥王若曰孟侯朕其弟小子封師古曰孟長也孟侯者言為諸侯之長也封者衛康叔名此周公居攝稱王之文也春秋𨼆公不言即位攝也此二經周公孔子所定蓋為後法孔子曰畏天命畏大人畏聖人之言師古曰論語載孔子之言也已解在上臣莽敢不承用臣請共事神祇宗廟奏言太皇太后孝平皇后皆稱假皇帝師古曰共讀曰恭其號令天下天下奏言事毋言攝以居攝三年為初始元年漏刻以百二十為度用應天命臣莽夙夜養育隆就孺子師古曰隆長也成就之使其長大也劉奉世曰此居攝二年冬也至此始請以居攝三年為初始元年似是二年冬事疑𫝊有差誤令與周之成王比徳宣明太皇太后威徳於萬方期於富而教之孺子加元服復子明辟如周公故事奏可衆庶知其奉符命指意羣臣博議別奏以視即真之漸矣師古曰視讀曰示期門郎張充等六人謀共劫莽立楚王發覺誅死梓潼人哀章師古曰梓潼廣漢之縣也潼音童學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝行璽某𫝊予黄帝金䇿書宋祁曰越本邵本云赤帝璽無一行字某者髙皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名師古曰竄謂厠著也凡為十一人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黄衣持匱至髙廟以付僕射僕射以聞戊辰莽至髙廟拜受金匱神嬗師古曰嬗古禪字言有神命使漢禪位於莽也御王冠謁太后還坐未央宫前殿下書曰予以不徳託于皇初祖考黄帝之後皇始祖考虞帝之苗裔而太皇太后之末屬皇天上帝隆顯大佑成命統序符契圗文金匱䇿書神明詔吿屬予以天下兆民師古曰屬委付也音之欲反赤帝漢氏髙皇帝之靈承天命𫝊國金䇿之書予甚祗畏敢不欽受以戊辰直定師古曰於建除之次其日當定御王冠即真天子位定有天下之號曰新其改正朔易服色變犧牲殊徽幟異器制師古曰徽幟通謂旌旗之屬也幟音式志反以十二月朔癸酉為建國元年正月之朔宋祁曰癸酉字下當有改元二字劉攽曰莽改年為始建國但云建國者誤也皆當有始字以鷄鳴為時服色配徳上黄犧牲應正用白使節之旄旛皆純黄其署曰新使五威節以承皇天上帝威命也前漢書卷九十九上前漢書卷九十九上考證王莽𫝊上家凡九侯五大司馬注師古曰外戚𫝊言十侯此云九侯以鳳本嗣禁為侯臣召南按外戚及元后𫝊言十侯自元后親屬計之并數定陵侯淳于長也此専言王氏故云九侯安後復徴召之胡三省曰安定也安後猶言事定後也故事聘皇后黄金二萬斤胡三省曰据杜佑通典聘后黄金二萬斤吕后為恵帝聘魯元公主女故事也遣大司徒司直陳崇等八人分行天下覽觀風俗恩澤侯表王惲閻遷李翕郝黨陳崇謝殷逯並陳鳳是八人也劉歆陳崇等十二人皆以治明堂宣教化封為列侯按陳崇等八人以宣教化封劉歆平晏孔永孫遷以治明堂封時元帝世絶而宣帝曽孫有見王五人列侯廣戚侯顯等四十八人胡三省曰見在之王五人謂淮陽王縯中山王成都楚王紆信都王景東平王開明也列侯四十八人謂廣戚侯顯陽興侯寄陵陽侯嘉髙樂侯修平邑侯閔平纂侯況合昌侯輔伊鄉侯開就鄉侯不害膠鄉侯武宜鄉侯恢昌城侯豐樂安侯禹陶鄉侯恢釐鄉侯褒昌鄉侯且新鄉侯鯉郚鄉侯光新城侯武宜陵侯封堂鄉侯護成陵侯由成陽侯衆復昌侯休安陸侯平梧安侯譽朝鄉侯充扶鄉侯普方城侯宣當陽侯益廣城侯疌春城侯允吕鄉侯尚李鄉侯殷宛鄉侯隆夀泉侯承杏山侯遵嚴鄉侯信武平侯璜陵鄉侯曽武安侯㥅富陽侯萌西陽侯偃桃鄉侯立栗鄉侯元成金鄉侯不害平通侯且西安侯漢湖鄉侯開重鄉侯少柏凡五十人而廣戚侯顯孺子之父栗鄉侯元成先已免侯止四十八人耳當賜爵闗内侯者更名曰附城項安世曰漢人葢以城字解庸也古人庸即墉字後人加土以别之不成國者謂之附城猶今言支郡為屬城也以居攝三年為初始元年通鑑考異曰莽𫝊作初始荀紀及韋莊美嘉號録宋庠紀元通譜皆作始初前漢書卷九十九上考證欽定四庫全書前漢書卷九十九中漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注王莽傳第六十九中始建國元年正月朔莽帥公侯卿士奉皇太后璽韍上太皇太后師古曰韍謂璽之組音弗順符命去漢號焉􅀄莽妻宜春侯玉氏女立為皇后師古曰王訢為丞相初封宜春侯傳爵至孫咸莽妻咸之女本生四男宇獲安臨二子前誅死安頗􅂽忽師古曰􅂽音呼廣反廼以臨為皇太子安為新嘉辟師古曰辟君也謂之辟者取為國君之義音壁封宇子六人千為功隆公壽為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃䇿命孺子曰咨爾嬰昔皇天右乃太祖師古曰右讀曰佑佑助也歴世十二享國二百一十載歴數在于予躬詩不云乎侯服于周天命靡常師古曰大雅文王之詩也言殷之後嗣乃為諸侯服事周室是天命無常也謂㣲子為宋公也封爾為定安公永為新室賔於戲師古曰於戲音曰嗚呼敬天之休師古曰休美也往踐乃位毋廢予命又曰其以平原安德漯隂鬲重丘凡戸萬地方百里為定安公國師古曰五縣也漯音它合反鬲音與隔同立漢祖宗之廟於其國與周後並行其正朔服色世世以事其祖宗永以命德茂功享歴代之祀焉以孝平皇后為定安太后讀䇿畢莽親執孺子手流涕歔欷師古曰歔音虚欷音許氣反曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意哀嘆良乆中傅将孺子下殿北面而稱臣百僚陪位莫不感動又按金匱輔臣皆封拜以太傅左輔驃騎将軍宋祁曰驃字當去旁馬字安陽侯王舜為太師封安新公大司徒就德侯平晏為太傅就新公少阿羲和京兆尹紅休侯劉歆為國師嘉新公廣漢梓潼哀章為國将美新公是為四輔位上公太保後丞承陽侯甄邯為大司馬承新公師古曰承陽音烝陽宋祁曰少阿晉灼音義作少陭阿訓陭取阿衡一字也音依倚之倚李竒音竒紅休南本作林字承南夲作丞丕進侯王尋為大司徒章新公歩兵将軍成都侯王邑為大司空隆新公是為三公大阿右拂大司空衛将軍廣陽侯甄豐為更始将軍廣新公師古曰拂讀曰弼京兆王興為衛将軍奉新公輕車将軍成武侯孫建為立國将軍成新公京兆王盛為前将軍崇新公是為四将凡十一公王興者故城門令史王盛者賣餅莽案符命求得此姓名十餘人兩人容貎應卜相徑從布衣登用以視神焉師古曰視讀曰示餘皆拜為郎是日封拜卿大夫侍中尚書官凡數百人諸劉為郡守皆徙為諫大夫改明光宫為定安館定安太后居之以故大鴻臚府為定安公第宋祁曰邵本無故字新夲添皆置門衛使者監領敕阿乳母不得與語常在四壁中孟康曰令定安公居四壁中不得有所見至於長大不能名六畜後莽以女孫宇子妻之莽策羣司曰嵗星司肅東嶽太師典致時雨應劭曰貌之不㳟是謂不肅肅敬也厥罰常雨常雨水也故申戒厥任欲使雨澤以時也晋灼曰衆物生於東方故戒太師也青煒登平考景以晷服䖍曰煒音暉如淳曰青氣之光輝也晉灼曰言青陽之氣始升而上以成萬物也春秋分立表以正東西東日之始出也故考景以晷屬焉熒惑司悊南嶽太傅典致時奥應劭曰視之不明是謂不悊悊智也厥罰常燠燠暑也晉灼曰南方陽盛之位太傅師尊之稱故戒之也師古曰奥音於六反韋昭曰司悊南方曰視君視明則臣聰悊赤煒頌平考聲以律晉灼曰頌寛頌也夏假也物假大乃宣平也六月隂氣之始故為地統地之中數六六為律律有形有色色尚黄故考聲以律屬焉師古曰頌讀曰容太白司艾西嶽國師典致時陽應劭曰言之不從是謂不艾艾安也厥罰常陽陽旱也師古曰艾讀曰乂白煒象平考量以銓應劭曰量斗斛也銓􅁠衡也晉灼曰象形也萬物無不成形於西方大小輕重皆可知故稱量屬焉辰星司謀北嶽國将典致時寒應劭曰聴之不聰是謂不謀謀圗也厥罰常寒晉灼曰北伏也陽氣伏於下隂主殺故戒國將𤣥煒和平考星以漏應劭曰推五星行度以漏刻也晉灼曰和合也萬物皆合藏於北方水又主平故曰和平歴度起於斗分日月紀於攝提攝提値斗杓所指以建時節故考星屬焉月刑元股左司馬典致武應考方法矩張晏曰月為刑司馬主武又典天故使主威刑也主司天文欽若昊天敬授民時力来農事以豐年榖師古曰欽敬也若順也力来􅂆勉之也来音郎代反日德元厷右司徒典致文瑞考圜合規張晏曰日為陽位晉灼曰厷圜也五敎在寛則和氣感物四靈見象故文瑞屬焉師古曰厷古肱字主司人道五教是輔帥民承上宣美風俗五品乃訓師古曰五教謂父義母慈兄友弟恭子孝也五品即五常謂仁義禮智信斗平元心中司空典致物圗考度以繩張晏曰斗北斗也主齊七政司空主水土土為中故責之孟康曰易河出圗洛出書司空主水土責以其物也晉灼曰中央為四季土土者信信者直故為繩主司地里平治水土掌名山川衆殖鳥獸蕃茂草木各䇿命以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆孤卿師古曰允信也若順也更名大司農曰羲和後更為納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工師古曰共讀曰龔水衡都尉曰予虞與三公司卿凡九卿分屬三公每一卿置大夫三人一大夫置元士三人凡二十七大夫八十一元士分主中都官諸職宋祁曰或無官字更名光祿勳曰司中太僕曰太御衛尉曰太衛執金吾曰奮武中尉曰軍正劉攽曰中尉廢乆此安得更名盖是中壘校尉脱兩字又置大贅官主乘輿服御物師古曰贅聚也言財物所聚也贅音之鋭反劉奉世曰贅讀如虎賁綴衣之綴後又典兵秩位皆上卿號曰六監改郡太守曰大尹都尉曰太尉縣令長曰宰御史曰執法公車司馬曰王路四門長樂宫曰常樂室未央宮曰壽成室前殿曰王路堂服䖍曰如言路寝也長安曰常安更名秩百石曰庻士三百石曰下士四百石曰中士五百石曰命士六百石曰元士千石曰下大夫比二千石曰中大夫二千石曰上大夫中二千石曰􅀸車服黻冕各有差品師古曰此黻謂衣裳之黻又置司恭司徒劉攽曰徒改從司明司聰司中大夫及誦詩工徹膳宰以司過䇿曰予聞上聖欲昭厥德罔不愼脩厥身用綏于逺是用建爾司于五事毋隐尤毋将虚師古曰尤過也将助也虚謂虚美也言勿隐吾過而助為虚美好惡不愆立于厥中師古曰愆違也於戲朂哉師古曰於戲讀曰嗚呼朂勉也令王路設進善之旌非謗之木欲諫之鼓師古曰非音誹諫大夫四人常坐王路門受言事者封王氏齊縗之屬為侯大功為伯小功為子緦麻為男其女皆為任師古曰任充也男服之義男亦任也音壬男以睦女以隆為號焉師古曰睦隆皆其受封邑之號取嘉名也皆授印韍師古曰韍亦印之組次下並同令諸侯立大夫人夫人世子亦受印韍又曰天無二日土無二王百王不易之道也漢氏諸侯或稱王至于四夷亦如之違於古典繆於一統其定諸侯王之號皆稱公及四夷僣號稱王者皆更為侯又曰帝王之道相因而通盛德之祚百世享祀予惟黄帝帝少昊帝顓頊帝嚳帝堯帝舜帝夏禹臯陶伊尹咸有聖德假于皇天師古曰假至也升也音工雅反功烈巍巍光施于遠宋祁曰施一本作化予甚嘉之營求其後将祚厥祀惟王氏虞帝之後也出自帝嚳劉氏堯之後也出自顓頊於是封姚恂為初睦侯奉黄帝後服䖍曰姚舜姓故封為黄帝後宋祁曰字書恂信也音詢梁護為脩逺伯奉少昊後服䖍曰以為伯益之後故封之皇孫功隆公千奉帝嚳後劉歆為祁烈伯奉顓頊後國師劉歆子疊為伊休侯奉堯後師古曰上言紅休侯劉歆為國師嘉新公今此云劉歆為祁烈伯又言國師劉歆子為伊休侯是則祁烈伯自别一劉歆非國師也宋祁曰伊休疑是紅休嬀昌為始睦侯奉虞帝後山遵為襃謀子奉臯陶後伊𤣥為襃衡子奉伊尹後漢後定安公劉嬰位為賔周後衛公姬黨更封為章平公亦為賔殷後宋公孔𢎞運轉次移更封為章昭侯位為恪師古曰恪敬也言待之加敬亦如賔也周以舜後并杞宋為三恪也夏後遼西姒豐封為章功侯亦為恪服䖍曰姒夏姓四代古宗宗祀于明堂以配皇始祖考虞帝周公後襃魯子姬就宣尼公後襃成子孔鈞已前定焉莽又曰予前在攝時建郊宮定祧廟立社稷師古曰逺祖曰祧音吐堯反劉奉世曰四代以下十七字其義不倫莽方封先聖後未當及此且已有後文此字當衍神祇報況師古曰況賜也或光自上復于下流為烏師古曰復音扶目反或黄氣熏烝昭燿章明以著黄虞之烈焉師古曰烈餘業也自云承黄虞之後自黄帝至于濟南伯王而祖世氏姓有五矣師古曰濟南伯王莽之髙祖黄帝二十五子分賜厥姓十有二氏虞帝之先受姓曰姚其在陶唐曰嬀在周曰陳在齊曰田在濟南曰王予伏念皇初祖考黄帝皇始祖考虞帝以宗祀于明堂宋祁曰南本云皇姓始祖考以當作已宜序於祖宗之親廟其立祖廟五親廟四后夫人皆配食郊祀黄帝以配天黄后以配地孟康曰黄帝之后也以新都侯東第為大禖歳時以祀師古曰禖祀也立此大祠常以嵗時祀其先也家之所尚種祀天下師古曰言國已立大禖祠先祖矣其衆庻之家所尚者各令傳祀勿絶普天之下同其法劉奉世曰此謂莽家所尚之種祀示令天下𫝊以為種祠不得不奉祀亦猶漢髙之枌榆社也姚媯陳田王氏凡五姓者皆黄虞苖裔予之同族也書不云乎惇序九族師古曰虞書咎繇謩之辭也惇厚也其令天下上此五姓名籍于秩宗皆以為宗室世世復無有所與師古曰復音方目反與讀曰預其元城王氏勿令相嫁娶以别族理親焉師古曰元城王氏不得與四姓昏娶以其同祖也餘它王氏則不禁焉封陳崇為統睦侯奉胡王後孟康曰追王陳胡公田豐為世睦侯奉敬王後孟康曰追王陳敬仲天下牧守皆以前有翟義趙明等領州郡懐忠孝封牧為男守為附城又封舊恩戴崇金涉箕閎陽並等子皆為男遣騎都尉囂等師古曰囂音許驕反分治黄帝園位於上都橋畤師古曰橋山之上故曰橋畤也劉敞曰都當作郡虞帝於零陵九疑胡王於淮陽陳敬王於齊臨淄愍王於城陽莒服䖍曰齊愍王伯王於濟南東平陵孺王於魏郡元城師古曰莽之髙祖名遂字伯紀曽祖名賀字翁孺故謂之伯王孺王使者四時致祠其廟當作者以天下初定且祫祭於明堂太廟以漢高廟為文祖廟師古曰欲法舜受終於文祖莽曰予之皇始祖考虞帝受嬗于唐師古曰嬗古禪字漢氏初祖唐帝世有傳國之象師古曰堯傳舜漢傳莽自以舜後故言有傳國之象予復親受金策於漢高皇帝之靈惟思襃厚前代何有忘時漢氏宗祖有七蘇林曰漢本祀祖宗有四莽以元帝成帝平帝為宗故有七以禮立廟于定安國其園寝廟在京師者勿罷祠薦如故予以秋九月親入漢氏高元成平之廟諸劉更屬籍京兆大尹勿解其復各終厥身師古曰復音方目反州牧數存問勿令有侵􅁈又曰予前在大麓至于攝假師古曰大麓者謂為大司馬宰衡時妄引舜納于大麓烈風雷雨不迷也攝假謂初為攝皇帝又為假皇帝深惟漢氏三七之阸赤德氣盡思索廣求師古曰索亦求也音山各反所以輔劉延期之術靡所不用以故作金刀之利㡬以濟之師古曰㡬讀曰冀然自孔子作春秋以為後王法至于哀之十四而一代畢協之於今亦哀之十四也張晏曰漢哀帝即位六年平帝五年居攝三年凡十四年赤世計盡終不可强濟皇天明威黄德當興隆顯大命屬予以天下師古曰屬音之欲反今百姓咸言皇天革漢而立新師古曰革改也廢劉而興王夫劉之為字卯金刀也正月剛卯金刀之利皆不得行服䖍曰剛卯以正月卯日作佩之長三寸廣一寸四方或用玉或用金或用桃著革帯佩之今有玉在者銘其一面曰正月剛卯金刀莽所鑄之錢也晉灼曰剛卯長一寸廣五分四方當中央從穿作孔以采絲茸其底如冠纓頭蕤刻其上面作両行書文曰正月剛卯既央靈殳四方赤青白黄四色是當帝令祝融以教􅇪龍庻疫剛痺莫我敢當其一銘曰疾日嚴卯帝令䕫化順爾固伏化兹靈殳既正既直既觚既方庻疫剛痺莫我敢當師古曰今往往有土中得玉剛卯者案大小及文服説是也莽以劉字上有卯下有金旁又有刀故禁剛卯及金刀也博謀卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與前大錢五十者為二品並行欲防民盗鑄乃禁不得挟銅炭是嵗四月徐鄉侯劉快結黨數千人起兵於其國師古曰快膠東恭王子也而王子侯表作炔字從火與此不同疑表誤宋祁曰越本無是歳二字韋昭云徐鄉東莱縣也快兄殷故漢膠東王時改為扶崇公快舉兵攻即墨殷閉城門自繋獄吏民距快快敗走至長廣死莽曰昔予之祖濟南愍王困於燕寇自齊臨淄出保于莒宗人田單廣設竒謀獲殺燕将復定齊國今即墨士大夫復同心殄滅反虜予甚嘉其忠者憐其無辜其赦殷等非快之妻子它親屬當坐者皆勿治弔問死傷賜亡者葬錢人五萬殷知大命深疾惡快以故輙伏厥辜其滿殷國戸萬地方百里又封符命臣十餘人莽曰古者設廬井八家一夫一婦田百􅅕什一而税則國給民富而頌聲作師古曰給足也此唐虞之道三代所遵行也秦為無道厚賦税以自供奉罷民力以極欲師古曰罷讀曰疲壞聖制廢井田是以兼并起貪鄙生强者規田以千數弱者曾無立錐之居又置奴婢之市與牛馬同蘭師古曰蘭謂遮蘭之若牛馬蘭圈也制於民臣顓斷其命姦虐之人因縁為利至略賣人妻子逆天心誖人倫師古曰誖亂也誖音布内反繆於天地之性人為貴之義師古曰孝絰稱孔子曰天地之性人為貴故引之性生也書曰予則奴戮女師古曰夏書甘誓之辭也奴戮戮之以為奴也説書者以為孥子也戮及妻子此説非也泰誓云囚奴正士豈及子之謂乎女讀曰汝唯不用命者然後被此辠矣漢氏減輕田租三十而稅一常有更賦罷癃咸出師古曰更音工衡反罷音疲癃音隆而豪民侵陵分田刼假厥名三十税一實什税五也師古曰觧並在食貨志父子夫婦終年耕芸師古曰芸字與耘同所得不足以自存故富者犬馬餘菽粟驕而為邪貧者不厭糟糠窮而為姦師古曰厭飽也俱䧟于辜刑用不錯師古曰錯置也音千故反宋祁曰越本辜作辠予前在大麓始令天下公田口井師古曰計口而為井田時則有嘉禾之祥遭反虜逆賊且止今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田予九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投諸四裔以禦魑魅師古曰魑山神也魅老物精也魑音螭魅音媚如皇始祖考虞帝故事是時百姓便安漢五銖錢以莽錢大小兩行難知又數變改不信皆私以五銖錢市買訛言大錢當罷莫肯挟莽患之復下書諸挟五銖錢言大錢當罷者比非井田制投四裔於是農商失業食貨俱廢民人至涕泣於市道及坐賣買田宅奴婢鑄錢自諸侯卿大夫至于庻民抵罪者不可勝數秋遣五威将王竒等十二人班符命四十二篇於天下德祥五事符命二十五福應十二凡四十二篇其德祥言文宣之世黄龍見于成紀新都髙祖考王伯墓門梓柱生枝葉之屬符命言井石金匱之屬福應言雌雞化為雄之屬其文爾雅依託皆為作説師古曰爾雅近正也謂近於正經依古義而為之説大歸言莽當代漢有天下云總而説之曰帝王受命必有德祥之符瑞協成五命申以福應師古曰五命謂五行之次相承以受命也申重也然後能立巍巍之功傳于子孫永享無窮之祚故新室之興也德祥發於漢三七九世之後蘇林曰二百一十嵗九天子也肇命於新都受瑞於黄支孟康曰獻生犀宋祁曰注文孟康曰下當有黄支二字開王於武功定命於子同孟康曰梓潼縣也莽改也成命於巴宕晉灼曰巴郡宕渠縣也申福於十二應天所以保佑新室者深矣固矣武功丹石出於漢氏平帝末年火德銷盡土德當代皇天眷然去漢與新以丹石始命於皇帝皇帝謙讓以攝居之未當天意故其秋七月天重以三能文馬服䖍曰三台星也晉灼曰許愼説文馬縞身金精周成王時犬戎獻之師古曰能音台皇帝復謙譲未即位故三以鐵契四以石龜五以虞符六以文圭七以𤣥印八以茂陵石書九以𤣥龍石十以神井十一以大神石十二以銅符帛圖申命之瑞寖以顯著師古曰寖漸也至于十二以昭告新皇帝皇帝深惟上天之威不可不畏故去攝號猶尚稱假改元為初始欲以承塞天命克厭上帝之心師古曰塞當也厭滿也然非皇天所以鄭重降符命之意師古曰鄭重猶言頻煩也重音直用反故是日天復決其所以勉書孟康曰哀章所作䇿書也言數有瑞應莽自謙居攝天復决其疑􅂆勉令為眞也晉灼曰勉字當為龜是日自復有龜書及天下金匱圖䇿事也師古曰孟説是宋祁曰别本無復決其三字邵夲無其字又侍郎王盱見人衣白布單衣赤繢方領師古曰繢者㑹五采也以布為单衣以赤加繢為其方領也盱音許于反繢音胡内反冠小冠立于王路殿前謂盱曰今日天同色以天下人民屬皇帝師古曰同色者言五方天神共齊其謀同其顔色也字或作包包者言天總包括天下人衆而與莽也其義兩通屬委也音之欲反盱恠之行十餘歩人忽不見至丙寅暮漢氏髙廟有金匱圗䇿高帝承天命以國傳新皇帝明旦宗伯忠孝侯劉宏以聞乃召公卿議未決而大神石人談曰趣新皇帝之高廟受命毋留師古曰趣讀曰促於是新皇帝立登車之漢氏高廟受命受命之日丁卯也丁火漢氏之德也卯劉姓所以為字也明漢劉火德盡而傳於新室也皇帝謙謙既備固譲十二符應廹著命不可辭師古曰廹促也著明也懼然祗畏葦然閔漢氏之終不可濟師古曰懼音瞿瞿然自失之意也葦然變動之貌也瞿音居具反斖斖在左右之不得從意師古曰斖斖自勉之意左右助也言欲助漢室而廹天命不得從其本意也左右音曰佐佑也為之三夜不御寢三日不御食延問公侯卿大夫僉曰宜奉如上天威命於是乃改元定號海内更始新室既定神祇懽喜申以福應吉瑞累仍師古曰申重也仍頻也詩曰宜民宜人受禄于天保右命之自天申之師古曰大雅假樂之詩也言有功徳宜於衆人者則受天之福禄天乃保安而佑助之命以邦國也申謂重其意也右讀曰佑此之謂也五威將奉符命齎印綬王侯以下及吏官名更者師古曰更改也外及匈奴西域徼外蠻夷皆即授新室印綬因收故漢印綬賜吏爵人二級民爵人一級女子百戸羊酒蠻夷幣帛各有差大赦天下五威將乘乾文車鄭氏曰畫天文象於車也駕坤六馬鄭氏曰坤為牝馬六地数背負鷩鳥之毛服飾甚偉師古曰鷩鳥雉屬即鵕䴊也今俗呼之山雞非也鷩音鼈每一將各置左右前後中帥凡五帥衣冠車服駕馬各如其方面色數師古曰色者東方青南方赤也數者若木數三火數二之類也將持節稱太一之使帥持幢稱五帝之使莽䇿命曰普天之下迄于四表師古曰迄亦至也靡所不至其東出者至𤣥菟樂浪髙句驪夫餘師古曰夫餘亦東北夷也樂音洛浪音郎夫音扶南出者隃徼外歴益州師古曰隃字與踰同貶句町王為侯西出者至西域盡改其王為侯北出者至匈奴庭授單于印改漢印文去璽曰章單于欲求故印陳饒椎破之語在匈奴傳單于大怒而句町西域後卒以此皆畔饒還拜為大将軍封威德子冬靁師古曰古雷字桐華置五威司命中城四關将軍司命司上公以下中城主十二城門策命統睦侯陳崇曰咨爾崇夫不用命者亂之原也大姦猾者賊之本也鑄偽金錢者妨寳貨之道也驕奢踰制者兇害之端也漏泄省中及尚書事者機事不密則害成也師古曰易上繋之辭曰君不密則失臣臣不密則失身機事不密則害成故引之拜爵王庭謝恩私門者禄去公室政從亡矣凡此六條國之綱紀是用建爾作司命柔亦不茹剛亦不吐不侮鰥寡不畏强圉師古曰引詩大雅美仲山甫之辭其義並觧於上帝命帥繇統睦于朝師古曰帥循也繇讀與由同命説符侯崔發曰重門撃􅢎以待暴客師古曰易下繋之辭也撃􅢎謂撃木以守夜也暴客謂姦暴之人来為寇害者也􅢎音他各反宋祁曰􅢎一作柝女作五威中城将軍師古曰女讀曰汝其下並同宋祁曰中或作關中德既成天下說符師古曰説音悦命明威侯王級曰繞霤之固南當荆楚服䖍曰隘險之道師古曰謂之繞霤者言四面塞阸其道屈曲谿谷之水囘繞而霤也其處即今商州界七盤十二繞是也霤音力救反女作五威前關将軍振武奮衛明威于前命尉睦侯王嘉曰羊頭之阸北當燕趙師古曰羊頭山名在上黨壺關縣女作五威後關將軍壺口捶㧖尉睦于後師古曰壺口亦山名也捶㧖謂據險阸而捶撃也捶音之蘂反命堂威侯王竒曰肴黽之險東當鄭衛師古曰肴肴山也黽黽池也皆在陜縣之東黽音莫善反女作五威左關將軍函谷批難掌威于左師古曰批謂糾閉之也函谷故關今在桃林縣界批音歩結反宋祁曰掌當作堂蕭該曰案晉灼音義作批難字林云撃也父迷反廣雅曰批撃也釋名曰批兩指相禆助共撃也命懐羌子王福曰􅊈隴之阻西當戎狄師古曰汧扶風􅊈縣有吴山􅊈水之阻隴謂隴阺也􅊈隴相連汧音苦堅反阺音丁禮反女作五威右闗將軍成固據守懷羌于右又遣諫大夫五十人分鑄錢於郡國是嵗長安狂女子碧呼道中師古曰碧者女子名也呼叫也音火故反曰高皇帝大怒趣歸我國不者九月必殺汝師古曰趣讀曰促莽收捕殺之治者掌寇大夫陳成自免去官師古曰狂妄之人職在掌寇故云治者眞定劉都等謀舉兵發覺皆誅眞定常山大雨雹師古曰雨音于具反二年二月赦天下五威将帥七十二人還奏事漢諸侯王為公者悉上璽綬為民無違命者封将為子帥為男初設六筦之令師古曰筦亦管字也管主也韋昭曰謂禁地面猶開一路以專之如筦者命縣官酤酒賣鹽鐵器鑄錢諸采取名山大澤衆物者税之又令市官收賤賣貴賖貸予民收息百月三如淳曰出百錢與民用月收其息三錢也師古曰貸音吐戴反羲和置酒士郡一人乗傳督酒利師古曰督察視之傳音張戀反禁民不得挟弩鎧徙西海匈奴單于求故璽莽不與遂寇邊郡殺略吏民十一月立國將軍建奏西域將欽上言師古曰但欽也九月辛巳戊巳校尉史陳良終帯共賊殺校尉刁䕶師古曰刁音貂宋祁曰刁並注改作刀劫略吏士自稱廢漢大將軍亡入匈奴又今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也師古曰下妻猶言小妻也劉氏當復師古曰復音扶福反趣空宫師古曰趣讀曰促收繋男子即常安姓武字仲皆逆天違命宋祁曰男或作妻字一本無違字大逆無道請論仲及陳良等親屬當坐者奏可漢氏髙皇帝比著戒云罷吏卒為賔食師古曰比頻也言髙帝頻戒云勿使吏卒守漢廟欲為寄食之賔於王氏廟中誠欲承天心全子孫也其宗廟不當在常安城中及諸劉為諸侯者當與漢俱廢陛下至仁乆未定前故安衆侯劉崇徐鄉侯劉快陵鄉侯劉曾師古曰楚思王子扶恩侯劉貴等師古曰不知誰子孫更聚衆謀反師古曰更音工衡反今狂狡之虜或妄自稱亡漢將軍或稱成帝子子輿至犯夷滅連未止者此聖恩不蚤絶其萌牙故也臣愚以為漢高皇帝為新室賔享食明堂成帝異姓之兄弟平帝壻也皆不宜復入其廟元帝與皇太后為體師古曰夫婦一體也聖恩所隆禮亦宜之臣請漢氏諸廟在京師者皆罷諸劉為諸侯者以戸多少就五等之差其為吏者皆罷待除於家師古曰罷黜其職各使退歸而言在家待遷除上當天心稱髙皇帝神靈師古曰稱音尺孕反塞狂狡之萌莽曰可嘉新公國師以符命為予四輔明德侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言師古曰昌善也或捕告反虜厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師以女配莽子故不賜姓改定安太后號曰黄皇室主絶之於漢也冬十二月雷更名匈奴單于曰降奴服于莽曰降奴服于知師古曰知者莽改單于之名也本名嚢知牙斯威侮五行師古曰引夏書甘誓之文背畔四條師古曰四條莽所與作制者事在匈奴傳侵犯西域延及邉垂為元元害辠當夷滅命遣立國將軍孫建等凡十二將十道並出共行皇天之威罰于知之身師古曰共讀曰恭惟知先祖故呼韓邪單于稽侯㹪師古曰㹪音刪又音先安反韋昭曰㹪惡健犬也累世忠孝保塞守徼不忍以一知之罪滅稽侯㹪之世今分匈奴國土人民以為十五立稽侯㹪子孫十五人為單于遣中郎將藺苞戴級馳之塞下召拜當為單于者諸匈奴人當坐虜知之法者皆赦除之遣五威將軍苖訢虎賁将軍王况出五原厭難將軍陳欽震狄將軍王廵出雲中師古曰厭音一渉反振武将軍王嘉平狄將軍王萌出代郡相威將軍李棽鎭逺將軍李翁出西河師古曰棽音所林反韋昭曰棽音疏禁反字林曰棽支條棽麗也誅貉將軍陽俊討穢将軍嚴尤出漁陽奮武將軍王駿定胡將軍王晏出張掖及偏禆以下百八十人募天下囚徒丁男甲卒三十萬人轉衆郡委輸五大夫衣裘兵器糧食長吏送自貞海江淮至北邊使者馳傳督趣以軍興法從事師古曰傳音張戀反趣音促劉奉世曰五大夫不可曉疑衍天下騷動先至者屯邊郡湏畢具乃同時出莽以錢幣訖不行師古曰訖竟也復下書曰民以食為命以貨為資是以八政以食為首寳貨皆重則小用不給皆輕則僦載煩費師古曰僦送也一曰賃也音子就反輕重大小各有差品則用便而民樂於是造寳貨五品語在食貨志百姓不從但行小大錢二品而已盗鑄錢者不可禁廼重其法一家鑄錢五家坐之没入為奴婢吏民出入持布錢以副符傳師古曰舊法行者持符傳即不稽留今更令持布錢與符相副乃得􅂈也傳音張戀反其下亦同不持者厨傳勿舎關津苛留師古曰厨行道飲食處傳置驛之舎也苛問也音何公卿皆持以入宫殿門欲以重而行之是時争為符命封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙並驗治非五威將率所班皆下獄初甄豐劉歆王舜為莽腹心倡導在位師古曰倡音赤上反蕭該曰所班舊作所辨案韋昭曰辨布也音班或作班襃揚功德安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜歆亦受其賜並富貴矣非復欲令莽居攝也宋祁曰或無貴字居攝之萌出於泉陵侯劉慶前煇光謝囂長安令田終術莽羽翼已成意欲稱攝豐等承順其意莽輙復封舜歆兩子及豐孫豐等爵位已盛心意既滿又實畏漢宗室天下豪桀而疏遠欲進者並作符命莽遂據以即眞舜歆内懼而已豐素剛强莽覺其不説師古曰説讀曰悦故徙大阿右拂大司空豐託符命文為更始將軍師古曰拂讀曰弼與賣餅兒王盛同列豐父子黙默時子尋為侍中京兆大尹茂德侯即作符命言新室當分陜立二伯師古曰分陕者欲依周公召公故事自陜以東周公主之自陜以西召公主之陜即今陕州是其地也伯長也陕音式冉反以豐為右伯太傅平晏為左伯如周召故事莽即從之拜豐為右伯當述職西出未行尋復作符命言故漢氏平帝后黄皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黄皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山嵗餘捕得辭連國師公歆子侍中東通靈将五司大夫劉奉世曰東通靈將五司大夫亦疑其譌非史本文隆威侯棻棻弟右曹長水校尉伐虜侯泳大司空邑弟左闗將軍堂威侯竒及歆門人侍中騎都尉丁隆等牽引公卿黨親列侯以下死者數百人尋手理有天子字莽觧其臂入視之曰此一天子也宋祁曰天或作大或曰一六子也六者戮也明尋父子當戮死也廼流棻于幽州放尋于三危殛隆于羽山師古曰效舜之罰共工等也殛誅也音居力反皆驛車載其屍傳致云莽為人侈口蹷顄師古曰侈大也蹷短也顄頤也蹷其月反顄胡感反露眼赤精大聲而嘶師古曰嘶聲破也音先奚反長七尺五寸好厚履髙冠以􅈊裝衣師古曰毛之强曲者曰􅈊以裝楮衣中令其張起也􅈊音力之反字或作􅘭音義同反膺髙視瞰臨左右師古曰瞰謂逺視也音曲濫反是時有用方技待詔黄門者或問以莽形貎待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅滅待詔而封告者後常翳雲母屏面師古曰屏面即便面盖扇之類也觧在張敞傳非親近莫得見也是嵗以初睦侯姚恂為寜始將軍三年莽曰百官改更職事分移律令儀法未及悉定且因漢律令儀法以從事令公卿大夫諸侯二千石舉吏民有德行通政事能言語明文學者各一人詣王路四門宋祁曰路字下有門字遣尚書大夫趙並使勞北邊還言五原北假膏壤殖榖師古曰北假地名也膏壤言其土肥美也殖生也異時常置田官乃以並為田禾将軍𤼵戍卒屯田北假以助軍糧是時諸將在邉湏大衆集師古曰須待也吏士放縱而内郡愁於徴發民棄城郭流亡為盜賊并州平州尤甚莽令七公六卿號皆兼稱將軍遣著武將軍逯並等塡名都師古曰逯音錄塡音竹刃反此下亦同中郎将繡衣執法各五十五人分塡緣邉大郡督大姦猾擅弄兵者皆便為姦於外撓亂州郡師古曰撓音火髙反其字從手貨賂為市侵漁百姓莽下書曰虜知罪當夷滅故遣猛將分十二部將同時出一舉而决絶之矣内置司命軍正外設軍監十有二人誠欲以司不奉命令軍人咸正也今則不然各為􅁠埶恐猲良民師古曰猲以威力脅之也音呼葛反妄封人頸得錢者去如淳曰權臣妄以法枉良人為僮僕封其頸以别之也得顧錢乃去封毒蠚竝作農民離散師古曰蠚音呼各反司監若此可謂稱不師古曰稱音尺孕反自今以來敢犯此者輙捕繋以名聞然猶放縱自若而藺苞戴級到塞下招誘單于弟咸咸子登入塞脅拜咸為孝單于賜黄金千斤錦繡甚多遣去將登至長安拜為順單于留邸太師王舜自莽簒位後病悸寖劇死師古曰心動曰悸寖漸也悸音葵季反宋祁曰悸舊作喘莽曰昔齊太公以淑德累世為周氏太師蓋予之所監也師古曰監謂視見也其以舜子延襲父爵為安新公延弟襃新侯匡為太師將軍永為新室輔為太子置師友各四人秩以大夫以故大司徒馬宮為師疑故少府宗伯鳳為傅丞博士袁聖為阿輔京兆尹王嘉為保拂師古曰拂讀曰弼是為四師故尚書令唐林為胥附博士李充為犇走師古曰犇古奔字諫大夫趙襄為先後中郎将亷丹為禦侮是為四友又置師友祭酒及侍中諫議六經祭酒各一人凡九祭酒秩上卿琅邪左咸為講春秋潁川滿昌為講詩長安國由為講易平陽唐昌為講書沛郡陳咸為講禮崔發為講樂祭酒遣謁者持安車印綬即拜楚國龔勝為太子師友祭酒勝不應徴不食而死寕始将軍姚恂免侍中崇禄侯孔永為寕始將軍是嵗池陽縣有小人景長尺餘或乘車馬或步行操持萬物小大各相稱師古曰車馬及物皆稱其人之形三日止瀕河郡蝗生師古曰謂縁河南北諸郡瀕音頻又音賔河决魏郡泛清河以東數郡先是莽恐河决為元城冢墓害及決東去元城不憂水故遂不堤塞四年二月赦天下夏赤氣出東南竟天厭難將軍陳歆言捕虜生口虜犯邊者皆孝單于咸子角所為莽怒斬其子登于長安以視諸蠻夷師古曰視音曰示大司馬甄邯死寕始将軍孔永為大司馬侍中大贅侯輔為寕始將軍莽每當出輒先􅊧索城中名曰横􅊧師古曰索音山各反横音胡孟反是月横􅊧五日莽至明堂授諸侯茅土下書曰予以不德襲于聖祖為萬國主思安黎元在于建侯分州正域以美風俗宋祁曰分字下當有九字追監前代爰綱爰紀惟在堯典十有二州衛有五服師古曰並觧於上詩國十五抪徧九州師古曰謂周南召南衛王鄭齊魏唐秦陳鄶曹豳魯商凡十五國也一曰周南召南邶鄘衛王鄭齊魏唐秦陳鄶曺豳是為十五國抪音普胡反宋祁曰國字當作曰殷頌有奄有九有之言師古曰商頌𤣥鳥之詩美湯有功德故能覆有九州禹貢之九州無并幽周禮司馬則無徐梁宋祁曰淳化本無無并二字帝王相改各有云為或昭其事或大其本厥義著明其務一矣昔周二后受命故有東都西都之居予之受命蓋亦如之其以洛陽為新室東都常安為新室西都邦畿連體各有采任州從禹貢為九爵從周氏有五諸侯之員千有八百附城之數亦如之以俟有功諸公一同有衆萬戸土方百里侯伯一國衆戸五千土方七十里子男一則衆戸二千有五百土方五十里附城大者食邑九成衆戸九百土方三十里自九以下降殺以両師古曰兩兩而降也殺音所例反至於一成如淳曰十里為成五差備具合當一則今已受茅土者公十四人侯九十三人伯二十一人子百七十一人男四百九十七人凡七百九十六人附城千五百一十一人九族之女為任者八十三人及漢氏女孫中山承禮君遵德君脩義君更以為任十有一公九卿十二大夫二十四元士定諸國邑采之處使侍中講理大夫孔秉等與州部衆郡曉知地理圗籍者共校治于壽成朱鳥堂予數與羣公祭酒上卿親聴視咸已通矣夫襃德賞功所以顯仁賢也九族和睦所以襃親親也予永惟匪解思稽前人師古曰觧讀曰懈稽考也將章黜陟以明好惡安元元焉以圗簿未定未授國邑且令受奉都内月錢數千師古曰奉音扶用反諸侯皆困乏至有庸作者中郎區愽諫莽曰師古曰區姓也音一侯反井田雖聖王法其廢乆矣周道既衰而民不從秦知順民之心可以獲大利也故滅廬井而置阡陌遂王諸夏訖今海内未厭其敝今欲違民心追復千載絶迹師古曰復音扶目反雖堯舜復起而無百年之漸弗能行也天下初定萬民新附誠未可施行莽知民怨廼下書曰諸名食王田皆得賣之勿拘以法犯私買賣庶人者且一切勿治初五威将帥出改句町王以為侯王邯怨怒不附師古曰邯句町王之名也音下甘反莽諷牂柯大尹周歆詐殺邯邯弟承起兵攻殺歆先是莽發髙句驪兵當伐胡不欲行郡强廹之皆亡出塞因犯法為寇遼西大尹田譚追撃之為所殺州郡歸咎於髙句驪侯騶嚴尤奏言貉人犯法不從騶起正有它心宜令州郡且尉安之師古曰假令騶有惡心亦當且慰安今猥被以大罪恐其遂畔師古曰猥多也厚也被加也音皮義反夫餘之屬必有和者師古曰和應也音胡臥反匈奴未克夫餘濊貉復起此大憂也莽不尉安濊貉遂反詔尤撃之尤誘髙句驪侯騶至而斬焉傳首長安莽大説下書曰廼者命遣猛將共行天罰師古曰共讀曰恭誅滅虜知分為十二部或斷其右臂或斬其左腋或潰其胷腹或紬其兩脅師古曰紬音與抽同今年刑在東方張晏曰是嵗在壬申刑在東方誅貉之部先縱焉捕斬虜騶平定東域虜知殄滅在于漏刻此乃天地羣神社稷宗廟佑助之福公卿大夫士民同心將率虓虎之力也師古曰虓音火交反予甚嘉之其更名髙句驪為下句驪布告天下令咸知焉於是貉人愈犯邉東北與西南夷皆亂云莽志方盛以為四夷不足吞滅專念稽古之事復下書曰伏念予之皇始祖考虞帝受終文祖在璿璣玉衡以齊七政遂類于上帝禋于六宗望秩于山川徧于羣神廵狩五嶽羣后四朝敷奏以言明試以功師古曰解並在前予之受命即眞到于建國五年已五載矣陽九之阸旣度百六之㑹已過嵗在夀星塡在明堂倉龍癸酉德在中宮服䖍曰倉龍太嵗也張晏曰太嵗起於甲寅為龍東方倉癸德在中宮也晋灼曰壽星角亢也東宮倉龍房心也心為明堂塡星所在其國昌莽自謂土也土行主塡星癸德在中宫宫又土也觀晉掌嵗龜策告從孟康曰觀辰星進退掌主也晉灼曰國語晉文公以卯出酉入過五鹿得土嵗在壽星其日戊申莽欲法之以為吉祥正以二月建寅之節東廵狩者取萬物生之始也視晉識太嵗所在宿度所合卜筮皆吉故法之其以此年二月建寅之節東巡狩具禮儀調度師古曰調音徒釣反羣公奏請募吏民人馬布綿又請内郡國十二買馬發帛四十五萬匹輸常安前後毋相須師古曰湏待也至者過半莽下書曰文母太后體不安其且止待後是嵗改十一公號以新為心後又改心為信五年二月文母皇太后崩葬渭陵與元帝合而溝絶之如淳曰葬於司馬門内作溝絶之立廟於長安新室世世獻祭元帝配食坐於牀下莽為太后服喪三年大司馬孔永乞骸骨賜安車駟馬以特進就朝位同風侯逯並為大司馬是時長安民聞莽欲都雒陽不肯繕治室宅師古曰繕𥙷也或頗徹之莽曰𤣥龍石文曰定帝德國雒陽符命著明敢不欽奉以始建國八年嵗纒星紀孟康曰纒居也星紀在斗牽牛間師古曰纒踐歴也音直連反在雒陽之都其謹繕脩常安之都勿令壞敗敢有犯者輒以名聞請其罪是嵗烏孫大小昆彌遣使貢獻大昆彌者中國外孫也其胡婦子為小昆彌而烏孫歸附之莽見匈奴諸邊並侵意欲得烏孫心廼遣使者引小昆彌使置大昆彌使上保成師友祭酒滿昌劾奏使者曰夷狄以中國有禮誼故詘而服從大昆彌君也今序臣使於君使之上非所以有夷狄也奉使大不敬莽怒免昌官西域諸國以莽積失恩信焉􅂄先畔殺都護但欽十一月彗星出二十餘日不見是嵗以犯挟銅炭者多除其法明年改元曰天鳯天鳯元年正月赦天下莽曰予以二月建寅之節行廵狩之禮大官齎糒乾肉内者行張坐臥師古曰糒乾飯也張坐臥謂帷帳茵席也糒音備宋祁曰淳化本無内字新本肉字下去内者行所過毋得有所給師古曰言自齎食及帷帳以行在路所經過不須供費也予之東廵必躬載耒每縣則耕以􅂆東作師古曰耒耜曲木也音力對反宋祁曰耒字下當有耜字予之南廵必躬載耨每縣則薅以勸南偽師古曰耨鉏也薅耕去草也耨音奴豆反薅音火髙反偽讀曰訛訛化也予之西廵必躬載銍每縣則穫以勸西成予之北廵必躬載拂每縣則粟以勸盖臧師古曰拂音佛所以撃治禾者也今謂之連枷粟謂治粟畢北廵狩之禮即于土中居雒陽之都焉敢有趨讙犯法輒以軍法從事劉德曰趨讙走呼也羣公奏言皇帝至孝往年文母聖體不豫躬親供養衣冠稀解因遭弃羣臣悲哀顔色未復飲食損少今一嵗四廵道路萬里春秋尊非糒乾肉之所能堪且無廵狩須闋大服以安聖體師古曰闋盡也音口決反臣等盡力養牧兆民奉稱明詔師古曰稱副也莽曰羣公羣牧羣司諸侯庻尹願盡力相帥養牧兆民欲以稱予繇此敬德師古曰繇讀與由同其朂之哉毋食言焉更以天鳯七年嵗在大梁倉龍庚辰行廵狩之禮厥明年歳在實沈倉龍辛巳即土之中雒陽之都廼遣太傅平晏大司空王邑之雒陽營相宅兆圗起宗廟社稷郊兆云三月壬申晦日有食之大赦天下策大司馬逯並曰日食無光干戈不戢其上大司馬印韍就侯氏朝位太傅平晏勿領尚書事省侍中諸曹兼官者以利苖男訢為大司馬如淳曰利苖邑名莽即眞尤備大臣抑奪下權朝臣有言其過失者輒拔擢孔仁趙博費興等以敢撃大臣故見信任師古曰費音扶味反擇名官而居之公卿入宫吏有常數太傅平晏從吏過例掖門僕射苛問不遜師古曰僕射苛問平晏其言不遜戊曹士收繋僕射應劭曰莽自以土行故使太傅置戊曹士士掾也蘇林曰士者曹掾屬公府諸曹次第之名也師古曰應説是蕭該曰戊字案春秋説曰土戊也五行書曰戊己屬土王莽自以土行音懋莽大怒使執法發車騎數百圍太傅府捕士即時死大司空士夜過奉常亭亭長苛之告以官名亭長醉曰寕有符傳耶師古曰傳音張戀反士以馬箠撃亭長師古曰箠䇿也音止橤反亭長斬士亡郡縣逐之家上書師古曰亭長家上書自治莽曰亭長奉公勿逐大司空邑斥士以謝劉攽曰前云斬士後云斥士則非斬也疑是斫字國将哀章頗不清莽為選置和叔師古曰特為置此官敕曰非但保國將閨門當保親屬在西州者諸公皆輕賤而章尤甚四月隕霜殺屮木師古曰屮古草字海瀕尤甚師古曰邉海之地也瀕音頻又音賓六月黄霧四塞七月大風拔樹飛北闕直城門屋瓦師古曰北闕直城門瓦皆飛也直城門長安城門名也觧在成紀雨雹殺牛羊莽以周官王制之文置卒正連率大尹職如太守屬令屬長職如都尉置州牧部監二十五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆世其官其無爵者為尹分長安城旁六鄉置帥各一人分三輔為六尉郡師古曰三輔黄圗云渭城安陵以西北至栒邑義渠十縣屬京尉大夫府居故長安寺髙陵以北十縣屬師尉大夫府居故廷尉府新豐以東至湖十縣屬翊尉大夫府居城東霸陵杜陵東至藍田西至武功郁夷十縣屬光尉大夫府居城南茂陵槐里以西至汧十縣屬扶尉大夫府居城西長陵池陽以北至雲陽祋祤十縣屬列尉大夫府居城北河東河内𢎞農河南潁川南陽為六隊郡師古曰隊音遂劉奉世曰河南當為滎陽莽所分以為六隊之一也下文自有河南大尹更為保忠信卿置大夫職如太守屬正職如都尉更名河南大尹曰保忠信卿益河南屬縣滿三十置六郊州長各一人劉奉世曰當為六郊衍州字人主五縣及它官名悉改大郡至分為五郡縣以亭為名者三百六十以應符命文也縁邊又置竟尉以男為之師古曰竟讀曰境諸侯國閒田為黜陟増減云師古曰閒音閑以擬有功封賜有罪黜奪也莽下書曰常安西都曰六鄉衆縣曰六尉義陽東都曰六州劉奉世曰州當為郊衆縣曰六隊粟米之内曰内郡師古曰禹貢去王城四百里納粟五百里納米皆在甸服之内其外曰近郡有鄣徼者曰邊郡合百二十有五郡九州之内縣二千二百有三公作甸侯是為惟城諸在侯服是為惟寕在采任諸侯是為惟翰師古曰采采服也任男服也在賔服是為惟屏師古曰賓服即古衛服也取諸侯賓服以為名在揆文教奮武衛是為惟垣在九州之外是為惟藩師古曰凡此惟城以下取詩大雅板之篇云价人惟藩大師惟垣大邦惟屏大宗惟翰懷德惟寜宗子惟城以為名號也觧在諸侯王年表各以其方為稱總為萬國焉其後嵗復變更一郡至五易名而還復其故吏民不能紀每下詔書輒繋其故名曰制詔陳留大尹太尉其以益嵗以南付新平蘇林曰陳留圉縣莽改曰益嵗新平故淮陽以雍丘以東付陳定陳定故梁郡以封丘以東付治亭治亭故東郡以陳留以西付祈隧祈隧故滎陽劉奉世曰此祈隧即莽六隊之一也莽盖分河南之滎陽置郡陳留已無復有郡矣大尹太尉皆詣行在所其號令變易皆此類也令天下小學戊子代甲子為六旬首冠以戊子為元日師古曰冠音工喚反元善也昏以戊寅之旬為忌日師古曰昏謂娶妻也百姓多不從者匈奴單于知死弟咸立為單于求和親莽遣使者厚賂之詐許還其侍子登因購求陳良終𢃄等單于即執良等付使者檻車詣長安莽燔燒良等於城北令吏民㑹觀之緣邊大饑人相食諫大夫如普行邊兵師古曰行音下更反還言軍士乆屯塞苦邊郡無以相贍今單于新和宜因是罷兵校尉韓威進曰以新室之威而吞胡虜無異口中蚤蝨臣願得勇敢之士五千人不齎斗糧饑食虜肉渴飲其血可以横行莽壮其言以威為將軍然采普言徴還諸將在邊者免陳欽等十八人又罷四關塡都尉諸屯兵㑹匈奴使還單于知侍子登前誅死發兵寇邊莽復發軍屯於是邊民流入内郡為人奴婢廼禁吏民敢挟邊民者弃市益州蠻夷殺大尹程隆三邊盡反遣平蠻將軍馮茂將兵撃之寜始將軍侯輔免講易祭酒戴参為寕始將軍二年二月置酒王路堂公卿大夫皆佐酒師古曰助行酒大赦天下是時日中見星大司馬苖訢左遷司命以延德侯陳茂為大司馬訛言黄龍墮死黄山宫中百姓犇走往觀者有萬數莽惡之師古曰莽自謂黄德故有此妖捕繋問語所從起不能得單于咸既和親求其子登屍莽欲遣使送致恐咸怨恨害使者廼牧前言當誅侍子者故將軍陳欽以他辠繋獄欽曰是欲以我為説於匈奴也師古曰説觧説也託言以其前建議誅侍子今故殺之遂自殺莽選儒生能顓對者師古曰顓與專同專對謂應對無方能專其事濟南王咸為大使五威將琅邪伏黯等為帥使送登屍敕令掘單于知墓棘鞭其屍又令匈奴却塞於漠北責單于馬萬匹牛三萬頭羊十萬頭及稍所略邉民生口在者皆還之劉攽曰稍所略非辭當云所鈔略傳冩誤爾莽好為大言如此咸到單于庭陳莽威德責單于背畔之辠應敵從横單于不能詘遂致命而還之劉奉世曰之字衍入塞咸病死封其子為伯伏黯等皆為子莽意以為制定則天下自平故鋭思於地里制禮作樂講合六經之説公卿旦入暮出議論連年不決不暇省獄訟寃結民之急務縣宰缺者數年守兼師古曰不拜正官權令人守兼一切貪殘日甚宋祁曰甚下當有是時二字中郎將繡衣執法在郡國者並乘權埶傅相舉奏宋祁曰傅疑作傳又十一公士分布勸農桑班時令案諸章冠盖相望交錯道路召㑹吏民逮捕證左郡縣賦歛遞相賕賂白黒紛然師古曰白黒謂清濁也紛然亂意也言清濁不分也守闕告訴者多莽自見前顓􅁠以得漢政故務自㩜衆事師古曰㩜與擥同其字從手有司受成茍免師古曰莽事事自決成熟乃以付吏吏茍免罪責而已諸寳物名帑藏錢榖官皆宦者領之師古曰帑音他莽反又音奴吏民上封事書宦官左右開發尚書不得知其畏備臣下如此又好變改制度政令煩多當奉行者輒質問乃以從事師古曰質正也前後相乘憒眊不渫師古曰乘積也登也憒眊不明也渫㪚也徹也憒音工内反眊音莫報反莽常御燈火至明猶不能勝尚書因是為姦寢事上書待報者連年不得去拘繋郡縣者逢赦而後出衛卒不交代三嵗矣穀常貴邊兵二十餘萬人仰衣食縣官愁苦師古曰仰音牛向反五原代郡尤被其毒起為盜賊數千人為輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合撃嵗餘迺定邉郡亦略將盡師古曰言其迯亡結為盜賊在者少也邯鄲以北大雨霧水出深者數丈劉攽曰霧字疑非流殺數千人立國將軍孫建死司命趙閎為立國將軍寜始將軍戴参歸故官南城將軍㢘丹為寕始將軍三年二月乙酉地震大雨雪師古曰雨音于具反關東尤甚深者一丈竹栢或枯大司空王邑上書言視事八年功業不效司空之職尤獨廢頓至廼有地震之變願乞骸骨莽曰夫地有動有震震者有害動者不害春秋記地震易繋坤動動靜辟脅萬物生焉師古曰辟讀曰闢開也脅收歛也易上繋之辭曰夫坤其動也闢其静也翕是以廣生焉故莽引之也翕脅之聲相近義則同災異之變各有云為天地動威以戒予躬公何辜焉而乞骸骨非所以助予者也使諸吏㪚騎司禄大衛脩寜男遵諭予意焉五月莽下吏禄制度曰予遭陽九之阸百六之㑹國用不足民人騷動自公卿以下一月之祿十􅚶布二匹孟康曰􅚶八十縷也師古曰􅚶音子公反韋昭曰四秉曰莒十莒曰􅚶十􅚶為禾四百秉也或帛一匹予每念之未嘗不戚焉今阸㑹已度府帑雖未能充略頗稍給其以六月朔庚寅始賦吏禄皆如制度四輔公卿大夫士下至輿僚凡十五等僚禄一嵗六十六斛稍以差増上至四輔而為萬斛云莽又曰普天之下莫非王土率土之濵莫非王臣師古曰莽引小雅北山之詩也蓋以天下養焉周禮膳羞百有二十品令諸侯各食其同國則師古曰謂公食同侯伯食國子男食則也辟任附城食其邑師古曰辟君也任公主也辟音壁任音壬宋祁曰如淳曰辟公主也任宗室女也蕭該按爾雅曰皇王后辟君也公卿大夫元士食其采師古曰謂因官職而食地也多少之差咸有條品嵗豐穰則充其禮師古曰穰音人掌反有災害則有所損與百姓同憂喜也其用上計時通計天下幸無災害者太官膳羞備其品矣即有災害以什率多少而損膳焉宋祁曰什下當有計字東嶽太師立國將軍保東方三州一部二十五郡南嶽太傅前將軍保南方二州一部二十五郡西嶽國師寕始將軍保西方一州二部二十五郡北嶽國將衛將軍保北方二州一部二十五郡大司馬保納卿言卿仕卿作卿京尉扶尉兆隊右隊中部左洎前七部服䖍曰大司馬保此官皆如郡守也晉灼曰左與前故特七部師古曰洎亦臮字也臮及也隊音遂此下並同大司徒保樂卿典卿宗卿秩卿翼尉光尉左隊前隊中部右部有五郡大司空保予卿虞卿共卿工卿師尉列尉祈隊後隊中部洎後十郡師古曰共讀曰供劉攽曰此文誤但當云大司馬保納言卿作士卿大司徒保典樂卿秩宗卿大司空保予虞卿共工卿不合分為兩也劉奉世曰其言七部亦當云七郡然共有二十二郡尚未及二十五郡疑字當有誤及六司六卿皆随所屬之公保其災害劉奉世曰莽所六司又已有六卿此當但云司卿即所謂三公司卿曰司允司直司若者也後人不曉又妄加兩六字耳亦以十率多少而損其祿郎從官中都官吏食祿都内之委者以大官膳羞備損而為節師古曰言隨其多少諸侯辟任附城羣吏亦各保其災害幾上下同心師古曰幾讀曰冀􅂆進農業安元元焉莽之制度煩碎如此課計不可理吏終不得禄各因官職為姦受取賕賂以自共給師古曰共讀曰供是月戊辰長平館西岸崩邕涇水不流毁而北行師古曰邕讀曰壅遣大司空王邑行視師古曰行音下更反還奏狀羣臣上壽以為河圖所謂以土塡水師古曰塡讀與鎭同匈奴滅亡之祥也乃遣并州牧宋𢎞遊撃都尉任萌等将兵撃匈奴至邊止屯七月辛酉霸城門災民間所謂青門也師古曰三輔黄圖云長安城東出南頭名覇城門俗以其色青名曰青門戊子晦日有食之大赦天下復令公卿大夫諸侯二千石舉四行各一人師古曰依漢光禄之四科劉奉世曰四行盖前已舉德行言語政事文學今復令舉之非光祿四行大司馬陳茂以日食免武建伯嚴尤為大司馬如淳曰莽之伯子男號也十月戊辰王路朱鳥門鳴晝夜不絶崔發等曰虞帝闢四門通四聰師古曰虞書敘舜之德也闢四門明四目逹四聰故引之門鳴者明當脩先聖之禮招四方之士也於是令羣臣皆賀所舉四行從朱鳥門入而對䇿焉平蠻將軍馮茂撃句町士卒疾疫死者什六七賦歛民財什取五益州虚耗而不克徴還下獄死更遣寕始將軍㢘丹與庸部牧史熊撃句町頗斬首有勝莽徴丹熊丹熊願益調度必克乃還復大賦歛就都大尹馮英不肯給上言自越巂遂乆仇牛同亭邪豆之屬反畔以來積且十年服䖍曰遂乆縣名也仇牛等越巂旁夷郡縣距撃不已續用馮茂茍施一切之政僰道以南山險髙深茂多敺衆遠居師古曰敺讀與驅同費以億計吏士離毒氣死者什七師古曰離􅇜也今丹熊懼於自詭期㑹師古曰詭責也自以為憂責調發諸郡兵穀復訾民取其十四師古曰𤼵人訾財十取其四也空破梁州功終不遂師古曰遂成也宜罷兵屯田宋祁曰宜或作一旦者非是明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英為長沙連率翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剝之師古曰刳剖也音口胡反量度五􅆇師古曰度音徒各反以竹筳導其脉知所終始云可以治病師古曰筳竹挺也音廷以知血脉之原則盡攻療之道也宋祁曰蕭該音義鄭氏曰筳音平訂之訂筳草也予案字書曰訂評議也音亭字林曰筳繀絲管也大丁反是嵗遣大使五威將王駿西域都護李崇将戊巳校尉出西域諸國皆郊迎貢獻焉諸國前殺都護但欽駿欲襲之命佐帥何封戊巳校尉郭欽别將師古曰别領兵在後也將音子亮反焉耆詐降伏兵撃駿等皆死欽封後到襲撃老弱從車師還入塞莽拜欽為塡外將軍師古曰塡音竹刃反封劋胡子師古曰劋音子小反韋昭曰又作剼音芟何封為集胡男西域自此絶前漢書卷九十九中前漢書卷九十九中考證王莽傳中始建國元年顧炎武曰荀悦漢紀記莽事自始建國元年以後則云其二年其三年以至其十五年以别於正統而盡沒其天鳯地皇之號中傅將孺子下殿後書注引前書音義中傅宦者也又置司恭司徒臣召南按此司徒當作司從與聰明恭一例舊本别本俱誤耳惟王氏虞帝之後也出自帝嚳劉氏堯之後也出自顓頊按謂舜出于嚳堯出于頊莽于是直誣古帝矣遣五威將王竒等十二人班符命云云臣召南按五威將十二人其將一人各有帥五人故下文云五威將帥七十二人還奏事也并州平州尤甚胡三省曰此時未有平州漢末公孫度自稱平州牧魏始分幽州置平州平字誤也前漢書卷九十九中考證欽定四庫全書前漢書卷九十九下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注王莽傳第六十九下四年五月莽曰保成師友祭酒唐林故諫議祭酒琅邪紀逡師古曰逡音千旬反字或從彳其音同耳孝弟忠恕敬上愛下博通舊聞徳行醇備至於黄髮靡有愆失師古曰黄髮老稱謂白髮盡落更生黄者其封林為建徳侯逡為封徳侯位皆特進見禮如三公師古曰朝見之禮賜第一區錢三百萬授几杖焉六月更授諸侯茅土於明堂曰予制作地理建封五等考之經蓺合之傳記通於義理宋祁曰考之合之下各當添於字通字下當添之字論之思之至於再三自始建國之元以來九年于兹廼今定矣予親設文石之平陳菁茅四色之土師古曰尚書禹貢苞匭菁茅儒者以為菁菜名也茅三脊茅也而莽此言以菁茅為一物則是謂善茅為菁茅也土有五色而此云四者中央之土不以封也菁音精欽吿于岱宗泰社后土先祖先妣以班授之師古曰欽敬也班布也各就厥國養牧民人用成功業其在緣邊若江南非詔所召遣侍于帝城者納言掌貨大夫且調都内故錢予其祿師古曰調謂發取之音徒釣反次下亦同公歳八十萬侯伯四十萬子男二十萬然復不能盡得莽好空言慕古法多封爵人性實遴嗇師古曰遴讀與吝同託以地理未定故且先賦茅土用慰喜封者是歳復明六筦之令每一筦下為設科條防禁犯者罪至死吏民抵罪者寖衆又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁盜賊起宋祁曰起上當有興字納言馮常以六筦諫莽大怒免常官置執法左右刺姦選用能吏侯霸等分督六尉六隊師古曰督察也隊音遂如漢刺史與三公士郡一人從事臨淮瓜田儀等為盜賊依阻㑹稽長州服䖍曰姓瓜田名儀師古曰長州即枚乗所云長州之苑琅邪女子吕母亦起初吕母子為縣吏為宰所􅁈殺師古曰宰縣令母散家財以酤酒買兵弩師古曰酤音姑隂厚貧窮少年得百餘人遂攻海曲縣殺其宰以祭子墓引兵入海其衆浸多後皆萬數莽遣使者即赦盜賊還言盜賊解輙復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起為盜賊莽大怒免之其或順指言民驕黠當誅及言時運適然且滅不久莽說輙遷之師古曰說讀曰悅是歳八月莽親之南郊鑄作威斗威斗者以五石銅為之李奇曰以五色藥石及銅為之蘇林曰以五色銅鑛治之師古曰李說是也若今作鍮石之為若北斗長二尺五寸欲以厭勝衆兵師古曰厭音一葉反既成令司命負之莽出在前入在御旁鑄斗日大寒百官人馬有凍死者五年正月朔北軍南門災以大司馬司允費興為荆州牧見問到部方略興對曰荆揚之民率依阻山澤以漁采為業師古曰漁謂捕魚也采謂采取蔬果之屬間者國張六筦稅山澤妨奪民之利連年久旱百姓饑窮故為盜賊興到部欲令明曉吿盜賊歸田里假貸犂牛種食師古曰貸音土戴反闊其租賦師古曰闊寛也幾可以解釋安集師古曰幾讀曰冀莽怒免興官天下吏以不得奉祿並為姦利郡尹縣宰家累千金莽下詔曰詳考始建國二年胡虜猾夏以來諸軍吏及緣邊吏大夫以上為姦利增產致富者收其家所有財產五分之四以助邊急公府士馳傳天下考覆貪饕師古曰傳音張戀反饕音吐髙反開吏告其將奴婢吿其主幾以禁姦師古曰幾讀曰冀姦愈甚皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存己夏處南山臧薄冰文穎曰祉福祚也冠存己欲襲代也應劭曰夏處南山就隂涼也臧薄冰亦以除暑也二曰肅聖寳繼應劭曰莽自謂承聖舜後能肅敬得天寳龜以立宗欲繼其緒三曰徳封昌圖蘇林曰宗自言以徳見封當遂昌熾受天下圖籍又宗舅呂寛家前徙合浦私與宗通發覺按驗宗自殺莽曰宗屬為皇孫爵為上公知寛等叛逆族類而與交通刻銅印三文意甚害不知厭足窺欲非望春秋之義君親毋將將而誅焉師古曰春秋公羊傳之辭也以公子牙將為弑逆而誅之故云然也親謂父母也迷惑失道自取此辜嗚呼哀哉宗本名會宗以制作去二名今復名會宗貶厥爵改厥號賜諡為功崇繆伯以諸侯之禮葬于故同穀城郡師古曰同者宗所封一同之地宗姊妨為衞將軍王興夫人祝詛姑殺婢以絶口事發覺莽使中常侍䠠惲責問妨師古曰䠠音帶又音徒蓋反并以責興皆自殺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乘乾車駕坤馬左蒼龍右白虎前朱鳥宋祁曰鳥當作雀後𤣥武右杖威節左負威斗號曰赤星非以驕仁廼以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其好怪如此師古曰言莽性好為鬼神怪異之事以直道侯王渉為衞將軍渉者曲陽侯根子也根成帝世為大司馬薦莽自代莽恩之師古曰懐其舊恩也以為曲陽非令稱師古曰令善也曲陽之名非善稱也乃追諡根曰直道讓公渉嗣其爵是嵗赤眉力子都樊崇等劉攽曰力當作刁以饑饉相聚起於琅邪轉鈔掠衆皆萬數遣使者發郡國兵擊之不能克六年春莽見盜賊多乃令太史推三萬六千歳歴紀六歳一改元布天下下書曰紫閣圖曰太一黄帝皆僊上天師古曰僊古仙字上升也張樂崑崙䖍山之上後世聖主得瑞者當張樂秦終南山之上服䖍云長安南山詩所謂終南故秦地故言秦也予之不敏奉行未明乃今諭矣復以寧始將軍為更始將軍以順符命易不云乎日新之謂盛徳生生之謂易李奇曰易道生諸當生者也師古曰下繫之辭體化合變故曰日新予其饗哉欲以誑燿百姓銷解盜賊衆皆笑之宋祁曰笑當作咲初獻新樂於明堂太廟羣臣始冠麟韋之弁李奇曰鹿皮冠或聞其樂聲曰清厲而哀非興國之聲也是時關東饑旱數年力子都等黨衆􅎊多師古曰䆮漸也更始將軍廉丹擊益州不能克徵還更遣復位後大司馬護軍郭興庸部牧李曅擊蠻夷若豆等太傅羲叔士孫喜清潔江湖之盜賊而匈奴寇邊甚莽乃大募天下丁男及死罪囚吏民奴名曰豬突豨勇以為銳卒一切稅天下吏民訾三十取一縑帛皆輸長安令公卿以下至郡縣黄綬皆保養軍馬師古曰保者言不許其有死失多少各以秩為差又博募有奇技術可以攻匈奴者將待以不次之位言便宜者以萬數或言能度水不用舟楫師古曰楫所以刺舟也音集其字從木連馬接騎濟百萬師或言不持斗糧服食藥物三軍不饑或言能飛一日千里可窺匈奴莽輙試之取大鳥翮為兩翼師古曰羽本曰翮音胡隔反頭與身皆著毛通引環紐飛數百歩墮莽知其不可用茍欲獲其名皆拜為理軍賜以車馬待發初匈奴右骨都侯須卜當其妻王昭君女也嘗内附莽遣昭君兄子和親侯王歙誘呼當至塞下脅將詣長安强立以為須卜善于後安公師古曰善于者匈奴之號也後安公者中國之爵兩加之始欲誘迎當大司馬嚴尤諫曰當在匈奴右部兵不侵邊單于動静輙語中國此方面之大助也于今迎當置長安槀街一胡人耳師古曰槀街蠻夷館所在也解在陳湯傳槀音工早反不如在匈奴有益莽不聽既得當欲遣尤與廉丹擊匈奴皆賜姓徵氏號二徵將軍當誅單于輿而立當代之師古曰輿者時見為單于之名出車城西横廐未發尤素有智略非莽攻伐四夷數諌不從著古名將樂毅白起不用之意及言邊事凡三篇奏以風諫莽師古曰風讀曰諷及當出廷議尤固言匈奴可且以為後先憂山東盜賊莽大怒乃策尤曰視事四年蠻夷猾夏不能遏絶㓂賊姦宄不能殄滅不畏天威不用詔命皃佷自臧持必不移師古曰皃古貌字也皃佷言其佷戾見於容貌也臧善也自以為善而固持其所見不可移易懷執異心非沮軍議師古曰沮壞也音材汝反未忍致于理其上大司馬武建伯印韍師古曰韍者印之組歸故郡以降符伯董忠為大司馬翼平連率田況奏郡縣訾民不實師古曰舉百姓訾財不以實數莽復三十稅一以況忠言憂國進爵為伯賜錢二百萬衆庶皆詈之宋祁曰詈當作罵青徐民多弃鄉里流亡老弱死道路壯者入賊中夙夜連率韓博上言有奇士長丈大十圍來至臣府曰欲奮擊胡虜自謂巨毋霸出於蓬萊東南五城西北昭如海瀕師古曰昭如海名也瀕涯也音頻又音賓軺車不能載三馬不能勝即日以大車四馬建虎旗載霸詣闕霸臥則枕鼔以鐵著食宋祁曰南本云臥則枕數尺鐵非是此皇天所以輔新室也願陛下作大甲髙車賁育之衣遣大將一人與虎賁百人迎之於道京師門戸不容者開髙大之以視百蠻師古曰視讀曰示鎮安天下博意欲以風莽晉灼曰諷言毋得簒盜而霸莽聞惡之留霸在所新豐師古曰在所謂其見到之處更其姓曰巨母氏謂因文母太后而霸王符也師古曰莽字巨君若言文母出此人使我致霸王徵博下獄以非所宜言弃市明年改元曰地皇從三萬六千歳歴號也地皇元年正月乙未赦天下下書曰方出軍行師敢有趨讙犯法者輙論斬毋須時師古曰趨讙謂趨走而讙譁也須待也盡歳止師古曰至此歳盡而止於是春夏斬人都市百姓震懼道路以目二月壬申日正黑莽惡之下書曰廼者日中見昧隂薄陽黑氣為變宋祁曰蕭該音義曰昧字林云日旁作未言昧爽旦明也日闇昧云昧升勺後星也音芒太反予案易曰日中見沫非音昧也當音芒太反百姓莫不驚怪兆域大將軍王匡劉奉世曰兆域二字無理當是北城字衍大字前有南城將軍此王匡又别一王匡也遣吏考問上變事者欲蔽上之明是以適見于天師古曰適音謫謫責也音徒戹反見音胡電反以正于理塞大異焉莽見四方盜賊多復欲厭之師古曰厭音一葉反又下書曰予之皇初祖考黄帝定天下將兵為上將軍建華蓋立斗獻師古曰獻音羲謂斗魁及杓末如勺之形也内設大將外置大司馬五人大將軍二十五人偏將軍百二十五人裨將軍千二百五十人校尉萬二千五百人司馬三萬七千五百人侯十一萬二千五百人當百二十二萬五千人晉灼曰當亦官名也師古曰當百官名百非其數士吏四十五萬人士千三百五十萬人晉灼曰自五大司馬至此皆以五乘之也師古曰晉說非也從上計之或五或十或兩或三應協於易弧矢之利以威天下師古曰易下繫辭曰弦木為弧剡木為矢弧矢之利以威天下言所立將率以合此意木弓曰弧予受符命之文稽前人將條備焉師古曰稽考也考法於前人也於是置前後左右中大司馬之位賜諸州牧號為大將軍郡卒正連帥大尹為偏將軍屬令長裨將軍宋祁曰卒字當作率縣宰為校尉乘傳使者經歴郡國日且十輩師古曰傳音張戀反次下亦同倉無見穀師古曰見謂見在也以給傳車馬不能足賦取道中車馬師古曰於道中行者即執取之以充事也劉攽曰以給當屬上句取辦於民七月大風毁王路堂復下書曰乃壬午晡時有烈風雷雨發屋折木之變師古曰烈風暴烈之風予甚弁焉予甚栗焉予甚恐焉師古曰弁疾也一曰弁撫手也言驚懼也伏念一旬迷廼解矣師古曰先言烈風雷雨後言迷廼解矣蓋取舜納于大麓烈風雷雨不迷以為言也昔符命文立安為新遷王服䖍曰安莽第三子也遷音仙莽改汝南新蔡曰新遷師古曰遷猶僊耳不勞假借音臨國雒陽為統義陽王是時予在攝假謙不敢當而以為公其後金匱文至議者皆曰臨國雒陽為統謂據土中為新室統也宜為皇太子自此後臨久病雖瘳不平朝見㧬茵輿行服虔曰有疾以執茵輿之行也晉灼曰漢儀注皇后媫妤乘輦餘者以茵四人舉以行豈今之板輿而鋪茵乎師古曰晉說非也此直謂坐茵褥之上而令四人對舉茵之四角輿而行何謂板輿乎見王路堂者張於西廂及後閣更衣中李奇曰張帳也晉灼曰更衣中謂朝賀易衣服處室屋名也又以皇后被疾臨且去本就舍妃妾在東永巷師古曰言臨侍疾故去其本所居而來就此止息是以妃妾在東永巷也壬午烈風毁王路西廂及後閣更衣中室昭寧堂池東南榆樹大十圍東僵擊東閣閣即東永巷之西垣也皆破折瓦壞發屋㧞木予甚驚焉又候官奏月犯心前星厥有占予甚憂之伏念紫閣圖文太一黃帝皆得瑞以僊後世襃主當登終南山李奇曰襃主大主也所謂新遷王者乃太一新遷之後也服䖍曰太一黄帝欲令安追繼其後也統義陽王乃用五統以禮義登陽上遷之後也臨有兄而稱太子名不正宣尼公曰名不正則言不順至於刑罰不中民無錯手足師古曰論語載孔子對子路之言錯安置也音千故反莽追諡孔子為襃成宣尼公惟即位以來隂陽未和風雨不時數遇枯旱蝗螟為災穀稼鮮耗百姓苦饑師古曰鮮少也耗虛也鮮音先踐反耗音火到反蠻夷猾夏寇賊姦宄人民正營無所措手足師古曰正營惶恐不安之意也正音征深惟厥咎在名不正焉其立安為新遷王臨為統義陽王幾以保全二子師古曰幾讀曰冀子孫千億外攘四夷内安中國焉是月杜陵便殿乘輿虎文衣廢臧在室匣中者師古曰匣匱也音狎出自樹立外堂上師古曰樹竪也良久乃委地吏卒見者以聞莽惡之下書曰寶黄厮赤服䖍曰以黄為寶自用其行氣也厮赤厮役賤者皆衣赤賤漢行也其令郎從官皆衣絳望氣為數者多言有土功象莽又見四方盜賊多欲視為自安能建萬世之基者師古曰視音示乃下書曰予受命遭陽九之戹百六之㑹府帑空虛百姓匱乏宗廟未修且祫祭於明堂太廟夙夜永念非敢寧息深惟吉昌莫良於今年予乃卜波水之北郎池之南惟玉食劉徳曰長安南也晉灼曰黄圖波郎二水名也在甘泉苑中師古曰晉說非也黄圖有西波池郎池皆在石城南上林中玉食謂龜為玉兆之文而墨食也波音彼皮反予又卜金水之南明堂之西亦惟玉食予將親築焉於是遂營長安城南師古曰蓋所謂金水之南明堂之西提封百頃九月甲申莽立載行視師古曰立載謂立而乘車也行音下更反親舉築三下司徒王尋大司空王邑持節及侍中常侍執法杜林等數十人將作師古曰將領築作之人崔發張邯說莽曰徳盛者文縟師古曰文禮文也縟繁也音辱宜崇其制度宣視海内師古曰視讀曰示且令萬世之後無以復加也莽乃博徵天下工匠諸圖畫以望法度算及吏民以義入錢穀􅂇作者駱驛道路師古曰駱驛言不絶壞徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽祿館凡十餘所師古曰自建章以下至陽祿皆上林苑中館劉攽曰建章與宫同名疑當是字悞取其材瓦以起九廟是月大雨六十餘日令民入米六百斛為郎其郎吏增秩賜爵至附城九廟一曰黄帝太初祖廟二曰帝虞始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王世祖昭廟五曰濟北愍王王祖穆廟凡五廟不墮云師古曰墮毁也音火規反六曰濟南伯王尊禰昭廟七曰元城孺王尊禰穆廟八曰陽平頃王戚禰昭廟九曰新都顯王戚禰穆廟殿皆重屋太初祖廟東西南北各四十丈髙十七丈餘廟半之為銅薄櫨師古曰薄櫨柱上枅即今所謂㭼也櫨音盧飾以金銀琱文師古曰琱字與彫同窮極百工之巧帶高增下師古曰本因高地而建立之其旁下者更增築宋祁曰帶當作本功費數百鉅萬卒徒死者萬數鉅鹿男子馬適求等謀舉燕趙兵以誅莽師古曰馬適姓也求名也大司空士王丹發覺以聞莽遣三公大夫逮治黨與師古曰逮逮捕之也已解於上連及郡國豪傑數千人皆誅死封丹為輔國侯自莽為不順時令百姓怨恨莽猶安之又下書曰惟設此壹切之法以來常安六鄉巨邑之都枹鼔稀鳴盜賊衰少師古曰巨大也枹所以擊鼓者也音孚其字從木百姓安土嵗以有年此乃立權之力也今胡虜未滅誅蠻僰未絶焚江湖海澤麻沸盜賊未盡破殄師古曰麻沸言如亂麻而沸涌又興奉宗廟社稷之大作民衆動搖今復壹切行此令盡二年止之以全元元救愚姦是嵗罷大小錢更行貨布長二寸五分廣一寸直貨錢二十五貨錢徑一寸重五銖枚直一兩品竝行敢盜鑄錢及偏行布貨伍人知不發舉皆没入為官奴婢師古曰伍人同伍之人若今伍保者也宋祁曰淳化本景本入字下有官字太傅平晏死以予虞唐尊為太傅尊曰國虛民貧咎在奢泰乃身短衣小褏乘牝馬柴車師古曰柴車即棧車藉槀瓦器師古曰藉槀去蒲蒻也瓦器以瓦為食器又以歴遺公卿師古曰以瓦器盛食遺公卿也出見男女不異路者尊自下車以象刑赭幡汙染其衣師古曰赭幡以赭汁漬巾幡莽聞而說之師古曰說讀曰悅下詔申敕公卿思與厥齊師古曰令與尊同此操行也論語稱孔子曰見賢思齊故莽云然封尊為平化侯是時南郡張霸江夏羊牧王匡等起雲杜綠林號曰下江兵晉灼曰本起江夏雲杜縣後分西上入南郡屯藍田故號下江兵也衆皆萬餘人武功中水鄉民三舎墊為池師古曰墊䧟也音丁念反二年正月以州牧位三公刺舉怠解師古曰解讀曰懈更置牧監副秩元士冠法冠行事如漢刺史是月莽妻死諡曰孝睦皇后葬渭陵長夀園西令永侍文母名陵曰億年初莽妻以莽數殺其子涕泣失明莽令太子臨居中養焉莽妻旁侍者原碧莽幸之後臨亦通焉恐事泄謀共殺莽臨妻愔國師公女師古曰愔音一尋反能為星語臨宫中且有白衣㑹臨喜以為所謀且成後貶為統義陽王出在外第愈憂恐㑹莽妻病困臨予書曰上於子孫至嚴前長孫中孫年俱三十而死師古曰中讀曰仲今臣臨復適三十誠􅂲一旦不保中室則不知死命所在李奇曰中室臨之母也晉灼曰長樂宫中殿也師古曰二說皆非也中室室中也臨自言欲於室中自保全不可得耳莽候妻疾見其書大怒疑臨有惡意不令得會䘮既葬收原碧等考問具服姦謀殺狀莽欲秘之使殺案事使者司命從事埋獄中家不知所在賜臨藥臨不肯飲自刺死使侍中票騎將軍同說侯林賜魂衣璽韍師古曰說讀曰恱策書曰符命文立臨為統義陽王此言新室即位三萬六千嵗後為臨之後者乃當龍陽而起前過聽議者以臨為太子有烈風之變輙順符命立為統義陽王在此之前自此之後不作信順弗䝉厥佑夭年隕命嗚呼哀哉迹行賜諡諡曰繆王又詔國師公臨本不知星事從愔起愔亦自殺是月新遷王安病死初莽為侯就國時幸侍者增秩懷能開明懷能生男興増秩生男匡女曅開明生女㨗皆留新都國以其不明故也師古曰言侍者或與外人私通所生子女不可分明也及安疾甚莽自病無子為安作奏使上言興等母雖微賤屬猶皇子不可以棄章視羣公師古曰視讀曰示以所上之章徧示之皆曰安友于兄弟師古曰友愛也善兄弟曰友宜及春夏加封爵於是以王車遣使者迎興等封興為功修公匡為功建公曅為睦修任㨗為睦逮任孫公明公夀病死旬月四䘮焉莽壞漢孝武孝昭廟分葬子孫其中魏成大尹李焉與卜者王況謀況謂焉曰新室即位以來民田奴婢不得賣買數改錢貨徴發煩數軍旅騷動四夷竝侵百姓怨恨盜賊竝起漢家當復興君姓李李音徴徴火也師古曰徴音竹里反當為漢輔因為焉作䜟書言文帝發忿居地下趣軍北告匈奴南告越人師古曰趣讀曰促江中劉信執敵報怨復續古先四年當發軍江湖有盜自稱樊王姓為劉氏萬人成行師古曰行音胡郎反不受赦令欲動秦雒陽十一年當相攻太白揚光嵗星入東井其號當行師古曰號謂號令也又言莽大臣吉凶各有日期㑹合十餘萬言焉令吏寫其書吏亡告之莽遣使者即捕焉獄治皆死三輔盜賊麻起師古曰言起者如亂麻也乃置捕盜都尉官令執法謁者追擊長安中建鳴鼔攻賊幡而使者隨其後遣太師羲仲景尚更始將軍護軍王黨將兵擊青徐國師和仲曹放助郭興撃句町轉天下穀幣詣西河五原朔方漁陽每一郡以百萬數欲以撃匈奴秋隕霜殺菽闗東大饑蝗民犯鑄錢伍人相坐沒入為官奴婢其男子檻車兒女子歩以鐵鎻琅當其頸𫝊詣鍾官以十萬數師古曰琅當長鏁也鍾官主鑄錢之官也到者易其夫婦師古曰改相配匹不依其舊也愁苦死者什六七孫熹景尚曹放等撃賊不能克軍師放縱百姓重困師古曰重音直用反莽以王況䜟言荆楚當興李氏為輔欲厭之師古曰厭音一葉反廼拜侍中掌牧大夫李棽為大將軍揚州牧賜名聖師古曰改其舊名以聖代䜟棽音所林反使將兵奮撃上谷儲夏自請願說瓜田儀服䖍曰儲夏人姓也劉奉世曰注脫一名字莽以為中郎使出儀師古曰說之令自出儀文降未出而死師古曰上文書言降而身未出莽求其尸葬之為起冢祠室諡曰瓜寧殤男㡬以招來其餘師古曰㡬讀曰冀然無肯降者閏月丙辰大赦天下天下大服民私服在詔書前亦釋除張晏曰莽妻本以此嵗死天下大服也私服自䘮其親皆除之郎陽成脩獻符命言繼立民母又曰黄帝以百二十女致神僊莽於是遣中散大夫謁者各四十五人分行天下師古曰行音下更反博采鄉里所髙有淑女者上名莽夢長樂宫銅人五枚起立莽惡之念銅人銘有皇帝初兼天下之文即使尚方工鐫滅所夢銅人膺文師古曰鐫鑿也音子全反又感漢髙廟神靈師古曰謂夢見譴責遣虎賁武士入髙廟㧞劍四面提撃師古曰提擲也音徒計反斧壞户牖師古曰以斧斫壞之桃湯赭鞭鞭灑屋壁師古曰桃湯灑之赭鞭鞭之也赭赤也令輕車校尉居其中又令中軍北壘居髙寢師古曰徙北軍壘之兵士於髙廟寢中屯居也或言黄帝時建華蓋以登僊莽乃造華蓋九重髙八丈一尺金瑵羽葆師古曰瑵讀曰爪謂蓋弓頭為爪形載以祕機四輪車服䖍曰蓋髙八丈其杠皆有屈膝可上下屈伸也師古曰言潛為機闗不使外見故曰祕機也駕六馬力士三百人黄衣幘車上人撃鼔輓者皆呼登仙莽出令在前百官竊言此似輀車非僊物也師古曰輀車載䘮車音而是嵗南郡秦豐衆且萬人平原女子遲昭平能說經博以八投服䖍曰博奕經以八箭投之亦聚數千人在河阻中莽召問羣臣禽賊方略皆曰此天囚行尸命在漏刻故左將軍公孫祿徴來與議師古曰與讀曰豫祿曰太史令宗宣典星歴候氣變以凶為吉亂天文誤朝廷太傅平化侯飾虛偽以媮名位賊夫人之子師古曰論語稱子路使子羔為費宰孔子曰賊夫人之子言羔未知政道而使宰邑所以賊害也故祿引此而言宋祁曰侯下當有唐尊二字國師嘉信公顛倒五經毁師法令學士疑惑明學男張邯地理侯孫陽造井田使民棄土業羲和魯匡設六筦以窮工商說符侯崔發阿䛕取容令下情不上通宜誅此數子以慰天下又言匈奴不可攻當與和親臣恐新室憂不在匈奴而在封域之中也莽怒使虎賁扶祿出然頗采其言左遷魯匡為五原卒正以百姓怨非故六筦非匡所獨造莽厭衆意而出之師古曰厭滿也音一艷反初四方皆以饑寒窮愁起為盜賊稍稍羣聚常思嵗孰得歸鄉里衆雖萬數亶稱巨人從事三老祭酒師古曰亶讀曰但言不為大號不敢略有城邑轉掠求食日闋而已師古曰闋盡也隨曰而盡也闋音空穴反諸長吏牧守皆自亂鬭中兵而死師古曰中傷也賊非敢欲殺之也而莽終不諭其故師古曰不曉此意也是嵗大司馬士按章豫州師古曰有上章相告者就而按治之為賊所獲賊送付縣士還上書具言狀莽大怒下獄以為誣罔因下書責七公曰夫吏者理也宣徳明恩以牧養民仁之道也抑强督姦捕誅盜賊義之節也師古曰督謂察視也今則不然盜發不輙得至成羣黨遮略乘𫝊宰士師古曰𫝊音張戀反士得脫者又妄自言我責數賊何故為是師古曰數音所具反賊曰以貧窮故耳賊護出我今俗人議者率多若此惟貧困饑寒犯法為非大者羣盜小者偷穴不過二科師古曰穴謂穿牆為盜也今乃結謀連黨以千百數是逆亂之大者豈饑寒之謂邪七公其嚴敕卿大夫卒正連率庶尹謹牧養善民急捕殄盜賊有不同心并力疾惡黜賊而妄曰饑寒所為輒捕繋請其罪於是羣下愈恐莫敢言賊情者亦不得擅發兵賊由是遂不制唯翼平連率田況素果敢發民年十八以上四萬餘人授以庫兵與刻石為約赤糜聞之不敢入界師古曰糜眉也以朱塗眉故曰赤眉古字通用況自劾奏莽讓況師古曰讓責也未賜虎符而擅發兵此弄兵也厥辠乏興師古曰擅發之罪與乏軍興同科也以況自詭必禽滅賊故且勿治師古曰詭責也自以為憂責後況自請出界撃賊所嚮皆破莽以璽書令況領青徐二州牧事況上言盜賊始發其原甚微非部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽略不輒督責遂至延曼連州師古曰延音弋戰反曼與蔓同乃遣將率多發使者𫝊相監趣師古曰趣讀曰促郡縣力事上官應塞詰對師古曰力勤也塞當也共酒食具資用以救斷斬師古曰交懼斬死之刑也共讀曰供宋祁曰交懼斷死罪之刑也不給復憂盜賊治官事師古曰給暇也將率又不能躬率吏士戰則為賊所破吏氣寖傷徒費百姓師古曰䆮漸也前幸蒙赦令賊欲解散或反遮撃恐入山谷轉相告語故郡縣降賊皆更驚駭恐見詐滅因饑饉易動旬日之閒更十餘萬人此盜賊所以多之故也今雒陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭少則亡以威視逺方師古曰視讀曰示宜急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積臧榖食并力固守賊来攻城則不能下所過無食埶不得羣聚如此招之必降撃之則滅今空復多出將率郡縣苦之反甚於賊宜盡徴還乘𫝊諸使者以休息郡縣委任臣況以二州盜賊必平定之莽畏惡況隂為發代遣使者賜況璽書使者至見況因令代監其兵況隨使者西到拜為師尉大夫況去齊地遂敗三年正月九廟蓋構成納神主莽謁見大駕乘六馬以五采毛為龍文衣著角長三尺師古曰以被馬上也華蓋車元戎十乘在前因賜治廟者司徒大司空錢各千萬侍中中常侍以下皆封封都匠仇延為邯淡里附城師古曰都匠大匠也邯音胡敢反淡音大敢反豐盛之意二月霸橋災數千人以水沃救不滅莽惡之下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王徳運也伯者繼空續乏以成歴數故其道駁師古曰伯讀曰霸惟常安御道多以所近為名廼二月癸巳之夜甲午之辰火燒霸橋從東方西行至甲午夕橋盡火滅大司空行視考問或云寒民舍居橋下師古曰舍止宿也疑以火自燎為此災也師古曰燎謂炙令腝也其明旦即乙未立春之日也予以神明聖祖黄虞遺統受命至于地皇四年為十五年正以三年終冬絶滅霸駁之橋欲以興成新室統壹長存之道也又戒此橋空東方之道今東方嵗荒民饑道路不通東岳太師亟科條師古曰亟急也開東方諸倉賑貸窮乏以施仁道其更名霸館為長存館霸橋為長存橋是月赤眉殺太師羲仲景尚闗東人相食四月遣太師王匡更始將軍㢘丹東師古曰東謂東出也祖都門外師古曰祖道送匡丹都門外天大雨霑衣上長老歎曰是謂泣軍莽曰惟陽九之阸與害氣㑹究于去年枯旱霜蝗饑饉薦臻師古曰薦讀曰荐荐仍也百姓困乏流離道路於春尤甚予甚悼之今使東岳太師特進襃新侯開東方諸倉賑貸窮乏太師公所不過道分遣大夫謁者並開諸倉以全元元太師公因與㢘丹大使五威司命位右大司馬更始將軍平均侯之兖州填撫所掌師古曰之徃也填音竹刃反及青徐故不軌盜賊未盡解散後復屯聚者皆清潔之期於安兆黎矣師古曰黎庶也太師更始合將銳士十餘萬人所過放縱東方為之語曰寧逢赤眉不逢太師太師尚可更始殺我卒如田況之言莽又多遣大夫謁者分敎民煑草木為酪酪不可食重為煩費師古曰重音直用反莽下書曰惟民困乏雖溥開諸倉以賑贍之猶恐未足其且開天下山澤之防諸能采取山澤之物而順月令者其恣聽之勿令出稅至地皇三十年如故是王光上戊之六年也孟康曰戊土也莽所作歴名如令豪吏猾民辜而攉之小民弗䝉非予意也師古曰辜攉謂獨専其利而令他人犯者得罪辜也易不云乎損上益下民說旡疆師古曰益卦彖辭也言損上以益下則人皆歡恱無窮竟書云言之不從是謂不艾師古曰洪範之言艾讀曰乂乂治也咨虖羣公可不憂哉師古曰咨者嘆息之言是時下江兵盛新市朱鮪平林陳牧等皆復聚衆攻撃鄉聚莽遣司命大將軍孔仁部豫州納言大將軍嚴尤秩宗大將軍陳茂撃荆州各從吏士百餘人乘舡從渭入河宋祁曰越本士作七舡當作船至華隂廼出乘𫝊到部募士尤謂茂曰遣將不與兵符必先請而後動是猶紲韓盧而責之獲也師古曰紲繋也韓盧古韓國之名犬也黒色曰盧夏蝗從東方来蜚蔽天師古曰蜚古飛字至長安入未央宫緣殿閣莽發吏民設購賞捕撃莽以天下榖貴欲厭之師古曰厭音一葉反為大倉置衛交㦸名曰政始掖門流民入闗者數十萬人廼置養贍官稟食之師古曰稟給也食讀曰飤使者監領與小吏共盜其禀饑死者十七八先是莽使中黄門王業領長安市買賤取於民民甚患之業以省費為功賜爵附城莽聞城中饑饉以問業業曰皆流民也乃市所賣粱飰肉羮持入視莽師古曰視讀曰示曰居民食咸如此莽信之冬無鹽索盧恢等舉兵反城師古曰索盧姓也恢名也反城據城以反也一曰反音幡今語賊猶曰幡城索音先各反㢘丹王匡攻㧞之斬首萬餘級莽遣中郎將奉璽書勞丹匡進爵為公封吏士有功者十餘人赤眉别校董憲等衆數萬人在梁郡王匡欲進撃之㢘丹以為新㧞城罷勞師古曰罷讀曰疲當且休士養威匡不聽引兵獨進丹隨之合戰成昌師古曰成昌地名也兵敗匡走丹使吏持其印韍符節付匡曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人别鬭聞之皆曰㢘公己死吾誰為生馳犇賊皆戰死師古曰犇古奔字也莽傷之下書曰惟公多擁選士精兵衆郡駿馬倉榖帑藏皆得自調師古曰謂發取也音徒釣反忽於詔策離其威節騎馬呵譟師古曰忽謂怠忘也譟羣呼也音先到反為狂刅所害烏呼哀哉賜諡曰果公國將哀章謂莽曰皇祖考黄帝之時中黄直為將破殺蚩尤今臣居中黄直之位願平山東莽遣章馳東與太師匡并力又遣大將軍陽浚守敖倉司徒王尋將十餘萬屯雒陽填南宫師古曰填音竹刃反大司馬董忠養士習射中軍北壘大司空王邑兼三公之職司徒尋初發長安宿霸昌廐師古曰霸昌觀之廐也三輔黄圖曰在城外也亡其黄鉞尋士房揚素狂直廼哭曰此經所謂䘮其齊斧者也應劭曰齊利也亡其利斧言無以復斷斬也師古曰此易巽卦上九爻辭自劾去莽撃殺揚四方盜賊徃徃數萬人攻城邑殺二千石以下太師王匡等戰數不利莽知天下潰畔事窮計迫廼議遣風俗大夫司國憲等分行天下師古曰行音下更反除井田奴婢山澤六筦之禁即位以来詔令不便於民者皆收還之待見未發會世祖與兄齊武王伯升宛人李通等師古曰世祖謂光武皇帝帥舂陵子弟數千人招致新市平林朱鮪陳牧等合攻㧞棘陽是時嚴尤陳茂破下江兵成丹王常等數千人别走入南陽界十一月有星孛于張東南行五日不見莽數召問太史令宗宣諸術數家皆繆對言天文安善羣賊且滅莽差以自安四年正月漢兵得下江王常等以為助兵撃前隊大夫甄阜屬正梁丘賜皆斬之殺其衆數萬人初京師聞青徐賊衆數十萬人訖無文號旌旗表識師古曰文謂文章號謂大位號也一曰號謂號令也識讀與幟同音式志反咸怪異之好事者竊言此豈如古三皇無文書號諡邪師古曰欲其事成故云然也莽亦心怪以問羣臣羣臣莫對唯嚴尤曰此不足怪也自黄帝湯武行師必待部曲旌旗號令今此無有者直饑寒羣盜犬羊相聚不知為之耳莽大說師古曰說讀曰恱羣臣盡服及後漢兵劉伯升起皆稱將軍攻城略地既殺甄阜移書稱說莽聞之憂懼漢兵乘勝遂圍宛城初世祖族兄聖公先在平林兵中三月辛巳朔平林新市下江兵將王常朱鮪等共立聖公為帝改年為更始元年拜置百官莽聞之愈恐欲外視自安師古曰視讀曰示廼染其須髮進所徴天下淑女杜陵史氏女為皇后聘黄金三萬斤車馬奴婢雜帛珍寳以巨萬計莽親迎於前殿兩階閒成同牢之禮于上西堂備和嬪美御和人三位視公嬪人九視卿美人二十七視大夫御人八十一視元士凡百二十人皆佩印韍執弓韣師古曰禮記月令仲春之月𤣥鳥至之日以太牢祠于髙禖天子親徃后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢于髙禖之前韣弓衣也帶之者求男子之祥也故莽依放之焉韣音獨封皇后父諶為和平侯拜為寧始將軍諶子二人皆侍中是日大風發屋折木羣臣上夀曰廼庚子雨水灑道辛丑清靚無塵師古曰靚即静字也其夕榖風迅疾從東北来師古曰榖風即谷風辛丑巽之宫日也巽為風為順后誼明母道得溫和慈恵之化也易曰受兹介福于其王母師古曰晉卦六二爻也介大也王母君母禮曰承天之慶萬福無疆師古曰禮之祝詞諸欲依廢漢火劉皆沃灌雪除殄滅無餘雜矣百榖豐茂庶草蕃殖師古曰蕃滋也殖生也元元驩喜兆民賴福天下幸甚莽日與方士涿郡昭君等於後宫考驗方術縱滛樂焉大赦天下然猶曰故漢氏舂陵侯羣子劉伯升與其族人婚姻黨與妄流言惑衆悖畔天命乃手害更始將軍㢘丹前隊大夫甄阜屬正梁丘賜及北狄胡虜逆輿洎南僰虜若豆孟遷不用此書師古曰輿匈奴單于名也洎及也若豆孟遷蠻僰之名也言伯升已下孟遷以上不在赦令之限也有能捕得此人者皆封為上公食邑萬戸賜寳貨五千萬又詔太師王匡國將哀章司命孔仁兖州牧夀良卒正王閎揚州牧李聖亟進所部州郡兵師古曰亟急也凡三十萬衆迫措青徐盜賊師古曰措讀與笮同音莊客反下亦放此納言將軍嚴尤秩宗將軍陳茂車騎將軍王巡宋祁曰車騎監本作車馬劉奉世曰車馬將軍非官名字之誤也尤茂前云大將軍此云將軍未知孰誤然其它多如此者左隊大夫王吳亟進所部州郡兵凡十萬衆迫措前隊醜虜明告以生活丹青之信師古曰生活謂来降者不殺之也丹青之信言明著也復迷惑不解散皆并力合撃殄滅之矣大司空隆新公宗室戚屬前以虎牙將軍東指則反虜破壞西撃則逆賊靡碎師古曰靡散也音武皮反此廼新室威寳之臣也如黠賊不解散將遣大司空將百萬之師征伐劋絶之矣師古曰劋截也音子小反遣七公幹士隗囂等七十二人分下赦令曉諭云囂等既出因逃亡矣四月世祖與王常等别攻潁川下昆陽郾定陵師古曰三縣之名也郾音一扇反莽聞之愈恐遣大司空王邑馳𫝊之雒陽師古曰𫝊音張戀反與司徒王尋發衆郡兵百萬號曰虎牙五威兵平定山東得顓封爵政决於邑除用徴諸明兵法六十三家術者各持圗書受器械備軍吏傾府庫以遣邑多齎珍寳猛獸欲視饒富用怖山東師古曰視讀曰示邑至雒陽州郡各選精兵牧守自將定會者四十二萬人餘在道不絶車甲士馬之盛自古出師未嘗有也六月邑與司徒尋發雒陽欲至宛道出潁川過昆陽昆陽時已降漢漢兵守之嚴尤陳茂與二公會二公縱兵圍昆陽嚴尤曰稱尊號者在宛下宜亟進師古曰亟急也彼破諸城自定矣邑曰百萬之師所過當滅今屠此城喋血而進師古曰喋音牒前歌後舞顧不快邪遂圍城數十重城中請降不許嚴尤又曰歸師勿遏圍城為之闕師古曰此兵法之言也遏遮也闕不合也可如兵法使得􅇣出以怖宛下邑又不聽會世祖悉發郾定陵兵數千人来救昆陽尋邑易之師古曰輕易之也易音亦䜴反自將萬餘人行陳師古曰廵行軍陳也行音下更反敕諸營皆按部毋得動獨迎與漢兵戰不利大軍不敢擅相救漢兵乘勝殺尋昆陽中兵出竝戰邑走軍亂大風蜚瓦師古曰蜚古飛字雨如注水大衆崩壞號謼師古曰謼音火故反虎豹股栗師古曰言戰懼甚士卒犇走各還歸其郡邑獨與所將長安勇敢數千人還雒陽闗中聞之震恐盜賊竝起又聞漢兵言莽鴆殺孝平帝莽廼會公卿以下於王路堂開所為平帝請命金縢之策泣以視羣臣師古曰視讀曰示命明學男張邯稱說其徳及符命事因曰易言伏戎于莽升其髙陵三嵗不興師古曰同人卦九三爻辭也莽平草也言伏兵戎於草莽之中升髙陵而望不敢前進至于三嵗不能起也莽皇帝之名升謂劉伯升髙陵謂髙陵侯子翟義也言劉升翟義為伏戎之兵於新皇帝世猶殄滅不興也羣臣皆稱萬嵗又令東方檻車𫝊送數人言劉伯升等皆行大戮民知其詐也先是衛將軍王渉素養道士西門君恵君恵好天文讖記為渉言星孛掃宫室劉氏當復興國師公姓名是也渉信其言以語大司馬董忠數俱至國師殿中廬道語星宿師古曰廬者宿止之處道謂說之也國師不應後渉特徃對歆涕泣言誠欲與公共安宗族師古曰誠實也宋祁曰族字或作姓柰何不信渉也歆因為言天文人事東方必成渉曰新都哀侯小被病功顯君素耆酒師古曰耆讀曰嗜疑帝本非我家子也如淳曰言莽母洛薄嗜酒滛逸得莽耳非王氏子也設此詐欲以自别不受誅董公主中軍精兵渉領宫衛伊休侯主殿中如同心合謀共劫持帝東降南陽天子可以全宗族不者俱夷滅矣伊休侯者歆長子也為侍中五官中郎將莽素愛之歆怨莽殺其三子又畏大禍至遂與渉忠謀欲發歆曰當待太白星出廼可忠以司中大贅起武侯孫伋亦主兵復與伋謀伋歸家顔色變不能食妻怪問之語其狀妻以告弟雲陽陳邯邯欲告之七月伋與邯俱告莽遣使者分召忠等時忠方講兵都肄師古曰肄習也大習兵也肄音亦二反護軍王咸謂忠謀久不發恐漏泄不如遂斬使者勒兵入忠不聽遂與歆渉會省戸下莽令䠠惲責問皆服中黄門各㧞刃將忠等送廬忠㧞劔欲自刎侍中王望𫝊言大司馬反黄門持劔共格殺之省中相驚𫝊勒兵至郎署皆㧞刄張弓更始將軍史諶行諸署師古曰行音下更反劉奉世曰或言更始或言寧始未知孰誤告郎吏曰大司馬有狂病發已誅皆令㢮兵師古曰㢮放也莽欲以厭凶師古曰厭當也音一葉反使虎賁以斬馬劔挫忠師古曰挫讀曰剉音千卧反盛以竹器𫝊曰反虜出下書赦大司馬官屬吏士為忠所詿誤謀反未發覺者收忠宗族以醇醯毒藥尺白刄叢棘并一坎而埋之劉歆王渉皆自殺莽以二人骨肉舊臣惡其内潰師古曰王渉骨肉也劉歆舊臣故隐其誅伊休侯疊又以素謹歆訖不告師古曰訖猶竟也歆竟不以所謀告之但免侍中中郎將更為中散大夫後日殿中鉤盾土山僊人掌旁有白頭公青衣鄭氏曰僊人以掌擎承露盤也郎吏見者私謂之國師公衍功侯喜素善卦莽使筮之曰憂兵火莽曰小兒安得此左道是廼予之皇祖叔父子僑欲来迎我也莽軍師外破大臣内畔左右亡所信不能復逺念郡國欲謼邑與計議師古曰謼古呼字崔發曰邑素小心今失大衆而徴恐其執節引決宜有以大慰其意於是莽遣發馳𫝊諭邑師古曰謂諭告之𫝊音張戀反我年老無適子師古曰適讀曰嫡欲𫝊邑以天下敕亡得謝見勿復道邑到以為大司馬大長秋張邯為大司徒崔發為大司空司中夀容苖訢為國師同說侯林為衛將軍莽憂懣不能食師古曰懣音滿又音悶亶飲酒㗖鰒魚師古曰亶音但下亦類此鰒海魚也音雹讀軍書倦因馮几寐不復就枕矣師古曰馮讀曰憑宋祁曰枕字當作次性好時日小數及事迫急亶為厭勝遣使壞渭陵延陵園門罘罳曰毋使民復思也又以墨洿色其周垣師古曰洿染之變其舊色也洿音一故反號將至曰嵗宿申水為助將軍右庚刻木校尉前丙燿金都尉又曰執大斧伐枯木流大水滅發火如此屬不可勝記秋太白星流入太微燭地如月光成紀隗崔兄弟共刼大尹李育師古曰成紀隴西之縣以兄子隗囂為大將軍攻殺雍州牧陳慶安定卒正王旬并其衆移書郡縣數莽罪惡萬於桀紂是月析人鄧曄于匡起兵南鄉百餘人師古曰析南陽之縣南鄉析縣之鄉名析音先歴反時析宰將兵數千屯鄡亭備武闗師古曰鄡音口堯反曄匡謂宰曰劉帝已立君何不知命也宰請降盡得其衆曄自稱輔漢左將軍匡右將軍㧞析丹水攻武闗都尉朱萌降進攻右隊大夫宋綱殺之西㧞湖師古曰湖𢎞農之縣也本屬京兆莽愈憂不知所出崔發言周禮及春秋左氏國有大災則哭以厭之師古曰周禮春官之屬女巫氏之職曰凡邦之大災歌哭而請哭者所以告哀也春秋左氏傳宣十二年楚子圍鄭旬有七日鄭人卜行成不吉卜臨于太宫且巷出車吉國人大臨守陴者皆哭故發引之以為言也厭音一葉反故易稱先號咷而後笑師古曰同人九五爻辭號咷哭也咷音逃宜呼嗟告天以求救莽自知敗廼率羣臣至南郊陳其符命本末仰天曰皇天既命授臣莽何不殄滅衆賊即令臣莽非是願下雷霆誅臣莽因摶心大哭氣盡伏而叩頭又作告天䇿自陳功勞千餘言諸生小民會旦夕哭為設飱粥師古曰飱古飡字音千安反甚悲哀及能誦策文者除以為郎至五千餘人䠠惲將領之莽拜將軍九人皆以虎為號號曰九虎將北軍精兵數萬人東内其妻子宫中以為質時省中黄金萬斤者為一匱尚有六十匱黄門鉤盾臧府中尚方處處各有數匱長樂御府中御府及都内平凖帑臧錢帛珠玉財物甚衆師古曰御府有令丞少府之屬官也掌珍物中御府者皇后之府臧也平凖令丞屬大司農亦珍貨所在也莽愈愛之賜九虎士人四千錢衆重怨無鬭意九虎至華隂回谿距隘北從河南至山于匡持數千弩乘堆挑戰鄧曄將二萬餘人從閿鄉南山棗街作姑師古曰閿讀與聞同作姑邪道所由也韋昭曰閿音旻破其一部北出九虎後撃之六虎敗走史熊王況詣闕歸死莽使使責死者安在皆自殺其四虎亡師古曰六人敗走二人詣闕自殺四人亡三虎郭欽陳翬成重收散卒保京師倉師古曰九人之中六人敗走三人保倉也京師倉在華隂灌北渭口也翬音暉鄧曄開武闗迎漢丞相司直李松將二千餘人至湖與􅁮等共攻京師倉未下􅁮以𢎞農掾王憲為校尉將數百人北度渭入左馮翊界降城略地李松遣偏將軍韓臣等徑西至新豐與莽波水將軍戰波水走韓臣等追奔遂至長門宫王憲北至頻陽所過迎降師古曰所至之處人皆来迎而降附也大姓櫟陽申碭下邽王大皆率衆隨憲屬縣斄嚴春師古曰屬縣三輔諸縣也斄屬右扶風斄讀與邰同其人姓嚴名春茂陵董喜藍田王孟槐里汝臣盩厔王扶陽陵嚴本杜陵屠門少之屬師古曰姓屠門名少衆皆數千人假號稱漢將時李松鄧曄以為京師小小倉尚未可下何況長安城當須更始帝大兵到即引軍至華隂治攻具而長安旁兵四會城下聞天水隗氏兵方到皆争欲先入城貪立大功鹵掠之利莽遣使者分赦城中諸獄囚徒皆授兵殺豨飲其血與誓曰有不為新室者社鬼記之更始將軍史諶將度渭橋皆散走諶空還衆兵發掘莽妻子父祖冢燒其棺椁及九廟明堂辟雍火照城中或謂莽曰城門卒東方人不可信莽更發越騎士為衛門置六百人各一校尉十月戊申朔兵從宣平城門入民間所謂都門也師古曰長安城東出北頭第一門張邯行城門逢兵見殺師古曰行音下更反王邑王林王廵䠠惲等分將兵距撃北闕下漢兵貪莽封力戰者七百餘人師古曰獲莽當得封故貪之而力戰㑹日暮官府邸第盡犇亡二日己酉城中少年朱弟張魚等恐見鹵掠趨讙並和師古曰衆羣行讙而自相和也和音乎卧反燒作室門斧敬法闥師古曰敬法殿名也闥小門也謂斧斫之也謼曰反虜王莽何不出降師古曰謼音火故反其下亦同火及掖庭承明黄皇室主所居也莽避火宣室前殿火輙隨之宫人婦女謕謼曰當奈何時莽紺袀服師古曰謕古啼字也紺深青而揚赤色也袀純也純為紺服也袀音均又式旬反帶璽韍持虞帝七首天文郎按栻於前師古曰栻所以占時日天文郎今之用栻者也音式日時加某莽旋席隨斗柄而坐曰天生徳於予漢兵其如予何師古曰論語稱孔子曰天生徳於予桓魋其如予何故莽引之以為言也莽時不食少氣困矣三日庚戍晨旦明羣臣扶掖莽自前殿南下椒除服䖍曰邪行閣道下者也師古曰除殿陛之道也椒取芬香之名也西出白虎門和新公王揖奉車待門外莽就車之漸臺欲阻池水猶抱持符命威斗公卿大夫侍中黄門郎從官尚千餘人隨之王邑晝夜戰罷極師古曰罷讀曰疲士死傷略盡馳入宫間闗至漸臺師古曰間闗猶言崎嶇展轉也見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中謼曰反虜王莽安在有美人出房曰在漸臺衆兵􅇷之圍數百重臺上亦弓弩與相射稍稍落去矢盡無以復射短兵接王邑父子䠠惲王廵戰死莽入室下晡時衆兵上臺王揖趙博苖訢唐尊王盛中常侍王參等皆死臺上商人杜吳殺莽取其綬校尉東海公賔就故大行治禮師古曰公賔姓也就名也以先經治禮故識天子綬也見呉問綬主所在曰室中西北陬閒師古曰陬隅也音子侯反又音鄒就識斬莽首軍人分裂莽身支節肌骨臠分争相殺者數十人師古曰三輔舊事云臠切千叚公賔就持莽首詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉舎東宫師古曰舎止宿也妻莽後宫乘其車服六日癸丑李松鄧曄入長安將軍趙萌申屠建亦至以王憲得璽綬不輙上多挾宫女建天子鼔旗收斬之𫝊莽首詣更始縣宛市百姓共提撃之師古曰提擲也音徒計反或切食其舌莽揚州牧李聖司命孔仁兵敗山東聖格死仁將其衆降已而歎曰吾聞食人食者死其事㧞劍自刺死及曹部監杜普陳定大尹沈意九江連率賈萌皆守郡不降為漢兵所誅賞都大尹王欽及郭欽守京師倉聞莽死乃降更始義之皆封為侯太師王匡國將哀章降雒陽𫝊詣宛斬之嚴尤陳茂敗昆陽下走至沛郡譙自稱漢將召會吏民尤為稱說王莽簒位天時所亡聖漢復興狀茂伏而涕泣聞故漢鍾武侯劉聖聚衆汝南稱尊號尤茂降之以尤為大司馬茂為丞相十餘日敗尤茂并死郡縣皆舉城降天下悉歸漢初申屠建嘗事崔發為詩師古曰就發學詩建至發降之後復稱說師古曰妄言符命不順漢建令丞相劉賜斬發以徇史諶王延王林王呉趙閎亦降復見殺初諸假號兵人人望封侯申屠建既斬王憲又揚言三輔黠共殺其主吏民惶恐屬縣屯聚建等不能下馳白更始二年二月更始到長安下詔大赦非王莽子他皆除其罪故王氏宗族得全三輔悉平更始都長安居長樂宫府臧完具獨未央宫燒攻莽三日死則案堵復故更始至嵗餘政教不行明年夏赤眉樊崇等衆數十萬人入闗立劉盆子稱尊號攻更始更始降之赤眉遂燒長安宫室市里害更始民饑餓相食死者數十萬長安為虚師古曰虚讀曰墟城中無人行宗廟園陵皆發掘惟霸陵杜陵完六月世祖即位然後宗廟社稷復立天下艾安師古曰艾讀曰又劉攽曰王莽三十八為大司馬五十一居攝五十四即真六十八誅死居攝三年號初始元年始建國五天鳳六地皇四贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪師古曰論語載孔子對子張之言也不仁之人假仁者之色而所行則違之朋黨比周故能在家在國皆有名譽故贊引之莽既不仁而有佞邪之材又乘四父歴世之權遭漢中微國統三絶而太后夀考為之宗主故得肆其姦慝以成簒盗之禍師古曰肆放也極也推是言之亦天時非人力之致矣及其竊位南面處非所據顛覆之埶險於桀紂而莽晏然自以黄虞復出也廼始恣雎奮其威詐師古曰雎音呼季反滔天虐民窮凶極惡師古曰滔漫也毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之内囂然䘮其樂生之心師古曰囂然衆口愁貌也中外憤怨逺近俱發城池不守支體分裂遂令天下城邑為虚師古曰虚讀曰墟邱壠發掘害徧生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六蓺以文姦言師古曰以六經之事文飾姦言同歸殊塗俱用滅亡皆亢龍絶氣非命之運服䖍曰易曰亢龍有悔謂無徳而居髙位也蘇林曰非命非天命之命也紫色䵷聲餘分閏位應劭曰紫間色䵷邪音也服䖍曰言莽不得正王之命如嵗月之餘分為閠也師古曰䵷者樂之滛聲非正曲也近之學者便謂䵷之鳴已失其義又欲改此贊䵷聲為蠅聲引詩匪雞則鳴蒼蠅之聲尤穿鑿矣聖王之驅除云爾蘇林曰聖王光武也為光武驅除也師古曰言驅逐蠲除以待聖人也前漢書卷九十九下前漢書卷九十九下考證王莽𫝊下臨淮𤓰田儀等為盜賊依阻㑹稽長州胡三省曰今蘇州長洲縣即長州地遂攻海曲縣殺其宰李賢曰海曲故城在宻州莒縣東臣召南按通鑑即書新市王匡王鳳南陽馬武潁川王常成丹等南郡張霸江夏羊牧等起兵於吕母之後是嵗赤眉力子都樊崇劉攽曰力當作刁臣召南按通鑑作刁子都然本文及後書並作力姓譜曰力姓黄帝臣力牧之後似力字不誤翼平連率田況胡三省曰据地理志北海夀光縣莽曰翼平又夙夜連率韓博夙夜東莱郡不夜縣莽改名也乃身短衣小褏乘牝馬柴車胡三省曰漢之盛乘牸牝者禁不得聚會鄉閭阡陌皆然朝市之閒從可知矣唐尊為上公而乘牝馬亦以矯世也因下書責七公曰七公四輔三公也燒作室門程大昌曰未央宫西北織室暴室之類黄圖謂為尚方工作之所者也持虞帝匕首胡三省曰虞帝安得有匕首蓋莽自為之以愚人也聞故漢鍾武侯劉聖聚衆汝南通鑑考異曰劉聖後書劉元𫝊作朢前漢書卷九十九下考證
