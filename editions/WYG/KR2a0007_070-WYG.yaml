body:
  text: 前漢書卷七十漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注傅常鄭甘陳叚傳第四十傅介子北地人也師古曰趙充國傳賛云義渠公孫賀傅介子然則介子北地義渠人也以從軍為官先是龜兹樓蘭皆嘗殺漢使者服䖍曰龜兹音丘慈語在西域傳至元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜兹國介子至樓蘭責其王教匈奴遮殺漢使大兵方至王茍不教匈奴匈奴使過至諸國何為不言王謝服言匈奴使屬過師古曰屬近也近始過去屬音之欲反當至烏孫道過龜兹介子至龜兹復責其王王亦服罪介子從大宛還到龜兹龜兹言匈奴使從烏孫還在此介子因率其吏士共誅斬匈奴使者還奏事詔拜介子為中郎遷平樂監介子謂大將軍霍光曰樓蘭龜兹數反復而不誅無所懲艾師古曰艾讀曰乂介子過龜兹時其王近就人易得也師古曰附近而親就言不相猜阻也願徃刺之以威示諸國大將軍曰龜兹道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黄金錦繡行賜諸國師古曰徧徃賜之王不来受我去之西國矣即出金幣以示譯譯還報王王貪漢物来見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王師古曰謂密有所諭王起隨介子入帳中屏語師古曰屏人而獨共語也壯士二人從後刺之刃交胸立死其貴人左右皆􅄆走介子告諭以王負漢罪天子遣我来誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕公卿將軍議者咸嘉其功上廼下詔曰樓蘭王安歸常為匈奴間候遮漢使者師古曰言為匈奴之間而候伺發兵殺略衛司馬安樂光禄大夫忠期門郎遂成等三輩及安息大宛使盗取節印獻物晋灼曰此安息大宛逺遣使獻漢而楼蘭王使人盗取所獻之物也師古曰節及印漢使者所賫也獻物大宛等使所獻也楼蘭既殺漢使又殺諸國使者甚逆天理平樂監傅介子持節使誅斬樓蘭王安歸首縣之北闕以直報怨師古曰論語載孔子言曰以直報怨以徳報徳言怨於我者則直道以報之故詔引之也不煩師衆其封介子為義陽侯食邑七百戸士刺王者皆補侍郎介子薨子敞有罪不得嗣國除元始中繼功臣世復封介子曾孫長為義陽侯王莽敗廼絶常恵太原人也少時家貧自奮應募隨栘中監蘇武使匈奴師古曰栘中廐名也音移觧在昭紀宋祁曰蘇林曰栘音移如淳曰移爾雅唐棣栘也栘園之中有馬廐也釋文唐棣栘郭璞注云似白楊江東呼為栘音以支反姚本改作移并見拘留十餘年昭帝時廼還漢嘉其勤勞拜為光禄大夫是時烏孫公主上書言匈奴發騎田車師師古曰車師西域國名也車師與匈奴為一共侵烏孫唯天子救之漢養士馬議欲擊匈奴㑹昭帝崩宣帝初卽位本始二年遣恵使烏孫公主及昆彌皆遣使因恵言匈奴連發大兵擊烏孫取車延惡師地收其人民去使使脅求公主師古曰脅謂以威廹之也欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救公主昆彌於是漢大發十五萬騎五將軍分道出師古曰祁連將軍田廣明蒲類將軍趙充國武牙將軍田順度遼將軍范明友前將軍韓増語在匈奴傳以恵為校尉持節䕶烏孫兵昆彌自將翖侯以下五萬餘騎師古曰翖即翕字也翖侯烏孫官號也從西方入至右谷蠡庭師古曰谷音鹿蠡音黎獲單于父行及嫂居次晋灼曰匃奴女號若言公主也師古曰行音胡浪反名王騎將以下三萬九千人得馬牛驢驘橐佗五萬餘匹羊六十餘萬頭烏孫皆自取鹵獲恵從吏卒十餘人隨昆彌還未至烏孫烏孫人盗恵印綬節恵還自以當誅師古曰謂失印綬及節為辱命時漢五將皆無功天子以恵奉使克獲遂封恵為長羅侯復遣恵持金幣還賜烏孫貴人有功者恵因奏請龜兹國嘗殺校尉頼丹未伏誅請便道擊之宣帝不許大將軍霍光風恵以便宜從事師古曰言至前所專命而行也風讀曰諷恵與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜兹東國二萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰廼我先王時為貴人姑翼所誤耳我無罪恵曰即如此縛姑翼来吾置王師古曰置猶放宋祁曰注文放字下疑有也字王執姑翼詣恵恵斬之而還後代蘇武為典屬國眀習外國事勤勞數有功甘露中後將軍趙充國薨天子遂以恵為右將軍典屬國如故宣帝崩恵事元帝三嵗薨諡曰壯武侯傳國至曾孫建武中廼絶鄭吉㑹稽人也以卒伍從軍數出西域由是為郎吉為人彊執習外國事師古曰彊力而有執志者自張騫通西域李廣利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道師古曰鄯音善神爵中匈奴乖亂日逐王先賢撣欲降漢師古曰撣音纒使人與吉相聞吉發渠黎龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣亰師漢封日逐王為歸徳侯吉既破車師降日逐威震西域遂并䕶車師以西北道故號都䕶師古曰並䕶南北二道故謂之都都猶大也總也都䕶之置自吉始焉上嘉其功效廼下詔曰都䕶西域騎都尉鄭吉拊循外蠻宣明威信師古曰禮云東夷北狄西戎南蠻然夷蠻戎狄亦四方之總稱耳故史傳又云百蠻也迎匈奴單于從兄日逐王衆擊破車師兠訾城師古曰訾音子移反功效茂著其封吉為安逺侯食邑千戸吉於是中西域而立莫府師古曰中西域者言最處諸國之中近逺均也中音竹仲反治烏壘城鎮撫諸國誅伐懐集之漢之號令班西域矣師古曰班布也始自張騫而成於鄭吉語在西域傳吉薨諡曰繆侯子光嗣薨無子國除元始中録功臣不以罪絶者封吉曾孫永為安逺侯甘延壽字君况北地郁郅人也少以良家子善騎射為羽林投石㧞距絶於等倫應劭曰投石以石投人也㧞距即下超踰羽林亭樓是也張晏曰范蠡兵法飛石重十二斤為機發行三百歩延壽有力䏻以手投之㧞距超距也師古曰投石應説是也㧞距者有人連坐相把據地距以為堅而䏻㧞取之皆言其有手掣之力超踰亭樓又言其趫捷耳非㧞距也今人猶有㧞爪之戲盖㧞距之遺法宋祁曰注文堅字疑作掔字掣字疑作擥字嘗超踰羽林亭樓由是遷為郎試弁為期門孟康曰弁手搏宋祁曰注末當有也字以材力愛幸稍遷至遼東太守免官車騎將軍許嘉薦延壽為郎中諫大夫使西域都䕶騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯侯傳國至曾孫王莽敗廼絶陳湯字子公山陽瑕丘人也少好書博逹善屬文師古曰屬音之欲反家貧匄貣無節不為州里所稱師古曰匄乞也貣音吐得反西至長安求官得太官獻食丞數嵗富平侯張勃與湯交髙其能初元二年元帝詔列侯舉茂材勃舉湯湯待遷父死不犇喪師古曰犇古奔字司𨽻奏湯無循行宋祁曰循疑作􅁱勃選舉故不以實坐削戸二百㑹薨因賜諡曰繆侯師古曰以其繆舉人也湯下獄論後復以薦為郎數求使外國久之遷西域副校尉與甘延壽俱出先是宣帝時匈奴乖亂五單于爭立呼韓邪單于與郅支單于俱遣子入侍漢兩受之後呼韓邪單于身入稱臣朝見郅支以為呼韓邪破弱降漢不能自還即西收右地㑹漢發兵送呼韓邪單于郅支由是遂西破呼偈堅昆丁令服䖍曰呼偈小國名在匈奴北師古曰偈起厲反令與零同宋祁曰偈字下當添音字兼三國而都之怨漢擁䕶呼韓邪而不助己困辱漢使者江廼始等初元四年遣使奉獻因求侍子願為内附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以為春秋之義許夷狄者不壹而足師古曰言莭制之不皆稱其所求也今郅支單于鄉化未醇師古曰鄉讀曰嚮不雜曰醇醇壹也厚也所在絶逺宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年徳澤甚厚空絶而不送近從塞還示弃捐不畜師古曰畜謂愛養也使無鄉從之心師古曰鄉讀曰嚮嚮從謂向化而從命也弃前恩立後怨不便議者見前江廼始無應敵之數知勇俱困以致恥辱即豫為臣憂臣幸得建彊漢之節承聖眀之詔宣諭厚恩不宜敢桀師古曰言郅支畏威當不敢桀黠也若懐禽獸加無道於臣則單于長嬰大罪師古曰嬰猶帶也宋祁曰禽獸字下疑有心字長嬰大罪罪字疑作漢必遁逃逺舍不敢近邉師古曰舍止也沒一使以安百姓國之計臣之願也願送至庭師古曰單于庭上以示朝者禹復爭以為吉徃必為國取悔生事不可許右將軍馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益彊遂西奔康居康居王以女妻郅支郅支亦以女予康居王康居甚尊敬郅支欲倚其威以脅諸國師古曰倚音於綺反郅支數借兵擊烏孫深入至赤谷城殺略民人敺畜産師古曰敺與驅同下皆類此烏孫不敢追西邊空虛不居者且千里郅支單于自以大國威名尊重又乘勝驕不為康居王禮怒殺康居王女及貴人人民數百或支觧投都頼水中師古曰支觧謂觧截其四支也都頼郅支水名發民作城日作五百人二嵗廼已又遣使責闔蘇大宛諸國嵗遺師古曰胡廣云康居北可一千里有國名奄蔡一名闔蘇然則闔蘇即奄蔡也嵗遺者年常所獻遺之物遺弋季反宋祁曰弋季字上當有音字不敢不予漢遣使三輩至康居求谷吉等死師古曰死尸也郅支困辱使者不肯奉詔而因都䕶上書言居困戹願歸計彊漢遣子入侍師古曰故為此言以調戲也歸計謂歸附而受計策也其驕嫚如此建昭三年湯與延壽出西域湯為人沈勇有大慮多策謀喜竒功師古曰喜音許吏反每過城邑山川常登望既領外國與延壽謀曰夷狄畏服大種其天性也西域本屬匈奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氏山離烏弋數年之間城郭諸國危矣服䖍曰山離烏弋不在三十六國中去中國二萬里師古曰謂西域國為城郭者言不隨畜牧遷徙以别於匈奴也且其人剽悍師古曰剽輕也悍勇也剽音頻妙反又音匹妙反悍音胡幹反好戰伐數取勝久畜之必為西域患郅支單于雖所在絶逺蠻夷無金城强弩之守如發屯田吏士敺從烏孫衆兵師古曰驅帥之令隨從也直指其城下彼亡則無所之守則不足自保師古曰之徃保安也千載之功可一朝而成也延壽亦以為然欲奏請之湯曰國家與公卿議大策非凡所見事必不從師古曰言凡庸之人不能逺見故壊其事也宋祁曰注文中壊字上疑有破字延壽猶與不聼師古曰與讀曰豫㑹其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起欲止焉湯怒按劒叱延壽曰大衆已集㑹豎子欲沮衆邪師古曰沮止也壊也音才汝反延壽遂從之部勒行陳益置揚威白虎合騎之校張晏曰西域陳法之名也師古曰張説非也一校則别為一部軍故稱校耳湯特新置此等諸校名以為威聲也漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀即日引軍分行别為六校其三校從南道踰葱領徑大宛其三校都䕶自將發温宿國從北道入赤谷過烏孫渉康居界至闐池西而康居副王抱闐將數千騎宼赤谷城東文穎曰闐音填殺略大昆彌千餘人敺畜産甚多從後與漢軍相及頗宼盗後重師古曰重謂輜重也音直用反湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為宼師古曰勿抄掠閒呼其貴人屠墨見之師古曰閒謂宻呼也諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色子即屠墨母之弟師古曰母之弟即謂舅者皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困阸願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都䕶將軍来迎單于妻子恐左右驚動故未敢至城下使數徃来相荅報延壽湯因讓之師古曰讓責也我為單于逺来而至今無名王大人見將軍受事者師古曰名王諸王之貴者受事受教命而供事也何單于忽大計失客主之禮也師古曰怱忘也兵來道逺人畜罷極食度且盡師古曰罷讀曰疲度音大各反恐無以自還願單于與大臣審計策明日前至郅支城都頼水上離城三里止營傅陳師古曰傅讀曰敷敷布也望見單于城上立五采幡織師古曰織讀曰幟音式志反數百人披甲乘城師古曰乘謂登之備守也又出百餘騎徃來馳城下歩兵百餘人夾門魚鱗陳師古曰言其相接次形若魚鱗講習用兵城上人更招漢軍曰鬬來師古曰更互也音工行反百餘騎馳赴營營皆張弩持滿指之騎引却頗遣吏士射城門騎歩兵騎歩兵皆入延壽湯令軍聞鼓音皆薄城下師古曰薄廹也四面圍城各有所守穿􅢾塞門戸鹵楯為前㦸弩為後卬射城中樓上人師古曰卬讀曰仰樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之宋祁曰出外下疑有人字初單于聞漢兵至欲去疑康居怨已為漢内應又聞烏孫諸國兵皆發自以無所之師古曰之徃也郅支已出復還曰不如堅守漢兵逺來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于下騎傳戰大内師古曰下騎謂下樓而騎馬也傳戰轉戰也大内單于之内室也言且戰且行而入内室夜過半木城穿中人郤入土城乘城呼師古曰乘登也呼音火故反次下亦同時康居兵萬餘騎分為十餘處四面環城亦相與應和師古曰環繞也音患和胡卧反夜數犇營不利輒郤師古曰犇古奔字平明四面火起吏士喜大呼乘之師古曰乘逐也鉦鼓聲動地康居兵引郤漢兵四面推鹵楯並入土城中單于男女百餘人走入大内漢兵縱火吏士爭入單于被創死軍候假丞杜勲斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者師古曰畀予也各以與所得人畀音必寐反凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦予城郭諸國所發十五王師古曰賦謂班予之也所發十五王謂所發諸國之兵共圍郅支王者也於是延壽湯上疏曰臣聞天下之大義當混為一師古曰混同也音胡本反昔有唐虞今有彊漢匈奴呼韓邪單于已稱北藩唯郅支單于叛逆未伏其辜大夏之西以為彊漢不能臣也師古曰謂漢為不能使郅支臣服也郅支單于慘毒行於民大惡通於天臣延壽臣湯將義兵行天誅頼陛下神靈陰陽並應天氣精明陷陳克敵斬郅支首及名王以下宜縣頭槀街蠻夷邸間晋灼曰黄圖在長安城門内師古曰槀街街名蠻夷邸在此街也邸若今鴻臚客館也崔浩以為槀當為橐橐街即銅駝街也此説失之銅駝街在雒陽西京無也以示萬里明犯彊漢者雖逺必誅事下有司丞相匡衡御史大夫繁延壽師古曰繁音蒲胡反以為郅支及名王首更歴諸國蠻夷莫不聞知師古曰更音工衡反月令春掩骼埋胔之時應劭曰禽獸之骨曰骼骼大也鳥䑕之骨曰胔胔可惡也臣瓉曰枯骨曰骼有肉曰胔師古曰瓚説是也骼音工客反胔音才賜反宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之師古曰夾谷地名即祝其也定十年公㑹齊侯於夾谷孔子攝相事齊侯奏宫中之樂俳優侏儒戲於前孔子歴階而上曰匹失侮諸侯者罪應誅於是斬侏儒首足異處齊侯懼有慙色施者優人之名夾音頰方盛夏首足異門而出宜縣十日廼埋之有詔將軍議是初中書令石顯嘗欲以姊妻延夀延壽不取及丞相御史亦惡其矯制皆不與湯師古曰與猶許也湯素貪所鹵獲財物入塞多不法師古曰不法者私自取之不依軍法司𨽻校尉移書道上繫吏士按騐之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅師古曰師入曰振旅振整也旅衆也宜有使者迎勞道路師古曰勞音力到反今司𨽻反逆收繫按驗是為郅支報讐也上立出吏士令縣道具酒食以過軍旣至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷師古曰如若也為國招難漸不可開元帝内嘉延壽湯功而重違衡顯之議師古曰重難也議久不决故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉師古曰閔病也陛下赫然欲誅之意未嘗有忘西域都䕶延壽副校尉湯承聖指倚神靈總百蠻之君㩜城郭之兵師古曰㩜總持之也其字從手出百死入絶域遂蹈康居屠五重城搴歙侯之旗師古曰搴㧞也音騫斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭眀之功萬夷慴伏莫不懼震師古曰慴恐也音之渉反呼韓邪單于見郅支己誅且喜且懼鄉風馳義稽首來賔師古曰馳義慕義馳驅而來也鄉讀曰嚮願守北藩累世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威師古曰小雅采芑之詩也嘽嘽衆也焞焞盛也言車徒既衆且盛有如雷霆故能克定獫狁而令荆土之蠻亦畏威而來也嘽他丹反焞他回反易曰有嘉折首獲匪其醜師古曰離上九爻辭也嘉善也醜類也言王者出征克勝斬首多獲非類故以為善言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也盖急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜旣多受祉來歸自鎬我行永久師古曰小雅六月之詩也鎬地名非豐鎬之鎬此鎬及方皆在周之北時獫狁侵鎬及方至於涇陽吉甫薄伐自鎬而還王以燕禮樂之多受福賜以其行役有功日月長久故也千里之鎬猶以為逺况萬里之外其勤至矣延壽湯旣未獲受祉之報反屈捐命之功久挫於刀筆之前師古曰捐棄其軀命言無所頋也挫屈折也刀筆謂吏也非所以勸有功厲戎士也昔齊桓公前有尊周之功師古曰謂伐椘責苞茅及㑹王太子于首止後有滅項之罪師古曰項國名也春秋僖十七年夏滅項公羊傳曰齊滅之也不言齊為桓公諱也桓常有繼絶存亡之功故君子為之諱君子以功覆過而為之諱行事師古曰行事謂滅項之事也劉攽曰諱行事非辭也諱以上為句行事者言已行之事舊例成法也漢世人作文言行事成事者意皆同貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞師古曰靡􅄆也音縻而厪獲駿馬三十匹師古曰厪與僅同僅少也雖斬宛王母鼓之首師古曰西域傳作母寡而此云母鼓鼓寡聲相近盖戎狄之言不甚諦也猶不足以復費師古曰復償也音扶目反其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於貳師功徳百之師古曰百倍勝之且常恵隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則髙於安逺長羅師古曰安逺侯鄭吉長羅侯常恵也而大功未著小惡數布臣竊痛之宜以時觧縣通籍孟康曰縣罪未竟也如言縣罰也通籍不禁止令得出入也除過勿治尊寵爵位以勸有功於是天子下詔曰匈奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優㳺而不征者重動師衆勞將率師古曰重難也故𨼆忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之頼天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法師古曰干犯也内不煩一夫之役不開府庫之蔵因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邉竟得以安師古曰竟讀曰境然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議封焉議者皆以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絶域非真單于元帝取安逺侯鄭吉故事封千戸衡顯復爭廼封延壽為義成侯賜湯爵闗内侯食邑各三百戸加賜黄金百斤告上帝宗廟大赦天下拜延壽為長水校尉湯為射聲校尉延壽遷城門校尉䕶軍都尉薨於官成帝初即位丞相衡復奏湯以吏二千石奉使顓命蠻夷中師古曰顓與専同不正身以先下而盗所收康居財物戒官屬曰絶域事不覆校雖在赦前不宜處位湯坐免後湯上書言康居王侍子非王子也按驗寔王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞椘有子玉得臣文公為之仄席而坐師古曰子玉椘大夫也得臣其名也春秋僖二十八年子玉帥師與晋文公戰于城濮椘師敗繢晋師三日館榖而文公猶有憂色曰得臣猶在憂未歇也及椘殺子玉公喜而後可知也禮記曰有憂者仄席而坐盖自貶也仄古側字也趙有亷頗馬服彊秦不敢窺兵井陘師古曰亷頗趙將也馬服君趙奢亦趙將也井陘之口趙之西界山險道也近漢有郅都魏尚匈奴不敢南鄉沙幕師古曰鄉讀曰嚮由是言之戰克之將國之爪牙不可不重也盖君子聞鼓鼙之聲則思將率之臣師古曰禮之樂記曰鼓鼙之聲讙讙以立動動以進衆君子聼鼓鼙之聲則思將率之臣也竊見闗内侯陳湯前使副西域都䕶忿郅支之無道閔王誅之不加師古曰閔憂也策慮愊億義勇奮發師古曰愊億憤怒之貌也愊音皮逼反卒興師奔逝横厲烏孫踰集都頼如淳曰踰逺也逺集郅支都頼水上也師古曰卒讀曰猝厲度也踰讀曰遥屠三重城劉奉世曰劉向云五重谷永云三重疑五重者誤斬郅支首報十年之逋誅雪邊吏之宿恥師古曰逋亡也威震百蠻武暢西海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歴時不决執憲之吏欲致之大辟昔白起為秦將南㧞郢都北阬趙括以纎介之過賜死杜郵師古曰地名也在咸陽西也秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外師古曰如席之卷言其疾也喋血觧在文紀薦功祖廟告類上帝張晏曰謂以所征之國事類告天也介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也師古曰尚書之外逸書也夫犬馬有勞於人尚加帷蓋之報師古曰禮記稱孔子云敝帷弗弃為薶馬也敝盖弗弃為薶狗也况國之功臣者哉竊恐陛下忽於鼓鼙之聲不察周書之意而忘帷盖之施庸臣遇湯卒從吏議師古曰以庸臣之禮待遇之也卒終也使百姓介然有秦民之恨師古曰介然猶耿耿非所以厲死難之臣也書奏天子出湯奪爵為士伍後數嵗西域都䕶叚㑹宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救師古曰西域城郭諸國及燉煌兵也丞相王商大將軍王鳳及百僚議數日不决鳳言湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不詘申湯入見有詔母拜示以㑹宗奏湯辭謝曰將相九卿皆賢材通明小臣罷癃不足以策大事師古曰罷讀曰疲上曰國家有急君其母讓對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵今圍㑹宗者人衆不足以勝㑹宗唯陛下勿憂且兵輕行五十里重行三十里今㑹宗欲發城郭燉煌歴時廼至所謂報讎之兵非救急之用也上曰奈何其觧可必乎度何時觧師古曰度音徒各反湯知烏孫瓦合不能久攻師古曰瓦合謂碎瓦之雜居不齊同故事不過數日師古曰故事謂以舊事測之因對曰已觧矣詘指計其日曰不出五日當有吉語聞師古曰吉善也善謂兵觧之事居四日軍書到言已觧大將軍鳳奏以為從事中郎莫府事壹决於湯湯明法令善因事為埶納説多從常受人金錢作章奏卒以此敗初湯與將作大匠觧萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意師古曰可天子之意自致將作大匠及大司農中丞耿壽昌造杜陵賜爵闗内侯將作大匠乗馬延年以勞苦秩中二千石師古曰姓乘馬名延年乘音食孕反今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之卽上封事言初陵亰師之地最為肥美可立一縣天下民不徙諸陵三十餘嵗矣闗東富人益衆多規良田役使貧民師古曰規畫也自占為疆界也可徙初陵以彊亰師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙内郡國民萬年自詭三年可成師古曰詭責也自以為憂責也後卒不就師古曰卒終也就亦成也羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上師古曰度徒各反客土之中不保幽冥之靈淺外不固卒徒工庸以鉅萬數至㸐脂火夜作師古曰㸐古然字也取土東山且與榖同賈師古曰賈讀曰價作治數年天下徧被其勞國家罷敝府臧空虚師古曰罷讀曰疲下至衆庶熬熬苦之師古曰熬熬衆愁聲故陵因天性據真土處埶髙敞旁近祖考前又已有十年功緒師古曰緒謂端次也宜還復故陵勿徙民上廼下詔罷昌陵語在成紀丞相御史請廢昌陵邑中室師古曰徙人新所起室居奏未下人以問湯第宅不徹得毋復發徙師古曰問其不被發徹更移徙邪湯曰縣官且順聽羣臣言猶且復發徙之也時成都侯商新為大司馬衛將軍輔政素不善湯商聞此語白湯惑衆下獄治按騐諸所犯湯前為騎都尉王莽上書言父早死獨不封母明君共養皇太后尤勞苦師古曰莽傳言莽母渠今此云明君則明君者字也宜封竟為新都侯後皇太后同母弟茍參為水衡都尉死子伋為侍中師古曰伋音汲參妻欲為伋求封湯受其金五十斤許為求比上奏師古曰比例也音必寐反𢎞農太守張匡坐臧百萬以上狡猾不道有詔即訊師古曰就其所居考問之恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬皆此類也事在赦前後東萊郡黒龍冬出人以問湯湯曰是所謂𤣥門開㣲行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑衆不道妄稱詐歸異於上非所宜言大不敬廷尉増壽議以為不道無正法晋灼曰増夀姓趙也以所犯劇易為罪師古曰易音弋豉反臣下承用失其中故移獄廷尉如淳曰如今讞罪輕重無比者先以聞師古曰比謂相比附也所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民已申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑衆湯稱詐虛設不然之事非所宜言大不敬也制曰廷尉増壽當是師古曰當謂處正其罪也湯前有討郅支單于功其免湯為庶人徙邉又曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩繇役興卒暴之作師古曰卒讀曰猝卒徒䝉辜死者連屬師古曰䝉被也屬之欲反毒流衆庶海内怨望雖䝉赦令不宜居亰師於是湯與萬年俱徙燉煌久之燉煌太守奏湯前親誅郅支單于威行外國不宜近邊塞詔徙安定議郎耿育上書言便宜因寃訟湯曰延壽湯為聖漢揚鉤深致逺之威雪國家累年之恥討絶域不覊之君係萬里難制之虜豈有比哉先帝嘉之仍下明詔宣著其功師古曰仍頻也改年垂歴傳之無窮師古曰謂改年為竟寜也不以此事盖當其年上書者附著耳應是南郡獻白虎邉陲無警備㑹先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功師古曰趣讀曰促獨丞相匡衡排而不予封延壽湯數百戸此功臣戰士所以失望也孝成皇帝承建業之基乗征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曾不深惟本末之難以防未然之戒欲專主威排妒有功使湯塊然師古曰塊然獨處之意如土塊也音口内反被寃拘囚不能自明卒以無罪老棄敦煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒師古曰援引也音爰豈不痛哉且安不忘危盛必慮衰今國家素無文帝累年節儉富饒之畜師古曰畜讀曰蓄謂府庫也又無武帝薦延如淳曰薦延使羣臣薦士而延納之梟俊禽敵之臣獨有一陳湯耳師古曰梟謂斬其首而縣之也俊謂敵之魁率郅支是也春秋左氏傳曰得俊曰克劉攽曰梟俊禽敵之臣宜與薦延通為一句則與上文相配而下言獨有一陳湯耳自不妨梟善鬭故云梟俊猶言梟將也假使異世不及陛下尚望國家追錄其功封表其墓以勸後進也湯幸得身當聖世功曾未久反聽邪臣鞭逐斥逺使亡逃分竄死無處所師古曰分謂􅄆離也虞書舜典曰分北三苖逺覽之士莫不計度師古曰度大各反以為湯功累世不可及而湯過人情所有師古曰言湯所犯之罪過人情共有此事耳非特詭異深可誅責也湯尚如此雖復破絶筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳此臣所以於國家尤戚戚也書奏天子還湯卒於長安死後數年王莽為安漢公秉政旣内徳湯舊恩又欲讇皇太后以討郅支功尊元帝廟稱髙宗以湯延壽前功大賞薄及候丞杜勲不賞廼益封延壽孫遷千六百户追諡湯曰破胡壯侯封湯子馮為破胡侯勲為討狄侯叚㑹宗字子松天水上邽人也竟寜中以杜陵令五府舉為西域都䕶騎都尉光祿大夫西域敬其威信三嵗更盡還如淳曰邉吏三嵗一更下言終更皆是也師古曰更工衡反其下並同拜為沛郡太守以單于當朝徙為鴈門太守數年坐法免西域諸國上書願得㑹宗陽朔中復為都䕶㑹宗為人好大節矜功名與谷永相友善谷永閔其老復逺出予書戒曰足下以柔逺之令徳復典都䕶之重職師古曰柔安也柔逺言能安逺人虞書舜典曰柔逺能邇甚休甚休師古曰休美也若子之材可優逰都城而取卿相何必勒功昆山之仄總領百蠻懐柔殊俗子之所長愚無以喻師古曰言子思慮深長當不待已曉告也劉攽曰此言總領百蠻懐柔殊俗是子之所長愚無以相喻也劉奉世説同雖然朋友以言贈行敢不略意師古曰贈行謂將别相贈也略意略陳本意也方今漢徳隆盛逺人賔服傅鄭甘陳之功沒齒不可復見願吾子因循舊貫毋求竒功師古曰貫事也終更亟還亦足以復鴈門之踦應劭曰踦隻也㑹宗從沛郡下為鴈門又坐法免為踦隻不偶也師古曰亟急也復猶補也亟音居力反踦音居宜反劉攽曰由沛徙鴈門非踦也謂免官為踦耳萬里之外以身為本願詳思愚言㑹宗旣出諸國遣子弟郊迎小昆彌安日前為㑹宗所立徳之師古曰懐㑹宗之恩徳也欲徃謁諸翖侯止不聽遂至龜兹謁城郭甚親附師古曰謂城郭諸國康居太子保蘇匿率衆萬餘人欲降㑹宗奏狀漢遣衛司馬逢迎師古曰迎之於道隨所到而逢之故曰逢迎也㑹宗發戊巳校尉兵隨司馬受降司馬畏其衆欲令降者皆自縛保蘇匿怨望舉衆亡去㑹宗更盡還以擅發戊巳校尉之兵乏興有詔贖論拜為金城太守以病免嵗餘小昆彌為國民所殺諸翖侯大亂徴㑹宗為左曹中郎將光禄大夫使安輯烏孫師古曰輯與集同也立小昆彌兄末振將服䖍曰人姓名也師古曰其名也昆彌之兄不可别舉姓也定其國而還明年末振將殺大昆彌㑹病死漢恨誅不加元延中復遣㑹宗發戊巳校尉諸國兵即誅末振將大子番丘師古曰番音歩安反㑹宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地服䖍曰墊音墊阸之墊鄭氏曰婁音羸師古曰墊音丁念反娄音樓選精兵三十弩李竒曰三十人人持一弩徑至昆彌所在召番丘責以末振將骨月相殺殺漢公主子孫未伏誅而死使者受詔誅番丘即手劒擊殺番丘官屬以下驚恐馳歸小昆彌烏犂靡者末振將兄子也勒兵數千騎圍㑹宗㑹宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪師古曰飲音於禁反食讀曰飤次下亦同㑹宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去㑹宗還奏事公卿議㑹宗權得便宜以輕兵深入烏孫即誅番丘師古曰即就也宣眀國威宜加重賞天子賜㑹宗爵闗内侯黄金百斤是時小昆彌季父卑爰疐師古曰疐音竹二反擁衆欲害昆彌漢復遣㑹宗使安輯與都䕶孫建并力明年㑹宗病死烏孫中年七十五矣城郭諸國為發喪立祠焉賛曰自元狩之際張騫始通西域至於地節鄭吉建都䕶之號訖王莽世凡十八人皆以勇略選然其有功迹者具比亷襃以恩信稱郭舜以亷平著孫建用威重顯其餘無稱焉陳湯儻􅛅不自收歛師古曰儻􅛅無行檢也􅛅音蕩卒用困窮議者閔之故備列云前漢書卷七十前漢書卷七十考證傅介子傳詔曰樓蘭王安歸此傳及昭紀並作安歸西域傳作嘗歸必有一誤嘗為匈奴間候遮漢使者注師古曰言為匈奴之間而候伺臣召南按西域傳云後數為匈奴反間注云間音居莧反則此間字亦去聲注為匈奴之間當作為匈奴反間也反字誤作之字耳常恵傳名王騎將以下三萬九千人西域傳作名王犁汙都尉千長騎以下四萬級而匈奴傳作名王犂汙都尉千長將以下三萬九千餘級鄭吉傳屯田渠黎臣召南按渠黎黎字應作犁傳冩誤耳使䕶鄯善以西南道臣召南按西域傳出西域有二道自鄯善西行至莎車為南道自車師前王庭西行至疏勒為北道本文西字應讀言䕶鄯善以西之南道也下北道亦然都䕶之置自吉始焉通鑑考異曰百官表云西域都䕶加官地節二年初置盖誤以神爵二年為地節二年也西域傳云神爵三年亦誤陳湯傳由是遂西破呼偈臣召南按呼偈匈奴傳作烏揭又乗勝驕胡三省曰郅支嘗破殺閏振攻破呼韓邪又殺伊利月屢破烏孫兵故驕也投都頼水中注郅支水名臣召南按注稍誤盖康居國水名而郅支来築城其地故下文曰前至郅支城都頼水上也故使都䕶將軍來臣召南按都䕶不稱將軍延壽湯自稱以耀逺人耳下文見將軍受事者同軍候假丞杜勲胡三省曰漢制軍行有各部校尉部下有曲曲有軍候一人又都䕶有副校尉秩比二千石丞一人司馬候千人各二人杜勲本為軍候而假丞也右將軍王商臣召南按此樂昌侯王商以右將軍後為丞相自有列傳非王鳳弟成都侯王商也搴歙侯之旗臣召南按西域傳俱作翖侯師古注翖即翕字則此文歙字誤也改元垂歴傳之無窮注師古曰上書者附著耳胡三省曰按元紀詔曰匈奴郅支單于背叛禮義既服其辜呼韓邪單于修朝保塞邉垂長無兵革之事其改元為竟寜則改元寔以此非附著也臣召南按胡氏糾師古之失是也叚㑹宗傳天水上邽人也臣召南按地理志上邽縣屬隴西不屬天水即趙充國亦上邽人傳曰隴西上邽人可證也此文疑誤立小昆彌兄末振將通鑑考異曰烏孫傳以末振將為安日弟此傳作兄誤賛亷褒以恩信稱郭舜以亷平著孫建用威重顯臣召南按亷褒孫建事見烏孫傳郭舜事見康居傳褒字子上襄武人官至右將軍建字子夏官至左將軍元始中封成武侯前漢書卷七十考證
