body:
  text: 前漢書卷三十七漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注季布欒布田叔傳第七季布楚人也為任俠有名應劭曰任謂有堅完可任託以事也如淳曰相與信為任同是非為俠師古曰任謂任使其氣力俠之言挾也以權力俠輔人也任音人禁反俠音下頰反宋祁曰俠疑作挾項籍使將兵數窘漢王如淳曰窘困也師古曰窘音求閔反項籍滅髙祖購求布千金敢有舍匿罪三族師古曰舍止匿隠也布匿濮陽周氏周氏曰漢求將軍急迹且至臣家師古曰迹謂尋其蹤迹也能聼臣臣敢進計即否願先自剄布許之廼髠鉗布衣褐師古曰衣著之也褐毛布之衣也置廣柳車中服䖍曰東郡謂廣轍車為廣柳車鄭氏曰作大柳衣車若周禮䘮車也李竒曰廣柳大隆穹也晋灼曰周禮説衣翣柳柳聚也衆飾之所聚也此為載以䘮車欲人不知也師古曰晋鄭二説是也隆穹所謂車軬者耳非此之謂也軬音扶晚反并與其家僮數十人之魯朱家所賣之師古曰朱家魯人見游俠傳朱家心知其季布也買置田舍乃之雒陽見汝隂侯滕公師古曰夏侯嬰也本為滕令遂號為滕公説曰季布何罪臣各為其主用職耳師古曰職常也言此乃常道也一曰職主掌其事也項氏臣豈可盡誅邪今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急如此此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平之墓也師古曰子胥伍員也荆即楚也子胥之父伍奢為平王所殺子胥奔吳教吳伐楚平王已卒其後吳師入郢子胥掘平王之墓取屍鞭之三百也宋祁曰荆平字下當有王字又浙本忌字作亡君何不從容為上言之師古曰從音千容反滕公心知朱家大俠意布匿其所乃許諾侍閒果言如朱家指師古曰侍侍於天子閒謂事務之隙宋祁曰注末當添也字上乃赦布當是時諸公皆多布能摧剛為柔師古曰多猶重也朱家亦以此名聞當世布召見謝拜郎中宋祁曰浙本拜字下有為字孝惠時為中郎將單于嘗為書嫚吕太后師古曰嫚謂辭語褻汚也讀與慢同太后怒召諸將議之上將軍樊噲曰臣願得十萬衆横行匈奴中諸將皆阿吕太后師古曰阿曲也曲從其意以噲言為然布曰樊噲可斬也夫以髙帝兵三十餘萬困於平城噲時亦在其中今噲柰何以十萬衆横行匈奴中面謾師古曰謾欺誑也音嫚又音莫連反且秦以事胡陳勝等起今創痍未瘳師古曰痍傷也瘳差也痍音夷瘳音丑留反噲又面諛欲揺動天下是時殿上皆恐太后罷朝遂不復議擊匈奴事布為河東守孝文時人有言其賢召欲以為御史大夫又言其勇使酒難近應劭曰使酒􅒬酒也師古曰言因酒霑洽而使氣也近謂附近天子為大臣也宋祁本云一本又言字上有人字至留邸一月師古曰邸諸郡朝宿之舍在京師也見罷師古曰既引見而罷令還郡也劉攽曰見罷猶言見逐見棄耳非引見也布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者師古曰謂妄言其賢故云欺也今臣至無所受事宋祁曰一本無受字罷去此人必有毁臣者夫陛下以一人譽召臣一人毁去臣臣恐天下有識者聞之有以窺陛下師古曰窺見陛下淺深也上黙然慙曰河東吾股肱郡故特召君耳布之官辯士曹丘生數招權顧金錢孟康曰招求也以金錢事權貴而求得其形勢以自炫燿也李竒曰持權屬請人顧以金錢也師古曰二家之説皆非也言招求貴人威權因以請託故得他人顧金錢也劉攽曰招權謂作為形勢招權歸已也顧金錢者謂志在金錢也顧猶念也事貴人趙談等李竒曰宦者趙談也宋祁曰越本談作同與竇長君善服䖍曰景帝舅布聞寄書諫長君曰吾聞曹丘生非長者勿與通及曹丘生歸欲得書請布師古曰欲得竇長君書與布為己紹介也竇長君曰季將軍不説足下師古曰説讀曰悦足下無往固請書遂行使人先發書師古曰使人先致書於布發視也布果大怒待曹丘曹丘至則揖布曰楚人諺曰得黄金百不如得季布諾師古曰諺傳也足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎師古曰顧念也何足下距僕之深也布乃大説師古曰説讀曰悦引入留數月為上客厚送之布名所以益聞者曹丘揚之也布弟季心氣蓋關中遇人恭謹為任俠方數千里士爭為死嘗殺人亡吳從爰絲匿長事爰絲師古曰絲爰盎字言以兄長之禮事也宋祁云浙本注文也字作之弟畜灌夫籍福之屬嘗為中司馬如淳曰中尉之司馬中尉郅都不敢加少年多時時竊借其名以行師古曰詐自稱為心之賔客徒黨也當是時季心以勇布以諾聞關中布母弟丁公晋灼曰楚漢春秋云薛人名固師古曰此母弟為同母異父之弟宋祁云浙本注文無之字有也字為項羽將逐窘髙祖彭城西短兵接漢王急顧謂丁公曰兩賢豈相戹哉孟康曰丁公及彭城頼齮追上故曰兩賢也師古曰孟説非也兩賢髙祖自謂并謂固耳言吾與固俱是賢豈相戹困也故固感此言而止也雖與賴齮俱追而髙祖獨與固言耳丁公引兵而還及項王滅丁公謁見髙祖以丁公徇軍中師古曰徇行示也音辭俊反曰丁公為項王臣不忠使項王失天下者也遂斬之曰使後為人臣無傚丁公也欒布梁人也彭越為家人時嘗與布游師古曰家人猶言編户之人也窮困賣庸於齊為酒家保孟康曰酒家作保保庸也可保信故謂之保師古曰謂庸作受顧也為保謂保可任使數歲别去而布為人所略賣為奴於燕為其主家報仇服䖍曰為買者報仇也燕將臧荼舉以為都尉荼為燕王布為將及荼反漢擊燕虜布梁王彭越聞之乃言上請贖布為梁大夫使於齊未反師古曰反還也漢召彭越責以謀反夷三族梟首雒陽下詔有收視者輙捕之布還奏事彭越頭下祠而哭之吏捕以聞上召布罵曰若與彭越反邪吾禁人勿收若獨祠而哭之與反明矣師古曰若汝也趣亨之師古曰趣讀曰促促急也方提趨湯師古曰提舉也舉而欲投之於湯也趨讀曰趣趨嚮也顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽成臯閒項王所以不能遂西徒以彭王居梁地師古曰徒但也與漢合從苦楚也師古曰從音子容反當是之時彭王壹顧與楚則漢破與漢則楚破且垓下之會微彭王項氏不亡師古曰微無也天下已定彭王剖符受封之欲傳之萬世宋祁曰封之之字誤可刪添亦字今漢壹徵兵於梁宋祁曰越本作今帝徵兵於梁浙本從今彭王病不行而疑以為反反形未見以苛細誅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨上乃釋布拜為都尉孝文時為燕相至將軍布稱曰窮困不能辱身非人也富貴不能快意非賢也於是嘗有德厚報之有怨必以法滅之吳楚反時以功封為鄃侯蘇林曰鄃音輸清河縣也復為燕相燕齊之閒皆為立社號曰欒公社布薨子賁嗣侯師古曰賁音奔孝武時坐為太常犧牲不如令國除田叔趙陘城人也蘇林曰陘音刑其先齊田氏也叔好劒學黄老術於樂鉅公師古曰姓樂名鉅也公者老人之稱也為人亷直喜任俠師古曰喜好也音許吏反游諸公師古曰諸公皆長者也趙人舉之趙相趙午言之趙王張敖以為郎中數歲趙王賢之未及遷會趙午貫髙等謀弑上事發覺漢下詔捕趙王及羣臣反者趙有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髠鉗隨王至長安趙王敖事白得出師古曰白明也廢王為宣平侯宋祁云一本無王字乃進言叔等十人上召見與語漢廷臣無能出其右者師古曰材不勝宋祁云浙本注文作材能不勝之也上説師古曰説讀曰悦也宋祁云刪也字盡拜為郡守諸侯相叔為漢中守十餘年孝文帝初立召叔問曰公知天下長者乎對曰臣何足以知之上曰公長者宜知之叔頓首曰故雲中守孟舒長者也是時孟舒坐虜大入雲中免上曰先帝置孟舒雲中十餘年矣虜嘗一入孟舒不能堅守無故士卒戰死者數百人長者固殺人乎叔叩頭曰夫貫髙等謀反天子下明詔趙有敢隨張王者罪三族然孟舒自髠鉗隨張王以身死之豈自知為雲中守哉漢與楚相距士卒罷敝師古曰罷讀為疲下亦同而匈奴冐頓新服北夷來為邊寇孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父以故死者數百人孟舒豈敺之哉師古曰敺與驅同言不敺之令戰也敺字從攴攴音普木反宋祁曰豈敺之哉之下當有戰字是乃孟舒所以為長者於是上曰賢哉孟舒復召以為雲中守後數歲叔坐法失官梁孝王使人殺漢議臣爰盎景帝召叔案梁具得其事還報上曰梁有之乎對曰有之事安在師古曰索其狀也叔曰上無以梁事為問也師古曰言不須更論之也今梁王不伏誅是廢漢法也如其伏誅太后食不甘味臥不安席此憂在陛下於是上大賢之以為魯相相初至官民以王取其財物自言者百餘人叔取其渠率二十人笞怒之師古曰渠大也曰王非汝主邪何敢自言主魯王聞之大慚發中府錢使相償之師古曰中府王之財物藏也相曰王自使人償之不爾是王為惡而相為善也師古曰不爾是則王為惡魯王好獵相常從入苑中王輙休相就館相常暴坐苑外師古曰於外自暴露而坐終不休曰吾王暴露獨何為舎王以故不大出遊數年以官卒魯以百金祠少子仁不受曰義不傷先人名仁以壯勇為衞將軍舎人張晏曰衞青也數從擊匈奴衞將軍進言仁為郎中至二千石丞相長史失官後使刺三河還如淳曰為刺史於三河郡三河謂河南河内河東也奏事稱意拜為京輔都尉月餘遷司直數歲戾太子舉兵仁部閉城門令太子得亡坐縱反者族師古曰遣仁掌閉城門乃令太子得出故云縱反也賛曰以項羽之氣而季布以勇顯名楚身履軍搴旗者數矣鄧展曰履軍戰勝蹈履之李竒曰搴㧞也孟康曰搴斬取也師古曰謂勝敵㧞取旗也鄧李二説皆是搴音騫今流俗書本改履謂屢而加典字云身屢典軍非也宋祁曰注文謂屢當作為屢可謂壯士及至困戹奴僇苟活而不變何也師古曰僇古戮字也奴僇謂髠鉗為奴而賣之也彼自負其材受辱不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感槩而自殺非能勇也師古曰感槩謂感念局狹為小節槩音工代反其畫無俚之至耳張晏曰言其計畫道理無所至故自殺耳蘇林曰俚頼也言其計畫無所成頼晋灼曰揚雄方言曰俚聊也許慎曰頼也此為其計畫無所聊頼至於自殺耳師古曰晋説是也欒布哭彭越田叔隨張敖赴死如歸彼誠知所處如淳曰太史公曰非死者難處死者難也雖古烈士何以加哉前漢書卷三十七前漢書卷三十七考證季布傳夫以髙帝兵三十餘萬臣召南按史記作將兵四十餘萬衆而本書匈奴傳載布言三十二萬又噲時亦在其中六字史記所無然匈奴傳詳載布言且及平城之歌詳畧不同如此又言其勇使酒難近注師古曰近謂附近天子為大臣也顧炎武曰難近謂令人畏而逺之師古注非也中尉郅都不敢加史記作不敢不加禮田叔傳其畫無俚之至耳史記作其計無復之耳前漢書卷三十七考證
