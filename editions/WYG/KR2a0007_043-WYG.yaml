body:
  text: 前漢書巻四十三漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注酈陸朱劉叔孫傳第十三酈食其陳留高陽人也師古曰食音異其音基好讀書家貧落魄無衣食業鄭氏曰魄音薄應劭曰志行衰惡之貌也師古曰落魄失業無次也鄭音是為里監門然吏縣中賢豪不敢役師古曰吏及賢者豪者皆不敢使役食其皆謂之狂生及陳勝項梁等起諸將徇地過高陽者數十人師古曰徇亦畧也音辭峻反食其聞其將皆握齱好荷禮應劭曰握齱急促之貌師古曰荷與苛同苛細也齱音初角反自用不能聽大度之言食其廼自匿後聞沛公畧地陳留郊沛公麾下騎士適食其里中子服䖍曰食其里中子適會作沛公騎士沛公時時問邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大畧此真吾所願從游莫為我先師古曰先謂紹介也若見沛公師古曰若汝也謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒師古曰喜好也音許吏反諸客冠儒冠來者沛公輙解其冠溺其中師古曰溺讀曰尿音乃釣反與人言常大罵未可以儒生説也食其曰第言之師古曰第但也騎士從容言食其所戒者師古曰從子容反沛公至高陽傳舍師古曰傳舍者人所止息前人已去後人復來轉相傳也一音張戀反謂傳置之舍也其義兩通它皆類此使人召食其食其至入謁沛公方踞牀令兩女子洗而見食其師古曰洗足也音先典反食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎宋祁云浙本破作攻沛公罵曰豎儒師古曰言其賤劣如僮豎夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣師古曰輟止也起衣著衣也延食其上坐謝之食其因言六國從衡時師古曰從子容反衡横也沛公喜賜食其食問曰計安出食其曰足下起瓦合之卒師古曰瓦合謂如破瓦之相合雖曰聚合而不齊同收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五逹之郊也如淳曰四面徃來通之幷數中央凡五逹也臣瓚曰四通五逹言無險阻也今其城中又多積粟臣知其令師古曰素與其縣令相知今請使令下足下師古曰下降也即不聽足下舉兵攻之臣為内應於是遣食其徃沛公引兵隨之遂下陳留號食其為廣野君食其言弟商使將數千人從沛公西南畧地食其嘗為説客馳使諸侯漢三年秋項羽擊漢㧞滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之師古曰救趙及梁韓信方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有臧粟甚多楚人㧞滎陽不堅守敖倉乃引而東令適卒分守成臯師古曰適讀曰謫謫卒謂卒之有罪謫者即所謂謫戍此乃天所以資漢方今楚易取而漢反郤自奪便師古曰不圖進取是為自奪便利也郤音丘畧反臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海内揺蕩農夫釋耒紅女下機師古曰耒手耕曲木也音盧對反紅讀曰工天下之心未有所定也願足下急復進兵収取滎陽據敖庾之粟師古曰敖庾即敖倉塞成臯之險杜太行之道師古曰太行山名在河内野王之北上黨之南行音胡剛反距飛狐之口如淳曰上黨壺闗也臣瓚曰飛狐在代郡西南師古曰瓚説是壺闗無飛狐之名守白馬之津以示諸侯形制之勢師古曰以地形而制服則天下知所歸矣方今燕趙以定唯齊未下今田廣據千里之齊田間將二十萬之衆軍於歴城劉攽曰此時何縁更有田間按田横傳乃是田解横傳云齊使華毋傷田解軍歴下以距漢諸田宗彊負海岱阻河濟師古曰負背也岱泰山也南近楚齊人多變詐宋祁曰人疑作民足下雖遣數十萬師未可以歲月破也臣請得奉明詔説齊王使為漢而稱東藩上曰善廼從其畫復守敖倉而使食其説齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王背約不與而王之漢中項王遷殺義帝漢王起蜀漢之兵擊三秦出闗而責義帝之負處宋祁曰或無負字收天下之兵立諸侯之後降城即以侯其將得賂則以分其士與天下同其利豪英賢材皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下師古曰方併也項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘師古曰言項羽吝爵賞而念舊惡戰勝而不得其賞㧞城而不得其封非項氏莫得用事師古曰言唯任同姓之親為人刻印玩而不能授孟康曰刻斷無復亷鍔也臣瓚曰項羽吝於爵賞玩惜侯印不能以封人師古曰韓信傳作刓此作玩其義各通孟説非也攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王可坐而䇿也夫漢王發蜀漢定三秦涉西河之外援上黨之兵師古曰援引也音爰下井陘誅成安君破北魏師古曰謂魏豹也梁地既有魏名故謂此為北舉三十二城此黄帝之兵非人之力天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之阸距飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然廼聽食其罷歴下兵守戰備與食其日縱酒師古曰日日縱意而飲酒韓信聞食其馮軾下齊七十餘城師古曰馮讀曰憑憑據也軾車前横板隆起者也云憑軾者言但安坐乗車而游説不用兵衆廼夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣已師古曰言其與韓信通謀廼亨食其引兵走漢十二年曲周侯酈商以丞相將兵擊黥布有功高祖舉功臣思食其食其子疥師古曰疥音介數將兵上以其父故封疥為高梁侯後更食武陽卒子遂嗣三世侯平有罪國除陸賈楚人也以客從高祖定天下名有口辯師古曰時人皆謂其口辯居左右常使諸侯時中國初定尉佗平南越因王之師古曰佗音徒河反高祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈服䖍曰魋音椎今兵士椎頭髻也師古曰結讀曰髻椎髻者一撮之髻其形如椎箕踞謂伸其兩脚而坐亦曰箕踞其形似箕賈因説佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶師古曰偝父母之國無骨肉之恩是反天性也欲以區區之越與天子抗衡為敵國師古曰區區小貌禍且及身矣夫秦失其正師古曰正亦政也諸侯豪桀並起唯漢王先入闗據咸陽項籍背約自立為西楚霸王諸侯皆屬可謂至彊矣然漢王起巴蜀鞭笞天下刧諸侯遂誅項羽五年之間海内平定此非人力天之所建也天子聞君王王南越而不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣師古曰郊迎謂出郊而迎乃欲以新造未集之越師古曰集猶成也屈强於此師古曰屈音其勿反屈强謂不柔服也漢誠聞之掘燒君王先人冢墓夷種宗族師古曰夷平也謂平除其種族使一偏將將十萬衆臨越即越殺王降漢如反覆手耳師古曰言其易於是佗乃蹶然起坐師古曰蹶然驚起之貌也音厥謝賈曰居蠻夷中久殊失禮義因問賈曰我孰與蕭何曹參韓信賢師古曰與如也賈曰王似賢也復問曰我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三王之業統天下理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖判未始有也師古曰言自開闢以來未嘗有也今王衆不過數萬皆蠻夷崎嶇山海間師古曰崎音丘宜反嶇音區譬如漢一郡王何乃比於漢佗大笑曰吾不起中國故王此使我居中國何遽不若漢師古曰言有何廹促而不如漢也遽音其庻反廼大説賈師古曰説讀曰悦謂愛悦之留與飲數月曰越中無足與語至生來令我日聞所不聞師古曰言素所不聞者日聞之賜賈橐中裝直千金張晏曰珠玉之寶也裝褁也如淳曰明月珠之屬也師古曰有底曰囊無底曰橐言其寶物質輕而價重可入囊橐以齎行故曰橐中裝也它送亦千金蘇林曰非橐中物故曰它送也師古曰它猶餘也賈卒拜佗為南越王令稱臣奉漢約歸報高帝大説師古曰説讀曰悦拜賈為太中大夫賈時時前説稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡師古曰夫差吳王闔閭子也好用兵卒為越所滅智伯晉卿荀瑶也貪而好勝率韓魏共攻趙襄子襄子與韓魏約反而喪之夫音扶差音楚宜反宋祁云浙本注文宜作崖秦任刑法不變卒滅趙氏鄭氏曰秦之先造父封於趙城其後以為姓張晏曰莊襄王為質於趙還為太子遂稱趙氏師古曰據秦本紀鄭説是鄉使秦以并天下宋祁曰以疑作已行仁義法先聖陛下安得而有之師古曰鄉讀曰嚮安焉也高帝不懌師古曰懌和樂也有慙色謂賈曰試為我著秦所以失天下吾所以得之者師古曰著明也謂作書明言之也及古成敗之國賈凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬歲稱其書曰新語師古曰其書今見存孝惠時呂太后用事欲王諸呂畏大臣及有口者師古曰有口謂辯士賈自度不能爭之師古曰度音徒各反廼病免以好畤田地善徃家焉師古曰好畤即今雍州好畤縣有五男乃出所使越橐中裝賣千金分其子子二百金令為生産賈常乘安車駟馬從歌鼓瑟侍者十人寶劒直百金謂其子曰與女約過女女給人馬酒食極欲十日而更師古曰又改向一子處宋祁曰欲疑作飲所死家得寶劒車騎侍從者一歲中以徃來過它客率不過再過師古曰非徒至諸子所又徃來經過佗處為賓客率計一歳之中每子不過再過至也上過音工禾反數擊鮮毋久溷女為也服䖍曰溷辱也吾常行數擊新美食不久辱汝也師古曰鮮謂新殺之肉也溷亂也言我至之時汝宜數數擊殺牲牢與我鮮食我不久住亂累汝也數音所角反溷音下困反劉攽曰史記作數見不鮮言人情頻見則不美故毋久溷女也馬宮傳君有不鮮不鮮是漢人語也宋祁曰按宮傳自云三公之位鼎足承君不有鮮明固守無以固位劉似誤引呂太后時王諸呂諸呂擅權欲刧少主危劉氏右丞相陳平患之力不能爭恐禍及已平常燕居深念師古曰念思也以國家不安故静居獨慮思其方䇿賈徃不請直入坐師古曰言不因門人將命而徑入自坐陳平方念不見賈師古曰思慮之際故不覺賈至賈曰何念深也平曰生揣我何念孟康曰揣度也韋昭曰揣音初委反賈曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附師古曰豫素也士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯師古曰謂者與之言絳侯與我戲易吾言師古曰言絳侯與我相戲狎輕易其言耳君何不交驩太尉深相結為陳平畫呂氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉師古曰厚為共具而與太尉樂飲太尉亦報如之兩人深相結呂氏謀益壞陳平乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此遊漢廷公卿間師古曰廷謂朝廷名聲籍甚孟康曰言狼籍甚盛及誅呂氏立孝文賈頗有力孝文即位欲使人之南越丞相平乃言賈為太中大夫徃使尉佗去黄屋稱制師古曰黄屋謂車上之蓋也黄屋及稱制皆天子之儀故令去之令比諸侯皆如意指語在南越傳陸生竟以壽終朱建楚人也故嘗為淮南王黥布相有罪去後復事布布欲反時問建建諫止之布不聽聽梁父侯遂反如淳曰遂者布臣也臣瓚曰布用梁甫侯之計而遂反師古曰瓚説是也漢既誅布聞建諫之高祖賜建號平原君家徙長安為人辯有口刻廉剛直行不茍合義不取容辟陽侯行不正得幸呂太后師古曰審食其欲知建師古曰欲與相知建不肯見及建母死貧未有以發喪方假貣服具師古曰貣音土得反陸賈素與建善乃見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我陸生曰前日君侯欲知平原君平原君義不知君以其母故張晏曰相知當同恤災危以母在故義不知君也今其母死君誠厚送喪則彼為君死矣辟陽侯廼奉百金裞師古曰贈終者之衣被曰裞言以百金為衣被之具裞音式芮反其字從衣列侯貴人以辟陽侯故徃賻凡五百金師古曰布帛曰賻久之人或毁辟陽侯惠帝大怒下吏欲誅之太后慙不可言師古曰不可自言之大臣多害辟陽侯行欲遂誅之辟陽侯困急使人欲見建建辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺師古曰佞幸傳云高祖時則有籍孺孝惠有閎孺斯則二人皆名為孺而姓各别今此云閎籍孺誤剩籍字後人所妄加耳説曰君所以得幸帝天下莫不聞師古曰言不以材徳進今辟陽侯幸太后而下吏師古曰下音胡嫁反他皆類此道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君君何不肉袒為辟陽侯言帝師古曰肉袒謂脱其衣袖而見肉肉袒者自挫辱之甚冀見哀憐帝聽君出辟陽侯太后大驩兩主俱幸君君富貴益倍矣於是閎籍孺大恐從其計言帝帝果出辟陽侯辟陽侯之囚欲見建建不見辟陽侯以為背之大怒及其成功出之大驚呂太后崩大臣誅諸呂辟陽侯於諸呂至深如淳曰辟陽侯與諸呂相親信為罪宜誅者至深也師古曰直言辟陽侯與諸呂相知情義至深重耳如説非也卒不誅計畫所以全者皆陸生平原君之力也孝文時淮南厲王殺辟陽侯以黨諸呂故孝文聞其客朱建為其䇿使吏捕欲治聞吏至門建欲自殺諸子及吏皆曰事未可知何自殺為建曰我死禍絶不及乃身矣師古曰乃汝也遂自剄文帝聞而惜之曰吾無殺建意也乃召其子拜為中大夫使匈奴單于無禮罵單于遂死匈奴中婁敬齊人也漢五年戍隴西過雒陽高帝在焉敬脱輓輅蘇林曰輅音凍􅏖之􅏖一木横􅃒車前二人挽之一人推之孟康曰輅音胡格反師古曰二音同聲也宋祁曰注文二音同聲也當删作音同耳見齊人虞將軍曰臣願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見師古曰衣著也帛謂繒也衣褐衣褐見師古曰此褐謂織毛布之衣不敢易衣虞將軍入言上上召見賜食已而問敬敬説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下王天下與周異周之先自后稷堯封之邰師古曰邰邑名也即今武功故城是其處音吐材反積德絫善十餘世師古曰絫古累字公劉避桀居豳大王以狄伐故去豳杖馬箠去居岐師古曰箠馬䇿也杖謂拄之也云杖馬箠者以示無所擕持也箠音止橤反國人爭歸之及文王為西伯斷虞芮訟文頴曰二國爭田見文王之德而自和也師古曰虞今虞州是也芮今芮城縣是也宋祁曰芮字下一有之字始受命呂望伯夷自海濱來歸之師古曰濱涯也音賓又音頻武王伐紂不期而會孟津上八百諸侯遂滅殷宋祁曰津字下一有之字成王即位周公之屬傅相焉廼營成周都雒以為此天下中師古曰中音竹仲反宋祁曰雒字下一有陽字諸侯四方納貢職道里鈞矣有德則易以王無德則易以亡凡居此者欲令務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而為二師古曰謂東周君西周君天下莫朝周周不能制非德薄形勢弱也今陛下起豐沛宋祁曰豐字下當有擊字收卒三千人以之徑徃卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起師古曰夷創也音痍而欲比隆成康之時臣竊以為不侔矣師古曰侔等也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具師古曰卒讀曰猝因秦之故資甚美膏腴之地此所謂天府師古曰府聚也萬物所聚陛下入闗而都之山東雖亂秦故地可全而有也夫與人鬭不搤其亢拊其背未能全勝張晏曰亢喉嚨也師古曰搤與㧖同謂捉持之也亢音岡又音下郎反今陛下入闗而都按秦之故此亦搤天下之亢而拊其背也高帝問羣臣羣臣皆山東人爭言周王數百年秦二世則亡不如都周上疑未能決及留侯明言入闗便即日駕西都闗中於是上曰本言都秦地者婁敬婁者劉也賜姓劉氏拜為郎中號曰奉春君張晏曰春歲之始以其首勸都闗中漢七年韓王信反高帝自徃擊至晉陽聞信與匈奴欲擊漢上大怒使人使匈奴匈奴匿其壯士肥牛馬師古曰匿藏也徒見其老弱及羸畜使者十軰來皆言匈奴易擊上使劉敬復徃使匈奴還報曰兩國相擊此宜夸矜見所長師古曰見示也今臣徃徒見羸胔老弱師古曰胔音漬謂死者之肉也一説胔讀曰瘠瘠瘦也此必欲見短伏奇兵以爭利愚以為匈奴不可擊也是時漢兵以踰句注三十餘萬衆師古曰句注山名在鴈門兵已業行上怒罵敬曰齊虜以舌得官廼今妄言沮吾軍師古曰沮謂止壞也音材汝反械繫敬廣武師古曰械謂桎桔也廣武縣名屬鴈門遂徃至平城匈奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十軰言可擊者矣廼封敬二千户為闗内侯號建信侯高帝罷平城歸韓王信亡入胡當是時冒頓單于兵彊控弦四十萬騎師古曰控引也謂皆引弓也音口弄反數苦北邊上患之問敬敬曰天下初定士卒罷於兵革師古曰罷讀曰疲未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何師古曰顧思念也敬曰陛下誠能以適長公主妻單于師古曰適讀曰嫡謂皇后所生厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺師古曰鮮少也問遺謂餉饋之也鮮音息善反遺音弋季反使辯士風諭以禮節師古曰風讀曰諷冐頓在固為子壻死外孫為單于豈曾聞外孫敢與大父亢禮哉宋祁曰聞字下越本無外字可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肻貴近無益也師古曰近音其靳反高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女師古曰言唯以此自慰柰何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于師古曰於外庻人之家取女而名之為公主使敬徃結和親約敬從匈奴來因言匈奴河南白羊樓煩王張晏曰白羊匈奴國名也去長安近者七百里輕騎一日一夕可以至師古曰言匈奴欲來為宼者秦中新破師古曰秦中謂闗中故秦地也新破謂經兵革之後未殷實少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與師古曰皆二國之王族今陛下雖都關中實少人北近胡宼東有六國彊族一日有變陛下亦未得安枕而卧也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後及豪桀名家且實闗中無事可以備胡諸侯有變亦足率以東伐此彊本弱末之術也上曰善乃使劉敬徙所言闗中十餘萬口師古曰今高陵櫟陽諸田華陰好畤諸景及三輔諸屈諸懷尚多皆此時所徙叔孫通薛人也晉灼曰楚漢春秋名何師古曰薛縣名屬魯國秦時以文學徵待詔博士師古曰於博士中待詔數歲陳勝起二世召博士諸儒生問曰楚戍卒攻蘄入陳於公何如博士諸生三十餘人前曰人臣無將將則反罪死無赦臣瓚曰將謂為逆亂也師古曰將有其意願陛下急發兵擊之二世怒作色師古曰不許其言陳勝為反作色謂變動其色通前曰諸生言皆非夫天下為一家毁郡縣城鑠其兵視天下弗復用師古曰鑠銷也視讀曰示且明主在上法令具於下吏人人奉職四方輻輳師古日輳聚也言如車輻之聚於轂也字或作凑並音千豆反安有反者此特羣盜鼠竊狗盜師古曰如鼠之竊如狗之盜何足置齒牙間哉郡守尉今捕誅何足憂二世喜盡問諸生諸生或言反或言盜於是二世令御史按諸生言反者下吏非所宜言諸生言盜者皆罷之乃賜通帛二十匹衣一襲師古曰一襲上下皆具也今人呼為一副也拜為博士通已出反舍師古曰還其所居也諸生曰生何言之諛也通曰公不知我幾不免虎口師古曰幾音鉅依反廼亡去之薛薛已降楚矣及項梁之薛通從之敗定陶從懷王懷王為義帝徙長沙通留事項王漢二年漢王從五諸侯入彭城通降漢王通儒服漢王憎之廼變其服服短衣楚製師古曰製謂裁衣之形製漢王喜通之降漢從弟子百餘人然無所進剸言諸故羣盜壯士進之師古曰剸與專同又音之兖反此則言專聲之急上者耳弟子皆曰事先生數年幸得從降漢今不進臣等剸言大猾何也師古曰狡猾之人通乃謂曰漢王方䝉矢石爭天下師古曰䝉猶被也冒也諸生寧能鬭乎故先言斬將搴旗之士師古曰搴㧞取音騫諸生且待我我不忘矣漢王拜通為博士號稷嗣君張晏曰后稷佐唐欲令復如之漢王已并天下諸侯共尊為皇帝於定陶通就其儀號師古曰就成也高帝悉去秦儀法為簡易羣臣飲爭功醉或妄呼師古曰呼音个故反按劒擊柱宋祁曰按當作㧞上患之通知上益饜之説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀高帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復也師古曰復重也因也音扶目反臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之師古曰度音徒各反於是通使徵魯諸生三十餘人師古曰通為使者而徵諸生魯有兩生不肻行曰公所事者且十主皆面諛親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積德而後可興也師古曰言行德敎百年然後可定禮樂吾不忍為公所為公所為不合古吾不行公徃矣毋汚我通笑曰若真鄙儒不知時變師古曰若汝也鄙言不通遂與所徵三十人西師古曰西入關及上左右為學者師古曰左右謂近臣也為學謂素有學術與其弟子百餘人為緜蕞野外應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子悦反如説是習之月餘通曰上可試觀上使行禮曰吾能為此廼令羣臣習肄師古曰肄亦習也音弋二反㑹十月漢七年長樂宮成諸侯羣臣朝十月師古曰適㑹七年十月而長樂宮新成也漢時尚以十月為正月故行朝歲之禮史家追書十月儀師古曰欲叙其下儀法先言儀如此也先平明師古曰未平明之前謁者治禮引以次入殿門廷中陳車騎戍卒衞官設兵張旗志師古曰志與幟同音式餌反傳曰趨師古曰傳聲敎入者皆令趨謂疾行為敬也殿下郎中俠陛陛數百人師古曰俠與挾同挾其兩旁每陛皆數百人也功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉師古曰鄉讀皆曰嚮大行設九賓臚句傳蘇林曰上傳語告下為臚下告上為句也韋昭曰大行掌賓客之禮今之鴻臚也九賓則周禮九儀也謂公侯伯子男孤卿大夫士也師古曰臚音廬劉攽曰賓謂傳擯之擯九賓擯者九人掌臚句傳也於是皇帝輦出房百官執㦸傳警師古曰傳聲而唱警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒師古曰法酒者猶言禮酌謂不飲之至醉劉攽曰謂朝畢以法置酒也上禮畢盡伏謂朝禮也下皆伏抑首謂置酒上壽也故下文又結云竟朝罷無敢讙譁失禮者若如顔説則置法酒便是羣臣飲不至醉而上夀乃在下文又語重複不序矣諸侍坐殿上皆伏抑首師古曰抑屈也謂依禮法不敢平坐而視以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是高帝曰吾廼今日知為皇帝之貴也拜通為奉常師古曰解在百官公卿表後改為太常也賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務九年高帝徙通為太子太傅十二年高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖如淳曰食無菜茹為啖師古曰啖當作淡淡謂無味之食也言共攻擊勤苦之事而食無味之食也淡音大噉反其可背哉陛下必欲廢適而立少師古曰適讀曰嫡臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳師古曰特但也通曰太子天下本本壹揺天下震動奈何以天下戲高帝曰吾聽公及上置酒見留侯所招客從太子入見上遂無易太子志矣高帝崩孝惠即位廼謂通曰先帝園陵寢廟羣臣莫習徙通為奉常師古曰又重為之也定宗廟儀法及稍定漢諸儀法皆通所論著也惠帝為東朝長樂宮師古曰朝太后於長樂宮及間徃師古曰非大朝時中閒小謁見數蹕煩民孟康曰妨其徃來也作復道方築武庫南如淳曰作復道方始築武庫南也師古曰復音方目反通奏事因請間師古曰請空隙之時不欲對衆言之曰陛下何自築復道高帝寢衣冠月出游高廟服䖍曰持高廟中衣月旦以游於衆廟已而復之應劭曰月旦出高帝衣冠備法駕名曰游衣冠如淳曰高祖之衣冠藏在宮中之寢三月出游其道正值今之所作復道下故言乘宗廟道上行也晉灼曰黄圖高廟在長安城門街東寢在桂宮北服言衣藏於廟中如言宮中皆非也師古曰諸家之説皆未允也謂從高帝陵寢出衣冠游於高廟每月一為之漢制則然而後之學者不曉其意謂以月出之時而夜游衣冠失之遠也子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉師古曰舉事不當有過失今已作百姓皆知之矣願陛下為原廟師古曰原重也先以有廟今更立之故云重也渭北劉攽曰渭北字宜屬上句衣冠月出游之益廣宗廟大孝之本上乃詔有司立原廟惠帝常出游離宮通曰古者有春嘗菓方今櫻桃熟可獻師古曰禮記曰仲春之月羞以含桃先薦寢廟即此櫻桃也今所謂朱櫻者是也櫻音於耕反願陛下出因取櫻桃獻宗廟上許之諸菓獻由此興贊曰高祖以征伐定天下而縉紳之徒騁其知辯師古曰縉紳儒者之服也解在郊祀志並成大業語曰廊廟之材非一木之枝帝王之功非一士之畧師古曰此語本出慎子信哉劉敬脱輓輅而建金城之安叔孫通舍枹鼓而立一王之儀師古曰枹者鼓椎所以擊鼓也舍枹鼓者言新罷戰陣之事别創漢代之禮故云一王之儀也枹音桴其字從木也遇其時也酈生自匿監門待主然後出猶不免鼎鑊師古曰鼎大而無足曰鑊音胡郭反朱建始名廉直既距辟陽不終其節亦以喪身陸賈位止大夫致仕諸呂師古曰以諸呂僣差託病歸家不受憂責從容平勃之間師古曰謂和輯陳平周勃以安漢朝也從音弋容反附會將相以彊社稷身名俱榮其最優乎前漢書卷四十三前漢書卷四十三考證酈食其傳為里監門然吏縣中賢豪不敢役臣召南按史記吏字在然字上言食其為監門小吏而縣中賢豪不敢役使也班氏當以監門賤役非吏故倒吏字於下守白馬之津臣召南按白馬縣屬東郡大河所經其西岸即黎陽也方今燕趙以定惟齊未下云云司馬光曰史漢皆以食其勸取敖倉及請説齊為一事獨劉向新序分為二新序是涉西河之外胡三省曰河自砥柱以上龍門以下為西河破北魏注梁地既有魏名故謂此為北索隱曰謂魏王豹國於河北故也亦謂之西魏以大梁於安邑為東也封疥為高梁侯後更食武陽臣召南按武陽史記作武遂而二表俱不言後更食邑未知孰是又子遂嗣亦與表異據表疥子勃勃子平疑遂字訛婁敬傳及文王為西伯斷虞芮訟始受命臣召南按始受命應屬上句師古誤斷之婁敬當漢初即有質成受命之説謂文王及身稱王改元彼毛公解詩伏生解書司馬遷撰史記因譌襲謬不足怪也今陛下起豐沛宋祁曰豐字下當有擊字按宋説無理是時漢兵以踰句注三十餘萬衆臣召南按三十餘萬衆史記作二十餘萬又下文控弦四十萬騎史記作三十萬叔孫通傳遂與所徵三十人西史記作三十三人西百官執㦸傳警執㦸史記作執職徐廣曰職一作幟拜通為奉常臣召南按此文訂史記稱太常之失也下文徙通為奉常亦然漢初因秦官曰奉常至景帝中六年始更名太常前漢書卷四十三考證
