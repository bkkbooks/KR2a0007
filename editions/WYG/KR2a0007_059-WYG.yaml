body:
  text: 前漢書卷五十九漢蘭臺令史班固撰唐正議大夫行祕書少監琅琊縣開國子顔師古注張湯傳第二十九張湯杜陵人也父為長安丞出湯為兒守舍師古曰稱為兒者言其尚幼少也還䑕盗肉父怒笞湯湯掘熏得䑕及餘肉劾䑕掠治傳爰書訊鞫論報師古曰傳謂傳逮若今之追逮赴對也爰換也以文書代換其口辭也訊考問也鞫窮也謂窮覈之也論報謂上論之而獲報也訊音信并取䑕與肉具獄磔堂下師古曰具為治獄之文處正其罪而磔䑕也宋祁曰顔觧具獄似失其意直謂成按耳于定國杜緩兩傳已觧緩延年之子父見之視文辭如老獄吏大驚遂使書獄如淳曰決獄之書謂律令也劉奉世曰傳非逮也若傳逮則不當先言掠治矣傳者傳囚辭也爰書者盖趙髙作爰歴教學𨽻書時獄吏書體盖用此故從俗呼為爰書也以此父使之書獄謂案牘耳非律令也父死後湯為長安吏周陽侯為諸卿時師古曰姓趙嘗繫長安湯傾身事之及出為侯大與湯交徧見貴人湯給事内史為寗成掾以湯為無害言大府師古曰大府丞相府也無害言其最勝也觧在蕭何傳調茂陵尉師古曰調選也選以為此官也調音徒釣反治方中孟康曰方中陵上土作方也湯主治之蘓林曰天子即位豫作陵諱之故言方中或言斥土如淳曰漢注陵方中用地一頃深十二丈師古曰蘓說非也古謂掘地為阬曰方今荆楚俗土功築作筭程課者猶以方計之非謂避諱也武安侯為丞相師古曰田蚡徴湯為史薦補侍御史治陳皇后巫蠱獄深竟黨與上以為能遷太中大夫與趙禹共定諸律令務在深文拘守職之吏蘓林曰拘刻於守職之吏已而禹至少府湯為廷尉兩人交驩兄事禹師古曰事之如兄禹志在奉公孤立而湯舞知以御人師古曰舞弄其智制御它人也始為小吏乾没與長安富賈田甲魚翁叔之屬交私服䖍曰乾没射成敗也如淳曰豫居物以待之得利為乾失利為沒師古曰乾音干及列九卿收接天下名士大夫已心内雖不合然陽浮道與之師古曰陽以道義為交非其中心故云浮也是時上方鄉文學師古曰鄉讀曰嚮湯决大獄欲傅古義師古曰傅讀曰附乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑李竒曰亭亦平也師古曰亭均也調也言平均疑法及為讞疑奏之宋祁曰浙本疑字下有事字必奏先為上分别其原上所是受而著讞法廷尉挈令韋昭曰在板挈也師古曰著謂明書之也挈獄訟之要也書於讞法挈令以為後式也挈音口計反揚主之明師古曰言此自天子之意非由臣下有司奏事即譴湯摧謝蘇林曰深自挫按也師古曰若上有責即摧折而謝也鄉上意所便師古曰謂如天子責湯之指而言其端也鄉讀曰嚮必引正監掾史賢者曰固為臣議如此師古曰如上之意上責臣臣弗用愚抵此蘓林曰坐不用諸掾語故至於此劉敞曰上責臣此衍字耳妄斷之罪常釋臣瓚曰謂常見原也間即奏事上善之曰臣非知為此奏乃監掾史某所為師古曰間謂非當朝奏者其欲薦吏揚人之善觧人之過如此所治即上意所欲辠予監吏深刻者即上意所欲釋予監吏輕平者劉攽曰吏皆當作史所治即豪必舞文巧詆師古曰詆誣也音丁禮反即下户羸弱時口言雖文致法上裁察於是徃徃釋湯所言李竒曰先見上口言之欲與輕平故皆見原釋也如淳曰雖文書按察致下戶之罪湯以先口觧之矣上以湯言輙裁察之輕其罪也師古曰李如二說皆非也此言下戸羸弱湯欲佐助雖具文奏之而又口奏言雖律令之文合致此罪聽上裁察盖為此人希恩宥也於是上得湯言徃徃釋其人辠非未奏之前口豫言也宋祁曰注文希字下當添幸字湯至於大吏内行脩交通賔客飲食於故人子弟為吏及貧昆弟調䕶之尤厚師古曰調和適之令得其所也䕶謂保佑也其造請諸公不避寒暑師古曰造至詣也請謁問也造音七到反是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士丞相𢎞數稱其美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之師古曰可湯所奏而論决之其治獄所巧排大臣自以為功多此類繇是益尊任師古曰繇讀與由同遷御史大夫㑹渾邪等降漢大興兵伐匃奴山東水旱貧民流徙皆卬給縣官師古曰卬音牛向反縣官空虛湯承上指請造白金及五銖錢籠天下鹽鐵師古曰籠羅其事皆令利入官排富商大賈出告緍令鉏豪彊并兼之家舞文巧詆以輔法師古曰輔助也以巧詆助法言不公平也湯每朝奏事語國家用日旰師古曰旰晚也論事既多至於日晚旰音幹劉攽曰日旰當屬下句天子忘食丞相取充位師古曰但充其位而已無所造設也天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁師古曰並且也劉奉世曰並音歩浪反旁緣為姦也於是痛繩以辠自公卿以下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此宋祁曰南本浙本其字下並有病字匈奴求和親羣臣議前師古曰於上前議也博士狄山曰和親便上問其便山曰兵凶器未易數動師古曰言難可屢動髙帝欲伐匈奴大困平城乃遂結和親孝惠髙后時天下安樂及文帝欲事匈奴北邊蕭然苦兵師古曰蕭然猶騷然擾動之貌孝景時吳楚七國反景帝徃来東宫間師古曰謂諮謀於太后也天下寒心數月師古曰懼於兵難也吳楚已破竟景帝不言兵師古曰訖景帝之身更不議征伐之事天下富實今自陛下興兵擊匈奴中國以空虛邊大困貧由是觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯别疏骨肉使藩臣不自安臣固知湯之詐忠宋祁曰浙本此句詐字上有為字於是上作色曰吾使生居一郡能無使虜入盗乎師古曰博士之官故呼為生也山曰不能曰居一縣曰不能復曰居一鄣間師古曰鄣謂塞上要險之處别築為城因置吏士而為鄣蔽以捍㓂也鄣音之向反山自度辯窮且下吏師古曰度計也見詰自辯而辭窮當下吏也曰能廼遣山乗鄣師古曰乗登也登而守之至月餘匈奴斬山頭而去是後羣臣震讋師古曰震動也讋失氣也讋音之渉反湯客田甲雖賈人有賢操師古曰操謂所執持之志行也操音千到反始湯為小吏與錢通師古曰為小吏之時與田甲為錢財之交及為大吏而甲所責湯行義有烈士之風湯為御史大夫七歳敗河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事有可以傷湯者不能為地服䖍曰薦藉也文與湯故有隙已而為御史中丞藉已在内臺中文書有可用傷湯者因㑹致之不能為湯作道地蘓林曰薦仍也師古曰薦數義同蘓說是也數數在中其有文書事可用傷湯者不為作道地也薦音在見反數音所角反大雅雲漢之詩曰饑饉薦臻字亦如此劉奉世曰薦數猶言簡閲數音色主反薦如字其訓舉計數從中文事也太史公作悉數從中文書蓋其時文盡閲數從中所下文書或受詔如此其間事有可以傷湯者文以前隙亦不能與之為地然文似本無意造事中之也湯有所愛史魯謁居知湯弗平使人上飛變告文姦事師古曰飛變猶言急變也劉奉世曰飛變謂如飛語無姓名上變者故上問從迹安起而湯云殆文故人也事下湯湯治論殺文而湯心知謁居為之上問變事從迹安起師古曰從讀曰蹤湯陽驚曰此殆文故人怨之師古曰殆近也謁居病卧閭里主人湯自徃視病為謁居摩足趙國以冶鑄為業王數訟鐵官事湯常排趙王趙王求湯隂事謁居嘗案趙王趙王怨之并上書告湯大臣也史謁居有病湯至為摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官蘓林曰漢儀注獄二十六所獄官無導也師古曰蘓說非也導擇也以主擇米故曰導官事見百官表時或以諸獄皆滿故權寄在此署繫之非本獄所也宋祁曰注文獄官無導景祐本作導官無獄湯亦治它囚導官見謁居弟欲隂為之而陽不省師古曰省視也謁居弟不知而怨湯使人上書告湯與謁居謀共變李文事下减宣宣嘗與湯有隙及得此事窮竟其事未奏也會人有盗發孝文園瘞錢如淳曰瘞埋也埋錢於園陵以送死也丞相青翟朝與湯約俱謝師古曰將入朝之時為此要約至前師古曰至天子之前湯念獨丞相以四時行園當謝湯無與也不謝師古曰行音下更反與讀曰豫無與謂不干其事也丞相謝上使御史案其事湯欲致其文丞相見知張晏曰見知故縱以其罪罪之也丞相患之三長史皆害湯欲陷之師古曰百官表丞相有兩長史今此云三者盖以守者非正貟也始長史朱買臣素怨湯語在其傳王朝齊人以術至右内史邊通學短長應劭曰短長術興於六國時長短其語隱謬用相激怒也張晏曰蘓秦張儀之謀趣彼為短歸此為長戰國策名短長術也剛暴人也官至濟南相故皆居湯右師古曰言舊在湯上已而失官守長史詘體於湯師古曰謂拜伏也湯數行丞相事知此三長史素貴常陵折之故三長史合謀曰始湯約與君謝已而賣君今欲劾君以宗廟事此欲代君耳吾知湯隂事使吏捕案湯左田信等李竒曰左證左也師古曰謂之左者言除罪人正身之外又取其左右者考問也曰湯且欲為請奏信輙先知之居物致富與湯分之服䖍曰居謂儲也及他姦事事辭頗聞師古曰聞於天子也上問湯曰吾所為賈人輙知益居其物師古曰益多也是類有以吾謀告之者師古曰類似也湯不謝又陽驚曰固宜有减宣亦奏謁居事上以湯懐詐面欺師古曰對面欺誣也使使八輩簿責湯蘓林曰簿音主簿之簿簿悉責也師古曰以文簿次第一一責之湯具自道無此不服於是上使趙禹責湯禹至讓湯曰師古曰讓亦責也君何不知分也師古曰分音扶問反君所治夷滅者幾何人矣師古曰幾音居起反今人言君皆有狀宋祁曰南本今字下有之字天子重致君獄師古曰重猶難也欲令君自為計師古曰言引決也何多以對為師古曰言何用多對湯廼為書謝曰湯無尺寸之功起刀筆吏陛下幸致三公宋祁曰越本作致位三公無以塞責師古曰塞當也然謀陷湯者三長史也遂自殺湯死家産直不過五百金皆所得奉賜師古曰奉音扶用反無它贏師古曰贏餘也昆弟諸子欲厚葬湯湯母曰湯為天子大臣被惡言而死師古曰被加也音皮義反何厚葬為載以牛車有棺而無槨上聞之曰非此母不生此子乃盡按誅三長史丞相青翟自殺出田信上惜湯復稍進其子安世安世字子孺少以父任為郎用善書給事尚書師古曰於尚書中給事也給供也精力於職休沐未嘗出上行幸河東嘗亡書三篋詔問莫能知惟安世識之師古曰識記也音式志反具作其事後購求得書以相校無所遺失上竒其材擢為尚書令遷光禄大夫昭帝即位大將軍霍光秉政以安世篤行師古曰篤厚也光親重之㑹左將軍上官桀父子及御史大夫桑𢎞羊皆與燕王蓋主謀反誅光以朝無舊臣白用安世為右將軍光禄勲以自副焉久之天子下詔曰右將軍光禄勲安世輔政宿衛肅敬不怠十有三年咸以康寜夫親親任賢唐虞之道也其封安世為富平侯明年昭帝崩未葬大將軍光白太后徙安世為車騎將軍與共徴立昌邑王王行滛亂光復與安世謀廢王尊立宣帝帝初即位襃賞大臣下詔曰夫襃有徳賞有功古今之通義也車騎將軍光禄勲富平侯安世宿衛忠正宣徳明恩勤勞國家守職秉義以安宗廟其益封萬六百戸功次大將軍光安世子千秋延夀彭祖皆中郎将侍中大将軍光薨後數月御史大夫魏相上封事曰聖王襃有徳以懐萬方師古曰懐來也顯有功以勸百寮是以朝廷尊榮天下鄉風師古曰鄉讀曰嚮國家承祖宗之業制諸侯之重新失大将軍宜宣章盛徳以示天下顯明功臣以填藩國師古曰填音竹刄反毋空大位以塞爭權師古曰大臣位空則起爭奪之權也所以安社稷絶未萌也師古曰未萌謂變故未生者也車騎将軍安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大将軍定策天下受其福國家重臣也宜尊其位以為大将軍毋令領光禄勲事使專精神憂念天下思惟得失安世子延夀重厚可以為光禄勲領宿衛臣上亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不逹師古曰事未施行而遽言之故曰先事也誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命師古曰財與裁同上笑曰君言泰謙君而不可尚誰可者師古曰言君尚不可更誰可也安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事數月罷車騎將軍屯兵更為衛將軍兩宫衛尉城門北軍兵屬焉時霍光子禹為右將軍上亦以禹為大司馬罷其右將軍屯兵以虛尊加之而實奪其衆後歳餘禹謀反夷宗族安世素小心畏忌已内憂矣師古曰忌者戒盈滿之禍其女孫敬為霍氏外屬婦師古曰女孫即今所謂孫女也當相坐安世瘦懼形於顔色師古曰形見也上怪而憐之以問左右乃赦敬以慰其意安世􅐛恐師古曰􅐛益也職典樞機以謹慎周密自著外内無間師古曰著明也間隙也毎定大政已决輙移病出師古曰移病謂移書言病也一曰以病而移居聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也師古曰與讀曰豫嘗有所薦其人來謝安世大恨以為舉賢逹能豈有私謝邪絶弗復為通師古曰有欲謝者皆不通也一曰告此人而絶之更不與相見也宋祁曰南夲浙本並云豈有私邪謝絶勿復為通有郎功髙不調師古曰調選也音徒釣反自言安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷師古曰安世外陽距之而實令其遷莫府長史遷辭去之官安世問以過失師古曰問已有何失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然師古曰較明貎臣下自修而已何知士而薦之其欲匿名迹逺權埶如此師古曰逺離也音于萬反為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪師古曰反讀曰翻如何以小過成罪郎滛官婢婢兄自言安世曰奴以恚怒誣汙衣冠告署適奴師古曰適讀曰讁其隱人過失皆此類也安世自見父子尊顯懐不自安為子延壽求出補吏上以為北地太守歳餘上閔安世年老復徴延壽為左曹太僕初安世兄賀幸於衛太子太子敗賔客皆誅安世為賀上書得下蠶室師古曰謂腐刑也凡養蠶者欲其温而早成故為密室蓄火以置之而新腐刑亦有中風之患須入密室乃得以全因呼為蠶室耳後為掖庭令而宣帝以皇曾孫收養掖庭賀内傷太子無辜而曽孫孤幼所以視養拊循恩甚密焉及曽孫壯大賀教書令受詩為取許妃以家財聘之曽孫數有徴怪師古曰徴證也語在宣紀賀聞知為安世道之稱其材美安世輙絶止以為少主在上不宜稱述曽孫及宣帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冢為恩徳侯置守冢二百家師古曰身死追封故云封冢也賀有一子蚤死無子師古曰蚤古早字子安世小男彭祖師古曰言養以為子彭祖又小與上同席研書指欲封之先賜爵闗内侯故安世深辭賀封又求損守冢戸數稍减至三十戸上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里師古曰處安也音昌汝反居冢西鬬雞翁舍南上少時所嘗游處也明年復下詔曰朕微眇時故掖庭令張賀輔道朕躬師古曰道讀曰導修文學經術恩惠卓異厥功茂焉詩云無言不讎無徳不報師古曰大雅抑之詩其封賀弟子侍中闗内侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七歳拜為散騎中郎將賜爵關内侯食邑三百戸安世以父子封侯在位太盛乃辭禄宋祁曰浙本作辭禄不受詔都内别臧張氏無名錢以百萬數文頴曰都内主臧官也張晏曰安世以還官官不簿也安世尊為公侯食邑萬戸然身衣弋綈師古曰弋黒色也綈厚繒也夫人自紡績家童七百人皆有手技作事内治産業累積纎微是以能殖其貨師古曰殖生也富於大將軍光天子甚尊憚大將軍然内親安世心密於光焉元康四年春安世病上疏歸侯乞骸骨天子報曰將軍年老被病朕甚閔之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉師古曰言意所不及者即以問君也何感而上書歸衛将軍富平侯印師古曰感恨也音胡闇反薄朕忘故蘓林曰本望君重於此也師古曰蘓說非也薄猶嫌也君意嫌朕遺忘故舊而求去也非所望也願将軍彊餐食近醫藥專精神以輔天年安世復强起視事至秋薨天子贈印綬送以輕車介士師古曰輕車古之戰車續漢書云彫朱輪輿不巾不盖菑矛㦸幢也麾􅕈弩介士謂甲士也菑挿也􅕈皮篋盛弩也菑音側事反􅕈音服宋祁曰注文幢也别本浙本並無也字諡曰敬侯賜塋杜東師古曰塋冢地也将作穿復土起冢祠堂子延夀嗣延夀巳歴位九卿既嗣侯國在陳留别邑在魏郡租入歳千餘萬延夀自以身無功徳何以能久堪先人大國數上書讓減戸邑又因弟陽都侯彭祖口陳至誠天子以為有讓廼徙封平原并一國戸口如故而租稅减半薨諡曰愛侯子勃嗣為散騎諫大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯蘓林曰獻丞主貢獻物也湯有罪勃坐削戸二百㑹薨故賜諡曰繆侯師古曰以其所舉不得人故加惡諡繆者妄也後湯立功西域世以勃為知人子臨嗣臨亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚哉師古曰桑桑宏羊也霍霍禹也言以驕奢致禍也且死分施宗族故舊師古曰言将死之時多以財分施也薄葬不起墳臨尚敬武公主文頴曰成帝姊也臣瓚曰敬武公主是元帝姊也師古曰二說皆非也薛宣傳云主怒曰嫂何以取妹殺之既謂元后為嫂是則元帝妹也薨子放嗣鴻嘉中上欲遵武帝故事與近臣游宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女上為放供張師古曰供音居用反張音竹亮反賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第服䖍曰私官皇后之官也兩宫使者冠蓋不絶賞賜以千萬數放為侍中中郎将監平樂屯兵置莫府儀比将軍與上卧起寵愛殊絶常從為微行出游北至甘泉南至長楊五莋師古曰莋與柞同鬬雞走馬長安中積數年是時上諸舅皆害其寵白太后太后以上春秋富動作不節甚以過放師古曰以放為罪過時數有災異議者歸咎放等於是丞相宣御史大夫方進師古曰薛宣翟方進奏放驕蹇縱恣奢滛不制前侍御史修等四人奉使至放家逐名捕賊劉徳曰謂詔捕罪人有名者也時放見在奴從者閉門設兵弩射吏距使者不肯内知男子李游君欲獻女使樂府音監景武强求不得孟康曰音監監主樂人也姓景名武使奴康等之其家賊傷三人又以縣官事怨樂府游徼莽師古曰樂府之游徼名莽而使大奴駿等四十餘人羣黨盛兵弩白晝入樂府攻射官寺縛束長吏子弟斫破器物宫中皆犇走伏匿師古曰犇古奔字莽自髠鉗衣赭衣及守令史調等皆徒跣叩頭謝放放乃止奴從者支屬並乘權勢為暴虐至求吏妻不得殺其夫或恚一人妄殺其親屬輙亡入放第不得幸得勿治放行輕薄連犯大惡有感動隂陽之咎為臣不忠首師古曰不忠之罪放為首罪名雖顯前蒙恩驕逸悖理師古曰悖乖也音布内反與背畔無異臣子之惡莫大於是不宜宿衛在位臣請免放歸國以銷衆邪之萌厭海内之心師古曰萌始生者也厭滿也音一艷反上不得巳師古曰已止也左遷放為北地都尉數月復徴入侍中太后以放為言出放為天水屬國都尉永始元延間比年日蝕師古曰比頻也故久不還放璽書勞問不絶居歳餘徴放歸第視母公主疾數月主有瘳出放為河東都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之後復徴放為侍中光禄大夫秩中二千石歳餘丞相方進復奏放上不得巳免放賜錢五百萬遣就國數月成帝崩放思慕哭泣而死初安世長子千秋與霍光子禹俱為中郎将将兵隨度遼将軍范明友撃烏桓還謁大将軍光問千秋戰鬬方略山川形埶千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人功臣之世唯有金氏張氏親近寵貴比於外戚放子純嗣侯恭儉自修明習漢家制度故事有敬侯遺風王莽時不失爵建武中歴位至大司空更封富平之别鄉為武始侯張湯本居杜陵安世武昭宣世輙隨陵服䖍曰隨所事帝徙處其陵也凡三徙復還杜陵贊曰馮商稱張湯之先與留侯同祖而司馬遷不言故闕焉如淳曰班固目録馮商長安人成帝時以能屬書待詔金馬門受詔續太史公書十餘篇師古曰劉歆七略云商陽陵人治易事五鹿充宗能屬文博通强記與孟栁俱待詔頗序列傳未卒㑹病死漢興以來侯者百數保國持寵未有若富平者也湯雖酷烈及身蒙咎其推賢揚善固宜有後安世履道滿而不溢賀之隂徳亦有助云前漢書卷五十九前漢書卷五十九考證張湯傳湯掘熏得鼠掘熏史記作掘窟周陽侯為諸卿時注師古曰姓趙臣召南按師古注訛恩澤侯表固有周陽侯趙兼以淮南王舅得封然當孝文六年即以有罪免矣此周陽侯即田蚡弟田勝孝武初以皇太后弟得封徐廣注史記是也下文言武安侯為丞相徴湯為史可知湯由田氏進身謂周陽侯姓趙不亦誤乎遷御史大夫通鑑考異曰百官公卿表元狩三年三月壬辰廷尉張湯為御史大夫史記将相名臣表元狩二年御史大夫湯按李蔡既遷湯即應補其缺史記表是張安世傳無子子安世小男彭祖顧炎武曰謂賀無見存之子而以安世小男為子也賀早死之子别有一子乃下文所謂孤孫覇賀非無子也前漢書卷五十九考證
