body:
  text: 前漢書卷三十八漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注髙五王傳第八髙皇帝八男吕后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙隱王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建鄭氏曰諸姬姓也張晏曰非一之稱也師古曰諸姬總言在姬妾之列者耳其知姓位者史各具言之不知氏族及秩次者則云諸姬也而趙幽以下三王非必同母盖以皆不知其所生之姬姓故總言之文三王傳云諸姬生代孝王參梁懐王揖景十三王傳云屬諸姬子於栗姬此意皆同張云非一近得之矣春秋左氏傳曰諸子仲子戎子諸子鬻姒此其例也豈以諸為姓乎鄭説非矣共讀曰恭其下類此淮南厲王長自有傳齊悼惠王肥其母髙祖微時外婦也師古曰謂與旁通者髙祖六年立食七十餘城諸民能齊言者皆與齊孟康曰此時流移故使齊言者還齊也師古曰欲其國大故多封之孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮師古曰以兄弟齒列不從君臣之禮故曰家人也坐音材臥反太后怒廼令人酌兩巵鴆酒置前應劭曰鴆鳥黑身赤目食蝮蛇野葛以其羽畫酒中飲之立死令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵師古曰反音幡齊王怪之因不敢飲陽醉去問知其鴆廼憂自以為不得脱長安師古曰脱免也言死於長安不得更至齊國也脱音吐活反内史士曰師古曰内史王官士者其名也太后獨有帝與魯元公主今王有七十餘城而公主廼食數城王誠以一郡上太后為公主湯沐邑太后必喜王無患矣於是齊王獻城陽郡以尊公主為王太后師古曰為齊王太后也言以母禮事之所以自媚也解具在惠紀呂太后喜而許之廼置酒齊邸樂飲遣王歸國後十三年薨子襄嗣趙隱王如意九年立師古曰髙祖之九年也他皆類此四年髙祖崩師古曰趙王之四年呂太后徵王到長安鴆殺之無子絶趙幽王友十一年立為淮陽王趙隱王如意死孝惠元年徙友王趙凡立十四年宋祁曰四字校添友以諸呂女為后不愛愛它姬諸呂女怒去讒之於太后曰王曰呂氏安得王師古曰安猶焉也太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衞圍守之不得食其羣臣或竊饋之輒捕論之趙王餓乃歌曰諸呂用事兮劉氏微廹脅王侯兮彊授我妃我妃既妒兮誣我以惡師古曰惡音一故反讒女亂國兮上曾不寤我無忠臣兮何故師古曰謂不能明白之也棄國自快中野兮蒼天與直師古曰天色蒼蒼故曰蒼天言己之理直冀天臨監之劉攽曰棄國當屬上句宋祁曰浙本無自字于嗟不可悔兮寧早自賊師古曰賊害也悔不早棄趙國而快意自殺於田野之中今乃被幽餓也為王餓死兮誰者憐之呂氏絶理兮託天報仇宋祁曰仇音渠尤反讎也遂幽死以民禮葬之長安髙后崩孝文即位立幽王子遂為趙王二年有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟彊及齊悼惠王子朱虚侯章東牟侯興居有功皆可王於是取趙之河閒立辟彊是為河閒文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德内史王悍諫不聼遂燒殺德悍師古曰上云其相建德内史王悍下云燒殺德悍是為相姓建名德也而景武功臣侯表云遽侯横父建德以趙相死事子侯則是不知其姓表傳不同疑後人轉寫此傳誤脱去一建字也發兵住其西界欲待吳楚俱進北使匈奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗匈奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壊王遂自殺國除景帝憐趙相内史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死呂后徙恢王趙恢心不樂太后以呂產女為趙王后王后從官皆諸呂也内擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入匈奴明年立建為燕王十五年薨有美人子師古曰王之美人生子也太后使人殺之絶後齊悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王師古曰辟音壁又讀曰闢賢為葘川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩呂太后稱制元年以其兄子鄜侯呂台為呂王師古曰鄜音敷割齊之濟南郡為呂王奉邑師古曰奉音扶用反他皆類此明年哀王弟章入宿衞於漢髙后封為朱虚侯以呂禄女妻之後四年封章弟興居為東牟侯皆宿衞長安髙后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙王友幽死於邸三趙王既廢髙后立諸呂為三主擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田師古曰欲申諷喻也髙后兒子畜之師古曰比之於子也笑曰顧乃父知田耳師古曰顧念也乃汝也汝父謂髙帝也劉攽曰兒子畜之不以人臣待之也乃父直謂王肥耳下又云齊王自以皃子年少豈可以琅邪為父也若生而為王子安知田乎師古曰若亦汝也章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏師古曰穊稠也穊種者言多生子孫也疏立者四散置之令為藩輔也穊音冀非其種者鉏而去之師古曰以斥諸呂也太后黙然頃之諸呂有一人醉亡酒師古曰避酒而逃亡章追㧞劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸呂憚章雖大臣皆依朱虚侯劉氏為彊師古曰為音于偽反其明年髙后崩趙王呂禄為上將軍呂王產為相國皆居長安中聚兵以威大臣欲為亂章以呂禄女為婦知其謀乃使人隂出告其兄齊王欲令發兵西師古曰西詣京師朱虚侯東牟侯欲從中與大臣為内應以誅諸呂因立齊王為帝齊王聞此計與其舅駟鈞郎中令祝午中尉魏勃隂謀發兵齊相召平聞之師古曰召讀曰邵乃發兵入衞王宮魏勃紿平曰師古曰紿誑也王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衞衞王師古曰謂將兵及衞守之具以禁衞王令不得發也召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為内史悉發國中兵使祝午紿琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自髙帝將也師古曰言自髙帝之時以為將也習戰事齊王不敢離兵服䖍曰不敢離其兵而到琅邪使臣請大王幸之臨葘見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然廼馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既欺不得反國乃説齊王曰齊悼惠王髙皇帝長子也推本言之大王髙皇帝適長孫也師古曰適讀曰嫡當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻呂國之濟南於是齊王遺諸侯王書曰髙帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩髙后用事春秋髙聼諸呂擅廢帝更立又殺三趙王滅梁趙燕以王諸呂分齊國為四師古曰本自齊國更分為濟南琅邪城陽凡為四也忠臣進諌上或亂不聼今髙后崩皇帝春秋富師古曰言年幼也比之於財方未匱竭故謂之富未能治天下固待大臣諸侯今諸呂又擅自尊官聚兵嚴威劫列侯忠臣撟制以令天下師古曰撟託也託天子之制詔也撟音矯宗廟以危寡人帥兵入誅不當為王者漢聞之相國呂產等遣大將軍潁隂侯灌嬰將兵擊之嬰至滎陽乃謀曰諸呂舉兵關中欲危劉氏而自立今我破齊還報是益呂氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和師古曰諭謂曉告也以待呂氏之變而共誅之齊王聞之乃屯兵西界待約呂禄呂產欲作亂朱虚侯章與太尉勃丞相平等誅之章首先斬呂產太尉勃等乃盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也張晏曰言鈞惡戾如虎著冠訪以呂氏故幾亂天下如淳曰訪猶方也師古曰幾音鉅依反劉攽曰此訪與公羊訪於此義同今又立齊王是欲復為呂氏也代王母家薄氏君子長者且代王髙帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅呂氏事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王反既誅呂氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人後救火乎師古曰言以社稷將危故舉兵以臣之不暇待有詔命也宋祁曰注文以臣之或作以匡之因退立股戰而栗師古曰股脚也戰者懼之甚也恐不能言者終無他語灌將軍孰視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷勃師古曰放令去勃父以善鼓琴見秦皇帝及勃少時欲求見齊相曹參家貧無以自通乃常獨早埽齊相舍人門外舍人怪之以為物而司之得勃師古曰物謂鬼神司者察視之勃曰願見相君無因故為子埽欲以求見於是舍人見勃曹參因以為舍人壹為參御言事以為賢言之悼惠王王召見拜為内史始悼惠王得自置二千石及悼惠王薨哀王嗣勃用事重於相齊王既罷兵歸而代王立是為孝文帝文帝元年盡以髙后時所割齊之城陽琅邪濟南郡復予齊而徙琅邪王王燕益封朱虚侯東牟侯各二千戸黄金千斤是歲齊哀王薨子文王則嗣十四年薨無子國除城陽景王章孝文二年以朱虚侯與東牟侯興居俱立二年薨子共王喜嗣孝文十二年徙王淮南五年復還王城陽凡立三十三年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十一年薨宋祁曰越本作十年子荒王順嗣四十六年薨宋祁曰越本作三十六年子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝復立雲兄俚為城陽王師古曰俚音里王莽時絶濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公俱入清宮師古曰滕公夏侯嬰也遂將少帝出迎皇帝入宮始誅諸呂時朱虚侯章功尤大大臣許盡以趙地王章盡以梁地王興居及文帝立聞朱虚東牟之初欲立齊王故黜其功師古曰不賞之二年王諸子乃割齊二郡以王章興居章興居意自以失職奪功歲餘章薨而匈奴大入邊漢多發兵丞相灌嬰將擊之文帝親幸太原興居以為天子自擊胡遂發兵反上聞之罷兵歸長安使棘蒲侯柴將軍張晏曰柴武擊破虜濟北王王自殺國除文帝憫濟北王逆亂以自滅明年盡封悼惠王諸子罷軍等七人為列侯師古曰罷音皮彼反又讀曰疲至十五年齊文王又薨無子時悼惠王後尚有城陽王在文帝憐悼惠王適嗣之絶師古曰適讀曰嫡宋祁曰越本絶字下有世字於是乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王齊孝王將閭以楊虚侯立濟北王志以安都侯立葘川王賢以武成侯立膠東王雄渠以白石侯立膠西王卬以平昌侯立濟南王辟光以扐侯立服䖍曰扐音勒扐平原縣也孝文十六年六王同日俱立立十一年孝景三年吳楚反膠東膠西葘川濟南王皆發兵應吳楚欲與齊師古曰與之同反齊孝王狐疑城守不聼三國兵共圍齊張晏曰膠西葘川濟南也劉奉世曰吳王濞傳前云膠西膠東與葘川濟南共圍臨葘後云膠西膠東菑川三國各引兵歸則此三國無濟南王也然初言四國共圍齊又言三國疑必有誤齊王使路中大夫告於天子張晏曰姓路為中大夫天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨葘數重無從入三國將與路中大夫盟曰若反言漢已破矣師古曰若汝也反謂反易其辭也齊趣下三國不且見屠師古曰趣讀曰促路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急隂與三國通謀約未定會路中大夫從漢來其大臣乃復勸王無下三國會漢將欒布平陽侯等兵至齊師古曰平陽侯曹襄擊破三國兵解圍已後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺而膠東膠西濟南葘川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善師古曰言其初首無逆亂之心以迫劫有謀非其罪也召立孝王太子壽是為懿王二十三年薨子厲王次昌嗣其母曰紀太后太后取其弟紀氏女為王后王不愛紀太后欲其家重寵師古曰重音直用反令其長女紀翁主入王宮師古曰諸王女曰翁主而紀氏所生故謂之紀翁主正其後宮無令得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲師古曰宦者奄人入事漢皇太后張晏曰皇太后武帝之母皇太后有愛女曰脩成君脩成君非劉氏子蘇林曰皇太后前嫁金氏所生太后憐之脩成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后大喜使甲之齊時主父偃知甲之使齊以取后事亦因謂甲即事成幸言偃女願得充王後宮甲至齊風以此事師古曰風讀曰諷紀太后怒曰王有后後宮備具且甲齊貧人及為宦者入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宮甲大窮還報皇太后曰王已願尚娥師古曰尚配也然事有所害恐如燕王燕王者與其子昆弟姦坐死師古曰燕王定國傳云與其子女三人姦子昆弟者言是其子女又長㓜非一故云子昆弟也一曰子昆弟者定國之姊妹也言定國姦其子女及其姊妹宋祁曰浙本正文坐死字上有新字故以燕感太后師古曰言齊王與其姊妹姦終當坐之致死不足嫁女與之太后曰毋復言嫁女齊事事􅎊淫聞於上師古曰􅎊古浸字也􅎊淫猶言漸染也主父偃由此與齊有隙偃方幸用事因言齊臨菑十萬户市租千金師古曰收一市之租直千金也人衆殷富鉅於長安非天子親弟愛子不得王此今齊王於親屬益疏乃從容言呂太后時齊欲反師古曰從音千容反及吳楚時孝王幾為亂師古曰幾音鉅依反宋祁曰自及吳楚止鉅依反十七字景徳本有他本無今聞齊王與其姊亂於是武帝拜偃為齊相且正其事偃至齊急治王後宮宦者為王通於姊翁主所者辭及王王年少懼以罪宋祁曰越本以作大為吏所執誅乃飲藥自殺是時趙王懼主父偃壹出敗齊恐其漸疏骨肉乃上書言偃受金及輕重之短師古曰輕重謂用心不平天子亦因囚偃公孫𢎞曰齊王以憂死無後非誅偃無以塞天下之望師古曰塞滿也偃遂坐誅厲王立五年國除濟北王志吳楚反時初亦與通謀後堅守不發兵故得不誅徙王菑川元朔中齊國絶悼惠王後唯有二國城陽葘川菑川地比齊師古曰比近也音頻二反武帝為悼惠王冢園在齊廼割臨菑東圜悼惠王冢園邑盡以予菑川師古曰圜謂周繞之令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣五鳳中青州刺史奏終古使所愛奴與八子及諸御婢姦如淳曰八子妾號終古或參與被席師古曰與讀曰預或白晝使臝伏犬馬交接師古曰臝者露形體也音郎果反終古親臨觀産子輒曰亂不可知使去其子師古曰去除也音丘呂反事下丞相御史奏終古位諸侯王以令置八子秩比六百石所以廣嗣重祖也而終古禽獸行亂君臣夫婦之别悖逆人倫師古曰悖乖也音歩内反請逮捕有詔削四縣二十八年薨子考王尚嗣五年薨子孝王横嗣三十一年薨子懐王交嗣六年薨子永嗣王莽時絶贊曰悼惠之王齊最為大國以海内初定子弟少激秦孤立亡藩輔師古曰激感發也音工歴反故大封同姓以填天下師古曰填音竹刄反時諸侯得自除御史大夫羣卿以下衆官如漢朝漢獨為置丞相自吳楚誅後稍奪諸侯權左官附益阿黨之法設張晏曰諸侯有罪傅相不舉奏為阿黨師古曰皆新制律令之條也左官觧在諸侯王表附益言欲増益諸侯王也其後諸侯唯得衣食租税貧者或乗牛車前漢書卷三十八前漢書卷三十八考證齊悼惠王肥傳七十餘城臣召南按髙紀以膠東膠西臨淄濟北博陽城陽郡七十三縣封齊内史士臣浩按史記作内史勲尊公主為王太后臣召南按史記無此句但曰獻城陽郡以為魯元公主湯沐邑而已齊哀王襄傳顧乃父知田耳注汝父謂髙帝也臣召南按顔注非也乃父謂悼惠王本髙帝微時庻子故曰知田上文髙后兒子畜之不過言親愛耳不謂呼孫為子也下文云若生而為王子安知田乎義尤明白劉攽説是非有漢虎符驗也胡三省曰按史記文帝紀三年九月初與郡國守相為銅虎符既有初字則前此未有銅虎符也召平魏勃事在前何縁有銅虎符齊孝王將閭傳會漢將欒布平陽侯等兵至齊注師古曰平陽侯曹襄臣召南按顔注大誤曹襄以武帝元光五年嗣爵豈容孝景初年已為將軍索隐云按表是曹竒是也竒薨於景帝四年則救齊擊破三國兵乃竒未薨前一年事耳濟北王志傳志立三十五年薨通鑑考異曰武紀賜淮南葘川王几杖毋朝顔注淮南王安葘川王志皆武帝諸父列也按諸侯王表志在位三十五年與傳同以元光五年薨紀云菑川王志誤也前漢書卷三十八考證
