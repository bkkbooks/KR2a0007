body:
  text: 前漢書卷六十二漢蘭臺令史班固撰唐正議大夫行祕書少監瑯邪縣開國子顔師古注司馬遷傳第三十二昔在顓頊命南正重司天火正黎司地張晏曰南方陽也火水配也水為陰故命南正重司天火正黎兼地職也臣瓉曰重黎司天地之官也唐虞謂之羲和則司地者宜曰北正古文作北正師古曰瓉說非也據班氏幽通賦云黎淳燿於髙辛則此為火正是也唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地其在周程伯休甫其後也應劭曰封為程國伯休甫字也當宣王時官失其守而為司馬氏師古曰失其所守之職也司馬氏世典周史宋祁曰浙本此句無司馬氏三字惠襄之間司馬氏適晉張晏曰周惠王襄王有子頽叔帶之難故司馬氏奔晉也晉中軍随㑹犇魏如淳曰左氏傳晉偽使魏夀餘誘士㑹於秦譟而還時也師古曰犇古奔字也據春秋随㑹奔秦其後自秦入魏而還晉今此言随㑹奔魏司馬氏因入少梁則似謂自晉出奔魏耳但魏國在獻公時巳滅為邑封畢萬矣既非别國不得言奔未詳遷之所說而司馬氏入少梁師古曰少梁本梁國也為秦所滅號為少梁自司馬氏去周適晉分散或在衛或在趙或在秦其在衛者相中山張晏曰司馬喜為中山相在趙者以傳劔論顯服䖍曰世善劔也師古曰劔論劔術之論也論音來頓反蒯聵其後也如淳曰刺客傳之蒯聵也師古曰蒯苦怪反聵五怪反在秦者錯與張儀爭論應劭曰秦惠王欲伐蜀張儀曰不如伐韓司馬錯以當先伐蜀惠王從之起兵伐蜀取之師古曰錯音千各反於是惠王使錯將兵伐蜀遂㧞因而守之蘓林曰為郡守錯孫蘄師古曰音祈事武安君白起而少梁更名夏陽蘄與武安君阬趙長平軍文穎曰趙孝成王時趙括為将還而與之俱賜死杜郵李竒曰地名在咸陽西十里師古曰郵音尤葬於華池晉灼曰池名也在鄠縣師古曰晉說非也華池在左馮翊界近夏陽非鄠縣蘄孫昌為秦王鐡官當始皇之時蒯聵𤣥孫卬為武信君将而狥朝歌師古曰武信君即武臣也未為趙王之前號武信君項籍傳曰趙将司馬卬是知為武臣之将也劉攽曰此言當始皇時為武信君将則武信君非武臣也諸侯之相王王卬於殷師古曰項羽封卬為殷王漢之伐楚卬歸漢以其地為河内郡昌生母懌師古曰懌弋赤反母懌為漢市長母懌生喜喜為五大夫卒皆葬髙門蘓林曰長安北門也師古曰蘓說非也髙門地名在夏陽西北而東去華池三里喜生談談為太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死後宣帝以其官為令行太史公文書而已晉灼曰百官表無太史公在丞相上又衛宏所說多不實未可以為正師古曰談為太史令耳遷尊其父故謂之為公如說非也劉攽曰周制外史掌四方之志布在諸侯國其位上士皆在諸侯之卿上秦亦有之故漢儀注所謂太史公在丞相上謂此也衛宏所說亦不可謂之全非宋祁曰遷與任安書自言僕之先人文史星歴近乎卜祝之間故上所戲弄倡優畜之流俗之所輕也若其位在丞相上安得有此言邪百官表不著其官信其非也太史公學天官於唐都師古曰即律歴志所云方士唐都者受易於楊何師古曰何字叔元菑川人見儒林傳習道論於黄子師古曰景帝時人也儒林傳謂之黄生與轅固爭論於上前謂湯武非受命乃殺也太史公仕於建元元封之間愍學者不逹其意而師誖師古曰誖惑也各習師法惑於所見誖音布内反乃論六家之要指曰易大傳曰宋祁曰越本無曰字天下一致而百慮同歸而殊塗張晏曰大傳謂易繫辭夫隂陽儒墨名法道徳此務為治者也直所從言之異路有省不省耳師古曰言發迹雖殊同歸於治但學者不能省察昧其端緒耳直猶但也嘗竊觀隂陽之術大詳而衆忌諱使人拘而多畏李竒曰隂陽之術月令星官是其枝葉也師古曰拘曲礙也然其叙四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其叙君臣父子之禮列夫婦長㓜之别不可易也師古曰易變也墨者儉而難遵是以其事不可徧循師古曰言難盡用然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真師古曰劉向别録云名家者流出於禮官古者名位不同禮亦異數孔子曰必也正名乎然其正名實不可不察也道家使人精神專一動合無形澹足萬物師古曰澹古贍字其為術也因隂陽之大順采儒墨之善撮名法之要師古曰撮總取也音千活反與時遷徙應物變化立俗施事無所不宜指約而易操事小而功多師古曰操執持也音千髙反儒者則不然以為人主天下之儀表也君唱臣和主先臣随如此則主勞而臣佚師古曰佚樂也字與逸同至於大道之要去健羡服䖍曰門户健壮也如淳曰知雄守雌是去健也不見可欲使心不亂是去羡也晉灼曰老子曰善閉者無闗揵嚴君平曰拆闗破揵使姦者自止服說是也師古曰二義並通揵其偃反然今書本字皆作健字也黜聰明如淳曰不尚賢絶聖棄知也晉灼曰嚴君平曰黜聰棄明倚依太素反本歸真則理得而海内鈞也師古曰黜廢也釋此而任術夫神大用則竭形大勞則敝神形蚤衰師古曰蚤古早字欲與天地長久非所聞也夫隂陽四時八位十二度二十四節各有教令張晏曰八位八卦位也十二度十二次也二十四節就中氣也各有禁謂月令也曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也師古曰經常法弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六蓺為法六蓺經傳以千萬數累世不能通其學當年不能究其禮師古曰究盡也故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長㓜之别雖百家弗能易也墨者亦上堯舜言其徳行曰堂髙三尺土階三等茅茨不翦棌椽不斵師古曰屋蓋曰茨茅茨以茅覆屋也棌柞木也茨音疾兹反棌音采又音菜飯土簋歠土刑師古曰簋所以盛飯也刑以盛羮也土謂燒土為之即瓦器也飯音扶晚反簋音軌歠尺恱反糲粱之食服䖍曰糲粗米也張晏曰一斛粟七斗米為糲音辣師古曰食飯也宋祁曰景本糲作䊪注同越本糲音頼藜藿之羮師古曰藜草似蓬也藿豆葉也夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教䘮禮必以此為萬民率故天下共若此則尊卑無别也宋祁曰越本共作法夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也師古曰給亦足也人人家家皆得足也此墨子之所長雖百家不能廢也法家不别親踈不殊貴賤壹斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也師古曰分音扶問反名家苛察繳繞如淳曰繳繞猶纒繞也師古曰繳公鳥反使人不得反其意剸决於名時失人情師古曰剸讀與專同又音章免反故曰使人儉而善失真若夫控名責實参伍不失晉灼曰引名責實参錯交互明知事情也此不可不察也道家無為又曰無不為師古曰無為者守静一也無不為者功利大也其實易行其辭難知師古曰言指趣幽逺其術以虛無為本以因循為用師古曰任自然也無成埶無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍師古曰興起也舍廢也故曰聖人不巧時變是守師古曰無機巧之心但順時也虛者道之常也因者君之綱也師古曰言因百姓之心以為教但執其綱而巳羣臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款服䖍曰款空也李竒曰聲則名也師古曰中當也充也音竹仲反款言不聽姦廼不生賢不肖自分黒白廼形師古曰形見也在所欲用耳何事不成廼合大道混混冥冥師古曰元氣之貎也混音胡本反光耀天下復反無名師古曰反還也凡人所生者神也宋祁曰浙本所字下有以字所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉師古曰凡此皆言道家之教為長也太史公既掌天官不治民有子曰遷遷生龍門蘓林曰禹所鑿龍門也師古曰龍門山其東則在今秦州龍門縣北其西則在今同州韓城縣北而河從其中下流耕牧河山之陽師古曰河之北山之南也年十嵗則誦古文二十而南游江淮上㑹稽探禹穴窺九疑張晏曰禹廵狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴九疑舜墓在焉師古曰㑹稽山名本茅山也禹於此㑹諸侯之計因名曰㑹稽九疑山有九峯觧在司馬相如傳浮沅湘師古曰沅水出牂柯湘水出零陵二水皆入江北渉汶泗師古曰汶泗兩水名在地理志汶音問講業齊魯之都觀夫子遺風鄉射鄒嶧師古曰鄒縣名也嶧山名也近曲阜地也於此行鄉射之禮嶧音懌阸困蕃薛彭城師古曰蕃縣名也音反過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭筰昆明師古曰筰才各反還報命是嵗天子始建漢家之封而太史公留滯周南如淳曰周南洛陽也張晏曰洛陽而謂周南者自陜以東皆周南之地也不得與從事師古曰與讀曰豫發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎女復為太史則續吾祖矣今天子接千嵗之統封泰山而予不得從行是命也夫命也夫予死爾必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也師古曰此孔子說孝經之辭也夫天下稱周公言其能論歌文武之徳宣周召之風師古曰召讀曰邵逹大王王季思慮爰及公劉以尊后稷也師古曰爰曰也發語辭也一曰爰於也幽厲之後王道缺禮樂衰孔子脩舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗而諸侯相兼史記放絶今漢興海内壹統明主賢君忠臣義士予為太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為太史令紬史記石室金鐀之書如淳曰紬徹舊書故事而次述之師古曰此說非也紬謂綴集之音胄鐀與匱同五年而當太初元年李竒曰遷為太史後五年適當武帝太初元年時述史記也十一月甲子朔旦冬至天歴始改建於明堂諸神受記張晏曰以元新改立明堂朝諸侯及郡守受正朔各有山川之祀故曰諸神受記孟康曰明堂班十二月之政歴紀四時故改建於明堂諸神受記若勾芒祝融之屬皆受瑞記遷因此而作師古曰張說是矣太史公曰先人有言自周公卒五百嵗而有孔子孔子至于今五百嵗有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢攘焉師古曰攘古讓字言當已述成先人之業何敢自謙當五百嵗而讓之也上大夫壺遂曰昔孔子為何作春秋哉太史公曰余聞之董生服䖍曰仲舒也周道廢孔子為魯司冦諸侯害之大夫壅之孔子知時之不用道之不行也是非二百四十二年之中師古曰是非謂本其得失以為天下儀表貶諸侯討大夫以逹王事而已矣師古曰時諸侯僣侈大夫擅權故貶討之也貶退也討治也子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之經紀别嫌疑明是非定猶與師古曰與讀曰豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變師古曰以變化之道為長也長讀如本字一曰長謂崇長之也音竹兩反下皆類此宋祁曰淳化本作長於變化予凖書記等語不當有化字傳者見注中有化字誤足之禮綱紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辨是非故長於治人是故禮以節人樂以發和書以道事詩以逹意易以道化春秋以道義師古曰道言也撥亂世反之正莫近於春秋春秋文成數萬張晏曰春秋萬八千字當言减而云成字誤也師古曰張說非也一萬之外即以萬言之故云數萬何乃忽言减乎學者又為曲觧云公羊經傳凡四萬四千餘字尤疏謬矣史遷豈謂公羊之傳為春秋乎其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保社稷者不可勝數師古曰觧並在劉向傳察其所以皆失其本巳師古曰巳語終之辭故易曰差以豪􅈊謬以千里師古曰今之易經及彖象繋辭並無此語所稱易緯者則有之焉斯盖易家之别說者也故臣弑君子弑父非一朝一夕之故其漸久矣師古曰易坤卦文言之辭有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權師古曰經常也為人君父者宋祁曰浙本無者字而不通於春秋之義者必䝉首惡之名師古曰䝉猶被也為人臣子不通於春秋之義者必陷簒弑誅死之罪其實皆以善為之而不知其義師古曰其心雖善以不知義理之故則陷於惡也被之空言不敢辭蘓林曰趙盾不知討賊而不敢辭弑君之罪夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯師古曰為臣下所干犯也一曰違犯禮義也臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過予之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施巳然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義師古曰斷决也决之於禮義也當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否晉灼曰唯唯謙應也否否不通也師古曰唯弋癸反不然余聞之先人曰虙戲至純厚作易八卦師古曰虙讀與伏同堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之徳襃周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清師古曰於歎辭也穆美也言天子有美徳而政化清也於讀曰烏劉攽曰言於穆清遂不成文理穆清天也澤流罔極師古曰罔無也極止也海外殊俗重譯款塞師古曰款叩也請來獻見者不可勝道師古曰道言也臣下百官力誦聖徳猶不能盡宣其意師古曰力勤也且士賢能矣而不用有國者恥也主上明聖徳不布聞有司之過也且余掌其官廢明聖盛徳不載滅功臣賢大夫之業不述墮先人所言師古曰墮毁也謂不脩之也音火䂓反罪莫大焉余所謂述故事整齊其世傳宋祁曰本無世字非所謂作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於纍紲師古曰纍係也紲長繩也纍音力追反紲音先列反廼喟然而歎曰是余之辠夫師古曰喟然歎息聲也音邱位反宋祁曰浙本辠字下有也字身虧不用矣退而深惟曰師古曰惟思也夫詩書隱約者欲遂其志之思也師古曰隱憂也約屈也卒述陶唐以來至於麟止服䖍曰武帝得白麟而鑄金作麟足形作史記止於此也張晏曰武帝獲麟遷以為述事之端上記黄帝下至麟止猶春秋止於獲麟也師古曰遷序事盡太初故言至麟而止張說是也自黄帝始師古曰遷之書序衆篇各别有辭班氏以其文多故略而不載但取最後一首故此單目盡於六十九至惟漢繼五帝末流之後乃言第七十讀者不詳其意或於目中加云叙傳第七十此大妄矣五帝本紀第一夏本紀第二殷本紀第三周本紀第四秦本紀第五始皇本紀第六項羽本紀第七髙祖本紀第八吕后本紀第九孝文本紀第十孝景本紀第十一今上本紀第十二三代世表第一十二諸侯年表第二六國年表第三秦楚之際月表第四漢諸侯年表第五髙祖功臣年表第六惠景間功臣年表第七建元以來侯者年表第八王子侯者年表第九漢興以來将相名臣年表第十禮書第一樂書第二律書第三厯書第四天官書第五封禪書第六河渠書第七平準書第八吳太伯世家第一齊太公世家第二魯周公世家第三燕召公世家第四師古曰召讀曰邵管蔡世家第五陳杞世家第六衛康叔世家第七宋微子世家第八晉世家第九楚世家第十越世家第十一鄭世家第十二趙世家第十三魏世家第十四韓世家第十五田完世家第十六孔子世家第十七陳渉世家第十八外戚世家第十九楚元王世家第二十荆燕王世家第二十一齊悼惠王世家第二十二蕭相國世家第二十三曹相國世家第二十四留侯世家第二十五陳丞相世家第二十六絳侯世家第二十七梁孝王世家第二十八五宗世家第二十九師古曰景帝子凡十三人為王而母五人所生遷謂同母者為一宗故云五宗也三王世家第三十伯夷列傳第一管晏列傳第二老子韓非列傳第三司馬穰苴列傳第四師古曰苴音子閭反孫子吳起列傳第五伍子胥列傳第六仲尼弟子列傳第七商君列傳第八蘓秦列傳第九張儀列傳第十樗里甘茂列傳第十一穰侯列傳第十二白起王翦列傳第十三孟子荀卿列傳第十四平原虞卿列傳第十五孟嘗君列傳第十六魏公子列傳第十七春申君列傳第十八范睢蔡澤列傳第十九樂毅列傳第二十廉頗藺相如列傳第二十一田單列傳第二十二魯仲連列傳第二十三屈原賈生列傳第二十四吕不韋列傳第二十五刺客列傳第二十六李斯列傳第二十七䝉恬列傳第二十八張耳陳餘列傳第二十九魏豹彭越列傳第三十黥布列傳第三十一淮隂侯韓信列傳第三十二韓王信盧綰列傳第三十三田儋列傳第三十四樊酈滕灌列傳第三十五張丞相倉列傳第三十六酈生陸賈列傳第三十七傅靳䣙成侯列傳第三十八師古曰䣙成侯周緤也䣙音普肻反又音陪劉敬叔孫通列傳第三十九季布欒布列傳第四十爰盎朝錯列傳第四十一張釋之馮唐列傳第四十二萬石張叔列傳第四十三田叔列傳第四十四扁鵲倉公列傳第四十五吳王濞列傳第四十六魏其武安列傳第四十七韓長孺列傳第四十八李将軍列傳第四十九衛将軍驃騎列傳第五十平津主父列傳第五十一匈奴列傳第五十二南越列傳第五十三閩越列傳第五十四朝鮮列傳第五十五西南夷列傳第五十六司馬相如列傳第五十七淮南衡山列傳第五十八循吏列傳第五十九汲鄭列傳第六十儒林列傳第六十一酷吏列傳第六十二大宛列傳第六十三游俠列傳第六十四佞幸列傳第六十五滑稽列傳第六十六日者列傳第六十七龜策列傳第六十八貨殖列傳第六十九惟漢繼五帝末流接三代絶業周道既廢秦撥去古文焚滅詩書故明堂石室金鐀玉板圖籍散亂如淳曰玉版刻玉版畫為文字也漢興蕭何次律令韓信申軍法張倉為章程叔孫通定禮儀則文學彬彬稍進詩書徃徃間出師古曰彬彬文章貎彬音邠間音居莧反自曹参薦盖公言黄老而賈誼朝錯明申韓公孫𢎞以儒顯百年之間天下遺文古事靡不畢集太史公仍父子相繼籑其職師古曰籑讀與撰同宋祁曰籑當作篹曰於戱師古曰於戯嘆聲也於讀曰烏戯讀曰呼古字或作嗚虖今字或作烏呼音義皆同耳而俗之讀者随字而别又曲為觧釋云有吉㓙羙惡之殊是不通其大指也義例具在詩及尚書不可一二徧舉之余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉師古曰欽敬也罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上記軒轅下至于兹著十二本紀既科條之矣並時異世年差不明作十表師古曰並時則年歴差殊異代則難以明辨故作表也禮樂損益律歴改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮孟康曰象黄帝以下三十家也老子言車三十輻運行無窮以象王者如此也師古曰此說非也言衆星共繞北辰諸輻咸歸車轂若文武之臣尊輔天子也輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時師古曰俶儻大節也俶吐歴反立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補蓺成一家言孟康曰蓺音褋謂裳下懐褋李竒曰蓺六蓺也師古曰李說是也蓺古藝字宋祁曰越本補字下有闕字協六經異傳齊百家雜語藏之名山副在京師師古曰藏於山者備亡失也其副貳本乃留京師也以竢後聖君子第七十師古曰竢古俟字遷之自叙云爾師古曰自此以前皆其自叙之辭也自此以後乃班氏作傳語耳而十篇缺有録無書張晏曰遷没之後亡景紀武紀禮書樂書兵書漢興以來将相年表日者列傳三王世家龜策列傳傅靳列傳元成之間褚先生補缺作武帝紀三王世家龜策日者傳言辭鄙陋非遷本意也師古曰序目本無兵書張云亡失此說非也劉奉世曰兵書即律書盖當時有耳遷既被刑之後為中書令尊寵任職故人益州刺史任安師古曰故人者言其舊交也予遷書責以古賢臣之義遷報之曰少卿足下如淳曰少卿任安字曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇師古曰懇懇至誠也音墾若望僕不相師用師古曰望怨也而流俗人之言師古曰謂随俗人之言而流移其志僕非敢如是也雖罷駑亦嘗側聞長者遺風矣師古曰罷讀曰疲宋祁曰者字下當有之字顧自以為身殘處穢動而見尤師古曰顧思念也尤過也欲益反損是以抑鬱而無誰語師古曰無誰語者言無相知心之人誰可告語諺曰誰為為之孰令聽之師古曰言無知已者設欲修名節立言行誰可為作之又令誰聽之上為音于偽反盖鍾子期死伯牙終身不復鼓琴師古曰伯牙鍾子期皆楚人也伯牙鼓琴子期聽之方鼓琴而志在泰山子期曰巍巍乎若泰山既而志在流水子期又曰湯湯乎若流水及子期死伯牙破琴絶弦終身不復鼓琴以時人無足復為鼓琴耳何則士為知巳用女為說已容師古曰說讀曰恱宋祁曰浙本容字下有也字若僕大質巳虧缺雖材懐随和行若由夷應劭曰由夷許由伯夷也師古曰随随侯珠也和和氏璧也終不可以為榮適足以發笑而自㸃耳師古曰㸃汙也書辭宜答師古曰宜早答㑹東從上來服䖍曰從武帝還也又廹賤事孟康曰卑賤之事若煩務也晉灼曰賤事家之私事賤小者也師古曰謂所供職也孟說是也相見日淺卒卒無湏臾之間得竭指意文頴曰卒言急也師古曰卒卒促􅃍之意也間隙也卒音千忽反宋祁曰越本注文文頴曰卒言倉卒與此不同今少卿抱不測之罪如淳曰平居時遷不肯報其書今有罪在獄故報徃日書欲使其恕以度已也師古曰不測謂深也渉旬月迫季冬僕又薄從上上雍李竒曰薄迫也迫當從行也如淳曰遷時從上在鹵簿中也師古曰李說是也恐卒然不可諱師古曰卒讀曰猝不可諱謂安死也是僕終巳不得舒憤懣以曉左右師古曰懣煩悶也曉告諭也懣音滿則長逝者魂魄私恨無窮師古曰謂任安恨不見報請略陳固陋闕然不報幸勿過師古曰謂中間久不報也宋祁曰浙本不字上有久字僕聞之修身者智之府也師古曰府者所聚之處也愛施者仁之端也取予者義之符也師古曰符信也恥辱者勇之决也立名者行之極也士有此五者然後可以託於世列於君子之林矣宋祁曰浙本列字上有而字故禍莫㦧於欲利師古曰㦧亦痛也音千敢反悲莫痛於傷心行莫醜於辱先而詬莫大於宫刑師古曰詬恥也音垢刑餘之人無所比數非一世也宋祁曰越本無世字所從來逺矣昔衛靈公與雍渠載孔子適陳應劭曰雍渠奄人也靈公近之商鞅因景監見趙良寒心應劭曰景監秦嬖人也服䖍曰趙良賢者同子驂乗爰絲變色蘓林曰趙談也與遷父同諱故曰同子自古而恥之夫中材之人事闗於宦豎宋祁曰浙本事字下有有字莫不傷氣况忼慨之士乎師古曰忼音口朗反如今朝雖乏人奈何令刀鋸之餘薦天下豪雋哉僕頼先人緒業得待罪輦轂下二十餘年矣師古曰言侍從天子之車輿所以自惟師古曰惟思也上之不能納忠效信師古曰效致也有竒䇿材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功師古曰搴㧞也㧞取敵人之旗也搴音騫下之不能累日積勞取尊官厚禄以為宗族交逰光寵四者無一遂茍合取容無所短長之效可見於此矣鄉者僕亦嘗厠下大夫之列韋昭曰周官太史位下大夫也臣瓚曰漢太史令千石故比下大夫師古曰鄉讀曰嚮嚮曩昔時也陪外廷末議不以此時引維綱盡思慮今已虧形為埽除之𨽻在闒茸之中師古曰闒茸猥賤也闒下也茸細毛也言非豪桀也闒吐合反茸人勇反廼欲卬首信眉論列是非師古曰卬讀曰仰信讀曰伸列陳也不亦輕朝廷羞當世之士邪師古曰羞辱也嗟乎嗟乎如僕尚何言哉宋祁曰越本尚何言哉無復句余按太史公語多重復此自一體不可削也尚何言哉且事本末未易明也僕少負不覊之才長無鄉曲之譽師古曰不覊言其材質髙逺不可覊繋也負者亦言無此事也主上幸以先人之故使得奉薄技出入周衛之中服䖍曰薄技薄材也師古曰周衛言宿衛周密也僕以為戴盆何以望天如淳曰頭戴盆則不得望天望天則不得戴盆事不可兼施言已方有所造不暇修人事也師古曰言營職務耳未論造書也如說失之故絶賔客之知忘室家之業日夜思竭其不肖之材力務壹心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趣舍異路師古曰趣所嚮也舍所廢也未嘗䘖盃酒接殷勤之歡然僕觀其為人自竒士事親孝與士信臨財亷取予義分别有讓恭儉下人師古曰下音胡亞反嘗思奮不顧身以狥國家之急師古曰狥從也營也其素所畜積也師古曰畜讀曰蓄僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已竒矣今舉事壹不當而全軀保妻子之臣随而媒孽其短臣瓉曰媒謂遘合會之孽謂為生其罪舋也師古曰媒如媒娉之媒孽如麴孽之孽一曰齊人謂麴餅為媒也僕誠私心痛之且李陵提歩卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑彊胡師古曰挑音誂師古曰音徒了反卬億萬之師師古曰卬讀曰仰漢軍北向匃奴南下北方地髙故云然劉奉世曰匃奴乗髙攻故曰卬也與單于連戰十餘日所殺過當師古曰率計戰士殺敵數多故云過當也虜救死扶傷不給師古曰給猶供也旃裘之君長咸震怖廼悉徴左右賢王舉引弓之民師古曰能引弓者皆發之一國共攻而圍之轉鬬千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍師古曰呼音火故反士無不起躬流涕沬血飲泣張空弮冐白刄北首爭死敵孟康曰沬音頮李竒曰弮弩弓也師古曰沬古頮字頮洒面也言流血在面如盥頮冐犯也首嚮也沬音呼内反字從午未之未弮音丘權反又音眷冐音莫克反首音式救反讀者乃以拳掔之拳大謬矣拳則屈指不當言張陵時矢盡故張弩之空弓非是手拳也陵未没時使有來報漢公卿王侯皆奉觴上夀後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤師古曰料量也音聊見主上惨悽怛悼誠欲効其款款之愚以為李陵素與士大夫絶甘分少師古曰自絶㫖甘而與衆人分之共同其少多也能得人之死力雖古名将不過也身雖䧟敗彼觀其意且欲得其當而報漢師古曰欲於匃奴立功而歸以當其破敗之罪事巳無可奈何其所摧敗功亦足以暴於天下師古曰謂摧破匃奴之兵也僕懐欲陳之而未有路適㑹召問即以此指推言陵功師古曰指意也欲以廣主上之意塞睚眦之辭未能盡明師古曰睚眦舉目眥也猶言顧瞻之頃也睚音厓眦音才賜反明主不深曉以為僕沮貳師而為李陵游說師古曰沮毁壊也音才汝反遂下於理拳拳之忠終不能自列師古曰拳拳忠謹之貎劉向傳作惓惓字音義同耳列陳也因為誣上卒從吏議師古曰卒終也家貧財賂不足以自贖交游莫救左右親近不為壹言身非木石獨與法吏為伍深幽囹圄之中誰可告愬者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲孟康曰家世為将有名聲陵降而隤之也師古曰隤墜也音頺而僕又茸以蠶室蘓林曰茸次也若人相俾次師古曰此說非也茸音人勇反推也蠶室乃腐刑所居温宻之室也謂推致蠶室之中也劉奉世曰茸讀如闒茸之茸重為天下觀笑師古曰觀視之而笑也悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星歴近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻螘何異師古曰螻螻蛄也螘蚍蜉也皆蟲之微小者螻音樓而世又不與能死節者比師古曰與許也不許其能死節特以為智窮罪極不能自免卒就死耳何也素所自樹立使然人固有一死死有重於太山或輕於鴻毛用之所趨異也師古曰趨讀曰趣趣嚮也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次闗木索被箠楚受辱師古曰箠杖也音止橤反其次鬄毛髪嬰金鐡受辱師古曰嬰繞也鬄音吐計反其次毁肌膚斷支體受辱最下腐刑極矣師古曰腐刑觧在景紀傳曰刑不上大夫此言士節不可不厲也猛虎處深山百獸震恐及其在穽檻之中揺尾而求食師古曰穽掘地以䧟獸也音才性反積威約之漸也故士有畫地為牢埶不入削木為吏議不對定計於鮮也文穎曰未遇刑自殺為鮮明也今交手足受木索暴肌膚受榜箠師古曰榜音彭幽於圜牆之中師古曰圜牆獄也周禮謂之圜土當此之時見獄吏則頭槍地師古曰槍音千羊反視徒𨽻則心惕息師古曰惕懼也息喘息也何者積威約之埶也及巳至此言不辱者所謂彊顔耳曷足貴乎師古曰强音其兩反且西伯伯也拘牖里李斯相也具五刑師古曰說在刑法志淮隂王也受械於陳師古曰髙祖偽逰雲夢而信至陳上謁即見囚執械謂桎梏之彭越張敖南鄉稱孤繋獄具罪師古曰或繋於獄或至大罪也鄉讀曰嚮絳侯誅諸吕權傾五伯囚於請室師古曰伯讀曰覇魏其大将也衣赭闗三木師古曰三木在頸及手足季布為朱家鉗奴灌夫受辱居室此人皆身至王侯将相聲聞鄰國及罪至罔加不能引决自財師古曰財與裁同古通用字在塵埃之中古今一體安在其不辱也由此言之勇怯埶也彊弱形也審矣曷足怪乎且人不能蚤自財繩墨之外巳稍陵夷至於鞭箠之間廼欲引節斯不亦逺乎古人所以重施刑於大夫者殆為此也師古曰重難也夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然師古曰言激於義理者則不顧念親戚妻子廼有不得巳也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必死節怯夫慕義何處不勉焉師古曰勇敢之人闇於分理未必能死名節怯懦之夫心知慕義則處處皆能勉勵也宋祁曰越本勉作免非僕雖怯耎欲茍活師古曰耎柔弱也音人阮反亦頗識去就之分矣何至自湛溺累紲之辱哉師古曰湛讀曰沈累音力追反且夫臧獲婢妾猶能引决應劭曰揚雄方言云海岱之間罵奴曰臧罵婢曰獲燕之北郊民而聓婢謂之臧女而婦奴謂之獲晉灼曰臧獲敗敵所被虜獲為奴𨽻者師古曰應說是也况若僕之不得巳乎所以隱忍茍活函糞土之中而不辭者恨私心有所不盡鄙没世而文采不表於後也古者富貴而名摩滅不可勝記唯俶儻非常之人稱焉蓋西伯拘而演周易仲尼戹而作春秋屈原放逐乃賦離騷左丘失明厥有國語宋祁曰左丘當作左丘明疑脫明字孫子髕脚兵法脩列文頴曰孫子與龎㳙學而為龎㳙所斷足師古曰髕音頻忍反不韋遷蜀世傳吕覽蘓林曰吕氏春秋篇名八覽六論韓非囚秦說難孤憤師古曰說難孤憤韓子之篇名詩三百篇大氐賢聖發憤之所為作也師古曰氐歸也音丁禮反此人皆意有所鬱結不得通其道故述徃事思來者師古曰令將來之人見已志也及如左丘明無目宋祁曰越本無明字孫子斷足終不可用退論書策以舒其憤思垂空文以自見師古曰見胡電反僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗興壊之理師古曰稽計也凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適㑹此禍惜其不成是以就極刑而無愠色僕誠巳著此書藏之名山傳之其人通邑大都師古曰其人謂能行其書者則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居上流多謗議宋祁曰上流上字景本越本並作下僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖累百世垢彌甚耳是以腸一日而九囘居則忽忽若有所亡出則不知所如徃師古曰如亦徃也每念斯耻汗未嘗不發背霑衣也身直為閨閤之臣寜得自引深藏於巖穴邪故且從俗浮湛與時俯仰以通其狂惑師古曰湛讀曰沉今少卿廼教以推賢進士無廼與僕之私指謬乎師古曰指意也今雖欲自彫瑑師古曰瑑刻也音篆曼辭以自觧如淳曰曼美也師古曰曼音萬無益於俗不信祗取辱耳師古曰祗適也要之死日然後是非廼定書不能盡意故略陳固陋遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉至王莽時求封遷後為史通子應劭曰以遷世為史官通於古今也李竒曰史通國子爵也宋祁曰越本無至字贊曰自古書契之作而有史官其載籍博矣至孔氏籑之師古曰籑與撰同上繼唐堯下訖秦繆唐虞以前雖有遺文其語不經師古曰非經典所說故言黄帝顓頊之事未可明也及孔子因魯史記而作春秋而左丘明論輯其本事以為之傳師古曰輯與集同宋祁曰舊本以字上有是字又籑異同為國語又有世本録黄帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國並爭服䖍曰關東六國與秦七國宋祁曰注文當云與秦為七國秦兼諸侯有戰國策漢興伐秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖於大漢其言秦漢詳矣至於采經摭傳師古曰摭拾也音之亦反分散數家之事甚多疏略或有抵梧如淳曰梧讀曰迕相觸迕也師古曰抵觸也梧相支拄不安也梧音悟亦其渉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗繆於聖人師古曰頗普我反論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇埶利而羞賤貧此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辨而不華質而不俚劉徳曰俚鄙也如淳曰言雖質猶不如閭里之鄙言也師古曰劉說是也俚音里其文直其事核師古曰核堅實也不虛美不隱善故謂之實録應劭曰言其録事實嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣師古曰言其報任安書自陳己志信不謬迹其所以自傷悼小雅巷伯之倫師古曰巷伯奄官也遇讒而作詩列在小雅其詩曰萋兮菲兮成是貝錦是也夫唯大雅既明且哲能保其身難矣哉師古曰尹吉甫作烝民之詩以美宣王而論仲山甫之徳曰既明且哲以保其身其詩列於大雅故賛云然前漢書卷六十二前漢書卷六十二考證司馬遷傳晉中軍随㑹犇魏注師古曰未詳遷之所說臣召南按奔魏史記作奔秦是也漢書本誤作魏耳又按随㑹奔秦時未為中軍将也史文以後官冠其名錯孫蘄蘄史記作靳又昌生毋懌史記作無澤神形蚤衰蚤衰史記作騷動又因物興舍史記作因物與合遷生龍門注師古曰龍門山其東則在今秦州龍門縣北云云臣召南按地理志左馮翊夏陽縣故少梁禹貢梁山在西北龍門山在北即遷所生之地師古注所云其西在今同州韓城縣北者也龍門一山跨河故注先言東岸耳秦州應作泰州唐武徳元年於隋汾隂縣置泰州二年徙治龍門此龍門縣在漢為河東皮氏縣地與夏陽隔河相望今曰河津縣非遷所生地在西岸者也遷報之曰少卿足下文選起句作太史公牛馬走司馬遷再拜言少卿足下此篇字句與文選多異助語辭亦多不同今但依漢書各本校正若望僕不相師用而流俗人之言臣召南按文選作若望僕不相師而用流俗人之言倒用字於而字下甚順俱居門下文選注云謂同為侍中官不韋遷蜀世傳吕覽韓非囚秦說難孤憤臣召南按吕覽為不韋相秦日著故能懸之市門即韓非書亦在遊秦之前也此書大意言二人身雖遭難其所著作巳傳當世耳下文為自已發憤著書比例故專引孫臏邱明且負下未易居文選作負累之下未易居似較此文為明顯前漢書卷六十二考證
