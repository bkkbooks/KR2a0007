body:
  text: 前漢書卷五十二漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注竇田灌韓傳第二十二竇嬰字王孫孝文皇后從兄子也父世觀津人也師古曰縣名也地理志屬信都觀音工喚反喜賓客師古曰喜好也音許吏反孝文時為吳相病免孝景即位為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲師古曰序家人昆弟之親不為君臣禮也是時上未立太子酒酣上從容曰千秋萬歲後傳王師古曰從音千庸反宋祁曰浙本傳字下有於字太后驩嬰引巵酒進上曰天下者髙祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰嬰亦薄其官師古曰自嫌其官輕薄之也宋祁曰南本注也字下有何儒亮以為嬰素忠讜氣髙不以官業為重余按師古注例無何儒亮此其誤冩歟因病免太后除嬰門籍不得朝請師古曰請音才性反其下亦同孝景三年吳楚反上察宗室諸竇無如嬰賢師古曰宗室帝之同姓親也諸竇總謂帝外家也以吳楚之難故欲用内外之親為將也召入見固讓謝稱病不足任太后亦慙於是上曰天下方有急王孫寧可以讓邪廼拜嬰為大將軍賜金千斤嬰言爰盎欒布諸名將賢士在家者進之所賜金陳廊廡下師古曰廊堂下周屋也廡門屋也音侮軍吏過輙令財取為用師古曰財與裁同謂裁量而用之也金無入家者嬰守滎陽監齊趙兵七國破封為魏其侯游士賔客争歸之毎朝議大事條侯魏其列侯莫敢與亢禮師古曰言特敬此二人也宋祁曰注特字當作時字四年立栗太子師古曰栗姬之子故曰栗太子以嬰為傅七年栗太子廢嬰争弗能得宋祁曰争下當有之字謝病屏居藍田南山下師古曰屏隐也宋祁曰邵夲無藍字居下着㸃越本作屏居田南山下若只云田南山下即當作田字今藍田為是數月諸竇賔客辯士説莫能來梁人髙遂廼説嬰曰能富貴將軍者上也能親將軍者太后也今將軍傅太子太子廢争不能拔又不能死自引謝病擁趙女屏閒處而不朝師古曰擁抱也閒處猶言私處也袛加懟自明揚主之過師古曰袛適也懟怨怒也袛音支其字從衣懟音直類反有如兩宫奭將軍師古曰兩宫太后及帝也奭怒貌也音赫則妻子無類矣師古曰言被誅戮無遺類也嬰然之廼起朝請如故桃侯免相服䖍曰劉舍也竇太后數言魏其景帝曰太后豈以臣有愛相魏其者師古曰愛猶惜也魏其沾沾自喜耳多易張晏曰沾沾言自整頓也多易多輕易之行也或曰沾音瞻師古曰沾沾輕薄也或音他兼反今俗言薄沾沾喜音許吏反易音弋豉反宋祁曰浙本注瞻作幨難以為相持重遂不用用建陵侯衛綰為丞相田蚡蘇林曰蚡音鼢鼠鼢扶粉反孝景王皇后同母弟也生長陵竇嬰已為大將軍方盛蚡為諸曹郎未貴徃來侍酒嬰所跪起如子姓師古曰姓生也言同子禮若已所生及孝景晚節蚡益貴幸師古曰晚節猶言末時也為中大夫辯有口學盤盂諸書應劭曰黄帝史孔甲所作也凡二十九篇書盤盂中所以為法戒也諸書諸子之書也孟康曰孔甲盤盂二十六篇雜家書兼儒墨名法者也晉灼曰案藝文志孟説是也王皇后賢之孝景崩武帝初即位蚡以舅封為武安侯弟勝為周陽侯蚡新用事卑下賔客師古曰下音胡稼反進名士家居者貴之晉灼曰滯在里巷未仕者欲以傾諸將相師古曰傾謂踰越而勝之也上所填撫多蚡賔客計䇿如淳曰多薦名士名士得進為帝畫計策也師古曰填音竹刃反㑹丞相綰病免上議置丞相太尉藉福説蚡曰魏其侯貴久矣素天下士歸之今將軍初興未如即上以將軍為相必讓魏其魏其為相將軍必為太尉太尉相尊等耳師古曰言其尊貴同一等也有讓賢名蚡乃微言太后風上師古曰風讀曰諷於是廼以嬰為丞相蚡為太尉藉福賀嬰因弔曰君侯資性喜善疾惡師古曰喜好也音許吏反方今善人譽君侯故至丞相然惡人衆亦且毁君侯君侯能兼容則幸乆師古曰兼容謂不嫉惡人令其怨也不能今以毁去矣宋祁曰江南本能作然嬰不聴嬰蚡俱好儒術推轂趙綰為御史大夫王臧為郎中令師古曰推轂謂升薦之若轉車轂之為也迎魯申公欲設明堂令列侯就國除闗服䖍曰除關禁也索隐謂除關門之税以禮為服制師古曰謂喪服之制也以興太平舉謫諸竇宗室無行者除其屬籍諸外家為列侯列侯多尚公主皆不欲就國以故毁日至竇太后太后好黄老言而嬰蚡趙綰等務隆推儒術貶道家言是以竇太后滋不説師古曰滋益也説讀曰悦二年御史大夫趙綰請毋奏事東宫竇太后大怒曰此欲復為新垣平邪廼罷逐趙綰王臧而免丞相嬰太尉蚡以柏至侯許昌為丞相武彊侯莊青翟為御史大夫嬰蚡以侯家居蚡雖不任職以王太后故親幸數言事多效師古曰效謂見聴用士吏趨埶利者皆去嬰而歸蚡蚡日益横師古曰横恣也音胡孟反六年竇太后崩丞相昌御史大夫青翟坐喪事不辦免上以蚡為丞相大司農韓安國為御史大夫天下士郡諸侯愈益附蚡師古曰郡及諸侯也猶言郡國耳蚡為人貌侵生貴甚服䖍曰侵短小也師古曰生貴謂自尊髙示貴寵也又以為諸侯王多長張晏曰多長年上初即位富於春秋師古曰謂年幼也齒歴方久故云富於春秋也蚡以肺附為相師古曰舊觧云肺附如肝肺之相附著也一説肺斫木札也喻其輕薄附著大材也非痛折節以禮屈之天下不肅師古曰痛猶甚也言以尊貴臨之皆令其屈節而下已也當是時丞相入奏事語移日所言皆聴薦人或起家至二千石權移主上上廼曰君除吏盡未吾亦欲除吏師古曰凡言除者除去故官就新官嘗請考工地益宅上怒曰遂取武庫是後廼退師古曰考工少府之屬官也主作器械上責其此請故謂之曰何不遂取武庫蚡乃退也召客飲坐其兄蓋侯北鄉自坐東鄉師古曰自處尊位也鄉讀皆曰嚮以為漢相尊不可以兄故私橈師古曰橈曲也音女教反由此滋驕師古曰滋益也治宅甲諸第師古曰言為諸第之􅇰也以甲乙之次言甲則為上矣田園極膏腴師古曰膏腴謂肥厚之處市買郡縣器物相屬於道師古曰屬逮及也音之欲反前堂羅鐘鼓立曲旃如淳曰旃旗之名也通帛曰旃曲旃僭也蘇林曰禮大夫建旃曲柄上曲也師古曰蘇説是也許慎云旃旗曲柄也所以旃表士衆也後房婦女以百數諸奏珍物狗馬玩好不可勝數師古曰奏進也而嬰失竇太后益疏不用無埶諸公稍自引而怠驁師古曰驁與傲同唯灌夫獨否宋祁曰南本否作不顧余謂不若作否故嬰墨墨不得意而厚遇夫也灌夫字仲孺潁隂人也父張孟常為潁隂侯灌嬰舍人得幸因進之師古曰進薦也嬰薦孟也宋祁曰南本浙本常並作嘗至二千石故䝉灌氏姓為灌孟師古曰蒙冐也吳楚反時潁隂侯灌嬰為將軍屬太尉師古曰時潁隂侯是灌嬰之子名何轉冩誤為嬰耳請孟為校尉夫以千人與父俱孟康曰官主千人如候司馬也孟年老潁隂侯彊請之鬱鬱不得意故戰常䧟堅遂死吳軍中漢法宋祁曰漢法浙本作軍法從軍是此自説漢何煩以漢别之父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父仇張晏曰自奮厲也於是夫被甲持㦸募軍中壯士所善願從數十人師古曰所善素與己善者及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下師古曰戲大將之旗也讀與麾同又音許宜反所殺傷數十人不得前復還走漢壁師古曰走趣嚮也音奏亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死師古曰萬金者言其價貴也金字或作全言得之者必生全也創少瘳師古曰瘳差也音丑流反又復請將軍曰吾益知吳壁曲折請復徃師古曰曲折猶言委曲也將軍壯而義之恐亡夫廼言太尉太尉召固止之吳軍破夫以此名聞天下潁隂侯言夫夫為郎中將劉敞曰當云中郎將否則郎中三將也數嵗坐法去家居長安中諸公莫不稱由是復為代相武帝即位以為淮陽天下郊勁兵處師古曰郊謂四交輻湊而兵又勁彊故徙夫為淮陽太守入為太僕二年夫與長樂衛尉竇甫飲輕重不得晉灼曰飲酒輕重不得其平也師古曰禮數之輕重也夫醉搏甫師古曰搏以手擊之甫竇太后昆弟上恐太后誅夫徙夫為燕相數嵗坐法免家居長安夫為人剛直使酒師古曰使酒因酒而使氣也不好面䛕貴戚諸埶在己之右欲必陵之士在己左愈貧賤尤益禮敬與鈞師古曰右尊也左卑也鈞等也稠人廣衆薦寵下軰師古曰稠多也下軰下等之人也每於人衆之中故寵薦也士亦以此多之師古曰多猶重之夫不好文學喜任俠已然諾師古曰已必也謂一言許人必信之也喜音許吏反諸所與交通無非豪桀大猾家累數千萬食客日數十百人師古曰或八九十或百人也波池田園宗族賔客為權利師古曰波讀曰陂横潁川師古曰横音胡孟反其下亦同潁川兒歌之曰潁水清灌氏寜潁水濁灌氏族師古曰深怨嫉之故為此言也夫家居卿相侍中賔客益衰師古曰以夫居家而卿相侍中素為夫之賔客者漸以衰退不復徃也及竇嬰失埶亦欲倚夫引繩排根生平慕之後棄者蘇林曰二人相倚引繩直排根賔客去之者不與交通也孟康曰根者根格引繩以彈排擯根格之也師古曰孟説近之根音下恩反格音下各反言嬰與夫共相提挈有人生平慕嬰夫後見其失職而頗慢弛如此者共排退之不復與交譬如相對挽繩而根格之也今吳楚俗猶謂牽引前却為根格宋祁曰根格二字疑皆從手夫亦得嬰通列侯宗室為名髙兩人相為引重張晏曰相薦逹為聲勢也師古曰相牽引而致於尊重也為音于偽反其游如父子然相得驩甚無厭恨相知之晚夫嘗有服師古曰謂喪服也過丞相蚡蚡從容曰師古曰從音千容反吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍廼肯幸臨況魏其侯師古曰況賜也夫安敢以服為觧師古曰觧謂辭之也若今言分疏矣請語魏其具師古曰具辦具酒食將軍旦日蚤臨師古曰旦日明旦也蚤古早字蚡許諾夫以語嬰嬰與夫人益市牛酒師古曰益多也夜灑掃張具師古曰洒音灑又音所寄反至旦平明令門下候司至日中蚡不來嬰謂夫曰丞相豈忘之哉夫不懌師古曰懌悦也曰夫以服請不宜師古曰不當忘也廼駕自徃迎蚡蚡特前戲許夫師古曰特但也殊無意徃夫至門蚡尚臥也於是夫見曰將軍昨日幸許過魏其魏其夫妻治具至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言廼駕徃徃又徐行夫愈益怒及飲酒酣夫起舞屬蚡師古曰屬付也猶今之舞訖相勸也屬音之欲反蚡不起夫徙坐語侵之師古曰徙坐謂移就其坐也嬰廼扶夫去謝蚡蚡卒飲至夜極驩而去後蚡使藉福請嬰城南田嬰大望曰師古曰望怨也宋祁曰浙本而去字下更有去字老僕雖棄將軍雖貴寜可以埶相奪乎不許夫聞怒罵福福惡兩人有隙廼謾好謝蚡師古曰謾猶詭也詐為好言也謾讀與慢同又音莫連反曰魏其老且死易忍且待之已而蚡聞嬰夫實怒不予亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可愛數頃田且灌夫何與也師古曰與讀曰預預干也吾不敢復求田由此大怒元光四年春蚡言灌夫家在潁川横甚民苦之請案之上曰此丞相事何請夫亦持蚡隂事為姦利受淮南王金與語言賔客居間遂已俱觧師古曰兩家賔客處於中間和觧之夏蚡取燕王女為夫人師古曰燕王澤之子康王嘉女太后詔召列侯宗室皆徃賀嬰過夫欲與俱夫謝曰夫數以酒失過丞相師古曰言因酒有失得罪過於丞相丞相今者又與夫有隙嬰曰事已解彊與俱酒酣蚡起為壽坐皆避席伏已嬰為壽獨故人避席餘半膝席蘇林曰下席而膝半在席上也如淳曰以膝跪席上也師古曰如説是也夫行酒至蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之張晏曰行酒過之為已畢如淳曰言雖貴且當盡酒以其埶劫之也師古曰如説近之言將軍雖貴人也請盡此觴嘻强笑也音許其反劉攽曰夫謂蚡所以不能滿觴由其貴人也然當畢之時蚡不肯師古曰不為盡也行酒次至臨汝侯灌賢賢方與程不識耳語師古曰附耳小語也又不避席夫無所發怒迺罵賢曰平生毁程不識不直一錢今日長者為壽廼效女曹兒呫囁耳語師古曰女曹兒猶言兒女軰也呫音昌涉反囁音人渉反蚡謂夫曰程李俱東西宫衛尉孟康曰李廣為東宫程不識為西宫今衆辱程將軍仲孺獨不為李將軍地乎蘇林曰不為李将軍除道地邪如淳曰二人同號比尊今辱一人不當為毁廣邪師古曰如説近之言既毁程令廣何地自安處夫曰今日斬頭穴匈何知程李晉灼曰斬頭見刺猶不止也坐乃起更衣師古曰坐謂坐上之人也更改也凡乆坐者皆起更衣以其寒煖或變也稍稍去嬰去戲夫晉灼曰戲古麾字也師古曰招麾之令出也漢書多以戲為麾字夫出蚡遂怒曰此吾驕灌夫罪也廼令騎留夫師古曰騎謂常從之騎也夫不得出藉福起為謝案夫項令謝師古曰使其拜也夫愈怒不肯順蚡廼戲騎縛夫師古曰戲讀亦曰麾謂指麾命之而令收縛夫也置傳舍師古曰傳舍觧在酈食其傳召長史曰今日召宗室有詔師古曰長史丞相長史也召宗室謂請召之為客也劾灌夫罵坐不敬師古曰於大坐中罵詈為不敬繫居室師古曰居室署名也屬少府其後改名曰保宫遂其前事師古曰遂竟也遣吏分曹逐捕諸灌氏支屬皆得棄市罪嬰愧為資使賔客請莫能解如淳曰為出資費使人為夫請罪也師古曰如説非也為資為其資地耳非財物也為讀如本字蚡吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言蚡隂事嬰鋭為救夫嬰夫人諫曰灌將軍得罪丞相與太后家迕師古曰相逆迕也迕音悟寜可救邪嬰曰侯自我得之自我捐之無所恨師古曰言不過失爵耳且終不令灌仲孺獨死嬰獨生廼匿其家竊出上書師古曰匿避也不令家人知之恐其又止諫也立召入具告言灌夫醉飽事不足誅上然之賜嬰食曰東朝廷辯之如淳曰東朝太后朝也張晏曰㑹公卿大夫東朝共理而分别也嬰東朝盛推夫善言其醉飽得過廼丞相以他事誣罪之蚡盛毁夫所為横恣罪逆不道嬰度無可奈何師古曰度音徒各反因言蚡短蚡曰天下幸而安樂無事蚡得為肺附所好音樂狗馬田宅所愛倡優巧匠之屬師古曰倡樂人也優諧戲者也不如魏其灌夫日夜招聚天下豪桀壯士與論議腹誹而心謗卭視天俛畫地張晏曰視天占三光也畫地知分野所在也念欲作反事也師古曰卬讀曰仰辟睨兩宫閒張晏曰占太后與帝吉凶之期也師古曰辟睨傍視也辟音普計反本作䁹睨音吾計反幸天下有變而欲有大功張晏曰幸有反者當為將立大功也臣瓚曰天下有變謂因國家變難之際得立大功也師古曰瓚説為是臣乃不如魏其等所為上問朝臣兩人孰是御史大夫韓安國曰魏其言灌夫父死事身荷㦸馳不測之吳軍師古曰荷負也不測言其彊盛也荷音何宋祁曰荷字當從浙本何可反身被數十創名冠三軍此天下壯士非有大惡爭杯酒不足引它過以誅也魏其言是丞相亦言灌夫通姦猾侵細民家累巨萬横恣潁川輘轢宗室侵犯骨肉師古曰輘轢謂蹈踐之也輘音凌轢音郎擊反此所謂支大於幹脛大於股不折必披師古曰披音丕靡反丞相言亦是唯明主裁之主爵都尉汲黯是魏其内史鄭當時是魏其後不堅宋祁曰後字當從浙本作復若作後即在一時何容更有前後也餘皆莫敢對上怒内史曰公平生數言魏其武安長短今日廷論局趣效轅下駒應劭曰駒者駕著轅下局趣䠞小之貌張晏曰俛頭於車轅下隨母而已師古曰張説非也駕車不以牝馬小雅皇皇者華之詩曰我馬維駒非隨母也吾并斬若屬矣師古曰若汝也即罷起入上食太后太后亦已使人候司具以語太后太后怒不食曰我在也而人皆藉吾弟晉灼曰藉蹈也令我百嵗後皆魚肉之乎師古曰以比魚肉而食噉也且帝寜能為石人邪師古曰言徒有人形耳不知好惡也一曰石人者謂常存不死也此特帝在即錄錄師古曰録録言循衆也設百嵗後是屬寜有可信者乎師古曰設猶脱也上謝曰俱外家故廷辨之師古曰嬰景帝從舅子蚡太后同母弟故言俱外家不然此一獄吏所决耳是時郎中令石建為上分别言兩人蚡已罷朝出止車門召御史大夫安國載師古曰韓安國也載謂共乗車怒曰與長孺共一秃翁何為首鼠兩端服䖍曰秃翁言嬰無官位版綬也首鼠一前一却也張晏曰嬰年老又嗜酒頭秃言當共治一秃翁也師古曰服説是也安國良久謂蚡曰君何不自喜師古曰何不自謙遜為可喜之事也喜音許吏反夫魏其毁君君當免冠觧印綬歸師古曰歸印綬於天子也曰臣以肺附幸得待罪固非其任魏其言皆是如此上必多君有讓師古曰多猶重也不廢君魏其必媿杜門齰舌自殺師古曰杜塞也齰齧也音仕客反今人毁君君亦毁之譬如賈豎女子爭言何其無大體也蚡謝曰爭時急不知出此於是上使御史簿責嬰師古曰簿責以文簿一一責之也簿音歩户反所言灌夫頗不讎晉灼曰讎當也劾繫都司空師古曰都司空宗正屬官也見百官公卿表孝景時嬰嘗受遺詔曰事有不便以便宜論上師古曰論説其事而上於天子及繫灌夫罪至族事日急諸公莫敢復明言於上嬰廼使昆弟子上書言之幸得召見師古曰幸冀也書奏案尚書大行無遺詔如淳曰大行主諸侯官也師古曰此説非也大行景帝大行也尚書之中無此大行遺詔也詔書獨臧嬰家嬰家丞封孟康曰以家丞印封遺詔也廼劾嬰矯先帝詔害罪當棄市鄭氏曰矯詔冇害不害也五年十月悉論灌夫支屬嬰良乆廼聞有劾即陽病痱不食欲死師古曰痱風病也音肥或聞上無意殺嬰復食治病議定不死矣廼有飛語為惡言聞上張晏曰蚡為作飛揚誹謗之語也臣瓚曰無根而至也故以十二月晦論棄市渭城張晏曰著日月者見春垂至恐遇赦贖之春蚡疾一身盡痛若有擊者謼服謝罪晉灼曰服音瓝闗西俗謂得杖呼及小兒啼為呼瓝或言蚡號呼謝服罪也師古曰兩説皆通謼古呼字若謂啼為謼服則謼音火交反服音平卓反上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死子恬嗣元朔中有罪免後淮南王安謀反覺始安入朝時蚡為太尉迎安霸上謂安曰上未有太子大王􅇰賢髙祖孫即宫車晏駕非大王立尚誰立哉師古曰言大王尚不得立當誰立也淮南王大喜厚遺金錢財物上自嬰夫事時不直蚡特為太后故及聞淮南事上曰使武安侯在者族矣師古曰言其頼自死韓安國字長孺梁成安人也後徙睢陽嘗受韓子雜説鄒田生所師古曰田生鄒縣人事梁孝王為中大夫吳楚反時孝王使安國及張羽為將扞吳兵於東界張羽力戰安國持重以故吳不能過梁吳楚破安國張羽名由此顯梁梁王以至親故得自置相二千石出入游戲僭於天子師古曰僭擬也天子聞之心不善太后知帝弗善廼怒梁使者弗見案責王所為安國為梁使見大長公主而泣如淳曰大長公主景帝姊也曰何梁王為人子之孝為人臣之忠而太后曽不省也師古曰省視也夫前日吳楚齊趙七國反自闗以東皆合從而西嚮師古曰從音子容反唯梁最親為限難梁王念太后帝在中師古曰中闗中也一説謂京師為中猶言中國也宋祁曰一本無難字而諸侯擾亂壹言泣數行而下跪送臣等六人將兵擊却吳楚吳楚以故兵不敢西而卒破亡梁之力也今太后以小苛禮責望梁王師古曰苛細也梁王父兄皆帝王而所見者大故出稱䟆入言警師古曰䟆止行人也警令戒肅也天子出入皆備此儀而今云出稱䟆入言警者互舉之耳車旗皆帝所賜即以嫮鄙小縣服䖍曰嫮夸好也晉灼曰嫮音折嫮之嫮鄧展曰嫮好也自以車服之好曜邊鄙之邑也師古曰服説晉音是也鄙小縣言在外鄙之小縣也驅馳國中欲夸諸侯令天下知太后帝愛之也今梁使來輙案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后不䘏也長公主具以告太后太后喜曰為帝言之言之帝心廼解而免冠謝太后曰宋祁曰而免冠南本無而字兄弟不能相教廼為太后遺憂悉見梁使厚賜之其後梁王益親驩太后長公主更賜安國直千餘金師古曰更音工衡反由此顯結於漢其後安國坐法抵罪䝉師古曰䝉梁國之縣也劉奉世曰䝉字當屬下句獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之師古曰溺讀曰尿居無幾梁内史缺師古曰無幾未多時也幾音居豈反漢使使者拜安國為梁内史起徒中為二千石田甲亡安國曰甲不就官我滅而宗師古曰而汝也甲肉袒謝安國笑曰公等足與治乎師古曰治謂當敵也今人猶云對治治音丈吏反一曰不足繩治治讀如本字卒善遇之内史之缺也王新得齊人公孫詭説之師古曰説讀曰悦欲請為内史竇太后所廼詔王以安國為内史公孫詭羊勝説王求為帝太子及益地事恐漢大臣不聴廼陰使人刺漢用事謀臣及殺故吳相爰盎劉奉世曰刺漢謀臣在漢已立太子之後此云求為太子怨大臣不聴故刺之與諸傳不同當是此誤景帝遂聞詭勝等計畫廼使使捕詭勝必得師古曰必令得之漢使十軰至梁相以下舉國大索師古曰索捜也音山客反月餘弗得安國聞詭勝匿王所廼入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與太上皇之與髙帝及皇帝與臨江王親師古曰孰與猶言何如也王曰弗如也安國曰夫太上皇臨江親父子間然髙帝曰提三尺取天下者朕也師古曰三尺謂劍也故太上終不得制事居于櫟陽臨江適長太子師古曰適讀曰嫡以一言過廢王臨江師古曰景帝嘗屬諸姬子太子母栗姬言不遜由是廢太子栗姫憂死也用宮垣事卒自殺中尉府張晏曰以侵堧垣徴自殺也何者治天下終不用私亂公語曰雖有親父安知不為虎雖有親兄安知不為狼師古曰言其恩愛不可必保也今大王列在諸侯訹邪臣浮説師古曰訹誘也音戍宋祁曰江浙本訹作怵音椿戍反犯上禁橈明法師古曰橈曲也音女教反天子以太后故不忍致法於大王太后日夜涕泣幸大王自改大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出之即日詭勝自殺漢使還報梁事皆得釋師古曰釋觧也安國力也景帝太后益重安國孝王薨共王即位師古曰共讀曰恭安國坐法失官家居武帝即位武安侯田蚡為太尉親貴用事安國以五百金遺蚡蚡言安國太后上素聞安國賢即召以為北地都尉遷為大司農閩東越相攻遣安國大行王恢將兵未至越越殺其王降漢兵亦罷其年田蚡為丞相安國為御史大夫匈奴來請和親上下其議師古曰下音胡亞反大行王恢燕人數為邊吏習胡事議曰漢與匈奴和親率不過數嵗即背約不如勿許舉兵擊之安國曰千里而戰即兵不獲利今匈奴負戎馬足懐鳥獸心師古曰負恃也遷徙鳥集難得而制得其地不足為廣有其衆不足為彊自上古弗屬師古曰不内屬於中國漢數千里爭利則人馬罷師古曰罷讀曰疲虜以全制其敝埶必危殆臣故以為不如和親羣臣議多附安國於是上許和親明年鴈門馬邑豪聶壹張晏曰豪猶帥也因大行王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上廼召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盗無已邊竟數驚朕甚閔之師古曰竟讀曰境其下亦同今欲舉兵攻之何如大行恢對曰宋祁曰浙本恢字上有王字陛下雖未言臣固願效之師古曰效致也致其計臣聞全代之時服䖍曰代未分之時也李奇曰六國之時全代為一國尚能以擊匈奴况今加以漢之大乎北有彊胡之敵宋祁曰王本改北為背予謂作北義直不湏為背内連中國之兵然尚得飬老長幼種樹以時倉廪常實師古曰樹殖也匈奴不輕侵也今以陛下之威海内為一天下同任如淳曰任事也又遣子弟乗邊守塞師古曰乘登也登其城而備守也宋祁曰又字當從浙本作人人遣者見天下同任義轉粟輓輸以為之備師古曰輓引車也音晩然匈奴侵盗不已者無它以不恐之故耳師古曰不示威令恐懼也臣竊以為擊之便御史大夫安國曰不然臣聞髙皇帝嘗圍於平城匈奴至者投鞌髙如城者數所師古曰觧脱其馬示閑暇也投積其鞌若營壘也平城之飢七日不食天下歌之及觧圍反位而無忿怒之心夫聖人以天下為度者也師古曰言當隨天下人心而寛大其度量也不以已私怒傷天下之功宋祁曰浙本功作公故廼遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗壹擁天下之精兵聚之廣武常谿張晏曰廣武鴈門縣常谿谿名然終無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿師古曰乆留也故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂師古曰襲因也復重也復音扶目反非故相反也各因世宜也且髙帝身被堅執鋭䝉霧露沐霜雪行幾十年師古曰幾近也音鉅依反所以不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望師古曰槥小棺也從軍死者以槥送致其喪載槥之車相望於道言其多也槥音衛此仁人之所隱也張晏曰隱痛也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也師古曰祖祖廟也占問也重猶難之也且自三代之盛夷狄不與正朔服色師古曰與讀曰預非威不能制彊弗能服也以為逺方絶地不牧之民不足煩中國也師古曰不牧謂不可牧養也且匈奴輕疾悍亟之兵也師古曰悍勇也亟急也音居力反至如猋風去如收電師古曰猋疾風也音必遥反畜牧為業弧弓射獵師古曰以木曰弧以角曰弓逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其埶不相權也師古曰輕重不等也臣故曰勿擊便恢曰不然臣聞鳳鳥乘於風聖人因於時昔秦繆公都雍師古曰繆讀與穆同地方三百里知時宜之變攻取西戎辟地千里并國十四師古曰辟讀曰闢其下亦同隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟師古曰竟讀曰境累石為城樹榆為塞如淳曰塞上種榆也匈奴不敢飲馬於河置㷭􅥂然後敢牧馬師古曰􅥂古燧字夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣師古曰留止也言無所礙也若是則北發月氏可得而臣也師古曰發猶徵召也言威聲之盛北自月支以來皆可徵召而為臣也氏讀曰支劉敞曰北發國名亦見管子書臣故曰擊之便安國曰不然臣聞用兵者以飽待饑正治以待其亂定舍以待其勞師古曰舍止息也故接兵覆衆伐國墮城師古曰覆敗也墮毁也言兵與敵接則敗其衆所伐之國則毁其城也覆音方目反墮音火規反常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽師古曰衝風疾風之衝突者也彊弩之末力不能入魯縞師古曰縞素也曲阜之地俗善作之尤為輕細故以取喻也夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長􅇌難以為功師古曰􅇌與驅同從行則廹脅衡行則中絶師古曰從音子容反衡猶横也疾則糧乏徐則後利師古曰後利謂不及於利不至千里人馬乏食兵法曰遺人獲也師古曰言以軍遺敵人令其虜獲也遺音弋季反意者有它繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過師古曰言易零落清水明鏡不可以形逃師古曰言美惡皆見通方之士不可以文亂師古曰方道也今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士隂伏而處以為之備審遮險阻以為其戒吾埶已定或營其左或營其右或當其前或絶其後單于可禽百全必取上曰善廼從恢議隂使聶壹為間師古曰間音居莧反亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信以為然而許之聶壹廼詐斬死罪囚縣其頭馬邑城下視單于使者為信師古曰視讀曰示曰馬邑長吏已死可急來於是單于穿塞將十萬騎入武州塞師古曰在鴈門當是時漢伏兵車騎材官三十餘萬匿馬邑旁谷中衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍御史大夫安國為䕶軍將軍諸將皆屬約單于入馬邑縱兵王恢李息别從代主擊輜重師古曰輜衣車也重謂載重物車也故行者之資總曰輜重重音直用反於是單于入塞未至馬邑百餘里覺之還去語在匈奴傳塞下傳言單于已去漢兵追至塞度弗及師古曰度音徒各反王恢等皆罷兵上怒恢不出擊單于輜重也宋祁曰江南本無也字恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人衆不敵袛取辱師古曰袛適也音支固知還而斬然完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬服䖍曰逗音企應劭曰逗曲行避敵也橈顧望也軍法語也蘇林曰逗音豆如淳曰軍法行而逗留畏懦者要斬師古曰服應二説皆非也逗謂留止也橈屈弱也逗又音住宋祁曰浙本無當斬二字恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也上朝太后太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊猶頗可得以尉士大夫心師古曰或當得其輜重人衆也古尉安之字正如此其後流俗乃加心耳今不誅恢無以謝天下於是恢聞廼自殺安國為人多大畧知足以當世取舍師古曰舍止也取舍言可取則取可止則止而出於忠厚貪耆財利師古曰耆讀曰嗜然所推舉皆亷士賢於己者於梁舉壺遂臧固至它皆天下名士師古曰於梁舉二人至於他餘所舉亦皆名士也士亦以此稱慕之唯天子以為國器師古曰言臣下皆敬重之天子一人亦以為國器國器者言其器用重大可施於國政也宋祁曰注文國政字下有之人二字安國為御史大夫五年丞相蚡薨安國行丞相事引墯車蹇如淳曰為天子導引而墯車跛蹇也宋祁曰古本引字上有奉字他本只云引予謂作奉引為是上欲用安國為丞相使使視蹇甚廼更以平棘侯薛澤為丞相安國病免師古曰以足疾數月瘉復為中尉嵗餘徙為衛尉而將軍衛青等擊匈奴破龍城宋祁曰龍當作籠見衛靑傳明年匈奴大入邊語在青傳安國為材官將軍屯漁陽捕生口虜言匈奴逺去即上言方佃作時師古曰安國上奏也佃治田也音與田同請且罷屯罷屯月餘匈奴大入上谷漁陽安國壁廼有七百餘人出與戰安國傷入壁匈奴虜畧千餘人及畜産去上怒使使責讓安國徙益東屯右北平是時虜言當入東方安國始為御史大夫及䕶軍後稍下遷新壯將軍衞青等有功益貴安國既斥䟽將屯又失亡多甚自媿幸得罷歸師古曰冀得罷歸以為幸也他皆類此廼益東徙意忽忽不樂數月病歐血死壺遂與太史遷等定漢律歴官至詹事其人深中篤行君子上方倚欲以為相㑹其病卒師古曰倚謂仗任之也於綺反宋祁曰倚欲浙本作欲倚贊曰竇嬰田蚡皆以外戚重灌夫用一時决策師古曰謂馳入吳軍欲報父讐也而各名顯並位卿相大業定矣然嬰不知時變夫亡術而不遜師古曰遜順也蚡負貴而驕溢師古曰負恃也凶徳参㑹待時而發師古曰三人相遇故曰参㑹藉福區區其間惡能救斯敗哉師古曰惡音烏謂於何也以韓安國之見器臨其摯而顛墜李奇曰摯極也陵夷以憂死師古曰陵夷即陵遲也言漸陵替也遇合有命悲夫若王恢為兵首而受其咎豈命也虖師古曰言自己為之非由命也前漢書卷五十二前漢書卷五十二考證竇嬰傳字王孫臣召南按史記無嬰字觀景帝語嬰王孫寜可以讓耶是嬰字王孫矣有如兩宫奭將軍按史記作螫將軍張晏曰螫怒也毒蟲怒必螫人田蚡傳蚡為諸曹郎臣召南按史記無曹字据徐廣注亦不作郎官觧又漢初言郎不以曹稱疑此文曹字訛跪起如子姓凌穉隆曰史記作如子姪此作如子姓於義雖通䆒是訛字王皇后賢之臣召南按史記作王太后賢之在景帝時祗合稱皇后耳此漢書改訂史記之失蚡以肺附為相肺附史記作肺腑下同上怒曰遂取武庫臣召南按史記云君何不遂取武庫此怒語也漢書省君何不三字意遂不明灌夫傳將軍貴人也畢之畢之史記作屬之程李俱東西宫衛尉注孟康曰李廣為東宫程不識為西宫臣召南按孟康注非也漢以長樂宫為東宫太后居之天子居未央宫在長樂西据李廣傳廣入為未央衞尉而程不識亦為長樂衞尉是廣衛西宫而不識衞東宫也嬰東朝臣召南按史記作魏其之東朝之徃也之字似不可省又石建為上分别言兩人事此省事字又與長孺共一老秃翁此省老字又嬰廼使昆弟子上書言之幸得復召見此省復字皆不如本文韓安國傳由此顯結於漢臣召南按此作一句讀史記云名由此顯句結於漢句意義亦遂不同又安國笑曰可溺矣公等足與治乎此傳刪可溺矣三字不如本文逺甚唯與王恢論馬邑之計反覆折辨較史記為最詳王恢李息别從代史記作王恢李息李廣此缺李廣至它皆天下名士臣召南按史記作郅他則郅姓他名與壺遂臧固為三人此傳作至它則非人姓名矣前漢書卷五十二考證
