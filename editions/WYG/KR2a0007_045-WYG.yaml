body:
  text: 前漢書卷四十五漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注蒯伍江息夫傳第十五蒯通范陽人也師古曰涿郡之縣也舊屬燕通本燕人後游於齊故高祖云齊辯士蒯通本與武帝同諱師古曰本名為徹其後史家追書為通楚漢初起武臣畧定趙地宋祁曰一本定作燕號武信君通説范陽令徐公曰臣范陽百姓蒯通也竊閔公之將死故弔之雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子斷人之足黥人之首甚衆慈父孝子所以不敢事刃於公之腹者畏秦法也李奇曰東方人以物臿地中為事師古曰事音側吏反字本作倳周官考工記又作菑音皆同耳今天下大亂秦政不施師古曰施設也立也然則慈父孝子將爭接刃於公之腹以復其怨而成其名師古曰復猶報也音扶目反宋祁曰越本名上有功字此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而説之師古曰今將欲見之曰必將戰勝而後畧地攻得而後下城臣竊以為殆矣師古曰殆危也用臣之計毋戰而畧地不攻而下城傳檄而千里定可乎彼將曰何謂也師古曰彼謂武信君也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利宋祁曰一本利下有之字則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守孟康曰嬰以城自繞皆為金城湯池不可攻也師古曰金以喻堅湯喻沸熱不可近為君計者莫若以黃屋朱輪迎范陽令使馳騖於燕趙之郊師古曰令衆皆見則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也師古曰言乗勢便易此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此説武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通䇿焉後漢將韓信虜魏王破趙代降燕定三國引兵將東擊齊未度平原聞漢王使酈食其説下齊信欲止通説信曰將軍受詔擊齊而漢獨發閒使下齊寜有詔止將軍乎師古曰閒使謂使人伺間隙而單行何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城師古曰掉揺也音徒釣反將軍將數萬之衆廼下趙五十餘城為將數歲反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷備漢守禦信因襲歴下軍遂至臨菑齊王以酈生為欺已而亨之因敗走信遂定齊地自立為齊假王漢方困於滎陽遣張良即立信為齊王以安固之項王亦遣武涉説信欲與連和蒯通知天下權在信欲説信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言張晏曰言背者云背畔則大貴信曰何謂也通因請間師古曰不欲顯言故請問隙而私説曰天下初作難也俊䧺豪桀建號壹呼師古曰建號者自立為侯王呼音火故反天下之士雲合霧集魚鱗雜襲師古曰雜襲猶雜沓言相雜而累積飄至風起師古曰飄讀曰焱謂疾風音必遥反當此之時憂在亡秦而已師古曰志滅秦所憂者唯此今劉項分爭使人肝腦塗地流離中野不可勝數漢王將數十萬衆距鞏雒岨山河一日數戰亡尺寸之功折北不救師古曰折挫也北奔也不救謂無援助也敗滎陽傷成臯張晏曰於成臯戰傷胷也還走宛葉之間此所謂智勇俱困者也楚人起彭城轉鬭逐北至滎陽乘利席勝威震天下師古曰席因也若人之在席上然兵困於京索之間師古曰索音山客反廹西山而不能進三年於此矣師古曰至今已三年鋭氣挫於嶮塞糧食盡於内藏百姓罷極無所歸命師古曰罷讀曰疲以臣料之師古曰料量也非天下賢聖其埶固不能息天下之禍當今之時兩主縣命足下足下為漢則漢勝與楚則楚勝臣願披心腹墮肝膽師古曰墮毁也音火規反效愚忠恐足下不能用也方今為足下計莫若兩利而俱存之參分天下鼎足而立其埶莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虚之地以制其後因民之欲西鄉為百姓請命師古曰鄉讀曰嚮齊國在東故曰西嚮止楚漢之戰鬭士卒不死亡故云請命天下孰敢不聽足下按齊國之故有淮泗之地懷諸侯以德深拱揖讓師古曰深拱猶高拱則天下君王相率而朝齊矣蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而背恩乎通曰始常山王成安君故相與為刎頸之交宋祁曰一本無之字及爭張黶陳釋之事師古曰黶音一㸃反常山王奉頭䑕竄以歸漢王師古曰言其廹窘逃亡如鼠之藏竄宋祁曰史記韓信傳作奉項嬰頭而竄逃歸於漢借兵東下戰於鄗北成安君死於泜水之南師古曰鄗音呼各反泜音祗又音丁計反頭足異處此二人相與天下之至驩也而卒相滅亡者何也患生於多欲而人心難測也今足下行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳釋之事者故臣以為足下必漢王之不危足下過矣師古曰過猶誤也宋祁曰楊本用諸名公本校郭去必漢王之不危足下八字大夫種存亡越伯句踐師古曰令句踐致覇功也伯讀曰霸立功名而身死語曰野禽殫走犬亨師古曰殫盡也音單敵國破謀臣亡故以交友言之則不過張王與成安君以忠臣言之則不過大夫種此二者宜足以觀矣願足下深慮之且臣聞之勇畧震主者身危功蓋天下者不賞足下涉西河虜魏王禽夏説師古曰説讀曰悦下井陘誅成安君之罪以令於趙脅燕定齊南摧楚人之兵數十萬衆遂斬龍且西鄉以報師古曰且音子餘反鄉讀曰嚮此所謂功無二於天下畧不世出者也師古曰言其計畧奇異世所希有今足下挾不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎師古曰安焉也此下亦同夫埶在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之師古曰念猶思也數日通復説曰聽者事之候也師古曰謂能聽善謀也計者存亡之機也夫隨厮養之役者失萬乘之權守儋石之禄者闕卿相之位應劭曰齊人名小甖為儋受二斛晉灼曰石斗石也師古曰儋音都濫反或曰儋者一人之所負擔也計誠知之而決弗敢行者百事之禍也故猛虎之猶與不如蠭蠆之致蠚師古曰與讀曰豫蠆蝎也蠚毒也蠆音丑界反蠚音呼各反孟賁之狐疑不如童子之必至師古曰孟賁古之勇力士賁音奔此言貴能行之也夫功者難成而易敗時者難值而易失時乎時不再來師古曰此古語歎時之不可失願足下無疑臣之計信猶與不忍背漢又自以功多漢不奪我齊遂謝通師古曰告令罷去通説不聽惶恐乃陽狂為巫天下既定後信以罪廢為淮陰侯謀反被誅臨死歎曰悔不用蒯通之言死於女子之手高帝曰是齊辯士蒯通廼詔齊召蒯通通至上欲亨之曰若教韓信反何也師古曰若汝也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿張晏曰以鹿喻帝位天下共逐之高材者先得天下匈匈爭欲為陛下所為顧力不能師古曰顧念也可殫誅邪師古曰殫盡也上廼赦之至齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之刼齊士不與者死師古曰劫而取之不從則殺也齊處士東郭先生梁石君在刧中强從及田榮敗二人醜之師古曰自恥從亂以為醜惡也相與入深山隠居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之師古曰謝謂告辭也里母曰女安行師古曰安徐也我今令而家追女矣師古曰而亦汝即束縕請火於亡肉家師古曰縕亂麻音於粉反曰昨暮夜犬得肉爭鬭相殺請火治之師古曰治謂燖治死犬燖音似亷反亡肉家遽追呼其婦師古曰遽速也故里母非談説之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國廼見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隠居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓通論戰國時説士權變亦自序其説凡八十一首號曰雋永師古曰雋音字兗反雋肥肉也永長也言其所論甘美而義深長也初通善齊人安其生安其生嘗干項羽羽不能用其䇿而項羽欲封此兩人兩人卒不肯受伍被楚人也師古曰被音皮義反或言其先伍子胥後也被以材能稱為淮南中郎是時淮南王安好術學折節下士招致英雋以百數被為冠首師古曰最居其上也久之淮南王陰有邪謀被數微諫師古曰私諫之後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諌吳王吳王不用廼曰臣今見麋鹿㳺姑蘇之臺也張晏曰吳臺名也師古曰吳地記云因山為名西南去國三十五里今臣亦將見宮中生荆棘露霑衣也於是王怒繫被父母囚之三月王復召被曰將軍許寡人乎被曰小臣將為大王畫計耳宋祁曰越本作下臣臣聞聰者聽於無聲明者見於未形師古曰言智慮通達事未形兆皆豫見故聖人萬舉而萬全文王壹動而功顯萬世列為三王所謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不説師古曰説讀曰悦曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長㓜之序也宋祁曰新本去也字皆得其理上之舉錯遵古之道師古曰錯音千故反風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賓服羌􅈎貢獻東甌入朝師古曰􅈎西南夷也音蒲北反廣長榆如淳曰廣謂斥大之也長榆塞名王恢所謂樹榆以為塞者也師古曰長榆在朔方即衛青傳所云榆谿舊塞是也或謂之榆中開朔方匈奴折傷雖未及古太平時然猶為治宋祁曰浙本句末有也字王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黄義從大將軍擊匈奴言大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山如飛神力絶人如此宋祁曰一本作材力絶人一本作人材知此浙本作身材如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先湏士卒休乃舍穿井得水廼敢飲軍罷士卒已踰河廼度皇太后所賜金錢盡以賞賜雖古名將不過也王曰夫蓼太子服䖍曰淮南太子也文穎曰食采於此或言外家姓也師古曰蓼自地名而王之太子豈以食地為號文言外家姓近為得之亦猶漢之栗太子也知畧不世出非常人也以為漢廷公卿列侯皆如沐猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒尊之也如淳曰祭祠時唯尊長者以酒沃酹師古曰如説是也受几杖而不朝王四郡之衆地方數千里采山銅以為錢煑海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合從舉兵而西破大梁敗狐父師古曰在梁碭之間也父音甫奔走而還為越所禽死於丹徒師古曰即今潤州丹徒縣也頭足異處身滅祀絶為天下戮師古曰天下之人皆共戮之一曰天下之大戮也夫以吳衆不能成功者何也誠逆天違衆而不見時也王曰男子之所死者一言耳張晏曰不成即死一言耳臣瓚曰或有一言云以死報也師古曰二説死並非也言男子感氣相許一言不顧其死或曰一言之恨不顧危亡以此致死也劉攽曰此言所死雖不同等是死耳且吳何知反漢將一日過成臯者四十餘人師古曰言不知塞成臯口而令漢將得出之是不知反計也今我令緩先要成臯之口韋昭曰淮南臣名也師古曰緩者名也不言其姓今流俗書本於緩上妄加樓字非也周被下潁川兵塞轘轅伊闕之道陳定發南陽兵守武闗河南太守獨有雒陽耳師古曰如此計則漢河南郡唯有雒陽在耳餘皆不屬何足憂然此北尚有臨晉闗河東上黨與河内趙國界者通谷數行如淳曰言此北尚嶮阻其谿谷可得通行者有數處人言絶成臯之道天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐陰事泄謂被曰事至吾欲遂發天下勞苦有間矣如淳曰言天下勞苦人心有間隙易動亂師古曰此説非也有間猶言中閒已有也故謂此者乃為間也宋祁曰浙本注文此者作比者諸侯頗有失行皆自疑我舉兵西鄉必有應者師古曰鄉讀曰嚮無應即還畧衡山勢不得不發被曰畧衡山以擊廬江有尋陽之船守下雉之城孟康曰下雉江夏縣名師古曰雉音羊氏反結九江之浦絶豫章之口彊弩臨江而守以禁南郡之下東保㑹稽南通勁越屈彊江淮間師古曰屈音具勿反可以延歲月之壽耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成師古曰吳賢驕如王之三臣也公獨以為無福何被曰大王之羣臣近幸素能使衆者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地百人之聚起于大澤奮臂大呼天下嚮應師古曰呼音火故反嚮讀曰響西至於戲而兵百二十萬今吾國雖小勝兵可得二十萬公何以言有禍無福被曰臣不敢避子胥之誅願大王無為吳王之聽徃者秦為無道殘賊天下殺術士燔詩書滅聖跡棄禮義任刑法轉海瀕之粟致于西河師古曰瀕涯也海瀕謂縁海涯之地瀕音頻又音賓當是之時男子疾耕不足於糧餽師古曰餽亦饋字也女子紡績不足於蓋形遣䝉恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈師古曰屈盡也音其勿反欲為亂者十室而五又使徐福入海求仙藥多齎珍寶童男女三千人五種百工而行師古曰五種五穀之種也徐福得平原大澤止王不來於是百姓悲痛愁思欲為亂者十室而六又使尉佗踰五嶺攻百越師古曰五嶺解在張耳傳尉佗知中國勞極止王南越師古曰南越傳云南海尉任囂謂趙佗曰聞陳勝等作亂豪桀叛秦相立即被佗書行南海尉事囂死後佗始自為王今此乃言尉佗先王陳勝乃反此蓋伍被一時對辭不究其實也行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乘之駕作阿房之宮收太半之賦發閭左之戍師古曰閭左解在食貨志父不寧子兄不安弟師古曰言不能相保政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上師古曰叩擊也欲為亂者十室而八客謂高皇帝曰時可矣高帝曰待之聖人當起東南間不一歲陳吳大呼師古曰中間不經一歲也呼音火故反劉項並和天下嚮應師古曰和音胡卧反嚮讀曰響所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陣之中以成帝王之功今大王見高祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下一齊海内汜愛蒸庻師古曰氾普也蒸亦衆也汜音敷劒反布德施惠口雖未言聲疾雷震令雖未出化馳如神心有所懷威動千里下之應上猶景嚮也師古曰言如影之隨形響之應聲嚮讀曰響而大將軍材能非直章邯揚熊也王以陳勝吳廣論之被以為過矣師古曰過誤也且大王之兵衆不能什分吳楚之一天下安寧又萬倍于秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌張晏曰箕子將朝周過殷故都見麥及禾黍心悲乃作歌曰麥秀之漸漸兮黍苖之繩繩兮彼狡童兮不與我好兮狡童謂紂也痛紂之不用王子比干之言也故孟子曰紂貴為天子死曾不如匹夫是紂先自絶久矣非死之日天去之也今臣亦竊悲大王棄千乘之君將賜絶命之書為羣臣先師古曰在羣臣先死宋祁曰浙本注文先死作前死身死於東宮也如淳曰王時所居也被因流涕而起後王復召問被茍如公言不可以徼幸耶師古曰徼要也幸非望之福也被曰必不得已被有愚計王曰柰何被曰當今諸侯無異心百姓無怨氣朔方之郡土地廣美民徙者不足以實其地可為丞相御史請書師古曰謂詐為此文書令徙人也徙郡國豪桀及耐罪以上宋祁曰耐解在高紀以赦令除家産五十萬以上者皆徙其家屬朔方之郡師古曰以赦令除謂遇赦免罪者益發甲卒急其㑹日師古曰促其期日又偽為左右都司空上林中都官詔獄書晉灼曰百官表宗正有左右都司空上林有水司空皆主囚徒官也師古曰中都官京師諸官府宋祁曰越本無偽字今謝本郭本亦無逮諸侯太子及幸臣師古曰追對獄如此則民怨諸侯懼即使辯士隨而説之黨可以徼幸師古曰黨讀曰儻王曰此可也雖然吾以不至若此專發而已師古曰言不須為此詐直自發兵而已後事發覺被詣吏自告與淮南王謀反蹤跡如此天子以伍被雅辭多引漢美欲勿誅張湯進曰被首為王畫反計罪無赦遂誅被江充字次倩趙國邯鄲人也師古曰倩音千見反充本名齊有女弟善鼓琴歌舞嫁之趙太子丹齊得幸於敬肅王為上客久之太子疑齊以己陰私告王與齊忤師古曰言相乖宋祁曰言當作意使吏逐捕齊不得收繫其父兄按驗皆棄市齊遂絶跡亡西入闗更名充詣闕告太子丹與同産姊及至後宮姦亂交通郡國豪猾攻剽為姦師古曰剽劫也音頻妙反宋祁曰至後宫姚本至作王吏不能禁書奏天子怒遣使者詔郡發吏卒圍趙王宮收捕太子丹移繫魏郡詔獄與廷尉雜治法至死趙王彭祖帝異母兄也宋祁曰别本也作弟上書訟太子辠言充逋逃小臣茍為姦譌激怒聖朝師古曰譌古訛字欲取必於萬乘以復私怨師古曰取必謂必取勝也復報也音扶目反後雖亨醢計猶不悔臣願選從趙國勇敢士師古曰選取勇敢之士以自隨從軍擊匈奴極盡死力以贖丹罪上不許竟敗趙太子張晏曰雖遇赦終見廢也初充召見犬臺宮晉灼曰黄圖上林有犬臺宮外有走狗觀也師古曰今書本犬臺有作太壹字者誤也漢無太壹宮也自請願以所常被服冠見上師古曰被音皮義反宋祁曰冠字上當有衣字上許之充衣紗縠襌衣師古曰紗縠紡絲而織之也輕者為紗縐者為縠襌衣制若今之朝服中襌也漢官儀曰武賁中郎將衣紗縠襌衣襌音單字從衣次下亦同曲裾後􅂷交輸張晏曰曲裾者如婦人衣也如淳曰交輸割正幅使一頭狹若燕尾垂之兩旁見於後是禮深衣續袵鉤邊賈逵謂之衣圭蘇林曰交輸如今新婦袍上挂全幅繒角割名曰交輸裁也師古曰如蘇二説皆是也冠襌纚步揺冠飛翮之纓服䖍曰冠襌纚故行歩則揺以鳥羽作纓也蘇林曰析翠鳥羽以作蕤也臣瓚曰飛翮之纓謂如蟬翼者也師古曰服説是也纚織絲為之即今方目紗是也纚音山爾反揺音弋招反充為人魁岸容貌甚壯師古曰魁大也岸者有亷稜如崖岸之形帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上説之充因自請願使匈奴詔問其狀充對曰因變制宜以敵為師事不可豫圖上以充為謁者使匈奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請没入車馬令身待北軍擊匈奴文穎曰令貴戚身待於北軍也奏可充即移書光禄勲中黄門逮名近臣侍中宋祁曰浙本名作召諸當詣北軍者移劾門衞禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬上以充忠直奉法不阿所言中意師古曰中當也充出逄館陶長公主行馳道中師古曰武帝之姑即陳皇后母也充呵問之公主曰有太后詔劉攽曰是時太后已崩言太后詔者素得此詔許其行馳道中也充曰獨公主得行車騎皆不得師古曰從公主之車騎也盡劾没入官如淳曰令乙騎乗車馬行馳道中已論者没入車馬被具後充從上甘泉師古曰甘泉在北山故言上也他皆類此逄太子家使師古曰太子遣人之甘泉請問者也使音山吏反乘車馬行馳道中充以屬吏師古曰屬音之欲反太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者師古曰言素不教敕左右唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師遷為水衡都尉宗族知友多得其力者久之坐法免會陽陵朱安世告丞相公孫賀子太僕敬聲為巫蠱事連及陽石諸邑公主賀父子皆坐誅語在賀傳後上幸甘泉疾病充見上年老恐晏駕後為太子所誅因是為姦奏言上疾祟在巫蠱師古曰祟謂禍咎之徵也音息遂反故其字從出從示示者鬼神所以示人也於是上以充為使者治巫蠱充將胡巫掘地求偶人張晏曰胡者言不與華同故充任使之也捕蠱及夜祠視鬼染汙令有處張晏曰充捕巫蠱及夜祭祠祝詛者令胡巫視鬼詐以酒醊地令有處也師古曰捕夜祠及視鬼之人而充遣巫汙染地上為祠祭之處以誣其人也輙收捕驗治燒鐡鉗灼强服之師古曰以燒鐵或鉗之或灼之鉗鑷也灼炙也鉗音其炎反民轉相誣以巫蠱吏輙劾以大逆亡道坐而死者前後數萬人是時上春秋高疑左右皆為蠱祝詛有與亡莫敢訟其寃者充既知上意因言宮中有蠱氣先治後宮希幸夫人以次及皇后遂掘蠱於太子宮得桐木人師古曰三輔舊事云充使胡巫作而薶之太子懼不能自明收充自臨斬之罵曰趙虜前亂乃國王父子不足邪師古曰乃汝也廼復亂吾父子也太子繇是遂敗師古曰繇讀與由同語在戾園傳師古曰即武五子傳也其中叙戾太子後加諡置園邑故云戾園後武帝知充有詐夷充三族息夫躬字子微河内河陽人也少為博士弟子受春秋通覽記書師古曰傳記及諸家之書容貌壯麗為衆所異哀帝初即位皇后父特進孔鄉侯傅晏與躬同郡相友善躬繇是以為援交㳺日廣師古曰繇讀與由同先是長安孫寵亦以游説顯名免汝南太守師古曰為太守免而歸也與躬相結俱上書召待詔是時哀帝被疾始即位而人有告中山孝王太后祝詛上太后及弟宜鄉侯馮參皆自殺其罪不明是後無鹽危山有石自立開道服䖍曰山開自成道也張晏曰從石立之下徑道自通也躬與寵謀曰上亡繼嗣體久不平闗東諸侯心爭陰謀今無鹽有大石自立聞邪臣託往事以為大山石立而先帝龍興師古曰言邪人有此私議東平王雲以故與其后日夜祠祭祝詛上欲求非望師古曰言求帝位也而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杯杓師古曰杓所以抒挹也字與勺同音上灼反荆軻之變必起於帷幄事勢若此告之必成察國姦誅主讎取封侯之計也宋祁曰察當作發躬寵廼與中郎右師譚張晏曰右師姓譚名也共因中常侍宋宏上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅師古曰謁者后之名也上擢寵為南陽太守譚潁川都尉宏躬皆光禄大夫左曹給事中是時侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為高安侯寵為方陽侯躬為宜陵侯食邑各千戸賜譚爵闗内侯食邑丞相王嘉内疑東平獄事師古曰疑不實也爭不欲侯賢等語在嘉傳嘉固言董賢泰盛寵躬皆傾覆有佞邪材恐必撓亂國家師古曰撓攪也撓音呼高反不可任用嘉以此得罪矣躬既親近數進見言事論議亡所避衆畏其口見之庂目師古曰庂古側字躬上疏歴詆公卿大臣師古曰詆謂毁訾也音丁禮反曰方今丞相王嘉健而蓄縮不可用師古曰蓄縮謂􅈔於事也御史大夫賈延墮弱不任職左將軍公孫禄司𨽻鮑宣皆外有直項之名内實騃不曉政事師古曰騃愚也音五駭反諸曹以下僕遫不足數師古曰僕遫凡短之貌也僕音步木反遫古速字卒有彊弩圍城長㦸指闕師古曰卒讀曰猝陛下誰與備之如使狂夫嘄謼於東崖師古曰東崖謂東海之邊也嘄古呌字謼音火故反匈奴飲馬於渭水邊竟雷動四野風起師古曰竟讀曰境京師雖有武蠭精兵未有能窺左足而先應者也蘓林曰窺音跬師古曰跬半步也言一舉足也音口婢反軍書交馳而輻湊羽檄重迹而押至文頴曰押音狎習之狎師古曰押至言相因而至也羽檄檄之揷羽者也解在高紀小夫愞臣之徒憒眊不知所為師古曰憒心亂也眊目闇也憒音工内反眊音莫報反其有犬馬之決者仰藥而伏刃師古曰仰藥仰首而飲藥雖加夷滅之誅何益禍敗之至哉躬又言秦開鄭國渠以富國彊兵今京師土地肥饒可度地埶水泉廣溉灌之利師古曰度音徒各反天子使躬持節領䕶三輔都水躬立表欲穿長安城引漕注太倉下以省轉輸議不可成廼止董賢貴幸日盛丁傅害其寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝明年躬因是而上奏以為單于當以十一月入塞後以病為解師古曰自解説云病疑有他變烏孫兩昆彌弱卑爰强盛蘇林曰音欬嚏之嚏晉灼曰音載疐其尾之疐師古曰以字言之晉音是音竹二反而匈奴傳服䖍乃音㨗既已失之末俗學者又改疐字為􅛨以應服氏之音尤離真矣宋祁曰正文弱字上當有微字居彊煌之地臣瓚曰是其國所都地名擁十萬之衆東結單于遣子往侍如因素彊之威循烏孫就屠之跡孟康曰烏孫先王也舉兵南伐并烏孫之埶也烏孫并則匈奴盛而西域危矣可令降胡詐為卑爰􅕆使者來上書曰曰所以遣子侍單于者非親信之也實畏之耳唯天子哀師古曰謂閔念之告單于歸臣侍子願助戊已校尉保惡都奴之界因下其章諸將軍令匈奴客聞焉則是所謂上兵伐謀服䖍曰謀者舉兵伐解之也師古曰此説非也言知敵有謀者則以事而應之沮其所為不用兵革所以為貴耳其次伐交者也師古曰知敵有外交連結相援者則閒誤之令其解散也書奏上引見躬召公卿將軍大議左將軍公孫禄以為中國常以威信懷伏夷狄躬欲逆詐造不信之謀不可許且匈奴賴先帝之德保塞稱蕃今單于以疾病不任奉朝賀遣使自陳不失臣子之禮臣禄自保没身不見匈奴為邊竟憂也師古曰竟讀曰境躬掎禄曰師古曰掎從後引之也謂引躡其言也音居綺反臣為國家計幾先謀將然張晏曰幾音冀師古曰先謀將然者謂彼欲有其事則為謀策以壞之豫圖未形師古曰圖謀也未有形兆而謀之為萬世慮而左將軍公孫禄欲以其犬馬齒保目所見臣與禄異議未可同日語也上曰善乃罷羣臣獨與躬議因建言徃年熒惑守心太白高而芒光又角星茀於河鼓師古曰茀讀與孛同其法為有兵亂是後訛言行詔籌經歴郡國天下騷動恐必有非常之變可遣大將軍行邊兵敕武備師古曰敕整也行音下更反斬一郡守以立威震四夷因以厭應變異師古曰厭音一涉反上然之以問丞相丞相嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐况於上天神明而可欺哉天之見異所以敕戒人君師古曰見謂顯示也欲令覺悟反正推誠行善民心説而天意得矣師古曰説讀曰悦辯士見一端或妄以意傅著星歴師古曰傅讀曰附著音治畧反虚造匈奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有辠鄧展曰郡守諸侯相車馳詣闕交臂就死恐懼如此而談説者云動安之危師古曰之徃也言揺動安全之計徃就危殆也劉攽曰云當疊云云二字即上所説也辯口快耳師古曰苟快聽者之耳其實未可從夫議政者苦其讇諛傾險辯慧深刻也師古曰讇古謟字讇諛則主德毁傾險則下怨恨辯慧則破正道深刻則傷恩惠昔秦繆公不從百里奚蹇叔之言師古曰繆讀曰穆以敗其師師古曰謂敗於殽悔過自責疾詿誤之臣思黄髪之言師古曰語在秦誓名埀於後世唯陛下觀覽古戒反覆參考無以先入之語為主師古曰先入謂躬先為此計入於帝耳上不聽遂下詔曰間者災變不息盗賊衆多兵革之徵或頗著見師古曰謂𤣥象未聞將軍惻然深以為意簡練戎士繕脩干戈師古曰繕補也器用盬惡鄧展曰盬不堅牢也師古曰音公戸反孰當督之師古曰督視察也天下雖安忘戰必危將軍與中二千石舉明習兵法有大慮者各一人將軍二人詣公車師古曰堪為將軍者必舉二人劉攽曰將軍二人但謂令將軍舉二人中二千石一人耳顔失之就拜孔鄉侯傅晏為大司馬衞將軍陽安侯丁明又為大司馬票騎將軍是日日有食之董賢因此沮躬晏之䇿後數日收晏衛將軍印綬而丞相御史奏躬辠過上繇是惡躬等師古曰繇讀與由同下詔曰南陽太守方陽侯寵素亡亷聲有酷惡之資毒流百姓左曹光禄大夫宜陵侯躬虚造詐諼之䇿師古曰諼詐辭也音虚遠反欲以詿誤朝廷皆交遊貴戚趨權門為名其免躬寵官遣就國躬歸國未有第宅寄居丘亭張晏曰丘亭野亭名師古曰此説非也丘空也姦人以為侯家富常夜守之師古曰謂欲盜之伺其便躬邑人河内掾賈惠徃過躬教以祝盜方以桑東南指枝為匕師古曰桑東南出之枝畫北斗七星其上躬夜自被髪立中庭向北斗師古曰被音皮義反持匕招指祝盜師古曰或招或指所以求福排禍也人有上書言躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫同祝詛上遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬仰天大謼師古曰謼古呼字音火故反宋祁曰浙本躬字下更有躬字因僵仆吏就問云咽已絶師古曰咽喉嚨音一千反血從鼻耳出食頃死黨友謀議相連下獄百餘人師古曰親黨及朋友躬母聖坐祠竈祝詛上大逆不道聖棄市妻充漢與家屬徙合浦躬同族親屬素所厚者皆免廢錮師古曰終身不得仕哀帝崩有司奏方陽侯寵及右師譚等皆造作姦謀罪及王者骨肉雖蒙赦令不宜處爵位在中土皆免寵等徙合浦郡初躬待詔數危言高論自恐遭害著絶命辭曰𤣥靈泱鬱將安歸兮師古曰泱鬱盛貌泱音烏朗反鷹隼横厲鸞徘徊兮師古曰厲疾飛也鸞神鳥也赤靈之精赤色五采雞形鳴中五音徘徊謂不得其所也矰若浮猋動則機兮師古曰矰弋射矢也猋疾風也言繒弋張設其疾若風動則機發猋音必遥反叢棘􅳞􅳞曷可棲兮師古曰􅳞􅳞衆盛貌音仕山反宋祁曰􅳞當作棧發忠忘身自繞罔兮寃頸折翼庸得往兮應劭曰雖寃頸折翼庸得不徃也張晏曰䧟於讒人之網何用得去也師古曰寃屈也張説是涕泣流兮萑蘭張晏曰萑蘭草名也蔓延於地有所依憑則起躬怨哀帝不用己為大臣以致治也臣瓚曰萑蘭泣涕闌干也師古曰瓚説是萑音完心結愲兮傷肝師古曰結愲亂也孟康曰愲音骨虹蜺曜兮日微張晏曰虹蜺邪陰之氣而有照曜以蔽日月云讒言流行忠良浸微也孽杳冥兮未開如淳曰虹蜺覆日光明謂之孽師古曰孽邪氣也音牛列反痛入天兮鳴謼寃際絶兮誰語張晏曰躬自以被讒枉而與君絶也師古曰鳴謼者以鳥自喻也誰語言無所告語也謼音火故反語音牛助反仰天光兮自列招上帝兮我察張晏曰上帝天也招呼也師古曰列謂陳列其本心秋風為我唫浮雲為我陰師古曰唫古吟字嗟若是兮欲何留師古曰言變故如是何用久留而生撫神龍兮㩜其湏師古曰㩜與擥同謂執持之游曠廻兮反亡期師古曰言一死不可復生宋祁曰姚本廻作迥雄失據兮世我思師古曰雄謂君上也據謂尊位也言上失所據乃思我耳後數年乃死如其文贊曰仲尼惡利口之覆邦家應劭曰事具論語蒯通一説而䘮三雋應劭曰亨酈食其敗田横驕韓信也其得不亨者幸也伍被安於危國身為謀主忠不終而詐讎李奇曰詐為王畫䇿而讎見納也師古曰讎讀曰售謂被初忠於漢而不能終為王畫詐偽之䇿而見納用也宋祁曰注文售姚本作誅夷不亦宜乎書放四罪師古曰謂流共工放驩兠竄三苖殛鯀也事見虞書詩歌青蠅師古曰小雅青蠅之詩也其首章曰營營青蠅止於樊愷悌君子無信讒言蓋蠅之為蟲毁汙白黑以喻佞人變亂善惡春秋以來禍敗多矣昔子翬謀桓而魯隱危應劭曰公子翬謂隱公曰吾將為君殺桓公以我為太宰公曰為其少故今將授之矣翬懼反譖隱公而殺之欒書搆郤而晉厲弑應劭曰變書使楚公子茷語厲公曰鄢陵之戰郤至以為必敗欲奉孫周以代君也公信之而滅三卻欒書因以反弑厲公宋祁曰注文孫周姚本作孫同豎牛奔仲叔孫卒張晏曰牛叔孫穆子之孽子也仲正妻子也牛讒仲叔孫怒而逐之奔齊叔孫病牛餓殺之郈伯毁季昭公逐張晏曰郈昭伯毁季平子於昭公昭公伐平子不勝因出奔齊費忌納女楚建走應劭曰楚平王為太子建娶於秦無忌曰秦女美甚勸王自納之因而構焉云其怨望今將畔令王殺之宰嚭譖胥夫差䘮應劭曰吳將伐齊子胥諫之宰嚭曰伍胥自以先王謀臣心常鞅鞅臨事沮大衆冀國之敗夫差大怒賜之屬鏤之劒其明年越滅吳李園進妹春申斃張晏曰李園春申君之舍人也進其妹於春申君已有身使妹謂春申君曰楚王無子百年之後將立兄弟君用事日久多失禮於王之兄弟兄弟誠立禍將及身今妾有子人莫知若進妾於王後若生男則君之子為王也春申君乃言之王召入之遂生男立為太子後孝烈王薨李園害春申君之寵乃刺殺之上官訴屈懷王執張晏曰屈平忠而有謀為上官子蘭所譖見放逐後秦昭誘懷王會於武闗遂執以歸卒死於秦趙高敗斯二世縊張晏曰趙高譖殺李斯而代其位乃使其壻閻樂攻二世於望夷宮乞為黔首不聽乃縊而死伊戾坎盟宋痤死李奇曰伊戾為太子傅無寵欲敗太子言與楚客盟謀宋詐㰱血加盟書以證之公以故殺痤師古曰痤音在戈反江充造蠱太子殺息夫作姦東平誅皆自小覆大繇疎陷親可不懼哉可不懼哉師古曰覆音芳福反繇與由同前漢書卷四十五前漢書卷四十五考證蒯通傳孟賁之狐疑不如童子之必至童子史記作庸夫又孟賁句上史記有騏驥之跼躅不如駑馬之安歩二句伍被傳非直章邯揚熊也按揚應作楊楊熊秦將見高紀贊欒書搆郤注應劭曰欒書使楚公子茷云云楚公子茷晉語作楚王子發鉤前漢書卷四十五考證
