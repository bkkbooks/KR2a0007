body:
  text: 前漢書卷三十九漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注蕭何曹參傳第九蕭何沛人也以文毋害為沛主吏掾服䖍曰為人解通無嫉害也應劭曰雖為文吏而不刻害也蘇林曰毋害若言無比也一曰害勝也無能勝害之者晋灼曰酷吏傳趙禹為丞相亞夫吏府中皆稱其亷然亞夫不任曰極知禹無害然文深不可以居大府蘇説是也師古曰害傷也無人能傷害之者蘇晋兩説皆得其意服應非也劉奉世曰持法者或以己意私怨陷人謂之害故貴於文毋害毋害者取其為人毋害於行則可以為吏矣文毋害者蓋其時擇吏之二事也亞夫所以稱禹無害亷其一節也故韓信乂云無行不得推擇為吏餘説太汎髙祖為布衣時數以吏事䕶髙祖髙祖為亭長常佑之師古曰佑助也言居家時為何所䕶及為亭長何又擁助也宋祁曰注文也字當作之字髙祖以吏繇咸陽師古曰繇讀曰傜傜役也吏皆送奉錢三何獨以五師古曰出錢以資行他人皆三百何獨五百奉音扶用反秦御史監郡者與從事辨之張晏曰何與共事備辨明何素有方畧也蘇林曰辟何與從事也秦時無刺史以御史監郡師古曰二説皆同劉攽曰此句先題目下事言秦制御史監郡者凡有事皆與從事共辨之何廼給泗水卒史師古曰泗水郡沛所屬也何為郡卒史事第一師古曰課最上秦御史欲入言徵何何固請得毋行孟康曰當還入相秦事故召何也師古曰此説非也御史以何明辨欲因入奏事之次言於朝廷徵何用之何心不願以情固請而御史止故得不行也及髙祖起為沛公何嘗為丞督事師古曰督謂監視之也何為沛丞專督衆事沛公至咸陽諸將皆争走金帛財物之府分之師古曰走謂趣向之音奏何獨先入收秦丞相御史律令圖書臧之沛公具知天下阸塞户口多少彊弱處民所疾苦者以何得秦圖書也初諸侯相與約先入關破秦者王其地沛公既先定秦項羽後至欲攻沛公沛公謝之得解羽遂屠燒咸陽與范增謀曰巴蜀道險秦之遷民皆居蜀廼曰蜀漢亦關中地也故立沛公為漢王而三分關中地王秦降將以距漢王宋祁曰浙本距字下有塞字漢王怒欲謀攻項羽周勃灌嬰樊噲皆勸之何諌之曰宋祁曰謝郭去之字浙本無之字雖王漢中之惡不猶愈於死乎漢王曰何為乃死也宋祁曰乃字疑作廼何曰今衆弗如百戰百敗不死何為周書曰天予不取反受其咎師古曰周書者本與尚書同類蓋孔子所刪百篇之外劉向所奏有七十一篇語曰天漢其稱甚美孟康曰語古語也言地之有漢若天之有河漢名號休美臣瓚曰流俗語云天漢其言常以漢配天此美名也師古曰瓚説是也天漢河漢也宋祁曰注文河漢當作天河夫能詘於一人之下而信於萬乗之上者湯武是也師古曰信讀曰伸古通用字臣願大王王漢中飬其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相何進韓信漢王以為大將軍説漢令引兵東定三秦宋祁曰浙本説漢字下有王字語在信傳何以丞相留收巴蜀填撫諭告師古曰填音竹刃反使給軍食漢二年漢王與諸侯擊楚何守關中侍太子治櫟陽為令約束立宗廟社稷宮室縣邑輒奏上可許以從事師古曰可其所奏許其所請依以行事即不及奏輒以便宜施行上來以聞應劭曰上來還乃以所為聞也計户轉漕給軍漢王數失軍遯去何常興關中卒輒補缺上以此剸屬任何關中事師古曰剸讀與專同又音章阮反此即言専聲之急上者也今俗語猶然他皆類此屬音之欲反漢三年與項羽相距京索閒師古曰索音山客反上數使使勞苦丞相師古曰勞音來到反以下亦同鮑生謂何曰師古曰鮑生當時有識之士姓鮑而為諸生也今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大説師古曰説讀曰悦漢五年已殺項羽即皇帝位論功行封羣臣爭功歲餘不決上以何功最盛先封為酇侯文頴曰音贊師古曰先封何者謂諸功臣舊有爵者何最在前封也酇屬南陽觧在髙紀宋祁曰索隐鄒氏云鄼屬沛郡音嵯屬南陽音賛又臣瓉按茂陵書蕭何國在南陽則字當音賛今多呼為嵯也食邑八千户功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城畧地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也師古曰顧猶反也上曰諸君知獵乎曰知之知獵狗乎曰知之宋祁曰謝郭本去知獵狗乎曰知之七字上曰夫獵追殺獸者狗也而發縱指示獸處者人也師古曰發縱謂觧紲而放之也指示者以手指示之今俗言放狗縱音子用反而讀者乃為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也今諸君徒能走得獸耳功狗也至於蕭何發縱指示功人也且諸君獨以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也羣臣後皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一上已橈功臣多封何應劭曰橈屈也師古曰音女教反至位次未有以復難之然心欲何第一關内侯鄂秋時為謁者宋祁曰浙本作鄂千秋進曰羣臣議皆誤夫曹參雖有野戰畧地之功此特一時之事夫上與楚相距五歲失軍亡衆跳身遯者數矣師古曰跳身謂輕身走出也然蕭何常從關中遣軍補其處非上所詔令召而數萬衆會上乏絶者數矣夫漢與楚相守滎陽數年軍無見糧師古曰無見在之糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此萬世功也今雖無曹參等百數何缺於漢師古曰數音所具反漢得之不必待以全柰何欲以一旦之功加萬世之功哉宋祁曰浙本加字上有而字蕭何當第一曹參次之上曰善於是乃令何第一賜帶劔履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖髙待鄂君廼得明於是因鄂秋故所食關内侯邑二千户封為安平侯宋祁曰浙本作鄂千秋是日悉封何父母兄弟十餘人皆食邑乃益封何二千户以嘗繇咸陽時何送我獨贏錢二也師古曰贏餘也二謂二百也衆人送皆三百何獨五百故云贏二也陳豨反上自將至邯鄲而韓信謀反關中呂后用何計誅信語在信傳上已聞誅信使使拜丞相為相國益封五千户令卒五百人一都尉為相國衞諸君皆賀召平獨弔師古曰召讀曰邵召平者故秦東陵侯秦破為布衣貧種𤓰長安城東𤓰美故世謂東陵𤓰從召平始也平謂何曰禍自此始矣上暴露於外而君守於内非被矢石之難而益君封置衞者以今者淮隂新反於中有疑君心夫置衞衞君非以寵君也師古曰恐其為變故守衞之宋祁曰浙本句末有也字願君讓封勿受悉以家私財佐軍何從其計上説師古曰説讀曰悦其秋黥布反上自將擊之宋祁云舊本作上自將軍浙本無軍字數使使問相國何為師古曰問其居守何所營為曰為上在軍拊循勉百姓悉所有佐軍如陳豨時師古曰悉盡也盡所有糧食資用出以佐軍也客又説何曰君滅族不乆矣夫君位為相國功第一不可復加然君初入關本得百姓心十餘年矣皆附君尚復孳孳得民和師古曰孳字與孜同孜孜言不怠也宋祁曰注文怠一作逮上所謂數問君宋祁曰此疑有者字畏君傾動關中今君胡不多買田地賤貰貣以自汙上心必安師古曰貰賖也貣音土得反於是何從其計上乃大説上罷布軍歸民道􅃒行師古曰在道上􅃒天子行上書言相國彊賤買民田宅數千人上至何謁上笑曰今相國廼利民民所上書皆以與何曰君自謝民後何為民請曰長安地陿上林中多空地棄願令民得入田毋收槀為獸食師古曰槀禾稈也言恣人田之不收其槀税也槀音工老反稈音工旱反劉攽曰言毋收藁草為獸食而已上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衞尉侍如淳曰百官公卿表衞尉王氏無名字師古曰史失之也侍謂侍天子也前問曰相國胡大罪陛下繫之暴也師古曰前問謂進而請也胡何也上曰吾聞李斯相秦皇帝有善歸主有惡自予今相國多受賈豎金為請吾苑以自媚於民師古曰媚愛也取愛於民故繫治之王衞尉曰夫職事茍有便於民而請之眞宰相事也陛下柰何乃疑相國受賈民錢乎宋祁曰浙本作民人且陛下距楚數歲陳豨黥布反時陛下自將往當是時相國守關中關中揺足則關西非陛下有也相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也上不懌師古曰懌悦也感衞尉之言故慚愧而不悦也是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣師古曰令出外自休息相國為民請苑吾不許宋祁曰越本作相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過髙祖崩何事惠帝何病上親自臨視何疾宋祁曰浙本無親字因問曰君即百歲後誰可代君對曰知臣莫若主帝曰曹參何如何頓首曰帝得之矣何死不恨矣何買田宅必居窮辟處師古曰辟讀曰僻僻隐也為家不治垣屋師古曰垣墻也曰令後世賢師吾儉不賢毋為埶家所奪孝惠二年何薨諡曰文終侯子禄嗣薨無子髙后廼封何夫人同為鄼侯小子延為筑陽侯師古曰鄼及筑陽皆南陽縣也今其地並屬襄州筑音逐孝文元年罷同更封延為鄼侯薨子遺嗣薨無子文帝復以遺弟則嗣有罪免景帝二年制詔御史故相國蕭何髙皇帝大功臣所與為天下也師古曰為治也一曰共造其功業今其祀絶朕甚憐之其以武陽縣户二千封何孫嘉為列侯嘉則弟也薨子勝嗣後有罪免武帝元狩中復下詔御史以鄼户二千四百封何曾孫慶為鄼侯布告天下令明知朕報蕭相國德也慶則子也薨子壽成嗣坐為太常犧牲痩免宣帝時詔丞相御史求問蕭相國後在者得𤣥孫建世等十二人復下詔以鄼户二千封建世為鄼侯傳子至孫獲坐使奴殺人減死論成帝時復封何𤣥孫之子南䜌長喜為鄼侯蘇林曰䜌音人足攣躃之攣鉅鹿縣名也師古曰喜為此縣之長傳子至曾孫王莽敗乃絶曹參沛人也秦時為獄掾而蕭何為主吏居縣為豪吏矣師古曰言參及蕭何並為吏之豪長也髙祖為沛公也參以中涓從如淳曰中涓如中謁者也師古曰涓潔也言其在内主知潔清􅎈埽之事盖親近左右也擊胡陵方與師古曰音房豫攻秦監公軍大破之孟康曰監御史監郡者公名也晋灼曰案髙紀名平也秦一郡置守尉監三人師古曰公者時人尊稱之耳晋説是也東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置文頴曰善置置名也晋灼曰祁音坻師古曰狐父祁二縣名也祁音鉅夷反又音十夷反父音甫置若今之驛也又攻下邑以西至虞擊秦將章邯車騎攻轅戚及亢父師古曰亢父音抗甫先登遷為五大夫北救東阿擊章邯軍䧟陳追至濮陽攻定陶取臨濟南救雍丘擊李由軍破之殺李由虜秦候一人章邯破殺項梁也沛公與項羽引兵而東楚懐王以沛公為碭郡長將碭郡兵於是乃封參執帛鄭氏曰楚爵也張晏曰孤卿也號曰建成君遷為戚公屬碭郡師古曰為戚縣之令其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻杠里大破之追北西至開封擊趙賁軍破之師古曰賁音奔圍趙賁開封城中西擊秦將楊熊軍於曲遇師古曰曲音丘羽反遇音顒破之虜秦司馬及御史各一人遷為執珪張晏曰侯伯執珪以朝位比之如淳曰呂氏春秋得伍員者位執珪古爵名也從西攻陽武下轘轅緱氏絶河津擊趙賁軍尸北破之孟康曰尸郷之北從南攻犨與南陽守齮戰陽城郭東應劭曰今堵陽䧟陳取宛虜齮定南陽郡師古曰髙紀言南陽守齮降封為殷侯而此傳言虜齮紀傳不同疑傳誤從西攻武關嶢關取之師古曰嶢音堯前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定三秦攻下辨故道鄧展曰武都二縣也雍斄蘇林曰右扶風二縣也斄音胎擊章平軍於好畤南破之圍好畤取壤郷文頴曰壤地名也擊三秦軍壤東及髙櫟破之師古曰櫟音歴復圍章平平出好畤走因擊趙賁内史保軍破之東取咸陽更名曰新城參將兵守景陵孟康曰縣名也二十三日三秦使章平等攻參參出擊大破之賜食邑於寜秦蘇林曰今華隂以將軍引兵圍章邯廢丘以中尉從漢王出臨晉關至河内下修武度圍津師古曰在東郡東擊龍且項佗定陶破之師古曰且音子餘反佗音徒河反東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍丘王武反於外黄程處反於燕服䖍曰皆漢將師古曰燕東郡之縣故南燕國音一千反往擊盡破之柱天侯反於衍氏進破取衍氏擊羽嬰於昆陽追至葉師古曰葉南陽縣也音式涉反還攻武彊師古曰武彊城在陽武因至滎陽參自漢中為將軍中尉從擊諸侯及項王敗還至滎陽師古曰敗謂戰彭城而敗漢二年拜為假左丞相入屯兵關中月餘魏王豹反以假丞相宋祁曰浙本假字下有左字别與韓信東攻魏將孫遫東張蘇林曰東張屬河東師古曰遫古速字宋祁曰浙本正文遫字下有軍字大破之因攻安邑得魏將王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地凡五十二縣賜食邑平陽因從韓信擊趙相國夏説軍於鄔東蘇林曰鄔太原縣也師古曰説讀曰悦鄔音一戸反又音乙據反大破之斬夏説韓信與故常山王張耳引兵下井陘擊成安君陳餘而令參還圍趙别將戚公於鄔城中戚公出走追斬之廼引兵詣漢王在所韓信已破趙為相國東擊齊參以左丞相屬焉攻破齊歴下軍遂取臨淄還定濟北郡收著漯隂平原鬲盧師古曰五縣名也時未有濟北郡史追書之耳著音竹庻反又音直庻反漯音它合反鬲與隔同已而從韓信擊龍且軍於上假密文頴曰或以為髙密大破之斬龍且虜亞將周蘭師古曰亞將次將也定齊郡凡得七十縣得故齊王田廣相田光其守相許章及故將軍田既師古曰守相為相居守者韓信立為齊王引兵東詣陳與漢王共破項羽而參留平齊未服者漢王即皇帝位韓信徙為楚王參歸相印焉髙祖以長子肥為齊王而以參為相國宋祁曰相國字上當有齊字髙祖六年與諸侯剖符賜參爵列侯食邑平陽萬六百三十户世世勿絶參以齊相國擊陳豨將張春破之黥布反參從悼惠王將車騎十二萬與髙祖會擊黥布軍大破之南至蘄還定竹邑相蕭留師古曰四縣名參功凡下二國縣百二十二得王二人相三人將軍六人大莫嚻郡守司馬候御史各一人如淳曰嚻音敖張晏曰莫敖楚卿號也時近六國故有令尹莫敖之官孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數師古曰數音所具反言人人殊參未知所定聞膠西有蓋公師古曰蓋音古盍反善治黄老言張晏曰黄帝老子之書使人厚幣請之既見蓋公蓋公為言治道貴清静而民自定推此類具言之參於是避正堂舍蓋公焉師古曰舍止也其治要用黄老術故相齊九年齊國安集大稱賢相蕭何薨參聞之告舍人趣治行師古曰舍人猶家人也一説私屬官主家事者也趣讀曰促謂速也治行謂脩治行装也宋祁曰浙木注文作猶言家人也吾且入相居無何使者果召參參去屬其後相師古曰屬音之欲反曰以齊獄市為寄愼勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之孟康曰夫獄市者兼受善惡若窮極姦人姦人無所容竄乆且為亂秦人極刑而天下畔孝武峻法而獄繁此其効也師古曰老子云我無為民自化我好静民自正參欲以道化為本不欲擾其末也宋祁曰浙本注文無師古曰三字始參微時與蕭何善及為宰相有隙師古曰參自以戰闘功多而封賞每在何後故怨何也劉奉世曰此特師古意料之爾至何且死所推賢唯參參代何為相國舉事無所變更壹遵何之約束師古曰舉皆也言凡事皆無變改擇郡國吏長大孟康曰取年長大者訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輙斥去之師古曰斥郤也日夜飲酒卿大夫以下吏及賔客見參不事事如淳曰不事丞相之事來者皆欲有言至者參輙飲以醇酒師古曰醇酒不澆謂厚酒也度之欲有言復飲酒醉而後去師古曰度音大各反飲音於禁反終莫得開説如淳曰開謂有所啓白以為常相舍後園近吏舍吏舍日飲歌呼師古曰呼音火故反其下並同從吏患之無如何師古曰從吏吏之常從相者也從音材用反廼請參遊後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲師古曰張設坐席而飲也坐音才卧反大歌呼與相和參見人之有細過掩匿覆蓋之府中無事參子窋為中大夫師古曰窋音張律反惠帝怪相國不治事以為豈少朕與師古曰言豈以我為年少故也與讀曰歟廼謂窋曰女歸試私從容問乃父師古曰乃汝也曰髙帝新棄羣臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告女也窋既洗沐歸時間自從其所諫參師古曰間謂空隙也自從其所猶言自出其意也參怒而笞之二百曰趣入侍師古曰趣讀曰促天下事非乃所當言也至朝時帝讓參師古曰讓責也曰與窋胡治乎師古曰胡何也言共窋為何治也治音丈吏反乃者我使諌君也師古曰乃者猶言曩者參免冠謝曰陛下自察聖武孰與髙皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢宋祁曰浙本觀參字下有能字上曰君似不及也參曰陛下言之是也且髙皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣師古曰且令出休息參為相國三年薨諡曰懿侯百姓歌之曰蕭何為法講若畫一文穎曰講或作較師古曰講和也畫一言整齊也曹參代之守而勿失載其清靖民以寜壹師古曰載猶乗也窋嗣侯髙后時至御史大夫傳國至曾孫襄武帝時為將軍擊匈奴薨子宗嗣有罪完為城旦至哀帝時乃封參𤣥孫之孫本始為平陽侯二千户王莽時薨子宏嗣建武中先降河北封平陽侯至今八侯劉攽曰八侯字疑衍贊曰蕭何曹參皆起秦刀筆吏師古曰刀所以削書也古者用簡牒故吏皆以刀筆自隨也當時録録未有竒節師古曰録録猶鹿鹿言在凡庻之中也漢興依日月之末光師古曰易文言云聖人作而萬物覩又曰見龍在田天下文明賛言何參值漢初興故以日月為喻耳何以信謹守管籥參與韓信俱征伐師古曰髙祖出征何每居守故言守管籥天下既定因民之疾秦法順流與之更始二人同心遂安海内淮隂黥布等已滅唯何參擅功名位冠羣臣聲施後世師古曰冠謂居其首為一代宗臣師古曰言為後世之所尊仰故曰宗臣也慶流苖裔盛矣哉前漢書卷三十九前漢書卷三十九考證蕭何傳常佑之史記作常左右之事第一臣召南按事字應屬上句言何給泗水郡卒史事也第一即是課最上不必有事字舊讀恐非漢王怒謀欲攻項羽云云臣召南按漢王就國漢中一叚此史記所缺而班氏補之何為漢功臣之首宜也先封為酇侯注師古曰謂諸功臣舊有爵者何最在前封也臣召南按功臣表六年十二月甲申封曹參靳歙夏侯嬰王吸傅寛召歐薛歐陳濞陳嬰陳平凡十侯至正月丙午封張良劉纒蕭何周勃樊噲酈商灌嬰周昌武虎董渫孔聚陳賀陳豨共十三侯其餘功臣未封者尚多即上文所云羣臣爭功歲餘不决者也注舊有爵者疑應作未封爵者而發縱指示獸處者人也注洪氏隸釋曰蹤縱据漢人數碑固多借用顔注殆未然也列侯畢已受封奏位次臣召南按十八侯位次定於此時是日悉封何父母兄弟十餘人父母史記作父子上已聞誅信使使拜丞相為相國臣召南按丞相紫綬相國則緑綬矣漢初相國惟何及曹參二人自參薨後即仍稱丞相又按何為相國在淮隂既誅之後此傳甚明而公卿表乃列於九年誤也若在九年則豨尚未叛信尚未誅矣當以此傳為正在十一年曹參傳攻秦監公軍注晋灼曰按髙紀名平也臣召南按監泗水郡御史名平不特髙紀可証夏侯嬰傳從攻胡陵嬰與蕭何降泗水監平平以胡陵降即此監公也北擊司馬欣軍碭東臣召南按司馬欣史記作司馬尼是也髙紀作司馬􅊂樊噲傳與司馬􅊂戰碭東即此人尼􅊂二字相似未知孰正但必非長史司馬欣耳守景陵二十三日史記作二十日告舍人趣治行注師古曰舍人猶家人也胡三省曰据戰國䇿蘇秦使舍人資送張儀入秦李斯為吕不韋舍人謂為私屬官可也以為主家事則拘矣講若畫一講史記作顜徐廣曰顜音古項反一音較至今八侯劉攽曰八侯字疑衍臣召南按參傳子窋窋子竒竒子時時子襄襄子宗參元孫本始本始子宏宏子曠即功臣表所謂今見者也八侯似非衍文前漢書卷三十九考證
