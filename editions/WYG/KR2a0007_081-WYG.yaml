body:
  text: 前漢書卷八十一漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注匡張孔馬傳第五十一匡衡字稚圭東海承人也師古曰承音證宋祁曰集解音證集解蓋臣瓚書也父世農夫至衡好學家貧庸作以供資用師古曰庸作言賣功庸為人作役而受顧也尤精力過絶人諸儒為之語曰無說詩匡鼎來服䖍曰鼎猶言當也若言匡且來也應劭曰鼎方也張晏曰匡衡少時字鼎長乃易字稚圭世所傳衡與貢禹書上言衡敬報下言匡鼎白知是字也師古曰服應二説是也賈誼曰天子春秋鼎盛其義亦同而張氏之説盖穿鑿矣假有其書乃是後人見此傳云匡鼎來不曉其意妄作衡書云鼎白耳字以表徳豈人所自稱乎今有西京雜記者其書淺俗出於里巷多有妄說乃云匡衡小名鼎蓋絶知者之聼宋祁曰祝季張云匡鼎來來音離協上韻僕檢左傳宣公二年棄申復來亦音離注文若言匡且來也考無若字匡語詩解人頤如淳曰使人笑不能止也宋祁曰南本浙本以語為說衡射䇿甲科以不應令除為太常掌故師古曰投射得甲科之策而所對文指不應令條也儒林傳説嵗課甲科為郎中乙科為太子舍人景科補文學掌故今不應令是不中甲科之令所以止為掌故宋祁曰注文浙本無說字調補平原文學師古曰調選也音徒釣反學者多上書薦衡經明當世少雙今為文學就官京師後進皆欲從衡平原衡不宜在逺方事下太子太傅蕭望之少府梁邱賀問衡對詩諸大義其對深羙宋祁曰别本作矣當作羙望之奏衡經學精習說有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之㑹宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦髙充位而已師古曰言凡事不任也與望之有隙長安令楊興說髙曰將軍以親戚輔政貴重於天下無二然衆庻論議令問休譽不専在將軍者何也師古曰令善問名休美也宋祁曰注文善字名字下並當有也字彼誠有所聞也師古曰以其不能進賢也以將軍之莫府海内莫不卬望師古曰卬讀曰仰而所舉不過私門賔客乳母子弟人情忽不自知師古曰言髙輕忽此事不自知其非然一夫竊議語流天下夫富貴在身而列士不譽是有狐白之裘而反衣之也師古曰狐白謂狐掖下之皮其毛純白集之為裘輕柔難得故貴也反衣之者以其毛在内也今人則以背毛為裘而棄其白蓋取厚而温也衣音於既反宋祁曰注文故貴字下疑有之字於既字上疑有音字古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在逺方師古曰階謂升次也隨牒謂隨選補之恒牒不被超擢者將軍誠召置莫府學士歙然歸仁師古曰誠謂實行之也歙音翕與參事議觀其所有貢之朝廷必為國器師古曰所有謂材藝所長以此顯示衆庻名流於世高然其言辟衡為議曹史薦衡於上上以為郎中遷博士給事中是時有日蝕地震之變上問以政治得失衡上疏曰臣聞五帝不同禮宋祁曰禮監本作樂字浙本同三王各異教民俗殊務所遇之時異也陛下躬聖徳開太平之路閔愚吏民觸法抵禁師古曰抵觸也宋祁曰注文抵字下有亦字比年大赦師古曰比頻也使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以徳義示之以好惡師古曰保飬也陳施也孝經曰陳之以徳義而民莫遺其親示之以好惡而民知禁故衡引以為言觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉耻之節薄滛辟之意縱師古曰辟讀曰僻綱紀失序疏者踰内師古曰疏者妻妾之家内者同姓骨肉也踰謂過越也親戚之恩薄婚姻之黨隆苟合徼幸以身設利不改其原師古曰設施也原本也雖嵗赦之刑猶難使錯而不用也師古曰嵗赦謂毎嵗一赦也錯置也音千故反臣愚以為宜壹曠然大變其俗孔子曰能以禮讓為國乎何有師古曰論語載孔子之言謂能以禮讓治國則其事甚易朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭師古曰循順也好仁樂施則下不暴上義高節則民興行寛柔和恵則衆相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自専之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盗竊之民此其本也師古曰言下之所行皆取化於上也今俗吏之治皆不本禮讓而上克暴宋祁曰克當作刻或忮害好䧟人於罪師古曰忮堅也謂酷害之心堅也忮音之䜴反宋祁曰忮字說見酷吏甯成傳韋昭曰忮音洎如淳曰詩云不忮不求屐弊也蕭該案字書忮恨也之豉反貪財而慕埶故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也師古曰非其天性自惡由上失於教化耳臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色師古曰篤厚也謂樂得淑女以配君子憂在進賢不滛其色之類也鄭伯好勇而國人暴虎師古曰詩鄭風太叔于田之篇曰禮裼暴虎獻于公所將叔無狃戒其傷汝襢裼肉袒也暴虎空手以搏之也公鄭莊公也將請也叔莊公之弟太叔也狃􅏸也汝亦太叔也言以莊公好勇之故太叔肉袒空手搏虎取而獻之國人愛叔故請之曰勿􅏸為之恐傷汝也襢音袒裼音錫字並從衣將音千羊反狃音女九反宋祁曰注文中三虎字浙本並作鼔字秦穆貴信而士多從死應劭曰秦穆公與羣臣飲酒酒酣公曰生共此樂死共此哀於是奄息仲行鍼虎許諾及公薨皆從死黄鳥詩所為作也宋祁曰穆字浙本作繆字陳夫人好巫而民滛祀張晏曰胡公夫人武王之女大姬無子好祭鬼神鼓舞而祀故其詩云坎其擊鼓宛丘之下無冬無夏值其鷺羽晉侯好儉而民畜聚師古曰唐風山有樞之詩序云刺晉昭公也不能修道以正其國有財不能用有鐘鼔不能以自樂其詩曰子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣它人是愉故其俗皆吝嗇而積財也畜讀曰蓄太王躬仁邠國貴恕師古曰太王周文王之祖即古公亶父也國於邠修徳行義戎狄攻之欲得地與之人人皆怒欲戰古公曰以我故戰殺人父子而居之予不忍也乃與其私屬度漆沮踰梁山止於岐下邠人舉國扶老攜弱盡復歸古公於岐下及它旁國聞古公仁亦多歸之邠即今􅃎州是其地也言化太王之仁故其俗皆貴誠恕宋祁曰注文父子而居之浙本作父子而君之由此觀之治天下者審所上而已師古曰上謂崇尚也今之偽薄忮害不讓極矣臣聞教化之流非家至而人說之也師古曰言非家家皆到人人勸說也賢者在位能者在職宋祁曰下在字越本作布字别本同朝廷崇禮百僚敬讓道徳之行由内及外自近者始然後民知所法遷善日進而不自知是以百姓安隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寧以保我後生師古曰商頌殷武之詩也商邑京師也極中也言商邑之禮俗翼翼然可則效乃四方之中正也王則夀考且安以此全守我子孫也宋祁曰我一作爾此成湯所以建至治保子孫化異俗而懐鬼方也應劭曰鬼方逺方也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所法則或見侈靡而放效之師古曰放依也音甫往反此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪李竒曰祲氣也言天人精氣相動也師古曰祲謂隂陽氣相浸漸以成災祥者也音子鴆反宋祁曰字林云祲精氣成祥也音字鴆反善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者晻鄧展曰静者動謂地震也明者晻謂日蝕也師古曰晻與暗同蕭該案字林曰晻不明也應劭曰晻音闇水旱之災隨類而至今關東連年飢饉百姓乏困或至相食此皆生於賦斂多民所共者大師古曰共讀曰供而吏安集之宋祁曰江南本無之字浙本有不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宫衞罷珠崖宋祁曰此下當有郡字偃武行文將欲度唐虞之隆絶殷周之衰也師古曰度過也絶謂除其惡政也諸見罷珠崖詔書者莫不欣欣人自以將見太平也宜遂減宫室之度省靡麗之飾考制度修外内近忠正逺巧佞放鄭衞進雅頌舉異材開直言任温良之人退刻薄之吏顯絜白之士昭無欲之路師古曰昭亦明也覽六蓺之意察上世之務明自然之道博和睦之化以崇至仁匡失俗易民視師古曰匡正也易變也宋祁曰視字下疑有聼字令海内昭然咸見本朝之所貴道徳𢎞於京師淑問揚乎疆外帥古曰淑善也問名也然後大化可成禮譲可興也上說其言師古曰說讀曰悅遷衡為光禄大夫太子少傅時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子師古曰寵踰也衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之徳而裦大其功昔者成王之嗣位思述文武之道以飬其心休烈盛羙皆歸之二后而不敢専其名師古曰休亦美也烈業也后君也二君文王武王也是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止師古曰周頌閔予小子之詩言成王常念文王武王之徳奉而行之故鬼神上下臨其朝廷宋祁曰注文詩字下疑有也字言成王常思祖考之業而鬼神祐助其治也陛下聖徳天覆子愛海内然隂陽未和姦邪未禁者殆論議者未丕揚先帝之盛功師古曰丕大也丕字或作本言修其本業而顯揚也爭言制度不可用也務變更之師古曰更改也宋祁曰也字當刪所更或不可行而復復之師古曰下復音扶目反是以羣下更相是非師古曰更音工衡反吏民無所信臣竊恨國家釋樂成之業而虚為此紛紛也師古曰釋廢也樂成謂已成之業人情所樂也願陛下詳覽統業之事留神於遵制揚功以定羣下之心大雅曰無念爾祖聿修厥徳師古曰大雅文王之詩也無念念也聿述也孔子著之孝經首章蓋至徳之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性宋祁曰江南本二句中並無物字浙本有可以贊天地之化師古曰贊助也治性之道必審已之所有餘而彊其所不足師古曰彊勉也音其兩反蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽師古曰雍讀曰壅勇猛剛彊者戒於大暴仁愛温良者戒於無斷湛靜安舒者戒於後時師古曰湛讀曰沈廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進師古曰比音頻寐反唯陛下戒所以崇聖徳臣又聞室家之道修則天下之理得故詩始國風師古曰關雎美后妃之徳而為國風之首禮本冠婚師古曰禮記冠義曰冠者禮之始也婚義曰婚者禮之本也始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家道之衰莫不始乎梱内師古曰梱與閫同謂門橛也音苦本反故聖王必慎妃后之際别適長之位師古曰適讀曰嫡其下竝同禮之於内也卑不隃尊親不先故師古曰隃與踰同所以統人情而理隂氣也其尊適而卑庻也適子冠乎阼禮之用醴師古曰阼主階也醴甘酒也貴於衆酒衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜游燕所親物得其序師古曰言凡物大小髙卑皆有次序得其序則海内自修百姓從化如當親者疏當尊者卑師古曰如若也則巧佞之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義陛下聖徳純備莫不修正則天下無為而治詩云于以四方克定厥家師古曰周頌桓之詩也言欲治四方者先當能定其家從内以及外傳曰正家而天下定矣師古曰易家人卦之彖辭衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對師古曰傅讀曰附附依也言多法義上以為任公卿師古曰任堪也由是為光禄勲御史大夫建昭三年代韋𤣥成為丞相封樂安侯食邑六百户元帝崩成帝即位衡上疏戒妃匹勸經學威儀之則曰陛下秉至孝哀傷思慕不絶於心未有游虞弋射之宴師古曰虞與娱同誠隆於慎終追逺無窮已也師古曰慎終慎孝道之終也追逺不忘本也論語稱孔子慎終追逺則民徳歸厚矣故衡引之竊願陛下雖聖性得之宋祁曰聖字可刪猶復加聖心焉師古曰言天性已自然矣又當加意也詩云焭焭在疚師古曰周頌閔予小子之詩焭焭憂貌疚病也言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也師古曰就成也臣又聞之師曰匹配之際宋祁曰匹配當作妃匹生民之始萬福之原婚姻之禮正然後品物遂而天命全師古曰遂成也孔子論詩以關雎為始言太上者民之父母師古曰太上居尊上之位者后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜師古曰侔等也故詩曰窈窕淑女君子好仇師古曰周南闗雎之詩也窈窕幽閒也仇匹也言能致其貞淑不貳其操情欲之感無介乎容儀服䖍曰不見色於容儀也師古曰介繫也言不以情欲繫心而著於容儀者宋祁曰無當作毋宴私之意不形乎動靜師古曰形見也夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世已來宋祁曰已當作以三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有徳戒聲色近嚴敬逺技能師古曰無徳之人雖有技能則斥逺之竊見聖徳純茂専精詩書好樂無厭師古曰樂音五教反臣衡材駑宋祁曰蕭該作材伮伮亦駑也無以輔相善義宣揚徳音師古曰相助也臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正師古曰分音扶問反使不悖於其本性者也師古曰悖乖也音布内反故審六蓺之指則天人之理可得而和草木昆蟲可得而育此永永不易之道也師古曰易變也及論語孝經聖人言行之要宜究其意師古曰究盡也臣又聞聖王之自為動静周旋奉天承親臨朝享臣物有節文以章人倫師古曰物事也事事皆有節文蓋欽翼祗栗事天之容也温恭敬遜承親之禮也宋祁曰浙本禮作體正躬嚴恪臨衆之儀也師古曰嚴讀曰儼嘉恵和說饗下之顏也師古曰說讀曰悦饗宴饗也舉錯動作物遵其儀故形為仁義動為法則孔子曰徳義可尊容止可觀進退可度以臨其民是以其民畏而愛之則而象之師古曰孝經載孔子之言也則法也象似也大雅云敬慎威儀惟民之則師古曰抑之詩諸侯正月朝覲天子天子惟道徳昭穆穆以視之師古曰昭明也穆穆天子之容也視讀曰示又觀以禮樂饗醴廼歸師古曰觀亦視也饗醴以醴酒饗也故萬國莫不獲賜祉福䝉化而成俗今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動靜之節使羣下得望盛徳休光師古曰休羙也以立基楨天下幸甚上敬納其言頃之衡復奏正南北郊罷諸滛祀語在郊祀志初元帝時中書令石顯用事自前相韋𤣥成及衡皆畏顯不敢失其意至成帝初即位衡廼與御史大夫甄譚共奏顯劉奉世曰甄當作張追條其舊惡并及黨與於是司𨽻校尉王尊劾奏衡譚居大臣位知顯等専權埶作威福為海内患害不以時白奏行罰而阿䛕曲從附下罔上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒師古曰著明也罪至不道有詔勿劾衡慙懼上疏謝罪因稱病乞骸骨上丞相樂安侯印綬上報曰君以道徳修明位在三公先帝委政遂及朕躬君遵修法度勤勞公家朕嘉與君同心合意庻幾有成今司𨽻校尉尊妄詆欺加非於君師古曰詆毁也音丁禮反朕甚閔焉方下有司問狀師古曰問司𨽻君何疑而上書歸侯乞骸骨是章朕之未燭也師古曰燭照也傳不云乎禮義不愆何恤人之言師古曰愆過也恤憂也君其察焉専精神近醫藥强食自愛因賜上尊酒養牛師古曰上尊解在薛廣徳傳衡起視事上以新即位襃優大臣然羣下多是王尊者衡嘿嘿不自安毎有水旱風雨不時連乞骸骨讓位上輙以詔書慰撫不許久之衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟且謀簒昌師古曰逆取曰簒宋祁曰注文逆監本作奪事發覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡専地盗土衡竟坐免初衡封僮之樂安鄉文穎曰屬臨淮鄉鄉本田提封三千一百頃師古曰提封舉其封界内之總數南以閩佰為界師古曰佰者田之東西界也閩者佰之名也佰音莫客反宋祁曰佰當作陌注及下文並同初元元年郡圖誤以閩佰為平陵佰積十餘嵗衡封蘇林曰平陵佰在閩佰南誤十餘嵗衡乃始封此鄉臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡廼定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰師古曰所親素所親任者主簿陸賜故居奏曹習事曉知國界署集曹掾明年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之師古曰舉發上計之簿令郡改從平陵佰以為定實恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書師古曰顧念也亦不告曹使舉也聼曹為之後賜與屬明舉計曰案故圖樂安鄉南以平陵佰為界不足故而以閩佰為界解何師古曰不足故者不依故圖而滿足也解何者以分解此時意猶今言分疏也郡即復以四百頃付樂安國衡遣從史之僮収取所還田租榖千餘石入衡家司𨽻校尉駿少府忠行廷尉事劾奏衡監臨盗所主守直十金以上師古曰十金以上當時律定罪之次若今律條言一尺以上一匹以上春秋之義諸侯不得専地所以一統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制専地盗土以自益及賜明阿承衡意猥舉郡計亂減縣界師古曰猥曲也宋祁曰南本無承字只云阿丞相衡意浙本作阿承附下罔上擅以地附益大臣皆不道於是上可其奏勿治丞相免為庻人終於家子咸亦明經歴位九卿家世多為博士者張禹字子文河内軹人也至禹父徙家蓮勺師古曰左馮翊縣名也音輦酌禹為兒數隨家至市喜觀於卜相者前師古曰至其人之前而觀之喜音許吏反久之頗曉其别蓍布卦意師古曰别分也音彼列反時從旁言卜者愛之又竒其靣貌謂禹父是兒多知可令學經宋祁曰父字下當有曰字及禹壯至長安學從沛郡施讎受易琅邪王陽膠東庸生問論語既皆明習有徒衆舉為郡文學甘露中諸儒薦禹有詔太子太傅蕭望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事師古曰試以職事也奏寢罷歸故官師古曰寢謂不下也久之試為博士初元中立皇太子而博士鄭寛中以尚書授太子薦言禹善論語宋祁曰善字下疑有說字詔令禹授太子論語由是遷光禄大夫數嵗出為東平内史元帝崩成帝即位徴禹寛中皆以師賜爵闗内侯寛中食邑八百户禹六百户拜為諸吏光禄大夫秩中二千石給事中領尚書事是時帝舅陽平侯王鳳為大將軍輔政専權而上富於春秋謙讓方鄉經學敬重師傅師古曰鄉讀曰嚮而禹與鳳並領尚書内不自安數病上書乞骸骨欲退避鳳上報曰朕以幼年執政萬機懼失其中君以道徳為師故委國政君何疑而數乞骸骨忽忘雅素欲避流言師古曰雅素故也謂師傅故舊之恩朕無聞焉師古曰不聞有毁短之言君其固心致思總秉諸事推以孶孶無違朕意宋祁曰無當作毋加賜黄金百斤養牛上尊酒太官致餐侍醫視疾使者臨問師古曰侍醫侍天子之醫禹惶恐復起視事河平四年代王商為丞相封安昌侯為相六嵗鴻嘉元年以老病乞骸骨上加優再三廼聼許賜安車駟馬黄金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百户天子數加賞賜前後數千萬禹為人謹厚内殖貨財師古曰殖生也家以田為業宋祁曰晏本業作樂及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈師古曰賈讀曰價它財物稱是禹性習知音聲内奢滛身居大第後堂理絲竹筦弦如淳曰今樂家五日一習樂為理樂師古曰筦亦管字劉敞曰絲竹管絃等二物爾於文為駢禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智師古曰愷樂也弟易也言性和樂而簡易二人異行禹心親愛崇敬宣而疏之崇毎候禹常責師宜置酒設樂與弟子相娱禹將崇入後堂飲食婦女相對優人筦弦鏗鏘極樂昏夜乃罷師古曰極樂盡其歡樂之情而宣之來也禹見之於便坐師古曰便坐謂非正寢在於旁側可以延賓者也坐音才卧反講論經義日宴賜食不過一肉巵酒相對師古曰一豆之肉一巵行酒宣未嘗得至後堂及兩人皆聞知各自得也服䖍曰各自為得宜禹年老自治冡塋起祠室好平陵肥牛亭部處地師古曰肥牛亭名欲得置亭處之地為冢塋又近延陵宋祁曰别本無延字子謂當存延字成帝營昌陵不成更還延陵奏請求之上以賜禹詔令平陵徙亭它所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壊舊亭重非所宜師古曰重音直用反孔子稱賜愛其羊我愛其禮師古曰論語云子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮故引之宜更賜禹它地根雖為舅上敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毁惡之師古曰惡謂言其過惡天子愈益敬厚禹禹毎病輙以起居聞師古曰謂其食飲寢卧之増損車駕自臨問之上親拜禹牀下禹頓首謝恩歸誠宋祁曰恩字下當有因字言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為𢎞農太守又禹小子未有官上臨候禹禹數視其小子上即禹牀下拜為黄門郎宋祁曰郎字上疑有侍字給事中禹雖家居以特進為天子師國家毎有大政必與定議師古曰與讀曰豫永始元延之間日蝕地震尤數吏民多上書言災異之應譏切王氏専政所致上懼變異數見意頗然之未有以明見宋祁曰未字上當有而字廼車駕至禹第辟左右師古曰辟讀曰闢親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨禹則謂上曰宋祁曰則當作即春秋二百四十二年間日蝕三十餘地震五十六宋祁曰按劉向傳日蝕三十六地震五今云五十六疑衍十六兩字今越本與别本無十六兩字劉敞曰按春秋地震五耳疑衍十六字或為諸侯相殺或夷狄侵中國災變之意深逺難見故聖人罕言命不語怪神師古曰罕稀也論語云子罕言利與命與仁又曰子不語怪力亂神性與天道自子贛之屬不得聞師古曰論語云夫子之言性與天道不可得而聞也謂孔子未嘗言性命之事及天道何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福善此經義意也宋祁曰福善越本作福喜新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜說師古曰說讀曰悦宋祁曰皆當作此遂親就禹禹見時有變異若上體不安擇日絜齋露蓍服䖍曰露易蓍於星宿下明日乃用言得天氣也師古曰蓍草名筮者所用也音式夷反宋祁曰有字上疑有常字正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色宋祁曰感動字下疑有有字成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對已問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋𤣥成皆説論語篇第或異禹先事王陽後從庸生采獲所安最後出而尊貴諸儒為之語曰欲為論念張文宋祁曰監本越本欲字下有不字由是學者多從張氏餘家寖微師古曰寖漸也孔光字子夏孔子十四世之孫也孔子生伯魚鯉師古曰名鯉字伯魚先言其字者孔氏自為譜諜示尊其先也下皆類此鯉生子思伋師古曰伋音級伋生子上帛宋祁曰帛禮記作白漢書作帛古字通用監本浙本同帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳渉博士死陳下鮒弟子襄為孝恵博士長沙太傅襄生忠忠生武及安國武生延年宋祁曰浙本監本無忠生二字於安國字下又添忠字云襄生忠武及安國忠武生延年延年生霸字次儒霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為大中大夫以選授皇太子經遷詹事高密相是時諸侯王相在郡守上元帝即位徴霸以師賜爵闗内侯食邑八百户號襃成君如淳曰為帝師教令成就故曰襃成君宋祁曰注文為帝師教令成就當作嘗為帝師教帝今成就給事中加賜黄金二百斤第一區徙名數于長安師古曰名數户籍也霸為人謙退不好權埶常稱爵位泰過何徳以堪之上欲致霸相位自御史大夫貢禹卒及薛廣徳免輙欲拜霸霸讓位自陳至三上深知其至誠廼弗用宋祁曰三字下當有日字以是敬之賞賜甚厚及霸薨上素服臨弔者再至賜東園祕器錢帛策贈以列侯禮宋祁曰贈一作賜諡曰烈君霸四子長子福嗣闗内侯宋祁曰監浙二本皆云嗣爵次子㨗㨗弟喜皆列校尉諸曹光最少子也經學尤明年未二十宋祁曰二一作三舉為議郎光禄勲匡衡舉光方正為諫議大夫坐議有不合左遷虹長師古曰不合謂不合天子意也虹沛縣也音貢自免歸教授成帝初即位舉為博士數使録寃獄行風俗師古曰行下更反振贍流民奉使稱㫖宋祁曰㫖當作意越本作意由是知名是時博士選三科高為尚書宋祁曰監本浙本作三科高第次為刺史其不通政事以久次補諸侯太傅光以高第為尚書觀故事品式數嵗明習漢制及法令上甚信任之轉為僕射尚書令師古曰先為僕射後為尚書令有詔光周密謹慎未嘗有過宋祁曰有詔字下當有以字加諸吏官以子男放為侍郎給事黄門數年遷諸吏光禄大夫秩中二千石給事中賜黄金百斤領尚書事後為光禄勲復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合師古曰希指希望天子㫖意也如或不從不敢强諫爭以是久而安宋祁曰浙本云獲安時有所言輙削草槀服䖍曰言已繕書輙削壊其草也宋祁曰注文繕字下監本有事字以為章主之過以奸忠直人臣大罪也師古曰奸求也奸忠直之名也奸音干宋祁曰注文奸忠當作求忠有所薦舉唯恐其人之聞知沭日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也晉灼曰長樂宫中有温室殿光嘿不應更答以它語其不泄如是光帝師傅子少以經行自著進官蚤成師古曰蚤古早字不結黨友養游說有求於人既性自守亦其勢然也師古曰言以名父之子學宦早成不須黨援也宋祁曰注文宦字别本作官徙光禄勲為御史大夫綏和中上即位二十五年無繼嗣至親有同產弟中山孝王及同產弟子定陶王在定陶王好學多材於帝子行師古曰行音胡浪反宋祁曰於帝子行越本云於帝為子行而王祖母傅太后隂為王求漢嗣私事趙皇后昭儀及帝舅大司馬票騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍㢘襃後將軍朱博皆引入禁中議中山定陶王誰可為嗣者宋祁曰可字越本作宜字方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣襃博皆如方進根議光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比師古曰兄終弟及也比音必寐反中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉師古曰中當也光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻廼始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議師古曰翟方進及何武以為令犯法者各以法時律令論之師古曰此具引令條之文也法時謂始犯法之時也明有所訖也師古曰訖止也長犯大逆時廼始等見為長妻已有當坐之罪與身犯法無異後廼棄去於法無以解師古曰解免也請論光議以為大逆無道父母妻子同產無少長皆棄市欲懲犯法者也師古曰懲創止也宋祁曰監本正文懲字下有後字夫婦之道有義則合無義則離長未知當坐大逆之法宋祁曰知字上當有自字而棄去廼始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是是嵗右將軍襃後將軍博坐定陵紅陽侯師古曰㢘襃朱博坐與淳于長王立交厚也皆免為庻人以光為左將軍居右將軍官職執金吾王咸為右將軍居後將軍官職罷後將軍官數月丞相方進薨召左將軍光當拜已刻侯印書贊師古曰贊進也延進而拜之書贊者書贊辭於䇿也上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由已出朝廷翕然望至治焉襃賞大臣益封光千户時成帝母太皇太后自居長樂宫而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而飬長教道至於成人帝之立又有力光心恐傅太后與政事師古曰與讀曰豫不欲令與帝旦夕相近即議以為定陶太后宜改築宫大司空何武曰可居北宫上從武言北宫有紫房復道通未央宫師古曰復讀曰複傅太后果從復道朝夕至帝所求欲稱尊號貴寵其親屬使上不得直道行師古曰不得依正直之道宋祁曰行字上監本有而字頃之太后從弟子傅遷在左右尤傾邪上免官遣歸故郡傅太后怒上不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖徳誠不小愆陛下以變異連見避正殿見羣臣思求其故至今未有所改師古曰舊有不善之事皆未改除臣請歸遷故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號羣下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可蘇林曰執持不可也上重違大臣正議師古曰重難也又内迫傅太后猗違者連嵗如淳曰不決事之言也師古曰猗違猶依違猗音於竒反丹以罪免宋祁曰丹字下當有先字而朱博代為大司空光自先帝時議繼嗣有持異之隙矣又重忤傅太后指師古曰重直用反宋祁曰又字上當有後字由是傅氏在位者與朱博為表裏共毁譖光後數月遂策免光曰丞相者朕之股肱所與共承宗廟統理海内師古曰共讀曰恭輔朕之不逮以治天下也朕既不明災異重仍師古曰仍頻也重音直用反日月無光山崩河決五星失行是章朕之不徳而股肱之不良也師古曰章明也君前為御史大夫翼輔先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉隂陽錯謬嵗比不登師古曰比頻也天下空虛百姓飢饉父子分散流離道路以十萬數而百官羣職曠廢師古曰曠空也姦軌放縱盗賊並起或攻官寺殺長吏數以問君君無怵惕憂懼之意對毋能為師古曰言盗賊不能為害是以羣卿大夫咸惰哉莫以為意咎由君焉君秉社稷之重總百僚之任上無以匡朕之闕下不能綏安百姓書不云乎毋曠庻官天工人其代之師古曰虞書咎繇謩之辭也位非其人是為空官言人代天理官不可以天官私非其材於虖師古曰於讀曰烏虖讀曰呼君其上丞相博山侯印綬罷歸師古曰漢舊儀云丞相有它過使者奉策書即時歩出府乘棧車歸田里光退閭里杜門自守師古曰杜塞也而朱博代為丞相數月坐承傅太后指妄奏事自殺平當代為丞相數月薨王嘉復為丞相宋祁曰復字下當有代字數諌爭忤指旬嵗間閲三相師古曰閲猶歴也議者皆以為不及光上由是思之㑹元夀元年正月朔日有蝕之後十餘日傅太后崩是月徴光詣公車問日蝕事光對曰臣聞日者衆陽之宗人君之表至尊之象君徳衰微隂道盛彊侵蔽陽明則日蝕應之書曰羞用五事建用皇極師古曰周書洪範之言羞進也皇大也極中也如貌言視聼思失師古曰如若也大中之道不立則咎徴荐臻六極屢降皇之不極是為大中不立其傳曰時則有日月亂行謂朓側慝孟康曰朓行疾也側慝行遲也師古曰朓音吐了反宋祁曰浙本有兩亂行字朓按書曰朓晦而日見西方也蕭該音丑召反甚則薄蝕是也又曰六沴之作師古曰沴惡氣也音戾宋祁曰韋昭云沴謂皇極五行之氣相沴戾不和音持軫反服䖍曰沴音戾嵗之朝曰三朝師古曰嵗之朝月之朝日之朝故曰三朝其應至重廼正月辛丑朔日有蝕之變見三朝之會上天聰明苟無其事變不虛生書曰惟先假王正厥事師古曰商書高宗肜日之辭也假至也言先代至道之王必正其事言異變之來起事有不正也臣聞師曰天右與王者師古曰右讀曰佑佑助也宋祁曰右景佑本作左注亦作左予按王商𫝊擁佑太子注佑助也凡右為親左為逺故左遷左道皆離背去正之義不得訓左為助也故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉其至可必師古曰言輕忽天戒簡傲欺誣者其罰必至詩曰敬之敬之天惟顯思命不易哉師古曰周頌敬之篇顯明也思辭也言天甚明察宜敬之以承受天命甚難也宋祁曰浙本注云師古曰周頌敬之篇也敬肅也顯明也思辭也言天甚明察宜敬以承之受天命甚難也又曰畏天之威于時保之師古曰周頌我將之詩言必敬天之威於是乃得安皆謂不懼者凶懼之則吉也陛下聖徳聰明兢兢業業師古曰兢兢戒也業業危也承順天戒敬畏變異勤心虛已延見羣臣思求其故然後敇躬自約總正萬事放逺讒說之黨援納斷斷之介師古曰援引也斷斷専壹之貌介謂一介之人援音爰退去貪殘之徒進用賢良之吏平刑罰薄賦斂恩澤加於百姓誠為政之大本應變之至務也天下幸甚書曰天既付命正厥徳師古曰商書高宗肜日之辭言既受天命宜正其徳言正徳以順天也又曰天棐諶辭師古曰周書大誥之辭棐輔也諶誠也諶辭至誠之辭也棐音匪諶音上林反言有誠道天輔之也明承順天道在於崇徳博施加精致誠孳孳而已師古曰孳孳不怠也孳音兹俗之祈禳小數終無益於應天塞異銷禍興福師古曰祈求福也禳除禍也較然甚明無可疑惑師古曰較明貌較音角書奏上説師古曰說讀曰悦賜光束帛拜為光禄大夫秩中二千石給事中位次丞相詔光舉可尚書令者封上光謝曰臣以朽材前比歴位典大職卒無尺寸之效師古曰卒終也宋祁曰謝字上當有固字前比歴位典大職考本越本邵本並作前所歴位天職幸免罪誅全保首領今復拔擢備内朝臣與聞政事師古曰與讀曰豫臣光智謀淺短犬馬齒臷師古曰臷老也讀與耋同今書本有作截字者俗寫誤也誠恐一旦顛仆無以報稱師古曰稱副也竊見國家故事尚書以久次轉遷非有踔絶之能不相踰越師古曰踔高逺也音竹角反尚書僕射敞公正勤職通敏於事可尚書令謹封上敞以舉故為東平太守宋祁曰舉字上當有光字敞姓成公東海人也光為大夫月餘丞相嘉下獄死師古曰王嘉也御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯上廼知光前免非其罪以過近臣毁短光者免傅嘉宋祁曰免字上當有復字曰前為侍中毁譖仁賢誣愬大臣令俊艾者久失其位師古曰艾讀曰乂嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意師古曰肆極也詩不云乎讒人罔極交亂四國師古曰小雅青蠅之詩解在車千秋傳其免嘉為庻人歸故郡明年定三公官光更為大司徒㑹哀帝崩太皇太后以新都侯王莽為大司馬徴立中山王是為平帝帝年幼太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光為舊相名儒天下所信太后敬之備禮事光所欲搏擊輙為草以太后指風光令上之師古曰謂文書之槀草風讀曰諷次下亦同厓㫮莫不誅傷師古曰厓音崖眥音漬厓又音五解反眥又音仕懈反具在杜欽傳宋祁曰學林云史記游俠傳曰以睚眦殺人此用厓者省文也莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衞供養行内師古曰行内行在所之内中猶言禁中也署門户省服御食物師古曰省視也明年徙為太師而莽為太傅光常稱疾不敢與莽並有詔朝朔望領城門兵莽又風羣臣奏莽功徳稱宰衡位在諸侯王上百官統焉宋祁曰統字上當有總字光愈恐固稱疾辭位太后詔曰太師光聖人之後先師之子徳行純淑道術通明居四輔職輔道于帝師古曰道讀曰導今年耆有疾俊艾大臣惟國之重其猶不可以闕焉師古曰乂讀曰艾書曰無遺耉老師古曰周書召誥之辭也言不遺老成之人也國之將興尊師而重傅其令太師毎朝十日一賜餐賜太師靈夀杖孟康曰扶老杖也服䖍曰靈夀木名師古曰木有枝節長不過八九尺圍三四寸自然有合杖制不似竹須削治也黄門令為太師省中坐置几太師入省中用杖賜餐十七物師古曰食具有十七種物然後歸老于第官屬按職如故師古曰言十日一入朝受此寵禮它日則常在家自養而其屬官依常各行職務光凡為御史大夫丞相各再壹為大司徒太傅太師歴三世居公輔位前後十七年自為尚書止不教授後為卿時㑹門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力師古曰幾讀曰冀光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿策贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供張諫大夫持節與謁者二人使䕶喪事博士䕶行禮太后亦遣中謁者持節視喪公卿百官㑹弔送𦵏載以乘輿輼輬及副各一乘師古曰輼輬車及副各一乗也輼輬解具在霍光傳宋祁曰輼輬下當有車字注文同羽林孤兒諸生合四百人輓送車萬餘兩道路皆舉音以過喪師古曰喪到之處行道之人皆舉音哭須過廼止將作穿復土可甲卒五百人劉奉世曰可字疑非起墳如大將軍王鳳制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千户宋祁曰益字上當有再字病甚上書讓還七千户及還所賜一第宋祁曰一字當刪子放嗣莽簒位後以光兄子永為大司馬封侯昆弟子至卿大夫四五人始光父霸以初元元年為闗内侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師襃成君闗内侯霸以所食邑八百户祀孔子焉故霸還長安子福名數於魯宋祁曰江南淳化本作長安浙本無安字晏公論羡安字甚堅浙本作遷長子福名數於魯按霸既詔許以八百户祀孔子即是令長子福還名數於魯以千八百户為祀矣雖浙木作遷遷與還小異而大同言長安則後人妄添且復終始無義昔潁川陳彭年亦以安字為衍龔子曰長如字凡以安為衍字者誤以長為長㓜之長也福雖霸之長子然此傳前言霸於魯徙名數於長安此言還長安子福名數其義自明無可疑者當從江南本奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千户莽更封為襃成侯後避王莽更名均馬宫字游卿東海戚人也治春秋嚴氏以射䇿甲科為郎遷楚長史免官後為丞相史司直師丹薦宫行能高絜遷廷尉平青州刺史汝南九江太守所在見稱徴為詹事光禄勲右將軍代孔光為大司徒封扶徳侯光為太師薨宫復代光為太師兼司徒官初宫哀帝時與丞相御史雜議帝祖母傅太后諡及元始中王莽發傅太后陵徙歸定陶以民𦵏之追誅前議者宫為莽所厚獨不及内慙懼上書謝罪乞骸骨莽以太皇太后詔賜宫䇿曰太師大司徒扶徳侯上書言前以光禄勲議故定陶共王母諡曰婦人以夫爵尊為號諡宜曰孝元傅皇后稱渭陵東園臣知妾不得體君卑不得敵尊而希指雷同詭經辟說師古曰詭違辟讀曰僻以惑誤上為臣不忠當伏斧鉞之誅幸蒙洒心自新師古曰洒音先禮反又令得保首領伏自惟念入稱四輔出備三公爵為列侯誠無顏復望闕廷無心復居官府無宜復食國邑願上太師大司徒扶徳侯印綬避賢者路下君章有司皆以為四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位如君言至誠可聼惟君之惡在洒心前不敢文過朕甚多之師古曰多猶重也不奪君之爵邑以著自古皆有死之義孟康曰以宫上書不文過為信不奪其爵邑師古曰論語載孔子言曰自古皆有死民無信不立故引之其上太師大司徒印綬使者以侯就第王莽簒位以宫為太子師卒官本姓馬矢宫仕學稱馬氏云贊曰自孝武興學公孫𢎞以儒相其後蔡義韋賢𤣥成匡衡張禹翟方進孔光平當馬宫及當子晏咸以儒宗居宰相位服儒衣冠孟康曰方領逢掖之衣傳先王語其醖藉可也師古曰醖藉謂如醖醸及薦藉道其寛博重厚也醖音於問反藉音才夜反然皆持禄保位被阿䛕之譏彼以古人之迹見繩烏能勝其任乎如淳曰迹謂既明且哲也繩謂抨彈之也師古曰古人之迹謂直道以事人也烏何也抨音普耕反宋祁曰注文抨彈字書曰抨彈也抨音迮堇反前漢書卷八十一前漢書卷八十一考證匡衡傳周南召南被賢聖之化深故篤於行而廉於色注謂樂得淑女云云此概論二南風化之羙耳注以闗雎一詩為解非也此成湯所以建至治保子孫云云臣召南按殷武所以頌高宗武丁而衡云成湯事葢齊詩之說如此初衡封僮之樂安鄉注屬臨淮鄉當云屬臨淮郡張禹傳及兩人皆聞知各自得也注服䖍曰各自為得宜顧炎武曰崇以禹為親之宣以禹為敬之故各自得上雅信愛禹由此不疑王氏胡三省曰元帝師蕭望之成帝師張禹元帝不能聼望之言疎許史而去恭顯成帝則聼禹言而不疑王氏望之以此殺身禹以此苟富貴漢祚中衰實由此也孔光傳求生子真箕臣召南按子真箕史記作箕字子京又穿生順史記作子慎此皆字畫異耳此傳云忠生武及安國武生延年史記云武生延年及安國世次不同必有一誤領宿衞供飬行内注師古云云胡三省曰行内署門户當為一句此宿衞事也省服御食物則供飬事也文理甚明師古誤斷其句因曲為之說耳前漢書卷八十一考證
