  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0007_WYG_014-1a, image: WYG0249/WYG0249-0195a.png}
body:
  text: 前漢書卷十四漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注諸侯王表第二昔周監於二代師古曰監視也二代夏殷也三聖制法師古曰三聖謂文王武王及周公也立爵五等師古曰公侯伯子男封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地臣瓉曰禮記王制云五國以為屬屬有長二百一十國以為州州有伯師古曰五侯五等諸侯也九伯九州之伯也伯長也詩載其制曰介人惟藩大師惟垣大邦惟屛大宗惟翰懐徳惟寧宗子惟城毋俾城壊毋獨斯畏師古曰大雅板之詩也介善也藩籬也屛蔽也垣墻也翰幹也懐和也俾使也以善人為之藩籬謂封周公康叔於魯衛以大師為垣墻謂封太公於齊也大邦以為屏蔽謂成國諸侯也大宗以為楨幹謂王之同姓也能和其徳則天下安寧分建宗子則列城堅固城不可使墮壊宗不可使单獨单獨墮壊則畏懼斯至所以親親賢賢襃表功徳師古曰親賢俱封功徳並建關諸盛衰深根固本為不可拔者也故盛則周邵相其治致刑錯衰則五伯扶其弱與共守師古曰伯讀曰霸此五霸謂齊桓宋襄晉文秦穆吴夫差也自幽平之後日以陵夷師古曰陵夷言如山陵之漸平夷謂頽替也至虖阸䧢河洛之間應劭曰阸者狹也䧢者踦􅛤也西廹强秦東有韓魏數見侵暴踦􅛤不安也師古曰阸音於懈反䧢音區分為二周師古曰謂東西二周也有逃責之臺被竊鈇之言服䖍曰周赧王負責無以歸之主廹責急乃逃於此臺後人因以名之劉徳曰洛陽南宫謻臺是也應劭曰竊鈇謂出至路邉竊取人鈇也師古曰應説非也鈇鉞王者以為威用斬戮也言周室衰微政令不行於天下雖有鈇鉞無所用之是謂私竊隠藏之耳被音皮義反鈇音膚謻音移又音直移反然天下謂之共主如淳曰雖至微弱猶共以為之主彊大弗之敢傾師古曰言諸侯雖彊大者不敢傾滅周也厯載八百餘年數極徳盡既於王赧師古曰既亦盡也赧諡也一曰名也音女版反降為庶人用天年終號位已絶於天下尚猶枝葉相持莫得居其虚位海内無主三十餘年師古曰秦昭襄王五十二年周初亡五十六年昭襄王卒孝文王立一年而卒莊襄王立四年而卒子政立二十六年而乃并天下自號始皇帝是為三十五年無主也秦據埶勝之地騁狙詐之兵應劭曰狙伺也因間伺隙出兵也狙音若蛆反師古曰音千絮反蠶食山東壹切取勝師古曰蠶食解在異姓諸侯王表壹切解在平紀也因矜其所習自任私知姍笑三代盪滅古法師古曰姍古訕字也訕謗也音所諌反又音刪竊自號為皇帝而子弟為匹夫内亡骨肉本根之輔外亡尺土藩翼之衛陳吳奮其白梃應劭曰白梃大杖也孟子書曰可使制梃以撻秦楚是也師古曰梃音徒鼎反劉項隨而斃之故曰周過其歴秦不及期國埶然也應劭曰武王克商卜世三十卜年七百今乃三十六世八百六十七嵗此謂過其歴者也秦以諡法少恐後世相襲自稱始皇子曰二世欲以一迄萬今至子而亡此之為不及期也漢興之初海内新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵項昭曰漢封功臣大者王小者侯也功臣侯者百有餘邑尊王子弟大啟九國師古曰九國之數在下也自鴈門以東盡遼陽為燕代師古曰遼陽遼水之陽也常山以南太行左轉度河濟漸于海為齊趙師古曰太行山名也左轉亦謂自太行而東也漸入也一曰浸也行音胡剛反漸音子㢘反亦讀如本字榖泗以徃奄有龜蒙為梁楚晉灼曰水經云泗水出魯卞縣臣瓚曰榖在彭城泗之下流為榖水師古曰奄覆也龜蒙二水名東帯江湖薄會稽為荆吳文穎曰即今吴也高帝六年為荆國十年更名吴師古曰荆吴同是一國也北界淮瀕略廬衡為淮南師古曰瀕水涯也音頻又音賔廬衡二山名也波漢之陽亘九嶷為長沙鄭氏曰波音陂澤之陂孟康曰亘竟也音古贈反師古曰波漢之陽者循漢水而徃也水北曰陽波音彼皮反又音彼義反九嶷山名有九峯在零陵營道嶷音疑諸侯比境周帀三垂外接胡越師古曰比謂相接次也三垂謂北東南也比音頻寐反天子自有三河東郡潁川南陽師古曰三河河東河南河内也自江陵以西至巴蜀北自雲中至隴西與京師内史凡十五郡公主列侯頗邑其中師古曰十五郡中又徃徃有列侯公主之邑而藩國大者夸州兼郡連城數十師古曰夸音跨宫室百官同制京師可謂撟枉過其正矣師古曰撟與矯同枉曲也正曲曰矯言矯秦孤立之敗而大封子弟過於强盛有失中也雖然高祖創業日不暇給孝惠享國又淺高后女主攝位而海内晏如師古曰晏如安然也亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤横逆以害身䘮國師古曰易睽卦九四爻辭曰睽孤見豕負塗睽孤乖剌之意睽音工擕反故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之册下推恩之令使諸侯王得分戸邑以封子弟不行黜陟而藩國自析自此以來齊分為七師古曰謂齊城陽濟北濟南淄川膠西膠東也趙分為六師古曰謂趙平原真定中山廣川河間也梁分為五師古曰謂梁濟川濟東山陽濟隂也淮南分為三師古曰謂淮南衡山廬江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣如淳曰長沙之南更置郡燕代以北更置縁邊郡其所有饒利兵馬器械三國皆失之也景遭七國之難抑損諸侯減黜其官師古曰謂改丞相曰相省御史大夫廷尉少府宗正博士損大夫謁者諸官長丞員等也武有衡山淮南之謀作左官之律服䖍曰仕於諸侯為左官絶不得使仕於王侯也應劭曰人道上右今舍天子而仕諸侯故謂之左官也師古曰左官猶言左道也皆僻左不正應説是也漢時依上古法朝廷之列以右為尊故謂降秩為左遷仕諸侯為左官也設附益之法張晏曰律鄭氏説封諸侯過限曰附益或曰阿媚王侯有重法也師古曰附益者蓋取孔子云求也為之聚歛而附益之之義也皆背正法而厚於私家也諸侯惟得衣食税租不與政事師古曰與讀曰豫至於哀平之際皆繼體苗裔親屬踈逺師古曰言非始封之君皆其後裔也故於天子益踈逺矣生於帷墻之中不為士民所尊埶與富室亡異而本朝短世國統三絶師古曰謂成哀平皆早崩又無繼嗣是故王莽知漢中外殫微本末俱弱師古曰殫盡也音單亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下師古曰序謂東西廂顓與專同作謀既成遂據南面之尊分遣五威之吏馳傳天下班行符命漢諸侯王厥角首應劭曰厥者頓也角者額角也稽首首至地也言王莽漸漬威福日久亦值漢之單弱王侯見莽篡弑莫敢怨望皆頓角稽首至地而上其璽綬也晉灼曰厥猶豎也叩頭則額角豎師古曰應説是也音口禮反與稽同奉上璽韍惟恐在後師古曰韍音弗璽之綬也或廼稱美頌徳以求容媚豈不哀哉是以究其終始彊弱之變眀監戒焉右高祖十一人吳隨父凡十二人師古曰吴王濞從其父代王喜在此表中故十二人也右孝文三人齊城陽兩濟北濟南菑川膠西膠東趙河間淮南衡山十二人隨父凡十五人右孝景十四人楚濟川濟東山陽濟隂五人隨父凡十九人師古曰此表列諸王次第與本傳不同者本傳因母氏之次而盡言所生表則敘其昆弟長幼又臨江閔王封時年月在後故不同也它皆類此右孝武四人六安真定泗水平干四人隨父凡八人右孝元二人廣陵繼絶凡三人孝成時河間廣徳定陶三國孝哀時廣平一國孝平時東平中山廣徳廣世廣宗五國皆繼絶劉攽曰高帝封諸侯王其子孫無有與漢俱存亡者文帝封梁王城陽菑川景帝封河間長沙中山常山昭帝封廣陽廣陵高密此數國至王莽簒漢而廢宣帝所封有至王莽時者年淺不足云前漢書卷十四前漢書卷十四考證諸侯王表衰則五伯扶其弱與共守注此五霸謂齊桓宋襄晉文秦穆吳夫差也臣召南按五霸之説不一通三代言曰夏昆吾商大彭豕韋周齊桓晉文異姓諸侯王表適戍彊于五伯注是也此文專言周衰故注異解其不數楚莊而數吳夫差者楚僭王未有扶弱之事吳夫差黄池之會嘗共貢職于周也奄有龜䝉為梁楚注龜䝉二水名臣浩按二水名應作二山名凡十五郡臣召南按師古無注此以秦地計之於三十六郡中得十五郡也内史一河東二河南河内即三川郡三東郡四潁川五南陽六南郡七蜀郡八巴郡九漢中十隴西十一北地十二上郡十三雲中十四以史記言内地北距山以東盡諸侯地推之則上黨郡十五也若計高帝所自立之郡則不止於十五矣趙分為六注謂趙平原眞定中山廣川河間也臣召南按平原應作平干漢世無平原王平干即武帝征和二年封趙敬肅王小子偃者各本俱訛又按史記注徐廣曰河間廣川中山常山清河也此説較師古為長齊分為七淮南分三文帝十五年事也趙分為六至景帝中四年而全梁分為五則中五年事也師古不數常山清河而數武帝時所封之平干真定非是城陽王三世孝景後六年宋本監本同按當作後元年景帝後三年即畢安得有後六年乎菑川王五世孝王横横小宋板作烘魯共王四世閔臣召南按閔係頃王子紹封此格宜低一層與文王睃同行古本亦誤泗水王三世勤王綜劉攽曰昭紀元鳯元年立戴王遺腹子煖此表作綜二者不同齊懐王閼臣召南按齊王名閎不名閼紀傳可証監本及别本俱訛耳前漢書卷十四考證
