body:
  text: 前漢書卷一百上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注叙傳第七十上班氏之先與楚同姓令尹子文之後也宋祁曰今越本無之字子文初生棄於瞢中而虎乳之師古曰瞢雲瞢澤也春秋左氏𫝊曰楚若敖娶於䢵生鬬伯比若敖卒從其母畜於䢵􅁋於䢵子之女生子文焉䢵夫人使棄諸瞢中獸乳之䢵子田見之懼而歸夫人以告遂使收之瞢與夢同並音莫風反又音莫鳳反楚人謂乳穀謂虎於檡如淳曰穀音構牛羊乳汁曰構師古曰穀讀如本字又音乃茍反於音烏檡字或作菟並音塗宋祁曰淳化本作楚人謂乳為穀謂虎為於檡故名穀於檡字子文楚人謂虎班其子以為號師古曰子文之子鬭班亦為楚令尹秦之滅楚遷晉代之間因氏焉師古曰遂以班為姓始皇之末班壹避墬於樓煩師古曰墬古地字樓煩鴈門之縣致馬牛羊數千羣值漢初定與民無禁當孝恵髙后時以財雄邊師古曰國家不設衣服車旗之禁故班氏以多財而為邊地之雄豪出入弋獵旌旗鼓吹年百餘嵗以夀終故北方多以壹為字者師古曰馬邑人聶壹之類也今流俗書本多改此𫝊壹字為懿非也壹生孺孺為任俠州郡歌之孺生長官至上谷守長生回以茂材為長子令師古曰上黨之縣長讀如本字回生况舉孝亷為郎積功勞至上河農都尉師古曰上河地名農都尉者典農事大司農奏課連最入為左曹越騎校尉成帝之初女為偼伃致仕就第貲累千金徙昌陵昌陵後罷大臣名家皆占數于長安師古曰占度也自隐度家之口數而著名籍也占音之贍反况生三子伯斿穉伯少受詩於師丹大將軍王鳳薦伯宜勸學召見晏昵殿師古曰親戚宴飲會同之殿宋祁曰張晏解與師古同字林昵近也乃吉反容貌甚麗誦説有法拜為中常侍時上方鄉學師古曰鄉讀曰嚮鄭寛中張禹朝夕入説尚書論語於金華殿中師古曰金華殿在未央宫詔伯受焉既通大義又講異同於許商遷奉車都尉數年金華之業絶出與王許子弟為羣在於綺襦紈絝之間非其好也晉灼曰白綺之襦冰紈之絝也師古曰紈素也綺今細綾也並貴戚子弟之服家本北邊志節忼慨數求使匈奴河平中單于來朝上使伯持節迎於塞下㑹定襄大姓石季羣軰報怨殺追捕吏師古曰報私怨而殺人吏追捕之又殺吏宋祁曰慷字越本作忼石季越本作石李報怨殺淳化本及越本作報怨寇追殺伯上狀因自請願試守期月師古曰欲守定襄太守期音基上遣侍中中郎將王舜馳傳代伯護單于師古曰𫝊音張戀反幷奉璽書印綬即拜伯為定襄太守師古曰即就也就其所居而拜定襄聞伯素貴年少自請治劇畏其下車作威吏民竦息伯至請問耆老父祖故人有舊恩者師古曰請召也迎延滿堂日為供具師古曰酒食之具也供音居用反執子孫禮郡中益㢮師古曰㢮解也見伯不用威刑故自解縱諸所賔禮皆名豪懷恩醉酒共諫伯宜頗攝錄盜賊具言本謀亡匿處伯曰是所望於父師矣師古曰齒為諸父尊之如師故曰父師廼召屬縣長吏選精進掾史師古曰精明而進趨也分部收捕師古曰分音扶問反及它隠伏旬日盡得郡中震㮚咸稱神明師古曰㮚古栗字嵗餘上徴伯伯上書願過故郡上父祖冢有詔太守都尉以下㑹師古曰同赴其所因召宗族各以親疎加恩施散數百金北州以為榮長老紀焉師古曰紀記也道病中風師古曰中傷也為風所傷既至以侍中光祿大夫養病師古曰受其秩俸而在家自養也賞賜甚厚數年未能起㑹許皇后廢班偼伃供養東宫李奇曰元后成帝母進侍者李平為偼伃而趙飛燕為皇后伯遂稱篤久之上出過臨候伯伯惶恐起眡事師古曰眡古視字自大將軍薨後師古曰王鳳富平定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入侍禁中設宴飲之㑹及趙李諸侍中皆引滿舉白服䖍曰舉滿桮有餘白􅄋者罰之也孟康曰舉白見驗飲酒盡不也師古曰謂引取滿觴而飲飲訖舉觴告白盡不也一說白者罰爵之名也飲有不盡者則以此爵罰之魏文侯與大夫飲酒令曰不釂者浮以大白於是公乘不仁舉白浮君是也談关大噱師古曰关古笑字也噱噱笑聲也音其略反或曰噱謂唇口之中大笑則見此說非時乘輿幄坐張畫屏風師古曰坐音才卧反畫紂醉踞妲己作長夜之樂上以伯新起數目禮之師古曰目視而敬之因顧指畫而問伯紂為無道至於是乎伯對曰書云廼用婦人之言師古曰今文尚書泰誓之辭何有踞肆於朝師古曰肆放也陳也所謂衆惡歸之不如是之甚者也師古曰論語稱孔子曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉故伯引此為言上曰茍不若此此圖何戒伯曰沈湎于酒微子所以告去也師古曰微子殷之卿士封於微爵稱子也殷紂錯亂天命微子作誥告箕子比干而去紂其誥曰用沈酗于酒用亂敗厥徳于下我其發出狂吾家耄遜于荒事見尚書微子篇式號式謼大雅所以流連也師古曰大雅蕩之詩曰式號式謼俾晝作夜言醉酒號呼以晝為夜也流連言作詩之人嗟歎而泣涕流連也而說者乃以流連為流亡蓋失之矣大雅所以流連不謂飲酒之人也謼音火故反詩書􅁋亂之戒其原皆在於酒上迺喟然歎曰吾久不見班生今日復聞讜言師古曰讜言善言也音黨放等不懌師古曰懌恱也音亦稍自引起更衣因罷出時長信庭林表適使來聞見之孟康曰長信太后宫名也庭林表宫中婦人官名也師古曰長信宫庭之林表也林表官名耳庭非官稱也宋祁曰林表晉灼曰應劭書作材表宫人之有材能者表其師也張晏曰林君也表外也於宫外𫝊威儀也後上朝東宫太后泣曰帝間顔色瘦黑師古曰間謂比日也班侍中本大將軍所舉宜寵異之益求其比以輔聖徳師古曰比類也音必寐反宜遣富平侯且就國上曰諾車騎將軍王音聞之以風丞相御史師古曰風讀曰諷奏富平侯罪過上廼出放為邊都尉後復徴入太后與上書曰前所道尚未效張晏曰謂上所言班侍中本大將軍所舉宜寵異之富平侯反復來其能黙虖如淳曰富平侯張放復來太后安能黙然不以為言上謝曰請今奉詔是時許商為少府師丹為光祿勳上於是引商丹入為光祿大夫伯遷水衡都尉與兩師並侍中如淳曰兩師許商師丹皆秩中二千石每朝東宫常從及有大政俱使諭指於公卿上亦稍厭游宴復修經書之業太后甚悦丞相方進復奏富平侯竟就國會伯病卒年三十八朝廷愍惜焉斿博學有俊材左將軍史丹舉賢良方正以對䇿為議郎遷諫大夫右曹中郎將與劉向校祕書每奏事師古曰斿每奏校書之事斿以選受詔進讀羣書師古曰於天子前讀書上器其能賜以祕書之副時書不布師古曰謂不出之於羣下自東平思王以叔父求太史公諸子書大將軍白不許語在東平王𫝊師古曰此言東平王求書不得而斿獲賜祕書明見寵異斿亦早卒有子曰嗣顯名當世稺少為黄門郎中常侍方直自守成帝季年立定陶王為太子數遣中盾請問近臣師古曰盾讀曰允百官表云詹事之屬官也漢舊儀云秩四百石主徼廵宫中蕭該音義曰中盾韋昭曰太子宫中盾長也該案盾音允稺獨不敢答師古曰言其慎哀帝即位出稺為西河屬國都尉遷廣平相王莽少與稺兄弟同列友善兄事斿而弟畜稺師古曰事斿如兄遇稺如弟斿之卒也修緦麻賻賵甚厚師古曰送終者布帛曰賻車馬曰賵賻音附賵音芳鳳反平帝即位太后臨朝莽秉政方欲文致太平師古曰言欲以文教致太平劉敞曰公羊春秋説文致太平者以春秋亂世但聖人作文致之如太平耳莽政既惡而飾虚以自章大是亦文致也豈謂文敎致太平乎使使者分行風俗采頌聲師古曰行音下更反而稺無所上師古曰不稱符瑞及歌頌琅邪太守公孫閎言災害於公府大司空甄豐遣屬馳至兩郡諷吏民師古曰遣言祥應而隠除災害也而劾閎空造不祥稺絶嘉應嫉害聖政皆不道太后曰不宣德羙宜與言災害者異罰且後宫賢家我所哀也師古曰班偼伃有賢徳故哀閔其家閎獨下獄誅稺懼上書陳㤙謝罪願歸相印入補延陵園郎太后許焉食故祿終身由是班氏不顯莽朝亦不罹咎師古曰罹遭也初成帝性寛進入直言是以王音翟方進等繩法舉過師古曰論天子之過失而劉向杜鄴王章朱雲之徒肆意犯上師古曰肆極也故自帝師安昌侯諸舅大將軍兄弟及公卿大夫後宫外屬史許之家有貴寵者莫不被文傷詆師古曰詆毁也音丁禮反唯谷永嘗言建始河平之際許班之貴傾動前朝熏灼四方賞賜無量空虚内臧女寵至極不可尚矣今之後起天所不饗什倍於前永指以駮譏趙李亦無間云師古曰雖谷永嘗有此言而意専在趙李耳自餘劉向之徒又皆不論班氏也間非也音居莧反稺生彪彪字叔皮幼與從兄嗣共遊學家有賜書内足於財好古之士自逺方至父黨揚子雲以下莫不造門師古曰造至也音千到反嗣雖修儒學然貴老嚴之術師古曰老老子也嚴莊周也桓生欲借其書師古曰桓譚嗣報曰若夫嚴子者絶聖棄智修生保真清虚澹泊歸之自然師古曰澹泊安静也澹音徒濫反泊音歩各反又音魄獨師友造化而不為世俗所役者也漁釣於一壑則萬物不奸其志師古曰奸犯也音干栖遲於一丘則天下不易其樂不絓聖人之罔師古曰絓讀與挂同聖人謂周孔也不齅驕君之餌應劭曰齅音六畜之畜師古曰齅古嗅字也餌謂爵祿君所以制使其臣亦猶釣魚之設餌也宋祁曰齅字書火又反注文設一作投蕩然肆志談者不得而名焉師古曰肆放也故可貴也今吾子已貫仁誼之覊絆繫名聲之韁鎻師古曰韁如馬韁也音薑宋祁曰絆字書音半伏周孔之軌躅鄭氏曰躅迹也三輔謂牛蹄處為躅音丈欲反宋祁曰鄭云躅音拘挶之挶馳顔閔之極摯劉徳曰摯至也人行之所極至既繋攣於世教矣何用大道為自眩曜師古曰言用老子莊周之道何為但欲以名自眩曜耳眩音州縣之縣宋祁曰曜字下浙本有也字昔有學歩於邯鄲者曾未得其髣髴又復失其故歩遂匍匐而歸耳師古曰匍音扶匐音平北反恐似此類故不進師古曰言不與其書嗣之行已持論如此叔皮唯聖人之道然後盡心焉張晏曰固不欲言父諱舉其字耳年二十遭王莽敗世祖即位於冀州時隗囂據壟擁衆招輯英俊師古曰輯與集同宋祁曰壟字下當有右字而公孫述稱帝於蜀漢天下雲擾師古曰言盜賊擾亂如雲而起大者連州郡小者據縣邑囂問彪曰往者周亡戰國並爭天下分裂數世然後廼定其抑者從横之事復起於今乎師古曰抑語辭將承運迭興在於一人也師古曰迭互也音大結反願先生論之對曰周之廢興與漢異昔周立爵五等諸侯從政師古曰言諸侯之國各分為政夲根既微枝葉强大師古曰本根謂王室也枝葉謂諸侯故其末流有從横之事其埶然也漢家承秦之制並立郡縣主有専已之威臣無百年之柄至於成帝假借外家師古曰假音工暇反借音子夜反哀平短祚國嗣三絶危自上起傷不及下故王氏之貴傾擅朝廷能竊號位而不根於民師古曰言無據援是以即真之後天下莫不引領而歎十餘年間外内騷擾逺近俱發假號雲合咸稱劉氏不謀而同辭方今雄桀帶州城者皆無七國世業之資宋祁曰城或作域詩云皇矣上帝臨下有赫鑒觀四方求民之莫師古曰大雅皇矣之詩也皇大也上帝天也莫定也言大矣天之視下赫然甚明監察衆國求人所定而授之今民皆謳吟思漢鄉仰劉氏已可知矣師古曰鄉讀曰嚮囂曰先生言周漢之埶可也至於但見愚民習識劉氏姓號之故而謂漢家復興疏矣昔秦失其鹿劉季逐而掎之師古曰掎偏持其足也音居蟻反時民復知漢虖既感囂言又愍狂狡之不息宋祁曰韋昭音義作火旁息音熹既反字林音息是以今漢書止作息字廼著王命論以救時難其辭曰昔在帝堯之禪曰咨爾舜天之歴數在爾躬舜亦以命禹師古曰事見論語臮于稷契咸佐唐虞師古曰契讀與卨同字本作契宋祁曰尚書音巨涖反光濟四海奕世載徳師古曰載承也言相因不絶至于湯武而有天下雖其遭遇異時禪代不同至乎應天順民其揆一也師古曰言堯舜以文徳相禪湯武以征伐代興各上應天命下順人心是故劉氏承堯之祚氏族之世著乎春秋師古曰謂士會歸晉其處者為劉氏唐據火德而漢紹之始起沛澤則神母夜號以章赤帝之符由是言之帝王之祚必有明聖顯懿之徳豐功厚利積絫之業師古曰絫古累字宋祁曰師古曰下當有豐古酆字四字然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸徃未見運世無夲功德不紀師古曰不紀不為人所記而得屈起在此位者也師古曰屈起特起也屈音其勿反世俗見髙祖興於布衣不逹其故以為適遭暴亂得奮其劔游說之士至比天下於逐鹿幸㨗而得之不知神器有命不可以智力求也劉徳曰神器璽也李竒曰帝王賞罰之柄也師古曰李説是也劉奉世曰神器者聖人之大寳曰位是也悲夫此世所以多亂臣賊子者也若然者豈徒闇於天道哉又不覩之於人事矣夫餓饉流隸饑寒道路師古曰隸賤隸思有短褐之䙝儋石之畜師古曰䙝謂親身之衣也音先列反一説云衣破壤之餘曰褻儋石解在蒯通𫝊音丁㩜反畜讀曰蓄蕭該音義曰字林曰褻衷衣也丈篋反所願不過一金然終於轉死溝壑何則貧窮亦有命也況虖天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阸會竊其權柄師古曰罹亦遭也音離勇如信布彊如梁籍成如王莽然卒潤鑊伏質亨醢分裂師古曰質鍖也伏於鍖上而斬之也鍖音竹林反又況么䯢尚不及數子鄭氏曰䯢音麽小也晉灼曰此骨偏䯢之䯢也師古曰鄭音是也么麽皆微小之稱也么音一堯反麽音莫可反骨偏䯢自音麻與此義不相合晉說失之而欲闇奸天位者虖師古曰奸音干宋祁曰奸字詁古文干字是故駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用楶梲之材不荷棟梁之任師古曰楶即薄櫨所謂枅也梲梁上短柱也楶音節字亦或作節梲音之説反蕭該音義曰韋昭楶音節一名檽即柱上方木也鄭氏楶音贅應劭曰爾雅曰梲朱檽也音之劣反斗筲之子不秉帝王之重師古曰斗筲言小器也解在公孫劉田𫝊筲音山交反蕭該音義曰字林曰筲飯筥也受五升秦云山交反該案䈾或作筲論語曰斗筲之人何足算也易曰鼎折足覆公餗師古曰鼎卦九四爻辭也餗食也音速蕭該音義曰字林曰餗鼎實也韋昭音義餗字作鬻曰菜羮曰鬻音速該案字林餗或作鬻字異音訓則一不勝其任也當秦之末豪桀共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤師古曰而汝也卒富貴不祥不如以兵屬人師古曰屬委也音之欲反事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劔而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明師古曰凡言匹夫匹婦謂凡庶之人一夫一婦當相配匹猶能推事理之致探禍福之機而全宗祀於無窮垂策書於春秋師古曰春秋史書記事之總稱而況大丈夫之事虖是故窮逹有命吉凶由人嬰母知廢陵母知興審此四者帝王之分決矣師古曰分音扶問反蓋在髙祖其興也有五師古曰王命論叙髙祖之徳及班氏漢書叙目所稱引事皆具見本書不須更解以穢篇籍其有辭句隐互尋覽難知者則具釋焉浮汎之説蓋無取也宋祁曰注文汎字浙本作冗字一曰帝堯之苖裔二曰體貌多竒異三曰神武有徴應四曰寛明而仁恕五曰知人善任使加之以信誠好謀逹於聽受見善如不及用人如由己從諫如順流趣時如嚮赴師古曰嚮讀曰響如響之赴聲也當食吐哺納子房之策㧞足揮洗揖酈生之說寤戍卒之言斷懐土之情師古曰洛陽近沛髙祖來都闗中故云斷懷土之情也斷音丁喚反髙四皓之名割肌膚之愛晉灼曰不立戚夫人子舉韓信於行陳收陳平於亡命英雄陳力羣䇿畢舉此髙祖之大略所以成帝業也若廼靈瑞符應又可略聞矣初劉媪任髙祖而夢與神遇師古曰任謂懷任也震電晦㝠有龍蛇之怪及其長而多靈有異於衆是以王武感物而折劵吕公覩形而進女秦皇東游以厭其氣呂后望雲而知所處師古曰厭音一葉反蕭該音義曰韋昭曰厭合也劉氏曰厭當也始受命則白蛇分西入闗則五星聚故淮隂留侯謂之天授非人力也歴古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符瑞不同斯度劉徳曰厭當也師古曰音一渉反而茍昧於權利越次妄據師古曰昧貪也外不量力内不知命則必喪保家之主失天年之壽遇折足之凶伏鈇鉞之誅師古曰鈇音方于反英雄誠知覺寤畏若禍戒師古曰若順也超然逺覽淵然深識收陵嬰之明分絶信布之覬覦師古曰分音扶問反覬音冀覦音踰蕭該音義曰字書曰覬幸也覦欲也距逐鹿之瞽說審神器之有授毋貪不可㡬為二母之所笑師古曰不可㡬謂不可庻㡬而望也一說㡬讀曰冀則福祚流于子孫天祿其永終矣知隗囂終不寤廼避墬於河西師古曰墬古地字蕭該音義曰隗囂諸詮上五罪反下許妖反河西大將軍竇融嘉其美徳訪問焉師古曰每事皆與謀舉茂材為徐令以病去官後數應三公之召仕不為祿所如不合師古曰如徃也不茍得祿故所徃之處不合其意學不為人博而不俗言不為華述而不作有子曰固弱冠而孤師古曰固年二十也作幽通之賦以致命遂志劉徳曰致極也陳吉凶性命遂明已之志其辭曰系髙頊之𤣥胄兮氏中葉之炳靈應劭曰系連也胄緒也言已髙陽顓頊之連緒也顓頊北方水位故稱𤣥中葉謂令尹子文也虎乳故曰炳靈繇凱風而蟬蛻兮雄朔野以颺聲應劭曰凱風南風也朔北方也言先祖自楚遷北若蟬之蛻也師古曰繇讀與由同從也蛻音祱颺與揚同宋祁曰注文颺字下當有讀字皇十紀而鴻漸兮有羽儀於上京應劭曰十紀漢十世也張晏曰易曰鴻漸于陸其羽可用為儀成帝時班況女為倢伃父子並在京師為朝臣也晉灼曰皇漢皇也巨滔天而泯夏兮考遘愍㠯行謠應劭曰巨王莽字巨君也張晏曰彪遇王莽之敗憂思歌謠也師古曰滔漫也言不畏天也泯滅也夏諸夏也考班固自言其父也遘遇也愍憂也徒歌曰謠終保己而貽則兮里上仁之所廬師古曰言其父遭時濁亂以道自安終遺盛法而處仁者所居也論語稱孔子曰里仁為美擇不處仁焉得智故引以為辭懿前烈之純淑兮窮與逹其必濟師古曰固自言美前人之餘業窮則獨善逹能兼濟也濟合韻音子齊反咨孤矇之眇眇兮將圯絶而罔階師古曰眇眇微細也圯毁也固自言孤弱懼將毁絶先人之跡無階路以自成蕭該音義曰韋昭曰圯毁也音敷委反字書父已反豈余身之足殉兮愇世業之可懷師古曰殉營也愇字與韙同韙是也懷思也愇音于匪反蕭該音義曰字林曰殉殺生送死也說文愇籕文韙韙是也劉氏及廣雅並云愇恨也靖潛處以永思兮經日月而彌逺匪黨人之敢拾兮庻斯言之不玷蘇林曰拾音負拾之拾應劭曰拾更也自謙不敢與鄉人更進也師古曰靖古静字也拾音其業反玷缺也更音工衡反魂焭焭其神交兮精神發於宵寐夢登山而逈眺兮覿幽人之髣髴張晏曰幽人神人也師古曰覿見也音廸宋祁曰其字當作與㩜葛藟而授余兮眷峻谷曰勿隧師古曰㩜執取也言入峻谷者當據葛藟可以免于顛墜猶處時俗者當據道義然後得用自立故設此喻託以夢也一說藟葛屬也葛之與藟皆有蔓為㩜音攬其字從手藟音力水反宋祁曰據葛藟當作攀蔓為當作蔓焉昒昕寤而仰思兮心蒙蒙猶未察孟康曰昒昕早旦也覺寤思念未知其吉凶也師古曰昒音忽昕音欣蕭該音義曰鄧展昒音昧該案字書昒尚冥也音勿諸詮方昧反劉奉世曰但以察合韻音蔡則協韻矣黄神邈而靡質兮儀遺䜟以臆對應劭曰黄帝善占夢久逺無從得問凖其讖書以意求其象也賈誼曰讖言其度應劭曰臆胷臆也師古曰對合韻音丁忽反蕭該音義曰蒼頡篇曰讖書河洛書也該案諸詮音楚鴆反曰乘髙而神兮道遐通而不迷師古曰登山見神故曰乘髙也遇也音五故反又音五各反葛緜緜於樛木兮詠南風以為綏應劭曰周南國風其詩曰南有樛木葛藟纍之樂只君子福履綏之師古曰樛木下垂之木也綏安也樛音居虬反纍音力追反蕭該音義曰樛亦作朻韋昭曰朻下曲也居騮反蓋惴惴之臨深兮乃二雅之所祗師古曰詩小雅小宛之篇曰惴惴小心如臨于谷惴惴恐懼之貌也小旻篇曰戰戰兢兢如臨深淵如履薄冰言恐墜陷也故云二雅之所祗惴音之瑞反既誶爾以告象兮又申之以烱戒師古曰誶告也烱明也誶音碎烱音公逈反宋祁曰告當作吉蕭該音義曰説文曰誶讓也息悴反盍孟晉以迨羣兮辰倐忽其不再服䖍曰盍何不也孟勉也晉進也迨及也何不早進仕以及輩也師古曰辰時也倐忽疾也言時疾過不再來也倐音式六反宋祁曰晉或作㬜亦作晉承靈訓其虛徐兮竚盤桓而且俟孟康曰虚徐懷疑也張晏曰佇久也俟待也惟天墬之無窮兮鱻生民之脢在晉灼曰鱻古鮮字也應劭曰脢無㡬也師古曰墬古地字也鱻少也言天地長久而人夀短促也鱻音先踐反蕭該音義曰脢韋昭音謀鬼反又音梅字林曰脢微視美目貌紛屯亶與蹇連兮何艱多而智寡孟康曰世艱難多智者少故遇禍也師古曰易屯卦六二爻辭曰屯如亶如蹇卦六四爻辭曰徃蹇來連皆謂險難之時也亶音竹延反連音力善反上聖寤而後拔兮豈羣黎之所御師古曰黎衆也言上聖之人猶遇紛難覩機能寤然後自㧞文王羑里孔子於匡是也至於衆庶豈能豫禦之哉昔衛叔之御昆兮昆為宼而喪予孟康曰御迎也昆兄也衛叔武迎兄成公成公令前驅射殺之師古曰御音五駕反衛叔解在五行志管彎弧欲斃讎兮讎作后而成己師古曰謂管仲射桓公中帶鉤桓公反國以為相也變化故而相詭兮孰云豫其終始師古曰詭違也雍造怨而先賞兮丁繇恵而被戮師古曰雍雍齒也丁丁公也繇讀與由同㮚取弔于逌吉兮王膺慶於所慽應劭曰㮚孝景姬也有子而以妬見廢王宣帝王倢伃也以無子為憂而以謹敕得母元帝也師古曰逌古攸字也攸亦所也畔囘宂其若兹兮北叟頗識其倚伏師古曰畔亂貌也回宂轉旋之意也叟老人稱也淮南子曰北塞上之人其馬無故亡入胡中人皆弔之其父曰此何詎不為福居數月其馬將胡駿馬而歸人皆賀之對曰此何詎不為禍家富馬良其子好騎墯而折髀人皆弔之對曰此何詎不為福居一年胡夷大入丁壯者皆控弦而戰塞上之人死者十九此獨以跛之故父子相保老子徳經曰禍兮福所倚福兮禍所伏故頗識其􅀝伏􅀝音於綺反單治裏而外凋兮張修襮而内逼應劭曰單單豹也静居其所以理五内處深山為虎所食張張毅也外修恭敬斯徒馬圉皆與亢禮不勝其勞内熱而死師古曰襮表也單音善襮音布谷反蕭該音義曰晉灼曰襮音素衣朱襮該案詩音博字林曰襮黼衿也方沃反欥中龢為庶㡬兮顔與冉又不得師古曰欥古聿字也龢古和字也聿由也由中和之道可以庻㡬免於禍難而顔回早死冉耕惡疾為善之人又不得其報也宋祁曰注文聿由也由中和二由字皆當作曰字溺招路以從已兮謂孔氏猶未可安慆慆而不萉兮卒隕身虖世旤鄧展曰慆慆亂貌也萉避也師古曰溺桀溺也路子路也論語稱長沮桀溺耦而耕孔子過之使子路問津焉桀溺曰子孔丘之徒歟對曰然曰慆慆者天下皆是也而誰以易之且而與其從避人之士豈若從避世之士哉言天下皆亂汝將用誰變易之乎避人之士謂孔子避世之士溺自謂也而子路安之卒不能避乃遇蒯瞆之亂身死敵也慆音士髙反萉音扶味反字本作腓其音同蕭該音義曰萉牛羊腓字之腓萉假借腓避也韋昭曰萉避也音肥晉灼音義作遯云遯避也曹大家注幽通賦云萉避也游聖門而靡救兮顧覆醢其何補師古曰禮記云孔子哭子路於中庭既哭進使者而問故使者曰醢之矣遂命覆醢賦言子路游聖人之門而孔子不能救之以免於難雖為覆醢無所補益固行行其必凶兮免盜亂為賴道師古曰論語稱閔子侍側誾誾如也子路行行如也子樂曰若由也不得其死然又稱子路曰君子上勇乎曰君子義以為上君子有勇而無義為亂小人有勇而無義為盜賦言子路禀行行之性其凶必也所以免為於亂盜者賴聞道於孔子也行行剛强之貌也行音胡浪反蕭該音義曰行行諸詮音胡浪反形氣發于根柢兮柯葉彚而靈茂師古曰柢本也彚盛也靈善也言草木本根氣强則枝葉盛而善美人之先祖有大功徳則𦙍緒亦蕃昌也柢音丁計反茂合韻音莫口反蕭該音義曰彚服䖍曰彚類也音近卉服虔音卉應劭音謂該案字書音謂恐网蜽之責景兮慶未得其云已師古曰慶發語辭讀與羌同已止也莊子云网兩問景曰曩子行今子止曩子坐今子起何其無特操歟景曰吾有待而然吾所待又有待而然賦言景之行止皆隨於形草木枝葉各禀根柢人之餘慶資於積善亦猶此也黎淳耀于髙辛兮芉彊大於南汜應劭曰黎楚之先也淳美也髙辛帝嚳之號􅇗楚姓汜涯也師古曰言黎在髙辛之時為火正有美光耀故其後嗣霸有楚國於南方也汜江水之别也音祀召南之詩曰江有汜􅇗音弭嬴取威於百儀兮姜夲支虖三止應劭曰嬴秦姓也伯益之後也伯益為虞有儀鳥獸百物之功秦所由取威於六國也姜齊姓也止禮也齊伯夷之後伯夷為秩宗典天地人鬼之禮也蕭該音義曰止文選作趾劉奉世曰百儀則栢翳也語訛耳既仁得其信然兮卬天路而同軌劉徳曰人道既然仰視天道又同法也師古曰仁得謂求仁而得仁也卬讀曰仰東厸虐而殱仁兮王合位虖三五應劭曰東厸紂也殲盡也王武王也欲從五位三所即國語嵗日月星辰之所在也師古曰厸古鄰字也仁即三仁也國語稱泠州鳩對景王曰昔武王伐殷嵗在鶉火月在天駟日在析木之津辰在斗杓星在天黿星與日辰之位皆在北維顓頊之所建也我姬氏出自天黿又析木者有建星及牽牛焉則我皇妣大姜之姓伯陵之後逢公之所憑神也嵗之所在則我有周之分野也月之所在辰為農祥也我太祖后稷之所經緯王欲合是五位三所而用之五位謂嵗日月辰星也三所謂逢公所憑神周分野所在后稷所經緯也戎女烈而喪孝兮伯徂歸於龍虎孟康曰伯晉文公也嵗在卯出歴十九年過一周嵗在酉入卯為龍酉為虎也師古曰戎女驪戎之女謂驪姬也烈酷也孝謂太子申生也伯讀曰霸言文公霸諸侯也徂徃也言以龍徃出以虎歸入也劉敞曰重耳之出也嵗在大火故云龍及其入也在大梁故曰虎非卯酉也發還師以成性兮重醉行而自耦師古曰發武王名也性命也武王初觀兵於孟津八百諸侯不期而會皆曰紂可伐矣武王曰爾未知天性還師二年紂殺比干囚箕子武王乃伐克之於是成天命也重謂重耳晉文公名也耦合也文公初出奔至齊齊桓公妻之有馬二十乘文公欲安之齊姜乃與子犯謀醉而遣之後遂反國與時會也應劭曰耦與天時偶㑹也震鱗漦于夏庭兮帀三正而滅周應劭曰易震為龍鱗蟲之長也漦沬也師古曰謂褒姒也解在五行志三正歴夏殷周也漦音丑之反正音之盈反巽羽化于宣宫兮彌五辟而成災應劭曰易巽為雞羽蟲也宣帝時未央宫路軨廐中雌雞化為雄元后統政之祥也至平帝歴五世而王莽篡位宋祁曰注末當有五辟宣元成哀平也八字道悠長而世短兮夐冥黙而不周劉徳曰夐逺也周至也冥黙𤣥深不可通至也蕭該音義曰夐冥晉灼曰夐音目夐夐而䘮精呵縣反該案目夐夐而䘮精出王延夀靈光殿賦諸詮音呼政反韋昭曰夐逺也呼逈反胥仍物而鬼諏兮廼窮宙而逹幽應劭曰胥須也仍因也諏謀也易曰人謀鬼謀百姓與能徃古來今曰宙聖人須因卜筮然後謀鬼神極古今通幽微也蕭該音義曰諏字林曰諏聚謀也子于反諸詮祖侯反宙韋昭曰天宙所愛曰宙曹大家注幽通賦云徃古來今謂之宙聖人所以能極數而知來者皆因卜筮謀於鬼神媯巢姜於孺筮兮旦算祀于挈龜應劭曰媯陳姓也巢居也姜齊姓也孺少也陳完少時其父厲公使周史卜得居有齊國之卦也李竒曰算數也祀年也周公卜居洛得世三十年七百也師古曰挈刻也詩大雅繇緜之篇曰爰挈我龜言刻開之灼而卜之挈音口計反劉敞曰算祀挈龜亦言田完耳其兆有五世八世是祀也宣曹興敗於下夢兮魯衛名諡於銘謠應劭曰周宣王牧人夢衆魚與旟旌之祥而中興曹伯陽國人夢衆君子立於社宫謀亡曹而曹亡也孟康曰魯文成之世童謠言稠父䘮勞宋父以驕後昭公名稠遂死於野井定公名宋即位而驕衛靈公掘地得石椁其銘曰靈公遂以為諡妣聆哌而刻石兮許相理而鞠條應劭曰妣叔向之母也石叔向之子也聽其啼聲刻知其後必滅羊舌氏許負相周亞夫從理入口當餓死鞠窮也條亞夫所封也師古曰鞠告也蕭該音義曰該案曺大家本作劾石曺注舉罪曰劾道混成而自然兮術同原而分流師古曰大道混壹歸於自然人之所趨雖有流别本則同耳神先心以定命兮命随行以消息師古曰言神明之道雖在人心之前已定命矣然亦隨其所行以致禍福宋祁曰别本皆無命字斡流遷其不濟兮故遭罹而嬴縮師古曰斡轉也言人之生各有遭遇不能必濟免於困厄各隨其所逢以致嬴虧也三欒同於一體兮雖移盈然不忒孟康曰晉大夫欒書書子黶黶子盈書賢而覆黶黶惡而害盈也師古曰欒書欒武子也黶欒栢子也盈欒懷子也春秋左氏𫝊稱秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎欒黶汰虐以甚猶可以免其在盈乎武子之徳在人如周人之思邵公愛其甘棠況其子乎欒黶死盈之善未能及人武子所施沒矣黶之惡實彰將於是乎在其後至襄公二十一年終為范宣子所逐而出奔楚自楚適齊二十三年自齊入于晉晉人遂滅欒氏也洞參差其紛錯兮斯衆兆之所惑師古曰衆兆兆庻也周賈盪而貢憤兮齊死生與旤福孟康曰莊周賈誼也貢惑也憤亂也放盪惑亂死生禍福之正也蕭該音義曰貢晉灼音義作心旁貢字林曰愩憒也李竒曰愩懣也孟康曰愩惑也該案貢合作心旁貢抗爽言以矯情兮信畏犧而忌鵩孟康曰莊周不欲為犧牛賈誼惡忌鵩鳥也師古曰抗舉也爽差也謂二人雖舉言齊死生壹禍福而心實不然是差謬也所貴聖人之至論兮順天性而斷誼師古曰斷誼謂以誼斷之斷音丁喚反物有欲而不居兮亦有惡而不避師古曰言富貴人之所欲不以其道則君子不居死亡人之所惡處得其節則君子不避也守孔約而不貳兮廼輶徳而無累師古曰孔甚也輶輕也言守其甚約執心不貳舉徳至輕無所累惑斯為可矣詩大雅烝民之篇曰徳輶如毛人鮮克舉之輶音弋九反又音猶三仁殊而一致兮夷惠舛而齊聲師古曰三仁紂賢臣也論語稱微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉夷伯夷也恵柳下恵也論語又稱逸人伯夷叔齊虞仲夷逸朱張柳下恵少連賦言微子箕子比干所行各異而並稱仁伯夷不義武王伐殷至于不食周粟而死柳下恵三黜不去戀父母之邦志執乖舛俱有令名蕭該音義曰舛字林充絹反錯也木偃息㠯蕃魏兮申重繭㠯存荆師古曰木叚干木也客居魏魏文侯敬而禮之過其閭未嘗不軾也秦欲伐魏或諫曰魏君賢者是禮國人稱仁未可圖也秦遂止兵申謂申包胥荆即楚也繭足下傷起如繭也楚昭王時呉師入郢昭王出奔申包胥如秦乞師踰越險阻曾繭重胝立於秦庭號哭七日秦哀公出師救楚而敗呉師昭王反國將賞包胥包胥辭曰吾所以重繭為君耳非為身也逃不受賞宋祁曰注文胝舊本作眡紀焚躬以衛上兮皓頤志而弗營師古曰紀紀信也脫漢王於難而為項羽所燒皓四皓也處商洛深山髙祖求之不得自養其志無所營屈侯􅋄木之區别兮茍能實而必榮要沒世而不朽兮廼先民之所程應劭曰侯維也張晏曰茍能有仁義之道必有榮名也師古曰侯發語辭也爾雅曰伊惟侯也程正也言人之操行所尚不同立徳立言期於不朽亦猶蘭蕙松栢各有本性馨烈材幹並擅貞芳此乃古昔賢人以為正道也論語稱子夏曰君子之道譬諸草木區以别矣故賦引之宋祁曰侯周詩曰侯文王孫子毛𫝊曰侯維也觀天罔之紘覆兮實棐諶而相順應劭曰棐輔也諶誠也相助也師古曰尚書大誥曰天棐諶辭詩大雅蕩之篇曰天生烝人其命匪諶易上繋辭曰天之所助者順也賦言天道惟誠是輔唯順是助故引以為辭也棐讀與匪同諶音上林反謨先聖之大繇兮亦厸悳而助信劉德曰厸近也師古曰謨謀也繇道也厸古鄰字詩小雅巧言之篇曰秩秩大繇聖人謨之論語稱孔子曰徳不孤必有鄰易上繋辭曰人之所助者信也賦言若能謀聖人之大道有徳者必為同志所依履信者必𫉬他人之助謨音摹又音莫虞韶美而儀鳳兮孔忘味於千載師古曰韶舜樂名也虞書舜典曰簫韶九成鳳凰來儀論語云孔子在齊聞韶三月不知肉味賦言孔子去舜千嵗也素文信而底麟兮漢賔柞于異代應劭曰底致也孔子作春秋素王之文有視明禮修之信而致麟漢封其後為襃成及紹嘉公係殷後為二代之客精通靈而感物兮神動氣而入徹養游睇而猨號兮李虎發而石開師古曰養養由基也楚之善射者游睇流眄也楚王使由基射猿操弓而眄之猿抱木而號知其必見中也李李廣也夜遇石以為猛獸而射之中石沒羽也宋祁曰徹當作微㳺蕭本作流音義曰該案春秋作養由今漢書作流由與流亦互用非精誠其焉通兮茍無實其孰信師古曰信合韻音新操末技猶必然兮矧湛躬於道真師古曰矧況也湛讀曰眈躬親也射者微技猶能精誠感於猿石況立身種徳親眈大道而不倦者乎蕭該音義曰湛文選作酖登孔顥而上下兮緯羣龍之所經應劭曰顥太顥也孔孔子也羣龍喻羣聖也自伏羲下訖孔子終始天道備矣孟康曰孔甚也顥大也聖人作經賢者緯之也師古曰應説孔顥是也孟説經緯是也顥音胡老反朝貞觀而夕化兮猶諠已而遺形應劭曰貞正也觀見也諠忘也易曰天地之道貞觀者也張晏曰言朝觀天道而夕死可也師古曰形已尚可遺忘況外物者哉諠音許元反又音許逺反若􅏷彭而偕老兮訴來哲以通情師古曰彭彭祖也老老􅆅也言有繼續彭祖之志升躡老􅆅之跡者則可與言至道而通情也亂曰天造屮昧立性命兮應劭曰天道始造萬物草創於㝠昧之中皆立其性命也師古曰易屯卦彖辭曰天造草昧故賦引之復心𢎞道惟賢聖兮應劭曰易曰復其見天地之心乎論語曰人能𢎞道師古曰復音扶目反蕭該音義曰復一作腹張晏曰以道為腹心也𢎞道逹於天地之性命也渾元運物流不處兮師古曰渾元天地之氣也處止也渾音胡昆反保身遺名民之表兮舍生取誼亦道用兮應劭曰孟子曰生我所欲也義我所欲也二者不可得兼舎生而取義也師古曰舍置也憂傷夭物忝莫痛兮晉灼曰沗設也言死者莫痛於是也師古曰此說非也沗辱也言不逹性命自與憂傷為物所夭既辱且痛莫過於是昊爾太素曷渝色兮服虔曰守死善道不染流俗是謂浩爾太素何有變渝者哉師古曰渝音踰尚粤其㡬淪神域兮應劭曰尚上也粤於也易曰知㡬其神乎淪入也師古曰尚庶㡬也願也永平中為郎典校秘書專篤志於博學以著述為業或譏以無功又感東方朔揚雄自諭以不遭蘇張范蔡之時曾不折之以正道明君子之所守故聊復應焉其辭曰賔戯主人曰蓋聞聖人有壹定之論列士有不易之分亦云名而已矣如淳曰唯貴得名也故太上有立德其次有立功夫德不得後身而特盛功不得背時而獨章是以聖喆之治棲棲皇皇師古曰不安之意也孔席不煗墨突不黔師古曰孔孔子墨墨翟也突竈突也黔黒也言志在明道不暇安居蕭該音義曰煗吕静曰煗溫也乃卵反黔字林曰䵩黒也音琴又音匡炎反由此言之取舍者昔人之上務著作者前列之餘事耳劉徳曰取者施行道徳舍者守静無為也今吾子幸游帝王之世躬帶冕之服師古曰帶大帶也冕冠也浮英華湛道德師古曰湛讀曰沈英華謂名譽也言外則有美名善譽内則履道崇徳也矕龍虎之文舊矣孟康曰矕被也易曰大人虎變其文炳也言文章之盛久也晉灼曰矕視也言目厭見其文久矣師古曰尋其下句孟説是也矕音莫限反卒不能攄首尾奮翼鱗振拔洿塗跨騰風雲師古曰攄申也洿停水也塗泥也以龍為喻也洿音一故反又音烏蕭該音義曰攄字林曰攄舒也尹於反又擬也使見之者景駭聞之者享震師古曰享讀曰響見景則駭聞響則震合韻音之人反宋祁曰享當作嚮注同徒樂枕經籍書紆體衡門師古曰紆屈也衡門横一木於門上蕭該音義曰籍才亦反韋昭音義作蒩字慈固反説文曰蒩茅藉也從草租若如韋昭音則漢書本作蒩字上無所蔕下無所根獨攄意乎宇宙之外銳思於豪芒之内􅅗神黙記恒以年嵗如淳曰恒音亘竟之亘師古曰宇宙之外言宏廣也豪芒之内喻纖微也恒音工贈反然而器不賈於當已用不效於一世劉徳曰賈讎也師古曰當已謂及已身尚在猶言當年也賈音古又音工暇反讎音齒九反宋祁曰詩曰賈用不售賈音古齒九越本作上究反一本作止九反雖馳辯如濤波摛薻如春華師古曰大波曰濤摛布也薻文辭也猶無益於殿最師古曰殿音丁見反意者且運朝夕之䇿定合會之計使存有顯號亡有美諡不亦優虖主人逌爾而笑曰師古曰逌古攸字也攸咲貌也若賔之言斯所謂見埶利之華闇道德之實守突奥之熒燭未卯天庭而睹白日也應劭曰爾雅東南隅謂之突西南隅謂之奥師古曰突奥室中之二隅也熒燭熒熒小光之燭也卬讀曰仰突音鳥了反其字從宂夭聲也蕭該音義曰郭璞曰突音突該謂依儀禮宜言徒骨反宋祁曰注文舊無燭熒熒三字浙本添曩者王塗蕪穢周失其御侯伯方軌戰國横騖於是七雄虓闞分裂諸夏應劭曰七雄秦及六國也師古曰虓音呼交反闞音呼敢反蕭該音義曰虓案字林音孝龍戰而虎争游說之徒風颺電激並起而救之師古曰颺讀與揚同蕭該音義曰風颺該案韋昭音義作風颮云颮風之聚隗者也音庖今漢書並作風颮而電激也説文曰飇或作颮颮音甫堯反其餘猋飛景附煜霅其間者蓋不可勝載師古曰猋疾風也煜霅光貌也煜音于及反霅音下甲反煜又音育蕭該音義曰煜霅韋昭煜音呼夾反霅音于俠反服䖍曰煜音近霍叔音為育霅音􅀢邇之􅀢字林曰霅震電也一曰衆言也于甲反煜音弋叔反又于立反當此之時搦朽摩鈍鈆刀皆能壹斷師古曰搦按也音女角反斷音丁喚反蕭該音義曰搦韋昭曰搦女攉反説文曰搦按也史記曰搦髓腦湔浣腸胃是故魯連飛一矢而蹶千金虞卿以顧眄而捐相印也應劭曰魯連齊人也齊圍燕燕將保於聊城魯連繋帛書於矢射與之為陳利害燕將得之泣而自殺譏切魏新垣衍使不尊秦為帝秦時圍邯鄲為却五十里趙遂以安趙王以千金為魯連夀不受魏齊為秦所購迫急走趙趙相虞卿與齊有故然愍其窮於是解相印閒行與奔魏公子無忌也李竒曰蹶蹋也距也師古曰蹶音厥又音其月反夫啾發投曲感耳之聲合之律度􅁋䵷而不可聽者非韶夏之樂也李竒曰䵷不正之音也師古曰啾發啾啾小聲而發也投曲趣合屈曲也感耳動應衆庻之耳也然而不合律度君子所不聽也滛䵷非正之聲也不謂䵷黽之鳴也啾音子由反蕭該音義曰韋昭曰若䵷黽之聲也宋祁曰一本無也字因埶合變偶時之會風移俗易乖忤而不可通者非君子之法也師古曰雖偶當時之會而不可以移風易俗及至從人合之衡人散之師古曰從音子庸反亡命漂說覉旅騁辭師古曰漂浮也音匹遙反商鞅挾三術以鑽孝公李斯奮時務而要始皇應劭曰王霸富國强兵為三術也師古曰王一也霸二也富國强兵三也彼皆躡風雲之會履顛沛之埶師古曰顛沛僵仆也據徼乘邪以求一日之富貴師古曰徼要也據可以要迎之時也徼音工堯反徼字或作激激發也宋祁曰浙本去以字朝為榮華夕而焦瘁師古曰焦音在消反瘁與悴同福不盈眦旤溢於世李竒曰當富貴之閒視不滿目故言不盈眦也蕭該音義曰眥字林曰眥目厓也才賜反凶人且以自悔況吉士而是賴虖師古曰賴利也且功不可以虛成名不可以偽立韓設辯以徼君呂行詐以賈國師古曰賈市買也音古說難既酋其身廼囚秦貨既貴厥宗亦隧應劭曰酋音酋豪之酋酋雄也說難韓非書篇名也吕不韋效千金於秦立子楚為王封十萬户侯以隂事自殺也師古曰吕不韋初見子楚在趙而云此竒貨可居故班氏謂子楚為秦貨耳安説效千金乎應説失之矣蕭該音義曰酋鄭氏曰酋執也韋昭曰酋終也是故仲尼抗浮雲之志孟軻養浩然之氣張晏曰孔子云不義而富且貴於我如浮雲孟軻曰我善養吾浩然之氣而無害則塞乎天地之間也師古曰浩然純壹之氣也彼豈樂為迂濶哉道不可以貳也師古曰迂逺也音于方今大漢洒埽羣穢夷險芟荒師古曰洒音所蟹反汎也汎音信廓帝紘恢皇綱基隆於羲農規廣於黄唐其君天下也炎之如日威之如神函之如海養之如春師古曰函容也讀與含同是以六合之内莫不同原共流沐浴𤣥德師古曰原水泉之本也流者其末流也稟卬太和枝附葉著師古曰卬讀曰仰著音直略反譬猶􅋄木之殖山林鳥魚之毓川澤師古曰殖生也長也毓與育同得氣者蕃滋失時者苓落師古曰苓與零同參天墬而施化豈云人事之厚薄哉師古曰墬古地字今子處皇世而論戰國耀所聞而疑所覿師古曰覿見也音徒歴反欲從旄敦而度髙虖泰山懷氿濫而測深虖重淵亦未至也應劭曰爾雅前髙曰旄丘如覆敦者敦丘側出曰氿泉正出曰濫泉師古曰敦音丁囘反度音徒各反氿音軌蕭該音義曰旄爾雅曰前髙後下曰旄丘詩有旄丘篇字林曰前髙後下曰堥丘此與爾雅同堥音毛又亡周反今人呼為務音乖僻多矣氿濫舊作汎檻韋昭曰水側出曰㲹泉音範湧出曰濫泉音檻宋祁曰未至字下當有後下字注文正出當作上出字賔曰若夫鞅斯之倫衰周之凶人既聞命矣敢問上古之士處身行道輔世成名可述於後者黙而已虖主人曰何為其然也昔咎繇謨虞箕子訪周師古曰訪亦謀言通帝王謀合聖神殷說夢發於傅巖周望兆動於渭濵師古曰說傅說也解已在前望謂太公望即吕尚也釣於渭水文王將出獵卜之曰所得非龍非螭非豹非羆乃帝王之輔果遇吕尚於渭陽與語大恱曰吾太公望子久矣故號曰太公望齊甯激聲於康衢漢良受書於邳沂鄭氏曰五逹曰康四逹曰衢晉灼曰沂崖也下邳水之崖也師古曰齊寗寗戚也聲激謂叩角所歌也沂音牛斤反蕭該音義曰康韋昭曰五逹為康呼坑反該案事出爾雅該讀康如字未詳韋氏音沂韋昭作垠曰垠限也謂橋也吾恩反皆竢命而神交匪詞言之所信師古曰信合韻音新蕭該音義曰詞字書曰古辭字故能建必然之䇿展無窮之勲也近者陸子優繇新語以興鄭氏曰優繇不仕也師古曰繇讀與由同董生下帷發藻儒林劉向司籍辯章舊聞揚雄覃思法言太𤣥師古曰覃大也深也皆及峕君之門闈究先聖之壺奥應劭曰宫中門謂之闈宫中巷謂之壺師古曰壺音苦本反婆娑虖術蓺之場休息虖篇籍之囿以全其質而發其文用納虖聖聽列炳於後人斯非其亞與師古曰亞次也與讀曰歟若廼夷抗行於首陽惠降志於辱仕師古曰夷伯夷也恵柳下恵也辱仕謂為士師三黜也顔耽樂於簞瓢孔終篇於西狩師古曰謂作春秋止於𫉬麟也狩合韻音守蕭該音義曰簞瓢字書曰簞笥也一曰卜筐丁安反瓢蠡也父幺反聲盈塞於天淵真吾徒之師表也且吾聞之壹隂壹陽天墬之方師古曰墜古地字廼文廼質王道之綱有同有異聖喆之常故曰慎修所志守爾天符委命共已味道之腴師古曰共讀曰恭腴肥也神之聽之名其舍諸師古曰舍廢也諸之也言修志委命則明神聽之佑以福祿自然有名永不廢也賔又不聞龢氏之璧韞於荆石師古曰龢古和字也韞亦藏也音於粉反隋侯之珠臧於蜯蛤虖師古曰蜯即蚌字也音平項反蛤音工合反蕭該音義曰蜯蛤字書蜯蜃屬也歩頂反蛤燕雀化所作也秦曰牡蠣歴世莫眡不知其將含景耀吐英精曠千載而流夜光也應龍􅅗於潢汙魚黿媟之師古曰應龍龍有翼者潢汙停水也媟謂侮狎之也潢音黄汙音烏不覩其能奮靈德合風雲超忽荒而躆顥蒼也師古曰躆以足據持也顥顥天也元氣顥汙故曰顥天其色蒼蒼故曰蒼天躆音㦸蕭該音義曰躆案字書無足旁豦字猶應是踞字字書踞蹲也已恕反顥字林曰顥白貌也音昊楚辭昊白顥顥該案爾雅曰春曰蒼天夏曰昊天今作顥者此古書假借用耳故夫泥蟠而天飛者應龍之神也先賤而後貴者龢隋之珍也峕闇而久章者君子之真也師古曰時闇有時而闇也若廼牙曠清耳於管絃離婁眇目於豪分師古曰牙伯牙也曠師曠也離婁明目者也眇細視也逢蒙絶技於弧矢班輸𣙜巧於斧斤師古曰逢䝉古善射者也班輸即魯公輸班也一説班魯班也與公輸氏為二人也皆有巧蓺也古樂府云誰能為此器公輸與魯班𣙜専也一曰競也𣙜音角蕭該音義曰𣙜巧韋昭曰𣙜猶専也該案音較晉灼音義作㩁字云劉氏云㩁效也或言極也晉灼曰㩁見也盡也良樂軼能於相馭烏獲抗力於千鈞師古曰良王良也樂伯樂也軼與逸同相相馬也馭善馭也烏𫉬壯士也龢鵲發精於鍼石研桑心計於無垠孟康曰研古之善計也桑桑宏羊也師古曰和秦醫和也鵲扁鵲也研計研也一號計倪亦曰計然垠厓也蕭該音義曰鍼字林曰鍼所以縫也之心反僕亦不任厠技於彼列故宻爾自娛於斯文師古曰宻静也安也前漢書巻一百上前漢書卷一百上考證敘傳臣召南按南史蕭琛𫝊琛為宣城太守有北僧南渡惟齎一瓠蘆中有漢書序傳僧云三輔舊書相𫝊以為班固真夲琛固求得之其中多有異今者而紙墨甚古文字多如龍舉之例非隸非篆琛甚秘之及為江夏太守以書餉鄱陽王範獻於東宫又劉之遴傳太子以漢書真夲令之遴與張纘到溉陸襄等參校異同之遴錄其異狀數十事其大畧云案古夲漢書稱永平十六年五月二十一日己酉郎班固上而今夲無上書年月日子又案古夲叙傳號為中篇今夲稱為叙傳又今夲叙𫝊載班彪事行而古夲云彪自有傳臣按此說可疑後書固傳固自永平中始受詔潛精積思二十餘年至建初中始成然則永平十六年乃初受詔豈容即表上於朝乎又其父彪以建武中為徐令司徒掾望都長自不合列𫝊於前書所謂真夲必非實也意者好事之徒所為耶永平中何由有紙即此足破其妄漢書自初出即已盛行八表天文志闕曹大家且受詔以完其業然則今夲漢書確足據矣稱叙傳為中篇有何義乎楚人謂虎班其子以為號注師古曰子文之子鬭班亦為楚令尹胡三省曰左傳莊三十年申公鬭班殺令尹子元而鬭穀於菟為令尹恐班非子文之子車騎將軍王音聞之以風丞相御史通鑑考異曰按放傳丞相宣御史大夫方進奏放過惡音以正月乙巳薨方進以三月丁酉為御史大夫然則風丞相御史者疑非音也危自上起傷不及下故王氏之貴云云按後書於此條問答字句稍有增損如危自上起二句後書倒載於王氏擅朝因竊位號之下又方今雄桀帶州城者皆無七國世業之資下後書節詩云皇矣上帝四句又王命論全文後書但載其目而不述其文也是故劉氏承堯之祚氏族之世著乎春秋注師古曰謂士會歸晉云云顧炎武曰左氏昭公二十九年傳陶唐氏既衰其後有劉累者學擾龍於豢龍氏以事孔甲如師古注則又其苖裔也既誶爾以告象兮按文選字句間有異同此誶字選作訊又上聖寤而後拔兮寤字選作迕又發還師以成性兮性字選作命又帀三正而滅周周字選作姬又雖移盈然不忒選作雖移易而不忒又皓頤志而勿營勿營選作勿傾潛神黙記恒以年嵗按文選去此二句又煜霅其間者選作霅煜又說難既酋酋字選作遒又漢良受書於邳沂沂字選作圻又班輸𣙜巧於斧斤選作摧巧注摧竭也前漢書卷一百上考證欽定四庫全書前漢書巻一百下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注敘𫝊第七十下固以為唐虞三代詩書所及世有典籍故雖堯舜之盛必有典謨之篇然後揚名於後世冠徳於百王師古曰徳為百王之上也故曰巍巍乎其有成功也煥乎其有文章也師古曰此篇論語載孔子美堯舜之言也漢紹堯運以建帝業至於六世史臣乃追述功徳私作本紀師古曰謂武帝時司馬遷作史記編於百王之末厠於秦項之列太初以後闕而不錄故探篹前記綴輯所聞師古曰篹與撰同輯與集同以述漢書起于髙祖終于孝平王莽之誅十有二世二百三十年綜其行事旁貫五經上下洽通師古曰固所撰諸表序及志經典之義在於是也為春秋考紀表志𫝊凡百篇師古曰春秋考紀謂帝紀也而俗之學者不詳此文乃云漢書一名春秋考紀蓋失之矣劉奉世曰顔說亦非也考成也言以編年之故而後成紀表志𫝊非止於紀也語兼於下其敘曰師古曰自皇矣漢祖以下諸叙皆班固自論撰漢書意此亦依放史記之叙目耳史遷則云為某事作某本紀某列傳班固謙不言作而改言述蓋避作者之謂聖而取述者之謂明也但後之學者不曉此為漢書敘目見有述字因謂此文追述漢書之事乃呼為漢書述失之逺矣摯虞尚有此惑其餘曷足怪乎皇矣漢祖纂堯之緒實天生徳聰明神武秦人不綱罔漏于楚師古曰言秦失綱維故髙祖因時而起罔漏于楚謂項羽雖有害虐之心終免於患也一說楚王陳渉初起後又破滅也爰茲發迹斷蛇奮旅神母告符朱旗廼舉粤蹈秦郊嬰來稽首革命創制三章是紀應天順民五星同晷師古曰晷景也項氏畔換黜我巴漢孟康曰畔反也換易也不用義帝要換易與髙祖漢中也師古曰此說非也畔換强恣之貌猶言跋扈也詩大雅皇矣篇曰無然畔換西土宅心戰士憤怨劉徳曰宅居也西方人皆居心於髙祖猶繋心也書曰惟衆宅心晉灼曰西土關西也髙祖入關約法三章秦民大恱皆宅心髙祖乘釁而運席卷三秦割據河山保此懷民師古曰保安也懷民懷徳之人也股肱蕭曺社稷是經爪牙信布腹心良平龔行天罰赫赫明明述髙紀第一孝恵短世髙后稱制罔顧天顯吕宗以敗劉徳曰罔無也顧念也顯明也言吕氏無念天之明道者徒念王諸吕以至於敗亡述恵紀第二髙后紀第三太宗穆穆允恭𤣥黙化民以躬帥下以徳農不供貢辠不收孥張晏曰除民田租之稅是不供貢也宫不新館陵不崇墓師古曰墓合韻音謨我徳如風民應如草師古曰論語稱孔子曰君子之徳風小人之徳草也故引以為辭國富刑清登我漢道師古曰登成也述文紀第四孝景蒞政諸侯方命孟康曰尚書云方命圯族言鯀之惡壞其族類吳楚七國亦然克伐七國王室以定匪怠匪荒務在農桑著于甲令民用寧康晉灼曰甲令即景紀令甲也述景紀第五世宗􅁮􅁮思𢎞祖業師古曰曄􅁮盛貌也疇咨熙載髦俊並作師古曰疇誰也咨謀也熙興也載事也謀於衆賢誰可任用故能興其事業也作起也厥作伊何百蠻是攘師古曰攘郤也恢我疆宇外博四荒師古曰恢廣也博大也武功既抗亦迪斯文劉徳曰迪進也憲章六學統壹聖真封禪郊祀登秩百神宋祁曰秩當作祭協律改正饗兹永年張晏曰改正謂從建寅之月也述武紀第六孝昭幼冲冡宰惟忠燕蓋譸張實叡實聰如淳曰譸音輈應劭曰譸張誑也辠人斯得邦家和同述昭紀第七中宗明明夤用刑名鄧展曰夤敬也時舉傅納聽斷惟精李竒曰時是也於是時也選用賢者師古曰傅讀曰敷虞書舜典曰敷納以言敷陳也謂有陳言者則納而用之劉奉世曰時舉謂時而颺之也柔逺能邇燀燿威靈師古曰虞書舜典曰柔逺能邇柔安也能善也故引之云燀熾也音充善反龍荒幕朔莫不來庭孟康曰謂白龍堆荒服沙幕也師古曰龍匈奴祭天龍城非謂白龍堆也朔北方也丕顯祖烈尚於有成師古曰丕大也烈業也述宣紀第八孝元翼翼髙明柔克師古曰翼翼敬也尚書洪範云髙明柔克謂人雖有髙明之度而當執柔乃能成徳也敘言元帝有柔克之姿也賔禮故老優繇亮直師古曰故老謂貢禹薛廣徳也優繇謂寛容也亮直謂朱雲也繇與由同外割禁囿内損御服離宫不衛山陵不邑張晏曰不徙民著縣也閹尹之呰穢我明徳如淳曰任𢎞恭石顯使為政以病其治也師古曰謂宫人為閹者言其精氣奄閉不泄也一曰主奄閉門者尹正也呰與疵同蕭該音義曰韋昭呰作㩁字云子爾反劉氏云摧效也或言極也晉灼曰㩁見也盡也使為政以病其治也今漢書本或誤作疵字或作呰字述元紀第九孝成煌煌臨朝有光威儀之盛如圭如璋壼闈恣趙朝政在王師古曰趙謂趙皇后及昭儀也王謂外家王鳳王音等炎炎燎火亦允不陽張晏曰天子盛威若燎火之陽今委政王氏不炎熾矣師古曰允信也宋祁曰邵本如字作燎亦字作光述成紀第十孝哀彬彬克㩜威神師古曰彬彬文質備也言哀帝忿孝成之時權在臣下故自㩜持其威神也㩜執取也其字從手如淳曰㩜音籃彫落洪支底剭鼎臣服䖍曰彫落洪支廢退王氏也底致也周禮有屋誅誅大臣於屋下不露也易曰鼎折足其形渥凶謂誅朱博王嘉之屬也晉灼曰剭刑也師古曰剭者厚刑謂重誅也音握服言屋下失其義也劉奉世曰洪支謂東平王雲非王氏也婉孌董公惟亮天功大過之困實撓實凶應劭曰以董賢為三公乃欲共成天功也易大過卦棟撓凶言以小材而為棟梁不堪其任至於折撓而凶也師古曰婉孌美貌亮助也尚書舜典曰夤亮天功故引之也撓曲也音女教反述哀紀第十一孝平不造新都作宰不周不伊䘮我四海師古曰造成也遭家業不成周頌曰閔予小子遭家不造故引之也言其自號宰衡而無周公伊尹之志也述平紀第十二漢初受命諸侯並政制自項氏十有八姓述異姓諸侯王表第一太祖元勲啓立輔臣支庶藩屏侯王並尊述諸侯王表第二侯王之祉祚及宗子公族蕃滋支葉碩茂師古曰茂合韻音莫口反述王子侯表第三受命之初贊功剖符奕世𢎞業爵土廼昭師古曰贊功佐命之功也奕大也述髙恵髙后孝文功臣侯表第四景征吳楚武興師旅後昆承平亦有紹土師古曰言景武之時以軍功故封侯者多昭宣以後雖承平尚有以勲𫉬爵土者也宋祁曰監本浙本越本作亦猶有紹述景武昭宣元成哀功臣侯表第五亡徳不報爰存二代應劭曰二代二王後也師古曰二代謂殷周也言徳澤深逺故至漢朝其子孫又受茅土以奉祭祀宰相外戚昭韙見戒張晏曰韙是也明其是者戒其非也韋昭曰昭明也韙是也述外戚恩澤侯表第六漢廸于秦有革有因劉徳曰廸至也觕舉僚職並列其人晉灼曰觕音麄觕之觕師古曰觕音才户反謂大略也述百官公卿表第七篇章博舉通于上下略差名號九品之叙述古今人表第八元元本本數始於一張晏曰數之元本起於初九之一也産氣黄鍾造計秒忽劉徳曰秒禾芒也忽蜘蛛網細者也師古曰秒音眇其字從禾八音七始五聲六律劉徳曰七始天地四方人之始也師古曰解在禮樂志度量權衡歴算逌出師古曰逌古攸字也攸所也官失學微六家分乖劉徳曰六家謂黄帝顓頊夏殷周魯歴也壹彼壹此庶研其㡬述律歴志第一上天下澤春雷奮作劉徳曰兌下乾上履坤下震上豫履禮也豫樂也取易象制禮作樂師古曰易象曰上天下澤履雷出地奮豫故具引其文先王觀象爰制禮樂厥後崩壞鄭衛荒􅁋風流民化湎湎紛紛師古曰言上風既流下人則化也湎湎流移也紛紛雜亂也湎音莫踐反略存大綱以統舊文述禮樂志第二雷電皆至天威震耀五刑之作是則是效劉徳曰震下離上噬嗑利用獄雷電取象天威也師古曰易象辭曰雷電噬嗑先王以明罰敕法故引之威實輔徳刑亦助教季世不詳背本争末師古曰不詳謂不盡用刑之理也周書吕刑曰告爾詳刑吳孫狙詐申商酷烈師古曰狙音干豫反漢章九法太宗改作張晏曰改除肉刑也輕重之差世有定籍述刑法志第三厥初生民食貨惟先割制廬井定爾土田什一供貢下富上尊商以足用茂遷有無貨自龜貝至此五銖揚㩁古今監世盈虚師古曰揚舉也㩁引也揚㩁者舉而引之陳其趣也㩁音居學反述食貨志第四昔在上聖昭事百神類帝禋宗望秩山川明徳惟馨永世豐年季末滛祀營信巫史鄧展曰營惑也大夫臚岱侯伯僭畤鄭氏曰臚岱季氏旅於太山是也應劭曰僭畤秦文公造西畤祭天是也師古曰旅陳也臚亦陳也臚旅聲相近其義一耳放誕之徒緣間而起師古曰謂方士言神仙之術也瞻前顧後正其終始述郊祀志第五炫炫上天縣象著明師古曰炫炫光耀之貌音胡眄反縣古懸字日月周輝星辰垂精百官立法宫室混成張晏曰星辰有宫室百官各應其象以見咎徴也䧏應王政景以燭形張晏曰王政失於此星辰變於彼猶景之象形三季之後厥事放紛師古曰三季三代之末也放失也紛亂也舉其占應覽故考新述天文志第六河圖命庖洛書賜禹八卦成列九疇逌敘李竒曰河圖即八卦也洛書即洪範九疇也師古曰庖庖犧也逌古攸字宋祁曰庖當作宓三代寔寳光演文武春秋之占咎徴是舉告徃知來王事之表述五行志第七坤作墬埶髙下九則張晏曰易曰地埶坤劉徳曰九則九州土田上中下九等也師古曰墬古地字易象曰地埶坤君子以厚徳載物髙下謂地形也一曰地之肥瘠自昔黄唐經略萬國爕定東西疆理南北師古曰爕和也疆理謂立封疆而統理之三代損益降及秦漢革剗五等制立郡縣晉灼曰剗音剗削之剗師古曰音初限反服䖍曰剗音剪韋昭曰剗音鏟剗削也略表山川彰其剖判述地理志第八夏乘四載百川是導師古曰四載解在溝洫志惟河為囏災及後代商竭周移秦决南涯服䖍曰河竭而商亡移亦河移徙也如淳曰秦始皇本紀決河灌大梁遂滅之通為溝入淮泗自茲距漢北亡八支服䖍曰本有九河今塞餘有一也文陻棗野武作瓠歌服䖍曰陻音因文帝塞河於酸棗也張晏曰河決瓠子武帝親臨悼功不成而作歌成有平年後遂滂沱劉徳曰成帝治河已平改元曰河平元年韋昭曰成帝時河復決王延八世塞之河水平因改年曰河平爰及溝渠利我國家述溝洫志第九虙羲畫卦書契後作師古曰虙讀與伏同虞夏商周孔纂其業篹書刪詩綴禮正樂師古曰篹與撰同彖系大易因史立法師古曰謂修春秋定帝王之文六學既登遭世罔𢎞師古曰罔無也無能𢎞大正道也羣言紛亂諸子相騰師古曰騰馳也秦人是滅漢修其缺劉向司籍九流以别應劭曰儒道隂陽法名墨從横雜農凡九家爰著目錄略序洪烈師古曰洪大也烈業也述蓺文志第十上嫚下暴惟盜是伐師古曰易上繫辭云小人而乗君子之􅄊盗斯奪之矣上嫚下暴盜斯伐之矣引此言者謂秦胡亥之時勝廣熛起梁籍扇烈師古曰飛火曰熛扇熾也烈猛也言陳勝初起而項羽烈盛也熛音必遥反赫赫炎炎遂焚咸陽宰割諸夏命立侯王誅嬰放懷詐虐以亡述陳勝項籍𫝊第一張陳之交游如父子擕手􅋟秦拊翼俱起應劭曰􅋟逃也師古曰􅋟古遯字也拊翼以鷄為喩言知將旦則鼔撃其翼而鳴也據國争權還為豺虎師古曰言反相吞噬也耳謀甘公作漢藩輔述張耳陳餘𫝊第二三枿之起本根既朽劉徳曰詩云包有三枿爾雅曰烈枿餘也謂木斫髠而復枿生也喩魏齊韓皆滅而復起若髠木更生也師古曰枿音五葛反枯楊生華曷惟其舊應劭曰易云枯楊生華暫貴之意也曷惟其舊言不能久也師古曰枯楊生華大過卦九五爻辭也舊合韻音臼横雖雄材伏于海隝沐浴尸鄉北面奉首旅人慕殉義過黄鳥劉徳曰黃烏之詩刺秦穆公要人從死言今横不要而有從者故曰過之述魏豹田儋韓信𫝊第三信惟餓隸布實黥徒越亦狗盜芮尹江湖張晏曰吳芮為番陽令在江湖之間尹主也雲起龍襄化為侯王師古曰襄舉也割有齊楚跨制淮梁張晏曰韓信前王齊徙楚英布王淮南彭越王梁也綰自同閈鎮我北疆應劭曰閈音扞盧綰與高祖同里楚名里門為閈師古曰左氏𫝊云高其閈閎舊通語耳非專楚也徳薄位尊非胙惟殃呉克忠信𦙍嗣廼長述韓彭英盧吳𫝊第四賈廑從旅為鎮淮楚張晏曰劉賈晩乃從軍也晉灼曰廑無㡬也師古曰二說皆非也廑古以為勤字言賈從軍有勤勞也澤王琅邪權激諸吕濞之受吳疆土踰矩師古曰矩法制也雖戒東南終用齊斧張晏曰齊斧越斧也以整齊天下也晉灼曰雖戒勿反而反竟用此斧於吳也師古曰易云喪其齊斧故引以為辭述荆燕吳𫝊第五太上四子伯兮早夭仲氏王代斿宅于楚師古曰詩衛風云伯兮朅兮鄁風又曰仲氏任只此序方論高祖兄伯及仲故引二句為之辭也戊實􅁋􅆙平陸廼紹師古曰楚王戊為薄太后服姦削東海郡遂與呉共反而誅文帝更立平陸侯禮續元王之後也宋祁曰注文浙本改文帝作景帝其在于京奕世宗正師古曰正合韻音征劬勞王室用侯陽成子政博學三世成名師古曰謂劉徳劉向劉歆俱有名聞述楚元王𫝊第六季氏之詘辱身毁節信于上將議臣震栗張晏曰申意於上將上將樊噲也欲以十萬衆横行匈奴中布曰噲可斬也時議臣皆恐師古曰信讀曰申欒公哭梁田叔殉趙見危授命誼動明主布歴燕齊叔亦相魯民思其政或金或社李竒曰魯人愛田叔死送之以金齊貴欒布為生立社述季布欒布田叔𫝊第七髙祖八子二帝六王三趙不辜淮厲自亡燕靈絶嗣齊悼特昌掩有東土自岱徂海支庻分王前後九子六國誅斃適齊亡祀城陽濟北後承我國張晏曰濟北王志吳楚反後徙王菑川元朔中齊國絶悼惠王後唯有城陽菑川武帝乃割臨菑環悼惠王冢以與菑川令奉祀也師古曰適讀曰嫡赳赳景王匡漢杜稷師古曰赳赳武貎音糾述髙五王𫝊第八猗與元勲包漢舉信劉德曰包取也師古曰包漢謂勸高祖且王漢中也舉信舉韓信也信合韻音新鎮守闗中足食成軍營都立宫定制修文平陽𤣥黙繼而弗革師古曰革改也言曹參為相守静無為一遵蕭何約束不變改也民用作歌化我淳徳漢之宗臣是謂相國述蕭何曹參𫝊第九留侯襲秦作漢腹心劉徳曰襲秦椎始皇於博浪沙中圖折武關解阸鴻門師古曰圖折武闗謂從沛公入武闗說令為疑兵又啗秦將以利勸因其怠懈擊之類也推齊銷印􅇌致越信師古曰􅇌與驅同越彭越也信亦韓信也謂於垓下圍項羽時也信合韻音新招賔四老惟寧嗣君陳公擾攘歸漢廼安師古曰攘音人養反斃范亡項走狄擒韓師古曰走狄謂解平城之圍也禽韓偽遊雲夢也六竒既設我罔艱難師古曰罔無也安國廷争致仕杜門絳侯矯矯誅吕尊文亞夫守節吳楚有勲述張陳王周𫝊第十舞陽鼓刀滕公廐騶師古曰鼔刀謂屠狗也潁隂商販曲周庸夫攀龍附鳳並乘天衢師古曰乗登也述樊酈滕灌傅靳周𫝊第十一北平志古司秦柱下師古曰志記也謂多記古事也司主也定漢章程律度之緒建平質直犯上干色師古曰周昌先封建成侯蓋謂此也平字當為成𫝊寫誤耳廣阿之廑食厥舊徳張晏曰任敖也吏遇呂后不謹敖擊傷主吏也師古曰廑亦勤字也易訟卦六三爻辭曰食舊徳食猶饗也故安執節責通請錯蹇蹇帝臣匪躬之故師古曰易蹇卦六二爻辭曰王臣蹇蹇匪躬之故此言申屠嘉召責鄧通請誅晁錯皆不為已身實有蹇蹇之節也述張周趙任申屠𫝊第十二食其監門長揖漢王畫襲陳留進収敖倉塞隘杜津王基以張師古曰杜亦塞也謂說令塞白馬津賈作行人百越來賔從容風議博我以文李竒曰作新語也師古曰論語稱顔囘喟然歎曰夫子博我以文謂以文章開博我也此言陸賈嘗之越也從音干容反風讀曰諷敬繇役夫遷京定都師古曰繇讀與由同言劉敬由戍卒而來納說内强關中外和匈奴叔孫奉常與時抑揚稅介免胄禮儀是創師古曰稅舎也介甲也創始造之也創合韻音初良反或悊或謀觀國之光師古曰詩小雅小旻之篇曰或悊或謀言有智者有謀者易觀卦六四爻辭曰觀國之光利用賔于王故合而為言述酈陸朱婁叔孫𫝊第十三師古曰本傳作朱劉終書其賜姓也此言朱婁本其舊族耳淮南僭狂二子受殃安辯而邪賜頑以荒敢行稱亂窘世薦亡師古曰窘仍也薦讀曰荐荐再也長遷死雍其子安又自殺也述淮南衡山濟北𫝊第十四蒯通壹說三雄是敗覆酈驕韓田横顚沛被之拘繋廼成患害師古曰言伍被初不從王反王繫其父母乃進邪謀終以遇害也充躬罔極交亂𢎞大師古曰小雅青蠅之詩云讒言罔極交亂四國此敘言江充息夫躬之惡引以為辭也述蒯伍江息夫𫝊第十五萬石溫溫幼寤聖君鄧展曰爾雅寤逢遇也師古曰此說非也言萬石幼而㳟謹感寤高祖以見識拔也爾雅云還遇也非謂寤也詩小雅小宛之篇曰溫温㳟人宜爾子孫夭夭伸伸師古曰詩周南螽斯之篇曰宜爾子孫振振兮論語稱孔子燕居伸伸如也天天如也謂和舒之貎此言萬石子孫旣多又皆和睦故引以為辭也天音於驕反慶社于齊不言動民鄧展曰慶為齊相齊為立社也衛直周張淑慎其身師古曰衛詩燕燕之篇曰終溫且惠淑慎其身淑善也引此詩言以羙四人也述萬石衛直周張𫝊第十六孝文三王代孝二梁師古曰代孝王參及梁孝王武梁懷王揖懷折亡嗣孝乃尊光師古曰折謂夭也孝亦謂梁孝王也内為母弟外扞呉楚怙寵矜功僭欲失所思心既霿牛旤告妖師古曰霿僭霿也音莫候反解在五行志帝庸親親厥國五分師古曰庸用也用親親之道故分梁為五國立孝王男五人為王太子買為梁王次子明為濟川王彭離為濟東王定為山陽王不識為濟隂王徳不堪寵四支不𫝊晉灼曰子父母之四支也師古曰此說非也謂孝王支子四人封為王者皆絶於身不𫝊𦙍嗣唯梁㳟王買有後耳其事具在本𫝊述文三王𫝊第十七賈生矯矯弱冠登朝師古曰矯矯高舉之貎也合韻音驕遭文叡聖屢抗其疏暴秦之戒三代是據建設藩屏以强守圉師古曰圉合韻音御吳楚合從賴誼之慮師古曰勸文帝大封梁淮陽梁卒距呉楚不得令西也從音子庸反述賈誼𫝊第十八子絲慷慨激辭納說師古曰爰盎字絲此加子者子是嘉稱以偶句耳㩜轡正席顯陳成敗師古曰㩜執取也其字從手亦或作􅒆錯之𤨏材智小謀大師古曰易下繫辭曰徳薄而位尊智小而謀大力少而任重鮮不及矣此敘言鼂錯所以及禍旤如發機先宼後害師古曰𤼵機言其速也呉楚未敗之前錯已誅死述爰盎鼂錯𫝊第十九釋之典刑國憲以平馮公矯魏增主之明張晏曰矯辭以免魏尚也師古曰張說非也矯正也正言其事長孺剛直義形于色下折淮南上正元服師古曰淮南王謀反憚黯正直武帝不冠不見黯故云下折淮南上正元服也元首也故謂冠為元服莊之推賢於兹為徳述張馮汲鄭𫝊第二十榮如辱如有機有樞劉德曰易曰樞機之發榮辱之主也張晏曰乍榮乍辱如辭也自下摩上惟徳之隅師古曰詩大雅抑之篇曰抑抑威儀惟徳之隅言有㢘隅也此敘言賈山直詞刺上亦為方正也一曰隅謂得道徳之一隅也賴依忠正君子采諸師古曰諸之也述賈鄒枚路𫝊第二十一魏其翩翩好節慕聲師古曰翩翩自喜之貎灌夫矜勇武安驕盈凶徳相挻旤敗用成師古曰挻謂柔挻也音式延反蕭該音義曰韋昭曰相挻極也淮南子曰陶人之尅挻植許慎曰挻抑也太𤣥經曰與隂陽挻其化宋忠曰挺和方言曰挻取也聲類曰挻一曰柔也老子曰挻植以為器安國壯趾王恢兵首孟康曰易壯于趾征凶安國臨當為丞相墯車蹇後為將多所傷失而憂死此為不宜征行而有凶也師古曰壯于趾大壯初九爻辭也壯傷也趾足也直謂墯車蹇耳不言不宜征行也彼若天命此近人咎師古曰彼韓安國也此王恢也壯趾天命也謀兵人咎也述竇田灌韓𫝊第二十二景十三王承文之慶師古曰言景帝庸主耳所以子皆得王者由文帝之徳慶流子孫也慶合韻音卿魯恭館室江都訬輕師古曰訬謂輕狡也音初敎反蕭該音義曰蘓林曰訬音少年輕薄毁鈔息憙之鈔如淳音樵趙敬險詖中山􅁋醟師古曰詖辯也一曰佞也醟酗酒也音詠合韻音榮長沙寂漠廣川亡聲膠東不亮常山驕盈如淳曰亮信也聞淮南謀反作戰具守備後辭及之𤼵病死是為不信於漢朝四國絶祀河閒賢明李奇曰臨江哀王閼臨江閔王榮膠西于王端清河哀王乘皆無子國除禮樂是修為漢宗英述景十三王𫝊第二十三李廣恂恂實𫉬士心控弦貫石威動北隣師古曰北隣謂匈奴也躬戰七十遂死于軍敢怨衛青見討去病陵不引决忝世滅姓師古曰忝辱也蘇武信節不詘王命師古曰信讀曰申述李廣蘇建𫝊第二十四長平桓桓上將之元師古曰桓桓武貎也元首也薄伐獫允恢我朔邊師古曰恢廣也戎車七征衝輣閑閑鄧展曰輣兵車名也師古曰輣音彭合圍單于北登闐顔票騎冠軍猋勇紛紜師古曰如猋之勇紛紜然盛也長驅六舉電撃雷震師古曰六舉凡六出擊匈奴也震合韻音之人反飲馬翰海封狼居山西規大河列郡祁連張晏曰置郡至祁連山述衛青霍去病𫝊第二十五抑抑仲舒再相諸侯師古曰爾雅云抑抑密也身修國治致仕縣車下惟覃思論道屬書師古曰屬音之欲反讜言訪對為世純儒師古曰讜善言也訪對謂對所訪也讜音黨述董仲舒𫝊第二十六文豔用寡子虚烏有寓言􅁋麗託風終始師古曰寓寄也風讀曰諷多識博物有可觀采蔚為辭宗賦頌之首師古曰蔚文采盛也音鬱述司馬相如𫝊第二十七平津斤斤晚躋金門師古曰斤斤明察也躋升也金門金馬門也既登爵位祿賜頤賢師古曰頤養也謂引招賢人而養之宋祁曰注末當有也字布衾疎食用儉飭身師古曰飭謹卜也讀與敕同式耕牧以求其志忠寤明君廼爵廼試兒生斖斖束髮修學師古曰斖斖勉也偕列名臣從政輔治述公孫𢎞卜式兒寛𫝊第二十八張湯遂逹用事任職媚兹一人日旰忘食師古曰詩大雅下武之篇曰媚兹一人應侯慎徳一人天子也媚愛也此敘言張湯見愛於武帝既成寵祿亦罹咎慝安世溫良塞淵其徳師古曰詩鄁風燕燕之篇曰仲氏任只其心塞淵淵深也塞實也謂其徳既實且深也此敘言子孺亦有之子孫遵業全祚保國述張湯𫝊第二十九杜周治文唯上淺深師古曰言觀天子之意用取世資幸而免身延年寛和列于名臣欽用材謀有異厥倫師古曰倫類也言異其本類述杜周𫝊第三十博望杖節収功大夏貳師秉鉞身釁胡社李奇曰李廣利胡殺之以血塗社也師古曰釁者以血祭耳非塗之血也致死為福每生作旤師古曰每貪也張騫致死封侯李廣利求生而死也述張騫李廣利𫝊第三十一嗚呼史遷薰胥以刑晉灼曰齊韓魯詩作薰薫帥也從人得罪相坐之刑也師古曰晉說近是矣詩小雅雨無正之篇曰若此無罪淪胥以鋪胥相也鋪徧也言無罪之人遇於亂政横相牽率徧得罪也韓詩淪字作薫薫者謂相薫蒸亦漸及之義耳此敘言史遷因坐李陵横得罪也蕭該音義曰韋昭曰腐刑必薫之餘殘曰胥幽而發憤廼思廼精錯綜羣言古今是經勒成一家大略孔明師古曰孔甚也述司馬遷𫝊第三十二孝武六子昭齊亡嗣如淳曰昭帝及齊王無嗣也師古曰嗣合韻音祚燕刺謀逆廣陵祝詛昌邑短命昬賀失據戾園不幸宣承天序師古曰序合韻音似豫反述武五子𫝊第三十三六世耽耽其欲浟浟師古曰六者謂武帝也易頤卦六四爻辭曰虎視耽耽其欲浟浟耽耽威視之貎也浟浟欲利之貎也耽音丁含反浟音滌今易浟字作逐蕭該音義曰耽蘓林音潭晉灼音義及今漢書本作悠悠應劭曰易曰虎視眈耽字林曰耽視近而忘逺也音大含反應劭曰耽近也悠逺也言武帝内興文學外耀神武耽耽悠悠而盛也余謂耽當音當含反文武方作是庸四克晉灼曰方並也師古曰言並任文武之臣是用克開四方也助偃淮南數子之徳不忠其身善謀於國師古曰淮南謂淮南王安諫武帝不宜興兵討越也述嚴朱吾丘主父徐嚴終王賈𫝊第三十四東方贍辭詼諧倡優師古曰詼音恢譏苑扞偃正諫舉郵師古曰郵與尤同尤過也懷肉汙殿弛張沈浮述東方朔𫝊第三十五葛繹内寵屈氂王子師古曰公孫賀妻衛皇后姊故云内寵也千秋時發宜春舊仕張晏曰千秋訟衛太子􅁈𤼵言值時也師古曰宜春侯王訢也敞義依霍庻㡬云已如淳曰若此人等無益於治可為庶㡬而已也師古曰敞楊敞義蔡義𢎞惟政事萬年容已咸睡厥誨孰為不子述公孫劉田楊王蔡陳鄭𫝊第三十六王孫臝𦵏建廼斬將雲廷訐禹福逾刺鳳師古曰逾逺也是謂狂狷敞近其衷師古曰衷中也論語稱孔子曰不得中行而與之必也狂狷乎此言朱雲以上蓋狂狷耳云敞之操近於中行也衷音竹仲反述楊胡朱梅云𫝊第三十七博陸堂堂受遺武皇師古曰論語稱曾子曰堂堂乎張也蓋羙子張儀形盛也故引之擁毓孝昭末命導揚劉徳曰武帝臨終之命霍光能導逹顯揚也遭家不造立帝廢王權定社稷配忠阿衡懷祿耽寵漸化不詳隂妻之逆至子而亡師古曰隂謂覆蔽之也秺侯狄孥䖍恭忠信師古曰匈奴休屠王之子故曰狄孥秺音妬信合韻音新奕世載徳貤于子孫師古曰貤延也音弋豉反述霍光金日磾𫝊第三十八兵家之䇿惟在不戰營平皤皤立功立論師古曰皤皤白髮貎也音蒲何反以不濟可上諭其信師古曰春秋左氏𫝊晏子對齊景公曰君所謂可而有不焉臣獻其不以成其可此敘言宣帝令擊西羌充國不從固上屯田之䇿也武賢父子虎臣之俊述趙充國辛慶忌𫝊第三十九義陽樓蘭長羅昆彌安逺日逐義成郅支陳湯誕節救在三悊師古曰三悊謂劉向谷永耿育皆訟救湯也師古曰誕節言其放縱不拘也會宗勤事疆外之桀述𫝊常鄭甘陳段𫝊第四十不疑膚敏應變當理劉徳曰膚美也敏疾也言於闕下卒變定方遂詐非衛太子也師古曰詩大雅文王之篇曰殷士膚敏謂㣲子也故引以為辭辭霍不婚逡遁致仕師古曰遁讀與廵同疏克有終散金娛老定國之祚于其仁考廣徳當宣近於知恥晉灼曰當宣帝時始仕至元帝時以嵗惡民流便乞骸骨去此為知耻師古曰此說非也當為平當也宣彭宣也言廣徳平當彭宣三人不茍於祿位並為知恥也本𫝊贊曰薛廣徳保懸車之榮平當逡廵有恥彭宣見險而止異乎茍患失之者矣述雋疏于薛平彭𫝊第四十一四皓遯秦古之逸民不營不拔嚴平鄭真應劭曰爵祿不能營其志威武不能屈其身也易曰不可榮以祿又曰􅃀乎不可㧞也宋祁曰營當作榮吉困于賀湼而不緇禹既黄髮以徳來仕師古曰論語稱孔子曰不曰白乎湼而不緇湼汙泥也可以染皂緇黑色也言天性潔白者雖處汙湼之中其色不變也緇合韻音側仕反舎惟正身勝死善道郭欽蔣詡近遯之好應劭曰易曰好遯君子吉言遭暴亂之世好以和順遯去不離其害也述王貢兩龔鮑𫝊第四十二扶陽濟濟聞詩聞禮𤣥成退讓仍世作相師古曰仍頻也漢之宗廟叔孫是謨革自孝元諸儒變度如淳曰造迭毁之議也師古曰謨謀也合韻音慕國之誕章博載其路師古曰誕大也謂憲章之大者故廣載之述韋賢𫝊第四十三髙平師師惟辟作威圖黜凶害天子是毗鄧展曰師師相師法也師古曰尚書洪範云惟辟作威言威權者唯人君得作之耳詩小雅節南山之篇曰尹氏太師惟周之氐秉國之鈞四方是維天子是毗言大臣之職輔佐天子者也此敘言魏相欲崇君道而黜私權故引書詩以為言也博陽不伐含𢎞光大天誘其𠂻慶流苖裔述魏相丙吉𫝊第四十四占徃知來幽贊神明師古曰易上繫辭曰神以知來知以藏往言蓍卦之徳兼神知也說卦曰昔者聖人之作易也幽贊於神明而生蓍言欲深致神明之道助以成敎故為蓍卜也茍非其人道不虚行師古曰下繫之辭也言人能𢎞道非其人則不能𫝊學微術昧或見仿佛疑殆匪闕違衆迕世師古曰論語稱孔子曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔殆危也謂有疑則闕之也此敘言術士不闕疑殆故􅇜禍難也淺為尤悔深作敦害師古曰尤過也敦厚也述眭兩夏侯京翼李𫝊第四十五廣漢尹京克聰克明延夀作翊既和且平矜能訏上俱䧟極刑翁歸承風帝揚厥聲張晏曰受任為右扶風卒宣帝下詔襃揚賜金百斤敞亦平平文雅自贊師古曰平讀曰便便辯也贊助也以文雅助治術也一說贊進也以文雅自進也尊實赳赳邦家之彦師古曰赳赳材勁貎也音糾章死非辠士民所歎述趙尹韓張兩王𫝊第四十六寛饒正色國之司直豐繄好剛輔亦慕直師古曰繄是也音烏奚反皆陷狂狷不典不式師古曰典經也式法也崇執言責隆持官守如淳曰崇為尚書僕射是言責之官也哀帝及傅太后欲封從弟商崇諫不聽也晉灼曰隆諌武庫兵不宜以給董賢家此為持官守也寳曲定陵並有立志鄧展曰孫寳曲撓定陵侯淳于長也晉灼曰何並斬侍中王林卿奴是立志也述蓋諸葛劉鄭毋將孫何𫝊第四十七師古曰本傳毋將隆在孫寳下今此敘云毋將孫何是敘誤也長倩懙懙覿霍不舉蘓林曰懙懙行歩安舒也師古曰不肯露索而見霍光故不得大官也懙音弋於反遇宣廼㧞𫝊元作輔不圖不慮見躓石許師古曰詩小雅雨無正之篇云旻天疾威不慮不圖也慮思也圖謀也言幽王見天之威不思謀也此敘言望之思謀不詳卒為石顯及許史所顚躓也躓音竹二反宋祁曰見字當作顚述蕭望之𫝊第四十八子明光光發迹西疆列於禦侮厥子亦良述馮奉世𫝊第四十九宣之四子淮陽聰敏師古曰敏疾也合韻音美舅氏蘧蒢㡬䧟大理師古曰蘧蒢口柔觀人顔色而為辭佞者也言淮陽憲王舅張博為諂辭㡬陷王於大罪也蘧音渠蒢音除㡬音鉅依反楚孝惡疾東平失軌師古曰惡疾謂眚病也軌法則也中山凶短母歸戎里張晏曰戎氏女歸戎氏之里也元之二王孫後大宗孟康曰謂哀帝平帝昭而不穆大命更登鄧展曰昭而不穆有父無子張晏曰大命帝位也師古曰更音工衡反述宣元六王𫝊第五十樂安褏褏古之文學師古曰褏褏盛貎也音弋救反學合韻音下教反民具爾瞻困于二司師古曰詩小雅節南山之篇曰赫赫師尹民具爾瞻言師尹之任位尊職重下所瞻望而乃為不善乎深責之也此敘言匡衡失徳不終相位故引以為辭耳二司者司隸校尉王尊劾奏衡追奏石顯揚著先帝任用傾覆之臣司隸校尉王駿劾奏衡專地盜土也司合韻音先寺反安昌貨殖朱雲作娸晉灼曰娸醜也師古曰朱雲廷言欲斬張禹是為醜惡之娸娸音欹合韻音丘吏反博山敦慎受莽之疚師古曰疚病也孔光後更曲意從莽之欲以病其徳行也述匡張孔馬𫝊第五十一樂昌篤實不撓不詘遘閔既多是用廢黜師古曰詩鄁栢舟曰遘閔既多受侮不少遘遇也閔病也謂見病害甚衆也此敘言王商深為王鳳所排陷也武陽殷勤輔導副君既忠且謀饗兹舊勲髙武守正因用濟身師古曰言傅喜不阿附傅太后故得免禍述王商史丹傅喜𫝊第五十二髙陽文法揚鄉武略政事之材道徳惟薄位過厥任鮮終其祿師古曰鮮少也音先典反博之翰音鼔妖先作劉徳曰易曰翰音登于天貞凶上九處非其位亢極故何可長也位在上高故曰翰音博拜時聞有鼔聲也師古曰翰音登于天中孚卦上九爻辭也翰音高飛而自嗚喩居非其位聲過其實也述薛宣朱博𫝊第五十三髙陵修儒任刑養威用合時宜器周世資義得其勇如虎如貔進不跬歩宗為鯨鯢師古曰半歩曰跬音空橤反述翟方進𫝊第五十四統微政缺災眚屢發永陳厥咎戒在三七鄴指丁傅略窺占術述谷永杜鄴𫝊第五十五哀平之䘏丁傅莽賢武嘉戚之乃䘮厥身髙樂廢黜咸列貞臣述何武王嘉師丹傳第五十六淵哉若人實好斯文初擬相如獻賦黄門輟而覃思草法篹𤣥師古曰輟止也篹與撰同言止不復作賦草創法言及撰太𤣥經也斟酌六經放易象論師古曰放音甫往反論論語也􅅗于篇籍以章厥身師古曰章明也述揚雄𫝊第五十七獷獷亡秦滅我聖文師古曰獷獷麤惡之貎言無親也獷音穬又音九永反漢存其業六學析分是綜是理是綱是紀師徒彌散著其終始師古曰散謂分派也述儒林𫝊第五十八誰毁誰譽譽其有試師古曰論語稱孔子曰吾之於人誰毁誰譽如有所譽其有所試此敘言人之從政可試而知故引以為辭也泯泯羣黎化成良吏師古曰黎衆也言羣衆無知從吏之化而成俗也淑人君子時同功異沒世遺愛民有餘思述循吏𫝊第五十九上替下陵姦軌不勝猛政横作刑罰用興曾是强圉掊克為雄師古曰詩大雅蕩之篇曰曾是强圉曾是掊克强圉强梁禦善也掊克好聚斂克害人也言任用此人為虐於下也掊音平侯反報虐以威殃亦凶終師古曰尚書呂刑曰皇帝哀矜庶戮之不辜報虐以威言哀閔不辜之人横被殺戮乃報答為虐者以威而誅絶也述酷吏𫝊第六十四民食力罔有兼業大不􅁋侈細不匱乏蓋均無貧遵王之法師古曰論語稱孔子曰蓋均無貧言為政平均不相陵奪則無匱乏之人也故引之靡法靡度民肆其詐師古曰肆極也偪上幷下􅂽殖其貨師古曰荒大也侯服玉食敗俗傷化張晏曰玉食珍食也述貨殖𫝊第六十一開國承家有法有制家不臧甲國不専殺師古曰殺合韻音所例反矧乃齊民作威作恵師古曰矧況也齊民齊等之人也如台不匡禮法是謂如淳曰台我也我國家也師古曰匡正也台音怡述游俠𫝊第六十二彼何人斯竊此富貴營損髙明作戒後世師古曰詩小雅巧言之篇刺讒人也其詩曰彼何人斯居河之糜賤而惡之也此敘亦深疾佞幸之人故引詩文以譏之營惑也述佞幸𫝊第六十三於惟帝典戎夷猾夏師古曰於歎辭也帝典虞書舜典也載舜命咎繇作士戒之曰蠻夷猾夏猾亂也夏諸夏也於讀曰烏周宣攘之亦列風雅師古曰攘郤也宗幽既昬􅁋于襃女師古曰宗幽幽王居宗周也戎敗我驪遂亡酆鄗張晏曰申侯與戎共伐周敗於驪山下遂殺幽王平王東徙都成周大漢初定匈奴强盛圍我平城寇侵邊境師古曰境合韻音竟至于孝武爰赫斯怒王師雷起霆撃朔野師古曰霆疾雷也音廷宣承其末廼施洪徳震我威靈五世來服師古曰自宣至平凡五帝王莽竊命是傾是覆備其變理為世典式述匈奴𫝊第六十四西南外夷種别域殊南越尉佗自王番禺攸攸外寓閩越東甌師古曰攸攸逺貎爰洎朝鮮燕之外區漢興柔逺與爾剖符師古曰柔安也剖符謂封之也皆恃其岨乍臣乍驕孝武行師誅滅海隅述西南夷兩越朝鮮𫝊第六十五西戎即序夏后是表張晏曰表外也禹就敘以為外國也師古曰此說非也表明也明以徳化也周穆觀兵荒服不旅張晏曰觀示也旅陳也犬戎終王而朝周穆王以不享征之是以荒服不陳於廷也漢武勞神圖逺甚勤王師驒驒致誅大宛鄭氏曰驒驒盛也師古曰此說非也小雅四牡之詩曰四牡騑騑驒驒駱馬驒驒喘息之貌馬勞則喘此敘言漢逺征西域人馬疲弊也驒音它丹反姼姼公主廼女烏孫孟康曰姼音題姼姼惕惕愛也師古曰此説非也姼音上支反姼姼好貎也魏詩葛屨之篇曰好人提提音義同耳女妻也音乃據反言漢以好女配烏孫也使命廼通條支之瀕師古曰瀕涯也音頻又音賔昭宣承業都護是立總督城郭三十有六修奉朝貢各以其職述西域𫝊第六十六詭矣禍福刑于外戚師古曰詭違也言禍福相違終始不一也髙后首命吕宗顛覆薄姬䃍魏宗文産徳如淳曰薄姬在魏許負相當生天子魏豹聞負言不與漢遂禽而死也師古曰䃍古墜字竇后違意考盤于代師古曰詩衛風曰考盤在澗考成也盤樂也此敘言竇姬初欲適趙而向代違其本意卒以成樂也王氏仄微世武作嗣子夫既興扇而不終師古曰扇熾也鈎弋憂傷孝昭以登上官㓜尊類禡厥宗應劭曰詩云是類是禡禮將征伐告天而祭謂之類告以事類也至所征伐之地表而祭之謂之禡禡者馬也馬者兵之首故祭其先神也言上官后雖幼尊貴家族以惡逆誅滅也師古曰禡音莫暇反史娣王悼身遇不祥及宣饗國二族後光恭哀産元夭而不遂卭成乗序履尊三世張晏曰至成帝乃崩也師古曰乗序謂登至尊之處也飛燕之妖禍成厥妹丁傅僭恣自求凶害中山無辜乃䘮馮衛師古曰馮昭儀中山孝王母也為傅氏所陷衛姬中山孝王后也為王莽所滅恵張景薄武陳宣霍成許哀傅平王之作事雖歆羡非天所度師古曰作起也度居也言恵帝至平帝王皇后七人時雖處尊位人心羡慕以非天意所居故終用不昌也度音徒各反怨咎若兹如何不恪師古曰恪敬也述外戚𫝊第六十七元后娠母月精見表師古曰娠音身遭成之逸政自諸舅師古曰言成帝貪自􅇣樂而委政於王氏陽平作威誅加卿宰師古曰謂王商及王章也成都煌煌假我明光師古曰煌煌熾貌曲陽歊歊亦朱其堂師古曰歊歊氣盛也音許驕反新都亢極作亂以亡述元后𫝊六十八咨爾賊臣簒漢滔天行驕夏癸虐烈商辛張晏曰桀名癸紂名辛偽稽黄虞繆稱典文師古曰稽考也衆怨神怒惡復誅臻張晏曰復周也臻至也十二嵗嵗星一復莽稱帝十三嵗而見誅也左氏𫝊曰美惡周必復師古曰復音扶目反百王之極究其姦昏述王莽𫝊第六十九凡漢書敘帝皇張晏曰十二紀也列官司建侯王張晏曰百官表及諸侯王表也準天地統隂陽張晏曰準天地天文志也統合也隂陽五行志也闡元極歩三光張晏曰闡大也元始也極至也三光日月星也大推上極元始以來及星辰度數謂律歴志分州域物土疆張晏曰地理及溝洫志也窮人理該萬方張晏曰人理古今人表萬方謂郊祀志有日月星辰天下山川人鬼之神緯六經綴道綱張晏曰蓺文志也總百氏贊篇章師古曰贊明也函雅故通古今張晏曰包含雅訓之故及古今之語正文字惟學林師古曰信惟文學之林藪也凡此總說帝紀表志列𫝊備有天地鬼神人事政治道徳術蓺文章汎而言之盡在漢書耳亦不皆如張氏所說也述敘𫝊第七十前漢書卷一百下前漢書巻一百下考證為春秋考紀表志𫝊凡百篇注師古云云劉奉世云云臣召南按奉世糾師古之違似非也李賢注後書引前書音義曰春秋考紀謂帝紀也言考覈時事具四時以立言如春秋之經較師古注尤明不必以成訓考也賔禮故老優繇亮直注亮直謂朱雲也臣召南按顔注誤朱雲折檻事在成帝時此言元帝聽貢禹之言外割禁囿内損御服云爾連下二句讀其義自明賔禮故老謂于定國韋𤣥成薛廣徳之屬也述異姓諸侯王表第一按南史云劉之遴所校真本本紀及表志列𫝊相合為次總成三十八卷與今本異自兹距漢北亡八支臣召南按此則八支湮塞在秦漢之間矣緯書謂齊桓公塞八支以自廣終無所據成有平年注韋昭曰王延八世塞之按舊本誤衍八字當云王延世塞之信惟餓隸布實黥徒越亦狗盜芮尹江湖雲起龍襄化為侯王臣召南按劉之遴所校真本云淮隂毅毅伏劍周章邦之傑兮實維英彭仕為侯王雲起龍驤與今本大異以理推之邦字是髙祖諱又信越布後並誅滅史官安得盛稱其美必好事者為之也又按之遴言真本髙五子文三王景十三王孝武六子宣元六王悉次外戚下外戚次帝紀下如所云是十二紀之後即次外戚𫝊諸王𫝊矣其然豈其然乎賈作行人百越來賔從容風議博我以文注師古云云臣召南按師古謂從容二句亦指使越非也此二句指賈著新語每奏一篇髙祖稱善李竒說得之前漢書巻一百下考證
