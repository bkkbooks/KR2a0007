body:
  text: 前漢書卷九十五漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注西南夷兩粤朝鮮傳第六十五南夷君長以十數夜郎最大師古曰後為縣屬䍧柯郡其西靡莫之屬以十數滇最大師古曰地有滇池因為名也滇音顚自滇以北君長以十數卭都最大師古曰今之卭州本其地此皆椎結師古曰椎音直追反結讀曰髻為髻如椎之形也陸賈傳及貨殖傳皆作魋字音義同耳此下朝鮮傳亦同耕田有邑聚其外西自桐師以東北至葉楡師古曰葉楡澤名因以立號後為縣屬益州郡名為巂昆眀師古曰巂即今之巂州也昆明又在其西南卽今之南寜州諸所居是其地也巂音髓編髪師古曰編音歩典反隨畜移徙亡常處亡君長地方可數千里自巂以東北君長以十數徙莋都最大師古曰徙及莋都二國也徙後為徙縣屬蜀郡莋都後為沈黎郡徙音斯莋音材各反自莋以東北君長以十數冉駹最大師古曰今䕫州開州首領多姓冉者本皆冉種也駹音尨其俗或土著或移徙師古曰土著謂有常居著於土地也著音直畧反在蜀之西自駹以東北君長以十數白馬最大皆氐類也此皆巴蜀西南外蠻夷也始楚威王時使將軍莊蹻將兵循江上師古曰循順也謂縁江而上也蹻音居畧反畧巴黔中以西師古曰黔中即今黔州是其地本巴人也莊蹻者楚莊王苖裔也蹻至滇池方三百里師古曰地理志益州滇池縣其澤在西北華陽國志云澤下流淺狹狀如倒池故曰滇池旁平地肥饒數千里師古曰池旁之地也以兵威定屬楚欲歸報會秦擊奪楚巴黔中郡道塞不通因迺以其衆王滇變服從其俗以長之師古曰為其長帥也秦時嘗破畧通五尺道師古曰其處險阸故道纔廣五尺諸此國頗置吏焉十餘嵗秦滅及漢興皆棄此國而開蜀故徼師古曰西南之徼猶北方塞也徼音工釣反巴蜀民或竊出商賈取其莋馬僰僮旄牛以此巴蜀殷富建元六年大行王恢擊東粤東粤殺王郢以報恢因兵威使番陽令唐䝉風曉南粤師古曰番音蒲何反風讀曰諷南粤食蒙蜀枸醬晉灼曰枸音矩劉徳曰枸樹如桑其椹長二三寸味酢取其實以為醬美蜀人以為珍味師古曰劉說非也子形如桑椹耳緣木而生非樹也子又不長二三寸味尤辛不酢今宕渠則有之食讀曰飤蒙問所從來曰道西北牂柯江師古曰道由也由此而來江廣數里出番禺城下師古曰番音普安反禺音隅蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘歩足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也蒙迺上書說上曰南粤王黃屋左纛師古曰言為天子之車服地東西萬餘里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粤一奇也誠以漢之强巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙以郎中將劉攽曰當作中郎將後使相如以郎中將往諭同將千人食重萬餘人師古曰食粮及衣重也重音直用反從巴莋關入遂見夜郎侯多同師古曰多同其侯名也厚賜諭以威徳約為置吏使其子為令師古曰比之於漢縣也夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也迺且聽蒙約還報迺以為犍為郡發巴蜀卒治道自僰道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以郎中將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相饟師古曰饟古餉字數嵗道不通士罷餓餧離暑溼死者甚衆師古曰罷讀曰疲餧饑也離遭也餧音能賄反西南夷又數反發兵興擊耗費亡功師古曰耗損也音呼到反上患之使公孫𢎞往視問焉還報言其不便及𢎞為御史大夫時方築朔方據河逐胡𢎞等因言西南夷為害師古曰言通西南夷大為損害可且罷專力事匈奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就師古曰令自保守且脩成其郡縣及元狩元年博望侯張騫言使大夏時見蜀布卭竹杖問所從來曰從東南身毒國師古曰即天竺也亦曰捐篤也可數千里得蜀賈人市或聞卭西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匈奴隔其道誠通蜀身毒國道便近又亡害於是天子廼令王然于柏始昌呂越人等十餘輩閒出西南夷師古曰求閒隙而出也指求身毒國至滇滇王當羌廼留為求道師古曰當羌滇王名宋祁曰遷史當作嘗注云嘗一作賞四嵗餘宋祁曰据遷史當云為求道西此四字當屬上句作西皆閉昆明莫能通師古曰為昆明所閉塞滇王與漢使言漢孰與我大師古曰與猶如及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附師古曰言可專事招來之令其親附天子注意焉及至南粤反上使馳義侯因犍為發南夷兵且蘭君恐逺行旁國虜其老弱師古曰恐發兵與漢行後其國空虛而旁國來㓂鈔取其老弱也且音子餘反乃與其衆反殺使者及犍為太守漢廼發巴蜀罪人嘗擊南粤者八校尉擊之會越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭師古曰言因軍行而便誅之也斬首數萬遂平南夷為䍧柯郡夜郎侯始倚南粤南粤已滅還誅反者師古曰謂軍還而誅且蘭夜郎遂入朝上以為夜郎王南粤破後及漢誅且蘭卭君并殺莋侯冉駹皆震恐請臣置吏以卭都為粤巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粤破及誅南夷兵威風諭滇王入朝師古曰風讀曰諷滇王者其衆數萬人其旁東北勞深靡莫皆同姓相仗未肻聽師古曰仗猶倚也相依倚為援而不聽滇王入朝也仗音直亮反勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅師古曰言初始以來常有善意滇王離西夷師古曰言東嚮事漢滇舉國降劉攽口多一滇字宋祁曰郭本無滇字請置吏入朝於是以為益州郡賜滇王王印復長其民師古曰為之長帥西南夷君長以百入宋祁曰百入越本作數謝本作入獨夜郎滇受王印滇小邑也最寵焉後二十三嵗孝昭始元元年益州廉頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反師古曰並音伴遣水衡都尉發蜀郡犍為犇命萬餘人師古曰犇古奔字奔命解在昭紀擊牂柯大破之後三嵗姑繒葉榆復反遣水衡都尉呂辟胡將郡兵擊之師古曰辟音璧辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰士戰及溺死者四千餘人眀年復遣軍正王平與大鴻臚田廣明等並進大破益州斬首捕虜五萬餘級獲畜産十餘萬上曰鉤町侯亡波率其邑君長人民擊反者師古曰鉤音鉅于反町音大鼎反斬首捕虜有功其立亡波為鉤町王大鴻臚廣明賜爵關内侯食邑三百户後間嵗武都氐人反師古曰間嵗隔一嵗遣執金吾馬適建龍頟侯韓増與大鴻臚廣明將兵擊之至成帝河平中夜郎王興與鉤町王禹漏卧侯俞更舉兵相攻孟康曰漏卧夷邑名後為縣師古曰俞音踰更互也音工衡反牂柯太守請發兵誅興等議者以為道逺不可擊廼遣大中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽說大將軍王鳳曰大中大夫匡使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者選耎復守和解師古曰選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變廼以聞如此則復曠一時師古曰曠空也一時三月也言空廢一時不早發兵也王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉師古曰言起狂悖之心而殺守尉也逺臧温暑毒草之地雖有孫吳將賁育士師古曰孫孫武也吳吴􅁸也賁孟賁也育夏育也若入水火往必焦沒知勇亡所施屯田守之費不可勝量宜因其罪惡未成未疑漢家加誅隂􅃯旁郡守尉練士馬師古曰練簡也大司農豫調榖積要害處師古曰調發也要害者在我為要於敵為害也調音徒釣反選任職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之民聖王不以勞中國師古曰卽猶若也不毛言不生草木宜罷郡放棄其民絶其王侯勿復通如以先帝所立累世之功不可墮壞師古曰如亦若也墮毀也音火規反亦宜因其萌牙早斷絕之及已成形然後戰師則萬姓被害大將軍鳳於是薦金城司馬陳立為牂柯太守立者臨卭人前為連然長不韋令蘇林曰皆益州縣也蠻夷畏之及至牂柯諭告夜郎王興興不從命立請誅之未報廼從吏數十人出行縣師古曰行音下更反至興國且同亭師古曰且音子餘反召興興將數千人往至亭從邑君數十人入見立立數責因斷頭師古曰數音所具反邑君曰將軍誅亡狀為民除害願出曉士衆以興頭示之皆釋兵降師古曰釋解也鉤町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使奇兵絶其饟道縱反間以誘其衆師古曰間音居莧反都尉萬年曰兵久不決費不可共師古曰共讀曰供引兵獨進敗走趨立營師古曰趨讀曰趣趣向也立怒叱戲下令格之師古曰戲音許宜反又音麾解在高紀及灌夫傳都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降立已平定西夷徵詣京師會巴郡有盗賊復以立為巴郡太守秩中二千石居賜爵左庶長師古曰第十爵也徙為天水太守勸民農桑為天下最賜金四十斤入為左曹衛將軍護軍都尉卒官王莽簒位改漢制貶鉤町王以為侯王邯怨恨師古曰邯其王名也邯音酣牂柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邉蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之更遣寜始將軍廉丹與庸部牧史熊師古曰莽改益州為庸部大發天水隴西騎士廣漢巴蜀犍為吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒饑疫三嵗餘死者數萬而粤嶲蠻夷任貴亦殺太守枚根自立為卭榖王師古曰枚根太守之姓名會莽敗漢興誅貴復舊號云師古曰此漢興者謂光武中興也南粤王趙佗眞定人也師古曰眞定本趙國之縣也佗音徒何反秦并天下略定揚粤師古曰本揚州之分故云揚粤置桂林南海象郡以適徙民與粤雜處師古曰適讀曰讁讁有罪者徙之於越地與其土人雜居十三嵗至二世時南海尉任囂病且死師古曰囂音敖召龍川令趙佗師古曰龍川南海之縣也卽今之循州語曰聞陳勝等作亂豪傑叛秦相立南海辟逺恐盗兵侵此師古曰辟讀曰僻吾欲興兵絶新道師古曰秦所開越道也自備待諸侯變會疾甚且番禺負山險阻師古曰負背也南北東西數千里頗有中國人相輔此亦一州之主可為國郡中長吏亡足與謀者故召公告之卽被佗書行南海尉事師古曰被加也音皮義反囂死佗即移檄告横浦陽山湟谿關師古曰湟音皇曰盗兵且至急絕道聚兵自守因稍以法誅秦所置吏以其黨為守假師古曰令為郡縣之職或守或假也秦已滅佗卽擊幷桂林象郡自立為南粤武王髙帝已定天下為中國勞苦故釋佗不誅師古曰釋置也十一年遣陸賈立佗為南粤王與剖符通使使和輯百粤師古曰輯與集同毋為南邊害與長沙接境高后時有司請禁粤關市鐵器佗曰髙皇帝立我通使物今髙后聽讒臣别異蠻夷鬲絕器物師古曰鬲與隔同此必長沙王計欲倚中國師古曰倚音於綺反擊滅南海幷王之自為功也於是佗乃自尊號為南武帝發兵攻長沙邊敗數縣焉髙后遣將軍隆慮侯竈擊之師古曰周竈也慮音廬會暑溼士卒大疫兵不能隃領師古曰隃與踰同下皆類此嵗餘髙后崩即罷兵佗因此以兵威財物賂遺閩粤西甌駱役屬焉師古曰西甌即駱越也言西者以别東甌也宋祁曰甌集韻於口反駱越種也東西萬餘里廼乗黃屋左纛稱制與中國侔師古曰侔等也文帝元年初鎭撫天下使告諸侯四夷從代來即位意諭盛德焉師古曰言不以威武加於逺方也廼為佗親冡在眞定置守邑師古曰親謂父母也嵗時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粤者平言陸賈先帝時使粤上召賈為大中大夫謁者一人為副使賜佗書曰皇帝謹問南粤王甚苦心勞意朕髙皇帝側室之子師古曰言非正嫡所生也棄外奉北藩于代道里遼逺壅蔽樸愚未嘗致書師古曰言未得通使於越髙皇帝棄羣臣孝惠皇帝即世髙后自臨事不幸有疾日進不衰師古曰言疾病益甚也以故誖暴乎治師古曰誖乖也音布内反諸呂為變故亂法不能獨制廼取它姓子為孝惠皇帝嗣賴宗廟之靈功臣之力誅之已畢朕以王侯吏不釋之故孟康曰辭讓帝位不見置也不得不立今即位乃者聞王遺將軍􅂭慮侯書求親昆弟請罷長沙兩將軍師古曰佗之昆弟在故鄉者求訪之而兩將軍將兵擊越者請罷之以賔附於漢也言親昆弟者謂有服屬者也朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問脩治先人冡前日聞王發兵於邊為寇災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎師古曰言越兵寇邊長沙南郡皆厭苦之而漢軍亦當相拒方有戰鬬於越亦非利也必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇帝所以介長沙土也師古曰介隔也朕不能擅變焉吏曰得王之地不足以為大得王之財不足以為富服領以南王自治之蘓林曰領山名也如淳曰長沙南界也雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患師古曰彼此共棄故云分終今以來通使如故師古曰從今通使至於終久故云終今以來也故使賈馳諭告王朕意王亦受之毋為寇災矣上褚五十衣中褚三十衣下褚二十衣遺王師古曰以綿裝衣曰褚上中下者綿之多少薄厚之差也褚音竹呂反願王聽樂娛憂存問鄰國師古曰謂東越及甌駱等陸賈至南粤王恐乃頓首謝願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粤吏也髙皇帝幸賜臣佗璽以為南粤王使為外臣時内貢職師古曰言以時輸入貢職孝惠皇帝即位義不忍絕所以賜老夫者甚厚髙后自臨用事近細士信讒臣師古曰細士猶言小人也别異蠻夷出令曰毋予蠻夷外粤金鐵田器馬牛羊師古曰言非中國故云外越即予予牡毋與牝師古曰恐其蕃息老夫處辟馬牛羊齒已長師古曰辟讀曰僻齒已長謂老也自以祭祀不脩有死罪使内史藩中尉髙御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論師古曰風聞聞風聲吏相與議曰今内不得振於漢外亡以自髙異師古曰振􅁸也故更號為帝自帝其國非敢有害於天下也髙皇后聞之大怒削去南粤之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑溼蠻夷中西有西甌其衆半羸師古曰羸謂劣弱也南面稱王東有閩粤其衆數千人亦稱王西北有長沙其半蠻夷亦稱王師古曰言長沙之國半雜蠻夷之人老夫故敢妄竊帝號聊以自娛老夫身定百邑之地東西南北數千萬里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粤四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色耳不聽鐘皷之音者以不得事漢也今陛下幸哀憐復故號師古曰復音扶目反通使漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者獻白璧一䨇翠鳥千犀角十紫貝五百桂蠧一器應劭曰桂樹中蝎蟲也蘇林曰漢舊常以獻陵廟載以赤轂小車師古曰此蟲食桂故味辛而漬之以蜜食之也蟲音丁故反生翠四十䨇孔雀二䨇昧死再拜以聞皇帝陛下陸賈還報文帝大說師古曰說讀曰悅遂至孝景時稱臣遣使入朝請師古曰請音才性反然其居國竊如故號其使天子稱王朝命如諸侯至武帝建元四年佗孫胡為南粤王立三年閩粤王郢興兵南擊邊邑粤使人上書曰兩粤俱為藩臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵唯天子詔之於是天子多南粤義師古曰多猶重也守職約師古曰守藩臣之職而不踰約制為興師遣兩將軍往討閩粤兵未隃領閩粤王弟餘善殺郢以降於是罷兵天子使嚴助徃諭意南粤王胡頓首曰天子廼興兵誅閩粤死亡以報德遣太子嬰齊入宿衞謂助曰國新被寇使者行矣胡方日夜裝入見天子助去後其大臣諫胡曰漢興兵誅郢亦行以驚動南粤且先王言事天子期毋失禮要之不可以怵好語入見師古曰怵誘也不可被誘怵以好語而入漢朝也怵音先幸反入見則不得復歸亡國之埶也於是胡稱病竟不入見後十餘嵗胡實病甚太子嬰齊請歸胡薨諡曰文王嬰齊嗣立即臧其先武帝文帝璽李奇曰去其􅆫號嬰齊在長安時取邯鄲摎氏女師古曰摎音居虬反生子興及即位上書請立摎氏女為后興為嗣漢數使使者風諭師古曰風讀曰諷諷諭令入朝嬰齊猶尚樂擅殺生自恣懼入見要以用漢法比内諸侯固稱病遂不入見遣子次公入宿衞嬰齊薨諡為明王太子興嗣立其母為太后太后自未為嬰齊妻時曾與霸陵人安國少季通師古曰姓安國字少季及嬰齊薨後元鼎四年漢使安國少季諭王王太后入朝令辯士諫大夫終軍等宣其辭勇士魏臣等輔其決師古曰助令決䇿也衞尉路博德將兵屯桂陽待使者王年少太后中國人安國少季往復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威師古曰倚音於綺反勸王及幸臣求内屬即因使者上書請比内諸侯三嵗壹朝除邊關於是天子許之賜其丞相呂嘉銀印及内史中尉太傅印餘得自置師古曰丞相内史中尉太傅之外皆任其國自選置不受漢之印綬除其故黥劓刑用漢法諸使者皆留塡撫之師古曰填音竹刃反王王太后飭治行裝重資為入朝具相呂嘉年長矣相三王宗族官貴為長吏七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連孟康曰蒼梧越中王自名為秦王連親婚也晉灼曰秦王即下趙光也趙本與秦同姓故曰秦王其居國中甚重粤人信之多為耳目者得衆心愈於王師古曰愈勝也王之上書數諫止王王不聽有畔心數稱病不見漢使者使者注意嘉埶未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等師古曰介恃也置酒請使者大臣皆侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉南粤内屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發師古曰杖音直亮反嘉見耳目非是師古曰異於常也即趨出太后怒鏦嘉以矛師古曰鏦謂撞刺之也音䆫宋祁曰正文鏦字上别本有欲字王止太后嘉遂出介弟兵就舎李奇曰介被也師古曰介甲也被甲而自衛也弟兵即上所云弟將卒居外者稱病不肻見王及使者廼隂謀作亂王素亡意誅嘉嘉知之以故數月不發太后獨欲誅嘉等力又不能天子聞之罪使者怯亡決又以為王王太后已附漢獨呂嘉為亂不足以興兵欲使莊參以二千人往參曰以好往數人足以武往二千人亡足以為也辭不可天子罷參兵郟壯士故濟北相韓千秋師古曰潁川郟縣人也郟音夾奮曰以區區粤又有王應獨呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂將二千人往入粤境呂嘉廼遂反下令國中曰王年少太后中國人又與使者亂專欲内屬盡持先王寶入獻天子以自媚多從人行至長安虜賣以為僮奴自脫一時利亡顧趙氏社稷為萬世慮之意迺與其弟將卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粤妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粤直開道給食師古曰縱之令深入然後誅滅之未至番禺四十里粤以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪師古曰謾誑也音慢又音莫連反發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠師古曰言最為首也封其子延年為成安侯摎樂其姊為王太后首願屬漢封其子廣德為龒侯晉杓曰龒古龍字乃赦天下曰天子微弱諸侯力政譏臣不討賊師古曰力政謂以兵力相加也譏臣不討賊者春秋之義呂嘉建德等反自立晏如師古曰言自相置立而心安泰無恐懼令粤人及江淮以南樓船十萬師往討之元鼎五年秋衞尉路博德為伏波將軍出桂陽下湟水師古曰湟音皇主爵都尉楊僕為樓船將軍出豫章下横浦故歸義粤侯二人為戈船下瀨將軍師古曰從粤來歸義而漢封之出零陵或下離水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下牂柯江咸會番禺六年冬樓船將軍將精卒先陷尋陿破石門得粤船粟因推而前挫粤􅄡以粤數萬人劉敞曰挫粤􅄡以粤多一粤字待伏波將軍伏波將軍將罪人道逺後期與樓船會廼有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面會暮樓船攻敗粤人縱火燒城粤素聞伏波莫不知其兵多少師古曰莫讀曰暮伏波廼為營師古曰設營壘以待降者遣使招降者賜印綬復縱令相招師古曰來降者即賜以侯印而放令還更相招諭之也劉奉世曰何必侯印耶樓船力攻燒敵師古曰力盡力也反􅇌而入伏波營中師古曰􅇌與驅同遲旦城中皆降伏波師古曰遲音丈二反解在髙紀呂嘉建德以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇宏得建德為海常侯師古曰校之司馬若今行軍總管司馬也粤即都稽得嘉為臨蔡侯孟康曰越中所自置郎也師古曰稽音雞蒼梧王趙光與粤王同姓聞漢兵至降為隨桃侯及粤掲陽令史定降漢為安道侯蘇林曰掲音羯南海縣粤將畢取以軍降為膫侯師古曰越將姓畢名取也功臣表膫屬南陽音來彫反粤桂林監居翁服虔曰桂林部監也姓居名翁諭告甌駱四十餘萬口降為湘城侯戈船下瀨將軍兵及馳義侯所發夜郎兵未下南粤已平遂以其地為儋耳珠崖南海蒼梧鬱林合浦交阯九眞日南九郡伏波將軍益封樓船將軍以推鋒陷堅為將梁侯自尉佗王凡五世九十三嵗而亡閩粤王無諸及粤東海王搖其先皆粤王句踐之後也姓騶氏秦幷天下廢為君長以其地為閩中郡師古曰即今之泉州建安是也及諸侯畔秦無諸搖率粤歸番陽令吳芮所謂番君者也師古曰吳芮號也番音蒲河反從諸侯滅秦當是時項王主命不王也孟康曰主號命諸侯不王無諸搖等也以故不佐楚漢擊項籍無諸搖帥粤人佐漢漢五年復立無諸為閩粤王王閩中故地都冶師古曰地名即侯官縣是也冶音弋者反孝惠三年舉髙帝時粤功師古曰追論其功曰閩君搖功多其民便附廼立搖為東海王都東甌世號曰東甌王后數世師古曰后與後同古通用字孝景三年吳王濞反欲從閩粤師古曰招粤令從也閩粤未肻行獨東甌從及吳破東甌受漢購殺吳王丹徒以故得不誅吳王子駒亡走閩粤怨東甌殺其父常勸閩粤擊東甌建元三年閩粤發兵圍東甌東甌使人告急天子天子問太尉田蚡蚡對曰粤人相攻擊固其常不足以煩中國徃救也中大夫嚴助詰蚡言當救天子遣助發會稽郡兵浮海救之語具在助傳漢兵未至閩粤引兵去東粤請舉國徙中國廼悉與衆處江淮之間六年閩粤擊南粤南粤守天子約不敢擅發兵而以聞上遣大行王恢出豫章大司農韓安國出會稽皆為將軍兵未隃領閩粤王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵衆强即幸勝之後來益多師古曰言漢地廣大兵衆强盛今雖勝之後必更來也滅國乃止今殺王以謝天子天子罷兵固國完不聽廼力戰不勝即亡入海皆曰善即鏦殺王師古曰鏦音初江反使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉廼以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵曰郢等首惡獨無諸孫繇君丑不與謀張晏曰繇邑號也師古曰繇音搖與讀曰豫乃使中郎劉敞曰當作中郎將立丑為粤繇王奉閩粤祭祀餘善以殺郢威行國中民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粤王與繇王並處至元鼎五年南粤反餘善上書請以卒八千從樓船擊呂嘉等兵至掲陽以海風波為解師古曰解者自解說若今言分疏不行持兩端陰使南粤師古曰遣使與相知及漢破番禺樓船將軍僕上書願請引兵擊東粤上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命師古曰聽詔命也明年秋餘善聞樓船請誅之漢兵留境且往師古曰言兵在境首恐將來討之廼遂發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒將屯師古曰齒城陽恭王子也舊封山州侯不敢擊郤就便處師古曰郤退也音丘略反皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言師古曰妄自尊大也上遣横海將軍韓說出句章師古曰說讀曰悅句章㑹稽之縣浮海從東方往樓船將軍僕出武林師古曰楊僕也中尉王温舒出梅領粤侯為戈船下瀨將軍出如邪白沙元封元年冬咸入東粤東粤素發兵距嶮使徇北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬徇北將軍師古曰錢唐㑹稽縣也榬姓終古名也榬音袁為語兒侯孟康曰越中地也今吳南亭是師古曰語字或作篽或作禦其音同自兵未往故粤衍侯吳陽前在漢漢使歸諭餘善不聽及横海軍至陽以其邑七百人反攻粤軍於漢陽及故粤建成侯敖與繇王居股謀俱殺餘善以其衆降横海軍封居股為東成侯萬户封敖為開陵侯師古曰功臣表云開陵侯建成以故東粤建成侯斬餘善侯二千户而此𫝊云名敖疑表誤封陽為印石侯師古曰功臣表作外石與此不同疑表誤宋祁曰印當作卯横海將軍說為按道侯横海校尉福為繚嫈侯師古曰繚音遼嫈音於耕反福者城陽王子故為海常侯坐法失爵從軍亡功以宗室故侯及東粤將多軍李竒曰多軍名漢兵至棄軍降封為無錫侯故甌駱將左黄同斬西于王封為下鄜侯師古曰鄜音郛於是天子曰東粤陿多阻閩粤悍數反覆詔軍吏皆將其民徙處江淮之間東粤地遂虛朝鮮王滿燕人自始燕時嘗略屬真番朝鮮師古曰戰國時燕國略得此地為置吏築障師古曰障所以自障蔽也音之亮反秦滅燕屬遼東外徼漢興為逺難守復脩遼東故塞至浿水為界師古曰浿水在樂浪縣音普盖反屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人椎結蠻夷服而東走出塞度浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及故燕齊亡在者王之師古曰燕齊之人亡居此地及真番朝鮮蠻夷皆屬滿也都王險李奇曰地名也會孝惠髙后天下初定遼東太守即約滿為外臣保塞外蠻夷毋使盜邊蠻夷君長欲入見天子勿得禁止以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠師古曰滿死傳子子死傳孫右渠者其孫名也所誘漢亡人滋多師古曰滋益也又未嘗入見師古曰不朝見天子也真番辰國欲上書見天子又雍閼弗通師古曰辰謂辰韓之國也雍讀曰壅元封二年漢使渉何譙諭右渠終不肻奉詔師古曰譙責譲也音才笑反何去至界臨浿水使馭刺殺送何者朝鮮禆王長師古曰長者裨王名也送何至浿水何因刺殺之即度水馳入塞遂歸報天子曰殺朝鮮將上為其名美弗詰拜何為遼東東部都尉朝鮮怨何發兵攻襲殺何天子募罪人擊朝鮮其秋遣樓船將軍楊僕從齊浮勃海兵五萬左將軍荀彘出遼東誅右渠右渠發兵距險左將軍卒多率遼東士如淳曰遼東兵多也兵先縱敗散多還走坐法斬師古曰於法合斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其衆遁山中十餘日稍求收散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利乃使衞山因兵威往諭右渠右渠見使者頓首謝願降恐將詐殺臣今見信節請服降遣太子入謝獻馬五千疋及餽軍糧師古曰餽亦饋字也人衆萬餘持兵方度浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐之遂不度浿水復引歸山報天子誅山左將軍破浿水上軍迺前至城下圍其西北樓船亦往會居城南右渠遂堅城守數月未能下左將軍素侍中幸師古曰親幸於天子將燕代卒悍乘勝軍多驕樓船將齊卒入海已多敗亡其先與右渠戰困辱亡卒卒皆恐將心慙其圍右渠常持和節左將軍急擊之朝鮮大臣廼陰間使人私約降樓船師古曰與樓船為要約而請降往來言尚未肻決左將軍數與樓船期戰樓船欲就其約不會左將軍亦使人求閒隙降下朝鮮不肻心附樓船以故兩將不相得左將軍心意樓船前有失軍罪師古曰意疑也今與朝鮮和善而又不降疑其有反計未敢發天子曰將卒不能制宋祁曰卒越本作率乃使衞山諭降右渠不能顓决與左將軍相誤卒沮約師古曰顓與專同卒終也沮壊也今兩將圍城又乖異以故久不決使故濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不會具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縛樓船將軍師古曰戲讀與麾同宋祁曰戲下字上當更有軍字幷其軍以報天子許遂左將軍已幷兩軍即急擊朝鮮朝鮮相路人相韓陶尼谿相參將軍王唊應劭曰凡五人也戎狄不知官紀故皆稱相師古曰相路人一也相韓陶二也尼谿相參三也將軍王唊四也應氏乃云五人誤讀為句謂尼谿人名失之矣不當尋下文乎唊音頰相與謀曰始欲降樓船樓船今執獨左將軍幷將戰益急恐不能與如淳曰不能與左將軍相持也師古曰此說非也不能與猶言不如也王又不肻降陶唊路人皆亡降漢路人道死元封三年夏尼谿相參廼使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復政吏宋祁曰政當作攻一本作改字左將軍使右渠子長師古曰右渠之子名長降相路人子最師古曰相路人前已降漢而死於道故謂之降相最者其子名告諭其民誅成已故遂定朝鮮為真番臨屯樂浪𤣥菟四郡封參為澅清侯師古曰澅音獲陶為秋苴侯晉杓曰功臣表秋苴屬勃海師古曰苴音子餘反唊為平州侯長為幾侯最以父死頗有功為涅陽侯左將軍徵至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍蘇林曰列口縣名也度海先得之擅先縱失亡多當誅贖為庶人賛曰楚粤之先厯世有土及周之衰楚地方五千里而句踐亦以粤伯師古曰伯讀曰覇秦滅諸侯唯楚尚有滇王漢誅西南夷獨滇復寵及東粤滅國遷衆繇王居股等猶為萬戸侯三方之開皆自好事之臣故西南夷發於唐蒙司馬相如兩粤起嚴助朱買臣朝鮮由渉何遭世富盛動能成功然已勤矣師古曰已甚也言其事甚勤勞追觀太宗填撫尉佗師古曰言文帝以道德安撫之也塡音竹刃反宋祁曰道德一作恩德豈古所謂招攜以禮懐逺以德者哉師古曰春秋左氏傳僖七年諸侯盟于寗母管仲言於齊侯曰臣聞之招攜以禮懷逺以德攜謂離貳者也懐來也言有離貳者則招集之恃險逺者則懐來之也故賛引之前漢書卷九十五前漢書卷九十五考證西南夷傳自駹以東北君長以十數白馬最大臣召南按白馬氐居仇池山其山四面斗絕上有平田百頃詳後書南蠻傳道西北牂柯江江廣數里出番禺城下臣召南按牂柯江即鬱水之上流豚水在後書謂之遯水者也地理志䍧柯郡夜郎縣豚水東至廣鬱入鬱鬱林郡廣鬱縣鬱水首受夜郎豚水東至四會入海是也今曰盤江自貴州東南流逕廣西又東逕廣東廣州入海夜郎侯以竹為姓詳見後書南粤𫝊南海尉任囂按此郡尉也掌一郡兵事故得移檄發兵朕髙皇帝側室之子注師古云云顧炎武曰注非也左傳卿置側室杜解曰側室衆子也文公十三年傳曰趙有側室曰穿朕以王書罷將軍博陽侯胡三省曰髙祖功臣表有博陽侯陳濞葢於此時為將軍也至武帝建元四年佗孫胡為南粤王臣召南按後文嬰齊嗣立即臧其先武帝文帝璽武帝即佗文帝即胡葢佗之太子早卒而孫胡嗣立也佗至建元三年葢亦壽百嵗矣閩粤傳令諸校留屯豫章梅嶺待命杜佑曰梅嶺在虔州䖍化縣界入白沙武林胡三省曰索隠云今豫章北二百里接番陽界地名白沙白沙東南八十里有武陽亭東南三十里地名武林當閩越之京道封居股為東成侯功臣表作東城侯東粤地遂虛臣召南按東粤地既虛而地理志會稽郡有治縣即故東粤王都也說見沈約宋志朝鮮傳朝鮮王滿臣召南按滿姓衞氏朝鮮自周封箕子後傳四十餘世至朝鮮侯凖始稱王漢初其國大亂燕人衞滿擊破凖而自王也後書傳正補此傳之缺遣樓船將軍楊僕從齊浮勃海兵五萬胡三省曰僕從齊浮勃海葢自青萊以北幽平以南皆濵於海其海通謂之勃海非指勃海郡而言也天子許遂臣召南按許字誤史記作誅遂是也然通鑑考異已謂漢書作許字則舊本已譌矣相韓陶史記作韓陰通鑑從之長為㡬侯功臣表作幾侯張䧄樓船將軍亦坐兵至列口注蘇林曰列口縣名也胡三省曰其地當洌水入海之口臣召南按樂浪郡有列口縣然非洌水入海之口也志曰吞列縣分黎山列水所出西至黏蟬入海然則列口在黏蟬縣矣前漢書卷九十五考證
