body:
  text: 前漢書卷三漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注高后紀第三高皇后呂氏荀悅曰諱雉之字曰野雞應劭曰禮婦人從夫諡故稱高也師古曰呂后名雉字娥姁故臣下諱雉也姁音許于反生惠帝佐高祖定天下父兄及高祖而侯者三人師古曰父謂臨泗侯呂公也兄謂周呂侯澤建成侯釋之惠帝即位尊呂后爲太后朱子文曰呂后二字可去當曰惠帝即位尊爲太后太后立帝姊魯元公主女爲皇后無子取後宮美人子名之以爲太子惠帝崩太子立爲皇帝年幼太后臨朝稱制師古曰天子之言一曰制書二曰詔書制書者謂爲制度之命也非皇后所得稱今呂太后臨朝行天子事斷決萬機故稱制詔大赦天下廼立兄子呂台産禄台子通四人爲王蘇林曰台音胞胎封諸呂六人爲列侯語在外戚傳元年春正月詔曰前日孝惠皇帝言欲除三族辠妖言令師古曰罪之重者戮及三族過誤之語以爲妖言今謂重酷皆除之議未決而崩今除之二月賜民爵户一級初置孝弟力田二千石者一人師古曰特置孝弟力田官而尊其秩欲以勸厲天下令各敦行務本夏五月丙申趙王宮叢臺災師古曰連聚非一故名叢臺蓋本六國時趙王故臺也在邯鄲城中立孝惠後宮子强爲淮陽王如淳曰外戚恩澤侯表曰皆呂氏子也以孝惠子侯晉灼曰漢注名長韋昭曰今陳留郡不疑爲恒山王如淳曰今常山也因避文帝諱改曰常𢎞爲襄城侯朝爲軹侯師古曰軹音只武爲壺關侯秋桃李華二年春詔曰高皇帝匡飭天下師古曰匡正也飭整也飭讀與勑同其字從力諸有功者皆受分地爲列侯師古曰分音扶問反萬民大安莫不受休德師古曰休美也音虛蚪反他皆類此朕思念至於久逺而功名不著亡以尊大誼施後世今欲差次列侯功以定朝位師古曰以功之高下爲先後之次臧于高廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相臣平言師古曰陳平謹與絳侯臣勃師古曰周勃曲周侯臣商師古曰酈商潁隂侯臣嬰師古曰灌嬰安國侯臣陵等議師古曰王陵列侯幸得賜餐錢奉邑應劭曰餐與飡同諸侯四時皆得賜餐錢文頴曰飡邑中更名􅈫錢如今長吏食奉自復媵錢即租奉也韋昭曰熟食曰飡酒肴曰錢粟米曰奉税租奉禄正所食也四時得閒賜是爲飡錢飡小食也師古曰餐飡同一字耳音千安反飡所謂吞食物也餐錢賜厨膳錢也奉邑本所食邑也奉音扶用反宋祁曰江南本文穎注文邑中字上有所食字􅈫錢􅈫故作笄景祐刋誤謂笄非租税當改爲􅈫錢又韋昭注文税租字上有或曰字陛下加惠以功次定朝位如淳曰功大者位在上功臣侯表有第一第二之次臣請臧高廟奏可春正月乙卯地震羗道服䖍曰縣有夷蠻曰道師古曰羗道屬隴西郡武都道山崩師古曰武都道屬武都郡夏六月丙戌晦日有蝕之秋七月恒山王不疑薨行八銖錢應劭曰本秦錢質如周錢文曰半兩重如其文即八銖也漢以其太重更鑄莢錢今民閒名榆莢錢是也民患其太輕至此復行八銖錢宋祁曰注文莢字一本作鋏非是三年夏江水漢水溢流民四千餘家師古曰水所漂沒也秋星晝見四年夏少帝自知非皇后子出怨言皇太后幽之永巷如淳曰列女傳周宣姜后脱簪珥待罪永巷後改爲掖庭師古曰永長也本謂宮中之長巷也詔曰凡有天下治萬民者蓋之如天容之如地上有驩心㠯使百姓百姓欣然㠯事其上驩欣交通而天下治今皇帝疾久不已廼失惑昏亂不能繼嗣奉宗廟守祭祀不可屬天下師古曰屬委也音之欲反其議代之羣臣皆曰皇太后爲天下計所以安宗廟社稷甚深頓首奉詔五月丙辰立恒山王𢎞爲皇帝晉灼曰史記惠帝元年子不疑爲常山王子山爲襄城侯二年常山王薨即不疑也以弟襄城侯山爲常山王更名義丙辰立常山王義爲帝義更名𢎞漢書一之書𢎞以爲正也師古曰即元年所立𢎞爲襄城侯者晉説是也五年春南粤王尉佗自稱南武帝韋昭曰生以武爲號不稽古也師古曰此說非也成湯曰吾武甚因自號武王佗言武帝亦猶是耳何謂其不稽古乎劉攽曰顔雖引成湯之言然未知湯果自號武王乎聖人者人與之名耳詩謂湯爲武王則亦猶書謂文王爲寧王耳豈自稱之哉史記之言未可信也秋八月淮陽王彊薨九月發河東上黨騎屯北地六年春星晝見夏四月赦天下秩長陵令二千石應劭曰長陵高祖陵尊之故增其令秩也六月城長陵張晏曰起縣邑故築城也師古曰此說非也黄圖云長陵城周七里百八十歩因爲殿垣門四出及便殿掖庭諸官寺皆在中是即就陵爲城非止謂邑居也匈奴寇狄道攻阿陽師古曰狄道屬隴西阿陽天水之縣也今流俗書本或作河陽者非也行五分錢應劭曰所謂莢錢者宋祁曰分字别本作銖非是武帝時始造五銖錢七年冬十二月匈奴寇狄道畧二千餘人春正月丁丑趙王友幽死于邸己丑晦日有蝕之旣以梁王呂産爲相國趙王祿爲上將軍立營陵侯劉澤爲琅邪王劉攽曰呂后外戚傳惠帝崩呂后泣不下陳平用張辟彊計請以呂禄呂産為將將兵居南北軍又云復殺高祖子趙幽王共王燕王遂立諸呂為王又云病困以禄為上將軍居北軍梁王産為相國居南軍又劉澤傳澤王與呂氏同時而此紀太后臨朝便封王諸呂七年但記禄産將南北軍參校前後知此之誤也夏五月辛未詔曰昭靈夫人太上皇妃也武哀侯張晏曰高帝兄伯也宣夫人高皇帝兄姊也如淳曰皆追諡號諡不稱其議尊號丞相臣平等請尊昭靈夫人曰昭靈后武哀侯曰武哀王宣夫人曰昭哀后六月趙王恢自殺秋九月燕王建薨南越侵盗長沙遣隆慮侯竈將兵擊之應劭曰竈姓周高祖功臣也隆慮今林慮也後避殤帝諱故改之師古曰慮音廬八年春封中謁者張釋卿為列侯孟康曰宦官也如淳曰百官表謁者掌賔賛受事灌嬰為中謁者後常以閹人為之諸官加中者多閹人也諸中官宦者令丞皆賜爵關内侯食邑如淳曰列侯出關就國關内侯但爵耳其有加異者與之關内之邑食其租税宣紀曰德武食邑是也師古曰諸中官凡閹人給事於中者皆是也宦者令丞宦者署之令丞夏江水漢水溢流萬餘家秋七月辛巳皇太后崩于未央宮遺詔賜諸侯王各千金將相列侯下至郎吏各有差大赦天下上將軍禄相國産顓兵秉政師古曰顓讀與專同自知背高皇帝約師古曰非劉氏而王非有功而侯恐為大臣諸侯王所誅因謀作亂宋祁曰按蔡邕云皇子封為王者實古諸侯加號稱王故云諸侯王封為侯者謂之諸侯時齊悼惠王子朱虛侯章在京師以禄女為婦知其謀廼使人告兄齊王令發兵西章欲與太尉勃丞相平為内應以誅諸呂齊王遂發兵又詐琅邪王澤發其國兵并將而西産禄等遣大將軍灌嬰將兵擊之嬰至滎陽宋祁曰景德夲滎作熒使人諭齊王與連和待呂氏變而共誅之師古曰變謂發動也太尉勃與丞相平謀以曲周侯酈商子寄與禄善使人劫商令寄紿説禄師古曰紿誑也曰高帝與呂后共定天下劉氏所立九王呂氏所立三王皆大臣之議事已布告諸侯王諸侯王以為宜今太后崩帝少足下不急之國守藩師古曰之往也廼為上將將兵留此為大臣諸侯所疑何不速歸將軍印以兵屬太尉師古曰屬音之欲反請梁王亦歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也禄然其計使人報産及諸呂老人或以為不便計猶豫師古曰猶獸名也爾雅曰猶知􅕱善登木此獸性多疑慮常居山中忽聞有聲即恐有人且來害之每豫上樹久之無人然後敢下須㬰又上如此非一故不决者稱猶豫焉一曰隴西俗謂犬子為猶犬隨人行每豫在前待人不得又來迎候故云猶豫也􅕱音几未有所決禄信寄與俱出游過其姑呂􅎐張晏曰􅎐音須師古曰呂后妹宋祁曰呂􅎐樊噲妻封臨光侯􅎐怒曰汝為將而棄軍呂氏今無處矣師古曰言見誅滅無處所也處字或作類言無種類也廼悉出珠玉寶器散堂下曰無為它人守也八月庚申平陽侯窋行御史大夫事師古曰窋曺參子也音竹出反劉攽曰按表及周昌傳高后四年窋為御史大夫誅諸呂後免則非行也疑此紀誤見相國産計事郎中令賈壽使從齊來因數産師古曰數責之也音數具反曰王不早之國今雖欲行尚可得邪具以灌嬰與齊楚合從狀告産師古曰齊楚俱在山東連兵西向欲誅諸呂亦猶六國為從以敵秦故言合從也從音子容反平陽侯窋聞其語馳告丞相平太尉勃宋祁曰馳卲夲作以勃欲入北軍不得入襄平侯紀通尚符節張晏曰紀通信子也尚主也今符節令也晉灼曰紀信焚死不見其後功臣表云紀通紀成之子以成死事故封侯師古曰晉説是也劉攽曰高祖以善用人得天下豈宜忘紀信之功疑成者即信之一名廼令持節矯内勃北軍師古曰矯詐也詐以天子之命也勃復令酈寄典客劉揭說祿應劭曰典客今大鴻臚也師古曰揭音竭曰帝使太尉守北軍欲令足下之國急歸將軍印辭去宋祁曰南夲作歸印綬去不然禍且起祿遂解印屬典客師古曰屬音之欲反而㠯兵授太尉勃勃入軍門行令軍中曰為呂氏右袒為劉氏左袒師古曰袒脱衣袖而肉袒也左右者偏脱其一耳袒音徒旱反軍皆左袒勃遂將北軍然尚有南軍丞相平召朱虛侯章佐勃勃令章監軍門令平陽侯告衞尉毋内相國産殿門産不知祿已去北軍入未央宮欲為亂殿門弗内徘佪往來師古曰俳佪猶傍偟不進之意也俳音裴平陽侯馳語太尉勃勃尚恐不勝未敢誦言誅之鄧展曰誦言公言也廼謂朱虛侯章曰急入宮衞帝章從勃請卒千人入未央宮掖門師古曰非正門而在两旁若人之臂掖也見産廷中日餔時遂擊産宋祁曰越夲卲夲並無日字産走天大風從官亂莫敢鬭者逐産殺之郎中府吏舍厠中如淳曰百官表郎中令掌宮殿門户故其府在宮中後轉為光禄勲章已殺産帝令謁者持節勞章師古曰慰問之章欲奪節謁者不肯章廼從與載因節信馳斬長樂衞尉呂更始師古曰因謁者所持之節用為信也章與謁者同車故為門者所信得入長樂宮還入北軍復報太尉勃勃起拜賀章曰所患獨産今已誅天下定矣辛酉斬呂祿笞殺呂􅎐分部悉捕諸呂男女無少長皆斬之師古曰分音扶問反大臣相與隂謀以為少帝及三弟為王者皆非孝惠子復共誅之尊立文帝語在周勃高五王傳賛曰孝惠高后之時海内得離戰國之苦君臣俱欲無為故惠帝拱已師古曰垂拱而治高后女主制政不出房闥師古曰闥宮中小門音他曷反而天下晏然刑罰罕用民務稼穡衣食滋殖師古曰滋益也殖生也前漢書卷三前漢書卷三考證高后紀不可屬天下注屬委也監本也字下衍也字今去秩長陵令二千石注應劭監本訛作邵今改正攻阿陽注狄道屬隴西狄訛地今改正封中謁者張釋卿為列侯臣召南按張釋卿恩澤侯表作張釋無卿字燕王劉澤傳作張卿無釋字八月庚申通鑑考異曰八月當作九月襄平侯紀通尚符節劉攽曰疑成者即信之一名臣召南按紀信與紀成自是兩人後儒以信死節最烈没未得封故疑紀成即信耳不知紀成名字早著於鴻門間道走軍之日其後戰死好畤則功臣表有明文非死於滎陽也高祖於功臣以父死節封其子者三人一紀通以父成戰死好畤一高景侯周成以父苛守滎陽罵項王死事一高梁侯酈疥以父食其説齊王死事紀信樅公宜有封爵而侯表無之必是其人並無子孫可封晉灼及師古說確有証据攽説非也前漢書卷三考證
