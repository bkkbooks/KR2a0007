body:
  text: 前漢書卷八十四漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注翟方進𫝊第五十四翟方進字子威汝南上蔡人也家世微賤至方進父翟公好學為郡文學方進年十二三失父孤學給事太守府為小史號遲頓不及事師古曰頓讀曰鈍數為掾史所詈辱方進自傷廼從汝南蔡父相問已能所宜師古曰言從何術蓺可以自達蔡父大竒其形貌謂曰小史有封侯骨當以經術進努力為諸生學問淳化本努作怒方進既厭為小史聞蔡父言心喜因病歸家辭其後母欲西至京師受經母憐其幼宋祁曰於母字上疑有後字隨之長安織屨以給方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎二三嵗舉明經遷議郎是時宿儒有清河胡常師古曰宿久舊也與方進同經常為先進名譽出方進下師古曰常宦學雖在前而名譽不及方進心害其能論議不右方進師古曰毁短也劉攽曰多一論字方進知之候伺常大都授時師古曰都授謂總集諸生大講授也遣門下諸生至常所問大義疑難因記其說如是者久之常知方進之宗讓已師古曰宗尊也内不自得其後居士大夫之間未甞不稱述方進遂相親友河平中方進轉為博士數年遷朔方刺史居官不煩苛所察應條輙舉甚有威名再三奏事師古曰刺史嵗盡輙奏事京師也遷為丞相司直從上甘泉行馳道中司隸校尉陳慶劾奏方進没入車馬既至甘泉宫㑹殿中慶與廷尉范延夀語時慶有章劾自道行事以贖論師古曰當祭泰畤時行事有闕失罪合贖劉敞曰漢時人言行事成事皆謂已行已成事也王充書亦有之又下文所謂自設不坐之比是也今尚書持我事來當於此決前我為尚書時嘗有所奏事忽忘之留月餘師古曰言此者冀尚書忘已之事不奏劉敞曰予謂非冀尚書忘已不奏也言及之耳尋下文可見方進於是舉劾慶曰案慶奉使刺舉大臣故為尚書知機事周密壹統明主躬親不解師古曰解讀曰懈慶有罪未伏誅無恐懼心豫自設不坐之比師古曰比例也音必寐反又暴揚尚書事言遲疾無所在虧損聖徳之聰明奉詔不謹皆不敬師古曰既自云不坐又言遲疾無所在此之二條於法皆為不敬臣謹以劾慶坐免官㑹北地浩商為義渠長所捕亡師古曰義渠北地之縣也商被縣長捕而逃亡長取其母與豭豬連繫都亭下師古曰以深辱之豭牡豕也音家商兄弟㑹賔客自稱司隸掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司隸校尉部刺史并力逐捕察無狀者師古曰無狀謂商及義渠長本狀之違曲也劉攽曰謂察司隸刺史捕賊之無狀者故下文云以宰士督察奉使命大夫奏可司隸校尉㳙勲奏言春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職師古曰督視也今丞相宣請遣掾史以宰士督察天子奉使命大夫師古曰謂丞相掾史為宰士者言其宰相之屬官而位為士也奉使命大夫謂司隸也甚誖逆順之理師古曰誖乖也音布内反宣本不師受經術因事以立姦威案浩商所犯一家之禍耳而宣欲専權作威乃害于乃國不可之大者師古曰周書洪範云臣之有作福作威乃凶于乃國害于厥躬故引之宋祁曰乃監本作廼姚本刪願下中朝特進列侯將軍以下正國法度議者以為丞相掾不宜移書督趣司隸師古曰趣讀曰促㑹浩商捕得伏誅家屬徙合浦故事司隸校尉位在司直下初除謁兩府師古曰丞相及御史也其有所㑹居中二千石前與司直並迎丞相御史初方進新視事而涓勲亦初拜為司隸不肯謁丞相御史大夫後朝㑹相見禮節又倨師古曰倨傲也方進隂察之勲私過光禄勲辛慶忌又出逢帝舅成都侯商道路下車立􅓄過廼就車師古曰􅓄待也於是方進舉奏其狀因曰臣聞國家之興尊尊而敬長宋祁曰楊本複有敬長二字爵位上下之禮王道綱紀師古曰言王道綱紀以尊卑上下之禮為大也春秋之義尊上公謂之宰海内無不統焉丞相進見聖主御坐為起在輿為下師古曰漢舊儀云皇帝見丞相起謁者贊稱曰皇帝為丞相起起立乃坐皇帝在道丞相迎謁謁者贊稱曰皇帝為丞相下輿立乃升車羣臣宜皆承順聖化以視四方師古曰視讀曰示勲吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿師古曰謾讀與慢同易音弋䜴反而又詘節失度邪讇無常師古曰讇古諂字也私過辛慶忌見王商而下車是邪讇也色厲内荏應劭曰荏屈撓也師古曰論語稱孔子曰色厲而内荏譬諸小人其猶穿窬之盗也與言外色莊厲而内懐荏弱故方進引以為言墮國體師古曰墮毁也音火規反亂朝廷之序不宜處位臣請下丞相免勲時大中大夫平當給事中奏言方進國之司直不自敇正以先羣下前親犯令行馳道中司隸慶平心舉劾方進不自責悔而内挾私恨伺記慶之從容語言師古曰從音七容反以詆欺成罪師古曰詆毁也音丁禮反後丞相宣以一不道賊如淳曰律殺不辜一家三人為不道請遣掾督趣司隸校尉司隸校尉勲自奏暴於朝廷今方進復舉奏勲議者以為方進不以道徳輔正丞相苟阿助大臣欲必勝立威師古曰必勝必取勝宜抑絶其原勲素行公直姦人所惡可少寛假使遂其功名上以方進所舉應科不得用逆詐廢正法師古曰逆詐者謂以詐意逆猜人也逆迎也論語子曰不逆詐遂貶勲為昌陵令方進旬嵗間免兩司隸師古曰旬徧也滿也旬嵗猶言滿嵗也若十日之一周朝廷由是憚之丞相宣甚器重焉常誡掾史謹事司直翟君必在相位不久是時起昌陵營作陵邑貴戚近臣子弟賔客多辜𣙜為姦利者師古曰𣙜専也辜𣙜者言已自専之它人取者輙有辜罪宋祁曰學林云辜𣙜者乃阻障而獨阻其利後漢靈帝紀光和四年豪右辜𣙜馬一匹至二百萬章懐注引前書音義曰辜障也謂障餘人賣買而自取其利此訓是也師古以謂他人取者輙有辜罪此訓迂矣方進部掾史覆案發大姦臧數千萬上以為任公卿師古曰任堪也欲試以治民徙方進為京兆尹搏擊豪彊京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜師古曰言當犯迕貴戚而見毁也方進心知所謂其後少弛威嚴師古曰弛懈也居官三嵗永始二年遷御史大夫數月㑹丞相薛宣坐廣漢盗賊羣起及太皇太后喪時三輔吏並徴發為姦師古曰並音歩浪反免為庻人方進亦坐為京兆尹時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺羣臣多舉方進上亦器其能遂擢方進為丞相封高陵侯食邑千户身既富貴而後母尚在方進内行修飭供養甚篤師古曰飭謹也篤厚也及後母終既𦵏三十六日除服起視事以為身備漢相不敢踰國家之制師古曰漢制自文帝遺詔之後國家遵以為常大功十五日小功十四日緦麻七日方進自以大臣故云不敢踰制為相公絜請託不行郡國師古曰言不以私事託於四方郡國持法刻深舉奏牧守九卿峻文深詆師古曰詆毁也音丁禮反中傷者尤多如陳咸朱博蕭育逢信孫閎之屬皆京師世家以材能少歴牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退之初咸最先進自元帝初為御史中丞顯名朝廷矣成帝初即位擢為部刺史歴楚國北海東郡太守陽朔中京兆尹王章譏切大臣而薦琅邪太守馮野王可代大將軍王鳳輔政東郡太守陳咸可御史大夫是時方進甫從博士為刺史云師古曰甫始也後方進為京兆尹咸從南陽太守入為少府與方進厚善先是逢信已從高第郡守歴京兆太僕為衞尉矣官簿皆在方進之右師古曰簿謂伐閱也簿音主簿之簿宋祁曰官簿一作薄及御史大夫缺三人皆名卿俱在選中而方進得之㑹丞相宣有事與方進相連上使五二千石雜問丞相御史晉灼曰大臣獄重故以秩二千石五人詰責之咸詰責方進冀得其處方進心恨初大將軍鳳奏除陳湯為中郎與從事師古曰毎有政事皆與謀之而行也鳳薨後從弟車騎將軍音宋祁曰邵本無從字代鳳輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳳音所久之音薨鳳弟成都侯商復為大司馬衞將軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙敦煌時方進新為丞相陳咸内懼不安廼令小冠杜子夏往觀其意微自解説師古曰解說猶今言分疏子夏既過方進揣知其指不敢發言師古曰揣謂探求之音初委反蕭該曰揣案集解音曰揣音喘説文曰喘疾息也尺兊反說文揣量也初委反又丁果反方言曰揣試也郭璞曰揣度試之也該謂今讀揣音初委反居亡何師古曰無何猶言無幾謂少時方進奏咸與逢信邪枉貪汙營私多欲皆知陳湯姦佞傾覆利口不軌而親交賂遺以求薦舉後為少府數饋遺湯信咸幸得備九卿不思盡忠正身内自知行辟亡功效師古曰辟讀曰僻而官媚邪臣欲以徼幸苟得亡恥孔子曰鄙夫可與事君也與哉師古曰論語載孔子之言也謂鄙夫可與事君也與哉與讀曰歟咸信之謂也過惡暴見不宜處位臣請免以示天下奏可後二嵗餘詔舉方正直言之士紅陽侯立舉咸對策拜為光祿大夫給事中方進復奏咸前為九卿坐為貪邪免自知罪惡暴陳依託紅陽侯立徼幸有司莫敢舉奏冐濁苟容師古曰冐貪蔽也不顧恥辱不當䝉方正舉備内朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立後數年皇太后姊子侍中衞尉定陵侯淳于長有罪上以太后故免官勿治罪有司奏請遣長就國長以金錢與立立上封事為長求留曰陛下既託文以皇太后故蘇林曰託於詔文也誠不可更有它計師古曰言不宜遣長就國後長隂事發遂下獄宋祁曰浙本云隂事𤼵遂下獄方進劾立懐姦邪亂朝政欲傾誤要主上狡猾不道請下獄上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庻幾立與政事欲獲其利師古曰與讀曰豫今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博鉅鹿太守孫閎故光禄大夫陳咸與立交通厚善相與為腹心有背公死黨之信師古曰死黨盡死力於朋黨也欲相攀援死而後已師古曰援引也已止也援音爰皆内有不仁之性而外有儁材過絶於人倫宋祁曰一作於人無倫字監本有倫字勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纖介愛利之風師古曰愛利謂仁愛而欲安利人也天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何師古曰論語載孔子之言也言用不仁之人則禮樂廢壊言不仁之人亡所施用不仁而多材國之患也此三人皆内懐姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜没身而爭也師古曰没盡也昔季孫行父有言曰宋祁曰父疑作甫見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也師古曰事見左傳行父魯卿季文子也鸇似鷂而小今謂之土鸇鸇音之然反翅翼雖傷不避也貴戚彊黨之衆誠難犯犯之衆敵並怨善惡相冒師古曰冒覆蔽也臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可咸既廢錮宋祁曰姚本既作知復徙故郡以憂發疾而死宋祁曰監本楊本云以憂𤼵疾而死别本越本云以憂死方進知能有餘兼通文法吏事以儒雅緣飭法律號為通明相天子甚器重之奏事亡不當意内求人主微指以固其位初定陵侯淳于長雖外戚然以能謀議為九卿新用事方進獨與長交稱薦之及長坐大逆誅諸所厚善皆坐長免上以方進大臣又素重之為隱諱方進内慙上疏謝罪乞骸骨上報曰定陵侯長已伏其辜君雖交通𫝊不云乎朝過夕改君子與之師古曰與許也君何疑焉其専心壹意毋怠近醫藥以自持宋祁曰監本有近字别本無方進廼起視事條奏長所厚善京兆尹孫寳右扶風蕭育刺史二千石以上免二十餘人其見任如此方進雖受榖梁然好左氏傳天文星歴其左氏則國師劉歆星歴則長安令田終術師也如淳曰劉歆及田終術二人皆受學於方進厚李尋以為議曹為相九嵗綏和二年春熒惑守心尋奏記言應變之權君侯所自明往者數白三光垂象變動見端張晏曰九年之中而日三食月朓側匿星孛營室東井熒惑守心山川水泉反理視患張晏曰元延中㟭山崩壅江江水不流山地之鎮宜固而崩水逆流反於常理所以示人患也師古曰視讀曰示民人訛謡斥事感名如淳曰斥事井水溢之事也有言溢者後果井溢感名燕燕尾涎涎是也宋祁曰注文井監作并三者既效可為寒心今提揚眉矢貫中服䖍曰提攝提星也揚眉揚其芒角也矢枉矢也孟康曰綏和元年正月枉矢從東南入北斗攝提與北斗杓建寅貫攝提中是也張晏曰矢一星貫中者謂正直弧中也狼奮角弓且張張晏曰狼一星奮角者有芒角也狼芒角則盗賊起天弓九星不欲明明猶張也兵起之象金歴庫土逆度張晏曰庫二十星在軫南金太白也歴武庫則兵起土鎮星也逆度逆行也輔湛沒火守舍張晏曰北斗第四星旁一小星曰輔沈沒不見則天下之兵銷三十日為守舍謂日月所經宿舍也一曰大守舍熒惑守心師古曰湛讀曰沈萬嵗之期近慎朝暮師古曰萬嵗之期謂死也慎朝暮者言其事在朝夕上無惻怛濟世之功下無推讓避賢之效欲當大位為具臣以全身難矣師古曰具臣具位之臣無功徳也大責日加安得但保斥逐之勠師古曰言其事重不但斥逐而已劉敞曰勠改戮闔府三百餘人唯君侯擇其中與盡節轉凶師古曰三百餘人謂丞相之官屬也方進憂之不知所出㑹郎賁麗善為星師古曰賁姓也麗名也賁音肥言大臣宜當之上廼召見方進還歸未及引決上遂賜冊曰皇帝問丞相君有孔子之慮孟賁之勇朕嘉與君同心一意庻幾有成惟君登位于今十年灾害並臻民被飢餓加以疾疫溺死闗門牡開張晏曰元延元年章門函谷門牡自亡宋祁曰按五行志注晉灼曰章城門西出南頭第一門也牡是出籥者師古曰牡所以下閉者以鐵為之非出籥也失國守備盗賊黨軰師古曰黨衆多宋祁曰監本浙本作盗黨羣軰姚本作盗賊羣軰吏民殘賊毆殺良民師古曰毆擊也音一口反斷獄嵗嵗多前上書言事交錯道路懐姦朋黨相為隠蔽皆亡忠慮羣下兇兇更相嫉妬師古曰更音工衡反其咎安在觀君之治無欲輔朕富民便安元元之念間者郡國榖雖頗孰師古曰間謂近者以來百姓不足者尚衆前去城郭未能盡還夙夜未嘗忘焉朕惟往時之用與今一也師古曰謂財用也百僚用度各有數君不量多少一聼羣下言用度不足奏請一切増賦税城郭堧及園田過更筭馬牛羊張晏曰一切權時也堧城郭旁地園田入多益其稅也百人為卒取一人所贍常為之月用二千使人直之謂之過更又牛馬羊頭數出税筭千輸二十也師古曰堧音人緣反解在食貨志増益鹽鐵變更無常朕既不明隨奏許可後議者以為不便制詔下君君云賣酒醪後請止未盡月復奏議令賣酒醪朕誠怪君何持容容之計無忠固意師古曰容容隨衆上下也將何以輔朕帥道羣下而欲久䝉顯尊之位豈不難哉師古曰蒙冐也𫝊曰高而不危所以長守貴也師古曰孝經之言也欲退君位尚未忍君其孰念詳計塞絶姦原憂國如家務便百姓以輔朕朕既已改君其自思强食慎職使尚書令賜君上尊酒十石養牛一君審處焉方進即日自殺如淳曰漢儀注有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起病聞上祕之遣九卿冊贈以丞相高陵侯印綬賜乘輿祕器少府供張柱檻皆衣素師古曰柱屋柱也檻軒前闌版也皆以白素衣之天子親臨弔者數至禮賜異於它相故事師古曰漢舊儀云丞相有疾皇帝法駕親至問疾從西門入即薨移居第中車駕往弔賜棺棺斂具贈錢葬地葬日公卿已下㑹葬焉宋祁曰注文已字當作以諡曰恭侯長子宣嗣宣字太伯亦明經篤行君子人也及方進在為闗都尉南郡太守師古曰言方進未死之時宣已為此官少子曰義義字文仲少以父任為郎稍遷諸曹年二十出為南陽都尉宛令劉立與曲陽侯為婚又素著名州郡輕義年少義行太守事行縣至宛師古曰行音下更反其下並同丞相史在𫝊舍立持酒肴謁丞相史對飲未訖宋祁曰相對飲浙本無相字景祐本無飲字㑹義亦往外吏白都尉方至立語言自若師古曰自若言如故宋祁曰自監本作目須臾義至内謁徑入師古曰内謁猶今之通名也立廼走下義既還大怒陽以它事召立至以主守盗十金賊殺不辜部掾夏恢等收縛立𫝊送鄧獄師古曰部分其掾而遣之鄧亦南陽之縣恢亦以宛大縣恐見簒奪白義可因隨後行縣送鄧師古曰因太守行縣以立自隨即送鄧之獄義曰欲令都尉自送則如勿收邪師古曰言若都尉自送至獄不如本不收治載環宛市廼送師古曰環繞也音下串反吏民不敢動威震南陽立家輕騎馳從武闗入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏敇義出宛令宛令已出吏還白狀方進曰小兒未知為吏也其意以為入獄當輙死矣師古曰謂其不知立有所持挾以自免脫後義坐法免起家而為𢎞農太守遷河内太守青州牧所居著名有父風烈徙為東郡太守數嵗平帝崩王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望師古曰言漸試天下人心必代漢家其漸可見方今宗室衰弱外無彊蕃天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝師古曰埋名謂身埋而名立今欲發之乃肯從我乎師古曰乃汝也豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀及東郡王孫慶素有勇略以明兵法徴在京師義廼詐移書以重罪傳逮慶師古曰追赴獄也於是以九月都試日如淳曰太守都尉令長丞尉㑹都試課殿最也斬觀令文穎曰觀縣名師古曰音工渙反因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣為王薨無子而信子匡復立為王故義舉兵并東平立信為天子義自號大司馬柱天大將軍以東平王傅蘇隆為丞相中尉臯丹為御史大夫移檄郡國言莽鴆殺孝平皇帝矯攝尊號今天子已立共行天罰師古曰共讀曰恭郡國皆震比至山陽衆十餘萬師古曰比音必寐反莽聞之大懼廼拜其黨親輕車將軍成武侯孫建為奮武將軍光禄勲成都侯王邑為虎牙將軍明義侯王駿為彊弩將軍春王城門校尉王况為震威將軍師古曰春王長安城東出北頭第一門也本名宣平門莽更改焉宗伯忠孝侯劉宏為奮衝將軍中少府建威侯王昌為中堅將軍中郎將震羌侯竇兄為奮威將軍師古曰兄讀曰況凡七人自擇除闗西人為校尉軍吏將闗東甲卒𤼵奔命以擊義焉復以太僕武讓為積弩將軍屯函谷闗將作大匠蒙鄉侯逯並為横壄將軍屯武闗師古曰逯姓也並名也逯音錄又音鹿今東郡有逯姓二音並得書本逯字或作逮今河朔有逮姓自呼音徒戴反其義兩通羲和紅休侯劉歆為揚武將軍屯宛大保後丞丞陽侯甄邯為大將軍屯灞上師古曰丞陽侯音烝常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備宋祁曰兵字下疑有以字莽日抱孺子㑹羣臣而稱曰昔成王幼周公攝政而管蔡挾祿父以畔師古曰祿父紂子也父讀曰甫今翟義亦挾劉信而作亂自古大聖猶懼此況臣莽之斗筲師古曰斗筲自喻材器小也解在公孫劉田傳羣臣皆曰不遭此變不章聖徳莽於是依周書作大誥師古曰武王崩周公相成王而三監淮夷叛周公作大誥莽自比周公故依放其事曰惟居攝二年十月甲子攝皇帝若曰大誥道諸侯王三公列侯于汝卿大夫元士御事應劭曰言以大道告於諸侯以下也御事主事也不弔天降喪于趙傅丁董應劭曰趙飛燕傅太后丁太后董賢也師古曰不弔言不為天所弔閔降下也宋祁曰注文閔字下疑有也字洪惟我幼冲孺子當承繼嗣無疆大歴服事師古曰洪大也惟思也冲稚也大思㓜冲孺子當承繼漢家無竟之歴服行政事予未遭其明悊能道民於安況其能往知天命師古曰予莽自稱也言不遭遇明智之人以自輔佐而道百姓於安蓋為謙辭也道讀曰導熙我念孺子若渉淵水師古曰熙嘆辭予惟往求朕所濟度奔走師古曰言我當求所以濟度之故奔走盡力不憚勤勞以傅近奉承高皇帝所受命師古曰傅讀曰附近音其靳反予豈敢自比於前人乎師古曰前人謂周公天降威明用寧帝室遺我居攝寳龜師古曰威明猶言明威也遺音弋季反太皇太后以丹石之符廼紹天明意師古曰紹承也詔予即命居攝踐阼如周公故事反虜故東郡太守翟義擅興師動衆曰有大難于西土西土人亦不靖師古曰曰者述翟義之言云爾也西土謂京師也言在東郡之西也於是動嚴鄉侯信誕敢犯祖亂宗之序師古曰誕大也天降威遺我寳龜固知我國有呰災使民不安師古曰呰病也言天所以降威遺龜者知國有災病義信當反天下不安之故也呰讀與疵同蕭該曰呰韋昭音疵呰字别有音於地理志及序𫝊中已具也是天反復右我漢國也師古曰復音扶目反右讀曰祐粤其聞曰孟康曰翟義反書上聞日也師古曰粤𤼵語辭也宋祁曰景本曰作日宗室之儁有四百人孟康曰諸劉見在者民獻儀九萬夫孟康曰民之表儀謂賢者予敬以終於此謀繼嗣圖功師古曰我用此宗室之儁及獻儀者共謀圖國事終成其功我有大事休予卜并吉師古曰大事戎事也言人謀既從卜又并吉是為美也故我出大將告郡太守諸侯相令長曰予得吉卜予惟以汝于伐東郡嚴鄉逋播臣師古曰逋亡也播散也爾國君或者無不反曰難大民亦不靜亦惟在帝宮諸侯宗室於小子族父敬不可征師古曰言爾等國君或有言曰禍難既大衆庻不安又劉信國之宗室於孺子為族父當加禮敬不可征討帝不違卜師古曰卜既得吉天命不違故予為冲人長思厥難曰烏虖義信所犯誠動鰥寡哀哉師古曰無妻無夫之人亦同受其害故可哀哉予遭天役遺大解難於予身以為孺子不身自䘏師古曰言天以漢家役事遺我而令身解其難故我征伐以為孺子除亂非自憂己身也予義彼國君泉陵侯上書應劭曰泉陵侯劉慶也上書令莽行天子事曰成王幼弱周公踐天子位以治天下六年朝諸侯於明堂制禮樂班度量而天下大服師古曰班謂布行也太皇太后承順天心成居攝之義皇太子為孝平皇帝子師古曰皇太子即謂孺子年在襁褓宜且為子知為人子道令皇太后得加慈母恩畜養成就加元服然後復子明辟師古曰辟君也以明君之事還孺子熙為我孺子之故師古曰重歎而言予惟趙傅丁董之亂遏絶繼嗣變剝適庻危亂漢朝以成三晉灼曰古厄字服䖍曰厄㑹也謂三七二百一十嵗師古曰適讀曰嫡劉奉世曰者國統三絶也隊極厥命師古曰隊隕也極盡也烏虖害其可不旅力同心戒之哉師古曰害讀曰曷曷何也旅陳也予不敢僭上帝命師古曰僭不信也言順天命而征討天休于安帝室興我漢國惟卜用克綏受兹命師古曰言天美於興復漢國故我惟用卜吉能安受此命今天其相民況亦惟卜用師古曰言天道當思助人況更用卜吉可知矣太皇太后肇有元城沙鹿之右張晏曰沙鹿在元城縣春秋時沙鹿崩王莽以為元后之祥語在元后𫝊師古曰右讀曰祐隂精女主聖明之祥李竒曰李親懐元后夢月入懐隂精女主之祥配元生成以興我天下之符遂獲西王母之應孟康曰民傳祀西王母之應也神靈之徴師古曰徴證也以祐我帝室以安我大宗以紹我後嗣以繼我漢功厥害適統不宗元緒者辟不違親辜不避戚師古曰其有害國之正統不尊大緒者當速加刑辟不避親戚適讀曰嫡夫豈不愛亦惟帝室師古曰非不愛此人但為帝室不得止是以廣立王侯並建曽𤣥俾屏我京師綏撫宇内師古曰屏謂蔽捭其難也博徴儒生講道于廷論序乖繆制禮作樂同律度量混壹風俗師古曰混亦同也音胡本反正天地之位昭郊宗之禮定五畤廟祧咸秩亡文孟康曰諸廢祀無文籍皆祭之建靈臺立明堂設辟雍張太學尊中宗高宗之號服䖍曰宣帝元帝也昔我高宗崇徳建武克綏西域以受白虎威勝之瑞應劭曰元帝誅滅郅支單于懐輯西域時有獻白虎者所以威逺勝猛也天地判合乾坤序徳師古曰言元帝既有威徳太后又兆符應則是天地乾坤夫妻之義相配合也判之言片也太皇太后臨政有龜龍麟鳳之應五徳嘉符相因而備河圖雒書逺自昆侖出於重壄師古曰昆侖河所出重壄洛所出皆有圖書故本言之壄古野字古讖著言肆今享實師古曰肆故也言有其讖故今當其實此廼皇天上帝所以安我帝室俾我成就洪烈也師古曰洪大也烈業也烏虖天明威輔漢始而大大矣師古曰言因此難更以强大爾有惟舊人泉陵侯之言爾不克逺省爾豈知太皇太后若此勤哉師古曰言爾當思久舊之人泉陵侯所言爾不能逺省識古事豈知太后之勤乎天毖勞我成功所孟康曰天慎勞我國家成功之所在予不敢不極卒安皇帝之所圖事師古曰卒終也言我不敢不終祖宗之業安帝室所謀之事肆予告我諸侯王公列侯卿大夫元士御事師古曰肆陳也陳其理而告之天輔誠辭師古曰言有至誠之辭則為天所輔天其累我以民予害敢不於祖宗安人圖功所終師古曰累託也言天以百姓託我我曷敢不謀終祖宗安人之功也累音力瑞反害讀曰曷下皆類此天亦惟勞我民若有疾予害敢不於祖宗所受休輔師古曰言天欲撫勞我衆衆若有疾苦我曷敢不順祖宗之意休息而輔助之勞音來到反予聞孝子善繼人之意忠臣善成人之事予思若考作室厥子堂而構之師古曰父有作室之意則子當築堂而構棼橑以成之厥父菑厥子播而穫之師古曰父菑耕其田子當布種而收穫之反土為菑一曰田一嵗曰菑予害敢不於身撫祖宗之所受大命師古曰作室農人猶不弃其本業我於今日不得有避而不征討叛逆也若祖宗廼有效湯武伐厥子民長其勸弗救師古曰譬有人來伐其子而長養彼心反勸助之弗救其子者止以子惡故也言湯武疾惡其心亦然今所征討不得避親當以公義烏虖肆哉師古曰肆陳也勸令陳力諸侯王公列侯卿大夫元士御事其勉助國道明師古曰道由也言當由於明智之事以助國也亦惟宗室之俊民之表儀迪知上帝命師古曰迪亦道也言當遵道而知天命粤天輔誠爾不得易定師古曰粤辭也天道輔誠爾不得改易天之定命況今天降定于漢國惟大囏人翟義劉信大逆欲相伐于厥室豈亦知命之不易乎師古曰言義信不知天命不可改易乃大為囏難以干國紀是自相謀誅伐其室也囏古艱字予永念曰天惟喪翟義劉信若嗇夫予害敢不終予畮師古曰嗇夫治田志除草穢天之欲喪義信事亦如之我當順天以終竟田畮之事天亦惟休于祖宗予害其極卜害敢不于從師古曰言天羙祖宗之事我何其極卜法敢不往從言必從也率寧人有㫖疆土況今卜并吉師古曰言循祖宗之業務在安人而羙疆土況今卜并吉乎言不可不從也故予大以爾東征命不僭差師古曰言必信之矣兆陳惟若此師古曰卜兆陳列惟如此宋祁曰邵本兆作卜廼遣大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城師古曰明告者以其出使能明告諭於外也附城云如古附庸也諸將東至陳留菑孟康曰菑故戴國在梁後屬陳留今曰考城與義㑹戰破之斬劉璜首莽大喜復下詔曰太皇太后遭家不造國統三絶師古曰謂成帝哀帝平帝皆無子也絶輙復續恩莫厚焉信莫立焉孝平皇帝短命蚤崩師古曰蚤古早字幼嗣孺沖詔予居攝予承明詔奉社稷之任持大宗之重養六尺之託受天下之寄宋祁曰監本楊本郭本託作孤别本云養六尺之孤託受天下之寄戰戰兢兢不敢安息伏念太皇太后惟經蓺分析王道離散師古曰惟思也宋祁曰姚本散作散漢家制作之業獨未成就故博徴儒士大興典制備物致用立功成器以為天下利王道粲然基業既著千載之廢百世之遺於今廼成道徳庻幾於唐虞功烈比齊於殷周師古曰烈業也今翟義劉信等謀反大逆流言惑衆欲以簒位賊害我孺子罪深於管蔡惡甚於禽獸信父故東平王雲不孝不謹親毒殺其父思王名曰鉅䑕師古曰鉅大也莽誣雲呼其父曰鉅䑕也後雲竟坐大逆誅死義父故丞相方進險詖隂賊師古曰詖佞也音彼義反兄宣静言令色外巧内嫉師古曰静安也令善也言其陽為安静之言外有善色而實嫉害也所殺鄉邑汝南者數十人今積惡二家迷惑相得此時命當殄天所滅也義始發兵上書言宇信等與東平相輔謀反師古曰輔者東平王相之名也劉奉世曰義𤼵兵時東平相蘇隆此輔未喻或者當為傅聲之誤也宋祁曰前云以東平王傅蘇隆為丞相執捕械繫欲以威民先自相被以反逆大惡師古曰威加也被音皮義反轉相捕械此其破殄之明證也已捕斬斷信二子榖鄉侯章徳廣侯鮪義母練兄宣親屬二十四人皆磔暴于長安都市四通之衢當其斬時觀者重疊師古曰言人多而聚積天氣和清可謂當矣命遣大將軍共行皇天之罰師古曰共讀曰恭討海内之讎功效著焉予甚嘉之司馬法不云乎賞不踰時欲民速覩為善之利也今先封車騎都尉孫賢等五十五人皆為列侯户邑之數别下遣使者持黄金印赤韍縌朱輪車即軍中拜授服䖍曰縌即今之綬也師古曰韍所以繫印也縌者系也謂逆受之也即就也韍音弗縌音逆宋祁曰注文系字上當有其字因大赦天下於是吏士精銳遂攻圍義於圉城破之義與劉信弃軍庸亡孟康曰謂挺身逃亡如奴庸也至固始界中捕得義尸磔陳都市卒不得信初三輔聞翟義起自茂陵以西至汧二十三縣盗賊並發趙明霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令師古曰斄讀曰邰劫略吏民衆十餘萬火見未央宫前殿莽晝夜抱孺子禱宗廟復拜衞尉王級為虎賁將軍大鴻臚望鄉侯閻遷為折衝將軍與甄邯王晏西擊趙明等正月虎牙將軍王邑等自闗東還便引兵西彊弩將軍王駿以無功免揚武將軍劉歆歸故官復以邑弟侍中王竒為揚武將軍城門將軍趙恢為彊弩將軍中郎將李棽為厭難將軍師古曰棽音所林反宋祁曰服䖍棽音禁如淳音琴説文丑心反晉灼音參參音森復將兵西二月明等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥大封拜先是益州蠻夷及金城塞外羌反畔時州郡擊破之莽廼并録以小大為差封侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌宼蠻盗反虜逆賊不得旋踵應時殄滅天下咸服之功封云莽於是自謂大得天人之助至其年十二月遂即真矣初義所收宛令劉立聞義舉兵上書願備軍吏為國討賊内報私怨莽擢立為陳留太守封明徳侯始義兄宣居長安先義未發家數有怪師古曰言義未𤼵兵之前夜聞哭聲聼之不知所在宣教授諸生滿堂有狗從外入齧其中庭羣鴈數十比驚救之已皆斷頭師古曰比音必寐反狗走出門求不知處宣大惡之謂後母曰東郡太守文仲素俶儻師古曰俶音土歴反今數有惡怪恐有妄為而大禍至也宋祁曰恐有當作恐其太夫人可歸為弃去宣家者以避害師古曰言歸其本族自絶於翟氏母不肯去後數月敗莽盡壊義第宅汙池之師古曰汙停水也音烏發父方進及先祖冡在汝南者燒其棺柩夷滅三族誅及種嗣至皆同坑以棘五毒并𦵏之如淳曰野葛狼毒之屬也而下詔曰蓋聞古者伐不敬取其䲔鯢築武軍封以為大戮於是乎有京觀以懲滛慝師古曰此左傳載楚莊王之辭也䲔鯢大魚為害者也以此比敵人之勇桀者京高丘也觀謂如闕形也懲創艾也慝惡也䲔古鯨字音其京反鯢音五奚反觀音工喚反廼者反虜劉信翟義誖逆作亂于東而芒竹羣盗趙明霍鴻造逆西土師古曰芒竹在盩厔南界芒水之曲而多竹林也即今司竹園是其地矣芒音亡遣武將征討咸伏其辜惟信義等始發自濮陽結姦無鹽殄滅於圉趙明依阻槐里環隄師古曰槐里縣界其中有環曲之隄而明依之以自固也霍鴻負倚盩厔芒竹師古曰負恃也倚音於綺反咸用破碎亡有餘類其取反虜逆賊之䲔鯢聚之通路之旁濮陽無鹽圉槐里盩厔凡五所各方六丈高六尺築為武軍封以為大戮薦樹之棘師古曰薦讀曰荐荐重也聚也蕭該音義曰字林作栫柴木擁也在見反該案今作薦字者借以為栫字建表木高丈六尺師古曰表者所以標明也書曰反虜逆賊䲔鯢在所長吏常以秋循行師古曰行音下更反勿令壊敗以懲􅁋慝焉初汝南舊有鴻隙大陂郡以為饒師古曰鴻隙陂名藉其溉灌及魚龞萑蒲之利以多財用成帝時闗東數水陂溢為害方進為相與御史大夫孔光共遣掾行視師古曰行音下更反以為決去陂水其地肥羙省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壊陂誰翟子威飯我豆食羮芋魁師古曰言田無溉灌而不生秔稻又無黍稷但有豆及芋也豆食者豆為飯也羮芋魁者以芋根為羮也飯音扶晩反食音飤反乎覆陂當復師古曰事之反覆無常言禍兮福所倚誰云者兩黄鵠師古曰託言有神來告之司徒掾班彪曰丞相方進以孤童攜老母羈旅入京師身為儒宗致位宰相盛矣當莽之起蓋乘天威雖有賁育奚益於敵師古曰賁謂孟賁育謂夏育皆古之勇士言得之無益不能敵莽也賁音奔義不量力懐忠憤𤼵以隕其宗悲夫前漢書卷八十四前漢書卷八十四考證翟方進𫝊受春秋按儒林𫝊方進受榖梁春秋於尹更始又兼左氏春秋胡常與方進同師者也司𨽻校尉陳慶按公卿表慶字君卿後方進為丞相時慶以琅邪太守入為廷尉一年徙為長樂少府慶與廷尉范延夀語按公卿表延夀字子路安成人河平二年以北海太守入為廷尉八年卒矢貫中注云云臣召南按孟康注是也如張晏說則與下文狼弓複矣翟方進子義於是以九月都試日注如淳云云臣召南按都試日即講武日也故下文云勒車騎材官漢制常以秋行都試韓延夀傳最詳如淳以課殿最解之非是泉陵侯上書注應劭曰泉陵侯劉慶也臣召南按泉陵王子侯表作衆陵据地理志泉陵侯國屬零陵郡則此文是表誤也前漢書卷八十四考證
