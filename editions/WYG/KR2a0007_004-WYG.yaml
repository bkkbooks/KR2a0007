body:
  text: 前漢書卷四漢蘭臺令史班固撰唐正議大夫行秘書少監瑯邪縣開國子顔師古注文帝紀第四孝文皇帝荀悅曰諱恒之字曰常應劭曰諡法慈惠愛民曰文宋祁曰景德本民作人高祖中子也母曰薄姬如淳曰姬音怡衆妾之總稱漢官儀曰姬妾數百外戚傳亦曰幸姬戚夫人臣瓚曰漢秩禄令及茂陵書姬並内官也秩比二千石位次婕妤下在八子上師古曰姬者本周之姓貴於衆國之女所以婦人美號皆稱姬焉故左氏傳曰雖有姬姜無棄蕉萃姜亦大國女也後因總謂衆妾為姬史記云高祖居山東時好美姬是也若姬是官號不應云幸姬戚夫人且外戚傳備列后妃諸官無姬職也如云衆妾總稱則近之不當音怡宜依字讀耳瓚説謬也高祖十一年誅陳豨定代地立為代王宋祁曰越夲立字下有子恒二字都中都十七年秋高后崩張晏曰代王之十七年也諸呂謀為亂欲危劉氏丞相陳平太尉周勃朱虛侯劉章等共誅之謀立代王語在高后紀高五王傳大臣遂使人迎代王郎中令張武等議皆曰漢大臣皆故高帝時將習兵事多謀詐其屬意非止此也師古曰言常有異志也屬意猶言注意也屬音之欲反特畏高帝呂太后威耳今已誅諸呂新喋血京師服䖍曰喋音蹀屣履之蹀如淳曰殺人流血滂沱為喋血師古曰喋音大頰反本字當作蹀蹀謂履渉之耳以迎大王為名實不可信願稱疾無徃以觀其變中尉宋昌進曰羣臣之議皆非也夫秦失其政豪傑並起人人自以為得之者以萬數然卒踐天子位者劉氏也師古曰卒終也天下絶望一矣高帝王子弟地犬牙相制所謂盤石之宗也師古曰犬牙言地形如犬之牙交相入也天下服其彊二矣漢興除秦煩苛約法令施德惠師古曰約省也人人自安難動摇三矣夫以呂太后之嚴立諸呂為三王擅權專制然而太尉以一節入北軍一呼師古曰呼叫也音火故反他皆類此士皆袒左為劉氏畔諸呂卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使師古曰為音于偽反其黨寧能專一邪内有朱虛東牟之親外畏吳楚淮南琅邪齊代之彊方今高帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王報太后計猶豫未定卜之兆得大横應劭曰龜曰兆筮曰卦卜以荆灼龜文正横也占曰大横庚庚余為天王夏啓以光服䖍曰庚庚横貌也李竒曰庚庚其繇文也占謂其繇也張晏曰先是五帝官天下老則嬗賢至夏啓始傳嗣能光先君之業文帝亦襲父迹言似啓也師古曰繇音丈救反本作籕籕書也謂讀卜詞宋祁曰江南本注文張晏曰下有横謂無思不服庚更也更更言去諸侯而即帝位也二十字代王曰寡人固已為王又何王乎卜人曰所謂天王者乃天子也於是代王乃遣太后弟薄昭見太尉勃勃等具言所以迎立王者師古曰說所以迎代王之意也昭還報曰信矣無可疑者代王笑謂宋昌曰果如公言乃令宋昌驂乘師古曰乗車之法尊者居左御者居中又有一人處車之右以備傾側是以戎事則稱車右其餘則曰驂乗驂者三也蓋取三人為名義耳張武等六人乗六乗傳張晏曰傳車六乗也師古曰傳音張戀反詣長安至高陵止而使宋昌先之長安觀變昌至渭橋蘇林曰在長安北三里丞相已下皆迎昌還報代王乃進至渭橋羣臣拜謁稱臣代王下拜太尉勃進曰願請間師古曰間容也猶今言中間也請容暇之頃當有所陳不欲於衆顯論也他皆類此宋昌曰所言公公言之所言私王者無私太尉勃乃跪上天子璽代王謝曰至邸而議之師古曰郡國朝宿之舍在京師者率名邸邸至也言所歸至也音丁禮反他皆類此閏月己酉入代邸劉攽曰己酉去誅諸呂三十七日矣羣臣從至上議曰丞相臣平太尉臣勃大將軍臣武服虔曰柴武御史大夫臣蒼文頴曰張蒼宗正臣郢文頴曰劉郢朱虛侯臣章東牟侯臣興居典客臣揭蘇林曰劉揭也師古曰揭音竭再拜言大王足下子𢎞等皆非孝惠皇帝子師古曰不詳其有爵位故總謂之子宋祁曰注文不詳南本作不許為長若云不詳其有爵位則高后元年已封三王二侯而𢎞又為帝非不詳也不當奉宗廟臣謹請陰安侯蘇林曰髙帝兄伯妻羮頡侯母丘嫂也晉灼曰若蕭何夫人封為鄼侯也頃王后蘇林曰高帝兄仲妻也仲名喜為代王後廢為郃陽侯子濞為吳王故追諡為頃王如淳曰王子侯表曰郃陽侯喜以子濞為王追謚為頃王頃王后封陰安侯時呂􅎐為林光侯蕭何夫人亦為鄼侯又宗室侯表此時無陰安侯知其為頃王后也案漢祠令陰安侯髙帝嫂也師古曰諸諡為傾者漢書例作頃字讀皆曰傾琅邪王文頴曰劉澤也列侯吏二千石議大王高皇帝子宜為嗣願大王即天子位代王曰奉高帝宗廟重事也寡人不佞師古曰不佞不材也不足以稱師古曰稱副也音尺孕反其下皆同願請楚王計宜者蘇林曰楚王名交高帝弟也寡人弗敢當羣臣皆伏固請代王西鄉讓者三南鄉讓者再如淳曰讓羣臣也或曰賔主位東西面君臣位南北面故西鄉坐三讓不受羣臣猶稱宜乃更南鄉坐示變即君位之漸也師古曰鄉讀曰嚮丞相平等皆曰臣伏計之大王奉高祖宗廟最宜稱雖天下諸侯萬民皆以為宜臣等為宗廟社稷計不敢忽師古曰忽怠忘也劉攽曰忽言輕易也願大王幸聽臣等臣謹奉天子璽符再拜上代王曰宗室將相王列侯以為其宜寡人寡人不敢辭遂即天子位羣臣以次侍師古曰名依職位使太僕嬰東牟侯興居先清宮應劭曰舊典天子行幸所至必遣静室令先案行清靜殿中以虞非常奉天子法駕迎代邸如淳曰法駕者侍中驂乗奉車郎御屬車三十六乗皇帝即日夕入未央宮夜拜宋昌為衞將軍領南北軍張武為郎中令行殿中師古曰行謂案行也音下更反還坐前殿下詔曰制詔丞相太尉御史大夫間者諸呂用事擅權師古曰間者猶言中間之時也他皆類此宋祁曰景德本無制詔二字謀為大逆欲危劉氏宗廟頼將相列侯宗室大臣誅之皆伏其辜朕初即位其赦天下賜民爵一級女子百户牛酒蘇林曰男賜爵女子賜牛酒師古曰賜爵者謂一家之長得之也女子謂賜爵者之妻也率百户共得牛若干頭酒若干石無定數也酺五日服虔曰酺音蒲文頴曰音歩漢律三人以上無故羣飲酒罰金四兩今詔横賜得令會聚飲食五日也師古曰酺之為言布也王德布於天下而合聚飲食為酺服音是也字或作脯音義同宋祁曰酺南本浙夲並作餔元年冬十月辛亥皇帝見于高廟遣車騎將軍薄昭迎皇太后于代詔曰前呂産自置為相國呂禄為上將軍擅遣將軍灌嬰將兵擊齊欲代劉氏嬰留滎陽與諸侯合謀以誅呂氏呂産欲為不善宋祁曰呂産南夲浙夲無呂字丞相平與太尉勃等謀奪産等軍朱虛侯章首先捕斬産太尉勃身率襄平侯通持節承詔入北軍典客揭奪呂禄印宋祁曰呂禄本浙本無呂字其益封太尉勃邑萬户賜金五千斤丞相平將軍嬰邑各三千户金二千斤朱虛侯章襄平侯通邑各二千户金千斤封典客揭為陽信侯賜金千斤十二月立趙幽王子遂為趙王徙琅邪王澤為燕王呂氏所奪齊楚地皆歸之盡除收帑相坐律令應劭曰帑子也秦法一人有罪并其室家今除此律師古曰帑讀與奴同假借字也正月有司請蚤建太子師古曰蚤古以為早晚字也所以尊宗廟也詔曰朕既不德上帝神明未歆饗也宋祁曰南夲浙夲無也字天下人民未有㥦志應劭曰㥦音篋㥦滿也師古曰㥦快也今縱不能博求天下賢聖有徳之人而嬗天下焉晉灼曰嬗古禪字而曰豫建太子是重吾不徳也師古曰重謂増益也音直用反他皆類此謂天下何師古曰猶言何以稱天下之望其安之師古曰安猶徐也言不宜汲汲耳有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也春秋髙閲天下之義理多矣如淳曰閲猶更歴也明於國家之體吳王於朕兄也淮南王弟也皆秉德以陪朕文頴曰陪輔也豈為不豫哉諸侯王宗室昆弟有功臣多賢及有德義者若舉有德以陪朕之不能終是社稷之靈天下之福也今不選舉焉而曰必子師古曰必將傳位於子人其以朕為忘賢有德者而專於子宋祁曰越本專作傳非所以憂天下也朕甚不取師古曰不取猶言不用此為善也有司固請曰古者殷周有國治安皆且千歲師古曰治安言治理而且安寧也治音丈吏反有天下者莫長焉師古曰言上古以來國祚長久無及殷周者也用此道也師古曰所以能爾者以承嗣相傳故也立嗣必子所從來逺矣高帝始平天下建諸侯為帝者太祖諸侯王列侯始受國者亦皆為其國祖子孫繼嗣世世不絶天下之大義也故高帝設之以撫海内師古曰設置立也謂立此法也今釋宜建師古曰釋捨也宜建為適嗣而更選於諸侯宗室非高帝之志也更議不宜師古曰不當更議子啓最長文頴曰景帝名敦厚慈仁請建以為太子上乃許之因賜天下民當為父後者爵一級師古曰雖非已生正嫡但為後者即得賜爵封將軍薄昭為軹侯師古曰軹音只三月有司請立皇后皇太后曰立太子母竇氏為皇后詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡服䖍曰阽音反坫之坫孟康曰阽音屋檐之檐如淳曰阽近邊欲墮之意師古曰服孟二音並通而莫之省憂師古曰省視也為民父母將何如其議所以振貸之師古曰振起也為給貸之令其存立也諸振救振贍其義皆同今流俗作字從貝者非也自别有訓貸音吐戴反又曰老者非帛不煖非肉不飽師古曰煖温也音乃短反今歲首不時使人存問長老師古曰存省視也又無布帛酒肉之賜將何以佐天下子孫孝養其親今聞吏禀當受鬻者或以陳粟師古曰稟給也鬻淖糜也給米使為糜鬻也陳乆舊也小雅甫田之詩曰我取其陳鬻音之六反淖溺也音女教反豈稱養老之意哉具為令師古曰使其備為修制有司請令縣道師古曰或縣或道皆用此制也有蠻夷曰道年八十已上賜米人月一石肉二十斤酒五斗其九十已上又賜帛人二疋絮三斤師古曰絮綿也賜物及當稟鬻米者長吏閲視丞若尉致師古曰長吏縣之令長也若者豫及之詞致者送至也或丞或尉自致之也不滿九十嗇夫令史致二千石遣都吏循行蘇林曰取其都吏有徳也如淳曰律說都吏今督郵是也閑惠曉事即為文無害都吏師古曰如說是也行音下孟反不稱者督之師古曰循行有不如詔意者二千石察視責罰之刑者及有罪耐以上不用此令蘇林曰一歲為罰作二歲刑以上為耐耐能任其罪也師古曰刑為先被刑也有罪在吏未決者也言八十九十之人雖合加賜其中有被刑罪者不在此賜物令條中也楚元王交薨四月齊楚地震二十九山同日崩大水潰出師古曰旁決曰潰上湧曰出六月令郡國無來獻施惠天下諸侯四夷逺近驩洽乃脩代來功師古曰自代來時有功者也詔曰方大臣誅諸呂迎朕朕狐疑皆止朕師古曰狐之為獸其性多疑每渡冰河且聽且渡故言疑者而稱狐疑唯中尉宋昌勸朕朕已得保宗廟已尊昌為衞將軍師古曰尊高也高其官秩其封昌為壯武侯諸從朕六人官皆至九卿師古曰張武等又曰列侯從高帝入蜀漢者六十八人益邑各三百户吏二千石以上從高帝潁川守尊等十人食邑六百户淮陽守申屠嘉等十人五百户衞尉足等十人四百户封淮南王舅趙兼為周陽侯齊王舅駟鈞為靖郭侯如淳曰邑名也六國時齊有靖郭君靖音靜師古曰外戚恩澤侯表云鄔侯駟鈞以齊王舅侯今此云靖郭豈初封靖郭後改為鄔乎鄔音一户反又音於庶反故常山丞相蔡兼為樊侯二年冬十月丞相陳平薨詔曰朕聞古者諸侯建國千餘各守其地以時入貢民不勞苦上下驩欣靡有違德今列侯多居長安邑逺師古曰所食之邑去長安逺吏卒給輸費苦而列侯亦無繇教訓其民師古曰繇讀與由同其令列侯之國為吏及詔所止者遣太子李竒曰為吏謂為卿大夫者詔所止特以恩愛見留十一月癸卯晦日有食之詔曰朕聞之天生民為之置君以養治之人主不德布政不均則天示之災以戒不治師古曰治音直吏反乃十一月晦日有食之適見于天師古曰適讀曰謫責也音張革反見音胡電反災孰大焉師古曰災莫大于此朕獲保宗廟以微眇之身託于士民君王之上天下治亂在予一人唯二三執政猶吾股肱也朕下不能治育羣生上以累三光之明師古曰三光日月星也累音力瑞反其不德大矣令至其悉思朕之過失師古曰令謂此詔書及知見之所不及匄以啓告朕師古曰匄音蓋匄亦乞也啓開也言以過失開告朕躬是則於朕為恩惠也商書說命曰啓乃心沃朕心及舉賢良方正能直言極諫者以匡朕之不逮師古曰匡正也逮及也不逮者意慮所不及因各敕以職任務省繇費以便民師古曰省減也音所領反繇音傜朕旣不能遠德故􅍀然念外人之有非蘇林曰􅍀寢視不安貌孟康曰􅍀猶介然也非姦非也師古曰孟說是也􅍀音下板反宋祁曰蘇林注文􅍀字下當有然字是以設備未息今縱不能罷邊屯戍又飭兵厚衞師古曰飭整也音勅其罷衞將軍軍太僕見馬遺財足師古曰遺留也財與纔同纔少也太僕見在之馬今當減留纔足充事而已餘皆以給傳置師古曰傳音張戀反置者置傳驛之所因名置也他皆類此宋祁曰傳傳舍置廐置按廣雅云置驛也春正月丁亥詔曰夫農天下之本也其開籍田應劭曰古者天子耕籍田千􅅕為天下先籍者帝王典籍之常也韋昭曰籍借也借民力以治之以奉宗廟且以勸率天下使務農也臣瓚曰景帝詔曰朕親耕后親桑為天下先夲以躬親為義不得以假借為稱也籍謂蹈籍也師古曰瓚說是也國語曰宣王即位不籍千􅅕虢文公諫斯則籍非假借明矣朕親率耕以給宗廟粢盛師古曰黍稷曰粢在器曰盛粢音咨民謫作縣官及貸種食未入入未備者皆赦之師古曰種者五榖之種也食者所以為糧食也貸音吐戴反種音之勇反三月有司請立皇子為諸侯王詔曰前趙幽王幽死朕甚憐之已立其太子遂為趙王遂弟辟彊師古曰辟彊言辟禦彊梁者亦猶辟兵辟非耳辟音必亦反彊音其良反一説辟讀曰闢彊讀曰疆辟疆言開土地也賈誼書曰衞侯朝於周周行人問其名衞侯曰辟彊行人還之曰啓彊辟彊天子之號也諸侯弗得用更其名曰燬則其義两說並通他皆類此及齊悼惠王子朱虛侯章東牟侯興居有功可王乃遂立辟彊為河間王章為城陽王興居為濟北王因立皇子武為代王參為太原王揖為梁王五月詔曰古之治天下朝有進善之旌應劭曰旌幡也堯設之五達之道令民進善也如淳曰欲有進者立於旌下言之誹謗之木服䖍曰堯作之橋梁交午柱頭也應劭曰橋梁籩板所以書政治之愆失也至秦去之今乃復施也師古曰應說是也所以通治道而來諫者也今法有誹謗訞言之罪師古曰高后元年詔除妖言之令今此又有訞言之罪是則中間曽重復設此條也訞與妖同是使衆臣不敢盡情而上無由聞過失也將何以來遠方之賢良其除之民或祝詛上以相約而後相謾師古曰謾欺也初為要約共行祝詛後相欺誑中道而止無實事也謾音慢又音莫連反劉攽曰祝詛上以相約漢俗如此猶後漢傳云不直者不敢祝少賓也故吏得以為大逆吏以為大逆其有他言吏又以為誹謗此細民之愚無知抵死師古曰抵觸也亦至也朕甚不取自今以來有犯此者勿聽治九月初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五張晏曰符以代古之圭璋從簡易也師古曰與郡守為符者謂各分其半右留京師左以與之使音所吏反詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂師古曰衣食乏絶致有夭喪故不遂其生朕憂其然故今兹親率羣臣農以勸之其賜天下民今年田租之半師古曰免不收之三年冬十月丁酉晦日有食之十一月丁卯晦日有蝕之詔曰前日詔遣列侯之國辭未行丞相朕之所重其為朕率列侯之國遂免丞相勃遣就國十二月太尉潁陰侯灌嬰為丞相罷太尉官屬丞相夏四月城陽王章薨淮南王長殺辟陽侯審食其師古曰殺之於其家五月匈奴入居北地河南為寇師古曰北地郡之北黄河之南即白羊所居上幸甘泉如淳曰蔡邕云天子車駕所至民臣以為僥幸故曰幸見令長三老官屬親臨軒作樂賜以酒食帛葛越巾佩帶之屬民爵有級數或賜田租之半故因謂之幸也師古曰甘泉在雲陽夲秦林光宫宋祁曰注文賜以酒食帛葛越本無酒葛二字遣丞相灌嬰擊匈奴匈奴去發中尉材官屬衞將軍軍長安上自甘泉之高奴師古曰之徃也高奴上郡之縣因幸太原見故羣臣皆賜之舉功行賞諸民里賜牛酒師古曰里别率賜之復晉陽中都民三歲租師古曰復音方目反留游太原十餘日濟北王興居聞帝之代欲自擊匈奴乃反發兵欲襲滎陽於是詔罷丞相兵以棘蒲侯柴武為大將軍臣瓚曰漢帝年紀為陳武此云柴武為有二姓將四將軍十萬衆擊之祁侯繒賀為將軍軍滎陽秋七月上自太原至長安詔曰濟北王背德反上詿誤吏民師古曰詿亦誤也音卦為大逆濟北吏民兵未至先自定及㠯軍城邑降者皆赦之復官爵師古曰復音扶目反與王興居去來者亦赦之師古曰雖始與興居共反今棄之去而來降者亦赦劉攽曰高帝詔曰與綰居去來歸者赦之今此文亦當云與王興居居去來者赦之蓋脱一居字也八月虜濟北王興居自殺赦諸與興居反者四年冬十二月丞相灌嬰薨夏五月復諸劉有屬籍家無所與師古曰復音方目反與音豫賜諸侯王子邑各二千户秋九月封齊悼惠王子七人為列侯絳侯周勃有罪逮詣廷尉詔獄作顧成廟服虔曰廟在長安城南文帝作還顧見城故名之應劭曰文帝自為廟制度卑狹若顧望而成猶文王靈臺不日成之故曰顧成賈誼曰因顧成之廟為天下太宗與漢無極如淳曰身存而為廟若尚書之顧命也景帝廟號徳陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂游元帝廟號長壽成帝廟號陽池師古曰以還顧見城因即為名於義無取又書夲不作城郭字應説近之五年春二月地震夏四月除盗鑄錢令應劭曰聽放民鑄也更造四銖錢應劭曰文帝以五分錢太輕小更作四銖錢文亦曰半两今民間半两錢最輕小者是也六年冬十月桃李華十一月淮南王長謀反廢遷蜀嚴道死師古曰遷於蜀郡之嚴道行至扶風雍縣在道而死也七年冬十月令列侯太夫人夫人諸侯王子及吏二千石無得擅徵捕如淳曰列侯之妻稱夫人列侯死子復為列侯乃得稱太夫人子不為列侯不得稱也夏四月赦天下六月癸酉未央宮東闕罘罳災如淳曰東闕與其兩旁罘罳皆災也晉灼曰東闕之罘罳獨災也師古曰罘罳謂連闕曲閣也以覆重刻垣墉之處其形罘罳然一曰屏也罘音浮宋祁曰江南本罳作思八年夏封淮南厲王長子四人為列侯有長星出于東方文頴曰孛彗長三星其占畧同然其形象小異孛星光芒短其光四出蓬蓬孛孛也彗星光芒長參參如埽彗長星光芒有一直指或竟天或十丈或三丈或二丈無常也大法孛彗星多為除舊布新火災長星多為兵革事九年春大旱十年冬行幸甘泉將軍薄昭死鄭氏曰昭殺漢使者文帝不忍加誅使公卿從之飲酒欲令自引分昭不肻使羣臣喪服徃哭之乃自殺有罪故言死如淳曰一説昭與文帝博不勝當飲酒侍郎酌為昭少一侍郎譴呵之時此郎下沭昭使人殺之是以文帝使自殺師古曰外戚恩澤侯表云坐殺漢使者自殺鄭説是也宋祁曰師古注文越本無自殺二字十一年冬十一月行幸代春正月上自代還夏六月梁王揖薨匈奴寇狄道十二年冬十二月河決東郡春正月賜諸侯王女邑各二千户二月出孝惠皇帝後宮美人令得嫁三月除關無用傳張晏曰傳信也若今過所也如淳曰兩行書繒帛分持其一出入關合之乃得過謂之傳也李竒曰傳棨也師古曰張說是也古者或用棨或用繒帛棨者刻木為合符也傳音張戀反棨音啓詔曰道民之路在於務本朕親率天下農十年于今而野不加辟師古曰辟讀曰闢開也歲一不登民有飢色師古曰登成也言五榖一嵗不成則衆庶飢餒是無蓄積故也是從事焉尚寡而吏未加務也師古曰從事從農事也吾詔書數下歲勸民種樹師古曰樹謂蓺殖也而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省師古曰省視也將何以勸焉其賜農民今年租稅之半又曰孝悌天下之大順也力田為生之本也三老衆民之師也廉吏民之表也朕甚嘉此二三大夫之行今萬家之縣云無應令師古曰無孝悌力田之人可應察舉之令豈實人情是吏舉賢之道未備也其遣謁者勞賜三老孝者帛人五匹悌者力田二匹廉吏二百石以上率百石者三匹師古曰自二百石以上每百石加三匹也及問民所不便安而以户口率置三老孝悌力田常員師古曰計户口之數以率之増置其員廣教化也令各率其意以道民焉師古曰道讀曰導十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀師古曰令立耕桑之禮制也夏除祕祝應劭曰祕祝之官移過于下國家諱之故曰祕也語在郊祀志五月除肉刑法語在刑法志六月詔曰農天下之本務莫大焉今厪身從事晉灼曰厪古勤字而有租税之賦是謂本末者無以異也李竒曰夲農也末賈也言農與賈俱出租無異也故除田租劉攽曰謂疑當作為字其於勸農之道未備其除田之租稅賜天下孤寡布帛絮各有數十四年冬匈奴寇邊殺北地都尉卬師古曰功臣表云鉼侯孫單以父北地都尉卬力戰死事文帝十四年封與此正合然則卬姓孫而徐廣乃云姓叚說者因曰叚㑹宗即卬之𤣥孫無所據也㑹宗漢書有傳班固不云是卬後何從而知之乎遣三將軍軍隴西北地上郡中尉周舎為衞將軍郎中令張武為車騎將軍軍渭北車千乗騎卒十萬人上親勞軍勒兵申教令師古曰申謂約束之賜吏卒自欲征匈奴羣臣諫不聽皇太后固要上乃止文頴曰要劫也哀痛祝誓之言於是以東陽侯張相如為大將軍建成侯董赫内史欒布皆為將軍擊匈奴匈奴走春詔曰朕𫉬執犧牲珪幣以事上帝宗廟十四年于今歴日彌長以不敏不明師古曰敏材識捷疾而久撫臨天下朕甚自媿師古曰媿古愧字其廣増諸祀壇場珪幣師古曰築土為壇除地為場幣祭神之帛昔先王逺施不求其報望祀不祈其福右賢左戚先民後已師古曰以賢為上然後及親也至明之極也今吾聞祠官祝􅁵如淳曰􅁵福也賈誼傳受􅁵坐宣室是也師古曰􅁵本字作禧假借用耳同音僖皆歸福於朕躬不為百姓朕甚媿之夫以朕之不德而專鄉獨美其福百姓不與焉師古曰與音豫是重吾不德也師古曰重音直用反其令祠官致敬無有所祈十五年春黄龍見於成紀師古曰成紀隴西縣上乃下詔議郊祀公孫臣明服色新垣平設五廟文頴曰公孫臣魯人也應劭曰新垣平趙人也師古曰五廟即下渭陽五帝之廟也語在郊祀志夏四月上幸雍始郊見五帝赦天下脩名山大川嘗祀而絶者有司以嵗時致禮九月詔諸侯王公卿郡守舉賢良能直言極諫者上親策之傅納以言師古曰傅讀曰敷敷陳其言而納用之語在鼂錯傳師古曰錯音千故反十六年夏四月上郊祀五帝于渭陽韋昭曰在渭城師古曰郊祀志云在長安東北非渭城也韋說謬矣五月立齊悼惠王子六人淮南厲王子三人皆為王秋九月得玉杯應劭曰新垣平詐令人獻之刻曰人主延壽令天下大酺明年改元後元年張晏曰新垣平候日再中以為吉祥故改元年以求延年之祚也宋祁曰按紀年通譜云史記文紀十七年書得玉杯曰人主延夀於是天子更始為元年而不著後字至班固則於此題後元年然則當時玉杯冊中之異但稱元耳史家追書後字以别初元冬十月新垣平詐覺謀反師古曰以詐事發覺自恐被誅因謀反也夷三族春三月孝惠皇后張氏薨張晏曰后黨於呂氏廢處北宮故不曰崩詔曰間者數年比不登師古曰比猶頻也又有水旱疾疫之災朕甚憂之愚而不明未達其咎意者朕之政有所失而行有過與師古曰與讀曰歟音弋於反下皆類此乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或費無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益師古曰度謂量計之音徒各反以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃師古曰末謂工商之業也蕃亦多也音扶元反為酒醪以靡榖者多師古曰醪汁滓酒也靡散也醪音來高反靡音糜六畜之食焉者衆與細大之義吾未能得其中師古曰中音竹仲反其與丞相列侯吏二千石博士議之有可以佐百姓者率意逺思無有所隱宋祁曰隱字下一有也字二年夏行幸雍棫陽宮蘇林曰棫音域張晏曰秦昭王所作也晉灼曰黄圖在扶風六月代王參薨匈奴和親詔曰朕既不明不能遠德使方外之國或不寧息夫四荒之外不安其生師古曰戎狄荒服故曰四荒言其荒忽去來無常也爾雅曰孤竹北户西王母日下謂之四荒封圻之内勤勞不處師古曰圻亦畿字王畿千里不處者不𫉬安居二者之咎皆自於朕之德薄而不能達逺也間者累年匈奴並暴邊境多殺吏民邊臣兵吏又不能諭其内志以重吾不德師古曰諭曉告也重音直用反夫久結難連兵中外之國將何以自寧今朕夙興夜寐勤勞天下憂苦萬民為之惻怛不安師古曰惻痛也怛恨也怛音丁曷反未嘗一日忘於心故遣使者冠蓋相望結轍於道韋昭曰使車徃還故轍如結也以諭朕志於單于師古曰單于匈奴天子之號也單音蟬今單于反古之道師古曰反還也計社稷之安便萬民之利新與朕俱棄細過偕之大道師古曰偕亦俱也之徃也趣也結兄弟之義以全天下元元之民師古曰元元善意也和親以定始于今年三年春二月行幸代四年夏四月丙寅晦日有食之五月赦天下免官奴婢為庶人行幸雍五年春正月行幸隴西三月行幸雍秋七月行幸代六年冬匈奴三萬騎入上郡三萬騎入雲中以中大夫令免為車騎將軍屯飛狐如淳曰在代郡師古曰中大夫官名其人姓令名免耳此諸將軍下至徐厲皆書姓而徐廣以為中大夫令是官名此説非也據百官表景帝初改衛尉為中大夫令文帝時無此官而中大夫是郎中令屬官秩比二千石故楚相蘇意為將軍屯句注應劭曰山險名也在雁門陰館師古曰句音章句之句將軍張武屯北地河内太守周亞夫為將軍次細柳服䖍曰在長安西北如淳曰長安細栁倉在渭北近石徼張揖曰在昆明池南今有栁市是也臣瓚曰一宿曰宿再宿曰信過信為次師古曰匈奴傳云置三將軍軍長安西細栁渭北棘門霸上此則細栁不在渭北揖說是也宋祁曰如淳注文長安字下一有圖字宗正劉禮為將軍次霸上祝兹侯徐厲為將軍次棘門孟康曰在長安北秦時宮門也如淳曰三輔黄圖棘門在横門外也以備胡夏四月大旱蝗師古曰蝗即螽也食苗為災今俗呼為簸􅀈蝗音胡光反􅀈音鍾令諸侯無入貢弛山澤師古曰弛觧也觧而不禁與衆庶同其利減諸服御損郎吏員發倉庾應劭曰水漕倉曰庾胡公曰在邑曰倉在野曰庾以振民民得賣爵七年夏六月己亥帝崩于未央宮臣瓚曰帝年二十二即位即位二十三年壽四十六也遺詔曰朕聞之蓋天下萬物之萌生靡不有死師古曰始生者曰萌死者天地之理物之自然奚可甚哀師古曰奚何也當今之世咸嘉生而惡死厚葬以破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服乆臨師古曰臨哭也音力禁反下云服臨當臨者音並同也以罹寒暑之數師古曰罹音離遭也哀人父子傷長老之志損其飲食絶鬼神之祭祀以重吾不德師古曰重音直用反謂天下何朕獲保宗廟以眇眇之身託于天下君王之上師古曰眇眇猶言細末也二十有餘年矣賴天之靈社稷之福方内安寧臣瓉曰方四方也内中也猶云中外師古曰此說非也直謂方之内耳靡有兵革師古曰靡無也朕既不敏常畏過行以羞先帝之遺德師古曰過行行有過失也羞謂忝辱也行音下更反惟年之久長懼于不終今乃幸以天年得復供養于高廟朕之不明與嘉之其奚哀念之有如淳曰得卒天年已善矣晉灼曰若以朕不明當嘉善朕之儉約何哀念之有也師古曰如晉之說非也與讀曰歟音弋於反帝自言或者豈朕見之不明乎以不可嘉為嘉耳然朕自謂得終天年供養高廟為可嘉之事無所哀念也今俗語猶然其意可曉矣劉攽曰與讀曰歟言得以天年供養於高廟我之不明而蒙此歟是可嘉也其奚哀念乎劉敞同其令天下吏民令到出臨三日皆釋服師古曰令謂此詔文也無禁取婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無踐伏儼曰踐翦也謂無斬衰也孟康曰踐跣也晉灼曰漢語作跣跣徒跣也師古曰孟晉二說是也絰帶無過三寸無布車及兵器應劭曰無以布衣車及兵器也服虔曰不施輕車介士也師古曰應說是也無發民哭臨宮殿中殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁無得擅哭臨以下師古曰為下棺也音義與高紀同服大紅十五日小紅十四日纖七日釋服服䖍曰皆當言大功小功布也纖細布衣也應劭曰紅者中祥大祥以紅為領緣纖者禫也凡三十六日而釋服矣此以日易月也晉灼曰漢書例以紅為功也師古曰紅與功同服晉二説是也此喪制者文帝自率已意創而為之非有取於周禮也何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之於前而近代學者因循謬説未之思也劉攽曰文帝制此喪服斷自己𦵏之後其未𦵏之前則服斬衰漢諸帝自崩至𦵏有百餘日者未𦵏則服不除矣翟方進傳後母終既𦵏三十六日起視事此其證也說者遂以日易月又不通計𦵏之日皆大謬也攷之文帝意既𦵏除重服制大紅小紅所以漸即吉耳又此内有注云傳曰方進供養後母甚篤以身備漢相不敢踰國家之制它不在令中者皆以此令比類從事師古曰言此詔中無文者皆以類比而行事布告天下使明知朕意霸陵山川因其故無有所改應劭曰因山為藏不復起墳山下川流不遏絶就其水名以為陵號歸夫人以下至少使應劭曰夫人以下有美人良人八子七子長使少使皆遣歸家重絶人類令中尉亞夫為車騎將軍屬國悍為將屯將軍師古曰典屯軍以備非常郎中令張武為復土將軍如淳曰主穿壙窴瘞事也師古曰穿壙出土下棺也已而寘之又即以為墳故云復土復反還也音扶目反發近縣卒萬六千人發内史卒萬五千人藏郭穿復土屬將軍武師古曰即張武也賜諸侯王已下至孝悌力田金錢帛各有數乙巳𦵏霸陵師古曰自崩至葬凡七日也霸陵在長安東南賛曰孝文白皇帝即位二十三年宮室苑囿車騎服御無所増益有不便宋祁曰便字下疑有者字輒㢮以利民師古曰㢮廢㢮音式爾反嘗欲作露臺召匠計之直百金上曰百金中人十家之産也師古曰中謂不富不貧吾奉先帝宮室嘗恐羞之何以臺為師古曰今新豊縣南驪山之頂有露臺鄉極為髙顯猶有文帝所欲作臺之處身衣弋綈如淳曰弋皂也賈誼曰身衣皂綈師古曰弋黒色也綈厚繒綈音大奚反所幸愼夫人衣不曵地帷帳無文繡以示敦朴為天下先治霸陵皆瓦器不得以金銀銅錫為飾宋祁曰飾舊作飭當從此夲因其山不起墳南越尉佗自立為帝召貴佗兄弟以德懐之佗遂稱臣與匈奴結和親後而背約入盗令邊備守不發兵深入恐煩百姓吳王詐病不朝賜以几杖羣臣袁盎等諫說雖切常假借納用焉蘇林曰假音休假借音以物借人之借張武等受賂金錢覺更加賞賜以媿其心專務以德化民是以海内殷富興於禮義斷獄數百幾致刑措應劭曰措置也民不犯法無所刑也師古曰㫁獄數百者言普天之下死罪人不過數百幾近也音巨衣反烏呼仁哉前漢書卷四前漢書卷四考證文帝紀立為代王臣召南按監夲作立子恒為代王非也帝紀中例不書名宋夲作立為代王下注宋祁曰越本立字下有子恒二字今從宋本頃王后注時呂􅎐為林光侯臣召南按林光當作臨光樊噲傳可證代王西鄉讓者三南鄉讓者再注即君位之漸也胡三省曰如淳説非代王所以再讓之意蓋王入代邸而漢廷羣臣繼至王以賔主禮接之故西鄉羣臣勸進王凡三讓羣臣遂扶王以正南面之位王又讓者再耳當受鬻者或以陳粟注淖溺也臣照按宋本無溺也二字以溺訓淖理不可通溺字當為泥字之訛以棘蒲侯柴武為大將軍將四將軍臣召南按四將軍昌侯盧卿也共侯盧罷師也寗侯魏遫也深澤侯趙將夜也見史記將相名臣表作顧成廟注因即為名監夲脱名字今補遣三將軍軍隴西北地上郡臣召南按上郡將軍昌侯盧卿也北地將軍寗侯魏遫也隴西將軍隆慮侯周竈也見匈奴傳建成侯董赫内史欒布皆為將軍臣召南按功臣表董赫是董渫之子封成侯非建成侯史記曰成侯赤為内史欒布為將軍是也公卿表於是年書内史董赤即依史記欒布傳未嘗為内史故公卿表不書此文建成侯既衍建字以内史連欒布為句亦非實事前漢書卷四考證
