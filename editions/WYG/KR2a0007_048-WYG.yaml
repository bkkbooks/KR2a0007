body:
  text: 前漢書卷四十八漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注賈誼傳第十八賈誼雒陽人也年十八以能誦詩書屬文稱於郡中師古曰屬謂綴輯之也言其能為文也屬音之欲反河南守吳公聞其秀材召置門下師古曰秀美也甚幸愛宋祁曰愛字下當有之字句緩而順文帝初立聞河南守吳公治平為天下第一師古曰治平言其政治和平也故與李斯同邑而嘗學事焉師古曰事之而從其學也徵以為廷尉廷尉廼言誼年少頗通諸家之書文帝召以為博士是時誼年二十餘最為少每詔令議下師古曰謂有詔令出下及遣議事諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能文帝說之師古曰說讀曰悅超遷歳中至太中大夫誼以為漢興二十餘年天下和洽宜當改正朔易服色制度定官名興禮樂廼草具其儀法師古曰草謂創造之色上黄數用五為官名悉更奏之師古曰更改也文帝謙讓未皇也師古曰皇暇也自以為不當改制然諸法令所更定及列侯就國其說皆誼發之于是天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之師古曰絳絳侯周勃也灌灌嬰也東陽侯張相如也馮敬時為御史大夫廼毁誼曰雒陽之人年少初學専欲擅權紛亂諸事于是天子後亦疎之不用其議以誼為長沙王太傅誼既以適去師古曰適音謫其下亦同意不自得及渡湘水師古曰湘水出零陵陽海山北流入江也為賦以弔屈原屈原楚賢臣也被讒放逐作離騷賦師古曰離遭也憂動曰騷遭憂而作此辭其終篇曰已矣國亡人莫我知也遂自投江而死誼追傷之因以自諭師古曰諭譬也其辭曰恭承嘉惠兮師古曰恭敬也嘉惠謂詔命也竢罪長沙師古曰竢古俟字俟待也仄聞屈原兮自湛汩羅師古曰仄古側字汨水名在長沙羅縣故曰汨羅湛讀曰沉汨音莫歴反造託湘流兮敬弔先生師古曰造至也言至湘水而因託其流也造音千到反遭世罔極兮廼隕厥身張晏曰讒言罔極師古曰罔無也極中也無中正之道一曰極止也烏虖哀哉兮逢時不祥師古曰虖音呼鸞鳯伏竄兮鴟鴞翺翔師古曰鴟鵂鶹怪鳥也鴞惡聲之鳥也鴟音尺夷反鴞音于驕反鵂音休闒茸尊顯兮讒䛕得志師古曰闒茸下材不肖之人也闒音吐盍反茸音人勇反賢聖逆曳兮方正倒植師古曰植立也音值謂隨夷溷兮應劭曰隨卞隨湯時廉士湯以天下讓而不受夷伯夷也不食周粟餓于首陽之下師古曰溷濁也音胡困反謂跖蹻廉李竒曰跖秦大盗也楚之大盗為莊蹻師古曰跖音之石反蹻音居畧反莊周云盗跖栁下惠之弟蓋寓言也莫邪為鈍兮應劭曰莫邪吳大夫也作寳劒因以冠名鈆刀為銛晉灼曰世俗謂利為銛徹師古曰音弋占反于嗟默默生之亡故兮應劭曰默默不得意也鄧展曰言屈原無故遇此禍也師古曰生先生也斡棄周鼎師古曰斡轉也音管寳康瓠兮鄭氏曰康瓠瓦盆底也爾雅曰康瓠謂之甈師古曰甈音五列反騰駕罷牛驂蹇驢兮師古曰罷讀曰疲蹇跛也驥垂兩耳服鹽車兮師古曰駕鹽車也章父薦屨漸不可久兮師古曰章父殷冠名也言冠乃居下屨反在上也父讀曰甫劉奉世曰薦之言藉也言以冠藉屨貴賤顛倒嗟若先生獨離此咎兮應劭曰嗟咨嗟也勞苦屈原遇此難也師古曰離遭也誶曰李竒曰誶告也張晏曰誶離騷下章亂也師古曰誶音碎已矣國其莫吾知兮師古曰一國之人不知我也子獨壹鬱其誰語師古曰壹鬱猶抑鬱也鳳縹縹其高逝兮夫固自引而逺去師古曰縹縹輕舉貌音匹遙反襲九淵之神龍兮鄧展曰襲重也師古曰九淵九旋之川言至深也沕淵潛以自珍鄧展曰沕音昧張晏曰潛藏也偭蟂獺以隱處兮服䖍曰蟂音梟應劭曰蟂獺水蟲害魚者也偭背也欲舍蟂獺從神龍遊也師古曰偭音靣夫豈從蝦與蛭螾服䖍曰蛭水蟲螾今之螼螾也孟康曰言龍自絶於蟂獺况從蝦與蛭螾也師古曰蝦亦水蟲也音遐蛭音質螾字與蚓同音引今合韻當音弋人反螼音丘謹反所貴聖之神德兮逺濁世而自臧使麒麟可係而羈兮豈云異夫犬羊般紛紛其離此郵兮蘇林曰般音槃孟康曰般音班般反也紛紛構讒意也師古曰般孟音是也字從丹青之丹離遭也郵過也亦夫子之故也李竒曰亦夫子不如麟鳯之故離此咎也師古曰此說非也賈誼自言今之離郵亦猶屈原耳劉攽曰顔說全失但誼舉屈原事則可興已矣遂自叙其怨憤則太過矣許應元曰誶曰以下咎屈原不能全身逺害故弔之非誼自喻也顔說非是歴九州而相其君兮何必懐此都也師古曰言往長沙為傅不足哀傷何用茍懐此之都邑蓋亦誼自寛廣之言也鳳皇翔于千仞兮覽徳煇而下之師古曰八尺曰仞千仞言其極高也見細徳之險微兮遙增擊而去之師古曰増重也言見苛細之人險阨之證故重擊其羽而高去宋祁曰浙本微作徵作微者非是上言微注言證意自相㑹彼尋常之汙瀆兮豈容吞舟之魚應劭曰八尺曰尋倍尋曰常師古曰水不泄為汙音一胡反又音一故反横江湖之鱣鯨兮固將制於螻螘如淳曰鱣鯨皆大魚也臣瓚曰鱣魚無鱗口在腹下鯨魚長者長數里晉灼曰小水不容大魚而横鱣鯨于汙瀆必為螻螘所制以况小朝主闇不容受忠逆之言亦為讒賊小臣所害師古曰鱣音竹連反字或作鱏鱏亦大魚也音淫又音尋螻音樓謂螻蛄也誼為長沙傅三年有服飛入誼舍止於坐隅師古曰坐音才臥反服似鴞晉灼曰異物志曰有鳥小雞體有文色土俗因形名之曰服不能逺飛行不出域也宋祁曰注文鳥字下疑有如字不祥鳥也誼既以適居長沙長沙卑濕誼自傷悼以為壽不得長廼為賦以自廣其辭曰單閼之歳四月孟夏應劭曰太歳在卯為單閼師古曰閼音一葛反宋祁曰單音禪庚子日斜服集余舍孟康曰日斜日昳時止于坐隅貌甚閒暇師古曰閒讀曰閑異物來崪私怪其故孟康曰崪音萃萃聚集也發書占之䜟言其度師古曰䜟驗也有徵驗之書也䜟音初禁反曰野鳥入室主人將去問于子服余去何之師古曰子服者言加其美稱也宋祁曰子服姚本作于服吉虖告我凶言其災淹速之度語余其期師古曰淹遲也服乃太息舉首奮翼口不能言請對以意師古曰意字合韻宜音億萬物變化固亡休息斡流而遷或推而還師古曰斡音管斡轉也還讀曰旋形氣轉續變化而嬗服䖍曰嬗音如蟬謂變蛻也蘇林曰相傳與也師古曰此即禪代字合韻故音嬋耳蘇說是也沕穆亡間胡可勝言師古曰沕穆深微貌胡何也言其理深微不可盡言沕音勿禍兮福所倚福兮禍所伏師古曰此老子徳經之言也倚音於綺反憂喜聚門吉凶同域師古曰言禍福相因吉凶不定彼吳彊大夫差以敗粤棲會稽勾踐伯世師古曰會稽山名也句踐避吳之難保於此山故曰棲也句音鉤伯讀曰霸斯遊遂成卒被五刑應劭曰李斯西遊于秦身登相位二世時為趙髙所讒身伏五刑宋祁云注姚本伏作被傅說胥靡廼相武丁張晏曰胥靡刑名也傅說被刑築于傅巖武丁以為已相師古曰胥靡相隨之刑也解在楚元王傳夫禍之與福何異紏纆應劭曰禍福相為表裏如紏繩索相附會也臣瓚曰紏絞也纆索也師古曰纆音墨命不可說孰知其極師古曰極止也水激則旱矢激則逺師古曰言水之激疾則去盡不能浸潤矢之激發則去逺劉攽曰旱讀為悍猛疾也萬物回薄震蕩相轉雲蒸雨降糾錯相紛大鈞播物坱圠無垠如淳曰陶者作器于鈞上此以造化為大鈞也應劭曰其氣坱圠非有限齊也師古曰今造瓦者謂所轉者為鈞言造化為人亦猶陶之造瓦耳坱音烏朗反北音於黠反天不可與慮道不可與謀遲速有命烏識其時師古曰烏猶何也且夫天地為鑪造化為工隂陽為炭萬物為銅師古曰以冶鑄為喻合散消息安有常則千變萬化未始有極忽然為人何足控揣孟康曰控引也揣持也言人生忽然何足引持自貴借也如淳曰控引也揣音團控摶玩弄愛生之意也師古曰如說是宋祁云注文貴借姚本作貴惜化為異物又何足患師古曰患合韻音環小智自私賤彼貴我達人大觀物亡不可貪夫徇財列士徇名臣瓚曰以身從物曰徇宋祁曰浙本徇作殉夸者死權品庶每生臣瓚曰謂夸泰也莊子曰權勢不充則夸者悲孟康曰每貪也師古曰品庶猶庶品也怵廹之徒或趨西東孟康曰怵為利所誘訹也迫迫貧賤東西趨利也師古曰誘訹之訹則音戍或曰怵怵惕也音丑出反其義兩通而說者欲改字為鉥蓋穿鑿耳大人不曲意變齊同愚士繫俗僒若囚拘李竒曰僒音塊蘇林曰皆人肩傴僒爾音欺全反師古曰蘇音是臣佖曰按說文窘音渠隕反迫也文選李善注窘囚拘之貌五臣注窘困也愚者繫縳俗累困如囚人拘束其字並不從人唯孫強新加字玉篇及開元文字有作僒字並音窘疑蘇林音誤今宜定從說文音渠隕反至人遺物獨與道俱衆人惑惑好惡積意李竒曰惑惑東西也所好所惡積之萬億也臣瓚曰言衆懐好惡積之心意也師古曰瓚說是也意合韻音於力反眞人恬漠獨與道息師古曰恬安也漠静也釋智遺形超然自喪服䖍曰絶聖弃智而亡其身也師古曰喪合韻音先郎反寥廓忽荒與道翺翔師古曰荒音呼廣反乗流則逝遇坎則止孟康曰易坎為險遇險難而止也張晏曰謂夷易則仕險難則隐也縱軀委命不私與已其生兮若浮其死兮若休師古曰休息也澹虖若深淵之靚汜虖若不繫之舟師古曰澹安也音徒濫反靚與静同汜音敷劒反不以生故自保養空而浮服䖍曰道家養空虚若浮舟也徳人無累知命不憂細故蔕芥何足以疑師古曰蔕芥小鯁也蔕音丑芥反後歳餘文帝思誼徵之至入見上方受釐坐宣室蘇林曰宣室未央前正室也應劭曰釐祭餘肉也漢儀注祭天地五畤皇帝不自行祠還致福釐音禧師古曰禧福也借釐字為之耳言受神之福也上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝前席師古曰漸促近誼聽說其言也既罷曰吾久不見賈生自以為過之今不及也廼拜誼為梁懐王太傅懐王上少子愛而好書故令誼傅之數問以得失師古曰漢朝問以國家之事是時匈奴彊侵邊天下初定制度疏闊諸侯王僭儗地過古制師古曰儗比也上比于天子儗音擬淮南濟北王皆為逆誅誼數上疏陳政事多所欲匡建師古曰匡正也正其失也建立也立制節也其大略曰臣竊惟事埶可為痛哭者一可為流涕者二可為長太息者六若其它背理而傷道者難徧以疏舉師古曰言不可盡條記也進言者皆曰天下已安已治矣師古曰進言者謂陳說于天子前者也治音直吏反此以下並同臣獨以為未也曰安且治者非愚則䛕師古曰實謂治安則是愚也知其不爾而假言之是諂䛕也皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上師古曰厝置也音千故反火未及燃因謂之安宋祁云浙本燃作然然已從火旁又加火非是方今之埶何以異此本末舛逆首尾衡决國制搶攘蘇林曰搶音濟濟蹌蹌不安貌也晉灼曰搶音傖吳人罵楚人曰傖傖攘亂貌也師古曰晉音是傖音仕庚反攘音汝庚反宋祁云搶攘今越本搶音仕庚反攘音女庚反未知孰是非甚有紀師古曰紀理也胡可謂治陛下何不壹令臣得孰數之于前因陳治安之策試詳擇焉夫射獵之娛與安危之機孰急師古曰言二事之中何者為急使為治勞智慮苦身體乏鍾鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動師古曰軌道言遵法制也民保首領匈奴賔服四荒鄉風師古曰鄉讀曰嚮百姓素朴獄訟衰息大數既得則天下順治海内之氣清和咸理生為明帝没為明神名譽之羙垂於無窮禮祖有功而宗有徳使顧成之廟稱為太宗上配太祖與漢亡極建久安之埶成長治之業以承祖廟以奉六親至孝也應劭曰六親父母兄弟妻子也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程師古曰程式也雖有愚㓜不肖之嗣猶得䝉業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也師古曰少知治體者誼自謂也劉攽曰少知治體泛說爾何必誼自謂乎其具可素陳于前願幸無忽師古曰忽怠忘也臣謹稽之天地師古曰稽考也驗之往古按之當今之務日夜念此至孰也雖使禹舜復生為陛下計亡以易此師古曰易改也夫樹國固必相疑之埶鄭氏曰今建立國泰大其勢必固相疑也臣瓚曰樹國于險固諸侯强大則必與天子有相疑之勢也師古曰鄭說是也下數被其殃上數爽其憂如淳曰爽忒也甚非所以安上而全下也今或親弟謀為東帝應劭曰淮南厲王長親兄之子西鄉而擊如淳曰謂齊悼惠王子興居而為濟北王反欲擊取滎陽也師古曰鄉讀曰嚮今吳又見告矣如淳曰時吳王又不循漢法有告之者天子春秋鼎盛應劭曰鼎方也行義未過師古曰行音下更反德澤有加焉猶尚如是况莫大諸侯師古曰莫大謂無有大于其國者言最大也權力且十此者虖師古曰十倍於此然而天下少安何也大國之王㓜弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠師古曰大抵猶言大畧也音丁禮反其下亦同血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治宋祁云浙本治字上有能字存能則語成文黄帝曰日中必􅡢操刀必割孟康曰􅡢音衞日中盛者必暴􅡢也臣瓚曰太公曰日中不是謂失時操刀不割失利之期言當及時也師古曰此語見六韜􅡢謂暴曬之也曬音所智反又音所懈反今命此道順而全安甚易不肯早為已廼墮骨肉之屬而抗剄之應劭曰抗其頭而剄之也師古曰墮毁也抗舉也剄割頸也墮音火規反剄音工鼎反豈有異秦之季世虖夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時師古曰曩久也謂昔時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫高為相盧綰王燕陳豨在代令此六七公者皆亡恙師古曰無恙言無憂病也當是時而陛下即天子位能自安乎宋祁云浙本位字上有之字臣有以知陛下之不能也天下殽亂高皇帝與諸公併起師古曰殽雜也併音歩鼎反非有仄室之埶以豫席之也應劭曰禮卿大夫之支子為側室席大也臣瓚曰席藉也言非有側室之勢為之資藉也師古曰瓚說是也諸公幸者廼為中涓其次廑得舍人師古曰廑與僅同廑劣也言纔得舍人材之不逮至遠也高皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣悳至渥也師古曰悳古徳字渥厚也音握然其後十年之間反者九起陛下之與諸公非親角材而臣之也師古曰角校也競也又非身封王之也自高皇帝不能以是一歳為安故臣知陛下之不能也然尚有可諉者曰疏孟康曰諉累也以疏為累言不以國也蔡謨曰諉者託也尚可託言信越等以疏故反故其下句曰臣請試言其親者親者亦恃彊為亂明信等不以疏也師古曰蔡說是矣諉音女瑞反臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁師古曰共讀曰恭靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治虖臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心師古曰自以為于天子為昆弟而不論君臣之義慮亡不帝制而天子自為者師古曰慮大計也言諸侯皆欲同皇帝之制度而為天子之事擅爵人赦死辠師古曰擅專也甚者或戴黄屋師古曰天子車戴之制宋祁云注文姚本戴作蓋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎師古曰不軌謂不修法制也致至也幸而來至法安可得加動一親戚天下圜視而起應劭曰圜精正視也師古曰言驚愕也陛下之臣雖有悍如馮敬者如淳曰馮無擇子名忠直為御史大夫奏淮南厲王誅之師古曰悍勇也宋祁曰案功臣表非馮無擇子孝文七年自典客為御史大夫適啓其口匕首已陷其匈矣師古曰始欲發言節制諸侯王則為刺客所殺陛下雖賢誰與領此師古曰領理也故疏者必危親者必亂已然之效也其異姓負彊而動者漢已幸勝之矣又不易其所以然同姓襲是跡而動師古曰易其所以然謂改其法制使不然既有徵矣師古曰徵證驗也其埶盡又復然殃旤之變未知所移師古曰旤古禍字明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛蘇林曰孔子時人也師古曰坦屠牛者之名也事見管子而芒刃不頓者師古曰芒刃謂刃之利如毫芒也頓讀曰鈍所排擊剝割皆衆理解也師古曰解支節也音胡懈反至於髖髀之所非斤則斧師古曰髀股骨也髖髀上也言其骨大故須斤斧也髖音寛髀音陛又音必爾反夫仁義恩厚人主之芒刃也權埶法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃師古曰嬰繞也臣以為不缺則折胡不用之淮南濟北埶不可也晉灼曰二國皆反誅何不施之仁恩埶不可故也臣竊跡前事師古曰尋前事之蹤跡大抵彊者先反淮隂王楚最彊則最先反韓信倚胡則又反師古曰倚依也音於綺反貫高因趙資則又反陳豨兵精則又反彭越用梁則又反晉灼曰用役用之也黥布用淮南則又反盧綰最弱最後反長沙廼在二萬五千戸耳功少而最完埶疏而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖以殘亡可也晉灼曰事埶可亡也師古曰曩亦謂昔時也令信越之倫列為徹侯而居雖至今存可也晉灼曰事埶可存然則天下之大計可知已師古曰已語終辭欲諸王之皆忠附則莫若令如長沙王欲臣子之勿葅醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心師古曰使以義使之遵禮義也令海内之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安宋祁云舊本在作有故天下咸知陛下之明割地定制令齊趙楚各為若干國師古曰若干豫設數也解在食貨志使悼惠王幽王元王之子孫畢以次各受祖之分地師古曰分音扶問反次下亦同地盡而止及燕梁它國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之師古曰須待也諸侯之地其削頗入漢者為徙其侯國及封其子孫也師古曰徙其侯國列侯國邑在諸侯王封内而犬牙相入者則正其疆界令其隔絶也封其子孫者分諸侯王之國邑各自封其子孫而受封之人若有罪黜其地皆入于漢故云頗入也宋祁云新本子孫下有于彼二字注文令其隔絶浙本作令不隔絶所以數償之一寸之地一人之衆天子亡所利焉師古曰償者謂所正列侯疆界有侵諸侯王者則漢償之劉攽曰言諸侯之地先有削而頗入漢者後而以封列侯今為徙之及至封其子孫皆據數償之假令一王合封十縣則予十縣是為以數償之矣所字衍文劉奉世曰償之言還也所以數復還其削地如前所云者明天子不利有其地也誠以定治而已故天下咸知陛下之廉地制壹定宗室子孫莫慮不王師古曰慮計也下無倍畔之心上無誅伐之志師古曰倍讀曰背故天下咸知陛下之仁法立而不犯令行而不逆貫高利幾之謀不生柴竒開章之計不萌應劭曰柴竒開章皆與淮南王謀反者也宋祁云新本開作啟細民鄉善大臣致順師古曰鄉讀曰嚮故天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘而天下不亂服䖍曰言天下安雖赤子遺腹在位猶不危也應劭曰置遺腹朝委裘皆未有所知也孟康曰委裘若容衣天子未坐朝事先帝裘衣也師古曰應孟二說皆是當時大治後世誦聖師古曰稱誦其聖明壹動而五業附陛下誰憚而久不為此師古曰憚畏難也音徒旦反天下之埶方病大瘇如淳曰腫足曰瘇師古曰音止勇反一脛之大幾如要一指之大幾如股師古曰幾並音巨依反平居不可屈信師古曰信讀曰伸一二指搐身慮亡聊師古曰搐謂動而痛也聊頼也搐音丑六反宋祁云越本搐作畜失今不治必為錮疾師古曰錮疾堅久之疾後雖有扁鵲不能為已師古曰扁鵲良醫也為治也已語終辭病非徒瘇也又苦􅏓盭師古曰􅏓古蹠字音之石反足下曰蹠今所呼脚掌是也盭古戾字言足蹠反戾不可行也元王之子帝之從弟也師古曰楚元王高帝之弟其子於文帝為從弟今之王者從弟之子也惠王親兄子也今之王者兄子之子也師古曰惠王齊悼惠王劉攽曰惠王下脫之子二字親者或亡分地以安天下師古曰廣立蕃屏則天下安故曰以安天下疏者或制大權以偪天子師古曰偪古逼字臣故曰非徒病瘇也又苦􅏓盭可痛哭者此病是也天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚娒侵掠至不敬也師古曰娒古侮字為天下患至亡已也師古曰亡已言不可止也而漢歳致金絮采繒以奉之夷狄徵令是主上之操也師古曰徵召也令號令也操謂主上之所操持也操音千高反天子共貢是臣下之禮也師古曰共讀曰恭足反居上首顧居下師古曰顧亦反也言如人反顧然倒縣如此莫之能解猶為國有人乎師古曰顛倒如此而不能解救豈謂國有明智之人乎非亶倒縣而已師古曰亶讀曰但又類辟且病痱服䖍白病癖不能行也師古曰辟足病痱風辟音壁痱音肥宋祁曰浙本注病字下有也字痱下有體傷病也四字若止用舊注則全無意當用浙本夫辟者一靣病痱者一方痛今西邊北邊之郡雖有長爵不輕得復張晏曰長爵高爵也雖受高爵之賞猶將禦宼不得復除逸豫也蘇林曰輕易也不易得復除言難也師古曰復音方目反五尺以上不輕得息如淳曰五尺謂小兒也言無小大皆當自為戰備斥候望烽燧不得臥文頴曰邊方備胡㓂作高土櫓櫓上作桔臯桔臯頭兠零以薪草置其中常低之有㓂即火燃舉之以相告曰烽又多積薪㓂至即燃之以望其煙曰燧張晏曰晝舉烽夜燔燧也師古曰張說誤也晝則燔燧夜則舉烽將吏被介胄而睡師古曰被音皮義反臣故曰一方病矣醫能治之而上不使師古曰醫者誼自謂可為流涕者此也陛下何忍以帝皇之號為戎人諸侯埶既卑辱而旤不息長此安窮師古曰言長養此患將何所窮極也進謀者率以為是固不可解也亡具甚矣師古曰無治安之具臣竊料匈奴之衆師古曰料量也音聊不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主匈奴行臣之計請必係單于之頸而制其命伏中行說而笞其背鄭氏曰說奄人也漢使送公主妻匈奴說不肯行強之因以漢事告匈奴也師古曰中行姓也說名也行音胡剛反說讀曰悅中行說事具在匈奴傳舉匈奴之衆唯上之令師古曰聽天子之命今不獵猛敵而獵田彘不搏反寇而搏畜莵翫細娛而不圖大患非所以為安也徳可逺施威可逺加而直數百里外威令不信師古曰信讀曰伸可為流涕者此也今民賣僮者如淳曰僮謂隸妾也為之繡衣絲履偏諸緣服䖍曰加牙條以作履緣師古曰偏諸若今之織成以為要襻及褾領者也古謂之車馬裠其上為乗車及騎從之象也内之閑中服䖍曰閑賣奴婢闌是古天子后服所以廟而不宴者也師古曰入廟則服之宴處則不著蓋貴之也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸晉灼曰以偏諸緁著衣也師古曰緁音妾謂以偏諸緶著之也緶音歩千反美者黼繡師古曰黼者織為斧形繡者刺為衆文是古天子之服今富人大賈嘉會召客者以被牆師古曰被音皮義反古者以奉一帝一后而節適師古曰得其節而合宜今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也師古曰屈謂財力盡也音其勿反且帝之身自衣皁綈師古曰綈厚繒也音徒奚反而富民牆屋被文繡天子之后以緣其領庶人㜸妾緣其履師古曰㜸庶賤也此臣所謂舛也夫百人作之不能衣一人師古曰衣音於既反欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切于民之肌膚欲其亡為姦邪不可得也國已屈矣師古曰屈音其勿反盜賊直須時耳師古曰言待時而發然而獻計者曰毋動師古曰言天下安不可動搖為大耳如淳曰好為大語者夫俗至大不敬也至亡等也師古曰無尊卑之差至冒上也師古曰冒犯也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩師古曰謂商鞅并心于進取行之二歳秦俗日敗故秦人家富子壯則出分家貧子壯則出贅應劭曰出作贅壻也師古曰謂之贅壻者言其不當出在妻家亦猶人身體之有肬贅非應所有也一說贅質也家貧無有聘財以身為質也贅音之銳反分音扶問反借父耰鉏慮有徳色師古曰耰摩田器也言以耰及鉏借與其父而容色自矜為恩徳也耰音憂母取箕箒立而誶語服䖍曰誶猶罵也張晏曰誶責讓也師古曰張說是也誶音碎宋祁曰浙本箒作帚抱哺其子與公併倨師古曰哺飤也言婦抱子而哺之乃與其舅併倨無禮之甚也哺音歩併音歩鼎反婦姑不相說則反脣而相稽應劭曰稽計也相與計校也師古曰說音悅稽音工奚反宋祁曰反脣一作反辱劉攽曰辱或作唇其慈子耆利不同禽獸者亡幾耳師古曰唯有慈愛其子而貪嗜財利小異于禽獸也亡幾言不多也幾居豈反劉奉世曰誼謂秦人不知孝義但如禽獸知愛子貪利而已此其去禽獸亡幾也顔解不明乃似云惟此小異于禽獸然并心而赴時猶曰蹷六國兼天下蘇林曰蹷音厥師古曰蹷謂拔而取之功成求得矣師古曰求得所求者得也終不知反廉愧之節仁義之厚師古曰反還也信并兼之法遂進取之業師古曰信讀曰伸一曰信任天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海内徳從天下師古曰大賢謂高祖也徳從天下天下從其徳曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐廉耻日甚可謂月異而歳不同矣逐利不耳慮非顧行也師古曰言其所追赴唯計利與不耳念慮之中非顧行之善惡也劉攽曰慮大率也今其甚者殺父兄矣盜者剟寢户之簾師古曰剟謂割取之也室有東西廂曰廟無東西廂曰寢蓋謂陵上之寢剟音輟搴兩廟之器如淳曰搴取也兩廟高祖惠帝廟也師古曰搴拔也音騫又音蹇白晝大都之中剽吏而奪之金師古曰白晝晝日也言白者謂不隂晦也剽劫也音頻妙反矯偽者出幾十萬石粟服䖍曰吏矯偽徵發盈出十萬石粟師古曰服說非也幾近也言詐為文書以出倉粟近十萬石耳非謂徵發于下也幾音鉅依反賦六百餘萬錢乗傳而行郡國如淳曰此言富者出錢穀得高爵或乃為使者乗傳車循行郡國以為榮也師古曰如說亦非也此又言矯偽之人詐為詔令妄作賦歛其數甚多又詐乗傳而行郡國也行音下更反此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故師古曰特徒也言公卿大臣特以簿書期會為急不知正風俗厲行義也宋祁云注文姚本特以作徒以至於俗流失世壊敗因恬而不知怪師古曰恬安也音徒兼反慮不動于耳目以為是適然耳師古曰適當也謂事理當然夫移風易俗使天下回心而鄉道類非俗吏之所能為也師古曰鄉讀曰嚮俗吏之所務在於刀筆筐篋師古曰刀所以削書扎筐篋所以盛書而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀師古曰紀理也此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壊師古曰植建也僵偃也音疆筦子曰師古曰筦與管同管子管仲也禮義廉耻是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而少知治體則是豈可不為寒心哉師古曰若以管子為愚人其言不實則無禮義廉耻可也若以管子為微識治體則當寒心而憂之秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歳而社稷為虚師古曰虚讀曰墟謂丘墟今四維猶未備也故姦人幾幸而衆心疑惑師古曰幾讀曰冀次下亦同豈如今定經制師古曰經常也令君君臣臣師古曰君為君徳臣為臣道上下有差父子六親各得其宜姦人亡所幾幸而羣臣衆信上不疑惑師古曰衆信謂共為忠信也此業壹定世世常安而後有所持循矣師古曰執持而順行之若夫經制不定是猶度江河亡維楫師古曰維所以繫舩楫所以刺舩也詩云紼纚維之楫音集又音接中流而遇風波舩必覆矣師古曰覆音芳目反可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也師古曰逺音于萬反何三代之君有道之長而秦無道之暴也其故可知也古之王者太子廼生固舉以禮師古曰廼始也使士負之有司齊肅端冕師古曰齊讀曰齋見之南郊見于天也師古曰見音胡電反過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣師古曰赤子言其新生未有眉髪其色赤劉奉世曰人生則有眉髪矣顔說誤匐匍入井又非所謂新生也嬰兒體色赤故曰赤子耳昔者成王㓜在繦抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之徳義師道之教訓師古曰保安也傅輔也道讀曰導其下亦同此三公之職也于是為置三少皆上大夫也曰少保少傅少師是與太子宴者也師古曰宴謂安居故廼孩提有識三公三少固明孝仁禮義以道習之師古曰孩小兒也提謂提撕之逐去邪人不使見惡行于是皆選天下之端士師古曰端正也直也孝悌博聞有道術者以衛翼之師古曰悌音徒繼反使與太子居處出入故太子廼生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長于齊不能不齊言也習與不正人居之不能毋不正猶生長于楚之地不能不楚言也故擇其所耆必先受業廼得嘗之師古曰耆讀曰嗜擇其所樂必先有習廼得為之孔子曰少成若天性習貫如自然師古曰貫亦習也音工宦反及太子少長知妃色師古曰妃色妃匹之色則入于學學者所學之官也師古曰官謂官舍學禮曰帝入東學上親而貴仁則親疎有序而恩相及矣帝入南學上齒而貴信則長㓜有差而民不誣矣帝入西學上賢而貴徳則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣師古曰隃與踰同謂越制宋祁曰注末當添也字帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及師古曰則法也匡正也則徳智長而治道得矣此五學者既成于上則百姓黎民化輯于下矣師古曰輯與集同輯和也及太子既冠成人免于保傅之嚴則有記過之史師古曰有過則記徹膳之宰師古曰有闕則諫進善之旌師古曰進善言者立于旌下誹謗之木師古曰譏惡事者書之于木敢諫之鼓師古曰欲顯諫者則擊鼓瞽史誦詩工誦箴諫師古曰瞽無目者也工習樂者也大夫進謀士傳民語習與智長故切而不媿師古曰每被切磋故無大過可耻媿之事化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也師古曰朝日以朝夕月以暮皆迎其初出也下朝音直遥反春秋入學坐國老執醬而親餽之師古曰餽與饋同所以明有孝也行以鸞和師古曰鸞和車上鈴也解在禮樂志歩中采齊師古曰樂詩名也字或作薺又作茨並音律私反趣中肆夏師古曰亦樂詩名趣讀曰趨趨疾歩也凡言中者謂與其節相應也並音竹仲反所以明有度也其于禽獸見其生不食其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也師古曰逺音于萬反長音竹兩反夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也師古曰訐謂靣相斥罪也音居謁反固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然師古曰艾讀曰刈菅茅也音姦豈惟胡亥之性惡哉彼其所以道之者非其理故也師古曰道讀曰導鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其已事可知也師古曰已事已往之事然而不能從者是不法聖智也師古曰法謂則而效之秦世之所以亟絶者其轍跡可見也師古曰亟急也音居力反車跡曰轍然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣于太子太子之善在于早諭教與選左右師古曰諭曉告也與猶及也夫心未濫而先諭教則化易成也開于道術智誼之指則教之力也若其服習積貫則左右而已師古曰貫音工宦反夫胡粤之人生而同聲耆欲不異師古曰耆讀曰嗜及其長而成俗累數譯而不能相通行有雖死而不相為者蘇林曰言其人之行不能易事相為處宋祁曰浙本無者字為是不但成語亦與注會則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣宋祁曰越本得字上有有字太子正而天下定矣書曰一人有慶兆民賴之師古曰周書呂刑之辭也一人天子也言天子有善則兆庶獲其利此時務也凡人之智能見已然不能見將然師古曰將然謂欲有其事夫禮者禁於將然之前而法者禁於已然之後是故法之所用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉師古曰顧猶反也然而曰禮云禮云者貴絶惡于未萌而起教于微眇師古曰眇細小也使民日遷善逺辠而不自知也師古曰見善則遷畏辠而離孔子曰聽訟吾猶人也必也使毋訟乎師古曰論語載孔子之言也言使吾聽訟與衆人齊等然能先以徳義化之使其無訟為人主計者莫如先審取舍師古曰取謂所擇用也舍謂所弃置也取舍之極定於内而安危之萌應於外矣師古曰極中也萌始生也安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍宋祁曰浙本舍字下有中字音當丁仲反上言審此言中理自明白以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以徳教或􅇌之以法令師古曰道讀曰導􅇌與驅同下類此道之以徳教者徳教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其徳行六七百歳而弗失秦王治天下十餘歳則大敗此亡它故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下于仁義禮樂而徳澤洽禽獸草木廣裕師古曰裕饒也徳被蠻貊四夷累子孫數十世此天下所共聞也秦王置天下于法令刑罰徳澤亡一有而怨毒盈于世下憎惡之如仇讐旤幾及身子孫誅絶師古曰幾音鉅依反此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也師古曰胡何也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上廉逺地則堂高師古曰級等也廉側隅也陛亡級廉近地則堂卑高者難攀卑者易陵師古曰陵乘也理埶然也故古者聖王制為等列内有公卿大夫士外有公侯伯子男然後有官師小吏師古曰官師一官之長延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投䑕而忌器此善諭也鼠近于器尚憚不投恐傷其器况于貴臣之近主乎師古曰近音其靳反廉耻節禮以治君子故有賜死而亡戮辱是以黥劓之辠不及大夫以其離主上不逺也禮不敢齒君之路馬蹵其芻者有罰師古曰齒謂審其齒歳也芻所食之草也蹵音千六反見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之辠不加其身者尊君之故也此所以為主上豫逺不敬也師古曰逺離也所以體貌大臣而厲其節也師古曰體貌謂加禮容而敬之今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也師古曰天子呼諸侯長者同姓則曰伯父異姓則曰伯舅伯長也而今與衆庶同黥劓髠刖笞傌棄市之法蘇林曰傌音罵然則堂不亡陛虖被戮辱者不泰迫虖師古曰迫迫天子也廉耻不行大臣無廼握重權大官而有徒隸亡耻之心虖夫望夷之事二世見當以重法者如淳曰決罪曰當閻樂殺二世于望夷宫本由秦制無忌上之風也劉奉世曰趙高殺二世蓋又以法定其罪投鼠而不忌器之習也臣聞之履雖鮮不加于枕冠雖敝不以苴履師古曰苴者履中之藉也音子余反宋祁曰苴當作子汝反夫嘗已在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之師古曰緤謂以長繩係之也緤音先列反輸之司㓂編之徒官師古曰司寇主刑罰之官編次列也司寇小吏詈罵而榜笞之師古曰榜音彭殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦廼可以加此也蘇林曰知其有一旦之刑非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之師古曰行音户剛反移事智伯及趙滅智伯豫讓釁靣吞炭鄭氏曰釁漆面以易貌吞炭以變聲也師古曰釁熏也以毒藥熏之劉奉世曰釁謂以物塗之取以釁鼔故謂之釁爾訓熏與漆皆非也必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讐行若狗彘已而抗節致忠行出虖列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡耻師古曰頓音鈍奊詬亡節師古曰奊詬謂無志分也奊音胡結反詬音后廉耻不立且不自好師古曰自好猶自喜也好音呼倒反茍若而可師古曰若猶然故見利則逝見便則奪師古曰逝往也主上有敗則因而挻之矣服䖍曰音挻起也師古曰挻式延反主上有患則吾茍免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便于此師古曰此于人主為不便也便音頻靣反羣下至衆而主上至少也所託財器職業者粹于羣下也師古曰粹純也言其埶悉在羣下俱亡耻俱茍妄則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之節也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾師古曰簠簋所以盛飯也方曰簠圓曰簋簠音甫又音扶簋音軌坐汙穢淫亂男女亡别者不曰汙穢曰帷薄不脩坐罷軟不勝任者不謂罷軟曰下官不職師古曰罷廢于事也軟弱也罷讀曰疲軟音人兖反故貴大臣定有其辠矣猶未斥然正以謼之也師古曰謼古呼字尚遷就而為之諱也故其在大譴大何之域者師古曰譴責也何問也域界局也聞譴何則白冠氂纓鄭氏曰以毛作纓白冠喪服也盤水加劒造請室而請辠耳應劭曰請室請罪之室蘇林曰音絜清胡公漢官車駕出有請室令在前先驅此官有别獄也如淳曰水性平若已有正罪君以平法治之也加劒當以自刎也或曰殺牲者以盤水取頸血故示若此也師古曰應如二說皆是上不執縛係引而行也其有中罪者聞命而自弛師古曰中罪非大非小也弛廢也自廢而死弛音式爾反上不使人頸盭而加也蘇林曰不戾其頸而親加刀鋸也師古曰盭古戾字音廬結反其有大辠者聞命則北面再拜跪而自裁師古曰裁謂自刑殺也上不使捽抑而刑之也師古曰捽持頭髪也抑謂按之也捽音才兀反曰子大夫自有過耳服䖍曰子者男子美號吾遇子有禮矣遇之有禮故羣臣自憙師古曰憙讀曰喜音許吏反憙好也好為志氣也宋祁曰王仲弓謂憙字宜曰喜讀為憙嬰以廉耻故人矜節行師古曰嬰加也矜尚也上設廉耻禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身孟康曰唯為主耳不念其身國耳忘家公耳忘私利不茍就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者比物比志也李竒曰志記也凡此上陳廉耻之事皆古記也如淳曰比謂比方也使忠臣以死社稷之志比于金城也師古曰二家之說皆非也此言聖人厲此節行以御羣下則人皆懐徳戮力同心國家安固不可毁抜若金城也尋其下文義可曉矣彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安師古曰夫夫人也亦猶彼人耳夫音扶顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤應劭曰言念主忘身憂國忘家如此可託權柄不須復制禦也六尺之孤未能自立者也此厲廉耻行禮誼之所致也主上何喪焉師古曰如此則于主上無所失此之不為而顧彼之久行服䖍曰彼謂亡國也師古曰顧反也久謂久行之也言何不為投鼠忌器之法而反久行無陛級之事故曰可為長太息者此也師古曰誼上疏言可為長太息者六今此至三而止蓋史家直取其要切者耳故下贊云掇其切于世事者著于傳是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自甯成始初文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地居數年梁王勝死亡子誼復上疏曰陛下即不定制如今之埶不過一傳再傳服䖍曰一二傳世也諸侯猶且人恣而不制豪植而大強師古曰植立也漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳師古曰蕃翰得宜則嗣王安固故云皇太子之所恃也代北邊匈奴與强敵為鄰能自完則足矣而淮陽之比大諸侯厪如黑子之著面師古曰黑子今所謂黶子也著音直畧反適足以餌大國耳師古曰餌謂為其所吞食不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小廉以自託于鄉黨人主唯天下安社稷固不耳高皇帝𤓰分天下以王功臣反者如蝟毛而起師古曰蝟蟲名也其毛為刺音謂以為不可故蔪去不義諸侯而虚其國如淳曰不誼諸侯彭越黥布等師古曰蔪讀與芟同謂芟刈之擇良日立諸子雒陽上東門之外師古曰諸侯國皆在關東故于東門外立之也東靣最北出門曰上東門畢以為王而天下安師古曰畢猶盡宋祁曰注末當有也字故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯師古曰越過也兩諸侯梁及淮陽而縣屬於漢師古曰為縣而屬漢劉奉世曰縣讀如懸其吏民繇役往來長安者自悉而補中道衣敝應劭曰自悉其家資財補縫作衣師古曰悉盡也宋祁曰新書云自悉以補行錢用諸費稱此師古曰稱音尺孕反其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其埶不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁孟康曰列城縣不可者可徙代王而都雎陽梁起于新郪以北著之河師古曰新郪潁川縣也郪音千移反著音直畧反淮陽包陳以南揵之江晉灼曰包取也如淳曰揵謂立封界也或曰揵接也師古曰揵音鉅偃反則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終亡山東之憂矣此二世之利也如淳曰從誼言可二世安耳師古曰言帝身及太子嗣位之時當今恬然適遇諸侯之皆少師古曰恬安也少謂年少數歳之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意如淳曰但動頤指麾則所欲皆如意劉奉世曰頤指兩事高拱以成六國之旤難以言智茍身亡事畜亂宿旤熟視而不定師古曰畜讀曰蓄宋祁曰熟字舊本無灬後孰計亦無火當去四㸃萬年之後傳之老母弱子將使不寧不可謂仁臣聞聖主言問其臣而不自造事師古曰欲發言則問其臣故使人臣得畢其愚忠唯陛下財幸師古曰財與裁同裁擇而幸從其言文帝于是從誼計廼徙淮陽王武為梁王北界泰山西至高陽得大縣四十餘城徙城陽王喜為淮南王撫其民時又封淮南厲王四子皆為列侯誼知上必將復王之也上疏諫曰竊恐陛下接王淮南諸子孟康曰接音挾挾持欲王淮南諸子也臣瓚曰謂以恩接待而王之師古曰二說皆非也謂接今時當即王之言不久也接猶續也猶今人言續復爾曾不與如臣者孰計之也淮南王之悖逆亡道天下孰不知其辠師古曰悖惑也音布内反陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗于天下耳師古曰言若尊王其子則是厲王無罪漢枉殺之此人少壯豈能忘其父哉師古曰少壯猶言稍長大白公勝所為父報仇者大父與伯父叔父也師古曰白公楚平王之孫太子建之子也大父即祖謂平王也伯父叔父平王諸子也事見春秋傳白公為亂非欲取國代主也發忿快志剡手以衝仇人之匈師古曰剡利也音弋冉反固為俱靡而已師古曰言與仇人俱滅斃也靡碎也音武彼反宋祁曰越本靡武皮反淮南雖小黥布常用之矣漢存特幸耳師古曰言漢之勝布得存此直天幸耳夫擅仇人足以危漢之資于策不便師古曰言假四子以資權則當危漢雖割而為四四子一心也予之衆積之財此非有子胥白公報于廣都之中即疑有剸諸荆軻起于兩柱之間師古曰剸諸刺吳王荆軻刺秦皇事見春秋傳及燕丹子也所謂假賊兵為虎翼者也應劭曰周書云無為虎傅翼將飛入邑擇人而食之願陛下少留計梁王勝墜馬死李竒曰文三王傳言揖此言勝為有兩名誼自傷為傅無狀師古曰無善狀常哭泣後歳餘亦死賈生之死年三十三矣後四歳齊文王薨亡子文帝思賈生之言廼分齊為六國盡立悼惠王子六人為王又遷淮南王喜于城陽而分淮南為三國盡立厲王三子以王之後十年文帝崩景帝立三年而吳楚趙與四齊王合從舉兵韋昭曰四齊王膠東膠西菑川濟南也師古曰從音子容反西鄉京師師古曰鄉讀曰嚮梁王扞之卒破七國至武帝時淮南厲王子為王者兩國亦反誅孝武初立舉賈生之孫二人至郡守賈嘉最好學世其家師古曰言繼其家業贊曰劉向稱賈誼言三代與秦治亂之意其論甚美通達國體雖古之伊管未能逺過也師古曰伊尹尹管管仲使時見用功化必盛為庸臣所害甚可悼痛追觀孝文𤣥默躬行以移風俗師古曰躬行謂身親儉約之行也自追觀以下並史家之詞誼之所陳略施行矣及欲改定制度以漢為土德色上黄數用五及欲試屬國施五餌三表以係單于師古曰賈誼書謂愛人之狀好人之技仁道也信為大操常義也愛好有實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壊其目賜之盛食珍味以壞其口賜之音樂婦人以壞其耳賜之髙堂􅃉宇倉庫奴婢以壊其腹于來降者上以召幸之相娛樂親酌而手食之以壞其心此五餌也宋祁曰注文常義監本及新書皆云帝義也其術固以疏矣誼亦天年早終雖不至公卿未為不遇也凡所著述五十八篇掇其切于世事者著于傅云師古曰掇拾也音丁活反前漢書卷四十八前漢書卷四十八考證賈誼傳謂隨夷溷兮謂跖蹻廉按史記作世謂隨夷溷兮謂盜跖廉文選作謂隨夷為溷兮謂跖蹻為廉其他字句俱有同異今但據本書校正誶曰按史記作訊曰文選從之又如偭蟂獺史記作彌融爚遥增撃而去之史記作搖增翮文選作遙矰繳服似鴞臣召南按史記云楚人命鴞曰服是一物二名漢書云似鴞則二物矣單閼之嵗四月孟夏按史記作單閼之嵗兮以下凡起句俱有兮字此班氏所刪也又按文選注文帝六年嵗在丁卯是時匈奴强云云臣召南按自此以下並漢書所詮叙也史記賈生與屈原同傳于經國之才救時之論㮣未及錄故特詳補之其治安策及上書並賈子新書文刪節以入傳可為流涕者二王應麟曰其一謂匈奴有可制之策而不用也其二論足食勸農班氏不載于傳而載之食貨志可為長太息者六王應麟曰新書言庶人上僭班氏取為太息之一秦俗經制二篇不以為太息而班氏取為太息之二諭教太子是為太息之三體貌大臣是為太息之四又等齊篇論名分不正又銅布篇論收銅鑄錢此二者皆太息之說班氏削等齊篇不取而載銅布篇于食貨志故六太息止載三篇夫樹國固必相疑之埶注鄭氏臣瓚云云師古曰鄭說是也臣召南按如鄭說則本文固字應倒在必字之下于義不順如瓚說則樹國固當一讀于義甚長師古取鄭說似誤上數爽其憂顧炎武曰謂秦之所憂在孤立而漢之所憂在諸侯漢初之所憂在異姓而今之所憂在同姓貫高利幾之謀不生臣召南按利幾事見高紀幾本楚將降而封于潁川疑懼遂反高帝撃破之陛下何不試以臣為屬國之官眞德秀曰此文下新書言三表五餌而史削之又威令不信可為流涕者此也下新書言天子之相號為丞相諸侯之臣號為丞相云云是臣主非有相臨之分尊卑之經也可為長太息者此也而史削之擇良日立諸子雒陽上東門之外注師古曰諸侯國皆在關東云云臣召南按諸侯並在關東固不必言此文謂雒陽上東門也考高紀帝雖自雒陽入都關中而六年封子肥齊王七年立子如意代王九年徙王趙十一年立子恒代王子恢梁王子友淮陽王帝實在雒陽行封册也惟立子長淮南王十二年立子建燕王則帝在長安耳賈生從其最多者言之雒陽亦有上東門與長安門同名以地勢言之燕趙代在雒陽東北齊梁在其東吳楚淮南則在其東南也前漢書卷四十八考證
