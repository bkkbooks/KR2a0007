  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0007_WYG_002-1a, image: WYG0249/WYG0249-0070a.png}
body:
  text: 前漢書卷二漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注惠帝紀第二孝惠皇帝荀悅曰諱盈之字曰滿應劭曰禮諡法柔質慈民曰惠師古曰孝子善述父之志故漢家之諡自惠帝已下皆稱孝也臣下以滿字代盈者則知帝諱盈也他皆類此高祖太子也母曰呂皇后帝年五歲高祖初爲漢王二年立爲太子十二年四月高祖崩五月丙寅太子即皇帝位尊皇后曰皇太后賜民爵一級師古曰帝初嗣位爲恩惠也中郎郎中滿六歲爵三級四歲二級蘇林曰中郎省中郎也外郎滿六歲二級蘓林曰外郎散郎也中郎不滿一歲一級外郎不滿二歲賜錢萬張晏曰不滿一歲謂不滿四歲之一歲作郎三歲也不滿二歲謂不滿六歲之二歲作郎四歳也師古曰此説非也直謂作郎未經一歲二歲耳劉攽曰此賜爵之差中郎二歲乃當一級今不滿一歲亦一級恩優之也又散郎三歲當賜一級今斷不滿二歲賜錢萬則滿二歲亦賜一級矣宦官尚食比郎中應劭曰宦官閽寺也尚主也舊有五尚尚冠尚帳尚衣尚席亦是如淳曰主天子物曰尚主文書曰尚書又有尚符璽郎也漢儀注省中有五尚而内官婦人有諸尚也謁者執楯執㦸武士騶比外郎應劭曰執楯執㦸親近陛衛也武士力士也高祖使武士縛韓信是也騶騶騎也師古曰騶本廐之馭者後又令爲騎因謂騶騎耳太子御驂乘賜爵五大夫舍人滿五歲二級師古曰武士騶以上皆舊侍從天子之人也舍人以上太子之官屬賜給喪事者二千石錢二萬六百石以上萬五百石二百石以下至佐史五千如淳曰律有斗食佐史韋昭曰若今曹史書佐也師古曰自五百石以下至於佐史皆賜五千今又言二百石者審備其等也視作斥土者將軍四十金服䖍曰斥土壙土也如淳曰斥閒也開土地爲冡壙故以開斥言之鄭氏曰四十金四十斤金也晉灼曰近上二千石賜錢二萬此言四十金實金也下凡言黄金眞金也不言黄謂錢也食貨志黄金一斤直錢萬師古曰諸賜言黄金者皆與之金不言黄者一金與萬錢也劉攽曰予謂諸書言若千金則一金萬錢至於賜金若干斤則盡金也二千石二十金六百石以上六金五百石以下至佐史二金減田租復十五税一鄧展曰漢家初十五税一儉於周十税一也中間廢今復之也如淳曰秦作阿房之宮收太半之賦遂行至此乃復十五而税一師古曰鄧說是也復音房目反宋祁曰注文今復之也當作今復復之也爵五大夫吏六百石以上及宦皇帝而知名者有罪當盜械者皆頌繫文穎曰言皇帝者以别仕諸王國也張晏曰時諸侯治民新承六國之後咸慕鄉邑或貪逸豫樂仕諸侯今特爲京師作優裕法也如淳曰知名謂宦人敎帝書學亦可表異者也盜者逃也恐其逃亡故著械也頌者容也言見寛容但處曹吏舍不入狴牢也師古曰諸家之說皆非也宦皇帝而知名者謂雖非五大夫爵六百石吏而早事惠帝特爲所知故亦優之所以云及耳非謂凡在京師異於諸王國亦不必在於宦人敎書學也左宦之律起自武帝此時未有禮記曰宦學事師謂凡仕宦非閹寺也盜械者凡以罪著械皆得稱焉不必逃亡也據山海經貳負之臣相栁之尸皆云盜械其義是也古者頌與容同五大夫第九爵也上造以上及内外公孫耳孫有罪當刑及當爲城旦舂者皆耐爲鬼薪白粲應劭曰上造爵滿十六者也内外公孫謂王侯内外孫也耳孫者𤣥孫之子也言去其曾高益逺但耳聞之也今以上造有功勞内外孫有骨血屬㜕施徳布惠故事從其輕也城旦者旦起行治城舂者婦人不豫外徭但舂作米皆四歲刑也今皆就鬼薪白粲取薪給宗廟爲鬼薪坐擇米使正白爲白粲皆三歲刑也李斐曰耳孫曾孫也張晏曰公孫宗室侯王之孫也晉灼曰耳孫𤣥孫之曾孫也諸侯王表在八世師古曰上造第二爵名也内外公孫國家宗室及外戚之孫也耳孫諸說不同據平紀及諸侯王表說梁孝王𤣥孫之子耳孫耳音仍又匈奴傳說握衍朐䪘單于云烏維單于耳孫以此參之李云曾孫是也然漢書諸處又皆云曾孫非一不應雜兩稱而言據爾雅曾孫之子爲𤣥孫𤣥孫之子爲來孫來孫之子爲昆孫昆孫之子爲仍孫從已而數是爲八葉則與晉說相同仍耳聲相近蓋一號也但班氏唯存古名而計其葉數則錯也㜕音連民年七十以上若不滿十歲有罪當刑者皆完之孟康曰不加肉刑髠􅚎也師古曰若預及之言也謂七十以上及不滿十歲以下皆完之也􅚎音他計反又曰吏所以治民也能盡其治則民賴之故重其祿所以爲民也師古曰爲音于僞反今吏六百石以上父母妻子與同居及故吏嘗佩將軍都尉印將兵及佩二千石官印者家唯給軍賦他無有所與師古曰同居謂父母妻子之外若兄弟及兄弟之子等見與同居業者若今言同籍及同財也無有所與與讀曰豫令郡諸侯王立高廟師古曰諸郡及諸侯王國皆立廟也今書本郡下或有國字者流俗不曉妄加之元年冬十二月趙隠王如意薨民有罪得買爵三十級以免死罪應劭曰一級直錢二千凡爲六萬若今贖罪入三十疋縑矣師古曰令出買爵之錢以贖罪賜民爵户一級春正月城長安二年冬十月齊悼惠王來朝獻城陽郡以益魯元公主邑尊公主爲太后如淳曰張敖子偃爲魯王故公主得爲太后師古曰此說非也蓋齊王憂不得脱故從内史之言請尊公主爲齊太后以母禮事之用悦媚呂太后耳若魯元以子爲魯王自合稱太后何待齊王尊之乎據張耳傳高后元年魯元太后薨後六年宣平侯敖薨呂太后立敖子偃爲王以母爲太后故也是則偃因母爲齊王太后而得王非母因偃乃爲太后也劉攽曰顔說非也悼惠公主兄弟耳雖欲諂呂后而以母事之於理安乎蓋齊内史本諂呂后欲尊公主以漸王張氏故勸王割郡就益魯邑而更號魯元公主爲魯元太后也太后之號雖更魯元之稱不除豈闗爲齊王母乎又張偃以母爲太后故封魯王太后非齊益明也春正月癸酉有兩龍見蘭陵家人井中師古曰家人言庶人之家乙亥夕而不見隴西地震夏旱郃陽侯仲薨師古曰高帝之兄呉王濞父也秋七月辛未相國何薨師古曰蕭何也三年春發長安六百里内男女十四萬六千人城長安三十日罷鄭氏曰城一面故速罷以宗室女爲公主嫁匈奴單于夏五月立閩越君搖爲東海王應劭曰搖越王勾踐之苗裔也帥百越之兵助高祖故封東海在呉郡東南濱海云師古曰即今泉州是其地六月發諸侯王列侯徒𨽻二萬人城長安秋七月都廐災南越王趙佗稱臣奉貢師古曰佗音徒何反四年冬十月壬寅立皇后張氏師古曰張敖之女也史記漢書無名字皇甫謐作帝王世紀皆爲惠帝張后及孝文薄后已下别制名焉至於薄父之徒亦立名字何從而得之乎雖示博聞不知䧟於穿鑿宋祁曰注文一本示字上有欲字春正月舉民孝弟力田者復其身師古曰弟者言能以順道事其兄也弟音徒計反復音方目反三月甲子皇帝冠赦天下省法令妨吏民者除挾書律應劭曰挾藏也張晏曰秦律敢有挾書者族長樂宮鴻臺災宜陽雨血秋七月乙亥未央宮凌室災師古曰凌室藏冰之室也􅃎詩七月之篇曰納于凌隂丙子織室災師古曰主織作繒帛之處五年冬十月靁桃李華棗實春正月復𤼵長安六百里内男女十四萬五千人城長安三十日罷夏大旱秋八月己丑相國參薨師古曰曹參也九月長安城成賜民爵户一級師古曰家長受也六年冬十月辛丑齊王肥薨令民得買爵女子年十五以上至三十不嫁五算應劭曰國語越王勾踐令國中女子年十七不嫁者父母有罪欲人民繁息也漢律人出一算􅈫百二十錢唯賈人與奴婢倍算今使五算罪謫之也孟康曰或云復之也師古曰應說是劉攽曰予謂女子五算亦不頓謫之自十五至三十爲五等每等加一算也夏六月舞陽侯噲薨師古曰樊噲也起長安西市修敖倉七年冬十月發車騎材官詣滎陽師古曰車常擬軍興者若近代之戌車也騎常所飬馬并其人使行􅂶騎若今武馬及所飬者主也材官解在高紀太尉灌嬰將春正月辛丑朔日有蝕之夏五月丁卯日有蝕之旣師古曰旣盡也秋八月戊寅帝崩于未央宮臣瓚曰帝年十七即位即位七年夀二十四九月辛丑葬安陵臣瓚曰自崩至葬凡二十四日安陵在長安北三十五里師古曰三輔黄圖云去長陵五里宋祁曰長陵五里一作十里贊曰孝惠内修親親外禮宰相優寵齊悼趙隠恩敬篤矣師古曰篤厚也聞叔孫通之諌則懼然蘇林曰諫復道乘衣冠道也師古曰懼讀曰瞿翟然失守貎音居具反納曹相國之對而心說蘇林曰對修高帝制度蕭何法也師古曰說讀曰悦可謂寛仁之主遭呂太后虧損至德師古曰謂殺趙王戮戚夫人因以憂疾不聽政而崩悲夫前漢書卷二前漢書卷二考證惠帝紀第二臣召南按史記於高祖夲紀後孝文夲紀前止作呂后夲紀以惠帝事附入殊非體制班氏列惠帝紀於高后紀之前義理甚正視作斥土者臣照按監夲宋夲俱作斥上今以服䖍如淳注意詳之定為斥土服注斥上壙上也二上字亦並正春正月城長安胡三省曰漢都長安蕭何雖治宮室未暇築城帝始築之至五年始成臣召南按功臣表城及宮殿皆少府陽城延所作郃陽侯仲薨臣召南按高紀及吳王濞傳並作合陽則屬平原此紀作郃陽則屬左馮翊以王子侯表作合陽證之此郃字訛也然水經注已謂是郃陽矣立閩越君搖為東海王注即今泉州是其地臣召南按師古説非也閩越王無諸都冶則泉州地屬閩越矣東海王搖都東甌亦號東甌王即温州永嘉地非泉州地也前漢書卷二考證
