body:
  text: 前漢書卷五十三漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注景十三王傳第二十三孝景皇帝十四男王皇后生孝武皇帝栗姬生臨江閔王榮河間獻王德臨江哀王閼師古曰閼音烏曷反程姬生魯共王餘師古曰共讀曰恭下皆類此江都易王非師古曰易音改易之易諡法云好更故舊曰易膠西于王端師古曰于逺也言其所行不善逺乖道徳故以為諡賈夫人生趙敬肅王彭祖中山靖王勝唐姬生長沙定王發王夫人生廣川恵王越膠東康王寄清河哀王乗常山憲王師古曰王夫人即王皇后之妹也河間獻王徳以孝景前二年立脩學好古實事求是師古曰務得事實每求真是也今流俗書本云求長長老以是從人得善書盖妄加之耳從民得善書必為好寫與之留其眞師古曰眞正也留其正本加金帛賜以招之繇是四方道術之人不逺千里師古曰不以千里為逺而自致也繇讀與由同宋祁云加字新添或有先祖舊書多奉以奏獻王者師古曰奏進也故得書多與漢朝等是時淮南王安亦好書所招致率多浮辯師古曰言無實用耳獻王所得書皆古文先秦舊書師古曰先秦猶言秦先謂未焚書之前周官尚書禮禮記師古曰禮者禮經也禮記者諸儒記禮之説也孟子老子之屬皆經傳説記七十子之徒所論師古曰七十子孔子弟子也觧具在藝文志其學舉六藝師古曰此六藝謂六經立毛氏詩左氏春秋博士脩禮樂被服儒術造次必於儒者師古曰被服言常居處其中也造次謂所嚮必行也被音皮義反造音千到反山東諸儒多從而遊武帝時獻王來朝獻雅樂對三雍宫應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也及詔䇿所問三十餘事其對推道術而言得事之中師古曰中音竹仲反文約指明師古曰約少也指謂義之所趨若人以手指物也他皆類此立二十六年薨中尉常麗以聞曰王身端行治師古曰端直治理也温仁恭儉篤敬愛下明知深察恵于鰥寡大行令奏諡法曰聰明睿知曰獻師古曰睿深也通也宜諡曰獻王子共王不害嗣四年薨子剛王堪嗣十二年薨子頃王授嗣師古曰頃音傾諸為諡者皆類此也十七年薨子孝王慶嗣四十三年薨子元嗣元取故廣陵厲王厲王太子及中山懐王故姬亷等以為姬甘露中冀州刺史敞奏元事下廷尉逮召廉等元廹脅凡七人令自殺有司奏請誅元有詔削二縣萬一千户後元怒少史留貴留貴踰垣出欲告元元使人殺留貴母有司奏元殘賊不改不可君國子民廢勿王處漢中房陵師古曰房陵漢中縣居數年坐與妻若共乗朱輪車怒若又笞擊令自髠漢中太守請治病死宋祁云浙本病字上有元字立十七年宋祁云姚本七作五國除絶五嵗成帝建始元年復立元弟上郡庫令良如淳曰漢官北邊郡庫官兵之所藏故置令是為河間惠王良脩獻王之行母太后薨服喪如禮哀帝下詔褒揚曰河間王良喪太后三年為宗室儀表其益封萬户二十七年薨子尚嗣王莽時絶臨江哀王閼以孝景前二年立三年薨無子國除為郡臨江閔王榮以孝景前四年為皇太子四嵗廢為臨江王三嵗坐侵廟壖地為宫師古曰壖音人縁反觧在食貨志及鼂錯傳上徵榮榮行祖於江陵北門師古曰祖者送行之祭因饗飲也昔黄帝之子纍祖好逺遊而死於道故後人以為行神也既上車軸折車廢師古曰廢壊也江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王師古曰簿皆音薄户反訊問也音信王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長亡子國除師古曰榮實最長而傳居二王之後者以其從太子被廢後乃立為王也地入于漢為南郡魯恭王餘以孝景前二年立為淮陽王吳楚反破後以孝景前三年徙王魯好治宫室苑囿狗馬季年好音師古曰季年末年也不喜辭師古曰喜音許吏反為人口吃難言師古曰吃音訖二十八年薨子安王光嗣初好音樂輿馬晚節遴師古曰晚節猶言末時也遴與􅈔同猶言貪嗇也唯恐不足於財四十年薨子孝王慶忌嗣三十七年薨子頃王勁嗣二十八年薨子文王睃嗣宋祁曰睃疑作俊十八年薨亡子國除哀帝建平三年復立頃王子睃弟郚鄉侯閔為王蘇林曰郚音魚縣名也屬東海郡師古曰又音吾宋祁云兩浙本無頃王子三字王莽時絶恭王初好治宫室壊孔子舊宅以廣其宫聞鐘磬琴瑟之聲遂不敢復壊於其壁中得古文經傳江都易王非以孝景前二年立為汝南王吳楚反時非年十五有材氣上書自請擊吳景帝賜非將軍印擊吳吳已破徙王江都治故吳國師古曰治謂都之劉濞所居也以軍功賜天子旗元光中匈奴大入漢邊非上書願擊匈奴上不許非好氣力治宫館招四方豪傑驕奢甚二十七年薨子建嗣建為太子時邯鄲人梁蚡持女欲獻之易王建聞其美私呼之因留不出蚡宣言曰子廼與其公爭妻建使人殺蚡蚡家上書下廷尉考會赦不治易王薨未葬建居服舍師古曰倚廬堊室之次也召易王所愛美人淖姬等凡十人與姦鄭氏曰淖音卓王孫之卓蘇林曰淖音泥淖師古曰蘇説是音女教反建女弟徵臣為葢侯子婦師古曰女弟即妹也以易王喪來歸建復與姦建異母弟定國為淮陽侯易王最小子也其母幸立之師古曰冀得立其子為易王嗣具知建事行錢使男子荼恬上書蘇林曰荼音食邪反宋祁曰浙本注文無反字云荼音琅邪淳化本郎邪反皆未安告建滛亂不當為後事下廷尉廷尉治恬受人錢財為上書論棄市建罪不治後數使使至長安迎徵臣魯恭王太后聞之師古曰易王即魯恭王同母之弟徵臣則太后之孫也故與書戒之宋祁曰恭當作共遺徵臣書曰國中口語籍籍慎無復至江都師古曰籍籍諠聒之意後建使謁者吉請問共太后師古曰謂請問起居也太后泣謂吉歸以吾言謂而王師古曰謂告也而汝也王前事漫漫今當自謹獨不聞燕齊事乎張晏曰燕王定國齊王次昌皆與子昆弟姦發覺自殺也言吾為而王泣也吉歸致共太后語建大怒擊吉斥之師古曰斥謂退棄之建游章臺宫令四女子乗小舩建以足蹈覆其船師古曰覆音芳目反其下亦同四人皆溺二人死後游雷波師古曰波讀為陂雷陂陂名其下云入波中亦同天大風建使郎二人乗小舩入波中舩覆兩郎溺攀舩乍見乍没建臨觀大笑令皆死師古曰不救上之並死陂中也宫人姬八子有過者輙令臝立擊鼓師古曰八子姬妾官名也臝者露其形也音來果反或置樹上久者三十日乃得衣或髠鉗以鈆杵舂師古曰鈆者錫之類也音弋全反不中程輙掠師古曰程者作之課也掠笞擊也或縱狼令齧殺之師古曰縱放也建觀而大笑或閉不食令餓死凡殺不辜三十五人建欲令人與禽獸交而生子彊令宫人臝而四據與羝羊及狗交師古曰羝羊牡羊音丁奚反專為滛虐自知罪多國中多欲告言者建恐誅心内不安與其后成光共使越婢下神祝詛上與郎中令等語怨望漢廷使者即復來覆我我决不獨死師古曰覆治也不獨死言欲反也覆音芳目反建亦頗聞淮南衡山隂謀恐一日發為所并遂作兵器號王后父胡應為將軍中大夫疾有材力善騎射師古曰疾者中大夫之名號曰靈武君作治黄屋葢刻皇帝璽鑄將軍都尉金銀印作漢使節二十綬千餘具置軍官品員及拜爵封侯之賞具天下之輿地及軍陳圖遣人通越繇王閩侯遺以錦帛奇珍繇王閩侯亦遺建荃葛蘇林曰荃音詮細布屬也服䖍曰荃音蓀細葛也臣瓚曰荃香草也師古曰服瓚二説皆非也許慎云荃細布也字本作絟音千全反又音千劣反盖今南方筩布之屬皆為荃也葛即今之葛布也以荃及葛遺建也珠璣師古曰璣謂珠之不圜者也音機又音畿犀甲翠羽蝯熊奇獸數通使徃來約有急相助師古曰約謂言契也及淮南事發治黨與頗連及建建使人多推金錢絶其獄師古曰行賄賂以㓕其蹤緒也後復謂近臣曰我為王詔獄嵗至生又無驩怡日壯士不坐死欲為人所不能為耳師古曰亦言欲反也建時佩其父所賜將軍印載天子旗出積數嵗事發覺漢遣丞相長史與江都相雜案索得兵器璽綬節反具師古曰索捜也有司請捕誅建制曰與列侯吏二千石博士議議皆曰建失臣子道積久輙䝉不忍遂謀反逆所行無道雖桀紂惡不至於此天誅所不赦當以謀反法誅有詔宗正廷尉即問建師古曰即就也就其國問之建自殺后成光等皆棄市六年國除劉敞曰當云建立六年地入于漢為廣陵郡絶百二十一年平帝時新都侯王莽秉政興滅繼絶立建弟盱眙侯子宫為廣陵王師古曰盱音許于反眙音怡奉易王後莽簒國絶膠西于王端孝景前三年立為人賊盭又隂痿師古曰盭古戾字賊盭言其性賊害狼戾也痿音萎一近婦人病數月有所愛幸少年以為郎郎與後宫亂端禽㓕之及殺其子母數犯法師古曰數音所角反次下亦同漢公卿數請誅端天子弗忍而端所為滋甚師古曰滋益也有司比再請削其國去太半張晏曰三分之二為太半一為少半師古曰比頻也端心愠遂為無訾省蘇林曰為無所省録也師古曰訾訾財也省視也言不視訾財也劉奉世曰無訾省猶今不藉頼忿故為此顔失之府庫壊漏盡腐財物以鉅萬計終不得收徙師古曰不收又不徙置他處令吏毋得收租賦端皆去衞封其宫門從一門出入數變名姓為布衣之它國師古曰之徃也相二千石至者奉漢法以治端輙求其罪告之亡罪者詐藥殺之所以設詐究變師古曰究極也彊足以距諫知足以飾非相二千石從王治則漢繩以法故膠西小國而所殺傷二千石甚衆立四十七年薨無子國除地入于漢為膠西郡趙敬肅王彭祖以孝景前二年立為廣川王趙王遂反破後徙王趙彭祖為人巧佞卑諂足共師古曰共讀曰恭足恭謂便辟也而心刻深好法律持詭辯以中人師古曰詭辯違道之辯也中傷也音竹仲反多内寵姬及子孫相二千石欲奉漢法以治則害於王家是以每相二千石至彭祖衣帛布單衣師古曰或帛或布以為單衣自行迎除舍師古曰至除舍迎之也除舍謂初所至之舍宋祁曰當云迎至除舍多設疑事以詐動之得二千石失言中忌諱輙書之二千石欲治者則以此廹劫不聴廼上書告之及汙以姦利事彭祖立六十餘年相二千石無能滿二嵗輙以罪去大者死小者刑以故二千石莫敢治而趙王擅權使使即縣為賈人𣙜㑹韋昭曰平㑹兩家買賣之賈者𣙜者禁他家獨王家得為之也師古曰即就也就諸縣而專𣙜賈人之㑹若今和市矣𣙜音角㑹音工外反宋祁曰榷從木從手者非是入多於國租税以是趙王家多金錢然所賜姬諸子亦盡之矣彭祖不好治宫室禨祥服䖍曰求福也師古曰禨鬼俗也字或作畿淮南子曰荆人鬼越人畿禨祥總謂鬼神之事也服説失之禨音居衣反宋祁曰禨當作巨衣反好為吏上書願督國中盗賊師古曰督視察也常夜從走卒行徼邯鄲中師古曰徼謂廵察也音工釣反諸使過客以彭祖險陂莫敢留邯鄲師古曰使謂京師使人也過客行客從趙過者也陂謂傾側也音彼義反久之太子丹與其女弟及同産姊姦江充告丹淫亂又使人椎埋攻剽為姦甚衆師古曰椎殺人而埋之故曰椎埋剽劫也椎音直隹反其字從木剽音頻妙反其字從刀武帝遣使者發吏卒捕丹下魏郡詔獄治罪至死彭祖上書寃訟丹願從國中勇敢擊匈奴師古曰以勇敢自隨贖丹罪上不許久之竟赦出後彭祖入朝因帝姊平陽隆慮公主師古曰慮音廬求復立丹為太子上不許彭祖取江都易王寵姬王建所姦淖姬者甚愛之生一男號淖子彭祖以征和元年薨諡敬肅王彭祖薨時淖姬兄為漢宦者上召問淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌曰無咎無譽上曰如是可矣遣使者立昌是為頃王十九年薨子懐王尊嗣五年薨無子絶二嵗宣帝立尊弟髙是為哀王數月薨子共王充嗣五十六年薨子隱嗣王莽時絶初武帝復以親親故立敬肅王小子偃為平于王孟康曰今廣平是為頃王十一年薨宋祁曰頃王下疑更有頃王二字子繆王元嗣二十五年薨宋祁曰五當作二大鴻臚禹奏元前以刃賊殺奴婢子男殺謁者為刺史所奏罪名明白病先令令能為樂奴婢從死師古曰先令者預為遺令也能為樂作樂之人也從死以殉葬也廹脅自殺者凡十六人暴虐不道故春秋之義誅君之子不宜立元雖未伏誅不宜立嗣奏可國除中山靖王勝以孝景前三年立武帝初即位大臣懲吳楚七國行事議者多寃鼂錯之策師古曰言錯策為是枉見殺也皆以諸侯連城數十泰彊欲稍侵削數奏暴其過惡師古曰暴謂披布之諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為盤石宗也師古曰錯雜也言其地相交雜今或無罪為臣下所侵辱有司吹毛求疵師古曰疵病也音才斯反笞服其臣使證其君多自以侵寃建元三年代王登長沙王發中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝對曰臣聞悲者不可為絫欷師古曰絫古累字累重也欷歔欷也音許既反思者不可為歎息師古曰言聞欷歎之聲則悲思益甚故髙漸離擊筑易水之上荆軻為之低而不食應劭曰燕太子丹遣荆軻刺秦王賔客祖於易水之上漸離擊筑士皆垂泣荆卿不能復食也師古曰低謂俛首雍門子壹微吟孟嘗君為之於邑張晏曰齊之賢者居雍門因以為號蘇林曰六國時人名周善鼓琴母死無以𦵏見孟嘗君而微吟也如淳曰雍門子以善鼔琴見孟嘗君先説萬嵗之後髙臺既已顛曲池又已平墳墓生荆棘牧豎游其上孟嘗君亦如是乎孟嘗君喟然歎息也師古曰如説是也蘇失之矣於邑短氣貌於音烏邑音一合反或讀如本字今臣心結日久毎聞幼眇之聲不知涕泣之横集也師古曰幼音一笑反眇音妙幼妙精微也夫衆喣漂山應劭曰喣吹喣也師古曰漂動也喣音許句反又音許于反漂音匹遥反劉奉世曰喣吐沫也聚蟁成靁師古曰蟁古蚊字靁古雷字言衆蚊飛聲有若雷也朋黨執虎十夫橈椎師古曰橈曲也音女教反是以文王拘於牖里孔子阨於陳蔡此乃烝庶之成風増積之生害也師古曰烝庶謂衆人也臣身逺與寡莫為之先師古曰身逺者去帝京逺與寡者少黨與也先謂素為延譽也衆口鑠金積毁銷骨師古曰觧在鄒陽傳叢輕折軸羽翮飛肉師古曰言積載輕物物多至令車軸毁折而鳥之所以能飛翔者以羽翮扇揚之故也紛驚逢羅澘然出涕晉灼曰言皆驚亂遇法㒺可為出涕者也師古曰澘垂涕貌音所姦反臣聞白日曬光幽隱皆照師古曰曬暴也舒也音山䜴反又音力支反明月曜夜蟁蝱宵見師古曰宵亦夜也蝱音盲然雲蒸列布杳冥晝昏塵埃抪覆昧不見泰山師古曰抪亦布散也昧暗也抪音鋪何則物有蔽之也今臣雍閼不得聞師古曰雍讀曰壅雍塞也閼猶止也音烏曷反讒言之徒􅑣生師古曰􅑣生言衆多也一曰􅑣與鋒同道遼路逺曽莫為臣聞臣竊自悲也臣聞社鼷不灌屋鼠不熏師古曰鼷小䑕音奚何則所託者然也臣雖薄也得䝉肺附位雖卑也得為東藩屬又稱兄師古曰言於戚屬為帝兄今羣臣非有葭莩之親鴻毛之重張晏曰葭蘆葉也莩葉裏白皮也晉灼曰莩葭裏之白皮也皆取喻於輕薄也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻著鴻毛喻輕薄甚也莩音孚張言葉裹白皮非也宋祁曰顔以晉説未明故申云莩者筩中白皮以張説為非以裏作裹則誤景徳本葭蘆葉也裹字並作裏校去葉字裹字並裏羣居黨議朋友相為使夫宗室擯郤骨肉氷釋師古曰擯郤謂斥退也氷釋言銷散也擯音必刃反郤音邱略反斯伯奇所以流離比干所以横分也師古曰伯奇周尹吉甫之子也事後毋至孝而後母譛之於吉甫吉甫欲殺之伯奇乃亡走山林比干諫紂紂怒殺而剖其心故云横分也詩云我心憂傷惄焉如𢷬假寐永歎唯憂用老心之憂矣疢如疾首師古曰小雅小弁之詩也惄思也𢷬築也不脱衣冠而寐曰假寐永長也疢病也言我心中憂思如被𢷬築假寐長歎以憂致老至於苦病如遇首疾也臣之謂也具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事師古曰省减也加親親之恩焉其後更用主父偃謀令諸侯以私恩自裂地分其子弟而漢為定制封號輙别屬漢郡漢有厚恩而諸侯地稍自分析弱小云勝為人樂酒好内師古曰好内躭於妻妾也樂音五教反有子百二十餘人常與趙王彭祖相非曰兄為王専代吏治事王者當日聴音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣四十三年薨子哀王昌嗣一年薨子康王昆侈嗣宋祁曰康越本作糠糠惡諡也好樂怠政曰糠學本去米盖誤也二十一年薨子頃王輔嗣四年薨子憲王福嗣十七年薨子懐王循嗣十五年薨無子絶四十五嵗成帝鴻嘉二年復立憲王弟孫利鄉侯子雲客是為廣徳夷王三年薨無子絶十四嵗哀帝復立雲客弟廣漢為廣平王薨無後平帝元始二年復立廣川惠王曽孫倫為廣徳王奉靖王後王莽時絶劉敞曰此倫封廣徳王廣川王後又封廣徳王俱是平帝二年事必有一誤劉奉世曰按表王漢以夷王弟紹封十三年王莽時絶則此倫封廣徳者誤也此云廣漢表云漢必有誤長沙定王發母唐姬故程姬侍者景帝召程姬程姬有所避不願進師古曰謂月事而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因名曰發張晏曰長沙王生乃發寤已之繆幸唐姬以孝景前二年立以其母微無寵故王卑溼貧國應劭曰景帝後二年諸王來朝有詔更前稱夀歌舞定王但張褏小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋帝乃以武陵零陵桂陽益焉二十八年薨子戴王庸嗣二十七年薨子頃王鮒鮈嗣服䖍曰鮈音拘師古曰鮒音附鮈音劬字或作胕朐其音同耳十七年薨子刺王建徳嗣師古曰刺音來曷反宣帝時坐獵縱火燔民九十六家師古曰縱放也殺二人又以縣官事怨内史敎人誣告以棄市罪削八縣罷中尉官師古曰减其官屬所以貶抑之三十四年薨子煬王旦嗣師古曰煬音弋向反二年薨無子絶嵗餘元帝初元三年復立旦弟宗是為孝王五年薨子魯人嗣王莽時絶廣川惠王越以孝景中二年立十三年薨子繆王齊嗣師古曰諡法曰蔽仁傷善曰繆四十四年薨初齊有幸臣乗距已而有罪欲誅距距亡齊因禽其宗族距怨王乃上書告齊與同産姦師古曰謂其姊妹也是後齊數告言漢公卿及幸臣所忠等師古曰所姓忠名觧具在食貨志又告中尉蔡彭祖捕子明孟康曰彭祖子名明也師古曰孟説非也明廣川王子也罵曰吾盡汝種矣師古曰王誣彭祖罵明云然案驗不如王言宋祁云浙本案字上有有司字劾齊誣㒺大不敬請繫治齊恐上書願與廣川勇士奮擊匈奴上許之未發病薨有司請除國奏可後數月下詔曰廣川恵王於朕為兄朕不忍絶其宗廟其以惠王孫去為廣川王去即繆王齊太子也師受易論語孝經皆通好文辭方技博奕倡優其殿門有成慶畫短衣大絝長劍晉灼曰成慶荆軻也衞人謂之慶卿燕人謂之荆軻師古曰成慶古之勇士也事見淮南子非荆卿也去好之作七尺五寸劒被服皆效焉有幸姬王昭平王地餘許以為后去嘗疾姬陽成昭信侍視甚謹師古曰陽成姓也昭信名也更愛之去與地餘戲得褏中刀師古曰褏古衣袖字笞問狀服欲與昭平共殺昭信笞問昭平不服以鐵鍼鍼之師古曰鍼刺也鍼音之林反彊服乃㑹諸姬去以劒自擊地餘令昭信擊昭平皆死昭信曰兩姬婢且泄口復絞殺從婢三人後昭信病夢見昭平等以狀告去去曰虜乃復見畏我師古曰言其見形令我畏忌也見音胡電反獨可燔燒耳掘出尸皆燒為灰後去立昭信為后幸姬陶望卿為脩靡夫人主繒帛崔脩成為明貞夫人主永巷昭信復譖望卿曰與我無禮衣服常鮮於我師古曰鮮謂新華也盡取善繒匄諸宫人師古曰匄乞遺之也音工艾反去曰若數惡望卿不能减我愛師古曰若汝也惡謂讒毁也設聞其淫我亨之矣後昭信謂去曰前畫工畫望卿舍望卿袒裼傅粉其傍師古曰袒裼脱衣露其肩背也袒音但裼音錫又數出入南户窺郎吏疑有姦去曰善司之以故益不愛望卿後與昭信等飲諸姬皆侍去為望卿作歌曰背尊章嫖以忽孟康曰嫖音匹昭反師古曰尊章猶言舅姑也今關中俗婦呼舅為鍾鍾者尊聲之轉也宋祁曰注文呼舅下當有姑字謀屈奇起自絶師古曰屈奇奇異也屈音其勿反行周流自生患諒非望今誰怨師古曰諒信也言昔被愛寵信非所望今見罪責無所怨也使美人相和歌之去曰是中當有自知者昭信知去已怒即誣言望卿歴指郎吏卧處具知其主名又言郎中令錦被疑有姦去即與昭信從諸姬至望卿所臝其身更擊之師古曰更音工衡反令諸姬各持燒鐵共灼望卿望卿走自投井死昭信出之㭬杙其隂中師古曰杙橜也㭬音竹角反杙音弋割其鼻脣斷其舌謂去曰前殺昭平反來畏我師古曰令我恐畏也今欲靡爛望卿使不能神師古曰靡碎也音縻其下亦同與去共支解置大鑊中取桃灰毒藥并煮之召諸姬皆臨觀連日夜靡盡復共殺其女弟都後去數召姬榮愛與飲昭信復譖之曰榮姬視瞻意態不善疑有私時愛為去刺方領繡服䖍曰如今小兒郤襲衣也頸下施衿領正方直晉灼曰今之婦人直領也繡為方領上刺作黼黻文王莽傳曰有人著赤繢方領方領上服也師古曰晉説是也去取燒之愛恐自投井出之未死笞問愛自誣與醫姦去縳繫柱燒刀灼潰兩目師古曰潰决也生割兩股銷鈆灌其口中愛死支觧以棘埋之諸幸於去者昭信輙譖殺之凡十四人皆埋太后所居長壽宫中宫人畏之莫敢復迕師古曰迕逆也不敢逆昭信意昭信欲擅愛曰王使明貞夫人主諸姬淫亂難禁請閉諸姬舍門無令出敖師古曰敖謂游戲也使其大婢為僕射師古曰大婢婢之長年也主永巷盡封閉諸舍上籥於后非大置酒召不得見去憐之為作歌曰愁莫愁居無聊師古曰聊頼也心重結意不舒内茀鬱憂哀積師古曰茀音拂上不見天生何益日崔隤時不再師古曰崔隤猶言蹉􅋸也崔音千回反隤音頽願棄軀死無悔令昭信聲鼓為節以敎諸姬歌之歌罷輙歸永巷封門獨昭信兄子初為乗華夫人得朝夕見昭信與去從十餘奴博飲游敖初去年十四五事師受易師數諫正去師古曰數音所角反其下亦同去益大逐之師古曰益大謂年漸長大也内史請以為掾師數令内史禁切王家去使奴殺師父子不發覺後去數置酒令倡俳臝戲坐中師古曰倡樂人也俳雜戲者也以為樂相彊劾繫倡闌入殿門如淳曰彊相名也奏狀事下考案倡辭本為王教脩靡夫人望卿弟都歌舞使者召望卿都去對皆淫亂自殺㑹赦不治望卿前亨煮即取他死人與都死并付其母師古曰死者尸也次下求其死亦同母曰都是望卿非也數號哭求死昭信令奴殺之奴得辭服師古曰得者為吏所捕得本始三年相内史奏狀具言赦前所犯天子遣大鴻臚丞相長史御史丞廷尉正雜治鉅鹿詔獄奏請逮捕去及后昭信制曰王后昭信諸姬奴婢證者皆下獄辭服有司復請誅王制曰與列侯中二千石二千石博士議議者皆以為去悖虐聴后昭信讒言燔燒亨煮生割剝人距師之諫殺其父子凡殺無辜十六人至一家母子三人逆節絶理其十五人在赦前大惡仍重師古曰仍頻也重音直用反當伏顯戮以示衆制曰朕不忍致王於法議其罰有司請廢勿王與妻子徙上庸奏可與湯沐邑百户去道自殺昭信棄市立二十二年國除後四嵗宣帝地節四年復立去兄文是為戴王文素正直數諫王去故上立焉二年薨子海陽嗣十五年坐畫屋為男女臝交接置酒請諸父姊妹飲令仰視畫又海陽女弟為人妻而使與幸臣姦又與從弟調等謀殺一家三人已殺甘露四年坐廢徙房陵國除後十五年平帝元始二年復立戴王弟襄隄侯子瘉為廣徳王師古曰隄音丁奚反瘉音愈奉恵王後二年薨子赤嗣王莽時絶膠東康王寄以孝景中二年立二十八年薨淮南王謀反時寄微聞其事私作兵車鏃矢應劭曰樓車也所以看敵國營壘之虛實也師古曰兵車止謂戰車耳鏃矢大鏃之矢今所謂兵箭者也鏃音子木反戰守備備淮南之起及吏治淮南事辭出之師古曰辭語所連出其事寄於上最親師古曰寄母王夫人即王皇后之妹於上為從母故寄於諸兄弟之中又更親也此下有常山王云天子為最親其義亦同意自傷發病而死不敢置後於是上聞寄有長子賢母無寵少子慶母愛幸寄常欲立之為非次因有過遂無所言上憐之立賢為膠東王奉康王祀而封慶為六安王王故衡山地膠東王賢立十五年薨諡為哀王子戴王通平嗣二十四年薨子頃王音嗣五十四年薨子共王授嗣十四年薨子殷嗣王莽時絶六安共王慶立三十八年薨子夷王禄嗣十年薨子繆王定嗣二十二年薨子頃王光嗣二十七年薨子育嗣王莽時絶清河哀王乗以孝景中三年立十二年薨無子國除常山憲王舜以孝景中五年立舜帝少子驕淫數犯禁上常寛之三十三年薨子勃嗣為王初憲王有不愛姬生長男棁蘇林曰音奪師古曰音他活反其字從木棁以母無寵故亦不得幸於王王后脩生太子勃王内多所幸姬生子平子商王后稀得幸及憲王疾甚諸幸姬侍病王后以妬媢不常在師古曰媢亦妬也媢音冐輙歸舍醫進藥太子勃不自嘗藥又不宿留侍疾及王薨王后太子乃至憲王雅不以棁為子數師古曰雅素也數音所具反不分與財物郎或説太子王后令分棁財皆不聴太子代立又不收恤棁棁怨王后及太子漢使者視憲王喪棁自言憲王病時王后太子不侍及薨六日出舍如淳曰出服舍也太子勃私姦飲酒博戲擊筑與女子載馳環城過市師古曰環繞也音宦入獄視囚天子遣大行騫驗問師古曰張騫也逮諸證者師古曰逮捕也王又匿之吏求捕勃使人致擊笞掠擅出漢所疑囚有司請誅勃及憲王后脩上曰脩素無行使棁䧟之罪勃無良師傅不忍致誅有司請廢勿王徙王勃以家屬處房陵上許之勃王數月廢國除月餘天子為最親詔有司曰常山憲王早夭后妾不和適孽誣爭師古曰適音嫡孽庶也陷于不誼以㓕國朕甚閔焉其封憲王子平三萬户為真定王子商三萬戸為泗水王頃王平立二十五年薨師古曰真定頃王也子烈王偃嗣十八年薨子孝王由嗣二十二年薨子安王雍嗣二十六年薨子共王普嗣十五年薨子陽嗣王莽時絶泗水思王商立十二年薨子哀王安世嗣十一年薨宋祁曰浙本上作十年下作一年去二字及十字無子於是武帝憐泗水王絶復立安世弟賀是為戴王立二十二年薨宋祁曰浙本云二十年有遺腹子煖師古曰煖音訐逺反相内史不以聞太后上書昭帝閔之抵相内史罪立煖是為勤王師古曰勤諡也立三十九年薨子戾王駿嗣三十一年薨子靖嗣王莽時絶贊曰昔魯哀公有言寡人生於深宫之中長於婦人之手未嘗知憂未嘗知懼師古曰哀公與孔子言也事見孫卿子信哉斯言也雖欲不危亡不可得已師古曰已語終辭是故古人以宴安為鴆毒師古曰左氏傳管敬仲云宴安鴆毒不可懐也亡徳而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中居勢使然也自凡人猶繫于習俗而况哀公之倫乎夫唯大雅卓爾不羣河間獻王近之矣前漢書卷五十三前漢書卷五十三考證河間獻王徳傳以孝景前二年立臣召南按漢代賢王河間稱首史記五宗世家文太簡畧自此以下云云並漢書所補也禮禮記注師古曰禮者禮經也禮記者諸儒記禮之説也臣召南按禮經即儀禮十七篇禮記七十子後學所記藝文志所謂記百三十一篇是也戴記在後故師古特觧之立毛氏詩左氏春秋博士臣召南按儒林傳毛公治詩貫公傳左氏皆為河間獻王博士並當時所不立于學官者數代以還齊魯韓詩晦而獨存毛公榖春秋微而盛行左獻王之澤逺矣哉被服儒術注師古云云胡三省曰顔注非被服者言以儒術衣被其身也對三雍宫胡三省曰謂對三雍宫之制度非召對于三雍宫也臣召南按藝文志有獻王對上下三雍宫三篇子剛王堪嗣按堪史記及本書諸侯王表並作基又頃王授表作緩又孝王慶嗣四十三年薨表作四十七年凡名字數目表傳多異如魯頃王勁表作封文王睃嗣十八年薨表作十九年中山懐王循表作修廣川恵王越十三年薨表作十二年繆王齊嗣四十四年薨表作四十五年常山憲王舜三十三年薨表作三十二年安王雍嗣二十六年薨表作十六年泗水思王商十年薨表作十五年戴王立二十二年薨表作二十年有遺腹子煖表作綜趙敬肅王彭祖傳又使人椎埋攻剽注師古曰椎殺人而埋之顧炎武曰椎埋即掘塚也新𦵏者謂之埋師古注非中山靖王勝傳有子百二十餘人按史記作有子枝屬百二十餘人似并孫數之長沙定王發傳二十八年薨史記作二十七年又戴王庸史記作康王庸前漢書卷五十三考證
