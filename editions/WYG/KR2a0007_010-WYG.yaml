body:
  text: 前漢書卷十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注成帝紀第十孝成皇帝荀恱曰諱驁字太孫驁之字曰俊應劭曰諡法安民立政曰成師古曰驁音五到反元帝太子也母曰王皇后元帝在太子宫生甲觀畫堂應劭曰甲觀在太子宫甲地主用乳生也畫堂畫九子母如淳曰甲觀觀名畫堂堂名三輔黄圗云太子宫有甲觀師古曰甲者甲乙丙丁之次也元后傳言見於丙殿此其例也而應氏以為在宫之甲地謬矣畫堂但畫飾耳豈必九子母乎霍光止畫室中是則宫殿中通有綵畫之堂室為世嫡皇孫宣帝愛之字曰太孫常置左右年三嵗而宣帝崩元帝即位帝為太子壯好經書寛博謹慎初居桂宫師古曰三輔黄圗桂宫在城中近北宫非太子宫上嘗急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛㢘之為名也不敢絶馳道應劭曰馳道天子所行道也若今之中道師古曰絶横度也西至直城門晋灼曰黄圗西出南頭第二門也得絶乃度還入作室門上遲之問其故以狀對上大說師古曰說讀曰恱乃著令令太子得絶馳道云師古曰言云者此舉著令之文其後幸酒樂燕樂晋灼曰幸酒好酒也樂燕沈讌也師古曰幸酒晋說是也樂燕樂者論語稱孔子云損者三樂樂驕樂樂逸遊樂燕樂損矣燕樂燕私之樂也上樂讀如本字又音五孝反下樂音来各反今流俗本無下樂字後人不曉輒去之上不以為能而定陶恭王有材蓺母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢竟寧元年五月元帝崩六月己未太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后以元舅侍中衛尉陽平侯王鳳為大司馬大將軍領尚書事乙未有司言乗輿車牛馬禽獸皆非禮不宜以𦵏奏可七月大赦天下建始元年春正月乙丑皇曾祖悼考廟災文頴曰宣帝父史皇孫廟立故河間王弟上郡庫令良為王如淳曰漢官北邉郡庫官之兵器所藏故置令有星孛于營室罷上林詔獄師古曰漢舊儀云上林詔獄主治苑中禽獸宫館事屬水衡二月右將軍長史姚尹等使匈奴還去塞百餘里暴風火發燒殺尹等七人賜諸侯王丞相將軍列侯王太后公主王主張晏曰天子女曰公主秩比公也王主王之女也師古曰王主則翁主也王自主婚故曰王主吏二千石黄金宗室諸官吏千石以下至二百石及宗室子有屬籍者三老孝弟力田鰥寡孤獨錢帛各有差吏民五十戸牛酒詔曰廼者火災降於祖廟有星孛于東方始正而虧如淳曰言始即帝之正而有彗星之虧也咎孰大焉師古曰孰有大於此者孰誰也書云惟先假王正厥事師古曰商書高宗肜日載武丁之臣祖已之辭也假至也言先古至道之君􅇜遇災變則正其行事修徳以應之羣公孜孜帥先百寮輔朕不逮師古曰孜孜不怠之意孜音兹崇寛大長和睦凡事恕已毋行苛刻師古曰恕者仁也仁已之心以度於物其大赦天下使得自新封舅諸吏光禄大夫闗内侯王崇為安成侯應劭曰百官表諸吏得舉法案劾職如御史中丞武帝初置皆兼官所加或列侯將軍卿大夫為之無員也賜舅王譚商立根逢時爵關内侯夏四月黄霧四塞博問公卿大夫無有所諱六月有青蠅無萬數師古曰言其極多雖欲以萬數計之而不可得故云無萬數集未央宫殿中朝者坐服䖍曰公卿以下朝㑹坐也晋灼曰内朝臣之朝坐也師古曰朝臣坐之在宫殿中者也服說是矣坐音才臥反秋罷上林宫館希御幸者二十五所八月有兩月相承晨見東方服䖍曰相承在上下也應劭曰案京房易傳云君弱如婦為隂所乗則兩月出九月戊子流星光燭地長四五丈委曲蛇形貫紫宫十二月作長安南北郊罷甘泉汾隂祠是日大風拔甘泉畤中大木十韋以上師古曰韋與圍同郡國被災什四以上毋收田租師古曰什四謂田畝所收十損其四二年春正月罷雍五畤辛巳上始郊祀長安南郊詔曰廼者徙泰畤后土于南郊北郊朕親飭躬郊祀上帝師古曰飭整也讀與勅同皇天報應神光並見三輔長無共張繇役之勞師古曰共音居用反張音竹亮反謂供具張設他皆類此宋祁曰姚本注云漢毎上雍祀甘泉有千乗萬騎置頓之勞今移祀于南郊郊故有共帳繇役也赦奉郊縣長安長陵應劭曰天郊在長安城南地郊在長安城北長陵界中二縣有奉郊之勤故一切並赦之及中都官耐罪徒師古曰中都官京師諸官府減天下賦錢算四十孟康曰本算百二十今減四十為八十閏月以渭城延陵亭部為初陵二月詔三輔内郡舉賢良方正各一人師古曰内郡謂非邉郡三月北宫井水溢出辛丑上始祠后土于北郊丙午立皇后許氏師古曰許嘉女罷六廐技巧官服䖍曰倡技巧者也師古曰謂巧蓺之技耳非倡樂之技也夏大旱東平王宇有罪削樊亢父縣師古曰樊及亢父東平之二縣也亢音抗父音甫秋罷太子博望苑文頴曰武帝為衛太子作此苑令受賔客也以賜宗室朝請者師古曰請音才性反減乗輿廐馬三年春三月赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收秋關内大水七月虒上小女陳持弓聞大水至走入横城門闌入尙方掖門服䖍曰虒音斯應劭曰虒上地名在渭水邉陳姓也持弓名也無符籍妄入官曰闌掖門者正門之傍小門也如淳曰横音光三輔黄圗北靣西頭第一門師古曰掖門在兩傍言如人臂掖也至未央宫鉤盾中吏民驚上城九月詔曰廼者郡國被水災流殺人民多至千數京師無故訛言大水至師古曰訛偽言吏民驚恐奔走乗城師古曰乗登也殆苛暴深刻之吏未息元元􅁈失職者衆師古曰職常也失其常業遣諫大夫林等循行天下師古曰行音下更反冬十二月戊申朔日有蝕之夜地震未央宫殿下詔曰蓋聞天生衆民不能相治為之立君以綂理之君道得則草木昆蟲咸得其所師古曰昆衆也昆蟲言衆蟲也又許慎說文云二虫為䖵讀與昆同謂虫之總名兩義並通而鄭康成以昆蟲為明蟲失之矣虫音許尾反人君不徳謫見天地師古曰言天地見變所以責之災異婁發以告不治師古曰婁古屢字也治音丈吏反朕渉道日寡舉錯不中師古曰中當也音竹仲反乃戊申日蝕地震朕甚懼焉公卿其各思朕過失明白陳之女無面從退有後言師古曰虞書益稷之篇云帝曰予違汝弼汝無面從退有後言謂我有違道汝當正之無得對面則順從唯唯退後則有謗讟之言也故此詔引之丞相御史與將軍列侯中二千石及内郡國舉賢良方正能直言極諫之士詣公車朕將覽焉越雋山崩四年春罷中書宦官臣瓉曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時任中書官𢎞恭為令石顯為僕射元帝即位數年恭死顯代為中書令専權用事至成帝乃罷其官初置尚書員五人師古曰漢舊儀云尚書四人為四曹常侍尚書主丞相御史事二千石尚書主刺史二千石事戸曹尚書主庶人上書事主客尚書主外國事成帝置五人有三公曹主斷獄事夏四月雨雪師古曰雨音于具反五月中謁者丞陳臨殺司𨽻校尉轅豐於殿中應劭曰豐為長安令治有能名擢拜司𨽻校尉臨素與豐有怨見其尊顯畏為已害拜訖未出使人刺殺秋桃李實大水河決東郡金隄師古曰金隄者河隄之名今在滑州界冬十月御史大夫尹忠以河決不憂職自殺河平元年春三月詔曰河決東郡流漂二州師古曰兗州豫州之地校尉王延世隄塞輙平其改元為河平賜天下吏民爵各有差夏四月己亥晦日有蝕之既詔曰朕獲保宗廟戰戰栗栗未能奉稱師古曰謂不副先帝之業傳曰男教不脩陽事不得則日為之蝕天著厥異辜在朕躬公卿大夫其勉悉心以輔不逮師古曰悉盡也逮及也百寮各修其職惇任仁人退逺殘賊師古曰惇厚也逺離也逺音于萬反陳朕過失無有所諱大赦天下六月罷典屬國并大鴻臚秋九月復太上皇寢廟園二年春正月沛郡鐡官冶鐡飛語在五行志夏六月封舅譚商立根逢時皆為列侯三年春二月丙戌犍為地震山崩師古曰犍音其言反又其連反雍江水水逆流師古曰雍音壅其下皆同秋八月乙夘晦日有蝕之光禄大夫劉向校中祕書師古曰言中以别外謁者陳農使使求遺書於天下師古曰言令陳農為使而使之求遺書也上使音所吏反下使讀如本字四年春正月匈奴單于來朝赦天下徒賜孝弟力田爵二級諸逋租賦所振貸勿收二月單于罷歸國三月癸丑朔日有蝕之遣光禄大夫博士嘉等十一人行舉瀕河之郡師古曰廵行而舉其狀也瀕水厓也瀕河言傍河也行音下更反瀕音頻又音賔傍音布浪反水所毁傷困乏不能自存者財振貸師古曰財與裁同謂量其等差而振貸之其為水所流壓死不能自𦵏令郡國給槥櫝葬埋師古曰槥櫝謂小棺槥音衛櫝音讀已𦵏者與錢人二千避水它郡國在所冗食之文頴曰冗散也散廩食使生活不占著戸給役使也如淳曰散著人間給食之官償其直也師古曰文說是也冗音如勇反食讀曰飤謹遇以文理無令失職師古曰勿使失其常理舉惇厚有行能直言之士壬申長陵臨涇岸崩雍涇水夏六月庚戌楚王囂薨山陽火生石中改元為陽朔陽朔元年應劭曰時隂盛陽微故改元曰陽朔欲陽之蘇息也師古曰應說非也朔始也以火生石中言陽氣之始春二月丁未晦日有蝕之三月赦天下徒冬京兆尹王章有罪下獄死二年春寒詔曰昔在帝堯立羲和之官應劭曰尚書堯典曰乃命羲和羲氏和氏世掌天地之官命以四時之事令不失其序故書云黎民於蕃時雍應劭曰黎衆也時是也雍和也言衆民於是變化用是太和也韋昭曰蕃多也師古曰此虞書堯典之辭也今尚書作變而此紀作蕃兩說並通蕃音扶元反明以隂陽為本也今公卿大夫或不信隂陽薄而小之師古曰謂為輕小之事也所奏請多違時政李竒曰時政月令也傳以不知周行天下如淳曰在位者皆不知隂陽時政轉轉相因故令後人遂不知也師古曰如說非也言遞相因循以所不知之事施設教命周徧天下而欲望隂陽和調豈不謬哉其務順四時月令三月大赦天下夏五月宋祁曰古本無夏字除吏八百石五百石秩李竒曰除八百就六百除五百就四百秋關東大水流民欲入函谷天井壺口五阮關者勿苛留應劭曰天井在上黨高都壺口在壺關五阮在代郡如淳曰阮音近捲反師古曰苛細刻也阮音其逺反苛音河遣諫大夫博士分行視師古曰行音下更反八月甲申定陶王康薨九月奉使者不稱師古曰不副上意詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵原宜皆眀於古今温故知新通達國體師古曰温厚也謂厚積於故事也故謂之博士否則學者無述焉為下所輕非所以尊道徳也工欲善其事必先利其器師古曰論語載孔子之言也故此詔引焉丞相御史其與中二千石二千石雜舉可充博士位者使卓然可觀師古曰卓然高逺之貌也是嵗御史大夫張忠卒師古曰史不記其月故書之於嵗末其下王駿亦同三年春三月壬戌隕石東郡八夏六月潁川鐡官徒申屠聖等百八十人殺長吏盜庫兵自稱將軍經歴九郡遣丞相長史御史中丞逐捕以軍興從事皆伏辜師古曰逐捕之事須冇發興皆依軍法秋八月丁巳大司馬大將軍王鳳薨四年春正月詔曰夫洪範八政以食為首師古曰洪範尚書篇名箕子為周武王所說洪大也範法也八政一曰食盖王政之所先故以為首斯誠家給刑錯之本也師古曰言倉廩􅂶盈則家家自足人不犯禁無所用刑也先帝劭農蘇林曰劭音翹精異之意也晋灼曰劭勸勉也師古曰晋說是也其字從力音時召反薄其租稅寵其强力師古曰謂優寵力田之人令與孝弟同科師古曰謂每同薦舉及加賜也間者民彌惰怠鄉本者少趨末者衆將何以矯之師古曰鄉讀曰嚮矯正也方東作時應劭曰東作耕也師古曰春位在東耕者始作故曰東作虞書堯典曰平秩東作其令二千石勉勸農桑出入阡陌致勞來之師古曰阡陌田間道也南北曰阡東西曰陌蓋秦時商鞅所開也勞米勸勉之意也勞音郎到反來音郎代反書不云乎服田力嗇乃亦有秋應劭曰農夫服田厲其膂力乃有秋收也師古曰此商書盤庚之辭其朂之哉二月赦天下秋九月壬申東平王宇薨閏月壬戌御史大夫于永卒師古曰于定國子鴻嘉元年春二月詔曰朕承天地獲保宗廟明有所蔽徳不能綏刑罰不中衆􅁈失職趨闕告訴者不絶是以隂陽錯謬寒暑失序師古曰序次也日月不光百姓蒙辜朕甚閔焉師古曰蒙被也書不云乎即我御事㒺克耆夀咎在厥躬文頴曰此尚書文侯之命篇中辭也言我周家用事者無能有耆老賢者使國之危亡罪咎在其用事者也師古曰咎在厥躬平王自謂故帝引之以自責耳文氏乃云咎在用事斯失之矣方春生長時臨遣諫大夫理等師古曰天子自臨敕而遣舉三輔三河𢎞農􅁈獄公卿大夫部刺史明申敕守相稱朕意焉其賜天下民爵一級女子百戸牛酒加賜鰥寡孤獨高年帛逋貸未入者勿收壬午行幸初陵赦作徒師古曰徒人之在陵作役者以新豐戲鄉為昌陵縣師古曰戱水之鄉也音許宜反奉初陵賜百户牛酒上始為微行出張晏曰於後門出從期門郎及私奴客十餘人白衣組幘單騎出入市里不復警蹕若微賤之所為故曰微行冬黄龍見真定師古曰本趙國東垣縣也高祖十一年更名真定二年春行幸雲陽三月博士行飲酒禮有雉蜚集于庭歴階升堂而雊師古曰蜚古飛字也歴階謂以次而登也宋祁曰歴階唐本作歴陛後集諸府又集承明殿師古曰在未央宫中詔曰古之選賢傅納以言明試以功師古曰𫝊讀曰敷敷陳也令其陳言而省納之乃試以事也故官無廢事下無逸民師古曰逸遁也教化流行風雨和時百榖用成衆庶樂業咸以康寧朕承鴻業十有餘年數遭水旱疾疫之災黎民婁困於饑寒師古曰婁古屢字而望禮義之興豈不難哉朕既無以率道師古曰道讀曰𨗳帝王之道日以陵夷師古曰陵丘陵也夷平也言其頽替若丘陵之漸平也又曰陵遲亦言如丘陵之逶遲稍卑下也他皆類此意廼招賢選士之路鬱滯而不通與師古曰與讀曰歟將舉者未得其人也其舉敦厚有行義能直言者冀聞切言嘉謀匡朕之不逮夏徙郡國豪傑貲五百萬以上五千户于昌陵賜丞相御史將軍列侯公主中二千石冢地第宅師古曰並於昌陵賜之六月立中山憲王孫雲客為廣徳王三年夏四月赦天下令吏民得買爵賈級千錢師古曰賈讀曰價大旱秋八月乙夘孝景廟闕災冬十一月甲寅皇后許氏廢廣漢男子鄭躬等六十餘人攻官寺簒囚徒師古曰逆取曰簒盜庫兵自稱山君四年春正月詔曰數敕有司務行寛大而禁苛暴訖今不改一人有辜舉宗拘繫農民失業怨恨者衆傷害和氣水旱為災關東流冗者衆師古曰冗散失其事業也冗音人勇反青幽冀部尤劇朕甚痛焉未聞在位有惻然者孰當助朕􅁨之師古曰孰誰也已遣使者循行郡國師古曰行音下更反被災害什四以上民貲不滿三萬勿出租賦逋貸未入皆勿收流民欲入關輙籍内師古曰録其民籍而内之所之郡國謹遇以理師古曰之往也務有以全活之思稱朕意秋勃海清河河溢被災者振貸之冬廣漢鄭躬等黨與􅎊廣師古曰􅎊古浸字浸漸也犯歴四縣衆且萬人拜河東都尉趙護為廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪師古曰賊黨相捕斬而来者赦其本罪旬月平遷護為執金吾賜黄金百斤永始元年春正月癸丑太官凌室火師古曰藏冰之室戊午戾后園闗火夏四月封媫妤趙氏父臨為成陽侯五月封舅曼子侍中騎都尉光禄大夫王莽為新都侯六月丙寅立皇后趙氏師古曰趙飛燕也即上所謂媫妤趙氏大赦天下秋七月詔曰朕執徳不固謀不盡下師古曰言不博謀於羣下過聼將作大匠萬年師古曰過誤也萬年解萬年也言昌陵三年可成作治五年中陵司馬殿門内尚未加功如淳曰陵中有司馬殿門如生時制也臣瓉曰天子之藏壙中無司馬殿門也此謂陵上寢殿及司馬門也時皆未作之故曰尚未加功師古曰中陵陵中正寢也司馬殿門内瓉說是也天下虛耗師古曰耗損也音呼到反百姓罷勞師古曰罷讀曰疲客土疏惡服䖍曰取他處土以増高為客土也終不可成朕惟其難怛然傷心師古曰惟思也夫過而不改是謂過矣師古曰論語載孔子之言故詔引之其罷昌陵及故陵勿徙吏民令天下毋有動揺之心立城陽孝王子俚為王如淳曰俚音里八月丁丑太皇太后王氏崩師古曰宣帝王皇后也二年春正月己丑大司馬車騎將軍王音薨二月癸未夜星隕如雨乙酉晦日有蝕之詔曰乃者龍見于東萊日有蝕之天著變異以顯朕郵師古曰郵與尤同謂過也朕甚懼焉公卿申敕百寮深思天誡有可省減便安百姓者條奏所振貸貧民勿收又曰闗東比嵗不登師古曰比頻也吏民以義收食貧民入榖物助縣官振贍者已賜直如淳曰賜之爵復租賦以為直師古曰此說非也收食貧人謂收取而養食之助縣官振贍謂出物以助郡縣之官也已賜直謂官賜其所費直也今方更加爵及免賦耳食讀曰飤其百萬以上加賜爵右更師古曰第十四爵也更音工衡反欲為吏補三百石其吏也遷二等師古曰先已為吏則遷二等三十萬以上賜爵五大夫師古曰第九爵也吏亦遷二等民補郎十萬以上家無出租賦三嵗萬錢以上一年冬十一月行幸雍祠五畤十二月詔曰前將作大匠萬年知昌陵卑下不可為萬嵗居奏請營作建置郭邑妄為巧詐積土增高多賦歛繇役興卒暴之作師古曰卒讀曰猝謂急也卒徒蒙辜死者連屬師古曰屬音之欲反百姓罷極天下匱竭師古曰罷讀曰疲匱空也竭盡也常侍閎前為大司農中丞數奏昌陵不可成師古曰閎王閎也侍中衛尉長數白宜早止徙家反故處師古曰長淳于長也朕以長言下閎章如淳曰以衛尉長數曰罷故因下閎請奏罷作之章師古曰下音胡稼反公卿議者皆合長計首建至策閎典主省大費師古曰司農中丞主錢榖顧庸故云典主民以康寧閎前賜爵關内侯黄金百斤其賜長爵闗内侯食邑千戸閎五百戸萬年佞邪不忠毒流衆庶海内怨望至今不息雖蒙赦令不宜居京師其徙萬年敦煌郡是嵗御史大夫王駿卒師古曰王吉之子也三年春正月己夘晦日有蝕之詔曰天災仍重朕甚懼焉師古曰仍頻也重音直用反惟民之失職師古曰失其常業也臨遣太中大夫嘉等循行天下師古曰行音下更反存問耆老民所疾苦其與部刺史舉惇樸遜譲有行義者各一人冬十月庚辰皇太后詔有司復甘泉泰畤汾隂后土雍五畤陳倉陳寳祠師古曰陳寳祠在陳倉語在郊祀志十一月尉氏男子樊並等十三人謀反師古曰尉氏陳留之縣殺陳留太守刼畧吏民自稱將軍徒李譚等五人共格殺並等皆封為列侯十二月山陽鐡官徒蘇令等二百二十八人攻殺長吏盗庫兵自稱將軍經歴郡國十九殺東郡太守汝南都尉遣丞相長史御史中丞持節督趣逐捕師古曰趣讀曰促汝南太守嚴訢捕斬令等師古曰訢與欣同令即蘇令遷訢為大司農賜黄金百斤四年春正月行幸甘泉郊泰畤神光降集紫殿大赦天下賜雲陽吏民爵女子百户牛酒鰥寡孤獨高年帛三月行幸河東祠后土賜吏民如雲陽行所過無出田租夏四月癸未長樂臨華殿未央宫東司馬門皆災師古曰東而之司馬門也六月甲午霸陵園門闕災出杜陵諸未嘗御者歸家詔曰廼者地震京師火災婁降師古曰婁古屢字朕甚懼之有司其悉心明對厥咎師古曰悉盡也朕將親覽焉又曰聖王明禮制以序尊卑異車服以章有徳雖有其財而無其尊不得踰制故民興行師古曰行音下更反上義而下利師古曰以義為上以利為下方今世俗奢僣罔極師古曰罔無也極中也一曰止也靡有厭足公卿列侯親屬近臣四方所則師古曰則法也未聞修身遵禮同心憂國者也或廼奢侈逸豫務廣第宅治園池多畜奴婢被服綺縠師古曰被音皮義反設鐘鼓備女樂車服嫁娶𦵏埋過制吏民慕效􅎊以成俗師古曰􅎊漸也而欲望百姓儉節家給人足豈不難哉詩不云乎赫赫師尹民具爾瞻師古曰小雅節南山之詩也赫赫盛貌也師尹尹氏為太師之官也言居位甚髙備為衆庶所瞻仰其申敕有司以漸禁之師古曰謂約束也青綠民所常服且勿止師古曰然則禁紅紫之屬列侯近臣各自省改師古曰省視也視而改之論語稱曾子曰吾日三省吾身劉攽曰予謂省者減省也改者頃改也司𨽻校尉察不變者秋七月辛未晦日有蝕之元延元年春正月己亥朔日有蝕之三月行幸雍祠五畤夏四月丁酉無雲有雷聲光耀耀四面下至地昬止赦天下秋七月有星孛于東井詔曰廼者日蝕星隕謫見于天大異重仍師古曰仍頻也重音直用反在位黙然罕有忠言今孛星見于東井朕甚懼焉公卿大夫博士議郎其各悉心惟思變意明以經對無有所諱與内郡國舉方正能直言極諫者各一人師古曰令公卿與内郡國各舉一人宋祁曰注文南本作内郡國共舉人北邉二十二郡舉勇猛知兵法者各一人封蕭相國後喜為鄼侯宋祁曰喜字唐本南夲並作嘉予據表傳作嘉是冬十二月辛亥大司馬大將軍王商薨是嵗昭儀趙氏害後宫皇子師古曰趙飛燕之妹二年春正月行幸甘泉郊泰畤三月行幸河東祠后土夏四月立廣陵孝王子守為王宋祁曰子守為王景徳本史館本唐本並作子宇為王冬行幸長楊宫從胡客大校獵如淳曰合軍聚衆有幡校擊鼓也周禮校人掌王田獵之馬故謂之校獵師古曰如說非也此校謂以本自相貫穿為闌校耳校人職云六廐成校是則以遮闌為義也校獵者大為闌校以遮禽獸而獵取也軍之幡旗雖有校名本因部校此無豫也劉攽曰予謂校讀如犯而不校之校校亦競也競逐獵也宿萯陽宫師古曰萯音倍賜從官三年春正月丙寅蜀郡岷山崩師古曰岷音武巾反雍江三日江水竭二月封侍中衛尉淳于長為定陵侯三月行幸雍祠五畤四年春正月行幸甘泉郊泰畤二月罷司𨽻校尉官三月行幸河東祠后土甘露降京師賜長安民牛酒綏和元年春正月大赦天下二月癸丑詔曰朕承太祖鴻業奉宗廟二十五年徳不能綏理宇内百姓怨望者衆不蒙天祐至今未有繼嗣天下無所係心觀于往古近事之戒禍亂之萌皆由斯焉師古曰始生曰萌定陶王欣於朕為子慈仁孝順可以承天序繼祭祀其立欣為皇太子封中山王舅諫大夫馮參為宜鄉侯益中山國三萬戸以慰其意師古曰以不得繼統為帝之後恐其怨恨賜諸侯王列侯金天下當為父後者爵三老孝弟力田帛各有差又曰蓋聞王者必存二王之後所以通三統也師古曰天地人是為三統二王之後并已為三昔成湯受命列為三代師古曰夏殷周是為三代而祭祀廢絶考求其後莫正孔吉臣瓉曰無若孔吉最正也其封吉為殷紹嘉侯三月進爵為公及周承休侯皆為公地各百里行幸雍祠五畤夏四月以大司馬票騎大將軍為大司馬文頴曰王根也罷將軍官御史大夫為大司空封為列侯益大司馬大司空奉如丞相如淳曰律丞相大司馬大將軍奉錢月六萬御史大夫奉月四萬也秋八月庚戌中山王興薨冬十一月立楚孝王孫景為定陶王定陵侯淳于長大逆不道下獄死廷尉孔光使持節賜貴人許氏藥飲藥死師古曰即前所廢皇后許氏也十二月罷部刺史更置州牧秩二千石二年春正月行幸甘泉郊泰畤二月壬子丞相翟方進薨三月行幸河東祠后土丙戌帝崩于未央宫臣瓉曰帝年二十即位即位二十六年夀四十五師古曰即位明年乃改元耳夀四十六皇太后詔有司復長安南北郊四月己夘𦵏延陵臣瓉曰自崩至𦵏几五十四日延陵在扶風去長安六十二里贊曰臣之姑充後宫為媫妤晋灼曰班彪之姑也父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不内顧不疾言不親指師古曰不内顧者謂儼然端嚴不廻眄也不疾言者為輕肆也不親指者為惑下也此三句者本論語鄉黨篇述孔子之事故班氏引之以羙成帝今論語云車中不内顧不疾言不親指内顧者說者以為前視不過衡軛旁視不過輢較與此不同輢音於綺反臨朝淵嘿尊嚴若神可謂穆穆天子之容者矣師古曰禮記云天子穆穆諸侯皇皇大夫濟濟士蹌蹌故此賛引之博覽古今容受直辭公卿稱職奏議可述師古曰稱職克當其任也可述言有文采遭世承平上下和睦然湛于酒色師古曰湛讀曰耽趙氏亂内外家擅朝言之可為於邑師古曰於邑短氣貌讀如本字於又音烏邑又音烏合反他皆類此建始以來王氏始執國命哀平短祚莽遂簒位盖其威福所由來者漸矣前漢書卷十前漢書卷十考證成帝紀罷六厩技巧官臣召南按百官表六厩技巧二官有令有丞屬水衡都尉師古但解技巧未釋六厩於百官表注引漢舊儀即以太僕之大厩解之恐未為當此所罷者止言水衡所屬之六厩非太僕所屬也下文又云减乗輿厩馬則太僕所屬者矣盖聞天生衆民宋本無盖聞二字别本俱有五阮闗注應劭曰五阮在代郡臣召南按地理志代郡無五阮闗有五原闗疑五阮即五原音之轉耳前漢書卷十考證
