  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0007_WYG_016-1a, image: WYG0249/WYG0249-0241a.png}
body:
  text: 前漢書卷十六漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注髙惠髙后文功臣表第四自古帝王之興曷嘗不建輔弼之臣所與共成天功者乎師古曰天功天下之功業也虞書舜典曰欽哉惟時亮天功也漢興自秦二世元年之秋楚陳之嵗師古曰謂陳渉自稱楚王時也初以沛公總帥雄俊三年然後西滅秦立漢王之號五年東克項羽即皇帝位八載而天下迺平始論功而定封訖十二年侯者百四十有三人時大城名都民人散亡户口可得而數裁什二三師古曰裁與纔同十分之内纔有二三也是以大侯不過萬家小者五六百户封爵之誓曰使黄河如帶泰山若厲國以永存爰及苖裔應劭曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶也厲砥厲石也河當何時如衣帶山當何時如厲石言如帶厲國猶永存以及後世之子孫也於是申以丹書之信重以白馬之盟師古曰丹書解在髙紀白馬之盟謂刑白馬㰱其血以為盟也又作十八侯之位次孟康曰唯作元功蕭曹等十八人位次耳髙后乃詔作位次下竟師古曰謂蕭何曹參張敖周勃樊噲酈商奚涓夏侯嬰灌嬰傅寛靳歙王陵陳武王吸薛歐周昌丁復蟲達從第一至十八也髙后二年復詔丞相陳平盡差列侯之功錄第下竟臧諸宗廟副在有司師古曰副貳也其列侯功籍已臧於宗廟副貳之本又在有司始未嘗不欲固根本而枝葉稍落也故逮文景四五世間流民既歸户口亦息列侯大者至三四萬户小國自倍師古曰自倍者謂舊五百户今者至千也曹參初封萬六百户至後嗣侯宗免時有户二萬三千是為户口蕃息故也他皆類此富厚如之師古曰言其貲財亦稍富厚各如户口之多也子孫驕逸忘其先祖之艱難多陷法禁隕命亡國或云子孫訖於孝武後元之年靡有孑遺耗矣師古曰孑然獨立貌言無有獨存者至於耗盡也今俗語猶謂無為耗音毛㒺亦少密焉服䖍曰法罔差益密也故孝宣皇帝愍而錄之乃開廟臧覽舊籍詔令有司求其子孫咸出庸保之中師古曰庸賣功庸也保可安信也皆賃作者也並受復除或加以金帛師古曰復音方目反用章中興之徳降及孝成復加䘏問稍益衰微不絶如綫晉灼曰綫今線縷字也音先戰反善乎杜業之納說也曰昔唐以萬國致時雍之政師古曰雍和也堯典云黎民於變時雍故杜業引之也虞夏以之多羣后饗共己之治師古曰羣后謂諸侯也恭己無為也孔子曰無為而治者其舜也歟夫何為哉恭己正南面而已共讀曰恭湯法三聖殷氏太平師古曰三聖謂堯舜禹三人也周封八百重譯来賀師古曰重譯謂越裳氏也是以内恕之君樂繼絶世隆名之主安立亡國師古曰以立亡國之後為安泰也至於不及下車徳念深矣張宴曰謂武王入殷未及下車封黄帝之後於薊虞舜之後於陳也成王察牧野之克顧羣后之勤知其恩結於民心功光於王府也故追述先父之志錄遺老之䇿髙其位大其㝢師古曰㝢謂啓土所居也愛敬飭盡命賜備厚師古曰飭謹也讀與敕同大孝之隆於是為至至其沒也世主歎其功無民而不思所息之樹且猶不伐師古曰謂召伯止於甘棠之下而聽訟人思其徳不伐其樹召南甘棠之詩是也况其廟乎是以燕齊之祀與周並傳子繼弟及歴載不墮師古曰弟代兄位謂之及墮毁也音火規反豈無刑辟繇祖之竭力故支庶頼焉師古曰言國家非無刑辟而功臣子孫得不陷罪辜而能長存者思其先人之力令有續嗣也繇讀與由同迹漢功臣亦皆割符世爵受山河之誓存以著其號亡以顯其魂賞亦不細矣百餘年間而襲封者盡或絶失姓或乏無主朽骨孤於墓苖裔流於道生為愍𨽻死為轉屍應劭曰死不能葬故屍流轉在溝壑之中師古曰愍𨽻者言為徒𨽻可哀愍之也以往况今甚可悲傷師古曰况譬也聖朝憐閔詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義設言虛亡則厚徳掩息遴柬布章晉灼曰許愼云遴難行也柬古簡字也簡少也言今難行封則得繼絶者少若然此必布聞彰於天下也師古曰遴讀與吝同非所以視化勸後也師古曰視讀與示同三人為衆雖難盡繼宜從尤功孟康曰言人三為衆雖難盡繼取其功尤髙者一人繼之於名為衆矣服䖍曰尤功封重者一人也師古曰孟說是也於是成帝復紹蕭何哀平之世增修曹參周勃之屬得其宜矣以綴續前記究其本末并序位次盡于孝文以昭元功之侯籍云師古曰籍謂名錄也髙紀所云通侯籍也右髙祖百四十七人周吕建成二人在外戚羮頡合陽沛徳四人在王子凡百五十三人右孝惠三人右髙后十二人扶栁襄城軹壺闗昌平贅其騰昌成腄祝兹建陵十一人在恩澤外戚洨沛信都樂昌東平五人隨父上邳朱虛東牟三人在王子凡三十一人師古曰腄音直瑞反洨音交又音下交反右孝文十人軹鄔周陽三人在外戚管氏營丘營平陽虛楊丘朸安都平昌武成白石阜陵安陽陽周東城十四人在王子凡二十七人師古曰鄔音一户反又於庶反今書本有鄡字者誤前漢書卷十六前漢書卷十六考證髙惠髙后文功臣表訖十二年侯者百四十有三人臣召南按此文總計髙帝所封并外戚二人王子四人在内故有一百四十三人也十二年宋本作十二月誤監本是又作十八侯之位次注師古曰謂蕭何曹參張敖周勃云云顧炎武曰自蕭曹至蟲達為十八侯當時所尚者戰功而張良陳平皆居中計謀之臣故平列在四十七良列在六十二也至十八侯贊則蕭何第一樊噲第二張良第三周勃第四曹參第五陳平第六張敖第七酈商第八灌嬰第九夏侯嬰第十傅寛第十一靳歙第十二王陵第十三韓信第十四陳武第十五蟲達第十六周昌第十七王吸第十八而無奚涓薛歐丁復此後人論定非復當日之功次矣且韓信已誅安得復在功臣之位即此可知臣召南按十八侯贊之後陸機作漢髙祖功臣頌共三十一人皆非當日之功次故師古注依表中所列位次是也昔唐以萬國致時雍之政注堯典云黎萌於變時雍按改黎民作黎萌師古避太宗諱也他處俱改民作人平陽懿侯曹參注孟康曰曹參位第二而表在首臣召南按此表第四層為位次孟康曰之上班表本文應大書二字言參位次第二也孟康云云即解此文徧校各本俱無二字明係脱誤又十一世侯曠嗣今見洪邁曰漢列侯八百餘人及光武時在者平陽富平二侯耳清河定侯王吸臣宗萬按清河侯史表作清陽侯又如蟲達史作蠱達隆慮克侯史作哀侯傅胡害史作吕周止史作周定工師喜史作沛嘉魯侯奚涓史失名城父侯史作故城侯單究史作單寗終陵侯史作絳陽侯鄂秋史作鄂千秋爰類史作元頃許盎史作許溫王翥史作王翳林摯史作林執趙將夕史作趙將夜􅀈侯史作㧦侯歴侯史作磨侯稾祖侯陳鍇史作稾祗侯陳錯室中同史作空中留肹史作留勝陸量侯史作陸梁侯髙景侯史作髙京侯吳郢史作吳程樂説史作欒説土軍式侯史作武侯汲紹侯史作汲終侯單右車史作單父聖王虞人史作王周季必史作李必穀陽侯史作糓陵侯景嚴侯史作甘泉侯革朱史作革赤鹵侯史作菌侯朱進史作朱通祝兹侯史作松滋侯成隂侯史作成陶侯其尤異者平嚴侯張瞻師史作繁侯彊瞻則封邑姓名皆不同也或班氏訂史記之失或後人傳寫彼此有訛皆不可知據司馬貞索𨼆于史表中已言及則唐時本已然矣堂邑安侯陳嬰定豫章浙江都漸定自為王壯息都漸史表作都浙壯息史表作壯思曲逆獻侯陳平漢王二年初起修武臣召南按史記作初從是也又以䕶軍中尉出竒計史記作六出竒計此表位次户數數目間與史表不同即叙功中官名亦時互異如執盾隊史長鉟都尉重将愼将門尉駢鄰之類不可枚舉今但以本書校正留文成侯張良以韓申都下韓入武闗注師古曰韓申都即韓王信也楚漢春秋作信都古信申同義洪邁曰良與韓王信了不相干顏注誤矣自司徒訛為申徒自申徒訛為申都自申都訛為信都展轉相傳古書豈復可以字義求也臣召南按邁紏師古之違是也史表云以韓申徒徐廣以司徒注之而良本傳曰為韓司徒又韓王信傳曰使良以韓司徒即其明證豈可据楚漢春秋疑史記數處之文乎又髙帝本紀有曰與韓将皇欣魏申徒武蒲之軍并攻昌邑此則魏亦有申徒官矣陽夏侯陳豨以特将云云臣召南按此表明言以前元年從起宛胊乃本傳則云不知始所以得從何也又曰十年以趙相國反按趙相國當作代相國各本俱誤其時趙相周昌非陳豨也貰齊侯合傳胡害臣召南按史表無合字貰是所封之地齊是其諡然則此表合字衍文也曲成圉侯蟲逹臣召南按史表作曲城侯又叙功曰以西城户将史表作以曲城户将又至霸上為執金吾史表作為執圭以下有二隊将之文則不應先至九卿後為偏禆况執金吾官至武帝始改中尉名不應髙帝時有此官號史表作為執圭是也又位次曰夜恆侯監本訛夜侯恒今改正芒侯耏跖臣召南按史表則此侯名昭以九年有罪國除也據此表則昭乃跖子以九年嗣侯是班氏訂正史記之失敬市侯閻澤赤臣召南按敬市史表作故市又叙功云遷為殷相史表遷為假相似並史表為是魯侯奚涓亡子封母底為侯臣召南按母底史表作母疵又按奚涓以死軍事無子遂封母疵髙帝於功臣忠烈眷眷不忘如此忠如紀信何以獨遺必由信並無妻子可封故也安國武侯王陵以自聚黨定南陽云云臣召南按此叙功與史表全不同史云以客從起豐以廐将别定東郡南陽從至霸上云云則陵之初得從與蕭曹樊噲無異然以陵本傳核之似此表是復陽剛侯陳胥孝景六年康侯拾嗣二十五年薨臣照按監本别本俱作二十三年非也計孝景六年至元朔元年恰二十五年知宋本是從之陽河齊侯其石十一月甲子封按當作十月甲子一字衍文也復陽及此侯以十月甲子封後文柏至侯以十月戊辰封知此一字為衍禾成孝侯公孫昔祝阿孝侯髙色臣召南按史漢二表不同最可異者禾成祝阿兩侯之名二表互異據史作禾成侯髙邑而此云公孫昔也史作祝阿侯公孫耳而此云髙色也昔與耳色與邑猶不過字畫之差耳長修平侯杜恬攻項昌臣召南按此文作攻項昌則是項氏親屬為将此侯攻破之也據史表作功比須昌侯考功臣表原有須昌侯趙衍又趙衍位次百七此侯位次百八則史表是此表誤也博陽節侯周聚臣召南按陳濞既封博陽不應一地兩侯据史記索隱曰縣屬彭城則此博陽應作傅陽即春秋時偪陽國地博與傅字形相近而誤耳右髙祖百四十七人臣召南按應作百三十七人下文凡百五十三人應作百四十三人各本俱誤􅋴侯黎朱蒼臣召南按史表作秩蒼又按公卿表景中五年􅋴侯吳利為奉常此表􅋴侯不姓吳而其子孫亦無名吳利者平都孝侯劉到臣召南按此表有兩劉到一為東茅侯或是姓名偶同如韓信之比亦不可知據史表則東茅侯自名劉釗漢表訛作到耳前漢書卷十六考證
