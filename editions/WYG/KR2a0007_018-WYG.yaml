  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0007_WYG_018-1a, image: WYG0249/WYG0249-0291a.png}
body:
  text: 前漢書卷十八漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注外戚恩澤侯表第六自古受命及中興之君必興滅繼絶脩廢舉逸然後天下歸仁四方之政行焉師古曰論語孔子陳帝王之法云審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之人歸心焉故此序引之也傳稱武王克殷追存賢聖至乎不及下車師古曰禮記云武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳此其事也世代雖殊其揆一也髙帝撥亂誅暴庶事草創日不暇給然猶修祀六國求聘四皓過魏則寵無忌之墓適趙則封樂毅之後師古曰髙紀十二年詔云秦皇帝楚𨼆王魏安釐王齊愍王趙悼襄王皆絶無後其與秦皇帝守冢二十家楚魏齊各十家趙及魏公子無忌各五家張良傳髙帝謂四人曰吾求公公避逃我今公何自從吾兒游乎又髙紀十年求樂毅有後乎得其孫叔封之樂鄉號華成君也楚魏齊趙皆舊六國故總云六國四皓須眉皓白故謂之四皓稱號在王貢兩龔鮑傳及其行賞而授位也爵以功為先後官用能為次序後嗣共已遵業舊臣繼踵居位師古曰共讀曰恭至乎孝武元功宿將畧盡會上亦興文學進拔幽𨼆公孫𢎞自海瀕而登宰相師古曰海瀕謂近海之地瀕音頻又音賔於是寵以列侯之爵又疇咨前代詢問耆老初得周後復加爵邑自是之後宰相畢侯矣元成之間晩得殷世以備賔位漢興外戚與定天下侯者二人服䖍曰吕后兄周吕侯澤建成侯釋之師古曰與讀曰豫言豫其功也故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸吕王陵廷爭孝景將侯王氏修侯犯色師古曰修音條卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋襃紀之義應劭曰春秋天子將納后於紀紀本子爵也故先襃為侯言王者不取於小國帝舅緣大雅申伯之意應劭曰申伯周宣王元舅也為邑於謝後世欲光寵外親者緣申伯之恩援此義以為諭也􅐛廣博矣師古曰􅐛漸也是以别而敘之右高后十人五人隨父凡十五人右孝文三人右孝景四人右孝武九人三人隨父凡十二人右孝昭六人一人桑樂侯隨父凡七人右孝成十人安成平阿成都紅陽曲陽高平新都武陽八人隨父凡十八人右孝哀十二人新成新都平陽營陵徳五人隨父凡十八人右孝平二十二人卭成博陸宣平紅舞楊􅀈樂陵都成新甫爰氏合陽義陽章鄉信成隨桃襃新賞都十七人隨父繼世凡三十九人師古曰據功臣表及王子侯表平帝時無紅侯唯周勃𤣥孫恭以元始二年紹封絳侯疑紅字當為絳轉寫者誤耳又功臣表作童鄉侯今此作章鄉二表不同亦當有誤也劉攽曰予謂今有虹縣音降然則紅亦有降音也前漢書卷十八前漢書卷十八考證外戚恩澤侯表據春秋褒紀之義臣召南按此據公羊春秋也臨泗侯吕公臣召南按史表所無然漢世后父封侯權輿於此班氏據外戚世家以領此表是也建成康侯釋之以客從擊秦擊秦監本訛數奉從宋本改正扶栁侯吕平師古曰不當姓吕臣召南按史記表作昌平疑昌吕字形相近而轉寫致訛師古謂史家惟記母族恐未然也安平敬侯陽敞按敞姓楊非陽也各本俱訛富平敬侯張安世六世建武中為武始侯臣召南按武始侯之下有今見二字班氏自言作表時此侯現在也監本各本脱去非是洪邁言侯表惟平陽富平二侯書今見可證昌水侯田廣明以左馮翊臣召南按宣紀廣明封時現為御史大夫陽城繆侯劉徳侯颯嗣師古曰颯音立臣召南按沈約宋書武帝紀陽城釐侯慶忌生肅侯岑岑生宗正平是颯字乃岑字之訛也博望頃侯許舜三月乙未封監本脱未字今補博陽定侯丙吉五鳯三年侯顯嗣顯字上脱侯字今補新都侯莾千五百戸後簒位誅監本脱後簒位誅四字從宋本補髙陵共侯翟方進永始二年十二月壬子封監本封字下有八千户三字衍文也從宋本刪前漢書卷十八考證
