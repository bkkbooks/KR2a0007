body:
  text: 前漢書卷九十三漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注佞幸傳第六十三漢興佞幸寵臣髙祖時則有籍孺孝惠有閎孺此兩人非有材能但以婉媚貴幸師古曰婉順也媚悦也與上臥起公卿皆因關説師古曰關説者言由之而納説亦如行者之有關津宋祁曰注末當有也字故孝惠時郎侍中皆冠鵔鸃貝帶師古曰以鵔鸃毛羽飾冠海貝飾帶鵔鸃即鷩鳥也鵔音峻鸃音儀説在司馬相如傳宋祁曰注文鵔鸃下疑有鳥字傅脂粉化閎籍之屬也兩人徙家安陵其後寵臣孝文時士人則鄧通宦者則趙談北宫伯子師古曰姓北宫名伯子也孝武時士人則韓嫣師古曰嫣音偃宦者則李延年孝元時宦者則𢎞恭石顯孝成時士人則張放淳于長孝哀時則有董賢孝景昭宣時皆無寵臣景帝唯有郎中令周仁昭帝時駙馬都尉秺侯金賞師古曰秺音丁䕶反嗣父車騎將軍日磾爵為侯二人之寵取過庸不篤師古曰纔過於常人耳不能大厚也宣帝時侍中中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯出常參乗號為愛幸其人謹勅無所虧損師古曰勅整也為其小妻所毒薨國除鄧通蜀郡南安人也以濯舩為黄頭郎師古曰濯舩能持濯行舩也土勝水其色黄故刺舩之郎皆著黄帽因號曰黄頭郎也濯讀曰櫂音直孝反文帝嘗夢欲上天不能有一黄頭郎推上天顧見其衣尻帶後穿師古曰衣尻帶後謂衣當尻上而居革帶之下處也宋祁曰注末也字當刪覺而之漸臺師古曰覺謂寢寐之寤也未央殿西南有蒼池池中有漸臺覺音工孝反以夢中陰自求推者郎師古曰黙而視之求所夢者見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也文帝甚説師古曰説讀曰悦尊幸之日日異通亦愿謹不好外交師古曰専謹曰愿音願又音原雖賜洗沐不欲出於是文帝賞賜通鉅萬以十數師古曰每賜輒鉅萬如此者十數劉攽曰積前後賞賜盈鉅萬者以十數爾不謂一賜則鉅萬也官至上大夫文帝時間如通家游戲師古曰間謂投隙私行不公顯也如往也然通無他技能不能有所薦逹獨自謹身以媚上而已上使善相人者相通曰當貧餓死上曰能富通者在我何説貧於是賜通蜀嚴道銅山得自鑄錢師古曰嚴道屬蜀郡縣有蠻夷曰道鄧氏錢布天下其富如此文帝嘗病癰鄧通常為上嗽吮之師古曰嗽音山角反吮音自兖反上不樂從容問曰天下誰最愛我者乎通曰宜莫若太子太子入問疾使太子齰癰師古曰齰齧也齧出其膿血齰音仕客反宋祁曰注文血字下疑有也字太子齰癰而色難之已而聞通嘗為上齰之太子慙繇是心恨通師古曰繇讀與由同其下類此及文帝崩景帝立鄧通免家居居無何人有告通盜出徼外鑄錢師古曰徼猶塞也東北謂之塞西南謂之徼塞者以障塞為名徼者取徼遮之義也徼音工釣反下吏驗問頗有遂師古曰遂成也成其罪狀劉攽曰遂字屬下句竟案盡沒入之通家尚負責數鉅萬張晏曰顧人採銅鑄錢未還庸直而㑹沒入故也師古曰此説非也積其前後所犯合没官者數多除其見在財物以外尚有負官數鉅萬故云吏輒隨没入之耳非負顧庸之私直長公主賜鄧通師古曰即館陶長公主文帝之女也吏輒隨沒入之一簪不得著身於是長公主乃令假衣食晉灼曰使假貸而私為償之也師古曰此説非也公主給其衣食也而號云假借之耳非通自有也恐吏没入故託云然此所謂不得名一錢宋祁曰注文公字上疑有長字給字上疑有且字食也也字當刪竟不得名一錢寄死人家趙談者以星氣幸北宫伯子長者愛人故親近然皆不比鄧通韓嫣字王孫弓髙侯穨當之孫也武帝為膠東王時嫣與上學書相愛及上為太子愈益親嫣嫣善騎射聰慧上即位欲事伐胡而嫣先習兵師古曰言舊自便習宋祁曰注文自字疑作已字注末當有也字以故益尊貴官至上大夫賞賜儗鄧通師古曰儗比也始時嫣常與上共臥起江都王入朝從上獵上林中天子車駕䟆道未行師古曰已稱䟆止行人訖而天子未出也先使嫣乗副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道旁師古曰辟去其從者而身獨伏謁也辟音闢嫣驅不見既過江都王怒為皇太后泣請得歸國師古曰還爵封於天子也入宿衞比韓嫣太后繇此銜嫣嫣侍出入永巷不禁師古曰言上恣其出入也以姦聞皇太后太后怒使使賜嫣死上為謝終不能得嫣遂死嫣弟説亦愛幸師古曰説讀曰悦以軍功封案道侯巫蠱時為戾太子所殺子增封龍雒侯師古曰雒字或作頟大司馬車騎將軍自有傳師古曰在韓信傳末李延年中山人身及父母兄弟皆故倡也師古曰樂人也延年坐法腐刑給事狗監中師古曰掌天子之狗於其中供事也女弟得幸於上號李夫人列外戚傳延年善歌為新變聲是時上方興天地諸祠宋氏校本云浙本無新字越本無諸字欲造樂令司馬相如等作詩頌延年輒承意弦歌所造詩為之新聲曲宋氏校本云景徳本承作丞又一本無新字而李夫人産昌邑王延年繇是貴為協律都尉佩二千石印綬而與上臥起其愛幸埓韓嫣師古曰埓等齊宋祁曰注末當有也字久之延年弟季與中人亂出入驕恣及李夫人卒後其愛弛師古曰弛解也音式爾反上遂誅延年兄弟宗族是後寵臣大氐外戚之家也師古曰氐歸也音丁禮反衛青霍去病皆愛幸然亦以功能自進石顯字君房濟南人𢎞恭沛人也皆少坐法腐刑為中黄門以選為中尚書宣帝時任中書官宋祁曰任中字下當有尚字恭明習法令故事善為請奏能稱其職恭為令顯為僕射元帝即位數年恭死顯代為中書令是時元帝被疾不親政事宋祁曰浙本無事字方隆好於音樂以顯久典事中人無外黨師古曰少骨肉之親無婚姻之家也精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能探得人主微指内深賊持詭辯以中傷人師古曰詭違也違道之辯宋祁曰注末當有也字忤恨睚眦輒被以危法師古曰被加也音皮義反初元中前將軍蕭望之及光祿大夫周堪宗正劉更生皆給事中望之領尚書事知顯專權邪辟師古曰辟讀曰闢建白以為尚書百官之本國家樞機師古曰立此議而白之宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人師古曰禮刑人不在君側故云應古元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用語在望之傳後大中大夫張猛魏郡太守京房御史中丞陳咸待詔賈捐之皆嘗奏封事或召見言顯短顯求索其辠房捐之棄市猛自殺於公車咸抵辠髠為城旦及鄭令蘇建得顯私書奏之後以它事論死自是公卿以下畏顯重足一迹師古曰言極恐懼不敢自寛縱顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位師古曰倚依也音於綺反民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪師古曰纍纍重積也若若長貌纍音力追反言其兼官據埶也顯見左將軍馮奉世父子為公卿著名女又為昭儀在内顯心欲附之薦言昭儀兄謁者逡師古曰逡音千旬反脩敕宜侍帷幄師古曰敕整也天子召見欲以為侍中逡請間言事上聞逡言顯顓權師古曰顓與專同其下類此天子大怒罷逡歸郎官劉攽曰郎宜作故其後御史大夫缺羣臣皆舉逡兄大鴻臚野王行能第一天子以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢師古曰度過也私後宫親以為三公上曰善吾不見是師古曰言不見此理廼下詔嘉美野王廢而不用語在野王傳顯内自知擅權事柄在掌握恐天子一旦納用左右耳目有以間已師古曰間音工莧反廼時歸誠取一言以為驗顯嘗使至諸官有所徵發顯先自白恐後漏盡宫門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有人上書告顯顓命矯詔開宫門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事師古曰過猶誤也屬委也屬音之欲反羣下無不嫉妬欲䧟害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬衆師古曰稱音尺孕反任天下之怨師古曰任猶當也臣願歸樞機職受後宫掃除之役死無所恨唯陛下哀憐財幸師古曰財與裁同以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜及賂遺訾一萬萬師古曰賂遺謂百官羣下所遺也訾讀與貲同初顯聞衆人匈匈言已殺前將軍蕭望之望之當世名儒顯恐天下學士姍已師古曰姍古訕字訕謗也音所諫反病之是時明經著節士瑯邪貢禹為諫大夫顯使人致意深自結納顯因薦禹天子歴位九卿至御史大夫禮事之甚備議者於是稱顯以為不妬譖望之矣顯之設變詐以自解免取信人主者皆此類也元帝晩節寢疾師古曰晩節猶言末時也定陶恭王愛幸顯擁祐太子頗有功元帝崩成帝初即位遷顯為長信中太僕秩中二千石顯失倚離權數月丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂滿不食道病死師古曰滿讀曰懣音悶諸所交結以顯為官皆廢罷少府五鹿充宗左遷𤣥莵太守御史中丞伊嘉為鴈門都尉長安謠曰伊徙鴈鹿徙莵去牢與陳實無賈師古曰賈讀曰價淳于長字子􅐐宋祁曰􅐐越本作鴻校本作孺魏郡元城人也少以太后姊子為黄門郎未進宋祁曰進字上當有得字幸會大將軍王鳯病長侍病晨夜扶丞左右甚有甥舅之恩鳯且終以長屬託太后及帝師古曰屬音之欲反帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衞尉九卿久之趙飛燕貴幸上欲立以為皇后太后以其所出微難之長主往來通語東宫師古曰主猶專歳餘趙皇后得立上甚徳之廼追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海内師古曰罷讀曰疲侍中衞尉長數白宜止徙家反故處師古曰陵置邑徙人以實之長奏令止所徙之家各還本處朕以長言下公卿議者皆合長計首建至䇿民以康寧師古曰康安也其賜長爵關内侯後遂封為定陵侯大見信用貴傾公卿外交諸侯牧守賂遺賞賜亦絫鉅萬師古曰絫古累字也其下亦同多畜妻妾淫於聲色不奉法度初許皇后坐執左道廢處長定宫而后姊孊為龍雒思侯夫人晉灼曰孊音靡寡居長與孊私通因取為小妻許后因孊賂遺長欲求復為倢伃長受許后金錢乘輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宫輒與孊書戲侮許后嫚易無不言師古曰嫚褻汙也易輕也易音弋豉反交通書記賂遺連年是時帝舅曲陽侯王根為大司馬票騎將軍輔政數嵗久病數乞骸骨長以外親居九卿位次第當代根根兄子新都侯王莽心害長寵私聞長取許孊受長定宫賂遺莽侍曲陽侯疾因言長見將軍久病意喜自以當代輔政至對衣冠議語署置師古曰自謂當輔政故豫言某人為某官某人主某事具言其辠過根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宫師古曰趣讀曰促莽求見太后具言長驕佚師古曰佚讀與逸同欲代曲陽侯對莽母上車師古曰莽母於長舅之妻也上車當於異處便於前上言不敬私與長定貴人姊通受取其衣物太后亦怒曰兒至如此往白之帝莽白上上廼免長官遣就國初長為侍中奉兩宫使親密師古曰言為使者傳言語於太后及帝若立趙飛燕之類紅陽侯立獨不得為大司馬輔政立自疑為長毁譖常怨毒長上知之及長當就國也立嗣子融從長請車騎師古曰嗣子謂嫡長子當為嗣者也長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲㑄長定宫師古曰㑄古侮字謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡師古曰若者其母名紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人莽遂代根為大司馬久之還長母及子酺於長安師古曰酺音蒲後酺有辠莽復殺之徙其家屬歸故郡始長以外親親近師古曰親近謂近幸於天子近音其靳反其愛幸不及富平侯張放放常與上臥起俱為微行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舎人哀帝立賢隨太子官為郎師古曰東宫官屬隨例遷也二歲餘賢傳漏在殿下師古曰𫝊漏奏時刻為人美麗自喜師古曰喜音許吏反哀帝望見説其儀貌師古曰説讀曰悦識而問之曰是舎人董賢邪因引上與語拜為黄門郎繇是始幸問及其父為雲中侯即日徵為霸陵令遷光祿大夫賢寵愛日甚為駙馬都尉侍中出則參乘入御左右旬月間賞賜絫鉅萬貴震朝廷常與上臥起嘗書寢偏藉上褏師古曰藉謂身臥其上也褏古袖字宋祁曰褏字上當有衣字上欲起賢未覺師古曰覺寐之寤也音工效反不欲動賢廼斷褏而起其恩愛至此賢亦性柔和便辟善為媚以自固每賜洗沐不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬師古曰廬謂殿中所宿止處也若吏妻子居官寺舎又召賢女弟以為昭儀位次皇后更名其舎為椒風以配椒房云師古曰皇后殿稱椒房欲配其名故云椒風昭儀及賢與妻旦夕上下並侍左右賞賜昭儀及賢妻亦各千萬數遷賢父為少府賜爵關内侯食邑復徙為衞尉又以賢妻父為將作大匠弟為執金吾詔將作大匠為賢起大第北闕下重殿洞門師古曰重殿謂有前後殿洞門謂門門相當也皆僭天子之制度者也木土之功窮極技巧柱檻衣以綈錦師古曰檻謂軒闌之板也綈厚繒也音徒奚反下至賢家僮僕皆受上賜及武庫禁兵上方珍寶其選物上第盡在董氏而乗輿所服廼其副也及至東園祕器珠襦玉柙豫以賜賢無不備具師古曰東園署名也漢舊儀云東園祕器作棺梓素木長二丈崇廣四尺珠襦以珠為襦如鎧狀連縫之以黄金為鏤要以下玉為柙至足亦縫以黄金為鏤宋祁曰柙字下當有皆字又令將作為賢起冢塋義陵旁内為便房剛柏題湊孟康曰堅剛之柏也師古曰題湊解在霍光傳外為徼道周垣數里門闕罘罳甚盛上欲侯賢而未有緣㑹待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛師古曰謁者后之名下有司治皆伏其辜上於是令躬寵為因賢告東平事者廼以其功下詔封賢為髙安侯躬宜陵侯寵方陽侯食邑各千户頃之復益封賢二千户丞相王嘉内疑東平事􅁈甚惡躬等數諫爭以賢為亂國制度嘉竟坐言事下獄死上初即位祖母傅太后母丁太后皆在兩家先貴傅太后從弟喜先為大司馬輔政數諫失太后指免官上舅丁明代為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上􅐛重賢欲極其位師古曰􅐛益也而恨明如此遂冊免明曰前東平王雲貪欲上位祠祭祝詛雲后舅伍宏以醫待詔與校祕書郎楊閎結謀反逆禍甚廹切賴宗廟神靈董賢等以聞咸伏其辜將軍從弟侍中奉車都尉呉族父左曹屯騎校尉宣皆知宏及栩丹諸侯王后親師古曰栩姓也音許羽反宋祁曰知字上當有中字而宣除用丹為御屬呉與宏交通厚善數稱薦宏宏以附呉得興其惡心因醫技進幾危社稷師古曰幾音鉅依反朕以恭皇后故不忍有云師古曰恭皇后謂丁后即哀帝母將軍位尊任重既不能明威立義折消未萌師古曰未萌謂禍難之未生者又不深疾雲宏之惡而懷非君上阿為宣呉師古曰以君上為非懷此心也反痛恨雲等揚言為羣下所寃又親見言伍宏善醫死可惜也師古曰見見天子也賢等獲封極幸嫉妬忠良非毁有功於戲傷哉師古曰於讀曰烏戲讀曰呼蓋君親無將將而誅之師古曰將謂將為逆亂也是以季友鴆叔牙春秋賢之趙盾不討賊謂之弑君師古曰季友魯桓公少子莊公母弟也叔牙亦桓公子莊公有疾叔牙欲立其同母兄慶父故季友使鍼季鴆之公羊傳曰季子殺兄何善爾誅不得避兄弟君臣之義也趙盾晉大夫趙宣子也靈公欲殺之宣子將出奔而趙穿攻靈公於桃園宣子未出境而復太史書曰趙盾弑其君宣子曰不然曰子為正卿亡不越境反不討賊非子而誰孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡朕閔將軍䧟於重刑故以書飭師古曰飭與勑同將軍遂非不改復與丞相嘉相比師古曰比謂比周也音頻寐反令嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未􅃘孟康曰易曰噬膚滅鼻噬食也膚膏也喻爵祿恩澤加之不􅃘誅也師古曰孟説非也易噬嗑卦九二爻辭曰噬膚㓕鼻噬膚者言自齧其肌膚詔曰為明是恭后之親有肌膚之愛是以不􅃘加法故引噬膚之言也其上票騎將軍印綬罷歸就第遂以賢代明為大司馬衞將軍冊曰朕承天序惟稽古建爾于公以為漢輔往悉爾心統辟元戎師古曰悉盡也統領也辟君也元戎大衆也言為元戎之主而統之也辟音必亦反折衝綏逺匡正庶事允執其中天下之衆受制於朕以將為命以兵為威可不慎與師古曰與讀曰歟是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父恭不宜在卿位徙為光祿大夫秩中二千石弟寛信代賢為駙馬都尉董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣師古曰右上也明年匈奴單于來朝宴見羣臣在前宋祁曰臣字下當有賢字單于怪賢年少以問譯師古曰傳語之人也上令譯報曰大司馬年少以大賢居位單于廼起拜賀漢得賢臣初丞相孔光為御史大夫時賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車廼却入賢至中門光入閤宋祁曰入字上當有又字既下車廼出拜謁送迎甚謹不敢以賔客鈞敵之禮賢歸上聞之喜立拜光兩兄子為諫大夫常侍賢繇是權與人主侔矣師古曰侔等也是時成帝外家王氏衰廢唯平阿侯譚子去疾哀帝為太子時為庶子得幸及即位為侍中騎都尉上以王氏亡在位者遂用舊恩親近去疾復進其弟閎為中常侍閎妻父蕭咸前將軍望之子也久為郡守劉攽曰多久字病免為中郎將兄弟並列賢父恭慕之欲與結㛰姻閎為賢弟駙馬都尉寛信求咸女為婦咸惶恐不敢當私謂閎曰董公為大司馬冊文言允執其中此廼堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪師古曰家人猶言庶人也蓋咸自謂閎性有知畧聞咸言心亦悟廼還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不説師古曰説讀曰悦後上置酒麒麟殿師古曰在未央宫賢父子親屬宴飲王閎兄弟侍中中常侍皆在側上有酒所師古曰言酒在體中從容視賢笑師古曰從音千容反宋祁曰賢字下當有而字曰吾欲法堯禪舜何如閎進曰天下廼髙皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上黙然不説師古曰説讀曰悦左右皆恐於是遣閎出後不得復侍宴賢第新成功堅師古曰言盡功力而作之極堅牢也功字或作攻攻治也言作治之甚堅牢其外大門無故自壞賢心惡之後數月哀帝崩太皇太后召大司馬賢引見東廂問以喪事調度賢内憂不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚宋祁曰首字下當有曰字太后遣使者召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得入出宫殿司馬中宋祁曰入出當作出入中字上當有門字賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下冊賢師古曰即就也曰間者以來陰陽不調菑害並臻師古曰菑古災字元元蒙辜師古曰䝉被也夫三公鼎足之輔也髙安侯賢未更事理師古曰更歴也音工衡反為大司馬不合衆心非所以折衝綏逺也其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬莽疑其詐死有司奏請發賢棺至獄􅐷視師古曰謂發冢取其棺柩也􅐷驗也音􅎮莽復風大司徒光奏賢師古曰風讀曰諷光孔光也質性巧佞翼姦以獲封侯師古曰翼進也父子專朝兄弟並寵多受賞賜治第宅造冢壙放效無極不異王制師古曰放依也音甫往反費以萬萬計國為空虛父子驕蹇至不為使者禮師古曰言不敬天子之使受賜不拜辠惡暴著賢自殺伏辜死後父恭不悔過乃復以沙畫棺師古曰以朱砂塗之而又雕畫也四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺師古曰以此物棺斂也棺音工喚反至尊無以加恭等幸得免於誅不宜在中土臣請收沒入財物縣官諸以賢為官者皆免父恭弟寛信與家屬徙合浦母别歸故郡鉅鹿長安中小民讙譁鄉其第哭幾𫉬盜之師古曰陽往哭之實欲竊盜也鄉讀曰嚮幾讀曰冀縣官斥賣董氏財凡四十三萬萬賢既見發臝􅐷其尸師古曰臝露形也音郎果反因埋獄中賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸葬之王莽聞之大怒以它辠擊殺詡翔子浮建武中貴顯至大司馬司空劉攽曰案後漢傳浮祗為大司空未嘗為司馬明多兩字封侯而王閎王莽時為牧守所居見紀莽敗乃去官世祖下詔曰武王克殷表商容之閭師古曰商容殷賢人閎脩善謹勑兵起吏民獨不爭其頭首今以閎子補吏至墨綬卒官蕭咸外孫云宋祁曰咸字下當有之字贊曰柔曼之傾意師古曰曼澤也言其質柔而色理光澤也非獨女徳蓋亦有男色焉觀籍閎鄧韓之徒非一而董賢之寵尤盛父子並為公卿可謂貴重人臣無二矣然進不繇道師古曰言本不以徳進繇讀與由同位過其任莫能有終所謂愛之適足以害之者也漢世衰於元成壞於哀平哀平之際國多釁矣師古曰釁謂間隙也主疾無嗣弄臣為輔鼎足不彊棟幹微撓師古曰撓弱也音女教反一朝帝崩姦臣擅命董賢縊死丁傅流放辜及母后奪位幽廢師古曰謂貶皇太后趙氏為孝成皇后退居北宫哀皇后傅氏退居桂宫咎在親便嬖所任非仁賢故仲尼著損者三友師古曰論語稱孔子曰損者三友友便辟友善柔友便佞損矣王者不私人以官殆為此也師古曰殆近也前漢書卷九十三前漢書卷九十三考證鄧通傳鄧猶登也按史記無此四字人有告通盜出徼外鑄錢注師古曰東北謂之塞西南謂之徼胡三省曰匈奴傳侯應上議曰孝武攘匈奴于幕北建塞徼起亭隧是北方之塞亦曰徼也朝鮮傳曰朝鮮屬遼東外徼是東方之塞亦曰徼也師古殆未深考歟直言徼以要遮為義豈不簡而明乎前漢書卷九十三考證
