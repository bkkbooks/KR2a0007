body:
  text: 前漢書卷七十一漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注雋疏于薛平彭傳第四十一雋不疑字曼倩勃海人也師古曰雋音字兗反又辭兗反宋祁曰昭紀中師古亦兩音景本只音徂兗反治春秋為郡文學進退必以禮宋祁曰邵本無必字名聞州郡武帝末郡國盜賊羣起暴勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國師古曰督謂察視之東至海以軍興誅不從命者師古曰有所追捕及行誅罰皆依興軍之制威振州郡勝之素聞不疑賢至勃海遣吏請與相見不疑冠進賢冠帶櫑具劒應劭曰櫑具木標首之劒櫑落壯大也晉灼曰古長劒首以玉作井鹿盧形上刻木作山形如似蓮花初生未敷時今大劒木首其狀似此師古曰晉説是也櫑音磊標音匹遥反宋祁曰注文浙本有似字疑其意重複當刪去似字佩環玦師古曰環玉環也玦卽玉佩之玦也帶環而又著玉佩也禮記曰孔子佩象環也襃衣博帶師古曰襃大裾也言着襃大之衣廣博之帶也而説者乃以為朝服埀襃之衣非也盛服至門上謁師古曰上謁若今通名也門下欲使解劒不疑曰劒者君子武備所以衞身不可解請退吏白勝之勝之開閤延請望見不疑容貌尊嚴衣冠甚偉勝之躧履起迎文穎曰躧音纚師古曰履不著跟曰躧躧謂納履未正曵之而行言其遽也躧音山爾反登堂坐定不疑據地曰竊伏海瀕聞暴公子威名舊矣師古曰瀕涯也公子勝之字也舊久也瀕音頻又音賔今乃承顔接辭凡為吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天祿師古曰樹立也宋祁曰南本浙本作乃今字勝之知不疑非庸人師古曰庸常也敬納其戒深接以禮意問當世所施行宋祁曰意南本作適門下諸從事皆州郡選吏師古曰選州郡吏之最者乃得為從事側聽不疑莫不驚駭至昏夜罷去勝之遂表薦不疑徵詣公車拜為青州刺史久之武帝崩昭帝即位而齊孝王孫劉澤交結郡國豪桀謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬京師吏民敬其威信每行縣錄囚徒還師古曰省錄之知其情狀有寃滯與不也今云慮囚本錄聲之去者耳音力具反而近俗不曉其意訛其文遂為思慮之慮失其源矣行音下更反其母輒問不疑有所平反活幾何人如淳曰反音幡幡奏使從輕也師古曰幾音居起反即不疑多有所平反母喜笑為飲食語言異於他時或亡所出母怒為之不食宋祁曰南本不食字上有之字故不疑為吏嚴而不殘始元五年有一男子乘黄犢車建黄旐師古曰旐旌旗之屬畫龜蛇曰旐衣黄襜褕著黄冐師古曰襜褕直裾襌衣襜音昌瞻反褕音踰冐所以覆冐其首即今之下裾冐也詣北闕自謂衞太子師古曰戾太子公車以聞師古曰公車主受章奏者詔使公卿將軍中二千石雜識視師古曰雜共也有素識之者令視知其是非也長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之師古曰安猶徐也不疑曰諸君何患於衞太子昔蒯聵違命出奔輙距而不納春秋是之師古曰蒯聵衞靈公太子輙蒯聵子也蒯聵得罪於靈公而出奔晉及靈公卒使輙嗣位而晉趙鞅納蒯聵於戚欲求入衞魯哀公三年春齊國夏衞石曼姑帥師圍戚公羊傳曰曼姑受命於靈公而立輙曼姑之義固可以距蒯聵也輙之義可以立乎曰可奈何不以父命辭王父命也宋祁曰注文奈字上浙本有其字衞太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼繇是名聲重於朝廷師古曰繇讀與由同在位者皆自以不及也大將軍光欲以女妻之不疑固辭不肯當久之以病免終於家京師紀之後趙廣漢為京兆尹言我禁姦止邪行於吏民至於朝廷事不及不疑遠甚廷尉驗治何人竟得姦詐師古曰凡不知姓名及所從來者皆曰何人也他皆類此本夏陽人姓成名方遂居湖師古曰湖縣名以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衞太子方遂心利其言幾得以富貴師古曰幾讀曰冀即詐自稱詣闕廷尉逮召郷里識知者張宗祿等方遂坐誣罔不道要斬東市一姓張名延年師古曰故昭紀謂之張延年疏廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自遠方至徴為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭師古曰敏謂所見㨗利宣帝幸太子宫受迎謁應對及置酒宴奉觴上壽辭禮閑雅上甚讙説師古曰説讀曰悦頃之拜受為少傅太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家視陋非所以廣太子德於天下也師古曰視讀曰示言獨親外家示天下以淺陋上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣繇是見器重數受賞賜師古曰繇讀與由同太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也師古曰此皆老子之言廣引之殆危也遂成也今仕官至二千石宋祁曰官字謝本作宦字宦成名立如此不去懼有後悔豈如父子相隨出關歸老故郷以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病師古曰移病謂移書言病也一曰以病而移居滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外蘇林曰長安東郭門也師古曰祖道餞行也解在景十三王及劉屈􅈊傳供音居共反張音竹亮反送者車數百兩辭决而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸郷里日令家共具設酒食師古曰日日設之也共讀曰供其他類此宋祁曰日字下疑更有日字請族人故舊賔客與相娛樂數問其家金餘尚有幾所趣賣以共具師古曰幾所猶言幾許也趣讀曰促居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立産業基阯師古曰幾讀曰冀今日飲食費且盡宜從丈人所勸説君買田宅鄧展曰宜令意自從丈人所出無泄我言也師古曰丈人嚴莊之稱也故親而老者皆稱焉老人即以閒暇時為廣言此計師古曰閒即閑字也廣曰吾豈老誖不念子孫哉師古曰誖惑也音布内反顧自有舊田廬師古曰顧思念也令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也宋祁曰衆字下疑有人字吾既亡以教化子孫不欲益其過而生怨宋祁曰南本浙本生字下有其字又此金者聖主所以惠養老臣也故樂與郷黨宗族共饗其賜以盡吾餘日不亦可乎於是族人説服師古曰説讀曰悦皆以壽終于定國字曼倩東海郯人也師古曰郯音談其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨師古曰羅罹也遭也郡中為之生立祠號曰于公祠東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦宋祁曰南本浙本作事養我勤苦又一本作養我哀其亡子守寡我老久絫丁壯奈何師古曰絫古累字也音力瑞反其後姑自經死師古曰不欲累婦故自殺宋祁曰景德本作經死他本作縊死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府師古曰府郡之曹府也上音時掌反于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公爭之弗能得乃抱其具獄哭於府上師古曰具獄者獄案已成其文備具也因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎黨在是乎師古曰黨音他朗反宋祁曰前太守南本作故浙本作前於是殺牛自祭孝婦冡因表其墓天立大雨歲熟郡中以此大敬重于公定國少學法於父父死後定國亦為獄史郡決曹補廷尉史以選與御史中丞從事宋祁曰與南本作為浙本作與治反者獄以材髙舉侍御史遷御史中丞會昭帝崩昌邑王徴即位行滛亂定國上書諫後王廢宣帝立宋祁曰宣帝立浙本作宣帝即位大將軍光領尚書事條奏羣臣諫昌邑王者皆超遷定國繇是為光祿大夫師古曰繇讀與由同平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒歩徃過定國皆與鈞禮師古曰鈞禮猶言亢禮恩敬甚備學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之為廷尉天下無寃民師古曰言決罪皆當于定國為廷尉民自以不寃師古曰言知其寛平皆無寃枉之慮定國食酒至數石不亂如淳曰食酒猶言喜酒也師古曰若依如氏之説食字當音嗜此説非也下叙定國子永乃言嗜酒耳食酒者謂能多飲費盡其酒猶云食言焉今流俗書本輒改食字作飲字失其眞也冬月治請讞飲酒益精明師古曰讞平議也音魚列反劉攽曰予謂論語云沽酒市脯不食然則酒自可云食也然此下則云飲酒益精明共説一事爾兩字不同疑當作飲為眞為廷尉十八歲遷御史大夫甘露中代黄霸為丞相封西平侯三年宣帝崩元帝立以定國任職舊臣敬重之時陳萬年為御史大夫與定國並位八年論議無所拂師古曰言不相違戾也拂音佛後貢禹代為御史大夫數處駮議師古曰言與定國不同定國明習政事率常丞相議可師古曰天子皆可定國所言然上始即位關東連年被災害民流入關言事者歸咎於大臣師古曰言事者謂上書陳事也上於是數以朝日引見丞相御史師古曰五日一聽朝故云朝日也入受詔條責以職事曰惡吏負賊妄意良民師古曰賊發不得恐負其殿故妄疑善人致其罪也至亡辜死或盜賊發吏不亟追而反繫亡家師古曰亟急也不急追賊反禁繫失物之家後不敢復告以故寖廣師古曰寖漸也民多寃結州郡不理連上書者宋祁曰連字南本浙本並作遠交於闕廷二千石選舉不實是以在位多不任職師古曰謂令長丞尉民田有災害吏不肯除收趣其租以故重困師古曰趣讀曰促重音直用反關東流民飢寒疾疫已詔吏轉漕虛倉廩開府臧相振救賜寒者衣至春猶恐不贍師古曰贍足也今丞相御史將欲何施以塞此咎師古曰塞補也悉意條狀陳朕過失師古曰悉盡也定國上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰郎有從東方來者言民父子相棄師古曰以遭饑饉不能相養丞相御史案事之吏匿不言邪將從東方來者加增之也何以錯繆至是師古曰錯互也繆違也謂吏及東方人言不相同也欲知其實方今年歲未可預知也即有水旱其憂不細公卿有可以防其未然救其已然者不各以誠對師古曰言能防救與不宜各以實對毋有所諱定國惶恐上書自劾歸侯印乞骸骨上報曰君相朕躬不敢怠息師古曰息謂自休息萬方之事大錄于君師古曰大錄總錄也能毋過者其唯聖人方今承周秦之敝俗化陵夷師古曰言穨替也民寡禮􅁩隂陽不調災咎之發不為一端而作自聖人推類以記不敢專也況於非聖者乎師古曰非聖者謂常人日夜惟思所以未能盡明師古曰所以所由也言何由致此災經曰萬方有罪罪在朕躬師古曰此論語堯曰篇載殷湯伐桀告天之辭君雖任職何必顓焉師古曰顓與專同事不專由君也其勉察郡國守相羣牧非其人者毋令乆賊民永執綱紀務悉聰明強食愼疾師古曰悉盡也定國遂稱篤固辭上廼賜安車駟馬黄金六十斤罷就第數歲七十餘薨諡曰安侯子永嗣少時耆酒多過失師古曰耆讀曰嗜年且三十乃折節修行以父任為侍中中郎將長水校尉定國死居䘮如禮孝行聞宋祁曰南本孝字上有以字由是以列侯為散騎光祿勲至御史大夫尚館陶公主施施者宣帝長女成帝姑也賢有行永以選尚焉上方欲相之會永薨子恬嗣恬不肖薄於行始定國父于公其閭門壞父老方共治之師古曰閭門里門也于公謂曰少高大門閭令容駟馬高蓋車我治獄多陰德未嘗有所寃子孫必有興者至定國為丞相永為御史大夫封侯傳世云薛廣德字長卿沛郡相人也以魯詩教授楚國龔勝舍師事焉蕭望之為御史大夫除廣德為屬數與論議器之師古曰以為夫器也薦廣德經行宜充本朝師古曰經明行修宜於本朝任職也為博士論石渠張晏曰石渠閣名也遷諫大夫代貢禹為長信少府御史大夫廣德為人温雅有醖藉服䖍曰寛博有餘也師古曰醖言如醖釀也藉有所薦藉也醖音於問反藉才夜反及為三公直言諫爭始拜旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衞之樂師古曰撞音丈江反臣誠悼之今士卒暴露從官勞倦願陛下亟反宮師古曰亟急也思與百姓同憂樂天下幸甚上即日還其秋上酎祭宗廟出便門師古曰長安城南面西頭第一門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汗車輪陛下不得入廟矣師古曰言不以禮終不得立廟也一曰以見死傷犯於齊絜不得入廟祠也劉攽曰一説是也時上方入廟陽夏公曰以杜牧論諫書考之當作陛下不廟矣若本有得入二字小顔不應費辭如此上不説師古曰説讀曰悦先敺光祿大夫張猛進曰師古曰先敺導乘輿也敺與驅同猛張騫之孫臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪師古曰謂諫爭之言當如猛之詳善也乃從橋後月餘以歲惡民流師古曰歲惡年穀不熟也與丞相定國大司馬車騎將軍史髙俱乞骸骨皆賜安車駟馬黄金六十斤罷廣德為御史大夫凡十月免東歸沛太守迎之界上沛以為榮縣其安車傳子孫師古曰縣其所賜安車以示榮幸也致仕縣車蓋亦古法韋孟詩云縣車之義以洎小臣也劉攽曰致仕縣車言休息不出也故韋孟云薛廣德自縣其安車也平當字子思祖父以訾百萬自下邑徙平陵師古曰下邑梁國之縣也當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令師古曰栒音詢以明經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失師古曰傅讀曰附文雅雖不能及蕭望之匡衡然指意畧同自元帝時韋𤣥成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世而後仁師古曰論語載孔子之言也言治天下者三十年然後仁道成著也三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與師古曰與讀曰歟何德化休徴不應之久也旤福不虛必有因而至者焉宜深迹其道而務修其本師古曰迹謂求其踪迹也昔者帝堯南面而治先克明俊德以親九族而化及萬國師古曰虞書堯典叙堯之德曰克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦故云然也孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也師古曰言嚴謂尊嚴夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天師古曰言文王始受命宜為周之始祖乃追王太王王季以及后稷是不以卑臨尊此聖人之德亡以加於孝也髙皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮師古曰今文泰誓之辭言能正考古道以立功立事則可長年享國上納其言下詔復太上皇寢廟園頃之使行流民幽州師古曰行音下更反舉奏刺史二千石勞倈有意者師古曰勞倈謂勸勉也勞者恤其勤勞也倈者以恩招倈也勞音盧到反倈音盧代反言勃海鹽池可且勿禁以救民急師古曰恣民煑鹽官不專也所過見稱舉奉使者十一人為最宋祁曰奉字景德本作奏刋誤謂當削舉改奏作奉直云所過見稱奉使者十一人為最今景祐本越本無舉字遷丞相司直坐法左遷朔方刺史師古曰武帝初置朔方郡别令刺史監之不在十三州之限復徴入為太中大夫給事中絫遷長信少府大鴻臚光祿勲師古曰絫古累字先是太后姊子衞尉淳于長白言昌陵不可成下有司議當以為作治連年可遂就師古曰就亦成也上既罷昌陵以長首建忠策復下公卿議封長當又以為長雖有善言不應封爵之科坐前議不正左遷鉅鹿太守師古曰前議謂罷昌陵後上遂封長當以經明禹貢使行河師古曰尚書禹貢載禹治水次第山川髙下當明此經故使行河也行音下更反為騎都尉領河隄哀帝即位徴當為光祿大夫諸吏散騎復為光祿勲御史大夫至丞相以冬月賜爵關内侯明年春上使使者召欲封當如淳曰漢儀注御史大夫為丞相更春乃封故先賜爵關内侯也李竒曰以冬月非封侯時故且先賜爵關内侯也師古曰李説是也當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上報曰朕選於衆以君為相視事日寡輔政未久陰陽不調冬無大雪旱氣為災朕之不德何必君罪君何疑而上書乞骸骨歸關内侯爵邑使尚書令譚賜君養牛一上尊酒十石如淳曰律稻米一斗得酒一斗為上尊稷米一斗得酒一斗為中尊粟米一斗得酒一斗為下尊師古曰稷即粟也中尊者宜為黍米不當言稷且作酒自有澆醇之異為上中下耳非必繫之米君其勉致醫藥以自持後月餘卒子晏以明經歴位大司徒封防郷侯漢興唯韋平父子至宰相師古曰韋謂韋賢也彭宣字子佩淮陽陽夏人也師古曰夏音假治易事張禹舉為博士遷東平太傅宋祁曰太傅淳化本作太守刋誤據史舘本作傅禹以帝師見尊信薦宣經明有威重可任政事繇是入為右扶風師古曰繇讀與由同遷廷尉以王國人出為太原太守李竒曰初漢制王國人不得在京師數年復入為大司農光祿勲右將軍哀帝即位徙為左將軍歲餘上欲令丁傅處爪牙官廼策宣曰有司數奏言諸侯國人不得宿衛將軍不宜典兵馬處大位朕唯將軍任漢將之重而子又前取淮陽王女婚姻不絶非國之制使光祿大夫曼賜將軍黄金五十斤安車駟馬其上左將軍印綬以關内侯歸家宣罷數歲諫大夫鮑宣數薦宣會元壽元年正月朔日蝕鮑宣復言上廼召宣為光祿大夫遷御史大夫轉為大司空封長平侯會哀帝崩新都侯王莽為大司馬秉政專權宣上書言三公鼎足承君一足不任則覆亂美實師古曰美實謂鼎中之實也易鼎卦九四爻辭曰鼎折足覆公餗餗食也故宣引以為言覆音芳目反臣資性淺薄年齒老眊師古曰眊與耄同數伏疾病昏亂遺忘願上大司空長平侯印綬乞骸骨歸郷里竢寘溝壑師古曰竢古俟字莽白太后策宣曰惟君視事日寡功德未效廹於老眊昏亂非所以輔國家綏海内也使光祿勲豐册詔君其上大司空印綬便就國莽恨宣求退故不賜黄金安車駟馬宣居國數年薨諡曰頃侯傳子至孫王莽敗廼絶贊曰雋不疑學以從政臨事不惑遂立名迹終始可述疏廣行止足之計免辱殆之絫師古曰絫音力瑞反亦其次也于定國父子哀鰥哲獄為任職臣應劭曰哲智也鄭氏曰當言折獄師古曰哀鰥哀恤鰥寡也哲獄知獄情也劉奉世曰詩何草不黄云何人不矜則鰥字也然則古文鰥矜音字蓋通用班氏特用古字此乃哀矜折獄爾如顔説則哀鰥哲獄皆不成辭于丞相傳又云務在哀鰥寡此亦後人不曉矜字妄增之爾凡決疑平法豈獨鰥寡乃哀之哉甫刑之言鰥寡洪範之言㷀獨意義自不同也薛廣德保縣車之榮平當逡遁有恥師古曰遁讀與巡同彭宣見險而止異乎茍患失之者矣師古曰論語稱孔子曰鄙夫不可與事君其未得之患得之既得之患失之茍患失之無所不至矣謂其患于失位而為傾邪也贊言當宣二人立操有異于此矣前漢書卷七十一前漢書卷七十一考證雋不疑傳暴勝之為直指使者臣召南按此天漢二年事也勝之河東人以光祿大夫出為直指使者至太始三年為御史大夫于定國傳為廷尉十八歲臣召南按定國以地節元年為廷尉至甘露三年遷御史大夫公卿表作為廷尉十七年遷葢從為廷尉之次年實數故與傳不同也萬方之事大錄於君顧炎武曰今所傳王肅注舜典納于大􅅢云􅅢錄也納舜使大錄萬機之政葢西京時有此解故詔書用之薛廣德傳沛郡相人也唐書宰相世系表曰薛公獻䇿滅黥布封千戸侯生瑑瑑生茂宣茂宣生懷則懷則生引孫引孫生廣德平當傳書曰正稽古建功立事可以永年傳於亡窮注師古曰今文泰誓之辭臣召南按此文西京所行偽泰誓辭也郊祀志亦引此文云正稽古立功立事可以永年丕天之大律然則傳於亡窮四字當所自撰以結引書之意也漢興惟韋平父子至宰相臣召南按此但言由布衣以文學升庸者耳不然絳侯條侯輔佐文景非父子宰相耶贊于定國父子哀鰥哲獄注師古云云顧炎武曰毛詩禮記鰥寡之鰥皆作矜此亦矜之誤哲則折之誤也師古注非前漢書卷七十一考證
