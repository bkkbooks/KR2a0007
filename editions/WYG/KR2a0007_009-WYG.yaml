body:
  text: 前漢書卷九漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注元帝紀第九孝元皇帝荀恱曰諱奭之字曰盛應劭曰諡法行義恱民曰元師古曰奭音式亦反宣帝太子也母曰共哀許皇后張晏曰禮婦人從夫諡閔其見殺故兼二諡師古曰共讀曰㳟宣帝微時生民間年二嵗宣帝即位八嵗立為太子師古曰宣帝即位之明年改元曰本始本始凡四年而改元曰地節地節三年立皇太子若初即位年二嵗則立為太子時年九嵗矣又宣帝以元平元年七月即位而外戚傳云許后生元帝數月宣帝立為帝是則即位時太子未必二嵗也參校前後衆文此紀進退為錯劉攽曰此言年二嵗宣帝即位指論踰年改元為即位耳若春秋諸公也壯大柔仁好儒見宣帝所用多文法吏以刑名䋲下晉灼曰刑刑家名名家也太史公曰法家嚴而少㤙名家儉而善失真師古曰晉說非也劉向别録云申子學號刑名刑名者以名責實尊君卑臣崇上抑下宣帝好觀其君臣篇䋲謂彈治之耳大臣楊惲蓋寛饒等坐刺譏辭語為罪而誅師古曰惲音於吻反嘗侍燕從容言師古曰從音千容反陛下持刑太深宜用儒生宣帝作色曰師古曰作動也意怒故動色漢家自有制度本以覇王道雜之奈何純任徳教用周政乎師古曰姬周之政且俗儒不達時宜好是古非今使人眩於名實師古曰眩亂視也音胡眄反不知所守何足委任廼歎曰亂我家者太子也繇是疏太子而愛淮陽王師古曰繇讀與由同曰淮陽王明察好法宜為吾子而王母張偼伃尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉黄龍元年十二月宣帝崩癸巳太子即皇帝位謁髙廟尊皇太后曰太皇太后蘇林曰上官后皇后曰皇太后文穎曰卭成王皇后母養元帝者也初元元年春正月辛丑孝宣皇帝葬杜陵臣瓉曰自崩至葬凡二十八日杜陵在長安南五十里也賜諸侯王公主列侯黄金宋祁曰古本無黄字吏二千石以下錢帛各有差大赦天下三月封皇太后兄侍中中郎將王舜為安平侯丙午立皇后王氏以三輔太常郡國公田及苑可省者振業貧民師古曰振起之令有作業貲不滿千錢者賦貸種食師古曰賦給與之也貸假也貸音土載反種音之勇反封外祖父平㤙戴侯同産弟子中常侍許嘉為平㤙侯奉戴侯後文頴曰戴侯許廣漢夏四月詔曰朕承先帝之聖緒獲奉宗廟戰戰兢兢宋祁曰唐本作栗栗間者地數動而未静懼於天地之戒不知所繇師古曰繇與由同方田作時朕憂蒸庶之失業師古曰蒸衆也臨遣光祿大夫襃等十二人應劭曰自臨面約𠡠乃遣之循行天下師古曰行音下更反存問􅂄老鰥寡孤獨困乏失職之民師古曰失職失其常業延登賢俊招顯側陋因覽風俗之化相守二千石誠能正躬勞力師古曰相者諸侯王相也守郡守也宣明教化以親萬姓則六合之内和親庶幾虖無憂矣書不云乎股肱良哉庶事康哉師古曰虞書益稷之辭也言君能任賢股肱之臣皆得良善則衆事安寕布告天下使明知朕意又曰闗東今年榖不登民多困乏其令郡國被災害甚者毋出租賦江海陂湖園池屬少府者以假貧民師古曰湖深水勿租賦賜宗室有屬籍者馬一匹至二駟師古曰二駟八匹三老孝者帛五匹弟者力田三匹鰥寡孤獨二匹吏民五十戸牛酒師古曰以五十戸為率共賜之六月以民疾疫令大官損膳減樂府員省苑馬以振困乏秋八月上郡屬國降胡萬餘人亡入匈奴九月關東郡國十一大水饑或人相食轉旁郡錢榖以相救詔曰間者隂陽不調黎民饑寒無以保治師古曰保安也惟徳淺薄不足以充入舊貫之居應劭曰言已徳淺薄不足以充舊貫舊貫者常居也師古曰論語稱閔子騫云仍舊貫帝自謙不足充入先帝之宫室故引以為言其令諸宫館希御幸者勿繕治師古曰繕補也太僕減榖食馬水衡省肉食獸師古曰減謂損其數省者全去之二年春正月行幸甘泉郊泰畤賜雲陽民爵一級女子百戸牛酒立弟竟為清河王三月立廣陵厲王太子覇為王詔罷黄門乗輿狗馬師古曰黄門近署也故親幸之物屬焉水衡禁囿宜春下苑孟康曰宫名也在杜縣東晋灼曰史記云𦵏二世杜南宜春苑中師古曰宜春下苑即今京城東南隅曲江池是少府佽飛外池如淳曰漢儀注佽飛具矰繳以射鳬鴈給祭祀是故有池也嚴籞池田蘇林曰嚴飾池上之屋及其地也晋灼曰嚴籞射苑也許慎曰嚴弋射者所蔽也池田苑中田也師古曰晋說是假與貧民詔曰蓋聞賢聖在位隂陽和風雨時日月光星辰静黎庶康寧考終厥命師古曰考老也言得夀考終其天命今朕恭承天地託于公侯之上明不能燭徳不能綏災異竝臻連年不息乃二月戊午地震于隴西郡毁落太上皇廟殿壁木飾壊敗豲道縣城郭官寺及民室屋壓殺人衆師古曰豲道屬天水凡府庭所在皆謂之寺豲音完壓音烏狎反山崩地裂水泉涌出天惟降災震驚朕師師古曰師衆也治有大虧咎至於斯夙夜兢兢不通大變深惟鬱悼未知其序師古曰鬱不通之意也序次也間者嵗數不登元元困乏不勝饑寒以䧟刑辟朕甚閔之郡國被地動災甚者無出租賦赦天下有可蠲除減省以便萬姓者條奏毋有所諱丞相御史中二千石舉茂材異等直言極諫之士朕將親覽焉夏四月丁巳立皇太子賜御史大夫爵闗内侯中二千石右庶長師古曰第十一爵天下當為父後者爵一級列侯錢各二十萬五大夫十萬師古曰五大夫第九爵六月闗東饑齊地人相食秋七月詔曰嵗比災害民有菜色師古曰五榖不收人但食菜故其顔色變惡慘怛於心師古曰慘痛也怛悼也已詔吏虛倉廪開府庫振救賜寒者衣今秋禾麥頗傷一年中地再動北海水溢流殺人民隂陽不和其咎安在公卿將何以憂之其悉意陳朕過靡有所諱師古曰悉意盡意也靡無也冬詔曰國之將興尊師而重傅故前將軍望之傅朕八年道以經書厥功茂焉師古曰茂美也道讀曰𨗳其賜爵關内侯食邑八百戸朝朔望十二月中書令𢎞恭石顯等譛望之令自殺三年春令諸侯相位在郡守下師古曰此諸侯謂諸侯王也珠厓郡山南縣反博謀羣臣待詔賈捐之以為宜棄珠厓救民饑饉師古曰穀不熟為饑蔬不熟為饉蔬菜也乃罷珠厓夏四月乙未晦茂陵白鶴館災詔曰廼者火災降於孝武園館朕戰栗恐懼不燭變異咎在朕躬師古曰燭照也羣司又未肯極言朕過以至於斯將何以寤焉百姓仍遭凶阸無以相振師古曰仍頻也加以煩擾虖苛吏拘牽乎微文不得永終性命師古曰永長也朕甚閔焉其赦天下夏旱立長沙煬王弟宗為王鄭氏曰煬音供養之養封故海昬侯賀子代宗為侯六月詔曰盖聞安民之道本繇隂陽師古曰繇與由同間者隂陽錯謬風雨不時朕之不徳庶幾羣公有敢言朕之過者今則不然媮合茍從未肯極言師古曰與偷同媮朕甚閔焉永惟蒸庶之饑寒宋祁曰一本無永字逺離父母妻子勞於非業之作衛於不居之宫師古曰不急之事故云非業也恐非所以佐隂陽之道也其罷甘泉建章宫衛令就農宋祁曰唐本監本衛字下有各字百官各省費師古曰費用之物務減省條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明隂陽災異者各三人於是言事者衆或進擢召見人人自以得上意師古曰人人各自以當天子之意宋祁曰人人南本只一个人字四年春正月行幸甘泉郊泰畤三月行幸河東祠后土赦汾隂徒賜民爵一級女子百戸牛酒鰥寡髙年帛行所過無出租賦五年春正月以周子南君為周承休侯文頴曰姓姬名延年其祖父姬嘉夲周後武帝元鼎四年封為周子南君令奉周祀師古曰承休國在潁川位次諸侯王三月行幸雍祠五畤夏四月有星孛于參詔曰朕之不逮序位不明師古曰逮及也言官人之位失其次序衆僚乆懬應劭曰懬音曠師古曰懬古曠字曠空也不得其人則職事空廢未得其人元元失望上感皇天隂陽為變咎流萬民朕甚懼之廼者闗東連遭災害饑寒疾疫夭不終命宋祁曰刋誤改天作夭詩不云乎凡民有喪匍匐救之師古曰邶國谷風之詩也言見人有䘮禍之事則當盡力以救之匍音步扶反匐音步得反其令大官毋日殺師古曰不得日日宰殺所具各減半師古曰食具也乗輿秣馬無乏正事而已師古曰秣養也以粟秣食之也正事謂駕供郊祀蒐狩之事非㳺田者也秣音末罷角抵上林宫館希御幸者齊三服官李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三如淳曰地理志曰齊冠帯天下胡公曰服官主作文繡以給衮龍之服地理志云㐮邑亦有服官師古曰齊三服官李說是也縰與纚同音山爾反即今之方目􅀢也紈素今之絹也輕􅀢也㐮邑自出文繡非綃今之三服也北假田官李斐曰主假賃見官田與民收其假税也故置田農之官晋灼曰匈奴傳秦始皇渡河據陽山北假中王莽傳五原北假膏壤殖榖北假地名師古曰晋説是也宋祁曰田官一夲作官田非鹽鐡官常平倉博士弟子毋置員以廣學者賜宗室子有屬籍者馬一匹至二駟三老孝者帛人五匹弟者力田三匹鰥寡孤獨二匹吏民五十戸牛酒省刑罰七十餘事除光禄大夫以下至郎中保父母同産之令應劭曰舊時相保一人有過皆當坐之師古曰特為郎中以上除此令者所以優之也同産謂兄弟也令從官給事宫司馬中者得為大父母父母兄弟通籍應劭曰從官謂宦者及虎賁羽林太醫太官是也司馬中者宫内門也司馬主武兵禁之意也籍者為二尺竹牒記其年紀名字物色縣之宫門案省相應乃得入也師古曰應説非也從官親近天子常侍從者皆是也故此下云科第郎從官司馬門者宫之外門也衛尉有八屯衞候司馬主衞士徼廵宿衛每面各二司馬故謂宫之外門為司馬門冬十二月丁未御史大夫貢禹卒衞司馬谷吉使匈奴不還師古曰即衞尉八屯之衞司馬永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百戸牛酒高年帛行所過毋出租賦宋祁曰舊夲作毋令出租賦二月詔丞相御史舉質樸敦厚遜譲有行者光禄嵗以此科第郎從官師古曰始令丞相御史舉此四科人以擢用之而見在郎及從官又令光禄每嵗依此科考校定其第髙下用知其人賢否也三月詔曰五帝三王任賢使能以登至平而今不治者豈斯民異哉師古曰言今所治人即五帝三王之衆庶咎在朕之不明亡以知賢也是故壬人在位服䖍曰壬人佞人也而吉士雍蔽師古曰吉善也大雅卷阿之詩曰藹藹王多吉士雍讀曰壅重以周秦之敝民漸薄俗師古曰為薄俗所漸染也重音直用反去禮義觸刑法豈不哀哉繇此觀之元元何辜師古曰繇讀與由同其赦天下令厲精自新各務農畝無田者皆假之貸種食如貧民師古曰此皆謂遇赦新免罪者也故云如貧民賜吏六百石以上爵五大夫勤事吏二級為父後者民一級宋祁曰越夲無為父後者四字女子百戸牛酒鰥寡孤獨高年帛是月雨雪師古曰雨音于具反隕霜傷麥稼秋罷如淳曰當言罷某官某事爛脱失之晋灼曰或無稼字或稼字在秋下稼或作桑或作霖五行志永光元年三月隕霜殺桑九月二日隕霜殺稼天下大饑言傷麥稼秋罷是也師古曰晋説得之秋者謂秋時所収榖稼也今俗猶謂麥豆之屬為雜稼云秋罷者言至秋時無所收也劉攽曰如言爛脱是二年春二月詔曰蓋聞唐虞象刑而民不犯師古曰象刑觧在武紀殷周法行而姦軌服師古曰軌與宄同亂在外曰姦在内曰軌宋祁曰法行唐夲作行法今朕獲承高祖之洪業宋祁曰一本無洪字託位公侯之上夙夜戰栗永惟百姓之急未嘗有忘焉然而隂陽未調三光晻昩師古曰晻與暗同又音烏感反元元大困流散道路盗賊竝興有司又長殘賊失牧民之術是皆朕之不明政有所虧咎至於此朕甚自耻為民父母若是之薄謂百姓何師古曰言何以撫臨百姓其大赦天下賜民爵一級女子百戸牛酒鰥寡孤獨高年三老孝弟力田帛又賜諸侯王公主列侯黄金中二千石以下至中都官長吏各有差吏六百石以上爵五大夫勤事吏各二級三月壬戌朔日有蝕之詔曰朕戰戰栗栗夙夜思過失不敢荒寧師古曰荒廢也不敢廢事而自寧惟隂陽不調未燭其咎婁敕公卿日望有效師古曰婁古屢字其後亦同至今有司執政未得其中師古曰中音竹仲反施與禁切未合民心師古曰施惠褊薄禁令煩苛暴猛之俗彌長和睦之道日衰百姓愁苦靡所錯躬師古曰錯置也音千故反是以氛邪嵗增侵犯太陽師古曰氛惡氣也邪者言非正氣也太陽日也正氣湛掩日乆奪光師古曰湛讀與沈同湛掩者見掩而湛沒廼壬戌日有蝕之天見大異以戒朕躬師古曰見顯示朕甚悼焉其令内郡國舉茂材異等賢良直言之士各一人夏六月詔曰間者連年不收四方咸困元元之民勞於耕耘又亡成功困於饑饉亡以相救朕為民父母徳不能覆而有其刑甚自傷焉其赦天下秋七月西𦍑反遣右將軍馮奉世擊之八月以太常任千秋為奮威將軍别將五校竝進師古曰别領五校之兵而與右將軍竝進三年春西𦍑平軍罷三月立皇子康為濟陽王夏四月癸未大司馬車騎將軍接薨師古曰王接冬十一月詔曰廼者己丑地動中冬雨水大霧師古曰中讀曰仲雨音于具反盜賊竝起吏何不以時禁各悉意對師古曰時禁謂月令所當禁㫁者也悉盡也冬復鹽鐡官博士弟子員師古曰復音扶目反以用度不足民多復除師古曰復音方目反無以給中外繇役四年春二月詔曰朕承至尊之重不能燭理百姓婁遭凶咎加以邉竟不安師旅在外師古曰婁讀曰屢竟讀曰境賦歛轉輸元元騷動窮困亡聊犯法抵罪夫上失其道而繩下以深刑朕甚痛之其赦天下所貸貧民勿收責三月行幸雍祠五畤夏六月甲戌孝宣園東闕災戊寅晦日有蝕之詔曰蓋聞明王在上忠賢布職則羣生和樂方外蒙澤今朕晻于王道師古曰晻讀與暗同夙夜憂勞不通其理靡瞻不眩靡聽不惑師古曰靡無也眩視亂也音胡眄反是以政令多還民心未得李竒曰還反也易曰渙汗其大號言王者發號施令如汗出不可復反邪説空進事亡成功此天下所著聞也公卿大夫好惡不同師古曰愛憎各異也或緣姦作邪侵削細民元元安所歸命哉廼六月晦日有蝕之詩不云虖今此下民亦孔之哀師古曰小雅十月之交之詩也孔甚也言災異既多百姓甚可哀愍自今以來公卿大夫其勉思天戒慎身脩永以輔朕之不逮師古曰虞書咎繇謩云慎厥身脩思永言當慎脩其身思為長乆之道故此詔云慎身脩永也今流俗書夲永上有職字者後人不曉妄加之耳直言盡意無有所諱九月戊子罷衛思后園及戾園服䖍曰戾太子母也冬十月乙丑罷祖宗廟在郡國者諸陵分屬三輔師古曰先是諸陵揔屬太常今各依其地界屬三輔以渭城夀陵亭部原上為初陵服䖍曰元帝初置陵未有名也故曰初詔曰安土重遷黎民之性師古曰重難也骨肉相附人情所願也頃者有司緣臣子之義奏徙郡國民以奉園陵令百姓逺棄先祖墳墓破業失産親戚别離人懐思慕之心家有不安之意是以東垂被虛耗之害闗中有無聊之民師古曰耗損也音呼到反非乆長之策也詩不云虖民亦勞止迄可小康惠此中國以綏四方師古曰大雅民勞之詩也止語助也迄至也康安也言人勞已乆至此可以小安逸之施惠京師以及四逺也今所為初陵者勿置縣邑使天下咸安土樂業亡有動揺之心布告天下令眀知之又罷先后父母奉邑應劭曰先后為其父母置邑守冢以奉祭祀既已乆逺又非典制故罷之師古曰奉邑奉音扶用反五年春正月行幸甘泉郊泰畤三月上幸河東祠后土秋潁川水出流殺人民吏從官縣被害者與告晋灼曰從官猶從役從軍也臣瓉曰告休假也師古曰晋說非也從官即上侍従之官也言凡為吏為從官其夲縣有被害者皆與休告士卒遣歸冬上幸長楊射㷱館師古曰射音食亦反布車騎大獵十二月乙酉毁太上皇孝惠皇帝寢廟園建昭元年春三月上幸雍祠五畤秋八月有白蛾羣飛蔽日從東都門至枳道如淳曰三輔黄圗長安城東面北頭門號曰宣平城門其外郭曰東都門也師古曰蛾成羣若今之蠶蛾類也音五何反枳音只枳道觧在髙紀宋祁曰顔注南本唐本竝無成羣二字冬河間王元有罪廢遷房陵罷孝文太后孝昭太后寢園二年春正月行幸甘泉郊泰畤三月行幸河東祠后土益三河大郡太守秩戸十二萬為大郡夏四月赦天下六月立皇子興為信都王宋祁曰興越本作輿予據表傳作輿是閏月丁酉太皇太后上官氏崩冬十一月齊楚地震大雨雪師古曰雨音于具反樹折屋壞淮陽王舅張博魏郡太守京房坐窺道諸侯王以邪意漏泄省中語師古曰道讀曰𨗳博要斬房棄市三年夏令三輔都尉宋祁曰唐本無都字大郡都尉宋祁曰舊本南本唐本竝無郡字刋誤添秩皆二千石六月甲辰丞相𤣥成薨師古曰韋𤣥成秋使護西域騎都尉甘延夀副校尉陳湯師古曰言延夀及湯本充西域之使故先言使而後序其官職及姓名撟發戊巳校尉屯田吏士及西域胡兵攻郅支單于師古曰撟與矯同矯託也實不奉詔詐以上命𤼵兵故言撟𤼵也戊巳校尉者鎮安西域無常治處亦猶甲乙等各有方位而戊與己四季寄王故以名官也時有戊校尉又有已校尉一說戊巳位在中央今所置校尉處三十六國之中故曰戊巳也郅音質冬斬其首傳詣京師縣蠻夷邸門師古曰縣古懸字也蠻夷邸若今鴻臚客館宋祁曰唐本無門字四年春正月以誅郅支單于告祠郊廟赦天下羣臣上夀置酒以其圗書示後宫貴人服䖍曰討郅支之圗書也或曰單于土地山川之形書也師古曰或說非夏四月詔曰朕承先帝之休烈師古曰休美也烈業也夙夜栗栗懼不克任間者隂陽不調宋祁曰不唐本作未五行失序百姓饑饉惟烝庶之失業臨遣諫大夫博士賞等二十一人循行天下師古曰行音下更反存問耆老鰥寡孤獨乏困失職之人舉茂材特立之士相將九卿其帥意毋怠使朕獲觀教化之流焉六月甲申中山王竟薨藍田地沙石雍霸水安陵岸崩雍涇水水逆流孟康曰安陵岸惠帝陵旁涇水岸也師古曰雍讀曰壅五年春三月詔曰蓋聞眀王之治國也明好惡而定去就崇敬譲而民興行故法設而民不犯令施而民從今朕獲保宗廟兢兢業業匪敢解怠師古曰兢兢慎也業業危也解讀曰懈徳薄眀晻敎化淺微師古曰晻讀與暗同傳不云虖百姓有過在予一人師古曰論語載殷湯伐桀告天下之文也言君天下者當任其憂責其赦天下賜民爵一級女子百戸牛酒三老孝弟力田帛又曰方春農桑興百姓勠力自盡之時也故是月勞農勸民無使後時師古曰勞農謂慰勉之勞音來到反今不良之吏覆案小罪師古曰覆音方目反宋祁曰唐本無之字徵召證案興不急之事以妨百姓使失一時之作亡終嵗之功公卿其眀察申敕之師古曰申重也一曰約束之耳夏六月庚申復戾園壬申晦日有蝕之秋七月庚子復太上皇寢廟園原廟文頴曰高祖已自有廟在長安城中惠帝更於渭北作廟謂之原廟爾雅曰原者再再作廟也晋灼曰原本也始祖之廟故曰本也師古曰文說是昭靈后武哀王昭哀后衞思后園師古曰昭靈后髙祖母也武哀王髙祖兄也昭哀后高祖姊也衛思后戾太子母也竟寧元年應劭曰虖韓邪單于願保塞邉竟得以安寧故以冠元也師古曰據如應説竟讀為境古之用字竟境實同但此詔云邉垂長無兵革之事竟者終極之言言永安寕也既無兵革中外安寧豈止境上若依本字而讀義更𢎞通也春正月匈奴虖韓邪單于來朝宋祁曰虖當作呼詔曰匈奴郅支單于背叛禮義既伏其辜虖韓邪單于不忘㤙徳鄉慕禮義師古曰鄉讀曰嚮復修朝賀之禮願保塞傳之無窮邉垂長無兵革之事其改元為竟寧賜單于待詔掖庭王嬙為閼氏應劭曰郡國獻女未御見須命於掖庭故曰待詔王嬙王氏女名嬙字昭君文頴曰夲南郡秭歸人也蘇林曰閼氏音焉支如漢皇后也師古曰秭音姊皇太子冠賜列侯嗣子爵五大夫師古曰第九爵天下為父後者爵一級二月御史大夫延夀卒師古曰即繁延夀也繁音蒲何反三月癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園夏封騎都尉甘延夀為列侯賜副校尉陳湯爵關内侯黄金百斤五月壬辰帝崩于未央宫臣瓉曰帝年二十七即位即位十六年夀四十三毁太上皇孝惠孝景皇帝廟罷孝文孝昭太后昭靈后武哀王昭哀后寢園秋七月丙戌葬渭陵臣瓚曰自崩及葬凡五十五日渭陵在長安北五十六里也贊曰臣外祖兄弟為元帝侍中應劭曰元成帝紀皆班固父彪所作臣則彪自説也外祖金敞也如淳曰班固外祖樊叔皮也師古曰應説是語臣曰元帝多材蓺善史書應劭曰周宣王太史史籕所作大篆鼓琴瑟吹洞簫如淳曰簫之無底者自度曲被歌聲應劭曰自隱度作新曲因持新曲以為歌詩聲也荀悦曰被聲能播樂也臣瓚曰度曲謂歌終更授其次謂之度曲西京賦曰度曲未終雲起雪飛張衡舞賦度終復位次受二八師古曰應荀二説皆是也度音大各反被音皮義反分刌節度蘇林曰刌度也知曲之終始節度也韋昭曰刌切也謂能分切句絶為之節制也師古曰韋説是也刌音千本反窮極㓜眇師古曰㓜眇讀曰要妙少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相師古曰貢禹薛廣德韋賢匡衡迭互而為丞相也迭音大結反而上牽制文義優㳺不斷師古曰為文義所牽制故不斷決孝宣之業衰焉然寛𢎞盡下出於恭儉號令温雅有古之風烈前漢書卷九前漢書卷九考證元帝紀以三輔太常郡國公田及苑胡三省曰太常掌諸陵邑故亦有公田及苑中常侍許嘉胡三省曰按表侍中中常侍皆加官西都叅用士人東都以宦者為中常侍北假田官臣召南按水經注曰自髙闕以東夾山帶河陽山以西皆北假也詔丞相御史舉質樸敦厚遜譲有行者光禄嵗以此科第郎從官注臣召南按所云舉光禄四行者即起于此後漢書吳祐以光禄四行遷膠東侯相注引漢官儀曰淳厚質樸遜譲節儉也蓋漢時朝廷從官俱屬光禄勲自太中大夫中大夫諫大夫及郎議郎中郎侍郎郎中其員多至千人故令光禄勲第其賢否以太常任千秋為奮威將軍按馮奉世傳作奮武將軍贊貢薛韋匡迭為宰相臣召南按貢禹薛廣徳止為御史大夫而贊與韋匡並列漢世以御史大夫為丞相之副故與丞相並稱兩府其後改丞相曰司徒改御史大夫曰司空遂並為三公矣蕭望之嘗為御史大夫後為前將軍曰吾備位將相亦是此義前漢書卷九考證
