body:
  text: 前漢書卷七十四漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注魏相丙吉傳第四十四魏相字弱翁濟隂定陶人也師古曰說者謂相即魏無知之後蓋承淺近之書為妄深矣徙平陵少學易為郡卒史舉賢良以對策髙第為茂陵令頃之御史大夫桑宏羊客詐稱御史止傳師古曰傳謂縣之傳舍丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市師古曰殺之於市茂陵大治後遷河南太守宋祁曰浙本遷字下有為字禁止姦邪豪彊畏服會丞相車千秋死先是千秋子為雒陽武庫令自見失父而相治郡嚴恐久獲罪宋祁曰罪字疑從辠書乃自免去相使掾追呼之遂不肯還相獨恨曰大將軍聞此令去官必以為我用丞相死不能遇其子使當世貴人非我殆矣師古曰殆危也武庫令西至長安大將軍霍光果以責過相曰㓜主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令今河南太守不深惟國家大策師古曰惟思也苟見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人師古曰來京師諸官府為戍卒若今衞士上番分守諸司􅃒大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄師古曰光心以武庫令事嫌之而下其賊殺不辜之獄久繫踰冬會赦出宋祁曰繫字下疑有之字復有詔守茂陵令遷揚州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫予相書曰朝廷已深知弱翁治行方且大用矣願少愼事自重臧器于身師古曰易下繫辭云君子臧器於身待時而動言不顯見其材能相心善其言為霽威嚴蘇林曰霽音限齊之齊臣瓉曰此雨霽字也霽止也師古曰二説皆是也音才詣反又子詣反居部二嵗徵為諫大夫復為河南太守數年宣帝即位徴相入為大司農遷御史大夫四嵗大將軍霍光薨上思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事師古曰山者去病之孫今言兄子此傳誤相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫師古曰解在五行志及魯季孫之專權皆危亂國家自後元以來祿去王室政繇冢宰師古曰繇與由同今光死子復為大將軍劉敞曰禹不為大將軍字之誤也兄子秉樞機昆弟諸壻據權埶在兵官光夫人顯及諸女皆通籍長信宮師古曰通籍謂禁門之中皆有名籍恣出入也或夜詔門出入驕奢放縱恐寖不制師古曰寖漸也不制不可制御也宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽師古曰雍讀曰壅宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞乃罷其三侯令就第師古曰禹及雲山也親屬皆出補吏於是韋賢以老病免相遂代為丞相封髙平侯食邑八百戶及霍氏怨相又憚之謀矯太后詔先召斬丞相然後廢天子事發覺伏誅宣帝始親萬機厲精為治練羣臣核名實而相總領衆職甚稱上意元康中匈奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輙奉歸之未有犯於邊境雖爭屯田車師宋祁曰浙本無屯字不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵師古曰不可以兵事動之軍旅之後必有凶年師古曰此引老子道經之語言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選師古曰言不得其人風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此師古曰左右謂近臣在天子左右者乃欲發兵報纎介之忿於遠夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內也師古曰論語季氏將伐顓臾孔子謂冉有季路曰吾恐季孫之憂不在顓臾而在蕭牆之內故相引之顓臾魯附庸國蕭牆屏牆也解在五行志願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可師古曰平昌侯王無故樂昌侯王武並帝之舅平恩侯許伯皇太子外祖父也上從相言而止相眀易經有師法好觀漢故事及便宜章奏師古曰既觀國家故事又觀前人所奏便宜之章也以為古今異制方今務在奉行故事而已數條漢興已來宋祁曰已字疑作以字國家便宜行事及賢臣賈誼鼂錯董仲舒等所言奏請施行之曰臣聞眀主在上賢輔在下則君安虞而民和睦師古曰虞與娛同臣相幸得備位不能奉眀法廣教化理四方以宣聖徳民多背本趨末師古曰本農業也末商賈也趨讀曰趣或有饑寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇師古曰惟思也繇讀與由同由從也因也竊伏觀先帝聖徳仁恩之厚勤勞天下垂意黎庻憂水旱之災為民貧窮發倉廪振乏餧師古曰餧餓也音乃賄反遣諫大夫博士廵行天下師古曰行音下更反察風俗舉賢良平寃獄冠蓋交道師古曰言其徃來不絶也省諸用寛租賦弛山澤波池師古曰弛放也言不禁障之也波音陂宋祁曰注文音字當作讀曰禁秣馬酤酒貯積師古曰秣以粟米飤馬也酤酒者糜費深也貯積者滯米粟也所以周急繼困慰安元元便利百姓之道甚備臣相不能悉陳昧死奏故事詔書凡二十三事臣謹案王法必本於農而務積聚量入制用以備凶災師古曰謂視年嵗之豐儉亡六年之畜尚謂之急師古曰畜讀曰蓄禮記王制云國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也宋祁曰亡字上疑有故字元鼎二年平原渤海太山東郡溥被災害師古曰溥與普同宋祁曰注文溥字下當有一讀字民餓死於道路二千石不豫慮其難使至於此師古曰慮思也賴眀詔振捄乃得蒙更生師古曰捄古救字今歲不登榖暴騰踴師古曰價忽大貴也臨秋收歛猶有乏者至春恐甚亡以相恤西𦍑未平師旅在外兵革相乗臣竊寒心宜蚤圖其備師古曰蚤古早字也宋祁曰注末也字當刪唯陛下留神元元帥繇先帝盛徳以撫海内師古曰帥循也繇與由同由從也宋祁曰注文繇字下當有讀字上施行其策又數表采易隂陽及明堂月令奏之師古曰表謂標眀之采撮取也曰臣相幸得備員奉職不修不能宣廣教化隂陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服師古曰豫卦彖辭也忒差也天地變化必繇隂陽師古曰繇與由同宋祁曰注文繇字下當有讀字隂陽之分以日為紀日冬夏至則八風之序立宋祁曰江南本紀字下無日字浙本有萬物之性成各有常職不得相干東方之神太昊乗震執規司春張晏曰木為仁仁者生生者圜故為規南方之神炎帝乗離執衡司夏張晏曰火為禮禮者齊齊者平故為衡西方之神少昊乗兌執矩司秋張晏曰金為義義者成成者方故為矩北方之神顓頊乗坎執權司冬張晏曰水為智智者謀謀者重故為權中央之神黄帝乗坤艮執繩司下土張晏曰土為信信者誠誠者直故為䋲宋祁曰浙本無下字兹五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則饑秋興震治則華冬興離治則泄師古曰天地之氣不閉宻也夏興坎治則雹眀王謹于尊天愼于養人故立羲和之官以乗四時師古曰乗治也節授民事師古曰各依其節而授以事君動静以道奉順隂陽則日月光眀風雨時節寒暑調和三者得敘則災害不生五榖熟絲麻遂師古曰遂成也􅋄木茂鳥獸蕃師古曰􅋄古草字蕃多也音扶元反民不夭疾衣食有餘若是則君尊民說上下亡怨師古曰説讀曰悅政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民饑寒饑寒在身則亡亷恥㓂賊姦宄所繇生也師古曰亂在外為姦在内為宄繇與由同下類此宋祁曰注文繇字下當有讀字下字下當有皆字臣愚以為隂陽者王事之本羣生之命自古賢聖未有不繇者也天子之義必純取法天地而觀於先聖髙皇帝所述書天子所服第八如淳曰第八天子衣服之制也於施行詔書第八曰大謁者臣章受詔長樂宮曰令羣臣議天子所服以安治天下相國臣何御史大夫臣昌師古曰蕭何周昌也謹與將軍臣陵太子太傅臣通等議師古曰陵王陵通叔孫通春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡旤殃年壽永究師古曰究竟也是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春應劭曰四時各舉所施行政事服虔曰主一時衣服禮物朝祭百事也師古曰服說是也李舜舉夏兒湯舉秋貢禹舉冬師古曰髙帝時自有一貢禹也兒音五奚反四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩恵於天下賜孝弟力田及罷軍卒祠死事者頗非時節師古曰罷軍卒卒之疲於軍事者也一曰新從軍而休罷者也音薄蟹反宋祁曰罷音疲御史大夫鼂錯時為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知隂陽者四人各主一時時至明言所職以和隂陽天下幸甚相數陳便宜上納用焉相敇椽吏案事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡不上相輙奏言之時丙吉為御史大夫同心輔政上皆重之相為人嚴毅不如吉寛視事九嵗神爵三年薨諡曰憲侯子𢎞嗣甘露中有罪削爵為關内侯師古曰𢎞坐騎至宗廟下大不敬也丙吉字少卿魯國人也治律令為魯獄史積功勞稍遷至廷尉右監坐法失官歸為州從事武帝末巫蠱事起吉以故廷尉監徴師古曰被召詣京師詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衞太子事繫吉見而憐之又心知太子無事實重哀曾孫無辜師古曰重音直用反吉擇謹厚女徒令保養曾孫置閒燥處師古曰閒讀曰閑閑寛静之處也燥髙敞也吉治巫蠱事連歲不决後元二年武帝疾徃來長楊五柞宫師古曰長楊五柞宮並在􅉦厔徃來二宮之間望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者師古曰條謂疏錄之亡輕重一切皆殺之内謁者令郭穰夜到郡邸獄吉閉門拒使者不納宋祁曰納字疑作內曰皇曾孫在他人亡辜死者猶不可宋祁曰浙本無者字况親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨頼吉得生恩及四海矣師古曰吉拒閉使者天子感寤乃普赦天下其郡邸繫獄者既因吉得生而赦宥之恩遂及四海也曾孫病㡬不全者數焉師古曰㡬鉅依反數所角反次下亦同宋祁曰注文鉅字所字上疑皆有音字吉數敇保養乳母加致醫藥視遇甚有恩恵以私財物給其衣食後吉為車騎將軍軍市令遷大將軍長史霍光甚重之入為光祿大夫給事中昭帝崩亡嗣大將軍光遣吉迎昌邑王賀賀即位以行淫亂廢光與車騎將軍張安世諸大臣議所立未定吉奏記光曰將軍事孝武皇帝受襁褓之屬任天下之寄師古曰屬之欲反宋祁曰注文之字上當有音字孝昭皇帝早崩亡嗣海内憂懼欲亟聞嗣主師古曰亟急也音居力反發喪之日以大誼立後師古曰雖無嫡嗣旁立支屬令宗廟有奉故云大誼所立非其人復以大誼廢之師古曰恐危社稷故廢黜之天下莫不服焉方今社稷宗廟羣生之命在將軍之壹舉竊伏聽於衆庻察其所言諸侯宗室在位列者宋祁曰位列浙本作列位未有所聞於民間也而遺詔所養武帝曾孫名病已在掖庭外家者蘇林曰外家猶言外人民家不在宮中晋灼曰出郡邸獄歸在外家史氏後入掖庭耳師古曰晉説是也吉前使居郡邸時見其㓜少至今十八九矣通經術有美材行安而節和願將軍詳大議參以蓍龜豈宜褒顯先使入侍師古曰侍太后朱子文曰豈宜褒顯豈字於文為悖恐是直字當為直宜褒顯令天下昭然知之然後决定大策天下幸甚光覽其議師古曰省納而用之遂尊立皇曾孫遣宗正劉徳與吉迎曾孫於掖庭宣帝初即位賜吉爵關内侯吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩師古曰遭遇謂升大位也故朝廷莫能眀其功也地節三年立皇太子吉為太子太傅數月遷御史大夫及霍氏誅上躬親政省尚書事宋祁曰親字下疑有治字是時掖庭宮婢則令民夫上書自陳嘗有阿保之功師古曰謂未為宫婢時有舊夫見在俗間者章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉師古曰視讀曰示吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝安得有功師古曰督謂視察之獨渭城胡組淮陽郭徴卿有恩耳分别奏組等共養勞苦狀師古曰共音居用反養音弋亮反詔吉求組徴卿已死有子孫皆受厚賞詔免則為庻人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之制詔丞相朕㣲眇時御史大夫吉與朕有舊恩厥德茂焉師古曰茂美也詩不云虖亡徳不報師古曰大雅抑之詩宋祁曰注末當有也字其封吉為博陽侯邑千三百户臨當封吉疾病上將使人加紼而封之及其生存也應劭曰吉時疾不能起欲如君視疾加朝服拖紳就封之也師古曰紼繫印之組也音弗上憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果瘉師古曰瘉與愈同吉上書固辭自陳不宜以空名受賞上報曰朕之封君非空名也而君上書歸侯印是顯朕之不徳也方今天下少事君其專精神省思慮近醫藥以自持後五嵗代魏相為丞相吉本起獄法小吏後學詩禮皆通大義及居相位上寛大好禮讓掾史有罪臧不稱職輙予長休告師古曰長給休假令其去職也宋祁曰長休告浙本無休字終無所案驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾師古曰艾讀曰乂吉曰夫以三公之府有案吏之名吾竊陋焉宋祁曰陋疑作陿後人代吉因以為故事公府不案吏自吉始於官屬掾史務掩過揚善吉馭吏耆酒數逋蕩師古曰逋亡也蕩放也謂亡其所供之職而游放也耆讀曰嗜嘗從吉出醉歐丞相車上師古曰歐吐也音一口反西曹主吏白欲斥之師古曰斥棄宋祁曰注末當添也字吉曰以醉飽之失去士使此人將復何所容師古曰言無所容身也西曹地忍之李竒曰地由苐也師古曰地亦但也語聲之急也宋祁曰注文由字越本作猶謝改作由注末也字疑作耳此不過汙丞相車茵耳師古曰茵蓐也音因遂不去也此馭吏邊郡人習知邊塞發犇命警備事師古曰犇古奔字也有命則奔赴之言應速也嘗出適見驛騎持赤白囊邊郡發奔命書馳來至宋祁曰奔疑作犇馭吏因隨驛騎至公車刺取師古曰刺謂探候之也知虜入雲中代郡遽歸府見吉白狀師古曰遽速也因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視宋祁曰視字下疑有𤨏字吉善其言召東曹案邉長吏𤨏科條其人張晏曰瑣錄也欲科條其人老少及所經歴知其本以文武進也未已詔召丞相御史問以虜所入郡吏吉具對御史大夫卒遽不能詳知師古曰卒讀曰猝以得譴讓師古曰讓責也而吉見謂憂邊思職馭吏力也吉乃歎曰士亡不可容能各有所長嚮使丞相不先聞馭吏言何見勞勉之有掾史繇是益賢吉師古曰繇與由同宋祁曰注文與字上當有讀字吉又嘗出逢清道羣鬭者死傷横道李竒曰清道時反羣鬭也師古曰清道謂天子當出或有齋祀先令道路清浄吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吐舌師古曰喘急息音昌兗反宋祁曰逐字下疑有失字吉止駐宋祁曰駐字疑作騎使騎吏問逐牛行㡬里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕嵗竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可大熱師古曰少音式邵反宋祁曰大熱浙本作以熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和隂陽職當憂是以問之掾史乃服以吉知大體宋祁曰當字上疑有所字五鳳三年春吉病篤上自臨問吉曰君即有不諱誰可以自代者師古曰不諱言死不可復諱也吉辭謝曰羣臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不寃太僕陳萬年事後母孝惇厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉及吉薨御史大夫黄霸為丞相徴西河太守杜延年為御史大夫會其年老乞骸骨病免以廷尉于定國代為御史大夫黄霸薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱職上稱吉為知人吉薨諡曰定侯子顯嗣甘露中有罪削爵為關内侯官至衞尉太僕始顯少為諸曹嘗從祠髙廟至夕牲日乃使出取齋衣師古曰未祭一日其夕展視牲具謂之夕牲丞相吉大怒謂其夫人曰宗廟至重而顯不敬慎亡吾爵者必顯也夫人為言然後乃已師古曰免其罪罰也吉中子禹為水衡都尉少子髙為中壘校尉元帝時長安士伍尊上書師古曰先嘗有爵經奪免之而與士卒為伍故稱士伍其人名尊言臣少時為郡邸小吏竊見孝宣皇帝以皇曾孫在郡邸獄宋祁曰景祐本作孝武無以皇字淳化本作孝武非江浙本曾孫上無皇字刋誤據衆本添皇字是時治獄使者丙吉見皇曾孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍臥庭上師古曰郡邸之庭也侍謂參省之也時皇孫孩弱常在襁褓故指言臥也後遭條獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官孟康曰郡守丞也來詣京師邸治獄姓誰名如言皇孫不當在獄官宜屬郡縣也文頴曰不當在郡邸官也師古曰守丞者守獄官之丞耳非郡丞也誰如者其人名本作譙字言姓又非也劉奉世曰守丞諸説皆非蓋郡邸守邸之丞也與朱買臣傳守丞同使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令留與郭徴卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫亡詔令師古曰少内掖庭主府臧之官也食讀曰飤詔令無文無從得其廪具也宋祁曰注文廩字疑作禀時吉得食米肉月月以給皇孫吉即時病師古曰有病時也輙使臣尊朝夕請問皇孫視省席蓐燥濕候伺組徵卿不得令晨夜去皇孫敖盪師古曰去離也敖游戲也盪放也盪讀與蕩同數奏甘毳食物師古曰奏進也毳讀與脆同所以擁全神靈成育聖躬功徳已亡量矣時豈豫知天下之福而徼其報哉師古曰徼要也音工堯反誠其仁恩内結於心也雖介之推割肌以存君不足以比師古曰韓詩外傳云晉公子重耳之亡也過曹里鳬須以從因盗其資而逃重耳無糧餧不能行介子推割其股肉以食重耳然後能行也孝宣皇帝時臣上書言狀幸得下吉吉謙讓不敢自伐刪去臣辭師古曰刪削也專歸美於組徴卿組徴卿皆以受田宅賜錢吉封為博陽侯臣尊不得比組徴卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐㣲文奪爵為關内侯臣愚以為宜復其爵邑師古曰復音防目反以報先人功徳先是顯為太僕十餘年與官屬大為姦利臧千餘萬司𨽻校尉昌案劾罪至不道奏請逮捕上曰故丞相吉有舊恩朕不忍絶免顯官奪邑四百户後復以為城門校尉顯卒子昌嗣爵關内侯成帝時修廢功以吉舊恩尤重鴻嘉元年制詔丞相御史蓋聞褒功徳繼絶統宋祁曰浙本無徳字校本添所以重宗廟廣賢聖之路也故博陽侯吉以舊恩有功而封今其祀絶朕甚憐之夫善善及子孫古今之通誼也其封吉孫中郎將關内侯昌為博陽侯奉吉後國絶三十二嵗復續云昌傳子至孫王莾時乃絶賛曰古之制名必繇象類師古曰繇讀與由同遠取諸物近取諸身故經謂君為元首臣為股肱師古曰謂虞書益稷云元首明哉股肱良哉明其一體相待而成也是故君臣相配古今常道自然之埶也近觀漢相髙祖開基蕭曹為冠師古曰名位在衆臣之上孝宣中興丙魏有聲是時黜陟有序衆職修理公卿多稱其位師古曰稱副也海内興於禮讓覽其行事豈虛虖哉師古曰言君明臣賢所以致治非徒然也前漢書卷七十四前漢書卷七十四考證魏相傳舉賢良以對策髙第臣召南按相對策見韓延壽傳但彼文云以文學對策又祗舉褒崇節義一叚亦非全文也兄子樂平侯山復領尚書事注師古曰山者去病之孫今言兄子此傳誤臣召南按依顔注當如張敞傳稱兄孫山然下文魏相封事曰兄子秉樞機即説此事蒙霍禹言之可稱兄子蕭望之傳亦曰光薨子禹復為大司馬兄子山領尚書與此文同似非誤也願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可蘇轍曰三人者非賢于趙充國也然其與國同憂樂無徼倖功名之心則過于充國遠甚中謁者趙堯舉春云云臣召南按此趙堯疑另是一人必非江邑侯代周昌為御史大夫者也上文云相國臣何御史大夫臣昌將軍臣陵太子太傅臣通其事當在髙帝十年之初丞相之改稱相國周昌之出為趙相而趙堯代為御史大夫叔孫通之由奉常徙為太子太傅皆此年事也据功臣表江邑侯趙堯以漢五年為御史則未嘗為中謁者矣丙吉傳吉奏記光曰云云臣召南按此時定策吉為首功不止從前保䕶曾孫有恩也傳詳述其奏記云云見杜延年等勸光立宣帝其功實在丙吉之下其封吉為博陽侯邑千三百戶按表作千三百三十戶又按此詔宣帝紀元康三年吉與史曾史元許舜許延壽及張賀子彭祖同日封前漢書卷七十四考證
