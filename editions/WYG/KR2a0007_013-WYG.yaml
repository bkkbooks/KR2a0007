  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0007_WYG_013-1a, image: WYG0249/WYG0249-0184a.png}
body:
  text: 前漢書卷十三漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注異姓諸侯王表第一昔詩書述虞夏之際舜禹受䄠師古曰古禪字音上扇反積徳累功洽于百姓攝位行政考之于天師古曰謂在璿璣玉衡以齊七政考之於天知已合天心不也經數十年然後在位殷周之王乃繇卨稷師古曰繇讀與由同脩仁行義歴十餘世至於湯武然後放殺師古曰殺讀曰弑它皆類此也秦起襄公章文繆獻師古曰言秦之初大起於襄公始為諸侯至文公繆公獻公更爲章著也襄公荘公之子文公襄公之子也繆公徳公之少子獻公靈公之子也孝昭嚴稍蠶食六國師古曰孝謂孝公也即獻公之子昭謂昭襄王即惠王之子武王之弟也嚴謂荘襄王即昭襄王之孫孝文王之子也後漢時避眀帝諱以荘為嚴故漢書姓及諡本作莊者皆易為嚴也它皆類此蠶食謂漸吞滅之如蠶食葉也百有餘載至始皇廼并天下以徳若彼用力如此其囏難也師古曰囏古艱字也秦既稱帝患周之敗以爲起於處士横議諸侯力爭四夷交侵以弱見奪服䖍曰言因横議而敗也應劭曰孟軻云聖王不作諸侯恣行處士横議師古曰處士謂不官於朝而居家者也横音胡孟反次下横發其音亦同也於是削去五等應劭曰周制公侯伯子男五等爵墮城銷刃應劭曰壞其堅城恐復阻以害已也聚天下之兵鑄以為銅人十二不欲令民復逆命也古者以銅為兵師古曰墮音火規反箝語燒書應劭曰禁民聚語畏其謗已箝緘也箝與鉗同晉灼曰許愼云箝籥也師古曰晉説是也謂箝籥其口不聽妄言也即所謂禁耦語者也箝音其占反籥音躡内鋤雄俊外攘胡粤師古曰攘却也粤古越字用壹威權為萬世安師古曰令威權壹歸於已然十餘年間猛敵横𤼵乎不虞師古曰虞度也意所不度謂之不虞適戍彊於五伯師古曰適讀曰謫謫戍謂陳勝吳廣也伯讀曰霸五霸謂昆吾大彭豕韋齊桓晉文也謫音陟厄反閭閻偪於戎狄應劭曰周禮二十五家為閭閻音簷門閭外旋下廕謂之歩簷也閭閻民陳勝之屬言其逼秦甚於戎狄也師古曰閭里門也閻里中門也陳勝吳廣本起閭左之戍故總言閭閻應説非也閭左解在陳勝傳偪音逼嚮應㿊於謗議服䖍曰㿊音惨應劭曰秦法誹謗者族今陳勝奮臂大呼天下莫不嚮應嚮應之害更㿊烈於所謗議也師古曰嚮音響響應者如響之應聲㿊痛也服音是也奮臂威於甲兵鄉秦之禁適所以資豪桀而速自斃也師古曰鄉讀曰嚮謂曩時也秦禁謂墮城銷刃箝語燒書之屬是也是以漢亡尺土之階繇一劍之任師古曰任用也事也五載而成帝業書傳所記未嘗有焉何則古世相革皆承聖王之烈師古曰革變也烈謂餘烈也今漢獨收孤秦之弊鐫金石者難為功摧枯朽者易為力師古曰鐫琢石也音子全反其埶然也故據漢受命譜十八王月而列之天下一統廼以年數應劭曰譜音補項羽為西楚霸王為天下主命立十八王王高祖於蜀漢漢元年諸王畢封各就國始受命之元故以冠表焉張晏曰時天下未定參錯變易不可以年紀故列其月五年誅籍乃以年紀焉訖于孝文異姓盡矣前漢書卷十三前漢書卷十三考證異姓諸侯王表秦起襄公章文繆獻臣召南按史記秦楚之際月表曰秦起襄公章於文繆獻孝之後稍以蠶食六國史記從文繆斷句而獻公下連孝公云獻孝之後則昭王莊襄王皆已包括此表章字下無於字則從獻字斷句盖秦自獻公以上不過為西方大國至孝公以還遂駸駸乎有并吞天下之勢矣趙常山臣召南按表大書趙字而夾書常山於旁以是時分趙為二故趙地則為常山國也齊臨淄亦然分齊為三齊國則都臨淄也韓王韓成始故韓王按史記作故韓將田榮擊都降楚臣召南按史記表作田榮擊都都降楚此文脱一都字耳又按此表書事較史記毎移前一月如此事史記在五月此文則在四月前漢書卷十三考證
