body:
  text: 前漢書卷二十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注天文志第六凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宫物類之象其伏見蚤晚邪正存亡虚實濶陿孟康曰伏見蚤晩謂五星也日月五星下道為邪存謂列宿不虧也亡謂恒星不見虚實若天牢星實則囚多虚則開出之屬也濶陿若三台星相去逺近也及五星所行合散犯守陵歴鬬食孟康曰合同舍也散五星有變則其精散為祅星也犯七寸以内光芒相及也陵相冒過也食星月相陵不見者則所蝕也韋昭曰自下往觸之曰犯居其宿曰守經之為歴突掩為陵星相擊為鬬也彗孛飛流日月薄食張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去也流光迹相連也日月無光曰薄京房易傳曰日月赤黄為薄或曰不交而食曰薄韋昭曰氣往廹之為薄􅀈毁曰食也暈適背穴抱珥􅛆蜺孟康曰暈日旁氣也適日之將食先有黑之變也背形如背字也穴多作鐍其形如玉鐍也抱氣向日也珥形㸃黒也如淳曰暈讀曰運􅛆或作虹蜺讀曰齧螮蝀謂之􅛆表云雄為􅛆雌為蜺凡氣在日上為冠為戴在旁直對為珥在旁如半環向日為抱向外為背有氣刺日為鐍鐍抉傷也迅雷風祅怪雲變氣此皆隂陽之精其本在地而上發于天者也政失於此則變見於彼猶景之象形鄉之應聲師古曰鄉讀曰響是以明君覩之而寤飭身正事思其咎謝則禍除而福至自然之符也中宫天極星其一明者泰一之常居也旁三星三公或曰子屬後句四星末大星正妃餘三星後宫之屬也環之匡衞十二星藩臣皆曰紫宫前列直斗口三星隨北耑銳若見若不見曰隂徳或曰天一紫宫左三星曰天槍右四星曰天棓蘇林曰音棓打之棓師古曰棓音白講反後十七星絶漢抵營室曰閤道北斗七星所謂璇璣玉衡以齊七政杓攜龍角孟康曰杓斗柄也龍角東方宿也攜連也衡殷南斗魁枕參首晉灼曰衡斗之中央殷中也用昏建者杓杓自華以西南孟康曰傳曰斗第七星法太白主杓斗之尾也尾為隂又其用昏昏隂位在西方故主西南夜半建者衡衡殷中州河濟之間孟康曰假令杓昏建寅衡夜半亦建寅也平旦建者魁魁海岱以東北也孟康曰傳曰斗魁第一星法為日主齊魁斗之首首陽也又其用在明陽與明徳在東方故主東北方斗為帝車運于中央臨制四海分隂陽建四時均五行移節度定諸紀皆繫於斗斗魁戴筐六星曰文昌宫晉灼曰似筐故曰戴筐一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災在魁中貴人之牢孟康曰傳曰天理四星在斗魁中貴人牢名曰天理也魁下六星兩兩而比者曰三能蘇林曰能音台三能色亝君臣和不亝為乖戾柄輔星孟康曰在北斗第六星旁明近輔臣親彊斥小疏弱蘇林曰斥逺也杓端有兩星一内為矛招㨱孟康曰近北斗者招㨱招㨱為天矛晉灼曰梗河三星天矛鋒招㨱一星耳一外為盾天蠭晉灼曰外逺北斗也在招㨱南一名天蠭有句圜十五星屬杓曰賤人之牢牢中星實則囚多虚則開出天一槍棓矛盾動㨱角大兵起李竒曰角芒角東宫蒼龍房心心為明堂大星天王前後星子屬不欲直直王失計房為天府曰天駟其隂右驂旁有兩星曰衿衿北一星曰牽晉灼曰牽古轄字東北曲十二星曰旗旗中四星曰天市天市中星衆者實其中虚則耗房南衆星曰騎官左角理右角將大角者天王帝坐廷其兩旁各有三星鼎足句之曰攝提晉灼曰如鼎足之句曲也攝提者直斗枃所指以建時節故曰攝提格亢為宗廟主疾其南北兩大星曰南門氐為天根主疫尾為九子曰君臣斥絶不和箕為敖客后妃之府曰口舌火犯守角則有戰房心王者惡之南宫朱鳥權衡孟康曰軒轅為權太微為衡也衡太微三光之廷筐衞十二星藩臣西將東相南四星執法中端門左右掖門掖門内六星諸侯其内五星五帝坐後聚十五星曰哀烏郎位旁一大星將位也月五星順入軌道司其出所守天子所誅也其逆入若不軌道以所犯名之中坐成形晉灼曰中坐犯帝坐也成形禍福之形見皆羣下不從謀也金火尤甚廷藩西有隨星四名曰少微士大夫權軒轅黄龍體孟康曰形如騰龍前大星女主象旁小星御者後宫屬月五星守犯者如衡占東井為水事火入之一星居其左右天子且以火為敗東井西曲星曰戌北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質晉灼曰輿鬼五星其中白者為質火守南北河兵起榖不登故徳成衡觀成潢晉灼曰日月五星不軌道也衡太微廷也觀占也潢五潢五帝車舍也傷成戌晉灼曰賊傷之占先成形於戌禍成井晉灼曰東井主水事火入一星居其旁天子且以火敗故曰禍也誅成質晉灼曰熒惑入輿鬼天質占曰大臣有誅柳為鳥喙主木草七星頸為員宫主急事張嗉為厨主觴客翼為羽翮主逺客軫為車主風其旁有一小星曰長沙星星不欲明明與四星等若五星入軫中兵大起軫南衆星曰天庫庫有五車車星角若益衆及不具亡處車馬西宫咸池曰天五潢五潢五帝車舍火入旱金兵水水中有三柱柱不具兵起奎曰封豨為溝瀆婁為聚衆胃為天倉其南衆星曰廥積如淳曰芻槀積為廥也昴曰旄頭胡星也為白衣㑹畢曰䍐車為邊兵主弋獵其大星旁小星為附耳附耳㨱動有讒亂臣在側昴畢間為天街其隂隂國陽陽國孟康曰隂西南象坤維河山已北國也陽河山已南國也參為白虎三星直者是為衡石孟康曰參三星者白虎宿中東西直似稱衡也下有三星鋭曰罰孟康曰在參間上小下大故曰鋭晉灼曰三星小邪列無鋭形也為斬艾事其外四星左右肩股也小三星隅置曰觜觿為虎首主葆旅事如淳曰關中俗謂桑榆蘖生為葆晉灼曰禾野生曰旅今之饑民采旅也宋均曰葆守也旅軍衆也言佐參伐斬艾除凶也其南有四星曰天厠天厠下一星曰天矢矢黄則吉青白黑凶其西有句曲九星三處羅列一曰天旗二曰天苑三曰九斿其東有大星曰狼狼角變色多盜賊下有四星曰弧直狼比地有大星曰南極老人晉灼曰比地近地也老人見治安不見兵起常以秋分時候之南郊北宫𤣥武虛危危為蓋屋宋均曰危上一星髙旁兩星下似蓋屋也虚為哭泣之事宋均曰蓋屋之下中無人但空虚似乎殯宫故主哭泣也其南有衆星曰羽林天軍宋均曰虚危營室隂陽終始之處際㑹之間恒多姦邪故設羽林為軍衞軍西為壘或曰戌旁一大星北落北落若微亡軍星動角益稀及五星犯北落入軍軍起火金水尤甚火入軍憂水水患木土軍吉孟康曰木星土星入北落軍則吉也危東六星兩兩而比曰司冦營室為清廟曰離宫閣道漢中四星曰天駟旁一星曰王梁王梁策馬車騎滿野旁有八星絶漢曰天横天横旁江星江星動以人涉水杵臼四星在危南匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星上將左左星劉敞曰星蓋將字右右將婺女其北織女織女天女孫也歲星晉灼曰太歲在四仲則歲行三宿太歲在四孟四季則歲行二宿二八十六三四十二而行二十八宿十二歲而周天曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣罰見歲星歲星所在國不可伐可以伐人超舍而前為贏退舍為縮贏其國有兵不復縮其國有憂其將死國傾敗所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安靜中度吉出入不當其次必有天祅見其舍也歲星贏而東南孟康曰五星東行天西轉歲星晨見東方行疾則不見不見則變為祅星石氏見彗星甘氏不出三月廼生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月廼生天棓本類星末銳長四尺縮西南孟康曰歲星當伏西方行遲早沒變為祅星也石氏見欃雲如牛韋昭曰欃音參差之參甘氏不出三月廼生天槍左右鋭長數丈縮西北石氏見槍雲如馬甘氏不出三月廼生天欃本類星末銳長數丈石氏槍欃棓彗異狀其殃一也必有破國亂君伏死其辜餘殃不盡為旱凶饑暴疾至日行一尺出二十餘日廼入甘氏其國凶不可舉事用兵出而易所當之國是受其殃又曰祅星不出三年其下有軍及失地若國君喪宋祈曰三年當作五年熒惑晉灼曰常以十月入太微受制而出行列宿司無道出入無常也曰南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行一舍二舍為不祥居之三月國有殃五月受兵七月國半亡地九月地大半亡因宋祁曰亡因擬作亡國與俱出入國絶祀熒惑為亂為賊為疾為喪為饑為兵所居之宿國受殃殃還至者雖大當小居之久殃乃至者當小反大已去復還居之若居之而角者若動者繞環之及乍前乍後乍左乍右殃愈甚一曰熒惑出則有大兵入則兵散周還止息廼為其死喪寇亂在其野者亡地以戰不勝東行疾則兵聚於東方西行疾則兵聚於西方其南為丈夫喪北為女子喪熒惑天子理也故曰雖有明天子必視熒惑所在太白晉灼曰常以正月甲寅與熒惑晨出東方二百四十日而入入四十日又出西方二百四十日而入入三十五日而復出東方出以寅戌入以丑未也曰西方秋金義也言也義虧言失逆秋令傷金氣罰見太白日方南太白居其南日方北太白居其北為贏侯王不寧用兵進吉退凶日方南太白居其北日方北太白居其南為縮侯王有憂用兵退吉進凶當出不出當入不入為失舍不有破軍必有死王之墓有亡國一曰天下匽兵壄有兵者所當之國大凶當出不出未當入而入天下匽兵兵在外入未當出而出當入而不入天下起兵有至破國未當出而出未當入而入天下舉兵所當之國亡當期而出其國昌出東為東方入為北方出西為西方入為南方所居久其國利易其鄉凶蘇林曰疾過也一説易鄉而出入也晉灼曰上言出而易言疾過是也入七日復出將軍戰死入十日復出相死之入又復出人君惡之已出三日而復微入三日廼復盛出是為耎而伏晉灼曰耎退也不進而伏伏不見也其下國有軍其衆敗將北已入三日又復微出三日廼復盛入其下國有憂帥師雖衆敵食其糧用其兵虜其帥出西方失其行夷狄敗出東方失其行中國敗一曰出蚤為月食晚為天祅及彗星將發于亡道之國太白出而留桑楡間病其下國晉灼曰行遲而下也正出舉目平正出桑楡上餘二千里也上而疾未盡期日過參天病其對國晉灼曰三分天過其一此戌酉之間也太白經天天下革民更王孟康曰謂出東入西出西入東也太白隂星出東當伏東出西當伏西過午為經天晉灼曰日陽也日出則星亡晝見午上為經天是為亂紀人民流亡晝見與日爭明彊國弱小國彊女主昌太白兵象也出而髙用兵深吉淺凶埤淺吉深凶行疾用兵疾吉遲凶行遲用兵遲吉疾凶角敢戰吉不敢戰凶擊角所指吉逆之凶進退左右用兵進退左右吉靜凶圜以靜用兵靜吉趮凶出則兵出入則兵入象太白吉反之凶赤角戰太白者猶軍也而熒惑憂也故熒惑從太白軍憂離之軍舒出太白之隂有分軍出其陽有偏將之戰當其行太白還之破軍殺將辰星殺伐之氣戰鬬之象也與太白俱出東方皆赤而角夷狄敗中國勝與太白俱出西方皆赤而角中國敗夷狄勝五星分天之中積于東方中國大利積于西方夷狄用兵者利辰星不出太白為客辰星出太白為主人辰星與太白不相從雖有軍不戰辰星出東方太白出西方若辰星出西方太白出東方為格野雖有兵不戰辰星入太白中五日乃出及入而上出破軍殺將客勝下出客亡地辰星來抵太白不去將死正其上出破軍殺將客勝下出客亡地視其所指以名破軍辰星繞環太白若鬬大戰客勝主人吏死辰星過太白間可椷劒小戰客勝蘇林曰椷音函函容也其間可容一劒也居太白前旬三日軍罷出太白左小戰歴太白右數萬人戰主人吏死出太白右去三尺軍急約戰凡太白所出所直之辰其國為得位得位者戰勝所直之辰順其色而角者勝其色害者敗晉灼曰鄭色黄而赤蒼小敗宋色黄而赤黑小敗楚色赤黑小敗燕色黑黄小敗皆大角勝也太白白比狼赤比心黄比參右肩青比參左肩黑比奎大星色勝位晉灼曰有色勝得位也行勝色晉灼曰太白行得度勝有色也行得盡勝之晉灼曰行應天度雖有色得位行盡勝之行重而色位輕星經傳得字作徳辰星晉灼曰常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二句而入晨候之東方夕候之西方也曰北方冬水知也聽也知虧聽失逆冬令傷水氣罰見辰星出蚤為月食晩為彗星及天祅一時不出其時不和四時不出天下大饑失其時而出為當寒反温當温反寒當出不出是謂擊卒兵大起與它星遇而鬬天下大亂晉灼曰祅星彗孛之屬也一曰五星出於房心間地動填星晉灼曰常以甲辰元始建斗之歲填行一宿二十八歲而周天也曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填星廼為之動填星所居國吉未當居而居之若已去而復還居之國得土不乃得女子當居不居既已居之又東西去之國失土不乃失女不有土事若女之憂居宿久國福厚易福薄當居不居為失填其下國可伐得者不可伐其贏為王不寧縮有軍不復一曰既已居之又東西去之其國凶不可舉事用兵失次而上一舍三舍有王命不成不乃大水失次而下二舍有后慼其歲不復不乃天裂若地動凡五星歲與填合則為内亂與辰合則為變謀而更事與熒惑合則為饑為旱與太白合則為白衣之㑹為水太白在南歲在北名曰牝牡晉灼曰歲陽也太白隂也故曰牝牡年榖大孰太白在北歳在南年或有或亡熒惑與太白合則為喪不可舉事用兵與填合則為憂主孽卿與辰合則為北軍用兵舉事大敗填與辰合則將有覆軍下師與太白合則為疾為内兵辰與太白合則為變謀為兵憂凡歲熒惑填太白四星與辰鬬皆為戰兵不在外皆為内亂一曰火與水合為淬晉灼曰火入水故曰淬也與金合為鑠不可舉事用兵土與金合國亡地與木合則國饑與水合為雍沮晉灼曰沮音沮溼之沮水性雍而潛上故曰雍沮一曰雍填也不可舉事用兵木與金合鬬國有内亂同舍為合相陵為鬬二星相近者其殃大二星相逺者殃無傷也從七寸以内必之韋昭曰必冇禍也凡月食五星其國皆亡李竒曰謂其分野之國歲以饑熒惑以亂填以殺太白彊國以戰辰以女亂月食大角王者惡之凡五星所聚宿其國王天下從歲以義從熒惑以禮從填以重韋昭曰謂以威重得從太白以兵從辰以法以法者以法致天下也三星若合是謂驚立絶行晉灼曰有兵喪故驚改王故曰絶也其國外内有兵與喪民人乏饑改立王公四星若合是謂大湯晉灼曰湯猶盪滌也其國兵喪並起君子憂小人流五星若合是謂易行有徳受慶改立王者掩有四方子孫蕃昌亡徳受罰離其國家滅其宗廟晉灼曰宗祖廟也百姓離去被滿四方五星皆大其事亦大皆小其事亦小也凡五星色皆圜白為喪為旱赤中不平為兵青為憂為水黑為疾為多死黄吉皆角赤犯我城黄地之爭白哭泣之聲青有兵憂黒水五星同色天下匽兵百姓安寧歌舞以行不見災疾五榖蕃昌凡五星歲緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不建急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占五星不失行則年榖豐昌凡以宿星通下之變者維星散句星信則地動孟康曰散在尾北韋昭曰信音申有星守三淵天下大水地動海魚出紀星散者山崩不即有喪龜鼈星不居漢中川有易者辰星入五車大水熒惑入積水水兵起入積薪旱兵起守之亦然極後有四星名曰句星斗杓後有三星名曰維星散者不相從也孟康曰謂不復行列而聚也三淵蓋五車之三柱也晉灼曰柱音注解之注天紀屬貫索積薪在北戌西北積水在北戌東北角亢氐沇州房心豫州尾箕幽州斗江湖牽牛婺女揚州虚危青州營室東壁并州奎婁胃徐州昴畢冀州觜觿參益州東井輿鬼雍州柳七星張三河翼軫荆州甲乙海外日月不占晉灼曰海外逺甲乙日時不以占之丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷子周丑翟寅趙卯鄭辰邯鄲巳衞午秦未中山申齊酉魯戌吳越亥燕代秦之疆候太白占狼弧吳楚之疆候熒惑占鳥衡燕齊之疆候辰星占虚危宋鄭之疆候歲星占房心晉之疆亦候辰星占參罰及秦并吞三晉燕代自河山以南者中國中國於四海内則在東南為陽陽則日歲星熒惑填星占於街南畢主之其西北則胡貉月氐旃裘引弓之民為隂隂則月太白辰星占於街北昴主之故中國山川東北流其維首在隴蜀尾沒於勃海碣石是以秦晉好用兵孟康曰秦晉西南維之北為隂與胡貉引弓之民同故好用兵復占太白太白主中國而胡貉數侵掠獨占辰星辰星出入趮疾常主夷狄其大經也凡五星早出為贏贏為客晚出為縮縮為主人五星贏縮必有天應見杓太歲在寅曰攝提格歲星正月晨出東方石氏曰名監徳在斗牽牛失次杓早水晚旱甘氏在建星婺女太初歴在營室東壁在卯曰單閼二月出石氏曰名降入在婺女虚危甘氏在虚危失次杓有水災太初在奎婁在辰曰執徐三月出石氏曰名青章在營室東壁失次杓早旱晚水甘氏同太初在胃昴在已曰大荒落四月出石氏曰名路踵在奎婁甘氏同太初在參罰在午曰敦牂五月出石氏曰名啓明在胃昴畢失次杓早旱晩水甘氏同太初在東井輿鬼在未曰協洽六月出石氏曰名長烈在觜觿參甘氏在參罰太初在注張七星在申曰涒灘七月出石氏曰名天晉在東井輿鬼甘氏在弧太初在翼軫在酉曰作詻爾雅作作噩八月出石氏曰名長壬在柳七星張失次杓有女喪民疾甘氏在注張失次杓有火太初在角亢在戌曰掩茂九月出石氏曰名天睢在翼軫失次杓水甘氏在七星翼太初在氐房心在亥曰大淵獻十月出石氏曰名天皇在角亢始甘氏在軫角亢太初在尾箕在子曰困敦十一月出石氏曰名天宗在氐房始甘氏同太初在建星牽牛在丑曰赤奮若十二月出石氏曰名天昊在尾箕甘氏在心尾太初在婺女虚危甘氏太初歴所以不同者以星贏縮在前各錄後所見也其四星亦略如此古歴五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫歴者正行也古人有言曰天下太平五星循度亡有逆行日不食朔月不食望夏氏日月傳曰日月食盡主位也不盡臣位也星傳曰日者徳也月者刑也故曰日食修徳月食修刑然而歴紀推月食與二星之逆亡異熒惑主内亂太白主兵月主刑自周室衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變内臣猶不治四夷猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也詩云彼月而食則惟其常此日而食于何不臧詩傳曰月食非常也比之日食猶常也日食則不臧矣謂之小變可也謂之正行非也故熒惑必行十六舍去日逺而顓恣太白出西方進在日前氣盛乃逆行及月必食於望亦誅盛也國皇星大而赤狀類南極所出其下起兵兵彊其衝不利孟康曰歲星之精散所為也五星之精散為六十四變志記不盡也昭明星大而白無角乍上乍下所出國起兵多變孟康曰形如三足几几上有九彗上向熒惑之精也五殘星出正東東方之星其狀類辰去地可六丈大而黄孟康曰星表有青氣如暈冇毛填星之精六賊星出正南南方之星去地可六丈大而赤數動有光孟康曰形如彗芒九角太白之精司詭星出正西西方之星去地可六丈大而白類太白孟康曰星大而有尾兩角熒惑之精也咸漢星出正北北方之星去地可六丈大而赤數動察之中青孟康曰一名獄漢星青中赤表下有三彗從横亦填星之精也此四星所出非其方其下有兵衝不利四填星出四隅去地可四丈地維臧光亦出四隅去地可二丈若月始出所見下有亂者亡有徳者昌燭星狀如太白其出也不行見則滅所燭城邑亂孟康曰星上有三彗上出亦填星之精也如星非星如雲非雲名曰歸邪李竒曰邪音虵孟康曰星有兩赤彗上向上有蓋狀氣下連星歸邪出必有歸國者星者金之散氣其本曰人孟康曰星石也金石相生人與星氣相應也星衆國吉少則凶漢者亦金散氣其本曰水星多多水少則旱孟康曰漢河漢也水生於金多少謂漢中星也其大經也天鼓有音如雷非雷音在地而下及地其所住者兵發其下天狗狀如大流星孟康曰星有尾旁有彗下有如狗形者亦太白之精有聲其下止地類狗所墜及望之如火光炎炎中天其下圜如數頃田處上鋭見則有黄色千里破軍殺將格澤者如炎火之狀黄白起地而上下大上鋭其見也不種而穫不有土功必有大客蚩尤之旗類彗而後曲象旗孟康曰熒惑之精也晉灼曰吕氏春秋云其色黄上白下見則王者征伐四方旬始出於北斗旁狀如雄雞其怒青黑色象伏鼈李竒曰怒當言帑晉灼曰帑雌也或曰怒則色青宋均曰怒謂芒角刺出枉矢狀類大流星虵行而倉黑望如有毛目然長庚廣如一匹布著天此星見起兵星䃍至地則石也如淳曰䃍亦墜也天暒而見景星孟康曰暒精明也有赤方氣與青方氣相連赤方中有兩黄星青方中有一黄星凡三星合為景星也景星者徳星也其狀無常常出於有道之國日有中道月有九行中道者黄道一曰光道光道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛逺極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極逺近之差晷景長短之制也去極逺近難知要以晷景晷景者所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為温暑隂用事則日退而南晝退而短隂勝故為涼寒也故日進為暑退為寒若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也故曰為寒暑一曰晷長為潦短為旱奢為扶鄭氏曰扶當為蟠齊魯之間聲如酺酺扶聲近蟠止不行也蘇林曰景形奢大也晉灼曰扶附也小人佞媚附近君子之側也扶者邪臣進而正臣疏君子不足姦人有餘月有九行者黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一決房中道宋祁曰朱子文云房字當作於字蓋言月之行其道雖多然皆決於日之中道也故其後云至月行則以晦朔決之又曰日之所行為中道月五星皆随之也如此則一決於中道為允青赤出陽道白黑出隂道若月失節度而妄行出陽道則旱風出隂道則隂雨凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分之星為候日東行星西轉冬至昏奎八度中夏至氐十三度中春分柳一度中秋分牽牛三度七分中此其正行也日行疾則星西轉疾事埶然也故過中則疾君行急之感也不及中則遲君行緩之象也至月行則以晦朔決之日冬則南夏則北冬至於牽牛夏至於東井日之所行為中道月五星皆随之也箕星為風東北之星也東北地事天位也孟康曰東北陽日月五星起於牽牛故為天位坤在西南紐於陽為地統故為地事也故易曰東北喪朋及巽在東南為風風陽中之隂大臣之象也其星軫也月去中道移而東北入箕若東南入軫則多風西方為雨雨少隂之位也月失中道移而西入畢則多雨故詩云月離於畢俾滂沱矣言多雨也星傳曰月入畢則將相有以家犯罪者言隂盛也書曰星有好風星有好雨月之從星則以風雨言失中道而東西也故星傳曰月南入牽牛南戒民間疾疫月北入太微出坐北若犯坐則下人謀上一曰月為風雨日為寒温冬至日南極晷長南不極則温為害夏至日北極晷短北不極則寒為害故書曰日月之行則有冬有夏也政治變於下日月運於上矣月出房北為雨為隂為亂為兵出房南為旱為夭喪水旱至衝而應及五星之變必然之效也兩軍相當日暈等力均厚長大有勝薄短小亡勝重抱大破亡抱為和背為不和為分離相去直為自立立兵破軍若曰殺將抱且戴有喜圍在中中勝在外外勝青外赤中以和相去赤外青中以惡相去氣暈先至而後去居軍勝先至先去前有利後有病後至後去前病後利後至先去前後皆病居軍不勝見而去其後發病雖勝亡功見半日以上功大白􅛆屈短上下銳李奇曰屈或為尾韋昭曰短而直者或曰短屈之虹有者下大流血日暈制勝近期三十日逺期六十日其食食所不利復生生所利不然食盡為主位以其直及日所躔加日時用名其國凡望雲氣仰而望之三四百里平望在桑楡上千餘里二千里登髙而望之下屬地者居三千里雲氣有獸居上者勝自華以南氣下黑上赤嵩髙三河之郊氣正赤常山以北氣下黑上青勃碣海岱之間氣皆黑江淮之間氣皆白徒氣白土功氣黄車氣乍髙乍下往往而聚騎氣卑而布卒氣摶如淳曰摶専也音徒端反前卑而後髙者疾前方而後髙者鋭後鋭而卑者郤其氣平者其行徐前髙後卑者不止而反氣相遇者卑勝髙鋭勝方氣來卑而循車道者不過三四日去之五六里見氣來髙七八尺者不過五六日去之十餘二十里見氣來髙丈餘二丈者不過三四十日去之五六十里見捎雲精白者其將悍其士怯其大根而前絶逺者戰精白其芒低者戰勝其前赤而卬者戰不勝陳雲如立垣杼雲類杼柚雲摶而耑鋭杓雲如繩者居前竟天其半半天蜺雲者類鬬旗故鋭鉤雲句曲諸此雲見以五色占而澤摶密其見動人廼有占兵必起占鬬其直王朔所候决於日旁日旁雲氣人主象皆如其形以占故北夷之氣如羣畜穹閭南夷之氣類舟船幡旗大水處敗軍場破國之虚下有積泉金寳上皆有氣不可不察海旁蜃氣象樓臺廣壄氣成宫闕然雲氣各象其山川人民所聚積故候息耗者入國邑視封畺田疇之整治如淳曰蔡邕云麻田曰疇城郭室屋門户之潤澤次至車服畜産精華實息者吉虚耗者凶若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲慶雲見喜氣也若霧非霧衣冠不濡見則其城被甲而趨夫雷電赮􅛆辟歴夜明者陽氣之動者也春夏則發秋冬則臧故候書者亡不司天開縣物孟康曰謂天裂而見物象也天開示縣象地動坼絶山崩及陁川塞谿垘蘇林曰垘音伏伏流也如淳曰垘填塞不通也水澹地長澤竭見象城郭門閭潤息槀枯宫廟廊第人民所次䚻俗車服觀民飲食五榖草木觀其所屬倉府廐庫四通之路六畜禽獸所産去就魚鼈鳥䑕觀其所處鬼哭若謼與人逢遌訛言誠然凡候歲美惡謹候歲始歲始或冬至日産氣始萌臘明日人衆卒歲壹㑹飲食發陽氣故曰初歲正月旦王者歲首立春四時之始也四始者候之日而漢魏鮮集臘明正月旦決八風孟康曰魏鮮人姓名作占候者風從南大旱西南小旱西方有兵西北戎叔為孟康曰戎叔胡豆也為成也小雨趣兵北方為中歲東北為上歲東方大水東南民有疾疫歲惡故八風各與其衝對課多者為勝多勝少久勝亟疾勝徐旦至食為麥食至日跌為稷跌至晡為黍晡至下晡為叔下晡至日入為麻欲終日有雲有風有日當其時深而多實亡雲有風日當其時淺而少實有雲風亡日當其時深而少實有日亡雲不風當其時者稼有敗如食頃小敗孰五斗米頃大敗風復起有雲其稼復起各以其時用雲色占種所宜雨雪寒歲惡是日光明聽都邑人民之聲聲宫則歲美吉商有兵徵旱羽水角歲惡或從正月旦比數雨率日食一升至七升而極孟康曰正月一日雨而民冇一升之食二日雨民有二升之食如此至七日已來驗也過之不占數至十二日直其月占水旱孟康曰一日雨正月水也為其環域千里内占即為天下候竟正月孟康曰月三十日周天歴二十八宿然後可占天下月所離列宿日風雲占其國然必察太歲所在金穰水毁木饑火旱此其大經也正月上甲風從東方來宜蠶從西方來若旦有黄雲惡冬至短極縣土炭孟康曰先冬至三日縣土炭於衡兩端輕重適均冬至而陽氣至則炭重夏至隂氣至則土重晉灼曰蔡邕律歴記候鐘律權土炭冬至陽氣應黄鐘通土炭輕而衡仰夏至隂氣應蕤賔通土炭重而衡低進退先後五日之中炭動麋鹿解角蘭根出泉水踊略以知日至要決晷景夫天運三十歲一小變百年中變五百年大變三大變一紀三紀而大備此其大數也春秋二百四十二年間日食三十六彗星三見夜常星不見夜中星隕如雨者各一當是時禍亂輙應周室微弱上下交怨殺君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數自是之後衆暴寡大并小秦楚吳粵夷狄也為彊伯田氏簒齊三家分晉並為戰國爭於攻取兵革遞起城邑數屠因以饑饉疾疫愁苦臣主共憂患其察禨祥候星氣尤急如淳曰吕氏春秋荆人鬼越人禨今之巫祝禱祠淫祀之比也近世十二諸侯七國相王言從横者繼踵而占天文者因時務論書傳故其占驗鱗雜米鹽亡可錄者周卒為秦所滅始皇之時十五年間彗星四見久者八十日長或竟天後秦遂以兵内兼六國外攘四夷死人如亂麻又熒惑守心及天市芒角色赤如雞血始皇既死適庶相殺二世即位殘骨肉戮將相太白再經天因以張楚並興兵相跆籍蘇林曰跆音臺秦遂以亡項羽救鉅鹿枉矢西流枉矢所觸天下之所伐射滅亡象也物莫直於矢今蛇行不能直而枉者執矢者亦不正以象項羽執政亂也羽遂合從阬秦人屠咸陽凡枉矢之流以亂伐亂也漢元年十月五星聚于東井以歴推之從歲星也李奇曰歲星得其正度其四星隨比常正行故曰從也孟康曰歲星先至先至為主也劉敞曰按歴太白辰星去日率不能一兩次耳今十月而從歲星於東井非理然則五星以秦之十月聚東井耳秦之十月今七月日當在鶉尾故太白辰星得從歲星也此髙皇帝受命之符也故客謂張耳曰東井秦地漢王入秦五星從歲星聚當以義取天下秦王子嬰降於枳道漢王以屬吏寳器婦女亡所取閉宫封門還軍次於覇上以候諸侯與秦民約法三章民亡不歸心者可謂能行義矣天之所予也五年遂定天下即帝位此明歲星之崇義東井為秦之地明效也三年秋太白出西方有光幾中晉灼曰幾中近踰身也乍北乍南過期廼入辰星出四孟韋昭曰法當出四仲出四孟為易主之象也是時項羽為楚王而漢已定三秦與相距滎陽太白出西方有光幾中是秦地戰將勝而漢國將興也辰星出四孟易主之表也後二年漢滅楚七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為匃奴參為趙畢為邊兵是歲髙皇帝自將兵擊匃奴至平城為冒頓單于所圍七日廼解十二年春熒惑守心李竒曰心為天王也四月宫車晏駕應劭曰天子當晨起早作而方崩殞故稱晏駕云韋昭曰凡初崩為晏駕者臣子之心猶謂宫車當駕而出耳孝惠二年天開東北廣十餘丈長二十餘丈地動隂有餘天裂陽不足皆下盛彊將害上之變也其後有吕氏之亂孝文後二年正月壬寅天欃夕出西南孟康曰歲星之精占曰為兵喪亂其六年十一月匃奴入上郡雲中漢起三軍以衞京師其四月乙巳水木火三合於東井占曰外内有兵與喪改立王公東井秦也八月天狗下梁壄是歲誅反者周殷長安市其七年六月文帝崩其十一月戊戌土水合於危占曰為雍沮所當之國不可舉事用兵必受其殃一曰將覆軍危齊也其七月火東行行畢陽環畢東北出而西逆行至昴即南廼東行占曰為喪死寇亂畢昴趙也孝景元年正月癸酉金水合於婺女占曰為變謀為兵憂婺女粵也又為齊其七月乙丑金木水三合於張占曰外内有兵與喪改立王公張周地今之河南也又為楚其二年七月丙子火與水晨出東方因守斗占曰其國絶祀至其十二月水火合於斗占曰為淬不可舉事用兵必受其殃一曰為北軍用兵舉事大敗斗吳也又為粵是歲彗星出西南其三月立六皇子為王王淮陽汝南河間臨江長沙廣川其三年吳楚膠西膠東淄川濟南趙七國反吳楚兵先至攻梁膠西膠東淄川三國攻圍齊漢遣大將軍周亞夫等戍止河南以候吳楚之敝遂敗之吳王亡走粵粵攻而殺之平陽侯敗三國之師于齊咸伏其辜齊王自殺漢兵以水攻趙城城壊王自殺六月立皇子二人楚元王子一人為王王膠西中山楚徙濟北為淄川王淮陽為魯王汝南為江都王七月兵罷天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦吳楚攻梁梁堅城守遂伏尸流血其下三年填星在婁幾入還居奎奎魯也占曰其國得地為得填是歲魯為國四年七月癸未火入東井行隂又以九月己未入輿鬼戊寅出占曰為誅罰又為火災後二年有栗氏事其後未央東闕災中元年填星當在觜觿參去居東井占曰亡地不廼有女憂其三年正月丁亥金木合於觜觿為白衣之會三月丁酉彗星夜見西北色白長丈在觜觿旦去益小十五日不見占曰必有破國亂君伏死其辜觜觿梁也其五月甲午金木俱在東井戊戌金去木留守之二十日占曰傷成於戊木為諸侯誅將行於諸侯也其六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁卯在箕北近漢稍小旦去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宫也是時梁王欲為漢嗣使人殺漢爭臣袁盎漢按誅梁大臣斧戉用梁王恐懼布車入關伏斧戉謝罪然後得免中三年十一月庚午夕金火合於虛相去一寸占曰為鑠為喪虚齊也四年四月丙申金木合於東井占曰為白衣之會井秦也其五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月成陽王濟隂王死六月成陽公主死出入三月天子四衣白臨邸第後元年五月壬午火金合於輿鬼之東北不至柳出輿鬼北可五寸占曰為鑠有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止孝武建元三年三月有星孛于注張歴太微千紫宫至于天漢春秋星孛于北斗齊魯晉之君皆將死亂今星孛歴五宿其後濟東膠西江都王皆坐法削黜自殺淮陽衡山謀反而誅三年四月有星孛于天紀至織女占曰織女有女變天紀為地震至四年十月而地動其後陳皇后廢六年熒惑守輿鬼占曰為火變有喪是歲髙園有火災竇太后崩元光元年六月客星見于房占曰為兵起其二年十一月單于將十萬騎入武州漢遣兵三十餘萬以待之元光中天星盡㨱上以問候星者對曰星㨱者民勞也後伐四夷百姓勞于兵革元鼎五年太白入于天苑占曰將以馬起兵也一曰馬將以軍而死耗其後以天馬故誅大宛馬大死於軍元鼎中熒惑守南斗占曰熒惑所守為亂賊喪兵守之久其國絶祀南斗越分也其後越相吕嘉殺其王及太后漢兵誅之滅其國元封中星孛于河戍占曰南戍為越門北戍為胡門其後漢兵擊㧞朝鮮以為樂浪𤣥莵郡朝鮮在海中越之象也居北方胡之域也太初中星孛于招揺星傳曰客星守招揺蠻夷有亂民死君其後漢兵擊大宛斬其王招搖逺夷之分也孝昭始元中漢宦者梁成恢及燕王候星者吳莫如見蓬星出西方天市東門行過河鼔入營室中恢曰蓬星出六十日不出三年下有亂臣戮死於市後太白出西方下行一舍復上行二舍而下去太白主兵上復下將有戮死者後太白出東方入咸池東下入東井人臣不忠有謀上者後太白入太微西藩第一星北出東藩第一星北東下去太微者天庭也太白行其中宫門當閉大將被甲兵邪臣伏誅熒惑在婁逆行至奎法曰當有兵後太白入昴莫如曰蓬星出西方當有大臣戮死者太白星入東井太微庭出東門漢有死將後熒惑出東方守太白兵當起主人不勝後流星下燕萬載宫極東去李奇曰極屋梁也三輔間名為極或曰極棟也三輔間名棟為極尋棟東去也延篤謂之堂前闌楯也法曰國恐有誅其後左將軍桀驃騎將軍安與長公主燕刺王謀作亂咸伏其辜兵誅烏桓元鳳四年九月客星在紫宫中斗樞極間占曰為兵其五年六月發三輔郡國少年詣北軍五年四月燭星見奎婁間占曰有土功胡人死邊城和其六年正月築遼東𤣥莵城二月度遼將軍范明友擊烏桓還元平元年正月庚子日出時有黑雲狀如猋風亂鬊音舜轉出西北東南行轉而西有頃亡占曰有雲如衆風是謂風師法有大兵其後兵起烏孫五將征匈奴二月甲申晨有大星如月有衆星隨而西行乙酉牂雲如狗赤色長尾三枚夾漢西行大星如月大臣之象衆星隨之衆皆隨從也天文以東行為順西行為逆此大臣欲行權以安社稷占曰太白散為天狗為卒起卒起見禍無時臣運柄牂雲為亂君到其四月昌邑王賀行淫辟立二十七日大將軍霍光白皇太后廢賀三月丙戌流星出翼軫東北干太微入紫宫始出小旦入大有光入有頃聲如雷三鳴止占曰流星入紫宫天下大凶其四月癸未宫車晏駕孝宣本始元年四月壬戌甲夜辰星與參出西方其二年七月辛亥夕辰星與翼出皆為蚤占曰大臣誅其後熒惑守房之鉤鈐鉤鈐天子之御也晉灼曰上言房為天駟其隂右驂旁有二星曰鈐故曰天子御也占曰不太僕則奉車不黜即死也房心天子宫也房為將相心為子屬也其地宋今楚彭城也四年七月甲辰辰星在翼月犯之宋祁曰翼下當添軫字占曰兵起上卿死將相也是日熒惑入輿鬼天質占曰大臣有誅者名曰天賊在大人之側地節元年正月戊午乙夜月食熒惑孟康曰凡星入月見月中為星食月月奄星星滅為月食星熒惑在角亢占曰憂在宫中非賊而盜也有内亂讒臣在旁其辛酉熒惑入氐中氐天子之宫熒惑入之有賊臣其六月戊戌甲夜客星又居左右角間東南指長可二尺色白占曰有姦人在宫廷間其丙寅又有客星見貫索東北南行至七月癸酉夜入天市芒炎東南指其色白占曰有戮卿一曰有戮王期皆一年逺二年是時楚王延夀謀逆自殺四年故大將軍霍光夫人顯將軍霍禹范明友奉車霍山及諸昆弟賔婚為侍中諸曹九卿郡守皆謀反咸伏其辜黄龍元年三月客星居王梁東北可九尺長丈餘西指出閣道間至紫宫其十二月宫車晏駕元帝初元元年四月客星大如𤓰色青白在南斗第二星東可四尺占曰為水饑其五月勃海水大溢六月關東大饑民多餓死琅邪郡人相食二年五月客星見昴分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿都尉謝君男詐為神人論死父免官孟康曰姓謝名君男者兒也不記其名直言男耳五年四月彗星出西北赤黄色長八尺所後數日長丈餘東北指在參分後二歲餘西羌反孝成建始元年九月戊子有流星出文昌色白光燭地長可四丈大一圍動揺如龍虵行有頃長可五六丈大四圍所詘折委曲貫紫宫西在斗西北子亥間後詘如環北方不合留一刻所占曰文昌為上將貴相是時帝舅王鳳為大將軍其後宣帝舅子王商為丞相皆貴重任政鳳妬商譛而罷之商自殺親屬皆廢黜四年七月熒惑隃歲星居其東北半寸所如連李時歲星在關星西四尺所熒惑初從畢口大星東東北徃數日至往疾去遲占曰熒惑與歲星鬬有病君饑歲至河平元年三月旱傷麥民食楡皮二年十二月壬申太皇太后避時昆明東觀如淳曰食貨志武帝修昆明池列觀環之或曰即病謝君男故避其時劉奉世曰謝君男死在初元二年太后避時乃河平二年云病何也或説未曉四年十一月乙卯月食填星星不見時在輿鬼西北八九尺所占曰月食填星流民千里河平元年三月流民入函谷關河平二年十月下旬填星在東井軒轅南耑大星尺餘歲星在其西北尺所熒惑在其西北二尺所皆從西方来填星貫輿鬼先到歲星次熒惑亦貫輿鬼十一月上旬歲星熒惑西去填星皆西北逆行占曰三星若合是謂驚位是謂絶行外内有兵與喪改立王公其十一月丁巳夜郎王歆大逆不道牂柯太守立捕殺歆三年九月甲戌東郡莊平男子侯母辟兄弟五人羣黨為盜劉敞曰莊乃茌攻燔官寺縛縣長吏盜取印綬自稱將軍三月辛卯左將軍千秋卒右將軍史丹為左將軍四年四月戊申梁王賀薨陽朔元年七月壬子月犯心星占曰其國有憂若有大喪房心為宋今楚地十一月辛未楚王友薨四年閏月庚午飛星大如缶出西南入斗下占曰漢使匈奴明年鴻嘉元年正月匈奴單于雕陶莫臯死五月甲午遣中郎將楊興使弔永始二年二月癸未夜東方有赤色大三四圍長二三丈索索如樹南方有大四五圍劉奉世曰有字下當有氣或色字脱也下行十餘丈皆不至地滅占曰東方客之變氣狀如樹木以此知四方欲動者明年十二月己卯尉氏男子樊並等謀反賊殺陳留太守嚴普及吏民出囚徒取庫兵刧略令丞自稱將軍皆誅死庚子山陽鐵官亡徒蘇令等殺傷吏民簒出囚徒取庫兵聚黨數百人為大賊踰年經歴郡國四十餘一日有兩氣同時起並見而並令等同月俱發也元延元年四月丁酉日餔時天暒晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如雞子燿燿如雨下至昏止郡國皆言星隕春秋星隕如雨為王者失埶諸侯起伯之異也其後王莽遂顓國柄王氏之興萌於成帝時是以有星隕之變後莽遂簒國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵侯淳于長坐執左道下獄死二年春熒惑守心二月乙丑丞相翟方進欲塞災異自殺三月丙戌宫車晏駕哀帝建平元年正月丁未日出時有著天白氣廣如一匹布長十餘丈西南行讙如雷西南行一刻而止名曰天狗傳曰言之不從則有犬禍詩妖到其四年正月二月三月民相驚動讙譁奔走傳行詔籌祠西王母又曰從目人當來十二月白氣出西南從地上至天出參下貫天厠廣如一疋布長十餘丈十餘日去占曰天子有隂病其三年十一月壬子太皇太后詔曰皇帝寛仁孝順奉承聖緒靡有解怠而久病未瘳夙夜惟思殆繼體之君不宜改作春秋大復古其復甘泉泰畤汾隂后土如故二年二月彗星出牽牛七十餘日傳曰彗所以除舊布新也牽牛日月五星所從起歴數之元三正之始彗而出之改更之象也其出久者為其事大也其六月甲子夏賀良等建言當改元易號増漏刻詔書改建平二年為太初元年號曰陳聖劉太平皇帝刻漏以百二十為度八月丁巳悉復蠲除之賀良及黨與皆伏誅流放其後卒有王莽簒國之禍元夀元年十一月歲星入太微逆行干右執法占曰大臣有憂執法者誅若有罪二年十月戊寅髙安侯董賢免大司馬位歸第自殺前漢書卷二十六前漢書卷二十六考證天文志經星常宿中外官云云臣召南按後志曰孝明帝使班固敘漢書而馬續述天文志此志馬續所撰也故晉志引此文直曰馬續云暈適背穴注孟康曰暈日旁氣也暈監本訛背從宋本改中宫天極星監本接連前文自然之符也非是今另提行環之匡衞十二星藩臣皆曰紫宫臣召南按此與史記天官書同但紫宫匡衞實十五星西藩七東藩八與太微垣十二星不同晉志可証此與史記並曰十二星何也後十七星絶漢抵營室曰閣道臣召南按此志於經星俱直用天官書閣道星數天官書云六星是也何以言十七星乎晉志亦作六星疑十七二字係傳寫之訛後聚十五星曰哀烏郎位晉志作依烏郎府廷藩西有隨星四曰少微臣召南按天官書作隋星注隋音他果反此志宋本監本並作隨星葢誤東井西曲星曰戌臣召南按戌字係戊字之訛戊即古鉞字天官書曰其西曲星曰鉞又曰鉞北北河南南河又曰傷成鉞其文甚明晉志鉞一星附井之前主伺滛奢而斬之即解字義此志宋本别本並作戌字非也存説于此旁一星曰王梁天官書作王良晉志亦作王良此作梁誤曰天横横天官書作潢歲星凌穉隆曰自此以下與史記有異同太白注晉灼曰出以寅戌入以丑未也按寅戌當作辰戌戊巳中州河濟戊訛戌今改正如星非星臣永祚按監本連接上文非也今另提行又星者金之散氣旬始出于北方天暒而現景星日有中道皆自為一叚監本並連接寫今俱提行凡候歲美惡臣永祚按凡望雲氣凡候歲美惡皆自為一叚不相連接監本誤也今於每叚俱另提行十二月白氣出西南監本于十二月上衍建平元年四字從宋本删去前漢書卷二十六考證
