body:
  text: 前漢書卷六十三漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注武五子傳第三十三師古曰諸帝子傳皆言王而此獨云子者以戾太子在其中也孝武皇帝六男衛皇后生戾太子趙婕妤生孝昭帝王夫人生齊懐王閎師古曰閎音宏李姬生燕刺王旦廣陵厲王胥師古曰不知官秩故云李姬諡法暴戾無親曰刺刺音来葛反李夫人生昌邑哀王髆師古曰髆音博戾太子據元狩元年立為皇太子年七嵗矣初上年二十九乃得太子甚喜為立禖師古曰禖求子之神也解在枚臯傳使東方朔枚臯作禖祝師古曰祝禖之祝辭少壯詔受公羊春秋師古曰少壯者言漸長大也少讀如本字又従瑕丘江公受糓梁及冠就宫上為立博望苑師古曰取其廣博觀望也使通賓客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣太子之内官也太子有妃有良娣有孺子凡三等師古曰娣音弟産子男進號曰史皇孫張晏曰皆以舅氏姓為氏以相别也師古曰進者皇孫名武帝末衛后寵衰江充用事充與太子及衛氏有隙師古曰充為直指使者劾太子家車行馳道上没入車馬太子求充充不聴也恐上晏駕後為太子所誅㑹巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主師古曰両公主及皇后弟子長平侯衛伉皆坐誅師古曰伉音抗又音剛語在公孫賀江充傳充典治巫蠱既知上意白言宫中有蠱氣入宫至省中壊御座掘地上使按道侯韓說御史章贛黄門蘇文等助充師古曰說讀曰恱贛音貢充遂至太子宫掘蠱得桐木人時上疾辟暑甘泉宫師古曰辟讀曰避獨皇后太子在師古曰在亰師太子召問少傅石徳師古曰石慶子徳懼為師傅并誅因謂太子曰前丞相父子兩宫主及衛氏皆坐此今巫與使者掘地得徴騐不知巫置之邪將實有也無以自眀可矯以節收捕充等繋獄師古曰矯託也託詔命也窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報蘇林曰家吏皇后吏也臣瓉曰太子稱家家吏是太子吏也師古曰既言皇后及家吏此為皇后吏及太子吏耳瓉說是也上存亡未可知而姦臣如此太子將不念秦扶蘇事耶韋昭曰始皇死趙髙詐殺扶蘇而立胡亥也太子急然徳言征和二年七月壬午乃使客為使者收捕充等按道侯說疑使者有詐不肯受詔客格殺說御史章贛被創突亡自歸甘泉太子使舎人無且師古曰且音子閭反持節夜入未央宫殿長秋門因長御倚華鄭氏曰長音長者如淳曰漢儀注女長御比侍中皇后見娙娥以下長御稱謝倚華字也師古曰倚音於綺反具白皇后發中廐車載射士師古曰中廐皇后車馬所在也出武庫兵發長樂宫衛告令百官曰江充反廼斬充以狥炙胡巫上林中服䖍曰作巫蠱之胡人也炙燒也師古曰胡巫受充意指妄作蠱狀太子特忿且欲得其情實故以火炙之令毒痛耳遂部賓客為將率與丞相劉屈􅈊等戰長安中擾亂言太子反以故衆不肯附太子兵敗亡不得師古曰太子出亡而吏追捕不得也宋祁曰不肯越本無肯字上怒甚羣臣憂懼不知所出師古曰計無所出壺關三老茂上書曰師古曰壺關上黨之縣也荀恱漢紀云令狐茂班史不載其姓不知於何得也臣聞父者猶天母者猶地子猶萬物也故天平地安隂陽和調物乃茂成父慈母愛室家之中子廼孝順隂陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸師古曰論語云齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾豈得而食諸言父子君臣之道不立則國必危亡倉廪雖多吾不得食也昔者虞舜孝之至也而不中於瞽叟師古曰中當也瞽叟舜父也言不當其意也中音竹仲反孝巳被謗伯竒放流師古曰孝已伯竒並巳解於上骨肉至親父子相疑何者積毁之所生也由是觀之子無不孝而父有不察今皇太子為漢適嗣師古曰適讀曰嫡承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之𨽻臣耳師古曰𨽻賤也陛下顯而用之銜至尊之命以迫蹵皇太子師古曰蹵音千六反造飾姦詐羣邪錯謬是以親戚之路鬲塞而不通師古曰鬲與隔同太子進則不得上見退則困於亂臣獨寃結而亡告不忍忿忿之心起而殺充恐懼逋逃師古曰逋亡也子盗父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止於藩愷悌君子無信讒言讒言罔極交亂四國師古曰小雅青蠅之詩也營營徃來之貎也藩籬也愷樂悌易也言青蠅來徃止於藩籬變白作黑讒人搆毁間親令疏樂易之君子不當信用若讒言無極則四國亦以交亂宜深察也徃者江充讒殺趙太子天下莫不聞其罪固宜師古曰充宜得罪也陛下不省察深過太子師古曰以太子為罪過而深責之發盛怒舉大兵而求之三公自將智者不敢言辯士不敢說臣竊痛之臣聞子胥盡忠而忘其號師古曰忘亡也吳王殺之被以惡名失其善稱號比干盡仁而遺其身師古曰比干殷之賢臣以道諌紂紂怒殺之而剖其心也忠臣竭誠不顧鈇鉞之誅師古曰鈇所以斫人如今莝刃也音膚以陳其愚志在匡君安社稷也師古曰匡正也正其失也詩云取彼譖人投畀豺虎師古曰小雅巷伯之詩也言譖讒之人誠可疾惡願投與猛獸食之畀音必寐反唯陛下寛心慰意少察所親師古曰父子之道天性之親也毋患太子之非亟罷甲兵無令太子乆亡師古曰亟急也音居力反臣不勝惓惓師古曰惓讀曰拳解在劉向傳出一旦之命待罪建章闕下書奏天子感寤太子之亡也東至湖師古曰湖縣名今虢州䦩鄉湖城二縣皆其地也臧匿泉鳩里師古曰泉鳩水今在䦩鄉縣東南十五里見有戾太子冡冡在澗東也主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之師古曰贍足也而發覺吏圍捕太子太子自度不得脫師古曰度音大各反即入室距戸自經山陽男子張富昌為卒足蹋開戸新安令史李夀趨抱解太子主人公遂格鬬死皇孫二人皆并遇害上既傷太子乃下詔曰葢行疑賞所以申信也其封李夀為邘侯韋昭曰邘在河内師古曰為其解救太子也邘音于張富昌為題侯孟康曰縣名也晋灼曰地理志無也功臣表食邑鉅鹿師古曰晋說是也乆之巫蠱事多不信上知太子惶恐無他意而田千秋復訟太子寃上遂擢千秋為丞相而族滅江充家焚蘇文於横橋上孟康曰横音光師古曰即横門渭橋也及泉鳩里加兵刃於太子者初為北地太守後族上憐太子無辜乃作思子宫為歸来望思之臺於湖師古曰言已望而思之庶太子之魂来歸也其臺在今湖城縣之西閿鄉之東基趾猶存天下聞而悲之初太子有三男一女女者平輿侯嗣子尚焉及太子敗皆同時遇害衛后史良娣葬長安城南史皇孫皇孫妃王夫人及皇女孫葬廣眀蘇林曰苑名也皇孫二人随太子者與太子并葬湖師古曰今太子冡北有二冡相次則二皇孫也太子有遺孫一人史王孫子王夫人男年十八即尊位是為孝宣帝帝初即位下詔曰故皇太子在湖未有號諡嵗時祠其議諡宋祁曰楊本云多嵗時祠其議諡六字置園邑有司奏請禮為人後者為之子也故降其父母不得祭師古曰謂本生之父母也尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰閑師古曰閑猶限也謹行視孝昭帝所為故皇太子起位在湖文頴曰位冡位也師古曰行音下更反史良娣冢在博望苑北親史皇孫位在廣眀郭北如淳曰親謂父也諡法曰諡者行之迹也愚以為親諡宜曰悼皇母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冢三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園孟康曰閿古闅字從門中􅡚建安中正作閿師古曰􅡚舉目使人也􅡚音許密反閿字本從􅡚其後轉訛誤遂作門中受耳而郭璞廼音汝授反葢失理逺耳長安白亭東為戾后園廣眀成鄉為悼園皆改葬焉後八嵗有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉眀縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家齊懐王閎與燕王旦廣陵王胥同日立皆賜策各以國土風俗申戒焉曰惟元狩六年四月乙巳皇帝使御史大夫湯師古曰張湯廟立子閎為齊王師古曰於廟授策也曰嗚呼小子閎受茲青社張晏曰王者以五色土為太社封四方諸侯各以其方色土與之苴以白茅歸以立社朕承天序惟稽古建爾國家師古曰言考於古道而立子為王封于東土世為漢藩輔嗚呼念哉共朕之詔師古曰共讀曰恭言敬聼我詔惟命不于常師古曰言皇天無親惟徳是輔善則得之惡則失之人之好徳克眀顯光義之不圗俾君子怠師古曰言人若好徳則能眀顯有光輝若不圗於義則君子懈怠無歸附之者圗謀也俾使也悉爾心允執其中天祿永終師古曰能盡爾心信執中和之徳則能終天祿者也厥有愆不臧廼凶于乃國而害于爾躬師古曰臧善也乃汝也嗚呼保國乂民可不敬與王其戒之師古曰保安也乂治也與讀曰歟閎母王夫人有寵閎尤愛幸立八年薨無子國除燕刺王旦賜策曰嗚呼小子旦受茲𤣥土建爾國家封于北土世為漢藩輔嗚呼薫鬻氏虐老獸心以姦巧邊甿服䖍曰薫鬻堯時匃奴號也孟康曰甿音萌師古曰虐老謂貴少壯而食甘肥賤耆老而與粗惡也獸心言貪暴而無仁義也甿庶人薫音勲鬻音育朕命將率徂征厥罪師古曰徂徃也萬夫長千夫長三十有二帥張晏曰時所獲三十二帥也宋祁曰别本三十並作三千誤降旗奔師如淳曰昆邪王偃其旗鼓而来降也薰鬻徙域張晏曰匃奴徙東劉奉世曰匃奴徙漠奴北州以妥孟康曰古綏字也臣瓉曰妥安也師古曰瓉說是也妥音他果反悉爾心毋作怨毋作棐徳服䖍曰棐薄也師古曰棐古匪字也匪非也毋廼廢備師古曰禦邊之備不可廢非敎士不得從徵張晏曰士不素習不得應召王其戒之旦壯大就國為人辯略博學經書雜說好星歴數術倡優射獵之事招致游士及衛太子敗齊懐王又薨旦自以次第當立上書求入宿衛上怒下其使獄後坐臧匿亡命削良鄉安次文安三縣武帝由是惡旦後遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭曰璽書封小張晏曰文少則封小亰師疑有變遣幸臣夀西長孫縱之王孺等之長安師古曰之徃也以問禮儀為名王孺見執金吾廣意師古曰郭廣意問帝崩所病師古曰因何病而崩立者誰子年㡬歳廣意言待詔五莋宫師古曰莋讀與柞同宫中讙言帝崩諸將軍共立太子為帝年八九歳𦵏時不出臨師古曰臨音力禁反歸以報王王曰上棄羣臣無語言葢主又不得見甚可怪也復遣中大夫至亰師上書言竊見孝武皇帝躬聖道孝宗廟慈愛骨肉和集兆民徳配天地眀並日月威武洋溢師古曰洋溢言盛多也洋音羊逺方執寳而朝增郡數十斥地且倍師古曰斥開也封㤗山禪梁父廵狩天下逺方珍物陳於太廟徳甚休盛師古曰休羙也請立廟郡國奏報聞時大將軍霍光秉政襃賜燕王錢三千萬益封萬三千戸旦怒曰我當為帝何賜也遂與宗室中山哀王子劉長齊孝王孫劉澤等結謀詐言以武帝時受詔得職吏事修武備備非常如淳曰諸侯不得治民與職事是以為詐言受詔得知職事發兵為備也長於是為旦命令羣臣曰寡人賴先帝休徳師古曰休羙也獲奉北藩親受眀詔職吏事領庫兵飭武備師古曰飭讀與勅同飭整也任重職大夙夜兢兢子大夫將何以規佐寡人且燕國雖小成周之建國也師古曰自周以來即為燕國言以乆逺上自召公下及昭襄師古曰召公謂召公奭也昭㐮六國時燕之二王也召讀曰邵於今千載豈可謂無賢哉寡人束帯聼朝三十餘年曾無聞焉其者寡人之不及與師古曰與讀曰歟意亦子大夫之思有所不至乎其咎安在方今寡人欲撟邪防非章聞揚和師古曰撟正也章表也撟與矯同其字從手也撫慰百姓移風易俗厥路何由子大夫其各悉心以對寡人將察焉羣臣皆免冠謝郎中成軫謂旦曰大王失職獨可起而索不可坐而得也師古曰失職謂當為漢嗣而不被用也索求也大王壹起國中雖女子皆奮臂随大王旦曰前髙后時偽立子𢎞為皇帝諸侯交手事之八年師古曰交手謂拱手也呂太后崩大臣誅諸呂迎立文帝天下乃知非孝恵子也我親武帝長子反不得立上書請立廟又不聼立者疑非劉氏即與劉澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以揺動百姓澤謀歸發兵臨淄與燕王俱起旦遂招來郡國姦人賦斂銅鐡作甲兵數閱其車騎材官卒建旌旗鼓車旄頭先􅇌師古曰􅇌與驅同郎中侍從者著貂羽黄金附蟬晋灼曰以翠羽飾冠也師古曰貂羽以貂尾為冠之羽也附蟬為金蟬以附冠前也凡此旄頭先驅皆天子之制而貂羽附蟬又天子侍中之飾王僭為之皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日師古曰講習也須待也郎中韓義等數諌旦旦殺義等凡十五人會缾侯劉成知澤等謀師古曰缾侯菑川靖王子也缾音歩丁反告之青州刺史雋不疑不疑收捕澤以聞天子遣大鴻臚丞治連引燕王有詔勿治而劉澤等皆伏誅益封缾侯乆之旦姊鄂邑葢長公主張晏曰食邑鄂葢侯王信妻也師古曰為葢侯妻是也非王信信者武帝之舅耳不取鄂邑主為妻當是信子頃侯充耳左將軍上官桀父子與霍光争權有隙皆知旦怨光即私與燕交通旦遣孫縱之等前後十餘軰多齎金寳走馬師古曰走馬馬之善走者賂遺葢主上官桀及御史大夫桑𢎞羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章師古曰下音胡稼反旦聞之喜上疏曰昔秦據南面之位制一世之命威服四夷輕弱骨肉宋祁曰浙本輕字上有然字顯重異族廢道任刑無恩宗室其後尉陀入南夷陳渉呼楚澤師古曰呼音火故反近狎作亂内外俱發師古曰狎習也近習之人謂趙髙也趙氏無炊火焉韋昭曰趙秦之别氏師古曰無炊火言絶祀也髙皇帝覽蹤迹觀得失見秦建本非是故改其路規土連城布王子孫師古曰規畫也是以支葉扶疏異姓不得間也師古曰閒音工莧反今陛下承眀繼成師古曰承聖眀之後繼已成之業委任公卿羣臣連與成朋非毁宗室師古曰與謂黨與也膚受之愬日騁於廷惡吏廢法立威主恩不及下究師古曰究竟也言不終竟於下臣聞武帝使中郎將蘇武使匈奴見留二十年不降還亶為典屬國師古曰亶音但今大將軍長史敞無勞為搜粟都尉師古曰楊敞也又將軍都郎羽林張晏曰都試郎羽林也師古曰都大也謂大㑹試之漢光祿挈令諸當試者不㑹都所免之宋祁曰又將軍浙本作又聞大將軍道上移蹕如淳曰移猶傳也太官先置師古曰昭紀云詐令人為燕王旦上書又云上曰朕知此書詐也將軍都郎屬耳燕王何以得知之而此傳乃云旦自上疏此下又云帝覺有詐遂親信光參錯不同疑此傳為誤臣旦願歸符璽入宿衛察姦臣之變是時昭帝年十四覺其有詐遂親信霍光而疏上官桀等桀等因謀共殺光廢帝迎立燕王為天子旦置驛書徃来相報許立桀為王外連郡國豪桀以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕易車騎將軍少而驕臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之師古曰鄉讀曰嚮正讙不可止師古曰人衆既多故讙譁也大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂羣臣葢主報言獨患大將軍與右將軍王莾張晏曰天水人也字稚叔今右將軍物故師古曰謂死也丞相病幸事必成徵不乆令羣臣皆裝是時天雨虹下屬宫中師古曰屬猶注也音之欲反飲井水井水泉竭宋祁曰越本無泉字厠中豕羣出壊大官竈師古曰厠養豕圂也圂音胡困反烏鵲鬬死䑕舞殿端門中師古曰端門正門也殿上戸自閉不可開天火燒城門大風壊宫城樓折㧞樹木流星下墯后姬以下皆恐王驚病使人祠葭水台水晋灼曰地理志葭水在廣平南和台水在鴈門師古曰葭音家台音怡王客吕廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者語具在五行志王愈憂恐謂廣等曰謀事不成妖祥數見兵氣且至奈何㑹葢主舎人父燕倉知其謀告之由是發覺丞相賜璽書部中二千石逐捕孫縱之及左將軍桀等皆伏誅旦聞之召相平曰事敗遂發兵乎平曰左將軍已死百姓皆知之不可發也王憂懣師古曰懣音滿又音悶解在司馬遷傳置酒萬載宫㑹賓客羣臣妃妾坐飲王自歌曰歸空城兮狗不吠雞不鳴横術何廣廣兮固知國中之無人蘇林曰廣音曠臣瓉曰術道路也師古曰廣讀如本字此歌意言身死之後國當空也華容夫人起舞曰髪紛紛兮窴渠孟康曰窴音羃髪歴羃挂岸也臣瓉曰窴塞溝渠師古曰瓉說是也窴音徒千反骨籍籍兮亡居師古曰籍籍從横皃也居處也母求死子兮妻求死夫裴囘両渠間兮君子獨安居師古曰置酒之宫池沼所在其間有渠故即其所見以為歌辭也坐者皆泣有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之眀光殿王曰老虜曹為事當族師古曰曹軰也欲自殺左右曰黨得削國師古曰黨音他朗反幸不死后姬夫人共啼泣止王會天子使使者賜燕王璽書曰昔髙皇帝王天下建立子弟以藩屏社稷先日諸呂隂謀大逆劉氏不絶若髪賴絳侯等誅討賊亂尊立孝文以安宗廟非以中外有人表裏相應故邪樊酈曹灌攜劒推鋒師古曰樊噲酈商曹參灌嬰等從髙皇帝墾菑除害耘鉏海内師古曰菑古災字當此之時頭如蓬葆頭乆不理如蓬草羽葆也師古曰草叢生曰葆音保宋祁曰浙本注文頭字上有服䖍曰三字勤苦至矣然其賞不過封侯今宗室子孫曾無暴衣露冠之勞裂地而王之分財而賜之父死子繼兄終弟及今王骨肉至親敵吾一體師古曰言若四肢之一也廼與他姓異族謀害社稷親其所疏疏其所親有逆悖之心無忠愛之義如使古人有知當何面目復奉齊酎見髙祖之廟乎師古曰古人謂先人旦得書以符璽屬醫工長師古曰屬委也醫工長王官之主醫者也屬音之欲反謝相二千石奉事不謹死矣即以綬自絞后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰刺王旦立三十八年而誅國除後六年宣帝即位封旦兩子慶為新昌侯賢為安定侯又立故太子建是為廣陽頃王二十九年薨子穆王舜嗣二十一年薨子思王璜嗣二十年薨宋祁曰二十年浙本作二十九年子嘉嗣王莾時皆廢漢藩王為家人嘉獨以獻符命封扶羙侯賜姓王氏廣陵厲王胥賜策曰嗚呼小子胥受茲赤社建爾國家封於南土世世為漢藩輔劉攽曰多一世字古人有言曰大江之南五湖之間其人輕心揚州保彊李奇曰保恃也三代要服不及以正師古曰要服次荒服之内者也正政也要音一遥反烏呼悉爾心祗祗兢兢廼恵廼順師古曰祗祗敬也兢兢順也言當慈恵於下忠順於上也毋桐好逸毋邇宵人應劭曰無好逸游之事邇近小人也張晏曰桐音同師古曰桐音通桐輕脫之貌也惟法惟則師古曰言當依法則書云臣不作福不作威師古曰周書洪範云臣無有作威作福也靡有後羞王其戒之師古曰言宜戒慎勿令後有羞辱之事也胥壯大好倡樂逸㳺力扛鼎師古曰扛舉也音江空手摶熊彘猛獸動作無法度故終不得為漢嗣昭帝初立益封胥萬三千戸元鳳中入朝復益萬戸賜錢二千萬黄金二千斤安車駟馬寳劒及宣帝即位封胥四子聖曾寳昌皆為列侯又立胥小子𢎞為髙宻王所以襃賞甚厚始昭帝時胥見上年少無子有覬欲心師古曰覬音冀而楚地巫鬼師古曰言其土俗尊尚巫鬼之事胥迎女巫李女湏使下神祝詛師古曰女湏者巫之名也女湏泣曰孝武帝下我左右皆伏師古曰見女湏云武帝神下故伏而聼之言吾必令胥為天子胥多賜女湏錢使禱巫山師古曰即楚地之巫山也㑹昭帝崩胥曰女湏良巫也殺牛塞禱師古曰以為因禱祝詛而崩也塞音先代反及昌邑王徴復使巫祝詛之後王廢胥寖信女湏等師古曰寖古浸字也寖漸也益也數賜予錢物宣帝即位胥曰太子孫何以反得立復命女湏祝詛如前又胥女為楚王延夀后弟婦數相餽遺通私書師古曰餽亦饋字後延夀坐謀反誅辭連及胥有詔勿治賜胥黄金前後五千斤它器物甚衆胥又聞漢立太子謂姬南等曰我終不得立矣乃止不詛後胥子南利侯寳坐殺人奪爵還歸廣陵與胥姬左修姦事發覺繋獄棄市相勝之奏奪王射陂草田以賦貧民張晏曰射水之陂在射陽縣奏可胥復使巫祝詛如前胥宫園中棗樹生十餘莖莖正赤葉白如素池水變赤魚死有䑕晝立舞王后庭中胥謂姬南等曰棗水魚䑕之怪甚可惡也居數月祝詛事發覺有司案騐胥惶恐藥殺巫及宫人二十餘人以絶口公卿請誅胥天子遣廷尉大鴻臚即訊師古曰就問也宋祁曰浙本鴻臚字下有卿字胥謝曰罪死有餘誠皆有之師古曰誠實也事乆逺請歸思念具對胥既見使者還置酒顯陽殿召太子覇及子女董訾胡生等夜飲師古曰董訾胡生皆女名宋祁曰注文當云皆其女名使所幸八子郭昭君家人子趙左君等鼓瑟歌舞師古曰八子姬妾之秩號也家人子無官秩者也王自歌曰欲乆生兮無終長不樂兮安窮師古曰人所以欲乆生者貴其安豫無有終極而我在生長不歡樂焉用窮盡年夀也奉天期兮不得須臾張晏曰奉天子期當死不得復延年千里馬兮駐待路張晏曰二卿亭驛待以答詔命黄泉下兮幽深人生要死何為苦心師古曰言人生必當有死無假勞心懐悲戚何用為樂心所喜出入無悰為樂亟韋昭曰悰亦樂也音裁宗反亟數亦疾也謂不乆也言人生以何為樂但以心志所喜好耳今我出入皆無歡怡不得乆長也喜音許吏反亟音丘吏反蒿里召兮郭門閱師古曰蒿里死人里死不得取代庸身自逝師古曰言死當自去不如他徭役得顧庸自代也逝合韻音上列反左右悉更涕泣奏酒師古曰更互也奏進也更音工衡反至雞鳴時罷胥謂太子覇曰上遇我厚今負之甚我死骸骨當暴幸而得𦵏薄之無厚也即以綬自絞死父八子郭昭君等二人皆自殺宋祁曰姚本父作及天子加恩赦王諸子皆為庶人賜諡曰厲王立六十四年而誅國除後七年元帝復立胥太子覇是為孝王十三年薨子共王意嗣師古曰共讀曰恭三年薨子哀王䕶嗣十六年薨無子絶後六年成帝後立孝王子守宋祁曰後立姚本作復立是為靖王立二十年薨子宏嗣王莽時絶初髙宻哀王𢎞本始元年以廣陵王胥少子立九年薨子頃王章嗣三十三年薨子懐王寛嗣十一年薨子慎嗣王莽時絶昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徴王賀典䘮師古曰令為䘮主璽書曰制詔昌邑王師古曰太后璽書使行大鴻臚事少府樂成師古曰史樂成宗正徳光禄大夫吉師古曰丙吉也中郎將利漢師古曰不知姓徴王乘七乘傳詣長安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諌王令還郎謁者五十餘人賀到濟陽求長鳴雞師古曰鳴聲長者也道買積竹杖文穎曰合竹作杖也過𢎞農使大奴善以衣車載女子師古曰凡言大奴者謂奴之尤長大者也至湖師古曰即湖縣使者以讓相安樂張晏曰使者長安使人也師古曰讓責也安樂告遂遂入問賀賀曰無有遂曰即無有何愛一善以毁行義請收屬吏師古曰以善付吏也屬音之欲反其下亦同以湔洒大王師古曰湔澣也洒濯也湔音子顛反洒音先禮反即捽善屬衛士長行法師古曰捽持頭也衛士長主衛之官捽音材兀反賀到霸上大鴻臚郊迎騶奉乘輿車王使僕夀成御郎中令遂參乘旦至廣眀東都門遂曰禮奔䘮望見國都哭此長安東郭門也賀曰我嗌痛不能哭師古曰嗌喉咽也音益至城門遂復言賀曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北文頴曰弔哭帳也師古曰是謂此未至帳所有南北行道馬足未至數歩大王宜下車鄉闕西面伏哭盡哀止師古曰鄉讀曰嚮王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行􅁋亂大將軍先與羣臣議白孝昭皇后廢賀歸故國賜湯沐邑二千戸故王家財物皆與賀及哀王女四人各賜湯沐邑千戸語在霍光傳國除為山陽郡初賀在國時數有怪嘗見白犬髙三尺無頭其頸以下似人而冠方山冠後見熊宋祁曰浙本後作復左右皆莫見又大鳥飛集宫中王知惡之輙以問郎中令遂遂為言其故語在五行志王卬天歎曰不祥何為數来師古曰卬讀曰仰遂叩頭曰臣不敢隠忠數言危亡之戒大王不說師古曰說讀曰恱夫國之存亡豈在臣言哉願王内自揆度師古曰度音徒各反大王誦詩三百五篇人事浃王道備師古曰浃徹也音子牒反王之所行中詩一篇何等也師古曰言王所行皆不合法度王自謂當於何詩之文也中音竹仲反大王位為諸侯王行汙於庶人師古曰汙濁也以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不乆祅祥數至血者隂憂象也宜畏慎自省賀終不改節居無何徴既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆師古曰版瓦大瓦也發視之青蠅矢也以問遂遂曰陛下之詩不云乎蘇林曰猶言陛下所讀之詩也營營青蠅至於藩愷悌君子毋信讒言師古曰已解于上陛下左側讒人衆多如是青蠅惡矣師古曰惡即矢也越王句踐為吳王嘗惡亦其義也宜進先帝大臣子孫親近以為左右如不忍昌邑故人師古曰如若也不忍謂不能疏逺也信用讒諛必有凶咎願詭禍為福師古曰詭猶反皆放逐之臣當先逐矣賀不用其言卒至於廢大將軍光更尊立武帝曽孫是為孝宣帝即位心内忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盗賊察徃来過客毋下所賜書師古曰宻令警察不欲宣露也敞於是條奏賀居處著其廢亡之效師古曰著眀也曰臣敞地節三年五月視事故昌邑王居故宫奴婢在中者百八十三人閉大門開小門亷吏一人為領錢物市買朝内食物師古曰每旦一内之它不得出入師古曰食物之外皆不得妄有出入督盗一人别主徼循察徃来者以王家錢取卒迾宫清中備盗賊李竒曰迾遮也鄧展曰令其宫中清靖不得妄有異人也師古曰以王家錢顧人為卒也臣敞數遣丞吏行察師古曰行音下更反四年九月中臣敞入視居處狀故王年二十六七為人青黒色小目鼻末銳卑少須眉身體長大疾痿行歩不便師古曰痿風痺疾也音人佳反衣短衣大絝冠恵文冠蘇林曰治獄法冠也孟康曰今侍中所著也服䖍曰武冠也或曰趙恵文王所服故曰恵文晉灼曰柱後恵文法冠也但言恵文侍中冠孟說是也佩玉環簪筆持牘趨謁師古曰簪筆挿筆於首也牘木簡也臣敞與坐語中庭閱妻子奴婢臣敞欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復来東至濟陽廼復聞梟聲臣敞閱至子女持轡師古曰賀之子女名持轡故王跪曰持轡母嚴長孫女也臣敞故知執金吾嚴延年字長孫女羅紨師古曰羅紨其名也紨音敷前為故王妻察故王衣服言語跪起清狂不恵蘇林曰凡狂者隂陽脉盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不慧曰清狂清狂如今白癡也妻十六人子二十二人其十一人男十一人女昧死奏名籍及奴婢財物簿臣敞前書言昌邑哀王歌舞者張修等十人無子又非姬但良人無官名王薨當罷歸太傅豹等擅留以為哀王園中人所不當得為師古曰於法不當然請罷歸故王聞之曰中人守園疾者當勿治相殺傷者當勿法欲令亟死太守奈何而欲罷之師古曰亟急也音居力反其天資喜由亂亡終不見仁義如此師古曰喜好也由從也喜音許吏反後丞相御史以臣敞書聞奏可皆以遣上由此知賀不足忌其眀年春廼下詔曰葢聞象有罪舜封之骨肉之親析而不殊師古曰析分也殊絶也其封故昌邑王賀為海昬侯食邑四千户師古曰海昬豫章之縣侍中衛尉金安上上書言賀天之所棄陛下至仁復封為列侯賀嚚頑放廢之人不宜得奉宗廟朝聘之禮奏可賀就國豫章數年揚州刺史柯奏賀師古曰柯者刺史之名也與故太守卒史孫萬世交通萬世問賀前見廢時何不堅守毋出宫斬大將軍而聼人奪璽綬乎賀曰然失之萬世又以賀且王豫章不乆為列侯賀曰且然師古曰謂亦將如此非所宜言有司案騐請逮捕制曰削戸三千後薨豫章太守廖奏言舜封象於有鼻師古曰廖太守名也有鼻在零陵今鼻亭是也廖音聊死不為置後以為暴亂之人不宜為太祖師古曰謂一國之始祖海昬侯賀死上當為後者子充國師古曰上謂由上其名於有司充國死復上弟奉親奉親復死是天絶之也陛下聖仁於賀甚厚雖舜於象無以加也宜以禮絶賀以奉天意願下有司議議皆以為不宜為立嗣國除元帝即位復封賀子代宗為海昬侯傳子至孫今見為侯贊曰巫蠱之禍豈不哀哉此不惟一江充之辜亦有天時非人力所致焉建元六年蚩尤之旗見其長竟天後遂命將出征略取河南建置朔方其春戾太子生劉奉世曰按武紀建元六年長星見更元光至元朔元年春戾太子始生賛殊為乖誤自是之後師行三十年兵所誅屠夷滅死者不可勝數及巫蠱事起亰師流血僵尸數萬師古曰僵偃也音居羊反太子子父皆敗故太子生長於兵與之終始何獨一嬖臣哉秦始皇即位三十九年内平六國外攘四夷死人如亂麻暴骨長城之下頭盧相屬於道師古曰盧頟骨也屬連也音之欲反不一日而無兵由是山東之難興四方潰而逆秦秦將吏外畔宋祁曰一本無下秦字賊臣内發亂作蕭牆禍成二世師古曰蕭牆謂屏牆也解在五行志故曰兵猶火也弗戢必自焚師古曰左傳隠四年衛有州吁之亂公問於衆仲曰州吁其成乎對曰兵猶火也不戢將自焚也言兵不可妄動乆而不戢則自焚燒戢歛也信矣是以倉頡作書止戈為武師古曰武字從止從戈所謂㑹意聖人以武禁暴整亂止息兵戈非以為殘而興縱之也易曰天之所助者順也人之所助者信也君子履信思順自天祐之吉無不利也師古曰易上繋辭也故車千秋指眀蠱情章太子之寃千秋材知未必能過人也以其銷惡運遏亂原師古曰遏止也音一曷反因衰激極道迎善氣師古曰激去至極之災引致福善之氣也道讀曰導傳得天人之祐助云師古曰傳引也前漢書卷六十三前漢書卷六十三考證戾太子傳上為立博望苑三輔黄圗曰苑在長安杜門外五里具白皇后發中廐車載射士注中廐皇后車馬所在也胡三省曰廐者天子之内廐也秦二世時公子髙曰中廐之寳馬得賜之非専主皇后車馬也有司奏請禮為人後云云臣召南按韋元成傳此議本始元年丞相蔡義等所奏也後八嵗有司復言禮父為士云云元康元年丞相魏相等所奏也長安白亭東為戾后園顧炎武曰此文云爾下云後八嵗封戾夫人曰戾后置園奉邑此兩收而未貫通者也燕刺王旦傳三十有二帥臣召南按事見霍去病傳上嘉去病之功曰渾邪王及厥衆萌咸奔於率降異國之王三十二大獵文安縣顧炎武曰上文言武帝時旦坐削良郷安次文安三縣是文安已削不屬燕又云昭帝立褒賜燕王益封萬三千戸然則文安之仍屬於燕必在益封之後也史文之互見者可以恭考得之廣陵厲王胥傳孝武帝下我注師古云云顧炎武曰言孝武帝降憑其身而言也昌邑王賀傳徴王乘七乘傳胡三省曰文帝之入立也乘六乘傳今乘七乘傳嘗見白犬髙三尺無頭通鑑考異曰傳云無頭五行志云無尾且云不得置後之象傳誤也臣敞故知執金吾嚴延年字長孫臣召南按此嚴延年即公卿表地莭三年所書之執金吾延年與酷吏傳嚴延年字次卿者不同前漢書卷六十三考證
