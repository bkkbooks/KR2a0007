body:
  text: 前漢書卷二十九漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注溝洫志第九應劭曰溝廣四尺深四尺洫廣深倍於溝師古曰洫音許域反夏書禹堙洪水十三年師古曰堙塞也洪水汜溢疏通而止塞之堙音因過家不入門陸行載車水行乗舟泥行乗毳孟康曰毳形如箕擿行泥上如淳曰毳音茅蕝之蕝謂以板置泥上以通行路也師古曰孟説是也毳讀如夲字山行則梮如淳曰梮謂以鐡如錐頭長半寸施之履下以上山不蹉跌也韋昭曰梮木器如今輿牀人舉以行也師古曰如説是也梮音居足反以别九州師古曰分其界隨山浚川師古曰順山之高下而深其流任土作貢師古曰任其土地所有以定貢賦之差也通九道陂九澤度九山師古曰言通九州之道及鄣遏其澤商度其山也度音大各反然河葘之羡溢害中國也尤甚師古曰羡讀與衍同音弋戰反唯是為務故道河自積石師古曰道治也引也從積石山而治引之令通流也道讀曰導歴龍門南到華隂東下底柱師古曰底音之履反及明津雒内至于大伾鄭氏曰山一成為伾在脩武武徳界張晏曰成臯縣山是也臣瓚以為今修武武德無此山也成臯縣山又不一成也今黎陽山臨河豈是乎師古曰内讀曰汭伾音皮彼反解在地理志劉奉世曰瓚説是也師古以為在成臯非也宋祁曰明邵本作盟於是禹以為河所從來者高水湍悍難以行平地師古曰急流曰湍悍勇也湍音它端反數為敗廼釃二渠以引其河孟康曰釃分也分其流泄其怒也二渠其一出貝邱西南南折者也其一則漯川也河自王莽時遂空唯用漯耳師古曰釃音山支反漯音它合反北載之高地過降水至於大陸播為九河師古曰播布也同為逆河入于勃海臣瓚以為禹貢夹右碣石入于河則河入海乃在碣石也武帝元光二年河移徙東郡更注勃海禹時不注也師古曰解在地理志九川既疏九澤既陂諸夏乂安師古曰疏分流功施乎三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衞與濟汝淮泗會於楚劉奉世曰一鴻溝固不能旁通六國數百里之間又濟自從千乗入海安得會於楚也西方則通渠漢川雲夢之際東方則通溝江淮之間於吴則通渠三江五湖於齊則通淄濟之間於蜀則蜀守李冰鑿離􅕞晉灼曰􅕞古堆字也􅕞岸也師古曰音丁回反避沫水之害師古曰沫音本末之末沫水出蜀西南徼外東南入江穿二江成都中此渠皆可行舟有餘則用漑師古曰漑灌也音工代反百姓饗其利至於它往往引其水用漑田溝渠甚多然莫足數也魏文侯時西門豹為鄴令有令名師古曰有善政之稱至文侯曽孫襄王時與羣臣飲酒王為羣臣祝曰令吾臣皆如西門豹之為人臣也史起進曰魏氏之行田也以百畝師古曰賦田之法一夫百畝也鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也於是以史起為鄴令遂引漳水溉鄴以富魏之河内民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱蘇林曰終古猶言久古也爾雅曰鹵鹹苦也師古曰舄即斥鹵也謂鹹鹵之地也其後韓聞秦之好興事欲罷之無令東伐如淳曰息秦滅韓之計也師古曰罷讀曰疲令其疲勞不能出兵廼使水工鄭國間說秦師古曰間音居莧反其下亦同令鑿涇水自中山西邸瓠口為渠師古曰中讀曰仲即今九㚇之東仲山也邸至也竝北山東注洛三百餘里師古曰竝音歩浪反洛水即馮翊漆沮水欲以溉田中作而覺師古曰中作謂用功中道事未竟也秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也臣為韓延數嵗之命而為秦建萬世之功秦以為然卒使就渠渠成而用溉注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾師古曰注引也閼讀與淤同音於據反填淤謂壅泥也言引淤濁之水灌鹹鹵之田更令肥羙故一畝之收至六斛四斗於是關中為沃野無凶年秦以富彊卒并諸侯因名曰鄭國渠漢興三十有九年孝文時河決酸棗東潰金隄師古曰潰横決也金隄河隄名也在東郡白馬界隄丁奚反於是東郡大興卒塞之其後三十六歲孝武元光中河決於􅉚子東南注鉅野師古曰鉅野澤名舊屬兗州界即今之鄆州鉅野縣通於淮泗上使汲黯鄭當時興人徒塞之輒復壊是時武安侯田蚡為丞相其奉邑食鄃鄃居河北師古曰奉音扶用反鄃音輸清河之縣也河決而南則鄃無水災邑收入多蚡言於上曰江河之決皆天事未易以人力彊塞彊塞之未必應天而望氣用數者亦以為然是以久不復塞也時鄭當時為大司農言異時關東漕粟從渭上師古曰異時往時也度六月罷師古曰計度其功六月而後可罷也度音大各反而渭水道九百餘里時有難處引渭穿渠起長安旁南山下師古曰旁音歩浪反至河三百餘里徑易師古曰徑直也易音弋豉反漕度可令三月罷劉奉世曰按今渭汭至長安僅三百里固無九百餘里而云穿渠起長安旁南山至河中間隔㶚産數大川固又無緣山成渠之理此説可疑今亦無其迹罷而渠下民田萬餘頃又可得以溉此損漕省卒而益肥關中之地得穀上以為然令齊人水工徐伯表師古曰廵行穿渠之䖏而表記之今之豎標是發卒數萬人穿漕渠三嵗而通以漕大便利其後漕稍多而渠下之民頗得以溉矣後河東守畨係師古曰姓畨名係也畨音普安反言漕從山東西嵗百餘萬石師古曰謂從山東運漕而西入關也更底柱之艱師古曰更歴也音庚敗亡甚多而煩費穿渠引汾溉皮氏汾隂下引河溉汾隂蒲坂下師古曰引汾水可用溉皮氏及汾隂以下而引河水可用溉汾隂及蒲坂以下地形所宜也度可得五千頃故盡河耎棄地師古曰謂河岸以下緣河邉地素不耕墾者也耎音而緣反宋祁曰耎邵夲作堧民茭牧其中耳師古曰茭乾草也謂收茭草及牧畜産於其中茭音交今溉田之師古曰溉而種之度可得榖二百萬石以上榖從渭上與關中無異師古曰雖從關外而来於渭水運上皆可致之故曰與關中收榖無異也而底柱之東可母復漕上以為然發卒數萬人作渠田數嵗河移徙渠不利田者不能償種師古曰言所收之直不足償糧種之費也種音之勇反久之河東渠田廢予越人令少府以為稍入如淳曰時越人冇徙者以田與之其租税入少府也師古曰越人習於水田又新至未有業故與之也稍漸也其入未多故謂之稍也其後人有上書欲通襃斜道及漕師古曰襃斜二谷名其谷皆各自冇水耳斜音弋奢反事下御史大夫張湯湯問之言抵蜀從故道故道多阪回逺師古曰抵至也故道屬武都有蠻夷故曰道即今鳯州界也回音胡内反今穿襃斜道少阪近四百里而襃水通沔斜水通渭皆可以行船漕漕從南陽上沔入襃襃絶水至斜間百餘里以車轉從斜下渭如此漢中榖可致而山東從沔無限便於底柱之漕且襃斜材木竹箭之饒儗於巴蜀師古曰儗比也上以為然拜湯子卬為漢中守發數萬人作襃斜道五百餘里道果便近而水多湍石不可漕其後嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃故惡地師古曰臨晉重泉皆馮翊之縣也洛即漆沮水誠即得水可令畝十石於是為發卒萬人穿渠自徴引洛水至商顔下應劭曰徵在馮翊商顔山名也師古曰徴音懲即今所謂澄城也商顔商山之顔也謂之顔者譬人之顔額也亦猶山領象人之頸領劉奉世曰洛水南入渭商山乃在渭水之南甚逺何由穿渠至其下也盖自别一山名顔説失之岸善崩如淳曰洛水岸也師古曰善崩言憙崩也乃鑿井深者四十餘丈往往為井井下相通行水水隤以絶商顔師古曰下流曰隤東至山領十餘里間井渠之生自此始穿得龍骨故名曰龍首渠作之十餘嵗渠頗通猶未得其饒自河決瓠子後二十餘嵗嵗因以數不登而梁楚之地尤甚上既封禪廵祭山川其明年乾封少雨師古曰乾音干解在郊祀志上廼使汲仁郭昌發卒數萬人塞瓠子決河於是上以用事萬里沙則還自臨決河湛白馬玉璧師古曰湛讀曰沈沈馬及璧以禮水神也令羣臣從官自將軍以下皆負薪窴決河師古曰寘音大千反是時東郡燒草以故薪柴少而下淇園之竹以為揵晉灼曰淇園衞之苑也如淳曰樹竹塞水決之口稍稍布揷按樹之水稍弱補令密謂之揵以草塞其中乃以土填之有石以石為之師古曰揵音其偃反上既臨河決悼功之不成廼作歌曰瓠子決兮將奈何浩浩洋洋慮殫為河如淳曰殫盡也師古曰浩浩洋洋皆水盛貌慮猶恐也浩音胡老反洋音羊殫為河兮地不得寧功無已時兮吾山平如淳曰恐水漸山使平也韋昭曰鑿山以填河師古曰韋説是也已止也言用功多不可畢止也吾山平兮鉅野溢如淳曰瓠子決灌鉅野澤使溢也魚弗鬱兮柏冬日孟康曰鉅野滿溢則衆魚弗鬱而滋長廹冬日乃止也師古曰弗鬰憂不樂也水長涌溢濊濁不清故魚不樂又廹於冬日将甚困也柏與廹同弗音佛正道㢮兮離常流晉灼曰言河道皆㢮壊蛟龍騁兮放逺游歸舊川兮神哉沛臣瓚曰水還舊道則羣害消除神祐滂沛也師古曰沛音普大反不封禪兮安知外師古曰言不因廵狩封禪而出則不知關外有此水皇謂河公兮何不仁張晏曰皇武帝也河公河伯也泛濫不止兮愁吾人齧桑浮兮淮泗滿如淳曰齧桑邑名為水所浮漂久不反兮水維緩師古曰水維水之綱維也一曰河湯湯兮激潺湲師古曰歌有二章自河湯湯以下更是其一故云一曰也湯湯疾貌也潺湲激流也湯音傷潺音仕連反湲音于權反北渡回兮迅流難師古曰迅疾也音訊搴長茭兮湛羙玉如淳曰搴取也茭草也音郊一曰茭竿也取長竿樹之用著石間以塞決河也臣瓚曰竹葦絙謂之茭也所以引置土石也師古曰瓚説是也搴㧞也絙索也湛羙玉者以祭河也茭字宜從竹搴音騫茭音交又音爻湛讀曰沈絙音工登反河公許兮薪不屬如淳曰旱燒故薪不足也師古曰沈玉禮神見許福祐但以薪不屬逮故無功也屬音之欲反薪不屬兮衞人罪師古曰東郡本衞地故言此衞人之罪也燒蕭條兮噫乎何以御水師古曰燒草皆盡故野蕭條然也噫乎嘆辭噫音於期反隤林竹兮犍石葘師古曰隤林竹者即上所説下淇園之竹以為犍也石菑者謂臿石立之然後以土就填塞之也菑亦臿耳音側其反義與臿同宣防塞兮萬福来於是卒塞瓠子築宫其上名曰宣防而道河北行二渠復禹舊迹師古曰道讀曰導而梁楚之地復寧無水災自是之後用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而關中靈軹成國湋渠如淳曰地理志盩厔有靈軹渠成國渠名在陳倉湋音韋水出韋谷引諸川汝南九江引淮東海引鉅定臣瓚曰鉅定澤名也泰山下引汶水師古曰汶音問皆穿渠為溉田各萬餘頃它小渠及陂山通道者不可勝言也師古曰陂山因山之形也道引也陂音彼義反道讀曰導一曰陂山遏山之流以為陂也音彼皮反自鄭國渠起至元鼎六年百三十六嵗而兒寛為左内史奏請穿鑿六輔渠師古曰在鄭國渠之裏今尚謂之輔渠亦曰六渠也以益溉鄭國傍髙卬之田師古曰素不得鄭國之溉灌者也卬謂上向也讀曰仰上曰農天下之本也泉流灌濅所以育五榖也師古曰濅古浸字左右内史地名山川原甚衆細民未知其利故為通溝瀆畜陂澤師古曰畜讀曰蓄所以備旱也今内史稻田租挈重不與郡同師古曰租挈收田租之約令也郡謂四方諸郡也挈音苦計反其議減令吏民勉農盡地利平繇行水勿使失時師古曰平繇者均齊渠堰之力後謂俱得水利也繇讀曰徭後十六嵗大始二年趙中大夫白公鄭氏曰白姓公爵時人多相謂為公師古曰此時無公爵盖相呼尊老之稱耳復奏穿渠引涇水首起谷口尾入櫟陽師古曰谷口今雲陽縣治谷是也注渭中袤二百里師古曰袤長也音茂溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後師古曰鄭國興於秦時故云前舉臿為雲決渠為雨師古曰臿鍪也所以開渠者也涇水一石其泥數斗且溉且糞長我禾黍如淳曰水渟淤泥可以當糞衣食京師億萬之口言此兩渠饒也是時方事匈奴興功利言便宜者甚衆齊人延年上書師古曰史不得其姓言河出昆侖經中國注勃海是其地埶西北高而東南下也可案圖書觀地形令水工準高下開大河上領晉灼曰上領山頭也出之胡中東注之海如此關東長無水災北邉不憂匈奴可以省隄防備塞士卒轉輸胡寇侵盗覆軍殺將暴骨原野之患天下常備匈奴而不憂百越者以其水絶壤斷也此功壹成萬世大利書奏上壯之報曰延年計議甚深然河廼大禹之所道也師古曰道讀曰導聖人作事為萬世功通於神明恐難改更自塞宣房後河復北決於館陶分為屯氏河師古曰屯音大門反而隋室分析州縣誤以為毛氏河乃置毛州失之甚矣東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兗州以南六郡無水憂宣帝地節中光禄大夫郭昌使行河北曲三所水流之埶皆邪直貝丘縣師古曰直當也恐水盛隄防不能禁廼各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河決清河靈鳴犢口師古曰清河之靈縣鳴犢河口也而屯氏河絶成帝初清河都尉馮逡師古曰逡音七旬反奏言郡承河下流與兗州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也師古曰闊稀也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙増隄防終不能泄如有霖雨旬日不霽必盈溢師古曰雨止曰霽音子計反又音才詣反靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有埶故穿九河今既滅難明屯氏河不流行七十餘年新絶未久其處易浚師古曰浚謂治之令其深也浚音峻劉奉世曰河不流行不字宜為水字或衍不字又其口所居髙於以分流殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三嵗河水更從故第二曲間北可六里復南合今其曲埶復邪直貝丘百姓寒心宜復穿渠東行不豫脩治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白博士許商治尚書善為算能度功用師古曰白謂白於天子也度音大各反遣行視師古曰行音下更反以為屯氏河盈溢所為方用度不足師古曰言國家少財役也可且勿浚後三嵗河果決於館陶及東郡金隄泛濫兗豫入平原千乗濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所御史大夫尹忠對方略疏闊上切責之忠自殺遣大司農非調師古曰大司農名非調也調均錢穀河決所灌之郡師古曰令其調發均平錢穀遭水之郡使存給也調音徒釣反謁者二人發河南以東漕船五百㮴師古曰一船為一㮴音先勞反其字從木徙民避水居丘陵九萬七千餘口河隄使者王延世使塞師古曰命其為使而塞河也華陽國志云延世字長叔犍為資中人也以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成上曰東郡河決流漂二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月如淳曰律説戍邉一嵗當罷若有急當留守六月今以卒治河之故復留六月孟康曰外繇戍邉也治水不復戍邉也師古曰如孟二説皆非也以卒治河有勞雖執役日近皆得比繇戍六月也著謂著於簿籍著音竹助反下云非受平賈為著外繇其義亦同惟延世長於計䇿功費約省用力日寡朕甚嘉之其以延世為光禄大夫秩中二千石賜爵關内侯黄金百斤後二嵗河復決平原流入濟南千乗所壞敗者半建始時復遣王延世治之杜欽説大將軍王鳯以為前河決丞相史楊焉言延世受焉術以塞之蔽不肯見今獨任延世延世見前塞之易恐其慮害不深又審如焉言延世之巧反不如焉且水埶各異不博議利害而任一人如使不及今冬成来春桃華水盛必羡溢有填淤反壤之害師古曰月令仲春之月始雨水桃始華盖桃方華時既冇雨水川谷冰泮衆流猥集波瀾盛長故謂之桃華水耳而韓詩傳云三月桃華水反壤者水塞不通故令其土壤反還也羡音弋繕反淤音於庻反如此數郡種不得下師古曰種五穀之子也音之勇反民人流散盗賊將生雖重誅延世無益於事宜遣焉及將作大匠許商諫大夫乗馬延年雜作孟康曰乗馬姓也師古曰乗音食證反延世與焉必相破壞深論便宜以相難極師古曰壞毁也音怪極窮也音居力反商延年皆明計算能商功利師古曰商度也足以分别是非擇其善而從之必有成功鳳如欽言白遣焉等作治六月廼成復賜延世黄金百斤治河卒非受平賈者為著外繇六月蘇林曰平賈以錢取人作卒顧其時庸之平賈也如淳曰律説平賈一月得錢二千師古曰賈音價後九嵗鴻嘉四年楊焉言從河上下患厎柱隘可鐫廣之師古曰鐫謂琢鑿之也音子全反上從其言使焉鐫之鐫之裁沒水中不能去而令水益湍怒為害甚於故是嵗勃海清河信都河水湓溢灌縣邑三十一師古曰湓踊也音普頓反敗官亭民舍四萬餘所河隄都尉許商與丞相史孫禁共行視圖方略師古曰圖謀也行音下更反禁以為今河溢之害數倍於前決平原時今可決平原金隄間開通大河令入故篤馬河韋昭曰在平原縣至海五百餘里水道浚利又乾三郡水地得美田且二十餘萬頃足以償所開傷民田廬處又省吏卒治隄救水嵗三萬人以上許商以為古説九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中師古曰此九河之三也徒駭在成平胡蘇在東光鬲津在鬲成平東光屬勃海鬲屬平原徒駭者言禹治此河用功極衆故人徒驚駭也胡蘇下流急疾之貌也鬲津言其陿小可鬲以為津而度也鬲與隔同自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域孫禁所欲開者在九河南篤馬河失水之迹䖏埶平夷旱則淤絶水則為敗不可許公卿皆從商言先是谷永以為河中國之經瀆師古曰經常也聖王興則出圖書王道廢則竭絶今潰溢横流漂沒陵阜異之大者也脩政以應之災變自除是時李尋解光亦言隂氣盛則水為之長故一日之間晝減夜増江河滿溢所謂水不潤下雖常於卑下之地猶日月變見於朔望明天道有因而作也衆庶見王延世䝉重賞競言便巧不可用議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水埶河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌師丹等數言百姓可哀上數遣使者處業振贍之師古曰處業謂安處之使得其居業哀帝初平當使領河隄師古曰為使而領其事奏言九河今皆窴滅按經義治水有決河深川師古曰決分泄也深浚治也而無隄防雍塞之文師古曰雍讀曰壅河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光大司空何武奏請部刺史三輔三河𢎞農太守舉吏民能者莫有應書待詔賈讓奏言治河有上中下䇿古者立國居民彊理土地必遺川澤之分度水埶所不及師古曰遺留也度計也言川澤水所流聚之處皆留而置之不以為居邑而妄墾殖必計水所不及然後居而田之也分音扶問反度音大各反大川無防小水得入陂障卑下以為汙澤師古曰停水曰汙音一胡反使秋水多得有所休息左右游波寛緩而不廹夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也師古曰遽速也音其庶反故曰善為川者決之使道師古曰道讀曰導導通引也善為民者宣之使言盖隄防之作近起戰國雍防百川各以自利師古曰雍讀曰壅齊與趙魏以河為竟師古曰竟讀曰境趙魏瀕山齊地卑下師古曰瀕山猶言以山為邉界也師古曰瀕音頻又音賔作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所游盪時至而去則填淤肥羙民耕田之或久無害稍築室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也師古曰湛讀曰沈今隄防陿者去水數百歩逺者數里近黎陽南故大金隄從河西西北行至西山南頭廼折東與東山相屬師古曰屬連及也音之欲反民居金隄東為廬舍住十餘嵗更起隄從東山南頭直南與故大隄會又内黄界中有澤方數十里環之有隄師古曰環繞也徃十餘嵗太守以賦民師古曰以隄中之地給與民民今起廬舍其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河逺者數十里内亦數重此皆前世所排也河從河内北至黎陽為石隄激使東抵東郡平剛師古曰激者聚石於隄旁衝要之䖏所以激去其水也激音工歴反又為石隄使西北抵黎陽觀下師古曰觀縣名也音工喚反又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東廹阸如此不得安息今行上䇿徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄埶不能逺泛濫朞月自定難者將曰若如此敗壞城郭田廬冡墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕師古曰辟讀曰闢闢開也析厎柱破碣石師古曰析分也墮斷天地之性師古曰墮毁也音火規反此廼人功所造何足言也今瀕河十郡治隄嵗費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相奸師古曰奸音干且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上䇿若廼多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水髙於平地嵗増隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口廼有金隄髙一丈自是東地稍下隄稍髙至遮害亭髙四五丈往五六嵗河水大盛増丈七尺壞黎陽南郭門入至隄下如淳曰然則隄在郭内也臣瓚曰謂水從郭南門入北門出而至隄也師古曰瓚説是也劉奉世曰如瓚説則是河已沒黎陽城矣非也如説為是不然則黎陽因隄一面為城如今之澶州故郭門乃在隄外矣水未踰隄二尺所從隄上北望河髙出民屋百姓皆走上山水留十三日隄潰宋祁曰晏夲隄潰下有二所兩字吏民塞之臣循隄上行視水埶師古曰行音下更反南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十歩至今四十餘嵗適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以卜之如淳曰今礫谿口是也言作水門通水流不為害也師古曰礫谿谿名即水經所云泲水東過礫谿者其水門但用木與土耳今據堅地作石隄埶必完安冀州渠首盡當卬此水門治渠非穿地也師古曰卬音牛向反但為東方一隄北行三百餘里入漳水中其西因山足髙地諸渠皆往徃股引取之如淳曰股支别也旱則開東方下水門溉冀州水則開西方髙門分河流通渠有三利不通有三害民常罷於救水半失作業師古曰此一害也罷讀曰疲水行地上湊潤上徹民則病溼氣木皆立枯鹵不生榖師古曰此二害決溢有敗為魚鼈食此三害也若有渠溉則鹽鹵下隰填淤加肥師古曰此一利故種禾麥更為秔稻髙田五倍下田十倍師古曰此二利也秔謂稻之不䊀者也音庚轉漕舟船之便此三利也今瀕河隄吏卒郡數千人伐買薪石之費嵗數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷師古曰罷讀曰疲民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中策若廼繕完故隄増卑倍薄勞費無已數逢其害此最下䇿也王莽時徵能治河者以百數其大略異者長水校尉平陵關並師古曰桓譚新論云並字子陽材智通逹也言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢師古曰猥多也少稍自索師古曰索盡也音先各反雖時易處猶不能離此上古難識近察秦漢以来河決曹衞之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬史長安張戎師古曰新論云字仲功習溉灌事也言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益髙於平地猶築垣而居水也可各順從其性母復灌溉則百川流行水道自利無溢決之害矣御史臨淮韓牧師古曰新論云字子台善水事以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王横師古曰横字平中琅邪人見儒林傳中讀曰仲言河入勃海勃海地髙於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出濅數百里九河之地已為海所漸矣師古曰漸濅也讀如本字又音子連反禹之行河水本随西山下東北去師古曰行謂通流也周譜云定王五年河徙如淳曰譜音補世統譜諜也則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜郤徙完平處更開空師古曰空猶穿使緣西山足乗髙地而東北入海廼無水災沛郡桓譚為司空掾典其議為甄豐言凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無產業民師古曰事謂役使也空居與行役同當衣食衣食縣官而為之作廼兩便師古曰言無産業之人端居無為及發行力役俱須衣食耳今縣官給其衣食而使修治河水是為公私兩便也可以上繼禹功下除民疾王莽時但崇空語無施行者贊曰古人有言微禹之功吾其魚乎師古曰左氏傳載周大夫劉定公之辭也言無禹治水之功則天下之人皆為魚鼈耳中國川原以百數莫著於四瀆而河為宗孔子曰多聞而志之知之次也師古曰論語稱孔子之言曰多聞擇其善者而從之多見而志之知之次也志記也字亦作識音式異反國之利害故備論其事前漢書卷二十九前漢書卷二十九考證溝洫志入於勃海注臣瓚曰武帝元光三年河移徙東郡更注勃海禹時不注也臣召南按尚書但云入于海史記河渠書始云入于勃海而班志用之本無差訛禹河自周定王以後雖漸遷移不定而其入海之口總在直沽至漢猶如故也孝武紀元光三年春河水徙從頓邱東南流入勃海其入勃海與禹時不異所異者改道從頓邱移徙耳地理志於魏郡鄴縣曰故大河在東北入海于勃海郡成平縣曰虖沱河民曰徒駭河此則禹河故道也豈可曰禹時不注勃海乎使禹河不注勃海則史記于宣房既築又何以云道河北行二渠復禹舊跡也瓚説非是滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衞與濟汝淮泗會於楚劉奉世曰一鴻溝固不能旁通六國數百里之間又濟自從千乗入海安得會于楚也臣召南按鴻溝即汴渠也地理志河南郡滎陽縣有狼湯渠首受泲東南至陳入穎過郡四行七百八十里又陳留郡陳留縣魯渠水首受狼湯渠東至陽夏入渦渠又浚義縣睢水首受狼湯水東至取慮入泗過郡四行千三百六十里又封邱縣濮渠水首受泲東北至都關入羊里水過郡三行六百三十里又淮陽國扶溝縣渦水首受狼湯渠東至向入淮過郡三行千里此宋鄭陳蔡曹衞水道之眀証也汴渠首受滎澤即是濟水何必逺求于千乗注海之濟口乎劉奉世疑于所不必疑何也其後三十六嵗孝武元光中河决於瓠子臣召南按河渠書作四十有餘年自孝文十四年河決東郡至元光三年河决濮陽實三十六年無四十餘年也此則志訂史記之失是時武安侯田蚡為丞相蚡監本訛汾今改正時鄭當時為大司農臣召南按百官公卿表曰景帝後元年更名大農令武帝太初元年更大司農然則元光時止應言大農史記作鄭當時為大農是也司字疑衍浩浩洋洋慮殫為河史記作皓皓旰旰兮閭殫為河又皇謂河公兮何不仁史記作為我謂河伯兮何不仁今内史稻田租挈重注收田租之約令也收田租監本訛收臣租今改正又注挈音苦計反据注與契字同顧炎武曰挈偏也說文有觢字注云角一俯一仰意同河復北决於館陶分為屯氏河云云臣召南按屯氏河自館陶東北至章武入海此志所云東北經魏郡清河信都勃海入海地理志所謂過郡四行千五百里者是也九河之名注鬲津言其陿小可鬲以為津陿訛順從宋本改正扺黎陽觀下注觀縣名也臣召南按觀下當是黎陽縣近河地名不然畔觀屬東郡觀津屬信都皆不得獨稱觀字又上文言東郡平剛下文言魏郡昭陽皆非縣名乃地名耳朞月自定朞監本訛基今改正前漢書卷二十九考證
