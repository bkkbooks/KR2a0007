body:
  text: 前漢書卷九十二漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注游俠傳第六十二古者天子建國諸侯立家自卿大夫以至于庶人各有等差是以民服事其上而下無覬覦師古曰覬幸也覦欲也幸得其所欲也覬音冀覦音踰又音諭孔子曰天下有道政不在大夫師古曰論語載孔子之言謂權不移於下也百官有司奉法承令以脩所職失職有誅侵官有罰夫然故上下相順而庶事理焉周室既微禮樂征伐自諸侯出桓文之後大夫世權陪臣執命師古曰齊桓晉文周之二霸也陪重也陵夷至於戰國合從連衡力政争彊師古曰力政者棄背禮義專任威力也從音子容反繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申師古曰繇讀與由同信陵君魏無忌平原君趙勝孟嘗君田文春申君黄歇皆藉王公之埶競為游俠雞鳴狗盗無不賔禮師古曰謂孟嘗君用雞鳴而得亡出闗因狗盗而取狐白裘也宋祁曰此注疑是孟康而趙相虞卿棄國捐君以周窮交魏齊之厄師古曰魏齊虞卿之交也将為范睢所殺卿救之也信陵無忌竊符矯命戮將專師以赴平原之急師古曰秦兵圍趙趙相平原君告急於無忌無忌因如姬以竊兵符矯魏僖侯命代晉鄙為将而令朱亥鎚殺晉鄙遂率兵救趙秦兵以郤而趙得全皆以取重諸侯顯名天下搤而游談者以四豪為稱首師古曰搤捉持也古手腕字也四豪即魏信陵以下也搤音戹於是背公死黨之議成守職奉上之義廢矣及至漢興禁網疏闊未之匡改也師古曰匡正也是故代相陳豨從車千乘而呉濞淮南皆招賔客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭觧之徒馳騖於閭閻權行州域力折公侯衆庶榮其名迹覬而慕之雖其䧟於刑辟自與殺身成名若季路仇牧死而不悔師古曰季路孔子弟子也姓仲名由衛人也衛有蒯瞶之亂季路聞之故入赴難遇孟黶石乞以戈擊之斷纓季路曰君子死冠不免結纓而死仇牧宋大夫也宋萬殺閔公仇牧聞之趨而至手劍而叱之萬臂撃仇牧碎首齒著于門闔言游俠之徒自許節操同於季路仇牧宋祁曰一有也字邵本無姚本刪故曽子曰上失其道民散乆矣師古曰論語載曽子之言也觧在刑法志非明王在上視之以好惡齊之以禮法民曷繇知禁而反正乎師古曰視讀曰示繇讀曰由古之正法五伯三王之辠人也而六國五伯之辠人也師古曰伯讀曰霸下皆類此夫四豪者又六國之辠人也况於郭觧之倫以匹夫之細竊生殺之權其辠已不容於誅矣觀其温良泛愛振窮周急謙退不伐亦皆有絶異之姿惜乎不入於道徳茍放縱於末流殺身亡宗非不幸也自魏其武安淮南之後天子切齒衛霍改節然郡國豪桀處處各有京師親戚冠葢相望亦古今常道莫足言者唯成帝時外家王氏賔客為盛而樓䕶為帥及王莽時諸公之間陳遵為雄閭里之俠原渉為魁師古曰魁者斗之所用盛而杓之本也故言根本者皆云魁朱家魯人高祖同時也魯人皆以儒教而朱家用俠聞所臧活豪士以百數其餘庸人不可勝言然終不伐其能飲其徳孟康曰有徳於人而不自美也師古曰飲没也謂不稱顯劉奉世曰飲其徳飲字當蒙不字言没非義也飲者猶飲物自飫言不飲有其徳宋祁曰注文顯字下當有也字諸所嘗施唯恐見之振人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軥牛晉灼曰軥軥􅀈也軥牛小牛也師古曰軥重挽也音工豆反晉説是也專趨人之急甚於己私師古曰趨讀曰趣趣向也既隂脱季布之厄及布尊貴終身不見自闗以東莫不延頸願交楚田仲以俠聞父事朱家自以為行弗及也田仲死後有劇孟劇孟者洛陽人也周人以商賈為資劇孟以俠顯呉楚反時條侯為太尉乘傳東將師古曰乗傳車而東出為太將也傳音張戀反至河南得劇孟喜曰呉楚舉大事而不求劇孟吾知其無能為己師古曰已語終辭天下騷動大將軍得之若一敵國云宋祁曰浙本無軍字劇孟行大類朱家而好博多少年之戲然孟母死自逺方送䘮蓋千乘及孟死家無十金之財而符離王孟亦以俠稱江淮之間師古曰符離沛郡之縣也是時濟南瞷氏陳周膚亦以豪聞師古曰瞷音閑景帝聞之使使盡誅此屬其後代諸白梁韓母辟陽翟薛况陜寒孺紛紛復出焉師古曰代郡白姓非一家也故稱諸焉梁國人姓韓名母辟陽翟屬潁川陜即今陜州陜縣也薛况寒孺皆人姓名也辟讀曰避郭觧河内軹人也師古曰軹音只温善相人許負外孫也觧父任俠孝文時誅死觧為人静悍師古曰性沉静而勇悍不飲酒少時隂賊感槩師古曰隂賊者隂懐賊害之意也感槩者感意氣而立節槩也不快意所殺甚衆以軀耤友報仇師古曰耤古藉字也藉謂借􅂇也臧命作姦剽攻師古曰臧命臧亡命之人也剽劫也攻謂穿窬而盗也剽音匹妙反劉攽曰攻直謂攻奪而取之耳何因知其是穿窬也穿窬而盗亦不甚豪矣然剽是用力淺小之稱攻則用力重害二者異耳休乃鑄錢掘冢師古曰不報仇剽攻則鑄錢𤼵冢也不可勝數適有天幸窘急常得脱若遇赦及觧年長更折節為儉以徳報怨厚施而薄望然其自喜為俠益甚師古曰自好喜為此名也喜音許吏反既已振人之命不矜其功師古曰振謂舉救也矜夸恃也其隂賊著於心本𤼵於睚眦如故云師古曰著音直畧反心本猶言本心也睚音崖眦音漬睚眦又音五􅈈士􅈈反觧具在杜欽𫝊而少年慕其行亦輙為報讎不使知也觧姊子負觧之埶師古曰負恃也與人飲使之釂非其任彊灌之師古曰盡爵曰釂其人不飲而使盡爵乃彊灌之故怨怒也釂音于笑反彊音其兩反人怒刺殺觧姊子去亡觧姊怒曰以翁伯時人殺吾子賊不得師古曰翁伯觧字也棄其尸道旁弗𦵏欲以辱觧觧使人微知賊處師古曰微同問之也賊窘自歸師古曰窘困急具以實告觧觧曰公殺之當吾兒不直遂去其賊師古曰除去其罪也去音邱吕反劉奉世曰去者遣之令去而已何必除罪辠其姊子收而𦵏之諸公聞之皆多觧之義師古曰多猶重也益附焉觧出人皆避有一人獨箕踞視之觧問其姓名客欲殺之觧曰居邑屋不見敬是吾徳不脩也師古曰邑屋猶今人言村舎巷舎也彼何辠乃隂請尉吏曰是人吾所重至踐更時脱之師古曰踐更為踐更之卒也脱免也更音工衡反脱音它活反毎至直更數過吏弗求師古曰直當也次當為更也數音所角反怪之問其故觧使脱之箕踞者廼肉袒謝辠少年聞之愈益慕觧之行洛陽人有相仇者邑中賢豪居閒以十數終不聽師古曰居中間為道地和輯之而不見許也客廼見觧觧夜見仇家仇家曲聽師古曰曲屈從其言觧謂仇家吾聞洛陽諸公在閒多不聽今子幸而聽觧觧奈何從它縣奪人邑賢大夫權乎廼夜去不使人知曰且毋庸待我去令洛陽豪居間廼聽師古曰庸用也且無用休待洛陽豪更言之廼從其言也觧為人短小㳟儉出未嘗有騎師古曰不以騎自随也不敢乗車入其縣庭師古曰所屬之縣也之旁郡國為人請求事事可出出之如淳曰事可為免出者出之不可者各令厭其意師古曰厭滿也音一贍反然後廼敢嘗酒食諸公以此嚴重之争為用邑中少年及旁近縣豪夜半過門常十餘車請得觧客舎養之師古曰舎止也言觧多藏亡命喜事少年與觧同志者知亡命者多歸觧故夜将車来迎取其人居止而飬之及徙豪茂陵也觧貧不中訾師古曰中充也言訾財不充合徙之數也中音竹仲反其下亦同吏恐不敢不徙衛將軍為言郭觧家貧不中徙上曰觧布衣權至使將軍此其家不貧師古曰將軍為之言是為其所使也觧徙諸公送者出千餘萬軹人楊季主子為縣掾鬲之師古曰鬲塞其送不令觧得之也鬲與隔同觧兄子斷楊掾頭觧入闗闗中賢豪知與不知聞聲争交驩師古曰知謂先相知邑人又殺楊季主季主家上書人又殺闕下師古曰於闕下殺上書人上聞廼下吏捕觧觧亡置其母家室夏陽身至臨晉臨晉籍少翁素不知觧因出闗師古曰出觧於闗也籍少翁已出觧觧傳太原所過􅂺告主人處吏逐迹至籍少翁少翁自殺口絶乆之得觧窮治所犯為而觧所殺皆在赦前軹有儒生侍使者坐客譽郭觧生曰觧專以姦犯公法何謂賢觧客聞之殺此生斷舌吏以責觧觧實不知殺者殺者亦竟莫知為誰吏奏觧無辠御史大夫公孫𢎞議曰觧布衣為任俠行權以睚眦殺人觧不知此辠甚於觧知殺之當大逆無道師古曰當謂處斷其罪遂族觧自是之後俠者極衆而無足數者然闗中長安樊中子槐里趙王孫長陵高公子西河郭翁中師古曰中讀皆曰仲太原魯翁孺臨淮兒長卿師古曰兒音五奚反東陽陳君孺雖為俠而恂恂有退讓君子之風師古曰恂恂謹信之貌也音荀至若北道姚氏西道諸杜南道仇景東道佗羽公子南陽趙調之徒師古曰據京師而言指其東西南北謂也姓佗名羽字公子佗古他字宋祁曰注文謂字下當有之道兩字盗跖而居民間者耳曷足道哉此廼鄉者朱家所羞也師古曰鄉讀曰嚮萭章字子夏長安人也師古曰萭音拒陽夏公曰按廣韻萭與距同注漢有萭章距字疑誤集韻萭讀如規矩之矩距亦有作矩讀長安熾盛街閭各有豪俠章在城西栁市師古曰漢宫闕疏云細栁倉有栁市號曰城西萬子夏為京兆尹門下督從至殿中師古曰章從京兆也侍中諸侯貴人争欲揖章莫與京兆尹言者章逡循甚懼其後京兆不復從也師古曰更不以章自随也與中書令石顯相善亦得顯權力門車常接轂至成帝初石顯坐專權擅埶免官徙歸故郡宋祁曰越本無徙字顯貲巨萬當去留牀席器物數百萬直宋祁曰留字下當有其字欲以與章章不受賔客或問其故章歎曰吾以布衣見哀於石君師古曰言為石顯所哀憐石君家破不能有以安也師古曰言力不能救而受其財物此為石氏之禍萬氏反當以為福耶諸公以是服而稱之河平中王尊為京兆尹捕撃豪俠殺章及箭張回服䖍曰作箭者姓張名回酒市趙君都賈子光服䖍曰酒市中人也皆長安名豪報仇怨飬刺客者也樓䕶字君卿齊人父世醫也䕶少随父為醫長安出入貴戚家䕶誦醫經本草方術數十萬言長者咸愛重之共謂曰以君卿之材何不宦學乎繇是辭其父學經傳師古曰繇讀與由同為京兆吏數年甚得名譽是時王氏方盛賔客滿門五侯兄弟争名宋祁曰邵本無兄弟字其客各有所厚不得左右師古曰不相經過也唯䕶盡入其門咸得其驩心結士大夫無所不傾其交長者尤見親而敬衆以是服為人短小精辯論議常依名節聽之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿脣舌言其見信用也母死送𦵏者致車二三千兩閭里歌之曰五侯治䘮樓君卿乆之平阿侯舉護方正師古曰王譚也為諌大夫使郡國護假貸師古曰官以物假貸貧人令護監之貸音吐戴反多持幣帛過齊劉奉世曰此謂樓䕶假貸於人多賫幣帛過齊以施親故爾何乃謬斷其句云監䕶官貸耶劉攽説同上書求上先人冢因㑹宗族故人各以親疏與束帛一日散百金之費使還奏事稱意擢為天水太守數歲免家長安中時成都侯商為大司馬衛將軍罷朝欲候護其主簿諫將軍至尊不宜入閭卷商不聽遂徃至䕶家家狹小官屬立車下乆住移時天欲雨主簿謂西曹諸掾曰不肯彊諌反雨立閭巷商還或白主簿語商恨以它職事去主簿終身廢錮後䕶復以薦為廣漢太守元始中王莽為安漢公專政莽長子宇與妻兄吕寛謀以血塗莽第門欲懼莽令歸政發覺莽大怒殺宇而吕寛亡寛父素與䕶相知寛至廣漢過䕶不以事實語也到數日名捕寛詔書至師古曰舉姓名而捕之也䕶執寛莽大喜徵䕶入為前煇光師古曰莽分三輔置前煇光後丞烈以䕶為之煇音暉封息鄉侯列於九卿莽居攝槐里大賊趙朋霍鴻等群起延入前煇光界䕶坐免為庶人其居位爵禄賂遺所得亦縁手盡既退居里巷時五侯皆已死年老失埶賔客益衰至王莽簒位以舊恩召見䕶封為樓舊里附城師古曰莽為此爵名效古之附庸也而成都侯商子邑為大司空貴重商故人皆敬事邑唯䕶自安如舊節邑亦父事之不敢有闕時請召賔客邑居樽下稱賤子上夀師古曰言以父禮事宋祁曰注末當有之字坐者百數皆離席伏䕶獨東鄉正坐師古曰鄉讀曰嚮字謂邑曰公子貴如何蘓林曰邑字公子也初䕶有故人吕公無子歸䕶䕶身與吕公妻與吕嫗同食及䕶家居妻子頗厭吕公䕶聞之流涕責其妻子曰吕公以故舊窮老託身於我義所當奉遂飬吕公終身䕶卒子嗣其爵陳遵字孟公杜陵人也祖父遂字長子宣帝微時與有故相随博奕師古曰博六博奕圍棋也數負進師古曰進者㑹禮之財也謂博所賭也觧在高紀一説進勝也帝博而勝故遂有所負及宣帝即位用遂稍遷至太原太守廼賜遂璽書曰制詔太原太守官尊禄厚可以償博進矣妻君寧時在旁知狀師古曰史皇孫名進而此詔不諱之蓋史家追書故有其字耳君寧遂妻名也云妻知負博之狀者著舊恩之深也劉攽曰顔云史家追書妄也詔書本字史家何苦改之蓋進音贐自不犯諱也遂於是辭謝因曰事在元平元年赦令前其見厚如此元帝時徵遂為京兆尹至廷尉遵少孤與張竦伯松俱為京兆史竦博學通逹以廉儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠如淳曰為後進人士之冠首也並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸師古曰言毎日必出飲也曹事數廢西曹以故事適之師古曰案舊法令而罰之也適讀曰讁此下皆同侍曹輙詣寺舎白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宫大儒優士又重遵師古曰優禮賢士而尤敬重遵謂西曹此人大度士柰何以小文責之廼舉遵能治三輔劇縣補郁夷令師古曰右扶風之縣乆之與扶風相失師古曰意不相得也自免去槐里大賊趙朋霍鴻等起遵為校尉撃朋鴻有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪桀至京師者莫不相因到遵門遵耆酒師古曰耆讀曰嗜毎大飲賔客滿堂輙闗門取客車轄投井中雖有急終不得去師古曰既闗閉門又投車轄也而説者便欲改轄字為錧云門之錧籥妄穿鑿耳錧自主人所執何煩投井也嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母師古曰霑溼言其大醉也霑音竹占反叩頭自白當對尚書有期㑹狀母廼令從後閤出去師古曰以其前門闗閉故從後閤出之也遵大率常醉然事亦不廢長八尺餘長頭大鼻容貌甚偉略渉傳記贍於文辭性善書與人尺牘主皆臧去以為榮師古曰去亦臧也音邱吕反又音舉請求不敢逆所到衣冠懐之唯恐在後師古曰懐來也謂招來而禮之時列侯有與遵同姓字者毎至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云王莽素竒遵材在位多稱譽者繇是起為河南太守師古曰繇讀與由同既至官當遣從史西召善書吏十人於前治私書謝京師故人遵馮几師古曰馮讀曰慿口占書吏且省官事師古曰占隐度也口隐其辭以授吏也占音之贍反書數百封親疏各有意河南大驚數月免初遵為河南太守而弟級為荆州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂後司直陳崇聞之劾奏遵兄弟幸得蒙恩超等歴位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷師古曰藩車車之有屏蔽者過寡婦左阿君置酒謌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶卧遵知飲酒飫厭有節師古曰宴食曰飫飫音於庶反禮不入寡婦之門而湛酒溷肴師古曰湛讀曰沈又音耽亂男女之别輕辱爵位羞汙印韍師古曰此韍謂印之組也惡不可忍聞臣請皆免遵既免歸長安賔客愈盛飲食自若師古曰言自如其故乆之復為九江及河内都尉凡三為二千石而張竦亦至丹陽太守封淑徳侯後俱免官以列侯歸長安竦居貧無賔客時時好事者從之質疑問事論道經書而已師古曰質正也而遵晝夜呼號師古曰呼音火故反車騎滿門酒肉相屬師古曰屬連續也屬音之欲反先是黄門郎揚雄作酒箴以諷諫成帝其文為酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之眉師古曰眉井邊地若人目上之有眉處高臨深動常近危酒醪不入口臧水滿懐不得左右牽於纆徽一旦叀礙為瓽所轠師古曰纆徽井索也叀縣也瓽井以甎為甃者也轠擊也言瓶忽縣礙不得下而為井瓽所擊則破碎也叀音上絹反瓽音丁浪反轠音雷諸家之説或以叀為疐或音衛又以瓽為㽉皆失之甃音側救反身提黄泉骨肉為泥師古曰提擲也擲入黄泉之中也提音徒計反自用如此不如鴟夷師古曰鴟夷韋囊以盛酒即今鴟夷滕也宋祁曰注文滕當作幐浙本作袋鴟夷滑稽腹如大壺師古曰滑稽圜轉縱捨無窮之狀滑音骨稽音雞盡日盛酒人復借酤師古曰盡猶竟日也常為國器託於屬車師古曰天子屬車常載酒食故有鴟夷也屬音之欲反出入兩宫經營公家繇是言之酒何過乎師古曰繇讀與由同其下類此遵大喜之師古曰喜好愛也音許吏反常謂張竦吾與爾猶是矣足下諷誦經書苦身自約師古曰約猶束也不敢差跌師古曰跌音徒結反而我放意自恣浮湛俗間師古曰湛讀曰沈官爵功名不減於子而差獨樂顧不優邪師古曰顧念也竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也及王莽敗二人俱客於池陽師古曰左馮翊之縣也竦為賊兵所殺李竒曰竦知有賊當去㑹反支日不去因為賊所殺桓譚以為通人之蔽也更始至長安大臣薦遵為大司馬䕶軍與歸徳侯劉颯俱使匈奴鄧展曰颯音立單于欲脅詘遵遵陳利害為言曲直單于大竒之遣還㑹更始敗遵留朔方為賊所敗時醉見殺原渉字巨先祖父武帝時以豪桀自陽翟徙茂陵師古曰陽翟潁川之縣也渉父哀帝時為南陽太守天下殷富大郡二千石死官賦斂送𦵏皆千萬以上妻子通共受之以定産業時又少行三年䘮者及渉父死讓還南陽賻送行䘮冢廬三年繇是顯名京師禮畢扶風謁請為議曹師古曰禮畢行䘮終服也衣冠慕之輻輳為大司徒史丹舉能治劇為谷口令師古曰左馮翊之縣今之雲陽谷口是其處也劉攽曰史丹在成帝時為大將軍後以光禄大夫飬病未嘗為司徒又不到哀帝世此自原渉為大司徒史耳後人妄加丹字劉敞説同時年二十餘谷口聞其名不言而治先是渉季父為茂陵秦氏所殺渉居谷口半嵗所自劾去官欲報仇谷口豪桀為殺秦氏亡命嵗餘逢赦出郡國諸豪及長安五陵諸為氣節者皆歸慕之師古曰五陵謂長陵安陵陽陵茂陵平陵也班固西都賦曰南望杜覇此眺五陵是知覇陵杜陵非此五陵之數也而説者以為高祖以下至茂陵為五陵失其本意渉遂傾身與相待人無賢不肖闐門師古曰闐字與窴同音大千反在所閭里盡酒客或譏渉曰子本吏二千石之世結髮自脩以行䘮推財禮讓為名正復讎取仇猶不失仁義何故遂自放縱為輕俠之徒乎渉應曰子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦師古曰伯姬魯宣公女嫁於宋㳟公㳟公卒伯姬寡居至景公時伯姬之宫夜火左右曰夫人少避火伯姬曰婦人之義保傅不具夜不下堂遂逮於火而死陳孝婦者其夫當行戒屬孝婦曰幸有老母吾若不来汝善飬吾母孝婦曰諾夫果死孝婦飬姑愈謹其父母将取嫁之孝婦固欲自殺父母懼而不取遂使飬姑淮陽太守以聞朝廷高其義賜黄金四十斤復之終身號曰孝婦不幸壹為盗賊所汙遂行滛失師古曰失讀曰佚知其非禮然不能自還吾猶此矣師古曰還讀曰旋謂反歸故操也渉自以為前讓南陽􅉠送身得其名而令先人墳墓儉約非孝也廼大治起冢舎周閤重門初武帝時京兆尹曹氏𦵏茂陵民謂其道為京兆仟渉慕之廼買地開道立表署曰南陽仟人不肯從謂之原氏仟費用皆卬富人長者師古曰卬音牛向反然身衣服車馬􅂊具妻子内困專以振施貧窮赴人之急為務人嘗置酒請渉渉入里門客有道渉所知母病避疾在里宅者師古曰在此里之中宅上也渉即徃候叩門家哭渉因入弔問以䘮事家無所有渉曰但潔埽除沐浴待渉還至主人對賔客歎息曰人親卧地不收渉何心鄉此師古曰鄉讀曰向願徹去酒食賔客争問所當得渉廼側席而坐師古曰禮有憂者側席而坐今渉䘏人之䘮故側席削牘為疏師古曰牘木簡也疏音所慮反具記衣被棺木下至飯含之物分付諸客師古曰飯音扶晩反含音胡紺反諸客奔走市買至日昳皆㑹師古曰昳音徒結反宋祁曰注文昳字下當有日側也三字渉親閲視已謂主人願受賜矣既共飲食渉獨不飽廼載棺物從賔客徃至䘮家為棺歛勞倈畢𦵏師古曰勞倈謂慰勉賔客也棺音工喚反歛音力贍反勞音郎到反倈音郎代反其周急待人如此後人有毁渉者曰姦人之雄也䘮家子即時刺殺言者賔客多犯法辠過數上聞王莽數收繫欲殺輙復赦出之渉懼求為卿府掾史欲以避客宋祁曰避字下當有賔字文母太后䘮時守復土校尉蘓林曰文母太后元后也已為中郎后免官宋祁曰后字當作後渉欲上冢不欲㑹賔客宻獨與故人期㑹渉單車􅇌上茂陵師古曰敺與驅同投暮入其里宅因自匿不見人遣奴至市買肉奴乘渉氣與屠爭言斫傷屠者亡是時茂陵守令尹公師古曰守茂陵令未真為之宋祁曰與屠字下當有者字新視事渉未謁也聞之大怒知渉名豪欲以示衆厲俗遣兩吏脅守渉至日中奴不出吏欲便殺渉去渉廹窘不知所為㑹渉所與期上冢者車數十乘到皆諸豪也共説尹公尹公不聽諸豪則曰原巨先奴犯法不得使肉袒自縛箭貫耳詣廷門謝辠於君威亦足矣尹公許之渉如言謝復服遣去師古曰令渉如故著衣服也復音扶目反初渉與新豐富人祁太伯為友太伯同母弟王游公素嫉渉時為縣門下掾説尹公曰君以守令辱原渉如是一旦真令至君復單車歸為府吏渉刺客如雲殺人皆不知主名可為寒心渉治冢舎奢僭踰制辠惡暴著主上知之今為君計莫若墮壊渉冢舎條奏其舊惡師古曰墮毁也音火規反君必得真令如此渉亦不敢怨矣尹公如其計莽果以為真令渉繇此怨王游公選賔客遣長子初從車二十乘刼王游公家游公母即祁太伯母也諸客見之皆拜傳曰無驚祁夫人遂殺游公父及子斷兩頭去師古曰殺游公及其父劉攽曰殺游公父及子謂游公及游公之子耳渉性略似郭觧外温仁謙遜而内隐師古曰隐匿其情也好殺睚眦於塵中獨死者甚多王莽末東方兵起諸王子弟多薦渉能得死士可用宋祁曰越本作士死莽廼召見責以辠惡赦貰師古曰貰謂寛其罪拜鎮戎大尹天水太守渉至官無幾長安敗師古曰無幾言無多時也幾音居豈反郡縣諸假號起兵攻殺二千石長吏以應漢諸假號素聞渉名争問原尹何在拜謁之時莽州牧使者依附渉者皆得活傳送致渉長安更始西屏將軍申徒建請渉與相見大重之故茂陵令尹公壞渉冢舎者為建主簿渉本不怨也渉從建所出尹公故遮拜渉謂曰易世矣宜勿復相怨渉曰尹君何壹魚肉渉也師古曰言以渉為魚肉不以人遇之渉用是怒使客刺殺主簿渉欲亡去申徒建内恨耻之陽言吾欲與原巨先共鎮三輔豈以一吏易之哉賔客通言令渉自繋獄謝建許之賔客車數十乘宋祁曰十越本作千共送渉至獄建遣兵道徼取渉於車上師古曰徹要也音工堯反送車分散馳遂斬渉縣之長安市師古曰縣其首自哀平間郡國處處有豪桀然莫足數其名聞州郡者霸陵杜君敖池陽韓㓜孺馬領繡君賔西河漕中叔皆有謙退之風師古曰馬領北地之縣繡漕皆姓也漕音才到反中讀曰仲王莽居攝誅鉏豪俠名捕漕中叔不能得師古曰指其名而捕之素善强弩將軍孫建莽疑建臧匿泛以問建師古曰泛者以常語問之不切責也泛音敷劒反建曰臣名善之誅臣足以塞責莽性果賊無所容忍然重建不竟問遂不得也中叔子少游復以俠聞於世云前漢書卷九十二前漢書卷九十二考證游俠傳信陵無忌竊符云云注師古曰矯魏僖侯命臣召南按應作矯安釐王命僖字雖與釐通而魏稱王乆矣不得云魏僖侯也劇孟傳陳周膚按史記作周庸又陜寒孺史記作韓孺郭觧傳河内軹人也按史記有字翁伯三字在此文上觧為人静悍臣召南按史記作觧為人短小精悍漢書移短小二字于後文又改精字作静又臧命作姦剽攻休乃鑄錢掘冢史記作藏命作姦剽攻不休則休字屬上句漢書省去不字遂屬下句軹人楊季主子為縣掾鬲之臣召南按楊掾事與史稍異据史則主徙觧之議發於楊掾故觧心恨之不止為隔絶送財也萭章傳長安人也注師古曰萭音拒臣宗萬按萭字從草從禹急就章萭叚卿師古注曰萭亦楀字木名因樹以得姓也詩曰楀惟師氏漢有萭章今各本或作萬章非是酒市趙君都賈子光注服䖍曰酒市中人也顧炎武曰服䖍注非也按王尊傳長安宿豪大猾箭張禁酒趙放晉灼曰此二人作箭作酒之家今此文上有箭張回即張禁也君都亦即放也名偶異耳臣召南按此文賈子光當即王尊傳所云東市賈萬矣陳遵傳數負進顧炎武曰荀悦漢紀云杜陵陳遂字長子上微時與遊戲博奕數負遂上即位稍見進用至太原太守乃賜遂璽書曰制詔太原太守官尊禄重可以償博負矣按漢書作博進進乃悼皇考之名宣帝不應用之荀紀為長原渉傳為大司徒史丹舉能治劇為谷口令劉攽曰此原渉為大司徒史耳後人妄加丹字臣召南按劉攽説是傳言渉由扶風掾入為大司徒史也大司徒史即丞相史丹字衍文又按劉攽注史丹在成帝時為大將軍大字係左字之誤前漢書卷九十二考證
