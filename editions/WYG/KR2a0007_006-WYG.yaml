body:
  text: 前漢書卷六漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注武帝紀第六孝武皇帝荀悅曰諱徹之字曰通應劭曰禮諡法威强叡德曰武景帝中子也母曰王美人師古曰外戚傳美人比二千石視少上造年四歲立為膠東王七歲為皇太子母為皇后十六嵗後三年正月景帝崩張晏曰武帝以景帝元年生七嵗為太子為太子十嵗而景帝崩時年十六矣師古曰後三年景帝後三年也甲子太子即皇帝位尊皇太后竇氏曰太皇太后皇后曰皇太后三月封皇太后同母弟田蚡勝皆為列侯蘇林曰蚡音鼢䑕之鼢師古曰蚡亦鼢䑕字也音扶粉反建元元年師古曰自古帝王未有年號始起於此劉攽曰封禪書云其後三年有司言元宜以天瑞命不宜以一二數推所謂其後三年者葢盡元狩六年至元鼎三年也然元鼎四年方得寶鼎又無緣先三年而稱之以此而言自元鼎以前之元皆有司所追命其實年號之起在元鼎耳故元封改元則始有詔書矣冬十月詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諫之士丞相綰師古曰衛綰也奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷應劭曰申不害韓昭侯相也衛公孫鞅為秦孝公相封於商號商君韓非韓諸公子非名也蘇秦為關東從長張儀為秦昭王相為衡説以抑諸侯李竒曰申不害書執術商鞅為法賞不失卑刑不諱尊然深刻無恩德韓非兼行申商之術師古曰從音子容反奏可春二月赦天下賜民爵一級年八十復二筭九十復甲卒張晏曰二筭復二口之筭也復甲卒不豫革車之賦也師古曰復音方目反行三銖錢師古曰新壊四銖錢造此錢也重如其文見食貨志夏四月己巳詔曰古之立教鄉里以齒朝廷以爵扶世導民莫善於德然則於鄉里先耆艾奉高年古之道也師古曰六十曰耆五十曰艾今天下孝子順孫願自竭盡㠯承其親外廹公事内乏資財是以孝心闕焉朕甚哀之民年九十㠯上已有受鬻法師古曰給米粟以為糜鬻鬻音之六反為復子若孫令得身帥妻妾遂其供養之事師古曰若者豫及之辭也有子即復子無子即復孫也遂申也復音方目反五月詔曰河海潤千里其令祠官脩山川之祠為嵗事孟康曰為農祈也於此造之嵗以為常故曰為嵗事也師古曰嵗以為常是也總致敬耳非止祈農劉攽曰為音于偽反謂為嵗事曲加以禮耳曲加禮如淳曰祭禮有所加益赦吳楚七國帑輸在官者應劭曰呉楚七國反時其首事者妻子没入為官奴婢武帝哀焉皆赦遣之也師古曰帑讀與孥同秋七月詔曰衞士轉置送迎二萬人鄭氏曰去故置新常二萬人其省萬人罷苑馬㠯賜貧民師古曰養馬之苑舊禁百姓不得芻牧采樵今罷之議立明堂遣使者安車蒲輪束帛加璧徵魯申公師古曰以蒲裹輪取其安也二年冬十月御史大夫趙綰坐請毋奏事太皇太后及郎中令王臧皆下獄自殺應劭曰禮婦人不豫政事時帝已自躬省萬機王臧儒者欲立明堂辟雍太后素好黄老術非薄五經因欲絶奏事太后太后怒故殺之丞相嬰太尉蚡免師古曰竇嬰田蚡春二月丙戍朔日有蝕之夏四月戊申有如日夜出初置茂陵邑應劭曰武帝自作陵也師古曰本槐里縣之茂鄉故曰茂陵三年春河水溢于平原大饑人相食師古曰河溢之處損害田畝故大饑賜徙茂陵者户錢二十萬田二頃初作便門橋蘇林曰去長安四十里服虔曰在長安西北茂陵東師古曰便門長安城北靣西頭門即平門也古者平便皆同字於此道作橋跨渡渭水以趨茂陵其道易直即今所謂便橋是其處也便讀如夲字秋七月有星孛于西北濟川王明坐殺太傅中傅廢遷防陵應劭曰中傅宦者也師古曰防陵漢中縣也今謂之房州閩越圍東甌應劭曰高祖五年立無諸為閩越王惠帝立搖為東海王都東甌故號東甌師古曰甌音一侯反東甌告急遣中大夫嚴助持節發㑹稽兵浮海救之未至閩越走兵還九月丙子晦日有蝕之四年夏有風赤如血六月旱秋九月有星孛于東北五年春罷三銖錢行半兩錢師古曰又新鑄作也置五經博士夏四月平原君薨服䖍曰王皇后之母武帝外祖母五月大蝗秋八月廣川王越清河王乘皆薨六年春二月乙未遼東高廟災夏四月壬子高園便殿火師古曰凡言便殿便室便坐者皆非正大之處所以就便安也園者於陵上作之既有正寢以象平生正殿又立便殿為休息閑宴之處耳説者不曉其意乃解云便殿便室皆是正名斯大惑矣尋石建韋𤣥成孔光等傳其義可知便讀如本字上素服五日五月丁亥太皇太后崩秋八月有星孛于東方長竟天閩越王郢攻南越遣大行王恢將兵出豫章大司農韓安國出㑹稽擊之未至越人殺郢降兵還元光元年臣瓉曰以長星見故為元光冬十一月初令郡國舉孝廉各一人師古曰孝謂善事父母者廉謂清潔有廉隅者衞尉李廣為驍騎將軍屯雲中中尉程不識為車騎將軍屯鴈門六月罷夏四月赦天下賜民長子爵一級復七國宗室前絶屬者師古曰此等宗室前坐七國反故絶屬今加恩赦之更令上屬籍於宗正也復音扶目反五月詔賢良曰朕聞昔在唐虞畫象而民不犯應劭曰二帝但畫衣冠異章服而民不敢犯也師古曰白虎通云畫象者其衣服象五刑也犯墨者䝉巾犯劓者以赭著其衣犯髕者以墨䝉其髕象而畫之犯宮者屝犯大辟者布衣無領墨謂以墨鯨其靣也劓截其鼻也髕去膝葢骨也宮割其隂也屝草屨也劓音牛冀反字或作㓷其音同耳髕音頻忍反屝音扶味反日月所燭莫不率俾師古曰燭照也率循也俾使也言皆循其貢職而可使也周之成康刑錯不用師古曰錯置也音干故反德及鳥獸教通四海海外肅眘晉灼曰東夷傳今挹婁地是也在夫餘之東北千餘里大海之濵師古曰周書序云成王既伐東夷肅眘來賀即謂此北發渠捜服䖍曰地名也應劭曰禹貢析支渠捜屬雍州在金城河關之西西戎也晉灼曰王恢傳北發月支可得而臣似國名也地理志朔方有渠捜縣臣瓉曰孔子三朝記云北發渠捜南撫交阯此舉北以南為對也禹貢渠捜在雍州西此渠捜在朔方師古曰北發非國名也言北方即可徵發渠捜而役屬之瓉說近是氐羗徠服師古曰徠古徃來之來也氐音丁奚反星辰不孛日月不蝕山陵不崩川谷不塞麟鳳在郊藪河洛出圖書嗚虖何施而臻此與師古曰虖讀曰呼嗚呼嘆辭也臻至也今朕𫉬奉宗廟夙興㠯求夜寐㠯思師古曰夙興早起也夜寐夜久方寐也若渉淵水未知所濟猗與偉與師古曰猗美也偉大也與辭也言美而且大也與讀曰歟音弋於反何行而可㠯章先帝之洪業休德師古曰章明也洪大也休美也上參堯舜下配三王師古曰三王夏殷周朕之不敏不能遠德師古曰言德不及逺也此子大夫之所睹聞也師古曰子者人之嘉稱大夫舉官稱也志在優賢故謂之子大夫也睹古覩字賢良明於古今王事之體受策察問咸以書對著之于篇師古曰篇謂竹簡也朕親覽焉於是董仲舒公孫𢎞等出焉秋七月癸未日有蝕之二年冬十月行幸雍祠五畤師古曰五帝之畤也春詔問公卿曰朕飾子女㠯配單于金幣文繡賂之甚厚單于待命加嫚侵盗亡已師古曰待命謂承詔命也嫚與慢同邊境被害朕甚閔之今欲舉兵攻之何如大行王恢建議宜擊夏六月御史大夫韓安國為䕶軍將軍衞尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍將三十萬衆屯馬邑谷中誘致單于欲襲擊之單于入塞覺之走出六月軍罷將軍王恢坐首謀不進下獄死師古曰首為此謀而反不進擊匈奴輜重秋九月令民大酺五日三年春河水徙從頓丘東南流入渤海師古曰頓丘丘名因以為縣本衞地也地理志屬東郡今則在魏州界焉夏五月封高祖功臣五人後為列侯河水決濮陽氾郡十六師古曰濮陽東郡之縣也水所汜及凡十六郡界也汜音敷劎反發卒十萬救決河起龍淵宮服䖍曰宮在長安西作銅飛龍故以冠名也如淳曰三輔黄圖云有龍淵宮今長安城西有其處溝洫志救河決亦起龍淵宫于其傍孟康曰在西平界其水可用淬刀劎特堅利古龍淵之劎取於此水師古曰黄圖云龍淵廟在茂陵東不言宫也此言救決河起龍淵宫則宫不在長安之西矣又漢章帝賜尚書韓稜龍淵劎孟説是也淬音千内反劉攽曰予謂救決河起龍淵宫各自一事非因救河且起宫也顔疑當云龍淵廟按景帝紀起德陽廟亦云德陽宫寧可復謂非德陽廟乎此龍淵宫應如黄圖所說是四年冬魏其侯竇嬰有罪棄市師古曰以黨灌夫也春三月乙卯丞相蚡薨夏四月隕霜殺草五月地震赦天下五年春正月河間王德薨夏發巴蜀治南夷道又發卒萬人治鴈門阻險師古曰所以為固用止匈奴之冦劉攽曰予謂治險阻者通道令平易以便伐匈奴耳秋七月大風㧞木乙巳皇后陳氏廢捕為巫蠱者皆梟首八月螟師古曰食苗心之蠱也音莫經反徵吏民有明當時之務習先聖之術者縣次續食令與計偕師古曰計者上計簿使也郡國每嵗遣詣京師上之偕者俱也令所徵之人與上計者俱來而縣次給之食後世訛誤因承此語遂總謂上計為計偕闞駰不詳妄為解說云秦漢謂諸侯朝使曰計偕偕次也晉代有計偕簿又改偕為階失之彌遠致誤後學宋祁曰舊本正文續作給六年冬初算商車李竒曰始稅商賈車船令出筭春穿漕渠通渭如淳曰水轉運曰漕師古曰音才到反匈奴入上谷殺畧吏民遣車騎將軍衞青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門青至龍城應劭曰匈奴單于祭天大會諸國名其處為龍城獲首虜七百級廣敖失師而還詔曰夷狄無義所從來久間者匈奴數㓂邊境故遣將撫師古者治兵振旅因遭虜之方入將吏新㑹上下未輯晉灼曰入猶還也不得已而用兵言師不踰時也入或作人因其習俗土地之宜而教革之也師古曰晉説非也詔言古者出則治兵入則振旅素練其衆不虧戎律今之出師因遭宼虜方入為害而將吏新會上下未和故校尉棄軍而奔北也輯與集同代郡將軍敖鴈門將軍廣所任不肖師古曰肖似也不肖者言無所象𩔖謂不材之人也校尉又背義妄行棄軍而北少吏犯禁文頴曰少吏小吏也用兵之法不勤不教將率之過也教令宣明不能盡力士卒之罪也將軍已下廷尉使理正之師古曰下謂以身付廷尉也理法也言以法律處正其罪下音胡稼反他皆類此而又加法於士卒二者並行非仁聖之心朕閔衆庶䧟害欲刷恥改行師古曰刷除也音所劣反復奉正義厥路亡繇師古曰一䧟重刑無因從正道也繇讀與由同其赦鴈門代郡軍士不循法者師古曰循從也由也夏大旱蝗六月行幸雍秋匈奴盗邊遣將軍韓安國屯漁陽元朔元年應劭曰朔蘇也孟軻曰后來其蘇蘇息也言萬民品物大繁息也師古曰朔猶始也言更為初始也蘇息之息非息生義應説失之冬十一月詔曰公卿大夫所使總方畧壹統類廣教化美風俗也夫本仁祖義襃德録賢勸善刑暴師古曰本仁祖義謂以仁義為本始五帝三王所繇昌也師古曰五帝伏羲神農黃帝堯舜也三王夏殷周也繇讀與由同朕夙興夜寐嘉與宇内之士臻於斯路師古曰天地四方為宇臻至也故旅耆老復孝敬師古曰旅耆老者加惠於耆老之人若賔旅也復孝敬者謂優復孝弟之人也復音方目反選豪俊講文學師古曰講謂和習之稽參政事祈進民心師古曰祈求也深詔執事興廉舉孝庶幾成風紹休聖緒師古曰休美也緒業也言紹先聖之休緒也故下言昭先帝聖緒夫十室之邑必有忠信三人並行厥有我師師古曰論語稱孔子云十室之邑必有忠信如丘者焉又曰三人行必有我師焉擇其善者而從之其不善者而改之故詔引焉今或至闔郡而不薦一人師古曰闔閉也總一郡之中故云闔郡是化不下究而積行之君子雍於上聞也師古曰究竟也言見壅遏不得聞達於天子也雍讀曰壅二千石官長紀綱人倫師古曰謂郡之守尉縣之令長將何以佐朕燭幽隱勸元元師古曰燭照也元元善意厲蒸庶師古曰蒸衆也崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪有司奏議曰古者諸侯貢士壹適謂之好德服䖍曰適得其人再適謂之賢賢三適謂之有功廼加九錫應劭曰一曰車馬二曰衣服三曰樂器四曰朱户五曰納陛六曰虎賁百人七曰鈇鉞八曰弓矢九曰秬鬯此皆天子制度尊之故事事錫與但數少耳張晏曰九錫經本無文周禮以為九命春秋説有之臣瓉曰九錫備物伯者之盛禮齊桓晉文猶不能備今三進賢便受之似不然也當受進賢之一錫尚書大傳云三適謂之有功賜以車服弓矢是也師古曰總列九錫應説是也進賢一錫瓉說是也不貢士壹則黜爵再則黜地三則黜爵地畢矣李竒曰爵地俱削盡夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥師古曰與讀曰豫斥謂棄逐之在上位而不能進賢者退此所以勸善黜惡也今詔書昭先帝聖緒令二千石舉孝廉所以化元元移風易俗也不舉孝不奉詔當以不敬論張晏曰謂其不勤求士報國不察廉不勝任也當免張晏曰當率身化下今親宰牧而無賢人為不勝任也奏可十二月江都王非薨春三月甲子立皇后衞氏詔曰朕聞天地不變不成施化隂陽不變物不暢茂師古曰暢通也易曰通其變使民不倦應劭曰黄帝堯舜祖述伏羲神農結綱耒耜以日中為市交易之業因其所利變而通之使民知之不苦倦也師古曰此易下擊之辭也言通物之變故能樂其器用不懈倦也詩云九變復貫知言之選應劭曰逸詩也陽數九人君當陽言變政復禮合於先王舊貫知言之選選善也孟康曰貫道也選數也極天之變而不失道者知言之數也臣瓉曰先王創制易教以救流弊也是以三王之教有文有質九數之多也師古曰貫事也選擇也論語曰仍舊貫此言文質不同寛猛殊用循環復舊擇善而從之瓉說近之也朕嘉唐虞而樂殷周據舊㠯鑒新師古曰追觀舊跡以知新政而為鑒戒其赦天下與民更始諸逋貸及辭訟在孝景後三年㠯前皆勿聽治師古曰逋亡也乆負官物亡匿不還者皆謂之逋逋音布胡反秋匈奴入遼西殺太守入漁陽鴈門敗都尉殺畧三千餘人遣將軍衞青出鴈門將軍李息出代𫉬首虜數千級東夷薉君南閭等口二十八萬人服䖍曰穢貊在辰韓之北高句麗沃沮之南東窮于大海晉灼曰薉古穢字師古曰南閭者薉君之名降為蒼海郡魯王餘長沙王發皆薨二年冬賜淮南王菑川王几杖毋朝師古曰淮南王安菑川王志皆武帝諸父列也故賜几杖焉春正月詔曰梁王城陽王親慈同生文頴曰慈愛也願以邑分弟其許之諸侯王請與子弟邑者朕將親覽使有列位焉於是藩國始分而子弟畢侯矣匈奴入上谷漁陽殺畧吏民千餘人遣將軍衞青李息出雲中至高闕師古曰山名也一曰塞名也在朔方之北遂西至符離師古曰幕北塞名也獲首虜數千級收河南地置朔方五原郡三月己亥晦日有蝕之夏募民徙朔方十萬口又徙郡國豪傑及訾三百萬㠯上于茂陵秋燕王定國有罪自殺三年春罷蒼海郡三月詔曰夫刑罰所㠯防姦也内長文所㠯見愛也晉灼曰長音長吏之長張晏曰長文長文德也師古曰詔言有文德者即親内而崇長之所以見仁愛之道見謂顯示也音胡電反㠯百姓之未洽于教化朕嘉與士大夫日新厥業祗而不解師古曰解讀曰懈其赦天下夏匈奴入代殺太守入鴈門殺畧千餘人六月庚午皇太后崩秋罷西南夷城朔方城令民大酺五日四年冬行幸甘泉夏匈奴入代定襄上郡殺畧數千人五年春大旱大將軍衞青將六將軍兵十餘萬人出朔方高闕獲首虜萬五千級夏六月詔曰蓋聞導民㠯禮風之㠯樂師古曰風教也詩序曰上以風化下今禮壊樂崩朕甚閔焉故詳延天下方聞之士咸薦諸朝師古曰詳悉也延引也方道也聞博聞也言悉引有道博聞之士而進於朝也禮記曰隆禮由禮謂之有方之士又曰博聞强識而讓謂之君子一曰方謂方正也其令禮官勸學講議洽聞舉遺興禮㠯為天下先師古曰舉遺逸之文而興禮學太常其議子博士弟子崇鄉黨之化㠯厲賢材焉師古曰為博士置弟子既得崇化於鄉黨又㠯奬厲賢材之人丞相𢎞請為博士置弟子員師古曰公孫𢎞學者益廣秋匈奴入代殺都尉六年春二月大將軍衞青將六將軍兵十餘萬騎出定襄斬首三千餘級還休士馬于定襄雲中鴈門赦天下夏四月衞青復將六將軍絶幕應劭曰幕沙幕匈奴之南界也臣瓉曰沙土曰幕直度曰絶師古曰應瓉二説皆是也而說者或云是塞外地名非矣幕者即今之突厥中磧耳李陵歌曰經千里兮渡沙幕大克獲前將軍趙信軍敗降匈奴右將軍蘇建亡軍獨身脱還贖為庶人六月詔曰朕聞五帝不相復禮三代不同法所繇殊路而建德一也師古曰復因也音扶目反繇讀與由同蓋孔子對定公㠯徠遠臣瓉曰論語及韓子皆言葉公問政於孔子孔子荅以悅近徠遠今云定公與二書異哀公㠯論臣如淳曰韓非云哀公問政仲尼曰政在選賢景公㠯節用如淳曰韓非云齊景公問政仲尼曰政在節用非期不同所急異務也李竒曰期要也非要當必不同所急異務不得不然今中國一統而北邊未安朕甚悼之日者大將軍廵朔方征匈奴斬首虜萬八千級諸禁錮及有過者咸蒙厚賞得免減罪師古曰有罪者或被釋免或得減輕今大將軍仍復克獲師古曰仍頻也斬首虜萬九千級受爵賞而欲移賣者無所流貤應劭曰貤音移言軍吏士斬首虜爵級多無所移與今為置武功賞官爵多者分與父兄子弟及賣與他人也師古曰此說非也許慎說文解字云貤物之重次第也此詔言欲移賣爵者無有差次不得流行故為置官級也貤音弋賜反今俗猶謂凡物一重為一貤也宋祁曰貤音難易之易其議為令有司奏請置武功賞官㠯寵戰士元狩元年應劭曰獲白麟因改元曰元狩也冬十月行幸雍祠五畤獲白麟師古曰麟麇身牛尾馬足黄色圓蹄一角角端有肉作白麟之歌十一月淮南王安衡山王賜謀反誅黨與死者數萬人十二月大雨雪民凍死師古曰雨音于具反夏四月赦天下丁卯立皇太子賜中二千石爵右庶長師古曰第十一等爵民為父後者一級詔曰朕聞咎繇對禹曰在知人知人則哲惟帝難之師古曰尚書咎繇謩載咎繇之辭也帝謂堯也蓋君者心也民猶支體支體傷則心􅉃怛師古曰􅉃痛也怛悼也􅉃音千感反怛音丁曷反日者淮南衡山脩文學流貨賂兩國接壤怵於邪說服䖍曰怵音裔應劭曰忸􅏸也如淳曰怵音怵惕見誘怵於邪說也師古曰作􅏸者非如說云見誘怵其義是也而音怵惕又非也怵或體訹字耳訹者誘也音如戍亥之戍南越傳曰不可􅇶好語入朝諸如此例音義同耳今俗猶云相謏訹而說者或改為鉥導之鉥蓋穿鑿也謏音先誘反鉥音述而造簒弑此朕之不德詩云憂心慘慘念國之為虐師古曰小雅正月之詩也慘慘憂戚之貎已赦天下滌除與之更始朕嘉孝弟力田哀夫老眊孤寡鰥獨師古曰眊古耄字八十曰耄耄老稱也一曰眊不明之貎或匱於衣食甚憐愍焉其遣謁者廵行天下存問致賜師古曰致送至也行音下更反曰皇帝使謁者師古曰謁者令使者宣詔書之文賜縣三老孝者帛人五匹鄉三老弟者力田帛人三匹年九十㠯上及鰥寡孤獨帛人二匹絮三斤八十㠯上米人三石有􅁈失職使者㠯聞師古曰職常也失職者失其常業及常理也縣鄉即賜毋贅聚如淳曰贅會也令勿擅徵召贅聚三老孝弟力田也師古曰即就也各遣就其所居而賜之勿㑹聚也贅音之鋭反五月乙巳晦日有蝕之匈奴入上谷殺數百人二年冬十月行幸雍祠五畤春三月戊寅丞相𢎞薨遣驃騎將軍霍去病出隴西至臯蘭應劭曰在隴西白石縣塞外河名也孟康曰山關名也師古曰臯蘭山名也霍去病傳云過焉支山千有餘里合短兵鏖臯蘭下則此山也非河名也白石縣在金城又不屬隴西應說並失之鏖音烏曹反斬首八千餘級夏馬生余吾水中應劭曰在朔方北也南越獻馴象應劭曰馴者教能拜起周章從人意也師古曰馴音廵謂擾也應說是也能言鳥師古曰即鸚鵡也今隴西及南海竝有之萬震南州異物志云有三種一種白一種青一種五色交州以南諸國盡有之白及五色者其性尤慧解蓋謂此也隋開皇十八年林邑國獻白鸚鵡時以為異是嵗貢士咸試賦之聖皇馭歴屢有兹獻上以幽遐勞費撫慰弗受將軍去病公孫敖出北地二千餘里過居延師古曰居延匈奴中地名也韋昭以為張掖縣失之張掖所置居延縣者以安處所獲居延人而置此縣斬首虜三萬餘級匈奴入鴈門殺畧數百人遣衞尉張騫郎中令李廣皆出右北平廣殺匈奴三千餘人盡亡其軍四千人獨身脱還劉攽曰廣傳無此事而云廣軍幾没以自當無賞耳疑紀誤及公孫敖張騫皆後期當斬贖為庶人江都王建有罪自殺膠東王寄薨秋匈奴昆邪王殺休屠王師古曰昆音下門反屠音儲并將其衆合四萬餘人來降置五屬國㠯處之師古曰凡言屬國者存其國號而屬漢朝故曰屬國㠯其地為武威酒泉郡師古曰武威今涼州也酒泉今肅州三年春有星孛于東方夏五月赦天下立膠東康王少子慶為六安王封故相國蕭何曾孫慶為列侯秋匈奴入右北平定襄殺畧千餘人遣謁者勸有水災郡種宿麥師古曰秋冬種之經嵗乃熟故云宿麥舉吏民能假貸貧民者㠯名聞師古曰貸音吐戴反減隴西北地上郡戌卒半發讁吏穿昆明池如淳曰食貨志以舊吏弄法故讁使穿池更發有貲者為吏也臣瓉曰西南夷傳有越嶲昆明國有滇池方三百里漢使求身毒國而為昆明所閉今欲伐之故作昆明池象之以習水戰在長安西南周回四十里食貨志又曰時越欲與漢用船戰遂乃大脩昆明池也師古曰讁吏吏有罪者罰而役之滇音顚四年冬有司言關東貧民徙隴西北地西河上郡會稽凡七十二萬五千口縣官衣食振業用度不足請收銀錫造白金及皮幣以足用應劭曰時國用不足以白鹿皮為幣朝覲以薦璧又造銀錫為白金見食貨志初算緡錢李斐曰緡絲也以貫錢也一貫千錢出筭二十也臣瓉曰茂陵書諸賈人末作貰貸置居邑儲積諸物及商以取利者雖無市籍各以其物自占率緡錢二千而一筭此緡錢是儲錢也故隨其用所施施於利重者其筭亦多也師古曰謂有儲積錢者計其緡貫而税之李說為是緡音武巾反春有星孛于東北夏有長星出于西北大將軍衞青將四將軍出定襄將軍去病出代各將五萬騎歩兵踵軍後數十萬人師古曰踵接也猶言躡其踵青至幕北圍單于斬首萬九千級至闐顔山乃還鄧展曰音塡塞之塡去病與左賢王戰斬獲首虜七萬餘級封狼居胥山廼還師古曰登山祭天築土為封刻石紀事以彰漢功兩軍戰士死者數萬人前將軍廣後將軍食其皆後期廣自殺食其贖死如淳曰李廣傳引兵與右將軍食其合軍出東道又曰廣自剄右將軍下吏當死贖為庶人霍去病傳亦云趙食其為右將軍平陽侯襄為後將軍此紀為誤也師古曰傳寫者誤以右為後食其音異基五年春三月甲午丞相李蔡有罪自殺文頴曰李廣從弟坐侵陵壖地天下馬少平牡馬匹二十萬如淳曰貴平牡馬賈欲使人競畜馬罷半兩錢行五銖錢徙天下姦猾吏民於邊師古曰猾狡也音乎八反六年冬十月賜丞相㠯下至吏二千石百金千石㠯下至乘從者帛晉灼曰乘騎諸從者師古曰流俗書本乘上或有公字非也復人妄加之宋祁曰百金新本無百字蠻夷錦各有差雨水亡氷師古曰雨音于具反夏四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王師古曰於廟中策命之初作誥服䖍曰誥勅王如尚書諸誥也李斐曰今勅封拜諸侯王策文亦是也見武五子傳六月詔曰日者有司以幣輕多姦李竒曰幣錢也輕者若一馬直二十萬是為幣輕而物重也重難得則用不足而姦生農傷而末衆師古曰末謂工商也又禁兼并之塗李奇曰謂大家兼役小民富者兼役貧民欲平之也文頴曰兼并者食禄之家不得治産兼取小民之利商人雖富不得復兼畜田宅作客耕農也師古曰李說是故改幣㠯約之李奇曰更去半兩錢行五銖錢皮幣以檢約姦邪稽諸往古制宜於今師古曰稽考也音工奚反廢期有月應劭曰禁半兩錢及餘幣物禁之有期月而民未悉從也如淳曰期音朞自往年三月至今年四月朞有餘月矣師古曰如說是而山澤之民未諭師古曰未諭者未曉告示之意夫仁行而從善義立則俗易意奉憲者所㠯導之未明與師古曰與讀曰歟將百姓所安殊路而撟䖍吏因乘埶㠯侵蒸庶邪孟康曰䖍固也矯稱上命以貨賄用為固尚書曰敓攘矯䖍韋昭曰凡稱詐為矯强取為䖍左傳曰䖍劉我邊垂師古曰撟與矯同其字從手矯託也䖍固也妄託上命而堅固為邪惡者也蒸衆也何紛然其擾也師古曰擾煩也今遣博士大等六人分循行天下師古曰褚大也行音下更反存問鰥寡廢疾無㠯自振業者貸與之師古曰貸音土戴反諭三老孝弟㠯為民師舉獨行之君子徵詣行在所如淳曰蔡雍云天子以天下為家自謂所居為行在所言今雖在京師行所在至耳師古曰此說非也天子或在京師或出廵狩不可豫定故言行在所耳不得亦謂京師為行在也朕嘉賢者樂知其人廣宣厥道士有特招使者之任也李奇曰設士有殊才異行當特招者任在使者分别之詳問隱處亡位及􅁈失職師古曰無位不被任用也􅁈屈也失職失其常業也姦猾為害野荒治苛者舉奏師古曰野荒言田畝不闢也治苛為政尚細刻郡國有所㠯為便者上丞相御史㠯聞秋九月大司馬驃騎將軍去病薨元鼎元年應劭曰得寶鼎故因是改元夏五月赦天下大酺五日得鼎汾水上濟東王彭離有罪廢徙上庸應劭曰春秋時庸國二年冬十一月御史大夫張湯有罪自殺十二月丞相青翟下獄死師古曰莊青翟春起柏梁臺服䖍曰用百頭梁作臺因名焉師古曰三輔舊事云以香柏為之今書字皆作柏服說非也三月大雨雪師古曰雨音于具反夏大水關東餓死者㠯千數秋九月詔曰仁不異遠義不辭難師古曰遠近如一是為仁也不憚艱難是為義也今京師雖未為豐年山林池澤之饒與民共之今水潦移於江南廹隆冬至朕懼其饑寒不活江南之地火耕水耨應劭曰燒草下水種稻草與稻竝生高七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨方下巴蜀之粟致之江陵遣博士中等分循行師古曰行音下更反諭告所抵無令重困師古曰抵至也重音直用反吏民有振救饑民免其戹者具舉以聞三年冬徙函谷關於新安應劭曰時樓船將軍楊僕數有大功恥為關外民上書乞徙東關以家財給其用度武帝意亦好廣濶於是徙關於新安去𢎞農三百里㠯故關為𢎞農縣十一月令民告緡者㠯其半與之孟康曰有不輸税令民得告言以半與之正月戊子陽陵園火夏四月雨雹師古曰雨音于具反關東郡國十餘饑人相食常山王舜薨子㪍嗣立有罪廢徙房陵四年冬十月行幸雍祠五畤賜民爵一級女子百户牛酒行自夏陽東幸汾隂師古曰夏陽馮翊之縣也汾隂屬河東汾音扶云反十一月甲子立后土祠于汾隂脽上蘇林曰脽音誰如淳曰脽者河之東岸特堆掘長四五里廣二里餘高十餘丈汾隂縣治脽之上后土祠在縣西汾在脽之北西流與河合師古曰二說皆是也脽者以其形高起如人尻脽故以名云一說此臨汾水之上地本名鄈音與葵同彼鄉人呼葵音如誰故轉而為脽字耳故漢舊儀云葵上禮畢行幸滎陽還至洛陽詔曰祭地冀州服䖍曰后土祠在汾隂汾隂本冀州地也周時乃分為并州爾雅曰兩河間曰冀州瞻望河洛廵省豫州觀于周室邈而無祀師古曰邈遠絶之意詢問􅂄老廼得孽子嘉宋祁曰景德本無子字其封嘉為周子南君㠯奉周祀臣瓉曰汲冡古文謂衞將軍文子為子南彌牟其後有子南國子南勁紀年勁朝于魏後惠成王如衞命子南為侯秦并六國衞最後亡疑嘉是衞後故氏子南而稱君也初元五年為周承休侯元始四年為鄭公建武十三年封於觀為衞公師古曰子南其封邑之號以為周後故總言周子南君瓉説非也例不先言姓而後稱君且自嘉已下皆姓姫氏著在史傳宋祁曰注本舊文作元始三年建武三年此本乃刋誤據平紀改正春二月中山王勝薨夏封方士欒大為樂通侯位上將軍六月得寶鼎后土祠旁秋馬生渥洼水中李斐曰南陽新野有暴利長當武帝時遭刑屯田燉煌界數於此水旁見羣野馬中有奇異者與凡馬異來飲此水利長先作土人持勒靽於水旁後馬玩習久之代土人持勒靽收得其馬獻之欲神異此馬云從水中出蘇林曰洼音窐曲之窐師古曰渥音握洼音於佳反作寶鼎天馬之歌立常山憲王子商為泗水王五年冬十月行幸雍祠五畤遂踰隴應劭曰隴隴阺坂也師古曰即今之隴山阺音丁禮反登空同應劭曰山名也西臨祖厲河而還李斐曰音嗟賴十一月辛巳朔旦冬至立泰畤于甘泉天子親郊見師古曰祠太一也見音胡電反朝日夕月應劭曰天子春朝日秋夕月朝日以朝夕月以夕臣瓉曰漢儀注郊泰畤皇帝平旦出行宫東向揖日其夕西南向揖月便用郊日不用春秋也師古曰春朝朝日秋暮夕月蓋常禮也郊泰畤而揖日月此又别儀詔曰朕㠯眇身託于王侯之上師古曰眇細末也德未能綏民師古曰綏安也民或饑寒故廵祭后土㠯祈豐年冀州脽壤廼顯文鼎獲薦于廟師古曰得鼎祠旁祠在脽上或云脽壤壤謂土也文鼎言其有刻鏤之文渥洼水出馬朕其御焉戰戰競競懼不克任思昭天地内惟自新詩云四牡翼翼㠯征不服親省邊埀用事所極李斐曰極至也所至者輒祭也師古曰逸詩也劉攽曰予謂親省邊埀詔語耳望見泰一脩天文襢文頴曰䄠祭也晉灼曰䄠古禪字也臣瓉曰此年初祭泰畤於甘泉此祭天於文䄠也祭天則天文從故曰脩天文䄠也師古曰文晉二說是也朝日夕月即天文䄠之謂也辛卯夜若景光十有二明易曰先甲三日後甲三日應劭曰先甲三日辛也後甲三日丁也言王者齊戒必自新臨事必自丁寧師古曰此易蠱卦之辭朕甚念年嵗未咸登師古曰登謂百榖成飭躬齊戒師古曰飭整也讀與敕同丁酉拜況于郊師古曰況賜也辛夜有光是先甲三日也丁日拜況是後甲三日也故詔引易文夏四月南越王相呂嘉反殺漢使者及其王王太后赦天下丁丑晦日有蝕之秋鼃蝦蟇鬭師古曰鼃黽也似蝦蟇而長脚其色青音下媧反蝦音遐蟇音麻黽音莫幸反遣伏波將軍路博德出桂陽下湟水樓船將軍楊僕出豫章下湞水鄭氏曰湞音檉孟康曰湞音貞蘇林曰湞音摚住之摚師古曰蘇音是也音丈庚反歸義越侯嚴為戈船將軍出零陵下離水張晏曰嚴故越人降為歸義侯越人於水中負人船又有蛟龍之害故置戈於船下因以為名也臣瓉曰伍子胥書有戈船以載干戈因謂之戈船也離水出零陵師古曰以樓船之例言之則非為載干戈也此蓋船下安戈㦸以御蛟鼉水蟲之害張說近之劉攽曰船下安戈既難措置又不可以行且今造舟船甚多未嘗有置戈者顔北人不知行船故信張說予謂瓉說是宋祁曰戈船將軍當時所建之官如驃騎虎牙之類是也戈船今有之設干戈於船上以禦敵也甲為下瀨將軍下蒼梧服䖍曰甲故越人歸漢者也臣瓉曰瀬湍也吳越謂之瀬中國謂之磧伍子胥書有下瀬船師古曰瀬音賴宋祁曰注文吳越舊本作呉楚皆將罪人江淮㠯南樓船十萬人越馳義侯遺應劭曰亦越人也别將巴蜀罪人發夜郎兵下牂柯江咸會番禹如淳曰音潘愚尉佗所都師古曰即今之廣州宋祁曰刋誤本改禺作愚九月列侯坐獻黃金酎祭宗廟不如法奪爵者百六人丞相趙周下獄死服䖍曰因八月獻酎祭宗廟時使諸侯各獻金來助祭也如淳曰漢儀注諸侯王嵗以户口酎黃金於漢廟皇帝臨受獻金金少不如斤兩色惡王削縣侯免國臣瓉曰食貨志南越反時卜式上書願死之天子下詔襃揚布告天下天下莫應列侯以百數莫求從軍至酎飲酒少府省金而列侯坐酎金失侯者百餘人而表云趙周坐為丞相知列侯酎金輕下獄自殺然則知其輕而不糾擿之也師古曰酎三重釀醇酒也音丈救反樂通侯欒大坐誣罔要斬西羗衆十萬人反與匈奴通使攻故安圍枹䍐鄧展曰枹音鈇䍐音漢師古曰枹䍐金城之縣也䍐讀如本字匈奴入五原殺太守六年冬十月發隴西天水安定騎士及中尉河南河内卒十萬人遣將軍李息郎中令徐自為征西羌平之行東將幸緱氏師古曰河南縣也緱音工侯反至左邑桐鄉師古曰左邑河東之縣也桐鄉其郷名也聞南越破㠯為聞喜縣春至汲新中鄉師古曰汲河内縣新中其鄉名得呂嘉首㠯為獲嘉縣馳義侯遺兵未及下上便令征西南夷平之師古曰便音頻面反遂定越地㠯為南海蒼梧鬱林合浦交阯九眞日南珠厓儋耳郡應劭曰二郡在大海中崖岸之邊出眞珠故曰珠厓儋耳者種大耳渠率自謂王者耳尤緩下肩三寸張晏曰異物志二郡在海中東西千里南北五百里珠厓言珠若崖矣儋耳之云鏤其頰皮上連耳匡分為數支狀似雞腸累耳下􅂷臣瓉曰茂陵書珠崖郡治瞫都去長安七千三百二十四里儋耳去長安七千三百六十八里領縣五師古曰儋音丁甘反字本作瞻瞫音審定西南夷㠯為武都牂柯越嶲沈黎文山郡孟康曰嶲音髓本卭都服䖍曰今蜀郡北部都尉所治本笮都也臣瓉曰茂陵書沈黎治笮都去長安三千三百三十五里領縣二十一應劭曰文山今蜀郡㟭山本冉駹是也秋東越王餘善反攻殺漢將吏遣橫海將軍韓說中尉王温舒出會稽師古曰說讀曰悅樓船將軍楊僕出豫章擊之又遣浮沮將軍公孫賀出九原臣瓉曰浮沮井名在匈奴中去九原二千里見漢輿地圖師古曰沮音子閭反匈河將軍趙破奴出令居臣瓉曰匈河水名在匈奴中去令居千里見匈奴傳師古曰令音鈴皆二千餘里不見虜而還廼分武威酒泉地置張掖敦煌郡師古曰敦音徒門反徙民㠯實之元封元年應劭曰始封㤗山故改元冬十月詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦師古曰輯與集同集和也朕將廵邊垂擇兵振旅躬秉武節置十二部將軍親帥師焉行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里威振匈奴遣使者告單于曰南越王頭已縣於漢北闕矣單于能戰天子自將待邊不能亟來臣服師古曰亟急也音居力反何但亡匿幕北寒苦之地為匈奴讋焉師古曰讋失氣也音之渉反還祠黄帝於橋山應劭曰在上郡周陽縣有黄帝冢廼歸甘泉東越殺王餘善降詔曰東越險阻反覆為後世患遷其民於江淮間遂虛其地春正月行幸緱氏詔曰朕用事華山至於中嶽文頴曰嵩高也在潁川陽城縣獲駮麃見夏后啓母石應劭曰啓生而母化為石文頴曰在嵩高山下師古曰啓夏禹子也其母塗山氏女也禹治鴻水通轘轅山化為熊謂塗山氏曰欲餉聞皷聲乃來禹跳石誤中皷塗山氏往見禹方作熊慙而去至嵩高山下化為石方生啓禹曰歸我子石破北方而啓生事見淮南子景帝諱啓今此詔云啓母蓋史追書之非當時文劉攽曰此石本名啓母石武帝避景諱更號夏后母石後人又誤重出啓字非史之追書也翌日親登崇嵩應劭曰翌明也宋祁曰新本作登嵩高御史乘屬在廟旁吏卒咸聞呼萬嵗者三服䖍曰乘同乘屬官屬也如淳曰漢儀注御史亦有屬晉灼曰天子出御史除一人為乘曹護車駕荀悅曰萬嵗山神稱之也應劭曰嵩高縣有上中下萬嵗里師古曰乘屬如晉二説是也乘音食證反登禮罔不荅師古曰罔無也言登禮於神無不荅應其令祠官加增太室祠韋昭曰嵩高山有太室少室之山山有石室故以名云禁無伐其草木㠯山下戸三百為之奉邑名曰崇高師古曰謂之崇者示尊崇之奉音扶用反獨給祠復亡所與師古曰復音方目反與讀曰預行遂東廵海上夏四月癸卯上還登封泰山孟康曰王者功成治定告成功於天封崇也助天之高也刻石紀號有金䇿石函金泥玉檢之封焉應劭曰封者壇廣十二丈高二丈階三等封於其上示增高也刻石紀績也立石三丈一尺其辭曰事天以禮立身以義事親以孝育民以仁四守之内莫不為郡縣四夷八蠻咸來貢職與天無極人民蕃息天祿永得尚𤣥酒而爼生魚下禪梁父祀地主示増廣此古制也武帝封廣丈二尺高九尺其下則有縢書秘語在郊祀志降坐明堂臣瓉曰郊祀志初天子封太山太山東北阯古時有明堂處則此所坐者也明年秋乃作明堂耳詔曰朕㠯𦕈身承至尊師古曰𦕈微細也競競焉惟德菲薄不明于禮樂師古曰菲亦薄也音敷尾反又音靡故用事八神文頴曰武帝祭太一并祭名山於太壇西南開除八通鬼道故言用事八神也一曰八方之神劉攽曰八神則郊祀志所說天主地主兵主隂主陽主日主月主四時主也其祠皆在齊地故始皇東遊海上行禮祠之而武帝亦然遭天地況施應劭曰況賜也施與也言天地神靈乃賜我瑞應著見景象㞕然如有聞臣瓉曰聞呼萬嵗者三是也宋祁曰姚本云㞕先結反與屑同說文云動作切切也一曰敬也又潔也震于怪物欲止不敢遂登封泰山至于梁父然後升䄠肅然服䖍曰増天之高歸功於天禪闡也廣土地也肅然山名也在梁父張晏曰天高不可及於泰山上立封又禪而祭之冀近神靈也師古曰父讀曰甫自新嘉與士大夫更始其㠯十月為元封元年行所廵至博奉高蛇丘歴城梁父鄭氏曰蛇音移民田租逋賦貸已除師古曰逋賦未出賦者也逋貸官以物貸之而未還也貸音吐戴反加年七十㠯上孤寡帛人二匹四縣無出今年筭師古曰自博至梁父凡五縣今云四縣母出筭者奉高一縣素以供神非筭限也賜天下民爵一級女子百户牛酒行自泰山復東廵海上至碣石文頴曰在遼西絫縣絫縣今罷屬臨榆此石著海旁師古曰碣碣然特立之貌也音其列反宋祁曰絫縣舊作參非自遼西歴北邊九原歸于甘泉秋有星孛于東井又孛于三台齊王閎薨二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠泰山至瓠子臨決河服䖍曰瓠子隄名也在東郡白馬蘇林曰在鄄城以南濮陽以北廣百歩深五丈命從臣將軍㠯下皆負薪塞河隄作瓠子之歌赦所過徒賜孤獨高年米人四石還作甘泉通天臺長安飛亷館應劭曰飛廉神禽能致風氣者也明帝永平五年至長安迎取飛廉并銅馬置上西門外名平樂館董卓悉銷以為錢晉灼曰身似鹿頭如爵有角而蛇尾文如豹文師古曰通天臺者言此臺高上通於天也漢舊儀云高三十丈望見長安城朝鮮王攻殺遼東都尉廼募天下死罪擊朝鮮六月詔曰甘泉宫内中産芝九莖連葉應劭曰芝芝草也其葉相連如淳曰瑞應圖王者敬事􅂄老不失舊故則芝草生師古曰内中謂後庭之室也故云不異下房上帝博臨不異下房賜朕𢎞休師古曰上帝天也博廣也𢎞大也休美也言天廣臨不以下房為幽側而隔異之賜以此芝是大美也其赦天下賜雲陽都百户牛酒晉灼曰雲陽甘泉黄帝以來祭天圜丘處也武帝常以避暑有宫觀故稱都也師古曰此說非也都謂縣之所居在宫側者耳賜不徧其境内故指稱其都非謂天子之都也若以有宫觀稱都則非止雲陽矣作芝房之歌秋作明堂于泰山下遣樓船將軍楊僕左將軍荀彘將應募罪人擊朝鮮應劭曰樓船者時欲擊越非水不至故作大船上施樓也又遣將軍郭昌中郎將衞廣發巴蜀兵平西南夷未服者㠯為益州郡三年春作角抵戲應劭曰角者角技也抵者相抵觸也文頴曰名此樂為角抵者兩兩相當角力角技藝射御故名角抵蓋雜技樂也巴俞戲魚龍蔓延之屬也漢後更名平樂觀師古曰抵者當也非謂抵觸文說是也三百里内皆采觀夏朝鮮斬其王右渠降師古曰右渠朝鮮王名㠯其地為樂浪臨屯𤣥菟眞番郡臣瓉曰茂陵書臨屯郡治東􅀈縣去長安六千一百三十八里十五縣眞番郡治霅縣去長安七千六百四十里十五縣師古曰樂音洛浪音郎番音普安反􅀈音弋支反霅音丈甲反樓船將軍楊僕坐失亡多免為庶民左將軍荀彘坐争功棄市師古曰棄市殺之於市也觧在景紀秋七月膠西王端薨武都氐人反分徙酒泉郡師古曰不盡徙四年冬十月行幸雍祠五畤通回中道應劭曰回中在安定高平有險阻蕭關在其北通治至長安也孟康曰回中在北地有山險武帝故宫如淳曰三輔黄圖云回中宫在汧也師古曰回中在安定北通蕭關應說是也而云治道至長安非也蓋自回中通道以出蕭關孟如二家皆失之矣回中宫在汧者或取安定回中為名耳非今所通道遂北出蕭關如淳曰匈奴傳入朝郍蕭關蕭關在安定朝郍縣也歴獨鹿鳴澤服䖍曰獨鹿山名也鳴澤澤名也皆在涿郡廼縣北界也自代而還幸河東春三月祠后土詔曰朕躬祭后土地祗見光集于靈壇一夜三燭服䖍曰燭音注師古曰燭謂照也讀如本字幸中都宫殿上見光師古曰中都在太原其赦汾隂夏陽中都死罪㠯下賜三縣及楊氏皆無出今年租賦師古曰楊氏河東聚邑名夏大旱民多暍死如淳曰暍音謁師古曰中熱而死也秋㠯匈奴弱可遂臣服廼遣使說之單于使來死京師匈奴宼邊遣㧞胡將軍郭昌屯朔方五年冬行南廵狩至于盛唐文頴曰案地理志不得疑當在廬江左右縣名也韋昭曰在南郡師古曰韋說是也望祀虞舜于九嶷應劭曰舜葬蒼梧九嶷山名今在零陵營道文頴曰九嶷山半在蒼梧半在零陵如淳曰舜葬九嶷九嶷在蒼梧馮乘縣故或云舜葬蒼梧也師古曰文說是也嶷音疑其山九􅄘形勢相似故曰九嶷山宋祁曰舊本是也下有九字嶷字下無音疑字刋誤據史舘本改登􅈞天柱山應劭曰􅈞音若潜南嶽霍山在􅈞􅈞縣名屬廬江文頴曰天柱山在􅈞縣南有祠􅈞音岑師古曰􅈞音與潜同應説是自尋陽浮江親射蛟江中獲之師古曰許愼云蛟龍屬也郭璞說其狀云似蛇而四脚細頸頸有白嬰大者數圍卵生子如一二斛瓮能吞人也舳艫千里李斐曰舳船後持柂處也艫船前頭刺櫂處也言其船多前後相衘千里不絶也師古曰舳音軸艫音盧薄樅陽而出服䖍曰縣名屬廬江師古曰樅音千松反作盛唐樅陽之歌遂北至琅邪並海師古曰並讀曰傍傍依也音歩浪反所過禮祠其名山大川春三月還至太山增封甲子祠高祖于明堂㠯配上帝因朝諸侯王列侯受郡國計師古曰計若今之諸州計帳也宋祁曰南本無此注予案太初元年受計於甘泉下注又云若今之諸州計帳疑只當一見夏四月詔曰朕廵荆揚輯江淮物如淳曰輯合也物猶神也郊祀志所祭祀事也師古曰輯與集同會大海氣鄭氏曰會合海神之氣并祭之㠯合泰山師古曰集江淮之神會大海之氣合致於太山然後脩封總祭饗也上天見象增脩封禪師古曰見謂顯示也其赦天下所幸縣毋出今年租賦賜鰥寡孤獨帛貧窮者粟還幸甘泉郊泰畤大司馬大將軍青薨初置刺史部十三州師古曰漢舊儀云初分十三州假刺史印綬有常治所治以秋分行部御史為駕四封乘傳到所部郡國各遣一吏迎之界上所察六條名臣文武欲盡詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里師古曰踶蹋也奔走也奔踶者乘之即奔立則踶人也踶音徒計反士或有負俗之累而立功名晉灼曰負俗謂被世譏論也師古曰累音力瑞反夫泛駕之馬師古曰泛覆也音方勇反字本作覂後通用耳覆駕者言馬有逸氣而不循軌轍也跅弛之士如淳曰跅音拓弛廢也士行有卓異不入俗檢而見斥逐者也師古曰跅者跅落無檢局也弛者放廢不遵禮度也跅音土各反弛音式爾反亦在御之而已師古曰在人所以制御之其令州郡察吏民有茂材異等應劭曰舊言秀才避光武諱稱茂材異等者超等軼羣不與凡同也師古曰茂美也可為將相及使絶國者師古曰絶遠之國謂聲教之外六年冬行幸回中春作首山宫應劭曰首山在上郡於其下立宫廟也文頴曰在河東蒲坂界師古曰尋此下詔文及依地理志文說是三月行幸河東祠后土詔曰朕禮首山昆田出珍物化或為黃金應劭曰昆田首山之下田也武帝祠首山故神為出珍物化為黄金祭后土神光三燭其赦汾隂殊死㠯下賜天下貧民布帛人一匹益州昆明反赦京師亡命令從軍遣㧞胡將軍郭昌將㠯擊之夏京師民觀角抵于上林平樂館秋大旱蝗太初元年應劭曰初用夏正以正月為嵗首故改年為太初也冬十月行幸泰山十一月甲子朔旦冬至祀上帝于明堂乙酉柏梁臺災十二月䄠高里伏儼曰山名在泰山下師古曰此高字自作高下之高而死人之里謂之蒿里或呼為下里者也字則為􅅾蒿之蒿或者既見太山神靈之府高里山又在其旁即誤以高里為蒿里混同一事文學之士共有此謬陸士衡尚不免況其餘乎今流俗書本此高字有作蒿者妄加増耳祠后土東臨勃海望祠蓬萊春還受計于甘泉師古曰受郡國所上計簿也若今之諸州計帳二月起建章宫文頴曰越巫名勇謂帝曰越國有火災即復大起宫室以厭勝之故帝作建章宫師古曰在未央宫西今長安故城西俗所呼貞女樓者即建章宫之闕也夏五月正歴㠯正月為嵗首師古曰謂以建寅之月為正也未正歴之前謂建亥之月為正今此言以正月為嵗首者史追正其月名色上黃數用五張晏曰漢據土德上數五故用五謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之足之定官名協音律遣因杅將軍公孫敖服䖍曰匈奴地名因所征以名將軍也師古曰杅音羽俱反築塞外受降城秋八月行幸安定遣貳師將軍李廣利發天下讁民西征大宛張晏曰貳師大宛城名師古曰庶人之有罪讁者也大宛國名宛音於元反蝗從東方飛至敦煌二年春正月戊申丞相慶薨師古曰石慶也三月行幸河東祠后土令天下大酺五日膢五日祠門户比臘如淳曰膢音樓漢儀注立秋貙膢伏儼曰膢音劉劉殺也蘇林曰膢祭名也貙虎屬常以立秋日祭獸王者亦以此日出獵還以祭宗廟故有貙膢之祭也師古曰續漢書作貙劉膢劉義各通耳臘者冬至後臘祭百神也臘音來盍反劉攽曰膢五日衍五字夏四月詔曰朕用事介山祭后土皆有光應文頴曰介山在河東皮氏縣東南其山特立周七十里高三十里其赦汾隂安邑殊死㠯下五月籍吏民馬補車騎馬師古曰籍者總入籍録而取之秋蝗遣浚稽將軍趙破奴應劭曰浚稽山在武威塞北匈奴常所以為障蔽師古曰浚音峻稽音雞二萬騎出朔方擊匈奴不還冬十二月御史大夫兒寛卒師古曰兒音五兮反三年春正月行東廵海上夏四月還脩封泰山䄠石閭應劭曰石閭山在泰山下阯南方方士言仙人閭也遣光祿動徐自為築五原塞外列城晉灼曰地理志從五原棝陽縣北出石門鄣即得所築城師古曰棝音固西北至盧朐服䖍曰匈奴地名張晏曰山名師古曰張說是也朐音劬游擊將軍韓說將兵屯之師古曰說讀曰悦强弩都尉路博德築居延秋匈奴入定襄雲中殺畧數千人行壊光祿諸亭障應劭曰光祿勲徐自為所築列城今匈奴從此往壊敗也師古曰漢制每塞要處别築為城置人鎮守謂之候城此即障也音之向反又入張掖酒泉殺都尉四年春貳師將軍廣利斬大宛王首獲汗血馬來應劭曰大宛舊有天馬種蹋石汗血汗從前肩膞出如血號一日千里師古曰蹋石者謂蹋石而有跡言其蹏堅利作西極天馬之歌秋起明光宫師古曰三輔黄圖云在城中元后傳云成都侯商避暑借光明宫蓋謂此冬行幸回中徙𢎞農都尉治武關税出入者㠯給關吏卒食天漢元年應劭曰時頻年苦旱故改元為天漢以祈甘雨師古曰大雅有雲漢之詩周大夫仍叔所作也以美宣王遇旱災脩德勤政而能致雨故依以為年號也春正月行幸甘泉郊泰畤三月行幸河東祠后土匈奴歸漢使者使使來獻夏五月赦天下秋閉城門大搜臣瓉曰漢帝年紀六月禁踰侈七月閉城門大捜則捜索踰侈者也李奇曰捜索巫蠱也師古曰時巫蠱未起瓉說是也踰侈者踰法度而奢侈也發謫戍屯五原二年春行幸東海還幸回中夏五月貳師將軍三萬騎出酒泉與右賢王戰于天山晉灼曰在西域近蒲類國去長安八千餘里師古曰即祁連山也匈奴謂天為祁連祁音巨夷反今鮮卑語尚然斬首虜萬餘級又遣因杅將軍出西河騎都尉李陵將歩兵五千人出居延北與單于戰斬首虜萬餘級陵兵敗降匈奴秋止禁巫祠道中者文頴曰始漢家于道中祠排禍咎移之於行人百姓以其不經今止之也師古曰文說非也秘祝移過文帝久已除之今此總禁百姓巫覡於道中祠祭者耳大捜臣瓉曰捜謂索姦人也晉灼曰捜巫蠱也師古曰瓉說是渠黎六國使使來獻臣瓉曰渠黎西域胡國名泰山琅邪羣盗徐勃等阻山攻城師古曰阻山者依山之險以自固也道路不通遣直指使者暴勝之等衣繡衣杖斧分部逐捕師古曰杖斧持斧也謂建持之以為威也分音扶問反刺史郡守㠯下皆伏誅冬十一月詔關都尉曰今豪桀多遠交依東方羣盗其謹察出入者三年春二月御史大夫王卿有罪自殺初𣙜酒酤如淳曰𣙜音較應劭曰縣官自酤𣙜賣酒小民不復得酤也韋昭曰以木渡水曰𣙜謂禁民酤釀獨官開置如道路設木為𣙜獨取利也師古曰𣙜者步渡橋爾雅謂之石杠今之畧彴是也禁閉其事總利入官而下無由以得有若渡水之𣙜因立名焉酤音工護反彴音酌三月行幸泰山脩封祀明堂因受計還幸北地祠常山瘞𤣥玉鄧展曰瘞埋也師古曰爾雅曰祭地曰瘞薶薶其物者示歸於地也瘞音於例反夏四月赦天下行所過毋出田租秋匈奴入鴈門太守坐畏愞棄市如淳曰軍法行逗留畏愞者要斬愞音如掾反師古曰又音乃舘反四年春正月朝諸侯王于甘泉宫發天下七科讁張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也及勇敢士遣貳師將軍李廣利將六萬騎歩兵七萬人出朔方因杅將軍公孫敖萬騎歩兵二萬人出鴈門游擊將軍韓說歩兵三萬人出五原師古曰說讀曰悦强弩都尉路博德歩兵萬餘人與貳師會廣利與單于戰余吾水上連日敖與左賢王戰不利皆引還夏四月立皇子髆為昌邑王孟康曰髆音博晉灼曰許愼以為肩髆字秋九月令死罪入贖錢五十萬減死一等太始元年應劭曰言盪滌天下與民更始故以冠元春正月因杅將軍敖有罪要斬徙郡國吏民豪桀于茂陵雲陵師古曰此當言雲陽而傳寫者誤為陵耳茂陵帝自所起而雲陽甘泉所居故總使徙豪桀也鉤弋趙倢伃死葬雲陽至昭帝即位始尊為皇太后而起雲陵武帝時未有雲陵夏六月赦天下二年春正月行幸回中三月詔曰有司議曰往者朕郊見上帝西登隴首獲白麟㠯饋宗廟渥注水出天馬泰山見黃金師古曰見音胡電反宜改故名今更黃金為麟趾褭蹏㠯恊瑞焉應劭曰獲白麟有馬瑞故改鑄黄金如麟趾褭蹏以恊嘉祉也古有駿馬名要褭赤喙黒身一日行萬五千里也師古曰既云宜改故名又曰更黄金為麟趾褭蹏是則舊金雖以斤兩為名而官有常形制亦由今時吉字金挺之類矣武帝欲表祥瑞故普改鑄為麟足馬蹏之形以易舊法耳今人往往於地中得馬蹏金金甚精好而形製巧妙褭音奴了反劉攽曰按元封六年詔曰朕禮首山昆田出珍物或化為黄金而此稱泰山似非是所謂黄金為麟趾褭蹏者葢用首山金為之耳故詔先敘三瑞下乃云㠯恊瑞焉因㠯班賜諸侯王秋旱九月募死罪人贖錢五十萬減死一等御史大夫杜周卒三年春正月行幸甘泉宫饗外國客二月令天下大酺五日行幸東海獲赤鴈作朱鴈之歌幸琅邪禮日成山孟康曰禮日拜日也如淳曰祭日於成山也師古曰成山在東萊不夜縣斗入海郊祀志作盛山其音同登之罘晉灼曰地理志東萊腄縣有之罘山祠師古曰罘音浮腄音直瑞反浮大海山稱萬嵗冬賜行所過户五千錢鰥寡孤獨帛人一匹四年春三月行幸泰山壬午祀高祖于明堂㠯配上帝因受計癸未祀孝景皇帝于明堂甲申脩封丙戍䄠石閭夏四月幸不其如淳曰其音基不其山名因以為縣應劭曰東萊縣也祠神人于交門宫應劭曰神人蓬萊仙人之屬也晉灼曰琅邪縣有交門宫武帝所造若有鄉坐拜者師古曰如有神之景象嚮祠坐而拜也漢注云神並見且白且黒且大且小鄉坐三拜鄉讀曰嚮坐音才臥反作交門之歌夏五月還幸建章宫大置酒赦天下秋七月趙有蛇從郭外入邑與邑中蛇羣鬭孝文廟下服䖍曰趙所立孝文廟也邑中蛇死冬十月甲寅晦日有蝕之十二月行幸雍祠五畤西至安定北地征和元年應劭曰言征伐四夷而天下和平春正月還行幸建章宫三月趙王彭祖薨冬十一月發三輔騎士大捜上林閉長安城門索文頴曰簡車馬數軍實也臣瓉曰捜謂索姦人也上林苑周回數百里故發三輔車騎入大捜索也漢帝年紀發三輔騎士大捜長安上林中閉城門十五日待詔北軍征官多餓死然則皆捜索非數軍實也師古曰文説非也索音山客反十一日廼解巫蠱起二年春正月丞相賀下獄死夏四月大風發屋折木閠月諸邑公主陽石公主師古曰諸邑琅邪縣也以封公主故謂之邑陽石北海縣也二公主皆衞皇后之女也陽字或作羊皆坐巫蠱死夏行幸甘泉秋七月按道侯韓說使者江充等掘蠱太子宫師古曰即上游擊將軍韓說也壬午太子與皇后謀斬充㠯節發兵與丞相劉屈􅈊大戰長安師古曰屈音丘勿反音其勿反􅈊音力之死者數萬人庚寅太子亡師古曰謂逃匿也皇后自殺初置城門屯兵更節加黃旄應劭曰時太子亦發節以戰故加其上黄以别之御史大夫暴勝之司直田仁坐失縱勝之自殺仁要斬八月辛亥太子自殺于湖師古曰湖縣名也即今虢州閺鄉湖城二縣皆其地癸亥地震九月立趙敬肅王子偃為平干王匈奴入上谷五原殺畧吏民三年春正月行幸雍至安定北地匈奴入五原酒泉殺兩都尉三月遣貳師將軍廣利將七萬人出五原御史大夫商丘成二萬人出西河重合侯馬通四萬騎出酒泉城至浚稽山師古曰音峻雞與虜戰多斬首通至天山虜引去因降車師皆引兵還廣利敗降匈奴夏五月赦天下六月丞相屈􅈊下獄要斬妻子梟首鄭氏曰妻作巫蠱夫從坐但要斬也師古曰屈氂亦坐與貳師將軍謀立昌邑王宋祁曰妻子舊本無子字秋蝗九月反者公孫勇胡倩發覺皆伏辜師古曰倩音千見反四年春正月行幸東萊臨大海二月丁酉隕石于雍二師古曰雍扶風之縣也二者石之數聲聞四百里三月上耕于鉅定服䖍曰地名也近東海應劭曰齊國縣也晉灼曰案地理志應說是還幸泰山脩封庚寅祀于明堂癸巳䄠石閭夏六月還幸甘泉秋八月辛酉晦日有蝕之後元元年劉攽曰按昭帝紀云辭訟在後二年前皆勿聼則當但稱後元年也春正月行幸甘泉郊泰畤遂幸安定昌邑王髆薨二月詔曰朕郊見上帝師古曰見音胡電反以下光景並見亦同廵于北邊見羣鶴留止㠯不羅罔靡所獲獻如淳曰時春也非用羅罔時故無所獲也薦于泰畤光景並見其赦天下夏六月御史大夫商丘成有罪自殺師古曰坐於廟中醉而歌侍中僕射莽何羅與弟重合侯通謀反孟康曰征和三年言重合侯馬通今此言莽明德馬后惡其先人有反易姓莽師古曰莽音莫户反宋祁曰案馬亦滿補反易馬為莽者以二字音同字之聲既不可改故但易其形耳以是知漢雖馬姓亦謂之姥也侍中駙馬都尉金日磾奉車都尉霍光騎都尉上官桀討之師古曰磾音丁奚反秋七月地震往往湧泉出二年春正月朝諸侯王于甘泉宫賜宗室二月行幸盩厔五柞宫晉灼曰盩厔扶風縣也張晏曰有五柞樹因以名宫也師古曰盩音張流反厔音竹乙反乙丑立皇子弗陵為皇太子張晏曰昭帝也後但名弗以二名難諱故丁卯帝崩于五柞宫臣瓉曰帝年十七即位即位五十四年壽七十一入殯于未央宫前殿三月甲申葬茂陵臣瓉曰自崩至葬凡十八日茂陵在長安西北八十里也賛曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家師古曰百家謂諸子雜說違背六經表章六經師古曰六經謂易詩書春秋禮樂也遂疇咨海内舉其俊茂師古曰疇誰也咨謀也言謀於衆人誰可為事者也與之立功興太學脩郊祀改正朔定歴數師古曰正音之成反他皆類此恊音律作詩樂建封䄠禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風師古曰三代夏殷周如武帝之雄材大畧不改文景之㳟儉㠯濟斯民雖詩書所稱何有加焉師古曰美其雄材大畧而非其不恭儉也前漢書卷六前漢書卷六考證武帝紀建元元年劉攽云云臣照按攽論當矣然謂元鼎以前之元皆有司所追命則恐無臣子妄造元號之理蓋必有詔命追稱而今不可考耳或治申商注李奇曰申不害書執術監本訛執衞宋本無術字中尉程不識為車騎將軍臣召南按公卿表中尉無程不識是時中尉為張􅇌又按李廣傳廣為未央衞尉不識為長樂衞尉即灌夫傳田蚡所云程李俱為東西宫衞尉者也此文當云長樂衞尉訛作中尉起龍淵宫注漢章帝賜尚書韓稜龍淵劒章訛帝今改正置五屬國以處之臣召南按杜佑通典曰安定上郡天水張掖五原為五屬國以地理志核之安定屬國都尉治三水上郡屬國都尉治龜兹天水屬國都尉治勇士滿福五原屬國都尉治蒲澤而張掖屬國都尉後書郡國志云武帝置知通典之説甚確但安定天水至元鼎三年始置張掖至元鼎六年始分則此時豈容先置都尉乎胡三省注通鑑云五郡故塞外以隴西北地上郡朔方雲中當之蓋有由也攻故安圍枹䍐胡三省曰故安縣屬􅃰郡西羗之兵安能至此當作安故地理志安故枹䍐二縣皆屬隴西郡初置刺史部十三州監本訛十二州今改正臣召南按晉志冀幽并兖徐青揚荆豫益凉及朔方交阯所謂十三州也至征和四年又置司𨽻校尉督察三輔三河𢎞農秋閉城門大捜注捜索踰侈者也顧炎武曰此與二年及征和元年之大捜同皆捜索奸人非踰侈者也出酒泉與右賢王戰于天山注師古曰即祁連山也臣召南按晉灼說是師古說非也此天山即白山括地志云今云折羅漫山在伊州伊吾縣者師古以甘州張掖縣之祁連當之則戰于内地上文不應云出酒泉矣祁連固即天字但此天山遠在西北非前此霍去病所奪之祁連近在内地者也還幸北地祠常山臣召南按此北地非郡名猶言北邊耳常山即北岳恒山在常山郡上曲陽西北秋九月令死罪入贖錢五十萬減死一等臣浩按此文天漢四年也至太始二年九月又云募死罪人贖錢五十萬减死一等二文相類一作令一作募一作入一作人必有一訛顧炎武曰此一事而重見又同是九月疑衍文也後元元年王禕曰武帝沿文景故事復為後元然始以後元二字加于年上此為異也非史官追書之前漢書卷六考證
