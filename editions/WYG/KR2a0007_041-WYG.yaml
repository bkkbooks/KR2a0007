body:
  text: 前漢書卷四十一漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注樊酈滕灌傅靳周傳第十一樊噲沛人也以屠狗為事師古曰時人食狗亦與羊豕同故噲專屠以賣後與高祖俱隱於芒碭山澤間陳勝初起蕭何曹參使噲求迎高祖立為沛公師古曰高祖時亡在外故求而迎之噲以舍人從攻胡陵方與師古曰皆縣名方音房與音豫還守豐擊泗水監豐下破之師古曰泗水郡名監謂御史監郡者也破之於豐縣下復東定沛破泗守薛西師古曰破郡守於薛縣之西宋祁曰泗字下疑有水字與司馬􅊂戰碭東師古曰秦將章邯之司馬也􅊂讀與夷同郤敵斬首十五級賜爵國大夫文穎曰即官大夫也爵第六級常從沛公擊章邯軍濮陽攻城先登斬首二十三級賜爵列大夫文穎曰即公大夫也爵第七級從攻陽城先登下户牗師古曰陽武縣之鄉破李由軍斬首十六級賜上聞爵張晏曰得徑上聞也如淳曰呂氏春秋曰魏文侯東勝齊於長城天子賞文侯以上聞晉灼曰名通於天子也從攻圉都尉東郡守尉於成武師古曰圉即陳留圉縣劉攽曰圉縣名有尉無都尉又郡都尉至景帝方置明此衍都字郤敵斬首十四級捕虜十六人師古曰生獲曰虜賜爵五大夫從攻秦軍出亳南鄭氏曰亳成湯封邑今河南偃師湯亭是河間守軍於杠里破之師古曰杠音江擊破趙賁軍開封北師古曰賁音奔以郤敵先登斬候一人首六十八級捕虜二十六人師古曰既斬候一人又更斬它首六十八賜爵卿從攻破揚熊於曲遇師古曰曲音丘羽反遇音顒攻宛陵先登斬首八級捕虜四十四人賜爵封號賢成君張晏曰食禄比封君而無邑也臣瓚曰秦制列侯乃有封爵師古曰瓚説非也楚漢之際權設寵榮假其位號或得邑地或空受爵此例多矣約以秦制於義不通從攻長社轘轅絶河津東攻秦軍尸鄉南攻秦軍於犨破南陽守齮於陽城東攻宛城先登西至酈師古曰南陽之縣也音直益反以郤敵斬首十四級捕虜四十人賜重封張晏曰益禄也如淳曰正爵名也臣瓚曰增封也師古曰諸家之説皆非也重封者加二號耳攻武闗至霸上斬都尉一人首十級捕虜百四十六人降卒二千九百人項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中酒張晏曰酒酣也師古曰飲酒之中也不醉不醒故謂之中中音竹仲反亞父謀欲殺沛公令項莊㧞劔舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急廼持盾入初入營營衞止噲師古曰營衞謂營壘之守衞者噲直撞入立帳下師古曰謂以盾撞擊人撞音丈江反項羽目之問為誰張良曰沛公參乘樊噲也項羽曰壯士賜之巵酒彘肩噲既飲酒拔劔切肉食之項羽曰能復飲乎噲曰臣死且不辭豈特巵酒乎且沛公先入定咸陽暴師覇上以待大王師古曰時項羽未為王故高紀云以待將軍此言大王史追書耳大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽黙然沛公如厠麾噲去既出沛公留車騎師古曰沛公所乘之車及從者之騎獨騎馬噲等四人步從從山下走歸覇上軍而使張良謝項羽羽亦因遂已師古曰已止也無誅沛公之心是日微樊噲奔入營宋祁曰奔疑作犇譙讓項羽沛公幾殆師古曰微無也譙責也殆危也譙音才笑反幾音鉅依反後數日項羽入屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦别擊西丞白水北服䖍曰西丞縣名也晉灼曰白水今廣平魏縣也地理志無西丞似秦將名也師古曰二説並非也西謂隴西郡西縣也白水水名經西縣東南流而過言擊西縣之丞於白水之北擁輕車騎雍南破之從攻雍斄城先登師古曰斄讀與邰同縣名即后稷所封今武功故城是音胎擊章平軍好畤攻城先登陷陣斬縣令丞各一人首十一級虜二十人遷為郎中騎將從擊秦車騎壤東師古曰地名也郤敵遷為將軍攻趙賁下郿槐里柳中咸陽師古曰柳中即細柳地也在長安西灌廢邱最李奇曰以水灌廢丘也張晏曰最功第一也晉灼曰京輔治華陰灌北也師古曰高紀言引水灌廢丘李説是也或者云漢王自彭城敗還始灌廢丘此時未也此説非矣彭城還更灌廢丘始平定之無廢丘此時已當灌矣至櫟陽賜食邑杜之樊鄉師古曰杜縣之鄉也今曰樊川從攻項籍屠煮棗晋灼曰地理志無也清河有煑棗城功臣表有煑棗侯師古曰既云攻項籍屠煑棗則其地當在大河之南非清河之城明矣但未詳其處耳宋祁曰後漢地理志濟陰郡宛胊有煑棗城擊破王武程處軍於外黄攻鄒魯瑕丘薛項羽敗漢王於彭城盡復取魯梁地噲還至滎陽益食平陰二千户以將軍守廣武一歲師古曰即滎陽之廣武項羽引東從高祖擊項籍下陽夏師古曰夏音工雅反虜楚周將軍卒四千人師古曰周殷圍項籍陳大破之師古曰於陳縣圍之屠胡陵項籍死漢王即皇帝位以噲有功益食邑八百户其秋燕王臧荼反噲從攻虜荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絶食舞陽號為舞陽侯除前所食以將軍從攻反者韓王信於代自霍人以往至雲中與絳侯等共定之益食千五百戸因擊陳豨與曼丘臣軍戰襄國破柏人先登降之定清河常山凡二十七縣殘東垣張晏曰殘有所毁也臣瓚曰殘為多所殺傷也師古曰瓚説是遷為左丞相破得綦毋卬尹潘軍於無終廣昌師古曰姓綦毋名卬也綦音其破豨别將胡人王黃軍代南因擊韓信軍參合軍所將卒斬韓信擊豨胡騎橫谷斬將軍趙既虜代丞相馮梁守孫奮大將王黃將軍大將一人太僕解福等十人與諸將共定代鄉邑七十三後燕王盧綰反噲以相國擊綰破其丞相抵薊南師古曰抵至也一説抵者其丞相之名也音丁禮反定燕縣十八鄉邑五十一益食千三百戸定食舞陽五千四百户從斬首百七十六級虜二百八十七人别破軍七下城五定郡六縣五十二得丞相一人將軍十三人二千石以下至三百石十二人噲以呂后弟呂嬃為婦生子伉師古曰伉音抗又音剛故其比諸將最親先黥布反時高帝嘗病師古曰黥布未反之前惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日噲廼排闥直入師古曰闥宫中小門也一曰門屏也音土曷反大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也師古曰憊力極也音蒲拜反且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎師古曰顧猶反也且陛下獨不見趙高之事乎師古曰謂始皇崩趙高矯為詔命殺扶蘇而立胡亥高帝笑而起其後盧綰反高帝使噲以相國擊燕是時高帝病甚人有惡噲黨於呂氏師古曰惡謂毁譛言其罪惡也即上一日宫車晏駕則噲欲以兵盡誅戚氏趙王如意之屬高帝大怒廼使陳平載絳侯代將而即軍中斬噲師古曰即就也陳平畏呂后執噲詣長安至則高帝已崩呂后釋噲師古曰釋解也解免其罪得復爵邑孝惠六年噲薨諡曰武侯子伉嗣而伉母呂嬃亦為臨光侯高后時用事顓權師古曰顓與專同太臣盡畏之高后崩大臣誅呂嬃等因誅伉舞陽侯中絶數月孝文帝立廼復封噲庻子市人為侯復故邑薨諡曰荒侯子佗廣嗣六歲其舍人上書言荒侯市人病不能為人師古曰言無人道也令其夫人與其弟亂而生佗廣佗廣實非荒侯子下吏免平帝元始二年繼絶世封噲𤣥孫之子章為舞陽侯邑千户酈商高陽人也師古曰酈音歴陳勝起商聚少年得數千人沛公畧地六月餘商以所將四千人屬沛公於岐從攻長社先登賜爵封信成君從攻緱氏絶河津破秦軍雒陽東從下宛穰定十七縣别將攻旬關師古曰漢中旬水上之關也今在洵陽縣西定漢中師古曰先言取旬關定漢中然後云沛公為漢王是則沛公從武關藍田而來商時别從西道平定漢中沛公為漢王賜商爵信成君劉奉世曰君當作侯高祖為漢王絳灌諸將皆賜侯爵商因其故號封之也商先以從攻長社先登封信成君以將軍為隴西都尉别定北地郡破章邯别將於烏氏栒邑泥陽師古曰烏氏安定縣也栒邑今在􅃎州泥陽北地縣氏音支栒音荀賜食邑武城六千户從擊項籍軍與鍾離昧戰受梁相國印師古曰漢以梁相國印授之益食四千户從擊項羽二歲攻胡陵漢王即帝位燕王臧荼反商以將軍從擊荼戰龍脱孟康曰地名也先登陷陣破荼軍易下師古曰今易縣郤敵遷為右丞相賜爵列侯與剖符世世勿絶食邑涿郡五千户别定上谷因攻代受趙相國印師古曰初受梁相國印今又受趙相國印與絳侯等定代郡鴈門得代丞相程縱守相郭同師古曰守相謂為相而居守者將軍以下至六百石十九人還以將軍將太上皇衞一歲十月以右丞相擊陳豨殘東垣又從擊黥布攻其前垣李奇曰前鋒堅蔽若垣墻也或曰軍前以大車自障若垣也師古曰二説皆非也謂攻其壁壘之前垣陷兩陳得以破布軍更封為曲周侯食邑五千一百户除前所食凡别破軍三降定郡六縣七十三得丞相守相大將軍各一人小將軍二人宋祁曰越夲景祐本無二軍字二千石以下至六百石十九人商事孝惠帝呂后呂后崩商疾不治事文穎曰商有疾病不能治官事其子寄字况與呂禄善及高后崩大臣欲誅諸呂呂禄為將軍軍於北軍太尉勃不得入北軍於是廼使人刼商令其子寄紿呂禄呂禄信之與出游而太尉勃廼得入據北軍遂以誅諸呂商是歲薨諡曰景侯子寄嗣天下稱酈況賣友孝景時吳楚齊趙反上以寄為將軍圍趙城七月不能下欒布自平齊來廼滅趙孝景中二年寄欲取平原君為夫人蘇林曰景帝王皇后毋臧兒也景帝怒下寄吏免上廼封商它子堅為繆侯師古曰繆所封邑名奉商後傳至𤣥孫終根武帝時為太常坐巫蠱誅國除元始中賜高祖時功臣自酈商以下子孫爵皆關内侯食邑凡百餘人夏侯嬰沛人也為沛厩司御每逄使客還過泗上亭與高祖語未嘗不移日也嬰已而試補縣吏與高祖相愛高祖戲而傷嬰人有告高祖高祖時為亭長重坐傷人如淳曰為吏傷人其罪重告故不傷嬰蘇林曰自告情故不傷嬰也嬰證之移獄覆嬰坐高祖繫歲餘掠笞數百終脱高祖劉攽曰告故不傷嬰者髙祖抵言不曽傷嬰故嬰證其實然告故者反坐栲告者不服故移獄覆矣嬰以此坐繫掠笞也高祖之初與徒屬欲攻沛也師古曰謂始亡在外未被樊噲召時劉奉世曰欲攻沛者以沛令後悔閉城城守也此即被樊噲召時按帝紀未嘗兩至沛下文義相屬非兩事甚明嬰時以縣令史為高祖使上降沛一日師古曰謂老父開城門迎高祖時也高祖為沛公賜爵七大夫以嬰為太僕常奉車師古曰為沛公御車從攻胡陵嬰與蕭何降泗水監平張晏曰胡陵平所止縣何嘗紿之故與降平以胡陵降賜嬰爵五大夫從擊秦軍碭東攻濟陽下户牗破李由軍雍丘以兵車趣攻戰疾破之師古曰趣讀曰促謂急速也次下亦同賜爵執帛從擊章邯軍東阿濮陽下以兵車趣攻戰疾破之賜爵執圭從擊趙賁軍開封揚熊軍曲遇嬰從捕虜六十八人降卒八百五十人得印一匱師古曰時自相署置官之印又擊秦軍雒陽東以兵車趣攻戰疾賜爵封轉為滕令鄧展曰今沛郡公丘縣宋祁曰浙本封字上有重字因奉車師古曰因此又每奉車從攻戰以至覇上從攻定南陽戰於藍田芷陽師古曰芷陽後為霸陵縣至霸上沛公為漢王賜嬰爵列侯號昭平侯復為太僕從入蜀漢還定三秦從擊項籍至彭城項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後師古曰罷讀曰疲常蹳兩兒棄之服䖍曰蹳音撥晉灼曰音足跋物之跋師古曰服音是嬰常收載行面雍樹馳服䖍曰高祖欲斬之故嬰圍樹走面向樹也應劭曰古者立乘嬰恐小兒墮墜各置一面擁持之樹立也蘇林曰南方人謂抱小兒為雍樹面者以面首向臨之也師古曰面偕也雍抱持之言取兩兒令面背已而抱持之以馳故云面雍樹馳服言圍樹而走義尤疎越雍讀曰擁劉奉世曰抱兩兒者未有能背面而能抱持者况復馳乎蘇説是也漢王怒欲斬嬰者十餘卒得脱而致孝惠魯元於豐漢王既至滎陽收散兵復振賜嬰食邑沂陽師古曰沂音魚依反擊項籍下邑追至陳卒定楚至魯益食兹氏師古曰兹氏縣名地理志屬太原漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝陰剖符世世勿絶從擊代至武泉雲中益食千户因從擊韓信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉師古曰故示閑暇所以固士卒心而令敵不測也鄉讀曰嚮卒以得脱師古曰卒終也益食嬰細陽千户師古曰益其邑使食之從擊胡騎句注北大破之擊胡騎平城南三陷陳功為多賜所奪邑五百户孟康曰時有罪過奪邑者以賜之劉奉世曰言賜所奪則嬰蓋以過嘗奪邑今以功復賜之耳從擊陳豨黥布軍陷陳郤敵益千户定食汝陰六千九百户除前所食嬰自上初起沛常為太僕從竟高祖崩以太僕事惠帝惠帝及高后德嬰之脱孝惠魯元於下邑間也乃賜嬰北第第一師古曰北第者近北闕之第嬰最第一也故張衡西京賦云北闕甲第當道直啓曰近我以尊異之惠帝崩以太僕事高后高后崩代王之來嬰以太僕與東牟侯入清宮廢少帝以天子法駕迎代王代邸與大臣共立文帝復為太僕八歲薨諡曰文侯傳至曽孫頗師古曰頗音普河反尚平陽公主坐與父御婢姧自殺國除初嬰為滕令奉車故號滕公及曽孫頗尚主主隨外家姓號孫公主故滕公子孫更為孫氏灌嬰雎陽販繒者也師古曰繒者帛之總名高祖為沛公畧地至雍丘章邯殺項梁而沛公還軍於碭嬰以中涓從擊破東郡尉於成武及秦軍於杠里疾鬭賜爵七大夫又從攻秦軍亳南開封曲遇戰疾力孟康曰攻戰速疾也師古曰疾急速也力彊力也賜爵執帛號宣陵君從攻陽武以西至雒陽破秦軍尸北北絶河津南破南陽守齮陽城東遂定南陽郡西入武關戰於藍田疾力至霸上賜爵執圭號昌文君沛公為漢王拜嬰為郎中從入漢中十月拜為中謁者從還定三秦下櫟陽降塞王還圍章邯廢丘未拔從東出臨晉關擊降殷王定其地擊項羽將龍且魏相項佗軍定陶南疾戰破之賜嬰爵列侯號昌文侯食杜平鄉師古曰杜縣之平鄉復以中謁者從降下碭以北至彭城項羽擊破漢王漢王遁而西嬰從還軍於雍丘王武魏公申徒反張晏曰故秦將降為公今反從擊破之攻下外黃西收軍於滎陽楚騎來衆漢王廼擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲師古曰重泉縣名也地理志屬左馮翊習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者傅之如淳曰傅音附猶言隨從者嬰雖少然數力戰廼拜嬰為中大夫令李必駱甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之受詔别擊楚軍後絶其饟道師古曰饟古餉字起陽武至襄邑擊項羽之將項冠於魯下破之所將卒斬右司馬騎將各一人張晏曰主右方之馬左亦如之晉灼曰下所謂左右千人之騎宋祁曰淳化本作左右馬今越本無左字疑馬字上有司字不當去左字陽夏公注題云以注觀當有左字擊破柘公王武軍燕西師古曰柘縣名公者柘之令也王武其人姓名也燕亦縣名古南燕國也音一千反所將卒斬樓煩將五人李奇曰樓煩縣名其人善騎射故名射士為樓煩取其稱也師古曰解在項羽傳連尹一人蘇林曰楚官也擊王武别將桓嬰白馬下破之所將卒斬都尉一人以騎度河南送漢王到雒陽從北迎相國韓信軍於邯鄲還至敖倉嬰遷為御史大夫三年以列侯食邑杜平鄉劉奉世曰前已為列侯食杜平鄉矣疑駢出受詔將郎中騎兵東屬相國韓信擊破齊軍於歴下所將卒虜車騎將軍華毋傷師古曰華音下化反及將吏四十六人降下臨淄得相田光追齊相田橫至嬴博師古曰二縣名擊破其騎所將卒斬騎將一人生得騎將四人攻下嬴博破齊將軍田吸於千乘斬之東從韓信攻龍且留公於假宻師古曰留縣名公留令也攻龍且及留令於假密卒斬龍且師古曰嬰所將之卒也其下亦同生得右司馬連尹各一人樓煩將十人身生得亞將周蘭師古曰亞次也齊地已定韓信自立為齊王使嬰别將擊楚將公杲於魯北破之轉南破薛郡長師古曰長亦如郡守也時每郡置長身虜騎將入攻博陽前至下相以東南僮取慮徐師古曰僮及取慮及徐三縣名也取音趨又音秋慮音廬度淮盡降其城邑至廣陵蘇林曰别將兵屯廣陵也師古曰此説非也謂從下相以東南盡降城邑乃至廣陵皆平定項羽使項聲薛公郯公復定淮北嬰度淮擊破項聲郯公下邳斬薛公下下邳壽春擊破楚騎平陽師古曰此平陽在東郡遂降彭城虜柱國項佗師古曰佗音徒何反降留薛沛酇蕭相師古曰凡六縣也酇音才何反攻苦譙師古曰二縣也復得亞將與漢王㑹頤鄉從擊項籍軍陳下破之所將卒斬樓煩將二人虜將八人賜益食邑二千五百户項籍敗垓下去也嬰以御史大夫將車騎别追項籍至東城破之所將卒五人共斬項籍皆賜爵列侯降左右司馬各一人卒萬二千人盡得其軍將吏下東城歴陽度江破呉郡長吳下如淳曰䧺長之長也師古曰此説非也吳郡長當時為吳郡長嬰破之於吳下得吳守遂定吳豫章會稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千户以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絶食潁陰二千五百户從擊韓王信於代至馬邑别降樓煩以北六縣斬代左將破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人師古曰胡名也又受詔并將燕趙齊梁楚車騎擊破胡騎於硰石師古曰硰音子坐反至平城為胡所困從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人師古曰卒謂所將之卒也特獨也各獨為將降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布别將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又進破布别將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上益食邑二千五百戸布已破高帝歸定令嬰食潁陰五千户除前所食邑凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人嬰自破布歸高帝崩以列侯事惠帝及呂后呂后崩呂禄等欲為亂齊哀王聞之舉兵西呂禄等以嬰為大將軍徃擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅呂氏事師古曰風讀曰諷齊兵止不前絳侯等既誅諸呂齊王罷兵歸嬰自滎陽還與絳侯陳平共立文帝於是益封嬰三千户賜金千斤為太尉三歲絳侯勃免相嬰為丞相罷太尉官是歲匈奴大入北地上令丞相嬰將騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵後歲餘以丞相薨諡曰懿侯傳至孫彊有罪絶武帝復封嬰孫賢為臨汝侯奉嬰後後有罪國除傅寛以魏五大夫騎將從為舍人起橫陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寛封號共德君師古曰共讀曰恭從入漢中為右騎將定三秦賜食邑雕陰孟康曰縣名屬上郡從擊項籍待懷服䖍曰待高帝於懷懷縣名也師古曰地理志屬河内即今懷州賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下師古曰敖地名敖倉蓋取此名也左氏傳曰敖鄗之間益食邑屬淮陰張晏曰韓信也信時為相國云淮陰者終言之也擊破齊歴下軍擊田解屬相國參殘博師古曰參曹參也博大山縣也益食邑因定齊地剖符世世不絶封陽陵侯二千六百户除前所食為齊右丞相備齊張晏曰時田橫未降故設屯備五歲為齊相國四月宋祁曰景德本作四月别本作一字誤也擊陳豨屬太尉勃以相國代丞相噲擊豨一月徙為代相國將屯如淳曰既為相國有警則將卒而屯守也師古曰此説非也時代國常有屯兵以備邊㓂寛為代相兼將此屯兵也二歲為丞相將屯孝惠五年薨諡曰景侯傳至曾孫偃謀反誅國除靳歙以中涓從起宛朐師古曰歙音翕宛音於元反胊音其于反攻濟陽破李由軍擊秦軍開封東斬騎千人將一人如淳曰騎將率號為千人漢儀注邊郡置部都尉千人司馬候也首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人張晏曰主車也騎長一人張晏曰騎之長首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦别西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘擊反者王武等畧梁地别西擊邢説軍葘南破之師古曰葘縣名也後為考城説讀曰悦身得説都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東食邑四千二百户别之河内擊趙賁軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下十縣别攻破趙軍得其將司馬二人候四人降吏卒二千四百人從降下邯鄲别下平陽身斬守相所將卒斬兵守郡一人李奇曰或以為郡守也字反耳晉灼曰將兵郡守也師古曰當言兵郡守一人也降鄴從攻朝歌邯鄲又别擊破趙軍降邯鄲郡六縣還軍敖倉破項籍軍成臯南擊絶楚饟道起滎陽至襄邑破項冠魯下畧地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之别定江陵降柱國大司馬以下八人身得江陵王致雒陽師古曰江陵王謂共敖之子共尉也得而送致於雒陽因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户為信武侯以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎别擊陳豨丞相敞破之師古曰侯敞因降曲逆從擊黥布有功益封定食邑五千三百户凡斬首九十級虜百四十二人别破軍十四降城五十九定郡國各一縣二十三得王柱國各一人二千石以下至五百石三十九人高后五年薨諡曰肅侯子亭嗣有罪國除周緤沛人也師古曰緤音息列反以舍人從高祖起沛至霸上西入蜀漢還定三秦常為參乘賜食邑池陽師古曰即馮翊池陽縣從東擊項羽滎陽絶甬道從出度平陰遇韓信軍襄國戰有利不利終亡離上心上以緤為信武侯師古曰以其忠信故加此號食邑三千三百户上欲自擊陳豨緤泣曰始秦攻破天下未曾自行今上常自行是亡人可使者乎上以為愛我賜入殿門不趨十二年更封緤為䣙城侯服䖍曰音菅蒯之蒯蘇林曰音簿催反晉灼曰功臣表屬長沙師古曰此字從崩從邑音蒯非也呂忱音陪而楚漢春秋作憑城侯陪憑聲相近此其實也又音普肯反孝文五年薨諡曰貞侯子昌嗣有罪國除景帝復封緤子應為鄲侯蘇林曰鄲音多寒反屬沛國宋祁曰沛國當作陳國薨諡曰康侯子仲居嗣坐為太常有罪國除贊曰仲尼稱犂牛之子騂且角雖欲勿用山川其舎諸師古曰論語載孔子為弟子仲弓發此言也犂雜色騂赤色也舍置也言牛色純而角美堪為犧牲雖以其毋犂色而欲不用山川寜肯置之喻父雖不材不害子之美言士不繫於世類也語曰雖有兹基不如逄時張晏曰兹基鉏也言雖有田具値時乃獲信矣樊噲夏侯嬰灌嬰之徒方其鼓刀僕御販繒之時師古曰鼓刀謂屠狗豈自知附驥之尾師古曰蓋以蚊䖟為喻言託驥之尾則涉千里勒功帝籍慶流子孫哉當孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執刼師古曰周勃等刼其父而令寄行説雖摧呂禄以安社稷誼存君親可也前漢書卷四十一前漢書卷四十一考證樊噲傳從攻陽城臣召南按陽城史記作城陽以上下文推之城陽地既太遠陽城亦尚懸隔胡三省謂應作成陽是也二史皆傳冩誤耳項羽既饗軍士中酒注不醉不醒故謂之中顧炎武曰中酒謂酒半也吕氏春秋謂之中飲凡事之半曰中中酒猶今人言半席相如傳酒中樂酣師古曰酒中飲酒中之半也一人注書前後不同獨騎馬噲等四人步從臣召南按四人噲與靳彊夏侯嬰紀成也見高紀從擊秦車騎壤東注師古曰地名也臣召南按曹參傳曰取壤鄉擊三秦軍壤東然則壤是鄉名壤東壤鄉之東也酈商傳高陽人也臣召南按商即食其弟食其傳曰陳留高陽人是也高陽乃陳留縣之鄉聚名此文似脱陳留二字别定北地郡臣召南按史記作定北地上郡則二郡也此文似脱上字又史記作破雍將軍烏氏周類軍栒邑蘇駔軍于泥陽蓋烏氏守將佚其姓名而栒邑泥陽守將姓名具存也此傳質言但云破章邯别將于烏氏栒邑泥陽耳攻其前垣前垣史記作前拒裴駰曰拒音矩寄欲娶平原君為夫人注蘇林曰景帝王皇后母臧兒也臣召南按事在孝景中二年臧兒尚未尊稱平原君也史官記事隨後文稱之耳夏侯嬰傳常蹳兩兒棄之蹳史記作蹶德嬰之脱孝惠魯元于下邑間也按下邑縣名屬梁國灌嬰傳重泉人李必駱甲按李必後封戚侯功臣表作季必身虜騎將入攻博陽臣召南按入字係一人兩字傳冩誤并史記作身虜騎將一人句攻博陽句是也攻博陽上不須入字宋本及各本俱讀入攻博陽為句非是破吳郡長吳下臣召南按後儒以會稽吳郡至東漢順帝始分遂疑二史此文為譌然亦安知楚漢之際不嘗分為二郡而其後復合乎下文又曰遂定吳豫章會稽郡則尤明矣靳歙傳别之河内擊趙賁軍朝歌破之臣召南按史記作擊趙將賁赫軍朝歌則其人姓賁名赫係趙將非姓趙名賁也周緤傳景帝復封緤子應為鄲侯注蘇林曰音多寒反屬沛國宋祁曰沛國應作陳國臣照按陳國無鄲縣据志應作沛郡前漢書卷四十一考證
