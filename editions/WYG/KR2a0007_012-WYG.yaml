body:
  text: 前漢書卷十二漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注平帝紀第十二孝平皇帝荀恱曰諱衎之字曰樂應劭曰布綱治紀曰平師古曰衎音口旱反元帝庶孫中山孝王子也母曰衛姬年三嵗嗣立為王元夀二年六月哀帝崩太皇太后詔曰大司馬賢年少不合衆心師古曰董賢其上印綬罷賢即日自殺宋祁曰唐本無即日二字新都侯王莽為犬司馬領尚書事秋七月遣車騎將軍王舜大鴻臚左咸使持節迎中山王師古曰為使而持節也使音所吏反辛卯貶皇太后趙氏為孝成皇后退居北宫哀帝皇后傅氏退居桂宫師古曰北宫及桂宫皆在城中而非未央宫中也孔鄉侯傅晏少府董恭等皆免官爵徙合浦師古曰恭董賢之父九月辛酉中山王即皇帝位劉攽曰辛酉去哀帝崩六十四日謁髙廟大赦天下帝年九嵗太皇太后臨朝大司馬莽秉政百官總已以聽於莽師古曰聚束曰總音揔詔曰夫赦令者將與天下更始誠欲令百姓改行絜已全其性命也往者有司多舉奏赦前事累增罪過誅䧟亡辜殆非重信慎刑洒心自新之意也師古曰洒滌也音先禮反及選舉者其歴職更事有名之士則以為難保師古曰更經也難保者言已嘗有罪過不可保也更音工衡反廢而弗舉甚謬於赦小過舉賢材之義師古曰論語云仲弓問政孔子曰赦小過舉賢材故此詔引之諸有臧及内惡未𤼵而薦舉者皆勿案驗師古曰有臧謂以臧貨致罪令士厲精鄉進師古曰鄉讀曰嚮不以小疵妨大材師古曰疵病也自今以來有司無得陳赦前事置奏上師古曰置立也置奏上謂立文奏而上陳也上音時掌反有不如詔書為虧恩以不道論定著令布告天下使明知之元始元年春正月越裳氏重譯獻白雉一黒雉二師古曰越裳南方逺國也譯謂傳言也道路絶逺風俗殊隔故累譯而後廼通詔使三公以薦宗廟羣臣奏言大司馬莽功徳比周公賜號安漢公及太師孔光等皆益封語在莽傳賜天下民爵一級吏在位二百石以上一切滿秩如真如淳曰諸官吏初除皆試守一嵗廼為真食全奉平帝即位故賜真師古曰此說非也時諸官有試守者特加非常之㤙令如真耳非凡除吏皆當試守也一切者權時之事非經常也猶如以刀切物茍取整齊不顧長短縦横故言一切他皆放此劉攽曰予謂吏俸雖有其名皆不滿其數平帝即位推㤙故賜令滿秩如二千石者得兩十百也顔百官表注吏俸差是其注云漢制三公稱萬石其俸月各三百五十斛榖其稱中二千石者月百八十斛二千石者百二十斛比二千石者百斛云云據後漢注所定千石以下嵗得多少本數此自建武時所加者非西漢舊事也立故東平王雲太子開明為王故桃鄉頃侯子成都為中山王封宣帝耳孫信等三十六人皆為列侯太僕王惲等二十五人師古曰惲音於吻反前議定陶傅太后尊號守經法不阿指從邪右將軍孫建爪牙大臣大鴻臚咸前正議不阿師古曰左咸後奉節使迎中山王師古曰謂奉持節而為使及宗正劉不惡執金吾任岑中郎將孔永尚書令姚恂沛郡太守石詡師古曰岑音土林反恂音荀詡音況羽反皆以前與建策東迎即位師古曰帝本在中山出闋而迎故曰東迎與讀曰豫奉事周密勤勞賜爵闗内侯食邑各有差賜帝徴即位前所過縣邑吏二千石以下至佐史爵各有差又令諸侯王公列侯闗内侯亡子而有孫若子同産子者皆得以為嗣師古曰子同産子者謂養昆弟之子為子者公列侯嗣子有罪耐以上先請宗室屬未盡而以罪絶者復其屬師古曰復音扶目反其為吏舉㢘佐史補四百石如淳曰宗室為吏及舉㢘及佐史皆補四百石師古曰此說非也言宗室為吏者皆令舉㢘各從本秩而依㢘吏遷之為佐史者例補四百石天下吏比二千石以上年老致仕者參分故禄以一與之終其身師古曰參三也遣諫大夫行三輔師古曰行音下更反舉籍吏民張晏曰舉録賦歛之籍而償之以元夀二年倉卒時横賦歛者償其直師古曰卒讀曰猝横音胡孟反義陵民冢不妨殿中者勿發如淳曰陵上有宫墻象生制度為殿屋故曰殿中師古曰此說非也殿中謂壙中象正殿處天下吏民亡得置什器儲偫師古曰軍法五人為伍二伍為什則共其器物故通謂生生之具為什器亦猶今之從軍及作役者十人為火共畜調度也儲積也偫具也偫音丈紀反宋祁曰唐本無吏字二月置羲和官秩二千石外史閭師秩六百石應劭曰周禮閭師掌四郊之民時其徵賦也班教化禁淫祀放鄭聲乙未義陵寑神衣在柙中丙申旦衣在外床上文頴曰哀帝陵也衣在寑中今自出在床上師古曰柙匱也音狎寑令以急變聞師古曰非常之事故云急變用太牢祠夏五月丁巳朔日有蝕之大赦天下公卿將軍中二千石舉敦厚能直言者各一人六月使少傅左將軍豐師古曰甄豐宋祁曰傳一作府賜帝母中山孝王姬璽書拜為中山孝王后賜帝舅衛寳寳弟𤣥爵闗内侯賜帝女弟四人號皆曰君食邑各二千户封周公後公孫相如為襃魯侯孔子後孔均為襃成侯奉其祀追諡孔子曰襃成宣尼公罷明光宫及三輔馳道天下女徒已論歸家顧山錢月三百如淳曰已論者罪已定也令甲女子犯罪作如徒六月顧山遣歸說以為當於山伐木聴使入錢顧功直故謂之顧山應劭曰舊刑鬼薪取薪於山以給宗廟今使女徒出錢顧薪故曰顧山也師古曰如說近之謂女徒論罪已定並放歸家不親役之但令一月出錢三百以顧人也為此㤙者所以行太皇太后之徳施恵政於婦人復貞婦鄉一人師古曰復音方目反鄉一人取其尤最者置少府海丞果丞各一人師古曰海丞主海稅也果丞掌諸果實也大司農部丞十三人人部一州勸農桑太皇太后省所食湯沐邑十縣屬大司農常别計其租入以贍貧民秋九月赦天下徒以中山苦陘縣為中山孝王后湯沐邑師古曰陘音形二年春黄支國獻犀牛應劭曰黄支在日南之南去京師三萬里師古曰犀狀如水牛頭似猪而四足類象黒色一角當額前鼻上又有小角宋祁曰南本顔注一角字上有有甲二字詔曰皇帝二名通于器物孟康曰平帝本名箕子更名曰衎箕用器也故云通于器物今更名合於古制師古曰更改也使太師光奉太牢告祠髙廟夏四月立代孝王𤣥孫之子如意為廣宗王江都易王孫盱台侯宫為廣川王師古曰盱音許于反台音怡廣川惠王曾孫倫為廣徳王封故大司馬博陸侯霍光從父昆弟曾孫陽宣平侯張敖𤣥孫慶忌絳侯周勃𤣥孫共舞陽侯樊噲𤣥孫之子章皆為列侯復爵師古曰共讀曰恭復音扶福反賜故曲周侯酈商等後𤣥孫酈眀友等百一十三人爵闗内侯食邑各有差郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人張晏曰王莽為太傅孔光為太師王舜為太保甄豐為少傅是為四輔莽復兼大司馬馬宫為司徒王崇為司空是為三公以口賦貧民師古曰計口而給其田宅遣使者捕蝗民捕蝗詣吏以石㪷受錢師古曰量蝗多少而賞錢天下民貲不滿二萬及被災之郡不滿十萬勿租税民疾疫者舍空邸第為置醫藥師古曰舍止也賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千罷安定呼池苑以為安民縣師古曰中山之安定也池音大河反起官寺市里募徙貧民縣次給食至徙所賜田宅什噐假與犂牛種食師古曰種音之勇反又起五里於長安城中宅二百區以居貧民如淳曰民居之里秋舉勇武有節眀兵法郡一人詣公車九月戊申晦日有蝕之赦天下徒使謁者大司馬掾四十四人持節行邉兵師古曰行音下更反遣執金吾候陳茂假以鉦鼓晉灼曰百官表執金吾屬官有兩丞候司馬應劭曰將帥乃有鉦鼓今茂官輕兵少又但往諭曉之耳所以假鉦鼓者欲重其威也鉦者鐃也似鈴柄中上下通師古曰鉦音征鐃音女交反募汝南南陽勇敢吏士三百人諭説江湖賊成重等二百餘人皆自出送家在所收事如淳曰賊雖自出得還其家而已不得復除尚當役作之也師古曰如説非也言身既自出又各送其家人詣本屬縣邑從賦役耳劉攽曰賊二百皆異縣人既自出故送家在所收事也重徙雲陽服䖍曰重成重也作賊長帥故徙之也賜公田宅冬中二千石舉治獄平歲一人李竒曰吏治獄平端也三年春詔有司為皇帝納采安漢公莽女師古曰婚禮有納采問名之禮謂采擇其可娶者語在莽𫝊又詔光禄大夫劉歆等雜定婚禮四輔公卿大夫博士郎吏家屬皆以禮娶親迎立軺併馬服䖍曰軺音謡立乗小車也併馬驪駕也師古曰新定此制也併音歩鼎反夏安漢公奏車服制度吏民養生送終嫁娶奴婢田宅器械之品立官稷及學官如淳曰郊祀志曰已有官社未有官稷遂立官稷於官社之後臣瓚曰漢初除秦社稷立漢社稷其後又立官社配以夏禹而不立官稷至此始立官稷光武之後但有官社不立官稷師古曰淳瓚二説皆未盡也初立官稷於官社之後是為一處今更創置建於别所不相從也郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序張晏曰聚邑落名也師古曰聚小於鄉聚音才喻反序庠置孝經師一人陽陵任橫等自稱將軍盗庫兵攻官寺出囚徒大司徒掾督逐皆伏辜安漢公世子宇與帝外家衛氏有謀宇下獄死誅衛氏四年春正月郊祀髙祖以配天宗祀孝文以配上帝改殷紹嘉公曰宋公周承休公曰鄭公詔曰蓋夫婦正則父子親人倫定矣前詔有司復貞婦歸女徒師古曰復音方目反誠欲以防邪辟師古曰辟讀曰僻全貞信及眊悼之人師古曰八十曰眊七年曰悼眊者老稱言其昏暗也悼者未成為人於其死亡可哀悼也眊音莫報反刑罰所不加聖王之所制也惟苛暴吏多拘繫犯法者親屬婦女老弱搆怨傷化百姓苦之師古曰搆結也其眀敇百寮婦女非身犯法及男子年八十以上七嵗以下家非坐不道詔所名捕它皆無得繫張晏曰名捕謂下詔特所捕也其當驗者即驗問師古曰就其所居而問定著令二月丁未立皇后王氏大赦天下遣太僕王惲等八人置副假節分行天下覽觀風俗師古曰行音下更反賜九卿已下至六百石宗室有屬籍者爵自五大夫以上各有差師古曰五大夫第九爵賜天下民爵一級鰥寡孤獨高年帛夏皇后見于高廟加安漢公號曰宰衡應劭曰周公為太宰伊尹為阿衡采伊周之尊以加莽賜公太夫人號曰功顯君封公子安臨皆為列侯安漢公奏立眀堂辟廱應劭曰眀堂所以正四時出教化明堂上圜下方八窻四達布政之宫在國之陽上八窻法八風四達法四時九室法九州十二重法十二月三十六戸法三十六風七十二牖法七十二雨孝經曰宗祀文王於眀堂以配上帝上帝謂古時帝太昊之屬黄帝曰合宫有虞曰總章殷曰陽舘周曰明堂辟廱者象璧圜雍之以水象敎化流行宋祁曰注文三十六雨雨字舊作旬七十二風風字舊作候疑此本有誤尊孝宣廟為中宗孝元廟為高宗天子世世獻祭冬置西海郡宋祁曰新本去冬字徙天下犯禁者處之梁王立有罪自殺分京師置前煇光後丞烈二郡更公卿大夫八十一元士官名位次師古曰更改也及十二州名分界郡國所屬罷置改易天下多事吏不能紀冬大風吹長安城東門屋瓦且盡五年春正月祫祭眀堂應劭曰禮五年而再殷祭壹禘壹祫祫祭者毁廟與未毁廟之主皆合食於太祖師古曰祫音洽諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭師古曰徴召也禮畢皆益户賜爵及金帛增秩補吏各有差詔曰蓋聞帝王以徳撫民其次親親以相及也昔堯睦九族舜惇叙之師古曰虞書堯典云昔在帝堯克明峻徳以親九族九族既睦平章百姓咎繇謩曰惇叙九族庶明厲翼言堯能明峻徳之士而任用之以睦高祖𤣥孫之親廼令百姓平和章明舜又厚叙此親使衆庶皆眀其教而自勉勵翼戴上命也故此詔引之朕以皇帝㓜年且綂國政師古曰朕者太皇太后自稱也惟宗室子皆太祖高皇帝子孫及兄弟吳頃楚元之後師古曰吳頃謂高帝之兄仲也初為代王後廢為合陽侯而子濞封為吳王故追諡仲為吳頃王頃讀曰傾漢元至今十有餘萬人雖有王侯之屬莫能相糾師古曰紏謂禁察也或䧟入刑罪教訓不至之咎也傳不云乎君子篤於親則民興於仁師古曰此論語載孔子之辭也言上能厚於親屬則下皆化之起為仁行也以論語傳聖人之言故謂之傳他皆類此其為宗室自太上皇以來族親各以世氏郡國置宗師以紏之致教訓焉二千石選有徳義者以為宗師考察不從教令有􅁈失職者宗師得因郵亭書言宗伯請以聞晋灼曰宗伯宗正也師古曰郵行書舍也言為書以付郵亭令送至宗伯也郵音尤常以嵗正月賜宗師帛各十匹羲和劉歆等四人使治明堂辟廱師古曰為使者而典其事令漢與文王靈臺周公作洛同符師古曰文王築靈臺周公成雒邑言與之符合太僕王惲等八人使行風俗師古曰行音下更反宣眀徳化萬國齊同皆封為列侯徵天下通知逸經古記天文歴算鍾律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳如淳曰律諸當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章其乗傳參封之參三也有期㑹累封兩端端各兩封凡四封也乗置馳傳五封也兩端各二中央一也軺傳兩馬再封之一馬一封也師古曰以一馬駕軺車而乗傳傳音張戀反遣詣京師至者數千人閏月立梁孝王𤣥孫之耳孫音為王冬十二月丙午帝崩于未央宫臣瓚曰帝年九嵗即位即位五年夀十四師古曰漢注云帝春秋益壯以母衛太后故怨不恱莽自知益踈篡弑之謀由是生因到臘日上椒酒置藥酒中故翟義移書云莽鴆殺孝平皇帝大赦天下有司議曰禮臣不殤君皇帝年十有四嵗宜以禮歛加元服師古曰歛音力贍反奏可𦵏康陵臣瓚曰在長安北六十里詔曰皇帝仁惠無不顧哀師古曰言帝平生多所顧念哀憐每疾一𤼵氣輙上逆害於言語故不及有遺詔其出媵妾皆歸家得嫁如孝文時故事師古曰媵妾謂從皇后俱來者媵之言送也媵音食證反又音孕賛曰孝平之世政自莽出襃善顯功以自尊盛觀其文辭方外百蠻亡思不服師古曰大雅文王有聲之詩曰自東自西自南自北亡思不服言武王於鎬京行辟雍之禮自四方來觀者皆感其徳化心無不歸服故此賛引之休徵嘉應頌聲並作師古曰休美也徵證也至乎變異見於上民怨於下莽亦不能文也如淳曰不可復文飾也前漢書卷十二前漢書卷十二考證平帝紀故桃鄊頃侯子成都為中山王胡三省曰平帝入奉大宗故立成都以奉孝王後臣召南按成帝立定陶王為太子即立楚孝王孫景奉定陶恭王祀即此事所本也封宣帝耳孫信等三十六人皆為列侯通鑑考異曰紀在元年莽𫝊在五年按王子侯表皆以元年二月丙辰封莽𫝊誤也胡三省曰按表陶鄉侯恢等十五人皆以二月丙辰封不及三十六人之數又無信名蓋恢等皆宣帝曾孫也罷安定呼池苑以為安民縣臣召南按志中山國無安民縣何也置西海郡臣召南按莽所置西海郡在金城郡臨羗縣塞外西北地理志可証西海曰僊海亦曰鮮水海即今青海也分京師置前輝光後丞烈二郡胡三省曰前輝光蓋領長安以南諸縣後丞烈蓋領長安以北諸縣也前漢書卷十二考證
