body:
  text: 前漢書卷十七漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注景武昭宣元成功臣表第五昔書稱蠻夷帥服師古曰舜典之辭也言王者徳澤廣被則四夷相率而降服也詩云徐方既俫師古曰大雅常武之詩曰王猷允塞徐方既俫言周之王道信能充實則徐方淮夷並来朝也俫古来字春秋列潞子之爵許其慕諸夏也應劭曰潞子離狄内附春秋嘉之稱其爵列諸盟會間也師古曰潞音路漢興至于孝文時乃有弓髙襄城之封師古曰弓髙侯穨當襄城侯桀龍皆從匈奴来降而得封也雖自外俫本功臣後故至孝景始欲侯降者丞相周亞夫守約而爭應劭曰景帝欲封王皇后兄信亞夫對髙祖之約非功臣不侯也師古曰景帝欲封匈奴降者徐盧等而亞夫爭之以為不可今表所稱蓋謂此爾不列王信事也應說失之帝黜其議初開封賞之科師古曰不從亞夫之言竟封也又有吳楚之事武興胡越之伐將帥受爵應本約矣師古曰應髙祖非有功不得侯之約後世承平頗有勞臣輯而序之續元功次云師古曰輯與集同元功謂佐興其帝業者也右孝景十八人平陸休沈猷紅宛朐棘樂乘氏桓邑八人在王子魏其蓋二人在外戚隆慮一人隨父凡二十九人師古曰據楚元王傳云休侯富免侯後更封為紅侯而王子侯表但云休侯富雖述重封又無紅邑其數止七人然此表乃以休及紅列為二數又稱八人在王子侯是則此表為誤也右孝宣十一人陽都營平平丘昌水陽城爰氏扶陽髙平陽城博陽卭成將陵建成西平平恩平昌樂陵平臺樂昌博望樂成二十一人在恩澤外戚樂平冠陽酇周子南君四人隨父凡三十六人右孝元一人安平平恩扶陽三人隨父陽平樂安二人在恩澤外戚凡六人孝成五人安昌髙陽安陽城陽髙陵定陵殷紹嘉宜鄉氾鄉博山十人在恩澤外戚武陽博陽贊騏龍頟開陵樂陵博望樂成龍安平平阿成鄉紅陽曲陽髙平十五人隨父凡三十人師古曰頟字或作額前漢書卷十七前漢書卷十七考證景武昭宣元成功臣表漢興至于孝文時乃有弓髙襄城之封注師古曰弓髙侯穨當襄城侯桀龍云云臣召南按此襄城侯封于文帝十六年即韓王信太子之子韓嬰與韓穨當並時来降一封弓髙一封襄城者師古以武帝元朔四年封襄城侯之桀龍當之誤矣三劉刋誤不言何耶葛繹延和二年以子敬聲云云按監本别本俱作延和非也師古曰延亦征字葢古字延與征同今改正江陽康侯蘇息臣宗萬按蘇息史作蘇嘉又新市侯王棄之史作王康又桓侯賜史作垣侯逎侯陸彊史作隆彊容城擕侯徐盧史作惟徐盧范陽靖侯史作端侯盧它之史作它父特轅侯史作持裝侯桀龍史作無龍安樂侯史作樂安侯軹侯史作渉軹侯僕朋史作僕多下摩侯史作下麾侯昆邪史作渾邪煇渠愼侯應疕史作順梁悼侯扁訾邳離侯史作符離侯杜侯史作壯侯揭陽定史作揭陽令定外石侯史作北石侯下鄜侯史作下􅐱侯韓陶史作韓隂史表互異易侯僕􅔨臣召南按史表無此侯别本作翕侯非也與翕侯邯鄲同日封豈可一地兩封耶至於翕侯趙信得封則邯鄲以元光四年免信以四年十月封無可疑也翕侯趙信元朔三年擊匈奴功三年訛二年從宋本改正煇渠愼侯應疕臣召南按煇渠既封僕朋又封應疕自注並在魯陽則是共食此地而中分其户數者也杜侯屠耆嗣臣召南按宣紀作屠耆堂似此表脱堂字下鄜侯左將黃同斬西于王功西于訛西千今改正開陵侯建成臣召南按此侯名敖建成侯是東粤舊爵非名也史漢二表並以建成為名何耶又臨蔡侯孫都据南粤傳則姓都名稽不姓孫名都也荻苴侯韓陶以朝鮮相将兵漢圍之降監本作将漢兵圍之降非也今移兵字于漢字上題侯張富昌共得衞太子侯監本脱侯字從宋本添前漢書卷十七考證
