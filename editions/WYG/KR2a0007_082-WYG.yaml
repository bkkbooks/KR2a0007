body:
  text: 前漢書卷八十二漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注王商史丹傅喜傳第五十二王商字子威涿郡蠡吾人也師古曰蠡音禮徙杜陵商父武武兄無故皆以宣帝舅封無故為平昌侯武為樂昌侯語在外戚傳商少為太子中庻子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀慽宋祁曰慽疑作戚於是大臣薦商行可以厲羣臣義足以厚風俗宜備近臣繇是擢為諸曹侍中中郎將師古曰繇讀與由同元帝時至右將軍光禄大夫是時定陶共王愛幸幾代太子師古曰共讀曰恭幾鉅依反宋祁曰注文鉅字上當有音字商為外戚重臣輔政擁佑太子頗有力焉師古曰佑助也元帝崩成帝即位甚敬重商徙為左將軍而帝元舅大司馬大將軍王鳳顓權行多驕僭商論議不能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪師古曰蹂踐也躪轢也蹂人九反躪音藺宋祁曰注文人字上當有音字老弱號呼師古曰呼音火故反長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宫可御船令吏民上長安城以避水羣臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭師古曰冒䝉覆也今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也師古曰訛偽也不宜令上城重驚百姓師古曰重音直用反上廼止有頃長安中稍定問之果訛言上於是羙壯商之固守數稱其議而鳳大慙自恨失言明年商代匡衡為丞相益封千户天子甚尊任之為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿師古曰在未央宮中丞相商坐未央廷中單于前拜謁商師古曰單于將見天子而經未央廷中過也商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣初大將軍鳳連昬楊彤為琅邪太守如淳曰連昬者婚家之婚親也其郡有災害十四已上商部屬按問如淳曰部屬猶差次差次其屬令治之宋祁曰已字疑作以按字疑作案鳳以曉商師古曰告語也曰灾異天事非人力所為肜素善吏宜以為後師古曰且勿按問也宋祁曰注文按疑作案商不聼竟奏免肜奏果寑不下宋祁曰寑疑作寢鳳重以是怨商師古曰重音直用反隂求其短使人上書言商閨門内事天子以為暗昧之過不足以傷大臣鳳固爭下其事司𨽻先是皇太后嘗詔問商女欲以備後宫時女病商意亦難之以病對不入及商以閨門事見考自知為鳳所中師古曰中傷也音竹仲反惶怖更欲内女為援廼因新幸李媫好家白見其女㑹日有蝕之大中大夫蜀郡張匡其人佞巧上書願對近臣陳日蝕咎下朝者文穎曰令下朝者平之也孟康曰中朝臣也師古曰文說是也下音胡稼反左將軍丹等問匡師古曰史丹也對曰劉攽曰下朝者左將軍丹等都是一句上以匡章下丹等令問匡也王嘉傅亦有一下朝者劉奉世曰孟說是也時左將軍等俱謂之中朝當屬下句云下朝者左將軍丹等問而後云匡對曰竊見丞相商作威作福從外制中取必於上師古曰意欲所行必果之性殘賊不仁宋祁曰性字上疑有稟字遣票輕吏微求人罪師古曰票疾也微謂私求之也票音頻妙反又音匹妙反欲以立威天下患苦之前頻陽耿定上書言商與父傅通及女弟滛亂師古曰傅謂傅婢也奴殺其私夫疑商教使師古曰私夫女弟之私與姦通者章下有司商私怨懟師古曰懟音直類反宋祁曰懟該音治遂反商子俊欲上書告商俊妻左將軍丹女持其書以示丹丹惡其父子乖迕師古曰迕逆也為女求去商不盡忠納善以輔至徳知聖主崇孝逺别不親師古曰逺離女色而分别之故云不親也後庭之事劉敞曰當斷不親後庭之事為句乃不煩注釋矣劉攽說同皆受命皇太后太后前聞商有女欲以備後宫商言有固疾後有耿定事更詭道因李貴人家内女師古曰詭違也執左道以亂政師古曰左道僻左之道謂不正誣罔誖大臣節師古曰誖乖也音布内反故應是而日蝕周書曰以左道事君者誅師古曰逸書也易曰日中見昧則折其右肱蘇林曰日者人君之象中者明之盛盛而昧折去右肱之臣用無咎也師古曰此豐卦九三爻辭宋祁曰易作見沬王弼云沬微昧之明也王觀國云昧與沬義同徃者丞相周勃再建大功及孝文時纖介怨恨而日為之蝕於是退勃使就國卒無怵悐憂師古曰卒終也悐古惕字宋祁曰勃傳及天文志五行志皆無是事疑匡妄為此言以害商爾悐與惕同二字文雖異其音訓則一今商無尺寸之功而有三世之寵師古曰自宣帝至成帝凡三主身位三公宗族為列侯吏二千石侍中諸曹給事禁門内連昏諸侯王權寵至盛審有内亂殺人怨懟之端宜窮竟考問臣聞秦丞相吕不韋見王無子意欲有秦國即求好女以為妻隂知其有身而獻之王產始皇帝及楚相春申君亦見王無子心利楚國即獻有身妻而產懐王劉攽曰春申君獻妾所生子乃幽王非懐王也疑匡自誤非傳者之失自漢興幾遭吕霍之患師古曰幾音鉅依反今商有不仁之性廼因怨以内女其姦謀未可測度前孝景世七國反將軍周亞夫以為即得雒陽劇孟關東非漢之有今商宗族權埶合貲鉅萬計私奴以千數非特劇孟匹夫之徒也且失道之至親戚畔之閨門内亂父子相訐師古曰訐告斥其罪也音居謁反宋祁曰訐蕭該音九列反引字林靣相斥罪也浙本音居又反而欲使之宣明聖化調和海内豈不繆哉商視事五年官職陵夷而大惡著於百姓甚虧損盛徳有鼎折足之凶師古曰易鼎卦九四爻辭曰鼎折足覆公餗其形渥凶餗鼎實也謂所亨之物也渥厚也言鼎折其足則覆喪其實喻大臣非其任則虧敗國典故宜加以厚刑臣愚以為聖主富於春秋即位以來未有懲姦之威加以繼嗣未立大異並見尤宜誅討不忠以遏未然師古曰遏止也未然謂未有其事恐將然也行之一人則海内震動百姦之路塞矣於是左將軍丹等奏商位三公爵列侯親受詔策為天下師不遵法度以翼國家師古曰翼助也而回辟下媚以進其私師古曰回邪也辟讀曰僻執左道以亂政為臣不忠罔上不道甫刑之辟皆為上戮罪名明白臣請詔謁者召商詣若盧詔獄孟康曰若盧獄名屬少府黄門北寺是也上素重商知匡言多險制曰勿治鳳固爭之於是制詔御史蓋丞相以徳輔翼國家典領百寮協和萬國為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謀而有不忠宋祁曰而字下疑有廼字執左道之辜陷于大辟前商女弟内行不脩奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衞者有司奏商罪過未決請除國邑有詔長子安嗣爵為樂昌侯至長樂衞尉光禄勲商死後連年日蝕地震直臣京兆尹王章上封事召見訟商忠直無罪言鳳顓權蔽主鳳竟以法誅章語在元后傳至元始中王莽為安漢公誅不附己者樂昌侯安見被以罪自殺國除師古曰被加也音皮義反史丹字君仲魯國人也徙杜陵祖父恭有女弟武帝時為衞太子良娣產悼皇考皇考者孝宣帝父也宣帝微時依倚史氏師古曰倚於綺反宋祁曰注文倚字下當有音字語在史良娣傳及宣帝即位宋祁曰監本作即尊位恭已死三子高曽元曽元皆以外屬舊恩封曽為將陵侯元為平臺侯高侍中貴幸以發舉反者大司馬霍禹功封樂陵侯宣帝疾病拜高為大司馬車騎將軍領尚書事帝崩太子襲尊號是為孝元帝高輔政五年乞骸骨賜安車駟馬黄金罷就第薨諡曰安侯自元帝為太子時丹以父高任為中庻子侍從十餘年元帝即位為駙馬都尉侍中出常驂乘甚有寵上以丹舊臣皇考外屬親信之詔丹䕶太子家是時傅昭儀子定陶共王有材蓺子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間宋祁曰間考作後越本作後元帝被疾不親政事留好音樂孟康曰留意於音樂或置鼙鼓殿下師古曰鼙本騎上之鼔音歩迷反天子自臨軒檻上隤銅丸以擿鼓師古曰檻闌版也隤下也擿投也隤音頽擿音持益反一曰擿磓也音丁歴反磓音丁回反韋昭曰擿持歴反如淳音嫡聲中嚴鼓之節李竒曰莊嚴之鼓節也晉灼曰疾擊之鼓也師古曰李說是也後宫及左右習知音者莫能為而定陶王亦能之上數稱其材丹進曰凡所謂材者敏而好學温故知新師古曰敏速疾也温厚也温故厚蓄故事也皇太子是也若廼器人於絲竹鼓鼙之間則是陳恵李微高於匡衡可相國也如淳曰器人取人器能也陳恵李微是時好音者也服䖍曰二人皆黄門鼓吹也於是上嘿然而咲師古曰咲古笑字其後中山哀王薨太子前弔哀王者帝之少弟與太子游學相長大師古曰同處長養以至於壯大上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎上以責謂丹師古曰謂者告語也丹免冠謝上曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣竊戒屬毋涕泣感傷陛下師古曰屬音之欲反罪廼在臣當死上以為然意廼解丹之輔相皆此類也竟寧元年上寑疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平師古曰稍侵言漸篤也平和也數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衞尉侍中與皇太子皆憂不知所出師古曰不知計所出丹以親密臣得侍視疾候上間獨寑時丹直入卧内頓首伏青蒲上服虔曰青縁蒲席也應劭曰以青規地曰青蒲自非皇后不得至此孟康曰以蒲青為席用蔽地也師古曰應説是也涕泣言曰皇太子以適長立積十餘年師古曰適讀曰嫡名號繫於百姓天下莫不歸心臣子師古曰自託為臣子劉奉世曰臣子宜屬下句不當斷之陽夏公謂如顔讀亦雅見定陶王雅素愛幸今者道路流言為國生意以為太子有動揺之議審若此公卿以下必以死爭不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語師古曰安焉也丹即却頓首曰愚臣妄聞罪當死師古曰却退也離青蒲上上因納謂丹曰吾病寖加恐不能自還師古曰寖漸也不自還者言當遂至崩亡也還讀曰旋善輔道太子毋違我意師古曰道讀曰導丹噓唏而起師古曰嘘音虛唏音許既反太子由是遂為嗣矣元帝竟崩成帝初即位擢丹為長樂衞尉遷右將軍賜爵闗内侯食邑三百户給事中後徙左將軍宋祁曰徙字下當有丹字光禄大夫鴻嘉元年上遂下詔曰夫襃有徳賞元功古今通義也左將軍丹徃時導朕以中正秉義醇壹舊徳茂焉其封丹為武陽侯國東海郯之武彊聚戸千一百如淳曰聚字喻反聚邑居也丹為人足知愷弟愛人師古曰愷樂也弟易也言有和樂簡易之徳貌若儻蕩不備師古曰儻蕩疎誕無檢也然心甚謹密故尤得信於上丹兄嗣父爵為侯讓不受分丹盡得父財身又食大國邑重以舊恩數見襃賞師古曰重音直用反賞賜累千金僮奴以百數後房妻妾數十人内奢滛好飲酒極滋味聲色之樂為將軍前後十六年永始中病乞骸骨上賜策曰左將軍寑病不衰師古曰言病不損也願歸治疾朕愍以官職之事久留將軍使躬不瘳使光禄勲賜將軍黄金五十斤安車駟馬其上將軍印綬宜専精神務近醫藥以輔不衰丹歸第數月薨諡曰頃侯有子男女二十人九男皆以丹任並為侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽廼絶唯將陵侯曽無子絶於身云傅喜字稚游河内温人也哀帝祖母定陶傅太后從父弟少好學問有志行哀帝立為太子成帝選喜為太子庻子哀帝初即位以喜為衞尉遷右將軍是時王莽為大司馬乞骸骨避帝外家上既聼莽退衆庻歸望於喜喜從弟孔鄉侯晏親與喜等如淳曰俱傅太后從父弟也而女為皇后又帝舅陽安侯丁明皆親以外屬封劉攽曰親當作新喜執謙稱疾傅太后始與政事喜數諫之師古曰與讀曰豫由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽為大司馬賜喜黄金百斤上將軍印綬以光禄大夫養病大司空何武尚書令唐林皆上書言喜行義修絜忠誠憂國内輔之臣也今以寑病一旦遣歸衆庻失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衞魯以季友治亂師古曰謂季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晉侯喜可知魏以無忌折衝師古曰信陵君項以范増存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶師古曰已解在上百萬之衆不如一賢故秦行千金以間㢘頗師古曰趙孝成王七年秦與趙兵相距長平趙將廉頗固壁不戰秦廼使人反間於趙曰秦之所惡獨畏趙奢之子趙括為將耳趙王信之因以括為將代廉頗而括軍遂敗數十萬之衆降秦秦皆阬之宋祁曰注末當有於長平三字漢散萬金以疏亞父師古曰事在陳平傳喜立於朝陛下之光煇傅氏之廢興也如淳曰傅喜顯則傅氏興其廢亦如之晉灼曰用喜於陛下有光明而傅氏之廢復得興也師古曰如說是也上亦自重之明年正月廼徙師丹為大司空而拜喜為大司馬封高武侯丁傅驕奢皆嫉喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與丞相孔光大司空師丹共執正議傅太后大怒上不得已先免師丹以感動喜喜終不順後數月遂策免喜曰君輔政出入三年未有昭然匡朕不逮而本朝大臣遂其姦心師古曰遂成也申也咎由君焉其上大司馬印綬就第傅太后又自詔丞相御史曰高武侯喜無功而封内懐不忠附下罔上與故大司空丹同心背畔放命圮族應劭曰放弃教令毁其族類虧損徳化罪惡雖在赦前不宜奉朝請其遣就國後又欲奪喜侯上亦不聼喜在國三嵗餘哀帝崩平帝即位王莽用事免傅氏官爵歸故郡晏將妻子徙合浦莽白太后下詔曰高武侯喜姿性端慤論議忠直師古曰慤謹也音乞角反雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎嵗寒然後知松栢之後凋也師古曰論語載孔子之言以喻有節操之人也其還喜長安以故高安侯莫府賜喜位特進奉朝請喜雖外見襃賞孤立憂懼後復遣就國以夀終莽賜諡曰貞侯子嗣莽敗乃絶師古曰史不得其子名也贊曰自宣元成哀外戚興者許史三王丁傅之家師古曰三王謂卬成侯及商鳳三家也皆重侯累將窮貴極富見其位矣未見其人也師古曰言無善人也陽平之王多有材能好事慕名宋祁曰事當作士其埶尤盛曠貴最久師古曰陽平謂王鳳之家也言居非其位是為曠官故云曠貴然至於莽亦以覆國王商有剛毅節廢黜以憂死非其罪也史丹父子相繼高以重厚位至三公丹之輔道副主掩惡揚美傅會善意師古曰道讀曰導傅讀曰附雖宿儒逹士無以加焉及其歴房闥入卧内推至誠犯顏色動寤萬乘轉移大謀卒成太子安母后之位無言不讎終獲忠貞之報師古曰大雅抑之詩無言不讎無徳不報故贊引之以喻丹傅喜守節不傾亦䝉後凋之賞哀平際㑹禍福速哉前漢書卷八十二前漢書卷八十二考證王商傳下朝者左將軍丹等問匡劉攽云云臣召南按攽及奉世說是師古誤斷下朝者為句上文張匡願對近臣陳日蝕咎所謂近臣即指中朝將軍侍中等官也又下文知聖主崇孝逺别句不親後庭之事句師古亦誤以逺别不親斷句劉敞紏之是也史丹傳其後中山哀王薨按建昭四年事也天下莫不歸心臣子注師古曰自託為臣子劉奉世曰臣子當屬下句不當斷之胡三省曰以下文大意觀之顏注是也臣召南按臣子二字連上連下讀並通丹兄嗣父爵為侯讓不受分臣召南按表丹兄名術即樂陵嚴侯也傅喜傳諡曰貞侯子嗣師古曰史不得其子名臣召南按表高武侯傅喜封十五年薨建國二年侯勁嗣然則喜子名勁史特以無闗𦂳要故畧之非不得其子名也前漢書卷八十二考證
