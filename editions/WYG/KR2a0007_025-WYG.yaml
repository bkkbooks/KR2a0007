body:
  text: 前漢書卷二十五上漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顏師古注郊祀志第五上洪範八政三曰祀師古曰祀謂祭祀也祀者所以昭孝事祖通神明也旁及四夷莫不修之下至禽獸豺獺有祭師古曰禮記月令季秋之月豺祭獸孟春之月獺祭魚豺摯搏之獸形似狗獺水居而食魚祭者謂殺之而布列以祭其先也豺音仕皆反獺音吐曷反是以聖王為之典禮民之精爽不貳齊肅聰明者神或降之師古曰爽明也齊讀曰齋齋肅莊敬也在男曰覡在女曰巫師古曰巫覡亦通稱耳覡音下狄反使制神之處位為之牲器使先聖之後能知山川敬於禮儀明神之事者以為祝能知四時犧牲壇場上下氏姓所出者以為宗應劭曰上下謂天地之屬神也氏姓王族之别也宗大宗也臣瓚曰宗宗伯也師古曰二說皆非也祝謂主祭之贊詞者積土為壇平地為場氏姓謂神本所出及見所當為主者也宗宗人主神之列位尊卑者也春秋左氏傳曰虢公使祝應宗區享神也又云宗祝用馬于四墉並非宗伯及大宗也劉敞曰予按春秋外傳曰夏父弗綦為宗自稱曰我為宗伯宗伯非宗何哉故有神民之官各司其序不相亂也民神異業敬而不黷師古曰黷汙渫也黷音讀故神降之嘉生應劭曰嘉穀也師古曰嘉生謂衆瑞民以物序孟康曰各有分叙也災禍不至所求不匱師古曰匱乏也及少昊之衰九黎亂德孟康曰少昊時諸侯作亂者也韋昭曰黎氏九人也民神雜擾不可放物師古曰放依也物事也放音甫往反家為巫史享祀無度黷齊明而神弗蠲師古曰齊讀曰齋蠲絜也嘉生不降禍災荐臻莫盡其氣師古曰言不究其性命也顓頊受之廼命南正重司天㠯屬神命火正黎司地㠯屬民應劭曰黎陰官也火數二二地數也故火正司地以屬萬民師古曰屬委也以其事委之也屬音之欲反使復舊常亡相侵黷自共工氏霸九州其子曰句龍能平水土死為社祠師古曰共工氏在太昊炎帝之間無祿而王故謂之霸句讀曰鉤有烈山氏王天下其子曰柱能殖百穀死為稷祠師古曰烈山氏炎帝故郊祀社稷所從來尚矣師古曰尚上也謂起於上古虞書曰舜在璿璣玉衡以齊七政師古曰虞書舜典也在察也璿美玉也璣轉而衡平以玉為璣衡謂渾天儀也七政日月五星也言舜觀察璣衡以齊同日月五星之政度合天意遂類于上帝禋于六宗孟康曰六宗星辰風伯雨師司中司命一說云乾坤六子又一說天宗三日月星辰地宗三太山河海或曰天地間游神也師古曰類以類祭也上帝天也絜精以祀謂之禋六宗之義說者多矣乾坤六子其最通乎望秩于山川徧于羣神師古曰望謂在遠者望而祭之秩次也羣神丘陵墳衍之屬揖五瑞師古曰揖與輯同揖合也五瑞公侯伯子男之瑞玉擇吉月日見四嶽諸牧班瑞師古曰四嶽諸牧謂四方諸侯也班布也歲二月東巡狩至於岱宗師古曰狩守也諸侯為天子守土故巡行岱宗泰山也柴望秩于山川師古曰柴積柴而燔遂見東后東后者諸侯也師古曰后君也東方諸侯故謂之東后也合時月正日同律度量衡師古曰時四時也月十二月也日三百六十日律六律也度尺丈也量斛斗也衡斤兩也修五禮五樂師古曰五禮吉凶賔軍嘉也五樂謂春則琴瑟夏則笙竽季夏則鼔秋則鐘冬則磬也五樂尚書作五玉今志亦有作五玉者五玉即五瑞三帛二生一死為贄師古曰三帛𤣥纁黄也二生羔鴈也一死雉也贄者所執以為禮也五月巡狩至南嶽南嶽者衡山也八月巡狩至西嶽西嶽者華山也十一月巡狩至北嶽北嶽者恒山也皆如岱宗之禮中嶽嵩高也五載一巡狩師古曰此以上皆舜典所載禹遵之後十三世至帝孔甲淫德好神神黷二龍去之應劭曰夏帝孔甲天賜之乘龍河漢各二其後媟黷嫚神故龍去之其後十三世湯伐桀欲䙴夏社不可作夏社應劭曰遭大旱七年明德以薦而旱不止故遷社以棄代為稷欲遷句龍德莫能繼故作夏社說不可遷之義也師古曰䙴古遷字夏社尚書篇名今則序在而書亡逸廼䙴烈山子柱而以周棄代為稷祠後八世帝太戊有桑榖生於廷一暮大拱懼伊陟曰祅不勝德師古曰榖即今之楮樹也其字從木合兩手曰拱伊陟太戊臣伊尹之子太戊修德桑榖死伊陟贊巫咸孟康曰巫咸殷賢臣贊說也謂伊陟說其意也師古曰因此作咸乂四篇事見商書序其篇亦亡逸也後十三世帝武丁得傅說為相師古曰說讀為悅殷復興焉稱高宗有雉登鼎耳而雊師古曰雊雉鳴音工豆反武丁懼祖已曰修德武丁從之位以永寧師古曰事見商書說命及高宗肜日祖已殷之賢臣後五世帝乙嫚神而震死師古曰帝乙武乙也為韋囊盛血仰而射之號曰射天後遇雷震而死後三世帝紂淫亂武王伐之由是觀之始未嘗不肅祇後稍怠嫚也周公相成王王道大洽制禮作樂天子曰明堂辟雍師古曰明堂辟雍解在平紀諸侯曰泮宮師古曰泮言半也制度半於天子辟雍也泮音普半反郊祀后稷以配天宗祀文王於明堂以配上帝師古曰郊祀祀於郊也后稷周之始祖也宗尊也文王周始受命之王上帝太微五帝也四海之内各以其職來助祭天子祭天下名山大川懷柔百神咸秩無文師古曰懷來也柔安也言招來百神而安處之也稱百者言其多也秩序也舊無禮文者皆以次序而祭之五嶽視三公四瀆視諸侯師古曰江河淮濟為四瀆瀆者發源而注海者也視謂其禮物之數也而諸侯祭其畺内名山大川師古曰畺境也大夫祭門尸井竈中霤五祀韋昭曰古者穴居故名室中為中霤士庶人祖考而已各有典禮而淫祀有禁後十三世世益衰禮樂廢幽王無道為犬戎所敗平王東徙雒陽宋祁曰越本陽作邑秦襄公攻戎救周列為諸侯而居西自以為主少昊之神作西畤祠白帝其牲用駵駒黄牛羝羊各一云師古曰駵赤馬黑鬛尾也羝牡羊也駵音留羝音丁奚反其後十四年秦文公東獵汧渭之間師古曰汧渭二水名汧音牽卜居之而吉文公夢黄蛇自天下屬地師古曰屬著也音之欲反其口止於鄜衍李竒曰鄜音孚三輔謂山阪間為衍晉灼曰左馮翊鄜縣之衍也師古曰今之鄜州蓋取名於此也文公問史敦師古曰秦之太史敦其名也敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤而雍旁故有吳陽武畤李竒曰於旁有吳陽地也雍東有好畤皆廢無祀或曰自古以雍州積高神明之隩師古曰土之可居者曰隩音於六反故立畤郊上帝諸祠皆聚云蓋黄帝時嘗用事雖晩周亦郊焉師古曰晩謂末時也其語不經見縉紳者弗道李竒曰搢插也插笏於紳紳大帶也臣瓚曰縉赤白色也紳大帶也左氏傳有縉雲氏師古曰李云縉插是也字本作搢插笏於大帶與革帶之間耳非插於大帶也或作薦紳者亦謂薦笏於紳帶之間其義同作鄜畤後九年文公獲若石云于陳倉北阪城祠之蘇林曰質如石似肝師古曰陳倉之北阪上城中也云語辭也劉敞曰蓋於陳倉北阪上築城作祠祠之下文云集於祠城是也其神或歲不至或歲數來也常以夜光煇若流星從東方來集于祠城若雄雉其聲殷殷云野雞夜鳴師古曰殷殷聲也云傳聲之亂也野雞亦雉也避呂后諱故曰野雞言陳寶若來而有聲則野雞皆鳴以應之也上言雄雉下言野雞史駁文也殷音隱以一牢祠之名曰陳寶臣瓚曰陳倉縣有寶夫人祠或一歲二歲與葉君合葉君神來時天為之殷殷雷鳴雉為之雊也作陳寶祠後七十一年秦德公立卜居雍師古曰即今之雍縣子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤作伏祠孟康曰六月伏日也周時無至此乃有之師古曰伏者謂陰氣將起迫於殘陽而未得升故為藏伏因名伏日也立秋之後以金代火金畏於火故至庚日必伏庚金也磔狗邑四門以御蠱災後四年秦宣公作密畤於渭南祭青帝後十三年秦穆公立病卧五日不寤師古曰寤覺也覺音公孝反寤廼言夢見上帝師古曰上帝謂天也上帝命穆公平晉亂史書而臧之府師古曰府臧書之處而後世皆曰上天穆公立九年齊桓公旣霸會諸侯於葵丘而欲封禪師古曰葵丘會在僖九年葵丘在陳留外黄縣東封禪者封土於山而禪祭於地也禪音土戰反解在武紀管仲曰古者封泰山禪梁父者七十二家師古曰父音甫而夷吾所記者十有二焉昔無懷氏封泰山禪云云鄭氏曰無懷氏古之王者在伏羲前見莊子服䖍曰云云在梁父東山名也晉灼曰云云山在䝉陰縣故城東北下有云云亭虙羲封泰山禪云云師古曰虙讀曰伏神農氏封泰山禪云云炎帝封泰山禪云云李竒曰炎帝神農後黄帝封泰山禪亭亭服䖍曰亭亭山在牟陰晉灼曰地理志鉅平有亭亭山師古曰晉說是也顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪於社首應劭曰山名在博縣晉灼曰在鉅平南十二里師古曰晉說是也皆受命然後得封禪桓公曰寡人北伐山戎過孤竹應劭曰伯夷國也在遼西令支師古曰令音郎定反支音神祇之祇西伐束馬縣車上卑耳之山韋昭曰將上山纒束其馬縣鈎其車也卑耳即齊語所謂辟耳南伐至召陵師古曰召陵楚地也在汝南召讀曰劭登熊耳山以望江漢師古曰熊耳山在順陽北益陽縣東非禹貢所云導洛自熊耳者也其山兩峯狀亦若熊耳因以為名也兵車之會三乘車之會六九合諸侯一匡天下師古曰兵車之會三謂莊十三年會於北杏以平宋亂僖四年侵蔡蔡潰遂伐楚次于陘六年伐鄭圍新城也乘車之會六謂莊十四年會于鄄十五年又會于鄄十六年同盟于幽僖五年會于首止八年盟于洮九年會于葵丘也匡正也一匡天下謂定襄王為天子之位也一說謂陽穀之會令諸侯云無障谷無貯粟無以妾為妻天下皆從故云一匡者也諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上黍北里禾所以為盛應劭曰鄗音臛蘇林曰鄗上北里皆地名也師古曰盛謂以實簠簋江淮間一茅三脊所以為藉也服䖍曰茅草有三脊也張晏曰謂靈茅也師古曰藉以藉地也音才夜反東海致比目之魚師古曰爾雅云東方有比目魚焉不比不行其名謂之鰈音土盍反西海致比翼之鳥師古曰山海經云崇吾之山有鳥狀如鳬而一翼一目相得乃飛其名曰􅀈爾雅曰南方有比翼鳥焉不比不飛其名謂之鶼鶼而管仲乃云西海其說異也然後物有不召而自至者十有五焉今鳳凰麒麟不至嘉禾不生而蓬蒿藜莠茂䲭梟羣翔師古曰蓬蒿藜莠皆穢惡之草梟不祥之烏也䲭蓋今所謂角䲭也梟土梟也而欲封禪無乃不可乎於是桓公乃止是歲秦穆公納晉君夷吾其後三置晉國之君平其亂師古曰三立其君謂惠公懷公文公穆公立三十九年而卒後五十年周靈王即位時諸侯莫朝周萇𢎞廼明鬼神事師古曰萇𢎞周大夫設射不來不來者諸侯之不來朝者也依物怪欲以致諸侯諸侯弗從而周室愈微後二世至敬王時晉人殺萇𢎞李竒曰周為晉殺之也師古曰春秋左氏傳哀公三年傳稱劉氏范氏世為婚姻萇𢎞事劉文公故周與范氏趙鞅以為討周人殺萇𢎞也是時季氏專魯旅於泰山仲尼譏之師古曰旅陳也陳禮物而祭之也陪臣祭泰山僭諸侯之禮孔子非之曰嗚呼曾謂泰山不如林放乎事見論語自秦宣公作密畤後二百五十年而秦靈公於吳陽作上畤祭黄帝作下畤祭炎帝後四十八年周太史儋見秦獻公孟康曰太史儋謂老子也師古曰此亦周之太史名非必老聃老聃非秦獻公時儋音丁甘反又吐甘反曰周始與秦國合而别别五百載當復合應劭曰秦伯翳之後也始周孝王封非子為附庸邑諸秦平王東遷洛邑襄公以兵衞之嘉其勲力列為侯伯與周别五百載矣昭王時西周君自歸受罪盡獻其邑三十六城此復合也孟康曰謂周封秦為别秦并周為合此襄王為霸始皇為王也韋昭曰周封秦為始别謂秦仲也五百歲謂從秦仲至孝公彊大顯王致伯與之親合也師古曰諸家之說皆非也自非子至西周獻邑凡六百五十三歲自仲至顯王二十六年孝公稱伯止有四百二十六歲皆不合五百之數也按史記秦本紀及年表並云周平王封襄公始列為諸侯於是始與諸侯通又周本紀及吳齊晉楚諸系家皆言幽王為犬戎所殺秦始列為諸侯正與此志符會是乃為别至昭襄王五十二年西周君自歸獻邑凡五百一十六年是為合也言五百者舉其成數也合七十年而伯王出焉韋昭曰武王昭王皆伯至始皇而王天下師古曰七十當為十七今史記舊本皆作十七字伯王者指謂始皇始皇初立政在太后嫪毐未得稱伯自昭王滅周後至始皇九年誅嫪毐止十七年本紀年表其義顯而韋氏乃合武王昭王為數失之遠矣伯讀曰霸儋見後七年櫟陽雨金獻公以為得金瑞故作畦畤櫟陽而祀白帝師古曰畦畤者如種韭畦之形而畤於畦中各為一土封也畦音下圭反宋祁曰越本獻公下有自字後百二十歲周赧王卒九鼎入于秦或曰周顯王之四十二年宋大丘社亡師古曰爾雅云左陵泰丘謂丘左有陵者其名泰丘也郭璞云宋有泰丘蓋以丘名此地也而鼎淪没於泗水彭城下自赧王卒後七年秦莊襄王滅東周周祀絶後二十八年秦并天下稱皇帝秦始皇帝既即位或曰黄帝得土徳黄龍地螾見應劭曰螾蚯蚓也黄帝土德故地見其神蚓大五六圍長十餘丈如淳曰呂氏春秋云黄帝之時天先見大螻大螾黄帝曰土氣勝故其色尚黄師古曰螾音引螻音樓謂螻蛄也夏得木德青龍止於郊草木鬯茂師古曰鬯與暢同殷得金德銀自山溢蘇林曰流出也周得火德有赤烏之符師古曰謂武王伐紂師渡孟津之時也尚書中候曰有火自天止于王屋流為赤烏五至以穀俱來宋祁曰淳化本注末云五至之數也無以榖俱來四字秦變周水德之時昔文公出獵獲黑龍此其水德之瑞於是秦更名河曰德水以冬十月為年首色上黑度㠯六為名張晏曰水北方黑終數六故以方六寸為符六尺為歩音上大呂師古曰大呂陰律之始也事綂上法服䖍曰政尚法令也臣瓚曰水陰陰主刑殺故上法即帝位三年東巡狩郡縣祠騶嶧山蘇林曰騶魯縣也臣瓚曰嶧山在北師古曰嶧音亦頌功業師古曰謂刻石自著功業於是從齊魯之儒生博士七十人至于泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木師古曰蒲車以蒲裹輪掃地而祠席用苴稭應劭曰稭藁本也去皮以為席如淳曰苴讀如租稭讀如戞晉灼曰苴藉也師古曰茅藉也苴字本作葅假借用言其易遵也始皇聞此議各乖異難施用由此黜儒生師古曰黜退也而遂除車道上自泰山陽至顚立石頌德明其得封也從陰道師古曰山南曰陽山北曰陰禪於梁父其禮頗采泰祝之祀雍上帝所用而封臧皆祕之世不得而記也宋祁曰越本無也字始皇之上泰山中阪遇暴風雨休於大樹下諸儒既黜不得與封禪師古曰與讀曰豫聞始皇遇風雨即譏之於是始皇遂東遊海上行禮祠名山川及八神求僊人羡門之屬應劭曰羡門名子高古仙人也師古曰古亦以為仙字下皆類此宋祁曰注文字下當有字字下字字當刪去八神將自古而有之或曰太公㠯來作之齊所以為齊㠯天齊也蘇林曰當天中央齊也師古曰謂其衆神異如天之腹齊也其祀絶莫知起時八神一曰天主祠天齊天齊淵水居臨菑南郊山下下者師古曰下下謂最下也臨菑城南有天齊水五泉並出蓋謂此也二曰地主祠泰山梁父蓋天好陰祠之必於高山之下畤命曰畤師古曰名其祭處曰畤也地貴陽祭之必於澤中圜丘云三曰兵主祠蚩尤在東平陸監鄉齊之西竟也師古曰東平陸縣名也監其縣之鄉名也四曰陰主祠三山師古曰三山即下所謂三神山五曰陽主祠之罘山韋昭曰之罘山在東萊腄縣師古曰罘音浮腄音直瑞反宋祁曰姚本注文無之字及縣字六曰月主祠之萊山韋昭曰在東萊長廣也皆在齊北竝渤海師古曰竝音步浪反七曰日主祠盛山盛山斗入海韋昭曰盛山在東萊不夜縣斗入海也師古曰斗絶也盛音成最居齊東北陽㠯迎日出云八曰四時主祠琅邪琅邪在齊東北蓋歲之所始師古曰山海經云琅邪臺在渤海間謂臨海有山形如臺也宋祁曰新本最作聚皆各用牢具祠而巫祝所損益圭幣雜異焉師古曰言八神牲牢皆同而圭幣各異也自齊威宣時騶子之徒論著終始五德之運如淳曰今其書有五德終始五德各以所勝為行秦謂周為火德滅火者水故自謂水德師古曰騶子即騶衍及秦帝而齊人奏之故始皇采用之而宋母忌正伯僑元尚羡門高最後皆燕人為方道韋昭曰皆慕古人之名効為神仙者也師古曰自宋母忌至最後皆其人姓名也凡五人形解銷化服䖍曰尸解也張晏曰人老而解去故骨節變化也今山中有龍骨世人謂之龍解骨化去應劭曰列仙傳曰崔文子學仙於王子喬王子喬化為白蜺文子驚引戈擊之俯而見為王子喬之尸也須臾則為大鳥飛而去師古曰服張二說是也依於鬼神之事騶衍以陰陽主運顯於諸侯晉灼曰燕昭王築宮師之故作主運之篇也如淳曰今其書有主運五行相次轉用事隨方面為服也而燕齊海上之方士傳其術不能通然則怪迂阿諛苟合之徒自此興不可勝數也師古曰迂謂囘遠也音于自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者其傳在勃海中服䖍曰其傳書云爾臣瓚曰世人相傳云爾師古曰瓚說是也去人不遠蓋嘗有至者諸人及不死之藥皆在焉其物禽獸盡白而黄金銀為宮闕未至望之如雲及到三神山反居水下水臨之患且至則風輙引船而去終莫能至云世主莫不甘心焉師古曰甘心言貪嗜之心不能已也及秦始皇至海上則方士爭言之始皇如恐弗及使人齎童男女入海求之船交海中皆以風為解師古曰自解說云為風不得至曰未能至望見之焉其明年始皇復游海上至琅邪過恒山從上黨歸後三年游碣石考入海方士師古曰考校其虛實也宋祁曰景本碣作碭從上郡歸後五年始皇南至湘山遂登會稽竝海上師古曰附海而上也竝音步浪反上音時掌反幾遇海中三神山之竒藥師古曰幾讀曰兾不得還到沙丘崩臣瓚曰沙丘在鉅鹿縣東北也二世元年東巡碣石竝海師古曰竝音步浪反南歷泰山至會稽皆禮祠之而刻勒始皇所立石書旁以章始皇之功德師古曰今此諸山皆有始皇所刻石及胡亥重刻其文並具存焉其秋諸侯叛秦三年而二世弑死始皇封禪之後十二年而秦亡諸儒生疾秦焚詩書誅滅文學百姓怨其法天下叛之皆說曰始皇上泰山為風雨所擊不得封禪云此豈所謂無其德而用其事者耶昔三代之居皆河洛之間師古曰謂夏都安邑殷都朝歌周都洛陽故嵩高為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦迭興迭衰師古曰迭互也音大結反名山大川或在諸侯或在天子其禮損益世殊不可勝記師古曰代代殊異故不可盡記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也於是自崤以東名山五大川祠二師古曰崤即今之陜州二崤也曰太室太室嵩高也恒山泰山會稽湘山水曰泲曰淮師古曰泲音子禮反此本濟水之字宋祁曰邵本湘作相春以脯酒為歲禱因泮凍服䖍曰解凍也師古曰泮音普半反秋涸凍師古曰涸讀與沍同沍凝也音下故反春則解之秋則凝之春秋左氏傳曰涸陰沍寒禮記月令曰孟冬行春令則凍閉不密冬塞禱祠師古曰塞謂報其所祈也音先代反下並同也其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山者襄山也師古曰說者云薄山在河東一曰在潼闗北十餘里而此志云自華以西者則今閿鄉之南山連延西出並得華山之名嶽山岐山吳山鴻冢瀆山瀆山蜀之岷山也師古曰周禮職方氏雍州其山曰嶽爾雅亦云河西曰嶽說者咸云嶽即吳嶽也今志有嶽又有吳山則吳嶽非一山之名但未詳嶽之所在耳徐廣云嶽山在武功據地理志武功但有埀山無嶽山也岐山即在今之岐山縣其山兩岐俗呼為箭括嶺吳山在今隴州吳山縣鴻冢釋在下岷山在湔氐道水曰河祠臨晉師古曰即今之同州朝邑縣界沔祠漢中師古曰沔漢水之上名也漢中今梁州是也沔音彌善反湫淵祠朝那蘇林曰湫淵在安定朝那縣方四十里停水不流冬夏不增不減不生草木湫音將蓼反在涿郡遒縣師古曰此水今在涇州界清澈可愛不容穢濁或諠汚輙興雲雨土俗亢旱毎於此求之相傳云龍之所居也而天下山川隈曲亦往往有之湫音子由反江水祠蜀亦春秋泮涸禱塞如東方山川而牲亦牛犢牢具圭幣各異而四大冢鴻岐吳嶽皆有甞禾孟康曰以新穀祭之陳寶節來祠服䖍曰陳寶神應節來也其河加有甞醪此皆雍州之域近天子都故加車一乘駵駒四霸産豐澇涇渭長水皆不在大山川數師古曰霸産出藍田豐澇出鄠長水者言其源流長也澇音勞㠯近咸陽盡得比山川祠而無諸加師古曰加謂車及駵駒之屬汧洛二淵鳴澤蒲山嶽壻山之屬蘇林曰壻音胥韋昭曰音蘇計反師古曰韋說是也為小山川亦皆禱塞泮涸祠禮不必同而雍有日月參辰南北斗熒惑太白歲星塡星辰星二十八宿風伯雨師四海九臣十四臣諸布諸嚴諸逐之屬百有餘廟師古曰風伯飛廉也雨師屏翳也一曰屏號而說者乃謂風伯箕星也雨師畢星也此志既言二十八宿又有風伯雨師則知非箕畢也九臣十四臣不見名數所出諸布諸嚴諸逐未聞其義逐字或作逑音求屏並音步丁反劉奉世曰二十八宿既已備而又言參與南北斗蓋衍字也西亦有數十祠於湖有周天子祠於下邽有天神豐鎬有昭明天子辟池於杜亳有五杜主之祠壽星祠韋昭曰亳音薄湯所都也臣瓚曰濟隂亳縣是也師古曰杜即京兆杜縣也此亳非湯都也不在濟陰徐廣云京兆杜縣有薄亭斯近之矣而雍菅廟祠亦有杜主李竒曰菅茅也師古曰菅音姦杜主故周之右將軍師古曰墨子云周宣王殺杜伯不以罪後宣王田於圃田見杜伯執弓矢射宣王伏弓衣而死故周人尊其鬼而右之蓋謂此也其在秦中最小鬼之神者也師古曰其鬼雖小而有神靈也各以歲時奉祠唯雍四畤上帝為尊其光景動人民唯陳寶故雍四畤春以為歲祠禱因泮凍秋涸凍冬賽祠五月甞駒及四中之月月祠師古曰中讀曰仲謂四時之仲月皆祠之若陳寶節來一祠宋祁曰新本無若字春夏用騂秋冬用駵師古曰騂純赤色也音先營反畤駒四匹師古曰每畤用駒四匹而春秋異色木寓龍一駟李竒曰寓寄也寄生龍形於木也師古曰一駟亦四龍也宋祁曰李竒注寓寄也晏本作寓木以主之木寓車馬一駟各如其帝色黄犢羔各四圭幣各有數皆生瘞埋無爼豆之具三年一郊秦以十月為歲首故常以十月上宿郊見李竒曰上宿上齊戒也宋祁曰越本註云上宿月上旬也通權火張晏曰權火㷭火也狀若井挈臯矣其法類稱故謂之權火欲令光明遠照通於祀所也漢祀五畤於雍五十里一㷭火如淳曰權舉也師古曰凡祭祀通舉火者或以天子不親至祠所而望拜或以衆祠各處欲其一時薦饗宜知早晏故以火為之節度也它皆類此拜於咸陽之旁而衣上白其用如經祠云服䖍曰經常也西畤畦畤祠如其故上不親往諸此祠皆太祝常主以歲時奉祠之至如它名山川諸神及八神之屬上過則祠去則已郡縣遠方祠者民各自奉祠不領於天子之祝官祝官有祕祝即有災祥輙祝祠移過於下漢興高祖初起殺大虵有物曰蛇白帝子而殺者赤帝子也師古曰物謂鬼神也宋祁曰赤帝子也邵本無也字及高祖禱豐枌榆社鄭氏曰枌榆鄉名也社在枌榆晉灼曰枌白榆也社在豐東北十五里師古曰以此樹為社神因立名也枌符云反狥沛為沛公則祀蚩尤釁鼓旗遂以十月至霸上立為漢王因以十月為年首色上赤二年冬東擊項籍而還入闗問故秦時上帝祠何帝也對曰四帝有白青黄赤帝之祠高祖曰吾聞天有五帝而四何也莫知其說於是高祖曰吾知之矣廼待我而具五也廼立黑帝祠名曰北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮因令縣為公社李竒曰猶官社下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故宋祁曰淳化本作各以其禮時祠如故後四歲天下已定詔御史令豐治枌榆社常以時春以羊彘祠之令祝立蚩尤之祠於長安長安置祠宋祁曰邵本無下長安二字祀官女巫其梁巫祠天地天社天水房中堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬服䖍曰東君以下皆神名也師古曰東君日也雲中君謂雲神也巫社巫祠皆古巫之神也族人炊古主炊母之神也炊謂饎㸑也秦巫祠杜主巫保族纍之屬師古曰杜主即上所云五杜主也巫保族纍二神名纍音力追反荆巫祠堂下巫先司命施糜之屬師古曰堂下在堂之下巫先巫之最先者司命說者云文昌第四星也施靡其先常施設靡鬻者也九天巫祠九天師古曰九天者謂中央鈞天東方蒼天東北旻天北方𤣥天西北幽天西方皓天西南朱天南方炎天東南陽天也其說見淮南子一說云東方旻天東南陽天南方赤天西南朱天西方成天西北幽天北方𤣥天東北變天中央鈞天也皆以歲時祠宮中其河巫祠河於臨晉而南山巫祠南山秦中秦中者二世皇帝也張晏曰以其彊死魂魄為厲故祠之成帝時匡衡奏罷之宋祁曰舊本河作祠各有時日其後二歲或言曰周興而邑立后稷之祠師古曰以其有播種之功故令天下諸邑皆祠之至今血食天下師古曰祭有牲牢故言血食徧天下也於是高祖制詔御史其令天下立靈星祠張晏曰龍星左角曰天田則農祥也辰見而祭之常以歲時祠以牛高祖十年春有司請令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠師古曰隨其祠具之豐儉也制曰可文帝即位十三年下詔曰祕祝之官移過於下朕甚弗取其除之始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以歲時致禮如故明年以歲比登師古曰年穀頻熟也詔有司增雍五畤路車各一乘駕被具師古曰駕車被馬之餙皆具也被音皮義反下亦同西畤畦畤寓車各一乘寓馬四匹駕被具河湫漢水玉加各二及諸祀皆廣壇場圭幣爼豆以差加之魯人公孫臣上書曰始秦得水德及漢受之推終始傳鄭氏曰音亭傳師古曰音張戀反謂轉次之則漢當土德土德之應黄龍見宜改正朔服色上黄時丞相張蒼好律歴以為漢廼水德之時河決金隄其符也年始冬十月色外黑内赤服䖍曰十月陰氣在外故外黑陽氣尚伏在地故内赤也或曰十月百草外黑内赤也與德相應公孫臣言非是罷之明年黄龍見成紀師古曰天水之縣也文帝召公孫臣拜為博士與諸生申明土德草改厯服色事師古曰草謂創造之後例皆同也其夏下詔曰有異物之神見于成紀毋害於民歲以有年朕幾郊祀上帝諸神師古曰幾讀曰兾禮官議毋諱以朕勞師古曰無諱以朕為勞自言不以為勞也晉灼曰諱忌難也有司皆曰古者天子夏親郊祀上帝於郊故曰郊師古曰邑外謂之郊於是夏四月文帝始幸雍郊見五畤劉攽曰子謂三王之郊一用夏正于時據十月為歲首故言夏郊也祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也張晏曰神明日也日出東北舍謂陽谷日没於西故曰墓墓濛谷也師古曰此說非也蓋總言凡神明以東北為居西方為冢墓之所放立廟於渭陽者也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇師古曰宇謂屋之覆也言同一屋之下而别為五廟各立門室也廟記云五帝廟在長安東北也帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之㑹如淳曰二水之合也以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水師古曰蒲池為池而種蒲蒲字或作滿言其水滿也宋祁曰姚本無下五帝二字權火舉而祠若光煇然屬天焉師古曰屬聯也音之欲反於是貴平至上大夫賜累千金而使博士諸生刺六經中作王制師古曰刺采取之也音千賜反謀議巡狩封禪事文帝出長門如淳曰亭名也若見五人於道北遂因其直立五帝壇鄭氏曰因其所立處以立祠也師古曰直猶當也當其處祠以五牢其明年平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延壽平又言臣候日再中居頃之日郤復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾陰直有金寶氣師古曰汾陰直謂正當汾陰也意周鼎其出乎兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅夷平師古曰夷者平也謂盡平除其家室宗族是後文帝怠於改正服鬼神之事師古曰正正朔也服服色正音之成反而渭陽長門五帝使祠官領以時致禮不往焉明年匈奴數入邊師古曰數音所角反興兵守御後歲少不登數歲而孝景即位十六年祠官各以歲時祠如故無有所興武帝初即位尤敬鬼神之祀漢興己六十餘歲矣天下艾安師古曰艾讀曰乂乂治也漢書皆以艾為乂其義類此也縉紳之屬皆望天子封禪改正度也師古曰正亦正朔度度量也服色度量互言之耳而上鄉儒術師古曰鄉讀曰嚮招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改厯服色事未就師古曰就成也竇太后不好儒術使人微伺趙綰等姦利事按綰臧綰臧自殺諸所興為皆廢六年竇太后崩其明年徵文學之士明年上初至雍郊見五畤後常三歲一郊是時上求神君舍之上林中磃氏館如淳曰磃音蹄鄭氏曰音斯師古曰鄭音是其字從石從虒神君者長陵女子㠯乳死見神於先後宛若孟康曰産乳而死也兄弟妻相謂先後宛若字也師古曰先音蘇見反後音胡構反古謂之娣姒今闗中俗呼為先後吳楚俗呼之為妯娌音軸里宛若祠之其室民多往祠平原君亦往祠其後子孫以尊顯應劭曰平原君武帝外祖母也及上即位則厚禮置祠之内中聞其言不見其人云是時李少君亦以祠竈穀道郤老方見上如淳曰祠竈可以致福李竒曰穀道辟穀不食之道也上尊之少君者故深澤侯人主方如淳曰侯家人主方藥也匿其年及所生長師古曰長謂其郡縣所屬及居止處常自謂七十能使物郤老如淳曰物謂鬼物也其游以方徧諸侯無妻子人聞其能使物及不死更餽遺之師古曰更音工衡反常餘金錢衣食人皆以為不治産業而饒給師古曰給足也又不知其何所人愈信爭事之少君資好方善為巧發竒中如淳曰時時發言有所中師古曰中音竹仲反常從武安侯宴坐中有年九十餘老人少君廼言與大父游射處老人為兒從其大父識其處師古曰識記也音式志反一坐盡驚少君見上上有故銅器問少君曰宋祁曰曰字上疑更有少君二字此器齊桓公十年陳於栢寢臣瓚曰晏子書栢寢臺名也師古曰以栢木為寢室於臺之上已而按其刻果齊桓公器師古曰刻謂器上所銘記一宮盡駭以為少君神數百歲人也少君言上祠竈皆可致物師古曰物亦謂鬼物致物而丹沙可化為黄金黄金成以為飲食器則益壽益壽而海中蓬萊僊者廼可見之以封禪則不死黄帝是也臣甞游海上見安期生服䖍曰古之眞人也師古曰列仙傳云安期生琅邪人賣藥東海邊時人皆言千歲也安期生食巨棗大如𤓰師古曰食讀曰飤安期生僊者通蓬萊中合則見人不合則隱師古曰合謂道相合於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黄金矣師古曰齊藥之分齊也音才計反久之少君病死天子以為化去不死也使黄錘史寛舒受其方孟康曰二人皆方士也師古曰錘音直垂反而海上燕齊怪迂之方士多更來言神事矣師古曰更音工衡反亳人謬忌奏祠泰一方師古曰亳亦薄也下所謂薄忌也晉灼曰濟陰薄縣人也曰天神貴者泰一泰一佐曰五帝師古曰謂青帝靈威仰赤帝赤熛怒白帝白招矩黑帝叶光紀黄帝含樞紐也一說蒼帝名靈符赤帝名文祖白帝名顯紀黑帝名𤣥矩黄帝名神斗古者天子以春秋祭泰一東南郊日一太牢七日師古曰每日以一太牢凡七日祭也為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子常以春解祠祠黄帝用一梟破鏡張晏曰黄帝五帝之首也歲之始也梟惡逆之鳥方士虛誕云以歲始祓除凶災令神仙之帝食惡逆之物使天下為逆者破滅訖竟無有遺育也孟康曰梟鳥名食母破鏡獸名食父黄帝欲絶其類使百吏祠皆用之破鏡如貙而虎眼如淳曰漢使東郡送梟五月五日作梟羮以賜百官以其惡鳥故食之也師古曰解祠者謂祠祭以解罪求福㝠羊用羊祠馬行用一青牡馬泰一臯山山君用牛武夷君用乾魚陰陽使者以一牛孟康曰陰陽之神也令祠官領之如其方而祠泰一於忌泰一壇旁後二年郊雍獲一角獸若麃然師古曰麃鹿屬也形似麞牛尾一角音蒲交反有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合于天也晉灼曰符瑞也臣瓚曰風示諸侯以此符瑞之應也於是濟北王以為天子且封禪上書獻泰山及其旁邑天子以它縣償之常山王有罪􅞳師古曰􅞳與遷同天子封其弟眞定以續先王祀而以常山為郡然後五嶽皆在天子之郡明年齊人少翁以方見上上有所幸李夫人夫人卒少翁以方蓋夜致夫人及竈鬼之貌云天子自帷中望見焉廼拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宮室被服非象神神物不至廼作畫雲氣車及各以勝日服䖍曰甲乙五行相克之日如淳曰如火勝金用丙丁日不用庚辛也駕車辟惡鬼又作甘泉宮中為臺室畫天地泰一諸鬼神而置祭具以致天神居歲餘其方益衰神不至廼帛書以飯牛師古曰謂雜草以飯牛也音扶晩反陽不知言此牛腹中有竒書宋祁曰新本去書字殺視得書書言甚怪天子識其手師古曰手謂所書手跡也問之果為書於是誅文成將軍隱之其後又作栢梁銅柱承露僊人掌之屬矣蘇林曰僊人以手掌擎盤承甘露師古曰三輔故事云建章宮承露盤高二十丈大七圍以銅為之上有僊人掌承露和玉屑飲之蓋張衡西京賦所云立脩莖之僊掌承雲表之清露屑瓊蘂以朝餐必性命之可度也文成死明年天子病鼎湖甚晉灼曰黄圖宮名在京兆地理志湖本在京兆後分屬𢎞農也巫醫無所不致游水發根言上郡有巫病而鬼下之服䖍曰游水縣發根人姓名晉灼曰地理志游水水名在臨淮淮浦也師古曰二說皆非也游水姓也發根名也葢因水為姓也本甞遇病而鬼下之故為巫也上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少瘉强與我會甘泉於是上病瘉遂起幸甘泉病良已孟康曰良謂善己謂瘉也大赦置壽宮神君孟康曰更立此宮也臣瓚曰夀宮奉神之宮也楚辭曰蹇將澹兮夀宮也神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入孟康曰崇絜自除祓然後入也師古曰祓音發勿反因巫為主人闗飲食所欲言行下李竒曰神所欲言上輙為下之也晉灼曰神君所言行下於巫師古曰晉說是也又置壽宮北宮張羽旗設共具師古曰共讀曰供音居用反以禮神君神君所言上使受書其名曰畫法孟康曰䇿畫之法也其所言世俗之所知也無絶殊者而天子心獨憙其事祕世莫知也師古曰憙讀曰喜喜好也音許吏反後三年有司言元宜以天瑞不宜以一二數蘇林曰得諸瑞以名年耳一元曰建蘇林曰建元元年是二元以長星曰光蘇林曰以有長星之光故曰元光元年也今郊得一角獸曰狩云如淳曰改元狩元年其明年天子郊雍曰今上帝朕親郊而后土無祀則禮不答也師古曰答對也郊天而不祀地失對偶之義一曰闕地祗之祀故不為神所答應也有司與太史令談祠官寛舒議師古曰談即司馬談也天地牲角繭栗師古曰牛角之形或如繭或如栗言其小今陛下親祠后土后土宜於澤中圜丘為五壇壇一黄犢牢具已祠盡瘞而從祠衣上黄師古曰侍祠之人皆着黄衣也於是天子東幸汾陰汾陰男子公孫滂洋等見汾旁有光如綘師古曰滂音普郎反洋音羊也上遂立后土祠於汾陰脽上師古曰脽音誰解在武紀如寛舒等議上親望拜如上帝禮禮畢天子遂至滎陽還過雒陽下詔封周後令奉其祀語在武紀上始巡幸郡縣寖尋於泰山矣鄭𤣥曰尋用也晉灼曰尋遂往之意也師古曰二說皆非也寖漸也尋就也其春樂成侯登上書言欒大欒大膠東宮人服䖍曰王家人故甞與文成將軍同師已而為膠東王尚方師古曰主方藥而樂成侯姊為康王后無子孟康曰膠東王后也王死它姬子立為王而康后有淫行與王不相中相危以法師古曰不相可也相危以法謂以罪法相欲傾危也中音竹仲反康后聞文成死而欲自媚於上乃遣欒大入因樂成侯求見言方師古曰言神仙之方天子既誅文成後悔其方不盡及見欒大大說師古曰說讀曰悅大為人長美言師古曰善為甘美之言也多方略而敢為大言處之不疑大言曰臣甞往來海中見安期羡門之屬顧以臣為賤不信臣師古曰顧念也又以為康王諸侯耳不足與方臣數以言康王康王又不用臣臣之師曰黄金可成而河決可塞不死之藥可得僊人可致也然臣恐效文成則方士皆掩口惡敢言方哉師古曰惡音烏謂於何也上曰文成食馬肝死耳子誠能脩其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之勿卑使各佩其信印廼可使通言於神人神人尚肻邪不邪尊其使然後可致也於是上使驗小方鬭棊棊自相觸擊是時上方憂河決而黄金不就師古曰鑄黄金不成廼拜大為五利將軍居月餘得四印得天士將軍地士將軍大通將軍印制誥御史昔禹疏九河決四瀆間者河溢臯陸隄繇不息師古曰臯水旁地廣平曰陸言水汎溢自臯及陸而築作隄防徭役甚多不暇休息朕臨天下二十有八年天若遺朕士而大通焉乾稱飛龍鴻漸于般孟康曰般水涯堆也漸進也武帝云得欒大如鴻進於般一舉千里得道若飛龍在天師古曰飛龍在天乾卦九五爻辭也鴻漸于般漸卦六二爻辭也般山石之安者朕意庶幾與焉師古曰與讀曰豫其以二千戸封地士將軍大為樂通侯賜列侯甲第童千人乘輿斥車馬帷帳器物以充其家師古曰斥不用者也又以衞長公主妻之孟康曰衞太子妹如淳曰衞太子姊也師古曰外戚傳云子夫生三女元朔三年生男據是則太子之姊也孟說非也齎金十萬斤更名其邑曰當利公主天子親如五利之第使者存問共給相屬於道師古曰共讀曰供屬及也音之欲反自大主將相以下皆置酒其家韋昭曰大主武帝姑竇太后之女也獻遺之天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以視不臣也師古曰羽衣以鳥羽為衣取其祌僊飛翔之意也視讀曰示而佩天道者且為天子道天神也師古曰為音于偽反道天神道讀曰導於是五利常夜祠其家欲以下神後裝治行東入海求其師云大見數月佩六印䝿震天下而海上燕齊之間莫不搤掔而自言有禁方能神僊矣師古曰搤捉持也掔古手腕之字也搤音戹其夏六月汾陰巫錦應劭曰錦巫名為民祠魏脽后土營旁應劭曰魏故魏國也師古曰汾脽本魏地之境故曰魏脽也營謂祠之兆域也見地如鉤狀掊視得鼎師古曰掊謂手杷土也音蒲溝反杷音蒲巴反其字從木鼎大異於衆鼎文鏤無款識韋昭曰款刻也師古曰識記也音式志反其下美陽鼎亦同也怪之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無姦詐廼以禮祠迎鼎至甘泉從上行薦之如淳曰以鼎從行上甘泉將薦之於天師古曰上音時掌反至中山晏温如淳曰三輔謂日出清濟為晏晏而温乃有黄雲故為異也師古曰中讀曰仲即今雲陽之中山也下云合兹中山亦同也有黄雲焉有鹿過上自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故巡祭后土祈為百姓育穀今年豐楙未報鼎曷為出哉師古曰楙美也言稼穡美也未報者獲年豐而未報賽也一曰雖祈穀而未獲年豐之報也其下張敞引此詔文云穀嗛未報嗛者少也有司皆言聞昔泰帝興神鼎一師古曰泰帝者即泰昊伏羲氏也一者一綂天地萬物所繫象也黄帝作寶鼎三象天地人禹收九牧之金師古曰九牧九州之牧也鑄九鼎象九州皆甞鬺亨上帝鬼神服䖍曰以享祀上帝也師古曰鬺亨一也鬺亨煮而祀也韓詩采蘋曰于以鬺之唯錡及釡亨音普庚反其空足曰鬲蘇林曰鬲音歷足中空不實者名曰鬲也以象三德如淳曰鼎有三足故也三德三正之德師古曰如說非也三德一曰正直二曰剛克三曰柔克事見周書洪範饗承天祜師古曰祜福也音怙夏德衰鼎遷于殷殷德衰鼎遷于周周德衰鼎遷于秦秦德衰宋之社亡鼎廼淪伏而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不吴不敖胡考之休師古曰周頌絲衣之詩也基門塾之基也鼎絶大者謂之鼐圜弇上謂之鼒吴讙譁也敖慢也考壽也休美也言執祭事者或升堂室或之門塾視牛羊之性及舉大小之鼎告其致絜神降之福故獲壽考之美曰何壽之美何壽之美者歎之之言也鼐音乃代反鼒音兹敖讀曰傲今鼎至甘泉以光潤龍變承休無疆合兹中山有黄白雲降師古曰言鼎至甘泉之後光潤變見若龍之神能幽能明能小能大乘此休福無窮竟也有黄白雲降與初至中山黄雲之瑞相合也蓋若獸為符服䖍曰雲若獸在車蓋也晉灼曰蓋辭也符謂鹿也師古曰二說非也蓋發語辭也言甘泉之雲又若獸形以為符瑞也宋祁曰獸字下疑有之字路弓乘矢集獲壇下李竒曰宜言盧弓韋昭曰路大也四矢曰乘師古曰韋說是也又於壇下獲弓矢之應劉奉世曰指謂鹿也言以大弓四矢而後獲之於壇下也義甚通報祠大亨唯受命而帝者心知其意而合德焉服䖍曰高祖受命知之宜見鼎於其廟也師古曰合德謂與天合德鼎宜視宗禰廟臧於帝庭以合明應師古曰視讀曰示宗謂先帝有德可尊者也禰父廟也帝庭甘泉天神之庭制曰可入海求蓬萊者言蓬萊不遠而不能至者殆不見其氣上廼遣望氣佐候其氣云其秋上雍且郊師古曰雍地形高故云上也音時掌反或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黄帝時等師古曰等同也卿有札書師古曰札木簡之薄小者也曰黄帝得寶鼎冕侯問於鬼㬰區師古曰鬼㬰區黄帝臣也藝文志云鬼容區而此志作㬰區㬰容聲相近蓋一也今流俗書本㬰字作申非也鬼㬰區對曰黄帝得寶鼎神䇿是歲己酉朔旦冬至得天之紀終而復始於是黄帝迎日推䇿晉灼曰迎數之也臣瓚曰日月朔望未來而推之故曰迎日後率二十歲復朔旦冬至凡二十推三百八十年黄帝僊登于天卿因所忠欲奏之師古曰所忠人姓名也解在食貨志所忠視其書不經師古曰不合經典也疑其妄言謝曰寶鼎事已決矣尚何以為師古曰謂不須更言之卿因嬖人奏之上大說師古曰說讀曰悅廼召問卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黄帝言無書獨有此鼎書曰漢興復當黄帝之時曰漢之聖者在高祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黄帝得上泰山封申公曰漢帝亦當上封禪封禪則能僊登天矣黄帝萬諸侯而神靈之封君七千應劭曰黄帝時諸侯會封禪者七千人也李竒曰說僊道得封者七千國也張晏曰神靈之封謂山川之守也師古曰張說是也山川之守謂尊山川之神令主祭祀也即國語所云汪芒氏之君守封嵎之山也天下名山八而三在蠻夷五在中國宋祁曰淳化本無下中國二字中國華山首山太室山泰山東萊山此五山黄帝之所常游與神會黄帝且戰且學僊患百姓非其道廼斷斬非鬼神者百餘歲然後得與神通黄帝郊雍上帝宿三月鬼㬰區號大鴻死葬雍故鴻冢是也蘇林曰今雍有鴻冢其後黄帝接萬靈明庭明庭者甘泉也所謂寒門者谷口也服䖍曰黄帝升僊之處也師古曰谷口仲山之谷口也漢時為縣今呼之治谷是也以仲山之北寒凉故謂此谷為寒門也黄帝采首山銅鑄鼎於荆山下晉灼曰地理志首山屬河東蒲阪荆山在馮翊懷德縣也鼎既成有龍垂胡䫇下迎黄帝師古曰胡謂頸下垂肉也䫇其毛也音人占反黄帝上騎羣臣後宮從上龍七十餘人龍廼上去餘小臣不得上廼悉持龍䫇龍䫇拔墯墯黄帝之弓百姓卬望師古曰卬讀曰仰黄帝既上天乃抱其弓與龍䫇號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黄帝吾視去妻子如脫屣耳師古曰屣小履脫屣者言其便易無所顧也屣音山爾反拜卿為郎使東候神於太室上遂郊雍至隴西登空桐幸甘泉令祠官寛舒等具泰一祠壇祠壇放亳忌泰一壇三陔師古曰陔重也三陔三重壇也音該五帝壇環居其下各如其方黄帝西南除八通鬼道服䖍曰坤位在末黄帝從土位泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛以為爼豆牢具李竒曰音貍師古曰西南夷長尾髦之牛也一音茅而五帝獨有爼豆醴進師古曰具爼豆酒醴而進之一曰進謂雜物之具所以加禮也其下四方地為腏食羣神從者及北斗云師古曰腏字與綴同謂連續而祭也音竹芮反食讀曰飤已祠胙餘皆燎之師古曰胙謂祭餘酒肉也其牛色白白鹿居其中彘在鹿中鹿中水而酒之服䖍曰水𤣥酒酒眞酒也晉灼曰此言合牲物而燎之也師古曰言以白鹿内牛中以彘内鹿中又以水及酒合内鹿中祭日以牛祭月以羊彘特師古曰若牛若羊若彘止一牲也泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽師古曰昒爽謂日尚㝠蓋未明之時也昒音忽天子始郊拜泰一朝朝日夕夕月師古曰以朝旦拜日為朝下朝音丈昭反則揖而見泰一如雍郊禮劉敞曰則揖當屬上句其贊饗曰天始以寶鼎神䇿授皇帝朔而又朔終而復始皇帝敬拜見焉師古曰贊饗謂祝辭而衣上黄其祠列火滿壇壇旁亨炊具有司云祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉孟康曰璧大六尺謂之瑄嘉牲薦饗師古曰漢舊儀云祭天養牛五歲至三千斤也是夜有美光及晝黄氣上屬天師古曰屬音之欲反太史令談祠官寛舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應師古曰明著美光及黄氣之祥應令太祝領秋及臘間祠三歲天子壹郊見其秋為伐南越告禱泰一以牡荆畫幡日月北斗登龍以象太一三星為泰一鏠旗李竒曰牡荆作幡柄也如淳曰牡荆荆之無子者皆絜齊之道晉灼曰牡節間不相當也月暈刻之為劵以畏病者天文志天極星其一明者太一也旁三星三公也畫一星在後三星在前為泰一鏠旗也師古曰李晉二說是也以牡荆為幡竿而畫幡為日月龍及星宋祁曰淳化本作泰一絳旗注同越本止云泰一絳無旗字新本云泰一鏠亦無旗命曰靈旗為兵禱則太史奉以指所伐國而五利將軍使不敢入海之泰山祠上使人隨驗實無所見五利妄言見其師其方盡多不讎師古曰讎應當也不讎無驗也上廼誅五利其冬公孫卿候神河南言見僊人迹緱氏城上有物如雉往來城上天子親幸緱氏視迹問卿得毋効文成五利乎卿曰僊者非有求人主人主者求之其道非少寛暇神不來言神事如迂誕師古曰迂回遠也誕大言也積以歲廼可致於是郡國各除道繕治宮館名山神祠所以望幸矣其春既滅南越嬖臣李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祇可得而禮或曰泰帝使素女鼓五十弦瑟悲帝禁不止師古曰泰帝亦謂泰昊也不止謂不能自止也故破其瑟為二十五弦於是塞南越禱祠泰一后土始用樂舞益召歌兒師古曰益多也作二十五弦及空侯瑟自此起蘇林曰作空侯與瑟宋祁曰邵本空作坎其來年冬上議曰古者先振兵釋旅然後封禪廼遂北巡朔方勒兵十餘萬騎還祭黄帝冢橋山釋兵凉如李竒曰地名也上曰吾聞黄帝不死有冡何也或對曰黄帝以僊上天羣臣葬其衣冠既至甘泉為且用事泰山先類祠泰一師古曰且猶將也類祠謂以事類而祭也自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而羣儒采封禪尚書周官王制之望祀射牛事師古曰天子有事宗廟必自射牲蓋示親殺也事見國語齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上師古曰稍漸也即無風雨遂上封矣上於是廼令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黄帝以上封禪皆致怪物與神通欲放黄帝師古曰放依也音甫往反以接神人蓬萊高世比德於九皇張晏曰三皇之前有人皇九首韋昭曰上古有人皇者九人師古曰韋說是也劉敞曰予謂董仲舒書言周人推神農為九皇此是矣而頗采儒術以文之羣儒既已不能辯明封禪事又拘於詩書古文而不敢騁上為封祠器視羣儒師古曰視讀曰示羣儒或曰不與古同徐偃又曰太常諸生行禮不如魯善師古曰徐偃博士姓名周霸屬圖封事服䖍曰屬會也會諸儒圖封事也師古曰周霸亦人姓名也屬音之欲反於是上黜偃霸而盡罷諸儒弗用三月宋祁曰本紀作正月廼東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言廼令祠官加增太室祠禁毋伐其山木以山下戸凡三百封崈高為之奉邑師古曰崈古崇字耳以崇奉嵩高之山故謂之崈高奉邑奉音扶用反獨給祠復無有所與師古曰復音方目反與讀曰預上因東上泰山如淳曰言易上也泰山從南面直上步道三十里車道百里泰山草木未生廼令人上石立之泰山顚師古曰從山下轉石而上上遂東巡海上行禮祠八神齊人之上疏言神怪竒方者以萬數廼益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊言夜見大人長數丈就之則不見見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見鉅公鄭氏曰天子也張晏曰天子為天下父故曰鉅公也師古曰鉅大也已忽不見上既見大迹未信及羣臣又言老父則大以為僊人也宿留海上師古曰宿留謂有所須待也宿音先欲反留音力就反它皆類此與方士傳車師古曰傳音張戀反及閒使求神僊人以千數師古曰閒微也隨閒隙而行也四月還至奉高上念諸儒及方士言封禪人殊不經難施行師古曰人人殊異又不合經故難以施行天子至梁父禮祠地主至乙卯令侍中儒者皮弁縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上泰山服䖍曰子侯霍去病子也亦有封其事皆禁明日下陰道丙辰禪泰山下阯東北肅然山師古曰阯者山之基足音止如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱遠方竒獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中師古曰白雲出於所封之中天子從禪還坐明堂羣臣更上壽師古曰更互也音工衡反下詔改元為元封語在武紀又曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬萊諸神師古曰更音工衡反若將可得於是上欣然庶幾遇之復東至海上望焉奉車子侯暴病一日死上廼遂去竝海上師古曰竝音步浪反上音時掌反北至碣石巡自遼西歴北邊至九原五月廼至甘泉周萬八千里云其秋有星孛于東井後十餘日有星孛于三能師古曰能讀曰台望氣王朔言候獨見塡星出如𤓰食頃復入有司皆曰陛下建漢家封禪天其報德星云師古曰德星即塡星也言天以德星報於帝其來年冬郊雍五帝還拜祝祠泰一師古曰拜而祠之加祝辭贊饗曰德星昭衍厥維休祥師古曰昭明衍大休美也壽星仍出淵耀光明信星昭見皇帝敬拜泰祝之享其春公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊東萊宿留之宋祁曰淳化本無下東萊二字數日毋所見見大人迹云復遣方士求神人采藥以千數是歲旱天子既出亡名廼禱萬里沙應劭曰萬里沙神祠也在東萊曲城如淳曰故禱萬里沙以為名也過祠泰山鄭氏曰泰山東自復有小泰山臣瓚曰即今之泰山也師古曰瓚說是也還至􅉚子自臨塞決河留二日湛祠而去師古曰湛讀曰沈謂沈祭具於水中也爾雅曰祭川曰浮沈前漢書卷二十五上前漢書卷二十五上考證郊祀志上在男曰覡在女曰巫注巫覡亦通稱耳臣宗萬按國語賈公彦春官神仕疏曰男子陽有兩稱名巫名覡女子陰不變直名巫無覡稱然則顔注所云巫覡亦通稱者指男巫而言也其後十三世湯伐桀臣召南按封禪書作其後三世是也自帝孔甲帝臯帝發至桀祇更三世此文十三世十字當是衍文宋本亦誤後十三世世益衰臣召南按自成王至幽王歴康昭穆恭懿孝夷厲宣凡十一世封禪書作十四世此文作十三世並訛平王東徙雒陽監本作雒邑今從宋本其後十四年秦文公東獵汧渭之間臣召南按封禪書作其後十六年以十二諸侯年表核之周平王元年秦襄公之八年也初立西畤及文公十年作鄜畤恰十四年此文是也又下文作陳寶後七十一年秦德公立卜居雍封禪書云作鄜畤後七十八年以年表核之自文公作陳寶祠至德公元年正七十一年若自文公作鄜畤計之當作八十年凡此類皆班氏密于史記又下文後四年秦宣公作密畤于渭南封禪書曰德公立二年卒其後六年秦宣公作密畤於渭南以年表核之秦宣公之元年周惠王之二年也宣公四年作密畤此云後四年似亦訂正史記之失野雞夜鳴注野雞亦雉也避呂后諱故曰野雞顧炎武曰竊謂野雞者野中之雞顔注拘於荀悅云諱雉之字曰野雞夫諱恒曰常諱啟曰開史固有言常言開者豈必其皆為恒與啟乎又此文本史記封禪書其上文曰有雉登鼎耳雊其下文云公孫卿言見仙人跡緱氏城上有物如雉往來城上又云縱遠方竒獸飛禽及白雉並無所諱而地理志南陽郡有雉縣江夏郡有下雉縣五行志王音等上言雉者聽察先聞雷聲則漢時未嘗諱雉也臣浩按此上文即云若雄雉可為不諱雉之確証秦變周水德之時監本秦上衍今字從宋本去七曰日主祠盛山盛山斗入海臣召南按封禪書作成山此志後文云成山於不夜成山祠日又地理志亦作成山則此文盛字訛也然師古注云盛音成則唐初本已作盛山矣琅邪在齊東北蓋歲之所始注山海經云琅邪臺在勃海間臣召南按琅邪在齊東南海濵非在東北也封禪書作在齊東方可謂至確地理志琅邪郡琅邪有四時祠即此文四時主也師古不言此文北字之訛於地理志注引山海經琅邪臺在琅邪之東於此志注又引山海經臺在勃海間意欲以勃海解東北二字非也元尚羡門高元尚封禪書作充尚羡門高封禪書作羡門子高而刻勒始皇所立石書旁臣照按宋本刻勒字作胡亥勒監本作刻勒玩上下文俱稱二世而此獨云胡亥自無此理但刻即勒也漢人文字似不如此率意刻字與胡亥字蓋俱非也臣召南按封禪書已作刻勒矣以秦始皇本紀証之二世元年春東行郡縣到碣石並海南至會稽而盡刻始皇所立刻石石旁著大臣從者名以章先帝成功盛德焉按碣石之罘琅邪泰山鄒嶧會稽始皇皆有刻石二世東行則盡刻其石旁也封禪書及此文疑並是盡刻二字之訛冬塞禱祠注謂報其所祈也臣浩按塞字封禪書作賽是也以師古注推之似本文原作賽薄山者襄山也注云云臣召南按水經注襄山在蒲坂縣為永樂澗水所出然則襄山即古之雷首首陽亦名中條亦名薄山而後人謂之蒲山者也但此志上文明云自華以西名山七蒲山顧在華東何也師古所云正當闕疑耳霸産豐澇涇渭長水注長水者言其源流長也臣召南按長水水名師古注以長水總承霸産等水而言非也封禪書叙長水于霸産下豐澇涇渭上亦可云單言霸産二水源流長乎水經注渭水下云霸水又北長水注之水出杜縣白鹿原西北流謂之荆谿可為水名之確証木寓龍一駟注李竒曰寓寄也寄生龍形於木也顧炎武曰此說恐非古文偶寓通用偶亦音寓木寓木偶也史記孝武紀作木偶馬而韓延壽傳曰賣偶車馬下里偽物者棄之市道古人用以事神及送死者皆木偶人木偶馬今人代以紙人紙馬又酷吏傳匈奴至為偶人象郅都索隱曰漢書作寓人可以証寓字之為偶矣族人炊之屬注族人炊古主炊母之神也族人炊監本訛巫祠皆三字今改正少君者故深澤侯人主方臣召南按深澤侯人封襌書作深澤侯舍人据功臣表武帝初年深澤侯是趙將夕孫胡也亳人謬忌注晉灼曰濟陰薄縣人也胡三省曰据地理志亳屬山陽郡亳作薄謬姓也與繆同樂成侯登通鑑考異曰按史記漢書功臣表當為丁義胡三省曰義高祖功臣丁禮之曾孫也臣召南按封襌書但云樂成侯無登字鬭棊棊通鑑作旗考異曰封禪書郊祀志俱作棊獨史記孝武紀作旗按漢武故事云欒大嘗於殿前樹旍數百枚令旍自相擊繙繙竟庭中去地十餘丈觀者皆駭然則作旗字者是也居月餘得四印臣召南按得字當依史記作佩以下文大見數月佩六印証之可知鼎曷為出哉注未獲年豐之報也報字監本訛穀今改正廼令人上石立之泰山顚臣召南按後書祭祀志引此文注風俗通曰石高二丈一尺刻之曰事天以禮立身以義事父以孝成名以仁四海之内莫不為郡縣四夷八蠻咸來貢職與天無極人民蕃息天祿永得共四十五字此石立山巓即馬第伯封襌儀記所云封所始皇立石及闕在南方漢武在其北二十餘步者又山下有一石時用五車不能上因置山下為屋號五車石詳後志注下詔改元為元封宋本作改元封元年前漢書卷二十五上考證欽定四庫全書前漢書卷二十五下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注郊祀志第五下是時既滅兩粤粤人勇之乃言粤人俗鬼師古曰勇之越人名也俗鬼言其土俗尚鬼神之事而其祠皆見鬼數有効昔東甌王敬鬼夀百六十歲後世怠嫚故衰耗師古曰耗減也音火到反廼命粤巫立粤祝祠安臺無壇亦祠天神帝百鬼師古曰天帝之神及百鬼而以雞卜李竒曰持雞骨卜如䑕卜上信之粤祠雞卜自此始用師古曰言國家始用公孫卿曰僊人可見上往常遽以故不見師古曰遽速也音其庶反今陛下可為館如緱氏城師古曰依其制度也置脯棗神人宜可致且僊人好樓居於是上令長安則作飛㢘桂館師古曰飛㢘館及桂館二名也甘泉則作益夀延夀館師古曰益夀延夀二館名使卿持節設具而候神人廼作通天臺師古曰漢舊儀云臺髙三十丈望見長安城置祠具其下將招來神僊之屬於是甘泉更置前殿始廣諸宫室夏有芝生甘泉殿房内中天子為塞河興通天若有光云師古曰為塞河及造通天臺而有神光之應故赦天下也迺下詔甘泉房中生芝九莖赦天下無令復作宋祁曰南本云迺下詔字下無十二字其明年伐朝鮮夏旱公孫卿曰黄帝時封則天旱乾封三年師古曰三歲不雨暴所封之土令乾也上迺下詔天旱意乾封乎鄭氏曰言適新封則致旱天欲乾我所封乎其令天下尊祠靈星焉明年上郊雍五畤通回中道遂北出蕭關歴獨鹿鳴澤師古曰解並在武紀自西河歸幸河東祠后土明年冬上廵南郡至江陵而東登禮􅈞之天柱山號曰南嶽師古曰􅈞廬江縣天柱山在焉武帝以天柱山為南嶽􅈞音濳浮江自潯陽出樅陽師古曰摐音千庸反過彭蠡禮其名山川北至琅邪竝海上師古曰竝音步浪反上音時掌反四月至奉髙修封焉初天子封泰山泰山東北阯古時有明堂處處險不敞師古曰言其阻阸不顯敞上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黄帝時明堂圖師古曰公玉姓也帶名也吕氏春秋齊有公玉丹此蓋其舊族而説者讀公玉為宿非也單姓玉者後漢司徒玉況自音宿耳明堂中有一殿四面無壁以茅蓋通水水圜宫垣師古曰圜繞也為復道上有樓從西南入師古曰復讀曰複名曰昆侖天子從之入以拜祀上帝焉於是上令奉髙作明堂汶上如帶圖師古曰汶水名也出琅邪朱虚作明堂於汶水之上也帶圖公玉帶所上明堂圖汶音問及是歲脩封則祠泰一五帝於明堂上坐師古曰坐音才卧反合髙皇帝祠坐對之服䖍曰漢是時未以髙祖時配天故言對光武以來乃配之劉敞曰按王莾奏事文帝祠泰一已用髙祖配矣何謂未乎宋祁曰注文髙祖時配天時字當删祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮畢尞堂下而上師古曰尞古燎字劉敝曰而上字屬下句又上泰山自有祕祠其顛而泰山下祠五帝各如其方黄帝并赤帝所師古曰與赤帝同處有司侍祠焉山上舉火下悉應之還幸甘泉郊泰畤春幸汾隂祠后土宋祁曰姚本春字上有明年二字明年幸泰山以十一月甲子朔旦冬至日祀上帝於明堂後每修封宋祈曰越本每作毋新本無後字但云毋修封其贊饗曰天増授皇帝泰元神策周而復始皇帝敬拜泰一師古曰自此以上贊祝者辭東至海上考入海及方士求神者莫驗然益遣幾遇之師古曰益多也幾讀曰冀言更遣人求之冀必遇也乙酉栢梁災十二月甲午朔上親禪髙里師古曰髙里山名解在武紀祠后土臨勃海將㠯望祀蓬萊之屬幾至殊庭焉師古曰殊庭蓬萊中僊人庭也幾讀曰冀上還以栢梁災故受計甘泉公孫卿曰黄帝就青靈臺十二日燒師古曰就成也造臺適成經十二日即遇火燒黄帝乃治明庭明庭甘泉也方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸勇之廼曰粤俗有火災復起屋必以大用勝服之於是作建章宫度為千門萬戸前殿度髙未央師古曰度並音大各反其東則鳳闕髙二十餘丈師古曰三輔故事云其闕圜上有銅鳳凰其西則商中數十里虎圈如淳曰商中商庭也師古曰商金也於序在秋故謂西方之庭為商庭言廣數十里於菟亦西方之獸故於此置其圈也其北治大池漸臺髙二十餘丈名曰泰液師古曰漸浸也臺在池中為水所浸故曰漸臺一音子㢘反三輔黄圖或為瀐字瀐亦浸耳宋祁曰泰液淳化本作泰浸予據昭紀黄鵠下建章宫太液池無泰浸也池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬師古曰三輔故事云池北岸有石魚長二丈髙五尺西岸有石龜三枚長六尺其南有玉堂璧門大鳥之屬師古曰立大鳥象也立神明臺井幹樓髙五十丈輦道相屬焉師古曰漢宫閣疏云神明臺髙五十丈上有九室恒置九天道士百人然則神明井幹俱髙五十丈也井幹樓積木而髙為樓若井幹之形也井幹者井上木攔也其形或四角或八角張衡西京賦云井幹疊而百層即謂此樓也幹或作翰其義並同宋祁曰邵本翰作韓夏漢改厯以正月為歲首而色上黄官更印章以五字師古曰解在武紀因為太初元年是歲西伐大宛蝗大起丁夫人雒陽虞初等應劭曰丁夫人其先丁復本越人封陽都侯夫人其後以詛軍為功韋昭曰丁姓夫人名也以方祠詛匃奴大宛焉明年有司言雍五畤無牢孰具芬芳不備廼令祠官進畤犢牢具色食所勝孟康曰若火勝金則祠赤帝以白牲也而以木寓馬代駒云宋祁曰南本無木馬二字及諸名山川用駒者悉以木寓馬代獨行過親祠廼用駒它禮如故明年東廵海上考神僊之屬未有驗者方士有言黄帝時為五城十二樓應劭曰昆侖𤣥圃五城十二樓僊人之所常居以候神人於執期鄭氏曰地名也名曰迎年師古曰迎年若云祈年上許作之如方名曰明年師古曰言明其得延年也上親禮祠上犢黄焉公玉帶曰黄帝時雖封泰山然風后封鉅岐伯令黄帝封東泰山韋昭曰風后封鉅岐伯皆黄帝臣也臣瓚曰東泰山在琅邪朱虚界中有小泰山是禪凡山師古曰凡山在朱虛縣見地理志也宋祁曰也字當删合符然後不死天子既令設祠具至東泰山東泰山卑小不稱其聲廼令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前宋祁曰南本修皆作脩而加禪祠石閭石閭者在泰山下阯南方師古曰下基之南面方士言僊人閭也故上親禪焉其後五年復至泰山修封還過祭恒山自封泰山後十三歲而周徧於五嶽四瀆矣後五年復至泰山修封東幸琅邪禮日成山登之罘浮大海用事八神延年師古曰解並在武紀延年即上所謂迎年者又祠神人於交門宫若有鄉坐拜者云師古曰如有神人景象嚮祠坐而拜也事具在武紀鄉讀與嚮同後五年上復修封于泰山東游東萊臨大海是歲雍縣無雲如靁者三師古曰靁古雷字空有雷聲也或如虹氣蒼黄若飛鳥集棫陽宫南師古曰棫音域聲聞四百里隕石二黑如黳有司以為美祥以薦宗廟而方士之候神入海求蓬萊者終無驗公孫卿猶㠯大人之迹為解師古曰言見大人之跡以自解説也天子猶羈縻不絶師古曰羈縻繫聯之意馬絡頭曰羈也牛靷曰縻幾遇其真師古曰幾讀曰冀諸所興如薄忌泰一及三一㝠羊馬行赤星五牀寛舒之祠宫李竒曰皆祠名以歲時致禮凡六祠皆大祝領之至如八神諸明年凡山它名祠行過則祠去則已方士所興祠各自主其人終則已祠官不主它祠皆如故甘泉泰一汾隂后土三年親郊祠而泰山五年一修封武帝凡五修封昭帝即位富於春秋未嘗親廵祭云宣帝即位由武帝正統興故立三年尊孝武廟為世宗行所廵狩郡國皆立廟告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興于殿旁有鳥如白鶴前赤後青神光又興于房中如燭狀廣川國世宗廟殿上有鐘音門戸大開夜有光殿上盡明上廼下詔赦天下時大將軍霍光輔政上共已正南面師古曰共讀曰恭非宗廟之祠不出十二年廼下詔曰蓋聞天子尊事天地脩祀山川古今通禮也閒者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齊祠之禮頗作詩歌其三月幸河東祠后土有神爵集改元為神爵制詔太常夫江海百川之大者也今闕焉無祠其令祠官以禮為歲事師古曰言每歲常祠之以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮東嶽泰山於博中嶽泰室於嵩髙南嶽􅈞山於􅈞師古曰􅈞與濳同也西嶽華山於華隂北嶽常山於上曲陽師古曰上曲陽常山郡之縣也河於臨晉師古曰馮翊之縣也臨河西岸江於江都師古曰廣陵之縣也淮於平氏師古曰南陽之縣也濟於臨邑界中師古曰東郡之縣也皆使者持節侍祠唯泰山與河歲五祠江水四餘皆一禱而三祠云時南郡獲白虎獻其皮牙爪上為立祠又㠯方士言為隨侯劍寳玉寳璧周康寳鼎立四祠於未央宫中劉敞曰四祠隨侯珠一也劍實即斬蛇劍二也玉寳璧即受命寳和氏璧三也三物皆漢天子世傳者并周康寳鼎為四周康寳鼎似汾上所獲鼎也又祠太室山於即墨三戸山於下密師古曰即墨下密皆膠東之縣也祠天封苑火井於鴻門如淳曰地理志西河鴻門縣有天封苑火井祠火從地中出又立歲星辰星太白熒惑南斗祠於長安城旁宋祁曰南本無城字又祠叄山八神於曲城師古曰東萊之縣也蓬山石社石鼓於臨朐師古曰臨朐齊郡縣也胊音劬地理志蓬山作逹山也之罘山於腄成山於不夜萊山於黄應劭曰腄音甀晉灼曰腄不夜黄縣皆屬東萊師古曰腄音丈瑞反成山祠日萊山祠月又祠四時於琅邪蚩尤於夀良師古曰東郡之縣也京師近縣鄠則有勞谷五牀山日月五帝僊人玉女祠雲陽有徑路神祠祭休屠王也師古曰休屠匈奴王號也徑路神本匈奴之祠也休音許虯反屠音除又立五龍山僊人祠及黄帝天神帝原水凡四祠於膚施師古曰膚施上郡之縣也或言益州有金馬碧雞之神如淳曰金形似馬碧形似雞可醮祭而致於是遣諫大夫王襃使持節而求之大夫劉更生獻淮南枕中洪寳苑祕之方師古曰洪大也苑祕者言祕術之苑囿也令尚方鑄作事不驗更生坐論京兆尹張敞上疏諫曰願明主時忘車馬之好斥逺方士之虚語師古曰逺音于萬反游心帝王之術太平庶幾可興也後尚方待詔皆罷是時美陽得鼎獻之師古曰美陽扶風之縣也下有司議多以為宜薦見宗廟如元鼎時故事張敞好古文字按鼎銘勒而上議曰臣聞周祖始乎后稷后稷封于斄師古曰斄讀與邰同今武功故城是公劉發迹於豳師古曰今豳州是也大王建國於􅑢梁師古曰梁山在岐山之東九嵕之西非夏陽之梁山也􅑢古岐字文武興於酆鎬師古曰酆今長安城西豐水上也鎬在昆明池北由此言之則􅑢梁酆鎬之間周舊居也固宜有宗廟壇場祭祠之臧今鼎出于􅑢東中有刻書曰王命尸臣官此栒邑師古曰尸臣主事之臣也栒邑即豳地是也栒音荀賜爾旂鸞黼黻琱戈師古曰交龍為旂鸞謂有鸞之車也黼黻冕服也琱戈刻鏤之戈也琱與凋同尸臣拜手稽首曰敢對揚天子丕顯休命師古曰拜手首至於手也臣愚不足以迹古文師古曰尋其文迹竊以傳記言之此鼎殆周之所以襃賜大臣大臣子孫刻銘其先功臧之于宫廟也昔寳鼎之出於汾脽也河東太守以聞詔曰朕廵祭后土祈為百姓䝉豐年師古曰為音于偽反今榖嗛未報師古曰嗛少意也言榖稼尚少未獲豐年也嗛音苦簟反鼎焉為出哉博問耆老意舊臧與服䖍曰言鼎豈舊臧於此地師古曰與讀曰歟誠欲考得事實也有司驗脽上非舊臧處鼎大八尺一寸髙三尺六寸殊異於衆鼎今此鼎細小又有款識師古曰款刻也識記也音式志反不宜薦見於宗廟制曰京兆尹議是上自幸河東之明年正月鳯凰集祋祤師古曰祋祤馮翊之縣也祋音丁活反又丁外反祤音況矩反宋祁曰況矩反姚本作王矩反於所集處得玉寳宋祁曰姚本所作是起步夀宫廼下詔赦天下後閒歲鳳皇神爵甘露降集京師師古曰閒歲隔一歲也赦天下其冬鳳皇集上林廼作鳳皇殿㠯荅嘉瑞師古曰荅應也明年正月復幸甘泉郊泰畤改元曰五鳳明年幸雍祠五畤其明年春幸河東祠后土赦天下後間歲改元為甘露正月上幸甘泉郊泰畤其夏黄龍見新豐建章未央長樂宫鐘虡銅人皆生毛長一寸所師古曰虡神獸名也縣鐘之木刻飾為之因名曰虡也時以為美祥後閒歲正月上郊泰畤因朝單于於甘泉宫後閒歲改元為黄龍正月復幸甘泉郊泰畤又朝單于於甘泉宫至冬而崩鳳皇下郡國凡五十餘所元帝即位遵舊儀閒歲正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百戸牛酒師古曰言有時如此不常然也或賜爵赦罪人元帝好儒貢禹韋𤣥成匡衡等相繼為公卿禹建言漢家宗廟祭祀多不應古禮上是其言後韋𤣥成為丞相議罷郡國廟自太上皇孝恵帝諸園寢廟皆罷後元帝寢疾夢神靈譴罷諸廟祠上遂復焉後或罷或復至哀平不定語在韋𤣥成傳成帝初即位丞相衡御史大夫譚師古曰衡匡衡譚張譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即隂之象也師古曰祭地曰瘞薶故云瘞地也即就也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宫即於雲陽立泰畤祭於宫南今行常幸長安宋祁曰淳化本無行字郊見皇天反北之泰隂祠后土反東之少陽事與古制殊又至雲陽行谿谷中阸陜且百里汾隂則渡大川有風波舟楫之危師古曰楫音集其字從木宋祁曰建本楫音即涉反此云音集疑非是皆非聖主所宜數乘郡縣治道共張吏民困苦師古曰共讀曰供音居用反張音竹亮反下皆類此百官煩費勞所保之民行危險之地師古曰保養也難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天随王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與羣臣議定奏可大司馬車騎將軍許嘉等八人以為所從來久逺宜如故右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴於太壇祭天也瘞薶於太折祭地也韋昭曰太折謂為壇於昭晰地也師古曰折曲也言方澤之形四曲折也兆於南郊所以定天位也鄧展曰除地為營埒有形兆也祭地於太折在北郊就隂位也郊處各在聖王所都之南北書曰越三日丁巳用牲于郊牛二師古曰周書洛誥之辭周公加牲告徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所饗宜徙就正陽大隂之處違俗復古循聖制定天位如禮便於是衡譚奏議曰陛下聖徳怱明上通師古曰怱與聰同承天之大典覽羣下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從衆則合於天心宋祁曰南本作合於天下心故洪範曰三人占則從二人言師古曰洪範周書也言少從多之義也論當往古宜於萬民則依而從之師古曰論議也音來頓反違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著於經傳同於上世便於吏民八人不按經蓺考古制而以為不宜無法之議難以定吉凶太誓曰正稽古立功立事可以永年丕天之大律師古曰今文泰誓周書也稽考也永長也丕奉也律法也言正考古道而立事則可長年享有天下是則奉天之大法也詩曰毋曰髙髙在上陟降厥士日監在兹師古曰詩周頌敬之詩也陟升也士事也言無謂天之髙而又髙逺在上而不加敬天乃上下升降日日監觀於此視人之所為者耳言天之日監王者之處也又曰廼眷西顧此維予宅師古曰大雅皇矣之詩也宅居也言天眷然西顧以周國為居也商紂在東故謂周為西也言天以文王之都為居也宜於長安定南北郊為萬世基天子從之既定衡言甘泉泰畤紫壇八觚宣通象八方服䖍曰八觚如今社壇也師古曰觚角也五帝壇周環其下又有羣神之壇以尚書禋六宗望山川徧羣神之義紫壇有文章采鏤黼黻之飾及玉女樂師古曰漢舊儀云祭天用六綵綺席六重用玉几玉飾器凡七十女樂即禮樂志所云使童男童女俱歌也石壇僊人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊柴饗帝之義埽地而祭上質也歌大吕舞雲門以竢天神歌太蔟舞咸池以竢地祗師古曰此周禮也大吕合於黄鐘黄鐘陽聲之首也雲門黄帝樂也太蔟陽聲次二者也咸池堯樂也其牲用犢其席藁稭其器陶匏師古曰陶瓦器匏瓠也稭音戞皆因天地之性貴誠上質不敢修其文也以為神祗功徳至大雖修精微而備庶物猶不足以報功唯至誠為可故上質不飾以章天徳紫壇偽飾女樂鸞路騂駒龍馬石壇之屬宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之師古曰異世謂前代今雍鄜密上下畤晉灼曰秦文公宣公所立畤也本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黄黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立師古曰謂髙祖之初禮儀未定不宜復修天子皆從焉及陳寳祠由是皆罷明年上始祀南郊赦奉郊之縣及中都官耐罪囚徒師古曰中都官京師諸官府也是歲衡譚復條奏長安厨官縣官給祠郡國候神方士使者所祠凡六百八十三所其二百八所應禮及疑無明文可奉祠如故其餘四百七十五所不應禮或復重師古曰復音扶目反重音丈庸反請皆罷奏可本雍舊祠二百三所唯山川諸星十五所為應禮云若諸布諸嚴諸逐皆罷杜主有五祠置其一又罷髙祖所立梁晉秦荆巫九天南山萊中之屬及孝文渭陽孝武薄忌泰一三一黄帝㝠羊馬行泰一臯山山君武夷夏后啟母石宋祁曰本無石字萬萬里沙宋祁曰姚本無一萬字八神延年之屬及孝宣參山蓬山之罘成山萊山四時蚩尤勞谷五牀僊人玉女徑路黄帝天神原水之屬皆罷候神宋祁曰參山予據孝宣祠參山八神於曲城蓬山於臨朐與此相應不然太山自在五嶽何可罷之方士使者副佐本草待詔七十餘人皆歸家師古曰本草待詔謂以方藥本草而待詔者明年匡衡坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壞甘泉竹宫折拔畤中樹木十圍以上百餘天子異之以問劉向對曰宋祁曰向字下當更有向字家人尚不欲絶種祠師古曰家人謂庶人之家也種祠繼嗣所傳祠也況於國之神寳舊畤且甘泉汾隂及雍五畤始立皆有神祇感應然後營之非茍而已也武宣之世奉此三神禮敬敕備師古曰敕整也神光尤著祖宗所立神祇舊位誠未易動及陳寳祠自秦文公至今七百餘歲矣漢興世世常來光色赤黄長四五丈直祠而息音聲砰隠野雞皆雊師古曰直當也息止也當祠處而止也砰音普萌反每見雍太祝祠以太牢遣候者乘傳馳詣行在所師古曰報神之來也傳音丁戀反以為福祥髙祖時五來文帝二十六來武帝七十五來宣帝二十五來初元元年以來亦二十來此陽氣舊祠也及漢宗廟之禮不得擅議皆祖宗之君與賢臣所共定古今異制經無明文至尊至重難以疑説正也前始納貢禹之議後人相因多所動揺易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之師古曰恨悔也後上以無繼嗣故令皇太后詔有司曰宋祁曰令字下疑有白字蓋聞王者承事天地交接泰一尊莫著於祭祀孝武皇帝大聖通明始建上下之祀師古曰上下謂天地營泰畤于甘泉定后土于汾隂而神祗安之饗國長久子孫蕃滋師古曰蕃音扶元反累世遵業福流于今今皇帝寛仁孝順奉循聖緒靡有大愆而久無繼嗣思其咎職師古曰職主也咎過主於此也殆在徙南北郊違先帝之制改神祗舊位失天地之心以妨繼嗣之福春秋六十未見皇孫師古曰皇太后自謂食不甘味寢不安席朕甚悼焉春秋大復古善順祀師古曰以復古為大以順祀為善也其復甘泉泰畤汾隂后土如故及雍五畤陳寳祠在陳倉者天子復親郊禮如前又復長安雍及郡國祠著明者且半成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中長安城旁費用甚多然無大貴盛者谷永説上曰臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類師古曰罔猶蔽宋祁曰注末當添也字諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠宋祁曰祠當作祀及言世有僊人服食不終之藥䢣興輕舉如淳曰䢣逺也興舉也師古曰䢣古遥字也興起也謂起而逺去也登遐倒景如淳曰在日月之上反從下照故其景倒師古曰遐亦逺也宋祁曰注文反字上當添日月二字覽觀縣圃浮游蓬萊李竒曰崑崙九成上有縣圃縣圃之上即閶闔天門耕耘五徳朝種暮穫晉灼曰翼氏風角五徳東方甲南方丙西方庚北方壬中央戊種五色禾於此地而耕耘也與山石無極師古曰言獲長夀比於山石無窮也黄冶變化晉灼曰黄者鑄黄金也道家言冶丹砂令變化可鑄作黄金也堅氷淖溺晉灼曰方士詐以藥石若陷氷丸投之氷上氷即消液因假為神仙道使然也或曰謂冶金令可餌也師古曰或説非也淖濡甚也音女教反化色五倉之術者李竒曰思身中冇五色腹中有五倉神五色存則不死五倉存則不饑皆姦人惑衆挾左道懷詐偽以欺罔世主師古曰左道邪僻之道非正義也聽其言洋洋滿耳若將可遇師古曰洋洋美盛之貌也洋音羊又音祥求之盪盪如係風捕景終不可得師古曰盪盪空曠之貌也盪音蕩是以明王距而不聽聖人絶而不語師古曰謂孔子不語怪神昔周史萇𢎞欲以鬼神之術輔尊靈王㑹朝諸侯而周室愈微諸侯愈叛楚懷王隆祭祀事鬼神欲以獲福助郤秦師師古曰郤退音丘畧反而兵挫地削身辱國危秦始皇初并天下甘心於神僊之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以僊人黄冶祭祠事鬼使物入海求僊采藥貴幸賞賜累千金大尤尊盛至妻公主爵位重絫震動海内師古曰絫古累字元鼎元封之際燕齊之間方士瞋目㧖掔言有神僊祭祠致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜師古曰詐得謂主上得其詐偽之情至初元中有天淵玉女鉅鹿神人轑陽侯師張宗之姦紛紛復起師古曰轑陽侯江仁也元帝時坐使家丞上印綬随宗學仙免官轑音遼夫周秦之末三五之隆師古曰三謂三皇五謂五帝也劉奉世曰周秦之末三五之隆語有害而理未通疑有誤三五似指三世五世而言謂文武之時也尋上文可見宋祁曰顔注三五之隆疑非是余謂五字當作主蓋指漢三主耳新垣平事則文帝時也元鼎元封則武帝時也初元則元帝時也指異代則曰周秦之末於今世則曰三主之隆文意較然明甚師古於漢書他所是正者甚多而不察於此所未諭也已嘗専意散財厚爵祿竦精神舉天下以求之矣曠日經年靡有毫釐之驗足以揆今經曰享多儀儀不及物惟曰不享師古曰周書洛誥之辭也言祭享之道唯以絜誠若多其容儀而不及禮物則不為神所享也論語説曰子不語怪神師古曰説謂論語之説也唯陛下距絶此類毋令姦人有以窺朝者上善其言後成都侯王商為大司馬衞將軍輔政杜鄴説商曰東鄰殺牛不如西鄰之禴祭師古曰此易既濟九五爻辭也東鄰謂商紂也西鄰周文王也禴祭謂禴煑新菜以祭言祭祀之道莫盛修徳故紂之牛牲不如文王之蘋藻也禴音籥言奉天之道貴以誠質大得民心也行穢祀豐猶不䝉祐徳修薦薄吉必大來古者壇場有常處尞禋有常用師古曰尞古燎字贊見有常禮犧牲玉帛雖備而財不匱車輿臣役雖動而用不勞是故每舉其禮助者歡説師古曰助謂助祭也説讀曰悦大路所歴黎元不知師古曰大路天子祭天所乘之車也黎元不知言無徭費不勞於下也今甘泉河東天地郊祀咸失方位違隂陽之宜及雍五畤皆曠逺奉尊之役休而復起繕治共張無解己時皇天著象殆可略知前上甘泉先敺失道師古曰敺與驅字同禮月之夕奉引復迷韋昭曰奉弓前導引車祠后土還臨河當渡疾風起波船不可御又雍大雨壞平陽宫垣廼三月甲子震電災林光宫門孟康曰甘泉一名林光師古曰林光秦離宫名也漢又於其旁起甘泉宫非一名也祥瑞未著咎徵仍臻迹三郡所奏皆有變故師古曰迹謂觀其事迹也不荅不饗何以甚此師古曰不荅不當天意不饗不為天所饗也詩曰率由舊章師古曰大雅假樂之詩也率循也由用也循用舊典之文章也舊章先王法度文王以之交神于祀子孫千億宜如異時公卿之議復還長安南北郊後數年成帝崩皇太后詔有司曰皇帝即位思順天心遵經義定郊禮天下説憙師古曰説讀曰悦懼未有皇孫故復甘泉泰畤汾隂后土庶㡬獲福皇帝恨難之卒未得其祐其復南北郊長安如故以順皇帝之意也哀帝即位寢疾博徵方術士京師諸縣皆有侍祠使者盡復前世所常興諸神祠官凡七百餘所一歲三萬七千祠云明年復令太皇太后詔有司曰皇帝孝順奉承聖業靡有解怠師古曰解讀曰懈而久疾未瘳夙夜唯思殆繼體之君不宜改作其復甘泉泰畤汾隂后土祠如故上亦不能親至遣有司行事而禮祠焉後三年哀帝崩平帝元始五年大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天師古曰孝經載孔子之言王者尊其考欲以配天縁考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於明堂以配上帝禮記天子祭天地及山川歲徧春秋榖梁傳以十二月下辛卜正月上辛郊師古曰豫卜郊之日髙皇帝受命因雍四畤起北畤而備五帝未共天地之祀師古曰共讀曰恭孝文十六年用新垣平初起渭陽五帝廟祭泰一地祗以太祖髙皇帝配日冬至祠泰一夏至祠地祗皆并祠五帝而共一牲宋祁曰牲景徳本作特上親郊拜後平伏誅廼不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不荅也於是元鼎四年十一月甲子始立后土祠於汾隂或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉三歲一郊與雍更祠師古曰更音工衡反亦以髙祖配不歲事天皆未應古制建始元年徙甘泉泰畤河東后土於長安南北郊永始元年三月㠯未有皇孫復甘泉河東祠綏和二年㠯卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾隂祠竟復無福臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆大中大夫朱陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀師古曰墬古地字也下皆類此樂有别有合其合樂曰㠯六律六鍾五聲八音六舞大合樂祀天神祭墬祇祀四望祭山川享先妣先祖師古曰此周禮春官大司樂之職也六律合陽聲者六鍾以六律六鍾之均也五聲宫商角徵羽八音金石􅁝竹匏土革木六舞雲門咸池大韶大夏大濩大武也大合樂者徧作之也先妣姜嫄也先祖先王先公也凡六樂奏六歌而天墬神祗之物皆至師古曰謂一變而致羽物及川澤之祗二變而致羸物及山林之祗三變而致鱗物及丘陵之祗四變而致毛物及墳衍之祗五變而致介物及地祗六變而致象物及天神四望蓋謂日月星海也三光髙而不可得親海廣大無限界故其樂同祀天則天文從祭墬則墬理從三光天文也山川地理也天地合祭先祖配天先妣配墬其誼一也天墬合精夫婦判合祭天南郊則㠯墬配一體之誼也天墬位皆南鄉同席師古曰鄉讀曰嚮其下並同墬在東共牢而食髙帝髙后配于壇上西鄉后在北亦同席共牢牲用繭栗師古曰謂牛角如繭及栗者牛之小也𤣥酒陶匏禮記曰天子籍田千畮㠯事天墬師古曰畮古畝字繇是言之宜有黍稷師古曰繇讀與由同天地用牲一燔尞瘞薶用牲一髙帝髙后用牲一天用牲左及黍稷燔尞南郊墬用牲右及黍稷瘞于北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祇嘉享萬福降輯師古曰輯與集同此天墬合祀㠯祖妣配者也其别樂曰宋祁曰邵本無别字冬日至於墬上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則墬祗皆出師古曰此亦春官大司樂之職也天神之樂圜鍾為宫黄鍾為角太蔟為徵姑洗為羽雷鼓雷鼗孤竹之管雲和之琴瑟雲門之舞地祗之樂函鍾為宫太蔟為角姑洗為徵南吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞先奏是樂以致其神禮之以玉然後合樂而祭天墬有常位不得常合此其各特祀者也隂陽之别於日冬夏至其㑹也㠯孟春正月上辛若丁天子親合祀天墬于南郊㠯髙帝髙后配隂陽有離合易曰分隂分陽迭用柔剛師古曰易説卦之辭也陽為剛隂為柔隂陽既分則剛柔迭用也迭互也音大結反以日冬至使有司奉祠南郊髙帝配而望羣陽日夏至使有司奉祭北郊髙后配而望羣隂皆㠯助致微氣通道幽弱師古曰道讀曰導當此之時后不省方師古曰謂冬夏日至之時后君也方常也不視常務故天子不親而遣有司所㠯正承天順地宋祁曰一本作承順天地復聖王之制顯太祖之功也渭陽祠勿復修羣望未悉定定復奏奏可三十餘年間天墬之祠五徙焉後莽又奏言書曰類於上帝禋于六宗師古曰虞書舜典也並已解於上歐陽大小夏侯三家説六宗皆曰上不及天下不及墬旁不及四方在六者之間助隂陽變化實一而名六名實不相應禮記祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火不相逮靁風不相誖山澤通氣然後能變化既成萬物也師古曰乾為父坤為母震為長男巽為長女坎為中男離為中女艮為少男兑為少女故云六子也水火坎離也靁風震巽也山澤艮兑也逮及誖亂也既盡也靁古雷字也誖音布内反臣前奏徙甘泉泰畤汾隂后土皆復于南北郊謹按周官兆五帝于四郊山川各因其方師古曰春官小宗伯之職也兆謂為壇之營域也五帝於四郊謂青帝於東郊赤帝及黄帝於南郊白帝於西郊黑帝於北郊也各因其方謂順其所在也今五帝兆居在雍五畤不合於古又日月靁風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宫義和歆等八十九人議皆曰天子父事天母事墬今稱天神曰皇天上帝泰一兆曰泰畤而稱墬祗曰后土與中央黄靈同又兆北郊未有尊稱宜令墬祗稱皇墬后祗兆曰廣畤易曰方㠯類聚物㠯羣分師古曰易上繫之辭也方謂所向之地分羣神㠯類相從為五部兆天墬之别神中央帝黄靈后土畤及日廟北辰北斗填星中宿中宫于長安城之未墬兆東方帝太昊青靈勾芒畤及靁公風伯廟歲星東宿東宫于東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宫于南郊兆西方帝少皥白靈蓐收畤及太白星西宿西宫于西郊兆北方帝顓頊黑靈𤣥㝠畤及月廟雨師廟辰星北宿北宫于北郊兆劉敞曰兆字衍奏可於是長安旁諸廟兆畤甚盛矣莽又言帝王建立社稷百王不易社者土也宗廟王者所居稷者百榖之主所㠯奉宗廟共粢盛師古曰共讀與供同人所食㠯生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土師古曰大雅緜之詩也冢大也土土神謂大社也又曰㠯御田祖㠯祈甘雨師古曰小雅甫田之詩也田祖稷神也言設樂以御祭於神為農求甘雨也禮記曰唯祭宗廟社稷為越紼而行事李竒曰引棺車謂之紼當祭天地五祀則越紼而行事不以私喪廢公祀師古曰紼引車索也音弗聖漢興禮儀稍定已有官社未立官稷臣瓚曰髙帝除秦社稷立漢社稷禮所謂太社也時又立官社配以夏禹所謂王社也見漢祀令而未立官稷至此始立之世祖中興不立官稷相承至今也遂於官社後立官稷㠯夏禹配食官社后稷配食官稷稷種榖樹師古曰榖樹楮樹也其子類榖故於稷種徐州牧歲貢五色土各一斗莽簒位二年興神僊事㠯方士蘇樂言起八風臺於宫中臺成萬金師古曰費直萬金也作樂其上順風作液湯如淳曰蓺文志有液湯經其義未聞也又種五梁禾於殿中師古曰五色禾也谷永所謂耕耘五徳也各順色置其方面先䰞鶴毒冒犀王二十餘物漬種師古曰䰞古煑字也古髓字也謂䰞取汁以漬穀子也毒音代冒音莫内反宋祁曰景本作􅀈别本並從左與此本不同計粟斛成一金言此黄帝榖僊之術也㠯樂為黄門郎令主之莽遂崈鬼神淫祀師古曰崈古崇字至其末年自天地六宗㠯下至諸小鬼神凡千七百所用三牲鳥獸三千餘種後不能備廼以雞當鶩鴈犬當麋鹿數下詔自以當僊語在其傳贊曰漢興之初庶事草創唯一叔孫生略定朝廷之儀若廼正朔服色郊望之事數世猶未章焉至于孝文始㠯夏郊而張蒼據水徳公孫臣賈誼更以為土徳卒不能明孝武之世文章為盛太初改制而兒寛司馬遷等猶從臣誼之言李竒曰公孫臣賈誼服色數度遂順黄徳彼以五徳之傳從所不勝服䖍曰傳音亭傳之傳五帝相承代常以金木水火相勝之法若火滅金便以火代金師古曰𫝊音張戀反秦在水徳故謂漢據土而克之劉向父子㠯為帝出于震故包羲氏始受木徳師古曰包讀曰庖其後㠯母傳子終而復始自神農黄帝下歴唐虞三代而漢得火焉故髙祖始起神母夜號著赤帝之符旗章遂赤自得天統矣鄧展曰向父子雖有此議時不施行至光武建武二年乃用火徳色尚赤耳音共工氏㠯水徳間于木火師古曰共讀曰龔間音工莧反與秦同運非其次序故皆不永由是言之祖宗之制蓋有自然之應順時宜矣究觀方士祠官之變谷永之言不亦正乎不亦正乎宋祁曰南本無下一句前漢書卷二十五下前漢書卷二十五下考證郊祀志下長安則作飛亷桂館甘泉則作益夀延夀館臣召南按館字封禪書俱作觀又通天臺封禪書作通天莖臺乃下詔甘泉房中生芝九莖赦天下無令復作按監本及别本乃下詔之下無甘泉房中生芝九莖八字赦天下之下無無令復作四字今從宋本補令奉髙作明堂汶上如帶圖注汶水名也出琅邪朱虚作明堂于汶水之上也臣召南按顏注汶水非也胡三省曰地理志明堂在奉髙縣西南四里即禹貢浮汶逹濟之汶若琅邪汶水入濰而入海非立明堂處上親禪髙里注髙里山名解在武紀監本脱解在武紀四字從宋本添其西則商中數十里虎圈臣召南按商中封禪書作唐中通鑑從史記諸所興如薄忌泰一云云注李竒曰皆祠名監本訛皆同名今改正南嶽灊山於潛臣召南按南嶽衡山也自元封五年廵南郡至江陵而東登禮潛之天柱山號曰南嶽於是南嶽之名移於灊山而長沙湘南之衡山自古稱南嶽者反無祠矣餘皆一禱而三祠云臣召南按歐陽脩集古錄引漢西岳華山碑云孝武皇帝脩封禪之禮廵省五岳立祠其下宫曰集靈宫殿曰存僊殿門曰望僊門中宗之世使者持節歳一禱而三祠可為此文確証但又云所謂集靈宫者他書皆不見惟見此碑則失考耳地理志華隂下自注集靈宫武帝起非明文乎為隨侯劍寳玉云云劉敞曰四祠隨侯珠一也臣浩按劉敞注則古本隨侯下有珠字後來本並脱耳注周康寳鼎似汾上所獲鼎也臣召南按劉敞解珠劍璧三物並確惟此句可疑上文言汾隂寳鼎明曰鼎大異于衆鼎文鏤無欵識故但云寳鼎不云周康寳鼎也且四物祠于未央宫中並是宫中寳物若寳鼎則已迎至甘泉祀天之處不得于宫中立祠又後文張敞曰昔寳鼎出于汾脽有司騐脽上非舊藏處則所謂寳鼎者正以不知其來處為神竒安得指實以周康乎敞説未確又祠太室山于即墨三户山于下宻臣召南按太室山名同中岳嵩髙三戸山名同三户津山川固有同名異地者但以地理志証之此二山名俱誤膠東國即墨有天室山祠非太室山也下密有三石山祠非三户山也玩顔注云即墨下密皆膠東之縣則唐初本必猶未訛行谿谷中阸陜且百里臣照按阸陿宋本監本並作阸陜今仍之然陿陜無通用之義究是誤字舞咸池以竢地祗注咸池堯樂也臣召南按顔注誤禮樂志明曰黄帝作咸池安得云堯樂乎雍舊祠二百三所臣召南按地理志右扶風雍有五畤太昊黄帝以下祠三百三所彼作三百此作二百未知孰誤南山萊中之屬臣召南按萊中應作秦中宋本監本並誤也上文髙祖時南山巫祠南山秦中秦中者二世皇帝也注張晏曰成帝時匡衡奏罷之正指此文若東萊郡黄縣之萊君祠㡉縣之百支萊王祠並非髙祖所立及孝宣參山注宋祁云云臣浩按參山据宋祁注則舊本作太山而祁改為參山者也今從之三五之隆師古注及劉奉世宋祁説臣召南按顔説非也宋亦太巧且元帝無求僊事未若劉奉世謂三世文帝五世武帝為確實先䰞鶴監本訛注同從宋本改正前漢書卷二十五下考證
