body:
  text: 前漢書卷七十七漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注蓋諸葛劉鄭孫母將何傳第四十七蓋寛饒字次公魏郡人也師古曰蓋音公盍反眀經為郡文學以孝廉為郎舉方正對䇿髙第遷諫大夫行郎中戸將事師古曰百官公卿表郎中令屬官有郎中車户騎三將蓋各以所主為名也戸將者主戸衞也劾奏衞將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下門寛饒坐舉奏大臣非是師古曰不以實也左遷為衞司馬蘇林曰如今衞士令也臣瓚曰漢注有衞屯司馬先是時衞司馬在部見衞尉拜謁常為衞官繇使市買師古曰繇讀與徭同寛饒視事案舊令遂揖官屬以下行衞者蘇林曰衞尉官屬也或曰詔遣使行衞者也師古曰或説非也行音下更反劉攽曰按此文錯亂本當云寛饒視事按舊令遂揖衞尉衞尉私使寛饒出寛饒以令詣官府門上謁辭文頴曰私見使而公辭尚書也蘇林曰以法詣衞尉府門上謁也師古曰文説是也尚書責問衞尉文穎曰由寛饒以法令不給使尚書責衞尉不復使司馬由是衞官不復私使候司馬候司馬不拜出先置衞輒上奏辭如淳曰天子出為天子先導先天子發故上奏辭自此正焉寛饒初拜為司馬未出殿門斷其襌衣令短離地師古曰襌音單其字從衣冠大冠帶長劒躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及嵗盡交代上臨饗罷衞卒師古曰得代當歸者也衞卒數千人皆叩頭自請願復留共更一年以報寛饒厚德師古曰更猶今言上番也音工衡反宣帝嘉之以寛饒為太中大夫使行風俗師古曰行音下更反多所稱舉貶黜奉使稱意擢為司隸校尉刺舉無所回避小大輒舉所劾奏衆多廷尉處其法半用半不用師古曰以其峻刻故有不用者公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁師古曰繇讀與傜同供傜役及為使而来者京師為清平恩侯許伯入第師古曰許伯皇太子外祖也入第者治第新成始入居之丞相御史将軍中二千石皆賀寛饒不行許伯請之廼往從西階上東鄉特坐師古曰言自尊抗無所詘也鄉讀曰嚮許伯自酌曰盖君後至寛饒曰無多酌我我廼酒狂丞相魏侯笑曰次公醒而狂何必酒也坐者皆屬目卑下之師古曰屬猶注也音立欲反下音胡稼反宋祁曰笑或作㗛酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭師古曰沐猴獮猴坐皆大笑寛饒不説卬視屋而歎師古曰説讀曰悦卬讀曰仰宋祁曰坐字下疑有者字曰羙哉然富貴無常忽則易人此如傳舍所閲多矣師古曰言如客舍行客輒過之故多所經歴也唯謹慎為得久君侯可不戒哉因起趨出劾奏長信少府以列卿而沐猴舞失禮不敬上欲罪少府許伯為謝良久上廼解寛饒為人剛直髙節志在奉公家貧奉錢月數千師古曰奉音扶用反半以給吏民為耳目言事者身為司𨽻子常歩行自戍北邉蘇林曰子自行戍不取代公廉如此然深刻喜䧟害人師古曰喜音許吏反在位及貴戚人與為怨師古曰人人皆怨之又好言事刺譏奸犯上意師古曰奸音干上以其儒者優容之然亦不得遷同列後進或至九卿寛饒自以行清能髙有益於國而為凡庸所越宋祁曰庸疑是庶字浙本作庸愈失意不快數上疏諫爭太子庶子王生髙寛饒節而非其如此予書曰明主知君絜白公正不畏彊禦師古曰彊禦彊梁而禦善者也劉奉世曰禦禁也言威力足以禁制於人爾雅云故命君以司察之位擅君以奉使之權尊官厚禄已施於君矣君宜夙夜惟思當世之務奉法宣化憂勞天下雖日有益月有功猶未足以稱職而報恩也自古之治三王之術各有制度師古曰三王謂夏殷周文質不同也今君不務循職而已宋祁曰循一作修廼欲以太古久逺之事匡拂天子師古曰匡正也拂讀曰弼數進不用難聽之語以摩切左右非所以揚令名全夀命者也方今用事之人皆明習法令言足以飾君之辭文足以成君之過君不惟蘧氏之髙蹤師古曰蘧伯玉邦無道則可卷而懐之而慕子胥之末行師古曰伍子胥知呉王不可諫而不能止自取誅滅也用不訾之軀臨不測之險師古曰訾與貲同不貲者言無貲量可以比之貴重之極也不測謂深也竊為君痛之夫君子直而不挺曲而不詘師古曰挺然直貌言雖執直道而遭遇時變與時紆曲然其本志不屈撓也挺音吐鼎反劉奉世曰此所謂内直而外曲顔説未盡宋祁曰注文遇時字疑是則字大雅云旣明且哲以保其身師古曰烝民之詩也言明智者可以自全不至亡身狂夫之言聖人擇焉唯裁省覽寛饒不納其言是時上方用刑法信任中尚書宦官寛饒奏封事曰方今聖道寖廢儒術不行師古曰寖漸也以刑餘為周召師古曰言使奄人當權軸也周謂周公旦也召謂召公奭也召讀曰邵以法律為詩書師古曰言以刑法成教化也又引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去不得其人則不居其位書奏上以寛饒怨謗終不改下其書中二千石時執金吾議以為寛饒指意欲求䄠大逆不道師古曰䄠古禪字言欲使天子傳位扵已諌大夫鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫師古曰詆毁也挫折也上書頌寛饒曰師古曰頌謂稱其羙劉奉世曰頌讀如尚書自訟之訟臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司隸校尉寛饒居不求安食不求飽師古曰論語稱孔子曰君子食無求飽居無求安故引之進有憂國之心退有死節之義上無許史之屬下無金張之託應劭曰許伯宣帝皇后父史髙宣帝外家也金金日磾也張張安世也此四家屬無不聼師古曰此説非也許氏史氏有外屬之恩金氏張氏自託在於近狎也屬讀如本字也宋祁曰注末也字當刪職在司察直道而行多仇少與師古曰仇怨讎也與黨與也上書陳國事有司劾以大辟臣幸得從大夫之後官以諌為名不敢不言上不聼遂下寛饒吏寛饒引佩刀自剄北闕下衆莫不憐之諸葛豐字少季琅邪人也以眀經為郡文學名特立剛直貢禹為御史大夫除豐為屬舉侍御史元帝擢為司隸校尉刺舉無所避京師為之語曰間何闊逢諸葛師古曰言間者何久闊不相見以逢諸葛故也上嘉其節加豐秩光祿大夫時侍中許章以外屬貴幸奢滛不奉法度賓客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章廹窘馳車去豐追之許侍中因得入宫門自歸上師古曰歸誠乞哀於天子也豐亦上奏於是收豐節司隸去節自豐始豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下不量臣能否拜為司隸校尉未有以自效復秩臣為光祿大夫官尊責重非臣所當處也又廹年嵗衰暮常恐卒填溝渠無以報厚德師古曰卒讀曰猝使論議士譏臣無補長獲素餐之名師古曰素空也言不舉職務空食祿俸而已故常願捐一旦之命不待時而斷姦臣之首縣於都市編書其罪師古曰編謂聨次簡牘也使四方明知為惡之罸然後却就斧鉞之誅師古曰却退也宋祁曰却字並注文却字疑作郤誠臣所甘心也夫以布衣之士尚猶有刎頸之交師古曰刎斷也音吻今以四海之大曽無伏節死誼之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感于天師古曰溷亦濁也音下頓反是以災變數見百姓困乏此臣下不忠之效也臣誠恥之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容師古曰如天之覆如地之載也使尚書令堯賜臣豐書曰夫司隸者刺舉不法善善惡惡非得顓之也師古曰善善襃賞善人也惡惡誅罰惡人也顓與専同免處中和宋祁曰免越本作勉劉奉世曰免當作勉順經術意恩深徳厚臣豐䪺首幸甚臣竊不勝憤懣願賜清宴師古曰懣音滿唯陛下裁幸上不許是後所言益不用豐復上書言臣聞伯竒孝而棄於親子胥忠而誅於君師古曰並觧於上隱公慈而殺於弟師古曰魯隱公欲立弟桓公為其尚少已且攝位而卒為桓公所殺宋祁曰注文為桓公所殺一本無公字叔武弟而殺於兄師古曰叔武衛成公之弟夷叔也成公避晉之難出奔陳使大夫元咺奉叔武以居守其後晉人納成公成公疑叔武而先期入叔武将沐聞君至喜捉髮走出前驅射而殺之事在左傳僖二十八年叔武弟音大計反宋祁曰注文叔武弟下疑有弟字夫以四子之行屈平之材師古曰屈平即是屈原也然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國蒙誅以顯君師古曰䝉被也臣誠願之獨恐未有云補而為衆邪所排令讒夫得遂正直之路雍塞師古曰雍讀曰壅忠臣沮心智士杜口師古曰沮壞杜塞也沮音才汝反此愚臣之所懼也豐以春夏繫治人在位多言其短上徙豐為城門校尉豐上書告光祿勲周堪光祿大夫張猛上不直豐廼制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之羙豐前為司隸校尉不順四時修法度專作苛暴宋祁曰修疑作循以獲虚威朕不忍下吏以為城門校尉不内省諸已師古曰省察也而反怨堪猛以求報舉師古曰舉言其事以報怨告案無證之辭暴揚難驗之罪毁譽恣意不顧前言師古曰前言謂舉堪猛之羙今乃更言其短是不顧也不信之大者也朕憐豐之耆老不忍加刑其免為庶人終於家劉輔河間宗室也舉孝亷為襄賁令蘇林曰賁音肥東海縣也上書言得失召見上羙其材擢為諫大夫㑹成帝欲立趙倢伃為皇后先下詔封倢伃父臨為列侯輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以災變此神明之徴應自然之占驗也昔武王周公承順天地以饗魚烏之瑞師古曰謂伐紂時有白魚赤烏之瑞也事見今文尚書然猶君臣祇懼動色相戒况於季世不蒙繼嗣之福屢受威怒之異者乎雖夙夜自責改過易行畏天命念祖業妙選有徳之世考卜窈窕之女師古曰窈窕幽閑也以承宗廟順神祗心塞天下望師古曰塞滿也子孫之祥猶恐晚暮今廼觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之師古曰市道市中之道也一曰市人及行於道路者也朝廷莫肯壹言臣竊傷心自念得以同姓㧞擢尸祿不忠汚辱諫爭之官不敢不盡死唯陛下深察書奏上使侍御史收縛輔繫掖庭祕獄師古曰漢書舊儀掖庭詔獄令丞宦者為之主理婦人女官也羣臣莫知其故於是中朝左將軍辛慶忌右將軍廉褒光禄勲師丹太中大夫谷永孟康曰中朝内朝也大司馬左右前後將軍侍中常侍散騎諸吏為中朝丞相以下至六百石為外朝也劉奉世曰按文則丹永皆中朝臣也盖時為給事中侍中諸吏之類俱上書曰臣聞眀王埀寛容之聼崇諫爭之官廣開忠直之路不罪狂狷之言師古曰狷急也音絹然後百僚在位宋祁曰浙本無然字予謂然後字當刪當作使百僚在位竭忠盡謀不懼後患朝廷無讇諛之士元首無失道之諐師古曰元首謂天子也讇古謟字竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者師古曰卓髙逺也詭異於衆也故得㧞至於此旬日之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土来未知朝廷體宋祁曰一本来字上有而字體字上有之字浙本無獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官衆共之師古曰令衆人知其罪狀而罰之宋祁曰衆共之衆字上疑有與字昔趙簡子殺其大夫鳴犢孔子臨河而還張晏曰趙簡子欲分晉國故先殺鳴犢又聘孔子孔子聞其死至河而還也師古曰戰國䇿説二人姓名云鳴犢鐸犨而史記及古今人表並以為鳴犢竇犨盖鐸犢及竇其聲相近故有不同耳今永等止舉殺鳴犢一人不論竇犨也今天心未豫張晏曰豫悦豫也災異屢降水旱迭臻師古曰迭互也音徒結反方當隆寛廣問褒直盡下之時也而行慘急之誅於諫爭之臣震驚羣下失忠直心假令輔不坐直言所坐不著師古曰著明也天下不可户曉師古曰言不可家家曉諭之也同姓近臣本以言顯其於治親飬忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴師古曰亟急也人有懼心師古曰人人皆懼也精鋭銷耎蘇林曰耎弱也師古曰耎音乃喚反莫敢盡節正言非所以昭有虞之聼廣徳羙之風也師古曰舜有敢諌之鼓故言有虞之聼也一曰謂逹四聰也臣等竊深傷之唯陛下留神省察上廼徙繫輔共工獄蘇林曰考工也師古曰少府之屬官也亦有詔獄共讀與龔同減死罪一等論為鬼薪終於家鄭崇字子游本髙密大族世與王家相嫁娶師古曰女嫁王家男又娶也祖父以訾徙平陵父賓眀法律為御史事貢公師古曰貢禹也名公直崇少為郡文學史至丞相大車屬如淳曰丞相大車屬如今公府御屬弟立與髙武侯傅喜同門學相友善師古曰同門謂同師也喜為大司馬薦崇哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履師古曰孰曰韋生曰革上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣今祖母從昆弟二人已侯孔鄉侯皇后父髙武侯以三公封尚有因縁師古曰孔鄉侯傅晏也髙武侯傅喜也今無故欲復封商壞亂制度逆天人心宋祁曰心字上疑有之字非傅氏之福也臣聞師曰逆陽者厥極弱逆隂者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克夀師古曰周書亡逸之篇也言王者不知稼穡之艱難唯從耽樂則致天䘮無能夀考也故衰世之君夭折蚤沒師古曰蚤古早字此皆犯隂之害也宋祁曰浙本隂字下有陽字臣願以身命當國咎崇因持詔書案起李竒曰持當受詔書案起也師古曰李説非也案者即寫詔之文傅太后大怒曰何有為天子乃反為一臣所顓制邪師古曰顓與專同上遂下詔曰朕幼而孤皇太太后躬自飬育免于襁褓教道以禮至於成人師古曰道讀曰導惠澤茂焉師古曰茂羙也欲報之徳皥天罔極師古曰詩小雅蓼莪之篇曰父兮生我母兮鞠我欲報之徳昊天罔極言欲報父母之㤙德心無已也呼昊天者陳已至誠也皥字與昊同前追號皇太太后父為崇祖侯惟念德報未殊朕甚恧焉師古曰殊異也恧愧也音女六反侍中光禄大夫商皇太太后父同産子小自保大如淳曰太后從小飬之使至大也宋祁曰産字下疑有弟字恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯崇又以董賢貴寵過度諌由是重得罪師古曰重音直用反數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上師古曰言請求者多交通賔客崇對曰臣門如市臣心如水師古曰言至清也願得考覆上怒下崇獄窮治死獄中孫寳字子嚴潁川鄢陵人也師古曰鄢音偃以眀經為郡吏御史大夫張忠辟寳為屬欲令授子經更為除舍師古曰除謂修飾揷除也設儲偫師古曰謂豫備器物也偫音丈紀反寳自劾去忠固還之師古曰固者謂再三留之心内不平師古曰恨其去也後署寳主簿寳徙入舍祭竈請比鄰忠隂察怪之使所親問寳前大夫為君設除大舍子自劾去者欲為髙節也今兩府髙士俗不為主簿子既為之徙舍甚説師古曰説讀曰悦何前後不相副也寳曰髙士不為主簿而大夫君以寳為可一府莫言非師古曰言大夫以為寳適可為主簿耳府中之人又不以為不當也士安得獨自髙前日君男欲學文而移寳自近師古曰文謂書也禮有来學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎師古曰言士不遭遇知己則當屈辱無所不為也忠聞之甚慙上書薦寳經明質直宜備近臣為議郎遷諫大夫鴻嘉中廣漢羣盗起選為益州刺史廣漢太守扈商者大司馬車騎將軍王音姊子軟弱不任職寳到部親入山谷諭告羣盗非本造意渠率皆得悔過自出師古曰渠大也遣歸田里自劾矯制奏商為亂首師古曰擅放羣盗歸故云矯制由商不任職致有賊盗故云為亂首也春秋之義誅首惡而已商亦奏寳所縱或有渠率當坐者師古曰縱放也商徵下獄寳坐失死罪免益州吏民多陳寳功效言為車騎將軍所排上復拜寳為冀州刺史遷丞相司直時帝舅紅陽侯立使客因南郡太守李尚占墾草田數百頃師古曰隱度而取之也草田荒田也占音之贍反頗有民所假少府陂澤略皆開發師古曰舊為陂澤本屬少府其後以假百姓百姓皆已田之而立揔謂為草田占云新自墾上書願以入縣官師古曰立上書云新墾得此田請以入官也有詔郡平田予直師古曰受其田而凖償價直也錢有貴一萬萬以上師古曰増於時價寳聞之遣丞相史按驗發其姦劾奏立尚懐姦罔上狡猾不道尚下獄死立雖不坐後兄大司馬衞將軍商薨次當代商上度立而用其弟曲陽侯根為大司馬驃騎將軍如淳曰度過也過立而用根㑹益州蠻夷犯法巴蜀頗不安上以寳著名西州拜為廣漢太守秩中二千石賜黄金三十斤蠻夷安輯吏民稱之師古曰輯與集同徵為京兆尹故吏侯文以剛直不茍合常稱疾不肯仕寳以恩禮請文欲為布衣友日設酒食妻子相對文求受署為掾進見如賔禮數月以立秋日署文東部督郵入見勅曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎師古曰渠讀曰詎詎豈也言掾所部内豈有其人乎文卬曰無其人不敢空受職師古曰卬讀曰仰謂仰頭而對也寳曰誰也文曰霸陵杜穉季寳曰其次師古曰除穉季之外更有誰也文曰豺狼横道不宜復問狐狸師古曰言不當釋大而取小也寳黙然穉季者大俠與衞尉淳于長大鴻臚蕭育等皆厚善寳前失車騎將軍與紅陽侯有郤師古曰失車騎將軍謂失王音意奏扈商事也郤與隙同自恐見危時淳于長方貴幸友寳寳亦欲附之始視事而長以穉季託寳故寳窮無以復應文文怪寳氣索師古曰索盡也音先各反知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問師古曰閤閉也如此竟嵗吏民未敢誣明府也師古曰誣謗也即度穉季而譴它事李竒曰過度不治罪衆口讙譁終身自墮師古曰墮毁也音火規反寳曰受教穉季耳目長聞知之杜門不通水火師古曰杜塞也不通水火謂雖鄰伍亦不徃来也穿舍後牆為小戸但持鉏自治園因文所厚自陳如此師古曰具言恐懼改節之狀也文曰我與穉季幸同土壤素無睚眥師古曰睚音涯眥音才賜反睚又音五懈反眥又音仕懈反已觧於前也顧受將命分當相直師古曰言自顧念受郡將之命分當相值遇也分音扶問反直讀曰值誠能自改嚴将不治前事即不更心但更門戸適趣禍耳師古曰更改也趣讀曰促穉季遂不敢犯法寳亦竟嵗無所譴明年穉季病死寳為京兆尹宋祁曰浙本無尹字三嵗京師稱之㑹淳于長敗寳與蕭育等皆坐免官文復去吏死於家穉季子杜蒼字君敖名出穉季右在游俠中哀帝即位徵寳為諌大夫遷司隸初傅太后與中山孝王母馮太后俱事元帝有郤師古曰以當熊事慙而嫉之傅太后使有司考馮太后令自殺衆庶寃之寳奏請覆治傅太后大怒曰帝置司隸主使察我馮氏反事明白故欲擿觖以揚我惡師古曰擿觖謂挑發之也擿音它歴反觖音决挑音它聊反宋祁曰擿字正文注文當作謫我當坐之上廼順指下寳獄尚書僕射唐林爭之上以林朋黨比周師古曰比音頻寐反左遷敦煌魚澤障候大司馬傅喜光祿大夫龔勝固爭上為言太后出寳復官頃之鄭崇下獄寳上書曰臣聞疏不圖親外不慮内師古曰圖謀也慮思也臣幸得銜命奉使職在刺舉不敢避貴幸之埶以塞視聼之明按尚書令昌奏僕射崇下獄覆治榜掠將死卒無一辭師古曰榜掠謂笞擊而考問之也榜音彭道路稱寃疑昌與崇内有纖介師古曰言有細故宿嫌也浸潤相䧟自禁門内樞機近臣䝉受寃譖師古曰蒙被也虧損國家為謗不小臣請治昌以觧衆心書奏天子不説師古曰説讀曰悦以寳名臣不忍誅廼制詔丞相大司空劉敞曰此既云丞相不得復有大司空也司隸寳奏故尚書僕射崇寃請獄治尚書令昌案崇近臣罪惡暴著而寳懐邪附下罔上以春月作詆欺遂其姦心盖國之賊也傳不云乎惡利口之覆國家師古曰論語稱孔子之言其免寳為庶人哀帝崩王莽白王太后徴寳以為光禄大夫與王舜等俱迎中山王平帝立寳為大司農㑹越嶲郡上黄龍游江中太師孔光大司徒馬宮等咸稱莽功德比周公宜告祠宗廟寳曰周公上聖召公大賢尚猶有不相説著於經典兩不相損師古曰周書君奭之序曰召公為保周公為師相成王為左右召公不説周公作君奭是也兩不相損者言俱有令名也召讀曰邵説讀曰悦今風雨未時百姓不足每有一事羣臣同聲師古曰言雷同阿附妄説福祥得無非其羙者師古曰言此非朝廷羙事也時大臣皆失色侍中奉車都尉甄邯即時承制罷議者㑹寳遣吏迎母母道病留弟家獨遣妻子司直陳崇以奏寳事下三公即訊師古曰就問之也寳對曰年七十誖眊恩衰共飬營妻子如章師古曰誖惑也眊與耄同自言老耄心志亂惑供飬之恩衰具如所奏之章也誖音布内反共讀曰供音居用反寳坐免終於家建武中錄舊徳臣以寳孫伉為諸長師古曰伉音抗諸琅邪之縣也母將隆字君房東海蘭陵人也大司馬車騎將軍王音内領尚書外典兵馬踵故選置從事中郎師古曰踵猶躡也言承躡故事也與參謀議奏請隆為從事中郎遷諫大夫成帝末隆奏封事言古者選諸侯入為公卿以褒功徳宜徵定陶王使在國邸以填萬方師古曰填音竹刃反其後上竟立定陶王為太子隆遷冀州牧潁川太守哀帝即位以髙第入為京兆尹遷執金吾時侍中董賢方貴上使中黄門發武庫兵前後十輩送董賢及上乳母王阿舍隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢蘇林曰用度皆出大司農大司農錢自乗輿不以給共飬師古曰共音居用反飬音弋向反共飬勞賜壹出少府盖不以本臧給末用不以民力共浮費師古曰共讀曰供别公私示正路也古者諸侯方伯得顓征伐廼賜斧鉞師古曰顓與専同漢家邉吏職在距㓂亦賜武庫兵皆任其事然後蒙之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣宋祁曰僻當作辟私恩微妾而以天下公用給其私門契國威器共其家備李竒曰契欽也晉灼曰契取也師古曰李説是也共讀曰供民力分於弄臣武兵設於㣲妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂師古曰三家謂魯大夫叔孫仲孫季孫也論語云三家者以雍徹孔子曰相維辟公天子穆穆奚取於三家之堂言三家以雍徹食此乃天子之禮耳何為在三家之堂也臣請收還武庫上不説師古曰説讀曰悦頃之傅太后使謁者買諸官婢賤取之復取執金吾官婢八人隆奏言賈賤請更平直師古曰賈讀曰價其下亦同上於是制詔丞相御史大夫交讓之禮興則虞芮之訟息師古曰虞芮二國名文王為西伯為斷其訟二國各慙而止也隆位九卿既無以匡朝廷之不逮而反奏請與永信宫爭貴賤之賈程奏顯言蘇林曰露奏也衆莫不聞舉錯不由誼理師古曰錯音千故反爭求之名自此始無以示百僚傷化失俗以隆前有安國之言如淳曰徵定陶王使在國邸也左遷為沛郡都尉遷南郡太守王莽少時慕與隆交隆不甚附哀帝崩莽秉政使大司徒孔光奏隆前為冀州牧治中山馮太后獄寃䧟無辜不宜處位在中土本中謁者令史立侍御史丁元自典考之但與隆連名奏事史立時為中太僕丁元泰山太守及尚書令趙昌譖鄭崇者為河内太守皆免官徙合浦何並字子廉祖父以吏二千石自平輿徙平陵師古曰平輿汝南之縣也並為郡吏至大司空掾事何武武髙其志節舉能治劇為長陵令道不拾遺初卭成太后外家王氏貴應劭曰宣帝王皇后父奉光封卭成侯成帝母亦姓王故以父爵别之也而侍中王林卿通輕俠傾京師後坐法免賔客愈盛歸長陵上冢因留飲連日並恐其犯法自造門上謁師古曰造至也音千到反謂林卿曰冢間單外君宜以時歸師古曰單外言在郊郭之外而單露林卿曰諾先是林卿殺婢壻埋冢舍師古曰婢壻外人與其婢姦者也冢舍守冢之舍也並具知之以非已時又見其新免故不發舉欲無令留界中而已即且遣吏奉謁傳送宋祁曰𫝊越本作侍林卿素驕慙於賔客並度其為變儲兵馬以待之師古曰儲豫備也度音徒各反林卿既去北度涇橋令騎奴還至寺門㧞刀剝其建鼓師古曰諸官曹之所通呼為寺建鼔一名植鼓建立也謂植木而旁懸鼓焉縣有此鼓者所以召集號令為開閉之時並自從吏兵追林卿行數十里林卿廹窘廼令奴冠其冠被其襜褕自代乗車從童騎師古曰襜褕曲裾襌衣也童騎童奴之騎也身變服從間徑馳去㑹日暮追及收縳冠奴奴曰我非侍中奴耳並心自知已失林卿廼曰王君困自稱奴得脱死邪叱吏斷頭持還縣所剝鼓置都亭下署曰故侍中王林卿坐殺人埋冢舍使奴剝寺門鼓師古曰署謂書表其事也吏民驚駭林卿因亡命衆庶讙譁以為實死師古曰讙譁衆議也讙音許元反成帝太后以卭成太后愛林卿故聞之涕泣為言哀帝哀帝問狀而善之遷並隴西太守徙潁川太守代陵陽嚴詡詡本以孝行為官謂掾史為師友有過輒閉閤自責終不大言郡中亂王莽遣使徵詡官屬數百人為設祖道詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳師古曰僵偃也仆顛也僵音薑仆音赴詡至拜為羙俗使者文潁曰宣羙風俗使者是時潁川鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金師古曰臧謂致罪之臧也並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪如淳曰減死罪一等願蚤就髠鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟陽翟輕俠趙季李欵多畜賔客以氣力漁食閭里師古曰漁者謂侵奪取之若漁獵之為也至姦人婦女持吏長短從横郡中師古曰從音子用反横音胡孟反聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部敕曰三人非負太守廼負王法不得不治鍾威所犯多在赦前驅使入函谷關勿令汙民閒不入關廼收之趙李桀惡雖逺去當得其頭以謝百姓鍾威負其兄止雒陽師古曰負謂恃其權力也吏格殺之亦得趙李它郡持頭還並皆縣頭及其具獄於市郡中清靜表善好士師古曰好音呼到反見紀潁川名次黄霸性清廉妻子不至官舍數年卒疾病召丞掾作先令書師古曰先為遺令也曰告子恢吾生素餐日久死雖當得法賻勿受如淳曰公令吏死官得法賻師古曰贈終者布帛曰賻音附葬為小椁亶容下棺張晏曰禮三重棺趙簡子曰不設屬辟下卿之罰也或曰但下棺無餘器物也師古曰言止作小槨纔容下棺而已無令髙大也亶讀曰但恢如父言王莽擢恢為關都尉建武中以並孫為郎贊曰盖寛饒為司臣正色立於朝雖詩所謂國之司直無以加也師古曰詩鄭風羔羊之篇曰彼其之子邦之司直言其徳羙可主正直之司也若采王生之言以終其身斯近古之賢臣矣諸葛劉鄭雖云狂瞽有異志焉孔子曰吾未見剛者師古曰論語稱孔子之言也言有剛徳者為難也以數子之名迹然母將汙於冀州孟康曰汙下也師古曰母將隆為冀州牧與史立丁元共奏馮太后事是為汙曲也汙音一胡反孫寳橈於定陵師古曰橈亦曲也謂受淳于長託而不治杜穉季也橈音女教反况俗人乎何並之節亞尹翁歸云前漢書卷七十七前漢書卷七十七考證葢寛饒傳寛饒以令詣官府門上謁辭注文頴如淳云云許應元曰文説非也葢上謁辭闕庭耳尚書主通章奏故得責問衞尉若今報单是也上奏辭即上謁辭也往時不辭辭自寛饒始故自是衞尉不敢私使候司馬也先置衞者當出則輟其宿衞之事也如説亦非鄭崇傳因持詔書案起注師古曰案者即寫詔之文胡三省曰按更始時常侍奏事韓夫人起抵破書案則案非文案之案也臣召南按胡觧是案即几案故曰持詔書案起孫寳傳廼制詔丞相大司空通鑑考異曰哀紀及恩澤侯表皆云傅商以建平二年二月封而寳傳云制詔丞相大司空按建平二年已罷大司空官疑傳誤何並傳先是林卿殺婢壻埋冢舍注師古曰婢壻外人與其婢姦者也按婢壻當是使女所嫁之夫如師古注本文應云殺婢私夫而林卿罪亦不重矣前漢書卷七十七考證
