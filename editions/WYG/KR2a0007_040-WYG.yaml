body:
  text: 前漢書卷四十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注張陳王周傳第十張良字子房其先韓人也大父開地應劭曰大父祖父開地名也相韓昭侯宣惠王襄哀王父平相釐王師古曰釐讀曰僖悼惠王悼惠王二十三年平卒卒二十歲秦滅韓良少未宦事韓宋祁曰宦疑是嘗字韓破良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以五世相韓故師古曰從昭侯至悼惠王凡五君良嘗學禮淮陽東見倉海君晋灼曰海神也如淳曰東夷君長也師古曰二説並非蓋當時賢者之號也良既見之因而求得力士得力士為鐵椎重百二十斤秦皇帝東游至博狼沙中服䖍曰河南陽武南地名也今有亭師古曰狼音浪良與客狙擊秦皇帝師古曰狙謂密伺之音千豫反字本作覷誤中副車師古曰副謂後乗也秦皇帝大怒大索天下師古曰索捜也索音山客反求賊急甚良乃更名姓亡匿下邳師古曰更改也良嘗閒從容歩游下邳圯上服䖍曰圯音頥楚人謂橋曰圯應劭曰汜水之上也文穎曰沂水上橋也師古曰下邳之水非汜水也又非沂水服説是也臣佖曰按從水乃詩云江有汜及今有汜水縣字音詳里反據許慎説文云東楚謂橋為圯在土部本從土傳寫蓋誤從汜合從土作頥音與下文直墮其履汜下並作圯字校定劉攽曰予謂若本實作圯則應劭無縁觧作汜上疑汜亦自為頥音而釋為橋也譬如贍辭作澹辭矣然則汜字從水亦未為誤而校定亦未宜從土也宋祁曰舊本汜從水張佖改作土謂從水者是江有汜之汜音詳里反余謂佖説非也近胡旦作圯橋賛字從水旦碩儒也予嘗問之旦曰汜音頥何所疑憚説文從圯蓋本字原後人從水未容無義佖改從土奈應注為汜水之汜又何以辨應之誤耶用此尤見張佖之率爾也有一老父衣褐至良所師古曰褐制若裘今道士所服者是宋祁曰褐制若䘮服直墮其履圯下師古曰直猶故也一曰正也顧謂良曰孺子下取履良愕然欲歐之師古曰愕驚貌也歐撃也音一口反為其老廼彊忍下取履因跪進父以足受之笑去宋祁曰浙本作笑而去良殊大驚父去里所復還師古曰行一里許而還來曰孺子可教矣後五日平明與我期此良因怪跪曰諾劉攽曰怪字合在因字上宋祁云浙本怪字下有之字五日平明良往父已先在怒曰與老人期後何也去後五日蚤會師古曰放良令去戒以後㑹也其下亦同蚤音早宋祁曰注文蚤音早當作蚤古早字五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書師古曰編謂聨次之也聨簡牘以為書故云一編編音鞭曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黄石即我已師古曰已語終之辭遂去不見旦日視其書廼太公兵法良因異之常習誦宋祁云一本誦下有讀字居下邳為任俠項伯嘗殺人從良匿後十年陳渉等起良亦聚少年百餘人景駒自立為楚假王在留宋祁云浙本作在陳留良欲往從之行道遇沛公沛公將數千人略地下邳遂屬焉沛公拜良為廐將服䖍曰官名也良數以太公兵法沛公沛公喜常用其䇿良為它人言皆不省師古曰省視也良曰沛公殆天授師古曰殆近也故遂從不去沛公之薛見項梁共立楚懐王良乃説項梁曰君已立楚後韓諸公子横陽君成賢宋祁云浙本韓字上有而字可立為王益樹黨師古曰廣立六國之後共攻秦也項梁使良求韓成立為韓王以良為韓司徒與韓王將千餘人西畧韓地得數城秦輙復取之往來為游兵潁川沛公之從雒陽南出轘轅良引兵從沛公下韓十餘城擊楊熊軍沛公廼令韓王成留守陽翟與良俱南攻下宛西入武關沛公欲以二萬人擊秦嶢關下軍師古曰嶢音堯良曰秦兵尚彊未可輕臣聞其將屠者子賈豎易動以利師古曰商賈之人志無逺大譬猶僮豎故云賈豎願沛公且留壁使人先行為五萬人具食益張旗幟諸山上為疑兵師古曰皆所以表己軍之多誇示敵人幟音式志反令酈食其持重寶㗖秦將師古曰㗖音徒濫反觧在髙紀秦將果欲連和俱西襲咸陽師古曰欲與漢王和而隨漢兵襲咸陽宋祁云浙本襲字上有共字沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其解擊之師古曰解讀曰懈沛公廼引兵擊秦軍大破之逐北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聼良曰夫秦為無道故沛公得至此為天下除殘去賊宜縞素為資晋灼曰資質也欲令沛公反秦奢泰服儉素以為資師古曰縞白素也音工老反宋祁曰注文資字舊本作質今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病宋祁曰逆耳苦口疑作逆於耳苦於口願沛公聼樊噲言沛公廼還軍覇上項羽至鴻門欲擊沛公項伯夜馳至沛公軍私見良欲與俱去良曰臣為韓王送沛公今事有急亡去不義廼具語沛公沛公大驚曰為之奈何良曰沛公誠欲背項王邪沛公曰鯫生説我距關毋内諸侯服䖍曰鯫音七垢反鯫小人也臣瓉曰楚漢春秋鯫姓師古曰服説是也音才垢反秦地可王也故聽之良曰沛公自度能郤項王乎師古曰郤音丘略反沛公黙然曰今為奈何良因要項伯見沛公沛公與伯飲為壽結婚令伯具言沛公不敢背項王所以距關者備它盗也項羽後解語在羽傳漢元年沛公為漢王王巴蜀賜良金百溢服䖍曰二十兩曰溢師古曰秦以溢名金若漢之論斤也珠二斗良具以獻項伯漢王亦因令良厚遺項伯使請漢中地服䖍曰本不盡與漢中故請求之項王許之漢王之國良送至褒中遣良歸韓良因説漢王燒絶棧道師古曰棧道閣道也示天下無還心以固項王意廼使良還行燒絶棧道師古曰還謂歸還韓且行且燒所過之處皆燒之也良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城殺之時漢王還定三秦良乃遺項羽書曰漢王失職欲得關中如約即止不敢東宋祁曰敢字下疑有復字又以齊反書遺羽曰齊與趙欲并滅楚項羽以故北擊齊良廼間行歸漢漢王以良為成信侯從東擊楚至彭城漢王兵敗而還至下邑師古曰梁地之縣也今屬宋州漢王下馬踞鞍而問曰吾欲捐關已東等棄之誰可與共功者師古曰捐關已東謂不自有其地將以與人令其立功共破楚也良曰九江王布楚梟將師古曰梟謂最勇健也與項王有隙彭越與齊王反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面師古曰屬委也音之欲反即欲捐之捐之此三人楚可破也漢王乃遣隨何説九江王布而使人連彭越師古曰與相連結也及魏王豹反使韓信特將北擊之師古曰特獨也專任之使將也因舉燕伐齊趙然卒破楚者此三人力也良多病未嘗特將兵宋祁云舊本云持兵將常為畫䇿臣時時從漢三年項羽急圍漢王於滎陽漢王憂恐與酈食其謀橈楚權師古曰橈弱也音女教反其字從木酈生曰昔湯伐桀封其後把武王誅紂封其後宋今秦無德宋祁云浙本徳字作道伐滅六國無立錐之地陛下誠復立六國後此皆争戴陛下德義願為臣妾德義已行南面稱伯楚必歛衽而朝師古曰衽衣襟也漢王曰善趣刻印先生因行佩之師古曰趣讀曰促佩謂授與六國使帶也酈生未行良從外來謁漢王漢王方食曰客有為我計橈楚權者具以酈生計告良曰於子房何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸以籌之張晏曰求借所食之箸用指畫也或曰前世湯武箸明之事以籌度今時之不若也師古曰或説非也箸音直庻反昔湯武伐桀紂封其後者度能制其死命也師古曰度音大各反今陛下能制項籍死命乎其不可一矣武王入殷表商容閭師古曰商容殷賢人也里門曰閭表謂顯異之式箕子門師古曰式亦表也一説至其門而撫車式所以敬之封比干墓今陛下能乎其不可二矣發鉅橋之粟服䖍曰鉅橋倉名也師古曰許慎云鉅鹿之大橋有漕粟也散鹿臺之財臣瓉曰鹿臺臺名今在朝歌城中師古曰劉向云鹿臺大三里髙千尺也以賜貧窮今陛下能乎其不可三矣殷事以畢偃革為軒蘇林曰革者兵車革輅軒者朱軒也如淳曰偃武備而治禮樂也倒載干戈示不復用宋祁曰載作戴今陛下能乎其不可四矣休馬華山之陽示無所為今陛下能乎其不可五矣息牛桃林之壄晋灼曰在𢎞農閺郷南谷中師古曰山海經云夸父之山北有林焉名曰桃林廣圍三百里即謂此也其山谷今在閺郷縣東南湖城縣西南去湖城三十五里天下不復輸積宋祁云浙本天字上有示字今陛下能乎其不可六矣且夫天下游士離親戚棄墳墓師古曰離者言其乖避而委離之以從漢也宋祁曰離親戚浙本離作左左者言其乖避而委離之若只作離字則不湏用注也去故舊從陛下者但日夜望咫尺之地今乃立六國後唯無復立者師古曰既立六國後土地皆盡無以封功勞之人故云無復立者唯發語之辭游士各歸事其主從親戚反故舊陛下誰與取天下乎其不可七矣且楚唯毋彊六國復橈而從之服䖍曰唯當使楚無彊彊則六國弱而從之晋灼曰當今唯楚大無有彊之者若復立六國皆橈而從之陛下焉得而臣之乎師古曰服説是也陛下焉得而臣之其不可八矣誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗廼公事師古曰輟止也哺食在口中者也幾近也哺音捕幾音鉅依反令趣銷印師古曰趣讀曰促後韓信破齊欲自立為齊王宋祁曰齊王上疑有假字漢王怒良説漢王漢王使良授齊王信印語在信傳五年冬漢王追楚至陽夏南師古曰夏音工雅反戰不利壁固陵諸侯期不至良説漢王漢王用其計諸侯皆至語在髙紀漢六年封功臣良未嘗有戰鬬功髙帝曰運籌䇿帷幄中決勝千里外子房功也自擇齊三萬户良曰始臣起下邳與上會留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户廼封良為留侯與蕭何等俱封宋祁云浙本封作拜上已封大功臣二十餘人宋祁云浙本無上字其餘日夜争功而不決宋祁云浙本無而字未得行封上居雒陽南宮從復道望見諸將師古曰復讀曰複往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反師古曰屬近也言近始安屬音之欲反良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以徧封此屬畏陛下不能盡封又恐見疑過失及誅故相聚而謀反耳上廼憂曰為將奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我服䖍曰未起之時與我有故怨也師古曰毎以勇力困辱髙祖我欲殺之為功多不忍良曰今急先封雍齒以示羣臣羣臣見雍齒先封則人人自堅矣於是上置酒封雍齒為什方侯蘇林曰漢中縣也師古曰地理志屬廣漢非漢中也今則屬益州什音十而急趣丞相御史定功行封師古曰趣音促羣臣罷酒皆喜曰雍齒且侯我屬無患矣劉敬説上都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成臯西有殽黽師古曰殽山也黽池也音湎宋祁曰注文當作殽殽山也黽黽池也背河郷雒其固亦足恃師古曰郷讀曰嚮良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里師古曰沃者溉灌也言其土地皆有溉灌之利故云沃野南有巴蜀之饒北有胡苑之利師古曰謂安定北地上郡之北與胡相接之地可以畜牧者也飬禽獸謂之苑阻三面而固守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師師古曰輓引也輓音晩諸侯有變順流而下足以委輸此所謂金城千里天府之國師古曰財物所聚謂之府言關中之地物産饒多可備贍給故稱天府也劉敬説是也於是上即日駕西都關中良從入關性多疾即道引不食穀孟康曰服辟榖藥而静居行氣道讀曰導閉門不出歲餘上欲廢太子立戚夫人子趙王如意大臣多争未能得堅決也呂后恐不知所為或謂呂后曰留侯善畫計上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子師古曰言日日欲易之君安得髙枕而臥師古曰安焉也良曰始上數在急困之中幸用臣䇿今天下安定以愛欲易太子骨肉之間雖臣等百人何益呂澤彊要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人師古曰顧念也四人謂園公綺里季夏黄公甪里先生所謂商山四皓也四人年老矣皆以上嫚娒士師古曰嫚與慢同娒古侮字故逃匿山中義不為漢臣然上髙此四人今公誠能毋愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來師古曰宜應得其來來以為客時從入朝令上見之則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上疾欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣廼説建成侯曰太子將兵有功即位不益師古曰太子嗣君貴已極矣雖更立功位無加益矣無功則從此受禍且太子所與俱諸將皆與上定天下梟將也今廼使太子將之此無異使羊將狼皆不肯為用其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常居前上曰終不使不肖子居愛子上劉攽曰曰字後人妄加明其代太子位必矣君何不急請呂后承間為上泣師古曰因空隙之時言黥布天下猛將善用兵今諸將皆陛下故等夷師古曰夷平也言故時皆齊等廼令太子將此屬莫肯為用且布聞之鼓行而西耳師古曰擊鼓而行言無所畏上雖疾彊載輜車卧而䕶之師古曰輜車衣車也䕶謂監領諸將諸將不敢不盡力上雖苦彊為妻子計於是呂澤夜見呂后宋祁云浙本夜字上有立字呂后承間為上泣而言如四人意上曰吾惟之豎子固不足遣師古曰惟思也廼公自行耳師古曰廼公汝父也於是上自將而東羣臣居守皆送至霸上良疾彊起至曲郵師古曰在新豐西今俗謂之郵頭見上曰臣宜從疾甚楚人剽疾願上愼毋與楚爭鋒師古曰剽音匹妙反因説上令太子為將軍監關中兵上謂子房雖疾彊卧傅太子是時叔孫通已為太傅良行少傅事漢十二年上從破布歸疾益甚愈欲易太子良諫不聼因疾不視事叔孫太傅稱説引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘湏眉皓白衣冠甚偉師古曰所以謂之四皓上怪問曰何為者四人前對各言其姓名上廼驚曰吾求公避逃我今公何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調䕶太子師古曰調謂和平之䕶謂保安之四人為壽已畢趨去上目送之師古曰以目瞻之訖其出也召戚夫人指視曰師古曰視讀曰示我欲易之彼四人為之輔羽翼已成難動矣呂氏眞廼主矣師古曰廼汝也戚夫人泣涕上曰為我楚舞吾為若楚歌師古曰若亦汝也歌曰鴻鵠髙飛一舉千里師古曰鵠音胡督反羽翼以就横絶四海師古曰就成也絶謂飛而直度也横絶四海又可奈何雖有矰繳尚安所施師古曰繳弋射也其矢為矰矰音増繳音之若反歌數闋師古曰闋盡也曲終為闋音口穴反戚夫人歔欷流涕師古曰歔音虚欷音稀又音許氣反上起去罷酒竟不易太子者良本招此四人之力也良從上擊代出竒計下馬邑及立蕭相國服䖍曰何時未為相國良勸髙祖立之所與從容言天下事甚衆師古曰從音千容反宋祁曰浙本所與字下有上字非天下所以存亡故不著師古曰著謂書之於史著音竹助反良廼稱曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳師古曰赤松子仙人號也神農時為雨師服水玉教神農能入火自燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙俱去廼學道欲輕舉師古曰道謂仙道髙帝崩呂后德良廼彊食之師古曰食讀曰飤曰人生一世間如白駒之過隙師古曰解在魏豹傳何自苦如此良不得已彊聼食後六歲薨諡曰文成侯良始所見下邳圯上老父與書者宋祁云浙本圯作汜後十三歲從髙帝過濟北果得穀城山下黄石取而寶祠之及良死并葬黄石毎上冢伏臘祠黄石子不疑嗣侯孝文三年坐不敬國除陳平陽武户牗郷人也師古曰陽武縣名屬陳留户牗者其郷名少時家貧好讀書治黄帝老子之術有田三十畆與兄伯居伯常耕田縱平使游學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家生産曰亦食糠覈耳孟康曰覈麥糠中不破者也晋灼曰覈音紇京師人謂麤屑為紇頭有叔如此不如無有伯聞之逐其婦棄之及平長可取婦富人莫與者宋祁云浙本作莫肯與貧者平亦媿之乆之户牗富人張負有女孫五嫁夫輙死人莫敢取平欲得之邑中有大喪平家貧侍喪以先往後罷為助張負既見之喪所獨視偉平師古曰視而悦其竒偉平亦以故後去負隨平至其家家廼負郭窮巷師古曰負謂偝也以席為門然門外多長者車轍張負歸謂其子仲曰吾欲以女孫予陳平宋祁云越本無孫予二字劉攽曰吾欲以女陳平女下疑少一與字仲曰平貧不事事師古曰不事産業之事一縣中盡笑其所為獨奈何予之女負曰固有美如陳平長貧者乎卒與女為平貧廼假貸幣以聘師古曰貸音土戴反予酒肉之資以内婦負戒其孫曰毋以貧故事人不謹事兄伯如事廼父事嫂如事廼母師古曰廼汝也平既取張氏女資用益饒游道日廣里中社平為宰師古曰主切割肉也分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣陳渉起王使周市略地立魏咎為魏王與秦軍相攻於臨濟平已前謝兄伯服䖍曰謝語其兄伯往事魏也從少年往事魏王咎為太僕説魏王王不聼人或讒之平亡去項羽略地至河上平往歸之從入破秦賜爵卿張晏曰禮秩如卿不治事項羽之東王彭城也漢王還定三秦而東殷王反楚項羽廼以平為信武君將魏王客在楚者往擊殷降而還項王使項悍拜平為都尉師古曰悍音下旦反賜金二十溢居無何師古曰無何猶言無幾時漢攻下殷項王怒將誅定殷者平懼誅廼封其金與印使使歸項王而平身間行杖劒亡渡河船人見其美丈夫獨行疑其亡將要下當有寶器金玉目之欲殺平平心恐乃解衣臝而佐刺船師古曰自露其形示無所懐挾船人知其無有廼止平遂至脩武降漢因魏無知求見漢王漢王召入是時萬石君石􅁬為中㳙受平謁平等十人俱進賜食王曰罷就舍矣平曰臣為事來所言不可以過今日於是漢王與語而説之師古曰説讀曰悦問曰子居楚何官平曰為都尉是日拜平為都尉使參乗典䕶軍諸將盡讙師古曰讙嚻而議也宋祁曰一本作譁注云譁嚻而議曰大王一日得楚之亡卒未知髙下而即與共載使監䕶長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引師而還收散兵至滎陽以平為亞將屬韓王信軍廣武絳灌等或讒平曰師古曰舊説云絳絳侯周勃也灌灌嬰也而楚漢春秋髙祖之臣别有絳灌疑昧之文不可據也平雖美丈夫如冠玉耳其中未必有也孟康曰飾冠以玉光好外見中非所有也聞平居家時盜其嫂師古曰盜猶私也事魏王不容亡而歸楚歸楚不中又亡歸漢師古曰中音竹仲反今大王尊官之令䕶軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝已之行如淳曰孝已髙宗之子有孝行師古曰尾生古之信士一説即微生髙而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進竒謀之士顧其計誠足以利國家耳師古曰顧念也盜嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去師古曰遂猶竟宋祁曰注末當有也字今又從吾遊信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有竒士不能用臣居楚聞漢王之能用人故歸大王臝身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為䕶軍中尉盡䕶諸將諸將廼不敢復言其後楚急擊絶漢甬道圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聼漢王謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之亷節好禮者多歸之至於行功賞爵邑重之師古曰言愛惜之士亦以此不附今大王嫚而少禮士之亷節者不來然大王能饒人以爵邑士之頑頓耆利無耻者亦多歸漢如淳曰頑頓謂無亷隅也師古曰頓讀曰鈍耆讀曰嗜誠各去兩短集兩長天下指麾即定矣然大王資㑄人師古曰資謂天性也㑄古侮字不能得亷節之士顧楚有可亂者師古曰顧念也彼項王骨骾之臣亞父鍾離昧龍且周殷之屬師古曰昧音秣且音子閭反不過數人耳大王能出捐數萬斤金行反閒閒其君臣以疑其心師古曰閒音居莧反項王為人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黄金四萬斤予平恣所為不問出入平既多以金縱反閒於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進師古曰舉鼎爼而來見楚使即陽驚曰以為亞父使廼項王使也復持去以惡草具進楚使服䖍曰去肴肉更以惡草之具宋祁云浙本作菜草之具使歸具以報項王果大疑亞父宋祁云浙本果字上復有項王二字亞父欲急擊下滎陽城項王不信不肯聼亞父亞父聞項王疑之廼大怒曰天下事大定矣君王自為之願乞骸骨歸宋祁曰乞當作賜歸未至彭城疽發背而死師古曰疽癕瘡也音千余反平廼夜出女子二千人滎陽東門楚因擊之平廼與漢王從城西門出去宋祁曰出去當作夜出遂入關收聚兵而復東明年淮隂侯信破齊自立為假齊王使使言之漢王漢王怒而罵平躡漢王孟康曰躡謂躡漢王足漢王寤廼厚遇齊使使張良往立信為齊王於是封平以户牗郷用其計䇿卒滅楚漢六年人有上書告楚王韓信反髙帝問諸將諸將曰亟發兵阬豎子耳師古曰亟急也音居力反髙帝黙然以問平平固辭謝曰宋祁曰一本固作因然作固為長諸將云何上具告之平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚師古曰與如也上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也師古曰趣讀曰促竊為陛下危之上曰為之奈何平曰古者天子廵狩㑹諸侯南方有雲夢師古曰楚澤名夢音莫風反又讀如本字陛下第出偽游雲夢師古曰第但也語聲急也它皆類此會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁師古曰出其郊逺迎謁也而陛下因禽之特一力士之事耳宋祁云浙本特字上有此字髙帝以為然廼發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中髙帝豫具武士見信即執縛之語在信傳遂會諸侯於陳還至雒陽與功臣剖符定封封平為户牗侯世世勿絶平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣師古曰若如也廼復賞魏無知其明年平從擊韓王信於代至平城為匈奴圍七日宋祁曰圍字上疑有所字不得食髙帝用平竒計使單于閼氏解圍以得開師古曰閼氏音焉支髙帝既出其計祕世莫得聞髙帝南過曲逆孟康曰中山蒲隂縣上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳顧問御史曲逆戸口幾何對曰始秦時三萬餘户間者兵數起多亡匿今見五千餘户於是詔御史更封平為曲逆侯宋祁曰曲逆漢書元無音文文選載陸士衡髙祖功臣頌曲逆宏逹好謀能斷注曲區句反逆音遇盡食之除前所食户牗平自初從至天下定後常以䕶軍中尉從擊臧荼陳豨黥布凡六出竒計輙益邑封竒計或頗祕世莫得聞也髙帝從擊布軍還病創徐行至長安燕王盧綰反上使樊噲以相國將兵擊之既行人有短惡噲者師古曰陳其短失過惡於上謂譛毁之它皆類此髙帝怒曰噲見吾病廼幾我死也孟康曰幾幸我死也幾音冀用平計召絳侯周勃受詔牀下曰陳平乗馳傳載勃代噲將師古曰傳音張戀反宋祁云景祐本無陳字校添平至軍中即斬噲頭二人既受詔馳傳未至軍行計曰樊噲帝之故人功多師古曰行計謂於道中且計也宋祁曰注文道中字下當有行字又呂后女弟呂嬃夫有親且貴帝以忿怒故欲斬之即恐後悔寜囚而致上令上自誅之未至軍為壇以節召樊噲噲受詔即反接師古曰反縛兩手也載檻車詣長安而令周勃代將兵定燕平行聞髙帝崩師古曰未至京師於道中聞髙帝崩平恐呂后及呂嬃怒廼馳傳先去逢使者詔平與灌嬰屯於滎陽平受詔立復馳至宮哭殊悲因奏事喪前呂后哀之曰君出休矣平畏讒之就師古曰就成也言畏讒毒己者得其成計因固請之得宿衞中宋祁曰之字可刪太后廼以為郎中令日傅教帝如淳曰傅相之是後呂嬃讒廼不得行樊噲至即赦復爵邑惠帝六年相國曹參薨安國侯王陵為右丞相平為左丞相王陵沛人也始為縣豪髙祖微時兄事陵及髙祖起沛入咸陽陵亦聚黨數千人居南陽不肯從沛公及漢王之還擊項籍陵廼以兵屬漢項羽取陵母置軍中陵使至則東郷坐陵母欲以招陵師古曰郷讀曰嚮陵母既私送使者泣曰願為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劒而死項王怒亨陵母陵卒從漢王定天下以善雍齒雍齒髙祖之仇陵又本無從漢之意以故後封陵為安國侯陵為人少文任氣好直言為右丞相二歲惠帝崩髙后欲立諸呂為王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不説師古曰説讀曰悦問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后稱制欲王昆弟諸呂無所不可太后喜罷朝陵讓平勃曰始與髙帝唼血而盟諸君不在邪師古曰唼小歠也音所甲反宋祁云浙本無而字今髙帝崩太后女主欲王呂氏諸君縱欲阿意背約何面目見髙帝於地下乎平曰於面折廷爭臣不如君師古曰廷爭謂當朝廷而諫爭全社稷安劉氏後君亦不如臣陵無以應之於是呂太后欲廢陵廼陽遷陵為帝太傅實奪之相權陵怒謝病免杜門竟不朝請師古曰杜塞也閉塞其門也請音才性反杜字本作音同十年而薨陵之免呂太后徙平為右丞相以辟陽侯審食其為左丞相師古曰食其音異基食其亦沛人也漢王之敗彭城西楚取太上皇呂后為質食其以舍人侍呂后其後從破項籍為侯幸於呂太后及為相不治鄭氏曰不立治處使止宮中也李竒曰不治丞相職事也師古曰李説是也監宮中如郎中令公卿百官皆因決事呂嬃常以平前為髙帝謀執樊噲數讒平曰為丞相不治事日飲醇酒戲婦人平聞日益甚呂太后聞之私喜面質呂嬃於平前師古曰質對也曰鄙語曰兒婦人口不可用顧君與我何如耳無畏呂嬃之譛師古曰顧念也呂太后多立諸呂為王平偽聼之師古曰謂且順從之不乖牾也及呂太后崩平與太尉勃合謀卒誅諸呂立文帝平本謀也審食其免相文帝立舉以為相如淳曰舉猶皆也衆人之議皆以為勃平功多矣師古曰言文帝以平勃俱舊臣有功皆欲以為相太尉勃親以兵誅呂氏功多平欲讓勃位廼謝病文帝初立怪平病問之平曰髙帝時宋祁曰别本帝上有皇字勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是廼以太尉勃為右丞相位第一平徙為左丞相位第二賜平金千斤益封三千户居頃之上益明習國家事朝而問右丞相勃曰天下一歲決獄幾何師古曰臨朝問也幾音居豈反勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背師古曰洽需也媿不能對上亦問左丞相平平曰各有主者宋祁曰越本無各字上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟内史上曰茍各有主者而君所主何事也平謝曰主臣文穎曰惶恐之辭也猶今言死罪也孟康曰主臣主羣臣也若今言人主晋灼曰主擊也臣服也言其擊服惶恐之辭師古曰文晋二説是也陛下不知其駑下使待罪宰相師古曰駑凡馬之稱非駿者也故以自喻駑音奴宰相者上佐天子理隂陽順四時下遂萬物之宜師古曰遂申也外填撫四夷諸侯内親附百姓使卿大夫各得任其職也上稱善勃大慙出而讓平曰君獨不素教我乎平笑曰君居其位獨不知其任邪且陛下即問長安盜賊數又欲彊對邪劉攽曰盜賊數亦自有主者謂不當問細故也於是絳侯自知其能弗如平逺矣居頃之勃謝病請免相宋祁曰越本無病請二字而平顓為丞相師古曰顓與專同孝文二年平薨諡曰獻侯傳子至曾孫何坐略人妻棄市王陵亦至𤣥孫坐酎金國除辟陽侯食其免後三歲而為淮南王所殺文帝令其子平嗣侯淄川王反辟陽近淄川平降之國除始平曰我多隂謀道家之所禁師古曰此平謂陳平吾世即廢亦已矣不能復起以吾多隂禍也宋祁曰不能字上疑有終字其後曾孫陳掌以衞氏親戚貴師古曰掌妻衞子夫之姊願得續封之宋祁曰浙本無之字然終不得也宋祁曰得一作行周勃沛人也其先卷人也師古曰卷縣名也地理志屬河南音丘權反其下亦同宋祁曰沛人也也字可刪徙沛勃以織薄曲為生蘇林曰薄一名曲月令曰具曲植師古曰許慎云葦薄為曲也常以吹簫給喪事師古曰吹簫以樂䘮賔若樂人也材官引强服䖍曰能引强弓弩官也孟康曰如今挽强司馬也師古曰强音其兩反髙祖為沛公初起勃以中涓從攻胡陵下方與師古曰音房豫方與反與戰卻敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蘭虞取之擊章邯車騎殿師古曰殿之言填也謂鎮軍後以扞敵勃撃破章邯之殿兵也殿音丁見反劉奉世曰殿最多皆功之髙下名品也略定魏地攻轅戚東緍以往至栗師古曰緍音昏取之攻齧桑先登擊秦軍阿下破之追至濮陽下蘄城攻都關定陶襲取宛朐得單父令師古曰音善甫夜襲取臨濟攻壽張以前至卷破李由雍丘下攻開封先至城下為多文頴曰勃士卒至者多也如淳曰周禮戰功曰多師古曰多謂功多也後章邯破項梁沛公與項羽引兵東如碭自初起沛還至碭一歲二月楚懐王封沛公號武安侯為碭郡長沛公拜勃為襄賁令師古曰賁音肥從沛公定魏地攻東郡尉於成武破之攻長社先登攻潁陽緱氏絶河津擊趙賁軍尸北師古曰賁音奔尸即尸郷南攻南陽守齮破武關嶢關攻秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懐德攻槐里好畤最如淳曰於將率之中功為最也北擊趙賁内史保於咸陽最北救漆師古曰漆扶風縣擊章平姚卬軍西定汧師古曰汧亦扶風縣音口肩反還下郿頻陽師古曰郿即岐州郿縣也頻陽在櫟陽東北郿音媚圍章邯廢丘破之西擊益已軍破之如淳曰章邯將也攻上邽師古曰邽音圭東守嶢關擊項籍攻曲遇最師古曰曲音丘禹反遇音顒還守敖倉追籍籍已死因東定楚地泗水東海郡凡得二十二縣還守雒陽櫟陽賜與潁隂侯共食鍾離以將軍從髙祖擊燕王臧荼破之易下所將卒當馳道為多師古曰當髙祖所行之前劉敞曰馳道猶言乗輿耳言勃將卒在馳道有功也戰功曰多賜爵列侯剖符世世不絶食絳八千二百八十户以將軍從髙帝擊韓王信於代降下霍人以前至武泉孟康曰縣屬雲中也擊胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晋陽下破之下晋陽後擊韓信軍於硰石應劭曰硰音沙孟康曰地名也齊恭曰硰音赤坐反師古曰齊音是也破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多勃還為太尉擊陳豨屠馬邑所將卒斬豨將軍乗馬降師古曰姓乗馬名降也乗音食孕反轉擊韓信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂師古曰圂者鴈門守之名音下頓反因轉攻得雲中守遫丞相箕肄將軍博師古曰遫古速字也肄音弋二反博者亦豨將之名也定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之軒豨丞相程縱將軍陳武都尉髙肄定代郡九縣燕王盧綰反勃以相國代樊噲將擊下薊師古曰即幽州薊縣也音計得綰大將抵丞相偃守陘張晏曰盧綰郡守陘其名也師古曰陘音刑太尉弱御史大夫施屠渾都師古曰姓施屠名渾都渾音胡昆反破綰軍上蘭後擊綰軍沮陽服䖍曰沮音阻師古曰縣名屬上谷追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從髙帝得相國一人師古曰最者凡也總言其攻戰克獲之數丞相二人將軍二千石各三人别破軍二下城三定郡五縣七十九得丞相大將各一人勃為人木彊敦厚師古曰木謂質樸彊音其兩反髙帝以為可屬大事師古曰屬委也音之欲反勃不好文學每召諸生説事東郷坐責之如淳曰勃自東郷責諸生説事不以賔主之禮也師古曰郷讀曰嚮趣為我語蘇林曰音趣舍臣瓉曰令直言勿稱經書也師古曰二説皆非也趣讀曰促謂令速言也其椎少文如此服䖍曰謂訥鈍也應劭曰今俗名拙語為椎儲師古曰椎謂樸鈍如椎也音直推反勃既定燕而歸髙帝已崩矣以列侯事惠帝惠帝六年置太尉官以勃為太尉十年髙后崩呂禄以趙王為漢上將軍呂産以呂王為相國秉權欲危劉氏勃與丞相平朱虚侯章共誅諸呂語在髙后紀於是隂謀以為少帝及濟川淮陽恒山王皆非惠帝子呂太后以計詐名它人子殺其母飬之後宮令孝惠子之立以為後用彊呂氏今已滅諸呂少帝即長用事吾屬無類矣師古曰云被誅滅無遺種不如視諸侯賢者立之遂迎立代王是為孝文皇帝東牟侯興居朱虚侯章弟也曰誅諸呂臣無功請得除宮廼與太僕汝隂滕公入宮劉敞曰當云汝隂侯滕公前謂少帝曰足下非劉氏不當立廼顧麾左右執㦸皆仆兵罷師古曰仆頓也音赴有數人不肯去宦者令張釋諭告亦去師古曰荆燕吳傳云張澤今此作釋參錯不同未知孰是也滕公召乗輿車載少帝出少帝曰欲持我安之乎師古曰言往何所也滕公曰就舍少府廼奉夫子法駕迎皇帝代邸報曰宮謹除宋祁曰除下當有矣字皇帝入未央宮有謁者十人持㦸衞端門師古曰端門殿之正門曰天子在也足下何為者不得入太尉往喻廼引兵去皇帝遂入是夜有司分部誅濟川淮陽常山王及少帝於邸文帝即位以勃為右丞相賜金五千斤邑萬户居十餘月人或説勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以厭之則禍及身矣師古曰厭謂當之也言既有大功又受厚賞而居尊位以乆當之不去則禍及矣厭音一渉反又音烏狎反勃懼亦自危廼謝請歸相印上許之歲餘陳丞相平卒上復用勃為相宋祁曰浙本相字上有丞字十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國廼免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見其後人有上書告勃欲反下廷尉逮捕勃治之勃恐不知置辭師古曰置立也辭對獄之辭吏稍侵辱之勃以千金與獄吏獄吏廼書牘背示之李竒曰吏所執簿也師古曰牘木簡以書辭也音讀曰以公主為證公主者孝文帝女也勃太子勝之尚之師古曰尚配也解在張耳傳故獄吏教引為證初勃之益封盡以予薄昭及繫急薄昭為言薄太后太后亦以為無反事文帝朝太后以冒絮提文帝應劭曰陌􅋕絮也晋灼曰巴蜀異志謂頭上巾為冒絮師古曰冒覆也老人所以覆其頭提擲也提音徒計反曰絳侯綰皇帝璽將兵於北軍應劭曰言勃誅諸呂廢少帝手綰國璽時尚不反況今更有異乎師古曰綰謂引結其組音烏版反不以此時反今居一小縣顧欲反邪師古曰顧猶倒也文帝既見勃獄辭廼謝曰吏方驗而出之於是使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍安知獄吏之貴也宋祁曰浙本安知字上有然終字勃復就國孝文十一年薨諡曰武侯子勝之嗣尚公主不相中如淳曰猶言不相合當也師古曰意不相可也中音竹仲反坐殺人死國絶一年宋祁曰景祐本一年下有文帝乃擇子賢者河内太守十二字予据後言文帝擇勃子賢者皆推亞夫於文次第方及耳不容先更於此重􅃨見也若更存此則河内太守三處再見班固之筆必不然也今去之弟亞夫復為侯亞夫為河内守時許負相之應劭曰許負河内温人老嫗也君後三歲而侯侯八歲為將相持國秉師古曰秉音彼命反貴重矣於人臣無二後九年而餓死亞夫笑曰臣之兄以代父侯矣有如卒子當代我何説侯乎然既已貴如負言又何説餓死指視我師古曰視讀曰示負指其口曰從理入口此餓死法也師古曰從豎也音子容反居三歲兄絳侯勝之有罪文帝擇勃子賢者皆推亞夫廼封為條侯師古曰縣在勃海地理志作脩字其音同耳宋祁曰脩當作蓨集韻音祧云周亞夫所封文帝後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門以河内守亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲鋭兵刄彀弓弩持滿師古曰彀張也音遘劉奉世曰言彀弓弩是也敵未至何遽持滿何時已乎此二字疑衍天子先驅至不得入師古曰先驅導駕者也若今之武候隊矣先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫廼傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子廼按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜天子為動改容式車師古曰古者立乗凡言式車者謂俛身撫式以禮敬人式車前横木也使人稱謝師古曰謝告也皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此眞將軍矣鄉者霸上棘門如兒戲耳師古曰郷讀曰嚮其將固可襲而虜也至於亞夫可得而犯邪稱善者乆之月餘三軍皆罷廼拜亞夫為中尉文帝且崩時戒太子曰即有緩急周亞夫眞可任將兵文帝崩亞夫為車騎將軍孝景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與爭鋒師古曰剽音匹妙反願以梁委之絶其食道乃可制也上許之師古曰吳王傳云亞夫至淮陽問鄧都尉為畫此計亞夫乃從之今此云自請而後行二傳不同未知孰是亞夫既發至霸上趙渉􅃒説亞夫曰將軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之渉曰吳王素富懐輯死士乆矣師古曰輯與集同此知將軍且行必置間人於殽黽阸陿之間且兵事上神密將軍何不從此右去走藍田師古曰右謂少西去也走音奏出武關抵雒陽師古曰抵至也間不過差一二日師古曰謂右去行遲止一二日也直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也師古曰不意其猝至太尉如其計至雒陽使吏搜殽黽間果得吳伏兵廼請渉為䕶軍亞夫至會兵滎陽師古曰㑹集也吳方攻梁梁急請救亞夫引兵東北走昌邑師古曰走音奏深壁而守梁王使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓髙侯等絶吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚内相攻擊擾亂至於帳下亞夫堅卧不起宋祁曰浙本堅作終頃之復定吳奔壁東南陬如淳曰陬隅也師古曰音子侯反又音鄒亞夫使備西北已而其精兵果奔西北不得入劉奉世曰兩陣相向吳奔東南陬則西北在陣後何由奔之盖亞夫令備西南陬傳者但欲見能料敵反其所攻不知遂失實也吳楚既餓廼引而去亞夫出精兵追擊大破吳王濞吳王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵因乗勝遂盡虜之降其縣購吳王千金月餘越人斬吳王頭以告凡相守攻三月而吳楚破平於是諸將廼以太尉計謀為是由此梁孝王與亞夫有隙歸復置太尉官五歲遷為丞相景帝甚重之上廢栗太子亞夫固爭之不得上由此疏之而梁孝王每朝常與太后言亞夫之短竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯師古曰南皮竇彭祖太后弟長君之子章武太后母弟廣國及臣即位廼侯之信未得封也竇太后曰人生各以時行耳師古曰言富貴當及己身也竇長君在時竟不得侯死後廼其子彭祖顧得侯師古曰顧反也吾甚恨之帝趣侯信也師古曰趣讀曰促上曰請得與丞相計之宋祁曰景本計之字下又有與丞相計之五字亞夫曰髙帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上黙然而沮師古曰沮者止壊之意也音才與反其後匈奴王徐盧等五人降漢師古曰功臣表云唯徐盧上欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用廼悉封徐盧等為列侯亞夫因謝病免相頃之上居禁中召亞夫賜食獨置大胾師古曰胾大臠音側吏反宋祁曰浙本注云大胾大臠也無切肉又不置箸亞夫心不平顧謂尚席取箸應劭曰尚席主席者也上視而笑曰此非不足君所乎孟康曰設胾無箸者此非不足滿於君所乎嫌恨之也如淳曰非故不足君之食具偶失之也師古曰孟説近之帝言賜君食而不設箸此由我意於君有不足乎宋祁曰浙本注文由我字上有豈不二字亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以葬者如淳曰工官官名也張晏曰被具也五百具甲楯也師古曰被音皮義反取庸苦之不與錢師古曰庸謂賃也苦謂極苦使也宋祁曰浙本注文賃字下有作者字庸知其盜買縣官器怨而上變告子事連汙亞夫書既聞上下吏宋祁曰浙本下字下有之字吏簿責亞夫如淳曰簿音主簿之簿簿問其辭情師古曰簿問者書之於簿一一問之也亞夫不對上罵之曰吾不用也孟康曰言不用汝對欲殺之也如淳曰恐獄吏畏其復用事不敢折辱也師古曰孟説是也一云帝責此吏云不勝其任吾不用汝故召亞夫令詣廷尉也召詣廷尉廷尉責問曰君侯欲反何亞夫曰臣所買器廼葬器也何謂反乎吏曰君縱不欲反地上即欲反地下耳吏侵之益急初吏捕亞夫亞夫欲自殺其夫人止之以故不得死遂入廷尉因不食五日歐血而死國絶一歲上廼更封絳侯勃它子堅為平曲侯續絳侯後傳子建德為太子太傅坐酎金免官後有罪國除亞夫果餓死後上廼封王信為蓋侯至平帝元始二年繼絶世復封勃𤣥孫之子恭為絳侯千户贊曰聞張良之智勇以為其貌魁梧竒偉應劭曰魁梧丘虚壯大之意也蘇林曰梧音悟師古曰魁大貌也梧者言其可驚梧今人讀為吾非也反若婦人女子故孔子稱以貌取人失之子羽師古曰子羽孔子弟子澹臺滅明字貌惡而行善故云然也學者多疑於鬼神師古曰謂無鬼神之事也如良受書老父亦異矣髙祖數離困阸良常有力師古曰離遭也豈可謂非天乎陳平之志見於社下傾側擾攘楚魏之間卒歸於漢而為謀臣宋祁曰一作謀主及呂后時事多故矣師古曰故謂中屯難也平竟自免以智終王陵廷爭杜門自絶亦各其志也周勃為布衣時鄙樸庸人至登輔佐匡國家難誅諸呂立孝文為漢伊周師古曰處伊尹周公之任何其盛也始呂后問宰相髙祖曰陳平智有餘王陵少戇可以佐之師古曰戇愚也舊音下紺反今讀音竹巷反安劉氏者必勃也又問其次云過此以後非廼所及師古曰廼汝也言汝亦不及見也宋祁曰浙本正文及下有也字終皆如言聖矣夫前漢書卷四十前漢書卷四十考證張良傳景駒自立為楚假王在留臣召南按留縣名地理志屬楚國即後文良所云始臣起下邳與上㑹留者也良之封留即以此事别本作在陳留非也故遂從不去臣召南按史記作故遂從之不去見景駒此班氏改正史記之失也髙紀明言沛公道得張良遂與俱見景駒請兵以攻豐可見良亦見駒但自此決意從沛公耳項羽後觧語在羽傳臣召南按此直用史記而失者也鴻門之役史記於項羽本紀中詳敘故留侯世家曰語在項羽事中若漢書既移敘其事於髙紀故羽傳從畧但曰語在髙紀不應此文復曰語在羽傳也此史家修改所未及處吕后廼使建成侯吕澤通鑑考異曰澤當是釋之臣召南按考異是也盖澤與釋相近而譌其下文又脱之字耳吕澤封周吕侯吕釋之封建成侯恩澤侯表可据也叔孫通已為太傅良行少傅事胡三省曰古世子有三師三少至漢惟太傅少傅耳後六歲薨史記作後八年卒陳平傳里中社孔穎逹曰祭法大夫以下成羣立社曰置社注云大夫不得特立社與民族居百家以上則共立一社今時里社是也如鄭此言則周之政法百家以上得立社其秦漢以来雖非大夫民二十五家以上則得立社故曰今之里社王陵傳及漢王之還擊項籍廼以兵屬漢臣召南按陵之初從傳與表判然不同据此傳則在漢王還定三秦率五諸侯伐楚之後故下文云陵本無從漢之意也但張蒼傳言陵觧張蒼之厄乃在沛公初定南陽未入武關以前何耶周勃傳攻蘭虞取之臣召南按史記作攻䝉虞是也此承下邑之文曹參傳亦曰攻下邑以西至虞据地理志梁國即秦碭郡也下邑䝉虞三縣俱屬梁國此文蘭應作蒙又按下文追至濮陽下蘄城史記作下甄城鄄阿地近濮陽亦史記是西擊益已軍破之凌穉隆曰益已史記作盗巴二字筆畫相似未知孰是所將卒斬豨將軍乗馬降乗馬降史記作乗馬絺又丞相箕肄史記作箕肆將軍博史記作將勲又都尉髙肄史記作髙肆又遼東二十九縣史記作遼西遼東二十九縣惠帝六年置太尉官以勃為太尉徐廣曰功臣表及將相表皆髙后四年始置太尉臣召南按傳此文與公卿表同盖用史記世家而不取史記功臣將相二表也前漢書卷四十考證
