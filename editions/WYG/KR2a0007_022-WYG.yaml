body:
  text: 前漢書卷二十二漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注禮樂志第二六經之道同歸而禮樂之用為急師古曰六經謂易詩書春秋禮樂也治身者斯須忘禮則暴嫚入之矣師古曰斯須猶須臾為國者一朝失禮則荒亂及之矣人函天地隂陽之氣有喜怒哀樂之情師古曰函包容也讀與含同它皆類此天禀其性而不能節也師古曰禀謂給授也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫師古曰倫理也正情性節萬事者也人性有男女之情妬忌之别為制婚姻之禮有交接長㓜之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容師古曰踊跳也哀甚則踊正人足以副其誠邪人足以防其失師古曰副稱也故婚姻之禮廢則夫婦之道苦而淫辟之罪多孟康曰苦音盬夫婦之行盬不固也師古曰苦惡也不當假借辟讀曰僻鄉飲之禮廢則長㓜之序亂而爭鬭之獄蕃師古曰蕃亦多也音扶元反他皆類此喪祭之禮廢則骨肉之恩薄而背死忘先者衆師古曰先者先人謂祖考宋祁曰祖考下添也字朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫譱於禮移風易俗莫譱於樂師古曰此孝經載孔子之言也譱古善字禮節民心樂和民聲政以行之刑以防之禮樂政刑四逹而不誖則王道備矣師古曰誖乖也音布内反樂以治内而為同李竒曰同於和樂也禮以脩外而為異李竒曰尊卑為異也同則和親異則畏敬和親則無怨畏敬則不爭揖讓而天下治者禮樂之謂也二者竝行合為一體畏敬之意難見則著之於享獻辭受登降跪拜師古曰見謂彰顯也和親之說難形則𤼵之於詩歌詠言鐘石筦弦師古曰說讀曰恱形亦見也筦字與管同蓋嘉其敬意而不及其財賄美其歡心而不流其聲音師古曰流移也心不移溢於音聲也故孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉師古曰論語載孔子之言也謂禮以節人為貴樂以和人為本玉帛鐘鼔乃其末也宋祁曰其末下當添事字此禮樂之本也故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也師古曰作謂有所興造也述謂明辨其義而循行也宋祁曰景徳本循行作脩行王者必因前王之禮順時施宜有所損益即民之心稍稍制作師古曰即就也至太平而大備周監於二代禮文尤具師古曰監觀也二代夏殷也言周觀夏殷之禮而增損之也事為之制曲為之防師古曰言每事立制委曲防閑也故稱禮經三百威儀三千於是教化浹洽師古曰浹徹也洽霑也浹音子牒反民用和睦災害不生禍亂不作囹圄空虚四十餘年應劭曰囹圄周獄名也師古曰囹獄也圄守也故總言囹圄無繫於周囹音來丁反圄音牛吕反孔子美之曰郁郁乎文哉吾從周師古曰論語載孔子之言也郁郁文章貌及其衰也諸侯踰越法度惡禮制之害己去其篇籍遭秦滅學遂以亂亡漢興撥亂反正日不暇給師古曰撥去亂俗而還之於正道也給足也言事務殷多日日脩造尚不能足故無暇也猶命叔孫通制禮儀以正君臣之位髙祖說而歎曰師古曰說讀曰恱吾乃今日知為天子之貴也以通為奉常遂定儀法師古曰奉常即太常也觧在百官公卿表未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐㢘恥今其甚者殺父兄盗者取廟器而大臣特以簿書不報期㑹為故師古曰特但也簿文簿也故謂大事也言公卿但以文案簿書報荅為事也簿音歩户反至於風俗流溢恬而不怪師古曰恬安也謂心以為安以為是適然耳師古曰言正當如此非失道也夫移風易俗使天下回心而鄉道師古曰鄉讀曰嚮類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦如淳曰六親賈誼書以為父也子也從父昆弟也從祖昆弟也曾祖昆弟也族昆弟也此非天之所為人之所設也人之所設不為不立不修則壞師古曰為作也漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息師古曰軌道言遵道猶車行之依軌轍也廼草具其儀師古曰草謂創立其事也他皆類此天子說焉師古曰說讀曰恱而大臣絳灌之屬害之故其議遂寢師古曰舊說以為絳謂絳侯周勃也灌謂灌嬰也而楚漢春秋髙祖之臣别有絳灌疑昧之文不可明也此既言大臣則當謂周勃灌嬰也至武帝即位進用英雋議立明堂制禮服以興太平師古曰服謂衣服之色也㑹竇太后好黄老言不說儒術師古曰說讀曰恱其事又廢後董仲舒對策言王者欲有所為宜求其端於天天道大者在於隂陽陽為徳隂為刑天使陽常居大夏而以生育長養為事隂常居大冬而積於空虚不用之處以此見天之任徳不任刑也陽出布施於上而主嵗功隂入伏藏於下而時出佐陽陽不得隂之助亦不能獨成嵗功王者承天意以從事故務徳教而省刑罰刑罰不可任以治世猶隂之不可任以成嵗也今廢先王之徳教獨用執法之吏治民而欲徳化被四海故難成也是故古之王者莫不以教化為大務立大學以教於國設庠序以化於邑師古曰庠序行禮養老之處也教化以明習俗以成天下嘗無一人之獄矣至周末世大為無道以失天下秦繼其後又益甚之自古以來未嘗以亂濟亂大敗天下如秦者也師古曰濟益也習俗薄惡民人抵冒師古曰抵忤也冒犯也言無㢘恥不畏懼也抵音丁禮反今漢繼秦之後雖欲治之無可奈何法出而姦生令下而詐起一嵗之獄以萬千數如以湯止沸沸兪甚而無益師古曰兪進也音踰又音愈它皆類此辟之琴瑟師古曰辟讀曰譬不調甚者必觧而更張之廼可鼓也為政而不行甚者必變而更化之廼可理也故漢得天下以來常欲善治而至今不能勝殘去殺者失之當更化而不能更化也古人有言臨淵羡魚不如歸而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治而災害日去福祿日來矣是時上方征討四夷銳志武功師古曰銳利也言一意進求若兵刃之銳利不暇留意禮文之事至宣帝時琅邪王吉為諫大夫又上疏言欲治之主不世出師古曰言時時而一出難常遇也公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書斷獄聽訟而已此非太平之基也今俗吏所以牧民者非有禮義科指可世世通行者也以意穿鑿各取一切師古曰茍順一時非正道是以詐偽萌生刑罰無極質樸日消恩愛寖薄師古曰寖古浸字浸漸也孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域師古曰言以仁道治之皆得其性則夀考也域界也則俗何以不若成康夀何以不若髙宗師古曰成康周之二王太平之時也髙宗殷王武丁也有徳可尊故曰髙宗享國五十九年故云夀上不納其言吉以病去至成帝時犍為郡於水濱得古磬十六枚師古曰濱水涯也音賓議者以為譱祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖攘之容師古曰攘古讓字以風化天下如此而不治者未之有也或曰不能具禮師古曰或曰者劉向設為難者之言而後荅釋也禮以養人為本如有過差是過而養人也師古曰過差猶失錯也刑罰之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆服虔曰言隨君意也師古曰削者謂有所刪去以刀削簡牘也筆者謂有所增益以筆就而書也救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦弦之間小不備因是絶而不為是去小不備而就大不備大不備或莫甚焉師古曰大不備者事之虧失莫甚於此夫教化之比於刑法刑法輕是舎所重而急所輕也師古曰舎廢也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫師古曰誖乖也音布内反至於䧟大辟受刑戮者不絶繇不習五常之道也師古曰繇與由同五常仁義禮智信人性所常行之也宋祁曰宋本無之字邵本有之夫承千歲之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理師古曰貪甚曰饕言行險曰詖饕音吐髙反詖音彼義反不示以大化而獨歐以刑罰終已不改師古曰􅀈與驅同故曰導之以禮樂而民和睦師古曰孝經載孔子之言也初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議㑹向病卒丞相大司空奏請立辟廱案行長安城南師古曰行音下更反營表未作遭成帝崩羣臣引以定謚孟康曰謚法曰安民立政曰成帝欲立辟廱未就而崩羣臣議諡引為美謂之成及王莽為宰衡欲燿衆庶遂興辟廱因以簒位海内畔之世祖受命中興撥亂反正師古曰謂後漢光武帝也改定京師于土中師古曰謂都洛陽即位三十年四夷賓服百姓家給政教清明師古曰給足也言家家皆足廼營立明堂辟廱顯宗即位李竒曰明帝曰顯宗躬行其禮宗祀光武皇帝于明堂養三老五更於辟廱李竒曰王者父事三老兄事五更詩云三夀作朋鄧展曰漢直以一公為三老用大夫為五更毋常人行禮乃置師古曰鄭𤣥說云三老五更謂老人更知三徳五事者也更音工衡反蔡邕以為更當為叟叟老人之稱也威儀既盛美矣然徳化未流洽者禮樂未具羣下無所誦說而庠序尚未設之故也孔子曰辟如為山未成一匱止吾止也師古曰論語載孔子之言匱者織草為器所以盛土也言為山欲成尚少一匱之土止而不為則其功終已不就如斯之人吾所不能教喻也辟讀曰譬今叔孫通所撰禮儀與律令同錄臧於理官師古曰古書懐藏之字本皆作臧漢書例為臧耳理官即法官也法家又復不𫝊劉攽曰法家當屬上句漢典寢而不著民臣莫有言者師古曰寢息也又通沒之後河間獻王采禮樂古事稍稍增輯至五百餘篇師古曰輯與集同今學者不能昭見但推士禮以及天子說義又頗謬異故君臣長㓜交接之道寖以不章師古曰寖漸也樂者聖人之所樂也而可以善民心其感人深其移風易俗易師古曰易音弋䜴反宋祁曰邵本於感人深上無其字故先王著其教焉師古曰著明也夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉師古曰言人之性感物則動也術道徑也心術心之所由也形見也是以纎微癄瘁一作衰之音作而民思憂師古曰癄瘁謂减縮也音子笑反劉攽曰樂聲無癄瘁當依禮讀為噍殺闡諧嫚易之音作而民康樂師古曰闡廣也諧和也嫚易言不急刻也易音弋豉反麤厲猛奮之音作而民剛毅師古曰麤厲抗厲也猛奮𤼵揚也麤古作麄字宋祁曰姚本改古作作字若云麤古麄字非是㢘直正誠之音作而民肅敬寛裕和順之音作而民慈愛師古曰裕饒也流辟邪散之音作而民淫亂先王恥其亂也師古曰辟讀曰僻故制雅頌之聲本之情性稽之度數制之禮儀師古曰稽考也合生氣之和導五常之行師古曰生氣隂陽之氣也導引也使之陽而不散隂而不集師古曰集謂聚滯也剛氣不怒柔氣不懾師古曰懾恐也音之渉反四暢交於中而發作於外師古曰暢通達也皆安其位而不相奪也宋祁曰景本舊無也字足以感動人之善心而不使邪氣得接焉宋祁曰善心而當作善心也是先王立樂之方也王者未作樂之時因先王之樂以教化百姓說樂其俗師古曰說樂其俗使和說而安樂也說讀曰恱樂音來各反然後改作以章功徳易曰先王以作樂崇徳殷薦之上帝以配祖考師古曰此豫卦象辭也殷盛大也上帝天也言王者作樂崇表其徳大薦於天而以祖考配饗之也昔黄帝作咸池顓頊作六莖帝嚳作五英師古曰嚳音酷堯作大章舜作招師古曰招讀曰韶下皆類此禹作夏湯作濩師古曰濩音護武王作武周公作勺勺言能勺先祖之道也師古曰勺讀曰酌酌取也武言以功定天下也濩言救民也夏大承二帝也師古曰夏大也二帝謂堯舜也招繼堯也師古曰韶之言紹故曰繼堯也大章章之也師古曰章明也五英英華茂也宋祁曰邵本英華無華字六莖及根莖也師古曰澤及下也咸池備矣師古曰咸皆也池言其包容浸潤也故云備矣自夏以徃其流不可聞已師古曰言歌頌皆亡也已語終辭殷頌猶有存者師古曰謂正考甫所得那以下是周詩既備師古曰謂雅頌皆得其所而其器用張陳周官具焉師古曰謂大司樂以下諸官所掌典者自卿大夫師瞽以下皆選有道徳之人師古曰師樂工瞽無目者朝夕習業以教國子國子者卿大夫之子弟也皆學歌九徳師古曰水火金木土榖謂之六府正徳利用厚生謂之三事六府三事謂之九功九功之徳皆可歌也故言九徳也誦六詩應劭曰六詩者詩有六義一曰風二曰賦三曰比四曰興五曰雅六曰頌習六舞五聲八音之和師古曰六舞謂帗舞羽舞䍿舞旄舞干舞人舞也五聲宫商角徵羽也八音金石絲竹匏土革木帗音弗䍿音皇故帝舜命夔曰女典樂教胄子師古曰虞書舜典所載也夔舜臣名胄子即國子也直而溫師古曰正直溫和也寛而栗師古曰寛大而敬栗剛而無虐師古曰剛毅而不害虐也簡而無敖師古曰簡約而無敖慢也敖讀曰傲宋祁曰簡約而無敖慢也無字當作不字詩言志歌咏言師古曰咏古詠字也在心為志𤼵言為詩咏永也永長也歌所以長言之聲依咏律和聲師古曰依助也五聲所以助歌也六律所以和聲也八音克諧師古曰諧亦和也自此以上皆帝舜之言此之謂也又以外賞諸侯徳盛而教尊者其威儀足以充目音聲足以動耳詩語足以感心故聞其音而徳和省其詩而志正師古曰省視也論其數而法立是以薦之郊廟則鬼神饗作之朝廷則羣臣和立之學官則萬民協聽者無不虚已竦神說而承流師古曰竦敬也說讀曰恱是以海内徧知上徳被服其風師古曰被音皮義反言䝉其風化若被而服之光煇日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰師古曰此周頌執競之詩也鍠鍠和也鏘鏘盛也穰穰多也言周王祭祖考之廟奏樂而八音和盛則神降之福至多也鍠音皇穰音人羊反書云擊石拊石百獸率舞師古曰虞書舜典也石謂磬也言樂之和諧也至於擊拊磬石則百獸相率而舞也宋祁曰和諧也應刪去也字鳥獸且猶感應而况於人乎况於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在師古曰言若周時尚有殷紂之餘聲是謂淫過凶嫚之聲為設禁焉世衰民散小人乗君子師古曰乗陵也心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂廼作淫聲用變亂正聲以說婦人師古曰今文周書泰誓之辭也說讀曰恱樂官師瞽抱其器而犇散或適諸侯或入河海師古曰犇古奔字論語云太師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海此志所云及古今人表所叙皆謂是也云諸侯者追繫其地非為當時已有國名而說論語者乃以為魯哀公時禮壊樂崩樂人皆去斯亦未允也夫六經殘缺學者異師文義競馳各守所見而馬鄭羣儒皆在班揚之後向歆博學又居王杜之前校其是非不可偏據其漢書所引經文與近代儒家徃徃乖别既自成義指即就而通之庶免守株以申賢逹之意非茍越異理固然也它皆類此宋祁曰文義競馳姚本作文義舛駮劉攽曰顔云追繫其地是謂周以前未有齊楚秦蔡也不亦謬乎夫樂本情性浹肌膚而臧骨髓雖經乎千載其遺風餘烈尚猶不絶至春秋時陳公子完犇齊師古曰完陳厲公子即敬仲也莊二十二年遇難出奔齊也陳舜之後招樂存焉故孔子適齊聞韶三月不知肉味曰不圗為樂之至於斯美之甚也師古曰事見論語周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯師古曰錯雜也孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所師古曰事亦見論語是時周室大壞諸侯恣行設兩觀乗大路應劭曰觀闕門邉兩觀也禮諸侯一觀大路天子之車陪臣管仲季氏之屬師古曰陪重也諸侯者天子之臣故其臣稱重臣也季氏魯桓公子季友之後専執國政而奢僭也三歸雍徹八佾舞廷師古曰三歸取三姓女也婦人謂嫁曰歸故曰三歸盖謂管仲耳雍樂詩也徹饌奏之八佾八列之舞皆僭天子禮也此謂季氏耳制度遂壞陵夷而不反師古曰陵夷漸頽替也觧在成帝紀及諸侯王表桑間濮上鄭衛宋趙之聲竝出應劭曰桑間衛地濮上濮水之上皆好新聲師古曰鄭衛宋趙諸國亦皆有淫聲内則致疾損夀外則亂政傷民巧偽因而飾之以營亂富貴之耳目師古曰營猶囘繞也庶人以求利列國以相間師古曰間音居莧反故秦穆遺戎而由余去應劭曰戎西戎也由余其賢臣也秦欲兼之遺以女樂由余諫而不聽遂去入秦齊人餽魯而孔子行師古曰餽亦饋字論語云齊人餽女樂季桓子受之三日不朝孔子行也至於六國魏文侯最為好古師古曰魏文侯本晉大夫畢萬之後僭諸侯者而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納師古曰事見禮之樂記自此禮樂喪矣漢興樂家有制氏服䖍曰魯人也善樂事也宋祁曰當刪也字以雅樂聲律世世在太樂官但能紀其鏗鎗鼓舞而不能言其義師古曰鏗鎗金石之聲也鏗音立耕反鎗音初庚反其下亦同髙祖時叔孫通因秦樂人制宗廟樂大祝迎神于廟門奏嘉至李竒曰嘉善也善神之至也猶古降神之樂也皇帝入廟門奏永至以為行歩之節猶古采薺肆夏也劉徳曰歌樂在逸詩師古曰薺音才私反禮經或作薋又作茨音竝同耳乾豆上奏登歌師古曰乾豆脯羞之屬獨上歌不以筦弦亂人聲欲在位者徧聞之猶古清廟之歌也登歌再終下奏休成之樂服䖍曰叔孫通所奏作也美神明既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂髙祖唐山夫人所作也服䖍曰髙帝姬也韋昭曰唐山姓也宋祁曰又有當刪又字周有房中樂宋祁曰周上有曰字至秦名曰夀人凡樂樂其所生禮不忘本髙祖樂楚聲故房中樂楚聲也孝惠二年使樂府令夏侯寛備其簫管更名曰安世樂髙祖廟奏武徳文始五行之舞孝文廟奏昭徳文始四時五行之舞孝武廟奏盛徳文始四時五行之舞武徳舞者髙祖四年作以象天下樂已行武以除亂也文始舞者曰本舜招舞也髙祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以眀示天下之安和也宋祁曰邵本以明示無明字蓋樂已所自作明有制也師古曰言自制作也樂先王之樂明有法也師古曰遵前代之法孝景采武徳舞以為昭徳以尊太宗廟至孝宣采昭徳舞為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行舞云髙祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武徳舞蘇林曰言昭容樂生於武徳舞劉奉世曰予謂主出者此舞出則主奏之故下文云出用樂者言舞不失節能以樂終也禮容者主出文始五行舞舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大氐皆因秦舊事焉師古曰氐歸也音丁禮反其後字或作抵音義竝同初髙祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝惠時以沛宫為原廟師古曰原重也言已有正廟更重立也皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已師古曰肄習也音弋二反至武帝定郊祀之禮祠太一於甘泉就乾位也師古曰言在京師之西北也祭后土於汾隂澤中方丘也師古曰汾水之旁土特堆起是澤中方丘也祭地以方象地形乃立樂府師古曰始置之也樂府之名盖起於此哀帝時罷之采詩夜誦師古曰采詩依古遒人徇路采取百姓謳謡以知政教得失也夜誦者其言辭或祕不可宣露故於夜中歌誦也宋祁曰歌誦下當添之字有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律吕以合八音之調作十九章之歌以正月上辛用事甘泉圜丘師古曰用上辛用周禮郊天日也辛取齊戒自新之義也為圜丘者取象天形也使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宫而望拜韋昭曰以竹為宫天子居中師古曰漢舊儀云竹宫去壇三里百官侍祠者數百人皆肅然動心焉安世房中歌十七章其詩曰劉敞曰按此言房中歌十七章推尋文理不見十七章疑本十二章譔為十七章也此言房中歌十七章今分别之大孝備矣一章八句七始華始一章十句我定歴數一章八句王侯秉徳一章七句其鄰翼翼鄰謂近臣也海内有姦一章八句大海蕩水所歸髙賢愉民所懷依註當有蕩蕩愉愉字大海蕩蕩一章六句安其所一章六句豐草葽一章八句雷震震一章十句桂華一章十句桂華馮馮翼翼此桂華前章之名也古詩皆有章名今此獨兩章存美芳一章八句磑磑即即一章八句嘉薦芳矣一章八句皇皇鴻明一章六句浚則師徳一章四句孔容之常一章八句承帝明徳一章八句大孝備矣休徳昭清髙張四縣樂充宫廷晉灼曰四縣樂四縣也天子宫縣師古曰謂設宫縣而髙張之縣古懸字芬樹羽林雲景杳㝠師古曰言所樹羽葆其盛若林芬然衆多仰視髙逺如雲日之杳㝠也金支秀華庶旄翠旌張宴曰金支百二十支秀華中主有華艷也旄鍾之旄也文穎曰析羽為旌翠羽為之也臣瓚曰樂上衆飾有流遡羽葆以黄金為支其首敷散若草木之秀華也師古曰金支秀華瓚說是也庶衆也庶旄翠旌謂析五采羽注翠旄之首而為旌耳七始華始肅倡和聲孟康曰七始天地四時人之始華始萬物英華之始也以為樂名如六英也師古曰肅敬也言歌者敬而唱諧和之聲神來宴娭庶幾是聽師古曰娭戲也言庶幾神來宴戲聽此樂也娭音許其反粥粥音送細亝人情晉灼曰粥粥敬懼貌也細微也以樂送神微感人情使之齊肅也師古曰粥音弋六反忽乗青𤣥熙事備成師古曰言還神禮畢忽登青天而去福熙之事皆備成也熙與禧同清思聈聈經緯冥冥蘇林曰聈音窈師古曰聈聈幽静也經緯謂經緯天地我定歴數人告其心師古曰言臣下各竭其心致誠慤也敕身齊戒施教申申應劭曰敕謹敬之貌師古曰齊讀曰齋乃立祖廟敬明尊親大矣孝熙四極爰轃師古曰熙亦福也四極四方極逺之處也爾雅曰東至於泰逺西至於邠國南至於濮鉛北至於祝栗謂之四極邠音彬轃字與臻同王侯秉徳其鄰翼翼師古曰鄰言徳不孤必有鄰也翼翼恭敬也顯明昭式清明鬯矣皇帝孝徳師古曰鬯古暢字暢通也竟全大功撫安四極海内有姦紛亂東北師古曰謂匈奴詔撫成師武臣承徳師古曰成師言各置部校師出以律也春秋左氏傳曰成師以出行樂交逆簫勺羣慝晉灼曰簫舜樂也勺周樂也言以樂征伐也師古曰言制定新樂教化流行則逆亂之徒盡交歡也慝惡也勺讀曰酌劉敞曰予謂逆迎也樂音洛言師行而和樂逺邇皆迎也肅為濟哉蓋定燕國師古曰匈奴服從則燕國安静無冦難也大海蕩蕩水所歸髙賢愉愉民所懷李竒曰愉愉懌也師古曰蕩蕩廣大貌也愉愉和樂貌也懐思也言海以廣大之故衆水歸之王者有和樂之徳則人皆思附也大山崔百卉殖民何貴貴有徳師古曰言大山以崔嵬之故能生養百卉明君以崇髙其徳故為萬姓所尊也崔音才回反安其所樂終産師古曰萬物各安其所而樂終其生也樂終産世繼緒師古曰言傳祚無窮飛龍秋游上天蘇林曰秋飛貌也師古曰莊子有秋駕之法者亦言駕馬騰驤秋秋然也揚雄賦曰秋秋蹌蹌入西園其義亦同讀者不曉秋義或改此秋字為秫稷之秫失之逺矣髙賢愉樂民人師古曰言王者有愉愉之徳故使衆人皆安樂豐草葽女羅施孟康曰葽音四月秀葽之葽盛貌也應劭曰女蘿兎絲也延于松栢之上異類而猶載之况同姓言族親不可不覆遇也譱何如誰能回師古曰回亂也言至徳之善上古帝皇皆不如之而不可干亂大莫大成教徳長莫長被無極師古曰被音皮義反次下亦同靁震震電燿燿明徳鄉治本約服䖍曰與臣民之約師古曰鄉方也言王者之威取象靁電明示徳義之方而治政本之約約讀曰要治本約澤𢎞大師古曰政教有常則恩惠溥洽加被寵咸相保師古曰言徳政所加人被寵渥則室家老㓜皆相保也徳施大世曼夀師古曰曼延也都荔遂芳窅窊桂華蘇林曰窅音窅晊之窅窊音窊下之窊孟康曰窅出窊入都良薜荔之香鼓動桂華也晉灼曰桂華似殿名次下言桂華馮馮翼翼承天之則言樹此香草以絜齊其芳氣乃達於宫殿也臣瓚曰茂陵中書歌都孋桂英美芳鼓行如此復不得為殿名師古曰諸家說皆未盡也此言都良薜荔俱有芬芳桂華之形窅窊然也皆謂神宫所有耳窅音一交反窊音一𤓰反宋祁曰諸家下添之字孝奏天儀若日月光師古曰言以孝道進承於天天神下降故有光宋祁曰有光下添也字乗𤣥四龍回馳北行羽旄殷盛芬哉芒芒師古曰芬亦謂衆多芒芒廣逺之貌孝道隨世我署文章師古曰署猶分部也一曰表也桂華馮馮翼翼承天之則師古曰馮馮盛滿也翼翼衆貌也吾易乆逺燭明四極晉灼曰易疆易也乆固也武帝自言拓境廣逺安固也師古曰此說非也乆猶長也自言疆易逺大耳非武帝時也不得云拓境慈惠所愛美若休徳師古曰若順也休亦美也杳杳㝠㝠克綽永福師古曰綽緩也亦謂延長也美芳磑磑即即師象山則孟康曰磑磑崇積也即即充實也師衆也則法也積實之盛衆類於山也師古曰磑音五回反劉奉世曰桂華美芳皆二詩章名本側注在前篇之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣嗚呼孝哉案撫戎國蠻夷竭歡象來致福李竒曰象譯也蠻夷遣譯致福貢也兼臨是愛終無兵革師古曰兼臨言在上位者普包容也嘉薦芳矣告靈饗矣告靈既饗徳音孔臧師古曰饗字合韻皆音鄉孔甚也臧善也惟徳之臧建侯之常承保天休令問不忘師古曰建侯封建諸侯也易屯卦曰利建侯休美也令善也問名也皇皇鴻明蕩侯休徳服䖍曰侯維也臣瓚曰天下蕩平惟帝之休徳嘉承天和伊樂厥福師古曰伊是也在樂不荒惟民之則師古曰則法也浚則師徳下民咸殖令問在舊孔容翼翼師古曰浚深也師衆也則法也殖生也舊乆也翼翼敬也言有深法衆徳故能生育羣黎乆有善名其容甚敬也孔容之常承帝之明師古曰帝謂天也下皆類此下民之樂子孫保光師古曰言永保其光寵也承順溫良受帝之光嘉薦令芳夀考不忘師古曰不忘言長乆也承帝明徳師象山則師古曰衆象山而為法言不騫不崩雲施稱民永受厥福師古曰言稱物平施其澤如雲也稱音尺孕反承容之常承帝之明下民安樂受福無疆師古曰疆竟也下皆類此郊祀歌十九章其詩曰練時日侯有望師古曰練選也􅌊膋蕭延四方李竒曰膋腸間脂也蕭香蒿也師古曰以蕭焫脂合馨香也四方四方之神也膋音來彫反焫音人說反九重開靈之斿師古曰天有九重言皆開門而來降厥福垂惠恩鴻祜休師古曰鴻大也祜福也休美也祜音怙靈之車結𤣥雲駕飛龍羽旄紛師古曰紛紛言其多靈之下若風馬師古曰言速疾也左倉龍右白虎師古曰以為衛靈之來神哉沛師古曰沛疾貌音補蓋反先以雨般裔裔師古曰先以雨言神欲行令兩先驅也般讀與班同班布也裔裔飛流之貌靈之至慶隂隂師古曰言垂隂覆徧於下相放􅜜震澹心師古曰放􅜜猶髣髴也澹動也放音昉􅜜音弗澹音大濫反靈已坐五音飭師古曰飭讀與敕字同謂整也虞至旦承靈億師古曰虞樂也億安也牲繭栗粢盛香尊桂酒賓八鄉應劭曰桂酒切桂置酒中也晉灼曰尊大尊也元帝時大宰丞李元記云以水漬桂為大尊酒師古曰繭栗言角之小如繭及栗之形也八鄉八方之神靈安留吟青黄服䖍曰吟音含師古曰服說非也吟謂歌誦也青黄謂四時之樂也徧觀此眺瑶堂應劭曰眺望也瑶石而似玉者也師古曰以瑶飾堂瑶音遥衆嫭竝綽竒麗孟康曰嫭音互嫭好也如淳曰嫭美目貌晉灼曰嫭音坼罅之罅師古曰孟說是也謂供神女樂竝好麗也顔如荼兆逐靡應劭曰荼野菅白華也言此竒麗白如荼也孟康曰兆逐靡者兆民逐觀而猗靡也師古曰菅茅也言美女顔貌如茅荼之柔也荼者今俗所謂蒹錐也荼音塗菅音姦靡合韻音武義反被華文厠霧縠曵阿錫佩珠玉如淳曰阿細繒錫細布也師古曰厠雜也霧縠言其輕細若雲霧也俠嘉夜茝蘭芳如淳曰佳俠皆美人之稱也嘉夜芳草也師古曰俠與挾同言懷挾芳草也茝即今白芷茝音昌改反澹容與獻嘉觴師古曰澹安也容與言閑舒也澹音大濫反練時日一帝臨中壇四方承宇師古曰言天神尊者來降中壇四方之神各承四字也壇字或作䄠讀亦曰壇字加示者神靈之耳下言紫壇嘉壇其義竝同繩繩意變備得其所應劭曰繩繩謹敬更正意也孟康曰衆多也臣瓚曰爾雅繩繩戒也師古曰瓚說是也清和六合制數以五張晏曰此后土之歌也土數五海内安寧興文匽武師古曰匽古偃字后土富媪昭明三光張晏曰媪老母稱也坤為母故稱媪海内安定富媪之功耳穆穆優游嘉服上黄孟康曰土色上黄也劉攽曰予謂此帝指天子耳後之制數以五即謂武帝改服色而尚黄數用五也言后土富媪者由漢以土徳也顔緣中壇故疑是祠祭但以堂壇諭中央耳帝臨二青陽開動根荄以遂臣瓚曰春為青陽師古曰草根曰荄遂者言皆生出也荄音該膏潤并愛跂行畢逮孟康曰跂音岐師古曰并兼也逮及也凡有足而行者稱跂行也霆聲發榮壧處頃聽晉灼曰壧穴也謂蟄蟲驚聽也師古曰壧與巖同言靁霆始𤼵草木舒榮則蟄蟲處巖崖者莫不頃聽而起頃讀曰傾枯槀復産廼成厥命師古曰枯槀謂草木經冬零落者也槀音口老反衆庶熙熙施及夭胎師古曰熙熙和樂貌也施延也少長曰夭在孕曰胎施音弋䜴反夭音烏老反羣生啿啿惟春之祺服䖍曰啿音湛湛露斯如淳曰祺福也師古曰啿啿豐厚之貌也音徒感反祺音其青陽三鄒子樂朱明盛長旉與萬物臣瓚曰夏為朱明師古曰旉古敷字也敷與言開舒也與音弋於反桐生茂豫靡有所詘師古曰桐讀為通茂豫美盛而光悅也言草木皆通逹而生美悅光澤各無所詘皆申遂也詘音丘物反劉攽曰桐幼稚也揚子云師哉師哉桐子之命敷華就實既阜既昌師古曰敷布也就成也阜大也昌盛也登成甫田百鬼廸嘗師古曰甫田大田也百鬼百神也廸進也嘗謂歆饗之也言此廸盛皆因大田而登成進於祀所而為百神所歆饗也廸音大歴反廣大建祀肅雍不忘神若宥之傳世無疆師古曰若善也宥祐也朱明四鄒子樂西顥沆碭秋氣肅殺韋昭曰西方少昊也師古曰沆音胡浪反碭音蕩沆碭白氣之貌也含秀垂穎續舊不廢師古曰五榖百草秀穎成實皆因舊苗無廢絶也不榮而實曰秀葉末曰穎廢合韻音𤼵姦偽不萌祅孽伏息隅辟越逺四貉咸服師古曰四貉猶言四夷辟讀曰僻貉音莫客反既畏兹威惟慕純徳附而不驕正心翊翊師古曰純大也言畏威懷徳者皆來賓附無敢驕怠盡䖍敬宋祁曰䖍敬下當添也字西顥五鄒子樂𤣥㝠陵隂蟄蟲蓋臧師古曰𤣥㝠北方之神也屮木零落抵冬降霜孟康曰抵至也至冬而降霜師古曰屮古草字宋祁曰抵作底易亂除邪革正異俗師古曰易變革改也兆民反本抱素懷樸條理信義望禮五嶽師古曰條分也暢也籍斂之時掩收嘉榖師古曰籍斂謂收籍田也𤣥㝠六鄒子樂惟泰元尊媼神蕃釐李竒曰元尊天也媼神地也祭天燔燎祭地瘞埋也師古曰李說非也泰元天也蕃多也釐福也言天神至尊而地神多福也蕃音扶元反釐讀曰禧經緯天地作成四時精建日月星辰度理隂陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒師古曰蕃多也滋益也循順也緒業也繼統共勤順皇之徳師古曰共讀曰恭皇皇天也此言天子繼承祖統恭勤為心而順天也鸞路龍鱗罔不肸飾蘇林曰肸音塈塗之塈塈飾也師古曰罔無也肸振也謂皆振整而飾之也肸音許乙反嘉籩列陳庶幾宴享師古曰嘉籩謂祭祀之籩實也木曰豆竹曰籩享字合韻宜音鄉滅除凶災烈騰八荒師古曰言威烈之盛踰於八荒鐘鼓竽笙雲舞翔翔招揺靈旗九夷賓將師古曰畫招揺於旗以征伐故稱靈旗將猶從也惟泰元七建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成臣瓚曰涓除也除惡選取美成者也天地並況惟予有慕師古曰況賜也爰熙紫壇思求厥路師古曰熙興也紫壇壇紫色也思求降神之路也恭承禋祀縕豫為紛孟康曰積聚脩飾為此紛華也師古曰緼音於粉反黼繡周張承神至尊師古曰白與黑畫為斧形謂之黼千童羅舞成八溢師古曰溢與佾同佾列也合好効歡虞泰一師古曰虞與娛同也九歌畢奏斐然殊鳴琴竽瑟會軒朱師古曰軒朱即朱軒也言總合音樂會於軒檻之前璆磬金鼓靈其有喜師古曰璆美玉名以為磬也喜合韻音許吏反百官濟濟各敬厥事宋祁曰邵本厥作其盛牲實爼進聞膏師古曰言以牲實爼以蕭焫脂則其芬馨逹於神所故曰盛牲實爼進聞膏神奄留臨須揺晉灼曰須揺須臾也師古曰奄讀曰淹長麗前掞光耀明孟康曰欲令神宿留言日雖暮長庚星在前扶助常有光明也掞或作扶晉灼曰掞即光炎字也臣瓚曰長麗靈烏也故相如賦曰前長麗而後矞皇舊說云鸞也張衡思𤣥賦亦曰前長麗使拂羽師古曰晉瓚二說是也麗音離掞音艷寒暑不忒況皇章晉灼曰況賜也皇君也章明也言長庚星終始不改其光神永以此賜明君也臣瓚曰忒差也寒暑不差言隂陽和也以此賜君章賢徳也師古曰瓚說是也展詩應律鋗玉鳴晉灼曰鋗鳴玉聲也師古曰鋗音火𤣥反函宫吐角激徵清𤼵梁揚羽申以商晉灼曰下有梁黄鼔員四人似新造音樂者姓名也師古曰晉說非也自函宫吐角以下總言五聲之備耳申重也發梁歌聲繞梁也函與含同造兹新音永欠長宋祁曰欠當作乆聲氣逺條鳳鳥鴹師古曰條達也鴹古翔字神夕奄虞蓋孔享師古曰虞樂也蓋語辭也孔甚也享合韻音鄉天地八丞相匡衡奏罷黼繡周張更定詩曰肅若舊典師古曰肅敬也若順也日出入安窮時世不與人同晉灼曰日月無窮而人命有終世長而夀短故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池徧觀是邪謂何晉灼曰言人夀不能安固如四海徧觀是乃知命甚促謂何當如之何也師古曰泊水貌也音歩各反又音魄吾知所樂獨樂六龍六龍之調使我心若應劭曰易曰時乗六龍以御天武帝願乗六龍仙而升天曰吾所樂獨乗六龍然御六龍得其調使我心若訾黄其何不徠下應劭曰訾黄一名乗黄龍翼而馬身黄帝乘之而仙武帝意欲得之曰何不來邪師古曰訾嗟歎之辭也黄乗黄也歎乗黄不來下也訾音咨日出入九太一況天馬下師古曰言此天馬乃太一所賜故來下也霑赤汗沬流赭應劭曰大宛馬汗血霑濡也流沬如赭也李竒曰沬音靧面之靧晉灼曰沬古靧字也師古曰沬沫兩通沬者言被面如頮也字從水傍午未之未音呼内反沫者言汗流沫出也字從水傍本末之末音亦如之然今書字多作沬面之沫也志俶儻精權竒籋浮雲晻上馳蘇林曰籋音躡言天馬上躡浮雲也師古曰晻音烏感反言晻然而上馳體容與迣萬里孟康曰迣音逝如淳曰迣超踰也晉灼曰古迾字師古曰孟音非也迣讀與厲同言能厲渡萬里也今安匹龍為友師古曰言今更無與匹者唯龍可為之友耳元狩三年馬生渥洼水中作天馬徠從西極渉流沙九夷服師古曰言九夷皆服故此馬逺來也徠古徃來字也天馬徠出泉水虎脊兩化若鬼應劭曰馬毛色如虎脊者有兩也師古曰言其變化若鬼神天馬徠歴無草徑千里循東道張晏曰馬從西而來東也師古曰言馬從西來經行磧鹵之地無草者凡千里而至東道天馬徠執徐時應劭曰太嵗在辰曰執徐言得天馬時歲在辰也孟康曰東方震為龍又青龍宿言以其方來也師古曰應說是也將揺舉誰與期如淳曰遥逺也揺或作遥師古曰如說非也言當奮揺髙舉不可與期也天馬徠開逺門竦予身逝昆侖應劭曰言天馬雖去人逺當豫開門以待之也文穎曰言武帝好仙常庶幾天馬來當乗之徃𤼵昆侖也師古曰文說是也天馬徠龍之媒應劭曰言天馬者乃神龍之類今天馬已來此龍必至之效也游閶闔觀玉臺應劭曰閶闔天門玉臺上帝之所居太初四年誅宛王獲宛馬作天馬十天門開詄蕩蕩如淳曰詄讀如迭詄蕩蕩天體堅清之狀也師古曰詄音大結反穆並騁以臨饗師古曰言衆神穆然方駕馳騁而臨祠祭光夜燭徳信著師古曰神光夜照應誠而來是徳信著明靈􅎊平而鴻長生豫師古曰神靈徳澤所浸溥博無私其福甚大故我得長生之道而安豫也大朱涂廣夷石為堂師古曰涂道路也夷平也言通神之路飾以朱丹又甚廣大平夷宻石累以為堂飾玉梢以舞歌體招揺若永望師古曰梢竿也舞者所持王梢以玉飾之也招揺申動之貌永長也梢音所交反招音韶望合韻音亡星留俞塞隕光師古曰俞荅也言衆星留神荅我饗薦降其光燿四面充塞也俞音踰照紫幄珠熉黄如淳曰熉音殞黄貌也師古曰紫幄饗神之幄也帳上四下而覆曰幄言光照紫幄故其珠色熉然而黄也熉音云幡比翄囬集貳雙飛常羊文穎曰舞者骨騰肉飛如鳥之囘翅而雙集也師古曰常羊猶逍遥也月穆穆以金波日華燿以宣明師古曰言月光穆穆若金之波流也宣徧也假清風軋忽激長至重觴師古曰軋忽長逺之貌也重觴謂累獻也神裴囘若留放殣冀親以肆章孟康曰殣音覲師古曰言神靈裴囘留而不去故我得覲見冀以親附而陳誠意遂章明之函䝉祉福常若期師古曰函包也蒙被也言為神所饗故能包含䝉被祉福應誠而至有常期也寂漻上天知厥時應劭曰言天雖寂漻髙逺而知我饗薦之時也漻音來朝反泛泛滇滇從髙斿應劭曰泛泛上浮之意也滇滇盛貌也晉灼曰滇音振旅闐闐師古曰音徒千反殷勤此路臚所求應劭曰臚陳也言所以殷勤此路乃欲陳所求也師古曰臚音力於反佻正嘉吉𢎞以昌如淳曰佻讀曰肇肇始也休嘉砰隱溢四方師古曰休美也嘉慶也砰普萌反砰隱盛意專精厲意逝九閡如淳曰閡亦陔也淮南子曰若士者謂盧敖曰吾與汗漫期乎九陔之上陔重也謂九天之上也師古曰閡合韻音改又音亥紛云六幕浮大海師古曰紛云興作之貌六幕猶言六合也天門十一景星顯見信星彪列如淳曰景星者徳星也見無常常出有道之國鎮星為信星居國益地師古曰謂彰著而為行列也象載昭庭日親以察師古曰象謂縣象也載事也縣象祕事昭顯於庭日來親近甚明察也劉攽曰象載則瑞應車也參侔開闔爰推本紀應劭曰參三也言景星光明開闔乃三於日月也晉灼曰侔等也開闔猶開闢也言今之鼎瑞參等於上世師古曰晉說是汾脽出鼎皇祐元始師古曰皇大也祜福也脽音誰祜音怙五音六律依韋饗昭師古曰依韋諧和不相乖離也饗讀曰響昭明也言聲響之明也雜變並會雅聲逺姚師古曰姚僄姚言飛揚也空桑琴瑟結信成張晏曰傳曰空桑為瑟一彈三歎祭天質故也師古曰空桑地名也出善木可為琴瑟也四興遞代八風生應劭曰四時遞代成隂陽八風以生也臣瓚曰舞者四縣代奏也左氏傳曰夫舞者所以節八音而行八風也師古曰瓚說是也八方之風謂東北曰條風東方曰明庶風東南曰清明風南方曰景風西南曰凉風西方曰閶闔風西北曰不周風北方曰廣莫風殷殷鐘石羽籥鳴師古曰殷殷聲盛也石謂磬也羽籥韶舞所持者也殷音隠河龍供鯉醇犧牲晉灼曰河龍夏之所賜者也供鯉給厨祭也師古曰醇謂色不雜也犧牲牛羊全體者也百末㫖酒布蘭生張晏曰百末末作之末也晉灼曰百日之末酒也芬香布刻若蘭之生也師古曰百末百草華之末也㫖美也以百草華末雜酒故香且美也事見春秋繁露宋祁曰百末作百米布刻作布列泰尊柘漿析朝酲應劭曰柘漿取甘柘汁以為飲也酲病酒也析觧也言柘漿可以觧朝酲也微感心攸通脩名師古曰言精微所應其心攸逺故得通逹成長乆之名周流常羊思所并師古曰周流猶周行也常羊猶逍遥也思所并思與神道合也下言合所思是也穰穰復正直徃寗師古曰穰穰多也復猶歸也直當也寗願也言獲福既多歸於正道克當徃日所願也復音扶目反寗合韻音寧馮蠵切和疏寫平晉灼曰馮馮夷河伯也蠵觜蠵龜屬也師古曰言馮夷命靈蠵使切厲諧和水神令之疏導川潦寫散平均無災也蠵音弋隨反又音携上天布施后土成穰穰豐年四時榮景星十二元鼎五年得鼎汾隂作齊房産草九莖連葉師古曰齊讀曰齊其下並同宫童効異披圗案諜臣瓚曰宫之童豎致此異瑞也蘇林曰諜譜第之也宋祁曰第之衍之字𤣥氣之精囘復此都師古曰𤣥天也言天氣之精囘旋反復於此雲陽之都謂甘泉也蔓蔓日茂芝成靈華師古曰蔓蔓言其長乆日以茂盛也齊房十三元封二年芝生甘泉齊房作后皇嘉壇立𤣥黄服師古曰壇祭壇也服祭服也物發冀州兆蒙祉福晉灼曰得寳鼎於汾隂也臣瓚曰汾隂屬冀州沇沇四塞徦狄合處孟康曰沇音兖師古曰沇沇流行之貌也徦狄逺夷也合處内附也徦即遐字耳其字從彳彳音丑益反經營萬億咸遂厥宇師古曰宇居也言我經營萬方億兆故得咸遂其居后皇十四華煜煜固靈根神之斿過天門車千乗敦昆侖師古曰敦讀曰屯屯聚也神之出排玉房周流雜拔蘭堂師古曰拔舎止也音歩曷反神之行旌容容騎沓沓般傱傱孟康曰傱音總晉灼曰音人相傱勇作惡師古曰容容飛揚之貌也沓沓疾行也般相連也傱傱衆也容音勇傱音總一曰容讀如本字傱音才公反神之徠泛翊翊甘露降慶雲集如淳曰天文志云若烟非烟若雲非雲郁郁紛紛是謂慶雲師古曰翊音弋入反又音立神之揄臨壇宇師古曰揄引也壇宇謂祭祠壇場及宫室言神引來降臨之也揄音踰九疑賓夔龍舞如淳曰九疑舜所葬言以舜為賓客也夔典樂龍管納言皆隨舜而來舞以樂神神安坐鴹吉時師古曰鴹古翔字也言神安坐囘翔皆趣吉時也共翊翊合所思師古曰共讀曰恭翊翊敬也神嘉虞申貳觴師古曰虞樂也貳觴猶重觴也福滂洋邁延長師古曰滂洋饒廣也滂音普郎反洋音羊又音祥沛施祐汾之阿師古曰沛音普大反沛然泛貌也阿水之曲隅揚金光横泰河師古曰横充滿也泰河大河也莽若雲增陽波師古曰莽雲貌言光明之盛莽莽然如雲也徧臚驩騰天歌師古曰臚陳也騰升也言陳其歡慶令歌上升於天華煜煜十五五神相包四鄰如淳曰五帝為太一相也師古曰包含也四鄰四方也土地廣揚浮雲扢嘉壇椒蘭芳孟康曰扢摩也師古曰音公忽反謂摩拭其壇加以椒蘭之芳璧玉精垂華光師古曰言禮神之璧乃玉之精英故有光華也益億年美始興師古曰言福慶方興起也交於神若有承師古曰言神來降臨故盡其肅恭廣宣延咸畢觴師古曰言徧延諸神咸歆祭祀畢盡觴爵也靈輿位偃蹇驤師古曰神既畢饗則嚴駕靈輿引其侍從之位偃蹇髙驤也蹇音居偃反卉汨臚析奚遺師古曰卉汨疾意也臚陳也析分也奚何也言速自陳列分散而歸無所留也汨音于筆反淫淥澤􅓭然歸師古曰淫久也淥澤澤名言我饗神之後乆在淥澤乃􅓭然而歸也淥音綠􅓭音烏黄反宋祁曰按淫淥澤􅓭然歸師古注似取義未安淥當是福祿之祿淫溢也言神之賜祿􅓭然廣溢然後歸而上天也五神十六朝隴首覽西垠臣瓚曰謂朝於隴首而覽西北也師古曰隴坻之首也垠厓也坻音丁禮反靁電尞獲白麟臣瓚曰尞祭五畤皆有報應聲若靁光若電也師古曰尞古燎字爰五止顯黄徳師古曰爰曰也𤼵語辭也止足也時白麟足有五蹏圖匈虐熏鬻殛應劭曰熏鬻匈奴本號也師古曰殛窮也一曰殛誅也音居力反闢流離抑不詳師古曰流離不得其所者為開道路使之安集違道不詳善者則抑黜之以申懲勸也賓百僚山河饗師古曰百僚百神之官也饗合韻音鄉掩囘轅鬗長馳如淳曰鬗音樠鬗鬗長貌也師古曰音武元反騰雨師洒路陂師古曰洒灑也路陂路傍也言使雨師灑道也洒音灑又音山跂反流星隕感惟風籋歸雲撫懷心師古曰懷心懷柔之心也籋音躡朝隴首十七元狩元年行幸雍獲白麟作象載瑜白集西服䖍曰象載鳥名也師古曰此說非也象載象輿也山出象輿瑞應車也瑜美貌也言此瑞車瑜然色白而出西方也西合韻音先食甘露飲榮泉師古曰駕輿者之所飲食也榮泉言泉有光華劉攽曰此詩四句先叙所見祥瑞之物也象載瑜黑車也白集西雍之麟也甘露榮泉天之所降地之所出也注非赤鴈集六紛員師古曰言六者所獲赤鴈之數也紛員多貌也言西獲象輿東獲赤鴈祥瑞多也員音云殊翁雜五采文孟康曰翁鴈頸也言其文采殊異也神所見施祉福登蓬萊結無極師古曰見顯示也蓬萊神山也在海中結成也象載瑜十八太始三年行幸東海獲赤鴈作赤蛟綏黄華蓋師古曰綏綏赤蛟貌黄華蓋言其上有黄氣狀若蓋也露夜零書晻濭師古曰晻音烏感反濭音靄晻濭雲氣之貌百君禮六龍位師古曰百君亦謂百神也勺椒漿靈已醉師古曰勺讀曰酌靈既享錫吉祥芒芒極降嘉觴師古曰芒芒廣大貌音莫郎反靈殷殷爛揚光師古曰殷殷盛也爛光貌殷音隱延夀命永未央沓㝠㝠塞六合澤汪濊輯萬國師古曰塞滿也輯和也天地四方謂之六合汪濊言饒多也濊音於廢反又音烏外反輯與集同靈禗禗象輿轙孟康曰禗音近枲不安欲去也轙待也如淳曰僕人嚴駕待𤼵之意也師古曰轙音儀禗孟音是也轙如說是也宋祁曰原本儀作蟻票然逝旗逶蛇師古曰票然輕舉意也逶蛇旗貌也票音匹遥反蛇音移禮樂成靈將歸託𤣥徳長無衰師古曰言託恃天徳冀獲長生無衰竭也赤蛟十九其餘廵狩福應之事不序郊廟故弗論是時河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之師古曰肄習也音弋二反歲時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述昔殷周之雅頌廼上本有娀姜嫄應劭曰簡狄有娀之女吞燕卵而生契師古曰姜嫄后稷之母也卨稷始生元王公劉古公太伯王季姜女太任太姒之徳師古曰卨殷之始祖稷周之始祖𤣥王亦殷之先祖承黑帝之後故曰𤣥王公劉后稷之曾孫也古公亶甫即豳公也太伯太王之子王季之兄也王季文王之父也姜女亶甫之妃也太任文王之母也太姒文王之妃武王之母也毛鄭說詩以𤣥王即卨也此志既言卨又有𤣥王則𤣥王非卨一人矣乃及成湯文武受命武丁成康宣王中興師古曰武丁殷王髙宗也周成王武王之子也康王成王之子也宣王厲王之子也下及輔佐阿衡周召太公申伯召虎仲山甫之屬師古曰阿衡伊尹職號也周周公旦也召召公奭也太公師尚父也申伯召虎仲山甫皆周宣王臣也君臣男女有功徳者靡不襃揚功徳既信美矣襃揚之聲盈乎天地之間是以光名著於當世遺譽垂於無窮也今漢郊廟詩歌未有祖宗之事八音調均又不協於鐘律而内有掖庭材人外有上林樂府皆以鄭聲施於朝廷至成帝時謁者常山王禹世受河間樂能說其義其弟子宋曅等上書言之師古曰曅音于輙反下大夫博士平當等考試當以為漢承秦滅道之後頼先帝聖徳博受兼聽修廢官立太學河間獻王聘求幽隱修興雅樂以助化時大儒公孫𢎞董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講師古曰講謂習也故自公卿大夫觀聽者但聞鏗鎗不䁱其意而欲以風諭衆庶其道無由師古曰風化也是以行之百有餘年徳化至今未成今曅等守習孤學大指歸於興助教化衰微之學興廢在人宜領屬雅樂以繼絶表微師古曰表顯也孔子曰人能𢎞道非道𢎞人師古曰論語載孔子之言河間區區小國藩臣師古曰區區小貌也以好學修古能有所存師古曰存意於禮樂民到于今稱之況於宋祁曰況於當作況以聖主廣被之資師古曰被猶覆也音皮義反修起舊文放鄭近雅述而不作信而好古於以風示海内揚名後世誠非小功小美也事下公卿以為乆逺難分明當議復寢是時鄭聲尤甚黄門名倡丙彊景武之屬富顯於世貴戚五侯定陵富平外戚之家師古曰五侯王鳳以下也定陵淳于長也富平張放淫侈過度至與人主爭女樂哀帝自為定陶王時疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧師古曰孫讀曰遜文巧則趍末背本者衆師古曰趍讀曰趣趣嚮也鄭衛之聲興則淫辟之化流師古曰辟讀曰僻也而欲黎庶敦朴家給猶濁其源而求其清流師古曰源水泉之本豈不難哉孔子不云乎放鄭聲鄭聲淫師古曰論語載孔子之言其罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏别屬他官丞相孔光大司空何武奏郊祭樂人員六十二人給祠南北郊大樂鼓員六人嘉至鼓員十人邯鄲鼓員二人騎吹鼓員三人江南鼓員二人淮南鼓員四人巴俞鼓員三十六人師古曰巴巴人也俞俞人也當髙祖初為漢王得巴俞人並趫㨗善鬭與之定三秦滅楚因存其武樂也巴俞之樂因此始也巴即今之巴州俞即今之渝州各其本地歌鼓員二十四人楚嚴鼓員一人梁皇鼓員四人臨淮鼓員三十五人兹邡鼓員三人晉灼曰邡音方凡鼓十二員百二十八人朝賀置酒陳殿下應古兵法外郊祭員十三人諸族樂人兼雲招給祠南郊用六十七人師古曰招讀與翹同兼給事雅樂用四人夜誦員五人剛别柎員二人給盛徳師古曰剛及别柎皆鼓名也柎音膚主調箎員二人師古曰箎以竹為之七孔亦笛之類也音池聽工以律知日冬夏至一人鐘工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人一人可罷師古曰竽笙類也三十六簧音于琴工員五人三人可罷柱工員二人一人可罷師古曰柱工主筝瑟之柱者繩弦工員六人四人可罷師古曰弦琴瑟之弦繩言主糾合作之也鄭四會員六十二人一人給事雅樂六十一人可罷張瑟員八人七人可罷安世樂鼓員二十人十九人可罷沛吹鼓員十二人族歌鼓員二十七人陳吹鼓員十三人商樂鼓員十四人東海鼓員十六人長樂鼓員十三人縵樂鼓員十三人師古曰縵樂雜樂也音漫凡鼓八員百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼓員六人常從倡三十人常從象人四人孟康曰象人若今戲蝦魚師子者也韋昭曰著假面者也師古曰孟說是詔隨常從倡十六人秦倡員二十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為樂楚四㑹員十七人巴四㑹員十二人銚四㑹員十二人李竒曰疑是鼗韋昭曰銚國名音繇師古曰韋說是也銚音姚齊四㑹員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十二人其七十二人給大官挏馬酒李竒曰以馬乳為酒撞挏乃成也師古曰挏音動馬酪味如酒而飲之亦可醉故呼馬酒也其七十人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲皆可罷奏可然百姓漸漬日乆又不制雅樂有以相變豪富吏民湛沔自若師古曰湛讀曰沈又讀曰耽自若言自如故也陵夷壞于王莽今海内更始民人歸本户口歲息師古曰今謂班氏撰書時也息生也平其刑辟牧以賢良至於家給既庶且富則須庠序禮樂之教化矣師古曰家給觧已在前庶衆也論語云孔子曰庶矣哉冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之故班氏引之也今幸有前聖遺制之威儀宋祁曰遺制下應添禮字誠可法象而補備之經紀可因緣而存著也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者百世可知也師古曰論語載孔子答子張之言也宋祁曰繼周者下當添一雖字今大漢繼周乆曠大儀未有立禮成樂此賈誼仲舒王吉劉向之徒所為𤼵憤而增嘆也師古曰感嘆也前漢書卷二十二前漢書卷二十二考證禮樂志六經之道同歸注師古云云監本於此卷脫注尤多今並從宋本補明聖者述作之謂也臣浩按自六經之道至此統論禮樂大致下文自王者必因前王之禮以下則禮志本文也自樂者聖人之所樂也以下則樂志本文也自今海内更始又統論禮樂以結前文監本于畫叚不明今遇起處另提行寫以通為奉常遂定儀法未盡備而通終王應麟曰叔孫通禮儀藝文志不載曹褒傳云章和元年正月召褒詣嘉徳門令小黄門持班固所上漢儀十二篇又王充論衡曰髙祖詔叔孫通制作儀品十六篇臣召南按通定朝儀及宗廟儀法具載本傳史記禮書曰叔孫通頗有增損大抵皆襲秦故自天子稱號下至佐僚及宫室官名少所變改為得其實賈公彦周禮疏乃謂通作漢禮器制度取法于周不知何所据也通所撰禮制後世罕見惟陳書沈文阿云叔孫定禮尤失前憲奠贄不珪致享無帛王公同璧鴻臚奏賀若此數事未聞于古又孔穎逹禮記疏曰髙祖時皇太子納妃叔孫制禮以為天子無親迎似其書尚有𫝊者不可觧也顓頊作六莖帝嚳作五英臣召南按六莖五英此與白虎通同又有稱五莖六英者周禮疏引樂緯曰顓頊之樂曰五莖帝嚳之樂曰六英又元結補古樂歌亦作五莖六英樂官師瞽抱其器而犇散注云云臣召南按此志本史記殷本紀言紂時太師少師持其祭樂器奔周班氏遂以論語實其事耳主出武徳舞注蘇林曰言昭容樂生於武徳舞隋志牛宏曰昭徳生于武徳猶古之昭夏禮容生于文始矯秦之五行臣召南按宏言矯秦之五行非也蓋禮容樂生于文始五行二舞也故本文云禮容主出文始五行舞乃立樂府注樂府之名蓋起于此王應麟曰惠帝時有樂府令夏侯寛更安世樂似非始于武帝顧炎武曰上既言孝惠二年云云下又言武帝云云此兩收而未貫通者也安世房中歌十七章臣浩按此猶郊祀歌十九章宜提行寫不與前文接連臣召南按周詩所謂房中樂者人倫始于夫婦故首以闗睢鵲巢漢安世房中歌直是祀神之樂故曹魏初改名正始之樂後因繆襲言又改名享神歌也注劉敞曰今分别之大孝備矣一章八句云云臣世駿按舊本監本俱以大孝備矣為一叚粥粥音送為一叚我定歴數為一叚豐草葽為一叚雷震震為一叚都荔遂芳為一叚桂華馮馮翼翼為一叚嘉薦芳矣為一叚皇皇鴻明至末為一叚判然九章與志所云十七章者數不相應今從劉敞分十七章章首俱提行寫施教申申監本訛甲申今從宋本改正建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成臣召南按監本以涓選休成為下章天地並况之首句又以肅若舊典為下章日出入安窮之首句此大誤也今改正又按衡所更定詩祗記其首句餘不𫝊泊如四海之池句徧觀是邪謂何句臣照按言人之夀命較之於日日如四海人如池也日行於天出東入西徧觀居此世者其謂之何作問之辭以起下文欲仙之意也晉灼注未明拔蘭堂注拔舎止也按如顔注則本文拔字應作召伯所茇之茇其餘廵狩福應之事不序郊廟故弗論臣召南按藝文志有泰一雜甘泉夀宫歌詩十四篇宗廟歌詩五篇是亦郊廟樂章也不知何以遺之前漢書卷二十二考證
