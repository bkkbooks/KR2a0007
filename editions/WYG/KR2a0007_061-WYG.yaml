body:
  text: 前漢書卷六十一漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注張騫李廣利傳第三十一張騫漢中人也師古曰陳夀益部耆舊傳云騫漢中成固人也宋祁曰也字疑可刪建元中為郎時匈奴降者言匈奴破月氏王師古曰月氏西域胡國也氏音支以其頭為飲器韋昭曰飲器椑榼也晉灼曰飲器虎子屬也或曰飲酒之器也師古曰匃奴傳云以所破月氏王頭共飲血盟然則飲酒之器是也韋云椑榼晉云獸子皆非也椑榼即今之偏榼所以盛酒耳非用飲者也獸子褻器所以溲便者也椑音鼙月氏遁而怨匈奴無與共撃之師古曰無人援助也漢方欲事滅胡聞此言欲通使道必更匈奴中師古曰更過也音工衡反廼募能使者騫以郎應募使月氏與堂邑氏奴甘父服䖍曰堂邑姓也漢人其奴名甘父師古曰堂邑氏之奴本胡人名甘父下云堂邑父者盖取主之姓以為氏而單稱其名曰父劉攽曰奴甘父直是此人名號耳非謂堂邑氏之奴名甘父也按胡人名字多以奴為號又後言堂邑父益知其人自氏堂邑名奴甘父也俱出隴西徑匈奴師古曰道由匈奴過匈奴得之傳詣單于單于曰月氏在吾北漢何以得徃使吾欲使越漢肯聼我乎留騫十餘歳予妻有子然騫持漢節不失居匈奴西騫因與其屬亡鄉月氏師古曰屬謂同使之官屬鄉讀曰嚮西走數十日師古曰走趨也不知其道里多少故以日數言之走音奏一曰走謂奔走也讀如本字至大宛大宛聞漢之饒財欲通不得見騫喜問欲何之騫曰為漢使月氏而為匃奴所閉道脫亡唯王使人道送我師古曰道讀曰導宋祁曰越本脫作今誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發譯道抵康居師古曰抵至也道讀曰導康居傳致大月氏大月氏王已為胡所殺立其夫人為王宋祁曰古本夫人字下有太子二字既臣大夏而君之師古曰以大夏為臣為之作君也地肥饒少㓂志安樂又自以逺逺漢殊無報胡之心師古曰下逺音于萬反騫從月氏至大夏竟不能得月氏要領李竒曰要領要契也師古曰李說非也要衣要也領衣領也凡持衣者則執要與領言騫不能得月氏意趣無以持歸於漢故以要領為喻要音一遥反留歳餘還竝南山欲從𦍑中歸師古曰竝音歩浪反復為匈奴所得留歳餘單于死國内亂騫與胡妻及堂邑父俱亡歸漢拜騫大中大夫堂邑父為奉使君騫為人彊力寛大信人師古曰彊力言堅忍於事蠻夷愛之堂邑父胡人善射窮急射禽獸給食師古曰給供也宋祁云古本胡字上有故字初騫行時百餘人去十三歳唯二人得還騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六宋祁云古本旁字下有有字具為天子言其地形所有師古曰土地之形及所生之物也語皆在西域傳騫曰臣在大夏時見卭竹杖蜀布臣瓚曰卭山名生此竹髙節可作杖服䖍曰布細布也師古曰卭竹杖人皆識之無假多釋而蘓林乃言節間合而體離誤後學矣問安得此大夏國人曰吾賈人徃市之身毒國鄧展曰一名篤李竒曰一名天篤則浮屠胡是也師古曰即敬佛道者宋祁云注文天篤古本作天竺身毒國在大夏東南可數千里其俗土著師古曰土著者謂有城郭常居不隨畜牧移徙也著音直略反其下亦同與大夏同而卑溼暑熱其民乘象以戰師古曰象大獸垂鼻長牙其國臨大水焉以騫度之師古曰度計也大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從𦍑中險𦍑人惡之少北則為匈奴所得從蜀宜徑又無冦師古曰徑直也宜猶當也從蜀向大夏其道當直宋祁云顔未注前古本宜作直天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵彊可以賂遺設利朝也師古曰設施也施之以利誘令入朝誠得而以義屬之師古曰謂不以兵革則廣地萬里重九譯致殊俗威徳徧於四海天子欣欣以騫言為然廼令因蜀犍為發間使數道竝出師古曰間使者求間隙而行出駹出莋出徙卭出僰師古曰皆夷種名駹音尨莋音材各反徙音斯僰音蒲北反宋祁云新本卭字上有出字皆各行一二千里其北方閉氐莋服䖍曰漢使見閉於夷也師古曰氐與莋二種也宋祁云越本無行字南方閉巂昆明師古曰巂昆明亦皆夷種名也巂音先橤反昆明之屬無君長善宼盗輙殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越而蜀賈間出物者或至焉服䖍曰滇音顛滇馬出其國師古曰間出物謂私徃市者於是漢以求大夏道始通滇國初漢欲通西南夷費多罷之及騫言可以通大夏廼復事西南夷師古曰事謂經略通之專以為事也騫以校尉從大将軍撃匈奴知水草處軍得以不乏劉敞曰水草處宜有知字宋祁云古本将軍下有數字淳化本無知字廼封騫為博望侯師古曰取其能廣博瞻望是歳元朔六年也後二年騫為衛尉與李廣俱出右北平撃匈奴匈奴圍李将軍軍失亡多而騫後期當斬贖為庶人是歳驃騎将軍破匈奴西邊殺數萬人至祁連山其秋渾邪王率衆降漢而金城河西竝南山至鹽澤空無匈奴師古曰竝音歩浪反匈奴時有候者到而希矣後二年漢擊走單于於幕北天子數問騫大夏之屬騫既失侯因曰臣居匈奴中聞烏孫王號昆莫昆莫父難兜靡本與大月氏俱在祁連敦煌閒小國也師古曰祁連山以東敦煌以西大月氏攻殺難兜靡奪其地人民亡走匈奴子昆莫新生傅父布就翖侯抱亡置草中服䖍曰傅父如傅母也李竒曰布就字也翖侯烏孫官名也為昆莫作傅父也師古曰翖侯烏孫大臣官號其數非一亦猶漢之將軍耳而布就者又翖侯之中别號猶右将軍左将軍耳非其人之字翖與翕同為求食還見狼乳之師古曰以乳飲之又烏銜肉翔其旁以為神遂持歸匈奴單于愛養之及壯以其父民衆與昆莫使将兵數有功時月氏已為匈奴所破西撃塞王師古曰塞音先得反西域國名即佛經所謂釋種者塞釋聲相近本一姓耳塞王南走逺徙月氏居其地昆莫既健自請單于報父怨遂西攻破大月氏大月氏復西走徙大夏地昆莫略其衆因留居兵稍彊㑹單于死不肯復朝事匈奴匈奴遣兵撃之不勝益以為神而逺之師古曰逺離也音于萬反今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遺公主為夫人結昆弟其勢宜聽師古曰言事事聽從於漢劉敞曰遺字當作遣宋祁曰作遣是則是斷匈奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎将将三百人馬各二匹牛羊以萬數齎金幣帛直數千鉅萬多持節副使師古曰為騫之副而各令持節道可便遣之旁國宋祁曰古本及浙本遣字下並有一遣字騫既至烏孫致賜諭指師古曰以天子意指曉告之未能得其決語在西域傳騫即分遣副使使大宛康居月氏大夏烏孫發譯道送騫師古曰道讀曰導與烏孫使數十人馬數十匹報謝師古曰與騫相随而來報謝天子因令窺漢知其廣大騫還拜為大行嵗餘騫卒後嵗餘宋祁曰古本騫卒字下複騫卒二字其所遣副使通大夏之屬者皆頗與其人俱來晉灼曰其國人於是西北國始通於漢矣然騫鑿空蘓林曰鑿開也空通也騫始開通西域道也師古曰空孔也猶言始鑿其孔穴也故此下言當空道而西域傳謂孔道也諸後使徃者皆稱博望侯以為質於外國李竒曰質信也外國由是信之其後烏孫竟與漢結婚初天子發書易鄧展曰發易書以卜宋祁曰古本作發易書曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云而漢始築令居以西臣瓚曰令居縣名也屬金城築塞西至酒泉也師古曰令音零初置酒泉郡以通西北國因益發使抵安息奄蔡犛靬條支身毒國李竒曰靬音軒服䖍曰犛靬張掖縣名也師古曰抵至也自安息以下五國皆西域胡也犛靬即大秦國也張掖驪靬縣盖取此國為名耳驪犛聲相近靬讀與軒同李竒音是也服說非也而天子好宛馬使者相望於道一軰大者數百人少者百餘人所齎操大放博望侯時師古曰操持也所齎持謂節及幣也放依也音甫徃反其後益習而衰少焉師古曰以其串習故不多發人漢率一嵗中使者多者十餘少者五六軰逺者八九嵗近者數嵗而反師古曰道逺則還遲近則來疾是時漢既滅越蜀所通西南夷皆震請吏置牂柯越巂益州沈黎文山郡欲地接以前通大夏李竒曰欲地界相接至大夏也廼遣使嵗十餘軰出此初郡師古曰文山以上初置者皆復閉昆明如淳曰為昆明所閉宋祁曰越本無皆字為所殺奪幣物於是漢發兵撃昆明斬首數萬後復遣使竟不得通語在西南夷傳自騫開外國道以尊貴其吏士爭上書言外國竒怪利害求使天子為其絶逺非人所樂聼其言師古曰凡人皆不樂去故有自請為使者即聼而遣之予節募吏民無問所從來為􅊀衆遣之以廣其道師古曰不為限禁逺近雖家人私𨽻竝許應募來還不能無侵盗幣物及使失指師古曰乖天子指意天子為其習之輙覆按致重罪師古曰言其串習不以為難必當更求充使也以激怒令贖師古曰令立功以贖罪復求使使端無窮而輕犯法其吏卒亦輙復盛推外國所有言大者予節言小者為副故妄言無行之徒皆爭相效其使皆私縣官齎物師古曰言所齎官物竊自用之同於私有欲賤市以私其利師古曰所市之物得利多者不盡入官也外國亦厭漢使人人有言輕重服䖍曰漢使言於外國人人輕重不實度漢兵逺不能至師古曰度計也而禁其食物以苦漢使師古曰令其困苦也漢使之絶責怨至相攻撃樓蘭姑師小國當空道師古曰空即孔也宋祁曰怨浙本作怒攻劫漢使王恢等尤甚而匈奴竒兵又時時遮撃之使者爭言外國利害師古曰言服之則利不討則為害皆有城邑兵弱易撃於是天子遣從票侯破奴師古曰趙破奴将屬國騎及郡兵數萬以撃胡胡皆去明年撃破姑師虜樓蘭王酒泉列亭鄣至玉門矣韋昭曰玉關關在龍勒界而大宛諸國發使随漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢應劭曰卵大如一二石􅜍也眩相詐惑也鄧太后時西夷檀國來朝賀詔令為之而諌大夫陳禪以為夷狄偽道不可施行後數日尚書陳忠案漢舊書乃知世宗時犛靬獻見幻人天子大悅與俱廵狩乃知古有此事師古日鳥卵如汲水之􅜍耳無一二石也應說失之眩讀與幻同即今吞刀吐火植𤓰種樹屠人截馬之術皆是也本從西域來􅜍音瓮宋祁曰如只曰大鳥則成一事當云大鳥及卵犛靬越本作黎軒者非又注文􅜍子按西域烏弋傳師古音甕於龍反汲水瓶也今雝與雍是一字同從瓦無容别音瓮必無二音亦當云一音瓮天子大說師古曰說讀曰恱而漢使窮河源其山多玉石采來臣瓚曰漢使采取持來至漢天子案古圖書名河所出山曰昆侖云是時上方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉師古曰視讀曰示言示之令其觀覽大角氐師古曰氐音丁禮反觧在武紀出竒戲諸怪物多聚觀者師古曰聚都邑人令觀看以誇示之觀音工喚反行賞賜酒池肉林令外國客徧觀各倉庫府臧之積欲以見漢廣大傾駭之師古曰見顯示及加其眩者之工而角氐竒戲嵗増變其益興自此始而外國使更來更去師古曰遞互來去前後不絶更音工衡反大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也漢使徃既多其少從率進孰於天子孟康曰少從不如計也或曰少者少年從行之微者也進孰美語如成孰也晉灼曰多進虛美之言必成之計於天子而卒不果也師古曰漢時謂随使而出外國者為少從總言其少年而從使也從音材用反事見班固與弟仲升書進孰者但空進成孰之言言大宛有善馬在貳師城匿不肯示漢使天子既好宛馬聞之甘心師古曰志懐美恱專事求之使壯士車令等持千金及金馬以請宛王貳師城善馬宛國饒漢物師古曰素有漢地財物故不貪金馬之幣相與謀曰漢去我逺而鹽水中數有敗服䖍曰水名道從水中行師古曰沙磧之中不生草木水又鹹苦即今敦煌西北惡磧者也數有敗言每自死亡也出其北有胡寇出其南之水草又且徃徃而絶邑師古曰近道處無城郭之居也乏食者多漢使數百人為軰來常之食死者過半是安能致大軍乎且貳師馬宛寳馬也遂不肯予漢使漢使怒妄言椎金馬而去如淳曰罵詈也師古曰椎破金馬也椎音直追反其字從木宛中貴人怒曰師古曰中貴人中臣之貴者漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人彊弩射之即破宛矣天子以嘗使浞野侯攻樓蘭以七百騎先至虜其王以定漢等言為然而欲侯寵姬李氏師古曰欲封其兄弟廼以李廣利為将軍伐宛騫孫猛字子游有俊才元帝時為光禄大夫使匃奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上産昌邑哀王太初元年以廣利為貳師将軍發屬國六千騎及郡國惡少年數萬人以徃師古曰惡少年謂無行義者期至貳師城取善馬故號貳師将軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成師古曰比音必寐反士財有數千皆飢罷師古曰財與才同罷讀曰疲攻郁成城郁成距之所殺傷甚衆貳師将軍與左右計至郁成尚不能舉况至其王都乎引而還徃來二嵗至敦煌士不過什一二師古曰十人之中一二人得還使使上書言道逺多乏食且士卒不患戰而患飢人少不足以㧞宛願且罷兵益發而復往師古曰益多也天子聞之大怒使使遮玉門闗曰軍有敢入斬之貳師恐因留屯敦煌其夏漢亡浞野之兵二萬餘於匈奴師古曰趙破奴後封浞野侯浞音土角反公卿議者皆願罷宛軍專力致胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使晉灼曰易輕也師古曰輪臺亦國名為外國笑廼案言伐宛尤不便者鄧光等師古曰案其罪而行罰赦囚徒扞宼盗如淳曰放囚徒使其扞禦㓂盗師古曰使從軍為斥候發惡少年及邊騎嵗餘而出敦煌六萬人師古曰興發部署嵗餘乃得行負私從者不與師古曰負私糧食及私從者不在六萬人數中也與讀曰豫牛十萬馬三萬匹驢橐駝以萬數齎糧兵弩甚設師古曰施張甚具也天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城師古曰空孔也徙其城下水者令從他道流不迫其城也空以穴其城者圍而攻之令作孔使穿穴也下云決其水原移之又云圍其城攻之皆再敘其事也一曰既徙其水不令於城下流而因其舊引水入城之孔攻而穴之益發戍甲卒十八萬酒泉張掖北置居延休屠以衛酒泉如淳曰立二縣以衛邊也或曰置二部都尉而發天下七科適師古曰適讀曰讁七科觧在武紀及載糒給貳師師古曰糒乾飯音備轉車人徒相連屬至敦煌師古曰屬音之欲反宋祁曰車當作運而拜習馬者二人為執驅馬校尉師古曰習猶便也一人為執馬校尉一人為驅馬校尉備破宛擇取其善馬云於是貳師後復行兵宋祁曰古無後字予謂後字當存為是多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城師古曰平行言無冦難兵到者三萬宛兵迎撃漢兵漢兵射敗之宛兵走入保其城貳師欲攻郁成城恐留行而令宛益生詐師古曰留行謂留止軍廢其行廼先至宛決其水原宋祁曰古本作源移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王毋寡匿善馬殺漢使師古曰毋寡宛王名今殺王而出善馬漢兵宜觧即不宋祁曰不字下當有觧字廼力戰而死未晚也宛貴人皆以為然共殺王其外城壊虜宛貴人勇将煎靡師古曰宛之貴人為将而勇者名煎靡也煎音子延反宛大恐走入中城相與謀曰漢所為攻宛以王毋寡持其頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聼我我盡殺善馬康居之救又且至至我居内康居居外與漢軍戰孰計之何從師古曰令貳師孰計之而欲攻戰乎欲不攻而取馬乎是時康居候視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其内食尚多計以為來誅首惡者毋寡毋寡頭巳至如此不許則堅守而康居候漢兵罷來救宛破漢軍必矣師古曰罷讀曰疲軍吏皆以為然許宛之約宛廼出其馬令漢自擇之而多出食食漢軍師古曰下食讀曰飤漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王服䖍曰蔡音楚言蔡師古曰昧音本末之末蔡音千曷反與盟而罷兵終不得入中城罷而引歸初貳師起敦煌西為人多道上國不能食師古曰起發也道上國近道諸國也食讀曰飤分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人别至郁成城宋祁曰成城古本浙本作都城守不肯給食申生去大軍二百里負而輕之師古曰負恃也恃大軍之威而輕敵人攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等數人脫亡走貳師師古曰走音奏貳師令搜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢巳破宛出郁成王與桀桀令四騎士縛守詣大将軍如淳曰時多别将故謂貳師為大将軍四人相謂郁成漢所毒師古曰言毒恨今生将卒失大事師古曰卒讀曰猝欲殺莫適先撃師古曰適主也無有主意先撃者也音丁歴反上邽騎士趙弟㧞劔撃斬郁成王桀等遂追及大将軍初貳師後行天子使使告烏孫大發兵撃宛烏孫發二千騎往持兩端不肯前貳師将軍之東師古曰東旋軍東出諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉軍還入玉門者萬餘人馬千餘匹後行非乏食戰死不甚多而将吏貪不愛卒侵牟之以此物故者衆師古曰侵牟言如牟賊之食苖也物故謂死也觧具在景紀及蘓武傳天子為萬里而伐不録其過廼下詔曰匈奴為害久矣今雖徙幕北與旁國謀共要絶大月氏使遮殺中郎将江故鴈門守攘危須以西及大宛皆合約殺期門車令服䖍曰危須國名也文頴曰漢使期門郎也車令姓名也中郎将朝及身毒國使隔東西道貳師将軍廣利征討厥罪伐勝大宛賴天之靈從泝河山渉流沙通西海山雪不積張晏曰是嵗雪少故得徃還喜得天人之應也師古曰從由也泝逆流而上也言路由山險又泝河也泝音素士大夫徑度師古曰言無屯難也獲王首虜珍怪之物畢陳於闕其封廣利為海西侯食邑八千戸又封斬郁成王者趙弟為新畤侯軍正趙始成功最多為光禄大夫上官桀敢深入為少府李哆有計謀為上黨太守師古曰哆音昌野反軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望孟康曰奮迅也自樂而行者以適過行者皆黜其勞師古曰適讀曰讁言以罪讁而行者免其所犯不叙功勞士卒賜直四萬錢師古曰或以他財物充之故云直伐宛再反師古曰再反猶今言兩廻凡四歳而得罷焉後十一歳征和三年貳師復将七萬騎出五原撃匈奴度郅居水師古曰郅音質兵敗降匈奴為單于所殺語在匈奴傳贊曰禹本紀言河出昆侖昆侖髙二千五百里餘日月所相避隱為光明也自張騫使大夏之後窮河原惡睹所謂昆侖者乎鄧展曰漢以窮河原於何見昆侖乎尚書曰道河積石是謂河原出於積石積石在金城河闗不言出昆侖也師古曰惡音烏故言九州山川尚書近之矣至禹本紀山經所有放哉如淳曰放蕩迂闊不可信也師古曰如說是也荀恱誤以放為效字因觧為不效盖失之矣前漢書卷六十一前漢書卷六十一考證張騫傳居匈奴西史記大宛傳作居匈奴中益寛立其夫人為王臣召南按史記作立其太子為王外國固時有女王然以下文推之似史記是去十三歳惟二人得還通鑑考異曰史記西南夷傳曰元狩元年張騫使大夏來言通身毒國之利按年表騫以元朔六年二月封博望侯必非元狩元年始歸也或者元狩元年始令騫通身毒國疑不能明大夏去漢萬二千里居西南史記作居漢西南此漢字似不可省出駹出莋出徙卭出僰史記作出駹出冉出徙出卭僰廼復事西南夷胡三省曰元朔四年罷西夷元狩元年復通西並南山至鹽澤臣召南按鹽澤即蒲昌海于闐及葱嶺二河之所滙也今名洛普池本與大月氏俱在祁連敦煌間小國也注師古曰祁連山以東敦煌以西臣召南按西域傳曰月氏逺去過大宛撃大夏而臣之其餘小衆不能去者保南山𦍑號小月氏然則本文祁連即指酒泉張掖金城之南山霍去病所奪者地在敦煌之東注當云祁連以西敦煌以東也騫即分遣副使使大宛康居月氏大夏大夏下史記有安息身毒于窴杅􅀢諸國而漢使窮河源此句下史記有河源出于窴五字而鹽水中數有敗胡三省曰裴矩西域記鹽水在西州髙昌縣東東南去𤓰州一千三百里並沙磧之地道路不可凖惟以人畜骸骨及駝馬糞為標騐由此數有死亡李廣利傳故浩侯王恢徐廣曰恢先受封一年坐使酒泉矯制國除臣召南按此王恢以撃破車師功封浩侯與元光中設計馬邑以大行令為将軍下獄死者不同此在後烏孫輪臺易苦漢使輪臺史記作侖頭貳師令搜粟都尉上官桀臣召南按外戚傳並不言左将軍桀從貳師伐宛有功則此搜粟都尉後為少府者另是一人百官公卿表太初元年搜粟都尉上官桀為少府年老免即合此傳而師古注乃謂疑此非上官桀表誤何哉左将軍上官桀與霍光同輔政者在此人後姓名偶同耳前漢書卷六十一考證
