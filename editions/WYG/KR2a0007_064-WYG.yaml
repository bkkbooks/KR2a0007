body:
  text: 前漢書卷六十四上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注嚴朱吾丘主父徐嚴終王賈傳第三十四上師古曰分嚴安以後為下卷嚴助會稽吳人嚴夫子子也張晏曰夫子嚴忌也或言族家子也師古曰亦云夫子之族子也郡舉賢良對策百餘人武帝善助對繇是獨擢助為中大夫後得朱買臣吾丘壽王司馬相如主父偃徐樂嚴安東方朔枚臯膠倉終軍嚴葱竒等並在左右是時征伐四夷開置邊郡軍旅數發内改制度朝廷多事婁舉賢良文學之士師古曰婁古屢字公孫𢎞起徒歩數年至丞相開東閤延賢人與謀議朝覲奏事因言國家便宜上今助等與大臣辯論中外相應以義理之文師古曰中謂天子之賔客若嚴助之輩也外謂公卿大夫也大臣數詘師古曰謂計議不如助等每詘服也音丘勿反其尤親幸者東方朔枚臯嚴助吾丘壽王司馬相如相如常稱疾避事朔臯不根持論上頗俳優畜之師古曰論議委隨不能持正如樹木之無根柢也唯助與壽王見任用而助最先進建元三年閩越舉兵圍東甌東甌告急於漢時武帝年未二十以問太尉田蚡蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬師古曰言不臣屬於中華於是助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也師古曰舉總也言總天下乃至京師皆棄也今小國以窮困來告急天子不振尚安所愬師古曰振舉也起也安焉也又何以子萬國乎師古曰子謂畜為臣子也上曰太尉不足與計吾新即位不欲出虎符發兵郡國廼遣助以節發兵會稽會稽守欲距法不為發師古曰以法距之為無符騐也助廼斬一司馬諭意指師古曰以天子意指曉告之遂發兵浮海救東甌未至閩越引兵罷後三歲閩越復興兵擊南越南越守天子約不敢擅發兵而上書以聞上多其義師古曰多猶重也大為發興遣兩將軍將兵誅閩越淮南王安上書諫曰陛下臨天下布德施惠緩刑罰薄賦歛哀鰥寡恤孤獨養耆老振匱乏盛德上隆和澤下洽近者親附遠者懷德天下攝然孟康曰攝安也音奴協反人安其生自以没身不見兵革今聞有司舉兵将以誅越臣安竊為陛下重之師古曰重難也越方外之地劗髮文身之民也晉灼曰淮南云越人劗髪張揖以為古翦字也師古曰劗與翦同張說是也不可以冠帶之國法度理也自三代之盛胡越不與受正朔師古曰與讀曰豫非彊弗能服威弗能制也以為不居之地不牧之民不足以煩中國也師古曰地不可居而民不可牧養也故古者封内甸服師古曰封内謂封圻千里之内也甸服主治王田以供祭祀也封外侯服師古曰封外千里之外也侯候也為王者斥候侯衛賓服服䖍曰侯服之外又有衞服賔賔見於王也侯衞二服同為賓也蠻夷要服師古曰又在侯衛之外而居九州之内也要言以文徳要來之耳音一遙反戎狄荒服師古曰此在九州之外者也荒言其荒忽絶遠來去無常也遠近埶異也自漢初定已來七十二年吳越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中服䖍曰竹叢也音皇師古曰竹田曰篁習於水鬬便於用舟地深昧而多水險師古曰昧暗也言多草木中國之人不知其埶阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里師古曰間中間也或八九百里或千里也阻險林叢弗能盡著師古曰不可盡載於圖也著音竹助反視之若易行之甚難天下賴宗廟之靈方内大寧戴白之老不見兵革師古曰戴白言白髪在首民得夫婦相守父子相保陛下之德也越人名爲藩臣貢酎之奉不輸大内應劭曰越國僻逺珍竒之貢宗廟之祭皆不與也大内都内也國家寶藏也師古曰百官公卿表云治粟屬官有都内令丞也一卒之用不給上事師古曰給供也自相攻擊而陛下發兵救之是反以中國而勞蠻夷也師古曰疲勞中國之人於蠻夷之地且越人愚戇輕薄負約反覆其不用天子之法度非一日之積也師古曰積久也壹不奉詔舉兵誅之臣恐後兵革無時得息也間者數年歲比不登民得賣爵贅子以接衣食如淳曰淮南俗賣子與人作奴婢名為贅子三年不能贖遂為奴婢師古曰贅質也一說云贅子者謂令子出就婦家為贅壻耳贅壻解在賈誼傳賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復師古曰生謂生業復音扶目反今發兵行數千里資衣糧入越地師古曰資猶齎輿轎而隃領服䖍曰轎音橋謂隘道輿車也臣瓚曰今竹輿車也江表作竹輿以行是也項昭曰陵絶水曰轎音旗廟反領山嶺也不通船車運轉皆擔輿也師古曰服音瓚說是也項氏謬矣此直言以轎過領耳何云陵絶水乎又旗廟之音無所依據隃與踰同劉攽曰按今南方竹輿正作旗廟音項亦未可全非柁舟而入水師古曰柁曵也音它行數百千里夾以深林叢竹水道上下擊石師古曰謂船觸石難以行也林中多蝮蛇猛獸師古曰蝮惡蛇也音敷福反解在田儋傳夏月暑時歐泄霍亂之病相隨屬也師古曰泄吐也音弋制反屬音之欲反曾未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍間忌將兵擊之文頴曰先臣淮南厲王長也間忌人姓名師古曰淮南王傳作簡忌此本作間轉寫字誤省耳以其軍降處之上淦蘇林曰淦音耿弇之弇師古曰音工含反後復反會天暑多雨樓船卒水居擊櫂師古曰言常居舟中水上而又有擊櫂行舟之役故多死也櫂音直孝反未戰而疾死者過半親老涕泣孤子謕號師古曰謕古啼字破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣臣聞軍旅之後必有凶年言民之各以其愁苦之氣薄陰陽之和感天地之精師古曰薄廹也而災氣為之生也陛下徳配天地明象日月恩至禽獸澤及草木一人有饑寒不終其天年而死者為之悽愴於心今方内無狗吠之警師古曰方内中國四方之内也而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開師古曰晏晚也言有兵難故邊城早閉而晚開也鼂不及夕師古曰鼂古朝字也言憂危亡不自保也臣安竊為陛下重之師古曰重難也不習南方地形者多以越為人衆兵彊能難邉城服䖍曰謂邊城作難也淮南全國之時多為邊吏師古曰全國謂未分為三之時也淮南人於邊為吏與越接境故知其地形也臣竊聞之與中國異師古曰言其風土不同限以髙山人迹所絶車道不通天地所以隔外内也其入中國必下領水領水之山峭峻漂石破舟師古曰言水流湍急石為之漂轉觸破舟船也漂音匹遙反不可以大船載食糧下也越人欲爲變必先田餘干界中韋昭曰越邑今鄱陽縣也積食糧廼入伐材治船邊城守候誠謹越人有入伐材者輒收捕焚其積聚雖百越奈邊城何宋祁曰浙本奈字上有無字且越人緜力薄材孟康曰緜音滅薄力也師古曰緜弱也言其柔弱如緜讀如本字孟說非也不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不能其水土也師古曰能堪也臣聞越甲卒不下數十萬所以入之五倍廼足師古曰不下言不減也漢軍多之五倍然後可入其地也輓車奉饟者不在其中師古曰輓引也音晚饟亦餉字南方暑溼近夏癉熱師古曰癉黄病音丁幹反暴露水居蝮蛇蠚生師古曰蠚毒也音壑宋祁曰浙本生作蟲疾癘多作宋祁曰景木癘作災兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡師古曰舉謂總取也臣聞道路言閩越王弟甲弑而殺之師古曰甲者閩王弟之名甲以誅死其民未有所屬陛下若欲來内處之中國使重臣臨存師古曰存謂省問之施德垂賞以招致之此必攜幼扶老以歸聖徳若陛下無所用之則繼其絶世存其亡國建其王侯以為畜越李竒曰如人畜飬六畜也師古曰直謂畜養之耳非六畜也此必委質為藩臣世共貢職師古曰共讀曰供陛下以方寸之印丈二之組填撫方外師古曰組者印之綬不勞一卒不頓一㦸師古曰頓壞也一曰頓讀曰鈍而威徳並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兎逃入山林險阻師古曰如雉兎之逃竄而入山林險阻之中背而去之則復相羣聚留而守之歴歲經年則士卒罷勌食糧乏絶師古曰罷讀曰疲勌亦倦字男子不得耕稼樹種婦人不得紡績織絍師古曰樹梢也機縷曰絍絍音人禁反丁壯從軍老弱轉餉師古曰餉亦饟字居者無食行者無糧民苦兵事亡逃者必衆隨而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠雎擊越張晏曰郡都尉姓屠名雎也又使監禄鑿渠通道張晏曰監郡御史也名祿越人逃入深山林叢不可得攻留軍屯守空地曠日持久宋祁曰越本持作引士卒勞勌越廼出擊之宋祁曰越本無廼字秦兵大破廼發適戍以備之師古曰適讀曰讁當此之時外内騷動百姓靡敝師古曰靡散也音縻行者不還往者莫反皆不聊生亡逃相從羣為盜賊於是山東之難始興此老子所謂師之所處荆棘生之者也師古曰老子道經之言也師旅行必殺傷士衆侵暴田畝故荒殘而生荆棘也兵者凶事一方有急四面皆從臣恐變故之生姦邪之作由此始也周易曰高宗伐鬼方三年而克之師古曰旣濟九三爻辭鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也師古曰校計也不敢與計强弱曲直如使越人蒙死徼幸以逆執事之顔行文頴曰顔行猶鴈行在前行故曰顔也師古曰䝉犯也行音胡郎反宋祁曰越本無死字厮輿之卒有一不備而歸者張晏曰厮微輿衆也師古曰厮析薪者輿主駕車者此皆言賤役之人雖得越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池師古曰八藪謂魯有大野晉有大陸秦有楊汙宋有孟諸楚有雲夢吳越之間有具區齊有海隅鄭有圃田生民之屬皆為臣妾人徒之衆足以奉千官之共師古曰千官猶百官也多言之耳共讀曰供租稅之收足以給乘輿之御玩心神明秉執聖道負黼依師古曰負背也白與黑畫為斧文謂之黼也依讀曰扆扆形如屏風而曲之畫以黼文張於户牖之間馮玉几師古曰馮讀曰凭南面而聽斷號令天下四海之内莫不嚮應師古曰嚮讀曰響陛下垂德惠以覆露之師古曰露謂使之沾潤澤也或露或覆言飬育也使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也師古曰維謂聨繫之夷狄之地何足以為一日之閒如淳曰得其地物不足為一日閒暇之虞也而煩汗馬之勞乎詩云王猶允塞徐方旣來師古曰大雅常武之詩猶道也允信也塞滿也既盡也言王道信充滿於天下則徐方淮夷盡來服也言王道甚大而遠方懷之也臣聞之農夫勞而君子養焉師古曰言農夫勤力於耕稼所得五榖以飬君子也愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邊境有警愛身之死而不畢其愚非忠臣也師古曰畢盡也盡言其意也臣安竊恐將吏之以十萬之師為一使之任也師古曰言漢發一使鎮撫之則越人賓服不煩兵往是時漢兵遂出踰領宋祁曰一本踰字上有未字適會閩越王弟餘善殺王以降漢兵罷上嘉淮南之意美將卒之功宋祁曰浙本卒作率廼令嚴助諭意風指於南越師古曰風讀曰諷以天子之意指諷告也宋祁曰一本南越下有王字南越王頓首曰天子廼幸興兵誅閩越死無以報即遣太子隨助入侍助還又諭淮南曰皇帝問淮南王使中大夫王上書言事聞之朕奉先帝之休德夙興夜寐明不能燭師古曰燭照也重以不德師古曰重音直用反是以比年凶葘害衆師古曰葘古災字夫以𦕈𦕈之身託于王侯之上内有饑寒之民南夷相攘師古曰攘謂相侵奪也音人羊反使邊騷然不安朕甚懼焉今王深惟重慮師古曰惟思也慮計也明太平以弼朕失稱三代至盛際天接地人迹所及咸盡賓服藐然甚慙如淳曰王之所言藐然聞之甚慙也師古曰藐謂遠也言不可及也藐音武卓反嘉王之意靡有所終師古曰靡無也終極也使中大夫助諭朕意告王越事助諭意曰今者大王以發屯臨越事上書陛下故遣臣助告王其事王居遠事薄遽不與王同其計如淳曰薄廹也言事迫不暇得先與王共議之或曰薄語助也師古曰薄迫是也遽速也音其据反朝有闕政遺王之憂師古曰朝政有闕乃使王有憂也遺猶與也陛下甚恨之夫兵固凶器明主之所重出也師古曰重難也然自五帝三王禁暴止亂非兵未之聞也漢為天下宗操殺生之柄師古曰操執持也音千髙反以制海内之命危者望安亂者卬治師古曰卬讀曰仰謂仰而望之今閩越王狼戾不仁師古曰狼性貪戾凡言狼戾者謂貪而戾殺其骨肉離其親戚所為甚多不義又數舉兵侵陵百越并兼鄰國以為暴彊陰計竒策入燔尋陽樓船師古曰漢有樓船貯在尋陽也欲招會稽之地以踐句踐之迹師古曰先是越王句踐稱霸中國今越王欲慕之句音功侯反今者邊又言閩王率兩國擊南越陛下為萬民安危久遠之計使人諭告之曰天下安寧各繼世撫民禁毋敢相并有司疑其以虎狼之心貪據百越之利或於逆順不奉明詔則會稽豫章必有長患且天子誅而不伐焉有勞百姓苦士卒乎師古曰王者之兵但行誅耳無有戰鬭故云不伐也故遣兩將屯於境上震威武揚聲鄉師古曰鄉讀曰響屯曾未會師古曰言兵未盡集天誘其𠂻閩王隕命輙遣使者罷屯毋後農時師古曰令及農時不待後也南越王甚嘉被惠澤䝉休德願革心易行身從使者入謝師古曰革改也有狗馬之病不能勝服師古曰服謂朝服也故遣太子嬰齊入侍病有瘳願伏北闕望大廷以報盛德閩王以八月舉兵於冶南蘇林曰山名也今名東冶屬會稽士卒罷倦師古曰罷讀曰疲三王之衆相與攻之因其弱弟餘善以成其誅至今國空虛遣使者上符節請所立不敢自立以待天子之明詔此一舉不挫一兵之鋒不用一卒之死而閩王伏辜南越被澤威震暴王義存危國此則陛下深計遠慮之所出也事效見前師古曰見顯也前謂目前故使臣助來諭王意於是王謝曰雖湯伐桀文王伐崇誠不過此臣安妄以愚意狂言陛下不忍加誅使使者臨詔臣安以所不聞師古曰先未聞者今得聞也誠不勝厚幸助由是與淮南王相結而還上大說師古曰說讀曰悅助侍燕從容師古曰從容閒語也從音千容反上問助居鄉里時助對曰家貧為友壻富人所辱師古曰友壻同門之壻上問所欲對願為㑹稽太守於是拜為會稽太守數年不聞問師古曰無善聲賜書曰制詔㑹稽太守君厭承明之廬張晏曰承明廬在石渠閣外直宿所止曰廬勞侍從之事懷故土師古曰懐思也出為郡吏會稽東接於海南近諸越師古曰越種非一故言諸北枕大江師古曰枕臨也間者濶焉久不聞問具以春秋對毋以蘇秦從横師古曰從音子容反助恐上書謝稱春秋天王出居于鄭不能事母故絶之師古曰周恵王之子襄王也弟叔𢃄有寵於惠后欲立之故襄王避難而出奔也僖二十四年經書天王出居於鄭公羊傳曰王者無外此其言出何不能乎母也臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最如淳曰舊法當使丞奉歲計今助自欲入奉也晉灼曰最凡要也詔許因留侍中有竒異輒使為文師古曰謂非常之文及作賦頌數十篇後淮南王來朝厚賂遺助交私論議及淮南王反事與助相連上薄其罪欲勿誅師古曰以其過為輕小廷尉張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市朱買臣字翁子吳人也家貧好讀書不治産業常艾薪樵賣以給食師古曰艾讀曰刈給供也擔束薪行且誦書其妻亦負戴相隨數止買臣毋歌嘔道中師古曰嘔讀曰謳音一侯反買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴宋祁曰浙本無富字今已四十餘矣女苦日久待我富貴報女功師古曰女皆讀曰汝妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聽去其後買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣饑寒呼飯飲之師古曰飯謂飤之音扶晚反飲音於禁反後數歲買臣隨上計吏為卒將重車至長安師古曰買臣身自充卒而與計吏将重車也載衣食具曰重車重音直用反詣闕上書書久不報待詔公車糧用乏上計吏卒更乞匄之師古曰更音工衡反乞音氣匄音工大反會邑子嚴助貴幸薦買臣召見說春秋言楚詞帝甚說之師古曰說讀曰悅拜買臣為中大夫與嚴助俱侍中是時方築朔方公孫𢎞諫以為罷敝中國師古曰罷讀曰疲上使買臣難詘𢎞語在𢎞傳後買臣坐事免久之召待詔是時東越數反覆買臣因言故東越王居保泉山師古曰泉山即今泉州之山也臨海去海十餘里保者保守之以自固也說者乃云保是地名失之矣一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也上拜買臣會稽太守上謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進師古曰須待也初買臣免待詔常從會稽守邸者寄居飯食師古曰飯音扶晚反拜為太守買臣衣故衣懷其印綬歩歸郡邸直上計時會稽吏方相與羣飲師古曰直讀曰值不視買臣買臣入室中守邸與共食食且飽少見其綬師古曰見顯示也守邸怪之前引其綬視其印會稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳師古曰誕大言也呼音火故反次下亦同守邸曰試來視之其故人素輕買臣者入視之還走疾呼曰實然坐中驚駭白守丞服䖍曰守邸丞也張晏曰漢舊郡國丞長吏與計吏俱送計也師古曰張說是也謂之守丞者繫太守而言也守音式授反相推排陳列中庭拜謁買臣徐出戸有頃長安廐吏乘駟馬車來迎張晏曰故事大夫乘官車駕駟如今州牧刺史矣買臣遂乘傳去師古曰傳音張戀反會稽聞太守且至發民除道縣吏並送迎車百餘乘入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之師古曰食讀曰飤居一月妻自經死買臣乞其夫錢令葬師古曰乞音氣悉召見故人與飲食諸嘗有恩者皆報復焉師古曰復音扶目反居歲餘買臣受詔將兵與横海將軍韓說等俱擊破東越師古曰說讀曰悅有功徵入為主爵都尉列於九卿數年坐法免官復為丞相長史張湯為御史大夫始買臣與嚴助俱侍中貴用事湯尚為小吏趨走買臣等前後湯以廷尉治淮南獄排陷嚴助買臣怨湯及買臣為長史湯數行丞相事知買臣素貴故陵折之買臣見湯坐牀上弗為禮師古曰言不動容以禮之也為音于偽反買臣深怨常欲死之師古曰致死以害之宋祁曰越本無深字後遂告湯陰事湯自殺上亦誅買臣買臣子山拊如淳曰拊音夫官至郡守右扶風吾丘壽王字子贛趙人也年少以善格五召待詔蘇林曰博之類不用箭但行梟散孟康曰格音各行伍相各故言各劉徳曰格五棊行簺法曰簺白乘五至五格不得行故云格五師古曰即今戲之簺也音先代反詔使從中大夫董仲舒受春秋髙材通明遷侍中中郎坐法免上書謝罪願養馬黄門上不許師古曰請於黄門供養馬之事後願守塞捍宼難復不許久之上疏願擊匈奴詔問狀壽王對良善復召為郎稍遷會東郡盗賊起拜為東郡都尉上以壽王爲都尉不復置太守是時軍旅數發年歲不熟多盗賊詔賜壽王璽書曰子在朕前之時知略輻湊師古曰言其無方而至若車輪之歸於轂以為天下少雙海内寡二及至連十餘城之守任四千石之重師古曰郡守都尉皆二千石以壽王為都尉不置太守兼總二任故云四千石也職事並廢盗賊從横師古曰從音子庸反甚不稱在前時何也壽王謝罪因言其狀後徵入為光祿大夫侍中丞相公孫𢎞奏言民不得挾弓弩十賊彍弩百吏不敢前張晏曰彍音郭師古曰引滿曰彍盜賊不輒伏辜免脫者衆害寡而利多此盜賊所以蕃也師古曰蕃亦多也音扶元反禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其埶必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議壽王對曰臣聞古者作五兵非以相害以禁暴討邪也師古曰五兵謂矛㦸弓劒戈安居則以制猛獸而備非常有事則以設守衛而施行陣及至周室衰微上無明王諸侯力政彊侵弱衆暴寡海内抏敝師古曰抏訛盡也音五官反巧詐並生是以知者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令師古曰以法令為首去仁恩而任刑戮師古曰去除也墮名城師古曰墮毁也音火規反殺豪桀銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊師古曰耰摩田之器也箠馬撾也梃大杖也耰音憂箠音之累反梃音大鼎反犯法滋衆盜賊不勝師古曰滋益也不勝言不可勝也至於赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭眀德建太平舉俊材興學官三公有司或由窮巷起白屋裂地而封師古曰白屋以白茅覆屋也壽王言此者并以譏公孫宏宇内日化方外鄉風師古曰鄉讀曰嚮然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也師古曰有四方捍禦之事孔子曰吾何執執射乎師古曰論語載孔子之言大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功師古曰小雅賔之初筵之詩也侯所以居的以皮為之天子射豹侯諸侯射熊侯卿大夫射麋侯士射鹿豕侯抗舉也射夫衆射者也同同耦也言既舉大侯又張弓矢分耦而射則獻其發矢中的之功也言貴中也師古曰中音竹仲反愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁師古曰抵觸也是擅賊威而奪民救也師古曰擅專也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相𢎞𢎞詘服焉及汾陰得寶鼎武帝嘉之薦見宗廟臧於甘泉宮羣臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎上聞之召而問之曰今朕得周鼎羣臣皆以為然壽王獨以為非何也有說則可無說則死壽王對曰臣安敢無說臣聞周德始乎后稷長於公劉大於太王師古曰公劉后稷曾孫也太王文王之祖則古公亶父也成於文武顯於周公德澤上昭天下漏泉師古曰昭明也漏言潤澤下霑如屋之漏無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周亦昭德顯行布恩施惠六合和同至於陛下恢廓祖業功德愈盛天瑞並至珍祥畢見昔秦始皇親出鼎於彭城而不能得天祚有德而寶鼎自出此天之所以與漢廼漢寶非周寶也上曰善羣臣皆稱萬歲是日賜壽王黄金十斤後坐事誅主父偃齊國臨菑人也學長短縱横術服䖍曰蘇秦法百家書說也師古曰長短解在張湯傳從横說在藝文志晚廼學易春秋百家之言游齊諸子間師古曰諸子諸侯王子諸儒生相與排儐不容於齊家貧假貣無所得師古曰貣音土得反北游燕趙中山皆莫能厚客甚困以諸侯莫足游者元光元年廼西入關見衛將軍師古曰衛青衛將軍數言上上不省資用乏留久諸侯賔客多厭之廼上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺策而功流萬世今臣不敢隱忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危師古曰司馬穰苴善用兵著書言兵法謂之司馬法一說司馬古主兵之官有軍陳用兵之法天下既平天子大愷應劭曰大愷周禮還師振旅之樂也春蒐秋獮諸侯春振旅秋治兵所以不忘戰也師古曰春為陽中其行木也秋為陰中其行金也金木兵器所資故於此時蒐獮治兵也蒐蒐索也取不孕者獮應殺氣也振整旅衆也獮音先淺反且怒者逆德也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之師古曰重難也夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也李竒曰不可和調也勝必棄之非民父母靡敝中國甘心匈奴師古曰靡散也音縻其下類此非完計也秦皇帝不聽遂使蒙恬將兵而攻胡郤地千里以河為境地固澤鹵不生五榖師古曰地多沮澤而鹹鹵然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其埶不可也又使天下飛芻輓粟師古曰運載芻槀令其疾至故曰飛芻也輓謂引車船也音晚起於黄腄琅邪負海之郡轉輸北河師古曰黄腄二縣名也並在東萊言自東萊及琅邪緣海諸郡皆令轉輸至北河也腄音直瑞反又音誰率三十鍾而致一石師古曰六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石至男子疾耕不足於糧餉師古曰餉亦饟字女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道死者相望師古曰道死謂死於路也盖天下始叛也及至高皇帝定天下略地於邊聞匈奴聚代谷之外而欲擊之御史成諌曰不可夫匈奴獸聚而鳥散從之如搏景師古曰摶擊也摶人之陰景言不可得也今以陛下盛德攻匈奴臣竊危之髙帝不聽遂至代谷果有平城之圍髙帝悔之廼使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺將師古曰覆音芳目反係虜單于適足以結怨深讎不足以償天下之費夫匈奴行盜侵敺所以為業天性固然師古曰來侵邊境而敺略人畜也敺與驅同其字從攴音普木反上自虞夏殷周固不程督師古曰程課也督視責也禽獸畜之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所疾苦也且夫兵久則變生事苦則慮易師古曰言思慮變易失其常也使邊境之民靡敝愁苦將吏相疑而外市張晏曰與外國交市已利若章邯之比也故尉佗章邯得成其私師古曰佗音徒何反而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用師古曰此周書者木尚書之餘願陛下孰計之而加察焉是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晩也師古曰言皆者各在何處宋祁曰皆字疑作比謂言比來在何處也若云皆安在則似淺而不雅廼拜偃樂安皆為郎中偃數上疏言事遷謁者中郎中大夫歲中四遷偃說上曰古者諸侯地不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為滛亂急則阻其彊而合從師古曰從音子容反以逆京師今以法割削則逆節萌起師古曰萌謂事之始生如草木之萌芽也前日朝錯是也今諸侯子弟或十數而適嗣代立師古曰適讀曰嫡餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計又說上曰茂陵初立天下豪桀兼并之家亂衆民皆可徙茂陵内實京師外銷姦猾此所謂不誅而害除上又從之尊立衛皇后及發燕王定國陰事偃有功焉大臣皆畏其口賂遺累千金或說偃曰大横師古曰横音胡孟反偃曰臣結髪游學四十餘年身不得遂師古曰遂猶逹也親不以為子昆弟不收賔客棄我我阨日久矣丈夫生不五鼎食死則五鼎亨耳張晏曰五鼎食牛羊豕魚麋也諸侯五卿大夫三師古曰五鼎亨之謂被鑊亨之誅吾日暮故倒行逆施之師古曰暮言年齒老也倒行逆施謂不遵常理此語本出伍子胥偃述而稱之偃盛言朔方地肥饒外阻河䝉恬築城以逐匈奴内省轉輸戍漕廣中國滅胡之本也上覽其說下公卿議皆言不便公孫𢎞曰秦時嘗發三十萬衆築北河終不可就師古曰就成也已而棄之朱買臣難詘𢎞遂置朔方本偃計也元朔中偃言齊王内有滛失之行師古曰失讀曰佚音尹一反上拜偃為齊相至齊徧召昆弟賔客散五百金予之數曰師古曰數責也數音所具反始吾貧時昆弟不我衣食賔客不我内門師古曰衣音於既反食讀曰飤内門謂内之於門中也今我相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門廼使人告王與姊姦事動王宋祁曰越本告作以王以為終不得脫恐效燕王論死廼自殺偃始為布衣時嘗游燕趙及其貴發燕事趙王恐其為國患欲上書言其陰事為居中不敢發及其為齊相出關即使人上書告偃受諸侯金以故諸侯子多以得封者及齊王以自殺聞宋祁曰浙本云及齊以王自殺聞上大怒以為偃劫其王令自殺廼徵下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫𢎞爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下廼遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以車為長者徐樂燕郡無終人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳渉無千乘之尊尺土之地宋祁曰越本尺作疆身非王公大人名族之後鄉曲之譽非有孔曾墨子之賢陶朱猗頓之富也然起窮巷奮棘矜師古曰棘㦸也矜者㦸之把也時秦銷兵器故但有㦸之把耳矜音巨巾反此下亦同偏袒大呼師古曰呼音火故反天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不脩此三者陳渉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地師古曰攘謂侵取漢地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳渉也當是之時先帝之德未衰而安土樂俗之民衆故諸侯無竟外之助師古曰竟讀曰境其下同此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之埶雖布衣窮處之士或首難而危海内師古曰首難謂首唱而作難也陳渉是也況三晉之君或存乎師古曰韓魏趙三國本共分晉故稱三晉天下雖未治也誠能無土崩之埶雖有彊國勁兵不得還踵而身為禽師古曰還讀曰旋吳楚是也況羣臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也閒者闗東五榖數不登宋祁曰浙本無數字年歲未復師古曰復音扶目反民多窮困重之以邊境之事師古曰重音直用反推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之埶也故賢主獨觀萬化之原明於安危之機脩之廟堂之上而銷未形之患也其要期使天下無土崩之埶而已矣故雖有彊國勁兵陛下逐走獸射飛鳥𢎞游燕之囿􅁋從恣之觀極馳騁之樂自若師古曰自若者言如其常無所廢損也從讀曰縱金石絲竹之聲不絶於耳帷幄之私俳優朱儒之笑不乏於前而天下無宿憂師古曰宿久也名何必夏子俗何必成康服䖍曰夏禹也子湯也湯子姓雖然臣竊以為陛下天然之質寛仁之資而誠以天下為務則禹湯之名不難侔而成康之俗未必不復興也師古曰侔等也此二體者立然後處尊安之實揚廣譽於當世親天下而服四夷餘恩遺德為數世隆南面背依攝袂而揖王八師古曰依讀曰扆已解於上此陛下之所服也師古曰服事也臣聞圖王不成其敝足以安師古曰言其敝末之法猶足自安也安則陛下何求而不得何威而不成奚征而不服哉師古曰奚何也前漢書卷六十四上前漢書卷六十四上考證嚴助傳獨擢助爲中大夫臣召南按助對策在建元元年膠倉臣召南按藝文志作聊蒼縱横家有待詔金馬聊蒼三篇班自注曰趙人武帝時又嚴葱竒志作莊怱竒官常侍郎有賦十一篇班自注曰枚臯同時盖其人本姓莊史因避明帝諱改為嚴猶莊忌莊助稱嚴忌嚴助也以問太尉田蚡通鑑考異曰是時蚡不為太尉云太尉誤也下云太尉不足與計盖亦追呼其官或亦誤耳必先田餘干界中注韋昭曰越邑臣召南按韋注非也餘干卽志所謂餘汗屬豫章郡非越邑也越人先於餘干縣接界之地治田耳閩越王弟甲注師古曰甲者閩王弟之名顧炎武曰卽下文所云閩越王弟餘善殺王以降者也當淮南王上書時不知其名故謂之甲猶云某甲耳師古注非朱買臣傳故東越王居保泉山注師古曰卽今泉州之山也臣召南按泉山今曰清源山在泉州府城北去海甚近而下文乃云今聞東越王更徙處南行去泉山五百里居大澤中然則所謂大澤中者卽大海中島嶼歟買臣入室中顧炎武曰卽㑹稽邸中也邸如今京師之會館受詔將兵與横海將軍韓說等臣召南按說出勾章浮海從東方往即前買臣所畫浮海直指泉山之策也吾邱壽王傳連十餘城之守地理志東郡領二十二縣都尉治東阿壽王時以都尉兼太守則並屬都尉矣主父偃傳元光元年廼西入關云云通鑑考異曰漢書謂元光元年三人上書按嚴安書云狥南夷朝夜郎降𦍑僰畧州其事皆在元光元年以後盖誤以朔字為光字耳轉輸北河胡三省曰河水逕安定北地朔方界皆北流至高闕始屈而東流過雲中楨林縣又屈而南流故朔方雲中之河謂之北河徐樂傳燕郡無終人也顧炎武曰地理志無燕郡而無終屬右北平考燕王定國以元朔二年秋有罪自殺國除而元狩六年夏四月始立皇子旦為燕王其間為燕郡者十年而志軼之也徐樂上書當在此時而無終於其時屬燕郡後改屬右北平耳前漢書卷六十四上考證欽定四庫全書前漢書卷六十四下漢蘭臺令史班固撰唐正議大夫行祕書少監瑯邪縣開國子顔師古注嚴朱吾丘主父徐嚴終王賈傳第三十四下師古曰此卷首尚載嚴朱吾丘主父徐者存其本書題目以示不變易也嚴安者臨菑人也以故丞相史上書曰臣聞鄒子曰師古曰鄒衍之書也政敎文質者所以云救也師古曰以救敝當時則用過則舍之師古曰非其時則廢置也有易則易之師古曰可變易者則易也故守一而不變者未睹治之至也今天下人民用財侈靡車馬衣裘宮室皆競修飾調五聲使有節族蘇林曰族音奏師古曰節止也奏進也雜五色使有文章重五味方丈於前以觀欲天下孟康曰觀猶顯也師古曰顯示之使其慕欲也彼民之情見美則願之是敎民以侈也侈而無節則不可贍師古曰贍足也民離本而徼末矣師古曰徼要求也音工堯反末不可徒得師古曰徒空也故搢紳者不憚為詐帶劒者夸殺人以矯奪師古曰夸大也競也矯偽也而世不知媿故姦軌浸長師古曰浸漸也夫佳麗珍怪固順於耳目故養失而泰樂失而滛禮失而采如淳曰采飾也師古曰采者文過其實也敎失而偽偽采􅁋泰非所以範民之道也師古曰範謂為之立法也是以天下人民逐利無已犯法者衆臣願為民制度以防其滛使貧富不相燿以和其心心旣和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則陰陽和四時正風雨時草木暢茂五榖蕃熟六畜遂字師古曰蕃多也遂成也字生也蕃音扶元反民不夭厲和之至也師古曰厲病也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起師古曰伯讀曰霸更音工衡反其下並同伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既没賢聖莫續天子孤弱號令不行諸侯恣行彊陵弱衆暴寡田常篡齊六卿分晉並為戰國此民之始苦也於是彊國務攻弱國修守合從連衡馳車轂擊師古曰車轂相擊言其衆多也從音子容反介胄生蟣蝨民無所告愬及至秦王蠶食天下并吞戰國稱號皇帝一海内之政壞諸侯之城銷其兵鑄以為鍾虡師古曰虡懸鍾者也解在賈山司馬相如傳示不復用元元黎民得免於戰國逢明天子人人自以爲更生師古曰言天下既免戰國之苦若逢明聖之主則可以更生而秦皇反為虐政以殘害也鄉使秦緩刑罰薄賦斂師古曰鄉讀曰嚮省繇役貴仁義賤權利上篤厚下佞巧變風易俗化於海内則世世必安矣秦不行是風循其故俗為知巧權利者進篤厚忠正者退法嚴令苛讇諛者衆師古曰讇古謟字日聞其美意廣心逸欲威海外使蒙恬將兵以北攻彊胡辟地進境師古曰辟讀曰闢戍於北河飛芻輓粟以隨其後又使尉屠睢將樓船之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絶越人擊之秦兵大敗秦乃使尉佗將卒以戍越當是時秦禍北構於胡南挂於越師古曰挂懸也宿兵於無用之地師古曰宿留也進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔陳勝吳廣舉陳師古曰舉謂起兵也武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然本皆非公侯之後非長官之吏師古曰長官謂一官之長也無尺寸之埶起閭巷杖棘矜應時而動不謀而俱起不約而同㑹壤長地進至乎伯王張晏曰長進益也師古曰言其稍稍攻伐進益土境以至彊大也長音竹两反伯讀曰霸時敎使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之彊不變之患也今狥南夷朝夜郎降羌僰畧薉州建城邑張晏曰薉貉也師古曰薉與穢同深入匈奴燔其龍城師古曰燔燒也龍城匈奴祭天處燔音扶元反議者美之此人臣之利非天下之長策也今中國無狗吠之警而外累於逺方之備靡敝國家師古曰累音力瑞反非所以子民也師古曰子謂養之如子也行無窮之欲甘心快意結怨於匈奴非所以安邊也禍挐而不解師古曰挐相連引也音女居反兵休而復起近者愁苦遠者驚駭非所以持久也今天下鍜甲摩劒矯箭控弦師古曰矯正曲使直也控引也轉輸軍糧未見休時此天下所共憂也夫兵多而變起宋祁曰多或作久事煩而慮生今外郡之地或幾千里師古曰幾音鉅依反次下亦同列城數十形束壤制孟康曰言其土地形埶足以束制其民帶脅諸侯師古曰帶者言諸侯之於郡守譬若佩帶謂輕小也脅謂其威力足以脅之也一曰帶在脅旁附著之義也非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也師古曰言不可盡諱者言必滅亡也後以安為騎馬令師古曰主天子之騎馬也騎音其寄反終軍字子雲濟南人也少好學以辯博能屬文聞於郡中師古曰屬音之欲反年十八選為博士弟子至府受遣師古曰博士弟子屬太常受遣者由郡遣詣京師太守聞其有異材召見軍甚竒之與交結軍揖太守而去至長安上書言事武帝異其文拜軍為謁者給事中從上幸雍祠五畤獲白麟一角而五蹄師古曰每一足有五蹄也時又得竒木其枝旁出輙復合於木上上異此二物博謀羣臣師古曰訪其徵應也軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚羣師古曰葭蘆也成長則曰葦葭音加正朔不及其俗有司臨境而東甌内附閩王伏辜南越賴救北胡隨畜薦居蘇林曰薦草也師古曰蘇說非也薦讀曰荐荐屢也言隨畜牧屢易故居不安住也左傳戎狄荐居者也宋祁曰注文中左字下當有氏字禽獸行虎狼心上古未能攝大將軍秉鉞單于犇幕師古曰犇古奔字票騎抗旌昆邪右衽師古曰抗舉也右衽從中國化也昆音下門反是澤南洽而威北暢也師古曰洽溥也暢達也若罰不阿近舉不遺逺設官竢賢縣賞待功師古曰竢古俟字次下亦同能者進以保祿罷者退而勞力師古曰罷讀曰疲謂不堪職任者也勞力歸農畝也刑於宇内矣師古曰刑法也言成法於宇内也一曰刑見也履衆美而不足懷聖明而不專師古曰言自謙也建三宫之文質章厥職之所宜服䖍曰三宫明堂辟雍靈臺也鄭氏曰於三宫班政敎有文質者也封禪之君無聞焉張晏曰前世封禪之君不聞若斯之美也夫天命初定萬事草創師古曰謂始受命之君也及臻六合同風九州共貫必待明聖潤色祖業傳於無窮師古曰潤色謂光飾之故周至成王然後制定而休徵之應見師古曰休美也徵證也陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宫師古曰燔祭天也瘞祭地也祭天則燒之祭地則薶之郊宫謂泰畤及后土也劉攽曰是時未有泰畤后土顔注失之獻享之精交神積和之氣塞明師古曰塞荅也明者明靈亦謂神也而異獸來獲宜矣昔武王中流未濟白魚入於王舟俯取以燎羣公咸曰休哉師古曰謂伐紂時解在董仲舒傳今郊祀未見於神祗而獲獸以饋師古曰以饋謂充祭爼也此天之所以示饗而上通之符合也宜因昭時令日改定告元張晏曰改元年以告神祗也師古曰昭明也令善也劉奉世曰軍此對頗可疑按紀獲麟在元狩元年昆邪降在二年其上對已大緩又史記封禪書元鼎三年有司始言元不宜以一二數乃云三元為狩盖於此年追述三元也而軍此云宜改元史又云由是改元有来降者皆可疑軍對非真史誤因之苴白茅於江淮發嘉號于營丘以應緝熙服䖍曰苴作席也張晏曰江淮職貢三脊茅為藉也孟康曰嘉號封禪也泰山在齊分野故曰營丘也或曰登封泰山以明姓號也師古曰苴音祖又音子豫反非苞苴之苴也使著事者有紀焉師古曰謂史官也紀記也蓋六鶂退飛逆也張晏曰六鶂退飛象諸侯畔逆宋襄公伯道退也白魚登舟順也張晏曰周木德也舟木也殷水德魚水物魚躍登舟象諸侯順周以紂畀武王也臣瓉曰時論者未以周為木殷為水也謂武王伐殷而魚入王舟象征而必獲故曰順也師古曰瓉說是也夫明闇之徵上亂飛鳥下動淵魚師古曰亂變也各以類推今野獸并角明同本也師古曰并合也獸皆兩角今此獨一故云并也衆支内附示無外也若此之應殆將有解編髮削左祍襲冠帶要衣裳而蒙化者焉師古曰要衣裳謂著中國之衣裳也編讀曰辮要音一遙反斯拱而竢之耳師古曰拱手而待之言其即至對奏上甚異之由是改元為元狩後數月越地及匈奴名王有率衆來降者時皆以軍言為中師古曰中音竹仲反元鼎中博士徐偃使行風俗師古曰行音下更反偃矯制師古曰矯託也託言受詔也使膠東魯國鼓鑄鹽鐵如淳曰鑄銅鐵扇熾火謂之鼔還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也師古曰顓與專同下亦類此湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘會之事安危之埶呼吸成變故有不受辭造命顓已之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘臧師古曰先有畜積正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地師古曰度計也音大各反率其用器食鹽不足以并給二郡邪將埶宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也師古曰贍足也今魯國之鼓當先具其備師古曰備者猶今言調度至秋乃能舉火此言與實反者非師古曰重問之偃已前三奏無詔師古曰不報聽也不惟所為不許師古曰惟思也而直矯作威福以從民望干名采譽師古曰干求也采取也此明聖所必加誅也枉尺直尋孟子稱其不可師古曰孟子孟軻也八尺曰尋孟子之書曰陳代問於孟子曰枉尺直尋若可為也孟子曰子過矣枉巳者未有能直人者也尋長而尺短故陳代言所直者多而所曲者少則可為之孟子以為茍有少曲則害於大直故不可也今所犯罪重所就者小師古曰就成也偃自予必死而為之邪師古曰予許也將幸誅不加欲以采名也師古曰幸冀也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史徵偃即罪師古曰徵召也即就也奏可上善其詰有詔示御史大夫初軍從濟南當詣博士歩入關關吏予軍繻張晏曰繻音須繻符也書帛裂而分之若劵契矣蘇林曰繻帛邊也舊關出入皆以傳傳煩因裂繻頭合以為符信也師古曰蘇說是也軍問以此何為吏曰為復傳師古曰復返也謂返出關更以為傳復音扶福反傳音張戀反次下亦同還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國師古曰行音下更反其後亦同劉奉世曰還當以合符還字宜屬上句建節東出關關吏識之曰此使者迺前棄繻生也軍行郡國所見便宜以聞還奏事上甚說師古曰說讀曰悅當發使使匈奴師古曰漢朝欲遣人為使於匈奴也軍自請曰軍無横草之功師古曰言行草中使草偃臥故云横草也得列宿衛食祿五年邊境時有風塵之警臣宜被堅執銳當矢石啓前行師古曰行音下郎反駑下不習金革之事今聞將遣匈奴使者臣願盡精厲氣奉佐明使畫吉凶於單于之前臣年少材下孤於外官師古也孤逺也外官謂非侍衛之臣也不足以亢一方之任師古曰亢當也音抗竊不勝憤懣詔問畫吉凶之狀上竒軍對擢為諫大夫南越與漢和親迺遣軍使南越說其王欲令入朝比内諸侯軍自請願受長纓必覊南越王而致之闕下師古曰言如馬覊也軍遂往說越王越王聽許請舉國内屬天子大說師古曰說讀曰悅賜南越大臣印綬壹用漢法以新改其俗令使者留填撫之師古曰填音竹刃反越相吕嘉不欲内屬發兵攻殺其王及漢使者皆死語在南越傳軍死時年二十餘故世謂之終童王襃字子淵蜀人也宣帝時修武帝故事講論六蓺羣書博盡竒異之好徵能為楚辭九江被公師古曰被姓也音皮義反召見誦讀益召高材劉向張子僑華龍栁襃等待詔金馬門師古曰華音戸化反神爵五鳯之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者勃海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於衆庶聞王襃有俊材請與相見使襃作中和樂職宣布詩師古曰中和者言政治和平也樂職者言百官各得其職也宣布者風化普洽無所不被選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武為僮子選在歌中師古曰汜音凡久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之襃既為刺史作頌師古曰即上中和樂職宣布詩也以美盛德故謂之頌也又作其傳師古曰解釋頌歌之義及作者之意益州刺史因奏襃有軼材師古曰軼與逸同上廼徵襃既至詔襃為聖主得賢臣頌其意襃對曰夫荷旃被毳者難與道純綿之麗宻師古曰純絲也謂織為繒帛之麗絲纊之宻也一說純綿不雜綿也羮藜唅糗者不足與論太牢之滋味服䖍曰唅音含師古曰糗即今之熬米麥所為者音丘九反又音昌少反今臣辟在西蜀師古曰辟讀曰僻生於窮巷之中長於蓬茨之下師古曰􅅫茨以蓬盖屋也茨音才私反無有遊觀廣覽之知顧有至愚極陋之累師古曰顧猶反也累音力瑞反不足以塞厚望應明指師古曰塞當也雖然敢不畧陳愚而抒情素師古曰抒猶泄也音食汝反記曰共惟春秋法五始之要服䖍曰共敬也張晏曰要春秋稱元年春王正月此五始也師古曰元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始是為五始共讀曰恭在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普師古曰趨讀曰趣普博也器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻應劭曰矻矻勞極貌如淳曰健作貌也師古曰如說是也矻音口骨反及至巧冶鑄干將之樸清水焠其鋒師古曰焠謂燒而内水中以堅之也鋒刅芒端也焠音千内反越砥斂其咢晉灼曰砥石出南昌故曰越也師古曰咢刃旁也音五各反宋祁曰别本注文砥字下無石字水斷蛟龍陸剸犀革師古曰剸截也音之兗反又音徒官反忽若彗汜畫塗師古曰彗帚也汜汜灑地也塗泥也如以帚埽汜灑之地以刀畫泥中言其易宋祁曰别本注文只一汜字如此則使離婁督繩公輸削墨張晏曰離婁黄帝時明目者也應劭曰公輸魯般性巧者也師古曰督察視也雖崇臺五增延袤百丈而不溷者工用相得也師古曰溷亂也音胡頓反庸人之御駑馬亦傷吻敝策而不進於行師古曰吻口角也策所以擊馬也匈喘膚汗人極馬倦及至駕齧䣛驂乗旦孟康曰良馬低頭口至䣛故曰齧䣛張晏曰駕則旦至故曰乘旦師古曰乗音食證反王良執靶張晏曰王良郵無恤字伯樂晉灼曰靶音霸謂轡也師古曰參驗左氏傳及國語孟子郵無恤郵良劉無止王良總一人也楚辭云驥躊躇於敝輦遇孫陽而得代王逸云孫陽伯樂姓名也列子云伯樂秦穆公時人考其年代不相當張說云良字伯樂斯失之矣韓哀附輿應劭曰世本韓哀作御師古曰宋衷云韓哀韓文侯也時已有御此復言作者加其精巧也然則善御者耳非始作也縱馳騁騖忽如景靡師古曰亂馳曰騖景靡者如光景之徙靡也過都越國蹶如歴塊師古曰如經歴一塊言其速疾之甚塊音口内反追奔電逐遺風師古曰吕氏春秋云遺風之乗言馬行尤疾每在風前故遺風於後今此言逐遺風則是風之遺逸在後者馬能逐及也周流八極萬里一息何其遼哉人馬相得也師古曰遼謂所行逺故服絺綌之涼者不苦盛暑之鬱燠師古曰鬱熱氣也燠温也音於六反襲貂狐之煗者不憂至寒之悽愴師古曰悽愴寒冷也煗音乃短反何則有其具者易其備賢人君子亦聖王之所以易海内也是以嘔喻受之應劭曰嘔喻和悅貌師古曰嘔音於付反開寛裕之路以延天下英俊也師古曰裕饒也夫竭知附賢者必建仁策索人求士者必樹伯迹師古曰伯讀曰霸昔周公躬吐捉之勞故有圄空之隆師古曰一飯三吐食一沐三捉髪以賔賢士故能成太平之化刑措不用囹圄空虚也齊桓設庭燎之禮故有匡合之功應劭曰有以九九求見桓公桓公不納其人曰九九小術而君不納之况大於九九者乎於是桓公設庭燎之禮而見之居無幾隰朋自逺而至齊桓遂以霸師古曰九九計數之書若今算經也匡謂一匡天下也合謂九合諸侯由此觀之君人者勤於求賢而逸於得人師古曰逸閑也人臣亦然昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠則上不然其信師古曰悃至也音口本反進仕不得施效斥逐又非其愆是故伊尹勤於鼎爼太公困於鼓刀師古曰勤於鼎爼謂負鼎爼以干湯也鼓刀謂屠牛於朝歌也百里自鬻寗子飯牛師古曰鬻賣也吕氏春秋云百里奚之未遇時也虞亡而虜縳鬻以五羊之皮公孫枝得而悅之獻諸穆公飯牛解在鄒陽傳鬻音弋六反離此患也師古曰離遭也及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術去卑辱奥渫而升本朝張晏曰奥幽也渫狎也汙也言敝奥渫汙不章顯也師古曰渫音先列反離疏釋蹻而享膏梁應劭曰離此疏食釋此木蹻也臣瓚曰以繩為蹻也師古曰蹻即今之鞋耳瓉說是也蹻音居畧反剖符錫壤而光祖考傳之子孫以資說士師古曰談說之士傳以為資也故世必有聖知之君而後有賢明之臣故虎嘯而風冽師古曰冽冽風貌也音列龍興而致雲蟋蟀竢秋唫蜉蝤出以隂孟康曰蜉蝤渠畧也師古曰蟋蟀今之促織也蜉蝤甲蟲也好叢聚而生也朝生而夕死蝤音由字亦作蝣其音同也易曰飛龍在天利見大人師古曰乾卦九五爻辭也言王者居正陽之位賢才見之則利用也詩曰思皇多士生此王國師古曰大雅文王之詩也思語辭也皇美也言美哉此衆多賢士生此周王之國也故世平主聖俊艾將自至師古曰艾讀曰乂若堯舜禹湯文武之君獲稷契臯陶伊尹吕望師古曰契讀與卨同字本作偰後從省耳明明在朝穆穆列布師古曰明明察也穆穆美也聚精會神相得益章師古曰章明也雖伯牙操遞鍾晉灼曰遞音遞送之遞二十四鍾各有節奏擊之不常故曰遞臣瓉曰楚辭云奏伯牙之號鍾號鍾琴名也馬融笛賦曰號鍾髙調伯牙以善鼓琴不聞說能擊鍾也師古曰琴名是也字既作遞則與楚辭不同不得即讀為號當依晉音耳宋祁曰景本作號鍾校作遞又注文中當字上當有遞字逢門子彎烏號師古曰逢門善射者即逢䝉也烏號弓名也並解在前也猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑師古曰巨亦大也沛音普大反宋祁曰越本遇作過其得意若此則胡禁不止曷令不行師古曰胡曷皆何也化溢四表横被無窮遐夷貢獻萬祥畢溱師古曰溱字與臻同是以聖主不徧窺望而視已明不單頃耳而聽已聰師古曰單盡極也頃讀曰傾恩從祥風翺德與和氣游師古曰翺翔也太平之責塞優游之望得師古曰塞滿也遵遊自然之埶恬淡無為之場休徵自至壽考無疆雍容垂拱永永萬年何必偃卬詘信若彭祖呴嘘呼吸如僑松如淳曰五帝紀彭祖堯舜時人列仙傳彭祖殷大夫也歴夏至商末號年七百師古曰信讀曰伸呴噓皆開口出氣也僑王僑松赤松子皆仙人也呴音許于反嘘音虚眇然絶俗離世哉師古曰眇然髙逺之意也詩云濟濟多士文王以寧師古曰亦文王之詩也濟濟盛貌也言文王能多用賢人故邦國得以安寧也盖信乎其以寧也是時上頗好神僊故襃對及之上令襃與張子僑等並待詔數從襃等放獵師古曰放士衆大獵也一曰游放及田獵所幸宫館輒為歌頌第其高下以差賜帛議者多以為滛靡不急上曰不有博奕者乎為之猶賢乎已師古曰此論語載孔子之辭也言博奕雖非道藝無事為之猶賢也奕今之圍碁也辭賦大者與古詩同義小者辯麗可喜師古曰喜好也音許吏反辟如女工有綺縠音樂有鄭衛師古曰辟讀曰譬今世俗猶皆以此虞說耳目師古曰虞與娱同說讀曰悅辭賦比之尚有仁義風諭師古曰風讀曰諷鳥獸草木多聞之觀賢於倡優博奕逺矣頃之擢襃為諫大夫其後太子體不安苦忽忽善忘不樂詔使襃等皆之太子宫虞侍太子師古曰之往也朝夕誦讀竒文及所自造作疾平復廼歸師古曰復音扶目反太子喜襃所為甘泉及洞簫頌師古曰喜音許吏反令後宫貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀致也宣帝使襃往祀焉襃於道病死上閔惜之賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門初武帝征南越元封元年立儋耳珠厓郡皆在南方海中洲居師古曰居海中之洲也水中可居者曰洲宋祁曰海字上當有大字廣袤可千里師古曰袤長也合十六縣戸二萬三千餘其民暴惡自以阻絶數犯吏禁吏亦酷之率數年壹反殺吏漢輒發兵擊定之自初為郡至昭帝始元元年二十餘年間凡六反叛至其五年罷儋耳郡并屬珠厓至宣帝神爵三年珠厓三縣復反反後七年甘露元年九縣反輒發兵擊定之元帝初元元年珠厓又反發兵擊之諸縣更叛連年不定師古曰更音工衡反上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠厓内屬為郡久矣今背畔逆節而云不當擊長蠻夷之亂虧先帝功德經義何以處之師古曰於六經之内當何者之科條也捐之對曰臣幸得遭明盛之朝蒙危言之策無忌諱之患師古曰危言直言也言出而身危故云危言論語稱孔子曰邦有道危言危行敢昧死竭卷卷師古曰卷讀與拳同臣聞堯舜聖之盛也禹入聖域而不優臣瓉曰禹之功德裁入聖人區域但不能優泰耳故孔子稱堯曰大哉韶曰盡善禹曰無間師古曰論語稱孔子曰大哉堯之為君也又曰韶盡美矣又盡善也又曰禹吾無間然矣韶舜樂名間音工莧反以三聖之德地方不過數千里西被流沙東漸于海朔南曁聲教迄于四海師古曰此引禹貢之辭漸入也一曰浸也朔北方也暨及也迄至也欲與聲教則治之不欲與者不彊治也師古曰與讀曰豫故君臣歌德師古曰言皆有德可歌頌含氣之物各得其宜武丁成王殷周之大仁也師古曰武丁殷之高宗然地東不過江黄西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻晉灼曰逺國使來因九譯言語乃通也張晏曰越不著衣裳慕中國化遣譯來著衣裳也故曰越裳也師古曰張說非也越裳自是國名非以襲衣裳始為稱號王充論衡作越甞此則不作衣裳之字明矣此非兵革之所能致及其衰也南征不還師古曰謂昭王也為楚所溺也齊桓捄其難師古曰謂襄王也初為太子而恵王欲立王子帶齊桓公為首止之盟以定太子之位事在左傳僖五年宋祁曰注文五年當作九年孔子定其文張晏曰孔子作春秋夷狄之國雖大自稱王者皆貶為子以至乎秦興兵逺攻宋祁曰郭本去乎字似兩通貪外虛内務欲廣地不慮其害然地南不過閩越北不過太原而天下潰畔禍卒在於二世之末師古曰卒終也長城之歌至今未絶賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事如淳曰常賦歲百二十歲一事時天下民多故出賦四十三歲而一事時有獻千里馬者詔曰鸞旗在前屬車在後師古曰鸞旗編以羽毛列繫橦旁載於車上大駕出則陳於道而先行屬車相連屬而陳於後也屬音之欲反吉行日五十里師行三十里朕乗千里之馬獨先安之師古曰安之言何所適往於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻當此之時逸游之樂絶竒麗之賂塞鄭衛之倡微矣宋祁曰浙本去求字賂字當作路夫後宫盛色則賢者隱處佞人用事則諍臣杜口而文帝不行故諡為孝文廟稱太宗至孝武皇帝元狩六年太倉之粟紅腐而不可食師古曰粟久腐壞則色紅赤也劉奉世曰元狩末漢以伐匈奴馬少不復出征矣捐之之云盖其誤也或者誤以建元為元狩歟都内之錢貫朽而不可校師古曰校謂數計也廼探平城之事師古曰追計其事故言探錄冒頓以來數為邊害籍兵厲馬因富民以攘服之師古曰攘却也宋祁曰一作籍兵厲馬越本作籍厲兵馬西連諸國至于安息東過碣石以𤣥莬樂浪為郡師古曰樂音洛浪音郎北郤匈奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐵酒𣙜之利以佐用度猶不能足當此之時寇賊並起軍旅數發父戰死於前子鬬傷於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭師古曰淚流被面以入於口故言飲泣也遙設虚祭想魂乎萬里之外淮南王盜寫虎符隂聘名士關東公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路如淳曰席音藉師古曰席即藉也不勞借音人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中師古曰擠墜也音子詣反又子奚反快心幽㝠之地非所以校助饑饉保全元元也宋祁曰校助當作救助詩云蠢爾蠻荆大邦為讎師古曰詩小雅采芑之詩也蠢動貌也蠻荆荆州之蠻也言敢與大國為讎敵也言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何况廼復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中師古曰顓與專同專專猶區區也一曰圜貌也霧露氣濕多毒草蟲虵水土之害人未見虜戰士自死又非獨珠厓有珠犀瑇瑁也師古曰瑇瑁文甲也瑇音代瑁音妹棄之不足惜不擊不損威其民譬猶魚鼈何足貪也臣竊以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡廼以少府禁錢續之師古曰少府錢主供天子故曰禁錢夫一隅為不善費尚如此況於勞師逺攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為師古曰為猶用也願遂棄珠厓專用恤關東為憂對奏上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵撃之連年䕶軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難揺動捐之議是上廼從之遂下詔曰珠厓虜殺吏民背畔為逆今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田師古曰辟讀曰避次下亦同通于時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉且宗廟之祭凶年不備況乎辟不嫌之辱哉今關東大困倉庫空虚無以相贍又以動兵非特勞民凶年隨之其罷珠厓郡民有慕義欲内屬便處之師古曰欲有來入内郡者所至之處即安置也不欲勿彊珠厓由是罷捐之數召見言多納用時中書令石顯用事捐之數短顯師古曰談說其長短以故不得官後稀復見而長安令楊興新以材能得幸與捐之相善捐之欲得召見謂興曰京兆尹缺使我得見言君蘭張晏曰楊興字京兆尹可立得興曰縣官甞言興瘉薛大夫張晏曰瘉勝也薛廣德為御史大夫師古曰瘉與愈同我易助也君房下筆言語妙天下師古曰於天下最為精妙耳使君房為尚書令勝五鹿充宗逺甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍張晏曰許嘉也期思侯並可為諸曹師古曰期思侯當是賁赫之後嗣也而表不載皆如言又薦謁者滿宣立為冀州刺史言中謁者不宜受事宦者不宜入宗廟立止相薦之信不當如是乎師古曰兾相薦之效當如前所言諸士見納用宋祁曰注文士字姚本作事興曰我復見言君房也捐之復短石顯興曰顯鼎貴如淳曰鼎音釘言方且欲貴矣師古曰方且是也讀如本字上信用之今欲進弟從我計師古曰弟但也且與合意即得入矣捐之即與興共為薦顯奏曰竊見石顯本山東名族有禮義之家也持正六年未甞有過明習於事敏而疾見出公門入私門師古曰言自公庭出即歸其家不妄交遊宜賜爵關内侯引其兄弟以為諸曹又共為薦興奏曰竊見長安令興幸得以知名數召見興事父母有曾氏之孝師古曰曾參也事師有顔閔之材師古曰顔囘閔子騫榮名聞於四方明詔舉茂材列侯以為首為長安令吏民敬鄉師古曰鄉讀曰嚮道路皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直張晏曰汲黯方直故世謂之汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絶私則尹翁歸興兼此六人而有之守道堅固執義不囘師古曰囘邪也臨大節而不可奪國之良臣也可試守京兆尹石顯聞知白之上廼下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懐詐偽以上語相風更相薦譽師古曰風讀曰諷更音工衡反欲得大位漏泄省中語罔上不道書曰讒說殄行震驚朕師師古曰虞書舜典之辭也言讒巧之說殄絶君子之行震驚我衆王制順非而澤不聽而誅師古曰禮記王制云行偽而堅言偽而辯學非而博順非而澤以疑衆殺謂人有堅為辯言不以誠質學於非道雖博無用飾非文過辭語順澤不聽教命有如此者皆誅殺也劉敞曰不聽而誅者即王制所云此四誅者不以聽耳何說不聽教命乎請論如法捐之竟坐棄市興減死罪一等髠鉗為城旦成帝時至部刺史贊曰詩稱戎狄是膺荆舒是懲師古曰魯頌閟宫之詩也膺當也懲創刈也言魯僖公與齊桓舉義兵北當戎狄南創荆蠻與羣舒以靖難久矣其為諸夏患也漢興征伐胡越於是為盛究觀淮南捐之主父嚴安之義深切著明師古曰究極也故備論其語世稱公孫𢎞排主父張湯陷嚴助石顯譛捐之察其行迹主父求欲鼎亨而得族嚴賈出入禁門招權利死皆其所也亦何排陷之恨哉前漢書卷六十四下前漢書卷六十四下考證嚴安傳顧炎武曰鄧伯羔謂安自姓嚴然藝文志曰莊安一篇是安亦姓莊也志之稱莊安班氏所未及改也史記之稱嚴安後人所追改也終軍傳大將軍秉鉞單于犇幕票騎抗旌昆邪右衽臣召南按此對在元狩元年冬十月行幸雍祠五畤獲白麟時也昆邪來降其事在二年秋終軍此時何以能預言耶當指元朔六年衛青率六將軍絶幕克獲而霍去病以票姚校尉立功封冠軍侯耳况去病至元狩三年始為票騎將軍在元年何以預言票騎疑票騎抗旌二語後人所改竄而班氏誤承用也王褒傳敢不畧陳愚文選愚字下有心字又虎嘯而洌風龍興而致雲文選作虎嘯而谷風洌龍興而致雲氣又獲稷契臯陶伊尹吕望下有之臣二字賈捐之傳珠厓由是罷臣召南按珠厓始為郡在武帝元鼎六年至元帝初元三年而罷凡立郡六十五歲前漢書卷六十四下考證
