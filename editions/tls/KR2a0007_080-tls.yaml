body:
  text: 何武王嘉師丹傳第五十六何武字君公蜀郡郫縣人也宣帝時天下和平四夷賓服神爵五鳳之間婁蒙瑞應而益州刺史王襄使辯士王襃頌漢德作中和樂職宣布詩三篇武年十四五與成都楊覆眾等共習歌之是時宣帝循武帝故事求通達茂異士召見武等於宣室上曰此盛德之事吾何足以當之哉以襃為待詔武等賜帛罷武詣博士受業治易以射策甲科為郎與翟方進交志相友光祿勳舉四行遷為鄠令坐法免歸武兄弟五人皆為郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商捕辱顯家顯怒欲以吏事中商武曰以吾家租賦繇役不為眾先奉公吏不亦宜乎武卒白太守召商為卒吏州里聞之皆服焉久之太僕王音舉武賢良方正徵對策拜為諫大夫遷揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已不服極法奏之抵罪或至死九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部錄囚徙有所舉以屬郡聖曰後進生何知乃欲亂人治皆無所決武使從事廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡而聖子賓客為群盜得繫廬江聖自以子必死武平心決之卒得不死自是後聖慚服武每奏事至京師聖未嘗不造門謝恩武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平行部必先即學官見諸生試其誦論問以得失然後入傳舍出記問墾田頃畝五穀美惡已乃見二千石以為常初武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之後壽為大司農其兄子為廬江長史時武奏事在邸壽兄子適在長安壽為具召武弟顯及故人楊覆眾等酒酣見其兄子曰此子楊州長史材能駑下未嘗省見顯等甚慚退以謂武武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隱逸乃當召見不可有所私問顯覆眾強之不得已召見賜卮酒歲中廬江太守舉之其守法見憚如此為刺史五歲入為丞相司直丞相薛宣敬重之出為清河太守數歲坐郡中被災害什四以上免久之大司馬曲陽侯王根薦武徵為諫大夫遷兗州刺史入為司隸校尉徙京兆尹二歲坐舉方正所舉者召見槃辟雅拜有司以為詭眾虛偽武坐左遷楚內史遷沛郡太守復入為廷尉綏和元年御史大夫孔光左遷廷尉武為御史大夫成帝欲修辟雍通三公官即改御史大夫為大司空武更為大司空封氾鄉侯食邑千戶氾鄉在琅邪不其哀帝初即位襃賞大臣更以南陽犨之博望鄉為氾鄉侯國增邑千戶武為人仁厚好進士獎稱人之善為楚內史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯力也世以此多焉然疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先為科例以防請託其所居亦無赫赫名去後常見思及為御史大夫司空與丞相方進共奏言往者諸侯王斷獄治政內史典獄事相總綱紀輔王中尉備盜賊今王不斷獄與政中尉官罷職并內史郡國守相委任所以壹統信安百姓也今內史位卑而權重威職相踰不統尊者難以為治臣請相如太守內史如都尉以順尊卑之序平輕重之權制曰可以內史為中尉初武為九卿時奏言宜置三公官又與方進共奏罷刺史更置州牧後皆復復故語在朱博傳唯內史事施行多所舉奏號為煩碎不稱賢公功名略比薛宣其材不及也而經術正直過之武後母在郡遣吏歸迎會成帝崩吏恐道路有盜賊後母留止左右或譏武事親不篤哀帝亦欲改易大臣遂策免武曰君舉錯煩苛不合眾心孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國後五歲諫大夫鮑宣數稱冤之天子感丞相王嘉之對而高安侯董賢亦薦武武由是復徵為御史大夫月餘徙為前將軍先是新都侯王莽就國數年上以太皇太后故徵莽還京師莽從弟成都侯王邑為侍中矯稱太皇太后指白哀帝為莽求特進給事中哀帝復請之事發覺太后為謝上以太后故不忍誅之左遷邑為西河屬國都尉削千戶後有詔舉大常莽私從武求舉武不敢舉後數月哀帝崩太后即日引莽入收大司馬董賢印綬詔有司舉可大司馬者莽故大司馬辭位辟丁傅眾庶稱以為賢又太后近親自大司徒孔光以下舉朝皆舉莽武為前將軍素與左將軍公孫祿相善二人獨謀以為往時孝惠孝昭少主之世外戚呂霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔幼主不宜令異姓大臣持權親疏相錯為國計便於是武舉公孫祿可大司馬而祿亦舉武太后竟自用莽為大司馬莽風有司劾奏武公孫祿互相稱舉皆免武就國後莽浸盛為宰衡陰誅不附己者元始三年呂寬等事起時大司空甄豐承莽風指遣使者乘傳案治黨與連引諸所欲誅上黨鮑宣南陽彭偉杜公子郡國豪桀坐死者數百人武在見誣中大理正檻車徵武武自殺眾人多冤武者莽欲厭眾意令武子況嗣為侯諡武曰刺侯莽篡位免況為庶人王嘉字公仲平陵人也以明經射策甲科為郎坐戶殿門失闌免光祿勳于永除為掾察廉為南陵丞復察廉為長陵尉鴻嘉中舉敦朴能直言召見宣室對政事得失超遷太中大夫出為九江河南太守治甚有聲徵入為大鴻臚徙京兆尹遷御史大夫建平三年代平當為丞相封新甫侯加食邑千一百戶嘉為人剛直嚴毅有威重上甚敬之哀帝初立欲匡成帝之政多所變動嘉上疏曰臣聞聖王之功在於得人孔子曰材難不其然與故繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也累世尊重然後士民之眾附焉是以教化行而治功立今之郡守重於古諸侯往者致選賢材賢材難得拔擢可用者或起於囚徙昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自冤使者覆獄劾敞賊殺人上逮捕不下會免亡命數十日宣帝徵敞拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有苟且之意其後稍稍變易公卿以下傳相促急又數改更政事司隸部刺史察過悉劾發揚陰私吏或居官數月而退送故迎新交錯道路中材苟容求全下材懷危內顧壹切營私者多二千石益輕賤吏民慢易之或持其微過增加成辠言於刺史司隸或至上書章下眾庶知其易危小失意則有離畔之心前山陽亡徒蘇令等從橫吏士臨難莫肯伏節死義以守相威權素奪也孝成皇帝悔之下詔書二千石不為縱遣使者賜金尉厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏有章劾事留中會赦壹解故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字乃下唯陛下留神於擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊略令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢為諫大夫遣之今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛修等皆故二千石有名稱天子納而用之會息夫躬孫寵等因中常侍宋弘上書告東平王雲祝詛又與后舅伍宏謀弒上為逆雲等伏誅躬寵擢為吏二千石是時侍中董賢愛幸於上上欲侯之而未有所緣傅嘉勸上因東平事以封賢上於是定躬寵告東平本章掇去宋弘更言因董賢以聞欲以其功侯之皆先賜爵關內侯頃之欲封賢等上心憚嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵眾庶匈匈咸曰賢貴其餘并蒙恩至今流言未解陛下仁恩於賢等不已宜暴賢等本奏語言延問公卿大夫傅士議郎考合古今明正其義然後乃加爵土不然恐大失眾心海內引領而議暴平其事必有言當封者在陛下所從天下雖不說咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封眾人歸咎於永先帝不獨蒙其譏臣嘉臣延材駑不稱死有餘責知順指不迕可得容身須臾所以不敢者思報厚恩也上感其言止數月遂下詔封賢等因以切責公卿曰朕居位以來寢疾未瘳反逆之謀相連不絕賊亂之臣近侍帷幄前東平王雲與后謁祝詛朕使侍醫伍宏等內侍案脈幾危社稷殆莫甚焉昔楚有子玉得臣晉文為之側席而坐近事汲黯折淮南之謀今雲等至有圖弒天子逆亂之謀者是公卿股肱莫能悉心務聰明以銷厭未萌之故賴宗廟之靈侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用德章厥善其封賢為高安侯南陽太守寵為方陽侯左曹光祿大夫躬為宜陵侯後數月日食舉直言嘉復奏封事曰臣聞咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬機箕子戒武王曰臣無有作威作福亡有玉食臣之有作威作福玉食害于而家凶于而國人用側頗辟民用僭慝言如此則逆尊卑之序亂陰陽之統而害及王者其國極危國人傾仄不正民用僭差不壹此君不由法度上下失序之敗也武王躬履此道隆至成康自是以後縱心恣欲法度陵遲至於臣弒君子弒父父子至親失禮患生何況異姓之臣孔子曰道千乘之國敬事而信節用而愛人使民以時孝文皇帝備行此道海內蒙恩為漢太宗孝宣皇帝賞罰信明施與有節記人之功忽於小過以致治平孝元皇帝奉大業溫恭少欲都內錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬嘗幸上林後宮馮貴人從臨獸圈猛獸驚出貴人前當之元帝嘉美其義賜錢五萬掖庭見親有加賞賜屬其人勿眾謝示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也雖遭初元永光凶年飢饉加有西羌之變外奉師旅內振貧民終無傾危之憂以府臧內充實也孝成皇帝時諫臣多言燕出之害及女寵專愛耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄不以私愛害公義故雖多內譏朝廷安平傳業陛下陛下在國之時好詩書上儉節徵來所過道上稱誦德美此天下所以回心也初即位易帷帳去錦繡乘輿席緣綈繒而已共皇寢廟比比當作憂閔元元惟用度不足以義割恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕引王渠灌園池使者護作賞賜吏卒甚於治宗廟賢母病長安廚給祠具道中過者皆飲食為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宮猶不至此賢家有賓婚及見親諸官並共賜及倉頭奴婢人十萬錢使者護視發取市物百賈震動道路讙譁群臣惶惑詔書罷菀而以賜賢二千餘頃均田之制從此墮壞奢僭放縱變亂陰陽災異眾多百姓訛言持籌相驚被髮徒跣而走乘馬者馳天惑其意不能自止或以為籌者策失之戒也陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣臣嘉幸得備位竊內悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎己之所獨鄉察眾人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜亂國亡軀不終其祿所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命於是上寖不說而愈愛賢不能自勝會祖母傅太后薨上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千戶及賜孔鄉侯汝昌侯陽新侯國嘉封還詔書因奏封事諫上及太后曰臣聞爵祿土地天之有也書云天命有德五服五章哉王者代天爵人尤宜慎之裂地而封不得其宜則眾庶不服感動陰陽其害疾自深今聖體久不平此臣嘉所內懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之損至尊以寵之主威已黜府藏已竭唯恐不足財皆民力所為孝文皇帝欲起露臺重百金之費克己不作今賢散公賦以施私惠一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常為之寒心今太皇太后以永信太后遺詔詔丞相御史益賢戶賜三侯國臣嘉竊惑山崩地動日食於三朝皆陰侵陽之戒也前賢已再封晏商再易邑業緣私橫求恩已過厚求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵罔陰陽失節氣感相動害及身體陛下寢疾久不平繼嗣未立宜思正萬事順天人之心以求福祐柰何輕身肆意不念高祖之勤苦垂立制度欲傳之於無窮哉孝經曰天子有爭臣七人雖無道不失其天下臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自劾愚戇數犯忌諱唯陛下省察初廷尉梁相與丞長史御史中丞及五二千石雜治東平王雲獄時冬月未盡二旬而相心疑雲冤獄有飾辭奏欲傳之長安更下公卿覆治尚書令鞫譚僕射宗伯鳳以為可許天子以相等皆見上體不平外內顧望操持兩心幸雲踰冬無討賊疾惡主讎之意制詔免相皆為庶人後數月大赦嘉奏封事薦相等明習治獄相計謀深沈譚頗知雅文鳳經明行修聖王有討功除過臣竊為朝廷惜此三人書奏上不能平後二十餘日嘉封還益董賢戶事上乃發怒召嘉詣尚書責問以相等前坐位不盡忠誠外附諸侯操持兩心背人臣之義今所稱相等材美足以相計除罪君以道德位在三公以總方略一統萬類分明善惡為職知相等罪惡陳列著聞天下時輒以自劾今又稱譽相等云為朝廷惜之大臣舉錯恣心自在迷國罔上近由君始將謂遠者何對狀嘉免冠謝罪事下將軍中朝者光祿大夫孔光左將軍公孫祿右將軍王安光祿勳馬宮光祿大夫龔勝劾嘉迷國罔上不道請與廷尉雜治勝獨以為嘉備宰相諸事並廢咎由嘉生嘉坐薦相等微薄以應迷國罔上不道恐不可以示天下遂可光等奏光等請謁者召嘉詣尉詔獄制曰票騎將軍御史大夫中二千石二千石諸大夫博士議郎議衛尉雲等五十人以為如光等言可許議郎龔以為嘉言事前後相違無所執守不任宰相之職宜奪爵土免為庶人永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖德重大臣刑辟廣延有司議欲使海內咸服嘉罪名雖應法聖王之於大臣在輿為下御坐則起疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誄之以行案嘉本以相等為罪罪惡雖著大臣括髮關械裸躬就笞非所以重國襃宗廟也今春月寒氣錯繆霜露數降宜示天下以寬和臣等不知大義唯陛下察焉有詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳冤相踵以為故事君侯宜引決使者危坐府門上主簿復前進藥嘉引藥杯以繫地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示萬眾丞相豈兒女子邪何謂咀藥而死嘉遂裝出見使者再拜受詔乘吏小車去蓋不冠隨使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉嘉對曰案事者思得實竊見相等前東平王獄不以雲為不當死欲關公卿示重慎置驛馬傳囚勢不得踰冬月誠不見其外內顧望阿附為雲驗復幸得蒙大赦相等皆良善吏臣竊為國惜賢不私此三人獄吏曰苟如此則君何以為罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然卬天歎曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死帝舅大司馬票騎將軍丁明素重嘉而憐之上遂免明以董賢代之語在賢傳嘉為相三年誅國除死後上覽其對而思嘉言復以孔光代嘉為丞相徵用何武為御史大夫元始四年詔書追錄忠臣封嘉子崇為新甫侯追諡嘉為忠侯師丹字仲公琅邪東武人也治詩事匡衡舉孝廉為郎元帝末為博士免建始中州舉茂材復補博士出為東平王太傅丞相方進御史大夫孔光舉丹論議深博廉正守道徵入為光祿大夫丞相司直數月復以光祿大夫給事中由是為少府光祿勳侍中甚見尊重成帝末年立定陶王為皇太子以丹為太子太傅哀帝即位為左將軍賜爵關內侯食邑領尚書事遂代王莽為大司馬封高樂侯月餘徙為大司空上少在國見成帝委政外家王氏僭盛常內邑邑即位多欲有所匡正封拜丁傅奪王氏權丹自以師傅居三公位得信於上上書言古者諒闇不言聽於冢宰三年無改於父之道前大行尸柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縱不能明陳大義復曾不能牢讓爵位相隨空受封侯增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理陰陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至德以壯年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖德當合天人之功臣聞天威不違顏咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀群下之從化天下者陛下之家也胏附何患不富貴不宜倉卒先帝不量臣愚以為太傅陛下以臣託師傅故亡功德而備鼎足封大國加賜黃金位為三公職在左右不能盡忠補過而令庶人竊議災異數見此臣之罪也臣不敢言乞骸骨歸於海濱恐嫌於偽誠慚負重責義不得不盡死書數十上多切直之言初哀帝即位成帝母稱太皇太后成帝趙皇后稱皇太后而上祖母傅太后與母丁后皆在國邸自以定陶共王為稱高昌侯董宏上書言秦莊襄王母本夏氏而為華陽夫人所子及即位後俱稱太后宜立定陶共王后為皇太后事下有司時丹以左將軍與大司馬王莽共劾奏宏知皇太后至尊之號天下一統而稱引亡秦以為比喻詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號上於是追尊定陶共王為共皇尊傅太后為共皇太后丁后為共皇后郎中令泠褎黃門郎段猶等復奏言定陶共皇太后共皇后皆不宜復引定陶蕃國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議有司皆以為宜如襃猶言丹議獨曰聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節人主與萬民俱蒙祐福尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊卑亡二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子亡爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深遠故為共王立後奉承祭祀今共皇長為一國太祖萬世不毀恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毀空去一國太祖不墮之祀而就無主當毀不正之禮非所以尊厚共皇也丹由是浸不合上意會有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以為行錢以來久難卒變易丹老人忘其前語後從公卿議又丹使吏書奏吏私寫其章丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄令吏民傳寫流聞四方臣不密則失身宜下廷尉治事下廷尉廷尉劾丹大不敬事未決給事中博士申咸炔欽上書言丹經行無比自近世大臣能若丹者少發憤懣奏封事不及深思遠慮使主簿書漏泄之過不在丹以此貶黜恐不厭眾心尚書劾咸欽幸得以儒官選擢備腹心上所折中定疑知丹社稷重臣議罪處罰國之所慎咸欽初傅經義以為當治事以暴列乃復上書妄稱譽丹前後相違不敬上貶咸欽秩各二等遂策免丹曰夫三公者朕之腹心也輔善相過匡率百僚和合天下者也朕既不明委政於公間者陰陽不調寒暑失常變異婁臻山崩地震河決泉涌流殺人民百姓流連無所歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相進不公之名乃者以挺力田議改幣章示君君內為朕建可改不疑以君之言博考朝臣君乃希眾雷同外以為不便令觀者歸非於朕朕隱忍不宣為君受愆朕疾夫比周之徒虛偽壞化寖以成俗故屢以書飭君幾君省過求己而反不受退有後言及君奏封事傳於道路布聞朝市言事者以為大臣不忠辜陷重辟獲虛采名謗譏匈匈流於四方腹心如此謂疏者何殆謬於二人同心之利焉將何以率示群下附親遠方朕惟君位尊任重慮不周密懷諼迷國進退違命反覆異言甚為君恥之非所以共承天地永保國家之意以君嘗託傅位未忍考於理已詔有司赦君勿治其上大司空高樂侯印綬罷歸尚書令唐林上疏曰竊見免大司空丹策書泰深痛切君子作文為賢者諱丹經為世儒宗德為國黃耇親傅聖躬位在三公所坐者微海內未見其大過事既已往免爵大重京師識者咸以為宜復丹邑爵使奉朝請四方所瞻卬也惟陛下財覽眾心有以尉復師傅之臣上從林言下詔賜丹爵關內侯食邑三百戶丹既免數月上用朱博議尊傅太后為皇太太后丁后為帝太后與太皇太后及皇太后同尊又為共皇立廟京師儀如孝元皇帝博遷為丞相復與御史大夫趙玄奏言前高昌侯宏首建尊號之議而為丹所劾奏免為庶人時天下衰麤委政於丹丹不深惟襃廣尊親之義而妄稱說抑貶尊號虧損孝道不忠莫大焉陛下聖仁昭然定尊號宏以忠孝復封高昌侯丹惡逆暴著雖蒙赦令不宜有爵邑請免為庶人奏可丹於是廢歸鄉里者數年平帝即位新都侯王莽白太皇太后發掘傅太后丁太后冢奪其璽綬更以民葬之定陶隳廢共皇廟諸造議泠襃段猶等皆徙合浦復免高昌侯宏為庶人徵丹詣公車賜爵關內侯食故邑數月太皇太后詔大司徒大司空曰夫襃有德賞元功先聖之制百王不易之道也故定陶太后造稱僭號甚悖義理關內侯師丹端誠於國不顧患難執忠節據聖法分明尊卑之制確然有枉石之固臨大節而不可奪可謂社稷之臣矣有司條奏邪臣建定稱號者已放退而丹功賞未加殆繆乎先賞後罰之義非所以章有德報厥功也其以厚丘之中鄉戶二千一百封丹為義陽侯月餘薨諡曰節侯子業嗣王莽敗乃絕贊曰何武之舉王嘉之爭師丹之議考其禍福乃效於後當王莽之作外內咸服董賢之愛疑於親戚武嘉區區以一蕢障江河用沒其身丹與董宏更受賞罰哀哉故曰依世則廢道違俗則危殆此古人所以難受爵位者也
