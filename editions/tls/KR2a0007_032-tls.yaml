body:
  text: 張陳王周傳第十張良字子房其先韓人也大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王悼惠王二十三年平卒卒二十歲秦滅韓良少未宦事韓韓破良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以五世相韓故良嘗學禮淮陽東見倉海君得力士為鐵椎重百二十斤秦皇帝東游至博狼沙中良與客狙擊秦皇帝誤中副車秦皇帝大怒大索天下求賊急甚良乃更名姓亡匿不邳良嘗閒從容步游下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然欲歐之為其老乃彊忍下取履因跪進父以足受之笑去良殊大驚父去里所復還曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日平明良往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我已遂去不見旦日視其書乃太公兵法良因異之常習讀誦居下邳為任俠項伯嘗殺人從良匿後十年陳涉等起良亦聚少年百餘人景駒自立為楚假王在留良欲往從之行道遇沛公沛公將數千人略地下邳遂屬焉沛公拜良為廄將良數以太公兵法說沛公沛公喜常用其策良為它人言皆不省良曰沛公殆天授故遂從不去沛公之薛見項梁共立楚懷王良乃說項梁曰君已立楚後韓諸公子橫陽君成賢可立為王益樹黨項梁使良求韓成立為韓王以良為韓司徒與韓王將千餘人西略韓地得數城秦輒復取之往來為游兵潁川沛公之從雒陽南出轘轅良引兵從沛公下韓十餘城擊楊熊軍沛公乃令韓王成留守陽翟與良俱南攻下宛西入武關沛公欲以二萬人擊秦嶢關下軍良曰秦兵尚彊未可輕臣聞其將屠者子賈豎易動以利願沛公且留壁使人先行為五萬人具食益張旗幟諸山上為疑兵令酈食其持重寶啗秦將秦將果欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其解擊之沛公乃引兵擊秦軍大破之逐北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聽良曰夫秦為無道故沛公得至此為天下除殘去賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公乃還軍霸上項羽至鴻門欲擊沛公項伯夜馳至沛公軍私見良欲與俱去良曰臣為韓王送沛公今事有急亡去不義乃具語沛公沛公大驚曰為之柰何良曰沛公誠欲背項王邪沛公曰鯫生說我距關毋內諸侯秦地可王也故聽之良曰沛公自度能卻項王乎沛公默然曰今為柰何良因要項伯見沛公沛公與伯飲為壽結婚令伯具言沛公不敢背項王所以距關者備它盜也項羽後解語在羽傳漢元年沛公為漢王王巴蜀賜良金百溢珠二斗良具以獻項伯漢王亦因令良厚遺項伯使請漢中地項王許之漢王之國良送至襃中遣良歸韓良因說漢王燒絕棧道示天下無還心以固項王意乃使良還行燒絕棧道良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城殺之時漢王還定三秦良乃遺項羽書曰漢王失職欲得關中如約即止不敢復東又以齊反書遺羽曰齊與趙欲并滅楚項羽以故北擊齊良乃間行歸漢漢王以良為成信侯從東擊楚至彭城漢王兵敗而還至下邑漢王下馬踞鞍而問曰吾欲捐關已東等棄之誰可與共功者良曰九江王布楚梟將與項王有隙彭越與齊王田榮反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人楚可破也漢王乃遣隨何說九江王布而使人連彭越及魏王豹反使韓信特將北擊之因舉燕代齊趙然卒破楚者此三人力也良多病未嘗特將兵常為畫策臣時時從漢三年項羽急圍漢王於滎陽漢王憂恐與酈食其謀橈楚權酈生曰昔湯伐桀封其後𣏌武王誅紂封其後宋今秦無道伐滅六國無立錐之地陛下誠復立六國後此皆爭戴陛下德義願為臣妾德義已行南面稱伯楚必斂衽而朝漢王曰善趣刻印先生因行佩之酈生未行良從外來謁漢王漢王方食曰客有為我計橈楚權者具以酈生計告良曰於子房何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸以籌之昔湯武伐桀紂封其後者度能制其死命也今陛下能制項籍死命乎其不可一矣武王入殷表商容閭式箕子門封比干墓今陛下能乎其不可二矣發鉅橋之粟散鹿臺之財以賜貧窮今陛下能乎其不可三矣殷事以畢偃革為軒倒載于戈示不復用今陛下能乎其不可四矣休馬華山之陽示無所為今陛下能乎其不可五矣息牛桃林之野天下不復輸積今陛下能乎其不可六矣且夫天下游士離親戚棄墳墓去故舊從陛下者但日夜望咫尺之地今乃立六國後唯無復立者游士各歸事其主從親戚反故舊陛下誰與取天下乎其不可七矣且楚唯毋彊六國復橈而從之陛下焉得而臣之其不可八矣誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗乃公事令趣銷印後韓信破齊欲自立為齊王漢王怒良說漢王漢王使良授齊王信印語在信傳五年冬漢王追楚至陽夏南戰不利壁固陵諸侯期不至良說漢王漢王用其計諸侯皆至語在高紀漢六年封功臣良未嘗有戰鬭功高帝曰運籌策帷幄中決勝千里外子房功也自擇齊三萬戶良曰始臣起下邳與上會留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬戶乃封良為留侯與蕭何等俱封上已封大功臣二十餘人其餘日夜爭功而不決未得行封上居雒陽南宮從復道望見諸將往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以徧封此屬畏陛下不能盡封又恐見疑過失及誅故相聚而謀反耳上乃憂曰為將柰何良曰上平生所憎群臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我我欲殺之為功多不忍良曰今急先封雍齒以示群臣群臣見雍齒先封則人人自堅矣於是上置酒封雍齒為什方侯而急趣丞相御史定功行封群臣罷酒皆喜曰雍齒且侯我屬無患矣劉敬說上都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成皋西有殽黽背河鄉雒其固亦足恃良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而固守獨以一面東制諸侯諸侯安定何渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國劉敬說是也於是上即日駕西都關中良從入關性多疾即道引不食穀閉門不出歲餘上欲廢太子立戚夫人子趙王如意大臣多爭未能得堅決也呂后恐不知所為或謂呂后曰留侯善畫計上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子君安得高枕而臥良曰始上數在急困之中幸用臣策今天下安定以愛欲易太子骨肉之間雖臣等百人何益呂澤彊要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人四人年老矣皆以上嫚娒士故逃匿山中義不為漢臣然上高此四人今公誠能毋愛金玉璧帛令太子為書卑辭安車因使辨士固請宜來來以為客時從入朝令上見之則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上疾欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣乃說建成侯曰太子將兵有功即位不益無功則從此受禍且太子所與俱諸將皆與上定天下梟將也今乃使太子將之此無異使羊將狼皆不肯為用其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常居前上曰終不使不肖子居愛子上明其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將善用兵今諸將皆陛下故等夷乃令太子將此屬莫肯為用且布聞之鼓行而西耳上雖疾彊載輜車臥而護之諸將不敢不盡力上雖苦彊為妻子計於是呂澤夜見呂后呂后承間為上泣而言如四人意上曰吾惟之豎子固不足遣乃公自行耳於是上自將而東群臣居守皆送至霸上良疾強起至曲郵見上曰臣宜從疾甚楚人剽疾願上慎毋與楚爭鋒因說上令太子為將軍監關中兵上謂子房雖疾彊臥傅太子是時叔孫通已為太傅良行少傅事漢十二年上從破布歸疾益甚俞欲易太子良諫不聽因疾不視事叔孫太傅稱說引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘須眉皓白衣冠甚偉上怪問曰何為者四人前對各言其姓名上乃驚曰吾求公避逃我今公何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人為壽已畢趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣呂氏真乃主矣戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翼以就橫絕四海橫絕四海又可柰何雖有矰繳尚安所施歌數闋戚夫人歔欷流涕上起去罷酒竟不易太子者良本招此四人之力也良從上擊代出奇計下馬邑及立蕭相國所與從容言天下事甚眾非天下所以存亡故不著良乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬戶位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳乃學道欲輕舉高帝崩呂后德良乃彊食之曰人生一世間如白駒之過隙何自苦如此良不得已彊聽食後六歲薨諡曰文成侯良始所見下邳圯上老父與書者後十三歲從高帝過濟北果得穀城山下黃石取而寶祠之及良死并葬黃石每上冢伏臘祠黃石子不疑嗣侯孝文三年坐不敬國除陳平陽武戶牖鄉人也少時家貧好讀書治黃帝老子之術有田三十畝與兄伯居伯常耕田縱平使游學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家生產曰亦食糠覈耳有叔如此不如無有伯聞之逐其婦棄之及平長可取婦富人莫與者貧者平亦媿之久之戶牖富人張負有女孫五嫁夫輒死人莫敢取平欲得之邑中有大喪平家貧侍喪以先往後罷為助張負既見之喪所獨視偉平平亦以故後去負隨平至其家家乃負郭窮巷以席為門然門外多長者車轍張負歸謂其子仲曰吾欲以女孫予陳平仲曰平貧不事事一縣中盡笑其所為獨柰何予之女負曰固有美如陳平長貧者乎卒與女為平貧乃假貸幣以聘予酒肉之資以內婦負戒其孫曰毋以貧故事人不謹事兄伯如事乃父事嫂如事乃母平既取張氏女資用益饒游道日廣里中社平為宰分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣陳涉起王使周巿略地立魏咎為魏王與秦軍相攻於臨濟平已前謝兄伯從少年往事魏王咎為太僕說魏王王不聽人或讒之平亡去項羽略地至河上平往歸之從入破秦賜爵卿項羽之東王彭城也漢王還定三秦而東殷王反楚項羽乃以平為信武君將魏王客在楚者往擊殷降而還項王使項悍拜平為都尉賜金二十溢居無何漢攻下殷項王怒將誅定殷者平懼誅乃封其金與印使使歸項王而平身間行杖劍亡度河船人見其美丈夫獨行疑其亡將要下當有寶器金玉目之欲殺平平心恐乃解衣臝而佐刺船船人知其無有乃止平遂至脩武降漢因魏無知求見漢王漢王召入是時萬石君石奮為中涓受平謁平等十人俱進賜食王曰罷就舍矣平曰臣為事來所言不可以過今日於是漢王與語而說之間曰子居楚何官平曰為都尉是日拜平為都尉使參乘典護軍諸將盡讙曰大王一日得楚之亡卒未知高下而即與共載使監護長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引師而還收散兵至滎陽以平為亞將屬韓王信軍廣武絳灌等或讒平曰平雖美丈夫如冠玉耳其中未必有也聞平居家時盜其嫂事魏王不容亡而歸楚歸楚不中又亡歸漢今大王尊官之令護軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝已之行而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進奇謀之士顧其計誠足以利國家耳盜嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去今又從吾游信者固多心乎平曰臣事魏王魏王不能用臣說故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有奇士不能用臣居楚聞漢王之能用人故歸大王臝身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為護軍中尉盡護諸將諸將乃不敢復言其後楚急擊絕漢甬道圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聽漢王謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之廉節好禮者多歸之至於行功賞爵邑重之士亦以此不附今大王嫚而少禮士之廉節者不來然大王能饒人以爵邑士之頑頓耆利無恥者亦多歸漢誠各去兩短集兩長天下指麾即定矣然大王資侮人不能得廉節之士顧楚有可亂者彼項王骨鯁之臣亞父鍾離眛龍且周殷之屬不過數人耳大王能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信讒必內相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黃金四萬斤予平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離眜等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進見楚使即陽驚曰以為亞父使乃項王使也復持去以惡草具進楚使使歸具以報項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父亞父聞項王疑之乃大怒曰天下事大定矣君王自為之願乞骸骨歸歸未至彭城疽發背而死平乃夜出女子二千人滎陽東門楚因擊之平乃與漢王從城西門出去遂入關收聚兵而復東明年淮陰侯信破齊自立為假齊王使使言之漢王漢王怒而罵平躡漢王漢王寤乃厚遇齊使使張良往立信為齊王於是封平以戶牖鄉用其計策卒滅楚漢六年人有上書告楚王韓信反高帝問諸將諸將曰亟發兵阬豎子耳高帝默然以問平平固辭謝曰諸將云何上具告之平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也竊為陛下危之上曰為之柰何平曰古者天子巡狩會諸侯南方有雲夢陛下弟出偽游雲夢會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁而陛下因禽之特一力士之事耳高帝以為然乃發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中高帝豫具武士見信即執縛之語在信傳遂會諸侯於陳還至雒陽與功臣剖符定封封平為戶牖侯世世勿絕平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其明年平從擊韓王信於代至平城為匈奴圍七日不得食高帝用平奇計使單于閼氏解圍以得開高帝既出其計祕世莫得聞高帝南過曲逆上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳顧問御史曲逆戶口幾何對曰始秦時三萬餘戶間者兵數起多亡匿今見五千餘戶於是詔御史更封平為曲逆侯盡食之除前所食戶牖平自初從至天下定後常以護軍中尉從擊臧荼陳豨黥布凡六出奇計輒益邑封奇計或頗祕世莫得聞也高帝從擊布軍還病創徐行至長安燕王盧綰反上使樊噲以相國將兵擊之既行人有短惡噲者高帝怒曰噲見吾病乃幾我死也用平計召絳侯周勃受詔床下曰陳平乘馳傳載勃代噲將平至軍中即斬噲頭二人既受詔馳傳未至軍行計曰樊噲帝之故人功多又呂后女弟呂須夫有親且貴帝以忿怒故欲斬之即恐後悔寧囚而致上令上自誅之未至軍為壇以節召樊噲噲受詔即反接載檻車詣長安而令周勃代將兵定燕平行聞高帝崩平恐呂后及呂須怒乃馳傳先去逢使者詔平與灌嬰屯於滎陽平受詔立復馳至宮哭殊悲因奏事喪前呂后哀之曰君出休矣平畏讒之就因固請之得宿衛中太后乃以為郎中令日傅教帝是後呂須讒乃不得行樊噲至即赦復爵邑惠帝六年相國曹參薨安國侯王陵為右丞相平為左丞相王陵沛人也始為縣豪高祖微時兄事陵及高祖起沛入咸陽陵亦聚黨數千人居南陽不肯從沛公及漢王之還擊項籍陵乃以兵屬漢項羽取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰願為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劍而死項王怒亨陵母陵卒從漢王定天下以善雍齒雍齒高祖之仇陵又本無從漢之意以故後封陵為安國侯陵為人少文任氣好直言為右丞相二歲惠帝崩高后欲立諸呂為王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不說問左丞相平及絳侯周勃等皆曰高帝定天下王子弟今太后稱制欲王昆弟諸呂無所不可太后喜罷朝陵讓平勃曰始與高帝唼血而盟諸君不在邪今高帝崩太后女主欲王呂氏諸君縱欲阿意背約何面目見高帝於地下乎平曰於面折廷爭臣不如君全社稷定劉氏後君亦不如臣陵無以應之於是呂太后欲廢陵乃陽遷陵為帝太傅實奪之相權陵怒謝病免杜門竟不朝請十年而薨陵之免呂太后徙平為右丞相以辟陽侯審食其為左丞相食其亦沛人也漢王之敗彭城西楚取太上皇呂后為質食其以舍人侍呂后其後從破項籍為侯幸於呂太后及為相不治監宮中如郎中令公卿百官皆因決事呂須常以平前為高帝謀執樊噲數讒平曰為丞相不治事日飲醇酒戲婦人平聞日益甚呂太后聞之私喜面質呂須於平前曰鄙語曰兒婦人口不可用顧君與我何如耳無畏呂須之譖呂太后多立諸呂為王平偽聽之乃呂太后崩平與太尉勃合謀卒誅諸呂立文帝平本謀也審食其免相文帝立舉以為相太尉勃親以兵誅呂氏功多平欲讓勃位乃謝病文帝初立怪平病問之平曰高帝時勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是乃以太尉勃為右丞相位第一平徙為左丞相位第二賜平金千斤益封三千戶居頃之上益明習國家事朝而問右丞相勃曰天下一歲決獄幾何勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背媿不能對上亦問左丞相平平曰有主者上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟內史上曰苟各有主者而君所主何事也平謝曰主臣陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽順四時下遂萬物之宜外填撫四夷諸侯內親附百姓使卿大夫各得任其職也上稱善勃大慚出而讓平曰君獨不素教我乎平笑曰君居其位獨不知其任邪且陛下即問長安盜賊數又欲彊對邪於是絳侯自知其能弗如平遠矣居頃之勃謝免相而平顓為丞相孝文二年平薨諡曰獻侯傳子至曾孫何坐略人妻棄市王陵亦至玄孫坐酎金國除辟陽侯食其免後三歲而為淮南王所殺文帝令其子平嗣侯淄川王反辟陽近淄川平降之國除始平曰我多陰謀道家之所禁吾世即廢亦已矣終不能復起以吾多陰禍也其後曾孫陳掌以衛氏親戚貴願得續封然終不得也周勃沛人其先卷人也徙沛勃以織薄曲為生常以吹簫給喪事材官引強高祖為沛公初起勃以中涓從攻胡陵下方與方與反與戰卻敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蒙虞取之擊章邯車騎殿略定魏地攻轅戚東緡以往至栗取之攻齧桑先登擊秦軍阿下破之追至濮陽下蘄城攻都關定陶襲取宛朐得單父令夜襲取臨濟攻壽張以前至卷破李由雍丘下攻開封先至城下為多後章邯破項梁沛公與項羽引兵東如碭自初起沛還至碭一歲二月楚懷王封沛公號武安侯為碭郡長沛公拜勃為襄賁令從沛公定魏地攻東郡尉於成武破之攻長社先登攻潁陽緱氏絕河津擊趙賁軍尸北南攻南陽守齮破武關嶢關攻秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懷德攻槐里好畤最北擊趙賁內史保於咸陽最北救漆擊章平姚卬軍西定汧還下郿頻陽圍章邯廢丘破之西擊益已軍破之攻上邽東守嶢關擊項籍攻曲遇最還守敖倉追籍籍已死因東定楚地泗水東海郡凡得二十二縣還守雒陽櫟陽賜與潁陰侯共食鍾離以將軍從高祖擊燕王臧荼破之易下所將卒當馳道為多賜爵列侯剖符世世不絕食絳八千二百八十戶以將軍從高帝擊韓王信於代降下霍人以前至武泉搫胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晉陽下破之下晉陽後擊韓信軍於硰石破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多勃遷為太尉擊陳豨屠馬邑所將卒斬豨將軍乘馬降轉擊韓信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂因轉攻得雲中守遬丞相箕肄將軍博定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之斬豨丞相程縱將軍陳武都尉高肄定代郡九縣燕王盧綰反勃以相國代樊噲將擊下薊得綰大將抵丞相偃守陘太尉弱御史大夫施屠渾都破綰軍上蘭後擊綰軍沮陽追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從高帝得相國一人丞相二人將軍二千石各三人別破軍二下城三定郡五縣七十九得丞相大將各一人勃為人木強敦厚高帝以為可屬大事勃不好文學每召諸生說士東鄉坐責之趣為我語其椎少文如此勃既定燕而歸高帝已崩矣以列侯事惠帝惠帝六年置太尉官以勃為太尉十年高后崩呂祿以趙王為漢上將軍呂產以呂王為相國秉權欲危劉氏勃與丞相平朱虛侯章共誅諸呂語在高后紀於是陰謀以為少帝及濟川淮陽恆山王皆非惠帝子呂太后以計詐名它人子殺其母養之後宮令孝惠子之立以為後用彊呂氏今已滅諸呂少帝即長用事吾屬無類矣不如視諸侯賢者立之遂迎立代王是為孝文皇帝東牟侯興居朱虛侯章弟也曰誅諸呂臣無功請得除宮乃與太僕汝陰滕公入宮滕公前謂少帝曰足下非劉氏不當立乃顧麾左右執戟皆仆兵罷有數人不肯去宦者令張釋諭告亦去滕公召乘輿車載少帝出少帝曰欲持我安之乎滕公曰就舍少府乃奉天子法駕迎皇帝代邸報曰宮謹除皇帝入未央宮有謁者十人持戟衛端門曰天子在也足下何為者不得入太尉往喻乃引兵去皇帝遂入是夜有司分部誅濟川淮陽常山王及少帝於邸文帝即位以勃為右丞相賜金五千斤邑萬戶居十餘月人或說勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以厭之則禍及身矣勃懼亦自危乃謝請歸相印上許之歲餘陳丞相平卒上復用勃為相十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國乃免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見其後人有上書告勃欲反下廷尉逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘背示之曰以公主為證公主者孝文帝女也勃太子勝之尚之故獄吏教引為證初勃之益封盡以予薄昭及繫急薄昭為言薄太后太后亦以為無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪文帝既見勃獄辭乃謝曰吏方驗而出之於是使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍安知獄吏之貴也勃復就國孝文十一年薨諡曰武侯子勝之嗣尚公主不相中坐殺人死國絕一年文帝乃擇勃子賢者河內太守亞夫復為侯亞夫為河內守時許負相之君後三歲而侯侯八歲為將相持國秉貴重矣於人臣無二後九年而餓死亞夫笑曰臣之兄以代父侯矣有如卒子當代我何說侯乎然既已貴如負言又何說餓死指視我負指其口曰從理入口此餓死法也居三歲兄絳侯勝之有罪文帝擇勃子賢者皆推亞夫乃封為條侯文帝後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝茲侯徐厲為將軍軍棘門以河內守亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫揖曰介冑之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之月餘三軍皆罷乃拜亞夫為中尉文帝且崩時戒太子曰即有緩急周亞夫真可任將兵文帝崩亞夫為車騎將車孝景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與爭鋒願以梁委之絕其食道乃可制也上許之亞夫既發至霸上趙涉遮說亞夫曰將軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於殽黽阸陿之間且兵事上神密將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜殽黽間果得吳伏兵乃請涉為護軍亞夫至會兵滎陽吳方攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁王使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓高侯等絕吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅臥不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚既餓乃引而去亞夫出精兵追擊大破吳王濞吳王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵因乘勝遂盡虜之降其縣購吳王千金月餘越人斬吳王頭以告凡相守攻三月而吳楚破平於是諸將乃以太尉計謀為是由此梁孝王與亞夫有隙歸復置太尉官五歲遷為丞相景帝甚重之上廢栗太子亞夫固爭之不得上由此疏之而梁孝王每朝常與太后言亞夫之短竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯及臣即位乃侯之信未得封也竇太后曰人生各以時行耳竇長君在時竟不得封侯死後乃其子彭祖顧得侯吾甚恨之帝趣侯信也上曰請得與丞相計之亞夫曰高帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上默然而沮其後匈奴王徐盧等五人降漢上欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病免相頃之上居禁中召亞夫賜食獨置大胾無切肉又不置箸亞夫心不平顧謂尚席取箸上視而笑曰此非不足君所乎亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以葬者取庸苦之不與錢庸知其盜買縣官器怨而上變舌子事連汙亞夫書既聞上下吏吏薄責亞夫亞夫不對上罵之曰吾不用也召詣廷尉廷尉責問曰君侯欲反何亞夫曰臣所買器乃葬器也何謂反乎吏曰君縱不欲反地上即欲反地下耳吏侵之益急初吏捕亞夫亞夫欲自殺其夫人止之以故不得死遂入廷尉因不食五日歐血而死國絕一歲上乃更封絳侯勃它子堅為平曲侯續降侯後傳子建德為太子太傅坐酎金免官後有罪國除亞夫果餓死死後上乃封王信為蓋侯至平帝元始二年繼絕世復封勃玄孫之子恭為絳侯千戶贊曰聞張良之智勇以為其貌魁梧奇偉反若婦人女子故孔子稱以貌取人失之子羽學者多疑於鬼神如良受書老父亦異矣高祖數離困阸良常有力豈可謂非天乎陳平之志見於社下傾側擾攘楚魏之間卒歸於漢而為謀臣及呂后時事多故矣平竟自免以智終王陵廷爭杜門自絕亦各其志也周勃為布衣時鄙樸庸人至登輔佐匡國家難誅諸呂立孝文為漢伊周何其盛也始呂后問宰相高祖曰陳平智有餘王陵少戇可以佐之安劉氏者必勃也又問其次云過此以後非乃所及終皆如言聖矣夫
