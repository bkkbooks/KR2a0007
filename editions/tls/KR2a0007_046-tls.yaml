body:
  text: 李廣蘇建傳第二十四李廣隴西成紀人也其先曰李信秦時為將逐得燕太子丹者也廣世世受射孝文十四年匈奴大入蕭關而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉景帝即位為騎郎將吳楚反時為驍騎都尉從太尉亞夫戰昌邑下顯名以梁王授廣將軍印故還賞不行為上谷太守數與匈奴戰典屬國公孫昆邪為上泣曰李廣材氣天下亡雙自負其能數與虜确恐亡之上乃徙廣為上郡太守匈奴侵上郡上使中貴人從廣勒習兵擊匈奴中貴人者將數十騎從見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣廣曰是必射鵰者也廣乃從百騎往馳三人三人亡馬步行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果匈奴射鵰者也已縛之上山望匈奴數千騎見廣以為誘騎驚上山陳廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匈奴追射我立盡今我留匈奴必以我為大軍之誘不我擊廣令曰前未到匈奴陳二里所止令曰皆下馬解鞍騎曰虜多如是解鞍即急柰何廣曰彼虜以我為走今解鞍以示不去用堅其意有白馬將出護兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中解鞍縱馬臥時會暮胡兵終怪之弗敢擊夜半胡兵以為漢有伏軍於傍欲夜取之即引去平旦廣乃歸其大軍後徙為隴西北地雁門雲中太守武帝即位左右言廣名將也由是入為未央衛尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛莫府省文書然亦遠斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識不識孝景時以數直諫為太中大夫為人廉謹於文法後漢誘單于以馬邑城使大軍伏馬邑傍而廣為驍騎將軍屬護軍將軍單于覺之去漢軍皆無功後四歲廣以衛尉為將軍出雁門擊匈奴匈奴兵多破廣軍生得廣單于素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷置兩馬間絡而盛臥行十餘里廣陽死睨其傍有一兒騎善馬暫騰而上胡兒馬因抱兒鞭馬南馳數十里得其餘軍匈奴騎數百追之廣行取兒弓射殺追騎以故得脫於是至漢漢下廣吏吏當廣亡失多為虜所生得當斬贖為庶人數歲與故潁陰侯屏居藍田南山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下居無何匈奴入遼西殺太守敗韓將軍韓將軍後徙居右北平死於是上乃召拜廣為右北平太守廣請霸陵尉與俱至軍而斬之上書自陳謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貉威稜憺乎鄰國夫報忿除害捐殘去殺朕之所圖於將軍也若乃免冠徒跣稽顙請罪豈朕之指哉將軍其率師東轅彌節白檀以臨右北平盛秋廣在郡匈奴號曰漢飛將軍避之數歲不入界廣出獵見草中石以為虎而射之中石沒矢視之石也他日射之終不能入矣廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦射殺之石建卒上召廣代為郎中令元朔六年廣復為將軍從大將軍出定襄諸將多中首虜率為侯者而廣軍無功後三歲廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匈奴左賢王將四萬騎圍廣廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其左右而還報廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持滿毋發而廣身自以大黃射其裨將殺數人胡虜益解會暮吏士無人色而廣意氣自如益治軍軍中服其勇也明日復力戰而博望侯軍亦至匈奴乃解去漢軍罷弗能追是時廣軍幾沒罷歸漢法博望侯後期當死贖為庶人廣軍自當亡賞初廣與從弟李蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍擊右賢王有功中率封為樂安侯元狩二年代公孫弘為丞相蔡為人在下中名聲出廣下遠甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語云自漢擊匈奴廣未嘗不在其中而諸妄校尉已下材能不及中以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈嘗有恨者乎廣曰吾為隴西守羌嘗反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此乃將軍所以不得侯者也廣歷七郡太守前後四十餘年得賞賜輒分其戲下飲食與士卒共之家無餘財終不言生產事為人長爰臂其善射亦天性雖子孫他人學者莫能及廣吶口少言與人居則畫地為軍陳射闊狹以飲專以射為戲將兵乏絕處見水士卒不盡飲不近水不盡餐不嘗食寬緩不苛士以此愛樂為用其射見敵非在數十步之內度不中不發發即應弦而倒用此其將數困辱及射猛獸亦數為所傷云元狩四年大將軍票騎將軍大擊匈奴廣數自請行上以為老不許良久乃許之以為前將軍大將軍青出塞捕虜知單于所居乃自以精兵走之而令廣并於右將軍軍出東道東道少回遠大軍行水草少其勢不屯行廣辭曰臣部為前將軍今大將軍乃徙臣出東道且臣結髮而與匈奴戰乃今一得當單于臣願居前先死單于大將軍陰受上指以為李廣數奇毋令當單于恐不得所欲是時公孫敖新失侯為中將軍大將軍亦欲使敖與俱當單于故徙廣廣知之固辭大將軍弗聽令長史封書與廣之莫府曰急詣部如書廣不謝大將軍而起行意象慍怒而就部引兵與右將軍食其合軍出東道惑失道後大將軍大將軍與單于接戰單于遁走弗能得而還南絕幕乃遇兩將軍廣已見大將軍還入軍大將軍使長史持糒醪遺廣因問廣食其失道狀曰青欲上書報天子失軍曲折廣未對大將軍長史急責廣之莫府上簿廣曰諸校尉亡罪乃我自失道吾今自上簿至莫府謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部行回遠又迷失道豈非天哉且廣年六十餘終不能復對刀筆之吏矣遂引刀自剄百姓聞之知與不知老壯皆為垂泣而右將軍獨下吏當死贖為庶人廣三子曰當戶椒敢皆為郎上與韓嫣戲嫣少不遜當戶擊嫣嫣走於是上以為能當戶蚤死乃拜椒為代郡太守皆先廣死廣死軍中時敢從票騎將軍廣死明年李蔡以丞相坐詔賜冢地陽陵當得二十畝蔡盜取三頃頗賣得四十餘萬又盜取神道外壖地一畝葬其中當下獄自殺敢以校尉從票騎將軍擊胡左賢王力戰奪左賢王旗鼓斬首多賜爵關內侯食邑二百戶代廣為郎中令頃之怨大將軍青之恨其父乃擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宮獵票騎將軍去病怨敢傷青射殺敢去病時方貴幸上為諱云鹿觸殺之居歲餘去病死敢有女為太子中人愛幸敢男禹有寵於太子然好利亦有勇嘗與侍中貴人飲侵陵之莫敢應後愬之上上召禹使刺虎縣下圈中未至地有詔引出之禹從落中以劍斫絕纍欲刺虎上壯之遂救止焉而當戶有遺腹子陵將兵擊胡兵敗降匈奴後人告禹謀欲亡從陵下吏死陵字少卿少為侍中建章監善騎射愛人謙讓下士甚得名譽武帝以為有廣之風使將八百騎深入匈奴二千餘里過居延視地形不見虜還拜為騎都尉將勇敢五千人教射酒泉張掖以備胡數年漢遣貳師將軍伐大宛使陵將五校兵隨後行至塞會貳師還上賜陵書陵留吏士與輕騎五百出敦煌至鹽水迎貳師還復留屯張掖天漢二年貳師將三萬騎出酒泉擊右賢王於天山召陵欲使為貳師將輜重陵召見武臺叩頭自請曰臣所將屯邊者皆荊楚勇士奇材劍客也力扼虎射命中願得自當一隊到蘭干山南以分單于兵毋令專鄉貳師軍上曰將惡相屬邪吾發軍多毋騎予女陵對無所事騎臣願以少擊眾步兵五千人涉單于庭上壯而許之因詔彊弩都尉路博德將兵半道迎陵軍博德故伏波將軍亦羞為陵後距奏言方秋匈奴馬肥未可與戰臣願留陵至春俱將酒泉張掖騎各五千人並擊東西浚稽可必禽也書奏上怒疑陵悔不欲出而教博德上書乃詔博德吾欲予李陵騎云欲以少擊眾今虜入西河其引兵走西河遮鉤營之道詔陵以九月發出遮虜鄣至東浚稽山南龍勒水上徘徊觀虜即亡所見從浞野侯趙破奴故道抵受降城休士因騎置以聞所與博德言者云何具以書對陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力上甚說拜步樂為郎陵至浚稽山與單于相直騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持戟盾後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰陵曰吾士氣少衰而鼓不起者何也軍中豈有女子乎始軍出時關東群盜妻子徙邊者隨軍為卒妻婦大匿車中陵搜得皆劍斬之明日復戰斬首三千餘級引兵東南循故龍城道行四五日抵大澤葭葦中虜從上風縱火陵亦令軍中縱火以自救南行至山下單于在南山上使其子將騎擊陵陵軍步鬭樹木間復殺數千人因發連弩射單于單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎諸當戶君長皆言單于自將數萬騎擊漢數千人不能滅後無以復使邊臣令漢益輕匈奴復力戰山谷間尚四五十里得平地不能破乃還是時陵軍益急匈奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去會陵軍候管敢為校尉所辱亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及成安侯校各八百人為前行以黃與白為幟當使精騎射之即破矣成安侯者潁川人父韓千秋故濟南相奮擊南越戰死武帝封子延年為侯以校尉隨陵單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之軍吏持尺刀抵山入陿谷單于遮其後乘隅下壘石士卒多死不得行昏後陵便衣獨步出營止左右毋隨我丈夫一取單于耳良久陵還大息曰兵敗死矣軍吏或曰將軍威震匈奴天命不遂後求道徑還歸如浞野侯為虜所得後亡還天子客遇之況於將軍乎陵曰公止吾不死非壯士也於是盡斬旌旗及珍寶埋地中陵歎曰復得數十矢足以脫矣今無兵復戰天明坐受縛矣各鳥獸散猶有得脫歸報天子者令軍士人持二升糒一半冰期至遮虜鄣者相待夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無面目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里邊塞以聞上欲陵死戰召陵母及婦使相者視之無死喪色後聞陵降上怒甚責問陳步樂步樂自殺群臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以殉國家之急其素所畜積也有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短誠可痛也且陵提步卒不滿五千深輮戎馬之地抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬭千里矢盡道窮士張空拳冒白刃北首爭死敵得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也初上遣貳師大軍出財令陵為助兵及陵與單于相值而貳師功少上以遷誣罔欲沮貳師為陵游說下遷腐刑久之上悔陵無救曰陵當發出塞乃詔彊弩都尉令迎軍坐預詔之得令老將生姦詐乃遣使勞賜陵餘軍得脫者陵在匈奴歲餘上遣因杅將軍公孫敖將兵深入匈奴迎陵敖軍無功還曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上聞於是族陵家母弟妻子皆伏誅隴西士大夫以李氏為愧其後漢遣使使匈奴陵謂使者曰吾為漢將步卒五千人橫行匈奴以亡救而敗何負於漢而誅吾家使者曰漢聞李少卿教匈奴為兵陵曰乃李緒非我也李緒本漢塞外都尉居奚侯城匈奴攻之緒降而單于客遇緒常坐陵上陵痛其家以李緒而誅使人刺殺緒大閼氏欲殺陵單于匿之北方大閼氏死乃還單于壯陵以女妻之立為右校王衛律為丁靈王皆貴用事衛律者父本長水胡人律生長漢善協律都尉李延年延年薦言律使匈奴使還會延年家收律懼并誅亡還降匈奴匈奴愛之常在單于左右陵居外有大事乃入議昭帝立大將軍霍光左將軍上官桀輔政素與陵善遣陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數數自循其刀環握其足陰諭之言可還歸漢也後陵律持牛酒勞漢使博飲兩人皆胡服椎結立政大言曰漢已大赦中國安樂主上富於春秋霍子孟上官少叔用事以此言微動之陵墨不應孰視而自循其髮答曰吾已胡服矣有頃律起更衣立政曰咄少卿良苦霍子孟上官少叔謝女陵曰霍與上官無恙乎立政曰請少卿來歸故鄉毋憂富貴陵字立政曰少公歸易耳恐再辱柰何語未卒衛律還頗聞餘語曰李少卿賢者不獨居一國范蠡徧遊天下由余去戎入秦今何語之親也因罷去立政隨謂陵曰亦有意乎陵曰丈夫不能再辱陵在匈奴二十餘年元平元年病死蘇建杜陵人也以校尉從大將軍青擊匈奴封平陵侯以將軍築朔方後以衛尉為遊擊將軍從大將車出朔方後一歲以右將軍再從大將軍出定襄亡翕侯失軍當斬贖為庶人其後為代郡太守卒官有三子嘉為奉車都尉賢為騎都尉中子武最知名武字子卿少以父任兄弟並為郎稍遷至栘中廄監時漢連伐胡數通使相窺觀匈奴留漢使郭吉路充國等前後十餘輩匈奴使來漢亦留之以相當天漢元年且鞮侯單于初立恐漢襲之乃曰漢天子我丈人行也盡歸漢使路充國等武帝嘉其義乃遣武以中郎將使持節送匈奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等募士斥候百餘人俱既至匈奴置幣遺單于單于益驕非漢所望也方欲發使送武等會緱王與長水虞常等謀反匈奴中緱王者昆邪王姊子也與昆邪王俱降漢後隨浞野侯沒胡中及衛律所將降者陰相與謀劫單于母閼氏歸漢會武等至匈奴虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸蒙其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得單于使衛律治其事張勝聞之恐前語發以狀語武武曰事如此此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秩訾曰即謀單于何以復加宜皆降之單于使衛律召武受辭武謂惠等屈節辱命雖生何面目以歸漢引佩刀自刺衛律驚自抱持武馳召毉鑿地為坎置熅火覆武其上蹈其背以出血武氣絕半日復息惠等哭輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武會論虞常欲因此時降武劍斬虞常已律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劍欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劍擬之武不動律曰蘇君律前負漢歸匈奴幸蒙大恩賜號稱王擁眾數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰女為人臣子不顧恩義畔主背親為降虜於蠻夷何以女為見且單于信女使決人死生不平心持正反欲鬭兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨匈奴未耳若知我不降明欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中絕不飲食天雨雪武臥齧雪與旃毛并咽之數日不死匈奴以為神乃徙武北海上無人處使牧羝羝乳乃得歸別其官屬常惠等各置他所武既至海上廩食不至掘野鼠去屮實而食之杖漢節牧羊臥起操持節旄盡落積五六年單于弟於靬王戈射海上武能網紡繳檠弓弩於靬王愛之給其衣食三歲餘王病賜武馬畜服匿穹廬王死後人眾徙去其冬丁令盜武牛羊武復窮厄初武與李陵俱為侍中武使匈奴明年陵降不敢求武久之單于使陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使陵來說足下虛心欲相待終不得歸漢空自苦亡人之地信義安所見乎前長君為奉車從至雍棫陽宮扶輦下除觸柱折轅劾大不敬伏劍自刎賜錢二百萬以葬孺卿從祠河東后土宦騎與黃門駙馬爭舩推墮駙馬河中溺死宦騎亡詔使孺卿逐捕不得惶恐飲藥而死來時大夫人已不幸陵送葬至陽陵子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宮子卿不欲降何以過陵且陛下春秋高法令亡常大臣亡罪夷滅者數十家安危不可知子卿尚復誰為乎願聽陵計勿復有云武曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖蒙斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死亡所恨願勿復再言陵與武飲數日復曰子卿壹聽陵言武曰自分已死久矣王必欲降武請畢今日之驩效死於前陵見其至誠喟然歎曰嗟乎義士陵與衛律之罪上通於天因泣下霑衿與武決去陵惡自賜武使其妻賜武牛羊數十頭後陵復至北海上語武區脫捕得雲中生口言太守以下吏民皆白服曰上崩武聞之南鄉號哭歐血旦夕臨數月昭帝即位數年匈奴與漢和親漢求武等匈奴詭言武死後漢使復至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得雁足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在於是李陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢且貰陵罪全其老母使得奮大辱之積志庶幾乎曹柯之盟此陵宿昔之所不忘也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人壹別長絕陵起舞歌曰徑萬里兮度沙幕為君將兮奮匈奴路窮絕兮矢刃摧士眾滅兮名已隤老母已死雖欲報恩將安歸陵泣下數行因與武決單于召會武官屬前以降及物故凡隨武還者九人武以始元六年春至京師詔武奉一太牢謁武帝園廟拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區常惠徐聖趙終根皆拜為中郎賜帛各二百匹其餘六人老歸家賜錢人十萬復終身常惠後至右將軍封列侯自有傳武留匈奴凡十九歲始以彊壯出及還須髮盡白武來歸明年上官桀子安與桑弘羊及燕王蓋主謀反武子男元與安有謀坐死初桀安與大將軍霍光爭權數疏光過失予燕王令上書告之又言蘇武使匈奴二十年不降還乃為典屬國大將軍長史無功勞為搜粟都尉光顓權自恣及燕王等反誅窮治黨與武素與桀弘羊有舊數為燕王所訟子又在謀中廷尉奏請逮捕武霍光寢其奏免武官數年昭帝崩武以故二千石與計謀立宣帝賜爵關內侯食邑三百戶久之衛將軍張安世薦武明習故事奉使不辱命先帝以為遺言宣帝即時召武待詔宦者署數進見復為右曹典屬國以武著節老臣令朝朔望號稱祭酒甚優寵之武所得賞賜盡以施予昆弟故人家不餘財皇后父平恩侯帝舅平昌侯樂昌侯車騎將軍韓增丞相魏相御史大夫丙吉皆敬重武武年老子前坐事死上閔之問左右武在匈奴久豈有子乎武因平恩侯自白前發匈奴時胡婦適產一子通國有聲問來願因使者致金帛贖之上許焉後通國隨使者至上以為郎又以武弟子為右曹武年八十餘神爵二年病卒甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍頟侯韓增次曰後將軍營平侯趙充國次曰丞相高平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉德次曰少府梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉凡十一人皆有傳自丞相黃霸廷尉于定國大司農朱邑京兆尹張敞右扶風尹翁歸及儒者夏侯勝等皆以善終著名宣帝之世然不得列於名臣之圖以此知其選矣贊曰李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊此言雖小可以喻大然三代之將道家所忌自廣至陵遂亡其宗哀哉孔子稱志士仁人有殺身以成仁無求生以害仁使於四方不辱君命蘇武有之矣
