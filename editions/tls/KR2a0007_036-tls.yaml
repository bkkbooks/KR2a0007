body:
  text: 淮南衡山濟北王傳第十四淮南厲王長高帝少子也其母故趙王張敖美人高帝八年從東垣過趙趙王獻美人厲王母也幸有身趙王不敢內宮為築外宮舍之及貫高等謀反事覺并逮治王盡捕王母兄弟美人繫之河內厲王母亦繫告吏曰日得幸上有子吏以聞上方怒趙未及理厲王母厲王母弟趙兼因辟陽侯言呂后呂后妒不肯白辟陽侯不強爭厲王母已生厲王恚即自殺吏奉厲王詣上上悔令呂后母之而葬其母真定真定厲王母家縣也十一年淮南王布反上自將擊滅布即立子長為淮南王王早失母常附呂后孝惠呂后時以故得幸無患然常心怨辟陽侯不敢發及孝文初即位自以為最親驕蹇數不奉法上寬赦之三年入朝甚橫從上入苑獵與上同輦常謂上大兄厲王有材力力扛鼎乃往請辟陽侯辟陽侯出見之即自褏金椎椎之命從者刑之馳詣闕下肉袒而謝曰臣母不當坐趙時事辟陽侯力能得之呂后不爭罪一也趙王如意子母無罪呂后殺之辟陽侯不爭罪二也呂后王諸呂欲以危劉氏辟陽侯不爭罪三也臣謹為天下誅賊報母之仇伏闕下請罪文帝傷其志為親故不治赦之當是時自薄太后及太子諸大臣皆憚厲王厲王以此歸國益恣不用漢法出入警蹕稱制自作法令數上書不遜順文帝重自切責之時帝舅薄昭為將軍尊重上令昭予厲王書諫數之曰竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所行不稱天資皇帝初即位易侯邑在淮南者大王不肯皇帝卒易之使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡而殺列侯以自為名皇帝不使吏與其間赦大王甚厚漢法二千石缺輒言漢補大王逐漢所置而請自置相二千石皇帝骫天下正法而許大王甚厚大王欲屬國為布衣守冢真定皇帝不許使大王毋失南面之尊甚厚大王宜日夜奉法度修貢職以稱皇帝之厚德今乃輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此高皇帝之厚德也高帝蒙霜露沬風雨赴矢石野戰攻城身被創痍以為子孫成萬世之業艱難危苦甚矣大王不思先帝之艱苦日夜怵惕修身正行養犧牲豐潔粢盛奉祭祀以無忘先帝之功德而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以高兄無禮幸臣有罪大者立斷小者肉刑不仁貴布衣一劍之任賤王侯之位不知不好學問大道觸情妄行不祥此八者危亡之路也而大王行之棄南面之位奮諸賁之勇常出入危亡之路臣之所見高皇帝之神必不廟食於大王之手明白昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國秦始皇殺兩弟遷其母以安秦頃王亡代高帝奪之國以便事濟北舉兵皇帝誅之以安漢故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也亡之諸侯游宦事人及舍匿者論皆有法其在王所吏主者坐今諸侯子為吏者御史主為軍吏者中尉主客出入殿門者衛尉大行主諸從蠻夷來歸誼及以亡名數自占者內史縣令主相欲委下吏無與其禍不可得也王若不改漢繫大王邸論相以下為之奈何夫墮父大業退為布衣所哀幸臣皆伏法而誅為天下笑以羞先帝之德甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤呂氏之世未嘗忘死陛下即位臣怙恩德驕盈行多不軌追念辠過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上群臣皆得延壽於下上下得宜海內常安願孰計而疾行之行之有疑禍如發矢不可追已王得書不說六年令男子但等七十人與棘蒲侯柴武太子奇謀以輦車四十乘反谷口令人使閩越匈奴事覺治之乃使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉雜奏長廢先帝法不聽天子詔居處無度為黃屋蓋儗天子擅為法令不用漢法及所置吏以其郎中春為丞相收聚漢諸侯人及有罪亡者匿與居為治家室賜與財物爵祿田宅爵或至關內侯奉以二千石所當得大夫但士伍開章等七十人與棘蒲侯太子奇謀反欲以危宗廟社稷謀使閩越及匈奴發其兵事覺長安尉奇等往捕開章長匿不予與故中尉蕑忌謀殺以閉口為棺椁衣衾葬之肥陵謾吏曰不知安在又陽聚土樹表其上曰開章死葬此下及長身自賊殺無罪者一人令吏論殺無罪者六人為亡命棄市詐捕命者以除罪擅罪人無告劾繫治城旦以上十四人赦免罪人死罪十八人城旦舂以下五十八人賜人爵關內侯以下九十四人前日長病陛下心憂之使使者賜棗脯長不肯見拜使者南海民處廬江界中者反淮南吏卒擊之陛下遣使者齎帛五十匹以賜吏卒勞苦者長不欲受賜謾曰無勞苦者南海王織上書獻璧帛皇帝忌擅燔其書不以聞吏請召治忌長不遣謾曰忌病長所犯不軌當棄市臣請論如法制曰朕不忍置法於王其與列侯吏二千石議列侯吏二千石臣嬰等四十三人議皆曰宜論如法制曰其赦長死罪廢勿王有司奏請處蜀嚴道邛郵遣其子子母從居縣為築蓋家室皆日三食給薪菜鹽炊食器席蓐制曰食長給肉日五斤酒二斗令故美人材人得幸者十人從居於是盡誅所與謀者乃遣長載以輜車令縣次傳爰盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逢霧病死陛下有殺弟之名奈何上曰吾特苦之耳令復之淮南王謂侍者曰誰謂乃公勇者吾以驕不聞過故至此乃不食而死縣傳者不敢發車封至雍雍令發之以死聞上悲哭謂爰盎曰吾不從公言卒亡淮南王盎曰淮南王不可奈何願陛下自寬上曰為之奈何曰獨斬丞相御史以謝天下乃何上即令丞相御史逮諸縣傳淮南王不發封餽侍者皆棄市乃以列侯葬淮南王于雍置守冢三十家孝文八年憐淮南王王有子四人年皆七八歲乃封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯十二年民有作歌歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容上聞之曰昔堯舜放逐骨肉周公殺管蔡天下稱聖不以私害公天下豈以為我貪淮南地邪乃徙城陽王王淮南故地而追尊諡淮南王為厲王置園如諸侯儀十六年上憐淮南王廢法不軌自使失國早夭乃徙淮南王喜復王故城陽而立厲王三子王淮南故地三分之阜陵侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王東城侯良前薨無後孝景三年吳楚七國反吳使者至淮南王欲發兵應之其相曰王必欲應吳臣願為將王乃屬之相已將兵因城守不聽王而為漢漢亦使曲城侯將兵救淮南淮南以故得完吳使者至廬江廬江王不應而往來使越至衡山衡山王堅守無二心孝景四年吳楚已破衡山王朝上以為貞信乃勞苦之曰南方卑溼徒王王於濟北以襃之及薨遂賜諡為貞王廬江王以邊越數使使相交徙為衡山王王江北淮南王安為人好書鼓琴不喜弋獵狗馬馳騁亦欲以行陰德拊循百姓流名譽招致賓客方術之士數千人作為內書二十一篇外書甚眾又有中篇八卷言神仙黃白之術亦二十餘萬言時武帝方好藝文以安屬為諸父辯博善為文辭甚尊重之每為報書及賜常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛祕之使為離騷傳旦受詔日食時上又獻頌德及長安都國頌每宴見談說得失及方技賦頌昏莫然後罷安初入朝雅善太尉武安侯武安侯迎之霸上與語曰方今上無太子王親高皇帝孫行仁義天下莫不聞宮車一日晏駕非王尚誰立者淮南王大喜厚遺武安侯寶賂其群臣賓客江淮間多輕薄以厲王遷死感激安建元六年彗星見淮南王心怪之或說王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為上無太子天下有變諸侯並爭愈益治攻戰具積金錢賂遺郡國遊士妄作妖言阿諛王王喜多賜予之王有女陵彗有口王愛陵多予金錢為中詗長安約結上左右元朔二年上賜淮南王几杖不朝后荼愛幸生子遷為太子取皇太后外孫修成君女為太子妃王謀為反具畏太子妃知而內泄事乃與太子謀令詐不愛三月不同席王陽怒太子閉使與妃同內終不近妃妃求去王乃上書謝歸之后荼太子遷及女陵擅國權奪民田宅妄致繫人太子學用劍自以為人莫及聞郎中雷被巧召與戲被壹再辭讓誤中太子太子怒被恐此時有欲從軍者輒詣長安被即願奮擊匈奴太子數惡被王使郎中令斥免欲以禁後元朔五年被遂亡之長安上書自明事下廷尉河南河南治逮淮南太子王王后計欲毋遣太子遂發兵計未定猶與十餘日會有詔即訊太子淮南相怒壽春丞留太子逮不遣劾不敬王請相相不聽王使人上書告相事下廷尉治從迹連王王使人候司漢公卿請逮捕治王王恐欲發兵太子遷謀曰漢使即逮王令人衣衛士衣持戟居王旁有非是者即刺殺之臣亦使人刺殺淮南中尉乃舉兵未晚也是時上不許公卿而遣漢中尉宏即訊驗王王視漢中尉顏色和問斥雷被事耳自度無何不發中尉還以聞公卿治者曰淮南王安雍閼求奮擊匈奴者雷被等格明詔當棄市詔不許請廢勿王上不許請削五縣可二縣使中尉宏赦其罪罰以削地中尉入淮南界宣言赦王王初聞公卿請誅之未知得削地聞漢使來恐其捕之乃與太子謀如前計中尉至即賀王王以故不發其後自傷曰吾行仁義見削地寡人甚恥之為反謀益甚諸使者道長安來為妄言言上無男即喜言漢廷治有男即怒以為妄言非也日夜與左吳等按輿地圖部署兵所從入王曰上無太子宮車即晏駕大臣必徵膠東王不即常山王諸侯並爭吾可以無備乎且吾高帝孫親行仁義陛下遇我厚吾能忍之萬世之後吾寧能北面事豎子乎王有孽子不害最長王不愛后太子皆不以為子兄數不害子建材高有氣常怨望太子不省其父時諸侯皆得分子弟為侯淮南王有兩子一子為太子而建父不得為侯陰結交欲害太子以其父代之太子知之數捕繫笞建建具知太子之欲謀殺漢中尉即使所善壽春嚴正上書天子曰毒藥苦口利病忠言逆耳利行今淮南王孫建材能高淮南王后荼荼子遷常疾害建建父不害無罪擅數繫欲殺之今建在可徵問具知淮南王陰事書既聞上以其事下廷尉河南治是歲元朔六年也故辟陽侯孫審卿善丞相公孫弘怨淮南厲王殺其大父陰求淮南事而搆之於弘弘乃疑淮南有畔逆計深探其獄河南治建辭引太子及黨與初王數以舉兵謀問伍被被常諫之以吳楚七國為效王引陳勝吳廣被復言形勢不同必敗亡及建見治王恐國陰事泄欲發復問被被為言發兵權變語在被傳於是王銳欲發乃令官奴入宮中作皇帝璽丞相御史大夫將軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠欲如伍被計使人為得罪而西事大將軍丞相一日發兵即刺大將軍衛青而說丞相弘下之如發蒙耳欲發國中兵恐相二千石不聽王乃與伍被謀為失火宮中相二千石救火因殺之又欲令人衣求盜衣持羽檄從南方來呼言曰南越兵入欲因以發兵乃使人之廬江會稽為求盜未決廷尉以建辭連太子遷聞上遣廷尉監與淮南中尉逮捕太子至淮南王聞與太子謀召相二千石欲殺而發兵召相相至內史以出為解中尉曰臣受詔使不得見王王念獨殺相而內史中尉不來無益也即罷相計猶與未決太子念所坐者謀殺漢中尉所與謀殺者已死以為口絕乃謂王曰群臣可用者皆前繫今無足與事者王以非時發恐無功臣願會逮王亦愈欲休即許太子太子自刑不殊伍被自詣吏具告與淮南王謀反吏因捕太子王后圍王宮盡捕王賓客在國中者索得反具以聞上下公卿治所連引與淮南王謀反列侯二千石豪桀數千人皆以罪輕重受誅衡山王賜淮南王弟當坐收有司請逮捕衡山王上曰諸侯各以其國為本不當相坐與諸侯王列侯議趙王彭祖列侯讓等四十三人皆曰淮南王安大逆無道謀反明白當伏誅膠西王端議曰安廢法度行邪辟有詐偽心以亂天下營惑百姓背畔宗廟妄作妖言春秋曰臣毋將將而誅安罪重於將謀反形已定臣端所見其書印圖及它逆亡道事驗明白當伏法論國吏二百石以上及比者宗室近幸臣不在法中者不能相教皆當免削爵為士伍毋得官為吏其非吏它贖死金二斤八兩以章安之罪使天下明知臣子之道毋敢復有邪僻背畔之意丞相弘廷尉湯等以聞上使宗正以符節治王未至安自刑殺后太子諸所與謀皆收夷國除為九江郡衡山王賜后乘舒生子三人長男爽為太子次女無采少男孝姬徐來生子男女四人美人厥姬生子二人淮南衡山相責望禮節間不相能衡山王聞淮南王作為畔逆具亦心結賓客以應之恐為所并元光六年入朝謁者衛慶有方術欲上書事天子王怒故劾慶死罪強榜服之內史以為非是卻其獄王使人上書告內史內史治言王不直又數侵奪人田壞人冢以為田有司請逮治衡山王上不許為置吏二百石以上衡山王以此恚與奚慈張廣昌謀求能為兵法候星氣者日夜縱臾王謀反事后乘舒死立徐來為后厥姬俱幸兩人相妒厥姬乃惡徐來於太子曰徐來使婢蠱殺太子母太子心怨徐來徐來兄至衡山太子與飲以刃刑傷之后以此怨太子數惡之於王女弟無采嫁棄歸與客姦太子數以數讓之無采怒不與太子通后聞之即善遇無采及孝孝少失母附后后以計愛之與共毀太子王以故數繫笞太子元朔四年中人有賊傷后假母者王疑太子使人傷之笞太子後王病太子時稱病不侍孝無采惡太子實不病自言有喜色王於是大怒欲廢太子而立弟孝后知王決廢太子又欲并廢孝后有侍者善舞王幸之后欲令與孝亂以污之欲并廢二子而以己子廣代之太子知之念后數惡己無已時欲與亂以止其口后飲太子太子前為壽因據后股求與臥后怒以告王王乃召欲縛笞之太子知王常欲廢己而立孝乃謂王曰孝與王御者姦無采與奴姦王強食請上書即背王去王使人止之莫能禁王乃自追捕太子太子妄惡言王械繫宮中孝日益以親幸王奇孝材能乃佩之王印號曰將軍令居外家多給金錢招致賓客賓客來者微知淮南衡山有逆計皆將養勸之王乃使孝客江都人枚赫陳喜作輣車鍛矢刻天于璽將相軍吏印王日夜求壯士如周丘等數稱引吳楚反時計畫約束衡山王非敢效淮南王求即天子位畏淮南起并其國以為淮南已西發兵定江淮間而有之望如是元朔五年秋當朝六年過淮南淮南王乃昆弟語除前隙約束反具衡山王即上書謝病上賜不朝乃使人上書請廢太子爽立孝為太子爽聞即使所善白嬴之長安上書言衡山王與子謀逆言孝作兵車鍛矢與王御者姦至長安未及上書即吏捕嬴以淮南事繫王聞之恐其言國陰事即上書告太子以為不道事下沛郡治元狩元年冬有司求捕與淮南王謀反者得陳喜於孝家吏劾孝首匿喜孝以為陳喜雅數與王計反恐其發之聞律先自告除其罪又疑太子使白嬴上書發其事即先自告所與謀反者枚赫陳喜等廷尉治事驗請逮捕衡山王治上曰勿捕遣中尉安大行息即問王王具以情實對吏皆圍王宮守之中尉大行還以聞公卿請遣宗正大行與沛郡雜治王王聞即自殺孝先自告反告除其罪孝坐與王御婢姦及后徐來坐蠱前后乘舒及太子爽坐告王父不孝皆棄市諸坐與王謀反者皆誅國除為郡濟北貞王勃者景帝四年徙徙二年因前王衡山凡十四年薨子式王胡嗣五十四年薨子寬嗣十二年寬坐與父式后光姬孝兒姦誖人倫又祠祭祝詛上有司請誅上遣大鴻臚利召王王以刃自剄死國除為北安縣屬泰山郡贊曰詩云戎狄是膺荊舒是懲信哉是言也淮南衡山親為骨肉疆土千里列在諸侯不務遵蕃臣職以丞輔天子而剸懷邪辟之計謀為畔逆仍父子再亡國各不終其身此非獨王也亦其俗薄臣下漸靡使然夫荊楚剽輕好作亂乃自古記之矣
