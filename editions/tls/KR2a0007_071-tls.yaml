body:
  text: 蓋諸葛劉鄭孫毋將何傳第四十七蓋寬饒字次公魏郡人也明經為郡文學以孝廉為郎舉方正對策高第遷諫大夫行郎中戶將事劾奏衛將軍張安世子侍中陽都侯彭祖不下殿門并連及安世居位無補彭祖時實下門寬饒坐舉奏大臣非是左遷為衛司馬先是時衛司馬在部見衛尉拜謁常為衛官繇使市買寬饒視事案舊令遂揖官屬以下行衛者衛尉私使寬饒出寬饒以令詣官府門上謁辭尚書責問衛尉由是衛官不復私使候司馬候司馬不拜出先置衛輒上奏辭自此正焉寬饒初拜為司馬未出殿門斷其禪衣令短離地冠大冠帶長劍躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及歲盡交代上臨饗罷衛卒衛卒數千人皆叩頭自請願復留共更一年以報寬饒厚德宣帝嘉之以寬饒為太中大夫使行風俗多所稱舉貶黜奉使稱意擢為司隸校尉刺舉無所迴避小大輒舉所劾奏眾多廷尉處其法半用半不用公卿貴戚及郡國吏繇使至長安皆恐懼莫敢犯禁京師為清平恩侯許伯入弟丞相御史將軍中二千石皆賀寬饒不行許伯請之乃往從西階上東鄉特坐許伯自酌曰蓋君後至寬饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也坐者皆屬目卑下之酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭坐皆大笑寬饒不說卬視屋而歎曰美哉然富貴無常忽則易人此如傳舍所閱多矣唯謹慎為得久君侯可不戒哉因起趨出劾奏長信少府以列卿而沐猴舞失禮不敬上欲罪少府許伯為謝良久上乃解寬饒為人剛直高節志在奉公家貧奉錢月數千半以給吏民為耳目言事者身為司隸子常步行自戍北邊公廉如此然深刻喜陷害人在位及貴戚人與為怨又好言事刺議奸犯上意上以其儒者優容之然亦不得遷同列後進或至九卿寬饒自以行清能高有益於國而為凡庸所越愈失意不快數上疏諫爭太子庶子王生高寬饒節而非其如此予書曰明主知君絜白公正不畏彊禦故命君以司察之位擅君以奉使之權尊官厚祿已施於君矣君宜夙夜惟思當世之務奉法宣化憂勞天下雖日有益月有功猶未足以稱職而報恩也自古之治三王之術各有制度今君不務循職而已乃欲以太古久遠之事匡拂天子數進不用難聽之語以摩切左右非所以揚令名全壽命者也方今用事之人皆明習法令言足以飾君之辭文足以成君之過君不惟蘧氏之高蹤而慕子胥之末行用不訾之軀臨不測之險竊為君痛之夫君子直而不挺曲而不詘大雅云既明且哲以保其身狂夫之言聖人擇焉唯裁省覽寬饒不納其言是時上方用刑法信任中尚書宦官寬饒奏封事曰方今聖道浸廢儒術不行以刑餘為周召以法律為詩書又引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去不得其人則不居其位書奏上以寬饒怨謗終不改下其書中二千石時執金吾議以為寬饒指意欲求禪大逆不道諫大夫鄭昌愍傷寬饒忠直憂國以言事不當意而為文吏所詆挫上書頌寬饒曰臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司隸校尉寬饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諫為名不敢不言上不聽遂下寬饒吏寬饒引佩刀自剄北闕下眾莫不憐之諸葛豐字少季琅邪人也以明經為郡文學名特立剛直貢禹為御史大夫除豐為屬舉侍御史元帝擢為司隸校尉刺舉無所避京師為之語曰間何闊逢諸葛上嘉其節加豐秩光祿大夫時侍中許章以外屬貴幸奢淫不奉法度賓客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章迫窘馳車去豐追之許侍中因得入宮門自歸上豐亦上奏於是收豐節司隸去節自豐始豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下不量臣能否拜為司隸校尉未有以自效復秩臣為光祿大夫官尊責重非臣所當處也又迫年歲衰暮常恐卒填溝渠無以報厚德使論議士譏臣無補長獲素餐之名故常願損一旦之命不待時而斷姦臣之首縣於都市編書其罪使四方明知為惡之罰然後卻就斧鉞之誅誠臣所甘心也夫以布衣之士尚猶有刎剄之交今以四海之大曾無伏節死誼之臣率盡苟合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感于天是以災變數見百姓困乏此臣下不忠之效也臣誠恥之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容使尚書令堯賜臣豐書曰夫司隸者刺舉不法善善惡惡非得顓之也免處中和順經術意恩深德厚臣豐頓首幸甚臣竊不勝憤懣願賜清宴唯陛下裁幸上不許是後所言益不用豐復上書言臣聞伯奇孝而棄於親子胥忠而誅於君隱公慈而殺於弟叔武弟而殺於弟兄夫以四子之行屈平之材然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國蒙誅以顯君臣誠願之獨恐未有云補而為眾邪所排令讒夫得遂正直之路雍塞忠臣沮心智士杜口此愚臣之所懼也豐以春夏繫治人在位多言其短上徙豐為城門校尉豐上書告光祿勳周堪光祿大夫張猛上不直豐乃制詔御史城門校尉豐前與光祿勳堪光祿大夫猛在朝之時數稱言堪猛之美豐前為司隸校尉不順四時修法度專作苛暴以獲虛威朕不忍下吏以為城門校尉不內省諸己而反怨堪猛以求報舉告案無證之辭暴揚難驗之罪毀譽恣意不顧前言不信之大者也朕憐豐之耆老不忍加刑其免為庶人終於家劉輔河間宗室人也舉孝廉為襄賁令上書言得失召見上美其材擢為諫大夫會成帝欲立趙倢伃為皇后先下詔封倢伃父臨為列侯輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以災變此神明之徵應自然之占驗也昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒況於季世不變繼嗣之福屢受威怒之異者虖雖夙夜自責改過易行畏天命念祖業妙選有德之世考卜窈窕之女以承宗廟順神祇心塞天下望子孫之祥猶恐晚暮今乃觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之朝廷莫肯壹言臣竊傷心自念得以同姓拔擢尸祿不忠污辱諫爭之官不敢不盡死唯陛下深察書奏上使侍御史收縛輔繫掖庭祕獄群臣莫知其故於是中朝左將軍辛慶忌右將軍廉襃光祿勳師丹太中大夫谷永俱上書曰臣聞明王垂寬容之聽崇諫爭之官廣開忠直之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無讇諛之士元首無失道之諐竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬日之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官與眾共之昔趙簡子殺其大夫鳴犢孔子臨河而還今天心未豫災異屢降水旱迭臻方當隆寬廣問襃直盡下之時也而行慘急之誅於諫爭之臣震驚群下失忠直心假令輔不坐直言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精銳銷耎莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察上乃徙繫輔共工獄減死罪一等論為鬼薪終於家鄭崇字子游本高密大族世與王家相嫁娶祖父以訾徙平陵父賓明法令為御史事貢公名公直崇少為郡文學史至丞相大車屬弟立與高武侯傅喜同門學相友善喜為大司馬薦崇哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黃晝昏日中有黑氣今祖母從昆弟二人已侯孔鄉侯皇后父高武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極弱逆陰者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克壽故衰世之君夭折蚤沒此皆犯陰之害也臣願以身命當國咎崇因持詔書案起傅太后大怒曰何有為天子乃反為一臣所顓制邪上遂下詔曰朕幼而孤皇太太后躬自養育免于襁褓教道以禮至於成人惠澤茂焉欲報之德皞天罔極前追號皇太太后父為崇祖侯惟念德報未殊朕甚恧焉侍中光祿大夫商皇太太后父同產子小自保大恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯崇又以董賢貴寵過度諫由是重得罪數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中孫寶字子嚴潁川鄢陵人也以明經為郡史御史大夫張忠辟寶為屬欲令授子經更為除舍設儲偫寶自劾去忠固還之心內不平後署寶主簿寶徙入舍祭竈請比鄰忠陰察怪之使所親問寶前大夫為君設除大舍子自劾去者欲為高節也今兩府高士俗不為主簿子既為之徙舍甚說何前後不相副也寶曰高士不為主簿而大夫君以寶為可一府莫言非士安得獨自高前日君男欲學文而移寶自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為況主簿乎忠聞之甚慚上書薦寶經明質直宜備近臣為議郎遷諫大夫鴻嘉中廣漢群盜起選為益州刺史廣漢太守扈商者大司馬車騎將軍王音姊子軟弱不任職寶到部親入山谷諭告群盜非本造意渠率皆得悔過自出遣歸田里自劾矯制奏商為亂首春秋之義誅首惡而已商亦奏寶所縱或有渠率當坐者商徵下獄寶坐失死罪免益州吏民多陳寶功效言為車騎將軍所排上復拜寶為冀州刺史遷丞相司直時帝舅紅陽侯立使客因南郡太守李尚占墾草田數百頃頗有民所假少府陂澤略皆開發上書願以入縣官有詔郡平田予直錢有貴一萬萬以上寶聞之遣丞相史按驗發其姦劾奏立尚懷姦罔上狡猾不道尚下獄死立雖不坐後兄大司馬衛將軍商薨次當代商上度立而用其弟曲陽侯根為大司馬票騎將軍會益州蠻夷犯法巴蜀頗不安上以寶著名西州拜為廣漢太守秩中二千石賜黃金三十斤蠻夷安輯吏民稱之徵為京兆尹故吏侯文以剛直不苟合常稱疾不肯仕寶以恩禮請文欲為布衣友日設酒食妻子相對文求受署為掾進見如賓禮數月以立秋日署文東部督郵入見敕曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎文卬曰無其人不敢空受職寶曰誰也文曰霸陵杜穉季寶曰其次文曰豺狼橫道不宜復問狐狸寶默然穉季者大俠與衛尉淳于長大鴻臚蕭育等皆厚善寶前失車騎將軍與紅陽侯有卻自恐見危時淳于長方貴幸友寶寶亦欲附之始視事而長以穉季託寶故寶窮無以復應文文怪寶氣索知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問如此竟歲吏民未敢誣明府也即度穉季而譴它事眾口讙譁終身自墮寶曰受教穉季耳目長聞知之杜門不通水火穿舍後牆為小戶但持鉏自治園因文所厚自陳如此文曰我與穉季幸同土壞素無睚眥顧受將命分當相直誠能自改嚴將不治前事即不更心但更門戶適趣禍耳穉季遂不敢犯法寶亦竟歲無所譴明年穉季病死寶為京兆尹三歲京師稱之會淳于長敗寶與蕭育等皆坐免官文復去吏死於家穉季子杜蒼字君敖名出穉季右在游俠中哀帝即位徵寶為諫大夫遷司隸初傅太后與中山孝王母馮太石俱事元帝有卻傅太后使有司考馮太后令自殺眾庶冤之寶奏請覆治傅太后大怒曰帝置司隸主使察我馮氏反事明白故欲擿觖以揚我惡我當坐之上乃順指下寶獄尚書僕射唐林爭之上以林朋黨比周左遷敦煌魚澤障候大司馬傅喜光祿大夫龔勝固爭上為言太后出寶復官頃之鄭崇下獄寶上書曰臣聞疏不圖親外不慮內臣幸得銜命奉使職在刺舉不敢避貴幸之勢以塞視聽之明按尚書令昌奏僕射崇下獄覆治榜掠將死卒無一辭道路稱冤疑昌與崇內有纖介浸潤相陷自禁門內樞機近臣蒙受冤譖虧損國家為謗不小臣請治昌以解眾心書奏天子不說以寶名臣不忍誅乃制詔丞相大司空司隸寶奏故尚書僕射崇冤請獄治尚書令昌案崇近臣罪惡暴著而寶懷邪附下罔上以春月作詆欺遂其姦心蓋國之賊也傳不云乎惡利口之覆國家其免寶為庶人哀帝崩王莽白王太后徵寶以為光祿大夫與王舜等俱迎中山王平帝立寶為大司農會越嶲郡上黃龍游江中太師孔光大司徒馬宮等咸稱莽功德比周公宜告祠宗廟寶曰周公上聖召公大賢尚猶有不相說著於經典兩不相損今風雨未時百姓不足每有一事群臣同聲得無非其美者時大臣皆失色侍中奉車都尉甄邯即時承制罷議者會寶遣吏迎母母道病留弟家獨遣妻子司直陳崇以奏寶事下三公即訊寶對曰年七十誖眊恩衰共養營妻子如章寶坐免終於家建武中錄舊德臣以寶孫伉為諸長毋將隆字君房東海蘭陵人也大司馬車騎將軍王音內領尚書外典兵馬踵故選置從事中郎與參謀議奏請隆為從事中郎遷諫大夫成帝末隆奏封事言古者選諸侯入為公卿以襃功德宜徵定陶王使在國邸以填萬方其後上竟立定陶王為太子隆遷冀州牧潁川太守哀帝即位以高第入為京兆尹遷執金吾時侍中董賢方貴上使中黃門發武庫兵前後十輩送董賢及上乳母王阿舍隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乘輿不以給共養共養勞賜壹出少府蓋不以本臧給末用不以民力共浮費別公私示正路也古者諸侯方伯得顓征伐乃賜斧鉞漢家邊吏職在距寇亦賜武庫兵皆任其事然後蒙之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣私恩微妾而以天下公用給其私門契國威器共其家備民力分於弄臣武兵設於微妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂臣請收還武庫上不說頃之傅太后使謁者買諸官婢賤取之復取執金吾官婢八人隆奏言賈賤請更平直上於是制詔丞相御史大夫交讓之禮興則虞芮之訟息隆位九卿既無以匡朝廷之不逮而反奏請與永信宮爭貴賤之賈程奏顯言眾莫不聞舉錯不由誼理爭求之名自此始無以示百僚傷化失俗以隆前有安國之言左遷為沛郡都尉遷南郡太守王莽少時慕與隆交隆不甚附哀帝崩莽秉政使大司徒孔光奏隆前為冀州牧治中山馮太后獄冤陷無辜不宜處位在中土本中謁者令史立侍御史丁玄自典考之但與隆連名奏事史立時為中太僕丁玄泰山太守及尚書令趙昌譖鄭崇者為河內太守皆免官徙合浦何並字子廉祖父以吏二千石自平輿徙平陵並為郡吏至大司空掾事何武武高其志節舉能治劇為長陵令道不拾遺初邛成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賓客愈盛歸長陵上冢因留飲連日並恐其法犯法自造門上謁謂林卿曰冢間單外君宜以時歸林卿曰諾先是林卿殺婢壻埋冢舍並具知之以非己時又見其新免故不發舉欲無令留界中而已即且遣吏奉謁傳送林卿素驕慚於賓客並度其為變儲兵馬以待之林卿既去北度涇橋令騎奴還至寺門拔刀剝其建鼓並自從吏兵追林卿行數十里林卿迫窘乃令奴冠其冠被其襜褕自代乘車從童騎身變服從間徑馳去會日暮追及收縛冠奴奴曰我非侍中奴耳並心自知已失林卿乃曰王君困自稱奴得脫死邪叱吏斷頭持還縣所剝鼓置都亭下署曰故侍中王林卿坐殺人埋冢舍使奴剝寺門鼓吏民驚駭林卿因亡命眾庶讙譁以為實死成帝太后以邛成太后愛林卿故聞之涕泣為言哀帝哀帝問狀而善之遷並隴西太守徙潁川太守代陵陽嚴詡詡本以孝行為官謂掾史為師友有過輒閉閤自責終不大言郡中亂王莽遣使徵詡官屬數百人為設祖道詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳詡至拜為美俗使者是時潁川鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪願蚤就髡鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟陽翟輕俠趙季李款多畜賓客以氣力漁食閭里至姦人婦女持吏長短從橫郡中聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部敕曰三人非負太守乃負王法不得不治鍾威所犯多在赦前驅使入函谷關勿令汙民間不入關乃收之趙李桀惡雖遠去當得其頭以謝百姓鍾威負其兄止雒陽吏格殺之亦得趙李它郡持頭還並皆縣頭及其具獄於市郡中清靜表善好士見紀潁川名次黃霸性清廉妻子不至官舍數年卒疾病召丞掾作先令書曰告子恢吾生素餐日久死雖當得法賻勿受葬為小椁亶容下棺恢如父言王莽擢恢為關都尉建武中以並孫為郎贊曰蓋寬饒為司臣正色立於朝雖詩所謂國之司直無以加也若采王生之言以終其身斯近古之賢臣矣諸葛劉鄭雖云狂瞽有異志焉孔子曰吾未見剛者以數子之名迹然毋將汙於冀州孫寶橈於定陵況俗人乎何並之節亞尹翁歸云
