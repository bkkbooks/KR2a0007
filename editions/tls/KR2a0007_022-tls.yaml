body:
  text: 藝文志第十昔仲尼沒而微言絕七十子喪而大義乖故春秋分為五詩分為四易有數家之傳戰國從衡真偽分爭諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩聖上喟然而稱曰朕甚閔焉於是建藏書之策置寫書之官下及諸子傳說皆充祕府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技每一書已向輒條其篇目撮其指意錄而奏之會向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總群書而奏其七略故有輯略有六藝略有諸子略有詩賦略有兵書略有術數略有方技略今刪其要以備篇籍易經十二篇施孟梁丘三家易傳周氏二篇服氏二篇楊氏二篇蔡公二篇韓氏二篇王氏二篇丁氏八篇古五子十八篇淮南道訓二篇古雜八十篇雜災異三十五篇神輸五篇圖一孟氏京房十一篇災異孟氏京房六十六篇五鹿充宗略說三篇京氏段嘉十二篇章句施孟梁丘氏各二篇凡易十三家二百九十四篇易曰宓戲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情至於殷周之際紂在上位逆天暴物文王以諸侯順命而行道天人之占可得而效於是重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬十篇故曰易道深矣人更三聖世歷三古及秦燔書而易為筮卜之事傳者不絕漢興田和錢大昭說和當作何按景祐殿本都作何何錢大昭說和當作何按景祐殿本都作何傳之訖于宣元有施孟梁丘京氏列於學官而民間有費高二家之說劉向以中古文易經校施孟梁丘經或脫去無咎悔亡唯費氏經與古文同尚書古文經四十六卷經二十九卷傳四十一篇歐陽章句三十一卷大小夏侯章句各二十九卷大小夏侯解故二十九篇歐陽說義二篇劉向五行傳記十一卷許商五行傳記一篇周書七十一篇議奏四十二篇凡書九家四百一十二篇易曰河出圖雒出書聖人則之故書之所起遠矣至孔子篹焉上斷於堯下訖于秦凡百篇而為之序言其作意秦燔書禁學濟南伏生獨壁藏之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立於學官古文尚書者出孔子壁中武帝末魯共王壞孔子宅欲以廣其宮而得古文尚書及禮記論語孝經凡數十篇皆古字也共王往入其宅聞鼓琴瑟鍾磬之音於是懼乃止不壞孔安國者孔子後也悉得其書以考二十九篇得多十六篇安國獻之遭巫蠱事未列于學官劉向以中古文校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十書者古之號令號令於眾其言不立具則聽受施行者弗曉古文讀應爾雅故解古今語而可知也詩經二十八卷魯齊韓三家魯故二十五卷魯說二十八卷齊后氏故二十卷齊孫氏故二十七卷齊后氏傳三十九卷齊孫氏傳二十八卷齊雜記十八卷韓故三十六卷韓內傳四卷韓外傳六卷韓說四十一卷毛詩二十九卷毛詩故訓傳三十卷凡詩六家四百一十六卷書曰詩言志哥景祐殿本都作歌下及注並同歌景祐殿本都作歌下及注並同詠言故哀樂之心感而哥歌詠之聲發誦其言謂之詩詠其聲謂之哥歌故古有采詩之官王者所以觀風俗知得失自考正也孔子純取周詩上采殷下取魯凡三百五篇遭秦而全者以其諷誦不獨在竹帛故也漢興魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜說咸非其本義與不得已魯最為近之三家皆列於學官又有毛公之學自謂子夏所傳而河間獻王好之未得立禮古經五十六卷經七十劉敞說此七十與後七十皆當作十七錢大昭王先謙都說劉說是十七劉敞說此七十與後七十皆當作十七錢大昭王先謙都說劉說是篇記百三十一篇明堂陰陽三十三篇王史氏二十一篇曲臺后倉九篇中庸說二篇明堂陰陽說五篇周官經六篇周官傳四篇軍禮司馬法百五十五篇古封禪群祀二十二篇封禪議對十九篇漢封禪群祀三十六篇議奏三十八篇凡禮十三家五百五十五篇易曰有夫婦父子君臣上下禮義有所錯而帝王質文世有損益至周曲為之防事為之制故曰禮經三百威儀三千及周之衰諸侯將踰法度惡其害己皆滅去其籍自孔子時而不具至秦大壞漢興魯高堂生傳士禮十七篇訖孝宣世后倉最明戴德戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中及孔氏學七十劉敞說學七十當作與十七楊樹達以為劉說確鑿不可易與十七劉敞說學七十當作與十七楊樹達以為劉說確鑿不可易篇文相似多三十九篇及明堂陰陽王史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉倉等推士禮而致於天子之說樂記二十三篇王禹記二十四篇雅歌詩四篇雅琴趙氏七篇雅琴師氏八篇雅琴龍氏九十九篇凡樂六家百六十五篇易曰先王作樂崇德殷薦之上帝以享祖考故自黃帝下至三代樂各有名孔子曰安上治民莫善於禮移風易俗莫善於樂二者相與並行周衰俱壞樂尤微眇以音律為節又為鄭衛所亂故無遺法漢興制氏以雅樂聲律世在樂官頗能紀其鏗鏘鼓舞而不能言其義六國之君魏文侯最為好古孝文時得其樂人竇公獻其書乃周官大宗伯之大司樂章也武帝時河間獻王好儒與毛生等共采周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相遠其內史丞王定傳之以授常山王禹禹成帝時為謁者數言其義獻二十四卷記劉向校書得樂記二十三篇與禹不同其道𥧲以益微春秋古經十二篇經十一卷左氏傳三十卷公羊傳十一卷穀梁傳十一卷鄒氏傳十一卷夾氏傳十一卷左氏微二篇鐸氏微三篇張氏微十篇虞氏微傳二篇公羊外傳五十篇穀梁外傳二十篇公羊章句三十八篇穀梁章句三十三篇公羊雜記八十三篇公羊顏氏記十一篇公羊董仲舒治獄十六篇議奏三十九篇國語二十一篇新國語五十四篇世本十五篇戰國策三十三篇奏事二十篇楚漢春秋九篇太史公百三十篇馮商所續太史公七篇太古以來年紀二篇漢著記百九十卷漢大年紀五篇凡春秋二十三家九百四十八篇古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事事為春秋言為尚書帝王靡不同之周室既微載籍殘缺仲尼思存前聖之業乃稱曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定曆數藉朝聘以正禮樂有所襃諱貶損不可書見口授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而作傳明夫子不以空言說經也春秋所貶損大人當世君臣有威權勢力其事實皆形於傳是以隱其書而不宣所以免時難也及末世口說流行故有公羊穀梁鄒夾之傳四家之中公羊穀梁立於學官鄒氏無師夾氏未有書論語古二十一篇齊二十二篇魯二十篇傳十九篇齊說二十九篇魯夏侯說二十一篇魯安昌侯說二十一篇魯王駿說二十篇燕傳說三卷議奏十八篇孔子家語二十七卷孔子三朝七篇孔子徒人圖法二卷凡論語十二家二百二十九篇論語者孔子應答弟子時人及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子既卒門人相與輯而論篹故謂之論語漢興有齊魯之說傳齊論者昌邑中尉王吉少府宋畸御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家傳魯論語者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行於世孝經古孔氏一篇孝經一篇長孫氏說二篇江氏說一篇翼氏說一篇后氏說一篇雜傳四篇安昌侯說一篇五經雜議十八篇爾雅三卷二十篇小爾雅一篇古今字一卷弟子職一篇說三篇凡孝經十一家五十九篇孝經者孔子為曾子陳孝道也夫孝天之經地之義民之行也舉大者言故曰孝經漢興長孫氏博士江翁少府后倉諫大夫翼奉安昌侯張禹傳之各自名家經文皆同唯孔氏壁中古文為異父母生之續莫大焉故親生之膝下諸家說不安處古文字讀皆異史籀十五篇八體六技蒼頡一篇凡將一篇急就一篇元尚一篇訓纂一篇別字十三篇蒼頡傳一篇揚雄蒼頡訓纂一篇杜林蒼頡訓纂一篇杜林蒼頡故一篇凡小學十家四十五篇易曰上古結繩以治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬揚於王庭言其宣揚於王者朝廷其用最大也古者八歲入小學故周官保氏掌養國子教之六書謂象形象事象意象聲轉注假借造字之本也漢興蕭何草律亦著其法曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾六體者古文奇字篆書隸書繆篆蟲書皆所以通知古今文字摹印章書幡信也古制書必同文不知則闕問諸故老至於衰世是非無正人用其私故孔子曰吾猶及史之闕文也今亡矣夫蓋傷其𥧲不正史籀篇者周時史官教學童書也與孔氏壁中古文異體蒼頡七章者秦丞相李斯所作也爰歷六章者車府令趙高所作也博學七章者太史令胡母敬所作也文字多取史籀篇而篆體復頗異所謂秦篆者也是時始造隸書矣起於官獄多事苟趨省易施之於徒隸也漢書景祐殿本都作興此誤興景祐殿本都作興此誤閭里書師合蒼頡爰歷博學三篇斷六十字以為一章凡五十五章并為蒼頡篇武帝時司馬相如作凡將篇無復字元帝時黃門令史游作急就篇成帝時將作大匠李長作元尚篇皆蒼頡中正字也凡將則頗有出矣至元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂篇順續蒼頡又易蒼頡中重復之字凡八十九章臣復續揚雄作十二景祐殿本都作三王先謙說作三是三景祐殿本都作三王先謙說作三是章凡一百二章無復字六藝群書所載略備矣蒼頡多古字俗師失其讀宣帝時徵齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故并列焉凡六藝一百三家三千一百二十三篇六藝之文樂以和神仁之表也詩以正言義之用也禮以明體明者著見故無訓也書以廣聽知之術也春秋以斷事信之符也五者蓋五常之道相須而備而易為之原故曰易不可見則乾坤或幾乎息矣言與天地為終始也至於五學世有變改猶五行之更用事焉古之學者耕且養三年而通一藝存其大體玩經文而已是故用日少而畜德多三十而五經立也後世經傳既已乖離博學者又不思多聞闕疑之義而務碎義逃難便辭巧說破壞形體說五字之文至於二三萬言後進彌以馳逐故幼童而守一藝白首而後能言安其所習毀所不見終以自蔽此學者之大患也序六藝為九種晏子八篇子思二十三篇曾子十八篇漆雕子十三篇宓子十六篇景子三篇世子二十一篇魏文侯六篇李克七篇公孫尼子二十八篇孟子十一篇孫卿子三十三篇羋子十八篇內業十五篇周史六弢六篇周政六篇周法九篇河間周制十八篇讕言十一景祐殿本都作十篇篇功議四篇甯越一篇王孫子一篇公孫固一篇李氏春秋二篇羊子四篇董子一篇侯景祐殿本都作俟王先謙說作俟是俟景祐殿本都作俟王先謙說作俟是子一篇徐子四十二篇魯仲連子十四篇平原君七篇虞氏春秋十五篇高祖傳十三篇陸賈二十三篇劉敬三篇孝文傳十一篇賈山八篇太常蓼侯孔臧十篇賈誼五十八篇河間獻王對上下三雍宮三篇董仲舒百二十三篇兒寬九篇公孫弘十篇終軍八篇吾丘壽王六篇虞丘說一篇莊助四篇臣彭四篇鉤盾冗從李步昌八篇儒家言十八篇不知作者桓寬鹽鐵論六十篇劉向所序六十七篇楊雄所序三十八篇右儒五十三家八百三十六篇儒家者流蓋出於司徒之官助人君順陰陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高孔子曰如有所譽其有所試唐虞之隆殷周之盛仲尼之業已試之效者也然惑者既失精微而辟者又隨時抑揚違離道本苟以譁眾取寵後進循之是以五經乖析儒學𥧲衰此辟儒之患伊尹五十一篇太公二百三十七篇謀八十一篇言七十一篇兵八十五篇辛甲二十九篇鬻子二十二篇筦子八十六篇老子鄰氏經傳四篇老子傅氏經說三十七篇老子徐氏經說六篇劉向說老子四篇文子九篇蜎子十三篇關尹子九篇莊子五十二篇列子八篇老成子十八篇長盧子九篇楚人二字據景祐殿本補王狄子一篇公子牟四篇田子二十五篇老萊子十六篇黔婁子四篇宮孫子二篇鶡冠子一篇周訓十四篇黃帝四經四篇黃帝銘六篇黃帝君臣十篇雜黃帝五十八篇力牧二十二篇孫子十六篇捷子二篇曹羽二篇郎中嬰齊十二篇臣君子二篇鄭長者一篇楚子三篇道家言二篇右道三十七家九百九十三篇道家者流蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛以自守卑弱以自持此君人南面之術也合於堯之克攘易之嗛嗛一謙而四益此其所長也及放者為之則欲絕去禮學兼棄仁義曰獨任清虛可以為治宋司星子韋三篇公檮生終始十四篇公孫發二十二篇鄒子四十九篇鄒子終始五十六篇乘丘子五篇杜文公五篇黃帝泰素二十篇南公三十一篇容成子十四篇張蒼十六篇鄒奭子十二篇閭丘子十三篇馮促十三篇將鉅子五篇五曹官制五篇周伯十一篇衛侯官十二篇于長天下忠臣九篇公孫渾邪十五篇雜陰陽三十八篇右陰陽二十一家三百六十九篇陰陽家者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神李子三十二篇商君二十九篇申子六篇處子九篇慎子四十二篇韓子五十五篇游棣子一篇鼂錯三十一篇燕十事十篇法家言二篇右法十家二百一十七篇法家者流蓋出於理官信賞必罰以輔禮制易曰先王以明罰飭法此其所長也及刻者為之則無教化去仁愛專任刑法而欲以致治至於殘害至親傷恩薄厚鄧析二篇尹文子一篇公孫龍子十四篇成公生五篇惠子一篇黃公四篇毛公九篇右名七家三十六篇名家者流蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎名不正則言不順言不順則事不成此其所長也及譥者為之則苟鉤鈲李慈銘說鈲當作䤨注同䤨李慈銘說鈲當作䤨注同析亂而已尹佚二篇田俅子三篇我子一篇隨巢子六篇胡非子三篇墨子七十一篇右墨六家八十六篇墨家者流蓋出於清廟之守茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼順四時而行是以非命以孝視天下是以上同此其所長也及蔽者為之見儉之利因以非禮推兼愛之意而不知別親疏蘇子三十一篇張子十篇龐煖二篇闕子一篇國筮子十七篇秦零陵令信一篇蒯子五篇鄒陽七篇主父偃二十八篇徐樂一篇莊安一篇待詔金馬聊蒼三篇右從橫十二家百七篇從橫家者流蓋出於行人之官孔子曰誦詩三百使於四方不能專對雖多亦奚以為又曰使乎使乎言其當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信孔甲盤盂二十六篇大禹三十七篇五子胥八篇子晚子三十五篇由余三篇尉繚子景祐殿本都無子字二十九篇尸子二十篇呂氏春秋二十六篇淮南內二十一篇淮南外三十三篇東方朔二十篇伯象先生一篇荊軻論五篇吳子一篇公孫尼一篇博士臣賢對一篇臣說三篇解子簿書三十五篇推雜書八十七篇雜家言一篇右雜二十家四百三篇雜家者流蓋出於議官兼儒墨合名法知國體之有此見王治之無不貫此其所長也及盪者為之則漫羨而無所歸心神農二十篇野老十七篇宰氏十七篇董安國十六篇尹都尉十四篇趙氏五篇氾勝之十八篇王氏六篇蔡癸一篇右農九家百一十四篇農家者流蓋出於農稷之官播百穀勸耕桑以足衣食故八政一曰食二曰貨孔子曰所重民食此其所長也及鄙者為之以為無所事聖王欲使君臣並耕誖上下之序伊尹說二十七篇鬻子說十九篇周考七十六篇青史子五十七篇師曠六篇務成子十一篇宋子十八篇天乙三篇黃帝說四十篇封禪方說十八篇待詔臣饒心術二十五篇待詔臣安成未央術一篇臣壽周紀七篇虞初周說九百四十三篇百家百三十九卷右小說十五家千三百八十篇小說家者流蓋出於稗官街談巷語道聽塗說者之所造也孔子曰雖小道必有可觀者焉致遠恐泥是以君子弗為也然亦弗滅也閭里小知者之所及亦使綴而不忘如或一言可采此亦芻蕘狂夫之議也凡諸子百八十九家四千三百二十四篇諸子十家其可觀者九家而已皆起於王道既微諸侯力政時君世主好惡殊方是以九家之說景祐殿本都作術術景祐殿本都作術蠭出並作各引一端崇其所善以此馳說取合諸侯其言雖殊辟猶水火相滅亦相生也仁之與義敬之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮今異家者各推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之材已仲尼有言禮失而求諸野方今去聖久遠道術缺廢無所更索彼九家者不猶瘉於野乎若能修六藝之術而觀此九家之言舍短取長則可以通萬方之略矣屈原賦二十五篇唐勒賦四篇宋玉賦十六篇趙幽王賦一篇莊夫子賦二十四篇賈誼賦七篇枚乘賦九篇司馬相如賦二十九篇淮南王賦八十二篇淮南王群臣賦四十四篇太常蓼侯孔臧賦二十篇陽丘侯劉隁賦十九篇吾丘壽王賦十五篇蔡甲賦一篇上所自造賦二篇兒寬賦二篇光祿大夫張子僑賦三篇陽成侯劉德賦九篇劉向賦三十三篇王襃賦十六篇右賦二十家三百六十一篇陸賈賦三篇枚皋賦百二十篇朱建賦二篇常侍郎莊怱奇賦十一篇嚴助賦三十五篇朱買臣賦三篇宗正劉辟彊賦八篇司馬遷賦八篇郎中臣嬰齊賦十篇臣說賦九篇臣吾賦十八篇遼東太守蘇季賦一篇蕭望之賦四篇河內太守徐明賦三篇給事黃門侍郎李息賦九篇淮陽憲王賦二篇揚雄賦十二篇待詔馮商賦九篇博士弟子杜參賦二篇車郎張豐賦三篇驃騎將軍朱宇賦三篇右賦二十一家二百七十四篇孫卿賦十篇秦時雜賦九篇李思孝景皇帝頌十五篇廣川惠王越賦五篇長沙王群臣賦三篇魏內史賦二篇東暆令延年賦七篇衛士令李忠賦二篇張偃賦二篇賈充賦四篇張仁賦六篇秦充賦二篇李步昌賦二篇侍郎謝多賦十篇平陽公主舍人周長孺賦二篇雒陽錡華賦九篇眭弘賦一篇別栩陽賦五篇臣昌市賦六篇臣義賦二篇黃門書者假史王商賦十三篇侍中徐博賦四篇黃門書者王廣呂嘉賦五篇漢中都尉丞華龍賦二篇左馮翊史路恭賦八篇右賦二十五家百三十六篇客主賦十八篇雜行出及頌德賦二十四篇雜四夷及兵賦二十篇雜中賢失意賦十二篇雜思慕悲哀死賦十六篇雜鼓琴劍戲賦十三篇雜山陵水泡雲氣雨旱賦十六篇雜禽獸六畜昆蟲賦十八篇雜器械草木賦三十三篇文景祐殿本都作大大景祐殿本都作大雜賦三十四篇成相雜辭十一篇隱書十八篇右雜賦十二家二百三十三篇高祖歌詩二篇泰一雜甘泉壽宮歌詩十四篇宗廟歌詩五篇漢興以來兵所誅滅歌詩十四篇出行巡狩及游歌詩十篇臨江王及愁思節士歌詩四篇李夫人及幸貴人歌詩三篇詔賜中山靖王子噲及孺子妾冰未央材人歌詩四篇吳楚汝南歌詩十五篇燕代謳雁門雲中隴西歌詩九篇邯鄲河間歌詩四篇齊鄭歌詩四篇淮南歌詩四篇左馮翊秦歌詩三篇京兆尹秦歌詩五篇河東蒲反歌詩一篇黃門倡車忠等歌詩十五篇雜各有主名歌詩十篇雜歌詩九篇雒陽歌詩四篇河南周歌詩七篇河南周歌聲曲折七篇周謠歌詩七十五篇周謠歌詩聲曲折七十五篇諸神歌詩三篇送迎靈頌歌詩三篇周歌詩二篇南郡歌詩五篇右歌詩二十八家三百一十四篇凡詩賦百六家千三百一十八篇傳曰不歌而誦謂之賦登高能賦可以為大夫言感物造耑材知深美可與圖事故可以為列大夫也古者諸侯卿大夫交接鄰國以微言相感當揖讓之時必稱詩以諭其志蓋以別賢不肖而觀盛衰焉故孔子曰不學詩無以言也春秋之後周道𥧲壞聘問歌詠不行於列國學詩之士逸在布衣而賢人失志之賦作矣大儒孫卿及楚臣屈原離讒憂國皆作賦以風咸有惻隱古詩之義其後宋玉唐勒漢興枚乘司馬相如下及揚子雲競為侈麗閎衍之詞沒其風諭之義是以揚子悔之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門人用賦也則賈誼登堂相如入室矣如其不用何自孝武立樂府而采歌謠於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知薄厚云序景祐殿本都有序字詩賦為五種吳孫子兵法八十二篇齊孫子八十九篇公孫鞅二十七篇吳起四十八篇范蠡二篇大夫種二篇季景祐殿本都作李李景祐殿本都作李子十篇娷一篇兵春秋一篇龐煖三篇兒良一篇廣武君一篇韓信三篇右兵權謀十三家二百五十九篇權謀者以正守國以奇用兵先計而後戰兼形勢包陰陽用技巧者也楚兵法七篇蚩尤二篇孫軫五篇繇敘二篇王孫十六篇尉繚三十一篇魏公子二十一篇景子十三篇李良三篇丁子一篇項王一篇右兵形勢十一家九十二篇圖十八卷形勢者靁動風舉後發而先至離合背鄉變化無常以輕疾制敵者也太壹兵法一篇天一兵法三十五篇神農兵法一篇黃帝十六篇封胡五篇風后十三篇力牧十五篇鵊冶子一篇鬼容區三篇地典六篇孟子一篇東父三十一篇師曠八篇萇弘十五篇別成子望軍氣六篇辟兵威勝方七十篇右陰陽十六家二百四十九篇圖十卷陰陽者順時而發推刑德隨斗擊因五勝假鬼神而為助者也鮑子兵法十篇五子胥十篇公勝子五篇苗子五篇逢門射法二篇陰通成射法十一篇李將軍射法三篇魏氏射法六篇彊弩將軍王圍射法五卷望遠連弩射法具十五篇護軍射師王賀射書五篇蒲苴子弋法四篇劍道三十八篇手搏六篇雜家兵法五十七篇蹴𩌽二十五篇右兵技巧十三家百九十九篇技巧者習手足便器械積機關以立攻守之勝者也凡兵書五十三家七百九十篇圖四十三卷兵家者蓋出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵以不教民戰是謂棄之明兵之重也易曰古者弦木為弧剡木為矢弧矢之利以威天下其用上矣後世燿金為刃割革為甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出奇設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸呂用事而盜取之武帝時軍政楊僕捃摭遺逸紀奏兵錄猶未能備至于孝成命任宏論次兵書為四種泰壹雜子星二十八卷五殘雜變星二十一卷黃帝雜子氣三十三篇常從日月星氣二十一卷皇公雜子星二十二卷淮南雜子星十九卷泰壹雜子雲雨三十四卷國章觀霓雲雨三十四卷泰階六符一卷金度玉衡漢五星客流出入八篇漢五星彗客行事占驗八卷漢日旁氣行事占驗三卷漢流星行事占驗八卷漢日旁氣行占驗十三卷漢日食月暈雜變行事占驗十三卷海中星占驗十二卷海中五星經雜事二十二卷海中五星順逆二十八卷海中二十八宿國分二十八卷海中二十八宿臣分二十八卷海中日月彗虹雜占十八卷圖書祕記十七篇右天文二十一家四百四十五卷天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎天文以察時變然星事凶悍非湛密者弗能由也夫觀景以譴形非明王亦不能服聽也以不能由之臣諫不能聽之王此所以兩有患也黃帝五家曆三十三卷顓頊曆二十一卷顓頊五星曆十四卷日月宿曆十三卷夏殷周魯曆十四卷天曆大曆十八卷漢元殷周諜曆十七卷耿昌月行帛圖二百三十二卷耿昌月行度二卷傳周五星行度三十九卷律曆數法三卷自古五星宿紀三十卷太歲謀日晷二十九卷帝王諸侯世譜二十卷古來帝王年譜五卷日晷書三十四卷許商算術二十六卷杜忠算術十六卷右曆譜十八家六百六卷曆譜者序四時之位正分至之節會日月五星之辰以考寒暑殺生之實故聖王必正曆數以定三統服色之制又以探知五星日月之會凶阨之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至材其孰與焉道之亂也患出於小人而強欲知天道者壞大以為小削遠以為近是以道術破碎而難知也泰一陰陽二十三卷黃帝陰陽二十五卷黃帝諸子論陰陽二十五卷諸王子論陰陽二十五卷太元陰陽二十六卷三典陰陽談論二十七卷神農大幽五行二十七卷四時五行經二十六卷猛子閭昭二十五卷陰陽五行時令十九卷堪輿金匱十四卷務成子災異應十四卷十二典災異應十二卷鍾律災異二十六卷鍾律叢辰日苑二十三卷鍾律消息二十九卷黃鍾七卷天一六卷泰一二十二景祐殿本都作二十九卷二字衍九卷刑德七卷風鼓六甲二十四卷風后孤虛二十卷六合隨典二十五卷轉位十二神二十五卷羨門式法二十卷羨門式二十卷文解六甲十八卷文解二十八宿二十八卷五音奇胲用兵二十三卷五音奇胲刑德二十一卷五音定名十五卷右五行三十一家六百五十二卷五行者五常之形氣也書云初一曰五行次二曰羞用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出於律曆之數而分為一者也其法亦起五德終始推其極則無不至而小數家因此以為吉凶而行於世𥧲以相亂龜書五十二卷夏龜二十六卷南龜書二十八卷巨龜三十六卷雜龜十六卷蓍書二十八卷周易三十八卷周易明堂二十六卷周易隨曲射匿五十卷大筮衍易二十八卷大次雜易三十卷鼠序卜黃二十五卷於陵欽易吉凶二十三卷任良易旗七十一卷易卦八具右蓍龜十五家四百一卷蓍龜者聖人之所用也書曰女則有大疑謀及卜筮易曰定天下之吉凶成天下之亹亹者莫善於蓍龜是故君子將有為也將有行也問焉而以言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與於此及至衰世解於齊戒而婁煩卜筮神明不應故筮瀆不告易以為忌龜厭不告詩以為刺黃帝長柳占夢十一卷甘德長柳占夢二十卷武禁相衣器十四卷嚏耳鳴雜占十六卷禎祥變怪二十一卷人鬼精物六畜變怪二十一卷變怪誥咎十三卷執不祥劾鬼物八卷請官除訞祥十九卷禳祀天文十八卷請禱致福十九卷請雨止雨二十六卷泰壹雜子候歲二十二卷子贛雜子候歲二十六卷五法積貯寶臧二十三卷神農教田相土耕種十四卷昭明子釣種生魚鱉八卷種樹臧果相蠶十三卷右雜占十八家三百一十三卷雜占者紀百事之象侯善惡之徵易曰占事知來眾占非一而夢為大故周有其官而詩載熊羆虺蛇眾魚旐旟之夢著明大人之占以考吉凶蓋參卜筮春秋之說訞也曰人之所忌其氣炎以取之訞由人興也人失常則訞興人無釁焉訞不自作故曰德勝不祥義厭不惠桑穀共生大戊以興鴝雉登鼎武丁為宗然惑者不稽諸躬而忌訞之見是以詩刺召彼故老訊之占夢傷其舍本而憂末不能勝凶咎也山海經十三篇國朝七卷宮宅地形二十卷相人二十四卷相寶劍刀二十卷相六畜三十八卷右形法六家百二十二卷形法者大舉九州之勢以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶猶律有長短而各徵其聲非有鬼神數自然也然形與氣相首尾亦有有其形而無其氣有其氣而無其形此精微之獨異也凡數術百九十家二千五百二十八卷數術者皆明堂羲和史卜之職也史官之廢久矣其書既不能具雖有其書而無其人易曰苟非其人道不虛行春秋時魯有梓慎鄭有裨竈晉有卜偃宋有子韋六國時楚有甘公魏有石申夫漢有唐都庶得麤觕蓋有因而成易無因而成難故因舊書以序數術為六種黃帝內經十八卷外經三十九景祐殿本都作七七景祐殿本都作七卷扁鵲內經九卷外經十二卷白氏內經三十八卷外經三十六卷旁篇二十五卷右醫經七家二百一十六卷醫經者原人血脈經絡景祐殿本都作落落景祐殿本都作落骨髓陰陽表裏以起百病之本死生之分而用度箴石湯火所施調百藥齊和之所宜至齊之得猶慈石取鐵以物相使拙者失理以瘉為劇以死為生景祐殿本都作以生為死以生為死景祐殿本都作以生為死五藏六府痺十二病方三十卷五藏六府疝十六病方四十卷五藏六府癉十二病方四十卷風寒熱十六病方二十六卷泰始黃帝扁鵲俞拊方二十三卷五藏傷中十一病方三十一卷客疾五藏狂顛病方十七卷金創瘲瘛方三十卷婦人嬰兒方十九卷湯液經法三十二卷神農黃帝食禁七卷右經方十一家二百七十四卷經方者本草石之寒溫量疾病之淺深假藥味之滋因氣感之宜辯五苦六辛致水火之齊以通閉解結反之於平及失其宜者以熱益熱以寒增寒精氣內傷不見於外是所獨失也故諺曰有病不治常得中醫容成陰道二十六卷務成子陰道三十六卷堯舜陰道二十三卷湯盤庚陰道二十卷天老雜子陰道二十五卷天一陰道二十四卷黃帝三王養陽方二十卷三家內房有子方十七卷右房中八家百八十六卷房中者性情景祐殿本都作情性情性景祐殿本都作情性之極至道之際是以聖王制外樂以禁內情而為之節文傳曰先王之作樂所以節百事也樂而有節則和平壽考及迷者弗顧以生疾而隕性命宓戲雜子道二十篇上聖雜子道二十六卷道要雜子十八卷黃帝雜子步引十二卷黃帝岐伯按摩十卷黃帝雜子芝菌十八卷黃帝雜子十九家方二十一卷泰壹雜子十五家方二十二卷神農雜子技道二十三卷泰壹雜子黃冶三十一卷右神僊十家二百五卷神僊者所以保性命之真而游求於其外者也聊以盪意平心同死生之域而無怵惕於胸中然而或者專以為務則誕欺怪迂之文彌以益多非聖王之所以教也孔子曰索隱行怪後世有述焉吾不為之矣凡方技三十六家八百六十八卷方技者皆生生之具王官之一守也太古有岐伯俞拊中世有扁鵲秦和蓋論病以及國原診以知政漢興有倉公今其技術晻昧故論其書以序方技為四種大凡書六略三十八種五百九十六家萬三千二百六十九卷
