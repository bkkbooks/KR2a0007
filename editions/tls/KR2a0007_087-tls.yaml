body:
  text: 游俠傳第六十二古者天子建國諸侯立家自卿大夫以至于庶人各有等差是以民服事其上而下無覬覦孔子曰天下有道政不在大夫百官有司奉法承令以脩所職失職有誅侵官有罰夫然故上下相順而庶事理焉周室既微禮樂征伐自諸侯出桓文之後大夫世權陪臣執命陵夷至於戰國合從連衡力政爭彊繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為游俠雞鳴狗盜無不賓禮而趙相虞卿棄國捐君以周窮交魏齊厄信陵無忌竊符矯命戮將專師以赴平原之急皆以取重諸侯顯名天下搤腕而游談者以四豪為稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網疏闊未之匡改也是故代相陳豨從車千乘而吳濞淮南皆招賓客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳騖於閭閻權行州域力折公侯眾庶榮其名迹覬而慕之雖其陷於刑辟自與殺身成名若季路仇牧死而不悔也故曾子曰上失其道民散久矣非明王在上視之以好惡齊之以禮法民曷繇知禁而反正乎古之正法五伯三王之辠人也而六國五伯之辠人也夫四豪者又六國之辠人也況於郭解之倫以匹夫之細竊殺生之權其罪已不容於誅矣觀其溫良泛愛振窮周急謙退不伐亦皆有絕異之姿惜乎不入道德苟放縱於末流殺身亡宗非不幸也自魏其武安淮南之後天子切齒衛霍改節然郡國諸豪桀處處各有京師親戚冠蓋相望亦古今常道莫足言者唯成帝時外家王氏賓客為盛而樓護為帥及王莽時諸公之間陳遵為雄閭里之俠原涉為魁朱家魯人高祖同時也魯人皆以儒教而朱家用俠聞所臧活豪士以百數其餘庸人不可勝言然終不伐其能飲其德諸所嘗施唯恐見之振人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軥牛專趨人之急甚於己私既陰脫季布之厄及布尊貴終身不見自關以東莫不延頸願交楚田仲以俠聞父事朱家自以為行弗及也田仲死後有劇孟劇孟者洛陽人也周人以商賈為資劇孟以俠顯吳楚反時條侯為太尉乘傳東將至河南得劇孟喜曰吳楚舉大事而不求劇孟吾知其無能為已天下騷動大將軍得之若一敵國云劇孟行大類朱家而好博多少年之戲然孟母死自遠方送喪蓋千乘及孟死家無十金之財而符離王孟亦以俠稱江淮之間是時濟南瞷氏陳周膚亦以豪聞景帝聞之使使盡誅此屬其後代諸白梁韓毋辟陽翟薛況陝寒孺紛紛復出焉郭解河內軹人也溫善相人許負外孫也解父任俠孝文時誅死解為人靜悍不飲酒少時陰賊感慨不快意所殺甚眾以軀耤友報仇臧命作姦剽攻休乃鑄錢掘冢不可勝數適有天幸窘急常得脫若遇赦及解年長更折節為儉以德報怨厚施而薄望然其自喜為俠益甚既已振人之命不矜其功其陰著於心本發於睚眥如故云而少年慕其行亦輒為報讎不使知也解姊子負解之勢與人飲使之釂非其任彊灌之人怒刺殺解姊子亡去解姊怒曰以翁伯時人殺吾子賊不得棄其尸道旁弗葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰公殺之當吾兒不直遂去其賊辠其姊子收而葬之諸公聞之皆多解之義益附焉解出人皆避有一人獨箕踞視之解問其姓名客欲殺之解曰居邑屋不見敬是吾德不脩也彼何辠乃陰請尉史曰是人吾所重至踐更時脫之每至直更數過吏弗求怪之問其故解使脫之箕踞者乃肉袒謝辠少年聞之愈益慕解之行洛陽人有相仇者邑中賢豪居間以十數終不聽客乃見解解夜見仇家仇家曲聽解謂仇家吾聞洛陽諸公在間多不聽今子幸而聽解解奈何從它縣奪人邑賢大夫權乎乃夜去不使人知曰且毋庸待我去令洛豪居間乃聽解為人短小恭儉出末嘗有騎不敢乘車入其縣庭之旁郡國為人請求事事可出出之不可者各令厭其意然後乃敢嘗酒食諸公以此嚴重之爭為用邑中少年及旁近縣豪夜半過門常十餘車請得解客舍養之及徙豪陵也解貧不中訾吏恐不敢不徙衛將軍為言郭解家貧不中徙上曰解布衣權至使將軍此其家不貧解徙諸公送者出千餘萬軹人楊季主子為縣掾鬲之解兄子斷楊掾頭解入關關中賢豪知與不知聞聲爭交驩邑人又殺楊季主季主家上書人又殺闕下上聞乃下吏捕解解亡置其母家室夏陽身至臨晉臨晉籍少翁素不知解因出關籍少翁已出解解傳太原所過輒告主人處吏逐迹至籍少翁少翁自殺口絕久之得解窮治所犯為而解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解專以姦犯公法何謂賢解客聞之殺此生斷舌吏以責解解實不知殺者殺者亦竟莫知為誰吏奏解無罪御史大夫公孫弘議曰解布衣為任俠行權以睚眥殺人解不知此辠甚於解知殺之當大逆無道遂族解自是之後俠者極眾而無足數者然關中長安樊中子槐里趙王孫長陵高公子西河郭翁中大原魯翁孺臨淮兒長卿東陽陳君孺雖為俠而恂恂有退讓君子之風至若北道姚氏西道諸杜南道仇景東道佗羽公子南陽趙調之徒盜跖而居民間者耳曷足道哉此乃鄉者朱家所羞也萭章字子夏長安人也長安熾盛街閭各有豪俠章在城西柳市號曰城西萭子夏為京兆尹門下督從至殿中侍中諸侯貴人爭欲揖章莫與京兆尹言者章逡循甚懼其後京兆不復從也與中書令石顯相善亦得顯權力門車常接轂至成帝初石顯坐專權擅勢免官徙歸故郡顯訾巨萬當去留床席器物數百萬直欲以與章章不受賓客或問其故章歎曰吾以布衣見哀於石君石君家破不能有以安也而受其財物此為石氏之禍萭氏反當以為福邪諸公以是服而稱之河平中王尊為京兆尹捕擊豪俠殺章及箭張回酒市趙君都賈子光皆長安名豪報仇怨養刺客者也樓護字君卿齊人父世醫也護少隨父為醫長安出入貴戚家護誦醫經本章方術數十萬言長者咸愛重之共謂曰以君卿之材何不宦學乎繇是辭其父學經傳為京兆吏數年甚得名譽是時王氏方盛賓客滿門五侯兄弟爭名其客各有所厚不得左右唯護盡入其門咸得其驩心結士大夫無所不傾其交長者尤見親而敬眾以是服為人短小精辯論議常依名節聽之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿脣舌言其見信用也母死送葬者致車二三千兩閭里歌之曰五侯治喪樓君卿久之平阿侯舉護方正為諫大夫使郡國護假貸多持幣帛過齊上書求上先人冢因會宗族故人各以親疏與束帛一日散百金之費使還奏事稱意擢為天水太守數歲免家長安中時成都侯商為大司馬衛將軍罷朝欲侯護其主簿諫將軍至尊不宜入閭巷商不聽遂往至護家家狹小官屬立車下久住移時天欲雨主簿謂西曹諸掾曰不肯彊諫反雨立閭巷商還或白主簿語商恨以他職事去主簿終身廢錮後護復以薦為廣漢太守元始中王莽為安漢公專政莽長子宇與妻兄呂寬謀以血塗莽弟門欲懼莽令歸歸政發覺莽大怒殺宇而呂寬亡寬父素與護相知寬至廣漢過護不以事實語也到數日名捕寬詔書至護執寬莽大喜徵護入為前煇光封息鄉侯列於九卿莽居攝槐里大賊趙朋霍鴻等群起延入前輝光界護坐免為庶人其居位爵祿賂遣所得亦緣手盡既退居里巷時五侯皆已死年老失勢賓客益衰至王莽篡位以舊恩召見護封為樓舊里附城而成都侯商子邑為大司空貴重商故人皆敬事邑唯護自安如舊節邑亦父事之不敢有闕時請召賓客邑居樽下稱賤子上壽坐者百數皆離席伏護獨東鄉正坐字謂邑曰公子貴如何初護有故人呂公無子歸護護身與呂公妻與呂嫗同食及護家居妻子頗厭呂公護聞之流涕責其妻子曰呂公以故舊窮老託身於我義所當奉遂養呂公終身護卒子嗣其爵陳遵字孟公杜陵人也祖父遂字長子宣帝微時與有故相隨博弈數負進及宣帝即位用遂稍遷至太原太守乃賜遂璽書曰制詔太原太守官尊祿厚可以償博進矣妻君寧時在旁知狀遂於是辭謝因曰事在元平元年赦令前其見厚如此元帝時徵遂為京兆尹至廷尉遵少孤與張竦伯松俱為京兆史竦博學通達以廉儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之侍曹輒詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宮大儒優士又重遵謂西曹此人大度士奈何以小文責之乃舉遵能治三輔劇縣補郁夷令久之與扶風相失自免去槐里大賊趙朋霍鴻等起遵為校尉擊朋鴻有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及邵國豪桀至京師者莫不相因到遵門遵耆酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白當對尚書有期會狀母乃令從後閤出去遵大率常醉然事亦不廢長八尺餘長頭大鼻容貌甚偉略涉傳記贍於文辭性善書與人尺牘主皆藏去以為榮請求不敢逆所到衣冠懷之唯恐在後時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云王莽素奇遵材在位多稱譽者繇是起為河南太守既至官當遣從史西召善書吏十人於前治私書謝京師故人遵馮几口占書吏且省官事書數百封親疏各有意河南大驚數月免初遵為河南太守而弟級為荊州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂後司直陳崇聞之劾奏遵兄弟幸得蒙恩超等歷位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷過寡婦左阿君置酒歌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶臥遵知飲酒飫宴有節禮不入寡婦之門而湛酒溷肴亂男女之別輕辱爵位羞汙印韍惡不可忍聞臣請皆免遵既免歸長安賓客愈盛飲食自若久之復為九江及河內都尉凡三為二千石而張竦亦至丹陽太守封淑德侯後俱免官以列侯歸長安竦居貧無賓客時時好事者從之質疑問事論道經書而已而遵晝夜呼號車騎滿門酒肉相屬先是黃門郎揚雄作酒箴以諷諫成帝其文為酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之眉處高臨深動常近危酒醪不入口臧水滿懷不得左右牽於纆徽一旦叀礙為瓽所轠身提黃泉骨肉為泥自用如此不如鴟夷鴟夷滑稽腹如大壼盡日盛酒人復借酤常為國器託於屬車出入兩宮經營公家繇是言之酒何過乎遵大喜之常謂張竦吾與爾猶是矣足下諷誦經書苦身自約不敢差跌而我放意自恣浮湛俗間官爵功名不減於子而差獨樂顧不優邪竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也及王莽敗二人俱客於池陽竦為賊兵所殺更始至長安大臣薦遵為大司馬護軍與歸德侯劉颯俱使匈奴單于欲脅詘遵遵陳利害為言曲直單于大奇之遣還會更始敗遵留朔方為賊所敗時醉見殺原涉字巨先祖父武帝時以豪桀自陽翟徙茂陵涉父哀帝時為南陽太守天下殷富大郡二千石死官賦斂送葬皆千萬以上妻子通共受之以定產業時又少行三年喪者及涉父死讓還南陽賻送行喪冢廬三年繇是顯名京師禮畢扶風謁請為議曹衣冠慕之輻輳為大司徒史丹舉能治劇為谷口令時年二十餘谷口聞其名不言而治先是涉季父為茂陵秦氏所殺涉居谷口半歲所自劾去官欲報仇谷口豪桀為殺秦氏亡命歲餘逢赦出郡國諸豪及長安五陵諸為氣節者皆歸慕之涉遂傾身與相待人無賢不肖闐門在所閭里盡滿客或譏涉曰子本吏二千石之世結髮自修以行喪推財禮讓為名正復讎取仇猶不失仁義何故遂自放縱為輕俠之徒乎涉應曰子獨不見家人寡婦邪始自約敕之時意乃慕宋伯姬及陳孝婦不幸壹為盜賊所汙遂行淫失知其非禮然不能自還吾猶此矣涉自以為前讓南陽賻送身得其名而令先人墳墓儉約非孝也乃大治起冢舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆仟涉慕之乃買地開道立表署曰南陽仟人不肯從謂之原氏仟費用皆卬富人長者然身衣服車馬纔具妻子內困專以振施貧窮赴人之急為務人嘗置酒請涉涉入里門客有道涉所知母病避疾在里宅者涉即往候叩門家哭涉因入弔問以喪事家無所有涉曰但絜埽除沐浴待涉還至主人對賓客歎息曰人親臥地不收涉何心鄉此願徹去酒食賓客爭問所當得涉乃側席而坐削牘為疏具記衣被棺木下至飯含之物分付諸客諸客奔走市買至日昳皆會涉親閱視已謂主人願受賜矣既共飲食涉獨不飽乃載棺物從賓客往至喪家為棺斂勞倈畢葬其周急待人如此後人有毀涉者曰姦人之雄也喪家子即時刺殺言者賓客多犯法辠過數上聞王莽數收繫欲殺輒復赦出之涉懼求為卿府掾史欲以避客文母太后喪時守復土校尉已為中郎后免官涉欲上冢不欲會賓客密獨與故人期會涉單車敺上茂陵投暮入其里宅因自匿不見人遣奴至市買肉奴乘涉氣與屠爭言斫傷屠者亡是時茂陵守令尹公新視事涉未謁也聞之大怒知涉名豪欲以示眾厲俗遣兩吏脅守涉至日中奴不出吏欲便殺涉去涉迫窘不知所為會涉所與期上冢者車數十乘到皆諸豪也共說尹公尹公不聽諸豪則曰原巨先奴犯法不得使肉袒自縛箭貫耳詣廷門謝辠於君威亦足矣尹公許之涉如言謝復服遣去初涉與新豐富人祁太伯為友太伯同母弟王游公素嫉涉時為縣門下掾說尹公曰君以守令辱原涉如是一旦真令至君復單車歸為府吏涉刺客如雲殺人皆不知主名可為寒心涉治冢舍奢僭踰制辠惡暴著主上知之今為君計莫若墮壞涉冢舍條奏其舊惡君必得真令如此涉亦不敢怨矣尹公如其計莽果以為真令涉繇此怨王游公選賓客遣長子初從車二十乘劫王游公家游公母即祁太伯母也諸客見之皆拜傳曰無驚祁夫人遂殺游公父及子斷兩頭去涉性略似郭解外溫仁謙遜而內隱好殺睚眥於塵中觸死者甚多王莽末東方兵起諸王子弟多薦涉能得士死可用莽乃召見責以辠惡赦貰拜鎮戎大尹涉至官無幾長安敗郡縣諸假號起兵攻殺二千石長吏以應漢諸假號素聞涉名爭問原尹何在拜謁之時莽州牧使者依附涉者皆得活傳送致涉長安更始西屏將軍申屠建請涉與相見大重之故茂陵令尹公壞涉冢舍者為建主簿涉本不怨也涉從建所出尹公故遮拜涉謂曰易世矣宜勿復相怨涉曰尹君何壹魚肉涉也涉用是怒使客刺殺主簿涉欲亡去申屠建內恨恥之陽言吾欲與原巨先共鎮三輔豈以一吏易之哉賓客通言令涉自繫獄謝建許之賓客車數十乘共送涉至獄建遣兵道徼取涉於車上送車分散馳遂斬涉縣之長安市自哀平間郡國處處有豪桀然莫足數其名聞州郡者霸陵杜君敖池陽韓幼孺馬領繡君賓西河漕中叔皆有謙退之風王莽居攝誅鉏豪俠名捕漕中叔不能得素善強弩將軍孫建莽疑建藏匿泛以問建建曰臣名善之誅臣足以塞責莽性果賊無所容忍然重建不竟問遂不得也中叔子少游復以俠聞於世云
