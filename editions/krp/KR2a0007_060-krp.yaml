body:
  text: 前漢書卷六十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注杜周傳第三十杜周南陽杜衍人也義縦為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡文穎曰邊卒多亡也或曰郡縣主守有所亡失也師古曰此說皆非也謂因虜入為㓂而失人畜甲兵倉廩者也宋祁曰注末也字當刪所論殺甚多奏事中意任用師古曰以奏事當天子之意㫖故被任用也中音竹仲反與減宣更為中丞者十餘嵗師古曰更互也音工衡反周少言重遲師古曰遲謂性非敏速也而内深次骨李竒曰其用法深刻至骨宣為左内史周為廷尉其治大抵放張湯師古曰大抵大歸也放依也音甫徃反而善候司師古曰觀望天子意上所欲擠者因而陷之孟康曰擠音躋師古曰擠墜也上所欲釋久繋待問而微見其寃狀師古曰見顯也客有謂周曰君為天下决平不循三尺法孟康曰以三尺竹簡書法律也師古曰循因也順也宋祁曰浙本無法字専以人主意指為獄獄者固如是乎師古曰言不當然也周曰三尺安出哉師古曰安猶焉也前主所是著為律後主所是疏為令師古曰著謂明表也疏謂分條也當時為是何古之法乎師古曰各當其時而為是也至周為廷尉詔獄亦益多矣二千石繋者新故相因不减百餘人郡吏大府舉之廷尉如淳曰郡吏太守也文穎曰大府公府也孟康曰舉之廷尉以章劾付廷尉治之也師古曰孟說非也舉皆也言郡吏大府獄事皆歸廷尉也大府丞相御史之府也一嵗至千餘章章大者連逮證案數百小者數十人逺者數千里近者數百里㑹獄師古曰徃赴對也吏因責如章告劾師古曰皆令服罪如所告劾之本章不服以掠笞定之師古曰定其辭令服也於是聞有逮證皆亡匿獄乆者至更數赦十餘嵗而相告言師古曰更歴也其罪或非赦例故不得除而乆逃亡不出至于十餘嵗猶相告言由周用法深刻故也更工衡反大氐盡詆以不道為上師古曰氐讀與抵同抵歸也詆誣也並音丁禮反廷尉及中都官詔獄逮至六七萬人師古曰中都官凡亰師諸官府也獄辭所及追考問者六七萬人也吏所增加十有餘萬師古曰吏又於此外以文致之更增加也周中廢後為執金吾逐捕桑𢎞羊衛皇后昆弟子刻深上以為盡力無私遷為御史大夫始周為廷史有一馬師古曰廷史即廷尉史也及乆任事列三公而兩子夾河為郡守家訾累巨萬矣師古曰訾與貲同治皆酷暴唯少子延年行寛厚云延年字㓜公亦眀法律昭帝初立大將軍霍光秉政以延年三公子吏材有餘補軍司空蘇林曰主獄官也如淳曰律營軍司空軍中司空各二人宋祁曰空字下疑有令字始元四年益州蠻夷反延年以校尉將南陽士撃益州還為諫大夫左將軍上官桀父子與葢主燕王謀為逆亂假稻田使者燕倉知其謀以告大司農楊敞敞惶懼移病師古曰移病謂移書言病也一曰以病而移居以語延年延年以聞桀等伏辜延年封為建平侯延年本大將軍霍光吏首發大姦師古曰首謂初首先發之有忠節由是擢為太僕右曹給事中光持刑罸嚴延年輔之以寛治燕王獄時御史大夫桑𢎞羊子遷亡過父故吏侯史吳師古曰姓侯史名吳後遷捕得伏法會赦侯史吳自出繋獄廷尉王平與少府徐仁雜治反事師古曰交雜同共治之也皆以為桑遷坐父謀反而侯史吳藏之非匿反者廼匿為隨者也孟康曰言桑遷但隨坐耳非自反也即以赦令除吳罪後侍御史治實師古曰重覈其事也宋祁曰江南本後字下有使字以桑遷通經術知父謀反而不諫爭與反者身無異侯史吳故三百石吏首匿遷師古曰首匿者言身為謀首而藏匿人也他皆類此不與庶人匿隨從者等吳不得赦奏請覆治劾廷尉少府縱反者師古曰縱放也少府徐仁即丞相車千秋女壻也故千秋數為侯史吳言恐光不聼千秋即召中二千石博士㑹公車門議問吳法師古曰于法律之中吳當得何罪議者知大將軍指皆執吳為不道眀日千秋封上衆議光於是以千秋擅召中二千石以下外内異言張晏曰外則去疾欲盡内則為其壻也師古曰此說非也外内謂外朝及内朝也宋祁曰注文疾一本作侯遂下廷尉平少府仁獄朝廷皆恐丞相坐之延年乃奏記光爭以為吏縱罪人有常法今更詆吳為不道恐於法深師古曰詆誣也次下亦同又丞相素無所守持而為好言於下盡其素行也師古曰言非故有所執持但其素行好與在下人言議耳至擅召中二千石甚無狀師古曰無善狀延年愚以為丞相乆故及先帝用事師古曰言在位巳乆是為故舊又嘗及仕先帝而任事也非有大故不可棄也間者民頗言獄深吏為峻詆師古曰峻謂峭刻也今丞相所議又獄事也如是以及丞相恐不合衆心羣下讙譁庶人私議流言四布延年竊重將軍失此名於天下也師古曰重猶難也以此為重事也光以廷尉少府弄法輕重皆論棄市而不以及丞相終與相竟師古曰謂終丞相之身無貶黜也延年議論持平合和朝廷皆此類也見國家承武帝奢侈師旅之後數為大將軍光言年嵗比不登師古曰比頻也流民未盡還宜修孝文時政示以儉約寛和順天心說民意年嵗宜應師古曰言儉約寛和則豐年當應也說讀曰恱光納其言舉賢良議罷酒𣙜鹽鐵皆自延年發之吏民上書言便宜有異輙下延年平處復奏言師古曰先平處其可否然後奏言處音昌汝反可官試者至為縣令或丞相御史除用滿嵗以狀聞或抵其罪法師古曰抵至也言事之人有姦妄者則持致之於罪法也常與兩府及廷尉分章如淳曰兩府丞相御史府也諸章有所疑使延年決之師古曰此說非也上書言事者其章或下丞相御史或付延年故云分章耳非令决疑也昭帝末寢疾徵天下名醫延年典領方藥帝崩昌邑王即位廢大將軍光車騎將軍張安世與大臣議所立時宣帝養於掖廷號皇曾孫與延年中子佗相愛善延年知曽孫徳羙勸光安世立焉宣帝即位襃賞大臣延年以定策安宗廟益戸二千三百與始封所食邑凡四千三百戸詔有司論定策功大司馬大將軍光功徳過太尉絳侯周勃車騎將軍安世丞相楊敞功比丞相陳平前將軍韓增御史大夫蔡誼功比潁隂侯灌嬰太僕杜延年功比朱虛侯劉章後將軍趙充國大司農田延年少府史樂成功比典客劉掲師古曰據如此傳樂成姓史而霍光傳云使樂成小家子則又似姓使功臣侯表乃云便樂成三者不同尋史使一也故當姓史或作使字而表遂誤為便耳皆封侯益土延年為人安和備於諸事師古曰言皆明習也乆典朝政上任信之出即奉駕入給事中居九卿位十餘年賞賜賂遺訾數千萬霍光薨後子禹與宗族謀反誅上以延年霍氏舊人欲退之而丞相魏相奏延年素貴用事官職多姦遣吏考案但得苑馬多死官奴婢乏衣食師古曰傳言延年身不犯法但丞相致之於罪耳延年坐免官削戸二千後數月復召拜為北地太守延年以故九卿外為邊吏治郡不進師古曰比于諸郡不為最也上以璽書讓延年師古曰讓責也延年乃選用良吏捕繋豪强劉奉世曰繋當作撃字之誤也郡中清靜居歳餘上使謁者賜延年璽書黄金二十斤徙為西河太守治甚有名五鳳中徵入為御史大夫延年居父官府不敢當舊位坐卧皆易其處是時四夷和海内平延年視事三嵗以老病乞骸骨天子優之使光祿大夫持節賜延年黄金百斤酒宋祁曰浙本酒字上有牛字加致醫藥延年遂稱病篤賜安車駟馬罷就第師古曰安車坐乗之車也後漢輿服志曰公列侯安車朱斑輪倚鹿較伏熊軾皂葢倚鹿較者畫立鹿於車之前兩藩外也伏熊軾者車前横軾為伏熊之形也後數月薨諡曰敬侯子緩嗣緩少為郎本始中以校尉從蒲類將軍撃匈奴文穎曰趙充國也臣瓉曰征蒲類海故以為名還為諌大夫遷上谷都尉鴈門太守父延年薨徵視喪事拜為太常治諸陵縣每冬月封具獄日常去酒省食師古曰獄案已具當論决之故封上官屬稱其有恩元帝初即位糓貴民流元光中宋祁曰元光當從南浙本作永光西羗反緩輙上書入錢糓以助用前後數百萬緩六弟五人至大官少弟熊歴五郡二千石三州牧刺史有能名唯中弟欽官不至而最知名欽字子夏少好經書家富而目偏盲師古曰盲目無見也偏盲者患一目也今俗乃以兩目無見者始為盲語移轉也故不好為吏茂陵杜鄴與欽同姓字師古曰並字子夏俱以材能稱京師故衣冠謂欽為盲杜子夏以相别師古曰衣冠謂士大夫也欽惡以疾見詆師古曰詆毁也音丁禮反廼為小冠髙廣財二寸師古曰財與纔同古通用字由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云時帝舅大將軍王鳳以外戚輔政求賢知自助鳳父頃侯禁與欽兄緩相善故鳳深知欽能奏請欽為大將軍軍武庫令職閒無事欽所好也師古曰閒讀曰閑宋祁曰軍武庫一本無軍字諸本皆有予謂當存軍字是大将軍之軍武庫也欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是說大將軍鳳曰禮壹娶九女所以極陽數廣嗣重祖也張晏曰陽數一三五七九九數之極也臣瓉曰天子一娶九女夏殷之制也欽故舉前代之約以刺今之奢也必鄉舉求窈窕不問華色師古曰鄉舉者博問鄉里而舉之也窈窕幽閑也窈音一了反窕音徒了反所以助徳理内也娣姪雖缺不復補所以養夀塞爭也師古曰媵女之内兄弟之女則謂之姪巳之女弟則謂之娣塞絶也故后妃有貞淑之行則𦙍嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳不厭師古曰由用也從也女徳不厭言好色之甚也女徳不厭則夀命不究於髙年師古曰究竟也書云或四三年師古曰周書亡逸篇曰惟湛樂之從罔或克夀或十年或七八年或五六年或四三年謂逸欲過度則損夀也言失欲之生害也師古曰失讀曰佚佚與逸同男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後倈異態後倈異態則正后自疑而支庶有間適之心師古曰間代也音居莧反適讀曰嫡次下亦同是以晉獻被納讒之謗申生䝉無罪之辜師古曰䝉亦被也今聖主富於春秋未有適嗣方鄉術入學師古曰鄉讀曰嚮未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有聲色音技能為萬世大法師古曰惟求淑質無論羙色及音聲技能如此則可為萬代法也夫少戒之在色師古曰論語孔子曰君子有三戒少之時血氣未定戒之在色言好色無節則致損敗故戒之也小卞之作可為寒心張晏曰刺幽王廢申后而立襃姒黜太子宜咎而立伯服也臣瓉曰小卞之詩太子之傅作也哀太子之放逐愍周室之大壊也師古曰詩小雅也二說皆是卞音盤唯將軍常以為憂鳳白之太后太后以為故事無有欽復重言師古曰重音直用反詩云殷監不逺在夏后氏之世師古曰大雅蕩之詩也言殷之所監見其事不逺近在夏后氏之時刺戒者至廹近而省聼者常怠忽師古曰忽忘也可不慎哉前言九女畧陳其禍福甚可悼懼竊恐將軍不深留意后妃之制夭夀治亂存亡之端也迹三代之季世覽宗宣之饗國察近屬之符騐韋昭曰宗殷髙宗也宣周宣王也皆饗國長乆師古曰宗宣之義韋說是也近屬者謂漢家之事耳屬猶言甫爾也音之欲反禍敗曷常不由女徳是以佩玉晏鳴闗睢歎之李竒曰后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之臣瓉曰此魯詩也知好色之伐性短年離制度之生無厭天下將蒙化師古曰蒙被也陵夷而成俗也宋祁曰離字下疑有脫文故詠淑女㡬以配上師古曰闗睢之詩云窈窕淑女君子好仇故云然也淑善也㡬讀曰冀忠孝之篤仁厚之作也師古曰作謂作詩也夫君親夀尊國家治安誠臣子之至願所當勉之也易曰正其本萬物理師古曰今易無此文凡事論有疑未可立行者求之徃古則典刑無考之來今則吉凶同卒揺易之則民心惑鄭氏曰卒急也師古曰卒音干忽反若是者誠難施也今九女之制合於徃古無害於今不逆於民心至易行也行之至有福也將軍輔政而不蚤定師古曰蚤古早字非天下之所望也唯將軍信臣子之願念闗睢之思師古曰信讀曰申逮委政之隆及始初清眀師古曰委政之隆言天子委鳳政事權寵隆盛也始初清明天子新即位宜立法制為漢家建無窮之基誠難以忽不可以遴李竒曰遴難也師古曰遴吝同鳳不能自立法度循故事而已㑹皇太后女弟司馬君力蘇林曰字君力為司馬氏婦與欽兄子私通事上聞欽慙懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也師古曰觀得失之蹤迹也臣欽愚戇經術淺薄不足以奉大對師古曰大對謂對大問也臣聞日蝕地震陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五師古曰解在劉向傳或夷狄侵中國或政權在臣下或婦乘夫師古曰乘陵也或臣子背君父宋祁曰江南本作臣背君子背父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖刺之心師古曰刺戾也音来曷反闗東諸侯無强大之國三垂蠻夷無逆理之節師古曰三垂謂東南西也殆為後宫師古曰殆近也何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中此必適妾將有爭寵相害而為患者師古曰適讀曰嫡嫡謂正后也宋祁曰南本相害字作於宫唯陛下深戒之變感以類相應人事失於下變象見於上能應之以徳則異咎消亡不能應之以善則禍敗至髙宗遭雊雉之戒飭已正事享百年之夀殷道復興師古曰解在五行志要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舎張晏曰宋景公熒惑守心太史子韋請移之於大臣及國人與嵗公皆不聼天感其誠熒惑為之退舍景公享延期之祚也以陛下聖眀内推至誠深思天變何應而不感何揺而不動孔子曰仁逺乎哉師古曰論語載孔子之言也言仁道不逺求之而至也唯陛下正后妾抑女寵防奢泰去佚游躬節儉親萬事數御安車由輦道師古曰由從也親二宫之饔膳韋昭曰二宫卭成太后與成帝母也師古曰熟食曰饔具食曰膳膳之言善也致昬晨之定省如此即堯舜不足與比隆咎異何足消滅如不留聼於庶事不論材而授位殫天下之財以奉滛侈匱萬姓之力以從耳目師古曰殫匱皆盡也從讀曰縦近諂諛之人而逺公方師古曰方正也信讒賊之臣以誅忠良賢俊失在巖穴大臣怨乎不以師古曰失在巖穴謂隠處巖穴朝廷失之也論語稱周公謂魯公不使大臣怨乎不以以用也不見用而怨也雖無變異社稷之憂也天下至大萬事至衆祖業至重誠不可以佚豫為不可以奢㤗持也師古曰為治也唯陛下忍無益之欲以全衆庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策師古曰此殿在未央宫也策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以師古曰以用也當世之治何務各以經對師古曰取經義以對欽對曰臣聞天道貴信地道貴貞師古曰貞正也不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人師古曰恕仁也言以仁愛為心内省己志施之於人也六經之所上也不孝則事君不忠涖官不敬師古曰涖臨也戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也師古曰孝經載孔子之言也言人能始終行孝而患不及道者未之有也一說行孝終始不備而患禍不及者無此事也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為劉攽曰當云近觀其所為主注文舊有妄刋去之宋祁曰為字下南本浙本並有主字逺觀其所主師古曰所為主謂託人以為援而自進也其所主為人之援而進也宋祁曰注文為主越本作所為非是進也當作進之也孔子曰視其所以觀其所由察其所安人焉廋哉師古曰論語載孔子之言也廋匿也言視人之所用觀人之所從察人之所樂則可知其善惡無所匿其情也取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽師古曰長謂崇貴之也表眀也孔子曰惡紫之奪朱師古曰論語載孔子之言也朱正色也紫間色之好者也惡其邪好而奪正色以喻利口之人多言少實傾惑者也當世治之所務也臣竊有所憂言之則拂心逆指師古曰拂謂違戾也音佛不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意師古曰從順也耦合也臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妬之心興矣如此則匹婦之說不可勝也師古曰匹婦一婦人也宋祁曰說别本浙本作謀唯陛下純徳普施無欲是從師古曰從讀曰縱不縦心于所欲也此則衆庶咸說師古曰說讀曰恱繼嗣日廣而海内長安萬事之是非何足備言師古曰如此則細故萬端不足憂也欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之師古曰慮計也數稱達名士王駿韋安世王延世等師古曰王駿王陽子也韋安世韋賢之孫方山之子也王延世即成帝時塞河堤者也宋祁曰一本只云王延無世字注同予據成紀校尉王延世塞决河是嵗改河平元年此本是劉奉世曰治河者王延世或者此脫一世字歟救解馮野王王尊胡常之罪過及繼功臣絶世填撫四夷師古曰填音竹刃反當世善政多出於欽者見鳳専政㤗重戒之曰昔周公身有至聖之徳屬有叔父之親而成王有獨見之眀無信讒之聴然管蔡流言而周公懼穰侯昭王之舅也文頴曰穰侯魏冉也權重於秦威震鄰敵有旦暮偃伏之愛師古曰言昭王㓜小旦夕偃伏戲弄於舅之旁側也心不介然有間然范睢起徒歩由異國無雅信師古曰雅信謂素相任信開一朝之說而穰侯就封文穎曰范睢為丞相穰侯就國及近者武安侯之見退師古曰武安侯謂田蚡也退謂請考工地益宅上怒乃退之也三事之跡相去各數百嵗若合符節甚不可不察願將軍由周公之謙懼師古曰由從也用也損穰侯之威放武安之欲毋使范睢之徒得間其說師古曰間音居莧反頃之復日蝕亰兆尹王章上封事求見果言鳳専權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指甚哀太后涕泣為不食上少而親倚鳳亦不忍廢師古曰倚音于綺反復起鳳就位鳳心慙稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻巳自責至誠動衆愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳師古曰無屬無親屬于上也分音扶問反字或作介介隔也其義亦通非主上所以待將軍非將軍所以報主上也昔周公雖老猶在亰師眀不離成周示不忘王室也仲山父異姓之臣無親於宣就封於齊鄧展曰詩言仲山甫徂齊者言銜命徃治齊城郭也而韓詩以為封于齊悞耳晋灼曰韓詩悞而欽引之阿附權貴求容媚也師古曰韓詩既有眀文而欽引以為喻則是其義非謬而與今說詩者不同鄧晋諸人雖曰渉學未得専非杜氏追咎韓詩也猶歎息永懐宿夜徘徊不忍逺去况將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫有將軍師古曰言衆人之意皆不如也宋祁曰南本浙本意並作息主上昭然知之故攀援不遣師古曰援引也音爰書稱公毋困我師古曰此周書洛誥成王告周公詞也言公必湏留此毋得遂去而令我困葢成帝與鳳詔書引此言之唯將軍不為四國流言自疑於成王以固至忠鳳復起視事上令尚書劾奏亰兆尹章章死詔獄語在元后傳章既死衆庶寃之以譏朝廷欽欲救其過復說鳳曰亰兆尹章所坐事宻吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章内有所犯雖陷正法事不暴揚自亰師不曉况於逺方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寛眀之徳師古曰爭引謂引事類以諌爭也一曰下有諌爭之言上引而納之也欽愚以為宜因章事舉直言極諫宋祁曰南本無章事二字並見郎從官展盡其意加於徃前以眀示四方使天下咸知主上聖眀不以言罪下也若此則流言消釋疑惑著眀鳳白行其策欽之補過將羙皆此類也師古曰將助也優㳺不仕以夀終欽子及昆弟友屬宋祁曰友疑當作支至二千石者且十人欽兄緩前免太常以列侯奉朝請成帝時乃薨子業嗣業有材能以列侯選復為太常數言得失不事權貴與丞相翟方進衛尉定陵侯淳于長不平後業坐法免官復為函谷闗都尉會定陵侯長有罪當就國長舅紅陽侯立與業書曰誠哀老姊垂白隨無狀子出闗師古曰垂白者言白髮下垂也無狀猶言不肖願勿復用前事相侵定陵侯既出闗伏罪復發蘇林曰長與許后書也語在外戚傳下雒陽獄丞相史搜得紅陽侯書奏業聼請不敬服䖍曰受立屬請為不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦師古曰更音工衡反長陷大惡獨得不坐茍欲障塞前過不為陛下廣持平例師古曰俱與長厚善而方進獨不坐是不平也又無恐懼之心反因時信其邪辟師古曰信讀曰伸辟讀曰僻報睚眦怨師古曰睚音厓睚舉眼也眦即眥字謂目匡也言舉目相忤者即報之也一說睚音五懈反眦音仕懈反睚眦瞋目貌也両義並通他皆類此故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友後將軍朱博鉅鹿太守孫宏故少府陳咸皆免官歸咸故郡刑罸無平在方進之筆端衆庶莫不疑惑皆言孫宏不與紅陽侯相愛宏前為中丞時方進為御史大夫舉掾隆可侍御史師古曰御史大大之掾也名隆宏奏隆前奉使欺謾師古曰謾誑也音慢又音莫連反不宜執法近侍方進以此怨宏又方進為亰兆尹時陳咸為少府在九卿髙第陛下所自知也方進素與司直師丹相善臨御史大夫缺使丹奏咸為姦利請案騐卒不能有所得而方進果自得御史大夫為丞相即時詆欺奏免咸師古曰詆誣也復因紅陽侯事歸咸故郡衆人皆言國家假方進權太甚案師丹行能無異及光禄勲許商被病殘人服䖍曰殘癃也皆但以附從方進常獲尊官丹前親薦邑子丞相史能使巫下神為國求福㡬獲大利師古曰㡬讀曰冀幸賴陛下至眀遣使者毛莫如先考騐卒得其姦皆坐死假令丹知而白之此誣罔罪也不知而白之是背經術惑左道也師古曰左道不正之道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白専作威福阿黨所厚排擠英俊師古曰擠墜也音子詣反託公報私横厲無所畏忌師古曰縦横陵厲也欲以熏轑天下師古曰熏言熏灼之轑讀曰燎假借用字天下莫不望風而靡師古曰靡猶弭自尚書近臣皆結舌杜口師古曰杜塞也骨肉親屬莫不股栗師古曰言懼之甚故股戰慄也威權㤗盛而不忠信非所以安國家也今聞方進卒病死師古曰卒讀曰猝不以尉示天下反復賞賜厚葬唯陛下深思徃事以戒来今會成帝崩哀帝即位業復上書言王氏世權日久朝無骨骾之臣師古曰骾亦鯁字宗室諸侯微弱與繋囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輙白奏反與趙氏比周恣意妄行師古曰比音頻寐反譛愬故許后被加以非罪師古曰被音皮義反誅破諸許族敗元帝外家内嫉妬同産兄弟紅陽侯立及淳于氏師古曰兄紅陽侯立也姊淳于長母也皆老被放棄新喋血亰師威權可畏髙陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海内尤不可不慎陛下初即位謙讓未皇師古曰皇暇也孤獨特立莫可據杖權臣易世意若探湯師古曰言重難之若以手探熱湯也宜蚤以義割恩安百姓心竊見朱博忠信勇猛材畧不世出師古曰言其希有也誠國家雄俊之寳臣也宜徴博置左右以填天下師古曰填音竹刃反此人在朝則陛下可髙枕而卧矣昔諸吕欲危劉氏賴有髙祖遺臣周勃陳平尚存不者㡬為姦臣笑師古曰㡬音鉅依反業又言宜為恭王立廟亰師以章孝道時髙昌侯董宏亦言宜尊帝母定陶王丁后為帝太后大司空師丹等劾宏誤朝不道坐免為庶人業復上書訟宏前後所言皆合指施行朱博果見㧞用業由是徴復為太常嵗餘左遷上黨都尉㑹司𨽻奏業為太常選舉不實業坐免官復就國哀帝崩王莽秉政諸前議立廟尊號者皆免徙合浦業以前罷黜故見濶略師古曰濶略謂寛縱不問也憂恐病發死業成帝初尚帝妹潁邑公主主無子薨業家上書求還亰師與主合葬不許而賜諡曰荒侯傳子至孫絶初杜周武帝時徙茂陵至延年徙杜陵云贊曰張湯杜周並起文墨小吏致位三公列於酷吏而俱有良子徳器自過師古曰言其子徳器各過二人之身爵位尊顯繼世立朝相與提衡如淳曰提衡猶言相提攜也臣瓉曰衡平也言二人齊也師古曰瓚說是也至於建武杜氏爵乃獨絶師古曰建武之後張氏尚有張純為侯故言杜氏獨絶也迹其福祚元功儒林之後莫能及也師古曰元功蕭曹張陳之屬也儒林貢薛韋匡之軰自謂唐杜苖裔豈其然乎師古曰謂在周為唐杜氏也及欽浮沉當世好謀而成以建始之初深陳女戒終如其言庶㡬乎闗睢之見微師古曰闗睢國風之始言夫婦之際政化所由故云見微微謂微細也非夫浮華博習之徒所能窺也業因勢而抵陒服䖍曰抵音紙陒音羲謂罪敗而復抨弹之蘇秦書有此法師古曰抵撃也陒毁也言因事形勢而撃毁之也陒音詭一說陒讀與戲同音許宜反戲亦險也言撃其危險之處鬼谷有抵戲篇也稱朱博毁師丹愛憎之議可不畏哉前漢書卷六十前漢書卷六十考證杜周傳為執金吾逐捕桑𢎞羊衛皇后昆弟子顧炎武曰按百官表天漢三年二月執金吾杜周為御史大夫四年卒而衛太子巫蠱事乃在征和二年周卒巳四嵗矣又十一年昭帝元鳳元年御史大夫桑𢎞羊坐燕王旦事誅書事之謬如此而兩子夾河為郡守臣召南按唐書宰相世系表曰周三子延夀延考延年延年最㓜昭帝初始為吏則夾河為郡守者延夀延考也杜延年傳廷尉王平與少府徐仁按公卿表平字子心仁字中孫俱齊人杜欽傳小卞之作可為寒心按今詩作小弁與孟子同葢卞弁二字古通用故師古音盤與陸氏毛詩音義同合陽侯梁放臣召南按漢代列侯具見於表此合陽侯梁放功臣恩澤二表不見何也師古亦無注及繼功臣絶世臣召南按功臣表杜業納說云云於是成帝復紹蕭何是建議繼功臣絶世乃欽兄子業之事非欽事也表傳互異如此前漢書卷六十考證
