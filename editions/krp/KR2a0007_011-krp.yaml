body:
  text: 前漢書卷十一漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注哀帝紀第十一孝哀皇帝荀恱曰諱欣之字曰喜應劭曰恭仁短折曰哀元帝庶孫定陶恭王子也母曰丁姬年三嵗嗣立為王長好文辭法律師古曰年長而好之元延四年入朝盡從傅相中尉師古曰三官皆從王入朝時成帝少弟中山孝王亦來朝獨從傅上怪之以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說師古曰說其義他日問中山王獨從傅在何法令不能對令誦尚書又廢師古曰中忘之及賜食於前後飽起下韈係觧師古曰食而獨在後飽及起又韈係觧也韈音武伐反成帝由此以為不能而賢定陶王數稱其材時王祖母傅太后随王來朝私賂遺上所幸趙昭儀及帝舅票騎將軍曲陽侯王根昭儀及根見上亡子亦欲豫自結為長乆計皆更稱定陶王師古曰更音工衡反勸帝以為嗣成帝亦自羙其材為加元服而遣之師古曰為之冠時年十七矣明年使執金吾任宏守大鴻臚持節徴定陶王立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宫師古曰謙不敢言為太子故云假充若言非正宋祁曰非正新本作非如正陛下聖徳寛仁敬承祖宗奉順神祗宜䝉福祐子孫千億之報師古曰大雅假樂之詩曰干禄百福子孫千億言成王宜衆宜人天所保佑求得福禄故子孫衆多也十萬曰億故此謝書引以為言臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞後月餘立楚孝王孫景為定陶王奉恭王祀所以奨厲太子専為後之誼師古曰奨勸使也語在外戚傳綏和二年三月成帝崩四月丙午太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后大赦天下賜宗室王子有屬者馬各一駟師古曰有屬謂親未盡尚有服者吏民爵百戸牛酒三老孝弟力田鰥寡孤獨帛太皇太后詔尊定陶恭王為恭皇五月丙戌立皇后傅氏師古曰傅晏女詔曰春秋母以子貴尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宫中宫應劭曰成帝母王太后居長信宫李竒曰傅姬如長信丁姬如中宫也師古曰中宫皇后之宫追尊傅父為崇祖侯丁父為褒徳侯師古曰傳父傅太后之父丁父丁太后之父封舅丁眀為陽安侯舅子滿為平周侯追諡滿父忠為平周懐侯皇后父晏為孔鄉侯皇太后弟侍中光禄大夫趙欽為新成侯六月詔曰鄭聲淫而亂樂師古曰鄭國有溱洧之水男女亟於其間聚㑹故俗亂而樂淫聖王所放師古曰放弃也論語稱孔子曰放鄭聲其罷樂府曲陽侯根前以大司馬建社稷策益封二千户師古曰王根也建議立哀帝為太子太僕安陽侯舜輔𨗳有舊㤙益封五百戸師古曰王舜及丞相孔光大司空汜鄉侯何武益封各千户師古曰汜音汎詔曰河間王良䘮太后三年為宗室儀表師古曰儀表者言為禮儀之表率益封萬戸又曰制節謹度以防奢淫為政所先百王不易之道也師古曰言為常法不可改易諸侯王列侯公主吏二千石及豪富民多畜奴婢田宅亡限與民争利百姓失職重困不足師古曰失職失其常分也重音直用反其議限列師古曰令條列而為限禁有司條奏諸王列侯得名田國中列侯在長安及公王名田縣道闗内侯吏民名田皆無得過三十頃如淳曰名田國中者自其所食國中也既收其租稅又自得有私田三十頃名田縣道者令甲諸侯在國名田他縣罰金二両今列侯有不之國者雖遥食其國租稅復自得田於他縣道公主亦如之不得過三十頃諸侯王奴婢二百人列侯公主百人關内侯吏民三十人年六十以上十嵗以下不在數中賈人皆不得名田為吏如淳曰市井子孫不得為吏見食貨志犯者以律論諸名田畜奴婢過品皆沒入縣官齊三服官諸官織綺繡難成害女紅之物皆止無作輸如淳曰紅亦工也其所作已成未成皆止無復作皆輸所近官府也師古曰如說非也謂未成者不作已成者不輸耳除任子令及誹謗詆欺法應劭曰任子令者漢儀注吏二千石以上視事滿三年得任同産若子一人為郎不以徳選故除之師古曰任者保也詆誣也音丁禮反掖庭宫人年三十以下出嫁之官奴婢五十以上免為庶人禁郡國無得獻名獸益吏三百石以下奉師古曰奉音扶用反察吏殘賊酷虐者以時退有司無得舉赦前往事前博士弟子父母死予寧三年師古曰寧謂處家持䘮服宋祁曰前博士一本無前字秋曲陽侯王根成都侯王況皆有罪根就國況免為庶人歸故郡詔曰朕承宗廟之重戰戰兢兢懼失天心間者日月亡光五星失行郡國比比地動師古曰比比猶言頻頻也廼者河南潁川郡水出流殺人民敗壞廬舍朕之不徳民反䝉辜朕甚懼焉已遣光禄大夫循行舉籍師古曰舉其名籍也行音下更反賜死者棺錢人三千師古曰賜錢三千以充棺其令水所傷縣邑及他郡國災害什四以上民貲不滿十萬皆無出今年租賦師古曰什四謂什分損四建平元年春正月赦天下侍中騎都尉新成侯趙欽成陽侯趙訢皆有罪免為庶人徙遼西師古曰訢欽皆趙昭儀之兄太皇太后詔外家王氏田非冢塋皆以賦貧民師古曰塋冢域也賦給與也塋音營二月詔曰蓋聞聖王之治以得賢為首其與大司馬列侯將軍中二千石州牧守相舉孝弟惇厚能直言通政事延于側陋可親民者各一人師古曰言有孝弟惇厚直言通政事之人雖在側陋可延致而任者皆令舉之劉攽曰此詔亦是下丞相大司空者三月賜諸侯王公主列侯丞相將軍中二千石中都官郎吏金錢帛各有差冬中山孝王太后媛師古曰馮奉世之女也媛音爰弟宜鄉侯馮參有罪皆自殺二年春三月罷大司空復御史大夫師古曰復音扶目反此下亦同夏四月詔曰漢家之制推親親以顯尊尊師古曰天子之至親當極尊號定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宫恭皇后曰帝太后稱中安宫立恭皇廟于京師赦天下徒罷州牧復刺史六月庚申帝太后丁氏崩上曰朕聞夫婦一體詩云榖則異室死則同穴師古曰詩王風大車之篇也榖生也穴冢壙也昔季武子成寑杜氏之殯在西階下請合葬而許之師古曰季武子魯大夫季孫宿也成寑新為寑室也事見禮記檀弓附葬之禮自周興焉師古曰禮記稱孔子曰合𦵏非古也自周公以來未之有改也郁郁乎文㢤吾從周師古曰論語稱孔子曰周監於二代郁郁乎文哉吾從周言周觀視夏殷之禮而損益之典文大備吾從周禮也郁郁文章貌孝子事亡如事存帝太后宜起陵恭皇之園遂𦵏定陶發陳留濟隂近郡國五萬人穿復土師古曰為冢壙也復音扶目反待詔夏賀良等言赤精子之䜟應劭曰諸以材技徵召未有正官故曰待詔夏姓也賀良名也髙祖感赤龍而生自謂赤帝之精良等因是作此讖文漢家歴運中衰當再受命宜改元易號詔曰漢興二百載歴數開元皇天降非材之佑應劭曰哀帝自言不才天降之估漢國再獲受命之符朕之不徳曷敢不通夫基事之元命必與天下自新師古曰基始也元大也始為大事之命謂改制度也又曰更受天之大命其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝李斐曰陳道也言得神道聖者劉也如淳曰陳舜後王莽陳之後謬語以眀莽當篡立而不知韋昭曰敷陳聖劉之徳也師古曰如韋二說是也宋祁曰予按王莽𫝊以䜟文觧釋當作太初元將元年後人不曉四字為號輙削去元將二字非是後得唐本元將字果存漏刻以百二十為度師古曰舊漏晝夜共百刻今增其二十此本齊人廿忠可所造今賀良等重言遂施行之事見李尋傳七月以渭城西北原上永陵亭部為初陵勿徙郡國民使得自安八月詔曰待詔夏賀良等建言改元易號增益漏刻可以永安國家朕過聽賀良等言師古曰過誤也冀為海内獲福卒亡嘉應皆違經背古不合時宜六月甲子制書非赦令也皆蠲除之如淳曰悔前赦令不䝉其福故收令還之臣瓉曰改元易號大赦天下以求延祚而不䝉福哀帝悔之故更下制書諸非赦罪事皆除之謂改制易號令皆復故也師古曰如釋非也瓉説是矣非赦令也猶言自非赦令耳也語終辭也而讀者不曉輙改也為他字失本文也賀良等反道惑衆下有司皆伏辜丞相博御史大夫𤣥孔鄊侯晏有罪師古曰博朱博𤣥趙𤣥晏傅晏博自殺𤣥减死二等論晏削户四分之一語在博傳三年春正月立廣徳夷王弟廣漢為廣平王癸卯帝太太后所居桂宫正殿火三月己酉丞相當薨師古曰平當有星孛于河鼓夏六月立魯頃王子郚鄉侯閔為王蘇林曰郚音魚縣名也屬東海師古曰又音吾冬十一月壬子復甘泉泰畤汾隂后土祠罷南北郊東平王雲雲后謁安成恭侯夫人放文穎曰恭侯王崇王太后弟皆有罪雲自殺謁放弃市四年春大旱闗東民傳行西王母籌師古曰西王母元后夀考之象行籌又言執國家籌䇿行於天下經歴郡國西入闗至京師民又㑹聚祠西王母或夜持火上屋李竒曰皆隂為陽之象擊鼓號呼相驚恐師古曰呼音火故反二月封帝太太后從弟侍中傅商為汝昌侯太后同母弟子侍中鄭業為陽信侯三月侍中駙馬都尉董賢光禄大夫息夫躬南陽太守孫寵皆以告東平王封列侯語在賢傳夏五月賜中二千石至六百石及天下男子爵六月尊帝太太后為皇太太后秋八月恭皇園北門災冬詔将軍中二千石舉民兵法有大慮者師古曰慮謂謀䇿思慮宋祁曰民疑當作明元夀元年春正月辛丑朔日有蝕之詔曰朕獲保宗廟不眀不敏宿夜憂勞未皇寧息師古曰皇暇也惟隂陽不調元元不贍師古曰贍足也未睹厥咎婁敕公卿庶㡬有望師古曰望其厲精為治婁古屢字至今有司執法未得其中師古曰中音竹仲反或上暴虐假埶獲名温良寛柔䧟於亡滅是故殘賊彌長和睦日衰百姓愁怨靡所錯躬師古曰錯置也音千故反廼正月朔日有蝕之厥咎不逺在余一人公卿大夫其各悉心勉帥百寮師古曰悉盡也寮官也敦任仁人黜逺殘賊師古曰敦厚也逺音于萬反期於安民陳朕之過失無有所諱其與将軍列侯中二千石舉賢良方正能直言者各一人大赦天下丁巳皇太太后傅氏崩三月丞相嘉有罪下獄死師古曰王嘉秋九月大司馬栗騎将軍丁眀免孝元廟殿門銅龜蛇鋪首鳴如淳曰門鋪首作龜蛇之形而嗚呼也師古曰門之鋪首所以銜環者也鋪音普胡反二年春正月匈奴單于烏孫大昆彌來朝二月歸國單于不説師古曰説讀曰悦語在匈奴傳夏四月壬辰晦日有蝕之五月正三公官分職大司馬衛将軍董賢為大司馬丞相孔光為大司徒御史大夫彭宣為大司空封長平侯正司直司𨽻造司㓂職師古曰司直司𨽻漢舊冇之但改正其職掌而司㓂舊無今特創置故云造也宋祁曰南本職字上有官字事未定六月戊午帝崩于未央宫臣瓚曰帝年二十即位即位六年夀二十五師古曰即位明年乃改元夀二十六秋九月壬寅𦵏義陵臣瓚曰自崩至𦵏凡百五日義陵在扶風去長安四十六里贊曰孝哀自為藩王及充太子之宫文辭博敏幼有令聞師古曰博廣也敏疾也令善也聞名也睹孝成世禄去王室權柄外移是故臨朝婁誅大臣欲彊主威以則武宣師古曰則法也雅性不好聲色時覽卞射武戲應劭曰卞射皮卞而射也蘇林曰手摶為卞角力為武戲也晉灼曰甘延夀傳試卞為期門師古曰蘇晉二説是即位痿痺蘇林曰痿音萎枯之萎如淳曰痿音􅫯踒之踒弩病兩足不能相過曰痿師古曰痿亦痺病也音人佳反痺音必寐反􅫯踒者弩名事見晉令􅫯音煩踒音㽔末年􅐛劇師古曰􅐛漸也饗國不永哀㢤師古曰永長也前漢書卷十一前漢書卷十一考證哀帝紀使執金吾任宏守大鴻臚持節徴定陶王胡三省曰大鴻臚掌諸侯故任宏守大鴻臚以迎定陶王守者權守也待詔夏賀良等言赤精子之䜟臣召南按䜟字始見於此髙祖以斬白蛇旗幟上赤然張蒼謂漢本水徳公孫臣非之至武帝時猶謂以土徳王未有言火徳者也赤精子之説亦起于此張平子謂䜟起哀平之間信㢤號曰陳聖劉太平皇帝注如韋二説是也胡三省曰韋説不詭于正如説則近于巫顔以二説為是將安從乎又注宋祁曰予按王莽𫝊以䜟文解釋當作太初元將元年云云臣召南按宋説是也太初是武帝年號此時何至重紀蓋惑于術士之説創立四字年號以示更新其後雖不施行然後世四字年號遂起于此二年監本作元夀二年臣照按帝紀從無此例凡年號于元年特書二年以後即䝉前文未有再書者元夀二字眀係衍文今删去前漢書卷十一考證
