body:
  text: 御製題宋版前漢書冠冕琳瑯天祿収因刋書目閱從頭内府舊藏宋槧前漢書為天禄琳瑯之冠兹因校勘四庫全書總目復閱及之更覺其精妙罕匹呉蔵本自趙魏國楚得重歸王弇州久入上方不知故其書初為趙孟頫所蔵入明則自陸顧兩家展轉流傳歸之王世貞趙與王皆于卷前自畫其像王并有䟦向雄題識簡端亦未及此次之經意也兹編四庫識其由舊盃新斚多佳玉却笑無能大白浮御製讀漢書父欲安劉劉未安子謀安吕吕為殘其基髙帝失長算平勃奚稱智力殫張良進四皓非安劉實害劉此杜牧之卓識向曽屢見題詠兹不複綴夫辟疆非良之子乎乃以安吕之計教陳平平巧詐患失之小人也圗脫禍而聽其言吕氏權由此起設非后死而軍左袒則天下已為吕矣平勃又焉能安劉哉然其失總因髙帝既知恵帝不類已當廢之而立文帝乃牽私愛而欲立如意夫如意孺子也焉知其類已乎此由寵戚姬耳卒致戚姬為人彘恵帝引酒自廢而髙帝諸子被殺者復三人吾以為吕雉之禍實髙帝自召之而陳平之請封諸吕實佐之謂之為巧詐患失之小人不亦宜乎御製讀叔孫通傳叔孫待詔時䛕言免虎口漢王憎儒服短衣隨左右緜蕞肄朝儀百官敬奔走尊卑各以次奉觴起上夀稷嗣拜奉常五百賜金受諸生悉為郎分金不已有諸生乃推伏叔孫聖人否子輿闢衍儀其道比妾婦賢哉魯兩生窮不失所守御製讀前漢書汲黯傳踞厠視侍中如孟説各殊劉云當從孟吾亦云然乎漢書注如淳以厠為溷孟康以厠為牀邊側孟説似屬近理可從不則常人登溷尚知避人况人主乎即令宴見何難少須乃有聴其就溷入視之事曲解相沿盖特泥沛公如厠之文亦由馬遷誣記為作俑耳丞相𢎞宴覲時或不冠夫均應為輕之亦失禮貎無不冠不見黯遥望避帷趨其敬有如此何不重用渠然吾有疑焉治身禮樂須弗冠以臨下豈為恭已模蘭臺語過夸馬遷之同途讀史貴明理乃鮮失于誣御製讀蘇武傳成仁不辱自堪表齧雪餐㫋恐未然遷史好竒班亦爾子輿早及武成篇常謂正史當存實録毋貴竒特苟其事足信人義足勸世斯可矣如蘇武之仗莭誓死不辱君命誠人臣之極則􅋵莭牧羝有百折不回之氣匈奴敬之始而絶飲繼則給食是誠情理所必有而亦忠貞之可傳也若必謂齧雪咽㫋則雪或可齧㫋必不可咽即一時齧之咽之亦非數日可常藉以不死之事以是為武莭將恐智者疑其不然矣予故論其竒而闢之又武掘野䑕去草實而食之張宴注謂取䑕及草實并而食之師古是蘇林之説以為取䑕所蔵草實而食之張注誠舛䑕無可食之理而劉攽以為北方野䑕之類甚多皆可食誠堪噴飯今漠北有野䑕䝉古名曰鄂和托那每取草實蔵穴中以為食其草實之名則曰墨克爾他槩弗取喀爾喀窮乏之人多有掘得之以為充饑具然必留少許於穴中盖謂既攘彼食不宜盡絶其粮致饑而死也此事足徴武所為而惜蘇林師古所載皆未詳故並識之御製讀蕭望之傳東海有鉅儒治經修素履露索不肯聴抱闗為禄仕宣廟嚮聞名對筞稱進止一嵗乃三遷何以酬知己雅意本在朝平原辭刾史馮翊復移病諭意事方視雖曰不要君其孰信乎此義利抗明辨而胡自擅使大閑固未踰小莭詎盡美恭顯方枋政薫蕕無合理子伋上書訟適用速讒毁浸潤災无妄延縁禍自取叶慷慨飲藥終足以厲懦鄙一再猶不知渭陵實暗矣御製讀史丹傳史美頃侯輔道周皇孫燕啄竟貽憂恰如杜牧評黄綺不是安劉是㓕劉御製讀翟方進傳孤童耻小史携母旅京師努力績經學名莭頗自持謙牧讓胡常藉甚名譽馳劾免兩司𨽻風厲人共知胡乃右丞相託言漢舊儀御坐為起立在輿為下之太陽下同物仰照真乖宜薛宣誡掾史豈得謂無私其後果代宣公絜弗茍為求指濟深文好勝勇遂非疾惡固云直修怨寜匪巇長辜猶隐諱星變遂戚貽白馬賜上尊啜泣亦已遲反復鴻隙陂童謡翟子威御製讀龔遂傳賣劍令買牛賣刀令買犢千古傳名談此義欠三復賣必有買者刀劒仍齊俗力耕果誰是何致有積蓄設曰售他方道逺舂糧宿以隣國為壑亦非王政穆王生所教言天子悅謙牧日日不相視悤忙醉相告少卿本通政明經藴以夙數語誰弗知奚待彼私淑馬遷已好竒孟堅繼其躅不如斯者多史䇿誠難讀欽定四庫全書前漢書敘例唐正議大夫行祕書少監琅邪縣開國子顏師古撰儲君體上哲之姿膺守器之重俯降三善博綜九流觀炎漢之餘風究其終始懿孟堅之述作嘉其宏贍以為服應曩説疎紊尚多蘇晉衆家剖斷蓋尠蔡氏纂集尤為抵捂自兹以降蔑足有云悵前代之未周愍將來之多惑顧召幽仄俾竭芻蕘匡正暌違徼揚鬱滯將以博喻胄齒遠覃邦國𢎞敷錦帶啓導青衿曲禀宏規備䝉嘉惠增榮改觀重價流聲斗筲之材徒思罄力駑蹇之足終慙遠致嵗在重光律中大吕是謂涂月其書始就不耻狂簡輙用上聞粗陳指例式存揚㩁漢書舊無註解唯服䖍應劭等各為音義自别施行至典午中朝爰有晉灼集為一部凡十四卷又頗以意增益時辯前人當否號曰漢書集註屬永嘉喪亂金行播遷此書雖存不至江左是以爰自東晉迄于梁陳南方學者皆弗之見有臣瓚者莫知氏族考其時代亦在晉初又總集諸家音義稍以已之所見續厠其末舉駮前説喜引竹書自謂甄明非無差爽凡二十四卷分為兩帙今之集解音義則是其書而後人見者不知臣瓚所作乃謂之應劭等集解王氏七志阮氏七錄並題云然斯不審耳學者又斟酌瓚姓附著安施或云傅族旣無明文未足取信蔡謨全取臣瓚一部散入漢書自此以來始有注本但意浮功淺不加隱括屬輯乖舛錯亂實多或乃離析本文隔其辭句穿鑿妄起職此之由與未注之前大不同矣謨亦有兩三處錯意然於學者竟無𢎞益漢書舊文多有古字解説之後屢經遷易後人習讀以意刊改傳寫既多彌更淺俗今則曲覈古本歸其眞正一往難識者皆從而釋之古今異言方俗殊語末學膚受或未能通意有所疑輙就增損流遯忘返穢濫實多今皆刪削克復其舊諸表列位雖有科條文字繁多遂致舛雜前後失次上下乖方昭穆參差名實虧廢今則尋文究例普更刊整澄蕩愆違審定阡陌就其區域更為局界非止尋讀易曉庶令轉寫無疑禮樂歌詩各依當時律呂修短有節不可格以恒例讀者茫昧無復識其斷章解者支離又乃錯其句韻遂使一代文采空韞精奇累葉鑽求罕能通習今並隨其曲折剖判義理歴然易曉更無疑滯可得諷誦開心順耳凡舊注是者則無間然具而存之以示不隱其有指趣畧舉結約未伸衍而通之使皆備悉至於詭文僻見越理亂真匡而矯之以祛惑蔽若汎説非當蕪辭競逐茍出異端徒為煩冗秪穢篇籍蓋無取焉舊所闕漏未嘗解説普更詳釋無不洽通上考典謩旁究蒼雅非茍臆説皆有援據六蓺殘缺莫覩全文各自名家揚鑣分路是以向歆班馬仲舒子雲所引諸經或有殊異與近代儒者訓義弗同不可追駮前賢妄指瑕纇曲從後説茍會扄塗今則各依本文敷暢厥指非不考練理固宜然亦猶康成注禮與其書易相偝元凱解傳無係毛鄭詩文以類而言其意可了爰自陳項以迄哀平年載旣多綜輯斯廣所以紀傳表志時有不同當由筆削未休尚遺秕稗亦為後人傳授先後錯雜隨手率意遂有乖張今皆窮波討源搆會甄釋字或難識兼有借音義指所由不可暫闕若更求諸别卷終恐廢於披覽今則各於其下隨即翻音至如常用可知不涉疑昧者衆所共曉無煩翰墨近代注史競為該博多引雜説攻擊本文至有詆訶言辭掎摭利病顯前修之紕僻騁已識之優長乃效矛盾之仇讐殊乖粉澤之光潤今之注解翼贊舊書一遵軌轍閉絶岐路諸家注釋雖見名氏至於爵里頗或難知傳無所存具列如左荀悅字仲豫潁川人後漢秘書監撰漢紀三十卷其事皆出漢書宋祁曰景祐間余靖校本注末有後人取悅所著書入於注本十一字服䖍字子愼滎陽人後漢尚書侍郎高平令九江太守初名重改名祗後定名䖍應劭字仲瑗一字仲援一字仲遠汝南南頓人後漢蕭令御史營令泰山太守伏儼字景宏琅邪人劉德北海人鄭氏晉灼音義序云不知其名而臣瓚集解輙云鄭德旣無所據今依晉灼但稱鄭氏耳宋祁曰景祐余靖校本云鄭氏舊傳晉灼集注云北海人不知其名而臣瓚以為鄭德今書但稱鄭氏李斐不詳所出郡縣李奇南陽人鄧展南陽人魏建安中為奮威將軍封高樂鄉侯文穎字叔良南陽人後漢末荆州從事魏建安中為甘陵府丞張揖字稚讓清河人一云河間人魏太和中為博士止解司馬相如傳一卷蘇林字孝友陳留外黄人魏給事中領秘書監散騎常侍永安衛尉大中大夫黄初中遷博士封安成亭侯宋祁曰景祐余靖校本孝友字下有一云彦友四字安成亭侯無亭字張晏字子博中山人如淳馮翊人魏陳郡丞孟康字公休安平廣宗人魏散騎侍郎宏農太守領典農校尉勃海太守給事中散騎常侍中書令後轉為監封廣陵亭侯項昭不詳何郡縣人韋昭字𢎞嗣呉郡雲陽人呉朝尚書郎太史令中書郎博士祭酒中書僕射封高陵亭侯晉灼河南人晉尚書郎劉寳字道眞高平人晉中書郎河内太守御史中丞太子中庶子吏部郎安北將軍侍皇太子講漢書别有駮義宋祁曰景祐余靖校本云劉寳字道宇高平人晉吏部侍郎餘無説臣瓚不詳姓氏及郡縣宋祁曰景祐余靖校本云臣瓚不知何姓案裴駰史記序云莫知姓氏韋稜續訓又言未詳而劉孝標類苑以為于瓚酈元注水經以為薛瓚姚察訓纂云案庾翼集于瓚為翼主簿兵曹參軍後為建威將軍晉中興書云翼病卒而大將于瓚等作亂翼長史江虨誅之于瓚乃是翼將不載有注解漢書然瓚所采衆家音義自服䖍孟康以外並因晉亂湮滅不傳江左而高紀中瓚案茂陵書文紀中案漢祿秩令此二書亦復亡失不得過江明此瓚是晉中朝人未喪亂之前故得具其先輩音義及茂陵書漢令等耳蔡謨之江左以瓚二十四卷散入漢書今之注也若謂為于瓚乃是東晉人年代前後了不相會此瓚非于足可知矣又案穆天子傳目錄云祕書校書郎中傅瓚校古文穆天子傳曰記穆天子傳者汲縣人不準盗發古塜所得書今漢書音義臣瓚所案多引汲書以駮衆家訓義此瓚疑是傅瓚瓚時職典校書故稱臣也顔師古曰後人斟酌瓚姓附之傅族耳既無明文未足取信郭璞字景純河東人晉贈𢎞農太守止注相如傳序及游獵詩賦蔡謨字道明陳留考城人東晉侍中五兵尚書太常領祕書監都督徐兗青三州諸軍事領徐州刺史左光祿大夫開府儀同三司領揚州牧侍中司徒不拜贈侍中司空諡文穆公崔浩字伯深清河人後魏侍中特進撫軍大將軍左光祿大夫司徒封東郡公撰荀悅漢紀音義宋祁曰景祐校本作字伯淵前漢書敘例考證儲君體上哲之姿云云臣召南按顔師古因太子承乾之命注釋漢書故此序首言儲君其書成於貞觀十五年歲在辛丑故曰歲在重光也茍會扄塗監本别本俱訛作局塗非也今從古本改諸家注釋雖見名氏云云臣浩按此另為一條監本接連前文非是今提行寫魏建安中顧炎武日知錄曰敘例列姓氏鄧展文穎下並云魏建安中建安乃獻帝年號雖政出曹氏不得遽名以魏臣召南按日知錄説是又文穎魏建安中為甘陵府丞按兩漢無府丞官名甘陵改自安帝或如續志太常屬官每陵園令各一人丞及校長各一人則文穎為甘陵丞不得云為甘陵府丞也清河人一云河間人河間訛阿間今改正臣召南按師古所列諸家名氏自荀悦至崔浩共二十三人而監本載宋景祐時余靖上言總先儒注解名姓可見者三十五人蓋三