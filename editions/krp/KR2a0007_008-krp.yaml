body:
  text: 前漢書卷八漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注宣帝紀第八孝宣皇帝荀悅曰諱詢字次卿訽之字曰謀應劭曰諡法聖善周聞曰宣武帝曾孫戾太子孫也韋昭曰以違戾擅發兵故諡曰戾臣瓚曰太子誅江充以除䜛賊而事不見明後武帝覺寤遂族充家宣帝不得以加惡諡也董仲舒書曰有其功無其意謂之戾無其功有其意謂之罪師古曰瓉說是也太子納史良娣服䖍曰史姓也良娣官也師古曰太子有妃有良娣有孺子凡三等娣音次第之第生史皇孫師古曰以外家姓稱之故曰史皇孫皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害語在太子傳曾孫雖在襁緥李奇曰襁絡也以繒布為之絡負小児緥小兒大藉也孟康曰緥小兒被也師古曰襁即今之小兒繃也緥孟說是也襁音居丈反緥音保繃音補耕反猶坐收繫郡邸獄如淳曰謂諸郡邸置獄也師古曰據漢舊儀郡邸獄治天下郡國上計者屬大鴻臚此盖巫蠱獄繁收繫者衆故曾孫寄在郡邸獄而丙吉為廷尉監師古曰監者廷尉之官屬治巫蠱於郡邸憐曾孫之亡辜使女徒復作淮陽趙徵卿渭城胡組更乳養李奇曰復作者女徒也謂輕罪男子守邉一嵗女子輭弱不任守復令作於官亦一嵗故謂之復作徒也孟康曰復音服謂弛刑徒也有赦令詔書去其鉗􅎂赭衣更犯事不從徒加與民為例故當復為官作滿其本罪年月日律名為復作也師古曰孟說是也趙徵卿淮陽人胡組渭城人皆女徒也二人更遞乳養曾孫而丙吉傳云郭徵卿紀傳不同未知孰是更音工衡反私給衣食視遇甚有㤙巫蠱事連嵗不决至後元二年劉攽曰按武帝後元二年無赦元年乃有之蓋夲云後元年後人誤作後元元年又就元字注二字後又誤為二耳武帝疾往來長楊五柞宫師古曰長楊五柞二宫並在盩厔皆以樹名之帝往来二宫之間也柞字或作莋其音同望氣者言長安獄中有天子氣上遣使者分條中都官獄師古曰中都官凡京師諸官府也繫者輕重皆殺之内謁者令郭穰夜至郡邸獄師古曰百官表云内者署屬少府續漢書志云掌宫中布張諸褻物丁孚漢官云令秩千石蓋當時權為此使劉攽曰謁字衍劉敞同吉拒閉使者不得入曾孫頼吉得全因遭大赦吉廼載曾孫送祖母史良娣家語在吉及外戚傳後有詔掖庭養視上屬籍宗正應劭曰掖庭宫人之官有令丞宦者為之詔勅掖庭養視之始令宗正著其屬籍時掖庭令張賀嘗事戾太子思顧舊㤙師古曰顧念也哀曾孫奉養甚謹以私錢供給教書既壯為取暴室嗇夫許廣漢女應劭曰暴室宫人獄也今曰薄室許廣漢坐法腐為宦者作嗇夫也師古曰暴室者掖庭主織作染練之署故謂之暴室取暴曬為名耳或云薄室者薄亦暴也今俗語亦云薄曬蓋暴室職務既多因為置獄主治其罪人故往往云暴室獄耳然本非獄名應説失之矣嗇夫者暴室屬官亦猶縣鄉之嗇夫也曬音所懈反又音所智反曾孫因依倚廣漢兄弟及祖母家史氏師古曰倚音於綺反受詩於東海澓中翁服䖍曰澓音馥師古曰東海人姓澓字中翁也澓音房福反中讀曰仲髙材好學然亦喜游俠師古曰喜音許吏反鬭雞走馬具知閭里姧邪吏治得失數上下諸陵師古曰諸陵皆據髙敞地為之縣即在其側帝每周㳺往來諸陵縣去則上来則下故言上下諸陵周徧三輔師古曰㳺行皆至其處常困於蓮勺鹵中如淳曰為人所困辱也蓮勺縣有鹽池縱廣十餘里其鄉人名為鹵中蓮音輦勺音灼師古曰如說是也鹵者鹹地也今在櫟陽縣東其鄉人謂此中為鹵鹽池也尤樂杜鄠之間師古曰二縣之間也杜屬京兆鄠屬扶風鄠音扈率常在下杜孟康曰在長安南師古曰率者總計之言也下杜即今之杜城時㑹朝請舍長安尚冠里文穎曰以屬弟尚親故嵗時隨宗室朝㑹也如淳曰春曰朝秋曰請師古曰舍止也尚冠者長安中里名帝㑹朝請之時即於此里中止息請音才姓反身足下有毛臥居數有光燿師古曰遍身及足下皆有毛每買餅所從買家輙大讐師古曰讎讀曰售亦以是自怪元平元年四月昭帝崩毋嗣大將軍霍光請皇后徵昌邑王六月丙寅王受皇帝壐綬尊皇后曰皇太后癸巳光奏王賀淫亂請廢語在賀及光傳秋七月光奏議曰禮人道親親故尊祖尊祖故敬宗大宗無嗣擇支子孫賢者為嗣孝武皇帝曾孫病已師古曰蓋以夙遭屯難而多病苦故名病已欲其速差也後以為鄙更改諱詢有詔掖庭養視至今年十八師受詩論語孝經操行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗子萬姓師古曰天子以萬姓為子故云子萬姓奏可遣宗正徳至曾孫尚冠里舍洗沐賜御府衣太僕以軨獵車奉迎曾孫文穎曰軨獵小車前有曲輿不衣也近世謂之軨獵車也孟康曰今之載獵車也前有曲軨特髙大獵時立其中格射禽獸李竒曰蘭輿輕車也師古曰文李二説皆是時未備天子車駕故且取其輕便耳非藉髙大也孟説失之軨音鈴就齊宗正府庚申入未央宫見皇太后封為陽武侯師古曰先封侯者不欲立庶人為天子也已而羣臣奉上璽綬即皇帝位謁髙廟八月己巳丞相敞薨師古曰楊敞也九月大赦天下十一月壬子立皇后許氏賜諸侯王以下金錢至吏民鰥寡孤獨各有差皇太后歸長樂宫初置屯衞本始元年春正月募郡國吏民訾百萬以上徙平陵文穎曰昭帝陵遣使者持節詔郡國二千石謹牧養民而風徳化師古曰以徳化被於下故云風也詩序曰上以風化下大將軍光稽首歸政上謙譲委任焉論定䇿功益封大將軍光萬七千戸車騎將軍光禄勲富平侯安世萬户李斐曰居光禄位以車騎官號尊之無車騎官屬詔曰故丞相安平侯敞等居位守職與大將軍光車騎將軍安世建議定䇿以安宗廟功賞未加而薨其益封敞嗣子忠及丞相陽平侯義師古曰蔡義度遼將軍平陵侯明友師古曰范明友前將軍龍雒侯增師古曰韓增太僕建平侯延年師古曰杜延年太常蒲侯昌師古曰蘇昌諫大夫宜春侯譚師古曰王譚當塗侯平師古曰功臣表云魏不害以捕反者胡倩功封當塗侯其子聖以定策功益封凡二千二百戸今此紀言當塗侯平與表乖錯未知孰是或者有二名乎杜侯屠耆堂蘇林曰姓復陸其祖父復陸支夲匈奴胡也歸義為屬國王從驃騎有功乃更封也長信少府闗内侯勝師古曰夏侯勝邑户各有差封御史大夫廣明為昌水侯師古曰田廣明後將軍充國為營平侯師古曰趙充國大司農延年為陽城侯師古曰田延年少府樂成為爰氏侯師古曰史樂成光禄大夫遷為平丘侯師古曰王遷賜右扶風徳師古曰周徳典屬國武師古曰蘇武廷尉光師古曰李光宗正徳師古曰楚元王之曾孫劉辟强子大鴻臚賢師古曰韋賢詹事畸蘇林曰畸音踦隻之踦師古曰宋畸也音居宜反光禄大夫吉師古曰丙吉京輔都尉廣漢師古曰趙廣漢也三輔郡皆有都尉如諸郡左輔都尉治髙陵右輔都尉治郿京輔都尉治華隂灌北爵皆關内侯徳武食邑張晏曰舊關内侯無邑也以蘇武守節外國劉徳宗室俊彦故特令食邑夏四月庚午地震詔内郡國舉文學髙第各一人韋昭曰中國為内郡縁邉有夷狄障塞者為外郡成帝時内郡舉方正北邉二十二郡舉勇猛士五月鳳皇集膠東千乗赦天下賜吏二千石諸侯相下至中都官宦吏六百石爵各有差如淳曰中都官宦吏奄人為吏者也晉灼曰凡職在京師者也師古曰二說皆非也中都官謂在京師諸官也宦吏諸奄官也自左更至五大夫師古曰左更第十二爵也五大夫第九爵也更音工衡反劉敞曰案此賜爵不及中二千石者縁王即位九侯率已為關内侯矣賜天下人爵各一級孝者二級女子百户牛酒租稅勿收六月詔曰故皇太子在湖未有號諡師古曰湖縣名也死於湖因即葬焉嵗時祠其議諡置園邑語在太子傳秋七月詔立燕刺王太子建為廣陽王師古曰刺音来曷反立廣陵王胥少子𢎞為髙密王二年春以水衡錢為平陵徙民起第宅應劭曰水衡與少府皆天子私藏耳縣官公作當仰給司農今出水衡錢言宣帝即位為異政也晋灼曰食貨志初大司農管鹽鐡官布多故置水衡欲以主鹽鐡及楊可告緡上林財物衆乃令水衡主上林上林三官主鑄錢也大司農陽城侯田延年有罪自殺師古曰坐増僦直而自入夏五月詔曰朕以𦕈身奉承祖宗夙夜惟念孝武皇帝躬履仁義選明將討不服匈奴逺遁平氐羌昆明南越百蠻鄉風師古曰鄉讀曰嚮也款塞來享應劭曰款叩也皆叩塞門来服従也如淳曰款寛也請除守塞者自保不為冦害也故曰款五原塞師古曰應說是也此汎説夷狄来賔之事非呼韓邪保塞意也建太學修郊祀定正朔協音律封泰山塞宣房蘇林曰隄名在東郡界李斐曰決河上宫名也張晏曰瓠子隄名師古曰蘇張二說皆是符瑞應寳鼎出白麟獲功徳茂盛不能盡宣而廟樂未稱師古曰稱副也其議奏有司奏請宜加尊號六月庚午尊孝武廟為世宗廟奏盛徳文始五行之舞應劭曰宣帝復采昭徳之舞為盛徳舞以尊世宗廟也諸帝廟皆常奏文始四時五行舞也天子世世獻武帝廵狩所幸之郡國皆立廟賜民爵一級女子百戸牛酒匈奴數侵邉又西伐烏孫烏孫昆彌及公主因國使者上書師古曰昆彌烏孫王之號也國使者漢朝之使也言昆彌願發國精兵擊匈奴唯天子哀憐出兵以救公主秋大發興調關東輕車鋭卒師古曰調亦選也鋭利也言其勇利也調音徒釣反選郡國吏三百石伉健習騎射者皆從軍師古曰伉强也音口浪反御史大夫田廣明為祁連將軍應劭曰祁連匈奴中山名也諸將分部廣明值此山因以為號也師古曰祁音上夷反後將軍趙充國為蒲類將軍應劭曰蒲類匈奴中海名也在敦煌北晋灼曰匈奴傳有蒲類澤師古曰晋説是也雲中太守田順為虎牙將軍及度遼將軍范明友前將軍韓增凡五將軍兵十五萬騎校尉常惠持節護烏孫兵咸擊匈奴三年春正月癸亥皇后許氏崩戊辰五將軍師發長安夏五月軍罷祁連將軍廣明虎牙將軍順有罪下有司皆自殺晋灼曰田千秋子也廣明坐逗留順坐增虜𫉬校尉常惠將烏孫兵入匈奴右地大克𫉬封列侯大旱郡國傷旱甚者民毋出租賦三輔民就賤者且毋收事盡四年晋灼曰不給官役也師古曰収謂租賦也事謂役使也盡夲始四年而止六月己丑丞相義薨師古曰蔡義四年春正月詔曰蓋聞農者興徳之夲也今嵗不登已遣使者振貸困乏其令太官損膳省宰師古曰膳具食也食之善者也宰為屠殺也省減也漢儀注太宰令屠者七十二人宰二百人樂府減樂人使歸就農業丞相以下至都官令丞師古曰都官令丞京師諸署之令丞上書入榖輸長安倉助貸貧民民以車船載榖入關者得毋用傳師古曰傳傳符也欲榖之多故不問其出入也傳音張戀反三月乙夘立皇后霍氏賜丞相以下至郎吏從官金錢帛各有差赦天下夏四月壬寅郡國四十九地震或山崩水出詔曰盖災異者天地之戒也朕承洪業奉宗廟託于士民之上未能和羣生廼者地震北海琅邪壞祖宗廟朕甚懼焉丞相御史其與列侯中二千石博問經學之士有以應變師古曰謂禦塞災異也輔朕之不逮毋有所諱令三輔太常内郡國舉賢良方正各一人律令有可蠲除以安百姓條奏被地震壞敗甚者勿收租賦大赦天下上以宗廟墮素服避正殿五日師古曰墮者毁也音火規反五月鳯皇集北海安丘淳于師古曰二縣皆屬北海郡秋廣川王吉有罪廢遷上庸自殺宋祁曰吉一作去字地節元年應劭曰以先者地震山崩水出扵是改年曰地節欲令地得其節春正月有星孛于西方三月假郡國貧民田師古曰權以給之不常與夏六月詔曰蓋聞堯親九族以和萬國師古曰尚書堯典云克明俊徳以親九族九族既睦平章百姓百姓昭明協和萬邦故詔引之朕䝉遺徳奉承聖業惟念宗室屬未盡而以罪絶若有賢材改行勸善其復屬使得自新師古曰復音扶目反冬十一月楚王延夀謀反自殺十二月癸亥晦日有蝕之二年春三月庚午大司馬大將軍光薨詔曰大司馬大將軍博陸侯師古曰尊之故不名宿衞孝武皇帝三十餘年輔孝昭皇帝十有餘年遭大難躬秉義率三公諸侯九卿大夫定萬世䇿以安宗廟天下蒸庶咸以康寧師古曰蒸衆庶人也康安也功徳茂盛朕甚嘉之復其後世疇其爵邑張晏曰律非始封十減二疇者等也言不復減也師古曰復音方目反世世毋有所與師古曰與讀曰豫功如蕭相國夏四月鳳皇集魯郡羣鳥從之師古曰今流俗書夲此下云戊申立皇太子而後年又有立皇太子事此盖以元紀云元帝二嵗宣帝即位八嵗為皇太子故後人妄於此書加之舊夲無也據疏廣及丙吉傳並云地節三年立皇太子此即明驗而或者妄為臆説乖扵實矣大赦天下五月光禄大夫平丘侯王遷有罪下獄死上始親政事又思報大將軍功徳廼復使樂平侯山領尚書事師古曰霍山光之兄孫而令羣臣得奏封事以知下情五日一聴事自丞相以下各奉職奏事以傅奏其言應劭曰敷陳也各自奏陳其言然後試之以官考其功徳也師古曰傅讀曰敷考試功能侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不改易師古曰言各久其職事也劉攽曰至于子孫謂賞賜逮及子孫非謂侍中尚書官至子孫不改易也樞機周密品式備具上下相安莫有茍且之意也三年春三月詔曰蓋聞有功不賞有罪不誅雖唐虞猶不能以化天下今膠東相成勞来不怠師古曰王成也勞来者言慰勉而招延之也小雅鴻鴈之詩序曰勞來還定安集之勞音盧到反来音盧代反流民自占八萬餘口師古曰占者謂自隠度其戸口而著名籍也占音之贍反治有異等師古曰政治異扵常等其秩成中二千石賜爵關内侯又曰鰥寡孤獨髙年貧困之民朕所憐也前下詔假公田貸種食師古曰貸音吐戴反其加賜鰥寡孤獨髙年帛二千石嚴教吏謹視遇母令失職師古曰職常也失職謂失其常業也令内郡國舉賢良方正可親民者夏四月戊申立皇太子大赦天下賜御史大夫爵闗内侯中二千石爵右庶長張晏曰自公孫𢎞後丞相常封列侯第二十等爵故賜御史大夫爵關内侯第十九等爵也右庶長第十一等爵也師古曰張說非也此以立皇太子國之大慶故特賜御史大夫及中二千石爵耳非常制也天下當為父後者爵一級賜廣陵王黄金千斤諸侯王十五人黄金各百斤列侯在國者八十七人黄金各二十斤冬十月詔曰廼者九月壬申地震朕甚懼焉有能箴朕過失師古曰箴戒也及賢良方正直言極諫之士以匡朕之不逮師古曰匡正也毋諱有司李竒曰諱避也雖有司在顯職皆言其過勿避之朕既不徳不能附逺是以邉境屯戍未息今復飭兵重屯久勞百姓師古曰飭讀與勅同飭整也非所以綏天下也其罷車騎將軍右將軍屯兵又詔池籞未御幸者假與貧民蘇林曰折竹以䋲綿連禁禦使人不得往来律名為籞服䖍曰籞在池水中作室可用棲鳥鳥入中則捕之應劭曰池者陂池也籞者禁苑也臣瓉曰籞者所以養鳥也設為籓落周覆其上令鳥不得出猶苑之畜獸池之畜魚也師古曰蘇應二説是郡國宫館勿復修治流民還歸者假公田貸種食師古曰貸音吐戴反種五榖種也音之勇反且勿算事師古曰不出算賦及給徭役十一月詔曰朕既不逮導民不明師古曰不逮者意慮不及也反側晨興念慮萬方不忘元元惟恐羞先帝聖徳師古曰羞謂沗辱也故竝舉賢良方正以親萬姓歴載臻兹然而俗化闕焉師古曰多歴年載迄至于今傳曰孝弟也者其為仁之夲與師古曰論語載有若之言與讀曰予其令郡國舉孝弟有行義聞於鄉里者各一人十二月初置廷尉平四人秩六百石省文山郡并蜀師古曰以其縣道𨽻蜀郡四年春二月封外祖母為博平君故鄼侯蕭何曾孫建世為侯詔曰導民以孝則天下順今百姓或遭衰絰凶災師古曰衰音千囬反而吏繇事使不得葬師古曰繇讀曰徭事謂役使之傷孝子之心朕甚憐之自今諸有大父母父母䘮者勿繇事使得收歛送終盡其子道夏五月詔曰父子之親夫婦之道天性也雖有患禍猶蒙死而存之師古曰䝉冒也誠愛結於心仁厚之至也豈能違之哉自今子首匿父母妻匿夫孫匿大父母皆勿坐師古曰凡首匿者言為謀首而藏匿罪人其父母匿子夫匿妻大父母匿孫罪殊死皆上請廷尉以聞立廣川恵王孫文為廣川王秋七月大司馬霍禹謀反詔曰廼者東織室令史張赦應劭曰舊時有東西織室織作文繡郊廟之服令史其主者史使魏郡豪李竟文穎曰有權勢豪右大家報冠陽侯霍雲謀為大逆如淳曰報白也師古曰此説非也謂張赦因李竟傳言於霍雲與共謀反耳非告白其罪也赦既為織室令史身在京師不須李竟𤼵之據霍禹傳其事明矣朕以大將軍故抑而不揚兾其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟冠陽侯雲樂平侯山師古曰據霍光傳雲山皆去病之孫則扵禹為子行也今此紀言從昆弟盖傳寫者脱子字耳當言從昆弟子也諸姊妹壻度遼將軍范眀友長信少府鄧廣漢中郎將任勝騎都尉趙平長安男子馮殷等晋灼曰漢語字子都謀為大逆顯前又使女侍醫淳于衍進藥殺共哀后師古曰殺讀曰弑共讀曰㳟謀毒太子欲危宗廟逆亂不道咸伏其辜諸為霍氏所詿誤未發覺在吏者皆赦除之八月己酉皇后霍氏廢九月詔曰朕惟百姓失職不贍遣使者循行郡國問民所疾苦師古曰行音下更反吏或營私煩擾不顧厥咎朕甚閔之今年郡國頗被水災已振貸師古曰貸音吐戴反鹽民之食而賈咸貴師古曰賈讀曰價其下亦同衆庶重困師古曰更増其困也重音直用反其減天下鹽賈又曰令甲死者不可生文穎曰蕭何承秦法所作為律今律經是也天子詔所增損不在律上者為令令甲者前帝第一令也如淳曰令有先後故有令甲令乙令丙師古曰如説是也甲乙者若今之第一第二篇耳刑者不可息李斐曰息滅也若黥劓者雖欲改過其創瘢不可復滅也師古曰息謂生長也言劓刖臏割之徒不可更生長亦猶謂子為息耳李說非也此先帝之所重而吏未稱師古曰稱副也今繫者或以掠辜若飢寒瘐死獄中蘇林曰瘐病也囚徒病律名為瘐如淳曰律囚以飢寒而死曰瘐師古曰瘐病是也此言囚或以掠笞及飢寒及疾病而死如說非矣庾音庚字或作㢏其音亦同何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠笞若瘐死者所坐名縣爵里師古曰名其人名也縣所屬縣也爵其身之官爵也里所居邑里也丞相御史課殿最以聞師古曰凡言殿最者殿後也課居後也最凡要之首也課居先也殿音丁見反十二月清河王年有罪廢遷房陵元康元年春以杜東原上為初陵更名杜縣為杜陵徙丞相將軍列侯吏二千石訾百萬者杜陵三月詔曰廼者鳳皇集泰山陳留甘露降未央宫朕未能章先帝休烈師古曰章明也休美也烈業也協寧百姓承天順地調序四時𫉬䝉嘉瑞賜兹祉福夙夜兢兢靡有驕色内省匪解永惟罔極師古曰省視也永長也惟思也罔無也極中也帝言内自視察不敢惰怠長思政道恐無其中也解讀曰懈書不云乎鳳皇来儀庶尹允諧師古曰虞書益稷之篇曰簫韶九成鳳皇来儀擊石拊石百獸率舞庶尹允諧言奏樂之和鳯皇以其容儀来下百獸相率舞蹈是乃衆官之長信皆和輯故神人交暢其赦天下徒賜勤事吏中二千石以下至六百石爵自中郎吏至五大夫師古曰賜中郎吏爵得至五大夫自此以上每為等級而髙賜也五大夫第九爵也一曰二千石至五大夫自此以下而差降劉攽曰爵自中郎吏文誤盖夲云自中更至五大夫傳者誤以更為吏遂衍出郎字與民爵不過公乗則賜吏爵自五大夫而上也以中二千石爵中更二千石亦當左更真比同千石當右庶長六百石則五大夫矣尋夲始元年詔文則知此説是佐史以上二級民一級女子百戸牛酒加賜鰥寡孤獨三老孝弟力田帛所振貸勿收夏五月立皇考廟益奉明園户為奉明縣師古曰奉明園即皇考史皇孫之所𦵏也夲名廣明後追改也復髙皇帝功臣絳侯周勃等百三十六人家子孫令奉祭祀師古曰復音方目反以下亦同世世勿絶其毋嗣者復其次秋八月詔曰朕不明六蓺鬱于大道孟康曰鬱不通也是以隂陽風雨未時其博舉吏民厥身修正通文學眀於先王之術宣究其意者各二人師古曰究盡也中二千石各一人劉攽曰此詔是下丞相御史者故云各二人下云中二千石各一人於文似少潤飾冬置建章衞尉二年春正月詔曰書云文王作罰刑兹無赦師古曰周書康誥之辭也言文王作法罰其有亂常違教者則刑之無放釋也今吏修身奉法未有能稱朕意朕甚愍焉其赦天下與士大夫厲精更始李斐曰今吏已修身奉法矣但不能稱上意故赦之師古曰言文王作罰有犯之者皆刑無赦今我意有所閔閔吏修身奉法矣而未稱其任故特赦之與更始耳李說非也劉攽曰言吏修身奉法未有能稱朕意故須赦也何則身不修則不䏻率下法不奉則或阿枉如此則民坐罪者乃無辜安得如文王刑兹無赦也劉敞曰此詔正謂吏未能修身奉法有稱上意者故特赦之與更始申儆之也顔李以意疑宣帝不當謂吏皆未修身奉法乃斷其辭曲為釋觧失之逺矣二月乙丑立皇后王氏師古曰王奉光女賜丞相以下至郎從官錢帛各有差三月以鳳皇甘露降集賜天下吏爵二級民一級女子百户牛酒鰥寡孤獨髙年帛夏五月詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律貳端深淺不平師古曰析分也謂分破律條妄生端緒以出入人罪增辭飾非以成其罪奏不如實上亦亡繇知師古曰上者天子自謂也繇讀與由同此朕之不明吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法或擅興繇役飾厨傳稱過使客韋昭曰厨謂飲食傳謂傳舍言修飾意氣以稱過使而已師古曰使人及賔客來者稱其意而遣之令過去也稱音尺孕反過者過度之過也越職踰法以取名譽譬猶踐薄冰以待白日豈不殆哉師古曰殆危也今天下頗被疾疫之災朕甚愍之其令郡國被災甚者毋出今年租賦又曰聞古天子之名難知而易諱也今百姓多上書觸諱以犯罪者朕甚憐之其更諱詢諸觸諱在令前者赦之師古曰令謂今詔書冬京兆尹趙廣漢有罪要斬三年春以神爵數集泰山賜諸侯王丞相將軍列侯二千石金郎從官帛各有差賜天下吏爵二級民一級女子百戸牛酒鰥寡孤獨髙年帛三月詔曰蓋聞象有罪舜封之應劭曰象者舜弟也日以殺舜為事舜為天子猶封之於有庳之國骨肉之親粲而不殊師古曰粲明也殊絶也常明扵仁㤙不離絶也其封故昌邑王賀為海昬侯又曰朕微眇時御史大夫丙吉中郎將史曾史元長樂衛尉許舜侍中光禄大夫許延夀皆與朕有舊㤙及故掖庭令張賀輔導朕躬修文學經術㤙惠卓異厥功茂焉詩不云乎無徳不報師古曰大雅抑之詩也言受人之徳必有報也封賀所子弟子侍中中郎將彭祖為陽都侯如淳曰賀張安世兄有一子早死故以彭祖為子師古曰所子者言養弟子以為子追賜賀諡曰陽都哀侯吉曾元舜延夀皆為列侯故人下至郡邸獄復作師古曰謂胡組趙徵卿之輩也復扶目反嘗有阿保之功臣瓉曰阿倚保養也皆受官禄田宅財物各以㤙深淺報之夏六月詔曰前年夏神爵集雍晋灼曰漢注大如鷃爵黄喉白頸黒背腹斑文也師古曰鷃音晏今春五色鳥以萬數飛過屬縣師古曰三輔諸縣也翺翔而舞欲集未下其令三輔毋得以春夏擿巢探卵彈射飛鳥師古曰擿音佗狄反射音食亦反宋祁曰南夲飛鳥下有畢年二字具為令立皇子欽為淮陽王四年春正月詔曰朕惟耆老之人髮齒堕落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以來諸年八十以上非誣告殺傷人佗皆勿坐師古曰誣告人及殺傷人皆如舊法其餘則不論遣太中大夫彊等十二人循行天下師古曰行音下更反存問鰥寡覽觀風俗察吏治得失舉茂材異倫之士二月河東霍徵史等謀反誅三月詔曰廼者神爵五采以萬數集長樂未央北宫高寢甘泉㤗畤殿中及上林苑朕之不逮寡于徳厚屢𫉬嘉祥非朕之任其賜天下吏爵二級民一級女子百戸牛酒加賜三老孝弟力田帛人二匹鰥寡孤獨各一匹秋八月賜故右扶風尹翁歸子黄金百斤以奉其祭祀又賜功臣適後黄金人二十斤師古曰適讀曰嫡承嗣者也或子或孫不拘後裔故總言後也丙寅大司馬衛將軍安世薨比年豐穀石五錢師古曰比頻也神爵元年應劭曰前年神爵集于長樂宫故改元春正月行幸甘泉郊泰畤三月行幸河東祠后土詔曰朕承宗廟戰戰栗栗惟萬事統未燭厥理師古曰惟思也統緒也燭照也廼元康四年嘉榖𤣥稷降于郡國服䖍曰𤣥稷黒粟也神爵仍集師古曰仍頻也金芝九莖産于函徳殿銅池中服䖍曰金芝色像金也如淳曰函亦含也銅池承霤也晋灼曰以銅作池也師古曰函徳殿名也銅池承霤是也以銅為之函讀與含同九真獻竒獸蘇林曰白象也晋灼曰漢注駒形麟色牛角仁而愛人師古曰非白象也晋說是矣南郡𫉬白虎威鳯為寳服䖍曰威鳳鳥名也晋灼曰鳳之有威儀者也與尚書鳳皇来儀同意師古曰晋說是朕之不眀震于珍物服䖍曰震驚也蘇林曰震動也珍物瑞應也師古曰蘇説是也𫉬珍物而心感動也飭躬齋精祈為百姓師古曰飭與勅同為音于偽反東濟大河天氣清静神魚舞河幸萬嵗宫神爵翔集服䖍曰萬嵗宫在東郡平陽縣今有津晋灼曰黄圗汾隂有萬嵗宫是時幸河東師古曰晋說是朕之不徳懼不能任其以五年為神爵元年賜天下勤事吏爵二級民一級女子百户牛酒鰥寡孤獨高年帛所振貸物勿收行所過毋出田租西羌反𤼵三輔中都官徒弛刑李竒曰弛廢也謂若今徒解鉗釱赭衣置任輸作也師古曰中都官京師諸官府也漢儀注長安中諸官獄三十六所弛刑李說是也若今徒囚但不枷鎻而責保散役之耳弛音式爾反及應募佽飛射士服䖍曰周時度江越人在船下負船將覆之佽飛入水殺之漢因以材力名官如淳曰吕氏春秋荆有茲非得寳劒於干將渡江中流兩蛟繞舟兹非㧞寳劒赴江刺兩蛟殺之荆王聞之任以執圭後世以為勇力之官兹佽音相近臣瓉曰本秦左弋官也武帝改曰佽飛官有一令九丞在上林苑中結矰繳以弋鳬鴈嵗萬頭以供祀宗廟許慎曰佽便利也便利矰繳以弋鳬鴈故曰佽飛詩曰抉拾既佽者也師古曰取古勇力人以名官熊渠之類是也亦因取其便利輕疾若飛故號佽飛弋鳬鴈事自使佽飛為之非取飛鳥為名瓉説失之佽音次羽林孤兒應劭曰天有羽林大將軍之星林喻若林木之盛羽羽翼鷙擊之意故以名武官焉如淳曰百官表取從軍死事者之子養羽林官教以五兵號曰羽林孤兒少壯令從軍漢儀注羽林從官七百人胡越騎三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎詣金城夏四月遣後將軍趙充國彊弩將軍許延夀擊西羌六月有星孛于東方即拜酒泉太守辛武賢為破羌將軍師古曰即就也就酒泉而拜之不徴入與兩將軍並進師古曰兩將軍即趙充國許延夀詔曰軍旅暴露轉輸煩勞其令諸侯王列侯蠻夷王侯君長當朝二年者皆毋朝師古曰朝來年之正月秋賜故大司農朱邑子黄金百斤以奉祭祀後將軍充國言屯田之計語在充國傳二年春二月詔曰廼者正月乙丑鳳皇甘露降集京師羣鳥從以萬數朕之不徳屢𫉬天福祗事不怠其赦天下夏五月羌虜降服斬其首惡大豪楊玉酋非首文穎曰羌胡名大帥為酋如中國言魁非首其名也如淳曰酋音酒􅀈熟師古曰文說失矣酋者自其魁帥之稱而此酋不當其義也蓋首惡者唱首為惡也大豪者魁帥也楊玉及酋非皆人名言斬此二人之首級耳既已言大豪不當重言酋且趙充國傳又云酋非楊玉首此其明驗也酋音才由反宋祁曰予按􅀈非字當為音酒酋熟鄭注月令酒孰曰酋置金城屬國以處降羌秋匈奴日逐王先賢撣鄭氏曰撣音纒束之纒晋灼曰音田師古曰鄭音是也將人衆萬餘来降使都䕶西域騎都尉鄭吉迎日逐破車師皆封列侯九月司隸校尉蓋寛饒有罪下有司自殺匈奴單于遣名王奉獻師古曰名王者謂有大名以别諸小王也賀正月始和親師古曰賀來嵗之正月三年春起樂㳺苑師古曰三輔黄圗云在杜陵西北又闗中記云宣帝立廟於曲池之北號樂游案其處則今之所呼樂游廟者是也其餘基尚可識焉盖夲為苑後因立廟乎樂音来各反三月丙午丞相相薨師古曰魏相秋八月詔曰吏不廉平則治道衰今小吏皆勤事而奉禄薄師古曰奉音扶用反其下亦同欲其毋侵漁百姓難矣如淳曰漁奪也謂奪其利便也晋灼曰許慎云捕魚之字也師古曰漁者若言漁獵也晋說是也其益吏百石以下奉十五如淳曰律百石奉月六百韋昭曰若食一斛則益五斗宋祁曰刋誤據後漢志及師古百官表注當云律百石奉月十六斛四年春二月詔曰廼者鳳皇甘露降集京師嘉瑞並見修興泰一五帝后土之祠祈為百姓䝉祉福師古曰為音于偽反鸞鳯萬舉蜚覽翺翔集止于旁師古曰萬舉猶言舉以萬數也蜚古飛字也言鸞鳯飛翔覽觀都邑也齋戒之暮神光顯著薦鬯之夕神光交錯師古曰鬯香酒所以祭神或降于天或登于地或從四方來集于壇上帝嘉嚮海内承福師古曰嚮讀曰饗其赦天下賜民爵一級女子百户牛酒鰥寡孤獨髙年帛夏四月潁川太守黄覇以治行尤異秩中二千石如淳曰太守雖號二千石有千石八百石居者有功徳茂異乃得滿秩覇得中二千石九卿秩也晋灼曰此直謂二千石増秩為中二千石耳不謂滿不滿也師古曰如說非也霸舊已二千石矣今増為中二千石以寵異之此與地節三年増膠東相王成秩其事同耳漢制秩二千石者一嵗得一千四百四十石實不滿二千石也其云中二千石者一嵗得二千一百六十石舉成數言之故曰中二千石中者滿也賜爵關内侯黄金百斤及潁川吏民有行義者爵人一一級力田一級貞婦順女帛令内郡國舉賢良可親民者各一人五月匈奴單于遣弟呼留若王勝之来朝師古曰呼留若者王之號也勝之其人名冬十月鳳皇十一集杜陵十一月河南太守嚴延年有罪弃市十二月鳯皇集上林五鳯元年應劭曰先者鳳皇五至因以改元云春正月行幸甘泉郊泰畤皇太子冠皇太后賜丞相將軍列侯中二千石帛人百匹太夫人八十匹宋祁曰一夲作夫丁八十匹夫人六十匹宋祁曰一夲無此五字又賜列侯嗣子爵五大夫男子為父後者爵一級夏赦徒作杜陵者冬十二月乙酉朔日有蝕之左馮翊韓延夀有罪弃市二年春三月行幸雍祠五畤夏四月己丑大司馬車騎將軍增薨師古曰韓増秋八月詔曰夫婚姻之禮人倫之大者也酒食之㑹所以行禮樂也劉攽曰多樂字陽夏公曰古語多此類非衍字也今郡國二千石或擅為苛禁禁民嫁娶不得具酒食相賀召由是廢鄉黨之禮令民亡所樂非所以導民也詩不云乎民之失徳乾餱以愆師古曰小雅伐木之詩也餱食也愆過也言人無㤙徳不相飲食則闕乾餱之事為過惡也乾音干餱音侯勿行苛政冬十一月匈奴呼遬累單于帥衆来降師古曰遬古速字累音力追反封為列侯十二月平通侯楊惲師古曰惲音於吻反坐前為光禄勲有罪免為庶人不悔過怨望大逆不道要斬三年春正月癸卯丞相吉薨師古曰丙吉也三月行幸河東祠后土詔曰往者匈奴數為邉冦百姓被其害朕承至尊未能綏安匈奴虛閭權渠單于請求和親病死右賢王屠耆堂代立骨肉大臣立虛閭權渠單于子為呼韓邪單于擊殺屠耆堂諸王並自立分為五單于更相攻擊師古曰更音工衡反死者以萬數畜産大耗什八九師古曰耗損也言十損其八九也耗音呼到反人民飢餓相燔燒以求食師古曰燔焚也音扶元反因大乖亂單于閼氏服䖍曰閼氏音焉支子孫昆弟及呼遬累單于名王右伊秩訾且渠當戸以下師古曰伊秩訾且渠當戸皆匈奴官號也訾音子移反且音子余反將衆五萬餘人来降歸義單于稱臣使弟奉珍朝賀正月北邉晏然靡有兵革之事朕飭躬齊戒師古曰飭與勅同郊上帝祠后土神光竝見或興于谷燭燿齊宫十有餘刻師古曰燭亦照也刻者以漏言時也甘露降神爵集已詔有司告祠上帝宗廟三月辛丑鸞鳳又集長樂宫東闕中樹上張晏曰門外闕内衡馬之襄樹也飛下止地文章五色留十餘刻吏民並觀朕之不敏懼不能任婁䝉嘉瑞獲茲社福師古曰婁古屢字書不云乎雖休勿休祗事不怠師古曰周書吕刑之辭言雖見褒美勿自以為有徳美當敬於事無怠惰也公卿大夫其朂焉師古曰朂勉也減天下口錢赦殊死以下賜民爵一級女子百戸牛酒大酺五日加賜鰥寡孤獨髙年帛置西河北地屬國以處匈奴降者四年春正月廣陵王胥有罪自殺匈奴單于稱臣遣弟谷蠡王入侍服䖍曰谷音鹿韋昭曰蠡音如鹿反師古曰谷服音是也蠡音洛奚反以邉塞亡寇減戍卒什二大司農中丞耿夀昌奏設常平倉以給北邉應劭曰夀昌奏令邉郡榖賤時増價而糴穀貴時減價而糶名曰常平倉見食貨志省轉漕賜爵關内侯夏四月辛丑晦日有蝕之詔曰皇天見異以戒朕躬是朕之不逮吏之不稱也師古曰稱副也以前使使者問民所疾苦復遣丞相御史掾二十四人循行天下師古曰行音下更反舉寃獄察擅為苛禁深刻不改者甘露元年春正月行幸甘泉郊泰畤匈奴呼韓邪單于遣子右賢王銖婁渠堂入侍師古曰銖音殊婁音力于反二月丁巳大司馬車騎將軍延夀薨文穎曰許延夀夏四月黄龍見新豐丙申太上皇廟火甲辰孝文廟火上素服五日冬匈奴單于遣弟左賢王来朝賀二年春正月立皇子囂為定陶王師古曰囂音敖詔曰廼者鳳皇甘露降集黄龍登興醴泉滂流枯槁榮茂師古曰槁音口老反神光並見咸受禎祥師古曰禎正也祥福也禎音貞其赦天下減民算三十師古曰一算減錢三十也賜諸侯王丞相將軍列侯中二千石金錢各有差賜民爵一級女子百户牛酒鰥寡孤獨髙年帛夏四月遣䕶軍都尉禄將兵擊珠崖秋九月立皇子宇為東平王冬十二月行幸萯陽宫應劭曰宫在鄠秦文王所起伏儼曰在扶風李斐曰萯音倍師古曰應說李音是也屬玉觀服䖍曰以玉飾因名焉在扶風李竒曰屬玉音鸑鷟其上有此鳥因以為名晋灼曰屬玉水鳥似鵁鶄以名觀也師古曰晋灼是也屬音之欲反匈奴呼韓邪單于款五原塞師古曰款叩也願奉國珍朝三年正月師古曰欲於甘露三年正月行朝禮詔有司議咸曰聖王之制施徳行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截文穎曰遂徧也發行也言契能使其民率禮不越法度徧承視其教令奉順而行也相土契孫也烈烈威也截整齊也威武之盛烈烈然四海之外率服整齊也師古曰此商頌長發之詩陛下聖徳充塞天地光被四表師古曰四表四方之外也匈奴單于鄉風慕義師古曰鄉讀曰嚮舉國同心奉珍朝賀自古未之有也單于非正朔所加王者所客也禮儀宜如諸侯王稱臣昧死再拜位次諸侯王下詔曰蓋聞五帝三王禮所不施不及以政師古曰言荒外之人非禮所設者政刑亦不及今匈奴單于稱北藩臣朝正月朕之不逮徳不能𢎞覆其以客禮待之位在諸侯王上三年春正月行幸甘泉郊泰畤匈奴呼韓邪單于稽侯狦來朝應劭曰狦音若訕李竒曰音山師古曰稽音古奚反音刪又音先安反贊謁稱藩臣而不名賜以璽綬冠帶衣裳安車駟馬黄金錦繡繒絮使有司道單于師古曰道讀曰𨗳𨗳引也先行就邸長安宿長平上自甘泉宿池陽宫上登長平阪如淳曰阪名也在池陽南上原之阪有長平觀去長安五十里師古曰涇水之南原即今所謂眭城阪也詔單于毋謁師古曰不拜見也其左右當戸之羣皆列觀孟康曰左右當户匈奴官名蠻夷君長王侯迎者數萬人夾道陳上登渭橋咸稱萬嵗單于就邸置酒建章宫饗賜單于觀以珍寳師古曰觀示也二月單于罷歸遣長樂衛尉高昌侯忠晋灼曰功臣表董忠車騎都尉昌晋灼曰韓昌騎都尉虎文穎曰不知姓晋灼曰百官表唯記三輔郡以上若此皆不見姓無從知之將萬六千騎送單于單于居幕南保光禄城孟康曰前光禄徐自為所築城詔北邉振榖食郅支單于逺遁師古曰郅音質匈奴遂定詔曰廼者鳳皇集新蔡羣鳥四面行列皆鄉鳳皇立以萬數師古曰行音胡郎反鄉讀曰嚮其賜汝南太守帛百匹新蔡長吏三老孝弟力田鰥寡孤獨各有差賜民爵二級毋出今年租三月己丑丞相覇薨文穎曰黄霸詔諸儒講五經同異太子太傅蕭望之等平奏其議上親稱制臨決焉廼立梁丘易大小夏侯尚書榖梁春秋博士冬烏孫公主來歸應劭曰楚王女觧憂四年夏廣川王海陽有罪廢遷房陵冬十月丁卯未央宫宣室閣火黄龍元年應劭曰先是黄龍見新豐因以冠元焉師古曰漢注云此年二月黄龍見廣漢郡故改年然則應說非也見新豐者於此五載矣劉攽曰案宣帝率四年改元而郊祀志先言改元甘露其夏黄龍見新豐其下乃云後間嵗改元黄龍然後又云正月復幸甘泉然則宣帝自追用五年前黄龍改元爾若是年黄龍見史官焉得不書漢注未可據也春正月行幸甘泉郊泰畤匈奴呼韓邪單于來朝禮賜如初二月單于歸國詔曰蓋聞上古之治君臣同心舉措曲直各得其所師古曰措置也音千故反是以上下和洽海内康平其徳弗可及已師古曰已語終辭朕既不明數申詔公卿大夫務行寛大師古曰申束也謂約束之順民所疾苦師古曰知所疾苦則順其意也將欲配三王之隆明先帝之徳也今吏或以不禁姦邪為寛大縦釋有罪為不苛或以酷惡為賢皆失其中師古曰中音竹仲反奉詔宣化如此豈不繆哉方今天下少事繇役省減兵革不動而民多貧盜賊不止其咎安在上計簿具文而已師古曰雖有其文而實不副也簿音歩户反其下亦同務為欺謾以避其課師古曰謾誑言也音慢又音莫連反三公不以為意朕將何任師古曰言無所委任諸請詔省卒徒自給者皆止應劭曰時有請云詔使出者省卒徒以其直自給不復取稟假雖有進入於官非舊章也故絶之張晏曰先是武帝以用度不足宜有以益官者或奉使求不受奉禄自省其徒衆以取其禀者或自給於是姦吏縁以為利所得多於本禄故絶之如淳曰是時有所省卒徒而羣臣有請之以自給官府者先時聴與之今更悔之不復聴也師古曰應張二說是也御史察計簿疑非實者按之使眞偽毋相亂三月有星孛于王良閣道入紫宫蘇林曰皆星名夏四月詔曰舉亷吏誠欲得其真也吏六百石位大夫有罪先請秩禄上通足以效其賢材自今以來毋得舉韋昭曰吏六百石者不得復舉為㢘吏也冬十二月甲戌帝崩于未央宫臣瓉曰帝年十八即位即位二十五年夀四十三癸巳尊皇太后曰太皇太后師古曰於此已書尊太皇太后而元紀之首又重書之然尊太皇太后及皇太后宜同一時則元紀為是而此紀誤重之贊曰孝宣之治信賞必罰師古曰有功必賞有罪必罰綜核名實政事文學法理之士咸精其能至于技巧工匠器械自元成間鮮能及之師古曰械者器之總名也一曰有盛為械無盛為器鮮少也言少有能及之者鮮音先踐反亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存李竒曰推亡者若紂為無道天下苦之有滅亡之形周武遂推而敝之固存者譬如鄰國以道涖民上下一心勢必能存因就而堅固之今匈奴内自奮争有事故宣帝能朝呼韓邪而固存之走郅支單于使逺遁是謂推亡也師古曰尚書仲虺之誥曰推亡固存邦乃其昌言有亡道者則推而滅之有存道者則輔而固之王者如此國乃昌盛故此賛引之信威北夷師古曰信讀為申古通用字一說恩信及威並著北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔徳殷宗周宣矣師古曰侔等殷之高宗及周宣王也前漢書卷八前漢書卷八考證宣帝紀内謁者令郭穰注劉攽曰謁字衍臣召南按丙吉傳亦作内謁者未必兩文並訛且據百官表謁者署與内者署並屬少府謁字或非衍也皇太后歸長樂宫胡三省曰漢太后常居長樂宫皇太后自昌邑之廢居未央宫今宣帝既立復居長樂宫也自左更至五大夫劉攽曰緣王即位九侯率已為關内侯矣臣召南按兩句俱有訛字宣帝以庶人封侯即帝位並未為王也九侯二字尤不可觧據前文自田廣明以下新封五侯而已以文義推之應作緣帝即位九卿率已為關内侯即指上文之右扶風徳典屬國武廷尉光宗正徳大鴻臚賢等也秋七月詔立燕刺王太子建為廣陽王云云臣召南按封廣陽王表作五月封廣陵王表作十月下有司皆自殺注田千秋子也臣召南按廣明與順皆姓田而順則千秋子也句上應有順字各夲俱誤脱耳鳳皇集魯郡臣召南按魯是時尚為國不得稱郡通鑑但云集魯可謂至慎其罷車騎將軍右將軍屯兵臣召南按此罷兩將軍之屯兵非罷將軍官也是時車騎將軍為張安世右將軍為霍禹帝此舉以收霍氏權柄耳復高皇帝功臣云云通鑑考異曰功臣表詔復家者皆云元康四年其數非一不容盡訛盖紀訛耳其益吏百石以下奉十五通鑑考異曰荀恱漢紀云益吏百石以下俸五十斛盖以十五難曉故改之然詔云以下恐難指五十斛也平通侯楊惲坐前為光禄勲云云臣召南按惲之死在四年此時但與戴長樂相告免官耳通鑑考異已辨此條之誤丙申太上皇廟火甲辰孝文廟火臣照按兩火字並應是灾字左傳曰火人火之也倘係人火之必記事實故知並是灾字之訛四年未央宫宣室閣火亦然遣䕶軍都尉禄將兵擊珠崖珠崖前後文俱作厓前漢書卷八考證
