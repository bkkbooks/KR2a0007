body:
  text: 前漢書卷四十二漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注張周趙任申屠傳第十二張蒼陽武人也好書律歴秦時為御史主柱下方書如淳曰方板也謂事在板上者也秦置柱下史蒼為御史主其事或曰主四方文書也師古曰下云蒼自秦時為柱下御史明習天下圖書計籍則主四方文書是也柱下居殿柱之下若今侍立御史矣有罪亡歸及沛公畧地過陽武蒼以客從攻南陽蒼當斬解衣伏質師古曰質鍖也身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬遂西入武闗至咸陽沛公立為漢王入漢中還定三秦陳餘擊走常山王張耳耳歸漢漢以蒼為常山守從韓信擊趙蒼得陳餘趙地已平漢王以蒼為代相備邊㓂已而徙為趙相相趙王耳耳卒相其子敖復徙相代燕王臧荼反蒼以代相從攻荼有功封為北平侯食邑千二百户遷為計相文穎曰以能計故號曰計相師古曰専主計籍故號計相一月更以列侯為主計四歲張晏曰以列侯典校郡國簿書如淳曰以其所主因以為官號與計相同時所卒立非久施也師古曰去計相之名更號主計劉攽曰四嵗字本在黥布反上誤書在此宋祁曰浙本一月作三月是時蕭何為相國而蒼乃自秦時為柱下御史明習天下圖書計籍又善用算律歴故令蒼以列侯居相府領主郡國上計者黥布反漢立皇子長為淮南王而蒼相之十四年遷為御史大夫周昌者沛人也其從兄苛師古曰苛音何秦時皆為泗水卒史及高祖起沛擊破泗水守監於是苛昌自卒史從沛公宋祁曰越本自作以校改以作自沛公以昌為職志應劭曰掌主職也鄭氏曰主旗志也師古曰志與幟同音式異反苛為客張晏曰為帳下賓客不掌管也從入闗破秦沛公立為漢王以苛為御史大夫昌為中尉漢三年楚圍漢王滎陽急漢王出去而使苛守滎陽城楚破滎陽城欲令苛將苛罵曰若趣降漢王不然今為虜矣師古曰若汝也趣讀曰促項羽怒亨苛漢王於是拜昌為御史大夫常從擊破項籍六年與蕭曹等俱封為汾陰侯苛子成以父死事封為高景侯昌為人强力敢直言自蕭曹等皆卑下之師古曰下音胡駕反昌嘗燕入奏事孟康曰以上宴時入奏事師古曰燕謂安閑之居也高帝方擁戚姬師古曰擁抱也昌還走師古曰還謂却退也高帝逐得騎昌項上問曰我何如主也昌仰曰陛下即桀紂之主也於是上笑之然尤憚昌及高帝欲廢太子而立戚姬子如意為太子大臣固爭莫能得上以留侯策止而昌庭爭之强上問其説昌為人吃師古曰吃言之難也又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔師古曰以口吃故每重言期期劉攽曰期讀如荀子曰欲綦色之綦楚人謂極為綦宋祁曰學官本云臣口不能言然臣期期知其不可浙本然心知期期不可陛下欲廢太子臣期期不奉詔予据此則前之二吃作其後之二吃乃可為期耳若云臣期知其不可又了無意矣又顔注文元無每字上欣然而笑即罷呂后側耳於東箱聽師古曰正寢之東西室皆曰箱言似箱篋之形見昌為跪謝曰微君太子幾廢師古曰微無也幾音鉅依反是歲戚姬子如意為趙王年十歲高祖憂萬歲之後不全也趙堯為符璽御史趙人方與公孟康曰方與縣名公其號也師古曰音房豫謂御史大夫周昌曰君之史趙堯年雖少然奇士君必異之是且代君之位昌笑曰堯年少刀筆吏耳何至是乎居頃之堯侍高祖高祖獨心不樂悲歌羣臣不知上所以然堯進請問曰宋祁曰問疑作間陛下所為不樂非以趙王年少而戚夫人與呂后有隙備萬歲之後而趙王不能自全乎高祖曰我私憂之不知所出師古曰不知計所出堯曰陛下獨為趙王置貴彊相及呂后太子羣臣素所敬憚者乃可高祖曰然吾念之欲如是而羣臣誰可者堯曰御史大夫昌其人堅忍伉直自呂后太子及大臣皆素嚴憚之獨昌可高祖曰善於是召昌謂曰吾固欲煩公師古曰固必也言必欲勞煩公公彊為我相趙師古曰彊音其兩反以下亦同昌泣曰臣初起從陛下陛下獨奈何中道而棄之於諸侯乎高祖曰吾極知其左遷師古曰是時尊右而卑左故謂貶秩任為左遷佗皆類此然吾私憂趙念非公無可者公不得己彊行師古曰已止也於是徙御史大夫昌為趙相既行久之高祖持御史大夫印弄之曰誰可以為御史大夫者孰視堯曰無以易堯師古曰堯可為之餘人不能勝也易代也遂拜堯為御史大夫堯亦前有軍功食邑及以御史大夫從擊陳豨有功封為江邑侯高祖崩太后使使召趙王其相昌令王稱疾不行使者三反昌曰高帝屬臣趙王師古曰屬委也音之欲反王年少竊聞太后怨戚夫人欲召趙王并誅之臣不敢遣王王且亦疾不能奉詔太后怒廼使使召趙相相至謁太后太后罵昌曰爾不知我之怨戚氏乎而不遣趙王昌既被徵高后使使召趙王王果來至長安月餘見鴆殺昌謝病不朝見三歲而薨諡曰悼侯傳子至孫意有罪國除景帝復封昌孫左車為安陽侯有罪國除初趙堯既代周昌為御史大夫高祖崩事惠帝終世高后元年怨堯前定趙王如意之畫師古曰畫謂畫䇿令周昌為相乃扺堯罪以廣阿侯任敖為御史大夫任敖沛人也少為獄吏高祖嘗避吏吏繫呂后遇之不謹任敖素善髙祖怒擊傷主呂后吏及高祖初起敖以客從為御史守豐二歲高祖立為漢王東擊項羽敖遷為上黨守陳豨反敖堅守封為廣阿侯食邑千八百户高后時為御史大夫三歲免孝文元年薨諡曰懿侯傳子至曾孫越人坐為太常廟酒酸不敬國除初任敖免平陽侯曹窋代敖為御史大夫師古曰窋音竹律反高后崩與大臣共誅諸呂後坐事免以淮南相張蒼為御史大夫蒼與絳侯等尊立孝文皇帝四年代灌嬰為丞相漢興二十餘年天下初定公卿皆軍吏蒼為計相時緒正律歴文穎曰緒尋也謂本其統緒而正之以高祖十月始至霸上故因秦時本十月為歲首不革師古曰革改也推五德之運以為漢當水德之時上黑如故吹律調樂入之音聲及以比定律令如淳曰比音比次之比謂五音清濁各有所比不相錯入以定十二律之法令於樂官使長行之或曰謂比方之比音必履反臣瓚曰謂以比故取類以定法律與條令也師古曰依如氏之説比音頻二反若百工天下作程品如淳曰若順也百工為噐物皆有尺寸斤兩斛斗輕重之宜使得其法此之謂順晉灼曰若豫及之辭師古曰言次律調音以定法令及百工程品皆取則也若晉説是也至於為丞相卒就之師古曰卒終也就成也故漢家言律歴者本張蒼蒼尤好書凡宋祁曰學官本尤作凡注不音陽夏公謂當從若從尤則師古當音好字作去聲浙本凡作尤無所不觀無所不通而尤邃律歴師古曰䆳深也音先遂反蒼德安國侯王陵師古曰以救其死刑故也及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食然後敢歸家蒼為丞相十餘年魯人公孫臣上書陳終始五德傳師古曰傳謂傳次也音直戀反言漢土德時其符黄龍見當改正朔易服色事下蒼蒼以為非是罷之其後黃龍見成紀於是文帝召公孫臣以為博士草立土德時歴制度張晏曰以秦水德漢土勝之晉灼曰草創始也更元年蒼由此自詘宋祁曰一作絀謝病稱老蒼任人為中候張晏曰所選舉保任也按中候官名師古曰蒼有所保舉而其人為中候之官大為姦利上以為讓師古曰用此事責蒼蒼遂病免孝景五年薨諡曰文侯傳國至孫類有罪國除初蒼父長不滿五尺蒼長八尺餘蒼子復長八尺及孫類長六尺餘蒼免相後口中無齒食乳女子為乳母師古曰言每就飲之妻妾以百數嘗孕者不復幸年百餘歲廼卒著書十八篇言陰陽律歴事申屠嘉梁人也以材官蹶張如淳曰材官之多力能脚踏彊弩張之故曰蹶張律有蹶張士師古曰今之弩以手張者曰擘張以足蹋者曰蹶張蹶音厥擘音布麥反從高帝擊項籍遷為隊率師古曰一隊之率也音所類反從擊黥布為都尉孝惠時為淮陽守孝文元年舉故以二千石從高祖者悉以為闗内侯食邑二十四人而嘉食邑五百户十六年遷為御史大夫張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國久念不可而高帝時大臣餘見無可者師古曰見謂見在之人乃以御史大夫嘉為丞相因故邑封為故安侯嘉為人廉直門不受私謁是時太中大夫鄧通方愛幸賞賜累鉅萬文帝常燕飲通家其見寵如是宋祁曰越本無見字是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅師古曰肅敬也上曰君勿言吾私之師古曰言欲私敎戒之罷朝坐府中嘉為檄召通詣丞相府師古曰檄木書也長二尺不來且斬通通恐入言上上曰汝第往師古曰第但也吾今使人召若師古曰若亦汝也通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如師古曰如其故弗為禮責曰夫朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬史今行斬之如淳曰嘉語其史曰今便行斬之通頓首首盡出血不解上度丞相已困通師古曰度音徒各反使使持節召通而謝丞相此吾弄臣君釋之宋祁曰浙本此字上有曰字君字下有其字鄧通既至為上泣曰丞相幾殺臣師古曰幾音巨依反嘉為丞相五歲文帝崩孝景即位二年鼂錯為内史貴幸用事諸法令多所請變更議以適罰侵削諸侯師古曰適讀曰謫而丞相嘉自絀師古曰絀退也所言不用疾錯錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣也服䖍曰宮外垣餘地也如淳曰堧音畏懦之懦師古曰堧音如椽反觧在食貨志嘉聞錯穿宗廟垣為奏請誅錯客有語錯錯恐夜入宮上謁自歸上師古曰歸首於天子至朝嘉請誅内史錯上曰錯所穿非真廟垣乃外堧垣故冗官居其中師古曰冗謂散輩也如今之散官音如勇反且又我使為之錯無罪罷朝嘉謂長史曰吾悔不先斬錯乃請之師古曰言先斬而後奏為錯所賣至舍因歐血而死諡曰節侯傳子至孫臾有罪國除自嘉死後開封侯陶青桃侯劉舍及武帝時柏至侯許昌平棘侯薛澤武彊侯莊青翟商陵侯趙周皆以列侯繼踵􅐅􅐅廉謹師古曰􅐅􅐅持整之貌也􅐅音初角反為丞相備員而已無所能發明功名著於世者贊曰張蒼文好律歴為漢名相師古曰文好律歴猶言名為好律歴也而專遵用秦之顓頊歴何哉張晏曰不考經典專用顓頊歴何哉師古曰何哉何為其然哉周昌木强人也師古曰言其強質如木石然强音其兩反任敖以舊德用張晏曰謂傷辱呂后吏申屠嘉可謂剛毅守節然無術學殆與蕭曹陳平異矣師古曰殆近也言其識見不如蕭曺等也前漢書卷四十二前漢書巻四十二考證張蒼傳秦時為御史主柱下方書注若今侍立御史矣臣召南按柱下史本周制而秦因之老子在周為柱下史是也沈約宋志曰侍御史於周為柱下史師古注若今侍立御史矣立字似衍文唐制侍御史六人周昌傳臣期期不奉詔劉攽曰楚人謂極為綦胡三省曰孔穎逹疏釋詁􅠟汔也杜預云汔期也然則期字雖别皆是近義言其近當如此史記周昌云云意亦與汔同任敖傳平陽侯窋至與大臣共誅諸呂後坐事免臣召南按史記作窋不與大臣共誅呂禄等免以高后紀核之窋行御史大夫事郎中令賈壽以灌嬰及齊楚合從告相國産也窋即以其語馳告丞相太尉及呂禄已去北軍相國産欲入未央宮作亂窋復馳語太尉則窋固非不與大臣共謀誅諸呂者也但代邸上議羣臣列名即云御史大夫臣蒼則孝文未立之時窋已罷官矣其後賞功又不及窋意者史記所云固得其實乎不然即不與太尉丞相較功亦當與襄平典客共賞矣申屠嘉傳因故邑封為故安侯臣召南按故安縣屬涿郡漢初丞相俱以功臣已封列侯者為之嘉本功臣而由闗内侯為相則破格之事也後因丞相封侯遂起於此前漢書巻四十二考證
