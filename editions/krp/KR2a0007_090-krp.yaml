body:
  text: 前漢書卷九十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注酷吏傳第六十孔子曰導之以政齊之以刑民免而無耻導之以徳齊之以禮有耻且格師古曰論語載孔子之言也格至也謂御以政刑則人思茍免不耻於惡化以徳禮則下知愧辱而至於治也宋祁曰注文不耻景本作不止刋誤作不耻老氏稱上徳不徳是以有徳下徳不失徳是以無徳法令滋章盗賊多有師古曰老子徳經之言也上徳體合自然是以為徳下徳務於修建更以䘮之法令繁則巧詐益起故多盗賊也宋祁曰注文繁字下疑有滋字信哉是言也法令者治之具而非制治清濁之源也師古曰言為治之體亦須法令而法令非治之本昔天下之罔嘗宻矣師古曰謂秦時然姦軌愈起其極也上下相遁至於不振師古曰遁避也言吏避於君民避於吏至乎䘮敗不可振救也當是之時吏治若救火揚沸師古曰言廹急也本敝不除則其末難正非武健嚴酷惡能勝其任而媮快乎師古曰惡讀曰烏烏於何也媮茍且也言道徳者溺於職矣師古曰溺謂沉滯而不舉也故曰聽訟吾猶人也必也使無訟乎師古曰論語載孔子之辭也言使我聽獄訟猶凡人耳然而立政施徳則能使其絶於爭訟下士聞道大笑之師古曰老子道經之言也大道𤣥深非其所及故致笑也非虛言也漢興破觚而為圜斵琱而為樸孟康曰觚方也師古曰去嚴刑而從簡易抑巧偽而務敦厚也琱謂刻鏤也字與雕同號為罔漏吞舟之魚師古曰言其疏也而吏治蒸蒸不至於姦師古曰蒸蒸純壹之貌也黎民艾安師古曰黎衆也艾讀曰乂乂治也由是觀之在彼不在此師古曰言不在於嚴酷也高后時酷吏獨有侯封刻轢宗室侵辱功臣師古曰轢謂陵踐也音來的反宋祁曰轢當音來各反吕氏已敗遂夷侯封之家師古曰夷除也孝景時鼂錯以刻深頗用術輔其資師古曰資材也而七國之亂發怒於錯錯卒被戮師古曰卒終也其後有郅都寗成之倫師古曰郅音之日反郅都河東大陽人也以郎事文帝景帝時為中郎將敢直諫面折大臣於朝嘗從入上林賈姬在厠師古曰賈姬即賈夫人生趙敬肅王彭祖中山靖王勝者野彘入厠上目都師古曰動目以使也都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧姬等邪陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞之賜都金百斤上亦賜金百斤由此重都濟南瞷氏宗人三百餘家豪猾應劭曰瞷音馬瞷眼之瞷師古曰音閑蕭該音義曰案爾雅馬一目白曰瞷音閑宋祁曰姚本刪注中一瞷字二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股栗師古曰言懼之甚至於股脚戰栗也居歲餘郡中不拾遺旁十餘郡守畏都如大府師古曰言猶如統屬之也都為人勇有氣公亷不發私書問遺無所受請寄無所聽常稱曰已背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條侯至貴居也師古曰居怠傲讀與倨同而都揖丞相是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹師古曰言其鷙擊之甚臨江王徵詣中尉府對簿師古曰簿者獄辭之文書也音歩户反臨江王欲得刀筆為書謝上師古曰刀所以削治書也古者書於簡牘故筆用刀焉而都禁吏弗與魏其侯使人間予臨江王師古曰伺間隙而私與也臨江王既得為書謝上因自殺竇太后聞之怒以危法中都師古曰謂搆成其罪也中音竹仲反次下亦同都免歸家景帝廼使使即拜都為鴈門太守師古曰就家拜之便道之官師古曰不令至闕陳謝也得以便宜從事匈奴素聞郅都節舉邊為引兵去竟都死不近鴈門匈奴至為偶人象都師古曰以木為人象都之形也偶對也令騎馳射莫能中其見憚如此匈奴患之乃中都以漢法景帝曰都忠臣欲釋之師古曰釋置也觧也謂放免也竇太后曰臨江王獨非忠臣乎於是斬都也宋祁曰傳末也字當刪寗成南陽穰人也以郎謁者事景帝好氣為少吏宋祁曰淳化本越本少作小據史館本作少今兩存之必陵其長吏為人上操下急如束濕師古曰操執持也束濕言其急之甚也濕物則易束操音千高反猾賊任威稍遷至濟南都尉而郅都為守始前數都尉歩入府因吏謁守如縣令其畏都如此及成徃直凌都出其上都素聞其聲善遇與結驩乆之都死後長安左右宗室多犯法師古曰長安左右京邑之中也上召成為中尉其治效郅都其廉弗如然宗室豪桀人皆惴恐師古曰惴戰栗也人人皆戰恐也惴音之瑞反武帝即位徙為内史外戚多毁成之短抵罪髠鉗是時九卿死即死少被刑而成刑極自以為不復收如淳曰以被重刑将不復見收用也師古曰刑極者言殘毁之重也廼觧脱詐刻傳出闗歸家師古曰輙觧脱鉗釱而亡去也傳所以出闗之符也音張戀反稱曰仕不至二千石賈不至千萬安可比人乎師古曰賈謂販賣之廼貰貣陂田千餘頃師古曰貰貣假取之也貣音吐得反假貧民役使數千家師古曰假謂雇賃也數年㑹赦致産數千萬為任俠持吏長短出從數十騎其使民威重於郡守周陽由其父趙兼以淮南王舅侯周陽師古曰封為周陽侯故因氏焉師古曰遂改趙姓而為周陽也由以宗家任為郎事文帝景帝時由為郡守武帝即位吏治尚修謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之師古曰撓亦屈曲也音女教反所居郡必夷其豪師古曰平除之宋祁曰豪字下當有桀字為守視都尉如令為都尉陵太守奪之治汲黯為忮師古曰忮意堅也音章豉反宋祁曰韋昭曰忮音洎字書之豉反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵馮師古曰茵車中蓐也馮車中所馮者也言此二人皆下讓由故同車之時自處其偏側不均敵也馮讀曰凭宋祁曰茵亦作鞇霍光傳作絪晉灼音義作鞇字亦音因後由為河東都尉與其守勝屠公争權相告言師古曰勝屠姓也勝屠公當抵罪議不受刑自殺劉敞曰議當作義而由弃市自寗成周陽由之後事益多民巧法大抵吏治類多成由等矣師古曰大抵大歸也音丁禮反趙禹斄人也師古曰斄讀曰邰扶風縣也音胎以佐史補中都官師古曰京師諸官為吏也宋祁曰淳化本史作吏刋誤據史館本改作史注文師古曰下當有於字用廉為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害師古曰無害言無人能勝之者劉奉世曰足以知謂廉平之類為無害也然文深應劭曰禹持文法深刻不可以居大府武帝時禹以刀筆吏積勞遷為御史上以為能至中大夫與張湯論定律令作見知吏傳相監司以法盡自此始禹為人廉裾師古曰裾亦傲也讀與倨同為史以來舎無食客公卿相造請師古曰造音千到反禹終不行報謝務在絶知友賔客之請師古曰以此意告報公卿劉敞曰報謝當屬上句言公卿造請禹而禹終不詣之孤立行一意而已見法輒取亦不覆案求官屬隂罪師古曰不見知者無所捜求也嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王温舒等後起治峻禹禹以老徙為燕相宋祁曰老字上當有先字數歳誖亂有罪免歸師古曰誖惑也言其心意昏惑也誖音布内反後十餘年以壽卒於家義縱河東人也少年時常與張次公俱攻剽為羣盗師古曰剽刼也音頻妙反縱有姊以醫幸王太后師古曰武帝母太后問有子兄弟為官者乎姊曰有弟無行不可宋祁曰校本改時作行太后廼告上上拜義姁弟縱為中郎孟康曰姁縱姊名也師古曰姁音許于反蕭該音義曰姁音熈主反韋昭音同李竒音呼補上黨郡中令治敢徃少温籍服䖍曰敢行暴虐之政師古曰少温籍言無所含容也温音於問反籍音才夜反縣無逋事師古曰逋亡也負也音必胡反舉第一遷為長陵及長安令直法行治不避貴戚以捕按太后外孫脩成子中師古曰修成君王太后所生金氏女也中者其子名也讀曰仲上以為能遷為河内都尉至則族滅其豪穰氏之屬河内道不拾遺而張次公亦為郎以勇悍從軍師古曰悍音胡旦反敢深入有功封為岸頭侯寗成家居上欲以為郡守御史大夫𢎞曰師古曰公孫𢎞臣居山東為小吏時宋祁曰小或作少寗成為濟南都尉其治如狼牧羊成不可令治民上廼拜成為闗都尉嵗餘闗吏税肄郡國出入闗者蘓林曰税音伐閲之閲李竒曰肄閲也師古曰肄音弋二反號曰寧見乳虎無直寗成之怒師古曰猛獸産乳養䕶其子則搏噬過常故以喻也直讀曰值一曰直當其暴如此義縱自河内遷為南陽太守聞寗成家居南陽及至闗寗成側行送迎然縱氣盛弗為禮至郡遂按寗氏破碎其家成坐有罪及孔暴之屬皆奔亡南陽師古曰孔氏暴氏二家素豪猾者吏民重足一迹劉攽曰南陽屬下句而平氏朱彊杜衍杜周為縱爪牙之吏任用師古曰平氏杜衍二縣名也遷為廷尉史軍數出定襄定襄吏民亂敗於是徙縱為定襄太守縱至掩定襄獄中重罪二百餘人及賔客昆弟私入相視者亦二百餘人縱壹切捕鞠曰為死罪觧脱服䖍曰一切皆捕之也律諸囚徒私觧脱桎梏鉗赭加罪一等為人觧脱與同罪縱鞠相賂餉者二百人以為觧脱死罪盡殺之師古曰鞠窮也謂窮治也是日皆報殺四百餘人師古曰奏請得報而論殺劉敞曰縱掩定襄獄一切捕鞠而云是日皆報殺則非奏請報可之報矣然則以論決為報郡中不寒而栗猾民佐吏為治師古曰百姓有素豪猾為罪惡者今畏縱之嚴反為吏耳目助治公務以自效是時趙禹張湯為九卿矣然其治尚寛輔法而行縱以鷹擊毛摰為治師古曰言如鷹隼之擊奮毛羽執取飛鳥也後㑹更五銖錢白金起師右曰更改也民為姦京師尤甚廼以縱為右内史王溫舒為中尉温舒至惡所為弗先言縱縱必以氣陵之師古曰言温舒雖酷惡而縱又甚也敗壊其功其治所誅殺甚多然取為小治姦益不勝晉灼曰取音趣直指始出矣吏之治以斬殺縛束為務閻奉以惡用矣師古曰閻奉以嚴惡之故而見任用言時政尚急刻也縱廉其治效郅都上幸鼎湖病乆已而卒起幸甘泉師古曰已為病愈也言帝乆病既得愈而忽然即幸甘泉卒讀曰猝道不治上怒曰縱以我為不行此道乎銜之師古曰銜含也包含在心以為過也至冬楊可方受告緡縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事孟康曰武帝使楊可主告緡没入其財物縱捕為可使者此為廢格詔書沮已成之事也師古曰沮壊也音材汝反格讀曰閣弃縱市後一歲張湯亦死王溫舒陽陵人也少時椎埋為姦師古曰椎殺人而埋之椎音直追反其字從木已而試縣亭長師古曰試補也數廢數為吏以治獄至廷尉史事張湯遷為御史督盗賊殺傷甚多稍遷至廣平都尉擇郡中豪敢徃吏十餘人為爪牙師古曰豪傑而性果敢一徃無所顧者以為吏也宋祁曰豪字下當有桀字皆把其隂重罪師古曰把音布馬反而縱使督盗賊師古曰縱放也督察視也快其意所欲得此人雖有百罪弗法師古曰言所捕盗賊得其人而快温舒意者則不問其先所犯罪也法謂行法也即有避回夷之亦滅宗師古曰避回謂不盡意捕擊也回音胡内反以故齊趙之郊盗不敢近廣平廣平聲為道不拾遺上聞遷為河内太守素居廣平時皆知河内豪姦之家及徃以九月至令郡具私馬五十疋為驛自河内至長安師古曰以私馬於道上徃徃置驛也部吏如居廣平時方畧捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡没入償臧師古曰以臧致罪者既没入之又令出倍臧或收入官或還其主也奏行不過二曰得可事論報至流血十餘里師古曰天子可其奏而論决之殺人既多故血流十餘里劉敞曰騐此可與報益異矣河内皆怪其奏以為神速盡十二月郡中無犬吠之盗其頗不得失之旁郡追求㑹春温舒頓足嘆曰嗟乎令冬月益展一月足吾事矣師古曰立春之後不復行刑故云然展伸也其好殺行威不愛人如此上聞之以為能遷為中尉其治復放河内師古曰放依也音甫徃反徒請召猜禍吏與從事應劭曰徒但也猜疑也取吏好猜疑作旤害者任用之河内則揚皆麻戊闗中楊贛成信等師古曰此皆猜旤者義縱為内史憚之未敢恣治師古曰言温舒憚縱不得恣其酷暴宋祁曰或無治字及縱死張湯敗後徙為廷尉而尹齊為中尉坐法抵罪温舒復為中尉為人少文居它惛惛不辯師古曰言為餘官則心意䝉蔽職事不舉惛音昏至於中尉則心開素習闗中俗知豪惡吏豪惡吏盡復為用吏苛察淫惡少年投銗購告言姦師古曰銗所以受投書也音項觧在趙廣漢傳置伯落長以收司姦師古曰伯亦長帥之稱也置伯及邑落之長以收捕司察姦人也温舒多謟善事有埶者即無埶視之如奴有埶家雖有姦如山弗犯無埶雖貴戚必侵辱師古曰謂不居權要之職者舞文巧請下戸之猾以動大豪師古曰弄法為巧而治下户之狡猾者用諷動大豪之家所以然者為大豪中有權要不可治故也請謂奏請其治中尉如此姦猾窮治大氐盡靡爛獄中師古曰大氐大歸也靡碎也氐音丁禮反靡音武皮反行論無出者其爪牙吏虎而冠師古曰言其殘暴之甚也非有人情於是中尉部中中猾以下皆伏有埶者為遊聲譽稱治數歳其吏多以權貴富師古曰謂權貴之家所擁佑故積受取致富者也温舒擊東越還議有不中意師古曰不當天子意也中音竹仲反坐以法免是時上方欲作通天臺而未有人温舒請覆中尉脱卒得數萬人作師古曰覆校脱漏未為卒者也脱音它活反上説師古曰説讀曰悦拜為少府徙右内史治如其故姦邪少禁坐法失官復為右輔行中尉如故操歳餘㑹宛軍發孟康曰𤼵兵伐大宛詔徵豪吏温舒匿其吏華成及人有變告温舒受員騎錢它姦利事罪至族自殺師古曰員騎騎之有正員也其時兩弟及兩婚家亦各自坐它罪而族光禄勲徐自為曰悲夫夫古有三族而王温舒罪至同時而五族乎師古曰温舒與弟同三族而兩妻家各一故為五也温舒死家絫千金師古曰絫古累字尹齊東郡茌平人也師古曰茌音仕疑反宋祁曰韋昭音鯔字林曰茌草亦盛也以刀筆吏稍遷至御史事張湯湯數稱以為廉武帝使督盗賊斬伐不避貴埶遷闗都尉聲甚於寗成上以為能拜為中尉吏民益彫敝輕齊木彊少文師古曰木質也言如木石之為也豪惡吏伏匿而善吏不能為治師古曰惡吏不肯為用獨善吏在故不能治事也以故事多廢抵罪師古曰以職事多廢故至於坐罪也後復為淮陽都尉王温舒敗後數年病死家直不滿五十金所誅滅淮陽甚多及死仇家欲燒其尸妻亡去歸𦵏楊僕宜陽人也以千夫為吏孟康曰千夫若五大夫武帝以軍用不足令民出錢穀為之師古曰所謂武功賞官以寵戰士河南守舉為御史使督盗賊宋祁曰越本守作辟闗東治放尹齊韋昭曰放依也音甫徃反以敢擊行師古曰果敢搏撃而行其治也稍遷至主爵都尉上以為能南越反拜為樓船將軍有功封將梁侯東越反上欲復使將為其伐前勞師古曰伐謂矜恃也以書勅責之曰將軍之功獨有先破石門尋陿劉徳曰南越中險地名也宋祁曰陿或作阻非有斬將騫旗之實也師古曰騫與搴同騫㧞取之也烏足以驕人哉師古曰烏於何也前破番禺捕降者以為虜掘死人以為獲是一過也建徳吕嘉逆罪不容於天下師古曰建徳南越王名也尉佗𤣥孫也吕嘉其相也將軍擁精兵不窮追超然以東越為援是二過也師古曰以僕不窮追之故令建徳得以東越為援也士卒暴露連嵗為朝㑹不置酒宋祁曰嵗字下當有朕字將軍不念其勤勞而造佞巧請乘傳行塞師古曰傳音張戀反行音下更反因用歸家懐銀黄垂三組夸鄉里是三過也師古曰銀銀印也黄金印也僕為主爵都尉又為樓船將軍并將梁侯三印故三組也組印綬也先期内顧以道惡為觧師古曰内顧言思妻妾也觧謂自觧説也若今言分疏失尊尊之序是四過也欲請蜀刀問君賈幾何對曰率數百孟康曰僕嘗為将請官蜀刀詔問賈答言此率數百也師古曰賈讀曰價宋祁曰注文嘗字疑作當将字下當有行字武庫日出兵而陽不知挾偽干君是五過也師古曰干犯也受詔不至蘭池宫如淳曰本出軍時欲使之蘭池宫頓而不去蘭池宫在渭城明日又不對假令將軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入將軍能率衆以掩過不僕惶恐對曰願盡死贖罪宋祁曰死字下當有以字與王温舒俱破東越後復與左將軍荀彘俱擊朝鮮為彘所縛語在朝鮮傳還免為庶人病死咸宣楊人也師古曰咸音減省之減楊河東之邑以佐史給事河東守衛將軍青使買馬河東師古曰將軍衛青充使而於河東買馬也見宣無害言上徵為廐丞官事辦稍遷至御史及丞宋祁曰淳化本為御史中丞刋誤據史舘本改予依南本添及字使治主父偃及淮南反獄所以微文深詆殺者甚衆師古曰詆誣也稱為敢决疑數廢數起為御史及中丞者幾二十嵗師古曰幾音鉅依反王温舒為中尉而宣為左内史其治米鹽師古曰米鹽細雜也事大小皆闗其手自部署縣名曹寳物官吏令丞弗得擅揺痛以重法繩之居官數年壹切為小治辯然獨宣以小治大能自行之難以為經師古曰經常也不可為常法也中廢為右扶風坐怒其吏成信信亡藏上林中宣使郿令將吏卒師古曰郿扶風縣也音媚䦨入上林中蠶室門攻亭格殺信射中苑門師古曰中音竹仲反宣下吏為大逆當族自殺而杜周任用是時郡守尉諸侯相二千石欲為治者大抵盡效王温舒等而吏民益輕犯法盗賊滋起師古曰滋亦益也南陽有梅免百政師古曰梅百皆姓也楚有叚中杜少師古曰中讀曰仲齊有徐勃燕趙之間有堅盧范主之屬鄧展曰延篤讀堅曰甄晉灼曰音近甄城字書已先反大羣至數千人擅自號攻城邑庫兵釋死罪師古曰釋觧也縛辱郡守都尉殺二千石為檄告縣趨具食師古曰趨讀曰促小羣以百數掠鹵鄉里者不可稱數於是上始使御史中丞丞相長史使督之師古曰出為使者督察也猶弗能禁師古曰禁音居禽反乃使光禄大夫范昆諸部都尉及故九卿張徳等衣繡衣持節虎符發兵以興擊師古曰以軍興之法而討擊也斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者數千人數歲廼頗得其渠率師古曰渠大也散卒失亡復聚黨阻山川徃徃而羣無可奈何於是作沈命法應劭曰沈没也敢蔽匿盗賊者没其命也孟康曰沈臧匿也命亡逃也師古曰應説是曰羣盗起不發覺發覺而弗捕滿品者師古曰品率也以人數為率也二千石以下至小吏主者皆死其後小吏畏誅雖有盗弗敢發恐不能得坐課累府府亦使不言孟康曰縣有盗賊府亦并坐使縣不言之也師古曰府郡府也累音力瑞反韋昭曰負累及府府亦使其不言也故盗賊寖多師古曰寖漸也上下相為匿以避文法焉田廣明字子公鄭人也師古曰京兆鄭縣即今之華州以郎為天水司馬功次遷河南都尉以殺伐為治郡國盗賊並起遷廣明為淮陽太守歳餘故城父令公孫勇與客胡倩等謀反師古曰倩音千見反倩詐稱光禄大夫從車騎數十言使督盗賊止陳留傳舎太守謁見欲收取之廣明覺知發兵皆捕斬焉而公孫勇衣繡衣乘駟馬車至圉師古曰陳留圉縣圉使小史侍之亦知其非是守尉魏不害與廐嗇夫江徳尉史蘇昌共收捕之上封不害為當塗侯徳轑陽侯師古曰轑音僚昌蒲侯初四人俱拜於前小史竊言武帝問言何對曰為侯者得東歸不上曰女欲不貴矣師古曰言汝意欲歸不吾今貴汝謂賜之爵也宋祁曰不字當有音疑注脱女鄉名為何對曰名遺鄉上曰用遺汝矣師古曰遺音弋季反於是賜小史爵闗内侯食遺鄉六百户上以廣明連禽大姦徵入為大鴻臚擢廣明兄雲中代為淮陽太守昭帝時廣明將兵擊益州還賜爵闗内侯徙衛尉後出為左馮翊治有能名宣帝初立代蔡義為御史大夫以前為馮翊與議定䇿師古曰與讀曰豫宋祁曰為字下當有左字封昌水侯歲餘以祁連將軍將兵擊匈奴出塞至受降城受降都尉前死䘮柩在堂廣明召其寡妻與姦既出不至質服䖍曰質所期處也宋祁曰韋昭曰所期約誓地蕭該音義質音贄引軍空還下太守杜延年簿責師古曰簿音歩戸反宋祁曰太守姚本作太僕廣明自殺闕下國除兄雲中為淮陽守宋祁曰淮一作灌姚本改作淮亦敢誅殺吏民守闕告之竟坐棄市田延年字子賔先齊諸田也徙陽陵師古曰高祖時徙之其地後為陽陵縣宋祁曰先字上當有其字延年以材略給事大將軍莫府霍光重之遷為長史出為河東太守選㧞尹翁歸等以為爪牙誅鉏豪彊姦邪不敢發以選入為大司農㑹昭帝崩昌邑王嗣立淫亂霍將軍憂懼與公卿議廢之莫敢發言延年按劍廷叱群臣師古曰止於朝廷之中而叱之也若言廷争矣即日議決語在光𫝊宣帝即位延年以決疑定䇿封陽成侯先是茂陵富人焦氏賈氏以數千萬隂積貯炭葦諸下里物孟康曰死者歸蒿里𦵏地下故曰下里師古曰以數千萬錢為本而貯此物也昭帝大行時方上事暴起師古曰方上謂壙中也昭帝暴崩故其事倉猝用度未辦延年奏言商賈或豫收方上不祥器物冀其疾用欲以求利師古曰疾速也非民臣所當為請没入縣官奏可富人亡財者皆怨出錢求延年罪初大司農取民牛車三萬兩為僦師古曰一乘為一兩僦謂賃之與雇直也音子就反宋祁曰服䖍曰雇載曰僦音将秀反載沙便橋下送致方上車直千錢延年上簿詐増僦直車二千凡六千萬盗取其半焦賈兩家告其事下丞相府丞相議奏延年主守盗三千萬不道宋祁曰劉云延年未嘗有酷烈聲而附此傳中何也延年決大議其明勇過雋不疑至詐増僦直是韓延夀比耳劉敞曰議當作義霍將軍召問延年欲為道地師古曰為之開通道路使有安全之地也延年抵曰師古曰抵拒諱也音丁禮反本出將軍之門蒙此爵位師古曰延年嘗給事莫府又為大將軍長史故云然也無有是事光曰即無事當窮竟師古曰既無實事當令有司窮治盡其理御史大夫田廣明謂太僕杜延年春秋之義以功覆過當廢昌邑王時非田子賔之言大事不成今縣官出三千萬自乞之何哉師古曰自謂乞與之也乞音氣宋祁曰江南本作自之徐鍇改自作丐今詳注云自謂乞與之則正文不應云自乞之今兼存願以愚言白大將軍延年言之大將軍大將軍曰誠然實勇士也當發大議時震動朝廷光因舉手自撫心曰使我至今病悸師古曰悸心動也音揆宋祁曰韋昭曰心中喘息曰悸音水季反謝田大夫曉大司農通徃就獄得公議之師古曰曉者告白意指也通者從公家通理也光忿其拒諱故不佑之田大夫使人語延年延年曰幸縣官寛我耳何靣目入牢獄使衆人指笑我卒徒唾吾背乎即閉閤獨居齊舎師古曰齊讀曰齋偏袒持刀東西歩數曰使者召延年詣廷尉聞鼓聲自刎死晉灼曰使者至司農司農𤼵詔書故鳴鼓也師古曰刎謂斷頸也國除嚴延年字次卿東海下邳人也其父為丞相掾延年少學法律丞相府歸為郡吏以選除補御史掾舉侍御史是時大將軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立亡人臣禮不道宋祁曰立字下當有主字奏雖寢然朝廷肅焉敬憚延年後復劾大司農田延年持兵干屬車師古曰干犯也屬車天子後車也音之欲反大司農自訟不干屬車事下御史中丞譴責延年何以不移書宫殿門禁止大司農而令得出入宫於是覆劾延年闌内罪人法至死張晏曰故事有所劾奏並移宫門禁止不得入師古曰覆反也反以此事劾之覆音方目反延年亡命㑹赦出丞相御史府徵書同日到延年以御史書先至詣御史府復為掾宣帝識之張晏曰識其前劾霍光擅廢立拜為平陵令坐殺不辜去官後為丞相掾復擢好畤令神爵中西羗反彊弩將軍許延夀請延年為長史從軍敗西羗還為涿郡太守時郡比得不能太守師古曰比頻也宋祁曰還字下當有遷字涿人畢野白等由是廢亂師古曰廢公法而狡亂也大姓西高氏東高氏師古曰兩高氏各以所居東西為號者自郡吏以下皆畏避之莫敢與牾師古曰牾逆也音悟咸曰寧負二千石無負豪大家賔客放為盗賊師古曰放縱也發輙入高氏吏不敢追浸浸日多師古曰浸漸也道路張弓拔刄然後敢行其亂如此延年至遣掾蠡吾趙繡按高氏得其死罪繡見延年新將師古曰新為郡將也謂郡守為郡將者以其兼領武事也宋祁曰越本按作劾心内懼即為兩劾欲先白其輕者觀延年意怒廼出其重劾延年已知其如此矣趙掾至果白其輕者延年索懐中得重劾師古曰索捜也音山客反宋祁曰越本無果字即收送獄夜入晨将至市論殺之先所按者死師古曰在高氏前死吏皆股弁師古曰股戰若弁弁謂撫手也更遣吏分考兩高窮竟其姦誅殺各數十人郡中震恐道不拾遺三歳遷河南太守賜黄金二十斤豪彊脅息師古曰脅歛也屛氣而息野無行盗威震旁郡其治務在摧折豪彊扶助貧弱貧弱雖䧟法曲文以出之其豪桀侵小民者以文内之師古曰飾文而入之為罪衆人所謂當死者一朝出之所謂當生者詭殺之師古曰詭違正理而殺也吏民莫能測其意深淺戰栗不敢犯禁按其獄皆文致不可得反師古曰致至宻也言其文案整宻也反音幡延年為人短小精悍敏㨗於事師古曰悍勁也雖子貢冉有通藝於政事不能絶也吏忠盡節者厚遇之如骨肉皆親鄉之師古曰鄉讀曰嚮出身不顧以是治下無隐情然疾惡泰甚中傷者多尤巧為獄文善史書所欲誅殺奏成於手中主簿親近史不得聞知奏可論死奄忽如神冬月傳屬縣囚㑹論府上師古曰總集郡府而論殺流血數里河南號曰屠伯鄧展曰言延年殺人如屠兒之殺六畜伯長也令行禁止郡中正清是時張敞為京兆尹素與延年善敞治雖嚴然尚頗有縱舎聞延年用刑刻急廼以書諭之曰昔韓盧之取菟也上觀下獲應劭曰韓盧六國時韓氏之黒犬也孟康曰言良犬之取菟仰觀人主之意而𫉬之喻不妄殺不甚多殺願次卿少緩誅罰思行此術延年報曰河南天下喉咽二周餘斃師古曰喉咽言其所在襟要如人體之有喉咽也二周東西周君國也咽音一千反莠盛苖穢何可不鉏也師古曰莠粃穀所生也苖粟苖也莠音誘自矜伐其能終不衰止時黄霸在潁川以寛恕為治郡中亦平婁䝉豐年師古曰婁古屢字鳳皇下上賢焉下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守襃賞反在已前師古曰比接近也音頻二反心内不服河南界中又有蝗蟲府丞義出行蝗還見延年延年曰此蝗豈鳳凰食邪宋祁曰府丞義當作府丞狐義義又道司農中丞耿夀昌為常平倉利百姓延年曰丞相御史不知為也當避位去夀昌安得權此師古曰作此倉非竒異之功也公卿不知為之是曠官也夀昌安得擅此以為權乎後左馮翊缺上欲徵延年符已發為其名酷復止應劭曰符竹使符也臧在符節臺欲有所拜召治書御史符節令𤼵符下太尉也延年疑少府梁邱賀毁之心恨㑹琅邪太守以視事乆病滿三月免延年自知見廢謂丞曰此人尚能去官我反不能去邪師古曰與丞言云爾又延年察獄史廉有臧不入身師古曰延年察舉其獄史為廉而此人乃有臧罪然臧不入身也宋祁曰越本刪有字延年坐𨕖舉不實貶秩笑曰後敢復有舉人者矣師古曰言已濫被貶秩後人寕敢復舉人乎丞義年老頗悖師古曰心思惑亂悖音布内反素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之無意毁傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安師古曰取休假上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按驗有此數事以結延年師古曰結正其罪也坐怨望非謗政治不道弃市初延年母從東海来欲從延年臘師古曰建丑之月為臘祭因㑹飲若今之蜡節也到雒陽適見報囚師古曰奏報行決也劉攽曰檢尋前後直謂斷決囚為報爾非奏得報也如今有司書囚罪長吏判准斷定所謂報也母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆母乃見之因數責延年師古曰數音所具反幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人師古曰顧反也乘因也欲以立威豈為民父母意哉延年服罪重頓首謝師古曰重音直用反因自為母御歸府舎母畢正臘師古曰臘及正嵗禮畢也正音之盈反謂延年天道神明人不可獨殺師古曰言多殺人者已亦當死我不意當老見壯子被刑戮也師古曰言素意不自謂如此也行矣去女東歸埽除墓地耳師古曰言待其䘮至也遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢知其母師古曰稱其賢智也延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗師古曰一門之中五二千石故總云萬石次弟彭祖至太子太傅在儒林傳尹賞字子心鉅鹿楊氏人也以郡吏察廉為樓煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令坐殘賊免後以御史舉為鄭令永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕俠臧匿亡命鄧展曰紅陽姓長仲字也如淳曰紅陽南陽縣也長姓仲字也師古曰姓紅陽而兄字長弟字仲今書長字或作張者非也後人所改耳一曰紅陽侯王立之子兄弟長少者也而北地大豪浩商等報怨殺義渠長妻子六人宋祁曰六人或作二十八徃来長安中丞相御史遣掾求逐黨與詔書召捕乆之廼得長安中姦猾浸多閭里少年羣輩殺吏受賕報讎師古曰或有自怨於吏或受人賕賂報仇讎也宋祁曰賕當作財相與探丸為彈師古曰為彈丸作赤黒白三色而共探取之也彈音徒旦反得赤丸者斫武吏得黒者斫文吏白者主治䘮師古曰其黨與有為吏及它人所殺者則主其䘮事也城中薄暮塵起剽劫行者死傷横道枹鼓不絶師古曰枹擊鼓椎也音孚其字從木蕭該音義曰字林曰枹擊鼓柄音浮賞以三輔高第選守長安令得壹切便宜從事賞至脩治長安獄穿地方深各數丈致令辟為郭師古曰致謂積累之也令辟㼾甎也郭謂四周之内也致讀如本字又音綴令音零辟音避歴反以大石覆其口名為虎穴乃部户曹掾史與鄉吏亭長里正父老伍人師古曰五家為伍伍人者各其同伍之人也雜舉長安中輕薄少年惡子師古曰惡子不承父母教命者宋祁曰注文承字下當有籍字無市籍商販作務而鮮衣凶服被鎧扞持刀兵者悉籍記之師古曰凶服危險之服鎧甲也扞臂衣也籍記為名籍以記之得數百人賞一朝㑹長安吏車數百兩分行收捕皆劾以為通行飲食群盗師古曰飲音於禁反食讀曰飤賞親閲見十置一師古曰置放也其餘盡以次内虎穴中百人為輩覆以大石數日壹發視皆相枕籍死便輿出瘞寺門桓東如淳曰瘞埋也舊亭𫝊於四角靣百歩築土四方上有屋屋上有柱出高丈餘有大板貫柱四出名曰桓表縣所治夹兩邊各一桓陳宋之俗言桓聲如和今猶謂之和表師古曰即華表也宋祁曰桓徐鍇改作垣非是蕭該音義作寺門外垣東又云今漢書多作垣字葢後人多知墻垣不知桓表當從桓劉攽曰便讀如箯楬著其姓名師古曰楬杙也㭬杙於瘞處而書死者名也楬音竭杙音弋字並從木百日後廼令死者家各自發取其尸親屬號哭道路皆歔欷長安中歌之曰安所求子死桓東少年場師古曰安猶焉也死謂尸也生時諒不謹枯骨後何𦵏師古曰諒信也𦵏字合韻音子郎反賞所置皆其魁宿師古曰魁根本也宿乆舊也或故吏善家子失計随輕黠願自改者財數十百人師古曰財與纔同皆貰其罪師古曰貰緩也詭令立功以自贖師古曰詭責也盡力有效者因親用之為爪牙追捕甚精甘耆姦惡甚於凡吏師古曰耆讀曰嗜賞視事數月盗賊止郡國亡命散走各歸其處不敢闞長安江湖中多盗賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山羣盗起以賞為右輔都尉遷執金吾督大姦猾三輔吏民甚畏之數年卒官疾病且死戒其諸子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢弃無有赦時其羞辱甚於貪汙坐臧慎毋然賞四子皆至郡守長子立為京兆尹皆尚威嚴有治辯名贊曰自郅都以下皆以酷烈為聲然都抗直引是非争大體張湯以知阿邑人主與俱上下蘓林曰邑音人相悒納之悒師古曰如蘓氏之説邑字音烏合反然今之書本或作色字此言阿䛕觀人主顔色而上下也其義兩通宋祁曰李竒阿音烏蕭該案漢書作阿媚人主者傳寫誤時辯當否國家頼其便趙禹据法守正師古曰据音據杜周從諛以少言為重張湯死後罔密事叢師古曰叢謂衆也􅀢以耗廢師古曰􅀢漸也耗亂也音莫報反九卿奉職救過不給師古曰給供也何暇論繩墨之外乎自是以至哀平酷吏衆多然莫足數此其知名見紀者也其廉者足以為儀表師古曰謂有儀形可表明者其汙者方畧教道壹切禁姦師古曰汙濁也道讀曰導亦質有文武焉雖酷稱其位矣師古曰稱音尺孕反宋祁曰亦字下當有皆字湯周子孫貴盛故别傳師古曰言所以不列於酷吏之篇也前漢書卷九十前漢書卷九十考證酷吏傳惡能勝其任而媮快乎注師古曰媮茍且也臣宗萬按媮快史記作愉快此文媮字即愉字意顔以茍且觧之於義不順言道徳者溺于職矣史記作溺其職矣郅都傳河東大陽人也臣召南按史記但曰楊人也據地理志楊縣與大陽縣並屬河南郡似此文誤楊為陽因遂衍大字寗成傳為少吏必陵其長吏臣召南按少吏南本作小吏非也少吏自與長吏對言漢制縣令長及丞尉二百石以上為長吏百石以下有斗食佐史之秩為少吏武紀元光六年詔曰少吏犯禁即此少吏也義縱傳以捕按太后外孫修成子中按史記作修成君子仲但以外戚傳證之時本號曰修成子仲則不必有君字也楊僕傳使督盗賊闗東按闗東屬上句宋本誤置宋祁注于督盗賊下咸宣傳南陽有梅免百政楚有叚中杜少按百政史記作白政叚中史記作殷中田廣明傳與廐嗇夫江徳臣召南按江徳功臣表作江喜又按此傳魏不害三人之封並捕斬公孫勇也乃功臣表則云蘓昌以捕故越王子鄒起侯事實稍異前漢書卷九十考證
