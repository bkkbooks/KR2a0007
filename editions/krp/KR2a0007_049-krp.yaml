body:
  text: 前漢書卷四十九漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注爰盎鼂錯傳第十九師古曰鼂古朝字其下作朝蓋通用耳爰盎字絲其父楚人也師古曰盎音一浪反故爲羣盗徙安陵師古曰羣盗者羣衆相随而爲盗也高后時盎爲呂禄舍人孝文即位盎兄噲任盎爲郎中如淳曰盎爲兄所保任故得爲郎中也絳侯爲丞相朝罷趨出意得甚師古曰意甚自得也上禮之恭常目送之盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡如淳曰人主在時與共治在時之事人主雖亡其法度存當奉行之高祖誓非劉氏不王而勃等聽王諸呂是從生主之欲不與亡者也方呂后時諸呂用事擅相王劉氏不絶如帶師古曰言微細也是時絳侯爲太尉本兵柄師古曰執兵權之本弗能正呂后崩大臣相與共誅諸呂太尉主兵適會其成功所謂功臣非社稷臣丞相如有驕主色陛下謙譲師古曰如似也臣主失禮竊為陛下弗取也後朝上益莊丞相益畏師古曰莊嚴也已而絳侯望盎曰吾與汝兄善今兒廼毁我師古曰望責怨之也盎遂不謝及絳侯就國人上書告以為反徴繋請室師古曰請室獄也解在賈誼傳諸公莫敢為言唯盎眀絳侯無罪絳侯得釋盎頗有力絳侯廼大與盎結交淮南厲王朝殺辟陽侯師古曰自國入朝而殺之居處驕甚盎諫曰諸侯太驕必生患可適削地師古曰適讀曰謫上弗許淮南王益横師古曰横音胡孟反謀反發覺上徴淮南王遷之蜀檻車傳送盎時為中郎将諫曰陛下素驕之弗稍禁以至此今又暴摧折之淮南王為人剛有如遇霜露行道死陛下竟為以天下大弗能容有殺弟名奈何上不聽遂行之宋祁曰越本無遂字淮南王至雍病死聞師古曰雍是扶風雍縣聞聞於天子也宋祁曰注是字當刪上輟食哭甚哀師古曰輟止也盎入頓首請辠師古曰自責以不強諫也上曰以不用公言至此盎曰上自寛此往事豈可悔哉且陛下有高世行三此不足以毁名上曰吾高世三者何事盎曰陛下居代時太后嘗病三年陛下不交睫解衣師古曰睫目傍毛也交睫謂睡寐也睫音接宋祁曰解字上當有不字湯藥非陛下口所嘗弗進夫曾參以布衣猶難之宋祁曰曽參字上浙本存孝字句義並足今陛下親以王者脩之過曾參逺矣諸呂用事大臣顓制師古曰顓與專同然陛下從代乗六乗傳馳不測淵鄭氏曰大臣亂乗傳而赴之故曰不測淵雖賁育之勇不及陛下孟康曰孟賁夏育皆古勇士也陛下至代邸西鄉譲天子者三南鄉譲天子者再師古曰鄉讀曰嚮夫許由一譲師古曰許由古高士堯譲天下於由由不受也陛下五以天下譲過許由四矣且陛下遷淮南王欲以苦其志使改過有司宿衞不謹故病死於是上廼解盎繇此名重朝廷師古曰繇讀與由同盎常引大體忼慨宦者趙談以數幸常害盎盎患之盎兄子種為常侍騎諫盎曰君衆辱之後雖惡君上不復信師古曰惡謂譖毁之言其過惡於是上朝東宮趙談驂乗盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載宋祁曰一本云刀鋸餘人載於是上笑下趙談談泣下車上從覇陵上欲西馳下峻阪盎㩜轡師古曰㩜與􅒆同上曰將軍怯邪盎言曰臣聞千金之子不埀堂師古曰言富人之子則自愛也垂堂謂坐堂外邉恐墜墮也宋祁曰或無之字下同百金之子不騎衡如淳曰騎倚也衡樓殿邉欄楯也師古曰騎謂跨之耳非倚也聖主不乗危不徼幸今陛下騁六飛如淳曰六馬之疾若飛也馳不測山有如馬驚車敗陛下縱自輕奈高廟太后何上乃止上幸上林皇后愼夫人從其在禁中常同坐師古曰同坐謂所坐之處髙下齊同無差等也及坐郎署長布席盎引郤愼夫人坐蘓林曰郎署上林中直衞之署也如淳曰盎時為中郎将天子幸署豫設供帳待之故得郤愼夫人坐也師古曰郤謂退而卑之也坐音材臥反宋祁云趙本及景德本監本並無長布席三字一本云郎署長布席學官本無長布席三字若上云及坐郎署似不成語與上句了不綴屬必須曰郎署長布席義乃可安愼夫人怒不肯坐上亦怒起盎因前說曰臣聞尊卑有序則上下和今陛下既以立后愼夫人廼妾妾主豈可以同坐哉且陛下幸之則厚賜之陛下所以為愼夫人適所以禍之也獨不見人豕乎張晏曰戚夫人也於是上廼說師古曰說讀曰悅入語愼夫人愼夫人賜盎金五十斤然盎亦以數直諌不得乆居中調為隴西都尉師古曰調選也音徒釣反仁愛士卒士卒皆爭為死遷齊相徙為呉相辭行種謂盎曰吳王驕日乆國多姦今絲欲刻治如淳曰種稱叔父字曰絲彼不上書告君則利劒刺君矣南方卑溼絲能日飲亡何說王母反而已師古曰無何言更無餘事如此幸得脱盎用種之計呉王厚遇盎盎告歸道逢丞相申屠嘉下車拜謁丞相從車上謝盎還媿其吏師古曰慙不見禮也乃之丞相舍上謁求見丞相師古曰上謁若今通名也丞相良久乃見因跪曰願請間師古曰欲因間隙私有所白也丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起說曰君為相自度孰與陳平絳侯師古曰度計量也與猶如也丞相曰不如盎曰善君自謂弗如夫陳平絳侯輔翼髙帝定天下為将相而誅諸呂存劉氏君廼為材官蹶張遷為隊帥如淳曰隊帥軍中小官師古曰帥音所類反積功至淮陽守非有竒計攻城野戰之功且陛下從代來每朝郎官者上書疏宋祁曰郎官者旣云郎官何更施者字明是官與宦者畧述禁中人耳未嘗不止輦受其言不可用置之言可采未嘗不稱善何也欲以致天下賢英士大夫日聞所不聞以益聖師古曰日日得聞異言也宋祁曰景德本無大夫上三字越本亦無大夫上字而此本獨無上字要須得之對下句君字而君自閉箝天下之口而日益愚師古曰箝籋也音其炎反夫以聖主責愚相君受禍不久矣丞相乃再拜曰嘉鄙人廼不知将軍幸教引與入坐為上客盎素不好鼂錯錯所居坐盎輙避盎所居坐錯亦避兩人未嘗同堂語及孝景即位鼂錯為御史大夫使吏案盎受呉王財物抵辠詔赦以為庻人呉楚反聞師古曰聞聞於天子錯謂丞史曰如淳曰百官表御史大夫有兩丞丞史丞及史也爰盎多受呉王金錢專為蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絶如淳曰事未發之時治之乃有所絶也今兵西向治之何益且盎不宜有謀如淳曰盎大臣不宜有姦謀錯猶與未決師古曰與讀曰豫人有告盎盎恐夜見竇嬰為言呉所以反願至前口對狀師古曰至天子之前也嬰入言上廼召盎盎入見竟言呉所以反獨急斬錯以謝呉呉可罷上拜盎為泰常竇嬰為大将軍兩人素相善是時諸陵長安中賢大夫爭附兩人車騎隨者日數百乗及鼂錯已誅盎以泰常使呉呉王欲使将不肯欲殺之使一都尉以五百人圍守盎軍中初盎為吳相時從史盜私盎侍兒文穎曰婢也盎知之弗泄遇之如故人有告從史君知女與侍者通廼亡去盎驅自追之師古曰驅馳而追言疾速遂以侍者賜之復為從史及盎使呉見守從史適在守盎校為司馬師古曰為校中之司馬所領士卒正當守盎廼悉以其装齎買二石醇醪師古曰装齎謂所齎衣物自隨者也醇者不雜言其醲也醪汁滓合之酒也音牢會天寒士卒飢渴飲醉西南陬卒卒皆臥師古曰陬隅也飲音於禁反陬音子侯反又音鄒宋祁曰古本飢字下有乏字今削之無害司馬夜引盎起曰君可以去矣呉王期旦日斬君盎弗信曰何為者司馬曰臣故為君從史盜侍兒者也盎乃驚謝曰公幸有親文頴曰言汝有親老吾不足絫公師古曰絫古累字也音力瑞反司馬曰君弟去師古曰弟但也臣亦且亡辟吾親如淳曰藏匿吾親不使遇害也晉灼曰辟音避君何患迺以刀決帳道從醉卒直出師古曰於醉卒之處決帳而開令通道得亡也司馬與分背師古曰一時各去也盎解節旄懐之如淳曰不欲令人見屐歩行七十里如淳曰著屐歩行而逃亡眀見梁騎馳去遂歸報文穎曰梁騎将擊吳楚者也師古曰遇梁軍之騎因遂得脱歸報天子呉楚已破上更以元王子平陸侯禮為楚王以盎為楚相嘗上書不用盎病免家居與閭里浮湛相隨行鬭雞走狗師古曰湛讀曰沉雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒服䖍曰博戱之徒也将軍何自通之盎曰劇孟雖博徒然母死客送喪車千餘乗此亦有過人者且緩急人所有師古曰凡人在生不能無緩急之事夫一旦叩門不以親為解張晏曰不語云親不聽也臣瓚曰凡人之於赴難濟危多以有父母為解而孟兼行之師古曰瓚說是也解者若今言分疏矣不以在亡為辭師古曰或實在家而辭云不在天下所望者獨季心劇孟文穎曰心季布弟也今公陽從數騎鄧展曰陽外也晉灼曰陽猶常也師古曰鄧説是也一旦有緩急寧足恃乎遂罵富人弗與通諸公聞之皆多盎師古曰多猶重盎雖居家景帝時時使人問籌䇿梁王欲求為嗣盎進說其後語塞師古曰塞不行也梁王以此怨盎使人刺盎刺者至闗中問盎稱之皆不容口師古曰稱羙其徳口不能容也迺見盎曰臣受梁王金刺君君長者不忍刺君然後刺者十餘曹如淳曰曹輩也備之盎心不樂家多怪廼之棓生所問占蘇林曰音桮文頴曰音陪秦時賢士善術者也師古曰蘓音文說是還梁刺客後曹果遮刺殺盎安陵郭門外鼂錯潁川人也晉灼曰音厝置之厝師古曰據申屠嘉傳序云責通請錯匪躬之故以韻而言晉音是也潘岳西征賦乃讀為錯雜之錯不可依也學申商刑名於軹張恢生所師古曰軹縣之儒生姓張名恢錯從之受申商法也與雒陽宋孟及劉帶同師以文學為太常掌故應劭曰掌故六百石吏主故事錯為人陗直刻深師古曰陗字與峭同峭謂峻陿也音千笑反孝文時天下亡治尚書者獨聞齊有伏生故秦博士治尚書年九十餘老不可徴廼詔太常使人受之太常遣錯受尚書伏生所還因上書稱說師古曰稱師法而説其義詔以為太子舍人門大夫師古曰初為舍人又為門大夫遷博士又上書言人主所以尊顯功名揚於萬世之後者以知術數也張晏曰術數刑名之書也臣瓚曰術數謂法制治國之術也師古曰瓚説是也公孫𢎞云擅生殺之力通壅塞之途權輕重之數論得失之道使逺近情偽必見於上謂之術此與錯所言同耳故人主知所以臨制臣下而治其衆則羣臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海内必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或曰皇太子亡以知事為也師古曰言何用知事臣之愚誠以為不然竊觀上世之君不能奉其宗廟而刼殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書說也師古曰說謂所說之義也夫多誦而不知其說所謂勞苦而不為功臣竊觀皇太子材智髙竒馭射伎蓺過人絶逺然於術數未有所守者以陛下為心也張晏曰若伯魚須仲尼教乃讀詩書也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令臣瓚曰茂陵中書太子家令秩八百石以其辯得幸太子太子家號曰智嚢師古曰言其一身所有皆是智算若嚢橐之盛物也是時匈奴彊數寇邊上發兵以禦之錯上言兵事曰臣聞漢興以來胡虜數入邊地小入則小利大入則大利髙后時再入隴西攻城屠邑敺畧畜産師古曰敺與驅同其後復入隴西殺吏卒大寇盜竊聞戰勝之威民氣百倍師古曰益奮厲也敗兵之卒没世不復師古曰永挫折也自髙后以來隴西三困於匈奴矣民氣破傷亡有勝意今茲隴西之吏頼社稷之神靈奉陛下之明詔和輯士卒底厲其節師古曰輯與集同底與砥同起破傷之民以當乗勝之匈奴用少撃衆殺一王敗其衆而法曰大有利宋祁曰而法曰大有利此語絶不傍理蓋下有兵法曰故後人誤書耳當從淛本作敗其衆而有大利非隴西之民有勇怯廼将吏之制巧拙異也故兵法曰有必勝之将無必勝之民繇此觀之師古曰繇讀與由同安邊境立功名在於良将不可不擇也臣又聞用兵臨戰合刃之急者三師古曰合刃謂交兵一曰得地形二曰卒服習三曰噐用利兵法曰丈五之溝漸車之水師古曰漸讀曰瀻謂浸也音子亷反山林積石經川丘阜師古曰經川常流之水也大陸曰阜屮木所在師古曰􅋄古草字此歩兵之地也車騎二不當一土山丘陵曼衍相屬師古曰曼衍猶聯延也屬續也衍音弋戰反屬音之欲反平原廣野此車騎之地宋祁曰地字下當有也字前後相凖存也成文歩兵十不當一平陵相逺川谷居閒師古曰逺離也仰髙臨下此弓弩之地也短兵百不當一兩陳相近平地淺屮可前可後此長㦸之地也劒楯三不當一萑葦竹蕭師古曰萑薍也葦葭也蕭蒿也萑音完􅋄木蒙蘢支葉茂接師古曰蒙蘢覆蔽之貎也蘢音來東反此矛鋋之地也師古曰鋋鐵把短矛也音上延反長㦸二不當一曲道相伏險阸相薄此劒楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集師古曰集齊也趨利弗及避難不畢前擊後解與金鼓之音相失師古曰金金鉦也鼔所以進衆金所以止衆也宋祁曰學官本越本並作金鼔之指據云金鼔則音為是作指非此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同應劭曰袒裼肉袒也師古曰裼音錫弩不可以及遠與短兵同射不能中與亡矢同中不能入與亡鏃同師古曰鏃矢鋒也音子木反此将不省兵之禍也師古曰省視也五不當一故兵法曰器械不利以其卒予敵也卒不可用以其將與敵也將不知兵以其主予敵也君不擇将以其國予敵也四者兵之至要也臣又聞小大異形彊弱異埶險易異備師古曰易平也音弋豉反夫卑身以事彊小國之形也合小以攻大敵國之形也師古曰彼我力均不能相勝則須連結外援共制之也以蠻夷攻蠻夷中國之形也師古曰不煩華夏之兵使其同類自相攻撃也今匈奴地形技蓺與中國異上下山阪出入溪澗中國之馬弗與也師古曰與猶如險道傾仄且馳且射師古曰仄古側字中國之騎弗與也風雨罷勞飢渴不困師古曰罷讀曰疲中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎師古曰易亦平也突騎言其驍銳可用衝突敵人也則匈奴之衆易撓亂也師古曰撓攪也音火高反其字從手一曰撓曲也弱也音女敎反其字從木勁弩長㦸射疏及逺師古曰疏亦濶逺也劉奉世曰長㦸恐誤或者勁弩如今九牛大弩以槍為矢歟故可射疏及逺也然㦸有鈎又不可射則匈奴之弓弗能格也堅甲利刃長短相雜遊弩徃來什伍俱前師古曰伍人為伍二伍為什則匈奴之兵弗能當也材官騶發矢道同的蘇林曰騶音馬驟之驟如淳曰騶矢也處平易之地可以矢相射也臣瓚曰材官騎射之官也射者騶發其用矢者同中一的言其工妙也師古曰騶謂矢之善者也春秋左氏傳作菆字其音同耳材官有材力者騶發發騶矢以射也手工矢善故中則同的的謂所射之準臬也蘇音失之矣臬音牛列反即謂橜也則匈奴之革笥木薦弗能支也孟康曰革笥以皮作如鎧者被之木薦以木板作如楯一曰革笥若楯木薦之以當人心也師古曰一說非也笥音息嗣反下馬地鬭劒㦸相接去就相薄師古曰薄迫也則匈奴之足弗能給也師古曰給謂相連也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以彊為弱在俛卬之間耳師古曰言不知其術則雖大必小雖彊必弱也俛亦俯字卬讀曰仰夫以人之死爭勝跌而不振服䖍曰蹉跌不可復起也師古曰跌足失據也跌音徒結反則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明将能知其習俗和輯其心者師古曰輯與集同也以陛下之明約将之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆張晏曰衡音横師古曰衡即横耳無勞借音此萬全之術也傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下財擇師古曰財與裁同也文帝嘉之乃賜錯璽書寵荅焉曰皇帝問太子家令上書言兵體三章聞之李竒曰三者得地刑卒服習器用利書言狂夫之言而明主擇焉今則不然言者不狂而擇者不明國之大患故在於此使夫不明擇於不狂是以萬聽而萬不當也錯復言守邉備塞勸農立本當世急務二事曰臣聞秦時北攻胡貉築塞河上師古曰貉音莫客反南攻揚粤張晏曰揚州之南越也置戍卒焉其起兵而攻胡粤者非以衞邉地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其埶戰則為人禽屯則卒積死夫胡貉之地積隂之處也木皮三寸氷厚六尺文頴曰土地寒故也食肉而飲酪其人宻理鳥獸毳毛師古曰宻理謂其肌肉也毳細毛也其性能寒師古曰能讀曰耐此下能暑亦同揚粤之地少隂多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邊輸者僨於道服䖍曰僨仆也如淳曰僨音奮秦民見行如徃棄市因以讁發之名曰讁戍先發吏有讁及贅婿賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左孟康曰秦時復除者居閭之左後發役不供復役之也或云直先發取其左也師古曰閭里門也居閭之左者一切皆發之非謂復除也解在食貨志發之不順行者深恐有背畔之心凡民守戰至死而不降北者以計為之也師古曰北謂敗退故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火師古曰蒙冒犯也視死如生今秦之發卒也有萬死之害而亡銖兩之報死事之後不得一算之復師古曰復復除也音方目反天下明知禍烈及已也師古曰猛火曰烈取以喻耳陳勝行戍至於大澤為天下先倡師古曰倡讀曰唱天下從之如流水者秦以威劫而行之之敝也胡人衣食之業不著於地師古曰著音直畧反其埶易以擾亂邉竟師古曰竟讀曰境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於廣壄師古曰壄古野字宋祁曰浙本居字下有也字獸字下有放字若去也去放語迫而不文放字猶害於義羙草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畮也師古曰畮古畆字也南畆耕種之處也宋祁曰景徳本無以離二字校添刋誤亦改今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以猴備塞之卒卒少則入陛下不救則邉民絶望而有降敵之心救之少發則不足多發遠縣纔至則胡又已去李竒曰纔音裁師古曰纔淺也猶言僅至他皆類此聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邉境遣将吏發卒以治塞甚大恵也然令逺方之卒守塞一歲而更師古曰更謂易代也音庚又讀如本字不知胡人之能不如選常居者家室田作且以備之以便為之髙城深塹具藺石布渠荅服䖍曰藺石可投人石也蘇林曰渠荅鐡蒺藜也如淳曰藺石城上雷石也墨子曰城上二歩一渠立程長三尺冠長十尺臂長六尺二歩一荅荅廣九尺袤十二尺師古曰藺石如說是也渠荅蘇說是也雷音來内反宋祁曰以便為之存以字不成句且無義復為一城其内城閒百五十歩要害之處通川之道調立城邑母下千家師古曰調謂算度之也總計城邑之中令有千家以上也調音徒釣反為中周虎落鄭氏曰虎落者外蕃也若今時竹虎也蘓林曰作虎落於塞要下以沙布其表旦視其跡以知匈奴来入一名天田師古曰蘇說是也虎落者以竹篾相連遮落之也先為室屋具田器廼募辠人及免徒復作令居之張晏曰募民有罪自首除罪定輸作者也復作如徒也臣瓚曰募有罪者及罪人遇赦復作竟其日月者今皆除其罰令居之也師古曰瓚說是也復扶目反不足募以丁奴婢贖辠及輸奴婢欲以拜爵者不足廼募民之欲往者皆賜髙爵復其家師古曰復音方目反予冬夏衣廪食能自給而止師古曰初徙之時縣官且廪給其衣食於復能自供贍乃止也郡縣之民得買其爵以自増至卿孟康曰食貨志所謂樂卿者也朝位從卿而無職也師古曰孟說非也樂卿武帝所置耳錯之上書未得豫言之也然二十等爵内無有卿名蓋謂其等級同列卿者也其亡夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民禄利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之孟康曰謂胡人入為寇驅收中國能奪得之者以半與之師古曰孟説非也言胡人入為寇驅畧漢人及畜産而它人能止得其所驅者令其本主以半賞之縣官為贖張晏曰得漢人官為贖也師古曰此承上句言謂官為備價贖之耳張説非也其民如是劉奉世曰其民當屬上句則邑里相救助赴胡不避死非以徳上也師古曰言非以此事欲立徳義於主上也欲全親戚而利其財也此與東方之戍卒不習地埶而心畏胡者功相萬也如淳曰東方諸郡民不習戰鬪當戍邉者也以陛下之時徙民實邊使逺方亡屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去逺矣師古曰言發怨恨之人使行戍役也上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸将之費益寡如淳曰将送也或曰将資也甚大恵也下吏誠能稱厚恵奉明法師古曰稱副也存恤所徙之老弱善遇其壮士和輯其心而勿侵刻師古曰輯與集同使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙逺方以實廣虛也師古曰所以充實寛廣空虚之地相其隂陽之和嘗其水泉之味審其土地之宜觀其屮木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二内門户之閉張晏曰二内二房也置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也師古曰之往也為置醫巫以救疾病以脩祭祀男女有昬師古曰昬謂㛰姻配合也生死相䘏墳墓相從種樹畜長張晏曰畜長六畜也師古曰種樹謂桑果之屬長音竹兩反劉攽曰所種所樹畜積長茂室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邉縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百服䖍曰假音假借之假五百帥名也師古曰假大也音工雅反劉奉世曰假服説是古者戍皆有期代則不置故曰假謂其權設猶假司馬之類亦非常置也十連一邑邑有假候皆擇其邑之賢材有護師古曰有保護之能者也今流俗書本護字作讓妄改之耳習地形知民心者居則習民於射法出則教民於應敵故卒伍成於内則軍正定於外服習以成勿令遷徙師古曰各守其業也幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣師古曰還讀曰旋旋踵回旋其足也所徙之民非壮有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶匈奴不與和親臣竊意其冬來南也師古曰意疑之也壹大治則終身創矣師古曰創懲艾也音初亮反宋祁曰治字下疑有之字存之則語緩且易欲立威者始於折膠蘇林曰秋氣至膠可折弓弩可用匈奴常以為候而出軍來而不能困使得氣去師古曰使其得勝逞氣志而去後未易服也愚臣亡識唯陛下財察後詔有司舉賢良文學士錯在選中上親䇿詔之曰惟十有五年九月壬子皇帝曰昔者大禹勤求賢士施及方外師古曰施延也音弋䜴及四極之内舟車所至人迹所及靡不聞命以輔其不逮師古曰意所不及者取其言以自輔也近者獻其明逺者通厥聰比善戮力以翼天子師古曰比和也翼助也比音頻寐反是以大禹能亡失德夏以長楙師古曰楙羙也高皇帝親除大害去亂從師古曰從音子容反亂從謂禍亂之蹤跡也一曰亂謂作亂者從謂合從者若六國時為從者也今書本從下或有順字或有治字者皆非也後人妄加之也劉奉世曰大害謂秦亂從謂項羽時漢得闗中羽西向爭天下故曰亂從並建豪英以為官師師古曰師長也各為一官之長也字或作帥音所類反為諫爭輔天子之闕而翼戴漢宗也頼天之靈宗廟之福方内以安澤及四夷今朕獲執天下之正以承宗廟之祀朕旣不徳又不敏明弗能燭而智不能治宋祁曰智當作知此大夫之所著聞也故詔有司諸侯王三公九卿及主郡吏師古曰主郡吏謂郡守也各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數将以匡朕之不逮二三大夫之行當此三道張晏曰三道國體人事直言也師古曰二三大夫總謂當時受䇿者非止錯一人焉朕甚嘉之故登大夫於朝親諭朕志師古曰諭告也大夫其上三道之要及永惟朕之不徳吏之不平政之不宣民之不寜師古曰永猶深也惟思也四者之闕悉陳其志毋有所隠上以薦先帝之宗廟下以興愚民之休利著之於篇師古曰休羙也篇謂簡也朕親覽焉觀大夫所以佐朕至與不至書之周之宻之重之閉之師古曰重音直隴反興自朕躬師古曰言朕自發視也大夫其正論毋枉執事張晏曰毋為有司枉撓也烏虖戒之師古曰虖讀曰呼二三大夫其帥志毋怠錯對曰平陽侯臣窋孟康曰曹窋參子也汝隂侯臣竈如淳曰夏侯嬰子也潁隂侯臣何文潁曰灌嬰子廷尉臣宜昌隴西太守臣昆邪服䖍曰公孫昆邪也師古曰昆讀曰混音下昆反所選賢良太子家令臣錯師古曰詔列侯九卿及郡守舉賢良故錯為窋所舉昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼故黄帝得力牧而為五帝先服䖍曰力牧黄帝之佐也大禹得咎繇而為三王祖齊桓得筦子而為五伯長師古曰筦字與管同伯讀曰霸今陛下講於大禹及高皇帝之建豪英也臣瓚曰講謂講議也退託於不明以求賢良師古曰自託不明是謙退譲之至也臣竊觀上世之傳師古曰謂史傳若高皇帝之建功業陛下之徳厚而得賢佐皆有司之所覽刻於玉版藏於金匱歴之春秋紀之後世為帝者祖宗與天地相終今臣窋等廼以臣錯充賦如淳曰猶言備數也臣瓚曰充賦此錯之謙也云如賦調也甚不稱明詔求賢之意臣錯􅋄茅臣亡識知昧死上愚對曰詔䇿曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事師古曰親理萬幾之務處于法宮之中明堂之上如淳曰法宮路寝正殿也動静上配天下順地中得人故衆生之類亡不覆也根著之徒亡不載也師古曰有根著地者皆載之也著音直畧反燭以光明無偏異也師古曰燭照也德上及飛鳥下至水蟲草木諸産皆被其澤師古曰被音皮義反然後隂陽調四時節日月光風雨時膏露降師古曰甘露凝如膏五穀熟祅孽㓕賊氣息民不疾疫河出圖洛出書神龍至鳯鳥翔徳澤滿天下靈光施四海此謂配天地治國大體之功也詔䇿曰通於人事終始愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲夀三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以已内恕及人師古曰以已之心揆之於人也情之所惡不以彊人情之所欲不以禁民是以天下樂其政歸其德望之若父母從之若流水百姓和親國家安寜名位不失施及後世師古曰施延也音弋豉反此明於人情終始之功也詔䇿曰直言極諫愚臣竊以五伯之臣明之師古曰伯讀曰霸臣聞五伯不及其臣故屬之以國任之以事師古曰屬委也音之欲反五伯之佐之為人臣也察身而不敢誣師古曰各察已之材用不敢踰越而誣上奉法令不容私盡心力不敢矜師古曰矜謂自伐也遭患難不避死見賢不居其上受禄不過其量不以亡能居尊顯之位自行若此可謂方正之士矣其立法也非以苦民傷衆而為之機陷也孟康曰禨發也陷穽也以之興利除害尊主安民而救暴亂也其行賞也非虚取民財妄予人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此歛民財以顧其功師古曰顧讎也若今言雇賃也而民不恨者知與而安已也其行罰也非以忿怒妄誅而從暴心也師古曰從讀曰縱以禁天下不忠不孝而害國者也故辠大者罰重辠小者罰輕如此民雖伏罪至死而不怨者知罪罰之至自取之也立法若此可謂平正之吏矣法之逆者請而更之不以傷民師古曰更改也主行之暴者逆而復之不以傷國師古曰謂逆主意而反還之不令施行至傷國也復音扶目反救主之失補主之過揚主之羙明主之功使主内亡邪辟之行外亡騫汙之名師古曰辟讀曰僻騫損也汙辱也事君若此可謂直言極諌之士矣此五伯之所以徳匡天下威正諸侯功業甚羙名聲章明舉天下之賢主五伯與焉師古曰與讀曰豫此身不及其臣而使得直言極諫補其不逮之功也今陛下人民之衆威武之重德恵之厚令行禁止之埶萬萬於五伯而賜愚臣䇿曰匡朕之不逮愚臣何足以識陛下之高明而奉承之詔䇿曰吏之不平政之不宣民之不寜愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐師古曰臣亦不及三王之佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯師古曰輯與集同輯和也民不用故當此之時秦最富彊夫國富彊而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉師古曰進前也言不在秦之前也及其末塗之衰也任不肖而信讒賊宮室過度耆慾亡極師古曰耆讀曰嗜民力罷盡賦歛不節師古曰罷讀曰疲矜奮自賢羣臣恐諛張晏曰恐機發陷禍而為諂諛以求自全也師古曰此説非也直為恐懼而為諂諛也恐音丘勇反驕溢縱恣不顧患禍妄賞以隨喜意妄誅以快怒心法令煩憯師古曰憯痛也言痛害於下憯音千感反刑罰暴酷輕絶人命身自射殺宋祁曰殺字下疑有人字若直言身自射殺未見其事必著人字義乃易了天下寒心莫安其處姦邪之吏乗其亂法以成其威獄官主斷生殺自恣上下瓦解各自為制秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疏皆危外内咸怨離散逋逃人有走心陳勝先倡天下大潰師古曰倡讀曰唱絶祀亡世為異姓福此吏不平政不宣民不寜之禍也今陛下配天象地覆露萬民如淳曰覆䕃也露膏澤也絶秦之迹除其亂法躬親本事廢去滛末除苛解嬈文潁曰嬈煩繞也師古曰音如紹反寛大愛人肉刑不用辠人亡帑師古曰謂除收帑相坐律亡讀曰無帑讀曰孥非謗不治鑄錢者除張晏曰除鑄錢之律聽民得自鑄也師古曰非讀曰誹通闗去塞張晏曰文帝十二年除關不用傳不孽諸侯應劭曰接之以禮不以庻孽畜之如淳曰孽疑也去闗禁明無疑於諸侯師古曰應説是賔禮長老愛䘏少孤辠人有期張晏曰早決之也晉灼曰刑法志云罪人各以輕重不亡逃有年而免滿其年免為庻人也師古曰晉說是也後宮出嫁尊賜孝悌農民不租張晏曰足用則除租也明詔軍師宋祁曰師疑作帥軍帥有義言師無取愛士大夫求進方正廢退姦邪除去陰刑張晏曰宮刑也害民者誅憂勞百姓列侯就都師古曰各就其國也親耕節用視民不奢師古曰視讀曰示所為天下興利除害變法易故以安海内者大功數十皆上世之所難及陛下行之道純徳厚元元之民幸矣詔䇿曰永惟朕之不徳愚臣不足以當之詔䇿曰悉陳其志毋有所隠愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而賢聖不廢也師古曰遺棄也不棄神明之徳不廢賢聖之名故各當其世而立功德焉傳曰往者不可及來者猶可待師古曰言各當其時務立功也能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明徳厚資財不下五帝師古曰資質也謂天子之財質臨制天下至今十有六年民不益富盗賊不衰邉竟未安師古曰竟讀曰境其所以然意者陛下未之躬親而待羣臣也今執事之臣皆天下之選已師古曰已語終之辭然莫能望陛下清光晉灼曰今之臣不能望見陛下之光景所及譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺也師古曰言天子虚弃神明之徳日損一日歲亡一歲日月益暮盛德不及究於天下師古曰究竟也以傳萬世愚臣不自度量竊為陛下惜之昧死上狂惑屮茅之愚臣言宋祁曰臣言臣字衍存之句不成唯陛下財擇時賈誼已死對䇿者百餘人唯錯為高第繇是遷中大夫師古曰繇讀與由同錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然竒其材當是時太子善錯計䇿爰盎諸大功臣多不好錯景帝即位以錯為内史錯數請間言事輙聽幸傾九卿法令多所更定丞相申屠嘉心弗便力未有以傷内史府居太上廟堧中師古曰耎者内垣之外游地也音人縁反門東出不便錯廼穿門南出鑿廟堧垣丞相大怒欲因此過為奏請誅錯錯聞之即請閒為上言之丞相奏事因言錯擅鑿廟垣為門請下廷尉誅上曰此非廟垣迺堧中垣不致於法丞相謝師古曰以所奏不當天子意故謝罷朝因怒謂長史曰吾當先斬以聞迺先請固誤丞相遂發病死錯以此愈貴遷為御史大夫請諸侯之罪過削其支郡師古曰支郡在國之四邉者也奏上上令公卿列侯宗室雜議莫敢難獨竇嬰爭之繇此與錯有隙師古曰繇讀與由同錯所更令三十章師古曰更改也諸侯讙譁錯父聞之從潁川來謂錯曰上初即位公為政用事如淳曰錯為御史大夫位三公也侵削諸侯疏人骨肉口譲多怨公何為也師古曰譲責也錯曰固也師古曰言固當如此不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日呉楚七國俱反以誅錯為名上與錯議出軍事錯欲令上自将兵而身居守會竇嬰言爰盎詔召入見上方與錯調兵食師古曰調謂計發之也音徒釣反上問盎曰君嘗為呉相知呉臣田禄伯為人虖今呉楚反於公意何如對曰不足憂也今破矣上曰呉王即山鑄錢煑海為鹽師古曰即就也誘天下豪桀白頭舉事此其計不百全豈發虖何以言其無能為也盎對曰呉銅鹽之利則有之安得豪桀而誘之誠令呉得豪桀亦且輔而為誼不反矣呉所誘皆亡頼子弟亡命鑄錢姦人故相誘以亂錯曰盎䇿之善上問曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知廼屏錯錯趨避東箱甚恨宋祁曰一本恨字下有之字上卒問盎師古曰卒竟也對曰呉楚相遺書言髙皇帝王子弟各有分地師古曰分音扶問反今賊臣鼂錯擅適諸侯削奪之地師古曰適讀曰謫以故反名為西共誅錯復故地而罷方今計獨有斬錯發使赦呉楚七國復其故地則兵可毋血刃而俱罷於是上黙然良久曰顧誠何如吾不愛一人謝天下師古曰顧念也誠實也盎曰愚計出此唯上孰計之迺拜盎為泰常宻装治行後十餘日丞相青翟中尉嘉廷尉敺師古曰張敺也音區劾奏錯曰呉王反逆亡道欲危宗廟天下所當共誅今御史大夫錯議曰兵數百萬獨屬羣臣不可信師古曰屬委也音之欲反陛下不如自出臨兵使錯居守徐僮之旁呉所未下者可以予呉鄧展曰徐僮臨淮二縣也錯不稱陛下徳信欲疏羣臣百姓又欲以城邑予呉亡臣子禮大逆無道錯當要斬父母妻子同産無少長皆棄市臣請論如法制曰可錯殊不知迺使中尉召錯紿載行市師古曰誑云乗車案行市中也行音下更反錯衣朝衣斬東市師古曰朝衣朝服也錯已死謁者僕射鄧公為校尉撃呉楚為将還上書言軍事見上上問曰道軍所來如淳曰道路從呉軍所來也師古曰道軍所來即是從軍所來耳無煩更說道路也聞鼂錯死呉楚罷不鄧公曰呉為反數十嵗矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣師古曰拑音其炎反上曰何哉鄧公曰夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮師古曰卒竟也内杜忠臣之口外為諸侯報仇師古曰杜塞也臣竊為陛下不取也於是景帝喟然長息曰公言善吾亦恨之迺拜鄧公為城陽中尉鄧公成固人也師古曰漢中之縣多竒計建元年中宋祁曰著年字則俗而不古但言中則是史常體上招賢良公卿言鄧先師古曰鄧先猶云鄧先生也一曰先者其名也鄧先時免起家為九卿一年復謝病免歸其子章以脩黄老言顯諸公閒贊曰爰盎雖不好學亦善傅會張晏曰因宜附著合㑹之仁心為質引義忼慨遭孝文初立資適逢世張晏曰資財也適值其世得騁其才時已變易張晏曰謂景帝及呉壹說果於用辯師古曰謂殺鼂錯也身亦不遂鼂錯銳於為國逺慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗張晏曰趙奢卒趙使趙括為将其母言之趙王曰願王易括王不許母要王括有罪願不坐王許之後括果敗於長平以母前約故卒不得坐悲夫錯雖不終世哀其忠故論其施行之語著于篇前漢書卷四十九前漢書卷四十九考證爰盎傳爰盎史記作袁臣召南按爰與袁轅通史游急就章云爰展世師古注曰陳申公後世孫爰諸生爰濤塗因而命氏其後或為轅字又作袁字本一族也按爰濤塗左傳作轅公穀作袁袁盎史記作袁漢書作爰實係通用任盎為郎中郎中史記作中郎是時絳侯為太尉本兵柄史記作主兵柄今絲欲刻治按從子呼叔父字僅見此文史記作茍欲劾治下文絲能日飲史記作君能日飲似為得之盎入見竟言呉所以反云云臣召南按此文刪去史記鼂錯在前一叚以詳序于錯傳中也鼂錯傳及劉帶同師劉帶史記作劉禮為太常掌故注應劭曰掌故六百石林駉曰史記注應劭曰掌故百石此注六字衍文也勁弩長㦸射疏及逺劉奉世曰長㦸恐訛胡三省曰文意各有所屬勁弩所以射疏長㦸所以及逺也復為一城眞徳秀曰謂大城中復立一小城也連有假五百劉奉世曰謂假司馬之類胡三省曰五百即後所謂伍伯也賈公彦曰伍伯者漢制五人為伍伯長也沈約曰舊説古者君行師從卿行旅從旅者五百人也今諸官府及郡各置五百四以象卿行旅從依古義也上與錯議出軍臣召南按此二句補史記之缺竇嬰言盎以下云云則裁取史記呉王濞傳中語丞相青翟等劾錯云云又補史記之缺但丞相青翟不當有翟字此陶青也訛與景紀同贊亡益救敗不如趙母指括以全其宗李觀曰史臣責錯父不逮趙括母何其鄙也鼂錯用至忠之畧與趙括必敗之勢異也使錯父為之是沮其子為忠也孰可擬議前漢書卷四十九考證
