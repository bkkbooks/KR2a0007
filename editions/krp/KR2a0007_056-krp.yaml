body:
  text: 前漢書卷五十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顔師古注董仲舒傳第二十六董仲舒廣川人也少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面師古曰言新學者但就其舊弟子受業不必親見仲舒劉氏曰久衍字盖三年不窺園其精如此師古曰雖有園圃不窺視之言專學也進退容止非禮不行學士皆師尊之武帝即位舉賢良文學之士前後百數師古曰數音所具反而仲舒以賢良對䇿焉制曰朕獲承至尊休徳師古曰休羙也言承先帝極尊之位至羙之徳也宋祁曰浙本至尊下有之字傳之亡窮而施之㒺極師古曰㒺亦無也極盡也任大而守重是以夙夜不皇康寧師古曰皇暇也康樂也永惟萬事之統猶懼有闕師古曰永深也惟思也統緒也故廣延四方之豪儁郡國諸侯公選賢良脩絜博習之士師古曰郡郡守也國王國也諸侯列侯也郡國及諸侯總謂四方在外者公選謂以公正之道選士無偏私也欲聞大道之要至論之極師古曰極中也今子大夫褎然為舉首服虔曰子男子之美號也張晏曰褎進也為舉賢良之首也師古曰褎然盛服貌也詩邶風旄邱之篇曰褎如充耳褎音弋授反朕甚嘉之子大夫其精心致思朕埀聼而問焉盖聞五帝三王之道改制作樂而天下洽和百王同之宋祁曰淳化本作制禮按古本無禮字下云韶勺寧有禮字存之不成文洽一作治當虞氏之樂莫盛於韶師古曰韶舜樂於周莫盛於勺張晏曰勺周頌篇也言能成先祖之功以養天下也師古曰勺讀與酌同聖王已没鐘鼓筦絃之聲未衰師古曰筦與管字同而大道微缺陵夷至虖桀紂之行師古曰陵夷言漸穨替也解在成紀宋祁曰行字古本作作字今浙本亦有作字又一本題云又云桀紂之行語意常苦不了王道大壊矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆師古曰翼助也然猶不能反日以仆滅師古曰反還也還於正道也仆斃也音赴至後王而後止豈其所持操或誖謬而失其統與師古曰操執也誖乖也統緒也操音千髙反與讀曰歟後皆類此固天降命不可復反必推之於大衰而後息與師古曰息止也烏虖師古曰虖讀曰呼嗚呼歎辭也凡所為屑屑夙興夜寐務法上古者又將無補與師古曰屑屑動作之貌補益也三代受命其符安在災異之變何緣而起性命之情或夭或夀或仁或鄙師古曰夭夀命也仁鄙性也鄙謂不通也習聞其號未燭厥理師古曰燭照也伊欲風流而令行刑輕而姦改師古曰伊惟也百姓和樂政事宣昭何脩何飾而膏露降百榖登師古曰登成也宋祁曰古本飾作飭徳潤四海澤臻屮木師古曰臻至也􅋄古草字也三光全寒暑平受天之祜師古曰祜福也音怙享鬼神之靈師古曰為鬼神所歆饗徳澤洋溢施虖方外延及羣生師古曰施亦延也洋音羊施音弋䜴反子大夫眀先聖之業習俗化之變終始之序講聞髙誼之日久矣其明以諭朕師古曰諭謂曉告也科别其條勿猥勿幷師古曰猥積也并合也欲其一一疏理而言之取之於術慎其所出廼其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害師古曰極中也公卿執事有不忠直而阿枉者皆令言之朕自發書不有漏泄勿懼有後害而不言也子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發徳音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天廼先出災害以譴告之師古曰譴責也不知自省又出怪異以警懼之師古曰省視也尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣師古曰彊音其兩反此下亦同彊勉學問則聞見博而知益眀彊勉行道則徳日起而大有功此皆可使還至而立有效者也師古曰還讀曰旋旋速也宋祁曰越本無立字詩曰夙夜匪解師古曰大雅烝民之詩也解讀曰懈懈怠也其下亦同書云茂哉茂哉師古曰虞書咎繇謨之辭也茂勉也皆彊勉之謂也道者所繇適於治之路也師古曰繇讀與由同由從也適往也仁義禮樂皆其具也故聖王已没而子孫長久安寧數百嵗此皆禮樂敎化之功也王者未作樂之時廼用先王之樂宜於世者而以深入敎化於民敎化之情不得雅頌之樂不成故王者功成作樂樂其徳也樂者所以變民風化民俗也其變民也易其化人也著師古曰著明也易音弋豉反著音竹筯反故聲發於和而本於情接於肌膚臧於骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也宋祁曰古本齊作亝夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道師古曰繇讀與由同下亦類此是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之徳興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱誦至今不絶此夙夜不解行善之所致也孔子曰人能𢎞道非道𢎞人也師古曰論語載孔子之言也言明智之人則能行道内無其質非道所化故治亂廢興在於已非天降命不得可反劉敞曰當云不可得反其所操持誖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為烏師古曰今文尚書泰誓之辭也謂伐紂之時有此瑞也復歸也音扶目反宋祁曰古本流字上有而字存而句緩而文此盖受命之符也周公曰復哉復哉師古曰周公視火烏之瑞乃曰復哉復哉復報也言周有盛徳故天報以此瑞也亦見今文㤗誓也劉奉世曰復當為覆聲字之誤也孔子曰德不孤必有鄰師古曰論語載孔子之言也鄰近也言脩徳者不獨空為之而已必有近助也皆積善絫德之效也師古曰絫古累字及至後世淫佚衰㣲師古曰佚與逸同不能統理羣生諸侯背畔殘賊良民以爭壤土廢徳敎而任刑罰刑罰不中則生邪氣師古曰中音竹仲反邪氣積於下怨惡畜於上師古曰畜讀曰蓄畜聚也上下不和則隂陽繆盭而妖孽生矣師古曰盭古戾字孽災也此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹羙師古曰陶以喻造瓦冶以喻鑄金也言天之生人有似於此也粹純也有治亂之所生故不齊也宋祁曰古本齊作亝孔子曰君子之德風也小人之德􅋄也屮上之風必偃師古曰論語載孔子之言也言人之從化若草遇風則偃仆也宋祁曰風也􅋄也越本無兩也字故堯舜行徳則民仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為師古曰甄作瓦之人也鈞造瓦之法其中旋轉者甄音吉延反猶金之在鎔唯冶者之所鑄師古曰鎔謂鑄器之模範也鎔音容綏之斯倈動之斯和此之謂也師古曰論語載子貢對陳子禽之言也綏安也言治國家者安之則競來動之則和悦耳臣謹案春秋之文求王道之端得之於正師古曰謂正月也音之成反宋祁曰正越本作之盛反正次王王次春師古曰解春秋書春王正月之一句也春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在隂陽陽為徳隂為刑刑主殺而徳主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虛不用之處以此見天之任徳不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名蘇林曰卒以陽名嵗尚徳不尚刑也師古曰謂年首稱春也即上所云王次春者是也此天意也王者承天意以從事故任徳敎而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也今廢先王徳敎之官而獨任執法之吏治民毋乃任刑之意與師古曰與讀曰歟孔子曰不敎而誅謂之虐師古曰論語載孔子之言虐政用於下而欲徳敎之被四海故難成也臣謹案春秋謂一元之意師古曰釋公始即位何不稱一年而言元年也一者萬物之所從始也元者辭之所謂大也師古曰易辭元者善之長也故曰辭之所謂大也宋祁曰辭古本作解謂一為元者視大始而欲正本也師古曰視讀曰示春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不壹於正而亡有邪氣奸其間者師古曰奸犯也音干是以隂陽調而風雨時羣生和而萬民殖五榖孰而􅋄木茂天地之間被潤澤而大豐美四海之内聞盛德而皆倈臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳯鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也師古曰鳯鳥河圖皆王者之瑞仲尼自歎有徳無位故不至也今陛下貴為天子富有四海居得致之位操可致之勢師古曰操執持也音千髙反又有能致之資師古曰資材質也行髙而恩厚知明而意羙愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以敎化不立而萬民不正也夫萬民之從利也如水之走下師古曰走音奏不以敎化隄防之不能止也是故敎化立而姦邪皆止者其隄防完也敎化廢而姦邪並出刑罰不能勝者其隄防壊也古之王者明於此是故南面而治天下莫不以敎化為大務立太學以敎於國設庠序以化於邑師古曰庠序敎學之處也所以養老而行禮焉禮學記曰古之敎者家有塾黨有庠術有序國有學也漸民以仁摩民以誼師古曰漸謂浸潤之也摩謂砥礪之也節民以禮故其刑罰甚輕而禁不犯者敎化行而習俗美也聖王之繼亂世也掃除其迹而悉去之師古曰去亦除也音丘吕反復脩敎化而崇起之敎化已明習俗已成子孫循之師古曰循順也順而行之行五六百嵗尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先聖之道而顓為自恣茍簡之治蘇林曰茍為簡易之治也師古曰此説非也茍謂茍於權利也簡謂簡於仁義也簡易乾坤之徳豈秦所行乎顓與專同故立為天子十四嵗而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也師古曰濟益也宋祁曰濟古作㴉其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冐殊扞文頴曰扞突也師古曰口不道忠信之言為嚚心不則徳誼之經為頑抵觸也冐犯也殊絶也扞拒也冐讀如字又音莫克反孰爛如此之甚者也孔子曰腐朽之木不可彫也糞土之牆不可圬也師古曰論語載孔子之言也圬鏝也所以泥飾牆也言内質弊壊不可脩治也圬音一胡反鏝音莫干反今漢繼秦之後如朽木糞牆矣雖欲善治之亡可柰何法出而姦生令下而詐起師古曰下音胡亞反如以湯止沸抱薪救火愈甚亡益也宋祁曰越本甚作其甚與其小差則成誤矣然其字施於此則未安也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者宋祁曰越本無上一善字然善治要須複語不容上言治而下言善治也浙本亦同有善字失之於當更化而不更化也古人有言曰臨淵羡魚不如退而結網師古曰言當自求之今臨政而願治七十餘嵗矣不如退而更化更化則可善治善治則災害日去福禄日來詩云宜民宜人受禄于天師古曰大雅假樂之詩也為政而宜於民者固當受祿于天夫仁誼禮知信五常之道王者所當脩飭也宋祁曰越本飭作飾下亦同五者脩飭故受天之祐而享鬼神之靈徳施于方外延及羣生也天子覽其對而異焉乃復冊之曰宋祁曰景徳本冊作䇿制曰盖聞虞舜之時游於巖廊之上文頴曰巖廊殿下小屋也晉灼曰堂邊廡巖廊謂嚴峻之廊也師古曰晉説是也宋祁曰古本浙本廊並作郎余按廊本作郎後人加广而俗人作郎則驚而不喜更改為廊吁可惜耶垂拱無為而天下太平周文王至於日昃不暇食師古曰昃亦昊字而宇内亦治夫帝王之道豈不同條共貫與師古曰與讀曰歟何逸勞之殊也盖儉者不造𤣥黄旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興師古曰兩觀謂闕也大路玉路之車也干盾也戚鉞也朱丹其盾玉為戚把也佾列也舞者之行列也一列八人天子八列六十四人也夫帝王之道豈異指哉師古曰言意趣不同或曰良玉不瑑師古曰瑑謂彫刻為文也音篆下皆類此又云非文亡以輔徳二端異焉殷人執五刑以督姦傷肌膚以懲惡師古曰督視責也懲止也成康不式四十餘年師古曰式用也成康之時刑措不用天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉師古曰耗虗也言用刑酷烈誅殺甚衆天下空虛也耗音呼到反或曰耗不明也言刑罰闇亂音莫報反烏虖師古曰虖讀曰呼朕夙寤晨興師古曰夙早也寤寐之覺也興起也覺音工孝反惟前帝王之憲師古曰憲法也永思所以奉至尊章洪業師古曰永深也章明也洪大也皆在力本任賢師古曰力本謂勤力行於本業也本謂農也今朕親耕藉田以為農先勸孝弟崇有徳使者冠盖相望問勤勞恤孤獨盡思極神功烈休徳未始云獲也今隂陽錯繆氛氣充塞師古曰氛惡氣也充滿也羣生寡遂黎民未濟師古曰遂成也宋祁曰濟古作㴉下同廉恥貿亂賢不肖渾殽師古曰貿易也渾殽雜也貿音武又反渾音胡本反未得其真故詳延特起之士意庶㡬乎師古曰詳盡也一曰審也宋祁曰古浙本有意字他本無但云庶㡬乎則促而不緩必待意字句乃自安今子大夫待詔百有餘人或道世務而未濟稽諸上古而不同考之于今而難行毋乃牽於文繫而不得騁與師古曰牽於文繫謂懼於文吏之法將所繇異術所聞殊方與師古曰繇讀與由同方謂道也各悉對著于篇師古曰悉謂盡意而對也毋諱有司師古曰言不當忌畏有司而不極言明其指略切磋究之以稱朕意師古曰究極也磋音千何反仲舒對曰臣聞堯受命以天下為憂而未以位為樂也宋祁曰古本位字上有在字故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔徳賢能佐職敎化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道師古曰從音千容反中音竹仲反故孔子曰如有王者必世而後仁此之謂也師古曰論語載孔子之言也言如有受命王者必三十年仁政乃成堯在位七十載廼遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟師古曰辟讀曰避乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡羙矣又盡善也師古曰韶舜樂也孔子嘉舜之徳故聼其樂而云盡善盡羙矣此之謂也至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海師古曰謂若鼔方叔播鼗武少師陽之屬也事在禮樂志天下耗亂萬民不安師古曰耗不明也音莫報反故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚於朝廷臣瓚曰皆文王賢臣愛施兆民天下歸之故太公起海濱而即三公也師古曰濱涯也即就也濱音賓又音頻當此之時紂尚在上尊卑昬亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉師古曰見顯示也繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也師古曰亦論語載孔子之言也武周武王樂也以其用兵伐紂故有慙徳未盡善也此之謂也臣聞制度文采𤣥黄之飾所以明尊卑異貴賤而勸有徳也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固師古曰論語載孔子之言遜順也固陋也儉非聖人之中制也臣聞良玉不瑑資質潤羙不待刻瑑此亡異於達巷黨人不學而自知也孟康曰人項槖也然則常玉不瑑不成文章君子不學不成其徳臣聞聖王之治天下也少則習之學長則材諸位服䖍曰在位當知材知日有益於政也應劭曰隨其材之優劣而授之位也師古曰應説近之謂授之位以試其材也爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦敎化之漸而仁誼之流宋祁曰古本流作㳅非獨傷肌膚之效也至秦則不然師申商之法師古曰申申不害也商商鞅也行韓非之説憎帝王之道以貪狼為俗師古曰狼性皆貪故謂貪為貪狼也非有文徳以敎訓於天下也宋祁曰景徳本無天字古本有誅名而不察實師古曰誅責也為善者不必免而犯惡者未必刑也是以百官皆飾空言虛辭而不顧實宋祁曰景祐本無空言二字古本有外有事君之禮内有背上之心造偽飾詐趣利無恥又好用憯酷之吏師古曰憯痛也音千感反賦歛亡度竭民財力百姓散亡不得從耕織之業羣盗並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥師古曰論語載孔子之言也言以政法敎導之以刑戮整齊之則人茍免而已無恥愧也宋祁曰古本齊作亝此之謂也今陛下并有天下海内莫不率服廣覽兼聼極羣下之知盡天下之美至徳昭然施于方外夜郎康居殊方萬里説徳歸誼師古曰夜郎西南夷也康居西域國也説讀曰悦此太平之致也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣宋祁曰浙本尊作遵行其所知則光大矣髙眀光大不在於它在乎加之意而已師古曰曾子之書也曾子曾參願陛下因用所聞設誠於内而致行之則三王何異哉陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟徃古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也師古曰厲謂勸勉之也一曰砥礪其行也夫不素養士而欲求賢譬猶不瑑玉而求文采也宋祁曰景祐本瑑作琢當從此本故養士之大者莫大虖太學太學者賢士之所闗也師古曰闗由也教化之本原也今以一郡一國之衆對亡應書者師古曰書謂舉賢良文學之詔書也是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也宋祁曰古本流作㳅故師帥不賢則主徳不宣恩澤不流今吏既亡敎訓於下或不承用主上之法暴虐百姓與姦為市師古曰言小吏有為姦欺者守令不舉乃反與之交易求利也貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未㴉皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也師古曰訾與資同且古所謂功者以任官稱職為差師古曰差次也非所謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐師古曰害猶妨也是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積久以致官是以廉恥質亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也師古曰授之以官以使其材也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄徳而定位師古曰錄謂存視也則廉恥殊路賢不肖異處矣陛下加惠寛臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復冊之宋祁曰浙本之字下有曰字二曰雖相重史體則然制曰盖聞善言天者必有徴於人師古曰徴證也善言古者必有驗於今故朕埀問虖天人之應上嘉唐虞下悼桀紂􅎊㣲􅎊滅􅎊明􅎊昌之道師古曰􅎊古浸字􅎊漸也虛心以改今子大夫明於隂陽所以造化習於先聖之道業宋祁曰所以予按古本無以字語徑易了浙本道作遺文典可從作道傳寫誤耳然而文采未極豈惑虖當世之務哉條貫靡竟統紀未終意朕之不明與聼若眩與師古曰眩惑也音郡縣之縣與皆讀曰歟夫三王之敎所祖不同而皆有失師古曰祖始也或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之師古曰悉盡也究竟也復反復重言之也復音扶目反詩不云虖嗟爾君子母常安息神之聽之介爾景福師古曰小雅小明之詩也安息安處也介助也景大也言人君不當茍自安處而已若能靖㳟其位直道而行則神聼而知之助以大福也朕將親覽焉子大夫其茂明之師古曰茂勉也仲舒復對曰臣聞論語曰有始有卒者其唯聖人虖師古曰論語載子夏之言卒終也言終始如一者惟聖能之宋祁曰景祐本注子夏作孔子今陛下幸加惠留聼於承學之臣師古曰言轉承師説而學之盖謙辭也復下明冊以切其意而究盡聖徳非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也冊曰善言天者必有徴於人善言古者必有驗於今臣聞天者羣物之祖也故徧覆包函而無所殊師古曰函與含同殊異也建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私師古曰溥徧也音普布徳施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之師古曰繇讀與由同下皆類此天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者脩敎訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不脩亡以化民民以故棄行誼而死財利是以犯法而罪多宋祁曰犯法古本浙本並作法犯予謂法犯罪多語中輕重自偶易之非是一嵗之獄以萬千數以此見古之不可不用也師古曰古謂古法也故春秋變古則譏之天令之謂命命非聖人不行質樸之謂性性非敎化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明敎化民以成性也正法度之宜别上下之序以防欲也脩此三者而大本舉矣人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長㓜之施師古曰施設也陳設其序粲然有文以相接師古曰粲明貌驩然有恩以相愛此人之所以貴也生五榖以食之桑麻以衣之師古曰食讀曰飤衣音於既反六畜以養之服牛乘馬圏豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴師古曰孝經載孔子之言也性生也明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善師古曰處於善道以為安安處善然後樂循理師古曰循順也樂循理然後謂之君子故孔子曰不知命亡以為君子師古曰論語載孔子之言也此之謂也冊曰上嘉唐虞下悼桀紂􅎊㣲􅎊滅􅎊明􅎊昌之道虛心以改臣聞衆少成多積小致鉅師古曰鉅大也故聖人莫不以晻致明以㣲致顯師古曰晻與暗同是以堯發於諸侯師古曰謂從唐侯升天子之位舜興虖深山孟康曰舜耕於歴山非一日而顯也盖有漸以致之矣言出於已不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎㣲者著師古曰能盡衆小則致髙大能慎至㣲則著明也詩云惟此文王小心翼翼師古曰大雅大明之詩也翼翼㳟肅貌故堯兢兢日行其道而舜業業日致其孝師古曰兢兢戒慎也業業危懼也善積而名顯徳章而身尊此其􅎊明􅎊昌之道也積善在身猶長日加益而人不知也師古曰長言身形之脩短自㓜及壮也積惡在身猶火之銷膏而人不見也非眀虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也師古曰鄉讀曰響故桀紂暴謾師古曰謾與慢同讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天師古曰晏然自安意也如日在天言終不墜亡也終陵夷而大壊夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其􅎊微􅎊滅之道也册曰三王之敎所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道師古曰復謂反復行之也音扶目反道者萬世亡弊弊者道之失也師古曰言有弊非道由失道故有弊先王之道必有偏而不起之處故政有眊而不行師古曰眊不明也音莫報反舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也師古曰捄古救字故孔子曰亡為而治者其舜虖師古曰論語載孔子之言改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也師古曰繼謂所受先代之次也救謂救其弊也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也師古曰論語載孔子之言謂忠敬與文因循為敎立政垂則不逺此也宋祁曰浙本云孔子曰殷因於夏禮周因於殷禮其損益可知也當考此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也師古曰言政和平不湏救弊也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致師古曰致至極也用夏之忠者劉敞曰致當屬下句陛下有明徳嘉道愍世俗之靡薄悼王道之不昭師古曰靡散也薄輕也昭明也故舉賢良方正之士論誼考問將欲興仁誼之休徳明帝王之法制師古曰休羙也建太平之道也臣愚不肖述所聞誦所學道師之言厪能勿失爾師古曰厪與僅同僅少也若廼論政事之得失察天下之息耗師古曰息生也耗虚也耗音呼到反此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古亦大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盗賊囹圄空虚徳潤草木澤被四海鳯凰來集麒麟來游以古凖今壹何不相逮之逺也安所繆盭而陵夷若是師古曰安焉也意者有所失於古之道與有所詭於天之理與師古曰與讀曰歟詭違也試迹之古返之於天黨可得見乎師古曰返謂還歸之也黨音他朗反宋祁曰姚本古字上有於字夫天亦有所分予予之齒者去其角師古曰謂牛無上齒則有角其餘無角者則有上齒宋祁曰齒字上古本浙本同有上字據注亦當有只云予之齒者是通上下殊非義理也傅其翼者兩其足師古曰傅讀曰附附著也言鳥不四足是所受大者不得取小也古之所予禄者不食於力不動於末師古曰末謂工商之業也是亦受大者不得取小與天同意者也夫已受大又取小天不能足而况人虖此民之所以囂囂苦不足也師古曰囂讀與嗸同音敖嗸嗸衆怨愁聲也身寵而載髙位師古曰載亦乗也家溫而食厚禄因乘富貴之資力以與民爭利於下民安能如之哉是故衆其奴婢多其牛羊廣其田宅博其産業畜其積委師古曰畜讀曰蓄務此而亡己以廹蹵民師古曰蹵音子育反民日削月朘孟康曰朘音揎謂轉蹇踧也蘇林曰朘音鐫石俗語謂縮肭為朘縮師古曰孟説是也揎音宣踧音子六反􅎊以大窮富者奢侈羡溢貧者窮急愁苦師古曰羡饒也讀與衍同音弋戰反窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也師古曰蕃多也音扶元反故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯師古曰公儀休之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵師古曰食菜曰茹音汝曰吾已食祿又奪園夫紅女利虖師古曰紅讀曰工古之賢人君子在列位者皆如是是故下髙其行而從其敎民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻師古曰小雅節南山之詩也節髙峻貌巖巖積石貌赫赫顯盛也師尹周太師尹氏也言三公之位人所瞻仰若山之髙也節音才結反爾好誼則民鄉仁而俗善師古曰爾汝也鄉讀曰嚮爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四靣而内望也近者視而放之師古曰放依也音甫往反逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也師古曰皇皇急速之貌也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致宼至師古曰此易解卦六三爻辭也乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣師古曰舍廢也言為君子之行者當如公儀休若廢其所行則無可為也春秋大一統者天地之常經古今之通誼也師古曰一統者萬物之統皆歸於一也春秋公羊傳隱公元年春王正月何言乎王正月大一統也此言諸侯皆係統天子不得自專也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六蓺之科孔子之術者皆絶其道勿使並進邪辟之説滅息師古曰辟讀曰僻然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉久之王問仲舒曰粤王句踐與大夫泄庸種蠡謀伐呉師古曰種大夫種也蠡范蠡也種音之勇反蠡音禮遂滅之孔子稱殷有三仁寡人亦以為粤有三仁師古曰泄庸一也大夫種二也范蠡三也桓公决疑於管仲寡人决疑於君仲舒對曰臣愚不足以奉大對師古曰大對謂對大問也聞昔者魯君問柳下惠師古曰魯大夫展禽也柳下所食采邑之名惠諡也吾欲伐亝何如柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問爾且猶羞之師古曰徒但也况設詐以伐呉虖繇此言之粤本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯師古曰伯讀曰霸次下亦同為其先詐力而後仁誼也茍為詐而已故不足稱於大君子之門也張晏曰仲尼之門故稱大也五伯比於他諸侯為賢其比三王猶武夫之與羙玉也應劭曰武夫石而似玉者王曰善仲舒治國以春秋災異之變推隂陽所以錯行故求雨閉諸陽縱諸隂其止雨反是師古曰謂若閉南門禁舉火及開北門水灑人之類是也行之一國未嘗不得所欲中廢為中大夫先是遼東髙廟長陵髙園殿災仲舒居家推説其意屮稾未上師古曰所作起草為稾也主父偃候仲舒私見嫉之竊其書而奏焉上召視諸儒師古曰視讀曰示仲舒弟子呂歩舒宋祁曰古人舒作昌不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異仲舒為人廉直是時方外攘四夷師古曰攘郤也公孫𢎞治春秋不如仲舒而𢎞希世用事師古曰希觀相也位至公卿仲舒以𢎞為從設𢎞嫉之膠西王亦上兄也尤縱恣數害吏二千石𢎞乃言於上曰獨董仲舒可使相膠西王膠西王聞仲舒師古曰素聞其賢也大善待之宋祁曰古本大字下有儒字且謂依古本存儒字則顔不當於仲舒下作注此盖顔注時已失儒字矣仲舒恐久獲辠病免凡相兩國輒事驕王正身以率下數上疏諫爭敎令國中所居而治及去位歸居終不問家産業以脩學著書為事仲舒在家朝廷如有大議宋祁曰古本無如字使使者及廷尉張湯就其家而問之其對皆有明灋自武帝初立魏其武安侯為相而隆儒矣及仲舒對冊推明孔氏抑黜百家立學校之官師古曰校音下敎反州郡舉茂材孝廉皆自仲舒發之年老以夀終於家家徙茂陵子及孫皆以學至大官仲舒所著皆明經術之意及上疏條敎凡百二十三篇而説春秋事得失聞舉玉杯蕃露清明竹林之屬師古曰皆其所著書名也杯音布回反蕃音扶元反復數十篇十餘萬言皆傳於後世掇其切當世施朝廷者著于篇師古曰掇采拾也音丁活反贊曰劉向稱董仲舒有王佐之材雖伊呂亡以加師古曰伊伊尹呂吕望也筦晏之屬伯者之佐殆不及也師古曰筦筦仲也晏晏嬰也伯者齊桓晉文之屬也伯讀曰霸至向子歆以為伊呂乃聖人之耦師古曰耦對也宋祁曰越本無乃字王者不得則不興故顔淵死孔子曰噫天喪余師古曰事見論語噫歎聲也言失其輔佐也噫音於其反唯此一人為能當之自宰我子贛子游子夏不與焉師古曰與讀曰豫仲舒遭漢承秦滅學之後六經離析下帷發憤潛心大業令後學者有所統壹為羣儒首然考其師友淵源所漸猶未及虖游夏師古曰漸浸潤也游子游夏子夏也而曰筦晏弗及伊呂不加過矣至向曾孫龔篤論君子也以歆之言為然前漢書卷五十六前漢書卷五十六考證董仲舒傳廣川人也臣召南按志廣川屬信都國今直𨽻棗强縣有廣川鎮與景州相近即漢廣川故縣書曰白魚入于王舟有火復于王屋流為烏注今文尚書泰誓之詞按伏生今文無泰誓篇此偽泰誓文也西京諸儒並信以為真故白魚赤烏之説司馬遷亦据以入周本紀今臨政而願治七十餘嵗矣臣召南按仲舒對䇿之年先儒疑而未定漢書武紀載于元光元年與公孫宏並列既失之太後通鑑据史記武帝即位為江都相之文載于建元元年與嚴助並列亦失之太前若以仲舒此文推之則在建元五年也計漢元年至建元三年為七十嵗而五年始置五經博士即傳所謂推明孔氏抑黜百家立學校之官也至元光元年初令郡國舉孝廉各一人即傳所謂州郡舉茂才孝廉也若在建元元年豈得云七十餘嵗乎與大夫泄庸種蠡謀伐呉臣召南按泄庸師古無注疑即國語所謂舌庸者與苦成文種范蠡臯如並為大夫稱五大夫呉晉之㑹黄池也舌庸與蠡率師沿海泝淮以絶呉路泄與舌音相近而字異耳仲舒弟子吕歩舒宋祁曰古人舒作昌按人字當作本又按吕歩舒本書儒林傳及史記並同宋祁所見之古本作歩昌者非也其對皆有明法臣召南按藝文志有公羊董仲舒治獄十六篇王充曰仲舒表春秋之義稽合于律無乖異者應劭曰朝廷遣廷尉湯問得失於是作春秋决獄二百三十二事動以經對即其事也隋唐志尚有十卷玉杯蕃露清明竹林之屬注師古曰皆其所著書名也臣召南按玉杯以下並是書名而今所傳十七卷玉杯第二竹林弟三凡八十二篇總名蕃露此先儒所以疑其書或後人採綴以成也蕃露之義崔豹曰古冕之旒似露而垂前漢書卷五十六考證
