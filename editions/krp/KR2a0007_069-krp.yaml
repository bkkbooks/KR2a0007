body:
  text: 前漢書卷六十九漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注趙充國辛慶忌傳第三十九趙充國字翁孫隴西上邽人也師古曰邽音圭後徙金城令居師古曰令音零始為騎士以六郡良家子善騎射補羽林服䖍曰金城隴西天水安定北地上郡是也師古曰隴西天水安定北地上郡西河是也昭帝分隴西天水置金城充國自武帝時已為假司馬則初以六郡良家子者非金城也此名數正與地理志同也為人沈勇有大略少好將帥之節而學兵法通知四夷事師古曰通知者謂明曉也武帝時以假司馬從貳師將軍擊匈奴大為虜所圍漢軍乏食數日死傷者多充國廼與壯士百餘人潰圍陥陳貳師引兵隨之遂得觧身被二十餘創貳師奏狀詔徴充國詣行在所武帝親見視其創嗟歎之拜為中郎遷車騎將軍長史昭帝時武都氐人反師古曰氐音丁奚反充國以大將軍䕶軍都尉將兵擊定之遷中郎將將屯上谷師古曰領兵屯於上谷也將音子亮反還為水衡都尉擊匃奴獲西祁王文穎曰匈奴王也擢為後將軍兼水衡如故與大將軍霍光定册尊立宣帝封營平侯本始中為蒲類將軍征匈奴斬虜數百級還為後將軍少府匈奴大發十餘萬騎南旁塞至符奚盧山師古曰旁依也音歩浪反劉敞曰按百官表本始年後少府皆有姓名充國未嘗為之亦未嘗有將軍兼少府者明此府字是時字少時猶言無幾也欲入為㓂亡者題除渠堂降漢言之遣充國將四萬騎屯縁邉九郡文穎曰五原朔方之屬也師古曰九郡者五原朔方雲中代郡鴈門定襄北平上谷漁陽也四萬騎分屯之而充國縂統領之單于聞之引去是時光禄大夫義渠安國使行諸𦍑師古曰行音下更反先零豪言願時渡湟水北鄭氏曰零音憐孟康曰豪帥長也師古曰湟水出金城臨𦍑塞外東入河湟水之北是漢地湟音皇劉奉世曰湟北非謂漢地也𦍑意欲稍北近匈奴合而為㓂安國不知其情故受其詞詳下文可見逐民所不田䖏畜牧安國以聞充國劾安國奉使不敬是後𦍑人旁緣前言抵冒渡湟水師古曰旁依也抵冒犯突而前旁音歩浪反冒音莫北反宋祁曰冒作莫報反郡縣不能禁元康三年先零遂與諸羌種豪二百餘人觧仇交質盟詛師古曰羌人無大君長而諸種豪遁相殺伐故每有仇讎徃来相報今觧仇交質者自相親結欲入漢為㓂也上聞之以問充國對曰羌人所以易制者以其種自有豪數相攻擊埶不壹也徃三十餘嵗西羌反時亦先觧仇合約攻令居師古曰合約共為要契也與漢相距五六年廼定至征和五年先零豪封煎等通使匈奴師古曰煎讀曰翦匈奴使人至小月氏師古曰氏音支傳告諸羌曰漢貳師將軍衆十餘萬人降匈奴羌人為漢事苦師古曰事使役張掖酒泉本我地地肥美可共擊居之以此觀匈奴欲與羌合非一世也間者匈奴困於西方聞烏桓来保塞恐兵復從東方起數使使尉黎危須諸國設以子女貂裘欲沮觧之師古曰設謂開許之也沮壊也欲壊其計令觧散之沮音才汝反其計不合疑匈奴更遣使至羌中道從沙隂地出鹽澤過長阬入窮水塞南抵屬國與先零相直師古曰直當也臣恐羌變未止此且復結聫他種宜及未然為之備師古曰未然者其計未成後月餘羌侯狼何果遣使至匈奴藉兵師古曰藉借也欲擊鄯善敦煌以絶漢道師古曰鄯音善充國以為狼何小月氏種在陽闗西南埶不能獨造此計疑匈奴使已至羌中先零䍐开廼觧仇作約蘓林曰䍐开在金城南師古曰䍐开羌之别種也此下言遣开豪雕庫宣天子至徳䍐开之屬皆聞知明䛇其下又云河南大开小开則䍐羌开羌姓族殊矣开音口堅反而地理志天水有䍐开縣盖以此二種羌來降䖏之此地因以名縣也而今之羌姓有䍐井者總是䍐开之類合而言之因為姓耳變开為井字之訛也到秋馬肥變必起矣宜遣使者行邊兵豫為備敇視諸羌毋令觧仇師古曰行音下更反視讀曰示示語之也其下並同宋祁曰觧仇上疑有復字以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善惡安國至召先零諸豪三十餘人以尤桀黠皆斬之師古曰桀堅也言不順從也黠惡也為惡堅也縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉師古曰恐中國汎怒不信其心而納嚮之鄉讀曰嚮劉奉世曰恐怒且恐且怒也羌未有變而漢吏無故誅殺其人故楊玉等謂漢無所信向於是與他族皆叛也遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹師古曰浩音誥亹音門水名也觧在地理志為虜所擊失亡車重兵器甚衆師古曰重音直用反安國引還至令居以聞是嵗神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人師古曰度計也音大各反其下亦同充國曰百聞不如一見兵難隃度鄭氏曰隃遥也三輔言也師古曰隃讀作遥臣願馳至金城圖上方略師古曰圖其地形并為攻討方略俱奏上也然羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂師古曰屬委也音之欲反上笑曰諾充國至金城須兵滿萬騎師古曰須待也欲渡河恐為虜所遮即夜遣三校銜枚先渡師古曰銜枚者欲其無聲使虜不覺渡輙營陳㑹眀畢遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望陿中亡虜文穎曰金城有三陿在南六百里師古曰山陗而夾水曰陿四望者陿名也陿音狹夜引兵上至落都服䖍曰山名也召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數十人守杜四望陿中兵豈得入哉師古曰杜塞也充國常以逺斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府孟康曰在金城日饗軍士師古曰日饗飲之士皆欲為用虜數挑戰充國堅守捕得生口言羌豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲壹鬭而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒胡越騎為支兵至令居虜竝出絶轉道師古曰竝猶俱也轉道運糧之道也竝讀如字又音歩浪反劉奉世曰竝猶具爾羣聚不一同出鈔絶故曰竝也何煩曲觧下文分兵竝出又當為且邪卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間虜蘇林曰疏捜索也師古曰疏字本作疏言尋跡而捕之也通轉道津渡宋祁曰渡姚改作度初䍐开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪廼遣歸告種豪大兵誅有罪者明白自别母取并滅師古曰言勿相和同自取滅亡天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降䍐开及劫略者解𣪚虜謀徼極廼擊之師古曰徼要也要其倦極者也徼音工堯反時上已發三輔太常徒弛刑師古曰弛刑謂不加鉗􅎂者也弛之言觧也音式爾反三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛埶不可久或曰至秋冬廼進兵此虜在竟外之册師古曰竟讀曰境今虜朝夕為宼土地寒苦漢馬不能冬師古曰能讀曰耐屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵竝出張掖酒泉合擊䍐开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子師古曰亶讀曰但復引兵還冬復擊之大兵仍出虜必震壊師古曰仍頻也天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回逺千里師古曰回謂路紆曲也音胡悔反以一馬自佗負三十日食師古曰佗音徒何反凡以畜産載負物者皆為佗為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍引去師古曰商計度也宋祁曰稍引去當更添一稍字逐水􅋄入山林師古曰􅋄古草字隨而深入虜即據前險守後阸以絶糧道必有傷危之憂為夷狄笑千載不可復師古曰復音扶目反而武賢以為可奪其畜産虜其妻子此殆空言非至計也師古曰殆僅也又武威縣張掖日勒皆當北塞有通谷水草師古曰日勒張掖之縣臣恐匈奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域師古曰要遮也杜塞也其郡兵尤不可發先零首為畔逆它種劫略師古曰言被劫略而反叛非其本心故臣愚册欲捐䍐开闇昧之過隠而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯師古曰拊古撫字輯與集同此全師保勝安邊之册天子下其書公卿議者咸以為先零兵盛而負䍐开之助師古曰負恃也不先破䍐开則先零未可圖也上廼拜侍中樂成侯許延夀為强弩將軍即拜酒泉太守武賢為破羌將軍師古曰即就也就其郡而拜之賜璽書嘉納其册以書敕讓充國曰師古曰讓責也皇帝問後將軍甚苦暴露將軍計欲至正月廼擊䍐羌羌人當獲麥已逺其妻子師古曰徙其妻子令逺居而身來為宼也精兵萬人欲為酒泉燉煌宼邊兵少民守保不得田作今張掖以東粟石百餘芻槀束數十師古曰皆謂錢直之數言其貴轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食師古曰此畜謂畜産牛羊之屬也食謂穀麥之屬也一曰畜食畜之所食即謂草也欲至冬虜皆當畜食師古曰此畜讀曰蓄蓄聚積也多蔵匿山中依險阻將軍士寒手足皸瘃文穎曰皸坼裂也瘃寒創也師古曰皸音軍瘃音竹足反寜有利哉將軍不念中國之費欲以嵗數而勝微師古曰久歴年嵗乃勝小敵也數音所具反劉奉世曰㣲無也讀當屬下句言雖無充國誰不樂此安便也將軍誰不樂此者師古曰言凡為將軍者皆樂此今詔破羌將軍武賢將兵六千一百人燉煌太守快將二千人長水校尉富昌酒泉侯奉世將婼月氏兵四千人服䖍曰婼音兒羌名也蘇林曰婼音兒遮反師古曰蘇音是也亡慮萬二千人師古曰亡慮大計也觧在食貨志齎三十日食以七月二十二日擊䍐羌入鮮水北句亷上服䖍曰句音鉤師古曰句亷謂水岸曲而有亷稜也去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來宋祁曰並來越本作正來分散其心意離其黨與雖不能殄滅當有瓦觧者已詔中郎將卬將胡越佽飛射士歩兵二校益將軍兵今五星出東方中國大利蠻夷大敗張晏曰五星所聚其下勝羌人在西星在東則為漢太白出髙用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國旣得讓以為將任兵在外便宜有守以安國家師古曰言為將之道受任行兵於外雖受詔命若有便宜則當固守以取安利也廼上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使䍐諭告以大軍當至漢不誅䍐以觧其謀恩澤甚厚非臣下所能及臣獨私美陛下盛徳至計亡已故遣开豪雕庫宣天子至徳䍐开之屬皆聞知眀詔今先零羌楊玉此羌之首帥名王將騎四千及煎鞏騎五千阻石山木候便為宼師古曰謂依阻山之木石以自保固䍐羌未有所犯今置先零先擊䍐釋有罪誅無辜師古曰釋置也放也起壹難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人師古曰皆兵法之辭也致人引致而取之也致於人為人所引也今䍐羌欲為燉煌酒泉㓂宜飭兵馬練戰士以須其至師古曰飭整也須待也飭與勑同也坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道師古曰釋廢也宋祁曰廢也姚改作廢棄臣愚以為不便先零羌虜欲為背畔故與䍐开觧仇結約然其私心不能亡恐漢兵至而䍐开背之也臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施徳於䍐羌堅其約合其黨師古曰施徳自樹恩徳也虜交堅黨合精兵二萬餘人廹脇諸小種附著者稍衆莫須之屬不輕得離也服䖍曰莫須小種羌名也如是虜兵寖多師古曰寖漸也誅之用力數倍臣恐國家憂累繇十年數不二三嵗而已師古曰累音力瑞反繇與由同臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為眀詔填溝壑死骨不朽亡所顧念獨思惟兵利害至孰悉也於臣之計先誅先零已則䍐开之屬不煩兵而服矣先零已誅而䍐开不服渉正月擊之得利之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚觧弛師古曰觧讀曰懈弛放也望見大軍棄車重欲渡湟水師古曰重直用反道阸狹充國徐行驅之或曰逐利行遲師古曰逐利宜疾今行太遲充國曰此窮㓂不可廹也緩之則走不顧急之則還致死師古曰謂更廻還盡力而死戰諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至䍐地令軍毋燔聚落芻牧田中師古曰不得燔燒人居及於田畝之中刈芻放牧也䍐羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得復還故地服䖍曰靡忘羌帥名也宋祁曰復還一本作還復充國以聞未報靡忘來自歸充國賜飲食遣還諭種人䕶軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營師古曰茍取文墨之便而自營衛便音頻面反非為公家忠計也師古曰為于偽反語未卒璽書報令靡忘以贖論後䍐竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦脚脛寒泄師古曰脛膝以下骨也寒泄下利也言其患足脛又苦下利脛音下定反泄音息列反將軍年老加疾一朝之變不可諱師古曰恐其死朕甚憂之今詔破羌將軍詣屯所為將軍副急因天時大利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌彊弩將軍時羌降者萬餘人矣充國度其必壊欲罷騎兵屯田以待其敝作奏未上㑹得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保師古曰繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪師古曰言豫防之可無今日之㓂也徃者舉可先行羌者吾舉辛武賢師古曰行音下更反丞相御史復白遣義渠安國竟沮敗羌師古曰沮壊也音才汝反金城湟中榖斛八錢吾謂耿中丞服䖍曰耿夀昌也為司農中丞糴二百萬斛榖羌人不敢動矣師古曰言豫儲糧食可以制敵耿中丞請糴百萬斛廼得四十萬斛耳義渠冄使且費其半失此二册羌人故敢為逆失之豪釐差以千里是旣然矣今兵久不决四夷卒有動揺相因而起師古曰卒讀曰猝雖有知者不能善其後羌獨足憂邪師古曰言儻如此則所憂不獨在羌吾固以死守之眀主可為忠言遂上屯田奏曰臣聞兵者所以眀徳除害也故舉得於外則福生於内不可不慎臣所將吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石師古曰茭乾芻也藁禾稈也石百二十斤稈音工旱反難久不觧繇役不息又恐它夷卒有不虞之變師古曰卒讀曰猝相因並起為明主憂誠非素定廟勝之册師古曰廟勝謂謀於廟堂而勝敵也且羌虜易以計破難用兵碎故也臣愚以為擊之不便宋祁曰故也當作也故計度臨羌東至浩亹師古曰度音大各反羌虜故田宋祁曰故田姚刪故字及公田民所未墾可二千頃以上其間郵亭多壊敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者合凡萬二百八十一人用榖月二萬七千三百六十三斛鹽三百八斛分屯要害䖏氷觧漕下繕鄉亭浚溝渠師古曰漕下以水運木而下也繕補也浚深治也治湟陿以西道橋七十所令可至鮮水左右田事出賦人二十畮師古曰田事出謂至春人出營田也賦謂班與之也畮古畝字至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草師古曰倅副也什二者千騎則與副馬二百匹也伉音口浪反為田者遊兵以充入金城郡益積畜省大費師古曰畜讀曰蓄今大司農所轉榖至者足支萬人一嵗食謹上田處及器用簿師古曰簿音歩户反唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時伏誅兵當何時得决孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝師古曰此兵法之辭也言先自完堅令敵不䏻勝我乃可以勝敵也蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草師古曰薦稠草愁於寄託逺遯骨月離心人有畔志而明主般師罷兵鄧展曰般音班班還也萬人留田順天時因地利以待可勝之虜雖未即伏辜兵决可期月而望羌虜瓦觧前後降者萬七百餘人及受言去者凡七十輩如淳曰羌胡言欲降受其言遣去者師古曰如説非也謂羌受充國之言歸相告喻者也羌虜即羌賊耳無豫於胡也宋祁曰七十疑作五十七此坐支觧羌虜之具也臣謹條不出兵留田便宜十二事歩兵九校師古曰一部為一校也吏士萬人留屯以為武備因田致榖威徳並行一也又因排折羌虜令不得歸肥饒之墬師古曰墬古地字也貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也師古曰並且也讀如本字又音歩浪反劉奉世曰居民得並田作並亦俱也軍馬一月之食度支田士一嵗師古曰度音大各反罷騎兵以省大費四也至春省甲士卒循河湟漕榖至臨羌以眎羌虜師古曰眎亦示字揚威武傳世折衝之具五也以閒暇時下所伐材師古曰閒讀曰閑繕治郵亭充入金城六也兵出乗危徼幸師古曰言不可必勝不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患師古曰離遭也墯謂因寒瘃而墯指者也坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乗閒之埶九也師古曰閒謂軍之間隙者也又亡驚動河南大开小开服䖍曰皆羌種在河西之河南也使生它變之憂十也治湟陿中道橋令可至鮮水以制西域信威千里師古曰信讀曰申從枕席上過師十一也鄭氏曰橋成軍行安易若於枕席上過也大費旣省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長册唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之虜雖未伏誅兵决可期月而望期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效五年時不分别人而并擊我如淳曰此語謂本始五年伐先零不分别大小开本意是以大小开有此言也劉奉世曰本始年未伐先零此即元康五年未改神爵已前義渠安國召誅先零之時所謂無所信鄉即是今無事但羌人不能追言爾其意常恐今兵不出得亡變生與先零為一將軍孰計復奏充國奏曰臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分𣪚飢凍䍐开莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壊可日月冀逺在來春故曰兵决可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大衆攻之而不能害今留歩士萬人屯田地埶平易多髙山逺望之便部曲相保為壍壘木樵師古曰樵與譙同謂為髙樓以望敵也音才消反校聫不絶如淳曰播校相連也師古曰此校謂用木自相貫穿以為固者亦猶周易荷校滅耳也周禮校人掌王馬之政六廐成校盖用關械闌養馬也説文觧字云校木囚也亦謂以木相貫遮闌禽獸也今云校聫不絶言營壘相次便兵弩飭鬭具師古曰便利也飭整也其字從力㷭火幸通埶及并力以逸待勞兵之利者也臣愚以為屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸徳宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺渉河山而來為宼又見屯田之士精兵萬人終不敢復將其累重還歸故地師古曰累重謂妻子也累音力瑞反重音直用反是臣之愚計所以度虜且必瓦觧其處師古曰各於其䖏自瓦觧不戰而自破之册也至於虜小宼盗時殺人民其原未可卒禁師古曰卒讀曰猝臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令虜絶不為小㓂則出兵可也師古曰亶讀曰但即今同是師古曰俱不䏻止小冦盗而釋坐勝之道從乘危之埶徃終不見利空内自罷敝師古曰罷讀曰疲貶重而自損非所以視蠻夷也師古曰視讀曰示又大兵一出還不可復留湟中亦未可空如是繇役復發也宋祁曰别本復下有更字且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以澹一隅師古曰澹古贍字贍給也臣愚以為不便校尉臨衆幸得承威徳奉厚幣拊循衆羌諭以明詔宜皆鄉風師古曰諭曉告之鄉讀曰嚮雖其前辭嘗曰得亡校五年宜亡它心不足以故出兵宋祁曰校當作效臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵𣪚車甲於山野雖亡尺寸之功媮得避慊之便師古曰媮茍且也慊亦嫌字而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅師古曰言不早殄滅賊也罪當萬死陛下寛仁未忍加誅令臣數得孰計師古曰數音所角反其下亦同愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輙下公卿議臣宋祁曰議臣字下當更有一議字初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍册其言常是臣任其計可必用也師古曰任保也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聽將軍將軍計善其上留屯田及當罷者人馬數將軍强食慎兵事自愛上以破羌强弩將軍數言當擊又用充國屯田䖏離𣪚恐虜犯之於是兩從其計詔兩將軍與中郎將卬出擊强弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田明年五月充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脱與煎鞏黄羝俱亡者不過四千人羌靡忘等自詭必得師古曰詭責也自以為憂責言必能得之請罷屯兵奏可充國振旅而還所善浩星賜迎説充國鄧展曰浩星姓賜名也曰衆人皆以破羌强弩出擊多斬首獲降虜以破壊宋祁曰獲作坐然有識者以為虜埶窮困兵雖不出必自服矣將軍卽見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵埶國之大事當為後法老臣不以餘命壹為陛下明言兵之利害卒死誰當復言之者師古曰卒讀曰猝卒以其意對師古曰卒終也上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉其秋羌若零離留且種兒庫師古曰且音子閭反共斬先零大豪猶非楊玉首文頴曰猶非人名也師古曰猶非及楊玉二人也宣紀作酋非而此傳作猶字疑紀誤劉奉世曰宣紀作五月斬楊玉降與此不同疑是紀誤及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黄羝之屬四千餘人降漢封若零弟澤二人為帥衆王離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君初置金城屬國以處降羌詔舉可䕶羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷師古曰使酒因酒以使氣若今言惡酒者宋祁曰小弟湯湯浙本作陽不如湯兄臨衆時湯已拜受節有詔更用臨衆後臨衆病免五府復舉湯湯數醉䣱羌人師古曰䣱音況務反師古曰即酗字也醉怒曰䣱羌人反畔卒如充國之言初破羌將軍武賢在軍中時與中郎將卬宴語師古曰閑宴時共語也卬道車騎將軍張安世始嘗不快上如淳曰所為行不可上意上欲誅之卬家將軍以為安世本持橐簪筆張晏曰橐契囊也近臣負橐簪筆從備顧問或有所紀也師古曰橐所以盛書也有底曰囊無底曰橐簪筆者插筆於首宋祁曰橐舊音丁各反今讀又音託事孝武帝數十年見謂忠謹宜全度之師古曰全安而免度之不令喪敗也安世用是得免及充國還言兵事武賢罷歸故官深恨上書告卬泄省中語卬坐禁止而入至充國莫府司馬中亂屯兵如淳曰方見禁止而入至充國莫府司馬中司馬中律所謂營軍司馬中也下吏自殺充國乞骸骨賜安車駟馬黄金六十斤罷就第朝庭每有四夷大議常與參兵謀問籌策焉師古曰與讀曰豫宋祁曰庭改作廷年八十六甘露二年薨諡曰壯侯傳子至孫欽欽尚敬武公主主亡子主教欽良人習詐有身名它人子欽薨子岑嗣侯習為太夫人岑父母求錢財亡已忿恨相告岑坐非子免國除元始中修功臣後復封充國曾孫伋為營平侯師古曰伋音汲初充國以功徳與霍光等列畫未央宫成帝時西羌嘗有警上思將帥之臣追美充國廼召黄門郎揚雄卽充國圖畫而頌之師古曰即就也於畫側而書頌也曰明靈惟宣戎有先零先零昌狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震師古曰震合韻音真旣臨其域諭以威徳有守矜功謂之弗克請奮其旅于䍐之羌天子命我從之鮮陽應劭曰酒泉太守辛武賢自將萬騎出張掖擊羌宣帝使充國共武賢討䍐开於鮮水之陽也營平守節婁奏封章師古曰婁古屢字料敵制勝威謀靡亢師古曰料量也亢當也合韻音康遂克西戎還師於京鬼方賔服罔有不庭師古曰鬼方言其幽昧也庭來帝庭也一説庭直也昔周之宣有方有虎張晏曰方叔召虎也詩人歌功廼列于雅師古曰大雅小雅之詩也在漢中興充國作武赳赳桓桓亦紹厥後師古曰赳赳勁也桓桓威也紹厥後謂繼周之方召也充國為後將軍徙杜陵辛武賢自羌軍還後七年復為破羌將軍征烏孫至燉煌後不出徴未到病卒子慶忌至大官辛慶忌字子真少以父任為右校丞隨長羅侯常恵屯田烏孫赤谷城與歙侯戰師古曰歙即翕字也歙侯烏孫官名宋祁曰歙改作翖䧟陳郤敵恵奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將軍劉敞曰郎中車騎將軍不成文明衍軍字是歴郎中兼車騎將史省文總言之耳又曰郎中車騎將軍衍車軍字當云郎中騎將不然著車去騎為車將也朝廷多重之者轉為校尉遷張掖太守徙酒泉所在著名成帝初徴為光禄大夫遷左曹中郎將至執金吾始武賢與趙充國有隙後充國家殺辛氏至慶忌為執金吾坐子殺趙氏左遷酒泉太守嵗餘大將軍王鳳薦慶忌前在兩郡著功迹徴入歴位朝廷莫不信鄉師古曰鄉讀曰嚮質行正直仁勇得衆心通於兵事明略威重任國柱石師古曰任堪也父破羌將軍武賢顯名前世有威西夷臣鳳不能久䖏慶忌之右師古曰右上也廼復徴為光禄大夫執金吾數年坐小法左遷雲中太守復徴為光禄勲時數有災異丞相司直何武上封事曰虞有宫之竒晋獻不寐應劭曰晋獻公欲伐虞以宫之之竒在寢不寐宋祁曰注不寐下當添也字衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形師古曰厭抑也未有禍難之形豫勝之也厭音一葉反司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒師古曰卒讀曰猝謂暴也士不素厲則難使死敵是以先帝建列將之官近戚主内異姓距外故姦軌不得萌動而破滅師古曰始生曰萌誠萬世之長册也光禄勲慶忌行義修正柔毅敦厚師古曰和柔而能沈毅也尚書咎繇謩曰擾而毅擾亦柔也今流俗書本柔字作果者妄改之謀慮深逺前在邊郡數破敵獲虜外夷莫不聞廼者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之師古曰莊十八年公追戎於濟西公羊傳曰此未有伐中國者言追何大其未至而豫禦也劉敞曰衍災字宋祁曰注國者下當添其字慶忌宜在爪牙官以備不虞師古曰虞度也言有㓂難非意所度也其後拜為右將軍諸吏𣪚騎給事中嵗餘徙為左將軍慶忌居䖏恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平匈奴西域親附敬其威信年老卒官長子通為䕶羌校尉中子遵函谷闗都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人元始中安漢公王莽秉政見慶忌本大將軍鳳所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷水衡都尉茂自見名臣子孫兄弟並列不甚詘事兩甄時平帝幼外家衛氏不得在京師而䕶羌校尉通長子次兄素與帝從舅衛子伯相善師古曰次兄其字也兄讀如本字亦讀曰况兩人俱游俠賔客甚盛及吕寛事起莽誅衛氏兩甄搆言諸辛陰與衛子伯為心腹有背恩不説安漢公之謀師古曰説讀曰悦於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢師古曰繇讀與由同慶忌本狄道人為將軍徙昌陵昌陵罷留長安贊曰秦漢已來宋祁曰已當作以山東出相山西出將秦將軍白起郿人師古曰郿扶風之縣也音媚宋祁曰秦下當添時字王翦頻陽人漢興郁郅王圍甘延壽師古曰圍為强弩將軍見藝文志郁音於六反郅音質義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武亷襃狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地䖏埶廹近羌胡民俗修習戰備髙上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行師古曰小戎之詩也觧在地理志其風聲氣俗自古而然今之歌謡慷慨風流猶存耳前漢書卷六十九前漢書卷六十九考證趙充國傳以假司馬從貳師將軍擊匈奴臣召南按天漢二年事也李廣利以三萬騎出酒泉擊右賢王於天山得首虜萬餘級即此役也武都氐人反充國以大將軍䕶軍云云臣召南按昭紀元鳳元年武都氐人反遣執金吾馬適建龍頟侯韓増大鴻臚廣明將三輔太常徒皆免刑擊之然則充國以䕶軍為禆將而戰功多耳又按匈奴傳匈奴降者言匈奴方發二萬騎擊烏桓霍光欲發兵要擊之以問充國充國以為非計乃拜范明友為度遼將軍亦充國為大將軍䕶軍都尉時事也充國為水衡都尉公卿表在元鳳元年而遷後將軍在元平元年先零豪言願時渡湟水北注師古曰湟水之北是漢地劉奉世曰湟北非謂漢地也臣召南按師古注是劉奉世説非也胡三省曰羗依南山渡湟水而北固欲與匈奴合而湟北則漢地所以隔絶羌與匈奴通之路正在於此於地形可謂明曉屯備羌至浩亹注師古曰水名也觧在地理志胡三省曰縣名也屬金城郡有浩亹水出西塞外東至允吾入湟水杜佑云漢浩亹縣故城在今金城郡廣武縣西南臣願馳至金城圖上方畧胡三省曰金城郡昭帝始元六年置唐蘭鄯廓州地夜引兵上至落都注服䖍曰山名也胡三省曰据水經注破羌縣之西有落都城後漢志浩亹縣有雒都谷合擊䍐开在鮮水上者臣召南按鮮水即西海一名青海又名卑禾羌海地理志金城郡臨羌縣西北至塞外有仙海鹽池者也後書西羌傳武帝時先零羌與匈奴通㓂邊遣李息徐自為擊平之羌乃去湟中依西海鹽池左右又本書王莽傳羌豪獻鮮水海允谷鹽池地為西海郡初置金城屬國以䖏降羌王應麟曰叚熲言先零作㓂充國徙令居内始服終叛至今為鯁予以地理志考之神爵二年金城置破羌允街二縣盖䖏降羌之地羌在湟河之南而漢地在湟河之北謂之屬國置都尉以主降者羌為患不自屬國始也建武中馬援徙羌天水隴西扶風三郡永平中竇固馬武徙羌三輔於是始熾或以充國遷先零内地為非而不知金城非内地也不得不為充國辨四府舉辛武賢小弟湯胡三省曰丞相御史車騎將軍前將軍府也并後將軍為五府辛慶忌傳遷郎中車騎將軍劉敞曰是歴郎中兼車騎將史省文總言之耳云云臣召南按敞有兩説前説軍字衍後説車字及軍字衍以文義推之後説尤長車騎將軍位次大將軍未有以郎中兼者觀下文云轉為校尉遷張掖太守即知非車騎將軍矣軍字顯是衍文又按百官表郎中有車戸騎三將秩皆比二千石此文應云遷郎中騎將又誤衍一車字耳衛青在位淮南寢謀顧炎武曰謂伍被言大將軍數將習兵未易當又言雖古名將不過是為淮南所憚也前漢書卷六十九考證
