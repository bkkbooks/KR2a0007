body:
  text: 前漢書卷七十五漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注眭兩夏侯京翼李傳第四十五眭𢎞字孟魯國蕃人也師古曰眭音息隨反今河朔尚有此姓音字皆然而韋昭應劭並云音桂非也今有炅姓乃音桂耳漢之决錄又不作眭字寧可混糅將為一族又近代學者旁别炅氏譜以相附著私譜之文出於閭巷家自為說事非經典苟引先賢妄相假托無所取信寜足據乎蕃音反宋祁云决錄浙本作炔欽少時好侠鬭雞走馬長乃變節從嬴公受春秋師古曰嬴姓也公長老之號耳宋祁云侠字上疑有游字以明經為議郎至符節令孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立後有白烏數千下集其旁是時昌邑有枯社木卧復生師古曰社木社主之樹也又上林苑中大柳樹斷枯臥地亦自立生有蟲食樹葉成文字曰公孫病已立孟推春秋之意以為石柳皆隂類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起師古曰僵偃也偃臥於地音居羊反宋祁云象字下疑有而字非人力所為此當有從匹夫為天子者枯社木復生故廢之家公孫氏當復興者也孟意亦不知其所在卽説曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人孟康曰誰問差擇也問擇天下賢人䄠以帝位師古曰䄠古禪字也而退自封百里如殷周二王後以承順天命孟使友人内官長賜上此書師古曰内官署名百官表云内官長丞初屬少府中屬主爵後屬宗正賜者其長之名時昭帝幼大將軍霍光秉政惡之下其書廷尉奏賜孟妄設祅言惑衆大逆不道皆伏誅後五年孝宣帝興於民間卽位徵孟子為郎夏侯始昌魯人也通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之始昌明於隂陽先言柏梁臺災日至期日果災時昌邑王以少子愛上為選師始昌為太傅年老以壽終族子勝亦以儒顯名夏侯勝宋祁云陸徳明論語序釋文夏户雅反勝音升或式澄反一作升澄反字長公初魯共王分魯西寧鄕師古曰共讀如恭恭王名餘景帝之子也宋祁云王字下疑有時字以封子節侯别屬大河大河後更名東平故勝為東平人勝少孤好學從始昌受尚書及洪範五行傳説災異後事蕳卿師古曰姓蕳名卿蕳音姦又從歐陽氏問為學精孰所問非一師也善說禮服師古曰禮之喪服也徵為博士光祿大夫會昭帝崩昌邑王嗣立數出師古曰每出游戲也勝當乘輿前諫曰天乆隂而不雨臣下有謀上者陛下出欲何之師古曰之徃也宋祁曰輿字下疑有車字王怒謂勝為祅言縛以屬吏師古曰屬委也音之欲反吏白大將軍霍光光不舉法是時光與車騎將軍張安世謀欲廢昌邑王光譲安世以為泄語安世實不言宋祁曰言字疑作泄廼召問勝勝對言在洪範傳曰皇之不極厥罰常隂時則下人有伐上者惡察察言師古曰惡謂忌諱也察為計謀不敢明顯言之也五行志曰不敢察察言也宋祁曰注文為疑作謂故云臣下有謀劉敞曰傳本云下人伐上而勝自以為不欲分明道之故改云臣下有謀爾光安世大驚以此益重經術士後十餘日光卒與安世白太后師古曰卒終也宋祁曰白字上疑有共字廢昌邑王尊立宣帝光以為羣臣奏事東宫太后省政師古曰省視也宜知經術白令勝用尚書授太后遷長信少府賜爵關内侯以與謀廢立師古曰與讀曰豫定策安宗廟益千户劉奉世曰關内侯無國云何言益宣帝初卽位欲襃先帝詔丞相御史曰朕以渺身蒙遺徳承聖業奉宗廟夙夜惟念師古曰惟思也孝武皇帝躬仁誼厲威武北征匈奴單于遠遁南平氐𦍑劉奉世曰氐𦍑不在南恐誤昆明甌駱兩越師古曰甌駱皆越號東定薉貉朝鮮張晏曰薉也貉也在遼東之東師古曰薉字與穢字同貉音莫客反廓地斥境立郡縣百蠻率服款塞自至珍貢陳於宗廟恊音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶襃周之後宋祁曰周之後越本邵本無之備天地之禮廣道術之路上天報况師古曰况賜也符瑞並應寳鼎出白麟獲海效鉅魚師古曰效致也鉅大也神人並見山稱萬嵗功徳茂盛不能盡宣而廟樂未稱師古曰稱副也朕甚悼焉其與列侯二千石博士議於是羣臣大議廷中皆曰宜如詔書長信少府勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰亡度天下虚耗師古曰耗減也音呼到反百姓流離物故者半師古曰物故謂死也宋祁曰者字下疑有過字蝗蟲大起赤地數千里師古曰言無五榖之苖或人民相食畜積至今未復師古曰畜讀曰蓄亡徳澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非苟阿意順指議已出口雖死不悔於是丞相義御史大夫廣明師古曰蔡義田廣明劾奏勝非議詔書毁先帝不道及丞相長史黄霸阿縦勝不舉劾俱下獄有司遂請尊孝武帝廟為世宗廟奏盛徳文始五行之舞天下世世獻納以明盛徳武帝廵狩所幸郡國凡四十九皆立廟如高祖太宗焉勝霸旣乆繫霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣師古曰論語孔子曰朝聞道夕死可矣故霸引之勝賢其言遂授之繫再更冬講論不怠師古曰更歴也音工衡反至四年夏關東四十九郡同日地動或山崩壊城郭室屋殺六千餘人上乃素服避正殿遣使者弔問吏民賜死者棺錢下詔曰蓋災異者天地之戒也朕承洪業託士民之上未能和羣生曩者地震北海琅邪壊祖宗廟朕甚懼焉宋祁曰曩字疑作廼字其與列侯中二千石博問術士有以應變補朕之闕毋有所諱因大赦勝出為諫大夫給事中霸為揚州刺史勝為人質樸守正簡易亡威儀見時謂上為君師古曰見見於天子誤相字於前師古曰前天子之前也君前臣名不當相呼字也上亦以是親信之師古曰知其質樸也嘗見出道上語師古曰入見天子而以其言為外人道之上聞而譲勝師古曰譲責也勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳朝廷每有大議上知勝素直謂曰先生通正言無懲前事師古云通謂陳道之也懲創也前事謂坐議廟樂事勝復為長信少府遷太子太傅受詔撰尚書論語說師古曰解說其意若今義疏也賜黄金百斤年九十卒官賜冢塋葬平陵太后賜錢二百萬為勝素服五日以報師傅之恩儒者以為榮始勝每講授常謂諸生曰士病不明經術經術苟明其取青紫如俛拾地芥耳師古曰地芥謂草芥之横在地上者俛而拾之言其易而必得也靑紫卿大夫之服也俛卽俯字也學經不明不如歸耕勝從父子建字長卿師古曰從父昆弟之子名建字長卿自師事勝及歐陽高左右采獲師古曰言於勝及高兩處采問疑義而得宋祁曰注末當有之字又從五經諸儒問與尚書相出入者牽引以次章句具文飾說勝非之曰建所謂章句小儒破碎大道建亦非勝為學疏略難以應敵建卒自顓門名經師古曰顓與專同專門者自别為一家之學宋祁曰注顓字下當有音專字為議郎博士至太子少傅勝子兼為左曹太中大夫孫堯至長信少府司農鴻臚曾孫蕃郡守州牧長樂少府勝同産弟子賞為梁内史梁内史子定國為豫章太守而建子千秋亦為少府太子少傅京房字君明東郡頓丘人也治易事梁人焦延壽延壽字贛師古曰贛音貢贛貧賤以好學得幸梁王王共其資用師古曰共讀曰恭宋祁云王字上更冇梁字令極意學旣成為郡史察舉補小黄令以候司先知姦邪盜賊不得發師古曰以其常先知姦邪故欲為盜賊者不敢起發愛飬吏民化行縣中舉最當遷師古曰以課最而被舉故欲遷為他官也三老官屬上書願留贛有詔許増秩留師古曰依許留而増其秩宋祁曰注許字上疑有請字卒於小黄贛常曰得我道以亡身者京生也其說長於災變分六十卦更直日用事宋祁曰别本作六十四卦以風雨寒温為候孟康曰分卦直日之法一爻主一日六十四卦為三百六十日餘四卦震離兊坎為方伯監司之官所以用震離兊坎者是二至二分用事之日又是四時各專王之氣各卦主時其占法各以其日觀其善惡也師古曰更工衡反各有占驗房用之尤精好鍾律知音聲初元四年以孝亷為郎永光建昭閒西𦍑反日蝕又乆青亡光隂霧不精師古曰精謂日光清明也房數上疏先言其將然師古曰言且欲有此事近數月遠一嵗所言屢中天子說之師古曰説讀曰悦數召見問房對曰古帝王以功舉賢則萬化成瑞應著師古曰萬化萬機之事施教化者也一曰萬物之類也末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輒遷有盜賊滿三日不覺者則尉事也令覺之自除二尉負其辠率相准如此法上令公卿朝臣與房㑹議温室師古曰温室殿名也皆以房言煩碎令上下相司不可許上意鄉之師古曰鄉讀曰嚮時部刺史奏事京師上召見諸刺史令房暁以課事刺史復以為不可行唯御史大夫鄭𢎞光祿大夫周堪初言不可後善之是時中書令石顯顓權師古曰顓與專同顯友人五鹿充宗為尚書令與房同經論議相非二人用事房嘗宴見師古曰以閑宴時而入見天子問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是師古曰卒終也上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以徃知來耳宋祁曰江南本云能以性智求耳徐鍇改徃知來非是房因免冠頓首曰春秋紀二百四十二年災異以視萬世之君師古曰視讀曰示今陛下卽位已來日月失明星辰逆行山崩泉湧地震石隕夏霜冬靁師古曰靁古雷字春凋秋榮隕霜不殺水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備師古曰言今皆備有之陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與師古曰與讀曰歟上曰然幸其瘉於彼又以為不在此人也師古曰瘉與愈同愈猶勝也言今之災異及政道猶幸勝於徃日又不由所任之人房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良乆廼曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之師古曰如若也房曰上最所信任與圗事帷幄之中進退天下之士者是矣師古曰圗謀也房指謂石顯上亦知之謂房曰已諭師古曰言已暁此意房罷出後上令房上弟子暁知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍塞師古曰雍讀曰壅石顯五鹿充宗皆疾房欲遠之師古曰出之令遠去建言宜試以房為郡守師古曰立議云然也元帝於是以房為魏郡太守秩八百石居得以考功法治郡房自請願無屬刺史得除用他郡人自第吏千石以下如淳曰令長屬縣自課第殿最嵗竟乘傳奏事師古曰傳音張戀反其下亦同天子許焉房自知數以論議為大臣所非内與石顯五鹿充宗有隙不欲遠離左右及為太守憂懼房以建昭二年二月朔拜上封事曰辛酉以來䝉氣衰去太陽精明臣獨欣然以為陛下有所定也然太隂倍力而乘消息孟康曰房以消息卦為辟辟君也息卦曰太隂消卦曰太陽其餘卦曰少隂少陽謂臣下也并力雜卦氣于消息也宋祁曰注文當作息卦曰太陽消卦曰太隂臣疑陛下雖行此道猶不得如意臣竊悼懼守陽平侯鳳欲見未得至己卯臣拜為太守此言上雖明下猶勝之效也師古曰言權臣蔽主之明故已出為郡守也臣出之後恐必為用事所蔽身死而功不成故願歲盡乘傳奏事䝉哀見許廼辛巳䝉氣復乘卦太陽侵色張晏曰晉卦解卦也太陽侵色謂大壯也劉攽曰蒙氣起而太陽侵色則太陽指日也大壯解卦可云太陽而非所侵色也此上大夫覆陽而上意疑也師古曰覆掩蔽也己卯庚辰之閒必有欲隔絶臣令不得乘傳奏事者房未發上令陽平侯鳳承制詔房止無乘傳奏事房意愈恐去至新豐因郵上封事師古曰郵行書者也若今傳送文書矣郵音尤曰臣前以六月中言遯卦不效法曰道人始去寒涌水為災師古曰道人有道術之人也天氣寒而又有水涌出也至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中今涌水己出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也師古曰自云不避死也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺高而死孟康曰姓正名先秦博士也高威自此成故秦之亂正先趣之師古曰趣讀曰促今臣得出守郡自詭效功師古曰詭責也自以為憂責也恐未效而死惟陛下毋使臣塞涌水之異師古曰塞亦當也當正先之死為姚平所笑房至陕復上封事師古曰陕𢎞農之縣也音式冉反曰乃丙戌小雨丁亥䝉氣去然少隂并力而乘消息戊子益甚到五十分蒙氣復起孟康曰分一日為八十分分起夜半是為戊子之日日在已西而蒙也蒙常以晨夜今向中而蒙起是臣黨盛君不勝也此陛下欲正消息雜卦之黨并力而争消息之氣不勝彊弱安危之機不可不察己丑夜有還風盡辛卯孟康曰諸卦氣以寒温不效後九十一日為還風還風暴風也風為教令言正令還也太陽復侵色至癸巳日月相薄孟康曰京房傳曰雖非日月同宿之時隂道盛猶上薄日光如此但日無光不食也此邪隂同力而太陽為之疑也臣前白九年不改必有星亡之異張晏曰九陽數之極也孟康曰畫食為旣夜食為盡而星亡為星不見也臣願出任良試考功臣得居内星亡之異可去議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聽之此廼蒙氣所以不解太陽亡色者也臣去朝稍遠太陽侵色益甚唯陛下毋難還臣而易逆天意師古曰易輕也音弋跂反邪說雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博從房受學以女妻房房與相親毎朝見輙為博道其語師古曰所與天子言皆具說之以為上意欲用房議而羣臣惡其害已故為衆所排博曰淮陽王上親弟敏達好政欲為國忠今欲令王上書求入朝得佐助房房曰得無不可師古曰恐不可也博曰前楚王朝薦士何為不可房曰中書令石顯尚書令五鹿君相與合同巧佞之人也事縣官十餘年及丞相韋侯皆乆亡補於民可謂亡功矣師古曰韋元成也此尤不欲行考功者也淮陽王卽朝見勸上行考功事善不然但言丞相中書令任事乆而不治可休丞相以御史大夫鄭𢎞代之遷中書令置他官以鉤盾令徐立代之如此房考功事得施行矣博具從房記諸所說災異事因令房為淮陽王作求朝奏草皆持柬與淮陽王石顯微司具知之宋祁曰與疑作予下文同以房親近未敢言及房出守郡顯告房與張博通謀非謗政治歸惡天子詿誤諸侯王語在憲王傳初房見道幽厲事出為御史大夫鄭𢎞言之房博皆棄市𢎞坐免為庶人房本姓李推律自定為京氏死時年四十一翼奉字少君東海下邳人也治齊詩與蕭望之匡衡同師三人經術皆明衡為後進望之施之政事而奉惇學不仕好律歴隂陽之占元帝初卽位諸儒薦之徵待詔宦者署數言事宴見天子敬焉時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言而上封事曰臣聞之於師治道要務在知下之邪正人誠鄉正雖愚為用師古曰鄉讀曰嚮若廼懷邪知益為害宋祁曰知當讀作去聲知下之術在於六情十二律而已北方之情好也好行貪狼申子主之孟康曰北方水水生於申盛於子水性觸地而行觸物而潤多所好故多好則貪而無厭故為貪狼也宋祁曰注文故多好字多字可刪可添四字云多所好故為好多所好則貪而無厭故為貪狼東方之情怒也怒行隂賊亥卯主之孟康曰東方木木生於亥盛於卯木性受水氣而生貫地而出故為怒以隂氣賊害土故為隂賊也貪狼必待隂賊而後動隂賊必待貪狼而後用二隂並行是以王者忌子卯也禮經避之春秋諱焉李竒曰北方隂也卯又隂賊故為二隂王者忌之不舉樂春秋禮記説皆同賈氏説桀以乙卯亡紂以甲子喪惡以為戒張晏曰子刑卯卯刑子相刑之日故以為忌而云夏以乙卯亡殷以甲子亡不推湯武以興此說非也師古曰儒者以為子卯夏殷亡日大失之矣何儒亮以為學者雖駁云只取夏殷亡日不論殷周之興以為大失不博考其義且天人之際其理相符有徳者昌無徳者亡以桀紂之暴虐又遇惡日其理必亡以湯武之徳固先天而天不違所謂徳能消殃矣豈殃能消徳也劉攽曰王者忌子卯隂陽家言子邜相刑午酉自刑若相刑可忌自刑不可忌邪言夏殷亡日是也此聖人戒後世使自儆爾故當其日稷食菜羮為戒也非以其日凶也何說湯武興及徳勝殃乎今桀以丙辰滅紂以乙丑亡亦用辰丑為疾日爾南方之情惡也惡行亷貞寅午主之孟康曰南方火火生於寅盛於午火性炎猛無所容受故為惡其氣精専嚴整故為廉貞西方之情喜也喜行寛大己酉主之孟康曰西方金金生於己盛於酉金之為物喜以利刃加於萬物故為喜利刃所加無不寛大故曰寛大也二陽並行是以王者吉午酉也詩曰吉日庚午師古曰小雅吉日之詩也其詩曰吉日庚午旣差我馬言以庚午之吉日簡擇車馬以出田也上方之情樂也樂行姦邪辰未主之孟康曰上方謂北與東也陽氣所萌生故為上辰窮水也未窮木也翼氏風角曰木落歸本水流歸末故木利在亥水利在辰盛衰各得其所故樂也水窮則無隙不入木上出窮則旁行故為姦邪下方之情哀也哀行公正戌丑主之孟康曰下方謂南與西也隂氣所萌生故為下戌窮火也丑窮金也翼氏風角曰金剛火彊各歸其鄉故火刑於午金刑於酉酉午金火之盛也盛時而受刑至窮無所歸故曰哀也火性無所私金性方剛故曰公正辰未屬隂戌丑屬陽萬物各以其類應今陛下明聖虚静以待物至萬事雖衆何聞而不諭師古曰諭謂暁解之豈況乎執十二律而御六情於以知下參實亦甚優矣萬不失一自然之道也廼正月癸未日加申有暴風從西南來未主姦邪申主貪狼風以大隂下抵建前是人主左右邪臣之氣也張晏曰初元二年歲在甲戌正月二十二日癸未也太隂在太歲後孟康曰時太隂在未月建在寅風從未下至寅南也建為主氣太隂臣氣也加主氣是人主左右邪臣驗也晉灼曰癸未日風未辰也時加申張說是也平昌侯比三來見臣皆以正辰加邪時辰為客時為主人以律知人情王者之秘道也張晏曰平昌侯欲依上來學為時邪也風日加申申知秘道也孟康曰謂乙丑之日也丑為正日加未而來為邪時晉灼曰奉以未為邪時占知平昌侯為邪人此當言皆以邪辰加邪時字誤作正耳下言大邪之見辰時俱邪是也翼氏曰五行動為五音四時散為十二律也愚臣誠不敢以語邪人上以奉為中郎召問奉來者以善日邪時孰與邪日善時奉對曰師法用辰不用日孟康曰假令甲子日子為辰甲為日用子不用甲也辰為客時為主人見於明主侍者為主人張晏曰禮君燕見臣則使臣為主人故侍者為主人辰正時邪見者正侍者邪辰邪時正見者邪侍者正忠正之見侍者雖邪辰時俱正孟康曰大正厭小邪也凡辰時屬南與西為正北與東為邪晉灼曰以上占推之南方己午西方酉戌東北寅丑為正西南申未北方亥子東方辰卯為邪大邪之見侍者雖正辰時俱邪孟康曰大邪厭小正也卽以自知侍者之邪而時邪辰正見者反邪孟康曰凡占以見者為本今自知侍者邪而時復邪則邪無所施故屬見者晉灼曰上言忠正客見侍者雖邪辰時俱正然則小邪屬主人矣何以知之見者以大正來反我小邪故也卽以自知侍者之正而時正辰邪見者反正孟康曰已自知侍者正而時復正則正無所施辰雖邪而見者更正也晉灼曰上言大邪客見侍者雖正辰時俱邪然則小正屬主人矣以此法占之卽以自知主人之正而時正辰邪矣何以知之見者以大邪來反我小正故也辰為常事時為一行孟康曰假令甲子日則一日一夜為子時十二時也日加之行過也辰疏而時精其效同功必參五觀之然後可知故曰察其所繇省其進退師古曰繇與由同參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢師古曰更音工衡反宋祁曰興疑作與字觀性以歴張晏曰性謂五行也歴謂日也晉灼曰翼氏五性肝性静静行仁甲己主之心性躁躁行禮丙辛主之脾性力力行信戊癸主之肺性堅堅行義乙庚主之腎性智智行敬丁壬主之也觀情以律張晏曰情謂廉貞寛大公正姦邪隂賊貪狼也律十二律也明主所宜獨用難與二人共也故曰顯諸仁臧諸用師古曰易上繫之辭也道周萬物故曰顯諸仁日用不知故曰臧諸用也露之則不神獨行則自然矣唯奉能用之學者莫能行是歲關東大水郡國十一饑疫尤甚上廼下詔江海陂湖園池屬少府者以假貧民勿租稅損大官膳減樂府員省苑囿諸宫館稀御幸者勿繕治太僕少府減食榖馬水衡省食肉獸明年二月戊午地震其夏齊地人相食七月己酉地復震上曰蓋聞賢聖在位隂陽和風雨時日月光星辰静黎庶康寧考終厥命今朕共承天地託于公侯之上明不能燭徳不能綏災異並臻連年不息乃二月戊午地大震于隴西郡毁落太上廟殿壁木飾壞敗䝠道縣師古曰䝠音桓劉奉世曰有蠻夷曰道稱道則不稱縣也此縣字衍陽夏公曰按地理志䝠道乃天水郡十六縣之一表云列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道然則道國邑皆可謂之縣城郭官寺及民室屋厭殺人衆山崩地裂水泉涌出一年地再動天惟降災震驚朕躬治有大虧咎至於此夙夜兢兢不通大變深懷鬱悼未知其序比年不登元元困乏不勝饑寒以陷刑辟朕甚閔焉㦧怛於心師古曰㦧音千感反已詔吏虚倉廩開府臧振捄貧民師古曰捄古救字羣司其茂思天地之戒師古曰茂勉也有可蠲除減省以便萬姓者各條奏悉意陳朕過失靡有所諱師古曰悉盡也因赦天下舉直言極諫之士奉奏封事曰臣聞之於師曰天地設位懸日月布星辰分隂陽定四時列五行以視聖人名之曰道師古曰視讀曰示下類此聖人見道然後知王治之象故畫州土建君臣立律歴陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有隂陽詩有五際應劭曰君臣父子兄弟夫婦朋友也孟康曰詩内傳曰五際卯酉午戌亥也隂陽終始際㑹之歲於此則有變改之政也春秋有災異皆列終始推得失考天心以言王道之安危至秦乃不說傷之以法師古曰説音悅言不悦詩書而以文法傷文學之人也是以大道不通至於滅亡今陛下明聖深懐要道燭臨萬方師古曰燭照也布徳流惠靡有闕遺罷省不急之用振救困貧賦醫藥賜棺錢師古曰賦謂分給之恩澤甚厚又舉直言求過失盛徳純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇師古曰小雅篇名也知日蝕地震之效昭然可明猶巢居知風穴處知雨師古曰巢居烏鵲之屬也穴處狐貍之類也亦不足多適所習耳臣聞人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人之有五臧六體五臧象天六體象地故臧病則氣色發於面體病則欠伸動於貌今年太隂建於甲戌律以庚寅初用事歴以甲午從春孟康曰太隂在甲戌則太嵗在子十一月庚寅日黄鍾律初起用事也歴中甲庚律得參陽性中仁義情得公正貞廉張晏曰甲庚皆三陽甲在東方為仁庚在西方為義戌為公正寅午為廉貞晉灼曰木數三寅在東方木位之始故曰參陽也師古曰中音竹仲反百年之精歲也正以精歲本首王位張晏曰春也日臨中時接律而地大震其後連月乆隂雖有大令猶不能復師古曰大令謂虚倉廩開府庫之屬也復補也音扶目反隂氣盛矣古者朝廷必有同姓以明親親少有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓疏而難通故同姓一異姓五廼為平均今左右亡同姓獨以舅后之家為親異姓之臣又疏二后之黨滿朝非特處位埶尤奢僭過度呂霍上官足以卜之甚非愛人之道又非後嗣之長策也隂氣之盛不亦宜乎臣又聞未央建章甘泉宫才人各以百數皆不得天性師古曰言絶男女之好也若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王園與其後宫宜為設員出其過制者此損隂氣應天救邪之道也今異至不應災將隨之其法大水極隂生陽反為大旱甚則有火災春秋宋伯姬是矣師古曰伯姬魯成公女宋恭公之夫人也幽居守寡旣乆而遇火災極隂生陽也宋祁曰注文火災下疑冇故云二字唯陛下財察師古曰財與裁同明年夏四月乙未孝武園白鶴館宋祁曰館字下疑有災字奉自以為中上疏曰臣前上五際地震之效曰極隂生陽恐有火災不合明聽未見省答臣竊内不自信今白鶴館以四月乙未時加於卯月宿亢災與前地震同法臣奉廼深知道之可信也不勝拳拳願復賜間卒其終始師古曰間空隙也卒盡也上復延問以得失奉以為祭天地於雲陽汾隂及諸寢廟不以親疏迭毁皆煩費違古制又宫室苑囿奢泰難供以故民困國虛亡累年之畜所繇來乆師古曰畜讀曰蓄繇讀與由同不改其本難以末正廼上疏曰臣聞昔者盤庚改邑以興殷道聖人美之師古曰盤庚殷王名也將遷亳殷衆庶咸怨作盤庚三篇以告之遂乃遷都事見尚書也竊聞漢徳隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宫館也未央宫又無高門武臺麒麟鳳皇白虎玉堂金華之殿獨有前殿曲臺漸臺宣室温室承明耳孝文欲作一臺度用百金師古曰度計也音大各反重民之財廢而不為其積土基至今猶存師古曰今在新豐縣南驪山頂上也又下遺詔不起山墳故其時天下大和百姓洽足宋祁曰洽疑作給徳流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻黽池前鄉崧高後介大河師古曰鄉讀曰嚮介隔也礙也建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西遠羌胡之難師古曰厭抑也音一葉反遠音于萬反陛下共已亡為師古曰共讀曰恭按成周之居兼盤庚之徳萬歲之後長為高宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作如淳曰亶居猶虛居也欲徙都乃可更制度也師古曰亶讀曰但但居謂依舊都也故願陛下遷都正本衆制皆定亡復繕治宫館不急之費歲可餘一年之畜師古曰讀曰蓄次下亦同臣聞三代之祖積徳以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔師古曰召讀曰邵有司各敬其事在位莫非其人師古曰言所任皆得賢材也天下甫二世耳師古曰甫始也然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂師古曰周書亡逸篇也其書曰周公曰烏虖毋若殷王紂之迷亂酗于酒徳哉是也其詩則曰殷之未喪師克配上帝宜監于殷駿命不易師古曰詩大雅文王之詩也師衆也駿大也言殷家自帝乙以上未喪天下之時皆能配天而行至紂荒怠自取敗滅今宜以殷王賢愚為鏡知天之大命甚難也今漢初取天下起於豐沛以兵征伐徳化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未乆至於陛下八世九主矣如淳曰呂后為主不得為世故八世九主矣雖有成王之明然亡周召之佐師古曰召讀曰邵今東方連年饑饉加之以疾疫百姓菜色或至相食師古曰人専食菜故肌膚青黄為菜色也地比震動天氣溷濁日光侵奪師古曰比頻也溷汙也音下頓反繇此言之師古曰繇讀與由同執國政者豈可以不懷怵惕而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太隂以東行張晏曰如因今丙子之四月也太隂是時在甲戌當轉在乙亥丙子左旋之也到後七年之明歲必有五年之餘蓄然後大行考室之禮李竒曰凡宫新成殺牲以釁祭致其五祀之神謂之考室師古曰考成也成其禮也詩小雅斯干之詩序曰斯干宣王考室也故奉引之雖周之隆盛亡以加此唯陛下留神詳察萬世之策書奏天子異其意答曰問奉今園廟有七云東徙狀何如奉對曰昔成王徙洛盤庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道臣奉愚戇狂惑唯陛下裁赦其後貢禹亦言當定迭毁禮上遂從之及匡衡為丞相奏徙南北郊其議皆自奉發之奉以中郎為博士諫大夫年老以壽終子及孫皆以學在儒官李尋字子長平陵人也治尚書與張孺鄭寛中同師寛中等守師法敎授尋獨好洪範災異又學天文月令隂陽事丞相翟方進方進亦善為星歴除尋為吏數為翟侯言事帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛已問尋尋見漢家有中衰阸㑹之象其意以為且有洪水為災乃說根曰書云天聰明師古曰虞書臯陶謨之辭也天視聽人君之行不可不畏愼也蓋言紫宫極樞通位帝紀孟康曰紫宫天之北宫也極天之北極星也樞是其廻轉者也天文志曰天極其一明者太一常居也太一天皇大帝也與通極為一體故曰通位帝紀也太微四門廣開大道孟康曰太微天之南宫也四門太微之四門也五經六緯尊術顯士孟康曰六緯五經與樂緯也張晏曰六緯五經就孝經緯也師古曰六緯者五經之緯及樂緯也孟說是也劉攽曰正言星宿何故忽説五經蓋謂二十八舍翼張舒布燭臨四海張晏曰翼二十八星十八度舒布張廣也翼翅夹張故言也少微處士為比為輔孟康曰少微四星在太微西主處士儒學之官為太微輔佐也故次帝廷女宫在後孟康曰言少微四星在太㣲次太微為天帝廷女宫謂軒轅星也聖人承天賢賢易色取法於此師古曰賢賢尊上賢人易色輕略於色不貴之也易弋二反天官上相上將皆顓面正朝孟康曰朝太微宫垣也面垣為上將東垣為上相各専一面而正天之朝事也憂責甚重要在得人得人之效成敗之機不可不勉也昔秦穆公說諓諓之言任仡仡之勇身受大辱社稷幾亡師古曰諓諓小善也仡仡壯健也謂聽杞子逢孫陽孫之言言鄭可襲乃使孟明視西乞術白乙丙帥師伐鄭遂為晉襄公所禦而敗於殽三帥盡獲匹馬隻輪皆無反者諓音踐仡巨乙反又音牛乞反悔過自責思惟黄髮任用百里奚卒伯西域徳列王道師古曰謂晉歸三帥之後穆公自悔作秦誓云雖則云然尚猶詢兹黄髮則罔所愆自言前有云然之過今庶幾以道謀此黄髮賢老則行事無所過失矣百里奚本虞人也穆公用之卒成霸業二者禍福如此可不愼哉夫士者國家之大寳功名之本也將軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此夫物盛必衰自然之理唯有賢友彊輔庶幾可以保身命全子孫安國家書曰歴象日月星辰師古曰虞書堯典之辭也此言仰視天文俯察地理觀日月消息候星辰行伍揆山川變動參人民繇俗師古曰繇讀與謡同繇俗者謂若童謡及輿人之誦以制法度考禍福舉錯誖逆咎敗將至徵兆為之先見師古曰誖乖也音布内反明君恐懼修正側身博問轉禍為福不可救者卽蓄備以待之故社稷亡憂竊見徃者赤黄四塞地氣大發動土竭民天下擾亂之徴也彗星爭明張晏曰與日月爭明宋祁曰南本無動字民字下疑有困字庶雄為桀大寇之引也師古曰將引致大寇也此二者已頗效矣城中訛言大水奔走上城朝廷驚駭女孽入宫應劭曰謂小女陳持弓也此獨未效閒者重以水泉涌溢旁宫闕仍出李竒曰旁宫闕而出水也師古曰旁附也仍頻也重直用反旁薄郎反月太白入東井犯積水缺天淵張晏曰犯東井有水災孟康曰積水一星在北河北天淵十星在北斗星東南缺者拂其角而過之也日數湛於極陽之色張晏曰衆陽之宗故為極陽也色宜明燿而無光也羽氣乘宫孟康曰天文志曰西方為羽羽少隂之位少隂臣氣乗於君也晉灼曰羽北方水也水隂為臣宫中央土也土為君今水乗土言臣氣勝於君也起風積雲又錯以山崩地動河不用其道師古曰錯雜也言河徙流不從故道也宋祁曰正文河字下疑有决字盛冬靁電濳龍為孽孟康曰黑龍冬見張晏曰五行傳曰龍見井中幽囚之象也繼以隕星流彗維塡上見孟康曰有地維星有四塡星皆妖星也晉灼曰天文志四塡星出四隅去地可四丈地維藏光亦出四隅去地可二丈若月始出所見下有亂者亡冇徳者昌日蝕有背鄉師古曰背音歩内反鄉讀曰嚮此亦高下易居洪水之徵也不憂不改洪水廼欲盪滌流彗廼欲埽除改之則有年亡期師古曰言可延期得禳災故屬者頗有變改小貶邪猾師古曰屬者謂近時也屬之欲反日月光精時雨氣應師古曰精謂光明也宋祁曰光字江浙本作立字此皇天右漢亡已也師古曰右讀曰祐何況致大改之宜急博求幽隐拔擢天士任以大職李竒曰天士知天道者也晉灼曰嚴君平言師於天士天士應宿台鼎之臣也師古曰李說是也宋祁曰注文言字下當有賞公飬士四字諸闒茸佞讇抱虛求進師古曰闒音吐臘反茸音人勇反讇古謟字及用殘賊酷虐聞者若此之徒宋祁曰聞字當改作間皆嫉善憎忠壞天文敗地理涌趯邪隂湛溺太陽師古曰趯字與躍同湛讀曰沈為主結怨於民師古曰為音于偽反宜以時廢退不當得居位誠必行之凶災銷滅子孫之福不旋日而至政治感隂陽猶鐵炭之低卬見效可信者也孟康曰天文志云縣土炭也以鐵易土耳先冬夏至縣鐵炭於衡各一端令適停冬陽氣至炭仰而鐵低夏隂氣至炭低而鐵仰以此候二至也及諸蓄水連泉務通利之修舊堤防省池澤稅以助損隂邪之盛案行事考變易訛言之效未嘗不至請徴韓放服䖍曰姓名也暁水掾周敞王望可與圗之根於是薦尋哀帝初卽位召尋待詔黄門使侍中衞尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重師古曰重音直用反極言母有所諱尋對曰陛下聖徳尊天敬地畏命重民悼懼變異不忘疏賤之臣幸使重臣臨問愚臣不足以奉明詔竊見陛下新卽位開大明除忌諱博延名士靡不並進臣尋位卑術淺過隨衆賢待詔師古曰過猶謬也食太官衣御府乆汙玉堂之署師古曰玉堂殿在未央宫比得召見亡以自效師古曰比頻也復時見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須㬰之閒宿留瞽言師古曰閒謂空隙之時也宿音先就反留音力救反考之文理稽之五經揆之聖意以參天心夫變異之來各應象而至臣謹條陳所聞易曰縣象著明莫大乎日月師古曰上繫之辭也在天成象故曰縣象也夫日者衆陽之長煇光所燭萬里同晷人君之表也師古曰晷景也故日將旦清風發羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中煇光君徳盛明大臣奉公日將入専以壹君就房有常節君不修道則日失其度晻昧亡光師古曰晻與暗同又音烏感反各有云為其於東方作日初出時師古曰作起也日出之時人物皆起隂雲邪氣起者法為牽於女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營師古曰營謂繞也宋祁曰謂繞惑之閒者日尤不精光明侵奪失色邪氣珥蜺數作夲起於晨相連至昏其日出後至日中閒差瘉師古曰瘉與愈同小臣不知内事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不愼也唯陛下執乾剛之徳彊志守度毋聽女謁邪臣之態諸保阿乳母甘言悲辭之託㫁而勿聽勉强大誼絶小不忍良有不得已可賜以財貨不可私以官位誠皇天之禁也宋祁曰浙本官位下更有官位二字日失其光則星辰放流張晏曰日夜食則失光晝立六尺木不見其景也日陽失光明隂得施也宋祁曰注文中隂得施也當作月隂桀得施也陽不能制隂隂桀得作閒者太白正晝經天宜隆徳克躬以執不軌臣聞月者衆隂之長銷息見伏百里為品千里立表萬里連紀孟康曰品同也言百里内數度同也千里則當立表度其景萬里則紀其本所起紀其宿度也妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君徳春夏南秋冬北閒者月數以春夏與日同道孟康曰房有四星其閒有三道春夏南行南頭第一星裏道也秋冬北行北頭第一星裏道也與日同道者謂中央道也此三道者日月五星之所由也過軒轅上后受氣孟康曰軒轅南大星為后入太微帝廷揚光煇犯上將近臣列星皆失色厭厭如滅鄭氏曰厭音檿桑之檿師古曰音烏㸃反此為母后與政亂朝師古曰與讀曰豫隂陽俱傷兩不相便外臣不知朝事竊信天文卽如此近臣已不足杖矣師古曰杖謂倚任也屋大柱小可為寒心師古曰言天下事重大臣之任當得賢能者唯陛下親求賢士無彊所惡以崇社禝尊彊本朝師古曰邪佞之人誠可賤惡勿得寵異令其盛彊也臣聞五星者五行之精五帝司命應王者號令為之節度歲星主歲事為綂首號令所紀今失度而盛此君指意欲有所為未得其節也又塡星不避歲星者后帝共政相留於奎婁張晏曰歲星為帝塡星為女主也當以義㫁之熒惑徃來亡常劉攽曰營當作熒周歴兩宫作態低卬張晏曰兩宫謂紫微大微入天門上明堂貫尾亂宫孟康曰角兩星為天門房為明堂尾為後宫蘇林曰常占當從尾北而今貫之尾為後宫之義也宋祁曰注文義字疑作象太白發越犯庫張晏曰發越疾貌也庫天庫也孟康曰奎為天庫兵寇之應也貫黄龍入帝庭張晏曰黄龍軒轅也當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故旤亂不成也熒惑厥弛張晏曰厥弛動揺貌宋祁曰注末疑少晉灼曰行遲貌六字佞巧依埶微言毁譽進類蔽善師古曰進其黨類而擁蔽善人太白出端門孟康曰端門太微正南門臣有不臣者火入室金上堂張晏曰熒惑入營室也孟康曰火入室謂熒惑歴兩宫也金謂太白也上堂入房星也宋祁曰注文兩宫字下疑有宫亦室三字不以時解其憂凶塡歲相守又主内亂宜察蕭牆之内毋忽親疏之微師古曰微謂其事微宋祁曰注末當有細字誅放佞人防絶萌牙以盪滌濁濊消散積惡師古曰濊與穢同毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出蚤政緩則出晚政絶不行則伏不見而為彗茀師古曰茀與孛同四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下也師古曰篤厚也右與祐同祜猶助也宜深自改治國故不可以戚戚欲速則不達經曰三載考績三考黜陟師古曰虞書舜典之辭也言三年一考功績三考一行黜陟也加以號令不順四時旣徃不咎來事之師也閒者春三月治大獄宋祁曰來字疑作成字春三月浙江本作春月時賊隂立逆恐歲小收宋祁曰小字疑作少字季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土溼奥張晏曰違於月令也師古曰奥温也音於六反恐後有雷雹之變夫以喜怒賞罰宋祁曰罰疑作誅而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動静不失其時其道光明師古曰此艮卦彖辭也言動止隨時則有光明也書曰敬授民時師古曰虞書堯典之辭也言授下以四時之命不可不敬也故古之王者尊天地重隂陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也師古曰枹擊鼓之椎也音孚其字從木今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有謬於時者當知争之以順時氣臣聞五行以水為本其星𤣥武婺女天地所紀終始所生孟康曰婺女須女也北方天地之統隂陽之終始也水為準平王道公正脩明則百川理落脉通師古曰落謂經絡也偏黨失綱則涌溢為敗書云水曰潤下師古曰周書洪範之辭也隂動而卑不失其道天下有道則河出圗洛出書故河洛決溢所為最大今汝潁畎澮皆川水漂涌與雨水並為民害師古曰畎澮小流也許愼說廣尺深尺曰畎廣二尋深二仞謂之澮川者水貫穿而通流也畎音工犬反澮音工外反此詩所謂􅏎􅏎震電不寧不令百川沸騰者也師古曰詩小雅十月之交之詩也􅏎􅏎光貌寧安令善也言隂陽失和雷電失序不安不善故百川又沸騰其咎在於皇甫卿士之屬師古曰皇甫卿士周室女寵之族也解在劉向傳唯陛下留意詩人之言少抑外親大臣臣聞地道柔静隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歴州俱動者其異最大閒者關東地數震五星作異亦未大逆宜務崇陽抑隂以救其咎固志建威閉絶私路㧞進英雋退不任職以彊本朝夫本彊則精神折衝本弱則招殃致凶為邪謀所陵師古曰折衝言有欲衝突為害者則能折挫之聞徃者淮南王作謀之時其所難者獨有汲黯以為公孫宏等不足言也宏漢之名相於今亡比而尚見輕何況无宏之屬乎故曰朝廷亡人則為賊亂所輕其道自然也天下未聞陛下竒策固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷師古曰通人謂薦達賢材也陵夷謂穨替也馬不伏歴不可以趨道士不素飬不可以重國師古曰伏歴謂伏槽歴而秣之也趨讀曰趣詩曰濟濟多士文王以寧師古曰大雅文王之詩也已解於上孔子曰十室之邑必有忠信師古曰論語載孔子之言也非虛言也陛下秉四海之衆曾亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士中人皆可使為君子師古曰言在所以勸厲之詔書進賢良赦小過無求備以博聚英儁如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌師古曰不敢出言也邪偽並興外戚顓命君臣隔塞至絶繼嗣女宫作亂師古曰謂趙飛燕姊妹也此行事之敗誠可畏而悲也本在積任母后之家非一日之漸徃者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有徳行道術通明之士充備天官然後可以輔聖徳保帝位承大宗下至郎吏從官行能亡以異又不通一蓺及博士無文雅者宜皆使就南畆師古曰遣歸農業以視天下師古曰視讀曰示明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆覆愚臣之言師古曰財與裁同謂裁量而反思之劉攽曰衍一覆字是時哀帝初立成帝外家王氏未甚抑黜而帝外家丁傅新貴祖母傅太后尤驕恣欲稱尊號丞相孔光大司空師丹執政諫争乆之上不得已遂免光丹而尊傅太后語在丹傳上雖不從尋言然采其語每有非常輙問尋尋對屢中遷黄門侍郎以尋言且有水災故拜尋為騎都尉使䕶河隄初成帝時齊人甘忠可詐造天官歴包元太平經十二卷以言漢家逄天地之大終當更受命於天天帝使眞人赤精子下教我此道忠可以教重平夏賀良容丘丁廣世服䖍曰重平勃海縣也晉灼曰容丘東海縣也東郡郭昌等中壘校尉劉向奏忠可假鬼神罔上惑衆下獄治服未㫁病死賀良等坐挾學忠可書以不敬論後賀良等復私以相教哀帝初立司隸校尉解光亦以明經通災異得幸白賀良等所挾忠可書事下奉車都尉劉歆歆以為不合五經不可施行而李尋亦好之光曰前歆父向奏忠可下獄歆安肯通此道時郭昌為長安令勸尋宜助賀良等尋遂白賀良等皆待詔黄門數召見陳說漢歴中衰當更受命成帝不應天命故絶嗣今陛下乆疾變異屢數師古曰數音所角反天所以譴告人也宜急改元易號乃得延年益壽皇子生災異息矣得道不得行咎殃且亡師古曰言知道不能行之必有殃咎將至滅亡宋祁曰下得字可刪劉攽曰得道不得行下得字衍不有洪水將出災火且起滌盪民人哀帝乆寢疾幾其有益師古曰幾讀曰冀遂從賀良等議於是詔制丞相御史劉敞曰當云制詔盖聞尚書五曰考終命師古曰周書洪範五福之數也言得夀考而終其命也宋祁曰南本浙本命字上有厥字言大運壹終更紀天元人元考文正理推歴定紀數如甲子也朕以眇身入繼太祖承皇天總百僚子元元未有應天心之效卽位出入三年災變數降日月失度星辰錯謬高下貿易師古曰言山崩川竭也大異連仍盜賊並起師古曰仍頻也宋祁曰連字一本作逆字朕甚懼焉戰戰兢兢唯恐陵夷師古曰慮漸滅亡也惟漢至今二百載歴紀開元皇天降非材之右漢國再獲受命之符師古曰右讀曰祐祐助也帝自言不材而得天助也宋祁曰漢字下疑有興字今字上疑有于字朕之不徳曷敢不通夫受天之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度布告天下使明知之後月餘上疾自若師古曰自若言如故也賀良等復欲妄變政事大臣争以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李尋輔政上以其言亡驗遂下賀良等吏而下詔曰朕獲保宗廟為政不徳變異屢仍恐懼戰栗未知所繇師古曰繇讀與由同待詔賀良等建言改元易號増益漏刻可以永安國家朕信道不篤過聽其言幾為百姓獲福師古曰幾讀曰冀卒無嘉應乆旱為災以問賀良等對當復改制度皆背經誼違聖制不合時宜夫過而不改是為過矣宋祁曰為字當作謂六月甲子詔書非赦令也皆蠲除之師古曰唯赦令不改餘皆除之賀良等反道惑衆姦態當窮竟皆下獄光祿勲平當光祿大夫毛莫如與御史中丞廷尉雜治當賀良等執左道亂朝政師古曰當謂處正其罪名傾覆國家誣罔主上不道賀良等皆伏誅尋及解光減死一等徙敦煌郡贊曰幽贊神明通合天人之道者莫著乎易春秋師古曰幽深贊明也宋祁曰注文幽深下當有也字然子贛猶云夫子之文章可得而聞師古曰謂易辭文言及春秋之屬也夫子之言性與天道不可得而聞已矣師古曰性命𤣥遠天道幽深故孔子不言之也此皆論語述子貢之言也漢興推隂陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納說時君著明者也察其所言仿佛一端師古曰仿讀曰髣佛與髴同假經說誼依託象類或不免乎億則屢中師古曰論語稱孔子曰賜不受命而貨殖焉億則屢中故此贊引之言仲舒等億度所言旣多故時有中者耳非必道術皆通明也億於力反仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒也京房區區不量淺深危言刺譏構怨彊臣罪辜不旋踵亦不宻以失身悲夫師古曰易上繫辭曰君不密則失臣臣不密則失身故贊引之也前漢書卷七十五前漢書卷七十五考證眭𢎞傳從嬴公受春秋儒林傳嬴公東平人受公羊春秋於董仲舒故𢎞書稱先師董仲舒也至符節令按百官表符節令屬少府漢家堯後臣召南按以漢為堯後始見此文然則宏雖習公羊亦兼通左氏矣其後劉向父子申明其義而新莽亦因以為簒竊之本京房傳補小黄令地理志小黄縣屬陳留郡時部刺史奏事京師胡三省曰刺史各部一州故曰部刺史今為治邪亂邪臣召南按通鑑考異曰故資政殿學士邵亢得兩浙錢王寫本漢書無亂邪二字有上曰亦極亂耳尚何道房曰今十二字据此則古本無亂邪二字翼奉傳與蕭望之匡衡同師臣召南按儒林傳其師東海后蒼也詩有五際注孟康曰詩内傳曰五際卯酉午戌亥也臣召南按孔潁達詩疏曰鄭元六藝論引春秋緯孔演圗曰詩含五際六情汎歴樞云午亥之際為革命卯酉之際為改正辰在天門出入候聽卯天保也酉祈父也午采芑也亥大明也然則亥為革命一際也亥又為天門二際也卯為隂陽交際三際也午為陽謝隂興四際也酉為隂盛陽微五際也据此則五際不言戌而亥為二際矣但緯書怪妄百出其是非初不足辨李尋傳與張孺鄭寛中同師臣召南按孺字誤也据儒林傳張山拊事小夏侯建授同縣李尋鄭寛中少君山陽張無故子儒此文張孺卽張無故而舉其字當云張子儒傳寫之訛遂合兩字為孺字耳五經六緯注孟康曰六緯五經與樂緯師古用孟康說而劉攽駁之謂正說星宿何故忽說五經其論甚合但所云天文六緯名目劉攽亦未嘗指實也使侍中衛尉傅喜問尋云云通鑑考異曰按公卿表傅喜為衛尉二月遷右將軍十一月罷地震在九月當是時喜已不為衛尉矣歴紀開元哀帝紀作歴數開元未知孰是又夫受天之元命紀作夫基事之元命贊哀平則李尋田終術田終術見翟方進傳又見王莽傳前漢書卷七十五考證
