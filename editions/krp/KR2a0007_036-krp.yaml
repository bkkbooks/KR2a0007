body:
  text: 前漢書卷三十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注楚元王傳第六楚元王交字游髙祖同父少弟也師古曰言同父知其異母宋祁曰母字下有也字好書多材蓺少時嘗與魯穆生白生申公俱受詩於浮丘伯服䖍曰白生魯國奄里人浮丘伯秦時儒生伯者孫卿門人也師古曰孫卿姓荀名况為楚蘭陵令漢以避宣帝諱改之曰孫及秦焚書各别去髙祖兄弟四人長兄伯次仲伯蚤卒師古曰蚤古早字也宋祁曰也字當刪髙祖既為沛公景駒自立為楚王髙祖使仲與審食其留侍太上皇師古曰食音異其音基交與蕭曹等俱從髙祖見景駒遇項梁共立楚懐王因西攻南陽入武關與秦戰於藍田至霸上封交為文信君從入蜀漢還定三秦誅項籍即帝位交與盧綰常侍上出入臥内傳言語諸内事隠謀而上從父兄劉賈數别將漢六年既廢楚王信分其地為二國立賈為荆王交為楚王王薛郡東海彭城三十六縣先有功也後封次兄仲為代王長子肥為齊王初髙祖微時常避事時時與賔客過其丘嫂食應劭曰丘姓也孟康曰西方謂亡女壻為丘壻丘空也兄亡空有嫂也張晏曰丘大也長嫂稱也晋灼曰禮謂大婦為冢婦師古曰史記丘字作巨丘巨皆大也張晋二説其義得之嫂厭叔與客來陽為羮盡轑釡服䖍曰音勞轑轢也師古曰以勺轢釡令為聲也轢音洛又音歴客以故去已而視釡中有羮繇是怨嫂師古曰繇與由同及立齊代王而伯子獨不得侯太上皇以為言髙祖曰某非敢忘封之也為其母不長者七年十月封其子信為羮頡侯師古曰頡音戞言其母戞羮釡也宋祁曰當作頡羮元王既至楚以穆生白生申公為中大夫髙后時浮丘伯在長安元王遣子郢客與申公俱卒業師古曰卒終也文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩師古曰凡言傳者謂為之解説若今詩毛氏傳也元王亦次之詩傳號曰元王詩師古曰次謂綴集之劉攽曰次之之字衍世或有之髙后時以元王子郢客為宗正封上邳侯宋祁曰當作下邳元王立二十三年薨太子辟非先卒師古曰辟非者猶辟邪辟兵之類也先卒者元王未薨之時已卒也辟音壁文帝乃以宗正上邳侯郢客嗣是為夷王申公為博士失官隨郢客歸復以為中大夫立四年薨子戊嗣文帝尊寵元王子生爵比皇子師古曰元王生子封爵皆與皇子同所以尊寵元王也劉奉世曰文帝時元王子未嘗封爵至景帝乃侯爾本傳下文云景帝即位以親親封元王寵子五人為侯疑爵字衍云生比皇子者凡禄賜禮秩皆與皇子同也景帝即位以親親封元王寵子五人子禮為平陸侯富為休侯歲為沈猶侯晋灼曰沈音審王子侯表屬千乗髙宛埶為宛朐侯師古曰埶古蓺字調為棘樂侯初元王敬禮申公等穆生不耆酒師古曰耆讀曰嗜元王每置酒常為穆生設醴師古曰醴甘酒也少麴多米一宿而孰不齊之及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市師古曰鉗以鐵束頸也音其炎反稱疾臥申公白生强起之曰獨不念先王之德與師古曰與讀曰歟今王一旦失小禮何足至此穆生曰易稱知幾其神乎師古曰下繋之辭也宋祁云浙本幾作機幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也師古曰忽怠也忘道之人胡可與久處豈為區區之禮哉師古曰區區謂小也遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諌不聼胥靡之應劭曰詩云若此無罪淪胥以鋪胥靡刑名也晋灼曰胥相也靡隨也古者相隨坐輕刑之名師古曰聨繫使相隨而服役之故謂之胥靡猶今之役囚徒以鎻聨綴耳晋説近之而云隨坐輕刑非也劉敞曰胥靡説文作縃縻謂拘縳之也衣之赭衣使杵臼碓舂於市晋灼曰髙肱舉杵正身而舂之師古曰為木杵而手舂即今所謂步臼者耳非碓舂也宋祁曰碓一作椎一本改碓字作雅古語相雅皆助樂者此雅謂舂而雅歌以相舂也休侯使人諌王王曰季父不吾與我起先取季父矣師古曰不吾與言不與我同心休侯懼乃與母太夫人奔京師臣瓚曰侯母號太夫人二十一年春景帝之三年也削書到遂應吳王反其相張尚太傅趙夷吾諌不聼遂殺尚夷吾起兵會吳西攻梁破棘壁至昌邑南與漢將周亞夫戰漢絶吳楚糧道士饑吳王走戊自殺軍遂降漢漢已平吳楚景帝乃立宗正平陸侯禮為楚王奉元王後是為文王四年薨宋祁云一本作三年子安王道嗣二十五年薨宋祁云越本作二年别本作三年子襄王注嗣十四年薨子節王純嗣十六年薨子延壽嗣宣帝即位延壽以為廣陵王胥武帝子天下有變必得立陰欲附倚輔助之師古曰倚依也音於綺反故為其後母弟趙何齊宋祁曰後疑是后字取廣陵王女為妻與何齊謀曰我與廣陵王相結天下不安發兵助之使廣陵王立何齊尚公主列侯可得也因使何齊奉書遺廣陵王曰願長耳目師古曰言常伺聼勿失幾也毋後人有天下師古曰方争天下勿使在人後何齊父長年上書告之事下有司考驗辭服延壽自殺立三十二年國除初休侯富既奔京師而王戊反富等皆坐免侯削屬籍後聞其數諌戊乃更封為紅侯太夫人與竇太后有親懲山東之宼師古曰懲創也求留京師詔許之富子辟彊等四人共飬仕於朝師古曰辟音必亦反彊音居良反又辟讀曰闢彊讀曰疆解在文紀四子以在京師供飬其祖母故仕於漢朝也太夫人薨賜塋師古曰塋冢地謂為界域塋音營葬靈戸師古曰地名也富傳國至曾孫無子絶辟彊字少卿亦好讀詩能屬文師古曰屬文謂會綴文辭也音之欲反後皆類此武帝時以宗室子隨二千石論議冠諸宗室師古曰論議每出宗室之上也清靜少欲常以書自娛不肯仕昭帝即位或説大將軍霍光曰將軍不見諸呂之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事服䖍曰共議事也師古曰毎事皆與參共知之反諸呂道如是則可以免患師古曰言諸呂専權所以滅亡今納宗室是反其道乃可免患也光然之廼擇宗室可用者辟彊子德待詔丞相府師古曰於丞相府聼詔命也年三十餘欲用之或言父見在亦先帝之所寵也遂拜辟彊為光禄大夫守長樂衞尉時年已八十矣徙為宗正數月卒德字路宋祁曰路字下疑有叔字少修黄老術宋祁曰修當作脩有智略少時數言事召見甘泉宮武帝謂之千里駒師古曰言若駿馬可致千里也年齒㓜少故謂之駒昭帝初為宗正丞雜治劉澤詔獄師古曰雜謂以他官共治之也劉澤齊孝王之孫謀反欲殺青州刺史者宋祁曰注文以他官當作與他官父為宗正徙大鴻臚丞遷太中大夫後復為宗正雜案上官氏蓋主事德常持老子知足之計老子德經云知足不辱妻死大將軍光欲以女妻之德不敢取畏盛滿也蓋長公主孫譚遮德自言師古曰公主之孫名譚自言者申理公主所坐德數責以公主起居無狀師古曰無狀無善狀也數音所具反侍御史以為光望不受女師古曰望怨望也承指劾德誹謗詔獄師古曰承指謂取霍光之意指徳實責數公主而御史乃以為受譚寃訴故云誹謗詔獄免為庻人屏居山田光聞而恨之師古曰以御史不知已意復白召德守青州刺史歲餘復為宗正與立宣帝師古曰與讀曰豫豫其謀議也以定䇿賜爵關内侯地節中以親親行謹厚封為陽城侯宋祁曰城一作成子安民為郎中右曹宗家以德得官宿衞者二十餘人德寛厚好施生師古曰言好施恩惠於人而生全之每行京兆尹事多所平反罪人蘇林曰反音幡幡罪人辭使從輕也家産過百萬則以振昆弟師古曰振舉救之賔客食飲師古曰既以救貧昆弟又散供食飲之費曰富民之怨也立十一年子向坐鑄偽黄金當伏法如淳曰律鑄偽黄金棄市也德上書訟罪會薨大鴻臚奏德訟子罪失大臣體不宜賜諡置嗣制曰賜諡繆侯師古曰繆惡諡也以其安訟子宋祁曰姚本安作妄為置嗣傳至孫慶忌復為宗正太常薨子岑嗣為諸曹中郎將列校尉至太常薨傳子至王莽敗乃絶向字子政師古曰名向字子政義則相配而近代學者讀向音餉既無别釋靡所據慿當依本字為勝也本名更生年十二以父德任為輦郎服䖍曰父保任其子為郎也輦郎如今引御輦郎也既冠以行修飭擢為諌大夫師古曰飭整也讀與敕同其字從􅀢是時宣帝循武帝故事宋祁曰循一作脩招選名儒俊材置左右更生以通達能屬文辭與王襃張子僑等並進對師古曰子僑官至光禄大夫見蓺文志進對謂進見而對詔命也僑字或作蟜或作喬皆音鉅驕反獻賦頌凡數十篇上復興神僊方術之事而淮南有枕中鴻寶苑袐書師古曰鴻寶苑袐書並道術篇名臧在枕中言常存録之不漏泄也宋祁曰浙本注文篇名上有書字書言神僊使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書劉奉世曰按德待詔丞相府年三十餘始元二年事也淮南事元朔六年是時德甫數歲傳誤紀是年德父辟彊為光禄大夫時德待詔丞相府欲用之或言父見在故拜辟彊更生㓜而讀誦以為竒獻之言黄金可成上令典尚方鑄作事師古曰尚方主巧作金銀之所若今之中尚署費甚多方不驗上乃下更生吏吏劾更生鑄偽黄金繋當死更生兄陽城侯宋祁曰城一作成安民上書入國戸半贖更生罪上亦竒其材得踰冬減死論服䖍曰踰冬至春行寛大而減死罪如淳曰獄冬盡當決竟而得踰冬復至後冬故或逢赦或得減死也師古曰服説是也會初立榖梁春秋徵更生受穀梁講論五經於石渠師古曰三輔舊事云石渠閣在未央大殿北以臧袐書復拜為郎中給事黄門遷散騎諫大夫給事中元帝初即位太傅蕭望之為前將軍少傅周堪為諸吏光禄大夫師古曰加官也百官公卿表云諸吏所加或列侯將軍卿大夫得舉不法也皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政患苦外戚許史在位放縱而中書宦官𢎞恭石顯弄權望之堪更生議欲白罷退之未白而語泄遂為許史及恭顯所譖愬堪更生下獄及望之皆免官語在望之傳其春地震夏客星見昴卷舌閒師古曰見於昴與卷舌之閒也卷音俱免反上感悟下詔賜望之爵關内侯奉朝請秋徵堪向欲以為諌大夫恭顯白皆為中郎冬地復震時恭顯許史子弟侍中諸曹皆側目於望之等更生懼焉乃使其外親上變事師古曰非常之事故謂之變也言竊聞故前將軍蕭望之等皆忠正無私欲致大治忤於貴戚尚書師古曰忤猶過也音五故反他皆類此今道路人聞望之等復進以為且復見毁讒必曰嘗有過之臣不宜復用是大不然師古曰言不宜用有過之臣者此議非也臣聞春秋地震為在位執政太盛也不為三獨夫動亦已明矣應劭曰謂蕭望之周堪及向師古曰獨夫猶言匹夫也且往者髙皇帝時季布有罪至於夷滅後赦以為將軍髙后孝文之閒卒為名臣師古曰卒終也孝武帝時兒寛有重罪繫按道侯韓説諫曰師古曰説讀曰悦前吾丘壽王死陛下至今恨之師古曰恨猶悔也今殺寛後將復大恨矣上感其言遂貰寛師古曰貰謂緩恕其罪也復用之位至御史大夫御史大夫未有及寛者也又董仲舒坐私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興師古曰興謂改作憲章常有詔問仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗繫獄三年免為庻人宣帝復用勝至長信少府太子太傅名敢直言天下美之若乃羣臣多此比類師古曰比音必寐反難一二記有過之臣無負國家有益天下此四臣者足以觀矣前𢎞恭奏望之等獄決三月地大震恭移病出師古曰移病者移書言病也一曰言以病移出不居官府後復視事天隂雨雪師古曰雨音于具反由是言之地動殆為恭等師古曰殆近也臣愚以為宜退恭顯以章蔽善之罰師古曰章明也進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋𤣥成諌大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍髙許史氏侍中者毁離親戚欲退去之而獨專權為臣不忠幸不伏誅復䝉恩徵用不悔前過而教令人言變事誣罔不道更生坐免為庻人而望之亦坐使子上書自寃前事恭顯白令詣獄置對師古曰置對者立為對辭宋祁曰越本景本注文作立其罪辭望之自殺天子甚悼恨之乃擢周堪為光禄勲堪弟子張猛光禄大夫給事中大見信任恭顯憚之數譖毁焉更生見堪猛在位幾已得復進師古曰幾讀曰冀懼其傾危乃上封事諌曰臣前幸得以骨肉備九卿奉法不謹乃復䝉恩竊見災異並起天地失常徵表為國師古曰徵證也欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也師古曰甽者田中之溝也田溝之法耜廣五寸二耜為耦一耦之伐廣尺深尺謂之甽六甽而為一畝甽音古犬反字或作畎其音同耳惓惓忠謹之意惓讀與拳同音其專反禮記曰得一善則拳拳服膺弗失之矣宋祁曰正文句末据文埶不合有也字况重以骨肉之親師古曰重音直用反又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報師古曰惟思也忠臣之義一抒愚意退就農畝死無所恨師古曰抒謂引而泄之也音食汝反臣聞舜命九官師古曰尚書禹作司空棄后稷契司徒咎繇作士垂共工益朕虞伯夷秩宗䕫典樂龍納言凡九官也濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成而鳳皇來儀擊石拊石百獸率舞師古曰韶舜樂名舉簫管之屬示其備也於韶樂九奏則鳳皇見其容儀擊鍾鳴磬而百獸相率來舞言感至和也四海之内靡不和寧及至周文開基西郊師古曰言文王始受命作周也雜遝衆賢罔不肅和師古曰雜遝聚積之貌遝音大合反崇推讓之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德師古曰此周頌祀文王清廟之詩也於歎辭也穆美也肅敬也雍和也顯明也相助也濟濟盛也言文王有清淨之化敬而且和光明著見故濟濟之衆士皆執行文王之徳也於讀曰烏當此之時武王周公繼政朝臣和於内萬國驩於外故盡得其驩心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆師古曰此周頌禘太祖之雝詩也相助也辟百辟也公諸侯也言有此賔客以和而來至止而敬者乃助王祭之人百辟與諸侯耳於是時天子則穆穆然禮記言天子穆穆諸侯皇皇辟音壁言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰師古曰此執競之篇祀武王之詩也穰穰多也音人羊反又曰飴我釐麰師古曰此思文之篇以后稷配天之詩也飴遺也言天遺此物也飴讀與貽同釐音力之反又讀與來同麰音牟宋祁曰麰浙本作􅓿釐麰麥也宋祁曰麥字上當有大字陽夏公按徐堅初學記引漢書云來麰大麥也葢唐本與江南本同始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨師古曰厲王夷王之子厲王生宣王宣王生幽王詩人疾而憂之曰民之無良相怨一方師古曰此小雅角弓之篇刺幽王之詩也良善也言人各為不善其意乖離而相怨也一方謂自守一方所嚮異之宋祁曰注文而當作兩注末之當作矣衆小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依師古曰此小雅小旻篇刺幽王之詩也言在位卿士歙歙然患其上訿訿然不供職各失臣節甚可哀痛而謀之善者則背違之不善之謀依而施用所以為刺也歙音翕訿音紫君子獨處守正不撓衆枉師古曰撓屈也不為衆曲而自屈也撓音女教反勉彊以從王事則反見憎毒讒愬故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸師古曰此小雅十月之交篇刺幽王之詩也密勿猶黽勉從事也嗸嗸衆聲也言已黽勉行事不敢自陳勞苦實無罪辜而被讒譖嗸嗸然也嗸音敖宋祁曰注文黽勉從事當刪從事也當是之時日月薄蝕而無光師古曰薄廹也謂被掩廹也其詩曰朔日辛卯日有蝕之亦孔之醜師古曰自此已下至百川沸騰皆十月之交詩也孔甚也醜惡也周之十月夏之八月朔日在辛卯日月交會而日見蝕隂侵於陽辛金日也卯本辰也以卯侵金則臣侵君故甚惡之又曰彼月而微此日而微今此下民亦孔之哀師古曰微虧微也言彼月者當有虧耳而今此日乃復微也言君臣失道是為災異故令人甚哀也又曰日月鞠凶不用其行四國無政不用其良師古曰鞠告也言日月不用其常行之道以告凶災者由四方之國無政理不能用善人也天變見於上地變動於下水泉沸騰山谷易處宋祁曰谷一作川其詩曰百川沸騰山冡卒崩髙岸為谷深谷為陵哀今之人胡憯莫懲師古曰沸涌出也騰乘也冡山頂也卒盡也胡何也憯曽也懲艾也言百川沸涌而相乗陵山頂降髙而盡崩壊陵谷易處尊卑失序咎異大矣誠可畏懼哀哉今人何為曽莫創艾也憯音千感反宋祁曰注文降一作隆霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚衆大也張晏曰正月夏之四月也純陽用事而反多霜急恒寒若之災也師古曰此小雅正月之篇刺幽王之詩也四月正陽之月故謂之正月繁多也訛偽也孔甚也將大也此言王政乖舛陽月多霜害於生物故已心為憂傷而衆庻之人共為偽言以是為非排斥賢儁禍甚大也此皆不和賢不肖易位之所致也師古曰賢人在下不肖居上故曰易位自此之後天下大亂簒殺殃禍並作厲王奔彘師古曰厲王無道下不堪命乃相與畔襲厲王厲王出奔彘彘晋地今晋州北永安縣是也幽王見殺師古曰為犬戎所攻殺幽王于驪山下虜襃姒盡取周賂而去至乎平王末年魯隠之始即位也師古曰平王幽王之子周大夫祭伯乖離不和出奔於魯張晏曰隠元年祭伯來穀梁傳曰奔也師古曰祭音側介反劉攽曰榖梁不謂祭伯為奔也而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣師古曰春秋公羊經隠公三年夏四月尹氏卒傳曰尹氏者何天子之大夫也其稱尹氏何貶也曷為貶譏繼卿繼卿非禮也又詩小雅節南山云尹氏太師赫赫師尹不平謂何刺之也諸侯背畔而不朝周室卑微二百四十二年之間師古曰謂從隠公元年至哀公十四年獲麟也隠公十一年桓公十八年莊公三十二年閔公二年僖公三十三年文公十八年宣公十八年成公十八年襄公三十一年昭公三十二年定公十五年哀公十四年凡二百四十二年也日食三十六師古曰謂隠三年二月己巳桓三年七月壬辰朔十七年十月朔莊十八年三月二十五年六月辛未朔二十六年十二月癸亥朔三十年九月庚午朔僖五年九月戊申朔十二年三月庚午十五年五月文元年二月癸亥朔十五年六月辛丑朔宣八年七月甲子十年四月丙辰十七年六月癸卯成十六年六月丙寅朔十七年十二月丁巳朔襄十四年二月乙未朔十五年秋八月丁巳二十年冬十月丙辰朔二十一年九月庚戌朔冬十月庚辰朔二十三年二月癸酉朔二十四年秋七月甲子朔八月癸巳朔二十七年冬十二月乙亥朔昭七年夏四月甲辰朔十五年六月丁巳朔十七年夏六月甲戌朔二十一年秋七月壬午朔二十二年十二月癸酉朔二十四年夏五月乙未朔三十一年十二月辛亥朔定五年正月辛亥朔十二年十一月丙寅朔十五年八月庚辰朔凡三十六也地震五師古曰謂文九年九月癸酉襄十六年五月甲子昭十九年五月己卯二十三年八月乙未哀三年四月甲午凡五也山陵崩阤二師古曰謂僖十四年八月辛卯沙鹿崩成五年夏梁山崩凡二也阤下頽也音丈爾反彗星三見師古曰謂文十四年秋七月有星孛入于北斗昭十七年冬有星孛于大辰哀十三年冬十一月有星孛于東方夜常星不見夜中星隕如雨一師古曰事在莊七年夏四月辛卯火災十四師古曰桓十四年秋八月壬申御廪災莊二十年夏齊大災僖二十年五月乙巳西宮災成三年二月甲子新宮災襄九年春宋火三十年五月甲午宋災昭九年夏四月陳災十八年夏五月壬午宋衞陳鄭災定二年夏五月壬辰雉門及兩觀災哀三年五月辛卯桓宮僖宮災四年六月辛丑亳社災凡十四也長狄入三國師古曰謂春秋文十一年經書冬十月甲午叔孫得臣敗狄于鹹公羊傳曰狄者何長狄也兄弟三人一者之齊一者之魯一者之晋之齊榮如之魯喬如之晋焚如長狄鄋瞞之種鄋音捜瞞音末安反宋祁曰榮如喬如焚如三如字下浙本皆有也字五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見師古曰謂僖十六年正月戊申朔隕石于宋五是月六鶂退飛過宋都莊十七年冬多麋十八年秋有蜮二十九年秋有蜚昭二十五年夏有鸜鵒來巢蜮短尾狐也鶂水鳥也蜚負蠜也鶂音五歴反蜮音域蜚音扶味反鸜音劬鵒音欲晝冥晦師古曰僖十五年九月己卯晦震夷伯之廟穀梁傳曰晦冥也雨木冰師古曰事在成十六年正月雨木冰者氣著樹木結為冰也今俗呼為閒樹雨音于具反李梅冬實七月霜降草木不死師古曰僖三十三年經書冬隕霜不殺草李梅實未知在何月也而此言李梅冬實又云七月霜降草木不死與今春秋不同未見義所出宋祁曰浙本正文注文並無二木字八月殺菽師古曰謂定公元年十月隕霜殺菽周之十月夏之八月菽謂豆也大雨雹師古曰事在僖二十九年秋及昭三年冬四年正月雨音于具反雨雪靁霆失序相乗師古曰隠九年三月癸酉大雨震電庚辰大雨雪莊六年冬十月雨雪僖十年冬大雨雪皆是也靁古雷字也霆雷之急者也音大丁反水旱饑蝝螽螟蠭午並起如淳曰螽午猶雜沓也師古曰謂桓元年秋大水十三年夏大水莊七年秋大水十一年秋宋大水二十四年秋大水二十五年秋大水宣十年秋大水成五年秋大水襄二十四年秋七月大水僖二十一年夏大旱宣七年秋大旱宣十年冬饑十五年冬蝝生饑襄二十四年冬大饑桓五年秋螽僖十五年八月螽文二年秋雨螽於宋八年冬螽宣六年八月螽十三年秋十五年秋螽襄七年八月螽哀十二年十二月螽十三年九月螽十二月螽隠五年九月螟八年九月螟莊六年秋螟皆是也螽即螟也螟蟲之食苗心者也螽音終螟音㝠當是時禍亂輒應弑君三十六師古曰謂隠公四年衞州吁弑其君完十一年羽父使賊弑公于寪氏桓二年宋督弑其君與夷七年曲沃伯誘晋小子侯殺之十七年鄭髙渠彌弑昭公莊八年齊無知弑其君諸兒十二年宋萬弑其君㨗十四年傅瑕弑其君鄭子三十二年共仲使圉人犖賊子般閔二年共仲使卜齮賊公于武闈僖十年晋里克弑其君卓二十四年晋弑懐公于髙梁文元年楚太子商臣弑其君頵十四年齊公子商人弑其君舍十六年宋人弑其君杵臼十八年齊人弑其君商人魯襄仲殺子惡莒弑其君庻其宣二年晋趙盾弑其君夷臯四年鄭公子歸生弑其君夷十年陳夏徵舒弑其君平國成十八年晋弑其君州蒲襄七年鄭子駟使賊夜弑僖公二十五年齊崔杼弑其君光二十六年衞寗喜弑其君剽二十九年閽弑吳子餘祭三十年蔡太子般弑其君固三十一年莒人弑其君密州昭元年楚公子圍問王疾縊而弑之十三年楚公子比弑其君䖍于乾谿十九年許太子止弑其君買二十七年吳弑其君僚定十三年薛弑其君比哀四年盗殺蔡侯申六年齊陳乞弑其君荼十年齊人弑悼公凡三十六亡國五十二師古曰謂桓五年州公如曹莊四年紀侯大去其國十年齊師滅譚十三年齊人滅遂十四年楚子滅息十六年楚滅鄧閔元年晋滅耿滅霍滅魏僖五年楚滅弦晋滅虢滅虞十二年楚人滅黄十七年楚滅項十九年秦人取梁二十五年衞侯燬滅邢二十六年楚人滅䕫三十三年秦滅滑文四年楚滅江五年楚人滅六滅蓼十六年楚人秦人巴人滅庸宣八年楚人滅舒蓼九年取根牟十二年楚子滅蕭十五年晋師滅赤狄潞氏成六年取鄟十七年楚滅舒庸襄六年莒人滅鄫齊侯滅萊十年諸侯滅偪陽十三年取邿二十五年楚滅舒鳩昭四年楚子滅頼十二年晋滅肥十六年楚子取戎蠻氏十七年晋滅陸渾戎二十一年晋滅鼓三十年吳滅徐定四年蔡滅沈五年楚滅唐六年鄭滅許十四年楚人滅頓十五年楚子滅胡哀八年宋公滅曹又邾滅須句楚滅權晋滅焦楊楚滅道房申凡五十二諸侯奔走不得保其社稷者不可勝數也師古曰謂桓十五年鄭伯突出奔蔡襄十四年衞侯出奔齊昭三年北燕伯欵出奔齊二十三年莒子庚輿来奔之類是也周室多禍晋敗其師於貿戎師古曰貿戎地名也春秋公羊經成元年秋王師敗績于貿戎傳曰孰敗之盖晋敗之也貿音莫侯反伐其郊師古曰郊周邑也昭二十三年正月經書晋人圍郊也鄭傷桓王應劭曰王以諸侯伐鄭鄭伯禦之射王中肩師古曰事在桓五年秋戎執其使師古曰隠七年冬經書天王使凡伯来聘戎伐凡伯于楚丘以歸宋祁曰浙本注文伐作執衞侯朔召不往齊逆命而助朔師古曰春秋桓十六年經書衞侯朔出奔齊穀梁傳曰天子召而不往也五大夫爭權三君更立莫能正理應劭曰周景王崩單穆公劉文公鞏簡公甘平公召莊公此五大夫相與争奪更立王子猛子朝及敬王是為三君也更音工衡反遂至陵夷不能復興師古曰陵夷謂卑替也解在成紀及異姓諸侯王表也由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寛容使得並進今賢不肖渾殽師古曰言雜亂也渾音胡本反其下亦同白黒不分邪正雜糅師古曰糅和也音汝救反宋祁曰當作女救反忠讒並進章交公車人滿北軍如淳曰漢儀注中壘校尉主北軍壘門内尉一人主上書者獄上章於公車有不如法者以付北軍尉北軍尉以法治之楊惲上書遂幽北闕北闕公車所在朝臣舛午膠戾乖剌師古曰言志意不和各相違背午音五故反剌音來曷反更相讒愬師古曰更音工衡反轉相是非傳授増加文書紛糾前後錯繆毁譽渾亂師古曰言各任私情不得其實所以營惑耳目感移心意不可勝載師古曰言其誣罔天子也營謂囘繞之分曹為黨往往羣朋師古曰曹輩也將同心以䧟正臣正臣進者治之表也正臣䧟者亂之機也乗治亂之機未知孰任而災異數見此臣所以寒心者也夫乗權藉勢之人子弟鱗集於朝師古曰言其相次如魚鱗羽翼隂附者衆輻湊於前師古曰輻湊言如車輻之歸於轂也毁譽將必用以終乖離之咎師古曰言讒佞之人毁譽得進則忠賢被斥日以乖離也是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶郤行而求及前人也師古曰郤音邱畧反初元以來六年矣案春秋六年之中災異未有稠如今者也師古曰稠多也音直流反夫有春秋之異無孔子之救猶不能解紛師古曰紛亂也況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還師古曰還謂收還也夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門師古曰枉曲也讒邪進則衆賢退羣枉盛則正士消故易有否泰師古曰否音皮鄙反小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消師古曰此小雅角弓篇刺幽王好讒佞之詩也麃麃盛也見無雲也晛日氣也聿辭也言雨雪之盛麃麃然至於無雲日氣始出而雨雪皆消釋矣喻小人雖多王若欲興善政則賢者升用而小人誅滅矣麃音彼驕反晛音乃見反宋祁曰韓詩作曣云曣見日出也今詩作見蓋向引韓詩後人便改作見非是陽夏公按向時毛詩未列學官與易同義昔者鯀共工驩兠與舜禹雜處堯朝師古曰鯀崇伯之名即檮杌也共工少皥氏之後即窮竒也驩兠帝鴻氏之後即渾敦也鯀音工本反驩音火官反檮音徒髙反杌音兀渾音胡本反敦音徒本反周公與管蔡並居周位當是時迭進相毁師古曰迭互也音大結反流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯師古曰季孟謂季孫孟孫皆桓公之後代執國權而卑公室也李斯與叔孫俱宦於秦師古曰叔孫者叔孫通也定公始皇賢季孟李斯而消孔子叔孫故以大亂汚辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也師古曰此弼柏舟之詩也言石性雖堅尚可移轉已志貞確執徳不傾過於石也言守善篤也易曰渙汗其大號師古曰此易渙卦九五爻辭也言王者渙然大發號令如汗之出也言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也師古曰踰時三月也用賢未能三旬而退是轉石也論語曰見不善如探湯師古曰論語載孔子之言探湯言其除難無所避也今二府奏佞讇不當在位歴年而不去如淳曰二府丞相御史也師古曰讇古謟字故出令則如反汗用賢則如轉石去佞則如拔山如此望隂陽之調不亦難乎是以羣小窺見閒隙縁飾文字巧言醜詆師古曰詆毁也辱也音丁禮反流言飛文譁於民間師古曰譁讙也譁音火𤓰反故詩云憂心悄悄慍于羣小師古曰此弼柏舟言仁而不遇之詩也悄悄憂貌慍怒也悄音千小反小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨師古曰事具見論語更音工衡反禹稷與臯陶傳相汲引不為比周師古曰事見尚書舜典比音頻寐反何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也師古曰此乾卦九五象辭也言聖王正位臨馭萬方則賢人君子皆來見也在下位則思與其類俱進易曰拔茅茹以其彚征吉鄭氏曰彚音謂類也茹牽引也茅喻君有潔白之徳臣下引其類而仕之師古曰此泰卦初九爻辭征行也茹音汝據反在上則引其類在下則推其類故湯用伊尹不仁者逺而衆賢至類相致也今佞邪與賢臣並在交㦸之内師古曰交㦸謂宿衞者合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也師古曰重音直用反自古明聖未有無誅而治者也故舜有四放之罰師古曰謂流共工于幽州放驩兠于崇山竄三苖于三危殛鯀于羽山也而孔子有兩觀之誅應劭曰少正夘姦人之雄孔子欇司寇七日誅之於兩觀之下師古曰兩觀謂闕也然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅師古曰尋其餘迹而察之覽否泰之卦觀雨雪之詩歴周唐之所進以為法原秦魯之所消以為戒師古曰歴謂歴觀之原謂思其本也考祥應之福省災異之禍以揆當世之變師古曰省視也揆度也放逺佞邪之黨壊散險詖之聚師古曰險言曰詖音彼義反杜閉羣枉之門師古曰杜塞也廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也臣幸得託肺附師古曰舊觧云肺附謂肝肺相附著猶言心膂也一説肺謂斫木之肺札也自言於帝室猶肺札附於大材木也誠見隂陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以師古曰以由也宋祁曰浙本救作效不宜宣泄臣謹重封昧死上恭顯見其書愈與許史比而怨更生等師古曰比音頻寐反堪性公方自見孤立遂直道而不曲是歲夏寒日青無光恭顯及許史皆言堪猛用事之咎上内重堪又患衆口之􅎊潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光禄勲何邪師古曰齗齗忿嫉之意也齗音牛斤反興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見衆人聞堪前與劉更生等謀毁骨肉以為當誅故臣前言堪不可誅傷為國養恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關内侯食邑三百户勿令典事明主不失師傅之恩此最䇿之得者也上於是疑會城門校尉諸葛豐亦言堪猛短上因發怒免豐語在其傳又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令顯等專權日甚後三歲餘孝宣廟闕災其晦日有蝕之於是上召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂師古曰淑善也茂美也道術通明論議正直秉心有常發憤悃愊張晏曰悃誠也愊緻密也師古曰悃愊至誠也悃音口本反愊音平力反信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退師古曰厭音一甲反謂不伸也卒不克明師古曰卒終也克能也往者衆臣見異師古曰異災異也不務自修深惟其故而反晻昧説天託咎此人師古曰晻不明也讀與暗同又音烏感反朕不得已師古曰已止也出而試之以彰其材堪出之後大變仍臻衆亦嘿然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱師古曰靡無也此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺師古曰詆毁也音丁禮反或引幽隠非所宜明意疑以類欲以䧟之朕亦不取也朕迫于俗不得專心乃者天著大異朕甚懼焉今堪年衰歲暮恐不得自信師古曰信讀曰伸排於異人將安究之哉師古曰究竟也明也其徵堪詣行在所拜為光禄大夫秩中二千石領尚書事猛復為太中大夫給事中顯幹尚書事師古曰幹與管同言管主其事尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒師古曰瘖音於今反顯誣譛猛令自殺於公車更生傷之乃著疾讒擿要救危及世頌凡八篇師古曰擿謂指發之也音吐歴反依興古事悼已及同類也師古曰興謂比喻也音許證反遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向向以故九卿召拜為中郎使領護三輔都水蘇林曰三輔多溉灌渠悉主之故言都水數奏封事遷光禄大夫是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權師古曰倚音於綺反兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文宋祁曰浙本觀字下有覧字詔向領校中五經秘書師古曰言中者以别於外向見尚書洪範箕子為武王陳五行隂陽休咎之應師古曰休美也音許求反他皆類此向乃集合上古以來歴春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權乆之營起昌陵數年不成復還歸延陵制度泰奢向上疏諌曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也師古曰易下繫之辭故賢聖之君博觀終始窮極事情而是非分明王者必通三統應劭曰二王之後與已為三統也孟康曰天地人之始也張晏曰一曰天統謂周十一月建子為正天始施之端也二曰地統謂殷以十二月建丑為正地始化之端也三曰人統謂夏以十三月建寅為正人始成之端也師古曰諸家之説皆不備也言王者象天地人之三統故存三代也明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京師古曰此大雅文王之篇殷士殷之卿士也膚美也敏疾也祼灌鬯也將行也京周京也言殷之臣有美徳而敏疾乃来助祭于周行祼鬯之事是天命無常歸于有徳喟然歎曰師古曰喟然歎息貌音丘位反大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒愼民萌何以勸勉師古曰萌與甿同無知之貌宋祁曰浙本注文同字下有甿甿二字蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子劉攽曰雖有堯舜之聖不能化丹朱之子既言堯舜豈可不言商均明脱此二字雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔髙皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為効師古曰効謂徵驗也故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨厠服䖍曰厠側近水也李竒曰霸陵山北頭厠近霸水帝登其上以逺望也宋祁曰水經韋昭曰髙岸夾水為厠今斯原夾二水也意悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其閒應劭曰斮斬也陳施也孟康曰斮絮以漆著其閒也師古曰美石出京師北山今宜州石是也故云以北山石為椁紵絮者可以紵衣之絮也斮而陳其閒又從而漆之也紵音張呂反斮音側畧反豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉師古曰有可欲謂多臧金玉而厚葬之人皆欲發取之是有閒隙也無可欲謂不寘器備而薄葬人無欲攻掘取之故無憂慼也錮謂鑄塞也云錮南山者取其深大假以為喻也錮音固夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹師古曰厚衣之以薪言積薪以覆之也不封謂不聚土為墳也不樹謂不種樹也衣音於既反後世聖人易之以棺槨棺槨之作自黄帝始黄帝葬於橋山師古曰在上郡陽周縣堯葬濟隂丘壠皆小葬具甚微晋灼曰丘壠冢墳也舜葬蒼梧二妃不從師古曰二妃堯之二女禹葬會稽不改其列鄭氏曰不改樹木百物之列也如淳曰列隴也墨子曰禹葬會稽之山既葬收餘壤其上壠若參耕之畆則止矣晋灼曰列肆也淮南子云舜葬蒼梧不變其肆言不煩於民也師古曰鄭説是也淮南所云不變其肆肆者故也言山川田畆皆如故耳非别義也晋氏失之殷湯無葬處師古曰謂不見傳記也宋祁曰杜預曰梁國䝉縣有亳城城中有湯冢其西又有伊尹冢按䝉為北亳即景亳湯受命之地皇覽曰湯冢在濟隂亳縣北東郭去縣二里冢四方方各十歩髙七尺上平處平地漢哀帝建平元年大司空御史長卿按行水災因行湯冢寰宇記云劉向言湯無葬處盖不知其處也文武周公葬於畢李竒曰在岐州之間臣瓉曰汲郡古文畢西於豐三十里師古曰二説皆非也畢陌在長安西北四十里也宋祁曰注文岐州當作岐周秦穆公葬於雍橐泉宮祈年館下樗里子葬於武庫文穎曰秦惠王異母弟也師古曰樗里子且死曰葬我必於渭南章臺東後百年當有天子宮夾我墓及漢興長樂宮在其東未央宮在其西武庫正直其上也皆無丘隴之處此聖帝明王賢君智士逺覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防師古曰防魯邑名也音扶方反宋祁曰正文注文防當作坊稱古墓而不墳師古曰墓謂壙穴也墳謂積土也曰丘東西南北之人也不可不識也師古曰東西南北言周遊以行其道不得專在本邦故墓湏表識識音式志反宋祁曰注文識字下當更有識字為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也師古曰事見禮記延陵季子適齊而反其子死葬於嬴博之閒師古曰二邑並在泰山其子死於其閒穿不及泉歛以時服封墳掩坎其髙可隠孟康曰隠蔽之財可見而已臣瓉曰謂人立可隠肘也師古曰瓉説是也隠音於靳反而號曰師古曰號謂哭而且言也骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣師古曰事亦見禮記故仲尼孝子而延陵慈父舜禹忠臣周公弟弟師古曰弟弟者言弟能順理也上弟音徒計反其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋祁曰浙本體作禮宋桓司馬為石槨仲尼曰不如速朽李竒曰宋桓魋為石槨奢泰故激以此言秦相呂不韋集知略之士而造春秋亦言薄葬之義皆明於事者也宋祁曰别本事字下有情字逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王師古曰嚴襄者謂莊襄始皇父也皆大作丘隴多其瘞臧師古曰瘞埋也音于例反咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿師古曰阿謂山曲也下錮三泉上崇山墳其髙五十餘丈周回五里有餘石槨為游館李竒曰壙中為游戲之館師古曰多累石作椁於壙中以為離宮别館也人膏為燈燭宋祁曰史記作人魚膏水銀為江海黄金為鳬鴈珍寶之臧機械之變孟康曰作機發木人之屬盡其巧變也晋灼曰始皇本紀令匠作機弩矢有所穿近輙射之又言工匠為機咸皆知之已下閉羡門皆殺工匠也師古曰晋説是也棺椁之麗宮館之盛不可勝原師古曰言不能盡其本數又多殺宮人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣師古曰周章陳勝之將項籍燔其宮室營宇往者咸見發掘師古曰言至其墓所者發掘之而求財物也宋祁曰浙本注文發字上有皆字其後牧兒亡羊羊入其鑿師古曰鑿謂所穿冢臧者音在到反牧者持火照求羊失火燒其臧椁自古至今葬未有盛如始皇者也數年之間外被項籍之災内離牧豎之禍師古曰離遭也豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘隴彌髙宮廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宮室小寢廟詩人美之斯干之詩是也師古曰小雅篇名美宣王考室其首章曰秩秩斯干秩秩流行也干澗也喻宣王之徳如澗水源秩秩流出無極已也上章道宮室之如制下章言子孫之衆多也師古曰宮室如制謂殖殖其廷有覺其楹君子攸寜也子孫衆多謂維熊維羆男子之祥維虺維蛇女子之祥也及魯嚴公師古曰即莊公也刻飾宗廟多築臺囿師古曰觧在五行志後嗣再絶孟康曰謂子般閔公皆殺死也春秋刺焉周宣如彼而昌魯秦如此而絶是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為髙師古曰埤下也音婢積土為山發民墳墓積以萬數營起邑居期日迫卒師古曰卒讀曰猝功費大萬百餘應劭曰大萬億也大巨也死者恨於下生者愁於上怨氣感動隂陽因之以饑饉物故流離以十萬數師古曰物故謂死也流離謂亡其居處也臣甚惽焉師古曰惽謂不了言惑於此事也惽音昬一曰惽古閔字憂病也以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説以示衆庻則苦之師古曰説讀曰悦其下亦同若茍以説愚夫淫侈之人又何為哉陛下仁慈篤美甚厚聰明疏達蓋世宜𢎞漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君師古曰顧猶反也競為奢侈比方丘隴説愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黄帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之橅應劭曰橅音規摹之摹師古曰謂規度墓地應音是也韋元成傳及蕭望之傳規橅音義皆同其字從木宜從公卿大臣之議以息衆庻書奏上甚感向言而不能從其計向睹俗彌奢淫而趙衞之屬起微賤踰禮制師古曰趙皇后昭儀衞媫妤也向以為王教由内及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者師古曰孽庻也嬖愛也嬖音必計反序次為列女傳凡八篇以戒天子及采傳記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然内嘉其言常嗟歎之時上無繼嗣政由王氏出災異􅒓甚師古曰􅒓甚也向雅竒陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬絫世䝉漢厚恩師古曰絫古累字身為宗室遺老歴事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者師古曰孰誰也向遂上封事極諌曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政師古曰操執也音千髙反未有不為害者也昔晉有六卿應劭曰智伯范中行韓魏趙也齊有田崔衞有孫寗魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弑其君光孫林父寗殖出其君衎弑其君剽師古曰衎音口旦反剽音匹昭反解在五行志劉奉世曰孫林父寗殖子謂弑其君剽乃寗喜也季氏八佾舞於庭三家者以雍徹師古曰佾列也謂舞者之行列也八人一佾八佾六十四人也雍樂詩名徹饌奏之皆僣王者之禮並專國政卒逐昭公周大夫尹氏筦朝事師古曰筦與管同濁亂王室子朝子猛更立連年乃定師古曰更音工衡反觧在五行志故經曰王室亂又曰尹氏殺王子克甚之也師古曰言其惡大甚也劉敞曰今經文不見殺王子克但有立王子朝春秋舉成敗録禍福如此類甚衆皆隂盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國師古曰周書洪範也而汝也言唯君得作威作福臣下為之則致凶害也孔子曰禄去公室政逮大夫危亡之兆李竒曰卿當為政而反大夫為政也臣瓉曰政不由君下及大夫也上大夫即卿也師古曰瓉説是也論語孔子曰禄去公室五君矣政逮於大夫四君矣故三桓之子孫微矣秦昭王舅穰侯及涇陽葉陽君鄭氏曰皆昭王之母弟也師古曰穰侯魏冉也涇陽葉陽皆其弟也葉音式渉反專國擅埶上假太后之威三人者權重於昭王家富於秦國國甚危殆頼寤范雎之言而秦復存二世委任趙髙專權自恣壅蔽大臣終有閻樂望夷之禍鄭氏曰望夷秦宮名也應劭曰秦二世齋於望夷之宮門龠樂以兵殺二世也師古曰博物志云宮在長陵西北長平觀道東臨涇水作之以望北夷此説非也胡亥葬於宜春苑苑不在渭北也劉奉世曰師古但舉胡亥葬處不知望夷所在也且何以知望夷之不在渭北耶二世以涇為祟齋而欲祠涇則疑在渭北矣然夷云者平也秦遂以亡近事不逺即漢所代也漢興諸呂無道擅相尊王呂産呂禄席太后之寵師古曰席猶因也言若人之坐於席也據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏頼忠正大臣絳侯朱虚侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乗朱輪華轂者二十三人青紫貂蟬充盈幄内魚鱗左右師古曰言在帝之左右相次若魚鱗也大將軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汙而寄治身私而託公師古曰寄托也内為汙私之行而外托治公之道也依東宮之尊師古曰東宮太后所居也假甥舅之親以為威重尚書九卿州牧郡守皆出其門師古曰言為其僚吏者皆居顯要之職筦執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省恐其與已分權數稱燕王蓋主以疑上心師古曰示宗室親近而反逆也避諱呂霍而弗肯稱師古曰呂后霍后二家皆坐僣擅誅滅故為王氏諱而不言也内有管蔡之萌外假周公之論兄弟據重宗族磐互師古曰磐結而交互也字或作牙謂若犬牙相交入之意也歴上古至秦漢外戚僣貴未有如王氏者也雖周皇甫秦穰侯漢武安呂霍上官之屬皆不及也師古曰皇甫周卿士字也周后寵之故處於盛位權黨於朝詩人刺之亊見小雅十月之交篇武安侯田蚡也物盛必有非常之變先見為其人微象宋祁曰微作徵孝昭帝時冠石立於泰山晋灼曰漢注冠山石名臣瓉曰冠山下有石自立三石為足一石在上故曰冠石也師古曰事具在眭孟傳仆栁起於上林師古曰其樹已死僵仆於地而更起生事亦具在眭孟傳而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根垂地中宋祁曰垂作臿一作雖立石起栁無以過此之明也事埶不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁𨽻師古曰皁𨽻卑賤之人也春秋左氏傳曰大夫臣士士臣皁皁臣輿輿臣𨽻也縱不為身奈宗廟何婦人内夫家外父母家此亦非皇太后之福也如淳曰内猶親也而皇太后反外夫家也孝宣皇帝不與舅平昌樂昌侯權宋祁曰舊本無樂昌字浙本有所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信師古曰援引也謂升引而附近之也援音爰黜逺外戚毋授以政師古曰逺疏而離之也音于萬反皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵禄劉氏長安不失社稷所以襃睦外内之姓子子孫孫無疆之計也如不行此䇿師古曰如若也田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮師古曰蚤古早字易曰君不密則失臣臣不密則失身幾事不密則害成師古曰上繫之辭也唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟乆承皇太后師古曰言社稷不安則帝身亦不得乆事皇太后也天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之師古曰且令出外休息以向為中壘校尉向為人簡易無威儀亷靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦元延中星孛東井蜀郡岷山崩雍江師古曰雍讀作壅向惡此異語在五行志懐不能已復上奏其辭曰臣聞帝舜戒伯禹毋若丹朱敖師古曰事見虞書益稷篇丹朱堯子也敖讀曰傲劉奉世曰毋若丹朱傲此禹戒舜之語非舜戒禹之辭也周公戒成王毋若殷王紂師古曰事見周書亡逸篇詩曰殷監不逺在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日蝕三十六襄公尤數率三歲五月有竒而壹食師古曰竒謂成數之餘不滿者也音居宜反漢興訖竟寜孝景帝尤數率三歲一月而一食臣向前數言日當食今連三年比食師古曰比頻也自建始以來二十歲閒而八食率二歲六月而一發古今罕有異有小大希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變師古曰賁彖辭也昔孔子對魯哀公並言夏桀殷紂暴虐天下故歴失則攝提失方孟陬無紀孟康曰攝提星名也隨斗杓建十二月歴不正則失其所建首時為孟正月為陬師古曰陬音子侯反又音鄒此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出於四孟師古曰四時之孟月也當見四仲也太白經天而行孟康曰謂出東入西出西入東也太白隂星出東當伏東出西當伏西過午為經天也無雲而雷張晏曰雷當託雲猶君之託臣也二世不恤天下人有畔心象獨號令而無臣也枉矢夜光應劭曰流星也其射如矢虵行不正故曰枉矢流以亂伐亂蘇林曰有聲為天狗無聲為枉矢也熒惑襲月應劭曰熒惑主内亂月主刑故趙髙殺二世也㜸火燒宮師古曰㜸災也野禽戲廷張晏曰野鳥入處主人將去都門内崩師古曰内嚮而壊長人見臨洮石隕於東郡星孛大角大角以亡應劭曰天王坐席也流星茀大角大角因伏不見也觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚於東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孟康曰日月行交道之衝也相薄而既也京房所謂隂氣盛薄奪日光者也孝昭時有泰山臥石自立上林僵柳復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西李竒曰流星也下墮地為天狗皆祅星乆隂不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉髙宗成王亦有雊雉拔木之變能思其故故髙宗有百年之福成王有復風之報師古曰復反也事並見尚書髙宗彤日及金縢篇觧在五行志神明之應應若景嚮師古曰嚮讀曰響世所同聞也臣幸得託末屬誠見陛下寛明之德冀銷大異而興髙宗成王之聲以崇劉氏故豤豤數奸死亡之誅師古曰豤豤欵誠之意也奸犯也豤音懇奸音干今日食尤屢星孛東井攝提炎及紫宮師古曰炎音弋贍反有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意師古曰上繫之辭是以設卦指爻而復説義書曰伻來以圖孟康曰伻使也使人以圖来示成王明口説不了指圖乃了也師古曰周書洛誥之辭天文難以相曉臣雖圖上猶湏口説然後可知願賜清燕之閒師古曰閒讀曰閑指圖陳狀上輒入之師古曰謂召入也然終不能用也向每召見數言公族者國之枝葉枝葉落則本根無所庇廕師古曰庇音必寐反方今同姓疏逺母黨專政禄去公室權在外家非所以彊漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿輒不為王氏居位者及丞相御史所持故終不遷師古曰持謂扶持佐助也居列大夫官前後三十餘年年七十二卒卒後十三歲而王氏代漢向三子皆好學長子伋師古曰伋音汲以易教授官至郡守中子賜九卿丞蚤卒少子歆最知名歆字子駿少以通詩書能屬文召見成帝待詔宦者署為黄門郎河平中受詔與父向領校祕書講六蓺傳記諸子詩賦數術方技無所不究向死後歆復為中壘校尉哀帝初即位大司馬王莽舉歆宗室有材行為侍中太中大夫遷騎都尉奉車光禄大夫貴幸復領五經卒父前業歆乃集六蓺羣書種别為七略語在蓺文志歆及向始皆治易宣帝時詔向受榖梁春秋十餘年大明習及歆校祕書見古文春秋左氏傳歆大好之時丞相史尹咸以能治左氏與歆共校經傳歆略從咸及丞相翟方進受質問大義師古曰質正也初左氏傳多古字古言學者傳訓故而已師古曰故謂指趣也及歆治左氏引傳文以解經轉相發明由是章句義理備焉歆亦湛靖有謀師古曰湛讀曰沈父子俱好古博見彊志師古曰志記也過絶於人歆以為左丘明好惡與聖人同師古曰論語載孔子曰巧言令色足恭左丘明恥之丘亦恥之匿怨而友其人左丘明恥之丘亦恥之親見夫子而公羊穀梁在七十子後師古曰七十子是孔子弟子也實七十二人指其成數言也宋祁曰注文二當作七傳聞之與親見之宋祁曰之字當刪其詳畧不同歆數以難向向不能非間也然猶自持其榖梁義及歆親近欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對師古曰並不與歆意同故不肯立其學也置對置辭以對也歆因移書太常博士責讓之曰昔唐虞既衰而三代迭興師古曰迭互也音大結反聖帝明王累起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歴國應聘自衞反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及夫子没而微言絶七十子終而大義乖重遭戰國棄籩豆之禮師古曰籩豆禮食之器也以竹曰籩以木曰豆籩音邊理軍旅之陳宋祁曰理一作治孔子之道抑而孫吳之術興陵夷至於暴秦燔經書殺儒士設挾書之法行是古之罪師古曰以古事為是者即罪之道術由是遂滅漢興去聖帝明王遐逺仲尼之道又絶法度無所因襲時獨有一叔孫通畧定禮儀天下唯有易卜未有它書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介胄武夫莫以為意至孝文皇帝始使掌故朝錯李竒曰掌故官名也從伏生受尚書尚書初出於屋壁朽折散絶今其書見在時師傳讀而已詩始萌牙師古曰言若草木之初生天下衆書往往頗出皆諸子傳説猶廣立於學官為置博士在漢朝之儒唯賈生而已師古曰謂賈誼宋祁曰在漢朝不容更有漢字至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師師古曰前學之師也皆起於建元之閒當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書曰禮壊樂崩書缺簡脱朕甚閔焉時漢興已七八十年離於全經固已逺矣師古曰言廢絶以乆不可得其眞也宋祁曰浙本離於作離合及魯恭王壊孔子宅欲以為宮而得古文於壊壁之中逸禮有三十九篇書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通臧於祕府伏而未發孝成皇帝閔學殘文缺稍離其眞乃陳發祕臧校理舊文得此三事以考學官所傳經或脱簡傳或閒編師古曰脱簡遺失之閒編謂舊編爛絶就更次之前後錯亂也閒音古莧反傳問民閒則有魯國桓公趙公貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絶之闕茍因陋就寡分文析字煩言碎辭學者罷老且不能究其一蓺師古曰罷讀曰疲究竟也信口説而背傳記是末師而非往古至於國家將有大事若立辟雍封禪廵狩之儀則幽冥而莫知其原師古曰幽冥猶暗昧也猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懐妬嫉不考情實雷同相從隨聲是非抑此三學以尚書為不備蘇林曰備之而已臣瓉曰當時學者謂尚書唯有二十八篇不知本有百篇也師古曰瓉説是也謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若兹雖昭其情猶依違謙讓師古曰依違言不專決也樂與士君子同之故下明詔試左氏可立不遣近臣奉指衘命將以輔弱扶微與二三君子比意同力冀得廢遺師古曰比合也經蓺有廢遺者冀得興立之也比音頻寐反今則不然深閉固距而不肯試猥以不誦絶之師古曰猥茍也茍不誦習之而欲絶去此學宋祁曰注文當作茍以已不誦習之欲以杜塞餘道絶滅微學夫可與樂成難與慮始此乃衆庻之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徵驗外内相應豈茍而已哉夫禮失求之於野古文不猶愈於野乎師古曰愈勝也往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶復廣立穀梁春秋梁丘易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寜過而立之師古曰過猶誤傳曰文武之道未墜於地在人賢者志其大者不賢者志其小者師古曰論語孔子弟子子貢之言志識也一曰記今此數家之言所以兼包大小之義豈可偏絶哉若必專已守殘師古曰專執已所偏見苟守殘缺之文也黨同門妬道眞師古曰黨同師之學妬道蓺之眞也違明詔失聖意以䧟於文吏之議甚為二三君子不取也其言甚切諸儒皆怨恨是時名儒光禄大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毁先帝所立上曰歆欲廣道術亦何以為非毁哉歆由是忤執政大臣為衆儒所訕師古曰訕謗也音所諌反懼誅求出補吏為河内太守以宗室不宜典三河徙守五原後復轉在涿郡歴三郡守數年以病免官起家復為安定屬國都尉會哀帝崩王莽持政莽少與歆俱為黄門郎重之白太后宋祁曰浙本作太皇太后太后留歆為右曹太中大夫遷中壘校尉羲和京兆尹使治明堂辟雍封紅休侯典儒林史卜之官考定律厯著三統厯譜初歆以建平元年改名秀字穎叔云應劭曰河圖赤伏符云劉秀發兵捕不道四夷雲集龍闘野四七之際火為主故改名幾以趣也宋祁曰注文趣字當作當字及王莽簒位歆為國師後事皆在莽傳贊曰仲尼稱材難不其然與師古曰論語載孔子之言也賢材難得與讀曰歟自孔子後綴文之士衆矣唯孟軻孫況師古曰孫況即荀卿也董仲舒司馬遷劉向揚雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉豈近是乎師古曰近音其靳反劉氏洪範論發明大傳著天人之應七畧剖判蓺文總百家之緒三統歴譜考歩日月五星之度有意其推本之也師古曰言其究極根本深有意也嗚虖師古曰虖讀曰呼向言山陵之戒于今察之哀哉指明梓柱以推廢興昭矣豈非直諒多聞古之益友與師古曰諒信也論語稱孔子曰益者三友友直友諒友多聞益矣賛言向直諒多聞可謂益也與讀曰歟前漢書卷三十六前漢書卷三十六考證楚元王傳孫卿門人也注師古曰漢以避宣帝諱改之曰孫顧炎武曰漢人不避嫌名荀之為孫如孟夘之為芒夘司徒之為申徒語音轉耳削東海薛郡史記但云削東海郡劉德傳雜治劉澤詔獄顧炎武曰徳傳如此而子向傳則云更生父徳武帝時治淮南獄一傳之中自為乖異此兩收而未對勘者也臣召南按徳之仕宦在昭帝初霍光選擇宗室則當武帝治淮南獄時徳尚未為吏也此傳言治劉澤詔獄為得其實向傳因得淮南祕書而附會耳子向坐鑄偽黄金臣浩按此時應云子更生劉向傳徵堪向欲以為諌大夫顧炎武曰更名向在成帝即位之後此在元帝初年即云向非也周大夫祭伯云云注張晏曰穀梁傳曰奔也臣召南按祭伯來穀梁傳以為來朝公羊傳以為出奔向正用公羊説耳張晏注誤劉攽糾之是也李梅冬實七月霜降草木不死注云云臣召南按以下文八月殺菽例之用夏時紀月則此文七月疑是十月之譌周十二月夏之十月也又應倒其文云十月霜降草木不死李梅實則文義俱顯矣序次為列女傳凡八篇曾鞏曰傳稱八篇而隋書及崇文總目稱十五篇曹大家注非向書本然也依東宮之尊注師古曰東宮太后所居也胡三省曰漢制太后率居長樂宮在未央宮東故曰東宮根垂地中胡三省曰孟康云則活切按字書測洽之臿與字不同意漢書字即垂字也臣照按今本或作垂作臿而汲古閣本尚作字輒不為王氏居位者及丞相御史所持注謂扶持佐助也顧炎武曰衍一不字當云輒為王氏居位者及丞相御史所持持者挾制之義而非挾助之解也劉歆傳以紀帝王之道臣宗萬按文選與此傳字句間有同異如紀字選作記又在漢朝之儒選無漢字逸禮有三十九選有篇字傳或間編選作脱編傳問民間選作博問民間雖昭其情選作雖深照其情其古文舊書其字選作為頗有詩禮春秋先師注師古曰前學之師也臣召南按此即所謂經師也眭𢎞上書稱先師董仲舒即是其義得此三事眞德秀曰三事謂左氏春秋古文尚書逸禮也則有魯國桓公趙國貫公膠東庸生之遺臣召南按貫公傳左氏春秋于賈誼者庸生傳古文尚書於都尉朝者桓公即儒林傳桓生傳禮于徐生者别本作柏公非也以尚書為不備注臣瓉曰當時學者謂尚書惟有二十八篇云云臣召南按瓉注据太常孔臧與從弟安國書也漢初不知書本百篇則妄謂二十八篇取象二十八宿前漢書卷三十六考證
