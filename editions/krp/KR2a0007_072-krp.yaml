body:
  text: 前漢書卷七十二漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注王貢兩龔鮑傳第四十二昔武王伐紂遷九鼎於雒邑師古曰九鼎即夏禹所鑄者也遷謂從紂都遷之以来春秋左氏傳曰夏之方有徳也逺方圖物貢金九牧以鑄鼎象物桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周伯夷叔齊薄之師古曰夷齊以武王父死不葬而用干戈為不孝以臣伐君為不忠餓死首陽不食其禄師古曰馬融云首陽山在河東蒲阪華山之北河曲之中髙誘則云在雒陽東北阮籍詠懐詩亦以為然今此二山並有夷齊祠耳而曹大家注幽通賦云隴西首陽縣是也今隴西亦有首陽山許慎又云首陽山在遼西諸說不同致有疑惑而伯夷歌云登彼西山則當隴西者近為是也周猶稱盛徳焉然孔子賢此二人以為不降其志不辱其身也師古曰事見論語而孟子亦云聞伯夷之風者貪夫亷懦夫有立志師古曰懦柔弱也音乃喚反又音儒奮乎百世之上百世之下宋祁曰浙本多二字作行乎百世之下莫不興起非賢人而能若是乎漢興有園公綺里季夏黄公甪里先生師古曰四皓稱號本起於此更無姓名可稱知此盖隠居之人匿跡逺害不自標顯祕其氏族故史傳無得而詳至於後代皇甫謐圈稱之徒及諸地理書說競為四人施安姓字自相錯互語又不經班氏不載於書諸家皆臆説今並弃略一無取焉宋祁曰季字下當有公字甪不成字當作角此四人者當秦之世避而入商雒深山師古曰即今之商州商雒縣山也以待天下之定也自髙祖聞而召之不至其後吕后用留侯計使皇太子卑辭束帛致禮安車迎而致之四人既至從太子見髙祖客而敬焉太子得以為重遂用自安語在留侯傳其後谷口有鄭子真蜀有嚴君平師古曰地理志謂君平為嚴遵三輔決録云子真名樸君平名尊則君平子真皆其字也皆修身自保非其服弗服非其食弗食成帝時元舅大将軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因埶導之以善從吾言者已過半矣裁日閲數人師古曰裁與才同閲歴也得百錢足自養則閉肆下簾而授老子師古曰肆者市也列所坐之處也博覧亡不通依老子嚴周之指著書十萬餘言師古曰嚴周即荘周揚雄少時從游學㠯而仕京師顯名數為朝廷在位賢者稱君平徳杜陵李彊素善雄乆之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰揚子雲誠知人君平年九十餘遂以其業終蜀人愛敬至今稱焉及雄著書言當世士稱此二人其論曰或問君子疾没世而名不稱師古曰以身没而無名為病盍埶諸名卿可㡬曰君子徳名為幾孟康曰盍何不也言何不因名卿之埶以求名韋昭曰言有埶之名卿庶幾可不朽揚子以為不然唯有徳者可以有名師古曰或人以事有權力之卿用自表顯則其名可庶幾而立揚雄以為自蓄其徳則有名也梁齊楚趙之君非不富且貴也師古曰謂當時諸侯王也惡乎成其名師古曰惡於何也惡音烏谷口鄭子真不詘其志耕於巖石之下名震于京師豈其卿豈其卿楚兩龔之絜其清矣乎蜀嚴湛㝠孟康曰蜀郡嚴君平湛深元黙無欲也師古曰湛讀曰沈不作茍見不治茍得師古曰不為茍顯之行不事茍得之業乆幽而不改其操雖隨和何以加諸師古曰隨隨侯珠也和和氏璧也諸之也舉兹以旃不亦寳乎師古曰旃亦之也言舉此人而用之不亦國之寶乎自此已上皆揚雄之言也宋祁曰注文已字疑作以自園公綺里季夏黄公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也若王吉貢禹兩龔之屬皆以禮譲進退云王吉字子陽琅邪臯虞人也少好學明經以郡吏舉孝亷為郎補若盧右丞師古曰少府之屬官有若盧令丞漢舊儀以為主治庫兵者遷雲陽令舉賢良為昌邑中尉而王好游獵驅馳國中動作亡節吉上疏諌曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心􅜢兮師古曰檜國匪風之篇發發飄風貌揭揭疾驅貌􅜢古怛字傷也言見此飄風及疾驅則顧念哀傷思周道也掲音丘列反宋祁曰注文怛字下疑有怛字説曰是非古之風也發發者是非古之車也揭揭者盖傷之也師古曰今之發發然者非古有道之風也今之揭揭然者非古有道之車也故傷之劉攽曰按文及注當云發發者是非古之風也揭揭者是非古之車也􅜢􅜢者盖傷之也今皆誤矣陽夏公云倒文取新古盖多如此不為誤今者大王幸方與師古曰縣名也音房預宋祁曰注文音字上當有方與曽不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也師古曰數音所角反宋祁曰一本無也字昔召公述職師古曰召讀曰邵邵公名奭自陜以西邵公主之當民事時舍於棠下而聽斷焉師古曰舍止息是時人皆得其所後世思其仁恩至乎不伐甘棠甘棠之詩是也師古曰邵南之詩也其詩曰蔽芾甘棠勿翦勿伐邵伯所茇蔽芾小樹貌也甘棠杜棃也茇舍也蔽音必二反芾音方未反茇音步末反大王不好書術而樂逸游馮式撙銜臣瓉曰撙促也師古曰撙挫也音子本反馳騁不止口倦乎叱咤師古曰咤亦吒字也音竹駕反手苦於箠轡師古曰箠馬策音止蘂反身勞乎車輿朝則冒霧露晝則被塵埃師古曰冒犯也音莫克反宋祁曰克景作克校作報浙本作克夏則為大暑之所暴炙冬則為風寒之所匽薄師古曰匽與偃同言遇疾風則偃靡也薄迫也數以耎脆之玉體犯勤勞之煩毒師古曰耎柔也音而兗反非所以全壽命之宗也師古曰宗尊也又非所以進仁義之隆也師古曰隆髙也夫廣夏之下細旃之上師古曰廣夏大屋也旃與氈同明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥徳師古曰訢古欣字其樂豈徒銜橛之閒哉師古曰銜馬銜也橛車鉤心也張揖以橛為馬之長銜非也橛音其月反休則俛仰詘信以利形師古曰形體也信讀曰伸進退步趨以實下如淳曰今人不行則膝已下虚弱不實吸新吐故以練臧專意積精以適神師古曰臧五臧也練練其氣也適和也於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽師古曰喬松仙人伯喬及赤松子也羙聲廣譽登而上聞宋祁曰登疑作發則福禄其轃而社稷安矣師古曰轃與臻同至也皇帝仁聖至今思慕未怠師古曰皇帝謂昭帝也言武帝晏駕未久故尚思慕於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有不具者於以上聞非饗國之福也臣吉愚戇願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰宋祁曰惰疑作愭類篇渠伊反畏也敬也中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從自若師古曰從音子用反吉輙諌爭甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大将軍霍光秉政遣大鴻臚宗正迎昌邑王吉即奏書戒王曰臣聞髙宗諒闇三年不言師古曰已解於上今大王以喪事徴宜日夜哭泣悲哀而已慎毋有所發師古曰發謂興舉衆事宋祁曰南本浙本毋有所發句上有毋有所言一句一本發作言且何獨喪事凡南靣之君何言哉天不言四時行焉百物生焉師古曰論語稱孔子曰天何言哉四時行焉百物生焉天何言哉故吉引之願大王察之大将軍仁愛勇智忠信之徳天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下寄幼孤焉師古曰屬音之欲反大将軍抱持幼君襁褓之中布政施教海内晏然雖周公伊尹亡以加也今帝崩亡嗣大将軍惟思可以奉宗廟者攀援而立大王師古曰援引也音爰其仁厚豈有量哉師古曰言其深多也量音力向反臣願大王事之敬之政事壹聽之大王垂拱南面而已願留意常以為念王既到即位二十餘日以行淫亂廢昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡師古曰道讀曰導皆下獄誅唯吉與郎中令龔遂以忠直數諫正得減死髠為城旦起家復為益州刺史病去官復徴為博士諌大夫是時宣帝頗修武帝故事宫室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務将興太平詔書毎下民欣然若更生臣伏而思之可謂至恩未可謂本務也師古曰言天子如此雖於百姓為至恩然未盡政務之本也欲治之主不世出師古曰言有時遇之不常值宋祁曰注文不字下疑有可字公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也師古曰三代夏殷周其務在於期㑹簿書斷獄聽訟而已此非太平之基也臣聞聖王宣徳流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣徳也詩云濟濟多士文王以寜師古曰大雅文王之詩也此其本也春秋所以大一統者六合同風九州共貫也師古曰解在董仲舒傳今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇師古曰繇與由同以意穿鑿各取一切權譎自任故一變之後不可復修也師古曰言其敝深難乆行是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極師古曰萌生言其爭出如草木之初生質樸日消恩愛寖薄師古曰寖漸也孔子曰安上治民莫善於禮師古曰孝經載孔子之言非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民躋之仁壽之域師古曰以仁撫下則羣生安逸而夀考則俗何以不若成康壽何以不若髙宗師古曰髙宗殷王武丁也享國百年竊見當世趨務不合於道者謹條奏師古曰趨讀曰趣趣嚮也唯陛下財擇焉師古曰財與裁同吉意以為夫婦人倫大綱夭壽之萌也師古曰由之而生故云萌世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主晉灼曰娶天子女則曰尚公主國人娶諸侯女曰承翁主尚承皆卑下之名也師古曰翁主者言其父自主婚也解具在髙帝紀使男事女夫詘於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章以襃有徳而别尊卑今上下僭差人人自制師古曰言無節度是以貪財誅利宋祁曰南本浙本作趨利不畏死亡周之所以能致治刑措而不用者以其禁邪於㝠㝠絶惡於未萌也師古曰㝠㝠言未有端緒又言舜湯不用三公九卿之世而舉臯陶伊尹李竒曰不繼世而爵也言臯陶伊尹非三公九卿之世不仁者逺師古曰任用賢人放黜讒佞今使俗吏得任子弟張晏曰子弟以父兄任為郎率多驕驁不通古今師古曰驁與傲同至於積功治人亡益於民此伐檀所為作也師古曰伐檀詩篇名刺在位貪鄙無功而受禄宋祁曰注文一本刺不用賢也在魏國風也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方師古曰尚方主巧作明視天下以儉師古曰視讀曰示古者工不造琱瑑商不通侈靡師古曰瑑者刻鏤為文瑑音篆非工商之獨賢政教使之然也民見儉則歸本本立而末成其指如此上以其言迂闊不甚寵異也師古曰迂逺也音于吉遂謝病歸琅邪始吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉師古曰啖謂使食之音徒濫反啖亦㗖字耳此義與髙紀㗖以利同吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還其厲志如此吉與貢禹為友世稱王陽在位貢公彈冠師古曰彈冠者言入仕也言其取舍同也師古曰取進趣也舍止息也元帝初即位遣使者徴貢禹與吉吉年老道病卒上悼之復遣使者弔祠云初吉兼通五經能為騶氏春秋以詩論語教授好梁丘賀説易令子駿受焉駿以孝廉為郎左曹陳咸薦駿賢父子經明行修宜顯以厲俗光禄勲匡衡亦舉駿有專對材師古曰專對謂見問即對無所疑也論語稱孔子曰使於四方不能專對雖多亦奚以為遷諫大夫使責淮陽憲王師古曰以其有口辭遷趙内史吉坐昌邑王被刑後戒子孫毋為王國吏故駿道病免官歸起家復為幽州刺史遷司𨽻校尉奏免丞相匡衡遷少府八歲成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王而薛宣從左馮翊代駿為少府㑹御史大夫缺谷永奏言聖王不以名譽加於實效師古曰言不聽虚名考績用人之法師古曰言用人之法皆須考以功績薛宣政事已試師古曰言有效也上然其議宣為少府月餘遂超御史大夫至丞相駿乃代宣為御史大夫並居位六歲病卒翟方進代駿為大夫數月薛宣免遂代為丞相衆人為駿恨不得封侯駿為少府時妻死因不復娶或問之駿曰徳非曽參子非華元如淳曰華與元曽參之二子也韓詩外傳曰曽參喪妻不更娶人問其故曽子曰以華元善人也一曰曽參之子字華元師古曰二子是也亦何敢娶駿子崇以父任為郎歴刺史郡守治有能名建平三年以河南太守徵入為御史大夫數月是時成帝舅安成恭侯夫人放寡居共養長信宫師古曰放者夫人之名也共音居用反養音弋亮反坐祝詛下獄崇奏封事為放言放外家解氏與崇為昏師古曰婚姻之家哀帝以崇為不忠誠策詔崇曰朕以君有累世之美師古曰謂自祖及身皆有名也故踰列次在位以来忠誠匡國未聞所繇師古曰繇與由同由從也反懐詐諼之辭師古曰諼詐言也音虚袁反欲以攀救舊姻之家大逆之辜舉錯專恣師古曰錯置也不遵法度亡以示百僚左遷為大司農後徙衞尉左将軍平帝即位王莽秉政大司空彭宣乞骸骨罷崇代為大司空封扶平侯歲餘崇復謝病乞骸骨皆避王莽莽遣就國歲餘為傅婢所毒薨國除師古曰凡言傅婢者謂傅相其衣服衽席之事一讀傅曰附謂近幸也自吉至崇世名清廉然材器名稱稍不能及父而禄位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過嚢衣師古曰一囊之衣也有底曰嚢無底曰槖不畜積餘財師古曰畜讀曰蓄去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黄金師古曰以其無所求取不營産業而車服鮮明故謂自作黄金以給用貢禹字少翁琅邪人也以明經絜行著聞徵為博士凉州刺史病去官復舉賢良為河南令歲餘以職事為府官所責師古曰太守之府免冠謝禹曰冠壹免安復可冠也遂去官元帝初即位徵禹為諌大夫數虚己問以政事師古曰虚己謂聽受其言也是時年歲不登郡國多困禹奏言古者宫室有制宫女不過九人秣馬不過八匹師古曰秣養也謂以粟米飤也牆塗而不琱木摩而不刻師古曰琱字與彫同彫畫也車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而税亡它賦斂繇戍之役使民歲不過三日千里之内自給千里之外各置貢職而已師古曰言天子以畿内賦斂自供千里之外令其以時入貢不欲煩勞也故天下家給人足頌聲並作至髙祖孝文孝景皇帝循古節儉宫女不過十餘廐馬百餘匹孝文皇帝衣綈履革師古曰綈厚繒音徒奚反器亡琱文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效師古曰放音甫徃反其下亦同衣服履絝刀劒亂於主上師古曰絝古袴字主上時臨朝入廟衆人不能别異甚非其宜然非自知奢僭也猶魯昭公曰吾何僭矣今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下師古曰正曲曰矯復音方目反臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂師古曰論語稱孔子日益者三樂樂節禮樂樂道人之善樂多賢友也方今宫室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥師古曰三服官主作天子之服在齊地笥盛衣竹器音先嗣反方今齊三服官作工各數千人一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬如淳曰地理志河内懐蜀郡成都廣漢皆有工官工官主作銀器物者也師古曰如説非也三工官謂少府之屬官考工室也右工室也東園匠也上已言蜀廣漢主金銀器是不入三工之數也東西織室亦然廐馬食粟将萬匹臣禹嘗從之東宫師古曰從天子徃太后宫見賜杯案盡文畫金銀飾非當所以賜食臣下也師古曰食讀曰飤東宫之費亦不可勝計天下之民所為大饑餓死者是也今民大饑而死死又不葬為犬豬所食師古曰食人之骸骨宋祁曰浙本無所字人至相食而廐馬食粟苦其大肥氣盛怒至乃日歩作之師古曰日日行歩而動作之以散充溢之氣王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫師古曰此填字讀與寘同及弃天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宫女置於園陵宋祁曰以字疑作取字大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言師古曰不能自言減省之事羣臣亦隨故事甚可痛也故使天下承化取女皆大過度師古曰取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以内多怨女外多曠夫師古曰曠空也室家空也及衆庶葬埋皆虚地上以實地下其過自上生師古曰自從也上謂天子也皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乗輿服御器物三分去二子産多少有命審察後宫擇其賢者留二十人餘悉歸之師古曰言人産子多少自有定命非由廣妾媵也故請止留二十人及諸陵園女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也廐馬可亡過數十匹獨舍長安城南苑地以為田獵之囿師古曰舍置也獨留置之其餘皆廢去自城西南至山西至鄠皆復其田以與貧民師古曰復音方目反方今天下饑饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娱樂而已也故詩曰天難諶斯不易惟王上帝臨女毋貳爾心師古曰大雅大明之詩也諶誠也上帝亦天也言承天之意此誠難矣王者之命不妄改易天常降鑒甚可畏也毋貳爾心機事易失勿猶豫也當仁不讓師古曰論語稱孔子曰當仁不讓於師故引之獨可以聖心參諸天地揆之往古師古曰揆度也不可與臣下議也若其阿意順指隨君上下師古曰上下猶言髙下謂茍順從也上音時掌反臣禹不勝拳拳不敢不盡愚心師古曰拳拳解在劉向傳下鮑宣傳惓惓音義亦同天子納善其忠乃下詔令太僕減食穀馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光禄大夫頃之禹上書曰臣禹年老貧窮家訾不滿萬錢妻子穅豆不贍裋褐不完師古曰裋者謂僮豎所著布長襦也褐毛布之衣也裋音豎有田百三十畝陛下過意徵臣師古曰過猶誤也臣賣田百畝以供車馬至拜為諫大夫秩八百石奉錢月九千二百師古曰奉音扶用反其下亦同廩食太官師古曰謂太官給其食又䝉賞賜四時雜繒緜絮衣服酒肉諸果物徳厚甚深疾病侍醫臨治師古曰侍醫天子之醫也賴陛下神靈不死而活又拜為光禄大夫秩二千石奉錢月萬二千禄賜愈多家日以益富身日以益尊誠非少茅愚臣所當䝉也師古曰􅋄古草字伏自念終亡以報厚徳日夜慙愧而已臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸禄洿朝之臣也師古曰洿與汚同音一故反自痛去家三千里凡有一子年十二非有在家為臣具棺椁者也誠恐一旦蹎仆氣竭不復自還師古曰蹎音顛蹷躓也仆音赴仆頓也不自還者遂死也還讀曰旋洿席薦於宫室骸骨弃捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里師古曰及身生謂及未死之前死亡所恨天子報曰朕以生有伯夷之廉史魚之直師古曰生謂先生也史魚衛大夫史鰌也論語稱孔子曰直哉史魚邦有道如矢邦無道如矢言其壹志守經據古不阿當世孳孳於民俗之所寡師古曰孳與孜同孜孜不怠也寡少也言少有此人故親近生幾參國政師古曰幾讀曰兾今未得久聞生之竒論也而云欲退意豈有所恨與師古曰與讀曰歟将在位者與生殊乎師古曰言志趣不同往者嘗令金敞語生欲及生時禄生之子既已諭矣今復云子少夫以王命辨䕶生家雖百子何以加傳曰亡懐土師古曰論語孔子曰君子懐徳小人懐土何必思故鄉生其強飯慎疾以自輔後月餘以禹為長信少府㑹御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上禹以為古民亡賦算口錢起武帝征伐四夷重賦於民民産子三歲則出口錢故民重困師古曰重音直用反至於生子輒殺甚可悲痛宜令兒七歲去齒乃出口錢年二十乃算又言古者不以金錢為幣專意於農故一夫不耕必有受其飢者今漢家鑄錢及諸鐡官皆置吏卒徒攻山取銅鐡一歲功十萬人已上宋祁曰已當作以中農食七人是七十萬人常受其飢也鑿地數百丈銷隂氣之精地臧空虚不能含氣出雲斬伐林木亡有時禁水旱之災未必不繇此也師古曰繇讀與由同自五銖錢起已来七十餘年民坐盗鑄錢被刑者衆富人積錢滿室猶亡厭足民心動揺商賈求利東西南北各用智巧好衣美食歲有十二之利師古曰若有萬錢為賈則獲二千之利而不出租税農夫父子暴露中野不避寒暑捽􅋄杷土手足胼胝師古曰捽拔取也􅋄古草字也杷手掊之也胼併也胝繭也捽音才兀反杷音蒲巴反其字從木胼音歩千反胝音竹尸反掊音蒲交反已奉穀租又出槀税師古曰槀禾稈也鄉部私求不可勝供師古曰言鄉部之吏又私有所求不能供之故民弃本逐末耕者不能半貧民雖賜之田猶賤賣以賈師古曰賣田與人而更為商賈之業窮則起為盗賊何者末利深而惑於錢也是以姦邪不可禁其原皆起於錢也疾其末者絶其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣師古曰賤買貴賣曰販除其租銖之律師古曰租税之法皆依田畝不得雜計百物之銖兩租税禄賜皆以布帛及穀使百姓壹歸於農復古道便師古曰追遵古法於事便也復音扶目反又言諸離宫及長樂宫衞可減其太半以寛繇役師古曰繇讀曰徭又諸官奴婢十萬餘人戲游亡事税良民以給之歲費五六鉅萬宜免為庶人廪食師古曰給以食令代關東戌卒乗北邉亭塞候望師古曰乗登也又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦禹又言孝文皇帝時貴廉絜賤貪汙賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅師古曰白明也疑者以與民師古曰罪疑從輕也亡贖罪之法故令行禁止海内大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲師古曰從讀曰縱耆讀曰嗜用度不足乃行壹切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盗賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職師古曰上府謂所屬之府右職髙職也姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位師古曰操持也切刻也操音千髙反劉攽曰百姓下多者字宋祁曰去者字故亡義而有財者顯於世欺謾而善書者尊於朝師古曰謾詐也謾音慢又音武連反誖逆而勇猛者貴於官師古曰誖亂也音布内反故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髠鉗者猶復攘臂為政於世行雖犬彘家富埶足目指氣使是為賢耳師古曰動目以指物出氣以使人故謂居官而置富者為雄桀處姦而得利者為壮士兄勸其弟父勉其子俗之壊敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利師古曰相諸侯相也守郡守也崇尚也誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官師古曰不止免官而已則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不解之故師古曰解讀曰懈四海之内天下之君微孔子之言亡所折中師古曰㣲亦無也折斷也非孔子之言則無以為中也音竹仲反斷音丁煥反况乎以漢地之廣陛下之徳處南靣之尊秉萬乗之權因天地之助其於變世易俗調和隂陽陶冶萬物化正天下易於決流抑隊師古曰決欲流之水抑将隊之物言其便易自成康以来幾且千歲師古曰幾音鉅依反欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念髙祖之苦師古曰言取天下艱難也醇法太宗之治正已以先下選賢以自輔開進忠正致誅姦臣逺放讇佞師古曰逺離也音于萬反讇古諂字放出園陵之女罷倡樂絶鄭聲去甲乙之帳退偽薄之物修節儉之化驅天下之民皆歸於農如此不解師古曰解讀曰懈也則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民産子七歲乃出口錢自此始又罷上林宫館希幸御者及省建章甘泉宫衞卒減諸侯王廟衞卒省其半餘雖未盡從然嘉其質直之意禹又奏欲罷郡國廟定漢宗廟迭毁之禮皆未施行師古曰迭互也親盡則毁故曰迭毁迭音大結反為御史大夫數月卒天子賜錢百萬以其子為郎官至東郡都尉禹卒後上追思其議竟下詔罷郡國廟定迭毁之禮然通儒或非之語在韋𤣥成傳宋祁曰然通儒或非之江南兩浙本無此六字兩龔皆楚人也勝字君賔舍字君倩師古曰倩音干見反二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕久之楚王入朝聞舍髙名聘舍為常侍不得已隨王歸國固辭願卒學復至長安師古曰卒終也終其經業而勝為郡吏三舉孝廉以王國人不得宿衞補吏宋祁曰補字下疑有出字再為尉壹為丞勝輙至官廼去州舉茂才為重泉令師古曰重泉左馮翊縣也病去官大司空何武執金吾閻崇薦勝哀帝自為定陶王固已聞其名徵為諌大夫引見勝薦龔舍及亢父寗壽濟隂侯嘉師古曰亢音抗父音甫有詔皆徵勝曰竊見國家徵醫巫常為駕徵賢者宜駕上曰大夫乗私車来邪勝曰唯唯師古曰唯唯恭應之詞也音弋癸反有詔為駕龔舍侯嘉至皆為諌大夫寗壽稱疾不至勝居諌官數上書求見言百姓貧盗賊多吏不良風俗薄災異數見不可不憂制度泰奢刑罰泰深賦斂泰重宜以儉約先下其言祖述王吉貢禹之意為大夫二歲餘遷丞相司直徙光禄大夫守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫師古曰依舊官諸吏給事中勝言董賢亂制度繇是逆上指師古曰繇讀與由同後歲餘丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下将軍中朝者議左将軍公孫禄司𨽻鮑宣光禄大夫孔光等十四人皆以為嘉應迷國不道法勝獨書議曰嘉資性邪僻所舉多貪殘吏位列三公隂陽不和諸事並廢咎皆繇嘉師古曰繇讀與由同迷國不疑文穎曰信必迷國不疑也今舉相等過㣲薄日暮議者罷明旦復㑹左將軍禄問勝君議亡所據今奏當上宜何從師古曰今欲奏此事君定從何議也勝曰将軍以勝議不可者通劾之師古曰并劾勝博士夏侯常見勝應禄不和起至勝前謂曰宜如奏所言師古曰謂如尚書所劾奏也勝以手推常曰去後數日復㑹議可復孝惠孝景廟不議者皆曰宜復勝曰當如禮常復謂勝禮有變勝疾言曰去是時之變師古曰疾急也言時人意自變耳禮不變也常恚謂勝曰我視君何若師古曰何若言無所似也君欲小與衆異外以采名君乃申徒狄屬耳服䖍曰殷之末世介士也自沈於河者先是常又為勝道髙陵有子殺母者勝白之尚書問誰受師古曰言於誰聞之也對曰受夏侯常尚書使勝問常常連恨勝師古曰連恨謂再被譛去即應曰聞之白衣戒君勿言也服䖍曰聞之白衣耳戒君勿言之如何便上之邪師古曰白衣給官府趨走賤人若今諸司亭長掌固之屬奏事不詳妄作觸罪師古曰言奏事不審妄有發作自觸罪也勝窮無以對尚書即自劾奏與常爭言洿辱朝廷事下御史中丞召詰問劾奏勝吏二千石常位大夫皆幸得給事中與論議師古曰與讀曰豫劉奉世曰前云博士後云位大夫然博士非中朝臣疑言博士者誤也不崇禮義而居公門下相非恨疾言辨訟媠謾亡狀師古曰疾急也媠古惰字謾讀與慢同亡狀無善狀也皆不敬制曰貶秩各一等勝謝罪乞骸骨上乃復加賞賜以子博為侍郎出勝為渤海太守勝謝病不任之官積六月免歸上復徵為光禄大夫勝常稱疾卧數使子上書乞骸骨㑹哀帝崩初琅邪邴漢亦以清行徵用至京兆尹後為太中大夫王莽秉政勝與漢俱乞骸骨自昭帝時涿郡韓福以徳行徵至京師賜策書束帛遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里行道舍傳舍師古曰於傳舍止宿若今官人行得過驛也縣次具酒肉食從者及馬師古曰道次給酒肉並飤其從者及馬也食讀曰飤長吏以時存問常以歲八月賜羊壹頭酒二斛不幸死者賜複衾一祠以中牢於是王莽依故事白遣勝漢策曰惟元始二年六月庚寅光禄大夫太中大夫耆艾二人以老病罷太皇太后使謁者僕射策詔之曰蓋聞古者有司年至則致仕所以恭讓而不盡其力也今大夫年至矣朕愍以官職之事煩大夫其上子若孫若同産同産子一人師古曰同産兄弟也同産子即兄弟子也大夫其修身守道以終髙年賜帛及行道舍宿歲時羊酒衣衾皆如韓福故事所上子男皆除為郎孔武仲曰龔勝邴漢乞骸骨詔謂之耆艾二人而不名時勝為光禄大夫漢為大中大夫特詔行道舍傳舍傳舍如今驛舍也漢得入驛如此之嚴也於是勝漢遂歸老于鄉里漢兄子曼容亦養志自修為官不肯過六百石輙自免去其名過出於漢初龔舍以龔勝薦徵為諌大夫病免復徵為博士又病去頃之哀帝遣使者即楚拜舍為太山太守師古曰即猶就也舍家居在武原使者至縣請舍欲令至廷拜授印綬師古曰廷謂縣之庭内舍曰王者以天下為家何必縣官遂於家受詔便道之官既至數月上書乞骸骨上徵舍至京兆東湖界師古曰湖縣也時屬京兆固稱病篤天子使使者收印綬拜舍為光禄大夫數賜告舍終不肯起乃遣歸舍亦通五經以魯詩教授舍勝既歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮舍年六十八王莽居攝中卒莽既簒國遣五威将帥行天下風俗将帥親奉羊酒存問勝明年莽遣使者即拜勝為講學祭酒師古曰即就也就其家而拜之勝稱疾不應徵後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜師古曰就家迎之因拜官秩上卿先賜六月禄直以辦装使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔師古曰行義謂鄉邑有行義之人也諸生謂學徒也行音下更反使者欲令勝起迎久立門外勝稱病篤為牀室中户西南牖下師古曰牖窓也於户之西室之南牖下也東首加朝服拕紳師古曰拕引也卧著朝衣故云加引大帶於體也論語稱孔子疾君視之東首加朝服拕紳故放之也拕音土賀反使者入户西行南靣立致詔付璽書遷延再拜奉印綬内安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海内勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路師古曰示若尊敬使者故謂之使君無益萬分使者要説師古曰要音一遥反説音式鋭反至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋凉廼發師古曰須待也有詔許使者五日一與太守俱問起居為勝兩子及門人髙暉等言朝廷虚心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事師古曰棺音宫煥反斂音力贍反衣周於身棺周於衣勿隨俗動吾冡種柏作祠堂師古曰若葬多設器備則恐被掘故云動吾冡也亦不得種柏及作祠堂皆不隨俗劉攽曰勝意一葬之後更不得隨俗動冡土種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜複衾祭祠如法門人衰絰治喪者百數有老父来弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷師古曰薰芳草龔生竟夭天年非吾徒也遂趨而出莫知其誰勝居彭城亷里後世刻石表其里門鮑宣字子都渤海髙城人也好學明經為縣鄉嗇夫守束州丞師古曰束州渤海之縣也後為都尉太守功曹舉孝亷為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曹掾甚敬重焉薦宣為諫大夫遷豫州牧歳餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聽訟所察過詔條師古曰出六條之外行部乗傳去法駕師古曰行音下更反傳音張戀反駕一馬師古曰言其單率不依典制也舍宿鄉亭為衆所非宣坐免歸家數月復徵為諫大夫宣每居位常上書諌爭其言少文多實是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正義失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諌大夫從其後上書諌曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷師古曰塞滿也妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今奈何反覆劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士服䖍曰魁壘壮貎也師古曰魁音口賄反壘音磊議論通古今喟然動衆心師古曰喟然嘆息貌音丘位反憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省户下師古曰敦謂厚重也陛下欲與此共承天地安海内甚難師古曰共讀曰供劉奉世曰共讀如字今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服師古曰四罪謂流共工于幽州放驩兜于崇山竄三苖于三危殛鯀于羽山也今除一吏而衆皆惑古刑人尚服今賞人反惑鄧展曰不得其人使天下惑也請寄為姦師古曰請寄謂以事私相託也羣小日進國家空虚用度不足民流亡去城郭盜賊並起吏為殘賊歲増於前凡民有七亡師古曰亡謂失其作業也陰陽不和水旱為災一亡也縣官重責更賦租税二亡也師古曰更謂為更卒也音工行反貪吏並公受取不已三亡也師古曰並依也音步浪反豪強大姓蠶食亡厭四亡也宋祁曰大姓下疑有家字苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也晋灼曰迣古列字也師古曰言聞桴鼓之聲以為有盗賊皆遮列而追捕盗賊劫畧取民財物七亡也七亡尚可又有七死酷吏毆殺一死也師古曰毆擊也音一口反治獄深刻二死也寃陷亡辜三死也盗賊横發四死也師古曰横音胡孟反怨讐相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪師古曰守郡守也相諸侯相也羣臣幸得居尊官食重禄豈有肯加惻隱於細民助陛下流教化者邪師古曰惻隱皆痛也志但在營私家稱賔客為姦利而已師古曰務稱賔客所求也稱音尺孕反以茍容曲從為賢以拱黙尸禄為智師古曰尸主也不憂其職但主食禄而已謂如臣宣等為愚陛下擢臣巖穴誠兾有益豪毛豈徒欲使臣羙食大官重髙門之地哉晉灼曰髙門殿名也師古曰在未央宫中天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩云尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩之鳥養其子七平均如一善人君子布德施惠亦當然也尸鳩拮鞠也拮音居黠反宋祁曰浙本無之詩二字今貧民菜食不厭衣又穿空師古曰空孔也父子夫婦不能相保誠可為酸鼻陛下不救将安所歸命乎師古曰安焉也奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉劉徳曰視酒如漿視肉如霍也師古曰霍豆葉也貧人茹之也蒼頭廬兒皆用致富非天意也孟康曰黎民黔首黎黔皆黒也下民隂類故以黒為號漢名奴為蒼頭非純黒以别於良人也諸給殿中者所居為廬蒼頭侍從因呼為廬兒臣瓉曰漢儀注官奴給書計從侍中已下為蒼頭青幘及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人師古曰此官不當加於此人此人不當受於此官也而望天説民服豈不難哉師古曰説讀曰悦方陽侯孫寵宜陵侯息夫躬辨足以移衆彊可用獨立姦人之雄或世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左将軍彭宣經皆更博士位皆歴三公師古曰更亦歷也音工衡反智謀威信可與建教化圖安危師古曰建立也圖謀也龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦師古曰委輸謂輸委積者也委音迂偽反輸音式喻反宋祁曰注文輸景本作式俞反可大委任也陛下前以小不忍退武等海内失望師古曰小有不快於心不能忍之也陛下尚能容亡功徳者甚衆曽不能忍武等邪治天下者當用天下之心為心不得自專快意而已也上之皇天見譴下之黎庶怨恨次有諌爭之臣陛下茍欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受禄賜羙食大官廣田宅厚妻子不與惡人結仇怨以安身邪誠迫大義官以諌爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣呐鈍於辭師古曰呐亦訥字也不勝惓惓盡死節而已上以宣名儒優容之是時郡國地震民訛言行籌明年正月朔日蝕上乃徵孔光免孫寵息夫躬罷侍中諸曹黄門郎數十人宣復上書言陛下父事天母事地子養黎民即位已来父虧明母震動子訛言相驚恐今日蝕於三始如淳曰正月一日為歲之朝月之朝日之朝始猶朝也誠可畏懼小民正月朔日尚恐毁敗器物何况於日虧乎陛下深内自責避正殿舉直言求過失罷退外親及旁仄素餐之人師古曰庂古側字也徴拜孔光為光禄大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜師古曰歙音翕説音悦次亦同也天人同心人心説則天意解矣乃二月丙戌白虹虷日連隂不雨師古曰虷音干此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親師古曰葭音工遐反莩音孚葭莩喻輕薄而附著也解在景十三王𫝊但以令色諛言自進師古曰令善也䛕謟也賞賜亡度竭盡府臧并合三第尚以為小復壊暴室師古曰時以三第總為一第賜賢猶嫌陿小復取暴室之地以増益之也賢父子坐使天子使者将作治第行夜吏卒皆得賞賜師古曰為賢第上持時行夜者行音下更反上冡有㑹輒太官為供海内貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讐海内免遣就國收乗輿器物還之縣官如此可以父子終其性命不者海内之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下師古曰視讀曰示復徵何武師丹彭宣傅喜曠然使民易視以應天心師古曰易改也建立大政以興太平之端髙門去省戸數十歩求見出入二年未省師古曰不被省視也欲使海瀕仄陋自通逺矣師古曰瀕涯也音頻又音賔願賜數刻之間師古曰刻漏刻也間空隙極竭毣毣之思師古曰毣音沐沐沐猶蒙蒙也如淳曰謹愿之貎也宋祁曰浙本無竭字退入三泉死亡所恨師古曰三重之泉言其深也上感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司𨽻時哀帝改司𨽻校尉但為司𨽻官比司直丞相孔光四時行園陵師古曰行音下更反官屬以令行馳道中如淳曰令諸使有制得行馳道中者行旁道無得行中央三丈也宣出逢之使吏鉤止丞相掾史師古曰鉤留也没入其車馬摧辱宰相事下御史中丞侍御史至司𨽻官欲捕從事閉門不肯内師古曰御史欲捕從事而司𨽻閉門不得入也宣坐距閉使者亡人臣禮大不敬不道宋祁曰南本無不道二字下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司𨽻者㑹此下諸生會者千餘人朝日遮丞相孔光自言師古曰朝日謂早旦欲入朝也丞相車不得行又守闕上書上遂抵宣罪減死一等髠鉗宣既被刑乃徙之上黨以為其地宜田牧又少豪俊易長雄師古曰長為之長帥也雄為之雄豪也遂家于長子師古曰上黨之縣也長讀如本字平帝即位王莽秉政隂有篡國之心乃風州郡以辠法案誅諸豪桀師古曰風讀曰諷及漢忠直臣不附己者宣及何武等宋祁曰武字下疑有與宣女壻字皆死時名捕隴西辛興師古曰詔顯其名而捕之興與宣女壻許紺俱過宣一飯去師古曰飯音扶晩反宣不知情宋祁曰情字上疑有其字坐繫獄自殺自成帝至王莽時清名之士琅邪又有紀逡王思齊則薛方子容太原則邭越臣仲郇相稚賔沛郡則唐林子髙唐尊伯髙師古曰并列其人本土及姓名字也後皆類此逡音于旬反郇音荀又音胡頑反今荀郇二姓並有之俱稱周武王之後也皆以明經飭行顯名於世師古曰飭謹也讀與勅同紀逡兩唐皆仕王莽封侯貴重歴公卿位唐林數上疏諌正有忠直節唐尊衣敝履空服䖍曰履猶屨也師古曰衣音於既反著敝衣躡空履也空穿也以瓦器飲食又以歴遺公卿服䖍曰以瓦器遺之也被虛偽名師古曰被音皮義反郇越相同族昆弟也並舉州郡孝亷茂材數病去官越散其先人訾千餘萬以分施九族州里志節尤髙相王莽時徵為太子四友病死莽太子遣使裞以衣衾師古曰贈喪衣服曰祱裞音式芮反其字從衣其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之薛方嘗為郡掾祭酒嘗徵不至及莽以安車迎方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之徳小臣欲守箕山之節也張晏曰許由隱於箕山在陽城有許由祠宋祁曰由字按注并賛注及江浙本作許字今字上疑有亦猶二字使者以聞莽説其言不強致師古曰説讀曰悦方居家以經教授喜屬文師古曰喜音許吏反屬音之欲反著詩賦數十篇始隃麋郭欽哀帝時為丞相司直師古曰隃麋扶風之縣也隃音踰奏免豫州牧鮑宣京兆尹薛修等又奏董賢左遷盧奴令平帝時遷南郡太守而杜陵蒋詡元卿為兗州刺史亦以亷直為名王莽居攝欽詡皆以病免官歸鄉里卧不出戸卒於家齊栗融客卿北海禽慶子夏蘇章游卿山陽曹竟子期皆儒生去官不仕於莽莽死漢更始徵竟以為丞相封侯欲視致賢人銷寇賊師古曰視讀曰示竟不受侯爵㑹赤眉入長安欲降竟竟手劔格死世祖即位徵薛方道病卒兩龔鮑宣子孫皆見褒表至大官賛曰易稱君子之道或出或處或黙或語師古曰上繫辭也謂發跡雖異同歸於道言其各得道之一節譬諸草木區以别矣師古曰言蘭桂異類而各芬馨故曰山林之士往而不能反朝廷之士入而不能出二者各有所短春秋列國卿大夫及至漢興将相名臣懐禄耽寵以失其世者多矣師古曰懐思也言不能去是故清節之士於是為貴然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉師古曰論語稱孔子曰篤信好學守死善道危邦不入亂邦不居今龔勝不受莽官蹈斯之跡也宋祁曰注文之字當刪貞而不諒薛方近之師古曰論語稱孔子曰君子貞而不諒謂君子之人正其道耳言不必信也薛方志避亂朝詭引巢許為喻近此義也郭欽蒋詡好遯不汙絶紀唐矣師古曰欽詡不仕於莽遯逃濁亂不汙其節殊於紀逡及兩唐前漢書卷七十二前漢書卷七十二考證有園公句綺里季夏句黄公句甪里先生句田汝成曰四皓名字當讀為綺里季夏而後人誤讀為夏黄公亦猶樂正裘牧仲之誤耳臣召南按杜甫詩曰黄綺終辭漢以黄綺並稱即知唐人讀本不誤又按甪里甪字宋史儒林傳崔偓佺為直講太宗顧謂曰李覺甞奏朕云四皓中一先生姓或言用字加撇或云加㸃爾知否偓佺對曰臣聞刀用為角音𣙜兩㸃為甪音鹿用上一撇一㸃俱不成字据偓佺此論則俗本作甪字者亦非也宋祁曰甪不成字當作角俗本又誤甪作角盖縁不知崔偓佺之論耳其後谷口有鄭子真按地理志谷口縣屬左馮翊王吉傳琅邪臯虞人也臣召南按吉為琅邪王氏之祖唐書宰相世系表曰秦将王離子元避亂遷琅邪後徒臨沂四世孫吉始家臯虞後徙臨沂都鄉南仁里今者大王幸方與胡三省曰方與縣本屬山陽郡武帝以山陽為昌邑王國方與縣屬焉敺一世之民躋之仁壽之域注師古曰以仁撫天下云云胡三省曰此以仁壽並言仁者不鄙詐壽者不夭折也顔注非是吉意以為夫婦人倫大綱云云真徳秀曰吉意以下盖史家撮其大㫖如此非本文也左曹陳咸薦駿賢父子臣召南按賢父子猶云賢父之子兩龔傳常以歳八月賜羊壹頭酒二斛臣召南按韓福事昭紀作郡縣常以正月賜羊酒紀係録詔書原文疑此八月當為正月之訛又按羊壹頭壹字應作一各本俱誤耳勿隨俗動吾冡云云注師古曰若葬多設器偹則恐被掘云云顧炎武曰古人族葬勝必已自有墓若隨俗人之意更於冡上種栢作祠堂則是動吾冡也盖以朝代遷革一切飾終之禮俱不欲用鮑宣傳勃海髙城人也髙城地理志作髙成薛方嘗為郡掾祭酒云云臣召南按鮑宣傳特附薛方郭欽蔣詡栗融禽慶蘇章曹竟皆不仕莽世清節著名者据後書卓茂傳茂與孔休蔡勲劉宣龔勝鮑宣六人同志又申徒剛宣秉王丹王良郭丹蔡茂及陳寵之曽祖咸各見本傳而儒林傳載髙詡包咸獨行傳載譙元李業王皓王嘉劉茂逸民傳載向長逄萌王君公周黨譚賢殷謨王覇戴遵皆立志較然不汚新室爵命宜與薛方諸賢牽連書之乃莽大夫揚雄一傳累牘連篇而於諸賢聊表一二此則班氏之失也皆見褒表至大官臣召南按兩龔子孫後書無傳鮑宣子永孫昱三世司𨽻後書有傳而宣妻桓少君在列女傳前漢書卷七十二考證
