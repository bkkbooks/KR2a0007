body:
  text: 前漢書卷五十五漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顔師古注衛青霍去病傳第二十五衛青字仲卿其父鄭季河東平陽人也以縣史給事侯家平陽侯曹夀尚武帝姊陽信長公主師古曰夀姓曹為平陽侯當是曹參之後然參傳及功臣侯表並無之未詳其意也季與主家僮衛媪通師古曰僮者婢女之總稱也媪者後年老之號非當時所呼也衛者舉其夫家姓也生青青有同母兄衛長君及姊子夫子夫自平陽公主家得幸武帝故青冒姓為衛氏師古曰冒謂假稱若人首之有覆冒也衛媼長女君孺次女少兒次女則子夫子夫男弟歩廣皆冒衛氏師古曰言歩廣及青二人皆不姓衛而冒稱青為侯家人少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟數服䖍曰民母嫡母也師古曰言鄭季正妻本在編戸之間以别於公主家也今流俗書本云牧羊人間先母之子不以為兄弟數妄増也青嘗從人至甘泉居室張晏曰居室甘泉中徒所居也有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎青壯為侯家騎從平陽主建元二年春青姊子夫得入宮幸上皇后大長公主女也文頴曰陳皇后武帝姑女也無子妬大長公主聞衛子夫幸有身妬之迺使人捕青青時給事建章師古曰建章宫中未知名大長公主執囚青欲殺之其友騎郎公孫敖與壯士徃簒之師古曰逆取曰簒故得不死上聞迺召青為建章監侍中及母昆弟貴賞賜數日間累千金君孺為太僕公孫賀妻少兒故與陳掌通師古曰掌即陳平曾孫也上召貴掌公孫敖由此益顯子夫為夫人青為太中大夫元光六年拜為車騎將軍擊匈奴出上谷公孫賀為輕車將軍出雲中太中大夫公孫敖為騎將軍出代郡衛尉李廣為驍騎將軍出鴈門軍各萬騎青至籠城師古曰籠讀與龍同宋祁云浙本籠字從竹者無龍音後人誤作斬首虜數百騎將軍敖亡七千騎衛尉廣為虜所得得脱歸皆當斬贖為庶人賀亦無功唯青賜爵闗内侯是後匈奴仍侵犯邊師古曰仍頻也語在匈奴傳元朔元年春衛夫人有男立為皇后其秋青復將三萬騎出鴈門李息出代郡青斬首虜數千明年青復出雲中西至髙闕師古曰髙闕山名也一曰塞名也在朔方之北遂至于隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡師古曰當北地郡之北黄河之南也以三千八百户封青為長平侯青校尉蘇建為平陵侯張次公為岸頭侯晉灼曰河東皮氏亭也使建築朔方城師古曰蘇建築之也上曰匈奴逆天理亂人倫暴長虐老師古曰謂其俗貴少壯而賤長老也以盗竊為務行詐諸蠻夷造謀籍兵數為邊害張晏曰從蠻夷借兵鈔邊宋祁云姚本改鈔作釰故興師遣將以征厥罪詩不云乎薄伐獫允至于太原師古曰小雅六月之詩羙宣王北伐也薄伐者言逐出之也獫允北狄名即匈奴也獫音險出車彭彭城彼朔方師古曰小雅出車之詩也彭彭衆車聲也朔方北方也此詩人羙出車而征因築城以攘獫允也宋祁曰注文城字下當添壘字今車騎將軍青度西河至髙闕獲首二千三百級車輜畜産畢收為鹵已封為列侯遂西定河南地案榆谿舊塞如淳曰案尋也榆谿舊塞名也師古曰上郡之北有諸次山諸次水出焉東經榆林塞為榆谿言軍尋此塞而行也絶梓領梁北河討蒲泥破符離如淳曰絶度也為北河作橋梁也晉灼曰蒲泥符離二王號也師古曰符離塞名也斬輕鋭之卒捕伏聽者張晏曰伏於隠處聽軍虛實三千一十七級師古曰本以斬敵一首拜爵一級故謂一首為一級因復名生獲一人為一級也執訊獲醜師古曰執訊者謂生執其人而訊問之也獲醜者得其衆也一曰醜惡也訊音信敺馬牛羊百有餘萬全甲兵而還益封青三千八百户其後匈奴比嵗入代郡鴈門定襄上郡朔方師古曰比頻也所殺畧甚衆語在匈奴傳元朔五年春令青將三萬騎出髙闕衛尉蘇建為游擊將軍左内史李沮為彊弩將軍文頴曰沮音爼太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平匈奴右賢王當青等兵以為漢兵不能至此飲醉漢兵夜至圍右賢王右賢王驚夜逃獨與其愛妾一人騎數百馳潰圍北去漢輕騎校尉郭成等追數百里弗得得右賢禆王十餘人師古曰禆王小王也若言禆將也禆音頻移反衆男女萬五千餘人畜數十百萬師古曰數十萬以至百萬於是引兵而還至塞天子使使者持大將軍印即軍中拜青為大將軍師古曰即就也諸將皆以兵屬立號而歸上曰大將軍青躬率戎士師大㨗獲匈奴王十有餘人益封青八千七百户而封青子伉為宜春侯師古曰伉音抗又音工郎反子不疑為隂安侯子登為發干侯青固謝曰師古曰固謂再三也臣幸得待罪行間賴陛下神靈軍大㨗皆諸校力戰之功也陛下幸已益封臣青臣青子在繦褓中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封上曰我非忘諸校功也今固且圖之乃詔御史曰䕶軍都尉公孫敖三從大將軍擊匈奴常䕶軍傅校獲王師古曰傅讀曰附言敖總䕶諸軍每附部校以致克㨗而獲王也校者營壘之稱故謂軍之一部為一校或曰幡旗之名非也每軍一校則别為幡耳不名校也封敖為合騎侯晉灼曰猶冠軍從票之名也都尉韓說從大軍出窴渾服䖍曰塞名也師古曰說讀曰悦窴音田渾音魂劉敞曰大軍當云大將軍至匈奴右賢王庭為戲下師古曰戲讀曰麾又音許宜反言在大將軍麾旗之下不别統衆也搏戰獲王師古曰搏戰擊戰宋祁曰注末當添也字封說為龍額侯師古曰額字或作額騎將軍賀從大將軍獲王封賀為南窌侯臣瓉曰茂陵中書云南奅侯此本字也師古曰窌音普敎反奅亦同字輕車將軍李蔡再從大將軍獲王封蔡為樂安侯校尉李朔趙不虞公孫戎奴各三從大將軍獲王封朔為陟軹侯不虞為隨成侯戎奴為從平侯將軍李沮李息及校尉豆如意中郎將綰皆有功賜爵闗内侯沮息如意食邑各三百户其秋匈奴入代殺都尉明年春大將軍青出定襄合騎侯敖為中將軍太僕賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左内史李沮為彊弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人蘇建趙信并軍三千餘騎獨逄單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急匈奴誘之遂將其餘騎可八百犇降單于師古曰犇古奔字也宋祁曰注末也字當去蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等張晏曰正軍正也閎名也如淳曰律都軍官長史一人建當云何師古曰謂處斷其罪法何至也霸曰自大將軍出未嘗斬禆將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也師古曰言衆寡不敵以其堅戰無有退心故士卒喪盡也一説若建恥敗而不自歸則亦被匈奴禽之而去今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間師古曰胏附謂親戚也解在田蚡傳也宋祁曰注末也字當刪不患無威而霸説我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎師古曰風讀曰諷軍吏皆曰善遂囚建行在所劉敞曰當云詣行在所是嵗也霍去病始侯霍去病大將軍青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后尊少兒更為詹事陳掌妻去病以皇后姊子年十八為侍中善騎射再從大將軍大將軍受詔予壯士為票姚校尉服䖍曰音飄搖師古曰票音頻妙反姚音羊召反票姚勁疾之貌也荀悦漢紀作票鷂字去病後為票騎將軍尚取票姚之字耳今讀者音飄遥則不當其義也宋祁曰票姚當作本音與輕勇騎八百直棄大將軍數百里赴利斬捕首虜過當師古曰言計其所將人數則捕首虜為多過於所當也一曰漢軍失亡者少而殺獲匈奴數多故曰過當也其下並同劉敞曰大將軍衍將字於是上曰票姚校尉去病斬首捕虜二千二十八級得相國當户斬單于大父行藉若侯産張晏曰藉若胡侯也産名也師古曰此人單于祖父之行也行音胡浪反捕季父羅姑比再冠軍師古曰亦單于之季父也羅姑其名也比類也以二千五百户封去病為冠軍侯上谷太守郝賢四從大將軍捕首虜千三百級封賢為終利侯騎士孟已有功賜爵闗内侯邑二百户是嵗失兩將軍亡翕侯功不多故青不益封蘇建至上弗誅贖為庶人青賜千金是時王夫人方幸於上甯乘説青曰師古曰史記云甯乗齊人將軍所以功未甚多身食萬户三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親夀師古曰親母也青以五百金為王夫人親夀上聞問青青以實對上廼拜甯乘為東海都尉校尉張騫從大將軍以嘗使大夏留匈奴中久道軍知善水草處師古曰道讀曰導軍得以無飢渴因前使絶國功封騫為博望侯去病侯三嵗宋祁云三越本作一元狩三年春宋祁曰三越本作二為票騎將軍將萬騎出隴西有功上曰票騎將軍率戎士隃烏盭師古曰隃與踰同盭古戾字也烏盭山名也討遫濮師古曰遫古速字也遫濮匈奴部落名也渉狐奴晉灼曰水名也歴五王國輜重人衆攝讋者弗取師古曰攝讋謂振動失志氣言距戰者誅服者則赦也讋音之渉反㡬獲單于子師古曰㡬音距依反轉戰六日過焉支山千有餘里合短兵鏖臯蘭下應劭曰隴西白石縣塞外河名也蘇林曰匈奴中山闗名也李竒曰鏖音麃津名也晉灼曰世俗謂盡死殺人為鏖糟文頴曰鏖音意曹反師古曰鏖字本從金麀聲轉冩訛耳鏖謂苦撃而多殺也臯蘭山名也言苦戰於臯蘭山下而多殺虜也晉説文音皆得之今俗猶謂打擊之甚者曰鏖麀牝鹿也音於求反殺折蘭王斬盧侯王張晏曰折蘭盧侯胡國名也殺者殺之而已斬者獲其首也師古曰折蘭匈奴中姓也今鮮卑有是蘭姓者即其種也折音丄列反鋭悍者誅全甲獲醜執渾邪王子師古曰全甲謂軍中之甲不喪失也渾音下昆反及相國都尉㨗首虜八千九百六十級收休屠祭天金人如淳曰祭天以金人為主也張晏曰佛徒祠金人也師古曰今之佛像是也休音許蚪反屠音儲宋祁曰舊本多作天祭金人作祭天者非是刋誤亦改師率減什七師古曰言其破敵故匈奴之師十减其七也一曰漢兵失亡之數下皆類此也劉奉世曰詔書以為全甲則不應兵失亡至七分也匈奴人數又何由知之元狩四年出塞馬十四萬及還不滿三萬則非減什二矣然則率盖謂軍興財用大率以減少為功故四年詔既言率減什二遂云取食於敵而糧不絶功相因也益封去病二千二百户其夏去病與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道廣將四千騎先至騫將萬騎後匈奴左賢王將數萬騎圍廣廣與戰二日死者過半所殺亦過當騫至匈奴引兵去騫坐行留當斬贖為庶人師古曰軍行而輙稽留故坐法而去病出北地遂深入合騎侯失道不相得去病至祁連山師古曰祁連山即天山也匈奴呼天為祁連祁音上夷反捕首虜甚多上曰票騎將軍渉鈞耆濟居延張晏曰鈞耆居延皆水名也淺曰渉深曰濟師古曰渉謂人馬渉度也濟謂以舟船遂臻小月氏師古曰臻至也氏音支攻祁連山揚武乎鱳得鄭氏曰鱳音鹿張掖縣也師古曰鄭說非也此鱳得匈奴中地名而張掖縣轉取其名耳得單于單桓酋涂王張晏曰單桓酋涂皆胡王也師古曰酋音才由反涂音塗劉敞曰衍單于字及相國都尉以衆降下者二千五百人可謂能舍服知成而止矣師古曰服而舍之功成則止也㨗首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戸都尉六十三人師大率減什三益封去病五千四百户賜校尉從至小月氏者爵左庶長師古曰第十爵鷹擊司馬破奴師古曰趙破奴再從票騎將軍斬遫濮王捕稽且王師古曰且音子閭反右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人師古曰前行謂在軍之前而行封破奴為從票侯張晏曰從票騎將軍有功因以為號校尉髙不識從票騎將軍捕呼于耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為煇渠侯師古曰功臣侯表作僕朋今此作多轉冩者誤也煇音暉也宋祁曰注末也字當刪合騎侯敖坐行留不與票騎將軍㑹當斬贖為庶人諸宿將所將士馬兵亦不如去病師古曰宿舊也兵兵器也去病所將常選師古曰選取驍銳宋祁曰注末當有也字然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絶也然而諸宿將常留落不耦師古曰留謂遲留落謂墜落故不諧耦而無功也由此去病日以親貴比大將軍其後單于怒渾邪王居西方數為漢所破亡數萬人以票騎之兵也欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先要道邊師古曰道猶言也先為要約來言之於邊界是時大行李息將城河上得渾邪王使即馳傳以聞師古曰傳音張戀反次下亦同上恐其以詐降而襲邊乃令去病將兵往迎之去病既渡河與渾邪衆相望渾邪禆王將見漢軍而多欲不降者師古曰恐被掩覆也頗遁去去病乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆度河降者數萬人號稱十萬既至長安天子所以賞賜數十鉅萬封渾邪王萬戸為漯隂侯如淳曰漯隂平原縣也師古曰漯音吐合反封其禆王呼毒尼為下摩侯文頴曰呼毒尼胡王名也䧹疪為煇渠侯文頴曰䧹音鷹疪音庇䕃之庇師古曰疪音匹履反其字從疒非庇䕃之庇疒音女革反禽黎為河綦侯師古曰功臣侯表作烏黎今此作禽黎轉寫誤耳大當戸調雖為常樂侯師古曰功臣侯表作稠睢今此傳作調雖表傳不同當有誤者於是上嘉去病之功曰票騎將軍去病率師征匈奴西域王渾邪王及厥衆萌咸犇於率師古曰萌字與甿同犇古奔字也宋祁曰注末也字當刪以軍糧接食并將控弦萬有餘人師古曰言能引弓皆堪戰陳誅獟悍師古曰獟徤行輕貌也字或作趬悍勇也獟音邱昭反又音丘召反㨗首虜八千餘級降異國之王三十二戰士不離傷師古曰離遭也十萬之衆畢懐集服仍興之勞爰及河塞度㡬亡患師古曰重興軍旅之勞及北河沙塞之表可得寧息無憂患也以千七百戸益封票騎將軍減隴西北地上郡戍卒之半以寛天下繇役廼分處降者於邊五郡故塞外而皆在河南因其故俗為屬國師古曰不改其本國之俗而屬於漢故號屬國其明年匈奴入右北平定襄殺畧漢千餘人其明年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留師古曰言輕易漢軍故留而不去也一曰謂漢兵不能輕入而久留也宋祁云姚本於此下有臣瓚曰沙上曰幕李陵歌曰經千里兮渡沙幕十五字今大發卒其埶必得所欲是嵗元狩四年也春上令大將軍青票騎將軍去病各五萬騎歩兵轉者踵軍數十萬師古曰轉者謂運輜重也踵接也而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東廼更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍師古曰食音異其音基平陽侯襄為後將軍師古曰曹襄皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷師古曰罷讀曰疲匈奴可坐收虜耳師古曰言收虜取漢軍人馬可不費力故言坐廼悉逺北其輜重師古曰送輜重逺去令處北也皆以精兵待幕北而適直青軍出塞千餘里師古曰直讀曰值見單于兵陳而待師古曰為行陳而待於是青令武剛車自環為營張晏曰兵車也師古曰環繞也而縱五千騎往當匈奴匈奴亦從萬騎㑹日且入師古曰言日欲没也而大風起沙礫擊面師古曰礫小石也音歴兩軍不相見漢益縱左右翼繞單于師古曰翼謂左右舒引其兵如鳥之翅翼單于視漢兵多而士馬尚彊戰而匈奴不利薄莫單于遂乘六臝壯騎可數百直冒漢圍西北馳去師古曰臝者驢種馬子堅忍單于自乘善走臝而壯騎隨之也冒犯也臝音來戈反冒音莫克反昏漢匈奴相紛挐師古曰紛挐亂相持搏也挐音女居反殺傷大當師古曰各大相殺傷漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之青因隨其後匈奴兵亦散走㑹明行二百餘里不得單于頗捕斬首虜萬餘級遂至窴顔山趙信城如淳曰趙信前降匈奴匈奴築城居之得匈奴積粟食軍師古曰食讀曰飤軍留一日而還悉燒其城餘粟以歸青之與單于㑹也而前將軍廣右將軍食其軍别從東道或失道師古曰或迷也大將軍引還過幕南廼相逄青欲使使歸報令長史簿責廣師古曰簿音歩户反廣自殺食其贖為庶人青軍入塞凡斬首虜萬九千級是時匈奴衆失單于十餘日右谷蠡王自立為單于師古曰谷音鹿蠡音盧奚反單于後得其衆右王廼去單于之號師古曰去除也音丘吕反去病騎兵車重與大將軍軍等師古曰重音直用反而亡禆將悉以李敢等為大校當禆將出代右北平二千餘里直左方兵師古曰直當也所斬捕功已多於青既皆還上曰票騎將軍去病率師躬將所獲葷允之士服䖍曰葷音熏葷允熏鬻也堯時曰熏鬻周曰獫允秦曰匈奴師古曰葷字與薫同鬻音弋六反約輕齎絶大幕師古曰輕齎者不以輜重自隨而所齎糧食少也一曰齎字與資同謂資裝也渉獲單于章渠師古曰渉謂渉水也章渠單于之近臣也渉水而破獲之以誅北車耆晉灼曰王號也轉擊左大將雙獲旗鼓歴度難侯師古曰山名也濟弓盧晉灼曰水名也獲屯頭王韓王等三人李竒曰皆匈奴王號將軍相國當户都尉八十三人封狼居胥山禪於姑衍登臨翰海張晏曰登海邊山以望海也有大功故増山而廣地也如淳曰翰海北海名也師古曰積土増山曰封為墠祭地曰禪也執訊獲醜七萬有四百四十三級師率減什二取食於敵卓行殊逺而糧不絶師古曰卓亦逺意以五千八百户益封票騎將軍右北平太守路博德屬票騎將軍㑹興城不失期從至檮余山師古曰檮音籌其字從木斬首捕虜二千八百級封博德為邳離侯北地都尉衛山從票騎將軍獲王封山為義陽侯故歸義侯因淳王復陸支師古曰復音芳福反樓剸王伊即靬師古曰剸音之兖反靬音居言反皆從票騎將軍有功封復陸支為杜侯伊即靬為衆利侯從票侯破奴昌武侯安稽從票騎有功益封各三百户漁陽太守解校尉敢皆獲鼓旗賜爵闗内侯解食邑三百戸敢二百戸校尉自為爵左庶長軍吏卒為官賞賜甚多而青不得益封吏卒無封者唯西河太守常惠雲中太守遂成受賞遂成秩諸侯相賜食邑二百户黄金百斤惠爵闗内侯兩軍之出塞塞閱官及私馬凡十四萬匹而後入塞者不滿三萬匹廼置大司馬位大將軍票騎將軍皆為大司馬晉灼曰悉加大司馬者欲令票騎將軍去病與大將軍青等耳定令令票騎將軍秩禄與大將軍等自是後青日衰而去病日益貴青故人門下多去事去病輒得官爵唯獨任安不肯去師古曰安滎陽人後為益州刺史即遺司馬遷書者去病為人少言不泄有氣敢往上嘗欲敎之呉孫兵法師古曰呉呉起也孫孫武也對曰顧方畧何如耳不至學古兵法師古曰顧念也上為治第令視之對曰匈奴不滅無以家為也由此上益重愛之然少而侍中貴不省士師古曰省視也不恤視也其從軍上為遣太官齎數十乘師古曰齎與資同解已在前也既還重車餘棄粱肉師古曰粱粟類也米之善者重音直用反而士有飢者其在塞外卒乏糧或不能自振師古曰振舉也而去病尚穿域躢鞠也服䖍曰穿地作鞠室也師古曰鞠以皮為之實以毛蹵躢而戲也躢音徒獵反鞠音鉅六反事多此類青仁喜士退讓師古曰喜音許吏反以和柔自媚於上然於天下未有稱也去病自四年軍後三嵗元狩六年薨上悼之發屬國𤣥甲軍陳自長安至茂陵師古曰送其葬所以寵衛之也屬國即上所云分處降者於邊五郡者也𤣥甲謂甲之黒色也為冢象祁連山師古曰在茂陵旁冡上有竪石冢前有石人馬者是也諡之并武與廣地曰景桓侯蘇林曰景武諡也桓廣地諡也義見諡法張晏曰諡法布義行剛曰景辟土服逺曰桓也子嬗嗣師古曰嬗音上戰反嬗字子侯上愛之幸其壯而將之為奉車都尉從封泰山而薨無子國除自去病死後青長子宜春侯伉坐法失侯後五嵗伉弟二人隂安侯不疑發干侯登皆坐酎金失侯後二嵗冠軍侯國絶後四年元封五年青薨諡曰烈侯子伉嗣六年坐法免自青圍單于後十四嵗而卒竟不復擊匈奴者以漢馬少又方南誅兩越東伐朝鮮擊羌西南夷以故久不伐胡初青既尊貴而平陽侯曹夀有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎從我奈何左右曰於今尊貴無比於是長公主風白皇后師古曰風讀曰諷皇后言之上廼詔青尚平陽主如淳曰本陽信長公主也為平陽侯所尚故稱平陽主與主合葬起冢象廬山云師古曰在茂陵東次去病冢之西相併者是也宋祁云浙本廬作盧最大將軍青師古曰最亦凡也凡七出擊匈奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡再益封凡萬六千三百户宋祁云景德本無益字封三子為侯侯千三百户并之二萬二百戸其禆將及校尉侯者九人為特將者十五人師古曰特將謂獨别為將而出征也李廣張騫公孫賀李蔡曹襄韓說蘇建皆自有傳師古曰七人自有傳八人今列於此下凡十五人也説讀曰悦李息郁郅人也師古曰北地之縣也郅音之日反事景帝至武帝立八嵗為材官將軍軍馬邑後六嵗為將軍出代後三嵗為將軍從大將軍出朔方皆無功凡三為將軍其後常為大行公孫敖義渠人以郎事景帝至武帝立十二嵗為騎將軍宋祁云十二嵗景徳本作八嵗出代亡卒七千人當斬贖為庶人後五嵗以校尉從大將軍封合騎侯後一嵗以中將軍從大將軍再出定襄無㓛後二嵗以將軍出北地後票騎失期當斬宋祁云景徳本無失字贖為庶人後二嵗以校尉從大將軍無功後十四嵗以因杅將軍築受降城十嵗復以因杅將軍再出擊匈奴至余吾師古曰水名也在朔方北亡士多下吏當斬詐死亡居民間劉奉世曰武紀敖自余吾還明年太始元年有罪要斬與此不同必有誤五六嵗後覺復繫坐妻為巫蠱族凡四為將軍李沮雲中人沮音爼事景帝武帝立十七嵗以左内史為彊弩將軍後一嵗復為彊弩將軍張次公河東人以校尉從大將軍封岸頭侯其後太后崩為將軍軍北軍後一嵗復從大將軍凡再為將軍後坐法失侯趙信以匈奴相國降為侯武帝立十八年為前將軍與匈奴戰敗降匈奴趙食其祋栩人師古曰馮翊之縣也祋音丁活反又音丁外反栩音許羽反武帝立十八年以主爵都尉從大將軍斬首六百六十級元狩二年賜爵闗内侯黄金百斤眀年為右將軍從大將軍出定襄迷失道當斬贖為庶人郭昌雲中人以校尉從大將軍元封四年以太中大夫為㧞胡将軍屯朔方還擊昆明無功奪印荀彘太原廣武人以御見侍中師古曰以善御得見因為侍中也御謂御車也用校尉數從大將軍元封二年為左將軍擊朝鮮無功坐捕樓船將軍誅最票騎將軍去病凡六出擊匈奴其四出以將軍師古曰再出為票姚校尉也斬首虜十一萬餘級渾邪王以衆降數萬開河西酒泉之地西方益少胡宼四益封凡萬七千七百户其校尉吏有功侯者六人為將軍者二人路博徳西河平州人以右北平太守從票騎將軍封邳離侯票騎死後博徳以衛尉為伏波將軍伐破南越益封其後坐法失侯為彊弩都尉屯居延卒趙破奴太原人嘗亡入匈奴已而歸漢為票騎將軍司馬出北地封從票侯坐財金失侯後一嵗為匈河將軍攻胡至匈河水無功後一嵗擊虜樓蘭王後為浞野侯後六嵗以浚稽將軍將二萬騎擊匈奴左王左王與戰兵八萬騎圍破奴破奴為虜所得遂没其軍居匈奴中十歳復與其太子安國亡入漢宋祁云越本國作定後坐巫蠱族自衛氏興大將軍青首封其後支屬五人為侯凡二十四嵗而五侯皆奪國征和中戾太子敗衛氏遂滅而霍去病弟光貴盛自有傳贊曰蘇建嘗說責大將軍至尊重而天下之賢士大夫無稱焉師古曰言不為賢士大夫所稱譽願將軍觀古名將所招選者勉之哉師古曰勸令招賢薦士也青謝曰自魏其武安之厚賔客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士師古曰與讀曰豫票騎亦方此意為將如此師古曰方比類也前漢書卷五十五前漢書卷五十五考證衛青傳平陽侯曹夀注師古云云臣召南按史記曹相國世家參曽孫時尙平陽公主生子襄時病癘歸國立二十三年卒諡夷侯本傳後文云平陽侯曹夀有惡疾就國事與史記正合然則夀即時之别名也三千一十七級按史記作三千七十一級又益封青三千八百戸史記作三千戸又益封八千七百戸史記作六千戸都尉韓説從大軍出窴渾臣召南按應云從大將軍脱将字耳又按窴渾史記作寙渾徐廣曰寙渾在朔方音庾以地理志核之朔方有寙渾縣為西部都尉治有道西北出雞鹿塞此窴渾當即寙渾也封蔡為樂安侯臣召南按表作安樂侯又封朔為陟軹侯史記作渉軹侯而功臣表但作軹侯又不虞為隨成侯表作隨城侯又中郎將綰史記無此四字正閎長史安注張晏曰正軍正也胡三省曰凡軍行置軍正掌舉軍法以正軍中劉昭志大將軍長史秩千石霍去病傳以二千五百戸封去病為冠軍侯臣召南按冠軍初無此縣名武帝褒去病功以南陽穰縣盧陽鄉宛縣臨駣聚為冠軍侯國解見地理志二千五百戸史記作千六百戸又封賢為終利侯史記及功臣表作衆利侯過焉支山千有餘里合短兵括地志曰焉支山一名刪丹山在甘州刪丹縣東南五十里王㮊曰合短兵下史記無鏖臯蘭下四字全甲獲醜臣召南按此文上史記無鋭悍者三字則以誅全甲為一句此傳則鋭悍者誅為一句全甲獲醜為一句使人先要道邊按史記作遣使向邊境要遮漢人令報天子要邊文雖繁而情事曲折具見登臨翰海注張晏如淳云云臣召南按翰海北史作瀚海即大漠之别名沙磧四際無涯故謂之海張晏如淳直以大海北海解之非也本文明云去病出代右北平二千餘里則其地正在大漠安能及絶逺之北海哉且塞外遇巨澤大湖通稱為海如蘇武牧羊北海上竇憲追至私渠北鞮海皆巨澤大湖如後世稱濶灤海之類非大海也師率减什二什二史記作十三又㑹興城史記作㑹與城又封博徳為邳離侯史記作符離侯北地都尉衛山史記作邢山惟西河太守常惠臣召南按此常惠與從蘇武北使後封長羅侯為石將軍典屬國者别是一人為特將者十五人史記作十四人公孫敖為騎將軍凌穉隆曰史記作為驃騎將軍與去病同官非也漢書去驃字是前漢書卷五十五考證
