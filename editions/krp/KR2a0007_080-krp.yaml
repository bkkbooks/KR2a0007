body:
  text: 前漢書卷八十漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注宣元六王傳第五十孝宣皇帝五男許皇后生孝元帝張倢伃生淮陽憲王欽衛倢伃生楚孝王嚻師古曰嚻音敖公孫倢伃生東平思王宇戎倢伃生中山哀王竟淮陽憲王欽元康三年立母張倢伃有寵於宣帝霍皇后廢後上欲立張倢伃為后久之懲艾霍氏欲害皇太子師古曰艾讀曰乂乂創也廼更選後宫無子而謹慎者廼立長陵王倢伃為后令母養太子后無寵希御見唯張倢伃最幸而憲王壯大好經書法律聰逹有材帝甚愛之太子寛仁喜儒術師古曰喜好也音許吏反上數嗟歎憲王曰真我子也常有意欲立張倢伃與憲王然用太子起於微細上少依倚許氏師古曰倚音於起反及即位而許后以殺死太子蚤失母故弗忍也師古曰蚤古早字也宋祁曰也字疑可刪久之上以故丞相韋賢子元成陽狂讓侯兄宋祁曰兄字上疑有於字經明行髙稱於朝廷乃召拜元成為淮陽中尉欲感諭憲王輔以推讓之臣宋祁曰推字疑作禮字由是太子遂安宣帝崩元帝即位乃遣憲王之國時張倢伃已卒憲王有外祖母舅張博兄弟三人歲至淮陽見親師古曰憲王外祖母隨王在淮陽博等每来謁見其母輙受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬師古曰責謂假貸人財物未償者也責音側懈反願王為償王不許博辭去令弟光恐云王遇大人益解師古曰恐謂怖動也大人博自稱其母也解讀曰懈宋祁曰恐字下疑有王字注文怖字下疑有之字博欲上書為大人乞骸骨去王乃遣人持黄金五十斤送博博喜還書謝師古曰還書報書宋祁曰注末當有也字為諂語盛稱譽王因言當今朝廷無賢臣灾變數見足為寒心萬姓咸歸望於大王大王奈何恬然師古曰恬然安靜貌也恬音大兼反不求入朝見輔助主上乎使弟光數説王宜聽博計令於京師說用事貴人為王求朝王不納其言後光欲至長安辭王復言願盡力與博共為王求朝王即日至長安可因平陽侯宋祁曰陽字疑作陵字光得王欲求朝語馳使人語博博知王意動復遺王書曰博幸得肺腑師古曰自云於王有親也數進愚䇿未見省察北游燕趙欲循行郡國求幽隱之士聞齊有駟先生者善為司馬兵法大將之材也博得謁見承閒進問五帝三王究竟要道卓爾非世俗之所知師古曰卓爾髙逺貌也自言見駟先生問以要道知其髙逺也今邉境不安天下騷動微此人其莫能安也師古曰微無也宋祁曰浙本無人其字又一本無此人字又聞北海之瀕有賢人焉師古曰瀕涯也音頻又音賔累世不可逮然難致也師古曰逮及也言其材智不可及也致至也難得召而至也得此二人而薦之功亦不細矣博願馳西以此赴助漢急無財幣以通顯之趙王使謁者持牛酒黄金三十斤勞博師古曰勞謂問遺之音来到反博不受復使人願尚女師古曰尚女者王欲取博女以自配也聘金二百斤博未許㑹得光書云大王巳遣光西與博并力求朝博自以棄捐不意大王還意反義結以朱顔師古曰還猶回也願殺身報徳朝事何足言大王誠賜咳唾使得盡死湯禹所以成大功也駟先生蓄積道術書無不有師古曰言凡是書籍皆有之願知大王所好請得輒上宋祁曰此下當添八字云師古曰上上與王也王得書喜說如淳曰上與王也宋祁曰此注當改作師古曰説讀曰悦報博書曰子髙廼幸左顧存恤發心惻隱師古曰左顧猶言枉顧也顯至誠宋祁曰顯字下疑有以字納以嘉謀語以至事師古曰以至極之事告語我宋祁曰注末疑有也字雖亦不敏敢不諭意師古曰諭曉也今遣有司為子髙償責二百萬是時博女壻京房以明易隂陽得幸於上數召見言事自謂爲石顯五鹿充宗所排謀不得用數為博道之博常欲誑燿淮陽王即具記房諸所説灾異及召見宻語持予淮陽王以為信驗詐言已見中書令石君求朝許以金五百斤賢聖制事盖慮功而不計費師古曰志在成功不惜財費也宋祁曰詐言别本無詐字昔禹治鴻水百姓罷勞師古曰罷讀曰疲成功既立萬世頼之今聞陛下春秋未滿四十髮齒墮落太子幼弱佞人用事隂陽不調百姓疾疫飢饉死者且半鴻水之害殆不過此師古曰謂堯時水災不火於今大王緖欲救世師古曰緒業也一曰始為端緒將比功徳何可以忽師古曰言比功徳於古帝王也忽怠忘也博己與大儒知道者為大王為便宜奏師古曰大儒知道謂京房也道道術也陳安危指灾異大王朝見先口陳其意而後奏之上必大説師古曰說讀曰悦事成功立大王即有周邵之名邪臣散亡公卿變節功徳亡比而梁趙之寵必歸大王如淳曰梁王景帝弟欲為嗣趙王如意幾代惠帝也外家亦将富貴何復望大王之金錢王喜説師古曰説讀曰悦報博書曰廼者詔下止諸侯朝者寡人憯然不知所出師古曰憯痛也不知計䇿何所出也憯音才感反子髙素有顔冉之資臧武之智師古曰顔顔回也冉冉耕也字伯牛皆孔子弟子論語稱孔子曰徳行顔淵閔子騫冉伯牛仲弓臧武者魯大夫臧武仲也名紇論語稱子曰若臧武仲之智故王引之為言子貢之辯師古曰論語稱孔子云言語宰我子貢卞莊子之勇師古曰卞莊子古之勇士兼此四者世之所鮮師古曰鮮少也音先踐反既開端緒願卒成之師古曰卒終也求朝義事也奈何行金錢乎博報曰已許石君須以成事師古曰須待也王以金五百斤予博會房出為郡守離左右顯具得此事告之宋祁曰顯字上疑有石字告之之字當刪房漏泄省中語博兄弟詿誤諸侯王誹謗政治狡猾不道皆下獄有司奏請逮捕欽上不忍致法遣諫大夫王駿賜欽璽書曰皇帝問淮陽王有司奏王王舅張博數遺王書非毁政治謗訕天子襃舉諸侯稱引周湯以讇惑王師古曰讇古諂字宋祁曰周當作禹所言尤惡悖逆無道王不舉奏而多與金錢報以好言辜至不赦朕惻焉不忍聞師古曰惻痛也宋祁曰朕惻焉當云朕甚惻焉為王傷之推原厥本不祥自博師古曰祥善也自從也不善之事從博起也惟王之心匪同于凶已詔有司勿治王事遣諫大夫駿申諭朕意師古曰申謂約束之宋祁曰注文申字下當有諭字詩不云乎靖恭爾位正直是與師古曰大雅小眀之詩也與偕也言人能安靜而恭以守其位偕於正直則眀神聽之用錫福善王其勉之駿諭指曰師古曰璽書之外天子又有指意并今駿曉告於王也禮為諸侯制相朝聘之義盖以考禮壹徳尊事天子也師古曰考成也壹徳謂不二其心也且王不學詩乎詩云俾侯於魯為周室輔師古曰魯頌閟宫之詩也言立周公子伯禽使為諸侯于魯國而作周家之藩輔今王舅博數遺王書所言悖逆王幸受詔䇿通經術如淳曰詔策若廣陵王策曰無邇宵人毋作匪徳也經術之義不得内交知諸侯名譽不當出竟師古曰竟讀曰境天子普覆徳布於朝而恬有博言師古曰恬安也聞博邪言安而受之多予金錢與相報應不忠莫大焉故事諸侯王獲罪京師罪惡輕重縱不伏誅必蒙遷削貶黜之罪師古曰故事者言舊制如此也未有但已者也師古曰但徒也空也已止也未有空然而止者也今聖主赦王之罪又憐王失計忘本為博所惑加賜璽書使諫大夫申諭至意殷勤之恩豈有量哉博等所犯惡大宋祁曰犯字下當有罪字羣下之所共攻王法之所不赦也自今以来王毋復以博等累心師古曰累音力瑞反務與衆棄之春秋之義大能變改師古曰以有過而能變改者為大易曰藉用白茅旡咎師古曰此大過初六爻辭也茅者絜白之物取其自然故用藉致享於神慎之至也宋祁曰注文故用藉當作故用為藉言臣子之道改過自新絜已以承上然後免於咎也王其留意慎戒惟思所以悔過易行塞重責稱厚恩者師古曰塞猶補也稱副也如此則長有富貴社稷安矣於是淮陽王欽免冠稽首謝曰奉藩無狀師古曰無善狀過惡暴列師古曰暴謂章顯也陛下不忍致法加大恩遣使者申諭道術守藩之義伏念博罪惡尤深當伏重誅臣欽願悉心自新奉承詔䇿師古曰悉盡也頓首死罪京房及博兄弟三人皆棄市妻子徙邉至成帝即位以淮陽王屬為叔父敬寵之異於它國王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還丞相御史復劾欽前與博相遺私書指意非諸侯王所宜䝉恩勿治事在赦前不悔過而復稱引自以為直失藩臣體不敬上加恩許王還徙者三十六年薨子文王𤣥嗣二十六年薨子縯嗣孟康曰縯音引師古曰音弋善反王莽時絶楚孝王嚻甘露二年立為定陶王三年徙楚成帝河平中入朝時被疾天子閔之下詔曰盖聞天地之性人為貴人之行莫大於孝師古曰孝絰載孔子之言楚王嚻素行孝順仁慈之國以来二十餘年孅介之過未嘗聞朕甚嘉之今廼遭命離于惡疾師古曰離亦遭也夫子所痛曰蔑之命矣夫斯人也而有斯疾也師古曰夫子孔子也論語云伯牛有疾子問之自牖執其手曰蔑之命矣夫斯人也而有斯疾也蔑無也言命之所遭無有善惡如斯善人而有如斯惡疾深痛之也朕甚閔焉夫行純茂而不顯異則有國者將何朂哉師古曰純大也一曰善也茂美也朂勉厲也書不云乎用徳章厥善師古曰尚書盤庚之辭也言襃賞有徳以明其善行今王朝正月詔與子男一人俱師古曰從王入朝也其以廣戚縣戸四千三百封其子勲為廣戚侯眀年嚻薨子懐王文嗣一年薨無子絶明年成帝復立文弟平陸侯衍宋祁曰陸一本作陵是為思王二十一年薨子紆嗣王莽時絶初成帝時又立紆弟景為定陶王廣戚侯勲薨諡曰煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝後莽簒位以嬰為定安公漢既誅莽更始時嬰在長安平陵方望等頗知天文以為更始必敗嬰本統當立者也師古曰言其舊已繼平帝後當正統共起兵將嬰至臨涇立為天子更始遣丞相李松擊破殺嬰云東平思王宇甘露二年立元帝即位就國壯大通姦犯法師古曰與姦猾交通好犯法也上以至親貰弗罪傅相連坐師古曰頻坐王獲罪久之事太后内不相得太后上書言之求守杜陵園張晏曰宣帝陵也宫人無子乃守園陵上於是遣太中大夫張子蟜師古曰蟜字或作僑並音鉅昭反奉璽書敕諭之師古曰約敇而曉告之也曰皇帝問東平王盖聞親親之恩莫重於孝尊尊之義莫大於忠故諸侯在位不驕以致孝道制節謹度以翼天子師古曰翼佐也然後富貴不離其身宋祁曰舊無不字云離於身蘇子瞻云此文與孝經小異離附離也今作不離其身疑為俗儒所添也而社稷可保今聞王自修有闕本朝不和師古曰謂東平國之朝也流言紛紛宋祁曰下紛字當作然謗自内興朕甚憯焉為王懼之師古曰憯痛也音才感反詩不云乎毋念爾祖述修厥徳永言配命自求多福師古曰大雅文王之詩也無念念也言當念爾先祖之道修其徳則長配天命此乃所以自求多福朕惟王之春秋方剛師古曰言其少年血氣盛宋祁曰注末當有也字忽於道徳師古曰忽遺忘也意有所移忠言未納師古曰謂漸染其惡人而移其性未受忠言也故臨遣太中大夫子蟜諭王朕意師古曰親臨遣之令以朕意曉告王孔子曰過而不改是謂過矣師古曰論語載孔子之言也謂人有失行許以自新王其深惟孰思之無違朕意又特以璽書賜王太后曰皇帝使諸吏宦者令承問東平王太后朕有聞師古曰言母子不和也不欲指斥言之故云有聞也王太后少加意焉夫福善之門莫美於和睦患咎之首莫大於内離今東平王出繦褓之中而託于南靣之位加以年齒方剛宋祁曰考諸本無位加字劉敞曰南面之文不具渉學日寡驁忽臣下師古曰驁讀與敖同不自它於太后李竒曰不自它者親之辭也師古曰言不自同它人宋祁曰注文親字上疑有自字以是之間能無失禮義者其惟聖人乎傳曰父為子隱直在其中矣師古曰論語云葉公謂孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣故引之也王太后眀察此意不可不詳閨門之内母子之間同氣異息骨肉之恩豈可忽哉豈可忽哉昔周公戒伯禽曰故舊無大故則不可棄也毋求備於一人師古曰事見論語言人有小惡當思其善不可責以備行而即棄之也夫以故舊之恩猶忍小惡而况此乎已遣使者諭王王既悔過服罪太后寛忍以貰之師古曰貰猶緩宋祁曰注末當有也字後宜不敢師古曰言王於後當不敢更為非也王太后强餐止思念慎疾自愛宇慙懼因使者頓首謝死罪願洒心自改師古曰洒音先弟反詔書又勅傅相曰夫人之性皆有五常及其少長耳目牽於耆欲師古曰耆讀曰嗜故五常銷而邪心作情亂其性利勝其義張晏曰性者所受而生也情者見物而動者也而不失厥家者未之有也今王富於春秋氣力勇武獲師傅之教淺加以少所聞見自今以来非五經之正術敢以游獵非禮道王者輒以名聞師古曰道音導宇立二十年元帝崩宇謂中謁者信等曰漢大臣議天子少弱未能治天下以為我知文法建欲使我輔佐天子師古曰建謂立其議我見尚書晨夜極苦使我為之不能也今暑熱縣官年少張晏曰不敢指斥成帝謂之縣官也持服恐無處所如淳曰言不從道冀如昌邑王也我危得之孟康曰危殆也我殆得為天子也師古曰危者猶今之言險不得之矣比至下宇凡三哭張晏曰下下棺也師古曰比音必寐反下音胡稼反飲酒食肉妻妾不離側又姬朐臑故親幸後疏逺服䖍曰胊音劬臑音奴溝反又音奴臯反數歎息呼天宇聞斥朐臑為家人子師古曰黜其秩位掃除永巷數笞擊之朐臑私疏宇過失數令家告之宇覺知絞殺朐臑有司奏請逮捕有詔削樊亢父二縣師古曰音抗甫後三歳天子詔有司曰盖聞仁以親親古之道也前東平王有闕師古曰闕謂過失也有司請廢朕不忍又請削朕不敢專宋祁曰削字下疑有地字惟王之至親未甞忘於心今聞王改行自新尊修經術親近仁人非法之求不以奸吏師古曰奸音干朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故師古曰復音扶目反後年来朝上疏求諸子及太史公書上以問大將軍王鳳宋祁曰鳳字下當更有鳳字對曰臣聞諸侯朝聘考文章正法度非禮不言今東平王幸得来朝不思制節謹度以防危失師古曰危失謂失道而傾危也而求諸書宋祁曰書字上當有子字非朝聘之義也諸子書或反經術非聖人或眀鬼神信物怪師古曰物亦鬼太史公書有戰國從横權譎之謀漢興之初謀臣竒䇿天官灾異地形阸塞皆不宜在諸侯王不可予不許之辭宜曰五經聖人所制萬事靡不畢載王審樂道傅相皆儒者旦夕講誦足以正身虞意師古曰虞與娱同夫小辯破義小道不通致逺恐泥皆不足以留意師古曰論語稱孔子曰雖小道必有可觀者焉致逺恐泥是以君子不為也泥謂䧟滯不通也音乃細反諸益於經術者不愛於王師古曰愛惜也於王無所惜之對奏天子如鳳言遂不與立三十三年薨師古曰皇覽云東平思王冢在無鹽人傳言王在國思歸京師後葬其冢上松栢皆西靡也子煬王雲嗣哀帝時無鹽危山土自起覆草如馳道狀又瓠山石轉立晉灼曰漢注作報山山脇石一枚轉側起立髙九尺六寸旁行一丈廣四尺也師古曰報山山名也古作瓠字為其形似瓠耳晉說是也雲及后謁自之石所祭治石象瓠山蘇林曰於宫中作山象宋祁曰作山象瓠山立石束倍草并祠之師古曰倍草黄倍草也音歩賄反劉敞曰立石屬上句建平三年息夫躬孫寵等共因幸臣董賢告之是時哀帝被疾多所惡事下有司逮王后謁下獄驗治言使巫傅恭婢合歡等祠祭詛祝上如淳曰傅恭巫姓字為雲求為天子雲又與知災異者髙尚等指星宿言上疾必不愈雲當得天下石立宣帝起之表也有司請誅王有詔廢徙房陵雲自殺謁棄市立十七年國除元始元年王莽欲反哀帝政師古曰改其所為也白太皇太后立雲太子開明為東平王又立思王孫成都為中山王開明立三年薨無子復立開明兄嚴鄉侯信子匡為東平王奉開明後王莽居攝東郡太守翟義與嚴鄉侯信謀舉兵誅莽立信為天子兵敗皆為莽所滅中山哀王竟初元二年立為清河王三年徙中山以幼少未之國建昭四年薨邸葬杜陵宋祁曰江南本邸字上有郡字浙本無無子絶太后歸居外家戎氏孝元皇帝三男王皇后生孝成帝傅昭儀生定陶共王康師古曰共讀曰恭馮昭儀生中山孝王興定陶共王康永光三年宋祁曰一本作元光三年立為濟陽王六年徙為山陽王八年徙定陶王少而愛師古曰言少小即為帝所愛長多材蓺習知音聲上竒器之母昭儀又幸幾代皇后太子師古曰幾音鉅依反語在元后及史丹傳成帝即位緣先帝意厚遇異於它王十九年薨子欣嗣十五年成帝無子徴入為皇太子上以太子奉大宗後不得顧私親乃立楚思王子景為定陶王奉共王後成帝崩太子即位是為孝哀帝即位二年追尊共王為共皇帝置寢廟京師序昭穆儀如孝元帝如淳曰恭王元帝子也為廟京師列昭穆之次如元帝言如天子之儀徙定陶王景為信都王云如淳曰不復為定陶王立後者哀帝自以己為後故中山孝王興建昭二年王為信都王劉敞曰王為信都王上王字當作立字十四年徙中山成帝之議立太子也御史大夫孔光以為尚書有殷及王兄終弟及師古曰謂兄死以弟代立非父子相繼故言及中山王元帝之子宜為後成帝以中山王不材又兄弟不得相入廟宋祁曰入字上當有繼字外家王氏與趙昭儀皆欲用哀帝為太子故遂立焉上乃封孝王舅馮參為宜鄉侯而益封孝王萬戸以尉其意三十年薨子衎嗣師古曰諸侯王表云中山孝王薨綏和二年王箕子嗣而元始二年詔云皇帝二名通于器物今更名合於古制是則嗣位之時名為箕子未諱衎也今此傳云子衎嗣盖史家追書之也宋祁曰浙本注文元始字上有平紀字七年哀帝崩無子徴中山王衎入即位是為平帝太皇太后以帝為成帝後故立東平思王孫桃鄉頃侯子成都為中山王奉孝王後王莽時絶贊曰孝元之後徧有天下師古曰孝元之子孫徧得為天子也徧即古遍字然而世絶於孫豈非天哉淮陽憲王於時諸侯為聰察矣張博誘之幾陷無道師古曰幾音鉅依反詩云貪人敗類師古曰大雅蕩之詩也類善也言貪惡之人不可習近則敗善也古今一也前漢書卷八十前漢書卷八十考證楚孝王嚻傳子懐王文按文表作芳東平思王宇傳上於是遣太中大夫張子蟜注師古曰蟜字或作僑臣召南按藝文志及劉向王褒傳並作僑則僑字是也毋念爾祖述修厥德今詩作聿修即漢書他傳亦作聿修惟此文作述或齊魯韓三家所傳不同耳無鹽危山土自起覆草如馳道狀息夫躬傳作無鹽危山有石自立開道與此稍異贊詩云貪人敗類注師古曰大雅蕩之詩也顧炎武曰大雅桑柔之詩師古誤以爲蕩前漢書卷八十考證
