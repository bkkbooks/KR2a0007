body:
  text: 前漢書卷四十七漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注文三王傳第十七孝文皇帝四男竇皇后生孝景帝梁孝王武諸姬生代孝王參梁懐王揖師古曰不得其姓氏故曰諸姬言在諸姬之列者也解在髙五王傳梁孝王武以孝文二年與太原王參梁王揖同日立武爲代王四年徙爲淮陽王十二年徙梁自初王通歴已十一年矣師古曰總數其爲王之年孝王十四年入朝十七年十八年比年入朝留師古曰比頻也留謂留在京師其明年乃之國二十一年入朝二十二年文帝崩二十四年入朝二十五年復入朝是時上未置太子與孝王宴飲從容言曰師古曰從音千容反千秋萬歲後傳於王王辭謝雖知非至言然心内喜太后亦然其春吳楚齊趙七國反先擊梁棘壁文頴曰地名殺數萬人梁王城守雎陽師古曰據雎陽城而自守而使韓安國張羽等爲將軍以距吳楚吳楚以梁爲限不敢過而西與太尉亞夫等相距三月吳楚破而梁所殺虜畧與漢中分孟康曰梁所虜吳楚之㨗畧與漢同明年漢立太子梁最親有功又爲大國居天下膏腴地北界泰山西至髙陽蘇林曰陳留北縣四十餘城多大縣孝王太后少子愛之賞賜不可勝道師古曰道謂言宋祁曰當於言下添也字於是孝王築東苑方三百餘里廣雎陽城七十里師古曰更廣大之也晉太康地記云城方十三里梁孝王築之鼓倡節杵而後下和之者稱雎陽曲今踵以爲故今之樂家雎陽曲是其遺音大治宫室爲復道自宫連屬於平臺三十餘里如淳曰平臺在大梁東北離宫所在也晉灼曰或說在城中東北角師古曰今其城東二十里所有故臺基其處寛博土俗云平臺也復音方目反得賜天子旌旗從千乗萬騎出稱警入言䟆師古曰警者戒肅也䟆止行人也言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也儗於天子師古曰儗比也音擬招延四方豪桀自山東游士莫不至齊人羊勝公孫詭鄒陽之屬師古曰言皆游梁公孫詭多竒邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數千萬而府庫金錢且百鉅萬師古曰鉅萬百萬也且百萬者言凡百也宋祁曰千萬一作十珠玉寳器多於京師二十九年十月孝王入朝景帝使使持乗輿駟迎梁王於闗下鄧展曰但持駟馬往也臣瓚曰稱乘輿駟則車馬皆往言駟不駕六馬耳天子副車駕駟馬師古曰輿卽車也瓚說是既朝上疏因留以太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者著引籍出入天子殿門師古曰著音竹畧反與漢宦官亡異十一月上廢栗太子太后心欲以梁王爲嗣大臣及爰盎等有所闗說於帝太后議格服虔曰格音格鬭張晏曰止也蘇林曰音閣師古曰蘇音張說是孝王不敢復言太后以嗣事師古曰不敢更以此事言於太后事祕世莫知廼辭歸國其夏上立膠東王爲太子梁王怨爰盎及議臣廼與羊勝分孫詭之屬謀隂使人刺殺爰盎及他議臣十餘人賊未得也於是天子意梁師古曰意疑也逐賊果梁使之遣使冠蓋相望於道覆案梁事捕公孫詭羊勝皆匿王後宫使者責二千石急梁相軒丘豹師古曰姓軒丘名豹及内史安國師古曰韓安國皆泣諫王王廼令勝詭皆自殺出之上由此怨望於梁王師古曰望謂責而怨之梁王恐廼使韓安國因長公主謝罪太后然後得釋上怒稍解因上書請朝既至關茅蘭說王服䖍曰茅蘭孝王大夫也使乗布車張晏曰布車降服自比喪人也從兩騎入匿於長公主園漢使迎王王已入關車騎盡居外外不知王處太后泣曰帝殺吾子帝憂恐於是梁王伏斧質之闕下謝罪然後太后帝皆大喜相與泣復如故悉召王從官入關然帝益踈王不與同車輦矣三十五年冬復入朝上疏欲留上弗許歸國意忽忽不樂北獵梁山有獻牛足上出背上孝王惡之六月中病熱六日薨張晏曰足當處下所以輔身也今出背上象孝王背朝而干上也北者隂也又在梁山明爲梁也牛者丑之畜衝在六月北方數六故六月六日王薨也劉敞曰此謂得熱疾六日而後薨耳豈謂六月六日哉太迂孝王慈孝每聞太后病口不能食常欲留長安侍太后太后亦愛之及聞孝王死竇太后泣極哀不食曰帝果殺吾子帝哀懼不知所爲與長公主計之廼分梁爲五國盡立孝王男五人爲王女五人皆令食湯沐邑奏之太后太后廼說爲帝壹餐師古曰說讀曰悦餐古飱字孝王未死時財以鉅萬計不可勝數及死藏府餘黄金尚四十餘萬斤他財物稱是代孝王參初立爲太原王四年代王武徙爲淮陽王而參徙爲代王復并得太原都晉陽如故師古曰如文帝在代時劉攽曰如故爲太原王時都晉陽不遷都也五年一朝凡三朝十七年薨子共王登嗣師古曰共讀曰恭二十九年薨子義嗣元鼎中漢廣關以常山爲阻師古曰依山以爲關徙代王於清河是爲剛王并前在代凡立四十年薨子頃王湯嗣二十四年薨子年嗣地節中冀州刺史林奏年爲太子時與女弟子私通宋祁曰弟子子字當作則及年立爲王後則懐年子其壻使勿舉師古曰不養也則曰自来殺之壻怒曰爲王生子自令王家養之則送兒頃太后所師古曰頃王之后年之太后故曰頃太后相聞知禁止則令不得入宫師古曰相者王之相年使從季父往來送迎則師古曰宗室諸從也連年不絶有司奏年淫亂年坐廢爲庶人徙房陵與湯沐邑百户立三年國除元始二年新都侯王莽興滅繼絶白太皇太后立年弟子如意爲廣宗王奉代孝王後莽簒位國絶梁懐王揖文帝少子也好詩書帝愛之異於他子五年一朝凡再入朝因墮馬死立十年薨無子國除明年梁孝王武徙王梁梁孝王子五人爲王太子買爲梁共王師古曰共讀曰恭次子明爲濟川王彭離爲濟東王定爲山陽王不識爲濟隂王皆以孝景中六年同日立梁共王買立十年薨宋祁云越本十作七子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅劉攽曰武紀坐殺太傅中傅與此不同宋祁曰垣表作桓邑武帝弗忍廢爲庶人徙房陵國除濟東王彭離立二十九年彭離驕悍師古曰悍勇也昬暮私與其奴亡命少年數十人行剽師古曰剽劫也音頻妙反殺人取財物以爲好如淳曰以是爲好喜之事師古曰好音呼到反所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢爲庶人徙上庸國除爲大河郡山陽哀王定立九年薨亡子國除濟隂哀王不識立一年薨亡子國除孝王支子四王皆絶於身師古曰支子謂非正嫡也梁平王襄母曰陳太后共王母曰李太后李太后親平王之大母也師古曰大母祖母也共王卽李太后所生故云親祖母也而平王之后曰任后任后甚有寵於襄初孝王有􅪖尊應劭曰詩云酌彼金􅪖􅪖畫雲雷之象以金飾之也鄭氏曰上蓋刻爲山雲雷之象師古曰鄭說是也􅪖古雷字直千金戒後世善寶之毋得以與人師古曰寶謂愛守也任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百鉅萬猶自恣任后絶欲得之王襄直使人開府取尊賜任后又王及母陳太后事於太后多不順宋祁曰景徳本於作李有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與争門措指晉灼曰許慎云措置字借以爲笮耳師古曰音壯客反謂爲門扉所笮太后啼謼師古曰謼音火故反不得見漢使者李太后亦私與食官長及郎尹霸等姦亂王與任后以此使人風止李太后師古曰風讀曰諷止者止其自言也李太后亦已師古曰已止也後病薨病時任后未嘗請疾張晏曰請問也薨又不侍喪元朔中雎陽人犴反師古曰犴姓反名也犴音岸宋祁云浙本犴反作犴友人辱其父而與雎陽太守客俱出同車劉攽曰雎陽梁所都無太守當是淮陽劉敞曰下兩雎字當作淮犴反殺其仇車上亡去雎陽太守怒以讓梁二千石二千石以下求反急執反親戚反知國隂事廼上變告梁王與大母争尊狀時相以下具知之欲以傷梁長史劉攽曰史作吏書聞天子下吏驗問有之公卿治奏以爲不孝請誅王及太后師古曰陳太后天子曰首惡失道任后也朕置相吏不逮師古曰逮及也言其材知不及無以輔王故陷不誼不忍致法削梁王五縣奪王太后湯沐成陽邑梟任后首于市中郎胡等皆伏誅梁餘尚有八城襄立四十年薨子頃王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣鴻嘉中太傅輔奏立一日至十一犯法臣下愁苦莫敢親近不可諌止願令王非耕祠法駕毋得出宫盡出馬置外苑收兵杖藏私府毋得以金錢財物假賜人事下丞相御史請許師古曰許太傅所奏奏可後數復敺傷郎師古曰敺棰擊音一口反宋祁云浙本注文棰擊也夜私出宫傅相連奏坐削或千户或五百户如是者數焉荒王女弟園子爲立舅任寳妻寳兄子昭爲立后數過寳飲食報寳曰我好翁主師古曰諸王女皆稱翁主言其父自主婚也欲得之寳曰翁主姑也法重立曰何能爲師古曰言罪不能至重也遂與園子姦積數歲永始中相禹奏立對外家怨望有惡言有司案驗因發滛亂事奏立禽獸行請誅太中大夫谷永上疏曰臣聞禮天子外屏不欲見外也師古曰屏謂當門之牆以屏蔽者也外屏於門外爲之是故帝王之意不窺人閨門之私聽聞中冓之言應劭曰中冓材搆在堂之中也晉灼曰魯詩以爲夜也師古曰冓謂舍之交積材木也應說近之冓音工豆反春秋爲親者諱詩云戚戚兄弟莫逺具爾師古曰小雅行葦之詩也戚戚内相親也爾近也言王之族親情無疎逺皆昵近也今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥强劾立傅致難明之事師古曰傅讀曰附獨以偏辭成辠斷獄亡益於治道汙衊宗室孟康曰衊音漫師古曰衊音秣謂塗染也以内亂之惡披布宣揚於天下非所以爲公族隱諱増朝廷之榮華昭聖徳之風化也臣愚以爲王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有耻辱之心師古曰言其姑亦當自耻必不與姦案事者廼驗問惡言師古曰本所問者怨望朝廷之言耳何故猥自發舒師古曰猥曲也以三者揆之殆非人情疑有所迫切過誤失言文吏躡尋不得轉移萌牙之時加恩勿治上也如淳曰覆蓋之則計之上既已案驗舉憲宜及王辭不服詔廷尉選上徳通理之吏更審考清問著不然之效定失誤之法師古曰著明也而反命於下吏師古曰使者還反以清白之狀付有司也以廣公族附疏之徳爲宗室刷汙亂之耻師古曰刷謂拭刷除之也音所劣反甚得治親之誼天子由是寝而不治居數歲元延中立復以公事怨相掾及雎陽丞使奴殺之殺奴以滅口凡殺三人傷五人手敺郎吏二十餘人上書不拜奏謀簒死罪囚師古曰逆取曰簒有司請誅上不忍削立五縣哀帝建平中立復殺人天子遣廷尉賞大鴻臚由持節即訊師古曰就問也宋祁曰百官表廷尉方賞君賔大鴻臚畢申世叔申由必有一誤至移書傅相中尉曰王背䇿戒師古曰初封時䇿書有戒勑之言誖暴妄行師古曰誖乖也音布内反連犯大辟毒流吏民比比蒙恩不伏重誅師古曰比猶頻也不思改過復賊殺人幸得蒙恩丞相長史大鴻臚丞即問王陽病抵讕置辭師古曰抵距也讕誣諱也抵音丁禮反讕音來亶反驕嫚不首主令與背畔亡異師古曰不首謂不伏其罪也主令者於法令之條與背畔無異也首音失救反次下亦同劉攽曰驕嫚當屬上句立使賊殺人而拒諱不服也使人殺之此是不首主令之辠也令音零丞相御史請收王璽綬送陳留獄明詔加恩復遣廷尉大鴻臚雜問今王當受詔置辭恐復不首實對宋祁云一本無實字書曰至于再三有不用我降爾命師古曰此周書多方篇之辭也言我教汝至于再三汝不能用則我下罰黜汝命也傅相中尉皆以輔正爲職虎兕出於匣龜玉毁於匵中是誰之過也師古曰此論語孔子責冉有季路之辭也言虎兕出於檻龜玉毁於櫝匱豈非典守者之過邪喻輔相人者當能持危扶顛也宋祁云注文浙本虎作豹檻作柙景徳本郭去虎字蓋以師古宜避唐諱書到明以誼曉王敢復懐詐罪過益深傅相以下不能輔導有正法立惶恐免冠對曰立少失父母孤弱處深宫中獨與宦者婢妾居漸漬小國之俗加以質性下愚有不可移之姿師古曰言不從化也論語稱孔子曰唯上智與下愚不移往者傅相亦不純以仁誼輔翌立大臣皆尚苛刻刺求微密讒臣在其間左右弄口積使上下不和更相眄伺師古曰更音工衡反宫殿之裏毛氂過失亡不暴陳當伏重誅以視海内師古曰視讀曰示數蒙聖恩得見貰赦師古曰貰謂寛其罪今立自知賊殺中郎曹將冬月廹促貪生畏死即詐僵仆陽病師古曰僵仆倒地也僵音薑仆音赴徼幸得踰於須臾師古曰冀得踰冬月而減罪也謹以實對伏須重誅師古曰須待也時冬月盡其春大赦不治元始中立坐與平帝外家中山衞氏交通新都侯王莽奏廢立爲庶人徙漢中立自殺二十七年國除後二歲莽白太皇太后立孝王𤣥孫之曾孫沛郡卒史音爲梁王奉孝王後莽簒國絶贊曰梁孝王雖以愛親故王膏腴之地師古曰太后愛子而帝親弟故曰愛親然㑹漢家隆盛百姓殷富故能殖其貨財廣其宫室車服然亦僣矣怙親亡厭牛禍告罰卒用憂死悲夫前漢書卷四十七前漢書卷四十七考證梁孝王武傳西至髙陽注蘇林曰陳留北縣臣召南按高陽鄉聚名非縣也酈食其傳云陳留高陽人又云諸將狥地過高陽者數十人即此高陽矣大臣及爰盎等有所關說于帝按褚先生具言其事見梁孝王世家後北獵梁山梁山史記作良山太后廼說爲帝壹餐史記作爲帝加壹餐梁懐王揖傳揖臣召南按梁懐王名史記表及世家作勝而孝文本紀作揖漢書賈誼傳作勝而紀及本傳作揖李竒謂懐王必有兩名理或然也梁共王買傳十年薨臣召南按諸侯王表作七年薨是也七十字相似傳寫誤耳買以孝景後元年嗣以建元五年薨是七年也梁平王襄傳雎陽人犴反按此文則其人姓犴名反史記作類犴反則其人姓類犴漢書脫一字耳梁餘尚有八城臣召南按史記作削梁八城梁餘尚有十城以地理志証之梁國統八縣則此文是也頃王無傷嗣諸侯王表作貞王毋傷前漢書卷四十七考證
