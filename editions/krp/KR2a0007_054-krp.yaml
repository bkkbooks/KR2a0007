body:
  text: 前漢書卷五十四漢蘭臺令史班固撰唐正議大夫行袐書少監琅邪縣開國子顔師古注李廣蘇建傳第二十四李廣隴西成紀人也其先曰李信秦時為將逐得燕太子丹者也廣世世受射師古曰受射法孝文十四年匈奴大入蕭關師古曰在上郡北而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍師古曰官為郎而常騎以侍天子故曰騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當髙祖世萬户侯豈足道哉景帝即位為騎郎將師古曰為騎郎之将主騎郎吳楚反時為驍騎都尉從太尉亞夫戰昌邑下顯名以梁王授廣將軍印故還賞不行文穎曰廣為漢將私受梁印故不得賞也為上谷太守數與匈奴戰典屬國公孫昆邪為上泣曰服䖍曰昆邪中國人也師古曰對上而泣也昆音下温反李廣材氣天下亡䨇自負其能數與虜确恐亡之師古曰負恃也确謂競勝敗也确音角上乃徙廣為上郡太守匈奴侵上郡宋祁曰侵上郡監本改侵作入上使中貴人從廣服䖍曰内臣之貴幸者勒習兵擊匈奴中貴人者將數十騎從張晏曰放縱逰獵也師古曰張讀作縱此説非也直言將數十騎自隨在大軍前行而忽遇敵也從音才用反見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣師古曰走趣也音奏廣曰是必射鵰者也文頴曰鵰鳥也故使善射者射之師古曰鵰大鷙鳥也一名鷲黒色翮可以為箭羽音彫廣乃從百騎徃馳三人師古曰疾馳而逐之三人亡馬歩行行數十里廣令其騎張左右翼師古曰旁引其騎若鳥翼之為而廣身自射彼三人者殺其二人生得一人果匈奴射鵰者也已縳之上山望匈奴數千騎見廣以為誘騎驚上山陳師古曰為陳以待廣也廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匈奴追射我立盡今我留匈奴必以我為大軍之誘不我擊師古曰不我擊不敢擊我也廣令曰前未到匈奴陳二里所止令曰皆下馬觧鞍騎曰虜多如是觧鞍即急奈何廣曰彼虜以我為走今觧鞍以示不去用堅其意師古曰示以堅牢令敵意知之有白馬將出䕶兵師古曰將之乘白馬者也䕶謂監視之廣上馬與十餘騎奔射殺白馬將而復還至其百騎中觧鞍縱馬卧師古曰縱放也時㑹暮胡兵終怪之弗敢擊夜半胡兵以為漢有伏軍於傍欲夜取之即引去平旦廣乃歸其大軍後徙為隴西北地鴈門雲中太守武帝即位左右言廣名將也由是入為未央衞尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳師古曰續漢書百官志云将軍領軍皆有部曲大將軍營五部部校尉一人部下有曲曲有軍候一人今廣尚於簡易故行道之中而不立部曲也就善水草頓舍人人自便師古曰頓止也舍息也便安利也音頻靣反其下亦同不擊刁斗自衞孟康曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行故名曰刁斗今在滎陽庫中也蘇林曰形如鋗無縁師古曰鐎音譙郡之譙温器也鋗音火𤣥反鋗即銚也今俗或呼銅銚音姚莫府省文書晉灼曰将軍職在征行無常處所在為治故言莫府也莫大也或曰衛青征匈奴絶大莫大克獲帝就拜大將軍於幕中府故曰莫府莫府之名始於此也師古曰二説皆非也莫府者以軍幕為義古字通單用耳軍旅無常居止故以帳幕言之廉頗李牧市租皆入幕府此則非因衞青始有其號又莫訓大於義乖矣省少也音所領反宋祁曰晉灼二字史記作如淳説然亦逺斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿師古曰簿文簿音歩户反至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁師古曰卒讀曰猝而其士亦佚樂師古曰佚與逸同逸樂謂閑豫也為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識師古曰苦謂厭苦之不識孝景時以數直諌為太中大夫為人廉謹於文法後漢誘單于以馬邑城使大軍伏馬邑傍而廣為驍騎將軍屬䕶軍將軍師古曰韓安國單于覺之去漢軍皆無功後四嵗廣以衞尉為將軍出鴈門擊匈奴匈奴兵多破廣軍生得廣單于素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷置兩馬間絡而盛之宋祁曰越本無之字卧行十餘里廣陽死睨其傍有一兒騎善馬師古曰睨邪視也五係反暫騰而上胡兒馬師古曰騰跳躍也因抱兒鞭馬南馳數十里得其餘軍匈奴騎數百追之廣行取兒弓射殺追騎師古曰且行且射也以故得脱於是至漢漢下廣吏吏當廣亡失多為虜所生得師古曰當謂處其罪也當斬贖為庶人數嵗與故潁隂侯屏居藍田南山中射獵師古曰潁隂侯灌嬰之孫名彊嘗夜從一騎出從人田閒飲宋祁曰南本飲作欲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下居無何匈奴入遼西宋祁曰越本作隴西殺太守敗韓將軍蘇林曰韓安國韓將軍後徙居右北平死於是上乃召拜廣為右北平太守廣請霸陵尉與俱師古曰奏請天子而將行至軍而斬之上書自陳謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服服䖍曰式撫車之式以禮敬人也式者車前横木也字或作軾振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏師古曰竦驚也是以名聲暴於夷貉威稜憺乎鄰國李奇曰神靈之威曰稜憺猶動也蘇林曰陳留人語恐言憺之師古曰稜音來登反憺音徒濫反夫報忿除害捐殘去殺朕之所圖於將軍也若廼免冠徒跣稽顙請罪豈朕之指哉師古曰指意也將軍其率師東轅彌節白檀孟康曰白檀縣名屬右北平李奇曰彌節少安之貌師古曰彌音亡俾反以臨右北平盛秋師古曰盛秋馬肥恐虜為冦故令折衝禦難也廣在郡匈奴號曰漢飛將軍避之數嵗不入界廣出獵見草中石以為虎而射之中石没矢視之石也他日射之終不能入矣廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦射殺之石建卒上召廣代為郎中令元朔六年廣復為將軍從大將軍出定襄諸將多中首虜率為侯者如淳曰中猶充也充本法得首若干封侯也師古曰率謂軍功封賞之科著在法令者也中音竹仲反而廣軍無功後三嵗廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匈奴左賢王將四萬騎圍廣廣軍士皆恐廣廼使其子敢徃馳之敢從數十騎直貫胡騎出其左右而還報廣曰胡虜易與耳軍士乃安為圜陳外鄉師古曰鄉讀曰嚮胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持滿毋發師古曰注矢於弓弩而張滿之不發矢也而廣身自以大黄射其裨將服䖍曰黄肩弩也孟康曰太公䧟堅郤敵以大黄參連弩也晉灼曰黄肩即黄閒也大黄其大者也師古曰服晉二説是也殺數人胡虜益觧㑹暮吏士無人色師古曰言懼甚而廣意氣自如師古曰自如猶云如舊益治軍師古曰廵部曲整行陳也軍中服其勇也明日復力戰而博望侯軍亦至匈奴廼觧去漢軍罷弗能追師古曰罷讀曰疲是時廣軍幾没罷師古曰幾音鉅依反宋祁曰浙本及越本並無罷字歸漢法博望侯後期當死贖為庶人廣軍自當亡賞師古曰自當謂為虜所勝又能勝虜功過相當也初廣與從弟李蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍擊右賢王有功中率封為樂安侯師古曰此傳及百官表並為樂安侯而功臣表作安樂侯是功臣表誤也元狩二年代公孫𢎞為丞相蔡為人在下中師古曰在下軰之中名聲出廣下逺甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語云自漢擊匈奴廣未甞不在其中而諸妄校尉已下張晏曰妄猶凡也材能不及中師古曰中謂中庸之人也以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈甞有恨者乎師古曰恨悔也廣曰吾為隴西守羌甞反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此廼將軍所以不得侯者也廣歴七郡太守前後四十餘年得賞賜輙分其戲下師古曰戲讀曰麾又音許宜反飲食與士卒共之家無餘財終不言生産事為人長爰臂如淳曰臂如猨臂通肩也或曰似當為緩臂也師古曰王國風菟爰之詩云有莬爰爰亦緩意其義兩通其善射亦天性雖子孫他人學者莫能及廣呐口少言師古曰呐亦訥字與人居則畫地為軍陳射闊狹以飲專以射為戲如淳曰為戲求疏密持酒以飲不勝者也將兵乏絶處見水士卒不盡飲不近水不盡餐不甞食寛緩不苛師古曰苛細也士以此愛樂為用其射見敵非在數十歩之内度不中不發師古曰度音待各反中音竹仲反發即應弦而倒用此其將數困辱及射猛獸亦數為所傷云元狩四年大將軍票騎將軍大擊匈奴廣數自請行上以為老不許良久乃許之以為前將軍大將軍青出塞捕虜知單于所居廼自以精兵走之師古曰走趣也音奏而令廣并於右將軍軍出東道師古曰并合也合軍而同道也東道少回逺師古曰回遶也曲也音胡悔反大軍行水草少其埶不屯行張晏曰以水草少不可羣軰也廣辭曰臣部為前將軍今大將軍乃徙臣出東道且臣結髪而與匈奴戰師古曰言始勝冠即在戰陳廼今一得當單于臣願居前先死單于師古曰致死而取單于大將軍隂受上指以為李廣數奇孟康曰奇隻不耦也如淳曰數為匈奴所敗為奇不耦師古曰言廣命隻不耦合也孟説是矣數音所角反奇音居宜反宋祁曰數南本浙夲並所具反予按師古是孟説自然音所具反音所角當從如説未有觧從孟而音從如也可判其繆焉毋令當單于恐不得所欲師古曰謂不勝敵也是時公孫敖新失侯為中將軍劉奉世曰按靑去病傳是嵗出塞無中將軍而敖傳是嵗以校尉從大將軍此傳誤也大將軍亦欲使敖與俱當單于故徙廣廣知之固辭大將軍弗聴令長史封書與廣之莫府師古曰之徃也莫府衞靑行軍府宋祁曰廣之莫府景祐本無廣字曰急詣部如書劉攽曰莫府乃廣之前將軍莫府也凡將兵皆有莫府張敖監平樂兵置莫府是矣大將軍既不許廣難面不從故但封書與廣之莫府使奉行耳及後急責廣之莫府亦是劉奉世曰此莫府廣軍之莫府曹吏文書所在也廣見大將軍未肯去靑徑封書與廣莫府令如書也與之莫府者猶言與其莫府也廣不謝大將軍而起行意象愠怒師古曰言愠怒之色形於外也而就部引兵與右將軍食其合軍出東道師古曰趙食其也食音異其音基惑失道後大將軍師古曰惑迷也在後不及期也大將軍與單于接戰單于遁走弗能得而還南絶幕廼遇兩將軍師古曰絶渡也廣已見大將軍還入軍大將軍使長史持糒醪遺廣師古曰糒乾飯也醪汁滓酒也糒音備醪音牢因問廣食其失道狀曰青欲上書報天子失軍曲折師古曰曲折猶言委曲也廣未對大將軍長史急責廣之莫府上簿師古曰之徃也簿謂文狀也音歩户反廣曰諸校尉亡罪乃我自失道吾今自上簿劉奉世曰此兩莫府亦廣之莫府也廣見青已還入軍未至莫府而長史來問廣廣未對而長史又旁責廣之莫府曹吏令上簿故廣云我今自上簿然後退至莫府乃自剄耳至莫府謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部行回逺又迷失道豈非天哉且廣年六十餘終不能復對刀筆之吏矣遂引刀自剄百姓聞之知與不知老壯皆為垂泣師古曰知謂素相識知也而右將軍獨下吏當死贖為庶人廣三子曰當户椒敢皆為郎上與韓嫣戲嫣少不遜師古曰嫣音偃當户擊嫣嫣走於是上以為能當户蚤死乃拜椒為代郡太守皆先廣死廣死軍中時敢從票騎將軍廣死明年李蔡以丞相坐詔賜冢地陽陵當得二十畝蔡盗取三頃頗賣得四十餘萬又盗取神道外壖地一畝葬其中師古曰壖音人椽反當下獄自殺敢以校尉從票騎將軍擊胡左賢王力戰奪左賢王旗鼔斬首多賜爵關内侯食邑二百户代廣為郎中令頃之怨大將軍青之恨其父師古曰令其父恨而死也廼擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宫獵師古曰無何謂未多時也雍之所在地形積髙故云上也上音時掌反他皆類此票騎將軍去病怨敢傷青射殺敢去病時方貴幸上為諱云鹿觸殺之居嵗餘去病死敢有女為太子中人愛幸敢男禹有寵於太子然好利亦有勇甞與侍中貴人飲侵陵之莫敢應師古曰言畏其勇氣後愬之上上召禹使刺虎縣下圏中未至地有詔引出之禹從落中以劒斫絶纍欲刺虎師古曰落與絡同謂當時繦絡之而下也纍索也音力追反上壯之遂救止焉而當户有遺腹子陵將兵擊胡兵敗降匈奴後人告禹謀欲亡從陵下吏死陵字少卿少為侍中建章監善騎射愛人謙讓下士師古曰下音胡亞反甚得名譽武帝以為有廣之風使將八百騎深入匈奴二千餘里過居延視地形不見虜還拜為騎都尉將勇敢五千人教射酒泉張掖以備胡數年漢遣貳師將軍伐大宛使陵將五校兵隨後行至塞㑹貳師還上賜陵書陵留吏士與輕騎五百出敦煌至鹽水迎貳師還復留屯張掖天漢二年貳師將三萬騎出酒泉擊左賢王於天山召陵欲使為貳師將輜重師古曰重音直用反陵召見武臺師古曰未央宫有武臺殿叩頭自請曰臣所將屯邊者皆荆楚勇士奇材劔客也力扼虎射命中師古曰扼謂捉持之也命中者所指名處即中之也扼音厄願得自當一隊師古曰隊部也音徒内反到蘭干山南以分單于兵毋令專鄉貳師軍師古曰鄉讀曰嚮上曰將惡相屬邪吾發軍多毋騎予女陵對無所事騎師古曰猶言不事須騎也臣願以少擊衆歩兵五千人渉單于庭上壯而許之因詔彊弩都尉路博徳將兵半道迎陵軍博徳故伏波將軍亦羞為陵後距奏言方秋匈奴馬肥未可與戰臣願留陵至春俱將酒泉張掖騎各五千人並擊東西浚稽可必禽也師古曰浚稽山名時虜分居此兩山也浚音峻稽音雞書奏上怒疑陵悔不欲出而教博徳上書廼詔博德吾欲予李陵騎云欲以少擊衆今虜入西河其引兵走西河遮鉤營之道張晏曰胡來要害道令博徳遮之師古曰走音奏詔陵以九月發出遮虜鄣師古曰鄣者塞上險要之處徃徃脩築别置候望之人所以自鄣蔽而伺敵也遮虜鄣名至東浚稽山南龍勒水上俳佪觀虜即亡所見從浞野侯趙破奴故道抵受降城休士師古曰抵歸也受降城本公孫敖所築休息也浞音仕角反因騎置以聞師古曰騎置謂驛騎也所與博徳言者云何張晏曰天子疑陵教博徳上書求至春乃俱西也具以書對陵於是將其歩卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳歩樂還以聞歩樂召見道陵將率得士死力上甚説師古曰説讀曰悦拜歩樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持㦸盾後行持弓弩師古曰行並音胡剛反令曰聞鼔聲而縱聞金聲而止師古曰金謂鉦也一名鐲鐲音濁虜見漢軍少直前就營陵搏戰攻之如淳曰手對戰也千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中師古曰抵當也至也其下亦同連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰陵曰吾士氣少衰而鼓不起者何也師古曰擊鼔進士而士氣不起也一曰士卒以有妻婦故聞鼔音而不時起也軍中豈有女子乎始軍出時關東羣盗妻子徙邊者隨軍為卒妻婦大匿車中宋祁曰大字南本浙本並作伏陵捜得皆劒斬之明日復戰斬首三千餘級引兵東南循故龍城道行四五日抵大澤葭葦中師古曰葭即蘆也音家虜從上風縱火陵亦令軍中縱火以自救師古曰預自燒其旁草木令虜火不得延及也南行至山下單于在南山上使其子將騎撃陵陵軍歩鬬樹木間復殺數千人因發連弩射單于服䖍曰三十弩共一弦也張晏曰三十絭共一臂也師古曰張説是也絭音去權反又音眷劉攽曰三十弩一絃三十絭一臂皆無此理妄説也盖如今之合蟬或併兩弩共一絃之類單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎諸當户君長皆言師古曰當户匈奴官名也單于自將數萬騎擊漢數千人不能㓕後無以復使邊臣令漢益輕匈奴復力戰山谷間尚四五十里得平地不能破廼還是時陵軍益急匈奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去㑹陵軍候管敢為校尉所辱亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及成安侯校各八百人為前行以黄與白為幟師古曰幟旗也音式志反當使精騎射之即破矣成安侯者頴川人父韓千秋故濟南相奮擊南越戰死武帝封子延年為侯以校尉隨陵單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降師古曰且戰且呼也呼音火故反趣讀曰促遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山師古曰鞮音丁奚反百五十萬矢皆盡宋祁曰越本百字作一日即棄車去士尚三千餘人徒斬車輻而持之師古曰徒但也軍吏持尺刀抵山入陿谷單于遮其後乘隅下壘石服䖍曰山名也師古曰此説非也言放石以投人因山隅曲而下也壘音盧對反士卒多死不得行昏後陵便衣獨歩山營蘇林曰搴衣卷褏而行也師古曰此説非也便衣謂著短衣小褏也止左右毋隨我丈夫一取單于耳師古曰言一身獨取也良久陵還大息曰兵敗死矣軍吏或曰將軍威震匈奴天命不遂後求道徑還歸如浞野侯為虜所得後亡還天子客遇之况於將軍乎宋祁曰浙本客作容陵曰公止吾不死非壯士也於是盡斬旌旗及珍寳埋地中陵歎曰復得數十矢足以脱矣宋祁曰南本浙本復字下有人字須得人字義乃安若只云數十矢何能脱也今無兵復戰師古曰兵即謂矢及矛㦸之屬也天明坐受縛矣各鳥獸散猶有得脱歸報天子者師古曰脱免也音土活反次下亦同令軍士人持二升糒一半冰如淳曰半讀曰片或曰五升曰半師古曰半讀曰判判大片也時冬寒有冰持之以備渇也期至遮虜鄣者相待夜半時擊鼓起士鼔不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無靣目報陛下遂降軍人分散脱至塞者四百餘人陵敗處去塞百餘里邊塞以聞上欲陵死戰召陵母及婦令相者視之無死喪色後聞陵降上怒甚責問陳歩樂歩樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以殉國家之急師古曰殉營也一曰從也其素所畜積也師古曰畜讀曰蓄有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短服䖍曰媒音欺謂詆欺也孟康曰媒酒教糵麴也謂釀成其罪也師古曰孟説是也齊人名麴餅曰媒誠可痛也且陵提歩卒不滿五千深輮戎馬之地師古曰輮踐也音人九反抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬬千里矢盡道窮士張空拳文頴曰拳弓弩拳也師古曰拳字與絭同音去權反又音眷冐白刃北首爭死敵師古曰冐犯也北首北嚮也冐音莫北反首音式救反宋祁曰南浙兩本冐音莫尅反首音式授反淳化本冐音莫到反首音式受反當從南浙得人之死力雖古名將不過也身雖䧟敗然其所摧敗亦足暴於天下師古曰所摧敗敗匈奴之兵也暴猶章也彼之不死宜欲得當以報漢也師古曰言欲立功以當其罪也初上遣貳師大軍出財令陵為助兵師古曰財與纔同謂淺也僅也史傳通用字他皆類此及陵與單于相值而貳師功少上以遷誣罔欲沮貳師為陵游説師古曰沮謂毁壊之音才吕反下遷腐刑久之上悔陵無救曰陵當發出塞廼詔彊弩都尉令迎軍坐預詔之得令老將生姦詐孟康曰坐預詔彊弩都尉路博徳迎陵博徳老将出塞不至令陵見没也廼遣使勞賜陵餘軍得脱者陵在匈奴嵗餘上遣因杅將軍公孫敖孟康曰因杅胡地名也師古曰杅音于將兵深入匈奴迎陵敖軍無功還曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上聞於是族陵家母弟妻子皆伏誅隴西士大夫以李氏為愧師古曰恥其不能死節累及家室其後漢遣使使匈奴陵謂使者曰吾為漢將歩卒五千人横行匈奴以亡救而敗何負於漢而誅吾家使者曰漢聞李少卿教匈奴為兵宋祁曰浙本無少字只云李卿下同陵曰廼李緒非我也李緒本漢塞外都尉居奚侯城匈奴攻之緒降而單于客遇緒常坐陵上陵痛其家以李緒而誅使人刺殺緒大閼氏欲殺陵師古曰大閼氏單于之母單于匿之北方大閼氏死廼還單于壯陵以女妻之立為右校王衛律為丁靈王師古曰丁靈胡之别種也立為王而主其人也皆貴用事衛律者父本長水胡人律生長漢善協律都尉李延年延年薦言律使匈奴使還㑹延年家收律懼并誅亡還降匈奴匈奴愛之常在單于左右陵居外有大事廼入議昭帝立大將軍霍光左將軍上官桀輔政素與陵善遣陵故人隴西任立政等三人師古曰故人謂舊與相知者俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵師古曰以目相視而感動之今俗所謂眼語者也而數數自循其刀環師古曰循謂摩循也握其足隂諭之言可還歸漢也後陵律持牛酒勞漢使博飲蘇林曰博且飲也師古曰勞音來到反兩人皆胡服椎結師古曰結讀曰髻一撮之髻其形如椎立政大言曰漢已大赦中國安樂主上富於春秋師古曰言天子年少霍子孟上官少叔用事師古曰子孟光之字少叔桀之字也以此言微動之陵墨不應孰視而自循其髪答曰吾已胡服矣有頃律起更衣立政曰咄少卿良苦師古曰言甚勞苦霍子孟上官少叔謝女師古曰謝以辭相問也陵曰霍與上官無恙乎師古曰恙憂病也立政曰請少卿來歸故鄉毋憂富貴陵字立政曰少公師古曰呼其字宋祁曰字字一作呼歸易耳恐再辱奈何語未卒衞律還頗聞餘語曰李少卿賢者不獨居一國范蠡徧遊天下由余去戎入秦今何語之親也因罷去立政隨謂陵曰亦有意乎師古曰隨其後而語之陵曰丈夫不能再辱陵在匈奴二十餘年元平元年病死蘇建杜陵人也以校尉從大將軍青擊匈奴封平陵侯以將軍築朔方後以衞尉為游擊將軍從大將軍出朔方後一嵗以右將軍再從大將軍出定襄亡翕侯服䖍曰趙信也失軍當斬贖為庶人其後為代郡太守卒官有三子嘉為奉車都尉賢為騎都尉宋祁曰南夲騎作駙馬中子武最知名武字子卿少以父任兄弟竝為郎稍遷至栘中廐監師古曰栘中厩名為之監也栘音移時漢連伐胡數通使相窺觀匈奴留漢使郭吉路充國等前後十餘軰匈奴使來漢亦留之以相當天漢元年且鞮侯單于初立師古曰且音子閭反鞮音丁奚反恐漢襲之廼曰漢天子我丈人行也師古曰丈人尊老之稱行音胡浪反盡歸漢使路充國等武帝嘉其義廼遣武以中郎將使持節送匈奴使留在漢者因厚賂單于荅其善意武與副中郎將張勝及假吏常恵等師古曰假吏猶言兼吏也時權為使之吏若今之差人充使典矣募士斥候百餘人俱師古曰募人以充士卒及在道為斥候者既至匈奴置幣遺單于單于益驕非漢所望也方欲發使送武等㑹緱王與長水虞常等謀反匈奴中師古曰緱音工侯反緱王者昆邪王姊子也師古曰昆音胡門反與昆邪王俱降漢後隨浞野侯没胡中師古曰從趙破奴擊匈奴兵敗而降及衞律所將降者隂相與謀刼單于母閼氏歸漢㑹武等至匈奴虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸䝉其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得師古曰被執獲也單于使衞律治其事張勝聞之恐前語發以狀語武武曰事如此此必及我見犯廼死重負國欲自殺師古曰言被匈奴侵犯然後廼死是為更負漢國故欲先自殺也重音直用反勝恵共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秩訾曰臣瓚曰胡官之號也即謀單于何以復加師古曰言謀衞律而殺之其罰太重宜皆降之單于使衞律召武受辭師古曰致單于之命而取其對也武謂恵等屈節辱命雖生何靣目以歸漢引佩刀自刺衞律驚自抱持武馳召毉鑿地為坎置煴火師古曰煴謂聚火無焱者也音於云反焱音式膽反覆武其上師古曰覆身於坎上也覆音芳目反蹈其背以出血武氣絶半日復息師古曰息謂出氣也恵等哭輿歸營宋祁曰浙本哭作共單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武師古曰諭説令降也㑹論虞常欲因此時降武劒斬虞常已律曰漢使張勝謀殺單于近臣師古曰衞律自謂也當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山富貴如此師古曰彌滿也蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰女為人臣子不顧恩義畔主背親為降虜於蠻夷何以女為見師古曰言何用見女為也且單于信女使决人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨匈奴未耳若知我不降明師古曰若汝也言汝知我不肯降明矣欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之廼幽武置大窖中師古曰舊米粟之窖而空者也音工孝反絶不飲食師古曰飲音於禁反食讀曰飤天雨雪武臥齧雪與旃毛并咽之師古曰咽吞也音宴數日不死匈奴以為神乃徙武北海上無人處使牧羝羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏白頭馬生角之比也羝音丁奚反乳音人喻反宋祁曰牧羝字下疑有羊字别其官屬常惠等各置他所武既至海上廩食不至師古曰無人給飤之掘野䑕去􅋄實而食之蘇林曰取䑕所去草實而食之張晏曰取䑕及草實并而食之師古曰蘇説是也􅋄古草字去謂藏之也音邱吕反劉攽曰今北方野鼠之類甚多皆可食也武掘野鼠得即食之其草食乃頗去藏耳杖漢節牧羊臥起操持節旄盡落積五六年單于弟於靬王弋射海上師古曰靬音居言反武能網紡繳檠弓弩師古曰繳生絲縷也可以弋射檠謂輔正弓弩也繳音斫檠音警又音巨京反宋祁曰網字上疑有結字於靬王愛之給其衣食三嵗餘王病賜武馬畜服匿穹廬劉徳曰服匿如小旃帳孟康曰服匿如甖小口大腹方底用受酒酪穹廬旃帳也晉灼曰河東北界人呼小石甖受二斗所曰服匿師古曰孟晉二説是也王死後人衆徙去其冬丁令盗武牛羊師古曰令音零丁令即上所謂丁靈耳武復窮厄初武與李陵俱為侍中武使匈奴明年陵降不敢求武久之單于使陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使陵來説足下虛心欲相待終不得歸漢空自苦亡人之地信義安所見乎前長君為奉車服䖍曰武兄嘉從至雍棫陽宫扶輦下除張晏曰主扶輦下除道也師古曰除謂門屏之間觸柱折轅劾大不敬伏劒自刎師古曰刎斷也斷其頭也音武粉反賜錢二百萬以葬孺卿從祠河東后土張晏曰武弟賢宦騎與黄門駙馬争舩師古曰宦騎宦者而為騎也黄門駙馬天子駙馬之在黄門者駙副也金日殫傳曰養馬於黄門也推墮駙馬河中溺死宦騎亡詔使孺卿逐捕不得惶恐飲藥而死來時大夫人已不幸師古曰不幸亦謂死陵送𦵏至陽陵子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露師古曰朝露見日則晞人命短促亦如之何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宫師古曰百官公卿表云少府屬官有居室武帝太初元年更名保宫子卿不欲降何以過陵且陛下春秋髙法令亡常大臣亡罪夷滅者數十家安危不可知子卿尚復誰為乎願聽陵計勿復有云武曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖䝉斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死無所恨願勿復再言陵與武飲數日復曰子卿壹聴陵言武曰自分已死久矣師古曰分音扶問反王必欲降武請畢今日之驩效死於前師古曰效致也陵見其至誠喟然歎曰嗟乎義士陵與衞律之罪上通於天因泣下霑衿與武决去師古曰决别也陵惡自賜武師古曰謂若示已於匈奴中富饒以夸武使其妻賜武牛羊數十頭後陵復至北海上語武區脱捕得雲中生口服䖍曰區脱土室胡兒所作以候漢者也李奇曰匈奴邊境羅落守衞官也晉灼曰匈奴傳東胡與匈奴間有棄地千餘里各居其邊為區脱又云漢得區脱王發人民屯區脱以備漢此為因邊境以為官李説是也師古曰匈奴邊境為候望之室服説是也本非官號區脱王者以其所部居區脱之處因呼之耳李晉二説皆失之區讀與甌同音一侯反脱音土活反言太守以下吏民皆白服曰上崩武聞之南鄉號哭歐血旦夕臨師古曰鄉讀曰嚮臨哭也音力禁反數月昭帝即位劉敞曰數月字當屬上句數年匈奴與漢和親漢求武等匈奴詭言武死宋祁曰江浙本詭作紿後漢使復至匈奴常恵請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如恵語以讓單于師古曰讓責也單于視左右而驚謝漢使曰武等實在於是李陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢且貰陵罪師古曰貰寛也全其老母使得奮大辱之積志庶幾乎曹柯之盟李奇曰欲劫單于如曹劌劫齊桓公柯盟之時此陵宿昔之所不忘也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人壹别長絶陵起舞歌曰徑萬里兮度沙幕為君將兮奮匈奴路窮絶兮矢刃摧士衆滅兮名已隤老母已死雖報恩將安歸師古曰隤墜也音大回反宋祁曰雖字下疑有欲字陵泣下數行因與武决單于召㑹武官屬師古曰㑹謂集聚也前以降及物故凡隨武還者九人師古曰物故謂死也言其同於鬼物而故也一説不欲斥言但云其所服用之物皆已故耳而説者妄欲改物為勿非也宋祁曰物當從南本作歾音没武以始元六年春至京師詔武奉一太牢謁武帝園廟拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區常恵徐聖趙終根皆拜為中郎賜帛各二百匹其餘六人老歸家賜錢人十萬復終身師古曰復音芳目反常惠後至右將軍封列侯自有傳武留匈奴凡十九嵗始以彊壯出及還須髪盡白武來歸明年上官桀子安與桑𢎞羊及燕王盖主謀反武子男元與安有謀坐死初桀安與大將軍霍光争權數疏光過失子燕王師古曰疏謂條錄之令上書告之又言蘇武使匈奴二十年不降還廼為典屬國師古曰實十九年而言二十者欲久其事以見寃屈故多言也大將軍長史無功勞為捜粟都尉光顓權自恣師古曰顓與專同及燕王等反誅窮治黨與武素與桀𢎞羊有舊數為燕王所訟子又在謀中廷尉奏請逮捕武霍光寢其奏免武官數年昭帝崩武以故二千石與計謀立宣帝師古曰與讀作預賜爵闗内侯食邑三百户久之衞將軍張安世薦武明習故事奉使不辱命先帝以為遺言宣帝即時召武待詔宦者署師古曰百官公卿表少府屬官有宦者令丞以其署親近故令於此待詔也數進見復為右曹典屬國以武著節老臣令朝朔望號稱祭酒師古曰加祭酒之號所以示優尊也祭酒已觧在伍被傳甚優寵之武所得賞賜盡以施予昆弟故人家不餘財皇后父平恩侯帝舅平昌侯樂昌侯師古曰平恩侯許伯平昌侯王無故樂昌侯王武也車騎將軍韓増丞相魏相御史大夫丙吉皆敬重武武年老子前坐事死上閔之問左右武在匈奴久豈有子乎武因平恩侯自白前發匈奴時胡婦適産一子通國有聲問來願因使者致金帛贖之上許焉後通國隨使者至上以為郎又以武弟子為右曹武年八十餘神爵二年病卒甘露三年單于始入朝上思股肱之美廼圖畫其人於麒麟閣張晏曰武帝獲麒麟時作此閣圖畫其象於閣遂以為名師古曰漢宫閣疏名云蕭何造法其形貌署其官爵姓名師古曰署表也題也唯霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衞將軍富平侯張安世次曰車騎將軍龍額侯韓増宋祁曰頟或作雒次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉德次曰少府梁邱賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功徳知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉師古曰三人皆周宣王之臣有文武之功佐宣王中興者也言宣帝亦重興漢室而霍光等竝為名臣皆比於方叔之屬召讀曰邵凡十一人皆有傳自丞相黄霸廷尉于定國大司農朱邑京兆尹張敞右扶風尹翁歸及儒者夏侯勝等皆以善終著名宣帝之世然不得列於名臣之圖以此知其選矣贊曰李將軍恂恂如鄙人口不能出辭師古曰恂恂誠謹貌也音荀及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其華實之故非有所召呼而人争歸趣來徃不絶其下自然成徑以喻人懐誠信之心故能潜有所感也蹊音奚此言雖小可以喻大然三代之將道家所忌宋祁曰南本代作世自廣至陵遂亡其宗哀哉孔子稱志士仁人有殺身以成仁無求生以害仁使於四方不辱君命師古曰皆論語載孔子之言蘇武有之矣前漢書卷五十四前漢書卷五十四考證李廣傳隴西成紀人也臣召南按成紀縣漢初屬隴西郡至元光以後置天水郡改屬焉故志載成紀於天水下而此傳曰隴西成紀人也因抱兒茅坤曰史記作因推墮兒是彌節白檀顧炎武曰彌與弭同司馬相如傳於是楚王乃弭節徘徊郭璞曰弭猶低也節所杖信節也而廣身自以大黄射其禆将注孟康曰太公䧟堅却敵以大黄臣召南按注太公下應有六韜曰三字此刋本訛脱也而令廣并于右將軍軍出東道臣召南按後文注右將軍趙食其也應在此文下李陵傳至東浚稽山南龍勒水上胡三省曰志敦煌龍勒縣有龍勒水出南𦍑中東北入澤溉民田盖其下流至浚稽山下臣召南按陵出居延遮虜障此龍勒水當在居延塞外直北沙磧中故下文曰陵出居延北行三十日至浚稽山不當以西陲敦煌之龍勒縣實之也且志言有氐置水不云即龍勒水胡氏地學極精而此條則誤百五十萬矢皆盡臣召南按百字通鑑作一日然則司馬温公所見本與今本不同也坐預詔之注孟康云云胡三省曰注非也帝意既悔追思前事以為當陵發出塞之時方可詔博徳繼其後以迎陵軍乃于陵未行時預詔之使博徳羞為陵後距得生姦詐上奏而遂令博徳别出西河致陵軍無救也蘇武傳乃徙武北海上臣召南按北海為匈奴北界其外即丁令也塞外遇大水澤通稱為海唐書地理志骨利幹都播二部落北有小海氷堅時馬行八日可渡海北多大山即此北海也今曰白哈兒湖在喀爾喀極北鄂羅斯國之南界賜武馬畜服匿穹廬注師古曰孟晉二説是也臣宗萬按南齊書陸澄傳竟陵王子良得古器小口方腹而底平可將七八升以問澄澄曰此名服匿單于以與蘇武子良後詳觀器底有字髣髴如澄所言可以証孟康晉灼二注陵惡自賜武注師古云云顧炎武曰今人送物與人而託其名于妻者徃徃有之其稱賜者陵在匈奴已立為王故也云惡自賜武盖嫌于自居其名耳師古注非凡隨武還者九人臣召南按此專記武官屬耳匈奴傳言有馬宏者前以副使使西域為匈奴所遮不肯降至是與武並還漢廼圖畫其人于麒麟閣胡三省曰閣在未央宫中圖畫功臣自此始前漢書卷五十四考證
