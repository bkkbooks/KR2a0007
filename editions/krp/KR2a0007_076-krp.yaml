body:
  text: 前漢書卷七十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注趙尹韓張兩王列傳第四十六趙廣漢字子都涿郡蠡吾人也師古曰蠡音禮故屬河間師古曰言蠡吾舊屬河間後屬涿郡少為郡吏州從事以廉絜通敏下士為名師古曰敏謂材識捷疾也下音胡嫁反舉茂材平準令劉奉世曰材字下當有為字察廉為陽翟令以治行尤異遷京輔都尉守京兆尹㑹昭帝崩而新豐杜建為京兆掾䕶作平陵方上孟康曰壙臧上也師古曰方上在張湯傳宋祁曰注文方上字下當有解字建素豪俠賔客為姦利廣漢聞之先風告建不改師古曰風讀曰諷宋祁云建浙本作及於是收案致法師古曰致至也令至於罪罸之法中貴人豪長者為請無不至終無所聽師古曰中貴人居中朝而貴者也豪豪桀也長者有名德之人也服䖍曰内臣之貴幸者劉奉世曰顔解中貴人與李廣傳同服説不同當以服説為是宗族賔客謀欲篡取師古曰逆取曰篡廣漢盡知其計議主名起居師古曰起居謂居止之處及欲發起之狀使吏告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之是時昌邑王徴即位行淫亂大將軍霍光與羣臣共廢王尊立宣帝廣漢以與議定䇿賜爵關内侯師古曰與讀曰豫遷潁川太守郡大姓原褚宗族横恣李竒曰原音元師古曰原褚二姓也原讀如本字横音胡孟反宋祁云原褚當作原氏禇氏賔客犯為盜賊前二千石莫能禽制廣漢旣至數月誅原褚首惡郡中震栗先是潁川豪桀大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記服䖍曰受相訟牋記也師古曰擇其中可使者奬厲而使之出有案問旣得罪名行法罸之廣漢故漏泄其語令相怨咎師古曰遣知其事由某人發故結怨咎也又教吏為缿筩蘇林曰缿音項如瓶可受投書孟康曰筩竹筩也如今官受密事筩也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筩皆為此制而用受書令投於其中也筩音同及得投書削其主名而託以為豪桀大姓子弟所言其後彊宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐師古曰面相斥曰訐音居乂反又音居謁反宋祁曰相告訐疑相字上有好字注文面相斥疑作告而相斥廣漢得以為耳目盜賊以故不發發又輙得壹切治理威名流聞師古曰言諸事皆治理也治音直吏反一切解在平紀及匈奴降者言匈奴中皆聞廣漢本始二年漢發五將軍擊匈奴徴廣漢宋祁云景本有遣字學官本云徵遣浙本無遣字祁按徴廣漢不當便云遣若已云遣下又言將兵屬蒲類意致繁複從浙本為長楊伯時云徵而遣之以屬蒲類何不可也以太守將兵屬蒲類將軍趙充國從軍還復用守京兆尹滿嵗為眞廣漢為二千石以和顔接士其尉薦待遇吏殷勤甚備如淳曰尉亦薦籍也師古曰尉薦謂安尉而薦逹之事推功善歸之於下曰某掾卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隱匿咸願為用僵仆無所避師古曰僵偃也仆頓也僵音畺仆音赴廣漢聰眀皆知其能之所宜盡力與否其或負者輙先聞知風諭不改乃收捕之師古曰風讀曰諷無所逃案之辠立具即時伏辜廣漢為人彊力天性精於吏職見吏民或夜不寝至旦尤善為鉤距以得事情蘇林曰鉤得其情使不得去也晉灼曰鉤致也距閉也使對者無疑若不問而自知衆莫覺所由以閉其術為距也師古曰晉説是也宋祁曰注文疑字下疑有示字鉤距者設欲知馬賈則先問狗師古曰賈讀曰價已問羊又問牛然後及馬參伍其賈以類相準則知馬之貴賤不失實矣唯廣漢至精能行之它人效者莫能及也宋祁曰越本無也字郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之長安少年數人㑹窮里空舍謀共劫人師古曰窮里里中之極隱處坐語未訖廣漢使吏捕治具服富人蘇回為郎二人劫之師古曰劫取其身為質令家將財物贖之有頃廣漢將吏到家自立庭下使長安丞龔奢叩堂戸曉賊師古曰曉謂諭告之曰京兆尹趙君謝兩卿無得殺質此宿衛臣也釋質束手得善相遇幸逢赦令或時解脫師古曰若束手自来雖合處牢獄當善處遇之或逄赦令則得免脱也脱音吐活反二人驚愕又素聞廣漢名即開户出下堂叩頭廣漢跪謝曰幸全活郎甚厚送獄勅吏謹遇給酒肉至冬當出死豫為調棺給斂葬具告語之師古曰調辦具之也棺斂以棺衣斂尸也調音徒釣反棺音工喚反斂音力贍反宋祁曰給字疑可刪皆曰死無所恨廣漢嘗記召湖都亭長師古曰為書記以召之若今之下符追呼人也湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君師古曰多厚也言殷勤若今人言千萬問訊矣亭長旣至廣漢與語問事畢謂曰界上亭長寄聲謝我師古曰謝告也何以不為致問亭長叩頭服實有之廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其發姦擿伏如神皆此類也師古曰擿謂動發之也音它狄反廣漢奏請令長安游徼獄吏秩百石師古曰特増其秩以厲其行宋祁曰浙本作獄史其後百石吏皆差自重不敢枉法妄繫留人京兆政清吏民稱之不容口長老傳以為自漢興以来治京兆者莫能及楊伯時云言漢興足矣何必以来二字左馮翊右扶風皆治長安中師古曰治音直吏反犯法者從迹喜過京兆界師古曰從讀曰縱喜音許吏反廣漢歎曰亂吾治者常二輔也誠令廣漢得兼治之直差易耳初大將軍霍光秉政廣漢事光及光薨後廣漢心知微指師古曰識天子意也發長安吏自將與俱至光子博陸侯禹第直突入其門廋索私屠酤椎破盧罌斧斬其門關而去師古曰廋讀與搜同謂入室求之也盧所以居罌罌所以盛酒也盧解在食貨志司馬相如傳罌音扵耕反宋祁曰其門或無其字時光女為皇后聞之對帝涕泣帝心善之以召問廣漢廣漢由是侵犯貴戚大臣所居好用世吏子孫新進年少者師古曰言舊吏家子孫而其人後出求進又年少也宋祁曰注末也字疑是者字専厲彊壯蠭氣師古曰蠭與鋒同言鋒鋭之氣見事風生無所回避師古曰風生言其速疾不可當也回曲也率多果敢之計莫為持難廣漢終以此敗初廣漢客私酤酒長安市丞相史逐去宋祁云史越夲作吏去字下南本更有客字客疑男子蘇賢言之以語廣漢廣漢使長安丞案賢師古曰案致其罪也尉吏禹故劾賢為騎士屯霸上不詣屯所乏軍興文穎曰尉吏尉部吏也禹其名宋祁云吏越作史賢父上書訟罪告廣漢事下有司覆治禹坐要斬請逮捕廣漢有詔即訊師古曰令就問之不追入獄也辭服㑹赦貶秩一等廣漢疑其邑子榮畜教令師古曰蘇賢同邑之子也令音力成反後以他法論殺畜人上書言之事下丞相御史案驗甚急廣漢使所親信長安人為丞相府門卒令微司丞相門内不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妬殺之府舍而丞相奉齋酎入廟祠師古曰将酎祭宗廟而先絜齋也廣漢得此使中郎趙奉夀風曉丞相師古曰風讀曰諷欲以脅之毋令窮正已事丞相不聽案驗愈急宋祁曰不聽字上疑冇怒字廣漢欲告之先問太史知星氣者言今年當有戮死大臣廣漢即上書告丞相罪制曰下京兆尹治廣漢知事迫切遂自將吏卒突入丞相府召其夫人跪庭下受辭師古曰受其對辭也宋祁曰突字新夲添收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢廣漢數犯罪法不伏辜以詐巧迫脅臣相幸臣相寛不奏願下明使者治廣漢所驗臣相家事事下廷尉治罪實丞相自以過譴笞傅婢出至外第乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅斥除騎士乏軍興數罪師古曰斥除逐遣之天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧飬小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪彊小民得職師古曰得職各得其常所也宋祁曰使得牧飬越本無得字廣漢雖坐法誅景邵本去雖坐法誅字校本添百姓追思歌之至今尹翁歸字子兄師古曰兄讀曰況河東平陽人也徙杜陵翁歸少孤與季父居為獄小吏曉習文法喜擊劒人莫能當師古曰喜許吏反是時大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬭變吏不能禁師古曰變亂也及翁歸為市吏莫敢犯者公廉不受餽師古曰餽亦饋字也宋祁曰受餽下有遺字注末也字可刪百賈畏之後去居家宋祁云浙本作家居㑹田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閲數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜師古曰敖讀曰傲延年曰何傷遂召上辭問師古曰為文辭而問之甚竒其對除補卒史宋祁曰除補字上疑有是日字便從歸府案事發姦窮竟事情延年大重之自以能不及翁歸徙署督郵河東二十八縣分為兩部閎孺部汾北師古曰閎姓也音宏翁歸部汾南所舉應法得其罪辜屬縣長吏雖中傷莫有怨者舉廉為緱氏尉歴守郡中所居治理師古曰歴於郡中守丞尉之職也宋祁曰中字一作守遷補都内令舉廉為𢎞農都尉徴拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人師古曰邑子同邑人之子也屬音之欲反令坐後堂待見定國與翁歸語終日不敢見其邑子旣去定國乃謂邑子曰此賢將汝不任事也又不可干以私師古曰任堪也干求也翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政師古曰言決斷諸縣姦邪之事不委令長有急名則少緩之吏民小解輙披籍服䖍曰披有罪者籍也師古曰解讀曰懈縣縣收取黠吏豪民案致其罪髙至於死収取人必於秋冬課吏大㑹中及出行縣師古曰於大㑹之中及行縣時則収取罪人以警衆也行音下更反不以無事時其有所取也以一警百吏民皆服恐懼改行自新東海大豪郯許仲孫師古曰郯縣之豪姓許名仲孫為姦猾亂吏治郡中苦之二千石欲捕者輙以力埶變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東海大治以髙第入守右扶風滿歳為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盗賊發其比伍中師古曰比謂左右相次者也五家為伍若今伍保也比音頻寐反翁歸輙召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵師古曰抵歸也所經過及所歸投也類常如翁歸言無有遺脫師古曰類猶率也緩於小弱急於豪彊有論罪輸掌畜官師古曰論罪决罪也扶風畜牧所在有苑師之屬故曰掌畜官也畜音許救反使斫莝師古曰莝斬芻音千卧反責以員程不得取代師古曰員數也計其人及日数為功程不中程輙笞督極者至以鈇自剄而死師古曰鈇斫莝刄也音大夫之夫使其斫莝故因以莝刃自剄而説者或謂為斧或云劒鈇皆失之也京師畏其威嚴扶風大治盜賊課常為三輔最師古曰言發則獲之無有遺失故為最也翁歸為政雖任刑其在公卿之間清絜自守語不及私然温良嗛退不以行能驕人師古曰嗛古以為謙字甚得名譽於朝廷視事數嵗无康四年病卒家無餘財天子賢之制詔御史朕夙興夜寐以求賢為右師古曰右猶上也不異親疏近逺務在安民而已扶風翁歸廉平鄉正師古曰鄉讀曰嚮治民異等早夭不遂不得終其功業朕甚憐之其賜翁歸子黄金百斤以奉其祭祠翁歸三子皆為郡守少子岑歴位九卿至後將軍而閎孺亦至廣陵相有治名由是世稱田延年為知人韓延夀字長公燕人也徙杜陵少為郡文學父義為燕郎中刺王之謀逆也義諫而死燕人閔之是時昭帝富於春秋大將軍霍光持政徵郡國賢良文學問以得失時魏相以文學對䇿以為賞罰所以勸善禁惡政之本也日者燕王為無道師古曰日者猶言徃日也韓義出身彊諫為王所殺義無比干之親而蹈比干之節師古曰殷之比干紂之諸父諫紂而死故以為喻也宜顯賞其子以示天下明為人臣之義光納其言因擢延夀為諫大夫遷淮陽太守治甚有名徙潁川潁川多豪彊難治國家常為選良二千石先是趙廣漢為太守患其俗多朋黨故構㑹吏民令相告訐師古曰構結也一切以為聰明潁川由是以為俗民多怨讎延夀欲改更之教以禮讓恐百姓不從乃歴召郡中長老為郷里所信向者數十人設酒具食親與相對接以禮意人人問以謡俗民所疾苦師古曰謡俗謂閭里歌謡政教善惡也為陳和睦親愛銷除怨咎之路長老皆以為便可施行因與議定嫁娶喪祭儀品略依古禮不得過法延夀於是令文學校官諸生皮弁執俎豆師古曰校亦學也音效為吏民行䘮嫁娶禮百姓遵用其教賣偶車馬下里偽物者棄之市道張晏曰下里地下蒿里偽物也師古曰偶謂木土為之象真車馬之形也偶對也棄其物於市之道上也數年徙為東郡太守黄霸代延夀居潁川霸因其迹而大治延夀為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學宫師古曰學宮謂庠序之舍也春秋鄉社陳鐘鼓管弦盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期㑹為大事吏民敬畏趨鄉之師古曰趨讀曰趣郷讀曰嚮又置正五長師古曰正若今之郷正里正也伍長同伍之中置一人為長也相率以孝弟不得舍姦人師古曰舍止也閭里阡陌有非常吏輙聞知姦人莫敢入界其始若煩後吏無追捕之苦民無箠楚之憂師古曰箠杖也楚荆木也即今之荆子也箠音止蘂反皆便安之接待下吏恩施甚厚而約誓明或欺負之者延夀痛自刻責豈其負之何以至此師古曰言豈我負之耶其人何以為此事吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言師古曰殊絶也以人救之故身首不相絶也瘖音於今反延夀聞之對掾史涕泣遣吏毉治視師古曰遣毉治之而吏䕶視之厚復其家師古曰復音方目反延夀嘗出臨上車騎吏一人後至勅功曹議罰白師古曰令定其罪名而更白之還至府門門卒當車願有所言延夀止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也師古曰資取也取事父之道以事君其敬則同也母則極愛君則極敬不如父之兼敬愛也今旦明府早駕久駐未出騎吏父来至府門不敢入騎吏聞之趨走出謁適㑹明府登車以敬父而見罰得毋虧大化乎延夀舉手輿中曰微子太守不自知過師古曰微無也歸舍召見門卒卒本諸生聞延夀賢無因自逹故代卒師古曰代人為卒也延夀遂待用之其納善聽諫皆此類也在東郡三嵗令行禁止斷獄大減為天下最入守左馮翊滿嵗稱職為真嵗餘不肯出行縣師古曰行音下更反其後亦同丞掾數白宜循行郡中覽觀民俗考長吏治迹延夀曰縣皆有賢令長督郵分明善惡於外行縣恐無所益重為煩擾師古曰重音直用反丞掾皆以為方春月可壹出勸耕桑延夀不得已行縣至髙陵民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥師古曰重音直用反咎在馮翊當先退是日移病不聽事因入卧傳舍閉閤思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪宋祁曰自字疑作同字於是訟者宗族傳相責譲此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭師古曰移猶傳也一説兄以譲弟弟又譲之故云相移延夀大喜開閤延見内酒肉與相對飲食厲勉以意告鄉部有以表勸悔過從善之民師古曰以其悔過從善故令表顯以示勸勵延夀乃起聼事勞謝令丞以下引見尉薦郡中歙然莫不傳相勅厲不敢犯延夀恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿師古曰紿誑也延夀代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延夀在東郡時放散官錢千餘萬望之與丞相丙吉議吉以為更大赦不須考師古曰更音工衡反㑹御史當問事東郡宋祁曰越本景祐本無事字望之因令并問之師古曰望之以延夀代已為馮翊而有能名出已之上故忌害之欲䧟以罪法延夀聞知即部吏案校望之在馮翊時廪犧官錢放散百餘萬廪犧吏掠治急自引與望之為姦延夀劾奏移殿門禁止望之望之自奏職在總領天下聞事不敢不問而為延壽所拘持上由是不直延夀各令窮竟所考望之卒無事寔而望之遣御史案東郡具得其事延夀在東郡時試騎士師古曰每嵗大試也治飾兵車畫龍虎朱爵延夀衣黄紈方領晉灼曰以黄色素作直領也師古曰衣音於旣反駕四馬傅總建幢棨李竒曰㦸也晉灼曰傅著也總以緹繒飾鑣鎋也建立也幢旌幢也師古曰幢麾也棨有衣之㦸也其衣以赤黑繒為之幢音大江反棨音啟植羽葆師古曰植亦立也羽葆聚翟尾為之亦今纛之類也植音常職反宋祁曰注文今字下疑有叢字鼓車歌車孟康曰如今郊駕時車上鼔吹也師古曰郊駕郊祀時備法駕也功曹引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂師古曰旁音歩浪反歌者先居射室李竒曰都試射堂也望見延夀車噭咷楚歌服䖍曰噭音呌呼之呌咷音滌濯之滌師古曰咷音它釣反延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後師古曰鞬弓衣也音居言反令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣如淳曰籣盛弩箭箙也師古曰鞮鞪即兠鍪也籣盛弩矢者也其形如木桶鞮音丁奚反鞪音莫侯反又使騎士戲車弄馬盗驂孟康曰戲車弄馬之枝也馳盗解驂馬御者不見也延夀又取官銅物候月蝕鑄作刀劒鈎鐔放效尚方事師古曰鈎亦兵器也似劒而曲所以鈎殺人也鐔劒喉也又曰鐔似劒而小陿鐔音滛又音尋及取官錢帛私假繇使吏師古曰假謂顧賃也繇讀與徭同宋祁曰繇字下疑有役字及治飾車甲三百萬以上於是望之劾奏延夀上僭不道又自陳前為延夀所奏今復舉延夀罪衆庶皆以臣懐不正之心侵寃延夀願下丞相中二千石博士議其罪事下公卿皆以延夀前旣無状後復誣愬典法大臣欲以解罪狡猾不道天子惡之延夀竟坐棄市吏民數千人送至渭城老小扶持車轂爭奏酒炙師古曰奏進也延夀不忍距逆人人為飲計飲酒石餘使掾史分謝送者逺苦吏民延夀死無所恨百姓莫不流涕延夀三子皆為郎吏且死屬其子勿為吏以己為戒師古曰屬音之欲反子皆以父言去官不仕至孫威乃復為吏至將軍威亦多恩信能拊衆得士死力威又坐奢僭誅延夀之風類也張敞字子髙本河東平陽人也祖父孺為上谷太守徙茂陵敞父福事孝武帝官至光祿大夫敞後随宣帝徙杜陵敞本以鄉有秩補太守卒史師古曰鄉有秩者嗇夫之類也察廉為甘泉倉長稍遷太僕丞杜延年甚竒之師古曰延年時為太僕也㑹昌邑王徵即位動作不由法度敞上書諫曰孝昭皇帝蚤崩無嗣師古曰蚤古早字大臣憂懼選賢聖承宗廟東迎之日唯恐屬車之行遲師古曰不欲斥乗輿故但言屬車耳屬音之欲反今天子以盛年初即位天下莫不拭目傾耳觀化聼風師古曰言改易視聼欲急聞見善政化也拭音式國輔大臣未襃而昌邑小輦先遷李竒曰挽輦小臣也此過之大者也後十餘日王賀廢敞以切諫顯名擢為豫州刺史以數上事有忠言宣帝徵敞為太中大夫與于定國並平尚書事以正違忤大将軍霍光師古曰守正不阿也而使主兵車出軍省減用度師古曰令其主節減軍興之用度也復出為函谷關都尉宣帝初即位廢王賀在昌邑上心憚之徙敞為山陽太守久之大将軍霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬頃之山雲以過歸第霍氏諸壻親屬頗出補吏敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉師古曰衰音初為反大夫田完有功於齊皆疇其庸宋祁曰疇其庸浙本作疇其軍邑邵本作官爵按宣紀疇其爵邑張晏注云律非始封十減二疇者等也言不復減也延及子孫終後田氏篡齊趙氏分晉季氏顓魯師古曰顓與専同下皆類此故仲尼作春秋迹盛衰師古曰著盛衰之迹譏世卿最甚廼者大将軍决大計安宗廟定天下功亦不細矣夫周公七年耳而大将軍二十嵗海内之命斷於掌握方其隆時感動天地侵廹隂陽月朓日蝕晝㝠宵光師古曰㝠闇也宵夜也朓音他了反地大震裂火生地中天文失度祅祥變怪不可勝記皆隂類盛長臣下顓制之所生也朝臣宜有明言曰陛下襃寵故大将軍以報功德足矣閒者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就第及衞将軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聼羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲師古曰言朝臣不進直言以陳其事而令明詔自親其文非䇿之得者也師古曰言失計也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也宋祁曰危字疑作疑字臣敞願於廣朝白發其端直守逺郡其路無由師古曰直讀曰值夫心之精微口不能言也言之微眇書不能文也師古曰眇細也故伊尹五就桀五就湯師古曰孟子云五就湯五就桀者伊尹也言伊尹為湯臣見貢扵桀桀不用而湯復貢之如此者五也蕭相國薦淮隂累嵗乃得通况乎千里之外因書文諭事指哉唯陛下省察上甚善其計然不徵也久之勃海膠東盗賊並起敞上書自請治之曰臣聞忠孝之道退家則盡心於親進宦則竭力於君夫小國中君猶有奮不顧身之臣况於明天子乎今陛下逰意於太平勞精於政事亹亹不舍晝夜師古曰亹亹言勉強也舍息也亹音尾羣臣有司宜各竭力致身山陽郡户九萬三千口五十萬以上訖計盗賊未得者七十七人師古曰訖盡也它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡師古曰閒讀曰閑身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡嵗數不登師古曰年榖頻不熟也盗賊並起至攻官寺簒囚徒搜市朝劫列侯吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀師古曰有業言各得其所書奏天子徵敞拜膠東相宋祁曰膠東景帝子康王寄之後賜黄金三十斤敞辭之官自謂治劇郡非賞罰無以勸善懲惡師古曰懲止也吏追捕有功效者願得壹切比三輔尤異如淳曰壹切權時也趙廣漢奏請令長安游徼獄史秩百石又循吏傳左馮翊有二百石卒史此之謂尤異也劉敞曰下言上名尚書調補縣令然則三輔尤異如此天子許之敞到膠東明設購賞開羣盗令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人師古曰調選也音徒釣反由是盗賊解散傳相捕斬吏民歙然師古曰歙音翕國中遂平居頃之王太后數出游獵敞奏書諫曰臣聞秦王好滛聲葉陽后為不聼鄭衞之樂孟康曰葉陽秦昭王后也師古曰葉音式渉反楚嚴好田獵樊姬為之不食鳥獸之肉師古曰樊姬楚莊王姬也口非惡㫖甘耳非憎絲竹也所以抑心意絶耆欲者師古曰耆讀曰嗜将以率二君而全宗祀也禮君母出門則乗輜軿下堂則從傅母師古曰輜軿衣車也輜音甾又音楚疑反軿音歩千反又音歩丁反進退則鳴玉佩内飾則結綢繆文潁曰謂衣𠂻結束綢繆也師古曰組紐之屬所以自結固也綢音直留反繆音亡蚪反此言尊貴所以自斂制不從恣之義也師古曰從讀曰縱今太后資質淑羙慈愛寛仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也師古曰上聞聞於天子也唯觀覽於徃古全行乎来今令后姬得有所法則下臣有所稱誦宋祁曰臣字可刪臣敞幸甚書奏太后止不復出是時潁川太守黄霸以治行第一入守京兆尹霸視事数月不稱罷歸潁川於是制詔御史其以膠東相敞守京兆尹自趙廣漢誅後比更守尹師古曰比頻也更歴也音工衡反如霸等數人皆不稱職京師􅐛廢師古曰䆮漸也長安市偷盗尤多百賈苦之上以問敞敞以為可禁敞旣視事求問長安父老偷盗酋長數人應劭曰酋長帥師古曰酋音才由反居皆温厚出從童騎閭里以為長者師古曰温厚言富足也童騎以童奴為騎而自從也敞皆召見責問因貰其罪把其宿負師古曰貰緩也把執持也音布馬反令致諸偷以自贖師古曰致至也引至於官府偷長曰今一旦召詣府恐諸偷驚駭願壹切受署師古曰自言願權補吏職也敞皆以為吏遣歸休置酒小偷悉来賀且飲醉偷長以赭汙其衣𥚑師古曰赭赤土也吏坐里閭閲出者師古曰閭謂里之門也汙赭輙收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盗師古曰枹擊鼓椎也音桴其字從木也天子嘉之敞為人敏疾賞罰分明見惡輙取時時越法縱舍有足大者如淳曰有可貴異而大之者也晉灼曰越法縱舍即足大者也師古曰晉説是也其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇師古曰浩大也穰盛也言人衆之多也穣音人掌反郡國二千石以髙第入守及為真久者不過三二年近者數月一嵗輙毁傷失名以罪過罷唯廣漢及敞為久任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之然敞無威儀時罷朝㑹過走馬章臺街孟康曰在長安中臣瓚曰在章臺下街也使御吏驅自以便面拊馬師古曰便面所以障面蓋扇之類也不欲見人以此自障面則得其便故曰便面亦曰屏面今之沙門所持竹扇上袤平而下圜即古之便面也音頻面反又為婦畫眉長安中傳張京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂媚好為詡畜蘇林曰憮音嫵師古曰本以好媚為稱何説於大乎蘇音是宋祁曰憮音嫵媚之嫵嫵音舞有司以奏敞上問之對曰臣聞閨房之内夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位宋祁曰或無終字敞與蕭望之于定國相善始敞與定國俱以諫昌邑王超遷定國為大夫平尚書事敞出為刺史時望之為大行丞後望之先至御史大夫定國後至丞相敞終不過郡守為京兆九嵗坐與光禄勲楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免師古曰比例也音必寐反而敞奏獨寝不下師古曰天子惜敞故留所奏事不出敞使賊捕掾絮舜有所案驗李竒曰絮音挐師古曰賊捕掾主捕賊者也絮姓也音女居反又音人餘反舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事宋祁曰當添作安能為後案事敞聞舜語即部吏收舜繫獄是時冬月未盡數日案事吏晝夜驗治舜竟致其死事舜當出死宋祁曰當添為舜臨當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎師古曰言汝不欲望延命乎乃棄舜市㑹立春行寃獄使者出師古曰行音下更反舜家載尸并編敞教師古曰編聨也聨之於章前也自言使者使者奏敞賊殺不辜天子薄其罪師古曰以其事為輕小也欲令敞得自便利師古曰從輕法以免也便音頻面反即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命師古曰不還其本縣邑也数月京師吏民解弛師古曰弛放也音式爾反枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞師古曰就其所居處而召之敞身被重劾師古曰謂前有賊殺不辜之事及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者来此天子欲用我也即装隨使者詣公車上書曰宋祁曰當添為上書謝曰臣前幸得備位列卿待罪京兆宋祁曰當作京兆尹坐殺賊捕掾絮舜舜本臣敞素所厚吏數蒙恩貸師古曰貸音土帶反以臣有章劾當免受記考事師古曰記書也若今之州縣為符教也便歸卧家謂臣五日京兆背恩忘義傷化薄俗宋祁曰一本作傷薄俗化臣竊以舜無狀枉法以誅之臣敞賊殺無辜鞠獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史敞起亡命復奉使典州既到部而廣川王國羣軰不道賊連發不得敞以耳目發起賊主名區處師古曰區謂居止之所也誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐師古曰言容止賊盗若嚢橐之盛物也吏逐捕窮窘蹤迹皆入王宫敞自將郡國吏車數百兩師古曰一乗車為兩也圍守王宫捜索調等果得之殿屋重轑中蘇林曰轑椽也重轑重棼中師古曰重棼即今廊舍也一邉虚為兩夏者也轑音老棼音扶分反宋祁曰殿屋一無屋字敞傅吏皆捕格斷頭師古曰傅讀曰附言敞自監䕶吏而捕之縣其頭王宫門外因劾奏廣川王天子不忍致法削其戸敞居部嵗餘冀州盗賊禁止守太原太守宋祁曰當作徙守太原滿嵗為真太原郡清宋祁曰當作郡清靜頃之宣帝崩元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問前將軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徵敞欲以為左馮翊㑹病卒敞所誅殺太原吏吏家怨敞随至杜陵刺殺敞中子璜敞三子官皆至都尉初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武武應曰馭黠馬者利其銜䇿梁國大都吏民凋敝且當以柱後惠文彈治之耳應劭曰柱後以鐵為柱今法冠是也一名惠文冠晉灼曰漢注法冠也一號柱後惠文以纚褁鐵柱卷秦制執法服今御史服之謂之解廌一角今冠兩角以解廌為名耳師古曰晉説是也纚即今方目紗也纚音山爾反卷音去權反秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有迹亦能吏也敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也竦死敞無後王尊字子贛師古曰贛音貢涿郡髙陽人也少孤歸諸父使牧羊澤中宋祁曰當作少歸諸父諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數嵗給事太守府問詔書行事尊無不對師古曰以施行詔條問之皆曉其事太守竒之除補書佐署守屬監獄師古曰署為守屬令監獄主囚也監音工銜反久之尊稱病去事師郡文學官師古曰郡有文學官而尊事之以為師也治尚書論語略通大義復召署守屬治獄為郡決曹史數嵗以令舉幽州刺史從事如淳曰漢儀注刺史得擇所部二千石卒史與從事宋祁曰決曹史淳化夲無史字子按如注須得史字乃安止作決曹非是而太守察尊廉補遼西鹽官長如淳曰地理志遼西有鹽官數上書言便宜事事下丞相御史初元中舉直言遷虢令如淳曰本西虢也屬右扶風轉守槐里兼行羙陽令事春正月羙陽女子告假子不孝曰兒常以我為妻妬笞我宋祁曰妬當改作詬尊聞之遣吏收捕驗問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也晉灼曰歐陽尚書有此造獄事也師古曰非常刑名造殺戮之法尊於是出坐廷上取不孝子縣磔著樹使騎吏五人張弓射殺之吏民驚駭後上行幸雍過虢尊供張如法而辦師古曰尊雖行羙陽令而就虢供張也供音居用反張音竹亮反劉攽曰自長安上雍不過虢過羙陽虢字是史氏誤以髙第擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母師古曰城謂縣城也抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治師古曰更改也有如此者太守乃共為治者也明慎所職毋以身試法又出教勅掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢師古曰趣讀曰促夫羽翮不修則不可以致千里宋祁曰浙本無則字闑内不理無以整外師古曰闑門橛也音魚烈反府丞悉署吏行能分别白之賢為上宋祁曰當作以賢為上毋以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事已一月矣五官掾張輔懐虎狼之心貪汙不軌師古曰汚濁也不軌不修法制也一郡之錢盡入輔家然適足以葬矣今将輔送獄直符史詣閤下從太守受其事師古曰直符史若今之當直佐史也丞戒之戒之宋祁曰下戒之亦當作丞戒之相随入獄矣師古曰意丞教戒張輔令其避罪故以此言豫勅之輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盗賊分散入傍郡界豪彊多誅傷伏辜者坐殘賊免起家復為䕶羌将軍轉校尉師古曰為校尉主轉運事而屬䕶羌将軍䕶送軍糧委輸而羌人反絶轉道師古曰絶轉運之道兵數萬圍尊尊以千餘騎奔突羌賊功未列上師古曰未列上扵天子也坐擅離部署㑹赦免歸家涿郡太守徐明薦尊不宜久在閭巷上以尊為郿令師古曰右扶風之縣音媚宋祁曰刋誤改媚作郿遷益州刺史先是琅邪王陽為益州刺史行部至卭郲九折阪應劭曰在蜀郡嚴道縣臣瓚曰郲山名也師古曰郲音来歎曰奉先人遺體奈何數乗此險師古曰乗登也後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之師古曰驅馬令疾行也王陽為孝子王尊為忠臣尊居部二嵗懐来徼外蠻夷歸附其威信博士鄭寛中使行風俗師古曰行音下更反舉奏尊治狀遷為東平相是時東平王以至親驕奢不奉法度傅相連坐師古曰前任傅相者頻坐以王得罪及尊視事奉璽書至庭中宋祁曰庭當作廷王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相䑕之詩師古曰相鼠鄘風篇名刺無禮之詩也其辭曰相䑕有皮人而無儀人而無儀不死何為相視也言視䑕有皮雖處髙顯之地偷食苟得不知廉耻人無禮儀亦與䑕同不如速死也尊曰毋持布鼓過雷門師古曰雷門㑹稽城門也有大鼓越擊此鼓聲聞洛陽故尊引之也布鼓謂以布為鼓故無聲王怒起入後宫尊亦直趨出就舍先是王數私出入驅馳國中與后姬家交通尊到官召勅廐長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之言相教不得後尊朝王王復延請登堂尊謂王曰尊来為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇師古曰顧念也負恃也安焉也宋祁曰浙本顧字上更有王字如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀師古曰陽為好語也尊舉掖顧謂傍侍郎前引佩刀視王師古曰視讀曰示王欲誣相㧞刀向王邪王情得師古曰謂尊所測正得其情也又雅聞尊髙名大為尊屈酌酒具食相對極驩太后徵史張晏曰太后名也韋昭曰徵召也召東平史令為奏也師古曰張説是也徵史太后之名亦猶東平王后之稱謁也奏尊為相倨慢不臣王血氣未定不能忍愚誠恐母子俱死今妾不得使王復見尊陛下不留意妾願先自殺不忍見王之失義也尊竟坐免為庻人大将軍王鳯奏請尊補軍中司馬擢為司𨽻校尉初中書謁者令石顯貴幸専權為姦邪丞相匡衡御史大夫張譚皆阿附畏事顯不敢言久之元帝崩成帝初即位顯徙為中太僕師古曰皇后之屬官不復典權衡譚乃奏顯舊惡請免顯等尊於是劾奏丞相衡御史大夫譚位三公典五常九德師古曰五常仁義禮智信也九德寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義也事見虞書臯陶謨也以總方略壹統類廣教化羙風俗為職知中書謁者令顯等專權擅埶大作威福縱恣不制無所畏忌為海内患害不以時白奏行罰而阿諛曲從附下㒺上懐邪迷國無大臣輔政之義宋祁曰越本義下有也字皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體又正月行幸曲臺臨饗罷衞士如淳曰諸衞士更盡得代去故天子自臨而饗之衡與中二千石大鴻臚賞等㑹坐殿門下衡南鄉賞等西鄉衡更為賞布東鄉席師古曰鄉讀曰嚮起立延賞坐私語如食頃衡知行臨如淳曰天子當臨饗士時百官共職萬衆㑹聚師古曰共讀曰供而設不正之席使下坐上相比為小惠於公門之下師古曰比周也音頻寐反宋祁曰浙本作相比詐又注文添比比周也動不中禮師古曰中當也音竹仲反亂朝廷爵秩之位衡又使官大奴入殿中問行起居還言漏上十四刻行臨到宋祁曰行臨到當作行臨時衡安坐不變色改容無怵惕肅敬之心驕慢不謹皆不敬有詔勿治於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣師古曰重難也乃下御史丞問状宋祁曰一作御史中丞問状劾奏尊妄詆欺非謗赦前事師古曰詆毁也音丁禮反非讀曰誹也猥歴奏大臣師古曰猥多也曲也歴謂所奏非一人無正法飾成小過以塗汙宰相摧辱公卿輕薄國家奉使不敬有詔左遷尊為髙陵令數月以病免㑹南山羣盗傰宗等數百人蘇林曰傰音朋晉灼曰音倍師古曰晉音是也為吏民害拜故𢎞農太守傅剛為校尉將迹射士千人逐捕師古曰迹射言能尋迹而射取之也射音食亦反嵗餘不能禽或説大將軍鳳賊數百人在轂下師古曰在天子輦轂之下明其逼近也發軍擊之不能得難以視四夷師古曰視讀曰示獨選賢京兆尹宋祁曰賢字下有行字乃可於是鳳薦尊徵為諫大夫守京輔都尉行京兆尹事旬月閒盗賊清宋祁曰一本作盗賊清靜遷光祿大夫守京兆尹後為真凡三嵗坐遇使者無禮司𨽻遣假佐放奉詔書白尊發吏捕人蘇林曰胡公漢官假佐取内郡善史書佐給諸府宋祁曰浙本注文給諸府字下有府有史故言佐也七字放謂尊詔書所捕宜密尊曰治所公正京兆善漏泄人事師古曰謂司𨽻官屬為治所者尊之也若今謂使人為尚書矣治音直吏反放曰所捕宜今發吏師古曰當即發也尊又曰詔書無京兆文不當發吏及長安繫者三月閒千人以上尊出行縣男子郭賜自言尊師古曰有寃事自言而與許仲相訟也許仲家十餘人共殺賜兄賞公歸舍師古曰公然而歸無所避畏者吏不敢捕尊行縣還上奏曰彊不陵弱各得其所寛大之政行和平之氣通御史大夫中奏尊暴虐不改宋祁曰中諸本皆改作忠謂張忠也外為大言倨嫚姍上師古曰姍古訕字也音所諫反又音刪威信日廢不宜備位九卿尊坐免吏民多稱惜之湖三老公乗興等師古曰湖縣名也今虢州湖城縣取其名上書訟尊治京兆功效日著劉攽曰日當作曰著字衍劉敞説同往者南山盗賊阻山横行剽刼良民殺奉法吏道路不通城門至以警戒歩兵校尉使逐捕暴師露衆曠日煩費不能禽制二卿坐黜如淳曰三輔皆秩中二千石號為卿也即前京兆尹王昌貶為鴈門太守甄遵河内太守也羣盗寖彊吏氣傷沮師古曰寖益也沮壞也音才汝反流聞四方為國家憂當此之時有能捕斬不愛金爵重賞關内侯寛中使問所徵故司𨽻校尉王尊捕羣盗方略拜為諫大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士師古曰下音胡嫁反厲奔北之吏起沮傷之氣二旬之閒大黨震壞渠率效首師古曰效致也斬其首而致之也賊亂蠲除民反農業拊循貧弱鉏耘豪強長安宿豪大猾東市賈萬城西萬章翦張禁酒趙放蘇林曰萬音矩晉灼曰翦張禁酒趙放此二人作翦作酒之家宋祁曰翦張禁江南本浙本並作箭張禁予按注意正文當依校本作箭張禁注中悉作箭乃安杜陵楊章等皆通邪結黨挟養姦軌上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二年莫能禽討師古曰更歴也音工衡反宋祁曰今越本無討字尊以正法案誅皆伏其辜姦邪銷釋吏民說服師古曰釋解也音懌説讀曰悦宋祁曰正文與注釋當作繹尊撥劇整亂誅暴禁邪皆前所稀有宋祁曰當作皆前世所稀有名將所不及雖拜為真未有殊絶褒賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書之意宋祁曰一本改承作以靖言庸違宋祁曰浙本作庸韋注云韋違也象龔滔天師古曰引虞書堯典之辭也靖治也庸用也違僻也滔漫也謂其言假託於治實用違僻貌象恭敬過惡漫天也漫音莫干反一曰滔漫也原其所以出御史丞楊輔宋祁曰浙本作出於御史故為尊書佐素行隂賊惡口不信師古曰謂其口惡而心不信也好以刀筆䧟人於法輔常醉過尊大奴利家利家捽搏其頬師古曰捽持頭也音才兀反搏擊也兄子閎㧞刀欲剄之宋祁曰剄一本作刺輔以故深怨疾毒欲傷害尊疑輔内懐怨恨外依公事建畫為此議宋祁曰浙本無為字傅致奏文師古曰建立謀畫此議也傅讀曰附謂益其事而引致於罪狀浸潤加誣以復私怨師古曰浸潤猶漸染也復報也昔白起為秦將東破韓魏南㧞郢都應侯譖之賜死杜郵師古曰應侯范雎也杜郵地名在咸陽也吴起為魏守西河而秦韓不敢犯䜛人閒焉斥逐奔楚師古曰閒音公莧反秦聼浸潤以誅良將魏信䜛言以逐賢守此皆偏聼不聰失人之患也臣等竊痛傷尊修身絜已砥節首公師古曰砥厲也首向也砥音指首音式救反刺譏不憚將相誅惡不避豪彊誅不制之賊宋祁曰浙本作討不制之賊解國家之憂功著職修威信不廢誠國家爪牙之吏宋祁曰江浙本只作誠國爪牙之吏折衝之臣今一旦無辜制於僥人之手宋祁曰一作仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聼張晏曰周禮三槐九棘公卿於下聼訟獨掩怨讎之偏奏被共工之大惡臣瓚曰共工官名堯時諸侯舜流之於幽州也宋祁曰當作猥被共工之大惡劉奉世曰瓚説非也共工之大惡謂上劾奏云靜言庸違象龔㴞天也無所陳怨愬罪尊以京師廢亂羣盗並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉師古曰期年也音基宋祁曰注文當添作期期年也孔子曰愛之欲其生惡之欲其死是惑也浸潤之譖不行焉可謂明矣師古曰論語稱孔子之言願下公卿大夫博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靖言庸違宋祁曰違當依前注改作韋放殛之刑也師古曰殛誅也音居力反審如御史章尊乃當伏觀闕之誅張晏曰孔子誅少正卯於兩觀之間放於無人之域不得苟免師古曰非止合免官而已也及任舉尊者當獲選舉之辜宋祁曰一作皆當獲選舉之辜不可但已師古曰但徒也空也已止也不可空然而止也即不如章飾文深詆以愬無罪師古曰詆毁也亦宜有誅以懲讒賊之口絶詐欺之路師古曰懲創也唯明主參詳使白黑分别書奏天子復以尊為徐州刺史遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大決為害尊躬率吏民投沈白馬師古曰以祭水也祀水神河伯尊親執圭璧使巫䇿祝請以身填金隄師古曰填塞也音大賢反因止宿廬居隄上吏民數千萬人爭叩頭救止尊宋祁曰邵夲無尊字尊終不肯去及水盛隄壞吏民皆奔走唯一主簿泣在尊旁立不動宋祁曰立字上疑有尊字而水波稍却廻還吏民嘉壯尊之勇節白馬三老朱英等奏其狀宋祁曰浙本英作莫下有司考皆如言於是制詔御史東郡河水盛長毁壞金隄未決三尺百姓惶恐奔走太守身當水衝履咫尺之難不避危殆以安衆心吏民復還就作水不為災朕甚嘉之秩尊中二千石加賜黄金二十斤數嵗卒官吏民紀之尊子伯亦為京兆尹坐耎弱不勝任免王章字仲卿泰山鉅平人也少以文學為官稍遷至諫大夫在朝廷名敢直言元帝初擢為左曹中郎將與御史中丞陳咸相善共毁中書令石顯為顯所䧟咸減死髠章免官成帝立徵章為諫大夫遷司隸校尉大臣貴戚敬憚之王尊免後代者不稱職章以選為京兆尹時帝舅大將軍王鳳輔政章雖為鳳所舉非鳳專權不親附鳳㑹日有蝕之章奏封事召見言鳳不可任用宜更選忠賢上初納受章言後不忍退鳳章由是見疑遂為鳳所陷罪至大逆語在元后傳初章為諸生學長安獨與妻居章疾病無被卧牛衣中師古曰牛衣編亂麻為之即今俗呼為龍具者與妻決涕泣師古曰自謂将死故辭決其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬如淳曰激厲抗揚之意也師古曰卬讀曰仰仰頭為健宋祁曰卬音昻為是乃反涕泣何鄙也後章仕宦宋祁曰一本仕宦作任官歴位及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章曰非女子所知也書遂上果下廷尉獄妻子皆收繫章小女年可十二劉奉世曰云年可十二辭太俚盖衍可字或者章女名可誤倒書之宋祁曰可十二猶言約十二不煩曲解當存之夜起號哭曰平生獄上呼囚數常至九今八而止張晏曰平生先時也獄卒夜閲囚時有九人常呼問九人今八人便止知一人死也我君素剛先死者必君宋祁曰我字下疑有家字明日問之章果死妻子皆徙合浦大將軍鳳薨後弟成都侯商復為大將軍輔政白上還章妻子故郡其家屬皆完具采珠致産數百萬時蕭育為泰山太守皆令贖還故田宅章為京兆二嵗死不以其罪衆庶寃紀之號為三王王駿自有傳駿即王陽子也贊曰自孝武置左馮翊右扶風京兆尹宋祁曰置字上當有初字而吏民為之語曰前有趙張後有三王然劉向獨序趙廣漢尹翁歸韓延夀馮商傳王尊揚雄亦如之張晏曰劉向作新序不道王尊馮商續史記為作傳雄作法言亦論其羙也廣漢聰明下不能欺延夀厲善所居移風然皆訐上不信以失身墮功師古曰墮毁也音火規反翁歸抱公絜已為近世表張敞衎衎履忠進言師古曰衎衎彊敏之貌也音口翰反緣飾儒雅刑罰必行縱赦有度條教可觀然被輕媠之名師古曰媠古惰字也謂走馬拊馬及畫眉王尊文武自将師古曰將助也所在必發譎詭不經好為大言王章剛直守節不量輕重以陷刑戮妻子流遷哀哉前漢書卷七十六前漢書卷七十六考證趙廣漢傳䕶作平陵方上注師古曰方上在張湯傳臣召南按惠紀作斥上亦作斥土而張湯傳作方中地節三年七月中丞相傅婢云云通鑑考異曰盖傅婢死事已數年而廣漢追發其事也廣漢竟坐要斬通鑑考異曰廣漢死在元康元年本紀作二年誤也尹翁歸傳河東二十八縣臣召南按地理志河東郡統縣二十四自安邑至騏可數也此八字當是四字之誤案致其罪高至於死顧炎武曰髙謂罪名之上者猶言上刑矣少子岑歴位九卿至後将軍臣召南按公卿表岑字子河成帝永始四年以䕶羌校尉為執金吾元延元年為右将軍此文作後将軍必有一誤韓延夀傳修治學宫按學宫應作學官漢書各傳皆然諸本並誤耳行縣至髙陵臣召南按地理志髙陵雖為左馮翊首縣而非其治所趙廣漢傳曰左馮翊右扶風皆治長安中故曰行縣至髙陵也使賢長吏嗇夫三老孝弟受其恥胡三省曰賢長吏謂縣令丞也後漢志注三老孝弟力田三者皆鄉官之名也三老髙帝置孝弟力田髙后置所以勸導鄉里助成教化也張敞傳山陽郡戸九萬三千口五十萬以上臣召南按地理志山陽郡戸十七萬二千八百四十七口八十萬一千二百八十八與此文大相懸殊盖元始中戸口十倍於宣帝時矣臣前幸得備位列卿待罪京兆胡三省曰西都之制為三輔者列於九卿王尊傳上行幸雍過虢劉攽曰虢字是史氏誤臣召南按顧炎武亦駁此文云今鳳翔縣古之雍城而虢在陕幸雍何以得過虢當是過羙陽之誤按攽及炎武並疑虢地在陕幸雍不當東行而不知右扶風自有虢縣也据地理志雍虢羙陽三縣並屬右扶風虢縣故城在今鳳翔府城南三十五里雍縣即今鳳翔府治漢帝西幸雍必過虢道里甚明何乃疑周之虢國東在𢎞農者乎夫漢時於周虢國地置陕縣屬𢎞農郡固不云虢縣也本文不誤白馬三老朱英等地理志東郡有白馬縣今滑縣也前漢書卷七十六考證
