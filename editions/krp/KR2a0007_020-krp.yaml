body:
  text: 前漢書卷二十漢蘭臺令史班固撰唐正議大夫行祕書少監琅琊縣開國子顏師古注古今人表第八師古曰但次古人而不表今人者其書未畢故也自書契之作先民可得而聞者經傳所稱唐虞以上帝王有號諡輔佐不可得而稱矣文穎曰言逺經傳不復稱序也師古曰契謂刻木以記事自唐虞以上帝王有號見於經典其臣佐不可得而稱記也而諸子頗言之雖不考虖孔氏然猶著在篇籍歸乎顯善昭惡勸戒後人故博采焉孔子曰若聖與仁則吾豈敢師古曰此孔子自謙不敢當聖與仁也又曰何事於仁必也聖乎師古曰言能博施於人而濟衆者非止稱仁乃為聖人也未知焉得仁師古曰言智者雖能利物猶不及仁者所濟逺也生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣師古曰困謂有所不通也又曰中人以上可以語上也師古曰言中庸之人漸於訓誨可以知上智之所知也唯上智與下愚不移師古曰言上智不染於惡下愚雖敎無成自此以上皆見論語凡引此者蓋班氏自述所表先聖後仁及智愚之次皆依於孔子者也傳曰譬如堯舜禹稷禼與之為善則行鮌讙兜欲與為惡則誅師古曰鮌檮杌也讙兜渾沌也可與為善不可與為惡是謂上智桀紂龍逢比干欲與之為善則誅師古曰闗龍逄桀之臣也王子比干紂之臣也皆直諌而死也于莘崇侯與之為惡則行師古曰于莘桀之勇人也崇侯紂之佞臣也可與為惡不可與為善是謂下愚齊桓公管仲相之則霸豎貂輔之則亂師古曰豎貂即寺人貂也可與為善可與為惡是謂中人因兹以列九等之序究極經傳繼世相次總備古今之略要云張晏曰老子𤣥黙仲尼所師雖不在聖要為大賢文伯之母違於禮典動為聖人所歎言為後世所則而在第四田單以即墨孤城復强齊之大魯連之博通忽於榮利藺子申威秦王退讓廉頗乃在第五大姬巫怪好祭鬼神陳人化之國多滛祀寺人孟子違於大雅以保其身既被宫刑怨刺而作乃在第三嫪毒上烝昏亂禮度惡不忍聞乃在第七其餘差違紛錯不少略舉揚較以起央謬獨馳騖於數千嵗之中旁觀諸子事業未究而尋遇竇氏之難使之然乎師古曰六家之論輕重不同百行所存趣捨難壹張氏輒申所見掎摭班史然其所論又自差錯且年代久逺墳典隟亡學者舛駁師論分異是以表載古今名氏或與諸書不同今則特有𤼵明用暢厥㫖自女媧以下帝鴻以前諸子傳記互有舛駁敘説不同無所取正大要知其古帝之號而已諸人士見於史傳彰灼可知者無待解釋其間幽昧者時復及焉前漢書卷二十前漢書卷二十考證古今人表因兹以列九等之序劉知㡬曰班書古今人表仰包億載旁貫百家分之以三科定之以九等其言甚髙其義甚愜及至篇中所列多有不類于其叙者楊愼曰固作漢書紀漢事也鴻荒以来非漢家之宇上古羣佐非劉氏之臣乃總古今以著人表既以乖其名復自亂其體名義謬矣總備古今之畧要云注張晏曰寺人孟子云云臣召南按古今人表差違誠如張晏所論但晏謂寺人孟子云云不諒其忠直遭讒而責以保身不諒其正性疾惡而責其譏刺此則師古所云又自差錯者也女漬漬監本作潰從宋本改廖叔安注師古曰左氏傳作戮同音力周反又音力授反各本並同臣召南按左傳作飂杜預注曰飂古國也叔安其君名又地理志南陽郡湖陽古廖國師古注曰廖音力救反左氏傳作飂字可證此注戮字係刊本之誤鼓叜象商均監本列第八格今從宋本移列于第九格石户之農監本誤分石為一人户之農為一人今連寫秦不虛注雒陶已下皆舜之友也臣召南按雒陶以下戰國䇿顏觸所云舜有七友是也此表但記五人又方回列之二等與王兒並列而不及靈甫又續身戰國䇿注作續牙后䕫𤣥妻楊愼曰䕫后䕫也居䕫于上中出后䕫于下上是以一人而二之謬甚矣臣召南按表中品目乖違誠可訾議若此文恐是連𤣥妻讀不謂后䕫是第七等人也又按楊愼曰韋豕韋也窴韋于下上列豕韋于上下以一人而二之此説尤非表與鼓昆吾並列者是夏末强國助桀為虐成湯所伐者也後與大彭並列者是商時伯國猶周有齊桓晉文也國雖是一其君先後賢愚不同安得謂是一人乎又表中有劉姓豕韋此本左傳劉累之後又别一豕韋也愼可謂失考矣至士㑹即范武子一人兩見則師古已言之季勝注惡来弟按注三字誤在杞東樓公下今移正杞東樓公監本誤列第六格今從宋本移在第五格衞疌疌監本作建從宋本改宋考正父監本别本俱脱宋本在第三格是也今從之臣召南按考正父當作正考父宋本亦誤魯隠公楊愼曰隱公列於下下而葛伯反在下中若以讓桓為行善而未盡彼廢祀仇餉者惡未極乎諸稽到按到字應作郢各本俱訛前漢書卷二十考證
