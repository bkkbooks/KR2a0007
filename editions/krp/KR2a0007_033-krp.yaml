body:
  text: 前漢書卷三十三漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注魏豹田儋韓王信傳第三魏豹故魏諸公子也師古曰六國時魏也其兄魏咎故魏時封為寗陵君秦滅魏文穎曰魏大梁也為庶人陳勝之王也咎往從之勝使魏人周市徇魏地師古曰徇略也音辭峻反魏地已下欲立周市為魏王市曰天下昏亂忠臣乃見師古曰言當昏亂之時忠臣乃得顯其節義也老子道經曰國家昏亂有忠臣今天下共畔秦其誼必立魏王後廼可齊趙使車各五十乗立市為王市不受迎魏咎於陳五反師古曰反謂回還也陳王廼遣立咎為魏王章邯已破陳王進兵擊魏王於臨濟魏王使周市請救齊楚齊楚遣項它田巴將兵隨市救魏師古曰楚遣項它齊遣田巴劉奉世曰田儋傳儋自將兵救魏章邯殺儋臨濟下非遣田巴也章邯遂擊破殺周市等軍圍臨濟咎為其民約降師古曰與章邯為誓而約降約降定咎自殺師古曰但欲全其人而身自不降魏豹亡走楚楚懐王予豹數千人復徇魏地項羽已破秦兵降章邯豹下魏二十餘城立為魏王師古曰項羽立之豹引精兵從項羽入闗羽封諸侯欲有梁地師古曰羽欲自取梁地廼徙豹於河東都平陽為西魏王漢王還定三秦渡臨晉豹以國屬焉遂從擊楚於彭城漢王敗還至滎陽豹請視親病師古曰親謂母也至國則絶河津畔漢漢王謂酈生曰緩頰往説之酈生往豹謝曰人生一世閒如白駒過隙師古曰言其速疾也白駒謂日景也隙壁際也今漢王嫚侮人罵詈諸侯羣臣如奴耳非有上下禮節吾不忍復見也漢王遣韓信擊豹遂虜之傳豹詣滎陽以其地為河東太原上黨郡漢王令豹守滎陽楚圍之急周苛曰反國之王難與共守遂殺豹師古曰反國言其嘗叛也田儋狄人也師古曰狄縣名也地理志屬千乘故齊王田氏之族也師古曰亦六國時齊也儋從弟榮榮弟横皆豪桀宗彊能得人陳渉使周市略地北至狄狄城守儋陽為縛其奴從少年之廷欲謁殺奴服䖍曰古殺奴婢皆當告官儋欲殺令故詐縛奴以謁也師古曰陽縛其奴為殺奴之狀廷縣廷之中也音定今流俗書本為字作偽非也陽即偽耳不當重言之見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王發兵擊周市市軍還去儋因率兵東略定齊地秦將章邯圍魏王咎於臨濟急魏王請救於齊儋將兵救魏章邯夜衘枚擊大破齊楚軍殺儋於臨濟下儋從弟榮收儋餘兵東走東阿齊人聞儋死乃立故齊王建之弟田假為王田角為相田閒為將以距諸侯榮之走東阿章邯追圍之項梁聞榮急廼引兵擊破章邯東阿下章邯走而西項梁因追之而榮怒齊之立假廼引兵歸擊逐假假亡走楚相角亡走趙角弟閒前救趙因不敢歸榮廼立儋子市為王榮相之横為將平齊地項梁既追章邯章邯兵益盛項梁使使趣齊兵共擊章邯師古曰趣讀曰促榮曰楚殺田假趙殺角閒廼出兵楚懐王曰田假與國之王窮而歸我殺之不誼劉奉世曰謂田假與國之王者項梁之語也見羽傳中趙亦不殺田角田閒以市於齊齊王曰蝮蠚手則斬手蠚足則斬足應劭曰蝮一名虺蠚螫也螫人手足則割去其肉不然則死師古曰爾雅及説文皆以為蝮即虺也博三寸首大如擘而郭璞云各自一種蛇其蝮蛇細頸大頭焦尾色如綬文文間有毛似豬鬛鼻上有針大者長七八尺一名反鼻非虺之類也以今俗名證之郭説得矣虺若土色所在有之俗呼土虺其蝮唯出南方蝮音芳六反蠚音火各反螫音式亦反虺音許偉反擘者人手大指也音歩歴反何者為害於身也田假田角田閒於楚趙非手足戚文穎曰言將亡身非手足憂也臣瓉曰田假於楚非手足之親也師古曰瓉説是也何故不殺且秦復得志於天下則齮齕首用事者墳墓矣如淳曰齮側齧也齕齩也師古曰首用事謂起兵而立號者也齮音螘齕音紇齩音五絞反楚趙不聽齊齊亦怒終不肯出兵章邯果敗殺項梁師古曰擊敗而殺之破楚兵楚兵東走而章邯渡河圍趙於鉅鹿項羽由此怨榮羽既存趙降章邯西滅秦立諸侯王廼徙齊王市更王膠東治即墨師古曰治謂都之也音丈吏反下皆類此齊將田都從共救趙因入闗故立都為齊王治臨菑故齊王建孫田安項羽方渡河救趙安下濟北數城引兵降項羽羽立安為濟北王治博陽榮以負項梁不肯助楚攻秦故不得王趙將陳餘亦失職不得王二人俱怨項羽榮使人將兵助陳餘令反趙地而榮亦發兵以距擊田都都亡走楚榮留齊王市毋之膠東市左右曰項王强暴王不就國必危市懼廼亡就國榮怒追擊殺市於即墨還攻殺濟北王安自立為王盡并三齊之地師古曰三齊齊及濟北膠東項王聞之大怒乃北伐齊榮𤼵兵距之城陽榮兵敗走平原平原民殺榮項羽遂燒夷齊城郭師古曰夷平也所過盡屠破齊人相聚畔之榮弟横収齊散兵得數萬人反擊項羽於城陽而漢王帥諸侯敗楚入彭城項羽聞之廼釋齊師古曰釋觧也而歸撃漢於彭城因連與漢戰相距榮陽以故横復收齊城邑立榮子廣為王而横相之政事無巨細皆斷於横定齊三年聞漢將韓信引兵且東擊齊齊使華毋傷田觧師古曰二人也華音戸化反軍歴下以距漢張晏曰濟南歴山之下㑹漢使酈食其往説王廣及相横與連和横然之廼罷歴下守備縱酒師古曰縱放也放意而飲酒且遣使與漢平師古曰方欲遣使韓信廼渡平原襲破齊歴下軍因入臨菑王廣相橫以酈生為賣已而亨之師古曰謂其與韓信合謀廣東走髙密横走博蘇林曰泰山博縣守相田光走城陽師古曰守相者言為相而專主居守之事將軍田既軍於膠東楚使龍且救齊師古曰且音子閭反齊王與合軍髙密漢將韓信曹參破殺龍且虜齊王廣漢將灌嬰追得守相光至博而横聞王死自立為王還擊嬰嬰敗横軍於贏下晉灼曰泰山贏縣也師古曰音弋成反橫亡走梁歸彭越越時居梁地中立且為漢且為楚師古曰言在楚漢之間居中自立而兩助之也中音竹仲反韓信已殺龍且因進兵破殺田既於膠東灌嬰破殺齊將田吸於千乗師古曰吸音許及反遂平齊地漢滅項籍漢王立為皇帝彭越為梁王橫懼誅而與其徒屬五百餘人入海居隝中韋昭曰海中山曰隝師古曰音于老反髙帝聞之以橫兄弟本定齊齊人賢者多附焉今在海中不収後恐有亂廼使使赦橫罪而召之橫謝曰臣亨陛下之使酈食其今聞其弟商為漢將而賢臣恐懼不敢詔請為庶人守海隝中使還報髙帝廼詔衛尉酈商曰齊王橫即至人馬從者敢動揺者致族夷師古曰族夷言平除其族廼復使使持節具告以詔意曰橫來大者王小者乃侯耳師古曰大者謂横身小者其徒屬劉奉世曰髙帝唯召横耳故許之大者封王小亦不失為侯詳語意可知豈為其徒衆哉不來且𤼵兵加誅橫廼與其客二人乗傳詣雒陽師古曰傳音張戀反至尸鄉廄置應劭曰尸鄉在偃師城西臣瓉曰案廄置謂置馬以傳驛者橫謝使者曰人臣見天子當洗沐止留謂其客曰橫始與漢王俱南面稱孤師古曰王者自稱曰孤盖為謙也老子徳經曰貴以賤為本髙以下為基是以侯王自謂孤寡不榖今漢王為天子而橫廼為亡虜北面事之其媿固已甚矣又吾亨人之兄與其弟併肩而事主師古曰併音歩鼎反縱彼畏天子之詔不敢動揺我獨不媿於心乎且陛下所以欲見我不過欲壹見我面貌耳陛下在雒陽今斬吾頭馳三十里間形容尚未能敗猶可知也遂自剄令客奉其頭從使者馳奏之髙帝髙帝曰嗟乎有以起布衣兄弟三人更王師古曰更音工衡反豈非賢哉為之流涕而拜其二客為都尉發卒二千以王者禮𦵏横既𦵏二客穿其冡旁皆自剄從之髙帝聞而大驚以橫之客皆賢者吾聞其餘尚五百人在海中使使召至聞橫死亦皆自殺於是乃知田橫兄弟能得士也韓王信故韓襄王孽孫也張晏曰孺子為孽師古曰孽謂庶耳張説非也長八尺五寸項梁立楚懐王燕齊趙魏皆已前王唯韓無有後故立韓公子橫陽君成為韓王欲以撫定韓地項梁死定陶成犇懐王師古曰犇古奔字沛公引兵擊陽城使張良以韓司徒徇韓地得信以為韓將將其兵從入武闗沛公為漢王信從入漢中乃説漢王曰項王王諸將王獨居此遷也士卒皆山東人竦而望歸及其蠭東鄉可以争天下鄭氏曰及軍中將士氣鋒也師古曰髙紀及韓彭英盧傳皆稱斯説是楚王韓信之辭而此傳復云韓王信之語豈史家謬錯乎將二人所勸大指實同也竦謂引領舉足也蠭與鋒同鄉讀曰嚮漢王還定三秦乃許王信先拜為韓太尉將兵略韓地項籍之封諸王皆就國韓王成以不從無功不遣之國更封為穰侯文穎曰穰南陽縣也臣瓉曰穰縣屬江夏師古曰文説是也後又殺之聞漢遣信略韓地乃令故籍游吳時令鄭昌為韓王距漢孟康曰項籍在吳時昌為吳縣令漢二年信略定韓地十餘城漢王至河南信急擊韓王昌昌降漢漢乃立信為韓王常將韓兵從漢王使信與周苛等守滎陽楚拔之信降楚已得亡歸漢師古曰降楚後復得歸漢漢復以為韓王竟從擊破項籍五年春與信剖符王潁川師古曰剖分也為合符而分之六年春上以為信壯武北近鞏雒師古曰鞏即今鞏縣南廹宛葉師古曰南陽之二縣也宛音於元反葉音式渉反東有淮陽皆天下勁兵處也乃更以太原郡為韓國徙信以備胡都晉陽信上書曰國被邊李竒曰被音被馬之被師古曰被猶帶也匈奴數入晉陽去塞逺請治馬邑上許之秋匈奴冐頓大入圍信信數使使胡求和觧漢發兵救之疑信數閒使有二心師古曰閒私也上賜信書責讓之曰專死不勇專生不任李奇曰言為將軍齎必死之意不得為勇齎必生之心不任軍事傳曰期死非勇也必生非任也寇攻馬邑君王力不足以堅守乎安危存亡之地此二者朕所以責於君王師古曰言雖處危亡之地執忠履信可以安存責其有二心信得書恐誅因與匈奴約共攻漢以馬邑降胡擊太原七年冬上自往擊破信軍銅鞮師古曰上黨之縣也鞮音丁奚反斬其將王喜信亡走匈奴與其將白土人曼丘臣王黄張晏曰白土縣名也屬上郡立趙苖裔趙利為王師古曰六國時趙後復收信散兵宋祁云景祐本無散字而與信及冐頓謀攻漢劉攽曰下云而與信及冐頓謀攻漢則上不當有與字匈奴使左右賢王將萬餘騎與王黃等屯廣武以南至晉陽師古曰廣武亦大原之縣與漢兵戰漢兵大破之追至于離石復破之師古曰離石西河之縣匈奴復聚兵樓煩西北漢令車騎擊匈奴常敗走漢乗勝追北聞冐頓居代谷上居晉陽使人視冐頓還報曰可擊上遂至平城上白登服䖍曰臺名去平城七里如淳曰平城旁之髙地若丘陵也師古曰在平城東山上去平城十餘里今其處猶存服説非也匈奴騎圍上上乃使人厚遺閼氏師古曰閼氏匈奴單于之妻也閼音於連反氏音支閼氏説冐頓曰今得漢地猶不能居且兩主不相戹居七日胡騎稍引去宋祁云景祐本有兩稍字天霧漢使人往來胡不覺護軍中尉陳平言上曰胡者全兵李竒曰言唯弓矛無雜仗章衡曰李注非是使胡有雜仗則傳矢外郷之説不得行歟且竒何以知匈奴無雜仗匈奴特無弩耳全兵者言匈奴自戰其地也請令彊弩傅兩矢外鄉師古曰傅讀曰附每一弩而加兩矢外鄉者以禦敵也鄉讀曰嚮徐行出圍入平城漢救兵亦至胡騎遂觧去漢亦罷兵歸信為匈奴將兵往來擊邊令王黄等説誤陳豨十一年春信復與胡騎入居參合師古曰代郡之縣漢使柴將軍擊之鄧展曰柴竒也應劭曰柴武也晉灼曰竒武之子師古曰應説是也遺信書曰陛下寛仁諸侯雖有叛亡而後歸輙復故位號不誅也師古曰復音扶目反大王所知今王以敗亡走胡非有大罪急自歸信報曰陛下擢僕閭巷南面稱孤此僕之幸也滎陽之事僕不能死囚於項籍此一罪也寇攻馬邑僕不能堅守以城降之此二罪也今為反寇將兵與將軍争一旦之命此三罪也夫種蠡無一罪身死亡文穎曰大夫種范蠡也師古曰二人皆越王句踐之臣也大夫種位為大夫名種也有功於越而句踐逼令自死范蠡即陶朱公也浮海而逃之齊又居陶自號朱公竟以壽終信引之以自喻者葢言種不去則見殺蠡逃亡則獲免蠡音禮僕有三罪而欲求活此伍子胥所以僨於吳世也蘇林曰僨音奮孟康曰僨猶斃也言子胥得罪於夫差而不知去所以斃於世也師古曰僨謂僵仆而倒也音方問反今僕亡匿山谷間旦暮乞貣蠻夷師古曰貣音吐得反僕之思歸如痿人不忘起盲者不忘視師古曰痿風痹病也音人佳反埶不可耳遂戰柴將軍屠參合斬信信之入匈奴與太子俱及至穨當城生子因名曰穨當韓太子亦生子嬰至孝文時穨當及嬰率其衆降漢封穨當為弓髙侯晉灼曰功臣表屬營陵嬰為襄城侯晉灼曰功臣表屬魏郡吳楚反時弓髙侯功冠諸將傳子至孫孫無子國絶嬰孫以不敬失侯穨當孽孫嫣鄭氏曰音􅋣陵之􅋣師古曰鄭音是也音偃貴幸名顯當世嫣弟説師古曰説讀曰悦以校尉擊匈奴封龍額侯師古曰字或作雒後坐酎金失侯孔武仲雜説漢多以酎金失侯其故何也考史記平凖書武帝方事夷狄而擊羗越卜式上書願父子往死之帝侯卜式賜金六十斤田十頃以風天下天下莫應而列侯百數皆莫求從軍撃羗者故於宗廟酎時使少府省諸侯所獻金斤兩少者色惡者王削縣侯失國焉葢緣諸侯之不從軍武帝忿焉乃設此法故失侯者百餘人而尊式為御史大夫復以待詔為橫海將軍擊破東越封按道侯師古曰史記年表并衛青傳載韓説初封龍額侯後為按道侯皆與此傳同而漢書功臣侯表乃云龍頟侯名譊按道侯名説列為二人與此不同疑表誤太初中為游擊將軍屯五原外列城還為光祿勲掘蠱太子宫為太子所殺師古曰掘音其勿反子興嗣坐巫蠱誅上曰游擊將軍死事無論坐者服䖍曰時無故見殺而無為之論坐伏辜者也臣瓉曰按説無故見殺而子復為巫蠱見誅皆為怨枉故上曰毋有應論坐者也師古曰二説皆非言韓説以掘蠱為太子所殺死於國事忠誠可閔今興雖以巫蠱見誅其昆弟宗族應從坐者可勿論之所以追寵説也乃復封興弟增為龍額侯增少為郎諸曹侍中光禄大夫昭帝時至前將軍與大將軍霍光定䇿立宣帝益封千户本始二年五將征匈奴增將三萬騎出雲中斬首百餘級至期而還神爵元年代張安世為大司馬車騎將軍領尚書事增世貴㓜為忠臣事三主重於朝廷為人寛和自守以温顔遜辭承上接下無所失意保身固寵不能有所建明五鳳二年薨諡曰安侯子寶嗣亡子國除成帝時繼功臣後封增兄子岑為龍額侯薨子持弓嗣王莽敗乃絶賛曰周室既壊至春秋末諸侯耗盡師古曰耗減也言漸少而盡也音呼到反而炎黃唐虞之苖裔尚猶頗有存者師古曰謂神農黄帝堯舜之後秦滅六國而上古遺烈埽地盡矣師古曰烈業也楚漢之際豪桀相王唯魏豹韓信田儋兄弟為舊國之後然皆及身而絶横之志節賔客慕義猶不能自立豈非天虖韓氏自弓髙後貴顯葢周烈近與晉灼曰韓先與周同姓其後苖裔事晉封於韓原姓韓氏韓厥其後也故曰周烈臣瓉曰案武王之子方於三代世為最近也師古曰左氏傳云邘晉應韓武之穆也據如此賛所云則韓萬先祖武王之裔而杜預等以為出自曲沃成師未詳其説與讀曰歟前漢書卷三十三前漢書卷三十三考證魏豹傳圍臨濟臣召南按後志陳留郡平邱縣有臨濟亭即此臨濟為魏咎所都也張守節觧史記指齊州臨濟縣非是田儋傳因進兵破殺田既于膠東臣浩按史記作因令曹參云云則破殺田既乃曹參事與灌嬰破殺田吸同韓信未身至膠東也入海居隝中臣召南按北史楊愔避䜛東入田橫島史記正義曰海州東海縣有島山去岸八十里韓王信傳韓王信臣召南按劉知㡬謂韓王本名信都史削去一字遂與淮隂無别此臆説也史無削人名字之理兩人姓名偶同故稱韓王信以别之知幾因表有信都二字妄為此觧不知因司徒訛為申徒因申徒又訛為信都官名本一而音轉字别遂致不同非韓王本名信都也故韓襄王孽孫也臣召南按唐書宰相世系表韓襄王為秦所滅少子蟣虱生信北近鞏雒南廹宛葉東有淮陽胡三省曰韓之分晉其地南至宛葉西包鞏洛接于新安宜陽東有潁川而淮陽之地則屬于楚及漢定天下韓王信剖符王潁川其地東兼有淮陽所謂北近南廹言其境相廹近耳不屬韓也請治馬邑胡三省曰時定襄未置郡故太原之地北被邉兼有雁門之馬邑前漢書卷三十三考證
