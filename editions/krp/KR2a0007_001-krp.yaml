body:
  text: 前漢書卷一上漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注高帝紀第一上師古曰紀理也統理衆事而繫之於年月者也高祖荀悦曰諱邦字季邦之字曰國張晏曰禮諡法無高以為功最高而為漢帝之太祖故特起名焉師古曰邦之字曰國者臣下所避以相代也沛豐邑中陽里人也應劭曰沛縣也豐其鄉也孟康曰後沛為郡而豐為縣師古曰沛者本秦泗水郡之屬縣豐者沛之聚邑耳方言高祖所生故舉其本稱以説之也此下言縣鄉邑告諭之故知邑繫於縣也劉攽曰予謂沛豐郡縣名史官用漢事記錄耳姓劉氏師古曰本出劉累而范氏在秦者又為劉因以為姓母媼文穎曰幽州及漢中皆謂老嫗為媼孟康曰媼母别名音烏老反師古曰媼女老稱也孟音是矣史家不詳著高祖母之姓氏無得記之故取當時相呼稱號而言也其下王媼之屬意義皆同至如皇甫謐等妄引䜟記好奇騁博强為高祖父母名字皆非正史所說蓋無取焉寜有劉媼本姓實存史遷肯不詳載即理而言斷可知矣他皆類此嘗息大澤之陂師古曰蓄水曰陂蓋於澤陂隄塘之上休息而寢寐也陂音彼皮反夢與神遇師古曰遇㑹也不期而會曰遇是時雷電晦㝠師古曰晦㝠皆謂暗也言大雷電而雲霧晝暗父太公往視則見交龍於上已而有娠應劭曰娠動懐任之意左傳曰邑姜方娠孟康曰娠音身漢史身多作娠古今字也師古曰孟説是也漢書皆以娠為任身字邑姜方震自為震動之字不作娠遂產高祖高祖為人隆準而龍顔服䖍曰凖音拙應劭曰隆高也準頰權準也顏頟顙也李斐曰凖鼻也文穎曰音凖的之凖晉灼曰戰國䇿云眉目凖頞權衡史記秦始皇蜂目長凖李説文音是也師古曰頰權䪼字豈當借凖為之服音應説皆失之美須髯師古曰在頤曰須在頰曰髯髯音人占反左股有七十二黑子師古曰今中國通呼為黶子呉楚俗謂之誌誌者記也宋祁曰注文景德本黶下有黑字余靖等刊誤以史記注為據删去寛仁愛人意豁如也師古曰豁然開大之貎音呼活反常有大度不事家人生產作業及壯試吏應劭曰試用補吏為泗上亭長師古曰秦法十里一亭亭長者主亭之吏也亭謂停留行旅宿食之館廷中吏無所不狎侮師古曰廷中郡府廷之中廷音定他皆類此好酒及色常從王媼武負貰酒如淳曰武姓也俗謂老大母為阿負師古曰劉向列女傳云魏曲沃負者魏大夫如耳之母也此則古語謂老母為負耳王媼王家之媼也武負武家之母也貰賒也李登吕忱並音式制反而今之讀者謂與射同乃引地名射陽其字作貰以為證驗此説非也假令地名為射自是假借亦猶鮦陽音紂蓮勺音酌當時所呼别有意義豈得即定其字以為正音乎時飲醉卧武負王媼見其上常有怪高祖每酤留飲酒讎數倍如淳曰讎亦售也宋祁曰一本無常字及見怪歲竟此兩家常折劵棄負師古曰以簡牘為契劵既不徵索故折毁之棄其所負高祖常繇咸陽應劭曰繇者役也文穎曰咸陽今渭北渭城是也師古曰咸陽秦所都繇讀曰傜古通用字劉攽曰常作嘗縱觀秦皇帝師古曰縱放也天子出行放人令觀觀音工喚反喟然大息曰嗟乎大丈夫當如此矣師古曰喟歎息貎大息言其歎息之大喟音丘位反單父人吕公孟康曰單音善父音甫師古曰地理志山陽縣也善沛令辟仇從之客因家焉師古曰與沛令相善因辟仇亡匿初就為客後遂家沛也仇讎也音求沛中豪傑吏聞令有重客皆往賀師古曰以禮物相慶曰賀蕭何為主吏孟康曰主吏功曹也主進文穎曰主賦斂禮進為之帥也鄭氏曰主賦斂禮錢也師古曰進者會禮之財也字本作賮又作贐音皆同耳古字假借故轉而為進賮又音才忍反陳遵傳云陳遂與宣帝博數負進帝後詔云可以償博進未其進雖有别解然而所賭者之財疑充會食義又與此通令諸大夫曰進不滿千錢坐之堂下師古曰令號令也大夫客之貴者總稱耳高祖為亭長素易諸吏師古曰素故也謂舊時也易輕也音弋豉反乃紿為謁曰賀錢萬應劭曰紿欺也師古曰為謁者書刺自言爵里若今㕘見尊貴而通名也蓋當時自陳姓名并列賀錢數耳紿音徒在反實不持一錢謁入吕公大驚起迎之門師古曰以其錢多故特禮之吕公者好相人見高祖狀貎因重敬之引入坐上坐師古曰上坐尊處也令於尊處坐上坐音才臥反次如字下亦同蕭何曰劉季固多大言少成事高祖因狎侮諸客遂坐上坐無所詘師古曰詘曲懾也音丘勿反酒䦨文穎曰闌言希也謂飲酒者半罷半在謂之䦨吕公因目固留高祖師古曰不欲對坐者顯言故動目而留之竟酒後吕公曰臣少好相人張晏曰古人相與語多自稱臣自卑下之道也若今人相與言自稱僕也相人多矣無如季相願季自愛臣有息女願為箕帚妾師古曰息生也言已所生之女酒罷吕媼怒吕公曰公始常欲竒此女與貴人師古曰竒異也謂顯而異之而嫁於貴人朱子文曰欲字宜在女字之下當曰公始常竒此女欲與貴人於文為順沛令善公求之不與何自妄許與劉季吕公曰此非兒女子所知卒與高祖師古曰卒終也吕公女即吕后也生孝惠帝魯元公主服䖍曰元長也食邑於魯韋昭曰元諡也師古曰公主惠帝之姊也以其最長故號曰元吕后謂高帝曰張王以魯元故不宜有謀齊悼惠王尊魯元公主為太后當時並已謂之元不得為諡也韋説失之劉攽曰予謂顏舉吕后言以明元非諡未必然也史家記事或有如此追言諡者貫高欲謀叛與張敖言謂為高祖公羊公子翬與桓公言吾為子口隱矣皆此類高祖嘗告歸之田服䖍曰告音如嘷呼之嘷李斐曰休謁之名吉曰告凶曰寧孟康曰古者名吏休假曰告告又音嚳漢律吏二千石有予告有賜告予告者在官有功最法所當得也賜告者病滿三月當免天子優賜其告使得帶印綬將官屬歸家治病至成帝時郡國二千石賜告不得歸家至和帝時予賜皆絶師古曰告者請謁之言謂請休耳或謂之謝謝亦告也假為嘷嚳二音並無别義固當依本字以讀之左氏傳曰韓獻子告老禮記曰若不得謝漢書諸云謝病皆同義吕后與兩子居田中有一老父過請飲吕后因餔之師古曰餔食之餔屈原曰餔其糟是也以食食人亦謂之餔國語曰國中童子無不餔也吕氏春秋曰下壺飱以餔之是也父本請飲后因食之故言餔也餔音必胡反宋祁曰餔當作必故反老父相后曰夫人天下貴人也令相兩子見孝惠帝曰夫人所以貴者乃此男也師古曰言因有此男故大貴相魯元公主亦皆貴老父已去高祖適從旁舍來吕后具言客有過相我子母皆大貴高祖問曰未遠乃追及問老父老父曰鄉者夫人兒子皆以君如淳曰言并得君之貴相也以或作似師古曰如説非也言夫人及兒子以君之故因得貴耳不當作似也鄉讀曰嚮君相貴不可言高祖乃謝曰誠如父言不敢忘德師古曰誠實也及高祖貴遂不知老父處高祖為亭長乃吕竹皮為冠令求盗之薛治應劭曰以竹始生皮作冠今鵲尾冠是也求盗者亭卒舊時亭有兩卒一為亭父掌開閉埽除一為求盗掌逐捕盗賊薛魯國縣也有作冠師故往治之文穎曰高祖居貧志大取其約省與衆有異韋昭曰竹皮竹筠也今南夷取竹幼時績以為帳師古曰之往也竹皮笋皮謂笋上所觧之籜耳非竹筠也今人亦往往為笋皮巾古之遺制也韋説失之㠯古以字籜音托時時冠之師古曰愛珍此冠休息之暇則冠之及貴常冠所謂劉氏冠也師古曰後遂號為劉氏冠者即此冠也後詔曰爵非公乘以上不得冠劉氏冠者卽此冠高祖以亭長為縣送徒驪山應劭曰秦始皇葬於驪山故郡國送徒士往作文頴曰在新豐南項氏曰故驪戎國也徒多道亡自度比至皆亡之師古曰度音徒各反比音必寐反他皆類此到豐西澤中亭止飲師古曰豐邑之西其亭在澤中因以為名夜皆解縱所送徒師古曰縱放也曰公等皆去吾亦從此逝矣師古曰逝往也徒中壯士願從者十餘人高祖被酒師古曰被加也被酒者為酒所加被音皮義反夜徑澤中師古曰徑小道也言從小道而行於澤中過故其下曰有大蛇當徑令一人行前師古曰行案行也音胡更反劉攽曰行前但謂最前行耳行前者還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬蛇蛇分為兩道開行數里醉因卧後人來至蛇所有一老嫗夜哭人問嫗何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今者赤帝子斬之應劭曰秦襄公自以居西主少昊之神作西畤祠白帝至獻公時櫟陽雨金以為瑞又作畦畤祠白帝少昊金德也赤帝堯後謂漢也殺之者明漢當滅秦也宋祁曰舊本注文無少昊金德也故哭人乃以嫗為不誠師古曰謂所言不實欲苦之蘇林曰欲困苦辱之師古曰今書苦字或作笞笞擊也音丑之反嫗因忽不見師古曰見音胡電反他皆類此後人至高祖覺師古曰覺謂寢寐而寤也音功效反告髙祖髙祖乃心獨喜自負應劭曰負恃也諸從者日益畏之秦始皇帝嘗曰東南有天子氣於是東游以厭當之師古曰厭塞也音一渉反宋祁曰當史義音丁浪反高祖隱於芒碭山澤間應劭曰芒屬沛國碭屬梁國二縣之界有山澤之固故隱其間蘇林曰芒音忙遽之忙碭音唐師古曰碭亦音宕所言屬沛國梁國者皆是注釋之人據見在所屬非必本當時稱號境界他皆類此吕后與人俱求常得之高祖怪問之吕后曰宋祁曰今越本作高祖怪問吕后后曰季所居上常有雲氣故從往常得季師古曰言隨雲氣所在而求得之高祖又喜沛中子弟或聞之多欲附者矣秦二世元年應劭曰始皇欲以一至萬示不相襲始者一故稱二世秋七月陳涉起蘄蘇林曰蘄音機縣名屬沛國至陳自立為楚王李竒曰秦滅楚楚人怨秦故涉因民之欲自稱楚王從民望也遣武臣張耳陳餘略趙地師古曰凡言略地者皆謂行而取之用功力少八月武臣自立為趙王郡縣多殺長吏以應涉九月沛令欲以沛應之掾主吏蕭何曹參曰師古曰曹參為掾蕭何為主吏君為秦吏今欲背之帥沛子弟恐不聽願君召諸亡在外者師古曰時苦秦虐政賦役煩多故有逃亡辟吏可得數百人因以劫衆師古曰劫謂威脅之衆不敢不聽乃令樊噲召高祖師古曰噲音快高祖之衆已數百人矣於是樊噲從高祖來沛令後悔恐其有變乃閉城城守師古曰城守者守其城也守音狩他皆類此欲誅蕭曹蕭曹恐踰城保高祖師古曰保安也就高祖以自安高祖乃書帛射上城宋祁曰景德監本作城上與沛父老曰天下同苦秦久矣今父老雖為沛令守諸侯並起今屠沛師古曰屠謂破取城邑誅殺其人如屠六畜然沛今共誅令擇可立立之以應諸侯卽室家完師古曰完全也不然父子俱屠無為也父老乃帥子弟共殺沛令開城門迎高祖欲以為沛令高祖曰天下方擾諸侯並起師古曰擾亂也今置將不善一敗塗地師古曰一見破敗卽當肝腦塗地吾非敢自愛恐能薄師古曰能謂材也能本獸名形似熊足似鹿為物堅中而强力故人之有賢材者皆謂之能劉攽曰能雖獸名安知非此獸有能故以名之不能完父兄子弟師古曰鄉邑之人老及長者父兄之行少及幼者子弟之黨故總而言之此大事願更擇可者蕭曹等皆文吏自愛恐事不就師古曰就成也後秦種族其家師古曰誅及種族也盡讓高祖諸父老皆曰平生所聞劉季竒怪當貴且卜筮之莫如劉季最吉高祖數讓衆莫肯為師古曰數音所角反他皆類此高祖乃立為沛公孟康曰楚舊僭稱王其縣宰為公陳涉為楚王沛公起應涉故從楚制稱曰公祠黄帝祭蚩尤於沛廷應劭曰黄帝戰於阪泉以定天下蚩尤亦古天子好五兵故祠祭之求福祥也臣瓚曰孔子三朝記云蚩尤庶人之貪者非天子也管仲曰割廬山發而出水金從之出蚩尤受之以作劍㦸也師古曰瓚所引者同是大戴禮出用兵篇而非三朝記也其餘則如應説沛廷沛縣之廷而釁鼓應劭曰釁祭也殺牲以血塗鼓釁呼為釁臣瓚曰禮記及大戴禮有釁廟之禮皆無祭事師古曰許愼云釁血祭也然卽凡殺牲以血祭者皆為釁安在其無祭事乎又古人新成鍾鼎亦必釁之豈取釁呼為義應氏之説亦未允也呼音火亞反旗幟皆赤師古曰幟幖也音式志反旗旂之屬幟卽總稱焉史家字或作識或作志音義皆同蕭該音義幟音熾由所殺蛇白帝子所殺者赤帝子故也朱子文曰於文為繁自由所殺蛇以下宜去十字却添四字當曰旗幟皆赤符嫗所言赤帝子故也義自顯然何必更述斬蛇一事於是少年豪吏如蕭曹樊噲等皆為收沛子弟得三千人是月項梁與兄子羽起呉田儋與從弟榮横起齊服䖍曰儋音負擔之擔師古曰音丁甘反自立為齊王韓廣自立為燕王魏咎自立為魏王陳涉之將周章西入關至戲應劭曰章字文陳人也戲𢎞農湖縣西界也孟康曰水名也蘇林曰在新豐東南三十里師古曰戲在新豐東今有戲水驛其水本出藍田北界横嶺至此而北流入渭孟蘇説是東越鄭及華隂數百里然始至湖西界應説大失之矣戲音許宜反秦將章邯距破之蘇林曰邯音酒酣之酣師古曰音下甘反秦二年十月文穎曰十月秦正月始皇即位周火德以五勝之法勝火者水秦文公𫉬黑龍此水德之瑞於是更名河為德水十月為正月謂建亥之月水得位故以為歲首沛公攻胡陵鄧展曰屬山陽章帝元和元年改為胡陸方與鄭氏曰音房預屬山陽郡還守豐秦泗川監平將兵圍豐文穎曰泗川今沛郡也高祖更名沛秦時御史監郡若今刺史平其名也師古曰泗川郡川字或為水其實一也二日出與戰破之令雍齒守豐十一月沛公引兵之薛秦泗川守壯兵敗於薛如淳曰秦并天下為三十六郡置守尉監此泗川有監有守壯其名也走至戚鄭氏曰音憂戚之戚如淳曰音將毒反師古曰東海之縣也讀如本字沛公左司馬得殺之師古曰得者司馬之名劉攽曰得得而殺之漢書多以𫉬為得沛公還軍亢父鄭氏曰亢音人相抗荅父音甫屬任城郡至方與趙王武臣為其將所殺十二月楚王陳涉為其御莊賈所殺魏人周市略地豐沛使人謂雍齒曰豐故梁徙也文穎曰晉大夫畢萬封魏今河東河北縣是也其後為秦所逼徙都今魏郡魏縣是也至文侯孫惠王畏秦復徙都大梁今浚儀縣大梁亭是也故世或言魏惠王或言梁惠王至孫假為秦所滅轉東徙於豐故曰豐故梁徙也臣瓚曰史記及世本畢萬居魏昭子徙安邑文侯亦居之汲郡古文云惠王之六年自安邑遷于大梁師古曰魏不常都於魏郡魏縣瓚説是也其他卽如文氏之釋今魏地已定者數十城齒今下魏魏以齒為侯守豐師古曰封為侯因令守豐不下且屠豐雍齒雅不欲屬沛公蘇林曰雅素也及魏招之卽反為魏守豐師古曰為音于偽反沛公攻豐不能取沛公還之朱子文曰當去下沛公二字沛怨雍齒與豐子弟畔之正月張耳等立趙後趙歇為趙王蘇氏曰歇音遏絶之遏蘇林曰歇音毒歇師古曰依本字以讀之不當借音宋祁曰史記徐廣注云歇音烏轄反東陽寗君秦嘉立景駒為楚王文穎曰秦嘉東陽郡人為寗縣君景駒楚族景氏駒名也晉灼曰東陽縣也臣瓚曰陳勝傳云凌人秦嘉然卽嘉非東陽人嘉初起於郯號大司馬又不為寗縣君東陽寗君自一人秦嘉又一人師古曰東陽寗君及秦嘉二人是也東陽者為其所屬縣名寗君者姓寗時號為君在留師古曰留縣名沛公往從之道得張良遂與俱見景駒請兵以攻豐時章邯從陳别將如淳曰從陳渉將也涉在陳其將相别在他許皆稱陳師古曰從謂追討也尚書曰夏師敗績湯遂從之劉攽曰余謂别將字當屬下句讀之言章邯身從陳而别將定楚耳司馬􅊂將兵北定楚地如淳曰􅊂章邯司馬師古曰􅊂古夷字屠相師古曰相縣名至碭東陽寗君沛公引兵西與戰蕭西師古曰蕭縣之西不利還收兵聚留二月攻碭三日拔之師古曰㧞者破城邑而取之言若拔樹木并得其根本也收碭兵得六千人與故合九千人三月攻下邑拔之師古曰下邑縣名還擊豐不下四月項梁擊殺景駒秦嘉止薛沛公往見之項梁益沛公卒五千人五大夫將十人蘇林曰五大夫第九爵名以五大夫為將凡十人沛公還引兵攻豐拔之雍齒奔魏五月項羽拔襄城還項梁盡召别將師古曰别將謂小將别在他所者六月沛公如薛師古曰如往也他皆類此與項梁共立楚懐王孫心為楚懐王應劭曰六國為秦所并楚最無罪為百姓所思故求其後立為楚懐王以祖諡為號順民望也章邯破殺魏王咎齊王田儋於臨濟師古曰破其軍而殺其身七月大霖雨師古曰雨三日以上為霖沛公攻亢父章邯圍田榮於東阿沛公與項梁共救田榮大破章邯東阿田榮歸沛公項羽追北服䖍曰師敗曰北韋昭曰古背字也背去而走也師古曰北隂幽之處故謂退敗奔走者為北老子曰萬物向陽而負隂許愼説文解字云北乖也史記樂書曰紂為朝歌北鄙之音朝歌者不時北者敗也鄙者陋也是知北即訓乖訓敗無勞借音韋昭之徒並為妄矣至城陽攻屠其城軍濮陽東復與章邯戰又破之章邯復振李竒曰振整也如淳曰振起也收散卒自振迅而起晉灼曰左氏云振廢滯如説是也守濮陽環水文穎曰決水以自環守為固也張晏曰依河水以自環繞作壘師古曰文説是也環音宦沛公項羽去攻定陶八月田榮立田儋子市為齊王定陶未下沛公與項羽西略地至雍丘與秦軍戰大敗之斬三川守李由應劭曰三川今河南郡也由李斯子韋昭曰有河洛伊故曰三川也還攻外黄外黄未下項梁再破秦軍有驕色宋義諫不聽秦益章邯兵九月章邯夜銜枚擊項梁定陶師古曰銜枚者止言語讙囂欲令敵人不知其來也周官有銜枚氏枚狀如箸横銜之繣絜於項繣者結礙也絜繞也蓋為結紐而繞項也繣音𫉬絜音頡大破之殺項梁時連雨自七月至九月沛公項羽方攻陳留聞梁死士卒恐乃與將軍吕臣引兵而東徙懐王自盱台都彭城鄭氏曰音昫怡師古曰昫音許于反吕臣軍彭城東項羽軍彭城西沛公軍碭魏咎弟豹自立為魏王後九月文穎曰卽閏九月也時律歴廢不知閏謂之後九月如淳曰時因秦以十月為歲首至九月則歲終後九月即閏月師古曰文説非也若以律歴廢不知閏者則當徑謂之十月不應有後九月蓋秦之歴法應置閏者總致之於歲末觀其此意當取左傳所謂歸餘於終耳何以明之據漢書表及史記漢未改秦歴之前迄至高后文帝屢書後九月是知故然非歴廢也劉攽曰余謂顔説後九月亦為未盡秦知置歴有閏何故皆以為九月乎蓋司馬氏為史旣以秦正月稱十月遂以閏月溥謂之後九月是司馬氏如此敘之非秦法也懷王并吕臣項羽軍自將之以沛公為碭郡長蘇林曰長如郡守也韋昭曰秦名曰守是時改曰長封武安侯將碭郡兵以羽為魯公封長安侯吕臣為司徒其父吕青為令尹應劭曰天子曰師尹諸侯曰令尹時去六國尚近故置令尹臣瓚曰諸侯之卿唯楚稱令尹其餘國稱相時立楚之後故置官司皆如楚舊也師古曰瓚説得之章邯已破項梁以為楚地兵不足憂乃渡河北擊趙王歇大破之歇保鉅鹿城秦將王離圍之趙數請救懷王乃以宋義為上將項羽為次將范增為末將北救趙初懷王與諸將約先入定關中者王之師古曰約要也謂言契也自函谷關以西總名關中當是時秦兵彊常乘勝逐北諸將莫利先入關師古曰不以入關為利言畏秦也獨羽怨秦破項梁奮勢晉灼曰憤激也願與沛公西入關懷王諸老將皆曰項羽為人慓悍禍賊師古曰慓疾也悍勇也禍賊者好為禍害而殘賊也慓音頻妙反又匹妙反悍音胡旦反嘗攻襄城襄城無噍類如淳曰噍音祚笑反無復有活而噍食者也青州俗呼無孑遺為無噍類所過無不殘滅且楚數進取如淳曰楚謂陳涉數進取多所攻取也師古曰楚者總言楚兵陳涉項梁皆是前陳王項梁皆敗孟康曰前陳王陳涉也師古曰孟説非也此言前者陳王及項梁皆敗今須得長者往非謂涉為前陳王也安有後陳王乎不如更遣長者扶義而西師古曰扶助也以義自助也扶字或作杖杖亦倚任之意告諭秦父兄秦父兄苦其主久矣今誠得長者往毋侵暴宜可下項羽不可遣獨沛公素寛大長者卒不許羽而遣沛公西收陳王項梁散卒乃道碭孟康曰道由碭至陽城與杠里孟康曰二縣名也師古曰杠音江攻秦軍壁破其二軍秦三年十月齊將田都畔田榮將兵助項羽救趙沛公攻破東郡尉於成武孟康曰尉郡都尉也師古曰本謂之郡尉至景帝時乃改曰都尉十一月項羽殺宋義并其兵渡河自立為上將軍諸將黥布等皆屬十二月沛公引兵至栗韋昭曰栗沛郡縣名也遇剛武侯應劭曰楚懐王將也功臣表棘蒲剛侯陳武武一姓柴剛武侯宜為剛侯武魏將也孟康曰功臣表柴武以將軍起薛至霸上入漢中非懷王將又非魏將也例未有稱諡者師古曰史失其名姓唯識其爵號不知誰也不當改剛武侯為剛侯武應氏以為懐王將又云魏將無所據矣奪其軍四千餘人并之與魏將皇欣武滿軍合攻秦軍破之故齊王建孫田安師古曰建齊襄王子也立四十四年為秦兵所擊以兵降秦秦虜之遷建於河内遂滅齊下濟北從項羽救趙羽大破秦軍鉅鹿下虜王離走章邯師古曰章邯被破而走二月沛公從碭北攻昌邑遇彭越越助攻昌邑未下沛公西過高陽文穎曰聚邑名屬陳留圉臣瓚曰陳留傳在雍丘西南酈食其為里監門服䖍曰音歴異基蘇林曰監門門卒也曰諸將過此者多吾視沛公大度乃求見沛公沛公方踞床使兩女子洗師古曰踞反企也洗洗足也踞音據洗音先典反朱子文曰吾視沛公大度乃求見沛公方踞床使兩女子洗乃求見下亦多沛公二字酈生不拜長揖曰師古曰長揖者手自上而極下足下必欲誅無道秦不宜踞見長者於是沛公起攝衣謝之延上坐食其説沛公襲陳留臣瓚曰輕行無鐘鼓曰襲沛公以為廣野君以其弟商為將將陳留兵三月攻開封未㧞師古曰開封縣名屬滎陽西與秦將楊熊會戰白馬師古曰白馬亦縣名屬東郡又戰曲遇東文潁曰地名也蘇林曰曲音齲遇音顒師古曰齲音丘羽反大破之楊熊走之滎陽師古曰西走也二世使使斬之以徇師古曰徇行示也司馬法曰斬以徇言使人將行徧示衆士以為戒四月南攻潁川屠之因張良遂略韓地文潁曰河南新鄭南至潁川南北皆韓地也以良累世相韓故因之時趙别將司馬卬師古曰卬音五剛反方欲渡河入關沛公乃北攻平隂孟康曰縣名也屬河南魏文帝改曰河隂絶河津南戰雒陽東軍不利從轘轅臣瓚曰險道名也在緱氏東南師古曰直渡曰絶轘音環至陽城收軍中馬騎六月與南陽守齮戰犨東師古曰犨縣名也齮音蟻犨音昌由反大破之略南陽郡南陽守走保城守宛師古曰宛南陽之縣也音於元反沛公引兵過宛西師古曰未拔宛城而兵過宛城西出宋祁曰一作過而西陽夏公謂唯作而故師古詳釋之張良諫曰沛公雖欲急入關秦兵尚衆距險師古曰依險阻而自固以距敵今不下宛宛從後擊彊秦在前此危道也於是沛公乃夜引軍從他道還偃旗幟遲明圍宛城三帀服䖍曰欲天疾明也文穎曰遲未也天未明之頃已圍其城矣晉灼曰文説是也師古曰文晉二家得其大意耳此言圍城事畢然後天明明遲於事故曰遲明變為去聲音丈二反漢書諸言遲某事者義皆類此史記遲字作邌亦徐緩之意也音黎南陽守欲自剄鄭氏曰剄音姑鼎反以刀割頸為剄其舍人陳恢曰文穎曰主廐内小吏官名也蘇林曰藺相如為宦者令舍人韓信為侯亦有舍人師古曰舍人親近左右之通稱也後遂以為私屬官號恢音口回反死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛郡縣連城數十其吏民自以為降必死故皆堅守乘城師古曰乘登也謂上城而守也春秋左氏傳曰授兵登陴今足下盡日止攻士死傷者必多引兵去宛宛必隨足下劉攽曰按文少足下二字足下前則失咸陽之約後有彊宛之患為足下計莫若約降師古曰共為要約許其降也封其守因使止守師古曰封其郡守為侯即令守其郡引其甲卒與之西諸城未下者聞聲爭開門而待足下足下通行無所累師古曰累音力瑞反朱子文曰陳恢説沛公之辭不過百餘字凡稱足下者八其七皆不可去惟今足下留守宛可以削之宜曰臣聞足下約先入咸陽者王今留守宛方簡而勢順沛公曰善七月南陽守齮降封為殷侯封陳恢千户引兵西無不下者至丹水高武侯鰓襄侯王陵降蘇林曰鰓音魚鰓之鰓晉灼曰功臣表戚鰓也王陵安國侯王陵也韋昭曰漢封王陵為安國侯初起兵時在南陽南陽有穰縣疑襄當為穰而無禾字省耳臣瓚曰時韓成封穰侯江夏有襄是陵所封也師古曰戚鰓初從卽為郎以都尉守蘄城非至丹水乃降也此自一人耳不知其姓王陵亦非安國侯者晉説非也韋氏改襄為穰者蓋亦穿鑿也還攻胡陽遇番君别將梅鋗蘇林曰番音婆豫章番陽縣韋昭曰呉芮初為番令故號曰番君鋗音呼𤣥反與偕攻析酈蘇林曰酈音蹢躅之蹢如淳曰音持益反師古曰析酈二縣名蘇如兩音並同耳析縣今内鄉酈卽菊潭縣也劉攽曰析酈之酈師古於高紀則從蘇音蹢如音持益反于呉芮傳則音郎益反于樊噲傳則音直益反皆不同何也及酈商傳則音歴不曉所以皆降所過毋得鹵掠應劭曰鹵與虜同師古曰毋止之辭也音與無同他皆類此掠音力勺反謂略奪也宋祁曰掠舊作力勺反刊誤案經典釋文改勺為向秦民喜遣魏人寗昌使秦是月章邯舉軍降項羽羽以為雍王瑕丘申陽下河南服䖍曰瑕丘縣名申姓陽名也文穎曰姓瑕丘字申陽臣瓚曰項羽傳瑕丘公申陽是瑕丘縣公也師古曰文説非也此申陽卽項羽所封河南王者耳何云姓瑕丘乎宋祁曰瑕丘申陽觀羽封諸王處例不稱其鄉里似文穎説勝八月沛公攻武關應劭曰武關秦南關通南陽文穎曰武關在析西百七十里入秦秦相趙高恐乃殺二世使人來欲約分王關中師古曰自與沛公中分關中之地沛公不許九月趙高立二世兄子子嬰為秦王子嬰誅滅趙高遣將將兵距嶢關應劭曰嶢音堯嶢山之關李竒曰在上洛北藍田南武關之西沛公欲擊之張良曰秦兵尚彊未可輕願先遣人益張旗幟於山上為疑兵師古曰益多也多張旗幟過其人數令敵疑有多兵使酈食其陸賈往説秦將啗以利師古曰啗者本謂食啗耳音徒敢反以食餧人令其啗食音則改變為徒濫反今言以利誘之取食為譬他皆類此秦將果欲連和沛公欲許之張良曰此獨其將欲叛恐其士卒不從不如因其怠懈擊之沛公引兵繞嶢關踰蕢山鄭氏曰蕢音匱蘇林曰蕢音蒯師古曰蘇音是也丘怪反擊秦軍大破之藍田南遂至藍田又戰其北秦兵大敗元年冬十月如淳曰張蒼傳云以高祖十月至霸上故因秦以十月為歲首五星聚于東井應劭曰東井秦之分野五星所在其下當有聖人以義取天下占見天文志劉攽曰按五星之行水常不能遠日此十月若用夏正則日已在大火矣水安得與四星俱在東井蓋五星本以秦十月聚東井高帝廼以夏十月入秦也時人欲見漢德應天命故合而言之史承人言不改爾檢史記是年甲午歲在鶉首七月日在鶉火則水從歲星無疑也沛公至霸上應劭曰霸上地名在長安東三十里古曰兹水秦穆公更名霸師古曰霸水上故曰霸上卽今所謂霸頭秦王子嬰素車白馬繫頸以組應劭曰子嬰不敢襲帝號但稱王耳素車白馬喪人之服組者天子韍也繫頸者言欲自殺也師古曰此組謂綬也所以帶璽也韍音弗封皇帝璽符節應劭曰璽信也古者尊卑共之左傳襄公在楚季武子使公冶問璽書追而與之秦漢尊者以為信羣下乃避之師古曰符謂諸所合符以為契者也節以毛為之上下相重取象竹節因以為名將命者持之以為信降枳道旁蘇林曰亭名也在長安東十三里師古曰枳音軹軹道亭在霸成觀西四里諸將或言誅秦王沛公曰始懐王遣我固以能寛容且人已服降殺之不祥乃以屬吏師古曰屬委也音之欲反遂西入咸陽欲止宫休舍師古曰舍息也於殿中休息也一曰舍謂屋舍也樊噲張良諫乃封秦重寳財物府庫還軍霸上蕭何盡收秦丞相府圖籍文書十一月召諸縣豪桀曰父老苦秦苛法久矣師古曰苛細也音何誹謗者族耦語者棄市應劭曰秦法禁民聚語耦對也師古曰族謂誅及其族也棄市者取刑人於市與衆棄之吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盗抵罪服䖍曰隨輕重制法也李奇曰傷人有曲直盗臧有多少罪名不可豫定故凡言抵罪未知抵何罪也師古曰扺至也當也服李二説意並得之自外諸家皆妄解釋故不取也抵音丁禮反餘悉除去秦法吏民皆按堵如故應劭曰按按次第堵墻堵也師古曰言不遷動也堵音覩凡吾所以來為父兄除害非有所侵暴毋恐且吾所以軍霸上待諸侯至而定要束耳師古曰要亦約乃使人與秦吏行至縣鄉邑告諭之師古曰軍中遣人與秦吏相隨徧至諸縣鄉邑而告諭也秦民大喜爭持牛羊酒食獻享軍士沛公讓不受曰倉粟多不欲費民民又益喜唯恐沛公不為秦王或説沛公曰秦富十倍天下地形彊今聞章邯降項羽羽號曰雍王王關中即來沛公恐不得有此可急使守函谷關文穎曰是時關在𢎞農縣衡嶺今移東在河南榖城縣師古曰今桃林縣南有洪溜澗水卽古所謂函谷也其水北流入河夾河之岸尚有舊關餘跡焉穀城卽新安宋祁曰南本使字下有兵字毋内諸侯軍稍徵關中兵以自益距之沛公然其計從之十二月項羽果帥諸侯兵欲西入關關門閉聞沛公已定關中羽大怒使黥布等攻破函谷關遂至戲下宋祁曰南本無下字陽夏公云按前言陳涉之將周章西入關至戲此不合有下字政以下文諸侯罷戲下故于此誤衍此戲水名下文注戲旌麾也沛公左司馬曹毋傷聞羽怒欲攻沛公使人言羽曰沛公欲王關中令子嬰相珍寳盡有之欲以求封亞父范增説羽曰如淳曰亞次也尊敬之次父猶管仲為仲父劉攽曰管仲自字仲父耳亞父亦甫音也言敬之次父是妄説沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小宋祁曰南本作此其志大吾使人望其氣皆為龍成五色此天子氣急擊之勿失於是饗士旦日合戰師古曰饗謂飲食也旦日明旦也是時羽兵四十萬號百萬沛公兵十萬號二十萬師古曰兵家之法不言實數皆增之力不敵會羽季父左尹項伯素善張良師古曰伯者其字也名纒夜馳見張良具告其實欲與俱去毋特俱死文穎曰特獨也無為獨與沛公俱死蘇林曰特但也師古曰蘇説是也但空也空死而無成名朱子文曰夜馳見張良句中宜去一張字考項羽傳中語意同亦無張字良曰臣為韓王送沛公不可不告亡去不義乃與項伯俱見沛公沛公與伯約為㛰姻曰吾入關秋豪無所敢取文穎曰豪秋乃成好舉盛而言也師古曰豪成之時端極纎細適足諭小非言其盛籍吏民封府庫待將軍師古曰籍謂為簿籍所以守關者備他盗也日夜望將軍到豈敢反邪願伯明言不敢背德項伯許諾即夜復去戒沛公曰旦日不可不早自來謝項伯還具以沛公言告羽因曰沛公不先破關中兵公巨能入乎服䖍曰巨音渠猶未應得入也師古曰服説非也巨讀曰詎詎猶豈也且人有大功擊之不祥不如因善之羽許諾沛公旦日從百餘騎見羽鴻門孟康曰在新豐東十七里舊大道北下坂口名謝曰臣與將軍戮力攻秦師古曰戮力并力也音力竹反又力周反將軍戰河北臣戰河南不自意先入關能破秦與將軍復相見師古曰意不自謂得然今者有小人言令將軍與臣有隙師古曰隙謂間隙言乖離不合羽曰此沛公左司馬曹毋傷言之不然籍何以至此羽因留沛公飲范增數目羽擊沛公師古曰動目以諭之羽不應范增起出謂項莊曰君王為人不忍師古曰莊項羽從弟汝入以劍舞因擊沛公殺之不者汝屬且為所虜莊入為壽師古曰凡言為夀謂進爵於尊者而獻無疆之夀壽畢曰軍中無以為樂請以劒舞因拔劒舞項伯亦起舞常以身翼蔽沛公樊噲聞事急直入怒甚羽壯之賜以酒噲因譙讓羽師古曰譙讓以辭相責也譙音才笑反有頃沛公起如厠招樊噲出置車官屬師古曰置留也不以自隨獨騎與樊噲靳彊滕公紀成步從間道走軍晉灼曰紀成紀通父也服䖍曰走音奏師古曰閒空也投空隙而行不公顯也走謂趣向也服音是矣凡此之類音義皆同使張良留謝羽羽問沛公安在師古曰安在何在也他皆類此曰聞將軍有意督過之師古曰督謂視責也脱身去閒至軍師古曰脱免也不敢謁辭茍自免而去閒行以至軍也脱音他活反故使臣獻璧羽受之又獻玉斗范增增怒撞其斗起曰吾屬今為沛公虜矣師古曰撞音丈江反沛公歸數日羽引兵西屠咸陽殺秦降王子嬰燒秦宫室所過無不殘滅秦民大失望羽使人還報懐王懐王曰如約師古曰謂令沛公王關中羽怨懐王不肯令與沛公俱西入關而北救趙後天下約乃曰懐王者吾家所立耳非有功伐何以得專主約師古曰積功曰伐春秋左氏傳曰大夫稱伐本定天下諸將與籍也春正月如淳曰以十月為歲首而正月更為三時之月服䖍曰漢正月也師古曰凡此諸月號皆太初正歴之後記事者追改之非當時本稱也以十月為歲首卽謂十月為正月今此眞正月當時謂之四月耳他皆類此陽尊懐王為義帝實不用其命羽自立為西楚霸王文穎曰史記貨殖傳曰淮以北沛陳汝南南郡為西楚彭城以東東海呉廣陵為東楚衡山九江江南豫章長沙為南楚羽欲都彭城故自稱西楚孟康曰舊名江陵為南楚呉為東楚彭城為西楚師古曰孟説是也王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭師古曰卽今之梁州南鄭縣三分關中立秦三將章邯為雍王都廢丘孟康曰縣名今槐里是韋昭曰卽周時犬丘懿王所都秦欲廢之更名廢丘司馬欣為塞王韋昭曰在長安東名桃林塞師古曰取河華之固為阸塞耳非桃林也塞音先代反都櫟陽蘇林曰櫟音藥師古曰卽今之櫟陽縣是其地董翳為翟王文穎曰本上郡秦所置項羽以董翳為王更名為翟都高奴師古曰今在鄜州界楚將瑕丘申陽為河南王都洛陽趙將司馬卬為殷王都朝歌師古曰卽今之朝歌縣也當陽君英布為九江王都六師古曰六者縣名本古國臯陶之後懐王柱國共敖為臨江王應劭曰柱國上卿官也若相國矣共敖其姓名也孟康曰本南郡改為臨江國師古曰共音龔都江陵師古曰卽今之荆州江陵縣番君呉芮為衡山王都邾文穎曰邾音朱縣名屬江夏故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼東王燕將臧荼為燕王鄭氏曰荼音荼毒之荼如淳曰音舒師古曰鄭音是也音大胡反都薊師古曰薊卽幽州薊縣徙齊王田市為膠東王齊將田都為齊王都臨葘師古曰今在靑州徙趙王歇為代王趙相張耳為常山王漢王怨羽之背約欲攻之丞相蕭何諫乃止服䖍曰稱丞相者錄事追言之夏四月諸侯罷戲下各就國師古曰戲謂軍之旌麾也音許宜反亦讀曰麾先是諸侯從項羽入關者各帥其軍聽命於羽今旣受封爵各使就國故總言罷戲下也一説云時從項羽在戲水之上故言罷戲下此説非也項羽見高祖於鴻門已過戲矣又入秦燒秦宫室不復在戲也漢書通以戲為麾字義見竇田灌韓傳羽使卒三萬人從漢王楚子諸侯人之慕從者數萬人文穎曰楚子猶言楚人也諸侯人猶諸侯國人從杜南入蝕中李竒曰蝕音力在杜南如淳曰蝕入漢中道川谷名張良辭歸韓漢王送至襃中師古曰卽今梁州之襃縣也舊曰襃中言居襃谷之中隋室諱忠改為襃内因說漢王燒絶棧道師古曰棧卽閣也今謂之閣道以備諸侯盗兵亦視項羽無東意如淳曰視音示師古曰言令羽知漢王更無東出之意也漢書多以視為示古通用字漢王旣至南鄭諸將及士卒皆歌謳思東歸師古曰謳齊歌也謂齊聲而歌或曰齊地之歌謳音一侯反多道亡還者師古曰未至南鄭在道卽亡歸韓信為治粟都尉亦亡去蕭何追還之因薦於漢王曰必欲爭天下非信無可與計事者於是漢王齊戒設壇場師古曰齊讀曰齊築土而高曰壇除地為場拜信為大將軍問以計䇿信對曰項羽背約而王君王於南鄭師古曰上王音于放反劉攽曰予謂王作如字何害是遷也如淳曰秦法有罪遷徙之於蜀漢吏卒皆山東之人日夜企而望歸師古曰企謂舉足而竦身及其鋒而用之可以有大功天下已定民皆自寧不可復用師古曰寧安也各安其處不如決䇿東向因陳羽可圖師古曰圖謂謀而取之三秦易并之計應劭曰章邯為雍王司馬欣為塞王董翳為翟王分王秦地故曰三秦漢王大說師古曰說讀曰悦遂聽信䇿部署諸將師古曰分部而署置留蕭何收巴蜀租給軍糧食五月漢王引兵從故道孟康曰縣名屬武都出襲雍雍王邯迎擊漢陳倉雍兵敗還走戰好畤孟康曰畤音止神靈之所止也好畤縣名屬右扶風師古曰卽今雍州好畤縣宋祁曰雍兵敗舊本作雍州兵敗又大敗走廢丘漢王遂定雍地東如咸陽引兵圍雍王廢丘而遣諸將略地田榮聞羽徙齊王市於膠東而立田都為齊王大怒以齊兵迎擊田都都走降楚六月田榮殺田市自立為齊王時彭越在鉅野師古曰鉅野澤名因以為縣今屬鄆州衆萬餘人無所屬榮與越將軍印因令反梁地越擊殺濟北王安榮遂并三齊之地服䖍曰齊與濟北膠東燕王韓廣亦不肯徙遼東秋八月臧荼殺韓廣并其地塞王欣翟王翳皆降漢初項梁立韓後公子成為韓王張良為韓司徒羽以良從漢王韓王成又無功故不遣就國與俱至彭城殺之及聞漢王并關中而齊梁畔之羽大怒乃以故呉令鄭昌為韓王距漢令蕭公角擊彭越蘇林曰蕭公官號也孟康曰蕭令也時令皆稱公師古曰孟說是也越敗角兵時張良徇韓地蘇林曰徇音廵撫其民人也孟康曰徇略也師古曰孟説是也音辭峻反遺羽書曰漢欲得關中如約卽止不敢復東羽以故無西意而北擊齊九月漢王遣將軍薛歐王吸出武關師古曰歐音烏垢反吸音翕因王陵兵如淳曰王陵亦聚黨數千人居南陽從南陽迎太公吕后於沛羽聞之發兵距之陽夏鄭氏曰音假借之假師古曰卽今亳州陽夏縣不得前二年冬十月項羽使九江王布殺義帝於郴文穎曰郴縣名屬桂陽如淳曰郴音綝師古曰説者或以為史記本紀及漢注云衡山臨江王殺之江中謂漢書言黥布殺之為錯然今據史記黥布傳四月隂令九江王等行擊義帝其八月布使將追殺之郴又與漢書項羽英布傳相合是則衡山臨江與布同受羽命而殺之者布也非班氏之錯郴綝二字並音丑林反陳餘亦怨羽獨不王已從田榮藉助兵師古曰藉借也以擊常山王張耳耳敗走降漢漢王厚遇之陳餘迎代王歇還趙歇立餘為代王張良自韓間行歸漢漢王以為成信侯漢王如陜師古曰陜今陜州陜縣也音式冉反鎭撫關外父老師古曰鎭安也撫慰也河南王申陽降置河南郡使韓太尉韓信擊韓韓王鄭昌降十一月立韓太尉信為韓王漢王還歸都櫟陽使諸將略地拔隴西以萬人若一郡降者封萬户師古曰若者豫及之辭言以萬人或以一郡降者皆封萬户繕治河上塞晉灼曰鼂錯傳秦北攻胡築河上塞師古曰繕補也宋祁曰史義云塞先代反北河靈夏州地也秦時繕治故秦苑囿園池令民得田之師古曰養鳥獸曰苑苑有垣曰囿所以種植謂之園田謂耕作也囿音宥春正月羽擊田榮城陽榮敗走平原平原民殺之齊皆降楚楚焚其城郭齊人復畔之諸將拔北地虜雍王弟章平赦罪人二月癸未令民除秦社稷立漢社稷施恩德賜民爵臣瓚曰爵者祿位民賜爵有罪得以減也蜀漢民給軍事勞苦復勿租稅二歲師古曰復者除其賦役也音方目反其下並同關中卒從軍者復家一歲舉民年五十以上有脩行能帥衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞尉以事相敎復勿繇戍師古曰繇讀曰傜宋祁曰百官表云十里一亭亭有長十亭一鄉鄉有三老三老掌敎化秦制也以十月賜酒肉三月漢王自臨晉渡河師古曰舊縣名其地居河之西濵東臨晉境本列國時秦所名也卽今之同州朝邑縣界也魏王豹降將兵從下河内虜殷王卬置河内郡至脩武陳平亡楚來降漢王與語説之師古曰說讀曰悅使參乘監諸將南渡平陰津蘇林曰在河隂至洛陽新城三老董公遮説漢王曰臣聞順德者昌逆德者亡兵出無名事故不成蘇林曰名者伐有罪故曰明其為賊敵乃可服應劭曰為音無為之為布告天下言項羽殺義帝明其為賊亂舉兵征之乃可服也鄭氏曰為音人相為之為師古曰應説是也項羽為無道放殺其主師古曰殺讀曰弑諸弑君者其例皆同天下之賊也夫仁不以勇義不以力李竒曰彼有仁我不能以勇服彼有義我不能以力服文穎曰以用也已有仁天下歸之可不用勇而天下自服已有義天下奉之可不用力而天下自定師古曰為義帝發喪此為行仁義不用勇力文說是也三軍之衆為之素服以告之諸侯為此東伐師古曰為並音于偽反劉攽曰以告之之字衍四海之内莫不仰德此三王之舉也師古曰三王夏殷周也言以德義取天下則可比蹤於三王漢王曰善非夫子無所聞於是漢王為義帝發喪袒而大哭如淳曰袒亦如禮袒踊也師古曰袒謂脱衣之袖也音徒旱反哀臨三日師古曰衆哭曰臨音力禁反發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝江南大逆無道寡人親為發喪兵皆縞素師古曰縞白素也音工老反悉發關中兵收三河士韋昭曰河南河東河内也南浮江漢以下願從諸侯王服䖍曰漢名王為諸侯王師古曰服説非也當時漢未有此稱號直言諸侯及王耳自謙言隨諸侯王之後也擊楚之殺義帝者夏四月田榮弟横收得數萬人立榮子廣為齊王羽雖聞漢東旣擊齊欲遂破之而後擊漢漢王以故得劫五諸侯兵應劭曰雍翟塞殷韓也如淳曰塞翟魏殷河南也韋昭曰塞翟韓殷魏也雍時已敗師古曰諸家之説皆非也張良遺羽書云漢欲得關中如約卽止不敢復東東謂出關之東今羽聞漢東之時漢固已得三秦矣五諸侯者謂常山河南韓魏殷也此年十月常山王張耳降河南王申陽降韓王鄭昌降三月魏王豹降虜殷王卬皆在漢東之後故知謂此為五諸侯時雖未得常山之地據功臣表云張耳棄國與大臣歸漢則亦有士卒也又叔孫通傳云二年漢王從五諸侯入彭城爾時雍王猶在廢丘被圍卽非五諸侯之數也尋此紀文昭然可曉前賢注釋並失指趣劉攽曰張耳奉頭䑕竄安得有兵五諸侯者陳餘其一也事見餘傳東伐楚到外黄彭越將三萬人歸漢漢王拜越為魏相國令定梁地漢王遂入彭城收羽美人貨賂置酒高會服䖍曰大㑹也羽聞之令其將擊齊而自以精兵三萬人從魯出胡陵至蕭晨擊漢軍大戰彭城靈壁東孟康曰故小縣在彭城南雎水上師古曰雎音雖大破漢軍多殺士卒雎水為之不流師古曰殺人旣多塡於雎水圍漢王三帀大風從西北起折木發屋揚沙石晝晦師古曰晦暗也楚軍大亂而漢王得與數十騎遁去過沛使人求室家室家亦已亡不相得漢王道逢孝惠魯元載行楚騎追漢王漢王急推墮二子滕公下收載遂得脫鄭氏曰滕公夏侯嬰也師古曰脱音他活反朱子文曰於文多室家二字當曰過沛使人求室家亦已亡於不相得句下多漢王二字況下文云漢王急推墮二子足可證前道逢孝惠魯元載行為漢王也審食其從太公吕后間行反遇楚軍師古曰此審食其及武帝時趙食其讀皆與酈食其同音異基而近代學者酈則為異基審則為食基趙則食其非也同是人名更無别義就中舛駮何所據依且荀悦漢紀三者並為異基字斷可知矣太公呂后本避楚軍乃反與之遇而見拘執羽常置軍中以為質諸侯見漢敗皆亡去塞王欣翟王翳降楚殷王卬死呂后兄周呂侯蘇林曰以姓名侯也晉灼曰外戚表周呂令武侯澤也呂縣名封於呂以為國師古曰周呂封名令武其諡也蘇云以姓名侯非也將兵居下邑師古曰縣名也漢王往從之稍收士卒軍碭漢王西過梁地至虞師古曰卽今宋州虞城縣謂謁者隨何曰公能説九江王布使舉兵畔楚項王必留擊之得留數月吾取天下必矣隨何往説布果使畔楚朱子文曰此數語中有兩使字皆不必用用之覺文理不順況旣已曰説九江王説則使在其中矣前當曰公能説九江王布舉兵畔楚後當曰隨何往説布果畔楚文義俱顯耳五月漢王屯滎陽蕭何發關中老弱未傅者悉詣軍服䖍曰傅音附孟康曰古者二十而傅三年耕有一年儲故二十三而後役之如淳曰律年二十三傅之疇官各從其父疇學之高不滿六尺二寸以下為罷癃漢儀注云民年二十三為正一歲為衛士一歲為材官騎士習射御騎馳戰陳又曰年丑十六衰老乃得免為庶民就田里今老弱未嘗傅者皆發之未二十三為弱過五十六為老師古曰傅著也言著名籍給公家徭役也服音是韓信亦收兵與漢王會兵復大振與楚戰滎陽南京索間破之應劭曰京縣名今有大索小索亭晉灼曰音册師古曰音求索之索築甬道屬河應劭曰恐敵鈔輜重故築垣牆如街巷也鄭氏曰甬音踊師古曰屬聯也音之欲反以取敖倉粟孟康曰敖地名在滎陽西北山上臨河有大倉魏王豹謁歸視親疾師古曰謁請也親謂母也至則絶河津反為楚師古曰斷其津濟以距漢軍爲音于偽反六月漢王還櫟陽壬午立太子赦罪人令諸侯子在關中者皆集櫟陽為衛劉攽曰諸侯子謂諸侯國人若上言楚子矣引水灌廢丘廢丘降章邯自殺雍州定八十餘縣置河上渭南中地隴西上郡服䖍曰河上卽左馮翊也渭南京兆也中地在扶風也師古曰凡新置五郡宋祁曰注文在扶風刋誤改在字作右令祠官祀天地四方上帝山川以時祠之興關中卒乘邊塞李竒曰乘守也師古曰乘登也登而守之義與上乘城同關中大饑米斛萬錢師古曰一斛直萬錢人相食令民就食蜀漢秋八月漢王如滎陽謂酈食其曰緩頰往說魏王豹張晏曰緩頰徐言引譬喻也能下之以魏地萬户封生師古曰生猶言先生他皆類此食其往豹不聽漢王以韓信為左丞相與曹參灌嬰俱擊魏食其還漢王問魏大將誰也對曰柏直王曰是口尚乳臭不能當韓信師古曰乳臭言其幼少騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它師古曰它字與他同並音徒河反曰是不能當曹參吾無患矣九月信等虜豹傳詣滎陽定魏地置河東太原上黨郡信使人請兵三萬人願以北舉燕趙東擊齊南絶楚糧道漢王與之三年冬十月韓信張耳東下井陘擊趙服䖍曰井陘山名在常山今為縣師古曰陘音形斬陳餘𫉬趙王歇置常山代郡甲戌晦日有食之十一月癸卯晦日有食之隨何既説黥布布起兵攻楚楚使項聲龍且攻布韋昭曰且音子閭反布戰不勝十二月布與隨何間行歸漢漢王分之兵與俱收兵至成臯項羽數侵奪漢甬道漢軍乏食與酈食其謀橈楚權服䖍曰橈弱也師古曰音女敎反其字從木食其欲立六國後以樹黨師古曰樹立也漢王刻印將遣食其立之以問張良良發八難漢王輟飯吐哺師古曰輟止也哺口中所含食也飯音扶晚反哺音步曰豎儒師古曰言其賤劣無智若童豎也幾敗乃公事師古曰幾近也乃汝也公漢王自謂也幾音鉅依反令趨銷印師古曰趨讀曰促促速也他皆類此又問陳平乃從其計與平黄金四萬斤以間疏楚君臣師古曰間音居莧反次下反間其音亦同夏四月項羽圍漢滎陽漢王請和割滎陽以西者為漢亞父勸項羽急攻滎陽漢王患之陳平反間旣行羽果疑亞父亞父大怒而去發病死五月將軍紀信曰事急矣臣請誑楚可以間出師古曰間出投間隙私出若言間行微行耳紀信詐為漢王而王出西門遁是私出也於是陳平夜出女子東門二千餘人楚因四面擊之紀信乃乘王車黄屋左纛李斐曰天子車以黄繒為蓋裏纛毛羽幢也在乘輿車衡左方上注之蔡邕曰以犛牛尾為之如斗或在騑頭或在衡應劭曰雉尾為之在左驂當鑣上師古曰纛音毒又徒到反應説非也曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得與數十騎出西門遁令御史大夫周苛魏豹樅公守滎陽應劭曰樅公者不知其名故曰公蘇林曰音樅木之樅師古曰音干容反羽見紀信問漢王安在曰已出去矣羽燒殺信而周苛樅公相謂曰反國之王難與守城師古曰謂豹先已經畔漢因殺魏豹漢王出滎陽至成臯自成臯入關收兵欲復東轅生説漢王文穎曰轅姓生謂諸生曰漢與楚相距滎陽數歲漢常困願君王出武關項王必引兵南走師古曰走亦謂趨嚮也音奏次後亦同王深壁令滎陽成臯間且得休息使韓信等得輯河北趙地師古曰輯與集同謂和合也詩序曰勞來還定安集之春秋左氏傳曰羣臣輯睦他皆類此連燕齊君王乃復走滎陽如此則楚所備者多力分漢得休息復與之戰破之必矣漢王從其計出軍宛葉間師古曰葉縣名古葉公之國音式涉反宛縣葉縣之間也與黯布行收兵羽聞漢王在宛果引兵南漢王堅壁不與戰是月彭越渡雎師古曰過雎水也雎音雖與項聲薛公戰下邳破殺薛公羽使終公守成臯而自東擊彭越漢王引兵北擊破終公復軍成臯六月羽已破走彭越師古曰破之而令遁走聞漢復軍成臯乃引兵西拔滎陽城生得周苛羽謂苛為我將以公為上將軍封三萬户周苛罵曰若不趨降漢今為虜矣師古曰若汝也趨讀曰促若非漢王敵也羽亨周苛師古曰亨謂煑而殺之音普庚反他皆類此并殺樅公而虜韓王信遂圍成臯漢王跳如淳曰跳音逃謂走也史記作逃晉灼曰跳獨出意也師古曰晉説是也音徒彫反朱子文曰傳注之學無事求竒辭逹而已漢王跳當從如淳之音史記之説其義甚明唯漢王逃故下文云獨與滕公共車出成臯玉門何乃迂解為獨出意徒見費力耳獨與滕公共車出成臯玉門張晏曰成臯北門北渡河宿小脩武晉灼曰在大脩武城東自稱使者晨馳入張耳韓信壁而奪之軍乃使張耳北收兵趙地秋七月有星孛于大角李竒曰孛彗類也是謂妖星所以除舊布新也師古曰孛音布内反漢王得韓信軍復大振八月臨河南鄉師古曰鄉讀曰嚮軍小脩武欲復戰郎中鄭忠説止漢王高壘深塹勿戰漢王聽其計使盧綰劉賈將卒二萬人騎數百蘇林曰綰音以繩綰結物之綰師古曰音烏板反渡白馬津入楚地佐彭越燒楚積聚師古曰所蓄軍糧芻槀之屬也積音子賜反聚音才喻反復撃破楚軍燕郭西師古曰燕縣名古南燕國宋祁曰越本無破字攻下睢陽外黄十七城九月羽謂海春侯大司馬曹咎曰謹守成臯卽漢王欲挑戰愼勿與戰李竒曰桃音徒了反臣瓚曰挑戰擿嬈敵求戰也古謂之致師師古曰李音瓚説是擿音他歷反嬈音乃了反勿令得東而已我十五日必定梁地復從將軍師古曰從就也羽引兵東擊彭越漢王使酈食其説齊王田廣罷守兵與漢和四年冬十月韓信用蒯通計襲破齊齊王亨酈生東走高密項羽聞韓信破齊且欲擊楚使龍且救齊漢果數挑成臯戰楚軍不出使人辱之數日大司馬咎怒渡兵氾水張晏曰氾水在濟陰界如淳曰汜音祀左傳曰鄙在鄭地氾臣瓚曰高祖攻曹咎於成臯咎渡氾水而戰今成臯城東氾水是也師古曰瓚説得之此水不在濟陰也鄙在鄭地氾釋者又云在襄城則非此也此水舊讀音凡今彼鄉人呼之音祀士卒半渡漢擊之大破楚軍盡得楚國金玉貨賂大司馬咎長史欣皆自剄氾水上漢王引兵渡河復取成臯軍廣武孟康曰於滎陽築兩城而相對名為廣武城在敖倉西三室山上就敖倉食羽下梁地十餘城聞海春侯破乃引兵還漢軍方圍鍾離昩於滎陽東師古曰昩音莫葛反其字從本末之末聞羽至盡走險阻師古曰走音奏羽亦軍廣武與漢相守丁壯苦軍旅老弱罷轉餉師古曰罷讀曰疲轉運餉饋也音式向反漢王羽相與臨廣武之間而語羽欲與漢王獨身挑戰漢王數羽曰師古曰數責其罪也音所具反吾始與羽俱受命懐王曰先定關中者王之羽負約王我於蜀漢罪一也羽矯殺卿子冠軍自尊罪二也如淳曰卿者卿大夫之號子者子男之爵冠軍人之首也文穎曰卿子時人相襃尊之辭猶言公子也時上將故言冠軍師古曰矯託也託懷王命而殺之也卿子冠軍文説是也羽當以救趙還報李竒曰前受命於懷王往救趙當還反報而擅劫諸侯兵入關罪三也懷王約入秦無暴掠羽燒秦宫室掘始皇帝冢收私其財罪四也師古曰掘而發之收取其財以私自有也掘音具勿反又彊殺秦降王子嬰罪五也詐阬秦子弟新安二十萬王其將李竒曰章邯等為王罪六也皆王諸將善地而徙逐故主宋祁曰王諸將善地謂章邯等徙逐故主謂田市趙歇韓廣之屬令臣下爭畔逆罪七也出逐義帝彭城自都之奪韓王地并王梁楚多自與罪八也使人陰殺義帝江南罪九也夫為人臣而殺其主殺其已降為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘賊使刑餘罪人擊公師古曰言輕賤也何苦乃與公挑戰羽大怒伏弩射中漢王漢王傷胸乃捫足曰虜中吾指師古曰捫摸也傷胸而捫足者以安衆也捫音門中音竹仲反漢王病創臥張良彊請漢王起行勞軍以安士卒師古曰行音下更反其下亦同朱子文曰此句中多漢王二字當曰漢王病創臥張良彊請起行勞軍毋令楚乘勝漢王出行軍疾甚因馳入成臯十一月韓信與灌嬰擊破楚軍殺楚將龍且追至城陽虜齊王廣齊相田橫自立為齊王奔彭越漢立張耳為趙王漢王疾瘉師古曰瘉與愈同愈差也西入關至櫟陽存問父老置酒梟故塞王欣頭櫟陽市師古曰梟縣首於木上宋祁曰欣自剄氾上死矣今梟於此以欣舊都故示之留四日復如軍軍廣武關中兵益出而彭越田橫居梁地往來苦楚兵絶其糧食韓信已破齊使人言曰齊邊楚師古曰邊共為邊界權輕不為假王恐不能安齊漢王怒欲攻之張良曰不如因而立之使自為守春二月遣張良操印立韓信為齊王師古曰操持也音千高反秋七月立黥布為淮南王八月初為算賦如淳曰漢儀注民年十五以上至五十六出賦錢人百二十為一算為治庫兵車馬北貉燕人來致梟騎助漢應劭曰北貂國也梟徤也張晏曰梟勇也若六博之梟也師古曰貉在東北方三韓之屬皆貉類也音莫客反漢王下令師古曰令敎命也下音胡嫁反他皆類此軍士不幸死者吏為衣衾棺歛師古曰棺音工喚反歛音力贍反與作衣衾而歛尸於棺轉送其家師古曰轉傳送也四方歸心焉師古曰以仁愛故項羽自知少助食盡韓信又進兵擊楚羽患之漢遣陸賈說羽請太公羽弗聽漢復使侯公説羽羽乃與漢約中分天下割鴻溝以西為漢應劭曰在滎陽東南二十里文穎曰於滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會於楚卽今官渡水也以東為楚九月歸太公呂后軍皆稱萬歲乃封侯公為平國君師古曰以其善説能平和邦國羽解而東歸漢王欲西歸張良陳平諫曰今漢有天下太半韋昭曰凡數三分有二為大半有一分為少半而諸侯皆附楚兵罷食盡師古曰罷讀曰疲此天亡之時不因其幾而遂取之鄭氏曰幾微也師古曰幾危也所謂養虎自遺患也漢王從之前漢書卷一上前漢書卷一上考證高帝紀第一上監本刋此六字於第一行下非也今從古本提行顏注紀理也云云卽解此目後凡某紀某傳俱倣此沛豐邑中陽里人也劉攽曰予謂沛豐郡縣名臣召南按攽説非也史家記事必用當時地名秦無沛郡沛縣屬泗水郡若全記郡縣必云泗水沛矣時蕭何曹參王陵周勃樊噲夏侯嬰周緤周苛周昌任敖皆同縣人而盧綰則同鄉同里故於蕭曹等傳但曰沛人綰傳則曰豐人又曰與高祖同里也師古說是則見交龍於上臣召南按史記作見蛟龍於其上又為泗上亭長史記作為泗水亭長据後書郡國志云沛有泗水亭亭有高祖碑班固為文見固集是亭名泗水不名泗上也引入坐上坐注坐才臥反次如字監本脫如字二字從宋本添又監本於顏注本文十刪四五全非古人之舊今並從宋本添補因餔之宋祁曰餔當作必故反監本脫宋祁一段今從宋本凡三劉刋誤宋祁朱子文諸説别以一圏脫者俱補高祖乃書帛射上城按監本作射城上非也不能完父兄子弟臣召南按監本作父子兄弟非也此及史記皆作父兄子弟故師古注曰老及長者父兄之行少及幼者子弟之黨也今改正沛公攻胡陵方與臣召南按史記本紀此事在上年之末此從月表在二年十月凡漢書月日與史記本紀不同者皆据月表也走至戚注東海之縣也胡三省通鑑注曰以地理考之沛郡與東海相去頗遠壯兵敗而走未必能至東海之戚班志沛郡有廣戚縣章懐太子曰廣戚故城在今徐州沛縣東恐是走至廣戚之戚也臣召南按此説足以正顏注之失至陽城與杠里注孟康曰二縣名也胡三省曰陽城史記作成陽索隱曰在濟陰臣召南按陽城係成陽轉寫之誤不獨史記可證本書曹參傳擊王離軍成陽南又攻杠里大破之卽此事也與魏將皇欣武滿軍合臣召南按功臣表樂平侯衛無擇以隊卒從高祖起沛屬皇訢當卽此皇欣武滿史記作武蒲蒲滿字形相近未知孰是攻開封未拔注師古曰開封縣名屬滎陽臣召南按注非也漢時開封縣屬河南郡其滎陽郡至晉始置繞嶢關踰蕢山宋敏求曰嶢關卽藍田關在藍田縣東南九十里蕢山在縣東南二十五里元年冬十月五星聚於東井臣召南按魏書高允傳允語崔浩曰按星傳金水二星常附日而行冬十月日旦在尾箕昏没於申南而東井方出於寅北何因背日而行是史官欲神其事不復推之於理浩初謂不然後歲餘謂允曰先所論者本不經心及更考究果如君語以前三月聚東井非十月也高允此論足以發千古之蔽司馬溫公通鑑所以於十月之下從史記直言沛公至霸上不言五星聚井劉攽謂五星本以秦十月聚東井高帝廼以夏十月入秦亦卽崔浩前三月之説也羽自立為西楚霸王句上監本衍二月二字從宋本刪去故齊王建孫田安為濟北王臣召南按月表濟北王都博陽遼東王都無終膠東王都卽墨代王都代常山王都襄國此紀於諸國俱言所都而此數國獨闕諸侯罷戲下注顧炎武曰注引一説云時從項羽在戲水之上此説為是蓋羽入咸陽而諸侯自留軍戲下耳他處固有以戲為麾者但云罷麾下似不成文從杜南入蝕中程大昌雍録曰以地望求之關中南靣背礙南山其有微徑可逹漢中者惟子午谷在長安正南其次向西則駱谷此蝕中若非駱谷卽是子午谷拜信為大將軍問以計䇿信對曰云云臣召南按此段語史記但曰韓信與韓王信傳一字不易其上亦無拜大將軍明文似此策本出於韓王信也漢書韓王信傳直用史記而高紀以為淮隂語自相矛盾矣繕治河上塞注臣召南按河上塞卽河上郡之北境與匈奴邊界處非秦時䝉恬所取河南地因河為塞者也蓋自諸侯叛秦匈奴復稍度河南與中國界於故塞匈奴傳可証也河上郡後為馮翊前卽塞王國此時初得其地卽復繕治障塞耳晉灼注以遠在朔方五原者解之非也大戰彭城靈壁東大戰監本訛大敗從宋本改正置河上渭南中地隴西上郡臣召南按史記置郡卽在二年歲首蓋不待章邯自殺其地已入漢也此紀敘於六月蓋因廢邱旣降而總言之割鴻溝以西為漢注監本注後有索隱引張華及北征記一段按此宋本所無而監本自增者也凡索隱說已見史記不當附麗於此今從宋本刪之前漢書卷一上考證欽定四庫全書前漢書卷一下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注高帝紀第一下五年冬十月漢王追項羽至陽夏南師古曰夏音工雅反已解於上止軍與齊王信魏相國越期會擊楚至固陵晉灼曰即固始也師古曰後改為固始耳地理志固始屬淮陽劉攽曰予謂楚字句當斷至固陵不會為句不會楚擊漢軍大破之漢王復入壁深塹而守謂張良曰諸侯不從奈何良對曰楚兵且破未有分地李竒曰信越等未有益地之分師古曰分音扶問反其不至固宜師古曰理宜然也君王能與共天下可立致也師古曰共有天下之地割而封之齊王信之立非君王意信亦不自堅師古曰因信自請為假王乃立之耳故曰非君王意彭越本定梁地始君王以魏豹故拜越為相國今豹死越亦望王而君王不早定今能取睢陽以北至穀城皆以王彭越師古曰睢音雖從陳以東傅海與齊王信師古曰傅讀曰附信家在楚其意欲復得故邑能出捐此地以許兩人師古曰捐棄也音弋全反使各自為戰則楚易敗也於是漢王發使使韓信彭越至皆引兵來十一月劉賈入楚地圍壽春漢亦遣人誘楚大司馬周殷殷畔楚以舒屠六如淳曰以舒之衆屠破六縣師古曰六者縣名即上所謂九江王都六者也後屬廬江郡舉九江兵迎黥布並行屠城父如淳曰並行並擊也師古曰城父縣名父音甫隨劉賈皆會十二月圍羽垓下應劭曰垓音該李竒曰沛洨縣聚邑名也師古曰洨音衡交反羽夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也漢已略得其地故楚歌者多雞鳴時歌也師古曰楚歌者為楚人之歌猶言呉歈越吟耳若以雞鳴為歌曲之名於理則可不得云雞鳴時也高祖令戚夫人楚舞自為作楚歌豈亦雞鳴時乎知盡得楚地羽與數百騎走是以兵大敗灌嬰追斬羽東城晉灼曰九江縣楚地悉定獨魯不下漢王引天下兵欲屠之為其守節禮義之國乃持羽頭示其父兄魯乃降初懷王封羽為魯公及死魯又為之堅守故以魯公葬羽於穀城師古曰即濟北穀城漢王為發喪哭臨而去師古曰臨音力禁反封項伯等四人為列侯賜姓劉氏師古曰皆羽之族先有功於漢者諸民略在楚者皆歸之漢王還至定陶馳入齊王信壁奪其軍初項羽所立臨江王共敖前死子尉嗣立為王不䧏遣盧綰劉賈擊虜尉春正月追尊兄伯號曰武哀侯應劭曰兄伯早亡追諡之下令曰楚地已定義帝亡後欲存恤楚衆以定其主齊王信習楚風俗更立為楚王師古曰更改也王淮北都下邳魏相國建城侯彭越勤勞魏民卑下士卒師古曰言安輯魏地保其人衆也下音胡稼反常以少擊衆數破楚軍其以魏故地王之號曰梁王都定陶又曰兵不得休八年萬民與苦甚如淳曰與音相干與之與師古曰音弋庶反劉攽曰與讀曰歟助辭今天下事畢其赦天下殊死以下如淳曰死罪之明白也左傳曰斬其木而弗殊韋昭曰殊死斬刑也師古曰殊絶也異也言其身首離絶而異處也劉攽曰予按說文漢蠻夷長有罪當殊之然則殊自死刑之名也於是諸侯上疏曰楚王韓信韓王信淮南王英布梁王彭越故衡山王呉芮張晏曰漢元年項羽立芮為衡山王後又奪之地謂之番君是以曰故趙王張敖燕王臧荼昧死再拜言張晏曰秦以為人臣上書當言昧犯死罪而言漢遂遵之大王陛下應劭曰陛者升堂之陛王者必有執兵陳於階陛之側羣臣與至尊言不敢指斥故呼在陛下者而告之因卑以逹尊之意也若今稱殿下閣下侍者執事皆此類也先時秦為亡道天下誅之大王先得秦王定關中於天下功最多存亡定危救敗繼絶以安萬民功盛德厚又加惠於諸侯王有功者使得立社稷地分已定而位號比儗亡上下之分師古曰言大王與臣等並稱王是為比類相儗無尊卑之差别也地分音扶問反大王功德之著於後世不宣師古曰言位號不殊則功德之著明者不宣於後世也昧死再拜上皇帝尊號漢王曰寡人聞帝者賢者有也師古曰言賢德之人乃可有帝號虚言亡實之名非所取也今諸侯王皆推高寡人將何以處之哉諸侯王皆曰大王起於細㣲滅亂秦威動海内又以辟陋之地師古曰辟讀曰僻自漢中行威德誅不義立有功平定海内功臣皆受地食邑非私之也大王德施四海諸侯王不足以道之居帝位甚實宜願大王以幸天下晉灼曰漢儀注民臣被其德以為僥倖也師古曰幸者吉而免凶可慶幸也故福喜之事皆稱為幸而死謂之不幸漢王曰諸侯王幸以為便於天下之民則可矣於是諸侯王及太尉長安侯臣綰等三百人師古曰綰盧綰也與博士稷嗣君叔孫通孟康曰稷嗣邑名謹擇良日二月甲午上尊號漢王即皇帝位于氾水之陽張晏曰在濟隂界取其氾愛𢎞大而潤下也師古曰據叔孫通傳曰為皇帝於定陶則此水在濟隂是也音敷劒反尊王后曰皇后太子曰皇太子追尊先媼曰昭靈夫人詔曰如淳曰詔告也自秦漢以下唯天子獨稱之故衡山王呉芮與子二人兄子一人從百粵之兵服䖍曰非一種若今言百蠻也以佐諸侯誅暴秦有大功諸侯立以為王項羽侵奪之地謂之番君師古曰番音蒲何反其以長沙豫章象郡桂林南海立番君芮為長沙王臣瓚曰茂陵書象郡治臨塵去長安萬七千五百里文穎曰桂林今鬱林也師古曰桂林今之桂州境界左右皆是其地非鬱林也劉攽曰長沙封國本無豫章豫章屬淮南檢後十二年注文穎所説疑此豫章字傳寫誤加之又曰故粵王亡諸世奉粵祀秦侵奪其地使其社稷不得血食師古曰祭者尚血腥故曰血食也諸侯伐秦亡諸身帥閩中兵以佐滅秦如淳曰閩音緡應劭曰音文飾之文師古曰閩越今泉州建安是其地也其人本蛇種故其字從虫如音是也虫音許尾反項羽廢而弗立今以為閩粤王王閩中地勿使失職帝乃西都洛陽夏五月兵皆罷歸家詔曰諸侯子在關中者復之十二歲師古曰復音方目反宋祁曰諸侯子謂諸侯國人若楚子之類其歸者半之師古曰各巳還其本土者復六歲也民前或相聚保山澤不書名數師古曰保守也安也守而安之以避難也名數謂户籍也今天下已定令各歸其縣復故爵田宅師古曰復還也音扶目反吏以文法敎訓辨告勿笞辱師古曰辨告者分别義理以曉喻之宋祁曰南本辨告作辭告非是民以饑餓自賣為人奴婢者皆免為庶人軍吏卒會赦其亡罪而亡爵及不滿大夫者皆賜爵為大夫如享曰軍吏卒㑹赦得免罪及本無罪而無爵級者皆賜爵為大夫師古曰大夫第五爵也劉攽曰予謂有罪者會赦免罪而已不得賜爵也亡罪乃得為大夫耳故大夫以上賜爵各一級師古曰就加之也級等也其七大夫以上皆令食邑臣瓚曰秦制列侯乃得食邑今七大夫以上皆食邑所以寵之也師古曰七大夫公大夫也爵第七故謂之七大夫非七大夫以下皆復其身及户勿事應劭曰不輸户賦也如淳曰事謂役使也師古曰復其身及一户之内皆不徭賦也復音扶目反又曰七大夫公乘以上皆高爵也師古曰公乘第八爵諸侯子及從軍歸者劉攽曰諸侯子總謂諸侯國人及字後人妄加之甚多高爵吾數詔吏先與田宅及所當求於吏者亟與師古曰亟急也音居力反爵或人君上所尊禮師古曰爵高有國邑者則自君其人故云或人君也上謂天子久立吏前曾不為決師古曰有辨訟及陳請者不早為決斷甚亡謂也師古曰亡謂者失於事宜不可以訓異日秦民爵公大夫以上令丞與亢禮應劭曰言從公大夫以上民與令丞亢禮亢禮者長揖不拜師古曰異日猶言往日也亢者當也言高下相當無所卑屈不獨謂揖拜也今吾於爵非輕也吏獨安取此師古曰於何得此輕爵之法也且法以有功勞行田宅蘇林曰行音行酒之行猶付與也今小吏未嘗從軍者多滿如淳曰多自滿足也而有功者顧不得師古曰顧猶反也言若人反顧然背公立私守尉長吏敎訓甚不善師古曰守郡守也尉郡尉也長吏謂縣之令長其令諸吏善遇高爵稱吾意師古曰稱副也且亷問有不如吾詔者以重論之師古曰亷察也亷字本作覝其音同耳帝置酒雒陽南宫上曰如淳曰蔡邕云上者尊位所在也但言上不敢言尊號耳通侯諸將應劭曰舊曰徹侯避武帝諱曰通侯通亦徹也通者言其功德通於王室也張晏曰後改為列侯列者見序列也毋敢隱朕如淳曰朕我也蔡邕曰古者上下共之咎繇與帝舜言稱朕屈原曰朕皇考至秦獨以為尊稱漢遂因之而不改也皆言其情吾所以有天下者何項氏之所以失天下者何高起王陵對曰張晏曰詔使高官者起故陵先對孟康曰姓高名起臣瓚曰漢帝年紀高帝時有信平侯臣陵都武侯臣起魏相邴吉奏高帝時奏事有將軍臣陵臣起師古曰張説非也若言髙官者起則丞相蕭何太尉盧綰及張良陳平之屬時皆在陵上陵不得先對也陛下嫚而侮人師古曰嫚易也讀與慢同項羽仁而敬人然陛下使人攻城略地所降下者因以與之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中决勝千里之外吾不如子房塡國家撫百姓給餉餽不絶糧道吾不如蕭何師古曰塡與鎭同鎮安也餽亦饋字連百萬之衆戰必勝攻必取宋祁曰南本作戰必取勝攻必取㨗吾不如韓信三者皆人傑吾能用之師古曰傑言桀然獨出也此吾所以取天下者也項羽有一范增而不能用此所以為我禽也羣臣説服師古曰説讀曰悦宋祁曰此所以此字下疑有其字初田横歸彭越項羽已滅横懼誅與賔客亡入海上恐其久為亂遣使者赦横曰横來大者王小者侯師古曰大者謂其長率卽横身也小者謂其從屬也不來且發兵加誅横懼乘傳詣雒陽如淳曰律四馬高足為置傳四馬中足為馳傳四馬下足為乘傳一馬二馬為軺傳急者乘一乘傳師古曰傳者若今之驛古者以車謂之傳車其後又單置馬謂之驛騎傳音張戀反未至三十里自殺上壯其節為流涕發卒二千人以王禮葬焉戍卒婁敬求見説上曰陛下取天下與周異而都雒陽不便不如入關據秦之固上以問張良良因勸上是日車駕西都長安師古曰凡言車駕者謂天子乘車而行不敢指斥也是日卽其日也著是日者言從善之速也長安本秦之鄉名高祖作都焉拜婁敬為奉春君張晏曰春歲之始也今婁敬發事之始故號曰奉春君也賜姓劉氏六月壬辰大赦天下秋七月燕王臧荼反上自將征之九月虜荼詔諸侯王視有功者立以為燕王荆王臣信等十人如淳曰荆亦楚也賈逵曰秦莊襄王名楚故改諱荆遂行於世晉灼曰詩曰奮伐荆楚自秦之先故以稱荆也師古曰晉説是也左傳又云荆尸而舉亦已久矣皆曰太尉長安侯盧綰功最多請立以為燕王使丞相噲將兵平代地宋祁曰噲是時未為丞相百官表噲未嘗為相利幾反上自擊破之利幾者項羽將羽敗利幾為陳令降上侯之潁川上至雒陽舉通侯籍召之蘇林曰都以侯籍召之而利幾恐反師古曰普召通侯而利幾自以項羽將故恐懼而反也後九月徙諸侯子關中治長樂宫六年冬十月令天下縣邑城張晏曰皇后公主所食曰邑令各自築其城也師古曰縣之與邑皆令築城人告楚王信謀反上問左右左右爭欲擊之用陳平計乃偽游雲夢韋昭曰在南郡之華容也師古曰夢讀如本字又音莫風反十二月會諸侯于陳楚王信迎謁因執之詔曰天下旣安豪桀有功者封侯新立未能盡圖其功師古曰新立言新卽帝位也圖謂謀而賞之身居軍九年或未習法令或以其故犯法韋昭曰言未習知法令而犯之者有司因以故犯法之罪罪之故帝愍焉師古曰此説非也言以未習法令之故不知避罪遂致犯刑帝原其本情故加憐之大者死刑吾甚憐之其赦天下田肯賀上曰甚善陛下得韓信又治秦中師古曰治謂都之也秦中謂關中秦地也秦形勝之國也張晏曰得形勢之勝便也韋昭曰地形險固故能勝人帶河阻山縣隔千里鄭氏曰縣音懸師古曰此本古之懸字耳後人轉用為州縣字乃更加心以别之非當借音他皆類此持㦸百萬秦得百二焉應劭曰言河山之險與諸侯相縣隔絶千里也所以能禽諸侯者得天下之利百二也李斐曰山川之險由地勢高順流而下易故天下於秦縣隔千里也持㦸百萬秦得百二焉蘇林曰百二得百中之二二萬人也秦地險固二萬人足當諸侯百萬人也師古曰縣隔千里李應得之秦得百二蘇說是也地埶便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水瓶也居高屋之上而幡瓴水言其向下之勢易也建音蹇蘇林曰瓴讀曰鈴師古曰如蘇音説皆是建音居偃反夫齊東有琅邪即墨之饒師古曰二縣近海財用之所出南有泰山之固西有濁河之限晉灼曰齊西有平原河水東北過高唐高唐即平原也孟津號黄河故曰濁河也北有勃海之利地方二千里持㦸百萬縣隔千里之外齊得十二焉應劭曰齊得十之二耳故愍王稱東帝後復歸之卒為秦所滅者利鈍之勢異也李斐曰齊有山河之限地方二千里是與天下縣隔也設有持㦸百萬之衆齊得十中之二焉百萬十分之二亦二十萬也但文相避故言東西秦其勢敵也蘇林曰十二得十中之二二十萬人當百萬言齊雖固不如秦二萬乃當百萬也晉灼曰案文攷義蘇説是也師古曰蘇晉之釋得其意也秦得百二者二萬人當諸侯百萬人也齊得十二者二十萬人當諸侯百萬也所以言縣隔千里之外者除去秦地而齊乃與諸侯計利便也宋祁曰景德本蘇林注文云十二得十中之二萬人無二十當百萬五字景祐刋誤本據史記注當作二十萬人當百萬又余以為若蘇説已明顏安得更於下解云齊得十二者二十萬人當諸侯百萬也此東西秦也劉攽曰按文多西字非親子弟莫可使王齊者上曰善賜金五百斤上還至雒陽赦韓信封為淮隂侯甲申始剖符封功臣曹參等為通侯師古曰剖破也與其合符而分授之也剖音普口反詔曰齊古之建國也今為郡縣其復以為諸侯師古曰為國以封諸侯王將軍劉賈數有大功及擇寛惠修絜者王齊荆地春正月丙午韓王信等奏請以故東陽郡鄣郡呉郡五十三縣立劉賈為荆王文穎曰東陽今下邳也鄣郡今丹陽也呉郡本會稽也韋昭曰鄣郡今故鄣縣也後郡徙丹陽轉以為縣故謂之故鄣也師古曰鄣音章劉攽曰按地理志東陽鄣呉皆非秦郡後漢順帝時始分會稽為呉今此文殊不可曉以碭郡薛郡郯郡三十六縣立弟文信君交為楚王文頴曰薛郡今魯國是也郯郡今東海郡也師古曰郯音談劉攽曰郯亦非秦郡壬子以雲中鴈門代郡五十三縣立兄宜信侯喜為代王以膠東膠西臨淄濟北博陽城陽郡七十三縣立子肥為齊王劉攽曰膠東濟北皆項氏所建國齊都臨淄可以齊為臨淄膠西則未有國博陽城陽亦非秦郡此文亦殊不可曉以太原郡三十一縣為韓國徙韓王信都晉陽上已封大功臣三十餘人其餘爭功未得行封上居南宫從復道上如淳曰復音複上下有道故謂之復見諸將往往耦語以問張良良曰陛下與此屬共取天下今已為天子而所封皆故人所愛所誅皆平生仇怨今軍吏計功以天下為不足用徧封師古曰言有功者多而土地少而恐以過失及誅故相聚謀反耳上曰為之奈何良曰取上素所不快師古曰言有舊嫌者也計羣臣所共知最甚者一人先封以示羣臣三月上置酒封雍齒因趣丞相急定功行封師古曰趣讀曰促罷酒羣臣皆喜曰雍齒且侯吾屬亡患矣上歸櫟陽五日一朝太公太公家令説太公曰天亡二日土亡二王皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公擁彗李竒曰為恭也如令卒持帚也師古曰彗者所以掃也音似歲反迎門郤行師古曰郤退而行也音丘略反上大驚下扶太公太公曰帝人主奈何以我亂天下法於是上心善家令言師古曰晉太子庶子劉寳云善其發悟已心因得尊崇父號非善其令父敬已賜黄金五百斤夏五月丙午詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也前日天下大亂兵革並起萬民苦殃朕親被堅執鋭師古曰被堅謂甲胄也執鋭謂利兵也被音皮義反自帥士卒犯危難平暴亂立諸侯偃兵息民天下大安此皆太公之敎訓也諸王通侯將軍羣卿大夫已尊朕為皇帝而太公未有號今上尊太公曰太上皇師古曰太上極尊之稱也皇君也天子之父故號曰皇不預治國故不言帝也蔡邕云不言帝非天子也又案本紀秦始皇追尊莊襄為太上皇已有故事矣蓋太上者無上也皇者德大於帝秋九月匈奴圍韓王信於馬邑信降匈奴七年冬十月上自將擊韓王信於銅鞮師古曰縣名也鞮音丁奚反斬其將信亡走匈奴與其將曼丘臣王黄師古曰姓曼丘名臣也曼丘母丘本一姓也語有緩急耳曼音萬朱子文曰考其文理意義於信亡走匈奴句下多一與字旣云信與其將共立趙利為王如何却云收信散兵信字不當下矣又信本傳拘於紀文亦多一與字便無義理傳云信亡走云云又曰復收信散兵而與信及冒頓謀攻漢旣云信與其將立趙利為王如何又云收信散兵而與信以此觀之信旣亡走匈奴兵亂未知所在其將乃共立趙利為王收信散兵與匈奴共距漢若去一與字紀傳皆分明共立故趙後趙利為王師古曰故趙六國時趙也收信散兵與匈奴共距漢上從晉陽連戰乘勝逐北至樓煩會大寒士卒墮指者什二三師古曰十人之中二三墮指遂至平城為匈奴所圍七日用陳平秘計得出應劭曰陳平使畫工圖美女間遣人遺閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪巳寵因謂單于曰漢天子亦有神靈得其土地非能有也於是匈奴開其一角得突出鄭氏曰以計鄙陋故秘不傳師古曰應氏之説出桓譚新論蓋譚以意測之事當然耳非記傳所説也使樊噲留定代地十二月上還過趙不禮趙王是月匈奴攻代代王喜棄國自歸雒陽赦為合陽侯辛卯立子如意為代王春令郎中有罪耐以上請之應劭曰輕罪不至于髠完其耏鬢故曰耏古耐字從彡髪膚之意也杜林以為法度之字皆從寸後改如是言耐罪已上皆當先請也耐音若能如淳曰耐猶任也任其事也師古曰依應氏之説耏當音而如氏之解則音乃代反其義亦兩通耏謂頰旁毛也彡毛髪貎也音所亷反又先亷反而功臣侯表宣曲侯通耏為鬼薪則應氏之説斯為長矣宋祁曰師古曰依應氏之説又云彡毛髮貎余以顔氏之説似不審應意反誤引説文不了其義更有兩通之語且今説文耏無而音止於乃代一音耳案古者能字皆作耐字亦取堪任其事之意後世以三足之能為能故今人書能無有作耐字者應云耐音若能之能能耐自然聲近矣本不為而音也顔云耐謂頰旁毛據説文自訓而字為頰毛耳象毛之形至耐字直釋云罪不至髠則顏謬意而誤説文明矣民産子復勿事二歲師古曰勿事不役使也二月至長安蕭何治未央宫立東闕北闕前殿武庫太倉師古曰未央殿雖南嚮而上書奏事謁見之徒皆詣北闕公車司馬亦在北焉是則以北闕為正門而又有東門東闕至於西南兩面無門闕矣蓋蕭何初立未央宫以厭勝之術理宜然乎上見其壯麗甚怒謂何曰天下匈匈勞苦數歲成敗未可知師古曰匈匈喧擾之意是何治宫室過度也何曰天下方未定故可因以就宫室師古曰就成也且夫天子以四海為家非令壯麗亡以重威且亡令後世有以加也上説師古曰説讀曰悦自櫟陽徙都長安置宗正官以序九族夏四月行如雒陽師古曰如往也八年冬上東擊韓信餘冦於東垣孟康曰眞定也師古曰垣音轅還過趙趙相貫高等恥上不禮其王隂謀欲弑上上欲宿心動問縣名何曰柏人上曰柏人者廹於人也去弗宿十一月令士卒從軍死者為槥服䖍曰槥音衛應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺葬具如淳曰棺音貫謂棺斂之服也臣瓚曰初以槥致其尸於家縣官更給棺衣更斂之也金布令曰不幸死死所為櫝傳歸所居縣賜以衣棺也師古曰初為槥櫝至縣更給衣及棺備其葬具耳不勞改讀音為貫也金布者令篇名若今言倉庫令也祠以少牢長吏視葬十二月行自東垣至師古曰至京師春三月行如雒陽令吏卒從軍至平城及守城邑者如淳曰平城左右諸城能堅守者皆復終身勿事師古曰復音方目反爵非公乘以上毋得冠劉氏冠文穎曰即竹皮冠也賈人毋得衣錦繡綺縠絺紵罽操兵乘騎馬師古曰賈人坐販賣者也綺文繒也卽今之細綾也絺細葛也紵織紵為布及疏也罽織毛若今毼及氍毹之類也操持也兵凡兵器也乘駕車也騎單騎也賈音古絺音丑知反紵音佇罽音居例反操音千高反秋八月吏有罪未發覺者赦之九月行自雒陽至淮南王梁王趙王楚王皆從九年冬十月淮南王梁王趙王楚王朝未央宫置酒前殿上奉玉巵應劭曰飲酒禮器也古以角作受四升古巵字作觝晉灼曰音支師古曰巵飲酒圓器也今尚有之為太上皇壽師古曰進酒而獻壽也已解於上曰始大人常以臣亡賴應劭曰頼者恃也晉灼曰許愼云賴利也無利入於家也或曰江淮之間謂小兒多詐狡獪為亡賴師古曰晉説是也獪音工外反不能治産業不如仲力服䖍曰力勤力也今某之業所就孰與仲多師古曰就成也與亦如也殿上羣臣皆稱萬歲大笑為樂十一月徙齊楚大族昭氏屈氏景氏懐氏田氏五姓關中與利田宅師古曰利謂便好也屈音九勿反十二月行如雒陽貫高等謀逆發覺逮捕高等師古曰逮捕謂事相連及者皆捕之也一曰在道守禁相屬不絶若今之傳送囚耳劉攽曰予謂逮者其人存直追取之捕者其人亡當討捕也故有或但言逮或但言捕知異物也一云逮易辭捕加力也逮徒呼名召之捕加束縳矣并捕趙王敖下獄詔敢有隨王罪三族張晏曰父母兄弟妻子也如淳曰父族母族妻族也師古曰如説是也郎中田叔孟舒等十人自髠鉗為王家奴師古曰鉗以鐵束頸也音其炎反從王就獄王實不知其謀春正月廢趙王敖為宣平侯徙代王如意為趙王王趙國丙寅前有罪殊死已下皆赦之二月行自雒陽至賢趙臣田叔孟舒等十人召見與語漢廷臣無能出其右者師古曰古者以右為尊言材用無能過之者故云不出其右也他皆類此劉攽曰予謂右者居則貴左用兵則貴右貴右似戰國時俗也上説師古曰説讀曰悦盡拜為郡守諸侯相夏六月乙未晦日有蝕之十年冬十月淮南王燕王荆王梁王楚王齊王長沙王來朝夏五月太上皇后崩如淳曰王陵傳楚取太上皇吕后為質又項羽歸太公吕后不見歸媼也又上五年追尊母媼為昭靈夫人高后時乃追尊為昭靈后耳漢儀注高帝母兵起時死小黄北後於小黄作陵廟以此二者推之不得有太上皇后崩也李竒曰高祖後母也晉灼曰五年追尊先媼曰昭靈夫人言追尊則明其已亡史記十年春夏無事七月太上皇崩葬櫟陽宫無此夏五月太上皇后崩八字也又漢儀注先媼巳葬陳留小黄師古曰如晉二說皆得之無此太上皇后也諸家之説更有異端適為煩穢不足采也秋七月癸卯太上皇崩葬萬年師古曰三輔黄圖云高祖初居櫟陽故太上皇因在櫟陽十年太上皇崩葬其北原起萬年邑置長丞也赦櫟陽囚死罪已下臣瓚曰萬年陵在櫟陽縣界故特赦之宋祁曰已當作以八月令諸侯王皆立太上皇廟于國都蔡邕曰皇子封為王者實古諸侯加號稱王故云諸侯王封為侯者謂之諸侯九月代相國陳豨反鄧展曰東海人名豬曰豨師古曰豨音許豈反上曰豨嘗為吾使甚有信師古曰為音于偽反代地吾所急故封豨為列侯以相國守代今乃與王黄等劫掠代地吏民非有罪也能去豨黄來歸者皆舍之師古曰去謂棄離之而來也上自東至邯鄲上喜曰豨不南據邯鄲而阻漳水宋祁曰而舊本作北刋誤據史記改為而然據漳水不在北也吾知其亡能為矣趙相周昌奏常山二十五城亡其二十城請誅守尉師古曰守者郡守尉者郡尉也上曰守尉反乎對曰不上曰是力不足亡罪上令周昌選趙壯士可令將者白見四人師古曰白於天子而召見也上嫚罵曰師古曰嫚者渫汙也豎子能為將乎四人慚皆伏地上封各千户以為將左右諌曰從入蜀漢伐楚賞未徧行今封此何功上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徵天下兵未有至者師古曰檄者以木簡為書長尺二寸用徵召也其有急事則加以鳥羽揷之示速疾也魏武奏事云今邊有警輙露檄插羽檄音胡歴反今計唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟皆曰善又求樂毅有後乎師古曰樂毅戰國時燕將也得其孫叔封之樂鄉號華成君問豨將皆故賈人上曰吾知與之矣師古曰與如也言能如之何也劉攽曰與猶待也劉敞曰知與之者知所以與之之術也豨將皆故賈人賈人嗜利乃多以金購之宋祁曰吾知與之矣南本知字下有易字乃多以金購豨將師古曰購設賞募也音搆豨將多降十一年冬上在邯鄲豨將侯敞將萬餘人游行王黄將騎千餘軍曲逆文穎曰今中山蒲隂是也張春將卒萬餘人度河攻聊城師古曰即今博州聊城縣漢將軍郭蒙與齊將擊大破之太尉周勃道太原入定代地師古曰道由太原也至馬邑馬邑不下攻殘之師古曰殘謂多所殺戮也宋祁曰馬邑或作高邑豨將趙利守東垣高祖攻之不下卒罵上怒城降卒罵者斬之諸縣堅守不降反冦者復租賦三歲春正月淮隂侯韓信謀反長安夷三族將軍柴武斬韓王信於參合師古曰代之縣也上還雒陽詔曰代地居常山之北與夷狄邊趙乃從山南有之遠數有胡冦難以為國頗取山南太原之地益屬代師古曰少割以益之不盡取也頗音普我反後皆類此代之雲中以西為雲中郡則代受邊冦益少矣王相國通侯吏二千石擇可立為代王者燕王綰相國何等三十三人皆曰子恒賢知溫良請立以為代王都晉陽如淳曰文紀言都中都又文帝過太原復晉陽中都二歲似遷都於中都也大赦天下二月詔曰欲省賦甚師古曰意甚欲省賦斂也今獻未有程師古曰程法式也吏或多賦以為獻而諸侯王尤多民疾之師古曰諸侯王賦其國中以為獻物又多於郡故百姓疾苦之令諸侯王通侯常以十月朝獻及郡各以其口數率師古曰率計也劉攽曰率當屬下句大率也人歲六十三錢以給獻費又曰蓋聞王者莫高於周文伯者莫高於齊桓師古曰伯讀曰霸皆待賢人而成名今天下賢者智能豈特古之人乎師古曰特獨也患在人主不交故也士奚由進師古曰奚何也今吾以天之靈賢士大夫定有天下以為一家欲其長久世世奉宗廟亡絶也賢人已與我共平之矣而不與吾共安利之可乎賢士大夫有肯從我遊者吾能尊顯之布告天下使明知朕意御史大夫昌下相國臣瓚曰周昌已為趙相御史大夫是趙堯耳相國酇侯下諸侯王臣瓚曰茂陵書何封國在南陽酇音贊師古曰瓚説是也而或云何封沛郡酇縣音才何反非也案地理志南陽酇縣云侯國沛酇縣不云侯國也又南陽酇者本是春秋時隂國所謂遷隂于下隂者也今為襄州隂城縣有酇城城西見有蕭何廟彼土又有筑水筑水之陽古曰筑陽縣與酇側近連接據何本傳何薨之後子祿無嗣高后封何夫人同為酇侯小子延為筑陽侯孝文罷同更封延為酇侯是知何封酇國兼得筑陽此明驗也但酇字别有音是以沛之縣史記漢書皆作酇字明其音同也班固泗水亭碑以蕭何相國所封與何同韻於義無爽然其封邑實在南陽非沛縣也且地理志云王莽改沛酇曰贊治然則沛酇亦有贊音酇相亂無所取信也説者又引江統徂淮賦以為證此乃統之疏謬不可考覈亦猶潘岳西征以陜之曲沃為成師所居耳斯例甚多不可具載御史中執法下郡守晉灼曰中執法中丞也其有意稱明德者必身勸為之駕文穎曰有賢者郡守身自往勸勉令至京師駕車遣之遣詣相國府署行義年蘇林曰行狀年紀也劉攽曰義讀曰儀儀謂儀容其年若曰團貌矣有而弗言覺免年老癃病勿遣師古曰癃疲病也音隆三月梁王彭越謀反夷三族師古曰夷平也謂盡誅除之詔曰擇可以為梁王淮陽王者燕王綰相國何等請立子恢為梁王子友為淮陽王罷東郡頗益梁罷潁川郡頗益淮陽夏四月行自雒陽至令豐人徙關中者皆復終身應劭曰太上皇思土欲歸豐高祖乃更築城寺市里如豐縣號曰新豐徙豐民以充實之師古曰徙豐人所居卽今之新豐古城是其處復音方目反五月詔曰粤人之俗好相攻擊前時秦徙中縣之民南方三郡如淳曰中縣之民中國縣民也秦始皇略取彊梁地以為桂林象郡南海郡故曰三郡使與百粤雜處李竒曰欲以介其間使不相攻擊也會天下誅秦南海尉它居南方長治之晉灼曰長音長吏之長師古曰它古佗字也書本亦或作他並音徒何反它者南海尉之名也姓趙長治謂為之長帥而治理之也甚有文理中縣人以故不耗減師古曰耗損也音火到反粤人相攻擊之俗益止俱賴其力今立它為南粤王使陸賈即授璽綬師古曰即就也就其所居而立之它稽首稱臣六月令士卒從入蜀漢闗中者皆復終身師古曰復音方目反秋七月淮南王布反上問諸將滕公言故楚令尹薛公有籌䇿上召見薛公言布形埶上善之封薛公千户詔王相國擇可立為淮南王者羣臣請立子長為王上乃發上郡北地隴西車騎巴蜀材官及中尉卒三萬人應劭曰材官有材力者張晏曰材官騎士習射御騎馳戰陳常以八月太守都尉令長丞會都試課殿最水處則習船邊郡將萬騎行障塞光武時省韋昭曰中尉卽執金吾也為皇太子衛軍霸上布果如薛公言東擊殺荆王劉賈劫其兵度淮擊楚楚王交走入薛上赦天下死罪以下皆令從軍徵諸侯兵上自將以擊布十二年冬十月上破布軍于會缶孟康曰音儈保邑名屬沛國蘄縣蘇林曰缶音晉灼曰蘄縣鄉名也師古曰會音工外反缶音丈瑞反蘇音是也此字本作而轉寫者誤為缶字耳音保非也黥布傳則正作字此足明其不作缶也布走令别將追之上還過沛留置酒沛宫悉召故人父老子弟佐酒應劭曰助行酒發沛中兒得百二十人敎之歌酒酣師古曰酣洽也音胡甘反上擊筑鄧展曰筑音竹應劭曰狀似琴而大頭安絃以竹擊之故名曰筑師古曰今筑形似瑟而細頸也自歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和習之師古曰和音胡卧反上乃起舞忼慨傷懐師古曰忼音口朗反慨音口代反泣數行下師古曰泣目中淚也謂沛父兄曰游子悲故鄉師古曰游子行客也悲謂顧念也吾雖都關中萬歲之後吾魂魄猶思家沛宋祁曰家或作樂且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑師古曰凡言湯沐邑者謂以其賦税供湯沐之具也復其民世世無有所與師古曰復音方目反與讀曰豫沛父老諸母故人日樂飲極歡道舊故為笑樂師古曰言日日樂飲也樂並音來各反十餘日上欲去沛父兄固請上曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻如淳曰獻牛酒也師古曰之往也皆往邑西競有所獻故縣中空無人上留止張飲三日張晏曰張帷帳也師古曰張音竹亮反沛父兄皆頓首曰沛幸得復豐未得唯陛下哀矜上曰豐者吾所生長極不忘耳師古曰極至也至念之不忘也吾特以其為雍齒故反我為魏沛父兄固請之廼并復豐比沛漢别將擊布軍洮水南北蘇林曰洮音兆皆大破之追斬布番陽師古曰番音蒲何反周勃定代斬陳豨於當城韋昭曰代郡縣也詔曰呉古之建國也日者荆王兼有其地師古曰日者猶往日也今死亡後朕欲復立呉王其議可者長沙王臣等言師古曰臣者長沙王之名呉芮之子也今書本或臣下有芮字者流俗妄加也沛侯濞重厚服䖍曰濞音滂濞師古曰音普懿反請立為呉王已拜上召謂濞曰汝狀有反相因拊其背曰漢後五十年東南有亂豈汝邪應劭曰高祖有聰略反相徑可知至於東南有亂克期五十占者所知也若秦始皇東廵以厭氣後劉項起東南疑當知此耳如淳曰度其貯積足用為難又呉楚世不賔服師古曰應説是也拊謂摩循之然天下同姓一家汝愼毋反濞頓首曰不敢十一月行自淮南還過魯以太牢祠孔子十二月詔曰秦皇帝楚隱王師古曰陳勝也魏安釐王師古曰昭王之子也釐讀曰僖漢書僖諡及福禧字例多為釐齊愍王師古曰宣王之子為淖齒所殺趙悼襄王師古曰孝成王之子皆絶亡後其與秦始皇帝守冢二十家楚魏齊各十家趙及魏公子亡忌各五家師古曰亡忌即信陵君也令視其冢復亡與它事師古曰復音方目反與讀曰豫陳豨降將言豨反時燕王盧綰使人之豨所隂謀師古曰之往也上使辟陽侯審食其迎綰師古曰辟音必亦反食其音異基綰稱疾食其言綰反有端春二月使樊噲周勃將兵擊綰詔曰燕王綰與吾有故愛之如子聞與陳豨有謀吾以為亡有故使人迎綰綰稱疾不來謀反明矣燕吏民非有罪也賜其吏六百石以上爵各一級與綰居去來歸者赦之師古曰先與綰居今能去之來歸漢者赦其罪加爵亦一級詔諸侯王議可立為燕王者長沙王臣等請立子建為燕王詔曰南武侯織亦粤之世也立以為南海王文穎曰高祖五年以象郡桂林南海長沙立呉芮為長沙王象郡桂林南海屬尉佗佗未降遙虚奪以封芮耳後佗降漢十一年更立佗為南越王自此王三郡芮唯得長沙桂林零陵耳今復封織為南海王復遥奪佗一郡織未得王之劉攽曰零陵武帝始立郡文説誤矣且始敘高帝封呉芮無零陵之文疑亦傳寫妄加之三月詔曰吾立為天子帝有天下十二年于今矣與天下之豪士賢大夫共定天下同安輯之師古曰輯與集同其有功者上致之王次為列侯下乃食邑師古曰謂非列侯而特賜食邑者而重臣之親或為列侯皆令自置吏得賦斂女子公主如淳曰公羊傳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主百官表列侯所食曰國皇后公主所食曰邑帝姊妹曰長公主諸王女曰翁主師古曰如説得之天子不親主婚故謂之公主諸王即自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也高祖答項羽曰吾翁即若翁也揚雄方言云周晉秦隴謂父曰翁而臣瓚王楙或云公者比於上爵或云主者婦人尊稱皆失之劉攽曰予謂公主之稱本出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主則周之事秦不知用也古之嫁女當如周使大夫為主何不謂之夫主乎然則謂之王主者猶言王子也謂之翁主者緣公而生耳為列侯食邑者皆佩之印賜大第室孟康曰有甲乙次第故曰第也吏二千石徙之長安受小第室入蜀漢定三秦者皆世世復師古曰復音方目反吾於天下賢士功臣可謂亡負矣其有不義背天子擅起兵者與天下共伐誅之師古曰擅專也音上戰反他皆類此布告天下使明知朕意上擊布時為流矢所中行道疾疾甚吕后迎良醫醫入見上問醫曰疾可治不醫曰可治宋祁曰舊本及越本並無不醫曰可治五字於是上嫚罵之曰朱子文曰於文醫曰可治句下正不湏於是二字宜去之吾以布衣提三尺取天下師古曰三尺劒也下韓安國傳所云三尺亦同而流俗書本或云提三尺劒劒字後人所加耳此非天命乎命乃在天雖扁鵲何益韋昭曰泰山盧人也名越人魏桓侯時醫也臣瓚曰史記云齊勃海人也魏無桓侯師古曰瓚説是也扁音歩典反遂不使治疾賜黄金五十斤罷之吕后問曰陛下百歲後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇師古曰戇愚也古音下紺反今則竹巷反陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次上曰此後亦非乃所知也師古曰乃汝也言自此以後汝亦終矣不復知之盧綰與數千人居塞下候伺幸上疾愈自入謝師古曰冀得上疾愈自入謝以為己身之幸也夏四月甲辰帝崩于長樂宫臣瓚曰帝年四十二即位卽位十三年壽五十三盧綰聞之遂亡入匈奴吕后與審食其謀曰諸將故與帝為編户民師古曰編户者言列次名籍也編音鞭北靣為臣心常鞅鞅師古曰鞅鞅不滿足也音於亮反他皆類此今乃事少主非盡族是天下不安師古曰族謂族誅之是亦此也以故不發喪人或聞以語酈商酈商見審食其曰聞帝已崩四日不發喪欲誅諸將誠如此天下危矣陳平灌嬰將十萬守滎陽宋祁曰滎舊本作熒樊噲周勃將二十萬定燕代此聞帝崩諸將皆誅必連兵還鄉以攻關中師古曰鄉讀曰嚮還嚮猶言反嚮内嚮也大臣内畔諸將外反亡可蹻足待也文穎曰蹻猶翹也如淳曰蹻音如今作樂蹻行之蹻晉灼曰許愼云蹻舉足小高也音僑師古曰晉説是也審食其入言之乃以丁未發喪大赦天下五月丙寅葬長陵臣瓚曰自崩至葬凡二十三日長陵在長安北四十里已下蘇林曰下音下書之下鄭氏曰已下棺也師古曰蘇音鄭説是也下音胡亞反皇太子羣臣皆反至太上皇廟羣臣曰帝起細㣲撥亂世反之正師古曰反還也還之於正道平定天下為漢太祖功最高上尊號曰高皇帝師古曰尊號諡也初高祖不修文學而性明逹好謀能聽自監門戍卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程如淳曰章歴數之章術也程者權衡丈尺斗斛之平法也師古曰程法式也叔孫通制禮儀陸賈造新語又與功臣剖符作誓如淳曰謂功臣表誓使河如帶太山若厲國乃滅絶丹書鐵契金匱石室如淳曰金匱猶金縢也師古曰以金為匱以石為室重緘封之保愼之義藏之宗廟雖日不暇給規摹𢎞遠矣鄧展曰若畫工規模物之摹韋昭曰正員之器曰規摹者如畫工未施采事摹之矣師古曰取喻規摹謂立制垂範也給足也日不暇足言衆事繁多常汲汲也贊曰春秋晉史蔡墨有言陶唐氏既衰荀悦曰唐者帝堯有天下號陶發聲也韋昭曰陶唐皆國名猶湯稱殷商矣臣瓚曰堯初居於唐後居陶故曰陶唐也師古曰三家之説皆非也許愼説文觧字云陶丘再成也在濟隂夏書曰東至陶丘陶丘有堯城堯嘗居之後居於唐故堯號陶唐氏斯得之矣其後有劉累學擾龍事孔甲應劭曰擾馴也能順養得其嗜欲也孔甲夏天子也師古曰擾音繞又音饒范氏其後也師古曰晉司空士蒍之孫士㑹為晉大夫食采於范因號范氏而大夫范宣子亦曰祖自虞以上為陶唐氏師古曰范宣子即士會之孫士匄也在夏為御龍氏師古曰即劉累也在商為豕韋氏師古曰豕韋國名在東郡白馬縣東南在周為唐杜氏師古曰唐杜二國名也殷末豕韋徙國於唐周成王滅唐遷之於杜為杜伯杜伯之子隰叔奔晉士會即隰叔之𤣥孫也唐太原晉陽縣也杜京兆杜縣也晉主夏盟為范氏范氏為晉士師師古曰言晉為霸主諸夏之盟而范氏為晉正卿魯文公世奔秦師古曰文公六年晉襄公卒士會與先蔑如秦逆公子雍欲以為嗣七年以秦師納雍而趙宣子立靈公與秦師戰敗之于刳首先蔑奔秦士㑹從之後歸于晉其處者為劉氏師古曰文十三年晉人使魏壽餘偽以魏畔誘士會而納之秦人歸其帑其别族留在秦者既無官邑而乃復劉累之姓也劉向云戰國時劉氏自秦𫉬於魏文穎曰六國時秦伐魏劉氏隨軍為魏所𫉬故得復居魏也師古曰春秋之後周室卑微諸侯彊盛交相攻伐故總謂之戰國秦滅魏遷大梁師古曰秦昭王伐魏魏惠王棄安邑東徙大梁更號曰梁非始皇滅六國之時劉敞曰當讀云遷大梁都于豐則與下文合顔解誤矣都于豐故周市説雍齒曰豐故梁徙也是以頌高祖云漢帝本系出自唐帝降及于周在秦作劉渉魏而東遂為豐公晉灼曰渉猶入也豐公蓋太上皇父其遷日淺墳墓在豐鮮焉師古曰鮮少也音先淺反及高祖即位置祠祀官則有秦晉梁荆之巫應劭曰先人所在之國悉致祠巫祝博求神靈之意也文穎曰巫掌神之位次者也范氏世仕於晉故祠祀有晉巫范會支庶留秦為劉氏故有秦巫劉氏隨魏都大梁故有梁巫後徙豐豐屬荆故有荆巫也世祠天地綴之以祀豈不信哉師古曰綴言不絶也由是推之漢承堯運德祚已盛斷蛇著符旗幟上赤協于火德自然之應得天統矣孟康曰十一月天統物萌色赤故云得天統也臣瓚曰漢承堯緒為火徳秦承周後以火代木得天之統序故曰得天統漢初因秦正至太初元年始用夏正不用十一月為正也師古曰瓚説得之前漢書卷一下前漢書卷一下考證高帝紀下灌嬰追斬羽東城胡三省曰東城故城括地志在定遠東南五十里高起王陵對曰注魏相邴吉奏高帝時奏事臣浩按監本魏相邴吉奏下衍事字蓋涉於下文奏事而誤也今從宋本刪之邴吉依本書當作丙是日車駕西都長安臣召南按史記作是日車駕入都關中是也櫟陽長安俱是關中是日但决計入關營造長安宫殿實則仍居櫟陽故至七年二月書自櫟陽徙都長安也治長樂宫程大昌曰長樂宫本秦之興樂宫周廻二十里高祖改修而居之在長安城東隅西有濁河之限注胡三省曰孟津在河内去平原甚遠晉灼説失之拘蓋河流渾濁故謂之濁河也赦韓信封為淮隂侯臣召南按此文追叙也据功臣表曹參等以十二月甲申封而淮隂侯之封直至四月則知此文為追敘矣以故東陽郡鄣郡呉郡云云劉攽曰云云臣召南按攽所疑是也但灌嬰傳云破呉郡長呉下得呉守遂定呉豫章會稽又功臣表博陽侯周聚布反定呉郡豈項氏嘗分會稽為呉及漢定天下復合為一郡乎攽並疑鄣非秦郡非也漢之丹陽即秦之鄣郡也蕭何治未央宫胡三省曰宫在長安城西南隅周廻二十八里元和志曰東距長樂宫一里中隔武庫夏五月太上皇后通鑑考異曰荀悦漢紀五月無后字七月無崩字蓋荀悦時本尚未訛謬故也秦徙中縣之民南方三郡注如淳曰秦始皇畧取彊梁地臣召南按彊梁地當作陸梁地史記秦始皇本紀三十一年畧取陸梁地為桂林象郡南海是也宋本亦誤存説於此居南方長治之注謂為之長帥而治理之也帥字訛師理字訛李今改正漢别將擊布軍洮水南北臣召南按胡三省謂洮水當在江南甚是但即以零陵郡之洮陽當之零陵去淮南太遠與下文所云追斬布鄱陽者不合也其處者為劉氏孔穎逹左傳疏曰士會之帑在秦不顯於會之身復無所辟傳説處秦為劉氏未知何意討尋上下其文不類深疑此句或非本㫖蓋以為漢室𥘉興捐棄古學左氏不顯於世先儒無以自申劉氏從秦徙魏其源本出劉累揷注此辭將以媚於世明帝時賈逵上疏曰五經皆無證圖䜟明劉氏為堯後者而左氏獨有明文竊謂前世藉此以求道通故後引之以為證耳臣召南按孔疏所見甚卓但加此文於左傳實不始於賈逵且幷不始於哀平之世據昭帝元鳳三年符節令睦𢎞上書言漢家承堯之後則彼時左傳已有此文至劉向頌高祖曰出自唐帝王莽稱漢為堯後有傳國之運班彪王命論曰帝堯之苗裔皆在其後者也前漢書卷一下考證
