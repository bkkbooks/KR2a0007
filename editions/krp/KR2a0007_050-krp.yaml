body:
  text: 前漢書卷五十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注張馮汲鄭傳第二十張釋之字季南陽堵陽人也師古曰堵音者索隠堵韋昭音褚又音如字地名屬南陽與兄仲同居以貲為騎郎蘇林曰雇錢若出榖也如淳曰漢注貲五百萬得為常侍郎師古曰如説是也事文帝十年不得調師古曰調選也音徒釣反宋祁曰百官公卿表云孝文三年中郎将張釋之為廷尉此傳云文帝十年不得調恐必有誤也亡所知名釋之曰久宦减仲之産不遂師古曰遂猶逹宋祁曰逹字下當添也字欲免歸中郎将爰盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝曰卑之毋甚髙論師古曰令其議論依附時事也令今可行也於是釋之言秦漢之間事秦所以失漢所以興者宋祁曰漢字上當存而字所以緩其語文帝稱善拜釋之為謁者僕射從行上登虎圏師古曰圈飬獸之所也音求逺反問上林尉禽獸簿師古曰簿謂簿書也音歩户反十餘問尉左右視盡不能對師古曰視其屬官皆不能對也虎圏嗇夫從旁代尉對上所問禽獸簿甚悉師古曰悉謂詳盡也欲以觀其能口對嚮應亡窮者師古曰觀猶示也嚮讀曰響如響應聲言其疾也文帝曰吏不當如此邪尉亡頼張晏曰材無可恃也詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈效此嗇夫喋喋利口㨗給哉晉灼曰喋音牒且秦以任刀筆之吏爭以亟疾苛察相高師古曰亟急也音居力反其敝徒文具亡惻隠之實師古曰文具謂具文而已以故不聞其過陵夷至於二世天下土崩師古曰陵夷穨替也解在成紀今陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於景嚮舉錯不可不察也師古曰嚮讀曰響錯音干故反文帝曰善迺止不拜嗇夫就車召釋之驂乗徐行行問釋之秦之敝師古曰行問且行且問也具以質言如淳曰質誠也至宮上拜釋之為公車令頃之太子與梁王共車入朝不下司馬門如淳曰宮衞令諸出入殿門公車司馬門者皆下不如令罰金四兩於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝繇是奇釋之師古曰繇讀與由同拜為中大夫頃之至中郎将從行至霸陵上居外臨厠師古曰厠岸之邉側也解在劉向傳時愼夫人從上指視愼夫人新豐道曰此走邯鄲道也張晏曰慎夫人邯鄲人也如淳曰走音奏趣也師古曰視讀曰示使愼夫人鼓瑟上自倚瑟而歌李奇曰聲氣依倚瑟也師古曰倚瑟即今之以歌合曲也倚音於綺反意悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉師古曰紵音竹呂反斮音側略反左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中亡可欲雖亡石椁又何戚焉師古曰解並在劉向傳文帝稱善其後拜釋之為廷尉頃之上行出中渭橋張晏曰在渭橋中路劉奉世曰渭上有橋非一此在中故曰中渭橋張説非也有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉師古曰屬委也音之欲反次下亦同釋之治問曰縣人來如淳曰長安縣人也聞蹕匿橋下久以為行過師古曰言天子已過既出見車騎即走耳釋之奏當此人犯蹕如淳曰乙令蹕先至而犯者罰金四兩師古曰當謂處其罪也當罰金上怒曰此人親驚吾馬馬頼和柔令它馬固不敗傷我乎而廷尉迺當之罰金釋之曰法者天子所與天下公共也師古曰公謂不私也今法如是更重之是法不信於民也且方其時上使使誅之則已師古曰言初執獲此人天子即令誅之其事即畢今已下廷尉廷尉天下之平也壹傾天下用法皆為之輕重民安所錯其手足師古曰安焉也錯置也音千故反唯陛下察之上良久曰廷尉當是也其後人有盜高廟座前玉環得師古曰得者盜環之人為吏所捕得也文帝怒下廷尉治案盜宗廟服御物者為奏當棄市上大怒曰人亡道迺盜先帝器吾屬廷尉者欲致之族而君以法奏之師古曰法謂常法非吾所以共承宗廟意也師古曰共讀曰㳟釋之免冠頓首謝曰法如是足也且罪等如淳曰俱死罪也盜玉環不若盜長陵土之逆劉奉世曰此等讀如等級之等言凡罪之等差然以逆順為基宋祁曰基字上疑有本字今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土張晏曰不欲指言故以取土喻也師古曰抔音歩侯反謂手掬之也其字從手不忍言毁徹故止云取土耳今學者讀抔為杯勺之杯非也杯非應盛土之物也宋祁云新本抔作㧵陛下且何以加其法虖文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁相山都侯王恬啓見釋之持議平宋祁曰啓作咸迺結為親友張廷尉繇此天下稱之師古曰繇讀與由同文帝崩景帝立釋之恐師古曰以嘗劾帝不下司馬門稱疾欲免去懼大誅至欲見則未知何如用王生計卒見謝景帝不過也王生者善為黄老言處士嘗召居廷中公卿盡會立王生老人曰吾韤解師古曰韤音武伐反顧謂釋之為我結韤釋之跪而結之師古曰結讀曰係既已人或譲王生獨奈何廷辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉廷尉方天下名臣吾故聊使結韤欲以重之宋祁曰聊使結韤疑云聊廷使跪結韤存廷跪二字乃是詳了前語不可削也諸公聞之賢王生而重釋之釋之事景帝歲餘為淮南相猶尚以前過也年老病卒其子摯字長公官至大夫免以不能取容當世故終身不仕馮唐祖父趙人也父徙代漢興徙安陵唐以孝著為郎中署長鄭氏曰以至孝聞也師古曰以孝得為郎中而為郎署之長也著音竹助反事文帝帝輦過問唐曰父老何自為郎家安在師古曰言年已老矣何乃自為郎也崔浩以為自從也從何為郎此説非也劉敞曰按文帝問因唐遂及居代時事則何自為郎正問從何處來為郎崔説是索隠過音戈具以實言文帝曰吾居代時吾尚食監高袪數為我言趙将李齊之賢戰於鉅鹿下吾每飯食意未甞不在鉅鹿也張晏曰毎食念監所説李齊在鉅鹿時也父老知之乎唐對曰齊尚不如廉頗李牧之為将也上曰何已師古曰已猶耳唐曰臣大父在趙時為官帥将師古曰大父祖父也帥音所類反将音子亮反善李牧臣父故為代相善李齊知其為人也上既聞廉頗李牧為人良説如淳曰良善也師古曰説讀曰悦聞頗牧之善帝意大悦劉攽曰聞亷頗李牧為人即是知其實矣良説者甚喜也猶良久也迺拊髀曰師古曰髀音陛嗟乎吾獨不得廉頗李牧為将豈憂匈奴哉唐曰主臣師古曰恐懼之言解在陳平傳宋祁曰解在王陵傳注誤陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐譲曰公衆辱我獨亡閒處虖師古曰何不閒隙之處而言唐謝曰鄙人不知忌諱當是時匈奴新大入朝那殺北地都尉卬上以胡寇為意迺卒復問唐曰公何以言吾不能用頗牧也唐對曰臣聞上古王者遣将也跪而推轂曰闑以内寡人制之闑以外将軍制之韋昭曰門中橛為闑師古曰音牛列反軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙将居邉軍市之租皆自用饗士賞賜決於外不從中覆也師古曰覆謂覆白之也音芳目反委任而責成功故李牧乃得盡其知能選車千三百乗彀騎萬三千匹師古曰彀張弩也音遘百金之士十萬服䖍曰良士直百金也如淳曰黄金一斤直萬言富家子弟可任使也師古曰百金喻其貴重耳服説是也是以北逐單于破東胡滅澹林鄭氏曰澹音擔石之擔如淳曰胡也匈奴傳曰晉北有澹林之胡樓煩之戎也師古曰澹音都甘反又音談西抑彊秦南支韓魏當是時趙幾伯師古曰幾致於霸也伯讀曰霸後會趙王遷立蘇林曰趙幽王其母倡也師古曰倡樂家之女用郭開讒而誅李牧令顔聚代之宋祁曰聚一作最是以為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢服䖍曰私假錢也五日壹殺牛以饗賔客軍吏舍人是以匈奴逺避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符李竒曰尺籍所以書軍令伍符軍士五五相保之符信也如淳曰漢軍法曰吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二歲伍符亦什伍之符要節度也師古曰家人子謂庻人之家子也終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之宋祁曰繩字上疑有糾字句似長而義具其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之師古曰繇讀與由同陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝説師古曰説讀曰悦是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士服䖍曰車戰之士也十年景帝立以唐為楚相武帝即位求賢良舉唐唐時年九十餘不能為官迺以子遂為郎遂字王孫亦奇士魏尚槐里人也汲黯字長孺濮陽人也其先有寵於古之衞君也文穎曰六國時衞弱但稱君也至黯十世世為卿大夫以父任孝景時為太子洗馬孟康曰大臣任舉其子弟為官以嚴見憚武帝即位黯為謁者東粤相攻上使黯徃視之至呉而還報曰粤人相攻固其俗不足以辱天子使者河内失火燒千餘家上使黯往視之還報曰家人失火屋比延燒師古曰比近也言屋相近故連延而燒也比音頻寐反不足憂臣過河内河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟以振貧民請歸節伏矯制辠師古曰矯託也託奉制詔而行之上賢而釋之遷為滎陽令黯耻為令稱疾歸田里上聞迺召為中大夫以數切諫不得久留内遷為東海太守黯學黄老言治官民好清靜擇丞史任之如淳曰擇郡丞及史任之也鄭當時為大司農官屬丞史亦是也責大指而已不細苛黯多病臥閤内不出嵗餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法為人性倨少禮師古曰倨簡傲也音居庻反靣折不能容人之過合已者善待之不合者弗能忍見士亦以此不附焉然好游俠任氣節行修絜其諫犯主之顔色常慕傅伯爰盎之為人應劭曰傅伯梁人為孝王将素抗直也善灌夫鄭當時及宗正劉棄疾亦以數直諫不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未甞拜揖之上方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也師古曰云云猶言如此如此也史畧其辭耳黯對曰陛下内多欲而外施仁義柰何欲效唐虞之治虖上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戇也羣臣或數黯師古曰數責之音所具反黯曰天子置公卿輔弼之臣寜令從諛承意䧟主於不誼虖且已在其位縱愛身柰辱朝廷何黯多病病且滿三月上常賜告者數終不瘉如淳曰杜欽所謂病滿賜告詔恩也數者非一也師古曰數音所角反瘉與愈同最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以瘉人師古曰瘉勝也讀與愈同然至其輔少主守成雖自謂賁育弗能奪也師古曰孟賁夏育皆古之勇士也賁音奔上曰然古有社稷之臣至如汲黯近之矣大将軍青侍中上踞厠視之如淳曰厠溷也孟康曰厠床邉側也師古曰如説是也劉奉世曰厠當從孟説古者見大臣則御坐為起然則踞厠者輕之也丞相𢎞宴見上或時不冠至如見黯不冠不見也上甞坐武帳應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟説是也黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此張湯以更定律令為廷尉師古曰更改也黯質責湯於上前師古曰質對之也曰公為正卿上不能襃先帝之功業下不能化天下之邪心安國富民使囹圄空虚何空取高皇帝約束紛更之為師古曰言何為乃紛亂而改更也而公以此無種矣師古曰言當誅及子孫也黯時與湯論議湯辯常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣師古曰重累其足言懼甚也仄古側字也是時漢方征匈奴招懐四夷黯務少事間常言與胡和親毋起兵師古曰每因間隙而言也上方鄉儒術師古曰鄉讀曰嚮尊公孫𢎞及事益多吏民巧宋祁曰遷史作吏民巧弄上分别文法湯等數決讞以幸而黯常毁儒而觸𢎞等徒懐詐飾智以阿人主取容而刀筆之吏專深文巧詆師古曰詆毁辱也音丁禮反䧟人於罔以自為功上愈益貴𢎞湯𢎞湯心疾黯雖上亦不説也師古曰説讀曰悦欲誅之以事師古曰以事致其罪而誅也𢎞為丞相廼言上曰右内史界部中多貴人宗室難治非素重臣弗能任請徙黯為右内史數歳官事不廢大将軍青既益尊姊為皇后然黯與亢禮或説黯曰自天子欲令羣臣下大将軍師古曰下音胡稼反大将軍尊貴誠重君不可以不拜黯曰夫以大将軍有揖客反不重耶師古曰言能降貴以禮士最為重也大将軍聞愈賢黯數請問以朝廷所疑遇黯加於平日淮南王謀反憚黯曰黯好直諫守節死義至説公孫𢎞等如發䝉耳師古曰説音式鋭反上既數征匈奴有功黯言益不用始黯列九卿矣而公孫𢎞張湯為小吏及𢎞湯稍貴與黯同位黯又非毁𢎞湯已而𢎞至丞相封侯湯御史大夫黯時丞史皆與同列或尊用過之黯褊心不能無少望師古曰褊陿也望怨也見上言曰陛下用羣臣如積薪耳後來者居上黯罷上曰人果不可以無學觀汲黯之言日益甚矣師古曰言其鄙俚也或曰積薪之言出曽子故云不可無學也居無何匈奴渾邪王帥衆來降師古曰渾音胡昆反漢發車三萬乗縣官亡錢從民貰馬師古曰賖買也民或匿馬馬不具上怒欲斬長安令黯曰長安令亡罪獨斬臣黯民迺肯出馬且匈奴畔其主而降漢徐以縣次傳之何至令天下騷動罷中國甘心夷狄之人乎師古曰罷讀曰疲上黙然後渾邪王至賈人與市者坐當死五百餘人黯入請間見高門晉灼曰三輔黃圖未央宮中有高門殿也曰夫匈奴攻當路塞絶和親中國舉兵誅之死傷不可勝計而費以鉅萬百數師古曰即數百鉅萬也臣愚以為陛下得胡人皆以為奴婢賜從軍死者家鹵獲因與之以謝天下塞百姓之心師古曰塞滿也今縱不能渾邪帥數萬之衆來虚府庫賞賜發良民侍養若奉驕子愚民安知市買長安中而文吏繩以為䦨出財物如邉關乎應劭曰䦨妄也律胡市吏民不得持兵器及鐡出闗雖於京師市買其法一也臣瓚曰無符傳出入為闌也陛下縱不能得匈奴之贏以謝天下師古曰贏餘也音戈成反又以微文殺無知者五百餘人臣竊為陛下弗取也上弗許曰吾久不聞汲黯之言今又復妄發矣後數月黯坐小法會赦免官於是黯隠於田園者數年會更立五銖錢民多盜鑄錢者楚地尤甚上以為淮陽楚地之郊也師古曰郊謂交道衝要之處也召黯拜為淮陽太守黯伏謝不受印綬詔數強予然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下師古曰填音大賢反不意陛下復收之臣常有狗馬之心師古曰思報效今病力不能任郡事師古曰力謂甚也臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣師古曰言後即召也顧淮陽吏民不相得師古曰顧謂思念也吾徒得君重師古曰徒但也重威重也臥而治之黯既辭過大行李息曰黯棄逐居郡不得與朝廷議矣師古曰與讀曰豫然御史大夫湯智足以距諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文法師古曰舞猶弄也内懐詐以御主心外挾賊吏以為重公列九卿不早言之何師古曰言何不早言也公與之俱受其戮矣息畏湯終不敢言黯居郡如其故治淮陽政清後張湯敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽如淳曰諸侯王相在郡守上秩眞二千石律眞二千石月得百五十斛嵗凡得千八百石耳二千石月得百二十斛嵗凡得一千四百四十石耳居淮陽十歳而卒卒後上以黯故官其弟仁至九卿子偃至諸侯相黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿以河南太守卒昆弟以安故同時至二千石十人濮陽段宏始事蓋侯信服䖍曰景帝王皇后凡也信任宏蘇林曰任保舉官亦再至九卿然衞人仕者皆嚴憚汲黯出其下鄭當時字荘陳人也其先鄭君嘗事項籍籍死而屬漢髙祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時當時以任侠自喜脫張羽於阸服䖍曰梁孝王将楚相之弟也師古曰喜音許吏反脱音佗活反聲聞梁楚間孝景時為太子舍人每五日洗沬常置驛馬長安諸郊如淳曰郊交道四通處也以請賔客便臣瓚曰長安四靣郊祀之處閑静可以請賔客也師古曰二説皆非也此謂長安城外四靣之郊耳邑外謂之郊近郊二十里劉奉世曰近郊乃三十里蓋字誤然不必分别逺近請謝賔客夜以繼日至明旦常恐不徧當時好黄老言其慕長者如恐不稱師古曰恐不稱其意自見年少官薄劉攽曰其慕長者禮意不稱所自見即以為慊然自見當屬上句然其知友皆大父行天下有名之士也師古曰大父謂祖父音胡浪反武帝即位當時稍遷為魯中尉濟南太守江都相至九卿為右内史以武安魏其時議貶秩為詹事師古曰議田蚡及竇嬰事遷為大司農當時為大吏戒門下客至亡貴賤亡留門下者宋祁曰卲本無下字執賔主之禮以其貴下人性廉又不治産卬奉賜給諸公師古曰卬音牛向反奉音扶用反然其餽遺人不過具器食師古曰猶今言一盤食也每朝候上間説未嘗不言天下長者師古曰候天子間隙之時其所稱説皆言長者也其推轂士及官屬丞史誠有味其言也師古曰推轂言薦舉人如推轂之運轉也有味者其言甚羙也常引以為賢於已未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後山東諸公以此翕然稱鄭荘使視決河自請治行五日如淳曰治行謂荘嚴上曰吾聞鄭荘行千里不齎糧治行者何也然當時在朝常趨和承意師古曰趨讀曰趣趣向也和音胡臥反不敢甚斥臧否漢征匈奴招四夷天下費多財用益屈師古曰屈盡也音其勿反當時為大司農任人賔客僦晉灼曰當時為大司農而任使其賔客辜較作僦也師古曰僦謂受顧賃而載運也言當時保任其賔客於司農載運也僦音子就反入多逋負司馬安為淮陽太守發其事當時以此陷罪贖為庻人頃之守長史如淳曰丞相長史也遷汝南太守數嵗以官卒昆弟以當時故至二千石者六七人當時始與汲黯列為九卿内行修兩人中廢賔客益落師古曰落散也當時死家亡餘財先是下邽翟公為廷尉蘇林曰邽音圭京兆縣名也賔客亦塡門師古曰塡滿也音田及廢門外可設爵羅師古曰言其寂静無人行也後復為廷尉客欲往翟公大署其門師古曰署謂書之曰一死一生迺知交情一貧一富迺知交態一貴一賤交情迺見師古曰見音胡電反贊曰張釋之之守法馮唐之論将汲黯之正直鄭當時之推士不如是亦何以成名哉揚子以為孝文親詘帝尊以信亞夫之軍師古曰揚子謂揚雄也信讀曰伸曷為不能用頗牧彼将有激云爾師古曰謂馮唐欲理魏尚故以此言激文帝也前漢書卷五十前漢書卷五十考證張釋之傳尉左右視盡不能對注視其屬官盡不能對胡三省曰蓋帝問之而不能對故倉皇失措而左右視也顔注非然以順逆為基按基字史記作差文義甚明與梁相山都侯王恬啟宋祁曰啟作咸臣召南按如宋説則咸字屬下文為句也但山都侯自名恬啟史無截去人名一字之理史記以避景帝諱作王恬開注徐廣曰漢書作啟即知本文作王恬啟矣宋説無謂馮唐傳為即中署長史記作為中郎署長又父老何自為郎父老知之乎史記並無老字趙将李齊胡三省曰鉅鹿之戰當是秦将王離圍鉅鹿時軍市之租索隠曰軍中立市市有稅即租也汲黯傳至黯十世臣召南按史記作七世又治官民史記作治官理民此傳於史記本文字句多所刪節處如嚴助言黯輔少主守城深堅招之不來麾之不去雖自謂賁育弗能奪也漢書改守城為守成又删深堅以下二句黯言以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也漢書删去是所謂一句皆不如本文逺甚召為主爵都尉臣召南按公卿表黯以建元六年為主爵都尉十一年徙為右内史元朔五年也主爵都尉掌列侯居淮陽十嵗而卒史記作七嵗鄭當時傳遷為大司農臣召南按史記作遷為大農令是也當時為大農令在元光中至太初元年始改曰大司農此史文偶然失檢處也下邽翟公為廷尉臣召南按公卿表翟公為廷尉在元光五年前漢書卷五十考證
