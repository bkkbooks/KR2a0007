body:
  text: 前漢書卷二十三漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注刑法志第三夫人宵天地之䫉應劭曰宵類也頭圜象天足方象地孟康曰宵化也言禀天地氣化而生也師古曰宵義與肖同應說是也故庸妄之人謂之不肖言其狀䫉無所象似也䫉古貌字懷五常之性師古曰五常仁義禮智信聰明精粹師古曰精細也言其識性細宻也粹淳也音先遂反有生之最靈者也爪牙不足以供耆欲趨走不足以避利害師古曰耆讀曰嗜無毛羽以禦寒暑必將役物以為養任智而不恃力此其所以為貴也故不仁愛則不能羣不能羣則不勝物不勝物則養不足羣而不足爭心將作上聖卓然先行敬讓博愛之德者衆心說而從之師古曰說讀曰悅從之成羣是為君矣歸而徃之是為王矣師古曰言爭徃而歸之也洪範曰天子作民父母為天下王師古曰洪範周書也聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而乆立故制禮以崇敬作刑以明威也聖人旣躬明悊之性師古曰躬謂身親有之必通天地之心制禮作敎立法設刑動緣民情而則天象地師古曰則法也故曰先王立禮則天之明因地之性也師古曰春秋左氏傳載鄭大夫子太叔之辭也刑罰威獄以類天之震曜殺戮也師古曰震謂雷電也溫慈惠和以效天之生殖長育也書云天秩有禮天討有罪師古曰此虞書咎繇謨之辭也秩叙也言有禮者天則進叙之有罪者天則討治之故聖人因天秩而制五禮師古曰五禮吉凶賔軍嘉因天討而作五刑師古曰其說在下也大刑用甲兵張晏曰以六師誅暴亂其次用斧鉞韋昭曰斬刑也中刑用刀鋸韋昭曰刀割刑鋸刖刑也其次用鑚鑿韋昭曰鑚髕刑也鑿黥刑也師古曰鑚鑚去其髕骨也鑚音子端反髕音頻刃反薄刑用鞭扑師古曰扑杖也音普木反大者陳諸原野師古曰謂征討所殺也小者致之市朝應劭曰大夫以上尸諸朝士以下尸諸市其所繇來者上矣師古曰繇讀與由同自黄帝有涿鹿之戰以定火災鄭氏曰涿鹿在彭城南與炎帝戰炎帝火行故云火災李竒曰黄帝與炎帝戰於阪泉今言涿鹿地有二名也文頴曰國語云黄帝炎帝弟也炎帝號神農火行也後子孫暴虐黄帝伐之故言以定火災律歷志云與炎帝後戰於阪泉涿鹿在上谷今見有阪泉地黄帝祠師古曰文說是也彭城者上谷北别有彭城非宋之彭城也顓頊有共工之陳以定水害文頴曰共工主水官也少昊氏衰秉政作害顓頊伐之本主水官因為水行也師古曰共讀曰龔唐虞之際至治之極猶流共工放驩兠竄三苗殛鯀然後天下服師古曰舜受堯禪而流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山也殛誅也音居力反夏有甘扈之誓師古曰謂啓與有扈戰于甘之野作甘誓事見夏書扈國今鄠縣是也甘即甘水之上殷周以兵定天下矣師古曰謂湯及武王天下旣定戢臧干戈敎以文德師古曰戢歛也而猶立司馬之官設六軍之衆師古曰司馬夏官卿掌邦政軍旅屬焉萬二千五百人為軍王則六軍也宋祁曰萬一千邵本作萬二千因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦師古曰稅者田租也賦謂發賦歛財也宋祁曰邵姚本云發賦歛之賦也稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法鄭氏曰甲士在車上也師古曰乘音食證反其下並同一同百里提封萬井蘇林曰提音祗陳留人謂舉田為祇李竒曰提舉也舉四封之内也師古曰李說是也提讀如本字蘇音非也說者或以為積土而封謂之隄封旣改文字又失義也除山川沈斥城池邑居園囿術路三千六百井臣瓉曰沈斥水田舄鹵也如淳曰術大道也師古曰川謂水之通流者也沈謂居深水之下也斥鹹鹵之地定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也師古曰采官也因官食地故曰采地爾雅曰采寮官也說者不曉采地之義因謂菜地云以種菜非也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閱以狩師古曰振旅整衆也搜搜擇不任孕者拔舍草止不妨農也苗為苗除害也治兵觀威武也獮應殺氣也大閲簡車馬也狩火田一曰狩守也圍守而取之拔音步末反皆於農隙以講事焉師古曰隙空閑也講和習之也宋祁曰邵本習之也無之字五國為屬屬有長十國為連連有帥師古曰長音竹兩反帥音所類反三十國為卒卒有正二百一十國為州州有牧連帥比年簡車師古曰比年頻年也卒正三年簡徒師古曰徒人衆羣牧五載大簡車徒此先王為國立武足兵之大略也周道衰法度􅤚師古曰􅤚即墮字墮毁也音火規反至齊桓公任用管仲而國富民安公問行伯用師之道師古曰伯讀曰霸管仲曰公欲定卒伍脩甲兵大國亦將脩之而小國設備則難以速得志矣於是乃作内政而寓軍令焉師古曰寓寄也寄於内政而修軍令也故卒伍定虖里而軍政成虖郊連其什伍師古曰五人為伍二伍為什居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其敎已成外攘夷狄内尊天子以安諸夏師古曰攘卻也諸夏中國之諸侯也夏大也言大於四夷也攘音人羊反齊桓旣没晉文接之亦先定其民作被廬之法應劭曰搜於被廬之地作執秩以為六官之法因以名之也師古曰被廬晉地也被音皮義反總帥諸侯迭為盟主師古曰迭互也音大結反然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷師古曰寖漸也陵夷頽替也二伯齊桓公晉文公也伯讀曰覇至魯成公作丘甲師古曰丘十六井也止出戎馬一匹牛三頭四丘為甸甸六十四井也乃出戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人耳今乃使丘出甸賦違常制也一說别令人為丘作甲也士農工商四類異業甲者非凡人所能為而令作之譏不正也哀公用田賦師古曰田賦者别計田畝及家財各為一賦言不依古制役煩歛重也搜狩治兵大閱之事皆失其正春秋書而譏之以存王道於是師旅亟動百姓罷敝師古曰亟屢也音丘吏反罷讀曰疲無伏節死難之誼孔子傷焉曰以不敎民戰是謂棄之師古曰論語載孔子之言也非其不素習故稱子路曰由也千乘之國可使治其賦也而子路亦曰千乘之國攝虖大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也師古曰皆論語所載也方道也比音必寐反治其賦兵敎以禮誼之謂也春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視師古曰視讀曰示而秦更名角抵師古曰抵音丁禮反解在武紀先王之禮没於淫樂中矣雄桀之士因埶輔時作為權詐以相傾覆吳有孫武齊有孫臏師古曰臏音頻忍反魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡師古曰衡横也戰國時齊楚韓魏燕趙為從秦國為衡從音子容反謂其地形南北從長也秦地形東西横長故為衡也轉相攻伐代為雌雄師古曰代迭也齊愍以技擊彊孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝魏惠以武卒奮師古曰奮盛起秦昭以銳士勝師古曰銳勇利世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道師古曰孫卿楚人姓荀名况避漢宣帝之諱故改曰孫卿而非之曰彼孫吳者上埶利而貴變詐施於暴亂昏嫚之國君臣有間師古曰言有間隙不諧和上下離心政謀不良故可變而詐也夫仁人在上為下所卬卬讀曰仰猶子弟之衞父兄若手足之扞頭目何可當也師古曰扞禦難也音卜旦反鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有師古曰言往必破碎詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏師古曰殷頌長發之詩也武王湯也虔敬也遏止也言湯建號興師本由仁義雖執戚鉞以敬為先故得如火之盛無能止也言以仁誼綏民者無敵於天下也若齊之技擊得一首則受賜金事小敵脆則媮可用也師古曰媮與偷同謂苟且事鉅敵堅則渙然離矣師古曰鉅大也渙然散貌是亡國之兵也魏氏武卒衣三屬之甲服虔曰作大甲三屬竟人身也蘇林曰兠鍪也盤領也髀褌也如淳曰上身一髀褌一踁繳一凡三屬也師古曰如說是也屬聯也音之欲反髀音陛踁即脛字操十二石之弩負矢五十个置戈其上冠胄帶劒贏三日之糧師古曰个讀曰箇箇枚也胄兠鍪也冠胄帶劒者著兠鍪而又帶劒也贏謂擔負也音盈日中而趍百里師古曰日中一日之中中試則復其户利其田宅師古曰中試試之而中科條也復謂免其賦稅也利田宅者給其便利之處也中音竹仲反復音方目反如此則其地雖廣其稅必寡其氣力數年而衰是危國之兵也秦人其生民也陿阸其使民也酷烈師古曰陿地小也隘險固也酷重厚也烈猛威也劫之以埶隱之以阸鄭氏曰秦地多隘臧隱其民於隘中也臣瓉曰秦政急峻隱括其民於隘狹之法師古曰鄭說是也狃之以賞慶道之以刑罰師古曰狃串習也音女救反道讀曰導使其民所以要利於上者非戰無由也功賞相長五甲首而隸五家服虔曰能得著甲者五人首使得隸役五家也如淳曰役隸五家是為相君長是最為有數故能四世有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳師古曰鬻音育未有安制矜節之理也師古曰矜持也故雖地廣兵彊鰓鰓常恐天下之一合而共軋已也蘇林曰鰓音愼而無禮則葸之葸鰓懼貌也張晏曰軋踐轢也師古曰鰓音先祀反軋音於黠反至乎齊桓晉文之兵可謂入其域而有節制矣孟康曰入王兵之域而未盡善也然猶未本仁義之綂也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之銳士師古曰直亦當也秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳師古曰戰陳之義本因陳列為名而音變耳字則作陳更無别體而末代學者輒改其字旁從車非經史之本文也今宜依古不從流俗也善陳者不戰善戰者不敗善敗者不亡若夫舜脩百僚咎繇作士師古曰士師理官謂司寇之職命以蠻夷猾夏寇賊姦軌師古曰虞書舜典舜命咎繇之文也猾亂也夏諸夏也宼謂攻剽賊謂殺人在外曰姦在内曰軌而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂師古曰謂湯誓泰誓牧誓是也所謂善陳不戰者也齊桓南服彊楚使貢周室師古曰謂僖四年伐楚次于陘責包茅不入王祭不供也北伐山戎為燕開路師古曰謂莊三十年伐山戎以其病燕故也存亡繼絶功為伯首師古曰謂存三亡國衞邢魯也伯讀曰覇所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡師古曰謂定四年吳入郢楚子出涉睢濟江入于雲中也父老送之王曰父老反矣何患無君父老曰有君如是其賢也師古曰言無有如此君者相與從之或犇走赴秦號哭請救師古曰謂申包胥如秦乞師也犇古奔字秦人憐之為之出兵師古曰謂秦子蒲子武帥車五百乘以救楚也二國并力遂走吳師師古曰謂子蒲大敗夫槩王于沂薳射之子從子西敗吳師於軍祥昭王返國師古曰吳師已歸楚子入郢所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下師古曰言如獵之取獸窮武極詐士民不附卒隸之徒還為敵讎師古曰謂陳勝吳廣英布之徒也猋起雲合果共軋之師古曰猋疾風也如猋之起言其速也如雲之合言其盛也猋音必遥反斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並師古曰言其同盛衰也至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後師古曰孫武孫臏吳起商鞅白起也報應之埶各以類至其道然矣漢興高祖躬神武之材行寛仁之厚總擥英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辯明叔孫通之儀文武相配大略舉焉天下旣定踵秦而置材官於郡國師古曰踵因也京師有南北軍之屯至武帝平百粤内增七校晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也外有樓船皆歲時講肄脩武備云師古曰肄習也音弋二反至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之師古曰五材金木水火土也廢一不可誰能去兵鞭扑不可弛於家師古曰弛放也音式爾反刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器師古曰論語載孔子之言文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也師古曰刑錯兵寢皆謂置而弗用也昔周之法建三典以刑邦國詰四方師古曰詰責也音口一反字或作誥音工到反誥謹也以刑治之令謹敇也一曰刑新邦用輕典師古曰新闢地立君之國其人未習於敎故用輕法二曰刑平邦用中典師古曰承平守成之國則用中典常行之法也三曰刑亂邦用重典師古曰篡殺畔逆之國化惡難移則用重法誅殺之也自此以上大司寇所職也五刑墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百所謂刑平邦用中典者也師古曰墨黥也鑿其面以墨湼之劓截鼻也宫滛刑也男子割腐婦人幽閉刖斷足也殺死刑也自此以上司刑所職也劓音牛兾反刖音五刮反又音月凡殺人者踣諸市師古曰踣謂斃之也音妨付反墨者使守門師古曰黥面之人不妨禁衞也劓者使守關師古曰以其貌毁故逺之宫者使守内師古曰人道旣絶於事便也刖者使守囿師古曰驅御禽獸無足可也完者使守積師古曰完謂不虧其體但居作也積積聚之物也自此以上掌戮所職也其奴男子入于罪隸李竒曰男女徒總名為奴女子入舂槁孟康曰主暴燥舂之也韋昭曰舂舂人槁槁人也給此二官之役師古曰槁音古老反凡有爵者與七十者與未齓者皆不為奴師古曰有爵謂命士以上也齓毁齒男子八歲女子七歲而毁齒矣自此以上司厲所職也周道旣衰穆王眊荒命甫侯度時作刑以詰四方師古曰穆王昭王之子也享國旣百年而王眊亂荒忽乃命甫侯為司寇商度時宜而作刑之制以治四方也甫國名也眊音莫報反度音大各反墨罰之屬千劓罰之屬千髕罰之屬五百宫罰之屬三百大辟之罰其屬二百師古曰髕罰去膝頭骨大辟死刑也髕音頻忍反五刑之屬三千師古曰五者之刑凡三千蓋多於平邦中典五百章所謂刑亂邦用重典者也春秋之時王道寖壞師古曰寖漸也敎化不行子產相鄭而鑄刑書師古曰子產鄭大夫公孫僑也鑄刑法於鼎事在昭六年晉叔嚮非之曰師古曰叔嚮晉大夫羊舌肸也遺其書以非之嚮音許兩反昔先王議事以制不為刑辟李竒曰先議其犯事議定然後乃斷其罪不為一成之刑著於鼎也師古曰虞舜則象以典刑流宥五刑周禮則三典五刑以詰邦國非不豫設但弗宣露使人知之懼民之有爭心也猶不可禁禦是故閑之以誼糾之以政師古曰閑防也糾舉也行之以禮守之以信奉之以仁師古曰奉養也制為祿位以勸其從師古曰勸其從敎之心也嚴斷刑罰以威其滛師古曰淫放也懼其未也故誨之以忠𢥠之以行晉灼曰𢥠古竦字也師古曰𢥠謂㢡也又音所項反敎之以務師古曰時所急使之以和師古曰悅以使人也臨之以敬莅之以彊師古曰莅謂監視也斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師師古曰上謂公侯也官卿佐也長師皆列職之首也民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣師古曰辟法也為治也權移於法故人不畏上因危文以生詐妄徼幸而成巧則弗可治也夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑韋昭曰謂正刑五及流贖鞭扑也三辟之興皆叔世也師古曰叔世言晩時也今吾子相鄭國制參辟鑄刑書孟康曰謂夏殷周亂政所制三辟也將以靖民不亦難乎師古曰靖安也一曰治也詩曰儀式刑文王之德日靖四方師古曰周頌我將之詩也言法象文王之德以為儀式則四方日以安靖也又曰儀刑文王萬邦作孚師古曰大雅文王詩也孚信也又言法象文王則萬國皆信順也如是何辟之有師古曰若詩所言不宜制刑辟民知爭端矣將棄禮而徵於書師古曰取證於刑書錐刀之末將盡爭之師古曰喻微細亂獄滋豐貨賂並行師古曰滋益也終子之世鄭其敗虖子產報曰若吾子之言僑不材不能及子孫吾以救世也師古曰言雖非長乆之法且救當時之敝媮薄之政自是滋矣孔子傷之曰導之以德齊之以禮有恥且格導之以政齊之以刑民免而無恥師古曰論語載孔子之言也格正也言用德禮則人有耻而自正尚政刑則下苟免而無耻禮樂不興則刑罰不中刑罰不中則民無所錯手足師古曰亦論語載孔子之言也禮以治人樂以易俗二者不興則刑罰濫矣錯置也孟氏使陽膚為士師師古曰亦論語所載陽膚曾子弟子也士師獄官問於曾子師古曰問何以居此職也亦曰上失其道民散乆矣如得其情則哀矜而勿喜師古曰此曾子答辭言民俗澆離輕犯於法乃由上失其道非下之過今汝雖得獄情當哀矜之勿自喜也宋祁曰自喜姚本刪自字陵夷至於戰國韓任申子秦用商鞅連相坐之法造參夷之誅師古曰參夷夷三族增加肉刑大辟有鑿顚抽脅鑊亨之刑師古曰鼎大而無足曰鑊以䰞人也至於秦始皇兼吞戰國遂毁先王之法滅禮誼之官專任刑罰躬操文墨師古曰躬身也操執持也音于高反晝斷獄夜理書自程决事日縣石之一服虔曰縣稱也石百二十斤也始皇省讀文書日以百二十斤為程而姦邪並生赭衣塞路囹圄成市天下愁怨潰而叛之漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大說師古曰說讀曰悅其後四夷未附兵革未息三章之法不足以禦姦師古曰禦止也於是相國蕭何攈摭秦法師古曰攈摭謂收拾也攈音九問反摭音之石反取其宜於時者作律九章當孝惠高后時百姓新免毒蠚人欲長㓜養老師古曰蠚音呼各反蕭曹為相塡以無為師古曰言以無為之法塡安百姓也塡音竹刃反從民之欲而不擾亂是以衣食滋殖刑罰用稀及孝文即位躬脩𤣥默勸趣農桑減省租賦而將相皆舊功臣少文多質懲惡亡秦之政論議務在寛厚恥言人之過失化行天下告訐之俗易師古曰訐面相斥罪也音居謁反吏安其官民樂其業畜積歲增戸口寖息師古曰畜讀曰蓄寖益也息生也風流篤厚禁罔疏闊選張釋之為廷尉罪疑者予民師古曰從輕斷是以刑罰大省至於斷獄四百師古曰謂普天之下重罪者也有刑錯之風即位十三年齊太倉令淳于公有罪當刑詔獄逮繫長安師古曰逮及也辭之所及則追捕之故謂之逮一曰逮者在道將送防禦不絶若今之傳送囚也淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也宋祁曰姚本益也刪去也字其少女緹縈自傷悲泣師古曰緹縈女名也緹音他弟反廼隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬師古曰屬聯也音之欲反雖後欲改過自新其道亡繇也師古曰繇讀與由同由從也妾願没入為官婢以贖父刑罪使得自新書奏天子朱子文曰於文書奏下多天子二字前曰上書非上於天子而何後曰書奏非奏于天子而何若曰書奏天子憐悲其意文字直而美天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三孟康曰黥劓二刖左右趾合一凡三也宋祁曰姚本二則刪去則字而姦不止其咎安在非乃朕德之薄而敎不明與師古曰與讀曰歟吾甚自愧故夫訓道不純而愚民陷焉師古曰道讀曰導詩曰愷弟君子民之父母師古曰大雅泂酌之詩也言君子有和樂易簡之德則其下尊之如父親之如母也今人有過敎未施而刑已加焉或欲改行為善而道亡繇至師古曰繇讀與由同朕甚憐之夫刑至斷支體刻肌膚終身不息師古曰息生也何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免孟康曰其不亡逃者滿其年數得免為庶人具為令師古曰使更為條制丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者乆矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂臣瓉曰文帝除肉刑皆有以易之故以完易髠以笞代劓以釱左右止代刑今旣曰完矣不復云以完代完也此當言髠者完也宋祁曰代刑姚本改作代刖當黥者髠鉗為城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市李竒曰命逃亡也復於論命中有罪也晉灼曰命者名也成其罪也師古曰止足也當斬右足者以其辠次重故從棄市也殺人先自告謂殺人而自首得免罪者也吏受賕枉法謂曲公法而受賂者也守縣官財物而即盜之即今律所謂主守自盜者也殺人害重受賕盜物贓汙之身故此三罪已被論名而又犯笞亦皆棄市也今流俗書本笞三百笞五百之上及劓者之下有籍笞字復有笞罪亦云復有籍笞罪皆後人妄加耳舊本無也罪人獄已決完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人師古曰男子為隸臣女子為隸妾鬼薪白粲滿三歲為隸臣隸臣一歲免為庶人隸妾亦然也隸臣妾滿二歲為司寇司寇一歲及作如司寇二歲皆免為庶人如淳曰罪降為司寇故一歲正司寇故二歳也其亡逃及有罪耐以上不用此令師古曰於本罪中又重犯者也宋祁曰罪耐姚本作耐罪前令之刑城旦舂歲而非禁錮者如完為城旦舂歲數以免李竒曰謂文帝作此令之前有刑者宋祁曰如完姚本刪如字臣昧死請制曰可是後外有輕刑之名内實殺人斬右止者又當死斬左止者笞五百當劓者笞三百率多死師古曰斬右止者棄市故入於死以笞五百代斬左止笞三百代劓笞數旣多亦不活也宋祁曰姚本改入於作人多景帝元年下詔曰加笞與重罪無異孟康曰重罪謂死刑幸而不死不可為人師古曰謂不能自起居也其定律笞五百曰三百笞三百曰二百猶尚不全至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以敎之也其定箠令師古曰箠策也所以擊者也音止蘂反丞相劉舍御史大夫衞綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀如淳曰然則先時笞背也師古曰臀音徒門反毋得更人師古曰謂行笞者不更易人也畢一罪乃更人自是笞者得全然酷吏猶以為威死刑旣重而生刑又輕民易犯之及至孝武即位外事四夷之功内盛耳目之好徵發煩數百姓貧耗師古曰耗損也音呼到反窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法師古曰見知人犯法不舉告為故縱而所監臨部主有罪并連坐也緩深故之罪孟康曰孝武欲急刑吏深害及故入人罪者皆寛緩急縱出之誅師古曰吏釋罪人疑以為縱出則急誅之亦言尚酷其後姦猾巧法轉相比况禁罔寖密師古曰寖漸也其下亦同律令凡三百五十九章大辟四百九條千八百八十二事死罪決事比萬三千四百七十二事師古曰比以例相比況也文書盈於几閣典者不能徧睹是以郡國承用者駮師古曰不曉其指用意不同也或罪同而論異姦吏因緣為市師古曰弄法而受財若市買之交易所欲活則傅生議所欲陷則予死比師古曰傅讀曰附議者咸冤傷之宣帝自在閭閻而知其若此及即尊位廷史路溫舒上疏言秦有十失其一尚存治獄之吏是也語在溫舒傳上深愍焉廼下詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜䝉戮晉灼曰當重而輕使有罪者起邪惡之心也師古曰有罪者更興邪惡無辜者反陷重刑是決獄不平故父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄如淳曰廷史廷尉史也以囚辭決獄事為鞠謂疑獄也李竒曰鞠窮也獄事窮竟也師古曰李說是也其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寛恕黄霸等以為廷平季秋後請讞時上常幸宣室齋居而決事如淳曰宣室布政敎之室也重用刑故齋戒以決事晉灼曰未央宫中有宣室殿師古曰賈誼傳亦云受釐坐宣室蓋其殿在前殿之側也齋則居之獄刑號為平矣時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令師古曰刪刋也有不便者則刋而除之律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣蘇林曰招音翹翹舉也猶賣弄也孟康曰招求也招致權著已也師古曰孟說是也宣帝未及脩正至元帝初立廼下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律令煩多而不約自典文者不能分明而欲羅元元之不逮師古曰羅網也不逮言意識所不及斯豈刑中之意哉師古曰中當也其議律令可蠲除輕減者條奏唯在便安萬姓而已至成帝河平中復下詔曰甫刑云五刑之屬三千大辟之罰其屬二百師古曰甫刑即周書呂刑初為呂侯號曰呂刑後為甫侯又稱甫刑今大辟之刑千有餘條律令煩多百有餘萬言竒請它比日以益滋師古曰竒請謂常文之外主者别有所請以定罪也它比謂引它類以比附之稍增律條也竒音居宜反自明習者不知所由師古曰由從也欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉師古曰虞書舜典之詞恤憂也言當憂刑也其審核之務準古法師古曰核究其實也朕將盡心覽焉有司無仲山父將明之材師古曰有司以下史家之言也大雅蒸人之詩曰肅肅王命仲山父將之邦國若否仲山父明之將行也否不善也言王有誥命則仲山父行之邦國有不善之事則仲山父明之故引以為美傷今不能然也不能因時廣宣主恩建立明制為一代之法而徒鉤摭微細毛舉數事以塞詔而已師古曰毛舉言舉毫毛之事輕小之甚塞猶當者也是以大議不立遂以至今議者或曰法難數變此庸人不逹疑塞治道聖智之所常患者也師古曰塞謂不通也故略舉漢興以來法令稍定而合古便今者漢興之初雖有約法三章網漏吞舟之魚師古曰言疏闊吞舟謂大魚也然其大辟尚有夷三族之令令曰當三族者皆先黥劓斬左右趾笞殺之梟其首菹其骨肉於市師古曰菹謂醢也菹音側於反其誹謗詈詛者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至高后元年乃除三族罪祅言令孝文二年又詔丞相太尉御史法者治之正所以禁暴而衞善人也今犯法者已論而使無罪之父母妻子同產坐之及收朕甚弗取其議左右丞相周勃陳平奏言父母妻子同產相坐及收所以累其心使重犯法也師古曰重難也累音力瑞反收之之道所由來乆矣臣之愚計以為如其故便文帝復曰朕聞之法正則民慤罪當則民從師古曰慤謹也音丘角反且夫牧民而道之以善者吏也師古曰道讀曰導以善導之也旣不能道又以不正之法罪之是法反害於民為暴者也師古曰法害於人是法為暴朕未見其便宜孰計之平勃乃曰陛下幸加大惠於天下使有罪不收無罪不相坐甚盛德臣等所不及也臣等謹奉詔盡除收律相坐法其後新垣平謀為逆復行三族之誅由是言之風俗移易人性相近而習相遠信矣師古曰論語云孔子曰性相近習相遠也言人同禀五常之性其所取舍本相近也但所習各異漸漬而移則相逺矣夫以孝文之仁平勃之知猶有過刑謬論如此甚也而況庸材溺於末流者乎周官有五聼八議三刺三宥三赦之法師古曰刺殺也訊而有罪則殺之也宥寛也赦舍也謂釋置也五聽一曰辭聽師古曰觀其出言不直則煩二曰色聽師古曰觀其顏色不直則變三曰氣聽師古曰觀其氣息不直則喘四曰耳聽師古曰觀其聽聆不直則惑五曰目聽師古曰觀其瞻視不直則亂八議一曰議親師古曰王之親族也二曰議故師古曰王之故舊也三曰議賢師古曰有徳行者也四曰議能師古曰有道蓺者五曰議功師古曰有大勲力者六曰議貴師古曰爵位高者也七曰議勤師古曰謂盡悴事國者也八曰議賔師古曰謂前代之後王所不臣者也自五聽以下至此皆小司寇所職也三刺一曰訊羣臣二曰訊羣吏三曰訊萬民師古曰訊問也音信三宥一曰弗識二曰過失三曰遺忘師古曰弗識不審也過失非意也遺忘忽忘也三赦一曰幼弱二曰老眊三曰憃愚師古曰㓜弱謂七歲以下老眊謂八十以上憃愚生而癡騃者自三刺以下至此皆司刺所職也眊讀與耄同憃音丑江反一音貞巷反凡囚上罪梏拲而桎中罪梏桎下罪梏王之同族拲有爵者桎以待弊師古曰械在手曰梏兩手同械曰拲在足曰桎弊斷罪也自此以上掌囚所職也梏音古篤反拲即拱字也桎音之日反弊音蔽高皇帝七年制詔御史獄之疑者吏或不敢決有罪者乆而不論無罪乆繫不決自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報之師古曰當謂處斷也所不能決者皆移廷尉廷尉亦當報之廷尉所不能決謹具為奏傅所當比律令以聞師古曰傅讀曰附上恩如此吏猶不能奉宣故孝景中五年復下詔曰諸獄疑雖文致於法而於人心不厭者輒讞之其後獄吏復避微文遂其愚心至後元年又下詔曰獄重事也人有愚智官有上下獄疑者讞有令讞者已報讞而後不當讞者不為失師古曰解並在景紀自此之後獄刑益詳近於五聽三宥之意三年復下詔曰高年老長人所尊敬也鰥寡不屬逮者人所哀憐也師古曰屬音之欲反其著令年八十以上八歲以下及孕者未乳師古曰乳產也音人喻反師朱儒如淳曰師樂師肓瞽者朱儒短人不能走者當鞠繫者頌繫之師古曰頌讀曰容容寛容之不桎梏至孝宣元康四年又下詔曰朕念夫耆老之人髪齒墮落血氣旣衰亦無暴逆之心今或罹于文法執于囹圄不得終其年命朕甚憐之自今以來諸年八十非誣告殺傷人它皆勿坐至成帝鴻嘉元年定令年未滿七歲賊鬭殺人及犯殊死者上請廷尉以聞得減死合於三赦㓜弱老眊之人此皆法令稍定近古而便民者也師古曰近音其靳反孔子曰如有王者必世而後仁善人為國百年可以勝殘去殺矣師古曰論語載孔子之言此謂若有受命之王必三十年仁政乃成也勝殘謂勝殘暴之人使不為惡去殺不行殺戮也言聖王承衰撥亂而起被民以徳教師古曰被加也音皮義反變而化之必世然後仁道成焉至於善人不入於室然猶百年勝殘去殺矣師古曰論語稱子張問善人之道子曰不踐迹亦不入於室言善人不但修踐舊迹而已固少自創制然亦不能入聖人之室此為國者之程式也今漢道至盛歴世二百餘載師古曰今謂撰志時考自昭宣元成哀平六世之閒斷獄殊死率歲千餘口而一人如淳曰率天下犯罪者千口而有一人死耐罪上至右止三倍有餘李竒曰耐從司寇以上至右止為千口三人刑古人有言滿堂而飲酒有一人鄉隅而悲泣師古曰鄉讀曰嚮則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其冤死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者師古曰蕃多也音扶元反禮敎不立刑法不明民多貧窮豪桀務私姦不輙得獄豻不平之所致也服虔曰鄉亭之獄曰豻臣瓉曰獄岸獄訟也師古曰小雅小宛之詩云宜岸宜獄瓉說是也書云伯夷降典悊民惟刑師古曰周書甫刑之辭也悊知也言伯夷下禮法以道人人習知禮然後用刑也言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪桀擅私為之囊橐師古曰有底曰囊無底曰槖言容隱姦邪若囊槖之盛物姦有所隱則狃而寖廣師古曰狃串習也寖漸也狃音女救反此刑之所以蕃也孔子曰古之知法者能省刑本也今之知法者不失有罪末矣師古曰省謂減除之絶於未然故曰本也不失有罪事止聽訟所以為末又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫師古曰鬻賣也疫厲病也鬻音育疫音役非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣凡此五疾獄刑所以尤多者也自建武永平民亦新免兵革之禍人有樂生之慮朱子文曰既云新免兵革之禍當曰人有樂生之意意慮字相去不遠此傳寫之誤也與高惠之間同而政在抑彊扶弱朝無威福之臣邑無豪桀之俠以口率計斷獄少於成哀之間什八可謂淸矣師古曰十少其八也然而未能稱意比隆於古者以其疾未盡除而刑本不正善乎孫卿之論刑也曰世俗之為說者以為治古者無肉刑師古曰治古謂上古至治之時也治音丈吏反有象刑墨黥之屬菲履赭衣而不純師古曰菲草履也純緣也衣不加緣示有恥也菲音扶味反純音之允反是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣師古曰人不犯法則象刑無所施也以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡且懲其末也師古曰懲止也殺人者不死傷人者不刑是惠暴而寛惡也故象刑非生於治古方起於亂今也如淳曰古無象刑也所有象刑之言者近起今人惡刑之重故遂推言古之聖君但以象刑天下自治凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也師古曰稱宜也音尺孕反徳不稱位能不稱官賞不當功刑不當罪不祥莫大焉夫征暴誅悖治之威也殺人者死傷人者刑是百王之所同也未有知其所由來者也故治則刑重亂則刑輕李竒曰世所以治者乃刑重也所以亂者乃刑輕也犯治之罪固重犯亂之罪固輕也書云刑罰世重世輕此之謂也師古曰周書甫刑之辭也言刑罰輕重各隨其時所謂象刑惟明者言象天道而作刑師古曰虞書益稷曰咎繇方祗厥叙方施象刑惟明言敬其次叙施其法刑皆明白也安有菲屨赭衣者哉孫卿之言旣然又因俗說而論之曰禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極敝之流俗已薄於三代而行堯舜之刑是猶以鞿而御駻突孟康曰以繩縛馬口謂之鞿晉灼曰鞿古羇字也如淳曰駻音捍突惡馬也師古曰馬絡頭曰羇也違救時之宜矣且除肉刑者本欲以全民也今去髠鉗一等轉而入於大辟以死罔民失本惠矣師古曰罔謂羅網也故死者歲以萬數刑重之所致也至乎穿窬之盜忿怒傷人男女淫佚吏為姦臧師古曰佚讀與逸同若此之惡髠鉗之罰又不足以懲也故刑者歲十萬數民旣不畏又曾不恥刑輕之所生也故俗之能吏公以殺盜為威專殺者勝任奉法者不治亂名傷制不可勝條是以罔密而姦不塞刑蕃而民愈嫚師古曰塞止也蕃多也音扶元反嫚與慢同必世而未仁百年而不勝殘誠以禮樂闕而刑不正也豈宜惟思所以淸原正本之論刪定律令籑二百章以應大辟孟康曰籑音撰其餘罪次於古當生今觸死者皆可募行肉刑李竒曰欲死邪欲腐邪及傷人與盜吏受賕枉法男女淫亂皆復古刑為三千章詆欺文致微細之法悉蠲除師古曰詆謂誣也音丁禮反如此則刑可畏而禁易避吏不專殺法無二門輕重當罪民命得全合刑罰之中殷天人之和李竒曰殷亦中順稽古之制成時雍之化成康刑錯雖未可致孝文斷獄庶幾可及詩云宜民宜人受祿于天師古曰大雅假樂之詩也蓋嘉成王之德云書曰立功立事可以永年師古曰今文泰誓之辭也永長也言為政而宜於民者功成事立則受天祿而永年命所謂一人有慶萬民頼之者也師古曰呂刑之辭也一人天子也言天子用刑詳審有福慶之惠則衆庶咸頼之也前漢書卷二十三前漢書卷二十三考證刑法志春振旅以搜搜周禮及左傳原文俱作蒐穆王眊荒命甫侯眊古文尚書作耄甫侯作吕侯髕罰之屬五百臣召南按髕吕刑作剕周禮司刑亦作剕𢥠之以行注𢥠古竦字也按左傳作聳之以行宣帝未及脩正正監本訛政今改伯夷降典悊民惟刑注悊知也臣召南按古文尚書作折民惟刑孔傳以斷字解之陸德明釋文曰折馬鄭王皆音悊馬云智也東京古文未行諸儒惟以今文為本故注從馬說所謂象刑惟明者象刑監本訛蒙刑今改正前漢書卷二十三考證
