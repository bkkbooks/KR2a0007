body:
  text: 前漢書卷三十五漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注荆燕吳傳第五荆王劉賈髙帝從父兄也師古曰父之兄弟之子為從父兄弟也言本同祖從父而别不知其初起時漢元年還定三秦賈為將軍定塞地師古曰司馬欣之國也塞音先代反從東擊項籍漢王敗成臯北度河得張耳韓信軍軍脩武深溝髙壘使賈將二萬人騎數百擊楚度白馬津師古曰即今滑州白馬縣河津也入楚地燒其積聚師古曰倉廪芻槀之屬以破其業無以給項王軍食已而楚兵擊之賈輙避不肯與戰而與彭越相保師古曰保謂依恃以自安固漢王追項籍至固陵使賈南度淮圍夀春還至使人閒招楚大司馬周殷師古曰閒謂私求閒隙而招之周殷反楚佐賈舉九江迎英布兵皆會垓下誅項籍漢王因使賈將九江兵與大尉盧綰西南擊臨江王共尉師古曰共敖之子也共讀曰龔尉死以臨江為南郡賈既有功而髙祖子弱昆弟少又不賢欲王同姓以填天下師古曰填音竹刃反乃下詔曰將軍劉賈有功及擇子弟可以為王者羣臣皆曰立劉賈為荆王王淮東立六年而淮南王黥布反東擊荆賈與戰弗勝走富陵師古曰縣名地理志屬臨淮郡為布軍所殺燕王劉澤髙祖從祖昆弟也師古曰言同曾祖從祖而别也髙祖三年澤為郎中十一年以將軍擊陳豨將王黄封為營陵侯髙后時齊人田生游乏資晉灼曰楚漢春秋云字子春以畫奸澤服䖍曰以計畫干之文穎曰以工畫得寵也師古曰共為計䇿欲以求王服説是也畫音獲澤大説之師古曰説讀曰悦用金二百斤為田生夀師古曰因飲酒獻夀而與之金田生已得金即歸齊二嵗澤使人謂田生曰弗與矣孟康曰與黨與也言不復與我為友也文穎曰不復與汝相知也師古曰孟説是也田生如長安不見澤而假大宅令其子求事吕后所幸大謁者張卿如淳曰奄人也宋祁曰南本浙本並作張澤卿澤或作釋卿按周勃傳宦者令張釋諭告顔注曰荆燕吳傳云張澤今此作釋未知孰是然則此宜作澤卿矣但釋澤二字不知何從後云今卿最幸疑卿是字釋其名也居數月田生子請張卿臨親脩具師古曰親父也具供具也張卿往見田生帷帳具置如列侯張卿驚酒酣廼屏人説張卿曰臣觀諸侯邸第百餘皆髙帝一切功臣今呂氏雅故本推轂髙帝就天下如淳曰吕公知髙祖貴以女妻之推轂使為長者也師古曰謂翼戴崇奬以成帝業若車之行助推其轂故得引重而致逺也功至大又有親戚太后之重太后春秋長師古曰言年老諸呂弱太后欲立吕産為吕王王代太后又重發之鄧展曰重難發其事恐大臣不聽今卿最幸大臣所敬何不風大臣以聞太后師古曰風讀曰諷其下亦同太后必喜諸吕以王萬户侯亦卿之有太后心欲之而卿為内臣不急發恐禍及身矣張卿大然之乃風大臣語太后太后朝因問大臣大臣請立吕産為吕王太后賜張卿千金師古曰千斤之金張卿以其半進田生田生弗受因説之曰吕産王也諸大臣未大服今營陵侯澤諸劉長為大將軍獨此尚觖望師古曰觖音決今卿言太后裂十餘縣王之彼得王喜於諸吕王益固矣張卿入言之又太后女弟吕嬃女亦為營陵侯妻故遂立營陵侯澤為琅邪王劉攽曰髙后紀元年王諸吕七年立劉澤與此傳不同説在髙紀琅邪王與田生之國急行毋留師古曰田生勸之出闗太后果使人追之已出即還澤王琅邪二年而太后崩澤乃曰帝少諸呂用事諸劉孤弱引兵與齊王合謀西欲誅諸呂至梁聞漢灌將軍屯滎陽澤還兵備西界遂跳驅至長安師古曰齊王傳云使祝午紿琅邪王琅邪王馳見齊王齊王因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王既見欺不得反國乃説齊王求入闗計事齊王以為然乃益具車送琅邪王與此傳不同疑此傳誤也宋祁云浙本注文紿字下有説字一本紿作詭代王亦從代至諸將相與琅邪王共立代王是為孝文帝文帝元年徙澤為燕王而復以琅邪歸齊李竒曰本齊地前分以王澤今復與齊也澤王燕二年薨諡曰敬王子康王嘉嗣九年薨宋祁曰九年當作二十六年史記年表漢表皆同子定國嗣定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦定國有所欲誅殺臣肥如令郢人郢人等告定國如淳曰定國自欲有所殺餘臣肥如知令郢人以告也師古曰此説非也肥如燕之屬縣也郢人者縣令之名也定國别欲誅其臣又欲誅肥如令郢人而為郢人等所告也定國使謁者以它法劾捕格殺郢人滅口至元朔中郢人昆弟復上書具言定國事下公卿皆議曰定國禽獸行亂人倫逆天道當誅上許之定國自殺立四十二年國除宋祁曰四十二年當作二十四年哀帝時繼絶世乃封敬王澤𤣥孫之孫無終公士歸生為營陵侯師古曰無終其所屬縣也公士第一爵歸生名也更始中為兵所殺師古曰更始劉聖公之號也吳王濞髙帝兄仲之子也髙帝立仲為代王匈奴攻代仲不能堅守棄國閒行走雒陽自歸天子不忍致法廢為合陽侯子濞封為沛侯黥布反髙祖自將往誅之濞年二十以騎將從破布軍荆王劉賈為布殺無後宋祁云浙本為布字下有所字上患吳㑹稽輕悍無壯王填之師古曰悍勇也塡音竹刃反諸子少師古曰少㓜也乃立濞於沛為吳王師古曰行至沛而封拜濞也王三郡五十三城宋祁曰故東陽郡鄣郡吳郡即賈舊封已拜受印髙祖召濞相之曰若狀有反相師古曰若汝也此下亦同獨悔業已拜師古曰獨悔者心自懐悔不以語人也既以封拜為事臣下皆知之故不改因拊其背師古曰拊摩循之也一曰拊輕擊之音芳羽反曰漢後五十年東南有亂豈若邪然天下同姓一家愼無反濞頓首曰不敢會孝惠髙后時天下初定郡國諸侯各務自拊循其民吳有豫章郡銅山韋昭曰此有豫字誤也但當言章郡今故章也即招致天下亡命者盗鑄錢東煑海水為鹽以故無賦國用饒足如淳曰鑄錢煑海収其利以足國用故無賦於民也孝文時吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博争道不恭皇太子引博局提吳太子殺之師古曰提擲也音徒計反於是遣其䘮歸𦵏吳吳王愠師古曰愠怒也音於問反曰天下一宗師古曰猶言同姓共為一家死長安即𦵏長安何必來𦵏復遣䘮之長安𦵏吳王由是怨望稍失藩臣禮稱疾不朝京師知其以子故驗問實不病諸吳使來輙繫責治之吳王恐所謀滋甚師古曰滋益也及後使人為秋請孟康曰律春曰朝秋曰請如古諸侯朝聘也如淳曰濞不自行也使人代己致請禮師古曰二説皆是也請音材姓反上復責問吳使者使者曰察見淵中魚不祥服䖍曰天子察見下之私則不祥也今吳王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯上與更始師古曰言赦其已往之事於是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益觧然其居國以銅鹽故百姓無賦卒踐更輙予平賈服䖍曰以當為更卒出錢三百謂之過更自行為卒謂之踐更吳王欲得民心為卒者顧其庸隨時月與平賈也晉灼曰謂借人自代為卒者官為出錢顧其時庸平賈也師古曰晉説是也賈讀曰價謂庸直也宋祁曰謂卒踐更皆得庸直也溝洫志蘇林注曰平賈以錢取人作卒顧其時庸之平賈如淳曰律説平賈有得錢二千歳時存問茂材賞賜閭里師古曰茂美也茂材者有美材之人也它郡國吏欲來捕亡人者頌共禁不與如淳曰頌猶公也師古曰頌讀曰容如此者三十餘年以故能使其衆鼂錯為太子家令得幸皇太子數從容言吳過可削師古曰從音子容反數上書説之文帝寛不忍罰以此吳王日益横師古曰横音胡孟反及景帝即位錯為御史大夫説上曰昔髙帝初定天下昆弟少諸子弱大封同姓故孽子悼惠王王齊七十二城師古曰孽亦庶也庶弟元王王楚四十城兄子王吳五十餘城封三庶孽分天下半今吳王前有太子之隙詐稱病不朝宋祁云一本無稱字於古法當誅文帝不忍因賜几杖德至厚也不改過自新廼益驕恣公即山鑄錢煑海為鹽師古曰公謂顯然為之也即就也誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削之其反遲禍大師古曰亟急也音居力反三年冬楚王來朝錯因言楚王戊往年為薄太后服私姦服舍服䖍曰服在䘮次而私姦宫中也師古曰言於服舍為姦非宫中也服舍居䘮之次堊室之屬也請誅之詔赦削東海郡及前二年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣漢廷臣方議削吳吳王恐削地無已因欲發謀舉事念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之於是廼使中大夫應髙口説膠西王曰吳王不肖有夙夜之憂師古曰凡言不肖者謂鄙陋無所象似也觧在刑法志不敢自外使使臣諭其愚心王曰何以教之髙曰今者主上任用邪臣聽信䜛賊變更律令師古曰更改也侵削諸侯徵求滋多誅罰良重師古曰滋亦益也良實也信也日以益甚語有之曰狧糠及米師古曰狧古􅜻字􅜻用舌食也盖以犬為喻也言初􅜻糠遂至食米也􅜻音食爾反吳與膠西知名諸侯也一時見察不得安肆矣師古曰肆縱也吳王身有内疾不能朝請二十餘年師古曰内疾謂在身中不顯於外請音材姓反常患見疑無以自白師古曰白明也脅肩絫足猶懼不見釋師古曰脅翕也謂歛之也絫古累字也累足重足也並謂懼耳釋觧也放也竊聞大王以爵事有過所聞諸侯削地罪不至此師古曰言其本罪皆不合削地也此恐不止削地而已王曰有之子將奈何髙曰同惡相助同好相留同情相求同欲相趨同利相死今吳王自以與大王同憂願因時循理弃軀以除患於天下師古曰循順也意亦可乎膠西王瞿然駭曰師古曰瞿然無守之貌音居具反寡人何敢如是主上雖急固有死耳安得不事師古曰安焉也髙曰御史大夫鼂錯營或天子侵奪諸侯師古曰營謂回繞之也蔽忠塞賢朝廷疾怨諸侯皆有背叛之意宋祁曰叛當作畔人事極矣彗星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王内以鼂錯為誅外從大王後車方洋天下師古曰方洋猶翺翔也方音房又音旁洋音羊所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷闗守滎陽敖倉之粟距漢兵治次舎湏大王師古曰次舍息止之處也湏待也大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王猶恐其不果廼身自為使者師古曰濳行而去也至膠西面約之膠西羣臣或聞王謀諫曰諸侯地不能為漢十二師古曰不當漢十分之二為叛逆以憂太后非計也文穎曰王之太后也今承一帝尚云不易假令事成兩主分争患廼益生王不聽遂發使約齊甾川膠東濟南皆許諾諸侯既新削罰震恐多怨錯及削吳會稽豫章郡書至則吳王先起兵誅漢吏二千石以下膠西膠東甾川濟南楚趙亦皆反發兵西齊王後悔背約城守濟北王城壊未完其郎中令劫守王不得發兵膠西王膠東王為渠率師古曰渠大也與甾川濟南共攻圍臨甾趙王遂亦隂使匈奴與連兵七國之發也吳王悉其士卒師古曰悉盡也盡發使行下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發二十餘萬人南使閩東越閩東越亦發兵從孝景前三年正月甲子初起兵於廣陵西渉淮因并楚兵發使遺諸侯書曰吳王劉濞敬問膠西王膠東王甾川王濟南王趙王楚王淮南王衡山王廬江王故長沙王子如淳曰吳芮後四世無嗣國除庶子二人為列侯不得嗣王志將不滿故誘與之反也幸教以漢有賊臣錯無功天下侵奪諸侯之地使吏劾繫訊治以侵辱之為故孟康曰故事也師古曰言專以侵辱諸侯為事業不以諸侯人君禮遇劉氏骨肉師古曰人君者言諸王各自君其國絶先帝功臣進任姦人誑亂天下欲危社稷陛下多病志逸不能省察師古曰逸放也欲舉兵誅之謹聞教敝國雖狹地方三千里師古曰狹音胡夾反人民雖少精兵可具五十萬宋祁曰浙本無精字寡人素事南越三十餘年其王諸君皆不辭分其兵以隨寡人師古曰諸君謂其酋豪又可得三十萬寡人雖不肖願以身從諸王南越直長沙者因王子定長沙以北如淳曰南越直長沙者因王子定之師古曰直當也言越地之北當長沙者也西走蜀漢中告越如淳曰告東越使定之也師古曰此説非也言王子定長沙已北而西趣蜀及漢中平定以訖使報南越也走音奏宋祁曰顔注已北當作以北使報當作便報楚王淮南三王與寡人西面師古曰淮南三王謂厲王三子為王者淮南衡山濟北也齊諸王與趙王定河間河内或入臨晉闗或與寡人會雒陽師古曰臨晉闗即今之蒲津闗燕王趙王故與胡王有約燕王北定代雲中轉胡衆入蕭闗走長安匡正天下以安髙廟願王勉之楚元王子淮南三王或不沐洗十餘年怨入骨髓師古曰言心有所懐志不在洗沐也欲壹有所出久矣師古曰謂發兵寡人未得諸王之意未敢聽今諸王茍能存亡繼絶振弱伐暴以安劉氏社稷所願也吳國雖貧寡人節衣食用積金錢脩兵革聚糧食夜以繼日三十餘年矣凡皆為此師古曰為此謂欲反也為音于偽反願諸王勉之能斬捕大將者賜金五千斤封萬户列將三千斤封五千户裨將二千斤封二千户二千石千斤封千户皆為列侯其以軍若城邑降者卒萬人邑萬戸如得大將師古曰以卒萬人或邑萬户來降附者其封賞則與大將同下皆類此人户五千如得列將人戸三千如得裨將人户千如得二千石其小吏皆以差次受爵金它封賜皆倍軍法服䖍曰封賜倍漢之常法其有故爵邑者更益勿因師古曰於舊爵之外特更與之願諸王明以令士大夫不敢欺也寡人金錢在天下者往徃而有非必取於吳師古曰言處處郡國皆有之諸王日夜用之不能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子廼遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵初吳楚反書聞兵未發竇嬰言故吳相爰盎召入見上問以吳楚之計盎對曰吳楚相遺書曰賊臣鼂錯擅適諸侯削奪之地師古曰適讀曰讁宋祁曰浙本適字下有過字以故反名為西共誅錯復故地而罷師古曰復音扶目反以下亦同方今計獨斬錯發使赦七國復其故地則兵可毋血刃而俱罷師古曰血刃謂殺傷人而刃著血也上從其議遂斬錯語具在盎傳以盎為㤗常奉宗廟使吳王師古曰奉宗廟之指意也吳王弟子德侯為宗正師古曰德哀侯廣之子也名通輔親戚使至吳師古曰以親戚之意諭説也吳楚兵已攻梁壁矣宗正以親故先入見諭吳王拜受詔吳王聞盎來亦知其欲説笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得夜亡走梁服䖍曰梁王與吳戰盎得奔梁遂歸報條侯將乘六乘傳會兵滎陽師古曰會兵謂集大兵傳音張戀反至雒陽劉攽曰按此文有两至雒陽失於刪除又按太尉云吾據滎陽然則得劇孟在滎陽當叙在雒陽下見劇孟喜曰七國反吾乘傳至此不自意全師古曰意不自言得安全至雒陽也又以為諸侯已得劇孟孟今無動吾據滎陽師古曰言劇孟既不動揺吾又得據滎陽也滎陽以東無足憂者至雒陽宋祁曰雒陽浙本作淮陽前已有雒陽此當作淮陽夏公謂劉固善疑顧未見景本所見浙本爾然則雌黄可妄下乎問故父絳侯客鄧都尉曰䇿安出客曰吳楚兵鋭甚難與爭鋒楚兵輕不能乆方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝髙壘使輕兵絶淮泗口塞吳饟道師古曰饟古餉字使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其䇿遂堅壁昌邑南輕兵絶吳饟道吳王之初發也吳臣田禄伯為大將軍田禄伯曰兵屯聚而西無他竒道難以立功臣願得五萬人别循江淮而上収淮南長沙入武闗與大王會此亦一竒也吳王太子諫曰王以反為名此兵難以藉人師古曰藉假也人亦且反王柰何且擅兵而别多它利害蘇林曰禄伯儻將兵降漢自為己利於吳為生患害師古曰蘇説非也上言難以藉人人亦且反王是則已疑禄伯矣下乃云多它利害謂分兵而去前事不測或有利害難可决機耳非重云畏其降漢者徒自損耳吳王即不許田祿伯吳少將桓將軍説王曰吳多歩兵歩兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入闗天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問吳老將老將曰此年少推鋒可耳安知大慮於是王不用桓將軍計王專幷將其兵未渡淮諸賓客皆得為將校尉行閒候司馬孟康曰行伍間候也師古曰在行伍閒或為候或為司馬也獨周丘不用周丘者下邳人亡命吳酤酒無行宋祁曰南本酤作酷王薄之不任周丘乃上謁説王曰臣以無能不得待罪行閒臣非敢求有所將也願請王一漢節必有以報王廼予之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入戸使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯至矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬師古曰比音必寐反破城陽中尉軍聞吳王敗走自度無與共成功師古曰度音大各反即引兵歸下邳未至癰發背死宋祁曰癰當作㿈二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃髙皇帝親垂功徳建立諸侯幽王悼惠王絶無後孝文皇帝哀憐加惠師古曰憐其國絶故加恩惠而更封王幽王子遂悼惠王子卬等令奉其先王宗廟為漢藩國徳配天地明並日月而吳王濞背德反義誘受天下亡命罪人亂天下幣如淳曰幣錢也以私錢殽亂天下錢宋祁曰注文天下錢浙本作天子錢稱疾不朝二十餘年有司數請濞罪孝文皇帝寛之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光甾川王賢膠東王雄渠約從謀反師古曰從音子容反為逆無道起兵以危宗廟賊殺大臣及漢使者廹劫萬民伐殺無罪燒殘民家掘其丘壟甚為虐暴而卬等又重逆無道師古曰重音直用反燒宗廟鹵御物如淳曰鹵抄掠也師古曰御物供宗廟之服器也朕甚痛之朕素服避正殿將軍其勸士大夫撃反虜擊反虜者深入多殺為功斬首捕虜比三百石以上皆殺無有所置師古曰置放釋也敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乗勝而前鋭甚梁孝王恐遣將軍擊之又敗梁兩軍士卒皆還走梁數使使條侯求救條侯不許又使使愬條侯於上上使告條侯救梁宋祁曰上使告當作上使人告又守便宜不行梁使韓安國及楚死事相弟張羽為將軍李竒曰相即張尚也乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍師古曰走音奏會下邑欲戰師古曰下邑梁之縣條侯壁不肯戰吳糧絶卒飢數挑戰遂夜奔條侯壁驚東南條侯使偹西北果從西北不得入吳大敗士卒多飢死叛散於是吳王廼與其戲下壯士千人夜亡去師古曰戲讀曰麾又音許宜反度淮走丹徒保東越東越兵可萬餘人使人收聚亡卒漢使人以利啗東越師古曰啗音徒濫反解在髙紀東越即紿吳王師古曰紿誑也吳王出勞軍使人鏦殺吳王孟康曰方言㦸謂之鏦蘇林曰鏦音從容之從師古曰鏦謂以矛㦸撞之音楚江反盛其頭馳傳以聞師古曰傳音張戀反吳王太子駒亡走閩越吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍楚王戊軍敗自殺三王之圍齊臨甾也三月不能下漢兵至膠西膠東甾川王各引兵歸國膠西王徒跣席槀飲水謝太后王太子徳曰漢兵還臣觀之以罷師古曰罷讀曰疲可襲願収王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壊不可用之宋祁曰浙本無之字不聼漢將弓髙侯穨當遺王書師古曰韓穨當曰奉詔誅不義降者赦除其罪復故不降者滅之王何處湏以從事師古曰言王欲以何理自安處吾待以行事也處音昌汝反王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓廼苦將軍逺道至于窮國敢請葅醢之罪弓髙侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首膝行對曰今者鼂錯天子用事臣變更髙皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且誅錯宋祁曰浙本且字下有以字今聞錯已誅卬等謹已罷兵歸將軍曰王茍以錯為不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之曰王其自圖之師古曰圖謀也王曰如卬等死有餘罪遂自殺太后太子皆死膠東甾川濟南王皆伏誅酈將軍攻趙十月而下之趙王自殺濟北王以劫故不誅初吳王首反幷將楚兵連齊趙正月起三月皆破滅贊曰荆王王也由漢初定天下未集師古曰集和也故雖疏屬以䇿為王鎮江淮之間劉澤發於田生權激吕氏晉灼曰田生欲王劉澤先使張卿説封吕産恐其大臣觖望澤卒得王故云以權激吕氏也宋祁曰注文恐其當作恐以然卒南面稱孤者三世事發相重豈不危哉晉灼曰劉澤以金與田生以事張卿言之吕后而劉澤得王故曰事發相重也師古曰重猶累也言澤得王本由田生行説若其事發覺則相随入罪事相累誤累音力瑞反宋祁曰此中注言卿者浙本並作釋陽夏公謂偉誤作危顔遂以重為罪累劉攽曰謂田生謀欲王劉澤先説張卿王諸吕而後請王澤是發於相重也太史公作偉哉美其有成班固作危哉謂其艱難幸成也然觀上言稱孤者三世疑危亦本是偉字後人不曉改之吳王擅山海之利能薄歛以使其衆宋祁曰歛字上當有賦字逆亂之萌自其子興師古曰萌謂始生也古者諸侯不過百里山海不以封蓋防此矣鼂錯為國逺慮禍反及身毋為權首將受其咎豈謂錯哉師古曰此逸周書之言贊引之者謂錯適當此言耳前漢書卷三十五前漢書卷三十五考證荆王劉賈傳髙帝從父兄也臣召南按史記曰劉賈諸劉者不知其何屬此云從父兄史記曰劉澤諸劉逺屬此云從祖昆弟皆班氏補史記之缺略也賈輒避不肯與戰臣召南按史記作賈輒壁不肯與戰是堅守壁壘意此作避是避其鋒也燕王劉澤傳大謁者張卿宋祁曰疑卿是字釋其名也臣召南按此書恩澤侯表及周勃傳皆作張釋與史記吕后紀同而匈奴傳作張澤與史記文帝本紀及表同宋祁疑卿是字是也但史漢每遇澤釋字輒互異如張良傳建成侯吕澤實是吕釋之此宦者張卿名釋名澤究難懸定也引兵與齊王合謀注疑此傳誤也臣召南按顔注是琅邪王本無意於誅諸呂特見詐于齊王其後又因敗以為功耳是以通鑑從齊王傳肥如令郢人注肥如燕之屬縣也顧炎武曰地理志肥如自屬遼西郡不屬燕武帝本紀元朔元年秋匈奴入遼西殺太守諸侯王表言武帝下推恩之令而藩國自析長沙燕代雖有舊名皆亡南北邊矣然則肥如之屬于燕必在元朔以前未析邊郡之時也吳濞傳上患吳會稽輕悍顧炎武曰錢康功云漢書吳王濞傳上患吳會輕悍今本漢書並作吳會稽不知順帝時始分二郡漢初安得言吳會稽當是錢所見本未誤後人妄增之臣召南按吳會猶言吳之都㑹也胡三省通鑑辨誤已嘗論之吳有豫章郡銅山注韋昭曰但當言章郡今故章也臣召南按注中章郡故章二章字俱應作鄣字鄣郡即丹陽郡也志有銅官狧糠及米注師古曰蓋以犬為喻也臣召南按索隐曰言狧糠盡則至米謂削土盡則滅國也顔注迂曲不如索隐説使輕兵絶淮泗口胡三省曰泗水南入淮故謂之淮泗口前漢書卷三十五考證
