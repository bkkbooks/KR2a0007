body:
  text: 前漢書卷七十九漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注馮奉世傳第四十九馮奉世字子明上黨潞人也師古曰潞音路徙杜陵其先馮亭為韓上黨守秦攻上黨絶太行道師古曰太行山名險道所經行也行音胡郎反宋祁曰注文經行疑當刪行字韓不能守馮亭乃入上黨城守於趙師古曰據守上黨城而以降趙趙封馮亭為華陽君與趙將括距秦師古曰括趙括趙奢之子也戰死於長平宗族繇是分散師古曰繇讀與由同或留潞或在趙在趙者為官帥將師古曰帥音所類反字或作師其義兩通官帥將子為代相及秦滅六國而馮亭之後馮毋擇馮去疾馮劫皆為秦將相焉漢興文帝時馮唐顯名即代相子也至武帝末奉世以良家子選為郎昭帝時以功次補武安長失官年三十餘矣乃學春秋渉大義讀兵法宋祁曰浙夲兵法下有明習二字前將軍韓增奏以為軍司空令本始中從軍擊匈奴軍罷復為郎先是時漢數出使西域多辱命不稱或貪汙為外國所苦師古曰苦謂困辱之是時烏孫大有擊匈奴之功而西域諸國新輯師古曰輯與集同集和也漢方善遇欲以安之選可使外國者前將軍增舉奉世以衛候使持節送大宛諸國客至伊修城師古曰伊修城在鄯善國漢於其中置屯田吏士也都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年師古曰莎車國名萬年其王名也莎音素和反宋祁曰宋字疑是宗字并殺漢使者奚充國時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻劫南道與㰱盟畔漢從鄯善以西皆絶不通師古曰鄯音善都護鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之師古曰亟急也音居力反則莎車日彊其埶難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進撃莎車攻㧞其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還師古曰言馬形似龍者劉攽曰此馬名曰象龍也上甚説師古曰説讀曰恱下議封奉世師古曰下其事令議之丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也師古曰顓與專同奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指師古曰本為送諸國客而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比師古曰比必寐反宋祁曰注文比字下疑有音字爭逐發兵要功萬里之外師古曰逐競也為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光禄大夫水衡都尉宋祁曰善望之議字下疑有竟不封三字元帝即位為執金吾上郡屬國歸義降胡萬餘人反去初昭帝末西河屬國胡伊酋若王亦將衆數千人畔師古曰酋音才由反奉世輙持節將兵追擊師古曰言西河上郡羌胡反畔子明再追擊之右將軍典屬國常惠薨奉世代為右將軍典屬國加諸吏之號數嵗為光禄勳永光二年秋隴西羌彡姐旁種反師古曰彡所亷反又音先亷反姐音紫今西羌尚有此姓而彡音先冉反宋祁曰注文彡字下當有音字詔召丞相韋𤣥成御史大夫鄭𢎞大司馬車騎將軍王接左將軍許嘉右將軍奉世入議是時嵗比不登師古曰比頻也登成也京師榖石二百餘師古曰一石直二百餘錢也下皆類此邊郡四百關東五百四方飢饉朝庭宋祁曰庭當作廷方以為憂而遭羌變元成等漠然莫有對者師古曰漠無聲也音莫奉世曰羌虜近在竟内背畔師古曰竟讀曰境不以時誅亡以威制逺蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決師古曰暴露也亟急也音居力反宋祁曰注文暴字下疑有謂暴字往者數不料敵師古曰料量也音聊而師至於折傷再三發軵如淳曰軵推也淮南子曰内郡軵車而餉音而隴反宋祁曰注文而隴字疑是如腫字則曠日煩費威武虧矣今反虜無慮三萬人法當倍用六萬人師古曰無慮舉凡之言也無小思慮而大計也然羌戎弓矛之兵耳器不犀利如淳曰今俗刀兵利為犀晉灼曰犀堅也師古曰晉説是可用四萬人一月足以決丞相御史兩將軍皆以為民方收斂時未可多發萬人屯守之且足奉世曰不可天下被飢饉士馬羸耗師古曰耗減也音呼到反守戰之備久廢不簡師古曰簡謂選揀宋祁曰注文揀字疑是練字夷狄皆有輕邊吏之心而羌首難師古曰言創首為寇難也今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乗利諸種並和師古曰和應也音胡卧反相扇而起臣恐中國之役不得止於四萬非財幣所能解也故少發師而曠日師古曰曠空也空費其日而無功也與一舉而疾決利害相萬也師古曰相比則為萬倍也固爭之不能得有詔益二千人於是遣奉世將萬二千人騎以將屯為名師古曰且云領兵屯田不言討賊宋祁曰萬二千人浙江本無人字注文屯田字上疑有為字典屬國任立護軍都尉韓昌為偏裨到隴西分屯三處典屬國為右軍屯白石護軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上如淳曰西極山名前軍到降同阪師古曰阪平陂也降同者阪名也阪府板反降音下江反陂音普何反宋祁曰注文府字上當有音字先遣校尉在前與羌爭地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人拜太常弋陽侯任千秋為奮武將軍以助焉奉世上言願得其衆不須煩大將宋祁曰須字下當有復字因陳轉輸之費上於是以璽書勞奉世且讓之師古曰讓責也責其不須大將曰皇帝問將兵右將軍師古曰官為右將軍而將兵在外故謂之將兵右將軍也甚苦暴露羌虜侵邊境殺吏民甚逆天道故遣將軍帥士大夫行天誅以將軍材質之羙奮精兵誅不軌百下百全之道也宋祁曰徐鍇去百下二字予謂不當去今乃有畔敵之名如淳曰不敢當敵攻戰為畔敵也大為中國羞以昔不閑習之故邪師古曰言未嘗當羌虜不測其形便以恩厚未洽信約不明也師古曰言將軍恩惠未洽於士卒又不能明其約誓使在下信之朕甚怪之上書言羌虜依深山多徑道不得不多分部遮要害須得後發營士足以決事部署已定埶不可復置大將聞之前為將軍兵少不足自守故發近所騎日夜詣師古曰近所隨近之處也日夜言兼行不休息也詣詣軍所也非為擊也師古曰助其守今發三輔河東𢎞農越騎迹射佽飛彀者羽林孤兒及呼速絫嗕種劉德曰嗕音辱羌别種也彀者謂能張弩者也彀音工豆反絫音力追反嗕音乃彀反劉奉世曰呼速絫則呼遫累單于所将五萬衆來降者也嗕者匈奴傳所謂西辱君長數千人降漢者此二種有兵衆皆宣帝時來降今使征羌方急遣師古曰言令速至軍所也且兵凶器也必有成敗者患宋祁曰南本作成敗者之患䇿不豫定料敵不審也故復遣奮武將軍兵法曰大將軍出必有偏裨所以揚威武參計䇿將軍又何疑焉夫愛吏士得衆心舉而無悔禽敵必全將軍之職也若乃轉輸之費則有司存將軍勿憂須奮武将軍兵到合擊羌虜師古曰須待也十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人拜定襄太守韓安國為建威將軍師古曰自别有此安國非武帝時人也未進聞羌破還上曰羌虜破散創艾亡逃出塞師古曰創艾謂懲懼也創音初向反艾讀曰乂其罷吏士頗留屯田備要害處明年二月奉世還京師更為左將軍光祿勳如故其後錄功拜爵下詔曰羌虜桀黠賊害吏民攻隴西府寺燔燒置亭師古曰置謂置驛之所也絶道橋甚逆天道左將軍光祿勳奉世前將兵征討斬捕首虜八千餘級鹵馬牛羊以萬數賜奉世爵關内侯食邑五百户黄金六十斤裨將校尉三十餘人皆拜後嵗餘奉世病卒居爪牙官前後十年為折衝宿將功名次趙充國奮武將軍任千秋者其父宫昭帝時以丞相徵事捕斬反者左將軍上官桀封侯宣帝時為太常薨千秋嗣後宋祁曰後疑作侯復為太常成帝時樂昌侯王商代奉世為左將軍而千秋為右將軍後亦為左將軍子孫傳國至王莽乃絶云奉世死後二年西域都護甘延夀以誅郅支單于封為列侯時丞相匡衡亦用延夀矯制生事據蕭望之前議以為不當封而議者咸羙其功上從衆而侯之於是杜欽上疏追訟奉世前功曰前莎車王殺漢使者約諸國背畔師古曰約謂共為契約左將軍奉世以衛候便宜發兵誅莎車王䇿定城郭功施邊境師古曰城郭者謂西域諸國為城郭而居者議者以奉世奉使有指春秋之義亡遂事漢家之法有矯制師古曰無遂事者謂臨時制宜前事不可必遂也漢家之法擅矯詔命雖有功勞不加賞也宋祁曰師古誤注遂事可駮故不得侯今匈奴郅支單于殺漢使者亡保康居都護延夀發城郭兵屯田吏士四萬餘人以誅斬之封為列侯臣愚以為比罪則郅支薄量敵則莎車衆用師則奉世寡計勝則奉世為功於邊境安慮敗則延夀為禍於國家深其違命而擅生事同延夀割地封而奉世獨不錄臣聞功同賞異則勞臣疑罪鈞刑殊則百姓惑疑生無常惑生不知所從亡常則節趨不立師古曰趨讀曰趣趣謂意所嚮不知所從則百姓無所錯手足師古曰錯置也音千故反奉世圖難忘死信命殊俗師古曰圖難謀除國難也信讀曰伸威功白著為世使表師古曰白著謂顯明也表猶首也獨抑厭而不揚師古曰厭音一渉反非聖主所以塞疑厲節之意也願下有司議上以先帝時事不復錄奉世有子男九人女四人長女媛以選充後宫為元帝昭儀産中山孝王元帝崩媛為中山太后隨王就國奉世長子譚太常舉孝廉為郎功次補天水司馬如淳曰漢注邊郡置都尉及千人司馬皆不治民也奉世撃西羌譚為校尉隨父從軍有功未拜病死譚弟野王逡立參至大官師古曰逡音千旬反野王字君卿受業博士通詩少以父任為太子中庶子年十八上書願試守長安令宣帝竒其志問丞相魏相相以為不可許後以功次補當陽長遷為櫟陽令徙夏陽令元帝時遷隴西太守以治行髙入為左馮翊嵗餘而池陽令並素行貪汙輕野王外戚年少治行不改野王部督郵掾祋祤趙都師古曰都祋祤人而為掾也祋音丁活反又音丁外反祤音許羽反案驗得其主守盗十金罪收捕並不首吏師古曰不首吏謂不伏從收捕也都格殺並家上書陳寃事下廷尉宋祁曰並字下當更有並字都詣吏自殺以明野王京師稱其威信遷為大鴻臚數年御史大夫李延夀病卒在位多舉野王上使尚書選第中二千石師古曰定其髙下之差也而野王行能第一上曰吾用野王為三公後世必謂我私後宫親屬以野王為比師古曰比例也音必寐反乃下詔曰剛彊堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也廉絜節儉太子少傅張譚是也其以少傅為御史大夫上繇下第而用譚師古曰繇讀與由同越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世成帝立有司奏野王王舅不宜備九卿以秩出為上郡太守如淳曰以鴻臚秩為太守加賜黄金百斤朔方刺史蕭育奏封事薦言野王行能髙妙内足與圖身外足以慮化師古曰圖謀慮思也宋祁曰注文謀字下當添也字竊惜野王懐國之寳而不得陪朝廷與朝者並野王前以王舅出以賢復入明國家樂進賢也上自為太子時聞知野王㑹其病免復以故二千石使行河隄因拜為琅邪太守是時成帝長舅陽平侯王鳯為大司馬大將軍輔政八九年矣時數有灾異京兆尹王章譏鳯顓權不可任用薦野王代鳯上初納其言而後誅章語在元后傳於是野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大將軍鳯風御史中丞劾奏野王師古曰風讀曰諷賜告養病而私自便師古曰便安也音頻面反持虎符出界歸家奉詔不敬杜欽時在大將軍莫府欽素髙野王父子行能奏記於鳯為野王言曰竊見令曰吏二千石告過長安謁如淳曰謁者自白得告也律吏二千石以上告歸歸寧道不過行在所者便道之官無辭不分别予賜如淳曰予予告也賜賜告也今有司以為予告得歸賜告不得是一律两科失省刑之意師古曰省減也音所領反夫三最予告令也師古曰在官連有三最則得予告也病滿三月賜告詔恩也令告則得詔恩則不得宋祁曰景徳本令告詔則得恩不得浙本南本云令告則得詔恩不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令如淳曰律施行無不得去郡之文也傳曰賞疑從予所以廣恩勸功也師古曰疑當賞不當賞則與之疑厚薄則從厚罰疑從去所以慎刑闕難知也師古曰疑當罰不當罰則赦之疑輕重則從輕今釋令與故事而假不敬之法師古曰釋廢弃也假謂假託法律而致其罪甚違闕疑從去之意即以二千石守千里之地任兵馬之重不宜去郡將以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳯不聽竟免野王郡國二千石病賜告不得歸家自此始初野王嗣父爵為關内侯免歸數年年老終于家子座嗣爵師古曰座音才戈反至孫坐中山太后事絶逡字子産通易太常察孝亷為郎補謁者建昭中選為復土校尉光祿勳于永舉茂材為羙陽令功次遷長樂屯衛司馬清河都尉隴西太守治行廉平年四十餘卒為都尉時言河隄方畧在溝洫志宋祁曰在字上當有語字立字聖卿通春秋以父任為郎稍遷諸曹竟寧中以王舅出為五原屬國都尉數年遷五原太守徙西河上郡立居職公廉治行畧與野王相似而多知有恩貸師古曰貸音吐戴反好為條教吏民嘉羙野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衞德化鈞周公康叔猶二君師古曰論語稱孔子曰魯衛之政兄弟也言周公康叔親則兄弟治國之政又相似後遷為東海太守下溼病痺師古曰東海土地下溼故立病痺也痺音必寐反宋祁曰注文痺字上疑有風字天子聞之徙立為太原太守更歴五郡師古曰更音工行反所居有迹年老卒官參字叔平學通尚書少為黄門郎給事中宿衞十餘年參為人矜嚴好修容儀進退恂恂甚可觀也師古曰恂恂謹信之貌音荀參昭儀少弟行又敇備以嚴見憚終不得親近侍帷幄竟寧中以王舅出補渭陵食官令如淳曰給陵上祭祀之事以數病徙為寢中郎師古曰亦渭陵之寢郎也有詔勿事張晏曰不與勞役執事優之師古曰雖居其官不親職也宋祁曰注文優之當作擾之也陽朔中中山王來朝參擢為上河農都尉師古曰上河在西河富平於此為農都尉病免官復為渭陵寢中郎永始中超遷代郡太守以邊郡道逺徙為安定太守數嵗病免復為諌大夫使領護左馮翊都水綏和中立定陶王為皇太子以中山王見廢師古曰見廢謂不得為漢嗣也宋祁曰以字上疑有上字故封王舅參為宜鄉侯以慰王意參之國上書願至中山見王太后行未到而王薨王病時上奏願貶參爵以關内侯食邑留長安上憐之下詔曰中山孝王短命早薨願以舅宜鄉侯參為關内侯歸家朕甚愍之其還參京師以列侯奉朝請五侯皆敬憚之師古曰王氏五侯也丞相翟方進亦甚重焉數謂參物禁太甚師古曰言萬物之禁在於太甚人道亦當隨時不宜獨異君侯以王舅見廢不得在公卿位今五侯至尊貴也與之並列宜少詘節卑體視有所宗師古曰視讀曰示宗尊也而君侯盛修容貌以威嚴加之此非所以下五侯而自益者也師古曰下音胡亞反參性好禮儀終不改其恒操頃之哀帝即位帝祖母傅太后用事追怨參姊中山太后陷以祝詛大逆之罪語在外戚傳參以同産當相坐謁者承制召參詣廷尉參自殺且死仰天嘆曰參父子兄弟皆備大位身至封侯今被惡名而死姊弟不敢自惜傷無以見先人於地下死者十七人衆莫不憐之宗族徙歸故郡賛曰詩稱抑抑威儀惟德之隅師古曰大雅抑之詩也抑抑密也隅廉也言有密靜之德審於威儀則其持心有廉隅宜鄉侯參鞠躬履方擇地而行師古曰鞠躬謹敬貌履方踐方直之道也鞠音居六反宋祁曰注中鞠躬當云鞠躬曲躬也可謂淑人君子然卒死於非罪不能自免師古曰卒終也哀哉讒邪交亂貞良被害自古而然故伯竒放流師古曰説苑云王國子前母子伯竒後母子伯封兄弟相重後母欲令其子立為太子乃譖伯竒而王信之乃放伯竒也宋祁曰注文重字當作愛字孟子宫刑張晏曰寺人孟子賢者被讒見宫刑作巷伯之詩也申生雉經師古曰國語云晉獻公黜太子申生乃雉經于新城之廟盖為俛頸閉氣而死若雉之為屈原赴湘師古曰楚辭漁父之篇云屈原曰寧赴湘流葬於江魚腹中也小弁之詩作離騷之辭興師古曰小弁小雅篇名也太子之傅作焉刺幽王信讒黜申后而放太子宜咎也離騷經屈原所作也離遭也騷憂也遭憂而作辭弁音盤經曰心之憂矣涕既隕之師古曰即小弁之詩也隕墜也馮參姊弟亦云悲矣前漢書卷七十九前漢書卷七十九考證馮奉世傳至伊修城注師古曰伊修城在鄯善國云云臣召南按伊修城當作伊循城各本俱誤西域傳鄯善國中有伊循城其地肥羙漢置都尉所謂伊循田官也通鑑亦作伊循知宋時漢書本尚不悞後來刋本訛循作修耳顔注亦然初昭帝末西河屬國胡伊酋若王亦將衆數千人畔臣召南按昭帝應是宣帝之訛昭帝時奉世名尚未著安得持節將兵且西河屬國始置於五鳳四年宣紀可證也當昭帝時尚無西河屬國安得有叛人耶於是遣奉世將萬二千人騎文義似衍人字典屬國為右軍屯白石地理志狄道白石山在東狄道隴西郡治也馮奉世子野王御史大夫李延夀病卒即公卿表所云繁延夀也此文作李此人有二姓馮奉世子參參擢為上河農都尉注師古曰上河在西河富平於此為農都尉臣召南按地理志西河郡有富昌縣無富平縣且富昌縣下亦不云農都尉治又顔注叙傳曰上河地名農都尉者典農事二注自相矛盾按地理志富平有二一屬平原郡故名厭次宣帝時更名也一屬北地郡有北部都尉渾懐都尉亦不云農都尉治也惟張掖郡畨和縣有農都尉治明文前漢書卷七十九考證
