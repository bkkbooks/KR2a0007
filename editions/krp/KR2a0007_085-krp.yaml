body:
  text: 前漢書卷八十五漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注谷永杜鄴𫝊第五十五谷永字子雲長安人也父吉為衞司馬使送郅支單于侍子師古曰為使而送之還本國也郅音質為郅支所殺語在陳湯傳永少為長安小史後博學經書建昭中御史大夫繁延夀師古曰即李延夀也一姓繁音蒲河反聞其有茂材除補屬舉為太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純徳懼天地之戒異飭身修政師古曰飭與敕同敕整也納問公卿又下明詔帥舉直言師古曰帥舉謂公卿守相皆令舉也帥字或作師師衆也燕見紬繹以求咎愆師古曰紬讀曰抽紬繹者引其端緒也韋昭曰繹陳也使臣等得造明朝承聖問師古曰造至也音千到反臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心師古曰五事貌言視聼思也大中即皇極也解在五行志則庻徴序於下日月理於上師古曰庻衆也徴證也如人君滛溺後宫般樂游田師古曰如若也般讀與盤同五事失於躬大中之道不立則咎徴降而六極至師古曰六極謂一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱凡災異之𤼵各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭牆之内師古曰蕭牆屏牆也解在五行志二者同日俱發以丁寧陛下師古曰丁寧謂再三告示也厥咎不逺宜厚求諸身師古曰厚猶深也意豈陛下志在閨門未䘏政事不慎舉錯師古曰志在閨門謂留心於女色也錯置也音千故反婁失中與師古曰婁古屢字也與讀曰歟下皆類此内寵太盛女不遵道嫉妬専上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於内埶行於外至覆傾國家或亂隂陽師古曰謁請也内則所請必外則擅其權力言女寵盛也行昔襃姒用國宗周以喪師古曰襃姒襃人所獻之女也幽王惑之卒有犬戎之禍閻妻驕扇日以不臧師古曰閻嬖寵之族也扇熾也臧善也魯詩小雅十月之交篇曰此日而食于何不臧又曰閻妻扇方處言厲王無道内寵熾盛政化失理故致災異日為之食為不善也蕭該音義曰劉氏曰閻音滛該按毛詩作艶此其效也經曰皇極皇建其有極師古曰周書洪範之辭也皇大也極中也大立其有中所以行九疇之義也𫝊曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統羣生方内之治亂在陛下所執師古曰方内四方之内也誠留意於正身勉强於力行損燕私之間以勞天下師古曰損減也間讀曰閑勞憂也放去淫溺之樂罷歸倡優之关師古曰关古笑字絶郤不享之義慎節游田之虞師古曰郤退也享當也言所為不善不當天心也一曰天不祐之不歆享其祀也虞與娱同應劭曰享呼庚反起居有常循禮而動躬親政事致行無倦安服若性師古曰致至也安心而服行之如天性自然也經曰繼自今嗣王其毋滛于酒毋逸于游田惟正之共師古曰周書無逸之辭也言從今以往繼業嗣立之王毋過欲於酒毋放於田獵惟宜正身恭己也共讀與恭同未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致慎也宋祁曰南本無致字别本作之所慎也昔舜飭正二女以崇至徳師古曰虞書堯典云釐降二女于媯汭嬪于虞謂堯以二女妻舜觀其治家欲使治國而舜謹敕正躬以待二女其徳益崇遂受堯禪也飭與敕同楚莊忍絶丹姬以成伯功應劭曰楚莊王得丹姬三月不聼朝保申諌忍絶不復見乃勤政事遂為盟主也師古曰丹姬是楚文王姬也莊王用申公巫臣之諫不納夏姬谷永集丹字作夏是也今此傳作丹轉寫誤耳應氏就而謬釋非本實也伯讀曰霸幽王惑於襃姒周徳降亡魯桓脅於齊女社稷以傾師古曰解並在五行志誠修後宫之政明尊卑之序貴者不得嫉妬専寵以絶驕嫚之端抑襃閻之亂賤者咸得秩進各得厥職師古曰秩次也以次而進御也以廣繼嗣之統息白華之怨師古曰詩小雅白華之篇也幽王惑於襃姒而黜申后故國人作此詩以刺之永言此者譏成帝専寵趙昭儀也劉奉世曰按永後疏云建始河平許班之事傾動前朝今之後起天所不享則建始四年未當有趙昭儀也後宫親屬饒之以財勿與政事師古曰與讀曰豫以逺皇父之類損妻黨之權師古曰皇父周卿士也小雅十月之交詩曰皇父卿士番惟司徒刺厲王淫於色故皇父之屬因嬖寵而為官也逺音于萬反父讀曰甫未有閨門治而天下亂者也治逺自近始習善在左右昔龍筦納言而帝命惟允師古曰龍舜臣名也筦字與管同管主也虞書舜典曰帝曰龍命汝作納言夙夜出納朕命惟允允信也四輔既備成王靡有過事師古曰四輔謂左輔右弼前疑後丞也周書洛誥稱成王曰誕保文武受命亂為四輔誠敇正左右齊栗之臣孟康曰左右尚書官也齊栗言其整齊萬事常戰栗謹敬也戴金貂之飾執常伯之職者師古曰常伯侍中也伯長也常使長事者也一曰常任使之人此為長也皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過師古曰孚信也則左右肅艾師古曰肅敬也艾讀曰乂乂治也羣僚仰法化流四方經曰亦惟先正克左右師古曰周書君牙之辭也言王者欲正百官要在能先正其左右近臣也未有左右正而百官枉者也師古曰枉曲也治天下者尊賢考功則治簡賢違功則亂師古曰簡畧也謂輕慢也誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能師古曰程效也考功實以定徳無用比周之虚譽毋聼寖潤之譖愬師古曰比周言阿黨親密也寖潤積漸之深也比音頻寐反則抱功脩職之吏無蔽傷之憂比周邪偽之徒不得即工李竒曰即就也工官也小人日銷俊艾日隆師古曰艾讀曰乂其下亦同經曰三載考績三考黜陟幽明師古曰虞書舜典之辭也言居官者三年一考其功三考則退其幽闇無功者升其昭明有功者又曰九徳咸事俊艾在官師古曰虞書咎繇謨之辭也言使九徳之人皆用事俊桀治能之士並在位也九徳謂寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞强而義未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下分絶為十二州制逺之道微孟康曰本九州洪水隔分更為十二州處所離逺相制之道微也師古曰十二州謂冀兗豫青徐荆揚雍梁幽并營也而無乖畔之難者徳厚恩深無怨於下也秦居平土一夫大呼而海内崩析者師古曰呼音火故反刑罰深酷吏行殘賊也夫違天害徳為上取怨於下莫甚乎殘賊之吏誠放退殘賊酷暴之吏錮廢勿用益選温良上徳之士以親萬姓師古曰親謂愛養之平刑釋寃以理民命師古曰釋解也務省繇役毋奪民時薄收賦稅毋殫民財師古曰殫盡也音單使天下黎元咸安家樂業不苦踰時之役師古曰古者行役不踰時時謂三月是為一時不患苛暴之政不疾酷烈之吏師古曰言免此疾患雖有唐堯之大災民無離上之心師古曰堯遭洪水故云大災經曰懐保小人恵于鰥寡師古曰周書無逸之辭也懐和也保安也未有徳厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極師古曰周書洪範之辭饗當也言所行當於天心則降以五福若所為不善則以六極畏罰之五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命六極之解已具於前𫝊曰六沴作見若不共御六罰既侵六極其下師古曰此洪範之𫝊也沴災氣也共讀曰恭御讀曰禦言敬而修徳以禦災今三年之間災異鋒起小大畢具所行不享上帝師古曰享當也不當天心上帝不豫師古曰豫悦也炳然甚著不求之身無所改正疏舉廣謀又不用其言晉灼曰疏逺也是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南靣之急務唯陛下留神對奏天子異焉特召見永其夏皆令諸方正對策語在杜欽𫝊永對畢因曰臣前幸得條對災異之效禍亂所極言闗於聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虚文師古曰角竟也宋祁曰竟疑作競欲末殺災異滿讕誣天師古曰末殺掃滅也滿讕謂欺罔也殺音先曷反讕音來亶反蕭該曰滿讕或音漫是故皇天勃然發怒甲己之間暴風三溱拔樹折木師古曰從甲至己凡六日也溱與臻同臻至也此天至明不可欺之效也上特復問永永對曰日食地震皇后貴妾専寵所致語在五行志是時上初即位謙譲委政元舅大將軍王鳳議者多歸咎焉永知鳳方見柄用師古曰言任用之授以權也隂欲自託乃復曰方今四夷賔服皆為臣妾北無薫粥冒頓之患師古曰粥音弋六反南無趙佗吕嘉之難三垂晏然靡有兵革之警師古曰晏安也諸侯大者乃食數縣漢吏制其權柄不得有為亡呉楚燕梁之埶百官盤互親疏相錯師古曰盤互盤結而交互也錯間雜也互字或作牙言如豕牙之盤曲犬牙之相入也骨肉大臣有申伯之忠師古曰申伯周申后之父洞洞屬屬小心畏忌師古曰洞洞驚肅也屬屬専謹也洞音動屬音之欲反無重合安陽博陛之亂師古曰重合莽通安陽上官桀博陸霍禹也三者無毛髪之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽說欺天者也師古曰檻義取檻柙之檻檻猶開也其字從木瞽説言不中道若無目之人也宋祁曰蘇林曰濫汜也淳音作檻閉也晉灼曰於義蘇音是該案蘇濫汜者字林曰濫汜濫也濫音力暫反如淳曰檻閉者字林曰檻櫳也一曰圏也丁斬反又力甘反宦官或無宦字顏注文開字越本作閉竊恐陛下舍昭昭之白過忽天地之明戒聼晻昧之瞽説師古曰舍謂留也晻字與暗同又音一感反歸咎乎無辜倚異乎政事師古曰倚依也音於綺反次下亦同重失天心師古曰重音直用反不可之大者也師古曰此則為大不可也陛下即位逶任遵舊宋祁曰逶或作委未有過政元年正月白氣較然起乎東方師古曰較明貌也宋祁曰注文也字當刪至其四月黄濁四塞覆冒京師申以大水著以震蝕師古曰申重也著明也各有占應相為表裏百官庻士無所歸倚陛下獨不怪與師古曰倚音於綺反與讀曰歟白氣起東方賤人將興之表也黄濁冒京師王道微絶之應也夫賤人當起而京師道微二者已醜師古曰已甚也陛下誠深察愚臣之言致懼天地之異長思宗廟之計改往反過抗湛溺之意解偏駮之愛師古曰抗舉也湛讀曰沈駮不周普也奮乾剛之威平天覆之施使列妾得人人更進猶尚未足也師古曰更互也音工衡反急復益納宜子婦人毋擇好醜毋避嘗字如淳曰王鳳上小妻弟以納後宫以嘗字乳王章言之坐死今永及此為鳳洗前過也劉奉世曰按王章言事坐誅在陽朔初而永此對乃是建始四年則非為鳳而言也然觀永前後之文實若為鳳但班固於此對後乃云永為上第擢為光禄大夫則同是建始四年中事也毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也師古曰苟得子耳勿論其母之貴賤後宫女史使令有直意者廣求於微賤之間師古曰直當也令音力成反以遇天所開右師古曰右讀曰佑佑助也慰釋皇太后之憂愠師古曰釋散也解謝上帝之譴怒則繼嗣蕃滋災異訖息師古曰蕃多也訖止也蕃音扶元反陛下則不深察愚臣之言忽於天地之戒咎根不除水雨之災山石之異將發不久發則災異已極天變成形臣雖欲捐身闗策不及事已師古曰言禍敗既成不可如何也已語終辭也疏賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾師古曰間音居莧反自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也師古曰右讀曰佑三上封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦師古曰由從也苦勞苦也由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣如淳曰永為鳳言而言示腹心大臣無不可矣腹心大臣以為非天意臣當伏妄言之誅則以為誠天意也宋祁曰則字姚本改作即奈何忘國家大本背天意而從欲師古曰從讀曰縱唯陛下省察熟念厚為宗廟計時對者數千人宋祁曰姚本改千作十永與杜欽為上第焉上皆以其書示後宫後上嘗賜許皇后書采永言以責之語在外戚𫝊永既隂為大將軍鳳説矣能實最高由是擢為光禄大夫永奏書謝鳳曰永斗筲之材師古曰筲竹器也斗筲喻小而不大也解在公孫劉田傳筲音所交反質薄學朽無一日之雅左右之介師古曰雅素也介紹也言非宿素之交又無紹介而進也將軍說其狂言師古曰説讀曰悦擢之皂衣之吏厠之爭臣之末不聼浸潤之譖不食膚受之愬師古曰食猶受納也膚受謂入皮膚至骨髓言其深也雖齊桓晉文用士篤密父悊兄覆育子弟誠無以加師古曰察明也悊智也昔豫子吞炭壊形以奉見異師古曰豫讓也為智伯報讎欲殺趙襄子恐人識之故吞炭以變其聲釁面以壊其形云智伯國士遇我故也齊客隕首公門以報恩施師古曰舍人魏子三收邑入不與孟嘗孟嘗怒之魏子曰假與賢者齊湣王受讒孟嘗出奔魏子所與粟賢者到宫門自剄以明孟嘗之心知氏孟嘗猶有死士何況將軍之門鳳遂厚之數年出為安定太守時上諸舅皆修經書任政事平阿侯譚年次當繼大將軍鳳輔政尤與永善陽朔中鳳薨鳳病困薦從弟御史大夫音以自代上從之以音為大司馬車騎將軍領尚書事而平阿侯譚位特進領城門兵永聞之與譚書曰君侯躬周召之徳執管晏之操師古曰召讀曰邵其下亦同敬賢下士樂善不倦師古曰下音胡亞反宜在上將久矣以大將軍在故抑鬱於家不得舒憤今大將軍不幸蚤薨師古曰蚤古早字絫親疏序材能宜在君侯師古曰絫古累字累親疏謂積累其次而計之拜吏之日京師士大夫悵然失望此皆永等愚劣不能襃揚萬分師古曰言萬分之一屬聞以特進領城門兵師古曰屬近也音之欲反是則車騎將軍秉政雍容於内而至戚賢舅執管籥於外也愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門之守收太伯之讓保謙謙之路師古曰太伯王季之兄也讓不為嗣而適吴越闔門高枕為知者首願君侯與博覽者參之師古曰參詳其事小子為君侯安此譚得其書大感遂辭讓不受領城門職由是譚音相與不平永逺為郡吏恐為音所危病滿三月免音奏請永補營軍司馬永數謝罪自陳得轉為長史音用從舅越親輔政威權損於鳳時永復說音曰將軍履上將之位食膏腴之都任周召之職擁天下之樞師古曰擁持也可謂富貴之極宋祁曰之疑作至人臣無二天下之責四面至矣將何以居之宜夙夜孳孳師古曰孳孳不怠也孳與孜同執伊尹之彊徳以守職匡上誅惡不避親愛舉善不避仇讎以章至公立信四方師古曰章明也篤行三者乃可以長堪重任久享盛寵師古曰篤厚也享當也太白出西方六十日法當參天今已過期服䖍曰太白出當居天三分之一已過期言其行遲在戌亥之間尚在桑榆之間質弱而行遲形小而光微如淳曰言其行遲象王音也永見音為司馬以疏間親自以位過故以太白喻司馬司馬主兵故也是永之佞曲從苟合也熒惑角怒明大逆行守尾其逆常也宋祁曰常字下疑有道字守尾變也意豈將軍忘湛漸之義委曲從順師古曰湛讀曰沈漸讀曰潛周書洪範曰沈潛剛克言人性沈密而潛深者行之以剛則能堪也故激勸之云爾所執不彊不廣用士尚有好惡之忌蕩蕩之徳未純師古曰此永自知有忤於音故以斯言自救解方與將相大臣乖離之萌也何故始襲司馬之號俄而金火並有此變上天至明不虛見異唯將軍畏之慎之深思其故改求其路以享天意音猶不平薦永為䕶菀使者音薨成都侯商代為大司馬衞將軍永乃遷為涼州刺史奏事京師訖當之部時有黑龍見東萊上使尚書問永受所欲言師古曰永有所言令尚書即受之永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輙上聞師古曰如若也有即上聞則商周不易姓而迭興三正不變改而更用師古曰迭音徒結反更音工衡反夏商之將亡也行道之人皆知之師古曰凡在道路行者也晏然自以若天有日莫能危師古曰自謂如日在天而無有能傷危也是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也師古曰下繫之辭也言安必思危存不忘亡乃得保其安存陛下誠垂寛明之聼無忌諱之誅使芻蕘之臣得盡所聞於前不懼於後患直言之路開則四方衆賢不逺千里輻湊陳忠羣臣之上願社稷之長福也漢家行夏正夏正色黒黒龍同姓之象也張晏曰夏以建寅為正萬物在地中色黑今黑龍見同姓象也龍陽徳由小之大師古曰言因小以至大故為王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪將動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能處也師古曰處謂斷決也元年九月宋祁曰元年當作去年黒龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒書曰乃用婦人之言自絶于天師古曰今文周書泰誓之辭婦人妲己言紂用妲己之言自取殄滅非天絶之四方之逋逃多罪是宗是長是信是使師古曰亦泰誓之辭也宗尊也言紂容納逃亡多罪之人親信使用尊而長之詩云燎之方陽能或滅之赫赫宗周襃姒烕之師古曰小雅正月之詩烕亦滅也言火燎方熾寧有能滅之者乎而宗周之盛乃為襃姒所滅怨其甚也烕音呼悦反宋祁曰説文曰烕滅也從火戌聲火死乃戌陽氣至戍而盡音許滅反姚本能作寧注文盛作熾易曰濡其首有孚失是師古曰未濟上九爻辭也言躭樂無節飲酒濡首有信之道於是遂失也濡濕也秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請畧陳其效易曰在中餽無攸遂師古曰家人六二爻辭也餽與饋同饋食也言婦人之道居中主食遜順而已無所必遂言婦人不得與事也師古曰與讀曰豫詩曰懿厥悊婦為梟為鴟匪降自天生自婦人師古曰大雅瞻卬之詩懿羙也悊智也言幽王以悊婦為羙實乃為梟鴟也婦謂襃姒也梟鴟惡聲之鳥故以喻焉又言此禍亂非從天而下以寵襃姒之故生此災耳建始河平之際許班之貴頃動前朝師古曰許皇后及班媫妤之家熏灼四方賞賜無量空虚内臧女寵至極不可上矣師古曰上猶加也今之後起天所不饗什倍于前如淳曰謂趙李本從卑賤起也廢先帝法度聼用其言官秩不當縱釋王誅師古曰縱放也釋解也王誅謂王法當誅者驕其親屬假之威權從横亂政師古曰從音子用反横音胡孟反刺舉之吏莫敢奉憲又以掖庭獄大為亂阱師古曰穿地為坑阱以拘繫人也亂者言其非正而又多也阱音材性反劉奉世曰言設獄陷人如阱耳榜箠㿊於炮烙師古曰㿊痛也炮烙紂所作刑也膏塗銅柱加之以火令罪人行其上輙墮炭中笑而以為樂㿊音千感反蕭該音義曰榜音彭絶滅人命主為趙李報徳復怨師古曰復亦報也音扶福反反除白罪建治正吏師古曰反讀曰幡罪之明白者反而除之吏之公正者建議劾治也多繫無辜掠立迫恐師古曰掠笞服之立其罪名至為人起責分利受謝師古曰言富賈有錢假託其名代之為主放與它人以取利息而共分之或受報謝别取財物生入死出者不可勝數是以日食再既以昭其辜孟康曰既盡也師古曰昭明也王者必先自絶然後天絶之陛下棄萬乘之至貴樂家人之賤事師古曰謂私畜田及奴婢財物厭高羙之尊號好匹夫之卑字孟康曰成帝好微行更作私字以相呼崇聚僄輕無義小人以為私客師古曰僄疾也音頻妙反又匹妙反數離深宫之固挺身晨夜與羣小相隨師古曰挺引也音大鼎反烏集雜㑹飲醉吏民之家師古曰言聚散不恒如烏鳥之集亂服共坐流湎媟嫚溷殽無别閔免遁樂晝夜在路師古曰閔免猶黽勉也遁流遁也典門户奉宿衞之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭師古曰言常畏懼今陛下輕奪民財不愛民力聼邪臣之計去高敞初陵捐十年功緒師古曰緒謂功作之端次改作昌陵反天地之性因下為高積土為山發徒起邑並治宫館大興繇役重増賦斂徴𤼵如雨師古曰言其多也役百乾谿費疑驪山師古曰疑讀曰儗儗比也言勞役之功百倍於楚靈王費財之廣比於秦始皇宋祁曰史記楚世家靈王樂乾谿不能去也國人苦役靡敝天下師古曰靡散也音武皮反五年不成而後反故又廣旴營表晉灼曰旴音吁旴大也宋祁曰姚本注末有廣大營表四字發人冢墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異婁降饑饉仍臻師古曰婁古屢字也仍頻也流散冗食餧死於道以百萬數師古曰冗亦散也餧餓也冗音人勇反餧音乃賄反公家無一年之畜百姓無旬日之儲師古曰畜讀曰蓄上下俱匱無以相救詩云殷監不逺在夏后之世師古曰大雅蕩之詩也願陛下追觀夏商周秦所以失之以鏡考已行師古曰鏡謂鑑照之考校也有不合者臣當伏妄言之誅師古曰言上之所為違於節儉與永言同漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯發明聖之徳昭然逺寤畏此上天之威怒深懼危亡之徴兆蕩滌邪辟之惡志師古曰辟讀曰僻厲精致政専心反道師古曰反猶還也絶羣小之私客免不正之詔除師古曰除謂除補為官者悉罷北宫私奴車馬媠出之具師古曰媠亦惰字耳媠出惰游也宋祁曰姚本媠作姷音又耦也蕭該音義媠作姷音侑克己復禮毋貳微行出飲之過師古曰貳謂重為之也論語稱孔子云顏回不貳過以防迫切之禍深惟日食再既之意抑損椒房玉堂之盛寵師古曰椒房皇后所居玉堂嬖妾之舍也毋聼後宫之請謁除掖庭之亂獄出炮烙之陷阱誅戮佞邪之臣及左右執左道以事上者以塞天下之望且寢初陵之作止諸繕治宫室闕更減賦盡休力役師古曰闕亦謂減削之更謂更卒也音工衡反存恤振捄困乏之人以弭逺方師古曰捄古救字也弭安也厲崇忠直放退殘賊無使素餐之吏久尸厚祿以次貫行固執無違師古曰貫聫續也謂上所陳衆條諸事宜次第相續行之不當更違異也貫音工端反宋祁曰工端反當作工斷反夙夜孳孳婁省無怠師古曰婁古屢字也屢省屢自觀省也舊愆畢改新徳既章師古曰章明也纎介之邪不復載心宋祁曰載當作惑則赫赫大異庻幾可銷天命去就庻幾可復師古曰去就者言去離無徳而就有徳社稷宗廟庻幾可保唯陛下留神反覆熟省臣言臣幸得備邊部之吏不知本朝失得瞽言觸忌諱罪當萬死成帝性寛而好文辭又久無繼嗣數為微行多近幸小臣趙李從微賤専寵皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諌勸上納用之永自知有内應展意無所依違師古曰展申也毎言事輙見荅禮師古曰加禮而荅之至上此對上大怒衞將軍商密擿永令發去師古曰擿謂𤼵動之音它歴反上使侍御史收永敕過交道廐者勿追晉灼曰交道廐去長安六十里近延陵御史不及永還上意亦解自悔明年徴永為大中大夫遷光祿大夫給事中元延元年為北地太守時災異尤數永當之官上使衞尉淳于長受永所欲言永對曰臣永幸得以愚朽之材為大中大夫備拾遺之臣從朝者之後進不能盡思納忠輔宣聖徳退無被堅執鋭討不義之功猥蒙厚恩仍遷至北地太守絶命隕首身膏野草不足以報塞萬分陛下聖徳寛仁不遺易忘之臣師古曰易忘言其微賤不足記也垂周文之聼下及芻蕘之愚有詔使衞尉受臣永所欲言臣聞事君之義有言責者盡其忠師古曰謂職當諫諍有官守者脩其職臣永幸得免於言責之辜有官守之任師古曰言不為諌官但郡守耳當畢力遵職飬綏百姓而已師古曰綏安也不宜復闗得失之辭忠臣之於上志在過厚是故逺不違君死不忘國昔史魚既没餘忠未訖委柩後寑以屍達誠如淳曰禮大夫殯於正室士於適室韓非曰史魚卒委柩後寑衞君弔而問之曰不能進蘧伯玉退彌子瑕以屍諌也汲黯身外思内𤼵憤舒憂遺言李息師古曰謂論張湯也事見黯𫝊經曰雖爾身在外乃心無不在王室師古曰周書康王之誥也言諸蕃屏之臣身雖在外其心常當忠篤而在王室臣永幸得給事中出入三年雖執干戈守邊垂思慕之心常存于省闥是以敢越郡吏之職陳累年之憂臣聞天生蒸民不能相治師古曰蒸衆也為立王者以統理之方制海内非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有徳不私一姓明天下廼天下之天下非一人之天下也王者躬行道徳承順天地博愛仁恕恩及行葦師古曰詩大雅行葦之篇曰敦彼行葦牛羊勿踐履言政化所及仁道霑被雖草木至賤無所殘傷籍税取民不過常法宮室車服不踰制度事節財足黎庻和睦則卦氣理效五徴時序百姓夀考庻􅋄蕃滋師古曰庻衆也􅋄古草字也蕃多也音扶元反符瑞並降以昭保右師古曰保安也右助也言為天所安助也右讀曰佑失道妄行逆天暴物窮奢極欲湛湎荒滛師古曰湛讀曰沈婦言是從誅逐仁賢離逖骨肉羣小用事師古曰逖逺也峻刑重賦百姓愁怨則卦氣悖亂咎徴著郵師古曰悖乖也郵字與尤同尤過也悖音布内反上天震怒災異婁降日月薄食五星失行山崩川潰水泉踊出妖孽並見茀星耀光師古曰茀與孛同音歩内反飢饉荐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有徳詩云乃眷西顧此惟予宅師古曰大雅皇矣之詩也言天以殷紂為惡不變乃眷然西顧見文王之徳而與之宅居也夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功徳有厚薄期質有脩短時世有中季天道有盛衰師古曰中讀曰仲陛下承八世之功業當陽數之標季孟康曰陽九之末季也師古曰標音必遥反渉三七之節紀孟康曰至平帝乃三七二百一十嵗之厄今已渉向其節紀遭无妄之卦運應劭曰天必先雲而後雷雷而後雨而今無雲而雷无妄者無所望也萬物无所望於天災異之最大者也師古曰取易之无妄卦為義直百六之災阸師古曰直當也三難異科雜焉同㑹師古曰雜謂相參也一曰雜音先合反雜焉總萃貌建始元年以來二十載間羣災大異交錯鋒起多於春秋所書八世著記久不塞除李竒曰高祖以來至元帝著記災異未塞除也重以今年正月己亥朔日有食之師古曰重音直用反三朝之㑹師古曰嵗月日三者之始故云三朝四月丁酉四方衆星白晝流隕七月辛未彗星横天乘三難之際㑹畜衆多之災異師古曰畜讀曰蓄蓄積聚也因之以飢饉接之以不贍彗星極異也土精所生流隕之應出於飢變之後兵亂作矣厥期不久隆徳積善懼不克濟師古曰修徳積善尚恐不濟況不隆不積者乎内則為深宫後庭將有驕臣悍妾醉酒狂悖卒起之敗師古曰卒讀曰猝北官苑囿街巷之中臣妾之家幽閒之處師古曰閒讀曰閑徴舒崔杼之亂師古曰陳夏徵舒弑其君平國齊崔杼弑其君光外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍内亂朝暮日戒諸夏師古曰内亂則禍在朝暮諸夏則日戒有兵舉兵以火角為期張晏曰以熒惑芒角為期安危之分界宗廟之至憂師古曰分音扶問反臣永所以破膽寒心師古曰言懼甚豫言之累年下有其萌然後變見於上師古曰萌謂事之始生如草木之萌牙者也可不致慎禍起細微姦生所易師古曰易輕也音弋䜴反願陛下正君臣之義無復與羣小媟黷燕飲師古曰媟狎也黷汙也中黄門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留動三綱之嚴修後宫之政師古曰三綱君臣父子夫婦也抑逺驕妬之寵崇近婉順之行加恵失志之人懐柔怨恨之心師古曰懐和也保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除内亂之路塞矣諸夏舉兵萌在民飢饉而吏不䘏興於百姓困而賦歛重發於下怨離而上不知易曰屯其膏小貞吉大貞凶孟康曰膏者所以潤人肌膚爵祿亦所以養人者也小貞臣也大貞君也遭屯難飢荒君當開倉廩振百姓而反吝則凶臣吝嗇則吉論語曰出納之吝謂之有司師古曰易屯卦九五爻辭𫝊曰飢而不損兹謂泰厥災水厥咎亡師古曰洪範𫝊之辭訞辭曰闗動牡飛辟為無道臣為非厥咎亂臣謀簒師古曰易訞占之辭也訞即妖字耳王者遭衰難之世有飢饉之災不損用而大自潤故凶百姓困貧無以共求師古曰共讀曰供無以供在上之所求愁悲怨恨故水城闗守國之固固將去焉故牡飛往年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水泛濫郡國十五有餘宋祁曰十五姚本作五十比年喪稼師古曰比頻也時過無宿麥師古曰時過者失時不得種也秋種夏收故云宿麥百姓失業流散羣軰守闗如淳曰欲入就賤榖也大異較炳如彼水災浩浩黎庻窮困如此宜損常稅小自潤之時師古曰言所潤益於己者當減小之而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之狀殆為此發古者榖不登虧膳災婁至損服凶年不塈塗明王之制也師古曰塈如今仰泥屋也音許既反詩云凡民有喪扶服捄之師古曰邶國谷風之詩服音蒲北反捄古救字論語曰百姓不足君孰予足師古曰論語載有若對哀公之辭也言百姓不足君安得獨足乎臣願陛下勿許加賦之奏益減大官導官中御府均官掌畜廩犧用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏開闗梁内流民恣所欲之師古曰之往也以救其急立春遣使者循行風俗師古曰行音下更反宣布聖徳存䘏孤寡問民所苦勞二千石師古曰勞慰勉也二千石謂郡守諸侯相也音來到反敕勸耕桑毋奪農時以慰綏元元之心師古曰綏安也防塞大姦之隙諸夏之亂庻幾可息臣聞上主可與為善而不可與為惡下主可與為惡而不可與為善陛下天然之性疏通聰敏上主之姿也師古曰姿材也少省愚臣之言感寤三難師古曰省視也深畏大異定心為善捐忘邪志毋貳舊愆厲精致政至誠應天則積異塞扵上禍亂伏於下何憂患之有竊恐陛下公志未専私好頗存尚愛羣小不肯為耳對奏天子甚感其言永於經書汎為疏達師古曰汎普也音敷劍反與杜欽杜鄴畧等不能洽浹如劉向父子及揚雄也其於天官京氏易最密故善言災異前後所上四十餘事畧相反覆専攻上身與後宫而已黨於王氏上亦知之不甚親信也永所居任職師古曰言所處之官皆稱職為北地太守嵗餘衞將軍商薨曲陽侯根為票騎將軍薦永徴入為大司農嵗餘永病三月有司奏請免故事公卿病輙賜告至永獨即時免數月卒於家本名並以尉氏樊並反更名永云杜鄴字子夏本魏郡繁陽人也祖父及父積功勞皆至郡守武帝時徙茂陵鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝廉為郎與車騎將軍王音善平阿侯譚不受城門職後薨上閔悔之乃復令譚弟成都侯商位特進領城門兵得舉吏如將軍府鄴見音前與平阿有隙即說音曰鄴聞人情恩深者其飬謹愛至者其求詳師古曰詳悉也夫戚而不見殊孰能無怨師古曰戚近也殊謂異於疏也此棠棣角弓之詩所為作也師古曰棠棣角弓皆小雅篇名也棠棣美燕兄弟角弓刺不親九族也昔秦伯有千乘之國而不能容其母弟春秋亦書而譏焉師古曰秦景公母弟公子鍼有寵於其父桓公景公立鍼懼而奔晉事在昭元年故經書秦伯之弟鍼出奔晉傳曰稱弟罪秦伯也周召則不然師古曰言周公召公無私怨也忠以相輔義以相匡同己之親等己之尊不以聖徳獨兼國寵又不為長專受榮任分職於陜並為弼疑師古曰分職於陜謂自陜以東周公主之自陜以西召公主之陜即今陜州縣也音式冉反而說者妄云分郟是潁州郟縣繆矣弼疑謂左輔右弼前疑後丞也故内無感恨之隙外無侵侮之羞師古曰感音胡闇反俱享天祐兩荷高名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也將軍宜承順聖意加異往時毎事凡議必與及之指為誠發出於將軍則孰敢不説諭師古曰言此之意指皆出忠誠彼必和悦無憂乖異也說讀曰悦昔文侯寤大鴈之獻而父子益親師古曰魏文侯廢太子擊立擊弟訢封擊於中山三年不往來擊臣趙倉唐進大鴈於文侯應對以禮文侯感寤廢訢而召立擊父子更親也陳平共壹飯之籑而將相加驩師古曰陳平用陸賈説以五百金為絳侯具食是也共讀曰供宋祁曰籑景本作饌舊本作籑聲類曰饌字或作籑晉灼同聲類籑即饌字蕭該音義曰今人不識籑逐易識作饌字耳所接雖在楹階俎豆之間其於為國折衝厭難豈不逺哉師古曰厭音一葉反竊慕倉唐陸子之義所白奥内唯深察焉師古曰奥内室中隐奥之處也音甚嘉其言由是與成都侯商親密二人皆重鄴後以病去郎商為大司馬衞將軍除鄴主簿以為腹心舉侍御史哀帝即位遷為涼州刺史鄴居職寛舒少威嚴數年以病免是時帝祖母定陶傅太后稱皇太太后帝母丁姬稱帝太后而皇后即傅太后從弟子也傅氏侯者三人丁氏侯者二人又封傅太后同母弟子鄭業為陽信侯傅太后尤與政専權師古曰與讀曰豫元夀元年正月朔上以皇后父孔鄉侯傅晏為大司馬衞將軍而帝舅陽安侯丁明為大司馬票騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對曰臣聞禽息憂國碎首不恨應劭曰禽息秦大夫薦百里奚而不見納繆公出當車以頭撃闑腦乃播出曰臣生無補於國而不如死也繆公感寤而用百里奚秦以大治卞和獻寶刖足願之師古曰解在鄒陽傳臣幸得奉直言之詔無二者之危敢不極陳臣聞陽尊隂卑卑者隨尊尊者兼卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義師古曰謂婦人在家從父既嫁從夫夫死從子宋祁曰晏本無國字雖有文母之徳必繫於子師古曰文母文王之妃太姒也劉奉世曰文母文王之母也何預太姒春秋不書紀侯之母隂義殺也師古曰隠二年紀侯使裂繻來逆女公羊傳曰婚禮不稱主人主人謂壻也不稱母母不通也殺謂減降也音所例反昔鄭伯隨姜氏之欲終有叔叚簒國之禍周襄王内迫恵后之難而遭居鄭之危師古曰解並在前漢興吕太后權私親屬又以外孫為孝恵后是時繼嗣不明凡事多晻師古曰晻與暗同晝昏冬雷之變不可勝載竊見陛下行不偏之政毎事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌𫝊相驚恐案春秋災異以指象為言語師古曰謂天不言但以景象指意告喻人故在於得一類而達之也日食眀陽為隂所臨坤卦乘離明夷之象也應劭曰明夷之卦上六不明晦初登于天後入于地明夷者明傷也初登于天者初為天子言以善聞于天也後入于地者傷賢害仁佞惡在朝必以惡終入于地也坤以法地為土為母以安靜為徳震不隂之效也師古曰言地當安静而今乃震是為不遵隂道也占象甚明臣敢不直言其事昔曽子問從令之義孔子曰是何言與師古曰曽子問子從父之令可謂孝乎孔子非之事見孝經與讀曰歟善閔子騫守禮不苟從親所行無非理者故無可閒也師古曰論語稱孔子曰孝哉閔子騫人不閒於其父母昆弟之言是也閒音居莧反前大司馬新都侯莽退伏第家以詔策決復遣就國高昌侯宏去蕃自絶猶受封土師古曰董宏也制書侍中駙馬都尉遷不忠巧佞免歸故郡師古曰傅遷也閒未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使顯寵過故及陽信侯業皆緣私君國非功義所止師古曰謂緣私恩而得封爵為一國之君耳非有功而侯也諸外家昆弟無賢不肖並侍帷幄布在列位師古曰不問賢與不肖皆親近在位或典兵衞或將軍屯寵意并於一家積貴之埶世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日晻然日食師古曰晻音烏感反不在前後臨事而發者明陛下謙遜無専承指非一所言輙聼所欲輙隨師古曰謂皆迫於太后也有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是師古曰尤過也言過惡正在於此欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之師古曰由從也邑於邑也逮身所行不自鏡見則以為可計之過者師古曰逮及也鏡鑒照也自以所行為可是計策之誤也疏賤獨偏見疑内亦有此類如淳曰在外而賤舉錯有過失為主上所疑也師古曰此説非也言天子不自見其過疏賤獨偏見鄴自謂傍觀而見之也疑内亦有此類謂後官嬖幸非理寵遇亦有如傅遷鄭業等妄受恩賞者天變不空保右世主如此之至奈何不應師古曰右讀曰佑應謂應天戒而脩徳政臣聞野雞著怪高宗深動師古曰謂雉升鼎耳故懼而脩徳解在五行志大風暴過成王怛然師古曰謂成王信流言而疑周公天乃雷電以風禾盡偃大木斯拔王乃啓金縢之書悔而還周公願陛下加致精誠思承始初事稽諸古師古曰毎事皆攷於古昔以厭下心則黎庻羣生無不説喜師古曰説讀曰悦上帝百神收還威怒禎祥福禄何嫌不報師古曰嫌疑也鄴未拜病卒鄴言民訛言行籌及谷永言王者買私田彗星隕石牡飛之占語在五行志初鄴從張吉學吉子竦又幼孤從鄴學問亦著於世尤長小學師古曰小學謂文字之學也周禮八嵗入小學保氏教國子以六書故因名云鄴子林清静好古亦有雅材建武中歴位列卿至大司空其正文字過於鄴竦故世言小學者由杜公贊曰孝成之世委政外家諸舅持權重於丁傅在孝哀時故杜鄴敢譏丁傅而欽永不敢言王氏其埶然也及欽欲挹損鳳權而鄴附㑹音商永陳三七之戒斯為忠焉至其引申伯以阿鳳隙平阿於車騎師古曰謂勸王譚不受城門之職指金火以求合師古曰謂陳金火之變說音云蕩蕩之徳未純兾音親已忘舊怨也可謂諒不足而談有餘者師古曰諒信也孔子稱友多聞三人近之矣師古曰孔子云友直友諒友多聞益矣贊言杜鄴杜欽谷永無直諒之徳但多聞也前漢書卷八十五前漢書卷八十五考證谷永𫝊太常陽城侯劉慶忌按慶忌陽城侯劉徳之孫安民之子自宗正徙為太常閻妻驕扇注師古曰閻嬖寵之族也臣召南按毛詩說豔妻即指褒姒此則另指一人葢齊魯韓三家詩字句本有不同不可執毛詩以難三家也班媫妤亦曰哀褒閻之為郵經曰亦惟先正克左右注師古曰周書君牙之辭也臣召南按君牙篇作亦惟先王之臣克左右亂四方葢今本之誤孔安國𫝊作先正是也其下文又曰乃惟由先正舊典時式即指此先正矣証以此𫝊尤明所可疑者西都祗行伏生今文今文缺君牙篇惟孔安國古文有之然則谷永亦嘗見古文尚書者耶骨肉大臣有申伯之忠胡三省曰申伯宣王之舅谷永以之况王鳳也急復益納宜子婦人注如淳云云劉奉世云云胡三省曰此時鳳葢已納張羙人於後宫故永為之言若王章指言鳳過則在陽朔初也杜鄴𫝊復有詔得舉吏如五府胡三省曰丞相御史及車騎左右將軍也扶陽侯韋育按育韋𤣥成孫寛子雖有文母之徳必繫於子注劉奉世曰文母文王之母也所謂繫于子也何預太姒胡三省曰劉説是詩云思齊太任文王之母前漢書卷八十五考證
