body:
  text: 前漢書卷七十八漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顔師古注蕭望之列傳第四十八蕭望之字長倩東海蘭陵人也師古曰近代譜諜妄相託附乃云望之蕭何之後追次昭穆流俗學者共祖述焉但酇侯漢室宗臣功髙位重子孫𦙍緒具詳表傳長倩鉅儒逹學名節並隆博覽古今能言其祖市朝未變年載非遥長老所傳耳目相接若其實承何後史傳寧得弗詳漢書既不叙論後人焉所取信不然之事斷可識矣徙杜陵家世以田為業至望之好學治齊詩事同縣后倉且十年以令詣太常受業如淳曰令郡國官有好文學敬長肅政教者二千石奏上與計偕詣太常受業如弟子也復事同學博士白竒師古曰常同於后倉受業而竒後為博士又從夏侯勝問論語禮服師古曰禮之喪服也京師諸儒稱述焉是時大將軍霍光秉政長史丙吉薦儒生王仲翁與望之等數人皆召見先是左將軍上官桀與蓋主謀殺光光既誅桀等後出入自備吏民當見者露索去刀兵兩吏挾持師古曰索捜也露形體而捜也索音山客反望之獨不肯聽自引出閤曰不願見吏牽持匈匈光聞之告吏勿持望之既至前説光曰將軍以功德輔幼主將以流大化致於洽平師古曰令太平之化通洽四方也宋祁曰注文通字疑是遍字是以天下之士延頸企踵爭願自効以輔髙明今士見者皆先露索挾持恐非周公相成王躬吐握之禮致白屋之意師古曰周公攝政一沐三握髪一飯三吐餔以接天下之士白屋謂白蓋之屋以茅覆之賤人所居蓋音合宋祁曰吐握字疑是捉字於是光獨不除用望之而仲翁等皆補大將軍史三歲間仲翁至光祿大夫給事中望之以射䇿甲科為郎師古曰射䇿者謂為難問疑義書之於䇿量其大小署為甲乙之科列而置之不使彰顯有欲射者隨其所取得而釋之以知優劣射之言投射也對䇿者顯問以政事經義令各對之而觀其文辭定髙下也署小苑東門候師古曰署補署也門候主候時而開閉也仲翁出入從倉頭廬兒師古曰皆官府之給賤役者也解在貢禹傳宋祁曰貢禹傳當是鮑宣傳下車趨門傳呼甚寵師古曰趨讀曰趣趣嚮也下車而嚮門傳聲而呼侍從者甚有尊寵也宋祁曰注文尊寵下疑有之榮字顧謂望之曰不肯錄錄反抱關為師古曰錄錄謂循常也言望之不能隨例捜索以違牾執政不得大官而守門也望之曰各從其志後數年坐弟犯法不得宿衛免歸為郡吏及御史大夫魏相宋祁曰浙本無及字除望之為屬察廉為大行治禮丞時大將軍光薨子禹復為大司馬兄子山領尚書師古曰霍山去病之孫今云兄子者轉寫誤爾親屬皆宿衞内侍地節三年夏京師雨雹望之因是上疏願賜清閒之宴口陳災異之意師古曰間讀曰閑宣帝自在民間聞望之名曰此東海蕭生邪下少府宋畸問狀師古曰畸音居宜反無有所諱望之對以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害師古曰鄉讀曰嚮亡讀曰無今陛下以聖德居位思政求賢堯舜之用心也然而善祥未臻隂陽不和是大臣任政一姓擅埶之所致也附枝大者賊本心私家盛者公室危師古曰本心樹之本株也唯明主躬萬機宋祁曰一本作躬親浙本無選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣對奏天子拜望之為謁者時上初即位思進賢良多上書言便宜輙下望之問狀髙者請丞相御史師古曰望之以其人所言之狀請于丞相御史或以奏聞即見超擢劉奉世曰顔非也髙者則令丞相御史試事次者則令中二千石試事歲滿各以狀聞誤斷其文爾劉敞説同次者中二千石試事滿歲以狀聞師古曰試令行其所言之事或以諸它職事試之下者報聞或罷歸田里所白處奏皆可師古曰當主上之意也累遷諫大夫丞相司直歲中三遷官至二千石其後霍氏竟謀反誅望之寖益任用師古曰寖漸也是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝遠為郡守内不自得乃上疏曰陛下哀愍百姓恐德化之不究師古曰究竟也謂周徧於天下悉出諌官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無逹士則不聞善師古曰逹士謂逹於政事也願陛下選明經術温故知新通於幾微謀慮之士以為内臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎師古曰周成康二王致太平也宋祁曰乎一作矣外郡不治豈足憂哉書聞徵入守少府宣帝察望之經明持重論議有餘材任宰相師古曰任堪也欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病師古曰移病謂移書言病一曰以病而移居上聞之使侍中成都侯金安上諭意曰所用皆更治民以考功師古曰更猶經歴也音工衡反君前為平原太守日淺故復試之於三輔非有所聞也師古曰所聞謂聞其短失望之即視事是歲西羌反漢遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破來春民食必之窮辟之處買亡所得師古曰辟讀曰僻縣官穀度不足以振之師古曰度音徒各反願令諸有辠非盜受財宋祁曰浙本改財作賕殺人及犯法不得赦者皆得以差入穀此八郡贖罪師古曰差次也八郡即隴西以北安定以西務益致穀以豫備百姓之急事下有司望之與少府李彊議以為民函隂陽之氣師古曰函與含同也宋祁曰注未也當刪有好義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也師古曰道讀曰導今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不壹也宋祁曰壹或作一人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅師古曰公綽魯大夫孟公綽也論語稱孔子曰若臧武仲之智公綽之不欲卞莊子之勇冉求之蓺文之以禮樂可以為成人矣政教壹傾雖有周召之佐恐不能復師古曰召讀曰卲復扶目反古者臧於民不足則取有餘則予詩曰爰及矜人哀此鰥寡師古曰小雅鴻鴈之詩也矜人可哀矜之人謂貧弱者也言王者惠澤下及哀矜之人以至鰥寡上惠下也又曰雨我公田遂及我私師古曰小雅大田之詩也言衆庶喜於時雨先潤公田又及私田是則其心先公後私雨于具反宋祁曰注文于字上當有音字下急上也今有西邊之役民失作業雖戸賦口斂以贍其困乏師古曰率戸而賦計口而斂也古之通義百姓莫以為非以死救生恐未可也師古曰子弟竭死以救父兄令其生也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間漢但令辠人出財減辠以誅之其名賢於煩擾良民橫興賦歛也師古曰横音胡孟反又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除師古曰以其罪輕而法重故常欲除此科條今因此令贖其便明甚何化之所亂甫刑之罰小過赦薄罪贖師古曰吕侯為周穆王司寇作贖刑之法謂之呂刑後改為甫侯故又稱甫刑也有金選之品應劭曰選音刷金銖兩名也師古曰音刷是也字本作鋝鋝即鍰也其重十一銖二十五分銖之十三一曰重六兩呂刑曰墨辟疑赦其罸百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰是其品也所從來久矣何賊之所生敞備皁衣二十餘年如淳曰雖有五時服至朝皆著皁衣嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路况至來春將大困乎宋祁曰大字上疑有不字不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之彊復對曰先帝聖德賢良在位作憲埀法為無窮之規永惟邊竟之不贍師古曰惟思也竟讀曰境其下亦同故金布令甲曰師古曰金布者令篇名也其上有府庫金錢布帛之事因以名篇令甲者其篇甲乙之次邊郡數被兵離飢寒師古曰離遭也夭絶天年父子相失令天下共給其費師古曰同共給之也自此以上令甲之文固為軍旅卒暴之事也師古曰卒讀曰猝言此令文專為軍旅猝暴而施設宋祁曰注文疑有之字聞天漢四年常使死罪人入五十萬錢減死罪一等豪彊吏民請奪假貣師古曰貣音土得反至為盜賊以贖罪其後姦邪橫暴羣盜並起師古曰横音胡孟反至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之師古曰軍興之法也宋祁曰浙本無興字劉攽曰當云以軍興兵擊之誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議望之為左馮翊三年京師稱之遷大鴻臚先是烏孫昆彌翁歸靡因長羅侯常惠上書師古曰昆彌烏孫之王號也翁歸靡其人名也願以漢外孫元貴靡為嗣得復尚少主蘇林曰宗室女也結婚内附畔去匈奴詔下公卿議望之以為烏孫絶域信其羙言萬里結婚非長策也天子不聽神爵二年遣長羅侯惠使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主敦煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此已事之驗也今少主以元貴靡不得立而還信無負於四夷此中國之大福也少主不止繇役將興其原起此天子從其議徵少主還後烏孫雖分國兩立以元貴靡為大昆彌漢遂不復與結婚三年代丙吉為御史大夫五鳯中匈奴大亂議者多曰匈奴為害日乆可因其壞亂舉兵滅之詔遣中朝大司馬車騎將軍韓増諸吏富平侯張延壽光祿勲楊惲太僕戴長樂問望之計䇿望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐喪師古曰士匄晉大夫范宣子也春秋公羊傳襄十九年齊侯環卒晉士匄帥師侵齊至穀聞齊侯卒乃還還者何善辭也大其不伐喪也以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟蘇林曰弟順也師古曰鄉讀曰嚮弟音悌劉奉世曰漢興匈奴嘗約為兄弟此弟直自謂為弟耳遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走遠遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂䝉恩得復其位必稱臣服從此德之盛也上從其議後竟遣兵護輔呼韓邪單于定其國是時大司農中丞耿壽昌奏設常平倉上善之望之非壽昌師古曰此望之不知權道丞相丙吉年老上重焉望之又奏言百姓或乏困盜賊未止二千石多材下不任職三公非其人則三光為之不明今首歲日月少光師古曰首歲歲之初首謂正月也咎在臣等上以望之意輕丞相師古曰言三公非其人又云咎在臣等是其意毁丞相乃下侍中建章衞尉金安上光祿勲楊惲御史中丞王忠并詰問望之師古曰三人同共問之望之免冠置對天子繇是不説師古曰繇讀與由同説讀曰悦後丞相司直緐延壽師古曰緐音婆奏侍中謁者良使承制詔望之望之再拜已良與望之言望之不起因故下手蘇林曰伏地而言也而謂御史曰良禮不備故事丞相病明日御史大夫輙問病朝奏事會庭中差居丞相宋祁曰南本庭作廷下同後丞相謝大夫少進揖今丞相數病望之不問病會庭中與丞相鈞禮師古曰不為前後之差也時議事不合意望之曰侯年寧能父我邪服䖍曰寜能與吾父同年邪劉攽曰言侯年雖髙寧能為我父邪不足敬也劉奉世曰此直謂其安能為我之父輕之之辭知御史有令不得擅使望之多使守史自給車馬之杜陵護視家事如淳曰漢儀注御史大夫史員四十五人皆六百石其十五人給事殿中其餘三十人留守治百事皆冠法冠師古曰自給車馬者令其自乘私車馬也少史冠法冠為妻先引蘇林曰少史曹史之下者也文頴曰先引謂導車前宋祁曰注末當添也字又使賣買私所附益凡十萬三千師古曰使其史為望之家有所賣買而史以其私錢增益之用潤望之也案望之大臣通經術居九卿之右師古曰右上也本朝所仰至不奉法自修踞慢不遜攘師古曰攘古讓字受所監臧二百五十以上師古曰二百五十以上者當時律令坐罪之次若今律條言一尺以上一疋以上矣請逮捕繫治上於是䇿望之曰有司奏君責使者禮遇丞相亡禮廉聲不聞敖慢不遜師古曰敖讀曰傲亡以扶政帥先百僚君不深思陷于玆穢朕不忍致君于理使光祿勲惲䇿詔左遷君為太子太傅授印其上故印使者師古曰使者即謂楊惲也命惲授太傅印而望之以大夫印上於惲便道之官君其秉道明孝正直是與帥意亡諐靡有後言師古曰諐古愆字後言謂自申理望之既左遷而黃霸代為御史大夫數月間丙吉薨霸為丞相霸薨于定國復代焉望之遂見廢不得相為太傅以論語禮服授皇太子初匈奴呼韓邪單于來朝詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截師古曰商頌長發之詩也率循也遂徧也既盡也發行也相土契之孫也烈烈威也截齊也言殷宗受命為諸侯能修禮度無有所踰越也徧省視之教令盡行而相土之威烈烈然盛四海之外皆整齊宋祁曰注末當有也字陛下聖德充塞天地師古曰充實也塞滿也光被四表師古曰四表四海之外匈奴單于鄉風慕化奉珍朝賀師古曰鄉讀曰嚮自古未之有也其禮儀宜如諸侯王位次在下宋祁曰如疑作加望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也師古曰易謙卦之辭曰謙亨天道下濟而光明地道卑而上行言謙之為德無所不通也亨音火庚反書曰戎狄荒服師古曰逸書也言其來服荒忽亡常如使匈奴後嗣卒有鳥竄䑕伏闕於朝享不為畔臣師古曰卒終也本以客禮待之若後不來非叛臣信讓行乎蠻貉福祚流于亡窮萬世之長䇿也天子采之下詔曰蓋聞五帝三王教化所不施不及以政今匈奴單于稱北藩朝正朔朕之不逮德不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名及宣帝寢疾選大臣可屬者師古曰屬音之欲反引外屬侍中樂陵侯史髙太子太傅望之少傅周堪至禁中拜髙為大司馬車騎將軍望之為前將軍光祿勲堪為光祿大夫皆受遺詔輔政領尚書事宣帝崩太子襲尊號是為孝元帝望之堪本以師傅見尊重上即位數宴見言治亂陳王事望之選白宗室明經逹學散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸道上以古制師古曰道讀曰導多所欲匡正上甚鄉納之師古曰鄉讀曰嚮意信嚮之而納用其言初宣帝不甚從儒術任用法律而中書宦官用事中書令宏恭石顯久典樞機明習文法亦與車騎將軍髙為表裏論議常獨持故事不從望之等恭顯又時傾仄見詘文頴曰恭顯心不自安也師古曰文説非也言其不能持正故議論大事見詘於天子也仄古側字望之以為中書政本宜以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人之義師古曰禮曰刑人不在君側也白欲更置士人繇是大與髙恭顯忤師古曰繇讀與由同忤謂相違逆也上初即位謙讓重改作師古曰重難也未欲更置士人於中書也議久不定出劉更生為宗正望之堪數薦名儒茂材以備諫官會稽鄭朋隂欲附望之上疏言車騎將軍髙遣客為姦利郡國及言許史子弟罪過章視周堪師古曰視讀曰示以朋所奏之章示堪也堪白令朋待詔金馬門朋奏記望之曰將軍體周召之德秉公綽之質有卞莊之威師古曰周謂周公旦召謂召公奭公綽孟公綽也廉正寡欲卞莊子魯卞邑大夫蓋勇士也召讀曰邵至乎耳順之年師古曰論語孔子曰六十而耳順履折衝之位號至將軍誠士之髙致也窟穴黎庶莫不懽喜咸曰將軍其人也師古曰國家委任誠得其人也今將軍䂓橅云若管晏而休遂行日仄至周召乃留乎師古曰問望之立意當趣如管晏而止為欲恢廓其道日昃不食追周召之蹟然後已乎橅讀曰模其字從木若管晏而休則下走將歸延陵之臯應劭曰下走僕也張晏曰吳公子札食邑延陵薄吳王之行弃國而耕於臯澤朋云望之所為若但如管晏則不處漢朝將歸會稽尋延陵之軌隱耕臯澤之中也師古曰下走者自謙言趨走之役也修農圃之疇師古曰美田曰疇畜雞種黍竢見二子没齒而已矣師古曰論語云子路從而後遇丈人以杖荷蓧止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣朋之所云蓋謂此也竢古俟字也俟待也没齒終身也蓧草器也音徒釣反如將軍昭然度行積思塞邪枉之險蹊宣中庸之常政師古曰度行度越常檢而為髙行也蹊徑謂道也音奚興周召之遺業親日仄之兼聽則下走其庶幾願竭區區底厲鋒鍔師古曰鋒刃端也鍔刃旁也音五各反奉萬分之一望之見納朋接待以意師古曰與之相見納用其説也朋數稱述望之短車騎將軍師古曰短謂毁其短惡也言許史過失後朋行傾邪望之絶不與通朋與大司農史李宮俱待詔堪獨白宮為黃門郎朋楚士怨恨張晏曰朋會稽人會稽并屬楚蘇林曰楚人脃急也更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之聞之以問宏恭石顯顯恭恐望之自訟下於它吏即挾朋及待詔華龍師古曰華音胡化反龍者宣帝時與張子蟜等待詔師古曰蟜音巨遙反字或作僑以行汙濊不進師古曰濊與穢同欲入堪等堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀候望之出休日令朋龍上之事下𢎞恭問狀望之對曰外戚在位多奢滛欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譛訴大臣毁離親戚欲以專擅權埶為臣不忠誣上不道請謁者召致廷尉時上初即位不省謁者召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事宋祁曰令出視事疑作今出視事一本作出乃使視事恭顯因使髙宋祁曰恭顯因使髙疑作恭顯乃因史髙言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因决免於是制詔丞相御史前將軍望之傅朕八年亡它罪過今事久遠識忘難明師古曰言不能盡記有遺忘者故難明其赦望之罪收前將軍光祿勲印綬及堪更生皆免為庶人而朋為黃門郎後數月制詔御史國之將興尊師而重傅故前將軍望之傅朕八年道以經術厥功茂焉師古曰道讀曰導茂美也其賜望之爵關内侯食邑六百戶給事中朝朔望坐次將軍天子方倚欲以為丞相師古曰倚音於綺反會望之子散騎中郎伋上書訟望之前事師古曰伋音級事下有司復奏望之前所坐明白無譛訴者師古曰言望之自有罪非人讒譛而訴之也而教子上書稱引亡辜之詩失大臣體不敬請逮捕𢎞恭石顯等知望之素高節不詘辱建白望之師古曰建立此議而白之於天子前為將軍輔政欲排退許史專權擅朝幸得不坐復賜爵邑與聞政事師古曰與讀曰豫不悔過服罪深懐怨望教子上書歸非於上師古曰言歸惡於天子也自以託師傅懐終不坐師古曰言恃舊恩自謂終無罪坐懐此心非頗詘望之於牢獄塞其怏怏心則聖朝亡以施恩厚服䖍曰非不也上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必亡所憂上乃可其奏顯等封以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第宋祁曰越本車作軍字使者至召望之望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲雲者好節士勸望之自裁於是望之卬天歎曰師古曰卬讀曰仰吾嘗備位將相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰游師古曰朱雲字游呼其字趣和藥來無久留我死師古曰趣讀曰促竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃卻食為之涕泣哀慟左右師古曰慟動也於是召顯等責問以議不詳師古曰詳審也皆免冠謝良久然後已望之有罪死有司請絶其爵邑有詔加恩長子伋嗣為關内侯天子追念望之不忘每歲時遣使者祠祭望之冢終元帝世望之八子至大官者育咸由育字次君少以父任為太子庶子元帝即位為郎病免後為御史大將軍王鳳以育名父子著材能除為功曹遷謁者使匈奴副校尉師古曰時令校尉為使於匈奴而育為之副使故授副校尉也後為茂陵令會課育第六師古曰如今之考第髙下而漆令郭舜殿見責問師古曰殿後也言有所負最居下也殿音登見反育為之請扶風怒曰君課第六裁自脫師古曰脫免也音吐活反何暇欲為左右言師古曰左右者言與同列在其左右若今言旁人也及罷出傳召茂陵令詣後曹如淳曰賊曹決曹皆後曹當以職事對師古曰忿其為漆令言故欲以職事責之宋祁曰注文忿字越本作怒育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也師古曰自言欲免官而去但是杜陵一白衣男子耳何須召我詣曹乎遂趨出欲去官明旦詔召入拜為司𨽻校尉育過扶風府門官屬掾史數百人拜謁車下後坐失大將軍指免官復為中郎將使匈奴歴冀州青州兩部刺史長水校尉泰山太守入守大鴻臚以鄠名賊梁子政阻山為害久不伏辜師古曰名賊者自顯其名無所避匿言其事也宋祁曰注文事字當作彊字育為右扶風數月盡誅子政等坐與定陵侯淳于長厚善免官哀帝時南郡江中多盜賊拜育為南郡太守上以育耆舊名臣乃以三公使車載育入殿中受䇿孟康曰使車三公奉使之車若安車也宋祁曰三公下疑有官字曰南郡盜賊羣輩為害朕甚憂之以太守威信素著故委南郡太守之官其於為民除害安元元而已亡拘於小文加賜黃金二十斤育至南郡盜賊靜病去官起家復為光祿大夫執金吾以壽終於官育為人嚴猛尚威居官數免稀遷少與陳咸朱博為友著聞當世往者有王陽貢公宋祁曰公字當作禹字故長安語曰蕭朱結綬王貢彈冠言其相薦逹也始育與陳咸俱以公卿子顯名咸最先進年十八為左曹二十餘御史中丞宋祁曰餘字下當添為字時朱博尚為杜陵亭長為咸育所攀援入王氏師古曰援引也音爰後遂並歴刺史郡守相及為九卿而博先至將軍上卿歴位多於咸育遂至丞相育與博後有隙不能終故世以交為難咸字仲為丞相史舉茂材好畤令遷淮陽泗水内史張掖𢎞農河東太守所居有迹數增秩賜金後免官復為越騎校尉護軍都尉中郎將使匈奴至大司農終官由字子驕為丞相西曹衞將軍掾遷謁者使匈奴副校尉後舉賢良為定陶令遷太原都尉安定太守治郡有聲多稱薦者初哀帝為定陶王時由為定陶令夫王指頃之制書免由為庶人哀帝崩為復土校尉京輔左輔都尉遷江夏太守平江賊成重等有功增秩為陳留太守元始中作明堂辟雍大朝諸侯徵由為大鴻臚會病不及賓贊師古曰贊導九賓之事宋祁曰會病不及當云會病行遲不及賓贊注文贊導九賓之事當云贊導九賓之禮也還歸故官病免復為中散大夫終官家至吏二千石者六七人贊曰蕭望之歴位將相籍師傅之恩可謂親昵亡閒師古曰間隙也及至謀泄隙開讒邪搆之卒為便嬖宦豎所圖師古曰圖謀也哀哉不然望之堂堂折而不橈師古曰橈曲也音女教反身為儒宗有輔佐之能近古社稷臣也前漢書卷七十八前漢書卷七十八考證蕭望之傳髙者請丞相御史注劉奉世曰誤斷其文胡三省曰髙者則請丞相御史試事次者則中二千石試事文意固是一貫而分髙次則非顔誤斷也使侍中成都侯金安上諭意胡三省曰功臣表及霍光傳皆作都成侯此傳作成都侯誤蕭望之子育大將軍王鳳以育名父子臣召南按名父子與王吉傳賢父子同猶云名父之子也蕭育杜陵男子注云云凌穉隆曰是不甘辱之意師古注恐未必然臣召南按男子猶言大丈夫言我不以官爵介意以鄠名賊梁子政注師古云云顧炎武曰名賊猶言名王謂賊之有名號者師古注非前漢書卷七十八考證
