body:
  text: 前漢書卷四十四漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注淮南衡山濟北王傳第十四淮南厲王長髙帝少子也其母故趙王張敖美人髙帝八年從東垣過趙趙王獻美人厲王母也幸有身趙王不敢内宫師古曰不敢更内之於宫中為築外宫舍之師古曰舍止也及貫高等謀反事覺并逮治王盡捕王母兄弟美人繫之河内厲王母亦繫告吏曰日得幸上有子師古曰日謂徃日吏以聞上方怒趙未及理厲王母厲王母弟趙兼因辟陽侯言吕后吕后姤不肯白辟陽侯不强爭厲王母已生厲王恚即自殺吏奉厲王詣上上悔師古曰悔不理其母令吕后母之而葬其母真定真定厲王母家縣也十一年淮南王布反上自將擊滅布即立子長為淮南王王早失母常附吕后孝惠吕后時以故得幸無患然常心怨辟陽侯不敢發及孝文初即位自以為最親師古曰時高帝子唯二人在驕蹇數不奉法師古曰蹇謂不順也上寛赦之三年入朝甚横師古曰横音胡孟反從上入苑獵與上同輦常謂上大兄厲王有材力力扛鼎師古曰扛舉也音江乃徃請辟陽侯辟陽侯出見之即自褏金椎椎之師古曰褏古袖字也謂以金椎藏置褏中出而椎之命從者刑之如淳曰刻其形體備五刑也師古曰直斷其首非五刑也事見史記馳詣闕下肉袒而謝曰臣母不當坐趙時事宋祁曰時字浙本添辟陽侯力能得之呂后不爭罪一也趙王如意子母無罪呂后殺之辟陽侯不爭罪二也呂后王諸呂欲以危劉氏辟陽侯不爭罪三也臣謹為天下誅賊報母之仇伏闕下請罪文帝傷其志為親故不治赦之當是時自薄太后及太子諸大臣皆憚厲王厲王以此歸國益恣不用漢法出入警蹕稱制自作法令數上書不遜順師古曰數音所角反文帝重自切責之如淳曰重難也時帝舅薄昭為將軍尊重上令昭予厲王書諫數之曰師古曰數音所具反竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所行不稱天資皇帝初即位易侯邑在淮南者晉灼曰侯邑在淮南者更易以它郡地封之不欲使錯在王國大王不肯皇帝卒易之師古曰卒終也使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡師古曰畢盡也而殺列侯以自為名皇帝不使吏與其間師古曰與讀曰豫謂不令吏干豫治其事赦大王甚厚法二千石缺輙言漢補大王逐漢所置而請自置相二千石皇帝骫天下正法而許大王甚厚蘇林曰不從正法聽王自置二千石師古曰骫古委字骫謂曲也大王欲屬國為布衣守冡真定師古曰屬謂委棄之也音之欲反皇帝不許使大王毋失南面之尊甚厚師古曰毋失不失也南面之尊謂王位也大王宜日夜奉法度修貢職以稱皇帝之厚德今廼輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此高皇帝之厚德也高帝蒙霜露沬風雨師古曰沬亦頮字也䝉冒也沬洗面也音胡内反字從午未之未赴矢石野戰攻城身被創痍師古曰痍音夷以為子孫成萬世之業艱難危苦甚矣大王不思先帝之艱苦日夜怵惕脩身正行養犧牲豐潔粢盛奉祭祀以無忘先帝之功德而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以高兄無禮鄭氏曰淮南王呼帝為大兄也師古曰鄭説非也謂請守母冢自為名節而表異行用此矜高於兄耳幸臣有罪大者立斷小者肉刑不仁師古曰斷謂斬也貴布衣一劒之任賤王侯之位不知不好學問大道觸情妄行不祥師古曰任情意所欲則行之妄行行音下更反此八者危亡之路也而大王行之棄南面之位奮諸賁之勇應劭曰吳專諸衛孟賁也師古曰賁音奔常出入危亡之路臣之所見高皇帝之神必不廟食於大王之手明白昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國韋昭曰子糾兄也言弟者諱也秦始皇殺兩弟遷其母以安秦應劭曰始皇母與嫪毐私通生二子事覺誅毐并殺二弟遷其母於咸陽宫也頃王亡代高帝奪之國以便事應劭曰頃王高帝兄仲也匈奴入代不能守走歸京師高帝奪其國退為郃陽侯以便國法也師古曰便音頻面反濟北舉兵皇帝誅之以安漢應劭曰濟北王興居與大臣共誅諸呂自以功大怨其賞薄故反故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也如淳曰太上天子也亡之諸侯游宦事人及舍匿者論皆有法師古曰舍匿謂容止而藏隱也其在王所吏主者坐師古曰言各有所主而坐其罪今諸侯子為吏者御史主如淳曰主御史也自此以下至縣令主皆謂王官屬為軍吏者中尉主客出入殿門者衞尉大行主諸從蠻夷來歸誼及以亡名數自占者内史縣令主相欲委下吏無與其禍不可得也師古曰言諸侯王之相欲委罪於在下小吏而身不干豫之不可得也與讀曰豫王若不改漢繫大王邸論相以下為之奈何夫墮父大業退為布衣所哀師古曰墮毁也布衣貧賤之人王既伏法則貧賤之人反哀憐之墮音火規反幸臣皆伏法而誅為天下笑以羞先帝之德師古曰羞辱也甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤呂氏之世未嘗忘死服䖍曰常恐畏死也陛下即位臣怙恩德驕盈行多不軌師古曰軌法也追念辠過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上羣臣皆得延壽於下上下得宜海内常安願孰計而疾行之行之有疑禍如發矢不可追已師古曰發矢喻速也已語終辭王得書不説師古曰説讀曰悦六年令男子但等七十人與棘蒲侯柴武太子奇謀以輦車四十乘反谷口孟康曰谷口在長安北故縣也處多嶮阻師古曰輦車人輓行以載兵器也令人使閩越匈奴事覺治之廼使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事宋祁曰孝文三年馮敬為典客七年為御史大夫與宗正廷尉雜奏長廢先帝法不聽天子詔居處無度為黄屋蓋儗天子師古曰儗比也擅為法令不用漢法及所置吏以其郎中春為丞相收聚漢諸侯人及有罪亡者匿與居為治家室賜與財物爵禄田宅爵或至關内侯奉以二千石所不當得如淳曰賜亡畔來者如賜其國二千石也臣瓚曰奉畔者以二千石之秩禄也師古曰瓚説是也奉音扶用反大夫但張晏曰大夫姓也上云男子但明其本姓大夫也如淳曰但大夫名也師古曰既曰大夫但又士伍開章明其為大夫也上言男子但等者總謂反人耳不妨但為大夫也士伍開章等七十人如淳曰律有罪失官爵稱士伍也開章名與棘蒲侯太子奇謀反欲以危宗廟社稷謀使閩越及匈奴發其兵事覺長安尉奇等徃捕開章長匿不予與故中尉蕳忌謀殺以閉口師古曰姓蕳名忌蕳音姧嚴助傳作間字音同耳今流俗書本此蕳字或有作簡者非也蓋後人所改既殺開章所有口語皆無端緒故云閉口為棺椁衣衾葬之肥陵師古曰肥陵地名在肥水之上謾吏曰不知安在師古曰謾誑也實葬肥陵誑云不知處謾音慢又音莫連反此下亦同又陽聚土樹表其上曰開章死葬此下師古曰表者𥪡木為之若柱形也及長身自賊殺無罪者一人令吏論殺無罪者六人為亡命棄市宋祁曰舊本棄字下有之字詐捕命者以除罪晉灼曰亡命者當棄市而王藏之詐捕不命者而言命以脱命者之罪師古曰為音于偽反擅罪人無告劾繫治城旦以上十四人赦免罪人死罪十八人城旦舂以下五十八人賜人爵關内侯以下九十四人前日長病陛下心憂之使使者賜棗脯長不肯見拜使者南海民處廬江界中者反淮南吏卒擊之陛下遣使者齎帛五十匹以賜吏卒勞苦者長不欲受賜謾曰無勞苦者南海王織上書獻璧帛皇帝忌擅燔其書不以聞文穎曰忌蕳忌也吏請召治忌長不遣謾曰忌病長所犯不軌當棄市臣請論如法制曰朕不忍置法於王其與列侯吏二千石議列侯吏二千石臣嬰等四十三人議皆曰宜論如法制曰其赦長死罪廢勿王有司奏請處蜀嚴道卭郵張晏曰嚴道蜀郡縣也卭郵置名也師古曰郵行書之舍音尤遣其子子母從居師古曰子母者所生子之姬妾縣為築蓋家室皆日三食給薪菜鹽炊食器席蓐師古曰炊器釡鬲之屬食器盃椀之屬制曰食長給肉日五斤師古曰食音飤酒二斗令故美人材人得幸者十人從居師古曰上言子母則有子者令從之今此云美人材人則無子者亦令從之於是盡誅所與謀者廼遣長載以輜車師古曰輜衣車也音甾令縣次傳爰盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逄霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之師古曰暫困苦之令其自悔即追還也復音扶目反淮南王謂侍者曰誰謂乃公勇者吾以驕不聞過故至此廼不食而死縣傳者不敢發車封孟康曰檻車有封也至雍師古曰雍扶風雍縣雍令發之以死聞上悲哭謂爰盎曰吾不從公言卒亡淮南王盎曰淮南王不可奈何願陛下自寛上曰為之奈何曰獨斬丞相御史以謝天下廼可上即令丞相御史逮諸縣傳淮南王不發封餽侍者師古曰逮追捕之也餽亦饋字耳皆棄市廼以列侯葬淮南王于雍置守冢三十家孝文八年憐淮南王王有子四人年皆七八歲廼封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯十二年民有作歌歌淮南王曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容孟康曰尺帛斗粟猶尚不棄况於兄弟而更相逐乎臣瓚曰一尺帛可縫而共衣一斗粟可舂而共食况以天下之廣而不相容也師古曰瓚説是上聞之曰昔堯舜放逐骨肉師古曰鯀及共工皆堯舜之同姓故云骨肉周公殺管蔡天下稱聖不以私害公天下豈以為我貪淮南地邪廼徙城陽王王淮南故地而追尊諡淮南王為厲王宋祁曰越本無諡字置園如諸侯儀十六年上憐淮南王廢法不軌自使失國早夭廼徙淮南王喜復王故城陽而立厲王三子王淮南故地三分之阜陵侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王東城侯良前薨無後孝景三年吳楚七國反吳使者至淮南王欲發兵應之其相曰王必欲應吳臣願為將王廼屬之師古曰屬謂以兵委之也屬音之欲反相巳將兵因城守不聽王而為漢漢亦使曲城侯將兵救淮南晉灼曰功臣表蟲達也師古曰晉説非此蟲逹之子耳名犍逹已先薨宋祁曰浙本注文作晉説非也淮南以故得完吳使者至廬江廬江王不應而徃來使越至衡山衡山王堅守無二心孝景四年吳楚已破衡山王朝上以為貞信廼勞苦之師古曰勞音來到反曰南方卑濕徙王王於濟北以襃之及薨遂賜諡為貞王廬江王以邊越數使使相交師古曰邊越者邊界與越相接徙為衡山王王江北淮南王安為人好書鼓琴不喜弋獵狗馬馳騁師古曰喜音許吏反亦欲以行陰德拊循百姓流名譽招致賓客方術之士數千人作為内書二十一篇外書甚衆又有中篇八卷言神仙黄白之術張晏曰黄黄金白白銀也亦二十餘萬言時武帝方好藝文以安屬為諸父師古曰安於天子服屬為從父叔父辯博善為文辭甚尊重之每為報書及賜師古曰賜賜書也常召司馬相如等視草廼遣師古曰草謂為文之藁草初安入朝獻所作内篇新出上愛秘之使為離騷傳師古曰傳謂解説之若毛詩傳旦受詔日食時上又獻頌德及長安都國頌每宴見談説得失及方技賦頌昬暮然後罷安初入朝雅善太尉武安侯師古曰田蚡武安侯迎之霸上與語曰方今上無太子王親高皇帝孫行仁義天下莫不聞宮車一日晏駕非王尚誰立者淮南王大喜厚遺武安侯寶賂其羣臣賓客江淮間多輕薄以厲王遷死感激安建元六年彗星見淮南王心怪之或説王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為上無太子天下有變諸侯並爭愈益治攻戰具積金錢賂遺郡國遊士妄作妖言阿諛王王喜多賜予之王有女陵慧有口師古曰性慧了而口辯王愛陵多予金錢為中詗長安孟康曰詗音偵西方人以反間為詗王使其女為偵於中也如淳曰詗音朽政反師古曰詗有所候伺也如音是矣偵者義與詗同然音則異音丑政反約結上左右元朔二年上賜淮南王几杖不朝后荼愛幸師古曰荼者后名也音塗生子遷為太子取皇太后外孫修成君女為太子妃服䖍曰武帝異姓姊之女也應劭曰修成君王太后先適金氏女也王謀為反具畏太子妃知而内泄事廼與太子謀令詐不愛三月不同席王陽怒太子閉使與妃同内終不近妃妃求去王廼上書謝歸之后荼太子遷及女陵擅國權奪民田宅妄致繫人師古曰致至也牽引而致之太子學用劒自以為人莫及聞郎中雷被巧師古曰被音皮義反巧者善用劒也召與戲被壹再辭讓誤中太子師古曰中音竹仲反太子怒被恐此時有欲從軍者輙詣長安被即願奮擊匈奴太子數惡被師古曰謂譖毁之於王也王使郎中令斥免欲以禁後師古曰令後人更不敢效之元朔五年被遂亡之長安上書自明事下廷尉河南河南治師古曰章下廷尉及河南令於河南雜治其事逮淮南太子師古曰追赴河南也王王后計欲毋遣太子師古曰王與王后共計也遂發兵計未定猶與十餘日師古曰與讀曰豫㑹有詔即訊太子師古曰即就也訊問也就淮南問之不逮詣河南淮南相怒壽春丞留太子逮不遣如淳曰丞順王意不遣太子應逮書劾不敬王請相相不聽王使人上書告相事下廷尉治從迹連王師古曰從讀曰蹤王使人候司師古曰入京師候司其事漢公卿請逮捕治王王恐欲發兵太子遷謀曰漢使即逮王令人衣衞士衣持㦸居王旁有非是者即刺殺之臣亦使人刺殺淮南中尉廼舉兵未晚也是時上不許公卿而遣漢中尉宏即訊驗王師古曰即亦就也王視漢中尉顔色和問斥雷被事耳自度無何師古曰自計度更無罪度音徒各反不發中尉還以聞公卿治者曰淮南王安雍閼求奮擊匈奴者雷被等格明詔師古曰雍讀曰壅格音閣謂攱閣不行之宋祁曰景德本無求字當棄市詔不許請廢勿王上不許請削五縣可二縣使中尉宏赦其罪罰以削地中尉入淮南界宣言赦王王初聞公卿請誅之未知得削地聞漢使來恐其捕之廼與太子謀如前計中尉至即賀王王以故不發其後自傷曰吾行仁義見削地寡人甚恥之為反謀益甚諸使者道長安來師古曰道從也為妄言言上無男即喜言漢廷治有男即怒師古曰漢廷治者朝廷皆治理也治音丈吏反以為妄言非也師古曰云治及有男皆妄言耳非真實也日夜與左吳等按輿地圖蘇林曰輿猶盡載之意部署兵所從入王曰上無太子宮車即晏駕大臣必徵膠東王不即常山王諸侯並爭吾可以無備乎且吾高帝孫親行仁義陛下遇我厚吾能忍之萬世之後吾寧能北面事豎子乎王有孽子不害最長師古曰孽庶也王不愛后太子皆不以為子兄數如淳曰后不以為子太子不以為兄秩數不害子建材高有氣常怨望太子不省其父服䖍曰不省録著兄弟數中也時諸侯皆得分子弟為侯師古曰分國邑以封之淮南王有兩子一子為太子而建父不得為侯陰結交師古曰與外人交通為援欲害太子以其父代之太子知之數捕繫笞建建具知太子之欲謀殺漢中尉即使所善壽春嚴正上書天子曰毒藥苦口利病忠言逆耳利行今淮南王孫建材能高淮南王后荼荼子遷常疾害建建父不害無罪擅數繫欲殺之今建在可徵問具知淮南王陰事書既聞上以其事下廷尉河南治是歲元朔六年也故辟陽侯孫審卿善丞相公孫𢎞怨淮南厲王殺其大父陰求淮南事而搆之於𢎞𢎞廼疑淮南有畔逆計深探其獄張晏曰探窮其根原河南治建辭引太子及黨與初王數以舉兵謀問伍被被常諫之以吳楚七國為效師古曰言反事不成王引陳勝吳廣被復言形勢不同必敗亡及建見治王恐國陰事泄欲發復問被被為言發兵權變語在被傳於是王鋭欲發師古曰王意欲發兵如鋒刃之鋭利故云鋭也乃令官奴入宮中作皇帝璽丞相御史大夫將軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠師古曰法冠御史冠也本楚王冠秦滅楚以其君冠賜御史欲如伍被計使人為得罪而西蘇林曰詐作得罪人而西也師古曰為得罪之狀而去也西謂如京師也事大將軍丞相一日發兵即刺大將軍衞青師古曰發兵謂王發兵反而説丞相𢎞下之如發䝉耳如淳曰以物䝉覆其頭而為發去之則其人欲之耳晉灼曰如發去物上之䝉直取其易也師古曰晉説是欲發國中兵恐相二千石不聽王廼與伍被謀為失火宮中相二千石救火因殺之又欲令人衣求盜衣師古曰求盜卒之掌逐捕賊盜者持羽檄從南方來師古曰羽檄徵兵之書也解在高紀呼言曰南越兵入師古曰呼音火故反欲因以發兵廼使人之廬江㑹稽為求盜未决廷尉以建辭連太子遷聞上遣廷尉監與淮南中尉逮捕太子至淮南王聞與太子謀召相二千石欲殺而發兵召相相至内史以出為解師古曰不應召而云已出也解者解説也若今言分疏矣中尉曰臣受詔使不得見王王念獨殺相而内史中尉不來無益也即罷相師古曰遣出去計猶與未决師古曰與讀曰豫太子念所坐者謀殺漢中尉所與謀殺者已死以為口絶乃謂王曰羣臣可用者皆前繫今無足以舉事者王以非時發恐無功臣願會逮師古曰㑹謂應逮書而徃也王亦愈欲休即許太子太子自刑不殊晉灼曰不殊不死也師古曰殊絶也雖自刑殺而身首不絶也伍被自詣吏具告與淮南王謀反吏因捕太子王后圍王宮盡捕王賓客在國中者索得反具以聞師古曰索捜也音山客反上下公卿治所連引與淮南王謀反列侯二千石豪傑數千人皆以罪輕重受誅衡山王賜淮南王弟當坐收有司請逮捕衡山王上曰諸侯各以其國為本不當相坐與諸侯王列侯議趙王彭祖列侯讓等四十三人皆曰淮南王安大逆無道謀反明白當伏誅膠西王端議曰安廢法度行邪辟師古曰辟讀曰僻下皆類此有詐偽心以亂天下營惑百姓師古曰營謂回繞之背畔宗廟妄作妖言春秋曰臣毋將將而誅安罪重於將謀反形已定臣端所見其書印圖及它逆亡道事驗明白當伏法論國吏二百石以上及比者師古曰謂真二百石及秩比二百石以上宗室近幸臣不在法中者不能相敎皆當免師古曰若本有重罪自從其法縱無反狀者亦皆免削爵為士伍毋得宦為吏其非吏它贖死金二斤八兩蘇林曰非吏故曰它師古曰為近幸之人非吏人者宋祁曰姚本正文非吏它字下有者字以章安之罪師古曰章明也使天下明知臣子之道毋敢復有邪僻背畔之意丞相𢎞廷尉湯等以聞上使宗正以符節治王未至安自刑殺后太子諸所與謀皆收夷國除為九江郡師古曰夷謂誅滅之衡山王賜后乘舒生子三人長男爽為太子次女無采少男孝姬徐來生子男女四人美人厥姬生子二人淮南衡山相責望禮節間不相能師古曰兄弟相責故有嫌衡山王聞淮南王作為畔逆具亦心結賓客以應之恐為所并元光六年入朝謁者衞慶有方術欲上書事天子王怒故劾慶死罪强榜服之師古曰榜擊也擊笞之令其自服死罪也榜音彭内史以為非是郤其獄師古曰卻退也音丘畧反王使人上書告内史内史治言王不直師古曰内史被治而具言王之意狀又數侵奪人田壞人冡以為田有司請逮治衡山王上不許為置吏二百石以上如淳曰漢儀注吏四百石以下自除國中今以王之惡天子皆為置衡山王以此恚與奚慈張廣昌謀求能為兵法候星氣者日夜縱臾王謀反事如淳曰臾讀曰勇縱臾猶言勉强也師古曰縱音子勇反縱臾謂奬勸也后乘舒死立徐來為后厥姬俱幸兩人相妬厥姬乃惡徐來於太子師古曰惡謂讒毁之也下皆類此曰徐來使婢蠱殺太子母太子心怨徐來徐來兄至衡山太子與飲以刃刑傷之后以此怨太子數惡之於王女弟無采嫁棄歸師古曰為夫所棄而歸也與客姦太子數以數讓之師古曰上數音所角反下數音所具反無采怒不與太子通后聞之即善遇無采及孝孝少失母附后后以計愛之師古曰非心實慈念但以事計湏撫之與共毁太子王以故數繫笞太子元朔四年中人有賊傷后假母者師古曰繼母也一曰父之旁妻王疑太子使人傷之笞太子後王病太子時稱病不侍孝無采惡太子實不病自言有喜色王於是大怒欲廢太子而立弟孝后知王决廢太子又欲并廢孝后有侍者善舞王幸之后欲令與孝亂以汚之欲并廢二子而以己子廣代之太子知之念后數惡己無已時師古曰已止也數見讒譖無休止欲與亂以止其口后飲太子太子前為壽因據后股求與卧后怒以告王王廼召欲縛笞之太子知王常欲廢已而立孝廼謂王曰孝與王御者姦無采與奴姦王始食宋祁曰始或作强請上書即背王去王使人止之莫能禁王廼自追捕太子太子妄惡言王械繫宮中孝日益以親幸王奇孝材能廼佩之王印號曰將軍令居外家多給金錢招致賓客賓客來者微知淮南衡山有逆計皆將養勸之師古曰將讀曰奬王乃使孝客江都人枚赫陳喜作輣車鍜矢刻天子璽將相軍吏印王日夜求壯士如周丘等師古曰下邳人吳王反時請得漢節下下邳者數稱引吳楚反時計畫約束衡山王非敢效淮南王求即天子位畏淮南起并其國以為淮南已西發兵定江淮間而有之望如是元朔五年秋當朝六年過淮南淮南王廼昆弟語師古曰為相親愛之言除前隙約束反具師古曰共契約為反具衡山王即上書謝病上賜不朝廼使人上書請廢太子爽立孝為太子爽聞即使所善白嬴之長安上書言衡山王與子謀逆言孝作兵車鍜矢與王御者姦至長安未及上書即吏捕嬴以淮南事繫師古曰漢有司捕繫之王聞之恐其言國陰事即上書告太子以為不道事下沛郡治元狩元年冬有司求捕與淮南王謀反者得陳喜於孝家吏劾孝首匿喜師古曰為頭首而藏匿之孝以為陳喜雅數與王計反師古曰數音所角反恐其發之聞律先自告除其罪又疑太子使白嬴上書發其事即先自告所與謀反者枚赫陳喜等廷尉治事驗請逮捕衡山王治上曰勿捕遣中尉安大行息即問王師古曰就問之王具以情實對吏皆圍王宮守之中尉大行還以聞公卿請遣宗正大行與沛郡雜治王王聞即自殺孝先自告反告除其罪師古曰先告有反謀又告人與巳反而自得除反罪孝坐與王御婢姦及后徐來坐蠱前后乘舒及太子爽坐告王父不孝皆棄市諸坐與王謀反者皆誅國除為郡濟北貞王勃者景帝四年徙徙二年因前王衡山凡十四年薨子式王胡嗣五十三年薨宋祁曰三或作四子寛嗣十二年寛坐與父式王后光姬孝兒姦誖人倫師古曰誖亂也音布内反又祠祭祝詛上有司請誅上遣大鴻臚利召王王以刃自剄死國除為北安縣屬泰山郡贊曰詩云戎狄是膺荆舒是懲師古曰此魯頌閟宮之章也膺當也懲艾也荆楚也舒羣舒也言北有戎狄南有荊舒土俗强獷好為冦亂常須以兵膺當而懲艾也信哉是言也淮南衡山親為骨肉疆土千里列在諸侯不務遵蕃臣職以丞輔天子而剸懷邪辟之計師古曰剸與專同音之兖反謀為畔逆仍父子再亡國師古曰仍頻也各不終其身此非獨王也亦其俗薄臣下漸靡使然師古曰靡謂相隨從夫荆楚剽輕好作亂廼自古記之矣師古曰剽音匹妙反前漢書卷四十四前漢書卷四十四考證淮南厲王長傳命從者刑之顧炎武曰刑之史記作剄之當從剄音相近而譌下文太子自刑不殊又云王自刑殺史記亦皆作剄也臣召南按從者史記孝文本紀及淮南傳並作從者魏敬數上書不遜順云云臣召南按此文以下文帝令薄昭為書責厲王至王得書不悦皆史記所無而班氏増補之者也與宗正廷尉雜奏按史記作宗正臣逸廷尉臣賀備盜賊中尉臣福所不當得監本脱不字從史記增陛下遣使者齎帛五十匹按五十匹史記作五千匹是也此書刋本誤缺筆耳列侯吏二千石臣嬰等臣召南按即汝陰侯夏侯嬰也淮南王反事在孝文六年嬰時尚為太僕至八年薨淮南王安傳招致賓客方術之士云云臣召南按此傳較史記有補有刪詳序招客著書及入朝獻賦頌此補史記之缺畧也下文日夜與左吳等按輿地圗以下史記詳序伍被與王反覆議論班氏以别立伍被傳故此從畧耳外書甚衆按藝文志雜家淮南内二十一篇外三十三篇又詩賦有淮南王賦二十九篇羣臣賦四十四篇淮南歌詩四篇天文有淮南雜子星十九卷衡山王賜傳作兵車鍜矢史記作鏃矢是也本書膠東王傳亦作鏃矢孝先自告反告除其罪注師古云云顧炎武曰按史記無下告字是衍文師古曲為之説前漢書卷四十四考證
