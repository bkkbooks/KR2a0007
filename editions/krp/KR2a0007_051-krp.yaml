body:
  text: 前漢書卷五十一漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注賈鄒枚路傳第二十一賈山潁川人也祖父袪故魏王時博士弟子也師古曰六國時魏也山受學祛所言渉獵書記不能為醇儒師古曰渉若渉水獵若獵獸言歴覽之不專精也醇者不雜也嘗給事潁隂侯為騎師古曰為騎者常騎馬而從也孝文時言治亂之道借秦為諭名曰至言其辭曰臣聞為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士師古曰言貧賤之人也韋帶以單韋為帶無飾也宋祁曰韋帶南本浙本作革帶修身於内成名於外而使後世不絶息至秦則不然貴為天子富有天下賦歛重數百姓任罷師古曰數屢也任謂役事也罷讀曰疲任疲言疲於役使也赭衣半道羣盗滿山師古曰犯罪者則衣赭衣行道之人半著赭衣言被罪者衆也盜賊皆依山為阻故云滿山也使天下之人戴目而視傾耳而聽師古曰戴目者言常逺視有異志也傾耳而聽言樂禍亂也一夫大謼天下嚮應者陳勝是也師古曰謼字與呼同謼呌也音火故反嚮讀曰響秦非徒如此也起咸陽而西至雍離宮三百師古曰凡言離宫者皆謂於别處置之非常所居也鍾鼓帷帳不移而具又為阿房之殿殿髙數十仞師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿上為房也房字或作旁説云始皇作此殿未有名以其去咸陽近且號阿旁阿近也八尺曰仞東西五里南北千歩從車羅騎四馬騖馳旌旗不橈師古曰橈屈也言庭之廣大殿之髙敞衆騎馳騖無所廹觸建立旌旗不屈撓撓音女孝反宋祁曰注屈橈下當有也字為宫室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極呉楚江湖之上瀕海之觀畢至師古曰瀕水涯也瀕海謂緣海之邊也畢盡也瀕音頻又音賓字或作濵音義同道廣五十歩三文而樹厚築其外隠以金椎服䖍曰作壁如甬道隠築也以鐵椎築之師古曰築令堅實而使隆髙耳不為甬壁也隠音於靳反樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉死葬乎驪山吏徒數十萬人師古曰吏以督領徒以役作也宋祁曰乎當作虖曠日十年師古曰曠空也廢也言為重役空廢時日積年嵗也下徹三泉師古曰三重之泉言其深也合采金石冶銅錮其内桼塗其外師古曰錮謂鑄而合之也音固被以珠玉飾以翡翠應劭曰雄曰翡雌曰翠臣瓚曰異物志云翡色赤而大於翠師古曰鳥各别類非雄雌異名也被音皮義反中成觀游上成山林為葬薶之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉服䖍曰謂塊墣作冢喻小也臣瓚曰蓬顆猶祼顆小冢也晉灼曰東北人名土塊為蓬顆師古曰諸家之説皆非顆謂土塊蓬顆言塊上生蓬者耳舉此以對冢上山林故言蓬顆蔽冢也顆音口果反秦以熊羆之力虎狼之心蠶食諸侯并吞海内而不篤禮義師古曰篤厚也故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中師古曰中音竹仲反臣聞忠臣之事君也言切直則不用而身危不切直則不可以眀道故切直之言眀主所欲急聞忠臣之所以蒙死而竭知也師古曰䝉冐犯也地之磽者雖有善種不能生焉師古曰磽埆瘠薄也磽音口交反江臯河瀕雖有惡種無不猥大李奇曰臯水邊淤地也師古曰猥盛也昔者夏商之季世雖闗龍逄箕子比干之賢身死亡而道不用服䖍曰闗龍逄桀之忠臣也師古曰比干諫紂而紂殺之論語曰微子去之箕子為之奴比干諫而死文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力師古曰芻刈草也蕘草薪也言執賤役者也大雅板之詩曰詢于芻蕘此周之所以興也故地之羙者善養禾君之仁者善養士雷霆之所擊無不摧折者師古曰霆疾雷也音廷萬鈞之所壓無不糜滅者今人主之威非特雷霆也師古曰特獨也埶重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又廼况於縱欲恣行暴虐惡聞其過乎宋祁曰乎當作虖震之以威壓之以重師古曰震動也則雖有堯舜之智孟賁之勇豈有不摧折者哉師古曰孟賁古之勇士賁音奔如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦箴諫李竒曰古有誦詩之工記過之史常在君側也師古曰箴戒也音之林反瞽誦詩諫師古曰瞽無目之人公卿比諫李奇曰相親比而諫也或曰比方事類以諫也師古曰比方是也士傳言諫過庶人謗於道商旅議於市師古曰旅衆也然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之内其義莫不為臣然而養三老於太學親執醬而餽執爵而酳師古曰餽字與饋同進食曰餽酳者少少飲酒謂食已而蕩口也音􅏷祝䭇在前祝鯁在後師古曰䭇古饐字謂食不下也以老人好饐鯁故為備祝以祝之宋祁曰䭇當作􅀈公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫師古曰修正謂修身正行者故以天子之尊尊養三老視孝也師古曰視讀曰示立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗已而改之從善無不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為闗塞秦地之固大小之埶輕重之權其與一家之富一夫之彊胡可勝計也師古曰胡何也勝盡也然而兵破於陳渉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也師古曰適快也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過嵗三日什一而籍師古曰什一謂十分之中公取一也籍借也謂借人力也一曰為簿籍而税之君有餘財民有餘力而頌聲作師古曰頌者六詩之一羙盛徳之形容盖帝王之嘉致秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求師古曰勝堪也罷讀曰疲以下亦同一君之身耳所以自養者馳騁弋獵之娯天下弗能供也師古曰弋繳射也勞罷者不得休息飢寒者不得衣食亡罪而死刑者無所告訴人與之為怨家與之為讎師古曰言人人為怨家家為讎故天下壞也秦皇帝身在之時天下已壞矣而弗自知也秦皇帝東廵狩至㑹稽琅邪刻石著其功自以為過堯舜統如淳曰統繼也堯舜子不才不能長世而秦自以過堯舜可至萬世也師古曰此說非也統治也言自羙功德治理天下過於堯舜也其下乃言以一至萬之事縣石鑄鍾虡服䖍曰縣石以為磬也蘇林曰秦欲平天下法使輕重如石之在稱也師古曰二說皆非也縣稱也石百二十斤稱銅鐵之斤石以鑄鍾虡言其奢泰也虡猛獸之名謂鍾鼔之柎飾為此獸虡音鉅篩土築阿房之宮師古曰篩以竹簁為之篩音師簁音山爾反自以為萬世有天下也古者聖王作諡三四十世耳雖堯舜禹湯文武絫世廣徳師古曰絫古累字以為子孫基業無過二三十世者也張晏曰夏十七世殷三十一世周三十六世秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也師古曰復重也音扶目反故死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功徳度其後嗣世世無窮師古曰度音大各反然身死纔數月耳師古曰纔音財暫也淺也天下四靣而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諫之士縱恣行誅退誹謗之人殺直諫之士是以道諛媮合茍容師古曰道讀曰導導引主意於邪也媮奥偷同比其徳則賢於堯舜課其功則賢於湯武天下已潰而莫之告也師古曰水旁決曰潰言天下之壞如水潰詩曰匪言不能胡此畏忌聽言則對譛言則退此之謂也師古曰此大雅桑柔之篇也言賢者見事之是非非不能分别言之而不言者何也此但畏忌犯顔得罪罰也又言言而見聽則悉意荅對不見信受則屏退也今詩本云聽言則對誦言如醉説者又别為義與此不同宋祁曰注文又言言而見聽南本浙本並無一言字余謂當存二言字又曰濟濟多士文王以寧師古曰此大雅文王之篇也濟濟多威儀也此言文王以多士之故能安天下也天下未嘗亡士也然而文王獨言以寧者何也文王好仁則仁興得士而敬之則士用用之有禮義宋祁曰禮義下語未屬疑文不足故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數師古曰言心實憂念之不為禮飾也死則往弔哭之臨其小歛大斂已棺塗而後為之服錫衰麻絰師古曰已棺謂已大斂也塗謂塗殯也錫衰十五升布無事其縷者也棺音工喚反而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不亡也師古曰令善也聞謂聲之聞也今陛下念思祖考術追厥功師古曰術亦作述圖所以昭光洪業休徳師古曰圖謀也休美也使天下舉賢良方正之士天下皆訢訢焉師古曰訢讀與欣同曰將興堯舜之道三王之功矣天下之士莫不精白以承休德師古曰厲精而為潔白也今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳敺射獵師古曰敺與驅同一日再三出臣恐朝廷之解弛師古曰解讀曰懈弛放也音式爾反宋祁曰江浙本廷作臣百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止嵗貢省廏馬以賦縣傳師古曰賦給與也傳音張戀反去諸苑以賦農夫出帛十萬餘匹以振貧民禮髙年九十者一子不事八十者二算不事師古曰一子不事蠲其賦役二算不事免二口之算賦也賜天下男子爵大臣皆至公卿發御府金賜大臣宗族亡不被澤者赦罪人憐其亡髪賜之巾憐其衣赭師古曰衣音於既反書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜師古曰說讀曰悅是以元年膏雨降五穀登此天之所以相陛下也師古曰相助也刑輕於它時而犯法者寡衣食多於前年而盗賊少此天下之所以順陛下也師古曰天下之人也臣聞山東吏布詔令民雖老羸􅜡疾扶杖而往聼之願少須臾母死思見徳化之成也今功業方就名聞方昭四方鄉風師古曰鄉讀曰嚮今從豪俊之臣方正之士直與之日日獵射擊兔伐狐宋祁曰兎疑作莵以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終師古曰此大雅蕩之詩也言人初始皆庶㡬於善道而少有能終之者臣不勝大願願少衰射獵以夏嵗二月定明堂造太學修先王之道師古曰時以十月為嵗首則謂夏正之二月為五月今欲定制度循於古法故特云用夏嵗二月也夏音胡雅反風行俗成萬世之基定然後唯陛下所幸耳師古曰言乃可恣意也古者大臣不媟師古曰媟狎也音息列反故君子不常見其齊嚴之色肅敬之容師古曰見顯示也音胡電反大臣不得與宴游師古曰安息曰宴與讀曰豫方正修絜之士不得從射獵使皆務其方以髙其節師古曰方道也一曰方謂亷隅也則羣臣莫敢不正身修行盡心以稱大禮師古曰稱副也如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞而榮日滅矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴游與大臣方正朝廷論議夫游不失樂朝不失禮議不失計軌事之大者也師古曰軌謂法度也其後文帝除鑄錢令山復上書諫以為變先帝法非是又誦淮南王無大罪宋祁曰誦疑作訟誦是誦說字非是宜急令反國又言柴唐子為不善足以戒鄧展曰淮南傳棘蒲侯柴武太子柴竒與士伍開章謀反章下詰責師古曰以其所上之章令有司詰問對以為錢者亡用器也而可以易富貴富貴者人主之操柄也師古曰操持也音千高反令民為之是與人主共操柄不可長也師古曰長謂畜養也言此事宜速禁絶不可畜養其言多激切善指事意然終不加罰所以廣諫爭之路也其後復禁鑄錢云鄒陽齊人也漢興諸侯王皆自治民聘賢呉王濞招致四方游士陽與呉嚴忌枚乘等俱仕呉皆以文辯著名久之呉王以太子事怨望稱疾不朝隂有邪謀陽奏書諫為其事尙隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後廼致其意其辭曰臣聞秦倚曲臺之宫應劭曰始皇帝所治處也若漢家未央宮師古曰倚恃也音於綺反懸衡天下服䖍曰闗西為衡應劭曰衡平也如淳曰衡猶稱之衡也言其懸法度於其上也師古曰此說秦自以為威力彊固非論平法也下又言陳勝連從兵之據則是説從横之事耳服釋是也畫地而不犯兵加胡越師古曰畫地不犯者法制之行也至其晩節末路張耳陳勝連從兵之據師古曰從音子容反以叩函谷咸陽遂危師古曰叩擊也何則列郡不相親萬室不相救也今胡數渉北河之外上覆飛鳥下不見伏菟蘇林曰言胡來人馬之盛揚塵上覆飛鳥下不見伏菟也一曰覆盡也言上射飛鳥下盡伏莬也師古曰覆盡是也音方目反劉奉世曰自胡渉北河以下蘇説最近之陽已知趙連匈奴呉交越不欲斥言故謬其辭而云胡攻趙越攻吳四國有怨救兵不専漢梁淮陽不能助已欲吳王曉其謬辭也然文意僻澁故不可通鬭城不休救兵不止死者相隨輦車相屬師古曰屬連也音之欲反宋祁曰不止姚本作不至轉粟流輸千里不絕何則彊趙責於河間應劭曰趙幽王為呂后所幽死文帝立其長子遂為趙王取趙之河間立遂弟辟疆為河間王至子哀王無嗣國除遂欲復還得河間六齊望於惠后孟康曰髙后割齊濟南郡為呂台奉邑又割琅邪郡封營陵侯劉澤為琅邪王文帝乃立悼惠王六子為王言六齊不保今日之恩而追怨恵帝與吕后也一説惠帝二年悼惠王入朝呂后欲鴆殺之獻城陽郡尊魯元公主得免六子以此怨之城陽顧於盧博孟康曰城陽王喜也喜父章與弟興居討諸呂有功本當盡以趙地王章梁地王興居文帝聞其欲立齊王更以二郡王之章失職嵗餘薨興居誅死盧博濟北王治處喜顧念而怨也三淮南之心思墳墓張晏曰淮南厲王三子為三王念其父見遷殺思墓故報怨也師古曰三子為王謂淮南衡山濟北也宋祁曰别本注文自張晏至墓故漏此二十一字故報怨當作欲報怨大王不憂臣恐救兵之不專孟康曰不專救漢也如淳曰皆自私怨宿忿不能為呉也若吳舉兵反天子來討謂四國但有意不敢相救也師古曰二說皆非也言諸國各有私怨欲申其志不肯專為吳非不敢相救也胡馬遂進窺於邯鄲越水長沙還舟青陽張晏曰青陽地名還舟聚舟船也言胡為趙難越為吳難不可恃也劉奉世曰越水長沙者陽盖謬言越先以水軍攻長沙而後還舟侵吳也下文云水章邯是其為文如此青陽呉地雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也應劭曰時趙王遂北連匈奴吳王濞素事三越故鄒陽微言胡越亦自受敵救兵之不專也胡馬故曰進越水故曰深蘇林曰折截也陽知呉王隂連結齊趙淮南胡越欲諫不敢指斥言故陳胡越之難齊趙之怨微言梁并淮陽絶越人之糧漢折西河以輔大國以破難其計欲隱其辭故謬言胡益進越益深為大王患之以錯亂其語若吳為憂助漢者也自此以下乃致其意焉師古曰蘇說是也臣聞交龍襄首奮翼則浮雲出流霧雨咸集師古曰襄舉也宋祁曰南本徐鍇改交為蛟聖王底節修徳則游談之士歸義思名師古曰底厲也音指今臣盡智畢議易精極慮如淳曰改易精思以極盡謀慮也則無國不可奸師古曰奸音干飾固陋之心則何王之門不可曵長裾乎然臣所以歴數王之朝背淮千里而自致者非惡臣國而樂吳民也竊髙下風之行尤説大王之義師古曰言在下風側聼髙尙羙悦大王之行義也說讀曰悦故願大王之無忽察聼其志臣聞鷙鳥絫百不如一鶚孟康曰鶚大鵰也如淳曰鷙鳥比諸侯鶚比天子師古曰鷙擊之鳥鷹鸇之屬也鶚自大鳥而鷙者耳非鵰也絫古累字鶚音愕夫全趙之時服䖍曰全趙趙未分之時武力鼎士祇服叢臺之下者一旦成市師古曰袨服盛服也鼎士舉鼎之士也叢臺趙王之臺也在邯鄲袨音州縣之縣而不能止幽王之湛患師古曰幽王謂趙幽王友也湛讀曰沈沈患言幽王為呂后所幽死淮南連山東之俠死士盈朝不能還厲王之西也師古曰厲王淮南厲王長也西謂廢遷嚴道而死於雍也然而計議不得雖諸賁不能安其位亦明矣師古曰諸謂專諸賁謂孟賁皆古勇士也故願大王審畫而已師古曰畫計也音獲始孝文皇帝據闗入立寒心銷志不眀求衣張晏曰據函谷闗立為天子諸國聞文帝入闗為之寒心散志也求衣夜索衣著不及待明意不安也臣瓚曰文帝入闗而立以天下多難故乃寒心戰慄未明而起師古曰瓚說是也自立天子之後使東牟朱虛東褒義父之後應劭曰天下已定文帝遣朱虛侯章東喻齊王嘉其首舉兵欲誅諸呂猶春秋褒邾儀父也師古曰立天子謂立為天子也義讀曰儀父讀曰甫深割嬰兒王之應劭曰封齊王六子為王其中有小小嬰兒者文帝於骨肉厚也或曰皇子武為代王參為太原王揖為梁王師古曰或說是也劉奉世曰使東牟朱虛東言其東使就王封也而義父者似謂悼惠而不可考據褒其後故封其子皆為王封時有㓜者故舉言嬰兒也下文自言梁代淮陽文三子是矣則知此或說非也壤子王梁代如淳曰文帝之二子晉灼曰揚雄方言梁益之間所愛謂其肥盛曰壤或曰言深割嬰兒王之壤壤土也壤字當上屬也師古曰或說非也宋祁曰注文江浙本謂作諱於理最切言謂者漫而無綂益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉應劭曰仆僵仆也濟北王興居反見誅囚弟於雍者淮南王長有罪見徙死於雍所以然者坐二國有姦臣如新垣平等勸王其反師古曰仆音赴今天子新據先帝之遺業左規山東右制闗中變權易埶大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝如淳曰新垣平詐言鼎在泗水中臣望東北汾隂有金寳氣鼎其在乎弗迎則不至為吳計者猶新垣平之言周鼎終不可得也服䖍曰過誤也則我呉遺嗣不可期於世矣師古曰言呉當絕滅無遺嗣也髙皇帝燒棧道水章邯應劭曰章邯為雍王髙祖以水灌其城破之也兵不留行師古曰言無所稽留不廢於行收弊民之倦東馳函谷西楚大破張晏曰項羽自號西楚霸王水攻則章邯以亡其城陸擊則荆王以失其地如淳曰荆亦楚也謂項羽敗走此皆國家之不㡬者也應劭曰言不可庶㡬也李奇曰不但㡬微乃著見也或曰㡬危也此數事於國家皆無危險之慮也師古曰言漢朝之安諸侯不當妄起邪意應說是也劉攽曰㡬讀曰冀願大王孰察之呉王不内其言宋祁曰内疑作納是時景帝少弟梁孝王貴盛亦待士於是鄒陽枚乘嚴忌知吳不可説皆去之梁從孝王㳺陽為人有智畧忼慨不茍合師古曰忼音口朗反介於羊勝公孫詭之間師古曰介謂間厠也勝等疾陽惡之孝王師古曰惡謂讒毁也其下亦同孝王怒下陽吏將殺之陽客游以讒見禽恐死而負絫師古曰絫音力瑞反廼從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荆軻慕燕丹之義白虹貫日太子畏之應劭曰燕太子丹質於秦始皇遇之無禮丹亡去厚養荆軻令西刺秦王精誠感天白虹為之貫日也如淳曰白虹兵象日為君為燕丹表可克之兆師古曰精誠若斯太子尚畏而不信也太白食昴義亦如之衛先生為秦畫長平之事太白食昴昭王疑之蘇林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生說昭王益兵糧為應侯所害事用不成其精誠上逹於天故太白為之食昴昴趙分也將有兵故太白食昴食干歴之也如淳曰太白天之將軍夫精變天地而信不諭兩主豈不哀哉宋祁曰精字下疑有誠字今臣盡忠竭誠畢議願知張晏曰盡其計議願王知之左右不明卒從吏訊為世所疑師古曰言左右不明者不欲斥王也訊謂鞫問也音信是使荆軻衛先生復起而燕秦不寤也願大王孰察之昔玉人獻寳楚王誅之應劭曰卞和得玉璞獻之武王王示玉人曰石也刖其右足武王殁復獻文王玉人復曰石也則其左足至成王時抱其璞哭於郊乃使玉人攻之果得寳玉也宋祁曰玉人南浙本並作玉尹李斯竭忠胡亥極刑張晏曰李斯諫二世以正而二世殺之具五刑是以箕子陽狂接輿避世張晏曰接輿楚賢人陽狂避世師古曰輿音弋於反恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽師古曰以謬聼為後後猶下也毋使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷應劭曰呉王取馬革為鴟夷受子胥沈之江鴟夷榼形師古曰鴟夷即今之盛酒鴟夷幐宋祁曰幐字下當有也字臣始不信廼今知之願大王孰察少加憐焉語曰有白頭如新孟康曰初相識至白頭不相知宋祁曰此注未安越本孟康作師古南本初相識作初不相識傾盖如故文頴曰傾盖猶交盖駐車也何則知與不知也故樊於期逃秦之燕藉荆軻首以奉丹事張晏曰於期為秦将被讒走之燕始皇滅其家又重購之燕遣荆軻欲刺秦王於期自刎首令軻齎徃師古曰之往也藉假也王奢去齊之魏臨城自剄以郤齊而存魏孟康曰王奢齊臣也亡至魏其後齊伐魏奢登城謂齊將曰今君之來不過以奢故也義不茍生以為魏累遂自剄也夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於天下為燕尾生服䖍曰蘇秦於秦不出其信於燕則出尾生之信也晉灼曰說齊宣王使還燕十城又令閔王厚葬以弊齊終死為燕也師古曰尾生古之信士守志亡軀故以為喻白圭戰亡六城為魏取中山張晏曰白圭為中山將亡六城君欲殺之亡入魏文侯厚遇之還㧞中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劒而怒食以駃騠孟康曰駃騠駿馬也生七日而超其母敬重蘇秦雖有讒謗而更食以珍竒之味師古曰食讀曰飤駃音决騠音題白圭顯於中山師古曰以㧞中山之功而尊顯也人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信師古曰析分也豈移於浮辭哉師古曰不以浮說而移心故女無羙惡入宮見妒士無賢不肖宋祁曰南本賢下有愚字衍字不可從入朝見嫉昔司馬喜臏腳於宋卒相中山蘇林曰六國時人被此刑也范雎拉脅折齒於魏卒為應侯應劭曰魏人也魏相魏齊疑其以國隂事告齊乃掠笞數百拉脅折齒師古曰後入秦為相封為應侯拉摧也音盧合反此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也師古曰言直道而行不求朋黨之助謂忠信必可恃也畫計也音獲是以申徒狄蹈雍之河服䖍曰殷之末世介士也雍之河雍州之河也師古曰雍者河水溢出為小流也言狄初因蹈雍遂入大河也爾雅曰水自河出為雍又曰江有沲河有雍雍音於龍反服云雍州之河非也徐衍負石入海服䖍曰周之末世人也師古曰負石者欲速沈也不容於世宋祁曰容字下一添身字義不茍取比周於朝以移主上之心師古曰比音頻寐反故百里奚乞食於道路繆公委之以政應劭曰虞人也聞秦繆公賢欲往干之乏資乞食以自致也甯戚飯牛車下桓公任之以國應劭曰齊桓公夜出迎客甯戚疾擊其牛角髙歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昬飯牛薄夜半長夜曼曼何時旦桓公召與語說之以為大夫師古曰矸字與岸同骭脛也薄止也骭音下諫反曼音莫幹反宋祁曰注文髙字合作商韓昌黎詩云為我商聲謳乃用此事也浙本亦作商作髙盖監本誤刋耳此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠桼昆弟不能離豈惑於衆口哉故偏聼生姦獨任成亂昔魯聼季孫之說逐孔子師古曰季孫魯大夫季桓子也名斯論語云齊人歸女樂季桓子受之三日不朝孔子行盖桓子故使定公受齊之女樂欲令去孔子也宋任子冉之計囚墨翟文頴曰子冉子罕也夫以孔墨之辯不能自免於讒諛而二國以危何則衆口鑠金積毁銷骨也師古曰羙金見毁衆共疑之數被燒鋉以至銷鑠讒佞之人肆其詐巧離散骨肉而不覺知秦用戎人由余而伯中國師古曰伯讀曰霸齊用越人子臧而彊威宣師古曰齊之二王諡也此二國豈係於俗牽於世繫竒偏之浮辭哉公聼竝觀埀明當世師古曰公聼言不私也並觀所見齊同也故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣師古曰朱丹朱堯子象舜弟管蔡周之二叔也今人主誠能用齊秦之明後宋魯之聼則五伯不足侔而三王易為也師古曰侔等也伯讀曰霸宋祁曰郭去而字一本為字下有比字是以聖王覺寤捐子之之心而不說田常之賢應劭曰燕王噲賢其相子之欲禪以燕國國乃大亂田常陳恒也齊簡公悦之而殺簡公今使人君去此心則國家安全也師古曰說讀曰悅封比干之後修孕婦之墓應劭曰紂刳妊者觀其胎産師古曰武王克商反其故政乃封修之故功業覆於天下師古曰覆猶被也何則欲善亡厭也夫晉文親其讎彊伯諸侯齊桓用其仇而一匡天下張晏曰寺人勃鞮為晉獻公逐文公斬其祛及文公即位用其言以免呂郄之難管仲射中桓公帶鉤而用為相師古曰伯讀為霸下皆類此宋祁曰注文郄當作郤何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立彊天下卒車裂之師古曰卒終也越用大夫種之謀禽勁吳而伯中國遂誅其身是以孫叔敖三去相而不悔師古曰叔敖三為楚相而三去之狐丘之封人謂之曰吾聞處官久者士妬之祿厚者衆怨之位尊者君恨之今相國有此三者而不得罪於楚之士衆何也叔敖曰吾三相楚而身愈卑每益祿而施愈博位滋尊而禮愈恭是以不得罪於楚人也於陵子仲辭三公為人灌園師古曰於陵地名也子仲陳仲子也其先與齊同族兄戴為齊相仲子以為不義乃將妻子適楚居于於陵自謂於陵子仲楚王聞其賢使使者持金百鎰聘之欲以為相仲子不許遂夫妻相與逃而為人灌園終身不屈其節今人主誠能去驕傲之心懐可報之意披心腹見情素師古曰見顯示之也素謂心所向也墮肝膽施徳厚師古曰墮毁也音火規反終與之窮達無愛於士師古曰無所吝惜也則桀之犬可使吠堯宋祁曰犬字當從浙本作狗則近古而語直跖之客可使刺由應劭曰盗跖之客為其人使刺由由許由也師古曰此言被之以恩則用命也何况因萬乘之權假聖王之資乎然則軻湛七族要離燔妻子豈足為大王道哉應劭曰荆軻為燕刺秦始皇不成而死其族坐之湛没也吳王闔閭欲殺王子慶忌要離詐以罪亡令呉王燔其妻子要離走見慶忌以劒刺之張晏曰七族上至曽祖下至曽孫師古曰此說云湛七族無荆字也尋諸史籍荆軻無湛族之事不知陽所云者定何人也湛讀曰沈劉敞曰王充書言秦怨荆軻并殺其九族殺則是湛矣非必沈之水也宋祁曰淳化本作荆軻景祐本無荆字按浙本郭本去荆字云據注無荆字南本徐鍇亦滅荆字臣聞明月之珠夜光之璧以闇投人於道衆莫不按劒相眄者何則無因而至前也蟠木根柢輪囷離竒蘇林曰柢音蔕張晏曰柢根下本也輪囷離竒委曲盤戾也師古曰蟠木屈曲之木也囷音去輪反離音力爾反竒音於綺反一曰離竒各讀如本字而為萬乘器者以左右先為之容也師古曰萬乘器天子車輿之屬也容謂彫刻加飾故無因而至前雖出隨珠和璧秪怨結而不見德師古曰隨國之侯見大蛇傷者療而愈之蛇銜明珠以報其德故稱隨珠和氏之璧即卞和所獻之玉耳秪適也音支有人先游則枯木朽株樹功而不忘師古曰先游謂進納之也樹立也今夫天下布衣窮居之士身在貧羸師古曰衣食不充故羸痩也一曰羸謂無威力雖蒙堯舜之術挾伊管之辯師古曰伊伊尹管管仲懐龍逄比干之意而素無根柢之容雖竭精神欲開忠於當世之君師古曰開謂陳說也則人主必襲按劒相眄之迹矣師古曰襲重也言躡其故跡也是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上張晏曰陶家名模下圓轉者為鈞以其制器為大小比之於天也師古曰此說非也陶家名轉者為鈞盖取周回調鈞耳言聖王制馭天下亦猶陶人轉鈞非陶家轉象天也而不牽乎卑辭之語不奪乎衆多之口師古曰奪者言欲行善道而為佞人奪其計也宋祁曰浙本辭作亂故秦皇帝任中庶子蒙之言師古曰蒙者庶子名也今流俗書本蒙下輒加恬字非也以信荆軻而匕首竊發師古曰匕首短劒也其首類匕便於用也周文王獵涇渭載呂尙歸以王天下應劭曰西伯出遇呂尚於渭之陽與語大悦因載歸秦信左右而亡周用烏集而王師古曰言文王之得太公非因舊故若烏鳥之暴集何則以其能越攣拘之語馳域外之議師古曰攣音力全反獨觀乎昭曠之道也師古曰昭明也曠廣也今人主沈謟諛之辭牽帷廧之制孟康曰言為左右便僻侍帷廧臣妾所見牽制矣使不覊之士與牛驥同皁師古曰不覊言才識髙逺不可覊係也皁櫪也揚雄方言云梁宋齊楚燕之間謂櫪曰皁皁音在早反此鮑焦所以憤於世也孟康曰周之介士也師古曰鮑焦怨時之不用已採蔬於道子貢難曰非其時而採其蔬此焦之有哉棄其蔬乃立枯於洛水之上蔬謂菜也臣聞盛飾入朝者不以私汙義底厲名號者不以利傷行師古曰底厲言其自修亷隅若磨厲於石也故里名勝母曾子不入師古曰曽子至孝以勝母之名不順故不入也邑號朝歌墨子回車晉灼曰紂作朝歌之音朝歌者不時也師古曰朝歌殷之邑名也淮南子云墨子非樂不入朝歌今欲使天下寥廓之士籠於威重之權脅於位埶之貴師古曰寥廓逺大之度也脅廹也寥音聊回面汙行以事謟諛之人師古曰回邪也汙不潔也音一故反或曰汙曲也音一胡反而求親近於左右則士有伏死堀穴巖藪之中耳師古曰堀與窟同澤無水曰藪安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客初勝詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后爰盎等皆建以為不可師古曰建謂立議天子不許梁王怒令人刺殺盎上疑梁殺之使者冠盖相望責梁王梁王始與勝詭有謀陽爭以為不可故見讒枚先生嚴夫子皆不敢諫師古曰先生枚乘夫子嚴忌及梁事敗勝詭死孝王恐誅廼思陽言深辭謝之齎以千金令求方畧解罪於上者陽素知齊人王先生師古曰素與相知也年八十餘多奇計即往見語以其事王先生曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止况臣下乎昔秦始皇有伏怒於太后羣臣諫而死者以十數得茅焦為廓大義鄭氏曰齊人也應劭曰茅焦諫云陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為陛下危之臣所言畢乃解衣趨鑊始皇下殿左手接之曰先生起矣即迎太后遂為母子如初始皇非能說其言也廼自强從之耳師古曰說讀曰悅茅焦亦厪脫死如毛氂耳師古曰厪少也言纔免於死也厪音巨刃反故事所以難者也今子欲安之乎師古曰安焉也之往也陽曰鄒魯守經學齊楚多辯知韓魏時有竒莭吾將歴問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為衆不可盖師古曰盖覆蔽也竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王羙人兄也後封為盖侯鄒陽留數日乘間而請曰師古曰間謂空隙無事之時臣非為長君無使令於前故來侍也師古曰使令謂役使之人也令音力成反愚戇竊不自料願有謁也師古曰料量也謁告也長君跪曰幸甚陽曰竊聞長君弟得幸後宮天下無有師古曰言獨一耳無所比類也而長君行迹多不循道理者今爰盎事即窮竟梁王恐誅如此則太后怫鬰泣血無所發怒師古曰怫鬰藴積也怫音佛切齒側目於貴臣矣臣恐長君危於絫卵師古曰絫卵者言其將隤而破碎也竊為足下憂之長君懼然曰將為之奈何師古曰懼讀曰瞿音居具反瞿然無守之貌陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宫如淳曰太后宮及帝宫也金城之固也師古曰言其榮寵無極不可壞故取喻於金城也又有存亡繼絶之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事師古曰言日日欲殺也及舜立為天子封之於有卑服䖍曰音畀予之畀也師古曰地名也音鼻今鼻亭是也在零陵夫仁人之於兄弟無臧怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般師古曰慶父莊公弟也子般莊公太子也僕人即鄧扈樂也父讀曰甫般字與班同獄有所歸師古曰歸罪於鄧扈樂也季友不探其情而誅焉師古曰季友慶父之弟不探慶父本情而誅扈樂慶父親殺閔公季子緩追免賊師古曰慶父出奔季友縱而不追免其賊亂之罪春秋以為親親之道也師古曰公羊之說也言季友親其兄也魯哀姜薨于夷孔子曰齊桓公法而不譎以為過也師古曰哀姜莊公夫人也滛於二叔而豫殺閔公齊人殺之于夷夷齊地也法而不譎者言守法而行不能用權以免其親也以是說天子徼幸梁事不奏長君曰諾乘閒入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守不行漢既破吳齊王自殺不得立嗣劉奉世曰齊孝王自殺景帝聞之以為首善即立其子此云不得立嗣者盖嘗有為此議者耳濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰師古曰玃音俱畧反臣請試為大王眀說梁王通意天子說而不用死未晩也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國張晏曰四方受敵濟北居中央為五晉灼曰四分即交五而裂如田字也權不足以自守勁不足以扞宼師古曰扞禦也音胡旦反又非有竒怪云以待難也如淳曰非有竒材異計欲以為亂逆也但假權許吳以避其禍耳晉灼曰非有以怪異之心而城守須待變難而應吳也師古曰二説皆非也此言權謀勁力既不能扞守又無竒怪神靈可以禦難恐不自全故墜言於吳也宋祁曰徐鍇改云作亡予謂云義安不須改雖墜言於吳非其正計也蘇林曰墜猶失也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也師古曰祭仲鄭大夫祭足也事鄭莊公為公娶鄧曼生昭公故祭仲立之而宋大夫雍氏以女妻莊公而生突昭公既立宋人誘祭仲而執之曰不立突將死祭仲與宋人盟以厲公歸而立之昭公奔衛言足脅於大國茍順其心欲以全昭公也祭音側界反宋祁曰亡也邵本無也字鄉使濟北見情實示不從之端師古曰鄉讀曰嚮見謂顯也則吳必先歴齊畢濟北張晏曰歴過畢盡收濟北之地招燕趙而總之如此則山東之從結而無隙矣師古曰從音子容反今吳楚之王練諸侯之兵敺白徒之衆師古曰練選也敺與驅同白徒言素非軍旅之人若今言白丁矣西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬歩獨進師古曰半歩曰跬音空絫反宋祁曰跬歩獨進一作行義直可行瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊師古曰區區小貌也是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣師古曰撓曲也音女教反宋祁曰一當作壹功義如此尙見疑於上脅肩低首絫足撫衿師古曰脅翕也謂歛也使有自悔不前之心張晏曰悔不與吳西也非社稷之利也臣恐藩臣守職者疑之臣竊料之師古曰料量也能歴西山徑長樂抵未央攘𬒮而正議者獨大王耳師古曰西山謂崤及華山也抵至也攘郤也袂衣袖也攘袂猶今人云掉臂耳上有全亡之功下有安百姓之名德淪於骨髓師古曰淪入也恩加於無窮願大王留意詳惟之師古曰惟思也孝王大說師古曰說讀曰悦使人馳以聞濟北王得不坐徙封於淄川也宋祁曰姚本及越本並無也字枚乘字叔淮隂人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十户之聚以王諸侯師古曰聚聚邑也音才喻反湯武之土不過百里上不絶三光之明下不傷百姓之心者有王術也師古曰德政和平上感天象則日月星辰無有錯謬故言不絶三光之明也故父子之道天性也忠臣不避重誅以直諫師古曰言父子君臣其義一也則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之髙下埀不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之師古曰駭亦驚也鼓擊鼓也係方絶又重鎮之係絶於天不可復結隊入深淵難以復出其出不出間不容髮蘇林曰改計取福正在今日言其激切甚急也能聼忠臣之言百舉必脱師古曰脱者免於禍也音土活反必若所欲為危於絫卵難於上天變所欲為易於反掌安於泰山今欲極天命之夀敝無窮之樂究萬乘之埶師古曰敝盡也究竟也不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難師古曰走趨向之也音奏此愚臣之所以為大王惑也宋祁曰景德本云此愚臣之所大惑也無以為王三字人性有畏其景而惡其跡者郤背而走師古曰背音歩内反迹愈多景愈疾不知就隂而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之凔鄭氏曰音悽愴之愴寒也宋祁曰注文音字上當有凔字注須複文為訓故必待凔字乃足一人炊之百人揚之無益也師古曰炊謂㸑火也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百歩百發百中楊葉之大加百中焉可謂善射矣然其所止廼百歩之内耳比於臣乘未知操弓持矢也師古曰乘自言所知者逺非止見百歩之中故謂由基為不曉射也福生有基禍生有胎服䖍曰基胎皆始也納其基絶其胎禍何自來師古曰納猶藏也何自來言無所從來也泰山之霤穿石單極之䋁斷幹孟康曰西方人名屋梁為極單一也一梁謂井鹿盧也言鹿盧為綆索久鍥斷井幹也晉灼曰䋁古綆字也單盡也盡極之綆斷幹幹井上四交之幹常為汲索所契傷也師古曰晉說近之幹者交木井上以為欄者也孟云鹿盧失其義矣䋁綆皆音鯁鍥契皆刻也音口計反水非石之鑽索非木之鋸漸靡使之然也師古曰靡盡也夫銖銖而稱之至石必差寸寸而度之至文必過鄭氏曰石百二十斤張晏曰乘所轉四萬六千八十銖而至於石合而稱之必有盈縮也師古曰言自小小以至於大數則有輕重不同也度音徒各反石稱丈量徑而寡失師古曰徑直也夫十圍之木始生如蘖足可搔而絶手可擢而㧞師古曰如蘖言若蘖之生牙也搔謂狐也搔音索髙反狐音荘交反據其未生先其未形也磨礱底厲不見其損有時而盡師古曰礱亦磨也底柔石也厲皂石也皆可以磨者礱音聾種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王游景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉師古曰鄉讀曰嚮以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王劉攽曰此枚乘説呉王後是後人以呉事寓言爾故言齊王殺身等事不同又卭筰武帝始通此已云南距𦍑筰之塞益知其非曰昔者秦西舉胡戎之難北備榆中之闗師古曰即今所謂榆闗也南距𦍑筰之塞師古曰筰西南夷也音力各反宋祁曰筰當從艸下同東當六國之從師古曰從音子容反六國乘信陵之籍孟康曰魏公子無忌號信陵君無忌嘗總五國却秦有地資也明蘇秦之約厲荆軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義師古曰修恩義以撫戎狄而南朝𦍑筰此其與秦地相什而民相百大王之所明知也師古曰地十倍於秦衆百倍於秦今夫讒䛕之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍師古曰言勸王之反則於吳為禍也此臣所以為大王患也夫舉吳兵以訾於漢李竒曰訾量也師古曰音子私反譬猶蠅蚋之附羣牛腐肉之齒利劒鋒接必無事矣師古曰蚋蚊屬也齒謂當之也蚋音芮又音人悦反天子聞吳率失職諸侯願責先帝之遺約師古曰失職謂被削黜失其常分今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國師古曰隱匿謂僻在東南夫漢并二十四郡十七諸侯方輸錯出運行數千里不絶於道其珍怪不如東山之府張晏曰漢時有二十四郡十七諸侯王也四方更輸錯互更出攻也如淳曰東方諸郡以封王侯不以封者二十四耳時七國謀反其餘不反者十七也東山呉王之府藏也師古曰二說皆非也言漢此時有二十四郡十七諸侯方軌而輸雜出貢賦入於天子猶不如吳之富也轉粟西鄉陸行不絶水行滿河不如海陵之倉如淳曰言漢京師仰須山東漕運以自給也晉灼曰海陵海中山為倉也臣瓚曰海陵縣名也有吳太倉師古曰瓚說是也鄉讀曰嚮修治上林雜以離宮積聚玩好圈守禽獸不如長洲之苑服䖍曰呉苑孟康曰以江水洲為苑也韋昭曰長洲在吳東宋祁曰注文呉苑字下當有也字游曲臺臨上路不如朝夕之池張晏曰曲臺長安臺臨道上蘇林曰吳以海水朝夕為池也師古曰三輔黄圖未央宮有曲臺殿宋祁曰注文上字下當有也字深壁髙壘副以闗城不如江淮之險此臣之所以為大王樂也師古曰言其富饒及游晏之處踰天子也宋祁曰景祐本無以字今大王還兵疾歸尙得十半師古曰十分之中可兾五分無患故云尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黄頭循江而下蘇林曰羽林黄頭郎習水戰者也張晏曰天子舟立黄旄於其端也師古曰鄧通以擢船為黄頭郎蘇説是也襲大王之都魯東海絶呉之饟道師古曰饟古餉字梁王飭車騎習戰射師古曰飭與勅同飭整也積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已師古曰已語終之辭夫三淮南之計不負其約晉灼曰吳楚反皆守約不從也齊王殺身以滅其跡晉灼曰齊孝王將閭也吳楚反堅守距三國後欒布聞齊初與三國有謀欲伐之王懼自殺師古曰齊王傳云吳楚已平齊王乃自殺今此枚乘諫書即已稱之二傳不同當有誤者四國不得出兵其郡晉灼曰膠東膠西濟北淄川王也發兵應呉楚皆見誅趙囚邯鄲應劭曰漢將酈寄圍趙王於邯鄲與囚無異劉奉世曰按諸傳吳王正月先起兵二月敗走中間五十日爾三國圍齊三月不能下漢兵至乃引歸解圍而後齊王自殺則當在吳走後一月外事又乘此書云梁固守以待吳飢則是未飢以前安得已知齊王殺身與四國不得出兵及趙囚之詳疑乘書非真事後追加之或傳之者増之也此不可掩亦已明矣師古曰言事已彰著大王已去千里之國而制於十里之内矣師古曰梁下屯兵方十里也張韓將北地如淳曰張張羽韓韓安國也時皆仕梁北地良家子善騎射者也師古曰將北地者言將兵而處吳軍之北以距吳非北地良家子也張羽韓安國不將漢兵如說非也弓馬宿左右服䖍曰韓頽當也如淳曰宿軍左右也後弓髙侯竟將輕騎絶吳糧道師古曰宿止也言弓髙所將之兵屯止於吳軍左右也兵不得下壁軍不得大息臣竊哀之願大王孰察焉吳王不用乘䇿卒見禽滅漢既平七國乘由是知名景帝召拜乘為𢎞農都尉乘久為大國上賔與英俊並游得其所好不樂郡吏以病去官復游梁梁客皆善屬辭賦乘尤髙孝王薨乘歸淮隂武帝自為太子聞乘名及即位乘年老廼以安車蒲輪徴乘師古曰蒲輪以蒲裹輪宋祁曰注末當有也字道死師古曰在道病死也詔問乘子無能為文者後廼得其孽子臯師古曰孽庶也臯字少孺乘在梁時取臯母為小妻乘之東歸也臯母不肯隨乘乘怒分臯數千錢留與母居年十七上書梁共王師古曰恭王名買孝王之子也得召為郎三年為王使與冗從爭師古曰冗從散職之從王者也見讒惡遇罪師古曰惡謂冗從言其短惡之事家室没入臯亡至長安㑹赦上書北闕自陳枚乘之子上得之大喜宋祁曰得之大喜越本無之字召入見待詔臯因賦殿中詔使賦平樂館善之拜為郎使匈奴臯不通經術詼笑類俳倡李竒曰詼嘲也師古曰俳雜戱也倡樂人也詼音恢俳音排嘲竹交反宋祁曰注文嘲南本作謿後人不識改從嘲耳為賦頌好嫚戱師古曰嫚褻汙也音慢以故得媟黷貴幸師古曰媟狎也黷垢濁也音瀆比東方朔郭舍人等而不得比嚴助等得尊官師古曰尊髙也武帝春秋二十九廼得皇子羣臣喜故臯與東方朔作皇太子生賦及立皇子禖祝師古曰禮記月令祀於髙禖髙禖求子之神也武帝晩得太子喜而立此禖祠而令臯作祭祝之文也宋祁曰皇子禖祝浙本皇字下有太字受詔所為皆不從故事重皇子也初衛皇后立臯奏賦以戒終師古曰令慎終如始也臯為賦善於朔也從行至甘泉雍河東東廵狩封泰山塞決河宣房游觀三輔離宫館臨山澤弋獵射馭狗馬蹵鞠刻鏤師古曰蹵足蹵之也鞠以韋為之中實以物蹵蹋為戯樂也蹵音千六反鞠音巨六反上有所感輙使賦之為文疾受詔輙成故所賦者多司馬相如善為文而遲故所作少而善於臯臯賦辭中自言為賦不如相如又言為賦廼俳見視如倡自悔類倡也故其賦有詆娸東方朔如淳曰娸音欺詆猶刑辟也師古曰詆毁也娸醜也詆音丁禮反又自詆娸其文骫骳曲隨其事皆得其意師古曰骫古委字也骳音被骫骳猶言屈曲也頗詼笑不甚閑靡凡可讀者百二十篇其尤嫚戱不可讀者尚數十篇路温舒字長君鉅鹿東里人也父為里監門使温舒牧羊温舒取澤中蒲截以為牒編用寫書師古曰小簡曰牒編聨次之稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署决曹史又受春秋通大義舉孝亷為山邑丞蘇林曰縣名在常山晉灼曰地理志常山有石邑無山邑師古曰山邑不知其處今流俗書本云常山石邑丞後人妄加石字耳坐法免復為郡吏元鳯中廷尉光以治詔獄請温舒署奏曹掾師古曰光解光守廷尉史㑹昭帝崩昌邑王賀廢宣帝初即位温舒上書言宜尚徳緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯師古曰伯讀曰霸近世趙王不終諸呂作亂而孝文為太宗繇是觀之師古曰繇讀與由同禍亂之作將以開聖人也故桓文扶㣲興壊尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至悳以承天心崇仁義省刑罰通闗梁一逺近敬賢如大賔愛民如赤子内恕情之所安而施之於海内是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之師古曰援引也音爰然天不授命滛亂其心遂以自亡深察禍變之故廼皇天之所以開至聖也故大將軍受命武帝股肱漢國師古曰謂霍光披肝膽决大計黜亡義立有徳輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受命之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言師古曰遏止也音一曷反故盛服先生不用於世忠良切言皆鬰於胷師古曰鬰積也譽䛕之聲日滿於耳虛美熏心實禍蔽塞師古曰熏氣烝也音勲此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生􅓟者不可復屬師古曰􅓟古絶字屬連也音之欲反書曰與其殺不辜寧失不經師古曰虞書大禹謨載咎繇之言辜罪也經常也言人命至重治獄宜慎寧失不常之過不濫無罪之人所以崇寛恕也今治獄吏則不然上下相敺以刻為明師古曰敺與驅同深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬數此仁聖之所以傷也宋祁曰所以傷也江浙本並無以字予謂存以則語緩而迂不如去之則句易了太平之未洽凡以此也夫人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以視之師古曰視讀曰示吏治者利其然則指道以眀之上奏畏郤則鍜鍊而周内之晉灼曰精熟周悉致之法中也師古曰郤退也畏為上所郤退郤音丘畧反盖奏當之成師古曰當謂處其罪也雖咎繇聼之猶以為死有餘辜師古曰咎繇作士善聼獄訟故以為喻也何則成練者衆文致之罪明也是以獄吏專為深刻殘賊而亡極媮為一切如淳曰媮茍且也一切權時也不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對師古曰畫獄木吏尚不入對况真實乎期猶必也議必不入對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毁而後鳳皇集師古曰鳶鴟也音弋全反誹謗之罪不誅而後良言進故古人有言山藪臧疾川澤納汙瑾瑜匿惡國君含詬師古曰春秋左氏傳載晉大夫伯宗之辭詬恥也言山藪之有草木則毒害者居之川澤之形廣大則能受於汙濁人君之善御下亦當忍耻病也詬音垢唯陛下除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失尊文武之悳省法制寛刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚師古曰與天長久無窮極也上善其言遷廣陽私府長師古曰藏錢之府天子曰少府諸侯曰私府長者其官之長也内史舉温舒文學髙第遷右扶風丞時詔書令公卿選可使匈奴者温舒上書願給厮養暴骨方外以盡臣節師古曰求為卒而隨使至匈奴也事下度遼將軍范明友太僕杜延年問狀罷歸故官師古曰以其言無可取故罷而遣歸故官久之遷臨淮太守治有異迹卒於官温舒從祖父受歴數天文以為漢厄三七之間張晏曰三七二百一十嵗也自漢初至哀帝元年二百一年也至平帝崩二百十一年上封事以豫戒成帝時谷永亦言如此師古曰永上書所謂渉三七之節絶者也及王莾簒位欲章代漢之符著其語焉温舒子及孫皆至牧守大官贊曰春秋魯臧孫逹以禮諫君君子以為有後師古曰臧孫逹魯大夫臧哀伯也桓公取郜大鼎於宋哀伯諫之周内史聞之曰臧孫逹其有後於魯乎君違不忘諫之以德也賈山自下劘上孟康曰劘謂剴切之音靡厲也師古曰剴也蘇林曰劘音工來反鄒陽枚乘游於危國然卒免刑戮者以其言正也路温舒辭順而意篤遂為世家宜哉師古曰謂子孫為大官不絶前漢書卷五十一前漢書卷五十一考證賈山傳嘗給事潁隂侯為騎胡三省曰潁隂侯灌嬰也騎者在侯家為騎士又言柴唐子為不善足以戒臣召南按棘蒲侯柴武太子竒謀反見淮南王傳此文應云柴武子疑唐字訛鄒陽傳城陽顧于盧博注濟北王治處臣召南按地理志盧縣濟北王都博縣則濟北屬縣耳注當云盧博濟北地宋任子冉之計囚墨翟注文潁曰子冉子罕也臣召南按子冉史記作子罕故文頴以為一人顧炎武曰子罕是魯襄公時人墨翟在孔子之後子冉當另是一人文潁注非也又齊用越人子臧而强威宣史記作齊用越人蒙故秦皇帝任中庶子蒙之言注蒙者庶子名也顧炎武曰史記秦王寵臣中庶子蒙嘉為先言於秦王非蒙恬亦非蒙名傳文脱嘉字耳枚乘傳枚乘復説吳王顧炎武曰上云吳王不納乘等去而之梁此云復説吳王盖吳王舉兵之時乘已家居而復與之書不然無緣復説也四國不得出兵其郡注晉灼曰膠東膠西濟北淄川王也臣召南按濟北係濟南之譌路温舒傳元鳯中廷尉光注師古曰光解光臣召南按此李光也公卿表李光以元鳯六年為廷尉四年免師古以成哀間解光當之非是前漢書卷五十一考證
