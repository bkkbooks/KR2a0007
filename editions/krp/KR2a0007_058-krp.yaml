body:
  text: 前漢書卷五十八漢蘭臺令史班固撰唐正議大夫行祕書少監琅琊縣開國子顔師古注公孫𢎞卜式兒寛傳第二十八公孫𢎞葘川薛人也少時為獄吏有罪免家貧牧豕海上年四十餘乃學春秋雜説武帝初即位招賢良文學士宋祁曰士字上疑有之字是時𢎞年六十以賢良徵為博士使匈奴還報不合意師古曰奏事不合天子之意上怒以為不能𢎞乃移病免歸師古曰移病謂移書言病也一曰以病移居元光五年復徵賢良文學葘川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至太常上策詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯隂陽和五穀登六畜蕃師古曰登成也蕃多也音扶元反甘露降風雨時嘉禾興朱屮生師古曰􅋄古草字山不童澤不涸師古曰童無草木也涸水竭也音胡各反麟鳯在郊藪龜龍游於沼師古曰邑外謂之郊澤無水曰藪沼池也河洛出圖書父不喪子兄不哭弟北發渠搜南撫交阯師古曰言威徳之盛北則徵發于渠搜南則綏撫於交阯也渠搜逺夷之國也舟車所至人迹所及跂行喙息咸得其宜師古曰跂行有足而行者也喙息謂有口能息者也跂音岐喙音許穢反朕甚嘉之今何道而臻乎此師古曰臻至也子大夫脩先聖之術明君臣之義講論洽聞有聲乎當世敢問子大夫天人之道何所本始吉凶之效安所期焉師古曰安焉也禹湯水旱厥咎何由仁義禮知四者之宜當安設施屬統垂業物鬼變化師古曰屬繫也音之欲反其下亦同天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇師古曰悉盡也篇簡也朕將親覽焉靡有所隱𢎞對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也師古曰躬謂身親行之遇謂處待之而已宋祁曰注文而已字疑當刪末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治師古曰分音扶問反去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有徳者進無徳者退則朝廷尊有功者上無功者下則羣臣逡李竒曰言有次第也師古曰逡音七旬反其字從辵宋祁曰逡疑作俊姚本注文改辵作辶罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也宋祁云江南本無民字故民者業之即不爭理得則不怨有禮則不暴愛之則親上師古曰各得其業則無爭心各申其理則無所怨使之由禮則無暴慢子而愛之則知親上也此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴師古曰遠違也音于萬反故法之所罰義之所去也師古曰去棄也音邱舉反和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣宋祁曰監本浙本止云不犯矣南本云民之所服也不犯禁矣而賞罰順之則民從余謂不犯禁矣四字疑當删止作則民從故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應師古曰比和也音頻寐反今人主和徳於上百姓和合於下師古曰合謂與上合徳也故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五穀登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟徳配天地明並日月則麟鳯至龜龍在郊河出圖洛出書逺方之君莫不説義師古曰説讀曰悦奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也師古曰視履而行之智者術之原也致利除害兼愛無私謂之仁師古曰致謂引而至也明是非立可否謂之義進退有度尊卑有分謂之禮師古曰分音扶問反擅殺生之柄通壅塞之塗師古曰擅專也權輕重之數論得失之道使逺近情偽必見於上謂之術師古曰見顯也凡此四者治之本道之用也皆當設施不可廢也得其要則天下安樂宋祁曰南本云得其要道浙本云得其要術法設而不用師古曰下不犯法無所加刑也不得其術則主蔽於上官亂於下此事之情屬統垂業之本也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也桀紂行惡受天之罰禹湯積徳以王天下因此觀之天徳無私親宋祁曰天徳浙本無徳字順之和起逆之害生此天文地理人事之紀臣𢎞愚戇不足以奉大對師古曰大對大問之對也時對者百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一召見容貌甚麗宋祁曰浙本云召入見拜為博士待詔金馬門如淳曰武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門𢎞復上疏曰陛下有先聖之位而無先聖之民有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤師古曰篤厚也今世之吏邪故其民薄政弊而不行令倦而不聼夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志師古曰言志所在也書奏天子以册書答曰宋祁曰答字下疑有焉字問𢎞稱周公之治𢎞之材能自視孰與周公賢師古曰與猶如也𢎞對曰愚臣淺薄安敢比材於周公雖然愚心曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之師古曰馴順也音巡至可牽持駕服唯人之從師古曰從人意臣聞揉曲木者不累日師古曰揉謂矯而正之也累積也揉音人九反宋祁曰累當作絫注文積累字上當有絫古累字四字銷金石者不累月夫人之於利害好惡豈比禽獸木石之類哉師古曰好音呼到反惡音一故反朞年而變臣𢎞尚竊遲之上異其言時方通西南夷巴蜀苦之詔使𢎞視焉還奏事盛毁西南夷無所用上不聽每朝㑹議開陳其端使人主自擇不肻面折庭爭於是上察其行慎厚辯論有餘習文法吏事緣飾以儒術師古曰緣飾者譬之於衣加純緣者上説之師古曰説讀曰悦一歲中至左内史𢎞奏事有所不可不肻庭辯師古曰不於朝廷顯辯論之宋祁曰庭當作廷後庭詰並同常與主爵都尉汲黯請間師古曰求空隙之暇黯先發之𢎞推其後上常説師古曰説讀曰悦所言皆聽以此日益親貴嘗與公卿約議師古曰約要也至上前皆背其約以順上指汲黯庭詰𢎞曰齊人多詐而無情始為與臣等建此議今皆背之不忠上問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然𢎞言左右幸臣每毁𢎞上益厚遇之𢎞為人談笑多聞師古曰善於談笑而又多聞也談字或作詼音恢謂啁也善啁謔也常稱以為人主病不廣大人臣病不儉節飬後母孝謹後母卒服喪三年為内史數年遷御史大夫時又東置蒼海宋祁云一作滄北築朔方之郡𢎞數諫以為罷弊中國以奉無用之地願罷之於是上廼使朱買臣等難𢎞置朔方之便發十策𢎞不得一師古曰言其利害十條𢎞無以應之𢎞廼謝曰山東鄙人不知其便若是願罷西南夷蒼海專奉朔方上廼許之汲黯曰𢎞位在三公奉祿甚多師古曰奉音扶用反其下亦同然為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無過黯然今日庭詰𢎞誠中𢎞之病夫以三公為布被誠飾詐欲以釣名師古曰釣取也言若釣魚之謂也且臣聞管仲相齊有三歸師古曰三歸取三姓女也婦人謂嫁曰歸侈擬於君桓公以霸亦上僭於君師古曰擬疑也言相似也晏嬰相景公食不重肉妾不衣絲齊國亦治亦下比於民師古曰比方也一曰比近也音頻寐反今臣𢎞位為御史大夫為布被自九卿以下至於小吏無差誠如黯言且無黯陛下安聞此言上以為有讓愈益賢之元朔中代薛澤為丞相先是漢常以列侯為丞相唯𢎞無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥祿厚徳盛者獲爵尊故武功以顯重而文徳以行襃其以髙成之平津鄉戸六百五十封丞相𢎞為平津侯其後以為故事至丞相封自𢎞始也時上方興功業婁舉賢良師古曰婁古屢字𢎞自見為舉首起徒歩數年至宰相封侯於是起客館開東閤以延賢人師古曰閤者小門也東向開之避當庭門而引賔客以别於掾史官屬也與參謀議𢎞身食一肉脱粟飯師古曰才脱粟而已不精鑿也脱音他活反故人賔客仰衣食師古曰故人平生故交也仰音牛向反奉祿皆以給之家無所餘然其性意忌外寛内深師古曰意忌多所忌害也諸常與𢎞有隙宋祁曰南本常作嘗無近逺雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆𢎞力也後淮南衡山謀反治黨與方急𢎞病甚自以為無功而封侯居宰相位宜佐明主填撫國家師古曰填音竹刃反使人由臣子之道師古曰由從也而諸侯有畔逆之計此大臣奉職不稱也師古曰稱副也恐病死無以塞責師古曰塞當也乃上書曰臣聞天下通道五所以行之者三君臣父子夫婦長幼朋友之交五者天下之通道也仁知勇三者所以行之也故曰好問近乎知師古曰疑則問之故成其智力行近乎仁師古曰屈已濟物故為仁也知恥近乎勇師古曰不求茍得故為勇也知此三者知所以自治知所以自治然後知所以治人師古曰自好問近乎知以下皆禮記中庸之辭未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招倈四方之士任賢序位量能授官將以厲百姓勸賢材也今臣愚駑無汗馬之勞師古曰言未嘗從軍旅陛下過意擢臣𢎞卒伍之中師古曰過猶誤也封為列侯致位三公臣𢎞行能不足以稱師古曰不副其任也加有負薪之疾恐先狗馬填溝壑終無以報徳塞責願歸侯乞骸骨避賢者路上報曰古者賞有功襃有徳守成上文遭禍右武師古曰右亦上也禍亂時則上武耳未有易此者也師古曰易改也朕夙夜庶幾獲承至尊懼不能寧惟所與共為治者君宜知之師古曰惟思也知謂知治道也蓋君子善善及後世若兹行常在朕躬師古曰朕常思此不息於心也君不幸罹霜露之疾何恙不已師古曰罹遭也恙憂也已止也言何憂於疾不止也禮記曰疾止復初也乃上書歸侯乞骸骨是章朕之不徳也師古曰章明也今事少間師古曰間言有空隙也間讀曰閑君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事凡為丞相御史六歲年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相師古曰繼踵言相躡也屈音邱勿反又鉅勿反氂音力之反自蔡至慶丞相府客館邱虛而已師古曰言不能進賢故不繕脩其室屋也虚讀曰墟至賀屈氂時壞以為馬廐車庫奴婢室矣唯慶以惇謹復終相位師古曰惇厚也音敦其餘盡伏誅云𢎞子度嗣侯為山陽太守十餘歲詔徵鉅野令史成詣公車度留不遣坐論為城旦元始中脩功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者也位在宰相封侯而為布被脱粟之飯奉祿以給故人賔客無有所餘可謂減於制度而率下篤俗者也應劭曰禮貴有常尊衣服有品師古曰篤厚也與内厚富而外為詭服以釣虛譽者殊科師古曰詭違也詭服謂與心志相違也一曰違衆之服也夫表徳章義所以率世厲俗聖王之制也其賜𢎞後子孫之次見為適者師古曰見音胡電反適讀曰嫡爵關内侯食邑三百户卜式河南人也以田畜為事有少弟弟壯式脱身出師古曰脱身謂引身出也脱音徒活反獨取畜羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與弟者數矣師古曰數音所角反時漢方事匈奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有寃欲言事乎式曰臣生與人亡所爭邑人貧者貸之師古曰貸音土戴反不善者教之所居人皆從式式何故見寃使者曰茍子何欲師古曰言子茍如此輸財必有所欲式曰天子誅匈奴愚以為賢者宜死節有財者宜輸之如此而匈奴可滅也使者以聞上以語丞相𢎞𢎞曰此非人情不軌之臣師古曰軌亦法也不可以為化而亂法願陛下勿許上不報數歲乃罷式式歸復田牧歲餘㑹渾邪等降縣官費衆倉府空師古曰倉粟所積也府錢所聚也貧民大徙皆卬給縣官師古曰卬音牛向反無以盡贍式復持錢二十萬與河南太守以給徙民河南上富人助貧民者上識式姓名曰是固前欲輸其家半財助邊乃賜式外繇四百人蘓林曰外繇謂戍邊也一人出三百錢謂之過更式歲得十二萬錢也一説在繇役之外得復除四百人也師古曰一説是也式又盡復與官是時富豪皆爭匿財師古曰匿藏也唯式尤欲助費上於是以式終長者乃召拜式為中郎賜爵左庶長師古曰第十爵田十頃布告天下尊顯以風百姓師古曰風讀曰諷初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊師古曰蹻即今草屨也南方謂之蹻字本作屩並音居畧反宋祁曰注文今草屨也景本作今之鞋也歲餘羊肥息師古曰息生也言羊既肥而又生多也上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去師古曰去除也音邱巨反毋令敗羣上竒其言欲試使治民拜式緱氏令緱氏便之遷成臯令將漕最師古曰為縣令而又使領漕其課最上上以式朴忠師古曰朴質也拜為齊王太傅轉為相㑹呂嘉反式上書曰臣聞主媿臣死羣臣宜盡死節其駑下者宜出財以佐軍如是則强國不犯之道也師古曰國家威强而不見侵犯臣願與子男師古曰子男自謂其子也及臨葘習弩博昌習船者請行死之以盡臣節師古曰從軍而致死上賢之下詔曰朕聞報徳以徳報怨以直師古曰論語稱孔子曰以直報怨以徳報徳故詔引之宋祁曰注文南本作孔子之言曰今天下不幸有事郡縣諸侯未有奮繇直道者也孟康曰未有奮迅樂出身勞於徭役者也臣瓚曰言未有奮厲于正直之道師古曰二説皆非也奮憤激也繇讀與由同由從也直道謂報怨以直征南越也言無欲奮厲而從於報怨之道也齊相雅行躬耕臣瓚曰雅素也言卜式躬耕於野不要名利晉灼曰雅正也師古曰言其行雅正又躬耕也隨牧畜蕃輒分昆弟更造師古曰言其畜牧滋多則與昆弟而更自營為也番音扶元反不為利惑師古曰言不惑於利宋祁曰惑一作或注同日者北邊有興師古曰日者往日也興謂發軍上書助官往年西河歲惡率齊人入粟師古曰歲惡猶凶歲也禮記曰歲凶年穀不登今又首奮師古曰為首而奮厲願從軍也雖未戰可謂義形於内矣師古曰形見也其賜式爵關内侯黄金四十斤田十頃布告天下使明知之元鼎中徵式代石慶為御史大夫式既在位言郡國不便鹽鐵而船有筭可罷上由是不説式師古曰説讀曰悦明年當封禪式又不習文章貶秩為太子太傅以兒寛代之式以夀終兒寛千乗人也師古曰千乗郡千乗縣也兒音五奚反治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用嘗為弟子都飬師古曰都凡衆也飬主給烹炊者也貧無資用故供諸弟子烹炊也飬弋向反時行賃作帶經而鉏休息輒讀誦其精如此以射策為掌故功次補廷尉文學卒史蘇林曰秩六百石舊郡亦有也臣瓚曰漢注卒史秩百石師古曰瓚説是也寛為人温良有廉知自將師古曰將衛也以智自衛䕶也善屬文師古曰屬綴也音之欲反然懦於武師古曰懦柔也音乃喚反又音儒口弗能發明也時張湯為廷尉廷尉府盡用文史法律之吏師古曰史謂善史書者而寛以儒生在其間見謂不習事不署曹張晏曰不署為列曹也師古曰署表也置也凡言署官表其秩位置立為之也除為從史師古曰從史者但只隨官僚不主文書之北地視畜數年師古曰之往也畜謂廷尉之畜在北地者若今諸司公廨牛羊還至府上畜簿師古曰簿謂文計也㑹廷尉時有疑奏已再見郤矣師古曰郤退也掾史莫知所為寛為言其意掾史因使寛為奏奏成讀之皆服宋祁曰越本無一奏字以白廷尉湯湯大驚召寛與語乃竒其材以為掾上寛所作奏即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯言兒寛上曰吾固聞之久矣湯由是鄉學師古曰鄉讀曰嚮以寛為奏讞掾以古法義決疑獄甚重之及湯為御史大夫以寛為掾舉侍御史見上語經學上説之師古曰説讀曰悦從問尚書一篇擢為中大夫遷左内史寛既治民勸農業緩刑罰理獄訟卑體下士務在於得人心師古曰下音胡嫁反擇用仁厚士推情與下不求聲名吏民大信愛之寛表奏開六輔渠韋昭曰六輔為京兆馮翊扶風河東河南河内也劉徳曰於六輔界中為渠也師古曰二説皆非也溝洫志云兒寛為左内史奏請穿六輔渠以益溉鄭國旁髙卬之田此則於鄭國渠上流南岸更開六道小渠以輔助溉灌耳今雍州雲陽三原兩縣界此渠尚存鄉人名曰六渠亦號輔渠故河渠書云關内則輔渠靈軹是也焉説三河之地哉定水令以廣溉田師古曰為用水之次具立法令皆得其所也宋祁曰注令皆下當添使字收租税時裁闊狹與民相假貸師古曰謂有貧弱及農要之時不即徵收也貸音土代反以故租多不入後有軍發左内史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶師古曰繦索也言輸者接連不絶於道若繩索之相屬也猶今言續索矣屬音之欲反課更以最上由此愈竒寛及議欲放古巡狩封禪之事師古曰放依也音甫往反諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳言符瑞足以封泰山上竒其書以問寛寛對曰陛下躬發聖徳統楫羣元張晏曰統察楫聚也如淳曰歴數之元也臣瓚曰統猶總覽也楫當作輯師古曰輯楫與集三字並同虞書曰楫五瑞是也其字從木瓚曰當為輯不通宗祀天地薦禮百神精神所鄉徵兆必報師古曰鄉讀曰嚮徵證也天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經師古曰封禪之享薦也以非常禮故經無其文著音竹筯反以為封禪告成合祛於天地神祗李竒曰祛開散合閉也開閉於天地也宋祁曰散字下當添也字祗戒精專以接神明總百官之職各稱事宜而為之節文師古曰稱副也唯聖主所由制定其當師古曰當猶中也非羣臣之所能列今將舉大事優游數年師古曰言不決也使羣臣得人自盡終莫能成師古曰所言不同各有執見也唯天子建中和之極兼總條貫師古曰極正也周禮曰以為人極也金聲而玉振之師古曰言振揚徳音如金玉之聲也以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉既成將用事拜寛為御史大夫從東封泰山還登明堂寛上壽曰臣聞三代改制屬象相因李竒曰政教之法象相因屬師古曰屬連也音之欲反間者聖統廢絶師古曰聖統聖人之遺業謂禮文也陛下發憤合指天地祖立明堂辟雍師古曰祖始也宗祀泰山師古曰宗尊也六律五聲師古曰六律謂黄鍾太蔟姑洗㽔賓夷則無射也五聲宫商角徵羽也幽贊聖意師古曰幽深也贊明也神樂四合各有方象如淳曰四方色及五神祭祀聲樂各有等以丞嘉祀為萬世則師古曰則法也天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅邕永享李竒曰太平之世日抱重光謂日有重日也蘇林曰將甫始之辭也大元太初歴也本瑞謂白麟寳鼎之屬也以候景至冬至之景也上元甲子太初元年甲子朔旦冬至也師古曰宗尊也肅敬也雍和也既敬且和則長為天所享也闓讀與開同光輝充塞天文粲然師古曰塞滿也粲然明貌見象日昭報降符應師古曰言天顯示景象白日昭明也降下符應以報徳化臣寛奉觴再拜上千萬歲壽制曰敬舉君之觴後太史令司馬遷等言歴紀壞廢漢興未改正朔宜可正上乃詔寛與遷等共定漢太初歴語在律歴志初梁相褚大通五經為博士時寛為弟子及御史大夫缺徵褚大夫自以為御史大夫宋祁曰褚大下夫字當作大至洛陽聞兒寛為之褚大笑及至與寛議封禪於上前大不能及退而服曰上誠知人寛為御史大夫以稱意任職故久無有所匡諫於上官屬易之師古曰易輕也音弋豉反居位九歲以官卒贊曰公孫𢎞卜式兒寛皆以鴻漸之翼困於燕爵李竒曰漸進也鴻一舉而進千里者羽翼之材也𢎞等皆以大材初為俗所薄若燕爵不知鴻志也師古曰易漸卦上九爻辭曰鴻漸于陸其羽可以為儀鴻大鳥漸進也髙平曰陸言鴻進於陸以其羽翼為威儀也喻𢎞等皆有鴻之羽儀未進之時燕爵所輕也逺迹羊豕之間師古曰逺竄其迹也非遇其時焉能致此位乎師古曰焉於何也是時漢興六十餘載海内艾安師古曰艾讀曰乂府庫充實而四夷未賔制度多闕上方欲用文武求之如弗及師古曰恐失之始以蒲輪迎枚生見主父而歎息師古曰謂言公皆安在何相見之晩羣士慕嚮異人並出卜式拔於芻牧𢎞羊擢於賈豎衞青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已師古曰版築傅説也飯牛甯戚也已語終辭也飯音扶晩反漢之得人於茲為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯宋祁曰南本令作律文章則司馬遷相如滑稽則東方朔枚臯師古曰滑稽轉利之稱也滑亂也稽礙也言其變亂無留礙也一説稽考也言可滑亂不可考校也滑音骨稽音工奚反應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀師古曰紀記也是以興造功業制度遺文後世莫及孝宣承統纂脩洪業亦講論六蓺招選茂異而蕭望之梁邱賀夏侯勝韋𤣥成嚴彭祖尹更始以儒術進劉向王襃以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黄霸王成龔遂鄭𢎞召信臣師古曰召讀曰邵韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於世參其名臣亦其次也師古曰次於武帝時前漢書卷五十八前漢書卷五十八考證公孫𢎞傳公孫𢎞臣召南按史記云字季漢書于名字里居往往視史記加詳此文獨脱何也菑川薛人也顧炎武曰漢魯國有薛縣史記列傳齊菑川薛縣人也言齊又言菑川而薛並不屬二國殊不可曉正義曰表云菑川國文帝分齊置都劇括地志云故劇城在青州壽光縣南三十一里故薛城在徐州滕縣界按薛與劇隔兖州及泰山儒林傳言薛人公孫𢎞是𢎞審為薛人上言齊菑川者誤耳臣召南按顧説甚確但以本傳核之云牧豕海上惟菑川北近海若魯國之薛縣則東去海絶逺矣又云菑川國復推上𢎞史漢二文並合然則𢎞為薛人尚可疑而其為菑川人似無可疑也但薛縣屬魯不屬菑川則志可据耳談笑多聞史記作恢竒多聞其以髙成之平津鄉臣召南按志髙成縣屬勃海郡宋白曰滄州鹽山縣古髙成縣也有平津鄉又户六百五十表作三百七十三户表傳互異數年至宰相封侯通鑑考異曰史記將相名臣表漢書百官公卿表𢎞為相皆在元朔五年建元以來侯者表恩澤侯表皆云元朔三年封侯按三年𢎞始為御史大夫蓋誤書五為三因置于三年耳卜式傳使者曰茍子何欲臣召南按平凖書作茍如此子何欲而然此傳節去數字意似不了又按卜式始末本無足稱班氏但節取平凖書中數段為傳與食貨志複矣且賛語以式質直配汲黯尤覺不倫兒寛傳陛下躬發聖徳統楫羣元注師古曰虞書曰楫五瑞其字從木臣召南按師古解輯楫與集三字並同是也但虞書作輯五瑞其字從車未知師古所据何本前漢書卷五十八考證
