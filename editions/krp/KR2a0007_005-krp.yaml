body:
  text: 前漢書卷五漢蘭臺令史班固撰唐正議大夫行秘書少監瑯邪縣開國子顔師古注景帝紀第五孝景皇帝荀悅曰諱啓之字曰開應劭曰禮諡法布義行剛曰景文帝太子也母曰竇皇后後七年六月文帝崩丁未太子即皇帝位尊皇太后薄氏曰太皇太后皇后曰皇太后九月有星孛于西方元年冬十月詔曰蓋聞古者祖有功而宗有德應劭曰始取天下者為祖高帝稱高祖是也始治天下者為宗文帝稱太宗是也師古曰應說非也祖始也始受命也宗尊也有德可尊劉攽曰顔説非也始受命者稱太祖耳有功者亦稱祖商祖甲是也制禮樂各有由歌者所以發德也舞者所以明功也高廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎㑹諸侯廟中出金助祭所謂酎金也師古曰酎三重釀醇酒也味厚故以薦宗廟酎音直救反奏武德文始五行之舞孟康曰武德高祖所作也文始舜舞也五行周舞也武德者其舞人執干戚文始舞執羽籥五行舞冠冕衣服法五行色見禮樂志孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異逺方張晏曰孝文十二年除關不用傳令逺近若一除誹謗去肉刑賞賜長老收恤孤獨以遂羣生師古曰遂成也達也減耆欲不受獻師古曰耆讀曰嗜罪人不帑蘇林曰刑不及妻子師古曰帑讀與孥同不誅無罪不私其利也除宮刑出美人重絶人之世也朕既不敏弗能勝識師古曰敏材智速疾也勝識盡知之此皆上世之所不及而孝文皇帝親行之師古曰上世謂古昔之帝王也德厚侔天地利澤施四海師古曰侔等也音牟靡不𫉬福明象乎日月而廟樂不稱朕甚懼焉師古曰稱副也音尺孕反其為孝文皇帝廟為昭德之舞師古曰昭明也以明休德師古曰休美也然後祖宗之功德施于萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰師古曰申屠嘉陛下永思孝道立昭德之舞以明孝文皇帝之盛德皆臣嘉等愚所不及臣謹議世功莫大於高皇帝德莫盛於孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟張晏曰王及列侯嵗時遣使詣京師侍祠助祭如淳曰若光武廟在章陵南陽太守稱使者往祭是也不使侯王祭者諸侯不得祖天子凡臨祭宗廟皆為侍祭師古曰張説是也既云天子所獻祖宗之廟非謂郡國之廟也請宣布天下制曰可春正月詔曰間者嵗此不登民多乏食天絶天年朕甚痛之郡國或磽陿無所農桑􅌛畜師古曰磽謂磽埆瘠薄也陿謂褊隘也􅌛謂食養之畜謂牧放也磽音苦交反陿音狹􅌛古繫字或地饒廣薦草莽水泉利而不得徙如淳曰莊周云麋鹿食曰薦一曰草稠曰薦深曰莽劉攽曰注麋鹿食曰薦衍一曰字其議民欲徙寛大地者聽之夏四月赦天下賜民爵一級遣御史大夫青翟至代下與匈奴和親文頴曰姓嚴諱青翟臣瓉曰此陶青也莊青翟乃自武帝時人此紀誤師古曰後人傳習不曉妄増翟字耳非夲作紀之誤五月令田半租秋七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕師古曰帝以為當時律條吏受所監臨賂遺飲食即坐免官爵於法太重而受所監臨財物及賤買貴賣者論決太輕故令更議改之廷尉與丞相更議著令蘇林曰著音著幘之著師古曰蘇音非也著音著作之著音竹筯反廷尉信謹與丞相議曰師古曰丞相申屠嘉吏及諸有秩受其官屬所監所治所行所將師古曰行謂按察也音下更反其與飲食計償費勿論師古曰計其所費而償其直勿論罪也它物若買故賤賣故貴皆坐臧為盗没入臧縣官師古曰它物謂非飲食者吏遷徙免罷受其故官屬所將監治送財物奪爵為士伍免之李竒曰有爵者奪之使為士伍有位者免官也師古曰此説非也謂奪其爵令為士伍又免其官職即今律所謂除名也謂之士伍者言從士卒之伍也無爵罰金二斤令没入所受有能捕告卑其所受臧師古曰卑與也以所受之臧與捕告者也卑音必寐反二年冬十二月有星孛于西南令天下男子年二十始傅師古曰舊法二十三今此二十更為異制也傅讀曰附解在髙紀春三月立皇子德為河間王閼為臨江王師古曰閼音一曷反餘為淮陽王非為汝南王彭祖為廣川王發為長沙王夏四月壬午太皇太后崩服䖍曰文帝母薄太后也六月丞相嘉薨封故相國蕭何孫係為列侯師古曰係音胡計反秋與匈奴和親三年冬十二月詔曰襄平侯嘉晉灼曰紀通子也功臣表襄平侯紀通以父功侯孝景三年康侯相夫嗣推其封薨正與此合豈更名嘉乎子恢説不孝謀反欲以殺嘉大逆無道晉灼曰恢説言嘉知反情而實不知也師古曰此解非也恢説有私怨於其父而自謀反欲令其父坐死也說讀曰悦其赦嘉為襄平侯及妻子當坐者復故爵如淳曰律大逆不道父母妻子同産皆棄市今赦其餘子不與恢説謀者復其故爵論恢說及妻子如法春正月淮陽王宮正殿災吳王濞膠西王卬楚王戊趙王遂濟南王辟光師古曰辟音璧又音闢其義两通菑川王賢膠東王雄渠皆舉兵反大赦天下遣太尉亞夫師古曰周亞夫大將軍竇嬰將兵擊之斬御史大夫晁錯以謝七國晉灼曰錯音錯置之錯師古曰晁古朝字二月壬子晦日有蝕之諸將破七國斬首十餘萬級追斬吳王濞於丹徒膠西王卬楚王戊趙王遂濟南王辟光菑川王賢膠東王雄渠皆自殺夏六月詔曰廼者吳王濞等為逆起兵相脅詿誤吏民吏民不得巳師古曰巳止也言不得止而從之非本心也今濞等巳滅吏民當坐濞等及逋逃亡軍者皆赦之楚元王子蓺等與濞等為逆師古曰蓺音藝朕不忍加法除其籍毋令汙宗室立平陸侯劉禮為楚王續元王後孟康曰禮元王子也立皇子端為膠西王勝為中山王賜民爵一級四年春復置諸關用傳出入應劭曰文帝十二年除關無用傳至此復用傳以七國新反備非常夏四月己巳立皇子榮為皇太子徹為膠東王六月赦天下賜民爵一級秋七月臨江王閼薨十月戊戌晦日有蝕之劉攽曰此年記事十月在年終誤五年春正月作陽陵邑張晏曰景帝作壽陵起邑夏募民徙陽陵賜錢二十萬遣公主嫁匈奴單于六年冬十二月雷霖兩秋九月皇后薄氏廢七年冬十一月庚寅晦日有蝕之春正月廢皇太子榮為臨江王二月罷太尉官夏四月乙巳立皇后王氏丁巳立膠東王徹為皇太子賜民為父後者爵一級中元年夏四月赦天下賜民爵一級封故御史大夫周苛周昌孫子為列侯師古曰封苛之孫及昌之子也苛昌皆嘗為御史大夫而從昆弟也故總言之二年春二月令諸侯王薨列侯初封及之國大鴻臚奏諡誄策應劭曰皇帝延諸侯王賔王諸侯皆屬大鴻臚故其薨奏其行迹賜與諡及哀策誄文也臣瓉曰景帝此年已置大鴻臚而百官表云武帝太初元年更以大行為大鴻臚與此錯師古曰誄者述累德行之文音力水反列侯薨及諸侯太傅初除之官大行奏諡誄策如淳曰凡言除者除故官就新官也晉灼曰禮有大行人小行人主諡官故以此名之臣瓉曰大行是官名掌九儀之制以賔諸侯者師古曰大鴻臚者夲名典客後改曰大鴻臚大行令者夲名行人即典客之屬官也後改曰大行令故事之尊重者遣大鴻臚而輕賤者遣大行也據此紀文則景帝已改典客為大鴻臚改行人為大行矣而百官公卿表乃云景帝中六年更名典客為大行令武帝太初元年更名大行令為大鴻臚更名行人為大行令當是表誤劉攽曰史記文景事最略漢書則頗有所録蓋班氏博采他書成之故於景帝世謂典客為大鴻臚行人為大行由它書即武帝時官紀景帝世事班氏失於改革耳然則改諸官名在武帝世無疑非表誤也顔氏所疑下文光禄大夫亦景帝所改乎劉敞曰按景十三王傳河間獻王薨猶云大行令奏諡則非表誤也但官名改易未定故史於此追舉最後官名耳武帝初大行王恢李息即大行令也王薨遣光禄大夫弔襚祠賵應劭曰衣服曰禭祠飲食也車馬曰賵師古曰襚音遂賵音芳鳯反視喪事因立嗣子列侯薨遣太中大夫弔祠視喪事因立嗣其薨葬國得發民輓喪穿復土治墳無過三百人畢事師古曰輓謂引車也畢事畢𦵏事也輓音晚匈奴入燕改磔曰棄市應劭曰先此諸死刑皆磔於市今改曰棄市自非妖逆不復磔也師古曰磔謂張其尸也棄市殺之於市也謂之棄市者取刑人於市與衆棄之也磔音竹客反勿復磔三月臨江王榮坐侵太宗廟地徴詣中尉自殺夏四月有星孛于西北立皇子越為廣川王寄為膠東王秋七月更郡守為太守郡尉為都尉師古曰更謂改其號九月封故楚趙傅相内史前死事者四人子文頴曰楚相張尚太傅趙夷吾趙相建德内史王悍此四人各諫其王無使反不聼皆殺之故封其子皆為列侯甲戌晦日有蝕之三年冬十一月罷諸侯御史大夫官師古曰所以抑損其權春正月皇太后崩文頴曰景帝母竇太后以帝崩後六年乃亡凡立五十一年武帝建元六年崩今此言皇太后崩誤耳孟康曰此太后崩史記無也臣瓉曰王楙云景帝薄后以此年死疑是也當言廢后而言太后誤也師古曰孟説是也廢后死不書又不言崩瓉説為謬夏旱禁酤酒師古曰酤謂賣酒也音工䕶反秋九月蝗有星孛于西北戊戌晦日有蝕之立皇子乗為清河王四年春三月起德陽宮臣瓉曰是景帝廟也帝自作之諱不言廟故言宮西京故事云景帝廟為德陽御史大夫綰奏禁馬高五尺九寸以上齒未平不得出關服虔曰綰衞綰也馬十嵗齒下平夏蝗秋赦徒作陽陵者死罪欲腐者許之蘇林曰宮刑其創腐臭故曰腐也如淳曰腐宮刑也丈夫割埶不能復生子如腐木不生實師古曰如説是腐音輔十月戊午日有蝕之劉攽曰此年紀事十月在年終亦誤五年夏立皇子舜為常山王六月赦天下賜民爵一級秋八月己酉未央宮東闕災更名諸侯丞相為相師古曰亦所以抑黜之令異於漢朝九月詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周師古曰比音頻寐反以苛為察以刻為明令亡罪者失職朕甚憐之師古曰職常也失其常理也有罪者不伏罪姦法為暴甚亡謂也諸獄疑若雖文致於法而於人心不厭者輒讞之師古曰厭服也音一贍反讞平議也音魚列反六年冬十月行幸雍郊五畤十二月改諸官名定鑄錢偽黃金棄市律應劭曰文帝五年聽民放鑄律尚未除先時多作偽金偽金終不可成而徒損費轉相誑燿窮則起為盗賊故定其律也孟康曰民先時多作偽金故其語曰金可作世可度費損甚多而終不成民亦稍知其意犯者希因此定律也師古曰應説是春三月兩雪師古曰雨音于具反夏四月梁王薨分梁為五國立孝王子五人皆為王五月詔曰夫吏者民之師也車駕衣服宜稱師古曰稱其官也音尺孕反吏六百石以上皆長吏也張晏曰長大也六百石位大夫亡度者或不吏服出入閭里與民亡異令長吏二千石車朱兩轓應劭曰車耳反出所以為之藩屏翳塵泥也二千石雙朱其次乃偏其左䡊以簟為之或用革如淳曰轓音反小車两屏也師古曰據許慎李登説轓車之蔽也左氏傳云以藩載欒盈即是有鄣蔽之車也言車耳反出非矣轓音甫元反䡊音方逺反千石至六百石朱左轓車騎從者不稱其官衣服下吏出入閭巷亡吏體者二千石上其官屬三輔舉不如法令者應劭曰京兆尹左馮翊右扶風共治長安城中是為三輔師古曰時未有京兆馮翊扶風之名此三輔者謂主爵中尉及左右内史也應説失之劉攽曰此文参錯不序又曰武帝時改主爵中尉為右扶風主爵中尉初不治民也自武帝以歬治民者惟左右内史此時亦未有三輔此紀文誤耳皆上丞相御史請之先是吏多軍功車服尚輕故為設禁又惟酷吏奉憲失中廼詔有司減笞法定箠令語在刑法志師古曰箠音止蘂反六月匈奴入鴈門至武泉入上郡取苑馬如淳曰漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬疋師古曰武泉雲中之縣也養鳥獸者通名為苑故謂牧馬處為苑吏卒戰死者二千人秋七月辛亥晦日有蝕之後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失師古曰假令讞訖其理不當所讞之人不為罪失欲令治獄者務先寛三月赦天下賜民爵一級中二千石諸侯相爵右庶長如淳曰雖有尊官未必有高爵故數有賜爵師古曰右庶長第十一爵也夏大酺五日民得酤酒五月地震秋七月乙巳晦日有蝕之條侯周亞夫下獄死二年冬十月省徹侯之國晉灼曰文紀遣列侯之國今省之師古曰省音所領反春匈奴入鴈門太守馮敬與戰死發車騎材官屯師古曰屯鴈門春以嵗不登禁内郡食馬粟没入之師古曰食讀曰飤没入者沒入其馬夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也應劭曰纂今五采屬綷是也組者今綬紛絛是也臣瓉曰許慎云纂赤組也師古曰瓉説是也綷㑹也㑹五采者今謂之錯綵非纂也紅讀曰功綷音子内反絛音它牢反農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減太官省繇賦師古曰省音所領反繇讀曰傜欲天下務農蠶素有畜積以備災害師古曰畜讀曰蓄彊毋攘弱衆毋暴寡師古曰攘取也音人羊反老耆以壽終幼孤得遂長師古曰遂成也今嵗或不登民食頗寡其咎安在或詐偽為吏張晏曰以詐偽人為吏也臣瓉曰律所謂矯枉以為吏者也師古曰二説並非也直謂詐自稱吏耳吏以貨賂為市漁奪百姓侵牟萬民李竒曰牟食苗根蟲也侵牟食民比之蛑賊也師古曰漁言若漁獵之為也縣丞長吏也姧法與盗盗甚無謂也李斐曰姧法因法作姧也文頴曰與盗謂盗者當治而知情反佐與之是則共盗無異也師古曰與盗盗者共盗為盗耳其令二千石各脩其職不事官職耗亂者丞相以聞請其罪師古曰耗不明也讀與眊同音莫報反布告天下使明知朕意五月詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也其唯廉士寡欲易足今訾算十以上廼得官服䖍曰訾萬錢算百二十七也應劭曰古者疾吏之貪衣食足知榮辱限訾十算廼得為吏十算十萬也賈人有財不得為吏廉士無訾又不得官故減訾四算得官矣師古曰訾讀與貲同他皆類此廉士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官亡令廉士久失職貪夫長利師古曰長利長𫉬其利秋大旱三年春正月詔曰農天下之本也黄金珠玉饑不可食寒不可衣以為幣用不識其終始師古曰幣者所以通有無易貴賤也閒嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物師古曰樹殖也吏發民若取庸采黄金珠玉者坐臧為盗韋昭曰發民用其民取庸用其資以顧庸二千石聽者與同罪皇太子冠賜民為父後者爵一級甲子帝崩于未央宮臣瓉曰帝年三十二即位即位十六年壽四十八遺詔賜諸侯王列侯馬二駟師古曰八匹也吏二千石黃金二斤吏民户百錢出宮人歸其家復終身師古曰復音方目反二月癸酉葬陽陵臣瓉曰自崩及葬凡十日陽陵在長安東北四十五里賛曰孔子稱斯民三代之所以直道而行也師古曰此論語載孔子之辭也言此今時之人亦夏殷周之所馭以政化淳壹故能直道而行傷今不然信哉周秦之敝㒺密文峻而姦軌不勝師古曰不可勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之閒至於移風易俗黎民醇厚師古曰黎衆也醇不澆雜周云成康漢言文景美矣劉攽曰景紀以御史大夫陶青為青翟襄平侯相夫為嘉又言官有大鴻臚光禄大夫又令三輔舉不如令者又載皇太后崩皆其錯悞者不知班氏之謬或後世亡其書有追補之者前漢書卷五前漢書卷五考證景帝紀五月令田半租臣召南按史記除田半租此文令田半租以文帝十三年盡除田租至此年始復收其半租也長吏二千石車朱两轓吏訛史從宋本改前漢書卷五考證
