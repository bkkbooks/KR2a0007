body:
  text: 前漢書卷六十五漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注東方朔傳第三十五東方朔字曼倩師古曰倩音千見反平原厭次人也師古曰高祖功臣表有厭次侯爰類是則厭次之名也其來久矣而說者乃云後漢始為縣於此致疑斯未通也厭音一渉反又音一琰反武帝初即位徵天下舉方正賢良文學材力之士待以不次之位師古曰不拘常次言超擢之四方士多上書言得失自衒鬻者以千數師古曰衒行賣也鬻亦賣也衒音州縣之縣又音工縣反其不足采者輒報聞罷師古曰報云天子已聞其所上之書而罷之令歸朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用如淳曰貧子冬日乃得學書言文史之事足可用也宋祁曰十二景本作十三十五學擊劍十六學詩書師古曰擊劍遙擊而中之非斬刺也劉敞曰擊劍今有此戲非遙擊也誦二十二萬言十九學孫吳兵法戰陣之具鉦鼔之教師古曰鉦鼔所以為進退士衆之節也鉦音征亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言服䖍曰無宿諾劉攽曰子路之言可使有勇者劉敞曰既曰子路之言則無宿諾者非子路之言也臣朔年二十二長九尺三寸目若懸珠齒若編貝師古曰編列次也音鞭勇若孟賁師古曰孟賁衛人古之勇士也尸子說云人謂孟賁生乎曰勇貴乎曰勇富乎曰勇三者人之所難而皆不足以易勇故能懾三軍服猛獸也㨗若慶忌師古曰王子慶忌也射之矢滿把不能中駟馬追不能及也亷若鮑叔師古曰齊大夫也與管仲分財自取其少而說者乃妄解云鮑焦非也焦自介士耳信若尾生師古曰尾生古之信士與女子期於橋下待之不至遇水而死一曰即微生髙也若此可以為天子大臣矣臣朔昧死再拜以聞朔文辭不遜髙自稱譽上偉之師古曰以為大竒也令待詔公車師古曰公車令屬衛尉上書者所詣也奉禄薄未得省見師古曰不被省納不得見天子也奉音扶用反其下並同久之朔紿騶朱儒文頴曰朱儒之為騶者也師古曰朱儒短人也騶本廐之御騶也後以為騎謂之騶騎宋祁曰一本改本作奉曰上以若曹無益於縣官師古曰若女也曹軰也耕田力作固不及人臨衆處官不能治民從軍擊虜不任兵事無益於國用徒索衣食如淳曰索盡也師古曰音先各反下云索長安米亦同也今欲盡殺若曹朱儒大恐啼泣宋祁曰啼當删王本作號朔教曰上即過叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死臣言可用幸異其禮不可用罷之無令但索長安米上大笑因使待詔金馬門稍得親近上嘗使諸數家射覆師古曰數家術數之家也於覆器之下而置諸物令闇射之故云射覆數音所具反覆音芳目反置守宫盂下射之皆不能中師古曰守宫蟲名也術家云以器養之食以丹砂滿七斤擣治萬杵以㸃女子體終身不滅若有房室之事則滅矣言可以防閑滛逸故謂之守宫也今俗呼為辟宫辟亦禦扞之義耳盂食器也若􅀢而大今之所謂􅀢盂也􅀢音撥劉攽曰守宫生屋壁如守宫然故名之何在防滛逸也一蟲之微何能食丹砂七斤人亦安肯捐七斤丹砂以餌一蟲也朔自賛曰臣嘗受易請射之師古曰賛進也廼别蓍布卦而對曰師古曰别分也音彼列反臣以為龍又無角謂之為虵又有足跂跂脈脈善縁壁是非守宫即蜥蜴師古曰跂跂行貌也脈脈視貌也爾雅云蠑螈蜥蝪蝘蜓守宫是則一類耳揚雄方言云其在澤中者謂之蜥蜴故朔曰是非守宫則蜥蜴也蜥音先歴反蜴音余赤反蠑音榮螈音原蝘音烏典反蜓音殄劉敞曰守宫即人家屋壁中蝘蜓俗呼為蝎虎者是也此物唯在屋壁窻户間夜亦出盖用此得名耳術家之說安有此理師古乃信之何哉宋祁曰角音盧谷反獸不童也上曰善賜帛十匹復使射他物連中輒賜帛師古曰中音竹仲反其下並同時有幸倡郭舎人滑稽不窮師古曰幸倡倡優之見幸遇者也滑音骨滑稽解在公孫宏傳常侍左右曰朔狂幸中耳非至數也師古曰至實也臣願令朔復射朔中之臣榜百朔不能中臣賜帛師古曰榜擊也音歩行反廼覆樹上寄生令朔射之朔曰是窶數也蘇林曰窶音貧窶之窶數音數錢之數窶數鉤灌四股鉤也師古曰窶數戴器也以盆盛物戴於頭者則以窶數薦之今賣白團餅人所用者是也寄生者芝菌之類淋潦之日著樹而生形有周圜象窶數者今關中俗亦呼為寄生非為蔦之寄生寓木宛童有枝葉者也故朔云著樹為寄生盆下為窶數明其常在盆下今讀書者不曉其意謂射覆之物覆在盆下輒改前覆守宫盂下為盆字失之逺矣楊惲傳云䑕不容穴銜窶數也盆下之物有飲食氣故䑕銜之四股鐵鉤非所銜也宋祁曰數音藪景本作藪舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶數上令倡監榜舍人舍人不勝痛呼謈服䖍曰謈音暴鄧展曰呼音髐箭之髐謈音𤓰瓝之瓝師古曰鄧音是也痛切而叫呼也與田蚡傳呼報音義皆同一曰鄧音近之謈自寃痛之聲也舍人榜痛乃呼云謈今人痛甚則稱阿謈音歩高反是故朔逐韻而謿之云口無毛聲謷謷也劉敞曰若不縁寄生在盆下何得曰窶數前覆守宫自以盂此以盆何怪乎不然盂亦盆類朔故詭言之欲以誤郭舍人也又曰朔意盖以寄生窶數皆是附著他物而得名故謂今在盆下之寄生為窶數大物在盆下小物在盂下固可知也但不當改前盂字為盆爾又不必一日之中用一盂覆射此諸物也顔說未通又以寄生為芝菌形圜似窶數而云非寓木尤疎謬矣宋祁曰呼報當作呼服朔笑之曰咄口無毛聲謷謷凥益髙鄧展曰咄音豽裘之豽也師古曰咄叱咄之聲也音丁骨反鄧說非也謷音敖舍人恚曰朔擅詆欺天子從官當棄市師古曰詆毁辱也音丁禮反上問朔何故詆之對曰臣非敢詆之廼與為隠耳師古曰隠謂隠語也上曰隠云何朔曰夫口無毛者狗竇也聲謷謷者烏哺鷇也韋昭曰凡烏哺子而活者為鷇生而自啄曰雛師古曰鷇音口豆反劉攽曰狗竇文不全明少一字當云狗穴竇也縁兩穴相重遂誤爾凥益高者鶴俛啄也師古曰俛即俯字也俯低也啄鳥觜也俛又音免啄音竹救反舍人不服因曰臣願復問朔隠語不知亦當榜即妄為諧語曰師古曰諧者和韻之言也令壺齟老柏塗伊優亞狋吽牙何謂也張晏曰齟音樝棃之樝應劭曰狋音銀師古曰齟音側加反又音壯加反塗音丈加反優音一侯反亞音烏加反狋音五伊反吽音五侯反朔曰令者命也壺者所以盛也師古曰盛受物也音時政反齟者齒不正也老者人所敬也柏者鬼之廷也師古曰言鬼神尚幽闇故以松柏之樹為廷府塗者漸洳徑也師古曰漸洳浸溼也漸音子亷反洳音人庶反伊優亞者辭未定也狋吽牙者兩犬爭也舍人所問朔應聲輒對變詐鏠出莫能窮者左右大驚上以朔為常侍郎遂得愛幸久之伏日師古曰三伏之日也解在郊祀志詔賜從官肉大官丞日晏不來師古曰晏晩也朔獨拔劍割肉謂其同官曰伏日當蚤歸師古曰蚤古早字請受賜即懐肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也劉攽曰而去之何也之衍字朔免冠謝上曰先生起自責也朔再拜曰朔來朔來受賜不待詔何無禮也拔劍割肉壹何壯也割之不多又何亷也歸遺細君又何仁也師古曰細君朔妻之名一說細小也朔輒自比於諸侯謂其妻曰小君上笑曰使先生自責廼反自譽復賜酒一石肉百斤歸遺細君初建元三年微行始出北至池陽西至黄山晉灼曰宫名在槐里南獵長楊東游宜春師古曰宜春宫也在長安城東南說者乃以為在鄠非也在鄠者自是宜春觀耳在長安城西豈得言東游也微行常用飲酎已師古曰酎酒新熟以祭宗廟也酎音紂解在景紀八九月中與侍中常侍武騎及待詔隴西北地良家子能騎射者期諸殿門故有期門之號自此始微行以夜漏下十刻廼出常稱平陽侯如淳曰平陽侯曹壽尚帝姊時見尊寵故稱之旦明入山下騎射鹿豕狐兎手格熊羆馳騖木稼稻秔之地師古曰稻有芒之榖總稱也秔其不黏者也音庚民皆號呼罵詈師古曰呼音火故反相聚㑹自言鄠杜令令往欲謁平陽侯諸騎欲擊鞭之令大怒使吏呵止獵者數騎見留廼示以乘輿物久之廼得去時夜出夕還後齎五日糧會朝長信宫師古曰五日一朝長信宫故齎五日糧也長信太后之宮也上大驩樂之是後南山下乃知微行數出也然尙迫於太后未敢逺出丞相御史知指師古曰指謂天子之意也乃使右輔都尉徼循長楊以東師古曰徼遮繞也循行視也戒備非常也徼音工釣反右内史發小民共待會所師古曰共讀曰供後廼私置更衣師古曰為休息易衣之處亦置宫人劉敞曰更衣休息處爾非必有宫人也史文自無之後傳田延年起至更衣然則貴賤同此名也從宣曲以南十二所中休更衣師古曰宣曲宫名在昆明池西投宿諸宮師古曰晝休更衣夜則别宿於諸宫長楊五柞倍陽宣曲尤幸師古曰倍陽即萯陽也其音同耳宫名在鄠縣也於是上以為道逺勞苦又為百姓所患廼使太中大夫吾丘壽王與待詔能用筭者二人舉籍阿城以南師古曰舉計其數而為簿籍也阿城本秦阿房宫也以其牆壁崇廣故俗呼為阿城盩厔以東宜春以西提封頃畝及其賈直師古曰提封亦謂提舉四封之内總計其數也賈讀曰價欲除以為上林苑屬之南山師古曰屬連也音之欲反又詔中尉左右内史表屬縣草田欲以償鄠杜之民師古曰時未為京兆馮翊扶風故云中尉及左右内史也草田謂荒田未耕墾也吾丘壽王奏事上大說稱善師古曰說讀曰悅時朔在傍進諫曰臣聞謙遊靜慤天表之應應之以福師古曰慤謹也音口角反宋祁曰遊當作遜驕溢靡麗天表之應應之以異今陛下累郎臺恐其不高也師古曰郎堂下周屋弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎師古曰中尉及左右内史則為三輔矣非必謂京兆馮翊扶風也學者疑此言為後人所増斯未達也奢侈越制天為之變上林雖小臣尙以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西服䖍曰商與上雒二縣也師古曰汧汧水也隴隴坻也厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地師古曰髙平曰陸關中地高故稱陸耳海者萬物所出言關中山川物産饒富是以謂之陸海也秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原師古曰原本也言說不能盡其根本此百工所取給萬民所卬足也師古曰卬音牛向反又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多䵷魚師古曰芋草名其葉似藕荷而長不圓其根正白可食䵷即蛙字也似蝦蟆而小長脚盖人亦取食之貧者得以人給家足無饑寒之憂故酆鎬之間號為土膏其賈畝一金師古曰賈讀曰價今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖師古曰耗减也音呼到反是其不可一也且盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之虛師古曰虚讀曰墟又壊人冢墓發人室廬令幼弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之師古曰斥却也騎馳東西車騖南北師古曰亂馳曰騖又有深溝大渠夫一日之樂不足以危無隄之輿蘇林曰隄限也輿乘輿也無限若言不訾也不敢斥天子故言輿也張晏曰一日之樂謂田獵也無隄之輿謂天子富貴無隄限也師古曰張說是也隄音丁奚反劉敞曰不足以危不字當作亦隄猶防也言車輿馳騁不為防慮必有顛虞之變是其不可三也故務苑囿之大不恤農時非所以彊國富人也夫殷作九市之宫而諸侯畔應劭曰紂於宫中設九市靈王起章華之臺而楚民散師古曰楚靈王作章華之臺納亡人以實之卒有乾谿之禍也章華臺在華容城也秦興阿房之殿而天下亂糞土愚臣忘生觸死師古曰忽忘其生而觸死罪也逆盛意犯隆指罪當萬死不勝大願願陳泰階六符孟康曰泰階三台也每台二星凡六星符六星之符驗也應劭曰黄帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庶人三階平則隂陽和風雨時社稷神祗咸獲其宜天下大安是為太平三階不平則五神乏祀日有食之水潤不浸稼穡不成冬雷夏霜百姓不寧故治道傾天子行暴令好興甲兵修宫榭廣苑囿則上階為之奄奄疏闊也以孝武皆有此事故朔為陳之宋祁曰奄奄當作奢奢以觀天變不可不省是日因奏泰階之事上廼拜朔為太中大夫給事中賜黄金百斤然遂起上林苑如壽王所奏云久之隆慮公主子昭平君師古曰慮音廬尙帝女夷安公主隆慮主病因以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫内官服䖍曰主傅主之官也如淳曰禮有傅姆說者又曰傅者老大夫也漢使中行說傅翁主也師古曰傅姆是也服說失之内官署名解在律歴志以公主子廷尉上請請論師古曰論决其罪也左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我師古曰老乃有子言其晩孕育也屬音之欲反於是為之垂涕歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入高廟乎又下負萬民廼可其奏哀不能自止左右盡悲朔前上壽曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩師古曰周書洪範之辭也蕩蕩平坦之貌此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歳壽上廼起入省中夕時召讓朔師古曰讓責也少宋祁曰夕當作曰傳曰時然後言人不厭其言師古曰論語稱孔子問公叔文子於公明賈曰信乎夫子不言不笑不取乎對曰夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取今先生上壽時乎師古曰言所上壽豈謂時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則陰損隂陽變則心氣動心氣動則精神散精神散而邪氣及銷憂者莫若酒臣朔所以上壽者明陛下正而不阿因以止哀也愚不知忌諱當死先是朔嘗醉入殿中小遺殿上師古曰小遺者小便也宋祁曰注文者下當添遺字劾不敬有詔免為庶人待詔宦者署因此對復為中郎賜帛百匹初帝姑館陶公主號竇太主如淳曰竇太后之女也故曰竇太主也堂邑侯陳午尙之午死主寡居年五十餘矣近幸董偃始偃與母以賣珠為事偃年十三隨母出入主家左右言其姣好師古曰姣美麗也音狡主召見曰吾為母養之因留第中教書計相馬御射師古曰計謂用筭也頗讀傳記至年十八而冠出則執轡入則侍内為人温柔愛人以主故諸公接之名稱城中號曰董君主因推令散財交士令中府曰師古曰中府掌金帛之藏宋祁曰之藏下姚本添者也董君所發一日金滿百斤錢滿百萬帛滿千匹乃白之師古曰言不滿此數者皆恣與之安陵爰叔者爰盎兄子也與偃善謂偃曰足下私侍漢主挾不測之罪将欲安處乎師古曰不測者言其深也安處何以自安處也一曰身挾大罪廼欲自安而居處者乎偃懼曰憂之久矣不知所以師古曰以用也不知用何計也爰叔曰顧城廟逺無宿宫又有萩竹籍田如淳曰其間雖有地皆有萩竹籍田無可作宿觀也師古曰如說非也萩即楸字也言有楸樹及竹林可遊玩而籍田所在上又須躬親行事當有宿宫故宜獻此園劉攽曰城改成足下何不白主獻長門園如淳曰竇太主園在長門長門在長安城東南園可以為宿館處所故獻之此上所欲也如是上知計出於足下也則安枕而卧長無慘怛之憂久之不然上且請之於足下何如偃頓首曰敬奉教入言之主主立奏書獻之上大說師古曰說讀曰悅更名竇太主園為長門宫主大喜使偃以黄金百斤為爰叔壽叔因是為董君畫求見上之策令主稱疾不朝上往臨疾問所欲主辭謝曰妾幸䝉陛下厚恩先帝遺德奉朝請之禮備臣妾之使師古曰請音才姓反宋祁曰使景本作儀列為公主賞賜邑入師古曰既别得賞賜又所食之邑入其租賦也隆天重地死無以塞責師古曰塞補也一日卒有不勝洒掃之職師古曰卒讀曰猝洒音信又音山豉反先狗馬填溝壑竊有所恨不勝大願願陛下時忘萬事養精游神從中掖庭回輿枉路臨妾山林應劭曰公主園中有山謙不敢稱第故託山林也服䖍曰主所豫作廟陵故曰山林師古曰山林應說是也不當請帝臨其冢墓也得獻觴上壽娛樂左右如是而死何恨之有上曰主何憂幸得愈恐羣臣從官多大為主費上還有頃主疾愈起謁上以錢千萬從主飲後數日上臨山林主自執宰敝膝師古曰為賤者之服劉攽曰執當作服道入登階就坐坐未定上曰願謁主人翁主廼下殿去簮珥師古曰珥珠玉飾耳者也音餌徒跣頓首謝曰妾無狀師古曰狀形貌也無狀猶言無顔面以見人也一曰自言所行醜惡無善狀負陛下身當伏誅陛下不致之法頓首死罪有詔謝主簮履起之東箱自引董君師古曰之往也董君綠幘傅韝應劭曰宰人服也韋昭曰韝形如射韝以縳左右手於事便也師古曰緑幘賤人之服也傅著也韝即今之臂韝也傅讀曰附韝音工侯反隨主前伏殿下主廼賛師古曰賛進也進傳謁辭館陶公主胞人臣偃昧死再拜謁師古曰胞與庖同因叩頭謝上為之起有詔賜衣冠上師古曰上上坐劉敞曰賜衣冠上上者上殿偃起走就衣冠主自奉食進觴當是時董君見尊不名稱為主人翁飲大驩樂主廼請賜将軍列侯從官金錢雜繒各有數於是董君貴寵天下莫不聞郡國狗馬蹵鞠劍客輻凑師古曰蹵音千六反鞠音鉅六反解在蓺文志董氏常從游戲北宫馳逐平樂觀雞鞠之會角狗馬之足師古曰角猶校也劉敞曰董氏當屬上句上大歡樂之於是上為竇太主置酒宣室使謁者引内董君是時朔陛㦸殿下師古曰持㦸立陛側辟㦸而前曰師古曰辟音頻亦反董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋方積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務師古曰右尊之也盡狗馬之樂極耳目之欲行邪枉之道徑滛辟之路師古曰徑由也辟讀曰僻是乃國家之大賊人主之大蜮也師古曰蜮魅也音或說者以為短狐非也短狐射工耳於此不當其義今俗猶云魅蜮也劉攽曰劉向說春秋蜮南方滛氣所生以應哀姜然則朔正用指偃爾何必遷就魅蜮也宋祁曰姚本句末無也字偃為滛首其罪三也昔伯姬燔而諸侯憚應劭曰憚敬也敬其節直也師古曰伯姬宋恭姬也遇火災待姆不出而死也奈何乎陛下上黙然不應良久曰吾業以設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為簒是以豎貂為滛而易牙作患師古曰豎貂易牙皆齊桓公臣也管仲有病桓公往問之曰將何以教寡人管仲曰願君之逺易牙豎貂公曰易牙亨其子以快寡人尚可疑邪對曰人之情非不愛其子其子之忍又將何有於君公曰豎貂自宮以近寡人猶可疑邪對曰人之情非不愛其身也其身之忍又將何有於君公曰諾管仲死盡逐之而公食不甘宮不治居三年公曰仲父不亦過乎於是皆復召即反之明年公有病易牙豎貂相與作亂塞宫門築髙牆不通人有一婦人踰垣入至公所公曰我欲食婦人曰吾無所得又曰我欲飲婦人曰吾無所得公曰何故對曰易牙豎貂相與作亂塞宫門築高牆不通人故無所得公慨然歎涕出曰嗟乎聖人所見豈不逺哉若死者有知我將何面目見仲父乎蒙衣袂而絶乎壽宫蟲流出於户盖以楊門之扉三月不葬慶父死而魯國全師古曰慶父魯桓公子莊公弟也莊公薨慶父殺荘公之子閔公而欲作亂不克奔莒其後僖公立以賂求之于莒莒人歸之及宻乃縊而死僖公乃定其位管蔡誅而周室安上曰善有詔止更置酒北宮引董君從東司馬門東司馬門更名東交門蘇林曰以偃從此門入交㑹於内故以名焉賜朔黄金三十斤董君之寵由是日衰至年三十而終後數歳竇太主卒與董君會葬於覇陵是後公主貴人多踰禮制自董偃始時天下侈靡趨末師古曰趨讀曰趣末謂工商之業百姓多離農畆上從容問朔吾欲化民豈有道乎師古曰從音千容反朔對曰堯舜禹湯文武成康上古之事經歴數千載尙難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈師古曰弋黑色也綈厚繒音徒奚反足履革舄師古曰革生皮也不用柔韋言儉率也以韋帶劍師古曰但空用韋不加飾莞蒲為席師古曰莞夫離也今謂之葱蒲以莞及蒲為席亦尚質也莞音完又音官兵木無刃服䖍曰兵器如木而無刃言不大治兵器也衣緼無文師古曰緼亂絮也言内有亂絮上無文綵也緼音於粉反集上書囊以為殿帷師古曰集謂合聚也以道徳為麗以仁義為凖師古曰麗大也凖平法也於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳯闕右神明如淳曰闕名也師古曰鳯闕闕名神明臺名也號稱千門萬户木土衣綺繡狗馬被繢罽師古曰繢五綵也罽織毛也即今氍毹之屬是也宮人簮瑇瑁垂珠璣師古曰瑇瑁文甲也璣珠之不圜者瑇音代瑁音昧璣音居依反又音鉅依反設戲車教馳逐飾文采樷珍怪師古曰樷古藂字也撞萬石之鐘擊雷霆之鼓師古曰言其聲震大也作俳優舞鄭女上為滛侈如此而欲使民獨不奢侈失農事之難者也師古曰失農謂失農業也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢應劭曰帳多故以甲乙第之耳孟康曰西域傳賛云興造甲乙之帳絡以隨珠和璧天子襲翠被憑玉几而處其中也師古曰謂推而去之燔焚燒也却走馬示不復用師古曰却退也走馬善走之馬也則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里師古曰今易無此文已解於上也願陛下留意察之朔雖詼笑師古曰詼謿戲也詼笑謂謿謔發言可笑也詼音恢其下詼啁詼諧並同然時觀察顔色直言切諫上常用之自公卿在位朔皆敖弄無所為屈師古曰敖讀曰傲為音于偽反上以朔口諧辭給師古曰給㨗也好作問之師古曰故動作之而問以言辭也嘗問朔曰先生視朕何如主也朔對曰自唐虞之隆成康之際未足以諭當世臣伏觀陛下功德陳五帝之上在三王之右師古曰右亦高上也非若此而已誠得天下賢士公卿在位咸得其人矣譬若以周邵為丞相師古曰周公旦邵公奭二人也孔丘為御史大夫應劭曰御史大夫職典制度文章太公為將軍師古曰太公吕望也知戰陳征伐之事故云為将軍畢公高拾遺於後師古曰畢公髙文王之子也為周太師故云拾遺也弁嚴子為衛尉師古曰以有勇臯陶為大理師古曰以其作士士亦理官后稷為司農師古曰主播種伊尹為少府應劭曰伊尹善亨割大官屬少府故令作之子贛使外國師古曰以其有辯說顔閔為博士師古曰顔囘閔子騫為皆有徳行也子夏為太常師古曰以有文學故為太常也而應劭以子夏兩字總合為䕫解云䕫知樂故可以為太常此説非也劉攽曰作䕫字乃是益為右扶風應劭曰益作舜虞掌山澤之官也諸苑多在右扶風故令作之季路為執金吾師古曰亦以冇勇力契為鴻臚應劭曰卨作司徒敬敷五教是時諸侯王治民鴻臚主諸侯王也師古曰契讀與卨同字本作偰盖後從省耳龍逢為宗正師古曰闗龍逢桀之臣也忠諫而死也以其直無所阿私伯夷為京兆應劭曰帝曰伯夷汝作秩宗秩宗主郊廟京兆與太常同典齋祀故令為之管仲為馮翊應劭曰管仲定民之居寄軍令於内政終令匡霸故令為馮翊也魯般為將作師古曰以其巧也般與班同仲山甫為光祿晉灼曰光祿主三大夫諫正之官取其柔亦不茹剛亦不吐申伯為太僕應劭曰申伯周宣王之舅也太僕主大駕親御職又宻近故用親親也延陵季子為水衡應劭曰水衡主池苑季子吳人故使為之師古曰季子即吴公子札百里奚為典屬國應劭曰奚秦人秦近西戎曉其風俗故令為之栁下恵為大長秋師古曰恵魯大夫展禽也食采栁下諡曰惠以其貞潔故為大長秋史魚為司直師古曰史魚衛大夫史鰌也論語稱孔子曰直哉史魚邦有道如矢邦無道如矢蘧伯玉為太傅如淳曰太傅傅人主使無過伯玉欲寡其過故令為之師古曰蘧伯玉衛大夫也名瑗蘧音渠孔父為詹事應劭曰孔父正色而立於朝則莫敢過而致難乎其君故為詹事師古曰孔父宋大夫也父讀曰甫孫叔敖為諸侯相子産為郡守師古曰善治邦邑也王慶忌為期門應劭曰以其勁㨗可為期門郎也師古曰王慶忌即王子慶忌也夏育為鼎官或曰夏育衛人力舉千鈞鼎官今殿前舉鼎者也羿為旄頭應劭曰羿善射故令為旄頭今以羽林為之髪正上向而長衣繡衣在乘輿車前師古曰羿音詣宋萬為式道候師古曰萬宋閔公臣亦有勇力也式表也表道之候若今之武候引駕人上廼大笑是時朝廷多賢材上復問朔方今公孫丞相兒大夫師古曰公孫𢎞及兒寛也兒音五奚反董仲舒夏侯始昌司馬相如吾丘壽王主父偃朱買臣嚴助汲黯膠倉終軍嚴安徐樂司馬遷之倫皆辯知閎達溢于文辭師古曰溢者言其有餘也先生自視何與比哉師古曰何與猶言何如也朔對曰臣觀其臿齒牙樹頰胲師古曰頰肉曰胲音改吐脣吻擢項頥師古曰頥頷下也音怡結股腳連脽凥師古曰脽臂也音誰遺蛇其迹行歩偊旅師古曰遺蛇猶逶迱也偊旅曲躬貌也蛇音移偊音禹臣朔雖不肖尚兼此數子者朔之進對澹辭皆此類也師古曰澹古贍字也贍給也武帝既招英俊程其器能用之如不及師古曰程謂量計之也如不及者恐失之也時方外事胡越内興制度國家多事自公孫宏以下至司馬遷皆奉使方外或為郡國守相至公卿而朔嘗至太中大夫後常為郎與枚臯郭舍人俱在左右詼啁而已師古曰啁與謿同音竹交反久之朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位如淳曰都居也澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不釋師古曰服膺俯服其胷臆也釋廢置也宋祁曰數當作記字而不下添可字好學樂道之效明白甚矣自以智能海内無雙則可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執㦸意者尚有遺行邪師古曰可遺之行言不盡善也同胞之徒無所容居其故何也蘇林曰胞音胞胎之胞也言親兄弟東方先生喟然長息仰而應之曰是固非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壊諸侯不朝力政爭權相禽以兵并為十二國未有雌雄師古曰十二國謂魯衛齊楚宋鄭魏燕趙中山秦韓也得士者彊失士者亡故談說行焉宋祁曰故談說行焉改作故說得行焉身處尊位珍寳充内外有廪倉澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賔服師古曰懾恐也音之渉反連四海之外以為帶師古曰言如帶之相連也安於覆盂師古曰言不可傾揺動猶運之掌師古曰言至易也賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下宋祁曰泉疑作淵用之則為虎不用則為䑕雖欲盡節效情安知前後夫天地之大士民之衆竭精談説並進輻湊者不可勝數悉力慕之宋祁曰慕當作募困於衣食或失門戸師古曰言不得所由入也一曰謂被誅戮䘮其家室也使蘇秦張儀與僕並生於今之世曾不得掌故安敢望常侍郎乎宋祁曰常字當刪故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宫聲聞于外師古曰小雅白華之詩也言茍有於中必形於外也鶴鳴于九臯聲聞于天師古曰小雅鶴鳴之詩也言處卑而聲徹其高逺茍能修身何患不榮太公體行仁義七十有二廼設用於文武得信厥說師古曰設施也信讀曰伸封於齊七百歳而不絶此士所以日夜孳孳敏行而不敢怠也師古曰孳與孜同敏勉也辟若䳭鴒飛且鳴矣師古曰䳭鴒雍渠小青雀也飛則鳴行則揺言其勤苦也辟讀曰譬䳭音脊鴒音零傳曰天不為人之惡寒而輟其冬師古曰輟止也地不為人之惡險而輟其廣君子不為小人之匈匈而易其行師古曰匈匈讙議之聲天有常度地有常形君子有常行君子道其常小人計其功師古曰道由也詩云禮義之不愆何恤人之言師古曰逸詩也愆過也恤憂也故曰水至清則無魚人至察則無徒師古曰徒衆也冕而前旒所以蔽明黈纊充耳所以塞聰如淳曰黈音工茍反謂以玉為瑱用黈纊縣之也師古曰如說非也黈黄色也纊綿也以黄綿為丸用組懸之於冕垂兩耳旁示不外聽非玉瑱之縣也明有所不見聰有所不聞舉大德赦小過無求備於一人之義也師古曰論語仲弓問政於孔子孔子曰赦小過舉賢才周公謂魯公曰故舊無大故則不棄也毋求備於一人故朔引此言也士有百行功過相除不可求備也枉而直之使自得之優而柔之使自求之揆而度之使自索之師古曰枉曲也索亦求也度音徒各反盖聖人之教化如此欲自得之自得之則敏且廣矣師古曰敏疾也今世之處士魁然無徒廓然獨居師古曰魁讀曰塊上觀許由下察接輿計同范蠡忠合子胥師古曰許由堯讓以天下而耻聞之楚狂接輿陽狂匿跡范蠡佐句賤功成而退子胥忠諫至死不易天下和平與義相扶寡耦少徒固其宜也師古曰耦合也徒衆也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊說行如流曲從如環所欲必得功若丘山海内定國家安是遇其時也子又何怪之邪語曰以筦闚天以蠡測海服䖍曰筦音管張晏曰蠡瓠瓢也師古曰筦古管字蠡音來奚反瓢音平遙反以莛撞鐘文穎曰謂槀莛也師古曰音徒丁反豈能通其條貫考其文理發其音聲哉師古曰考究也繇是觀之譬猶鼱鼩之襲狗服䖍曰音蹤劬如淳曰鼱鼩小䑕也音精劬孤豚之咋虎師古曰孤豚孤特之豚也咋嚙也音仕客反至則靡耳何功之有師古曰靡碎滅也耳語辭今以下愚而非處士雖欲勿困固不得已此適足以明其不知權變而終惑於大道也又設非有先生之論其辭曰非有先生仕於吳進不稱往古以厲主意退不能揚君美以顯其功黙然無言者三年矣吳王怪而問之曰寡人獲先人之功寄於衆賢之上夙興夜寐未嘗敢怠也今先生率然高舉逺集吳地師古曰率然猶颯然將以輔治寡人誠竊嘉之體不安席食不甘味目不視靡曼之色耳不聽鐘鼓之音虚心定志欲聞流議者三年于兹矣師古曰流末流也猶言餘論也今先生進無以輔治退不揚主譽竊不為先生取之也盖懐能而不見是不忠也見而不行主不明也師古曰見顯也意者寡人殆不明乎非有先生伏而唯唯師古曰唯唯恭應也音弋癸反吳王曰可以談矣寡人將竦意而覽焉師古曰竦企待也先生曰於戲師古曰於讀曰烏戲讀曰呼可乎哉可乎哉師古曰言不可談何容易師古曰不見寛容則事不易故曰何容易也易音弋豉反夫談有悖於目拂於耳謬於心而便於身者師古曰悖逆也拂違戾也悖音布内反拂音弗或有說於目順於耳快於心而毁於行者師古曰說讀曰悅非有明王聖主孰能聽之吳王曰何為其然也中人已上可以語上也師古曰引論語載孔子之言中品之人則可與言上道也先生試言寡人將聽焉先生對曰昔者關龍逢深諫於桀而王子比干直言於紂此二臣者皆極慮盡忠閔主澤不下流而萬民騷動師古曰閔病也故直言其失切諫其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行無人臣之禮師古曰不省其忠而被以此罪也果紛然傷於身䝉不辜之名師古曰䝉被也戮及先人為天下笑故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及蜚亷惡來革等蘇林曰二人皆紂時邪佞人也孟康曰蜚亷善走師古曰蜚古飛字二人皆詐偽巧言利口以進其身隂奉琱瑑刻鏤之好以納其心師古曰琱與彫同畫也瑑謂刻為文也音篆務快耳目之欲以茍容為度遂往不戒身没被戮宗廟崩阤國家為虚師古曰阤穨也音直氏反虚讀曰墟放戮賢聖親近讒夫詩不云乎讒人罔極交亂四國師古曰小雅青蠅之詩也解在戾太子傳此之謂也故卑身賤體說色微辭師古曰說讀曰悅愉愉呴呴終無益於主上之治師古曰愉愉顔色和也呴呴言語順也呴音許于反則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂主之邪下以損百姓之害師古曰拂與弼同損減也則忤於邪主之心歴於衰世之法師古曰忤逆也歴猶經也離也故養壽命之士莫肯進也遂居深山之間積土為室編蓬為戸彈琴其中以咏先王之風亦可以樂而忘死矣是以伯夷叔齊避周餓于首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王懼然易容師古曰懼然失守之貌也懼音居具反捐薦去几危坐而聽師古曰捐薦席而去馮几自貶損也先生曰接輿避世箕子被髮陽狂師古曰解並在鄒陽傳此二人者皆避濁世以全其身者也使遇明王聖主得賜清燕之閒寛和之色師古曰閒讀曰閑閑暇也發憤畢誠師古曰畢盡也圖盡安危揆度得失師古曰圖謀盡計也宋祁曰盡姚本作畫上以安主體下以便萬民則五帝三王之道可幾而見也師古曰幾庶幾故伊尹䝉耻辱負鼎爼和五味以干湯師古曰蒙冒也犯也太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也深念逺慮引義以正其身推恩以廣其下本仁祖義師古曰以仁為本以義為始褒有德祿賢能誅惡亂總逺方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽逺方懐之故號聖王臣子之職既加矣於是裂地定封爵為公侯傳國子孫名顯後世民到于今稱之以遇湯與文王也太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易於是吳王穆然張晏曰穆音黙師古曰穆然靜思貌俛而深惟仰而泣下交頥曰嗟乎余國之不亡也綿綿連連殆哉世之不絶也師古曰殆危也於是正明堂之朝齊君臣之位舉賢材布德恵施仁義賞有功躬節儉減後宫之費損車馬之用放鄭聲逺佞人師古曰逺離也音于萬反省庖厨去侈靡卑宫館壊苑囿填池塹以予貧民無産業者開内臧振貧窮存耆老䘏孤獨薄賦斂省刑辟行此三年海内晏然天下大洽隂陽和調萬物咸得其宜國無災害之變民無飢寒之色家給人足畜積有餘囹圄空虚師古曰畜讀曰蓄鳯皇來集麒麟在郊甘露既降朱草萌牙逺方異俗之人鄉風慕義師古曰鄉讀曰嚮各奉其職而來朝賀故治亂之道存亡之端若此易見而君人者莫肯為也臣愚竊以為過故詩云王國克生惟周之楨濟濟多士文王以寧師古曰大雅文王之詩也言文王之國生此多士為周室楨幹之臣所以安寧也此之謂也朔之文辭此二篇最善其餘有封泰山責和氏璧及皇太子生禖屏風殿上柏柱平樂觀賦獵八言七言上下晉灼曰八言七言詩各有上下篇從公孫𢎞借車凡劉向所錄朔書具是矣師古曰劉向别錄所載世所傳他事皆非也師古曰謂如東方朔别傳及俗用五行時日之書皆非實事也贊曰劉向言少時數問長老賢人通於事及朔時者師古曰與朔同時也皆曰朔口諧倡辯不能持論喜為庸人誦說師古曰喜音許吏反為音于偽反故今後世多傳聞者而揚雄亦以為朔言不純師行不純德其流風遺書蔑如也師古曰言辭義淺薄不足稱也然朔名過實者以其詼達多端不名一行應諧似優不窮似智正諫似直穢德似隠非夷齊而是栁下恵戒其子以上容師古曰容身避害也首陽為拙應劭曰伯夷叔齊不食周粟餓死首陽山為拙柱下為工應劭曰老子為周柱下史朝隠故終身無患是為工也飽食安歩以仕易農依隠玩世詭時不逢如淳曰依違朝隠樂玩其身於一世也反時直言正諫則與富貴不相逢也臣瓉曰行與時詭而不逢禍害也師古曰瓉說是也詭違也其滑稽之雄乎師古曰雄謂為之長帥也朔之詼諧逢占射覆如淳曰逢占逢人所問而占之也師古曰此說非也逢占逆占事猶云逆刺也其事浮淺行於衆庶童兒牧豎莫不眩燿而後世好事者因取竒言怪語附著之朔故詳錄焉師古曰言此傳所以詳錄朔之辭語者為俗人多以竒異妄附於朔故耳欲明傳所不記皆非其實也而今之為漢書學者猶更取他書雜說假合東方朔之事以博異聞良可歎矣他皆類此著音直畧反東方朔傳云一日卒有不勝洒掃之職顔師古注云卒讀曰猝洒音信又音山豉反檢諸本及前所校過并如此臣佖按許慎說文洒字解云音先禮反古又為灑埽字其灑字解云汎也汎音信今校定此註合云洒音先禮反古文為灑埽字灑汎也所蟹反汎音信盖傳冩脱誤少一十七字多又音山豉反五字前漢書卷六十五前漢書卷六十五考證東方朔傳朔應聲輙對變詐鏠出鏠當作鋒馳逐平樂觀三輔黄圖曰上林苑中有平樂觀前漢書卷六十五考證
