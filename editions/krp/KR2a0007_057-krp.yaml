body:
  text: 前漢書卷五十七上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注司馬相如傳第二十七上師古曰近代之讀相如賦者多矣皆改易文字競為音説致失本真徐廣鄒誕生諸詮之陳武之屬是也今依班書舊文為正於彼數家並無取焉自喻巴蜀之後分為下卷司馬相如字長卿蜀郡成都人也少時好讀書學擊劒師古曰擊劒者以劒遥擊而中之非斬刺也名犬子師古曰父母愛之不欲稱斥故為此名也相如既學慕藺相如之為人也更名相如師古曰藺相如六國時趙人也義而有勇故追慕之以訾為郎事孝景帝為武騎常侍非其好也師古曰訾讀與貲同貲財也以家財多得拜為郎也武騎常侍秩六百石㑹景帝不好辭賦是時梁孝王來朝從游説之士齊人鄒陽淮隂枚乗吳嚴忌夫子之徒師古曰嚴忌本姓莊當時尊尚號曰夫子史家避漢明帝諱故遂為嚴耳相如見而説之師古曰説讀曰悦因病免客游梁得與諸侯游士居數嵗乃著子虛之賦會梁孝王薨相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦游不遂而困師古曰遂逹也來過我於是相如徃舍都亭師古曰臨卭所治都之亭臨卭令繆為恭敬師古曰繆詐也日徃朝相如相如初尚見之後稱病使從者謝吉吉愈益謹肅臨卭多富人卓王孫僮客八百人師古曰僮謂奴程鄭亦數百人師古曰程鄭亦人姓名言其家富亞王孫也乃相謂曰令有貴客為具召之師古曰具謂酒食之具召請也并召令令既至卓氏客以百數至日中請司馬長卿長卿謝病不能臨臨卭令不敢甞食身自迎相如相如為不得已而强徃師古曰示衆人以此意也一坐盡傾師古曰皆傾慕其風采也酒酣臨卭令前奏琴曰竊聞長卿好之願以自娛師古曰奏進也相如辭謝為鼓一再行師古曰行謂曲引也是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之師古曰寄心於琴聲以挑動之也挑音徒了反相如時從車騎雍容閒雅師古曰閒讀曰閑甚都張揖曰甚得都士之節也韋昭曰都邑之容也師古曰都閒美之稱也張説近之詩鄭風有女同車之篇曰洵美且都山有扶蘇之篇又云不見子都則知都者美也韋言都邑失之逺矣及飲卓氏弄琴文君竊從户窺心説而好之師古曰説讀曰悦悦其人而好其音也恐不得當也師古曰當謂對偶也既罷相如乃令侍人重賜文君侍者通殷勤文君夜亡奔相如相如與馳歸成都家徒四壁立師古曰徒空也但有四壁更無資産宋祁云别本無夜亡二字卓王孫大怒曰女不材我不忍殺一錢不分也人或謂王孫王孫終不聴文君久之不樂謂長卿曰苐俱如臨卭文頴曰苐且也張揖曰如徃也師古曰苐但也發聲之急耳酈食其曰苐言之此類甚多義非且也從昆弟假貣猶足以為生師古曰貣音吐得反何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當盧郭璞曰盧酒盧師古曰賣酒之處累土為盧以居酒瓮四邊隆起其一靣髙形如鍜盧故名盧耳而俗之學者皆謂當盧為對温酒火盧失其義矣宋祁曰注文酒盧下當有也字相如身自著犢鼻褌師古曰即今之衳也形似犢鼻故以名云衳音之容反劉奉世曰犢鼻穴在膝下為褌財令至膝故習俗因以為名非謂其形似也與庸保雜作師古曰庸即謂賃作者保謂庸之可信任者也滌器於市中師古曰滌洒也器食器也食已則洒之賤人之役也洒音先禮反卓王孫恥之為杜門不出師古曰杜塞也昆弟諸公更謂王孫曰師古曰更互也音工衡反有一男兩女所不足者非財也師古曰言不患少財也今文君既失身於司馬長卿長卿故倦游文頴曰倦疲也言疲厭游學博物多能也雖貧其人材足依也且又令客奈何相辱如此師古曰言縣令之客不可以辱也卓王孫不得已師古曰已止也分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居久之蜀人楊得意為狗監師古曰主天子田獵犬也侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀請為天子游獵之賦上令尚書給筆札師古曰札木簡之簿小者也時未多用紙故給札以書札音壯黠反相如以子虚虛言也為楚稱師古曰稱説楚之美也烏有先生者烏有此事也師古曰烏於何也為齊難師古曰難詰楚事也亡是公者亡是人也師古曰亡讀曰無下皆類此欲明天子之義故虛藉此三人為辭師古曰藉假也以推天子諸侯之苑囿其卒章歸之於節儉師古曰卒終也謂終篇之言若隤牆填塹之比者宋祁曰章疑作常因以風諫師古曰風讀曰諷奏之天子天子大説師古曰説讀曰悦其辭曰楚使子虛使於齊齊王悉發車騎與使者出田師古曰田獵也田罷子虛過姹烏有先生師古曰姹誇誑之也音丑亞反字今作詫也亡是公存焉宋祁曰存疑作在坐定烏有先生問曰今日田樂乎子虛曰樂獲多乎曰少然則何樂對曰僕樂王之欲夸僕以車騎之衆而僕對以雲夢之事也張揖曰楚藪也在南郡華容縣師古曰夢讀如本字又音莫風反字或作瞢其音同耳曰可得聞乎子虛曰可王駕車千乗選徒萬騎田于海濵師古曰濵涯也音賔又音頻列卒滿澤罘罔彌山師古曰罘覆車也即今幡車㒺也王國兔爰之詩曰雉罹於罦罦亦罘字耳彌竟也罘音浮掩菟轔鹿射麋格麟師古曰轔謂車踐轢之也音吝格字或作腳言持引其腳也騖於鹽浦割鮮染輪張揖曰海水之涯多出鹽也李奇曰鮮生也染擩也切生肉擩車輪鹽而食之也師古曰騖謂亂馳也擩揾也騖音務擩音如閲反揾音一頓反射中獲多矜而自功師古曰自矜其能以為功也顧謂僕曰楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之獵孰與寡人師古曰與猶如也僕下車對曰臣楚國之鄙人也幸得宿衞十有餘年時從出遊遊於後園宋祁曰一夲無一遊字覽於有無然猶未能徧覩也又烏足以言其外澤乎宋祁曰一本無其字齊王曰雖然畧以子之所聞見言之僕對曰唯唯師古曰唯唯恭應之辭也音弋癸反臣聞楚有七澤甞見其一未覩其餘也臣之所見蓋特其小小者爾名曰雲夢雲夢者方九百里其中有山焉其山則盤紆岪鬱隆崇律崪郭璞曰詰屈竦起也岪音佛宋祁云越本無隆崇律崪四字岑崟參差日月蔽虧張揖曰髙山雍蔽日月虧缺半見也師古曰岑音仕林反崟音吟交錯糾紛上干青雲郭璞曰言相摎結而峻絶罷池陂陁下屬江河郭璞曰言旁穨也屬連也罷音疲陂音婆陁音駞文頴曰南方無河也冀州凡水大小俱謂之河詩賦通方言耳晉灼曰文章假借協陁之韻也師古曰文晉之説皆非也下屬江河者總言山之廣大所連者逺耳於文無妨陂音普河反屬音之欲反其土則丹青赭堊雌黄白坿錫碧金銀張揖曰丹丹沙也青青雘也赭赤赭也堊白堊也蘇林曰白坿白石英也師古曰丹沙今之朱沙也青雘今之空青也赭今之赤土也堊今之白土也錫青金也碧謂玉之青白色者也堊音惡坿音附雘音一郭反衆色炫燿照爛龍鱗師古曰言采色相耀若龍鱗之間雜也炫音州縣之縣其石則赤玉玫瑰琳珉昆吾張揖曰琳玉也珉石之次玉者也昆吾山名也出善金尸子曰昆吾之金晉灼曰玫瑰火齊珠也師古曰火齊珠今南方之出火珠也玫音枚瑰音回又音瓌琳音林珉音旻宋祁云注文琳玉也越本玉作珠瑊玏𤣥厲張揖曰瑊玏石之次玉者𤣥厲黒石可用磨也如淳曰瑊音緘玏音勒礝石武夫張揖曰皆石之次玉者礝石白者如氷半有赤色武夫赤地白采葱蘢白黒不分郭璞曰礝音而兖反其東則有蕙圃衡蘭芷若張揖曰蕙圃蕙草之圃也衡杜衡也其状若葵其臭如蘪蕪芷白芷若杜若也師古曰蘭即今澤蘭也今流俗書本芷若下有射干字妄増之也劉奉世曰澤蘭自别一種草非蘭也蘭今管城多有之苗如麥門冬而長大花黄紫兩色宋祁曰南本浙本芷作茝穹窮昌蒲江離蘪蕪張揖曰江離香草也蘪蕪蘄芷也似蛇牀而香師古曰蘪蕪即穹窮苗也郭璞曰江離似水薺而藥對曰蘪蕪一名江離張勃又云江離出臨海縣海水中色青似亂髪郭義恭云江離赤葉諸説不同未知孰是今無識之者然非蘪蕪也藥對誤耳諸柘巴且張揖曰諸柘甘柘也蒪苴蘘荷也文頴曰巴且草一名巴蕉師古曰文説巴且是也且音子余反蒪音普各反蒪苴自蘘荷耳非巴且也劉奉世曰諸柘巴且四物也諸山芋字當為藷且蒪苴也蒪音普各反蘘荷也其南則有平原廣澤登降陁靡師古曰登上也降下也陁靡旁袤也陁音弋爾反案衍壇曼師古曰寛廣之貌也縁以大江限以巫山張揖曰巫山在南郡巫縣也其髙燥則生葴析苞荔張揖曰葴馬藍也析似燕麥苞藨也荔馬荔蘇林曰析音斯師古曰藨即今所用作席者也馬荔今之馬藺也葴音之林反苞音包荔音隸藨音皮表反宋祁云注文浙本蘇林上有也字薜莎青薠張揖曰薜頼蒿也莎薃侯也青薠似莎而大生江湖鴈所食師古曰莎即今青莎草薠音煩宋祁曰一本無薜莎青薠四字並張揖等注其埤溼則生藏莨蒹葭郭璞曰藏莨草中牛馬芻蒹荻也似雚而細小葭蘆也師古曰埤音婢謂下地也莨音郎蒹葭音兼豭荻音敵東蘠彫胡張揖曰東蘠實可食彫胡菰米也師古曰東蘠似蓬其實如葵子也蓮藕觚盧張揖曰蓮荷之實也其根藕張晏曰觚盧扈魯也郭璞曰苽蔣也蘆葦也師古曰書不為苽蘆字郭説非也但不知觚盧於今是何草耳劉奉世曰詞人不從本字者固多何獨於此不然耶宜用郭説奄閭軒于張揖曰奄閭蒿也子可治疾軒于蕕草也生水中揚州有之師古曰奄音淹蕕音猶衆物居之不可勝圖師古曰勝舉也不可盡舉而圖寫之言其多也其西則有涌泉清池激水推移郭璞曰波抑揚也外發夫容䔖華内隱鉅石白沙應劭曰夫容蓮華也䔖芰也師古曰鉅大也其中則有神龜蛟鼉毒冒鼈黿張揖曰蛟狀魚身而蛇尾皮有珠鼉似蜥蜴而大身有甲皮可作鼓毒冒似觜蠵甲有文黿似鼈而大師古曰張説蛟者乃是鮫魚非蛟龍之蛟也蛟觧在武紀鼉音徒何反又音大河反毒音代冒音妹他皆倣此宋祁曰徒何大河二反是一音疑上云徒丹反丹何近而相亂上林靈鼉亦自有注其北則有隂林巨樹楩柟豫章服䖍曰隂林山北之林也豫章大木也生七年乃可知師古曰隂林言其樹木衆而且大常多隂也楩音便又音歩田反即今黄楩木也柟音南今所謂楠木桂椒木蘭檗離朱楊師古曰桂即藥之所用其皮者也椒即所食椒樹也木蘭皮似椒而香可作靣膏藥檗黄檗也離山棃也朱楊赤莖柳也生水邊樝梨梬栗橘柚芬芳張揖曰樝似棃而甘梬梬棗也師古曰樝即今所謂樝子也梬棗即今之棗也柚即橙也似橘而大味酢皮厚樝音側加反梬音弋整反柚音弋救反橙音文莖反芬芳言橘柚之氣也劉奉世曰橙柚各自一種顔所説乃柚也其上則有宛雛孔鸞騰逺射干張揖曰宛雛似鳯孔孔雀鸞鸞鳥也射干似狐能縁木服䖍曰騰逺獸名也師古曰鸞鳥形如翟而五采文宛音於元反射音弋舍反其下則有白虎𤣥豹蟃蜒貙豻郭璞曰蟃蜒大獸似狸長百尋貙似狸而大豻胡地野犬也似狐而小蟃音萬蜒音延豻音岸師古曰蜒又音弋戰反貙音丑于反豻合韻音互安反於是乎乃使剸諸之倫手格此獸師古曰剸諸吳人刺吳王僚者也方言勇士故舉以為類剸與專同楚王乃駕馴駮之駟張揖曰馴擾也駮如馬白身黒尾一角鋸牙食虎豹擾而駕之以當駟馬也師古曰馴音旬劉奉世曰馴駮止是駮馬耳虎常見而伏故出獵駕之非真駮也乗彫玉之輿師古曰以玉飾輿而彫鏤之靡魚須之橈旃張揖曰以魚須為旃柄驅馳逐獸正橈靡也郭璞曰通帛為旃師古曰大魚之湏出東海橈旃即曲旃也橈音女教反曵明月之珠旗張揖曰以明月珠綴飾旗也建干將之雄㦸張揖曰干將韓王劒師也雄㦸胡中有􅟉者干将所造左烏號之彫弓應劭曰楚有柘桑烏棲其上支下著地不得飛欲墮號呼故曰烏號張揖曰黄帝乗龍上天小臣不得上挽持龍􅏋􅏋拔墮黄帝弓臣下抱弓而號故名弓烏號郭璞曰雕畫也師古曰烏號應張二説皆有據也右夏服之勁箭伏儼曰服盛箭器也夏后氏之良弓名煩弱其矢亦良即煩弱箭服也故曰夏服宋祁曰南本勁作良陽子驂乘孅阿為御張揖曰陽子伯樂也秦繆公臣姓孫名陽郭璞曰孅阿古之善御者孅音纎案節未舒即陵狡獸師古曰案節猶弭節也未舒言未盡意驅馳已凌狡獸狡㨗之獸也宋祁曰注文當云已凌狡獸矣狡獸狡㨗之獸也文合如此蹵蛩蛩轔距虛張揖曰蛩蛩青獸状如馬距虛似驘而小郭璞曰距虛即蛩蛩變文互言耳師古曰據爾雅文郭説是也蹵音子六反軼野馬􅗗騊駼張揖曰軼過也野馬似馬而小北海内有獸状如馬名騊駼郭璞曰􅗗車軸頭也師古曰􅗗謂軸頭衝而殺之也軼音逸􅗗音衛騊音逃駼音塗乗遺風射游騏張揖曰遺風千里馬也爾雅曰嶲如馬一角不角者曰騏師古曰嶲音擕騏音其倐胂倩浰張揖曰皆疾貌也師古曰倐音式六反胂音式刃反倩音千見反浰音練雷動猋至師古曰猋疾風也若雷之動如猋之至言其威且疾也猋音必遥反星流電擊弓不虛發中必决眦師古曰眦即决獸之目眦言射審也眦即眥字洞胷逹掖絶乎心繫張揖曰自左射之貫胸通右髃中心絶系也師古曰髃謂肩前骨也音五口反繫讀曰系也獲若雨獸揜屮蔽地師古曰言獲殺之多如天雨獸也雨音于具反屮古草字也於是楚王乃弭節俳佪翺翔容與郭璞曰弭猶低也節所杖信節也翺翔容與言自得也師古曰弭節者示安徐也覽乎隂林觀壯士之暴怒與猛獸之恐懼徼􅓈受詘蘇林曰􅓈音倦􅓈之􅓈詘音􅀈强之􅀈郭璞曰詘詘折也􅓈疲極詘音屈師古曰蘇音是也􅓈音與劇同詘音其勿反徼工堯反徼要也詘盡也言獸有倦極者要而取之力盡者受而有之宋祁曰注文工堯反上當有音字殫覩衆物之變態郭璞曰殫盡也變態姿則也師古曰殫音單於是鄭女曼姬文穎曰鄭國出好女曼者言其色理曼澤也如淳曰鄭女夏姬也曼姬楚武王夫人鄧曼也師古曰文説是也劉敞曰予謂曼鄧姓也姬亦婦人通稱爾被阿錫揄紵縞張揖曰阿細繒也錫細布也揄引也師古曰紵纎紵也縞鮮支也今之所謂素者也揄音踰又音投也宋祁曰句末也字當刪雜纎羅垂霧縠師古曰纎細也霧縠者言其輕靡如霧非謂縐文也襞積褰縐鬱橈谿谷張揖曰襞積猶簡齰也褰縮也縐裁也其縐中文理茀鬱有似於谿谷也師古曰張説非也襞積即今之帬襵古所謂皮弁素積者即謂此積也言襞積文理隨身所著或褰縐委屈如谿谷也襞音壁縐音側救反衯衯裶裶揚衪戍削張揖曰衯音芬祂衣袖也戍鮮也削衣刻除貌也師古曰揚舉也祂曵也或舉或曳則戍削然見其降殺之美也裶音霏祂音弋示反戍讀如本字蜚襳垂髾張揖曰襳離袿也髾髻後垂也師古曰張説非也襳袿衣之長帶也髾謂燕尾之屬皆衣上假飾也蜚古飛字也襳音纎髾音所交反扶輿猗靡張揖曰扶持楚王車輿相隨也師古曰張説非也此自言鄭女曼姬為侍從者所扶輿而猗靡耳非謂扶持楚王車輿也猗音於綺反今人猶呼相撫掩容養為猗靡劉奉世曰扶輿猗靡此言衣裳稱美之貌耳不煩曲觧翕呷萃蔡張揖曰翕呷衣張起也萃蔡衣聲也師古曰呷音火甲反萃音翠又音千賄反下摩蘭蕙上拂羽盖師古曰下摩蘭蕙謂垂髾也上拂羽盖謂飛襳也錯翡翠之葳㽔師古曰錯雜也葳㽔羽飾貌繆繞玉綏張揖曰楚王車之綏以玉飾之也郭璞曰綏登車所執也師古曰二説皆非也以玉飾綏謂鄭女曼姬之容服也綏即今之所謂采䋿垂鑷者也繆繞相纒結也繆音蓼䋿音隈𦕈𦕈忽忽若神之髣髴郭璞曰言其容飾奇豔非世所見戰國策曰鄭之美女粉白黛黒而立於衢不知者謂之神也於是乃羣相與獠於蕙圃文穎曰宵獵為獠師古曰獠音力笑反劉奉世曰獠雖宵獵之名以訓此賦則不通直獵耳媻姗勃窣上金隄師古曰媻姍勃窣謂行於叢薄之間也金隄言水之隄塘堅如金也媻音盤姍音先安反窣音先忽反隄音丁兮反揜翡翠射鵔鸃師古曰鳥赤羽者曰翡青羽者曰翠鵔鸃鷩鳥也似山雞而小冠背毛黄腹下赤項綠色其尾毛紅赤光采鮮明今俗呼為山雞其實非也鵔音峻鸃音儀微矰出孅繳施師古曰矰短矢也繳生絲縷也以繳係矰仰射髙鳥謂之弋射矰音增繳音灼弋白鵠連鴐鵞師古曰鵠水鳥也其鳴聲鵠鵠云鴐鵞野鵞也連謂重累獲之也鵠音胡沃反鴐音加䨇鶬下𤣥鶴加師古曰鶬鴰也今關西呼為鴰鹿山東通謂之鶬鄙俗名為錯落錯者亦言鶬聲之急耳又謂鴰捋捋音來奪反鴰鹿鴰捋皆象其鳴聲也𤣥鶴黒鶴也相鶴經云鶴夀滿二百六十嵗則色純黒言弋射之妙既中白鵠而連鴐鵞又下雙鶬而加𤣥鶴也鶬音倉怠而後游於清池郭璞曰怠倦也宋祁云浙夲南本後字下並有發字浮文鷁張揖曰鷁水鳥也畫其象於船首淮南子曰龍舟鷁首天子之乘也師古曰鷁音五歴反揚旌枻張揖曰揚舉也析羽為旌建於舩上枻柂也師古曰枻音曳柂音大可反宋祁曰枻柂並從木别本從抴誤張翠帷建羽葢郭璞曰施之舩上也師古曰翠帷帷翠色也羽盖以雜羽飾盖㒺毒冒釣紫貝郭璞曰紫貝紫質黑文也師古曰貝水中介蟲古以為貨也摐金鼓師古曰摐撞也金鼓謂鉦也摐音窻吹鳴籟張揖曰籟簫也榜人歌張揖曰榜舩也月令云命榜人榜人舩長也主倡聲而歌者也師古曰榜音謗又方孟反聲流喝郭璞曰言悲嘶也師古曰喝音一介反嘶音蘇奚反水蟲駭波鴻沸郭璞曰魚龞躍濤浪作也師古曰沸音普盖反涌泉起奔揚㑹郭璞曰暴湓激相鼓薄也師古曰湓音普頓反礧石相擊琅琅礚礚師古曰礧石轉石也礧音盧對反礚音口盖反若雷霆之聲聞乎數百里外宋祁曰江南本里字下有之字將息獠者擊靈鼓起熢燧師古曰靈鼓六靣擊之所以警衆也車案行騎就隊師古曰案依也行列也隊部也行音胡郎反隊音矣内反纚乎淫淫般乎裔裔郭璞曰皆羣行貌也師古曰纚音屣般音盤於是楚王乃登陽雲之臺孟康曰雲夢中髙唐之臺宋玉所賦者言其髙出雲之陽也泊乎無為澹乎自持師古曰泊澹皆安静意也泊音歩各反澹音徒濫反勺藥之和具而後御之伏儼曰勺藥以蘭桂調食文頴曰五味之和也晉灼曰南都賦曰歸雁鳴鵽香稻鮮魚以為勺藥酸甜滋味百種千名文説是也師古曰諸家之説皆未當也勺藥藥草名其根主和五藏又辟毒氣故合之於蘭桂五味以助諸食因呼五味之和為勺藥耳讀賦之士不得其意妄為音訓以誤後學今人食馬肝馬腸者猶合勺藥而煑之豈非古之遺法乎鵽音竹滑反不若大王終日馳騁曽不下輿脟割輪焠自以為娛師古曰脟字與臠同焠音于内反焠亦揾染之義耳言臠割其肉揾車輪鹽而食之此盖以譏上割鮮染輪之言也臣竊觀之齊殆不如師古曰殆近也於是王無以應僕也烏有先生曰是何言之過也足下不逺千里來况齊國師古曰言有恵賜而來也王悉境内之士備車騎之衆師古曰悉盡也與使者出田乃欲戮力致獲以娛左右也師古曰謙不斥言使者故指云其左右也何名為夸哉問楚地之有無者願聞大國之風烈先生之餘論也張晏曰願聞先賢之遺談美論也師古曰此説非也先生即謂子虚耳下又言先生行之豈先賢也今足下不稱楚王之徳厚而盛推雲夢以為驕奢言淫樂而顯侈靡竊為足下不取也必若所言固非楚國之美也有而言之是章君之惡也無而言之是害足下之信也章君惡傷私義師古曰非楚國之美是章君惡害足下之信是傷私義也二者無一可而先生行之必且輕於齊而累於楚矣師古曰言楚使者失辭自為累重而於齊無所負擔故云輕也累音力瑞反且齊東陼鉅海南有琅邪蘇林曰小洲曰陼張揖曰琅邪臺名也在勃海間師古曰東陼鉅海東有大海之陼字與渚同也觀乎成山張揖曰觀闕也成山在東萊不夜縣於其上築宮闕師古曰觀音工喚反射乎之罘晉灼曰之罘山在東萊腄縣射獵其上也師古曰腄音直瑞反又音誰浮勃澥師古曰勃澥海别枝也澥音蟹游孟諸文穎曰宋之大澤也故屬齊邪與肅慎為鄰郭璞曰肅慎國名在海外也師古曰邪讀為斜謂東北接也宋祁曰注文斜或作衺右以湯谷為界師古曰湯谷日所出也許慎云熱如湯也劉奉世曰右當為左秋田乎青邱服䖍曰青邱國在海東三百里仿偟乎海外師古曰仿音旁吞若雲夢者八九其於匈中曽不蔕芥張揖曰蔕芥刺鯁也師古曰蔕音丑介反若乃俶儻瑰瑋異方殊類師古曰俶儻猶非常也俶音吐歴反珍怪鳥獸萬端鱗崪師古曰崪與萃同萃集也如鱗之集言其多也充仭其中者不可勝記禹不能名卨不能計張揖曰禹為堯司空辨九州名山别草木卨為堯司徒敷五教率萬事師古曰言其所有衆多雖禹卨之賢聖不能名而數之也然在諸侯之位不敢言游戯之樂苑囿之大先生又見客師古曰見猶至也言至此國為客也若今人自稱云見顧見眷耳是以王辭不復師古曰復反也謂不反報也何為無以應哉亡是公听然而笑曰師古曰听笑貌也音齗又音牛隐反楚則失矣而齊亦未為得也夫使諸侯納貢者非為財幣所以述職也郭璞曰諸侯朝於天子曰述職師古曰述循也謂順行也封彊畫界者非為守禦所以禁淫也郭璞曰天下有道守在四夷立境界者欲以禁絶淫放耳師古曰彊讀曰疆今齊列為東蕃而外私肅慎郭璞曰私與通也捐國隃限越海而田師古曰捐棄也謂田於青邱也其於義固未可也且二君之論不務明君臣之義正諸侯之禮徒事争於游戱之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以􅵘君自損也師古曰􅵘古貶字且夫齊楚之事又烏足道乎師古曰烏於何也道言也君未覩夫巨麗也師古曰巨大也麗美也獨不聞天子之上林乎左蒼梧右西極文穎曰蒼梧郡屬交州在長安東南故言左爾雅曰西至于豳國為西極在長安西故言右也丹水更其南應劭曰丹水出上洛冢領山東南至析縣入鈞水師古曰更歴也音工衡反紫淵徑其北文頴曰西河榖羅縣有紫澤在縣西北於長安為在北也終始霸産出入涇渭師古曰霸水出藍田谷西北而入渭産水亦出藍田谷北至霸陵入霸二水終始盡於苑中不復出也涇水出安定涇陽开頭山東至陽陵入渭渭水出隴西首陽縣鳥䑕同穴山東北至華隂入河從苑外來又出苑去也开音牽又音口見反酆鎬潦潏紆餘委蛇經營其内應劭曰潦流也潏涌出聲也張揖曰灃水出鄠南山灃谷北入渭鎬在昆明池北潦行潦也又有潏水出南山晉灼曰下言八川計從丹水以下至潏除潦為行潦凡九川從霸産以下為數凡七川潏音决潏水涌出聲也除潦潏不為水餘適八下言經營其内於數則計其外者矣師古曰應晉二説皆非也張言潦為行潦又失之潦音牢水名也出鄠縣西南山潦谷而北流入于渭上言左蒼梧右西極丹水更其南紫泉徑其北皆謂苑外耳丹水紫泉非八川數也霸産涇渭豐鎬潦潏是為八川言經營其内信則然矣地理志鄠縣有潏水北過上林苑入渭而今之鄠縣則無此水許慎云潏水在京兆杜陵此即今所謂沈水從皇子陂西北流經昆明池入渭者也盖為字或作水旁宂與沈字相似俗人因名沈水乎将鄠縣潏水今則改名人不識也但八川之義實在於斯耳蕩蕩乎八川分流相背異態郭璞曰變態不同也東西南北馳騖往來郭璞曰言更相錯渉也師古曰來音盧代反出乎椒邱之闕服䖍曰邱名也兩山俱起象䨇闕者行乎州淤之浦師古曰水中可居者曰州淤漫也浦水涯也淤音於庶反徑乎桂林之中如淳曰桂樹之林也過乎泱莽之壄張揖曰山海經所謂大荒之野也師古曰凡言此者著水流之長逺也泱音烏朗反汨乎混流順阿而下師古曰汨疾貌也混流豐流也曲陵曰阿汨音于筆反混音下本反赴隘陿之口師古曰兩岸間相廹近者也隘音於懈反陿音狹觸穹石激堆埼張揖曰穹石大石也埼曲岸頭也師古曰堆髙阜也音丁回反埼音巨依反沸乎暴怒郭璞曰沸水聲也洶涌彭湃師古曰洶涌跳起也彭湃相戾也洶音許勇反湃音普拜反滭弗宓汨蘇林曰滭音畢宓音密師古曰滭弗盛貌也宓汨去疾也汨音于筆反偪側泌瀄郭璞曰泌瀄音筆擳師古曰偪側相逼也泌瀄相揳也偪字與逼同揳音先結反横流逆折轉騰潎洌孟康曰轉騰相過也潎洌相撇也師古曰潎音匹列反洌音列撇又音普結反滂濞沆溉郭璞曰滂音旁濞音匹祕反溉音胡慨反皆水流聲貌師古曰沆音胡朗反穹隆雲橈師古曰橈曲也言水急旋回如雲之屈曲也橈音女教反宛潬膠盭郭璞曰憤薄相樛也師古曰宛音婉潬音善盭古戾字踰波趨浥涖涖下瀬郭璞曰踰躍也浥窊䧟也涖涖聲也師古曰浥音於俠反涖音利瀬疾流也批巖衝擁奔揚滯沛師古曰批反擊也擁曲隈也言水觸批巖崖而衝隈曲則奔揚而滯沛然也批音歩結反滯音丑制反沛音普盖反臨坻注壑瀺灂霣隊師古曰坻謂水中隆髙處也秦風終南之詩曰宛在水中坻坻音遲瀺音士咸反灂音才弱反又音仕角反霣即隕字隊音直類反沈沈隱隱砰磅訇礚師古曰砰音普氷反磅音普萌反訇音呼宏反礚音口盖反皆水流鼓怒之聲也潏潏淈淈湁潗鼎沸郭璞曰皆水微轉細涌貌也淈音骨湁音勅立反師古曰潏音决潗音子入反言水之流如㸑鼎沸也馳波跳沫汨㴔漂疾晉灼曰㴔音華給反郭璞曰㴔音許立反師古曰言水波急馳而白沫跳起汨急然也汨音于筆反㴔晉郭二音皆通漂音匹遥反悠逺長懐寂漻無聲郭璞曰懐亦歸變文耳漻音聊師古曰言長流安静肆乎永歸然後灝溔潢漾郭璞曰皆水無涯際貌師古曰灝音浩溔音弋少反潢音胡廣反漾音弋文反肆放也言水放流而長歸也安翔徐佪郭璞曰言運轉也翯乎滈滈郭璞曰水白光貌也師古曰翯音胡角反滈音鎬東注大湖郭璞曰大湖在吳縣尚書所謂震澤也衍溢陂池郭璞曰言湓溢而出也陂池江旁小水於是蛟龍赤螭文穎曰龍子為螭張揖曰赤螭雌龍也如淳曰螭山神也獸形師古曰許慎云离山神也字則單作离形若龍子乃從虫此作螭别是一物既非山神又非雌龍龍子三家之説皆失之虫音許尾反劉奉世曰尋師古之説既不以三家為然則是螭字本不從虫也故云别是一物矣後人誤並注改皆從虫非也䱴䲛漸離李奇曰周洛曰鮪蜀曰䱴䲛出鞏山穴中三月遡河上能度龍門之限則得為龍矣漸離未聞師古曰䱴音工鄧反䲛音莫鄧反鰅鰫鰬魠如淳曰鰅音顒鰬音乾魠音托郭璞曰鰅魚有文采鰫似鰱而黑鰬似鱓魠鰔也一名黄頰師古曰鰅如音是也鰫鰬魠郭説是也鱓音善鰔音感也宋祁曰注末感字當作咸也字當刪禺禺魼鰨如淳曰魼音去魚反晉灼曰鰨音奴榻反郭璞曰禺禺魚皮有毛黄地黒文魼比目魚也状似牛脾細鱗紫色兩相合乃得行鰨鯢魚也似鮎有四足聲如嬰兒師古曰禺音隅又音顒鯢音五奚反鮎音乃兼反揵鰭掉尾振鱗奮翼師古曰揵舉也鰭魚背上鬛也掉揺也揵音鉅言反掉音徒釣反潛處乎深巖郭璞曰隐岸底也魚鼈讙聲萬物衆夥師古曰讙譁也夥多也讙音許元反夥音下果反明月珠子的皪江靡應劭曰明月珠子生於江中其光耀乃照於江邊也師古曰皪音歴的皪光貌也江靡江邊靡迆之處也迆音弋爾反蜀石黄碝水玉磊砢張揖曰蜀石石次玉者也郭璞曰碝石黄色水玉水精也師古曰碝音如兖反磊音洛賄反砢音洛可反又音可磷磷爛爛采色澔汗郭璞曰皆玉石符采映曜也師古曰磷音吝澔音浩叢積乎其中䲨鷫鵠鴇鴐鵞屬玉張揖曰䲨大鳥也郭璞曰鷫鷫鷞也鴇似鴈而無後指屬玉似鴨而大長頸赤目紫紺色鷫音肅鴇音保師古曰䲨古鴻字鴇即今俗呼為獨豹者也豹者鴇聲之訛耳鴐音加屬音之欲反鷞音霜交精旋目郭璞曰交精似鳬而腳髙有毛冠辟火災旋目未聞也師古曰今荆郢間有水鳥大於鷺而短尾其色紅白深目目旁毛皆長而旋此其旋目乎煩鶩庸渠郭璞曰煩鶩鴨屬也庸渠似鳬灰色而鷄腳一名章渠鶩音木師古曰庸渠即今之水鷄也箴疵鵁盧張揖曰箴疵似魚虎而蒼黑色鵁􅀈頭鳥也盧白雉也郭璞曰盧盧鷀也箴音針師古曰盧郭説是也白雉不浮水上疵音貲鵁音火交反􅀈音鳥了反鷀音慈也宋祁曰注文􅀈字並當作鴢羣浮乎其上汎淫汜濫隨風澹淡郭璞曰皆鳥任風波自縱漂貌師古曰汎音馮汜音敷劍反澹音大覽反淡音琰與波揺蕩奄薄水陼張揖曰奄覆也草叢生曰薄郭璞曰薄猶集也師古曰薄郭説是也言奄集陼上而遊戱唼喋菁藻咀嚼菱藕張揖曰菱芰也郭璞曰菁水草藻聚藻也師古曰唼喋銜食也唼音所甲反喋音丈甲反咀音才汝反嚼音才削反於是乎崇山矗矗巃嵸崔巍郭璞曰皆髙峻貌也巃音籠嵸音才總反崔音催巍音五回反師古曰嵸音總深林巨木嶄巖参差師古曰嶄巖尖鋭貌参差不齊也嶄音士衘反参音楚林反差音楚宜反九嵕巀嶭南山峩峩師古曰九嵕山今在醴泉縣界巀嶭山即今所謂嵳峩山也在三原縣西也南山終南山也峩峩髙貌嵕音子公反又音緫巀音截嶭音齧巀嶭又音在割五割反峩音娥巖阤甗錡􅀢崣崛崎張揖曰􅀢崣髙貌崛崎斗絶也蘇林曰􅀢音頳水反崣音卒鄙反郭璞曰阤岸際也音豸甗錡隆屈窊折貌甗音魚晚反錡音嶬崛音掘崎音倚􅀢音作罪反崣字作委師古曰蘇郭兩説並通郭音作罪反又音將水反振溪通谷蹇産溝瀆張揖曰振拔也水注川曰溪注溪曰谷蹇産屈折也郭璞曰自溪及瀆皆水相通注也􅢋呀豁閜阜陵别隝郭璞曰􅢋呀豁閜澗谷之形容也隝水中山也􅢋音呼含反呀音呼加反閜音呼下反隝音禱師古曰大阜曰陵言阜陵居在水中各别為隝也豁音呼活反崴磈嵔廆邱虛堀礨郭璞曰皆其形勢也崴音於鬼反磈音魚鬼反嵔音惡罪反廆音瘣虛音墟堀音窟礨音磊師古曰磈又音於虺反廆音胡賄反隱轔鬱㠥登降施靡郭璞曰隐轔鬱㠥堆壟不平貌轔音洛盡反師古曰㠥音律施音弋爾反施靡猶連延也陂池貏豸郭璞曰陂池旁穨貌也陂音皮貏音衣被之被師古曰陂又音彼竒反貏又音彼允溶淫鬻張揖曰水流溪谷之間也師古曰溶音容鬻音育散渙夷陸師古曰散渙分散而渙然也易曰風行水上渙夷平也廣平曰陸亭臯千里靡不被築師古曰為亭候於臯隰之中千里相接皆築令平也被音皮義反揜以綠蕙張揖曰掩覆也緑王芻也蕙薰草也師古曰綠蕙言蕙草色緑耳非王芻也被以江離糅以蘼蕪雜以留夷張揖曰留夷新夷也師古曰留夷香草也非新夷新夷乃樹耳布結縷師古曰結縷蔓生著地之處皆生細根如綫相結故名結縷今俗呼鼓筝草兩幼童對衘之手鼓中央則聲如筝也因以名云攢戾莎師古曰攢聚也戻莎言莎草相交戾也攢音材官反掲車衡蘭應劭曰掲車一名䒗輿香草也師古曰掲音巨列反䒗音乞槁本射干師古曰槁本草類白芷根似芎藭射干即烏扇耳射音弋舍反茈薑蘘荷如淳曰茈薑薑上齊也師古曰薑之息生者連其株本則紫色也蘘荷蓴蔓也根旁生笋可以為葅又治蠱毒茈音紫蘘音人羊反宋祁曰注文蔓越本作苴葴持若蓀如淳曰葴音鍼張揖曰葴持闕若杜若也蓀香草也師古曰葴寒漿也持當為苻字之誤耳苻鬼目也杜若苖頗類薑而為㯶葉之状今流俗書本持字或作橙非也後人妄改耳其下乃言黄甘橙楱此無橙也葴音之林反蓀音孫鮮支黄礫師古曰鮮支即今支子樹也黄礫今用染者黄屑之木也二者雖非草類既云延曼太原或者賦雜言之耳蔣芧青薠張揖曰蔣菰也芧三稜也郭璞曰芧音杼師古曰蒋音将芧音文與反布濩閎澤延曼太原郭璞曰布濩猶布露也師古曰閎亦大也濩音䕶延音弋戰反離靡廣衍師古曰離靡謂相連不絶也衍布也離音力爾反應風披靡吐芳揚烈師古曰烈酷烈之氣也披音丕儀反郁郁菲菲衆香發越郭璞曰香氣射散也菲音妃肹蠁布冩晻薆咇茀師古曰肹蠁盛作也冩吐也晻薆咇茀皆芳香意也肹音許乙反蠁音響晻音奄又音烏感反薆音愛咇音歩必反茀音勃薆字或作隐也於是乎周覽汜觀師古曰汜普也音敷劍反縝紛軋芴孟康曰縝紛衆盛也軋芴緻密也師古曰縝音争忍反軋音於黠反芴音勿宋祁曰越本注文縝音丑人反芒芒怳忽郭璞曰言眼亂也師古曰芒音莫郎反視之無端察之無涯師古曰涯畔也音儀日出東沼入虖西陂張揖曰朝出苑之東池莫入於苑西陂中也其南則隆冬生長涌水躍波師古曰言其土地氣温經冬草木不死水不凍其獸則庸旄貘犛沈牛麈麋張揖曰旄旄牛其状如牛而四節毛犛牛黒色出西南徼外沈牛水牛也能沈没水中麈似鹿而大郭璞曰庸牛領有肉堆貘似熊庳腳鋭䰇骨無髓食銅鐵貘音貃犛音貍師古曰庸牛即今之犎牛也旄牛即今所謂偏牛者也犛牛即今之貓牛者也犛字又音茅麈音主赤首圜題窮奇象犀張揖曰題額也窮奇狀如牛而蝟毛其音如嘷狗食人師古曰象大獸也長鼻牙長一丈犀頭似豬一角在鼻一角在額前其北則盛夏含凍裂地渉氷掲河師古曰言其土地氣寒當暑凝凍地為之裂故渉氷而渡河也掲搴衣也詩邶風匏有苦葉之篇曰深則厲淺則掲音邱例反其獸則麒麟角端騊駼橐駝張揖曰雄曰麒雌曰麟其状麋身牛尾狼題一角角端似牛其角可以為弓郭璞曰麒似麟而無角角端似豬角在鼻上中作弓師古曰麒麟角端郭説是也橐駝者言其可負橐嚢而駝物故以名云蛩蛩驒騱駃騠驢䯁郭璞曰驒騱駏驢類也駃騠生三日而超其母驒音顛騱音奚駃音决騠音提於是乎離宫别館彌山跨谷師古曰彌滿也跨猶騎也髙廊四注重坐曲閣師古曰廊堂下四周屋也重坐謂増室也曲閣閣之屈曲相連者也華榱璧璫輦道纚屬師古曰榱椽也華謂彫畵之也璧璫以玉為椽頭當即所謂璇題玉題者也一曰以玉飾瓦之當也輦道謂閣道可以乗輦而行者也纚屬纚迤相連屬也纚音力爾反屬音之欲反歩櫩周流長途中宿師古曰歩櫩言其下可行歩即今之歩廊也謂其途長逺雖經曰行之尚不能逹故中道而宿也夷嵕築堂絫臺増成師古曰夷平也山之髙聚者曰嵕絫古累字言平山而築堂於其上為累臺也増重也一重為一成也嵕音子公反巖突洞房師古曰於巖穴底為室若竈突然潛通臺上頫杳𦕈而無見仰􅀈橑而捫天師古曰頫古俯字也杳眇視逺貌􅀈古攀字也橑椽也捫摸也言臺榭之髙有升上之者俯視則不見地仰攀其椽可以摸天也橑音老捫音門奔星更於閨闥宛虹拖於楯軒師古曰奔星流星也更歴也閨闥宫中小門也宛虹屈曲之虹也拖謂申加於上也楯軒軒之蘭板也並言室宇之髙故星虹得經加之也更音工衡反虹音紅拖音吐賀反又音徒可反青龍蚴蟉於東箱象輿婉僤於西清師古曰象輿瑞應車也西清者西箱清静之處也蚴蟉婉僤皆行動之貌蚴音一糾反蟉音力糾反僤音善靈圉燕於閒館張揖曰靈圉衆仙號也師古曰閒讀曰閑偓佺之倫暴於南榮郭璞曰偓佺仙人也食松子而眼方暴謂偃卧日中也榮屋南檐也偓音握佺音銓醴泉涌於清室通川過於中庭師古曰醴泉瑞水味甘如醴言於室中涌出而通流為川從中庭而過也磐石裖崖孟康曰祳䂧致也崖亷也以石致川之亷也師古曰祳䂧並音之忍反致音直二反謂重密而累積嶔巖倚傾郭璞曰嶔巖欹貌師古曰嶔音口銜反倚音於綺反嵯峩㠎嶫刻削崢嶸蘇林曰削音陗峻之陗峥音儕争反嶸音户抨反郭璞曰言自然若彫刻也㠎音昨盍反嶫音五盍反師古曰直言刻削耳非云峭峻郭説是也㠎音㨗嶫音業玫瑰碧琳珊瑚叢生郭璞曰珊瑚生水底石邊大者樹髙三尺餘枝格交錯無有葉珉玉旁唐玢豳文磷蘇林曰玢音分郭璞曰旁唐言盤礴玢豳文理貌師古曰旁唐文石也唐字本作碭言珉玉及石並玢豳也玢音彼旻反豳又音彼閑反赤瑕駁犖雜臿其間張揖曰赤瑕赤玉也郭璞曰言雜厠崖石中駁犖采㸃也犖音洛角反鼂采琬琰和氏出焉師古曰鼂古朝字也朝采者美玉毎旦有白虹之氣光采上出故名朝采猶言夜光之璧矣琬琰美玉名和氏之璧卞和所得亦美玉也言今皆出於上林於是乎盧橘夏孰應劭曰伊尹書曰箕山之東青馬之所有盧橘夏孰晉灼曰此雖賦上林博引異方珍奇不係於一也師古曰盧黑色也黄甘橙楱郭璞曰黄甘橘屬而味精楱亦橘之類也音凑張揖曰楱小橘也出武陵師古曰橙即柚也音丈耕反枇杷橪柿亭柰厚朴張揖曰枇杷似斛樹長葉子若杏橪橪支香草也亭山棃也厚朴藥名也郭璞曰橪支木也師古曰此二句總論樹木不得雜以香草也橪郭説得之朴木皮也此藥以皮為用而皮厚故呼厚朴云橪音煙朴音匹角反梬棗楊梅張揖曰楊梅其實似榖子而有核其味酢出江南也櫻桃蒲陶師古曰櫻桃即今之朱櫻也禮記謂含桃爾雅謂之荆桃櫻音於耕反隱夫薁棣師古曰隐夫未詳薁即今之郁李也棣今之山櫻桃薁音於六反棣音徒計反荅遝離支張揖曰荅遝似李出蜀晉灼曰離支大如雞子皮麤剝去皮肌如雞子中黄味甘多酢少師古曰遝音沓離音力智反羅乎後宫列乎北園貤邱陵下平原師古曰貤猶延也一曰次第而重也貤音弋豉反揚翠葉扤紫莖師古曰扤揺也音兀發紅華垂朱榮煌煌扈扈照曜鉅野師古曰言其光采之盛也鉅野大野煌音皇沙棠櫟櫧張揖曰沙棠状如棠黄華赤實其味似李無核吕氏春秋曰果之美者沙棠之實櫟果名也櫧似柃葉冬不落應劭曰櫟采木也郭璞曰櫧似采柔師古曰櫟非果名又非采木之櫟盖木蓼也葉辛初生可食音歴櫧音諸采音菜柔音食諸反宋祁曰柔字當作食渚反華楓枰櫨師古曰華即今之皮貼弓者也楓樹脂可為香今之楓膠香也爾雅云一名欇欇枰即平仲木也櫨今黄櫨木也華音胡化反楓音風枰音平櫨音盧留落胥邪仁頻并閭張揖曰并閭㯶也郭璞曰落檴也中作器素胥邪似并閭皮可作索師古曰仁頻即賔桹也頻字或作賔胥音先余反邪音弋奢反檴音鑊欃檀木蘭孟康曰欃檀檀别名郭璞曰欃音䜛豫章女貞師古曰女貞樹冬夏常青未嘗凋落若有節操故以名焉長千仞大連抱師古曰八尺曰仞連抱者言非一人所抱夸條直暢實葉葰楙郭璞曰夸張布也張揖曰葰甬也師古曰暢通也通謂上下相稱也葰音峻楙古茂字也甬音踊攢立叢倚連卷欐佹師古曰攢立聚立也叢倚相倚也連卷屈曲也欐佹支柱也倚音於綺反卷音邱專反又音巨專反欐音力爾反佹音詭宋祁曰注文柱景本作住崔錯癹骫師古曰崔錯交雜也發委蟠戾也崔音千賄反癹音歩葛反骫古委字坑衡閜砢師古曰坑衡徑直貌也閜砢相扶持也坑音口庚反閜音烏可反砢音來可反坑字或作抗言樹之支幹相抗争衡也其義兩通垂條扶疏落英幡纚師古曰扶疏四布也英謂華也幡纚飛揚貌也纚音山爾反紛溶萷蔘猗柅從風郭璞曰紛溶萷蔘支竦擢也猗柅猶阿那也萷音蕭蔘音森猗音於氏反柅音諾氏反師古曰溶音容萷亦音山交反藰莅芔歙師古曰林木鼓動之聲也藰音劉莅音利芔古卉字也音諱歙音翕盖象金石之聲管籥之音師古曰金石謂鐘磬也管長一尺圍一寸六孔無底籥三孔並以竹為之柴池茈虒旋還乎後宫如淳曰茈音此虒音豸張揖曰柴池参差也茈虒不齊也郭璞曰柴音差還還繞也音宦雜襲絫輯師古曰雜襲相因也絫輯重積也絫古累字輯與集同被山縁谷循阪下隰師古曰循順也下濕曰隰視之無端䆒之亡窮於是乎𤣥猨素雌蜼玃飛蠝張揖曰蜼如母猴卬鼻而長尾玃似彌猴而大飛蠝飛䑕也其状如兎而䑕首以其􅏋飛郭璞曰蠝鼯䑕也毛紫赤色飛且生一名飛生蜼音贈遺之遺蠝音誄師古曰𤣥猨素雌言猨之雄者𤣥黑而雌者白素也爾雅曰玃父善顧也玃音钁鼯音吾蛭蜩玃蝚如淳曰蛭音質張揖曰蛭蟣也蜩蟬也玃蝚彌猴也師古曰方言獸屬而引蛭蟣水蟲又及蜩蟬乖於事類如説非也但未詳是何獸耳蝚音乃髙反又音柔即今所謂戎皮為鞌褥者也戎音柔聲之轉耳非彌猴也宋祁曰蝚當作猱獑胡豰蛫張揖曰獑胡似彌猴頭上有髪要以後黑豰白狐子也郭璞曰豰似鼬而大要以後黄一名黄要食彌猴蛫未聞也獑音䜛豰音呼糓反蛫音詭師古曰豰郭説是也棲息乎其間長嘯哀鳴翩幡互經郭璞曰互經互相經過也夭蟜枝格偃蹇杪顛郭璞曰皆猿猴在樹共戯姿態也夭蟜頻申也師古曰杪顛枝上端也蟜音矯杪音眇隃絶梁騰殊榛師古曰絶梁謂正絶水無橋梁也殊榛特立株枿也言超度無梁之水而跳上株枿之上也隃字與踰同榛音惻人反枿音伍曷反㨗垂條掉希間張揖曰㨗持縣垂之條掉徃著希疏無枝之間也師古曰掉音徒釣反牢落陸離爛漫逺遷師古曰言其聚散不恒雜亂移徙也若此者數百千處娛游徃來宫宿館舍師古曰娛戲也戲音許其反庖厨不徙後宫不移百官備具師古曰言所在之處供具皆足也於是乎背秋渉冬天子校獵李奇曰以五校兵出獵也師古曰李説非也校獵者以木相貫穿總為闌校遮止禽獸而獵取之説者或以為周官校人掌田獵之馬因云校獵亦失其義養馬稱校人者謂以為闌校以養馬耳故呼為闌也事具周禮非以獵馬故稱校人乘鏤象六玉虯張揖曰鏤象象路也以象牙疏鏤其車輅六玉虯謂駕六馬以玉飾其鑣勒有似玉虯龍子有角曰虯拖蜺旌張揖曰析羽毛染以五采綴以縷為旌有似虹蜺之氣也師古曰拖音土賀反又音徒可反靡雲旗張揖曰畫熊虎於旒為旗似雲氣前皮軒後道游文頴曰皮軒以虎皮飾車天子出道車五乗游車九乗在乗輿車前賦頌為偶辭耳師古曰文説非也言皮軒最居前而道游次皮軒之後耳非謂在乗輿之後也皮軒之上以赤皮為重盖今此制尚存又非猛獸之皮用飾車也道讀曰導孫叔奉轡衞公参乘鄭氏曰孫叔者太僕公孫賀也字子叔衞公者大将軍衞青也大駕太僕御大将軍参乗師古曰参乗在車之右也觧具在文紀也扈從横行出乎四校之中文頴曰凡五校今言四者一校中隨天子乗輿也師古曰此説又非也四校者䦨校之四面也言其跋扈縦恣而行出於校之四外也鼓嚴簿縱獵者孟康曰鼓嚴嚴鼓也簿鹵簿也師古曰縦放也簿音歩户反江河為阹泰山為櫓蘇林曰阹獵者圜陳遮禽獸也張揖曰櫓大盾以為翳也郭璞曰櫓望樓也因山谷遮禽獸為阹師古曰因江河以遮禽登泰山而望獲言田獵之廣逺耳郭説是也阹音祛車騎靁起殷天動地郭璞曰殷猶震也師古曰靁古雷字也殷音隐先後陸離離散别追師古曰陸離分散也言各有所追逐也追合韻音竹遂反淫淫裔裔縁陵流澤雲布雨施郭璞曰言徧山野也生貔豹搏豺狼郭璞曰貔執夷虎屬也音毗師古曰貔豹二物皆猛獸也生謂生取之也搏擊也手熊羆足壄羊張揖曰熊犬身人足黑色羆如熊黄白色壄羊麢羊也似羊而青師古曰壄羊今之所謂山羊也非麢羊矣手言手擊殺之足謂蹵蹈而獲之䝉鶡蘇孟康曰鶡鶡尾也蘇析羽也張揖曰鶡似雉鬬死不郤郭璞曰蒙其尾為㡌也鶡音曷絝白虎張揖曰著白虎文絝也師古曰絝古袴字被斑文師古曰被謂衣著之也斑文亦貙豹之皮也被音皮義反跨壄馬師古曰騎之也陵三嵕之危師古曰陵上也三嵕三聚之山也下磧歴之坻師古曰磧歴沙石之貌也坻水中髙處也磧音千狄反坻音遲徑峻赴險越壑厲水師古曰厲以衣度也推蜚廉弄觧廌郭璞曰飛亷龍雀也鳥身鹿頭張揖曰觧廌似鹿而一角人君刑罰得中則生於朝廷主觸不直者可得而弄也師古曰推亦謂弄之也其字從手今流俗讀作椎擊之椎失其義矣觧音蟹廌音丈介反格蝦蛤鋋猛氏孟康曰蝦蛤猛氏皆獸名也郭璞曰今蜀中有獸状似熊而小毛淺有光澤名猛氏師古曰鋋鐵把短矛也蝦音遐蛤音閤鋋音蟬羂要褭射封豕張揖曰要褭馬金喙赤色一日行萬里者郭璞曰封豕大豬也要褭音窈嫋師古曰羂謂羅繫之也音工犬反箭不茍害觧脰䧟腦弓不虛發應聲而倒張揖曰脰項也師古曰言射必命中非詭遇也脰音豆於是乗輿弭節徘徊翺翔徃來郭璞曰言周旋也睨部曲之進退覽將帥之變態師古曰睨衺視也部曲觧在李廣傳睨音五計反然後侵淫促節郭璞曰言短驅也鯈夐逺去師古曰鯈然夐然疾逺貌流離輕禽蹵履狡獸師古曰流離困苦之也􅗗白鹿捷狡莵郭璞曰狡莵健跳故捷取之也宋祁曰南本郭璞曰下云􅗗軸也言軸轢白鹿追捷狡兎也􅗗音衛余謂子虚賦已於􅗗騊駼下注並音矣此疑不合再出軼赤電遺光耀張揖曰軼過也郭璞曰皆妖氣為變怪者遊光之屬追怪物出宇宙張揖曰怪物奇禽也天地四方曰宇古徃今來曰宙師古曰張説宙非也許氏説文觧字云宙舟輿所極覆也彎蕃弱滿白羽文頴曰彎牽也蕃弱夏后氏之良弓名引弓盡箭鏑為滿以白羽羽箭故言白羽也師古曰彎音烏還反蕃音扶元反射游梟櫟蜚遽張揖曰梟惡鳥故射之也櫟梢也飛遽天上神獸也鹿頭而龍身郭璞曰梟梟羊也似人長脣被髪食人師古曰梟郭説近是矣非謂惡鳥之梟也櫟音洛遽音鉅擇肉而后發先中而命處郭璞曰言必如所志者也弦矢分蓺殪仆文穎曰所射凖的為蓺一發死為殪郭璞曰仆斃也殪音翳仆音赴師古曰言弦矢適分則殪死而赴如射蓺也蓺謂射的即今之垜上橜也蓺讀與藝同字亦作臬音魚列反然後揚節而上浮郭璞曰言騰逺也陵驚風歴駭猋師古曰猋謂疾風從下而上也音必遥反乘虛亡與神俱張揖曰虚無廖廓與天通靈言其所乗氣之髙故能出飛鳥之上而與神俱也藺𤣥鶴亂昆雞張揖曰昆雞似鶴黄白色郭璞曰亂者言亂其行伍也遒孔鸞促鵔䴊郭璞曰遒促皆廹捕之也師古曰遒音材由反拂翳鳥張揖曰山海經曰九疑之山有五采之鳥名曰翳鳥也捎鳳皇師古曰捎音山交反捷鵷鶵揜焦明張揖曰焦明似鳳西方之鳥也道盡塗殫廻車而還消㨱乎襄羊降集乎北紘張揖曰淮南子云九州之外曰八澤八澤之外乃有八紘北方之紘曰委羽郭璞曰襄羊猶彷徉也師古曰紘音宏率乎直指師古曰率然直去意揜乎反鄉師古曰揜然疾歸貌蹷石闗歴封巒過䧴鵲望露寒張揖曰此四觀武帝建元中作在雲陽甘泉宮外師古曰蹶蹋歴經也蹷音鉅月反巒音鸞䧴音支宋祁曰䧴越作鳷下堂棃息宜春張揖曰棠棃宫名在雲陽東南三十里師古曰宜春宫名在杜縣東即今曲江池是其處也西馳宣曲張揖曰宣曲宫名也在昆明池曲濯鷁牛首張揖曰牛首池名也在上林苑西頭師古曰濯者所以刺舩也鷁即鷁首之舟也濯音直孝反登龍臺張揖曰觀名也在豐水西北近渭掩細柳郭璞曰觀名也在昆明池南也觀士大夫之勤略師古曰略智略也觀士之勤大夫之略也鈞獵者之所得獲郭璞曰平其多少也徒車之所閵轢郭璞曰徒歩也閵踐也轢輾也音來各反師古曰輾音女展反騎之所蹂若人之所蹈藉師古曰蹂若謂踐蹋也蹂音人九反劉攽曰徒字乃助辭徒猶但也若亦助辭若預及之辭與其窮極倦􅚏驚憚讋伏郭璞曰窮極倦􅚏疲憊也驚憚讋伏讋怖不動貌師古曰􅚏音劇憚音丁曷反讋音之渉反不被創刃而死者它它藉藉郭璞曰言交横也師古曰它音徒河反填阬滿谷掩平彌澤師古曰平平原也彌亦滿也於是乎游戱懈怠置酒乎顥天之臺張揖曰臺髙上干皓天也師古曰顥音胡考反張樂乎膠葛之㝢郭璞曰言曠逺深貌也撞千石之鐘張揖曰千石十二萬斤也立萬石之虡師古曰虡獸名也立一百二十萬斤之虡以縣鐘也建翠華之旗樹靈鼉之鼓師古曰翠華之旗以翠羽為旗上葆也靈鼉之鼓以鼉皮為鼓鼉音徒河反又音徒丹反奏陶唐氏之舞郭璞曰陶唐堯有天下號也如淳曰舞咸池師古曰二家之説皆非也陶唐當為陰康傳寫字誤耳古今人表有葛天氏隂康氏吕氏春秋曰昔陰康氏之始隂多滯伏湛積陽道壅塞不行其序民氣鬱閼筋骨縮栗不逹故作為舞以宣導之髙誘亦誤觧云陶唐堯有天下之號也案吕氏説隂康之後方一一歴言黄帝顓頊帝嚳乃及堯舜作樂之本皆有次第豈再陳堯而錯亂其序乎盖誘不視古今人表妄改易吕氏本文聴葛天氏之歌張揖曰葛天氏三皇時君號也其樂三人持牛尾投足以歌八曲一曰戴民二曰𤣥鳥三曰育草木四曰奮五榖五曰敬天常六曰徹帝功七曰依地徳八曰總禽獸之極師古曰張説八曲是也其事亦見吕氏春秋張云三皇時君失之矣千人倡萬人和師古曰倡讀曰唱山陵為之震動川谷為之蕩波郭璞曰波浪起也巴俞宋蔡淮南干遮師古曰巴俞之人剛勇好舞初髙祖用之克平三秦美其功力後使樂府習之因名巴俞舞也宋蔡二國名淮南地名干遮曲名也文成顛歌文頴曰文成遼西縣名也其縣人善歌顛益州顛縣其民能作西南夷歌也師古曰顛即滇字也其音則同耳族居遞奏金鼓迭起師古曰族聚也聚居而遞奏也金鐘也鐘之與鼔亦互起也迭音徒結反鏗鎗闛鞈洞心駭耳師古曰鏗鎗金聲也闛鞈鼓音也洞徹也駭驚也鏗音口耕反鎗音初衡反闛音託郎反鞈音榻荆吳鄭衞之聲郭璞曰皆淫哇之聲韶濩武象之樂文頴曰韶舜樂也濩湯樂也武武王樂也張揖曰象周公樂也南人服象為虐於夷武王命周公以兵追之至於海南乃為三象樂也陰淫案衍之音郭璞曰流湎曲也師古曰衍音弋戰反鄢郢繽紛激楚結風李奇曰鄢今宜城縣也郢楚都也繽紛舞貌也郭璞曰激楚歌曲也師古曰結風亦曲名也繽音匹人反俳優侏儒狄鞮之倡張揖曰狄鞮西方譯名郭璞曰西戎樂名也師古曰俳優侏儒倡樂可狎玩者也狄鞮郭説是也鞮音丁奚反所以娛耳目樂心意者麗靡爛漫於前郭璞曰言恣所觀也靡曼美色於後張揖曰靡細也曼澤也若夫青琴虙妃之徒伏儼曰青琴古神女也文穎曰虙妃洛水之神女也師古曰虙讀與伏字同絶殊離俗郭璞曰世無雙也妖冶閑都靚荘刻飾便嬛繛約郭璞曰靚莊粉白黛黒也刻刻畫鬋鬢也便嬛輕麗也繛約婉約也嬛音翾靚音淨師古曰妖冶美好也閑都雅麗也繛音綽柔橈嬽嬽嫵媚孅弱師古曰橈動曲也嬽嬽柔曲貌也纎細也細弱總謂骨體也橈音女教反嬽音於圓反嫵音武孅即纎字耳曳獨繭之䄖䄁眇閻易以恤削張揖曰䄖䄡褕也䄁褎也郭璞曰獨繭一繭絲也閻易衣長貌也恤削言如刻畫作之也師古曰褕音踰䄁音曳易音弋示反便姍嫳屑與世殊服師古曰言其行歩安詳容服絶異也便音歩千反姍音先嫳音歩結反芬芳漚鬱酷烈淑郁郭璞曰香氣盛也師古曰漚音一侯反皓齒粲爛宜笑的皪郭璞曰鮮明貌也師古曰皪音礫長眉連娟微睇緜藐郭璞曰連娟言曲細緜藐視逺貌藐音邈師古曰微睇小視也娟音一全反睇音大計反色授魂予心愉於側張揖曰彼色來授魂徃與接也師古曰愉樂也音踰於是酒中樂酣師古曰酒中飲酒中半也樂酣奏樂洽也中音竹仲反天子芒然而思師古曰芒然猶㒺然也芒音莫郎反似若有亡師古曰如有失也曰嗟乎此大奢侈朕以覽聴餘閒無事棄日師古曰言聴政餘暇不能棄日也閒讀曰閑順天道以殺伐郭璞曰因秋氣也時休息以於此郭璞曰謂苑囿中也宋祁曰浙本無以字恐後世靡麗遂往而不返非所以為繼嗣創業垂統也郭璞曰言不可以示将來也師古曰為音于偽反於是乎乃觧酒罷獵而命有司曰地可墾辟悉為農郊以贍氓隸師古曰辟讀曰闢闢開也邑外謂之郊郊野之田故曰農郊也衞風碩人之詩曰説於農郊也隤牆填壍師古曰隤墜也音徒回反使山澤之民得至焉師古曰恣其芻牧樵采者也實陂池而勿禁虛宫館而勿仞師古曰實謂人滿其中言恣其有所取也仞亦滿也勿仞言廢罷之也發倉廩以救貧民補不足恤鰥寡存孤獨出徳號省刑罰師古曰徳號徳音之號令也易夬卦曰孚號有厲是也改制度易服色革正朔與天下為始於是歴吉日以齋戒張揖曰歴猶算也襲朝服乗法駕建華旗鳴玉鸞郭璞曰鸞鈴也在軌曰鸞在軾曰和游于六蓺之囿馳騖乎仁義之塗郭璞曰六蓺禮樂射御書數也塗道也師古曰郭説非也此六蓺謂六經者也覽觀春秋之林如淳曰春秋義理繁茂故比之於林藪也射貍首兼騶虞郭璞曰貍首逸詩篇名諸侯以為射節騶虞召南之卒章天子以為射節也弋𤣥鶴舞干戚郭璞曰干盾戚斧也戴雲䍐揜羣雅張揖曰䍐畢也前有九流雲䍐之車詩小雅之材七十四人大雅之材三十一人故曰羣雅也悲伐檀師古曰伐檀魏國之詩刺在位貪鄙也樂樂胥鄭氏曰詩云于胥樂兮師古曰此説非也謂取小雅桑扈之篇云君子樂胥萬邦之屏耳胥有材智之人也王者樂得有材智之人使在位也胥音先吕反脩容乎禮園翺翔乎書圃師古曰此以上皆取經典之嘉辭以代游獵之娱樂述易道郭璞曰脩絜靜精微之術放怪獸張揖曰苑中奇怪之獸不復獵也登明堂坐清廟恣羣臣奏得失四海之内靡不受獲師古曰言天下之人皆受恩恵豈直於田獵得獸而已於斯之時天下大説鄉風而聴隨流而化芔然興道而遷義師古曰芔然猶歘然也遷徙也徙就於義也刑錯而不用徳隆於三皇功羡於五帝師古曰錯置也羡饒也五帝謂黄帝顓頊帝嚳堯舜也一曰少昊顓頊髙辛堯舜也錯音千故反羡音弋戰反若此故獵乃可喜也若夫終日馳騁勞神苦形罷車馬之用抏士卒之精師古曰罷讀曰疲抏挫也音伍官反費府庫之財而無徳厚之恩務在獨樂不顧衆庶忘國家之政貪雉莵之獲則仁者不繇也師古曰繇讀與由同由用也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾辟而民無所食也師古曰辟讀曰闢夫以諸侯之細而樂萬乘之所侈僕恐百姓被其尤也師古曰尤過也被音皮義反於是二子愀然改容超若自失師古曰愀變色貌音材小反又音秋誘反宋祁曰景本無又音秋誘反五字逡廵避席曰鄙人固陋不知忌諱乃今日見教謹受命矣賦奏天子以為郎亡是公言上林廣大山谷水泉萬物及子虛言雲夢所有甚衆侈靡多過其實且非義理所止故刪取其要歸正道而論之師古曰言不尚其侈靡之論但取終篇歸於正道耳非謂削除其辭也而説者便謂此賦已經史家刋剟失其意矣劉奉世曰觀傳所云則是嘗刪其辭矣若是顔説則刪字為長辭恐非傳意前漢書卷五十七上前漢書卷五十七上考證司馬相如傳上素與臨卭令王吉相善云云凌穉隆曰劉知幾謂此傳相如自作子長錄之班氏曽無増損如果相如自作何以自述鄙事而不諱耶觀賦後有非義理所尚故刪取其要數語此子長㫁語自作之説未可據也衡蘭芷若注師古曰今流俗書本芷若下有射干字妄增之也臣召南按史記有射干二字文選亦有之然則俗本妄増有自來矣据下文騰逺射干是獸名又稾本射干是草名此文是香草名如史記文選則此賦凡三用射干字諸柘巴且史記作諸蔗猼且文選作諸柘巴苴其上則有宛雛孔鸞按史記有赤猨玃猱四字在鴛雛孔鸞之上又蟃蜒貙豻之下史記有兕象野犀窮奇獌狿八字此孟堅所刪也右夏服之勁箭注伏儼曰夏后氏之良弓名煩弱臣召南按煩弱應作繁弱左傳封父之繁弱是也襞積褰縐按此句下文選有紆徐委曲一句又眇眇忽忽若神之髣髴史記作縹乎忽忽若神仙之彷彿又怠而後游于清池史記作怠而後發游于清池又奔揚㑹文選作奔物㑹南有琅邪注張揖曰臺名也在渤海間臣召南按琅邪在東海濵不在渤海張揖注訛地理志云琅邪郡琅邪越王嘗治此起臺館自齊國言之在南若如揖説反在齊北境矣紫淵徑其北注文頴曰西河榖羅縣有紫澤在縣西北按地理志榖羅武澤在西北据頴此注則彼武字訛也東注大湖注郭璞曰在吳縣云云臣召南按此大湖自指闗中巨澤言之非吳地震澤也顔引郭説非是凡巨澤瀦水俱可稱大湖不必震澤前漢書卷五十七上考證欽定四庫全書前漢書卷五十七下漢蘭臺令史班固撰唐正議大夫行袐書少監琅邪縣開國子顔師古注司馬相如傳第二十七下相如為郎數嵗會唐䝉使略通夜郎僰中師古曰行取曰略夜郎僰中皆西南夷也僰音蒲北反發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率師古曰渠大也巴蜀民大驚恐上聞之乃遣相如責唐䝉等因諭告巴蜀民以非上意檄曰告巴蜀太守蠻夷自擅不討之日乆矣時侵犯邊境勞士大夫陛下即位存撫天下集安中國然後興師出兵北征匈奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首来享師古曰來入朝覲豫享祀也一曰享獻也獻其國珍也移師東指閩越相誅右弔番禺太子入朝文穎曰弔至也番禺南海郡治也東伐越後至番禺故言右也師古曰南越為東越所伐漢發兵救之南越蒙天子徳恵故遣太子入朝所以云弔耳非訓至也南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然師古曰喁喁衆口向上也音魚龍反皆鄉風慕義欲為臣妾師古曰鄉讀曰嚮道里遼逺山川阻深不能自致師古曰致至也夫不順者已誅而為善者未賞故遣中郎將徃賓之發巴蜀之士各五百人以奉幣衛使者不然張揖曰不然之變也靡有兵革之事戰鬭之患今聞其乃發軍興制師古曰以發軍之法為興衆之制也驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺師古曰賊猶害也亦非人臣之節也夫邊郡之士聞㷭舉燧燔孟康曰㷭如覆米䉛縣著契臯頭有冦則舉之燧積薪有冦則燔然之也宋祁曰䉛音郁漉水籔皆攝弓而馳荷兵而走師古曰攝謂張弓注矢而持之也攝音女渉反流汗相屬惟恐居後師古曰屬逮也音之欲反觸白刃冒流矢師古曰冒犯也議不反顧計不旋踵人懐怒心如報私讐彼豈樂死惡生非編列之民而與巴蜀異主哉師古曰編列謂編戸也編音布先反計深慮逺急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯如淳曰析中分也白蔵天子青在諸侯也居列東第師古曰東第甲宅也居帝城之東故曰東第也終則遺顯號於後世傳土地於子孫事行甚忠敬居位甚安佚師古曰佚樂也讀與逸同名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤埜屮而不辭也師古曰埜與壄同古野字也􅋄古草字今奉幣使至南夷宋祁云越本使作役即自賊殺或亡逃抵誅師古曰抵至也亡逃而至於誅也身死無名師古曰無善名也諡為至愚師古曰諡者行之迹也終以愚死後葉傳稱故謂之諡恥及父母為天下笑人之度量相越豈不逺哉然此非獨行者之罪也父兄之教不先子弟之率不謹師古曰不先者謂往日不素教之也寡亷鮮恥而俗不長厚也師古曰寡鮮皆少也鮮音息淺反其被刑戮不亦宜乎陛下患使者所司之若彼宋祁曰所司疑作有司悼不肖愚民之如此故遣信使師古曰誠信之人以為使也曉諭百姓以發卒之事師古曰諭告也因數之以不忠死亡之罪師古曰數責也音所具反讓三老孝弟以不教誨之過師古曰讓責也責其教誨不備也方今田時重煩百姓師古曰重難也不欲召聚之也已親見近縣師古曰近縣之人使者已自見而口諭之矣故為檄文馳以示逺所也恐逺所谿谷山澤之民不徧聞檄到亟下縣道師古曰亟急也縣有蠻夷曰道咸諭陛下意毋忽師古曰忽怠忽也相如還報師古曰使訖還報天子也唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二嵗道不成士卒多物故師古曰物故死也解在蘇武傳費以億萬計蜀民及漢用事者多言其不便是時卭莋之君長文頴曰卭者今為卭都縣莋者今為定莋縣師古曰莋音才各反聞南夷與漢通得賞賜多多欲願為内臣妾請吏比南夷上問相如相如曰卭莋冉駹者近蜀道易通師古曰今䕫州開州等首領姓冉者皆舊冉種也駹音尨異時嘗通為郡縣矣師古曰異時猶言徃時也至漢興而罷今仍復通為置縣愈於南夷晋灼曰南夷謂犍為牂牁也西夷謂越巂益州也師古曰愈勝也上以為然乃拜相如為中郎將建節徃使副使者王然于壺充國呂越人馳四乘之傳師古曰傳音張戀反因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎師古曰迎於郊界之上也宋祁曰太守字上疑更有蜀字縣令負弩矢先驅師古曰導路也蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交驩卓王孫喟然而嘆自以得使女尚司馬長卿晩師古曰尚猶配也義與尚公主同今流俗書本此尚字作當葢後人見前云文君恐不得當故改此文以就之耳乃厚分與其女財與男等相如使略定西南夷卭莋冉駹斯榆之君皆請為臣妾除邊闗邊闗益斥師古曰斥開廣也宋祁云淳化本無下邊闗二字西至沬若水張揖曰沬水出蜀廣平徼外若水出旄牛徼外師古曰沬音妹南至牂柯為徼張揖曰徼謂以木石水為界者也如淳曰斯榆之君等自求去邊闗欲與牂柯作徼塞也師古曰徼音工釣反通靈山道橋孫水張揖曰鑿開靈山道置靈道縣孫水出臺登縣南至㑹無入若水師古曰於孫水上作橋也以通卭莋還報天子大說師古曰說讀曰恱相如使時蜀長老多言通西南夷之不為用大臣亦以為然相如欲諫業已建之不敢師古曰本由相如立此事故不敢更諫也乃著書藉蜀父老為辭而已詰難之以風天子師古曰藉假也風讀曰諷且因宣其使指令百姓皆知天子意其辭曰漢興七十有八載徳茂存乎六世宋祁曰六世髙帝恵帝吕氏文帝景帝通武帝六世威武紛云湛恩汪濊師古曰紛云盛貎汪濊深廣也湛讀曰沈汪音烏皇反濊音於喙反宋祁曰汪當作羣生霑濡洋溢乎方外師古曰洋音羊於是乃命使西征随流而攘師古曰攘郤退也音人羊反風之所被罔不披靡師古曰被音丕靡反因朝冉從駹定莋存卭略斯榆舉苞蒲結軌還轅東鄉將報師古曰結屈也軌車迹也鄉讀曰嚮報報天子也至於蜀都耆老大夫搢紳先生之徒二十有七人儼然造焉師古曰造至也造音千到反辭畢進曰師古曰辭謂初謁見之辭葢聞天子之於夷狄也其義覊縻勿絶而已師古曰羈馬絡頭也縻牛紖也言牽制之故取喻也宋祁曰於疑作牧今罷三郡之士通夜郎之塗師古曰罷讀曰疲三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業師古曰屈盡也卒終也業事也此亦使者之累也師古曰累音力瑞反竊為左右患之且夫卭莋西僰之與中國並也歴年茲多不可記已師古曰已語終之辭也仁者不以徳來強者不以力并意者殆不可乎師古曰言古徃帝王雖有仁徳不能招来之雖有強力不能并吞之以其險逺理不可也今割齊民以附夷狄弊所恃以事無用師古曰所恃即中國之人也無用謂西南夷也鄙人固陋不識所謂使者曰烏謂此乎師古曰烏於何也必若所云則是蜀不變服而巴不化俗也僕尚惡聞若說師古曰尚猶也若如也言僕猶惡聞如此之說况乎逺識之人也惡音一故反宋祁曰若汝爾也荘子予語若之類不容詁為如然斯事體大固非觀者之所覯也師古曰覯見也音搆余之行急其詳不可得聞已師古曰言行程急速不暇為汝詳言之請為大夫粗陳其畧師古曰粗猶麄也音千戸反葢世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也師古曰常人見之以為異也故曰非常之元黎民懼焉師古曰元始也非常之事其始難知衆人懼之及臻厥成天下晏如也師古曰臻至也晏安也昔者洪水沸出汜濫衍溢民人升降移徙崎嶇而不安夏后氏戚之乃堙洪原師古曰堙塞也水本曰原堙音因决江疏河灑沈澹災東歸之於海師古曰疏通也灑分也沈深也澹安也言分散其深水以安定其災也灑音所宜反澹音徒濫反而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬傶骿胝無胈膚不生毛張揖曰躬體也傶凑理也孟康曰胈毳膚皮也言禹勤骿胝無有毳毛也師古曰骿音歩千反胝音竹尸反胈音歩曷反臣佖曰檢字書無傶字又戚字說文曰戊也按李善注文選云孟康曰湊湊理也疑漢書傳寫相承誤以湊字作傶字耳合為湊宋祁曰傶南本浙本並作戚集韻傶與戚同收注云博雅近也此文難得句不知師古如何讀之必以躬傶骿胝無胈為一句膚不生毛為一句則長短不均故休烈顯乎無窮聲稱浃乎于茲師古曰休羙也烈業也浃徹也于茲猶言今茲也浃音子牒反且夫賢君之踐位也豈特委瑣握􅐅拘文牽俗師古曰握􅐅局陿也不拘微細之文不牽流俗之議也􅐅音初角反循誦習傳當世取說云爾哉師古曰說讀曰恱言非直因循自誦習所傳聞取羙恱於當時而已必將崇論谹議創業垂統為萬世規師古曰谹深也音宏故馳騖乎兼容并包而勤思乎參天貳地師古曰比徳於地是貳地也地與已并天為三是參天也且詩不云乎普天之下莫非王土率土之濱莫非王臣師古曰小雅北山之詩也普大也濱涯也是以六合之内八方之外師古曰天地四方謂之六合四方四維謂之八方也浸滛衍溢師古曰浸滛猶漸漬也衍溢言有餘也懐生之物有不浸潤於澤者賢君恥之今封疆之内冠帯之倫師古曰倫類也咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絶異黨之域舟車不通人迹罕至政教未加流風猶微内之則犯義侵禮於邊境外之則邪行横作放殺其上師古曰内之謂通其朝獻也外之謂棄而絶之也横音胡孟反殺讀曰弑君臣易位尊卑失序父兄不辜㓜孤為奴虜係絫號泣師古曰為人所獲而絫係之故號泣也絫力追反内鄉而怨師古曰鄉讀曰嚮嚮中國而怨慕也曰葢聞中國有至仁焉徳洋恩普師古曰洋多也物靡不得其所今獨曷為遺已師古曰曷何也已謂怨者之身也舉踵思慕若枯旱之望雨盭夫為之垂涕張揖曰狠戾之夫也師古曰盭古戾字况乎上聖又烏能已師古曰烏猶焉也已止也故北出師以討强胡南馳使以誚勁越師古曰誚責也音材笑反四面風徳師古曰風化也二方之君鱗集仰流師古曰二方謂西夷及南夷也若魚鱗之相次而仰向承流也願得受號者以億計師古曰號謂爵號也一曰受天子之號令也故乃闗沬若張揖曰以沬若水為闗也徼牂柯鏤靈山梁孫原師古曰鏤謂疏通之以開道也梁橋也孫原孫水之原也創道徳之塗垂仁義之統將博恩廣施逺撫長駕張揖曰駕行也使㤙逺安長行之也使疏逖不閉師古曰逖逺也言疏逺者不被閉絶也曶爽闇昧得燿乎光眀師古曰曶爽未眀也䀜音忽以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎師古曰禔安也康樂也禔音土支反宋祁曰禔景本止支反浙本上支反夫拯民於沈溺師古曰拯升也言人在沈溺之中升而舉之也奉至尊之休徳師古曰休羙也反衰世之陵夷繼周氏之絶業師古曰陵夷謂㢮替也天子之急務也百姓雖勞又惡可以已哉師古曰惡讀與烏同已止也且夫王者固未有不始於憂勤而終於佚樂者也師古曰言始能憂勤則終獲逸樂也佚字與逸同然則受命之符合在於此張揖曰合在於憂勤逸樂之中也方將增太山之封加梁父之事鳴和鸞揚樂頌上咸五下登三李竒曰五帝之徳比漢為减三王之徳漢出其上師古曰此說非也咸皆也言漢徳與五帝皆盛而登於三王之上也相如不當言漢減於五帝也觀者未覩指聼者未聞音猶焦朋已翔乎寥廓師古曰寥廓天上寛廣之處寥音聊而羅者猶視乎藪澤師古曰澤無水曰藪悲夫於是諸大夫茫然師古曰茫音莫郎反喪其所懐來失厥所以進師古曰初有所懐而来欲進而陳之今并喪失其来意也喟然並稱曰允哉漢徳師古曰允信也小雅車攻之詩曰允矣君子此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭避師古曰敞罔失志貌靡徙自抑退也其後人有上書言相如使時受金失官居嵗餘復召為郎相如口吃而善著書常有消渇病與卓氏婚饒於財故其事宦未嘗肯與公卿國家之事師古曰與讀曰豫劉奉世曰事當作仕常稱疾閒居不慕官爵師古曰閒讀曰閑也嘗從上至長楊獵師古曰長楊宫也在盩厔是時天子方好自擊熊豕馳逐壄獸相如因上疏諫其辭曰臣聞物有同類而殊能者故力稱烏獲㨗言慶忌師古曰烏獲秦武王力士也慶忌吳王僚子也射能㨗矢也勇期賁育師古曰孟賁古之勇士也水行不避蛟龍陸行不避豺狼發怒吐氣聲響動天夏育亦猛士也臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地師古曰卒讀曰猝音千忽反謂暴疾也不存不可得存安也劉攽曰不存猶言不虞下文云存變之意犯屬車之清塵應劭曰古者諸侯貳車九乗秦滅九國兼其車服漢依秦制故大駕屬車八十一乗師古曰屬者言相連續不絶也塵謂行而起塵也言清者尊貴之意也而說者乃以為清道灑塵謂之清塵非也屬音之欲反輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用師古曰逢蒙古之善射者也孟子曰逢蒙學射於羿枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉師古曰軫車後横木殆危也雖萬全而無患然本非天子之所宜近也宋祁曰或無近字且夫清道而後行中路而馳宋祁曰浙本馳字上有后字猶時有銜橜之變張揖曰銜馬勒銜也橜騑馬口長銜也師古曰橜謂車之鉤心也銜橜之變言馬銜或斷鉤心或出則致傾敗以傷人也橜音鉅月反况乎渉豐草騁丘虛師古曰豐草茂草也虛讀曰墟前有利獸之樂而内無存變之意其為害也不難矣宋祁曰越本作不亦難矣劉敞曰亦字不當刋夫輕萬乗之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取葢眀者逺見於未萌而知者避危於無形師古曰萌謂事始若草木初生者也旤固多藏於隠微而發於人之所忽者也故鄙諺曰家絫千金坐不垂堂張揖曰畏櫩瓦堕中人也師古曰垂堂者近堂邊外自恐墜墮耳非畏櫩瓦也言富人之子則自愛深也此言雖小可以諭大臣願陛下留意幸察上善之還過宜春宫相如奏賦以哀二世行失師古曰宜春本秦之離宫胡亥于此為閻樂所殺故感其處而哀之也其辭曰登陂陁之長阪兮坌入曾宫之嵯峩蘇林曰坌音馬坌叱之坌張揖曰坌並也師古曰曽重也嵯峩髙貌也陂音普何反陁音徒何反坌音普頓反又音歩頓反臨曲江之隑州兮望南山之參差張揖曰隑長也苑中有曲江之象中有長洲也師古曰曲岸頭曰隑隑即碕字耳言臨曲岸之洲今猶謂其處曰曲江隑音鉅依反巖巖深山之谾谾兮通谷􅣲乎􅢋谺晉灼曰谾音籠古豅字也師古曰谾谾深通貌􅣲音呼活反􅢋大開貌􅢋音呼含反谺音呼加反汨淢靸以永逝兮注平臯之廣衍師古曰汨淢疾貌也靸然輕舉意也臯水邊地也汨音于筆反淢音域靸音先合反觀衆樹之蓊薆兮覽竹林之榛榛師古曰蓊薆䕃蔽貌榛榛盛貌蓊音烏孔反薆音愛榛音側中反東馳土山兮北掲石瀨師古曰掲褰衣而渡也石面淺水曰瀨音賴掲音丘例反弭節容與兮歴弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絶師古曰信讒謂殺李斯也烏乎操行之不得師古曰操音千到反墓蕪穢而不修兮魂亡歸而不食宋祁曰姚本作墳墓蕪穢而不修魂魄亡歸而不食相如拜為孝文園令上既羙子虛之事相如見上好僊因曰上林之事未足羙也尚有靡者師古曰靡麗也臣嘗為大人賦未就師古曰就成也請具而奏之相如以為列僊之儒居山澤間師古曰儒柔也術士之稱也凡有道術皆為儒今流俗書本作傳字非也後人所改耳形容甚臞師古曰臞瘠也音鉅句反又音衢此非帝王之僊意也乃遂奏大人賦其辭曰世有大人兮在乎中州師古曰大人以諭天子也中州中國也宅彌萬里兮曾不足以少留師古曰彌滿也悲世俗之迫隘兮朅輕舉而逺游師古曰朅去意也音丘例反乘絳幡之素蜺兮載雲氣而上浮張揖曰乘用也赤氣為幡綴以白氣也師古曰上音時掌反建格澤之修竿兮張揖曰格澤之氣如炎火狀黄白色起地上至天下大上銳修長也建此氣為長竿也師古曰格音胡各反澤音大各反總光燿之采旄張揖曰旄葆也總係也係光耀之氣於長竿以為葆也師古曰緫音揔葆者即今之所謂纛頭也垂旬始以為幓兮李竒曰旬始氣如雄雞見北斗旁張揖曰幓旒也縣旬始於葆下以為十二旒也師古曰幓所銜反曵彗星而為髾張揖曰髾燕尾也枻彗星綴著旒以為燕尾也掉指橋以偃寋兮張揖曰指橋随風指靡也偃寋委曲貌師古曰掉音徒釣反寋音居偃反宋祁曰注文指靡也越本無指字又猗抳以招揺晋灼曰猗音依倚反抳音年纚反張揖曰猗抳下垂貌招揺跳踃也師古曰招音韶踃音蕭㩜攙搶以為旌兮靡屈虹而為綢張揖曰彗星為攙搶注髦首曰旌今以彗星代之也靡順也綢韜也以㫁虹為旌杠之韜也師古曰韜謂裹冒旌旗之竿也攙音初咸反搶音初衡反屈音其勿反綢音直流反紅杳眇以𤣥湣兮猋風涌而雲浮蘇林曰𤣥音炫湣音麵晋灼曰紅赤色貌杳眇深逺也𤣥湣混合也言自絳幡以下衆氣色盛光采相燿幽藹炫亂也師古曰如猋風之涌如雲之浮言輕舉也猋音必遥反駕應龍象輿之蠖略委麗兮驂赤螭青蛇之蚴蟉宛蜒文頴曰有翼曰應龍最其神妙者也師古曰蠖略委麗蚴蟉宛蜒皆其行歩進止之貌也蠖音於縳反麗音力爾反蚴音一紏反蟉音力紏反宛音於元反蜒音延低卬夭蟜裾以驕驁兮詘折隆窮躩以連卷張揖曰裾直項也驕驁縦恣也詘折曲委也隆窮舉鬐也躩跳也連卷句蹄也師古曰裾音倨驕音居召反驁音五到反躩音鉅縳反卷音鉅圎反沛艾赳螑仡以佁儗兮張揖曰沛艾駊騀也赳螑申頸低卭也仡舉頭也佁儗不前也師古曰沛音普盖反赳音古有反螑音火幼反仡音魚乞反佁音丑吏反儗音魚吏反佁儗又音態礙放散畔岸驤以孱顔師古曰畔岸自縦之貌也驤舉也孱顔不齊也孱音士顔反跮踱輵螛容以骫麗兮張揖曰跮踱互前郤也輵螛揺目吐舌也容龍體貌也骫麗左右相隨也師古曰跮音丑日反踱音丑略反輵音遏螛音曷骫古委字也麗音力爾反蜩蟉偃寋怵􅎢以梁倚張揖曰蜩蟉掉頭也怵􅎢奔走也梁倚相著也師古曰蜩音徒釣反蟉音盧鈎反怵音黜􅎢音丑若反倚音於綺反紏蓼呌奡踏以朡路兮張揖曰紏蓼相引也呌奡相呼也踏下也朡著也皆下著道也師古曰呌奡髙舉之貌蓼音力紏反奡音五到反踏音㳫朡音届薎蒙踊躍騰而狂趭張揖曰薎蒙飛揚也踊躍跳也騰馳也趭奔走也師古曰蒙音莫孔反趭音醮莅颯芔歙焱至電過兮煥然霧除霍然雲消張揖曰莅颯飛相及也芔歙走相追也師古曰莅音利颯音立芔音諱歙音翕邪絶少陽而登太隂兮與真人乎相求張揖曰少陽東極太隂北極邪度東極而升北極也真人謂若士也游於太隂之中師古曰真人至真之人也非指謂若士也互折窈窕以右轉兮横厲飛泉以正東張揖曰飛泉飛谷也在崑崙山西南師古曰厲渡也悉徴靈圉而選之兮部署衆神於揺光張揖曰揺光北斗杓頭第一星使五帝先導兮反大壹而從陵陽應劭曰五帝五畤太皥之屬也如淳曰天極大星一眀者太一常居也張揖曰陵陽仙人陵陽子眀也師古曰令太一反其所居而使陵陽侍從於已宋祁曰注文五畤當從浙本作五時左𤣥㝠而右黔雷兮張揖曰𤣥㝠北方黑帝佐也黔雷黔嬴也天上造化神名也楚辭曰召黔嬴而見之或曰水神也前長離而後矞皇服䖍曰皆神名也師古曰長離靈鳥也解在禮樂志矞音以出反厮征伯僑而役羡門兮詔岐伯使尚方應劭曰厮役也張揖曰伯僑仙人王子僑也羡門碣石山上仙人羡門髙也尚主也岐伯者黄帝太醫屬使主方藥也師古曰征伯僑者仙人姓征名伯僑非王子僑也郊祀志征字作正其音同耳或說云征謂役使之非也祝融警而蹕御兮清氣氛而后行張揖曰祝融南方炎帝之佐也獸身人面乘両龍師古曰蹕止行人也御禦也氛惡氣也屯余車而萬乘兮綷雲葢而樹華旗師古曰綷合也合五采雲以為葢也綷音子内反使句芒其將行兮吾欲徃乎南娭張揖曰句芒東方青帝之佐也鳥身人面乘両龍師古曰將行將領從行也娭音許其反歴唐堯於崇山兮過虞舜於九疑張揖曰崇山狄山也海外經曰狄山帝堯葬於其陽九疑山在零陵營道縣舜所葬也師古曰疑似也山有九峯其形相似故曰九疑紛湛湛其差錯兮雜遝膠輵以方馳師古曰湛湛積厚之貌差錯交互也雜遝重絫也膠輵猶交加也湛音徒感反遝音大合反輵音葛騷擾衝蓯其紛挐兮滂濞泱軋麗以林離張揖曰衝蓯相入貌滂濞衆盛貌泱軋不前也麗靡也林離槮攦也師古曰衝音尺勇反蓯音相勇反拏音女居反滂音普郎反濞音普備反泱音烏朗反軋音於黠反槮音所林反欐音所宜反攅羅列聚叢以蘢茸兮衍曼流爛痑以陸離張揖曰痑衆貌一曰罷極也陸離參差也師古曰蘢葺聚貌流爛布散也痑自放縱也蘢音来孔反茸音而孔反衍音弋扇反痑音式爾反張云罷極義則非矣徑入雷室之砰磷鬱律兮洞出鬼谷之堀礨崴魁張揖曰雷室雷淵也洞通也鬼谷在崑崙北直北辰下衆鬼之所聚也堀礨葳魁不平也師古曰砰磷鬱律深峻貌砰音普萌反磷音力耕反堀音口骨反礨音洛賄反葳音一廻反徧覽八紘而觀四海兮朅度九江越五河張揖曰九江在廬江尋陽縣南皆東合為大江者服䖍曰河有九今越其五也晋灼曰五河五湖取河之聲合其音耳師古曰服晋說五河皆非也五河五色之河也仙經說有紫碧綘青黄之河非謂九河之内亦非五湖也經營炎火而浮弱水兮杭絶浮渚渉流沙應劭曰楚辭曰越炎火之萬里弱水出張掖刪丹西至酒泉合黎餘波入於流沙張揖曰杭船也絶度也浮渚流沙中渚也流沙沙與水流行也師古曰弱水謂西域絶逺之水乗毛車以度者耳非張掖弱水也又流沙但有沙流本無水也言絶度浮渚乃渉流沙也杭音下郎反奄息葱極汜濫水娭兮張揖曰奄然休息也葱極葱領山也在西域中使靈媧鼓琴而舞馮夷服䖍曰靈媧女媧也伏犧作琴使女媧鼔之馮夷河伯字也淮南子曰馮夷得道以潜大川師古曰媧音瓜又工蛙反時若曖曖將混濁兮召屏翳誅風伯刑雨師應劭曰屏翳天神使也張揖曰風伯字飛亷師古曰屏音歩丁反西望崑崙之軋沕荒忽兮張揖曰崑崙去中國五萬里天帝之下都也其山廣袤百里髙八萬仞増城九重面有九井以玉為檻旁有五門開眀獸守之軋沕荒忽不分眀之貌師古曰沕音勿荒音呼廣反直徑馳乎三危張揖曰三危山在鳥䑕山之西與㟭山相近黒水出其南陂書曰導黒水至于三危也排閶闔而入帝宫兮載玉女而與之歸張揖曰玉女青要乘弋等也登閬風而遥集兮亢鳥騰而壹止張揖曰閬風山在崑崙閶闔之中遥逺也應劭曰亢然髙飛如鳥之騰也師古曰閬音浪亢音抗低徊隂山翔以紆曲兮吾乃今日覩西王母暠然白首戴勝而穴處兮亦幸有三足烏為之使張揖曰隂山在崑崙西二千七百里西王母其狀如人豹尾虎首蓬髪暠然白首石城金室穴居其中三足烏三足青鳥也主為西王母取食在崑崙墟之北如淳曰山海經曰西王母梯几而戴勝師古曰低徊猶徘徊也勝婦人首飾也漢代謂之華勝暠音工老反字或作翯音學必長生若此而不死兮雖濟萬世不足以喜師古曰昔之談者咸以西王母為仙靈之最故相如言大人之仙娱逰之盛顧視王母鄙而陋之不足羡慕也回車朅来兮絶道不周張揖曰不周山在崑崙東南二千三百里也㑹食幽都呼吸沆瀣兮餐朝霞張揖曰幽都在北方如淳曰淮南云八極西北曰幽都之門應劭曰列仙傳陵陽子言春食朝霞朝霞者日始欲出赤黄氣也夏食沆瀣沆瀣北方夜半氣也并天地𤣥黄之氣為六氣師古曰沆音胡朗反瀣音韰咀噍芝英兮嘰瓊華張揖曰芝草蒻也榮而不實謂之英嘰食也瓊樹生崑崙西流沙濱大三百圍髙萬仞華蘂也食之長生師古曰芝英芝菌之英也咀音才汝反噍音才笑反又音才弱反嘰音機又音祈僸䘲尋而髙縱兮紛鴻溶而上厲張揖曰僸卬也鴻溶竦踊也師古曰僸音角甚反祲音子禁反鴻音胡孔反溶音弋孔反貫列缺之倒景兮服䖍曰列缺天閃也人在天上下向視日月故景倒在下也張揖曰貫穿也陵陽子眀經曰列缺氣去地二千四百里倒景氣去地四千里其景皆倒在下也渉豐隆之滂濞應劭曰豐隆雲師也楚辭曰吾令豐隆乘雲兮淮南子曰季春三月豐隆乃出以將雨師古曰豐隆將雨故言渉也滂濞雨水多也滂音普郎反濞音匹備反騁㳺道而修降兮騖遺霧而逺逝張揖曰馳疾而遺霧在後也師古曰游游車也道道車也修長也降下也言周覽天上然後騁車也循長路而下馳棄遺霧而逺逝也道讀曰導廹區中之隘陜兮舒節出乎北垠師古曰舒緩也垠崖也音銀遺屯騎於𤣥闕兮張揖曰𤣥闕北極之山也軼先驅於寒門應劭曰寒門北極之門也師古曰軼過也音逸下峥嶸而無地兮師古曰崢嶸深逺貌崢音仕耕反嶸音宏上嵺廓而無天師古曰嵺廓廣逺也嵺音遼視眩泯而亡見兮聼敞怳而亡聞師古曰眩泯目不安也敞怳耳不諦也眩音州縣之縣泯音眄乗虛亡而上遐兮超無友而獨存師古曰上音時掌反宋祁曰友字浙本作有字相如既奏大人賦天子大說師古曰說讀曰恱飄飄有陵雲氣游天地之間意相如既病免家居茂陵天子曰司馬相如病甚可徃從悉取其書若後之矣師古曰若汝也言汝今去已在他人後也使所忠徃師古曰使者姓名也解在食貨志宋祁曰浙本正文無使字而相如已死家無遺書問其妻宋祁曰别本無其字對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使来求書奏之其遺札書言封禪事師古曰書於札而留之故云遺札所忠奏焉天子異之其辭曰伊上古之初肇自顥穹生民師古曰肇始也顥穹皆謂天也顥言氣顥汗也穹言形穹隆也謂自初始有天地以來也顥音胡老反歴選列辟以迄乎秦師古曰選數也辟君也迄至也辟音璧率邇者踵武聼逖者風聲文頴曰率循也邇近也踵蹈也武迹也逖逺也言循履近者之遺迹聼逺者之風聲風謂著於雅頌者也師古曰風聲㧾謂遺風嘉聲耳無繋於雅頌也紛輪威蕤堙滅而不稱者不可勝數也張揖曰紛輪威蕤亂貌繼昭夏崇號諡略可道者七十有二君文穎曰昭眀也夏大也徳眀大相繼封禪於泰山者七十有二人也罔若淑而不昌疇逆失而能存應劭曰罔無也若順也淑善也疇誰也師古曰言行順善者無不昌大為逆失者誰能乆存也軒轅之前遐哉邈乎其詳不可得聞已師古曰遐邈皆逺也已語終之辭五三六經載籍之傳維見可觀也師古曰五五帝也三三皇也宋祁曰皇當作王書曰元首眀哉股肱良哉師古曰此虞書益稷之語也元首君也股肱大臣也因斯以談君莫盛於堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成文穎曰郅至也行道也文王始開王業改正朔服色太平之道於是成也應劭曰大行道徳大行也師古曰郅音質而后陵遲衰微千載亡聲豈不善始善終哉鄭氏曰亡聲無有惡聲也師古曰雖後嗣衰微政教頺替猶經千載而無惡聲然無異端慎所由於前謹遺教於後耳師古曰言既創業定制又垂裕後昆也故軌迹夷易易遵也師古曰夷易皆平也易音弋䜴反湛恩庬洪易豐也師古曰湛讀曰沈沈深也庬洪皆大也庬音尨憲度著眀易則也垂統理順易繼也張揖曰垂縣也統緒也理道也文王重易六爻窮理盡性縣於後世其道和順易續而眀孔子得錯其象而彖其辭也師古曰統業直言所垂之業其理至順故令後嗣易繼之耳非謂演易也是以業隆於繦保而崇冠乎二后孟康曰繦保謂成王也二后謂文武也周公負成王以致太平功徳冠於文武者遵成法易故也揆厥所元終都攸卒師古曰元始也都於也攸所也卒亦終也言度其所始究其所終也未有殊尤絶迹可考於今者也師古曰尤異也考校也言不得與漢校其徳也然猶躡梁甫登太山建顯號施尊名大漢之徳逢涌原泉沕潏曼羡師古曰逢讀曰㷭言如㷭火之升原泉之流也沕潏曼羡盛大之意也沕音勿潏音聿羡音弋扇反旁魄四塞雲布霧散師古曰旁魄廣被也魄音歩各反上暢九垓下泝八埏服䖍曰暢達也垓重也天有九重如淳曰淮南云若士謂盧敖吾與汗漫期乎九垓之上孟康曰泝流也埏地之八際也言徳上達於九重之天下流於地之八際師古曰埏本音延合韻音弋戰反淮南子作八夤也懐生之類沾濡浸潤恊氣横流武節焱逝師古曰言和氣横被四表威武如焱之盛邇陿㳺原迥濶泳末孟康曰邇近也原本也迥逺也濶廣也泳浮也㤙徳比之於水近者㳺其原逺者浮其末也首惡鬱沒闇昧昭晣師古曰始為惡者皆即湮滅素暗昧者皆得光明也晰音之舌反昆蟲闓懌囬首面内文頴曰闓懌皆樂也師古曰闓讀曰凱言四方幽遐皆懐和樂回首革面而内嚮也然后囿騶虞之珍羣徼麋鹿之怪獸師古曰言騶虞自擾而充苑囿怪獸自来若入徼塞言符瑞之盛也徼音工釣反劉奉世曰此言騶虞可致於囿中怪獸可驅於徼外耳導一莖六穂於庖鄭氏曰導擇也一莖六穂謂嘉禾之米於庖厨以供祭祀也犧雙觡共抵之獸服䖍曰犧牲也觡角也抵本也武帝獲白麟両角共一本因以為牲也宋祁曰觡音居額反獲周餘放龜於岐文頴曰周放畜餘龜於池沼之中至漢得之於岐山之旁龜能吐故納新千嵗不死也招翆黄乘龍於沼張揖曰乘龍四龍也孟康曰翠黄乗黄也龍翼馬身黄帝乗之而仙言見乘黄而招呼之禮樂志曰訾黄其何不來下余吾渥洼水中出神馬故曰乘龍於沼也師古曰此說非也言招致翠黄及乘龍於池沼耳乘音食證反春秋傳曰帝賜之乘龍劉奉世曰此則下文黄龍一瑞也翠黄言其色翠而黄非别物鬼神接靈圉賓於閒舘文頴曰是時上求神仙之人得上郡之巫長陵女子能與鬼神交接治病輙愈置於上林苑中號曰神君有似於古之靈圉禮待之於閒舘舍中也師古曰閒讀曰閑劉奉世曰鬼神接下疑少三字竒物譎詭俶儻窮變師古曰俶音吐歴反欽哉符瑞臻茲猶以為薄不敢道封禪葢周躍魚隕杭休之以燎應劭曰杭舟也休羙也師古曰燎祭天也謂武王伐紂白魚入于王舟俯取以燎微夫斯之為符也以登介丘不亦恧乎服䖍曰介大也丘山也言周以白魚為瑞登太山封禪不亦慙乎進攘之道何其爽與張揖曰進周也攘漢也爽差也言周未可封禅而封為進漢可封禪而不為為攘也師古曰攘古讓字於是大司馬進曰文頴曰大司馬上公故先進議也陛下仁育羣生義征不譓文頴曰譓順也諸夏樂貢百蠻執贄師古曰夏大也諸夏謂中國之人比蠻夷為大也徳牟徃初功無與二師古曰牟䓁也休烈液洽符瑞衆變期應紹至不特創見師古曰言符瑞衆多應期相續而至不獨初創而見也宋祁曰液疑作浹期應浙本作斯應予謂疑當作應期意者太山梁父設壇場望幸葢號以况榮孟康曰意者言太山梁父設壇場望聖帝徃封禪紀號以表榮名也師古曰幸臨幸也葢發語辭也上帝垂恩儲祉將以慶成師古曰上帝天也言垂恩於下豫積祉福用慶告成之禮陛下嗛讓而弗發也張揖曰不肯發意徃也師古曰嗛古謙字挈三神之歡缺王道之儀應劭曰挈絶也缺闕也如淳曰三神地祗天神山嶽也師古曰挈音口計反羣臣恧焉師古曰恧愧也音女六反或謂且天為質闇示珍符固不可辭師古曰言天道質昧以符瑞見意不可辭讓也若然辭之是泰山靡記而梁甫罔㡬也張揖曰泰山之上無所表記梁父壇場無所庶㡬也亦各並時而榮咸濟厥世而屈說者尚何稱於後而云七十二君哉應劭曰屈絶也言古帝王若但各一時之榮畢世而絶者則說者無從顯稱於後也師古曰屈音其勿反夫修徳以錫符奉符以行事不為進越也文頴曰越踰也不為茍進踰禮也故聖王弗替而修禮地祗謁欵天神文頴曰謁告也欵誠也師古曰替廢也不廢封禪之事也勒功中岳以章至尊張揖曰葢先禮中岳而幸太山也師古曰章眀也舒盛徳發號榮受厚福以浸黎民皇皇哉斯事天下之壯觀王者之卒業不可貶也師古曰皇皇盛貌也卒終也字或作本或作丕丕大也願陛下全之張揖曰願以封禪全其終也而后因雜縉紳先生之略術使獲曜日月之末光絶炎以展采錯事文頴曰采官也使諸儒記功著業得觀日月末光殊絶之眀以展其官職設錯其事業也李竒曰炎音火之光炎師古曰炎音弋贍反錯音千故反猶兼正列其義袚飾厥文作春秋一蓺孟康曰猶作春秋者正天時列人事也言諸儒既得展事業因兼正天時列人事敘述大義為一經也師古曰祓除也祓飾者言除去舊事更飾新文也祓音敷勿反宋祁曰浙本祓音方吠反將襲舊六為七攄之無窮文頴曰六經加一為七也師古曰攄布也音丑居反俾萬世得激清流揚微波蜚英聲騰茂實師古曰蜚古飛字前聖之所以永保鴻名而常為稱首者用此師古曰稱音尺孕反宜命掌故悉奏其儀而覽焉師古曰掌故太常官屬主故事者於是天子沛然改容曰俞乎朕其試哉師古曰沛然感動之意也俞者然也然其所請也沛音普大反俞音踰乃遷思回慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富孟康曰詩所以詠功徳謂下四章之頌也大澤之博謂自我天覆雲之油油也廣符瑞之富謂班班之獸以下三章言符應廣大富饒也劉奉世曰嘉糓亦符瑞之一也此但包舉作頌之意不必别之廣謂廣聞其事遂作頌曰自我天覆雲之油油蘇林曰油音油麻之油李竒曰油油雲行貌孟子曰油然作雲沛然下雨甘露時雨厥壤可游師古曰言雨霧滂沛其澤可以游泳也滋液滲漉何生不育師古曰滲漉謂潤澤下究故無生而不育也滲音山禁反漉音鹿嘉糓六穂我穡曷蓄李竒曰我之稼穡何等不蓄積匪唯雨之又潤澤之匪唯偏我汜布䕶之師古曰汜普也布䕶言遍布也汜音敷劒反萬物熙熙懐而慕之名山顯位望君之來君兮君兮侯不邁哉師古曰侯何也邁行也言君何不行封禪般般之獸樂我君圃白質黒章其儀可喜師古曰謂騶虞也般字與斑同耳從丹青之丹喜音許記反旼旼穆穆君子之態孟康曰旼旼和也穆穆敬也言容態和且敬有似君子也張揖曰旼音旻葢聞其聲今視其來師古曰言徃昔但聞其聲今親見其來也來合韻音郎代反厥塗靡從天瑞之徴文頴曰其來之道何從乎此乃天瑞之應也兹爾於舜虞氏以興文頴曰百獸舞則騶虞在其中也濯濯之麟游彼靈畤孟冬十月君徂郊祀文頴曰濯濯肥也武帝冬幸雍祠五畤獲白麟也師古曰濯音直角反大雅靈臺之詩云麀鹿濯濯馳我君輿帝用享祉文頴曰馳我君車之前也師古曰帝天帝也以此祭天天既享之答以祉福也三代之前葢未嘗有宛宛黄龍興徳而升文頴曰起至徳而見也采色𤣥耀炳炳煇煌師古曰𤣥讀曰炫煇煌光貌煇音下本反宋祁曰炳炳越本作煥炳正陽顯見覺寤黎烝文頴曰陽眀也師古曰黎烝衆庶也於傳載之云受命所乘師古曰謂易云時乗六龍以御天也劉奉世曰如長卿所云則葢元狩以前皆嘗有此瑞不知史不徧記何也厥之有章不必諄諄文頴曰天之所命表以符瑞章眀其徳不必諄諄然有語言也師古曰諄諄告喻之熟也音之純反依類託寓諭以封巒文頴曰寓寄也巒山也言依事類託寄以喻封禅披蓺觀之天人之際已交上下相發允答聖王之事兢兢翼翼師古曰兢兢戒也翼翼敬也故曰於興必慮衰安必思危是以湯武至尊嚴不失肅祗師古曰言居天子之位猶不忘恭敬也舜在假典顧省厥遺師古曰在察也假大也典則也言舜察璇璣玉衡恐已政化有所遺失不合天心今漢亦當順天意而封禪也此之謂也相如既卒五嵗上始祭后土八年而遂禮中岳封于太山至梁甫禪肅然相如它所著若遺平陵侯書與五公子相難草木書篇不采采其尤著公卿者云贊曰司馬遷稱春秋推見至隠李竒曰隠猶微也言其義顯而文隠若隠公見弑死而經不書隠諱之也易本隠以之顯張揖曰作八卦以通神眀之徳是本隠也有天道焉有地道焉有人道焉以類萬物之情是之顯也師古曰之徃也大雅言王公大人而徳逮黎庶張揖曰謂文王公劉在位大人之徳下及衆民者也小雅譏小已之得失其流及上張揖曰已詩人自謂也已小有得失不得其所作詩流言以諷其上也師古曰小已者謂卑少之人以對上言大人耳所言雖殊其合徳一也相如雖多虛辭濫說然要其歸引之於節儉此亦詩之風諌何異師古曰風讀曰諷次下亦同揚雄以為靡麗之賦勸百而諷一師古曰奢靡之辭多而節儉之言少也猶騁鄭衛之聲曲終而奏雅不已戲乎張揖曰不亦輕戲乎哉宋祁曰已當作亦前漢書卷五十七下前漢書卷五十七下考證司馬相如傳下今聞其乃發軍興制注師古曰以發軍之法為興衆之制也許應元曰發軍興制即前所謂用軍興法顔注非除邊闗邊闗益斥宋祁曰淳化本無下邊闗二字臣召南按史記作除邊闗闗益斥文選亦然似淳化本脫一闗字而今本又衍一邊字也西至沬若水注張揖曰沬水出蜀廣平徼外若水出旄牛徼外臣召南按蜀郡有廣都廣柔二縣無廣平縣平字訛也但地理志于廣都廣柔二縣下不云沬水出徼外未知張揖所据又按沬水即大渡河志曰渽水出汶江縣徼外南至南安東入江而大渡水出青衣縣東南至南安入渽渽水即水經注之涐水也若水今名打冲河通靈山道注張揖曰鑿開靈山道置靈道縣臣召南按史記作通靈闗道以地理志証之越嶲有靈闗道則本文山字訛也張揖注置靈道縣亦脫一闗字乃湮洪原文選作湮洪塞原躬傶骿胝無胈膚不生毛注臣佖曰云云按張佖之上當有一圏以别于顔注又宋祁曰此文難得句按史記作躬胝無胈文選作躬腠胝無胈句亦不齊魂亡歸而不食此文下史記有夐遂絶而不齊兮五句葢班氏刪之也繼昭夏史記作繼韶夏又維見可觀也文選作維風可觀也匪唯偏我史記作非惟濡之文選作非惟徧之又其儀可喜文選作可嘉前漢書卷五十七下考證
