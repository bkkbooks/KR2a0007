body:
  text: 前漢書卷九十一漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注貨殖傳第六十一昔先王之制自天子公侯卿大夫士至於皁𨽻抱關擊橛者師古曰皁飬馬者也𨽻之言著也屬著於人也抱關守門者也擊橛守夜擊木以警衆也橛音吐各反其爵祿奉飬宫室車服棺槨祭祀死生之制各有差品小不得僭大賤不得踰貴夫然故上下序而民志定於是辯其土地川澤邱陵衍沃原隰之宜師古曰衍謂地平衍者也沃水之所灌沃也廣平曰原下溼曰隰宋祁曰注文地字下疑有形字下沃疑作浸教民樹種畜飬師古曰樹殖也五穀六畜及至魚龞鳥獸雚蒲材幹器械之資師古曰雚薍也即今之荻也械者器之總名也雚音桓薍音五宦反荻音敵所以飬生送終之具靡不皆育育之以時而用之有節草木未落斧斤不入於山林師古曰禮記月令云季秋之月草木黄落乃伐薪為炭豺獺未祭罝網不布於壄澤師古曰禮記王制云獺祭魚然後虞人入澤梁豺祭獸然後田獵月令孟春之月獺祭魚季秋之月豺乃祭獸戮禽罝兎網也音嗟鷹隼未擊矰弋不施於徯隧師古曰隼亦鷙鳥即今所呼為鶻者也月令孟秋之月鷹乃祭鳥用始行戮弋繳射也矰者弋之矢也徯隧徑道也矰音曽徯音奚隧音遂鶻音胡骨反既順時而取物然猶山不茬蘖澤不伐夭師古曰茬古槎字也槎邪斫木也蘖髠斬之也此夭謂草木之方長未成者也槎音土牙反蘖音五葛反夭音烏老反劉奉世曰蘖讀如牙蘖之蘖旁出嫩枝也義與夭相對宋祁曰茬浙本音大雅反蝝魚麛卵咸有常禁師古曰蝝小蟲也麛鹿子也卵鳥卵也月令孟春之月毋殺孩蟲毋麛毋卵蝝音弋全反麛音莫奚反所以順時宣氣蕃阜庶物師古曰蕃多也阜盛也蕃音扶元反稸足功用如此之備也師古曰稸即蓄字然後四民因其土宜各任智力夙興夜寐以治其業相與通功易事交利而俱贍師古曰言以其所有交易所無而不匱乏非有徵發期㑹而逺近咸足故易曰后以財成輔相天地之宜以左右民師古曰泰卦象辭也后君也左右助也言王者資財用以成教賛天地之化育以救助其衆庶也左右讀曰佐佑備物致用立成器以為天下利莫大乎聖人師古曰上繫之辭也備物致用謂備取百物而極其功用宋祁曰一作立功成器一作立物立功致用成器此之謂也管子云古之四民不得雜處師古曰管仲之書也士相與言仁誼於間宴師古曰間讀曰閑工相與議技巧於官府商相與語財利於市井師古曰凡言市井者市交易之處井共汲之所故總而言之也説者云因井而為市其義非也農相與謀稼穡於田壄朝夕從事不見異物而遷焉師古曰言非其本業則弗觀視故能各精其事不移易宋祁曰注末疑有也字故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見竒麗紛華非其所習辟猶戎翟之與于越不相入矣孟康曰于越南方越名也師古曰于發語聲也戎蠻之語則然于越猶句呉耳辟讀曰譬是以欲寡而事節財足而不爭於是在民上者道之以徳師古曰道讀曰導齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大畧也師古曰直道而行謂以徳禮率下不飾偽也及周室衰禮法墮師古曰墮毁也音火規反諸侯刻桷丹楹大夫山節藻棁師古曰桷椽也楹柱也節栭也山刻為山形也棁侏儒柱也藻謂刻鏤為水藻之文也刻桷丹楹魯桓宫也山節藻棁臧文仲也宋祁曰注文椽字疑作欀八佾舞於庭雍徹於堂師古曰八佾舞於庭謂季氏也以雍樂徹食三家則然事見論語其流至於士庶人莫不離制而棄本稼穡之民少商旅之民多榖不足而貸有餘陵夷至乎桓文之後師古曰齊桓晉文也禮誼大壞上下相冒國異政家殊俗耆欲不制僭差亡極師古曰耆讀曰嗜其下並同極止也於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資師古曰追逐也偽民背實而要名姦夫犯害而求利簒弑取國者為王公圉奪成家者為雄桀師古曰圉謂禁守其人也劉敞曰圉讀如禦人於國門之禦禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者裋褐不完唅菽飲水師古曰裋布長襦也褐編枲衣也裋音豎唅亦含字也菽豆也其為編戸齊民同列而以財力相君雖為僕虜猶亡愠色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於饑寒之患其教自上興繇法度之無限也師古曰繇讀與由同故列其行事以傳世變云昔粤王句踐困於㑹稽之上廼用范蠡計然孟康曰姓計名然越臣也蔡謨曰計然者范蠡所著書篇名耳非人也謂之計然者所計而然也羣書所稱句踐之賢佐種蠡為首豈聞復有姓計名然者乎若有此人越但用半䇿便以致霸是功重於范蠡蠡之師也焉有如此而越國不記其事書籍不見其名史遷不述其傳乎師古曰蔡説謬矣據古今人表計然列在第四等豈是范蠡書篇乎計然一號計研故戲賔曰研桑心計於無垠即謂此耳計然者濮上人也博學無所不通尤善計筭嘗南遊越范蠡卑身事之其書則有萬物録著五方所出皆直述之事見皇覽及晉中經簿又呉越春秋及越絶書並作計倪此則倪研及然聲皆相近實一人耳何云書籍不見哉宋祁曰注文故戲賔當作故荅賔戲計然曰知鬭則脩偹時用則知物二者形則萬貨之情可得見矣師古曰形顯見故旱則資舟水則資車物之理也師古曰旱極則水水極則旱故於旱時而預蓄舟水時預蓄車以待其貴收其利也推此類而脩之十年國富厚賂戰士遂報彊呉刷㑹稽之恥師古曰刷謂拭除之也音所劣反范蠡歎曰計然之䇿十用其五而得意既以施國吾欲施之家廼乗扁舟孟康曰特舟也師古曰音匹延反浮江湖變姓名適齊為鴟夷子皮師古曰自號鴟夷者言若盛酒之鴟夷多所容受而可卷懷與時張弛也鴟夷皮之所為故曰子皮之陶為朱公孟康曰陶即今定陶也以為陶天下之中諸侯四通貨物所交易也廼治産積居與時逐孟康曰逐時而居買也師古曰此説非也言豫居貨物與時而逐利而不責於人劉攽曰與時逐宜屬下句治産治凡可以生息者積居積貯成物居停之與時逐而不責於人言此兩事自與天時馳逐無求責於人也故善治産者能擇人而任時十九年之間三致千金而再散分與貧友昆弟後年衰老聽子孫脩業而息之師古曰息生也遂至鉅萬故言富者稱陶朱子贛既學於仲尼退而仕衛師古曰孔子弟子姓端木名賜也發貯鬻財曹魯之間師古曰多有積貯趣時而發鬻賣之也鬻音弋六反七十子之徒賜最為饒師古曰言於弟子之中最為富而顔淵簞食瓢飲在於陋巷師古曰簞笥也食飯也瓢瓠勺也一簞之飯一瓢之飲至貧也簞音丁安反食音似瓢音頻遥反宋祁曰注文至字上當有言字子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之亢禮師古曰為賔主之禮然孔子賢顔淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中師古曰論語載孔子之言也顔回庶幾聖道雖數空匱而樂在其中子贛不受教命惟財是殖億度是非幸而中耳意讀曰億中音竹仲反白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我予能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生猶伊尹吕尚之謀孫呉用兵商鞅行法是也故智不足與權變勇不足以決斷仁不足以取予彊不能以有守雖欲學吾術終不告也蓋天下言治生者祖白圭師古曰祖始也以其法為本始也猗頓用盬鹽起師古曰猗頓魯之窮士也盬鹽池也於盬造鹽故曰盬鹽盬音古邯鄲郭縱以鑄冶成業與王者埓富師古曰埓等也烏氏蠃畜牧師古曰氏音支烏氏姓也嬴名也其人為畜牧之業也及衆斥賣師古曰畜牧蕃盛其數多則出而賣之也求竒繒物間獻戎王師古曰避時之禁故伺間隙私遺戎王戎王十倍其償宋祁曰償字上當有價字予畜畜至用谷量牛馬師古曰言其數饒不可計筭故以山谷多少言之秦始皇令蠃比封君以時與列臣朝請師古曰與讀曰豫請音才姓反巴寡婦清師古曰以其行絜故號曰清也其先得丹穴而擅其利數世師古曰丹丹砂也穴者山谷之穴出丹也家亦不訾師古曰言資財衆多無限數訾音子移反清寡婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺秦漢之制列侯封君食租稅歲率戸二百千戸之君則二十萬朝覲聘享出其中庶民農工商賈率亦歲萬息二千百萬之家即二十萬而更繇租賦出其中師古曰更音工衡反繇讀曰徭衣食好美矣故曰陸地牧馬二百蹏孟康曰五十匹也師古曰蹏古蹄字牛千蹏角孟康曰百六十七頭也馬貴而牛賤以此為率也師古曰百六十七頭牛則為蹄與角凡一千二也言千者舉成數也宋祁曰牛千蹏角越本作牛蹏角千千足羊師古曰凡言千足者二百五十頭也澤中千足彘水居千石魚波師古曰波讀曰陂言有大陂飬魚一歲收千石魚也説者不曉乃改其波字為皮又讀為披皆失之矣山居千章之萩孟康曰萩任方章者千枚也師古曰大材曰章解在百官公卿表萩即楸樹字也其下並同也宋祁曰注文浙本百官公卿表句下有萩不在山明矣六字刪樹字兩也字安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北滎南河濟之間千樹萩師古曰滎亦水名濟水所溢作也即今所謂滎澤也陳夏千畝桼師古曰陳陳縣也夏夏縣也皆屬淮陽種桼樹而取其汁夏音嘏齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田孟康曰一鍾受六斛四斗師古曰一畝收鍾者凡千畝也宋祁曰注文師古曰下當有言字若千畝巵茜孟康曰茜草巵子可用染也師古曰茜音千見反千畦薑韭師古曰畦音攜此其人皆與千户侯等諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也師古曰言其易以得利也通邑大都酤一歲千釀師古曰千瓮以釀酒醯醬千瓨師古曰瓨長頭甖也受十升瓨音胡雙反宋祁曰注文中頭字當作頸字升字當作斗字雙字當作江字漿千儋孟康曰儋甖也師古曰儋人儋之也一儋兩甖儋音丁濫反屠牛羊彘千皮榖糴千鐘師古曰謂常糴取而居之薪槀千車舡長千丈師古曰總積舡之丈數也木千章竹竿萬个孟康曰个者一个兩个師古曰个讀曰箇箇枚也宋祁白注文師字上當有也字軺車百乗師古曰軺車輕小之車也軺音弋昭反牛車千兩師古曰車一乗曰一兩謂之兩者言其轅輪兩兩而耦木器桼者千枚銅器千鈞孟康曰三十斤為一鈞素木鐵器若巵茜千石孟康曰百二十斤為石素木素器也馬蹏噭千師古曰噭口也蹄與口共千則為馬二百也噭音江釣反又音口釣反牛千足羊彘千雙師古曰彘即豕童手指千孟康曰童奴婢也古者無空手游口皆有作務作務須手指故曰手指以别馬牛蹏角也師古曰手指謂有巧技者指千則人百筋角丹砂千斤其帛絮細布千鈞文采千匹師古曰文文繒也帛之有色者曰采荅布皮革千石孟康曰荅布白疊也師古曰麤厚之布也其價賤故與皮革同其量耳非白疊也荅者厚重之貌而讀者妄為搨音非也桼千大斗師古曰大斗者異於量米粟之斗也今俗猶有大量糵麴鹽豉千合師古曰麴糵以斤石稱之輕重齊則為合鹽豉則斗斛量之多少等亦為合合者相配偶之言耳今西楚荆沔之俗賣鹽豉者鹽豉各一升則各為裹而相随焉此則合也説者不曉廼讀為升合之合又改作台競為解説失之逺矣鮐鮆千斤師古曰鮐海魚也鮆刀魚也飲而不食者鮐音胎又音菭鮆音薺又音才爾反而説者妄讀鮐為夷非惟失於訓物亦不知音矣鮿鮑千鈞師古曰鮿膊魚也即今不著鹽而乾者也鮑今之䱒魚也鮿音輒膊音普各反䱒音於業反而説者乃讀鮑為鮠魚之鮠音五回反失義逺矣鄭康成以為䱒於煏室乾之亦非也煏室乾之即鮿耳蓋今巴荆人所呼鰎魚者是也音居偃反秦始皇載鮑亂臭則是䱒魚耳而煏室乾者本不臭也煏音蒲北反棗栗千石者三之師古曰三千石狐貂裘千皮羔羊裘千石師古曰狐貂貴故計其數羔羊賤故稱其量也旃席千具它果采千種師古曰果采謂於山野采取果實也子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其餘利比於千乗之家也師古曰儈者合㑹二家交易者也駔者其首率也駔音子朗反儈音工外反貪賈三之廉賈五之孟康曰貪賈未當賣而賣未當買而買故得利少而十得其三廉賈貴乃賣賤乃買故十得五也劉敞曰貪賈務賒貸仍取厚利常多亡失故三之廉賈取之約未嘗亡失故五之劉奉世曰此謂子貸取息也貪賈取利多故三分取息一分廉賈則五分取一耳所謂歲萬息二千也亦比千乗之家此其大率也蜀卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦行師古曰歩車曰輦諸遷虜少有餘財爭與吏求近處處葭萌師古曰縣名地理志屬廣漢葭音家惟卓氏曰此地陿薄吾聞㟭山之下沃壄下有踆鴟至死不饑孟康曰踆音蹲水鄉多鴟其山下有沃野灌溉師古曰孟説非也踆鴟謂芋也其根可食以充糧故無饑年華陽國志曰汶山郡都安縣有大芋如蹲鴟也民工作布易賈乃求逺遷致之臨卭大憙即鐵山鼓鑄師古曰即就也運籌筭賈滇蜀民師古曰行販賣於滇蜀之間也滇音丁賢反富至童八百人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈魋結民富埓卓氏師古曰魋結西南夷也言程鄭行賈求利於其人也埓等也魋音直追反結讀曰髻程卓既衰至成哀間成都羅裒訾至鉅萬初裒賈京師随身數十百萬師古曰言其自有數十萬且至百萬為平陵石氏持錢其人彊力石氏訾次如苴孟康曰平陵如氏苴氏也石氏勤力故訾次二人也師古曰孟説非也其人彊力謂羅裒耳訾次如苴自謂石氏之饒財也苴音側于反親信厚資遣之令往來巴蜀數年間致千餘萬裒舉其半賂遺曲陽定陵侯師古曰謂王根淳于長也依其權力賒貸郡國人莫敢負師古曰貸音吐戴反擅鹽井之利期年所得自倍師古曰期音基遂殖其貨宛孔氏之先梁人也用鐵冶為業秦滅魏遷孔氏南陽大鼓鑄規陂田連騎游諸侯因通商賈之利有游間公子之名師古曰間讀曰閑言其志寛大不在急促公子者公侯貴人之子也言其舉動性行有似之也若今言諸郎矣然其贏得過當瘉於孅嗇師古曰瘉讀為愈愈勝也孅細也嗇愛吝也言其於利雖不汲汲茍得然所𫉬贏餘多於細吝者也孅與纖同下云周人既孅義亦類此家致數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而丙氏尤甚以鐵冶起富至鉅萬然家自父兄子弟約頫有拾卬有取師古曰頫古俯字也俯仰必有所取拾無鉅細好惡也宋祁曰注末也字上當有者字貰貸行賈徧郡國鄒魯以其故多去文學而趨利齊俗賤奴虜而刁閒獨愛貴之師古曰刁姓閒名也刁音貂桀黠奴人之所患唯刁閒收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數千萬故曰寧爵無刁孟康曰刁閒能畜豪奴奴或有連車騎交守相奴自謂寧欲免去作民有爵邪無將止為刁氏作奴乎無發聲助也言能使豪奴自饒而盡其力也刁閒既衰至成哀間臨淄姓偉訾五千萬師古曰姓姓名偉周人既孅而師史尤甚轉轂百數師古曰轉轂謂以車載物而逐利者宋祁曰尤舊本作光姚改作尤賈郡國無所不至雒陽街居在齊秦楚趙之中富家相矜以久賈孟康曰謂街巷居民無田地皆相矜久賈在此諸國也師古曰此説非也言雒陽之地居在諸國之中要衝之所若大街衢故其賈人無所不至而多得利不憚久行也中音竹仲反過邑不入門設用此等故師史能致十千萬師古曰十千萬即萬萬也言其財至萬萬也一曰至千萬者十焉師史既衰至成哀王莽時雒陽張長叔薛子仲訾亦十千萬莽皆以為納言士欲法武帝然不能得其利師古曰法武帝者言用卜式東郭咸陽孔僅等為官也宣曲任氏其先為督道倉吏孟康曰若今吏督租榖使上道輸所在也師古曰於京師四方諸道督其租耳道者非謂上道也劉奉世曰督道者倉所在地名耳猶後傳注漢宫闕疏所稱細栁倉也為倉吏故能藏粟致富也秦之敗也豪傑爭取金玉任氏獨窖倉粟師古曰取倉粟而窖臧之也窖音工孝反楚漢相距滎陽民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富富人奢侈而任氏折節為力田畜人爭取賤賈任氏獨取貴師古曰言其居買之物不計貴賤唯在良美也賈讀曰價善富者數世師古曰折節力田務於本業先公後私率道閭里故云善富然任公家約非田畜所生不衣食公事不畢則不得飲酒食肉師古曰任公任氏之父也言家為此私約制也晉灼以為任用公家之約此説非也以此為閭里率故富而主上重之塞之斥也唯橋桃以致馬千匹牛倍之羊萬粟以萬鍾計孟康曰邊塞主斥候卒也唯此一人能致富若此師古曰此説非也塞斥者言國家斥開邊塞更令寛廣故橋桃得恣其畜牧也姓橋名桃以萬鍾計者不論斗斛千萬之數每率舉萬鍾而計之著其饒多也劉攽曰顔説未盡塞之斥也公私皆有費用故橋桃得以致富豈謂待廣地恣其畜牧哉呉楚兵之起長安中列侯封君行從軍旅齎貣子錢家師古曰行者須齎糧而出於子錢家貣之也貣謂求假之也音吐得反子錢家以為關東成敗未决莫肯予唯母鹽氏出捐千金貸師古曰貸謂假與之音吐戴反其息十之三月呉楚平一歲之中則母鹽氏息十倍用此富關中關中富商大賈大氐盡諸田師古曰氐讀曰抵抵歸也田牆田蘭韋家栗氏安陵杜氏亦鉅萬前富者既衰自元成訖王莽京師富人杜陵樊嘉茂陵摯網平陵如氏苴氏長安丹王君房豉樊少翁王孫大卿為天下髙訾師古曰王君房賣丹樊少翁及王孫大卿賣豉亦致髙訾訾讀與資同髙訾謂多資財樊嘉五千萬其餘皆鉅萬矣王孫卿以財飬士與雄傑交王莽以為京司市師漢司東市令也此其章章尤著者也其餘郡國富民兼業顓利師古曰顓與專同以貨賂自行取重於鄉里者不可勝數故秦楊以田農而甲一州孟康曰以田地過限從此而富為州中第一也翁伯以販脂而傾縣邑張氏以賣醬而隃侈質氏以洒削而鼎食服䖍曰治刀劍者也如淳曰作刀劍削者師古曰二説皆非也洒濯也削謂刀劍室也謂人有刀劍削故惡者主為洒刷之去其垢穢更飾令新也洒音先禮反削音先召反濁氏以胃脯而連騎晉灼曰今太官常以十月作沸湯燖羊胃以末椒薑坋之暴使燥是也師古曰燖音似廉反坋音蒲頓反張里以馬醫而撃鍾皆越法矣然常循守事業積累贏利漸有所起至於蜀卓宛孔齊之刁間公擅山川銅鐵魚鹽市井之入運其籌䇿上爭王者之利下錮齊民之業師古曰錮亦謂專取之也皆䧟不軌奢僭之惡又况掘冢搏掩犯姦成富師古曰搏掩謂搏撃掩襲取人物者也搏字或作博一説博六博也掩意錢之屬也皆戲而賭取財物曲叔稽發雍樂成之徒師古曰姓曲名叔姓稽名發姓雍名樂成也稽音工奚反猶復齒列師古曰身為罪惡尚復與良善之人齊齒並列傷化敗俗大亂之道也前漢書卷九十一前漢書卷九十一考證貨殖傳昔粤王勾踐云云臣召南按范蠡子貢白圭猗頓烏氏巴寡婦清其人皆在漢以前不應與程卓諸人並列此則沿襲史記本文未及刋除者也劉知幾每譏班氏失於裁斷此亦其彰彰者淮北滎南河濟之間千樹萩史記作淮北常山以南河濟之間千樹萩又漿千儋史記作千甔又榖糴千鍾史記作販榖糴千鍾又木器桼者千枚史記作木器髤者又馬蹏噭千史記作蹏躈千桼千大斗顧炎武曰是漢時已有大斗但用之量麄貨耳臣召南按史記但云桼千斗無大字又蘖麯鹽豉千合史記作千瓵徐廣曰瓵音貽瓦器受斗六升又鮿鮑千鈞史記作鯫千石鮑千鈞羔羊裘千石顧炎武曰變皮言石亦互文也臣召南按顔注謂狐貂貴故言皮羔羊賤故言石其説甚確蓋非互文為平陵石氏持錢顧炎武曰持錢猶今人言掌財也魯人俗儉嗇而丙氏尤甚丙氏史記作曹邴氏安陵杜氏臣召南按史記作安陵杜杜氏言安陵縣及杜縣之杜氏皆富也故秦楊以田農而甲一州云云秦楊史記作秦陽又翁伯史記作雍伯又質氏史記作郅氏又曲叔史記作田叔又稽發史記作桓發前漢書卷九十一考證
