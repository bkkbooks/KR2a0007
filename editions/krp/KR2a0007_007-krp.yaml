body:
  text: 前漢書卷七漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注昭帝紀第七孝昭皇帝荀悅曰諱弗之字曰不應劭曰禮諡法聖聞周逹曰昭武帝少子也母曰趙倢伃師古曰倢接幸也伃美稱也故以名宫中婦官倢音接伃音余字或並從女本以有奇異得幸師古曰謂望氣者言有奇女天子氣及召見手指拳上自披之即時伸及生帝亦奇異文頴曰十四月乃生語在外戚傳武帝末戾太子敗燕王旦廣陵王胥行驕嫚師古曰行音下更反後元二年劉攽曰檢前後文多元字二月上疾病師古曰疾甚曰病遂立昭帝為太子年八嵗以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主明日武帝崩戊辰太子即皇帝位謁高廟帝姊鄂邑公主益湯沐邑為長公主應劭曰鄂縣名屬江夏公主所食曰邑師古曰鄂音五各反帝之姊妹則稱長公主儀比諸王又以供養天子故益邑也共養省中伏儼曰蔡邕云本為禁中門閤有禁非侍御之臣不得妄入行道豹尾中亦為禁中孝元皇后父名禁避之故曰省中師古曰省察也言入此中皆當察視不可妄也共讀曰供音居用反餋音弋亮反他皆類此大將軍光秉政領尚書事車騎將軍金日磾左將軍上官桀副焉夏六月赦天下劉攽曰是年二月有赦紀失載宣紀及丙吉傳可考秋七月有星孛于東方濟北王寛有罪自殺賜長公主及宗室昆弟各有差追尊趙倢伃為皇太后起雲陵文頴曰倢伃先葬於雲陽是以就雲陽為起雲陵冬匈奴入朔方殺畧吏民發軍屯西河左將軍桀行北邊師古曰行音下更反始元元年春二月黃鵠下建章宫太液池中如淳曰謂之液者言天地和液之氣所為也臣瓉曰時漢用土德服色尚黄鵠色皆白而今更黄以為土德之瑞故紀之也太液池言承隂陽津液以作池也師古曰如瓉之說皆非也黄鵠大鳥也一舉千里者非白鵠也太液池者言其津潤所及廣也鵠音胡篤反公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鉤盾弄田應劭曰時帝年九嵗未能親耕帝籍鉤盾宦者近署故往試耕為戲弄也臣瓉曰西京故事弄田在未央宫中師古曰弄田為宴游之田天子所戲弄耳非為昭帝年幼創有此名益封燕王廣陵王及鄂邑長公主各萬三千户夏為太后起園廟雲陵益州廉頭姑繒牂柯談指同並二十四邑皆反蘇林曰皆西南夷别種名也師古曰並音伴宋祁曰景德本柯作牁遣水衡都尉呂破胡募吏民及發犍為蜀郡犇命擊益州大破之應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權選取精勇聞命奔走故謂之奔命李斐曰平居發者二十以上至五十為甲卒今者五十以上六十以下為奔命奔命言急也師古曰應說是也犇古奔字耳犍音䖍又音鉅言反有司請河内屬冀州河東屬并州文頴曰本屬司州師古曰蓋屬京師司隸所部秋七月赦天下賜民百户牛酒大雨渭橋絶八月齊孝王孫劉澤謀反欲殺青州刺史雋不疑師古曰雋音材兗反又音辭兗反發覺皆伏誅遷不疑為京兆尹賜錢百萬九月丙子車騎將軍日磾薨閏月遣故廷尉王平等五人師古曰前為此官今不居者皆謂之故也持節行郡國師古曰行音下更反舉賢良問民所疾苦冤失職者冬無氷二年春正月大將軍光左將軍桀皆以前捕斬反虜重合侯馬通功封光為博陸侯桀為安陽侯以宗室毋在位者舉茂材劉辟彊劉長樂皆為光祿大夫辟彊守長樂衞尉師古曰長樂宫之衞尉也三月遣使者賑貸貧民毋種食者師古曰貸音吐戴反其下並同秋八月詔曰往年災害多今年𧖟麥傷所振貸種食勿收責毋令民出今年田租冬發習戰射士詣朔方調故吏將屯田張掖郡師古曰調謂發選也故吏前為官職者令其部率習戰射士於張掖為屯田也調音徒釣反將音子亮反三年春二月有星孛于西北秋募民徙雲陵賜錢田宅冬十月鳳皇集東海遣使者祠其處十一月壬辰朔日有蝕之四年春三月甲寅立皇后上官氏文頴曰上官桀孫安之女赦天下辭訟在後二年前皆勿聽治孟康曰武帝後二年夏六月皇后見高廟賜長公主丞相將軍列侯中二千石以下及郎吏宗室錢帛各有差徙三輔富人雲陵賜錢户十萬秋七月詔曰比嵗不登民匱於食師古曰匱空也流庸未盡還師古曰流庸謂去其本鄉而行為人庸作往時令民共出馬其止勿出諸給中都官者且減之師古曰中都官京師諸官府冬遣大鴻臚田廣明擊益州廷尉李种坐故縱死罪棄市師古曰縱謂容放之种音沖五年春正月追尊皇太后父為順成侯夏陽男子張延年詣北闕自稱衞太子誣罔要斬師古曰夏陽馮翊之縣夏罷天下亭母馬及馬弩關應劭曰武帝數伐匈奴再擊大宛馬死略盡乃令天下諸亭養母馬欲令其繁孳又作馬上弩機闗今悉罷之孟康曰舊馬高五尺六寸齒未平弩十石以上皆不得出闗今不禁也師古曰亭母馬應説是馬弩關孟說是也六月封皇后父驃騎將軍上官安為桑樂侯師古曰樂音來各反詔曰朕以𦕈身獲保宗廟師古曰眇微也戰戰栗栗夙興夜寐脩古帝王之事通保傅傳孝經論語尚書未云有明文穎曰賈誼作保傅傳在禮大戴記言能通讀之也晉灼曰帝自謂通保傅傳未能有所明也臣瓉曰帝自謂雖通舉此四書皆未能有所明此帝之謙也師古曰晉瓉之說皆非也帝自言雖通保傅傳而孝經論語尚書猶未能明也劉攽曰予謂瓉說是其令三輔太常舉賢良各二人郡國文學高第各一人賜中二千石以下至吏民爵各有差罷儋耳眞番郡師古曰儋耳本南越地眞番本朝鮮地皆武帝所置也番音普安反秋大鴻臚廣明軍正王平擊益州師古曰廣明田廣明斬首捕虜三萬餘人獲畜産五萬餘頭六年春正月上耕于上林二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵榷酤應劭曰武帝時以國用不足縣官悉自賣鹽鐵酤酒昭帝務本抑末不與天下争利故罷之栘中監蘇武前使匈奴留單于庭十九嵗廼還蘇林曰栘音移廐名也應劭曰栘地名監其官也掌鞍馬鷹犬射獵之具如淳曰栘爾雅唐棣栘也栘園之中有馬廐也師古曰蘇音如說是奉使全節以武為典屬國如淳曰以其乆在外國知邊事故令典主諸屬國師古曰典屬國本秦官漢因之掌歸義蠻夷屬官有九譯令後省并大鴻臚賜錢百萬夏旱大雩不得舉火臣瓉曰不得舉火抑陽助隂也秋七月罷𣙜酤官令民得以律占租如淳曰律諸當占租者家長身各以其物占占不以實家長不身自書皆罰金二斤没入所不自占物及賈錢縣官也師古曰占謂自隱度其實定其辭也占音章贍反下又言占名數其義並同今猶謂獄訟之辨曰占皆其意也葢武帝時賦歛繁多律外而取今始復舊劉攽曰予謂罷𣙜酤官令民得以律占租賣酒升四錢共是一事爾以律占租者謂令民賣酒以所得利占而輸其租矣占不以實則論如律也租即賣酒之税也賣酒升四錢所以限民不得厚利爾王子侯表旁况侯殷坐貸子錢不占租皆免侯義與此占租同即如顔説賣酒升四錢無為所著官既罷榷酤矣何處賣酒乎賣酒升四錢以邊塞濶遠取天水隴西張掖郡各二縣置金城郡詔曰鉤町侯母波率其君長人民擊反者斬首捕虜有功服䖍曰鉤音左傳射兩軥之軥應劭曰町音若挺西南夷也母波其名也今牂柯鉤町縣是也師古曰音劬挺其立母波為鉤町王大鴻臚廣明將率有功賜爵關内侯食邑元鳳元年春應劭曰三年中鳳皇比下東海海西樂鄉於是以冠元焉長公主共養勞苦復以藍田益長公主湯沭邑泗水戴王前薨以毋嗣國除後宫有遺腹子煖師古曰煖音許遠反相内史不奏言上聞而憐之立煖為泗水王相内史皆下獄三月賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸詔曰朕閔勞以官職之事鄧展曰閔哀韓福等不忍勞役以官職之事其務脩孝弟以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢師古曰幸者吉而免凶也故死謂之不幸一襲一稱也猶今言一副也中牢即少牢謂羊豕也武都氐人反師古曰氐音丁奚反遣執金吾馬適建龍頟侯韓増師古曰姓馬適名建也龍頟漢書夲或作雒字功臣侯表云弓高壯侯韓頽當子譊封龍雒侯元鼎五年坐酎金免後元元年譊弟子增紹封龍雒侯而荀悦漢紀龍雒皆為頟字崔浩曰雒音洛今河間龍雒村與弓高相近然此既地名無别指義各依書字而讀之斯則通矣譊音女交反大鴻臚廣明將三輔太常徒皆免刑擊之蘇林曰是時太常主諸陵縣治民也夏六月赦天下秋七月乙亥晦日有蝕之既八月改始元為元鳳九月鄂邑長公主燕王旦與左將軍上官桀桀子票騎將軍安御史大夫桑𢎞羊皆謀反伏誅初桀安父子與大將軍光争權欲害之詐使人為燕王旦上書言光罪時上年十四張晏曰武帝崩時八嵗即位於今七嵗今年十五師古曰此云初桀安父子與大將軍争權詐為燕王上書葢追道前年事耳非今嵗也張說失之覺其詐後有譛光者上輒怒曰大將軍國家忠臣先帝所屬師古曰屬音之欲反敢有譛毁者坐之光由是得盡忠語在燕王霍光傳冬十月詔曰左將軍安陽侯桀票騎將軍桑樂侯安御史大夫桑𢎞羊皆數以邪枉干輔政師古曰枉曲也以邪曲之事而干求也大將軍不聽而懐怨望與燕王通謀置驛往來相約結燕王遣壽西長孫縱之蘇林曰壽西姓也長名也孫姓縱之名等賂遺長公主丁外人謁者杜延年大將軍長史公孫遺等交通私書服䖍曰外人主之所幸也晉灼曰漢語字少君師古曰此杜延年别自一人非下諌大夫也其謀令長公主置酒伏兵殺大將軍光徵立燕王為天子大逆毋道故稻田使者燕倉先發覺如淳曰特為諸稻田置使者假與民收其税入也以告大司農敞師古曰楊敞也敞告諫大夫延年師古曰杜延年杜周之子延年以聞丞相徵事任宮手捕斬桀文頴曰徵事丞相官屬位差尊掾屬也如淳曰時宮以時事召待詔丞相府故曰丞相徵事張晏曰漢儀注徴事比六百石皆故吏二千石不以臧罪免者為徵事絳衣奉朝賀正月師古曰張說是也丞相少史王壽誘將安入府門如淳曰漢儀注丞相太尉大將軍史秩四百石武帝又置丞相少史秩四百石皆已伏誅吏民得以安封延年倉宮壽皆為列侯又曰燕王迷惑失道前與齊王子劉澤等為逆抑而不揚望王反道自新師古曰所為邪僻違失正道欲其旋反而歸正故云反道今廼與長公主左將軍桀等謀危宗廟王及公主皆自伏辜其赦王太子建公主子文信及宗室子與燕王上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪師古曰其罪未發未為吏所執持者劉攽曰在吏謂發覺已在吏者二年夏四月上自建章宫徙未央宫大置酒賜郎從官帛及宗室子錢人二十萬吏民獻牛酒者賜帛人一匹六月赦天下詔曰朕閔百姓未贍師古曰贍足也前年減漕三百萬石師古曰減省轉漕所以休力役也頗省乘輿馬及苑馬師古曰乘輿馬謂天子所自乘以駕車輿者他皆類此以補邊郡三輔傳馬張晏曰驛馬也師古曰傳音張戀反其令郡國毋歛今年馬口錢文穎曰往時有馬口出歛錢今省如淳曰所謂租及六畜也三輔太常郡得以叔粟當賦如淳曰百官表太常主諸陵别治其縣爵秩如三輔郡矣元帝永光五年令各屬在所郡也師古曰諸應出賦算租稅者皆聽以叔粟當錢物也叔豆也三年春正月泰山有大石自起立上林有栁樹枯僵自起生師古曰僵偃也謂樹枯死偃臥在地者也僵音紀良反罷中牟苑賦貧民師古曰在滎陽詔曰廼者民被水災頗匱於食朕虛倉廩師古曰倉新榖所藏也廩榖所振入也使使者振困乏其止四年毋漕三年以前所振貸非丞相御史所請邊郡受牛者勿收責應劭曰武帝始開三邊徙民屯田皆與犁牛後丞相御史復間有所今勑自上所賜與勿收責丞相所請乃令其顧税耳夏四月少府徐仁廷尉王平左馮翊賈勝胡皆坐縱反者仁自殺平勝胡皆要斬冬遼東烏桓反以中郎將范明友為度遼將軍應劭曰當度遼水往擊之故以度遼為官號將北邊七郡郡二千騎擊之四年春正月丁亥帝加元服如淳曰元服謂初冠加上服也師古曰如氏以為衣服之服此説非也元首也冠者首之所著故曰元服其下汲黯傳序云上加元服是知謂冠為元服見于高廟賜諸侯王丞相大將軍列侯宗室下至吏民金帛牛酒各有差賜中二千石以下及天下民爵毋收四年五年口賦如淳曰漢儀注民年七嵗至十四出口賦錢人二十三二十錢以食天子其三錢者武帝加口錢以補車騎馬也三年以前逋更賦未入者皆勿收如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是謂卒更也貧者欲得顧更錢者次直者出錢顧之月二千是謂踐更也天下人皆直戍邊三日亦名為更律所謂繇戌也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因更住一嵗一更諸不行者出錢三百入官官以給戍者是謂過更也律説卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也食貨志曰月為更卒已復為正一嵗屯戍一嵗力役三十倍於古此漢初因秦法而行之也後遂改易有讁乃戍邊一嵗耳逋未出更錢者也師古曰更音工衡反令天下酺五日甲戌丞相千秋薨師古曰田千秋夏四月詔曰度遼將軍明友前以羌騎校尉將羌王侯君長以下擊益州反虜後復率擊武都反氐今破烏桓斬虜獲生有功師古曰既斬反虜又獲生口也俘取曰獲其封明友為平陵侯平樂監傅介子持節使師古曰持節而為使誅斬樓蘭王安歸首縣北闕封義陽侯五月丁丑孝文廟正殿火上及羣臣皆素服發中二千石將五校作治六日成師古曰率領五校之士以作治也校音下教反太常及廟令丞郎吏皆劾大不敬會赦太常轑陽侯德免為庶人文頴曰轉音料德江德也轉陽在魏郡清淵師古曰會六月赦耳史終言之六月赦天下五年春正月廣陵王來朝益國萬一千户賜錢二千萬黃金二百斤劒二安車一乘馬二駟師古曰八匹也夏大旱六月發三輔及郡國惡少年吏有告劾亡者屯遼東如淳曰告者為人所告也劾者為人所劾也師古曰惡少年為無頼子弟也告劾亡者謂被告劾而逃亡秋罷象郡分屬鬱林牂牁冬十一月大雷十二月庚戌丞相訢薨師古曰王訢也訢亦欣字六年春正月募郡國徒築遼東𤣥莵城夏赦天下詔曰夫榖賤傷農師古曰糶多而錢少是為傷也今三輔太常榖減賤鄭氏曰減音減少之減其令以叔粟當今年賦應劭曰太常掌諸陵園皆徙天下豪富民以充實之後悉為縣故與三輔同賦右將軍張安世宿衞忠謹封富平侯烏桓復犯塞遣度遼將軍范明友擊之元平元年春二月詔曰天下以農桑為本日者省用罷不急官師古曰謂非要職減外繇師古曰繇讀曰傜耕桑者益衆而百姓未能家給師古曰給足也家家自給足是為家給也朕甚愍焉其減口賦錢有司奏請減什三上許之甲申晨有流星大如月衆星皆隨西行夏四月癸未帝崩于未央宫臣瓉曰帝年九嵗即位即位十三年壽二十二師古曰帝年八嵗即位明年改元改元之後凡十三年年二十一六月壬申葬平陵臣瓉曰自崩至葬凡四十九日平陵在長安西北七十里贊曰昔周成以孺子繼統而有管蔡四國流言之變師古曰四國謂管蔡商奄也流放也武王崩成王幼弱周公攝政四國乃流言曰公將不利於孺子遂致雷風之異成王既見金縢之冊乃不疑周公事見豳詩及周書大誥孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘敝師旅之後海内虛耗户口減半師古曰耗損也音火到反減讀為減省之減光知時務之要輕繇薄賦與民休息師古曰繇讀曰傜至始元元鳳之間匈奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷𣙜酤尊號曰昭不亦宜乎前漢書卷七前漢書卷七考證昭帝紀發軍屯西河監本訛屯河西從宋本改上耕於鉤盾弄田注臣召南按百官表少府屬官有鉤盾令丞後書志鉤盾令一人本注宦者典諸近池苑囿逰觀之處則應劭說是夏陽男子張延年通鑑考異曰紀作張延年雋不疑傳作成方遂又云一姓張名延年封皇后父驃騎將軍上官安為桑樂侯臣召南按驃騎將軍此與霍光傳同而外戚傳及恩澤侯表公卿表俱作車騎將軍必有一誤罷儋耳眞番郡臣召南按儋耳郡罷并入珠厓至元帝時珠厓亦罷又按後書東夷傳此年罷臨屯眞番以并樂浪元菟則不惟罷眞番一郡也將三輔太常徒注胡三省曰此刑徒輸作三輔及太常者也三輔太常郡得以叔粟當賦注顧炎武曰漢時田租本是叔粟今并口筭雜征之用錢者皆令以叔粟當之其獨行于三輔太常郡者不獨為榖賤傷農亦以减漕三百萬石慮儲偫之乏也將北邊七郡郡二千騎擊之臣召南按匈奴傳明友為度遼將軍將二萬騎出遼東則此七郡應作十郡郡二千騎正合二萬之數發中二千石將五校作治注王禕曰五校謂中壘屯騎越騎射聲虎賁也秋罷象郡分屬鬱林牂牁臣召南按此文可疑秦置象郡後屬南越漢破南越即故象郡置日南郡以地理志証之此時無象郡名且日南郡固始終未罷也前漢書卷七考證
