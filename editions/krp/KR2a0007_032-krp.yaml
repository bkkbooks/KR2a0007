body:
  text: 前漢書卷三十二漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注張耳陳餘傳第二張耳大梁人也臣瓚曰今陳留大梁城也少時及魏公子毋忌為客師古曰毋忌六國時信陵君也言其尚及見毋忌為之賔客嘗亡命遊外黄師古曰命者名也凡言亡命謂脱其名籍而逃亡劉奉世曰顔解太迂直避禍自逃其命爾外黄富人女甚美庸奴其夫師古曰言不恃頼其夫視之若庸奴亡邸父客如淳曰父時故賔客也師古曰邸歸也音丁禮反父客謂曰必欲求賢夫從張耳女聽為請決嫁之師古曰請決絶於前夫而嫁於耳女家厚奉給耳耳以故致千里客宦為外黄令陳餘亦大梁人好儒術遊趙苦陘張晏曰苦陘章帝醜其名改曰漢昌師古曰陘音刑富人公乗氏以其女妻之餘年少父事耳相與為刎頸交師古曰刎斷也刎頸交者言託契深重雖斷頸絶頭無所顧也刎音舞粉反髙祖為布衣時嘗從耳遊秦滅魏購求耳千金餘五百金兩人變名姓俱之陳為里監門師古曰監門卒之賤者故為卑職以自隐吏嘗以過笞餘餘欲起耳攝使受笞師古曰攝謂引持之吏去耳數之曰師古曰數責也音所具反始吾與公言何如今見小辱而欲死一吏乎餘謝罪陳渉起蘄至陳耳餘上謁渉師古曰上其謁而見也上謁若今之通名渉見左右生平數聞耳餘賢見大喜陳豪桀説渉曰將軍被堅執鋭帥士卒以誅暴秦復立楚社稷功徳宜為王陳渉問兩人兩人對曰將軍瞋目張膽師古曰張膽言勇之甚出萬死不顧之計為天下除殘今始至陳而王之視天下私師古曰視讀曰示願將軍毋王急引兵而西遣人立六國後自為樹黨師古曰樹立也如此野無交兵誅暴秦據咸陽以令諸侯則帝業成矣今獨王陳恐天下解也師古曰解謂離散其心也渉不聽遂立為王耳餘復説陳王曰大王興梁楚務在入闗未及收河北也臣嘗遊趙知其豪桀師古曰與相知也願請竒兵略趙地於是陳王許之以所善陳人武臣為將軍耳餘為左右校尉與卒三千人從白馬渡河師古曰津名即今滑州白馬縣界也至諸縣説其豪桀鄧展曰至河北縣説之曰秦為亂政虐刑殘滅天下北為長城之役南有五領之戍服䖍曰山領有五因以為名交趾合浦界有此領師古曰服説非也領者西自衡山之南東窮于海一山之限耳而别標名則有五焉裴氏廣州記云大庾始安臨賀桂陽揭陽是為五領鄧徳明南康記曰大庾領一也桂陽騎田領二也九真都龎領三也臨賀萌渚領四也始安越城領五也師古曰裴説是也外内騷動百姓罷敝師古曰罷讀曰疲頭㑹箕歛服䖍曰吏到其家人人頭數出穀以箕歛之以供軍費財匱力盡師古曰匱竭也重以苛法師古曰重音直用反使天下父子不相聊師古曰言無聊頼以相保養今陳王奮臂為天下倡始莫不嚮應師古曰倡讀曰唱嚮讀曰響家自為怒各報其怨師古曰為音于偽反縣殺其令丞郡殺其守尉今以張大楚王陳師古曰言張建大楚之國而王於陳也劉奉世曰按陳勝立為王號張楚耳云張大楚者斥其號也使吳廣周文將卒百萬西撃秦於此時而不成封侯之業者非人豪也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪桀皆然其言廼行收兵得數萬人號武信君師古曰武臣自號也下趙十餘城餘皆城守莫肯下乃引兵東北擊范陽范陽人蒯通說其令徐公降武信君又説武信君以侯印封范陽令語在通傳趙地聞之不戰下者三十餘城至邯鄲耳餘聞周章軍入闗至戲郤蘇林曰至戲地而郤兵又聞諸將為陳王徇地多以䜛毁得罪誅怨陳王不以為將軍而以為校尉廼說武臣曰陳王非必立六國後師古曰非不也今將軍下趙數十城獨介居河北晉灼曰介音戞臣瓚曰介特也師古曰二說並非也介隔也讀如本字不王無以填之師古曰塡音竹刃反且陳王聽䜛還報恐不得脫於禍願將軍毋失時武臣乃聽遂立為趙王以餘為大將軍耳為丞相使人報陳王陳王大怒欲盡族武臣等家而發兵撃趙相國房君諫曰秦未亡今又誅武臣等家此生一秦也不如因而賀之使急引兵西擊秦陳王從其計徙繫武臣等家宫中封耳子敖為成都君使使者賀趙趣兵西入闗師古曰趣讀曰促耳餘說武臣曰王王趙非楚意特以計賀王師古曰言力不能制且事安撫為權宜之計耳楚已滅秦必加兵於趙願王毋西兵北徇燕代南收河内以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨師古曰黶音烏㸃反韓廣至燕燕人因立廣為燕王趙王乃與耳餘北略地燕界趙王閒出為燕軍所得師古曰閒出謂投閒隙而㣲出也燕囚之欲與分地師古曰要劫之令割趙地輸燕以和解也使者往燕輙殺之以固求地耳餘患之有厮養卒謝其舎曰蘇林曰厮取薪者也養養人者也舍謂所舍宿主人也晉灼曰以辭相告曰謝師古曰謝其舍謂告其舍中人也故下言舎中人皆笑今流俗書夲於此舍下輙加人字非也厮音斯吾為二公說燕與趙王載歸師古曰二公張耳陳餘宋祁曰别本為字作謂舎中人皆笑曰使者往十輩皆死若何以能得王師古曰若汝也次下亦同乃走燕壁師古曰走趣也音奏燕將見之問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何如人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城張晏曰言其不用兵革也師古曰箠謂馬撾也音止橤反亦各欲南面而王夫臣之與主豈可同日道哉顧其埶初定師古曰顧思念也且以長少先立武臣以持趙心今趙地已服兩人亦欲分趙而王時未可耳今君囚趙王念此兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕師古曰易輕也音弋豉反况以兩賢王左提右挈而責殺王滅燕易矣師古曰提挈言相扶持也燕以為然乃歸趙王養卒為御而歸李良已定常山還報趙王趙王復使良略太原至石邑秦兵塞井陘未能前秦將詐稱二世使使遺良書不封張晏曰欲其漏泄君臣相疑也曰良嘗事我得顯幸誠能反趙為秦赦良罪貴良良得書疑不信之邯鄲益請兵師古曰之徃也未至道逢趙王姊從百餘騎良望見以為王伏謁道旁王姊醉不知其將使騎謝良良素貴起慙其從官從官有一人曰天下叛秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之良以得秦書欲反趙未决因此怒遣人追殺王姊遂襲邯鄲邯鄲不知竟殺武臣趙人多為耳餘耳目者故得脫出収兵得數萬人客有說耳餘曰兩君羈旅張晏曰羈寄旅客也而欲附趙難可獨立立趙後輔以誼師古曰謂求取六國時趙王後而立之以名義自輔助也可就功師古曰就成也乃求得趙歇立為趙王居信都張晏曰歇趙之苗裔也信都襄國也宋祁曰乃求舊木作仍求非是李良進兵擊餘餘敗良良走歸章邯章邯引兵至邯鄲皆徙其民河内夷其城郭師古曰夷平也耳與趙王歇走入鉅鹿城王離圍之餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原築甬道屬河師古曰屬聨及也饟王離師古曰饟古餉字謂饋運其軍糧也王離兵食多急攻鉅鹿鉅鹿城中食盡耳數使人召餘餘自度兵少不能敵秦不敢前數月耳大怒怨餘使張黶陳釋往讓餘師古曰讓責也曰始吾與公為刎頸交今王與耳旦暮死而公擁兵數萬不肻相救胡不赴秦俱死師古曰胡何也且什有一二相全師古曰十中尚冀得一二勝秦宋祁曰别本無有字餘曰所以不俱死欲為趙王張君報秦今俱死如以肉餧虎何益師古曰餧飤也音於偽反張黶陳釋曰事已急要以俱死立信安知後慮餘曰吾顧以無益師古曰顧思念也廼使五千人令張黶陳釋先嘗秦軍師古曰嘗試也言若嘗食也至皆没當是時燕齊楚聞趙急皆来救張敖亦北收代得萬餘人來皆壁餘旁項羽兵數絶章邯甬道王離軍乏食項羽悉引兵渡河破章邯軍諸侯軍乃敢擊秦軍遂虜王離於是趙王歇張耳得出鉅鹿與餘相見責讓餘問張黶陳釋所在餘曰黶釋以必死責臣臣使將五千人先嘗秦軍皆没耳不信以為殺之數問餘餘怒曰不意君之望臣深也師古曰望怨望也以下亦同豈以臣重去將哉師古曰重難也廼脫解印綬與耳耳不敢受餘起如厠客有說耳曰天予不取反受其咎今陳將軍與君印綬不受反天不祥急取之耳乃佩其印収其麾下餘還亦望耳不讓趨出遂收其兵宋祁曰一本不讓字上無耳字又别本遂收字上有耳字餘獨與麾下數百人之河上澤中漁獵由此有隙趙王歇復居信都耳從項羽入闗項羽立諸侯耳雅遊多為人所稱師古曰雅故也言其久故倦遊交結英傑是以多為人所稱譽也劉攽曰荀卿書有俗儒有雅儒雅儒異於俗者也耳之遊雅故多為人所稱一説多字屬上句項羽素亦聞耳賢廼分趙立耳為常山王治信都師古曰治為治處也音丈吏反信都更名襄國餘客多説項羽陳餘張耳一體有功於趙羽以餘不從入闗聞其在南皮即以南皮旁三縣封之而徙趙王歇王代耳之國餘愈怒曰耳與餘功等也今耳王餘獨侯及齊王田榮叛楚餘乃使夏説説田榮師古曰夏説讀曰悦説田榮音式鋭反曰項羽為天下宰不平盡王諸將善地徙故王王惡地今趙王乃居代願王假臣兵請以南皮為扞蔽師古曰扞蔽猶言藩屛也田榮欲樹黨乃遣兵從餘餘悉三縣兵師古曰悉盡也襲常山王耳耳敗走曰漢王與我有故張晏曰漢王布衣時常從耳遊也而項王彊立我我欲之楚師古曰羽既彊盛又為所立是以狐疑莫知所往甘公曰文穎曰善説星者甘氏也晉灼曰齊人漢王之入闗五星聚東井東井者秦分也師古曰分音扶問反先至必王楚雖彊後必屬漢耳走漢漢亦還定三秦方圍章邯廢丘耳謁漢王漢王厚遇之師古曰高紀云元年五月漢王定雍地東如咸陽引兵圍雍王廢丘而遣諸將畧地八月塞王欣翟王翳皆降漢二年十月陳餘擊常山王張耳耳敗走降漢而此傳乃言方圍廢丘時耳謁漢王隔以他事於後始云漢二年東擊楚則與帝紀前後參錯不同疑傳誤也餘已敗耳皆收趙地迎趙王於代復為趙王趙王徳餘師古曰懐其徳立以為代王餘為趙王弱國初定留傅趙王而使夏說以相國守代師古曰為代相國而居守漢二年東擊楚使告趙欲與俱餘曰漢殺張耳乃從於是漢求人類耳者斬其頭遺餘餘乃遣兵助漢漢敗於彭城西餘亦聞耳詐死即背漢漢遣耳與韓信擊破趙井陘斬餘泜水上蘇林曰泜音祗也晉灼曰問其方人音柢師古曰蘇晉二説皆是也蘇音祗敬之祗音執夷反古音如是晉音根柢之柢音丁計反今其土俗呼水則然追殺趙王歇襄國景徳本無此七字劉攽曰斬餘泜水上下有追殺趙王歇襄國七字四年夏立耳為趙王五年秋耳薨諡曰景王子敖嗣立為王尚髙祖長女魯元公主為王后七年髙祖從平城過趙趙王旦暮自上食體甚卑有子婿禮高祖箕踞罵詈甚慢之師古曰箕踞者謂申两脚其形如箕趙相貫高趙午年六十餘故耳客也怒曰吾王孱王也孟康曰冀州人謂懦弱為孱師古曰音士連反說敖曰天下豪桀並起能者先立今王事皇帝甚恭皇帝遇王無禮請為王殺之敖齧其指出血師古曰自齧其指出血以表至誠而為誓約不背漢也曰君何言之誤且先王亡國賴皇帝得復國徳流子孫秋毫皆帝力也願君無復出口貫高等十餘人相謂曰吾等非也吾王長者不背德且吾等義不辱今帝辱我王故欲殺之何廼汙王為師古曰言何為乃汙染王事成歸王事敗獨身坐耳八年上從東垣過師古曰擊韓王信餘冦於東垣還而過趙貫髙等乃壁人栢人要之置厠文穎曰置人厠壁中以伺髙祖劉攽曰置頓止之次名也置之厠中故云置厠東海貢荔枝五里一堠十里一置宋祁曰東垣一作南垣上過欲宿心動問曰縣名為何曰栢人栢人者廹於人不宿去九年貫髙怨家知其謀告之於是上逮捕趙王諸反者趙午等十餘人皆爭自剄貫高獨怒罵曰誰令公等為之今王實無謀而并捕王公等死誰當白王不反者師古曰白明也乃檻車與王詣長安師古曰檻車者車而為檻形謂以板四周之無所通見高對獄曰獨吾屬為之王不知也吏榜笞數千師古曰榜謂捶擊之音彭他皆類此刺爇身無完者應劭曰以鐵刺之又燒灼之師古曰爇音而悦反終不復言吕后數言張王以魯元故不宜有此上怒曰使張敖據天下豈少廼女虖師古曰廼汝也廷尉以貫髙辭聞上曰壮士誰知者以私問之張晏曰以和悦問之臣瓚曰字多作私謂以私情相問也師古曰瓚説是也中大夫泄公曰臣素知之師古曰泄音薛此固趙國立名義不侵為然諾者也師古曰侵猶犯負也上使泄公持節問之箯輿前卬視泄公師古曰箯輿者編竹木以為輿形如今之食輿矣高時榜笞刺爇委困故以箯輿處之也箯音鞭卬讀曰仰勞苦如平生歡師古曰勞苦相勞問其勤苦也與語問張王果有謀不師古曰果猶决高曰人情豈不各愛其父母妻子哉今吾三族皆以論死豈以王易吾親哉師古曰易代也顧為王實不反師古曰顧思念也獨吾等為之具道本根所以王不知狀於是泄公具以報上上廼赦趙王上賢高能自立然諾使泄公赦之告曰張王已出上多足下師古曰多猶重也故赦足下高曰所以不死白張王不反耳今王已出吾責塞矣師古曰塞當也滿也且人臣有簒弑之名豈有面目復事上哉乃仰絶亢而死蘇林曰亢頸大脈也俗所謂胡脈也師古曰亢者縂謂頸耳爾雅云亢鳥嚨即喉嚨也音下郎反又音工郎反荀悅論曰貫髙首為亂謀殺主之賊雖能證明其主小亮不塞大逆私行不贖公罪春秋之義大居正罪無赦可也敖已出尚魯元公主如故師古曰尚猶配也易泰卦九二爻辭曰得尚于中行王弼亦以為配也諸言尚公主者其義皆然而説者乃云尚公主與尚書尚食同意訓尚為主言主掌之失其理矣公主既尊又非物類不得以主掌為辭貢禹又云諸侯則國人承翁主益知尚不得言主掌也封為宣平侯於是上賢張王諸客皆以為諸侯相郡守語在田叔傳及孝惠高后文景時張王客子孫皆為二千石初孝惠時齊悼惠王獻城陽郡尊魯元公主為太后師古曰為齊太后以母禮事之髙后元年魯元太后薨後六年宣平侯敖復薨劉攽曰復字疑衍吕太后立敖子偃為魯王以母為太后故也師古曰以公主為齊王太后故立其子為王又憐其年少孤弱乃封敖前婦子二人夀為樂昌侯侈為信都侯高后崩大臣誅諸呂廢魯王及二侯孝文即位復封故魯王偃為南宫侯薨子生嗣武帝時生有罪免國除元光中復封偃孫廣國為睢陵侯薨子昌嗣師古曰睢音雖太初中昌坐不敬免國除孝平元始二年繼絶世封敖𤣥孫慶忌為宣平侯食千戸贊曰張耳陳餘世所稱賢其賓客厮役皆天下俊桀所居國無不取卿相者然耳餘始居約時晉灼曰始在貧賤儉約之時相然信死豈顧問哉及據國爭權卒相滅亡何鄉者慕用之誠師古曰鄉讀曰嚮嚮謂曩昔也後相背之盭也師古曰盭古戾字戾違也埶利之交古人羞之盖謂是矣前漢書卷三十二前漢書卷三十二考證張耳傳庸奴其夫王楙曰史記謂嫁庸奴亡其夫是夫本庸奴又亡去也班史削去嫁亡二字義便不同宦為外黄令臣召南按史記作宦魏為外黄令是也必有魏字以别于秦漢書刪之即下文秦購耳以千金不明矣陳餘傳耳餘為左右校尉臣召南按此文上史記有邵騷為䕶軍一句又下文張耳為右丞相下有邵騷為左丞相一句漢書刪去實于事情不核蒯通說其令徐公臣召南按漢書於史記亦多所訂正如説項羽之韓生及此傳范陽令徐公是也又如貫髙説張敖語史作今王事高祖甚恭生前豈應稱諡漢書改髙祖為皇帝當矣餘廼使夏説説田榮臣召南按史記作使張同夏説則遣説田榮者有二人此祗夏説一人又中大夫泄公曰臣素知之史記作臣之邑子素知之言生同縣而又相識也尊魯元公主為太后注師古曰為齊太后以母禮事之臣召南按顔注無理惠紀中劉攽已辨之矣前漢書卷三十二考證
