body:
  text: 前漢書卷七十三漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注韋賢傳第四十三韋賢字長孺魯國鄒人也其先韋孟家本彭城為楚元王傅傅子夷王及孫王戊師古曰官為楚王傅而歴相三王也戊荒淫不遵道孟作詩風諫後遂去位徙家于鄒又作一篇其諫詩曰肅肅我祖國自豕韋應劭曰在商為豕韋氏也黼衣朱紱四牡龍旂師古曰黼衣畫為斧形而白與黒為彩也朱紱為朱裳畫為亞文也亞古弗字也故因謂之紱字又作黻其音同聲宋祁曰注黼衣字下當更有衣字為彩當作謂彩亞字當作亞其音同聲當作同耳彤弓斯征撫寧遐荒師古曰言受彤弓之賜於此得專征伐也總齊羣邦以翼大商師古曰翼佐助也迭彼大彭勲績惟光應劭曰國語曰大彭豕韋為商伯師古曰迭互也自言豕韋氏與大彭互為伯於殷商也迭音徒結反至於有周歴世會同師古曰繼為諸侯預盟會之事也王赧聽譛寔絶我邦應劭曰王赧周末王聽䜛受譛絶豕韋氏也我邦旣絶厥政斯逸應劭曰言自絶豕韋氏之後政教逸漏不由王者也臣瓉曰逸放也管仲曰令而不行謂之放師古曰瓉說是也劉攽曰予謂王赧時詎有豕韋哉有豕韋亦非王赧所能絶也又云我邦旣絶厥政斯逸周之逸政乆矣不由赧也孟此詩為不暁其祖者賞罰之行非繇王室師古曰繇與由同也宋祁曰注文也字當刪庶尹羣后靡扶靡衛五服崩離宗周以隊應劭曰五服謂甸服侯服綏服要服荒服也師古曰庶尹衆官之長也羣后諸侯也隊失也音直類反我祖斯㣲䙴于彭城師古曰言我之先祖於此遂㣲也䙴古遷字其下竝同在予小子勤誒厥生師古曰誒歎聲音許其反宋祁曰誒浙本作唉阸此嫚秦耒耜以耕師古曰言遭秦暴嫚無有列位躬耕於野悠悠嫚秦上天不寧廼眷南顧授漢于京師古曰髙祖起在豐沛於秦為南故曰南顧言以秦之京邑授與漢也劉奉世曰秦視沛猶在東北安得云南孟意以漢興於巴蜀故云爾於赫有漢四方是征師古曰於讀曰烏烏歎辭也赫明貌凡此詩中諸歎辭稱於者其音皆同靡適不懐萬國平師古曰懐思也来也古攸字攸所也言漢兵所徃之處人皆思附而来萬國所以平也廼命厥弟建侯於楚俾我小臣惟傅是輔兢兢元王恭儉浄壹師古曰兢兢謹戒也惠此黎民納彼輔弼饗國漸世垂烈于後師古曰元王立二十七年而薨垂遺業於後嗣也廼及夷王克奉厥緒咨命不永唯王統祀師古曰咨嗟也永長也夷王立四年而薨戊乃嗣位故言不永也左右陪臣此惟皇士師古曰爾雅云皇正也如何我王不思守保不惟履氷以繼祖考師古曰惟亦思也言不思念敬慎如履薄氷之義用繼其祖考之業也邦事是廢逸游是娱犬馬繇繇是放是驅師古曰繇與悠同悠悠行貌放放犬也驅驅馬也務彼鳥獸忽此稼苖烝民以匱我王以媮師古曰媮與愉同樂也言衆人失此稼穡以致困匱而王反以為樂也所𢎞非徳所親非俊唯囿是恢惟䛕是信師古曰恢大也䛕諂言也睮睮諂夫咢咢黄髮如淳曰睮睮自媚貌也師古曰咢咢直言也睮音踰咢音五各反如何我王曾不是察旣藐下臣追欲從逸應劭曰藐逺也言疏逺忠賢之輔追情欲從逸游也臣瓉曰藐陵藐也師古曰藐與邈同應說是也下臣孟自謂也從讀曰縱嫚彼顯祖輕兹削黜嗟嗟我王漢之睦親師古曰睦密也言服屬近曾不夙夜以休令聞師古曰休美也令善也聞聲名也穆穆天子臨爾下土明明羣司執憲靡顧師古曰靡無也言執天子之法無所顧望也顧讀如古恊韻正遐繇近殆其怙兹師古曰言欲正逺人先從近親始而王怙恃與漢戚屬不自勗慎以致危殆也繇讀與由同嗟嗟我王曷不此思非思非鍳嗣其罔則師古曰不思鍳戒之義是令後嗣無所法則也彌彌其失岌岌其國應劭曰彌彌猶稍稍也罪過滋甚也岌岌欲毁壊也師古曰岌岌危動貌音五合反致氷匪霜致隊靡嫚瞻惟我王昔靡不練師古曰言堅氷之成起於㣲霜隕隊之咎由於怠嫚也練猶閱歴之言徃昔之事皆在王心無所不閱也興國救顛孰違悔過追思黄髮秦繆以霸師古曰言興復邦國救止顛隊之道無如能自悔其過惡秦穆公伐鄭為晋所敗而歸乃作秦誓曰雖則員然尚猶詢兹黄髮則罔所愆謂雖有員然之失庶幾以道謀於黄髮之賢則行無所過矣黄髮老夀之人也謂髮落更生黄者也員與云同劉奉世曰老人髮白乆而變黄色非謂更生而黄也嵗月其徂年其逮耉師古曰逮及也耉者老人面色如垢也言嵗月驟徃年将及耉不可怠忽於昔君子庶顯于後師古曰於歎辭也言昔之君子庶幾善道所以能光顯於後世也宋祁曰昔一作赫我王如何曽不斯覽師古曰覽視也叶韻音濫黄髮不近胡不時監師古曰黄髮不近者言逺耉老之人也近音其靳反宋祁曰注文言字姚改作斥其在鄒詩曰㣲㣲小子旣耉且陋師古曰自言年老材質鄙陋也豈不牽位穢我王朝應劭曰言豈不戀此爵位乎以王朝汙穢不肅清故也師古曰此說非也恐已穢王朝所以去耳故下又言懼穢此征也宋祁曰牽一作幸淳化本作幸刋誤據史館本改作幸王朝肅清唯俊之庭顧瞻余躬懼穢此征李竒曰於此便行也師古曰此皆孟已去遜辭不欲顯王之過惡也宋祁曰注文便行字下疑有去字我之退征請于天子天子我恤矜我髮齒赫赫天子明悊且仁縣車之義以洎小臣應劭曰古者七十縣車致仕洎及也天子以縣車之義及我也師古曰洎音鉅冀反嗟我小子豈不懐土庶我王寤越遷于魯應劭曰言豈不懐土乎庶幾王之寤覺欲還輔相之相近居魯也宋祁曰遷當作䙴後遷絶同旣去禰祖惟懐惟顧師古曰父廟曰禰言去其父祖舊居所以懐顧也禰音乃禮反祁祁我徒戴負盈路師古曰祁祁衆貌一曰祁祁徐行也徒謂學徒也戴負者謂隨其徙居也爰戾于鄒鬋茅作堂師古曰戾至也鬋字與剪同我徒我環築室于牆師古曰環遶也我旣䙴逝心存我舊夢我瀆上立于王朝應劭曰瀆上孟所居彭城東里名也猶不忘本也其夢如何夢争王室其争如何夢我王弼師古曰弼戾也言夢争王室之事王違戾我言也宋祁曰注文之事字下疑有而字言字下疑有故怨之三字寤其外邦歎其喟然師古曰夢在王朝及寐之寤乃在鄒也寤覺也喟音邱位反覺音工效反宋祁曰外邦字疑為異邦念我祖考泣涕其漣師古曰漣漣泣下貌音連㣲㣲老夫咨旣遷絶師古曰咨嗟也絶謂與舊居絶也洋洋仲尼視我遺烈師古曰洋洋美盛也烈業也視讀曰示孔子鄒人故言示我遺業也洋音祥又音羊濟濟鄒魯禮義唯㳟誦習弦歌于異他邦師古曰言禮樂之教不同餘土也我雖鄙耉心其好而我徒侃爾樂亦在而師古曰而者句絶之辭侃和樂貌音口旦反宋祁曰景徳本絶作端孟卒于鄒或曰其子孫好事述先人之志而作是詩也自孟至賢五世賢為人質朴少欲篤志於學師古曰篤厚也兼通禮尚書以詩教授號稱鄒魯大儒徵為博士給事中進授昭帝詩稍遷光祿大夫詹事至大鴻臚昭帝崩無嗣大将軍霍光與公卿共尊立孝宣帝帝初卽位賢以與謀議安宗廟賜爵關内侯食邑師古曰與讀曰豫徙為長信少府師古曰長信者太后宫名為太后官屬也以先帝師甚見尊重本始三年代蔡義為丞相封扶陽侯孟康曰屬沛郡食邑七百户時賢七十餘為相五嵗地節三年以老病乞骸骨賜黄金百斤罷歸加賜第一區丞相致仕自賢始年八十二薨諡曰節侯賢四子長子方山為高寝令早終次子𢎞至東海太守次子舜留魯守墳墓少子𤣥成復以明經歴位至丞相故鄒魯諺曰遺子黄金滿籯不如一經如淳曰籯竹器受三四斗今陳留俗有此器蔡謨曰滿籯者言其多耳非噐名也若論陳留之俗則吾陳人也不聞有此器師古曰許慎說文解字云籯笭也揚雄方言云陳楚宋魏之間謂箾為籯然則筐籠之屬是也今書本籯字或作盈又是盈滿之義盖两通也宋祁曰籯浙本不從竹詳蔡注不從竹為是注文吾陳字下疑有留字箾字疑作筲𤣥成字少翁以父任為郎常侍騎少好學修父業尤謙遜下士師古曰下音胡亞反出遇知識歩行輙下從者與載送之師古曰輟從者之車馬也宋祁曰與疑作輿以為常其接人貧賤者益加敬繇是名譽日廣師古曰繇與由同以明經擢為諫大夫遷大河都尉服䖍曰今東平郡也本為濟東國後王國除為大河郡初𤣥成兄𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勑令自免師古曰恐其有罪見黜妨為繼嗣故令以病去官也𢎞懐謙不去官師古曰謂若欲代父為侯故避嫌不肯也及賢病䔍𢎞竟坐宗廟事繫獄罪未决室家問賢當為後者賢恚恨不肯言於是賢門下生博士義倩等與宗家計議師古曰博士姓義名倩也宗家賢之同族也倩音千見反共矯賢令師古曰矯託也使家丞上書言大行師古曰為文書於大行以言其事也以大河都尉𤣥成為後賢薨𤣥成在官聞䘮宋祁曰越本及别本作在官或作任官又言當為嗣𤣥成深知其非賢雅意卽陽為病狂卧便利妄笑語昬亂師古曰便利大小便宋祁曰笑作咲注文大小便下有也字徵至長安旣葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案騐𤣥成素有名聲士大夫多疑其欲譲爵辟兄者師古曰辟讀曰避案事丞相史廼與𤣥成書師古曰卽案驗𤣥成事者曰古之辭譲必有文義可觀故能垂榮於後今子獨壊容貌蒙耻辱為狂癡光曜晻而不宣師古曰晻讀與暗同㣲哉子之所託名也李竒曰名聲名也僕素愚陋過為宰相執事師古曰過猶謬也願少聞風聲不然恐子傷髙而僕為小人也宋祁曰子字下疑有之字𤣥成友人侍郎章亦上疏言聖王貴以禮譲為國宜優飬𤣥成勿枉其志師古曰枉屈也使得自安衡門之下師古曰衡門謂横一木於門上貧者之所居也而丞相御史遂以𤣥成實不病劾奏之有詔勿劾引拜𤣥成不得已受爵宋祁曰受字下疑有侯字宣帝髙其節以𤣥成為河南太守兄𢎞太山都尉遷東海太守數嵗𤣥成徵為未央衛尉遷太常坐與故平通侯楊惲厚善惲誅黨友皆免官後以列侯侍祀孝惠廟當晨入廟天雨淖師古曰淖泥也音女教反不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為關内侯𤣥成自傷貶黜父爵歎曰吾何面目以奉祭祀作詩自劾責曰赫矣我祖侯于豕韋賜命建伯有殷以綏師古曰建立也立為伯也綏安也以有此伯故天下安也厥績旣昭車服有常朝宗商邑四牡翔翔師古曰翔翔安舒貌徳之令顯慶流于裔宗周至漢羣后歴世應劭曰歴世有爵位宋祁曰注末當有也字肅肅楚傅輔翼元夷師古曰元王夷王也厥駟有庸惟慎惟祗孟康曰駟駟馬也尚書車服以庸庸功也師古曰庸亦常也卽上車服有常同義也祗敬也嗣王孔佚越遷于鄒師古曰孔甚也佚與逸同五世壙僚至我節侯應劭曰自孟至賢五世無官壙空也惟我節侯顯徳遐聞師古曰聞合韻音問左右昭宣五品以訓師古曰左右助也言為相也五品五教也訓理也左讀曰佐右讀曰佑旣耉致位惟懿惟奐師古曰言以年致仕也懿美也奐盛也厥賜祁祁百金洎舘師古曰祁祁行来貌洎及也國彼扶陽在京之東惟帝是留政謀是從繹繹六轡是列是理師古曰繹繹和調之貌威儀濟濟朝享天子天子穆穆是宗是師師古曰穆穆天子之容也宗尊也言天子尊之以為師四方遐爾觀國之煇師古曰煇光也茅土之繼在我俊兄惟我俊兄是譲是形師古曰形見也言其謙譲志節顯見也於休厥徳於赫有聲師古曰於皆歎辭也休美也致我小子越留於京師古曰言致爵位於己身而留在京師豫朝請宋祁曰注末當添也字惟我小子不肅㑹同師古曰肅敬也媠彼車服黜此附庸師古曰媠古惰字也削爵為關内侯故云黜此附庸言見黜而為附庸也赫赫顯爵自我隊之㣲㣲附庸自我招之誰能忍媿寄之我顔誰將遐征從之夷蠻師古曰言己耻辱之甚無所自措故曰誰有能忍媿者以我顔寄之誰欲逺行去者當與相從適於蠻夷不能見朝廷之士也於赫三事匪俊匪作於蔑小子終焉其度師古曰於歎辭也三事三公之位也度居也言三公顯職以賢俊為之我雖㣲蔑方自勉厲終當居此也度音大各反後竝同誰謂華高企其齊而誰謂徳難厲其庶而師古曰華華山也華山雖高企仰則能齊觀道徳不易克厲然庶幾可及也嗟我小子于貳其尤師古曰于往也尤過也自戒云今以往勿貳其過一曰貳謂不一也言心不專一致此過也隊彼令聲申此擇辭師古曰令善也擇可擇之辭一曰擇謂創也四方羣后我監我視威儀車服惟肅是履師古曰戒他人初宣帝寵姬張婕妤男淮陽憲王好政事通法律上竒其材有意欲以為嗣然用太子起於細㣲又早失母故不忍也乆之上欲感風憲王輔以禮譲之臣師古曰風讀曰諷乃召拜𤣥成為淮陽中尉是時王未就國𤣥成受詔與太子太傅蕭望之及五經諸儒雜論同異於石渠閣條奏其對及元帝卽位以𤣥成為少府遷太子太傅至御史大夫永光中代于定國為丞相貶黜十年之間遂繼父相位封侯故國榮當世焉𤣥成復作詩自著復玷缺之囏難師古曰玉缺曰玷復音房目反囏古艱字玷音丁念反因以戒示子孫曰於肅君子旣令厥徳師古曰於歎辭也肅敬也令善也言君子之人皆肅敬以善其徳也儀服此㳟棣棣其則李竒曰善威儀也師古曰詩弼柏舟曰威儀棣棣不可選也棣棣閑習之貌音徒繼反宋祁曰棣棣疑作逮逮咨余小子旣徳靡逮師古曰逮及也自言徳不及也曾是車服荒嫚以隊師古曰曾之言則也明明天子俊徳烈烈不遂我遺恤我九列師古曰恤安也九列卿之位謂少府宋祁曰注末當有也字我旣兹恤惟夙惟夜師古曰夙早也言早夜常自戒也畏忌是申供事靡憜師古曰申言自約束也憜古惰字天子我監登我三事師古曰監察也三事三公之位謂丞相也顧我傷隊爵復我舊我旣此登望我舊階先后兹度漣漣孔懷應劭曰我旣此登為丞相也先后兹度父所在也臣瓉曰案古文宅度同師古曰先后卽先君也以父昔居此位故泣涕而甚思之也司直御事我熙我盛師古曰司直丞相司直也御事治事之吏也言司直及治事之人助我興盛而為職務也羣公百僚我加我慶于異卿士非同我心三事惟囏莫我肯矜師古曰言己居尊位懼不克勝而羣公百官皆来相慶是與我心不同也赫赫三事力雖此畢非我所度退其罔日師古曰我雖畢力於此然懼非所居貶退無日昔我之隊畏不此居師古曰居合韻音基庶反今我度兹戚戚其懼師古曰度亦居也嗟我後人命其靡常靖享爾位瞻仰靡荒師古曰靖謀也享當也天命無常唯善是祐謀當爾位無荒怠也愼爾會同戒爾車服無媠爾儀以保爾域師古曰媠亦古惰字也域謂封邑也爾無我視不愼不整我之此復惟禄之幸師古曰言我之得復此爵乃蒙天之福幸而遇之爾等不當視效而怠慢也於戲後人惟肅惟栗師古曰於戲讀曰嗚呼無黍顯祖宋祁曰祖一作位以蕃漢室𤣥成為相七年守正持重不及父賢而文采過之建昭三年薨諡曰共侯初賢以昭帝時徙平陵𤣥成别徙杜陵病且死因使者自白曰不勝父子恩願乞骸骨歸葬父墓上許焉子頃侯寛嗣薨子僖侯育嗣薨子節侯沈嗣自賢傳國至𤣥孫乃絶𤣥成兄高寢令方山子安世歴郡守大鴻臚長樂衞尉朝廷稱有宰相之器㑹其病終而東海太守𢎞子賞亦明詩哀帝為定陶王時賞為太傅哀帝卽位賞以舊恩為大司馬車騎將軍列為三公宋祁曰為疑作於賜爵關内侯食邑千户亦年八十餘以壽終宗族至吏二千石者十餘人初高帝時令諸侯王都皆立太上皇廟至惠帝尊高帝廟為太祖廟景帝尊文帝廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始二年宋祁曰二浙本作二越本作三復尊孝武廟為世宗廟行所巡狩亦立焉凡祖宗廟在郡國六十八合百六十七所師古曰六十八者郡國之數也百六十七所宗廟之數也宋祁曰注文百六十七所下當添者字而京師自高祖下至宣帝與太上皇悼皇考各自居陵旁立廟師古曰悼皇考者宣帝之父卽史皇孫并為百七十六又園中各有寢便殿如淳曰黄圗髙廟有便殿是中央正殿也師古曰如說非也凡言便殿便室者皆非正大之處寢者陵上正殿若平生露寢矣便殿者寢側之别殿耳日祭於寢月祭於廟時祭於便殿寢日四上食廟歲二十五祠如淳曰月祭朔望加臘為二十五晉灼曰漢儀注宗廟一歲十二祠五月嘗麥六月七月三伏立秋貙婁又嘗粢八月先夕饋飱皆一太牢酎祭用九太牢十月嘗稲又飲蒸二太牢十一月嘗十二月臘二太牢又毎月一太牢如閏加一祀與此上十二為二十五祠師古曰晉說是也便殿歲四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衞思后戾太子戾后各有寢園與諸帝合凡三十所一歲祠上食二萬四千四百五十五用衞士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養犧牲卒不在數中至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔先議罷郡國廟曰朕聞明王之御世也遭時為法因事制宜師古曰言不必同也往者天下初定遠方未賔因嘗所親以立宗廟師古曰親謂親臨幸處也蓋建威銷萌一民之至權也師古曰銷遏逆亂使不得萌生宋祁曰浙本無威字一字當作壹今頼天地之靈宋祁曰江浙本竝無地字宗廟之福四方同軌蠻貊貢職師古曰同軌言車轍皆同示法制齊也宋祁曰注文法制越本作教化乆遵而不定令疏遠卑賤共承尊祀師古曰共讀曰恭殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭師古曰論語載孔子之言與讀曰預其與將軍列侯中二千石諸大夫博士議郎議丞相𤣥成御史大夫鄭𢎞太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也宋祁曰江南本無也字浙本有繇中出生於心也師古曰繇讀與由同故唯聖人為能饗帝孝子為能饗親師古曰言情禮皆備立廟京師之居躬親承事四海之内各以其職来助祭宋祁曰浙本無助字尊親之大義五帝三王所共不易之道也師古曰易改也詩云有來雍雍宋祁曰來字疑作徠至止肅肅相維辟公天子穆穆師古曰此周頌雍篇禘太祖之詩也雍雍和也肅肅敬也相助也辟百辟卿士也公諸侯也有來而和者至而敬者助王禘祭是百辟諸侯也天子是時則穆穆然承事也春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯臣等愚以為宗廟在郡國宜無修臣請勿復修奏可因罷昭靈后武哀王昭哀后衞思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰蓋聞明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗著親親也師古曰著亦明也朕獲承祖宗之重惟大禮未備戰栗恐懼不敢自顓師古曰顓與專同其與將軍列侯中二千石二千石諸大夫博士議𤣥成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁師古曰迭互也親盡則毁故云迭也音大結反宋祁曰太祖下疑有繼太祖三字毁廟之主臧乎太祖五年而再殷祭言壹禘壹祫也師古曰殷大也禘諦也壹一祭之也祫合也禘音大系反祫音洽祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也師古曰昭穆者父子易其號序也昭明也穆美也後以晉室諱昭故學者改昭為韶宋祁曰注末當有字耳两字祭義曰王者禘其祖自出師古曰祖所從出者以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也宋祁曰配字下疑有之字立親廟四親親也親盡而迭毁親疏之殺示有終也師古曰殺漸降也音所例反周之所以七廟者以后稷始封文王武王受命而王是以三廟不毁與親廟四而七非有后稷始封文武受命之功者皆當親盡而毁成王成二聖之業師古曰二聖文王武王也制禮作樂功徳茂盛廟猶不世以行為諡而已師古曰謂之成王則是以行表謚也禮廟在大門之内不敢遠親也師古曰遠離也音于萬反臣愚以為高帝受命定天下宋祁曰帝字上疑有皇字宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故張晏曰悼皇考於元帝祖也大司馬車騎將軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不帑不私其利師古曰重罪之人不及妻子是不私其利也帑讀與孥同出美人重絶人類賔賜長老宋祁曰賔字浙本作賞收恤孤獨徳厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟師古曰忠尹忠也攘卻也諫大夫尹更始等十八人以為皇考廟上序於昭穆非正禮宜毁於是上重其事師古曰重難也依違者一年師古曰依違者不决也乃下詔曰蓋聞王者祖有功而宗有徳尊尊之大義也存親廟四親親之至恩也高皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸呂作亂海内揺動然羣臣黎庶靡不壹意北面而歸心猶謙辭固譲而後卽位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福徳莫盛焉高皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義壹體師古曰一體謂俱為昭也禮孫與祖俱為昭宣帝之於昭帝為從孫故云於義一體劉攽曰予謂此言壹體者以孝宣為昭帝後臣子壹體也尋其文自可見孝景皇帝廟及皇考廟皆親盡其正禮儀𤣥成等奏曰祖宗之廟世世不毁繼祖以下五廟而迭毁今高皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寢園皆無復修奏可議者又以為清廟之詩言交神之禮無不清静師古曰清廟周頌祀文王之詩其詩云於穆清廟肅雍顯相又曰對越在天駿奔走在廟宋祁曰注末疑有是也两字今衣冠出游有車騎之衆風雨之氣非所謂清静也祭不欲數數則瀆瀆則不敬師古曰此禮記祭法之言瀆煩汙也數音所角反宜復古禮四時祭於廟諸寢園日月閒祀皆可勿復修師古曰閒音工莧反上亦不改也明年𤣥成復言古者制禮别尊卑貴賤宋祁曰貴字上疑有明字國君之母非適不得配食則薦於寢師古曰適讀曰嫡身沒而已陛下躬至孝承天心建祖宗定迭毁序昭穆大禮旣定孝文太后孝昭太后寢祠園宜如禮勿復修奏可後嵗餘𤣥成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之宋祁曰詔字南本浙本作召衡深言不可上疾乆不平衡惶恐禱高祖孝文孝武廟曰嗣曾孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功師古曰育飬也休美也烈業也宋祁曰恐疑作懼字故動作接神必因古聖之經徃者有司以為前因所幸而立廟將以繫海内之心非為尊祖嚴親也今頼宗廟之靈六合之内莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明卽告于祖宗而不敢失師古曰不敢失禮今皇帝有疾不豫廼夢祖宗見戒以廟楚王夢亦有其序師古曰序緒也謂端緒也皇帝悼懼卽詔臣衡復修立謹案上世帝王承祖禰之大義宋祁曰義越本作禮皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者嵗數不登百姓困乏郡國廟無以修立禮凶年則嵗事不舉以祖禰之意為不樂是以不敢復師古曰復音房目反如誠非禮義之中違祖宗之心咎盡在臣衡師古曰如若也中音竹仲反當受其殃大被其疾隊在溝瀆之中皇帝至孝肅愼宜蒙祐福唯高皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝師古曰右讀曰祐開賜皇帝眉壽亡疆師古曰眉壽言壽者而眉秀也疆竟也居良反令所疾日瘳平復反常師古曰反猶還也永保宗廟天下幸甚又告謝毁廟曰徃者大臣以為在昔帝王承祖宗之休典取象於天地師古曰休美也典法也天序五行人親五屬師古曰五屬謂同族之五服斬衰齊衰大功小功緦麻也天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接于天萬世不墮繼烈以下五廟而遷師古曰墮毁也烈業也繼謂始嗣者也墮音火規反上陳太祖間嵗而祫師古曰間嵗隔一嵗也其道應天故福禄永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止李竒曰不得信尊其父也公子去其所而為大宗後尚得私祭其母為孫則止不得祭公子母也明繼祖不復顧其私祖母也師古曰信讀曰申尊祖嚴父之義也寢日四上食園廟閒祀皆可亡修師古曰閒音工莧反皇帝思慕悼懼未敢盡從惟念高皇帝聖徳茂盛受命溥將欽若稽古承順天心師古曰溥廣也將大也欽敬也若善也稽考也商頌烈祖之篇曰我受命溥將虞書堯典曰欽若吴天又曰若稽古帝堯故衡摠引之也子孫本支陳錫無疆師古曰詩大雅文王之篇曰陳錫載周侯文王孫子文王孫子本支百世陳敷也載始也本本宗也支支子也言子孫承受敷錫初始之福故得永乆無窮竟也誠以為遷廟合祭乆長之策高皇帝之意廼敢不聽師古曰言不敢不從卽以令日師古曰令善也謂吉日也遷太上孝惠廟孝文太后孝昭太后寢將以昭祖宗之徳順天人之序定亡窮之業今皇帝未受兹福乃有不能共職之疾師古曰共讀曰恭皇帝願復修立承祀臣衡等咸以為禮不得師古曰於禮不合也如不合高皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毁廟之文宋祁曰廟字下疑有寢字臣衡中朝臣咸復以為天子之祀義有所㫁禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六蓺所載皆言不當師古曰六蓺六經也無所依縁以作其文事如失指罪廼在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天亡極羣生百神有所歸息師古曰息止也諸廟皆同文乆之上疾連年遂盡復諸所罷寢廟園皆修祀如故初上定迭毁禮獨尊孝文廟為太宗而孝武廟親未盡故未毁上於是廼復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉師古曰與讀曰豫其下亦同他皆如舊制唯郡國廟遂廢云元帝崩衡奏言前以上體不平故復諸所罷祠卒不蒙福師古曰卒終也案衞思后戾太子戾后園親未盡師古曰言不當毁也孝惠孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可初高后時患臣下妄非議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后竝食於太上寢廟如故又復擅議宗廟之命師古曰復音方目反成帝崩哀帝卽位丞相孔光大司空何武奏言永光五年制書高皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之禮不敢有與臣愚以為迭毁之次當以時定非令所為擅議宗廟之意也宋祁曰所為疑作所謂臣請與羣臣雜議奏可於是光禄勲彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毁後雖有賢君猶不得與祖宗竝列子孫雖欲襃大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰臣聞周室旣衰四夷竝侵獫狁最彊於今匈奴是也宋祁曰狁浙本作允至宣王而伐之宋祁曰宣字上景本有周字詩人美而頌之曰薄伐獫狁至于太原師古曰小雅六月之詩也薄伐言逐出之又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荆蠻來威師古曰小雅采芑之詩也嘽嘽衆也推推盛也顯明也允信也方叔周之卿士命為將率也言出師衆盛有如雷霆方叔又能信明其徳旣伐獫狁懲其侵暴則南荆之蠻亦畏威而來服也嘽嘽音他丹反推音他回反宋祁曰注文嘽嘽當刪一嘽字故稱中興及至幽王犬戎來伐殺幽王取宗器師古曰宗器宗廟之器也自是之後南夷與北夷交侵中國不絶如綫師古曰綫縷也音思薦反春秋紀齊桓南伐楚北伐山戎孔子曰微管仲吾其被髮左衽矣師古曰論語載孔子之言也㣲無也被髪左衽戎狄之服言無管仲佐齊桓公征討則中夏皆將為夷狄也是故棄桓之過而錄其功以為伯首師古曰伯讀曰覇及漢興冒頓始彊破東胡禽月氏師古曰氏讀曰支并其土地地廣兵彊為中國害南越尉佗總百粤自稱帝故中國雖平猶有四夷之患且無寧嵗一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬衆近屯京師及四邊嵗發屯備虜其為患乆矣非一世之漸也諸侯郡守連匈奴及百粤以為逆者非一人也匈奴所殺郡守都尉畧取人民不可勝數孝武皇帝愍中國罷勞無安寧之時師古曰罷讀曰疲乃遣大將軍驃騎伏波樓船之屬南滅百粤起七郡北攘匈奴降昆邪十萬之衆師古曰昆音下門反置五屬國起朔方以奪其肥饒之地東伐朝鮮起𤣥莬樂浪以㫁匈奴之左臂師古曰樂音來各反浪音郎西伐大宛竝三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右臂師古曰婼音而遮反宋祁曰景祐本越本臂作肩單于孤特遠遁于幕北四垂無事宋祁曰四疑作西斥地遠境起十餘郡師古曰斥開也遠廣也功業旣定廼封丞相為富民侯以大安天下富實百姓其規橅可見師古曰橅讀曰摹其字從木又招集天下賢俊與恊心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆争之心至今累世頼之單于守藩百蠻服從萬世之基也中興之功未有高焉者也高帝建大業為太祖孝文皇帝徳至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發徳音也禮記王制及春秋榖梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故徳厚者流光徳薄者流卑師古曰流謂流風餘福春秋左氏傳曰名位不同禮亦異數自上以下降殺以两禮也師古曰殺音所例反七者其正法數可常數者也宗不在此數中宗變也師古曰言非常數故云變也苟有功徳則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰高宗師古曰太甲湯之孫太丁之子也太戊太庚之子雍已之弟也武丁小乙之子宋祁曰注文太庚景祐本作康校作庚刋誤據商紀改作康周公為毋逸之戒舉殷三宗以勸成王師古曰毋逸尚書篇名戒以無逸豫也繇是言之宗無數也師古曰繇讀與由同然則所以勸帝者之功徳博矣以七廟言之孝武皇帝未宜毁以所宗言之則不可謂無功徳禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功徳皆兼而有焉凡在於異姓猶將特祀之况于先祖或說天子五廟無見文又說中宗高宗者宗其道而毁其廟名與實異非尊徳貴功之意也詩云蔽芾甘棠勿鬋勿伐邵伯所茇師古曰召南甘棠之詩也解己在前鬋字與翦同茇音歩葛反思其人猶愛其樹况宗其道而毁其廟乎迭毁之禮自有常法無殊功異徳固以親疏相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虚說定也孝宣皇帝舉公卿之議用衆儒之謀旣以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺師古曰去除也殺漸也去音邱呂反殺音所例反其下竝同也宋祁曰注末也字當刪故春秋外傳曰日祭月祀時享嵗貢終王祖禰則日祭曾高則月祀二祧則時享壇墠則嵗貢張晏曰去祧為壇墠掃地而祭也師古曰祧是遠祖也築土為壇除地為墠祧音他堯反墠音善宋祁曰注文是字刪大禘則終王服䖍曰蠻夷終王乃入助祭各以其珍貢以共大禘之祭也師古曰毎一王終新王卽位乃來助祭徳盛而游廣親親之殺也如淳曰游亦流也彌遠則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毁廟晉灼曰以情推子以子況祖得人心禮何所違故無毁棄不禘之主也謂下三廟廢而為虛者也自貢禹建迭毁之議惠景及太上寢園廢而為虚師古曰虚讀曰墟宋祁曰惠景字下疑有廟字失禮意矣至平帝元始中宋祁曰越本無至字校本添大司馬王莽奏本始元年丞相義等議師古曰蔡義也諡孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏師古曰魏相也父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵師古曰在霸陵之南故曰南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毁此两統貳父宋祁曰父江南本浙本作文違於禮制案義奏親諡曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖繆本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之高祖受命而王者也宋祁曰文字下疑有王字非謂繼祖統為後者也臣請皇高祖考廟奉明園毁勿修張晏曰奉明園悼皇考園也罷南陵雲陵為縣奏可司徒掾班彪曰師古曰漢書諸贊皆固所為其有叔皮先論述者謂固亦具顯以示後人而或者固竊盗父名觀此可以免矣宋祁云注文謂固亦具顯以示後人越本謂字在後或者字下劉敞曰注謂字注在上合在或者下漢承亡秦絶學之後祖宗之制因時施宜自𤣥成後學者蕃滋師古曰蕃音扶元反貢禹毁宗廟匡衡改郊兆何武定三公後皆數復故紛紛不定師古曰數音所角反復音扶目反何者禮文缺微古今異制各為一家未易可偏定也考觀諸儒之議劉歆博而篤矣前漢書卷七十三前漢書卷七十三考證韋賢傳至於有周歴世會同臣召南按唐書宰相世系表曰韋氏出自風姓顓頊孫大彭為夏諸侯少康封其别孫元哲於豕韋其地滑州韋城也豕韋大彭迭為商伯周赧王時始失國徙居彭城以國為氏其說卽本此詩然豕韋顯名夏商國語左傳有明文至周以後書傳未見若春秋戰國數百年中則諸書並無有國名豕韋者韋孟謂歴世會同豈可信哉漢初人去古未遠其自譜世系卽已荒畧如此宜無怪乎揚子雲之自叙多誤也王赧聽譛實絶我邦注應劭云云劉攽云云臣召南按孟詩已不可解應劭又從而實之愈誤劉攽之論確矣但詩中尚有可疑者漢以高祖諱邦為國此句及下文寤其外邦於異他邦凡三用邦字倘所謂臨文不諱者耶勤誒厥生注師古曰誒歎聲楊愼曰方言云楚謂然曰誒說文誒譍也離騷云欸秋冬之緒風說文欸譍也二字音義並同實一字耳皆楚語也耒耜以耕文選作耒耜斯耕又克奉厥後選作克奉厥次又臨爾下土選作照臨下土又殆其怙兹選作殆其兹怙又彌彌其失選作彌彌其逸又致隊靡嫚選作致墜匪慢韋賢子𤣥成輙下從者與載送之顧炎武曰下字如爰盎傳下趙談之下與之共載復送至其家也周之所以七廟者以后稷始封文王武王受命而王云云臣召南按天子七廟祭法禮器家語榖梁傳荀子王制無異文也謂自古天子五廟周因文武始加七廟惟韋元成此文而鄭康成注禮乃据其說商書不云乎七世之廟可以觀徳虞喜曰七廟不始于周伊尹已言之矣元成言禮甚踈故傳末詳載劉歆七廟之辨以紏其違孝文孝景廟皆親盡宜毁臣召南按景帝初年詔卽尊孝文為太宗是卽百世不祧之廟與髙祖並崇矣可因親盡而毁乎宜許嘉等駮其議也又悼考立廟非正宜有尹更始之言前漢書卷七十三考證
