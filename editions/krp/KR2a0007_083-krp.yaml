body:
  text: 前漢書卷八十三漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顏師古注薛宣朱博𫝊第五十三薛宣字贛君東海郯人也師古曰贛音貢郯音談宋祁曰贛如淳音鉗少為廷尉書佐都船獄吏宋祁曰吏疑是史後以大司農斗食屬察廉補不其丞師古曰斗食者禄少一嵗不滿百石計日以斗為數也不其縣名也其音基宋祁曰注文也字當刪琅邪太守趙貢行縣師古曰行下更反其下亦同宋祁曰注文行字下當有音字見宣甚說其能師古曰說讀曰悅從宣歴行屬縣師古曰以宣自從也還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣㢘遷樂浪都尉丞師古曰趙貢察舉宣故得遷也樂音洛浪音郎幽州刺史舉茂材為宛句令師古曰樂浪屬幽州故為刺史所舉也宛於元反句音劬宋祁曰注文宛字下當有音字大將軍王鳳聞其能薦宣為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至徳仁厚哀閔元元躬有日仄之勞而亡佚豫之樂師古曰周書亡逸之篇稱文王之徳曰至于日中仄弗皇暇食宣引此言也仄古側字也佚與逸同允執聖道刑罰惟中師古曰允信也中竹仲反宋祁曰注文竹字上當有音字然而嘉氣尚凝隂陽不和師古曰凝謂不通也是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職師古曰刺史所察本有六條今則踰越故事信意舉劾妄為苛刻也六條解在百官公卿表舉錯各以其意多與郡縣事師古曰錯置也音千故反與讀曰豫豫干也至開私門聼讒佞以求吏民過失譴呵及細微責義不量力師古曰言求備於人郡縣相廹促亦内相刻流至衆庻是故鄉黨闕於嘉賔之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行師古曰勞郎到反來郎代反宋祁曰注文勞字下來字下並當有音字夫人道不通則隂陽否鬲師古曰否閉也音皮鄙反鬲與隔同和氣不興未必不由此也詩云民之失徳乾餱以愆師古曰小雅伐木之詩也餱食也解在元紀餱音侯鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敇師古曰申束也謂約束也使昭然知本朝之要務臣愚不知治道唯明主察焉上嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明師古曰稱舉也白黑猶言清濁也繇是知名師古曰繇讀與由同出為臨淮太守政教大行㑹陳留郡有大賊廢亂師古曰廢亂者政教不行也上徙宣為陳留太守盗賊禁止吏民敬其威信入守左馮翊滿嵗稱職為真始高陵令楊湛櫟陽令謝游皆貪猾不遜持郡短長前二千石數案不能竟師古曰雖毎案驗之不能窮竟其事宋祁曰謝疑作尉字及宣視事詣府謁宣設酒飯與相對接待甚備已而隂求其罪臧具得所受取宣察湛有改節敬宣之效廼手自牒書條其姦臧師古曰牒書謂書於簡牒也封與湛曰吏民條言君如牒或議以為疑於主守盗孟康曰法有主守盗斷官錢自入已也宋祁曰注文也字當刪馮翊敬重令又念十金法重不忍相暴章師古曰依當時律條臧直十金則至重罪故密以手書相曉欲君自圖進退可復伸眉於後師古曰伸眉言無憂也且令自去職不廢其後更為官即無其事復封還記得為君分明之師古曰記謂所與湛書也分明謂考問使知清白也宣恐其距諱即欲驗治之湛自知罪臧皆應記師古曰與宣書記相當而宣辭語温潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令游自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上師古曰適讀曰讁賊取錢財數十萬給為非法師古曰言斂取錢財以供給興造非法之用宋祁曰賊字浙本作賦字賣買聼任富吏賈數不可知師古曰賈讀曰價證驗以明白欲遣吏考案恐負舉者恥辱儒士師古曰游本因薦舉得官而身又是儒者故云然宋祁曰以明疑作已故使掾平鐫令如淳曰平鐫激切使之自知過也普灼曰王常為光武鐫說其將帥此謂徐以微言鐫鑿遣之也師古曰平掾之名鐫謂琢鑿也鐫音子全反蕭該音義曰按普灼之意引鐫與之言能無說乎出論語巽與之言蓋依鄧展鐫音子緣反與此引普灼不同孔子曰陳力就列不能者止師古曰論語載孔子之答冉有季路之言也列次也言自審已之力用而就官次不能則退令詳思之方調守師古曰言欲選人且代游守令職游得檄亦解印綬去又頻陽縣北當上郡西河為數郡湊多盗賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小辟在山中師古曰辟讀曰僻民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣師古曰時令條有材不稱職得改之二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛師古曰孟公綽魯大夫也論語云孔子曰孟公綽為趙魏老則優不可以為滕薛大夫言器能各有所施也趙魏晉之卿族老謂家之長相也滕薛小國諸侯也故或以徳顯或以功舉君子之道焉可憮也蘇林曰憮同也兼也普灼曰憮音誣師古曰論語載子夏之言謂行業不同所守各異唯聖人為能體備之蕭該曰學林云此傳直用憮字以當誣字耳憮有空之義可借與誣字通用屬縣各有賢君馮翊垂拱蒙成師古曰自言端拱無為而受縣之成功願勉所職卒功業師古曰卒終也宣得郡中吏民罪名輙召告其縣長吏使自行罰曉曰府所以不自𤼵舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利師古曰愛人而安利也池陽令舉㢘吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案驗獄掾廼其妻獨受繫者錢萬六千受之再宿獄掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉㢘吏獄掾王立家私受賕而立不知殺身以自明立誠㢘士甚可閔惜其以府決曹掾書立之柩以顯其魂師古曰以此職追贈府掾史素與立相知者皆予送𦵏及日至休吏師古曰冬夏至之日不省官事故休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚通日至吏以令休所繇來久師古曰繇讀與由同由從也曹雖有公職事家亦望私恩意掾宜從衆歸對妻子設酒肴請鄰里壹关相樂應劭曰以壺矢相樂也普灼曰書篆形壹关字象壺矢因曰壺矢此說非也師古曰晉說是也壹关謂一為歡关耳关古笑字也斯亦可矣扶慙愧官屬善之宣為人好威儀進止雍容甚可觀也性密静有思師古曰有智思也音先寺反思省吏職求其便安師古曰省視也下至財用筆研皆為設方略利用而省費師古曰利便也省減也便於用而減於費也省所領反吏民稱之郡中清静遷為少府共張職辦師古曰共讀曰供音居用反張音竹亮反月餘御史大夫于永卒谷永上疏曰帝王之徳莫大於知人知人則百僚任職天工不曠師古曰工官也曠空也故臯陶曰知人則哲能官人師古曰虞書臯陶謨之辭也哲智也無所不知故能官人也御史大夫内承本朝之風化外佐丞相統理天下任重職大非庸材所能堪今當選於羣卿以充其缺得其人則萬姓欣喜百僚說服師古曰說讀曰悦不得其人則大職墮斁王功不興師古曰墮毁也斁壊也墮音火規反斁音丁固反虞帝之明在兹壹舉可不致詳竊見少府宣材茂行絜達於從政前為御史中丞執憲轂下師古曰言在天子輦轂之下不吐剛茹柔師古曰大雅烝民之詩云惟仲山甫剛亦不吐柔亦不茹言其平正也茹食也音人庻反舉錯時當師古曰言其合時而當理也當音丁浪反出守臨淮陳留二郡稱治為左馮翊崇教飬善威徳並行衆職脩理姦軌絶息辭訟者歴年不至丞相府赦後餘盗賊什分三輔之一丈穎曰減三輔之賊什九也功效卓爾自左内史初置以來未嘗有也師古曰馮翊本左内史之地故云然孔子曰如有所譽其有所試師古曰論語載孔子之言也所以言譽人者必當試之以事宣考績功課簡在兩府師古曰簡大也亦曰明也兩府丞相御史府也不敢過稱以奸欺誣之辠師古曰過稱謂踰其實而妄稱譽之也奸犯也音干臣聞賢材莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節師古曰自從也召南羔羊之詩美在位皆節儉正直其詩曰退食自公委蛇委蛇言卿大夫履行清絜減退膳食率從公道也宣無私黨游說之助臣恐陛下忽於羔羊之詩舍公實之臣任華虚之譽是用越職陳宣行能唯陛下留神考察上然之遂以宣為御史大夫數月代張禹為丞相封高陽侯食邑千户宣除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名宣為相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉久之廣漢郡盗賊羣起丞相御史遣掾史逐捕不能克上廼拜河東都尉趙䕶為廣漢太守以軍法從事數月斬其渠帥鄭躬師古曰渠大也降者數千人廼平㑹卭成太后崩喪事倉卒吏賦歛以趨辦師古曰卭成太后宣帝王皇后也趨讀曰趣言苟取辦其後上聞之以過丞相御史遂冊免宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉師古曰不聞其有此行也朕既不明變異數見嵗比不登倉廩空虚師古曰比頻也登成也年穀不成宋祁曰多朕既不明止空虚十六字百姓饑饉流離道路疾疫死者以萬數人至相食盗賊並興羣職曠廢是朕之不徳而股肱不良也廼者廣漢羣盗横恣殘賊吏民朕惻然傷之數以問君君對輙不如其實西州鬲絶幾不為郡師古曰鬲與隔同幾音鉅依反三輔賦斂無度酷吏並縁為姦師古曰並音歩浪反侵擾百姓詔君案驗復無欲得事實之意九卿以下咸承風指同時陷于謾欺之辜咎繇君焉師古曰謾誑也音慢又音莫干反繇讀與由同有司法君領職解嫚師古曰法謂據法以劾也解讀曰懈嫚與慢同開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相高陽侯印綬罷歸初宣為丞相而翟方進為司直宣知方進名儒有宰相器深結厚焉後方進竟代為丞相思宣舊恩宣免後二嵗薦宣明習文法練國制度師古曰練猶熟也言其詳熟前所坐過薄可復進用上徴宣復爵高陽侯加寵特進位次師安昌侯給事中視尚書事宣復尊重任政數年後坐善定陵侯淳于長罷就第初宣有兩弟明脩明至南陽太守脩歴郡守京兆尹少府善交接得州里之稱後母常從脩居官宣為丞相時脩為臨菑令宣迎後母脩不遣後母病死脩去官持服宣謂脩三年服少能行之者兄弟相駮不可師古曰駮者執意不同猶如色之間雜脩遂竟服繇是兄弟不和師古曰繇讀曰由久之哀帝初即位博士申咸給事中亦東海人也毁宣不供飬行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子况為右曹侍郎數聞其語賕客楊明欲令創咸靣目使不居位師古曰創謂傷之也音初良反其下並同蕭該音義曰賕韋昭曰行貨財以有求於人曰賕字林以財枉法相謝曰賕音巨又反該案今人亦為求音㑹司𨽻缺况恐咸為之遂令明遮斫咸宫門外斷鼻脣身八創事下有司御史中丞衆等奏况朝臣父故宰相再封列侯不相敕丞化宋祁曰丞當作承而骨肉相疑疑咸受脩言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等廹切宫闕要遮創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端師古曰鬲與隔同杜塞也桀黠無所畏忌萬衆讙譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮下公門式路馬師古曰過公門則下車見路馬則撫式蓋崇敬也式車前横木君畜產且猶敬之春秋之義意惡功遂不免於誅師古曰遂成也言舉意不善雖有成功猶加誅上浸之源不可長也師古曰浸近也言傷戮大臣有所逼近也浸字或作侵侵犯也其意兩通長音竹兩反况首為惡明手傷功意俱惡孟康曰手傷人為功使人行傷人者為意皆大不敬明當以重論及况皆弃市廷尉直以為律曰鬭以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪師古曰詆毁也音丁禮反𫝊曰遇人不以義而見疻者與痏人之罪鈞惡不直也應劭曰以杖手毆擊人剝其皮膚腫起青黒而無創瘢者律謂疻痏遇人不以義為不直雖見毆與毆人罪同也師古曰疻音侈痏音鮪蕭該音義曰案晉灼曰疻音侈侈裂也韋昭曰疻謂毁傷也疻音胥地反說文曰疻毆傷也手支反又思詣反痏說文曰痏病也該案三倉云痏瘡也音如鮪魚之鮪咸厚善脩而數稱宣惡流聞不誼不可謂直師古曰言咸為脩而毁宣是不誼而不直况以故傷咸計謀已定後聞置司𨽻因前謀而趣明師古曰趣讀曰促非以恐咸為司𨽻故造謀也本爭私變雖於掖門外傷咸道中與凡民爭鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則至於刑罰不中刑罰不中而民無所錯手足師古曰論語載孔子之言也錯置也音千故反今以况為首惡明手傷為大不敬公私無差春秋之義原心定罪師古曰原謂尋其本也原况以父見謗𤼵忿怒無它大惡加詆欺輯小過成大辟師古曰輯與集同集合也陷死刑違明詔恐非法意不可施行聖王不以怒増刑明當以賊傷人不直師古曰以其受賕也况與謀者皆爵減完為城旦師古曰以其身有爵級故得減罪而為完也况身及同謀之人皆從此科上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉况竟減罪一等宋祁曰罪字上當有死字徙敦煌宣坐免為庻人歸故郡卒於家宣子恵亦至二千石始恵為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不脩師古曰郵行書之舍亦如今之驛及行道舘舍也音尤宣心知恵不能留彭城數日案行舍中處置什器師古曰處安也什器為生之具也解在平紀觀視園菜終不問恵以吏事恵自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒恵吏職之意師古曰若自出其意不云恵使之言宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也衆人𫝊稱以宣言為然初宣後封為侯時妻死而敬武長公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣𦵏延陵奏可况私從敦煌歸長安㑹赦因留與主私亂哀帝外家丁傅貴主附事之而疏王氏元始中莽自尊為安漢公主又出言非莽而况與吕寛相善及寛事覺時莽并治况發揚其罪使使者以太皇太后詔賜主藥主怒曰劉氏孤弱王氏擅朝排擠宗室師古曰擠墜也音子詣反宋祁曰擠玉篇云子詣子稽二切且嫂何與取妹披抉其閨門而殺之師古曰敬武公主宣帝女也故謂元后為嫂披𤼵也抉挑也與讀曰豫豫干也言此事不千於嫂也抉音古穴反挑音它凋反宋祁曰抉字林曰抉挑也音一穴反蕭該案左傳云鄒人紇抉之以出門者又曰以杙抉其傷使者迫守主師古曰守而逼之遂飲藥死况梟首於市白太后云主暴病薨太后欲臨其喪莽固爭乃止朱博字子元杜陵人也家貧少時給事縣為亭長好客少年捕搏敢行師古曰好賔客及少年而追捕擊搏無所避也稍遷為功曹伉俠好交師古曰伉健也音口浪反隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察廉補安陵丞後去官入京兆歴曹史列掾出為督郵書掾所部職辦郡中稱之而陳咸為御史中丞坐漏泄省中語下獄博去吏間歩至廷尉中師古曰去吏自解職也間歩謂歩行而伺間隙以去候伺咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸驗治數百師古曰謂被掠笞也卒免咸死罪咸得論出而博以此顯名為郡功曹久之成帝即位大將軍王鳳秉政奏請陳咸為長史咸薦蕭育朱博除莫府屬鳯甚竒之舉博櫟陽令徙雲陽平陵三縣以高第入為長安令京師治理遷冀州刺史博本武吏不更文法師古曰更歴也音工衡反及為刺史行部師古曰行音下更反吏民數百人遮道自言官寺盡滿從事白請且留此縣録見諸自言者事畢廼發欲以觀試博博心知之告外趣駕師古曰趣讀曰促既白駕辦博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黄綬各自詣郡師古曰丞尉職卑皆黄綬欲言二千石墨綬長吏者使者行部還詣治所師古曰治所刺史所止理事處宋祁曰楊本并别本云使者還部越本無使者二字其民為吏所冤及言盗賊辭訟事各使屬其部從事師古曰屬委也音之欲反博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變廼至於此後博徐問果老從事教民聚㑹博殺此吏州郡畏博威嚴徙為并州刺史䕶漕都尉遷琅邪太守齊部舒緩飬名師古曰言齊人之俗其性遲緩多自高大以飬名聲博新視事右曹掾史皆移病卧師古曰右曹上曹也移病謂移書言病也一曰以病而移居也博問其故對言惶恐師古曰言懼新太守之威故事二千石新到輙遣吏存問致意廼敢起就職博奮髯抵几曰師古曰髯頰毛也抵擊也音紙觀齊兒欲以此為俗邪廼召見諸曹史書佐及縣大吏選視其可用者出教置之師古曰皆新補置以代移病者皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教主簿師古曰以此教告主簿贛老生不習吏禮主簿且教拜起閑習廼止又敇功曹官屬多襃衣大袑師古曰袑音紹謂大袴也蕭該音義曰按韋昭曰袴上曰袑音黍矯反鄧展音紹不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輙罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也師古曰言不能用且持此道歸堯舜君出為陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜師古曰各因其材而任之縣有劇賊及它非常博輙移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輙行師古曰稱副也以是豪强慹服師古曰慹音之渉反姑幕縣有羣軰八人報仇廷中皆不得師古曰於縣廷之中報仇殺人而其賊皆亡捕之不得也長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博廼見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪師古曰與讀皆曰豫閤下書佐入博口占檄文曰師古曰隱度其言口授之占音之贍反府告姑幕令丞言賊發不得有書師古曰言已得縣之文書如此檄到令丞就職游徼王卿力有餘如律令師古曰游徼職主捕盗賊故云如律令王卿得敇惶怖親屬失色晝夜馳騖蕭該音義曰字書曰騖亂馳也十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閲詣府師古曰伐功勞也閲所經歴也蕭該音義曰字林曰閲其數也部掾以下亦可用漸盡其餘矣師古曰部掾所部之掾也其操持下皆此類也以高第入守左馮翊滿嵗為真其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺師古曰言少仁愛而不能便利於人然亦縱舍時有大貸師古曰縱放也舍置也貸謂寛假於下也音吐戴反下吏以此為盡力長陵大姓尚方禁師古曰姓尚方名禁少時嘗盗人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢師古曰瘢創痕也音盤痕音胡恩反博辟左右問禁師古曰辟讀曰闢是何等創也禁自知情得師古曰言其得被斫之情狀叩頭服狀博笑曰大丈夫固時有是師古曰言情欲之事人所不免馮翊欲洒卿恥抆拭用禁師古曰抆拭摩也洒音先禮反抆音文粉反能自效不禁且喜且懼對曰必死師古曰言盡死力也博因敇禁毋得泄語有便宜輙記言師古曰不令泄扙拭之言而外有便宜之事為書記以言於博因親信之以為耳目禁晨夜發起部中盗賊及它伏姦有功效博擢禁連守縣令久之召見功曹閉閤數責以禁等事與筆札使自記積受取一錢以上無得有所匿師古曰積累前後受取之事欺謾半言斷頭矣師古曰謾誑也音慢又音莫連反功曹惶怖具自疏姦臧大小不敢隠博知其對以實廼令就席受敇自改而已投刀使削所記遣出就職功曹後常戰栗不敢蹉跌師古曰蹉音干何反跌音徒結反博遂成就之師古曰言進逹也遷為大司農嵗餘坐小法左遷犍為太守先是南蠻若兒數為宼盗師古曰若兒其豪長之名博厚結其昆弟使為反間襲殺之師古曰間音居莧反郡中清徙為山陽太守病免官復徴為光禄大夫遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有衆賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久師古曰剽劫也猶言行聼也剽音平妙反三尺律令人事出其中師古曰言可以人情知之掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之如淳曰但欲用意覆之不近法律事故也師古曰覆音方目反正監以為博苟强意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九師古曰中音竹仲反官屬咸服博之疏略材過人也毎遷徙易官所到輙出竒譎如此以明示下為不可欺者久之遷後將軍與紅陽侯立相善立有罪就國有司奏立黨友博坐免後嵗餘哀帝即位以博名臣召見起家復為光禄大夫遷為京兆尹數月超為大司空初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉始置大司馬以冠將軍之號非有印綬官屬也及成帝時何武為九卿建言古者民樸事約師古曰立此議而奏之也約少也國之輔佐必得賢聖然猶則天三光備三公官各有分職師古曰則法也三光日月星也分音扶問反今末俗之弊政事煩多宋祁曰之監本邵本作之校本作文宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職授政以考功效其後上以問師安昌侯張禹禹以為然時曲陽侯王根為大司馬票騎將軍而何武為御史大夫於是上賜曲陽侯根大司馬印綬置官屬罷票騎將軍官以御史大夫何武為大司空封列侯皆増奉如丞相以備三公官焉師古曰奉音扶用反議者多以為古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水皆竭又其府中列栢樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之師古曰史言此者著御史大夫之職當休廢也宋祁曰顏之推云漢書御史府中列栢樹常有野烏數千棲宿其上晨去暮來號朝夕烏而文士往往作烏鳶用之浙本亦作鳥子謂烏字當作鳥字後二嵗餘朱博為大司空奏言帝王之道不必相襲各繇時務師古曰繇讀與由同高皇帝以聖徳受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官上下相監臨歴載二百年天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相高第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相師古曰更經也音工衡反權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率哀帝從之廼更拜博為御史大夫㑹大司馬喜免宋祁曰喜字上當有傅字以陽安侯丁明為大司馬衞將軍置官屬大司馬冠號如故事後四嵗哀帝遂改丞相為大司徒復置大司空大司馬焉初何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧師古曰虞書舜典之辭也宋祁曰浙本云咨十有二牧配哉所以廣聰明燭幽隱也今部刺史居牧伯之位秉一州之統選第大吏所薦位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準失位次之序臣請罷刺史更置州牧以應古制奏可及博奏復御史大夫官宋祁曰復字下當有置字又奏言漢家至徳溥大宇内萬里師古曰溥與普同立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九嵗舉為守相其有異材功效著者輙登擢秩卑而賞厚咸勸功樂進師古曰勸功自勸勉而立功也前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿缺以高第補其中材則苟自守而已恐功效陵夷師古曰陵夷漸廢替姦軌不禁臣請罷州牧置刺史如故奏可博為人㢘儉不好酒色游宴自微賤至富貴食不重味案上不過三桮夜寢早起妻希見其面有一女無男然好樂士大夫為郡守九卿賔客滿門欲仕宦者薦舉之欲報仇怨者解劔以帶之其趨事待士如是博以此自立然終用敗初哀帝祖母定陶太后宋祁曰陶字下當有傅字欲求稱尊號太后從弟高武侯傅喜為大司馬與丞相孔光大司空師丹共持正議孔鄉侯傅晏亦太后從弟讇諛欲順指㑹博新徴用為京兆尹與交結謀成尊號以廣孝道繇是師丹先免師古曰繇讀與由同博代為大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光為庻人以博代光為丞相封陽鄉侯食邑二千戸博上書讓曰故事封丞相不滿千户而獨臣過制誠慙懼願還千户上許焉傅太后怨傅喜不已使孔鄉侯晏風丞相令奏免喜侯師古曰風讀曰諷博受詔與御史大夫趙𤣥議𤣥言事已前決得無不宜師古曰得無猶言無乃也博曰已許孔鄉侯有指匹夫相要尚相得死何况至尊博唯有死耳𤣥即許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國師古曰汜音凡事與喜相似即并奏喜武前在位皆無益於治雖已退免爵土之封非所當得也請皆免為庻人上知傅太后素常怨喜疑博𤣥承指即召𤣥詣尚書問狀𤣥辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博宰相𤣥上卿晏以外親封位特進股肱大臣上所信任不思竭誠奉公務廣恩化為百寮先皆知喜武前已䝉恩詔決事更三赦師古曰詔已罷官事又經三赦也更音工衡反博執左道虧損上恩以結信貴戚背君鄉臣師古曰鄉讀曰嚮傾亂政治姦人之雄附下罔上為臣不忠不道𤣥知博所言非法枉義附從大不敬晏與博議免喜失禮不敬臣請詔謁者召博𤣥晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人師古曰蟜音矯蕭該案吕靖曰蟜毒蟲也已兆反今借以為矯字此蓋古字無定耳以為如宣等言可許諌大夫龔勝等十四人以為春秋之義姦以事君常刑不舍師古曰舍置也魯大夫叔孫僑如欲顓公室譛其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之師古曰僑如叔孫宣伯也行父季文子也宣伯通於成公之母穆姜欲去季孟而取其室使告普曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也若欲得志於魯請止行父而殺之不然歸必畔矣晉人執文子于苕丘事在成十六年今晏放命圯族干亂朝政要大臣以罔上本造計謀職為亂階師古曰此引詩小雅巧言之章也職主也階者基之漸也宜與博𤣥同罪罪皆不道上減𤣥死罪三等削晏户四分之一假謁者節召丞相詣廷尉詔獄博自殺國除初博以御史為丞相封陽鄉侯𤣥以少府為御史大夫並拜於前殿延登受策有音如鍾聲語在五行志贊曰薛宣朱博皆起佐史歴位以登宰相宣所在而治為世吏師及居大位以苛察失名師古曰苛細也器誠有極也宋祁曰别本有字下有所字博馳騁進取不思道徳已亡可言師古曰言其事行不足可道也又見孝成之世委任大臣假借用權師古曰假音休假借音以物借人宋祁曰注末當有之借二字借蕭該謂本作藉字若作借何煩更云音以物借人之借蓋傳寫之繆世主已更好惡異前師古曰更改也復附丁傅稱順孔鄉師古曰稱副也副其所求而順其意也稱音尺孕反事發見詰遂陷誣罔辭窮情得仰藥飲鴆師古曰仰藥謂仰頭而飲藥也孔子曰久矣哉由之行詐也博亦然哉師古曰論語云子疾病子路欲使門人為臣子曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎故贊引之前漢書卷八十三前漢書卷八十三考證薛宣傳都舩獄吏臣召南按百官表中尉屬官有都舩令丞遷樂浪都尉丞地理志樂浪郡有兩都尉其南部都尉治昭明縣東部都尉治不而縣為宛句令宛句屬濟隂郡志作冤句上廼拜河東都尉趙䕶為廣漢太守云云按成帝紀鴻嘉三年廣漢男子鄭躬等自號山君四年趙䕶擊之遷䕶為執金吾公卿表䕶字子夏以元延元年為執金吾廷尉直臣召南按公卿表即廷尉龎真也真字與直字相近而誤缺筆耳朱博𫝊封陽鄉侯食邑二千户按表作楊鄉又下文願還千户表作還千五十户即召𤣥詣尚書問狀胡三省曰丞相御史同奏而獨召問𤣥者以博强毅多權詐難遽得其情而𤣥易以窮詰也右將軍蟜望等臣召南按此哀帝建平二年八月事也據公卿表光禄勲丁望為左將軍執金吾公孫禄為右將軍至三年蟜望始為右將軍此文似應云左將軍丁望等或因其名偶同而誤也前漢書卷八十三考證
