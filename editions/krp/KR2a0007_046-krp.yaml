body:
  text: 前漢書卷四十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注萬石衞直周張傳第十六萬石君石奮其父趙人也趙亡徙温師古曰温河内之縣高祖東擊項籍過河内時奮年十五為小吏侍高祖高祖與語愛其恭敬問曰若何有師古曰若汝也有何戚屬對曰有毋不幸失明家貧有姊能鼓瑟高祖曰若能從我乎曰願盡力於是高祖召其姊為美人以奮為中涓受書謁師古曰中涓官名主居中而㳙潔者也外有書謁令奮受之也㳙音蠲徙其家長安中戚里師古曰於上有姻戚者則皆居之故名其里為戚里劉攽曰此里偶名戚里爾高祖以奮姊為美人故使居戚里示有親戚之義猶武帝時封小史遺鄉因曰遺汝以姊為美人故也奮積功勞孝文時官至大中大夫無文學恭謹舉無與比張晏曰舉朝無比也師古曰舉皆也東陽侯張相如為太子太傅免選可為傅者皆推奮為太子太傅及孝景即位以奮為九卿迫近憚之張晏曰以其恭敬履度故難之徙奮為諸侯相奮長子建次甲次乙次慶師古曰史失其名故云甲乙耳非其名皆以馴行孝謹官至二千石師古曰馴順也音廵於是景帝曰石君及四子皆二千石人臣尊寵廼舉集其門凡號奮為萬石君師古曰集合也凡最計也總合其一門之計五人為二千石故號萬石君孝景季年萬石君以上大夫禄歸老于家以歲時為朝臣師古曰豫朝請過宮門闕必下車趨見路馬必軾焉師古曰路馬天子路車之馬軾謂撫軾蓋為敬也子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐師古曰便坐於便側之處非正室也對案不食然後諸子相責因長老肉袒固謝罪改之廼許子孫勝冠者在側雖燕必冠申申如也師古曰申申整敕之貌僮僕訢訢如也晉灼曰許慎云古欣字也師古曰晉説非也此訢讀與誾誾同謹敬之貌也音牛巾反唯謹師古曰唯以謹敬為先上時賜食於家必稽首俯伏而食如在上前其執喪哀戚甚師古曰執喪猶言持喪服也禮記曰執親之喪子孫遵教亦如之萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆自以為不及也師古曰質重也建元二年郎中令王臧以文學獲罪皇太后張晏曰竇太后太后以為儒者文多質少今萬石君家不言而躬行廼以長子建為郎中令少子慶為内史建老白首萬石君尚無恙師古曰恙憂病每五日洗沐歸謁親文穎曰郎官五日一下劉奉世曰建為郎中令慶為内史非郎官也按霍光秉政亦休沐然則漢公卿以下皆有休沐也入子舍師古曰入諸子之舍自其所居也若今言諸房矣竊問侍者取親中帬廁牏身自澣洒服虔曰親身之衣也蘇林曰牏音投賈逵解周官云牏行清也孟康曰厠行清牏中受糞函者也東南人謂鑿木空中如曹謂之牏晉灼曰今世謂反閉小袖衫為侯牏師古曰親謂父也中帬若今言中衣也廁牏者近身之小衫若今汗衫也蘇音晉説是矣洒音先禮反復與侍者不敢令萬石君知之以為常建奏事於上前即有可言屏人乃言極切師古曰有可言謂有事當奏諫至廷見如不能言者師古曰廷見謂當朝而見時上以是親而禮之萬石君徙居陵里師古曰茂陵邑中之里劉攽曰長安中自有里名陵非茂陵里也内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝請罪不許舉宗及兄建肉袒萬石君讓曰師古曰讓責也内史貴人入閭里里中長老皆走匿而内史坐車中自如固當師古曰此深責之也言内史貴人正固當爾廼謝罷慶師古曰告令去慶及諸子入里門趨至家萬石君元朔五年卒建哭泣哀思杖廼能行歲餘建亦死諸子孫咸孝然建最甚甚於萬石君建為郎中令奏事下師古曰建有所奏上而被報下也下音胡亞反建讀之驚恐曰書馬者與尾而五服虔曰作馬字下曲者而五建時上書誤作四師古曰馬字下曲者為尾并四㸃為四足凡五今乃四不足一獲譴死矣其為謹慎雖他皆如是慶為太僕御出師古曰為上御車而出上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此出為齊相齊國慕其家行不治而齊國大治師古曰不治言無所治罰為立石相祠元狩元年上立太子選羣臣可傅者慶自沛守為太子太傅七歲遷御史大夫宋本七作十元鼎五年丞相趙周坐酎金免制詔御史萬石君先帝尊之子孫至孝其以御史大夫慶為丞相封牧丘侯是時漢方南誅兩越東擊朝鮮北逐匈奴西伐大宛中國多事天子廵狩海内脩古神祠封禪興禮樂公家用少桑宏羊等致利王溫舒之屬峻法兒寛等推文學九卿更進用事師古曰更互也音工衡反事不闗決於慶慶醇謹而已師古曰醇專厚也音純在位九歲無能有所匡言嘗欲請治上近臣所忠九卿咸宣服虔曰咸音減損之減師古曰治所忠及咸宣二人不能服反受其過贖罪元封四年闗東流民二百萬口無名數者四十萬師古曰名數若今户籍公卿議欲請徙流民於邊以適之師古曰適讀曰讁上以為慶老謹不能與其議師古曰與讀曰豫乃賜丞相告歸而案御史大夫以下議為請者慶慙不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廪空虚民多流亡罪當伏斧質上不忍致法願歸丞相侯印乞骸骨歸避賢者路上報曰間者河水滔陸晉灼曰滔漫也師古曰高平曰陸漫音莫干反泛濫十餘郡隄防勤勞弗能陻塞師古曰陻填也音因朕甚憂之是故廵方州張晏曰四方之州也師古曰東方諸州劉奉世曰後有濟淮江則不特東方州也宋祁曰注諸州州字當作侯禮嵩嶽通八神以合宣房孟康曰八神郊祀志八神也於宣房宮合祀之師古曰此説非也自言致禮中岳通敬八神耳合宣房者於宣房塞决河也事見溝洫志濟淮江歴山濱海師古曰濱海者循海涯而行也濱音賓又音頻問百年民所疾苦惟吏多私徵求無已師古曰惟思也已止也去者便居者擾故為流民法以禁重賦師古曰言百姓去其本土者則免於吏徵求在舊居者則見煩擾故朝廷特為流人設法又禁吏之重賦也一曰去者謂吏出使而侵擾居人以自便也劉攽曰是時設此法流民若干吏坐其罪所以禁重賦也劉敞曰此言以流民多少課吏殿最所以禁吏重賦乃者封泰山皇天嘉況神物並見師古曰況賜也見顯示也朕方答氣應未能承意師古曰言自脩整以報瑞應恐未承順上天之意是以切比閭里知吏姦邪師古曰比校考也音頻寐反劉奉世曰比近也此言因廵守經過閭里與民切近始得知吏素為姦故下又言因已委任有司之過故官曠民愁盜賊公行也委任有司然則官曠民愁盜賊公行師古曰曠空也人不舉職是空其官徃年覲明堂赦殊死無禁錮咸自新與更始今流民愈多計文不改蘇林曰校户口文書不改減也如淳曰郡上計文書自文餙不改正也師古曰如説是君不繩責長吏而請以興徙四十萬口劉奉世曰興讀如軍興揺蕩百姓師古曰蕩動也孤兒㓜年未滿十歲無罪而坐率服虔曰率坐刑法也如淳曰率家長也師古曰㓜年無罪坐為父兄所率而并徙如説近之朕失望焉今君上書言倉庫城郭不充實民多貧盜賊衆請入粟為庻人服虔曰慶自以居相位不能理請入粟贖已罪退為庻人夫懷知民貧而請益賦師古曰懷此心宋祁云浙本注此心字下有也字動危之而辭位師古曰揺動百姓使其危急而自欲去位欲安歸難乎師古曰以此危難之事欲歸之於何人君其反室師古曰若此自謂理當然者可還家慶素質見詔報反室自以為得許欲上印綬掾史以為見責甚深而終以反室者醜惡之辭也或勸慶宜引決師古曰令自殺慶甚懼不知所出遂復起視事慶為丞相文深審謹無他大畧後三歲餘薨諡曰恬侯中子德慶愛之上以德嗣後為太常坐法免國除慶方為丞相時諸子孫為小吏至二千石者十三人及慶死後稍以罪去孝謹衰矣衞綰代大陵人也以戲車為郎事文帝服虔曰力士能扶戲車也應劭曰能左右超乗師古曰二説皆非也戲車若今之弄車之技功次遷中郎將醇謹無它師古曰無它餘志念也孝景為太子時召上左右飲而綰稱病不行張晏曰恐文帝謂豫有二心事太子文帝且崩時屬孝景曰綰長者善遇之及景帝立歲餘不孰何綰服虔曰不問也李奇曰孰誰也何呵也師古曰何即問也不誰何者猶言不借問耳劉奉世曰誰何漢之通語不須解為借問綰日以謹力師古曰自勉力為謹慎日日益甚景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎師古曰言何以得參乘綰曰臣代戲車士幸得功次遷待罪中郎將不知也上問曰吾為太子時召君君不肯來何也師古曰言以此特識之對曰死罪病上賜之劒綰曰先帝賜臣劒凡六不敢奉詔上曰劒人之所施易獨至今乎如淳曰施讀曰移言劒者人所好故多數移易貿換之也師古曰施讀曰貤貤延也音弋豉反綰曰具在上使取六劒劒常盛未嘗服也師古曰盛謂在削室之中也盛音成削音先召反郎官有譴常蒙其罪師古曰蒙謂覆蔽之不與它將爭有功常讓它將上以為亷忠實無它腸師古曰心腸之内無它惡宋祁云一本它作心乃拜綰為河間王太傅吳楚反詔綰為將將河間兵擊吳楚有功拜為中尉三歲以軍功封綰為建陵侯明年上廢太子誅栗卿之屬師古曰太子廢為臨江王故誅其外家親屬上以綰為長者不忍乃賜綰告歸而使郅都治捕栗氏既已上立膠東王為太子召綰拜為太子太傅遷為御史大夫五歲代桃侯舎為丞相師古曰劉舍朝奏事如職所奏師古曰言守職分而已然自初宦以至相終無可言師古曰不能有所興建及廢罷上以為敦厚可相少主尊寵之賞賜甚多為丞相三歲景帝崩武帝立建元中丞相以景帝病時諸官囚多坐不辜者而君不任職師古曰天子不親政則丞相當理之而綰不申其寃免之後薨諡曰哀侯子信嗣坐酎金國除直不疑南陽人也為郎事文帝其同舎有告歸誤持其同舍郎金去已而同舍郎覺亡意不疑師古曰疑其盜取不疑謝有之師古曰告云實取宋祁曰别本無謝字買金償後告歸者至而歸金亡金郎大慙以此稱為長者稍遷至中大夫朝廷見人或毁不疑師古曰當於闕廷大朝見之時而人毁之劉敞曰朝廷見人謂逹官也曰不疑狀貌甚美然特無奈其善盜嫂何也師古曰盜謂私之不疑聞曰我乃無兄然終不自明也吳楚反時不疑以二千石將擊之景帝後元年拜為御史大夫天子脩吳楚時功封不疑為塞侯師古曰塞音先代反武帝即位與丞相綰俱以過免不疑學老子言其所臨為官如故唯恐人之知其為吏迹也不好立名稱為長者薨諡曰信侯傳子至孫彭祖坐酎金國除周仁其先任城人也以毉見師古曰見於天子景帝為太子時為舎人積功遷至大中大夫景帝初立拜仁為郎中令仁為人陰重不泄服䖍曰質重不泄人之陰謀也張晏曰陰重不泄下濕故溺袴是以得比宦者得入後宮也仁有子孫先未得此疾時所生也師古曰張服二説皆非也陰宻也為性宻重不泄人言也霍去病少言不泄亦其類也常衣弊補衣溺袴故為不絜清師古曰故為不絜清之事而弊敗其衣服也溺讀曰尿尿袴者為小袴以藉其尿劉奉世曰袴非小袴能藉則近絜矣此常袴溺瀝其上不洗濯之以其不潔之故人惡逺之乃得至後宮也宋祁云越本作期為不絜清以是得幸入卧内於後宮祕戲仁常在旁終無所言師古曰是不泄也上時問人師古曰問以他人之善惡仁曰上自察之然亦無所毁如此師古曰雖知其惡不欲言毁之故云上自察之景帝再自幸其家家徙陽陵上所賜甚多然終常讓不敢受也諸侯羣臣賂遺終無所受武帝立為先帝臣重之師古曰重謂敬難也仁乃病免以二千石禄歸老子孫咸至大官張敺字叔孟康曰敺音驅高祖功臣安丘侯説少子也師古曰説讀曰悦敺孝文時以治刑名侍太子師古曰劉向别録云申子學號曰刑名刑名者循名以責實其尊君卑臣崇上抑下合于六經説者云刑刑家名名家也即太史公所論六家之二也此説非劉攽曰予謂刑名者即并學兩家術耳然其人長者景帝時尊重常為九卿至武帝元朔中代韓安國為御史大夫歐為吏未嘗言按人剸以誠長者處官師古曰剸與專同又音之兖反官屬以為長者亦不敢大欺上具獄事有可郤郤之師古曰退令更平畨之宋祁云注文舊本畨作幡不可者不得已為涕泣面而封之如淳曰不正視若不見者也晉灼曰面對囚讀而封之使其聞見死而無恨也師古曰二説皆非也面謂偝之也言不忍視之與呂馬童面之同義其愛人如此老篤請免天子亦寵以上大夫禄歸老于家家陽陵子孫咸至大官贊曰仲尼有言君子欲訥於言而敏於行師古曰論語載孔子之言也訥遲也敏疾也其萬石君建陵侯塞侯張叔之謂與師古曰與讀曰歟是以其教不肅而成不嚴而治至石建之澣衣周仁為垢汙君子譏之前漢書卷四十六前漢書卷四十六考證石奮傳而内史坐車中自如固當注云云顧炎武曰反言之也言貴而驕人當如此乎顔注未是萬石君元朔五年卒臣召南按前文云高祖東擊項籍過河内時奮年十五為小吏則漢之二年也至元朔五年凡八十五載萬石君蓋一百歲建以哀毁歲餘卒蓋亦八十歲矣九卿更進用事臣召南按史記作兒寛等推文學至九卿則九卿屬上句讀漢書既刪去至字則九卿屬下句讀言當時九卿更互用事不專倚丞相也衞綰傳不孰何綰按史記作不譙呵綰疑譙呵是誰何之譌綰曰臣代戲車士史記作臣從車士直不疑傳至孫彭祖坐酎金國除臣召南按史記不疑子相如相如子望坐酎金失侯而本書功臣表作侯堅坐酎金免望堅兩字相似未知孰正但俱不云名彭祖也張敺傳張敺字叔注孟康曰敺音驅按注音驅則各本作歐誤也又安邱侯説少子也史記作庻子也前漢書卷四十六考證
