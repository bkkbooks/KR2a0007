body:
  text: 前漢書卷九十六上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注西域傳第六十六上師古曰自烏孫國已後分爲下卷西域以孝武時始通本三十六國其後稍分至五十餘師古曰司馬虎續漢書云至于哀平有五十五國也皆在匈奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢阸以玊門陽關孟康曰二關皆在敦煌西界師古曰阸塞也西則限以葱嶺師古曰西河舊事云葱嶺其山髙大上悉生葱故以名焉其南山東出金城與漢南山屬焉師古曰屬聨也音之欲反其河有兩原一出葱嶺山一出于闐師古曰闐字與窴同音徒賢反又徒見反于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里師古曰袤長也音茂其水亭居冬夏不增減皆以爲潛行地下南出於積石爲中國河云自玉門陽關出西域有兩道從鄯善傍南山北波河西行至莎車爲南道師古曰波河循河也鄯音上扇反傍音歩浪反波音彼義反此下皆同也南道西踰葱嶺則出大月氏安息師古曰氏音支自車師前王庭隨北山波河西行至疏勒爲北道北道西踰葱嶺則出大宛康居奄蔡焉耆西域諸國大率土著師古曰言著土地而有常居不隨畜牧移徙也著音直略反有城郭田畜與匈奴烏孫異俗故皆役屬匈奴師古曰服屬於匈奴爲其所役使也匈奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉黎間賦稅諸國取富給焉師古曰給足也自周衰戎狄錯居涇渭之北師古曰錯雜也及秦始皇攘郤戎狄築長城界中國師古曰爲中國之境界也然西不過臨洮師古曰洮音土髙反漢興至于孝武事征四夷廣威徳而張騫始開西域之迹其後票騎將軍撃破匈奴右地降渾邪休屠王師古曰屠音除遂空其地始築令居以西師古曰令音鈴宋祁曰集韻令音連云令居縣名在金城郡初置酒泉郡後稍發徙民充實之分置武威張掖敦煌師古曰敦音徒門反列四郡據兩關焉自貳師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職師古曰賞其勤勞皆得拜職也於是自敦煌西至鹽澤徃徃起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶師古曰綂領保䕶營田之事也以給使外國者師古曰收其所種五榖以供之至宣帝時遣衛司馬使䕶鄯善以西數國及破姑師未盡殄師古曰雖破其國未能滅之分以爲車師前後王及山北六國時漢獨䕶南道未能盡并北道也然匈奴不自安矣其後日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之旣至漢封日逐王爲歸徳侯吉爲安遠侯是歲神爵三年也乃因使吉并䕶北道故號曰都䕶都䕶之起自吉置也師古曰都猶總也言總䕶南北之道僮僕都尉由此罷匈奴益弱不得近西域於是徙屯田田於北胥鞬師古曰胥鞬地名也胥音先餘反鞬音居言反披莎車之地師古曰披分也屯田校尉始屬都䕶都䕶督察烏孫康居諸外國師古曰督視也動静有變以聞可安輯安輯之可撃撃之師古曰輯與集同都䕶治烏壘城宋祁曰烏壘下監本有孫字去陽關二千七百三十八里與渠犂田官相近土地肥饒於西域爲中故都䕶治焉至元帝時復置戊巳校尉屯田車師前王庭是時匈奴東蒲類王兹力支將人衆千七百餘人降都䕶都䕶分車師後王之西爲烏貪訾離地以處之自宣元後單于稱藩臣西域服從其土地山川王侯户數道里遠近翔實矣師古曰翔與詳同假借用耳出陽關自近者始曰婼羌孟康曰婼音兒師古曰音而遮反婼羌國王號去胡來王師古曰言去離胡戎來附漢也去陽關千八百里宋祁曰越本八作六去長安六千三百里辟在西南不當孔道師古曰辟讀曰僻孔道者穿山險而爲道猶今言穴徑耳戸四百五十口千七百五十勝兵者五百人西與且末接師古曰且音子餘反隨畜逐水草不田作仰鄯善且末榖師古曰頼以自給也仰音牛向反山有鐵自作兵兵有弓矛服刀劒甲劉徳曰服刀拍髀也師古曰拍音貃髀音俾又音陛西北至鄯善乃當道云鄯善國本名樓蘭王治扜泥城師古曰扜音一胡反去陽關千六百里去長安六千一百里户千五百七十口萬四千一百勝兵二千九百十二人輔國侯卻胡侯師古曰卻音丘畧反其字從卩卩音節下皆類此鄯善都尉撃車師都尉左右且渠撃車師君各一人譯長二人西北去都䕶治所千七百八十五里至山國千三百六十五里師古曰此國山居故名山國也西北至車師千八百九十里地沙鹵少田寄田仰榖旁國師古曰寄於它國種田又糴旁國之榖也仰音牛向反國出玉多葭葦檉栁胡桐白草孟康曰白草草之白者胡桐似桑而多曲師古曰檉栁河栁也今謂之赤檉白草似莠而細無芒其乾􅍄時正白色牛馬所嗜也胡桐亦似桐不類桑也蟲食其𣗳而沬出下流者俗名爲胡桐淚言似眼淚也可以汗金銀也今工匠皆用之流俗語訛呼淚為律檉音丑成反宋祁曰注文工字别本作匠民隨畜牧逐水草有驢馬多橐它師古曰它古駝字也音徒何反能作兵與婼羌同初武帝感張騫之言甘心欲通大宛諸國使者相望於道一歲中多至十餘輩樓蘭姑師當道苦之師古曰每供給使者受其勞費故厭苦也攻劫漢使王恢等又數爲匈奴耳目令其兵遮漢使漢使多言其國有城邑兵弱易撃於是武帝遣從票侯趙破奴將屬國騎及郡兵數萬撃姑師師古曰屬國謂諸外國屬漢也王恢數爲樓蘭所苦上令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬師古曰暴謂顯揚也還封破奴爲浞野侯恢爲浩侯蘇林曰浩音吴於是漢列亭障至玉門矣樓蘭旣降服貢獻匈奴聞發兵撃之於是樓蘭遣一子質匈奴一子質漢後貳師軍撃大宛匈奴欲遮之貳師兵盛不敢當卽遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門關爲貳師後距師古曰後距者居後以距敵捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王師古曰以文簿一一責之簿音歩戸反對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國師古曰以其言爲直亦因使候伺匈奴匈奴自是不甚親信樓蘭征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下𧖟室宫刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質匈奴後王又死匈奴先聞之遣質子歸得立爲王師古曰匈奴在漢前聞樓蘭王死故卽遣質子還也漢遣使詔新王令入朝天子将加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子質漢皆不還奈何欲徃朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢使又數爲吏卒所宼懲艾不便與漢通師古曰艾讀曰乂後復爲匈奴反間師古曰間音居莧反數遮殺漢使其弟尉屠耆降漢具言状元鳳四年大將軍霍光白遣平樂監傅介子徃刺其王介子輕將勇敢士齎金幣揚言以賜外國爲名旣至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首師古曰嘗歸者其王名也昭紀言安歸今此作嘗歸紀傳不同當有誤者馳傳詣闕師古曰傳音張戀反縣首北闕下封介子爲義陽侯乃立尉屠耆爲王更名其國爲鄯善爲刻印章賜以宫女爲夫人備車騎輜重師古曰重音直用反丞相將軍率百官送至横門外孟康曰横音光宋祁曰淳化本作丞相將軍百官景徳監本及浙本作丞相率百官無將軍字今越本作丞相將軍率百官祖而遣之師古曰爲設祖道之禮也王自請天子曰身在漢久今歸單弱而前王有子在恐爲所殺國中有伊循城其地肥羙願漢遣一將屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之師古曰填音竹刃反其後更置都尉伊循官置始此矣鄯善當漢道衝西通且末七百二十里自且末以徃皆種五榖土地草木畜産作兵略與漢同有異乃記云且末國王治且末城去長安六千八百二十里户二百三十口千六百一十勝兵三百二十人輔國侯左右將譯長各一人西北至都䕶治所二千二百五十八里北接尉犂南至小宛可三日行有蒲陶諸果西通精絶二千里小宛國王治扜零城師古曰扜音烏去長安七千二百一十里户百五十口千五十勝兵二百人輔國侯左右都尉各一人西北至都䕶治所二千五百五十八里東與婼羌接辟南不當道師古曰辟讀曰僻下皆類此精絶國王治精絶城去長安八千八百二十里户四百八十口三千三百六十勝兵五百人精絶都尉左右將譯長各一人北至都䕶治所二千七百二十三里南至戎盧國四日行地阸陿西通扜彌四百六十里師古曰扜音烏戎盧國王治卑品城去長安八千三百里户二百四十口千六百一十勝兵三百人東北至都䕶治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道扜彌國王治扜彌城去長安九千二百八十里户三千三百四十口二萬四十勝兵三千五百四十人輔國侯左右將左右都尉左右騎君各一人譯長二人東北至都䕶治所三千五百五十三里南與渠勒東北與龜兹西北與姑墨接師古曰龜音丘兹音慈西通于闐三百九十里今名寧彌渠勒國王治鞬都城師古曰鞬音居言反去長安九千九百五十里戸三百一十口二千一百七十勝兵三百人東北至都䕶治所三千八百五十二里東與戎盧西與婼羌北與扜彌接于闐國王治西城去長安九千六百七十里戸三千三百口萬九千三百勝兵二千四百人輔國侯左右將左右騎君東西城長譯長各一人東北至都䕶治所三千九百四十七里南與婼羌接北與姑墨接于闐之西水皆西流注西海其東水東流注鹽澤河原出焉蘓林曰即中國河也多玉石師古曰玉之璞也一曰石之似玉也西通皮山三百八十里皮山國王治皮山城去長安萬五十里戸五百口三千五百勝兵五百人左右將左右都尉騎君譯長各一人東北至都䕶治所四千二百九十二里西南至烏秅國千三百四十里鄭氏曰烏秅音鷃拏師古曰烏音一加反秅音直加反急言之聲如鷃拏耳非正音也南與天篤接北至姑墨千四百五十里西南當罽賔烏弋山離道西北通莎車三百八十里烏秅國王治烏秅城劉敞曰秅當作耗去長安九千九百五十里戸四百九十口二千七百三十三勝兵七百四十人東北至都䕶治所四千八百九十二里北與子合蒲犂西與難兠接山居田石間有白草累石爲室民接手飲師古曰自髙山下谿澗中飲水故接連其手如猿之爲出小歩馬孟康曰種小能歩也師古曰此說非也小細也細歩言其能蹀足卽今所謂百歩千跡者也豈謂其小種乎有驢無牛其西則有縣度師古曰縣䋲而度也縣古懸字耳去陽關五千八百八十八里去都䕶治所五千二十里縣度者石山也谿谷不通以繩索相引而度云西夜國王號子合王治呼犍谷師古曰犍音鉅言反去長安萬二百五十里戸三百五十口四千勝兵千人東北到都䕶治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接蒲犂及依耐無雷國師古曰耐音奴代反皆西夜類也西夜與胡異其種類羌氐行國師古曰言不土著也隨畜逐水草徃來而子合土地出玉石蒲犂國王治蒲犂谷去長安九千五百五十里戸六百五十口五千勝兵二千人東北至都䕶治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里候都尉各一人寄田莎車種俗與子合同依耐國王治去長安萬一百五十里戸一百二十五口六百七十勝兵三百五十人東北至都䕶治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接俗相與同師古曰與子合同風俗也少榖寄田疏勒莎車無雷國王治盧城去長安九千九百五十里戸千口七千勝兵三千人東北至都䕶治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氏接師古曰捐毒卽身毒天篤也本皆一名語有輕重耳衣服類烏孫俗與子合同難兠國王治去長安萬一百五十里户五千口三萬一千勝兵八千人東北至都䕶治所二千八百五十里西至無雷三百四十里西南至罽賔三百三十里南與婼羌北與休循西與大月氏接劉奉世曰按婼羌小國最近陽關去長安六千里耳在都䕶之東而此渠勒于闐難兠之類去長安且萬里東北行數千里乃至都䕶安得與婼羌相接必誤種五榖蒲陶諸果有銀銅鐵作兵與諸國同屬罽賔罽賔國王治循鮮城去長安萬二千二百里不屬都䕶戸口勝兵多大國也東北至都䕶治所六千八百四十里東至烏秅國二千二百五十里東北至難兠國九日行西北與大月氏西南與烏弋山離接昔匈奴破大月氏大月氏西君大夏而塞王南君罽賔師古曰君謂爲之君也塞音先得反塞種分散徃徃爲數國師古曰卽所謂釋種者也亦語有輕重耳自疏勒以西北休循捐毒之屬皆故塞種也罽賔地平温和有目宿雜草竒木檀櫰梓竹漆師古曰櫰音懐卽槐之類也葉大而黒也種五穀蒲陶諸果糞治園田地下溼生稲冬食生菜其民巧雕文刻鏤治宫室織罽刺文繡好治食有金銀銅錫以爲器市列師古曰市有列肆亦如中國也以金銀爲錢文爲騎馬幕爲人面張晏曰錢文面作騎馬形漫面作人面目也如淳曰幕音漫師古曰幕卽漫耳無勞借音今所呼幕皮者亦謂其平而無文也出封牛水牛象大狗沐猴孔爵師古曰封牛項上隆起者也郭義恭廣志云罽賔大狗大如驢赤色數里搖鞉以呼之沐猴卽彌猴也珠璣珊瑚虎魄璧流離孟康曰流離青色如玉師古曰魏略云大秦國出赤白黒黄青綠縹紺紅紫十種流離孟言青色不博通也此蓋自然之物采澤光潤踰於衆玉其色不恒今俗所用皆銷冶石汁加以衆藥灌而爲之尤虚脆不貞實非眞物它畜與諸國同自武帝始通罽賔自以絶遠漢兵不能至其王烏頭勞數剽殺漢使師古曰剽劫也音頻妙反烏頭勞死子代立遣使奉獻漢使關都尉文忠送其使王復欲害忠忠覺之廼與容屈王子隂末赴共合謀攻罽賔殺其王立隂末赴爲罽賔王授印綬後軍候趙徳使罽賔與隂末赴相失師古曰相失意也隂末赴鎻琅當徳師古曰琅當長鎻也若今之禁繫人鎻矣琅音郎殺副已下七十餘人遣使者上書謝孝元帝以絶域不錄放其使者於縣度絕而不通成帝時復遣使獻謝罪漢欲遣使者報送其使杜欽說大將軍王鳳曰前罽賔王隂末赴本漢所立後卒畔逆師古曰卒終也夫徳莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶遠兵不至也有求則卑辭無欲則驕嫚終不可懐服凡中國所以爲通厚蠻夷㥦快其求者爲壤比而爲宼也師古曰比近也爲其土壤接近能爲宼也㥦音苦頰反比音頻寐反今縣度之阸非罽賔所能越也其郷慕不足以安西域師古曰郷讀曰嚮雖不附不能危城郭師古曰城郭總謂西域諸國也前親逆節惡暴西域師古曰暴謂章露也故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻爲名故煩使者送至縣度恐失實見欺凡遣使送客者欲爲防䕶宼害也起皮山南更不屬漢之國四五師古曰言經歴不屬漢者凡四五國也更音工衡反斥候士百餘人五分夜撃刁斗自守師古曰夜有五更故分而持之也刁斗觧在李廣傳尚時爲所侵盗驢畜負糧須諸國稟食得以自贍師古曰稟給也贍足也食讀曰飤以下並同國或貧小不能食或桀黠不肯給擁彊漢之節餒山谷之間師古曰餒飢也音能賄反乞匄無所得師古曰匄亦乞也音工大反離一二旬則人畜棄捐曠野而不反師古曰離亦歴也曠空也又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然師古曰嘔音一口反又有三池盤石阪道陿者尺六七寸長者徑三十里臨崢嶸不測之深師古曰崢嶸深險之貌也崢音仕耕反嶸音宏行者騎歩相持䋲索相引二千餘里乃到縣度畜隊未半阬谷盡靡碎師古曰隊亦墮也靡散也隊音直類反靡音縻人墯埶不得相收視險阻危害不可勝言聖王分九州制五服師古曰九州冀兗豫青徐荆揚梁雍也五服侯甸綏要荒務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆渉危難之路罷弊所恃以事無用師古曰罷讀曰疲所恃謂中國之人也無用謂遠方蠻夷之國非久長計也使者業已受節可至皮山而還師古曰言已立計遣之不能卽止可至皮山也於是鳳白從欽言罽賔實利賞賜賈市其使數年而壹至云烏弋山離國王去長安萬二千二百里不屬都䕶戸口勝兵大國也東北至都䕶治所六十日行東與罽賔北與撲挑宋祁曰景本挑作桃西與犂靬條支接師古曰撲音布木反犂讀與驪同靬音鉅連反又鉅言反行可百餘日乃至條支國臨西海暑溼田稲有大鳥卵如甕師古曰甕汲水缾也音於龍反人衆甚多徃徃有小君長安息役屬之以爲外國師古曰安息以條支爲外國如言蕃國也善眩師古曰眩讀與幻同解在張騫傳安息長老傳聞條支有弱水西王母亦未嘗見也師古曰𤣥中記云昆侖之弱水鴻毛不能起也爾雅曰觚竹北户西王母日下謂之四荒也自條支乗水西行可百餘日近日所入云烏弋地暑熱莽平師古曰言有草莽而平坦也一曰莽莽平野之貌其草木畜産五穀果菜食飲宫室市列錢貨兵器金珠之屬皆與罽賔同而有桃拔師子犀牛孟康曰桃拔一名符拔似鹿長尾一角者或爲天鹿兩角者或爲辟邪師子似虎正黄有􅏋耏尾端茸毛大如斗師古曰師子卽爾雅所謂狻猊也狻音酸猊音倪拔音歩葛反耏亦頰旁毛也音而茸音人庸反俗重妄殺師古曰重難也言其仁愛不妄殺也其錢獨文爲人頭幕爲騎馬以金銀飾杖師古曰杖謂所持器也音直亮反絶遠漢使希至自玉門陽關出南道歴鄯善而南行至烏弋山離南道極矣轉北而東得安息安息國王治番兠城蘇林曰番音盤去長安萬一千六百里不屬都䕶北與康居東與烏弋山離西與條支接土地風氣物類所有民俗與烏弋罽賔同亦以銀爲錢文獨爲王面幕爲夫人面王死輙更鑄錢有大馬爵師古曰廣志云大爵頸及膺身蹄似槖駝色蒼舉頭髙八九尺張翅丈餘食大麥宋祁曰注文張翅下當有舉字其屬小大數百城地方數千里最大國也臨嬀水商賈車船行旁國書革旁行爲書記服䖍曰横行爲書記也師古曰今西方胡國及南方林邑之徒書皆横行不直下也革謂皮之不柔者武帝始遣使至安息王令將將二萬騎迎於東界東界去王都數千里行比至過數十城人民相屬師古曰屬聨也音之欲反因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻於漢天子大說師古曰說讀曰悅安息東則大月氏大月氏國王治監氏城去長安萬一千六百里不屬都䕶戸十萬口四十萬勝兵十萬人東至都䕶治所四千七百四十里西至安息四十九日行南與罽賔接土地風氣物類所有民俗錢貨與安息同出一封橐駝師古曰脊上有一封也封言其隆髙若封土也今俗呼爲封牛封音峯大月氏本行國也隨畜移徙與匈奴同俗控弦十餘萬故彊輕匈奴師古曰自恃其彊盛而輕易匃奴也本居敦煌祁連間至冒頓單于攻破月氏而老上單于殺月氏以其頭爲飲器月氏乃遠去過大宛西擊大夏而臣之師古曰解在張騫傳都媯水北爲王庭其餘小衆不能去者保南山羌號小月氏大夏本無大君長城邑徃徃置小長民弱畏戰故月氏徙來皆臣畜之共禀漢使者師古曰同受節度也有五翖侯師古曰翖卽翕字一曰休宻翖侯治和墨城去都䕶二千八百四十一里去陽關七千八百二里二曰雙靡翖侯治雙靡城去都䕶三千七百四十一里去陽關七千七百八十二里三曰貴霜翖侯治䕶澡城師古曰澡音藻去都䕶五千九百四十里去陽關七千九百八十二里四曰肸頓翖侯師古曰肸音許乙反治薄茅城去都䕶五千九百六十二里去陽關八千二百二里五曰髙附翖侯治髙附城去都䕶六千四十一里去陽關九千二百八十三里凡五翖侯皆屬大月氏康居國王冬治樂越匿地師古曰樂音來各反到卑闐城師古曰闐音徒干反去長安萬二千三百里不屬都䕶至越匿地馬行七日至王夏所居蕃内九千一百四里師古曰王每冬寒夏暑則徙别居不一處戸十二萬口六十萬勝兵十二萬人東至都䕶治所五千五百五十里與大月氏同俗東羈事匈奴師古曰爲匈奴所羈牽也宣帝時匈奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居師古曰依其險阻以自保固也其後都䕶甘延壽副校尉陳湯發戊巳校尉西域諸國兵至康居誅滅郅支單于語在甘延壽陳湯傳是歲元帝建昭三年也至成帝時康居遣子侍漢貢獻然自以絶遠獨驕嫚不肯與諸國相望都䕶郭舜數上言夲匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國内相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反爲中國生事然烏孫旣結在前今與匈奴俱稱臣義不可距而康居驕黠訖不肯拜使者師古曰訖竟也都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲㗖都䕶吏師古曰飲音於禁反㗖音徒濫反故爲無所省以夸旁國師古曰言故不省視漢使也以此度之何故遣子入侍其欲賈市爲好辭之詐也匈奴百蠻大國師古曰於百蠻之中最大國也今事漢甚備聞康居不拜且使單于有自下之意師古曰言單于見康居不事漢以之為髙自以事漢爲太卑而欲改志也宜歸其侍子絶勿復使師古曰不通使於其國也以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者徃來人馬驢橐駝食皆苦之師古曰言二郡八國皆以此事爲困苦空罷耗所過送迎驕黠絶遠之國師古曰所過所經過之處驕黠謂康居使也罷讀曰疲耗音呼到反非至計也漢爲其新通重致遠人師古曰以此聲名爲重也終羈縻而未絶其康居西北可二千里有奄蔡國控弦者十餘萬人與康居同俗臨大澤無崖蓋北海云康居有小王五一曰蘇䪥王治蘇䪥城師古曰䪥音下戒反去都䕶五千七百七十六里去陽關八千二十五里二曰附墨王治附墨城去都䕶五千七百六十七里去陽關八千二十五里三曰窳匿王師古曰窳音庾治窳匿城去都䕶五千二百六十六里去陽關七千五百二十五里四曰罽王治罽城去都䕶六千二百九十六里去陽關八千五百五十五里五曰奥鞬王師古曰奥音於六反鞬音居言反治奥鞬城去都䕶六千九百六里去陽關八千三百五十五里凡五王屬康居大宛國王治貴山城去長安萬二千五百五十里戸六萬口三十萬勝兵六萬人副王輔國王各一人東至都䕶治所四千三十一里北至康居卑闐城千五百一十里西南至大月氏六百九十里北與康居南與大月氏接土地風氣物類民俗與大月氏安息同大宛左右以蒲陶爲酒富人藏酒至萬餘石久者至數十歲不敗俗耆酒馬耆目宿師古曰耆讀曰嗜宛别邑七十餘城多善馬馬汗血言其先天馬子也孟康曰言大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始爲武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絕遠大兵不能至愛其寳馬不肯與漢使妄言師古曰謂詈辱宛王宛遂攻殺漢使取其財物於是天子遣貳師將軍李廣利將兵前後十餘萬人伐宛連四年宛人斬其王母寡首獻馬三千匹漢軍乃還語在張騫傳貳師旣斬宛王更立貴人素遇漢善者名昧蔡爲宛王師古曰昧音秣蔡音千曷反後歲餘宛貴人以爲昧蔡讇使我國遇屠師古曰讇古謟字相與共殺昧蔡立母寡弟蟬封爲王遣子入侍質於漢漢因使使賂賜鎭撫之又發使十餘輩抵宛西諸國師古曰抵至也求竒物因風諭以伐宛之威師古曰風讀曰諷宛王蟬封與漢約歲獻天馬二匹漢使采蒲陶目宿種歸天子以天馬多又外國使來衆益種蒲陶目宿離宫館旁極望焉師古曰今北道諸州舊安定北地之境徃徃有目宿者皆漢時所種也自宛以西至安息國雖頗異言然大同自相曉知也其人皆深目多須䫇善賈市爭分銖貴女子女子所言丈夫乃決正其地皆絲漆不知鑄鐵器及漢使亡卒降敎鑄作它兵器師古曰漢使至其國及有亡卒降其國者皆教之也得漢黄白金輙以爲器不用爲幣自烏孫以西至安息近匈奴匈奴嘗困月氏師古曰困苦也故匈奴使持單于一信到國國傳送食師古曰言畏之甚也食讀曰飤不敢留苦師古曰不敢留連及困苦之也及至漢使非出幣物不得食不市畜不得騎所以然者以遠漢而漢多財物師古曰遠音于萬反故必市乃得所欲及呼韓邪單于朝漢後咸尊漢矣桃槐國王去長安萬一千八十里師古曰槐音囬戸七百口五千勝兵千人休循國王治鳥飛谷在葱領西去長安萬二百一十里戸三百五十八口千三十勝兵四百八十人東至都䕶治所三千一百二十一里至捐毒衍敦谷二百六十里西北至大宛國九百二十里西至大月氏千六百一十里民俗衣服類烏孫因畜隨水草本故塞種也捐毒國王治衍敦谷去長安九千八百六十里戸三百八十口千一百勝兵五百人東至都䕶治所二千八百六十一里至疏勒南與葱領屬師古曰屬聨也音之欲反無人民西上葱領則休循也西北至大宛千三十里北與烏孫接衣服類烏孫隨水草依葱領本塞種也莎車國王治莎車城去長安九千九百五十里戸二千三百三十九口萬六千三百七十三勝兵三千四十九人輔國侯左右將左右騎君備西夜君各一人都尉二人譯長四人東北至都䕶治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里有鐵山出青玉宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心卽上書請萬年爲莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不說師古曰說讀曰悅莎車王弟呼屠徵殺萬年并殺漢使者自立爲王約諸國背漢㑹衛侯馮奉世使送大宛客卽以便宜發諸國兵撃殺之更立它昆弟子爲莎車王還拜奉世爲光祿大夫是歲元康元年也疏勒國王治疏勒城去長安九千三百五十里戸千五百一十口萬八千六百四十七勝兵二千人疏勒侯撃胡侯輔國侯都尉左右將左右騎君左右譯長各一人東至都䕶治所二千二百一十里南至莎車五百六十里有市列西當大月氏大宛康居道也尉頭國王治尉頭谷去長安八千六百五十里戸三百口二千三百勝兵八百人左右都尉各一人左右騎君各一人東至都䕶治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日田畜隨水草衣服類烏孫前漢書卷九十六上前漢書卷九十六上考證西域傳本三十六國臣召南按荀悅漢紀列三十六國名目王應麟謂傳旣言三十六國皆在匈奴之西烏孫之南則烏孫不與矣又康居大月氏安息罽賔烏弋之屬皆以絶遠不在數中難兠屬罽賔亦不在數中大率祗就屬都䕶者計之也漢使西域者益得職注師古曰賞其勤勞皆得拜職也胡三省曰顔說非也此言漢使入西域諸國不敢輕忽爲得其職耳得職者不失其職也是歲神爵三年也臣召南按宣紀是神爵二年事此三字訛通鑑考異已辨之矣都䕶治烏壘城宋白曰伊州伊吾郡漢伊吾盧地宣帝時鄭吉爲西域都䕶治烏壘城卽此臣召南按本傳言烏壘城去陽關二千七百三十八里而車師國西南至都䕶治所千八百七里龜兹國東至都䕶治所三百五十里則烏壘尚在車師西南與龜兹相近非伊州伊吾地在車師之東者也伊吾地卽今哈密城後漢永平中始置宜禾都尉在前漢未聞其名宋白說非也扜彌國傳今名寧彌按此孟堅自据作史時言也後書曰拘彌國王居寧彌城西夜國傳西夜國王號子合王臣召南按西夜與子合是二國後書云西夜國一名漂沙漢書誤云西夜子合是一國子合國居呼犍谷此則紏漢書之違也無雷國傳北與捐毒西與大月氏接注師古曰捐毒卽身毒天篤也臣召南按天篤卽天竺也下文罽賔傳曰塞種分散徃徃爲數國師古曰塞種卽所謂釋種者也蓋卽浮屠氏國其種分散遍於諸國故又云自䟽勒以西北休循捐毒之屬皆故塞種後書傳之天竺卽此傳之捐毒而後世又曰印度國也烏弋山離國傳行可百餘日乃至條支國臨西海臣召南按後漢班超遣掾甘英窮臨西海而還蓋前漢使者但至烏弋莫有至條支者凡言條支所有皆傳聞也故後書紏此文之違安息國傳治番兜城番兜城後書作和櫝城又大月氏國治監氏城後書作藍氏城康居國傳東羈事匃奴注師古云云顧炎武曰言不純臣但羈縻事之與烏孫羈屬同意當用彼注刪此注前漢書卷九十六上考證欽定四庫全書前漢書卷九十六下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注西域傳第六十六下烏孫國大昆彌治赤谷城師古曰烏孫於西域諸戎其形最異今之胡人青眼赤須狀類彌猴者本其種也去長安八千九百里戸十二萬口六十三萬勝兵十八萬八千八百人相大禄左右宋祁曰楊本無左右二字大將二人侯三人大將都尉各一人宋祁曰楊本大將作大夫大監二人大吏一人舍中大吏二人騎君一人東至都䕶治所千七百二十一里西至康居蕃内地五千里地莽平多雨寒山多松樠師古曰莽平謂有草莽而平坦也一曰莽莽平野之貌樠木名其心似松音武元反不田作種樹師古曰樹殖也隨畜逐水草與匈奴同俗國多馬富人至四五千匹民剛惡貪狠無信多寇盗最為彊國故服匈奴師古曰故謂舊時也服屬於匈奴也後盛大取羈屬不肯往朝㑹師古曰言纔羈縻屬之而已東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也大月氏西破走塞王塞王南越縣度大月氏居其地後烏孫昆莫擊破大月氏大月氏徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氏種云始張騫言烏孫本與大月氏共在敦煌間今烏孫雖彊大可厚賂招令東居故地妻以公主與爲昆弟以制匈奴語在張騫傳武帝卽位劉敞曰衍位字令騫齎金幣往昆莫見騫如單于禮師古曰昆莫自比於單于騫大慙謂曰天子致賜王不拜則還賜師古曰還賜謂將賜物還歸漢也昆莫起拜其它如故初昆莫有十餘子中子大祿彊善將師古曰言其材力優彊能爲將將衆萬餘騎别居大祿兄太子太子有子曰岑陬師古曰岑音仕林反陬音子侯反太子蚤死師古曰蚤古早字謂昆莫曰必以岑陬爲太子昆莫哀許之大祿怒廼收其昆弟將衆畔謀攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎以自備國分爲三大總羈屬昆莫騫旣致賜諭指曰烏孫能東居故地則漢遣公主爲夫人結爲昆弟共距匈奴不足破也烏孫遠漢未知其大小師古曰遠音于萬反又近匈奴服屬日久其大臣皆不欲徙昆莫年老國分不能專制廼發使送騫因獻馬數十匹報謝其使見漢人衆富厚歸其國其國後廼益重漢匈奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛月氏相屬不絕師古曰抵至也屬音之欲反烏孫於是恐使使獻馬願得尙漢公主爲昆弟天子問羣臣議許曰必先内聘然後遣女烏孫以馬千匹聘師古曰入聘財漢元封中遣江都王建女細君爲公主以妻焉賜乗輿服御物爲備官屬宦官侍御數百人贈送甚盛烏孫昆莫以爲右夫人匈奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宮室居歲時一再與昆莫會置酒飲食以幣帛賜王左右貴人昆莫年老語言不通公主悲愁自爲作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬爲室兮旃爲牆以肉爲食兮酪爲漿師古曰食謂飯音飤居常土思兮心内傷師古曰土思謂憂思而懐本土願爲黄鵠兮歸故鄉師古曰鵠音下督反天子聞而憐之間歲遣使者持帷帳錦繡給遺焉師古曰間歲者謂毎隔一歲而往也昆莫年老欲使其孫岑陬尙公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬遂妻公主昆莫死岑陬代立岑陬者官號也名軍須靡昆莫王號也名獵驕靡後書昆彌云師古曰昆莫本是王號而其人名獵驕靡故書云昆彌昆取昆莫彌取驕靡彌靡音有輕重耳蓋本一也後遂以昆彌爲其王號也岑陬尙江都公主生一女少夫師古曰名少夫公主死漢復以楚王戊之孫解憂爲公主妻岑陬岑陬胡婦子泥靡尙小岑陬且死以國與季父大祿子翁歸靡曰泥靡大以國歸之翁歸靡旣立號肥王復尙楚主解憂生三男兩女長男曰元貴靡次曰萬年爲莎車王次曰大樂爲左大將長女弟史爲龜兹王絳賔妻小女素光爲若呼翖侯妻師古曰弟史素光皆女名昭帝時公主上書言匈奴發騎田車師車師與匈奴爲一共侵烏孫唯天子幸救之漢養士馬議欲擊匈奴會昭帝崩宣帝初卽位公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫取車延惡師地牧人民去使使謂烏孫趣持公主來師古曰趣讀曰促欲隔絕漢昆彌願𤼵國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出語在匈奴傳遣校尉常惠使持節護烏孫兵昆彌自將翖侯以下五萬騎從西方入至右谷蠡王庭獲單于父行及嫂居次名王犂汙都尉千長騎將以下四萬級馬牛羊驢槖駝七十餘萬頭烏孫皆自取所虜獲還封惠爲長羅侯是歲本始三年也漢遣惠持金幣賜烏孫貴人有功者元康二年烏孫昆彌因惠上書願以漢外孫元貴靡爲嗣得令復尚漢公主結婚重親畔絕匈奴願聘馬羸各千匹詔下公卿議大鴻臚蕭望之以爲烏孫絕域變故難保不可許上羙烏孫新立大功又重絕故業師古曰重難也故業謂先與烏孫婚親也遣使者至烏孫先迎取聘昆彌及太子左右大將都尉皆遣使凡三百餘人入漢迎取少主上廼以烏孫主解憂弟子相夫爲公主宋祁曰越本弟字下無子字置官屬侍御百餘人舍上林中學烏孫言師古曰舍止也天子自臨平樂觀會匈奴使者外國君長大角抵設樂而遣之使長羅侯光祿大夫惠爲副凡持節者四人送少主至敦煌未出塞聞烏孫昆彌翁歸靡死烏孫貴人共從本約立岑陬子泥靡代爲昆彌號狂王惠上書願留少主敦煌惠馳至烏孫責讓不立元貴靡爲昆彌還迎少主事下公卿望之復以爲烏孫持兩端難約結前公主在烏孫四十餘年恩愛不親密邊竟未得安師古曰竟讀曰境此已事之驗也今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興其原起此天子從之徴還少主狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衞司馬魏和意副候任昌送侍子公主言狂王爲烏孫所患苦易誅也遂謀置酒會罷使士㧞劒擊之劒旁下師古曰不正下也狂王傷上馬馳去其子細沈痩師古曰痩音搜會兵圍和意昌及公主於赤谷城數月都護鄭吉發諸國兵救之廼解去漢遣中郎將張遵持醫藥治狂王賜金二十斤采繪因收和意昌係𤨏從尉犂檻車至長安斬之車騎將軍長史張翁留驗公主與使者謀殺狂王狀主不服叩頭謝張翁捽主頭罵詈師古曰捽持其頭音材兀反主上書翁還坐死副使季都别將醫養視狂王狂王從十餘騎送之都還坐知狂王當誅見便不發下𧖟室初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖侯俱去居北山中揚言母家匈奴兵來故衆歸之後遂襲殺狂王自立爲昆彌漢遣破羌將軍辛武賢將兵萬五千人至敦煌遣使者案行表穿卑鞮侯井以面孟康曰大井六通渠也下流湧出在白龍堆東土山下宋祁曰面當作西欲通渠轉穀積居廬倉以討之初楚主侍者馮嫽師古曰音了嫽者慧也故以爲名能史書習事嘗持漢節爲公主使行賞賜於城郭諸國敬信之號曰馮夫人爲烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人說烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號宣帝徴馮夫人自問狀遣謁者竺次期門甘延壽爲副送馮夫人馮夫人錦車持節服䖍曰錦車以錦衣車也詔烏就屠詣長羅侯赤谷城立元貴靡爲大昆彌烏就屠爲小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翖侯民衆漢復遣長羅侯惠將三校屯赤谷因爲分别其人民地界大昆彌戸六萬餘小昆彌戸四萬餘然衆心皆附小昆彌元貴靡鴟靡皆病死公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之公主與烏孫男女三人俱來至京師是歲甘露三年也時年且七十賜以公主田宅奴婢宋祁曰舊本主作第奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓云元貴靡子星靡代爲大昆彌弱師古曰言其尚㓜少馮夫人上書願使烏孫鎭撫星靡漢遣之卒百人送烏孫焉宋祁曰越本邵本無烏孫字都䕶韓宣奏烏孫大吏大祿大監皆可以賜金印紫綬以尊輔大昆彌漢許之後都䕶韓宣復奏星靡怯弱可免更以季父左大將樂代爲昆彌漢不許宋祁曰大將樂代爲昆彌當作代將樂大爲昆彌後叚㑹宗爲都護招還亡畔安定之師古曰有人衆亡畔者皆招而還之故安定也星靡死子雌栗靡代小昆彌烏就屠死子拊離代立師古曰拊讀與撫同爲弟日貳所殺漢遣使者立拊離子安日爲小昆彌日貳亡阻康居漢徙已校屯姑墨師古曰有戊已兩校兵此直徙已校也欲候便討焉安日使貴人姑莫匿等三人詐亡從日貳刺殺之師古曰詐畔亡而投之因得以刺殺都䕶㢘襃賜姑莫匿等金人二十斤繒三百匹後安日爲降民所殺漢立其弟末振將代時大昆彌雌栗靡健翖侯皆畏服之告民牧馬畜無使入牧師古曰勿入昆彌牧中恐其相擾也國中大安和翁歸靡時師古曰勝於翁歸靡時也小昆彌末振將恐爲所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎將叚㑹宗持金幣與都䕶圖方略立雌栗靡季父公主孫伊秩靡爲大昆彌漢沒入小昆彌侍子在京師者久之大昆彌翖侯難栖殺末振將末振將兄安日子安犂靡代爲小昆彌師古曰末振將之凡名安日安日之子名安犂靡漢恨不自責誅末振將宋祁曰越本無責字復使叚㑹宗卽斬其太子番丘師古曰番音盤還賜爵關内侯是歲元延二年也㑹宗以翖侯難栖殺末振將雖不指爲漢合於討賊奏以爲堅守都尉責大祿大吏大監以雌栗靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰疐師古曰疐音竹二反本共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵師古曰藉借也兼并兩昆彌兩昆彌畏之親倚都䕶師古曰倚依附也音於綺反哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以爲榮至元始中卑爰疐殺烏日領以自效漢封爲歸義侯兩昆彌皆弱卑爰疐侵陵都䕶孫建襲殺之自烏孫分立兩昆彌後漢用憂勞且無寜歲師古曰言或鎭撫或威制之故多事也姑墨國王治南城去長安八千一百五十里戸三千五百口二萬四千五百勝兵四千五百人姑墨侯輔國侯都尉左右將左右騎君各一人譯長二人東至都護治所二千二十一里宋祁曰監本作千二十里晏本作二千二十里南至于闐馬行十五日北與烏孫接出銅鐡雌黄東通龜兹六百七十里王莽時姑墨王丞殺溫宿王并其國溫宿國王治温宿城師古曰今雍州醴泉縣北有山名温宿領者本因漢時得温宿國人令居此地田牧因以爲名去長安八千三百五十里戸二千二百口八千四百勝兵千五百人輔國侯左右將左右都尉左右騎君譯長各二人東至都䕶治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里土地物類所有與鄯善諸國同東通姑墨二百七十里龜兹國王治延城去長安七千四百八十里戸六千九百七十口八萬一千三百一十七勝兵二萬一千七十六人大都尉丞輔國侯安國侯擊胡侯郤胡都尉擊車師都尉左右將左右都尉左右騎君左右力輔君各一人東西南北部千長各一人郤胡君三人譯長四人南與精絕東南與且末西南與扜彌北與烏孫西與姑墨接師古曰扜音烏能鑄冶有鈆東至都護治所烏壘城三百五十里烏壘戸百一十口千二百勝兵三百人城都尉譯長各一人與都䕶同治其南三百三十里至渠犂渠犂城都尉一人戸百三十口千四百八十勝兵百五十人東北與尉犂東南與且末南與精絕接西有河至龜兹五百八十里自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海内虛耗征和中貳師將軍李廣利以軍降匈奴上旣悔遠征伐而搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東宋祁曰舊本以東有以字元祐考異及越本無以字當除之㨗枝渠犂皆故國地廣饒水草有漑田五千頃以上處温和田羙可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黄金采繒可以易榖食宜給足不可乏師古曰言以錐刀及黄金采繒與此旁國易榖食可以給田卒不憂乏糧也臣愚以爲可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五榖師古曰益多也張掖酒泉遣騎假司馬爲斥候屬校尉事有便宜因騎置以聞師古曰騎置卽今之驛馬也田一歲有積榖募民壯健有累重敢徙者詣田所師古曰累重謂妻子家屬也累音力瑞反重音直用反就畜積爲本業師古曰畜讀曰蓄益墾漑田稍築列亭連城而西以威西國輔烏孫爲便臣謹遣徴事臣昌分部行邉師古曰分音扶問反行音下更反嚴勅太守都尉明㷭火選士馬謹斥候蓄茭草願陛下遣使使西國以安其意臣昧死請上廼下詔深陳旣往之悔曰前有司奏欲益民賦三十助邉用師古曰三十者每口轉増三十錢也是重困老弱孤獨也師古曰重音直用反而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時晉灼曰開陵侯匈奴介和王來降者危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍師古曰畜謂馬牛羊等也又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍師古曰食讀曰飤漢軍破城食至多然士自載不足以竟師師古曰士雖各自載糧而在道已盡至於歸塗尚苦乏食不足不能終師旅之事也彊者盡食畜産羸者道死數千人朕發酒泉驢槖駝負食出玉門迎軍吏卒起張掖不甚遠然尚厮留甚衆師古曰厮留言其前後離厮不相逮及也厮音斯曩者朕之不明以軍候𢎞上書言匈奴縛馬前後足置城下馳言秦人我匄若馬師古曰謂中國人爲秦人習故言也匄乞與也若汝也乞音氣又漢使者久留不還故興師遣貳師將軍師古曰興軍而遣之欲以爲使者威重也古者卿大夫與謀師古曰與讀曰豫參以蓍龜不吉不行師古曰謂共卿大夫謀事尙不專決猶雜問蓍龜也廼者以縛馬書徧視丞相御史二千石諸大夫郎爲文學者師古曰視讀曰示爲文學謂學經書之人廼至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以爲欲以見彊師古曰見顯示宋祁曰别本欲字下有式字劉蹟考異無式字故除之夫不足者視人有餘師古曰言其夸張也視亦讀曰示易之卦得大過爻在九五孟康曰其繇曰枯楊生華象曰枯楊生華何可久也謂匈奴破不久也匈奴困敗公車方士太史治星望氣及太卜龜蓍皆以爲吉匈奴必破時不可再得也師古曰今便利之時後不可再得也又曰北伐行將於鬴山必克師古曰行將謂遣將率行也鬴山山名也鬴古釡字卦諸將貳師最吉師古曰上遣諸將而於卦中貳師最吉也故朕親發貳師下鬴山詔之必毋深入今計謀卦兆皆反繆師古曰言不效也繆妄也重合侯得虜候者言聞漢軍當來匈奴使巫埋羊牛所出諸道及水上以詛軍師古曰於軍所行之道及水上埋牛羊單于遺天子馬裘常使巫祝之縳馬者詛軍事也又卜漢軍一將不吉匈奴常言漢極大然不能饑渴師古曰能音耐失一狼走千羊廼者貳師敗軍士死略離散師古曰言死及被虜略并自離散也悲痛常在朕心今請遠田輪臺欲起亭隧師古曰隧者依深險之處開通行道也是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封侯之賞以報忿五伯所弗能爲也師古曰伯讀曰覇五覇尚耻不爲況今大漢也且匈奴得漢降者常提掖搜索問以所聞師古曰搜索者恐其或私齎文書也今邉塞未正闌出不禁障候長吏使卒獵獸以皮肉爲利卒苦而㷭火乏失亦上集不得師古曰言邉塞有闌出逃亡之人而主者不禁又長吏利於皮肉多使障候之卒獵獸故今㷭火有乏又其人勞苦因致奔亡凡有此失皆不集於所上文書後降者來若捕生口虜廼知之師古曰旣不上書所以當時不知至有降者來及捕生口或虜得匈奴人言之乃知此事當今務在禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已孟康曰先是令長吏各以秩養馬亭有牝馬民養馬皆復不事後馬多絕乏至此復修之也師古曰此說非也馬復因養馬以免徭賦也復音方目反宋祁曰注文牝應作牡郡國二千石各上進畜馬方略補邉狀與計對師古曰與上計者同來赴對也由是不復出軍而封丞相車千秋爲富民侯以明休息思富養民也初貳師將軍李廣利擊大宛還過扜彌扜彌遣太子頼丹爲質於龜兹廣利責龜兹曰外國皆臣屬於漢龜兹何以得受扜彌質卽將頼丹入至京師昭帝乃用桑𢎞羊前議以扜彌太子頼丹爲校尉將軍田輪臺輪臺與渠犂地皆相連也龜兹貴人姑翼謂其王曰頼丹本臣屬吾國今佩漢印綬來迫吾國而田必爲害王卽殺頼丹而上書謝漢漢未能征宣帝時長羅侯常惠使烏孫還便宜發諸國兵師古曰以便宜擅𤼵兵也合五萬人攻龜兹責以前殺校尉頼丹龜兹王謝曰廼我先王時爲貴人姑翼所誤我無罪執姑翼詣惠惠斬之時烏孫公主遣女來至京師學鼓琴漢遣侍郎樂奉送主女過龜兹龜兹前遣人至烏孫求公主女未還會女過龜兹龜兹王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜兹王絳賔亦愛其夫人上書言得尚漢外孫爲昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬師古曰琦音奇留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼撞鐘鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜兹王所謂驘也絳賔死其子丞徳自謂漢外孫成哀帝時往來尤數漢遇之亦甚親密東通尉犂六百五十里尉犂國王治尉犂城去長安六千七百五十里戸千二百口九千六百勝兵二千人尉犂侯安世侯左右將左右都尉擊胡君各一人譯長二人西至都䕶治所三百里南與鄯善且末接危須國王治危須城去長安七千二百九十里戸七百口四千九百勝兵二千人擊胡侯擊胡都尉左右將左右都尉左右騎君擊胡君譯長各一人西至都䕶治所五百里至焉耆百里焉耆國王治員渠城師古曰員音于權反去長安七千三百里戸四千口三萬二千一百勝兵六千人擊胡侯郤胡侯輔國侯左右將左右都尉擊胡左右君擊車師君歸義車師君各一人擊胡都尉擊胡君各二人譯長三人西南至都䕶治所四百里南至尉犂百里北與烏孫接近海水多魚烏貪訾離國王治于婁谷去長安萬三百三十里戸四十一口二百三十一勝兵五十七人輔國侯左右都尉各一人東與單桓南與且彌西與烏孫接師古曰且音子余反卑陸國王治天山東乾當國師古曰乾音干劉奉世曰下國字當作谷去長安八千六百八十里戸二百二十七口千三百八十七勝兵四百二十二人輔國侯左右將左右都尉左右譯長各一人西南至都䕶治所千二百八十七里卑陸後國王治番渠類谷師古曰番音盤去長安八千七百一十里戸四百六十二口千一百三十七勝兵三百五十人輔國侯都尉譯長各一人將二人東與郁立師北與匈奴西與刼國南與車師接郁立師國王治内咄谷師古曰咄音丁忽反去長安八千八百三十里戸百九十口千四百四十五勝兵三百三十一人輔國侯左右都尉譯長各一人東與車師後城長西與卑陸北與匈奴接單桓國王治單桓城去長安八千八百七十里戸二十七口百九十四勝兵四十五人輔國侯將左右都尉譯長各一人蒲類國王治天山西疏榆谷去長安八千三百六十里戸三百二十五口二千三十二勝兵七百九十九人輔國侯左右將左右都尉各一人西南至都䕶治所千三百八十七里蒲類後國王去長安八千六百三十里戸百口千七十勝兵三百三十四人輔國侯將左右都尉譯長各一人西且彌國王治天山東于大谷師古曰且音子余反去長安八千六百七十里戸三百三十二口千九百二十六勝兵七百三十八人西且彌侯左右將左右騎君各一人西南至都䕶治所千四百八十七里東且彌國王治天山東兌虛谷去長安八千二百五十里戸百九十一口千九百四十八勝兵五百七十二人東且彌侯左右都尉各一人西南至都䕶治所千五百八十七里劫國王治天山東丹渠谷去長安八千五百七十里戸九十九口五百勝兵百一十五人輔國侯都尉譯長各一人西南至都䕶治所千四百八十七里狐胡國王治車師柳谷去長安八千二百里戸五十五口二百六十四勝兵四十五人輔國侯左右都尉各一人西至都䕶治所千一百四十七里至焉耆七百七十里山國王去長安七千一百七十里師古曰常在山下居不爲城治也戸四百五十口五千勝兵千人輔國侯左右將左右都尉譯長各一人西至尉犂二百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接山出鐵民山居寄田糴榖於焉耆危須車師前國王治交河城河水分流繞城下故號交河去長安八千一百五十里戸七百口六千五十勝兵千八百六十五人輔國侯安國侯左右將都尉歸漢都尉車師君通善君鄉善君各一人師古曰鄉讀曰嚮譯長二人西南至都䕶治所千八百七里至焉耆八百三十五里車師後國王治務塗谷去長安八千九百五十里戸五百九十五口四千七百七十四勝兵千八百九十人擊胡侯左右將左右都尉道民君譯長各一人師古曰道讀曰導西南至都護治所千二百三十七里車師都尉國戸四十口三百三十三勝兵八十四人車師後城長國戸百五十四口五百六十勝兵二百六十人武帝天漢二年以匈奴降者介和王爲開陵侯將樓蘭國兵始擊車師匈奴遣右賢王將數萬騎救之漢兵不利引去征和四年遣重合侯馬通將四萬騎擊匈奴道過車師北復遣開陵侯將樓蘭尉犂危須凡六國兵别擊車師勿令得遮重合侯諸國兵共圍車師車師王降服臣屬漢昭帝時匈奴復使四千騎田車師宣帝即位遣五將將兵擊匈奴師古曰謂本始二年御史大夫田廣明爲祁連將軍後將軍趙充國爲蒲類將軍雲中太守田順爲武牙將軍及度遼將軍范明友前將軍韓增凡五將也車師田者驚去車師復通於漢匈奴怒召其太子軍宿欲以爲質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴爲太子及烏貴立爲王與匈奴結婚姻敎匈奴遮漢道通烏孫者地節二年漢遣侍郎鄭吉校尉司馬憙師古曰憙音許吏反將免刑罪人田渠犂積榖欲以攻車師至秋收榖吉憙發城郭諸國兵萬餘人自與所將田士千五百人共擊車師攻交河城破之王尚在其北石城中未得會軍食盡吉等且罷兵歸渠犂田秋收畢復發兵攻車師王於石城王聞漢兵且至北走匈奴求救匈奴未爲發兵王來還與貴人蘇猶議欲降漢恐不見信蘇猶敎王擊匈奴邉國小蒲類斬首略其人民以降吉車師旁小金附國隨漢軍後盜車師車師王復自請擊破金附匈奴聞車師降漢𤼵兵攻車師吉憙引兵北逢之匈奴不敢前吉憙即留一候與卒二十人留守王吉等引兵歸渠犂車師王恐匈奴兵復至而見殺也廼輕騎奔烏孫吉即迎其妻子置渠犂東奏事至酒泉有詔還田渠犂及車師益積榖以安西國侵匈奴吉還傳送車師王妻子詣長安賞賜甚厚每朝會四夷常尊顯以示之於是吉始使吏卒三百人别田車師得降者言單于大臣皆曰車師地肥羙近匈奴使漢得之多田積榖必害人國不可不爭也果遣騎來擊田者吉廼與校尉盡將渠犂田士千五百人往田匈奴復益遣騎來漢田卒少不能當保車師城中匈奴將即其城下謂吉曰師古曰即就也單于必爭此地不可田也圍城數日廼解後常數千騎往來守車師吉上書言車師去渠犂千餘里間以河山師古曰間隔也音居莧反北近匈奴漢兵在渠犂者埶不能相救願益田卒公卿議以爲道遠煩費可且罷車師田者詔遣長羅侯師古曰常惠也將張掖酒泉騎出車師北千餘里揚威武車師旁胡騎引去宋祁曰淳化本作引兵去熈寜本及越本無兵字吉廼得出歸渠犂凡三校尉屯田車師王之走烏孫也烏孫留不遣遣使上書願留車師王備國有急可從西道以擊匈奴漢許之於是漢召故車師太子軍宿在焉耆者立以爲王盡徙車師國民令居渠犂遂以車師故地與匈奴車師王得近漢田官與匈奴絕亦安樂親漢後漢使侍郎殷廣徳責烏孫求車師王烏孫貴將詣闕師古曰烏孫遣其將之貴者入漢朝賜第與其妻子居劉敞曰漢求車師王耳烏孫貴將反詣闕又賜第與妻子居非理也按鄭吉傳送車師王妻子詣長安今漢復責烏孫求車師王故賜車師王第使與妻子居耳文當云烏孫遣其貴人將詣闕是歲元康四年也其後置戊已校尉屯田居車師故地元始中車師後王國有新道出五船北通玉門關往來差近戊已校尉徐普欲開以省道里半避白龍堆之阸車師後王姑句師古曰句音鉤以道當爲拄置師古曰拄者支拄也言有所置立而支拄於已故心不便也拄音竹羽反又竹具反其字從手而讀之者或不曉以拄爲梁柱之柱及分破其句言置柱於心皆失之矣劉敞曰當道爲拄置者新道出車師後王國則漢使往來後王主爲之供億故心不便也拄置猶言儲偫宋祁曰按通典道下有通字心不便也地又頗與匈奴南將軍地接普欲分明其界然後奏之召姑句使證之不肯繫之姑句數以牛羊賕吏求出不得姑句家矛端生火其妻股紫陬師古曰陬音子侯反謂姑句曰矛端生火此兵氣也利以用兵前車師前王爲都䕶司馬所殺今久繫必死不如降匈奴即馳突出高昌壁入匈奴又去胡來王唐兠國比大種赤水羌師古曰比近也音頻寐反數相寇不勝告急都䕶都䕶但欽不以時救助唐兠困急怨欽東守玉門關玉門關不内即將妻子人民千餘人亡降匈奴匈奴受之而遣使上書言狀是時新都侯王莽秉政遣中郎將王昌等使匈奴告單于西域内屬不當得受單于謝罪執二王以付使者莽使中郎王萌待西域惡都奴界上逢受師古曰逢受謂先至待之逢見即受取也單于遣使送因請其罪師古曰請免其罪也使者以聞莽不聽詔下會西域諸國王陳軍斬姑句唐兠以示之至莽簒位建國二年以廣新公甄豐爲右伯當出西域車師後王須置離聞之與其右將股鞮左將尸泥支謀曰師古曰鞮音丁奚反聞甄公爲西域太伯當出故事給使者牛羊榖芻茭導譯前五威將過所給使尚未能備今太伯復出國益貧恐不能稱師古曰不副所求也欲亡入匈奴戊已校尉刁䕶聞之師古曰刁音彫召置離驗問辭服乃械致都䕶但欽在所埓婁城師古曰埓婁城名埓音劣婁音樓置離人民知其不還皆哭而送之至欽則斬置離置離兄輔國侯狐蘭支將置離衆二千餘人驅畜産舉國亡降匈奴師古曰盡率一國之衆也是時莽易單于璽單于恨怒遂受狐蘭支降遣兵與共寇擊車師殺後城長傷都䕶司馬及狐蘭兵復還入匈奴時戊已校尉刁䕶病遣史陳良屯桓且谷備匈奴寇師古曰且音子余反史終帶取糧食司馬丞韓𤣥領諸壁右曲候任商領諸壘相與謀曰西域諸國頗背叛匈奴欲大侵要死可殺校尉將人衆降匈奴如淳曰言匈奴來侵會當死耳可降匈奴也師古曰要音一妙反即將數千騎至校尉府脅諸亭令燔積薪師古曰示爲㷭火也分告諸壁曰匈奴十萬騎來入吏士皆持兵後者斬得三四百人去校尉府數里止晨火難師古曰古然字校尉開門擊鼔收吏士良等隨入遂殺校尉刁䕶及子男四人諸昆弟子男獨遺婦女小兒師古曰遺留置不殺也止留戊已校尉城遣人與匈奴南將軍相聞南將軍以二千騎迎良等良等盡脅略戊已校尉吏士男女二千餘人入匈奴單于以良帶爲烏賁都尉師古曰賁音奔後三歲單于死弟烏絫單于咸立師古曰絫音力追反復與莽和親莽遣使者多齎金幣賂單于購求陳良終帶等單于盡收四人及手殺刁䕶者芝音妻子以下二十七人皆械檻車付使者到長安莽皆燒殺之其後莽復欺詐單于和親遂絕匈奴大擊北邉而西域亦瓦解焉耆國近匈奴先叛殺都䕶但欽莽不能討天鳳三年廼遣五威將王駿西域都䕶李崇將戊已校尉出西域諸國皆郊迎送兵榖焉耆詐降而聚兵自備駿等將莎車龜兹兵七千餘人分爲數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國兵爲反間還共襲繫駿等皆殺之唯戊已校尉郭欽别將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽爲剼胡子鄧展曰剼音衫師古曰剼絕也音子小反字本作劋轉寫誤耳李崇收餘士還保龜兹數年莽死崇遂沒西域因絕最凡國五十自譯長城長君監吏大祿百長千長都尉且渠當戸將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賔烏弋之屬皆以絕遠不在數中其來貢獻則相與報不督錄總領也賛曰孝武之世圖制匈奴患其兼從西國結黨南羌師古曰圖謀也從音子容反廼表河曲列西郡宋祁曰新本西作四開玉門通西域以斷匈奴右臂隔絕南羌月氏單于失援由是遠遁而幕南無王庭遭値文景𤣥默養民五世天下殷富財力有餘士馬彊盛故能睹犀布瑇瑁則建珠崖七郡師古曰瑇音代瑁音妹感枸醬竹杖則開牂柯越嶲師古曰枸音矩聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮如淳曰文甲即瑇瑁也通犀中央色白通兩頭蒲梢龍文魚目汗血之馬充於黄門孟康曰四駿馬名也師古曰梢馬音所交反鉅象師子猛犬大雀之羣食於外囿師古曰鉅亦大殊方異物四靣而至於是廣開上林穿昆明池營千門萬戸之宮立神明通天之臺興造甲乙之帳師古曰其數非一以甲乙次第名之也落以隨珠和璧師古曰落與絡同天子負黼依襲翠被馮玉几而處其中師古曰依讀曰扆扆如小屏風而畫為黼文也白與黑謂之黼又爲斧形襲重衣也被音皮義反設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戯以觀視之晉灼曰都盧國名也李奇曰都盧體輕善緣者也碭極樂名也師古曰巴人巴州人也俞水名今渝州也巴俞之人所謂賨人也勁鋭善舞本從高祖定三秦有功高祖喜觀其舞因令樂人習之故有巴俞之樂漫衍者即張衡西京賦所云巨獸百尋是爲漫延者也魚龍者爲含利之獸先戲於庭極畢乃入殿前激水化成比目魚跳躍潄水作霧障日畢化成黄龍八丈出水敖戲於庭炫燿日光西京賦云海鱗變而成龍即爲此色也俞音踰碭音徒浪反衍音弋戰反視讀曰示觀示者視之令觀也宋祁曰注文八丈一作入又字徒浪反越本作大浪及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足廼𣙜酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭師古曰屈音其勿反因之以凶年寇盗並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則葱嶺身熱頭痛縣度之阸淮南杜欽揚雄之論皆以爲此天地所以界别區域絕外内也書曰西戎即序師古曰禹貢之辭也序次也禹既就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能綂率與之進退與漢隔絕道里又遠得之不爲益棄之不爲損盛徳在我無取於彼故自建武以來西域思漢威徳咸樂内屬唯其小邑鄯善車師界迫匈奴尚爲所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都䕶聖上遠覽古今因時之宜羇縻不絕辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣亦何以尚兹師古曰西戎即序説已在前昔周公相成王越裳氏重九譯而獻白雉成王問周公公曰徳不加焉則君子不饗其質政不施焉則君子不臣其遠吾何以𫉬此物也譯曰吾受命國之黄耉曰久矣天之無烈風雨雷也意中國有聖人乎盍往朝之然後歸之王稱先王之神所致以薦宗廟太宗漢文帝也却走馬謂有人獻千里馬不受還之賜道路費也老子徳經曰天下有道郤走馬以糞故賛引也前漢書卷九十六下前漢書卷九十六下考證烏孫國傳元康二年烏孫昆彌因恵上書云云通鑑考異曰傳請婚在元康二年而蕭望之傳云神爵二年按元康二年望之未爲大鴻臚葢誤以神爵爲元康也渠犂傳宜給足不可之顧炎武曰不可之當作可不乏務使以時益種五榖注師古曰益多也臣召南按監本及别本刋此注於下句張掖酒泉下非也張掖酒泉連下遣騎假司馬爲斥候讀葢以時益種五榖指輪臺言不指張掖酒泉言也今從宋本移正焉耆國傳治員渠城臣召南按後書作南柯城又北與烏孫接近海水多魚後書曰其國四靣有大山與龜兹相連有海水曲入四山之内周匝其城三十餘里即其說也焉耆北接烏孫西去條支絕遠所謂海者指大澤巨浸如蒲類蒲昌並稱爲海之比非北海亦非西海也狐胡國傳治車師栁谷臣召南按後漢班勇爲西域長史屯栁中後書西域傳諸國道里俱以去長史所居爲率疑即此栁谷也車師後城長國傳即馳突出高昌壁臣召南按高昌壁始見於此後書云自敦煌西出玉門陽關渉鄯善北通伊吾千餘里自伊吾北通車師前部高昌壁千二百里自高昌壁北通後部金滿城五百里此西域之門戸也故戊已校尉更互屯焉按拓跋魏時闞爽始立國於高昌號高昌王即以此壁得名贊且通西域近有龍堆按地理志白龍堆沙在敦煌郡正西關外正西關當即龍勒縣之玉門陽關矣前漢書卷九十六下考證
