body:
  text: 前漢書卷六十七漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注楊胡朱梅云傳第三十七楊王孫者孝武時人也學黄老之術家業千金厚自奉養生亡所不致師古曰致至也劉敞曰顔説非也凡奉養難得之物皆能致之以自供也及病且終先令其子曰吾欲臝𦵏以反吾真師古曰先令謂遺令臝者不為衣衾棺槨者也反歸也真者自然之道也臝音郎果反劉敞曰形魂復歸于土此其所謂反真也何自然之謂必亡易吾意師古曰易改也死則為布囊盛尸入地七尺既下從足引脫其嚢以身親土其子欲黙而不從重廢父命師古曰重難也欲從之心又不忍廼往見王孫友人祁侯師古曰祁侯繒賀之孫承嗣者名它祁侯與王孫書曰王孫苦疾僕廹從上祠雍未得詣前師古曰詣至也至前言来見也願存精神省思慮進近醫藥宋祁曰近字當刪厚自持竊聞王孫先令臝𦵏令死者亡知則已若其有知是戮尸地下將臝見先人竊為王孫不取也且孝經曰為之棺槨衣衾是亦聖人之遺制何必區區獨守所聞師古曰區區小意也願王孫察焉王孫報曰盖聞古之聖王縁人情不忍其親故為制禮今則越之師古曰言踰禮而厚𦵏也吾是以臝𦵏将以矯世也師古曰正曲曰矯夫厚𦵏誠亡益於死者而俗人競以相髙靡財單幣腐之地下師古曰靡散也單盡也或廼今日入而明日發師古曰言見發掘也此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真㝠㝠亡形亡聲廼合道情夫飾外以華衆厚𦵏以鬲真師古曰鬲與隔同其後並類此使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也師古曰文子稱天氣為魂延陵季子云骨肉下歸於土是以云然精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉師古曰塊音口對反裹以幣帛鬲以棺槨支體絡束口含玉石欲化不得鬱為枯腊千載之後棺槨朽腐廼得歸土就其真宅繇是言之焉用久客師古曰言不用久為客也繇讀與由同昔帝堯之𦵏也窾木為匵葛藟為緘服䖍曰窾音款窾空也空木為匵師古曰匵即櫝字也櫝小棺也藟葛蔓也一曰藟亦草名葛之類也緘束也藟音力水反緘音工咸反其穿下不亂泉上不泄殠師古曰亂絶也故聖王生易尚死易葬也師古曰尚崇也言生死皆儉約也不加功於亡用不損財於亡謂師古曰謂者名稱也亦指趣也今費財厚𦵏留歸鬲至死者不知生者不得是謂重惑於戲吾不為也師古曰於讀曰烏戲讀曰呼祁侯曰善遂臝葬胡建字子孟河東人也孝武天漢中守軍正丞師古曰南北軍各有正正又置丞而建未得真官兼守之劉敞曰南北軍各有正正又置丞而建未得真官兼守之建之所守軍正之丞耳未嘗兼守正也故建奏云丞於用法疑若兼守正何疑之有自是其時無正耳貧亡車馬常步與走卒起居所以尉薦走卒甚得其心師古曰尉者自上安之也薦者舉籍也時監軍御史為姦穿北軍壘垣以為賈區師古曰坐賣曰賈為賣物之區也區者小室之名若今小菴屋之類耳故衛士之屋謂之區廬宿衛宫外士稱為區士也賈音古其下亦同建欲誅之廼約其走卒師古曰約束也曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與䕶軍諸校列坐堂皇上師古曰校者軍之諸部校也室無四壁曰皇建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史䕶軍諸校皆愕驚不知所以建亦已有成奏在其懐中遂上奏曰臣聞軍法立武以威衆誅惡以禁邪今監御史公穿軍垣以求賈利師古曰公謂顯然為之私買賣以與士市不立剛毅之心勇猛之節亡以帥先士大夫尤失理不公用文吏議不至重法黄帝李法曰蘇林曰獄官名也天文志左角李右角将孟康曰兵書之法也師古曰李者法官之號也總主征伐刑戮之事也故稱其書曰李法蘇說近之壁壘已定穿窬不繇路是謂姦人姦人者殺師古曰窬小竇也音踰繇讀與由同下皆類此臣謹案軍法曰正亡屬將軍將軍有罪已聞師古曰言軍正不屬將軍將軍有罪過得表奏之宋祁曰已改作以二千石以下行法焉孟康曰二千石謂軍中校尉都尉之屬丞於用法疑孟康曰丞屬軍正斬御史於法有疑執事不諉上師古曰諉累也言執事者當見法即行不可以事累於上也諉音女瑞反累音力瑞反臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也師古曰司馬法兵書之名也解在主父偃傳詔言在於軍中何用文吏議也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也師古曰慮謂計念也先意謂先為之意也或將交刃而誓致民志也師古曰欲致民勇志使不奔北建又何疑焉建繇是顯名後為渭城令治甚有聲值昭帝幼皇后父上官將軍安與帝姊盖主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客臧公主廬吏不敢捕渭城令建將吏卒圍捕盖主聞之與外人上官将軍多從奴客往犇射追吏師古曰犇古奔字也奔走赴之而射也吏散走主使僕射劾渭城令游徼傷主家奴建報亡它坐服䖍曰言游徼奉公無它坐也劉攽曰多令字盖主怒使人上書告建侵辱長公主射甲舍門師古曰甲舍即甲第謂公主之宅知吏賊傷奴辟報故不窮審蘇林曰辟廻也報論也斷獄為報故言有故也不窮審不窮盡其事也師古曰蘇說非也言為游徼避罪而妄報文書故不窮治也辟讀曰避大將軍霍光寢其奏後光病上官氏代聽事下吏捕建建自殺吏民稱寃至今渭城立其祠朱雲字游魯人也徙平陵少時通輕侠借客報仇師古曰借助也音子夜反長八尺餘容貌甚壯以勇力聞年四十廼變節從博士白子友受易又事前將軍蕭望之受論語皆能傳其業好倜儻大節師古曰倜音吐厯反當世以是髙之元帝時琅邪貢禹為御史大夫而華隂守丞嘉上封事師古曰守華隂縣丞者其人名嘉言治道在於得賢御史之官宰相之副九卿之右師古曰右言在上也不可不選平陵朱雲兼資文武忠正有智畧可使以六百石秩試守御史大夫以盡其能上廼下其事問公卿太子少傅匡衡對以為大臣者國家之股肱萬姓所瞻仰眀王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不静矣師古曰上爵大官也圖謀也柄臣執權之臣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也自堯之用舜文王於太公猶試然後爵之又况朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹絜白廉正經術通眀有伯夷史魚之風海内莫不聞知而嘉猥稱雲師古曰猥曲也欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案騐以眀好惡嘉竟坐之是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏説元帝好之欲考其異同令充宗與諸易家論充宗乗貴辯口師古曰乘因也言因藉尊貴之權也諸儒莫能與抗皆稱疾不敢㑹有薦雲者召入攝齊登堂師古曰齊衣下之裳音子私反抗首而請師古曰抗舉也音動左右既論難連拄五鹿君師古曰拄刺也距也音竹庾反故諸儒為之語曰五鹿嶽嶽朱雲折其角師古曰嶽嶽長角之貌繇是為博士遷杜陵令坐故縱亡命㑹赦舉方正為槐里令時中書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上書言丞相韋𤣥成容身保位亡能往来李奇曰不能有所前郤也師古曰周書君奭之篇稱周公曰惟文王尚克修和有夏有若虢叔閎天散宜生泰顛南宫括又曰亡能往来故雲引此以為言也宋祁曰上書越本作上疏而咸數毁石顯久之有司考雲疑風吏殺人師古曰風讀曰諷羣臣朝見上問丞相以雲治行丞相𤣥成言雲暴虐亡状師古曰亡善状也時陳咸在前聞之以語雲雲上書自訟咸為定奏草求下御史中丞事下丞相丞相部吏考立其殺人罪師古曰立成也雲亡入長安復與咸計議丞相具發其事奏咸宿衛執法之臣幸得進見漏泄所聞以私語雲為定奏草欲令自下治師古曰咸為御史中丞而奏請下中丞故云自下治後知雲亡命罪人而與交通雲以故不得師古曰吏捕之不得上於是下咸雲獄減死為城旦宋祁曰獄下當添治字咸雲遂廢錮終元帝之世至成帝時丞相故安昌侯張禹劉攽曰故字當在丞相上禹時罷相侯如故也以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐師古曰尸主也素空也尸位者不舉其事但主其位而已素餐者徳不稱官空當食禄孔子所謂鄙夫不可與事君苟患失之亡所不至者也師古曰皆論語所載孔子之言也茍患失其寵禄則言行僻邪無所不至也臣願賜尚方斬馬劍斷佞臣一人以厲其餘師古曰尚方少府之屬官也作供御器物故有斬馬劍劍利可以斬馬也上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅師古曰訕謗也音所諫反又音刪罪死不赦御史將雲下雲攀殿檻檻折師古曰檻軒前欄也雲呼曰師古曰呼叫也音火故反臣得下從龍逄比干遊於地下足矣師古曰闗龍逄桀臣王子比干紂之諸父皆以諫而死故云然未知聖朝何如耳師古曰言殺直臣其聲惡御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世師古曰著表也言此名久彰表使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治殿檻上曰勿易因而輯之以旌直臣師古曰輯與集同謂補合之也旌表也雲自是之後不復仕常居鄠田時乘牛車從諸生所過皆敬事焉薛宣為丞相雲往見之宣備賓主禮因留雲宿從容謂雲曰師古曰從音七庸反在田野亡事且留我東閤可以觀四方奇士雲曰小生廼欲相吏邪師古曰小生謂其新學後進言欲以我為吏乎宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七十餘終於家病不呼醫飲藥遺言以身服斂棺周於身土周於槨師古曰棺周於身小棺裁容身也土周於槨冡壙裁容槨也為丈五墳𦵏平陵東郭外梅福字子真九江夀春人也少學長安明尚書榖梁春秋為郡文學補南昌尉師古曰豫章之縣後去官歸夀春數因縣道上言變事師古曰附縣道之使而封奏也變謂非常之事求假軺傳師古曰小車之傳也軺音遙傳音張戀反詣行在所條對急政師古曰條對者一一條録而對之輙報罷是時成帝委任大將軍王鳯鳯專埶擅朝而京兆尹王章素忠直譏刺鳯為鳯所誅王氏浸盛師古曰浸漸也災異數見羣下莫敢正言福復上書曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品師古曰遁逃也夫叔孫先非不忠也師古曰先猶言先生也一曰先謂在秦時箕子非疏其家而畔親也師古曰箕子紂之諸父故言䟽家畔親也不可為言也昔髙祖納善若不及從諫若轉圜師古曰不及恐失之也轉圜言其順易也聽言不求其能舉功不考其素師古曰直取其功不論其舊行及所從来也陳平起於亡命而為謀主韓信拔於行陳而建上將師古曰立以為大將軍故天下之士雲合歸漢師古曰言四面而至爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺師古曰鴻毛喻輕拾遺言其易也此髙祖所以亡敵於天下也師古曰亡讀曰無孝文皇帝起於代谷師古曰從代而来即帝位非有周召之師伊吕之佐也師古曰召讀曰邵循髙祖之法加以恭儉當此之時天下㡬平師古曰㡬音距依反繇是言之循髙祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌師古曰軌法也壊井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諌說至言師古曰說讀曰恱出爵不待廉茂慶賜不湏顯功師古曰謂諫爭合意即得官爵不由薦舉及軍功也㢘亷吏也茂茂材也是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聽用其計升平可致張晏曰民有三年之儲曰升平於是積尸暴骨快心胡越故淮南王安縁間而起所以計慮不成而謀議泄者以衆賢聚於本朝師古曰本朝漢朝也故其大臣埶陵不敢和從也服䖍曰臣埶陵君也師古曰謂淮南大臣相内史之屬也方今布衣廼窺國家之隙見間而起者蜀郡是也孟康曰成帝鴻嘉中廣漢男子鄭躬等反是也及山陽亡徒蘇令之羣蹈藉名都大郡求黨與索随和李奇曰求索與已和及随已者而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也劉敞曰漢氏世寳随和珠玉謂匹夫至欲求索此物所謂與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寜師古曰大雅文王之詩也已解于上廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曺之輩今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩闗自鬻師古曰秦武王即孝公之孫恵文王之子也任鄙力士也繆公行伯繇余歸徳師古曰即秦穆公伯讀曰霸繇讀曰由今欲致天下之士民有上書求見者輙使詣尚書問其所言言可采取者秩以升斗之禄賜以一束之帛若此則天下之士發憤懣師古曰懣音滿吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣師古曰爛然分明之貌也夫以四海之廣士民之數能言之類至衆多也然其儁傑指世陳政言成文章質之先聖而不繆施之當世合時務師古曰質正也若此者亦亡㡬人師古曰無㡬言不多也㡬音居豈反故爵禄束帛者天下之底石髙祖所以厲世摩鈍也師古曰底細石也音之履反又音秖孔子曰工欲善其事必先利其器師古曰論語載孔子之言也工以喻國政利器喻賢才至秦則不然張誹謗之罔以為漢敺除倒持泰阿授楚其柄師古曰泰阿劒名歐冶所鑄也言秦無道令陳涉項羽乗間而發喻倒持劒而以把授與人也故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也師古曰辟讀曰闢今不循伯者之道師古曰伯讀曰覇次下亦同廼欲以三代選舉之法取當時之士猶察伯樂之圖求騏驥於市而不可得亦已明矣宋祁曰而當作其字故髙祖棄陳平之過而獲其謀師古曰盗嫂受金之事晋文召天王齊桓用其讎師古曰召天王謂狩于河陽也用其讎謂以管仲為相並解於上亡益於時不顧逆順此所謂伯道者也一色成體謂之純白黒雜合謂之駮欲以承平之法治暴秦之緒師古曰緒謂餘業也猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥増逝師古曰䳒䲭也仁鳥鸞鳯也䳒音緣愚者䝉戮則知士深退師古曰蒙被也間者愚民上疏多觸不急之法或下廷尉而死者衆師古曰以其所言為不急而罪之也自陽朔以来天下以言為諱朝廷尤甚師古曰防人之口法禁嚴切也羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝師古曰具臣具位之臣無益者也矯正也及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諌臣之舌羣臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循髙祖之軌杜亡秦之路師古曰杜塞也數御十月之歌孟康曰福譏切王氏十月之詩刺后族太盛也師古曰詩小雅十月之交篇也留意亡逸之戒師古曰周書篇名也周公作之以戒成王除不急之法下亡諱之詔博覽兼聽謀及疏賤令深者不隠逺者不塞所謂辟四門明四目也師古曰虞書舜典曰闢四門明四目言開四門以致衆賢則明視於四方也且不急之法誹謗之微者也往者不可及来者猶可追方今君命犯而主威奪師古曰君命犯者謂大臣犯君之命外戚之權日以益隆陛下不見其形願察其景建始以来日食地震以率言之三倍春秋水灾亡與比數師古曰言其極多不可比較而數也隂盛陽微金鐵為飛此何景也張晏曰河平二年沛郡鐵官鑄錢如星飛上去權臣用事之異也蘇林曰言之不從是謂不艾則金不從革景象也何象言将危亡也漢興以来社稷三危吕霍上官皆母后之家也親親之道全之為右師古曰務全安之此為上當與之賢師良傅教以忠孝之道今廼尊寵其位授以魁柄師古曰以斗為喻也斗身為魁使之驕逆至於夷㓕師古曰夷平也謂平除之此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸師古曰周書洛誥之辭也庸庸微小貌也言火始微小不早撲滅則至熾盛大臣貴擅亦當早圖黜其權也埶陵於君權隆於主然後防之亦亡及已師古曰已語終辭上遂不納成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑而言髙者罪也越職觸罪危言世患雖伏質横分臣之願也師古曰伏貭斬刑也横分謂身首分離也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歴千駟臣不貪也師古曰景公齊景公也論語云齊景公有馬千駟死之日民無得而稱馬故引之也故願壹登文石之陛渉赤墀之塗應劭曰以丹淹泥塗殿上也當戸牖之法坐師古曰戸牗之間謂之扆言自扆也法坐正坐也聼朝之處猶言法宫法駕也坐音才卧反宋祁曰自扆當作負扆也盡平生之愚慮亡益於時有遺於世師古曰遺留也此臣寢所以不安食所以忘味也願陛下深省臣言師古曰省察也臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦㓕二周夷六國師古曰二周東周西周君也六國齊椘韓魏燕趙隠士不顯佚民不舉師古曰佚與逸同也絶三統㓕天道是以身危子殺厥孫不嗣張晏曰身為燕丹張良所謀子二世見殺孫謂子嬰所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞師古曰謂封黄帝之後於薊帝堯之後於祝帝舜之後於陳并杞宋是為五帝眀著三統示不獨有也是以姬姓半天下遷廟之主流出於戸李奇曰言其多所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫榖梁傳曰其不稱名姓以其在祖位尊之也師古曰事在僖二十五年榖梁所云在祖位者謂孔子本宋孔父之後防叔奔魯遂為魯人今宋所殺者亦孔父之後留在宋者於孔子為祖列故尊而不名也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適如淳曰奪宗始封之君尊為諸侯則奪其舊為宗子之事也奪適文王舍伯邑考而立武王是也孔子雖庶可為殷後師古曰適讀曰嫡傳曰賢者子孫宜有土而况聖人又殷之後哉昔成王以諸侯禮𦵏周公而皇天動威雷風著災師古曰尚書大傳云周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏於成周而𦵏之於畢示天下不敢臣今仲尼之廟不出闕里師古曰闕里孔子舊里也言除此之外更無祭祀孔子者孔氏子孫不免編户師古曰列為庶人也以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫師古曰素功素王之功也穀梁傳曰孔子素王則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納初武帝時始封周後姬嘉為周子南君至元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絶不能紀師古曰不自知其昭穆之數也時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經師古曰不合於經也遂見寝至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公語在成紀是時福居家常以讀書養性為事至元始中王莽顓政師古曰顓讀與専同福一朝棄妻子去九江至今傳以為仙其後人有見福於㑹稽者變名姓為吴市門卒云師古曰其後謂棄妻子去之後云敞字幼孺平陵人也師事同縣吳章章治尚書經為博士平帝以中山王即帝位年幼莽秉政自號安漢公以平帝為成帝後不得顧私親帝母及外家衛氏皆留中山不得至京師莽長子宇非莽鬲絶衛氏師古曰鬲讀與隔同恐帝長大後見怨宇與吳章謀夜以血塗莽第門若鬼神之戒兾以懼莽章欲因對其咎事發覺莽殺宇誅㓕衛氏謀所聫及死者百餘人章坐要斬磔尸東市門初章為當世名儒教授尤盛弟子千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師師古曰更以他人為師諱不言是章弟子敞時為大司徒掾自劾吳章弟子收抱章尸歸棺斂𦵏之師古曰棺音工喚反斂音力贍反京師稱焉車騎將軍王舜髙其志節比之欒布表奏以為掾薦為中郎諌大夫莽簒位王舜為太師復薦敞可輔職師古曰為輔弼之任以病免唐林言敞可典郡擢為魯郡大尹更始時安車徵敞為御史大夫復病免去卒於家贊曰昔仲尼稱不得中行則思狂狷師古曰論語載孔子曰不得中行而與之必也狂狷乎狂者進取狷者有所不為中行中庸也狷介也言必不得中庸之人與之論道則思狂狷猶愈於頑嚚無識者也狷音子掾反宋祁曰進取下應添於道二字觀楊王孫之志賢於秦始皇逺矣世稱朱雲多過其實故曰盖有不知而作之者我亡是也師古曰論語稱孔子之言也疾時人妄有述作非有實也胡建臨敵敢斷武昭於外師古曰昭明也斬伐姦隙軍旅不隊梅福之辭合於大雅雖無老成尚有典刑殷監不逺夏后所聞師古曰大雅蕩之詩曰雖無老成人尚有典刑言今雖無其人尚有故法可案用也又曰殷監不逺在夏后之時言殷視夏桀之亡可為戒也贊引此者謂梅福請封孔子後是案武王克商之法而行之又視秦滅二周夷六國不為立後自取喪亡可為戒也遂從所好全性市門云敞之義著於吳章為仁由已再入大府師古曰論語稱孔子曰為仁由己而由人乎哉故此贊引之再入太府謂初為大司徒掾後為車騎將軍掾也清則濯纓何逺之有師古曰楚辭漁父之歌曰滄浪之水清可以濯我纓滄浪之水濁可以濯我足遇治則仕遇亂則隠云敞謝病去職近於此義也前漢書卷六十七前漢書卷六十七考證胡建傳守軍正丞注師古曰南北軍各有正正又置丞臣召南按後文御史穿北軍壘垣則建守北軍正丞也渭城令建將吏卒圍捕臣召南按渭城屬右扶風在長安稍西即秦故都咸陽也此時盖主第在渭城故建圍之以索賊耳朱雲傳從博士白子友受易臣召南按儒林傳東海孟喜授同郡白光少子為博士由是有白氏學然則白子友當即白光但彼云字少子此云子友字不同耳梅福傳昔成王以諸侯禮葬周公云云注師古曰尚書大傳云云臣召南按大傳伏生所著其説王啟金縢在周公既葬之後史記魯世家即用其說與孔安國古文金縢之説不同云敞傳師事同縣吳章章治尚書經為博士儒林傳吳章字偉君受尚書於許商贊殷監不逺夏后所聞注師古曰謂梅福請封孔子後云云顧炎武曰贊謂福引吕霍上官之事以規切王氏師古謂封孔子後非也前漢書卷六十七考證
