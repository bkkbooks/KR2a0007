body:
  text: 前漢書卷十五上漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注王子侯表第三上大哉聖祖之建業也後嗣承序以廣親親至於孝武以諸侯王畺土過制或替差失軌而子弟為匹夫師古曰畺亦壃字也替古僭字也軌法也輕重不相凖於是制詔御史諸侯王或欲推私恩分子弟邑者令各條上朕且臨定其號名自是支庶畢侯矣詩云文王孫子本支百世師古曰大雅文王之詩也本本宗也支支子也言文王有明徳故天祚之子孫嫡者為天子支庶為諸侯皆不絶也信矣哉師古曰侯所食邑皆書其郡縣於下其有不書者史失之也或但言某人嗣及直書薨不具年月皆闕文也右髙后右孝文右孝景右孝武前漢書卷十五上前漢書卷十五上考證王子侯表上徳哀侯廣以兄子封七年八月薨監本作十年薨凡數目字監本多舛今並以宋本是正句容哀侯黨自注㑹稽臣召南按表下注某地指侯國所在也此文可疑句容縣屬丹陽㑹稽但有句章無句容也陸城侯貞中山靖王子臣召南按此侯即昭烈帝之祖蜀志曰先主涿郡涿縣人漢景帝子中山靖王勝之後勝子貞元狩六年封涿縣陸城亭侯坐酎金失侯因家焉按貞封于元朔二年不封於元狩六年也蜀志誤耳薪處侯嘉按薪處應作新處縣屬中山宋本亦誤又陸地侯下自注作辛處亦誤也畢梁侯監本作卑梁今從宋本改正隂安哀侯秦容宋本作秦客舊監本作秦容荼陵節侯訢注師古曰荼音塗臣召南按地里志長沙國荼陵師古注荼音弋奢反此侯以長沙王子封長沙屬邑當即此縣師古乃别音塗豈因班自注云桂陽而疑别有一荼陵乎舂陵節侯買長沙定王子臣召南按此侯即光武帝之祖光武其元孫也舂陵本屬零陵元帝時徙南陽衆陵節侯賢臣召南按衆陵當作泉陵泉陵屬零陵郡以王莾𫝊証之師古以前本早訛矣挾術侯昆景臣浩按此侯弟即挾釐侯覇封又同日不應有兩挾侯疑有一誤瓡節侯息注師古曰瓡即瓠字也顧炎武曰地理志北海郡下瓡侯國師古曰瓡即執字二音不同澎侯屈釐注師古曰澎音彭東海縣也臣召南按地理志東海郡無澎縣此注疑誤前漢書卷十五上考證欽定四庫全書前漢書卷十五下漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注王子侯表第三下孝元之世亡王子侯者盛衰終始豈非命哉元始之際王莽擅朝偽襃宗室侯及王之孫焉師古曰王之孫亦得封侯謂承鄉侯閟以下是也居攝而愈多非其正故弗録師古曰王莽所封故不以為正也旋踵亦絶悲夫右孝宣右孝哀右孝平前漢書卷十五下前漢書卷十五下考証王子侯表下孝元之世亡王子侯者臣召南按元帝三子一成帝一定陶王其子為哀帝一中山王其子為平帝二王更無餘子封侯者也松兹頃侯緁嗣緁字宋本作蘭旗頃侯臨朝臣召南按地理志東海郡有蘭祺縣疑此旗字應作祺蒲領煬侯禄清河綱王子臣召南按綱王應作剛王以元鼎三年自代徙清河宋本别本俱作綱王非也諸侯王表可證諡法未有稱綱者下南曲修市東昌新鄉東陽五侯並剛王子其誤並同江陽侯仁城陽慧王子臣召南按慧王應作惠王以元封三年嗣城陽王宋本别本俱誤以慧惠音相近而訛耳高城節侯梁長沙頃王子顧炎武曰高城侯一卷中再見一元始元年六月乙未封一元康元年正月癸卯封此史家並存未定當删其一而誤留之者也遽鄉侯宣真定列王子臣召南按列王應作烈王以征和四年嗣真定王各本俱訛利鄉侯國嗣國汲古閣本作固都陽侯閌嗣閌宋本作閎前漢書卷十五下考證
