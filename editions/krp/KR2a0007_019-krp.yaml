body:
  text: 前漢書卷十九上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注百官公卿表師古曰漢制三公號稱萬石其俸月各三百五十斛榖其稱中二千石者月各百八十斛二千石者百二十斛比二年石者百斛千石者九十斛比千石者八十斛六百石者七十斛比六百石者六十斛四百石者五十斛比四百石者四十五斛三百石者四十斛比三百石者三十七斛二百石者三十斛比二百石者二十七斛一百石者十六斛易叙宓羲神農黃帝作敎化民應劭曰宓羲氏始作八卦神農氏為耒耜黄帝氏作衣裳神而化之使民宜之師古曰見易下繫宓音伏字本作虙轉寫訛繆耳而傳述其官師古曰春秋左氏傳載郯子所說也以爲宓羲龍師名官應劭曰師者長也以龍紀其官長故爲龍師春官爲青龍夏官爲赤龍秋官爲白龍冬官爲黒龍中官爲黄龍張晏曰庖羲將興神龍負圖而至因以名師與官也神農火師火名應劭曰火徳也故為炎帝春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火張晏曰神農有火星之瑞因以名師與官也黄帝雲師雲名應劭曰黄帝受命有雲瑞故以雲紀事也由是而言故春官為青雲夏官為縉雲秋官為白雲冬官為黒雲中官為黄雲張晏曰黄帝有景雲之應因以名師與官也少昊鳥師鳥名應劭曰金天氏黄帝子青陽也張晏曰少昊之立鳯鳥適至因以名官鳳鳥氏為歴正𤣥鳥司分伯趙司至青鳥司開丹鳥司閉師古曰𤣥鳥燕也伯趙伯勞也青鳥鶬鴳也丹鳥鷩雉也自顓頊以來爲民師而命以民事應劭曰顓頊氏代少昊者也不能紀遠始以職事命官也春官爲木正夏官爲火正秋官爲金正冬官爲水正中官爲土正師古曰自此以上皆郯子之辭也有重黎句芒祝融后土蓐收𤣥冥之官然已上矣應劭曰少昊有四叔重爲句芒胲爲蓐收修及熈爲𤣥冥顓頊氏有子曰黎爲祝融共工氏有子曰句龍爲后土故有五行之官皆封爲上公祀爲貴神師古曰上謂其事乆逺也胲音該書載唐虞之際命羲和四子應劭曰堯命四子分掌四時之教化也張晏曰四子謂羲仲羲叔和仲和叔也師古曰事見虞書堯典順天文授民時咨四岳以舉賢材揚側陋師古曰四嶽分主四方諸侯者十有二牧柔遠能邇應劭曰牧州牧也師古曰柔安也能善也邇近也禹作司空平水土師古曰空穴也古人穴居主土爲穴以居人也穿棄作后稷播百榖應劭曰棄臣名也后主也為此稷官之主也師古曰播謂布種也卨作司徒敷五教應劭曰五教父義母慈兄友弟恭子孝也師古曰卨音先列反咎繇作士正五刑應劭曰士獄官之長張晏曰五刑謂墨刖劓剕宫大辟也師古曰咎音臯繇音弋昭反墨鑿其額而湼以墨也刖斷足也劓割鼻也剕去髕骨也宫陰刑也大辟殺之也垂作共工利器用應劭曰埀臣名也為共工理百工之事也師古曰共讀曰龔作朕虞育草木鳥獸應劭曰伯益也虞掌山澤禽獸官名也師古曰古益字也虞度也主商度山川之事伯夷作秩宗典三禮應劭曰伯夷臣名也典天神地祇人鬼之禮也師古曰秩次也宗尊也主尊神之禮可以次序也䕫典樂和神人應劭曰䕫臣名也師古曰䕫音鉅龜反龍作納言出入帝命應劭曰龍臣名也納言如今尚書管王之喉舌也師古曰自此以上皆堯典之文夏殷亡聞焉師古曰言夏殷置官事不見於書傳也禮記眀堂位曰夏后氏官百殷二百蓋言其大數而無職號統屬也周官則備矣師古曰事見周書周官篇及周禮也天官冢宰地官司徒春官宗伯夏官司馬秋官司㓂冬官司空是爲六卿師古曰冢宰掌邦治司徒掌邦教宗伯掌邦禮司馬掌邦政司冦掌邦禁司空掌邦土也各有徒屬職分用於百事師古曰言百者舉大數也分音扶問反太師太傅太保是爲三公應劭曰師訓也傅覆也保養也師古曰傅相也蓋參天子坐而議政無不總綂故不以一職爲官名又立三少爲之副少師少傅少保是爲孤卿與六卿爲九焉記曰三公無官言有其人然後充之師古曰不必備員有德者乃處之舜之於堯伊尹於湯周公召公於周是也或説司馬主天司徒主人司空主土是爲三公四岳謂四方諸侯自周衰官失而百職亂戰國並爭各變異秦兼天下建皇帝之號張晏曰五帝自以徳不及三皇故自去其皇號三王又以徳不及五帝自損稱王秦自以徳襃二行故兼稱之立百官之職漢因循而不革眀簡易随時宜也其後頗有所改王莽篡位慕從古官而吏民弗安亦多虐政遂以亂亡故畧表舉大分師古曰分音扶問反以通古今備温故知新之義云師古曰論語稱孔子曰温故而知新可以爲師矣温猶厚也言厚蓄故事多識於新則可爲師相國丞相應劭曰丞者承也相者助也皆秦官金印紫綬掌丞天子助理萬機秦有左右荀悦曰秦本次國命卿二人是以置左右丞相無三公官髙帝即位置一丞相十一年更名相國緑綬孝惠髙后置左右丞相文帝二年復置一丞相有兩長史秩千石哀帝元夀二年更名大司徒武帝元狩五年初置司直秩比二千石掌佐丞相舉不法太尉秦官應劭曰自上安下曰尉武官悉以爲稱金印紫綬掌武事武帝建元二年省元狩四年初置大司馬應劭曰司馬生武也諸武官亦以為號以冠將軍之號師古曰冠者加於其上共為一官也宣帝地節三年置大司馬不冠將軍亦無印綬官屬成帝綏和元年初賜大司馬金印紫綬置官屬禄比丞相去將軍哀帝建平二年復去大司馬印綬官屬冠將軍如故元夀二年復賜大司馬印綬置官屬去將軍位在司徒上有長史秩千石御史大夫秦官應劭曰侍御史之率故稱大夫云臣瓚曰茂陵書御史大夫秩中二千石位上卿銀印青綬掌副丞相有兩丞秩千石一曰中丞在殿中蘭臺掌圖籍祕書外督部刺史内領侍御史員十五人受公卿奏事舉劾按章成帝綏和元年更名大司空金印紫綬禄比丞相置長史如中丞官職如故哀帝建平二年復爲御史大夫元夀二年復爲大司空御史中丞更名御史長史侍御史有繡衣直指服䖍曰指事而行無阿私也師古曰衣以繡者尊寵之也出討姦猾治大獄武帝所制不常置太傅古官髙后元年初置金印紫綬後省八年復置後省哀帝元夀二年復置位在三公上太師太保皆古官平帝元始元年皆初置金印紫綬太師位在太傅上太保次太傅前後左右將軍皆周末官秦因之位上卿金印紫綬漢不常置或有前後或有左右皆掌兵及四夷有長史秩千石奉常秦官掌宗廟禮儀有丞景帝中六年更名太常應劭曰常典也掌典三禮也師古曰太常王者旌旗也畫日月焉王有大事則建以行禮官主奉持之故曰奉常也後改爲太常尊大之義也屬官有太樂太祝太宰太史太卜太醫六令丞又均官都水兩長丞服䖍曰均官主山陵上槀輸入之官也如淳曰律都水治渠隄水門三輔黄圖云三輔皆有都水也又諸廟寢園食官令長丞又廱太宰太祝令丞文頴曰廱主熟食官如淳曰五畤在廱故特置太宰以下諸官師古曰如説是也雍右扶風之縣也太宰即是熟食之官不當復置一人也五畤各一尉又博士及諸陵縣皆屬焉景帝中六年更名太祝為祠祀武帝太初元年更曰廟祀初置太卜博士秦官掌通古今秩比六百石員多至數十人武帝建元五年初置五經博士宣帝黃龍元年稍增員十二人元帝永光元年分諸陵邑屬三輔王莽改太常曰秩宗郎中令秦官臣瓚曰主郎内諸官故曰郎中令掌宫殿掖門户有丞武帝太初元年更名光禄勲應劭曰光者眀也禄者爵也勲功也如淳曰胡公曰勲之言閽也閽者古主門官也光禄主宮門師古曰應説是也屬官有大夫郎謁者皆秦官又期門羽林皆屬焉服䖍曰與期門下以微行後遂以名官師古曰羽林亦宿衛之官言其如羽之疾如林之多也一説羽所以為王者羽翼也大夫掌論議有太中大夫中大夫諫大夫皆無員多至數十人武帝元狩五年初置諫大夫秩比八百石太初元年更名中大夫為光禄大夫秩比二千石太中大夫秩比千石如故郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人議郎中郎秩比六百石侍郎比四百石郎中比三百石中郎有五官左右三將秩皆比二千石郎中有車户騎三將如淳曰王車曰車郎主户衛曰户郎漢儀注郎中令主郎中左右車將主左右車郎左右户將主左右户郎也秩皆比千石謁者掌賓讚受事員七十八秩比六百石有僕射應劭曰謁請也白也僕主也秩比千石期門掌執兵送從武帝建元三年初置比郎無員多至千人有僕射秩比千石平帝元始元年更名虎賁郎師古曰賁讀與奔同言如猛獸之奔置中郎將秩比二千石羽林掌送從次期門武帝太初元年初置名曰建章營騎後更名羽林騎又取從軍死事之子孫養羽林官敎以五兵號曰羽林孤兒師古曰五兵謂弓矢殳矛戈戟也羽林有令丞宣帝令中郎將騎都尉監羽林秩比二千石僕射秦官自侍中尚書博士郎皆有古者重武官有主射以督課之軍屯吏騶宰永巷宮人皆有取其領事之號孟康曰皆有僕射随所領之事以為號也若軍屯吏則曰軍屯僕射永巷則曰永巷僕射衛尉秦官掌宮門衛屯兵師古曰漢舊儀云衛尉寺在宮内胡廣云主宮闕之門内衛士於周垣不為區廬區廬者若今之伏宿屋矣有丞景帝初更名中大夫令後元年復為衛尉屬官有公車司馬衛士旅賁三令丞師古曰漢官儀云公車司馬掌殿司馬門夜徼宮中天下上事及四方貢獻闕下凢所徵召皆總領之令秩六百石旅衆也賁與奔同言為奔走之任也衛士三丞又諸屯衛侯司馬二十二官皆屬焉長樂建章甘泉衛尉皆掌其宮師古曰各隨所掌之宮以名官職略同不常置太僕秦官應劭曰周穆王所置也蓋大御衆僕之長中大夫也掌輿馬有兩丞屬官有大廐未央家馬三令各五丞一尉師古曰家馬者主供天子私用非大祀戎事軍國所須故謂之家馬也又車府路軨騎馬駿馬四令丞伏儼曰主乗輿路車又主凢小車軨今之小馬車曲輿也師古曰軨音零又龍馬閑駒槖泉騊駼丞華五監長丞如淳曰槖泉廐在槖泉宮下騊駼野馬也師古曰閑闌養馬之所也故曰閑駒騊駼出北海中其狀如馬非野馬也騊音徒髙反駼音塗又邊郡六牧師菀令各三丞師古曰漢官儀云牧師諸菀三十六所分置北邊西邊分養馬三十萬頭又牧槖昆蹏令丞應劭曰槖槖駞昆蹏好馬名也蹏音啼如淳曰爾雅曰昆蹏趼善升甗者也因以為廐名師古曰牧槖言牧養槖駞也昆獸名也蹏趼者謂其蹏下平也善升甗者謂山形如甑而能升之也蹏即古蹄字耳趼音五見反甗音言又音牛偃反皆屬焉中太僕掌皇太后輿馬不常置也武帝太初元年更名家馬為挏馬應劭曰主乳馬取其汁挏治之味酢可飲因以名官也如淳曰主乳馬以韋革為夾兠受數斗盛馬乳挏取其上肥因名曰挏馬禮樂志丞相孔光奏省樂官七十二人給大官挏馬酒今梁州亦名馬酪為馬酒晉灼曰挏音挺挏之挏師古曰晉音是也挏音徒孔反初置路軨廷尉秦官應劭曰聼獄必質諸朝廷與衆共之兵獄同制故稱廷尉師古曰廷平也治獄貴平故以為號掌刑辟有正左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石哀帝元夀二年復為大理王莽改曰作士典客秦官掌諸歸義蠻夷有丞景帝中六年更名大行令武帝太初元年更名大鴻臚應劭曰郊廟行禮讚九賔鴻聲臚傳之也屬官有行人譯官别火三令丞如淳曰漢儀注别火獄令官主治改火之事及郡邸長丞師古曰主諸郡之邸在京師者也武帝太初元年更名行人爲大行令初置别火王莽改大鴻臚曰典樂初置郡國邸屬少府中屬中尉後屬大鴻臚宗正秦官應劭曰周成王之時彤伯入為宗正也師古曰彤伯為宗伯不謂之宗正掌親屬有丞平帝元始四年更名宗伯屬官有都司空令丞如淳曰律司空主水及罪人賈誼曰輸之司空編之徒官内官長丞師古曰律歴志主分寸尺丈也又諸公主家令門尉皆屬焉王莽并其官於秩宗初内官屬少府中屬主爵後屬宗正治粟内史秦官掌榖貨有兩丞景帝後元年更名大農令武帝太初元年更名大司農屬官有太倉均輸平準都内籍田五令丞孟康曰均輸謂諸當所有輸於官者皆令輸其地土所饒平其所在時賈官更於佗處賣之輸者既便而官有利也斡官鐵市兩長丞如淳曰斡音筦或作幹幹主也主均輸之事所謂斡鹽鐵而𣙜酒酤也晉灼曰此竹箭幹之官長也均輸自有令師古曰如説近是也縱作幹讀當以幹持財貨之事耳非謂箭幹也又郡國諸倉農監都水六十五官長丞皆屬焉騪粟都尉服䖍曰騪音蒐狩之蒐蒐索也武帝軍官不常置王莽改大司農曰羲和後更為納言初斡官屬少府中屬主爵後屬大司農少府秦官掌山海池澤之税以給共養應劭曰名曰禁錢以給私養自别為藏少者小也故稱少府師古曰大司農供軍國之用少府以養天子也共音居用反養音弋亮反有六丞屬官有尚書符節太醫太官湯官導官樂府若盧考工室左弋居室甘泉居室左右司空東織西織東園匠十六官令丞服䖍曰若盧詔獄也鄧展曰舊洛陽兩獄一名若盧主受親戚婦女如淳曰若盧官名也藏兵器品令曰若盧郎中二十人主弩射漢儀注有若盧獄令主治庫兵將相大臣臣瓚曰冬官為考工主作器械也師古曰太官主膳食湯官主餅餌導官主擇米若盧如説是也左弋地名東園匠主作陵内器物者也又胞人都水均官三長丞師古曰胞人主掌宰割者也胞與庖同又上林中十池監師古曰三輔黄圖云上林中池上籞五所而此云十池監未詳其數又中書謁者黄門鉤盾尚方御府永卷内者宦者八官令丞師古曰鉤盾主近苑囿尚方主作禁器物御府主天子衣服也諸僕射署長中黄門皆屬焉師古曰中黄門謂奄人居禁中在黄門之内給事者也武帝太初元年更名考工室為考工左弋為佽飛居室為保宮甘泉居室為昆臺永巷為掖廷佽飛掌弋射有九丞兩尉太官七丞昆臺五丞樂府三丞掖廷八丞宦者七丞鉤盾五丞兩尉成帝建始四年更名中書謁者令為中謁者令初置尚書員五人有四丞河平元年省東織更名西織為織室綏和二年哀帝省樂府王莽改少府曰共工中尉秦官掌徼循京師如淳曰所謂遊徼徼循禁備盜賊也師古曰徼謂遮繞也徼音工釣反有兩丞候司馬千人師古曰候及司馬及千人皆官名也屬國都尉云有丞候千人西域都䕶云司馬候千人各二人凡此千人皆官名也武帝太初元年更名執金吾應劭曰吾者禦也掌執金革以禦非常師古曰金吾鳥名也主辟不祥天子出行職主先導以禦非常故執此鳥之象因以名官屬官有中壘寺互武庫都船四令丞如淳曰漢儀注有寺互都船獄令治水官也都船武庫有三丞中壘兩尉又式道左右中候候丞及左右京輔都尉尉丞兵卒皆屬焉應劭曰式道凡三候車駕出還式道候持麾至宮門門乃開師古曰式表也初寺互屬少府中屬主爵後屬中尉自太常至執金吾秩皆中二千石丞皆千石太子太傅少傅古官屬官有太子門大夫應劭曰員五人秩六百石庶子應劭曰員五人秩六百石先馬張晏曰先馬員十六人秩比謁者如淳曰前驅也國語曰句踐親為夫差先馬先或作洗也舍人將作少府秦官掌治宫室有兩丞左右中候景帝中六年更名將作大匠屬官有石庫東園主章左右前後中校七令丞如淳曰章謂大材也舊將作大匠主材吏名章曹掾師古曰今所謂木鍾者盖章聲之轉耳東園主章掌大材以供東圍大匠也又主章長丞師古曰掌凢大木也武帝太初元年更名東園主章為木工成帝陽朔三年省中候及左右前後中校五丞詹事秦官應劭曰詹省也給也臣瓉曰茂陵書詹事秩真二千石掌皇后太子家有丞師古曰皇后太子各置詹事随其所在以名官屬官有太子率更家令丞僕中盾衛率厨廐長丞張晏曰太子稱家故曰家令臣瓚曰茂陵中書太子家令秩八百石應劭曰中盾主周衛徼道秩四百石如淳曰漢儀注衛率主門衛秩千石師古曰掌知漏刻故曰率更自此以上太子之官也又中長秋私府永巷倉廐祠祀食官令長丞諸宦官皆屬焉師古曰自此以上皆皇后之官成帝鴻嘉三年省詹事官幷屬大長秋師古曰省皇后詹事總屬長秋也長信詹事掌皇太后宫景帝中六年更名長信少府張晏曰以太后所居宫為名也居長信宫則曰長信少府居長樂宫則曰長樂少府也平帝元始四年更名長樂少府將行秦官應劭曰皇后卿也景帝中六年更名大長秋師古曰秋者收成之時長者恒久之義故以為皇后官名或用中人或用士人師古曰中人奄人也典屬國秦官掌蠻夷降者武帝元狩三年昆邪王降師古曰昆音下門反復増屬國置都尉丞候干人屬官九譯令成帝河平元年省幷大鴻臚水衡都尉應劭曰古山林之官曰衡掌諸池苑故稱水衡張晏曰主都水及上林苑故曰水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平其稅入武帝元鼎二年初置掌上林苑有五丞屬官有上林均輸御羞禁圃輯濯鍾官技巧六廐辯銅九官令丞如淳曰御羞地名也在藍田其土肥沃多出御物可進者揚雄傳謂之御宿三輔皇圗御羞宜春皆苑名也輯濯船官也鍾官主鑄錢官也辯銅主分别銅之種類也師古曰御宿則今長安城南御宿川也不在藍田羞㝛聲相近故或云御羞或云御㝛耳羞者珎羞所出㝛者止㝛之義輯讀與楫同音集濯音直孝反皆所以行船也漢舊儀云天子六廐未央承華騊駼騎馬輅軨大廐也馬皆萬匹據此表大僕屬官以有大廐未央輅軨騎馬騊駼承華而水衡又云六廐技巧官是則技巧之徒供六廐者其官别屬水衡劉攽曰表叙水衡九屬官技巧六廐各一物也後省技巧六廐顔遂謂此都是一官非矣盖上林自有六廐一令丞主之後六廐等各别有官非此六廐也又衡官水司空都水農倉又甘泉上林都水七官長丞皆屬焉上林有八丞十二尉劉攽曰都水官處處有之按表少府三輔皆有焉水衡屬官先叙九官令丞矣後列長丞又云上林計令長不當並置然則甘泉上林長是一官甘泉都水是一官自衡官已下凡六官言七者誤也均輸四丞御羞兩丞都水三丞禁圃兩尉甘泉上林四丞成帝建始二年省技巧六廐官王莽改水衡都尉曰予虞初御羞上林衡官及鑄錢皆屬少府内史周官秦因之掌治京師景帝二年分置左内史師古曰地理志云武帝建元六年置左右内史而此表云景帝二年分置表志不同又據史記知志誤矣右内史武帝太初元年更名京兆尹張晏曰地絶高曰京左傳曰莫之與京十億曰兆尹正也師古曰京衆數言大衆所在故也兆者京兆也屬官有長安市厨兩令丞又都水鐡官兩長丞左内史更名左馮翊張晏曰馮輔也翊佐也屬官有廪犧令丞尉師古曰廩主藏榖犧主養牲皆所以供祭祀也又左都水鐡官雲壘長安四市四長丞皆屬焉主爵中尉秦官掌列侯景帝中六年更名都尉武帝太初元年更名右扶風張晏曰扶助也風化也治内史右地屬官有掌畜令丞如淳曰尹翁歸傳曰豪强有論罪輸掌畜官使斫莝東方朔曰益為右扶風畜牧之所在也又有都水鐡官廐廱厨四長丞皆屬焉如淳曰五畤在廱故有厨劉攽曰有當作右上云左都水此為右都水與左馮翊京兆尹是為三輔服䖍曰皆治在長安中師古曰三輔黄圗云京兆在尚冠前街東入故中尉府馮翊在太上皇廟西入右扶風在夕隂街北入故主爵府長安以東為京兆長陵以北為左馮翊渭城以西為右扶風也皆有兩丞列侯更屬大鴻臚元鼎四年更置三輔都尉都尉丞各一人自太子太傅至右扶風皆秩二千石丞六百石護軍都尉秦官武帝元狩四年屬大司馬成帝綏和元年居大司馬府比司直哀帝元夀元年更名司寇平帝元始元年更名護軍司𨽻校尉周官師古曰以掌徒𨽻而廵察故云司𨽻武帝征和四年初置持節從中都官徒千二百人師古曰中都官京師諸官府也捕巫蠱督大姦猾師古曰督謂察視也後罷其兵察三輔三河𢎞農元帝初元四年去節成帝元延四年省綏和二年哀帝復置但為司𨽻冠進賢冠屬大司空比司直城門校尉掌京師城門屯兵有司馬師古曰八屯各有司馬也十二城門候師古曰門各有候蕭望之署小苑東門候亦其比也中壘校尉掌北軍壘門内外掌西域師古曰掌北軍壘門之内而又外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎如淳曰越人内附以為騎也晉灼曰取其材力超越也師古曰宣紀言佽飛騎士胡越騎又此有胡騎校尉如說是長水校尉掌長水宣曲胡騎師古曰長水胡名也宣曲觀名胡騎之屯於宣曲者又有胡騎校尉掌池陽胡騎不常置師古曰胡騎之屯池陽者也射聲校尉掌待詔射聲士服䖍曰工射者也㝠㝠中聞聲則中之因以名也應劭曰須詔所命而射故曰待詔射也虎賁校尉掌輕車凡八校尉皆武帝初置有丞司馬師古曰自中壘以下凡八校尉城中不在此數中自司𨽻至虎賁校尉秩皆二千石西域都護加官宣帝地節二年初置以騎都尉諌大夫使護西域三十六國有副校尉秩比二千石丞一人司馬候千人各二人戊己校尉元帝初元元年置師古曰甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳今所置校尉亦無常居故取戊巳爲名也有戊校尉有巳校尉一說戊巳居中鎭覆四方今所置校尉亦處西域之中撫諸國也有丞司馬各一人候五人秩比六百石奉車都尉掌御乗輿車駙馬都尉掌駙馬師古曰駙副馬也非正駕車皆為駙馬一曰駙近也疾也皆武帝初置秩比二千石侍中左右曹諸吏散騎中常侍皆加官應劭曰入侍天子故曰侍中晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹魏文帝合散騎中常侍為散騎常侍也所加或列侯將軍卿大夫將都尉尚書太醫太官令至郎中亡員如淳曰將謂郎將以下也自列侯下至郎中皆得有散騎及中常侍加官是時散騎及常侍各自一官亡員也多至數十人侍中中常侍得入禁中諸曹受尙書事諸吏得舉法散騎騎並乗輿車師古曰並音歩浪反騎而散從無常職也給事中亦加官師古曰漢官觧詁云掌侍從左右無員常侍中所加或大夫博士議郎掌顧問應對位次中常侍中黄門有給事黃門位從將大夫皆秦制爵一級曰公士師古曰言有爵命異於士卒故稱公士也二上造師古曰造成也言冇成命於上也三簮裊師古曰以組帯馬曰裊簮裊者言飾此馬也四不更師古曰言不豫更卒之事也更音工行反五大夫師古曰列位從大夫六官大夫七公大夫師古曰加官公者示稍尊也八公乗師古曰言其得乗公家之車也九五大夫師古曰大夫之尊也十左庶長十一右庶長師古曰庶長言為衆列之長也十二左更十三中更十四右更師古曰更言主領更卒部其役使也更音工行反十五少上造十六大上造師古曰言皆主上造之士也十七駟車庶長師古曰言乗駟馬之車而為衆長也十八大庶長師古曰又更尊也十九闗内侯師古曰言有侯號而居京畿無國邑二十徹侯師古曰言其爵位上通於天子皆秦制以賞功勞徹侯金印紫綬避武帝諱曰通侯或曰列侯改所食國令長名相又有家丞門大夫庶子諸侯王高帝初置師古曰蔡邕云漢制皇子封為王其實諸侯也周末諸侯或稱王而漢天子自以皇帝為稱故以王號加之總名諸侯王也金璽盭綬如淳曰盭音戾緑也以緑為質晉灼曰盭草名也出琅邪平昌縣似艾可染緑因以為綬名也師古曰晉說是也璽之言信也古者印璽通名今則尊卑有别漢舊儀云諸侯王黄金璽橐佗鈕文曰璽謂刻云某王之璽掌治其國有太傅輔王内史治國民中尉掌武職丞相綂衆官羣卿大夫都官如漢朝景帝中五年令諸侯王不得復治國天子為置吏改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞皆損其員武帝改漢内史爲京兆尹中尉為執金吾郎中令為光禄勲故王國如故損其郎中令秩千石改太僕曰僕秩亦千石成帝綏和元年省内史更令相治民如郡太守中尉如郡都尉監御史秦官掌監郡漢省丞相遣史分刺州不常置武帝元封五年初置部刺史掌奉詔條察州師古曰漢官典職儀云刺史班宣周行郡國省察治狀黜渉能否斷治冤獄以六條問事非條所問即不省一條强宗豪右田宅踰制以强陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚歛為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂訞祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮埶請託所監六條二千石違公下比阿附豪强通行貨賂割損正令也秩六百石員十三人成帝綏和元年更名牧秩二千石哀帝建平二年復爲刺史元夀二年復為牧郡守秦官掌治其郡秩二千石有丞邉郡又有長史掌兵馬秩皆六百石景帝中二年更名太守郡尉秦官掌佐守典武職甲卒秩比二千石有丞秩皆六百石景帝中二年更名都尉關都尉秦官農都尉屬國都尉皆武帝初置縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏師古曰吏理也主理其縣内也百石以下有斗食佐史之秩師古曰漢官名秩簿云斗食月俸十一斛佐史月俸八斛也一說斗食者嵗俸不滿百石計日而食一斗二升故云斗食也是為少吏大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌敎化嗇夫職聽訟收賦稅游徼徼循禁賊盜縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道凡縣道國邑千五百八十七鄉六千六百二十二亭二萬九千六百三十五凡吏秩比二千石以上皆銀印青綬師古曰漢舊儀云銀印背龜鈕其文曰章謂刻曰某官之章也光禄大夫無師古曰無印綬秩比六百石以上皆銅印黑綬大夫博士御史謁者郎無師古曰大夫以下亦無印綬其僕射御史治書尚符璽者有印綬比二百石以上皆銅印黄綬師古曰漢舊儀云六百石四百石至二百石以上皆銅印鼻鈕文曰印謂鈕但作鼻不為蟲獸之形而刻文云某官之印成帝陽朔二年除八百石五百石秩綏和元年長相皆黑綬哀帝建平二年復黃綬吏員自佐史至丞相十三萬二百八十五人前漢書卷十九上前漢書卷十九上考證百官公卿表上注師古曰漢制三公云云監本直刋此注於表前非也葢標題之下有此注耳今從宋本丞相秦有左右注荀悅曰秦本次國命卿二人是以置左右丞相無三公官臣召南按荀恱說非也秦置左右丞相始於悼武王二年以樗里疾甘茂為之是時秦已稱王數世豈猶守周制次國二卿故事耶且左相右相商湯已然左傳仲虺居薛為湯左相是其眀證但丞相之名始於秦耳高后置左右丞相文帝二年復置一丞相王應麟曰秦以左為上漢以右為尊又曰武帝征和二年雖詔分丞相長史為兩府拜劉屈氂為左丞相然右相未嘗置也内領侍御史臣召南按周禮春官之屬御史中士八人則御史始於周此表云秦官者謂御史大夫官始於秦也唐六典曰周官有御史以其在殿柱之間亦謂之柱下史秦改為侍御史史記張蒼自秦時為御史主柱下方書即其任也前後左右將軍皆周末官秦因之臣召南按沈約宋志云周制王立六軍晉獻公作二軍公將上軍將軍之名起此左傳昭二十八年豈將軍食之而有不足孔穎達疏曰晉使卿為軍將謂之將中軍將上軍此以魏子將中軍故謂之將軍及六國以來遂以將軍為官名盖其原始于此按此說甚當史記封禪書周宣王時有右將軍杜伯然不可為典要也奉常秦官景帝中六年更名太常注師古曰太常王者旌旗也劉攽曰顔說太常都非晉語作執秩之官亦是主禮者秩亦猶常也然則古通謂常耳王建太常自是周禮秦何庸知之且禮官主于一旗亦非義矣臣召南按唐六典云漢高名曰太常惠帝復曰奉常景帝又曰太常與此表異据史記叔孫通傳高帝拜通為太常漢官典職亦云惠帝改太常為奉常則六典所云自確班表盖祗標其大畧耳又廱太宰太祝令丞劉攽曰多有字不然則是又字臣浩按各本俱作又据攽此條則宋以前本作有字也博士秦官沈約宋志曰按六國時往往有博士臣召南按宋志此文所以糾正班表之失也据史記循吏傳公儀休魯博士也以高第為魯相則魯有博士官矣太中大夫秩比千石如故劉攽曰此言太中大夫秩比千石如故則中大夫舊小于太中秩無二千石故言更名中大夫為光禄大夫秩比二千石太中大夫秩比千石也太僕秦官注周穆王所置也臣召南按周禮夏官有太僕下大夫二人不得云始于秦也周穆王命伯冏為太僕耳亦不得云穆王始置此官也表及注並誤中太僕監本于太僕後提行寫非是凡九卿屬官如奉常下博士光禄勲下大夫郎謁者期門羽林僕射宋本俱不提行今從之又中書謁者唐六典曰自武帝游宴後庭故用宦者司馬遷為中書令即其任也不言謁者省文也洪邁曰中書尚書令在西漢為少府屬官在東漢亦屬少府雖典機要而去公卿甚逺魏晉以來浸以華重唐遂為三省長官居真宰相之任矣初置尚書員五人文獻通考曰其一人為僕射四人分為四曹常侍曹二千石曹民曹客曹又置三公曹是為五曹臣召南按後志及宋志尚書令尚書僕射尚書丞皆秦官而漢因之此表言初置者謂尚書之分五曹自成帝始也先馬注如淳曰前驅也驅訛軀今改正司𨽻校尉周官臣召南按劉昭注後志云豈即司寇乎按周司寇不名司𨽻且秦漢以廷尉更司寇名矣此說非也葢周禮秋官之屬有司𨽻中士二人鄭注𨽻給勞辱之役者漢始置司𨽻亦使將徒治道溝渠之事後稍尊之使主官府及近郡此表所謂周官也侍中臣召南按表不言置官本末葢漢官也沈約宋志甚詳若晉志謂黃帝時風后為侍中則杜佑所云出兵家䜟書不足信者也前漢書卷十九上考證欽定四庫全書前漢書卷十九下漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注百官公卿表第七下師古曰此表中記公卿姓名不具及但舉其官而無名或言若干年不載遷免死者皆史之闕文不可得知也前漢書卷十九下前漢書卷十九下考證百官公卿表下十二年臣召南按陳平傳高帝崩平固請得宿衛中太后乃以為郎中令惠帝六年為左丞相据此則是年郎中令一格應書曲逆侯陳平為郎中令六年遷作表時脱漏耳孝惠三年長修侯杜恬為廷尉臣召南按恬為廷尉應在二年以功臣表證之恬以二年薨其子中以三年嗣則此表列於三年誤也高后四年平陽侯曹窋為御史大夫窋訛窟從宋本改正高后七年七月辛巳左丞相食其為太傅八年九月丙戌復為丞相後九月免司馬光曰史記將相表八年七月辛巳食其為太傅九月丙戌復為丞相後九月免漢書表乃云云以長歴推之八年七月無辛巳九月無丙戌閏月羣臣迎代邸無食其名二表皆誤孝文十年廷尉昌廷尉嘉臣召南按張釋之傳釋之為廷尉至景帝初年始出為淮南相是釋之終文帝之世為廷尉也此表文帝十年書廷尉昌廷尉嘉十五年書廷尉宜昌後元年書廷尉信孝景元年書廷尉敺凡五易其人矣表傳不同如此孝景中二年中尉臣照按中尉下脱一字蓋中尉某也古本亦脱又太初二年少府王偉中尉某亦脱一字中五年主爵都尉不疑臣召南按直不疑傳但云景帝後元年拜御史大夫而已此表不疑於中五年為主爵都尉六年由中大夫令更為衛尉後元年由衛尉遷御史大夫可以補傳之所不及孝武建元二年郎中令石建六年卒臣召南按六年卒當作十六年卒萬石君以元朔五年沒建哀毁嵗餘亦遂死焉而李廣代建為郎中令两傳可證也宋本監本俱于六年之上脱十字耳且田竇廷辯時建為分别言两人事若建為郎中令僅閲六年安得彼時尚有建在乎元光四年九月中尉張敺為御史大夫宣平侯張歐為太常臣召南按張歐與敺字形相近御史大夫是安邱侯悦子即列傳所謂張叔宣平侯則張敖之孫張偃之子也但功臣表哀侯歐以景帝中二年卒矣豈得至元光時乎先儒並無疑及此者元鼎五年陽平侯杜相為太常按杜相功臣表作杜相夫太始四年江都侯至亂尊卑免監本訛截其半入征和元年非也今從宋本改正征和四年光祿勲有禄監本有字下脱祿字從宋本補孝昭始元四年騎都尉上官安為車騎將軍臣召南按昭紀及霍光傳並作驃騎將軍元鳯四年御史大夫王訢為相按文相字上脱丞字蒲侯蘇昌為太常十一年坐籍霍山書泄秘書免師古曰以秘書借霍山顧炎武曰師古説非也蓋籍沒霍山之書中有秘記當密奏之而輙以示人故以宣泄罪之耳山本傳言山坐寫秘書顯為上書獻城西第入馬千匹以贖山罪若山之秘書從昌借之昌之罪將不止免官而元康四年昌復為太常薄責昌而厚䋲山非法之平也且如顔説當云坐借霍山秘書免足矣何用文之重辭之複乎五年十二月庚戌丞相訢薨監本脱十二月九字從宋本補孝宣本始二年詹事東海宋疇臣召南按宣紀作宋畸注蘇林曰畸音踦隻之踦師古曰音居宜反據此則表作疇誤也下文同博士后倉為少府一年遷執金吾辟兵三年遷臣召南按一年監本訛作三年又脱兩遷字從宋本補但以后倉及辟兵考之後文並無遷陟則兩遷字或係古本之衍文也地節元年水衡都尉朱輔為右扶風監本風字下衍博字今刪四年弋陽侯任宫為太常監本訛邱宫從宋本改正孝元初元元年水衡都尉馮奉世監本脱馮奉世三字從宋本補孝成河平三年太僕王章為右將軍四年司𨽻校尉王章為京兆尹許應元曰同時有兩王章又兩王商一昌樂侯宣帝舅王武之子為丞相一成都侯孝元皇后之弟代王音為大司馬者也永始二年翟方進為御史大夫八月貶為執金吾凌穉隆曰自三月為御史大夫至十一月而貶凡居官八月耳荀紀因之遂為秋八月貶也非是三年光祿勲韓勲為右將軍監本脱韓勲二字從宋本補元延四年北地太守谷永為大司農臣召南按監本刋此文於第十層是大鴻臚格也宋本在第十一格是從之孝哀建平二年御史大夫王當為丞相按文應作平當各本俱誤前漢書卷十九下考證
