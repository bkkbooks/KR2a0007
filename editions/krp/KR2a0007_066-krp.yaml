body:
  text: 前漢書卷六十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注公孫劉車王楊蔡陳鄭傳第三十六公孫賀字子叔北地義渠人也賀祖父昆邪師古曰昆音戸門反景帝時為隴西守以将軍擊吳楚有功封平曲侯著書十餘篇師古曰蓺文志隂陽家有公孫渾邪十五篇是也賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷至太僕賀夫人君孺衛皇后姊也賀由是有寵元光中為輕車將軍軍馬邑後四歲出雲中後五歲以車騎將軍從大將軍青出有功封南窌侯臣瓉曰茂陵中書賀封南窌侯表亦作奅師古曰窌奅二字同耳音普教反後再以左將軍出定襄無功坐酎金失侯復以浮沮將軍出五原二千餘里無功師古曰沮音子閭反後八歲遂代石慶為丞相封葛繹侯時朝廷多事督責大臣師古曰督謂察視也自公孫宏後丞相李蔡嚴青翟趙周三人比坐事死師古曰比頻也石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞌馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上廼起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣師古曰殆危也賀子敬聲代賀為太僕父子並居公卿位敬聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得上求之急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世者京師大侠也聞賀欲以贖子罪笑曰丞相禍及宗矣南山之竹不足受我辭斜谷之木不足為我械師古曰斜谷名也其中多木械謂桎梏也言我方欲告丞相事獄辭且多械繫方乆故云然也斜音弋奢反安世遂從獄中上書告敬聲與陽石公主私通師古曰武帝女及使人巫祭祠詛上且上甘泉當馳道埋偶人師古曰甘泉宫在北山故欲徃皆言上也刻木為人象人之形謂之偶人偶並也對也劉攽曰使人巫多人字祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗語在江充戾園傳師古曰武五子傳叙戾太子諡戾而置園邑故云戾園也劉屈氂武帝庶兄中山靖王子也師古曰屈音丘勿反又音其勿反不知其始所以進征和二年春制詔御史故丞相賀倚舊故乘髙埶而為邪師古曰帝為太子賀已為舍人故云舊故興羙田以利子弟賔客不顧元元無益邊榖如淳曰戍邊卒糧乏不能為方計以益之也貨賂上流師古曰丞相貪胃受賂于下故使衆庶貨賄上流執事者也朕忍之乆矣終不自革師古曰革改也迺以邊為援如淳曰使内郡自作車耕者自轉所以饒邊饒邊所以行恩施為己名援也或曰以胡為援也使内郡自省作車服䖍曰詐令内郡自省作車轉輸也邊屯無事之時宜自治作車以給軍用師古曰令郡自省減諸餘功用而作車也省音所領反又令耕者自轉以困農文頴曰自輸穀於邊煩擾畜者重馬傷耗武備衰減師古曰重謂懐孕者也言轉運之勞畜産疲困故使懐孕者為之傷耗以減武備也耗音呼到反宋祁曰故字下景本有反字下吏妄賦百姓流亡又詐為詔書以姦傳朱安世師古曰傳逮捕也獄已正於理劉攽曰獄合屬上句其以涿郡太守屈氂為左丞相分丞相長史為兩府以待天下遠方之選師古曰待得賢人當拜為右丞相宋祁曰長史下當添使字夫親親任賢周唐之道也以澎戸二千二百封左丞相為澎侯服䖍曰澎音彭晉灼曰東海縣其秋戾太子為江充所譛殺充發兵入丞相府屈氂挺身逃亡其印綬師古曰挺引也獨引身而逃難故失印綬也是時上避暑在甘泉宫丞相長史乘疾置以聞師古曰置謂所置驛也上問丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也師古曰籍籍猶紛紛也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛車為櫓師古曰櫓楯也遠與敵戰故以車為櫓用自蔽也一説櫓望敵之樓也毋接短兵多殺傷士衆師古曰用短兵則士衆多死傷堅閉城門毋令反者得出太子既誅充發兵宣言帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉来幸城西建章宫詔發三輔近縣兵部中二千石以下丞相兼將太子亦遣使者撟制師古曰撟與矯同其字從手矯制託稱詔命也赦長安中都官囚徒師古曰京師請官府發武庫兵命少傅石徳及賔客張光等分將使長安囚如侯持節發長水及宣曲胡騎師古曰長水校名宣曲宫也並胡騎所屯今鄠縣東長水鄉即舊營校之地宋祁曰持節發下别本有兵字皆以装㑹侍郎莽通使長安因追捕如侯告胡人曰節有詐勿聼也劉敞曰以當作已遂斬如侯引騎入長安又發輯濯士以予大鴻臚商丘成師古曰輯濯士主用輯及濯行船者也短曰輯長曰濯輯音集字本從木其音同耳濯字本亦作櫂並音直孝反初漢節純赤以太子持赤節故更為黄旄加上以相别太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子太子引兵去敺四市人師古曰敺與驅同凡數萬衆至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中師古曰溝街衢之旁通水者丞相附兵浸多師古曰浸漸也太子軍敗南犇覆盎城門得出師古曰長安城南出東頭第一門曰覆盎城門一號杜門㑹夜司直田仁部閉城門坐令太子得出丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請奈何擅斬之丞相釋仁師古曰釋放也上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之惶恐自殺及北軍使者任安坐受太子節懐二心司直田仁縱太子皆要斬上曰侍郎莽通獲反將如侯長安男子景建從通獲少傅石徳可謂元功矣大鴻臚商丘成力戰獲反將張光其封通為重合侯建為徳侯成為秺侯孟康曰秺音妬在濟隂成武今有亭諸太子賔客嘗出入宫門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡師古曰非其本心然被太子劫略故徙之也以太子在外始置屯兵長安諸城門後二十餘日太子得於湖語在太子傳師古曰湖縣名其明年貳師将軍李廣利將兵出擊匈奴丞相為祖道送至渭橋師古曰祖者送行之祭因設宴飲焉與廣利辭决廣利曰願君侯早請昌邑王為太子如淳曰漢儀注列侯為丞相稱君侯師古曰楊惲傳丘常謂惲為君侯是則通呼列侯之尊稱耳非必在於丞相也如氏之説不為通矣如立為帝君侯長何憂乎師古曰如若也屈氂許諾昌邑王者貳師將軍女弟李夫人子也貳師女為屈氂子妻故共欲立焉是時治巫蠱獄急内者令郭穰告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與貳師共禱祠欲令昌邑王為帝有司奏請按驗罪至大逆不道有詔載屈氂厨車以徇師古曰厨車載食之車也徇行示也要斬東市妻子梟首華陽街貳師將軍妻子亦收貳師聞之降匈奴宗族遂滅車千秋本姓田氏其先齊諸田徙長陵師古曰劉敬所言徙關東大族者也千秋為髙寑郎師古曰髙廟衛寑之郎㑹衛太子為江充所譛敗乆之千秋上急變訟太子寃師古曰所告非常故云急變也曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意廼大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而説之師古曰説讀曰悦謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚師古曰當其立見而卽拜之言不移時也數月遂代劉屈氂為丞相封富民侯千秋無他材能術學又無伐閲功勞師古曰伐積功也閲經歴也特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之師古曰言此人何以得為相也使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝以為辱命欲下之吏良乆廼貰之師古曰貰寛縱也謂釋放之也其下亦同然千秋為人敦厚有智居位自稱踰於前後數公師古曰言稱其職也初千秋始視事見上連年治太子獄誅罰尤多羣下恐懼思欲寛廣上意尉安衆庶師古曰尉安之字本無心也是以漢書徃徃存古體字焉宋祁曰當刪字字廼與御史中二千石共上夀頌徳美勸上施恩惠緩刑罰玩聼音樂養志和神為天下自虞樂師古曰虞與娱同上報曰朕之不徳自左丞相與貳師隂謀逆亂巫蠱之禍流及士大夫師古曰謂與太子戰死者也劉攽曰既云自左丞相流及士大夫則不及太子時人也朕日一食者累月廼何樂之聼痛士大夫常在心既事不咎師古曰言既徃之事不可追咎雖然巫蠱始發詔丞相御史督二千石求捕師古曰督察視也廷尉治未聞九卿廷尉有所鞫也師古曰鞫問也曩者江充先治甘泉宫人轉至未央椒房師古曰椒房殿名皇后所居也以椒和泥塗壁取其温而芳也以及敬聲之疇李禹之屬謀入匈奴有司無所發今丞相親掘蘭臺蠱驗所明知也至今餘巫頗脱不止師古曰言往往尚為蠱也隂賊侵身遠近為蠱朕媿之其何夀之有敬不舉君之觴謹謝丞相二千石各就館師古曰謝告也館官舍也書曰毋偏毋黨王道蕩蕩師古曰周書洪範之詞也毋有復言師古曰不許其更請後歲餘武帝疾立皇子鉤弋夫人男為太子師古曰鉤弋宫名也昭帝母趙媫妤居之故號鉤弋夫人也拜大將軍霍光車騎將軍金日磾御史大夫桑𢎞羊及丞相千秋並受遺詔輔道少主師古曰道讀曰導武帝崩昭帝初卽位未任聼政師古曰年㓜故未堪聼政宋祁曰正文未任王本作未堪政事壹決大将軍光千秋居丞相位謹厚有重徳毎公卿朝㑹光謂千秋曰始與君侯俱受先帝遺詔今光治内君侯治外宜有以教督使光毋負天下師古曰督視也千秋曰唯將軍留意即天下幸甚終不肯有所言光以此重之毎有吉祥嘉應數襃賞丞相訖昭帝世國家少事百姓稍益充實始元六年詔郡國舉賢良文學士問以民所疾苦於是鹽鐵之議起焉師古曰議罷鹽鐵之官令百姓皆得煑鹽鑄鐵因總論政治得失也千秋為相十二年薨諡曰定侯初千秋年老上優之朝見得乘小車入宫殿中故因號曰車丞相子順嗣侯官至雲中太守宣帝時以虎牙將軍擊匈奴坐盜増鹵獲自殺國除桑𢎞羊為御史大夫八年自以為國家興𣙜筦之利師古曰𣙜謂專其利使入官也筦即管字也義與幹同皆謂主也𣙜解在昭紀宋祁曰𣙜從木俗從才者非伐其功師古曰自矜其功也欲為子弟得官怨望霍光與上官桀謀反遂誅滅王訢濟南人也師古曰訢字與欣同以郡縣吏積功稍遷為被陽令孟康曰故千乘縣也被音罷師古曰音皮彼反武帝末軍旅數發郡國盜賊羣起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬訢訢已解衣伏質師古曰質鍖也欲斬人皆伏於鍖上也鍖音竹林反仰言曰使君顓殺生之柄威震郡國師古曰為使者故謂之使君使音所吏反顓與專同今復斬一訢不足以増威不如時有所寛以明恩貸令盡死力師古曰貸猶假也言饒假之貸音土戴反勝之壮其言貰不誅因與訢相結厚勝之使還薦訢徵為右輔都尉守右扶風上數出幸安定北地過扶風宫館馳道脩治供張辦師古曰供音居用反張音竹亮反武帝嘉之駐車拜訢為真視事十餘年昭帝時為御史大夫代車千秋為丞相封宜春侯明年薨諡曰敬侯子譚嗣以列侯與謀廢昌邑王立宣帝師古曰與讀曰豫益封三百戸薨子咸嗣王莽妻即咸女莽簒位宜春氏以外戚寵張晏曰莽諱取同姓故氏侯邑也師古曰此説非也若云王氏則與莽族相渉故以侯號稱之耳莽本以與譚得姓不同祖系各别故為婚娶既非私竊不湏避諱諱亦不可掩也宋祁曰掩一作卞自訢傳國至𤣥孫莽敗迺絶楊敞華隂人也給事大將軍莫府為軍司馬霍光愛厚之稍遷至大司農元鳳中稻田使者燕蒼知上官桀等反謀以告敞敞素謹畏事不敢言迺移病卧師古曰移病謂移書言病一曰以病而移居也以告諫大夫杜延年延年以聞蒼延年皆封敞以九卿不輙言故不得侯師古曰聞之不即告言也後遷御史大夫代王訢為丞相封安平侯明年昭帝崩昌邑王徵即位淫亂大將軍光與車騎將軍張安世謀欲廢王更立議既定使大司農田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已師古曰唯唯恭應之辭也音弋癸反延年起至更衣師古曰古者延賔必有更衣之處也敞夫人遽從東箱師古曰遽速也謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決師古曰與讀曰豫先事誅矣延年從更衣還敞夫人與延年參語許諾師古曰三人共言故云參語請奉大將軍教令遂共廢昌邑王立宣帝宣帝即位月餘敞薨諡曰敬侯子忠嗣以敞居位定䇿安宗廟益封三千五百戸忠弟惲惲字子㓜師古曰惲音於粉反以忠任為郎補常侍騎師古曰為騎郎而常侍故謂之常侍騎也惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱好交英俊諸儒名顯朝廷擢為左曹霍氏謀反惲先聞知因侍中金安上以聞召見言状霍氏伏誅惲等五人皆封惲為平通侯遷中郎將郎官故事令郎出錢市財用給文書廼得出名曰山郎張晏曰山財用之所出故取名焉移病盡一日輙償一沐晉灼曰五曰一洗沐也師古曰言出財用者雖非休沐常得在外也貧者實病皆以沐假償之也或至歲餘不得沐其豪富郎日出游戲或行錢得善部師古曰郎官之職各有主部故行錢財而擇其善以招權也貨賂流行傳相放效師古曰放音斧徃反惲為中郎將罷山郎移長度大司農以給財用應劭曰長乆也一歲之調度也蘇林曰簿書給縑之長也師古曰應説是也言總計一歲所須財用及文書之調度而移大司農以官錢供給之更不取於郎也宋祁曰簿書給縑之長也别本給作餘無縑字其疾病休謁洗沐皆以法令從事郎謁者有罪過輙奏免薦舉其髙第有行能者至郡守九卿郎官化之莫不自厲絶請謁貨賂之端令行禁止宫殿之内翕然同聲由是擢為諸吏光禄勲親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆予惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此惲居殿中亷絜無私郎官稱公平然惲伐其行治師古曰自矜其節行及政治之能也又性刻害好發人隂伏同位有忤已者必欲害之以其能髙人由是多怨於朝廷與太僕戴長樂相失卒以是敗師古曰卒終也長樂者宣帝在民間時與相知及即位拔擢親近長樂甞使行事肄宗廟服䖍曰兼行天子事先肄習威儀也師古曰肄音弋二反還謂掾史曰我親靣見受詔副帝肄秺侯御師古曰我副帝肄而秺侯迺為御耳御謂御車也秺音丁故反人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪髙昌侯車犇入北掖門師古曰犇古奔字也惲語富平侯張延夀曰聞前有犇車抵殿門師古曰抵觸也音丁禮反門關折馬死而昭帝崩今復如此天時非人力也左馮翊韓延夀有罪下獄惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也師古曰脛脛直貌也我不能自保師古曰言我尚不能自保訟人何以得活眞人所謂䑕不容穴銜窶數者也李竒曰眞人正人也如淳曰所以不容穴坐銜窶數自妨故不得入穴也師古曰窶數戴器也窶音其羽反數音山羽反解在東方朔傳惲自云今之訟人亦於己有妨宋祁曰正文數者也多也字又中書謁者令宣持單于使者語視諸將軍中朝二千石師古曰謂譯者所録也視讀曰示惲曰冒頓單于得漢羙食好物謂之殠惡單于不來明甚師古曰時使者云單于欲来朝故惲云不來惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣師古曰過此謂經過此也問其過謂桀紂之過惡畫人有堯舜禹湯不稱而舉桀紂惲聞匈奴降者道單于見殺惲曰得不肖君大臣為畫善計不用自令身無處所師古曰無處所謂死滅也若秦時但任小臣誅殺忠良竟以滅亡令親任大臣即至今耳師古曰言國祚長逺可以至今猶不亡也古與今如一丘之貉師古曰言其同類也貉獸名似狐而善睡音胡各反惲妄引亡國以誹謗當世無人臣禮又語長樂曰正月以來天隂不雨此春秋所記夏侯君所言也張晏曰夏侯勝諫昌邑王曰天乆隂不雨臣下必有謀上者春秋無乆隂不雨之異也漢史記勝所言故曰春秋所記謂説春秋災異者耳師古曰春秋有不雨事説者因論乆隂附著之也張謂漢史為春秋失之矣行必不至河東矣張晏曰后土祠在河東天子歲祠之以主上為戲語尤悖逆絶理事下廷尉廷尉定國考問左驗明白師古曰定國于定國也左證左也言當時在其左右見此事者也奏惲不服罪而召戸將尊蘇林曰直主門戸者也師古曰戸将官名主戸衛屬光禄也欲令戒飭富平侯延夀師古曰飭與敕同富平侯張延夀也曰太僕定有死罪數事朝暮人也師古曰言不乆活也惲幸與富平侯婚姻今獨三人坐語侯言時不聞惲語自與太僕相觸也師古曰令延夀證云惲無此語長樂誣之也尊曰不可惲怒持大刀曰䝉富平侯力得族罪師古曰惲言富平侯依太僕言而證之則我得罪至於族滅深怨之辭也毋泄惲語令太僕聞之亂餘事文頴曰勿使太僕聞惲此語師古曰亂餘事者恐長樂心忿更加増其餘罪状也惲幸得列九卿諸吏宿衛近臣上所信任與聞政事師古曰與讀曰豫不竭忠愛盡臣子義而妄怨望稱引為訞惡言師古曰訞與妖同大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庶人惲既失爵位家居治産業起室宅以財自娛歲餘其友人安定太守西河孫㑹宗知略士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意師古曰闔閉也不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝以晻昧語言見廢師古曰晻與暗同内懐不服報㑹宗書曰惲材朽行穢文質無所底師古曰底致也音之履反幸頼先人餘業得備宿衞遭遇時變以獲爵位終非其任卒與禍㑹師古曰卒亦終也足下哀其愚蒙賜書教督以所不及師古曰䝉蔽也督視也殷勤甚厚然竊恨足下不深惟其終始師古曰惟思也而猥隨俗之毁譽也師古曰猥曲也言鄙陋之愚心若逆指而文過師古曰逆足下之意指而自文飾其過黙而息乎恐違孔氏各言爾志之義師古曰論語云顔囘季路侍子曰盍各言爾志故惲引之宋祁曰息乎疑作自守之義疑作之善故敢略陳其愚唯君子察焉惲家方隆盛時乘朱輪者十人位在列卿爵為通侯總領從官與聞政事師古曰與讀曰豫曾不能以此時有所建明以宣德化又不能與羣僚同心并力陪輔朝廷之遺忘已負竊位素餐之責乆矣師古曰素空也不稱其職空食祿也懐禄貪埶不能自退遭遇變故横被口語師古曰横音胡孟反身幽北闕妻子滿獄當此之時自以夷滅不足以塞責師古曰塞補也豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子游道樂以忘憂小人全軀説以忘罪師古曰説讀曰悦竊自思念過已大矣行已虧矣長為農夫以沒世矣是故身率妻子勠力耕桑灌園治産以給公上師古曰充縣官之賦歛也不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親師古曰父至親君至尊送其終也有時而既張晏曰喪不過三年臣見放逐降居三月復初師古曰既已也劉敞曰惲但云送終三年本不及放逐三月也臣之得罪已三年矣田家作苦歲時伏臘烹羊炰羔斗酒自勞師古曰炰毛炙肉也即今所謂爊也炰音歩交反爊音一髙反勞音來到反家本秦也能為秦聲婦趙女也雅善皷瑟奴婢歌者數人酒後耳熱仰天捬缶應劭曰缶瓦器也秦人擊之以節歌師古曰缶即今之盆類也而呼烏烏師古曰李斯上書云撃甕叩缶彈箏搏髀而呼烏烏快耳者真秦聲也是關中舊有此曲也其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時張晏曰山髙而在陽人君之象也蕪穢不治言朝廷之荒亂也一頃百畝以喻百官也言豆者貞實之物當在囷倉零落在野喻已見放棄也萁曲而不直言朝臣皆諂諛也師古曰萁豆莖也音基須待也是日也拂衣而喜奮褏低卬師古曰褏古袖字頓足起舞誠淫荒無度不知其不可也師古曰自謂為可也惲幸有餘禄方糴賤販貴逐什一之利此賈豎之事汙辱之處惲親行之下流之人衆毁所歸不寒而栗師古曰栗竦縮也雖雅知惲者猶隨風而靡師古曰言逐衆議皆相毁也尚何稱譽之有董生不云乎明明求仁義常恐不能化民者卿大夫之意也宋祁曰卿字當刪明明求財利常恐困乏者庶人之事也師古曰引董仲舒之辭也仲舒傳作皇皇也故道不同不相為謀師古曰論語載孔子之辭惲又引之為音于偽反今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有叚干木田子方之遺風應劭曰叚干木田子方魏賢人也漂然皆有節槩知去就之分師古曰漂然髙遠意槩度量也漂音匹遥反槩音工代反分音扶問反頃者足下離舊土臨安定安定山谷之間昆戎舊壤文穎曰昆夷之地也子弟貪鄙豈習俗之移人哉於今廼睹子之志矣師古曰言豈隨安定貪鄙之俗而易其操乎平生謂子為逹道今乃見子之志與我不同者也方當盛漢之隆願勉旃毋多談師古曰旃之也言子當自勉勵以立功名不須多與我言也又惲兄子安平侯譚為典屬國謂惲曰西河太守建平杜侯師古曰杜延年前以罪過出今徵為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力惲素與蓋寛饒韓延夀善譚即曰縣官實然蓋司𨽻韓馮翊皆盡力吏也俱坐事誅㑹有日食變騶馬猥佐成上書告惲如淳曰騶馬以給騶使乗之佐主猥馬吏也有吏有佐名成者驕奢不悔過日食之咎此人所致章下廷尉按驗得所予㑹宗書宣帝見而惡之廷尉當惲大逆無道師古曰當謂處斷其罪要斬妻子徙酒泉郡譚坐不諫正惲與相應有怨望語免為庶人召拜成為郎諸在位與惲厚善者未央衞尉韋𤣥成京兆尹張敞及孫㑹宗等皆免官蔡義河内温人也以明經給事大將軍莫府家貧常歩行資禮不逮衆門下好事者相合師古曰言衆斂錢物為義買犢車令乘之數歲遷補覆盎城門候師古曰門候主候時而開閉也乆之詔求能為韓詩者徵義待詔乆不進見義上疏曰臣山東草萊之人行能亡所比容貌不及衆然而不棄人倫者竊以聞道於先師自託於經術也願賜清閒之燕師古曰燕安息也閒讀曰閑得盡精思於前上召見義説詩甚説之師古曰下説讀曰悦擢為光禄大夫給事中進授昭帝數歲拜為少府遷御史大夫代楊敞為丞相封陽平侯又以定策安宗廟益封加賜黄金二百斤義為丞相時年八十餘短小無須眉貌似老嫗行歩俛僂師古曰俛即俯字也僂曲背也僂音力主反劉攽曰俛讀如本字自可常兩吏扶夾廼能行時大將軍光秉政議者或言光置宰相不選賢茍用可顓制者師古曰顓與專同其後類此光聞之謂侍中左右及官屬曰以為人主師當為宰相何謂云云師古曰云云衆語謂有不選賢之言也此語不可使天下聞也義為相四歲薨諡曰節侯無子國除陳萬年字㓜公沛郡相人也為郡吏察舉至縣令遷廣陵太守師古曰屢被察亷及舉薦故得遷也宋祁曰遷也改作遷之以高第入為右扶風遷太僕萬年廉平内行修然善事人賂遺外戚許史傾家自盡尤事樂陵侯史高丞相丙吉病中二千石上謁問疾師古曰上謁若今通名也遣家丞出謝謝已皆去萬年獨留昏夜廼歸及吉病甚上自臨問以大臣行能吉薦于定國杜延年及萬年萬年竟代定國為御史大夫八歲病卒子咸字子康年十八以萬年任為郎有異材抗直數言事刺譏近臣書數十上遷為左曹萬年嘗病命咸教戒於牀下語至夜半咸睡頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聼吾言何也咸叩頭謝曰具曉所言大要教咸讇也師古曰大要大歸也讇古諂字也萬年廼不復言萬年死後元帝擢咸為御史中丞總領州郡奏事課第諸刺史内執法殿中公卿以下皆敬憚之是時中書令石顯用事顓權咸頗言顯短顯等恨之時槐里令朱雲殘酷殺不辜有司舉奏未下師古曰天子未下其章也咸素善雲雲從刺候教令上書自訟晉灼曰雲從咸刺探伺候事之輕重咸因教令上書於是石顯微伺知之白奏咸漏泄省中語下獄掠治師古曰掠笞撃也音力向反減死髠為城旦因廢成帝初即位大將軍王鳳以咸前指言石顯有忠直節奏請咸補長史遷兾州刺史奉使稱意徵為諫大夫復出為楚内史北海東郡太守坐為京兆尹王章所薦章誅咸免官起家復為南陽太守所居以殺伐立威豪猾吏及大姓犯法輙論輸府師古曰府謂郡之府宋祁曰輸府下當添下字以律程作司空師古曰司空主作役之官為地臼木杵舂不中程或私解脱鉗釱衣服不如法師古曰鉗在頸􅎂在足皆以鐵為之鉗音其炎反􅎂音弟輙加罪笞督作劇不勝痛師古曰作程劇苦又被督察笞罰既多故不勝痛也自絞死者歲數百千人乆者蠱出腐爛家不得收其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養師古曰調音徒釣反奢侈玉食師古曰玉食羙食如玉也然操持掾史師古曰操執也音千髙反郡中長吏皆令閉門自歛不得踰法公移勅書曰師古曰公然移書以約勅也即各欲求索自快是一郡百太守也何得然哉下吏畏之豪彊執服師古曰執讀曰慹音之渉反令行禁止然亦以此見廢咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絶在咸後皆以廉儉先至公卿而咸滯於郡守時車騎將軍王音輔政信用陳湯咸數賂遺湯予書曰即蒙子公力得入帝城死不恨師古曰子公湯之字後竟徵入為少府少府多寶物屬官咸皆鉤校發其姦臧師古曰鉤音工候反没入辜𣙜財物師古曰辜罪也𣙜專固也官屬及諸中宫黄門鉤盾掖庭官吏舉奏按論畏咸皆失氣為少府三歲與翟方進有隙方進為丞相奏咸前為郡守所在殘酷毒螫加於吏民主守盜受所監如淳曰律主守而盜直十金弃市師古曰受所監法解在景帝紀螫式亦反而官媚邪臣陳湯以求薦舉茍得無恥不宜處位咸坐免頃之紅陽侯立舉咸方正為光禄大夫給事中方進復奏免之後數年立有罪就國方進奏歸咸故郡以憂死鄭𢎞字穉卿泰山剛人也師古曰穉古稚字兄昌字次卿亦好學皆明經通法律政事次卿為太原涿郡太守𢎞為南陽太守皆著治迹條教法度為後所述次卿用刑罰深不如𢎞平遷淮陽相以高第入為右扶風京師稱之代韋𤣥成為御史大夫六歲坐與京房論議免語在房傳贊曰所謂鹽鐵議者起始元中徵文學賢良問以治亂皆對願罷郡國鹽鐵酒𣙜均輸師古曰酒𣙜均輸解在武紀及食貨志務本抑末毋與天下爭利然後教化可興御史大夫𢎞羊以為此廼所以安邊竟制四夷國家大業不可廢也師古曰竟讀曰境當時相詰難頗有其議文至宣帝時汝南桓寛次公師古曰次公者寛之字治公羊春秋舉為郎至廬江太守丞博通善屬文推衍鹽鐵之議増廣條目極其論難著數萬言師古曰即今之所行鹽鐵論十卷是也亦欲以究治亂成一家之法焉其辭曰師古曰謂桓寛總評議其善惡觀公卿賢良文學之議異乎吾所聞師古曰論語載子張之言言不與己志同也故寛引聞汝南朱生言宋祁曰朱下當添先字當此之時英俊並進賢良茂陵唐生文學魯國萬生之徒六十有餘人咸聚闕庭舒六蓺之風陳治平之原知者贊其慮仁者明其施勇者見其斷師古曰斷音丁唤反辯者騁其辭齗齗焉行行焉師古曰齗齗辯爭之貌行行剛强之貌也齗音牛斤反行音胡浪反雖未詳備斯可略觀矣中山劉子推言王道撟當世反諸正師古曰正曲曰撟諸之也撟讀與矯同其字從手彬彬然𢎞博君子也師古曰彬彬文章貌也音彼旻反九江祝生奮史魚之節發憤懣譏公卿師古曰懣音滿又音莫本反介然直而不撓師古曰撓曲也音女教反可謂不畏彊圉矣桑大夫據當世合時變上權利之略雖非正法鉅儒宿學不能自解師古曰解釋也言理不出於𢎞羊也博物通逹之士也然攝公卿之柄不師古始放於末利師古曰放縱也謂縱心於利也一説放依也音方徃反論語稱孔子曰放於利而行多怨也處非其位行非其道果隕其性以及厥宗師古曰性生也謂與上官桀謀反誅也車丞相履伊吕之列當軸處中括囊不言容身而去師古曰括結也易坤卦六四爻辭曰括囊无咎无譽言自閉慎如囊之括結也彼哉彼哉師古曰論語云或問子西孔子曰彼哉彼哉言彼人者無足稱也若夫丞相御史兩府之士不能正議以輔宰相成同類長同行阿意茍合以説其上師古曰説讀曰悦斗筲之徒何足選也師古曰筲竹器也容一斗選數也論語云子貢問曰今之從政者何如孔子曰噫斗筲之人何足選也言其材器小劣不足数也筲音所交反選音先阮反噫歎聲也噫音於其反前漢書卷六十六前漢書卷六十六考證劉屈氂傳封左丞相為澎侯注晉灼曰東海縣臣召南按地理志東海郡無澎縣侍郎莽通莽通武紀作馬通本姓馬也後漢明德皇后惡其先人有反者易其姓為莽見孟康注楊惲傳廷尉當惲大逆無道顧炎武曰以書中有君父送終語陳萬年傳方進奏歸咸故郡胡三省曰後書陳寵傳寵之曾祖陳咸不仕莽世雖亦居沛各是一人鄭𢎞傳坐與京房論議免臣召南按公卿表𢎞以永光二年為御史大夫五年有罪自殺據京房傳但言房見道幽厲事出為𢎞言之𢎞坐免為庶人與此傳合表云自殺誤也前漢書卷六十六考證
