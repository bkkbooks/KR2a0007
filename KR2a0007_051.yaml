body:
  text: 公孫弘卜式兒寬傳第二十八公孫弘災川薛人也少時為獄吏有罪免家貧牧豕海上年四十餘乃學春秋雜説武帝初即位招賢良文學士是時弘年六十以賢良徵為博士使胸奴還報不合意上怒以為不能弘乃移病免歸元光五年復徵賢良文學災川國復推上弘弘謝曰前已嘗西用不能罷願更選國人固推弘弘至太常上策詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯陰陽和五穀登六畜蕃甘露降風雨時嘉禾興朱屮生山不童澤不涸麟鳳在郊藪龜龍遊於沼河洛出圖書父不喪子兄不哭弟北發渠搜南撫交址舟車所至人迹所及跂行喙息咸得其宜朕甚嘉之今何道而臻乎此子大夫修先聖之術明君臣之義講論洽聞有聲乎當世敢問子大夫天人之道何所本始吉凶之效安所期焉禹湯水旱厥咎何由仁義禮知四者之宜當安設施屬統垂業物鬼變化天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇朕將親覽焉靡有所隱弘對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器即賦斂省不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則群臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不遠義則民服而不離和不遠禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故陰陽和風雨時甘露降五穀登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳳至龜龍在郊河出圖洛出書遠方之君莫不説義奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道使遠近情偽必見於上謂之術凡此四者治之本道之用也皆當設施不可廢也得其要則天下安樂法設而不用不得其術則主蔽於上官亂於下此事之情屬統垂業之本也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也桀紂行惡受天之罰禹湯積德以王天下因此觀之天德無私親順之和起逆之害生此天文地理人事之紀臣弘愚戇不足以奉大對時對者百餘人太常奏弘第居下策奏天子擢弘對為第一召入見容貌甚麗拜為博士待詔金馬門弘復上疏曰陛下有先聖之位而無先聖之名有先聖之名而無先聖之吏是以勢同而治異先世之吏正故其民篤今世之吏邪故其民薄政弊而不行令倦而不聽夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志書奏天子以册書答曰問弘稱周公之治弘之材能自視孰與周公賢弘對曰愚臣淺薄安敢比材於周公雖然愚心曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之至可牽持駕服唯人之從臣聞揉曲木者不纍日銷金石者不纍月夫人之於利害好惡豈比禽獸木石之類哉期年而變臣弘尚竊遲之上異其言時方通西南夷巴蜀苦之詔使弘視焉還奏事盛毀西南夷無所用上不聽每朝會議開陳其端使人主自擇不肯面折庭爭於是上察其行慎厚辨論有餘習文法吏事緣飾以儒術上説之一歲中至左內史弘奏事有所不可不肯庭辨常與主爵都尉汲黯請間黯先發之弘推其後上常説所言皆聽以此日益親貴嘗與公卿約議至上前皆背其約以順上指汲黯庭詰弘曰齊人多詐而無情始為與臣等建此議今皆背之不忠上問弘弘謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然弘言左右幸臣每毀弘上益厚遇之弘為人談笑多聞常稱以為人主病不廣大人臣病不儉節養後母孝謹後母卒服喪三年為內史數年遷御史大夫時又東置蒼海北築朔方之郡弘數諫以為罷弊中國以奉無用之地願罷之於是上乃使朱買臣等難弘置朔方之便發十策弘不得一弘乃謝曰山東鄙人不知其便若是願罷西南夷蒼海專奉朔方上乃許之汲黯曰弘位在三公奉祿甚多然為布被此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日庭詰弘誠中弘之病夫以三公為布被誠飾詐欲以釣名且臣聞管仲相齊有三歸侈擬於君桓公以霸亦上僭於君晏嬰相景公食不重肉妾不衣絲齊國亦治亦下比於民今臣弘位為御史大夫為布被自九卿以下至於小吏無差誠如黯言且無黯陛下安聞此言上以為有讓愈益賢之元朔中代薛澤為丞相先是漢常以列侯為丞相唯弘無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥祿厚德盛者獲爵尊故武功以顯重而文德以行褒其以高成之平津鄉戶六百五十封丞相弘為平津侯其後以為故事至丞相封自弘始也時上方興功業婁舉賢良弘自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議弘身食一肉脫粟飯故人賓客仰衣食奉祿皆以給之家無所餘然其性意忌外寬內深諸常與弘有隙無近遠雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆弘力也後淮南衡山謀反治黨與方急弘病甚自以為無功而封侯居宰相位宜佐明主填撫國家使人由臣子之道今諸侯有畔逆之計此大臣奉職不稱也恐病死無以塞責乃上書曰臣聞天下通道五所以行之者三君臣父子夫婦長幼朋友之交五者天下之通道也仁知勇三者所以行之也故曰好問近乎知力行近乎仁知恥近乎勇知此三者知所以自治知所以自治然後知所以治人未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招徠四方之士任賢序位量能授官將以厲百姓勸賢材也今臣愚駑無汗馬之勞陛下過意擢臣弘卒伍之中封為列侯致位三公臣弘行能不足以稱加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯乞骸骨避賢者路上報曰古者賞有功褒有德守成上文遭遇右武未有易此者也朕夙夜庶幾獲承至尊懼不能寧惟所與共為治者君宜知之蓋君子善善及後世若茲行常在朕躬君不幸罹霜露之疾何恙不已乃上書歸侯乞骸骨是章朕之不德也今事少間君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事凡為丞相御史六歲年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館丘虛而已至賀屈氂時壞以為馬廄車庫奴婢室矣唯慶以惇謹復終相位其餘盡伏誅云弘子度嗣侯為山陽太守十餘歲詔徵巨野令史成詣公車度留不遣坐論為城旦元始中修功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫弘者也位在宰相封侯而為布被脫粟之飯奉祿以給故人賓客無有所餘可謂減於制度而率下篤俗者也與內富厚而外為詭服以釣虛譽者殊科夫表德章義所以率世厲俗聖王之制也其賜弘後子孫之次見為適者爵關內侯食邑三百戶卜式河南人也以田畜為事有少弟弟壯式脫身出獨取畜羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與弟者數矣時漢方事胸奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有冤欲言事乎式曰臣生與人亡所爭邑人貧者貸之不善者教之所居人皆從式式何故見冤使者曰苟子何欲式曰天子誅胸奴愚以為賢者宜死節有財者宜輸之如此而胸奴可滅也使者以聞上以語丞相弘弘曰此非人情不軌之臣不可以為化而亂法願陛下勿許上不報數歲乃罷式式歸復田牧歲餘會渾邪等降縣官費衆倉府空貧民大徙皆卬給縣官無以盡贍式復持錢二十萬與河南太守以給徙民河南上富人助貧民者上識式姓名曰是固前欲輸其家半財助邊乃賜式外繇四百人式又盡復與官是時富豪皆爭匿財唯式尤欲助費上於是以式終長者乃召拜式為中郎賜爵左庶長田十頃布告天下尊顯以風百姓初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣屮蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去毋令敗群上奇其言欲試使治民拜式緱氏令緱氏便之遷成皋令將漕最上以式朴忠拜為齊王太傅轉為相會呂嘉反式上書曰臣聞主愧臣死群臣宜盡死節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男及臨災習弩博昌習船者請行死之以盡臣節上賢之下詔曰朕聞報德以德報怨以直今天下不幸有事郡縣諸侯未有奮繇直道者也齊相雅行躬耕隨牧蓄番輒分昆弟更造不為利惑日者北邊有興上書助官往年西河歲惡率齊人入粟今又首奮雖未戰可謂義形於內矣其賜式爵關內侯黃金四十斤田十頃布告天下使明知之元鼎中徵式代石慶為御史大夫式既在位言郡國不便鹽鐵而船有算可罷上由是不説式明年當封禪式又不習文章貶秩為太子太傅以兒寬代之式以壽終兒寬千乘人也治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用嘗為弟子都養時行賃作帶經而鉏休息輒讀誦其精如此以射策為掌故功次補廷尉文學卒史寬為人溫良有廉知自將善屬文然懦於武口弗能發明也時張湯為廷尉廷尉府盡用文史法律之吏而寬以儒生在其間見謂不習事不署曹除為從史之北地視畜數年還至府上畜簿會廷尉時有疑奏已再見卻矣掾史莫知所為寬為言其意掾史因使寬為奏奏成讀之皆服以白廷尉湯湯大驚召寬與語乃奇其材以為掾上寬所作奏即時得可異日湯見上問曰前奏非俗吏所及誰為之者湯言兒寬上曰吾固聞之久矣湯由是鄉學以寬為奏讞掾以古法義決疑獄甚重之及湯為御史大夫以寬為掾舉侍御史見上語經學上説之從問尚書一篇擢為中大夫遷左內史寬既治民勸農業緩刑罰理獄訟卑體下士務在於得人心擇用仁厚士推情與下不求名聲吏民大信愛之寬表奏開六輔渠定水令以廣溉田收租稅時裁闊狹與民相假貸以故租多不入後有軍發左內史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繈屬不絶課更以最上由此愈奇寬及議欲放古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功德言符瑞足以封泰山上奇其書以問寬寬對曰陛下躬發聖德統楫群元宗祀天地薦禮百神精神所鄉徵兆必報天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經以為封禪告成合祛於天地神祇祇戒精專以接神明總百官之職各稱事宜而為之節文唯聖主所由制定其當非群臣之所能列今將舉大事優遊數年使群臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉既成將用事拜寬為御史大夫從東封泰山還登明堂寬上壽曰臣聞三代改制屬象相因間者聖統廢絶陛下發憤合指天地祖立明堂辟雍宗祀泰一六律五聲幽贊聖意神樂四合各有方象以丞嘉祀為萬世則天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅雍永享光輝充塞天文粲然見象日昭報降符應臣寬奉觴再拜上千萬歲壽制曰敬舉君之觴後太史令司馬遷等言曆紀壞廢漢興未改正朔宜可正上乃詔寬與遷等共定漢太初曆語在律曆志初梁相褚大通五經為博士時寬為弟子及御史大夫缺徵褚大大自以為得御史大夫至洛陽聞兒寬為之褚大笑及至與寬議封禪於上前大不能及退而服曰上誠知人寬為御史大夫以稱意任職故久無有所匡諫於上官屬易之居位九歲以官卒贊曰公孫弘卜式兒寬皆以鴻漸之翼困於燕爵遠迹羊豕之間非遇其時焉能致此位乎是時漢興六十餘載海內艾安府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息群士慕嚮異人並出卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已漢之得人於茲為盛儒雅則公孫弘董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚皋應對則嚴助朱買臣曆數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王褒以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂鄭弘召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於世參其名臣亦其次也
