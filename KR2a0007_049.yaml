body:
  text: 司馬相如傳第二十七上司馬相如字長卿蜀郡成都人也少時好讀書學擊劍名犬子相如既學慕藺相如之為人也更名相如以訾為郎事孝景帝為武騎常侍非其好也會景帝不好辭賦是時梁孝王來朝從遊説之士齊人鄒陽淮陰枚乘吳嚴忌夫子之徒相如見而説之因病免客遊梁得與諸侯遊士居數歲乃著子虛之賦會梁孝王薨相如歸而家貧無以自業素與臨卭令王吉相善吉曰長卿久宦遊不遂而困來過我於是相如往舍都亭臨卭令繆為恭敬日往朝相如相如初尚見之後稱病使從者謝吉吉愈益謹肅臨卭多富人卓王孫僮客八百人程鄭亦數百人乃相謂曰令有貴客為具召之并召令令既至卓氏客以百數至日中請司馬長卿長卿謝病不能臨臨卭令不敢嘗食身自迎相如相如為不得已而強往一坐盡傾酒酣臨卭令前奏琴曰竊聞長卿好之願以自娛相如辭謝為鼓一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之相如時從車騎雍容間雅甚都及飲卓氏弄琴文君竊從戶窺心説而好之恐不得當也既罷相如乃令侍人重賜文君侍者通殷勤文君夜亡奔相如相如與馳歸成都家徒四壁立卓王孫大怒曰女不材我不忍殺一錢不分也人或謂王孫王孫終不聽文君久之不樂謂長卿曰弟俱如臨邛從昆弟假貣猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當盧相如身自著犢鼻褌與庸保雜作滌器於市中卓王孫恥之為杜門不出昆弟諸公更謂王孫曰有一男兩女所不足者非財也今文君既失身於司馬長卿長卿故倦遊雖貧其人材足依也且又令客奈何相辱如此卓王孫不得已分與文君僮百人錢百萬及其嫁時衣被財物文君乃與相如歸成都買田宅為富人居久之蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是然此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭以推天子諸侯之苑囿其卒章歸之於節儉因以風諫奏之天子天子大説其辭曰楚使子虛使於齊齊王悉發車騎與使者出田田罷子虛過姹烏有先生亡是公存焉坐定烏有先生問曰今日田樂乎子虛曰樂獲多乎曰少然則何樂對曰僕樂王之欲夸僕以車騎之衆而僕對以雲夢之事也曰可得聞乎子虛曰可王駕車千乘選徒萬騎田於海濱列卒滿澤罘罔彌山掩菟轔鹿射麋格麟騖於鹽浦割鮮染輪射中獲多矜而自功顧謂僕曰楚亦有平原廣澤遊獵之地饒樂若此者乎楚王之獵孰與寡人僕下車對曰臣楚國之鄙人也幸得宿衛十有餘年時從出遊遊於後園覽於有無然猶未能遍覩也又烏足以言其外澤乎齊王曰雖然略以子之所聞見言之僕對曰唯唯臣聞楚有七澤嘗見其一未覩其餘也臣之所見蓋特其小者耳名曰雲夢雲夢者方九百里其中有山焉其山則盤紆岪鬱隆崇律崒岑崟參差日月蔽虧交錯糾紛上干青雲罷池陂陀下屬江河其土則丹青赭堊雌黃白附錫碧金銀衆色炫耀照爛龍鱗其石則赤玉玫瑰琳珉昆吾瑊𤨕玄厲礝石武夫其東則有蕙圃衡蘭芷若穹窮昌蒲江離蘪蕪諸柘巴且其南則有平原廣澤登降阤靡案衍壇曼緣以大江限以巫山其高燥則生葴析苞荔薜莎青薠其埤溼則生藏莨蒹葭東蘠雕胡蓮藕觚盧奄閭軒于衆物居之不可勝圖其西則有涌泉清池激水推移外發夫容菱華內隱巨石白沙其中則有神龜蛟鼉毒冒鱉黿其北則有陰林巨樹楩柟豫章桂椒木蘭檗離朱楊樝梨梬栗橘柚芬芳其上則有宛雛孔鸞騰遠射干其下則有白虎玄豹蟃蜒貙犴於是乎乃使剸諸之倫手格此獸楚王乃駕馴駮之駟乘雕玉之輿靡魚須之橈旃曳明月之珠旗建干將之雄戟左烏號之雕弓右夏服之徑箭陽子驂乘孅阿為御案節未舒即陵狡獸蹴蛩蛩轔距虛軼野馬轊騊駼乘遺風射遊騏倏胂倩浰雷動焱至星流電擊弓不虛發中必決眥洞胸達掖絶乎心繫獲若雨獸掩屮蔽地於是楚王乃弭節徘徊翱翔容與覽乎陰林觀壯士之暴怒與猛獸之恐懼徼𠙆受詘殫覩衆物之變態於是鄭女曼姬被阿錫揄紵縞雜纖羅垂霧縠襞積褰皺鬱橈溪谷衯衯裶裶揚衪戌削蜚襳垂髾扶輿猗靡翕呷萃蔡下摩蘭蕙上拂羽蓋錯翡翠之葳蕤繆繞玉綏眇眇忽忽若神之髣佛於是乃群相與獠於蕙圃媻姍勃窣上金隄掩翡翠射鵔鸃微矰出孅繳施弋白鵠連鴐鵝雙鶬下玄鶴加怠而後遊於清池浮文鷁揚旌枻張翠帷建羽蓋罔毒冒釣紫貝摐金鼓吹鳴籟榜人歌聲流喝水蟲駭波鴻沸涌泉起奔揚會礧石相擊琅琅礚礚若雷霆之聲聞乎數百里外將息獠者擊靈鼓起熢燧車案行騎就隊纚乎淫淫般乎裔裔於是楚王乃登陽雲之臺泊乎無為淡乎自持勺藥之和具而後御之不若大王終日馳騁曾不下輿脟割輪焠自以為娛臣竊觀之齊殆不如於是王無以應僕也烏有先生曰是何言之過也足下不遠千里來況齊國王悉境內之士備車騎之衆與使者出田乃欲戮力致獲以娛左右也何名為夸哉問楚地之有無者願聞大國之風烈先生之餘論也今足下不稱楚王之德厚而盛推雲夢以為驕奢言淫樂而顯侈靡竊為足下不取也必若所言固非楚國之美也有而言之是章君之惡也無而言之是害足下之信也章君惡傷私義二者無一可而先生行之必且輕於齊而纍於楚矣且齊東渚巨海南有琅邪觀乎成山射乎之罘浮勃澥遊孟諸邪與肅慎為鄰右以湯谷為界秋田乎青丘仿偟乎海外吞若雲夢者八九其於胸中曾不蒂芥若乃俶儻瑰瑋異方殊類珍怪鳥獸萬端鱗崒充仞其中者不可勝記禹不能名禼不能計然在諸侯之位不敢言遊戲之樂苑囿之大先生又見客是以王辭不復何為無以應哉亡是公聽然而笑曰楚則失矣而齊亦未為得也夫使諸侯納貢者非為財幣所以述職也封強畫界者非為守禦所以禁淫也今齊列為東蕃而外私肅慎捐國隃限越海而田其於義固未可也且二君之論不務明君臣之義正諸侯之禮徒事爭於遊戲之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以貶君自損也且夫齊楚之事又烏足道乎君未覩夫巨麗也獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始霸産出入涇渭酆鎬潦潏紆餘委蛇經營其內蕩蕩乎八川分流相背異態東西南北馳騖往來出乎椒丘之闕行乎州淤之浦徑乎桂林之中過乎泱莽之野汩乎混流順阿而下赴隘狹之口觸穹石激堆崎沸乎暴怒洶涌彭湃滭弗宓汩逼側泌瀄橫流逆折轉騰潎洌滂濞沆溉穹隆雲橈宛灘膠盩踰波趨浥涖涖下瀨批巖衝擁奔揚滯沛臨坻注壑瀺灂霣隊沈沈隱隱砰磅訇礚潏潏淈淈湁潗鼎沸馳波跳沫汩潝漂疾悠遠長懷寂漻無聲肆乎永歸然後灝溔潢漾安翔徐佪翯乎滈滈東注大湖衍溢陂池於是蛟龍赤螭䱎鰽漸離鰅鰫鰬魠禺禺魼鰨揵鰭掉尾振鱗奮翼潛處乎深巖魚鱉歡聲萬物衆夥明月珠子的皪江靡蜀石黃碝水玉磊砢磷磷爛爛采色澔汗叢積乎其中鴻鷫鵠鴇鴐鵝屬玉交精旋目煩鶩庸渠針疵鵁盧群浮乎其上泛淫泛濫隨風淡淡與波搖蕩奄薄水渚唼喋菁藻咀嚼菱藕於是乎崇山矗矗巃嵸崔巍深林巨木嶄巖參差九嵕巀嶭南山峨峨巖阤甗錡崣崛崎振溪通谷蹇産溝瀆谽呀豁閜阜陵別島崴磈嵔廆丘虛堀礨隱轔鬱礧登降施靡陂池貏豸允溶淫鬻散渙夷陸亭皋千里靡不被築掩以緑蕙被以江離糅以蘼蕪雜以留夷布結縷攢戾莎揭車衡蘭稿本射干茈薑蘘荷葴持若蓀鮮支黃礫蔣芧青薠布濩閎澤延曼太原離靡廣衍應風披靡吐芳揚烈郁郁菲菲衆香發越肸蠁布寫暗薆咇茀於是乎周覽泛觀縝紛軋芴芒芒恍忽視之無端察之無涯日出東沼入呼西陂其南則隆冬生長涌水躍波其獸則庸旄貘犛沈牛麈麋赤首圜題窮奇象犀其北則盛夏含凍裂地涉冰揭河其獸則麒麟角端騊駼橐駝蛩蛩驒騱駃騠驢騾於是乎離宮別館彌山跨谷高廊四注重坐曲閣華榱璧璫輦道纚屬步櫩周流長途中宿夷嵕築堂絫臺增成巖突洞房俯杳眇而無見仰橑而捫天奔星更於閨闥宛虹拖於楯軒青龍蚴蟉於東箱象輿婉僤於西清靈圉燕於間館偓佺之倫暴於南榮醴泉涌於清室通川過於中庭磐石裖崖嶔巖倚傾嵯峨㠍嶪刻削崢嶸玫瑰碧琳珊瑚叢生珉玉旁唐玢豳文磷赤瑕駁犖雜臿其間鼂采琬琰和氏出焉於是乎盧橘夏孰黃甘橙楱枇杷橪柿亭奈厚朴梬棗楊梅櫻桃蒲陶隱夫薁棣答遝離支羅乎後宮列乎北園貤丘陵下平原揚翠葉扤紫莖發紅華垂朱榮煌煌扈扈照曜巨野沙棠櫟櫧華楓枰櫨留落胥邪仁頻并閭欃檀木蘭豫章女貞長千仞大連抱夸條直暢實葉葰楙攢立叢倚連卷欐佹崔錯癹骫坑衡閜砢垂條扶疏落英幡纚紛溶萷蔘猗柅從風藰蒞卉歙蓋象金石之聲管籥之音柴池茈虒旋還乎後宮雜襲絫輯被山緣谷循阪下隰視之無端究之亡窮於是乎玄猿素雌蜼玃飛蠝蛭蜩玃蝚獑胡豰蛫棲息乎其間長嘯哀鳴翩幡互經夭蟜枝格偃蹇杪顛隃絶梁騰殊榛捷垂條掉希間牢落陸離爛漫遠遷若此者數百千處娛遊往來宮宿館舍庖廚不徙後宮不移百官備具於是乎背秋涉冬天子校獵乘鏤象六玉虯拖霓旌靡雲旗前皮軒後道遊孫叔奉轡衛公參乘扈從橫行出乎四校之中鼓嚴簿縱獵者江河為阹泰山為櫓車騎靁起殷天動地先後陸離離散別追淫淫裔裔緣陵流澤雲布雨施生貔豹搏豺狼手熊羆足野羊蒙鶡蘇褲白虎被斑文跨野馬陵三嵕之危下磧歷之坻徑峻赴險越壑厲水推蜚廉弄解豸格蝦蛤鋋猛氏羂要裊射封豕箭不苟害解脰陷腦弓不虛發應聲而倒於是乘輿弭節徘徊翱翔往來睨部曲之進退覽將帥之變態然後侵淫促節倏敻遠去流離輕禽蹴履狡獸轊白鹿捷狡菟軼赤電遺光耀追怪物出宇宙彎蕃弱滿白羽射遊梟櫟蜚遽擇肉而后發先中而命處弦矢分藝殪仆然後揚節而上浮陵驚風歷駭猋乘虛亡與神俱藺玄鶴亂昆雞遒孔鸞促鵔鸃拂翳鳥捎鳳凰捷鵷雛掩焦明道盡塗殫回車而還消搖乎襄羊降集乎北紘率乎直指掩乎反鄉蹶石關歷封巒過䧴鵲望露寒下堂梨息宜春西馳宣曲濯鷁牛首登龍臺掩細柳觀士大夫之勸略鈞獵者之所得獲徒車之所閵轢騎之所蹂若人之所蹈藉與其窮極倦𠙆驚憚讋伏不被創刃而死者它它藉藉填坑滿谷掩平彌澤於是乎遊戲懈怠置酒乎皓天之臺張樂乎膠葛之宇撞千石之鐘立萬石之虡建翠華之旗樹靈鼉之鼓奏陶唐氏之舞聽葛天氏之歌千人倡萬人和山陵為之震動川谷為之蕩波巴俞宋蔡淮南干遮文成顛歌族居遞奏金鼓迭起鏗鎗闛鞈洞心駭耳荊吳鄭衛之聲韶濩武象之樂陰淫案衍之音鄢郢繽紛激楚結風俳優侏儒狄鞮之倡所以娛耳目樂心意者麗靡爛漫於前靡曼美色於後若夫青琴虙妃之徒絶殊離俗妖冶間都靚莊刻飾便嬛綽約柔橈嬽嬽嫵媢孅弱曳獨繭之褕袣眇閻易以恤削便姍嫳屑與世殊服芬芳漚鬱酷烈淑郁皓齒粲爛宜笑的皪長眉連娟微睇綿藐色授魂豫心愈於側於是酒中樂酣天子芒然而思似若有亡曰嗟乎此大奢侈朕以覽聽餘間無事棄日順天道以殺伐時休息於此恐後世靡麗遂往而不返非所以為繼嗣創業垂統也於是乎乃解酒罷獵而命有司曰地可墾辟悉為農郊以贍氓隸隤牆填塹使山澤之民得至焉實陂池而勿禁虛宮館而勿仞發倉廩以救貧窮補不足恤鰥寡存孤獨出德號省刑罰改制度易服色革正朔與天下為始於是歷吉日以齋戒襲朝服乘法駕建華旗鳴玉鸞遊于六藝之囿馳騖乎仁義之塗覽觀春秋之林射貍首兼騶虞弋玄鶴舞干戚戴雲罕掩群雅悲伐檀樂樂胥修容乎禮園翱翔乎書圃述易道放怪獸登明堂坐清廟恣群臣奏得失四海之內靡不受獲於斯之時天下大説鄉風而聽隨流而化卉然興道而遷義刑錯而不用德隆於三皇功羡於五帝若此故獵乃可喜也若夫終日馳騁勞神苦形罷車馬之用抏士卒之精費府庫之財而無德厚之恩務在獨樂不顧衆庶忘國家之政貪雉菟之獲則仁者不繇也從此觀之齊楚之事豈不哀哉地方不過千里而囿居九百是草木不得墾辟而民無所食也夫以諸侯之細而樂萬乘之所侈僕恐百姓被其尤也於是二子愀然改容起若自失逡巡避席曰鄙人固陋不知忌諱乃今日見教謹受命矣賦奏天子以為郎亡是公言上林廣大山谷水泉萬物及子虛言雲夢所有甚衆侈靡多過其實且非義理所止故刪取其要歸正道而論之
