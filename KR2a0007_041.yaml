body:
  text: 爰盎鼂錯傳第十九爰盎字絲其父楚人也故為群盜徙安陵高后時盎為呂祿舍人孝文即位盎兄噲任盎為郎中絳侯為丞相朝罷趨出意得甚上禮之恭常目送之盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方呂后時諸呂用事擅相王劉氏不絶如帶是時絳侯為太尉本兵柄弗能正呂后崩大臣相與共誅諸呂太尉主兵適會其成功所謂功臣非社稷臣丞相如有驕主色陛下謙讓臣主失禮竊為陛下弗取也後朝上益莊丞相益畏已而絳侯望盎曰吾與汝兄善今兒乃毀我盎遂不謝及絳侯就國人上書告以為反徵繫請室諸公莫敢為言唯盎明絳侯無罪絳侯得釋盎頗有力絳侯乃大與盎結交淮南厲王朝殺辟陽侯居處驕甚盎諫曰諸侯太驕必生患可適削地上弗許淮南王益橫謀反發覺上徵淮南王遷之蜀檻車傳送盎時為中郎將諫曰陛下素驕之弗稍禁以至此今又暴摧折之淮南王為人剛有如遇霜露行道死陛下竟為以天下大弗能容有殺弟名奈何上不聽遂行之淮南王至雍病死聞上輟食哭甚哀盎入頓首請罪上曰以不用公言至此盎曰上自寬此往事豈可悔哉且陛下有高世行三此不足以毀名上曰吾高世三者何事盎曰陛下居代時太后嘗病三年陛下不交睫解衣湯藥非陛下口所嘗弗進夫曾參以布衣猶難之今陛下親以王者修之過曾參遠矣諸呂用事大臣顓制然陛下從代乘六乘傳馳不測淵雖賁育之勇不及陛下陛下至代邸西鄉讓天子者三南鄉讓天子者再夫許由一讓陛下五以天下讓過許由四矣且陛下遷淮南王欲以苦其志使改過有司宿衛不謹故病死於是上及解盎繇此名重朝廷盎常引大體慷慨宦者趙談以數幸常害盎盎患之盎兄子種為常侍騎諫盎曰君衆辱之後雖惡君上不復信於是上朝東宮趙談驂乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是上笑下趙談談泣下車上從霸陵上欲西馳下峻阪盎攬轡上曰將軍怯邪盎言曰臣聞千金之子不垂堂百金之子不騎衡聖主不乘危不徼幸今陛下騁六飛馳不測山有如馬驚車敗陛下縱自輕奈高廟太后何上乃止上幸上林皇后慎夫人從其在禁中常同坐及坐郎署長布席盎引卻慎夫人坐慎夫人怒不肯坐上亦怒起盎因前說曰臣聞尊卑有序則上下和今陛下既以立后慎夫人乃妾妾主豈可以同坐哉且陛下幸之則厚賜之陛下所以為慎夫人適所以禍之也獨不見人豕乎於是上乃說入語慎夫人慎夫人賜盎金五十斤然盎亦以數直諫不得久居中調為隴西都尉仁愛士卒士卒皆爭為死遷齊相徙為吳相辭行種謂盎曰吳王驕日久國多姦今絲欲刻治彼不上書告君則利劍刺君矣南方卑溼絲能日飲亡何說王毋反而已如此幸得脫盎用種之計吳王厚遇盎盎告歸道逢丞相申屠嘉下車拜遏丞相從車上謝盎還愧其吏乃之丞相舍上謁求見丞相丞相良久乃見因跪曰願請間丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起說曰君為相自度孰與陳平絳侯丞相曰不如盎曰善君自謂弗如夫陳平絳侯輔翼高帝定天下為將相而誅諸呂存劉氏君乃為材官蹶張遷為隊帥積功至淮陽守非有奇計攻城野戰之功且陛下從代來每朝郎官者上書疏未嘗不止輦受其言不可用置之言可采未嘗不稱善何也欲以致天下賢英士大夫日聞所不聞以益聖而君自閉箝天下之口而日益愚夫以聖主責愚相君受禍不久矣丞相乃再拜曰嘉鄙人乃不知將軍幸教引與入坐為上客盎素不好鼂錯錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語及孝景即位鼂錯為御史大夫使吏案盎受吳王財物抵罪詔赦以為庶人吳楚反聞錯謂丞史曰爰盎多受吳王金錢專為蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絶今兵西向治之何益且盎不宜有謀錯猶與未決人有告盎盎恐夜見竇嬰為言吳所以反願至前口對狀嬰入言上乃召盎盎入見竟言吳所以反獨急斬錯以謝吳吳可罷上拜盎為泰常竇嬰為大將軍兩人素相善是時諸陵長安中賢大夫爭附兩人車騎隨者日數百乘及鼂錯已誅盎以泰常使吳吳王欲使將不肯欲殺之使一都尉以五百人圍守盎軍中初盎為吳相時從史盜私盎侍兒盎知之弗泄遇之如故人有告從史君知女與侍者通乃亡去盎驅自追之遂以侍者賜之復為從史及盎使吳見守從史適在守盎校為司馬乃悉以其裝齎買二石醇醪會天寒士卒飢渴飲醉西南陬卒卒皆臥司馬夜引盎起曰君可以去矣吳王期旦日斬君盎弗信曰何為者司馬曰臣故為君從史盜侍兒者也盎乃驚謝曰公幸有親吾不足絫公司馬曰君弟去臣亦且亡辟吾親君何患乃以刀決帳道從醉卒直出司馬與分背盎解節旄懷之屐步行七十里明見梁騎馳去遂歸報吳楚已破上更以元王子平陸侯禮為楚王以盎為楚相嘗上書不用盎病免家居與閭里浮湛相隨行鬭雞走狗雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自通之盎曰劇孟雖博徒然母死客送喪車千餘乘此亦有過人者且緩急人所有夫一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟今公陽從數騎一旦有緩急寧足恃乎遂罵富人弗與通諸公聞之皆多盎盎雖居家景帝時時使人問籌策梁王欲求為嗣盎進說其後語塞梁王以此怨盎使人刺盎刺者至關中問盎稱之皆不容口乃見盎曰臣受梁王金刺君君長者不忍刺君然後刺者十餘曹備之盎心不樂家多怪乃之棓生所問占還梁刺客後曹果遮刺殺盎安陵郭門外鼂錯潁川人也學申商刑名於軹張恢生所與雒陽宋孟及劉帶同師以文學為太常掌故錯為人峭直刻深孝文時天下亡治尚書者獨聞齊有伏生故秦博士治尚書年九十餘老不可徵乃詔太常使人受之太常遣錯受尚書伏生所還因上書稱說詔以為太子舍人門大夫遷博士又上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其衆則群臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或曰皇太子亡以知事為也臣之愚誠以為不然竊觀上世之君不能奉其宗廟而劫殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書說也夫多誦而不知其說所謂勞苦而不為功臣竊觀皇太子材智高奇馭射伎藝過人絶遠然於術數未有所守者以陛下為心也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令以其辨得幸太子太子家號曰智囊是時胸奴彊數寇邊上發兵以禦之錯上言兵事曰臣聞漢興以來胡虜數入邊地小入則小利大入則大利高后時再入隴西攻城屠邑驅略畜産其後復入隴西殺吏卒大寇盜竊聞戰勝之威民氣百倍敗兵之卒沒世不復自高后以來隴西三困於胸奴矣民氣破傷亡有勝意今茲隴西之吏賴社稷之神靈奉陛下之明詔和輯士卒底厲其節起破傷之民以當乘勝之胸奴用少擊衆殺一王敗其衆而大有利非隴西之民有勇怯乃將吏之制巧拙異也故兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川丘阜屮木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地步兵十不當一平陵相遠川谷居間仰高臨下此弓弩之地也短兵百不當一兩陳相近平地淺屮可前可後此長戟之地也劍楯三不當一萑葦竹蕭屮木蒙蘢支葉茂接此矛鋋之地也長戟二不當一曲道相伏險厄相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金鼓之指相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及遠與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒豫敵也卒不可用以其將豫敵也將不知兵以其主豫敵也君不擇將以其國豫敵也四者兵之至要也臣又聞小大異形彊弱異勢險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今胸奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此胸奴之長技也若夫平原易地輕車突騎則胸奴之衆易撓亂也徑弩長戟射疏及遠則胸奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則胸奴之兵弗能當也材官騶發矢道同的則胸奴之革笥木薦弗能支也下馬地鬭劍戟相接去就相薄則胸奴之足弗能給也此中國之長技也以此觀之胸奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之胸奴衆寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以彊為弱在俯卬之間耳夫以人之死爭勝跌而不振則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與胸奴同可賜之堅甲絮衣徑弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆此萬全之術也傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下財擇文帝嘉之乃賜錯璽書寵答焉曰皇帝問太子家令上書言兵體三章聞之書言狂夫之言而明主擇焉今則不然言者不狂而擇者不明國之大患故在於此使夫不明擇於不狂是以萬聽而萬不當也錯復言守邊備塞勸農力本當世急務二事曰臣聞秦時北攻胡貉築塞河上南攻楊粵置戍卒焉其起兵而攻胡粵者非以衛邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫胡貉之地積陰之處也木皮三寸冰厚六尺食肉而飲酪其人密理鳥獸毳毛其性能寒楊粵之地少陰多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邊輸者僨於道秦民見行如往棄市因以謫發之名曰謫戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左發之不順行者深怨有背畔之心凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火視死如生今秦之發卒也有萬死之害而亡銖兩之報死事之後不得一算之復天下明知禍烈及己也陳勝行戍至於大澤為天下先倡天下從之如流水者秦以威劫而行之之敝也胡人衣食之業不著於地其勢易以擾亂邊竟何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於廣野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國之所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發遠縣才至則胡又已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令遠方之卒守塞一歲而更不知胡人之能不如選常居者家室田作且以備之以便為之高城深塹具藺石布渠答復為一城其內城間百五十步要害之處通川之道調立城邑毋下千家為中周虎落先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家豫冬夏衣廩食能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買豫之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半豫之縣官為贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使遠方無屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存恤所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其屮木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二內門戶之閉置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以修祭祀男女有昏生死相恤墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有護習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍正定於外服習以成勿令遷徙幼則同游長則共事夜戰聲相知則足以相救晝戰目相見則足以相識歡愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶胸奴不與和親臣竊意其冬來南也一大治則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也愚臣亡識唯陛下財察後詔有司舉賢良文學士錯在選中上親策詔之曰惟十有五年九月壬子皇帝曰昔者大禹勤求賢士施及方外四極之內舟車所至人迹所及靡不聞命以輔其不逮近者獻其明遠者通厥聰以善戮力以翼天子是以大禹能亡失德夏以長楙高皇帝親除大害去亂從並建豪英以為官師為諫爭輔天子之闕而翼戴漢宗也賴天之靈宗廟之福方內以安澤及四夷今朕獲執天子之正以承宗廟之祀朕既不德又不敏明弗能燭而智不能治此大夫之所著聞也故詔有司諸侯王三公九卿及主郡吏各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數將以匡朕之不逮二三大夫之行當此三道朕甚嘉之故登大夫于朝親諭朕志大夫其上三道之要及永惟朕之不德吏之不平政之不宣民之不寧四者之闕悉陳其志毋有所隱上以薦先帝之宗廟下以興愚民之休利著之于篇朕親覽焉觀大夫所以佐朕至與不至書之周之密之重之閉之興自朕躬大夫其正論毋枉執事烏呼戒之二三大夫其帥志毋怠錯對曰平陽侯臣窋汝陰侯臣竈潁陰侯臣何廷尉臣宜昌隴西太守臣昆邪所選賢良太子家令臣錯昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼故黃帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得管子而為五伯長今陛下講于大禹及高皇之建豪英也退託於不明以求賢良讓之至也臣竊觀上世之傳若高皇帝之建功業陛下之德厚而得賢佐皆有司之所覽刻於玉版藏於金匱歷之春秋紀之後世為帝者祖宗與天地相終今臣窋等乃以臣錯充賦甚不稱明詔求賢之意臣錯屮茅臣亡識知昧死上愚對曰詔策曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處于法宮之中明堂之上動靜上配天下順地中得人故衆生之類亡不覆也根著之徒亡不載也燭以光明亡偏異也德上及飛鳥下至水蟲草木諸産皆被其澤然後陰陽調四時節日月光風雨時膏露降五穀孰祅孽滅賊氣息民不疾疫河出圖洛出書神龍至鳳鳥翔德澤滿天下靈光施四海此謂配天地治國大體之功也詔策曰通於人事終紿愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲壽三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動衆使民也本於人事然後為之取人以己內恕及人情之所惡不以彊人情之所欲不以禁民是以天下樂其政歸其德望之若父母從之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔策曰直言極諫愚臣竊以五伯之臣明之臣聞五伯不及其臣故屬之以國任之以事五伯之佐之為人臣也察身而不敢誣奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以亡能居尊顯之位自行若此可謂方正之士矣其立法也非以苦民傷衆而為之機陷也以之興利除害尊主安民而救暴亂也其行賞也非虛取民財妄豫人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此斂民財以顧其功而民不恨者知與而安己也其行罰也非以忿怒妄誅而從暴心也以禁天下不忠不孝而害國者也故罪大者罰重罪小者罰輕如此民雖伏罪至死而不怨者知罪罰之至自取之也立法若此可謂平正之吏矣法之逆者請而更之不以傷民主行之暴者逆而復之不以傷國救主之失補主之過揚主之美明主之功使主內亡邪辟之行外亡騫汙之名事君若此可謂直言極諫之士矣此五伯之所以德匡天下威正諸侯功業甚美名聲章明舉天下之賢主五伯與焉此身不及其臣而使得直言極諫補其不逮之功也今陛下人民之衆威武之重德惠之厚令行禁止之勢萬萬於五伯而賜愚臣策曰匡朕之不逮愚臣何足以識陛下之高明而奉承之詔策曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富彊夫國富彊而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宮室過度耆欲亡極民力罷盡賦斂不節矜奮自賢群臣恐諛驕溢縱恣不顧患禍妄賞以隨喜意妄誅以快怒心法令煩憯刑罰暴酷輕絶人命身自射殺天下寒心莫安其處姦邪之吏乘其亂法以成其威獄官主斷生殺自恣上下瓦解各自為制秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疏皆危外內咸怨離散逋逃人有走心陳勝先倡天下大潰絶祀亡世為異姓福此吏不平政不宣民不寧之禍也今陛下配天象地覆露萬民絶秦之迹除其亂法躬親本事廢去淫末除苛解嬈寬大愛人肉刑不用罪人亡帑非謗不治鑄錢者除通關去塞不孽諸侯賓禮長老愛恤少孤罪人有期後宮出嫁尊賜孝悌農民不租明詔軍師愛士大夫求進方正廢退姦邪除去陰刑害民者誅憂勞百姓列侯就都親耕節用視民不奢所為天下興利除害變法易故以安海內者大功數十皆上世之所難及陛下行之道純德厚元元之民幸矣詔策曰永惟朕之不德愚臣不足以當之詔策曰悉陳其志毋有所隱愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而聖賢不廢也故各當其世而立功德焉傳曰往者不可及來者猶可待能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明德厚資財不下五帝臨制天下至今十有六年民不益富盜賊不衰邊竟未安其所以然意者陛下未之躬親而待群臣也今執事之臣皆天下之選已然莫能望陛下清光譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺也日損一日歲亡一歲日月益暮盛德不及究於天下以傳萬世愚臣不自度量竊為陛下惜之昧死上狂惑屮茅之愚臣言唯陛下財擇時賈誼已死對策者百餘人唯錯為高第繇是遷中大夫錯又言宜削諸侯事及法令可更定者書凡三十篇孝文雖不盡聽然奇其材當是時太子善錯計策爰盎諸大功臣多不好錯景帝即位以錯為內史錯數請間言事輒聽幸傾九卿法令多所更定丞相申屠嘉心弗便力未有以傷內史府居太上廟堧中門東出不便錯乃穿門南出鑿廟堧垣丞相大怒欲因此過為奏請誅錯錯聞之即請間為上言之丞相奏事因言錯擅鑿廟垣為門請下廷尉誅上曰此非廟垣乃堧中垣不致於法丞相謝罷朝因怒謂長史曰吾當先斬以聞乃先請固誤丞相遂發病死錯以此愈貴遷為御史大夫請諸侯之罪過削其支郡奏上上令公卿列侯宗室雜議莫敢難獨竇嬰爭之繇此與錯有隙錯所更令三十章諸侯歡譁錯父聞之從潁川來謂錯曰上初即位公為政用事侵削諸侯疏人骨肉口讓多怨公何為也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯為名上與錯議出軍事錯欲令上自將兵而身居守會竇嬰言爰盎詔召入見上方與錯調兵食上問盎曰君嘗為吳相知吳臣田祿伯為人呼今吳楚反於公意何如對曰不足憂也今破矣上曰吳王即山鑄錢煮海為鹽誘天下豪桀白頭舉事此其計不百全豈發呼何以言其無能為也盎對曰吳銅鹽之利則有之安得豪桀而誘之誠令吳得豪桀亦且輔而為誼不反矣吳所誘皆亡賴子弟亡命鑄錢姦人故相誘以亂錯曰盎策之善上問曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東箱甚恨上卒問盎對曰吳楚相遺書言高皇帝王子弟各有分地今賊臣鼂錯擅適諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可毋血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人謝天下盎曰愚計出此唯上孰計之乃拜盎為太常密裝治行後十餘日丞相青翟中尉嘉廷尉驅劾奏錯曰吳王反逆亡道欲危宗廟天下所當共誅今御史大夫錯議曰兵數百萬獨屬群臣不可信陛下不如自出臨兵使錯居守徐僮之旁吳所未下者可以豫吳錯不稱陛下德信欲疏群臣百姓又欲以城邑豫吳亡臣子禮大逆無道錯當要斬父母妻子同産無少長皆棄市臣請論如法制曰可錯殊不知乃使中尉召錯紿載行市錯衣朝衣斬東市錯已死謁者僕射鄧公為校尉擊吳楚為將還上書言軍事見上上問曰道軍所來聞鼂錯死吳楚罷不鄧公曰吳為反數十歲矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮內杜忠臣之口外為諸侯報仇臣竊為陛下不取也於是景帝喟然長息曰公言善吾亦恨之乃拜鄧公為城陽中尉鄧公成固人也多奇計建元年中上招賢良公卿言鄧先鄧先時免起家為九卿一年復謝病免歸其子章以修黃老言顯諸公間贊曰爰盎雖不好學亦善傅會仁心為質引義慷慨遭孝文初立資適逢世時已變易及吳一說果於用辨身亦不遂鼂錯鋭於為國遠慮而不見身害其父睹之經於溝瀆亡益救敗不如趙母指括以全其宗悲夫錯雖不終世哀其忠故論其施行之語著于篇
