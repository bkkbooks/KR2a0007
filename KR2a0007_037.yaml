body:
  text: 蒯伍江息夫傳第十五蒯通范陽人也本與武帝同諱楚漢初起武臣略定趙地號武信君通說范陽令徐公曰臣范陽百姓蒯通也竊閔公之將死故弔之雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子斷人之足黥人之首甚衆慈父孝子所以不敢事刃於公之腹者畏秦法也今天下大亂秦政不施然則慈父孝子將爭接刃於公之腹以復其怨而成其名此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而說之曰必將戰勝而後略地攻得而後下城臣竊以為殆矣用臣之計毋戰而略地不攻而下城傳檄而千里定可乎彼將曰何謂也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利之則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻也為君計者莫若以黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通策焉後漢將韓信虜魏王破趙代降燕定三國引兵將東擊齊未度平原聞漢王使酈食其說下齊信欲止通說信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城將軍將數萬之衆乃下趙五十餘城為將數歲反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷備漢守禦信因襲歷下軍遂至臨菑齊王以酈生為欺己而亨之因敗走信遂定齊地自立為齊假王漢方困於滎陽遣張良即立信為齊王以安固之項王亦遣武涉說信欲與連和蒯通知天下權在信欲說信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通因請間曰天下初作難也俊雄豪桀建號一呼天下之士雲合霧集魚鱗雜襲飄至風起當此之時憂在亡秦而已今劉項分爭使人肝腦塗地流離中野不可勝數漢王將數十萬衆距鞏雒岨山河一日數戰無尺寸之功折北不救敗滎陽傷成皋還走宛葉之間此所謂智勇俱困者也楚人起彭城轉鬭逐北至滎陽乘利席勝威震天下然兵困於京索之間迫西山而不能進三年於此矣鋭氣挫於嶮塞糧食盡於內藏百姓罷極無所歸命以臣料之非天下賢聖其勢固不能息天下之禍當今之時兩主縣命足下足下為漢則漢勝與楚則楚勝臣願披心腹墮肝膽效愚忠恐足下不能用也方今為足下計莫若兩利而俱存之參分天下鼎足而立其勢莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虛之地以制其後因民之欲西鄉為百姓請命天下孰敢不聽足下按齊國之故有淮泗之地懷諸侯以德深拱揖讓則天下君王相率而朝齊矣蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而背恩乎通曰始常山王成安君故相與為刎頸之交及爭張黶陳釋之事常山王奉頭鼠竄以歸漢王借兵東下戰於鄗北成安君死於泜水之南頭足異處此二人相與天下之至歡也而卒相滅亡者何也患生於多欲而人心難測也今足下行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳釋之事者故臣以為足下必漢王之不危足下過矣大夫種存亡越伯句踐立功名而身死語曰野禽殫走犬亨敵國破謀臣亡故以交友言之則不過張王與成安君以忠臣言之則不過大夫種此二者宜足以觀矣願足下深慮之且臣聞之勇略震主者身危功蓋天下者不賞足下涉西河虜魏王禽夏說下井陘誅成安君之罪以令於趙脅燕定齊南摧楚人之兵數十萬衆遂斬龍且西鄉以報此所謂功無二於天下略不世出者也今足下挾不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之數日通復說曰聽者事之候也計者存亡之機也夫隨廝養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎之猶與不知蜂蠆之致蠚孟賁之狐疑不如童子之必至此言貴能行之也夫功者難成而易敗時者難值而易失時乎時不再來願足下無疑臣之計信猶與不忍背漢又自以功多漢不奪我齊遂謝通通說不聽惶恐乃陽狂為巫天下既定後信以罪廢為淮陰侯謀反被誅臨死歎曰悔不用蒯通之言死於女子之手高帝曰是齊辨士蒯通乃詔齊召蒯通通至上欲亨之曰若教韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿天下共逐之高材者先得天下胸胸爭欲為陛下所為顧力不能可殫誅邪上乃赦之至齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之劫齊士不與者死齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入深山隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談說之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國乃見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓通論戰國時說士權變亦自序其說凡八十一首號曰雋永初通善齊人安其生安其生嘗干項羽羽不能用其策而項羽欲封此兩人兩人卒不肯受伍被楚人也或言其先伍子胥後也被以材能稱為淮南中郎是時淮南王安好術學折節下士招致英雋以百數被為冠首久之淮南王陰有邪謀被數微諫後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諫吳王吳王不用乃曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也於是王怒繫被父母囚之三月王復召被曰將軍許寡人乎被曰不臣將為大王畫計耳臣聞聰者聽於無聲明者見於未形故聖人萬舉而萬全文王一動而功顯萬世列為三王所謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不說曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長幼之序皆得其理上之舉錯遵古之道風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賓服羌僰貢獻東甌入朝廣長榆開朔方胸奴折傷雖未及古太平時然猶為治王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黃義從大將軍擊胸奴言大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山如飛材力絶人如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先須士卒休乃舍穿井得水乃敢飲軍罷士卒已踰河乃度皇太后所賜金錢盡以賞賜雖古名將不過也王曰夫蓼太子知略不世出非常人也以為漢廷公卿列侯皆如沐猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒受几杖而不朝王四郡之衆地方數千里采山銅以為錢煮海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合從舉兵而西破大梁敗狐父奔走而還為越所禽死於丹徒頭足異處身滅祀絶為天下戮夫以吳衆不能成功者何也誠逆天違衆而不見時也王曰男子之所死者一言耳且吳何知反漢將一日過成皋者四十餘人今我令緩先要成皋之口周被下潁川兵塞轘轅伊闕之道陳定發南陽兵守武關河南太守獨有雒陽耳何足憂然此北尚有臨晉關河東上黨與河內趙國界者通谷數行人言絶成皋之道天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐陰事泄謂被曰事至吾欲遂發天下勞苦有間矣諸侯頗有失行皆自疑我舉兵西鄉必有應者無應即還略衡山勢不得不發被曰略衡山以擊廬江有尋陽之船守下雉之城結九江之浦絶豫章之口強弩臨江而守以禁南郡之下東保會稽南通徑越屈強江淮間可以延歲月之壽耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成公獨以為無福何被曰大王之群臣近幸素能使衆者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地百人之衆起於大澤奮臂大呼天下嚮應西至於戲而兵百二十萬今吾國雖小勝兵可得二十萬公何以言有禍無福被曰臣不敢避子胥之誅願大王無為吳王之聽往者秦為無道殘賊天下殺術士燔詩書滅聖迹棄禮義任刑法轉海濱之粟致于西河當時之時男子疾耕不足於糧餽女子紡績不足於蓋形遣蒙恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈欲為亂者十室而五又使徐福入海求仙藥多齎珍寶童男女三千人五種百工而行徐福得平原大澤止王不來於是百姓悲痛愁思欲為亂者十室而六又使尉他踰五嶺攻百越尉他知中國勞極止王南越行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乘之駕作阿房之宮收太半之賦發閭左之戍父不寧子兄不安弟政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上欲為亂者十室而八客謂高皇帝曰時可矣高帝曰待之聖人當起東南間不一歲陳吳大呼劉項並和天下嚮應所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陳之中以成帝王之功今大王見高祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下一齊海內泛愛蒸庶布德施惠口雖未言聲疾雷震令雖未出化馳如神心有所懷威動千里下之應上猶景嚮也而大將軍材能非直章邯楊熊也王以陳勝吳廣論之被以為過矣且大王之兵衆不能什分吳楚之一天下安寧又萬倍於秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌痛紂之不用王子比干之言也故孟子曰紂貴為天子死曾不如匹夫是紂先自絶久矣非死之日天去之也今臣亦竊悲大王棄千乘之君將賜絶命之書為群臣先身死于東宮也被因流涕而起後王復召問被苟如公言不可以徼幸邪被曰必不得已被有愚計王曰奈何被曰當今諸侯無異心百姓無怨氣朔方之郡土地廣美民徙者不足以實其地可為丞相御史請書徙郡國豪桀及耐罪以上以赦令除家産五十萬以上者皆徙其家屬朔方之郡益發甲卒急其會日又僞為左右都司空上林中都官詔獄書逮諸侯太子及幸臣如此則民怨諸侯懼即使辨士隨而說之黨可以徼幸王曰此可也雖然吾以不至若此專發而已後事發覺被詣吏自告與淮南王謀反蹤跡如此天子以伍被雅辭多引漢美欲勿誅張湯進曰被首為王畫反計罪無赦遂誅被江充字次倩趙國邯鄲人也充本名齊有女弟善鼓琴歌舞嫁之趙太子丹齊得幸於敬肅王為上客久之太子疑齊以己陰私告王與齊忤使吏逐捕齊不得收繫其父兄按驗皆棄市齊遂絶迹亡西入關更名充詣闕告太子丹與同産姊及王後宮姦亂交通郡國豪猾攻剽為姦吏不能禁書奏天子怒遣使者詔郡發吏卒圍趙王宮收捕太子丹移繫魏郡詔獄與廷尉雜治法至死趙王彭祖帝異母兄也上書訟太子罪言充逋逃小臣苟為姦訛激怒聖朝欲取必於萬乘以復私怨後雖亨醢計猶不悔臣願選從趙國勇敢士從軍擊胸奴極盡死力以贖丹罪上不許竟敗趙太子初充召見犬臺宮自請願以所常被服冠見上上許之充衣紗縠襌衣曲裾後垂交輸冠襌纚步搖冠飛翮之纓充為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上說之充因自請願使胸奴詔問其狀充對曰因變制宜以敵為師事不可豫圖上以充為謁者使胸奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請沒入車馬令身待北軍擊胸奴奏可充即移書光祿勳中黃門逮名近臣侍中諸當詣北軍者移劾門衛禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬上以充忠直奉法不阿所言中意充出逢館陶長公主行馳道中充呵問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾沒入官後充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者唯江君寬之充不聽遂白奏上曰人臣當如是矣大見信用威震京師遷為水衡都尉宗族知友多得其力者久之坐法免會陽陵朱安世告丞相公孫賀子太僕敬聲為巫蠱事連及陽石諸邑公主賀父子皆坐誅語在賀傳後上幸甘泉疾病充見上年老恐晏駕後為太子所誅因是為姦奏言上疾祟在巫蠱於是上以充為使者治巫蠱充將胡巫掘地求偶人捕蠱及夜祠視鬼染汙令有處輒收捕驗治燒鐵鉗灼強服之民轉相誣以巫蠱吏輒劾以大逆亡道坐而死者前後數萬人是時上春秋高疑左右皆為蠱祝詛有與亡莫敢訟其冤者充既知上意因言宮中有蠱氣先治後宮希幸夫人以次及皇后遂掘蠱於太子宮得桐木人太子懼不能自明收充自臨斬之罵曰趙虜亂乃國王父子不足邪乃復亂吾父子也太子繇是遂敗語在戾園傳後武帝知充有詐夷充三族息夫躬字子微河內河陽人也少為博士弟子受春秋通覽記書容貌壯麗為衆所異哀帝初即位皇后父特進孔鄉侯傅晏與躬同郡相友善躬繇是以為援交游日廣先是長安孫寵亦以游說顯名免汝南太守與躬相結俱上書召待詔是時哀帝被疾始即位而人有告中山孝王太后祝詛上太后及弟宜鄉侯馮參皆自殺其罪不明是後無鹽危山有石自立開道躬與寵謀曰上亡繼哃體久不平關東諸侯心爭陰謀今無鹽有大石自立聞邪臣託往事以為大山石立而先帝龍興東平王雲以故與其后日夜祠祭祝詛上欲求非望而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杯杓荊軻之變必起於帷幄事勢若此告之必成發國姦誅主讎取封侯之計也躬寵乃與中郎右師談共因中常侍宋弘上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅上擢寵為南陽太守談潁川都尉弘躬皆光祿大夫左曹給事中是時侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為高安侯寵為方陽侯躬為宜陵侯食邑各千戶賜談爵關內侯食邑丞相王嘉內疑東平獄事爭不欲侯賢等語在嘉傳嘉固言董賢泰盛寵躬皆傾覆有佞邪材恐必撓亂國家不可任用嘉以此得罪矣躬既親近數進見言事論議亡所避衆畏其口見之仄目躬上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延墮弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遬不足數卒有彊弩圍城長戟指闕陛下誰與備之如使狂夫嘄呼於東崖胸奴飲馬於渭水邊竟雷動四野風起京師雖有武蜂精兵未有能窺左足而先應者也軍書交馳而輻湊羽檄重迹而押至小夫懦臣之徒憒眊不知所為其有犬馬之決者仰藥而伏刃雖加夷滅之誅何益禍敗之至哉躬又言秦開鄭國渠以富國彊兵今為京師土地肥饒可度地勢水泉廣溉灌之利天子使躬持節領護三輔都水躬立表欲穿長安城引漕注太倉下以省轉輸議不可成乃止董賢貴幸日盛丁傅害其寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝明年躬因是而上奏以為單于當以十一月入塞後以病為解疑有他變烏孫兩昆彌弱卑爰疐強盛居彊煌之地擁十萬之萬東結單于遣子往侍如因素彊之威循烏孫就屠之迹舉兵南伐并烏孫之勢也烏孫并則胸奴盛而西域危矣可令降胡詐為卑爰疐使者來上書曰所以遣子侍單于者非親信之也實畏之耳唯天子哀告單于歸臣侍子願助戊己校尉保惡都奴之界因下其章諸將軍令胸奴客聞焉則是所謂上兵伐謀其次伐交者也書奏上引見躬召公卿將軍大議左將軍公孫祿以為中國常以威信懷伏夷狄躬欲逆詐造不信之謀不可許且胸奴賴先帝之德保塞稱蕃今單于以疾病不任奉朝賀遣使自陳不失臣子之禮臣祿自保沒身不見胸奴為邊竟憂也躬掎祿曰臣為國家計幾先謀將然豫圖未形為萬世慮而左將軍公孫祿欲以其犬馬齒保目所見臣與祿異議未可同日語也上曰善乃罷群臣獨與躬議因建言往年熒惑守心太白高而芒光又角星茀於河鼓其法為有兵亂是後訛言行詔籌經歷郡國天下騷動恐必有非常之變可遣大將軍行邊兵敕武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相丞相嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐況於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心說而天意得矣辨士見一端或妄以意傅著星曆虛造胸奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有罪車馳詣闕交臂就死恐懼如此而談說者云動安之危辨口快耳其實未可從夫議政者苦其讇諛傾險辨慧深刻也讇諛則主德毀傾險則下怨恨辨慧則破正道深刻則傷恩惠昔秦繆公不從百里奚蹇叔之言以敗其師悔過自責疾詿誤之臣思黃髮之言名垂於後世唯陛下觀覽古戒反覆參考無以先入之語為主上不聽遂下詔曰間者災變不息盜賊衆多兵革之徵或頗著見未聞將軍惻然深以為意簡練戎士繕修干戈器用盬惡孰當督之天下雖安忘戰必危將軍與中二千石舉明習兵法有大慮者各一人將軍二人詣公車就拜孔鄉侯傅晏為大司馬衛將軍陽安侯丁明又為大司馬票騎將軍是日日有食之董賢因此沮躬晏之策後數日收晏衛將軍印綬而丞相御史奏躬罪過上繇是惡躬等下詔曰南陽太守方陽侯寵素亡廉聲有酷惡之資毒流百姓左曹光祿大夫宜陵侯躬虛造詐諼之策欲以詿誤朝廷皆交遊貴戚趨權門為名其免躬寵官遣就國躬歸國未有第宅寄居丘亭姦人以為侯家富常夜守之躬邑人河內掾賈惠往過躬教以祝盜方以桑東南指枝為匕畫北斗七星其上躬夜自被髮立中庭向北斗持匕招指祝盜人有上書言躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫同祝詛上遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬仰天大呼因僵仆吏就問云咽已絶血從鼻耳出食頃死黨友謀議相連下獄百餘人躬母聖坐祠竈祝詛上大逆不道聖棄市妻充漢與家屬徙合浦躬同族親屬素所厚者皆免廢錮哀帝崩有司奏方陽侯寵及右師談等皆造作姦謀罪及王者骨肉雖蒙赦令不宜處爵位在中土皆免寵等徙合浦郡初躬待詔數危言高論自恐遭害著絶命辭曰玄雲泱鬱將安歸兮鷹隼橫厲鸞俳佪兮矰若浮猋動則機兮藂棘𢯆𢯆曷可棲兮發忠忘身自繞罔兮冤頸折翼庸得往兮涕泣流兮萑蘭心結愲兮傷肝虹霓曜兮日微孽杳冥兮未開痛入天兮鳴呼冤際絶兮誰語仰天光兮自列招上帝兮我察秋風為我吟浮雲為我陰嗟若是兮欲何留撫神龍兮攬其須游曠迥兮反亡期雄失據兮世我思後數年乃死如其文贊曰仲尼惡利口之覆邦家蒯通一說而喪三俊其得不亨者幸也伍被安於危國身為謀主忠不終而詐讎誅夷不亦宜乎書放四罪詩歌青蠅替秋以來禍敗多矣昔子翬謀桓而魯隱危欒書搆郤而晉厲弒豎牛奔仲叔孫卒郈伯毀季昭公逐費忌納女楚建走宰嚭讒胥夫差喪李園進妹春申斃上官訴屈懷王執趙高敗斯二世縊伊戾坎盟宋痤死江充造蠱太子殺息夫作姦東平誅皆自小覆大繇疏陷親可不懼哉可不懼哉
