body:
  text: 薛宣朱博傳第五十三薛宣字贛君東海郯人也少為廷尉書佐都船獄史後以大司農斗食屬察廉補不其丞琅邪太守趙貢行縣見宣甚說其能從宣歷行屬縣還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣廉遷樂浪都尉丞幽州刺史舉茂材為宛句令大將軍王鳳聞其能薦宣為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀閔元元躬有日仄之勞而亡佚豫之樂允執聖道刑罰惟中然而嘉氣尚凝陰陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事至開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相迫促亦內相刻流至眾庶是故鄉黨闕於嘉賓之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則陰陽否鬲和氣不興未必不由此也詩云民之失德乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知本朝之要務臣愚不知治道唯明主察焉上嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明繇是知名出為臨淮太守政教大行會陳留郡有大賊廢亂上徙宣為陳留太守盜賊禁止吏民敬其威信入守左馮翊滿歲稱職為真始高陵令楊湛櫟陽令謝游皆貪猾不遜持郡短長前二千石數案不能竟及宣視事詣府謁宣設酒飯與相對接待甚備已而陰求其罪臧具得所受取宣察湛有改節敬宣之效乃手自牒書條其姦臧封與湛曰吏民條言君如牒或議以為疑於主守盜馮翊敬重令又念十金法重不忍相暴章故密以手書相曉欲君自圖進退可復伸眉於後即無其事復封還記得為君分明之湛自知罪臧皆應記而宣辭語溫潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令游自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上賊取錢財數十萬給為非法賣買聽任富吏賈數不可知證驗以明白欲遣吏考案恐負舉者恥辱儒士故使掾平鐫令孔子曰陳力就列不能者止令詳思之方調守游得檄亦解印綬去又頻陽縣北當上郡西河為數郡湊多盜賊其令平陵薛恭本縣孝者功次稍遷未嘗治民職不辦而粟邑縣小辟在山中民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛故或以德顯或以功舉君子之道焉可憮也屬縣各有賢君馮翊垂拱蒙成願勉所職卒功業宣得郡中吏民罪名輒召告其縣長吏使自行罰曉曰府所以不自發舉者不欲代縣治奪賢令長名也長吏莫不喜懼免冠謝宣歸恩受戒者宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利池陽令舉廉吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案驗獄掾乃其妻獨受繫者錢萬六千受之再宿獄掾實不知掾慚恐自殺宣聞之移書池陽曰縣所舉廉吏獄掾王立家私受賕而立不知殺身以自明立誠廉士甚可閔惜其以府決曹掾書立之柩以顯其魂府掾史素與立相知者皆予送葬及日至休吏賊曹掾張扶獨不肯休坐曹治事宣出教曰蓋禮貴和人道尚通日至吏以令休所繇來久曹雖有公職事家亦望私恩意掾宜從眾歸對妻子設酒肴請鄰里壹笑相樂斯亦可矣扶慚愧官屬善之宣為人好威儀進止雍容甚可觀也性密靜有思思省吏職求其便安下至財用筆研皆為設方略利用而省費吏民稱之郡中清靜遷為少府共張職辦月餘御史大夫于永卒谷永上疏曰帝王之德莫大於知人知人則百僚任職天工不曠故皋陶曰知人則哲能官人御史大夫內承本朝之風化外佐丞相統理天下任重職大非庸材所能堪今當選於群卿以充其缺得其人則萬姓欣喜百僚說服不得其人則大職墮斁王功不興虞帝之明在茲壹舉可不致詳竊見少府宣材茂行絜達於從政前為御史中丞執憲轂下不吐剛茹柔舉錯時當出守臨淮陳留二郡稱治為左馮翊崇教養善威德並行眾職修理姦軌絕息辭訟者歷年不至丞相府赦後餘盜賊什分三輔之一功效卓爾自左內史初置以來未嘗有也孔子曰如有所譽其有所試宣考績功課簡在兩府不敢過稱以奸欺誣之罪臣聞賢材莫大於治人宣已有效其法律任廷尉有餘經術文雅足以謀王體斷國論身兼數器有退食自公之節宣無私黨游說之助臣恐陛下忽於羔羊之詩舍公實之臣任華虛之譽是用越職陳宣行能唯陛下留神考察上然之遂以宣為御史大夫數月代張禹為丞相封高陽侯食邑千戶宣除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名宣為相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉久之廣漢郡盜賊群起丞相御史遣掾史逐捕不能克上乃拜河東都尉趙護為廣漢太守以軍法從事數月斬其渠帥鄭躬降者數千人乃平會邛成太后崩喪事倉卒吏賦斂以趨辦其後上聞之以過丞相御史遂冊免宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉朕既不明變異數見歲比不登倉廩空虛百姓飢饉流離道路疾疫死者以萬數人至相食盜賊並興群職曠廢是朕之不德而股肱不良也乃者廣漢群盜橫恣殘賊吏民朕惻然傷之數以問君君對輒不如其實西州鬲絕幾不為郡三輔賦斂無度酷吏並緣為姦侵擾百姓詔君案驗復無欲得事實之意九卿以下咸承風指同時陷于謾欺之辜咎繇君焉有司法君領職解嫚開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相高陽侯印綬罷歸初宣為丞相而翟方進為司直宣知方進名儒有宰相器深結厚焉後方進竟代為丞相思宣舊恩宣免後二歲薦宣明習文法練國制度前所坐過薄可復進用上徵宣復爵高陽侯加寵特進位次師安昌侯給事中視尚書事宣復尊重任政數年後坐善定陵侯淳于長罷就第初宣有兩弟明修明至南陽太守修歷郡守京兆尹少府善交接得州里之稱後母常從修居官宣為丞相時修為臨菑令宣迎後母修不遣後母病死修去官持服宣謂修三年服少能行之者兄弟相駮不可修遂竟服繇是兄弟不和久之哀帝初即位博士申咸給事中亦東海人也毀宣不供養行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子況為右曹侍郎數聞其語賕客楊明欲令創咸面目使不居位會司隸缺況恐咸為之遂令明遮斫咸宮門外斷鼻脣身八創事下有司御史中丞眾等奏況朝臣父故宰相再封列侯不相敕丞化而骨肉相疑疑咸受修言以謗毀宣咸所言皆宣行迹眾人所共見公家所宜聞況知咸給事中恐為司隸舉奏宣而公令明等迫切宮闕要遮創戮近臣於大道人眾中欲以鬲塞聰明杜絕論議之端桀黠無所畏忌萬眾讙譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮下公門式路馬君畜產且猶敬之春秋之義意惡功遂不免於誅上浸之源不可長也況首為惡明手傷功意俱惡皆大不敬明當以重論及況皆棄市廷尉直以為律曰鬭以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪傳曰遇人不以義而見疻者與痏人之罪鈞惡不直也咸厚善修而數稱宣惡流聞不誼不可謂直況以故傷咸計謀已定後聞置司隸因前謀而趣明非以恐咸為司隸故造謀也本爭私變雖於掖門外傷咸道中與凡民爭鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則至於刑罰不中刑罰不中而民無所錯手足今以況為首惡明手傷為大不敬公私無差春秋之義原心定罪原況以父見謗發忿怒無它大惡加詆欺輯小過成大辟陷死刑違明詔恐非法意不可施行聖王不以怒增刑明當以賊傷人不直況與謀者皆爵減完為城旦上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉況竟減罪一等徙敦煌宣坐免為庶人歸故郡卒於家宣子惠亦至二千石始惠為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修宣心知惠不能留彭城數日案行舍中處置什器觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也眾人傳稱以宣言為然初宣後封為侯時妻死而敬武長公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣葬延陵奏可況私從敦煌歸長安會赦因留與主私亂哀帝外家丁傅貴主附事之而疏王氏元始中莽自尊為安漢公主又出言非莽而況與呂寬相善及寬事覺時莽并治況發揚其罪使使者以太皇太后詔賜主藥主怒曰劉氏孤弱王氏擅朝排擠宗室且嫂何與取妹披抉其閨門而殺之使者迫守主遂飲藥死況梟首於市白太后云主暴病薨太后欲臨其喪莽固爭乃止朱博字子元杜陵人也家貧少時給事縣為亭長好客少年捕搏敢行稍遷為功曹伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察廉補安陵丞後去官入京兆歷曹史列掾出為督郵書掾所部職辦郡中稱之而陳咸為御史中丞坐漏泄省中語下獄博去吏間步至廷尉中候伺咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸驗治數百卒免咸死罪咸得論出而博以此顯名為郡功曹久之成帝即位大將軍王鳳秉政奏請陳咸為長史咸薦蕭育朱博除莫府屬鳳甚奇之舉博櫟陽令徙雲陽平陵二縣以高弟入為長安令京師治理遷冀州刺史博本武吏不更文法及為刺史行部吏民數百人遮道自言官寺盡滿從事白請且留此縣錄見諸自言者事畢乃發欲以觀試博博心知之告外趣駕既白駕辦博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石墨綬長吏者使者行部還詣治所其民為吏所冤及言盜賊辭訟事各使屬其部從事博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變乃至於此後博徐問果老從事教民聚會博殺此吏州郡畏博威嚴徙為并州刺史護漕都尉遷琅邪太守齊郡舒緩養名博新視事右曹掾史皆移病臥博問其故對言惶恐故事二千石新到輒遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此為俗邪乃召見諸曹史書佐及縣大吏選視其可用者出教置之皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教主簿贛老生不習吏禮主簿且教拜起閑習乃止又敕功曹官屬多襃衣大袑不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也且持此道歸堯舜君出為陳說之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜縣有劇賊及它非常博輒移書以詭責之其盡力有效必加厚賞懷詐不稱誅罰輒行以是豪強慹服姑幕縣有群輩八人報仇廷中皆不得長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博乃見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪閤下書佐入博口占檄文曰府告姑幕令丞言賊發不得有書檄到令丞就職游徼王卿力有餘如律令王卿得敕惶怖親屬失色晝夜馳騖十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閱詣府部掾以下亦可用漸盡其餘矣其操持下皆此類也以高弟入守左馮翊滿歲為真其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺然亦縱舍時有大貸下吏以此為盡力長陵大姓尚方禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢博辟左右問禁是何等創也禁自知情得叩頭服狀博笑曰丈夫固時有是馮翊欲洒卿恥抆拭用禁能自效不禁且喜且懼對曰必死博因敕禁毋得泄語有便宜輒記言因親信之以為耳目禁晨夜發起部中盜賊及它伏姦有功效博擢禁連守縣令久之召見功曹閉閤數責以禁等事與筆札使自記積受取一錢以上無得有所匿欺謾半言斷頭矣功曹惶怖具自疏姦臧大小不敢隱博知其對以實乃令就席受敕自改而已投刀使削所記遣出就職功曹後常戰粟不敢蹉跌博遂成就之遷為大司農歲餘坐小法左遷犍為太守先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中清徙為山陽太守病免官復徵為光祿大夫遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有眾賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久三尺律令人事出其中掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之正監以為博苟強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服博之疏略材過人也每遷徙易官所到輒出奇譎如此以明示下為不可欺者久之遷後將軍與紅陽侯立相善立有罪就國有司奏立黨友博坐免後歲餘哀帝即位以博名臣召見起家復為光祿大夫遷為京兆尹數月超為大司空初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉始置大司馬以冠將軍之號非有印綬官屬也及成帝時何武為九卿建言古者民樸事約國之輔佐必得賢聖然猶則天三光備三公官各有分職今末俗之弊政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也宜建三公官定卿大夫之任分職授政以考功效其後上以問師安昌侯張禹禹以為然時曲陽侯王根為大司馬票騎將軍而何武為御史大夫於是上賜曲陽侯根大司馬印綬置官屬罷票騎將軍官以御史大夫何武為大司空封列侯皆增奉如丞相以備三公官焉議者多以為古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水皆竭又其府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二歲餘朱博為大司空奏言帝王之道不必相襲各繇時務高皇帝以聖德受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官上下相監臨歷載二百年天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相高第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖德重國相也今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率哀帝從之乃更拜博為御史大夫會大司馬喜免以陽安侯丁明為大司馬衛將軍置官屬大司馬冠號如故事後四歲哀帝遂改丞相為大司徒復置大司空大司馬焉初何武為大司空又與丞相方進共奏言古選諸侯賢者以為州伯書曰咨十有二牧所以廣聰明燭幽隱也今部刺史居牧伯之位秉一州之統選第大吏所薦位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相準失位次之序臣請罷刺史更置州牧以應古制奏可及博奏復御史大夫官又奏言漢家至德溥大宇內萬里立置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九歲舉為守相其有異材功效著者輒登擢秩卑而賞厚咸勸功樂進前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿缺以高弟補其中材則苟自守而已恐功效陵夷姦軌不禁臣請罷州牧置刺史如故奏可博為人廉儉不好酒色游宴自微賤至富貴食不重味案上不過三桮夜寑早起妻希見其面有一女無男然好樂士大夫為郡守九卿賓客滿門欲仕宦者薦舉之欲報仇怨者解劍以帶之其趨事待士如是博以此自立然終用敗初哀帝祖母定陶太后欲求稱尊號太后從弟高武侯傅喜為大司馬與丞相孔光大司空師丹共持正議孔鄉侯傅晏亦太后從弟讇諛欲順指會博新徵用為京兆尹與交結謀成尊號以廣孝道繇是師丹先免博代為大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光為庶人以博代光為丞相封陽鄉侯食邑二千戶博上書讓曰故事封丞相不滿千戶而獨臣過制誠慚懼願還千戶上許焉傅太后怨傅喜不已使孔鄉侯晏風丞相令奏免喜侯博受詔與御史大夫趙玄議玄言事已前決得無不宜博曰已許孔鄉侯有指匹夫相要尚相得死何況至尊博唯有死耳玄即許可博惡獨斥奏喜以故大司空氾鄉侯何武前亦坐過免就國事與喜相似即并奏喜武前在位皆無益於治雖已退免爵土之封非所當得也請皆免為庶人上知傅太后素常怨喜疑博玄承指即召玄詣尚書問狀玄辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博宰相玄上卿晏以外親封位特進股肱大臣上所信任不思竭誠奉公務廣恩化為百寮先皆知喜武前已蒙恩詔決事更三赦博執左道虧損上恩以結信貴戚背君鄉臣傾亂政治姦人之雄附下罔上為臣不忠不道玄知博所言非法枉義附從大不敬晏與博議免喜失禮不敬臣請詔謁者召博玄晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人以為如宣等言可許諫大夫龔勝等十四人以為春秋之義姦以事君常刑不舍魯大夫叔孫僑如欲顓公室譖其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之今晏放命圮族干亂朝政要大臣以罔上本造計謀職為亂階宜與博玄同罪罪皆不道上減玄死罪三等削晏戶四分之一假謁者節召丞相詣廷尉詔獄博自殺國除初博以御史為丞相封陽鄉侯玄以少府為御史大夫並拜於前殿延登受策有音如鍾聲語在五行志贊曰薛宣朱博皆起佐史歷位以登宰相宣所在而治為世吏師及居大位以苛察失名器誠有極也博馳騁進取不思道德已亡可言又見孝成之世委任大臣假借用權世主已更好惡異前復附丁傅稱順孔鄉事發見詰遂陷誣罔辭窮情得仰藥飲鴆孔子曰久矣哉由之行詐也博亦然哉
