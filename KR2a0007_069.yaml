body:
  text: 眭兩夏侯京翼李傳第四十五眭弘字孟魯國蕃人也少時好俠鬭雞走馬長乃變節從嬴公受春秋以明經為議郎至符節令孝昭元鳳三年正月泰山萊蕪山南胸胸有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立後有白烏數千下集其旁是時昌邑有枯社木臥復生又上林苑中大柳樹斷枯臥地亦自立生有蟲食樹葉成文字曰公孫病已立孟推春秋之意以為石柳皆陰類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起非人力所為此當有從匹夫為天子者枯社木復生故廢之家公孫氏當復興者也孟意亦不知其所在即説曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人袒以帝位而退自封百里如殷周二王後以承順天命孟使友人內官長賜上此書時昭帝幼大將軍霍光秉政惡之下其書廷尉奏賜孟妄設祅言惑衆大逆不道皆伏誅後五年孝宣帝興於民間即位徵孟子為郎夏侯始昌魯人也通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之始昌明於陰陽先言柏梁臺災日至期日果災時昌邑王以少子愛上為選師始昌為太傅年老以壽終族子勝亦以儒顯名夏侯勝字長公初魯共王分魯西寧鄉以封子節侯別屬大河大河後更名東平故勝為東平人勝少孤好學從始昌受尚書及洪範五行傳説災異後事蕑卿又從歐陽氏問為學精孰所問非一師也善説禮服徵為博士光祿大夫會昭帝崩昌邑王嗣立數出勝當乘輿前諫曰天久陰而不雨臣下有謀上者陛下出欲何之王怒謂勝為祅言縛以屬吏吏白大將軍霍光光不舉法是時光與車騎將軍張安世謀欲廢昌邑王光讓安世以為泄語安世實不言乃召問勝勝對言在洪範傳曰皇之不極厥罰常陰時則下人有伐上者惡察察言故云臣下有謀光安世大驚以此益重經術士後十餘日光卒與安世白太后廢昌邑王尊立宣帝光以為群臣奏事東宮太后省政宜知經術白令勝用尚書授太后遷長信少府賜爵關內侯以與謀廢立定策安宗廟益千戶宣帝初即位欲褒先帝詔丞相御史曰朕以眇身蒙遺德承聖業奉宗廟夙夜惟念孝武皇帝躬仁誼厲威武北征胸奴單于遠遁南平氐羌昆明甌駱兩越東定薉貉朝鮮廓地斥境立郡縣百蠻率服款塞自至珍貢陳於宗廟協音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶褒周之後備天地之禮廣道術之路上天報況符瑞並應寶鼎出白麟獲海效巨魚神人並見山稱萬歲功德茂盛不能盡宣而廟樂未稱朕甚悼焉其與列侯二千石博士議於是群臣大議廷中皆曰宜如詔書長信少府勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財力奢泰亡度天下虛耗百姓流離物故者半蝗蟲大起赤地數千里或人民相食畜積至今未復亡德澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非苟阿意順指議已出口雖死不悔於是丞相義御史大夫廣明劾奏勝非議詔書毀先帝不道及丞相長史黃霸阿縱勝不舉劾俱下獄有司遂請尊孝武帝廟為世宗廟奏盛德文始五行之舞天下世世獻納以明盛德武帝巡狩所幸郡國凡四十九皆立廟如高祖太宗焉勝霸既久繫霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之繫再更冬講論不怠至四年夏關東四十九郡同日地動或山崩壞城郭室屋殺六千餘人上乃素服避正殿遣使者弔問吏民賜死者棺錢下詔曰蓋災異者天地之戒也朕承洪業託士民之上未能和群生曩者地震北海琅邪壞祖宗廟朕甚懼焉其與列侯中二千石博問術士有以應變補朕之闕毋有所諱因大赦勝出為諫大夫給事中霸為揚州刺史勝為人質朴守正簡易亡威儀見時謂上為君誤相字於前上亦以是親信之嘗見出道上語上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳朝廷每有大議上知勝素直謂曰先生通正言無懲前事勝復為長信少府遷太子太傅受詔撰尚書論語説賜黃金百斤年九十卒官賜冢塋葬平陵太后賜錢二百萬為勝素服五日以報師傳之恩儒者以為榮始勝每講授常謂諸生曰士病不明經術經術苟明其取青紫如俯拾地芥耳學經不明不如歸耕勝從父子建字長卿自師事勝及歐陽高左右采獲又從五經諸儒問與尚書相出入者牽引以次章句具文飾説勝非之曰建所謂章句小儒破碎大道建亦非勝為學疏略難以應敵建卒自顓門名經為議郎博士至太子少傅勝子兼為左曹太中大夫孫堯至長信少府司農鴻臚曾孫蕃郡守州牧長樂少府勝同産弟子賞為梁內史梁內史子定國為豫章太守而建子千秋亦為少府太子少傅京房字君明東郡頓丘人也治易事梁人焦延壽延壽字贛贛貧賤以好學得幸梁王王共其資用令極意學既成為郡史察舉補小黃令以候司先知姦邪盜賊不得發愛養吏民化行縣中舉最當遷三老官屬上書願留贛有詔許增秩留卒於小黃贛常曰得我道以亡身者必京生也其説長於災變分六十四卦更直日用事以風雨寒溫為候各有占驗房用之尤精好鍾律知音聲初元四年以孝廉為郎永光建昭間西羌反日蝕又久青亡光陰霧不精房數上疏先言其將然近數月遠一歲所言屢中天子説之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毀譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法上令公卿朝臣與房會議溫室皆以房言煩碎令上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭弘光祿大夫周初言不可後善之是時中書令石顯顓權顯友人五鹿充宗為書令與房同經論議相非二人用事房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以視萬世之君今陛下即位已來日月失明星辰逆行山崩泉涌地震石隕夏霜冬靁春凋秋榮隕霜不殺水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已諭房罷出後上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍塞石顯五鹿充宗皆疾房欲遠之建言宜試以房為郡守元帝於是以房為魏郡太守秩八百石居得以考功法治郡房自請願無屬刺史得除用它郡人自第吏千石已下歲竟乘傳奏事天子許焉房自知數以論議為大臣所非內與石顯五鹿充宗有隙不欲遠離左右及為太守憂懼房以建昭二年二月朔拜上封事曰辛酉以來蒙氣衰去太陽精明臣獨欣然以為陛下有所定也然少陰倍力而乘消息臣疑陛下雖行此道猶不得如意臣竊悼懼守陽平侯鳳欲見未得至己卯臣拜為太守此言上雖明下猶勝之效也臣出之後恐必為用事所蔽身死而功不成故願歲盡乘傳奏事蒙哀見許乃辛巳蒙氣復乘卦太陽侵色此上大夫覆陽而上意疑也己卯庚辰之間必有欲隔絶臣令不得乘傳奏事者房未發上令陽平侯鳳承制詔房止無乘傳奏事房意愈恐去至新豐因郵上封事曰臣以六月中言遁卦不效法曰道人始去寒涌水為災至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中今涌水已出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺高而死高威自此成故秦之亂正先趣之今臣得出守郡自詭效功恐未效而死惟陛下毋使臣塞涌水之異當正先之死為姚平所笑房至陝復上封事曰乃丙戍小雨丁亥蒙氣去然少陰并力而乘消息戊子益甚到五十分蒙氣復起此陛下欲正消息雜卦之黨并力而爭消息之氣不勝強弱安危之機不可不察己丑夜有還風盡辛卯太陽復侵色至癸巳日月相薄此邪陰同力而太陽為之疑也臣前白九年不改必有星亡之異臣願出任良試考功臣得居內星亡之異可去議者知如此者於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聽之此乃蒙氣所以不解太陽之色者也臣去朝稍遠太陽侵色益甚唯陛下毋難還臣而易逆天意邪説雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博從房受學以女妻房房與相親每朝見輒為博道其語以為上意欲用房議而群臣惡其害己故為衆所排博曰淮陽王上親弟敏達好政欲為國忠今欲令王上書求入朝得佐助房房曰得無不可博曰前楚王朝薦士何為不可房曰中書令石顯尚書令五鹿君相與合同巧佞之人也事縣官十餘年及丞相韋侯皆久亡補於民可謂亡功矣此尤不欲行考功者也淮陽王即朝見勸上行考功事善不然但言丞相中書令任事久而不治可休丞相以御史大夫鄭弘代之遷中書令置他官以鉤盾令徐立代之如此房考功事得施行矣博具從房記諸所説災異事因令房為淮陽王作求朝奏草皆持柬與淮陽王石顯微司具知之以房親近未敢言及房出守郡顯告房與張博通謀非謗政治歸惡天子詿誤諸侯王語在憲王傳初房見道幽厲事出為御史大夫鄭弘言之房博皆棄市弘坐免為庶人房本姓李推律自定為京氏死時年四十一翼奉字少君東海下邳人也治齊詩與蕭望之匡衡同師三人經術皆明衡為後進望之施之政事而奉惇學不仕好律曆陰陽之占元帝初即位諸儒薦之徵待詔宦者署數言事宴見天子敬焉時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言而上封事曰臣聞之於師治道要務在知下之邪正人誠鄉正雖愚為用若乃懷邪知益為害知下之術在於六情十二律而已北方之情好也好行貪狼申子主之東方之情怒也怒行陰賊亥卯主之貪狼必待陰賊而後動陰賊必待貪狼而後用二陰並行是以王者忌子卯也禮經避之春秋諱焉南方之情惡也惡行廉貞寅午主之西方之情喜也喜行寬大巳酉主之二陽並行是以王者吉午酉也詩曰吉日庚午上方之情樂也樂行姦邪辰未主之下方之情哀也哀行公正戌丑主之辰未屬陰戌丑屬陽萬物各以其類應今陛下明聖虛靜以待物至萬事雖衆何聞而不諭豈況乎執十二律而御六情於以知下參實亦甚優矣萬不失一自然之道也乃正月癸未日加申有暴風從西南來未主姦邪申主貪狼風以大陰下抵建前是人主左右邪臣之氣也平昌侯比三來見臣皆以正辰加邪時辰為客時為主人以律知人情王者之祕道也愚臣誠不敢以語邪人上以奉為中郎召問奉來者以善日邪時孰與邪日善時奉對曰師法用辰不用日辰為客時為主人見於明主侍者為主侍者為主人辰正時邪見者正侍者邪辰邪時正見者邪侍者正忠正之見侍者雖邪辰時俱正大邪之見侍者雖正辰時俱邪即以自知侍者之邪而時邪辰正見者反邪即以自知侍者之正而時正辰邪見者反正辰為常事時為一行辰疏而時精其效同功必參五觀之然後可知故曰察其所繇省其進退參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢觀性以曆觀情以律明主所宜獨用難與二人共也故曰顯諸仁臧諸用露之則不神獨行則自然矣唯奉能用之學者莫能行是歲關東大水郡國十一飢疫尤甚上乃下詔江海陂湖園池屬少府者以假貧民勿租稅損大官膳減樂府員省苑馬諸宮館稀御幸者勿繕治太僕少府減食穀馬水衡省食肉獸明年二月戊午地震其夏齊地人相食七月己西地復震上曰蓋聞賢聖在位陰陽和風雨時日月光星辰靜黎庶康寧考終厥命今朕共承天地託于公侯之上明不能燭德不能綏災異並臻連年不息乃二月戊午地大震于隴西郡毀落太上廟殿壁木飾壞敗獂道縣城郭官寺及民室屋厭殺人衆山崩地裂水泉涌出一年地再動天惟降災震驚朕躬治有大虧咎至於此夙夜兢兢不通大變深懷鬱悼未知其序比年不登元元困乏不勝飢寒以陷刑辟朕甚閔焉憯怛於心已詔吏虛倉廩開府臧振救貧民群司其茂思天地之戒有可蠲除減省以便萬姓者各條奏悉意陳朕過失靡有所諱因赦天下舉直言極諫之士奉奏封事曰臣聞之於師曰天地設位懸日月布星辰分陰陽定四時列五行以視聖人名之曰道聖人見道然後知王治之象故畫州土建君臣立律曆陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有陰陽詩有五際春秋有災異皆列終始推得失考天心以言王道之安危至秦乃不説傷之以法是以大道不通至於滅亡今陛下明聖深懷要道燭臨萬方布德流惠靡有闕遺罷省不急之用振救困貧賦醫藥賜棺錢恩澤甚厚又舉直言求過失盛德純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇知日蝕地震之效昭然可明猶巢居知風穴處知雨亦不足多適所習耳臣聞人氣內逆則感動天地天變見於星氣日蝕地變見於奇物震動所以然者陽用其精陰用其形猶人之有五臧六體五臧象天六體象地故臧病則氣發於面體病則欠申動於貌今年太陰建於甲戌律以庚寅初用事曆以甲午從春曆中甲庚律得參陽性中仁義情得公正貞廉百年之精歲也正以精歲本首王位日臨中時接律而地大震其後連月久陰雖有大令猶不能復陰氣盛矣古者朝廷必有同姓以明親親必有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓疏而難通故同姓一異姓五乃為平均今左右亡同姓獨以舅后之家為親異姓之臣又疏二后之黨滿朝非特處位勢尤奢僭過度呂霍上官足以卜之甚非愛人之道又非後嗣之長策也陰氣之盛不亦宜乎臣又聞未央建章甘泉宮才人各以百數皆不得天性若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王園與其後宮宜為設員出其過制者此損陰氣應天救邪之道也今異至不應災將隨之其法大水極陰生陽反為大旱甚則有火災春秋宋伯姬是矣唯陛下財察明年夏四月乙未孝武園白鶴館災奉自以為中上疏曰臣前上五際地震之效曰極陰生陽恐有火災不合明聽未見省答臣竊內不自信今白鶴館以四月乙未時加於卯月宿亢災與前地震同法臣奉乃深知道之可信也不勝拳拳願復賜間卒其終始上復延問以得失奉以為祭天地於雲陽汾陰及諸寢廟不以親疏迭毀皆煩費違古制又宮室苑囿奢泰難供以故民困國虛亡纍年之畜所繇來久不改其本難以末正乃上疏曰臣聞昔者盤庚改邑以興殷道聖人美之竊聞漢德隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宮館也未央宮又無高門武臺麒麟鳳皇白虎玉堂金華之殿獨有前殿曲臺漸臺宣室溫室承明耳孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存又下遺詔不起山墳故其時天下大和百姓洽足德流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成皋右阻黽池前鄉嵩高後介大河建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西遠羌胡之難陛下共己亡為按成周之居兼盤庚之德萬歲之後長為高宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作故願陛下遷都正本衆制皆定亡復繕治宮館不急之費歲可餘一年之畜臣聞三代之祖積德以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔有司各敬其事在位莫非其人天下甫二世耳然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂其詩則曰殷之未喪師克配上帝宜監于殷駿命百易今漢初取天下起於豐沛以兵征伐德化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未久至於陛下八世九主矣雖有成王之明然亡周召之佐今東方連年飢饉加之以疾疫百姓菜色或至相食地比震動天氣溷濁日光侵奪繇此言之執國政者豈可以不懷怵惕而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太陰以東行到後七年之明歲必有五年之餘蓄然後大行考室之禮雖周之隆盛亡以加此唯陛下留神詳察萬世之策書奏天子異其意答曰問奉今園廟有七云東徙狀何如奉對曰昔成王徙洛般庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道臣奉愚戇狂惑唯陛下裁赦其後貢禹亦言當定迭毀禮上遂從之及匡衡為丞相奏徙南北郊其議皆自奉發之奉以中郎為博士諫大夫年老以壽終子及孫皆以學在儒官李尋字子長平陵人也治尚書與張孺鄭寬中同師寬中等守師法教授尋獨好洪範災異又學天文月令陰陽事丞相翟方進方進亦善為星曆除尋為吏數為翟侯言事帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛己問尋尋見漢家有中衰厄會之象其意以為且有洪水為災乃説根曰書云天聰明蓋言紫宮極樞通位帝紀太微四門廣開大道五經六緯尊術顯士翼張舒布燭臨四海少微處士為比為輔故次帝廷女宮在後聖人承天賢賢易色取法於此天官上相上將皆顓面正朝憂責甚重要在得人得人之效成敗之機不可不勉也昔秦穆公説諓諓之言任仡仡之勇身受大辱社稷幾亡悔過自責思惟黃髮任用百里奚卒伯西域德列王道二者禍福如此可不慎哉夫士者國家之大寶功名之本也將軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此夫物盛必衰自然之理唯有賢友強輔庶幾可以保身命全子孫安國家書曰曆象日月星辰此言仰視天文俯察地理觀日月消息候星辰行伍揆山川變動參人民繇俗以制法度考禍福舉錯悖逆咎敗將至徵兆為之先見明君恐懼修正側身博問轉禍為福不可救者即蓄備以待之故社稷亡憂竊見往者赤黃四塞地氣大發動土竭民天下擾亂之徵也彗星爭明庶雄為桀大寇之引也此二者已頗效矣城中訛言大水奔走上城朝廷驚駭女孽入宮此獨未效間者重以水泉涌溢旁宮闕仍出月太白入東井犯積水缺天淵日數湛於極陽之色羽氣乘宮起風積雲又錯以山崩地動河不用其道盛冬靁電潛龍為孽繼以隕星流彗維填上見日蝕有背鄉此亦高下易居洪水之徵也不憂不改洪水乃欲蕩滌流彗乃欲掃除改之則有年亡期故屬者頗有變改小貶邪猾日月光精時雨氣應此皇天右漢亡已也何況致大改之宜急博求幽隱拔擢天士任以大職諸闒茸佞讇抱虛求進及用殘賊酷虐聞者若此之徒皆嫉善憎忠壞天文敗地理涌躍邪陰湛溺太陽為主結怨於民宜以時廢退不當得居位誠必行之凶災銷滅子孫之福不旋日而至政治感陰陽猶鐵炭之低卬見效可信者也及諸蓄水連泉務通利之修舊隄防省池澤稅以助邪陰之盛案行事考變易訛言之效未嘗不至請徵韓放掾周敞王望可與圖之根於是薦尋哀帝初即位召尋待詔黃門使侍中衛尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重極言毋有所諱尋對曰陛下聖德尊天敬地畏命重民悼懼變異不忘疏賤之臣幸使重臣臨問愚臣不足以奉明詔竊見陛下新即位開大明除忌諱博廷名士靡不並進臣尋位卑術淺過隨衆賢待詔食太官衣御府久汙玉堂之署比得召見亡以自效復特見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須臾之間宿留瞽言考之文理稽之五經揆之聖意以參天心夫變異之來各應象而至臣謹條陳所聞易曰縣象著明莫大乎日月夫日者衆陽之長輝光所燭萬里同晷人君之表也故日將旦清風發群陰伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中輝光君德盛明大臣奉公日將入專以一君就房有常節君不修道則日失其度暗昧亡光各有云為其於東方作日初出時陰雲邪氣起者法為牽於女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營間者日尤不精光明侵奪失色邪氣珥霓數作本起於晨相連至昏其日出後至日中間差愈小臣不知內事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不慎也唯陛下執乾剛之德強志守度毋聽女謁邪臣之態諸保阿乳母甘言悲辭之託斷而勿聽勉強大誼絶小不忍良有不得已可賜以財貨不可私以官位誠皇天之禁也日失其光則星辰放流陽不能制陰陰桀得作間者太白正晝經天宜隆德克躬以執不軌臣聞月者衆陰之長銷息見伏百里為品千里立表萬里連紀妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君德春夏南秋冬北間者月數以春夏與日同道過軒轅上后受氣入太微帝廷揚光輝犯上將近臣列星皆失色厭厭如滅此為母后與政亂朝陰陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣屋大柱小可為寒心唯陛下親求賢士無強所惡以崇社稷尊強本朝臣聞五星者五行之精五帝司命應王者號令為之節度歲星主歲事為統首號令所紀今失度而盛此君指意欲有所為未得其節也又填星不避歲星者后帝共政相留於奎婁當以義斷之熒惑往來亡常周歷兩宮作態低卬入天門上明堂貫尾亂宮太白發越犯庫兵寇之應也貫黃龍入帝庭當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故禍亂不成也熒惑厥弛佞巧依勢微言毀譽進類蔽善太白出端門臣有不臣者火入室金上堂不以時解其憂凶填歲相守又主內亂宜察蕭牆之內毋忽親疏之微誅放佞人防絶萌牙以蕩滌濁濊消散積惡毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出蚤政緩則出晚政絶不行則伏不見而為彗茀四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下也宜深自改治國故不可以戚戚欲速則不達經曰三載考績三考黜陟加以號令不順四時既往不咎來事之師也間者春三月治大獄時賊陰立逆恐歲小收季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土濕奧恐後有雷雹之變夫以喜怒賞罰而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動靜不失其時其道光明書曰敬授民時故古之王者尊天地重陰陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設群下請事若陛下出令有謬於時者當知爭之以順時氣臣聞五行以水為本其星玄武婺女天地所紀終始所生水為準平王道公正修明則百川理落脈通偏黨失綱則踊溢為敗書云水曰潤下陰動而卑不失其道天下有道則河出圖洛出書故河洛決溢所為最大今汝穎畎澮皆川水漂踊與雨水並為民害此詩所謂燁燁震電不寧不令百川沸騰者也其咎在於皇甫卿士之屬唯陛下留意詩人之言少抑外親大臣臣聞地道柔靜陰之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歷州俱動者其異最大間者關東地數震五星作異亦未大逆宜務崇陽抑陰以救其咎固志建威閉絶私路拔進英雋退不任職以強本朝夫本強則精神折衝本弱則招殃致凶為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫弘等不足言也弘漢之名相於今亡比而尚見輕何況亡弘之屬乎故曰朝廷亡人則為賊亂所輕其道自然也天下未聞陛下奇策固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷馬不伏歷不可以趨道士不素養不可以重國詩曰濟濟多士文王以寧孔子曰十室之邑必有忠信非虛言也陛下秉四海之衆曾亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士中人皆可使為君子詔書進賢良赦小過無求備以博聚英俊如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌邪偽並興外戚顓命君臣隔塞至絶繼嗣女宮作亂此行事之敗誠可畏而悲也本在積任母后之家非一日之漸往者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有德行道術通明之士充備天官然後可以輔聖德保帝位承大宗下至郎吏從官行能亡以異又不通一藝及博士無文雅者宜皆使就南畝以視天下明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆覆愚臣之言是時哀帝初立成帝外家王氏未甚抑黜而帝外家丁傅新貴祖母傅太后尤驕恣欲稱尊號丞相孔光大司空師丹執政諫爭久之上不得已遂免光丹而尊傅太后語在丹傅上雖不從尋言然采其語每有非常輒問尋尋對屢中遷黃門侍郎以尋言且有水災故拜尋為騎都尉使護河隄初成帝時齊人甘忠可詐造天官曆包元太平經十二卷以言漢家逢天地之大終當更受命於天天帝使真人赤精子下教我此道忠可以教重平夏賀良容丘丁廣世東郡郭昌等中壘校尉劉向奏忠可假鬼神罔上惑衆下獄治服未斷病死賀良等坐挾學忠可書以不敬論後賀良等復私以相教哀帝初立司隸校尉解光亦以明經通災異得幸白賀良等所挾忠可書事下奉車都尉劉歆歆以為不合五經不可施行而李尋亦好之光曰前歆父向奏忠可下獄歆安肯通此道時郭昌為長安令勸尋宜助賀良等尋遂白賀良等皆待詔黃門數召見陳説漢曆中衰當更受命成帝不應天命故絶嗣今陛下久疾變異屢數天所以譴告人也宜急改元易號乃得延年益壽皇子生災異息矣得道不得行咎殃且亡不有洪水將出災火且起滌蕩民人哀帝久寢疾幾其有益遂從賀良等議於是詔制丞相御史蓋聞尚書五曰考終命言大運一終更紀天元人元考文正理推曆定紀數如甲子也朕以眇身入繼太祖承皇天總百僚子元元未有應天心之效即位出入三年災變數降日月失度星辰錯謬高下貿易大異連仍盜賊並起朕甚懼焉戰戰兢兢唯恐陵夷惟漢興至今二百載曆紀開元皇天降非材之右漢國再獲受命之符朕之不德曷敢不通夫受天之元命必與天下自新其大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度布告天下使明知之後月餘上疾自若賀良等復欲妄變政事大臣爭以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李尋輔政上以其言亡驗遂下賀良等吏而下詔曰朕獲保宗廟為政不德變異屢仍恐懼戰栗未知所繇待詔賀等建言改元易號增益漏刻可以永安國家朕信道不篤過聽其言幾為百姓獲福卒無嘉應久旱為災以問賀良等對當復改制度皆背經誼違聖制不合時宜夫過而不改是為過矣六月甲子詔書非赦令也皆蠲除之賀良等反道惑衆姦態當窮竟皆下獄光祿勳平當光祿大夫毛莫如與御史中丞廷尉雜治當賀良等執左道亂朝政傾覆國家誣罔主上不道賀良等皆伏誅尋及解光減死一等徒敦煌郡贊曰幽贊神明通合天人之道者莫著乎易春秋然子贛猶云夫子之文章可得而聞夫子之言性與天道不可得而聞已矣漢興推陰陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納説時君著明者也察其所言仿佛一端假經設誼依託象類或不免乎億則屢中仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒也京房區區不量淺深危言刺譏構怨強臣罪辜不旋踵亦不密以失身悲夫
