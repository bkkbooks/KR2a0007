body:
  text: 張湯傳第二十九張湯杜陵人也父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治傳爰書訊鞫論報并取鼠與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄父死後湯為長安吏周陽侯為諸卿時嘗繫長安湯傾身事之及出為侯大與湯交遍見貴人湯給事內史為寧成掾以湯為無害言大府調茂陵尉治方中武安侯為丞相徵湯為史薦補侍御史治陳皇后巫蠱獄深竟黨與上以為能遷太中大夫與趙禹共定諸律令務在深文拘守職之吏已而禹至少府湯為廷尉兩人交歡兄事禹禹志在奉公孤立而湯舞知以御人始為小吏乾沒與長安富賈田甲魚翁叔之屬交私及列九卿收接天下名士大夫己心內雖不合然陽浮道與之是時上方鄉文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑必奏先為上分別其原上所是受而著讞法廷尉挈令揚主之明奏事即譴湯摧謝鄉上意所便必引正監掾史賢者曰固為臣議如上責臣臣弗用愚抵此罪常釋間即奏事上善之曰臣非知為此奏乃監掾史某所為其欲薦吏揚人之善解人之過如此所治即上意所欲罪豫監吏深刻者即上意所欲釋豫監吏輕平者所治即豪必舞文巧詆即下戶羸弱時口言雖文致法上裁察於是往往釋湯所言湯至於大吏內行修交通賓客飲食於故人子弟為吏及貧昆弟調護之尤厚其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士丞相弘數稱其美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之其治獄所巧排大臣自以為功多此類繇是益尊任遷御史大夫會渾邪等降漢大興兵伐胸奴山東水旱貧民流徙皆卬給縣官縣官空虛湯承上指請造白金及五銖錢籠天下鹽鐵排富商大賈出告緡令鉏豪彊并兼之家舞文巧詆以輔法湯每朝奏事語國家用日旰天子忘食丞相取充位天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以罪自公卿以下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此胸奴求和親群臣議前博士狄山曰和親便上問其便山曰兵凶器未易數動高帝欲伐胸奴大困平城乃遂結和親孝惠高后時天下安樂及文帝欲事胸奴北邊蕭然苦兵孝景時吳楚七國反景帝往來東宮間天下寒心數月吳楚已破竟景帝不言兵天下富實今自陛下興兵擊胸奴中國以空虛邊大困貧由是觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯別疏骨肉使藩臣不自安臣固知湯之詐忠於是上作色曰吾使生居一郡能無使虜入盜乎山曰不能曰居一縣曰不能復曰居一鄣間山自度辨窮且下吏曰能乃遣山乘鄣至月餘胸奴斬山頭而去是後群臣震讋湯客田甲雖賈人有賢操始湯為小吏與錢通及為大吏而甲所以責湯行義有烈士之風湯為御史大夫七歲敗河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事有可以傷湯者不能為地湯有所愛史魯謁居知湯弗平使人上飛變告文姦事事下湯湯治論殺文而湯心知謁居為之上問變事從迹安起湯陽驚曰此殆文故人怨之謁居病臥閭里主人湯自往視病為謁居摩足趙國以冶鑄為業王數訟鐵官事湯常排趙王趙王求湯陰事謁居嘗案趙王趙王怨之并上書告湯大臣也史謁居有病湯至為摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官湯亦治它囚導官見謁居弟欲陰為之而陽不省謁居弟不知而怨湯使人上書告湯與謁居謀共變李文事下減宣宣嘗與湯有隙及得此事窮竟其事未奏也會人有盜發孝文園瘞錢丞相青翟朝與湯約俱謝至前湯念獨丞相以四時行園當謝湯無與也不謝丞相謝上使御史案其事湯欲致其文丞相見知丞相患之三長史皆害湯欲陷之始長史朱買臣素怨湯語在其傳王朝齊人以術至右內史邊通學短長剛暴人也官至濟南相故皆居湯右已而失官守長史詘體於湯湯數行丞相事知此三長史素貴常陵折之故三長史合謀曰始湯約與君謝已而賣君今欲劾君以宗廟事此欲代君耳吾知湯陰事使吏捕案湯左田信等曰湯且欲為請奏信輒先知之居物致富與湯分之及它姦事事辭頗聞上問湯曰吾所為賈人輒知益居其物是類有以吾謀告之者湯不謝又陽驚曰固宜有減宣亦奏謁居事上以湯懷詐面欺使使八輩簿責湯湯具自道無此不服於是上使趙禹責湯禹至讓湯曰君何不知分也君所治夷滅者幾何人矣今人言君皆有狀天子重致君獄欲令君自為計何多以對為湯乃為書謝曰湯無尺寸之功起刀筆吏陛下幸致位三公無以塞責然謀陷湯者三長史也遂自殺湯死家産直不過五百金皆所得奉賜無它贏昆弟諸子欲厚葬湯湯母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺而無椁上聞之曰非此母不生此子乃盡按誅三長史丞相青翟自殺出田信上惜湯復稍進其子安世安世字子孺少以父任為郎用善書給事尚書精力於職休沐未嘗出上行幸河東嘗亡書三篋詔問莫能知唯安世識之具作其事後購求得書以相校無所遺失上奇其材擢為尚書令遷光祿大夫昭帝即位大將軍霍光秉政以安世篤行光親重之會左將軍上官桀父子及御史大夫桑弘羊皆與燕王蓋主謀反誅光以朝無舊臣白用安世為右將軍光祿勳以自副焉久之天子下詔曰右將軍光祿勳安世輔政宿衛肅敬不怠十有三年咸以康寧夫親親任賢唐虞之道也其封安世為富平侯明年昭帝崩未葬大將軍光白太后徙安世為車騎將軍與共徵立昌邑王王行淫亂光復與安世謀廢王尊立宣帝帝初即位褒賞大臣下詔曰夫褒有德賞有功古今之通義也車騎將軍光祿勳富平侯安世宿衛忠正宣德明恩勤勞國家守職秉義以安宗廟其益封萬六百戶功次大將軍光安世子千秋延壽彭祖皆中郎將侍中大將軍光薨後數月御史大夫魏相上封事曰聖王褒有德以懷萬方顯有功以勸百寮是以朝廷尊榮天下鄉風國家承祖宗之業制諸侯之重新失大將軍宜宣章盛德以示天下顯明功臣以填藩國毋空大位以塞爭權所以安社稷絶未萌也車騎將軍安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大將軍定策天下受其福國家重臣也宜尊其位以為大將軍毋令領光祿勳事使專精神憂念天下思惟得失安世子延壽重厚可以為光祿勳領宿衛臣上亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命上笑曰君言泰謙君而不可尚誰可者安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事數月罷車騎將軍屯兵更為衛將軍兩宮衛尉城門北軍兵屬焉時霍光子禹為右將軍上亦以禹為大司馬罷其右將軍屯兵以虛尊加之而實奪其衆後歲餘禹謀反夷宗族安世素小心畏忌已內憂矣其女孫敬為霍氏外屬婦當相坐安世瘦懼形於顏色上怪而憐之以問左右乃赦敬以慰其意安世𥧲恐職典樞機以謹慎周密自著外內無間每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絶勿復為通有郎功高不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎絶不許已而郎果遷莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹遠權勢如此為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄自言安世曰奴以恚怒誣汙衣冠告署適奴其隱人過失皆此類也安世自見父子尊顯懷不自安為子延壽求出補吏上以為北地太守歲餘上閔安世年老復徵延壽為左曹太僕初安世兄賀幸於衛太子太子敗賓客皆誅安世為賀上書得下蠶室後為掖庭令而宣帝以皇曾孫收養掖庭賀內傷太子無辜而曾孫孤幼所以視養拊循恩甚密焉及曾孫壯大賀教書令受詩為取許妃以家財聘之曾孫數有徵怪語在宣紀賀聞知為安世道之稱其材美安世輒絶止以為少主在上不宜稱述曾孫及宣帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冢為恩德侯置守冢二百家賀有一子蚤死無子子安世小男彭祖彭祖又小與上同席研書指欲封之先賜爵關內侯故安世深辭賀封又求損守冢戶數稍減至三十戶上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里居冢西鬭雞翁舍南上少時所嘗游處也明年復下詔曰朕微眇時故掖庭令張賀輔道朕躬修文學經術恩惠卓異厥功茂焉詩云無言不讎無德不報其封賀弟子侍中關內侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七歲拜為散騎中郎將賜爵關內侯食邑三百戶安世以父子封侯在位大盛乃辭祿詔都內別臧張氏無名錢以百萬數安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治産業纍積纖微是以能殖其貨富於大將軍光天子甚尊憚大將軍然內親安世心密於光焉元康四年春安世病上疏歸侯乞骸骨天子報曰將軍年老被病朕甚閔之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉何感而上書歸衛將軍富平侯印薄朕忘故非所望也願將軍強餐食近醫藥專精神以輔天年安世復強起視事至秋薨天子贈印綬送以輕車介士諡曰敬侯賜塋杜東將作穿復土起冢祠堂子延壽嗣延壽已歷位九卿既嗣侯國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以能久堪先人大國數上書讓減戶邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戶口如故而租稅減半薨諡曰愛侯子勃嗣為散騎諫大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯湯有罪勃坐削戶二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人子臨嗣臨亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚哉且死分施宗族故舊薄葬不起墳臨尚敬武公主薨子放嗣鴻嘉中上欲遵武帝故事與近臣游宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女上為放供張賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第兩宮使者冠蓋不絶賞賜以千萬數放為侍中中郎將監平樂屯兵置莫府儀比將軍與上臥起寵愛殊絶常從為微行出游北至甘泉南至長楊五莋鬭雞走馬長安中積數年是時上諸舅皆害其寵白太后太后以上春秋富動作不節甚以過放時數有災異議者歸咎放等於是丞相宣御史大夫方進奏放驕蹇縱恣奢淫不制前侍御史修等四人奉使至放家逐名捕賊時放見在奴從者閉門設兵弩射吏距使者不肯內知男子李游君欲獻女使樂府音監景武強求不得使奴康等之其家賊傷三人又以縣官事怨樂府游徼莽而使大奴駿等四十餘人群黨盛兵弩白晝入樂府攻射官寺縛束長吏子弟斫破器物宮中皆奔走伏匿莽自髡鉗衣赭衣及守令史調等皆徒跣叩頭謝放放乃止奴從者支屬並乘權勢為暴虐至求吏妻不得殺其夫或恚一人妄殺其親屬輒亡入放第不得幸得勿治放行輕薄連犯大惡有感動陰陽之咎為臣不忠首罪名雖顯前蒙恩驕逸悖理與背畔無異臣子之惡莫大於是不宜宿衛在位臣請免放歸國以銷衆邪之萌厭海內之心上不得已左遷放為北地都尉數月復徵入侍中太后以放為言出放為天水屬國都尉永始元延間比年日蝕故久不還放璽書勞問不絶居歲餘徵放歸第視母公主疾數月主有瘳出放為河東都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之後復徵放為侍中光祿大夫秩中二千石歲餘丞相方進復奏放上不得已免放賜錢五百萬遣就國數月成帝崩放思慕哭泣而死初安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還謁大將軍光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹不能記曰皆有文書光由是賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人功臣之世唯有金氏張氏親近寵貴比於外戚放子純嗣侯恭儉自修明習漢家制度故事有敬侯遺風王莽時不失爵建武中歷位至大司空更封富平之別鄉為武始侯張湯本居杜陵安世武昭宣世輒隨陵凡三徙復還杜陵贊曰馮商稱張湯之先與留侯同祖而司馬遷不言故闕焉漢興以來侯者百數保國持寵未有若富平者也湯雖酷烈及身蒙咎其推賢揚善固宜有後安世履道滿而不溢賀之陰德亦有助云
