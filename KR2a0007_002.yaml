body:
  text: 惠帝紀第二孝惠皇帝高祖太子也母曰呂皇后帝年五歲高祖初為漢王二年立為太子十二年四月高祖崩五月丙寅太子即皇帝位尊皇后曰皇太后賜民爵一級中郎郎中滿六歲爵三級四歲二級外郎滿六歲二級中郎不滿一歲一級外郎不滿二歲賜錢萬宦官尚食比郎中謁者執楯執戟武士騶比外郎太子御驂乘賜爵五大夫舍人滿五歲二級賜給喪事者二千石錢二萬六百石以上萬五百石二百石以下至佐史五千視作斥上者將軍四十金二千石二十金六百石以上六金五百石以下至佐史二金減田租復十五稅一爵五大夫吏六百石以上及宦皇帝而知名者有罪當盜械者皆頌繫上造以上及內外公孫耳孫有罪當刑及當為城旦舂者皆耐為鬼薪白粲民年七十以上若不滿十歲有罪當刑者皆完之又曰吏所以治民也能盡其治則民賴之故重其祿所以為民也今吏六百石以上父母妻子與同居及故吏嘗佩將軍都尉印將兵及佩二千石官印者家唯給軍賦他無有所與令郡諸侯王立高廟元年冬十二月趙隱王如意薨民有罪得買爵三十級以免死罪賜民爵戶一級春正月城長安二年冬十月齊悼惠王來朝獻城陽郡以益魯元公主邑尊公主為太后春正月癸酉有兩龍見蘭陵家人井中乙亥夕而不見隴西地震夏旱郃陽侯仲薨秋七月辛未相國何薨三年春發長安六百里內男女十四萬六千人城長安三十日罷以宗室女為公主嫁胸奴單于夏五月立閩越君搖為東海王六月發諸侯王列侯徒隸二萬人城長安秋七月都廄災南越王趙他稱臣奉貢四年冬十月壬寅立皇后張氏春正月舉民孝弟力田者復其身三月甲子皇帝冠赦天下省法令妨吏民者除挾書律長樂宮鴻臺災宜陽雨血秋七月乙亥未央宮凌室災丙子織室災五年冬十月靁桃李華棗實春正月復發長安六百里內男女十四萬五千人城長安三十日罷夏大旱秋八月己丑相國參薨九月長安城成賜民爵戶一級六年冬十月辛丑齊王肥薨令民得賣爵女子年十五以上至三十不嫁五算夏六月舞陽侯噲薨起長安西市修敖倉七年冬十月發車騎材官詣滎陽太尉灌嬰將春正月辛丑朔日有蝕之夏五月丁卯日有蝕之既秋八月戊寅帝崩于未央宮九月辛丑葬安陵贊曰孝惠內修親親外禮宰相優寵齊悼趙隱恩敬篤矣聞叔孫通之諫則懼然納曹相國之對而心説可謂寬仁之主遭呂太后虧損至德悲夫
