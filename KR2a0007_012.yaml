body:
  text: 平帝紀第十二孝平皇帝元帝庶孫中山孝王子也母曰衛姬年三歲嗣立為王元壽二年六月哀帝崩太皇太后詔曰大司馬賢年少不合眾心其上印綬罷賢即日自殺新都侯王莽為大司馬領尚書事秋七月遣車騎將軍王舜大鴻臚左咸使持節迎中山王辛卯貶皇太后趙氏為孝成皇后退居北宮哀帝皇后傅氏退居桂宮孔鄉侯傅晏少府董恭等皆免官爵徙合浦九月辛酉中山王即皇帝位謁高廟大赦天下帝年九歲太皇太后臨朝大司馬莽秉政百官總己以聽於莽詔曰夫赦令者將與天下更始誠欲令百姓改行絜己全其性命也往者有司多舉奏赦前事累增罪過誅陷亡辜殆非重信慎刑洒心自新之意也及選舉者其歷職更事有名之士則以為難保廢而弗舉甚謬於赦小過舉賢材之義對諸有臧及內惡未發而薦舉者皆勿案驗令士厲精鄉進不以小疵妨大材自今以來有司無得陳赦前事置奏上有不如詔書為虧恩以不道論定著令布告天下使明知之元始元年春正月越裳氏重譯獻白雉一黑雉二詔使三公以薦宗廟群臣奏言大司馬莽功德比周公賜號安漢公及太師孔光等皆益封語在莽傳賜天下民爵一級吏在位二百石以上一切滿秩如真立故東平王雲太子開明為王故桃鄉頃侯子成都為中山王封宣帝耳孫信等三十六人皆為列侯太僕王惲等二十五人前議定陶傅太后尊號守經法不阿指從邪右將軍孫建爪牙大臣大鴻臚咸前正議不阿後奉節使迎中山王及宗正劉不惡執金吾任岑中郎將孔永尚書令桃恂沛郡太守石詡皆以前與建策東迎即位奉事周密勤勞賜爵關內侯食邑各有差賜帝徵即位前所過縣邑吏二千石以下至佐史爵各有差又令諸侯王公列侯關內侯亡子而有孫若子同產子者皆得以為嗣公列侯嗣子有罪耐以上先請宗室屬未盡而以罪絕者復其屬其為吏舉廉佐史補四百石天下吏比二千石以上年老致仕者參分故祿以一與之終其身遣諫大夫行三輔舉籍吏民以元壽二年倉卒時橫賦斂者償其直義陵民冢不妨殿中者勿發天下吏民亡得置什器儲偫二月置羲和官秩二千石外史閭師秩六百石班教化禁淫祀放鄭聲乙未義陵寑神衣在柙中丙申旦衣在外床上寑令以急變聞用太牢祠夏五月丁巳朔日有蝕之大赦天下公卿將軍中二千石舉敦厚能直言者各一人六月使少傅左將軍豐賜帝母中山孝王姬璽書拜為中山孝王后賜帝舅衛寶寶弟玄爵關內侯賜帝女弟四人號皆曰君食邑各二千戶封周公後公孫相如為襃魯侯孔子後孔均為襃成侯奉其祀追諡孔子曰襃成宣尼公罷明光宮及三輔馳道天下女徒已論歸家顧山錢月三百復貞婦鄉一人置少府海丞果丞各一人大司農部丞十三人人部一州勸農桑太皇太后省所食湯沐邑十縣屬大司農常別計其租入以贍貧民秋九月赦天下徒以中山苦陘縣為中山孝王后湯沐邑二年春黃支國獻犀牛詔曰皇帝二名通于器物今更名合於古制使太師光奉太牢告祠高廟夏四月立代孝王玄孫之子如意為廣宗王江都易王孫盱台侯宮為廣川王廣川惠王曾孫倫為廣德王封故大司馬博陵侯霍光從父昆弟曾孫陽宣平侯張敖玄孫慶忌絳侯周勃玄孫共舞陽侯樊噲玄孫之子章皆為列侯復爵賜故曲周侯酈商等後玄孫酈明友等百一十三人爵關內侯食邑各有差郡國大旱蝗青州尤甚民流亡安漢公四輔三公卿大夫吏民為百姓困乏獻其田宅者二百三十人以口賦貧民遣使者捕蝗民捕蝗詣吏以石㪷受錢天下民貲不滿二萬及被災之郡不滿十萬勿租稅民疾疫者舍空邸第為置醫藥賜死者一家六尸以上葬錢五千四尸以上三千二尸以上二千罷安定呼池苑以為安民縣起官寺市里募徙貧民縣次給食至徙所賜田宅什器假與犂牛種食又起五里於長安城中宅二百區以居貧民秋舉勇武有節明兵法郡一人詣公車九月戊申晦日有蝕之赦天下徒使謁者大司馬掾四十四人持節行邊兵遣執金吾候陳茂假以鉦鼓募汝南南陽勇敢吏士三百人諭說江湖賊成重等二百餘人皆自出送家在所收事重徙雲陽賜公田宅冬中二千石舉治獄平歲一人三年春詔有司為皇帝納采安漢公莽女語在莽傳又詔光祿大夫劉歆等雜定婚禮四輔公卿大夫博士郎吏家屬皆以禮娶親迎立軺併馬夏安漢公奏車服制度吏民養生送終嫁娶奴婢田宅器械之品立官稷及學官郡國曰學縣道邑侯國曰校校學置經師一人鄉曰庠聚曰序序庠置孝經師一人陽陵任橫等自稱將軍盜庫兵攻官寺出囚徒大司徒掾督逐皆伏辜安漢公世子宇與帝外家衛氏有謀宇下獄死誅衛氏四年春正月郊祀高祖以配天宗祀孝文以配上帝改殷紹嘉公曰宋公周承休公曰鄭公詔曰蓋夫婦正則父子親人倫定矣前詔有司復貞婦歸女徒誠欲以防邪辟全貞信及眊悼之人刑罰所不加聖王之所制也惟苛暴吏多拘繫犯法者親屬婦女老弱搆怨傷化百姓苦之其明敕百寮婦女非身犯法及男子年八十以上七歲以下家非坐不道詔所名捕它皆無得繫其當驗者即驗問定著令二月丁未立皇后王氏大赦天下遣太僕王惲等八人置副假節分行天下覽觀風俗賜九卿已下至六百石宗室有屬籍者爵自五大夫以上各有差賜天下民爵一級鰥寡孤獨高年帛夏皇后見于高廟加安漢公號曰宰衡賜公太夫人號曰功顯君封公子安臨皆為列侯安漢公奏立明堂辟廱尊孝宣廟為中宗孝元廟為高宗天子世世獻祭置西海郡徙天下犯禁者處之梁王立有罪自殺分京師置前煇光後丞烈二郡更公卿大夫八十一元士官名位次及十二州名分界郡國所屬罷置改易天下多事吏不能紀冬大風吹長安城東門屋瓦且盡五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢皆益戶賜爵及金帛增秩補吏各有差詔曰蓋聞帝王以德撫民其次親親以相及也昔堯睦九族舜惇敘之朕以皇帝幼年且統國政惟宗室子皆太祖高皇帝子孫及兄弟吳頃楚元之後漢元至今十有餘萬人雖有王侯之屬莫能相糾或陷入刑罪教訓不至之咎也傳不云乎君子篤於親則民興於仁其為宗室自太上皇以來族親各以世氏郡國置宗師以糾之致教訓焉二千石選有德義者以為宗師考察不從教令有冤失職者宗師得因郵亭書言宗伯請以聞常以歲正月賜宗師帛各十匹羲和劉歆等四人使治明堂辟廱令漢與文王靈臺周公作洛同符太僕王惲等八人使行風俗宣明德化萬國齊同皆封為列侯徵天下通知逸經古記天文曆算鍾律小學史篇方術本草及以五經論語孝經爾雅教授者在所為駕一封軺傳遣詣京師至者數千人閏月立梁孝王玄孫之耳孫音為王冬十二月丙午帝崩于未央宮大赦天下有司議曰禮臣不殤君皇帝年十有四歲宜以禮斂加元服奏可葬康陵詔曰皇帝仁惠無不顧哀每疾一發氣輒上逆害於言語故不及有遺詔其出媵妾皆歸家得嫁如孝文時故事贊曰孝平之世政自莽出襃善顯功以自尊盛觀其文辭方外百蠻亡思不服休徵嘉應頌聲並作至乎變異見於上民怨於下莽亦不能文也
