body:
  text: 荊燕吳傳第五荊王劉賈高帝從父兄也不知其初起時漢元年還定三秦賈為將軍定塞地從東擊項籍漢王敗成皋北度河得張耳韓信軍軍修武深溝高壘使賈將二萬人騎數百擊楚度白馬津入楚地燒其積聚以破其業無以給項王軍食已而楚兵擊之賈輒避不肯與戰而與彭越相保漢王追項籍至固陵使賈南度淮圍壽春還至使人間招楚大司馬周殷周殷反楚佐賈舉九江迎英布兵皆會垓下誅項籍漢王因使賈將九江兵與太尉盧綰西南擊臨江王共尉尉死以臨江為南郡賈既有功而高祖子弱昆弟少又不賢欲王同姓以填天下乃下詔曰將軍劉賈有功及擇子弟可以為王者群臣皆曰立劉賈為荊王王淮東立六年而淮南王黥布反東擊荊賈與戰弗勝走富陵為布軍所殺燕王劉澤高祖從祖昆弟也高祖三年澤為郎中十一年以將軍擊陳豨將王黃封為營陵侯高后時齊人田生遊乏資以畫姦澤澤大説之用金二百斤為田生壽田生已得金即歸齊二歲澤使人謂田生曰弗與矣田生如長安不見澤而假大宅令其子求事呂后所幸大謁者張卿居數月田生子請張卿臨親修具張卿往見田生帷帳具置如列侯張卿驚酒酣乃屏人説張卿曰臣觀諸侯邸第百餘皆高帝一切功臣今呂氏雅故本推轂高帝就天下功至大又有親戚太后之重太后春秋長諸呂弱太后欲立呂産為呂王王代太后又重發之恐大臣不聽今卿最幸大臣所敬何不風大臣以聞太后太后必喜諸呂以王萬戶侯亦卿之有太后心欲之而卿為內臣不急發恐禍及身矣張卿大然之乃風大臣語太后太后朝因問大臣大臣請立呂産為呂王太后賜張卿千金張卿以其半進田生田生弗受因説之曰呂産王也諸大臣未大服今營陵侯澤諸劉長為大將軍獨此尚觖望今卿言太后裂十餘縣王之彼得王喜於諸呂王益固矣張卿入言之又太后女弟呂須女亦為營陵侯妻故遂立營陵侯澤為琅邪王琅邪王與田生之國急行毋留出關太后果使人追之已出即還澤王琅邪二年而太后崩澤乃曰帝少諸呂用事諸劉孤弱引兵與齊王合謀西欲誅諸呂至梁聞漢灌將軍屯滎陽澤還兵備西界遂跳驅至長安代王亦從代至諸將相與琅邪王共立代王是為孝文帝文帝元年徙澤為燕王而復以琅邪歸齊澤王燕二年薨諡曰敬王子康王嘉嗣九年薨子定國嗣定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦定國有所欲誅殺臣肥如令郢人郢人等告定國定國使謁者以它法劾捕格殺郢人滅口至元朔中郢人昆弟復上書具言定國事下公卿皆議曰定國禽獸行亂人倫逆天道當誅上許之定國自殺立四十二年國除哀帝時繼絶世乃封敬王澤玄孫之孫無終公士歸生為營陵侯更始中為兵所殺吳王濞高帝兄仲之子也高帝立仲為代王胸奴攻代仲不能堅守棄國間行走雒陽自歸天子不忍致法廢為合陽侯子濞封為沛侯黥布反高祖自將往誅之濞年二十以騎將從破布軍荊王劉賈為布所殺無後上患吳會稽輕悍無壯王填之諸子少乃立濞於沛為吳王王三郡五十三城已拜受印高祖召濞相之曰若狀有反相獨悔業已拜因拊其背曰漢後五十年東南有亂豈若邪然天下同姓一家慎無反濞頓首曰不敢會孝惠高后時天下初定郡國諸侯各務自拊循其民吳有豫章郡銅山即招致天下亡命者盜鑄錢東煮海水為鹽以故無賦國用饒足孝文時吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博爭道不恭皇太子引博局提吳太子殺之於是遣其喪歸葬吳吳王慍曰天下一宗死長安即葬長安何必來葬復遣喪之長安葬吳王由是怨望稍失藩臣禮稱疾不朝京師知其以子故驗問實不病諸吳使來輒繫責治之吳王恐所謀滋甚及後使人為秋請上復責問吳使者使者曰察見淵中魚不祥今吳王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯上與更始於是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益解然其居國以銅鹽故百姓無賦卒踐更輒豫平賈歲時存問茂材賞賜閭里它郡國吏欲來捕亡人者頌共禁不與如此者三十餘年以故能使其衆朝錯為太子家令得幸皇太子數從容言吳過可削數上書説之文帝寬不忍罰以此吳王日益橫及景帝即位錯為御史大夫説上曰昔高帝初定天下昆弟少諸子弱大封同姓故孽子悼惠王王齊七十二城庶弟元王王楚四十城兄子王吳五十餘城封三庶孽分天下半今吳王前有太子之隙詐稱病不朝於古法當誅文帝不忍因賜几杖德至厚也不改過自新乃益驕恣公即山鑄錢煮海為鹽誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削之其反遲禍大三年冬楚王來朝錯因言楚王戊往年為薄太后服私姦服舍請誅之詔赦削東海郡及前二年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣漢廷臣方議削吳吳王恐削地無已因欲發謀舉事念諸侯無足與計者聞膠西王勇好兵諸侯皆畏憚之於是乃使中大夫應高口説膠西王曰吳王不肖有夙夜之憂不敢自外使使臣諭其愚心王曰何以教之高曰今者主上任用邪臣聽信讒賊變更律令侵削諸侯徵求滋多誅罰良重日以益甚語有之曰狧粳及米吳與膠西知名諸侯也一時見察不得安肆矣吳王身有內疾不能朝請二十餘年常患見疑無以自白脅肩絫足猶懼不見釋竊聞大王以爵事有過所聞諸侯削地罪不至此此恐不止削地而已王曰有之子將奈何高曰同惡相助同好相留同情相求同欲相趨同利相死今吳王自以與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰寡人何敢如是主上雖急固有死耳安得不事高曰御史大夫朝錯營或天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣彗星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王內以朝錯為誅外從大王後車方洋天下所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王猶恐其不果乃身自為使者至膠西面約之膠西群臣或聞王謀諫曰諸侯地不能為漢十二為叛逆以憂太后非計也今承一帝尚云不易假令事成兩主分爭患乃益生王不聽遂發使約齊災川膠東濟南皆許諾諸侯既新削罰震恐多怨錯及削吳會稽豫章郡書至則吳王先起兵誅漢吏二千石以下膠西膠東災川濟南楚趙亦皆反發兵西齊王後悔背約城守濟北王城壞未完其郎中令劫守王不得發兵膠西王膠東王為渠率與災川濟南共攻圍臨災趙王遂亦陰使胸奴與連兵七國之發也吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發二十餘萬人南使閩東越閩東越亦發兵從孝景前三年正月甲子初起兵於廣陵西涉淮因并楚兵發使遺諸侯書曰吳王劉濞敬問膠西王膠東王災川王濟南王趙王楚王淮南王衡山王廬江王故長沙王子幸教以漢有賊臣錯無功天下侵奪諸侯之地使吏劾繫訊治以侵辱之為故不以諸侯人君禮遇劉氏骨肉絶先帝功臣進任姦人誑亂天下欲危社稷陛下多病志逸不能省察欲舉兵誅之謹聞教敝國雖狹地方三千里人民雖少精兵可具五十萬寡人素事南越三十餘年其王諸君皆不辭分其兵以隨寡人又可得三十萬寡人雖不肖願以身從諸王南越直長沙者因王子定長沙以北西走蜀漢中告越楚王淮南三王與寡人西面齊諸王與趙王定河間河內或入臨晉關或與寡人會雒陽燕王趙王故與胡王有約燕王北定代雲中轉胡衆入蕭關走長安匡正天下以安高廟願王勉之楚元王子淮南三王或不沐洗十餘年怨入骨髓欲一有所出久矣寡人未得諸王之意未敢聽今諸王苟能存亡繼絶振弱伐暴以安劉氏社稷所願也吳國雖貧寡人節衣食用積金錢修兵革聚糧食夜以繼日三十餘年矣凡皆為此願諸王勉之能斬捕大將者賜金五千斤封萬戶列將三千斤封五千戶裨將二千斤封二千戶二千石千斤封千戶皆為列侯其以軍若城邑降者卒萬人邑萬戶如得大將人戶五千如得列將人戶三千如得裨將人戶千如得二千石其小吏皆以差次受爵金它封賜皆倍軍法其有故爵邑者更益勿因願諸王明以令士大夫不敢欺也寡人金錢在天下者往往而有非必取於吳諸王日夜用之不能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子乃遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵初吳楚反書聞兵未發竇嬰言故吳相爰盎召入見上問以吳楚之計盎對曰吳楚相遺書曰賊臣朝錯擅適諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨斬錯發使赦七國復其故地則兵可毋血刃而俱罷上從其議遂斬錯語具在盎傳以盎為泰常奉宗廟使吳王吳王弟子德侯為宗正輔親戚使至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王拜受詔吳王聞盎來亦知其欲説笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得夜亡走梁遂歸報條侯將乘六乘傳會兵滎陽至雒陽見劇孟喜曰七國反吾乘傳至此不自意全又以為諸侯已得劇孟孟今無動吾據滎陽滎陽以東無足憂者至淮陽問故父絳侯客鄧都尉曰策安出客曰吳兵鋭甚難與爭鋒楚兵輕不能久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝高壘使輕兵絶淮泗口塞吳餉道使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其策遂堅壁昌邑南輕兵絶吳餉道吳王之初發也吳臣田祿伯為大將軍田祿伯曰兵屯聚而西無它奇道難以立功臣願得五萬人別循江淮而上收淮南長沙入武關與大王會此亦一奇也吳王太子諫曰王以反為名此兵難以藉人人亦且反王奈何且擅兵而別多它利害徒自損耳吳王即不許田祿伯吳少將桓將軍説王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問吳老將老將曰此年少推鋒可耳安知大慮於是王不用桓將軍計王專并將其兵未度淮諸賓客皆得為將校尉行間候司馬獨周丘不用周丘者下邳人亡命吳酤酒無行王薄之不任周丘乃上謁説王曰臣以無能不得待罪行間臣非敢求有所將也願請王一漢節必有以報王乃豫之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入戶使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯至矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬破城陽中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至癰發背死二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃高皇帝親垂功德建立諸侯幽王悼惠王絶無後孝文皇帝哀憐加惠王幽王子遂悼惠王子卬等令奉其先王宗廟為漢藩國德配天地明並日月而吳王濞背德反義誘受天下亡命罪人亂天下幣稱疾不朝二十餘年有司數請濞罪孝文皇帝寬之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光災川王賢膠東王雄渠約從謀反為逆無道起兵以危宗廟賊殺大臣及漢使者迫劫萬民伐殺無罪燒殘民家掘其丘壟甚為虐暴而卬等又重逆無道燒宗廟鹵御物朕甚痛之朕素服避正殿將軍其勸士大夫擊反虜擊反虜者深入多殺為功斬首捕虜比三百石以上皆殺無有所置敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乘勝而前鋭甚梁孝王恐遣將軍擊之又敗梁兩軍士卒皆還走梁數使使條侯求救條侯不許又使使訴條侯於上上使告條侯救梁又守便宜不行梁使韓安國及楚死事相弟張羽為將軍乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍會下邑欲戰條侯壁不肯戰吳糧絶卒飢數挑戰遂夜奔條侯壁驚東南條侯使備西北果從西北不得入吳大敗士卒多飢死叛散於是吳王乃與其戲下壯士千人夜亡去度淮走丹徒保東越東越兵可萬餘人使人收聚亡卒漢使人以利啖東越東越即紿吳王吳王出勞軍使人鏦殺吳王盛其頭馳傳以聞吳王太子駒亡走閩越吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍楚王戊軍敗自殺三王之圍齊臨災也三月不能下漢兵至膠西膠東災川王各引兵歸國膠西王徒跣席稿飲水謝太后王太子德曰漢兵還臣觀之以罷可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壞不可用不聽漢將弓高侯頽當遺王書曰奉詔誅不義降者赦除其罪復故不降者滅之王何處須以從事王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍遠道至于窮國敢請葅醢之罪弓高侯執金鼓見之曰王苦軍事願聞王發兵狀王頓道膝行對曰今者朝錯天子用事臣變更高皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且以誅錯今聞錯已誅卬等謹已罷兵歸將軍曰王苟以錯為不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之曰王其自圖之王曰如卬等死有餘罪遂自殺太后太子皆死膠東災川濟南王皆伏誅酈將軍攻趙十月而下之趙王自殺濟北王以劫故不誅初吳王首反并將楚兵連齊趙正月起三月皆破滅贊曰荊王王也由漢初定天下未集故雖疏屬以策為王鎮江淮之間劉澤發於田生權激呂氏然卒南面稱孤者三世事發相重豈不危哉吳王擅山海之利能薄斂以使其衆逆亂之萌自其子興古者諸侯不過百里山海不以封蓋防此矣朝錯為國遠慮禍反及身毋為權首將受其咎豈謂錯哉
