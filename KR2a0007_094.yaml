body:
  text: 外戚傳第六十七上自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也用末喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及太任太姒而幽王之禽也淫襃姒故易基乾坤詩首關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用唯昏姻為兢兢夫樂調而四時和陰陽之變萬物之統也可不慎與人能弘道末如命何甚哉妃匹之愛君不能得之臣父不能得之子況卑下乎既驩合矣或不能成子姓成子姓矣而不能要其終豈非命也哉孔子罕言命蓋難言之非通幽明之變惡能識乎性命漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱皇后妾皆稱夫人又有美人良人八子七子長使少使之號焉至武帝制倢伃娙娥傛華充依各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王倢伃視上卿比列侯娙娥視中二千石比關內侯傛華視真二千石比大上造美人視二千石比少上造八子視千石比中更充依視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乘五官視三百石順常視二百石無涓共和娛靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下葬司馬門外高祖呂皇后父呂公單父人也好相人高祖微時呂公見而異之乃以女妻高祖生惠帝魯元公主高祖為漢王元年封呂公為臨泗侯二年立孝惠為太子後漢王得定陶戚姬愛幸生趙隱王如意太子為人仁弱高祖以為不類己常卻廢之而立如意如意類我戚姬常從上之關東日夜啼泣欲立其子呂后年長常留守希見益疏如意且立為趙王留長安幾代太子者數賴公卿大臣爭之及叔孫通諫用留侯之策得無易呂后為人剛毅佐高帝定天下兄二人皆為列將從征伐長兄澤為周呂侯次兄釋之為建成侯逮高祖而侯者三人高祖四年臨泗侯呂公薨高祖崩惠帝立呂后為皇太后乃令永巷囚戚夫人髡鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告女太后聞之大怒曰乃欲倚女子邪乃召趙王誅之使者三反趙相周昌不遣太后召趙相相徵至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王霸上入宮挾與起居飲食數月帝晨出射趙王不能蚤起太后伺其獨居使人持鴆飲之遲帝還趙王死太后遂斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘居數月乃召惠帝視人彘帝視而問知其戚夫人乃大哭因病歲餘不能起使人請太后曰此非人所為臣為太后子終不能復治天下以此日飲為淫樂不聽政七年而崩太后發喪哭而泣不下留侯子張辟彊為侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未陳平曰何解辟彊曰帝無壯子太后畏君等今請拜呂台呂產為將將兵居南北軍及諸呂皆官居中用事如此則太后心安君等幸脫禍矣丞相如辟彊計請之太后說其哭乃哀呂氏權由此起乃立孝惠後宮子為帝太后臨朝稱制復殺高祖子趙幽王友共王恢及燕王建子遂立周呂侯子台為呂王台弟產為梁王建城侯釋之子祿為趙王台子通為燕王又封諸呂凡六人皆為列侯追尊父呂公為呂宣王兄周呂侯為悼武王太后持天下八年病犬禍而崩語在五行志病困以趙王祿為上將軍居北軍梁王產為相國居南軍戒產祿曰高祖與大臣約非劉氏王者天下共擊之今王呂氏大臣不平我即崩恐其為變必據兵衛宮慎毋送喪為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等共誅產祿悉捕諸呂男女無少長皆斬之而迎立代王是為孝文皇帝孝惠張皇后宣平侯敖尚帝姊魯元公主有女惠帝即位呂太后欲為重親以公主女配帝為皇后欲其生子萬方終無子乃使陽為有身取後宮美人子名之殺其母立所名子為太子惠帝崩太子立為帝四年乃自知非皇后子出言曰太后安能殺吾母而名我我壯即為所為太后聞而患之恐其作亂乃幽之永巷言帝病甚左右莫得見太后下詔廢之語在高后紀遂幽死更立恒山王弘為皇帝而以呂祿女為皇后欲連根固本牢甚然而無益也呂太后崩大臣正之卒滅呂氏少帝恒山淮南濟川王皆以非孝惠子誅獨置孝惠皇后廢處北宮孝文後元年薨葬安陵不起墳高祖薄姬文帝母也父吳人秦時與故魏王宗女魏媼通生薄姬而薄姬父死山陰因葬焉及諸侯畔秦魏豹立為王而魏媼內其女於魏宮許負相薄姬當生天子是時項羽方與漢王相距滎陽天下未有所定豹初與漢擊楚及聞許負言心喜因背漢而中立與楚連和漢使曹參等虜魏王豹以其國為郡而薄姬輸織室豹已死漢王入織室見薄姬有詔內後宮歲餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴毋相忘已而管夫人趙子兒先幸漢王漢王四年坐河南成皋靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢龍據妾胸上曰是貴徵也吾為汝成之遂幸有身歲中生文帝年八歲立為代王自有子後希見高祖崩諸幸姬戚夫人之屬呂后怒皆幽之不得出宮而薄姬以希見故得出從子之代為代太后太后弟薄昭從如代代王立十七年高后崩大臣議立後疾外家呂氏彊暴皆稱薄氏仁善故迎立代王為皇帝尊太后為皇太后封弟昭為軹侯太后母亦前死葬櫟陽北乃追尊太后父為靈文侯會稽郡致園邑三百家長丞以下使奉守寢廟上食祠如法櫟陽亦置靈文夫人園令如靈文侯園儀太后蚤失父其奉太后外家魏氏有力乃召復魏氏賞賜各以親疏受之薄氏侯者一人太后後文帝二歲孝景前二年崩葬南陵用呂后不合葬長陵故特自起陵近文帝孝文竇皇后景帝母也呂太后時以良家子選入宮太后出宮人以賜諸王各五人竇姬與在行中家在清河願如趙近家請其主遣宦者吏必置我籍趙之伍中宦者忘之誤置籍代伍中籍奏詔可當行竇姬涕泣怨其宦者不欲往相彊乃肯行至代代王獨幸竇姬生女嫖孝惠七年生景帝代王王后生四男先代王未入立為帝而王后卒及代王為帝後王后所生四男更病死文帝立數月公卿請立太子而竇姬男最長立為太子竇姬為皇后女為館陶長公主明年封少子武為代王後徙梁是為梁孝王竇皇后親蚤卒葬觀津於是薄太后乃詔有司追封竇后父為安成侯母曰安成夫人令清河置園邑二百家長丞奉守比靈文園法竇后兄長君弟廣國字少君年四五歲時家貧為人所略賣其家不知處傳十餘家至宜陽為其主人入山作炭暮臥岸下百餘人岸崩盡厭殺臥者少君獨脫不死自卜數日當為侯從其家之長安聞皇后新立家在觀津姓竇氏廣國去時雖少識其縣名及姓又嘗與其姊采桑墮用為符信上書自陳皇后言帝召見問之具言其故果是復問其所識曰姊去我西時與我決傳舍中匄沐沐我已飯我乃去於是竇皇后持之而泣侍御左右皆悲乃厚賜之家於長安絳侯灌將軍等曰吾屬不死命乃且縣此兩人此兩人所出微不可不為擇師傳又復放呂氏大事也於是乃選長者之有節行者與居竇長君少君由此為退讓君子不敢以富貴驕人竇皇后疾失明文帝幸邯鄲慎夫人尹姬皆無子文帝崩景帝立皇后為皇太后乃封廣國為章武侯長君先死封其子彭祖為南皮侯吳楚反時太后從昆弟子竇嬰俠喜士為大將軍破吳楚封魏其侯竇氏侯者凡三人竇太后好黃帝老子言景帝及諸竇不得不讀老子尊其術太后後景帝六歲凡立五十一年元光六年崩合葬霸陵遣詔盡以東宮金錢財物賜長公主嫖至武帝時魏其侯竇嬰為丞相後誅孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢廢後四年薨葬長安城東平望亭南孝景王皇后武帝母也父王仲槐里人也母臧兒故燕王臧荼孫也為仲妻生男信與兩女而仲死臧兒更嫁為長陵田氏婦生男蚡勝臧兒長女嫁為金王孫婦生一女矣而臧兒卜筮曰兩女當貴欲倚兩女奪金氏金氏怒不肯與決乃內太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徵也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊粟姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃粟姬妒而景帝諸美人皆因長公主見得貴幸粟姬日怨怒謝長主不許長主欲與王夫人王夫人許之會薄皇后廢長公主日譖粟姬短景帝嘗屬諸姬子曰吾百歲後善視之粟姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又耳曩者所夢日符計未有所定王夫人又陰使人趣大臣立粟姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言邪遂案誅大行而廢太子為臨江王粟姬愈恚不得見以憂死卒立王夫人為皇后男為太子封皇后兄信為蓋侯初皇后始入太子家後女弟兒姁亦復入生四男兒姁蚤卒四子皆為王皇后長女為平陽公主次南宮公主次隆慮公主皇后立九年景帝崩武帝即位為皇太后尊太后母臧兒為平原君封田蚡為武安侯勝為周陽侯王氏田氏侯者凡三人蓋侯信好酒田蚡勝貪巧於文辭蚡至丞相追尊王仲為共侯槐里起園邑二百家長丞奉守及平原君薨從田氏葬長陵亦置園邑如共侯法初皇太后微時所為金王孫生女俗在民間蓋諱之也武帝始立韓嫣白之帝曰何為不蚤言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿扶將出拜帝下車立曰大姊何藏之深也載至長樂宮與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號修成君男女各一人女嫁諸侯男號修成子仲以太后故橫於京師太后凡立二十五年後景帝十五歲元朔三年崩合葬陽陵孝武陳皇后長公主嫖女也曾祖父陳嬰與項羽俱起後歸漢為堂邑侯傳子至孫午午尚長公主生女初武帝得立為太子長主有力取主女為妃及帝即位立為皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等坐為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市使有司賜皇后策曰皇后失序惑於巫祝不可以承天命其上璽綬罷退居長門宮明年堂邑侯午薨主男須嗣侯主寡居私近董偃十餘年主薨須坐淫亂兄弟爭財當死自殺國除後數年廢后乃薨葬霸陵郎官亭東孝武衛皇后字子夫生微也其家號曰衛氏出平陽侯邑子夫為平陽主謳者武帝即位數年無子平陽主求良家女十餘人飾置家帝祓霸上還過平陽主主見所偫美人帝不說既飲謳者進帝獨說子夫帝起更衣子夫侍尚衣軒中得幸還坐驩甚賜平陽主金千斤主因奏子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘入宮歲餘不復幸武帝擇宮人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵召其兄衛長君弟青侍中而子夫生三女元朔元年生男據遂立為皇后先是衛長君死乃以青為將軍擊匈奴有功封長平侯青三子在襁褓中皆為列侯及皇后姊子霍去病亦以軍功為冠軍侯至大司馬票騎將軍青為大司馬大將軍衛氏支屬侯者五人青還尚平陽主皇后立七年而男立為太子後色衰趙之王夫人中山李夫人有寵皆蚤卒後有尹倢伃鉤弋夫人更幸衛后立三十八年遭巫蠱事起江充為姦太子懼不能自明遂與皇后共誅充發兵兵敗太子亡走詔遣宗正劉長樂執金吾劉敢奉策收皇后璽綬自殺黃門蘇文姚定漢輿置公車令空舍盛以小棺瘞之城南桐柏衛氏悉滅宣帝立乃改葬衛后追諡曰思后置園邑三百家長丞周衛奉守焉孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有佳人絕世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是為昌邑哀王李夫人少而蚤卒上憐閔焉圖畫其形於甘泉宮及衛思后廢後四年武帝崩大將軍霍光緣上雅意以李夫人配食追上尊號曰孝武皇后初李夫人病篤上自臨候之夫人蒙被謝曰妾久寢病形貌毀壞不可以見帝願以王及兄弟為託上曰夫人病甚殆將不起一見我屬託王及兄弟豈不快哉夫人曰婦人貌不修飾不見君父妾不敢以燕媠見帝上曰夫人弟一見我將加賜千金而予兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉鄉歔欷而不復言於是上不說而起夫人姊妹讓之曰貴人獨不可一見上屬託兄弟邪何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰而愛弛愛弛則恩絕上所以攣攣顧念我者乃以平生容貌也今見我毀壞顏色非故必畏惡吐棄我意尚肯復追思閔錄其兄弟哉及夫人卒上以后禮葬焉其後上以夫人兄李廣利為貳師將軍封海西侯延年為協律都尉上思念李夫人不已方士齊人少翁言能致其神乃夜張燈燭設帷帳陳酒肉而令上居他帳遙望見好女如李夫人之貌還幄坐而步又不得就視上愈益相思悲感為作詩曰是邪非邪立而望之偏何姍姍其來遲令樂府諸音家絃歌之上又自為作賦以傷悼夫人其辭曰美連娟以脩嫮兮命樔絕而不長飾新宮以延貯兮泯不歸乎故鄉慘鬱鬱其蕪穢兮隱處幽而懷傷釋輿馬於山椒兮奄修夜之不陽秋氣憯以淒淚兮桂枝落而銷亡神煢煢以遙思兮精浮游而出畺託沈陰以壙久兮惜蕃華之未央念窮極之不還兮惟幼眇之相羊函荾荴以俟風兮芳雜襲以彌章的容與以猗靡兮縹飄姚虖愈莊燕淫衍而撫楹兮連流視而娥揚既激感而心逐兮包紅顏而弗明驩接狎以離別兮宵寤夢之芒芒忽遷化而不反兮魄放逸以飛揚何靈魂之紛紛兮哀裴回以躊躇勢路日以遠兮遂荒忽而辭去超兮西征屑兮不見寖淫敞𦬺寂兮無音思若流波怛兮在心亂曰佳俠函光隕朱榮兮嫉妒闟茸將安程兮方時隆盛年夭傷兮弟子增欷洿沬悵兮悲愁於邑喧不可止兮嚮不虛應亦云己兮嫶妍太息嘆稚子兮懰慄不言倚所恃兮仁者不誓豈約親兮既往不來申以信兮去彼昭昭就冥冥兮既下新宮不復故庭兮鳴呼哀哉想魂靈兮其後李延年弟季坐姦亂後宮廣利降匈奴家族滅矣孝武鉤弋趙倢伃昭帝母也家在河間武帝巡狩過河間望氣者言此有奇女天子亟使使召之既至女兩手皆拳上自披之手即時伸由是得幸號曰拳夫人先是其父坐法宮刑為中黃門死長安葬雍門拳夫人進為倢伃居鉤弋宮大有寵太始三年生昭帝號鉤弋子任身十四月乃生上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門後衛太子敗而燕王旦廣陵王胥多過失寵姬王夫人男齊懷王李夫人男昌邑哀王皆蚤薨鉤弋子年五六歲壯大多知上常言類我又感其生與眾異甚奇愛之心欲立焉以其年穉母少恐女主顓恣亂國家猶與久之鉤弋倢伃從幸甘泉有過見譴以憂死因葬雲陽後上疾病乃立鉤弋子為皇太子拜奉車都尉霍光為大司馬大將軍輔少主明日帝崩昭帝即位追尊鉤弋倢伃為皇太后發卒二萬人起雲陵邑三千戶追尊外祖趙父為順成侯詔右扶風置園邑二百家長丞奉守如法順成侯有姊君姁賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜趙氏無在位者唯趙父追封孝昭上官皇后祖父桀隴西上邽人也少時為羽林期門郎從武帝上甘泉天大風車不得行解蓋授桀桀奉蓋雖風常屬車雨下蓋輒御上奇其材力遷未央廄令上嘗體不安及愈見馬馬多瘦上大怒令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為忠由是親近為侍中稍遷至太僕武帝疾病以霍光為大將軍太僕桀為左將軍皆受遺詔輔少主以前捕斬反者莽通功封桀為安陽侯初桀子安取霍光女結婚相親光每休沐出桀常代光入決事昭帝始立年八歲帝長姊鄂邑蓋長公主居禁中共養帝蓋主私近子客河間丁外人上與大將軍聞之不絕主驩有詔外人侍長主長主內周陽氏女令配耦帝時上官安有女即霍光外孫安因光欲內之光以為尚幼不聽安素與丁外人善說外人曰聞長主內女安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召安女入為倢伃安為騎都尉月餘遂立為皇后年甫六歲安以后父封桑樂侯食邑千五百戶遷車騎將軍日以驕淫受賜殿中出對賓客言與我婿飲大樂見其服飾使人歸欲自燒物安醉則裸行內與後母及父諸良人侍御皆亂子病死仰而罵天數守大將軍光為丁外人求侯及桀欲妄官祿外人光執正皆不聽又桀妻父所幸充國為太醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十匹贖罪乃得減死論於是桀安父子深怨光而重德蓋主知燕王旦帝兄不得立亦怨望桀安即記光過失予燕王令上書告之又為丁外人求侯燕王大喜上書稱子路喪姊朞而不除孔子非之子路曰由不幸寡兄弟不忍除之故曰觀過知仁今臣與陛下獨有長公主為姊陛下幸使丁外人侍之外人宜蒙爵號書奏上以問光光執不許及告光罪過上又疑之愈親光而疏桀安桀安寢恚遂結黨與謀殺光誘徵燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧菟邪且用皇后為尊一旦人主意有所移雖欲為家人亦不可得此百世之一時也事發覺燕王蓋主皆自殺語在霍光傳桀安宗族既滅皇后以年少不與謀亦光外孫故得不廢皇后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法皇后自使私奴婢守桀安冢光欲皇后擅寵有子帝時體不安左右及醫皆阿意言宜禁內雖宮人使令皆為窮絝多其帶後宮莫有進者皇后立十歲而昭帝崩后年十四五云昌邑王賀徵即位尊皇后為皇太后光與太后共廢王賀立孝宣帝宣帝即位為太皇太后凡立四十七年年五十二建昭二年崩合葬平陵衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣家本魯國有母貞君兄恭以元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫有一男號皇曾孫時生數月猶坐太子繫獄積五歲乃遭赦治獄使者邴吉憐皇曾孫無所歸載以付史恭恭母貞君年老見孫孤甚哀之自養視焉後曾孫收養於掖庭遂登至尊位是為宣帝而貞君及恭己死恭三子皆以舊恩封長子高為樂陵侯曾為將陵侯玄為平臺侯及高子丹以功德封武陽侯侯者凡四人高至大司馬車騎將軍丹左將軍自有傳史皇孫王夫人宣帝母也名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆坐誅莫有收葬者唯宣帝得全即尊位後追尊母王夫人諡曰悼后祖母史良娣曰戾后皆改葬起園邑長丞奉守語在戾太子傳地節三年求得外祖母王媼媼男無故無故弟武皆隨使者詣闕時乘黃牛車故百姓謂之黃牛嫗初上即位數遣使者求外家久遠多似類而非是既得王媼令太中大夫任宣與丞相御史屬雜考問鄉里識知者皆曰王嫗嫗言名妄人家本涿郡蠡吾平鄉年十四嫁為同鄉王更得妻更得死嫁為廣望王乃始婦產子男無故武女翁須翁須年八九歲時寄居廣望節侯子劉仲卿宅仲卿謂乃始曰予我翁須自養長之媼為翁須作縑單衣送仲卿家仲卿教翁須歌舞往來歸取冬夏衣居四五歲翁須來言邯鄲賈長兒求歌舞者仲卿欲以我與之媼即與翁須逃走之平鄉仲卿載乃始共求媼媼惶急將翁須歸曰兒居君家非受一錢也奈何欲予它人仲卿詐曰不也後數日翁須乘長兒車馬過門呼曰我果見行當之柳宿媼與乃始之柳宿見翁須相對涕泣謂曰我欲為汝自言翁須曰母置之何家不可以居自言無益也媼與乃始還求錢用隨逐至中山盧奴見翁須與歌舞等比五人同處媼與翁須共宿明日乃始留視翁須媼還求錢欲隨至邯鄲媼歸糶買未具乃始來歸曰翁須已去我無錢用隨也因絕至今不聞其問賈長兒妻貞及從者師遂辭往二十歲太子舍人侯明從長安來求歌舞者請翁須等五人長兒使遂送至長安皆入太子家及廣望三老更始劉仲卿妻其等四十五人辭皆驗宣奏王媼悼后母明白上皆召見賜無故武爵關內侯旬月間賞賜以鉅萬計頃之制詔御史賜外祖母號為博平君以博平蠡吾兩縣戶萬一千為湯沐邑封舅無故為平昌侯武為樂昌侯食邑各六千戶初迺始以本始四年病死後三歲家乃富貴追賜諡曰思成侯詔涿郡治冢室置園邑四百家長丞奉守如法歲餘博平君薨諡曰思成夫人詔徙思成侯合葬奉明顧成廟南置園邑長丞罷涿郡思成園王氏侯者二人無故子接為大司馬車騎將軍而武子商至丞相自有傳孝宣許皇后元帝母也父廣漢昌邑人少時為昌邑王郎從武帝上甘泉誤取它郎鞍以被其馬發覺吏劾從行而盜當死有詔募下蠶室後為宦者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿一篋緘封廣漢索不得它吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫時宣帝養於掖庭號皇曾孫與廣漢同寺居時掖庭令張賀本衛太子家吏及太子敗賀坐下刑以舊恩養視皇曾孫甚厚及曾孫壯大賀欲以女孫妻之是時昭帝始冠長八尺二寸賀弟安世為右將軍與霍將軍同心輔政聞賀稱譽皇曾孫欲妻以女安世怒曰曾孫乃衛太子後也幸得以庶人衣食縣官足矣勿復言予女事於是賀止時許廣漢有女平君年十四五當為內者令歐侯氏子婦臨當入歐侯氏子死其母將行卜相言當大貴母獨喜賀聞許嗇夫有女乃置酒請之酒酣為言曾孫體近下人乃關內侯可妻也廣漢許諾明日嫗聞之怒廣漢重令為介遂與曾孫一歲生元帝數月曾孫立為帝平君為倢伃是時霍將軍有小女與皇太后有親公卿議更立皇后皆心儀霍將軍女亦未有言上乃詔求微時故劍大臣知指白立許倢伃為皇后既立霍光以后父廣漢刑人不宜君國歲餘乃封為昌成君霍光夫人顯欲貴其小女道無從明年許皇后當娠病女醫淳于衍者霍氏所愛嘗入宮侍皇后疾衍夫賞為掖庭戶衛謂衍可過辭霍夫人行為我求安池監衍如言報顯顯因生心辟左右字謂衍少夫幸報我以事我亦欲報少夫可乎衍曰夫人所言何等不可者顯曰將軍素愛小女成君欲奇貴之願以累少夫衍曰何謂邪顯曰婦人免乳大故大死一生今皇后當免身可因投毒藥去也成君即得為皇后矣如蒙力事成富貴與少夫共之衍曰藥雜治當先嘗安可顯曰在少夫為之耳將軍領天下誰敢言者緩急相護但恐少夫無意耳衍良久曰願盡力即擣附子齎入長定宮皇后免身後衍取附子并合大醫大丸以飲皇后有頃曰我頭岑岑也藥中得無有毒對曰無有遂加煩懣崩衍出過見顯相勞問亦未敢重謝衍後人有上書告諸醫侍疾無狀者皆收繫詔獄劾不道顯恐急即以狀具語光因曰既失計為之無令吏急衍光驚鄂默然不應其後奏上署衍勿論許后立三年而崩諡曰恭哀皇后葬杜南是為杜陵陵南園後五年立皇太子乃封太子外祖父昌成君廣漢為平恩侯位特進後四年復封廣漢兩弟舜為博望侯延壽為樂成侯許氏侯者凡三人廣漢薨諡曰戴侯無子絕葬南園旁置邑三百家長丞奉守如法宣帝以延壽為大司馬車騎將軍輔政元帝即位復封延壽中子嘉為平恩侯奉戴侯後亦為大司馬車騎將軍孝宣霍皇后大司馬大將軍博陸侯光女也母顯既使淳于衍陰殺許后顯因為成君衣補治入宮具勸光內之果立為皇后初許后起微賤登至尊日淺從官車服甚節儉五日一朝皇太后於長樂宮親奉案上食以婦道共養及霍后立亦修許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后轝駕侍從甚盛賞賜官屬以千萬計與許后時縣絕矣上亦寵之顓房燕立三歲而光薨後一歲上立許后男為太子昌成君者為平恩侯顯怒恚不食歐血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輒先嘗之后挾毒不得行後殺許后事頗泄顯遂與諸壻昆弟謀反發覺皆誅滅使有司賜皇后策曰皇后熒惑失道懷不德挾毒與母博陸宣成侯夫人顯謀欲危太子無人母之恩不宜奉宗廟衣服不可以承天命烏呼傷哉其退避宮上璽綬有司霍后立五年廢處昭臺宮後十二歲徙雲林館乃自殺葬昆吾亭東初霍光及兄驃騎將軍去病皆自以功伐封侯居位宣帝以光故封去病孫山山弟雲皆為列侯侯者前後四人孝宣王皇后其先高祖時有功賜爵關內侯自沛徙長陵傳爵至后父奉光奉光少時好鬭雞宣帝在民間數與奉光會相識奉光有女十餘歲每當適人所當適輒死故久不行及宣帝即位召入後宮稍進為倢伃是時館陶王母華倢伃及淮陽憲王母張倢伃楚孝王母衛倢伃皆愛幸霍皇后廢後上憐許太子蚤失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王倢伃為皇后令母養太子自為后後希見無寵封父奉光為邛成侯立十六年宣帝崩元帝即位為皇太后封太后兄舜為安平侯後二年奉光薨諡曰共侯葬長門南置園邑二百家長丞奉守如法元帝崩成帝即位為太皇太后復爵太皇太后弟駿為關內侯食邑千戶王氏列侯二人關內侯一人舜子章章從弟咸皆至左右將軍時成帝母亦姓王氏故世號太皇太后為邛成太后邛成太后凡立四十九年年七十餘永始元年崩合葬杜陵稱東園奉光孫勳坐法免元始中成帝太后下詔曰孝宣王皇后朕之姑深念奉質共脩之義恩結于心惟邛成共侯國廢祀絕朕甚閔焉其封共侯曾孫堅固為邛成侯至王莽乃絕
