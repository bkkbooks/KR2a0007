body:
  text: 傅常鄭甘陳段傳第四十傅介子北地人也以從軍為官先是龜茲樓蘭皆嘗殺漢使者語在西域傳至元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜茲國介子至樓蘭責其王教胸奴遮殺漢使大兵方至王苟不教胸奴胸奴使過至諸國何為不言王謝服言胸奴使屬過當至烏孫道過龜茲介子至龜茲復責其王王亦服罪介子從大宛還到龜茲龜茲言胸奴使從烏孫還在此介子因率其吏士共誅斬胸奴使者還奏事詔拜介子為中郎遷平樂監介子謂大將軍霍光曰樓蘭龜茲數反覆而不誅無所懲艾介子過龜茲時其王近就人易得也願往刺之以威示諸國大將軍曰龜茲道遠且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後刺之刃交胸立死其貴人左右皆散走介子告諭以王負漢罪天子遣我來誅王當更立前太子質在漢者漢兵方至毋敢動動滅國矣遂持王首還詣闕公卿將軍議者咸嘉其功上乃下詔曰樓蘭王安歸嘗為胸奴間候遮漢使者發兵殺略衛司馬安樂光祿大夫忠期門郎遂成等三輩及安息大宛使盜取節印獻物甚逆天理平樂監傅介子持節使誅斬樓蘭王安歸首縣之北闕以直報怨不煩師衆其封介子為義陽候食邑七百戶士刺王者皆補侍郎介子薨子敞有罪不得嗣國除元始中繼功臣世復封介子曾孫長為義陽侯王莽敗乃絶常惠太原人也少時家貧自奮應募隨栘中監蘇武使胸奴并見拘留十餘年昭帝時乃還漢嘉其勤勞拜為光祿大夫是時烏孫公主上書言胸奴發騎田車師車師與胸奴為一共侵烏孫唯天子救之漢養士馬議欲擊胸奴會昭帝崩宣帝初即位本始二年遣惠使烏孫公主及昆彌皆遣使因惠言胸奴連發大兵擊烏孫取車延惡師地收其人民去使使脅求公主欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊胸奴唯天子出兵以救公主昆彌於是漢大發十五萬騎五將軍分道出語在胸奴傳以惠為校尉持節護烏孫兵昆彌自將翎侯以下五萬餘騎從西方入至右谷蠡庭獲單于父行及嫂居次名王騎將以下三萬九千人得馬牛驢騾橐他五萬餘匹羊六十餘萬頭烏孫皆自取鹵獲惠從吏卒十餘人隨昆彌還未至烏孫烏孫人盜惠印綬節惠還自以當誅時漢五將皆無功天子以惠奉使克獲遂封惠為長羅侯復遣惠持金幣還賜烏孫貴人有功者惠因奏請龜茲國嘗殺校尉賴丹未伏誅請便道擊之宣帝不許大將軍霍光風惠以便宜從事惠與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜茲東國二萬人烏孫兵七千人從三面攻龜茲兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰即如此縛姑翼來吾置王王執姑翼詣惠惠斬之而還後代蘇武為典屬國明習外國事勤勞數有功甘露中後將軍趙充國薨天子遂以惠為右將軍典屬國如故宣帝崩惠事元帝三歲薨諡曰壯武侯傳國至曾孫建武中乃絶鄭吉會稽人也以卒伍從軍數出西域由是為郎吉為人彊執習外國事自張騫通西域李廣利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積穀因發諸國兵攻破車師遷衛司馬使護鄯善以西南道神爵中胸奴乖亂日逐王先賢撣欲降漢使人與吉相聞吉發渠黎龜茲諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸德侯吉既破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉上嘉其功效乃下詔曰都護西域騎都尉鄭吉拊循外蠻宣明威信迎胸奴單于從兄日逐王衆擊破車師兜訾城功效茂著其封吉為安遠侯食邑千戶吉於是中西域而立莫府治烏壘城鎮撫諸國誅伐懷集之漢之號令班西域矣始自張騫而成於鄭吉語在西域傳吉薨諡曰繆侯子光嗣薨無子國除元始中録功臣不以罪絶者封吉曾孫永為安遠侯甘延壽字君況北地郁郅人也少以良家子善騎射為羽林投石拔距絶於等倫嘗超踰羽林亭樓由是遷為郎試辨為期門以材力愛幸稍遷至遼東太守免官車騎將軍許嘉薦延壽為郎中諫大夫使西域都護騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯侯傳國至曾孫王莽敗乃絶陳湯字子公山陽瑕丘人也少好書博達善屬文家貧丐貣無節不為州里所稱西至長安求官得太官獻食丞數歲富平侯張勃與湯交高其能初元二年元帝詔列侯舉茂材勃舉湯湯待遷父死不奔喪司隸奏湯無循行勃選舉故不以實坐削戶二百會薨因賜諡曰繆侯湯下獄論後復以薦為郎數求使外國久之遷西域副校尉與甘延壽俱出先是宣帝時胸奴乖亂五單于爭立呼韓邪單于與郅支單于俱遣子入侍漢兩受之後呼韓邪單于身入稱臣朝見郅支以為呼韓邪破弱降漢不能自還即西收右地會漢發兵送呼韓邪單于郅支由是遂西破呼偈堅昆丁令兼三國而都之怨漢擁護呼韓邪而不助己困辱漢使者江乃始等初元四年遣使奉獻因求侍子願為內附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以為春秋之義許夷狄者不一而足今郅支單于鄉化未醇所在絶遠宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜使無鄉從之心棄前恩立後怨不便議者見前江乃始無應敵之數知勇俱困以致恥辱即豫為臣憂臣幸得建彊漢之節承明聖之詔宣諭厚恩不宜敢桀若懷禽獸加無道於臣則單于長嬰大罪必遁逃遠舍不敢近邊沒一使以安百姓國之計臣之願也願送至庭上以示朝者禹復爭以為吉往必為國取悔生事不可許右將軍馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益彊遂西奔康居康居王以女妻郅支郅支亦以女豫康居王康居甚尊敬郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略民人驅畜産烏孫不敢追西邊空虛不居者且千里郅支單于自以大國威名尊重又乘勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都賴水中發民作城日作五百人二歲乃已又遣使責闔蘇大宛諸國歲遺不敢不豫漢遣使三輩至康居求谷吉等死郅支困辱使者不肯奉詔而因都護上書言居困厄願歸計彊漢遣子入侍其驕嫚如此建昭三年湯與延壽出西域湯為人沈勇有大慮多策謀喜奇功每過城邑山川常登望既領外國與延壽謀曰夷狄畏服大種其天性也西域本屬胸奴今郅支單于威名遠聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氏山離烏弋數年之間城郭諸國危矣且其人剽悍好戰伐數取勝久畜之必為西域患郅支單于雖所在絶遠蠻夷無金城強弩之守如發屯田吏士毆從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而成也延壽亦以為然欲奏請之湯曰國家與公卿議大策非凡所見事必不從延壽猶與不聽會其久病湯獨矯制發城郭諸國兵車師戊己校尉屯田吏士延壽聞之驚起欲止焉湯怒按劍叱延壽曰大衆已集會豎子欲沮衆邪延壽遂從之部勒行陳益置揚威白虎合騎之校漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀即日引軍分行別為六校其三校從南道踰蔥領徑大宛其三校都護自將發溫宿國從北道入赤谷過烏孫涉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東殺略大昆彌千餘人歐畜産甚多從後與漢軍相及頗寇盜後重湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為寇間呼其貴人屠墨見之諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色子即屠墨母之弟皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困厄願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都護將軍來迎單于妻子恐左右驚動故未敢至城下使數往來相答報延壽湯因讓之我為單于遠來而至今無名王大人見將軍受事者何單于忽大計失客主之禮也兵來道遠人畜罷極食度且盡恐無以自還願單于與大臣審計策明日前至郅支城都賴水上離城三里止營傅陳望見單于城上立五采幡織數百人披甲乘城又出百餘騎往來馳城下步兵百餘人夾門魚鱗陳講習用兵城上人更招漢軍曰鬭來百餘騎馳赴營營皆張弩持滿指之騎引郤頗遣吏士射城門騎步兵騎步兵皆入延壽湯令軍聞鼓音皆薄城下四面圍城各有所守穿塹塞門戶鹵楯為前戟弩為後卬射城中樓上人樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨己為漢內應又聞烏孫諸國兵皆發自以無所之郅支已出復還曰不如堅守漢兵遠來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于下騎傳戰大內夜過半木城穿中人卻入土城乘城呼時康居兵萬餘騎分為十餘處四面環城亦與相應和夜數奔營不利輒卻平明四面火起吏士喜大呼乘之鉦鼓聲動地康居兵引卻漢兵四面推鹵楯並入土城中單于男女百餘人走入大內漢兵縱火吏士爭入單于被創死軍候假丞杜勳斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦豫城郭諸國所發十五王於是延壽湯上疏曰臣聞天下之大義當混為一昔有唐虞今有彊漢胸奴呼韓邪單于已稱北藩唯郅支單于叛逆未伏其辜大夏之西以為彊漢不能臣也郅支單于慘毒行於民大惡通于天臣延壽臣湯將義兵行天誅賴陛下神靈陰陽並應天氣精明陷陳克敵斬郅支首及名王以下宜縣頭槀街蠻夷邸間以示萬里明犯彊漢者雖遠必誅事下有司丞相匡衡御史大夫繁延壽以為郅支及名王首更歷諸國蠻夷莫不聞知月令春掩骼埋胔之時宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之會優施笑君孔子誅之方盛夏首足異門而出宜縣十日乃埋之有詔將軍議是初中書令石顯嘗欲以姊妻延壽延壽不取及丞相御史亦惡其矯制皆不與湯湯素貪所鹵獲財物入塞多不法司隸校尉移書道上繫吏士按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司隸反逆收繫按驗是為郅支報讎也上立出吏士令縣道具酒食以過軍既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生事於蠻夷為國招難漸不可開元帝內嘉延壽湯功而重違衡顯之議議久不決故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毀重群臣皆閔焉陛下赫然欲誅之意未嘗有忘西域都護延壽副校尉湯承聖指倚神靈總百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠五重城搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭明之功萬夷懾伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賓願守北藩纍世稱臣立千載之功建萬世之安群臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荊來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫燕喜既多受祉來歸自鎬我行永久千里之鎬猶以為遠況萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功厲戎士也昔齊桓公前有尊周之功後有滅項之罪君子以功覆過而為之諱行事二師將軍李廣利捐五萬之師靡億萬之費經四年之勞而廑獲駿馬三十匹雖斬宛王母鼓之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於二師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則高於安遠長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔曰胸奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優游而不征者重動師衆勞將帥故隱忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之賴天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之臧因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邊竟得以安然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議封焉議者皆以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絶域非真單于元帝取安遠侯鄭吉故事封千戶衡顯復爭及封延壽為義成侯賜湯爵關內侯食邑各三百戶加賜黃金百斤告上帝宗廟大赦天下拜延壽為長水校尉湯為射聲校尉延壽遷城門校尉護軍都尉薨於官成帝初即位丞相衡復奏湯以吏二千石奉使顓命蠻夷中不正身以先下而盜所收康居財物戒官屬曰絶域事不覆校雖在赦前不宜處位湯坐免後湯上書言康居王侍子非王子也按驗實王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐趙有廉頗馬服彊秦不敢窺兵井陘近漢有郅都魏尚胸奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將率之臣竊見關內侯陳湯前使副西域都護忿郅支之無道閔王誅之不加策慮愊億義勇奮發卒興師奔逝橫厲烏孫踰集都賴屠三重城斬郅支首報十年之逋誅雪邊吏之宿恥威震百蠻武暢西海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歷時不決執憲之吏欲致之大辟昔白起為秦將南拔郢都北坑趙括以纖介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告類上帝介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷蓋之報況國之功臣者哉竊恐陛下忽於鼓鼙之聲不察周書之意而忘帷蓋之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也書奏天子出湯奪爵為士伍後數歲西域都護段會宗為烏孫兵所圍驛騎上書願發城郭敦煌兵以自救丞相王商大將軍王鳳及百僚議數日不決鳳言湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不詘申湯入見有詔毋拜示以會宗奏湯辭謝曰將相九卿皆賢材通明小臣罷癃不足以策大事上曰國家有急君其毋讓對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵今圍會宗者人衆不足以勝會宗唯陛下勿憂且兵輕行五十里重行三十里今會宗欲發城郭敦煌歷時乃至所謂報讎之兵非救急之用也上曰奈何其解可必乎度何時解湯知烏孫瓦合不能久攻故事不過數日因對曰已解矣詘指計其日曰不出五日當有吉語聞居四日軍書到言已解大將軍鳳奏以為從事中郎莫府事一決於湯湯明法令善因事為勢納說多從常受人金錢作章奏卒以此敗初湯與將作大匠解萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意自致將作大匠及大司農中丞耿壽昌造杜陵賜爵關內侯將作大匠乘馬延年以勞苦秩中二千石今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘歲矣關東富人益衆多規良田役使貧民可徙初陵以彊京師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙內郡國民萬年自詭三年可成後卒不就群臣多言其不便者下有司議皆曰昌陵因卑為高積土為山度便房猶在平地上客土之中不保幽冥之靈淺外不固卒徒工庸以巨萬數至㸐脂火夜作取土東山且與穀同賈作治數年天下遍被其勞國家罷敝府臧空虛下至衆庶熬熬苦之故陵因天性據真土處勢高敞旁近祖考前又已有十年功緒宜還復故陵勿徙民上乃下詔罷昌陵語在成紀丞相御史請廢昌陵邑中室奏未下人以問湯第宅不徹得毋復發徙湯曰縣官且順聽群臣言猶且復發徙之也時成都侯商新為大司馬衛將軍輔政素不善湯商聞此語白湯惑衆下獄治按驗諸所犯湯前為騎都尉王莽上書言父早死獨不封母明君共養皇太后尤勞苦宜封竟為新都侯後皇太后同母弟苟參為水衡都尉死子伋為侍中參妻欲為伋求封湯受其金五十斤許為求比上奏弘農太守張匡坐臧百萬以上狡猾不道有詔即訊恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬皆此類也事在赦前後東萊郡黑龍冬出人以問湯湯曰是所謂玄門開微行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑衆不道妄稱詐歸異於上非所宜言大不敬廷尉增壽議以為不道無正法以所犯劇易為罪臣下承用失其中故移獄廷尉無比者先以聞所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民已申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑衆湯稱詐虛設不然之事非所宜言大不敬也制曰廷尉增壽當是湯前有討郅支單于功其免湯為庶人徙邊又曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩繇役興卒暴之作卒徒蒙辜死者連屬毒流衆庶海內怨望雖蒙赦令不宜居京師於是湯與萬年俱徙敦煌久之敦煌太守奏湯前親誅郅支單于威行外國不宜近邊塞詔徙安定議郎耿育上書言便宜因冤訟湯曰延壽湯為聖漢揚鉤深致遠之威雪國家纍年之恥討絶域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下明詔宣著其功改年垂曆傳之無窮應是南郡獻白虎邊陲無警備會先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功獨丞相匡衡排而不豫封延壽湯數百戶此功臣戰士所以失望也孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曾不深惟本末之難以防未然之戒欲專主威排妒有功使湯塊然被冤拘囚不能自明卒以無罪老棄敦煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不忘危盛必慮衰今國家素無文帝纍年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯耳假使異世不及陛下尚望國家追録其功封表其墓以勸後進也湯幸得身當聖世功曾未久反聽邪臣鞭逐斥遠使亡逃分竄死無處所遠覽之士莫不計度以為湯功纍世不可及而湯過人情所有湯尚如此雖復破絶筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳此臣所以為國家尤戚戚也書奏天子還湯卒於長安死後數年王莽為安漢公秉政既內德湯舊思又欲讇皇太后以討郅支功尊元帝廟稱高宗以湯延壽前功大賞薄及候丞杜勳不賞乃益封延壽孫遷千六百戶追諡湯曰破胡壯侯封湯子馮為破胡侯勳為討狄侯段會宗字子松天水上邽人也竟寧中以杜陵令五府舉為西域都護騎都尉光祿大夫西域敬其威信三歲更盡還拜為沛郡太守以單于當朝徙為雁門太守數年坐法免西域諸國上書願得會宗陽朔中復為都護會宗為人好大節矜功名與谷永相友善谷永閔其老復遠出豫書戒曰足下以柔遠之令德復典都護之重職甚休甚休若子之材可優遊都城而取卿相何必勒功昆山之仄總領百蠻懷柔殊俗子之所長愚無以喻雖然朋友以言贈行敢不略意方今漢德隆盛遠人賓服傅鄭甘陳之功沒齒不可復見願吾子因循舊貫毋求奇功終更亟還亦足以復雁門之踦萬里之外以身為本願詳思愚言會宗既出諸國遣子弟郊迎小昆彌安日前為會宗所立德之欲往謁諸翕侯止不聽遂至龜茲謁城郭甚親附康居太子保蘇匿率衆萬餘人欲降會宗奏狀漢遣衛司馬逢迎會宗發戊己校尉兵隨司馬受降司馬畏其衆欲令降者皆自縛保蘇匿怨望舉衆亡去會宗更盡還以擅發戊己校尉之兵乏興有詔贖論拜為金城太守以病免歲餘小昆彌為國民所殺諸翕侯大亂微會宗為左曹中郎將光祿大夫使安輯烏孫立小昆彌兄末振將定其國而還明年末振將殺大昆彌會病死漢恨誅不加元延中復遣會宗發戊己校尉諸國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地選精兵三十弩徑至昆彌所在召番丘責以末振將骨肉相殺殺漢公主子孫未伏誅而死使者受詔誅番丘即手劍擊殺番丘官屬以下驚恐馳歸小昆彌烏犁靡者末振將兄子也勒兵數千騎圍會宗會宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪會宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去會宗還奏事公卿議會宗權得便宜以輕兵深入烏孫即誅番丘宣明國威宜加重賞天子賜會宗爵關內侯黃金百斤是時小昆彌季父卑爰疐擁衆欲害昆彌漢復遣會宗使安輯與都護孫建并力明年會宗病死烏孫中年七十五矣城郭諸國為發喪立祠焉贊曰自元狩之際張騫始通西域至于地節鄭吉建都護之號訖王莽世凡十八人皆以勇略選然其有功迹者具此廉褒以恩信稱郭舜以廉平著孫建用威重顯其餘無稱焉陳湯儻𦳝不自收斂卒用困窮議者閔之故備列云
