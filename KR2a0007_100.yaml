body:
  text: 敘傳第七十上班氏之先與楚同姓令尹子文之後也子文初生棄於瞢中而虎乳之楚人謂乳穀謂虎於檡故名穀於檡字子文楚人謂虎班其子以為號秦之滅楚遷晉代之間因氏焉始皇之末班壹避墬於樓煩致馬牛羊數千群值漢初定與民無禁當孝惠高后時以財雄邊出入弋獵旌旗鼓吹年百餘歲以壽終故北方多以壹為字者壹生孺孺為任俠州郡歌之孺生長官至上谷守長生回以茂材為長子命回生況舉孝廉為郎積功勞至上河農都尉大司農奏課連最入為左曹越騎校尉成帝之初女為倢伃致仕就第貲累千金徙昌陵昌陵後罷大臣名家皆占數于長安況生三子伯斿穉伯少受詩於師丹大將軍王鳳薦伯宜勸學召見宴昵殿容貌甚麗誦說有法拜為中常侍時上方鄉學鄭寬中張禹朝夕入說尚書論語於金華殿中詔伯受焉既通大義又講異同於許商遷奉車都尉數年金華之業絕出與王許子弟為群在於綺襦紈絝之間非其好也家本北邊志節忼慨數求使匈奴河平中單于來朝上使伯持節迎於塞下會定襄大姓石李群輩報怨殺追捕吏伯上狀因自請願試守期月上遣侍中中郎將王舜馳傳代伯護單于并奉璽書印綬即拜伯為定襄太守定襄聞伯素貴年少自請治劇畏其下車作威吏民竦息伯至請問耆老父祖故人有舊恩者迎延滿堂日為供具執子孫禮郡中益弛諸所賓禮皆名豪懷恩醉酒共諫伯宜頗攝錄盜賊具言本謀亡匿處伯曰是所望於父師矣乃召屬縣長吏選精進掾史分部收捕及它隱伏旬日盡得郡中震㮚咸稱神明歲餘上徵伯伯上書願過故郡上父祖冢有詔太守都尉以下會因召宗族各以親疏加恩施散數百金北州以為榮長老紀焉道病中風既至以侍中光祿大天養病賞賜甚厚數年未能起會許皇后廢班倢伃供養東宮進侍者李平為倢伃而趙飛燕為皇后伯遂稱篤久之上出過臨侯伯伯惶恐起眡事自大將軍薨後當平定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入侍禁中設宴飲之會及趙李諸侍中皆引滿舉白談笑大噱時乘輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂上以伯新起數目禮之因顧指畫而問伯紂為無道至於是虖迫對曰書云乃用婦人之言何有踞肆於朝所謂眾惡歸之不如是之甚者也上曰苟不若此此圖何戒伯曰沈湎于酒微子所以告去也式號式謼大雅所以流連也詩書淫亂之戒其原皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言放等不懌稍自引起更衣因罷出時長信庭林表適使來聞見之後上朝東宮太后泣曰帝間顏色瘦黑班侍中本大將軍所舉宜寵異之益求其比以輔聖德宜遣富平侯且就國上曰諾車騎將軍王音聞之以風丞相史御史奏富平罪過上乃出放為邊都尉後復徵入太后與上書曰前所道尚未效富平侯反復來其能默虖上謝曰請今奉詔是時許商為少府師丹為光祿勳上於是引商丹入為光祿大夫伯遷水衡都尉與兩師並侍中皆秩中二千石每朝東宮常從及有大政俱使諭指於公卿上亦稍厭游宴復修經書之業太后甚悅丞相方進復奏富平侯竟就國會伯病卒年三十八朝廷愍惜焉斿博學有俊材左將軍史丹舉賢良方正以對策為議郎遷諫大夫右曹中郎將與劉向校祕書每奏事斿以選受詔進讀群書上器其能賜以祕書之副時書不布自東平思王以叔父求太史公諸子書大將軍白不許語在東平王傳斿亦早卒有子曰嗣顯名當世穉少為黃門郎中常侍方直自守成帝季年立定陶王為太子數遣中盾請問近臣穉獨不敢答哀帝即位出穉為西河屬國都尉遷廣平相王莽少與穉兄弟同列友善兄事斿而弟畜穉斿之卒也修緦麻賻賵甚厚平帝即位太后臨朝莽秉政方欲文致太平使使者分行風俗采頌聲而穉無所上琅邪太守孫閎言災害於公府大司空甄豐遣屬馳至兩郡諷吏民而劾閎空造不祥穉絕嘉應嫉害聖政皆不道太后曰不宣德美宜與言災害者異罰且後宮賢家我所哀也閎獨下獄誅穉懼上書陳恩謝罪願歸相印入補延陵園郎太后許焉食故祿終身由是班氏不顯莽朝亦不罹咎初成帝性寬進入直言是以王音翟方進等繩法舉過而劉向杜鄴王章朱雲之徒肆意犯上故自帝師安昌侯諸舅大將軍兄弟及公卿大夫後宮外屬史許之家有貴寵者莫不被文傷詆唯谷永嘗言建始河平之際許班之貴傾動前朝熏灼四方常賜無量空虛內臧女寵至極不可尚矣今之後起天所不饗什倍於前永指以駮譏趙李亦無間云穉生彪彪字叔皮幼與從兄嗣共遊學家有賜書內足於財好古之士自遠方至父黨揚子雲以下莫不造門嗣雖修儒學然貴老嚴之術桓生欲借其書嗣報曰若夫嚴子者絕聖棄智修生保真清虛澹泊歸之自然師友造化而不為世俗所役者也漁釣於一壑則萬不奸其志栖遲於一丘則天下不易其樂不絓聖人之罔不嗅驕君之餌蕩然肆志談者不得而名焉故可貴也今吾子已貫仁誼之羈絆擊名聲之韁鎖伏周孔之軌躅馳顏閔之極摯既擊攣於世教矣何用大道為自眩曜昔有學步於邯鄲者曾未得其髣髴又復失其故步遂匍匐而歸耳恐似此類故不進嗣之行己持論如此叔皮唯聖人之道然後盡心焉年二十遭王莽敗世祖即位於冀州時隗囂據壟擁眾招輯英俊而公孫述稱帝於蜀漢天下雲擾大者連州郡小者據縣邑囂問彪曰往者周亡戰國並爭天下分裂數世然後乃定其抑者從橫之事復起於今乎將承運迭興在於一人也願先生論之對曰周之廢興與漢異昔周立爵五等諸侯從政本根既微枝葉強大故其末流有從橫之事其勢然也漢家承秦之制並立郡縣主有專己之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絕危自上起傷不及下故王氏之貴傾擅朝廷能竊號位而不根於民是以即真之後天下莫不引領而歎十餘年間外內騷擾遠近俱發假號雲合咸稱劉氏不謀而同辭方今雄桀帶州城者皆無七國世業之資詩云皇矣上帝臨下有赫鑒觀四方求民之莫今民皆謳吟思漢鄉仰劉氏已可知矣囂曰先生言周漢之勢可也至於但見愚民習識劉氏姓號之故而謂漢家復興疏矣昔秦失其鹿劉季逐而掎之時民復知漢虖既感囂言又愍狂狡之不息乃著王命論以救時難其辭曰昔在帝堯之禪曰咨爾舜天之曆數在爾躬舜亦以命禹臮于稷契咸佐唐虞光濟四海奕世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著乎春秋唐據火德而漢紹之始起沛澤則神母夜號以章赤帝之符由是言之帝王之祚必有明聖顯懿之德豐功厚利積絫之業然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而得屈起在此位者也世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劍游說之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求也悲夫此世所以多亂臣賊子者也若然者豈徒闇於天道哉又不覩之於人事矣夫餓饉流隸飢寒道路思有裋褐之褻儋石之畜所願不過一金然終於轉死溝壑何則貧窮亦有命也況虖天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阸會竊其權柄勇如信布彊如梁籍成如王莽然卒潤鑊伏質亨醢分裂又況幺䯢尚不及數子而欲闇奸天位者虖是故駑蹇之乘不聘千里之塗燕雀之疇不奮六翮之用楶梲之材不荷楝梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗不勝其任也當秦之末豪桀共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤卒富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劍而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明猶能推事理之致探禍福之機而全宗祀於無窮垂策書於春秋而況大丈夫之事虖是故窮達有命吉凶由人嬰母知廢陵母知興審此四者帝王之分決矣蓋在高祖其興也有五一曰帝堯之曲裔二曰體貌多奇異三曰神武有徵應四月寬明而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如由己從諫如順流趣時如嚮赴當食吐哺納子房之策拔足揮洗揖酈生之說寤戍卒之言斷懷土之情高四皓之名割肌膚之愛舉韓信於行陳收陳平於亡命英雄陳力群策畢舉此高祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媼任高祖而夢與神遇震電晦冥有龍蛇之怪及其長而多靈有異於眾是以王武感物而折券呂公覩形而進女秦皇東游以厭其氣呂后望雲而知所處始受命則白蛇分西入關則五星聚故淮陰留侯謂之天授非人力也歷古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符瑞不同斯度而苟昧於權利越次妄據外不量力內不知命則必喪保家之主失天年之壽遇折足之凶伏鈇鉞之誅英雄誠知覺寤畏若禍戒超然遠覽淵然深識收陵嬰之明分絕信布之覬覦距逐鹿之瞽說審神器之有授毋貪不可幾為二母之所笑則福祚流于子孫天祿其永終矣知隗囂終不寤乃避墮於河西河西大將軍寶融嘉其美德訪問焉舉茂材為徐令以病去官後數應三公之召仕不為祿所如不合學不為人博而不俗言不為華述而不作有子曰固弱冠而孤作幽通之賦以致命遂志其辭曰系高頊之玄冑兮氏中葉之炳靈繇凱風而蟬蛻兮雄朔野以颺聲皇十紀而鴻漸兮有羽儀於上京巨淊天而泯夏兮考遘愍以行謠終保己而貽則兮里上仁之所廬懿前烈之純淑兮窮與達其必濟咨孤矇之眇眇兮將圮絕而罔階豈余身之足殉兮愇世業之可懷靖潛處以永思兮經日月而彌遠匪黨人之敢拾兮庶斯言之不玷魂煢煢與神交兮精誠發於宵寐夢登山而迥眺兮覿幽人之髣髴㩜葛藟而授余兮眷峻谷曰勿隧昒昕寤而仰思兮心蒙蒙猶未察黃神邈而靡質兮儀遺讖以臆對曰乘高而遌神兮道遐通而不迷葛緜緜於樛木兮詠南風以為綏蓋惴惴之臨深兮乃二雅之所祗既誶爾以吉象兮又申之以迥戒盍孟晉以迨群兮辰條倏忽其不再承靈訓其虛徐兮佇盤桓而且俟惟天墜之無窮兮鱻生民之脢在紛屯亶與蹇連兮何艱多而智寡上聖寤而後拔兮豈群黎之所御昔衛叔之御昆兮昆為寇而喪予管彎弧欲斃讎兮讎作后而成己變化故而相詭兮孰云豫其終始雍造怨而先賞兮丁繇惠而被戮㮚取弔于逌吉兮王膺慶於所感畔回宂其若茲兮北叟頗識其倚伏單治裏而外凋兮張修襮而內逼欥中龢為幾兮顏與冉又不得溺招路以從已兮謂孔氏猶未可安慆慆而不萉兮卒隕身虖世禍游聖門而靡救兮顧覆醢其何補固行行其必凶兮免盜亂為賴道形氣發于根柢兮柯葉彙而靈茂恐网蜽之責景兮慶未得其云已黎淳耀于高辛兮羋彊大於南汜嬴取威於百儀兮姜本支虖三止既仁得其信然兮卬天路而同軌東鄰虐而殲仁兮王合位虖三五戎女烈而喪孝兮伯徂歸於龍虎發還師以成性兮重醉行而自耦震鱗斄于夏庭兮帀三正而滅姬巽羽化于宣宮兮彌五辟而成災道悠長而世短兮敻冥默而不周胥仍物而鬼諏兮乃窮宙而達幽媯巢姜於孺筮兮旦算祀于挈龜宣曹興敗於下夢兮魯衛名諡於銘謠妣聆呱而刻石兮許相理而鞠條道混成而自然兮術同原而分流神先心以定命兮命隨行以消息斡流遷其不濟兮故遭罹而贏縮三欒同於一體兮雖移盈然不忒洞參差其紛錯兮斯眾兆之所惑周賈盪而貢憤兮齊死生與禍福抗爽言以矯情兮信畏犧而忌服所貴聖人之至論兮順天性而斷誼物有欲而不居兮亦有惡而不避守孔約而不貳兮乃輶德而無累三仁殊而一致兮夷惠舛而齊聲木偃息以蕃魏兮申重繭以存荊紀焚躬以衛上兮皓頤志而弗營侯屮木之區別兮苟能實而必榮要沒世而不朽兮乃先民之所程觀天罔之紘覆兮實棐諶而相順謨先聖之大繇兮亦鄰惪而助信虞歆美而儀鳳兮孔忘味於千載素文信而底麟兮漢賓祚于異代精通靈而感物兮神動氣而入微養游睇而猨號兮李虎發而石開非精誠其焉通兮苟無實其孰信操末技猶必然兮矧湛躬於道真登孔顥而上下兮緯群龍之所經朝貞觀而夕化兮猶諠己而遺形若胤彭而僭老兮訴來哲以通情亂曰天造屮昧立性命兮復心弘道惟賢聖兮渾元運物流不處兮保身遺名民之表兮舍生取誼亦道用兮憂傷夭物忝莫痛兮昊爾太素曷渝色兮尚粵其幾淪神域兮永平中為郎典校祕書專篤志於博學以著述業或譏以無功又感東方朔揚雄自諭以不遭蘇張范蔡之時曾不折博學以著述為業或譏以無功又感東方朔揚雄自諭以不遭蘇張范蔡之時曾不折之以正道明君子之所守故聊復應焉其辭曰賓戲主人曰蓋聞聖人有壹定之論列士有不易之分亦云名而已矣故太上有立德其次有立功夫德不得後身而特盛功不得背時而獨章是以聖哲之治棲棲皇皇孔席不煗墨突不黔由此言之取舍者昔人之上務著作者前列之餘事耳今吾子幸游帝王之世躬帶冕之服浮英華湛道德矕龍虎之文舊矣卒不能攄首尾奮翼鱗振拔洿塗跨騰風雲使見之者景駭聞之者嚮震徒樂枕經籍書紆體衡門上無所蔕下無所根獨攄意虖宇宙之外銳思於豪芒之內潛神默記恒以年歲然而器不賈於當己用不效於一世雖馳辯如濤波摛藻如春華猶無益於殿最意者且運朝夕之策定合會之計使存有顯號亡有美諡不亦優虖主人逌爾而笑曰若賓之言斯所謂見勢利之華闇道德之實守穾奧之熒燭未卬天庭而覩白日也曩者王塗蕪穢周失其御侯伯方軌戰國橫騖於是七雄虓闞分裂諸夏龍戰而虎爭游說之徒風颺電激並起而救之其餘猋飛景附煜霅其間者蓋不可勝載當此之時搦朽摩鈍鈆刀皆能壹斷是故魯連飛一矢而蹶千金虞卿以顧眄而捐相印也夫啾發投曲感耳之聲合之律度淫䵷而不可聽者非詔夏之樂也因勢合變偶時之會風移俗易乖忤而不可通者非君子之法也及至從人合之衡人散之亡命漂說羇旅騁辭商鞅挾三術以鑽孝公李斯奮時務而要始皇彼皆躡風雲之會履顛沛之勢據徼乘邪以求一日之富貴朝為榮華夕而焦瘁福不盈眥禍溢於世凶人且以自悔況吉士而是賴虖且功不可以虛成名不可以偽立韓設辯以徼君呂行詐以賈國說難既酋其身乃囚秦貨既貴厥宗亦隧是故仲尼抗浮雲之志孟軻養浩然之氣彼豈樂為迂闊哉道不可以貳也方今大漢酒埽群穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黃唐其君天下也炎之如日威之如神函之如海養之如春是以六合之內莫不同原共流沐浴玄德稟卬太和枝附葉著譬猶屮木之殖山林鳥魚之毓川澤得氣者蕃滋失時者苓落參天墬而施化豈云人事之厚薄哉今子處皇世而諭戰國耀所聞而疑所覿欲從旄敦而度高虖泰山懷氿濫而測深虖重淵亦未至也賓曰若夫鞅斯之倫衰周之凶人既聞命矣敢問上古之士處身行道輔世成名可述於後者默而已虖主人曰何為其然也昔咎繇謨虞箕子訪周言通帝王謀合聖神殷說夢發於傅巖周望兆動於渭濱齊甯激聲於康衢漢良受書邳沂皆竣命而神交匪詞言之所信故能建必然之策展無窮之勳也近者陸子優繇新語以興董生下帷發藻儒林劉向司籍辯章舊聞揚雄覃思法言大玄皆及時君之門闈究先聖之壼奧婆娑虖術藝之場休息虖篇籍之囿以全其質而發其文用納虖聖聽列炳於後人斯非其亞與若乃夷抗行於首陽惠降志於辱仕顏耽樂於簞瓢孔終篇於西狩聲盈塞於天淵真吾徒之師表也且吾聞之壹險壹陽天墬之方乃文乃質王道之綱有同有異聖哲之常故曰慎修所志守爾天符委命共己味道之腴神之聽之名其舍諸賓又不聞龢氏之璧韞於荊石隨侯之珠藏於蜯蛤虖歷世莫眡不知其將含景耀吐英精曠千載而流夜光也應龍潛於潢汙魚黿媟之不覩其能奮靈德合風雲超忽荒而躆顥蒼也故夫泥蟠而天飛者應龍之神也先賤而後貴者龢隨之珍也時闇而久章者君子之真也若乃牙曠清耳於管絃離婁眇目於豪分逢蒙絕技於弧矢班輸榷巧於斧斤良樂軼能於相馭烏獲抗力於千鈞龢鵲發精於鍼石研桑心計於無垠僕亦不任廁技於彼列故密爾自娛於斯文
