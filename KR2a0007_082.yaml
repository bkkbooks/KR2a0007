body:
  text: 揚雄傳第五十七下明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜東至弘農南驅漢中張羅罔罝罘捕熊羆豪豬虎豹狖玃狐菟麋鹿載以檻車輸長楊射熊館以罔為周阹縱禽獸其中令胡人手搏之自取其獲上親臨觀焉是時農民不得收斂雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以為主人子墨為客卿以風其辭曰子墨客卿問於翰林主人曰蓋聞聖主之養民也仁霑而恩洽動不為身今年獵長楊先命右扶風左太華而右褒斜椓巀嶭而為弋紆南山以為罝羅千乘於林莽列萬騎於山隅帥軍踤阹錫戎獲胡扼熊羆拖豪豬木雍槍纍以為儲胥此天下之窮覽極觀也雖然亦頗擾于農民三旬有餘其廑至矣而功不圖恐不識者外之則以為娛樂之遊內之則不以為乾豆之事豈為民乎哉且人君以玄默為神淡泊為德今樂遠出以露威靈數搖動以罷車甲本非人主之急務也蒙竊或焉翰林主人曰吁謂之茲邪若客所謂知其一未睹其二見其外不識其內者也僕嘗倦談不能一二其詳請略舉凡而客自覽其切焉客曰唯唯主人曰昔有強秦封豕其士窫窳其民鑿齒之徒相與摩牙而爭之豪俊麋沸雲擾群黎為之不康於是上帝眷顧高祖高祖奉命順斗極運天關橫巨海票昆侖提劍而叱之所麾城摲邑下將降旗一日之戰不可殫記當此之勤頭蓬不暇疏飢不及餐鞮鍪生蟣蝨介胄被霑汗以為萬姓請命呼皇天乃展民之所詘振民之所乏規億載恢帝業七年之間而天下密如也逮至聖文隨風乘流方垂意於至寧躬服節儉綈衣不敝革鞜不穿大夏不居木器無文於是後宮賤玳瑁而疏珠璣卻翡翠之飾除雕瑑之巧惡麗靡而不近斥芬芳而不御抑止絲竹晏衍之樂憎聞鄭衛幼眇之聲是以玉衡正而太階平也其後熏鬻作虐東夷橫畔羌戎睚眥閩越相亂遐萌為之不安中國蒙被其難於是聖武勃怒爰整其旅乃命票衛汾沄沸渭雲合電發猋騰波流機駭蜂軼疾如奔星擊如震霆砰轒轀破穹廬腦沙幕髓余吾遂獵乎王廷驅橐它燒熐蠡分梨單于磔裂屬國夷坑谷拔鹵莽刊山石蹂尸輿廝係纍老弱兗鋌瘢耆金鏃淫夷者數十萬人皆稽顙樹頷扶服蛾伏二十餘年矣尚不敢惕息夫天兵四臨幽都先加回戈邪指南越相夷靡節西征羌僰東馳是以遐方疏俗殊鄰絶黨之域自上仁所不化茂德所不綏莫不蹻足抗手請獻厥珍使海內淡然永亡邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡英華沈浮洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之故意者以為事罔隆而不殺物靡盛而不虧故平不肆險安不忘危乃時以有年出兵整輿竦戎振師五莋習馬長楊簡力狡獸校武票禽乃萃然登南山瞰烏弋西厭月𩨳東震日域又恐後世迷於一時之事常以此取國家之大務淫荒田獵陵夷而不禦也是以車不安軔日未靡旃從者仿佛骫屬而還亦所以奉太宗之烈遵文武之度復三王之田反五帝之虞使農不輟耰工不下機婚姻以時男女莫違出愷弟行簡易矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼓之樂鳴鞀磬之和建碣磍之虡拮隔鳴球掉八列之舞酌允鑠肴樂胥聽廟中之雍雍受神人之福祜歌投頌吹合雅其勤若此故真神之所勞也方將俟元符以禪梁甫之基增泰山之高延光于將來比榮乎往號豈徒欲淫覽浮觀馳騁粳稻之地周流梨栗之林蹂踐芻蕘誇詡衆庶盛狖玃之收多麋鹿之獲哉且盲不見咫尺而離婁燭千里之隅客徒愛胡人之獲我禽獸曾不知我亦已獲其王侯言未卒墨客降席再拜首曰大哉體乎允非小子之所能及也乃今日發矇廓然已昭矣哀帝時丁傅董賢用事諸附離之者或起家至二千石時雄方草太玄有以自守泊如也或嘲雄以玄尚白而雄解之號曰解嘲其辭曰客嘲揚子曰吾聞上世之士人綱人紀不生則已生則上尊人君下榮父母析人之圭儋人之爵懷人之府分人之祿紆青拖紫朱丹其轂今子幸得遭明盛之世處不諱之朝與群賢同行歷金門上玉堂有日矣曾不能畫一奇出一策上説人主下談公卿目如耀星舌如電光一從一衡論者莫當顧而作太玄五千文支葉扶疏獨説十餘萬言深者入黃泉高者出蒼天大者含元氣纖者入無倫然而位不過侍郎擢才給事黃門意者玄得毋尚白乎何為官之拓落也揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也往者周罔解結群鹿爭逸離為十二合為六七四分五剖並為戰國士無常君國亡定臣得士者富失士者貧矯翼厲翮恣意所存故士或自盛以橐或鑿壞以遁是故騶衍以頡亢而取世資孟軻雖連蹇猶為萬乘師今大漢左東海右渠搜前番禺後陶塗東南一尉西北一侯徽以糾墨製以質鈇散以禮樂風以詩書曠以歲月結以倚廬天下之士雷動雲合魚鱗雜襲咸營于八區家家自以為稷契人人自以為咎繇戴縰垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫譬若江湖之雀勃解之鳥乘雁集不為之多雙鳧飛不為之少昔三仁去而殷虛二老歸而周熾子胥死而吳亡種蠡存而粵伯五羖入而泰喜樂毅出而燕懼范睢以折擢而危穰侯蔡澤雖噤吟而笑唐舉故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患故世亂則聖哲馳騖而不足世治則庸夫高枕而有餘夫上世之士或解縛而相或釋褐而傅或倚夷門而笑或橫江潭而漁或七十説而不遇或立談間而封侯或枉千乘於陋巷或擁帚彗而先驅是以士頗得信其舌奮其筆窒隙蹈瑕而無所詘也當今縣令不請士郡守不迎師群卿不揖客將相不俯眉言奇者見疑行殊者得辟是以欲談者宛舌而固聲欲行者擬足而投迹鄉使上世之士處呼今策非甲科行非孝廉舉非方正獨可抗疏時道是非高得待詔下觸聞罷又安得青紫且吾聞之炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱高明之家鬼瞰其室懼拿者亡默默者存位極者宗危自守者身全是故知玄知默守道之極爰清爰靜遊神之廷惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如今子乃以鴟梟而笑鳳皇執蝘蜓而謿龜龍不亦病乎子徒笑我玄之尚白吾亦笑子之病甚不遭臾跗扁鵲悲夫客曰然則靡玄無所成名乎范蔡以下何必玄哉揚子曰范睢魏之亡命也折脅拉髂免於徽索翕肩蹈背扶服入橐激卬萬乘之主界涇陽抵穰侯而代之當也蔡澤山東之匹夫也顉頤折頞涕唾流沫西揖強秦之相扼其咽炕其氣附其背而奪其位時也天下已定金革已平都於雒陽婁敬委輅脫挽掉三寸之舌建不拔之策舉中國徙之長安適也五帝垂典三王傳禮百世不易叔孫通起於枹鼓之間解甲投戈遂作君臣之儀得也甫刑靡敝秦法酷烈聖漢權制而蕭何造律宜也故有造蕭何律於唐虞之世則悖矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之策於成周之世則繆矣有談范蔡之説於金張許史之間則狂矣夫蕭規曹隨留侯畫策陳平出奇功若泰山嚮若阺隤唯其人之贍知哉亦會其時之可為也故為可為於可為之時則從為不可為於不可為之時則凶夫藺先生收功於章臺四皓采榮於南山公孫創業於金馬票騎發迹於祁連司馬長卿竊訾於卓氏東方朔割炙於細君僕誠不能與此數公者並故默然獨守吾太玄雄以為賦者將以風也必推類而言極麗靡之辭閎侈巨衍競於使人不能加也既乃歸之正然覽者已過矣往時武帝好神仙相如上大人賦欲以風帝反縹縹有陵雲之志繇是言之賦勸而不止明矣又頗似俳優淳于髡優孟之徒非法度所存賢人君子詩賦之正也於是輟不復為而大潭思渾天參摹而四分之極於八十一旁則三摹九據極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀玄者數其畫而定之玄首四重者非卦也數也其用自天元推一晝一夜陰陽數度律曆之紀九九大連與天終始故玄三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與泰初歷相應亦有顓頊之曆焉揲之以三策關之人休咎絣之以象類播之以人事文之以五行擬之以道德仁義禮知無主無名要合五經苟非其事文不虛生為其泰曼漶而不可知故有首衝錯測攡瑩數文掜圖告十一篇皆以解剝玄體離散其文章句尚不存焉玄文多故不著觀之者難知學之者難成客有難玄大深衆人之不好也雄解之號曰解難其辭曰客難揚子曰凡著書者為衆人之所好也美味期乎合口工聲調於比耳今吾子乃抗辭幽説閎意眇指獨馳騁於有亡之際而陶冶大爐旁薄群生歷覽者茲年矣而殊不寤亶費精神於此而煩學者於彼譬畫者畫於無形弦者放於無聲殆不可乎揚子曰俞若夫閎言崇議幽微之塗蓋難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深昔人之辭乃玉乃金彼豈好為艱難哉勢不得已也獨不見夫翠虯絳螭之將登呼天必聳身於倉梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎日月之經不千里則不能燭六合耀八紘泰山之高不嶕嶢則不能浡滃雲而散歊蒸是以宓犧氏之作易也綿絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之臧定萬物之基典謨之篇雅頌之聲不溫純深潤則不足以揚鴻烈而章緝熙蓋胥靡為宰寂寞為尸大味必淡大音必希大語叫叫大道低回是以聲之眇者不可同於衆人之耳形之美者不可棍於世俗之目辭之衍者不可齊於庸人之聽今夫弦者高張急徽追趨逐耆則坐者不期而附矣誠為之施咸池揄六莖發簫韶詠九成則莫有和也是故鍾期死伯牙絶弦破琴而不肯與衆鼓獿人亡則匠石輟斤而不敢妄斫師曠之調鍾俟知音者之在後也孔子作春秋幾君子之前睹也老聃有遺言貴知我者希此非其操與雄見諸子各以其知舛馳大氐詆訾聖人即為怪迂析辨詭辭以撓世事雖小辨終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歷楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之撰以為十三卷象論語號曰法言法言文多不著獨著其目天降生民倥侗顓蒙恣于情性聰明不開訓諸理撰學行第一降周迄孔成于王道終後誕章乖離諸子圖微撰吾子第二事有本真陳施於億動不克咸本諸身撰修身第三芒芒天道在昔聖考過則失中不及則不至不可姦罔撰問道第四神心曶恍經緯萬方事繫諸道德仁誼禮撰問神第五明哲煌煌旁燭亡疆遜于不虞以保天命撰問明第六假言周于天地贊于神明幽弘橫廣絶于邇言撰寡見第七聖人匆明淵懿繼天測靈冠于群倫經諸范撰五百第八立政鼓衆動化天下莫上於中和中和之發在於哲民情撰先知第九仲尼以來國君將相卿士名臣參差不齊一概諸聖撰重黎第十仲尼之後訖于漢道德行顏閔股肱蕭曹爰及名將尊卑之條稱述品藻撰淵騫第十一君子純終領聞蠢迪檢押旁開聖則撰君子第十二孝莫大於寧親寧親莫大於寧神寧神莫大於四表之歡心撰孝至第十三贊曰雄之自序云爾初雄年四十餘自蜀來至遊京師大司馬車騎將軍王音奇其文雅召以為門下史薦雄待詔歲餘奏羽獵賦除為郎給事黃門與王莽劉歆並哀帝之初又與董賢同官當成哀平間莽賢皆為三公權傾人主所薦莫不拔擢而雄三世不徙官及莽篡位談説之士用符命稱功德獲封爵者甚衆雄復不侯以耆老久次轉為大夫括於勢利乃知是實好古而樂道其意欲求文章成名於後世以為經莫大於易故作太玄傳莫大於論語作法言史篇莫善於倉頡作訓纂針莫善於虞針作州針賦莫深於離騷反而廣之辭莫麗於相如作四賦皆斟酌其本相與放依而馳騁云用心於內不求於外於時人皆曶之唯劉歆及范逡敬焉而桓談以為絶倫王莽時劉歆甄豐皆為上公莽既以符命自立即位之後欲絶其原以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辭所連及便收不請時雄校書天祿閣上治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之曰雄素不與事何故在此間請問其故乃劉棻嘗從雄學作奇字雄不知情有詔勿問然京師為之語曰惟寂寞自投閣爰清靜作符命雄以病免復召為大夫家素貧耆酒人希至其門時有好事者載酒肴從遊學而巨鹿侯芭常從雄居受其太玄法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有祿利然尚不能明易又如玄何吾恐後人用覆醬瓿也雄笑而不應年七十一天鳳五年卒侯芭為起墳喪之三年時大司空王邑納言嚴尤聞雄死謂桓談曰子嘗稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也凡人賤近而貴遠親見揚子雲祿位容貌不能動人故輕其書昔老聃著虛無之言兩篇薄仁義非禮學然後世好之者尚以為過於五經自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人若使遭遇時君更閲賢知為所稱善則必度越諸子矣諸儒或譏以為雄非聖人而作經猶春秋吳楚之君僭號稱王蓋誅絶之罪也自雄之沒至今四十餘年其法言大行而玄終不顯然篇籍具存
