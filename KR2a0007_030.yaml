body:
  text: 高五王傳第八高皇帝八男呂后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙隱王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建淮南厲王長自有傳齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城諸民能齊言者皆與齊孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮太后怒乃令人酌兩卮鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反卮齊王怪之因不敢飲陽醉去問知其鴆乃憂自以為不得脫長安內史士曰太后獨有帝與魯元公主今王有七十餘城而公主乃食數城王誠以一郡上太后為公主湯沐邑太后必喜王無患矣於是齊王獻城陽郡以尊公主為王太后呂太后喜而許之乃置酒齊邸樂飲遣王歸國後十三年薨子襄嗣趙隱王如意九年立四年高祖崩呂太后徵王到長安鴆殺之無子絶趙幽王友十一年立為淮陽王趙隱王如意死孝惠元年徙友王趙凡立十四年友以諸呂女為后不愛愛它姬諸呂女怒去讒之於太后曰王曰呂氏安得王太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衛圍守之不得食其群臣或竊饋之輒捕論之趙王餓乃歌曰諸呂用事兮劉氏微迫脅王侯兮彊授我妃我妃既妒兮誣我以惡讒女亂國兮上曾不寤我無忠臣兮何故棄國自快中野兮蒼天與直于嗟不可悔兮寧早自賊為王餓死兮誰者憐之呂氏絶理兮託天報仇遂幽死以民禮葬之長安高后崩孝文即位立幽王子遂為趙王二年有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟彊及齊悼惠王子朱虛侯章東牟侯興居有功皆可王於是取趙之河間立辟彊是為河間文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德內史王悍諫不聽遂燒殺德悍發兵住其西界欲待吳楚俱進北使胸奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗胸奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壞王遂自殺國除景帝憐趙相內史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死呂后徙恢王趙恢心不樂太后以呂産女為趙王后王后從官皆諸呂也內擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入胸奴明年立建為燕王十五年薨有美人子太后使人殺之絶後齊悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王賢為菑川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩呂太后稱制元年以其兄子鄜侯呂台為呂王割齊之濟南郡為呂王奉邑明年哀王弟章入宿衛於漢高后封為朱虛侯以呂祿女妻之後四年封章弟興居為東牟侯皆宿衛長安高后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙王友幽死于邸三趙王既廢高后立諸呂為三王擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲高后令章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏非其種者鉏而去之太后默然頃之諸呂有一人醉亡酒章追拔劍斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸呂憚章雖大臣皆依朱虛侯劉氏為彊其明年高后崩趙王呂祿為上將軍呂王産為相國皆居長安中聚兵以威大臣欲為亂章以呂祿女為婦知其謀乃使人陰出告其兄齊王欲令發兵西朱虛侯東牟侯欲從中與大臣為內應以誅諸呂因立齊王為帝齊王聞此計與其舅駟鈞郎中令祝午中尉魏勃陰謀發兵齊相召平聞之乃發兵入衛王宮魏勃紿平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衛衛王召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為內史悉發國中兵使祝午紿琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨菑見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然乃馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既欺不得反國乃說齊王曰齊悼惠王高皇帝長子也推本言也大王高皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻呂國之濟南於是齊王遺諸侯王書曰高帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩高后用事春秋高聽諸呂擅廢帝更立又殺三趙王滅梁趙燕以王諸呂分齊國為四忠臣進諫上或亂不聽今高后崩皇帝春秋富未能治天下固待大臣諸侯今諸呂又擅自尊官聚兵嚴威劫列侯忠臣嬌制以令天下宗廟以危寡人帥兵入誅不當為王者漢聞之相國呂産等遣大將軍潁陰侯灌嬰將兵擊之嬰至滎陽乃謀曰諸呂舉兵關中欲危劉氏而自立今我破齊還報是益呂氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和以待呂氏之變而共誅之齊王聞之乃屯兵西界待約呂祿呂産欲作亂朱虛侯章與太尉勃丞相平等誅之章首先斬呂産太尉勃等乃盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也訪以呂氏故幾亂天下今又立齊王是欲復為呂氏也代王母家薄氏君子長者且代王高帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅呂氏事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王反既誅呂氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人後救火乎因退立股戰而栗恐不能言者終無他語灌將軍孰視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷勃勃父以善鼓琴見秦皇帝及勃少時欲求見齊相曹參家貧無以自通乃常獨早掃齊相舍人門外舍人怪之以為物而司之得勃勃曰願見相君無因故為子掃欲以求見於是舍人見勃曹參因以為舍人一為參御言事以為賢言之悼惠王王召見拜為內史始悼惠王得自置二千石及悼惠王薨哀王嗣勃用事重於相齊王既罷兵歸而代王立是為孝文帝文帝元年盡以高后時所割齊之城陽琅邪濟南郡復豫齊而徙琅邪王王燕益封朱虛侯東牟侯各二千戶黃金千斤是歲齊哀王薨子文王則嗣十四年薨無子國除城陽景王章孝文二年以朱虛侯與東牟侯興居俱立二年薨子共王喜嗣孝文十二年徙王淮南五年復還王城陽凡立三十三年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十一年薨子荒王順嗣四十六年薨子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝復立雲兄俚為城陽王王莽時絶濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公俱入清宮遂將少帝出迎皇帝入宮始誅諸呂時朱虛侯章功尤大大臣許盡以趙地王章盡以梁地王興居及文帝立聞朱虛東牟之初欲立齊王故黜其功二年王諸子乃割齊二郡以王章興居章興居意自以失職奪功歲餘章薨而胸奴大入邊漢多發兵丞相灌嬰將擊之文帝親幸太原興居以為天子自擊胡遂發兵反上聞之罷兵歸長安使棘蒲侯柴將軍擊破虜濟北王王自殺國除文帝憫濟北王逆亂以自滅明年盡封悼惠王諸子罷軍等七人為列侯至十五年齊文王又薨無子時悼惠王後尚有城陽王在文帝憐悼惠王適嗣之絶於是乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王齊孝王將閭以楊虛侯立濟北王志以安都侯立菑川王賢以武成侯立膠東王雄渠以白石侯立膠西王卬以平昌侯立濟南王辟光以扐侯立孝文十六年六王同日俱立立十一年孝景三年吳楚反膠東膠西菑川濟南王皆發兵應吳楚欲與齊齊孝王狐疑城守不聽三國兵共圍齊齊王使路中大夫告於天子天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急陰與三國通謀約未定會路中大夫從漢來其大臣乃復勸王無下三國會漢將欒布平陽侯等兵至齊擊破三國兵解圍已後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺而膠東膠西濟南菑川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善以迫劫有謀非其罪也召立孝王太子壽是為懿王二十三年薨子厲王次昌嗣其母曰紀太后太后取其弟紀氏女為王后王不愛紀太后欲其家重寵令其長女紀翁主入王宮正其後宮無令得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲入事漢皇太后皇太后有愛女曰修成君修成君非劉氏子太后憐之修成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后大喜使甲之齊時主父偃知甲之使齊以取后事亦因謂甲即事成幸言偃女願得充王後宮甲至齊風以此事紀太后怒曰王有后後宮備具且甲齊貧人及為宦者入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宮甲大窮還報皇太后曰王已願尚娥然事有所害恐如燕王燕王者與其子昆弟姦坐死故以燕感太后太后曰毋復言嫁女齊事事濅淫聞於上主父偃由此與齊有隙偃方幸用事因言齊臨菑十萬戶市租千金人衆殷富巨於長安非天子親弟愛子不得王此今齊王於親屬益疏乃從容言呂太后時齊欲反及吳楚時孝王幾為亂今聞齊王與其姊亂於是武帝拜偃為齊相且正其事偃至齊急治王後宮宦者為王通於姊翁主所者辭及王王年少懼以罪為吏所執誅乃飲藥自殺是時趙王懼主父偃一出敗齊恐其漸疏骨肉乃上書言偃受金及輕重之短天子亦因囚偃公孫弘曰齊王以憂死無後非誅偃無以塞天下之望偃遂坐誅厲王立五年國除濟北王志吳楚反時初亦與通謀後堅守不發兵故得不誅徒王菑川元朔中齊國絶悼惠王後唯有二國城陽菑川菑川地比齊武帝為悼惠王冢園在齊乃割臨菑東圜悼惠王冢園邑盡以豫菑川令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣五鳳中青州刺史奏終古使所愛奴與八子及諸御婢姦終古或參與被席或白晝使裸伏犬馬交接終古親臨觀産子輒曰亂不可知使去其子事下丞相御史奏終古位諸侯王以令置八子秩比六百石所以廣嗣重祖也而終古禽獸行亂君臣夫婦之別悖逆人倫請逮捕有詔削四縣二十八年薨子考王尚嗣五年薨子孝王橫嗣三十一年薨子懷王交嗣六年薨子永嗣王莽時絶贊曰悼惠之王齊最為大國以海內初定子弟少激秦弧立亡藩輔故大封同姓以填天下時諸侯得自除御史大夫群卿以下衆官如漢朝漢獨為置丞相自吳楚誅後稍奪諸侯權左官附益阿黨之法設其後諸侯唯得衣食租稅貧者或乘牛車
