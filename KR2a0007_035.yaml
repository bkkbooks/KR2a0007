body:
  text: 酈陸朱劉叔孫傳第十三酈食其陳留高陽人也好讀書家貧落魄無衣食業為里監門然吏縣中賢豪不敢役皆謂之狂生及陳勝項梁等起諸將徇地過高陽者數十人食其聞其將皆握齱好荷禮自用不能聽大度之言食其乃自匿後聞沛公略地陳留郊沛公麾下騎士適食其里中子沛公時時問邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大略此真吾所願從遊莫為我先若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒諸客冠儒來者沛公輒解其冠溺其中與人言常大罵未可以儒生説也食其曰第言之騎士從容言食其所戒者沛公至高陽傳舍使人召食其食其至入謁沛公方踞床令兩女子洗而見食其食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎沛公罵曰豎儒夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐謝之食其因言六國從衡時沛公喜賜食其食問曰計安出食其曰足下起瓦合之卒收散亂之兵不滿萬人欲以徑入強秦此所謂探虎口者也夫陳留天下之衝四通五達之郊也今其城中又多積粟臣知其令今請使令下足下即不聽足下舉兵攻之臣為內應於是遣食其往沛公引兵隨之遂下陳留號食其為廣野君食其言弟商使將數千人從沛公西南略地食其常為説客馳使諸侯漢三年秋項羽擊漢拔滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之韓信方東擊齊漢王數困滎陽成皋計欲捐成皋以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有臧粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成皋此乃天所以資漢方今楚易取而漢反卻自奪便臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海內搖蕩農夫釋耒紅女下機天下之心未有所定也願足下急復進兵收取滎陽據敖庾之粟塞成皋之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田間將二十萬之衆軍於歷城諸田宗強負海岱阻河濟南近楚齊人多變詐足下雖遣數十萬師未可以歲月破也臣請得奉明詔説齊王使為漢而稱東藩上曰善乃從其畫復守敖倉而使食其説齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王背約不與而王之漢中項王遷殺義帝漢王起蜀漢之兵擊三秦出關而責義帝之負處收天下之兵立諸侯之後降城即以侯其將得賂則以分其士與天下同其利豪英賢材皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印玩而不能授攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王可坐而策也夫漢王發蜀漢定三秦涉西河之外援上黨之兵下井陘誅成安君破北魏舉三十二城此黃帝之兵非人之力天之福也今已據敖庾之粟塞成皋之險守白馬之津杜太行之厄距飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然乃聽食其罷歷下兵守戰備與食其日縱酒韓信聞食其馮軾下齊七十餘城乃夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣己乃亨食其引兵走漢十二年曲周侯酈商以丞相將兵擊黥布有功高祖舉功臣思食其食其子疥數將兵上以其父故封疥為高梁侯後更食武陽卒子遂嗣三世侯平有罪國除陸賈楚人也以客從高祖定天下名有口辨居左右常使諸侯時中國初定尉他平南越因王之高祖使賈賜他印為南越王賈至尉他魋結箕踞見賈賈因説他曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣夫秦失其正諸侯豪桀並起唯漢王先入關據咸陽項籍背約自立為西楚霸王諸侯皆屬可謂至強矣然漢王起巴蜀鞭笞天下劫諸侯遂誅項羽五年之間海內平定此非人力天之所建也天子聞君王王南越而不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘燒君王先人冢墓夷種宗族使一偏將將十萬衆臨越即越殺王降漢如反覆手耳於是他乃蹶然起坐謝賈曰居蠻夷中久殊失禮義因問賈曰我孰與蕭何曹參韓信賢賈曰王似賢也復問曰我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅強楚為天下興利除害繼五帝三王之業統天下理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖判未始有也今王衆不過數萬皆蠻夷崎嶇山海間譬如漢一郡王何乃比於漢他大笑曰吾不起中國故王此使我居中國何遽不若漢乃大説賈留與飲數月曰越中無足與語至生來令我日聞所不聞賜賈橐中裝直千金它送亦千金賈卒拜他為南越王令稱臣奉漢約歸報高帝大説拜賈為太中大夫賈時時前説稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏鄉使秦以并天下行仁義法先聖陛下安得而有之高帝不懌有慚色謂賈曰試為我著秦所以失天下吾所以得之者乃古成敗之國賈凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬歲稱其書曰新語孝惠時呂太后用事欲王諸呂畏大臣及有口者賈自度不能爭之乃病免以好畤田地善往家焉有五男乃出所使越橐中裝賣千金分其子子二百金令為生産賈常乘安車駟馬從歌鼓瑟侍者十人寶劍直百金謂其子曰與女約過女女給人馬酒食極欲十日而更所死家得寶劍車騎侍從者一歲中以往來過它客率不過再過數擊鮮毋久溷女為也呂太后時王諸呂諸呂擅權欲劫少主危劉氏右丞相陳平患之力不能爭恐禍及己平常燕居深念賈往不請直入坐陳平方念不見賈賈曰何念深也平曰生揣我何念賈曰足下位為上相食三萬戶侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯絳侯與我戲易吾言君何不交歡太尉深相結為陳平畫呂氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉太尉亦報如之兩人深相結呂氏謀益壞陳平乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此遊漢廷公卿間名聲籍甚及誅呂氏立孝文賈頗有力孝文即位欲使人之南越丞相平乃言賈為太中大夫往使尉他去黃屋稱制令比諸侯皆如意指語在南越傳陸生竟以壽終朱建楚人也故嘗為淮南王黥布相有罪去後復事布布欲反時問建建諫止之布不聽聽梁父侯遂反漢既誅布聞建諫之高祖賜建號平原君家徙長安為人辨有口刻廉剛直行不苟合義不取容辟陽侯行不正得幸呂太后欲知建建不肯見及建母死貧未有以發喪方假貣服具陸賈素與建善乃見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我陸生曰前日君侯欲知平原君平原君義不知君以其母故今其母死君誠厚送喪則彼為君死矣辟陽侯乃奉百金裞列侯貴人以辟陽侯故往賻凡五百金久之人或毀辟陽侯惠帝大怒下吏欲誅之太后慚不可言大臣多害辟陽侯行欲遂誅之辟陽侯困急使人欲見建建辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺説曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君君何不肉袒為辟陽侯言帝帝聽君出辟陽侯太后大歡兩主俱幸君君富貴益倍矣於是閎籍孺大恐從其計言帝帝果出辟陽侯辟陽侯之囚欲見建建不見辟陽侯以為背之大怒及其成功出之大驚呂太后崩大臣誅諸呂辟陽侯與諸呂至深卒不誅計畫所以全者皆陸生平原君之力也孝文時淮南厲王殺辟陽侯以黨諸呂故孝文聞其客朱建為其策使吏捕欲治聞吏至門建欲自殺諸子及吏皆曰事未可知何自殺為建曰我死禍絶不及乃身矣遂自剄文帝聞而惜之曰吾無殺建意也乃召其子拜為中大夫使胸奴單于無禮罵單于遂死胸奴中婁敬齊人也漢五年戍隴西過雒陽高帝在焉敬脫挽輅見齊人虞將軍曰臣願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣虞將軍入言上上召見賜食已而問敬敬説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周之先自后稷堯封之邰積德絫善十餘世公劉避桀居豳大王以狄伐故去豳杖馬箠去居岐國人爭歸之及文王為西伯斷虞芮訟始受命呂望伯夷自海濱來歸之武王伐紂不期而會孟津上八百諸侯遂滅殷成王即位周公之屬傅相焉乃營成周都雒以為此天下中諸侯四方納貢職道里鈞矣有德則易以王無德則易以亡凡居此者欲令務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而為二天下莫朝周周不能制非德薄形勢弱也今陛下起豐沛收卒三千人以之徑往卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地父子暴骸中野不可勝數哭泣之聲不絶傷夷者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬭不扼其亢拊其背未能全勝今陛下入關而都按秦之故此亦扼天下之亢而拊其背也高帝問群臣群臣皆山東人爭言周王數百年秦二世則亡不如都周上疑未能決及留侯明言入關便即日駕西都關中於是上曰本言都秦地者婁敬婁者劉也賜姓劉氏拜為郎中號曰奉春君漢七年韓王信反高帝自往擊至晉陽聞信與胸奴欲擊漢上大怒使人使胸奴胸奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言胸奴易擊上使劉敬復往使胸奴還報曰兩國相擊此宜夸矜見所長今臣往徒見羸胔老弱此必欲見短伏奇兵以爭利愚以為胸奴不可擊也是時漢兵以踰句注三十餘萬衆兵已業行上怒罵敬曰齊虜以舌得官乃今妄言沮吾軍械繫敬廣武遂往至平城胸奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十輩言可擊者矣乃封敬二千戶為關內侯號建信侯高帝罷平城歸韓王信亡入胡當是時冒頓單于兵強控弦四十萬騎數苦北邊上患之問敬敬曰天下初定士卒罷於兵革未可以武服也冒頓殺父代立妻群母以力為威未可以仁義説也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺使辨士風諭以禮節冒頓在固為子壻死外孫為單于豈曾聞孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之胸奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約敬從胸奴來因言胸奴河南白羊樓煩王去長安近者七百里輕騎一日一夕可以至秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與今陛下雖都關中實少人北近胡寇東有六國強族一日有變陛下亦未得安枕而臥也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後乃豪傑名家且實關中無事可以備胡諸侯有變亦足率以東伐此強本弱末之術也上曰善乃使劉敬徙所言關中十餘萬口叔孫通薛人也秦時以文學徵待詔博士數歲陳勝起二世召博士諸儒生問曰楚戍卒攻蘄入陳於公何如博士諸生三十餘人前曰人臣無將將則反罪死無赦願陛下急發兵擊之二世怒作色通前曰諸生言皆非夫天下為一家毀郡縣城鑠其兵視天下弗復用且明主在上法令具於下吏人人奉職四方輻輳安有反者此特群盜鼠竊狗盜何足置齒牙間哉郡守尉今捕誅何足憂二世喜盡問諸生諸生或言反或言盜於是二世令御史按諸生言反者下吏非所宜言諸生言盜者皆罷之乃賜通帛二十匹衣一襲拜為博士通已出反舍諸生曰生何言之諛也通曰公不知我幾不免虎口乃亡去之薛薛已降楚矣及項梁之薛通從之敗定陶從懷王懷王為義帝徙長沙通留事項王漢二年漢王從五諸侯入彭城通降漢王通儒服漢王憎之乃變其服服短衣楚製漢王喜通之降漢從弟子百餘人然無所進剸言諸故群盜壯士進之弟子皆曰事先生數年幸得從降漢今不進臣等剸言大猾何也通乃謂曰漢王方蒙矢石爭天下諸生寧能鬭乎故先言斬將搴旗之士諸生且待我我不忘矣漢王拜通為博士號稷嗣君漢王已并天下諸侯共尊為皇帝於定陶通就其儀號高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼拔劍擊柱上患之通知上益饜之説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀高帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之於是通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積德而後可興也吾不忍為公所為公所為不合古吾不行公往矣毋污我通笑曰若真鄙儒不知時變遂與所徵三十人西及上左右為學者與其弟子百餘人為綿蕞野外習之月餘通曰上可試觀上使行禮曰吾能為此乃令群臣習肄會十月漢七年長樂宮成諸侯群臣朝十月儀先平明謁者治禮引以次入殿門廷中陳車騎戍卒衛官設兵張旗志傳曰趨殿下郎中俠陛陛數百人功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉大行設九賓臚句傳於是皇帝輦出房百官執戟傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒諸侍坐殿上皆伏抑首以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢歡譁失禮者於是高帝曰吾乃今日知為皇帝之貴也拜通為奉常賜金五百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務九年高帝徙通為太子太傳十二年高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳通曰太子天下本本一搖天下震動奈何以天下戲高帝曰吾聽公及上置酒見留侯所招客從太子見上遂無易太子志矣高帝崩孝惠即位乃謂通曰先帝園陵寢廟群臣莫習徒通為奉常定宗廟儀法及稍定漢諸儀法皆通所論著也惠帝為東朝長樂宮及問往數蹕煩民作復道方築武庫南通奏事因請間曰陛下何自築復道高帝寢衣冠月出遊高廟子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟惠帝常出遊離宮通曰古者有春嘗果方今櫻桃孰可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興贊曰高祖以征伐定天下而縉紳之徒騁其知辨並成大業語曰廊廟之材非一木之枝帝王之功非一士之略信哉劉敬脫挽輅而建金城之安叔孫通舍枹鼓而立一王之儀遇其時也酈生自匿監門待主然後出猶不免鼎鑊朱建始名廉直既距辟陽不終其節亦以喪身陸賈位止大夫致仕諸呂不受憂責從容平勃之間附會將相以強社稷身名俱榮其最優乎
