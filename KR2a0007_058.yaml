body:
  text: 嚴朱吾丘主父徐嚴終王賈傳第三十四下嚴安者臨災人也以故丞相史上書曰臣聞鄒子曰政教文質者所以云救也當時則用過則舍之有易則易之故守一而不變者未睹治之至也今天下人民用財侈靡車馬衣裘宮室皆競修飾調五聲使有節族雜五色使有文章重五味方丈於前以觀欲天下彼民之情見美則願之是教民以侈也侈而無節則不可贍民離本而徼末矣末不可徒得故搢紳者不憚為詐帶劍者夸殺人以矯奪而世不知愧故姦軌浸長夫佳麗珍怪固順於耳目故養失而泰樂失而淫禮失而采教失而偽偽采淫泰非所以範民之道也是以天下人民逐利無已犯法者衆臣願為民制度以防其淫使貧富不相耀以和其心心既和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則陰陽和四時正風雨時草木暢茂五穀蕃孰六畜遂字民不夭厲和之至也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪匡正海內以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行強陵弱衆暴寡田常篡齊六卿分晉並為戰國此民之始苦也於是強國務攻弱國修守合從連衡馳車轂擊介胄生蟣蝨民無所告訴及至秦王蠶食天下并吞戰國稱號皇帝一海內之政壞諸侯之城銷其兵鑄以為鍾虡示不復用元元黎民得免於戰國逢明天子人人自以為更生鄉使秦綬刑罰薄賦斂省繇役貴仁義賤權利上篤厚下佞巧變風易俗化於海內則世世必安矣秦不行是風循其故俗為知巧權利者進篤厚忠正者退法嚴令苛讇諛者衆日聞其美意廣心逸欲威海外使蒙恬將兵以北攻強胡辟地進境戍於北河飛芻挽粟以隨其後又使尉屠睢將樓般之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絶越人擊之秦兵大敗秦乃使尉他將卒以戍越當是時秦禍北構於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔陳勝吳廣舉陳武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然本皆非公侯之後非長官之吏無尺寸之勢起閭巷杖棘矜應時而動不謀而俱起不約而同會壤長地進至乎伯王時教使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入胸奴燔其龍城議者美之此人臣之利非天下之長策也今中國無狗吠之警而外纍於遠方之備靡敝國家非所以子民也行無窮之欲甘心快意結怨於胸奴非所以安邊也禍拿而不解兵休而復起近者愁苦遠者驚駭非所以持久也今天下鍛甲摩劍矯箭控弦輔輸軍糧未見休時此天下所共憂也夫兵久而變起事煩而慮生今外郡之地或幾千里列城數十形束壤制帶脅諸侯非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也後以安為騎馬令終軍字子雲濟南人也少好學以辨博能屬文聞於郡中年十八選為博士弟子至府受遺太守聞其有異材召見軍甚奇之與交結軍揖太守而去至長安上書言事武帝異其文拜軍為謁者給事中從上幸雍祠五畤獲白麟一角而五蹄時又得奇木其枝旁出輒復合於木上上異此二物博謀群臣軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚群正朔不及其俗有司臨境而東甌內附閩王伏辜南越賴救北胡隨畜薦居禽獸行虎狼心上古未能攝大將軍秉鉞單于奔幕票騎抗旌昆邪右衽是澤南洽而威北暢也若罰不阿近舉不遺遠設官俟賢縣賞待功能者進以保祿罷者退而勞力刑於宇內矣履衆美而不足懷聖明而不專建三宮之文質章厥職之所宜封禪之君無聞焉夫天命初定萬事草創及臻六合同風九州共貫必待明聖潤色祖業傳於無窮故周至成王然後制定而休徵之應見陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宮獻享之精交神積和之氣塞明而異獸來獲宜矣昔武王中流未濟白魚入於王舟俯取以燎群公咸曰休哉今郊祀未見於神祇而獲獸以饋此天之所以示饗而上通之符合也宜因昭時令日改定告元苴白茅於江淮發嘉號于營丘以應緝熙使著事者有紀焉蓋六鶂退飛逆也白魚登舟順也夫明暗之徵上亂飛鳥下動淵魚各以類推今野獸并角明同本也衆支內附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而蒙化者焉斯拱而俟之耳對奏上甚異之由是改元為元狩後數月越地及胸奴名王有率衆來降者時皆以軍言為中元鼎中博士徐偃使行風俗偃矯制使膠東魯國鼓鑄鹽鐵還奏事徙為太常丞御史大夫張湯劾偃矯制大害法至死偃以為春秋之義大夫出疆有可以安社稷存萬民顓之可也湯以致其法不能詘其義有詔下軍問狀軍詰偃曰古者諸侯國異俗分百里不通時有聘會之事安危之勢呼吸成變故有不受辭造命顓己之宜今天下為一萬里同風故春秋王者無外偃巡封域之中稱以出疆何也且鹽鐵郡有餘臧正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地率其用器食鹽不足以并給二郡邪將勢宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也今魯國之鼓當先具其備至秋乃能舉火此言與實反者非偃已前三奏無詔不惟所為不許而直矯作威福以從民望干名采譽此明聖所必加誅也枉尺直尋孟子稱其不可今所犯罪重所就者小偃自豫必死而為之邪將幸誅不加欲以采名也偃窮詘服罪當死軍奏偃矯制顓行非奉使體請下御史徵偃即罪奏可上善其詰有詔示御史大夫初軍從濟南當詣博士步入關關吏豫軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去軍為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也軍行郡國所見便宜以聞還奏事上甚説當發使胸奴軍自請曰軍無橫草之功得列宿衛食祿五年邊境時有風塵之警臣宜被堅執鋭當矢石啓前行駑下不習金革之事今聞將遣胸奴使者臣願盡精厲氣奉佐明使畫吉凶於單于之前臣年少材下孤於外官不足以亢一方之任竊不勝憤悶詔問畫吉凶之狀上奇軍對擢為諫大夫南越與漢和親乃遣軍使南越説其王欲令入朝比內諸侯軍自請願受長纓必羈南越王而致之闕下車遂往説越王越王聽許請舉國內屬天子大説賜南越大臣印綬一用漢法以新改其俗令使者留填撫之越相呂嘉不欲內屬發兵攻殺其王及漢使者皆死語在南越傳軍死時年二十餘故世謂之終童王褒字子淵蜀人也宣帝時修武帝故事講論六藝群書博盡奇異之好徵能為楚辭九江被公召見誦讀益召高材劉向張子僑華龍柳褒等待詔金馬門神爵五鳳之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者渤海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於衆庶聞王褒有俊材請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時泛鄉侯何武為僮子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之褒既為刺史作頌又作其傳益州刺史因奏褒有軼材上乃徵褒既至詔褒為聖主得賢臣頌其意褒對曰夫荷旃被毳者難與道純綿之麗密羹藜唅糗者不足與論太牢之滋味今臣辟在西蜀生於窮巷之中長於蓬茨之下無有遊觀廣覽之知顧有至愚極陋之纍不足以塞厚望應明指雖然敢不略陳愚而抒情素記曰共惟春秋法五始之要在乎審己正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之朴清水焠其鋒越砥斂其咢水斷蛟龍陸剸犀革忽若彗泛畫塗如此則使離褸督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝策而不進於行胸喘膚汗人極馬倦及至駕齧膝驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之暖者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海內也是以嘔喻受之開寬裕之路以延天下英俊也夫竭知附賢者必建仁策索人求士者必樹伯迹昔周公躬吐捉之勞故有圉空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠則上不然其信進仕不得施效斥逐又非其愆是故伊尹勤於鼎俎太公困於鼓刀百里自鬻寧子飯牛離此患也及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術去卑辱奧泄而升本朝離疏釋蹻而享膏粱剖符錫壤而光祖考傳之子孫以資説士故世必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀俟秋吟蜉蝤出以陰易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊艾將自至若堯舜禹湯文武之君獲稷契皋陶伊尹呂望明明在朝穆穆列布聚精會神相得益章雖伯牙操遞鍾逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而弘功業俊士亦俟明主以顯其德上下俱欲歡然交欣千載一合論説無疑翼乎如鴻毛過順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行化溢四表橫被無窮遐夷貢獻萬祥畢溱是以聖王不遍窺望而視已明不單頃耳而聽已聰恩從祥風翱德與和氣遊太平之責塞優遊之望得遵遊自然之勢恬淡無為之場休徵自至壽考無疆雍容垂拱永永萬年何必偃卬詘信若彭祖詬噓呼吸如僑松眇然絶俗離世哉詩云濟濟多士文王以寧蓋信乎其以寧也是時上頗好神仙故褒對及之上令褒與張子僑等並待詔數從褒等放獵所幸宮館輒為歌頌第其高下以差賜帛議者多以為淫靡不急上曰不有博奕者乎為之猶賢乎已辭賦大者與古詩同義小者辨麗可喜辟如女工有綺縠音樂有鄭衛今世俗猶皆以此虞説耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博奕遠矣頃之擢褒為諫大夫其後太子體不安苦忽忽善忘不樂詔使褒等皆之太子宮虞侍太子朝夕誦讀奇文及所自造作疾平復乃歸太子喜褒所為甘泉及洞簫頌令後宮貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀致也宣帝使褒往祀焉褒於道病死上閔惜之賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門初武帝征南越元封元年立儋耳珠崖郡皆在南方海中洲居廣袤可千里合十六縣戶二萬三千餘其民暴惡自以阻絶數犯吏禁吏亦酷之率數年一反殺吏漢輒發兵擊定之自初為郡至昭帝始元元年二十餘年間凡六反叛至其五年罷儋耳郡并屬珠崖至宣帝神爵三年珠崖三縣復反反後七年甘露元年九縣反輒發兵擊定之元帝初元元年珠崖又反發兵擊之諸縣更叛連年不定上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠崖內屬為郡久矣今背畔逆節而云不當擊長蠻夷之亂虧先帝功德經義何以處之捐之對曰臣幸得遭明盛之朝蒙危言之策無忌諱之患敢昧死竭卷卷臣聞堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不強治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荊北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻此非兵革之所能致及其衰也南征不還齊桓救其難孔子定其文以至乎秦興兵遠攻貪外虛內務欲廣地不慮其害然地南不過閩越北不過太原而天下潰畔禍卒在於二世之末長城之歌至今未絶賴聖漢初興為百姓請命平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻當此之時逸遊之樂絶奇麗之賂塞鄭衛之倡微矣夫後宮盛色則賢者隱處佞人用事則諍臣杜口而文帝不行故諡為孝文廟稱太宗至孝武皇帝元狩六年太倉之粟紅腐而不可食都內之錢貫朽而不可校乃探平城之事録冒頓以來數為邊害籍兵厲馬因富民以攘服之西連諸國至于安息東過碣石以玄菟樂浪為郡北卻胸奴萬里更起營塞制南海以為八郡則天下斷獄萬數民賦數百造鹽鐵酒榷之利以佐用度猶不能足當此之時寇賊並起軍旅數發父戰死於前子鬭傷於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭遙設虛祭想魂乎萬里之外淮南王盜寫虎符陰聘名士關東公孫勇等詐為使者是皆廓地泰大征代不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救助飢饉保全元元也詩云蠢爾蠻荊大邦為讎言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何況乃復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中霧露氣溼多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠崖有珠犀玳瑁也棄之不足惜不擊不損威其民譬猶魚鱉何足貪也臣竊以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師遠攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠崖專用恤關東為憂對奏上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今關東困乏民難搖動捐之議是上乃從之遂下詔曰珠崖虜殺吏民背畔為逆今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田通于時變則憂萬民夫萬民之飢餓與遠蠻之不討危孰大焉且宗廟之祭凶年不備況乎辟不嫌之辱哉今關東大困倉庫空虛無以相贍又以動兵非特勞民凶年隨之其罷珠崖郡民有慕義欲內屬便處之不欲勿強珠崖由是罷捐之數召見言多納用時中書令石顯用事捐之數短顯以故不得官後稀復見而長安令楊興新以材能得幸與捐之相善捐之欲得召見謂興曰京兆尹缺使我得見言君蘭京兆尹可立得興曰縣官嘗言興愈薛大夫我易助也君房下筆言語妙天下使君房為尚書令勝五鹿充宗遠甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍期思侯並可為諸曹皆如言又薦謁者滿宣立為冀州刺史言中謁者不宜受事宦者不宜入宗廟立止相薦之信不當如是乎興曰我復見言君房也捐之復短石顯興曰顯鼎貴上信用之今欲進弟從我計且與合意即得入矣捐之即與興共為薦顯奏曰竊見石顯本山東名族有禮義之家也持正六年未嘗有過明習於事敏而疾見出公門入私門宜賜爵關內侯引其兄弟以為諸曹又共為薦興奏曰竊見長安令興幸得以知名數召見興事父母有曾氏之孝事師有顏閔之材榮名聞於四方明詔舉茂材列侯以為首為長安令吏民敬鄉道路皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絶私則尹翁歸興兼此六人而有之守道堅固執義不回臨大節而不可奪國之良臣也可試守京兆尹石顯聞知白之上乃下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懷詐偽以上語相風更相薦譽欲得大位漏泄省中語罔上不道書曰讒説殄行震驚朕師王制順非而澤不聽而誅請論如法捐之竟坐棄市興減死罪一等髡鉗為城旦成帝時至部刺史贊曰詩稱戎狄是膺荊舒是懲久矣其為諸夏患也漢興征伐胡越於是為盛究觀淮南捐之主父嚴安之義深切著明故備論其語世稱公孫弘排主父張湯陷嚴助石顯譖捐之察其行迹主父求欲鼎亨而得族嚴賈出入禁門招權利死皆其所也亦何排陷之恨哉
