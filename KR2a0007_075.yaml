body:
  text: 匡張孔馬傳第五十一匡衡字稚圭東海承人也父世農夫至衡好學家貧庸作以供資用尤精力過絶人諸儒為之語曰無説詩匡鼎來匡説詩解人頤衡射策甲科以不應令除為太常掌故調補平原文學學者多上書薦衡經明當世少雙令為文學就官京師後進皆欲從衡平原衡不宜在遠方事下太子太傅蕭望之少府梁丘賀問衡對詩諸大義其對深美望之奏衡經學精習説有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之會宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦高充位而已與望之有隙長安令楊興説高曰將軍以親戚輔政貴重於天下無二然衆庶論議令問休譽不專在將軍者何也彼誠有所聞也以將軍之莫府海內莫不卬望而所舉不過私門賓客乳母子弟人情忽不自知然一夫竊議語流天下夫富貴在身而列士不譽是有狐白之裘而反衣之也古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以食難得之故而曰飽不待食或之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在遠方將軍誠召置莫府學士歙然歸仁與參事議觀其所有貢之朝廷必為國器以此顯示衆庶名流於世高然其言辟衡為議曹史薦衡於上上以為郎中遷博士給事中是時有日蝕地震之變上問以政治得失衡上疏曰臣聞五帝不同禮三王各異教民俗殊務所遇之時異也陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉恥之節薄淫辟之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆苟合徼幸以身設利不改其原雖歲赦之刑猶難使錯而不用也臣愚以為宜一曠然大變其俗孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭好仁樂施則下不暴上義高節則民興行寬柔和惠則衆相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也今俗吏之治皆不本禮讓而上克暴或忮害好陷人於罪貪財而慕勢故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色鄭伯好勇而國人暴虎秦穆貴信而士多從死陳夫人好巫而民淫祀晉侯好儉而民畜聚太王躬仁邠國貴恕由此觀之治天下者審所上而已今之偽薄忮害不讓極矣臣聞教化之流非家至而人説之也賢者在位能者布職朝廷崇禮百僚敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知是以百姓安陰陽和神靈應而嘉祥見詩曰商邑翼翼四方之極壽考且寧以保我後生此成湯所以建至治保子孫化異俗而懷鬼方也今長安天子之都親承聖化然其習俗無以異於遠方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相蕩善惡有以相推事作乎下者象動乎上陰陽之理各應其感陰變則靜者動陽蔽則明者暗水旱之災隨類而至今關東連年飢饉百姓乏困或至相食此皆生於賦斂多民所共者大而吏安集之不稱之效也陛下祗畏天戒哀閔元元大自減損省甘泉建章宮衛罷珠崖偃武行文將欲度唐虞之隆絶殷周之衰也諸見罷珠崖詔書者莫不欣欣人自以將見太平也宜遂減宮室之度省靡麗之飾考制度修外內近忠正遠巧佞放鄭衛進雅頌舉異材開直言任溫良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務明自然之道博和睦之化以崇至仁匡失俗易民視令海內昭然咸見本朝之所貴道德弘於京師淑問揚乎疆外然後大化可成禮讓可興也上説其言遷衡為光祿大夫太子少傅時上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之德而褒大其功昔者成王之嗣位思述文武之道以養其心休烈盛美皆歸之二后而不敢專其名是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖德天覆子愛海內然陰陽未和姦邪未禁者殆論議者未丕揚先帝之盛功爭言制度不可用也務變更之所更或不可行而復復之是以群下更相是非吏民無所信臣竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事留神於遵制揚功以定群下之心大雅曰無念爾祖聿修厥德孔子著之孝經首章蓋至德之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化治性之道必審己之所有餘而強其所不足蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽勇猛剛強者戒於大暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖德臣又聞室家之道修則天下之理得故詩始國風禮本冠婚始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家道之衰莫不始乎梱內故聖王必慎妃后之際別適長之位禮之於內也卑不隃尊新不先故所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜遊燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義陛下聖德純備莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對言多法義上以為任公卿由是為光祿勳御史大夫建昭三年代韋玄成為丞相封樂安侯食邑六百戶元帝崩成帝即位衡上疏戒妃匹勸經學威儀之則曰陛下秉至孝哀傷思慕不絶於心未有遊虞弋射之宴誠隆於慎終追遠無窮已也竊願陛下雖聖性得之猶復加聖心焉詩云煢煢在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也臣又聞之師曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好仇言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世已來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬遠技能竊見聖德純茂專精詩書好樂無厭臣衡材駑無以輔相善義宣揚德音臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也故審六藝之指則人天之理可得而和草木昆蟲可得而育此永永不易之道也及論語孝經聖人言行之要宜究其意臣又聞聖王之自為動靜周旋奉天承親臨朝享臣物有節文以章人倫蓋欽翼祗粟事天之容也溫恭敬遜承親之禮也正躬嚴恪臨衆之儀也嘉惠和説饗下之顏也舉錯動作物遵其儀故形為仁義動為法則孔子曰德義可尊容止可觀進退可度以臨其民是以其民畏而愛之則而象之大雅云敬慎威儀惟民之則諸侯正月朝覲天子天子惟道德昭穆穆以視之又觀以禮樂饗醴乃歸故萬國莫不獲賜祉福蒙化而成俗今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動靜之節使群下得望盛德休光以立基楨天下幸甚上敬納其言頃之衡復奏正南北郊罷諸淫祀語在郊祀志初元帝時中書令石顯用事自前相韋玄成及衡皆畏顯不敢失其意至成帝初即位衡乃與御史大夫甄談共奏顯追條其舊惡并及黨與於是司隸校尉王尊劾奏衡談居大臣位知顯等專權勢作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒罪至不道有詔勿劾衡慚懼上疏謝罪因稱病乞骸骨上丞相樂安侯印綬上報曰君以道德修明位在三公先帝委政遂及朕躬君遵修法度勤勞公家朕嘉與君同心合意庶幾有成今司隸校尉尊妄詆欺加非於君朕甚閔焉方下有司問狀君何疑而上書歸侯乞骸骨是章朕之未燭也傳不云乎禮義不愆何恤人之言君其察焉專精神近醫藥強食自愛因賜上尊酒養牛衡起視事上以新即位褒優大臣然群下多是王尊者衡默默不自安每有水旱風雨不時連乞骸骨讓位上輒以詔書慰撫不許久之衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟且謀篡昌事發覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡專地盜土衡竟坐免初衡封僮之樂安鄉鄉本田隄封三千一百頃南以閩佰為界初元元年郡圖誤以閩佰為平陵佰積十餘歲衡封臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡乃定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰主簿陸賜故居奏曹習事曉知國界署集曹掾明年治計時衡問殷國界事曹欲奈何殷曰賜以為舉計令郡實之恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書亦不告曹使舉也聽曹為之後賜與屬明舉計曰案故圖樂安鄉南以平陵佰為界不從故而以閩佰為界解何郡即復以四百頃付樂安國衡遣從史之僮收取所還田穀千餘石入衡家司隸校尉駿少府忠行廷尉事劾奏衡監臨盜所主守直十金以上春秋之義諸侯不得專地所以一統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盜土以自益及賜明阿承衡意猥舉郡計亂減縣界附下罔上擅以地附益大臣皆不道於是上可其奏勿治丞相免為庶人終於家子咸亦明經歷位九卿家世多為博士者張禹字子文河內軹人也至禹父徙家蓮勺禹為兒數隨家至市喜觀於卜相者前久之頗曉其別蓍布卦意時從旁言卜者愛之又奇其面貌謂禹父是兒多知可令學經及禹壯至長安學從沛郡施讎受易琅邪王陽膠東庸生問論語既皆明習有徒衆舉為郡文學甘露中諸儒薦禹有詔太子太傅蕭望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事奏寢罷歸故官久之試為博士初元中立皇太子而博士鄭寬中以尚書授太子薦言禹善論語詔令禹授太子論語由是遷光祿大夫數歲出為東平內史元帝崩成帝即位徵禹寬中皆以師賜爵關內侯寬中食邑八百戶禹六百戶拜為諸吏光祿大夫秩中二千石給事中領尚書事是時帝舅陽平侯王鳳為大將軍輔政專權而上富於春秋謙讓方鄉經學敬重師傅而禹與鳳並領尚書內不自安數病上書乞骸骨欲退避鳳上報曰朕以幼年執政萬機懼失其中君以道德為師故委國政君何疑而數乞骸骨忽忘雅素欲避流言朕無聞焉君其固心致思總秉諸事推以孳孳無違朕意加賜黃金百斤養牛上尊酒太官致餐侍醫視疾使者臨問禹惶恐復起視事河平四年代王商為丞相封安昌侯為相六歲鴻嘉元年以老病乞骸骨上加優再三乃聽許賜安車駟馬黃金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百戶天子數加賞賜前後數千萬禹為人謹厚內殖貨財家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈它財物稱是禹性習知音聲內奢淫身居大第後堂理絲竹管弦禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而疏之崇每候禹常責師宜置酒設樂與弟子相娛禹將崇入後堂飲食婦女相對優人管弦鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉卮酒相對宣未嘗得至後堂及兩人皆聞知各自得也禹年老自治冢瑩起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭它所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出遊道禹為師傅不遵謙讓至求衣冠所遊之道又徙壞舊亭重非所宜孔子稱賜愛其羊我愛其禮宜更賜禹它地根雖為舅上敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毀惡之天子愈益敬厚禹禹每病輒以起居聞車駕自臨問之上親拜禹床下禹頓首謝恩因歸誠言老臣有四男一女愛女甚於男遠嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為弘農太守又禹小子未有官上臨候禹禹數視其小子上即禹床下拜為黃門郎給事中禹雖家居以特進為天子師國家每有大政必與定議永始元延之間日蝕地震尤數吏民多上書言災異之應譏切王氏專政所致上懼變異數見意頗然之未有以明見乃車駕至禹弟辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨禹則謂上曰春秋二百四十二年間日蝕三十餘地震五或為諸侯相殺或夷狄侵中國災變之異深遠難見故聖人罕言命不語怪神性與天道自子贛之屬不得聞何況淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜此經義意也新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹禹見時有變異若上體不安擇日潔齋露蓍正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對己問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋玄成皆説論語篇弟或異禹先事王陽後從庸生采獲所安最後出而尊貴諸儒為之語曰欲為論念張文由是學者多從張氏餘家寖微孔光字子夏孔子十四世之孫也孔子生伯魚鯉鯉生子思伋伋生子上帛帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳涉博士死陳下鮒弟子襄為孝惠博士長沙太傅襄生忠忠生武及安國武生延年延年生霸字次儒霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為太中大夫以選授皇太子經遷詹事高密相是時諸侯王相在郡守上元帝即位徵霸以師賜爵關內侯食邑八百戶號褒成君給事中加賜黃金二百斤第一區徙名數于長安霸為人謙退不好權勢常稱爵位泰過何德以堪之上欲致霸相位自御史大夫貢禹卒及薛廣德免輒欲拜霸霸讓位自陳至三上深知其至誠乃弗用以是敬之賞賜甚厚及霸薨上素服臨弔者再至賜東園祕器錢帛策贈以列侯禮諡曰烈君霸四子長子福嗣關內侯次子捷捷弟喜皆列校尉諸曹光最少子也經學尤明年未二十舉為議郎光祿勳匡衡舉光方正為諫大夫坐議有不合左遷虹長自免歸教授成帝初即位舉為博士數使録冤獄行風俗振贍流民奉使稱旨由是知名是時博士進三科高為尚書次為刺史其不通政事以久次補諸侯太傅光以高第為尚書觀故事品式數歲明習漢制及法令上甚信任之轉為僕射尚書令有詔光周密謹慎未嘗有過加諸吏官以子男放為侍郎給事黃門數年遷諸吏光祿大夫秩中二千石給事中賜黃金百斤領尚書事後為光祿勳復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合如或不從不敢強諫爭以是久而安時有所言輒削草稿以為章主之過以姦忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光默不應更答以它語其不泄如是光帝師傅子少以經行自著進官蚤成不結黨友養遊説有求於人既性自守亦其勢然也徙光祿勳為御史大夫綏和中上即位二十五年無繼嗣至親有同産弟中山孝王及同産弟子定陶王在定陶王好學多材於帝子行而王祖母傅太后陰為王求漢嗣私事趙皇后昭儀及帝舅大司馬驃騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍廉褒後將軍朱博皆引入禁中議中山定陶王誰宜為嗣者方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣褒博皆如方進根議光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議以為令犯法者各以法時律令論之明有所訖也長犯大逆時乃始等見為長妻已有當坐之罪與身犯法無異後乃棄去於法無以解請論光議以為大逆無道父母妻子同産無少長皆棄市欲懲後犯法者也夫婦之道有義則合無義則離長未自知當坐大逆之法而棄去乃始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是是歲右將軍褒後將軍博坐定陵紅陽侯皆免為庶人以光為左將軍居右將軍官職執金吾王咸為右將軍居後將軍官職罷後將軍官數月丞相方進薨召左將軍光當拜已刻侯印書贊上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由己出朝廷翕然望至治焉褒賞大臣益封光千戶時成帝母太皇太后自居長樂宮而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房復道通未央宮傅太后果從復道朝夕至帝所求欲稱尊號貴寵其親屬使上不得直道行頃之太后從弟子傅遷在左右尤傾邪上免官遣歸故郡傅太后怒上不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖德誠不小愆陛下以變異連見避正殿見群臣思求其故至今未有所改臣請歸遷故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號群下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可上重違大臣正議又內迫傅太后猗違者連歲丹以罪免而朱博代為大司空光自先帝時議繼嗣有持異之隙矣又重忤傅太后指由是傅氏在位者與朱博為表裏共毀譖光後數月遂策免光曰丞相者朕之股肱所與共承宗廟統理海內輔朕之不逮以治天下也朕既不明災異重仍日月無光山崩河決五星失行是章朕之不德而股肱之不良也君前為御史大夫輔翼先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉陰陽錯謬歲比不登天下空虛百姓飢饉父子分散流離道路以十萬數而百官群職曠廢姦軌放縱盜賊並起或攻官寺殺長吏數以問君君無怵惕憂懼之意對毋能為是以群卿大夫咸惰哉莫以為意咎由君焉君秉社稷之重總百僚之任上無以匡朕之闕下不能綏安百姓書不云乎毋曠庶官天工人其代之於呼君其上丞相博山侯印綬罷歸光退閭里杜門自守而朱博代為丞相數月坐承傅太后指妄奏事自殺平當代為丞相數月薨王嘉復為丞相數諫爭忤指旬歲間閲三相議者皆以為不及光上由是思之會元壽元年正月朔日有蝕之後十餘日傅太后崩是月徵光詣公車問日蝕事光對曰臣聞日者衆陽之宗人君之表至尊之象君德衰微陰道盛強侵蔽陽明則日蝕應之書曰羞用五事建用皇極如貌言視聽思失大中之道不立則咎徵薦臻六極屢降皇之不極是為大中不立其傳曰時則有日月亂行謂朓側匿甚則薄蝕是也又曰六沴之作歲之朝曰三朝其應至重乃正月辛丑朔日有蝕之變見三朝之會上天聰明苟無其事變不虛生書曰惟先假王正厥事言異變之來起事有不正也臣聞師曰天左與王者故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉其至可必詩曰敬之敬之天惟顯思命不易哉又曰畏天之威于時保之皆謂不懼者凶懼之則吉也陛下聖德聰明兢兢業業承順天戒敬畏變異勤心虛己延見群臣思求其故然後敕躬自約總正萬事放遠讒説之黨援納斷斷之介退去貪殘之徒進用賢良之吏平刑罰薄賦斂恩澤加於百姓誠為政之大本應變之至務也天下幸甚書曰天既付命正厥德言正德以順天也又曰天棐諶辭言有誠道天輔之也明承順天道在於崇德博施加精致誠孳孳而已俗之祈禳小數終無益於應天塞異銷禍興福較然甚明無可疑惑書奏上説賜光束帛拜為光祿大夫秩中二千石給事中位次丞相詔光舉可尚書令者封上光謝曰臣以朽材前比歷位典大職卒無尺寸之效幸免罪誅全保首領今復拔擢備內朝臣與聞政事臣光智謀淺短犬馬齒臷誠恐一旦顛仆無以報稱竊見國家故事尚書以久次轉遷非有踔絶之能不相踰越尚書僕射敝公正勤職通敏於事可尚書令謹封上敝以舉故為東平太守敝姓成公東海人也光為大夫月餘丞相嘉下獄死御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯上乃知光前免非其罪以過近臣毀短光者復免傅嘉曰前為侍中毀譖仁賢誣訴大臣令俊艾者久失其位嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意詩不云乎讒人罔極交亂四國其免嘉為庶人歸故郡明年定三公官光更為大司徒會哀帝崩太皇太后以新都侯王莽為大司馬徵立中山王是為平帝帝年幼太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光為舊相名儒天下所信太后敬之備禮事光所欲搏擊輒為草以太后指風光令上之崖眥莫不誅傷莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衛供養行內署門戶省服御食物明年徙為太師而莽為太傅光常稱疾不敢與莽並有詔朝朔望領城門兵莽又風群臣奏莽功德稱宰衡位在諸侯王上百官統焉光愈恐固稱疾辭位太后詔曰太師光聖人之後先師之子德行純淑道術通明居四輔職輔道于帝今年耆有疾俊艾大臣惟國之重其猶不可以闕焉書曰無遺耇老國之將興尊師而重傅其令太師毋朝十日一賜餐賜太師靈壽杖黃門令為太師省中坐置几太師入省中用杖賜餐十七物然後歸老于弟官屬按職如故光凡為御史大夫丞相各再一為大司徒太傅太師歷三世居公輔位前後十七年自為尚書止不教授後為卿時會門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿策贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供張諫大夫持節與謁者二人使護喪事博士護行禮太后亦遣中謁者持節視喪公卿百官會弔送葬載以乘輿轀輬及副各一乘羽林孤兒諸生合四百人挽送車萬餘兩道路皆舉音以過喪將作穿復土可甲卒五百人起墳如大將軍王鳳制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千戶病甚上書讓還七千戶及還所賜一弟子放嗣莽篡位後以光兄子永為大司馬封侯昆弟子至卿大夫四五人始光父霸以初元元年為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師褒成君關內侯霸以所食邑八百祀孔子焉故霸還長子福名數於魯奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千戶莽更封為褒成侯後避王莽更名均馬宮字遊卿東海戚人也治春秋嚴氏以射策甲科為郎遷楚長史免官後為丞相史司直師丹薦宮行能高潔遷廷尉平青州刺史汝南九江太守所在見稱徵為詹事光祿勳右將軍代孔光為大司徒封扶德侯光為太師薨宮復代光為太師兼司徒官初宮哀帝時與丞相御史雜議帝祖母傅太后諡及元始中王莽發傅太后陵徙歸定陶以民葬之追誅前議者宮為莽所厚獨不及內慚懼上書謝罪乞骸骨莽以太皇太后詔賜宮策曰太師大司徒扶德侯上書言前以光祿勳議故定陶共王母諡曰婦人以夫爵尊為號諡宜日孝元傅皇后稱渭陵東園臣知妾不得體君卑不得敵尊而希指雷同詭經辟説以惑誤上為臣不忠當伏斧鉞之誅幸蒙灑心自新又令得保首領伏自惟念入稱四輔出備三公爵為列侯誠無顏復望闕廷無心復居官府無宜復食國邑願上太師大司徒扶德侯印綬避賢者路下君章有司皆以為四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位如君言至誠可聽惟君之惡在灑心前不敢文過朕甚多之不奪君之爵邑以著自古皆有死之義其上太師大司徒印綬使者以侯就弟王莽篡位以宮為太子師卒官本姓馬矢宮仕學稱馬氏云贊曰自孝武興學公孫弘以儒相其後蔡義韋賢玄成匡衡張禹翟方進孔光平當馬宮及當子晏咸以儒宗居宰相位服儒衣冠傳先王語其醞藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎
