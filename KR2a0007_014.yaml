body:
  text: 禮樂志第二六經之道同歸而禮樂之用為急治身者斯須忘禮則暴嫚入之矣為國者一朝失禮則荒亂及之矣人函天地陰陽之氣有喜怒哀樂之情天稟其性而不能節也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正情性節萬事者也人性有男女之情妒忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫辟之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄蕃喪祭之禮廢則骨肉之恩薄而背死忘先者衆朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫善於禮移風易俗莫善於樂禮節民心樂和民聲政以行之刑以防之禮樂政刑四達而不悖則王道備矣樂以治內而為同禮以修外而為異同則和親異則畏敬和親則無怨畏敬則不爭揖讓而天下治者禮樂之謂也二者並行合為一體畏敬之意難見則著之於享獻辭受登降跪拜和親之説難形則發之於詩歌詠言鐘石管弦蓋嘉其敬意而不及其財賄美其歡心而不流其聲音故孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉此禮樂之本也故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也王者必因前王之禮順時施宜有所損益即民之心稍稍制作至太平而大備周監於二代禮文尤具事為之制曲為之防故稱禮經三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虛四十餘年孔子美之曰郁郁乎文哉吾從周及其衰也諸侯踰越法度惡禮制之害己去其篇籍遭秦滅學遂以亂亡漢興撥亂反正日不暇給猶命叔孫通制禮儀以正君臣之位高祖説而歎曰吾乃今日知為天子之貴也以通為奉常遂定儀法未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐廉恥今其甚者殺父兄盜者取廟器而大臣特以簿書不報期會為故至於風俗流溢恬而不怪以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦此非天之所為人之所設也人之所設不為不立不修則壞漢興至今二十餘年宜定制度興禮樂然後諸侯軌道百姓素朴獄訟衰息乃草具其儀天子説焉而大臣絳灌之屬害之故其議遂寢至武帝即位進用英雋議立明堂制禮服以興太平會竇太后好黃老言不説儒術其事又廢後董仲舒對策言王者欲有所為宜求其端於天天道大者在於陰陽陽為德陰為刑天使陽常居大夏而以生育長養為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也陽出布施於上而主歲功陰入伏藏於下而時出佐陽陽不得陰之助亦不能獨成歲功王者承天意以從事故務德教而省刑罰刑罰不可任以治世猶陰之不可任以成歲也今廢先王之德教獨用執法之吏治民而欲德化被四海故難成也是故古之王者莫不以教化為大務立大學以教於國設庠序以化於邑教化已明習俗已成天下嘗無一人之獄矣至周末世大為無道以失天下秦繼其後又益甚之自古以來未嘗以亂濟亂大敗天下如秦者也習俗薄惡民人抵冒今漢繼秦之後雖欲治之無可奈何法出而姦生令下而詐起一歲之獄以萬千數如以湯止沸沸俞甚而無益辟之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也故漢得天下以來常欲善治而至今不能勝殘去殺者失之當更化而不能更化也古人有言臨淵羡魚不如歸而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治而災害日去福祿日來矣是時上方征討四夷鋭志武功不暇留意禮文之事至宣帝時琅邪王吉為諫大夫又上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書斷獄聽訟而已此非太平之基也今俗吏所以牧民者非有禮義科指可世世通行者也以意穿鑿各取一切是以詐偽萌生刑罰無極質朴日消恩愛寖薄孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民濟之仁壽之域則俗何以不若成康壽何以不若高宗上不納其言吉以病去至成帝時犍為郡於水濱得古磬十六枚議者以為善祥劉向因是説上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖攘之容以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非皋陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆管弦之間小不備因是絶而不為是去小不備而就大不備大不備王先謙説大不備三字誤衍或古惑字通鑑不重三字或作惑是所見本不誤或莫甚焉夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有悖逆不順之子孫至於陷大辟受刑戮者不絶繇不習五常之道也夫承千歲之衰周繼暴秦之餘敝民漸漬惡俗貪叨險詖不間義理不示以大化而獨驅以刑罰終已不改故曰導之以禮樂而民和睦初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議會向病卒丞相大司空奏請立辟雍案行長安城南營表未作遭成帝崩群臣引以定諡及王莽為宰衡欲耀衆庶遂興辟雍因以篡位海內畔之世祖受命中興撥亂反正改定京師于土中即位三十年四夷賓服百姓家給政教清明及營立明堂辟雍顯宗即位躬行其禮宗祀光武皇帝于明堂養三老五更於辟雍威儀既盛美矣然德化未流洽者禮樂未具群下無所誦説而庠序尚未設之故也孔子曰辟如為山未成一匱止吾止也今叔孫通所撰禮儀與律令同録臧於理官法家又復不傳漢典寢而不著民臣莫有言者又通沒之後河間獻王采禮樂古事稍稍增輯至五百餘篇今學者不能昭見但推士禮以及天子説義又頗謬異故君臣長幼交接之道浸以不章樂者聖人之所樂也而可以善民心其感人深其移風易俗易故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉是以纖微憔瘁之音作而民思憂闡諧嫚易之音作而民康樂粗厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寬裕和順之音作而民慈愛流辟邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮儀合生氣之和導五常之行使之陽而不散陰而不集剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也景祐本如此足以感動人之善心而景祐本如此也景祐本如此不使邪氣得接焉是先王立樂之方也王者未作樂之時因先王之樂以教化百姓説樂其俗然後改作以章功德易曰先王以作樂崇德殷薦之上帝以配祖考昔黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之道也武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也咸池備矣自夏以往其流不可聞已殷頌猶有存者周詩既備而其器用張陳周官具焉典者自卿大夫師瞽以下皆選有道德之人朝夕習業以教國子國子者卿大夫之子弟也皆學歌九德誦六詩習六舞五聲八音之和故帝舜命夔曰女典樂教胄子直而溫寬而栗剛而無虐簡而無敖詩言志歌詠言聲依詠律和聲八音克諧此之謂也又以外賞諸侯德盛而教尊者其威儀足以充目音聲足以動耳詩語足以感心故聞其音而德和省其詩而志正論其數而法立是以薦之郊廟則鬼神饗作之朝廷則群臣和立之學官則萬民協聽者無不虛己竦神説而承流是以海內遍知上德被服其風光輝日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰書云擊石拊石百獸率舞鳥獸且猶感應而況於人乎況於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為設禁焉世衰民散小人乘君子心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂乃作淫聲用變亂正聲以説婦人樂官師瞽抱其器而奔散或適諸侯或入河海夫樂本情性浹肌膚而臧骨髓雖經乎千載其遺風餘烈尚猶不絶至春秋時陳公子完奔齊陳舜之後招樂存焉故孔子適齊聞招三月不知肉味曰不圖為樂之至於斯美之甚也周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所是時周室大壞諸侯恣行設兩觀乘大路陪臣管仲季氏之屬三歸雍徹八佾舞廷制度遂壞陵夷而不反桑間濮上鄭衛宋趙之聲並出內則致疾損壽外則亂政傷民巧偽因而飾之以營亂富貴之耳目庶人以求利列國以相間故秦穆遺戎而由余去齊人餽魯而孔子行至於六國魏文侯最為好古而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納自此禮樂喪矣漢興樂家有制氏以雅樂聲律世世在大樂官但能紀其鏗鎗鼓舞而不能言其義高祖時叔孫通因秦樂人制宗廟樂大祝迎神于廟門奏嘉至猶古降神之樂也皇帝入廟門奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌獨上歌不以管弦亂人聲欲在位者遍聞之猶古清廟之歌也登歌再終下奏休成之樂美神明既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂高祖唐山夫人所作也周有房中樂至秦名曰壽人凡樂樂其所生禮不忘本高祖樂楚聲故房中樂楚聲也孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂高祖王念孫説祖字涉上下文而衍景祐本作高廟是也廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德舞者高祖四年作以象天下樂己行武以除亂也文始舞者曰本舜招舞也高祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以明王念孫説明字涉下兩明字而衍景祐本無示天下之安和也蓋樂己所自作明有制也樂先王之樂明有法也孝景采武德舞以為昭德以尊大宗廟至孝宣采昭德舞為盛德以尊世宗廟諸帝廟皆常奏文始四時五行舞云高祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武德舞禮容者主出文始五行舞舞人無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大氐皆因秦舊事焉初高祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝惠時以沛宮為原廟皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已至武帝定郊祀之禮祠太一於甘泉就乾位也祭后土於汾陰澤中方丘也乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宮而望拜百官侍祠者數百人皆肅然動心焉安世房中歌十七章其詩曰大孝備矣休德昭清高張四縣樂充宮庭芬樹羽林雲景杳冥金支秀華庶旄翠旌七始華始肅倡和聲神來宴娭庶幾是聽粥粥音送細齊人情忽乘青玄熙事備成清思眑眑經緯冥冥我定曆數人告其心敕身齊戒施教申申乃立祖廟敬明尊親大矣孝熙四極爰轃王侯秉德其鄰翼翼顯明昭式清明鬯矣皇帝孝德竟全大功撫安四極海內有姦紛亂東北詔撫成師武臣承德行樂交逆簫勺群慝肅為濟哉蓋定燕國大海蕩蕩水所歸高賢愈愈民所懷大山崔百卉殖民何貴貴有德安其所樂終産樂終産世繼緒飛龍秋遊上天高賢愈樂民人豐草葽女羅施善何如誰能回大莫大成教德長莫長被無極靁震震電耀耀明德鄉治本約治本約澤弘大加被寵咸相保德施大世曼壽都荔遂芳窅窊桂華孝奏天儀若日月光乘玄四龍回馳北行羽旄殷盛芬哉芒芒孝道隨世我署文章桂華馮馮翼翼承天之則吾易久遠燭明四極慈惠所愛美若休德杳杳冥冥克綽永福美芳劉奉世説桂華美芳皆二詩章名本側注在前章之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣若劉奉世説桂華美芳皆二詩章名本側注在前章之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣磑磑即即師象山則烏呼孝哉案撫戎國蠻夷竭歡象來致福兼臨是愛終無兵革嘉薦芳矣告靈饗矣告靈既饗德音孔臧惟德之臧建侯之常承保天休令問不忘皇皇鴻明蕩侯休德嘉承天和伊樂厥福在樂不荒惟民之則浚則師德下民咸殖令問在舊孔容翼翼孔容之常承帝之明下民之樂子孫保光承順溫良受帝之光嘉薦令芳壽考不忘承帝明德師象山則雲施稱民永受厥福承容之常承帝之明下民安樂受福無疆郊祀歌十九章其詩曰練時日侯有望焫膋蕭延四方九重開靈之斿垂惠恩鴻祜休靈之車結玄雲駕飛龍羽旄紛靈之下若風馬左倉龍右白虎靈之來神哉沛先以雨般裔裔靈之至慶陰陰相放𢘍震淡心靈已坐五音飭虞至旦承靈億牲繭栗粢盛香尊桂酒賓八鄉靈安留吟青黃遍觀此眺瑤堂衆嫭並綽奇麗顏如荼兆逐靡被華文廁霧縠曳阿錫佩珠玉俠嘉夜茝蘭芳淡容與獻嘉觴練時日一帝臨中壇四方承宇繩繩意變備得其所清和六合制數以五海內安寧興文匽武后土富媼昭明三光穆穆優遊嘉服上黃帝臨二青陽開動根荄以遂膏潤并愛跂行畢逮霆聲發榮壧處頃聽枯稿復産乃成厥命衆庶熙熙施及夭胎群生啿啿惟春之祺青陽三鄒子樂朱明盛長敷與萬物桐生茂豫靡有所詘敷華就實既阜既昌登成甫田百鬼迪嘗廣大建祀肅雍不忘神若宥之傳世無疆朱明四鄒子樂西皓沆碭秋氣肅殺含秀垂穎續舊不廢姦偽不萌祅孽伏息隅辟越遠四貉咸服既畏茲威惟慕純德附而不驕正心翊翊西皓五鄒子樂玄冥陵陰蟄蟲蓋臧屮木零落抵冬降霜易亂除邪革正異俗兆民反本抱素懷朴條理信義望禮五嶽籍斂之時掩收嘉穀玄冥六鄒子樂惟泰元尊媼神蕃釐經緯天地作成四時精建日月星辰度理陰陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒繼統共勤順皇之德鸞路龍鱗罔不肸飾嘉籩列陳庶幾宴享滅除凶災列景祐殿本都作烈王先謙説作烈是烈景祐殿本都作烈王先謙説作烈是騰八荒鐘鼓竽笙雲舞翔翔招搖靈旗九夷賓將惟泰元七建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成天地並況惟豫有慕爰熙紫壇思求厥路恭承禋祀縕豫為紛黼繡周張承神至尊千童羅舞成八溢合好效歡虞泰一九歌畢奏斐然殊鳴琴竽瑟會軒朱璆磬金鼓靈其有喜百官濟濟各敬厥事盛牲實俎進聞膏神奄留臨須搖長麗前掞光耀明寒暑不忒況皇章展詩應律鋗玉鳴函宮吐角激徵清發梁揚羽申以商造茲新音永久長聲氣遠條鳳鳥鴹神夕奄虞蓋孔享天地八丞相匡衡奏罷黼繡周張更定詩曰肅若舊典日出入安窮時世不與人同故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池遍觀是邪謂何吾知所樂獨樂六龍六龍之調使我心若訾黃其何不徠下日出入九太一況天馬下霑赤汗沫流赭志俶儻精權奇籋浮雲暗上馳體容與迣萬里今安匹龍為友元狩三年馬生渥窪水中作天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊兩化若鬼天馬徠歷無草徑千里循東道天馬徠執徐時將搖舉誰與期天馬徠開遠門竦豫身逝昆侖天馬徠龍之媒遊閶闔觀玉臺太初四年誅宛王獲宛馬作天馬十天門開詄蕩蕩穆並騁以臨饗光夜燭德信著靈浸平而王先謙説八字不成句義平而二字當衍顏注亦未為平字釋義衍文明矣鴻長生豫大朱塗廣夷石為堂飾玉梢以舞歌體招搖若永望星留俞塞隕光照紫幄珠熉黃幡比翅回集二雙飛常羊月穆穆以金波日華耀以宣明假清風軋忽激長至重觴神裴回若留放殣冀親以肆章函蒙祉福常若期寂漻上天知厥時泛泛滇滇從高斿殷勤此路臚所求佻正嘉吉弘以昌休嘉砰隱溢四方專精厲意逝九閡紛云六幕浮大海天門十一景星顯見信星彪列象載昭庭日親以察參侔開闔爰推本紀汾脽出鼎皇祜元始五音六律依韋饗昭雜變並會雅聲遠姚空桑琴瑟結信成四興遞代八風生殷殷鐘石羽籥鳴河龍供鯉醇犧牲百末旨酒布蘭生泰尊柘漿析朝酲微感心攸通修名周流常羊思所并穰穰復正直往寧馮蠵切和疏寫平上天布施后土成穰穰豐年四時榮景星十二元鼎五年得鼎汾陰作齊房産草九莖連葉宮童效異披圖案諜玄氣之精回復此都蔓蔓日茂芝成靈華齊房十三元封二年芝生甘泉齊房作后皇嘉壇立玄黃服物發冀州兆蒙祉福沇沇四塞徦狄合處經營萬億咸遂厥宇后皇十四華燁燁固靈根神之斿過天門車千乘敦昆侖神之出排玉房周流雜拔蘭堂神之行旌容容騎沓沓般縱縱神之徠泛翊翊甘露降慶雲集神之揄臨壇宇九疑賓夔龍舞神安坐鴹吉時共翊翊合所思神嘉虞申二觴福滂洋邁延長沛施祐汾之阿揚金光橫泰河莽若雲增陽波遍臚歡騰天歌華燁燁十五五神相包四鄰土地廣揚浮雲扢嘉壇椒蘭芳璧玉精垂華光益億年美始興交於神若有承廣宣延咸畢觴靈輿位偃蹇驤卉汩臚析奚道景祐殿局本都作遺王先謙説作遺是遺景祐殿局本都作遺王先謙説作遺是淫淥澤汪然歸五神十六朝隴首覽西垠靁電尞獲白麟爰五止顯黃德圖胸虐熏鬻殛闢流離抑不詳賓百僚山河饗掩回轅鬗長馳騰雨師灑路陂流星隕感惟風籋歸雲撫懷心朝隴首十七元狩元年行幸雍獲白麟作象載瑜白集西食甘露飲榮泉赤鴈集六紛員殊翁雜五采文神所見施祉福登蓬萊結無極象載瑜十八太始三年行幸東海獲赤鴈作赤蛟綏黃華蓋露夜零晝暗濭百君禮六龍位勺椒漿靈已醉靈既享錫吉祥芒芒極降嘉觴靈殷殷爛揚光延壽命永未央杳冥冥塞六合澤汪濊輯萬國靈禗禗象輿轙票然逝旗逶蛇禮樂成靈將歸託玄德長無衰赤蛟十九其餘巡狩福應之事不序郊廟故弗論是時河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之歲時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述昔殷周之雅頌乃上本有娀薑原離稷始生玄王公劉古公大伯王季薑女大任太姒之德乃及成湯文武受命武丁成康宣王中興下及輔佐阿衡周召太公申伯召虎仲山甫之屬君臣男女有功德者靡不褒揚功德既信美矣褒揚之聲盈乎天地之間是以光名著於當世遺譽垂於無窮也今漢郊廟詩歌未有祖宗之事八音調均又不協於鐘律而內有掖庭材人外有上林樂府皆以鄭聲施於朝廷至成帝時謁者常山王禹世受可錢大昭説可當作河按景祐殿局本都作河河錢大昭説可當作河按景祐殿局本都作河間樂能説其義其弟子宋曄等上書言之下大夫博士平當等考試當以為漢承秦滅道之後賴先帝聖德博受兼聽修廢官立大學河間獻王聘求幽隱修興雅樂以助化時大儒公孫弘董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講故自公卿大夫觀聽者但聞鑑景祐殿局本都作鏗王先謙説作鏗是鏗景祐殿局本都作鏗王先謙説作鏗是鎗不曉其意而欲以風諭衆庶其道無由是以行之百有餘年德化至今未成今曄等守習孤學大指歸於興助教化衰微之學興廢在人宜領屬雅樂以繼絶表微孔子曰人能弘道非道弘人河間區區不錢大昭説不疑小字之訛按景祐殿本都作小小錢大昭説不疑小字之訛按景祐殿本都作小國藩臣以好學修古能有所存民到于今稱之況於聖主廣被之資修起舊文放鄭近雅述而不作信而好古於以風示海內揚名後世誠非小功小美也事下公卿以為久遠難分明當議復寢是時鄭聲尤甚黃門名倡丙強景武之屬富顯於世貴戚五侯定陵富平外戚之家淫侈過度至與人主爭女樂哀帝自為定陶王時疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧文巧則趨末背本者衆鄭衛之聲興則淫辟之化流而欲黎庶敦朴家給猶濁其源而求其清流豈不難哉孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏別屬他官丞相孔光大司空何武奏郊祭樂人員六十二人給祠南北郊大樂鼓員六人嘉至鼓員十人邯鄲鼓員二人騎吹鼓員三人江南鼓員二人淮南鼓員四人巴俞鼓員三十六人歌鼓員二十四人楚嚴鼓員一人梁皇鼓員四人臨淮鼓員三十五人茲邡鼓員三人凡鼓十二員百二十八人朝賀置酒陳殿下應古兵法外郊祭員十三人諸族樂人兼雲招給祠南郊用六十七人兼給事雅樂用四人夜誦員五人剛別柎員二人給盛德主調箎員二人聽工以律知日冬夏至一人鐘工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人一人可罷琴工員五人三人可罷柱工員二人一人可罷繩弦工員六人四人可罷鄭四會員六十二人一人給事雅樂六十一人可罷張瑟員八人七人可罷安世樂鼓員二十人十九人可罷沛吹鼓員十二人族歌鼓員二十七人陳吹鼓員十三人商樂鼓員十四人東海鼓員十六人長樂鼓員十三人縵樂鼓員十三人凡鼓八員百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼓員六人常從倡三十人常從象人四人詔隨常從倡十六人秦倡員二十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為樂楚四會員十七人巴四會員十二人銚四會員十二人齊四會員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十二人其七十二人給大官挏馬酒其七十人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲皆可罷奏可然百姓漸漬日久又不制雅樂有以相變豪富吏民湛沔自若陵夷壞于王莽今海內更始民人歸本戶口歲息平其刑辟牧以賢良至於家給既庶且富則須庠序禮樂之教化矣今幸有前聖遺制之威儀誠可法象而補備之經紀可因緣而存著也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者百世可知也今大漢繼周久曠大儀未有立禮成樂此賈宜景祐殿本都作誼王先謙説作誼是誼景祐殿本都作誼王先謙説作誼是仲舒王吉劉向之徒所為發憤而增嘆也
