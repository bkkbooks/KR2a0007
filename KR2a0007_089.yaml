body:
  text: 匈奴傳第六十四上匈奴其先夏后氏之苗裔曰淳維唐虞以上有山戎獫允薰粥居于北邊隨草畜牧而轉移其畜之所多則馬牛羊其奇畜則橐佗驢驘駃騠騊駼驒奚逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥鼠少長則射狐菟肉食士力能彎弓盡為甲騎其俗寬則隨畜田獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋利則進不利則退不羞遁走苟利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無字夏道衰而公劉失其稷官變于西戎邑于豳其後三百有餘歲戎狄攻太王亶父亶父亡走于岐下豳人悉從亶父而邑焉作周其後百有餘歲周西伯昌伐畎夷後十有餘年武王伐紂而營雒邑復居于酆鎬放逐戎夷涇洛之北以時入貢名曰荒服其後二百有餘年周道衰而周穆王伐畎戎得四白狼四白鹿以歸自是之後荒服不至於是作呂刑之辟至穆王之孫懿王時王室遂衰戎狄交侵暴虐中國中國被其苦詩人始作疾而歌之曰靡室靡家獫允之故豈不日戒獫允孔棘至懿王曾孫宣王興師命將以征伐之詩人美大其功曰薄伐獫狁至於太原出車彭彭城彼朔方是時四夷賓服稱為中興至于幽王用寵姬襃姒之故與申侯有隙申侯怒而與畎戎共攻殺幽王于麗山之下遂取周之地鹵獲而居于涇渭之間侵暴中國秦襄公救周於是周平王去酆鎬而東徙于雒邑當時秦襄公伐戎至𨙸始列為諸侯後六十有五年而山戎越燕而伐齊齊釐公與戰于齊郊後四十四年而山戎伐燕燕告急齊齊桓公北伐山戎山戎走後二十餘年而戎翟至雒邑伐周襄王襄王出奔于鄭之氾邑初襄王欲伐鄭故取翟女為后與翟共伐鄭已而黜翟后翟后怨而襄王繼母曰惠后有子帶欲立之於是惠后與翟后子帶為內應開戎翟戎翟以故得入破逐襄王而立子帶為王於是戎翟或居於陸渾東至于衛侵盜尤甚周襄王既居外四年乃使使告急於晉晉文公初立欲修霸業乃興師伐戎翟誅子帶迎內襄王于洛邑當是時秦晉為強國晉文公攘戎翟居于西河圜洛之間號曰赤翟白翟而秦穆公得由余西戎八國服於秦故隴以西有緜諸畎戎狄獂之戒在岐梁涇漆之北有義渠大荔烏氏朐衍之戎而晉北有林胡樓煩之戎燕北有東胡山戎各分散谿谷自有君長往往而聚者百有餘戎然莫能相壹自是之後百有餘年晉悼公使魏絳和戎翟戎翟朝晉後百有餘年趙襄子踰句注而破之并代以臨胡貉後與韓魏共滅知伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎界邊其後義渠之戎築城郭以自守而秦稍蠶食之至於惠王遂拔義渠二十五城惠王伐魏魏盡入西河及上郡于秦秦昭王時義渠戎王與宣太后亂有二子宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠於是秦有隴西北地上郡築長城以距胡而趙武靈王亦變俗胡服習騎射北破林胡樓煩自代並陰山下至高闕為塞而置雲中雁門代郡其後燕有賢將秦開為質於胡胡甚信之歸而襲破東胡東胡卻千餘里與荊軻刺秦王秦舞陽者開之孫也燕亦築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以距胡當是時冠帶戰國七而三國邊於匈奴其後趙將李牧時匈奴不敢入趙邊後秦滅六國而始皇帝使蒙恬將數十萬之眾北擊胡悉收河南地因河為塞築四十四縣城臨河徙適戍以充之而通直道自九原至雲陽因邊山險塹谿谷可繕者繕之起臨洮至遼東萬餘里又度河據陽山北假中當是時東胡強而月氏盛匈奴單于曰頭曼頭曼不勝秦北徙十有餘年而蒙恬死諸侯畔秦中國擾亂諸秦所徙適邊者皆復去於是匈奴得寬復稍度河南與中國界於故塞單于有太子名曰冒頓後有愛閼氏生少子頭曼欲廢冒頓而立少子乃使冒頓質於月氏冒頓既質而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎亡歸頭曼以為壯令將萬騎冒頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬行獵獸有不射鳴鏑所射輒斬之已而冒頓以鳴鏑自射善馬左右或莫敢射冒頓立斬之居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射復斬之頃之冒頓出獵以鳴鏑射單于善馬左右皆射之於是冒頓知其左右可用從其父單于頭曼獵以鳴鏑射頭曼其左右皆隨鳴鏑而射殺頭曼盡誅其後母與弟及大臣不聽從者於是冒頓自立為單于冒頓既立時東胡強聞冒頓殺父自立乃使使謂冒頓曰欲得頭曼時號千里馬冒頓問群臣群臣皆曰此匈奴寶馬也勿予冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏予東胡東胡王愈驕西侵與匈奴中間有棄地莫居千餘里各居其邊為甌脫東胡使使謂冒頓曰匈奴所與我界甌脫外棄地匈奴不能至也吾欲有之冒頓問群臣或曰此棄地予之於是冒頓大怒曰地者國之本也奈何予人諸言與者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王虜其民眾畜產既歸西擊走月氏南并樓煩白羊河南王悉復收秦所使蒙恬所奪匈奴者與漢關故河南塞至朝那膚施遂侵燕代是時漢方與項羽相距中國罷於兵革以故冒頓得自強控弦之士三十餘萬自淳維以至頭曼千有餘歲時大時小別散分離尚矣其世傳不可得而次然至冒頓而匈奴最強大盡服從北夷而南與諸夏為敵國其世姓官號可得而記云單于姓攣鞮氏其國稱之曰撐犁孤塗單于匈奴謂天為撐犁謂子為孤塗單于者廣大之貌也言其象天單于然也置左右賢王左右谷蠡左右大將左右大都尉左右大當戶左右骨都侯匈奴謂賢曰屠耆故常以太子為左屠耆王自左右賢王以下至當戶大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏其後有須卜氏此三姓其貴種也諸左王將居東方直上谷以東接穢貉朝鮮右王將居西方直上郡以西接氐羌而單于庭直代雲中各有分地逐水草移徙而左右賢王左右谷蠡最大國左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王相都尉當戶且渠之屬歲正月諸長小會單于庭祠五月大會龍城祭其先天地鬼神秋馬肥大會蹛林課校人畜計其法拔刃尺者死坐盜者沒入其家有罪小者軋大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向日上戊己其送死有棺椁金銀衣裳而無封樹喪服近幸臣妾從死者多至數十百人舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一卮酒而所得鹵獲因以予之得人以為奴婢故其戰人人自為趨利善為誘兵以包敵故其逐利如鳥之集其困敗瓦解雲散矣戰而扶轝死者盡得死者家財後北服渾寙屈射丁零隔昆新䔣之國於是匈奴貴人大臣皆服以冒頓為賢是時漢初定徙韓王信於代都馬邑匈奴大攻圍馬邑韓信降匈奴匈奴得信因引兵南踰句注攻太原至晉陽下高帝自將兵往擊之會冬大寒雨雪卒之墮指者十二三於是冒頓陽敗走誘漢兵漢兵逐擊冒頓冒頓匿其精兵見其羸弱於是漢悉兵多步兵三十二萬北逐之高帝先至平城步兵未盡到冒頓縱精兵三十餘萬騎圍高帝於白登七日漢兵中外不得相救餉匈奴騎其西方盡白東方盡駹北方盡驪南方盡騂馬高帝乃使使間厚遺閼氏閼氏乃謂冒頓曰兩主不相困今得漢地單于終非能居之且漢主有神單于察之冒頓與韓信將王黃趙利期而兵久不來疑其與漢有謀亦取閼氏之言乃開圍一角於是高皇帝令士皆持滿傅矢外鄉從解角直出得與大軍合而冒頓遂引兵去漢亦引兵罷使劉敬結和親之約是後韓信為匈奴將及趙利王黃等數背約侵盜代鴈門雲中居無幾何陳豨反與韓信合謀擊代漢使樊噲往擊之復收代鴈門雲中郡縣不出塞是時匈奴以漢將數率眾往降故冒頓常往來侵盜代地於是高祖患之乃使劉敬奉宗室女翁主為單于閼氏歲奉匈奴絮繒酒食物各有數約為兄弟以和親冒頓乃少止後燕王盧綰復反率其黨且萬人降匈奴往來苦上谷以東終高祖世孝惠高后時冒頓寖驕乃為書使使遺高后曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無高后大怒召丞相平及樊噲季布等議斬其使者發兵而擊之樊噲曰臣願得十萬眾橫行匈奴中問季布布曰噲可斬也前陳豨反於代漢兵三十二萬噲為上將軍時匈奴圍高帝於平城噲不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩今歌唫之聲未絕傷痍者甫起而噲欲搖動天下妄言以十萬眾橫行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也高后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汙弊邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親至孝文即位復修和親其三年夏匈奴右賢王入居河南地為寇於是文帝下詔曰漢與匈奴約為昆弟無侵害邊境所以輸遺匈奴甚厚今右賢王離其國將眾居河南地非常故往來入塞捕殺吏卒敺侵上郡保塞蠻夷令不得居其故陵轢邊吏入盜甚驁無道非約也其發邊吏車騎八萬詣高奴遣丞相灌嬰將擊右賢王右賢王走出塞文帝幸太原是時濟北王反文帝歸罷丞相擊胡之兵其明年單于遣漢書曰天所立匈奴大單于敬問皇帝無恙前時皇帝言和親事稱書意合驩漢邊吏侵侮右賢王右賢王不請聽後義盧侯難支等計與漢吏相恨絕二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不至漢以其故不和鄰國不附今以少吏之敗約故罰右賢王使至西方求月氏擊之以天之福吏卒良馬力強以滅夷月氏盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆已為匈奴諸引弓之民并為一家北州以定願寢兵休士養馬除前事復故約以安邊民以應古始使少者得成其長老者得安其處世世平樂未得皇帝之志故使郎中係虖淺奉書請獻橐佗一騎馬二駕二駟皇帝即不欲匈奴近塞則且詔吏民遠舍使者至即遣之六月中來至新望之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊也且得匈奴地澤鹵非可居也和親甚便漢許之孝文前六年遣匈奴書曰皇帝敬問匈奴大單于無恙使係虖淺遺朕書云願寢兵休士除前事復故約以安邊民世世平樂朕甚嘉之此古聖王之志也漢與匈奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在匈奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡袷綺衣長襦錦袍各一比疏一黃金飭具帶一黃金犀毗一繡十匹錦二十匹赤綈綠繒各四十匹使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立號曰老上單于老上稽粥單于初立文帝復遣宗人女翁主為單于閼氏使宦者燕人中行說傅翁主說不欲行漢強使之說曰必我也為漢患者中行說既至因降單于單于愛幸之初單于好漢繒絮食物中行說曰匈奴人眾不能當漢之一郡然所以強之者以衣食異無卬於漢今單于變俗好漢物漢物不過什二則匈奴盡歸於漢矣其得漢絮繒以馳草棘中衣袴皆裂弊以視不如旃裘堅善也得漢食物皆去之以視不如重酪之便美也於是說教單于左右疏記以計識其人眾畜牧漢遺單于書以尺一牘辭曰皇帝敬問匈奴大單于無恙所以遺物及言語云云中行說令單于以尺二寸牘及印封皆令廣長大倨驁其辭曰天地所生日月所置匈奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言匈奴俗賤老中行說窮漢使曰而漢俗屯戍從軍當發者其親豈不自奪溫厚肥美齎送飲食行者乎漢使曰然說曰匈奴明以攻戰為事老弱不能鬭故以其肥美飲食壯健以自衛如此父子各得相保何以言匈奴輕老也漢使曰匈奴父子同穹廬臥父死妻其後母兄弟死盡妻其妻無冠帶之節闕庭之禮中行說曰匈奴之俗食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寬則人樂無事約束徑易行君臣簡可久一國之政猶一體也父兄死則妻其妻惡種姓之失也故匈奴雖亂必立宗種今中國雖陽不取其父兄之妻親屬益疏則相殺至到易姓皆從此類也且禮義之敝上下交怨而室屋之極生力屈焉夫力耕桑以求衣食築城郭以自備故其民急則不習戰攻緩則罷於作業嗟土室之人顧無喋喋佔佔冠固何當自是之後漢使欲辯論者中行說輒曰漢使毋多言顧漢所輸匈奴繒絮米蘖令其量中必善美而已何以言為乎且所給備善則已不備善而苦惡則侯秋孰以騎馳蹂乃稼穡也日夜教單于侯利害處孝文十四年匈奴單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜產甚多遂至彭陽使騎兵入燒回中宮侯騎至雍甘泉於是文帝以中尉周舍郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡寇而拜昌侯盧卿為上郡將軍甯侯魏遫為北地將軍降慮侯周竈為隴西將軍東陽侯張相如為大將軍成侯董赤為將軍大發車騎往擊胡單于留塞內月餘漢逐出塞即還不能有所殺匈奴日以驕歲入邊殺略人民甚眾雲中遼東最甚郡萬餘人漢甚患之乃使使遺匈奴書單于亦使當戶報謝復言和親事孝文後二年使使遣匈奴書曰皇帝敬問匈奴大單于無恙使當戶且渠雕渠難郎中韓遼朕馬二匹已至敬受先帝制長城以北引弓之國受令單于長城以內冠帶之室朕亦制之使萬民耕織射獵衣食父子毋離臣主相安俱無暴虐今聞渫惡民貪降其趨背義絕約忘萬民之命離兩主之驩然其事已在前矣書云二國已和親兩主驩說寢兵休卒養馬世世昌樂翕然更始朕甚嘉之聖者日新改作更始使老者得息幼者得長各保其首領而終其天年朕與單于俱由此道順天恤民世世相傳施之無窮天下莫不咸嘉漢與匈奴鄰敵之國匈奴處北地寒殺氣早降故詔吏遺單于秫糵金帛綿絮它物歲有數今天下大安萬民熙熙獨朕與單于為之父母朕追念前事薄物細故謀臣計失皆不足以離昆弟之驩朕聞天不頗覆地不偏載朕與單于皆捐細故俱蹈大道墮壞前惡以圖長久使兩國之民若一家子元元萬民下及魚鱉上及飛鳥跂行喙息蝡動之類莫不就安利避危殆故來者不止天之道也俱去前事朕釋逃虜民單于母言章尼等朕聞古之帝王約分明而不食言單于留志天下大安和親之後漢過不先單于其察之單于既約和親於是制詔御史匈奴大單于遺朕書和親已定亡人不足以益眾廣地匈奴無入塞漢無出塞犯今約者殺之可以久親後無咎俱便朕已許其布告天下使明知之後四年老上單于死子軍臣單于立而中行說復事之漢復與匈奴和親軍臣單于立歲餘匈奴復絕和親大入上郡雲中各三萬騎所殺略甚眾於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邊亦各堅守以備胡寇又置三將軍軍長安西細柳渭北棘門霸上以備胡胡騎入代句注邊烽火通於甘泉長安數月漢兵至邊匈奴亦遠塞漢兵亦罷後歲餘文帝崩景帝立而趙王遂乃陰使於匈奴吳楚反欲與趙合謀入邊漢圍破趙匈奴亦止自是後景帝復與匈奴和親通關市給遺單于遣翁主如故約終景帝世時時小入盜邊無大寇武帝即位明和親約束厚遇關市饒給之匈奴自單于以下皆親漢往來長城下漢使馬邑人聶翁壹間闌出物與匈奴交易陽為賣馬邑城以誘單于單于信之而貪馬邑財物乃以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為護軍將軍護四將軍以伏單于單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時雁門尉史行徼見寇保此亭單于得欲刺之尉史知漢謀乃下具告單于單于單于大驚曰吾固疑之乃引兵還出引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱單于不至以故無所得將軍王恢部出代擊胡輜重聞單于還兵多不敢出漢以恢本建造兵謀而不進誅恢自是後匈奴絕和親攻當路塞往往入盜於邊不可勝數然匈奴貪尚樂關市耆漢財物漢亦通關市不絕以中之自馬邑軍後五歲之秋漢使四將各萬騎擊胡關市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七千李廣出雁門為胡所敗匈奴生得廣廣道亡歸漢囚敖廣敖廣贖為庶人其冬匈奴數千人盜邊漁陽尤甚漢使將軍韓安國屯漁陽備胡其明年秋匈奴二萬騎入漢殺遼西太守略二千餘人又敗漁陽太守軍千餘人圍將軍安國安國時千餘騎亦且盡會燕救之至匈奴乃去又入雁門殺千餘人於是漢使將軍衛青將三萬騎雁門李息出代郡擊胡得首虜數千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時恬所為塞因河而為固漢亦棄上谷之斗辟縣造陽地予胡是歲元朔二年也其後冬軍臣單于死其弟左谷蠡王伊穉斜自立為單于攻敗軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月死伊穉斜單于既立其夏匈奴數萬騎入代郡殺太守共友略千餘人秋又入鴈門殺略千餘人其明年又入代郡定襄上郡各三萬騎殺略數千人匈奴右賢王怨漢奪之河南地而築朔方數寇盜邊及入河南侵擾朔方殺略吏民甚眾其明年春漢遣衛青將六將軍十餘萬人出朔方高闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脫身逃走精騎往往隨後去漢將軍得右賢王人眾男女萬五千人裨小王十餘人其秋匈奴萬騎入代郡殺都尉朱央略千餘人其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里擊匈奴得首虜前後萬九千餘級而漢亦亡兩將軍三千餘騎右將軍建得以身脫而前將軍翕侯趙信兵不利降匈奴趙信者故胡小王降漢漢封為翕侯以前將軍與右將軍并軍介獨遇單于兵故盡沒單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絕幕以盡罷漢兵徼極而取之毋近塞單于從之其明年胡數萬騎入上谷殺數百人明年春漢使票騎將軍去病將萬騎隴西過焉耆山千餘里得胡首虜八十餘級得休屠王祭天金人其夏票騎將軍復與合騎侯數萬出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級裨小王以下十餘人是時匈奴亦來入代郡鴈門殺略數百人漢使博望侯及李將軍廣出右北平擊匈奴左賢王左賢王圍李廣廣軍四千人死者過半殺虜亦過當會博望侯軍救至李將軍得脫盡亡其軍合騎侯後票騎將軍期及博望侯皆當死贖為庶人其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使票騎將軍迎之昆邪王殺休屠王并將其眾降漢凡四萬餘人號十萬於是漢已得昆邪則隴西北地河西益少胡寇徙關東貧民處所奪匈奴河南地新秦中以實之而減北地以西戍卒半明年春匈奴入右北平定襄各數萬騎殺略千餘人其明年春漢謀以為翕侯信為單于計居幕北以為漢兵不能至乃粟馬發十萬騎私負從馬凡十四萬匹糧重不與焉令大將軍青票騎將軍去病中分軍大將軍出定襄票騎將軍出代咸約絕幕擊匈奴單于聞之遠其輜重以精兵待於幕北與漢大將軍接戰一日會暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵遂獨與壯騎數百潰漢圍西北遁走漢兵夜追之不得行捕斬首虜凡萬九千級北至窴顏山趙信城而還單于之走其兵往往與漢軍相亂而隨單于單于久不與其大眾相得右谷蠡王以為單于死乃自立為單于真單于復得其眾右谷蠡乃去號復其故位票騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走票騎封於狼居胥山禪姑衍臨翰海而還是後匈奴遠遁而幕南無王庭漢度河自朔方以西至令居往往通渠置田官吏卒五六萬人稍蠶食地接匈奴以北初漢兩將大出圍單于所殺虜八九萬而漢士物故者亦萬數漢馬死者十餘萬匹匈奴雖病遠去而漢馬亦少無以復往單于用趙信計遺使好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰匈奴新困宜使為外臣朝請於邊漢使敞使於單于單于聞敞計大怒留之不遣先是漢亦有所降匈奴使者單于亦輒留漢使相當漢方復收士馬會票騎將軍去病死於是漢久不北擊胡數歲伊穉斜單于立十三年死子烏維立為單于是歲元鼎三年也烏維單于立而漢武帝始出巡狩郡縣其後漢方南誅兩越不擊匈奴亦不入邊烏維立三年漢已滅兩越遣故太僕公孫賀將萬五千騎出九原二千餘里至浮苴井從票侯趙破奴萬餘騎出令居數千里至匈奴河水皆不見匈奴一人而還是時天子巡邊親至朔方勒兵十八萬騎以見武節而使郭吉風告單于既至匈奴匈奴主客問所使郭吉卑體好言曰吾見單于而口言單于見吉吉曰南越王頭已縣於漢北闕下今單于即能前與漢戰天子自將兵待邊即不能亟南面而臣於漢何但遠走亡匿於幕北寒苦無水草之地為語卒單于大怒立斬主客見者而留郭吉不歸遷辱之北海上而單于終不肯為寇於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于愛之陽許曰吾為遣其太子入質於漢以求和親漢使楊信使於匈奴是時漢東拔濊貉朝鮮以為郡而西置酒泉郡以隔絕胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國又北益廣田至眩雷為塞而匈奴終不敢以為言是歲翕侯信死漢用事者以匈奴已弱可臣從也楊信為人剛直屈強素非貴臣也單于不親欲召入不肯去節乃坐穹廬外見楊信楊信說單于曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣翁主給繒絮食物有品以和親而匈奴亦不復擾邊今乃欲反古今吾太子為質無幾矣匈奴俗見漢使非中貴人其儒生以為欲說折其辭辯少年以為欲刺折其氣每漢兵入匈奴匈奴輒報償漢留匈奴使匈奴亦留漢使必得當乃止楊信既歸漢使王烏等如匈奴匈奴復讇以甘言欲多得漢財物紿王烏曰吾欲入漢見天子面相結為兄弟王烏歸報漢漢為單于築邸于長安匈奴曰非得漢貴人使吾不與誠語匈奴使其貴人至漢病服藥欲愈之不幸而死漢使路充國佩二千石印綬使送其喪厚幣直數千金單于以為漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏殊無意入漢遣太子來質於是匈奴數使奇兵侵犯漢邊漢乃拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡烏維單于立十歲死子詹師廬立年少號為兒單于是歲元封六年也自是後單于益西北左方兵直雲中右方兵直酒泉敦煌兒單于立漢使兩使一人弔單于一人弔右賢王欲以乖其國使者入匈奴匈奴悉將致單于單于怒而悉留漢使漢使留匈奴者前後十餘輩而匈奴使來漢亦輒留之相當是歲漢使貳師將軍西伐大宛而令因杅將軍築受降城其冬匈奴大雨雪畜多飢寒死而單于年少好殺伐國中多不安左大都尉欲殺單于使人間告漢曰我欲殺單于降漢漢遠漢即來兵近我我即發初漢聞此言故築受降城猶以為遠其明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里期至浚稽山而還浞野侯既至期左大都尉欲發而覺單于誅之發兵擊浞野侯浞野侯行捕首虜數千人還未至受降城四百里匈奴八萬騎圍之浞野侯夜出自求水匈奴生得浞野侯因急擊其軍軍吏畏亡將而誅莫相勸而歸軍遂沒於匈奴單于大喜遂遣兵攻受降城不能下乃侵入邊而去明年單于欲自攻受降城未到病死兒單于立三歲而死子少匈奴乃立其季父烏維單于弟右賢王句黎湖為單于是歲大初三年也句黎湖單于立漢使光祿徐自為出五原塞數百里遠者千里築城障列亭至盧朐而使游擊將軍韓說長平侯衛伉屯其旁使強弩都尉路博德築居延澤上其秋匈奴大入雲中定襄五原朔方殺略數千人敗數二千石而去行壞光祿所築亭障又使右賢王入酒泉張掖略數千人會任文擊救盡復失其所得而去聞貳師將軍破大宛斬其王還單于欲遮之不敢其冬病死句黎湖單于立一歲死其弟左大都尉且鞮侯立為單于漢既誅大宛威震外國天子意欲遂困胡乃下詔曰高皇帝遺朕平城之夏高后時單于書絕悖逆昔齊襄公復九世之讎春秋大之是歲太初四年也且鞮侯單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于乃自謂我兒子安敢望漢天子漢天子我丈人行漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年浞野侯破奴得亡歸漢其明年漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還匈奴大圍貳師幾不得脫漢兵物故什六七漢又使因杅將軍出西河與強弩都尉會涿邪山亡所得使騎都尉李陵將步兵五千人出居延千餘里與單于會合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降匈奴其兵得脫歸漢者四百人單于乃貴陵以其女妻之後二歲漢使貳師將軍六萬騎步兵七萬出朔方強弩都尉路博德將萬餘人與貳師會游擊將軍說步兵三萬人出五原因杅將軍敖將騎萬步兵三萬人出雁門匈奴聞悉遠其累重於余吾水北而單于以十萬待水南與貳師接戰貳師解而引歸與單于連鬭十餘日游擊亡所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是歲太始元年也初且鞮侯兩子長為左賢王次為左大將病且死言立左賢王左賢王未至貴人以為有病更立左大將為單于左賢不聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聽謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于狐鹿姑單于立以左大將為左賢王數年病死其子先賢撣不得代更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而匈奴入上谷五原殺略吏民其年匈奴復入五原酒泉殺兩部都尉於是漢遣貳師將軍七萬人出五原御史大夫商丘成三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水左賢王驅其人民度余吾水六七百里居兜銜山單于自將精兵左安侯度姑且水御史大夫軍至追邪徑無所見還匈奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳卻敵殺傷虜其眾至蒲奴水虜不利還去重合侯軍至天山匈奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵強引去重合侯無所得失是時漢恐車師兵遮重合侯乃遣闓陵將兵別圍車師盡得其王民眾而還貳師將軍將出塞匈奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹貳師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北至范夫人城匈奴奔走莫敢距敵會貳師妻子坐巫蠱收聞之憂懼其掾胡亞夫亦避罪從軍說貳師曰夫人室家皆在吏若還不稱意適與獄會郅居以北可復得見乎貳師由是狐疑欲深入要功遂北至郅居水上虜已去貳師遺護軍將二萬騎度郅居之水一日逢左賢王左大將將二萬騎與漢軍合戰一日漢軍殺左大將虜死傷甚眾軍長史與決眭都尉煇渠侯謀曰將軍懷異心欲危眾求功恐必敗謀共執貳師貳師聞之斬長史引兵還至速邪烏燕然山單于知漢軍勞倦自將五萬遮擊貳師相殺傷甚眾夜塹漢軍前深數尺從後急擊之軍大亂敗貳師降單于素知其漢大將貴臣以女妻之尊寵在衛律上其明年單于遣使遣漢書云南有大漢北有強胡胡者天之驕子也不為小禮以自煩今欲與漢闓大關取漢女為妻歲給遣我蘖酒萬石稷米五千斛雜繒萬匹它如故約則邊不相盜矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也貳師道前太子發兵反何也使者曰然乃丞相私與太子爭鬭太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過耳孰與冒單于身殺其父代立常妻後母禽獸行也單于留使者三歲乃得還貳師在匈奴歲餘衛律害其寵會母閼氏病律飭胡巫言先單于怒曰胡故時祠兵常言得貳師以社今何故不用於是收貳師貳師駡曰我死必滅匈奴遂屠貳師以祠會連雨雪數月畜產死人民疫病穀稼不孰單于恐為貳師立祠室自貳師沒後漢新失將軍士卒數萬人不復出兵三歲武帝崩前此者漢兵深入窮追二十餘年匈奴孕重墯殰罷極苦之自單于以下常有欲和親計後三年單于欲求和親會病死初單于有異母弟為左大都尉賢國人鄉之母閼氏恐單于不立子而左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復會單于庭又單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿單于死詐撟單于令與貴人飲盟更立子左谷蠡王為壼衍鞮單于是歲始元二年也壼衍鞮單于既立風謂漢使者言欲和親左賢王右谷蠡王不得立怨望率其眾欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫謀擊匈奴盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆冤之於是二王去居其所未嘗肯會龍城後二年秋匈奴入代殺都尉單于年少初立母閼氏不正國內乖離常恐漢兵襲之於是衛律為單于謀穿井築城治樓以藏穀與秦人守之漢兵至無奈我何即穿井數百伐材數千或曰胡人不能守城是遺漢糧也衛律於是止乃更謀歸漢使不降者蘇武馬宏等馬宏者前副光祿大夫王忠使西國為匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意是時單于立三歲矣明年匈奴發左右部二萬騎為四隊並入邊為寇漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以為道擊之即西北遠去不敢南逐水草發人民屯甌脫明年復遺九千騎屯受降城以備漢北橋余吾令可度以備奔走是時衛律已死衛律在時常言和親之利匈奴不信及死後兵數困國益貧單于弟左谷蠡王思衛律言欲和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈摩之其後左谷蠡王死明年單于使犁汙王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾右賢王犁汙王四千騎分三隊入日勒屋蘭番和張掖太守屬國都尉發兵擊大破之得脫者數百人屬國千長義渠王騎士射殺犁汙王賜黃金二百斤馬二百匹因封為犁汙王屬國都尉郭忠封成安侯自是後匈奴不敢入張掖其明年匈奴三千餘騎入五原略殺數千人後數萬騎南旁塞獵行攻塞外亭障略取吏民去是時漢邊郡烽火候望精明匈奴為邊寇者少利希復犯塞漢復得匈奴降者言烏桓嘗發先單于家匈怒怨之方發二萬騎擊烏桓大將軍霍光欲發兵邀擊之以問護軍都尉趙充國充國以為烏桓間數犯塞今匈奴擊之於漢便又匈奴希寇盜北邊幸無事蠻夷自相攻擊而發兵要之招寇生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍將二萬騎出遼東匈奴聞漢兵至引去初光誡明友兵不空出即後匈奴遂擊烏桓烏桓時新中匈奴兵明友既後匈奴因乘烏桓敝擊之斬首六千餘級獲三王首還封為平陵侯匈奴繇是恐不能出兵即使使之烏孫求欲得漢公主擊烏孫取車延惡師地烏孫公主上書下公卿議救未決昭帝崩宣帝即位烏孫昆彌復上書言連為匈奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊匈奴唯天子出兵哀救公主本始二年漢大發關東輕銳士選郡國吏三百石伉健習騎射者皆從軍遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓增三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原凡五將軍兵十餘萬騎出塞各二千餘里及校尉常惠使護發兵烏孫西域昆彌自將翕侯以下五萬餘騎從西方入與五將軍兵凡二十餘萬眾匈奴聞漢兵大出老弱犇走敺畜產遠遁逃是以五將少所得度遼將軍出塞千二百餘里至蒲離候水斬首捕虜七百餘級鹵獲馬牛羊萬餘前將軍出塞千二百餘里至烏員斬首捕虜至侯出百餘級鹵馬牛羊二千餘蒲類將軍兵當與烏孫合擊匈奴蒲類澤烏孫先期至而去漢兵不與相及蒲類將軍出塞千八百餘里西去候山斬首捕虜得單于使者蒲陰王以下三百餘級鹵馬牛羊七千餘聞虜已引去皆不至期還天子薄其過寬而不罪祁連將軍出塞千六百里至雞秩山斬首捕虜十九級獲牛馬羊百餘逢漢使匈奴還者冉弘等言雞秩山西有虜眾祁連即戒弘使言無虜欲還兵御史屬公孫益壽諫以為不可祁連不聽遂引兵還虎牙將軍出塞八百餘里至丹余吾水上即止兵不進斬首捕虜千九百餘級鹵馬牛羊七萬餘引兵還上以虎牙將軍不至期詐增鹵獲而祁連知虜在前逗遛不進皆下吏自殺擢公孫益壽為侍御史校尉常惠與烏孫兵至右谷蠡庭獲單于父行及嫂居次名王犁汙都尉千長將以下三萬九千餘級虜馬牛羊驢驘橐駞七十餘萬漢封惠為長羅侯然匈奴民眾死傷而去者及畜產遠移死亡不可勝數於是匈奴遂衰耗怨烏孫其冬單于自將萬騎擊烏孫頗得老弱欲還會天大雨雪一日深丈餘人民畜產凍死還者不能什一於是丁令乘弱攻其北烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚眾又重以餓死人民死者什三畜產什五匈奴大虛弱諸國羈屬者皆瓦解攻盜不能理其後漢出三千餘騎為三道並入匈奴捕虜得數千人還匈奴終不敢取當茲欲鄉和親而邊境少事矣壼衍鞮單于立十七年死弟左賢王立為虛閭權渠單于是歲地節二年也虛閭權渠單于立以右大將女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏父左大且渠怨望是時匈奴不能為邊寇於是漢罷外城以休百姓單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後今亦效漢發兵先使使者入乃自請與呼盧訾王各將萬騎南旁塞獵相逢俱入行未到會三騎亡降漢言匈奴欲為寇於是天子詔發邊騎屯要害處使大將軍軍監治眾等四人將五千騎分三隊出塞各數百里捕得虜各數十人而還時匈奴亡其三騎不敢入即引去是歲也匈奴飢人民畜產死十六七又發兩屯各萬騎以備漢其秋匈奴前所得西嗕居左地者其君長以下數千人皆驅畜產行與甌脫戰所戰殺傷甚眾遂南降漢其明年西域城郭共擊匈奴取車師國得其王及人眾而去單于復以車師王昆弟兜莫為車師王收其餘民東徒不敢居故地而漢益遣屯士分田車師地以實之其明年匈奴怨諸國共擊車師遣左右大將各萬騎屯田右地欲以侵迫烏孫西域後二歲匈奴遣左右奧鞬各六千騎與左大將再擊漢之田車師城者不能下其明年丁令比三歲入盜匈奴殺略人民數千驅馬畜去匈奴遣萬餘騎往擊之無所得其明年單于將十萬餘騎旁獵欲入邊寇未至會其民題除渠堂亡降漢言狀漢以為言兵鹿奚盧侯而遣後將軍趙充國將兵四萬餘騎屯緣邊九郡備虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犁胡次等入漢請和親未報會單于死是歲神爵二年也虛閭權渠單于立九年死自始立而黜顓渠閼氏顓渠閼氏即與右賢王私通右賢王會龍城而去顓渠閼氏語以單于病甚且勿遠後數日單于死郝宿王刑未央使人召諸王未至顓渠閼氏與其弟左大且渠都隆奇謀立右賢王屠耆堂為握衍朐鞮單于握衍朐鞮單于者代父為右賢王烏維單于耳孫也握衍朐鞮單于立復修和親遣弟伊酋若王勝之入漢獻見單于初立凶惡盡殺虛閭權渠時用事貴人刑未央等而任用顓渠閼氏弟都隆奇又盡免虛閭權渠子弟近親而自以其子弟代之虛閭權渠單于子稽侯狦既不得立亡歸妻父烏禪幕烏禪幕者本烏孫康居間小國數見侵暴率其眾數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其眾居右地日逐王先賢撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其眾數萬騎歸漢漢封日逐王為歸德侯單于更立其從兄薄胥堂為日逐王明年單于又殺先賢撣兩弟烏禪幕請之不聽心恚其後左奧鞬王死單于自立其小子為奧鞬王留庭奧鞬貴人共立故奧鞬王子為王與俱東徙單于遣右丞相將萬騎往擊之失亡數千人不勝時單于已立二歲暴虐殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨其明年烏桓擊匈奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯狦為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰匈奴共攻我若肯發兵助我乎右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我握衍朐鞮單于恚自殺左大且渠都隆奇亡之右賢王所其民眾盡呼韓邪單于是歲神爵四年也握衍朐鞮單于立三年而敗
