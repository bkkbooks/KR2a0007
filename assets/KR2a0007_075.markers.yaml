  - {type: variant, offset: 5621, length: 0, content: '', WYG: 鄭𢎞言之房博皆棄市𢎞坐免為庶人房本姓李推律自定為京氏死時年四十一翼奉字少君東海下邳人也治齊詩與蕭望之匡衡同師三人經術皆明衡為後進望之施之政事而奉惇學不仕好律歴隂陽之占元帝初卽位諸儒薦之徵待詔宦者署數言事宴見天子敬焉時平昌侯王臨以宣帝外屬侍中稱詔欲從奉學其術奉不肯與言而上封事曰臣聞之於師治道要務在知下之邪正人誠鄉正雖愚為用師古曰鄉讀曰嚮若廼懷邪知益為害宋祁曰知當讀作去聲知下之術在於六情十二律而已北方之情好也好行貪狼申子主之孟康曰北方水水生於申盛於子水性觸地而行觸物而潤多所好故多好則貪而無厭故為貪狼也宋祁曰注文故多好字多字可刪可添四字云多所好故為好多所好則貪而無厭故為貪狼東方之情怒也怒行隂賊亥卯主之孟康曰東方木木生於亥盛於卯木性受水氣而生貫地而出故為怒以隂氣賊害土故為隂賊也貪狼必待隂賊而後動隂賊必待貪狼而後用二隂並行是以王者忌子卯也禮經避之春秋諱焉李竒曰北方隂也卯又隂賊故為二隂王者忌之不舉樂春秋禮記説皆同賈氏説桀以乙卯亡紂以甲子喪惡以為戒張晏曰子刑卯卯刑子相刑之日故以為忌而云夏以乙卯亡殷以甲子亡不推湯武以興此說非也師古曰儒者以為子卯夏殷亡日大失之矣何儒亮以為學者雖駁云只取夏殷亡日不論殷周之興以為大失不博考其義且天人之際其理相符有徳者昌無徳者亡以桀紂之暴虐又遇惡日其理必亡以湯武之徳固先天而天不違所謂徳能消殃矣豈殃能消徳也劉攽曰王者忌子卯隂陽家言子邜相刑午酉自刑若相刑可忌自刑不可忌邪言夏殷亡日是也此聖人戒後世使自儆爾故當其日稷食菜羮為戒也非以其日凶也何說湯武興及徳勝殃乎今桀以丙辰滅紂以乙丑亡亦用辰丑為疾日爾南方之情惡也惡行亷貞寅午主之孟康曰南方火火生於寅盛於午火性炎猛無所容受故為惡其氣精専嚴整故為廉貞西方之情喜也喜行寛大己酉主之孟康曰西方金金生於己盛於酉金之為物喜以利刃加於萬物故為喜利刃所加無不寛大故曰寛大也二陽並行是以王者吉午酉也詩曰吉日庚午師古曰小雅吉日之詩也其詩曰吉日庚午旣差我馬言以庚午之吉日簡擇車馬以出田也上方之情樂也樂行姦邪辰未主之孟康曰上方謂北與東也陽氣所萌生故為上辰窮水也未窮木也翼氏風角曰木落歸本水流歸末故木利在亥水利在辰盛衰各得其所故樂也水窮則無隙不入木上出窮則旁行故為姦邪下方之情哀也哀行公正戌丑主之孟康曰下方謂南與西也隂氣所萌生故為下戌窮火也丑窮金也翼氏風角曰金剛火彊各歸其鄉故火刑於午金刑於酉酉午金火之盛也盛時而受刑至窮無所歸故曰哀也火性無所私金性方剛故曰公正辰未屬隂戌丑屬陽萬物各以其類應今陛下明聖虚静以待物至萬事雖衆何聞而不諭師古曰諭謂暁解之豈況乎執十二律而御六情於以知下參實亦甚優矣萬不失一自然之道也廼正月癸未日加申有暴風從西南來未主姦邪申主貪狼風以大隂下抵建前是人主左右邪臣之氣也張晏曰初元二年歲在甲戌正月二十二日癸未也太隂在太歲後孟康曰時太隂在未月建在寅風從未下至寅南也建為主氣太隂臣氣也加主氣是人主左右邪臣驗也晉灼曰癸未日風未辰也時加申張說是也平昌侯比三來見臣皆以正辰加邪時辰為客時為主人以律知人情王者之秘道也張晏曰平昌侯欲依上來學為時邪也風日加申申知秘道也孟康曰謂乙丑之日也丑為正日加未而來為邪時晉灼曰奉以未為邪時占知平昌侯為邪人此當言皆以邪辰加邪時字誤作正耳下言大邪之見辰時俱邪是也翼氏曰五行動為五音四時散為十二律也愚臣誠不敢以語邪人上以奉為中郎召問奉來者以善日邪時孰與邪日善時奉對曰師法用辰不用日孟康曰假令甲子日子為辰甲為日用子不用甲也辰為客時為主人見於明主侍者為主人張晏曰禮君燕見臣則使臣為主人故侍者為主人辰正時邪見者正侍者邪辰邪時正見者邪侍者正忠正之見侍者雖邪辰時俱正孟康曰大正厭小邪也凡辰時屬南與西為正北與東為邪晉灼曰以上占推之南方己午西方酉戌東北寅丑為正西南申未北方亥子東方辰卯為邪大邪之見侍者雖正辰時俱邪孟康曰大邪厭小正也卽以自知侍者之邪而時邪辰正見者反邪孟康曰凡占以見者為本今自知侍者邪而時復邪則邪無所施故屬見者晉灼曰上言忠正客見侍者雖邪辰時俱正然則小邪屬主人矣何以知之見者以大正來反我小邪故也卽以自知侍者之正而時正辰邪見者反正孟康曰已自知侍者正而時復正則正無所施辰雖邪而見者更正也晉灼曰上言大邪客見侍者雖正辰時俱邪然則小正屬主人矣以此法占之卽以自知主人之正而時正辰邪矣何以知之見者以大邪來反我小正故也辰為常事時為一行孟康曰假令甲子日則一日一夜為子時十二時也日加之行過也辰疏而時精其效同功必參五觀之然後可知故曰察其所繇省其進退師古曰繇與由同參之六合五行則可以見人性知人情難用外察從中甚明故詩之為學情性而已五性不相害六情更興廢師古曰更音工衡反宋祁曰興疑作與字觀性以歴張晏曰性謂五行也歴謂日也晉灼曰翼氏五性肝性静静行仁甲己主之心性躁躁行禮丙辛主之脾性力力行信戊癸主之肺性堅堅行義乙庚主之腎性智智行敬丁壬主之也觀情以律張晏曰情謂廉貞寛大公正姦邪隂賊貪狼也律十二律也明主所宜獨用難與二人共也故曰顯諸仁臧諸用師古曰易上繫之辭也道周萬物故曰顯諸仁日用不知故曰臧諸用也露之則不神獨行則自然矣唯奉能用之學者莫能行是歲關東大水郡國十一饑疫尤甚上廼下詔江海陂湖園池屬少府者以假貧民勿租稅損大官膳減樂府員省苑囿諸宫館稀御幸者勿繕治太僕少府減食榖馬水衡省食肉獸明年二月戊午地震其夏齊地人相食七月己酉地復震上曰蓋聞賢聖在位隂陽和風雨時日月光星辰静黎庶康寧考終厥命今朕共承天地託于公侯之上明不能燭徳不能}
