  - {type: variant, offset: 7428, length: 0, content: '', krp: 誣罔主上不道賀良等皆伏誅尋及解光減死一等徙敦煌郡贊曰幽贊神明通合天人之道者莫著乎易春秋師古曰幽深贊明也宋祁曰注文幽深下當有也字然子贛猶云夫子之文章可得而聞師古曰謂易辭文言及春秋之屬也夫子之言性與天道不可得而聞已矣師古曰性命𤣥遠天道幽深}
  - {type: variant, offset: 7429, length: 2, content: 事尚, WYG: 孔子不言之也此皆論語述子貢之言也漢興推隂陽言災異者孝武時有董仲舒夏侯始昌昭宣則眭孟夏侯勝元成則京房翼奉劉向谷永哀平則李尋田終術此其納說時君著明者也察其所言仿佛一端師古曰仿讀曰髣佛與髴同假經說誼依託象類或不免乎億則屢中師古曰論語稱孔子曰賜不受命而貨殖焉億則屢中故此贊引之言仲舒等億度所言旣多故時有中者耳非必道術皆通明也億於力反仲舒下吏夏侯囚執眭孟誅戮李尋流放此學者之大戒也京房區區不量淺深危言刺譏構怨彊臣罪辜不旋踵亦不宻以失身悲夫師古曰易上繫辭曰君不密則失臣臣不密則失身故贊引之也前漢}
