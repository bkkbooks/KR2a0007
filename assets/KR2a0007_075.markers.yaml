  - {type: variant, offset: 7428, length: 0, content: '', WYG: 誣罔主上不道賀良等皆伏誅尋及解光減死一等徙敦煌郡贊曰幽贊神明通合天人之道者莫著乎易春秋師古曰幽深贊明也宋祁曰注文幽深下當有也字然子贛猶云夫子之文章可得而聞師古曰謂易辭文言及春秋之屬也夫子之言性與天道不可得而聞已矣師古曰性命𤣥遠天道幽深}
