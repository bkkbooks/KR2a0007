  - {type: variant, offset: 24, length: 1, content: 衡, WYG: 期日果災時昌邑王以少子愛上為選師始昌為太傅年老以壽終族子勝亦以儒顯名夏侯勝宋祁云陸徳明論語序釋文夏户雅反勝音升或式澄反一作升澄反字長公初魯共王分魯西寧鄕師古曰共讀如恭恭王名餘景帝之子也宋祁云王字下疑有時字以封子節侯别屬大河大河後更名東平故勝為東平人勝少孤}
