  - {type: variant, offset: 4629, length: 2, content: 蝕三, krp: 月失明星辰逆行山崩泉湧地震石隕夏霜冬靁師古曰靁古雷字春凋秋榮隕霜不殺水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備師古曰言今皆備有之陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與師古曰與讀曰歟上曰然幸其瘉於彼又以為不在此人也師古曰瘉與愈同愈猶勝也言今之災異及政道猶幸勝於徃日又不由所任之人房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良乆廼曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之師古曰如若也房曰上最所信任與圗事帷幄之中進退天下之士者是矣師古曰圗謀也房指謂石顯上亦知之謂房曰已諭師古曰言已暁此意房罷出後上令房上弟子暁知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防雍塞師古曰雍讀曰壅石顯五鹿充宗皆疾房欲遠之師古曰出之令遠去建言宜試以房為郡守師古曰立議云然也元帝於是以房為魏郡太守秩八百石居得以考功法治郡房自請願無屬刺史得除用他郡人自第吏千石以下如淳曰令長屬縣自課第殿最嵗竟乘傳奏事師古曰傳音張戀反其下亦同天子許焉房自知數以論議為大臣所非内與石顯五鹿充宗有隙不欲遠離左右及為太守憂懼房以建昭二年二月朔拜上封事曰辛酉以來䝉氣衰去太陽精明臣獨欣然以為陛下有所定也然太隂倍力而乘消息孟康曰房以消息卦為辟辟君也息卦曰太隂消卦曰太陽其餘卦曰少隂少陽謂臣下也并力雜卦氣于消息也宋祁曰注文當作息卦曰太陽消卦曰太隂臣疑陛下雖行此道猶不得如意臣竊悼懼守陽平侯鳳欲見未得至己卯臣拜為太守此言上雖明下猶勝之效也師古曰言權臣蔽主之明故已出為郡守也臣出之後恐必為用事所蔽身死而功不成故願歲盡乘傳奏事䝉哀見許廼辛巳䝉氣復乘卦太陽侵色張晏曰晉卦解卦也太陽侵色謂大壯也劉攽曰蒙氣起而太陽侵色則太陽指日也大壯解卦可云太陽而非所侵色也此上大夫覆陽而上意疑也師古曰覆掩蔽也己卯庚辰之閒必有欲隔絶臣令不得乘傳奏事者房未發上令陽平侯鳳承制詔房止無乘傳奏事房意愈恐去至新豐因郵上封事師古曰郵行書者也若今傳送文書矣郵音尤曰臣前以六月中言遯卦不效法曰道人始去寒涌水為災師古曰道人有道術之人也天氣寒而又有水涌出也至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中今涌水己出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也師古曰自云不避死也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺高而死孟康曰姓正名先秦博士也高威自此成故秦之亂正先趣之師古曰趣讀曰促今臣得出守郡自詭效功師古曰詭責也自以為憂責也恐未效而死惟陛下毋使臣塞涌水之異師古曰塞亦當也當正先之死為姚平所笑房至陕復上封事師古曰陕𢎞農之縣也音式冉反曰乃丙戌小雨丁亥䝉氣去然少隂并力而乘消息戊子益甚到五十分蒙氣復起孟康曰分一日為八十分分起夜半是為戊子之日日在已西而蒙也蒙常以晨夜今向中而蒙起是臣黨盛君不勝也此陛下欲正消息雜卦之黨并力而争消息之氣不勝彊弱安危之機不可不察己丑夜有還風盡辛卯孟康曰諸卦氣以寒温不效後九十一日為還風還風暴風也風為教令言正令還也太陽復侵色至癸巳日月相薄孟康曰京房傳曰雖非日月同宿之時隂道盛猶上薄日光如此但日無光不食也此邪隂同力而太陽為之疑也臣前白九年不改必有星亡之異張晏曰九陽數之極也孟康曰畫食為旣夜食為盡而星亡為星不見也臣願出任良試考功臣得居内星亡之異可去議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聽之此廼蒙氣所以不解太陽亡色者也臣去朝稍遠太陽侵色益甚唯陛下毋難還臣而易逆天意師古曰易輕也音弋跂反邪說雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博從房受學以女妻房房與相親毎朝見輙為博道其語師古曰所與天子言皆具說之以為上意欲用房議而羣臣惡其害已故為衆所排博曰淮陽王上親弟敏達好政欲為國忠今欲令王上書求入朝得佐助房房曰得無不可師古曰恐不可也博曰前楚王朝薦士何為不可房曰中書令石顯尚書令五鹿君相與合同巧佞之人也事縣官}
