  - {type: variant, offset: 5635, length: 2, content: 親有, WYG: 郎吏從官行能亡以異又不通一蓺及博士無文雅者宜皆使就南畆師古曰遣歸農業以視天下師古曰視讀曰示明朝廷皆賢材君子於以重朝尊君滅凶致安此其本也臣自知所言害身不辟死亡之誅唯財留神反覆覆愚臣之言師古曰財與裁}
