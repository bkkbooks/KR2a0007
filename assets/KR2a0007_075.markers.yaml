  - {type: variant, offset: 5632, length: 0, content: '', WYG: 求備以博聚英儁如近世貢禹以言事忠切蒙尊榮當此之時士厲身立名者多禹死之後日日以衰及京兆尹王章坐言事誅滅智者結舌師古曰不敢出言也邪偽並興外戚顓命君臣隔塞至絶}
