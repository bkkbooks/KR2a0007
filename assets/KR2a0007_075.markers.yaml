  - {type: variant, offset: 8555, length: 216, content: 傅皇后稱渭陵東園臣知妾不得體君卑不得敵尊而希指雷同詭經辟說以惑誤上為臣不忠當伏斧鉞之誅幸蒙洒心自新又令得保首領伏自惟念入稱四輔出備三公爵為列侯誠無顏復望闕廷無心復居官府無宜復食國邑願上太師大司徒扶德侯印綬避賢者路下君章有司皆以為四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位如君言至誠可聽惟君之惡在洒心前不敢文過朕甚多之不奪君之爵邑以著自古皆有死之義其上太師大司徒印綬使者以侯就弟王莽篡位以宮為太子師卒官本姓馬矢宮仕學稱馬氏云, WYG: 命}
