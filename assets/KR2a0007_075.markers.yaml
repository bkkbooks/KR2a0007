  - {type: variant, offset: 5628, length: 0, content: '', krp: 字日失其光則星辰放流張晏曰日夜食則失光晝立六尺木不見其景也日陽失光明隂得施也宋祁曰注文中隂得施也當作月隂桀得施也陽不能制隂隂桀得作閒者太白正晝經天宜隆徳克躬以執不軌臣聞月者衆隂之長銷息見伏百里為品千里立表萬里連紀孟康曰品同也言百里内數度同也千里則當立表度其景萬里則紀其本所起紀其宿度也妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君徳春夏南秋冬北閒者月數以春夏與日同道孟康曰房有四星其閒有三道春夏南行南頭第一星裏道也秋冬北行北頭第一星裏道也與日同道者謂中央道也此三道者日月五星之所由也過軒轅上后受氣孟康曰軒轅南大星為后入太微帝廷揚光煇犯上將近臣列星皆失色厭厭如滅鄭氏曰厭音檿桑之檿師古曰音烏㸃反此為母后與政亂朝師古曰與讀曰豫隂陽俱傷兩不相便外臣不知朝事竊信天文卽如此近臣已不足杖矣師古曰杖謂倚任也屋大柱小可為寒心師古曰言天下事重大臣之任當得賢能者唯陛下親求賢士無彊所惡以崇社禝尊彊本朝師古曰邪佞之人誠可賤惡勿得寵異令其盛彊也臣聞五星者五行之精五帝司命應王者號令為之節度歲星主歲事為綂首號令所紀今失度而盛此君指意欲有所為未得其節也又塡星不避歲星者后帝共政相留於奎婁張晏曰歲星為帝塡星為女主也當以義㫁之熒惑徃來亡常劉攽曰營當作熒周歴兩宫作態低卬張晏曰兩宫謂紫微大微入天門上明堂貫尾亂宫孟康曰角兩星為天門房為明堂尾為後宫蘇林曰常占當從尾北而今貫之尾為後宫之義也宋祁曰注文義字疑作象太白發越犯庫張晏曰發越疾貌也庫天庫也孟康曰奎為天庫兵寇之應也貫黄龍入帝庭張晏曰黄龍軒轅也當門而出隨熒惑入天門至房而分欲與熒惑為患不敢當明堂之精此陛下神靈故旤亂不成也熒惑厥弛張晏曰厥弛動揺貌宋祁曰注末疑少晉灼曰行遲貌六字佞巧依埶微言毁譽進類蔽善師古曰進其黨類而擁蔽善人太白出端門孟康曰端門太微正南門臣有不臣者火入室金上堂張晏曰熒惑入營室也孟康曰火入室謂熒惑歴兩宫也金謂太白也上堂入房星也宋祁曰注文兩宫字下疑有宫亦室三字不以時解其憂凶塡歲相守又主内亂宜察蕭牆之内毋忽親疏之微師古曰微謂其事微宋祁曰注末當有細字誅放佞人防絶萌牙以盪滌濁濊消散積惡師古曰濊與穢同毋使得成禍亂辰星主正四時當效於四仲四時失序則辰星作異今出於歲首之孟天所以譴告陛下也政急則出蚤政緩則出晚政絶不行則伏不見而為彗茀師古曰茀與孛同四孟皆出為易王命四季皆出星家所諱今幸獨出寅孟之月蓋皇天所以篤右陛下也師古曰篤厚也右與祐同祜猶助也宜深自改治國故不可以戚戚欲速則不達經曰三載考績三考黜陟師古曰虞書舜典之辭也言三年一考功績三考一行黜陟也加以號令不順四時旣徃不咎來事之師也閒者春三月治大獄宋祁曰來字疑作成字春三月浙江本作春月時賊隂立逆恐歲小收宋祁曰小字疑作少字季夏舉兵法時寒氣應恐後有霜雹之災秋月行封爵其月土溼奥張晏曰違於月令也師古曰奥温也音於六反恐後有雷雹之變夫以喜怒賞罰宋祁曰罰疑作誅而不顧時禁雖有堯舜之心猶不能致和善言天者必有效於人設上農夫而欲冬田肉袒深耕汗出種之然猶不生者非人心不至天時不得也易曰時止則止時行則行動静不失其時其道光明師古曰此艮卦彖辭也言動止隨時則有光明也書曰敬授民時師古曰虞書堯典之辭也言授下以四時之命不可不敬也故古之王者尊天地重隂陽敬四時嚴月令順之以善政則和氣可立致猶枹鼓之相應也師古曰枹擊鼓之椎也音孚其字從木今朝廷忽於時月之令諸侍中尚書近臣宜皆令通知月令之意設羣下請事若陛下出令有謬於時者當知争之以順時氣臣聞五行以水為本其星𤣥武婺女天地所紀終始所生孟康曰婺女須女也北方天地之統隂陽之終始也水為準平王道公正脩明則百川理落脉通師古曰落謂經絡也偏黨失綱則涌溢為敗書云水曰潤下師古曰周書洪範之辭也隂動而卑不失其道天下有道則河出圗洛出書故河洛決溢所為最大今汝潁畎澮皆川水漂涌與雨水並為民害師古曰畎澮小流也許愼說廣尺深尺曰畎廣二尋深二仞謂之澮川者水貫穿而通流也畎音工犬反澮音工外反此詩所謂􅏎􅏎震電不寧不令百川沸騰者也師古曰詩小雅}
  - {type: variant, offset: 5629, length: 0, content: '', WYG: 月之交之詩也􅏎􅏎光貌寧安令善也言隂陽失和雷電失序不安不善故百川又沸騰其咎在於皇甫卿士之屬師古曰皇甫卿士周室女寵之族也解在劉向傳唯陛下留意詩人之言少抑外親大臣臣聞地道柔静隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歴州俱動者其異最大閒者關東地數震}
