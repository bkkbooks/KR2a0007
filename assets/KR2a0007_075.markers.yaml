  - {type: variant, offset: 5364, length: 252, content: 品式數歲明習漢制及法令上甚信任之轉為僕射尚書令有詔光周密謹慎未嘗有過加諸吏官以子男放為侍郎給事黃門數年遷諸吏光祿大夫秩中二千石給事中賜黃金百斤領尚書事後為光祿勳復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合如或不從不敢強諫爭以是久而安時有所言輒削草稾以為章主之過以奸忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光嘿不應更答以它語其不泄如是光帝師傅子少以經行自著進官蚤成不結黨友養游說有求於人既性自守亦其勢然也徙光祿勳, WYG: 出}
