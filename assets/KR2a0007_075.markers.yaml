  - {type: variant, offset: 7506, length: 4, content: 御史大夫, WYG: 革命一際也亥又為天門二際也卯為隂陽交際三際也午為陽謝隂興四際也酉為隂盛陽微五際也据此則五際不言戌而亥為二際矣但緯書怪妄百出其是非初不足辨李尋傳與張孺鄭寛中同師臣召南按孺字誤也据儒林傳張山拊事小夏侯建授同縣李尋鄭寛中少君山陽張無故子儒此文張孺卽張無故而舉其字當云張子儒傳寫之訛遂合兩字為孺字耳五經六緯注孟康曰六緯五經與樂緯師古用孟康說而劉攽駁之謂正說星宿何故忽說五經其論甚合但所云天文六緯名目劉攽亦未嘗指實也使侍中衛尉傅喜問尋云云通鑑考異曰按公卿表傅喜為衛尉}
  - {type: page-break, offset: 7506, content: '', id: KR2a0007_WYG_075-42b, image: WYG0250/WYG0250-0572b.png}
