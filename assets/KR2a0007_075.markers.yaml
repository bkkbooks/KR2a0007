  - {type: variant, offset: 3182, length: 1241, content: 徒跣待罪天子使謁者詔衡冠履而有司奏衡專地盜土衡竟坐免初衡封僮之樂安鄉鄉本田隄封三千一百頃南以閩佰為界初元元年郡圖誤以閩佰為平陵佰積十餘歲衡封臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡乃定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰主簿陸賜故居奏曹習事曉知國界署集曹掾明年治計時衡問殷國界事曹欲柰何殷曰賜以為舉計令郡實之恐郡不肯從實可令家丞上書衡曰顧當得不耳何至上書亦不告曹使舉也聽曹為之後賜與屬明舉計曰案故圖樂安鄉南以平陵佰為界不從故而以閩佰為界解何郡即復以四百頃付樂安國衡遣從史之僮收取所還田穀千餘石入衡家司隸校尉駿少府忠行廷尉事劾奏衡監臨盜所主守直十金以上春秋之義諸侯不得專地所以壹統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制專地盜土以自益及賜明阿承衡意猥舉郡計亂減縣界附下罔上擅以地附益大臣皆不道於是上可其奏勿治丞相免為庶人終於家子咸亦明經歷位九卿家世多為博士者張禹字子文河內軹人也至禹父徙家蓮勺禹為兒數隨家至市喜觀於卜相者前久之頗曉其別蓍布卦意時從旁言卜者愛之又奇其面貌謂禹父是兒多知可令學經及禹壯至長安學從沛郡施讎受易琅邪王陽膠東庸生問論語既皆明習有徒眾舉為郡文學甘露中諸儒薦禹有詔太子太傅蕭望之問禹對易及論語大義望之善焉奏禹經學精習有師法可試事奏寑罷歸故官久之試為博士初元中立皇太子而博士鄭寬中以尚書授太子薦言禹善論語詔令禹授太子論語由是遷光祿大夫數歲出為東平內史元帝崩成帝即位徵禹寬中皆以師賜爵關內侯寬中食邑八百戶禹六百戶拜為諸吏光祿大夫秩中二千石給事中領尚書事是時帝舅陽平侯王鳳為大將軍輔政專權而上富於春秋謙讓方鄉經學敬重師傅而禹與鳳並領尚書內不自安數病上書乞骸骨欲退避鳳上報曰朕以幼年執政萬機懼失其中君以道德為師故委國政君何疑而數乞骸骨忽忘雅素欲避流言朕無聞焉君其固心致思總秉諸事推以孳孳無違朕意加賜黃金百斤養牛上尊酒太官致餐侍醫視疾使者臨問禹惶恐復起視事河平四年代王商為丞相封安昌侯為相六歲鴻嘉元年以老病乞骸骨上加優再三乃聽許賜安車駟馬黃金百斤罷就第以列侯朝朔望位特進見禮如丞相置從事史五人益封四百戶天子數加賞賜前後數千萬禹為人謹厚內殖貨財家以田為業及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈它財物稱是禹性習知音聲內奢淫身居大第後堂理絲竹筦弦禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而疏之崇每候禹常責師宜置酒設樂與弟子相娛禹將崇入後堂飲食婦女相對優人筦弦鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一肉卮酒相對宣未嘗得至後堂及兩人皆聞知各自得也禹年老自治冢瑩起祠室好平陵肥牛亭部處地又近延陵奏請求之上以賜禹詔令平陵徙亭它所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壞舊亭重非所宜孔子稱賜愛其羊我愛其禮宜更賜禹它地根雖為舅上敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毀惡之天子愈益敬厚禹禹每病輒以起居聞車駕自臨問之上親拜禹床下禹, WYG: ''}
