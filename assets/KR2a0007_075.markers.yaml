  - {type: variant, offset: 524, length: 199, content: 陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以德義示之以好惡觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉恥之節薄淫辟之意縱綱紀失序疏者踰內親戚之恩薄婚姻之黨隆苟合徼幸以身設利不改其原雖歲赦之刑猶難使錯而不用也臣愚以為宜壹曠然大變其俗孔子曰能以禮讓為國乎何有朝廷者天下之楨幹也公, WYG: 靑紫}
