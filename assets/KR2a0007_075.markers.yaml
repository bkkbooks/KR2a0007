  - {type: 'tls:seg', offset: 23, content: '', id: KR2a0007_tls_075-1a.5}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 為天子者枯社木復生故廢之家公孫氏當復興者也孟意亦不知其所在卽説曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人孟康曰誰問差擇也問擇天下賢人䄠以帝位師古曰䄠古禪字也而退自封百里如殷周二王後以承順天命孟使友人内官長賜上此書師古曰内官署名百官表云内官長丞初屬少府中屬主爵後屬宗正賜者其長之名時昭帝幼大將軍霍光秉政惡之下其書廷尉奏賜孟妄設祅言惑衆大逆不道皆伏誅後五年孝宣帝興於民間卽位徵孟子為郎夏侯始昌魯人也通五經以齊詩尚書教授自董仲舒韓嬰死後武帝得始昌甚重之始昌明於隂陽先言柏梁臺災日}
  - {type: page-break, offset: 23, content: '', id: KR2a0007_WYG_075-2b, image: WYG0250/WYG0250-0552b.png}
