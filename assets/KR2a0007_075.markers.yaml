  - {type: variant, offset: 5671, length: 648, content: 陰為王求漢嗣私事趙皇后昭儀及帝舅大司馬驃騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍廉襃後將軍朱博皆引入禁中議中山定陶王誰宜為嗣者方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣襃博皆如方進根議光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議以為令犯法者各以法時律令論之明有所訖也長犯大逆時乃始等見為長妻已有當坐之罪與身犯法無異後乃棄去於法無以解請論光議以為大逆無道父母妻子同產無少長皆棄市欲懲後犯法者也夫婦之道有義則合無義則離長未自知當坐大逆之法而棄去乃始等或更嫁義已絕而欲以為長妻論殺之名不正不當坐有詔光議是是歲右將軍襃後將軍博坐定陵紅陽侯皆免為庶人以光為左將軍居右將軍官職執金吾王咸為右將軍居後將軍官職罷後將軍官數月丞相方進薨召左將軍光當拜已刻侯印書贊上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由己出朝廷翕然望至治焉襃賞大臣益封光千戶時成帝母太皇太后自居長樂宮而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人帝之立又有力光心恐傅太后與政事不欲令與帝旦夕相近即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房復道通未央宮傅太后果從復道朝夕至帝所求, WYG: 尤驕恣}
