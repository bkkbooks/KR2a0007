  - {type: variant, offset: 107, length: 3, content: 平原衡, WYG: 反至四年夏關東四十九郡同日地動或山崩壊城郭室屋殺六千餘人上乃素服避正殿遣使者弔問吏民賜死者棺錢下詔曰蓋災異者天地之戒也朕承洪業託士民之上未能和羣生曩者地震北海琅邪壊祖宗廟朕甚懼焉宋祁曰曩字疑作廼字其與列侯中二千石博問術士有以應變補朕之闕毋有所諱因大赦勝出為諫大夫給事中霸為揚州刺史勝為人質樸守正簡易亡威儀見時謂上為君師古曰見見於天子誤相字於前師古曰前天子之前也君前臣名}
