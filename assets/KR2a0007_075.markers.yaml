  - {type: variant, offset: 7512, length: 857, content: 為丞相復故國博山侯上乃知光前免非其罪以過近臣毀短光者復免傅嘉曰前為侍中毀譖仁賢誣愬大臣令俊艾者久失其位嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意詩不云乎讒人罔極交亂四國其免嘉為庶人歸故郡明年定三公官光更為大司徒會哀帝崩太皇太后以新都侯王莽為大司馬徵立中山王是為平帝帝年幼太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光為舊相名儒天下所信太后敬之備禮事光所欲搏擊輒為草以太后指風光令上之厓眥莫不誅傷莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衛供養行內署門戶省服御食物明年徙為太師而莽為太傅光常稱疾不敢與莽並有詔朝朔望領城門兵莽又風群臣奏莽功德稱宰衡位在諸侯王上百官統焉光愈恐固稱疾辭位太后詔曰太師光聖人之後先師之子德行純淑道術通明居四輔職輔道于帝今年耆有疾俊艾大臣惟國之重其猶不可以闕焉書曰無遺耇老國之將興尊師而重傅其令太師毋朝十日一賜餐賜太師靈壽杖黃門令為太師省中坐置几太師入省中用杖賜餐十七物然後歸老于弟官屬按職如故光凡為御史大夫丞相各再壹為大司徒太傅太師歷三世居公輔位前後十七年自為尚書止不教授後為卿時會門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿策贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供張諫大夫持節與謁者二人使護喪事博士護行禮太后亦遣中謁者持節視喪公卿百官會弔送葬載以乘輿轀輬及副各一乘羽林孤兒諸生合四百人輓送車萬餘兩道路皆舉音以過喪將作穿復土可甲卒五百人起墳如大將軍王鳳制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千戶病甚上書讓還七千戶及還所賜一弟子放嗣莽篡位後以光兄子永為大司馬封侯昆弟子至卿大夫四五人始光父霸以初元元年為關內侯食邑霸上書求奉孔子祭祀元帝下詔曰其令師襃成君關內侯霸以所食邑八百祀孔子焉故霸還長子福名數於魯奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千戶莽更封為襃成侯後避王莽更名均馬宮字游卿東海戚人也治春秋嚴氏以射策甲科為郎, WYG: ''}
