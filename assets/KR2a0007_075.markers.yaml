  - {type: variant, offset: 7480, length: 0, content: '', WYG: 羊春秋於董仲舒故𢎞書稱先師董仲舒也至符節令按百官表符節令屬少府漢家堯後臣召南按以漢為堯後始見此文然則宏雖習公羊亦兼通左氏矣其後劉向父子申明其義而新莽亦因以為簒竊之本京房傳補小黄令地理志小黄縣屬陳留郡時部刺史奏事京師胡三省曰刺史各部一州故曰部刺史今為治邪亂邪臣召南按通鑑考異曰故資政殿學士邵亢得兩浙錢王寫本漢書無亂邪二字有上曰亦極亂耳尚何道房曰今十二字据此則古本無亂邪二字翼奉傳與蕭望之匡衡同師臣召南按儒林傳其師}
