  - {type: variant, offset: 35, length: 2, content: 尤精, WYG: 尚書授太后遷長信少府賜爵關内侯以與謀廢立師古曰與讀曰豫定策安宗廟益千户劉奉世曰關内侯無國云何言益宣帝初卽位欲襃先帝詔丞相御史曰朕以渺身蒙遺徳承聖業奉宗廟夙夜惟念師古曰惟思也孝武皇帝躬仁誼厲威武北征匈奴單于遠遁南平氐𦍑劉奉世曰氐𦍑不在南恐誤昆明甌駱兩越師古曰甌駱皆越號東定薉貉朝鮮張晏曰薉也貉也在遼東之東師古曰薉字與穢字同貉音莫客反廓地斥境立郡縣百蠻率服款塞自至珍貢陳於宗廟恊音律造樂歌薦上帝封太山立明堂改正朔易服色明開聖緒尊賢顯功興滅繼絶襃周之後宋祁曰周之後越本邵本無之備天地之禮廣道術之路上天報况師古曰况賜也符瑞並應寳鼎出白麟獲海效鉅魚師古曰效致也鉅大也神人並見山稱萬嵗功徳茂盛不能盡宣而廟樂未稱師古曰稱副也朕甚悼焉其與列侯二千石博士議於是羣臣大議廷中皆曰宜如詔書長信少府勝獨曰武帝雖有攘四夷廣土斥境之功然多殺士衆竭民財}
