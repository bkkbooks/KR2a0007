  - {type: variant, offset: 5629, length: 0, content: '', krp: 月之交之詩也􅏎􅏎光貌寧安令善也言隂陽失和雷電失序不安不善故百川又沸騰其咎在於皇甫卿士之屬師古曰皇甫卿士周室女寵之族也解在劉向傳唯陛下留意詩人之言少抑外親大臣臣聞地道柔静隂之常義也地有上中下其上位震應妃后不順中位應大臣作亂下位應庶民離畔震或於其國國君之咎也四方中央連國歴州俱動者其異最大閒者關東地數震}
  - {type: variant, offset: 5630, length: 1, content: 年, WYG: 星作異亦未大逆宜務崇陽抑隂以救其咎固志建威閉絶私路㧞進英雋退不任職以彊本朝夫本彊則精神折衝本弱則招殃致凶為邪謀所陵師古曰折衝言有欲衝突為害者則能折挫之聞徃者淮南王作謀之時其所難者獨有汲黯以為公孫宏等不足言也宏漢之名相於今亡比而尚見輕何況无宏之屬乎故曰朝廷亡人則為賊亂所輕其道自然也天下未聞陛下竒策固守之臣也語曰何以知朝廷之衰人人自賢不務於通人故世陵夷師古曰通人謂薦達賢材也陵夷謂穨替也馬不伏歴不可以趨道士不素飬不可以重國師古曰伏歴謂伏槽歴而秣之也趨讀曰趣詩曰濟濟多士文王以寧師古曰大雅文王之詩也已解於上孔子曰十室之邑必有忠信師古曰論語載孔子之言也非虛言也陛下秉四海之衆曾亡柱幹之固守聞於四境殆開之不廣取之不明勸之不篤傳曰土之美者善養禾君之明者善養士中人皆可使為君子師古曰言在所以勸厲之詔書進賢良赦小過}
