  - {type: variant, offset: 27, length: 3, content: 家貧庸, WYG: 從始昌受尚書及洪範五行傳説災異後事蕳卿師古曰姓蕳名卿蕳音姦又從歐陽氏問為學精孰所問非一師也善說禮服師古曰禮之喪服也徵為博士光祿大夫會昭帝崩昌邑王嗣立數出師古曰每出游戲也勝當乘輿前諫曰天乆隂而不雨臣下有謀上者陛下出欲何之師古曰之徃也宋祁曰輿字下疑有車字王怒謂勝為祅言縛以屬吏師古曰屬委也音之欲反吏白大將軍霍光光不舉法是時光與車騎將軍張安世謀欲廢昌邑王光譲安世以為泄語安世實不言宋祁曰言字疑}
  - {type: page-break, offset: 27, content: '', id: KR2a0007_WYG_075-3b, image: WYG0250/WYG0250-0552d.png}
