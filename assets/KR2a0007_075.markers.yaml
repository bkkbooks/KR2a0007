  - {type: variant, offset: 31, length: 0, content: '', WYG: 泄廼召問勝勝對言在洪範傳曰皇之不極厥罰常隂時則下人有伐上者惡察察言師古曰惡謂忌諱也察為計謀不敢明顯言之也五行志曰不敢察察言也宋祁曰注文為疑作謂故云臣下有謀劉敞曰傳本云下人伐上而勝自}
  - {type: variant, offset: 31, length: 0, content: '', krp: 泄廼召問勝勝對言在洪範傳曰皇之不極厥罰常隂時則下人有伐上者惡察察言師古曰惡謂忌諱也察為計謀不敢明顯言之也五行志曰不敢察察言也宋祁曰注文為疑作謂故云臣下有謀劉敞曰傳本云下人伐上而勝自}
  - {type: variant, offset: 32, length: 2, content: 供資, WYG: 為不欲分明道之故改云臣下有謀爾光安世大驚以此益重經術士後十餘日光卒與安世白太后師古曰卒終也宋祁曰白字上疑有共字廢昌邑王尊立宣帝光以為羣臣奏事東宫太后省政師古曰省視也宜知經術白令勝}
