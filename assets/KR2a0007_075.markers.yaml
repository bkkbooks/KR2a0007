  - {type: variant, offset: 5634, length: 0, content: '', WYG: 女宫作亂師古曰謂趙飛燕姊妹也此行事之敗誠可畏而悲也本在積任母后之家非一日之漸徃者不可及來者猶可追也先帝大聖深見天意昭然使陛下奉承天統欲矯正之也宜少抑外親選練左右舉有徳行道術通明之士充備天官然後可以輔聖徳保帝位承大宗下}
