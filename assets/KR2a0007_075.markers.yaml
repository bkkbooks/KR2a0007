  - {type: variant, offset: 4694, length: 469, content: 善應之與下同其福喜此經義意也新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜說遂親就禹禹見時有變異若上體不安擇日絜齋露蓍正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對己問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋玄成皆說論語篇弟或異禹先事王陽後從庸生采獲所安最後出而尊貴諸儒為之語曰欲為論念張文由是學者多從張氏餘家寖微孔光字子夏孔子十四世之孫也孔子生伯魚鯉鯉生子思伋伋生子上帛帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳涉博士死陳下鮒弟子襄為孝惠博士長沙太傅襄生忠忠生武及安國武生延年延年生霸字次儒霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為太中大夫以選授皇太子經遷詹事高密相是時諸侯王相在郡守上元帝即位徵霸以師賜爵關內侯食邑八百戶號襃成君給事中加賜黃金二百斤第一區徙名數于長安霸為人謙退不好權勢常稱爵位泰過何德以堪之上欲致霸相位自, WYG: ''}
