  - {type: variant, offset: 19, length: 3, content: 父世農, WYG: 師古曰眭音息隨反今河朔尚有此姓音字皆然而韋昭應劭並云音桂非也今有炅姓乃音桂耳漢之决錄又不作眭字寧可混糅將為一族又近代學者旁别炅氏譜以相附著私譜之文出於閭巷家自為說事非經典苟引先賢妄相假托無所取信寜足據乎蕃音反宋祁云决錄浙本作炔欽少時好侠鬭雞走馬長乃變節從嬴公受春秋師古曰嬴姓也公長老之號耳宋祁云侠字上疑有游字以明經為議郎至符節令孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立後有白烏數千下集其旁是時昌邑有枯社木卧復生師古曰社木社主之樹也又上林苑中大柳樹斷枯臥地亦自立生有蟲食樹葉成文字曰公孫病已立孟推春秋之意以為石柳皆隂類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起師古曰僵偃也偃臥於地音居羊反宋祁云象字下疑有而字非人力所為此當有從匹}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_075-1b, image: WYG0250/WYG0250-0551b.png}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_075-2a, image: WYG0250/WYG0250-0552a.png}
