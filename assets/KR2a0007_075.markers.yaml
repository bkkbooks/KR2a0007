  - {type: variant, offset: 5622, length: 1, content: 和, WYG: 災異並臻連年不息乃二月戊午地大震于隴西郡毁落太上廟殿壁木飾壞敗䝠道縣師古曰䝠音桓劉奉世曰有蠻夷曰道稱道則不稱縣也此縣字衍陽夏公曰按地理志䝠道乃天水郡十六縣之一表云列侯所食縣曰國皇太后公主所食曰邑有蠻夷曰道然則道國邑皆可謂之縣城郭官寺及民室屋厭殺人衆山崩地裂水泉涌出一年地再動天惟降災震驚朕躬治有大虧咎至於此夙夜兢兢不通大變深懷鬱悼未知其序比年不登元元困乏不勝饑寒以陷刑辟朕甚閔焉㦧怛於心師古曰㦧音千感反已詔吏虚倉廩開府臧振捄貧民師古曰捄古救字羣司其茂思天地之戒師古曰茂勉也有可蠲除減省以便萬姓者各條奏悉意陳朕過失靡有所諱師古曰悉盡也因赦天下舉直言極諫之士奉奏封事曰臣聞之於師曰天地設位懸日月布星辰分隂陽定四時列五行以視聖人名之曰道師古曰視讀曰示下類此聖人見道然後知王治之象故畫州土建君臣立律歴陳成敗以視賢者名之曰經賢者見經然後知人道之務則詩書易春秋禮樂是也易有隂陽詩有五際應劭曰君臣父子兄弟夫婦朋友也孟康曰詩内傳曰五際卯酉午戌亥也隂陽終始際㑹之歲於此則有變改之政也春秋有災異皆列終始推得失考天心以言王道之安危至秦乃不說傷之以法師古曰説音悅言不悦詩書而以文法傷文學之人也是以大道不通至於滅亡今陛下明聖深懐要道燭臨萬方師古曰燭照也布徳流惠靡有闕遺罷省不急之用振救困貧賦醫藥賜棺錢師古曰賦謂分給之恩澤甚厚又舉直言求過失盛徳純備天下幸甚臣奉竊學齊詩聞五際之要十月之交篇師古曰小雅篇名也知日蝕地震之效昭然可明猶巢居知風穴處知雨師古曰巢居烏鵲之屬也穴處狐貍之類也亦不足多適所習耳臣聞人氣内逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽用其精隂用其形猶人之有五臧六體五臧象天六體象地故臧病則氣色發於面體病則欠伸動於貌今年太隂建於甲戌律以庚寅初用事歴以甲午從春孟康曰太隂在甲戌則太嵗在子十一月庚寅日黄鍾律初起用事也歴中甲庚律得參陽性中仁義情得公正貞廉張晏曰甲庚皆三陽甲在東方為仁庚在西方為義戌為公正寅午為廉貞晉灼曰木數三寅在東方木位之始故曰參陽也師古曰中音竹仲反百年之精歲也正以精歲本首王位張晏曰春也日臨中時接律而地大震其後連月乆隂雖有大令猶不能復師古曰大令謂虚倉廩開府庫之屬也復補也音扶目反隂氣盛矣古者朝廷必有同姓以明親親少有異姓以明賢賢此聖王之所以大通天下也同姓親而易進異姓疏而難通故同姓一異姓五廼為平均今左右亡同姓獨以舅后之家為親異姓之臣又疏二后之黨滿朝非特處位埶尤奢僭過度呂霍上官足以卜之甚非愛人之道又非後嗣之長策也隂氣之盛不亦宜乎臣又聞未央建章甘泉宫才人各以百數皆不得天性師古曰言絶男女之好也若杜陵園其已御見者臣子不敢有言雖然太皇太后之事也及諸侯王園與其後宫宜為設員出其過制者此損隂氣應天救邪之道也今異至不應災將隨之其法大水極隂生陽反為大旱甚則有火災春秋宋伯姬是矣師古曰伯姬魯成公女宋恭公之夫人也幽居守寡旣乆而遇火災極隂生陽也宋祁曰注文火災下疑冇故云二字唯陛下財察師古曰財與裁同明年夏四月乙未孝武園白鶴館宋祁曰館字下疑有災字奉自以為}
