  - {type: variant, offset: 1648, length: 1178, content: 以群下更相是非吏民無所信臣竊恨國家釋樂成之業而虛為此紛紛也願陛下詳覽統業之事留神於遵制揚功以定群下之心大雅曰無念爾祖聿修厥德孔子著之孝經首章蓋至德之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性可以贊天地之化治性之道必審己之所有餘而強其所不足蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽勇猛剛強者戒於大暴仁愛溫良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒所以崇聖德臣又聞室家之道修則天下之理得故詩始國風禮本冠婚始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家道之衰莫不始乎梱內故聖王必慎妃后之際別適長之位禮之於內也卑不隃尊新不先故所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴眾子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜游燕所親物得其序得其序則海內自修百姓從化如當親者疏當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義陛下聖德純備莫不修正則天下無為而治詩云于以四方克定厥家傳曰正家而天下定矣衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對言多法義上以為任公卿由是為光祿勳御史大夫建昭三年代韋玄成為丞相封樂安侯食邑六百戶元帝崩成帝即位衡上疏戒妃匹勸經學威儀之則曰陛下秉至孝哀傷思慕不絕於心未有游虞弋射之宴誠隆於慎終追遠無窮已也竊願陛下雖聖性得之猶復加聖心焉詩云煢煢在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也臣又聞之師曰妃匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好仇言能致其貞淑不貳其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世已來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬遠技能竊見聖德純茂專精詩書好樂無厭臣衡材駑無以輔相善義宣揚德音臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也故審六藝之指則人天之理可得而和草木昆蟲可得而育此永永不易之道也及論語孝經聖人言行之要宜究其意臣又聞聖王之自為動靜周旋奉天承親臨朝享臣物有節文以章人倫蓋欽翼祗粟事天之容也溫恭敬遜承親之禮也正躬嚴恪臨眾之儀也嘉惠和說饗下之顏也舉錯動作物遵其儀故形為仁義動為法則孔子曰德義可尊容止可觀進退可度以臨其民是以其民畏而愛之則而象之大雅云敬慎威儀惟民之則諸侯正月朝覲天子天子惟道德昭穆穆以視之又觀以禮樂饗醴乃歸故萬國莫不獲賜祉福蒙化而成俗今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動靜之節使群下得望盛德休光以立基楨天下幸甚上敬納其言頃之衡復奏正南北郊罷諸淫祀語在郊祀志初元帝, WYG: ''}
