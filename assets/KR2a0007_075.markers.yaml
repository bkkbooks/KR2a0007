  - {type: variant, offset: 5625, length: 1, content: 即, WYG: 疏曰臣前上五際地震之效曰極隂生陽恐有火災不合明聽未見省答臣竊内不自信今白鶴館以四月乙未時加於卯月宿亢災與前地震同法臣奉廼深知道之可信也不勝拳拳願復賜間卒其終始師古曰間空隙也卒盡也上復延問以得失奉以為祭天地於雲陽汾隂及諸寢廟不以親疏迭毁皆煩費違古制又宫室苑囿奢泰難供以故民困國虛亡累年之畜所繇來乆師古曰畜讀曰蓄繇讀與由同不改其本難以末正廼上疏曰臣聞昔者盤庚改邑以興殷道聖人美之師古曰盤庚殷王名也將遷亳殷衆庶咸怨作盤庚三篇以告之遂乃遷都事見尚書也竊聞漢徳隆盛在於孝文皇帝躬行節儉外省繇役其時未有甘泉建章及上林中諸離宫館也未央宫又無高門武臺麒麟鳳皇白虎玉堂金華之殿獨有前殿曲臺漸臺宣室温室承明耳孝文欲作一臺度用百金師古曰度計也音大各反重民之財廢而不為其積土基至今猶存師古曰今在新豐縣南驪山頂上也又下遺詔不起山墳故其時天下大和百姓洽足宋祁曰洽疑作給徳流後嗣如令處於當今因此制度必不能成功名天道有常王道亡常亡常者所以應有常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻黽池前鄉崧高後介大河師古曰鄉讀曰嚮介隔也礙也建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西遠羌胡之難師古曰厭抑也音一葉反遠音于萬反陛下共已亡為師古曰共讀曰恭按成周之居兼盤庚之徳萬歲之後長為高宗漢家郊兆寢廟祭祀之禮多不應古臣奉誠難亶居而改作如淳曰亶居猶虛居也欲徙都乃可更制度也師古曰亶讀曰但但居謂依舊都也故願陛下遷都正本衆制皆定亡復繕治宫館不急之費歲可餘一年之畜師古曰讀曰蓄次下亦同臣聞三代之祖積徳以王然皆不過數百年而絶周至成王有上賢之材因文武之業以周召為輔師古曰召讀曰邵有司各敬其事在位莫非其人師古曰言所任皆得賢材也天下甫二世耳師古曰甫始也然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂師古曰周書亡逸篇也其書曰周公曰烏虖毋若殷王紂之迷亂酗于酒徳哉是也其詩則曰殷之未喪師克配上帝宜監于殷駿命不易師古曰詩大雅文王之詩也師衆也駿大也言殷家自帝乙以上未喪天下之時皆能配天而行至紂荒怠自取敗滅今宜以殷王賢愚為鏡知天之大命甚難也今漢初取天下起於豐沛以兵征伐徳化未洽後世奢侈國家之費當數代之用非直費財又乃費士孝武之世暴骨四夷不可勝數有天下雖未乆至於陛下八世九主矣如淳曰呂后為主不得為世故八世九主矣雖有成王之明然亡周召之佐師古曰召讀曰邵今東方連年饑饉加之以疾疫百姓菜色或至相食師古曰人専食菜故肌膚青黄為菜色也地比震動天氣溷濁日光侵奪師古曰比頻也溷汙也音下頓反繇此言之師古曰繇讀與由同執國政者豈可以不懷怵惕而戒萬分之一乎故臣願陛下因天變而徙都所謂與天下更始者也天道終而復始窮則反本故能延長而亡窮也今漢道未終陛下本而始之於以永世延祚不亦優乎如因丙子之孟夏順太隂以東行張晏曰如因今丙子之四月也太隂是時在甲戌當轉在乙亥丙子左旋之也到後七年之明歲必有五年之餘蓄然後大行考室之禮李竒曰凡宫新成殺牲以釁祭致其五祀之神謂之考室師古曰考成也成其禮也詩小雅斯干之詩序曰斯干宣王考室也故奉引之雖周之隆盛亡以加此唯陛下留神詳察萬世之策書奏天子異其意答曰問奉今園廟有七云東徙狀何如奉對曰昔成王徙洛盤庚遷殷其所避就皆陛下所明知也非有聖明不能一變天下之道臣奉愚戇狂惑唯陛下裁赦其後貢禹亦言當定迭毁禮上遂從之及匡衡為丞相奏徙南北郊其議皆自奉發之奉以中郎為博士諫大夫年老以壽終子及孫皆以學在儒官李尋字子長平陵人也治尚書與張孺鄭寛中同師寛中等守師法敎授尋獨好洪範災異又學天文月令隂陽事丞相翟方進方進亦善為星歴除尋為吏數為翟侯言事帝舅曲陽侯王根為大司馬票騎將軍厚遇尋是時多災異根輔政數虛已問尋尋見漢家有中衰阸㑹之象其意以為且有洪水為災乃說根曰書云天聰明師古曰虞書臯陶謨之辭也天視聽人君之行不可不畏愼也蓋言紫宫極樞通位帝紀孟康曰紫宫天之北宫也極天之北極星也樞是其廻轉者也天文志曰天極其一明者太一常居也太一天皇大帝也與通極為一體故曰通位帝紀也太微四門廣開大道孟康曰太微天之南宫也四門太微之四門也五經六緯尊術顯士孟康曰六緯五經與樂緯也張晏曰六緯五經就孝經緯也師古曰六緯者五經之緯及樂緯也孟說是也劉攽曰正言星宿何故忽説五經蓋謂二十八舍翼張舒布燭臨四海張晏曰翼二十八星十八度舒布張廣也翼翅夹張故言也少微處士為比為輔孟康曰少微四星在太微西主處士儒學之官為太微輔佐也故次帝廷女宫在後孟康曰言少微四星在太㣲次太微為天帝廷女宫謂軒轅星也聖人承天賢賢易色取法於此師古曰賢賢尊上賢人易色輕略於色不貴之也易弋二反天官上相上將皆顓面正朝孟康曰朝太微宫垣也面垣為上將東垣為上相各専一面而正天之朝事也憂責甚重要在得人得人之效成敗之機不可不勉也昔秦穆公說諓諓之言任仡仡之勇身受大辱社稷幾亡師古曰諓諓小善也仡仡壯健也謂聽杞子逢孫陽孫之言言鄭可襲乃使孟明視西乞術白乙丙帥師伐鄭遂為晉襄公所禦而敗於殽三帥盡獲匹馬隻輪皆無反者諓音踐仡巨乙反又音牛乞反悔過自責思惟黄髮任用百里奚卒伯西域徳列王道師古曰謂晉歸三帥之後穆公自悔作秦誓云雖則云然尚猶詢兹黄髮則罔所愆自言前有云然之過今庶幾以道謀此黄髮賢老則行事無所過失矣百里奚本虞人也穆公用之卒成霸業二者禍福如此可不愼哉夫士者國家之大寳功名之本也將軍一門九侯二十朱輪漢興以來臣子貴盛未嘗至此夫物盛必衰自然之理唯有賢友彊輔庶幾可以保身命全子孫安國家書曰歴象日月星辰師古曰虞書堯典之辭也此言仰視天文俯察地理觀日月消息候星辰行伍揆山川變動參人民繇俗師古曰繇讀與謡同繇俗者謂若童謡及輿人之誦以制法度考禍福舉錯誖逆咎敗將至徵兆為之先見師古曰誖乖也音布内反明君恐懼修正側身博問轉禍為福不可救者卽蓄備以待之故社稷亡憂竊見徃者赤黄四塞地氣大發動土竭民天下擾亂之徴也彗星爭明張晏曰與日月爭明宋祁曰南本無動字民字下疑有困字庶雄為桀大寇之引也師古曰將引致大寇也此二者已頗效矣城中訛言大水奔走上城朝廷驚駭女孽入宫應劭曰謂小女陳持弓也此獨未效閒者重以水泉涌溢旁宫闕仍出李竒曰旁宫闕而出水也師古曰旁附也仍頻也重直用反旁薄郎反月太白入東井犯積水缺天淵張晏曰犯東井有水災孟康曰積水一星在北河北天淵十星在北斗星東南缺者拂其角而過之也日數湛於極陽之色張晏曰衆陽之宗故為極陽也色宜明燿而無光也羽氣乘宫孟康曰天文志曰西方為羽羽少隂之位少隂臣氣乗於君也晉灼曰羽北方水也水隂為臣宫中央土也土為君今水乗土言臣氣勝於君也起風積雲又錯以山崩地動河不用其道師古曰錯雜也言河徙流不從故道也宋祁曰正文河字下疑有决字盛冬靁電濳龍為孽孟康曰黑龍冬見張晏曰五行傳曰龍見井中幽囚之象也繼以隕星流彗維塡上見孟康曰有地維星有四塡星皆妖星也晉灼曰天文志四塡星出四隅去地可四丈地維藏光亦出四隅去地可二丈若月始出所見下有亂者亡冇徳者昌日蝕有背鄉師古曰背音歩内反鄉讀曰嚮此亦高下易居洪水之徵也不憂不改洪水廼欲盪滌流彗廼欲埽除改之則有年亡期師古曰言可延期得禳災故屬者頗有變改小貶邪猾師古曰屬者謂近時也屬之欲反日月光精時雨氣應師古曰精謂光明也宋祁曰光字江浙本作立字此皇天右漢亡已也師古曰右讀曰祐何況致大改之宜急博求幽隐拔擢天士任以大職李竒曰天士知天道者也晉灼曰嚴君平言師於天士天士應宿台鼎之臣也師古曰李說是也宋祁曰注文言字下當有賞公飬士四字諸闒茸佞讇抱虛求進師古曰闒音吐臘反茸音人勇反讇古謟字及用殘賊酷虐聞者若此之徒宋祁曰聞字當改作間皆嫉善憎忠壞天文敗地理涌趯邪隂湛溺太陽師古曰趯字與躍同湛讀曰沈為主結怨於民師古曰為音于偽反宜以時廢退不當得居位誠必行之凶災銷滅子孫之福不旋日而至政治感隂陽猶鐵炭之低卬見效可信者也孟康曰天文志云縣土炭也以鐵易土耳先冬夏至縣鐵炭於衡各一端令適停冬陽氣至炭仰而鐵低夏隂氣至炭低而鐵仰以此候二至也及諸蓄水連泉務通利之修舊堤防省池澤稅以助損隂邪之盛案行事考變易訛言之效未嘗不至請徴韓放服䖍曰姓名也暁水掾周敞王望可與圗之根於是薦尋哀帝初卽位召尋待詔黄門使侍中衞尉傅喜問尋曰間者水出地動日月失度星辰亂行災異仍重師古曰重音直用反極言母有所諱尋對曰陛下聖徳尊天敬地畏命重民悼懼變異不忘疏賤之臣幸使重臣臨問愚臣不足以奉明詔竊見陛下新卽位開大明除忌諱博延名士靡不並進臣尋位卑術淺過隨衆賢待詔師古曰過猶謬也食太官衣御府乆汙玉堂之署師古曰玉堂殿在未央宫比得召見亡以自效師古曰比頻也復時見延問至誠自以逢不世出之命願竭愚心不敢有所避庶幾萬分有一可采唯棄須㬰之閒宿留瞽言師古曰閒謂空隙之時也宿音先就反留音力救反考之文理稽之五經揆之聖意以參天心夫變異之來各應象而至臣謹條陳所聞易曰縣象著明莫大乎日月師古曰上繫之辭也在天成象故曰縣象也夫日者衆陽之長煇光所燭萬里同晷人君之表也師古曰晷景也故日將旦清風發羣隂伏君以臨朝不牽於色日初出炎以陽君登朝佞不行忠直進不蔽障日中煇光君徳盛明大臣奉公日將入専以壹君就房有常節君不修道則日失其度晻昧亡光師古曰晻與暗同又音烏感反各有云為其於東方作日初出時師古曰作起也日出之時人物皆起隂雲邪氣起者法為牽於女謁有所畏難日出後為近臣亂政日中為大臣欺誣日且入為妻妾役使所營師古曰營謂繞也宋祁曰謂繞惑之閒者日尤不精光明侵奪失色邪氣珥蜺數作夲起於晨相連至昏其日出後至日中閒差瘉師古曰瘉與愈同小臣不知内事竊以日視陛下志操衰於始初多矣其咎恐有以守正直言而得罪者傷嗣害世不可不愼也唯陛下執乾剛之徳彊志守度毋聽女謁邪臣之態諸保阿乳母甘言悲辭之託㫁而勿聽勉强大誼絶小不忍良有不得已可賜以財貨不可私以官位誠皇天之禁也宋祁曰浙本官位下更有官}
