  - {type: variant, offset: 1441, length: 188, content: 事者多進見人人自以為得上意又傅昭儀及子定陶王愛幸寵於皇后太子衡復上疏曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統傳之無窮繼體之君心存於承宣先王之德而襃大其功昔者成王之嗣位思述文武之道以養其心休烈盛美皆歸之二后而不敢專其名是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止言成王常思祖考之業而鬼神祐助其治也陛下聖德天覆子愛海內然陰陽未和姦邪未禁者殆論議者未丕揚先帝之盛功爭言制度, WYG: ''}
