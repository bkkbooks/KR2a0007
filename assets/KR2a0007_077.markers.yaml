  - {type: variant, offset: 1613, length: 0, content: '', krp: 屬欲令授子經更為除舍師古曰除謂修飾揷除也設儲偫師古曰謂豫備器物也偫音丈紀反寳自劾去忠固還之師古曰固者謂再三留之心内不平師古曰恨其去也後署寳主簿寳徙入舍祭竈請比鄰忠隂察怪之使所親問寳前大夫為君設除大舍子自劾去者欲為髙節也今兩府髙士俗不為主簿子既為之徙舍甚説師古曰説讀曰悦何前後不相副也寳曰髙士不為主簿而大夫君以寳為可一府莫言非師古曰言大夫以為寳適可為主簿耳府中之人又不以為不當也士安得獨自髙前日君男欲學文而移寳自近師古曰文謂書也禮有来學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎師古曰言士不遭遇知己則當屈辱無所不為也忠聞之甚慙上書薦寳經明質直宜備近臣為議郎遷諫大夫鴻嘉中廣漢羣盗起選為益州刺史廣漢太守扈商者大司馬車騎將軍王音姊子軟弱不任職寳到部親入山谷諭告羣盗非本造意渠率皆得悔過自出師古曰渠大也遣歸田里自劾矯制奏商為亂首師古曰擅放羣盗歸故云矯制由商不任職致有賊盗故云為亂首也春秋之義誅首惡而已商亦奏寳所縱或有渠率當坐者師古曰縱放也商徵下獄寳坐失死罪免益州吏民多陳寳功效言為車騎將軍所排上復拜寳為冀州刺史遷}
