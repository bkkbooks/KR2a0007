  - {type: variant, offset: 4697, length: 0, content: '', WYG: 仆顛也僵音薑仆音赴詡至拜為羙俗使者文潁曰宣羙風俗使者是時潁川鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金師古曰臧謂致罪之臧也並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪如淳曰減死罪一等願蚤就髠鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟陽翟輕俠趙季李欵多畜賔客以氣力漁食閭里師古曰漁者謂侵奪取之若漁獵之為也至姦人婦女持吏長短從横郡中師古曰從音子用反横音胡孟反聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部敕曰三人非負太守廼負王法不得不治鍾威所犯多在赦前驅使入函谷關勿令汙民閒不入關廼收之趙李桀惡雖逺去當得其頭以謝百姓鍾威負其兄止雒陽師古曰負謂恃其權力也吏格殺之亦得趙李它郡持頭還並皆縣頭}
