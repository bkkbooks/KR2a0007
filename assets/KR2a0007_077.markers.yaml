  - {type: variant, offset: 1423, length: 0, content: '', WYG: 列侯輔上書言臣聞天之所與必先賜以符瑞天之所違必先降以災變此神明之徴應自然之占驗也昔武王周公承順天地以饗魚烏之瑞師古曰謂伐紂時有白魚赤烏之瑞也事見今文尚書然猶君臣祇懼動色相戒况於季世不蒙繼嗣之福屢受威怒之異者乎雖夙夜自責改過易行畏天命念祖業妙選有徳之世考卜窈窕之女師古曰窈窕幽閑也以承宗廟順神祗心塞天下望師古曰塞滿也子孫之祥猶恐晚暮今廼觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之師古曰市道市中之道也一曰市人及行於道路者也朝廷莫肯壹言臣竊傷心自念得以同姓㧞擢尸祿不忠汚辱諫爭之官不敢不盡死唯陛下深察書奏上使侍御史收縛輔繫掖庭祕獄師古曰漢書舊儀掖庭詔獄令丞宦者為之主理婦人女官也羣臣莫知其故於是中朝}
