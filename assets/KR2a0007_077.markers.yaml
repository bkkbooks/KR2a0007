  - {type: variant, offset: 1398, length: 1, content: 丞, WYG: 許章以外屬貴幸奢滛不奉法度賓客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章廹窘馳車去豐追之許侍中因得入宫門自歸上師古曰歸誠乞哀於天子也豐亦上奏於是收豐節司隸去節自豐始豐上書謝曰臣豐駑怯文不足以勸善武不足以}
