  - {type: variant, offset: 4625, length: 0, content: '', WYG: 終於家建武中錄舊徳臣以寳孫伉為諸長師古曰伉音抗諸琅邪之縣也母將隆字君房東海蘭陵人也大司馬車騎將軍王音内領尚書外典兵馬踵故選置從事中郎師古曰踵猶躡也言承躡故事也與參謀議奏請隆為從事中郎遷諫大夫成帝末隆奏封事言古者選諸侯入為公卿以褒功徳宜徵定陶王使在國邸以填萬方師古曰填音竹刃反其}
