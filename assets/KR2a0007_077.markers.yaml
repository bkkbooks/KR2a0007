  - {type: variant, offset: 1413, length: 0, content: '', WYG: 奔陳使大夫元咺奉叔武以居}
  - {type: variant, offset: 1413, length: 0, content: '', krp: 奔陳使大夫元咺奉叔武以居}
  - {type: variant, offset: 1414, length: 0, content: '', WYG: 其後晉人納成公成公疑叔武而先期入叔武将沐聞君至喜捉髮走出前驅射而殺之事在左傳僖二十八年叔武弟音大計反宋祁曰注文叔武弟下疑有弟字夫以四子之行屈平之材師古曰屈平即是屈原也然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國蒙誅以顯君師古曰䝉被也臣誠願之獨恐未有云補而為衆邪所排令讒夫得遂正直之路雍塞師古曰雍讀曰壅忠臣沮心智士杜口師古曰沮壞杜塞也沮音才汝反此愚臣之所懼也豐以春夏繫治人在位多言其短上徙豐為城門校尉豐上書告光祿勲周堪光祿大夫張猛上不直豐廼制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之羙豐前為司隸校尉不順四時修法度專作苛暴宋祁曰修疑作循以獲虚威朕不忍下吏以為城門校尉不内省諸已師古曰省察也而反怨堪猛以求報舉師古曰舉言其事以報怨告案無證之辭暴揚難驗之罪毁譽恣意不顧前言師古曰前言謂舉堪猛之羙今乃更言其短是不顧也不信之大者也朕憐豐之耆老不忍加刑其免為庶人終於家劉輔河間宗室也舉孝亷為襄賁令蘇林曰賁音肥東海縣也上書言得失召見上羙其材擢為諫大夫㑹成帝欲立趙倢伃為皇后先下詔封倢伃父}
