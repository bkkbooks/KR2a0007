  - {type: variant, offset: 135, length: 277, content: 丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至德仁厚哀閔元元躬有日仄之勞而亡佚豫之樂允執聖道刑罰惟中然而嘉氣尚凝陰陽不和是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職舉錯各以其意多與郡縣事至開私門聽讒佞以求吏民過失譴呵及細微責義不量力郡縣相迫促亦內相刻流至眾庶是故鄉黨闕於嘉賓之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則陰陽否鬲和氣不興未必不由此也詩云民之失德乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知本朝之要務臣愚不知治道唯明主察焉上嘉納之宣數言政事便宜舉奏部刺史郡國, WYG: ''}
