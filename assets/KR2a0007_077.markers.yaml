  - {type: variant, offset: 4698, length: 4, content: 成帝時何, WYG: 其具獄於市郡中清靜表善好士師古曰好音呼到反見紀潁川名次黄霸性清廉妻子不至官舍數年卒疾病召丞掾作先令書師古曰先為遺令也曰告子恢吾生素餐日久死雖當得法賻勿受如淳曰公令吏死官得法賻師古曰贈終者布帛曰賻音附葬為小椁亶容下棺張晏曰禮三重棺趙簡子曰不設屬辟下卿之罰也或曰但下棺無餘器物也師古曰言止作小槨纔容下棺而已無令髙大也亶讀曰但恢如父言王莽擢恢為關都尉建}
