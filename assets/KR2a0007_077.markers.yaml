  - {type: variant, offset: 2087, length: 198, content: 罷就第初宣有兩弟明修明至南陽太守修歷郡守京兆尹少府善交接得州里之稱後母常從修居官宣為丞相時修為臨菑令宣迎後母修不遣後母病死修去官持服宣謂修三年服少能行之者兄弟相駮不可修遂竟服繇是兄弟不和久之哀帝初即位博士申咸給事中亦東海人也毀宣不供養行喪服薄於骨肉前以不忠孝免不宜復列封侯在朝省宣子況為右曹侍郎數聞其語賕客楊明欲令創咸面目使不居位會司隸缺況恐咸為之遂令明遮斫咸宮門外斷鼻脣身八創事下有司御史中丞眾, WYG: 大鴻臚蕭育}
