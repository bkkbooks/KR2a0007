  - {type: variant, offset: 4685, length: 0, content: '', WYG: 待之師古曰儲豫備也度音徒各反林卿既去北度涇橋令騎奴還至寺門㧞刀剝其建鼓師古曰諸官曹之所通呼為寺建鼔一名植鼓建立也謂植木而旁懸鼓焉縣有此鼓者所以召集號令為開閉之時並自從吏兵追林卿行數十里林卿廹窘廼令奴}
