  - {type: variant, offset: 1411, length: 0, content: '', WYG: 而斷姦臣之首縣於都市編書其罪師古曰編謂聨次簡牘也使四方明知為惡之罸然後却就斧鉞之誅師古曰却退也宋祁曰却字並注文却字疑作郤誠臣所甘心也夫以布衣之士尚猶有刎頸之交師古曰刎斷也音吻今以四海之大曽無伏節死誼之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢濁溷之氣上感于天師古曰溷亦濁也音下頓反是以災變數見百姓困乏此臣下不忠之效也臣誠恥之亡已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也今陛下天覆地載物無不容師古曰如天之覆如地之載也使尚書令堯賜臣豐書曰夫司隸者刺舉不法善善惡惡非得顓之也師古曰善善襃賞善人也惡惡誅罰惡人也顓與専同免處中和宋祁曰免越本作勉劉奉世曰免}
