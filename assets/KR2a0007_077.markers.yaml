  - {type: variant, offset: 4608, length: 1, content: 立, WYG: 有郤師古曰失車騎將軍謂失王音意奏扈商事也郤與隙同自恐見危時淳于長方貴幸友寳寳亦欲附之始視事而長以穉季託寳故寳窮無以復應文文怪寳氣索師古曰索盡也音先各反知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問師古曰閤閉也如此竟嵗吏民未敢誣明府也師古曰誣謗也即度穉季而譴它事李竒曰過度不治罪衆口讙譁終身自墮師古曰墮毁也音火規反寳曰受教穉季耳目長聞知之杜門不通水火師古曰杜塞也不通水火謂雖鄰伍亦不徃来也穿舍後牆為小戸但持鉏自治園因文所厚自陳如此師古曰具言恐懼改節之狀也文曰我與穉季幸同土壤素無睚眥師古曰睚音涯眥音才賜反睚又音五懈反眥又音仕懈反已觧於前也顧受將命分當}
