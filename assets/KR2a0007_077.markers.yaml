  - {type: variant, offset: 1601, length: 1, content: 宣, WYG: 禮至於成人師古曰道讀曰導惠澤茂焉師古曰茂羙也欲報之徳皥天罔極師古曰詩小雅蓼莪之篇曰父兮生我母兮鞠我欲報之徳昊天罔極言欲報父母之㤙德心無已也呼昊天者陳已至誠也皥字與昊同前追號皇太太后父}
