  - {type: variant, offset: 4618, length: 0, content: '', krp: 考馮太后令自殺衆庶寃之寳}
  - {type: variant, offset: 4619, length: 0, content: '', WYG: 請覆治傅太后大怒曰帝置司隸主使察我馮氏反事明白故欲擿觖以揚我惡師古曰擿觖謂挑發之也擿音它歴反觖音决挑音它聊反宋祁曰擿字正文注文當作謫我當坐之上廼順指下寳獄尚書僕射唐林爭之上以林朋黨比周師古曰比音頻寐反左遷敦煌魚澤障候大司馬傅喜光祿大夫龔勝固爭上為言太后出寳復官頃之鄭崇下獄寳上書曰臣聞疏不圖親外不慮内師古曰圖謀也慮思也臣幸得銜命奉使職在刺舉不敢避貴幸之埶以塞視聼之明按尚書令昌奏僕射崇下獄覆治榜掠將死卒無一辭師古曰榜掠謂笞擊而考問之也榜音彭道路稱寃疑昌與崇内有纖介師古曰言有細故宿嫌也浸潤相䧟自禁門内樞機近臣䝉受寃譖師古曰蒙被也虧損國家為謗不小臣請治昌以觧衆心書奏天子不説師古曰説讀曰悦以寳名臣不忍誅廼制詔丞相大司空劉敞曰此既云丞相不得復有大司空也司隸寳奏故尚書僕射崇寃請獄治尚書令昌案崇近臣罪惡暴著而寳懐邪附下罔上以春月作詆欺遂其姦心盖國之賊也傳不云乎惡利口之覆國家師古曰論語稱孔子之言其免寳為庶人哀帝崩王莽白王太后徴寳以為光禄大夫與王舜等俱迎中山王平帝}
  - {type: page-break, offset: 4619, content: '', id: KR2a0007_WYG_077-17b, image: WYG0250/WYG0250-0603d.png}
  - {type: page-break, offset: 4619, content: '', id: KR2a0007_WYG_077-18a, image: WYG0250/WYG0250-0604a.png}
