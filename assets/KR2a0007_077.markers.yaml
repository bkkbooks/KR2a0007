  - {type: variant, offset: 1424, length: 25, content: 馮翊崇教養善威德並行眾職修理姦軌絕息辭訟者歷年不至, WYG: 將軍辛慶忌右將軍廉褒光禄勲師丹太中大夫谷永孟康曰中朝内朝也大司馬左右前後將軍侍中常侍散騎諸吏為中朝}
