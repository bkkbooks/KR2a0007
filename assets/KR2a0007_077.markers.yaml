  - {type: variant, offset: 2321, length: 208, content: 宣行迹眾人所共見公家所宜聞況知咸給事中恐為司隸舉奏宣而公令明等迫切宮闕要遮創戮近臣於大道人眾中欲以鬲塞聰明杜絕論議之端桀黠無所畏忌萬眾讙譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮下公門式路馬君畜產且猶敬之春秋之義意惡功遂不免於誅上浸之源不可長也況首為惡明手傷功意俱惡皆大不敬明當以重論及況皆棄市廷尉直以為律曰鬭以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪傳曰遇人不以義而見疻者與痏人之罪鈞惡不直也咸, WYG: ''}
