  - {type: variant, offset: 1599, length: 0, content: '', WYG: 屬官也亦有詔獄共讀與龔同減死罪一等論為鬼薪終於家鄭崇字子游本髙密大族世與王家相嫁娶師古曰女嫁王家男又娶也祖父以訾徙平陵父賓眀法律為御史事貢公師古曰貢禹也名公直崇少為郡文學史至丞相大車屬如淳曰丞相大車屬如今公府御屬弟立與髙武侯傅喜同門學相友善師古曰同門謂同師也喜為大司馬薦崇哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履師古曰孰曰韋生曰革上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣今祖母從昆弟二人已侯孔鄉侯皇后父髙武侯以三公封尚有因縁師古曰孔鄉侯傅晏也髙武侯傅喜也今無故欲復封商壞亂制度逆天人心宋祁曰心字上疑有之字非傅氏之福也臣聞師曰逆陽者厥極弱逆隂者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克夀師古曰周書亡逸之篇也言王者不知稼穡之艱難唯從耽樂則致天䘮無能夀考也故衰世之君夭折蚤沒師古曰蚤古早字此皆犯隂之害也宋祁曰浙本隂字下有陽字臣願以身命當國咎崇因持詔書案起李竒曰持當受詔書案起也師古曰李説非也案者即寫詔之文傅太后大怒曰何有為天子乃反為一臣所顓制邪師古曰顓與專同上}
  - {type: page-break, offset: 1599, content: '', id: KR2a0007_WYG_077-12a, image: WYG0250/WYG0250-0601a.png}
