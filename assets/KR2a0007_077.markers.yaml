  - {type: variant, offset: 4610, length: 2, content: 善立, WYG: 直師古曰言自顧念受郡將之命分當相值遇也分音扶問反直讀曰值誠能自改嚴将不治前事即不更心但更門戸適趣禍耳師古曰更改也趣讀曰促穉季遂不敢犯法寳亦竟嵗無所譴明年穉季病死寳為京兆尹宋祁曰浙本無尹字三嵗京師稱之㑹淳于長敗寳與蕭育等皆坐免官文復去吏死於家穉季子杜蒼字君敖名出穉季右在游俠中哀帝即位徵寳為諌大夫遷司隸初傅太后與中山孝王母馮太后俱事元帝}
