  - {type: variant, offset: 4683, length: 0, content: '', WYG: 徒孔光奏隆前為冀州牧治中山馮太后獄寃䧟無辜不宜處位在中土本中謁者令史立侍御史丁元自典考之但與隆連名奏事史立時為中太僕丁元泰山太守及尚書令趙昌譖鄭崇者為河内太守皆免官徙合浦何並字子廉祖父以吏二千石自平輿徙平陵師古曰平輿汝南之縣也並為郡吏至大司空掾事何武武髙其志節舉能治劇為長陵令道不拾遺初卭成太后外家王氏貴應劭曰宣帝王皇后父奉光封卭成侯成帝母亦姓王故以父爵别之也而侍中王林卿通輕俠傾京師後坐法免賔客愈盛歸長陵上冢因留飲連日並恐其犯法自造門上謁師古曰造至也音千到反謂林卿曰冢間單外君宜以時歸師古曰單外言在郊郭之外而單露林卿曰諾先是林卿殺婢壻埋冢舍師古曰婢壻外人與其婢姦者也冢舍守冢之舍也並具知之以非已時又見其新免故不發舉欲無令留界中而已即且遣吏奉謁傳送宋祁曰𫝊越本作侍林卿素驕慙於賔客並度其為變儲兵}
