  - {type: variant, offset: 1601, length: 1, content: 宣, krp: 禮至於成人師古曰道讀曰導惠澤茂焉師古曰茂羙也欲報之徳皥天罔極師古曰詩小雅蓼莪之篇曰父兮生我母兮鞠我欲報之徳昊天罔極言欲報父母之㤙德心無已也呼昊天者陳已至誠也皥字與昊同前追號皇太太后父}
  - {type: variant, offset: 1603, length: 0, content: '', WYG: 崇祖侯惟念德報未殊朕甚恧焉師古曰殊異也恧愧也音女六反侍中光禄大夫商皇太太后父同産子小自保大如淳曰太后從小飬之使至大也宋祁曰産字下疑有弟字恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯崇又以董賢貴寵過度諌由是重得罪師古曰重音直用反數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上師古曰言請求者多交通賔客崇對曰臣門如市臣心如水師古曰言至清也願得考覆上怒下崇獄窮治死獄中孫寳字子嚴潁川鄢陵人也師古曰鄢音偃以眀經為郡吏}
  - {type: page-break, offset: 1603, content: '', id: KR2a0007_WYG_077-13b, image: WYG0250/WYG0250-0601d.png}
