  - {type: variant, offset: 4620, length: 3, content: 黨友博, WYG: 寳為大司農㑹越嶲郡上黄龍游江中太師孔光大司徒馬宮等咸稱莽功德比周公宜告祠宗廟寳曰周公上聖召公大賢尚猶有不相説著於經典兩不相損師古曰周書君奭之序曰召公為保周公為師相成王為左右召公不説周公作君奭是也兩不相損者言俱有令名也召讀曰邵説讀曰悦今風雨未時百姓不足每有一事羣臣同聲師古曰言雷同阿附妄説福祥得無非其羙者師古曰言此非朝廷羙事也時大臣皆失色侍中奉車都尉甄邯即時承制罷議者㑹寳遣吏迎母母道病留弟家獨遣妻子司直陳崇以奏寳事下三公即訊師古曰就問之也寳對曰年七十誖眊恩衰共飬營妻子如章師古曰誖惑也眊與耄同自言老耄心志亂惑供飬之恩衰具如所奏之章也誖音布内反共讀曰供音居用反寳}
