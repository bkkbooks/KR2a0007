  - {type: variant, offset: 3438, length: 1164, content: 見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黃綬各自詣郡欲言二千石墨綬長吏者使者行部還詣治所其民為吏所冤及言盜賊辭訟事各使屬其部從事博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變乃至於此後博徐問果老從事教民聚會博殺此吏州郡畏博威嚴徙為并州刺史護漕都尉遷琅邪太守齊郡舒緩養名博新視事右曹掾史皆移病臥博問其故對言惶恐故事二千石新到輒遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此為俗邪乃召見諸曹史書佐及縣大吏選視其可用者出教置之皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教主簿贛老生不習吏禮主簿且教拜起閑習乃止又敕功曹官屬多襃衣大袑不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輒罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也且持此道歸堯舜君出為陳說之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜縣有劇賊及它非常博輒移書以詭責之其盡力有效必加厚賞懷詐不稱誅罰輒行以是豪強慹服姑幕縣有群輩八人報仇廷中皆不得長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博乃見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪閤下書佐入博口占檄文曰府告姑幕令丞言賊發不得有書檄到令丞就職游徼王卿力有餘如律令王卿得敕惶怖親屬失色晝夜馳騖十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閱詣府部掾以下亦可用漸盡其餘矣其操持下皆此類也以高弟入守左馮翊滿歲為真其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺然亦縱舍時有大貸下吏以此為盡力長陵大姓尚方禁少時嘗盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢博辟左右問禁是何等創也禁自知情得叩頭服狀博笑曰丈夫固時有是馮翊欲洒卿恥抆拭用禁能自效不禁且喜且懼對曰必死博因敕禁毋得泄語有便宜輒記言因親信之以為耳目禁晨夜發起部中盜賊及它伏姦有功效博擢禁連守縣令久之召見功曹閉閤數責以禁等事與筆札使自記積受取一錢以上無得有所匿欺謾半言斷頭矣功曹惶怖具自疏姦臧大小不敢隱博知其對以實乃令就席受敕自改而已投刀使削所記遣出就職功曹後常戰粟不敢蹉跌博遂成就之遷為大司農歲餘坐小法左遷犍為太守先是南蠻若兒數為寇盜博厚結其昆弟使為反間襲殺之郡中清徙為山陽太守病免官復徵為光祿大夫遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有眾賢亦何憂然廷尉治郡斷獄以來且二十年亦獨耳剽日久三尺律令人事出其中掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸君覆意之正監以為博苟強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服博之疏略材過人也每遷徙易官所到輒出奇譎如此以明示下為不可欺者久之遷後, WYG: 騎}
