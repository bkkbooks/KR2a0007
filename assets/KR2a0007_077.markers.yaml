  - {type: variant, offset: 6062, length: 287, content: 四人以為如宣等言可許諫大夫龔勝等十四人以為春秋之義姦以事君常刑不舍魯大夫叔孫僑如欲顓公室譖其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之今晏放命圮族干亂朝政要大臣以罔上本造計謀職為亂階宜與博玄同罪罪皆不道上減玄死罪三等削晏戶四分之一假謁者節召丞相詣廷尉詔獄博自殺國除初博以御史為丞相封陽鄉侯玄以少府為御史大夫並拜於前殿延登受策有音如鍾聲語在五行志贊曰薛宣朱博皆起佐史歷位以登宰相宣所在而治為世吏師及居大位以苛察失名器誠有極也博馳騁進取不思道德已亡可言又見孝成之世委任大臣假借用權世主已更好惡異前復附丁傅稱順孔鄉事發見詰遂陷誣罔辭窮情得仰藥飲鴆孔子曰久矣哉由之行詐也博亦然哉, WYG: 七考證}
