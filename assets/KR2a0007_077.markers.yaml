  - {type: variant, offset: 5490, length: 221, content: 味案上不過三桮夜寑早起妻希見其面有一女無男然好樂士大夫為郡守九卿賓客滿門欲仕宦者薦舉之欲報仇怨者解劍以帶之其趨事待士如是博以此自立然終用敗初哀帝祖母定陶太后欲求稱尊號太后從弟高武侯傅喜為大司馬與丞相孔光大司空師丹共持正議孔鄉侯傅晏亦太后從弟讇諛欲順指會博新徵用為京兆尹與交結謀成尊號以廣孝道繇是師丹先免博代為大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光為庶人以博代光為丞相封陽鄉侯食邑二千戶博上, WYG: 矣前漢}
