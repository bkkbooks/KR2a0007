  - {type: variant, offset: 21, length: 0, content: '', WYG: 郡文學以孝廉為郎舉方正對䇿髙第遷諫大夫行郎中戸將事師古曰百官公卿表郎中令屬官有郎中車户騎三將蓋各以所主為名也戸將者主戸衞也劾奏衞將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下門寛饒坐舉奏大臣非是師古曰不以實也左遷為衞司馬蘇林曰如今衞士令也臣瓚曰漢注有衞屯司馬先是時衞司馬在部見衞尉拜謁常為衞官繇使市買師古曰繇讀與徭同寛饒視事案舊令遂揖官屬以下行衞者蘇林曰衞尉官屬也或曰詔遣使行衞者也師古曰或説非也行音下更反劉攽曰按此文錯亂本當云寛饒視事按舊令遂揖衞尉衞尉私使寛饒出寛饒以令詣官府門上謁辭文頴曰私見使而公辭尚書也蘇林曰以法詣衞尉府門上謁也師古曰文説是也尚書責問衞尉文穎曰由寛饒以法令不給使尚書責衞尉不復使司馬由是衞官不復私使候司馬候司馬不拜出先置衞輒上奏辭如淳曰天子出為天子先導先天子發故上奏辭自此正焉寛饒初拜為司馬未出殿門斷其襌衣令短離地師古曰襌音單其字從衣冠大冠帶長劒躬案行士卒廬室視其飲食居處有疾病者身自撫循臨問加致醫藥遇之甚有恩及嵗盡交代上臨饗罷衞卒師古曰得代當歸者也衞卒數千人皆叩頭自請願復留共更一年以報寛饒厚德師古曰更猶今言上番也音工衡反宣帝嘉之以寛饒為太中大夫使行風俗師古曰行音下更反多所稱舉貶黜奉使稱意擢為司隸校尉刺舉無所回避小大輒舉所劾奏衆多}
