  - {type: variant, offset: 2561, length: 876, content: 謀而趣明非以恐咸為司隸故造謀也本爭私變雖於掖門外傷咸道中與凡民爭鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則至於刑罰不中刑罰不中而民無所錯手足今以況為首惡明手傷為大不敬公私無差春秋之義原心定罪原況以父見謗發忿怒無它大惡加詆欺輯小過成大辟陷死刑違明詔恐非法意不可施行聖王不以怒增刑明當以賊傷人不直況與謀者皆爵減完為城旦上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉況竟減罪一等徙敦煌宣坐免為庶人歸故郡卒於家宣子惠亦至二千石始惠為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修宣心知惠不能留彭城數日案行舍中處置什器觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進見自從其所問宣不教戒惠吏職之意宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也眾人傳稱以宣言為然初宣後封為侯時妻死而敬武長公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒主上書願還宣葬延陵奏可況私從敦煌歸長安會赦因留與主私亂哀帝外家丁傅貴主附事之而疏王氏元始中莽自尊為安漢公主又出言非莽而況與呂寬相善及寬事覺時莽并治況發揚其罪使使者以太皇太后詔賜主藥主怒曰劉氏孤弱王氏擅朝排擠宗室且嫂何與取妹披抉其閨門而殺之使者迫守主遂飲藥死況梟首於市白太后云主暴病薨太后欲臨其喪莽固爭乃止朱博字子元杜陵人也家貧少時給事縣為亭長好客少年捕搏敢行稍遷為功曹伉俠好交隨從士大夫不避風雨是時前將軍望之子蕭育御史大夫萬年子陳咸以公卿子著材知名博皆友之矣時諸陵縣屬太常博以太常掾察廉補安陵丞後去官入京兆歷曹史列掾出為督郵書掾所部職辦郡中稱之而陳咸為御史中丞坐漏泄省中語下獄博去吏間步至廷尉中候伺咸事咸掠治困篤博詐得為醫入獄得見咸具知其所坐罪博出獄又變姓名為咸驗治數百卒免咸死罪咸得論出而博以此顯名為郡功曹久之成帝即位大將軍王鳳秉政奏請陳咸為長史咸薦蕭育朱博除莫府屬鳳甚奇之舉博櫟陽令徙雲陽平陵二縣以高弟入為長安令京師治理遷冀州刺史博本武吏不更文法及為刺史行部吏民數百人遮道自言官寺盡滿從事白請且留此縣錄見諸自言者事畢乃發欲以觀試博博心知之告外趣駕既白駕辦博出就, WYG: 失}
