  - {type: variant, offset: 1361, length: 0, content: '', WYG: 逆不道師古曰䄠古禪字言欲使天子傳位扵已諌大夫鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫師古曰詆毁也挫折也上書頌寛饒曰師古曰頌謂稱其羙劉奉世曰頌讀如尚書自訟之訟臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起司隸校尉寛饒居不求安食不求飽師古曰論語稱孔子曰君子食無求飽居無求安故引之進有憂國之心退有死節之義上無許史之屬下無金張之託應劭曰許伯宣帝皇后父史髙宣帝外家也金金日磾也張張安世也此四家屬無不聼師古曰此説非也許氏史氏有外屬之恩金氏張氏自託在於近狎也屬讀如本字也宋祁曰注末也字當刪}
