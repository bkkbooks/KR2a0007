  - {type: variant, offset: 4691, length: 0, content: '', WYG: 侍中奴耳並心自知已失林卿廼曰王君困自稱奴得脱死邪叱吏斷頭持還縣所剝鼓置都亭下署曰故侍中王林卿坐殺人埋冢舍使奴剝寺門鼓師古曰署謂書表其事也吏民驚駭林卿因亡命衆庶讙譁以為實死師古曰讙譁衆議也讙音許元反成帝太后以卭成太后愛林卿故聞之涕泣為言哀帝哀帝問狀而善之遷並隴西太守徙潁川太守代陵陽嚴詡詡本以孝行為官謂掾史為師友}
