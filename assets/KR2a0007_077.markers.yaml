  - {type: variant, offset: 4660, length: 3, content: 興襲秦, WYG: 家邉吏職在距㓂亦賜武庫兵皆任其事然後蒙之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣宋祁曰僻當作辟私恩微妾而以天下公用給其私門契國威器共其家備李竒曰契欽也晉灼曰契取也師古曰李説是也共讀曰供民力分於弄臣武兵設於㣲妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂師古曰三家謂魯大夫叔孫仲孫季孫也論語云三家者以雍徹孔子曰相維辟公天子穆穆奚取於三家之堂言三家以雍徹食此乃天子之禮耳何為在三家之堂也臣請收還武庫上不説師古曰説讀曰悦頃之傅太后使謁者買諸}
