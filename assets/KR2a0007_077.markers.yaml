  - {type: variant, offset: 4671, length: 0, content: '', WYG: 交讓之禮興則虞芮之訟息師古曰虞芮二國名文王為西伯為斷其訟二國各慙而止也隆位九卿既無以匡朝廷之不逮而反奏請與永信宫爭貴賤之賈程奏顯言蘇林曰露奏也衆莫不聞舉錯不由誼理師古曰錯音千故反爭求之名自此始無以示百僚傷化失俗以隆前有安國之言如淳曰徵定陶王使在國邸也左遷為沛郡都尉遷南郡}
