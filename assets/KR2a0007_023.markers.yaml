  - {type: variant, offset: 5694, length: 346, content: 昌為韓王以距漢令蕭公角等擊彭越越敗蕭公角等時張良徇韓遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺羽羽以此故無西意而北擊齊徵兵九江王布布稱疾不行使將將數千人往二年羽陰使九江王布殺義帝陳餘使張同夏說說齊王榮曰項王為天下宰不平今盡王故王於醜地而王群臣諸將善地逐其故主趙王乃北居代餘以為不可聞大王起兵且不聽不義願大王資餘兵使擊常山以復趙王請以國為扞蔽齊王許之因遣兵往陳餘悉三縣兵與齊併力擊常山大破之張耳走歸漢陳餘迎故趙王歇反之趙趙王因立餘為代王羽至城陽田榮亦將兵會戰榮不勝走至平原平原民殺之羽遂北燒夷齊城郭室屋皆阬降卒係虜老弱婦女徇齊至北海所過殘滅齊人相聚而畔之於是田榮弟橫收得亡卒數萬人反城陽羽因留連戰未能下漢王劫五諸侯兵凡五十六萬人東伐楚羽聞之即令諸將擊齊而自以精兵三萬人南從魯出胡陵漢, WYG: ''}
