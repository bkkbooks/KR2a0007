  - {type: variant, offset: 4949, length: 292, content: 關中阻山帶河四塞之地肥饒可都以伯羽見秦宮室皆已燒殘又懷思東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生初懷王與諸將約先入關者王其地羽既背約使人致命於懷王懷王曰如約羽乃曰懷王者吾家武信君所立耳非有功伐何以得顓主約天下初發難假立諸侯後以伐秦然身被堅執銳首事暴露於野三年滅秦定天下者皆將相諸君與籍力也懷王亡功固當分其地王之諸將皆曰善羽乃陽尊懷王為義帝曰古之王者地方千里必居上游徙之長沙都郴乃分天下以王諸侯羽與范增疑沛公業已講解又惡背約恐諸侯叛之陰謀曰巴蜀道險秦之遷民皆居之乃曰巴蜀亦關中地故立沛公為漢王王巴蜀漢中而參分關中王秦降將以距塞漢道乃立章邯為雍王王咸陽以西長史司, WYG: 折}
