  - {type: variant, offset: 757, length: 0, content: '', WYG: 明習者不知所由師古曰由從也欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉師古曰虞書舜典之詞恤憂也}
  - {type: variant, offset: 757, length: 0, content: '', krp: 明習者不知所由師古曰由從也欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉師古曰虞書舜典之詞恤憂也}
  - {type: variant, offset: 758, length: 4, content: 習兵勝與, WYG: 當憂刑也其審核之務準古法師古曰核究其實也朕將盡心覽焉有司無仲山父將明之材師古曰有司以下史家之言也大雅蒸人之詩曰肅肅王命仲山父將之邦國若否仲山父明}
