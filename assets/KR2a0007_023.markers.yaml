  - {type: variant, offset: 747, length: 4, content: 項燕軍視, WYG: 威死刑旣重而生刑又輕民易犯之及至孝武即位外事四夷之功内盛耳目之好徵發煩數百姓貧耗師古曰耗損也音呼到反窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法師古曰見知人犯法不舉告為故縱而所監臨部主有罪并連坐也緩深故之罪孟康曰孝武欲急刑吏深害及故入人罪者皆寛緩急縱出之誅師古曰吏釋罪人疑以為縱出則急誅之亦言尚酷其後姦猾巧法轉相比况禁罔寖密師古曰寖漸也其下亦同律令凡三百五十九章大辟四百九條千八百八十二事死罪決事比萬三千四百七十二事師古曰比以例相比況也文書盈於几閣典者不能徧睹是以郡國承用者駮師古曰不曉其指用意不同也或罪同而論異姦吏因緣為市師古曰弄法而受財若市買之交易所欲活則傅生議所欲陷則予死比師古曰傅讀曰附議者咸􅁈傷之宣帝自在閭閻而知其若此及即尊位廷史路溫舒上疏言秦有十失其一尚存治獄之吏是也語在溫舒傳上深愍焉廼下詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜䝉戮晉灼曰當重而輕使有罪者起邪惡之心也師古曰有罪者更興邪惡無辜者反陷重刑是決獄不平故父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄如淳曰廷史廷尉史也以囚辭決獄事為鞠謂疑獄也李竒曰鞠窮也獄事窮竟也師古曰李說是也其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寛恕黄霸等以為廷平季秋後請讞時上常幸宣室齋居而決事如淳曰宣室布政敎之室也重用刑故齋戒以決事晉灼曰未央宫中有宣室殿師古曰賈誼傳亦云受釐坐宣室蓋其殿在前殿之側也齋則居之獄刑號為平矣時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令師古曰刪刋也有不便者則刋而除之律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣蘇林曰招音翹翹舉也猶賣弄也孟康曰招求也招致權著已也師古曰孟說是也宣帝未及脩正至元帝初立廼下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律令煩多而不約自典文者不能分明而欲羅元元之不逮師古曰羅網也不逮言意識所不及斯豈刑中之意哉師古曰中當也其議律令可蠲除輕減者條奏唯在便安萬姓而已至成帝河平中復下詔曰甫刑云五刑之屬三千大辟之罰其屬二百師古曰甫刑即周書呂刑初為呂侯號曰呂刑後為甫侯又稱甫刑今大辟之刑千有餘條律令煩多百有餘萬言竒請它比}
