  - {type: variant, offset: 98, length: 0, content: '', WYG: 十國為連連有帥師古曰長音竹兩反帥音所類反三十國為卒卒有正二百一十國為州州有牧連帥比年簡車師古曰比年頻年也卒正三年簡徒師古曰徒人衆羣牧五載大簡車徒此先王為國立武足兵之大略也周道衰法度􅤚師古曰􅤚即墮字墮毁也音火規反至齊桓公任用管仲而國富民安公問}
  - {type: page-break, offset: 98, content: '', id: KR2a0007_WYG_023-5a, image: WYG0249/WYG0249-0463a.png}
  - {type: variant, offset: 98, length: 0, content: '', krp: 十國為連連有帥師古曰長音竹兩反帥音所類反三十國為卒卒有正二百一十國為州州有牧連帥比年簡車師古曰比年頻年也卒正三年簡徒師古曰徒人衆羣牧五載大簡車徒此先王為國立武足兵之大略也周道衰法度􅤚師古曰􅤚即墮字墮毁也音火規反至齊桓公任用管仲而國富民安公問}
  - {type: variant, offset: 99, length: 0, content: '', WYG: 伯用師之道師古曰伯讀曰霸管仲曰公欲定卒伍脩甲兵大國亦將脩之而小國設備則難以速得志矣於是乃作内政而寓軍令焉師古曰寓寄也寄於内政而修軍令也故卒伍定虖里而軍政成虖郊連其什伍師古曰五人為伍二伍為什居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其敎已成外攘夷狄内尊天子以安諸夏師古曰攘卻也諸夏中國之諸侯也夏大也言大於四夷也攘音人羊反齊桓旣没晉文接之亦先定其民作被廬之法應劭曰搜於被廬之地作執秩以為六官之法因以名之也師古曰被廬晉地也被音皮義反總帥諸侯迭為盟主師古曰迭互也音大結反然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷師古曰寖漸也陵夷頽替也二伯齊桓公晉文公也伯讀曰覇}
  - {type: page-break, offset: 99, content: '', id: KR2a0007_WYG_023-5b, image: WYG0249/WYG0249-0463b.png}
