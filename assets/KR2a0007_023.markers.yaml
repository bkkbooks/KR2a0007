  - {type: variant, offset: 770, length: 0, content: '', WYG: 也否不善也言王有誥命則仲山父行之邦國有不善之事則仲山父明之故引以為美傷今不能然也不能因時廣宣主恩建立明制為一代之法而徒鉤摭微細毛舉數事以塞詔而已師古曰毛舉言舉毫毛之事輕小之甚塞猶當者也是以大議不立遂以至今議者或曰法難數變此庸人不逹疑塞治道聖智之所常患者也師古曰塞謂不通也故略舉漢興以來法令稍定而合古便今者漢興之初雖有約法三章網漏吞舟之魚師古曰言疏闊吞舟謂大魚也然其大辟尚有夷三族之令令曰當三族者皆先黥劓斬左右趾笞殺之梟其首菹其骨肉於市師古曰菹謂醢也菹音側於反其誹謗詈詛者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至高后元年乃除三族罪祅言令孝文二年又詔丞相太尉御史法者治之正所以禁暴而衞善人也今犯法者已論而使無罪之父母妻子同產坐之及}
