  - {type: punctuation, offset: 141, content: 「, id: KR2a0007_tls_023-bkkpn45}
  - {type: variant, offset: 141, length: 0, content: '', WYG: 衡横也戰國時齊楚韓魏燕趙為從秦國為衡從音子容反謂其地形南北從長也秦地形東西横長故為衡也轉相攻伐代為雌雄師古曰代迭也齊愍以技擊彊孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝魏惠以武卒奮師古曰奮盛起秦昭以銳士勝師古曰銳勇利世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道師古曰孫卿楚人姓荀名况避漢宣帝之諱故改曰孫卿而非之曰彼孫吳者上埶利而貴變詐施於暴亂昏嫚之國君臣有間師古曰言有間隙不諧和上下離心政謀不良故可變而詐也夫仁人在上為下所卬卬讀曰仰猶子弟之衞父兄若手足之扞頭目何可當也師古曰扞禦難也音卜旦反鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有師古曰言往必破碎詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏師古曰殷頌長發之詩也武王湯也虔敬也遏止也言湯建號興師本由仁義雖執戚鉞以敬為先故得如火之盛無能止也言以仁誼綏民者無敵於}
  - {type: page-break, offset: 141, content: '', id: KR2a0007_WYG_023-7a, image: WYG0249/WYG0249-0464a.png}
  - {type: page-break, offset: 141, content: '', id: KR2a0007_WYG_023-7b, image: WYG0249/WYG0249-0464b.png}
  - {type: variant, offset: 141, length: 0, content: '', krp: 衡横也戰國時齊楚韓魏燕趙為從秦國為衡從音子容反謂其地形南北從長也秦地形東西横長故為衡也轉相攻伐代為雌雄師古曰代迭也齊愍以技擊彊孟康曰兵家之技巧技巧者習手足便器械積機闗以立攻守之勝魏惠以武卒奮師古曰奮盛起秦昭以銳士勝師古曰銳勇利世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道師古曰孫卿楚人姓荀名况避漢宣帝之諱故改曰孫卿而非之曰彼孫吳者上埶利而貴變詐施於暴亂昏嫚之國君臣有間師古曰言有間隙不諧和上下離心政謀不良故可變而詐也夫仁人在上為下所卬卬讀曰仰猶子弟之衞父兄若手足之扞頭目何可當也師古曰扞禦難也音卜旦反鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有師古曰言往必破碎詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏師古曰殷頌長發之詩也武王湯也虔敬也遏止也言湯建號興師本由仁義雖執戚鉞以敬為先故得如火之盛無能止也言以仁誼綏民者無敵於}
  - {type: variant, offset: 143, length: 1, content: 苦, WYG: 也若齊之技擊得一首則受賜金事小敵脆則媮可用也師古曰媮與偷同謂苟且事鉅敵堅則渙然離矣師古曰鉅大也渙然散貌是亡國之兵也魏氏武卒衣三屬之甲服虔曰作大甲三屬竟人身也蘇林曰兠鍪也盤領也髀褌也如淳曰上身一髀褌一踁繳一凡三屬也師古曰如說是也屬聯也音之欲反髀音陛踁即脛字操十二石之弩負矢五十个置戈其上冠胄帶劒贏三日之糧師古曰个讀曰箇箇枚也胄兠鍪也冠胄帶劒者著兠鍪而又帶劒也贏謂擔負也音盈日中而趍百里師古曰日中一日之中中試則復其户利其田宅師古曰中試試之而中科條也復謂免其賦稅也利田宅者給其便利之處也中音竹仲反復音方目反如此則其地雖廣其稅必寡其氣力數年而衰是危國之兵也}
