  - {type: variant, offset: 138, length: 1, content: 乎, WYG: 使治其賦也而子路亦曰千乘之國攝虖大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也師古曰皆論語所載也方道也比音必寐反治其賦兵敎以禮誼之謂也春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視師古曰視讀曰示而秦更名角抵師古曰抵音丁禮反解在武紀先王之禮没於淫樂中矣雄桀之士因埶輔時作為權詐以相傾覆吳有孫武齊有孫臏師古曰臏音頻忍反魏有吳起秦有商鞅皆禽敵立}
