  - {type: variant, offset: 664, length: 1, content: 勝, WYG: 復生刑者不可復屬師古曰屬聯也音之欲反雖後欲改過自新其道亡繇也師古曰繇讀與由同由從也妾願没入為官婢以贖父刑罪使得自新書奏天子朱子文曰於文書奏下多天子二字前曰上書非上於天子而何後曰書奏非奏于天子而何若曰書奏天子憐悲其意文字直而美天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三孟康曰黥劓二刖左右趾合一凡三也宋祁曰姚本二則刪去則字而姦不止其咎安在非乃朕德之薄而敎不明與師古曰與讀曰歟吾甚自愧故夫訓道不純而愚民陷焉師古曰道讀曰導詩曰愷弟君子民之父母師古曰大雅泂酌之詩也言君子有和樂易簡之德則其下尊之如父親之如母也今人有過敎未施而刑已加焉或欲改行為善而道亡繇至師古曰繇讀與由同朕甚憐之夫刑至斷支體刻肌膚終身不息師古曰息生也何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免孟康曰其不亡逃者滿其年}
