  - {type: variant, offset: 6064, length: 536, content: 軍而東至彭城日中大破漢軍漢軍皆走迫之穀泗水漢軍皆南走山楚又追擊至靈辟東睢水上漢軍卻為楚所擠多殺漢卒十餘萬皆入睢水睢水為不流漢王乃與數十騎遁去語在高紀太公呂后間求漢王反遇楚軍楚軍與歸羽常置軍中漢王稍收散卒蕭何亦發關中卒悉詣滎陽戰京索間敗楚楚以故不能過滎陽而西漢軍滎陽築甬道取敖倉食三年羽數擊絕漢甬道漢王食乏請和割滎陽以西為漢羽欲聽之歷陽侯范增曰漢易與耳今不取後必悔之羽乃急圍滎陽漢王患之乃與陳平金四萬斤以間楚君臣語在陳平傳項羽以故疑范增稍奪之權范增怒曰天下事大定矣君王自為之願賜骸骨歸行未至彭城疽發背死於是漢將紀信詐為漢王出降以誑楚軍故漢王得與數十騎從西門出令周苛樅公魏豹守滎陽漢王西入關收兵還出宛葉間與九江王黥布行收兵羽聞之即引兵南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳殺薛公羽乃東擊彭越漢王亦引兵北軍成皋羽已破走彭越引兵西下滎陽城亨周苛殺樅公虜韓王信進圍成皋漢王跳獨與滕公得出北渡河至修武從張耳韓信楚遂拔成皋漢王得韓信軍留止使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍燕郭西燒其積聚攻下梁地十餘城羽聞之謂海春侯大司馬曹咎曰謹守成皋即漢欲挑戰慎毋與戰勿令得東而已我十五日必定梁地復從將軍於是引兵東四年羽擊陳留外黃外黃不下數日降羽悉令男子年十五以上詣城東欲阬之外黃令舍人兒年, WYG: 書卷二}
