  - {type: variant, offset: 2493, length: 3, content: 陳勝徇, WYG: 之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其􅁈死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者師古曰蕃多也音扶元反禮敎不立刑法不明民多貧窮豪桀務私姦不輙得獄豻不平之所致也服虔曰鄉亭之獄曰豻臣瓉曰獄岸獄訟也師古曰小雅小宛之詩云宜岸宜獄瓉說是也書云伯夷降典悊民惟刑師古曰周書甫刑之辭也悊知也言伯夷下禮法以道人人習知禮然後用刑也言制禮以止刑猶隄之防溢水也今隄防陵遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪桀擅私為之囊橐師古曰有底曰囊無底曰槖言容隱姦邪若囊槖之盛物姦有所隱則狃而寖}
  - {type: page-break, offset: 2493, content: '', id: KR2a0007_WYG_023-26b, image: WYG0249/WYG0249-0474d.png}
