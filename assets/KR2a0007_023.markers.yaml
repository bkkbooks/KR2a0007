  - {type: variant, offset: 4580, length: 165, content: 元年羽將諸侯兵三十餘萬行略地至河南遂西到新安異時諸侯吏卒徭役屯戍過秦中秦中遇之多亡狀及秦軍降諸侯諸侯吏卒乘勝奴虜使之輕折辱秦吏卒吏卒多竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸將微聞其計以告羽羽乃召英布蒲將軍計曰秦吏卒尚眾其心不服至關不聽事必危不如擊之獨與章邯長史欣都尉翳入秦於是夜擊阬秦軍, WYG: 書卷}
