  - {type: variant, offset: 681, length: 2, content: 立因, WYG: 決完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人師古曰男子為隸臣女子為隸妾鬼薪白粲滿三歲為隸臣隸臣一歲免為庶人隸妾亦然也隸臣妾滿二歲為司寇司寇一歲及作如司寇二歲皆免為庶人如淳曰罪降為司寇故一歲正司寇故二歳也其亡逃及有罪耐以上不用此令師古曰於本罪中又重犯者也宋祁曰罪耐姚本作耐罪前令之刑城旦舂歲而非禁錮者如完為城旦舂歲數以免李竒曰謂文帝作此令之前有刑者宋祁曰如完姚本刪如字臣昧死請制曰可是後外有輕刑之名内實}
