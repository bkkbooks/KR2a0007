  - {type: variant, offset: 145, length: 1, content: 久, WYG: 人其生民也陿阸其使民也酷烈師古曰陿地小也隘險固也酷重厚也烈猛威也劫之以埶隱之以阸鄭氏曰秦地多隘臧隱其民於隘中也臣瓉曰秦政急峻隱括其民於隘狹之法師古曰鄭說是也狃之以賞慶道之以刑罰師古曰狃串習也音女救反道讀曰導使其民所以要利於上者非戰無由也功賞相長五甲首而隸五家服虔曰能得著甲者五人首使得隸役五家也如淳曰役隸五家是為相君長是最為有數故能四世有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳師古曰鬻音育未有安制矜節之理也師古曰矜持也故雖地廣兵彊鰓鰓常恐天下之一合而共軋已也蘇林曰鰓音愼而無禮則葸之葸鰓懼貌也張晏曰軋踐轢也師古曰鰓音先祀反軋音於黠反至乎齊桓晉文之兵可謂入其域而有節制}
