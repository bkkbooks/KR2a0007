  - {type: variant, offset: 92, length: 2, content: 勝廣, WYG: 為軍王則六軍也宋祁曰萬一千邵本作萬二千因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有賦師古曰稅者田租也賦謂發賦歛財也宋祁曰邵姚本云發賦歛之賦也稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法鄭氏曰甲士在車上也師古曰乘音食證反其下並同一同百里提封萬井蘇林曰提音祗陳留人謂舉田為祇李竒曰提舉也舉四封之内也師古曰李說是也提讀如本字蘇音非也說者或以為積土而封謂之隄封旣改文字又失義也除山川沈斥城池邑居園囿術路三千六百井臣瓉曰沈斥水田舄鹵也如淳曰術大道也師古曰川謂水之通流者也沈謂居深水之下也斥鹹鹵之地定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也師古曰采官也因官食地故曰采地爾雅曰采寮官也說者不曉采地之義因謂菜地云以種菜非也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閱以狩師古曰振旅整衆也搜搜擇不任孕者拔舍草止不妨農也苗為苗除害也治兵觀威武也獮應殺氣也大閲簡車馬也狩火田一曰狩守也圍守而取之拔音步末反}
