  - {type: variant, offset: 212, length: 0, content: '', WYG: 為之出兵師古曰謂秦子蒲子武帥車五百乘以救楚也二國并力遂走吳師師古曰謂子蒲大敗夫槩王于沂薳射之子從子西敗吳師於軍祥昭王返國師古曰吳師已歸楚子入郢所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下師古曰言如獵之取獸窮武極詐士民不附卒隸之徒還為敵讎師古曰謂陳勝吳廣英布之徒也猋起雲合果共軋之師古曰猋疾風也如猋之起言其速也如雲之合言其盛也猋音必遥反斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並師古曰言其同盛衰也至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後師古曰孫武孫臏吳起商鞅白起也報應之埶各以類至其道然矣漢興高祖躬神武之材行寛仁之厚總擥英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辯明叔孫通之儀文武相配大略舉焉天下旣定踵秦而置材官於郡國師古曰踵因也京師有南北軍之屯至武帝平百粤内增七校晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也外有樓船皆歲時講肄脩武備云師古曰肄習也音弋二反至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之師古曰五材金木水火土也廢一不可誰能去兵鞭扑不可弛於家師古曰弛放也音式爾反刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器師古曰論語載孔子之言文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也師古曰刑錯兵寢皆謂置而弗用也昔周之法建三典以刑邦國詰四方師古曰詰責也音口一反字}
