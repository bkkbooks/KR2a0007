  - {type: variant, offset: 2589, length: 2, content: 立長, WYG: 殺之利在於人死也今治獄吏欲陷害人亦猶此矣凡此五疾獄刑所以尤多者也自建武永平民亦新免兵革之禍人有樂生之慮朱子文曰既云新免兵革之禍當曰人有樂生之意意慮字相去不遠此傳寫之誤也與高惠之間同而政在抑彊扶弱朝}
