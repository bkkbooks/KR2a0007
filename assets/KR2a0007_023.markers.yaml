  - {type: variant, offset: 6602, length: 2423, content: 往說羽曰彭越強劫外黃外黃恐故且降待大王大王至又皆阬之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黃當阬者而東至睢陽聞之皆爭下漢果數挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵氾水卒半渡漢擊大破之盡得楚國金玉貨賂大司馬咎長史欣皆自剄氾水上咎故蘄獄掾欣故塞王羽信任之羽至睢陽聞咎等破則引兵還漢軍方圍鍾離眜於滎陽東羽軍至漢軍畏楚盡走險阻羽亦軍廣武相守乃為高俎置太公其上告漢王曰今不急下吾亨太公漢王曰吾與若俱北面受命懷王約為兄弟吾翁即汝翁必欲亨乃翁幸分我一盃羹羽怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益但益怨耳羽從之乃使人謂漢王曰天下匈匈徒以吾兩人願與王挑戰決雌雄毋徒罷天下父子為也漢王笑謝曰吾寧鬭智不能鬭力羽令壯士出挑戰漢有善騎射曰樓煩楚挑戰三合樓煩輒射殺之羽大怒自被甲持戟挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之乃羽也漢王大驚於是羽與漢王相與臨廣武間而語漢王數羽十罪語在高紀羽怒伏弩射傷漢王漢王入成皋時彭越數反梁地絕楚糧食又韓信破齊且欲擊楚羽使從兄子項它為大將龍且為裨將救齊韓信破殺龍且追至成陽虜齊王廣信遂自立為齊王羽聞之恐使武涉往說信語在信傳時漢關中兵益出食多羽兵食少漢王使侯公說羽羽乃與漢王約中分天下割鴻溝而西者為漢東者為楚歸漢王父母妻子已約羽解而東五年漢王進兵追羽至固陵復為羽所敗漢王用張良計致齊王信建成侯彭越兵乃劉賈入楚地圍壽春大司馬周殷叛楚舉九江兵隨劉賈迎黥布與齊梁諸侯皆大會羽壁垓下軍少食盡漢帥諸侯兵圍之數重羽夜聞漢軍四面皆楚歌乃驚曰漢皆已得楚乎是何楚人多也起飲帳中有美人姓虞氏常幸從駿馬名騅常騎乃悲歌忼慨自為歌詩曰力拔山兮氣蓋時不利兮騅不逝騅不逝兮可柰何虞兮虞兮柰若何歌數曲美人和之羽泣下數行左右皆泣莫能仰視於是羽遂上馬戲下騎從者八百餘人夜直潰圍南出馳平明漢軍乃覺之令騎將灌嬰以五千騎追羽羽渡淮騎能屬者百餘人羽至陰陵迷失道問一田父田父紿曰左左乃陷大澤中以故漢追及之羽復引而東至東城乃有二十八騎追者數千羽自度不得脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂伯有天下然今卒困於此此天亡我非戰之罪也今日固決死願為諸軍快戰必三勝斬將艾旗乃後死使諸君知我非用兵罪天亡我也於是引其騎因四隤山而為圜陳外嚮漢騎圍之數重羽謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是羽大呼馳下漢軍皆披靡遂殺漢一將是時楊喜為郎騎追羽羽還叱之喜人馬俱驚辟易數里與其騎會三處漢軍不知羽所居分軍為三復圍之羽乃馳復斬漢一都尉殺數十百人復聚其騎亡兩騎乃謂騎曰何如騎皆服曰如大王言於是羽遂引東欲渡烏江烏江亭長檥船待謂羽曰江東雖小地方千里眾數十萬亦足王也願大王急渡今獨臣有船漢軍至亡以渡羽笑曰乃天亡我何渡為且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎謂亭長曰吾知公長者也吾騎此馬五歲所當亡敵嘗一日千里吾不忍殺以賜公乃令騎皆去馬步持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽乃曰吾聞漢購我頭千金邑萬戶吾為公得乃自剄王翳取其頭亂相輮蹈爭羽相殺者數十人最後楊喜呂馬童郎中呂勝楊武各得其一體故分其地以封五人皆為列侯漢王乃以魯公號葬羽於穀城諸項支屬皆不誅封項伯等四人為列侯賜姓劉氏贊曰昔賈生之過秦曰秦孝公據殽函之固擁雍州之地君臣固守而闚周室有席卷天下包舉宇內囊括四海并吞八荒之心當是時也商君佐之內立法度務耕織修守戰之備外連衡而鬭諸侯於是秦人拱手而取西河之外孝公既沒惠文武昭襄蒙故業因遺策南取漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合從締交相與為一當此之時齊有孟嘗趙有平原楚有春申魏有信陵此四賢者皆明智而忠信寬厚而愛人尊賢重士約從離橫兼韓魏燕趙宋衛中山之眾於是六國之士有甯越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵常以十倍之地百萬之軍仰關而攻秦秦人開關延敵九國之師遁巡而不敢進秦無亡矢遺鏃之費而天下已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂山河強國請服弱國入朝施及孝文莊襄王享國之日淺國家亡事及至始皇奮六世之餘烈振長策而馭宇內吞二周而亡諸侯履至尊而制六合執敲扑以鞭笞天下威震四海南取百粵之地以為桂林象郡百粵之君頫首係頸委命下吏乃使蒙恬北築長城而守藩籬卻匈奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鍉鑄以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之川以為固良將勁弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為關中之固金城千里子孫帝王萬世之業也始皇既沒餘威震于殊俗然而陳涉甕牖繩樞之子甿隸之人遷徙之徒也材能不及中庸非有仲尼墨翟之知陶朱猗頓之富躡足行伍之間而免起阡陌之中帥罷散之卒將數百之眾轉而攻秦斬木為兵揭竿為旗天下雲合嚮應贏糧而景從山東豪俊遂並起而亡秦族矣且天下非小弱也雍州之地殺函之固自若也陳涉之位不齒於齊楚燕趙韓魏宋衛中山之君鉏耰棘矜不敵於鉤戟長鎩適戍之眾不亢於九國之師深謀遠慮行軍用兵之道非及曩時之士也然而成敗異變功業相反何也試使山東之國與陳涉度長絜大比權量力不可同年而語矣然秦以區區之地致萬乘之權招八州而朝同列百有餘年然后以六合為家殽函為宮一夫作難而七廟墮身死人手為天下笑者何也仁誼不施而攻守之勢異也周生亦有言舜蓋重童子項羽又重童子豈其苗裔邪何其興之暴也夫秦失其政陳涉首難豪桀蜂起相與並爭不可勝數然羽非有尺寸乘勢拔起隴畝之中三年遂將五諸侯兵滅秦分裂天下而威海內封立王侯政繇羽出號為伯王位雖不終近古以來未嘗有也及羽背關懷楚放逐義帝而怨王侯畔己難矣自矜功伐奮其私智而不師古始霸王之國欲以力征經營天下五年卒亡其國身死東城尚不覺寤不自責過失乃引天亡我非用兵之罪豈不謬哉, WYG: 考證}
