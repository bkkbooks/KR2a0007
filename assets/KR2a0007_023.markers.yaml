  - {type: variant, offset: 73, length: 0, content: '', WYG: 生殖長育也書云天秩有禮天討有罪師古曰此虞書咎繇謨之辭也秩叙也言有禮者天則進叙之有罪者天則討治之故聖人因天秩而制五禮師古曰五禮吉凶賔軍嘉因天討而作五刑師古曰其說在下也大刑用甲兵張晏曰以六師誅暴亂其次用斧鉞韋昭曰斬刑也中刑用刀鋸韋昭曰刀割刑鋸刖刑也其次用鑚鑿韋昭曰鑚髕刑也鑿黥刑也師古曰鑚鑚去其髕骨也鑚音子端反髕音頻刃反薄刑用鞭扑師古曰扑杖也音普木反大者陳諸原野師古曰謂征討所殺也小者致之市朝應劭曰大夫以上尸諸朝士以下尸諸市其所繇來者上矣師古曰繇讀與由同自黄帝有涿鹿之戰以定火災鄭氏曰涿鹿在彭城南與炎帝戰炎帝火行故云火災李竒曰黄帝與炎帝戰於阪泉今言涿鹿地有二名也文頴曰國語云黄帝炎帝弟也炎帝號神農火行也後子孫暴虐黄帝伐之故言以定火災律歷}
  - {type: page-break, offset: 73, content: '', id: KR2a0007_WYG_023-2b, image: WYG0249/WYG0249-0461d.png}
  - {type: variant, offset: 73, length: 0, content: '', krp: 生殖長育也書云天秩有禮天討有罪師古曰此虞書咎繇謨之辭也秩叙也言有禮者天則進叙之有罪者天則討治之故聖人因天秩而制五禮師古曰五禮吉凶賔軍嘉因天討而作五刑師古曰其說在下也大刑用甲兵張晏曰以六師誅暴亂其次用斧鉞韋昭曰斬刑也中刑用刀鋸韋昭曰刀割刑鋸刖刑也其次用鑚鑿韋昭曰鑚髕刑也鑿黥刑也師古曰鑚鑚去其髕骨也鑚音子端反髕音頻刃反薄刑用鞭扑師古曰扑杖也音普木反大者陳諸原野師古曰謂征討所殺也小者致之市朝應劭曰大夫以上尸諸朝士以下尸諸市其所繇來者上矣師古曰繇讀與由同自黄帝有涿鹿之戰以定火災鄭氏曰涿鹿在彭城南與炎帝戰炎帝火行故云火災李竒曰黄帝與炎帝戰於阪泉今言涿鹿地有二名也文頴曰國語云黄帝炎帝弟也炎帝號神農火行也後子孫暴虐黄帝伐之故言以定火災律歷}
  - {type: variant, offset: 74, length: 2, content: 哉秦, WYG: 云與炎帝後戰於阪泉涿鹿在上谷今見有阪泉地黄帝祠師古曰文說是也彭城者上谷北别有彭城非宋之彭城也顓頊有共工之陳以定水害文頴曰共工主水官也少昊氏衰秉政作害顓頊伐之本主水官因為水行也師古曰共讀曰龔唐虞之際至治之極猶流共工放驩兠竄三苗殛鯀然後天下服師古曰舜受堯禪而流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山也殛誅也音居力反夏有甘扈之誓師古曰謂啓與有扈戰于甘之野作甘誓事見夏書扈國今鄠縣是也甘即甘水之上殷周以兵定天下矣師古曰謂湯及武王天下旣定戢臧干戈敎以文德師古曰戢歛也而猶立司馬之官設六軍之衆師古曰司馬夏官卿掌邦政軍旅屬焉萬}
  - {type: page-break, offset: 74, content: '', id: KR2a0007_WYG_023-3a, image: WYG0249/WYG0249-0462a.png}
