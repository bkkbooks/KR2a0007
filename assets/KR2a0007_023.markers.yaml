  - {type: variant, offset: 212, length: 0, content: '', krp: 為之出兵師古曰謂秦子蒲子武帥車五百乘以救楚也二國并力遂走吳師師古曰謂子蒲大敗夫槩王于沂薳射之子從子西敗吳師於軍祥昭王返國師古曰吳師已歸楚子入郢所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下師古曰言如獵之取獸窮武極詐士民不附卒隸之徒還為敵讎師古曰謂陳勝吳廣英布之徒也猋起雲合果共軋之師古曰猋疾風也如猋之起言其速也如雲之合言其盛也猋音必遥反斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並師古曰言其同盛衰也至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而國滅亡於後師古曰孫武孫臏吳起商鞅白起也報應之埶各以類至其道然矣漢興高祖躬神武之材行寛仁之厚總擥英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辯明叔孫通之儀文武相配大略舉焉天下旣定踵秦而置材官於郡國師古曰踵因也京師有南北軍之屯至武帝平百粤内增七校晉灼曰百官表中壘屯騎步兵越騎長水胡騎射聲虎賁凡八校尉胡騎不常置故此言七也外有樓船皆歲時講肄脩武備云師古曰肄習也音弋二反至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之師古曰五材金木水火土也廢一不可誰能去兵鞭扑不可弛於家師古曰弛放也音式爾反刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器師古曰論語載孔子之言文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也師古曰刑錯兵寢皆謂置而弗用也昔周之法建三典以刑邦國詰四方師古曰詰責也音口一反字}
  - {type: variant, offset: 213, length: 0, content: '', WYG: 作誥音工到反誥謹也以刑治之令謹敇也一曰刑新邦用輕典師古曰新闢地立君之國其人未習於敎故用輕法二曰刑平邦用中典師古曰承平守成之國則用中典常行之法也三曰刑亂邦用重典師古曰篡殺畔逆之國化惡難移則用重法誅殺之也自此以上大司寇所職也五刑墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百所謂刑平邦用中典者也師古曰墨黥也鑿其面以墨湼之劓截鼻也宫滛刑也男子割腐婦人幽閉刖斷足也殺死刑也自此以上司刑所職也劓音牛兾反刖音五刮反又音月凡殺人者踣諸市師古曰踣謂斃之也音妨付反墨者使守門師古曰黥面之人不妨禁衞也劓者使守關師古曰以其貌毁故逺之宫者使守内師古曰人道旣絶於事便也刖者使守囿師古曰驅御禽獸無足可也完者使守積師古曰完謂不虧其體但居作也積積聚之物也自此以上掌戮所職也其奴男子入于罪隸李竒曰男女徒總名為奴女子入舂槁孟康曰主暴燥舂之也韋昭曰舂舂人槁槁人也給此二官之役師古曰槁音古老反凡有爵者與七十者與未齓者皆不為奴師古曰有爵謂命士以上也齓毁齒男子八歲女子七歲而毁齒矣自此以上司厲所職也周道旣衰穆王眊荒命甫侯度時作刑以詰四方師古曰穆王昭王之子也享國旣百年而王眊亂荒忽乃命甫侯為司寇商度時宜而作刑之制以治四方也甫國名也眊音莫報反度音大各反墨罰之屬千劓罰之屬千髕罰之屬五百宫罰之屬三百大辟之罰其屬二百師古曰髕罰去膝頭骨大辟死刑也髕音頻忍反五刑之屬三千師古曰五者之刑凡三千蓋多於平邦中典五百章所謂刑亂邦用重典者也春秋之時王道寖壞師古曰寖漸也敎化不行子產相鄭而鑄刑書師古曰子產鄭大夫公孫僑也鑄刑法於鼎事在昭六年晉叔嚮非之曰師古曰叔嚮晉大夫羊舌􅆄也遺其書以非之嚮音許兩反昔先王議事以制不為刑辟李竒曰先議其犯事議定然後乃斷其罪不為一成之刑著於鼎也師古曰虞舜則象以典刑流宥五刑周禮則三典五刑以詰邦國非不豫設但弗宣露使人知之懼民之有爭心也猶不可禁禦是故閑之以誼糾之以政師古曰閑防也糾舉也行之以禮守之以信奉之以仁師古曰奉養也制為祿位以勸其從師古曰勸其從敎之心也嚴斷刑罰以威其滛師古曰􅁋放也懼其未也故誨之以忠􅌶之以行晉灼曰􅌶古竦字也師古曰􅌶謂㢡也又音所項反敎之以務師古曰時所急使之以和師古曰悅以使人也臨之以敬莅之以彊師古曰莅謂監視也斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師師古曰上謂公侯也官卿佐也長師皆列職之首也民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣師古曰辟法也為治也權移於法故人不畏上因危文以生詐妄徼幸而成巧則弗可治也夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑韋昭曰謂正刑五及流贖鞭扑也三辟之興皆叔世也師古曰叔世言晩時也今吾子相鄭國制參辟鑄刑書孟康曰謂夏殷周亂政所制三辟也將以靖民不亦難乎師古曰靖安也一曰治也詩曰儀式刑文王之德日靖四方師古曰周頌我將之詩也言法象文王之德}
