  - {type: variant, offset: 1198, length: 3, content: 魏魏地, WYG: 自今以來諸年八十非誣告殺傷人它皆勿坐至成帝鴻嘉元年定令年未滿七歲賊鬭殺人及犯殊死者上請廷尉以聞得減死合於三赦㓜弱老眊之人此皆法令稍定近古而便民者也師古曰近音其靳反孔子曰如有王者必世而後仁善人為國百年可以勝殘去殺矣師古曰論語載孔子之言此謂若有受命之王必三十年仁政乃成也勝殘謂勝殘暴之人使不為惡去殺不行殺戮也言聖王承衰撥亂而起被民以徳教師古曰被加也音皮義反變而化之必世然後仁道成焉至於善人不入於室然猶百年勝殘去殺矣師古曰論語稱子張問善人之道子曰不踐迹亦不入於室言善人不但修踐舊迹而}
