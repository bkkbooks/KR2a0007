  - {type: variant, offset: 1804, length: 638, content: 人嘗與傭耕者聞之乃之陳叩宮門曰吾欲見涉宮門令欲縛之自辯數乃置不肯為通勝出遮道而呼涉乃召見載與歸入宮見殿屋帷帳客曰夥涉之為王沈沈者楚人謂多為夥故天下傳之夥涉為王由陳涉始客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者以朱防為中正胡武為司過主司群臣諸將徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輒自治勝信用之諸將以故不親附此其所以敗也勝雖已死其所置遣侯王將相竟亡秦高祖時為勝置守冢于碭至今血食王莽敗乃絕項籍守羽下相人也初起年二十四其季父梁梁父即楚名將項燕者也家世楚將封於項故姓項氏籍少時學書不成去學劍又不成去梁怒之籍曰書足記姓名而已劍一人敵不足學學萬人敵耳於是梁奇其意乃教以兵法籍大喜略知其意又不肯竟梁嘗有櫟陽逮請蘄獄掾曹咎書抵櫟陽獄史司馬欣以故事皆已梁嘗殺人與籍避仇吳中吳中賢士大夫皆出梁下每有大繇役及喪梁常主辦陰以兵法部勒賓客子弟以知其能秦始皇帝東遊會稽渡浙江梁與籍觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此奇籍籍長八尺二寸力扛鼎才氣過人吳中子弟皆憚籍秦二世元年陳勝起九月會稽假守通素賢梁乃召與計事梁曰方今江西皆反秦此亦天亡秦時也先發制人後發制於人守歎曰聞夫子楚將世家唯足下耳梁曰吳有奇士桓楚亡在澤中人莫知其處獨籍知之梁乃戒籍持劍居外待梁復入與守語曰請召籍使受令召桓楚籍入梁眴籍曰可行矣籍遂拔劍擊斬守梁持守頭佩其印綬門下驚擾籍所擊殺數十百人府中皆讋伏莫敢復起梁乃召故人所知豪吏諭以所為遂舉吳中兵使人收下縣得精兵八千人部署豪桀為校尉候司馬有, WYG: ''}
