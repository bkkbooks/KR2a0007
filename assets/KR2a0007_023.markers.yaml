  - {type: variant, offset: 100, length: 1, content: 蘄, WYG: 魯成公作丘甲師古曰丘十六井也止出戎馬一匹牛三頭四丘為甸甸六十四井也乃出戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人耳今乃使丘出甸賦違常制也一說别令人為丘作甲也士農工商四類異業甲者非凡人所能為而令作之譏不正也哀公用田賦師古曰田賦者别計田畝及家財各為一賦言不依古制役煩歛重也搜狩治兵}
