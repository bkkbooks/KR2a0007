  - {type: variant, offset: 431, length: 4, content: 種乎徒屬, WYG: 刑錯之風即位十三年齊太倉令淳于公有罪當刑詔獄逮繫長安師古曰逮及也辭之所及則追捕之故謂之逮一曰逮者在道將送防禦不絶若今之傳送囚也淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也宋祁曰姚本益也刪去也字其少女緹縈自傷悲泣師古曰緹縈女名也緹音他弟反廼隨其父至長安上書曰妾父為吏齊中}
