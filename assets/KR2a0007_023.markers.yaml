  - {type: variant, offset: 671, length: 3, content: 立襄彊, WYG: 旦舂臣瓉曰文帝除肉刑皆有以易之故以完易髠以笞代劓以釱左右止代刑今旣曰完矣不復云以完代完也此當言髠者完也宋祁曰代刑姚本改作代刖當黥者髠鉗}
  - {type: page-break, offset: 671, content: '', id: KR2a0007_WYG_023-17b, image: WYG0249/WYG0249-0470b.png}
  - {type: variant, offset: 671, length: 3, content: 立襄彊, krp: 旦舂臣瓉曰文帝除肉刑皆有以易之故以完易髠以笞代劓以釱左右止代刑今旣曰完矣不復云以完代完也此當言髠者完也宋祁曰代刑姚本改作代刖當黥者髠鉗}
  - {type: variant, offset: 675, length: 2, content: 楚王, WYG: 城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市李竒曰命逃亡也復於論命中有罪也晉灼曰命者名也成其罪也師古曰止足也當斬右足者以其辠次重故從棄市也殺人先自告謂殺人而自首得免罪者也吏受賕枉法謂曲公法而受賂者也守縣官財物而即盜之即今律所謂主守自盜者也殺人害重受賕盜物贓汙之身故此三罪已被論名而又犯笞亦皆棄市也今流俗書本笞三百笞五百之上及劓者之下有籍笞字復有笞罪亦云復有籍笞罪皆}
