  - {type: variant, offset: 3973, length: 314, content: 聞諸侯乃遣當陽君蒲將軍將卒二萬人渡河救鉅鹿戰少利陳餘復請兵羽乃悉引兵渡河已渡皆湛舡破釜甑燒廬舍持三日糧視士必死無還心於是至則圍王離與秦軍遇九戰絕甬道大破之殺蘇角虜王離涉閒不降自燒殺當是時楚兵冠諸侯諸侯軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍人人惴恐於是楚已破秦軍羽見諸侯將入轅門膝行而前莫敢仰視羽繇是始為諸侯上將軍兵皆屬焉章邯軍棘原羽軍漳南相持未戰秦軍數卻二世使人讓章邯章邯恐使長史欣請事至咸陽留司馬門三日趙高不見有不信之心長史欣恐還走不敢出故道趙高果使人追之不及欣至軍報曰事亡可為者相國趙高顓國主斷今戰而勝高嫉吾功不勝不免於死願將軍熟計之陳餘亦遺章邯書曰白起為秦將南并鄢郢北阬馬服攻城略地, WYG: 傷制}
