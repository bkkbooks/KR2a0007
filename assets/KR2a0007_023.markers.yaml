  - {type: variant, offset: 2955, length: 330, content: 至今故南公稱曰楚雖三戶亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚蠭起之將皆爭附君者以君世世楚將為能復立楚之後也於是梁乃求楚懷王孫心在民間為人牧羊立以為楚懷王從民望也陳嬰為上柱國封五縣與懷王都盱台梁自號武信君引兵攻亢父初章邯既殺齊王田儋於臨菑田假復自立為齊王儋弟榮走保東阿章邯追圍之梁引兵救東阿大破秦軍東阿田榮即引兵歸逐王假假亡走楚相田角亡走趙角弟閒故將居趙不敢歸田榮立儋子巿為齊王梁已破東阿下軍遂追秦軍數使使趣齊兵俱西榮曰楚殺田假趙殺田角田閒乃發兵梁曰田假與國之王窮來歸我不忍殺趙亦不殺角閒以市於齊齊遂不肯發兵助楚梁使羽與沛公別攻城陽屠之西破秦軍濮陽東秦兵收入濮陽沛公羽攻定陶定陶未下去西略地至雍丘大破秦軍斬李由還攻外黃外黃未下梁起東阿比至定陶再破秦軍羽等, WYG: 罰}
