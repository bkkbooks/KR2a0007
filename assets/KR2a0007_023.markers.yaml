  - {type: variant, offset: 147, length: 5, content: 吾聞二世少, WYG: 孟康曰入王兵之域而未盡善也然猶未本仁義之綂也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之銳士師古曰直亦當也秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳師古曰戰陳之義本因陳列為名而音變耳字則作陳更無别體而末代學者輒改其字旁從車非經史之本文也今宜依古不從流俗也善陳者不戰善戰者不敗善敗者不亡若夫舜脩百僚咎繇作士師古曰士師理官謂司寇之職命以蠻夷猾夏寇賊姦軌師古曰虞書舜典舜命咎繇之文也猾亂也夏諸夏也宼謂攻剽賊謂殺人在外曰姦在内曰軌而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂師古曰謂湯誓泰誓牧誓是也所謂善陳不戰者也齊桓南服彊楚使貢周室師古曰謂僖四年伐楚次于陘責包茅不入王祭不供也北伐山戎為燕開路師古曰謂莊三十年伐山戎以其病燕故也存亡繼絶功為伯首師古曰謂存三亡國衞邢魯也伯讀曰覇所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡師古曰謂定四年吳入郢楚}
