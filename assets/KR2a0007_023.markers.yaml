  - {type: variant, offset: 3612, length: 309, content: 進秦三年羽謂宋義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其內破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨今秦攻趙戰勝則兵罷我承其敝不勝則我引兵鼓行而西必舉秦矣故不如先鬭秦趙夫擊輕銳我不如公坐運籌策公不如我因下令軍中曰猛如虎佷如羊貪如狼強不可令者皆斬遣其子襄相齊身送之無鹽飲酒高會天寒大雨士卒凍飢羽曰將勠力而攻秦久留不行今歲飢民貧卒食半菽軍無見糧乃飲酒高會不引兵渡河因趙食與并力擊秦乃曰承其敝夫以秦之強攻新造之趙其勢必舉趙趙舉秦強何敝之承且國兵新破王坐不安席掃境內而屬將軍國家安危在此一舉今不卹士卒而徇私非社稷之臣也羽晨朝上將軍宋義即其帳中斬義頭出令軍中曰宋義與齊謀反楚楚王陰令籍誅之諸將讋服莫敢枝梧皆曰首立楚者將軍家也今將軍誅, WYG: 治}
