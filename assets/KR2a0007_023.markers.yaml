  - {type: variant, offset: 2592, length: 2, content: 適用, WYG: 威福之臣邑無豪桀之俠以口率計斷獄少於成哀之間什八可謂淸矣師古曰十少其八也然而未能稱意比隆於古者以其疾未盡除而刑本不正善乎孫卿之論刑也曰世俗之為說者以為治古者無肉刑師古曰治古謂上古至治之時也治音丈吏反有象刑墨黥之屬菲履赭衣而不純師古曰菲草履也純緣也衣不加緣示有恥也菲音扶味反純音之允反是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣師古曰人不犯法則象刑無所施也以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡且懲其末也師古曰懲止也殺人者不死傷人者不刑是惠暴而寛惡也故象刑非生於治古方起於亂今也如淳曰古無象刑也所有象刑之言者近起今人惡刑之重故遂推言古之聖君但以象刑天下自治凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也師古曰稱宜也音尺孕反徳不稱位能不稱官賞不當功刑不當罪不祥莫大焉夫征暴誅悖治之威也殺人者死傷人者刑是百王之所同也未有知其所由來者也故治則刑重亂則刑輕李竒曰世所以治者}
