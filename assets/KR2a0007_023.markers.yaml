  - {type: variant, offset: 215, length: 1, content: 在, WYG: 儀式則四方日以安靖也又曰儀刑文王萬邦作孚師古曰大雅文王詩也孚信也又言法象文王則萬國皆信順也如是何辟之有師古曰若詩所言不宜制刑辟民知爭端矣將棄禮而徵於書師古曰取證於刑書錐刀之末將盡爭之師古曰喻微細亂獄滋豐貨賂並行師古曰滋益也終子之世鄭其敗虖子產報曰若吾子之言僑不材不能及子孫吾以救世也師古曰言雖非長乆之法且救當時之敝媮薄之政自是滋矣孔子傷之曰導之以德齊之以禮有恥且格導之以政齊之以刑民免而無恥師古曰論語載孔子之言也格正也言用德禮則人有耻而自正尚政刑則下苟免而無耻禮樂不興則刑罰不中刑罰不中則民無所錯手足師古曰亦論語載孔子之言也禮以治人樂以易俗二者不興則刑罰濫矣錯置也孟氏使陽膚為士師師古曰亦論語所載陽膚曾子弟子也士師獄官問於曾子師古曰問何以居此職也亦曰上失其道民散乆矣如得其情則哀矜而勿喜師古曰此曾子答辭言民俗澆離輕犯於法乃由上失其道非下之過}
