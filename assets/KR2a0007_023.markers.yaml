  - {type: variant, offset: 61, length: 0, content: '', WYG: 物不勝物則養不足羣而不足爭心將作上聖卓然先行敬讓博愛之德者衆心說而從之師古曰說讀曰悅從之成羣是為君矣歸而徃之是為王矣師古曰言爭徃而歸之也洪範曰天子作民父母為天下王師古曰洪範周書也聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而乆立故制禮以崇敬作刑以明威也聖人旣躬明悊之性師古曰躬謂身親有之必通天地之心制禮作敎立法設刑動緣民情而則天象地師古曰則法也故曰先王立禮則天之明因地之性也師古曰春秋左氏傳載鄭大夫子}
  - {type: page-break, offset: 61, content: '', id: KR2a0007_WYG_023-2a, image: WYG0249/WYG0249-0461c.png}
  - {type: variant, offset: 61, length: 0, content: '', krp: 物不勝物則養不足羣而不足爭心將作上聖卓然先行敬讓博愛之德者衆心說而從之師古曰說讀曰悅從之成羣是為君矣歸而徃之是為王矣師古曰言爭徃而歸之也洪範曰天子作民父母為天下王師古曰洪範周書也聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而乆立故制禮以崇敬作刑以明威也聖人旣躬明悊之性師古曰躬謂身親有之必通天地之心制禮作敎立法設刑動緣民情而則天象地師古曰則法也故曰先王立禮則天之明因地之性也師古曰春秋左氏傳載鄭大夫子}
