  - {type: variant, offset: 5415, length: 0, content: '', WYG: 上封事求見果言鳳専權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指甚哀太后涕泣為不食上少而親倚鳳亦不忍廢師古曰倚音于綺反復起鳳就位鳳心慙稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻巳自責至誠動衆愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳師古曰無屬無親屬于上也分音扶問反字或作介介隔也其義亦通非主上}
