  - {type: variant, offset: 1159, length: 497, content: 擅止之勝之皇恐自殺及北軍使者任安坐受太子節懷二心司直田仁縱太子皆要斬上曰侍郎莽通獲反將如侯長安男子景建從通獲少傅石德可謂元功矣大鴻臚商丘成力戰獲反將張光其封通為重合侯建為德侯成為秺侯諸太子賓客嘗出入宮門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡以太子在外始置屯兵長安諸城門後二十餘日太子得於湖語在太子傳其明年貳師將軍李廣利將兵出擊匈奴丞相為祖道送至渭橋與廣利辭決廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎屈氂許諾昌邑王者貳師將軍女弟李夫人子也貳師女為屈氂子妻故共欲立焉是時治巫蠱獄急內者令郭穰告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與貳師共禱祠欲令昌邑王為帝有司奏請案驗罪至大逆不道有詔載屈氂廚車以徇要斬東市妻子梟首華陽街貳師將軍妻子亦收貳師聞之降匈奴宗族遂滅車千秋本姓田氏其先齊諸田徙長陵千秋為高寑郎會衛太子為江充所譖敗久之千秋上急變訟太子冤曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而說之謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚數月遂代劉屈氂, WYG: ''}
