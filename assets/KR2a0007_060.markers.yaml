  - {type: variant, offset: 2160, length: 500, content: 千秋曰唯將軍留意即天下幸甚終不肯有所言光以此重之每有吉祥嘉應數襃賞丞相訖昭帝世國家少事百姓稍益充實始元六年詔郡國舉良文學士問以民所疾苦於是鹽鐵之議起焉千秋為相十二年薨諡曰定侯初千秋年老上優之朝見得乘小車入宮殿中故因號曰車丞相子順嗣侯官至雲中太守宣帝時以虎牙將軍擊匈奴坐盜增鹵獲自殺國除桑弘羊為御史大夫八年自以為國家興榷筦之利伐其功欲為子弟得官怨望霍光與上官桀等謀反遂誅滅王訢濟南人也以郡縣吏積功稍遷為被陽令武帝末軍旅數發郡國盜賊群起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬訢訢已解衣伏質仰言曰使君顓殺生之柄威震郡國今復斬一訢不足以增威不如時有所寬以明恩貸令盡死力勝之壯其言貰不誅因與訢相結厚勝之使還薦訢徵為右輔都尉守右扶風上數出幸安定北地過扶風宮館馳道脩治供張辦武帝嘉之駐車拜訢為真視事十餘年昭帝時為御史大夫代車千秋為丞相封宜春侯明年薨諡曰敬侯子譚嗣以列侯與謀廢昌邑王立宣帝益封三百戶薨子咸嗣王莽妻即咸女莽篡位宜春氏以外戚寵自訢傳國至玄孫莽敗乃絕楊敞華陰人也給事大將軍莫府為軍司馬霍光愛厚之稍遷至大司農元鳳中稻田使者燕蒼知上官桀等反謀以告敞敞素謹畏事不敢言乃移病臥以告諫大夫杜, WYG: 名醫}
