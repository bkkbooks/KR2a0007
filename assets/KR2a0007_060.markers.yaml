  - {type: variant, offset: 5378, length: 0, content: '', WYG: 欽為大將軍軍武庫令職閒無事欽所好也師古曰閒讀曰閑宋祁曰軍武庫一本無軍字諸本皆有予謂當存軍字是大将軍之軍武庫也欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是說大將軍鳳曰禮壹娶九女所以極陽數廣嗣重祖也張晏曰陽數一三五七九九數之極也臣瓉曰天子一娶九女夏殷之制也欽故舉前代之約以刺今之奢也必鄉舉求窈窕不問華色師古曰鄉舉者博問鄉里而舉之也窈窕幽閑也窈音一了反窕音徒了反所以助徳理内也娣姪雖缺不復補所以養夀塞爭也師古曰媵女之内兄弟之女則謂之姪巳之女弟則謂之娣塞絶也故后妃有貞淑之行則𦙍嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳不厭師古曰由用也從也女徳不厭言好色之甚也女徳不厭則夀命不究於髙年師古曰究竟也書云或四三年師古曰周書亡逸篇曰惟湛樂之從罔或克夀或十年或七八年或五六年或四三年謂逸欲過度則損夀也言失欲之生害也師古曰失讀曰佚佚與逸同男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後倈異態後倈異態則正后自疑而支庶有間適之心師古曰間代也音居莧反適讀曰嫡次下亦同是以晉獻被納讒之謗申生䝉無罪之辜師古曰䝉亦被也今聖主富於春秋未有適嗣方鄉術入學師古曰鄉讀曰嚮未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有聲色音技能為萬世大法師古曰惟求淑質無論羙色及音聲技能如此則可為萬代法也夫少戒之在色師古曰論語孔子曰君子有三戒少之時血氣未定戒之在色言好色無節則致損敗故戒之也小卞之作可為寒心張晏曰刺幽王廢申后而立襃姒黜太子宜咎而立伯服也臣瓉曰小卞之詩太子之傅作也哀太子之放逐愍周室之大壊也師古曰詩小雅也二說皆是卞音盤唯將軍常以為憂鳳白之太后太后以為故事無有欽復重言師古曰重音直用反詩云殷監不逺在夏后氏之世師古曰大雅蕩之詩也言殷之所監見其事不逺近在夏后氏之時刺戒者至廹近而省聼者常怠忽師古曰忽忘也可不慎哉前言九女畧陳其禍福甚可悼懼竊恐將軍不深留意后妃之制夭夀治亂存亡之端也迹三代之季世覽宗宣之饗國察近屬之符騐韋昭曰宗殷髙宗也宣周宣王也皆饗國長乆師古曰宗宣之義韋說是也近屬者謂漢家之事耳屬猶言甫爾也音之欲反禍敗曷常不由女徳是以佩玉晏鳴闗睢歎之李竒曰后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之臣瓉曰此魯詩也知好色之伐性短年離制度之生無厭天下將蒙化師古曰蒙被也陵夷而成俗也宋祁曰離字下疑有脫文故詠淑女㡬以配上師古曰闗睢之詩云窈窕淑女君子好仇故云然也淑善也㡬讀曰冀忠孝之篤仁厚之作也師古曰作謂作詩也夫君親夀尊國家治安誠臣子之至願所當勉之也易曰正其本萬物理師古曰今易無此文凡事論有疑未可立行者求之徃古則典刑無考之來今則吉凶同卒揺易之則民心惑鄭氏曰卒急也師古曰卒音干忽反若是者誠難施也今九女之制合於徃古無害於今不逆於民心至易行也行之至有福也將軍輔政而不蚤定師古曰蚤古早字非天下之所望也唯將軍信臣子之願念闗睢之思師古曰信讀曰申逮委政之隆及始初清眀師古曰委政之隆言天子委鳳政事權寵隆盛也始初清明天子新即位宜立法制為漢家建無窮之基誠難以忽不可以遴李竒曰遴難也師古曰遴􅈔同鳳不能自立法度循故事而已㑹皇太后女弟司馬君力蘇林曰字君力為司馬氏婦與欽兄子私通事上聞欽慙懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也師古曰觀得失之蹤迹也臣欽愚戇經術淺薄不足以奉大對師古曰大對謂對大問也臣聞日蝕地震陽微隂盛也臣者君之隂也子者父之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五師古曰解在劉向傳或夷狄侵中國或政權在臣下或婦乘夫師古曰乘陵也或臣子背君父宋祁曰江南本作臣背君子背父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖刺之心師古曰刺戾也音来曷反闗東諸侯無强大之國三垂蠻夷無逆理之節師古曰三垂謂東南西也殆為後宫師古曰殆近也何以言之日以戊申蝕時加未戊未土也土者中宫之部也其夜地震未央宫殿中此必適妾將有爭寵相害而為患者師古曰適讀曰嫡嫡謂正后也宋祁曰南本相害字作於宫唯陛下深戒之變感以類相應人事失於下變象見於上能應之以徳則異咎消亡不能應之以善則禍敗至髙宗遭雊雉之戒飭已正事享百年之夀殷道復興師古曰解在五行志要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舎張晏曰宋景公熒惑守心太史子韋請移之於大臣及國人與嵗公皆不聼天感其誠熒惑為之退舍景公享延期之祚也以陛下聖眀内推至誠深思天變何應而不感何揺而不動孔子曰仁逺乎哉師古曰論語載孔子之言也言仁道不逺求之而至也唯陛下正后妾抑女寵防奢泰去佚游躬節儉親萬事數御安車由輦道師古曰由從也親二宫之饔膳韋昭曰二宫卭成太后與成帝母也師古曰熟食曰饔具食曰膳膳之言善也致昬晨之定省如此即堯舜不足與比隆咎異何足消滅如不留聼於庶事不論材而授位殫天下之財以奉滛侈匱萬姓之力以從耳目師古曰殫匱皆盡也從讀曰縦近諂諛之人而逺公方師古曰方正也信讒賊之臣以誅忠良賢俊失在巖穴大臣怨乎不以師古曰失在巖穴謂隠處巖穴朝廷失之也論語稱周公謂魯公不使大臣怨乎不以以用也不見用而怨也雖無變異社稷之憂也天下至大萬事至衆祖業至重誠不可以佚豫為不可以奢㤗持也師古曰為治也唯陛下忍無益之欲以全衆庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策師古曰此殿在未央宫也策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以師古曰以用也當世之治何務各以經對師古曰取經義以對欽對曰臣聞天道貴信地道貴貞師古曰貞正也不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人師古曰恕仁也言以仁愛為心内省己志施之於人也六經之所上也不孝則事君不忠涖官不敬師古曰涖臨也戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也師古曰孝經載孔子之言也言人能始終行孝而患不及道者未之有也一說行孝終始不備而患禍不及者無此事也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為劉攽曰當云近觀其所為主注文舊有妄刋去之宋祁曰為字下南本浙本並有主字逺觀其所主師古曰所為主謂託人以為援而自進也其所主為人之援而進也宋祁曰注文為主越本作所為非是進也當作進之也孔子曰視其所以觀其所由察其所安人焉廋哉師古曰論語載孔子之言也廋匿也言視人之所用觀人之所從察人之所樂則可知其善惡無所匿其情也取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽師古曰長謂崇貴之也表眀也孔子曰惡紫之奪朱師古曰論語載孔子之言也朱正色也紫間色之好者也惡其邪好而奪正色以喻利口之人多言少實傾惑者也當世治之所務也臣竊有所憂言之則拂心逆指師古曰拂謂違戾也音佛不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意師古曰從順也耦合也臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妬之心興矣如此則匹婦之說不可勝也師古曰匹婦一婦人也宋祁曰說别本浙本作謀唯陛下純徳普施無欲是從師古曰從讀曰縱不縦心于所欲也此則衆庶}
