  - {type: variant, offset: 3660, length: 563, content: 壽曰太僕定有死罪數事朝暮人也惲幸與富平侯婚姻今獨三人坐語侯言時不聞惲語自與太僕相觸也尊曰不可惲怒持大刀曰蒙富平侯力得族罪毋泄惲語令太僕聞之亂餘事惲幸得列九卿諸吏宿衛近臣上所信任與聞政事不竭忠愛盡臣子義而妄怨望稱引為訞惡言大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庶人惲既失爵位家居治產業起室宅以財自娛歲餘其友人安定太守西河孫會宗知略士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意不當治產業通賓客有稱譽惲宰相子少顯朝廷一朝以晻昧語言見廢內懷不服報會宗書曰惲材朽行穢文質無所底幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍會足下哀其愚蒙賜書教督以所不及殷勤甚厚然竊恨足下不深惟其終始而猥隨俗之毀譽也言鄙陋之愚心若逆指而文過默而息乎恐違孔氏各言爾志之義故敢略陳其愚唯君子察焉惲家方隆盛時乘朱輪者十人位在列卿爵為通侯總領從官與聞政事曾不能以此時有所建明以宣德化又不能與群僚同心并力陪輔朝廷之遺忘已負竊位素餐之責久矣懷祿貪勢不能自退遭遇變故橫被口語身幽北闕妻子滿獄當此之時自以夷滅不足以塞責豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子游道樂以忘憂小人全軀說以忘罪竊自思念過已大矣行已虧矣長為農夫以沒世矣是故身率妻子戮力耕桑灌園治產以給公上不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親送其終世有時而既臣之得罪已三, WYG: ''}
