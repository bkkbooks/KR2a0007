  - {type: variant, offset: 5360, length: 0, content: '', WYG: 糓貴民流元光中宋祁曰元光當從南浙本作永光西羗反緩輙上書入錢糓以助用前後數百萬緩六弟五人至大官少弟熊歴五郡二千石三州牧刺史有能名唯中弟欽官不至而最知名欽字子夏少好經書家富而目偏盲師古曰盲目無見也偏盲者患一目也今俗乃以兩目無見者始為盲語移轉也故不好為吏茂陵杜鄴與欽同姓字師古曰並字子夏俱以材能稱京師故衣冠謂欽為盲杜子夏以相别師古曰衣冠謂士大夫也欽惡以疾見詆師古曰詆毁也音丁禮反廼為小冠髙廣財二寸師古曰財與纔同古通用字由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云時帝舅}
