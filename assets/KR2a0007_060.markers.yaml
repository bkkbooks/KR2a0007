  - {type: variant, offset: 5381, length: 6, content: 史遷冀州刺史, krp: 安萬事之是非何足備言師古曰如此則細故萬端不足憂也欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之師古曰慮計也數稱達名士王駿韋安世王延世等師古曰王駿王陽子也韋安世韋賢之孫方山之子也王延世即成帝時塞河堤者也宋祁曰一本只云王延無世字注同予據成紀校尉王延世塞决河是嵗改河平元年此本是劉}
