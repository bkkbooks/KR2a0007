  - {type: variant, offset: 5462, length: 144, content: 中程或私解脫鉗釱衣服不如法輒加罪笞督作劇不勝痛自絞死歲數百千人久者蟲出腐爛家不得收其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食然操持掾史郡中長吏皆令閉門自斂不得踰法公移敕書曰即各欲求索自快是一郡百太守也何得然哉下吏畏之豪彊執服令行禁止然亦以此見廢咸三公子少顯名於朝廷而薛宣朱博, WYG: 事權貴與丞相}
