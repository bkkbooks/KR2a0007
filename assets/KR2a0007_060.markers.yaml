  - {type: variant, offset: 5418, length: 1, content: 誅, WYG: 章死詔獄語在元后傳章既死衆庶寃之以譏朝廷欽欲救其過復說鳳曰亰兆尹章所坐事宻吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章内有所犯雖陷正法事不暴揚自亰師不曉况於逺方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寛眀之徳師古曰爭引謂引事類以諌爭也一曰下有諌爭之言上引而納之也欽愚以為宜因章事舉直言極諫宋祁曰南本無章事二字並見郎從官展盡其意加於徃前以眀示四方使天下}
