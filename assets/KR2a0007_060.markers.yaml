  - {type: variant, offset: 5782, length: 0, content: '', WYG: 與業書曰誠哀老姊垂白隨無狀子出闗師古曰垂白者言白髮下垂也無狀猶言不肖願勿復用前事相侵定陵侯既出闗伏罪復發蘇林曰長與許后書也語在外戚傳下雒陽獄丞相史搜得紅陽侯書奏業聼請不敬服䖍曰受立屬請為不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦師古曰更音工衡反長陷大惡獨得不坐茍欲障塞前過不為陛下廣持平例師古曰俱與長厚善而方進獨不坐是不平也又無恐懼之心反因時信其邪辟師古曰信讀曰伸辟讀曰僻報睚眦怨師古曰睚音厓睚}
