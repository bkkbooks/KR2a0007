  - {type: 'tls:seg', offset: 5387, content: '', id: KR2a0007_tls_060-40a.7}
  - {type: variant, offset: 5388, length: 0, content: '', WYG: 世曰治河者王延世或者此脫一世字歟救解馮野王王尊胡常之罪過及繼功臣絶世填撫四夷師古曰填音竹刃反當世善政多出於欽者見鳳専政㤗重戒之曰昔周公身有至聖之徳屬有叔父之親而成王有獨見之眀無信讒之聴然管蔡流言而周公懼穰侯昭王之舅也文頴曰穰侯魏冉也權重於秦威震鄰敵有旦暮偃伏之愛師古曰言昭王㓜小旦夕偃伏戲弄於舅之旁側也心不介然有間然范睢起徒歩由異國無雅信師古曰雅信謂素相任信開一朝之說而穰侯就封文穎曰范睢為丞相穰侯就國及近者武安侯之見退師古曰武安侯謂田蚡也退謂請考工地益宅上怒乃退之也三事之跡相去各數百嵗若合符節甚不可不察願將軍由周公之謙懼師古曰由從也用也損穰侯之威放武安之欲毋}
