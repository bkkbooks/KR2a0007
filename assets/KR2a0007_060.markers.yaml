  - {type: variant, offset: 4224, length: 668, content: 矣田家作苦歲時伏臘亨羊炰羔斗酒自勞家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時是日也拂衣而喜奮褎低卬頓足起舞誠淫荒無度不知其不可也惲幸有餘祿方糴賤販貴逐什一之利此賈豎之事汙辱之處惲親行之下流之人罪毀所歸不寒而栗雖雅知惲者猶隨風而靡尚何稱譽之有董生不云乎明明求仁義常恐不能化民者卿大夫意也明明求財利常恐困乏者庶人之事也故道不同不相為謀今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有段干木田子方之遺風漂然皆有節概知去就之分頃者足下離舊土臨安定安定山谷之間昆戎舊壤子弟貪鄙豈習俗之移人哉於今乃睹子之志矣方當盛漢之隆願勉旃毋多談又惲兄子安平侯譚為典屬國謂惲曰西河太守建平杜侯前以罪過出今徵為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力惲素與蓋寬饒韓延壽善譚即曰縣官實然蓋司隸韓馮翊皆盡力吏也俱坐事誅會有日食變騶馬猥佐成上書告惲驕奢不悔過日食之咎此人所致章下廷尉案驗得所予會宗書宣帝見而惡之廷尉當惲大逆無道要斬妻子徙酒泉郡譚坐不諫正惲與相應有怨望語免為庶人召拜成為郎諸在位與惲厚善者未央衛尉韋玄成京兆尹張敞及孫會宗等皆免官蔡義河內溫人也以明經給事大將軍莫府家貧常步行資禮不逮眾門下好事者相合為義買犢車令乘之數歲遷補覆盎城門候久之詔求能為韓詩者徵義待詔久不進見義上疏曰臣山東草萊之人行能亡所比容貌不及眾然而不棄人倫者竊以聞道於先師自託於經術也願賜清閒之燕得盡精思於前上召見義說詩甚說之擢為光祿大夫給事中進授昭帝數歲拜為少府遷御史大夫代楊敞為丞相封陽平侯又, WYG: ''}
