  - {type: variant, offset: 5415, length: 0, content: '', krp: 上封事求見果言鳳専權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指甚哀太后涕泣為不食上少而親倚鳳亦不忍廢師古曰倚音于綺反復起鳳就位鳳心慙稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻巳自責至誠動衆愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳師古曰無屬無親屬于上也分音扶問反字或作介介隔也其義亦通非主上}
  - {type: variant, offset: 5416, length: 1, content: 薦, WYG: 以待將軍非將軍所以報主上也昔周公雖老猶在亰師眀不離成周示不忘王室也仲山父異姓之臣無親於宣就封於齊鄧展曰詩言仲山甫徂齊者言銜命徃治齊城郭也而韓詩以為封于齊悞耳晋灼曰韓詩悞而欽引之阿附權貴求容媚也師古曰韓詩既有眀文而欽引以為喻則是其義非謬而與今說詩者不同鄧晋諸人雖曰渉學未得専非杜氏追咎韓詩也猶歎息永懐宿夜徘徊不忍逺去况將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫有將軍師古曰言衆人之意皆不如也宋祁曰南本浙本意並作息主上昭然知之故攀援不遣師古曰援引也音爰書稱公毋困我師古曰此周書洛誥成王告周公詞也言公必湏留此毋得遂去而令我困葢成帝與鳳詔書引此言之唯將軍不為四國流言自疑於成王以固至忠鳳復起視事上令尚書劾奏亰兆尹}
  - {type: page-break, offset: 5416, content: '', id: KR2a0007_WYG_060-17a, image: WYG0250/WYG0250-0324c.png}
