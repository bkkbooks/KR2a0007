  - {type: variant, offset: 26, length: 7, content: 賀祖父昆邪景帝, WYG: 義縦為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡文穎曰邊卒多亡也或曰郡縣主守有所亡失也師古曰此說皆非也謂因虜入為㓂而失人畜甲兵倉廩者也宋祁曰注末也字當刪所論殺甚多奏事中意任用師古曰以奏事當天子之意㫖故被任用也中音竹仲反與減宣更為中丞者十餘嵗師古曰更互也音工衡反周少言重遲師古曰遲謂性非敏速也而内深次骨李竒曰其用法深刻至骨宣為左内史周為廷尉其治大抵放張湯師古曰大抵大歸也放依也音甫徃反而善候司師古曰觀望天子意上所欲擠者因而陷之孟康曰擠音躋師古曰擠墜也上所欲釋久繋待問而微見其寃狀師古曰見顯也客有謂周曰君為天下决平不循三尺法孟康曰以三尺竹簡書法律也師古曰循因也順也宋祁曰浙本無法字専以人主意指為獄獄者固如是乎師古曰言不當然也周曰三尺安出哉師古曰安猶焉也前主所是著為律後主所是疏為令師古曰著謂明表也疏謂分條也當}
