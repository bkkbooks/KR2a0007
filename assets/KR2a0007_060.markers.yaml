  - {type: variant, offset: 5977, length: 1, content: 乃, WYG: 誣罔罪也不知而白之是背經術惑左道也師古曰左道不正之道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白専作威福阿黨所厚排擠英俊師古曰擠墜也音子詣反託公報私横厲無所畏忌師古曰縦横陵厲也欲以熏轑天下師古曰熏言熏灼之轑讀曰燎假借用字天下莫不望風而靡師古曰靡猶弭自尚書近臣皆結舌杜口師古曰杜塞也骨肉親屬莫不股栗師古曰言懼之甚故股戰慄也威權㤗盛而不忠信非}
