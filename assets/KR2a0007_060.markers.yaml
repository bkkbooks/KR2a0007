  - {type: variant, offset: 2846, length: 681, content: 月餘敞薨諡曰敬侯子忠嗣以敞居位定策安宗廟益封三千五百戶忠弟惲字子幼以忠任為郎補常侍騎惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱好交英俊諸儒名顯朝廷擢為左曹霍氏謀反惲先聞知因侍中金安上以聞召見言狀霍氏伏誅惲等五人皆封惲為平通侯遷中郎將郎官故事令郎出錢市財用給文書乃得出名曰山郎移病盡一日輒償一沐或至歲餘不得沐其豪富郎日出游戲或行錢得善部貨賂流行傳相放效惲為中郎將罷山郎移長度大司農以給財用其疾病休謁洗沐皆以法令從事郎謁者有罪過輒奏免薦舉其高弟有行能者至郡守九卿郎官化之莫不自厲絕請謁貨賂之端令行禁止宮殿之內翕然同聲由是擢為諸吏光祿勳親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆予惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此惲居殿中廉絜無私郎官稱公平然惲伐其行治又性刻害好發人陰伏同位有忤己者必欲害之以其能高人由是多怨於朝廷與太僕戴長樂相失卒以是敗長樂者宣帝在民間時與相知及即位拔擢親近長樂嘗使行事肄宗廟還謂掾史曰我親面見受詔副帝肄秺侯御人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪高昌侯車犇入北掖門惲語富平侯張延壽曰聞前曾有犇車抵殿門門關折馬死而昭帝崩今復如此天時非人力也左馮翊韓延壽有罪下獄惲上書訟延壽郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也我不能自保真人所謂鼠不容穴銜窶數者也又中書謁者令宣持單于使者語視諸將軍中朝二千石惲曰冒頓單于得漢美食好物謂之殠惡單于不來明甚惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣畫人有堯舜禹湯不稱而舉桀紂惲聞匈奴降者道單于見殺惲曰得不肖君, WYG: 襃賞}
