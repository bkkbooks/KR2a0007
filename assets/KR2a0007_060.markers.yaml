  - {type: variant, offset: 6110, length: 229, content: 有餘人咸聚闕庭舒六藝之風陳治平之原知者贊其慮仁者明其施勇者見其斷辯者騁其辭齗齗焉行行焉雖未詳備斯可略觀矣中山劉子推言王道撟當世反諸正彬彬然弘博君子也九江祝生奮史魚之節發憤懣譏公卿介然直而不撓可謂不畏彊圉矣桑大夫據當世合時變上權利之略雖非正法鉅儒宿學不能自解博物通達之士也然攝公卿之柄不師古始放於末利處非其位行非其道果隕其性以及厥宗車丞相履伊呂之列當軸處中括囊不言容身而去彼哉彼哉若夫丞相御史兩府之士不能正議以輔宰相成同類長同行阿意苟合以說其上斗筲之徒何足選也, WYG: 考證}
