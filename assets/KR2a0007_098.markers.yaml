  - {type: variant, offset: 2269, length: 861, content: 咸言皇天革漢而立新廢劉而興王夫劉之為字卯金刀也正月剛卯金刀之利皆不得行博謀卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與前大錢五十者為二品並行欲防民盜鑄乃禁不得挾銅炭四月徐鄉侯劉快結黨數千人起兵於其國快兄殷故漢膠東王時改為扶崇公快舉兵攻即墨殷閉城門自繫獄吏民距快快敗走至長廣死莽曰昔予之祖濟南愍王困於燕寇自齊臨淄出保于莒宗人田單廣設奇謀獲殺燕將復定齊國今即墨士大夫復同心殄滅反虜予甚嘉其忠者憐其無辜其赦殷等非快之妻子它親屬當坐者皆勿治弔問死傷賜亡者葬錢人五萬殷知大命深疾惡快以故輒伏厥辜其滿殷國戶萬地方百里又封符命臣十餘人莽曰古者設廬井八家一夫一婦田百畝什一而稅則國給民富而頌聲作此唐虞之道三代所遵行也秦為無道厚賦稅以自供奉罷民力以極欲壞聖制廢井田是以兼并起貪鄙生強者規田以千數弱者曾無立錐之居又置奴婢之市與牛馬同蘭制於民臣顓斷其命姦虐之人因緣為利至略賣人妻子逆天心誖人倫繆於天地之性人為貴之義書曰予則奴戮女唯不用命者然後被此辜矣漢氏減輕田租三十而稅一常有更賦罷癃咸出而豪民侵陵分田劫假厥名三十稅一實什稅五也父子夫婦終年耕芸所得不足以自存故富者犬馬餘菽粟驕而為邪貧者不厭糟糠窮而為姦俱陷于辜刑用不錯予前在大麓始令天下公田口井時則有嘉禾之祥遭反虜逆賊且止今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田予九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑眾者投諸四裔以禦魑魅如皇始祖考虞帝故事是時百姓便安漢五銖錢以莽錢大小兩行難知又數變改不信皆私以五銖錢市買譌言大錢當罷莫肯挾莽患之復下書諸挾五銖錢言大錢當罷者比非井田制投四裔於是農商失業食貨俱廢民人至涕泣於市道及坐賣買田宅奴婢鑄錢自諸侯卿大夫至于庶民抵罪者不可勝數秋遣五威將王奇等十二人班符命四十二篇於天下德祥五事符命二十五福應十二凡四十二篇其德祥言文宣之世黃龍見於成紀新都高祖考王伯墓門梓柱生枝葉之屬符命言井石金匱之屬福應言雌雞化為雄之屬其文爾雅依託皆為作說大歸言莽當代漢有天下云總而說, WYG: 歌}
