  - {type: variant, offset: 3626, length: 0, content: '', WYG: 恨内銜之未言後㣲行出過曲陽侯第又見園中土山漸臺似類白虎殿師古曰黄圖云在未央宫於是上怒以讓車騎將軍音商根兄弟欲自黥劓謝太后上聞之大怒廼使尚書責問司隸校尉京兆尹知成都侯商擅穿帝城決引灃水曲陽侯根驕奢僭上赤墀青𤨏孟康曰以靑畫戸邉鏤中天子制也如淳曰門楣格再重如人衣領再重裏者青名曰青𤨏天子門制也師古曰孟說是青𤨏者刻為連𤨏文而以青塗之也紅陽侯立父子臧匿姦猾亡命賔客為羣盜司隸京兆皆阿縱不舉奏正法二人頓首省户下又賜車騎將軍音䇿書曰外家何甘樂禍敗師古曰言此罪過並身自}
