  - {type: variant, offset: 6814, length: 0, content: '', WYG: 嵗餘成帝崩哀帝即位太后詔莽就第避帝外家哀帝初優莽不聽莽上書固乞骸骨而退上廼下詔曰曲陽侯根前在位建社稷䇿}
  - {type: variant, offset: 6814, length: 0, content: '', krp: 嵗餘成帝崩哀帝即位太后詔莽就第避帝外家哀帝初優莽不聽莽上書固乞骸骨而退上廼下詔曰曲陽侯根前在位建社稷䇿}
  - {type: variant, offset: 6816, length: 0, content: '', WYG: 太僕安陽侯舜往時護太子家導朕忠誠専壹有舊恩新都侯莽憂勞國家執義堅固庶㡬與為治太皇太后宋祁曰越本無太皇字詔休就第朕甚閔焉其益封根二千户舜五百戸莽三百五十户以莽為特進朝朔望又還紅陽侯立京師哀帝少而聞知王氏驕盛心不能善以初立故優之後月餘司隸校尉解光奏曲陽侯根宗重身尊三世㩀權五將秉政天下輻湊自效師古曰效獻也獻其疑誠宋祁曰浙本注文獻並作致根行貪邪臧累鉅萬縱横恣意師古曰横音胡孟反}
