  - {type: variant, offset: 6938, length: 4, content: 王相改各, WYG: 後是為平帝帝九嵗常年被疾太后臨朝委政於莽莽顓威福紅陽侯立莽諸父平阿侯仁素剛直莽内憚之令大臣以罪過奏遣立仁就國莽日誑燿太后言輔政致太平羣臣奏請尊莽為安漢公後遂遣使者廹守立仁令自殺賜立諡曰荒侯子柱嗣仁諡曰刺侯子術嗣是嵗元始三年也眀年莽風羣臣奏立莽女為皇后師古曰風讀曰諷又奏尊莽為宰衡莽母及兩子皆封為列侯語在莽𫝊莽既外壹羣臣令稱已功徳又内媚事旁側長御以下賂遺以千萬數白尊太后姊妹君俠為廣恩君君力為廣恵君君弟為廣施君皆食湯沐邑日夜共譽莽莽又知太后婦人厭居深宫中莽欲虞樂以市其權張晏曰以逰觀之樂易其權若市買之易物者也師古曰虞與娛同廼令太后四時車駕廵狩四郊師古曰邑外謂之郊近二十里也宋祁曰近字下當}
