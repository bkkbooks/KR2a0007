  - {type: variant, offset: 5224, length: 601, content: 事天下騷動先至者屯邊郡須畢具乃同時出莽以錢幣訖不行復下書曰民以食為命以貨為資是以八政以食為首寶貨皆重則小用不給皆輕則僦載煩費輕重大小各有差品則用便而民樂於是造寶貨五品語在食貨志百姓不從但行小大錢二品而已盜鑄錢者不可禁乃重其法一家鑄錢五家坐之沒入為奴婢吏民出入持布錢以副符傳不持者廚傳勿舍關津苛留公卿皆持以入宮殿門欲以重而行之是時爭為符命封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絕其原莽亦厭之遂使尚書大夫趙並驗治非五威將率所班皆下獄初甄豐劉歆王舜為莽腹心倡導在位襃揚功德安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜歆亦受其賜並富貴矣非復欲令莽居攝也居攝之萌出於泉陵侯劉慶前煇光謝囂長安令田終術莽羽翼已成意欲稱攝豐等承順其意莽輒復封舜歆兩子及豐孫豐等爵位已盛心意既滿又實畏漢宗室天下豪桀而疏遠欲進者並作符命莽遂據以即真舜歆內懼而已豐素剛強莽覺其不說故徙大阿右拂大司空豐託符命文為更始將軍與賣餅兒王盛同列豐父子默默時子尋為侍中京兆大尹茂德侯即作符命言新室當分陝立二伯以豐為右伯太傅平晏為左伯如周召故事莽即從之拜豐為右伯當述職西出未行尋復作符命言故漢氏平帝后黃皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黃皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山歲餘捕得辭連國師公歆子侍中東通靈將五司大夫隆威侯棻棻弟右曹長水校尉伐虜侯泳大司空邑弟左關將軍掌威侯奇及歆門人, WYG: ''}
