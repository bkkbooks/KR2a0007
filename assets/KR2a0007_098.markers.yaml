  - {type: variant, offset: 1635, length: 201, content: 莽又曰予前在攝時建郊宮定祧廟立社稷神祇報況或光自上復于下流為烏或黃氣熏烝昭耀章明以著黃虞之烈焉自黃帝至于濟南伯王而祖世氏姓有五矣黃帝二十五子分賜厥姓十有二氏虞帝之先受姓曰姚其在陶唐曰媯在周曰陳在齊曰田在濟南曰王予伏念皇初祖考黃帝皇始祖考虞帝以宗祀于明堂宜序於祖宗之親廟其立祖廟五親廟四后夫人皆配食郊祀黃帝以配天黃后以配地以新都侯東弟為大禖歲時以祀家之所尚種祀天下姚媯陳田王氏凡五姓者皆黃虞苗裔予之同族也, WYG: ''}
