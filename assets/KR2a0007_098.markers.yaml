  - {type: variant, offset: 1428, length: 206, content: 祚厥祀惟王氏虞帝之後也出自帝嚳劉氏堯之後也出自顓頊於是封姚恂為初睦侯奉黃帝後梁護為脩遠伯奉少昊後皇孫功隆公千奉帝嚳後劉歆為祁烈伯奉顓頊後國師劉歆子疊為伊休侯奉堯後媯昌為始睦侯奉虞帝後山遵為襃謀子奉皋陶後伊玄為襃衡子奉伊尹後漢後定安公劉嬰位為賓周後衛公姬黨更封為章平公亦為賓殷後宋公孔弘運轉次移更封為章昭侯位為恪夏後遼西姒豐封為章功侯亦為恪四代古宗宗祀于明堂以配皇始祖考虞帝周公後襃魯子姬就宣尼公後襃成子孔鈞已前定, WYG: 何嚮}
