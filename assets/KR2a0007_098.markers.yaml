  - {type: variant, offset: 196, length: 220, content: 平原安德漯陰鬲重丘凡戶萬地方百里為定安公國立漢祖宗之廟於其國與周後並行其正朔服色世世以事其祖宗永以命德茂功享歷代之祀焉以孝平皇后為定安太后讀策畢莽親執孺子手流涕歔欷曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意哀歎良久中傅將孺子下殿北面而稱臣百僚陪位莫不感動又按金匱輔臣皆封拜以太傅左輔驃騎將軍安陽侯王舜為太師封安新公大司徒就德侯平晏為太傅就新公少阿羲和京兆尹紅休侯劉歆為國師嘉新公廣漢梓潼哀章為國將美新公是為四輔位上公太保後承承陽侯甄邯, WYG: 鳳}
