  - {type: variant, offset: 675, length: 237, content: 師典致時雨青煒登平考景以晷熒惑司悊南嶽太傅典致時奧赤煒頌平考聲以律太白司艾西嶽國師典致時陽白煒象平考量以銓辰星司謀北嶽國將典致時寒玄煒和平考星以漏月刑元股左司馬典致武應考方法矩主司天文欽若昊天敬授民時力來農事以豐年穀日德元厷右司徒典致文瑞考圜合規主司人道五教是輔帥民承上宣美風俗五品乃訓斗平元心中司空典致物圖考度以繩主司地里平治水土掌名山川眾殖鳥獸蕃茂草木各策命以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆孤卿更名大司農曰羲和後更為納言大理曰作士太常曰秩宗大鴻臚曰典, WYG: 后從弟長}
