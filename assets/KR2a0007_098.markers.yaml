  - {type: variant, offset: 25, length: 0, content: '', WYG: 子所愛幸司馬良娣病且死謂太子曰妾死非天命廼諸娣妾良人更祝詛殺我師古曰更音工衡反太子憐之且以為然及司馬良娣死太子悲恚發病忽忽不樂因以過怒諸娣妾莫得進見者久之宋祁曰越本無者字宣帝聞太子恨過諸娣妾欲順適其意廼令皇}
