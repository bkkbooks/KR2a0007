  - {type: variant, offset: 33, length: 12, content: 順符命去漢號焉初莽妻宜春, WYG: 師古曰恐不副皇后意故言不得已彊應曰此中一人可師古曰非其本心故曰彊是時政君坐近太子又獨衣絳縁諸于師古曰諸于大掖衣即袿衣之類也長御即以為是皇后使侍中杜輔掖庭令濁賢交送政君太子宫師古曰濁姓也交送謂侍中掖庭令雜為使見丙殿得御幸有身先是者太子後宫娣妾以十數御幸久者七八年莫有子及王妃壹幸而有身甘露三年生成帝於甲館畫堂為世適皇孫師古曰適讀曰嫡宣帝愛之自名曰驁字太孫常置左右後三年宣帝崩太子即位是為孝元帝立太孫為太子以母王妃為倢伃封父禁為陽平}
