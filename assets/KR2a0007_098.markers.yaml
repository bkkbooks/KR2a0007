  - {type: variant, offset: 76, length: 119, content: 子安為新嘉辟封宇子六人千為功隆公壽為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃策命孺子曰咨爾嬰昔皇天右乃太祖歷世十二享國二百一十載曆數在于予躬詩不云乎侯服于周天命靡常封爾為定安公永為新室賓於戲敬天之休往踐乃位毋廢予命又曰其, WYG: 后}
