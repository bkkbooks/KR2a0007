  - {type: variant, offset: 6985, length: 1, content: 洛, krp: 卜相為最吉廼風公卿奏請立嬰為孺子師古曰風讀曰諷令宰衡安漢公莽踐阼居攝如周公傅成王故事太后不以為可力不能禁於是莽遂為攝皇帝改元稱制焉俄而宗室安衆侯劉崇及東郡太守翟義等惡之更舉兵欲誅莽師古曰更音工衡反太后聞之曰人心不相逺也師古曰言所見者同我雖婦人亦知莽必以是自危不可其後莽遂以符命自立為真皇帝先奉諸符瑞以白太后太后大驚初漢髙祖入咸}
  - {type: variant, offset: 6987, length: 0, content: '', WYG: 至覇上秦王子嬰降於軹道奉上始皇璽及髙祖誅項籍即天子位因御服其璽世世𫝊受號曰漢𫝊國璽以孺子未立宋祁曰别本作未即立或作未即位璽臧長樂宫及莽即位請璽太后不肯授莽莽使安陽侯舜諭指舜素謹敕太后雅愛信之舜既見太后知其為莽求璽怒罵之曰而屬父子宗族䝉漢家力富貴累世師古曰而汝也既無以報受人孤寄乗便利時奪取其國師古曰孤寄言以孤寄託之不復顧恩義人如此者狗豬不食其餘師古曰言惡賤天下豈有而兄弟邪且若自以金匱符命為新皇帝師古曰若亦汝變更正朔服制亦當自更作璽𫝊之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久廼仰謂太后臣等已無可言者師古曰言不可諌止莽必欲得𫝊國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之廼出漢𫝊國璽投之地以授舜曰我老已死知而兄弟今滅族也宋祁曰知而越本知作如考異更作如舜既得𫝊國璽奏之莽大說師古曰說讀曰悅廼為太后置酒未央宫漸臺大縱衆樂莽又欲改太后漢家舊號易其璽綬恐不見聴而莽疎屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當随漢廢以奉天命莽廼車駕至東宫親以其書白太后太后曰此言是也師古曰恚懟之辭也莽因曰此誖徳之臣也師古曰誖乖也音布内反罪當誅於是冠軍張永獻符命銅璧文言太皇太后當}
