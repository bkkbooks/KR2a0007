  - {type: variant, offset: 9666, length: 493, content: 棄市益州蠻夷殺大尹程隆三邊盡反遣平蠻將軍馮茂將兵擊之寧始將軍侯輔免講易祭酒戴參為寧始將軍二年二月置酒王路堂公卿大夫皆佐酒大赦天下是時日中見星大司馬苗訢左遷司命以延德侯陳茂為大司馬訛言黃龍墮死黃山宮中百姓犇走往觀者有萬數莽惡之捕繫問語所從起不能得單于咸既和親求其子登屍莽欲遣使送致恐咸怨恨害使者乃收前言當誅侍子者故將軍陳欽以他辠繫獄欽曰是欲以我為說於匈奴也遂自殺莽選儒生能顓對者濟南王咸為大使五威將琅邪伏黯等為帥使送登屍敕令掘單于知墓棘鞭其屍又令匈奴卻塞於漠北責單于馬萬匹牛三萬頭羊十萬頭及稍所略邊民生口在者皆還之莽好為大言如此咸到單于庭陳莽威德責單于背畔之辠應敵從橫單于不能詘遂致命而還之入塞咸病死封其子為伯伏黯等皆為子莽意以為制定則天下自平故銳思於地里制禮作樂講合六經之說公卿旦入暮出議論連年不決不暇省獄訟冤結民之急務縣宰缺者數年守兼一切貪殘日甚中郎將繡衣執法在郡國者並乘權勢傳相舉奏又十一公士分布勸農桑班時令案諸章冠蓋相望交錯道路召會吏民逮捕證左郡縣賦斂遞相賕賂白黑紛然守闕告訴者多莽自見前顓權以得漢政故務自㩜眾事有司受成苟免諸寶物名帑藏錢穀官皆宦者領之吏民上封事書宦官左右開發尚書, WYG: ''}
