  - {type: variant, offset: 1116, length: 297, content: 大夫比二千石曰中大夫二千石曰上大夫中二千石曰卿車服黻冕各有差品又置司恭司徒司明司聰司中大夫及誦詩工徹膳宰以司過策曰予聞上聖欲昭厥德罔不慎修厥身用綏于遠是用建爾司于五事毋隱尤毋將虛好惡不愆立于厥中於戲勗哉令王路設進善之旌非謗之木敢諫之鼓諫大夫四人常坐王路門受言事者封王氏齊縗之屬為侯大功為伯小功為子緦麻為男其女皆為任男以睦女以隆為號焉皆授印韍令諸侯立太夫人夫人世子亦受印韍又曰天無二日土無二王百王不易之道也漢氏諸侯或稱王至于四夷亦如之遠於古典繆於一統其定諸侯王之號皆稱公及四夷僭號稱王者皆更為侯又曰帝王之道相因而通盛德之祚百世享祀予惟黃帝帝少昊帝顓頊帝嚳帝堯帝舜帝夏禹皋陶伊尹咸有聖德假于皇天功烈, WYG: 知臣被恩見哀重}
