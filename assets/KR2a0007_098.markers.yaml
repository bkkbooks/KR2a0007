  - {type: variant, offset: 6, length: 1, content: 九, WYG: 八孝元皇后王莽之姑也莽自謂黄帝之後其自本曰師古曰述其本系黄帝姓姚氏八世生虞舜舜起媯汭以媯為姓師古曰媯水名也曲水曰汭言因水為姓也汭音而銳反蕭該音義曰媯汭字書曰媯舜姓也該案舜居媯水因以為姓至周武王封舜後媯滿於陳是為胡公十三世生完完字敬仲犇齊師古曰犇古奔字齊桓公以為卿姓田氏十一世田和有齊國三世稱王宋祁曰舊本三作二至王建為秦所滅項羽起封建孫安為濟北王至漢興安失國齊人謂之王家因以為氏文景間安孫遂字伯紀處東平陵師古曰濟南之縣生賀字翁孺為武帝繡衣御史逐捕魏郡羣盜堅盧等黨與及吏畏懦逗遛當坐者師古曰懦音乃喚反逗音住又音豆翁孺皆縱不誅它部御史暴勝之等奏殺二千石誅千石以下師古曰二千石者奏而殺之其千石以下則得専誅及通行飲食坐連及者大部至斬萬餘人語見酷吏𫝊翁孺以奉使不稱免師古曰不稱謂不副所委嘆曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨廼徙魏郡元城委粟里為三老魏郡人徳之元城建公曰服䖍曰元城人年老者也昔春秋沙麓崩晉史卜之曰隂為陽雄土火相乗李竒曰此龜繇文也陰元后也陽漢也王氏舜後土也漢火也故曰土火相乗陰盛而沙麓崩故有沙麓崩後六百四十五年宜有聖女興其齊田乎張晏曰陰數八八八六十四土數五故六百四十五嵗也春秋僖十四年沙麓崩嵗在乙亥至哀帝元夀二年哀帝崩元后始攝政嵗在庚申沙麓崩後六百四十五嵗今王翁孺徙正直其地師古曰直亦當宋祁曰注末當有也字日月當之元城郭東有五鹿之虚即沙鹿地也師古曰虚讀曰墟後八十年當有貴女興天下云翁孺生禁字稚君少學法律長安為廷尉史本始三年生女政君即元后也禁有大志不修㢘隅好酒色多取傍妻凡有四女八男長女君俠次即元后政君次君力次君弟長男鳳孝卿次曼元卿譚子元宋祁曰譚字上當有次字崇少子商子夏立子叔根稚卿逢時季卿唯鳳崇與元后政君同母母適妻魏郡李氏女也師古曰適讀曰嫡後以妬去更嫁為河内茍賓妻初李親任政君在身師古曰任懐任夢月入其懐及壯大婉順得婦人道嘗許嫁未行所許者死後東平王聘政君為姬未入王薨禁獨怪之使卜數者相政君師古曰數計也若言今之祿命書也數音所具反當大貴不可言禁心以為然廼教書學鼓琴五鳳}
