  - {type: variant, offset: 9014, length: 577, content: 其官其無爵者為尹分長安城旁六鄉置帥各一人分三輔為六尉郡河東河內弘農河南潁川南陽為六隊郡置大夫職如太守屬正職如都尉更名河南大尹曰保忠信卿益河南屬縣滿三十置六郊州長各一人人主五縣及它官名悉改大郡至分為五郡縣以亭為名者三百六十以應符命文也緣邊又置竟尉以男為之諸侯國閒田為黜陟增減云莽下書曰常安西都曰六鄉眾縣曰六尉義陽東都日六州眾縣曰六隊粟米之內曰內郡其外曰近郡有鄣徼者曰邊郡合百二十有五郡九州之內縣二千二百有三公作甸服是為惟城諸在侯服是為惟寧在采任諸侯是為惟翰在賓服是為惟屏在揆文教奮武衛是為惟垣在九州之外是為惟藩各以其方為稱總為萬國焉其後歲復變更一郡至五易名而還復其故吏民不能紀每下詔書輒繫其故名曰制詔陳留大尹太尉其以益歲以南付新平新平故淮陽以雍丘以東付陳定陳定故梁郡以封丘以東付治亭治亭故東郡以陳留以西付祈隧祈隧故滎陽陳留已無復有郡矣大尹太尉皆詣行在所其號令變易皆此類也令天下小學戊子代甲子為六旬首冠以戊子為元日昏以戊寅之旬為忌日百姓多不從者匈奴單于知死弟咸立為單于求和親莽遣使者厚賂之詐許還其侍子登因購求陳良終帶等單于即執良等付使者檻車詣長安莽燔燒良等於城北令吏民會觀之緣邊大飢人相食諫大夫如普行邊兵還言軍士久屯塞苦邊郡無以相贍今單于新和宜因是罷兵校尉韓威進曰以新室之威而吞胡虜無異口中蚤蝨臣願得勇敢之士五千人不齎斗糧飢食虜肉渴飲其血可以橫行莽壯其言以威, WYG: 祖初起丹降}
