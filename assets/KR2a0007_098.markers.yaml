  - {type: variant, offset: 6990, length: 979, content: 東都常安為新室西都邦畿連體各有采任州從禹貢為九爵從周氏有五諸侯之員千有八百附城之數亦如之以俟有功諸公一同有眾萬戶土方百里侯伯一國眾戶五千土方七十里子男一則眾戶二千有五百土方五十里附城大者食邑九成眾戶九百土方三十里自九以下降殺以兩至於一成五差備具合當一則今已受茅土者公十四人侯九十三人伯二十一人子百七十一人男四百九十七人凡七百九十六人附城千五百一十一人九族之女為任者八十三人及漢氏女孫中山承禮君遵德君修義君更以為任十有一公九卿十二大夫二十四元士定諸國邑采之處使侍中講禮大夫孔秉等與州部眾郡曉知地理圖籍者共校治于壽成朱鳥堂予數與群公祭酒上卿親聽視咸已通矣夫襃德賞功所以顯仁賢也九族和睦所以襃親親也予永惟匪解思稽前人將章黜陟以明好惡安元元焉以圖簿未定未授國邑且令受奉都內月錢數千諸侯皆困乏至有庸作者中郎區博諫莽曰井田雖聖王法其廢久矣周道既衰而民不從秦知順民之心可以獲大利也故滅廬井而置阡陌遂王諸夏訖今海內未厭其敝今欲違民心追復千載絕迹雖堯舜復起而無百年之漸弗能行也天下初定萬民新附誠未可施行莽知民怨乃下書曰諸名食王田皆得賣之勿拘以法犯私買賣庶人者且一切勿治初五威將帥出改句町王以為侯王邯怨怒不附莽諷牂柯大尹周歆詐殺邯邯弟承起兵攻殺歆先是莽發高句驪兵當伐胡不欲行郡強迫之皆亡出塞因犯法為寇遼西大尹田譚追擊之為所殺州郡歸咎於高句驪侯騶嚴尤奏言貉人犯法不從騶起正有它心宜令州郡且尉安之今猥被以大罪恐其遂畔夫餘之屬必有和者匈奴未克夫餘穢貉復起此大憂也莽不尉安穢貉遂反詔尤擊之尤誘高句驪侯騶至而斬焉傳首長安莽大說下書曰乃者命遣猛將共行天罰誅滅虜知分為十二部或斷其右臂或斬其左腋或潰其胸腹或紬其兩脅今年刑在東方誅貉之部先縱焉捕斬虜騶平定東域虜知殄滅在于漏刻此乃天地群神社稷宗廟佑助之福公卿大夫士民同心將率虓虎之力也予甚嘉之其更名高句驪為下句驪布告天下令咸知焉於是貉人愈犯邊東北與西南夷皆亂云莽志方盛以為四夷不足吞滅專念稽古之事復下書曰伏念予之皇始祖考虞帝受終文祖在璇璣玉衡以齊七政遂類于上帝禋于六宗望秩于山川徧于群神巡狩五嶽群后四朝敷奏以言明試以功予之受命即真到于建國五年已五載矣陽九之阸既度百六之會已過歲在壽星填在明堂倉龍癸酉德在中宮觀晉掌歲龜策告從其以此年二月建寅之節東巡狩具禮儀調度群公奏請募吏民人馬布帛綿又請內郡國十二買馬發帛四十五萬匹輸常安前後毋相須至者過半莽下書曰, WYG: ''}
