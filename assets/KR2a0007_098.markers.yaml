  - {type: variant, offset: 8171, length: 788, content: 國外孫也其胡婦子為小昆彌而烏孫歸附之莽見匈奴諸邊並侵意欲得烏孫心乃遣使者引小昆彌使置大昆彌使上保成師友祭酒滿昌劾奏使者曰夷狄以中國有禮誼故詘而服從大昆彌君也今序臣使於君使之上非所以有夷狄也奉使大不敬莽怒免昌官西域諸國以莽積失恩信焉耆先畔殺都護但欽十一月彗星出二十餘日不見是歲以犯挾銅炭者多除其法明年改元曰天鳳天鳳元年正月赦天下莽曰予以二月建寅之節行巡狩之禮太官齎糒乾肉內者行張坐臥所過毋得有所給予之東巡必躬載耒每縣則耕以勸東作予之南巡必躬載耨每縣則薅以勸南偽予之西巡必躬載銍每縣則穫以勸西成予之北巡必躬載拂每縣則粟以勸蓋藏畢北巡狩之禮即于土中居雒陽之都焉敢有趨讙犯法輒以軍法從事群公奏言皇帝至孝往年文母聖體不豫躬親供養衣冠稀解因遭棄群臣悲哀顏色未復飲食損少今一歲四巡道路萬里春秋尊非糒乾肉之所能堪且無巡狩須闋大服以安聖體臣等盡力養牧兆民奉稱明詔莽曰群公群牧群司諸侯庶尹願盡力相帥養牧兆民欲以稱予繇此敬聽其勗之哉毋食言焉更以天鳳七年歲在大梁倉龍庚辰行巡狩之禮厥明年歲在實沈倉龍辛巳即土之中雒陽之都乃遣太傅平晏大司空王邑之雒陽營相宅兆圖起宗廟社稷郊兆云三月壬申晦日有食之大赦天下策大司馬逯並曰日食無光干戈不戢其上大司馬印韍就侯氏朝位太傅平晏勿領尚書事省侍中諸曹兼官者以利苗男訢為大司馬莽即真尤備大臣抑奪下權朝臣有言其過失者輒拔擢孔仁趙博費興等以敢擊大臣故見信任擇名官而居之公卿入宮吏有常數太傅平晏從吏過例掖門僕射苛問不遜戊曹士收繫僕射莽大怒使執法發車騎數百圍太傅府捕士即時死大司空士夜過奉常亭亭長苛之告以官名亭長醉曰寧有符傳邪士以馬箠擊亭長亭長斬士亡郡縣逐之家上書莽曰亭長奉公勿逐大司空邑斥士以謝國將哀章頗不清莽為選置和叔敕曰非但保國將閨門當保親屬在西州者諸公皆輕賤而章尤甚四月隕霜殺屮木海瀕尤甚六月黃霧四塞七月大風拔樹飛北闕直城門屋瓦雨雹殺牛羊莽以周官王制之文置卒正連率大尹職如, WYG: 山}
