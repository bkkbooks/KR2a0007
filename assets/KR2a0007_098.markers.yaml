  - {type: variant, offset: 6933, length: 1, content: 則, WYG: 貶抑尊號之議虧損孝道及平阿侯仁臧匿趙昭儀親屬皆就國天下多􅁈王氏諫大夫楊宣上封事言孝成皇帝深惟宗廟之重稱述陛下至徳以承天序聖䇿深逺恩徳至厚惟念先帝之意豈不欲以陛下自代奉承東宫㢤師古曰言供養太后太皇太后春秋七十數更憂傷師古曰更經也音工衡反敕令親屬引領以避丁傅師古曰引領自引首領而退也行道之人為之隕涕况於陛下時登髙逺望獨不慙於延陵乎哀帝深感其言復封商中子邑為成都侯元夀元年日蝕賢良對䇿多訟新都侯莽者上於是徴莽及平阿侯仁還京師侍太后曲陽侯根薨國除眀年哀帝崩}
