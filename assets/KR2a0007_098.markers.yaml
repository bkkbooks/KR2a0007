  - {type: variant, offset: 3628, length: 2, content: 三夜, WYG: 而欲自黥劓相戮辱於太后前傷慈母之心以危亂國外家宗族彊上一身寖弱日久師古曰寖漸也今將一施之師古曰行刑罰君其召諸侯令待府舎師古曰令總集音之府舎待詔命是日詔尚書奏文帝時誅將軍薄昭故事車騎將軍音籍槀請罪師古曰自坐槀上言就刑戮也商立根皆負斧質謝上}
