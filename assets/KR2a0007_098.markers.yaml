  - {type: variant, offset: 8007, length: 0, content: '', WYG: 莽廼下詔曰予視羣公咸曰休哉師古曰視讀曰示休美也其文字非刻非畫厥性自然予伏念皇天命予為子更命太皇太后為新室文母太皇太后協于新室宋祁曰熙寧監本作協于新淳化本作新室故交代之際信于漢氏哀帝之代世傳行詔籌為西王母共具之祥師古曰共音居用反當為歴代為母昭然著明予祗畏天命敢不欽承謹以令月吉日親率羣公諸侯卿士奉上皇太后璽􅌧以當順天心光于四海焉師古曰此􅌧謂璽之組也太后聴許莽於是鴆殺王諫而封張永為貢符子初莽為安漢公時又諂太后奏尊元帝廟為髙宗太后晏駕後當以禮配食云及莽改號太后為新室文母絶之於漢不令得體元帝堕壊孝元廟師古曰堕毁也音火規反更為文母太后起廟獨置孝元廟故殿以為文母篹食堂孟康曰篹音撰晉灼曰篹具也既成名曰長夀宫以太后在故未謂之廟莽以太后好出遊觀廼車駕置酒長夀宫請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壊之師古曰與音預言此何罪於汝無所干預何為毁壊之且使鬼神無知又何用廟為如令有知我廼人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人嫚神多矣能久得祐乎飲酒不樂而罷自莽簒位後知太后怨恨求所以媚太后無不為然愈不說師古曰說讀曰悅莽更漢家黒貂著黄貂孟康曰侍中所著貂也莽更漢制也師古曰更亦改又改漢正朔伏臘日太后令其官屬黒貂至漢家正臘日獨與其左右相對飲酒食太后年八十四建國五年二月癸丑}
