  - {type: variant, offset: 1415, length: 4, content: 光施于遠, WYG: 也師古曰巍巍髙貌重音直用反進退於國為厚萬無纎介之議師古曰論者不云疏斥外戚也唯陛下哀憐其辭指甚哀太后聞之為垂涕不御食上少而親倚鳳弗忍廢廼報鳳曰朕秉事不眀政事多闕故天變婁臻咸在朕躬師古曰婁古屢字將軍廼深引過自}
