  - {type: variant, offset: 5830, length: 234, content: 丁隆等牽引公卿黨親列侯以下死者數百人尋手理有天子字莽解其臂入視之曰此一大子也或曰一六子也六者戮也明尋父子當戮死也乃流棻于幽州放尋于三危殛隆于羽山皆驛車載其屍傳致云莽為人侈口蹶顄露眼赤精大聲而嘶長七尺五寸好厚履高冠以氂裝衣反膺高視瞰臨左右是時有用方技待詔黃門者或問以莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅滅待詔而封告者後常翳雲母屏面非親近莫得見也是歲以初睦侯姚恂為寧始將軍三年莽曰百官改更職事分移律令儀法未及悉定且因漢律令儀法以從事令公卿, WYG: 光祿}
