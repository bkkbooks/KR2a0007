  - {type: variant, offset: 6944, length: 0, content: '', krp: 近存見孤寡貞婦春幸繭館師古曰漢宫閣疏云上林苑有繭觀葢蠶繭之所也率皇后列侯夫人桑遵覇水而祓除師古曰桑採桑也遵循也謂縁水邉夏遊篽宿鄠杜之間師古曰篽宿苑在長安城南今之御宿川是也宋祁曰篽一本作御秋歴東館望昆眀集黄山宫冬饗飲飛羽師古曰黄山宫在槐里飛羽殿在未央宫中羽字或作雨校獵上蘭師古曰上蘭觀名也在上林中登長平館師古曰在長平坂也臨涇水而覽焉太后所至屬縣輙施恩恵賜民錢帛牛酒嵗以}
