  - {type: variant, offset: 6066, length: 744, content: 諸侯二千石舉吏民有德行通政事能言語明文學者各一人詣王路四門遣尚書大夫趙並使勞北邊還言五原北假膏壤殖穀異時常置田官乃以並為田禾將軍發戍卒屯田北假以助軍糧是時諸將在邊須大眾集吏士放縱而內郡愁於徵發民棄城郭流亡為盜賊并州平州尤甚莽令七公六卿號皆兼稱將軍遣著武將軍逯並等填名都中郎將繡衣執法各五十五人分填緣邊大郡督大姦猾擅弄兵者皆便為姦於外撓亂州郡貨賂為市侵漁百姓莽下書曰虜知罪當夷滅故遣猛將分十二部將同時出一舉而決絕之矣內置司命軍正外設軍監十有二人誠欲以司不奉命令軍人咸正也今則不然各為權勢恐猲良民妄封人頸得錢者去毒蠚並作農民離散司監若此可謂稱不自今以來敢犯此者輒捕繫以名聞然猶放縱自若而藺苞戴級到塞下招誘單于弟咸咸子登入塞脅拜咸為孝單于賜黃金千斤錦繡甚多遣去將登至長安拜為順單于留邸太師王舜自莽篡位後病悸寖劇死莽曰昔齊太公以淑德累世為周氏太師蓋予之所監也其以舜子延襲父爵為安新公延弟襃新侯匡為太師將軍永為新室輔為太子置師友各四人秩以大夫以故大司徒馬宮為師疑故少府宗伯鳳為傅丞博士袁聖為阿輔京兆尹王嘉為保拂是為四師故尚書令唐林為胥附博士李充為犇走諫大夫趙襄為先後中郎將廉丹為禦侮是為四友又置師友祭酒及侍中諫議六經祭酒各一人凡九祭酒秩上卿琅邪左咸為講春秋潁川滿昌為講詩長安國由為講易平陽唐昌為講書沛郡陳咸為講禮崔發為講樂祭酒遣謁者持安車印綬即拜楚國龔勝為太子師友祭酒勝不應徵不食而死寧始將軍姚恂免侍中崇祿侯孔永為寧始將軍是歲池陽縣有小人景長尺餘或乘車馬或步行操持萬物小大各相稱三日止瀕河郡蝗生河決魏郡泛清河以東數郡先是莽恐河決為元城冢墓害及決東去元城不憂水故遂不隄塞四年二月赦天下夏赤氣出東南竟天厭難將軍陳欽言捕虜生口虜犯邊者皆孝單于咸子角所為莽怒斬其子登於長安以視諸蠻夷大司馬甄邯死寧始將軍孔永, WYG: ''}
