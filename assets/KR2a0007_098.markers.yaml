  - {type: variant, offset: 6985, length: 1, content: 洛, WYG: 卜相為最吉廼風公卿奏請立嬰為孺子師古曰風讀曰諷令宰衡安漢公莽踐阼居攝如周公傅成王故事太后不以為可力不能禁於是莽遂為攝皇帝改元稱制焉俄而宗室安衆侯劉崇及東郡太守翟義等惡之更舉兵欲誅莽師古曰更音工衡反太后聞之曰人心不相逺也師古曰言所見者同我雖婦人亦知莽必以是自危不可其後莽遂以符命自立為真皇帝先奉諸符瑞以白太后太后大驚初漢髙祖入咸}
