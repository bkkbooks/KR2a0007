  - {type: variant, offset: 6817, length: 1, content: 贅, WYG: 治室第第中起土山立兩市殿上赤墀戸青𤨏逰觀射獵使奴從者被甲持弓弩陳為歩兵止宿離宫水衡共張師古曰共音居用反張音竹亮反發民治道百姓苦其役内懐姦邪欲筦朝政師古曰筦與管同推親近吏主簿張業以為尚書蔽上壅下内塞王路外交藩臣驕奢僭上壞亂制度案根骨肉至親社稷大臣師古曰至親謂於成帝為舅先帝棄天下根不悲哀思慕山陵未成公聘取故掖庭女樂五官殷嚴王飛君等如淳曰五官官名也外戚𫝊曰五官視三百石置酒歌舞捐忘先帝厚恩背臣子義及根兄子成都}
