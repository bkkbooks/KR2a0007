  - {type: variant, offset: 10395, length: 1164, content: 年功業不效司空之職尤獨廢頓至乃有地震之變願乞骸骨莽曰夫地有動有震震者有害動者不害春秋記地震易繫坤動動靜辟脅萬物生焉災異之變各有云為天地動威以戒予躬公何辜焉而乞骸骨非所以助予者也使諸吏散騎司祿大衛脩寧男遵諭予意焉五月莽下吏祿制度曰予遭陽九之阸百六之會國用不足民人騷動自公卿以下一月之祿十繌布二匹或帛一匹予每念之未嘗不戚焉今阸會已度府帑雖未能充略頗稍給其以六月朔庚寅始賦吏祿皆如制度四輔公卿大夫士下至輿僚凡十五等僚祿一歲六十六斛稍以差增上至四輔而為萬斛云莽又曰普天之下莫非王土率土之賓莫非王臣蓋以天下養焉周禮膳羞百有二十品今諸侯各食其同國則辟任附城食其邑公卿大夫元士食其采多少之差咸有條品歲豐穰則充其禮有災害則有所損與百姓同憂喜也其用上計時通計天下幸無災害者太官膳羞備其品矣即災害以什率多少而損膳焉東嶽太師立國將軍保東方三州一部二十五郡南嶽太傅前將軍保南方二州一部二十五郡西嶽國師寧始將軍保西方一州二部二十五郡北嶽國將衛將軍保北方二州一部二十五郡大司馬保納卿言卿仕卿作卿京尉扶尉兆隊右隊中部左洎前七部大司徒保樂卿典卿宗卿秩卿翼尉光尉左隊前隊中部右部有五郡大司空保予卿虞卿共卿工卿師尉列尉祈隊後隊中部洎後十郡及六司六卿皆隨所屬之公保其災害亦以十率多少而損其祿郎從官中都官吏食祿都內之委者以太官膳羞備損而為節諸侯辟任附城群吏亦各保其災害幾上下同心勸進農業安元元焉莽之制度煩碎如此課計不可理吏終不得祿各因官職為姦受取賕賂以自共給是月戊辰長平館西岸崩邕涇水不流毀而北行遣大司空王邑行視還奏狀群臣上壽以為河圖所謂以土填水匈奴滅亡之祥也乃遣并州牧宋游擊都尉任萌等將兵擊匈奴至邊止屯七月辛酉霸城門災民間所謂青門也戊子晦日有食之大赦天下復令公卿大夫諸侯二千石舉四行各一人大司馬陳茂以日食免武建伯尤為大司馬十月戊辰王路朱鳥門鳴晝夜不絕崔發等曰虞帝闢四門通四聰門鳴者明當修先聖之禮招四方之士也於是令群臣皆賀所舉四行從朱鳥門入而對策焉平蠻將軍馮茂擊句町士卒疾疫死者什六七賦斂民財什取五益州虛耗而不克徵還下獄死更遣寧始將軍廉丹與庸部牧史熊擊句町頗斬首有勝莽徵丹熊丹熊願益調度必克乃還復大賦斂就都大尹馮英不肯給上言自越巂遂久仇牛同亭邪豆之屬反畔以來積且十年郡縣距擊不已續用馮茂苟施一切之政僰道以南山險高深茂多敺眾遠居費以億計吏士離毒氣死者什七今丹熊懼於自詭期會調發諸郡兵穀復訾民取其十四空破梁州功終不遂宜罷兵屯田明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英為長沙連率翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病是歲遣大使五威將王駿西域都護李崇將戊己校尉出西域諸國皆郊迎貢獻焉諸國前殺都護但欽駿欲襲之命佐帥何封戊己校尉郭欽別將焉耆詐降伏兵擊駿等皆死欽封後到襲擊老弱從車師還入塞莽拜欽為填外將軍封劋胡子何封為集胡男西域自此絕, WYG: 考證}
