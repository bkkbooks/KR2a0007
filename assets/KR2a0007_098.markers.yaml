  - {type: variant, offset: 2064, length: 203, content: 象予復親受金策於漢高皇帝之靈惟思襃厚前代何有忘時漢氏祖宗有七以禮立廟于定安國其園寢廟在京師者勿罷祠薦如故予以秋九月親入漢氏高元成平之廟諸劉更屬籍京兆大尹勿解其復各終厥身州牧數存問勿令有侵冤又曰予前在大麓至于攝假深惟漢氏三七之阸赤德氣盡思索廣求所以輔劉延期之術靡所不用以故作金刀之利幾以濟之然自孔子作春秋以為後王法至于哀之十四而一代畢協之於今亦哀之十四也赤世計盡終不可強濟皇天明威黃德當興隆顯大命屬予以天下今, WYG: 欲反}
