  - {type: variant, offset: 3625, length: 0, content: '', WYG: 長安至杜陵也李説為是土山漸臺西白虎師古曰皆放效天子之制也宋祁曰浙本西字下有象字其奢侈如此然皆通敏人事好士養賢傾財施予以相髙尚鳳輔政凡十一嵗陽朔三年秋鳳病天子數自臨問親執其手涕泣曰將軍病如有不可言平阿侯譚次將軍矣師古曰不可言謂死也不欲斥言之鳳頓首泣曰譚等雖與臣至親行皆奢僭無以率導百姓不如御史大夫音謹敕師古曰敕整也臣敢以死保之及鳳且死上疏謝上復固薦音自代言譚等五人必不可用天子然之初譚倨不肯事鳳師古曰倨慢也音㩀而音敬鳳卑恭如子故薦之鳳薨天子臨弔贈寵送以輕車介士軍陳自長安至渭陵諡曰敬成侯子襄嗣侯為衛尉御史大夫音竟代鳳為大司馬車騎將軍而平阿侯譚位特進領城門兵谷永說譚令讓不受城門職由是與音不平語在永𫝊音既以從舅越親用事小心親職嵗餘上下詔曰車騎將軍音宿衛忠正勤勞國家前為御史大夫以外親宜典兵馬入為將軍不獲宰相之封朕甚慊焉其封音為安陽侯食邑與五侯等俱三千户初成都侯商甞病欲避暑從上借眀光宫師古曰黄圗云明光宫在城内近桂宫也後又穿長安城引内灃水注第中大陂以行舩立羽葢張周帷輯濯越歌師古曰輯與楫同濯與櫂同皆所以行船也令執楫櫂人為越歌也楫謂櫂之短者也今吳越之人呼為橈音饒越歌為越之歌上幸商第見穿城引水}
