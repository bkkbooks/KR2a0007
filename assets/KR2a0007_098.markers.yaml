  - {type: variant, offset: 420, length: 0, content: '', WYG: 大將軍領尚書事益封五千戸王氏之興自鳳始又封太后同母弟崇為安成侯食邑萬户鳳庶弟譚等皆賜爵闗内侯食邑其夏黄霧四塞終日師古曰塞滿也言四方皆滿天子以問諫大夫楊興博士駟勝等對皆以為隂盛侵陽之氣也髙祖之約也非功臣不侯今太后諸弟皆以無功為侯非髙祖之約外戚未曽有也故天為見異言事者多以為然鳳於是懼上書辭謝曰陛下即位思慕諒闇師古曰商書云髙宗諒闇諒信也闇黙也言居父喪信黙三年不言也故詔臣鳳典領尚書事上無以明聖徳下無以益政治今有茀星天地赤黄之異師古曰茀與孛同咎在臣鳳當伏顯戮以謝天下今諒闇已畢大義皆舉宜躬親萬機以}
