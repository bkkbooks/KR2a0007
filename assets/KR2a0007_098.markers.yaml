  - {type: variant, offset: 639, length: 6, content: 語常在四壁中, WYG: 相對涕泣而决京兆尹王章素剛直敢言以為鳳建遣共王之國非是師古曰建立其議也廼奏封事言日蝕之咎矣天子召見章延問以事章對曰天道聰眀佑善而災惡以瑞異為符效今陛下以未有繼嗣引近定陶王師古曰近音巨靳反所以承宗廟重社稷上順天心下安百姓此正義善事當有祥瑞何故致災異災異之發為大臣顓政者也今聞大將軍猥歸日蝕之咎於定陶王師古曰猥猶曲也建遣之國茍欲使天子孤立於上顓擅朝事以便其私非忠臣也且日蝕陰侵陽臣顓君之咎今政事大小皆自鳳出天子曽不壹舉手鳳不内省責宋祁曰省字上當有自字反歸咎善人推逺定陶王師古曰逺音于萬反且鳳誣罔不忠非一事也前丞相樂昌侯商師古曰王商也本以先帝外屬内行篤有威重位歴將相國家柱石臣也其人守正不肯詘節随鳳委曲卒用閨門之事為鳳所罷身以憂死衆庶愍之又鳳知其小婦弟張羙人已甞適人師古曰小婦妾也弟謂女弟即妺也於禮不宜配御}
