  - {type: variant, offset: 3337, length: 285, content: 神石十二以銅符帛圖申命之瑞寖以顯著至于十二以昭告新皇帝皇帝深惟上天之威不可不畏故去攝號猶尚稱假改元為初始欲以承塞天命克厭上帝之心然非皇天所以鄭重降符命之意故是日天復決以勉書又侍郎王盱見人衣白布單衣赤繢方領冠小冠立于王路殿前謂盱曰今日天同色以天下人民屬皇帝盱怪之行十餘步人忽不見至丙寅暮漢氏高廟有金匱圖策高帝承天命以國傳新皇帝明旦宗伯忠孝侯劉宏以聞乃召公卿議未決而大神石人談曰趣新皇帝之高廟受命毋留於是新皇帝立登車之漢氏高廟受命受命之日丁卯也丁火漢氏之德也卯劉姓所以為字也明漢劉火德盡而傳於新室也皇帝謙謙既備固讓十二符應迫著命不可辭懼然祗畏葦然閔漢氏之終不可濟斖斖在左右之, WYG: 作第宅}
  - {type: variant, offset: 3337, length: 285, content: 神石十二以銅符帛圖申命之瑞寖以顯著至于十二以昭告新皇帝皇帝深惟上天之威不可不畏故去攝號猶尚稱假改元為初始欲以承塞天命克厭上帝之心然非皇天所以鄭重降符命之意故是日天復決以勉書又侍郎王盱見人衣白布單衣赤繢方領冠小冠立于王路殿前謂盱曰今日天同色以天下人民屬皇帝盱怪之行十餘步人忽不見至丙寅暮漢氏高廟有金匱圖策高帝承天命以國傳新皇帝明旦宗伯忠孝侯劉宏以聞乃召公卿議未決而大神石人談曰趣新皇帝之高廟受命毋留於是新皇帝立登車之漢氏高廟受命受命之日丁卯也丁火漢氏之德也卯劉姓所以為字也明漢劉火德盡而傳於新室也皇帝謙謙既備固讓十二符應迫著命不可辭懼然祗畏葦然閔漢氏之終不可濟斖斖在左右之, krp: 作第宅}
