  - {type: variant, offset: 4016, length: 408, content: 者妨寶貨之道也驕奢踰制者兇害之端也漏泄省中及尚書事者機事不密則害成也拜爵王庭謝恩私門者祿去公室政從亡矣凡此六條國之綱紀是用建爾作司命柔亦不茹剛亦不吐不侮鰥寡不畏強圉帝命帥繇統睦于朝命說符侯崔發曰重門擊𣔳以待暴客女作五威中城將軍中德既成天下說符命明威侯王級曰繞霤之固南當荊楚女作五威前關將軍振武奮衛明威于前命尉睦侯王嘉曰羊頭之阸北當燕趙女作五威後關將軍壼口捶扼尉睦于後命掌威侯王奇曰肴黽之險東當鄭衛女作五威左關將軍函谷批難掌威于左命懷羌子王福曰洴隴之阻西當戎狄女作五威右關將軍成固據守懷羌于右又遣諫大夫五十人分鑄錢於郡國是歲長安狂女子碧呼道中曰高皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之治者掌寇大夫陳成自免去官真定劉都等謀舉兵發覺皆誅真定常山大雨雹二年二月赦天下五威將帥七十二人還奏事漢諸侯王為公者悉上璽綬為民無違命者封將為子帥為男初設六筦之令命縣官酤酒賣鹽鐵器鑄錢諸采取名山大澤眾物者稅之又令市官收賤賣貴賖貸予民收息, WYG: ''}
