  - {type: variant, offset: 4887, length: 336, content: 子故不賜姓改定安太后號曰黃皇室主絕之於漢也冬十二月雷更名匈奴單于曰降奴服于莽曰降奴服于知威侮五行背畔四條侵犯西域延及邊垂為元元害辠當夷滅命遣立國將軍孫建等凡十二將十道並出共行皇天之威罰于知之身惟知先祖故呼韓邪單于稽侯狦累世忠孝保塞守徼不忍以一知之罪滅稽侯狦之世今分匈奴國土人民以為十五立稽侯狦子孫十五人為單于遣中郎將藺苞戴級馳之塞下召拜當為單于者諸匈奴人當坐虜知之法者皆赦除之遣五威將軍苗訢虎賁將軍王況出五原厭難將軍陳欽震狄將軍王巡出雲中振武將軍王嘉平狄將軍王萌出代郡相威將軍李棽鎮遠將軍李翁出西河誅貉將軍陽俊討穢將軍嚴尤出漁陽奮武將軍王駿定胡將軍王晏出張掖及偏裨以下百八十人募天下囚徒丁男甲卒三十萬人轉眾郡委輸五大夫衣裘兵器糧食長吏送自負海江淮至北邊使者馳傳督趣以軍興法, WYG: ''}
