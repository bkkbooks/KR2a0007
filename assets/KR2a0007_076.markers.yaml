  - {type: variant, offset: 1553, length: 4, content: 訟商忠直, WYG: 責問因貰其罪把其宿負師古曰貰緩也把執持也音布馬反令致諸偷以自贖師古曰致至也引至於官府偷長曰今一旦召詣府恐諸偷驚駭願壹切受署師古曰自言願權補吏職也敞皆以為吏遣歸休置酒小偷悉来賀且飲醉偷長以赭汙其衣􅅂師古曰赭赤土也吏坐里閭閲出者師古曰閭謂里之門也汙赭輙收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市}
  - {type: page-break, offset: 1553, content: '', id: KR2a0007_WYG_076-22a, image: WYG0250/WYG0250-0584a.png}
  - {type: variant, offset: 1553, length: 4, content: 訟商忠直, krp: 責問因貰其罪把其宿負師古曰貰緩也把執持也音布馬反令致諸偷以自贖師古曰致至也引至於官府偷長曰今一旦召詣府恐諸偷驚駭願壹切受署師古曰自言願權補吏職也敞皆以為吏遣歸休置酒小偷悉来賀且飲醉偷長以赭汙其衣𥚑師古曰赭赤土也吏坐里閭閲出者師古曰閭謂里之門也汙赭輙收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市}
  - {type: variant, offset: 1558, length: 1, content: 罪, WYG: 偷盗師古曰枹擊鼓椎也音桴其字從木也天子嘉之敞為人敏疾賞罰分明見惡輙取時時越法縱舍有足大者如淳曰有可貴異而大之者也晉灼曰越法縱舍即足大者也師古曰晉説是也其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇師古曰浩大也穰盛也}
