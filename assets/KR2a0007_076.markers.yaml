  - {type: variant, offset: 2041, length: 5, content: 丹丹免冠謝, WYG: 以布為鼓故無聲王怒起入後宫尊亦直趨出就舍先是王數私出入驅馳國中與后姬家交通尊到官召勅廐長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之言相教不得後尊朝王王復延請登堂尊謂王曰尊来為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇師古曰顧念也負恃也安焉也宋祁曰浙本顧字}
