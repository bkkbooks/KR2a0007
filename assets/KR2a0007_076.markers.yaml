  - {type: variant, offset: 200, length: 345, content: 能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水群臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慚自恨失言明年商代匡衡為丞相益封千戶天子甚尊任之為人多質有威重長八尺餘身體鴻大容貌甚過絕人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣初大將軍鳳連昏楊肜為琅邪太守其郡有災害十四已上商部屬按問鳳以曉商曰災異天事非人力所為肜素善吏宜以為後商不聽竟奏免肜奏果寑不下鳳重以是怨商陰求其短使人, WYG: 由法度敞}
  - {type: variant, offset: 200, length: 345, content: 能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水群臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慚自恨失言明年商代匡衡為丞相益封千戶天子甚尊任之為人多質有威重長八尺餘身體鴻大容貌甚過絕人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣初大將軍鳳連昏楊肜為琅邪太守其郡有災害十四已上商部屬按問鳳以曉商曰災異天事非人力所為肜素善吏宜以為後商不聽竟奏免肜奏果寑不下鳳重以是怨商陰求其短使人, krp: 由法度敞}
