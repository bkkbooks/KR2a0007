  - {type: variant, offset: 27, length: 0, content: '', krp: 居為獄小吏曉習文法喜擊劒人莫能當師古曰喜許吏反是時大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬭變吏不能禁師古曰變亂也及翁歸為市吏莫敢犯者公廉不受餽師古曰餽亦饋字也宋祁曰受餽下有遺字注末也字可刪百賈畏之後去居家宋祁云浙本作家居㑹田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有}
