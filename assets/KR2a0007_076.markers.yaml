  - {type: variant, offset: 1935, length: 0, content: '', WYG: 上以問前將軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徵敞欲以為左馮翊㑹病卒敞所誅殺太原吏吏家怨敞随至杜陵刺殺敞中子璜敞三子官皆至都尉初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武武應曰馭黠馬者利其銜䇿梁國大都吏民凋敝且當以柱後惠文彈治之耳應劭曰柱後以鐵為柱今法冠}
