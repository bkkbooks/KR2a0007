  - {type: variant, offset: 1937, length: 1, content: 若, krp: 一名惠文冠晉灼曰漢注法冠也一號柱後惠文以纚褁鐵柱卷秦制執法服今御史服之謂之解廌一角今冠兩角以解廌為名耳師古曰晉説是也纚即今方目紗也纚音山爾反卷音去權反秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有迹亦能吏也敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也竦死敞無後王尊字子贛師古曰贛音貢涿郡髙陽人也少孤歸諸父使牧羊澤中宋祁曰當作少歸諸父諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數嵗給事太守府問詔書行事尊無不對師古曰以施行詔條問之皆曉其事太守竒之除補書佐署守屬監獄師古曰署為守屬令監獄主囚也監音工銜反久之尊稱病去事師郡文學官師古曰郡有文學官而尊事之以為師也治尚書論語略通大義復召署守屬治獄為郡決曹史數嵗以令舉幽州刺史從事如淳曰漢儀注刺史得擇所部二千石卒史與從事宋祁曰決曹史淳化夲無史字子按如注須得史字}
  - {type: variant, offset: 1939, length: 1, content: 器, WYG: 安止作決曹非是而太守察尊廉補遼西鹽官長如淳曰地理志遼西有鹽官數上書言便宜事事下丞相御史初元中舉直言遷虢令如淳曰本西虢也屬右扶風轉守槐里兼行羙陽令事春正月羙陽女子告假子不孝曰兒常以我為妻妬笞我宋祁曰妬當改作詬尊聞之遣吏收捕驗問辭服尊曰律無妻母之法聖}
