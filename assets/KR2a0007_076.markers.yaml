  - {type: variant, offset: 2711, length: 0, content: '', WYG: 閒焉斥逐奔楚師古曰閒音公莧反秦聼浸潤以誅良將魏信䜛言以逐賢守此皆偏聼不聰失人之患也臣等竊痛傷尊修身絜已砥節首公師古曰砥厲也首向也砥音指首音式救反刺譏不憚將相誅惡不避豪彊誅不制之賊宋祁曰浙本作討不制之賊解國家之憂功著職修威信不廢誠國家爪牙之吏宋祁曰江浙本只作誠國爪牙之吏折衝之臣今一旦無辜制於僥人之手宋祁曰一作仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聼張晏曰周禮三槐九棘公卿於下聼訟獨掩怨讎之偏奏被共工之大惡臣瓚曰共工官名堯時諸}
  - {type: page-break, offset: 2711, content: '', id: KR2a0007_WYG_076-36a, image: WYG0250/WYG0250-0591c.png}
