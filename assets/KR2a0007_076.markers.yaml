  - {type: variant, offset: 943, length: 1, content: 侍, WYG: 又循吏傳左馮翊有二百石卒史此之謂尤異也劉敞曰下言上名尚書調補縣令然則三輔尤異如此天子許之敞到膠東明設購賞開羣盗令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人師古曰調選也音徒釣反由是盗賊解散傳相捕斬吏民歙然師古曰歙音翕國}
