  - {type: variant, offset: 2700, length: 3, content: 曹親近, WYG: 本皆改作忠謂張忠也外為大言倨嫚姍上師古曰姍古訕字也音所諫反又音刪威信日廢不宜備位九卿尊坐免吏民多稱惜之湖三老公乗興等師古曰湖縣名也今虢州湖城縣取其名上書訟尊治京兆功效日著劉攽曰日當作曰著字衍劉敞説同往者南山盗賊阻山横行剽刼良民殺奉法吏道路不通城門至以警戒歩兵校尉使逐捕暴師露衆曠日煩費不能禽制二卿坐黜如淳曰三輔皆秩中二千石號為卿也即前京兆尹王昌貶為鴈門太守甄遵河内太守也羣盗寖彊吏氣傷沮師古曰寖益也沮壞也音才汝反流聞四方為國家憂當此之時有能捕斬不愛金爵重賞關内侯寛中使問所徵故司𨽻校尉王尊捕羣盗方略拜為諫大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士師古曰下音胡嫁反厲奔北之吏起沮傷之氣二旬之閒大黨震壞渠率效首師古曰效致也斬其首而致之也賊亂蠲除民反農業拊循貧弱鉏耘豪強長安宿豪大猾東市賈萬城西萬章翦張禁酒趙放蘇林曰萬音矩晉灼曰翦張禁酒趙放此二人作翦作酒之家宋祁曰翦張禁江南本浙本並作箭張禁予按注意正文當依校本作箭張禁注中悉作箭乃安杜陵楊章等皆通邪結黨挟養姦軌上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二年莫能禽討師古曰更歴也音工衡反宋祁曰今越本無討字尊以正法案誅皆伏其辜姦邪銷釋吏民說服師古曰釋解也音懌説讀曰悦宋祁曰正文與注釋當作繹尊撥劇整亂誅暴禁邪皆前所稀有宋祁曰當作皆前世所稀有名將所不及雖拜為真未有殊絶褒賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書之意宋祁曰一本改承作以靖言庸違宋祁曰浙本作庸韋注云韋違也象龔滔天師古曰引虞書堯典之辭也靖治也庸用也違僻也滔漫也謂其言假託於治實用違僻貌象恭敬過惡漫天也漫音莫干反一曰滔漫也原其所以出御史丞楊輔宋祁曰浙本作出於御史故為尊書佐素行隂賊惡口不信師古曰謂其口惡而心不信也好以刀筆䧟人於法輔常醉過尊大奴利家利家捽搏其頬師古曰捽持頭也音才兀反搏擊也兄子閎㧞刀欲剄之宋祁曰剄一本作刺輔以故深怨疾毒欲傷害尊疑輔内懐怨恨外依公事建畫為此議宋祁曰浙本無為字傅致奏文師古曰建立謀畫此議也傅讀曰附謂益其事而引致於罪狀浸潤加誣以復私怨師古曰浸潤猶漸染也復報也昔白起為秦將東破韓魏南㧞郢都應侯譖之賜死杜郵師古曰應侯范雎也杜郵地名}
