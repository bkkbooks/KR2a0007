  - {type: variant, offset: 1336, length: 207, content: 以德輔翼國家典領百寮協和萬國為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謀而有不忠執左道之辜陷于大辟前商女弟內行不修奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬商免相三日發病敺血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏商罪過未決請除國邑有詔長子安嗣爵為樂昌侯至長樂衛尉光祿勳商死後連年日蝕地震直臣, WYG: 敞守}
