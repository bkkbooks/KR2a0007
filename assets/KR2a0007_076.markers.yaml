  - {type: variant, offset: 2091, length: 184, content: 乃解丹之輔相皆此類也竟寧元年上寑疾傅昭儀及定陶王常在左右而皇后太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衛尉侍中與皇后太子皆憂不知所出丹以親密臣得侍視疾候上間獨寢時丹直入臥內頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣, WYG: 妾}
