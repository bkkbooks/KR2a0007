  - {type: variant, offset: 92, length: 0, content: '', WYG: 訟者宗族傳相責譲此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭師古曰移猶傳也一説兄以譲弟弟又譲之故云相移延夀大喜開閤延見内酒肉與相對飲食厲勉以意告鄉部有以表勸悔過從善之民師古曰以其悔過從善故令表顯以示勸勵延夀乃起聼事勞謝令丞以下引見尉薦郡中歙然莫不傳相勅厲不敢犯延夀恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿師古曰紿誑也延夀代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延夀在東郡時放散官錢千餘萬望之與丞相丙吉議吉以為更大赦不須考師古曰更音工衡反㑹御史當問事東郡宋祁曰越本景祐本無事字望之因令并問之師古曰望之以延夀代已為馮翊而有能名出已之上故忌害之欲䧟以罪法延夀聞知即部吏案校望之在馮翊時廪犧官錢放散百餘萬廪犧吏掠治急自引與望之為姦延夀劾奏移殿門禁止望之望之自奏職在總領天下聞事不敢不問而為延壽所拘持上由是不直延夀各令窮竟所考望之卒無事寔而望之遣御史案東郡具得其事延夀在東郡時試騎士師古曰每嵗大試也治飾兵車畫龍虎朱爵延夀衣黄紈方領晉灼曰以黄色素作直領也師古曰衣音於旣反駕四馬傅總建幢棨李竒曰㦸也晉灼曰傅著也總以緹繒飾鑣鎋也建立也幢旌幢也師古曰幢麾也棨有衣之㦸也其衣以赤黑繒為之幢音大江反棨音啟植羽葆師古曰植亦立也羽葆聚翟尾為之亦今纛之類也植音常職反宋祁曰注文今字下疑有叢字鼓車歌車孟康曰如今郊駕時車上鼔吹也師古曰郊駕郊祀時備法駕也功曹引車皆駕四馬載棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂師古曰旁音歩浪反歌者先居射室李竒曰都試射堂也望見延夀車噭咷楚歌服䖍曰噭音呌呼之呌咷音滌濯之滌師古曰咷音它釣反延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後師古曰鞬弓衣也音居言反令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣如淳曰籣盛弩箭箙也師古曰鞮鞪即兠鍪也籣盛弩矢者也其形如木桶鞮音丁奚反鞪音莫侯反又使騎士戲車弄馬盗驂孟康曰戲車弄馬之枝也馳盗解驂馬御者不見也延夀又取官銅物候月蝕鑄作刀劒鈎鐔放效尚方事師古曰鈎亦兵器也似劒而曲所以鈎殺人也鐔劒喉也又曰鐔似劒而小陿鐔音滛又音尋及取官錢帛私假繇使吏師古曰假謂顧賃也繇讀與徭同宋祁曰繇字下疑有役字及治飾車甲三百萬以上於是望之劾奏延夀上僭不道又自陳前為延夀所奏今復舉延夀罪衆庶皆以臣懐不正之心侵寃延夀願下丞相中二千石博士議其罪事下公卿皆以延夀前旣無状後復誣愬典法}
