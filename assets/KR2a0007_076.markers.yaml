  - {type: variant, offset: 940, length: 0, content: '', WYG: 敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉師古曰衰音初為反大夫田完有功於齊皆疇其庸宋祁曰疇其庸浙本作疇其軍邑邵本作官爵按宣紀疇其爵邑張晏注云律非始封十減}
  - {type: variant, offset: 940, length: 0, content: '', krp: 敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉師古曰衰音初為反大夫田完有功於齊皆疇其庸宋祁曰疇其庸浙本作疇其軍邑邵本作官爵按宣紀疇其爵邑張晏注云律非始封十減}
  - {type: variant, offset: 941, length: 0, content: '', WYG: 疇者等也言不復減也延及子孫終後田氏篡齊趙氏分晉季氏顓魯師古曰顓與専同下皆類此故仲尼作春秋迹盛衰師古曰著盛衰之迹譏世卿最甚廼者大将軍决大計安宗廟定天下功亦不細矣夫周公七年耳而大将軍二十嵗海内之命斷於掌握方其隆時感動天地侵廹隂陽月朓日蝕晝㝠宵光師古曰㝠闇也宵夜也朓音他了反地大震裂火生地中天文失度祅祥變怪不可勝記皆隂類盛長臣下顓制之所生也朝臣宜有明言曰陛下襃寵故大将軍以報功德足矣閒者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就第及衞将軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聼羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲師古曰言朝臣不進直言以陳其事而令明詔自親其文非䇿之得者也師古曰言失計也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也宋祁曰危字疑作疑字臣敞願於廣朝白發其端直守逺郡其路無由師古曰直讀曰值夫心之精微口不能言也言之微眇書不能文也師古曰眇細也故伊尹五就桀五就湯師古曰孟子云五就湯五就桀者伊尹也言伊尹為湯臣見貢扵桀桀不用而湯復貢之如此者五也蕭相國薦淮隂累嵗乃得通况乎}
