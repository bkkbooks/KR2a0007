  - {type: variant, offset: 2716, length: 0, content: '', krp: 博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靖言庸違宋祁曰違當依前注改作韋放殛之刑也師古曰殛誅也音居力反審如御史章尊乃當伏觀闕之誅張晏曰孔子誅少正卯於兩觀之間放於無人之域不得苟免師古曰非止合免官而已也及任舉尊者當獲選舉之辜宋祁曰一作皆當獲選舉之辜不可但已師古曰但徒也空也已止也不可空然而止也即不如章飾文深詆以愬無罪師古曰詆毁也亦宜有誅以懲讒賊之口絶詐欺之路師古曰懲創也唯明主參詳使白黑分别書奏天子復以尊為徐州刺史遷東郡太守久之河水盛溢泛浸瓠子金隄老弱奔走恐水大決為害尊躬率吏民投沈白馬師古曰以祭水也祀水神河伯尊親執圭璧使巫䇿祝請以身填金隄師古曰填塞也音大賢反因止宿廬居隄上吏民數千萬人爭叩頭救止尊宋祁曰邵夲無尊字尊終不肯去及水盛隄壞吏民皆奔走唯一主簿泣在尊旁立不動宋祁曰立字上疑有尊字而水波稍却廻還吏民嘉壯尊之勇節白馬三老朱英等奏其狀宋祁曰浙本英作莫下有司考皆如言於是制詔御史東郡河水盛長毁壞金隄未決三尺百姓惶恐奔走太守身當水衝履咫尺之難不避危殆以安衆心吏民復還就作水不為災朕甚嘉之秩尊中}
