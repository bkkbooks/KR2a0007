  - {type: variant, offset: 998, length: 153, content: 為妻陰知其有身而獻之王產始皇帝及楚相春申君亦見王無子心利楚國即獻有身妻而產懷王自漢興幾遭呂霍之患今商有不仁之性乃因怨以內女其姦謀未可測度前孝景世七國反將軍周亞夫以為即得雒陽劇孟關東非漢之有今商宗族權勢合貲鉅萬計私奴以千數非特劇孟匹夫之徒也且失道之至親戚畔之閨門內亂父子相訐而欲使之宣明聖化調和海內豈不謬哉商, WYG: 治行第一入守京兆尹霸}
