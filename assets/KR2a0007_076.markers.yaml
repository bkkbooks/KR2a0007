  - {type: variant, offset: 3600, length: 9, content: 賞哀平際會禍福速哉, krp: 名也三老髙帝置孝弟力田髙后置所以勸導鄉里助成教化也張敞傳山陽郡戸九萬三千口五十萬以上臣召南按地理志山陽郡戸十七萬二千八百四十七口八十萬一千二百八十八與此文大相懸殊盖元始中戸口十倍於宣帝時矣臣前幸得備位列卿待罪京兆胡三省曰西都之制為三輔者列於九卿王尊傳上行幸雍過虢劉攽曰虢字是史氏誤臣召南按顧炎武亦駁此文云今鳳翔縣古之雍城而虢在陕幸雍何以得過虢當是過羙陽之誤按攽及炎武並疑虢地在陕幸雍不當東行而不知右扶風自有虢縣也据地理志雍虢羙陽三縣並屬右扶風虢縣故城在今鳳翔府城南三十五里雍縣即今鳳翔府治漢帝西幸雍必過虢道里甚明何乃疑周之虢國東在𢎞農者乎夫漢時於周虢國地置陕縣屬𢎞農郡固不云虢縣也本文不誤白馬三老朱英等地理志東郡有白馬縣今滑縣也前漢書卷七十六考證}
