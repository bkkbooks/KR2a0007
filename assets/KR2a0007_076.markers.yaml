  - {type: variant, offset: 1726, length: 0, content: '', krp: 敞出為刺史時望之為大行丞後望之先至御史大夫定國後至丞相敞終不過郡守為京兆九嵗坐與光禄勲楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免師古曰比例也音必寐反而敞奏獨寝不下師古曰天子惜敞故留所奏事不出敞使賊捕掾絮舜有所案驗李竒曰絮音挐師古曰賊捕掾主捕賊者也絮姓也音女居反又音人餘反舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事宋祁曰當添作安能為後案事敞聞舜語即部吏收舜繫獄是時冬月未盡數日案事吏晝夜驗治舜竟致其死事舜當出死宋祁曰當添為舜臨當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎師古曰言汝不欲望延命乎乃棄舜市㑹立春行寃獄使者出師古曰行音下更反舜家載尸并編敞教師古曰編聨也聨之於章前也自言使者使者奏敞賊殺不辜天子薄其罪師古曰以其事為輕小也欲令敞得自便利師古曰從輕法以免也便音頻面反即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命師古曰不還其本縣邑也数月京師吏民解弛師古曰弛放也音式爾反枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞師古曰就其所居處而召之敞身被重劾師古曰謂前有賊殺不辜之事及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者来此天子欲用我也即装隨使者詣公車上書曰宋祁曰當添為上書謝曰臣前幸得備位列卿待罪京兆宋祁曰當作京兆尹坐殺賊捕掾絮舜舜本臣敞素所厚吏數蒙恩貸師古曰貸音土帶反以臣有章劾當免受記考事師古曰記書也若今之州縣為符教也便歸卧家謂臣五日京兆背恩忘義傷化薄俗宋祁曰一本作傷薄俗化臣竊以舜無狀枉法以誅之臣敞賊殺無辜鞠獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史敞起亡命復奉使典州既到部而廣川王國羣軰不道賊連發不得敞以耳目發起賊主名區處師古曰區謂居止之所也誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐師古曰言容止賊盗若嚢橐之盛物也吏逐捕窮窘蹤迹皆入王宫敞自將郡國吏車數百兩師古曰一乗車為兩也圍守王宫捜索調等果得之殿屋重轑中蘇林曰轑椽也重轑重棼中師古曰重棼即今廊舍也一邉虚為兩夏者也轑音老棼音扶分反宋祁曰殿屋一無屋字敞傅吏皆捕格斷頭師古曰傅讀曰附言敞自監䕶吏而捕之縣其頭王宫門外因劾奏廣川王天子不忍致法削其戸敞居部嵗餘冀州盗賊禁止守太原太守宋祁曰當作徙守太原滿嵗為真太原郡清宋祁曰當作郡清靜頃之宣}
