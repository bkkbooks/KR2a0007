  - {type: variant, offset: 941, length: 0, content: '', krp: 疇者等也言不復減也延及子孫終後田氏篡齊趙氏分晉季氏顓魯師古曰顓與専同下皆類此故仲尼作春秋迹盛衰師古曰著盛衰之迹譏世卿最甚廼者大将軍决大計安宗廟定天下功亦不細矣夫周公七年耳而大将軍二十嵗海内之命斷於掌握方其隆時感動天地侵廹隂陽月朓日蝕晝㝠宵光師古曰㝠闇也宵夜也朓音他了反地大震裂火生地中天文失度祅祥變怪不可勝記皆隂類盛長臣下顓制之所生也朝臣宜有明言曰陛下襃寵故大将軍以報功德足矣閒者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就第及衞将軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聼羣臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲師古曰言朝臣不進直言以陳其事而令明詔自親其文非䇿之得者也師古曰言失計也今兩侯以出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也宋祁曰危字疑作疑字臣敞願於廣朝白發其端直守逺郡其路無由師古曰直讀曰值夫心之精微口不能言也言之微眇書不能文也師古曰眇細也故伊尹五就桀五就湯師古曰孟子云五就湯五就桀者伊尹也言伊尹為湯臣見貢扵桀桀不用而湯復貢之如此者五也蕭相國薦淮隂累嵗乃得通况乎}
  - {type: variant, offset: 942, length: 0, content: '', WYG: 里之外因書文諭事指哉唯陛下省察上甚善其計然不徵也久之勃海膠東盗賊並起敞上書自請治之曰臣聞忠孝之道退家則盡心於親進宦則竭力於君夫小國中君猶有奮不顧身之臣况於明天子乎今陛下逰意於太平勞精於政事亹亹不舍晝夜師古曰亹亹言勉強也舍息也亹音尾羣臣有司宜各竭力致身山陽郡户九萬三千口五十萬以上訖計盗賊未得者七十七人師古曰訖盡也它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡師古曰閒讀曰閑身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡嵗數不登師古曰年榖頻不熟也盗賊並起至攻官寺簒囚徒搜市朝劫列侯吏失綱紀姦􅁤不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀師古曰有業言各得其所書奏天子徵敞拜膠東相宋祁曰膠東景帝子康王寄之後賜黄金三十斤敞辭之官自謂治劇郡非賞罰無以勸善懲惡師古曰懲止也吏追捕有功效者願得壹切比三輔尤異如淳曰壹切權時也趙廣漢奏請令長安游徼獄史秩百}
