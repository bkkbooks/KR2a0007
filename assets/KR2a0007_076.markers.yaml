  - {type: variant, offset: 34, length: 4, content: 宣帝舅封, WYG: 為便可施行因與議定嫁娶喪祭儀品略依古禮不得過法延夀於是令文學校官諸生皮弁執俎豆師古曰校亦學也音效為吏民行䘮嫁娶禮百姓遵用其教賣偶車馬下里偽物者棄之市道張晏曰下里地下蒿里偽物也師古曰偶謂木土為之象真車馬之形也偶對也棄其物於市之道上也數年徙為東郡太守黄霸代延夀居潁川霸因其迹而大治延夀為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學宫師古曰學宮謂庠序之舍也春秋鄉社陳鐘鼓管弦盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期㑹為大事吏民敬畏趨鄉之師古曰趨讀曰趣郷讀曰嚮又置正五長師古曰正若今之郷正里正也伍長同伍之中置一人為長也相率以孝弟不得舍姦人師古曰舍止也閭里阡陌有非常吏輙聞知姦人莫敢入界其始若煩後吏}
