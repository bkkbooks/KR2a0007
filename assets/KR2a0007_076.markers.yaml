  - {type: variant, offset: 3596, length: 1, content: 蒙, WYG: 作斥土而張湯傳作方中地節三年七月中丞相傅婢云云通鑑考異曰盖傅婢死事已數年而廣漢追發其事也廣漢竟坐要斬通鑑考異曰廣漢死在元康元年本紀作二年誤也尹翁歸傳河東二十八縣臣召南按地理志河東郡統縣二十四自安邑至騏可數也此八字當是四字之誤案致其罪高至於死顧炎武曰髙謂罪名之上者猶言上刑矣少子岑歴位九卿至}
