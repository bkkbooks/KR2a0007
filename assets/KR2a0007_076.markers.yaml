  - {type: variant, offset: 2035, length: 0, content: '', krp: 師古曰城謂縣城也抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更}
  - {type: variant, offset: 2036, length: 1, content: 乎, WYG: 與為治師古曰更改也有如此者太守乃共為治者也明慎所職毋以身試法又出教勅掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢師古曰趣讀曰促夫羽翮不修則不可以致千里宋祁曰浙本無則字闑内不理無以整外師古曰闑門橛也音魚烈反府丞悉署吏行能分别白之賢為上宋祁曰當作以賢為上毋以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事已一月矣五官掾張輔懐虎狼之心貪汙不軌師古曰汚濁也不軌不修法制也一郡之錢盡入輔家然適足以葬矣今将輔送獄直符史詣閤下從太守受其事師古曰直符史若今之當直佐史也丞戒之戒之宋祁曰下戒之亦當作丞戒之相随入獄矣師古曰意丞教戒張輔令其避罪故以此言豫勅之輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盗賊分散入傍郡界豪彊多誅傷伏辜者坐殘賊免起家復為䕶羌将軍轉校尉師古曰為校尉主轉運事而屬䕶羌将軍䕶送軍糧委輸而羌人反絶轉道師古曰絶轉運之道兵數萬圍尊尊以千餘騎奔突羌賊功未列上師古曰未列上扵天子也坐擅離部署㑹赦免歸家涿郡太守徐明薦尊不宜久在閭巷}
