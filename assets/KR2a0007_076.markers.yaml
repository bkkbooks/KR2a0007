  - {type: variant, offset: 2872, length: 1, content: 傅, WYG: 見疑遂為鳳所陷罪至大逆語在元后傳初章為諸生學長安獨與妻居章疾病無被卧牛衣中師古曰牛衣編亂麻為之即今俗呼為龍具者與妻決涕泣師古曰自謂将死故辭決其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬如淳曰激厲抗揚之意也師古曰卬讀曰仰仰頭為健宋祁曰卬音昻為是乃反涕泣何鄙也後章仕宦宋祁曰一本仕宦作任官歴位及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時邪章曰非女子所知也書遂上果下廷尉獄妻子皆收繫章小女年可十二劉奉世曰云年可十二辭}
