  - {type: variant, offset: 31, length: 0, content: '', WYG: 事時其有所取也以一警百吏民皆服恐懼改行自新東海大豪郯許仲孫師古曰郯縣之豪姓許名仲孫為姦猾亂吏治郡中苦之二千石欲捕者輙以力埶變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東海大治以髙第入守右扶風滿歳為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海}
