  - {type: variant, offset: 22, length: 0, content: '', krp: 師古曰蠡音禮故屬河間師古曰言蠡吾舊屬河間後屬涿郡少為郡吏州從事以廉絜通敏下士為名師古曰敏謂材識捷疾也下音胡嫁反舉茂材平準令劉奉世曰材字下當有為字察廉為陽翟令以治行尤異遷京輔都尉守京兆尹㑹昭帝崩而新豐杜建為京兆掾䕶作平陵方上孟康曰壙臧上也師古曰方上在張湯傳宋祁曰注文方上字下當有解字建素豪俠賔客為姦利廣漢聞之先風告建不改師古曰風讀曰諷宋祁云建浙本作及於是收案致法師古曰致至也令至於罪罸之法中貴人豪長者為請無不至終無所聽師古曰中貴人居中朝而貴者也豪豪桀也長者有名德之人也服䖍曰内臣之貴幸者劉奉世曰顔解中貴人與李廣傳同服説不同當以服説為是宗族賔客謀欲篡取師古曰逆取曰篡廣漢盡知其計議主名起居師古曰起居謂居止之處及欲發起之狀使吏告曰若計如此且并滅家令數吏將建棄市莫敢近者京師稱之是時昌邑王徴即位行淫亂大將軍霍光與羣臣共廢王尊立宣帝廣漢以與議定䇿賜爵關内侯師古曰與讀曰豫遷潁川太守郡大姓原褚宗族横恣李竒曰原音元師古曰原褚二姓也原讀如本字横音胡孟反宋祁云原褚當作原氏禇氏賔客犯為盜賊前二千石莫能禽制廣漢旣至數月誅原褚首惡郡中震栗先是潁川豪桀大姓相與為婚姻吏俗朋黨廣漢患之厲使其中可用者受記服䖍曰受相訟牋記也師古曰擇其中可使者奬厲而使之出有案問旣得罪名行法罸之廣漢故漏泄其語令相怨咎師古曰遣知其事由某人發故結怨咎也又教吏為缿筩蘇林曰缿音項如瓶可受投書孟康曰筩竹筩也如今官受密事筩也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筩皆為此制而用受書令投於其中也筩音同及得投書削其主名而託以為豪桀大姓子弟所言其後彊宗大族家家結為仇讎姦黨散落風俗大改吏民相告訐師古曰面相斥曰訐音居乂反又音居謁反宋祁曰相告訐疑相字上有好字注文面相斥疑作告而相斥廣漢得以為耳目盜賊以故不發發又輙得壹切治理威名流聞師古曰言諸事皆治理也治音直吏反一切解在平紀及匈奴降者言匈奴中皆聞廣漢本始二年漢發五將軍擊匈奴徴廣漢宋祁云景本有遣字學官本云徵遣浙本無遣字祁按徴廣漢不當便云遣若已云遣下又言將兵屬蒲類意致繁複從浙本為長楊伯時云徵而遣之以屬蒲類何不可也以太守將兵屬蒲類將軍趙充國從軍還復用守京兆尹滿嵗為眞廣漢為二千石以和顔接士其尉薦待遇吏殷勤甚備如淳曰尉亦薦籍也師古曰尉薦謂安尉而薦逹之事推功善歸之於下曰某掾卿所為非二千石所及行之發於至誠吏見者皆輸寫心腹無所隱匿咸願為用僵仆無所避師古曰僵偃也仆頓也僵音畺仆音赴廣漢聰眀皆知其能之所宜盡力與否其或負者輙先聞知風諭不改乃收捕之師古曰風讀曰諷無所逃案之辠立具即時伏辜廣漢為人彊力天性精於吏職見吏民或夜不寝至旦尤善為鉤距以得事情蘇林曰鉤得其情使不得去也晉灼曰鉤致也距閉也使對者無疑若不問而自知衆莫覺所由以閉其術為距也師古曰晉説是也宋祁曰注文疑字下疑有示字鉤距者設欲知馬賈則先問狗師古曰賈讀曰價已問羊又問牛然後及馬參伍其賈以類相準則知馬之貴賤不失實矣唯廣漢至精能行之它人效者莫能及也宋祁曰越本無也字郡中盜賊閭里輕俠其根株窟穴所在及吏受取請求銖兩之姦皆知之長安少年數人㑹窮里空舍謀共劫人師古曰窮里里中之極隱處坐語未訖廣漢使吏捕治具服富人蘇回為郎二人劫之師古曰劫取其身為質令家將財物贖之有頃廣漢將吏到家自立庭下使長安丞龔奢叩堂戸曉賊師古曰曉謂諭告之曰京兆尹趙君謝兩卿無得殺質此宿衛臣也釋質束手得善相遇幸逢赦令或時解脫師古曰若束手自来雖合處牢獄當善處遇之或逄赦令則得免脱也脱音吐活反二人驚愕又素聞廣漢名即開户出下堂叩頭廣漢跪謝曰幸全活郎甚厚送獄勅吏謹遇給酒肉至冬當出死豫為調棺給斂葬具告語之師古曰調辦具之也棺斂以棺衣斂尸也調音徒釣反棺音工喚反斂音力贍反宋祁曰給字疑可刪皆曰死無所恨廣漢嘗記召湖都亭長師古曰為書記以召之若今之下符追呼人也湖都亭長西至界上界上亭長戲曰至府為我多謝問趙君師古曰多厚也言殷勤若今人言千萬問訊矣亭長旣至廣漢與語問事畢謂曰界上亭長寄聲謝我師古曰謝告也何以不為致問亭長叩頭服實有之廣漢因曰還為吾謝界上亭長勉思職事有以自效京兆不忘卿厚意其發姦擿伏如神皆此類也師古曰擿謂動發之也音它狄反廣漢奏請令長安游徼獄吏秩百石師古曰特増其秩以厲其行宋祁曰浙本作獄史其後百石吏皆差自重不敢枉法妄繫留人京兆政清吏民稱之不容口長老傳以為自漢興以来治京兆者莫能及楊伯時云言漢興足矣何必以来二字左馮翊右扶風皆治長安中師古曰治音直吏反犯法者從迹喜過京兆界師古曰從讀曰縱喜音許吏反廣漢歎曰亂吾治者常二輔也誠令廣漢得兼治之直差易耳初大將軍霍光秉政廣漢事光及光薨後廣漢心知微指師古曰識天子意也發長安吏自將與俱至光子博陸侯禹第直突入其門廋索私屠酤椎破盧罌斧斬其門關而去師古曰廋讀與搜同謂入室求之也盧所以居罌罌所以盛酒也盧解在食貨志司馬相如傳罌音扵耕反宋祁曰其門或無其字時光女為皇后聞之對帝涕泣帝心善之以召問廣漢廣漢由是侵犯貴戚大臣所居好用世吏子孫新進年少者師古曰言舊吏家子孫而其人後出求進又年少也宋祁曰注末也字疑是者字専厲彊壯蠭氣師古曰蠭與鋒同言鋒鋭之氣見事風生無所回避師古曰風生言其速疾不可當也回曲也率多果敢之計莫為持難廣漢終以此敗初廣漢客私酤酒長安市丞相史逐去宋祁云史越夲作吏去字下南本更有客字客疑男子蘇賢言之以語廣漢廣漢使長安丞案賢師古曰案致其罪也尉吏禹故劾賢為騎士屯霸上不詣屯所乏軍興文穎曰尉吏尉部吏也禹其名宋祁云吏越作史賢父上書訟罪告廣漢事下有司覆治禹坐要斬請逮捕廣漢有詔即訊師古曰令就問之不追入獄也辭服㑹赦貶秩一等廣漢疑其邑子榮畜教令師古曰蘇賢同邑之子也令音力成反後以他法論殺畜人上書言之事下丞相御史案驗甚急廣漢使所親信長安人為丞相府門卒令微司丞相門内不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妬殺之府舍而丞相奉齋酎入廟祠師古曰将酎祭宗廟而先絜齋也廣漢得此使中郎趙奉夀風曉丞相師古曰風讀曰諷欲以脅之毋令窮正已事丞相不聽案驗愈急宋祁曰不聽字上疑冇怒字廣漢欲告之先問太史知星氣者言今年當有戮死大臣廣漢即上書告丞相罪制曰下京兆尹治廣漢知事迫切遂自將吏卒突入丞相府召其夫人跪庭下受辭師古曰受其對辭也宋祁曰突字新夲添收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢廣漢數犯罪法不伏辜以詐巧迫脅臣相幸臣相寛不奏願下明使者治廣漢所驗臣相家事事下廷尉治罪實丞相自以過譴笞傅婢出至外第乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅斥除騎士乏軍興數罪師古曰斥除逐遣之天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧飬小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪彊小民得職師古曰得職各得其常所也宋祁曰使得牧飬越本無得字廣漢雖坐法誅景邵本去雖坐法誅字校本添百姓追思歌之至今尹翁歸字子兄師古曰兄讀曰況河東平陽人也}
