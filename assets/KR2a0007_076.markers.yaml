  - {type: variant, offset: 2448, length: 4, content: 鴻嘉元年, WYG: 守京兆尹後為真凡三嵗坐遇使者無禮司𨽻遣假佐放奉詔書白尊發吏捕人蘇林曰胡公漢官假佐取内郡善史書佐給諸府宋祁曰浙本注文給諸府字下有府有史故言佐也七字放謂尊詔書所捕宜密尊曰治所公正京兆善漏泄人事師古曰謂司𨽻官屬為治所者尊之也若今謂使人為尚書矣治音直吏反放曰所捕宜今發吏師古曰當即發也尊又曰詔書無京兆文不當發吏及長安繫者三月閒千人以}
