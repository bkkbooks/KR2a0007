  - {type: variant, offset: 39, length: 0, content: '', WYG: 追捕之苦民無箠楚之憂師古曰箠杖也楚荆木也即今之荆子也箠音止蘂反皆便安之接待下吏恩施甚厚而約誓明或欺負之者延夀痛自刻責豈其負之何以至此師古曰言豈我負之耶其人何以為此事吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言師古曰殊絶也以人救之}
  - {type: variant, offset: 39, length: 0, content: '', krp: 追捕之苦民無箠楚之憂師古曰箠杖也楚荆木也即今之荆子也箠音止蘂反皆便安之接待下吏恩施甚厚而約誓明或欺負之者延夀痛自刻責豈其負之何以至此師古曰言豈我負之耶其人何以為此事吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言師古曰殊絶也以人救之}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 身首不相絶也瘖音於今反延夀聞之對掾史涕泣遣吏毉治視師古曰遣毉治之而吏䕶視之厚復其家師古曰復音方目反延夀嘗出臨上車騎吏一人後至勅功曹議罰白師古曰令定其罪名而更白之還至府門門卒當車願有所言延夀止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也師古曰資取也取事父之道以事君其敬則同也母則極愛君則極敬不如父之兼敬愛也今旦明府早駕久駐未出騎吏父来至府門不敢入騎吏聞之趨走出謁適㑹明府登車以敬父而見罰得毋虧大化乎延夀舉手輿中曰微子太守不自知過師古曰微無也歸舍召見門卒卒本諸生聞延夀賢無因自逹故代卒師古曰代人}
