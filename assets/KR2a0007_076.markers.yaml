  - {type: variant, offset: 986, length: 1, content: 無, WYG: 后也師古曰葉音式渉反楚嚴好田獵樊姬為之不食鳥獸之肉師古曰樊姬楚莊王姬也口非惡㫖甘耳非憎絲竹也所以抑心意絶耆欲者師古曰耆讀曰嗜将以率二君而全宗祀也禮君母出門則乗輜軿下堂則從傅母師古曰輜軿衣車也輜音甾又音楚疑反軿音歩千反又音歩丁反進退則鳴玉佩内飾則結綢繆文潁曰謂衣𠂻結束綢繆也師古曰組紐之屬所以自結固也綢音直留反繆音亡蚪反此言尊貴所以自斂制不從恣之義也師古曰從讀曰縱今太后資質淑羙慈愛寛仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也師古曰上聞聞於天}
