  - {type: variant, offset: 29, length: 1, content: 兄, WYG: 兼備唯所施設功曹以為此吏倨敖不遜師古曰敖讀曰傲延年曰何傷遂召上辭問師古曰為文辭而問之甚竒其對除補卒史宋祁曰除補字上疑有是日字便從歸府案事發姦窮竟事情延年大重之自以能不及翁歸徙署督郵河東二十八縣分為兩部閎孺部汾北師古曰閎姓也音宏翁歸部汾南所舉應法得其罪辜屬縣長吏雖中傷莫有怨者舉廉為緱氏尉歴守郡中所居治理師古曰歴於郡中守丞尉之職也宋祁曰中字一作守遷補都内令舉廉為𢎞農都尉徴拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人師古曰邑子同邑人之子也屬音之欲反令坐後堂待見定國與翁歸語終日不敢見其邑子旣去定國乃謂邑子曰此賢將汝不任事也又不可干以私師古曰任堪也干求也翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政師古曰言決斷諸縣姦邪之事不委令長有急名則少緩之吏民小解輙披籍服䖍曰披有罪者籍也師古曰解讀曰懈縣縣收取黠吏豪民案致其罪髙至於死収取人必於秋冬課吏大㑹中及出行縣師古曰於大㑹之中及行縣時則収取罪人以警衆也行音下更反不以}
