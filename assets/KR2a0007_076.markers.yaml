  - {type: variant, offset: 2418, length: 3, content: 長樂衛, WYG: 中太僕師古曰皇后之屬官不復典權衡譚乃奏顯舊惡請免顯等尊於是劾奏丞相衡御史大夫譚位三公典五常九德師古曰五常仁義禮智信也九德寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而廉剛而塞彊而義也事見虞書臯陶謨也以總方略壹統類廣教化羙風俗為職知中書謁者令顯等專權擅埶大作威福縱恣不制無所畏忌為海内患害不以時白奏行罰而阿諛曲從附下㒺上懐邪迷國無大臣輔政之義宋祁曰越本義下有也字皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體又正月行幸曲臺臨饗罷衞士如淳曰諸衞士更盡得代去故天子自臨而饗之衡與中二千石大鴻臚賞等㑹坐殿門下衡南鄉賞等西鄉衡更為賞布東鄉席師古曰鄉讀曰嚮起立延賞坐私語如食頃衡知行臨如淳曰天子當臨饗士時百官共職萬衆㑹聚師古曰共讀曰供而設不正之席使下坐上相比為小惠於公門之下師古曰比周也音頻寐反宋祁曰浙本作相比詐又注文添比比周也動不中禮師古曰中當也音竹仲反亂朝廷爵秩之位衡又使官大奴入殿中問行起居還言漏上十四刻行臨到宋祁曰行臨到當作行臨時衡安坐不變色改容無怵惕肅敬之心驕慢不謹皆不敬有詔勿治於是衡慙懼免冠謝罪上丞相侯印綬天子以新即位重傷大臣師古曰重難也乃下御史丞問状宋祁曰一作御史中丞問状劾奏尊妄詆欺非謗赦前事師古曰詆毁也音丁禮反非讀曰誹也猥歴奏大臣師古曰猥多也曲也歴謂所奏非一人無正法飾成小過以塗汙宰相摧辱公卿輕薄國家奉使不敬有詔左遷尊為髙陵令數月以病免㑹南山羣盗傰宗等數百人蘇林曰傰音朋晉灼曰音倍師古曰晉音是也為吏民害拜故𢎞農太守傅剛為校}
