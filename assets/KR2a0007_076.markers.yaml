  - {type: variant, offset: 3596, length: 1, content: 蒙, krp: 作斥土而張湯傳作方中地節三年七月中丞相傅婢云云通鑑考異曰盖傅婢死事已數年而廣漢追發其事也廣漢竟坐要斬通鑑考異曰廣漢死在元康元年本紀作二年誤也尹翁歸傳河東二十八縣臣召南按地理志河東郡統縣二十四自安邑至騏可數也此八字當是四字之誤案致其罪高至於死顧炎武曰髙謂罪名之上者猶言上刑矣少子岑歴位九卿至}
  - {type: variant, offset: 3598, length: 1, content: 凋, WYG: 将軍臣召南按公卿表岑字子河成帝永始四年以䕶羌校尉為執金吾元延元年為右将軍此文作後将軍必有一誤韓延夀傳修治學宫按學宫應作學官漢書各傳皆然諸本並誤耳行縣至髙陵臣召南按地理志髙陵雖為左馮翊首縣而非其治所趙廣漢傳曰左馮翊右扶風皆治長安中故曰行縣至髙陵也使賢長吏嗇夫三老孝弟受其恥胡三省曰賢長吏謂縣令丞也後漢志注三老孝弟力田三者皆鄉官}
  - {type: page-break, offset: 3598, content: '', id: KR2a0007_WYG_076-42a, image: WYG0250/WYG0250-0594c.png}
  - {type: variant, offset: 3598, length: 1, content: 凋, krp: 将軍臣召南按公卿表岑字子河成帝永始四年以䕶羌校尉為執金吾元延元年為右将軍此文作後将軍必有一誤韓延夀傳修治學宫按學宫應作學官漢書各傳皆然諸本並誤耳行縣至髙陵臣召南按地理志髙陵雖為左馮翊首縣而非其治所趙廣漢傳曰左馮翊右扶風皆治長安中故曰行縣至髙陵也使賢長吏嗇夫三老孝弟受其恥胡三省曰賢長吏謂縣令丞也後漢志注三老孝弟力田三者皆鄉官}
  - {type: variant, offset: 3600, length: 9, content: 賞哀平際會禍福速哉, WYG: 名也三老髙帝置孝弟力田髙后置所以勸導鄉里助成教化也張敞傳山陽郡戸九萬三千口五十萬以上臣召南按地理志山陽郡戸十七萬二千八百四十七口八十萬一千二百八十八與此文大相懸殊盖元始中戸口十倍於宣帝時矣臣前幸得備位列卿待罪京兆胡三省曰西都之制為三輔者列於九卿王尊傳上行幸雍過虢劉攽曰虢字是史氏誤臣召南按顧炎武亦駁此文云今鳳翔縣古之雍城而虢在陕幸雍何以得過虢當是過羙陽之誤按攽及炎武並疑虢地在陕幸雍不當東行而不知右扶風自有虢縣也据地理志雍虢羙陽三縣並屬右扶風虢縣故城在今鳳翔府城南三十五里雍縣即今鳳翔府治漢帝西幸雍必過虢道里甚明何乃疑周之虢國東在𢎞農者乎夫漢時於周虢國地置陕縣屬𢎞農郡固不云虢縣也本文不誤白馬三老朱英等地理志東郡有白馬縣今滑縣也前漢書卷七十六考證}
