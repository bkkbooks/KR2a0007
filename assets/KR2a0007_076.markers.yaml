  - {type: variant, offset: 32, length: 0, content: '', WYG: 迹姦邪罪名亦縣縣有名籍盗賊發其比伍中師古曰比謂左右相次者也五家為伍若今伍保也比音頻寐反翁歸輙召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵師古曰抵歸也所經過及所歸投也類常如翁歸言無有遺脫師古曰類猶率也緩於小弱急於豪彊有論罪輸掌畜官師古曰論罪决罪也扶風畜牧所在有苑師之屬故曰掌畜官也畜音許救反使斫莝師古曰莝斬芻音千卧反責以員程不得取代師古曰員數也計其人及日数為功程不中程輙笞督極者至以鈇自剄而死師古曰鈇斫莝刄也音大夫之夫使其斫莝故因以莝刃自剄而説者或謂為斧或云劒鈇皆失之也京師畏其威嚴扶風大治盜賊課常為三輔最師古曰言發則獲之無有遺失故為最也翁歸為政雖任刑其在公卿之間清絜自守語不及私然温良嗛退不以行能驕人師古曰嗛古以為謙字甚得名譽於朝廷視事數嵗无康四年病卒家無餘財天子賢之制詔御史朕夙興夜寐以求賢為右師古曰右猶上也不異親疏近逺務在安民而已扶風翁歸廉平鄉正師古曰鄉讀曰嚮治民異等早夭不遂不得終其功業朕甚憐之其賜翁歸子黄金百斤以奉其祭祠翁歸三子皆為郡守少子岑歴位九卿至後將軍而閎孺亦至廣陵相有治名由是世稱田延年為知人韓延夀字長公燕人也徙杜陵少為郡文學父義為燕郎中刺王之謀逆也義諫而死燕人閔之是時昭帝富於春秋大將軍霍光持政徵郡國賢良文學問以得失時魏相以文學對䇿以為賞罰所以勸善禁惡政之本也日者燕王為無道師古曰日者猶言徃日也韓義出身彊諫為王所殺義無比干之親而蹈比干之節師古曰殷之比干紂之諸父諫紂而死故以為喻也宜顯賞其子以示天下明為人臣之義光納其言因擢延夀為諫大夫遷淮陽太守治甚有名徙潁川潁川多豪彊難治國家常為選良二千石先是趙廣漢為太守患其俗多朋黨故構㑹吏民令相告訐師古曰構結也一切以為聰明潁川由是以為俗民多怨讎延夀欲改更之教以禮讓恐百姓不從乃歴召郡中長老為郷里所信向者數十人設酒具食親與相對接以禮意人人問以謡俗民所疾苦師古曰謡俗謂閭里歌謡政教善惡也為陳和睦親愛銷除怨咎之路長老}
