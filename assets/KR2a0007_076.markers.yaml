  - {type: variant, offset: 2039, length: 1, content: 責, WYG: 尊為郿令師古曰右扶風之縣音媚宋祁曰刋誤改媚作郿遷益州刺史先是琅邪王陽為益州刺史行部至卭郲九折阪應劭曰在蜀郡嚴道縣臣瓚曰郲山名也師古曰郲音来歎曰奉先人遺體奈何數乗此險師古曰乗登也後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之師古曰驅馬令疾行也王陽為孝子王尊為忠臣尊居部二嵗懐来徼外蠻夷歸附其威信博士鄭寛中使行風俗師古曰行音下更反舉奏尊治狀遷為東平相是時東平王以至親驕奢不奉法度傅相連坐師古曰前任傅相者頻坐以王得罪及尊視事奉璽書至庭中宋祁曰庭當作廷王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前説相䑕之詩師古曰相鼠鄘風篇名刺無禮之詩也其辭曰相䑕有皮人而無儀人而無儀不死何為相視也言視䑕有皮雖處髙顯之地偷食苟得不知廉耻人無禮儀亦與䑕同不如速死也尊曰毋持布鼓過雷門師古曰雷門㑹稽城門也有大鼓越擊此鼓聲聞洛陽故尊引之也布鼓}
