  - {type: variant, offset: 59, length: 0, content: '', WYG: 渉反又音烏狎反勃懼亦自危廼謝請歸相印上許之歲餘陳丞相平卒上復用勃為相宋祁曰浙本相字上有丞字十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國廼免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見其後人有上書告勃欲反下廷尉逮捕勃治之勃恐不知置辭師古曰置立也辭對獄之辭吏稍侵辱之勃以千金與獄吏獄吏廼書牘背示之李竒曰吏所執簿也師古曰牘木簡以書辭也音讀曰以公主為證公主者孝文帝女也勃太子勝之尚之師古曰尚配也解在張耳傳}
