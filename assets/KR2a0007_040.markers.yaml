  - {type: variant, offset: 22, length: 0, content: '', krp: 成侯良始所見下邳圯上老父與書者宋祁云浙本圯作汜後十三歲從髙帝過濟北果得穀城山下黄石取而寶祠之及良死并葬黄石毎上冢伏臘祠黄石子不疑嗣侯孝文三年坐不敬國除陳平陽武户牗郷人也師古曰陽武縣名屬陳留户牗者其郷名少時家貧好讀書治黄帝老子之術有田三十畆與兄伯居伯常耕田縱平使游學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家生産曰亦食糠覈耳孟康曰覈麥糠中不破者也晋灼曰覈音紇京師人謂麤屑為紇頭有叔如此不如無有伯聞之逐其婦棄之及平長可取婦富人莫與者宋祁云浙本作莫肯與貧者平亦媿之乆之户牗富人張負有女孫五嫁夫輙死人莫敢取平欲得之邑中有大喪平家貧侍喪以先往後罷為助張負既見之喪所獨視偉平師古曰視而悦其竒偉平亦以故後去負隨平至其家家廼負郭窮巷師古曰負謂偝也以席為門然門外多長者車轍張負歸謂其子仲曰吾欲以女孫予陳平宋祁云越本無孫予二字劉攽曰吾欲以女陳平女下疑少一與字仲曰平貧不事事師古曰不事産業之事一縣中盡笑其所為獨奈何予之女負曰固有美如陳平長貧者乎卒與女為平貧廼假貸幣以聘師古曰貸音土戴反予酒肉之資以内婦負戒其孫曰毋以貧故事人不謹事兄伯如事廼父事嫂如事廼母師古曰廼汝也平既取張氏女資用益饒游道日廣里中社平為宰師古曰主切割肉也分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣陳渉起王使周市略地立魏咎為魏王與秦軍相攻於臨濟平已前謝兄伯服䖍曰謝語其兄伯往事魏也從少年往事魏王咎為太僕説魏王王不聼人或讒之平亡去項羽略地至河上平往歸之從入破秦賜爵卿張晏曰禮秩如卿不治事項羽之東王彭城也漢王還定三秦而東殷王反楚項羽廼以平為信武君將魏王客在楚者往擊殷降而還項王使項悍拜平為都尉師古曰悍音下旦反賜金二十溢居無何師古曰無何猶言無幾時漢攻下殷項王怒將誅定殷者平懼誅廼封其金與印使使歸項王而平身間行杖劒亡渡河船人見其美丈夫獨行疑其亡將要下當有寶器金玉目之欲殺平平心恐乃解衣臝而佐刺船師古曰自露其形示無所懐挾船人知其無有廼止平遂至脩武降漢因魏無知求見漢王漢王召入是時萬石君石奮為中㳙受平謁平等十人俱進賜食王曰罷就舍矣平曰臣為事來所言不可以過今日於是漢王與語而説之師古曰説讀曰悦問曰子居楚何官平曰為都尉是日拜平為都尉使參乗典䕶軍諸將盡讙師古曰讙嚻而議也宋祁曰一本作譁注云譁嚻而議曰大王一日得楚之亡卒未知髙下而即與共載使監䕶長者漢王聞之愈益幸平遂與東伐項王至彭城為楚所敗引師而還收散兵至滎陽以平為亞將屬韓王信軍廣武絳灌等或讒平曰師古曰舊説云絳絳侯周勃也灌灌嬰也而楚漢春秋髙祖之臣别有絳灌疑昧之文不可據也平雖美丈夫如冠玉耳其中未必有也孟康曰飾冠以玉光好外見中非所有也聞平居家時盜其嫂師古曰盜猶私也事魏王不容亡而歸楚歸楚不中又亡歸漢師古曰中音竹仲反今大王尊官之令䕶軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也陛下所問者行也今有尾生孝已之行如淳曰孝已髙宗之子有孝行師古曰尾生古之信士一説即微生髙而無益於勝敗之數陛下何暇用之乎今楚漢相距臣進竒謀之士顧其計誠足以利國家耳師古曰顧念也盜嫂受金又安足疑乎漢王召平而問曰吾聞先生事魏不遂事楚而去師古曰遂猶竟宋祁曰注末當有也字今又從吾遊信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有竒士不能用臣居楚聞漢王之能用人故歸大王臝身來不受金無以為資誠臣計畫有可采者願大王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為䕶軍中尉盡䕶諸將諸將廼不敢復言其後楚急擊絶漢甬道圍漢王於滎陽城漢王患之請割滎陽以西和項王弗聼漢王謂平曰天下紛紛何時定乎平曰項王為人恭敬愛人士之亷節好禮者多歸之至於行功賞爵邑重之師古曰言愛惜之士亦以此不附今大王嫚而少禮士之亷節者不來然大王能饒人以爵邑士之頑頓耆利無耻者亦多歸漢如淳曰頑頓謂無亷隅也師古曰頓讀曰鈍耆讀曰嗜誠各去兩短集兩長天下指麾即定矣然大王資㑄人師古曰資謂天性也㑄古侮字不能得亷節之士顧楚有可亂者師古曰顧念也彼項王骨骾之臣亞父鍾離昧龍且周殷之屬師古曰昧音秣且音子閭反不過數人耳大王能出捐數萬斤金行反閒閒其君臣以疑其心師古曰閒音居莧反項王為人意忌信讒必内相誅漢因舉兵而攻之破楚必矣漢王以為然乃出黄金四萬斤予平恣所為不問出入平既多以金縱反閒於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得列地而王欲與漢為一以滅項氏分王其地項王果疑之使使至漢漢為太牢之具舉進師古曰舉鼎爼而來見楚使即陽驚曰以為亞父使廼項王使也復持去以惡草具進楚使服䖍曰去肴肉更以惡草之具宋祁云浙本作菜草之具使歸具以報項王果大疑亞父宋祁云浙本果字上復有項王二字亞父欲急擊下滎陽城項王不信不肯聼亞父亞父聞項王疑之廼大怒曰天下事大定矣君王自為之願乞骸骨歸宋祁曰乞當作賜歸未至彭城疽發背而死師古曰疽癕瘡也音千余反平廼夜出女子二千人滎陽東門楚因擊之平廼與漢王從城西門出去宋祁曰出去當作夜出遂入關收聚兵而復東明年淮隂侯信破齊自立為假齊王使使言之漢王漢王怒而罵平躡漢王孟康曰躡謂躡漢王足漢王寤廼厚遇齊使使張良往立信為齊王於是封平以户牗郷用其計䇿卒滅楚漢六年人有上書告楚王韓信反髙帝問諸將諸將曰亟發兵阬豎子耳師古曰亟急也音居力反髙帝黙然以問平平固辭謝曰宋祁曰一本固作因然作固為長諸將云何上具告之平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚師古曰與如也上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也師古曰趣讀曰促竊為陛下危之上曰為之奈何平曰古者天子廵狩㑹諸侯南方有雲夢師古曰楚澤名夢音莫風反又讀如本字陛下第出偽游雲夢師古曰第但也語聲急也它皆類此會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁師古曰出其郊逺迎謁也而陛下因禽之特一力士之事耳宋祁云浙本特字上有此字髙帝以為然廼發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中髙帝豫具武士見信即執縛之語在信傳遂會諸侯於陳還至雒陽與功臣剖符定封封平為户牗侯世世勿絶平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣師古曰若如也廼復賞魏無知其明年平從擊韓王信於代至平城為匈奴圍七日宋祁曰圍字上疑有所字不得食髙帝用平竒計使單于閼氏解圍以得開師古曰閼氏音焉支髙帝既出其計祕世莫得聞髙帝南過曲逆孟康曰中山蒲隂縣上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳顧問御史曲逆戸口幾何對曰始秦時三萬餘户間者兵數起多亡匿今見五千餘户於是詔御史更封平為曲逆侯宋祁曰曲逆漢書元無音文文選載陸士衡髙祖功臣頌曲逆宏逹好謀能斷注曲區句反逆音遇盡食之除前所食户牗平自初從至天下定後常以䕶軍中尉從擊臧荼陳豨黥布凡六出竒計輙益邑封竒計或頗祕世莫得聞也髙帝從擊布軍還病創徐行至長安燕王盧綰反上使樊噲以相國將兵擊之既行人有短惡噲者師古曰陳其短失過惡於上謂譛毁之它皆類此髙帝怒曰噲見吾病廼幾我死也孟康曰幾幸我死也幾音冀用平計召絳侯周勃受詔牀下曰陳平乗馳傳載勃代噲將師古曰傳音張戀反宋祁云景祐本無陳字校添平至軍中即斬噲頭二人既受詔馳傳未至軍行計曰樊噲帝之故人功多師古曰行計謂於道中且計也宋祁曰注文道中字下當有行字又呂后女弟呂嬃夫有親且貴帝以忿怒故欲斬之即恐後悔寜囚而致上令上自誅之未至軍為壇以節召樊噲噲受詔即反接師古曰反縛兩手也載檻車詣長安而令周勃代將兵定燕平行聞髙帝崩師古曰未至京師於道中聞髙帝崩平恐呂后及呂嬃怒廼馳傳先去逢使者詔平與灌嬰屯於滎陽平受詔立復馳至宮哭殊悲因奏事喪前呂后哀之曰君出休矣平畏讒之就師古曰就成也言畏讒毒己者得其成計因固請之得宿衞中宋祁曰之字可刪太后廼以為郎中令日傅教帝如淳曰傅相之是後呂嬃讒廼不得行樊噲至即赦復爵邑惠帝六年相國曹參薨安國侯王陵為右丞相平為左丞相王陵沛人也始為縣豪髙祖微時兄事陵及髙祖起沛入咸陽陵亦聚黨數千人居南陽不肯從沛公及漢王之還擊項籍陵廼以兵屬漢項羽取陵母置軍中陵使至則東郷坐陵母欲以招陵師古曰郷讀曰嚮陵母既私送使者泣曰願為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劒而死項王怒亨陵母陵卒從漢王定天下以善雍齒雍齒髙祖之仇陵又本無從漢之意以故後封陵為安國侯陵為人少文任氣好直言為右丞相二歲惠帝崩髙后欲立諸呂為王問陵陵曰髙皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不説師古曰説讀曰悦問左丞相平及絳侯周勃等皆曰髙帝定天下王子弟今太后}
