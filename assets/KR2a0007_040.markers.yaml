  - {type: variant, offset: 2386, length: 786, content: 姓負彊而動者漢已幸勝之矣又不易其所以然同姓襲是跡而動既有徵矣其勢盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆眾理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刃也權勢法制人主之斤斧也今諸侯王皆眾髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北勢不可也臣竊跡前事大抵彊者先反淮陰王楚最彊則最先反韓信倚胡則又反貫高因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙乃在二萬五千戶耳功少而最完勢疏而最忠非獨性異人也亦形勢然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子之勿菹醢則莫若令如樊酈等欲天下之治安莫若眾建諸侯而少其力力少則易使以義國小則亡邪心令海內之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁它國皆然其分地眾而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之眾天子亡所利焉誠以定治而已故天下咸知陛下之廉地制壹定宗室子孫莫慮不王下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫高利幾之謀不生柴奇開章之計不萌細民鄉善大臣致順故天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖壹動而五業附陛下誰憚而久不為此天下之勢方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為錮疾後雖有扁鵲不能為已病非徒瘇也又苦𨂂盭元王之子帝之從弟也今之王者從弟之子也惠王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以偪天子臣故曰非徒病瘇也又苦𨂂盭可痛哭者此病, WYG: ''}
