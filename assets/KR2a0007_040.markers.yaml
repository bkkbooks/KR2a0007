  - {type: variant, offset: 12, length: 0, content: '', WYG: 臣瓉曰楚漢春秋鯫姓師古曰服説是也音才垢反秦地可王也故聽之良曰沛公自度能郤項王乎師古曰郤音丘略反沛公黙然曰今為奈何良因要項伯見沛公沛公與伯飲為壽結婚令伯具言沛公不敢背項王所以距關者備它盗也項羽後解語在羽傳漢元}
