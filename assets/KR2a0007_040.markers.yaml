  - {type: variant, offset: 14, length: 0, content: '', WYG: 兩曰溢師古曰秦以溢名金若漢之論斤也珠二斗良具以獻項伯漢王亦因令良厚遺項伯使請漢中地服䖍曰本不盡與漢中故請求之項王許之漢王之國良送至褒中遣良歸韓良因説漢王燒絶棧道師古曰棧道閣道也示天下無還心以固項王意廼使良還行燒絶棧道師古曰還謂歸還韓且行且燒所過之處皆燒之也良歸至韓聞項羽以良從漢王故不遣韓王成之國與俱東至彭城殺之時漢王還定三秦良乃遺項羽書曰漢王失職欲得關中如約即止不敢東宋祁曰敢字下疑有復字又以齊反書遺羽曰齊與趙欲并滅楚項羽以故北擊齊良廼間行歸漢漢王以良為成信侯從東擊楚至彭城漢王兵敗而還至下邑師古曰梁地之縣也今屬宋州漢王下馬踞鞍而問曰吾欲捐關已東等棄之誰可與共功者師古曰捐關已東謂不自有其地將以與人令其立功共破楚也良曰九江王布楚梟將師古曰梟謂最勇健也與項王有隙彭越與齊王反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面師古曰屬委也音之欲反即欲捐之捐之此三人楚可破也漢王乃遣隨何説九江王布而使人連彭越師古曰與相連結也及魏王豹反使韓信特將北擊之師古曰特獨也專任之使將也因舉燕伐齊趙然卒破楚者此三人力也良多病未嘗特將兵宋祁云舊本云持兵將常為畫䇿臣時時從漢三年項羽急圍漢王於滎陽漢王憂恐與酈食其謀橈楚權師古曰橈弱也音女教反其字從木酈生曰昔湯伐桀封其後把武王誅紂封其後宋今秦無德宋祁云浙本徳字作道伐滅六國無立錐之地陛下誠復立六國後此皆争戴陛下德義願為臣妾德義已行南面稱伯楚必歛衽而朝師古曰衽衣襟也漢王曰善趣刻印先生因行佩之師古曰趣讀曰促佩謂授與六國使帶也酈生未行良從外來謁漢王漢王方食曰客有為我計橈楚權者具以酈生計告良曰於子房何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉良曰臣請借前箸以籌之張晏曰求借所食之箸用指畫也或曰前世湯武箸明之事以籌度今時之不若也師古曰或説非也箸音直庻反昔湯武伐桀紂封其後者度能制其死命也師古曰度音大各反今陛下能制項籍死命乎其不可一矣武王入殷表商容閭師古曰商容殷賢人也里門曰閭表謂顯異之式箕子門師古曰式亦表也一説至其門而撫車式所以敬之封比干墓今陛下能乎其不可二矣發鉅橋之粟服䖍曰鉅橋倉名也師古曰許慎云鉅鹿之大橋有漕粟也散鹿臺之財臣瓉曰鹿臺臺名今在朝歌城中師古曰劉向云鹿臺大三里髙千尺也以賜貧窮今陛下能乎其不可三矣殷事以畢偃革為軒蘇林曰革者兵車革輅軒者朱軒也如淳曰偃武備而治禮樂也倒載干戈示不復用宋祁曰載作戴今陛下能乎其不可四矣休馬華山之陽示無所為今陛下能乎其不可五矣息牛桃林之壄晋灼曰在𢎞農閺郷南谷中師古曰山海經云夸父之山北有林焉名曰桃林廣圍三百里即謂此也其山谷今在閺郷縣東南湖城縣西南去湖城三十五里天下不復輸積宋祁云浙本天字上有示字今陛下能乎其不可六矣且夫天下游士離親戚棄墳墓師古曰離者言其乖避而委離之以從漢也宋祁曰離親戚浙本離作左左者言其乖避而委離之若只作離字則不湏用注也去故舊從陛下者但日夜望咫尺之地今乃立六國後唯無復立者師古曰既立六國後土地皆盡無以封功勞之人故云無復立者唯發語之辭游士各歸事其主從親戚反故舊陛下誰與取天下乎其不可七矣且楚唯毋彊六國復橈而從之服䖍曰唯當使楚無彊彊則六國弱而從之晋灼曰當今唯楚大無有彊之者若復立六國皆橈而從之陛下焉得而臣之乎師古曰服説是也陛下焉得而臣之其不可}
