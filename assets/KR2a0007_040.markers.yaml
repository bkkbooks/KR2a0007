  - {type: variant, offset: 5, length: 3, content: 八賈誼, WYG: 張良字子房其先韓人也大父開地應劭曰大父祖父開地名也相韓昭侯宣惠王襄哀王父平相釐王師古曰釐讀曰僖悼惠王悼惠王二十三年平卒卒二十歲秦滅韓良少未宦事韓宋祁曰宦疑是嘗字韓破良家僮三百人弟死不葬悉以家財求客刺秦王為韓報仇以五世相韓故師古曰從昭侯至悼惠王凡五君良嘗學禮淮陽東見倉海君晋灼曰海神也如淳曰東夷君長也師古曰二説並非蓋當時賢者之號也良既見之因而求得力士得力士為鐵椎重百二十斤秦皇帝東游至博狼沙中服䖍曰河南陽武南地名也今有亭師古曰狼音浪良與客狙擊秦皇帝師古曰狙謂密伺之音千豫反字本作覷誤中副車師古曰副謂後乗也秦皇帝大怒大索天下師古曰索捜也索音山客反求賊急甚良乃更名姓亡匿下邳師古曰更改也良嘗閒從容歩游下邳圯上服䖍曰圯音頥楚人謂橋曰圯應劭曰汜水之上也文穎曰沂水上橋也師古曰下邳之水非汜水也又非沂水服説是也臣佖曰按從水乃詩云江有汜及今有汜水縣字音詳里反據許慎説文云東楚謂橋為圯在土部本從土傳寫蓋誤從汜合從土作頥音與下文直墮其履汜下並作圯字校定劉攽曰予謂若本實作圯則應劭無縁觧作汜上疑汜亦自為頥音而釋為橋也譬如贍辭作澹辭矣然則汜字從水亦未為誤而校定亦未宜從土也宋祁曰舊本汜從水張佖改作土謂從水者是江有汜之汜音詳里反余謂佖説非也近胡旦作圯橋賛字從水旦碩儒也予嘗問之旦曰汜音頥何所疑憚説文從圯蓋本字原後人從水未容無義佖改從土奈應注為汜水之汜又何以辨應之誤耶用此尤見張佖之率爾也有一老父衣褐至良所師古曰褐制若裘今道士所服者是宋祁曰褐制若䘮服直墮其履圯下師古曰直猶故也一曰正也顧謂良曰孺子下取履良愕然欲歐之師古曰愕驚貌也歐撃也音一口反為其老廼彊忍下取履因跪進父以足受之笑去宋祁曰浙本作笑而去良殊大驚父去里所復還師古曰行一里許而還來曰孺子可教矣後五日平明與我期此良因怪跪曰諾劉攽曰怪字合在因字上宋祁云浙本怪字下有之字五日平明良往父已先在怒曰與老人期後何也去後五日蚤會師古曰放良令去戒以後㑹也其下亦同蚤音早宋祁曰注文蚤音早當作蚤古早字五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書師古曰編謂聨次之也聨簡牘以為書故云一編編音鞭曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黄石即我已師古曰已語終之辭遂去不見旦日視其書廼太公兵法良因異之常習誦宋祁云一本誦下有讀字居下邳為任俠項伯嘗殺人從良匿後十年陳渉等起良亦聚少年百餘人景駒自立為楚假王在留宋祁云浙本作在陳留良欲往從之行道遇沛公沛公將數千人略地下邳遂屬焉沛公拜良為廐將服䖍曰官名也良數以太公兵法沛公沛公喜常用其䇿良為它人言皆不省師古曰省視也良曰沛公殆天授師古曰殆近也故遂從不去沛公之薛見項梁共立楚懐王良乃説項梁曰君已立楚後韓諸公子横陽君成賢宋祁云浙本韓字上有而字可立為王益樹黨師古曰廣立六國之後共攻秦也項梁使良求韓成立為韓王以良為韓司徒與韓王將千餘人西畧韓地得數城秦輙復取之往來為游兵潁川沛公之從}
