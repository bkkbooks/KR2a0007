  - {type: variant, offset: 46, length: 1, content: 聞, WYG: 怪平病問之平曰髙帝時宋祁曰别本帝上有皇字勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是廼以太尉勃為右丞相位第一平徙為左丞相位第二賜平金千斤益封三千户居頃之上益明習國家事朝而問右丞相勃曰天下一歲決獄幾何師古曰臨朝問也幾音居豈反勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背師古曰洽需也媿不能對上亦問左丞相平平曰各有主者宋祁曰越本無各字上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟内史上曰茍各有主者而君所主何事也平謝曰主臣文穎曰惶恐之辭也猶今言死罪也孟康曰主臣主羣臣也若今言人主晋灼曰主擊也臣服也言其擊服惶恐之辭師古曰文晋二説是也陛下不知其駑下使待罪宰相師古曰駑凡馬之稱非駿者也故以自喻駑音奴宰相者上佐天子理隂陽順四時下遂萬物之宜師古曰遂申也外填撫四夷諸侯内親附百姓使卿大夫各得任其職也上稱善勃大慙出而讓平曰君獨不素教我乎平笑曰君居其位獨不知其任邪且陛下即問長安盜賊數又欲彊對邪劉攽曰盜賊數亦自有主者謂不當問細故也於是絳侯自知其能弗如平逺矣居頃之勃謝病請免相宋祁曰越本無病請二字而平顓為丞相師古曰顓與專同孝文二年平薨諡曰獻侯傳子至曾孫何坐略人妻棄市王陵亦至𤣥孫坐酎金國除辟陽侯食其免後三歲而為淮南王所殺文帝令其子平嗣侯淄川王反辟陽近淄川平降之國除始平曰我多隂謀道家之所禁師古曰此平謂陳平吾世即廢亦已矣不能復起以吾多隂禍也宋祁曰不能字上疑有終字其後曾孫陳掌以衞氏親戚貴師古曰掌妻衞子夫之姊願得續封之宋祁曰浙本無之字然終不得也宋祁曰得一作行周勃沛人也其先卷人也師古曰卷縣名也地理志屬}
