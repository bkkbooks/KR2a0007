主席者也上視而笑曰此非不足君所乎孟康曰設胾無箸者此非不足滿於君所乎嫌恨之也如淳曰非故不足君之食具偶失之也師古曰孟説近之帝言賜君食而不設箸此由我意於君有不足乎宋祁曰浙本注文由我字上有豈不二字亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以葬者如淳曰工官官名也張晏曰被具也五百具甲楯也師古曰被音皮義反取庸苦之不與錢師古曰庸謂賃也苦謂極苦使也宋祁曰浙本注文賃字下有作者字庸知其盜買縣官器怨而上變告子事連汙亞夫書既聞上下吏宋祁曰浙本下字下有之字吏簿責亞夫如淳曰簿音主簿之簿簿問其辭情師古曰簿問者書之於簿一一問之也亞夫不對上罵之曰吾不用也孟康曰言不用汝對欲殺之也如淳曰恐獄吏畏其復用事不敢折辱也師古曰孟説是也一云帝責此吏云不勝其任吾不用汝故召亞夫令詣廷尉也召詣}
