  - {type: variant, offset: 1405, length: 364, content: 此本末舛逆首尾衡決國制搶攘非甚有紀胡可謂治陛下何不壹令臣得孰數之於前因陳治安之策試詳擇焉夫射獵之娛與安危之機孰急使為治勞智慮苦身體乏鍾鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保道領匈奴賓服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海內之氣清和咸理生為明帝沒為明神名譽之美垂於無窮禮祖有功而宗有德使顧成之廟稱為太宗上配太祖與漢亡極建久安之勢成長治之業以承祖廟以奉六親至孝也以幸天下以育群生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得蒙業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也其具可素陳於前願幸無忽臣謹稽之天地驗之往古按之當今之務日夜念此至孰也雖使禹舜復生為陛下計亡以易此夫樹國固必相疑之勢下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德, WYG: 曰}
