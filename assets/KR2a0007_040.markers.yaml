  - {type: variant, offset: 50, length: 0, content: '', krp: 齮破武關嶢關攻秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懐德攻槐里好畤最如淳曰於將率之中功為最也北擊趙賁内史保於咸陽最北救漆師古曰漆扶風縣擊章平姚卬軍西定汧師古曰汧亦扶風縣音口肩反還下郿頻陽師古曰郿即岐州郿縣也頻陽在櫟陽東北郿音媚圍章邯廢丘破之西擊益已軍破之如淳曰章邯將也攻上邽師古曰邽音圭東守嶢關擊項籍攻曲遇最師古曰曲音丘禹反遇音顒還守敖倉追籍籍已死因東定楚地泗水東海郡凡得二十二縣還守雒陽櫟陽賜與潁隂侯共食鍾離以將軍從髙祖擊燕王臧荼破之易下所將卒當馳道為多師古曰當髙祖所行之前劉敞曰馳道猶言乗輿耳言勃將卒在馳道有功也戰功曰多賜爵列侯剖符世世不絶食絳八千二百八十户以將軍從髙帝擊韓王信於代降下霍人以前至武泉孟康曰縣屬雲中也擊胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晋陽下破之下晋陽後擊韓信軍於硰石應劭曰硰音沙孟康曰地名也齊恭曰硰音赤坐反師古曰齊音是也破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多勃還為太尉擊陳豨屠馬邑所將卒斬豨將軍乗馬降師古曰姓乗馬名降也乗音食孕反轉擊韓信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂師古曰圂者鴈門守之名音下頓反因轉攻得雲中守遫丞相箕肄將軍博師古曰遫古速字也肄音弋二反博者亦豨將之名也定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之軒豨丞相程縱將軍陳武都尉髙肄定代郡九縣燕王盧綰反勃以相國代樊噲將擊下薊師古曰即幽州薊縣也音計得綰大將抵丞相偃守陘張晏曰盧綰郡守陘其名也師古曰陘音刑太尉弱御史大夫施屠渾都師古曰姓施屠名渾都渾音胡昆反破綰軍上蘭後擊綰軍沮陽服䖍曰沮音阻師古曰縣名屬上谷追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從髙帝得相國一人師古曰最者凡也總言其攻戰克獲之數丞相二人將軍二千石各三人别破軍二下城三定郡五縣七十九得丞相大將各一人勃為人木彊敦厚師古曰木謂質樸彊音其兩反髙帝以為可屬大事師古曰屬委也音之欲反勃不好文學每召諸生説事東郷坐責之如淳曰勃自東郷責諸生説事不以賔主之禮也師古曰郷讀曰嚮趣為我語蘇林曰音趣舍臣瓉曰令直言勿稱經書也師古曰二説皆非也趣讀曰促謂令速言也其椎少文如此服䖍曰謂訥鈍也應劭曰今俗名拙語為椎儲師古曰椎謂樸鈍如椎也音直推反勃既定燕而歸髙帝已崩矣以列侯事惠帝惠帝六年置太尉官以勃為太尉十年髙后崩呂禄以趙王為漢上將軍呂産以呂王為相國秉權欲危劉氏勃與丞相平朱虚侯章共誅諸呂語在髙后紀於是隂謀以為少帝及濟川淮陽恒山王皆非惠帝子呂太后以計詐名它人子殺其母飬之後宮令孝惠子之立以為後用彊呂氏今已滅諸呂少帝即長用事吾屬無類矣師古曰云被誅滅無遺種不如視諸侯賢者立之遂迎立代王是為孝文皇帝東牟侯興居朱虚侯章弟也曰誅諸呂臣無功請得除宮廼與太僕汝隂滕公入宮劉敞曰當云汝隂侯滕公前謂少帝曰足下非劉氏不當立廼顧麾左右執㦸皆仆兵罷師古曰仆頓也音赴有數人不肯去宦者令張釋諭告亦去師古曰荆燕}
