  - {type: variant, offset: 24, length: 1, content: 郡, WYG: 地下乎平曰於面折廷爭臣不如君師古曰廷爭謂當朝廷而諫爭全社稷安劉氏後君亦不如臣陵無以應之於是呂太后欲廢陵廼陽遷陵為帝太傅實奪之相權陵怒謝病免杜門竟不朝請師古曰杜塞也閉塞其門也請音才性反杜字本作音同十年而薨陵之免呂太后徙平為右丞相以辟陽侯審食其為左丞相師古曰食其音異基食其亦沛人也漢王之敗彭城西楚取太上皇呂后為質食其以舍人侍呂后其後從破項籍為侯幸於呂太后及為相不治鄭氏曰不立治處使止宮}
