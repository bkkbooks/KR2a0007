  - {type: variant, offset: 32, length: 0, content: '', krp: 日益甚呂太后聞之私喜面質呂嬃於平前師古曰質對也曰鄙語曰兒婦人口不可用顧君與我何如耳無畏呂嬃之譛師古曰顧念也呂太后多立諸呂為王平偽聼之師古曰謂且順從之不乖牾也及呂太后崩平與太尉勃合謀卒誅諸呂立文帝平本謀也審食}
