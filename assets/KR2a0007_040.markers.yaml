  - {type: variant, offset: 49, length: 0, content: '', WYG: 音丘權反其下亦同宋祁曰沛人也也字可刪徙沛勃以織薄曲為生蘇林曰薄一名曲月令曰具曲植師古曰許慎云葦薄為曲也常以吹簫給喪事師古曰吹簫以樂䘮賔若樂人也材官引强服䖍曰能引强弓弩官也孟康曰如今挽强司馬也師古曰强音其兩反髙祖為沛公初起勃以中涓從攻胡陵下方與師古曰音房豫方與反與戰卻敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蘭虞取之擊章邯車騎殿師古曰殿之言填也謂鎮軍後以扞敵勃撃破章邯之殿兵也殿音丁見反劉奉世曰殿最多皆功之髙下名品也略定魏地攻轅戚東緍以往至栗師古曰緍音昏取之攻齧桑先登擊秦軍阿下破之追至濮陽下蘄城攻都關定陶襲取宛朐得單父令師古曰音善甫夜襲取臨濟攻壽張以前至卷破李由雍丘下攻開封先至城下為多文頴曰勃士卒至者多也如淳曰周禮戰功曰多師古曰多謂功多也後章邯破項梁沛公與項羽引兵東如碭自初起沛還至碭一歲二月楚懐王封沛公號武安侯為碭郡長沛公拜勃為襄賁令師古曰賁音肥從沛公定魏地攻東郡尉於成武破之攻長社先登攻潁陽緱氏絶河津擊趙賁軍尸北師古曰賁音奔尸即尸郷南攻南陽}
