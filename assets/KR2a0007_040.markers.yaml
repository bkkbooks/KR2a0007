  - {type: variant, offset: 5233, length: 884, content: 聖智也秦世之所以亟絕者其轍跡可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而已夫胡粵之人生而同聲耆欲不異及其長而成俗累數譯而不能相通行者有雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於已然之後是故法之所用易見而禮之所為生難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絕惡於未萌而起教於微眇使民日遷善遠辠而不自知也孔子曰聽訟吾猶人也必也使毋訟乎為人主計者莫如先審取舍取舍之極定於內而安危之萌應於外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以德教或敺之以法令道之以德教者德教洽而民氣樂敺之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百歲而弗失秦王治天下十餘歲則大敗此亡它故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷累子孫數十世此天下所共聞也秦王置天下於法令刑罰德澤亡一有而怨毒盈於世下憎惡之如仇讎禍幾及身子孫誅絕此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂群臣如陛眾庶如地故陛九級上廉遠地則堂高陛亡級廉近地則堂卑高者難攀卑者易陵理勢然也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器況於貴臣之近主乎廉恥節禮以治君子故有賜死而亡戮辱是以黥劓之辠不及, WYG: ''}
