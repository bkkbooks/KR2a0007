  - {type: variant, offset: 10, length: 0, content: '', WYG: 南出轘轅良引兵從沛公下韓十餘城擊楊熊軍沛公廼令韓王成留守陽翟與良俱南攻下宛西入武關沛公欲以二萬人擊秦嶢關下軍師古曰嶢音堯良曰秦兵尚彊未可輕臣聞其將屠者子賈豎易動以利師古曰商賈之人志無逺大譬猶僮豎故云賈豎願沛公且留壁使人先行為五萬人具食益張旗幟諸山上為疑兵師古曰皆所以表己軍之多誇示敵人幟音式志反令酈食其持重寶㗖秦將師古曰㗖音徒濫反觧在髙紀秦將果欲連和俱西襲咸陽師古曰欲與漢王和而隨漢兵襲咸陽宋祁云浙本襲字上有共字沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其解擊之師古曰解讀曰懈沛公廼引兵擊秦軍大破之逐北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聼良曰夫秦為無道故沛公得至此為天下除殘去賊宜縞素為資晋灼曰資質也欲令沛公反秦奢泰服儉素以為資師古曰縞白素也音工老反宋祁曰注文資字舊本作質今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病宋祁曰逆耳苦口疑作逆於耳苦於口願沛公聼樊噲言沛公廼還軍覇上項羽至鴻門欲擊沛公項伯夜馳至沛公軍私見良欲與俱去良曰臣為韓王送沛公今事有急亡去不義廼具語沛公沛公大驚曰為之奈何良曰沛公誠欲背項王邪沛公曰鯫生説我距關毋内諸侯服䖍曰鯫音七垢反鯫小}
