  - {type: variant, offset: 2025, length: 317, content: 時而陛下即天子位能自安乎臣有以知陛下之不能也天下殽亂高皇帝與諸公併起非有仄室之勢以豫席之也諸公幸者乃為中涓其次廑得舍人材之不逮至遠也高皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣惪至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自高皇帝不能以是一歲為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治虖臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死罪甚者或戴黃屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下, WYG: 釋}
