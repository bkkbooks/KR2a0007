  - {type: variant, offset: 205, length: 542, content: 然諸法令所更定及列侯就國其說皆誼發之於是天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之乃毀誼曰雒陽之人年少初學專欲擅權紛亂諸事於是天子後亦疏之不用其議以誼為長沙王太傅誼既以適去意不自得及度湘水為賦以弔屈原屈原楚賢臣也被讒放逐作離騷賦其終篇曰已矣國亡人莫我知也遂自投江而死誼追傷之因以自諭其辭曰恭承嘉惠兮竢罪長沙仄聞屈原兮自湛汨羅造託湘流兮敬弔先生遭世罔極兮迺隕厥身烏虖哀哉兮逢時不祥鸞鳳伏竄兮鴟鴞翱翔闒茸尊顯兮讒諛得志賢聖逆曳兮方正倒植謂隨夷溷兮謂跖蹻廉莫邪為鈍兮鈆刀為銛于嗟默默生之亡故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳服鹽車兮章父薦屨漸不可久兮嗟苦先生獨離此咎兮誶曰已矣國其莫吾知兮子獨壹鬱其誰語鳳縹縹其高逝兮夫固自引而遠去襲九淵之神龍兮沕淵潛以自珍偭蟂獺以隱處兮夫豈從蝦與蛭螾所貴聖之神德兮遠濁世而自臧使麒麟可係而羈兮豈云異夫犬羊般紛紛其離此郵兮亦夫子之故也歷九州而相其君兮何必懷此都也鳳皇翔于千仞兮覽德煇而下之見細德之險徵兮遙增擊而去之彼尋常之汙瀆兮豈容吞舟之魚橫江湖之鱣鯨兮固將制於螻螘誼為長沙傅三年有服飛入誼舍止於坐隅服似鴞不祥鳥也誼既以適居長沙長沙卑濕誼自傷悼以為壽不得長乃為賦以自廣其辭曰單閼之歲四月孟夏庚子日斜服集余舍止于坐隅貌甚閒暇異物來崒私怪其故發書占之讖, WYG: 梧者}
