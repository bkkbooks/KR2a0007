  - {type: variant, offset: 73, length: 0, content: '', WYG: 無反事文帝朝太后以冒絮提文帝應劭曰陌􅋕絮也晋灼曰巴蜀異志謂頭上巾為冒絮師古曰冒覆也老人所以覆其頭提擲也提音徒計反曰絳侯綰皇帝璽將兵於北軍應劭曰言勃誅諸呂廢少帝手綰國璽時尚不反況今更有異乎師古曰綰謂引結其組音烏版反不以此時反今居一小縣顧欲反邪師古曰顧猶倒也文帝既見勃獄辭廼謝曰吏方驗而出之於是使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍安知獄吏之貴也宋祁曰浙本安知字上有然終字勃復就國孝文十一年薨諡曰武侯子勝之嗣尚公主不相中如淳曰猶言不相合當也師古曰意不相可也中音竹仲反坐殺人死國絶一年宋祁曰景祐本一年下有文帝乃擇子賢者河内太守十二字予据後言文帝擇勃子賢者皆推亞夫於文次第方及耳不容先更於此重􅃨見也若更存此則河内太守三處再見班固之筆必不然也今去之弟亞夫復為侯亞夫為河内守時許負相之應劭曰許負河内温人老嫗也君後三歲而侯侯八歲為將相持國秉師古曰秉音彼命反貴重矣於人臣無二後九年而餓死亞夫笑曰臣之兄以代父侯矣有如卒子當代我何説侯乎然既已貴如負言又何説餓死指視我師古曰視讀曰示負指其口曰從理入口此餓死法也師古曰從豎也音子容反居三歲兄絳侯勝之有罪文帝擇勃子賢者皆推亞夫廼封為條侯師古曰縣在勃海地理志作脩字其音同耳宋祁曰脩當作蓨集韻音祧云周亞夫所封文帝後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝兹侯徐厲為將軍軍棘門以河内守亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲鋭兵刄彀弓弩持滿師古曰彀張也音遘劉奉世曰言彀弓弩是也敵未至何遽持滿何時已乎此二字疑衍天子先驅至不得入師古曰先驅導駕者也若今之武候隊矣先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫廼傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子廼按轡徐行至中營將軍亞夫揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜天子為動改容式車師古曰古者立乗凡言式車者謂俛身撫式以禮敬人式車前横木也使人稱謝師古曰謝告也皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此眞將軍矣鄉者霸上棘門如兒戲耳師古曰郷讀曰嚮其將固可襲而虜也至於亞夫可得而犯邪稱善者乆之月餘三軍皆罷廼拜亞夫為中尉文帝且崩時戒太子曰即有緩急周亞夫眞可任將兵文帝崩亞夫為車騎將軍孝景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與爭鋒師古曰剽音匹妙反願以梁委之絶其食道乃可制也上許之師古曰吳王傳云亞夫至淮陽問鄧都尉為畫此計亞夫乃從之今此云自請而後行二傳不同未知孰是亞夫既發至霸上趙渉􅃒説亞夫曰將軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之渉曰吳王素富懐輯死士乆矣師古曰輯與集同此知將軍且行必置間人於殽黽阸陿之間且兵事上神密將軍何不從此右去走藍田師古曰右謂少西去也走音奏出武關抵雒陽師古曰抵至也間不過差一二日師古曰謂右去行遲止一二日也直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也師古曰不意其猝至太尉如其計至雒陽使吏搜殽黽間果得吳伏兵廼請渉為䕶軍亞夫至會兵滎陽師古曰㑹集也吳方攻梁梁急請救亞夫引兵東北走昌邑師古曰走音奏深壁而守梁王使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓髙侯等絶吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚内相攻擊擾亂至於帳下亞夫堅卧不起宋祁曰浙本堅作終頃之復定吳奔壁東南陬如淳曰陬隅也師古曰音子侯反又音鄒亞夫使備西北已而其精兵果奔西北不得入劉奉世曰兩陣相向吳奔東南陬則西北在陣後何由奔之盖亞夫令備西南陬傳者但欲見能料敵反其所攻不知遂失實也吳楚既餓廼引而去亞夫出精兵追擊大破吳王濞吳王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵因乗勝遂盡虜之降其縣購吳王千金月餘越人斬吳王頭以告凡相守攻三月而吳楚破平於是諸將廼以太尉計謀為是由此梁孝王與亞夫有隙歸復置太尉官五歲遷為丞相景帝甚重之上廢栗太子亞夫固爭之不得上由此疏之而梁孝王每朝常與太后言亞夫之短竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯師古曰南皮竇彭祖太后弟長君之子章武太后母弟廣國及臣即位廼侯之信未得封也竇太后曰人生各以時行耳師古曰言富貴當及己身也竇長君在時竟不得侯死後廼其子彭祖顧得侯師古曰顧反也吾甚恨之帝趣侯信也師古曰趣讀曰促上曰請得與丞相計之宋祁曰景本計之字下又有與丞相計之五字亞夫曰髙帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上黙然而沮師古曰沮者止壊之意也音才與反其後匈奴王徐盧等五人降漢師古曰功臣表云唯徐盧上欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用廼悉封徐盧等為列侯亞夫因謝病免相頃之上居禁中召亞夫賜食獨置大胾師古曰胾大臠音側吏反宋祁曰浙本注云大胾大臠也無切肉又不置箸亞夫心不平顧謂尚席取箸應劭曰尚席主席者也上視而笑曰此非不足君所乎孟康曰設胾無箸者此非不足滿於君所乎嫌恨之也如淳曰非故不足君之食具偶失之也師古曰孟説近之帝言賜君食而不設箸此由我意於君有不足乎宋祁曰浙本注文由我字上有豈不二字亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以葬者如淳曰工官官名也張晏曰被具也五百具甲楯也師古曰被音皮義反取庸苦之不與錢師古曰庸謂賃也苦謂極苦使也宋祁曰浙本注文賃字下有作者字庸知其盜買縣官器怨而上變告子事連汙亞夫書既聞上下吏宋祁曰浙本下字下有之字吏簿責亞夫如淳曰簿音主簿之簿簿問其辭情師古曰簿問者書之於簿一一問之也亞夫不對上罵之曰吾不用也孟康曰言不用汝對欲殺之也如淳曰恐獄吏畏其復用事不敢折辱也師古曰孟説是也一云帝責此吏云不勝其任吾不用汝故召亞夫令詣廷尉也召詣}
