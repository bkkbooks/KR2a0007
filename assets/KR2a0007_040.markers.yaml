  - {type: variant, offset: 17, length: 2, content: 誦詩, krp: 盡封又恐見疑過失及誅故相聚而謀反耳上廼憂曰為將奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我服䖍曰未起之時與我有故怨也師古曰毎以勇力困辱髙祖我欲殺之為功多不忍良曰今急先封雍齒以示羣臣羣臣見雍齒先封則人人自堅矣於是上置酒封雍齒為什方侯蘇林曰漢中縣也師古曰地理志屬廣漢非漢中也今則屬益州什音十而急趣丞相御史定功行封師古曰趣音促羣臣罷酒皆喜曰雍齒且侯我屬無患矣劉敬説上都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成臯西有殽黽師古曰殽山也黽池也音湎宋祁曰注文當作殽殽山也黽黽池也背河郷雒其固亦足恃師古曰郷讀曰嚮良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里師古曰沃者溉灌也言其土地皆有溉灌之利故云沃野南有巴蜀之饒北有胡苑之利師古曰謂安定北地上郡之北與胡相接之地可以畜牧者也飬禽獸謂之苑阻三面而固守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師師古曰輓引也輓音晩諸侯有變順流而下足以委輸此所謂金城千里天府之國師古曰財物所聚謂之府言關中之地物産饒多可備贍給故稱天府也劉敬説是也於是上即日駕西都關中良從入關性多疾即道引不食穀孟康曰服辟榖藥而静居行氣道讀曰導閉門不出歲餘上欲廢太子立戚夫人子趙王如意大臣多争未能得堅決也呂后恐不知所為或謂呂后曰留侯善畫計上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子師古曰言日日欲易之君安得髙枕而臥師古曰安焉也良曰始上數在急困之中幸用臣䇿今天下安定以愛欲易太子骨肉之間雖臣等百人何益呂澤彊要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人師古曰顧念也四人謂園公綺里季夏黄公甪里先生所謂商山四皓也四人年老矣皆以上嫚娒士師古曰嫚與慢同娒古侮字故逃匿山中義不為漢臣然上髙此四人今公誠能毋愛金玉璧帛令太子為}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 卑辭安車因使辨士固請宜來師古曰宜應得其來來以為客時從入朝令上見之則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上疾欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣廼説建成侯曰太子將兵有功即位不益師古曰太子嗣君貴已極矣雖更立功位無加益矣無功則從此受禍且太子所與俱諸將皆與上定天下梟將也今廼使太子將之此無異使羊將狼皆不肯為用其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常居前上曰終不使不肖子居愛子上劉攽曰曰字後人妄加明其代太子位必矣君何不急請呂后承間為上泣師古曰因空隙之時言黥布天下猛將善用兵今諸將皆陛下故等夷師古曰夷平也言故時皆齊等廼令太子將此}
  - {type: page-break, offset: 20, content: '', id: KR2a0007_WYG_040-12a, image: WYG0250/WYG0250-0028a.png}
  - {type: variant, offset: 20, length: 0, content: '', krp: 卑辭安車因使辨士固請宜來師古曰宜應得其來來以為客時從入朝令上見之則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎此四人四人至客建成侯所漢十一年黥布反上疾欲使太子往擊之四人相謂曰凡來者將以存太子太子將兵事危矣廼説建成侯曰太子將兵有功即位不益師古曰太子嗣君貴已極矣雖更立功位無加益矣無功則從此受禍且太子所與俱諸將皆與上定天下梟將也今廼使太子將之此無異使羊將狼皆不肯為用其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王常居前上曰終不使不肖子居愛子上劉攽曰曰字後人妄加明其代太子位必矣君何不急請呂后承間為上泣師古曰因空隙之時言黥布天下猛將善用兵今諸將皆陛下故等夷師古曰夷平也言故時皆齊等廼令太子將此}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 莫肯為用且布聞之鼓行而西耳師古曰擊鼓而行言無所畏上雖疾彊載輜車卧而䕶之師古曰輜車衣車也䕶謂監領諸將諸將不敢不盡力上雖苦彊為妻子計於是呂澤夜見呂后宋祁云浙本夜字上有立字呂后承間為上泣而言如四人意上曰吾惟之豎子固不足遣師古曰惟思也廼公自行耳師古曰廼公汝父也於是上自將而東羣臣居守皆送至霸上良疾彊起至曲郵師古曰在新豐西今俗謂之郵頭見上曰臣宜從疾甚楚人剽疾願上愼毋與楚爭鋒師古曰剽音匹妙反因説上令太子為將軍監關中兵上謂子房雖疾彊卧傅太子是時叔孫通已為太傅良行少傅事漢十二年上從破布歸疾益甚愈欲易太子良諫不聼因疾不視事叔孫太傅稱説引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘湏眉皓白衣冠甚偉師古曰所以謂之四皓上怪問曰何為者四人前對各言其姓名上廼驚曰吾求公避逃我今公何自從吾兒游乎四人曰陛下輕士善罵臣等義不辱故恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調䕶太子師古曰調謂和平之䕶謂保安之四人為壽已畢趨去上目送之師古曰以目瞻之訖其出也召戚夫人指視曰師古曰視讀曰示我欲易之彼四人為之輔羽翼已成難動矣呂氏眞廼主矣師古曰廼汝也戚夫人泣涕上曰為我楚舞吾為若楚歌師古曰若亦汝也歌曰鴻鵠髙飛一舉千里師古曰鵠音胡督反羽翼以就横絶四海師古曰就成也絶謂飛而直度也横絶四海又可奈何雖有矰繳尚安所施師古曰繳弋射也其矢為矰矰音増繳音之若反歌數闋師古曰闋盡也曲終為闋音口穴反戚夫人歔欷流涕師古曰歔音虚欷音稀又音許氣反上起去罷酒竟不易太子者良本招此四人之力也良從上擊代出竒計下馬邑及立蕭相國服䖍曰何時未為相國良勸髙祖立之所與從容言天下事甚衆師古曰從音千容反宋祁曰浙本所與字下有上字非天下所以存亡故不著師古曰著謂書之於史著音竹助反良廼稱曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳師古曰赤松子仙人號也神農時為雨師服水玉教神農能入火自燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙俱去廼學道欲輕舉師古曰道謂仙道髙帝崩呂后德良廼彊食之師古曰食讀曰飤曰人生一世間如白駒之過隙師古曰解在魏豹傳何自苦如此良不得已彊聼食後六歲薨諡曰}
