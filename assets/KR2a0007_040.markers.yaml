  - {type: variant, offset: 1190, length: 4, content: 本誼具道, WYG: 事也如良受書老父亦異矣髙祖數離困阸良常有力師古曰離遭也豈可謂非天乎陳平之志見於社下傾側擾攘楚魏之間卒歸於漢而為謀臣宋祁曰一作謀主及呂后時事多故矣師古曰故謂中屯難也平竟自免以智終王陵廷爭杜門自絶亦各其志也周勃為布衣時鄙樸庸人至登輔佐匡國家難誅諸呂立孝文為漢伊周師古曰處伊尹周公之任何其盛也始呂后問宰相髙祖曰陳平智有餘王陵少戇可以佐之師古曰戇愚也舊音下紺反今讀音竹巷反安劉氏者必勃也又問其次云過此以後非廼}
