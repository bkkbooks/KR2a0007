  - {type: variant, offset: 7516, length: 302, content: 其吏民繇役往來長安者自悉而補中道衣敝錢用諸費稱此其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其勢不可久臣之愚計願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南揵之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下高枕終亡山東之憂矣此二世之利也當今恬然適遇諸侯之皆少數歲之後陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意高拱以成六國之禍難以言智苟身亡事畜亂宿禍孰視而不定萬年之後傳之老母弱子將使不寧不可謂仁臣聞聖主言問其臣而不自造事故使人臣得畢其愚忠唯陛下財幸文帝於是從誼計乃徙淮陽王武為梁王北界泰山西至高陽得大縣, WYG: 書卷}
