  - {type: variant, offset: 7820, length: 558, content: 餘城徙城陽王喜為淮南王撫其民時又封淮南厲王四子皆為列侯誼知上必將復王之也上疏諫曰竊恐陛下接王淮南諸子曾不與如臣者孰計之也淮南王之悖逆亡道天下孰不知其辠陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壯豈能忘其父哉白公勝所為父報仇者大父與伯父叔父也白公為亂非欲取國代主也發憤快志剡手以衝仇人之匈固為俱靡而已淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於策不便雖割而為四四子一心也予之眾積之財此非有子胥白公報於廣都之中即疑有剸諸荊軻起於兩柱之間所謂假賊兵為虎翼者也願陛下少留計梁王勝墜馬死誼自傷為傅無狀常哭泣後歲餘亦死賈生之死年三十三矣後四歲齊文王薨亡子文帝思賈生之言乃分齊為六國盡立悼惠王子六人為王又遷淮南王喜於城陽而分淮南為三國盡立厲王三子以王之後十年文帝崩景帝立三年而吳楚趙與四齊王合從舉兵西鄉京師梁王扞之卒破七國至武帝時淮南厲王子為王者兩國亦反誅孝武初立舉賈生之孫二人至郡守賈嘉最好學世其家贊曰劉向稱賈誼言三代與秦治亂之意其論甚美通達國體雖古之伊管未能遠過也使時見用功化必盛為庸臣所害甚可悼痛追觀孝文玄默躬行以移風俗誼之所陳略施行矣及欲改定制度以漢為土德色上黃數用五及欲試屬國施五餌三表以係單于其術固以疏矣誼亦天年早終雖不至公卿未為不遇也凡所著述五十八篇掇其切於世事者著于傳云, WYG: 考證}
