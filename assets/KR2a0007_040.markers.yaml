  - {type: variant, offset: 3222, length: 1313, content: 也而漢歲致金絮采繒以奉之夷狄徵令是主上之操也天子共貢是臣下之禮也足反居上首顧居下倒縣如此莫之能解猶為國有人乎非亶倒縣而已又類辟且病痱夫辟者一面病痱者一方痛今西邊北邊之郡雖有長爵不輕得復五尺以上不輕得息斥候望熢燧不得臥將吏被介冑而睡臣故曰一方病矣醫能治之而上不使可為流涕者此也陛下何忍以帝皇之號為戎人諸侯勢既卑辱而禍不息長此安窮進謀者率以為是固不可解也亡具甚矣臣竊料匈奴之眾不過漢一大縣以天下之大困於一縣之眾甚為執事者羞之陛下何不試以臣為屬國之官以主匈奴行臣之計請必係單于之頸而制其命伏中行說而笞其背舉匈奴之眾唯上之令今不獵猛敵而獵田彘不搏反寇而搏畜菟翫細娛而不圖大患非所以為安也德可遠施威可遠加而直數百里外威令不信可為流涕者此也今民賣僮者為之繡衣絲履偏諸緣內之閑中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皁綈而富民牆屋被文繡天子之后以緣其領庶人㜸妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國已屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二歲秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相說則反脣而相稽其慈子耆利不同禽獸者亡幾耳然并心而赴時猶曰蹶六國兼天下功成求得矣終不知反廉愧之節仁義之厚信并兼之法遂進取之業天下大敗眾掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海內德從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐廉恥日甚可謂月異而歲不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寢戶之簾搴兩廟之器白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故至於俗流失世壞敗因恬而不知怪慮不動於耳目以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞筦子曰禮義廉恥是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而少知治禮則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歲而社稷為虛今四維猶未備也故姦人幾幸而眾心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而群臣眾信上不疑惑此業壹定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波舩必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相遠也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮使士負之有司齊肅端冕見之南郊見于天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在繈抱之中召公為太保周公, WYG: ''}
