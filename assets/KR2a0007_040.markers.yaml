  - {type: punctuation, offset: 4745, content: 「, id: KR2a0007_tls_040-bkkpn925}
  - {type: variant, offset: 4745, length: 487, content: 少成若天性習貫如自然及太子少長知妃色則入于學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考於太傅太傅罰其不則而匡其不及則德智長而治道得矣此五學者既成於上則百姓黎民化輯於下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦箴諫大夫進謀士傳民語習與智長故切而不媿化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趣中肆夏所以明有度也其於禽獸見其生不食其死聞其聲不食其肉故遠庖廚所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代之所以長久者其已事可知也然而不能從者是不, WYG: 祭}
