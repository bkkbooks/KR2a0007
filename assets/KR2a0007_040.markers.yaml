  - {type: variant, offset: 6304, length: 1136, content: 忌器之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履夫嘗已在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司寇編之徒官司寇小吏詈罵而榜笞之殆非所以令眾庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬眾庶之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行眾人畜我我故眾人事之智伯國士遇我我故國士報之故此一豫讓也反君事讎行若狗彘已而抗節致忠行出虖列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡恥奊詬亡節廉恥不立且不自好苟若而可故見利則逝見便則奪主上有敗則因而挻之矣主上有患則吾苟免而已立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此群下至眾而主上至少也所託財器職業者粹於群下也俱亡恥俱苟妄則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之節也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾坐汙穢淫亂男女亡別者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其辠矣猶未斥然正以謼之也尚遷就而為之諱也故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請辠耳上不執縛係引而行也其有中罪者聞命而自弛上不使人頸盭而加也其有大辠者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故群臣自憙嬰以廉恥故人矜節行上設廉恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不苟去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者比物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲廉恥行禮誼之所致也主上何喪焉此之不為而顧彼之久行故曰可為長太息者此也是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自甯成始初文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地居數年梁王勝死亡子誼復上疏曰陛下即不定制如今之勢不過一傳再傳諸侯猶且人恣而不制豪植而大強漢法不得行矣陛下所以為蕃扞及皇太子之所恃者唯淮陽代二國耳代北邊匈奴與強敵為鄰能自完則足矣而淮陽之比大諸侯廑如黑子之著面適足以餌大國耳不足以有所禁禦方今制在陛下制國而令子適足以為餌豈可謂工哉人主之行異布衣布衣者飾小行競小廉以自託於鄉黨人主唯天下安社稷固不耳高皇帝瓜分天下以王, WYG: 取史記}
