  - {type: variant, offset: 15, length: 0, content: '', krp: 矣誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗廼公事師古曰輟止也哺食在口中者也幾近也哺音捕幾音鉅依反令趣銷印師古曰趣讀曰促後韓信破齊欲自立為齊王宋祁曰齊王上疑有假字漢王怒良説漢王漢王使良授齊王信印語在信傳五年冬漢王追楚至陽夏南師古曰夏音工雅反戰不利壁固陵諸侯期不至良説漢王漢王用其計諸侯皆至語在髙紀漢六年封功臣良未嘗有戰鬬功髙帝曰運籌䇿帷幄中決勝千里外子房功也自擇齊三萬户良曰始臣起下邳與上會留此天}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户廼封良為留侯與蕭何等俱封宋祁云浙本封作拜上已封大功臣二十餘人宋祁云浙本無上字其餘日夜争功而不決宋祁云浙本無而字未得行封上居雒陽南宮從復道望見諸將師古曰復讀曰複往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反師古曰屬近也言近始安屬音之欲反良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以徧封此屬畏陛下不}
  - {type: page-break, offset: 16, content: '', id: KR2a0007_WYG_040-9b, image: WYG0250/WYG0250-0026d.png}
  - {type: variant, offset: 16, length: 0, content: '', krp: 臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户廼封良為留侯與蕭何等俱封宋祁云浙本封作拜上已封大功臣二十餘人宋祁云浙本無上字其餘日夜争功而不決宋祁云浙本無而字未得行封上居雒陽南宮從復道望見諸將師古曰復讀曰複往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反師古曰屬近也言近始安屬音之欲反良曰陛下起布衣與此屬取天下今陛下已為天子而所封皆蕭曹故人所親愛而所誅者皆平生仇怨今軍吏計功天下不足以徧封此屬畏陛下不}
  - {type: variant, offset: 17, length: 2, content: 誦詩, WYG: 盡封又恐見疑過失及誅故相聚而謀反耳上廼憂曰為將奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數窘辱我服䖍曰未起之時與我有故怨也師古曰毎以勇力困辱髙祖我欲殺之為功多不忍良曰今急先封雍齒以示羣臣羣臣見雍齒先封則人人自堅矣於是上置酒封雍齒為什方侯蘇林曰漢中縣也師古曰地理志屬廣漢非漢中也今則屬益州什音十而急趣丞相御史定功行封師古曰趣音促羣臣罷酒皆喜曰雍齒且侯我屬無患矣劉敬説上都關中上疑之左右大臣皆山東人多勸上都雒陽雒陽東有成臯西有殽黽師古曰殽山也黽池也音湎宋祁曰注文當作殽殽山也黽黽池也背河郷雒其固亦足恃師古曰郷讀曰嚮良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫關中左殽函右隴蜀沃野千里師古曰沃者溉灌也言其土地皆有溉灌之利故云沃野南有巴蜀之饒北有胡苑之利師古曰謂安定北地上郡之北與胡相接之地可以畜牧者也飬禽獸謂之苑阻三面而固守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師師古曰輓引也輓音晩諸侯有變順流而下足以委輸此所謂金城千里天府之國師古曰財物所聚謂之府言關中之地物産饒多可備贍給故稱天府也劉敬説是也於是上即日駕西都關中良從入關性多疾即道引不食穀孟康曰服辟榖藥而静居行氣道讀曰導閉門不出歲餘上欲廢太子立戚夫人子趙王如意大臣多争未能得堅決也呂后恐不知所為或謂呂后曰留侯善畫計上信用之呂后乃使建成侯呂澤劫良曰君常為上謀臣今上日欲易太子師古曰言日日欲易之君安得髙枕而臥師古曰安焉也良曰始上數在急困之中幸用臣䇿今天下安定以愛欲易太子骨肉之間雖臣等百人何益呂澤彊要曰為我畫計良曰此難以口舌爭也顧上有所不能致者四人師古曰顧念也四人謂園公綺里季夏黄公甪里先生所謂商山四皓也四人年老矣皆以上嫚娒士師古曰嫚與慢同娒古侮字故逃匿山中義不為漢臣然上髙此四人今公誠能毋愛金玉璧帛令太子為}
