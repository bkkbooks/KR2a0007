  - {type: variant, offset: 1770, length: 253, content: 有加焉猶尚如是況莫大諸侯權力且十此者虖然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上偏置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黃帝曰日中必熭操刀必割今令此道順而全安甚易不肯早為已乃墮骨肉之屬而抗剄之豈有異秦之季世虖夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又以知陛下有所必不能矣假設天下如曩時淮陰侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫高為相盧綰王燕陳豨在代令此六七公者皆亡恙, WYG: ''}
