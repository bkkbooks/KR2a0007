  - {type: variant, offset: 15, length: 0, content: '', WYG: 矣誠用此謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗廼公事師古曰輟止也哺食在口中者也幾近也哺音捕幾音鉅依反令趣銷印師古曰趣讀曰促後韓信破齊欲自立為齊王宋祁曰齊王上疑有假字漢王怒良説漢王漢王使良授齊王信印語在信傳五年冬漢王追楚至陽夏南師古曰夏音工雅反戰不利壁固陵諸侯期不至良説漢王漢王用其計諸侯皆至語在髙紀漢六年封功臣良未嘗有戰鬬功髙帝曰運籌䇿帷幄中決勝千里外子房功也自擇齊三萬户良曰始臣起下邳與上會留此天}
