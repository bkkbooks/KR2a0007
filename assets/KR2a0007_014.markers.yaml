  - {type: variant, offset: 513, length: 0, content: '', WYG: 師古曰監視也二代夏殷也三聖制法師古曰三聖謂文王武王及周公也立爵五等師古曰公侯伯子男封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地臣瓉曰}
  - {type: page-break, offset: 513, content: '', id: KR2a0007_WYG_014-1b, image: WYG0249/WYG0249-0195b.png}
  - {type: variant, offset: 513, length: 0, content: '', krp: 師古曰監視也二代夏殷也三聖制法師古曰三聖謂文王武王及周公也立爵五等師古曰公侯伯子男封國八百同姓五十有餘周公康叔建於魯衛各數百里太公於齊亦五侯九伯之地臣瓉曰}
  - {type: variant, offset: 514, length: 4, content: 文尤具事, WYG: 記王制云五國以為屬屬有長二百一十國以為州州有伯師古曰五侯五等諸侯也九伯九州之伯也伯長也詩載其制曰介人惟藩大師惟垣大邦惟屛大宗惟翰懐徳惟寧宗子惟城毋俾城壊毋獨斯畏師古曰大雅板之詩也介善也藩籬也屛蔽也垣墻也翰幹也懐和也俾使也以善人}
  - {type: variant, offset: 514, length: 4, content: 文尤具事, krp: 記王制云五國以為屬屬有長二百一十國以為州州有伯師古曰五侯五等諸侯也九伯九州之伯也伯長也詩載其制曰介人惟藩大師惟垣大邦惟屛大宗惟翰懐徳惟寧宗子惟城毋俾城壊毋獨斯畏師古曰大雅板之詩也介善也藩籬也屛蔽也垣墻也翰幹也懐和也俾使也以善人}
  - {type: punctuation, offset: 517, content: ，, id: KR2a0007_tls_014-bkkpn104}
  - {type: 'tls:seg', offset: 517, content: '', id: KR2a0007_tls_014-4a.10}
  - {type: variant, offset: 520, length: 2, content: 制曲, WYG: 藩籬謂封周公康叔於魯衛以大師為垣墻謂封太公於齊也大邦以為屏蔽謂成國諸侯也大宗以為楨幹謂王之同姓也能和其徳則天下安寧分建宗子則列城堅固城不可使墮壊宗不可使单獨单獨墮壊則畏懼斯至所以親親賢賢襃表功徳師古曰親賢俱封功徳並建關諸盛衰深根固本為不可拔者也故盛則周邵相其治致刑錯衰則五伯扶其弱與共守師古曰伯讀曰霸此五霸謂齊桓宋襄晉文秦穆吴夫差也自幽平之後日以陵夷師古曰陵夷言如山陵之漸平夷謂頽替也至虖阸䧢河洛之間應劭曰阸者狹也䧢者踦􅛤也西廹强秦東有韓魏數見侵暴踦􅛤不安也師古曰阸音於懈反䧢音區分為二周師古曰謂東西二周也有逃責之臺被竊鈇之言服䖍曰周赧王負責無以歸之主廹責急乃逃於此臺後人因以名之劉徳曰洛陽南宫謻臺是也應劭曰竊鈇謂出至路邉竊取人鈇也師古曰應説非也鈇鉞王者以為威用斬戮也言周室衰微政令不行於天下雖有鈇鉞無所用之是謂私竊隠藏之耳被音皮義反鈇音膚謻音移又音直移反然天下謂之共主如淳曰雖至微弱猶共以}
  - {type: page-break, offset: 520, content: '', id: KR2a0007_WYG_014-2a, image: WYG0249/WYG0249-0195c.png}
