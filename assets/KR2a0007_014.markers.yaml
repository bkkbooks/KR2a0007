  - {type: punctuation, offset: 5, content: 《, id: KR2a0007_tls_014-bkkpn3}
  - {type: variant, offset: 5, length: 503, content: 六經之道同歸而禮樂之用為急治身者斯須忘禮則暴嫚入之矣為國者一朝失禮則荒亂及之矣人函天地陰陽之氣有喜怒哀樂之情天稟其性而不能節也聖人能為之節而不能絕也故象天地而制禮樂所以通神明立人倫正情性節萬事者也人性有男女之情妒忌之別為制婚姻之禮有交接長幼之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道苦而淫辟之罪多鄉飲之禮廢則長幼之序亂而爭鬭之獄蕃喪祭之禮廢則骨肉之恩薄而背死忘先者眾朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫善於禮移風易俗莫善於樂禮節民心樂和民聲政以行之刑以防之禮樂政刑四達而不誖則王道備矣樂以治內而為同禮以修外而為異同則和親異則畏敬和親則無怨畏敬則不爭揖讓而天下治者禮樂之謂也二者並行合為一體畏敬之意難見則著之於享獻辭受登降跪拜和親之說難形則發之於詩歌詠言鐘石筦弦蓋嘉其敬意而不及其財賄美其歡心而不流其聲音故孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉此禮樂之本也故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也王者必因前王之禮順時施宜有所損益即民之心稍稍制作至太平而大備, WYG: 昔}
