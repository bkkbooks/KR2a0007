  - {type: variant, offset: 614, length: 4, content: 叔孫通制, WYG: 漢諸侯王厥角首應劭曰厥者頓也角者額角也稽首首至地也言王莽漸漬威福日久亦值漢之單弱王侯見莽篡弑莫敢怨望皆頓角稽首至地而上其璽綬也晉灼曰厥猶豎也叩頭則額角豎師古曰應説是也音口}
