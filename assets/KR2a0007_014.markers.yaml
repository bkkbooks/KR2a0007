  - {type: variant, offset: 608, length: 0, content: '', WYG: 矣師古曰撟與矯同枉曲也正曲曰矯言矯秦孤立之敗而大封子弟過於强盛有失中也雖然高祖創業}
  - {type: variant, offset: 608, length: 0, content: '', krp: 矣師古曰撟與矯同枉曲也正曲曰矯言矯秦孤立之敗而大封子弟過於强盛有失中也雖然高祖創業}
  - {type: punctuation, offset: 612, content: ，, id: KR2a0007_tls_014-bkkpn128}
  - {type: 'tls:seg', offset: 612, content: '', id: KR2a0007_tls_014-5a.5}
  - {type: variant, offset: 612, length: 0, content: '', WYG: 孝惠享國又淺高后女主攝位而海内晏如師古曰晏如安然也亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤横逆以害身䘮國師古曰易睽卦九四爻辭曰睽孤見豕負塗睽孤乖剌之意睽音工擕反故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之册下推恩之令使諸侯王得分戸邑以封子弟不行黜陟而藩國自析自此以來齊分為七師古曰謂齊城陽濟北濟南淄川膠西膠東也趙分為六師古曰謂趙平原真定中山廣川河間也梁分為五師古曰謂梁濟川濟東山陽濟隂也淮南分為三師古曰謂淮南衡山廬江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣如淳曰長沙之南更置郡燕代以北更置縁邊郡其所有饒利兵馬器械三國皆失之也景遭七國之難抑損諸侯減黜其官師古曰謂改丞相曰相省御史大夫廷尉少府宗正博士損大夫謁者諸官長丞員等也武有衡山淮南之謀作左官之律服䖍曰仕於諸侯為左官絶不得使仕於王侯也應劭曰人道上右今舍天子而仕諸侯故謂之左官也師古曰左官}
  - {type: page-break, offset: 612, content: '', id: KR2a0007_WYG_014-4b, image: WYG0249/WYG0249-0196d.png}
  - {type: page-break, offset: 612, content: '', id: KR2a0007_WYG_014-5a, image: WYG0249/WYG0249-0197a.png}
  - {type: variant, offset: 612, length: 0, content: '', krp: 孝惠享國又淺高后女主攝位而海内晏如師古曰晏如安然也亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越法大者睽孤横逆以害身䘮國師古曰易睽卦九四爻辭曰睽孤見豕負塗睽孤乖剌之意睽音工擕反故文帝采賈生之議分齊趙景帝用鼂錯之計削吳楚武帝施主父之册下推恩之令使諸侯王得分戸邑以封子弟不行黜陟而藩國自析自此以來齊分為七師古曰謂齊城陽濟北濟南淄川膠西膠東也趙分為六師古曰謂趙平原真定中山廣川河間也梁分為五師古曰謂梁濟川濟東山陽濟隂也淮南分為三師古曰謂淮南衡山廬江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣如淳曰長沙之南更置郡燕代以北更置縁邊郡其所有饒利兵馬器械三國皆失之也景遭七國之難抑損諸侯減黜其官師古曰謂改丞相曰相省御史大夫廷尉少府宗正博士損大夫謁者諸官長丞員等也武有衡山淮南之謀作左官之律服䖍曰仕於諸侯為左官絶不得使仕於王侯也應劭曰人道上右今舍天子而仕諸侯故謂之左官也師古曰左官}
  - {type: variant, offset: 613, length: 0, content: '', WYG: 言左道也皆僻左不正應説是也漢時依上古法朝廷之列以右為尊故謂降秩為左遷仕諸侯為左官也設附益之法張晏曰律鄭氏説封諸侯過限曰附益或曰阿媚王侯有重法也師古曰附益者蓋取孔子云求也為之聚歛而附益之之義也皆背正法而厚於私家也諸侯惟得衣食税租不與政事師古曰與讀曰豫至於哀平之際皆繼體苗裔親屬踈逺師古曰言非始封之君皆其後裔也故於天子益踈逺矣生於帷墻之中不為士民所尊埶與富室亡異而本朝短世國統三絶師古曰謂成哀平皆早崩又無繼嗣是故王莽知漢中外殫微本末俱弱師古曰殫盡也音單亡所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下師古曰序謂東西廂顓與專同作謀既成遂據南面之尊分遣五威之吏馳傳天下班行符}
  - {type: page-break, offset: 613, content: '', id: KR2a0007_WYG_014-5b, image: WYG0249/WYG0249-0197b.png}
