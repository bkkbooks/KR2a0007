  - {type: variant, offset: 7365, length: 6, content: 可罷沛吹鼓員, WYG: 師古曰此表列諸王次第與本傳不同者本傳因母氏之次而盡言所生表則敘其昆弟長幼又臨江閔王封時年月在後故不同也它皆類此右孝武四人六安真定泗水平干四人隨父凡八人右孝元二人廣陵繼絶凡三人孝成時河間廣徳定陶三國孝哀時廣平一國孝平時東平中山廣徳廣世廣宗五國皆繼絶劉攽曰高帝封諸侯王其子孫無有與漢俱存亡者文帝封梁王城陽菑川景帝封河間長沙中山常山昭帝封廣陽廣陵高密此數國至王莽簒漢而廢宣帝所封有至王莽時者年淺不足云前漢書卷十四前漢書卷十四考證諸侯王表衰則五伯扶其弱與共守注此五霸謂齊桓宋襄晉文秦穆吳夫差也臣召南按五霸之説不一通三代言曰夏昆吾商大彭豕韋周齊桓晉文異姓諸侯王表適戍彊于五伯注是也此文專言周衰故注異解其不數楚莊而數吳夫差者楚僭王未有扶弱之事吳夫差黄池之會嘗共貢職于周也奄有龜䝉為梁楚注龜䝉二水名臣浩按二水名應作二山名凡十五郡臣召南按師古無注此以秦地計之於三十六郡中得十五郡也内史一河東二河南河内即三川郡三東郡四潁川五南陽六南郡七蜀郡八巴郡九漢中十隴西十一北地}
