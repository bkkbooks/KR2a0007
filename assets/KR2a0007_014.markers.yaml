  - {type: variant, offset: 1077, length: 2267, content: 之獄矣至周末世大為無道以失天下秦繼其後又益甚之自古以來未嘗以亂濟亂大敗天下如秦者也習俗薄惡民人抵冒今漢繼秦之後雖欲治之無可柰何法出而姦生令下而詐起一歲之獄以萬千數如以湯止沸沸俞甚而無益辟之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也故漢得天下以來常欲善治而至今不能勝殘去殺者失之當更化而不能更化也古人有言臨淵羨魚不如歸而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治而災害日去福祿日來矣是時上方征討四夷銳志武功不暇留意禮文之事至宣帝時琅邪王吉為諫大夫又上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書斷獄聽訟而已此非太平之基也今俗吏所以牧民者非有禮義科指可世世通行者也以意穿鑿各取一切是以詐偽萌生刑罰無極質樸日消恩愛寖薄孔子曰安上治民莫善於禮非空言也願與大臣延及儒生述舊禮明王制驅一世之民濟之仁壽之域則俗何以不若成康壽何以不若高宗上不納其言吉以病去至成帝時犍為郡於水濱得古磬十六枚議者以為善祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖攘之容以風化天下如此而不治者未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非皋陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦弦之間小不備因是絕而不為是去小不備而就大不備大不備王先謙說大不備三字誤衍或古惑字通鑑不重三字或作惑是所見本不誤或莫甚焉夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫至於陷大辟受刑戮者不絕繇不習五常之道也夫承千歲之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理不示以大化而獨敺以刑罰終已不改故曰導之以禮樂而民和睦初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議會向病卒丞相大司空奏請立辟雍案行長安城南營表未作遭成帝崩群臣引以定諡及王莽為宰衡欲燿眾庶遂興辟廱因以篡位海內畔之世祖受命中興撥亂反正改定京師于土中即位三十年四夷賓服百姓家給政教清明及營立明堂辟廱顯宗即位躬行其禮宗祀光武皇帝于明堂養三老五更於辟廱威儀既盛美矣然德化未流洽者禮樂未具群下無所誦說而庠序尚未設之故也孔子曰辟如為山未成一匱止吾止也今叔孫通所撰禮儀與律令同錄臧於理官法家又復不傳漢典寢而不著民臣莫有言者又通沒之後河間獻王采禮樂古事稍稍增輯至五百餘篇今學者不能昭見但推士禮以及天子說義又頗謬異故君臣長幼交接之道浸以不章樂者聖人之所樂也而可以善民心其感人深其移風易俗易故先王著其教焉夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉是以纖微癄瘁之音作而民思憂闡諧嫚易之音作而民康樂麤厲猛奮之音作而民剛毅廉直正誠之音作而民肅敬寬裕和順之音作而民慈愛流辟邪散之音作而民淫亂先王恥其亂也故制雅頌之聲本之情性稽之度數制之禮儀合生氣之和導五常之行使之陽而不散陰而不集剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也景祐本如此足以感動人之善心而景祐本如此也景祐本如此不使邪氣得接焉是先王立樂之方也王者未作樂之時因先王之樂以教化百姓說樂其俗然後改作以章功德易曰先王以作樂崇德殷薦之上帝以配祖考昔黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之道也武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也咸池備矣自夏以往其流不可聞已殷頌猶有存者周詩既備而其器用張陳周官具焉典者自卿大夫師瞽以下皆選有道德之人朝夕習業以教國子國子者卿大夫之子弟也皆學歌九德誦六詩習六舞五聲八音之和故帝舜命夔曰女典樂教冑子直而溫寬而栗剛而無虐簡而無敖詩言志歌詠言聲依詠律和聲八音克諧此之謂也又以外賞諸侯德盛而教尊者其威儀足以充目音聲足以動耳詩語足以感心故聞其音而德和省其詩而志正論其數而法立是以薦之郊廟則鬼神饗作之朝廷則群臣和立之學官則萬民協聽者無不虛己竦神說而承流是以海內徧知上德被服其風光煇日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰書云擊石拊石百獸率舞鳥獸且猶感應而況於人乎況於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在是謂淫過凶嫚之聲為設禁焉世衰民散小人乘君子心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂乃作淫聲用變亂正聲以說婦人樂官師瞽抱其器而犇散或適諸侯或入河海夫樂本情性浹肌膚而臧骨髓雖經乎千載其遺風餘烈尚猶不絕至春秋時陳公子完犇齊陳舜之後招樂存焉故孔子適齊聞招三月不知肉味曰不圖為樂之至於斯美之甚也周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所是時周室大壞諸侯恣行設兩觀乘大路陪臣管仲季氏之屬三歸雍徹八佾舞廷制度遂壞陵夷而不反桑間濮上鄭衛宋趙之聲並出內則致疾損壽外則亂政傷民巧偽因而飾之以營亂富貴之耳目庶人以求利列國以相間故秦穆遺戎而由余去齊人餽魯而孔子行至於六國魏文侯最為好古而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納自此禮樂喪矣漢興樂家有制氏以雅樂聲律世世在大樂官但能紀其鏗鎗鼓舞而不能言其義高祖時叔孫通因秦樂人制宗廟樂大祝迎神于廟門奏嘉至猶古降神之樂也皇帝入廟門奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌獨上歌不以筦弦亂人聲欲在位者徧聞之猶古清廟之歌也登歌再終下奏休成之樂美神明既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂高祖唐山夫人所作也周有房中樂至秦名曰壽人, WYG: 吳隨父}
