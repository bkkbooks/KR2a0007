  - {type: variant, offset: 628, length: 157, content: 說而歎曰吾乃今日知為天子之貴也以通為奉常遂定儀法未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐廉恥今其甚者殺父兄盜者取廟器而大臣特以簿書不報期會為故至於風俗流溢恬而不怪以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦此非天之所為人之所設也人之所設不為不立不修則壞漢興至今二, WYG: ''}
