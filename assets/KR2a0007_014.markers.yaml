  - {type: variant, offset: 604, length: 2, content: 撥亂, WYG: 之初海内新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵項昭曰漢封功臣大者王小者侯也功臣侯者百有餘邑尊王子弟大啟九國師古曰九國之數在下也自鴈門以東盡遼陽為燕代師古曰遼陽遼水之陽也常山以南太行左轉度河濟漸于海為齊趙師古曰太行山名也左轉亦謂自太行而東也漸入也一曰浸也行音胡剛}
  - {type: page-break, offset: 604, content: '', id: KR2a0007_WYG_014-3b, image: WYG0249/WYG0249-0196b.png}
  - {type: variant, offset: 604, length: 2, content: 撥亂, krp: 之初海内新定同姓寡少懲戒亡秦孤立之敗於是剖裂疆土立二等之爵項昭曰漢封功臣大者王小者侯也功臣侯者百有餘邑尊王子弟大啟九國師古曰九國之數在下也自鴈門以東盡遼陽為燕代師古曰遼陽遼水之陽也常山以南太行左轉度河濟漸于海為齊趙師古曰太行山名也左轉亦謂自太行而東也漸入也一曰浸也行音胡剛}
  - {type: variant, offset: 607, length: 0, content: '', WYG: 漸音子㢘反亦讀如本字榖泗以徃奄有龜蒙為梁楚晉灼曰水經云泗水出魯卞縣臣瓚曰榖在彭城泗之下流為榖水師古曰奄覆也龜蒙二水名東帯江湖薄會稽為荆吳文穎曰即今吴也高帝六年為荆國十年更名吴師古曰荆吴同是一國也北界淮瀕略廬衡為淮南師古曰瀕水涯也音頻又音賔廬衡二山名也波漢之陽亘九嶷為長沙鄭氏曰波音陂澤之陂孟康曰亘竟也音古贈反師古曰波漢之陽者循漢水而徃也水北曰陽波音彼皮反又音彼義反九嶷山名有九峯在零陵營道嶷音疑諸侯比境周帀三垂外接胡越師古曰比謂相接次也三垂謂北東南也比音頻寐反天子自有三河東郡潁川南陽師古曰三河河東河南河内也自江陵以西至巴蜀北自雲中至隴西與京師内史凡十五郡公主列侯頗邑其中師古曰十五郡中又徃徃有列侯公主之邑而藩國大者夸州兼郡連城數十師古曰夸音跨宫室百官同制京師可謂撟枉過其}
  - {type: page-break, offset: 607, content: '', id: KR2a0007_WYG_014-4a, image: WYG0249/WYG0249-0196c.png}
