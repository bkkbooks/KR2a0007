  - {type: variant, offset: 3345, length: 3752, content: 樂樂其所生禮不忘本高祖樂楚聲故房中樂楚聲也孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂高祖王念孫說祖字涉上下文而衍景祐本作高廟是也廟奏武德文始五行之舞孝文廟奏昭德文始四時五行之舞孝武廟奏盛德文始四時五行之舞武德舞者高祖四年作以象天下樂己行武以除亂也文始舞者曰本舜招舞也高祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以明王念孫說明字涉下兩明字而衍景祐本無示天下之安和也蓋樂己所自作明有制也樂先王之樂明有法也孝景采武德舞以為昭德以尊大宗廟至孝宣采昭德舞為盛德以尊世宗廟諸帝廟皆常奏文始四時五行舞云高祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武德舞禮容者主出文始五行舞舞人無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大氐皆因秦舊事焉初高祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝惠時以沛宮為原廟皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已至武帝定郊祀之禮祠太一於甘泉就乾位也祭后土於汾陰澤中方丘也乃立樂府采詩夜誦有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十人造為詩賦略論律呂以合八音之調作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宮而望拜百官侍祠者數百人皆肅然動心焉安世房中歌十七章其詩曰大孝備矣休德昭清高張四縣樂充宮庭芬樹羽林雲景杳冥金支秀華庶旄翠旌七始華始肅倡和聲神來宴娭庶幾是聽粥粥音送細齊人情忽乘青玄熙事備成清思眑眑經緯冥冥我定曆數人告其心敕身齊戒施教申申乃立祖廟敬明尊親大矣孝熙四極爰轃王侯秉德其鄰翼翼顯明昭式清明鬯矣皇帝孝德竟全大功撫安四極海內有姦紛亂東北詔撫成師武臣承德行樂交逆簫勺群慝肅為濟哉蓋定燕國大海蕩蕩水所歸高賢愉愉民所懷大山崔百卉殖民何貴貴有德安其所樂終產樂終產世繼緒飛龍秋游上天高賢愉樂民人豐草葽女羅施善何如誰能回大莫大成教德長莫長被無極靁震震電燿燿明德鄉治本約治本約澤弘大加被寵咸相保德施大世曼壽都荔遂芳窅窊桂華孝奏天儀若日月光乘玄四龍回馳北行羽旄殷盛芬哉芒芒孝道隨世我署文章桂華馮馮翼翼承天之則吾易久遠燭明四極慈惠所愛美若休德杳杳冥冥克綽永福美芳劉奉世說桂華美芳皆二詩章名本側注在前章之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣若劉奉世說桂華美芳皆二詩章名本側注在前章之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣磑磑即即師象山則烏呼孝哉案撫戎國蠻夷竭歡象來致福兼臨是愛終無兵革嘉薦芳矣告靈饗矣告靈既饗德音孔臧惟德之臧建侯之常承保天休令問不忘皇皇鴻明蕩侯休德嘉承天和伊樂厥福在樂不荒惟民之則浚則師德下民咸殖令問在舊孔容翼翼孔容之常承帝之明下民之樂子孫保光承順溫良受帝之光嘉薦令芳壽考不忘承帝明德師象山則雲施稱民永受厥福承容之常承帝之明下民安樂受福無疆郊祀歌十九章其詩曰練時日侯有望焫膋蕭延四方九重開靈之斿垂惠恩鴻祜休靈之車結玄雲駕飛龍羽旄紛靈之下若風馬左倉龍右白虎靈之來神哉沛先以雨般裔裔靈之至慶陰陰相放𢘍震澹心靈已坐五音飭虞至旦承靈億牲繭栗粢盛香尊桂酒賓八鄉靈安留吟青黃徧觀此眺瑤堂眾嫭並綽奇麗顏如荼兆逐靡被華文廁霧縠曳阿錫佩珠玉俠嘉夜茝蘭芳澹容與獻嘉觴練時日一帝臨中壇四方承宇繩繩意變備得其所清和六合制數以五海內安寧興文匽武后土富媼昭明三光穆穆優游嘉服上黃帝臨二青陽開動根荄以遂膏潤并愛跂行畢逮霆聲發榮壧處頃聽枯槀復產乃成厥命眾庶熙熙施及夭胎群生啿啿惟春之祺青陽三鄒子樂朱明盛長旉與萬物桐生茂豫靡有所詘敷華就實既阜既昌登成甫田百鬼迪嘗廣大建祀肅雍不忘神若宥之傳世無疆朱明四鄒子樂西顥沆碭秋氣肅殺含秀垂穎續舊不廢姦偽不萌祅孽伏息隅辟越遠四貉咸服既畏茲威惟慕純德附而不驕正心翊翊西顥五鄒子樂玄冥陵陰蟄蟲蓋臧屮木零落抵冬降霜易亂除邪革正異俗兆民反本抱素懷樸條理信義望禮五嶽籍斂之時掩收嘉穀玄冥六鄒子樂惟泰元尊媼神蕃釐經緯天地作成四時精建日月星辰度理陰陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒繼統共勤順皇之德鸞路龍鱗罔不肸飾嘉籩列陳庶幾宴享滅除凶災列景祐殿本都作烈王先謙說作烈是烈景祐殿本都作烈王先謙說作烈是騰八荒鐘鼓竽笙雲舞翔翔招搖靈旗九夷賓將惟泰元七建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成天地並況惟予有慕爰熙紫壇思求厥路恭承禋祀縕豫為紛黼繡周張承神至尊千童羅舞成八溢合好效歡虞泰一九歌畢奏斐然殊鳴琴竽瑟會軒朱璆磬金鼓靈其有喜百官濟濟各敬厥事盛牲實俎進聞膏神奄留臨須搖長麗前掞光燿明寒暑不忒況皇章展詩應律鋗玉鳴函宮吐角激徵清發梁揚羽申以商造茲新音永久長聲氣遠條鳳鳥鴹神夕奄虞蓋孔享天地八丞相匡衡奏罷黼繡周張更定詩曰肅若舊典日出入安窮時世不與人同故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池徧觀是邪謂何吾