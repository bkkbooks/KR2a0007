  - {type: variant, offset: 7409, length: 5, content: 人縵樂鼓員, WYG: 世孝景後六年宋本監本同按當作後元年景帝後三年即畢安得有後六年乎菑川王五世孝王横横小宋板作烘魯共王四世閔臣召南按閔係頃王子紹封此格宜低一層與文王睃同行古本亦誤泗水王三世勤王綜劉攽曰昭紀元鳯元年立戴王遺腹子煖此表作綜二者不同齊懐王閼臣召南按齊王名閎不名閼紀傳可証監本及别本俱訛耳前漢書卷}
