  - {type: variant, offset: 7460, length: 353, content: 人詔隨常從倡十六人秦倡員二十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為樂楚四會員十七人巴四會員十二人銚四會員十二人齊四會員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十二人其七十二人給大官挏馬酒其七十人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲皆可罷奏可然百姓漸漬日久又不制雅樂有以相變豪富吏民湛沔自若陵夷壞于王莽今海內更始民人歸本戶口歲息平其刑辟牧以賢良至於家給既庶且富則須庠序禮樂之教化矣今幸有前聖遺制之威儀誠可法象而補備之經紀可因緣而存著也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者百世可知也今大漢繼周久曠大儀未有立禮成樂此賈宜景祐殿本都作誼王先謙說作誼是誼景祐殿本都作誼王先謙說作誼是仲舒王吉劉向之徒所為發憤而增嘆也, WYG: 考證}
