  - {type: variant, offset: 4660, length: 0, content: '', WYG: 前漢書卷十前漢書卷十考證成帝紀罷六厩技巧官臣召南按百官表六厩技巧二官有令有丞屬水衡都尉師古但解技巧未釋六厩於百官表注引漢舊儀即以太僕之大厩解之恐未為當此所罷者止言水衡所屬之六厩非太僕所屬也下文又云减乗輿厩馬則太僕所屬者矣盖聞天生衆民宋本無盖聞二字别本俱有五阮闗注應劭曰五阮在代郡臣召南按地理志代郡無五阮闗有五原闗疑五阮即五原音之轉耳前漢書卷十考證}
