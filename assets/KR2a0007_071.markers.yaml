  - {type: variant, offset: 2064, length: 1068, content: 變繼嗣之福屢受威怒之異者虖雖夙夜自責改過易行畏天命念祖業妙選有德之世考卜窈窕之女以承宗廟順神祇心塞天下望子孫之祥猶恐晚暮今乃觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不予必有禍而無福市道皆共知之朝廷莫肯壹言臣竊傷心自念得以同姓拔擢尸祿不忠污辱諫爭之官不敢不盡死唯陛下深察書奏上使侍御史收縛輔繫掖庭祕獄群臣莫知其故於是中朝左將軍辛慶忌右將軍廉襃光祿勳師丹太中大夫谷永俱上書曰臣聞明王垂寬容之聽崇諫爭之官廣開忠直之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無讇諛之士元首無失道之諐竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬日之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官與眾共之昔趙簡子殺其大夫鳴犢孔子臨河而還今天心未豫災異屢降水旱迭臻方當隆寬廣問襃直盡下之時也而行慘急之誅於諫爭之臣震驚群下失忠直心假令輔不坐直言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精銳銷耎莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察上乃徙繫輔共工獄減死罪一等論為鬼薪終於家鄭崇字子游本高密大族世與王家相嫁娶祖父以訾徙平陵父賓明法令為御史事貢公名公直崇少為郡文學史至丞相大車屬弟立與高武侯傅喜同門學相友善喜為大司馬薦崇哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黃晝昏日中有黑氣今祖母從昆弟二人已侯孔鄉侯皇后父高武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人心非傅氏之福也臣聞師曰逆陽者厥極弱逆陰者厥極凶短折犯人者有亂亡之患犯神者有疾夭之禍故周公著戒曰惟王不知艱難唯耽樂是從時亦罔有克壽故衰世之君夭折蚤沒此皆犯陰之害也臣願以身命當國咎崇因持詔書案起傅太后大怒曰何有為天子乃反為一臣所顓制邪上遂下詔曰朕幼而孤皇太太后躬自養育免于襁褓教道以禮至於成人惠澤茂焉欲報之德皞天罔極前追號皇太太后父為崇祖侯惟念德報未殊朕甚恧焉侍中光祿大夫商皇太太后父同產子小自保大恩義最親其封商為汝昌侯為崇祖侯後更號崇祖侯為汝昌哀侯崇又以董賢貴寵過度諫由是重得罪數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中孫寶字子嚴潁川鄢陵人也以明經為郡史, WYG: 乘危}
