  - {type: variant, offset: 6003, length: 0, content: '', WYG: 故與傳不同也萬方之事大錄於君顧炎武曰今所傳王肅注舜典納于大􅅢云􅅢錄也納舜使大錄萬機之政葢西京時有此解故詔書用之薛廣德傳沛郡相人也唐書宰相世系表曰薛公獻䇿滅黥布封千戸侯生瑑瑑生茂宣茂宣生懷則懷則生引孫引孫生廣德平當傳書曰正稽古建功立事可以永年傳於亡窮注師古曰今文泰誓之辭臣召南按此文西京所行偽泰誓辭也郊祀志亦引此文云正稽古立功立事可以永年丕天之大律然則傳於亡窮四字當所自撰以結引書之意也漢興惟韋平父}
