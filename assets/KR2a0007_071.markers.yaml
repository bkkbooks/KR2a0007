  - {type: variant, offset: 1028, length: 1, content: 鄭, WYG: 故人邑子設祖道供張東都門外蘇林曰長安東郭門也師古曰祖道餞行也解在景十三王及劉屈􅈊傳供音居共反張音竹亮反送者車數百兩辭决而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸郷里日令家共具設酒食師古曰日日設之也共讀曰供其他類此宋祁曰日字下疑更有日字請族人故舊賔客與相娛樂數問其家金餘尚有幾所趣賣以共具師古曰幾所猶言幾許也趣讀曰促居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立産業基阯師古曰幾讀曰冀今日飲食費且盡宜從丈人所勸説君買田宅鄧展曰宜令意自從丈人所出無泄我言也師古曰丈人嚴莊之稱也故親而老者皆稱焉老人即以閒暇時為廣言此計師古曰閒即閑字也廣曰吾豈老誖不念子孫哉師古曰誖惑也音布内反顧自有舊田廬師古曰顧思念也令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也宋祁曰衆字下疑有人字吾既亡以教化子孫不欲益其過而生怨宋祁曰南本浙本生字下有其字又此金者聖主所以惠養老臣也故樂與郷黨宗族共饗其賜以盡吾餘日不亦可乎於是族人説服師古曰説讀曰悦皆以壽終于定國字曼倩東海郯人也師古曰郯音談其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨師古曰羅罹也遭也郡中為之生立祠號曰于公祠東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦宋祁曰南本浙本作事養我勤苦又一本作養我哀其亡子守寡我老久絫丁壯奈何師古曰絫古累字也音力瑞反其後姑自經死師古曰不欲累婦故自殺宋祁曰景德本作經死他本作縊死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府師古曰府郡之曹府也上音時掌反于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公爭之弗能得乃抱其具獄哭於府上師古曰具獄者獄案已成其文備具也因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎黨在是乎師古曰黨音他朗反宋祁曰前太守南本作故浙本作前於是殺牛自祭孝婦冡因表其墓天立大雨歲熟郡中以此大敬重于公定國少學法於父父死後定國亦為獄史郡決曹補廷尉史以選與御史中丞從事宋祁曰與南本作為浙本作與治反者獄以材髙舉侍御史遷御史中丞會昭帝崩}
