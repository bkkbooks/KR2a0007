  - {type: variant, offset: 1132, length: 0, content: '', WYG: 事也上於是數以朝日引見丞相御史師古曰五日一聽朝故云朝日也入受詔條責以職事曰惡吏負賊妄意良民師古曰賊發不得恐負其殿故妄疑善人致其罪也至亡辜死或盜賊發吏不亟追而反繫亡家師古曰亟急也不急追賊反禁繫失物之家後不敢復告以故寖廣師古曰寖漸也民多寃結州郡不理連上書者宋祁曰連字南本浙本並作遠交於闕廷二千石選舉不實是以在位多不任職師古曰謂令長丞尉民田有災害吏不肯除收趣其租以故重困師古曰趣讀曰促重音直用反關東流民飢寒疾疫已詔吏轉漕虛倉廩開府臧相振救賜寒者衣至春猶恐不贍師古曰贍足也今丞相御史將欲何施以塞此咎師古曰塞補也悉意條狀陳朕過失師古曰悉盡也定}
  - {type: page-break, offset: 1132, content: '', id: KR2a0007_WYG_071-9b, image: WYG0250/WYG0250-0496d.png}
  - {type: page-break, offset: 1132, content: '', id: KR2a0007_WYG_071-10a, image: WYG0250/WYG0250-0497a.png}
