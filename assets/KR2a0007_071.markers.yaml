  - {type: variant, offset: 1133, length: 0, content: '', WYG: 上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰郎有從東方來者言民父子相棄師古曰以遭饑饉不能相養丞相御史案}
  - {type: variant, offset: 1133, length: 0, content: '', krp: 上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰郎有從東方來者言民父子相棄師古曰以遭饑饉不能相養丞相御史案}
