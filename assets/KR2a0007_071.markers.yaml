  - {type: variant, offset: 3787, length: 255, content: 將軍與紅陽侯有卻自恐見危時淳于長方貴幸友寶寶亦欲附之始視事而長以穉季託寶故寶窮無以復應文文怪寶氣索知其有故因曰明府素著威名今不敢取穉季當且闔閤勿有所問如此竟歲吏民未敢誣明府也即度穉季而譴它事眾口讙譁終身自墮寶曰受教穉季耳目長聞知之杜門不通水火穿舍後牆為小戶但持鉏自治園因文所厚自陳如此文曰我與穉季幸同土壞素無睚眥顧受將命分當相直誠能自改嚴將不治前事即不更心但更門戶適趣禍耳穉季遂不敢犯法寶亦竟歲無所譴明年穉季病死寶為京兆尹三歲京師稱之會淳于長敗寶與蕭育等皆坐免官文復去吏死於家穉季子杜蒼字君敖名出穉季右在游俠中, WYG: 都尉領河隄}
