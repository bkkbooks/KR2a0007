  - {type: variant, offset: 1038, length: 0, content: '', WYG: 上書諫後王廢宣帝立宋祁曰宣帝立浙本作宣帝即位大將軍光領尚書事條奏羣臣諫昌邑王者皆超遷定國繇是為光祿大夫師古曰繇讀與由同平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒歩徃過定國皆與鈞禮師古曰鈞禮猶言亢禮恩敬甚備學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之為廷尉天下無寃民師古曰言決罪皆當于定國為廷尉民自}
