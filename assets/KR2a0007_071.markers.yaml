  - {type: variant, offset: 1134, length: 0, content: '', WYG: 之吏匿不言邪將從東方來者加增之也何以錯繆至是師古曰錯互也繆違也謂吏及東方人言不相同也欲知其實方今年歲未可預知也即}
  - {type: variant, offset: 1134, length: 0, content: '', krp: 之吏匿不言邪將從東方來者加增之也何以錯繆至是師古曰錯互也繆違也謂吏及東方人言不相同也欲知其實方今年歲未可預知也即}
  - {type: variant, offset: 1135, length: 1, content: 司, WYG: 水旱其憂不細公卿有可以防其未然救其已然者不各以誠對師古曰言能防救與不宜各以實對毋有所諱定國惶恐上書自}
  - {type: variant, offset: 1135, length: 1, content: 司, krp: 水旱其憂不細公卿有可以防其未然救其已然者不各以誠對師古曰言能防救與不宜各以實對毋有所諱定國惶恐上書自}
  - {type: variant, offset: 1137, length: 0, content: '', WYG: 歸侯印乞骸骨上報曰君相朕躬不敢怠息師古曰息謂自休息萬方之事大錄于君師古曰大錄總錄也能毋過者其唯聖人方今承周秦之敝俗化陵夷師古曰言穨替也民寡禮􅁩隂陽不調災咎之發不為一端而作自聖人推類}
  - {type: page-break, offset: 1137, content: '', id: KR2a0007_WYG_071-10b, image: WYG0250/WYG0250-0497b.png}
  - {type: variant, offset: 1137, length: 0, content: '', krp: 歸侯印乞骸骨上報曰君相朕躬不敢怠息師古曰息謂自休息萬方之事大錄于君師古曰大錄總錄也能毋過者其唯聖人方今承周秦之敝俗化陵夷師古曰言穨替也民寡禮誼隂陽不調災咎之發不為一端而作自聖人推類}
  - {type: variant, offset: 1138, length: 6, content: 大辟臣幸得從, WYG: 記不敢專也況於非聖者乎師古曰非聖者謂常人日夜惟思所以未能盡明師古曰所以所由也言何由致此災經曰萬方有罪罪在朕躬師古曰此論語堯曰篇載殷湯伐桀告天之辭君雖任職何必顓焉師古曰顓與專同事不專由君也其勉察郡國守相羣牧非其人者毋令乆賊民永執綱紀務悉聰明強食愼疾師古曰悉盡也定國遂稱篤固辭上廼賜安車駟馬黄金六十斤罷就第數歲七十餘薨諡曰安侯子永嗣少時耆酒多過失師古曰耆讀曰嗜年且三十乃折節修行以父任為侍中中郎將長水校尉定國死居䘮如禮孝行聞宋祁曰南本孝字上有以字由是以列侯為散騎光祿勲至御史}
  - {type: page-break, offset: 1138, content: '', id: KR2a0007_WYG_071-11a, image: WYG0250/WYG0250-0497c.png}
