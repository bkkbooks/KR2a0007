  - {type: variant, offset: 4393, length: 0, content: '', WYG: 諸吏散騎復為光祿勲御史大夫至丞相以冬月賜爵關内侯明年春上使使者召欲封當如淳曰漢儀注御史大夫為丞相更春乃封故先賜爵關内侯也李竒曰以冬月非封侯時故且先賜爵關内侯也師古曰李説是也當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上報曰朕選於衆以君為相視事日寡輔政未久陰陽不調冬無大雪旱氣為災朕之不德何必君罪君何疑而上書乞骸骨歸關内侯爵邑使尚書令譚賜君養牛一上尊酒十石如淳曰律稻米一斗得酒一斗為上尊稷米一斗得酒一斗為中尊粟米一斗得酒一斗為下尊師古曰稷即粟也中尊者宜為黍米不當言稷且作酒自有澆醇之異為上中下耳非必繫之米君其勉致醫藥以自持後月餘卒子晏以明經歴位大司徒封防郷侯漢興唯韋平父子至宰相師古曰韋謂韋賢也彭宣字子佩淮陽陽夏人也師古曰夏音假治易事張禹舉為博士遷東平太傅宋祁曰太傅淳化本作太守刋誤據史舘本作傅禹以帝師見尊信薦宣經明有威重可任政事繇是入為右扶風師古曰繇讀}
