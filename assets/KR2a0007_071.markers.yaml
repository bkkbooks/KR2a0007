  - {type: variant, offset: 3402, length: 3, content: 誅首惡, WYG: 以洎小臣也劉攽曰致仕縣車言休息不出也故韋孟云薛廣德自縣其安車也平當字子思祖父以訾百萬自下邑徙平陵師古曰下邑梁國之縣也當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令師古曰栒音詢以明經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失師古曰傅讀曰附文雅雖不能及蕭望之匡衡然指意畧同自元帝時韋𤣥成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世}
