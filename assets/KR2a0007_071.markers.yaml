  - {type: variant, offset: 3402, length: 3, content: 誅首惡, krp: 以洎小臣也劉攽曰致仕縣車言休息不出也故韋孟云薛廣德自縣其安車也平當字子思祖父以訾百萬自下邑徙平陵師古曰下邑梁國之縣也當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令師古曰栒音詢以明經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失師古曰傅讀曰附文雅雖不能及蕭望之匡衡然指意畧同自元帝時韋𤣥成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世}
  - {type: variant, offset: 3406, length: 3, content: 已商亦, WYG: 後仁師古曰論語載孔子之言也言治天下者三十年然後仁道成著也三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與師古曰與讀曰歟何德化休徴不應之久也旤福不虛必有因而至者焉宜深迹其道而務修其本師古曰迹謂求其踪迹也昔者帝堯南面而治先克明俊德以親九族而化及萬國師古曰虞書堯典叙堯之德曰克明俊德以親九族九族既睦平章百姓百姓昭明協和萬邦故云然也孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也師古曰言嚴謂尊嚴夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天師古曰言文王始受命宜為周之始祖乃追王太王王季以及后稷是不以卑臨尊此聖人之德亡以加於孝也髙皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮師古曰今文泰誓之辭言能正考古道以立功立事則可長年享國上納其言下詔復太上皇寢廟園頃之使行流民幽州師古曰行音下更反舉}
