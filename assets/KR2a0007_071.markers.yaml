  - {type: variant, offset: 1007, length: 5, content: 時執金吾議, WYG: 至者立莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之師古曰安猶徐也不疑曰諸君何患於衞太子昔蒯聵違命出奔輙距而不納春秋是之師古曰蒯聵衞靈公太子輙蒯聵子也蒯聵得罪於靈公而出奔晉及靈公卒使輙嗣位而晉趙鞅納蒯聵於戚欲求入衞魯哀公三年春齊國夏衞石曼姑帥師圍戚公羊傳曰曼姑受命於靈公而立輙曼姑之義固可以距蒯聵也輙之義可以立乎曰可奈何不以父命辭王父命也宋祁曰注文奈字上浙本有其字衞太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼繇是名聲重於朝廷師古曰繇讀與由同在位者皆自以不及也大將軍光欲以女妻之不疑固辭不肯當久之以病免終於家京師紀之後趙廣漢為京兆尹言我禁姦止邪行於吏民至於朝廷事不及不疑遠甚廷尉驗治何人竟得姦詐師古曰凡不知姓名及所從來者皆曰何人也他皆類此本夏陽人姓成名方遂居湖師古曰湖縣名以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衞太子方遂心利其言幾得以富貴師古曰幾讀曰冀即詐自稱詣闕廷尉逮召郷里識知者張宗祿等方遂坐誣罔不道要斬東市一姓張名延年師古曰故昭紀謂之張延年疏廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自遠方至徴為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭師古曰敏謂所見㨗利宣帝幸太子宫受迎謁應對及置酒宴奉觴上壽辭禮閑雅上甚讙説師古曰説讀曰悦頃之拜受為少傅太子外祖父特進平恩侯許伯}
