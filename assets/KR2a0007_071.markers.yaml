  - {type: variant, offset: 422, length: 581, content: 魏侯笑曰次公醒而狂何必酒也坐者皆屬目卑下之酒酣樂作長信少府檀長卿起舞為沐猴與狗鬭坐皆大笑寬饒不說卬視屋而歎曰美哉然富貴無常忽則易人此如傳舍所閱多矣唯謹慎為得久君侯可不戒哉因起趨出劾奏長信少府以列卿而沐猴舞失禮不敬上欲罪少府許伯為謝良久上乃解寬饒為人剛直高節志在奉公家貧奉錢月數千半以給吏民為耳目言事者身為司隸子常步行自戍北邊公廉如此然深刻喜陷害人在位及貴戚人與為怨又好言事刺議奸犯上意上以其儒者優容之然亦不得遷同列後進或至九卿寬饒自以行清能高有益於國而為凡庸所越愈失意不快數上疏諫爭太子庶子王生高寬饒節而非其如此予書曰明主知君絜白公正不畏彊禦故命君以司察之位擅君以奉使之權尊官厚祿已施於君矣君宜夙夜惟思當世之務奉法宣化憂勞天下雖日有益月有功猶未足以稱職而報恩也自古之治三王之術各有制度今君不務循職而已乃欲以太古久遠之事匡拂天子數進不用難聽之語以摩切左右非所以揚令名全壽命者也方今用事之人皆明習法令言足以飾君之辭文足以成君之過君不惟蘧氏之高蹤而慕子胥之末行用不訾之軀臨不測之險竊為君痛之夫君子直而不挺曲而不詘大雅云既明且哲以保其身狂夫之言聖人擇焉唯裁省覽寬饒不納其言是時上方用刑法信任中尚書宦官寬饒奏封事曰方今聖道浸廢儒術不行以刑餘為周召以法律為詩書又引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運功成者去不得其人則不居其位書奏上以寬饒怨謗終不改下其書, WYG: 御史}
