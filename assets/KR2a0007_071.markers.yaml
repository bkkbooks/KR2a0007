  - {type: variant, offset: 1022, length: 4, content: 逆不道諫, WYG: 人議即日父子俱移病師古曰移病謂移書言病也一曰以病而移居滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子贈以五十斤公卿}
