  - {type: variant, offset: 1038, length: 0, content: '', krp: 上書諫後王廢宣帝立宋祁曰宣帝立浙本作宣帝即位大將軍光領尚書事條奏羣臣諫昌邑王者皆超遷定國繇是為光祿大夫師古曰繇讀與由同平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒歩徃過定國皆與鈞禮師古曰鈞禮猶言亢禮恩敬甚備學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之為廷尉天下無寃民師古曰言決罪皆當于定國為廷尉民自}
  - {type: variant, offset: 1039, length: 0, content: '', WYG: 不寃師古曰言知其寛平皆無寃枉之慮定國食酒至數石不亂如淳曰食酒猶言喜酒也師古曰若依如氏之説食字當音嗜此説非也下叙定國子永乃言嗜酒耳食酒者謂能多飲費盡其酒猶云食言焉今流俗書本輒改食字作飲字失其眞也冬月治請讞飲酒益精明師古曰讞平議也音魚列反劉攽曰予謂論語云沽酒市脯不食然則酒自可云食也然此下則云飲酒益精明共説一事爾兩字不同疑當作飲為眞為廷尉十八歲遷御史大夫甘露中代黄霸為丞相封西平侯三年宣帝崩元帝立以定國任職舊臣敬重之時陳萬年為御史大夫與定國並位八年論議無所拂師古曰言不相違戾也拂音佛後貢禹代為御史大夫數處駮議師古曰言與定國不同定國明習政事率常丞相議可師古曰天子皆可定國所言然上始即位關東連年被災害民流入關}
  - {type: page-break, offset: 1039, content: '', id: KR2a0007_WYG_071-9a, image: WYG0250/WYG0250-0496c.png}
