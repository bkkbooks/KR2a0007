  - {type: variant, offset: 5561, length: 378, content: 遣使徵詡官屬數百人為設祖道詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳詡至拜為美俗使者是時潁川鍾元為尚書令領廷尉用事有權弟威為郡掾臧千金並為太守過辭鍾廷尉廷尉免冠為弟請一等之罪願蚤就髡鉗並曰罪在弟身與君律不在於太守元懼馳遣人呼弟陽翟輕俠趙季李款多畜賓客以氣力漁食閭里至姦人婦女持吏長短從橫郡中聞並且至皆亡去並下車求勇猛曉文法吏且十人使文吏治三人獄武吏往捕之各有所部敕曰三人非負太守乃負王法不得不治鍾威所犯多在赦前驅使入函谷關勿令汙民間不入關乃收之趙李桀惡雖遠去當得其頭以謝百姓鍾威負其兄止雒陽吏格殺之亦得趙李它郡持頭還並皆縣頭及其具獄於市郡中清靜表善好士見紀潁川名次黃霸性清廉妻子不至官舍數年卒疾病召丞掾作先令書曰告子恢吾生素餐日久死雖當得法賻勿受葬為小椁亶容下棺恢如父言王莽擢恢為關都尉建武中以並孫為郎, WYG: 敗廼絶}
