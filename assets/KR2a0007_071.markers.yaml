  - {type: variant, offset: 1014, length: 7, content: 寬饒指意欲求禪, WYG: 太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家視陋非所以廣太子德於天下也師古曰視讀曰示言獨親外家示天下以淺陋上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣繇是見器重數受賞賜師古曰繇讀與由同太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也師古曰此皆老子之言廣引之殆危也遂成也今仕官至二千石宋祁曰官字謝本作宦字宦成名立如此不去懼有後悔豈如父子相隨出關歸老故郷以壽命終不亦善乎受叩頭曰從}
