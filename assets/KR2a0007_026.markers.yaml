  - {type: variant, offset: 5705, length: 680, content: 北鄉而臣事之必以楚為彊可以託國也項王伐齊身負版築以為士卒先大王宜悉淮南之眾身自將為楚軍前鋒今乃發四千人以助楚夫北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜埽淮南之眾日夜會戰彭城下今撫萬人之眾無一人渡淮者陰拱而觀其孰勝夫託國於人者固若是乎大王提空名以鄉楚而欲厚自託臣竊為大王不取也然大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名以其背明約而殺義帝也然而楚王特以戰勝自彊漢王收諸侯還守成皋滎陽下蜀漢之粟深溝壁壘分卒守徼乘塞楚人還兵間以梁地深入敵國八九百里欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成皋漢堅守而不動進則不得攻退則不能解故楚兵不足罷也使楚兵勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王或之臣非以淮南之兵足以亡楚也夫大王發兵而背楚項王必留留數月漢之取天下可以萬全臣請與大王杖劍而歸漢王漢王必裂地而分大王又況淮南必大王有也故漢王敬使使臣進愚計願大王之留意也淮南王曰請奉命陰許叛楚與漢未敢泄楚使者在方急責布發兵隨何直入曰九江王已歸漢楚何以得發兵布愕然楚使者起何因說布曰事已搆獨可遂殺楚使毋使歸而疾走漢并力布曰如使者教因起兵而攻楚楚使項聲龍且攻淮南項王留而攻下邑數月龍且攻淮南破布軍布欲引兵走漢恐項王擊之故間行與隨何俱歸漢至漢王方踞床洗而召布入見布大怒悔來欲自殺出就舍張御食飲從官如漢王居布又大喜過望於是乃使人之九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣將眾數千人歸漢漢益分布兵而與俱北收兵至成皋四年秋七月立布為淮南王與擊項籍布使人之九江得數縣五年布與劉賈入九江誘, WYG: 董賢免}
