  front:
  - {type: variant, offset: 0, length: 5, content: 韓彭英盧吳, WYG: 欽定四庫全書前漢書卷二十六漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注天文志第六凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宫物類之象其伏見蚤晚邪正存亡虚實濶陿孟康曰伏見蚤晩謂五星也日月五星下道為邪存謂列宿不虧也亡謂恒星不見虚實若天牢星實則囚多虚則開出之屬也濶陿若三台星相去逺近也及五星所行合散犯守陵歴鬬食孟康曰合同舍也散五星有變則其精散為祅星也犯七寸以内光芒相及也陵相冒過也食星月相陵不見者則所蝕也韋昭曰自下往觸之曰犯居其宿曰守經之為歴突掩為陵星相擊為鬬也彗孛飛流日月薄食張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去也流光迹相連也日月無光曰薄京房易}
