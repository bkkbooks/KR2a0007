  - {type: variant, offset: 8444, length: 226, content: 萬戶為列侯項籍死上以鋗有功從入武關故德芮徙為長沙王都臨湘一年薨諡曰文王子成王臣嗣薨子哀王回嗣薨子共王右嗣薨子靖王差嗣孝文後七年薨無子國除初文王芮高祖賢之制詔御史長沙王忠其定著令至孝惠高后時封芮庶子二人為列侯傳國數世絕贊曰昔高祖定天下功臣異姓而王者八國張耳吳芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂土南面稱孤見疑強大懷不自安事窮勢迫卒謀叛逆終於滅亡張耳以智全至子亦失國唯吳芮之起不失正道故能傳號五世以無嗣絕慶流支庶有以矣夫著于甲令而稱忠也, WYG: 六考證}
