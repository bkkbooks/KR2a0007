  - {type: variant, offset: 1102, length: 3472, content: 漢王會滎陽復擊破楚京索間以故楚兵不能西漢之敗卻彭城塞王欣翟王翳亡漢降楚齊趙魏亦皆反與楚和漢王使酈生往說魏王豹豹不聽乃以信為左丞相擊魏信問酈生魏得毋用周叔為大將乎曰柏直也信曰豎子耳遂進兵擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲度臨晉而伏兵從夏陽以木罌缶度軍襲安邑魏王豹驚引兵迎信信遂虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絕楚之糧道西與大王會於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與信之下魏代漢輒使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信涉西河虜魏王禽夏說新喋血閼與今乃輔以張耳議欲以下趙此乘勝而去國遠鬭其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從間路絕其輜重足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絕其後野無所掠鹵不至十日兩將之頭可致戲下願君留意臣之計必不為二子所禽矣成安君儒者常稱義兵不用詐謀奇計謂曰吾聞兵法什則圍之倍則戰今韓信兵號數萬其實不能千里襲我亦以罷矣今如此避弗擊後有大者何以距之諸侯謂吾怯而輕來伐我不聽廣武君策信使間人窺知其不用還報則大喜乃敢引兵遂下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道萆山而望趙軍戒曰趙見我走必空壁逐我若疾入拔趙幟立漢幟令其裨將傳餐曰今日破趙會食諸將皆嘸然陽應曰諾信謂軍吏曰趙已先據便地壁且彼未見大將旗鼓未肯擊前行恐吾阻險而還乃使萬人先行出背水陳趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良之於是信張耳棄鼓旗走水上軍復疾戰趙空壁爭漢鼓旗逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎者候趙空壁逐利即馳入趙壁皆拔趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還歸壁壁皆漢赤幟大驚以漢為皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁於是漢兵夾擊破虜趙軍斬成安君泜水上禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之諸校效首虜休皆賀因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳兵法不曰陷之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂敺市人而戰之也其勢非置死地人人自為戰今即予生地皆走寧尚得而用之乎諸將皆服曰非所及也於是問廣武君曰僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞亡國之大夫不可以圖存敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下身死泜水上今足下虜魏王禽夏說不旬朝破趙二十萬眾誅成安君名聞海內威震諸侯眾庶莫不輟作怠惰靡衣媮食傾耳以待命者然而眾勞卒罷其實難用也今足下舉勌敝之兵頓之燕堅城之下情見力屈欲戰不拔曠日持久糧食單竭若燕不破齊必距境而以自彊二國相持則劉項之權未有所分也臣愚竊以為亦過矣信曰然則何由廣武君對曰當今之計不如按甲休兵百里之內牛酒日至以饗士大夫北首燕路然後發一乘之使奉咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者亦不知為齊計矣如是則天下事可圖也兵故有先聲而後實者此之謂也信曰善敬奉教於是用廣武君策發使燕燕從風而靡乃遣使報漢因請立張耳王趙以撫其國漢王許之楚數使奇兵度河擊趙王耳信往來救趙因行定趙城邑發卒佐漢楚方急圍漢王滎陽漢王出南之宛葉得九江王布入成皋楚復急圍之四年漢王出成皋度河獨與滕公從張耳軍修武至宿傳舍晨自稱漢使馳入壁張耳韓信未起即其臥奪其印符麾召諸將易置之信耳起乃知獨漢王來大驚漢王奪兩人軍即令張耳備守趙地拜信為相國發趙兵未發者擊齊信引兵東未度平原聞漢王使酈食其己說下齊信欲止蒯通說信令擊齊語在通傳信然其計遂渡河襲歷下軍至臨菑齊王走高密使使於楚請救信已定臨菑東追至高密西楚使龍且將號稱二十萬救齊齊王龍且并軍與信戰未合或說龍且曰漢兵遠鬭窮寇久戰鋒不可當也齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞王在楚來救必反漢漢二千里客居齊齊城皆反之其勢無所得食可毋戰而降也龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之策受辱於跨下無兼人之勇不足畏也且救齊而降之吾何功今戰而勝之齊半可得何為而止遂戰與信夾濰水陳信乃夜令人為萬餘囊盛沙以壅水上流引兵半度擊龍且陽不勝還走龍且果喜曰固知信怯遂追度水信使人決壅囊水大至龍且軍太半不得度即急擊殺龍且龍且水東軍散走齊王廣亡去信追北至城陽虜廣楚卒皆降遂平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不為假王以填之其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王於滎陽使者至發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立為王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徵其兵使擊楚楚以亡龍且項王恐使盱台人武涉往說信曰足下何不反漢與楚楚王與足下有舊故且漢王不可必身居項王掌握中數矣然得脫背約復擊項王其不可親信如此今足下雖自以為與漢王為金石交然終為漢王所禽矣足下所以得須臾至今者以項王在項王即亡次取足下何不與楚連和三分天下而王齊今釋此時自必於漢王以擊楚且為智者固若此邪信謝曰臣得事項王數年官不過郎中位不過執戟言不聽畫策不用故背楚歸漢漢王授我上將軍印數萬之眾解衣衣我推食食我言聽計用吾得至於此夫人深親信我背之不祥幸為信謝項王武涉已去蒯通知天下權在於信深說以三分天下鼎足而王語在通傳信不忍背漢又自以功大漢王不奪我齊遂不聽漢王之敗固陵用張良計徵信將兵會陔下項羽死高祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百曰公小人為德不竟召辱己少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此項王亡將鍾離眛家在伊廬素與信善項王敗眛亡歸信漢怨眛聞在楚詔楚捕之信初之國行縣邑陳兵出入有變告信欲反書聞上患之用陳平謀偽游於雲夢者實欲襲信信弗知高祖且至楚信欲發兵自度無罪欲謁上恐見禽人或說信曰斬眛謁上上必喜亡患信見眛計事眛曰漢所以不擊取楚以眛在公若欲捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁於陳高祖令武士縛信載後車信曰果若人言狡兔死良狗亨上曰人告公反遂械信至雒陽赦以為淮陰侯信知漢王畏惡其能稱疾不朝從由此日怨望居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲趨拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸將能各有差上問曰如我能將幾何信曰陛下不過能將十萬上曰如公何如曰如臣多多益辦耳上笑曰多多益辦何為為我禽信曰陛下不能將兵而善將將此乃信之為陛下禽也且陛下所謂天授非人力也後陳豨為代相監邊辭信信挈其手與步於庭數匝仰天而嘆曰子可與言乎吾欲與子有言豨因曰唯將軍命信曰公之所居天下精兵處也而公陛下之信幸臣也人言公反陛下必不信再至陛下乃疑三至必怒而自將吾為公從中起天下可圖也陳豨素知其能信之曰謹奉教漢十年豨果反高帝自將而往信稱病不從陰使人之豨所而與家臣謀夜詐赦諸官徒奴欲發兵襲呂后太子部署已定待豨報其舍人得罪信信囚欲殺之舍人弟上書變告信欲反狀於呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從帝所來稱豨已死群臣皆賀相國紿信曰雖病強入賀信入呂后使武士縛信斬之長樂鍾室信方斬曰吾不用蒯通計反為女子所詐豈非天哉遂夷信三族高祖已破豨歸至聞信死且喜且哀之問曰信死亦何言呂后道其語高祖曰此齊辯士蒯通也召欲亨之通至自說釋弗誅語在通傳彭越字仲昌邑人也常漁鉅野澤中為盜陳勝起或謂越曰豪桀相立畔秦仲可效之越曰兩龍方鬭且待之居歲餘澤間少年相聚百餘人往從越請仲為長越謝不願也少年強請乃許與期旦日日出時後會者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君強以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢於是越乃引一人斬之設壇祭令徒屬徒屬皆驚畏越不敢仰視乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌吧未下沛公引兵西越亦將其眾居鉅野澤中收魏敗散卒項籍入關王諸侯還歸越眾萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟陰以擊楚楚令蕭公角將兵擊越越大破楚軍漢二年春與魏豹及諸侯東擊楚越將其兵三萬餘人歸漢外黃漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹魏咎從弟真魏也乃拜越為魏相國擅將兵略定梁地漢王之敗彭城解而西也越皆亡其所下城獨將其兵北居河上漢三年越常往來為漢游兵擊楚絕其糧於梁地項王與漢王, WYG: ''}
  - {type: variant, offset: 1102, length: 3472, content: 漢王會滎陽復擊破楚京索間以故楚兵不能西漢之敗卻彭城塞王欣翟王翳亡漢降楚齊趙魏亦皆反與楚和漢王使酈生往說魏王豹豹不聽乃以信為左丞相擊魏信問酈生魏得毋用周叔為大將乎曰柏直也信曰豎子耳遂進兵擊魏魏盛兵蒲坂塞臨晉信乃益為疑兵陳船欲度臨晉而伏兵從夏陽以木罌缶度軍襲安邑魏王豹驚引兵迎信信遂虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絕楚之糧道西與大王會於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與信之下魏代漢輒使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君陳餘聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信涉西河虜魏王禽夏說新喋血閼與今乃輔以張耳議欲以下趙此乘勝而去國遠鬭其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從間路絕其輜重足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絕其後野無所掠鹵不至十日兩將之頭可致戲下願君留意臣之計必不為二子所禽矣成安君儒者常稱義兵不用詐謀奇計謂曰吾聞兵法什則圍之倍則戰今韓信兵號數萬其實不能千里襲我亦以罷矣今如此避弗擊後有大者何以距之諸侯謂吾怯而輕來伐我不聽廣武君策信使間人窺知其不用還報則大喜乃敢引兵遂下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道萆山而望趙軍戒曰趙見我走必空壁逐我若疾入拔趙幟立漢幟令其裨將傳餐曰今日破趙會食諸將皆嘸然陽應曰諾信謂軍吏曰趙已先據便地壁且彼未見大將旗鼓未肯擊前行恐吾阻險而還乃使萬人先行出背水陳趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良之於是信張耳棄鼓旗走水上軍復疾戰趙空壁爭漢鼓旗逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出奇兵二千騎者候趙空壁逐利即馳入趙壁皆拔趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還歸壁壁皆漢赤幟大驚以漢為皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁於是漢兵夾擊破虜趙軍斬成安君泜水上禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之諸校效首虜休皆賀因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳兵法不曰陷之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂敺市人而戰之也其勢非置死地人人自為戰今即予生地皆走寧尚得而用之乎諸將皆服曰非所及也於是問廣武君曰僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞亡國之大夫不可以圖存敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下身死泜水上今足下虜魏王禽夏說不旬朝破趙二十萬眾誅成安君名聞海內威震諸侯眾庶莫不輟作怠惰靡衣媮食傾耳以待命者然而眾勞卒罷其實難用也今足下舉勌敝之兵頓之燕堅城之下情見力屈欲戰不拔曠日持久糧食單竭若燕不破齊必距境而以自彊二國相持則劉項之權未有所分也臣愚竊以為亦過矣信曰然則何由廣武君對曰當今之計不如按甲休兵百里之內牛酒日至以饗士大夫北首燕路然後發一乘之使奉咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者亦不知為齊計矣如是則天下事可圖也兵故有先聲而後實者此之謂也信曰善敬奉教於是用廣武君策發使燕燕從風而靡乃遣使報漢因請立張耳王趙以撫其國漢王許之楚數使奇兵度河擊趙王耳信往來救趙因行定趙城邑發卒佐漢楚方急圍漢王滎陽漢王出南之宛葉得九江王布入成皋楚復急圍之四年漢王出成皋度河獨與滕公從張耳軍修武至宿傳舍晨自稱漢使馳入壁張耳韓信未起即其臥奪其印符麾召諸將易置之信耳起乃知獨漢王來大驚漢王奪兩人軍即令張耳備守趙地拜信為相國發趙兵未發者擊齊信引兵東未度平原聞漢王使酈食其己說下齊信欲止蒯通說信令擊齊語在通傳信然其計遂渡河襲歷下軍至臨菑齊王走高密使使於楚請救信已定臨菑東追至高密西楚使龍且將號稱二十萬救齊齊王龍且并軍與信戰未合或說龍且曰漢兵遠鬭窮寇久戰鋒不可當也齊楚自居其地戰兵易敗散不如深壁令齊王使其信臣招所亡城城聞王在楚來救必反漢漢二千里客居齊齊城皆反之其勢無所得食可毋戰而降也龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之策受辱於跨下無兼人之勇不足畏也且救齊而降之吾何功今戰而勝之齊半可得何為而止遂戰與信夾濰水陳信乃夜令人為萬餘囊盛沙以壅水上流引兵半度擊龍且陽不勝還走龍且果喜曰固知信怯遂追度水信使人決壅囊水大至龍且軍太半不得度即急擊殺龍且龍且水東軍散走齊王廣亡去信追北至城陽虜廣楚卒皆降遂平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不為假王以填之其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王於滎陽使者至發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立為王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徵其兵使擊楚楚以亡龍且項王恐使盱台人武涉往說信曰足下何不反漢與楚楚王與足下有舊故且漢王不可必身居項王掌握中數矣然得脫背約復擊項王其不可親信如此今足下雖自以為與漢王為金石交然終為漢王所禽矣足下所以得須臾至今者以項王在項王即亡次取足下何不與楚連和三分天下而王齊今釋此時自必於漢王以擊楚且為智者固若此邪信謝曰臣得事項王數年官不過郎中位不過執戟言不聽畫策不用故背楚歸漢漢王授我上將軍印數萬之眾解衣衣我推食食我言聽計用吾得至於此夫人深親信我背之不祥幸為信謝項王武涉已去蒯通知天下權在於信深說以三分天下鼎足而王語在通傳信不忍背漢又自以功大漢王不奪我齊遂不聽漢王之敗固陵用張良計徵信將兵會陔下項羽死高祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百曰公小人為德不竟召辱己少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此項王亡將鍾離眛家在伊廬素與信善項王敗眛亡歸信漢怨眛聞在楚詔楚捕之信初之國行縣邑陳兵出入有變告信欲反書聞上患之用陳平謀偽游於雲夢者實欲襲信信弗知高祖且至楚信欲發兵自度無罪欲謁上恐見禽人或說信曰斬眛謁上上必喜亡患信見眛計事眛曰漢所以不擊取楚以眛在公若欲捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁於陳高祖令武士縛信載後車信曰果若人言狡兔死良狗亨上曰人告公反遂械信至雒陽赦以為淮陰侯信知漢王畏惡其能稱疾不朝從由此日怨望居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲趨拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸將能各有差上問曰如我能將幾何信曰陛下不過能將十萬上曰如公何如曰如臣多多益辦耳上笑曰多多益辦何為為我禽信曰陛下不能將兵而善將將此乃信之為陛下禽也且陛下所謂天授非人力也後陳豨為代相監邊辭信信挈其手與步於庭數匝仰天而嘆曰子可與言乎吾欲與子有言豨因曰唯將軍命信曰公之所居天下精兵處也而公陛下之信幸臣也人言公反陛下必不信再至陛下乃疑三至必怒而自將吾為公從中起天下可圖也陳豨素知其能信之曰謹奉教漢十年豨果反高帝自將而往信稱病不從陰使人之豨所而與家臣謀夜詐赦諸官徒奴欲發兵襲呂后太子部署已定待豨報其舍人得罪信信囚欲殺之舍人弟上書變告信欲反狀於呂后呂后欲召恐其黨不就乃與蕭相國謀詐令人從帝所來稱豨已死群臣皆賀相國紿信曰雖病強入賀信入呂后使武士縛信斬之長樂鍾室信方斬曰吾不用蒯通計反為女子所詐豈非天哉遂夷信三族高祖已破豨歸至聞信死且喜且哀之問曰信死亦何言呂后道其語高祖曰此齊辯士蒯通也召欲亨之通至自說釋弗誅語在通傳彭越字仲昌邑人也常漁鉅野澤中為盜陳勝起或謂越曰豪桀相立畔秦仲可效之越曰兩龍方鬭且待之居歲餘澤間少年相聚百餘人往從越請仲為長越謝不願也少年強請乃許與期旦日日出時後會者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君強以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢於是越乃引一人斬之設壇祭令徒屬徒屬皆驚畏越不敢仰視乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌吧未下沛公引兵西越亦將其眾居鉅野澤中收魏敗散卒項籍入關王諸侯還歸越眾萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟陰以擊楚楚令蕭公角將兵擊越越大破楚軍漢二年春與魏豹及諸侯東擊楚越將其兵三萬餘人歸漢外黃漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹魏咎從弟真魏也乃拜越為魏相國擅將兵略定梁地漢王之敗彭城解而西也越皆亡其所下城獨將其兵北居河上漢三年越常往來為漢游兵擊楚絕其糧於梁地項王與漢王, krp: ''}
