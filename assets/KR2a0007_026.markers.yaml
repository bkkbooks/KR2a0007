  body:
  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_026-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 曰日月赤黄為薄或曰不交而食曰薄韋昭曰氣往廹之為薄􅀈毁曰食也暈適背穴抱珥􅛆蜺孟康曰暈日旁氣也適日之將食先有黑之變也背形如背字也穴多作鐍其形如玉鐍也抱氣向日也珥形㸃黒也如淳曰暈讀曰運􅛆或作虹蜺讀曰齧螮蝀謂之􅛆表云雄為􅛆雌為蜺凡氣在日上為冠為戴在旁直對為珥在旁如半環向日為抱向外為背有氣刺日為鐍鐍抉傷也迅雷風祅怪雲變氣此皆隂陽之精其本在地而上發于天者也政失於此則變見於彼猶景之象形鄉之應聲師古曰鄉讀曰響是以明君覩之而寤飭身正事思其咎謝則禍除而福至自然之符也中宫天極星其一明者泰一之常居也旁三星三公或曰子屬後句四星末大星正妃餘三星後宫之屬也環之匡衞十二星藩臣皆曰紫宫前列直斗口三星隨北耑銳若見若不見曰隂徳或曰天一紫宫左三星曰天槍右四星曰天棓蘇林曰音棓打之棓師古曰棓音白講反後十七星絶漢抵營室曰閤道北斗七星所謂璇璣玉衡以齊七政杓攜龍角孟康曰杓斗柄也龍角東方宿也攜連也衡殷南斗魁枕參首晉灼曰衡斗之中央殷中也用昏建者杓杓自華以西南孟康曰傳曰斗}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_026-2a, image: WYG0249/WYG0249-0554c.png}
