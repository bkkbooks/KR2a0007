  - {type: variant, offset: 6541, length: 283, content: 九江廬江衡山豫章郡皆屬焉六年朝陳七年朝雒陽九年朝長安十一年高后誅淮陰侯布因心恐夏漢誅梁王彭越盛其醢以徧賜諸侯至淮南淮南王方獵見醢因大恐陰令人部聚兵候伺旁郡警急布有所幸姬病就醫醫家與中大夫賁赫對門赫乃厚餽遺從姬飲醫家姬侍王從容語次譽赫長者也王怒曰女安從知之具道王疑與亂赫恐稱病王愈怒欲捕赫赫上變事乘傳詣長安布使人追不及赫至上變言布謀反有端可先未發誅也上以其書語蕭相國蕭相國曰布不宜有此恐仇怨妄誣之請繫赫使人微驗淮南王布見赫以罪亡上變已疑其言國陰事漢使又來頗有所驗遂族赫家發兵反反書聞上乃赦赫以為將軍召諸侯問布反為之柰何皆曰發兵阬豎子耳何能為汝陰侯滕公以問其客薛公薛公曰, WYG: 星}
