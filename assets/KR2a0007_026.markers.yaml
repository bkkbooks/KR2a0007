  - {type: variant, offset: 4793, length: 2, content: 朝陳, WYG: 正月築遼東𤣥莵城二月度遼將軍范明友擊烏桓還元平元年正月庚子日出時有黑雲狀如猋風亂鬊音舜轉出西北東南行轉而西有頃亡占曰有雲如衆風是謂風師法有大兵其後兵起烏孫五將征匈奴二月甲申晨有大星如月有衆星隨而西行乙酉牂雲如狗赤色長尾三枚夾漢西行大星如月大臣之象衆星隨之衆皆隨從也天文以東行為順西行為逆此大臣欲行權以安社稷占曰太白散為天狗為卒起卒起見禍無時臣運柄牂雲為亂君到其四月昌邑王賀行淫辟立二十七日大將軍霍光白皇太后廢賀三月丙戌流星出翼軫東北干太微入紫宫始出小旦入大有光入有頃聲如雷三鳴止占曰流星入紫宫天下大凶其四月癸未宫車晏駕孝宣本始元年四月壬戌甲夜辰星與參出西方其二年七月辛亥夕辰星與翼出皆為蚤占曰大臣誅其後熒惑守房之鉤鈐鉤鈐天子之御也晉灼曰上言房為天駟其隂右驂旁有二星曰鈐故曰天子御也占曰不太僕則奉車不黜即死也房心天子宫也房為將相心為子屬也其地宋今楚彭城也四年七月甲辰辰星在翼月犯之宋祁曰翼下當添軫字占曰兵起上卿死將相也是日熒惑入輿鬼天質占曰大臣有誅者名曰天賊在大人之側地節元年正月戊午乙夜月食熒惑孟康曰凡星入月見月中為星食月月奄星星滅為月食星熒惑在角亢占曰憂在宫中非賊而盜也有内亂讒臣在旁其辛酉熒惑入氐中氐天子之宫熒惑入之有賊臣其六月戊戌甲夜客星又居左右角間東南指長可二尺色白占曰有姦人在宫廷間其丙寅又有客星見貫索東北南行至七月癸酉夜入天市芒炎東南指其色白占曰有戮卿一曰有戮王期皆一年逺二年是時楚王延夀謀逆自殺四年故大將軍霍光夫人顯將軍霍禹范明友奉車霍山及諸昆弟賔婚為侍中諸曹}
