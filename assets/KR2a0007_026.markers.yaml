  - {type: variant, offset: 346, length: 422, content: 聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜罵何曰若亡何也何曰臣非敢亡追亡者耳上曰所追者誰也曰韓信上復罵曰諸將亡者已數十公無所追追信詐也何曰諸將易得至如信國士無雙王必欲長王漢中無所事信必欲爭天下非信無可與計事者顧王策安決王曰吾亦欲東耳安能鬱鬱久居此乎何曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素嫚無禮今拜大將如召小兒此乃信所以去也王必欲拜之擇日齋戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚信已拜上坐王曰丞相數言將軍將軍何以教寡人計策信謝因問王曰今東鄉爭權天下豈非項王邪上曰然信曰大王自料勇悍仁彊孰與項王漢王默然良久曰弗如也信再拜賀曰唯信亦以為大王弗如也然臣嘗事項王請言項王為人也項王意烏猝嗟千人皆廢然不能任屬賢將此特匹夫之勇也項王見人恭謹言語姁姁人有病疾涕泣分食飲至使人有功當封爵刻印刓忍不能予此所謂婦人之仁也項王雖霸天下而臣, WYG: 候}
