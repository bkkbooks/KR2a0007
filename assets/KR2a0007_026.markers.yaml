  - {type: variant, offset: 4642, length: 1, content: 給, WYG: 待之元光中天星盡㨱上以問候星者對曰星㨱者民勞也後伐四夷百姓勞于兵革元鼎五年太白入于天苑占曰將以馬起兵也一曰馬將以軍而死耗其後以天馬故誅大宛馬大死於軍元鼎中熒惑守南斗占曰熒惑所守為亂賊喪兵守之久其國絶祀南斗越分也其後越相吕嘉殺其王及太后}
