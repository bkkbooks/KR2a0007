  - {type: variant, offset: 19, length: 0, content: '', krp: 見災疾五榖蕃昌凡五星歲緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不建急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占五星不失行則年榖豐昌凡以宿星通下之變者維星散句星信則地動孟康曰散在尾北韋昭曰信音申有星守三淵天下大水地動海魚出紀星散者山崩不即有喪龜鼈星不居漢中川有易者辰星入五車大水熒惑入積水水兵起入積薪旱兵起守之亦然極後有四星名曰句星斗杓後有三星名曰維星散者不相從也孟康曰謂不復行列而聚也三淵蓋五車之三柱也晉灼曰柱音注解之注天紀屬貫索積薪在北戌西北積水在北戌東北角亢氐沇州房心豫州尾箕幽州斗江湖牽牛婺女揚州虚危青州營室東壁并州奎婁胃徐州昴畢冀州觜觿參益州東井輿鬼雍州柳七星張三河翼軫荆州甲乙海外日月不占晉灼曰海外逺甲乙日時不以占之丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷子周丑翟寅趙卯鄭辰邯鄲巳衞午秦未中山申齊酉魯戌吳越亥燕代秦之疆候太白占狼弧吳楚之疆候熒惑占鳥衡燕齊之疆候辰星占虚危宋鄭之疆候歲星占房心晉之疆亦候辰星占參罰及秦并吞三晉燕代自河山以南者中國中國於四海内則在東南為陽陽則日歲星熒惑填星占於街南畢主之其西北則胡貉月氐旃裘引弓之民為隂隂則月太白辰星占於街北昴主之故中國山川東北流其維首在隴蜀尾沒於勃海碣石是以秦晉好用兵孟康曰秦晉西南維之北為隂與胡貉引弓之民同故好用兵復占太白太白主中國而胡貉數侵掠獨占辰星辰星出入趮疾常主夷狄其大經也凡五星早出為贏贏為客晚出為縮縮為主人五星贏縮必有天應見杓太歲在寅曰攝提格歲星正月晨出東方石氏曰名監徳在斗牽牛失次杓早水晚旱甘氏在建星婺女太初歴在營室東壁在卯曰單閼二月出石氏曰名降入在婺女虚危甘氏在虚危失次杓有水災太初在奎婁在辰曰執徐三月出石氏曰名青章在營室東壁失次杓早旱晚水甘氏同太初在胃昴在已曰大荒落四月出石氏曰名路踵在奎婁甘氏同太初在參罰在午曰敦牂五月出石氏曰名啓明在胃昴畢失次杓早旱晩水甘氏同太初在東井輿鬼在未曰協洽六月出石氏曰名長烈在觜觿參甘氏在參罰太初在注張七星在申曰涒灘七月出石氏曰名天晉在東井輿鬼甘氏在弧太初在翼軫在酉曰作詻爾雅作作噩八月出石氏曰名長壬在柳七星張失次杓有女喪民疾甘氏在注張失次杓有火太初在角亢在戌曰掩茂九月出石氏曰名天睢在翼軫失次杓水甘氏在七星翼太初在氐房心在亥曰大淵獻十月出石氏曰名天皇在角亢始甘氏在軫角亢太初在尾箕在子曰困敦十一月出石氏曰名天宗在氐房始甘氏同太初在建星牽牛在丑曰赤奮若十二月出石氏曰名天昊在尾箕甘氏在心尾太初在婺女虚危甘氏太初歴所以不同者以星贏縮在前各錄後所見也其四星亦略如此古歴五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫歴者正行也古人有言曰天下太平五星循度亡有逆行日不食朔月不食望夏氏日月傳曰日月食盡主位也不盡臣位也星傳曰日者徳也月者刑也故曰日食修徳月食修刑然而歴紀推月食與二星之逆亡異熒惑主内亂太白主兵月主刑自周室衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變内臣猶不治四夷猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也詩云彼月而食則惟其常此日而食于何不臧詩傳曰月食非常也比之日食猶常也日食則不臧矣謂之小變可也謂之正行非也故熒惑必行十六舍去日逺而顓恣太白出西方進在日前氣盛乃逆行及月必食於望亦誅盛也國皇星大而赤狀類南極所出其下起兵兵彊其衝不利孟康曰歲星之精散所為也五星之精散為六十四變志記不盡也昭明星大而白無角乍上乍下所出國起兵多變孟康曰形如三足几几上有九彗上向熒惑之精也五殘星出正東東方之星其狀類辰去地可六丈大而黄孟康曰星表有青氣如暈冇毛填星之精六賊星出正南南方之星去地可六丈大而赤數動有光孟康曰形如彗芒九角太白之精司詭星出正西西方之星去地可六丈大而白類太白孟康曰星大而有尾兩角熒惑之精也咸漢星出正北北方之星去地可六丈大而赤數動察之中青孟康曰一名獄漢星青中赤表下有三彗從横亦填星之精也此四星所出非其方其下有兵衝不利四填星出四隅去地可四丈地維臧光亦出四隅去地可二丈若月始出所見下有亂者亡有徳者昌燭星狀如太白其出也不行見則滅所燭城邑亂孟康曰星上有三彗上出亦填星之精也如星非星如雲非雲名曰歸邪李竒曰邪音虵孟康曰星有兩赤彗上向上有蓋狀氣下連星歸邪出必有歸國者星者金之散氣其本曰人孟康曰星石也金石相生人與星氣相應也星衆國吉少則凶漢者亦金散氣其本曰水星多多水少則旱孟康曰漢河漢也水生於金多少謂漢中星也其大經也天鼓有音如雷非雷音在地而下及地其所住者兵發其下天狗狀如大流星孟康曰星有尾旁有彗下有如狗形者亦太白之精有聲其下止地類狗所墜及望之如火光炎炎中天其下圜如數頃田處上鋭見則有黄色千里破軍殺將格澤者如炎火之狀黄白起地而上下大上鋭其見也不種而穫不有土功必有大客蚩尤之旗類彗而後曲象旗孟康曰熒惑之精也晉灼曰吕氏春秋云其色黄上白下見則王者征伐四方旬始出於北斗旁狀如雄雞其怒青黑色象伏鼈李竒曰怒當言帑晉灼曰帑雌也或曰怒則色青宋均曰怒謂芒角刺出枉矢狀類大流星虵行而倉黑望如有毛目然長庚廣如一匹布著天此星見起兵星䃍至地則石也如淳曰䃍亦墜也天暒而見景星孟康曰暒精明也有赤方氣與青方氣相連赤方中有兩黄星青方中有一黄星凡三星合為景星也景星者徳星也其狀無常常出於有道之國日有中道月有九行中道者黄道一曰光道光道北至東井去北極近南至牽牛去北極逺東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛逺極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極逺近之差晷景長短之制也去極逺近難知要以晷景晷景者所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為温暑隂用事則日退而南晝退而短隂勝故為涼寒也故日進為暑退為寒若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也故曰為寒暑一曰晷長為潦短為旱奢為扶鄭氏曰扶當為蟠齊魯之間聲如酺酺扶聲近蟠止不行也蘇林曰景形奢大也晉灼曰扶附也小人佞媚附近君子之側也扶者邪臣進而正臣疏君子不足姦人有餘月有九行者黑道二出黄道北赤道二出黄道南白道二出黄道西青道二出黄道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一決房中道宋祁曰朱子文云房字當作於字蓋言月之行其道雖多然皆決於日之中道也故其後云至月行則以晦朔決之又曰日之所行為中道月五星皆随之也如此則一決於中道為允青赤出陽道白黑出隂道若月失節度而妄行出陽道則旱風出隂道則隂雨凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分之星為候日東行星西轉冬至昏奎八度中夏至氐十三度中春分柳一度中秋分牽牛三度七分中此其正行也日行疾則星西轉疾事埶然也故過中則疾君行急之感也不及中則遲君行緩之象也至月行則以晦朔決之日冬則南夏則北冬至於牽牛夏至於東井日之所行為中道月五星皆随之也箕星為風東北之星也東北地事天位也孟康曰東北陽日月五星起於牽牛故為天位坤在西南紐於陽為地統故為地事也故易曰東北喪朋及巽在東南為風風陽中之隂大臣之象也其星軫也月去中道移而東北入箕若東南入軫則多風西方為雨雨少隂之位也月失中道移而西入畢則多雨故詩云月離於畢俾滂沱矣言多雨也星傳曰月入畢則將相有以家犯罪者言隂盛也書曰星有好風星有好雨月之從星則以風雨言失中道而東西也故星傳曰月南入牽牛南戒民間疾疫月北入太微出坐北若犯坐則下人謀上一曰月為風雨日為寒温冬至日南極晷長南不極則温為害夏至日北極晷短北不極則寒為害故書曰日月之行則有冬有夏也政治變於下日月運於上矣月出房北為雨為隂為亂為兵出房南為旱為夭喪水旱至衝而應及五星之變必然之效也兩軍相當日暈等力均厚長大有勝薄短小亡勝重抱大破亡抱為和背為不和為分離相去直為自立立兵破軍若曰殺將抱且戴有喜圍在中中勝在外外勝青外赤中以和相去赤外青中以惡相去氣暈先至而後去居軍勝先至先去前有利後有病後至後去前病後利後至先去前後皆病居軍不勝見而去其後發病雖勝亡功見半日以上功大白􅛆屈短上下銳李奇曰屈或為尾韋昭曰短而直者或曰短屈之虹有者下大流血日暈制勝近期三十日逺期六十日其食食所不利復生生所利不然食盡為主位以其直及日所躔加日時用名其國凡望雲氣仰而望之三四百里平望在桑楡上千餘里二千里登髙而望之下屬地者居三千里雲氣有獸居上者勝自華以南氣下黑上赤嵩髙三河之郊氣正赤常山以北氣下黑上青勃碣海岱之間氣皆黑江淮之間氣皆白徒氣白土功氣黄車氣乍髙乍下往往而聚騎氣卑而布卒氣摶如淳曰摶専也音徒端反前卑而後髙者疾前方而後髙者鋭後鋭而卑者郤其氣平者其行徐前髙後卑者不止而反氣相遇者卑勝髙鋭勝方氣來卑而循車道者不過三四日去之五六里見氣來髙七八尺者不過五六日去之十餘二十里見氣來髙丈餘二丈者不過三四十日去之五六十里見捎雲精白者其將悍其士怯其大根而前絶逺者戰精白其芒低者戰勝其前赤而卬者戰不勝陳雲如立垣杼雲類杼柚雲摶而耑鋭杓雲如繩者居前竟天其半半天蜺雲者類鬬旗故鋭鉤雲句曲諸此雲見以五色占而澤摶密其見動人廼有占兵必起占鬬其直王朔所候决於日旁日旁雲氣人主象皆如其形以占故北夷之氣如羣畜穹閭南夷之氣類舟船幡旗大水處敗軍場破國之虚下有積泉金寳上皆有氣不可不察海旁蜃氣象樓臺廣壄氣成宫闕然雲氣各象其山川人民所聚積故候息耗者入國邑視封畺田疇之整治如淳曰蔡邕云麻田曰疇城郭室屋門户之潤澤次至車服畜産精華實息者吉虚耗者凶若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲慶雲見喜氣也若霧非霧衣冠不濡見則其城被甲而趨夫雷電赮􅛆辟歴夜明者陽氣之動者也春夏則發秋冬則臧故候書者亡不司天開縣物孟康曰謂天裂而見物象也天開示縣象地動坼絶山崩及陁川塞谿垘蘇林曰垘音伏伏流也如淳曰垘填塞不通也水澹地長澤竭見象城郭門閭潤息槀枯宫廟廊第人民所次䚻俗車服觀民飲食五榖草木觀其所屬倉府廐庫四通之路六畜禽獸所産去就魚鼈鳥䑕觀其所處鬼哭若謼與人逢遌訛言誠然凡候歲美惡謹候歲始歲始或冬至日産氣始萌臘明日人衆卒歲壹㑹飲食發陽氣故曰初歲正月旦王者歲首立春四時之始也四始者候之日而漢魏鮮集臘明正月旦決八風孟康曰魏鮮人姓名作占候者風從南大旱西南小旱西方有兵西北戎叔為孟康曰戎叔胡豆也為成也小雨趣兵北方為中歲東北為上歲東方大水東南民有疾疫歲惡故八風各與其衝對課多者為勝多勝少久勝亟疾勝徐旦至食為麥食至日跌為稷跌至晡為黍晡至下晡為叔下晡至日入為麻欲終日有雲有風有日當其時深而多實亡雲有風日當其時淺而少實有雲風亡日當其時深而少實有日亡雲不風當其時者稼有敗如食頃小敗孰五斗米頃大敗風復起有雲其稼復起各以其時用雲色占種所宜雨雪寒歲惡是日光明聽都邑人民之聲聲宫則歲美吉商有兵徵旱羽水角歲惡或從正月旦比數雨率日食一升至七升而極孟康曰正月一日雨而民冇一升之食二日雨民有二升之食如此至七日已來驗也過之不占數至十二日直其月占水旱孟康曰一日雨正月水也為其環域千里内占即為天下候竟正月孟康曰月三十日周天歴二十八宿然後可占天下月所離列宿日風雲占其國然必察太歲所在金穰水毁木饑火旱此其大經也正月上甲風從東方來宜蠶從西方來若旦有黄雲惡冬至短極縣土炭孟康曰先冬至三日縣土炭於衡兩端輕重適均冬至而陽氣至則炭重夏至隂氣至則土重晉灼曰蔡邕律歴記候鐘律權土炭冬至陽氣應黄鐘通土炭輕而衡仰夏至隂氣應蕤賔通土炭重而衡低進退先後五日之中炭動麋鹿解角蘭根出泉水踊略以知日至要決晷景夫天運三十歲一小變百年中變五百年大變三大變一紀三紀而大備此其大數也春秋二百四十二年間日食三十六彗星三見夜常星不見夜中星隕如雨者各一當是時禍亂輙應周室微弱上下交怨殺君三十六亡國五十二諸侯奔走不}
