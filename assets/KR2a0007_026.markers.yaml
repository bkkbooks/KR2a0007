  - {type: variant, offset: 7, length: 0, content: '', WYG: 七星法太白主杓斗之尾也尾為隂又其用昏昏隂位在西方故主西南夜半建者衡衡殷中州河濟之間孟康曰假令杓昏建寅衡夜半亦建寅也平旦建者魁魁海岱以東北也孟康曰傳曰斗魁第一星法為日主齊魁斗之首首陽也又其用在明陽與明徳在東方故主東北方斗為帝車運于中央臨制}
  - {type: page-break, offset: 7, content: '', id: KR2a0007_WYG_026-3a, image: WYG0249/WYG0249-0555a.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 七星法太白主杓斗之尾也尾為隂又其用昏昏隂位在西方故主西南夜半建者衡衡殷中州河濟之間孟康曰假令杓昏建寅衡夜半亦建寅也平旦建者魁魁海岱以東北也孟康曰傳曰斗魁第一星法為日主齊魁斗之首首陽也又其用在明陽與明徳在東方故主東北方斗為帝車運于中央臨制}
