  - {type: variant, offset: 7066, length: 500, content: 曰胡為廢上計而出下計薛公曰布故驪山之徒也致萬乘之主此皆為身不顧後為百姓萬世慮者也故出下計上曰善封薛公千戶遂發兵自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮陰彭越今已死餘不足畏故遂反果如薛公揣之東擊荊荊王劉賈走死富陵盡劫其兵度淮擊楚楚發兵與戰徐僮間為三軍欲以相救為奇或說楚將曰布善用兵民素畏之且兵法諸侯自戰其地為散地今別為三彼敗吾一餘皆走安能相救不聽布果破其一軍二軍散走遂西與上兵遇蘄西會𦉈布兵精甚上乃壁庸城望布軍置陳如項籍軍上惡之與布相望見隃謂布何苦而反布曰欲為帝耳上怒罵之遂戰破布軍布走度淮數止戰不利與百餘人走江南布舊與番君婚故長沙哀王使人誘布偽與俱亡走越布信而隨至番陽番陽人殺布茲鄉遂滅之封賁赫為列侯將率封者六人盧綰豐人也與高祖同里綰親與高祖太上皇相愛及生男高祖綰同日生里中持羊酒賀兩家及高祖綰壯學書又相愛也里中嘉兩家親相愛生子同日壯又相愛復賀羊酒高祖為布衣時有吏事避宅綰常隨上下及高祖初起沛綰以客從入漢為將軍常侍中從東擊項籍以太尉常從出入臥內衣被食飲賞賜群臣莫敢望雖蕭曹等特以事見禮至其親幸莫及綰者封為長安侯長安故咸陽也項籍死使綰別將與劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯, WYG: 文}
