  - {type: variant, offset: 10, length: 2, content: 進陰, WYG: 也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填星廼為之動填星所居國吉未當居而居之若已去而復還居之國得土不乃得女子當居不居既已居之又東西去之國失土不乃失女不有土事若女之憂居宿久國福厚易福薄當居不居為失填其下國可伐得者不可伐其贏為王不寧縮有軍不復一曰既已居之又東西去之其國凶不可舉事用兵失次而上一舍三舍有王命不成不乃大水失次而下二舍有后慼其歲不復不乃天裂若地動凡五星歲與填合則為内亂與辰合則為變謀而更事與熒惑合則為饑為旱與太白合則為白衣之㑹為水太白在南歲在北名曰牝牡晉灼曰歲陽也太白隂也故曰牝牡年榖大孰太白在北歳在南年或有或亡熒惑與太白合則為喪不可舉事用兵與填合則為憂主孽卿與辰合則為北軍用兵舉事大敗填與辰合則將有覆軍下師與太白合則為疾為内兵辰與太白合則為變謀為兵憂凡歲熒惑填太白四星與辰鬬皆為戰兵不在外皆為内亂一曰火與水合為淬晉灼曰火入水故曰淬也與金合為鑠不可舉事用兵土與金合國亡地與木合則國饑與水合為雍沮晉灼曰沮音沮溼之沮水性雍而潛上故曰雍沮一曰雍填也不可舉事用兵木與金合鬬國有内亂同舍為合相陵為鬬二星相近者其殃大二星相逺者殃無傷也從七寸以内必之韋昭曰必冇禍也凡月食五星其國皆亡李竒曰謂其分野之國歲以饑熒惑以亂填以殺太白彊國以戰辰以女亂月食大角王者惡之凡五星所聚宿其國王天下從歲以義從熒惑以禮從填以重韋昭曰謂以威重得從太白以兵從辰以法以法者以法致天下也三星若合是謂驚立絶行晉灼曰有兵喪故驚改王故曰絶也其國外内有兵與喪民}
