  - {type: variant, offset: 5233, length: 1, content: 布, WYG: 歲星鬬有病君饑歲至河平元年三月旱傷麥民食楡皮二年十二月壬申太皇太后避時昆明東觀如淳曰食貨志武帝修昆明池列觀環之或曰即病謝君男故避其時劉奉世曰謝君男死在初元二年太后避時乃河平二年云病何也或説未曉四年十一月乙卯月食填星星不見時在輿鬼西北八九尺所占曰月食填星流民千里河平元年三月流民入函谷關河平二年十月下旬填星在東井軒轅南耑大星尺餘歲星在其西北尺所熒惑在其西北二尺所}
