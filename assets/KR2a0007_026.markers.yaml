  - {type: variant, offset: 8019, length: 424, content: 請族勝勝還報具道所以為者綰寤乃詐論他人以脫勝家屬使得為匈奴間而陰使范齊之豨所欲令久連兵毋決漢既斬豨其裨將降言燕王綰使范齊通計謀豨所上使使召綰綰稱病又使辟陽侯審食其御史大夫趙堯往迎綰因驗問其左右綰愈恐閟匿謂其幸臣曰非劉氏而王者獨我與長沙耳往年漢族淮陰誅彭越皆呂后計今上病屬任呂后呂后婦人專欲以事誅異姓王者及大功臣乃稱病不行其左右皆亡匿語頗泄辟陽侯聞之歸具報上益怒又得匈奴降者言張勝亡在匈奴為燕使於是上曰綰果反矣使樊噲擊綰綰悉將其宮人家屬騎數千居長城下候伺幸上病瘉自入謝高祖崩綰遂將其眾亡入匈奴匈奴以為東胡盧王為蠻夷所侵奪常思復歸居歲餘死胡中高后時綰妻與其子亡降會高后病不能見舍燕邸為欲置酒見之高后竟崩綰妻亦病死孝景帝時綰孫它人以東胡王降封為惡谷侯傳至曾孫有罪國除吳芮秦時番陽令也甚得江湖間民心號曰番君天下之初叛秦也黥布歸芮芮妻之因率越人舉兵以應諸侯沛公攻南陽乃遇芮之將梅鋗與偕攻析酈降之及項羽相王以芮率百越佐諸侯從入關故立芮為衡山王都邾其將梅鋗功多封, WYG: 卷二}
