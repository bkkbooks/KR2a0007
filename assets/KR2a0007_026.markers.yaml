  - {type: variant, offset: 5287, length: 1, content: 諸, WYG: 起伯之異也其後王莽遂顓國柄王氏之興萌於成帝時是以有星隕之變後莽遂簒國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵}
