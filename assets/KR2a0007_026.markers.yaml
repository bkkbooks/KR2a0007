  - {type: variant, offset: 4634, length: 0, content: '', WYG: 丈地動隂有餘天裂陽不足皆下盛彊將害上之變也其後有吕氏之亂孝文後二年正月壬寅天欃夕出西南孟康曰歲星之精占曰為兵喪亂其六年十一月匃奴入上郡雲中漢起三軍以衞京師其四月乙巳水木火三合於東井占曰外内有兵與喪改立王公東井秦也八月天狗下梁壄是歲誅反者周殷長安市其七年六月文帝崩其十一月戊戌土水合於危占曰為雍沮所當之國不可舉事用兵必受其殃一曰將覆軍危齊也其七月火東行行畢陽環畢東北出而西逆行至昴即南廼東行占曰為喪死寇亂畢昴趙也孝景元年正月癸酉金水合於婺女占曰為變謀為兵憂婺女粵也又為齊其七月乙丑金木水三合於張占曰外内有兵與喪改立王公張周地今之河南也又為楚其二年七月丙子火與水晨出東方因守斗占曰其國絶祀至其十二月水火合於斗占曰為淬不可舉事用兵必受其殃一曰為北軍用兵舉事大敗斗吳也又為粵是歲彗星出西南其三月立六皇子為王王淮陽汝南河間臨江長沙廣川其三年吳楚膠西膠東淄川濟南趙七國反吳楚兵先至攻梁膠西膠東淄川三國攻圍齊漢遣大將軍周亞夫等戍止河南以候吳楚之敝遂敗之吳王亡走粵粵攻而殺之平陽侯敗三國之師于齊咸伏其辜齊王自殺漢兵以水攻趙}
