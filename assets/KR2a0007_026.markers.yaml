  - {type: variant, offset: 15, length: 2, content: 貧無, WYG: 滅其宗廟晉灼曰宗祖廟也百姓離去被滿四方五星皆大其事亦大皆小其事亦小也凡五星色皆圜白為喪為旱赤中不平為兵青為憂為水黑為疾為多死黄吉皆角赤犯我城黄地之爭白哭泣之聲青有兵憂黒水五星同色天下匽兵百姓安寧歌舞以}
