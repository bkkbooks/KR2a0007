  - {type: variant, offset: 4635, length: 0, content: '', WYG: 城壊王自殺六月立皇子二人楚元王子一人為王王膠西中山楚徙濟北為淄川王淮陽為魯王汝南為江都王七月兵罷天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦吳楚攻梁梁堅城守遂伏尸流血其下三年填星在婁幾入還居奎奎魯也占曰其國}
  - {type: page-break, offset: 4635, content: '', id: KR2a0007_WYG_026-32b, image: WYG0249/WYG0249-0570d.png}
  - {type: variant, offset: 4635, length: 0, content: '', krp: 城壊王自殺六月立皇子二人楚元王子一人為王王膠西中山楚徙濟北為淄川王淮陽為魯王汝南為江都王七月兵罷天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦吳楚攻梁梁堅城守遂伏尸流血其下三年填星在婁幾入還居奎奎魯也占曰其國}
  - {type: variant, offset: 4636, length: 1, content: 粟, WYG: 地為得填是歲魯為國四年七月癸未火入東井行隂又以九月己未入輿鬼戊寅出占曰為誅罰又為火災後二年有栗氏事其後未央東闕災中元年填星當在觜觿參去居東井占曰亡地不廼有女憂其三年正月丁亥金木合於觜觿為白衣之會三月丁酉彗星夜見西北色白長丈在觜觿旦去益小十五日不見占曰必有破國亂君伏死其辜觜觿梁也其五月甲午金木俱在東井戊戌金去木留守之二十日占曰傷成於戊木為諸侯誅將行於諸侯也其六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁卯在箕北近漢稍小旦去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宫也是時梁王欲為漢嗣使人殺漢爭臣袁盎漢按誅梁大臣斧戉用梁王恐懼布車入關伏斧戉謝罪然後得免中三年十一月庚午夕金火合於虛相去一寸占曰為鑠為喪虚齊也四年四月丙申金木合於東井占曰為白衣之會井秦也其五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月成陽王濟隂王死六月成陽公主死出入三月天子四衣白臨邸第後元年五月壬午火金合於輿鬼之東北不至柳出輿鬼北可五寸占曰為鑠有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止孝武建元三年三月有星孛于注張歴太微千紫宫至于天漢春秋星孛于北斗齊魯晉之君皆將死亂今星孛歴五宿其後濟東膠西江都王皆坐法削黜自殺淮陽衡山謀反而誅三年四月有星孛于天紀至織女占曰織女有女變天紀為地震至四年十月而地動其後陳皇后廢六年熒惑守輿鬼占曰為火變有喪是歲髙園有火災竇太后崩元光元年六月客星見于房占曰為兵起其二年十一月單于將十萬騎入武州漢遣兵三}
