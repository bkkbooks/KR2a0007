  - {type: variant, offset: 8, length: 1, content: 韓, WYG: 海分隂陽建四時均五行移節度定諸紀皆繫於斗斗魁戴筐六星曰文昌宫晉灼曰似筐故曰戴筐一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災在魁中貴人之牢孟康曰傳曰天理四星在斗魁中貴人牢名曰天理也魁下六星兩兩而比者曰三能蘇林曰能音台三能色亝君臣和不亝為乖戾柄輔星孟康曰在北斗第六星旁明近輔臣親彊斥小疏弱蘇林曰斥逺也杓端有兩星一内為矛招㨱孟康曰近北斗者招㨱招㨱為天矛晉灼曰梗河三星天矛鋒招㨱一星耳一外為盾天蠭晉灼曰外逺北斗也在招㨱南一名天蠭有句圜十五星屬杓曰賤人之牢牢中星實則囚多虚則開出天一槍棓矛盾動㨱角大兵起李竒曰角芒角東宫蒼龍房心心為明堂大星天王前後星子屬不欲直直王失計房為天府曰天駟其隂右驂旁有兩星曰衿衿北一星曰牽晉灼曰牽古轄字東北曲十二星曰旗旗中四星曰天市天市中星衆者實其中虚則耗房南衆星曰騎官左角理右角將大角者天王帝坐廷其兩旁各有三星鼎足句之曰攝提晉灼曰如鼎足之句曲也攝提者直斗枃所指以建時節故曰攝提格亢為宗廟主疾其南北兩大星曰南門氐為天根主疫尾為九子曰君臣斥絶不和箕為敖客后妃之府曰口舌火犯守角則有戰房心王者惡之南宫朱鳥權衡孟康曰軒轅為權太微為衡也衡太微三光之廷筐衞十二星藩臣西將東相南四星執法中端門左右掖門掖門内六星諸侯其内五星五帝坐後聚十五星曰哀烏郎位旁一大星將位也月五星順入軌道司其出所守天子所誅也其逆入若不軌道以所犯名之中坐成形晉灼曰中坐犯帝坐也成形禍福之形見皆羣下不從謀也金火尤甚廷藩西有隨星四名曰少微士大夫權軒轅黄龍體孟康曰形如騰龍前大星女主象旁小星御者後宫屬月五星守犯者如衡占東井為水事火入之一星居其左右天子且以火為敗東井西曲星曰戌北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質晉灼曰輿鬼五星其中白者為質火守南北河兵起榖不登故徳成衡觀成潢晉灼曰日月五星不軌道也衡太微廷也觀占也潢五潢五帝車舍也傷成戌晉灼曰賊傷之占先成形於戌禍成井晉灼曰東井主水事火入一星居其旁天子且以火敗故曰禍也誅成質晉灼曰熒惑入輿鬼天質占曰大臣有誅柳為鳥喙主木草七星頸為員宫主急事張嗉為厨主觴客翼為羽翮主逺客軫為車主風其旁有一小星曰長沙星星不欲明明與四星等若五星入軫中兵大起軫南衆星曰天庫庫有五車車星角若益衆及不具亡處車馬西宫咸池曰天五潢五潢五帝車舍火入旱金兵水水中有三柱柱不具兵起奎曰封豨為溝瀆婁為聚衆胃為天倉其南衆星曰廥積如淳曰芻槀積為廥也昴曰旄頭胡星也為白衣㑹畢曰䍐車為邊兵主弋獵其大星旁小星為附耳附耳㨱動有讒亂臣在側昴畢間為天街其隂隂國陽陽國孟康曰隂西南象坤維河山已北國也陽河山已南國也參為白虎三星直者是為衡石孟康曰參三星者白虎宿中東西直似稱衡也下有三星鋭曰罰孟康曰在參間上小下大故曰鋭晉灼曰三星小邪列無鋭形也為斬艾事其外四星左右肩股也小三星隅置曰觜觿為虎首主葆旅事如淳曰關中俗謂桑榆蘖生為葆晉灼曰禾野生曰旅今之饑民采旅也宋均曰葆守也旅軍衆也言佐參伐斬艾除凶也其南有四星曰天厠天厠下一星曰天矢矢黄則吉青白黑凶其西有句曲九星三處羅列一曰天旗二曰天苑三曰九斿其東有大星曰狼狼角變色多盜賊下有四星曰弧直狼比地有大星曰南極老人晉灼曰比地近地也老人見治安不見兵起常以秋分時候之南郊北宫𤣥武虛危危為蓋屋宋均曰危上一星髙旁兩星下似蓋屋也虚為哭泣之事宋均曰蓋屋之下中無人但空虚似乎殯宫故主哭泣也其南有衆星曰羽林天軍宋均曰虚危營室隂陽終始之處際㑹之間恒多姦邪故設羽林為軍衞軍西為壘或曰戌旁一大星北落北落若微亡軍星動角益稀及五星犯北落入軍軍起火金水尤甚火入軍憂水水患木土軍吉孟康曰木星土星入北落軍則吉也危東六星兩兩而比曰司冦營室為清廟曰離宫閣道漢中四星曰天駟旁一星曰王梁王梁策馬車騎滿野旁有八星絶漢曰天横天横旁江星江星動以人涉水杵臼四星在危南匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星上將左左星劉敞曰星蓋將字右右將婺女其北織女織女天女孫也歲星晉灼曰太歲在四仲則歲行三宿太歲在四孟四季則歲行二宿二八十六三四十二而行二十八宿十二歲而周天曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣罰見歲星歲星所在國不可伐可以伐人超舍而前為贏退舍為縮贏其國有兵不復縮其國有憂其將死國傾敗所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安靜中度吉出入不當其次必有天祅見其舍也歲星贏而東南孟康曰五星東行天西轉歲星晨見東方行疾則不見不見則變為祅星石氏見彗星甘氏不出三月廼生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月廼生天棓本類星末銳長四尺縮西南孟康曰歲星當伏西方行遲早沒變為祅星也石氏見欃雲如牛韋昭曰欃音參差之參甘氏不出三月廼生天槍左右鋭長數丈縮西北石氏見槍雲如馬甘氏不出三月廼生天欃本類星末銳長數丈石氏槍欃棓彗異狀其殃一也必有破國亂君伏死其辜餘殃不盡為旱凶饑暴疾至日行一尺出二十餘日廼入甘氏其國凶不可舉事用兵出而易所當之國是受其殃又曰祅星不出三年其下有軍及失地若國君喪宋祈曰三年當作五年熒惑晉灼曰常以十月入太微受制而出行列宿司無道出入無常也曰南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行一舍二舍為不祥居之三月國有殃五月受兵七月國半亡地九月地大半亡因宋祁曰亡因擬作亡國與俱出入國絶祀熒惑為亂為賊為疾為喪為饑為兵所居之宿國受殃殃還至者雖大當小居之久殃乃至者當小反大已去復還居之若居之而角者若動者繞環之及乍前乍後乍左乍右殃愈甚一曰熒惑出則有大兵入則兵散周還止息廼為其死喪寇亂在其野者亡地以戰不勝東行疾則兵聚於東方西行疾則兵聚於西方其南為丈夫喪北為女子喪熒惑天子理也故曰雖有明天子必視熒惑所在太白晉灼曰常以正月甲寅與熒惑晨出東方二百四十日而入入四十日又出西方二百四十日而入入三十五日而復出東方出以寅戌入以丑未也曰西方秋金義也言也義虧言失逆秋令傷金氣罰見太白日方南太白居其南日方北太白居其北為贏侯王不寧用兵進吉退凶日方南太白居其北日方北太白居其南為縮侯王有憂用兵退吉進凶當出不出當入不入為失舍不有破軍必有死王之墓有亡國一曰天下匽兵壄有兵者所當之國大凶當出不出未當入而入天下匽兵兵在外入未當出而出當入而不入天下起兵有至破國未當出而出未當入而入天下舉兵所當之國亡當期而出其國昌出東為東方入為北方出西為西方入為南方所居久其國利易其鄉凶蘇林曰疾過也一説易鄉而出入也晉灼曰上言出而易言疾過是也入七日復出將軍戰死入十日復出相死之入又復出人君惡之已出三日而復微入三日廼復盛出是為耎而伏晉灼曰耎退也不進而伏伏不見也其下國有軍其衆敗將北已入三日又復微出三日廼復盛入其下國有憂帥師雖衆敵食其糧用其兵虜其帥出西方失其行夷狄敗出東方失其行中國敗一曰出蚤為月食晚為天祅及彗星將發于亡道之國太白出而留桑楡間病其下國晉灼曰行遲而下也正出舉目平正出桑楡上餘二千里也上而疾未盡期日過參天病其對國晉灼曰三分天過其一此戌酉之間也太白經天天下革民更王孟康曰謂出東入西出西入東也太白隂星出東當伏東出西當伏西過午為經天晉灼曰日陽也日出則星亡晝見午上為經天是為亂紀人民流亡晝見與日爭明彊國弱小國彊女主昌太白兵象也出而髙用兵深吉淺凶埤淺吉深凶行疾用兵疾吉遲凶行遲用兵遲吉疾凶角敢戰吉不敢戰凶擊角所指吉逆之凶進退左右用兵進退左右吉靜凶圜以靜用兵靜吉趮凶出則兵出入則兵入象太白吉反之凶赤角戰太白者猶軍也而熒惑憂也故熒惑從太白軍憂離之軍舒出太白之隂有分軍出其陽有偏將之戰當其行太白還之破軍殺將辰星殺伐之氣戰鬬之象也與太白俱出東方皆赤而角夷狄敗中國勝與太白俱出西方皆赤而角中國敗夷狄勝五星分天之中積于東方中國大利積于西方夷狄用兵者利辰星不出太白為客辰星出太白為主人辰星與太白不相從雖有軍不戰辰星出東方太白出西方若辰星出西方太白出東方為格野雖有兵不戰辰星入太白中五日乃出及入而上出破軍殺將客勝下出客亡地辰星來抵太白不去將死正其上出破軍殺將客勝下出客亡地視其所指以名破軍辰星繞環太白若鬬大戰客勝主人吏死辰星過太白間可椷劒小戰客勝蘇林曰椷音函函容也其間可容一劒也居太白前旬三日軍罷出太白左小戰歴太白右數萬人戰主人吏死出太白右去三尺軍急約戰凡太白所出所直之辰其國為得位得位者戰勝所直之辰順其色而角者勝其色害者敗晉灼曰鄭色黄而赤蒼小敗宋色黄而赤黑小敗楚色赤黑小敗燕色黑黄小敗皆大角勝也太白白比狼赤比心黄比參右肩青比參左肩黑比奎大星色勝位晉灼曰有色勝得位也行勝色晉灼曰太白行得度勝有色也行得盡勝之晉灼曰行應天度雖有色得位行盡勝之行重而色位輕星經傳得字作徳辰星晉灼曰常以二月春分見奎婁五月夏至見東井八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二句而入晨候之東方夕候之西方也曰北方冬水知也聽也知虧聽失逆冬令傷水氣罰見辰星出蚤為月食晩為彗星及天祅一時不出其時不和四時不出天下大饑失其時而出為當寒反温當温反寒當出不出是謂擊卒兵大起與它星遇而鬬天下大亂晉灼曰祅星彗孛之屬也一曰五星出於房心間地動填星晉灼曰常以甲辰元始建斗之歲填行一宿二十八歲而周天也曰中央季夏土}
