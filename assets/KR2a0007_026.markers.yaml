  - {type: variant, offset: 5287, length: 1, content: 諸, krp: 起伯之異也其後王莽遂顓國柄王氏之興萌於成帝時是以有星隕之變後莽遂簒國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵}
  - {type: variant, offset: 5289, length: 5, content: 兵皆服屬楚, WYG: 淳于長坐執左道下獄死二年春熒惑守心二月乙丑丞相翟方進欲塞災異自殺三月丙戌宫車晏駕哀帝建平元年正月丁未日出時有著天白氣廣如一匹布長十餘丈西南行讙如雷西南行一刻而止名曰天狗傳曰言之不從則有犬禍詩妖到其四年正月二月三月民相驚動讙譁奔走傳行詔籌祠西王母又曰從目人當來十二月白氣出西南從地上至天出參下貫天厠廣如一疋布長十餘丈十餘日去占曰天子有隂病其三年十一月壬子太皇太后詔曰皇帝寛仁孝順奉承聖緒靡有解怠而久病未瘳夙夜惟思殆繼體之君不宜改作春秋大復古其復甘泉泰畤汾隂后土如故二年二月彗星出牽牛七十餘日傳曰彗所以除舊布新也牽牛日月五星所從起歴數之元三正之始彗而出之改更之象也其出久}
  - {type: page-break, offset: 5289, content: '', id: KR2a0007_WYG_026-42b, image: WYG0249/WYG0249-0575d.png}
