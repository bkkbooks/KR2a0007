  - {type: variant, offset: 7567, length: 380, content: 劉氏而王者七人上欲王綰為群臣觖望及虜臧荼乃下詔詔諸將相列侯擇群臣有功者以為燕王群臣知上欲王綰皆曰太尉長安侯盧綰常從平定天下功最多可王上乃立綰為燕王諸侯得幸莫如燕王者綰立六年以陳豨事見疑而敗豨者宛句人也不知始所以得從及韓王信反入匈奴上至平城還豨以郎中封為列侯以趙相國將監趙代邊邊兵皆屬焉豨少時常稱慕魏公子及將守邊招致賓客常告過趙賓客隨之者千餘乘邯鄲官舍皆滿豨所以待客如布衣交皆出客下趙相周昌乃求入見上具言豨賓客盛擅兵於外恐有變上令人覆案豨客居代者諸為不法事多連引豨豨恐陰令客通使王黃曼丘臣所漢十年秋太上皇崩上因是召豨豨稱病遂與王黃等反自立為代王劫略趙代上聞乃赦吏民為豨所詿誤劫略者上自擊豨破之語在高紀初上如邯鄲擊豨燕王綰亦擊其東北豨使王黃求救匈奴綰亦使其臣張勝使匈奴言豨等軍破勝至胡胡燕王臧荼子衍亡在胡見勝曰公所以重於燕者以習胡事也燕所以久存者以諸侯數反兵連不決, WYG: ''}
