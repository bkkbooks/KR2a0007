  - {type: variant, offset: 18, length: 0, content: '', WYG: 如淳曰姬音怡衆妾之總稱漢官儀曰姬妾數百外戚傳亦曰幸姬戚夫人臣瓚曰漢秩禄令及茂陵書姬並内官也秩比二千石位次婕妤下在八子上師古曰姬者本周之姓貴於衆國之女所以婦人美號皆稱姬焉故左氏傳曰雖有姬姜無棄蕉萃姜亦大國女也後因總謂衆妾為姬史記云高祖居山東時好美姬是也若姬是官號不應云幸姬戚夫人且外戚傳備列后妃諸官無姬職也如云衆妾總稱則近之不當音怡宜依字讀耳瓚説謬也}
