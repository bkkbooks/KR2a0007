  - {type: variant, offset: 5164, length: 0, content: '', WYG: 前漢書卷四前漢書卷四考證文帝紀立為代王臣召南按監夲作立子恒為代王非也帝紀中例不書名宋夲作立為代王下注宋祁曰越本立字下有子恒二字今從宋本頃王后注時呂􅎐為林光侯臣召南按林光當作臨光樊噲傳可證代王西鄉讓者三南鄉讓者再注即君位之漸也胡三省曰如淳説非代王所以再讓之意蓋王入代邸而漢廷羣臣繼至王以賔主禮接之故西鄉羣臣勸進王凡三讓羣臣遂扶王以正南面之位王又讓者再耳當受鬻者或以陳粟注淖溺也臣照按宋本無溺也二字以溺訓淖理不可通溺字當為泥字之訛以棘蒲侯柴武為大將軍將四將軍臣召南按四將軍昌侯盧卿也共侯盧罷師也寗侯魏遫也深澤侯趙將夜也見史記將相名臣表作顧成廟注因即為名監夲脱名字今補遣三將軍軍隴西北地上郡臣召南按上郡將軍昌侯盧卿也北地將軍寗侯魏遫也隴西將軍隆慮侯周竈也見匈奴傳建成侯董赫内史欒布皆為將軍臣召南按功臣表董赫是董渫之子封成侯非建成侯史記曰成侯赤為内史欒布為將軍是也公卿表於是年書内史董赤即依史記欒布傳未嘗為内史故公卿表不書此文建成侯既衍建字以内史連欒布為句亦非實事前漢書卷四考證}
