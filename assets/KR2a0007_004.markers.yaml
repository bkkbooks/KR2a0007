  - {type: variant, offset: 4816, length: 0, content: '', WYG: 服䖍曰皆當言大功小功布也纖細布衣也應劭曰紅者中祥大祥以紅為領緣纖者禫也凡三十六日而釋服矣此以日易月也晉灼曰漢書例以紅為功也師古曰紅與功同服晉二説是也此喪制者文帝自率已意創而為之非有取於周禮也何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之於前而近代學者因循謬説未之思也劉攽曰文帝制此喪服斷自己𦵏之後其未𦵏之前則服斬衰漢諸帝自崩至𦵏有百餘日者未𦵏則服不除矣翟方進傳後母終既𦵏三十六日起視事此其證也說者遂以日易月又不通計𦵏之日皆大謬也攷之文帝意既𦵏除重服制大紅小紅所以漸即吉耳又此内有注云傳曰方進供養後母甚篤以身備漢相不敢踰國家之制}
