  - {type: variant, offset: 7518, length: 198, content: 大擊北邊而西域亦瓦解焉耆國近匈奴先叛殺都護但欽莽不能討天鳳三年乃遣五威將王駿西域都護李崇將戊校尉出西域諸國皆郊迎送兵穀焉耆詐降而聚兵自備駿等將莎車龜茲兵七千餘人分為數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國兵為反間還共襲擊駿等皆殺之唯戊己校尉郭欽別將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽為剼胡子李崇收餘士還保龜茲數年莽死崇遂沒西域因絕最凡國五十自譯長城長君監吏大祿百長千長都尉且渠當戶將相至, WYG: 傳}
