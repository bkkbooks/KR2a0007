  - {type: variant, offset: 617, length: 0, content: '', WYG: 入朝從上獵上林中天子車駕䟆道未行師古曰已稱䟆止行人訖而天子未出也先使嫣乗副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道旁師古曰辟去其從者而身獨伏謁也辟音闢嫣驅不見既過江都王怒為皇太后泣請得歸國師古曰還爵封於天子也入宿衞比韓嫣太后繇此銜嫣嫣侍出入永巷不禁師古曰言上恣其出入也以姦聞皇太后太后怒使使賜嫣死上為謝終不能得嫣遂死嫣弟説亦愛幸師古曰説讀曰悦以軍功封案道侯巫蠱時為戾太子所殺子增封龍雒侯師古曰雒字或作頟大司馬車騎將軍自有傳師古曰在韓信傳末李延年中山人身及父母兄弟皆故倡也師古曰樂人也延年坐法腐刑給事狗監中師古曰掌天子之狗於其中供事也女弟得幸於上號李夫人列外戚傳延年善歌為新變聲是時上方興天地諸祠宋氏校本云浙本無新字越本無諸字欲造樂令司馬相如等作詩頌延年輒承意弦歌所造詩為之新聲曲宋氏校本云景徳本承作丞又一本無新字而李夫人産昌邑王延年繇是貴為協律都尉佩二千石印綬而與上臥起其愛幸埓韓嫣師古曰埓等齊宋祁曰注末當有也字久之延年弟季與中人亂出入驕恣及李夫人卒後其愛弛師古曰弛解也音式爾反上遂誅延年兄弟宗族是後寵臣大氐外戚之家也師古曰氐歸也音丁禮反衛青霍去病皆愛幸然亦以功能自進石顯字君房濟南人𢎞恭沛人也皆少坐法腐刑為中黄門以選為中尚書宣帝時任中書官宋祁曰任中字下當有尚字恭明習法令故事善為請奏能稱其職恭為令顯為僕射元帝即位數年恭死顯代為中書令是時元帝被疾不親政事宋祁曰浙本無事字方隆好於音樂以顯久典事中人無外黨師古曰少骨肉之親無婚姻之家也精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能探得人主微指内深賊持詭辯以中傷人師古曰詭違也違道之辯宋祁曰注末當有也字忤恨睚眦輒被以危法師古曰被加也音皮義反初元中前將軍蕭望之及光祿大夫周堪宗正劉更生皆給事中望之領尚書事知顯專權邪辟師古曰辟讀曰闢}
