  - {type: variant, offset: 7431, length: 0, content: '', WYG: 上以王氏亡在位者遂用舊恩親近去疾復進其弟閎為中常侍閎妻父蕭咸前將軍望之子也久為郡守劉攽曰多久字病免為中郎將兄弟並列賢父恭慕之欲與結㛰姻閎為賢弟駙馬都尉寛信求咸女為婦咸惶恐不敢當私謂閎曰董公為大司馬冊文言允執其中此廼堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪師古曰家人猶言庶人也蓋咸自謂閎性有知畧聞咸言心亦悟廼還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不説師古曰説讀曰悦}
  - {type: page-break, offset: 7431, content: '', id: KR2a0007_WYG_093-17a, image: WYG0251/WYG0251-0086a.png}
