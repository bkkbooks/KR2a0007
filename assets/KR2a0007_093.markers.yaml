  - {type: variant, offset: 375, length: 1, content: 蚤, WYG: 齰癰師古曰齰齧也齧出其膿血齰音仕客反宋祁曰注文血字下疑有也字太子齰癰而色難之已而聞通嘗為上齰之太子慙繇是心恨通師古曰繇讀與由同其下類此及文帝崩景帝立鄧通免家居居無何人有告通盜出徼外鑄錢師古曰徼猶塞也東北謂之塞西南謂之徼塞者以障塞為名徼者取徼遮之義也徼音工釣反下吏驗問頗有遂師古曰遂成也成其罪狀劉攽曰遂字屬下句竟案盡沒入之通家尚負責數鉅萬張晏曰顧人採銅鑄錢未還庸直而㑹沒入故也師古曰此説非也積其前後所犯合没官者數多除其見在財物以外尚有負官數鉅萬故云吏輒隨没入之耳非負顧庸之私直長公主賜鄧通師古曰即館陶長公主文帝之女也吏輒隨沒入之一簪不得著身於是長公主乃令假衣食晉灼曰使假貸而私為償之也師古曰此説非也公主給其衣食也而號云假借之耳非通自有也恐吏没入故託云然此所謂不得名一錢宋祁曰注文公字上疑有長字給字上疑有且字食也也字當刪竟不得名一錢寄}
