  - {type: variant, offset: 7427, length: 2, content: 烏賁, WYG: 御史大夫時賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車廼却入賢至中門光入閤宋祁曰入字上當有又字既下車廼出拜謁送迎甚謹不敢以賔客鈞敵之禮賢歸上聞之喜立拜光兩兄子為諫大夫常侍賢繇是權與人主侔矣師古曰侔等也是時成帝外家王氏衰廢唯平阿侯譚子去疾哀帝為太子時為庶子得幸及即位為侍中騎}
