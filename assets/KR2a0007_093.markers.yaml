  - {type: variant, offset: 625, length: 0, content: '', WYG: 一軀稱快萬衆師古曰稱音尺孕反任天下之怨師古曰任猶當也臣願歸樞機職受後宫掃除之役死無所恨唯陛下哀憐財幸師古曰財與裁同以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜及賂遺訾一萬萬師古曰賂遺謂百官羣下所遺也訾讀與貲同初顯聞衆人匈匈言已殺前將軍蕭望之望之當世名儒顯恐天下學士姍已師古曰姍古訕字訕謗也音所諫反病之是時明經著節士瑯邪貢禹為諫大夫顯使人致意深自結納顯因薦禹天子歴位九卿至御史大夫禮事之甚備議者於是稱顯以為不妬譖望之矣顯之設變詐以自解免取信人主者皆此類也元帝晩節寢疾師古曰晩節猶言末時也定陶恭王愛幸顯擁祐太子頗有功元帝崩成帝初即位遷顯為長信中太僕秩中二千石顯失倚離權數月丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與}
