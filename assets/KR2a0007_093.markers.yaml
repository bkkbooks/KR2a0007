  - {type: variant, offset: 7514, length: 2, content: 遂絕, WYG: 便嬖所任非仁賢故仲尼著損者三友師古曰論語稱孔子曰損者三友友便辟友善柔友便佞損矣王者不私人以官殆為此也師古曰殆近也前漢書卷九十三前漢書卷九十三考證鄧通傳鄧猶登也按史記無此四字人有告通盜出徼外鑄錢注師古曰東北謂之塞西南謂之徼胡三省曰}
