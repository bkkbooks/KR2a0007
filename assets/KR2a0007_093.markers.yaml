  - {type: variant, offset: 303, length: 5, content: 令騫齎金幣, WYG: 彭祖以舊恩封陽都侯出常參乗號為愛幸其人謹勅無所虧損師古曰勅整也為其小妻所毒薨國除鄧通蜀郡南安人也以濯舩為黄頭郎師古曰濯舩能持濯行舩也土勝水其色黄故刺舩之郎皆著黄帽因號曰黄頭郎也濯讀曰櫂音直孝反文帝嘗夢欲上天不能有一黄頭郎推上天顧見其衣尻帶後穿師古曰衣尻帶後謂衣當尻上而居革帶之下處也宋祁曰注末也字當刪覺而之漸臺師古曰覺謂寢寐之寤也未央殿西南有蒼池池中有漸臺覺音工孝反以夢中陰自求推者郎師古曰黙而視之求所夢者見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也文帝甚説師古曰説讀曰悦尊幸之日日異通亦愿謹不好外交師古曰専謹曰愿音願又音原雖賜洗沐不欲出於是文帝賞賜通鉅萬以十數師古曰每賜輒鉅萬如此者十數劉攽曰積前後賞賜盈鉅萬者以十數爾不謂一賜則鉅萬也官至上大夫文帝時間如通家游戲師古曰間謂投隙私行不公顯也如}
