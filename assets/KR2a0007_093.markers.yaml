  - {type: variant, offset: 7097, length: 1, content: 稱, WYG: 明威立義折消未萌師古曰未萌謂禍難之未生者又不深疾雲宏之惡而懷非君上阿為宣呉師古曰以君上為非懷此心也反痛恨雲等揚言為羣下所寃又親見言伍宏善醫死可惜也師古曰見見天子也賢等獲封極幸嫉妬忠良非毁有功於戲傷哉師古曰於讀曰烏戲讀曰呼蓋君親無將將而誅之師古曰將謂將為逆亂也是以季友鴆叔牙春秋賢之趙盾不討賊謂之弑君師古曰季友魯桓公少子莊公母弟也叔牙亦桓公子莊公有疾叔牙}
