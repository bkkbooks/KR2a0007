  - {type: variant, offset: 7111, length: 5, content: 召置離驗問, WYG: 良史也書法不隠趙宣子古之良大夫也為法受惡朕閔將軍䧟於重刑故以書飭師古曰飭與勑同將軍遂非不改復與丞相嘉相比師古曰比謂比周也音頻寐反令嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未􅃘孟康曰易曰噬膚滅鼻噬食也膚膏也喻爵祿恩澤加之不􅃘誅也師古曰孟説非也易噬嗑卦九二爻}
  - {type: variant, offset: 7111, length: 5, content: 召置離驗問, krp: 良史也書法不隠趙宣子古之良大夫也為法受惡朕閔將軍䧟於重刑故以書飭師古曰飭與勑同將軍遂非不改復與丞相嘉相比師古曰比謂比周也音頻寐反令嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未忍孟康曰易曰噬膚滅鼻噬食也膚膏也喻爵祿恩澤加之不忍誅也師古曰孟説非也易噬嗑卦九二爻}
