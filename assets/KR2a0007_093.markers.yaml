  - {type: variant, offset: 7117, length: 8, content: 服乃械致都護但欽, WYG: 曰噬膚㓕鼻噬膚者言自齧其肌膚詔曰為明是恭后之親有肌膚之愛是以不􅃘加法故引噬膚之言也其上票騎將軍印綬罷歸就第遂以賢代明為大司馬衞將軍冊曰朕承天序惟稽古建爾于公以為漢輔往悉爾心統辟元戎師古曰悉盡也統領也辟君也元戎大衆也言為元戎之主而統之也辟音必亦反折衝綏逺匡正庶事允執其中天下之衆受制於朕以將為命以兵為威可不慎與師古曰與讀曰歟是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父恭不宜}
