  - {type: variant, offset: 626, length: 1, content: 焉, WYG: 子徙歸故郡憂滿不食道病死師古曰滿讀曰懣音悶諸所交結以顯為官皆廢罷少府五鹿充宗左遷𤣥莵太守御史中丞伊嘉為鴈門都尉長安謠曰伊徙鴈鹿徙莵去牢與陳實無賈師古曰賈讀曰價淳于長字子􅐐宋祁曰􅐐越本作鴻校本作孺魏郡元城人也少以太后姊子為黄門郎未進宋祁曰進字上當有得字幸會大將軍王鳯病長侍病晨夜扶丞左右甚有甥舅之恩鳯且終以長屬託太后及帝師古曰屬音之欲反帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衞尉九卿久之趙飛燕貴幸上欲立以為皇后太后以其所出微難之長主往來通語東宫師古曰主猶專歳餘趙皇后得立上甚徳之廼追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海内師古曰罷讀曰疲侍中衞尉長數白宜止徙家反故處師古曰陵置邑徙人以實之長奏令止所徙之家各還本處朕以長言下公卿議者皆合長計首建至䇿民以康寧師古曰康安也其}
