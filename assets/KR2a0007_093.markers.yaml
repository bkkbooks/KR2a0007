  - {type: variant, offset: 910, length: 691, content: 祿子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主解憂生三男兩女長男曰元貴靡次曰萬年為莎車王次曰大樂為左大將長女弟史為龜茲王絳賓妻小女素光為若呼翕侯妻昭帝時公主上書言匈奴發騎田車師車師與匈奴為一共侵烏孫唯天子幸救之漢養士馬議欲擊匈奴會昭帝崩宣帝初即位公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫取車延惡師地收人民去使使謂烏孫趣持公主來欲隔絕漢昆彌願發國半精兵自給人馬五萬騎盡力擊匈奴唯天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出語在匈奴傳遣校尉常惠使持節護烏孫兵昆彌自將翕侯以下五萬騎從西方入至右谷蠡王庭獲單于父行及嫂居次名王犂汙都尉千長騎將以下四萬級馬牛羊驢橐駝七十餘萬頭烏孫皆自取所虜獲還封惠為長羅侯是歲本始三年也漢遣惠持金幣賜烏孫貴人有功者元康二年烏孫昆彌因惠上書願以漢外孫元貴靡為嗣得令復尚漢公主結婚重親畔絕匈奴願聘馬驘各千匹詔下公卿議大鴻臚蕭望之以為烏孫絕域變故難保不可許上美烏孫新立大功又重絕故業遣使者至烏孫先迎取聘昆彌及太子左右大將都尉皆遣使凡三百餘人入漢迎取少主上乃以烏孫主解憂弟子相夫為公主置官屬侍御百餘人舍上林中學烏孫言天子自臨平樂觀會匈奴使者外國君長大角抵設樂而遣之使長羅侯光祿大夫惠為副凡持節者四人送少主至敦煌未出塞聞烏孫昆彌翁歸靡死烏孫貴人共從本約立岑陬子泥靡代為昆彌號狂王惠上書願留少主敦煌惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以為烏孫持兩端難約結前公主在烏孫四十餘年恩愛不親密邊竟未得安此已事之驗也今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興其原起此天子從之徵還少主狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失眾漢使衛, WYG: ''}
