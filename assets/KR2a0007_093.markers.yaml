  - {type: variant, offset: 1723, length: 379, content: 長史張翁留驗公主與使者謀殺狂王狀主不服叩頭謝張翁捽主頭罵詈主上書翁還坐死副使季都別將醫養視狂王狂王從十餘騎送之都還坐知狂王當誅見便不發下蠶室初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翕侯俱去居北山中揚言母家匈奴兵來故眾歸之後遂襲殺狂王自立為昆彌漢遣破羌將軍辛武賢將兵萬五千人至敦煌遣使者案行表穿卑鞮侯井以西欲通渠轉穀積居廬倉以討之初楚主侍者馮嫽能史書習事嘗持漢節為公主使行賞賜於城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人說烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號宣帝徵馮夫人自問狀遣謁者竺次期門甘延壽為副送馮夫人馮夫人錦車持節詔烏就屠詣長羅侯赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翕侯民眾漢復遣長羅侯惠將三校屯赤谷因為分別其人民地界大昆彌戶六萬餘小昆彌戶四萬餘然眾心皆附小昆彌元貴靡鴟靡皆, WYG: 輔政數嵗久}
