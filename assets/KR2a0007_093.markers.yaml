  - {type: variant, offset: 7887, length: 282, content: 珠文甲通犀翠羽之珍盈於後宮蒲梢龍文魚目汗血之馬充於黃門鉅象師子猛犬大雀之群食於外囿殊方異物四面而至於是廣開上林穿昆明池營千門萬戶之宮立神明通天之臺興造甲乙之帳落以隨珠和璧天子負黼依襲翠被馮玉几而處其中設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃榷酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭因之以凶年寇盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則葱嶺身熱頭痛縣度之阸淮南杜欽揚雄之論皆以為此天地所以界別區域絕外內也, WYG: 乎前漢}
