  - {type: variant, offset: 7438, length: 6, content: 烏絫單于咸立, WYG: 侍中中常侍皆在側上有酒所師古曰言酒在體中從容視賢笑師古曰從音千容反宋祁曰賢字下當有而字曰吾欲法堯禪舜何如閎進曰天下廼髙皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上黙然不説師古曰説讀曰悦左右皆恐於是遣閎出後不得}
