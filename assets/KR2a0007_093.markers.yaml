  - {type: variant, offset: 6959, length: 0, content: '', WYG: 傳言語於太后及帝若立趙飛燕之類紅陽侯立獨不得為大司馬輔政立自疑為長毁譖常怨毒長上知之及長當就國也立嗣子融從長請車騎師古曰嗣子謂嫡長子當為嗣者也長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲㑄長定宫師古曰㑄古侮字謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡師古曰若者其母名紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人}
