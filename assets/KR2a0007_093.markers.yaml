  - {type: variant, offset: 7505, length: 8, content: 後莽復欺詐單于和, WYG: 頭首今以閎子補吏至墨綬卒官蕭咸外孫云宋祁曰咸字下當有之字贊曰柔曼之傾意師古曰曼澤也言其質柔而色理光澤也非獨女徳蓋亦有男色焉觀籍閎鄧韓之徒非一而董賢之寵尤盛父子並為公卿可謂貴重人臣無二矣然進不繇道師古曰言本不以徳進繇讀與由同位過其任莫能有終所謂愛之適足以害之者也漢世衰於元成壞於哀平哀平之際國多釁矣師古曰釁謂間隙也主疾無嗣弄臣為輔鼎足不彊棟幹微撓師古曰撓弱也音女教反一朝帝崩姦臣擅命董賢縊死丁傅流放辜及母后奪位幽廢師古曰謂貶皇太后趙氏為孝成皇后退居北宫哀皇后傅氏退居桂宫咎在}
  - {type: page-break, offset: 7505, content: '', id: KR2a0007_WYG_093-20a, image: WYG0251/WYG0251-0087c.png}
