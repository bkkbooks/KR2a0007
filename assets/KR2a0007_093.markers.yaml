  - {type: variant, offset: 7453, length: 0, content: '', WYG: 召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得入出宫殿司馬中宋祁曰入出當作出入中字上當有門字賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下冊賢師古曰即就也曰間者以來陰陽不調菑害並臻師古曰菑古災字元元蒙辜師古曰䝉被也夫三公鼎足之輔也髙安侯賢未更事理師古曰更歴也音工衡反為大司馬不合衆心非所以折衝綏逺也其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬莽疑其詐死有司奏請發賢棺至獄􅐷視師古曰謂發冢取其棺柩也􅐷驗也音􅎮莽復風大司徒光奏賢師古曰風讀曰諷光孔光也質性巧佞翼姦以獲封侯師古曰翼進也父子專朝兄弟並寵}
