  - {type: variant, offset: 7499, length: 0, content: '', WYG: 中小民讙譁鄉其第哭幾𫉬盜之師古曰陽往哭之實欲竊盜也鄉讀曰嚮幾讀曰冀縣官斥賣董氏財凡四十三萬萬賢既見發臝􅐷其尸師古曰臝露形也音郎果反因埋獄中賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸葬之王}
