  - {type: variant, offset: 2123, length: 4797, content: 閔而迎之公主與烏孫男女三人俱來至京師是歲甘露三年也時年且七十賜以公主田宅奴婢奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓云元貴靡子星靡代為大昆彌弱馮夫人上書願使烏孫鎮撫星靡漢遣之卒百人送焉都護韓宣奏烏孫大吏大祿大監皆可以賜金印紫綬以尊輔大昆彌漢許之後都護韓宣復奏星靡怯弱可免更以季父左大將樂代為昆彌漢不許後段會宗為都護招還亡畔安定之星靡死子雌粟靡代小昆彌烏就屠死子拊離代立為弟日貳所殺漢遣使者立拊離子安日為小昆彌日貳亡阻康居漢徙己校屯姑墨欲侯便討焉安日使貴人姑莫匿等三人詐亡從日貳刺殺之都護廉襃賜姑莫匿等金人二十斤繒三百匹後安日為降民所殺漢立其弟末振將代時大昆彌雌粟靡健翕侯皆畏服之告民牧馬畜無使入牧國中大安和翁歸靡時小昆彌末振將恐為所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎將段會宗持金幣與都護圖方略立雌粟靡季父公主孫伊秩靡為大昆彌漢沒入小昆彌侍子在京師者久之大昆彌翕侯難栖殺末振將末振將兄安日子安犂靡代為小昆彌漢恨不自誅末振將復使段會宗即斬其太子番丘還賜爵關內侯是歲元延二年也會宗以翕侯難栖殺末振將雖不指為漢合於討賊奏以為堅守都尉責大祿大吏大監以雌粟靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰疐本共謀殺大昆彌將眾八萬餘口北附康居謀欲藉兵兼并兩昆彌兩昆彌畏之親倚都護哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以為榮至元始中卑爰疐殺烏日領以自效漢封為歸義侯兩昆彌皆弱卑爰疐侵陵都護孫建襲殺之自烏孫分立兩昆彌後漢用憂勞且無寧歲姑墨國王治南城去長安八千一百五十里戶三千五百口二萬四千五百勝兵四十五百人姑墨侯輔國侯都尉左右將左右騎君各一人譯長二人東至都護治所二千二十一里南至于闐馬行十五日北與烏孫接出銅鐵雌黃東通龜茲六百七十里王莽時姑墨王丞殺溫宿王并其國溫宿國王治溫宿城去長安八千三百五十里戶二千二百口八千四百勝兵千五百人輔國侯左右將左右都尉左右騎君譯長各二人東至都護治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里土地物類所有與鄯善諸國同東通姑墨二百七十里龜茲國王治延城去長安七千四百八十里戶六千九百七十口八萬一千三百一十七勝兵二萬一千七十六人大都尉丞輔國侯安國侯擊胡侯卻胡都尉擊車師都尉左右將左右都尉左右騎君左右力輔君各一人東西南北部千長各二人卻胡君三人譯長四人南與精絕東南與且末西南與杅彌北與烏孫西與姑墨接能鑄冶有鉛東至都護治所烏壘城三百五十里烏壘戶百一十口千二百勝兵三百人城都尉譯長各一人與都護同治其南三百三十里至渠犂渠犁城都尉一人戶百三十口千四百八十勝兵百五十人東北與尉犂東南與且末南與精絕接西有河至龜茲五百八十里自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海內虛耗征和中貳師將軍李廣利以軍降匈奴上既悔遠征伐而搜粟都尉桑弘羊與丞相御史奏言故輪臺東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時孰其旁國少錐刀貴黃金采繒可以易穀食宜給足不乏臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分護各舉圖地形通利溝渠務使以時益種五穀張掖酒泉遣騎假司馬為斥侯屬校尉事有便宜因騎置以聞田一歲有積穀募民壯健有累重敢徙者詣田所就畜積為本業益墾溉田稍築列亭連城而西以威西國輔烏孫為便臣謹遣徵事臣昌分部行邊嚴敕太守都尉尉明熢火選士馬謹斥候畜茭草願陛下遣使使西國以安其意臣昧死請上乃下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍漢軍破城食至多然士自載不足以竟師彊者盡食畜產羸者道死數千人朕發酒泉驢橐駝負食出玉門迎軍吏卒起張掖不甚遠然尚廝留甚眾曩者朕之不明以軍侯弘上書言匈奴縛馬前後足置城下馳言秦人我匄若馬又漢使者久留不還故興遣貳師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縛馬書徧視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以為欲以見彊夫不足者視人有餘易之卦得大過爻在九五匈奴困敗公車方士太史治星望氣及太卜龜蓍皆以為吉匈奴必破時不可再得也又曰北伐行將於鬴山必克卦諸將貳師最吉故朕親發貳師下鬴山詔之必毋深入今計謀卦兆皆反繆重合侯得虜侯者言聞漢軍當來匈奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘常使巫祝之縛馬者詛軍事也又卜漢軍一將不吉匈奴常言漢極大然不能飢渴失一狼走千羊乃者貳師敗軍士死略離散悲痛常在朕心今請遠田輪臺欲起亭隧是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封侯之賞報忿五伯所弗能為也且匈奴得漢降者常提掖搜索問以所聞今邊塞未正闌出不禁障候長吏使卒獵獸以皮肉為利卒苦而熢火乏失亦上集不得後降者來若捕生口虜乃知之當今務在禁苛暴止擅賦力本農脩馬復令以補缺毋乏武備而已郡國二丈石各上進畜馬方力略補邊狀與計對由是不復出軍而封丞相車千秋為富民侯以明休息思富養民也初貳師將軍李廣利擊大宛還過杅彌杅彌遣太子賴丹為質於龜茲廣利責龜茲曰外國皆臣屬於漢龜茲何以得受杅彌質即將賴丹入至京師昭帝乃用桑弘羊前議以杅彌太子賴丹為校尉將軍田輪臺輪臺與渠犂地皆相連也龜茲貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來追吾國而田必為害王即殺賴丹而上書謝漢漢未能征宣帝時長羅侯常惠使烏孫還便宜發諸國兵合五萬人攻龜茲責以前殺尉賴丹龜茲王謝曰乃我先王時為貴人姑翼所誤我無罪執姑翼詣惠惠斬之時烏孫公主遣女來至京師學鼓琴漢遣侍郎樂奉送主女過龜茲龜茲前遣人至烏孫求公主女未還會女過龜茲龜茲王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜茲王絳賓亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼撞鐘鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂驘也絳賓死其子丞德自謂漢外孫成哀帝時往來尤數漢遇之亦甚親密東通尉犂六百五十里尉犂國王治尉犂城去長安六千七百五十里戶千二百口九千六百勝兵二千人尉犂侯安世侯左右將左右都尉擊胡君各一人譯長二人西至都護治所三百里南與鄯善且末接危須國王治危須城去長安七千二百九十里戶七百口四千九百勝兵二千人擊胡侯擊胡都尉左右將左右都尉左右騎君擊胡君譯長各一人西至都護治所五百里至焉耆百里焉耆國王治員渠城去長安七千三百里戶四千口三萬二千一百勝兵六千人擊胡侯卻胡侯輔國侯左右將左右都尉擊胡左右君擊車師君歸義車師君各一人擊胡都尉擊胡君各二人譯長三人西南至都護治所四百里南至尉犂百里北與烏孫接近海水多魚烏貪訾離國王治于婁谷去長安萬三百三十里戶四十一口二百三十一勝兵五十七人輔國侯左右都尉各一人東與單桓南與且彌西與烏孫接卑陸國王治天山東乾當國去長安八千六百八十里戶二百二十七口千三百八十七勝兵四百二十二人輔國侯左右將左右都尉左右譯長各一人西南至都護治所千二百八十七里卑陸後國王治番渠類谷去長安八千七百一十里戶四百六十二口千一百三十七勝兵三百五十人輔國侯都尉譯長各一人將二人東與郁立師北與匈奴西與劫國南與車師接郁立師國王治內咄谷去長安八千八百三十里戶百九十口千四百四十五勝兵三百三十一人輔國侯左右都尉譯長各一人東與車師後城長西與卑陸北與匈奴接單桓國王治單桓城去長安八千八百七十里戶二十七口百九十四勝兵四十五人輔國侯將左右都尉譯長各一人蒲類國王治天山西疏榆谷去長安八千三百六十里戶三百二十五口二千三十二勝兵七百九十九人輔國侯左右將左右都尉各一人西南至都護治所千三百八十七里蒲類後國王去長安八千六百三十里戶百口千七十勝兵三百三十四人輔國侯將左右都尉譯長各一人西且彌國王治天山東于大谷去長安八千六百七十里戶三百三十二口千九百二十六勝兵七百三十八人西且彌侯左右將左右騎君各一人西南至都護治所千四百八十七里東且彌國王治天山東兌虛谷去長安八千二百五十里戶百九十一口千九百四十八勝兵五百七十二人東且彌侯左右都尉各一人西南至都護治所千五百八十七里劫國王治天山東丹渠谷去長安八千五百七十里戶九十九口五百勝兵百一十五人輔國侯都尉譯長各一人西南至都護治所千四百八十七里狐胡國王治車師柳谷去長安八千二百里戶五十五口二百六十四勝兵四十五人輔國侯左右都尉各一人西至都護治所千一百四十七里至焉耆七百七十里山國王去長安七千一百七十里戶四百五十口五千勝兵千人輔國侯左右將左右都尉譯長各一人西至尉犂二百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接山出鐵民山居寄田糴穀於焉耆危須車師前國王治交河城河水分流繞城下故號交河去長安八千一百五十里戶七百口六千五十勝兵千八百六十五人輔國侯安國侯左右將都尉歸漢都尉車師君通善君鄉善君各一人譯長二人西南至都護治所千八百七里至焉耆八百三十五里車師後國王治務塗谷去長安八千九百五十里戶五百九十五口四千七百七十四勝兵千八百九十人擊胡侯左右將左右都尉道民君譯長各一人西南至都護治所千二百三十七里車師都尉國戶四十口三百三十三勝兵八十四人車師後城長國戶百五十四口九百六十勝兵二百六十人武帝天漢二年以匈奴降者介和王為開陵侯將樓蘭國兵始擊車師匈奴遣右賢王將數萬騎救之漢兵不利引去征和四年遣重合侯馬通將四萬騎擊匈奴道過車師北復遣開陵侯將樓蘭尉犂危須凡六國兵別擊車師勿令得遮重合侯諸國兵共圍車師車師王降服臣屬漢昭帝時匈奴復使四千騎田車師宣帝即位遣五將將兵擊匈奴車師田者驚去車師復通於漢匈奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴為太子及烏貴立為王與匈奴結婚姻教匈奴遮漢道通烏孫者地節二年漢遣侍郎鄭吉校尉司馬憙將免刑罪人田渠犂積穀欲以攻車師至秋收穀吉憙發城郭諸國兵萬餘人自