  - {type: variant, offset: 618, length: 2, content: 女細, WYG: 白以為尚書百官之本國家樞機師古曰立此議而白之宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人師古曰禮刑人不在}
