  - {type: variant, offset: 467, length: 147, content: 距匈奴不足破也烏孫遠漢未知其大小又近匈奴服屬日久其大臣皆不欲徙昆莫年老國分不能專制乃發使送騫因獻馬數十匹報謝其使見漢人眾富厚歸其國其國後乃益重漢匈奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛月氏相屬不絕烏孫於是恐使使獻馬願得尚漢公主為昆弟天子問群臣議許曰必先內聘然後遣女烏孫以馬千匹聘漢元封中遣, WYG: 臥起}
