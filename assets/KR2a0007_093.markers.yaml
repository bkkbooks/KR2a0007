  - {type: variant, offset: 621, length: 0, content: '', WYG: 側故云應古元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用語在望之傳後大中大夫張猛魏郡太守京房御史中丞陳咸待詔賈捐之皆嘗奏封事或召見言顯短顯求索其辠房捐之棄市猛自殺於公車咸抵辠髠為城旦及鄭令蘇建得顯私書奏之後以它事論死自是公卿以下畏顯重足一迹師古曰言極恐懼不敢自寛縱顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位師古曰倚依也音於綺反民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪師古曰纍纍重積也若若長貌纍音力追反言其兼官據埶也顯見左將軍馮奉世父子}
  - {type: page-break, offset: 621, content: '', id: KR2a0007_WYG_093-7a, image: WYG0251/WYG0251-0081a.png}
  - {type: variant, offset: 621, length: 0, content: '', krp: 側故云應古元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用語在望之傳後大中大夫張猛魏郡太守京房御史中丞陳咸待詔賈捐之皆嘗奏封事或召見言顯短顯求索其辠房捐之棄市猛自殺於公車咸抵辠髠為城旦及鄭令蘇建得顯私書奏之後以它事論死自是公卿以下畏顯重足一迹師古曰言極恐懼不敢自寛縱顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位師古曰倚依也音於綺反民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪師古曰纍纍重積也若若長貌纍音力追反言其兼官據埶也顯見左將軍馮奉世父子}
  - {type: variant, offset: 623, length: 0, content: '', WYG: 卿著名女又為昭儀在内顯心欲附之薦言昭儀兄謁者逡師古曰逡音千旬反脩敕宜侍帷幄師古曰敕整也天子召見欲以為侍中逡請間言事上聞逡言顯顓權師古曰顓與專同其下類此天子大怒罷逡歸郎官劉攽曰郎宜作故其後御史大夫缺羣臣皆舉逡兄大鴻臚野王行能第一天子以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢師古曰度過也私後宫親以為三公上曰善吾不見是師古曰言不見此理廼下詔嘉美野王廢而不用語在野王傳顯内自知擅權事柄在掌握恐天子一旦納用左右耳目有以間已師古曰間音工莧反廼時歸誠取一言以為驗顯嘗使至諸官有所徵發顯先自白恐後漏盡宫門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有人上書告顯顓命矯詔開宫門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事師古曰過猶誤也屬委也屬音之欲反羣下無不嫉妬欲䧟害臣者事類如此非一唯獨明}
