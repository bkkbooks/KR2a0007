  - {type: variant, offset: 6927, length: 0, content: '', WYG: 至對衣冠議語署置師古曰自謂當輔政故豫言某人為某官某人主某事具言其辠過根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宫師古曰趣讀曰促莽求見太后具言長驕佚師古曰佚讀與逸同欲代曲陽侯對莽母上車師古曰莽母於長舅之妻也上車當於異處便於前上言不敬私與長定貴人姊通受取其衣物太后亦怒曰兒至如此往白之帝莽白上上廼免長官}
