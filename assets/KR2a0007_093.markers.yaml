  - {type: variant, offset: 7496, length: 1, content: 到, WYG: 禮師古曰言不敬天子之使受賜不拜辠惡暴著賢自殺伏辜死後父恭不悔過乃復以沙畫棺師古曰以朱砂塗之而又雕畫也四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺師古曰以此物棺斂也棺音工喚反至尊無以加恭等幸得免於誅不宜在中土臣請收沒入財物縣官諸以賢為官者皆免父恭弟寛信與家屬徙合浦母别歸故郡鉅鹿}
