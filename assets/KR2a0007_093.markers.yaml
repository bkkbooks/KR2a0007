  - {type: variant, offset: 8170, length: 188, content: 曰西戎即序禹既就而序之非上威服致其貢物也西域諸國各有君長兵眾分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能統率與之進退與漢隔絕道里又遠得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫匈奴尚為所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都護聖上遠覽古今因時之宜羈縻不絕辭而未許雖大禹之序西戎周公之讓白雉太宗之卻走馬義兼之矣亦何以尚茲, WYG: 卷九十三考證}
