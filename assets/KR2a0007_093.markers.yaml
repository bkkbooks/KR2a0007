  - {type: variant, offset: 6959, length: 0, content: '', krp: 傳言語於太后及帝若立趙飛燕之類紅陽侯立獨不得為大司馬輔政立自疑為長毁譖常怨毒長上知之及長當就國也立嗣子融從長請車騎師古曰嗣子謂嫡長子當為嗣者也長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲㑄長定宫師古曰㑄古侮字謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡師古曰若者其母名紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人}
  - {type: variant, offset: 6960, length: 1, content: 使, WYG: 遂代根為大司馬久之還長母及子酺於長安師古曰酺音蒲後酺有辠莽復殺之徙其家屬歸故郡始長以外親親近師古曰親近謂近幸於天子近音其靳反其愛幸不及富平侯張放放常與上臥起俱為微行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舎人哀帝立賢隨太子官為郎師古曰東宫官屬隨例遷也二歲餘賢傳漏在殿下師古曰𫝊漏奏時刻為人美麗自喜師古曰喜音許吏反哀帝望見説其儀貌師古曰説讀曰悦識而問之曰是舎人董賢邪因引上與語拜為黄門郎繇是始幸問及其父為雲}
  - {type: page-break, offset: 6960, content: '', id: KR2a0007_WYG_093-12a, image: WYG0251/WYG0251-0083c.png}
  - {type: variant, offset: 6960, length: 1, content: 使, krp: 遂代根為大司馬久之還長母及子酺於長安師古曰酺音蒲後酺有辠莽復殺之徙其家屬歸故郡始長以外親親近師古曰親近謂近幸於天子近音其靳反其愛幸不及富平侯張放放常與上臥起俱為微行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舎人哀帝立賢隨太子官為郎師古曰東宫官屬隨例遷也二歲餘賢傳漏在殿下師古曰𫝊漏奏時刻為人美麗自喜師古曰喜音許吏反哀帝望見説其儀貌師古曰説讀曰悦識而問之曰是舎人董賢邪因引上與語拜為黄門郎繇是始幸問及其父為雲}
  - {type: variant, offset: 6962, length: 0, content: '', WYG: 侯即日徵為霸陵令遷光祿大夫賢寵愛日甚為駙馬都尉侍中出則參乘入御左右旬月間賞賜絫鉅萬貴震朝廷常與上臥起嘗書寢偏藉上褏師古曰藉謂身臥其上也褏古袖字宋祁曰褏字上當有衣字上欲起賢未覺師古曰覺寐之寤也音工效反不欲動賢廼斷褏而起其恩愛至此賢亦性柔和便辟善為媚以自固每賜洗沐不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬師古曰廬謂殿中所宿止處也若吏妻子居官寺舎又召賢女弟以為昭儀位次皇后更名其舎為椒風以配椒房云師古曰皇后殿稱椒房欲配其名故云椒風昭儀及賢與妻旦夕上下並侍左右賞賜昭儀及賢妻亦各千萬數遷賢父為少府賜爵關内侯食邑復徙為衞尉又以賢妻父為將作大匠弟為執金吾詔將作大匠為賢起大第北闕下重殿洞門師古曰重殿謂有前後殿洞門謂門門相當也皆僭天子之制度者也木土之功窮極技巧柱檻衣以綈錦師古曰檻謂軒闌之板也綈厚繒也音徒奚反下至賢家僮僕皆受上賜及武庫禁兵上方珍寶其選物上第盡在董氏而乗輿所服廼其副也及至東園祕器珠襦玉柙豫以賜賢無不備具師古曰東園署名也漢舊儀云東園祕器作棺梓素木長二丈崇廣四尺珠襦以珠為襦如鎧狀連縫之以黄金為鏤要以下玉為柙至足亦縫以黄金為鏤宋祁曰柙字下當有皆字又令將作為賢起冢塋義陵旁内為便房剛柏題湊孟康曰堅剛之柏也師古曰題湊解在霍光傳外為徼道周垣數里門闕罘罳甚盛上欲侯賢而未有緣㑹待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛師古曰謁者后之名下有司治皆伏其辜上於是令躬寵為因賢告東平事者廼以其功下詔封賢為髙安侯躬宜陵侯寵方陽侯食邑各千户頃之復益封賢二千户丞相王嘉内疑東平事􅁈甚惡躬等數諫爭以賢為亂國制度嘉竟坐言事下獄死上初即位祖母傅太后母丁太后皆在兩家先貴傅太后從弟喜先為大司馬輔政數諫失太后指免官上舅丁明代為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上􅐛重賢欲極其位師古曰􅐛益也而恨明如此遂冊免明曰前東平王雲貪欲上位祠祭祝詛雲后舅伍宏以醫待詔與校祕書}
