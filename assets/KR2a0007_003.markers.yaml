  - {type: variant, offset: 1669, length: 0, content: '', WYG: 師古曰滋益也殖生也前漢書卷三前漢書卷三考證高后紀不可屬天下注屬委也監本也字下衍也字今去秩長陵令二千石注應劭監本訛作邵今改正攻阿陽注狄道屬隴西狄訛地今改正封中謁者張釋卿為列侯臣召南按張釋卿恩澤侯表作張釋無卿字燕王劉澤傳作張卿無釋字八月庚申通鑑考異曰八月當作九月襄平侯紀通尚符節劉攽曰疑成者即信之一名臣召南按紀信與紀成自是兩人後儒以信死節最烈没未得封故疑紀成即信耳不知紀成名字早著於鴻門間道走軍之日其後戰死好畤則功臣表有明文非死於滎陽也高祖於功臣以父死節封其子者三人一紀通以父成戰死好畤一高景侯周成以父苛守滎陽罵項王死事一高梁侯酈疥以父食其説齊王死事紀信樅公宜有封爵而侯表無之必是其人並無子孫可封晉灼及師古說確有証据攽説非也前漢書卷三考證}
