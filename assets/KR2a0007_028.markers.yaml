  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_028-bkkpn1}
  - {type: variant, offset: 3, length: 1, content: 傳, WYG: 以建萬國親諸侯師古曰易比卦象辭書云協和萬國師古曰虞書堯典之辭也此之謂也堯遭洪水褱山襄陵師古曰褱字與古懷字同懷包也襄駕也言水大汎溢包山而駕陵也天下分絶為十二州師古曰九州之外有幷州幽州營州故曰十二水中可居者曰州洪水汎大各就高陸人之所居凡十二處宋祁曰註文南本無九州以下十五字景本無註末凡十二處四字使禹治之水土既平更制九州列五服師古曰其數在下也任土作貢師古曰任其土地所有以定貢賦之差也曰禹敷土師古曰敷分也謂分别治之自此已下皆是夏書禹貢之文隨山栞木奠高山大川師古曰栞古刋字也奠定也言禹隨行山之形狀而刋斫其木以為表記決水通道故高山大川各得其安定冀州既載師古曰兩河閒曰冀州載始也冀州堯所都故禹治水自冀州始也壺口治梁及岐師古曰壺口山在河東梁山在夏陽岐山在羙陽即今之岐州岐山縣箭栝嶺也禹循山而西治衆水既修太原至于嶽陽師古曰太原即今之晉陽是也嶽陽在太原西南覃懷底績至于衡章師古曰覃懷近河地名也底致也績功也衡章謂章水横流而入河也言禹於覃懷致功以至衡章也底音之履反厥土惟白壤師古曰柔土曰壤厥賦上上錯師古曰賦者𤼵歛土地所生之物以供天子也上上第一也錯雜也言賦第一又雜出諸品也厥田中中師古曰言其高下之形總於九州之中為第五也一曰謂其肥瘠之等差也它皆類此恒衛既從大陸既作師古曰恒衛二水名恒水出恒山衛水在靈夀大陸澤名在鉅鹿北言恒衛之水各從故道大陸之澤已可耕作也鳥夷皮服師古曰此東北之夷摶取鳥獸食其肉而衣其皮也一説居在海曲被服容止皆象鳥也夾右碣石入于河師古曰碣石海邊山名也言禹夾行此山之右而入于河逆上也泲河惟兗州師古曰泲本濟水之字從水􅙻聲言此州東南據濟水西北距河泲音姊九河既道師古曰九河河水分為九各從其道爾雅曰徒駭太史馬頰覆鬴胡蘇簡絜鉤般鬲津是曰九河一説道讀曰導導治也雷夏既澤雍沮會同師古曰雷夏澤名在濟陰城陽西北言此澤還復其故而雍沮二水同會其中也沮音干余反桑土既蠶是降丘宅土師古曰降下也宅居也言此地宜桑先時人衆避水皆上丘陵今水害除得以蠶織故皆下丘居平土也厥土黑墳師古曰色黑而墳起也墳音扶粉反􅋄繇木條師古曰屮古草字也繇悦茂也條修暢也繇音弋昭反厥田中下師古曰}
