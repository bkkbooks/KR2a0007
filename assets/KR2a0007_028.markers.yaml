  - {type: variant, offset: 9348, length: 1, content: 穀, WYG: 土俗用如韋之音樂陵都尉治莽曰羙陽師古曰樂音來各反祝阿莽曰安成瑗莽曰東順亭阿陽漯隂莽曰翼成應劭曰漯水出東武陽東北入海師古曰漯音它合反朸莽曰張鄉應劭曰音力富平侯國莽曰樂安亭應劭曰眀帝更名厭次安悳師古曰悳古徳字合陽侯國莽曰宜鄉樓虚侯國龍頟侯國莽曰清鄉師古曰今書本頟字或作額而崔浩云有龍頟村作額者非安侯國千乘郡高帝置莽曰建信屬青州應劭曰和帝更名樂安戸十一萬六千七百二十七口四十九萬七百二十有鐡官鹽官均輸官縣十五千乘有鐡官東鄒溼沃莽曰延亭平安侯國莽曰鴻睦博昌時水東北至鉅定入馬車瀆幽州􅐛應劭曰昌水出東萊昌陽臣瓚曰從東萊至博昌經歴宿水不得至也取其嘉名耳師古曰瓚説是蓼城都尉治莽曰施武建信狄莽曰利居應劭曰安帝更名曰臨濟琅槐師古曰槐音回樂安被陽侯國如淳曰一作疲音罷軍之罷師古曰音皮彼反宋祁曰被或作彼高昌繁安侯國莽曰瓦亭高宛莽曰常鄉延鄉濟南郡故齊文帝十六年别為濟南國景帝二年為郡莽曰樂安屬青州戸十四萬七百六十一口六十四萬二千八百八十四縣十四東平陵有工官鐡官鄒平臺莽曰臺治}
