  - {type: variant, offset: 10277, length: 0, content: '', WYG: 亭師古曰歐音烏侯反句章渠水東入海餘杭莽曰進睦孟康曰杭音行伍之行鄞有鎮亭有鮚埼亭東南有天門水入海有越天門山莽曰謹師古曰鄞音牛斤反鮚音結蚌也長一寸廣二分有一小蟹在其腹中埼曲岸也其中多鮚故以名亭埼音鉅依反錢唐西部都尉治武林山武林水所出東入海行八百三十里莽曰泉亭鄮莽曰海治孟康曰音貿富春莽曰誅嵗冶師古曰本閩越地回浦南部都尉治丹陽郡故鄣郡屬江都武帝元封二年更名丹陽屬揚州劉敞曰秦分三十六郡無鄣郡鄣郡之置又不知何帝按吴王濞傳王三郡謂會稽豫章故鄣也廣陵國註云易王非厲王胥并得鄣郡而不得吴然則吴與鄣皆非郡眀矣實説武帝以故鄣地為丹陽郡後人追書吴地故云三郡此註但當云故鄣屬江都武帝置丹陽郡不知傳冩誤故若此或班氏亦自誤也又故鄣地名自有故耳又以其似言故物遂益郡字皆非也宋祁曰丹陽當作丹陽戸十萬七千五百四十一口四十萬五千一百七十有銅官縣十七宛陵彭澤聚在西南清水西北至蕪湖入江莽曰無宛於㬱師古曰㬱音潛江乗莽曰相武春榖秣陵莽曰宣亭故鄣莽曰侯望師古曰鄣音章句容涇韋昭曰涇水出蕪湖宋祁曰卲本蕪作毋丹陽楚之先熊繹所封十八世文王徙郢石城分江水首受江東至餘姚入海過郡二行千二百里胡孰宋祁曰胡當作姑陵陽桑欽言淮水出東南北入大江蕪湖中江出西南東至陽羡入海揚州川黝漸江水出南蠻夷中東入海成帝鴻嘉二年為廣徳王國莽曰愬虜師古曰黝音伊字本作黟其音同宋祁曰武陵有漸水東入沅疑此無漸水漸字當作浙字溧陽應劭曰溧水所出南湖也師古曰音栗歙都尉治師古曰音攝宣城豫章郡高帝置莽曰九江屬揚州戸六萬七千四百六十一一口三十五萬一千九百六十五縣十八南昌莽曰宜善廬陵莽曰桓亭彭澤禹貢彭蠡澤在西鄱陽武陽鄉右十餘里有黄金采鄱水西入湖漢莽曰鄉亭孟康曰鄱音婆師古曰采者謂采取金之處厯陵傅昜山傅昜川在南古文以為傅淺原莽曰蒲亭師古曰傅讀曰敷昜古陽字餘汗餘水在北至鄡陽入湖漢莽曰治干應劭曰汗音干師古曰鄡音口堯反柴桑莽曰九江亭艾脩水東北至彭澤入湖漢行六百六十里莽曰治翰贛豫章水出西南北入大江如淳曰音感新淦都尉治莽曰偶亭應劭曰淦水所出西入湖漢也師古曰淦音紺又音古含反南城盱水西北至南昌入湖漢師古曰盱音香于反建成蜀水東至南昌入湖漢莽曰多聚宜春南水東至新淦入湖漢莽曰脩曉海昏莽曰宜生師古曰即昌邑王賀所封雩都湖漢水東至彭澤入江行千九百八十里師古曰音于鄡陽莽曰豫章南壄彭水東入湖漢安平侯國莽曰安寧桂陽郡高帝置莽曰南平屬荆州戸二萬八千一百一十九口十五萬六千四百八十八有鐡官宋祁曰鐡官卲本作金官縣十一郴耒山耒水所出西至湘南入湖項羽所立義帝都此莽曰宣風師古曰郴音丑林反耒音郎内反臨武秦水東南至湞陽入匯行七百里莽曰大武師古曰湞音丈庚反又音貞匯音胡賄反便莽曰便屏南平耒陽舂山舂水所出北至酃入湖過郡二行七百八十里莽曰南平亭師古曰在耒水之陽也酃音靈桂陽匯水南至四會入欝林過郡二行九百里應劭曰桂水所出東北入湘宋祁曰欝林景本無林字陽山侯國應劭曰今陰山也師古曰下自有陰山應説非也曲江莽曰除虜含洭應劭曰洭水所出東北入元師古曰洭音匡沅音元湞陽莽曰基武應劭曰湏水出南海龍川西入秦陰山侯國武陵郡高帝置莽曰建平屬荆州戸三萬四千一百七十七口十八萬五千七百五十八縣十三索漸水東入沅應劭曰順帝更名漢壽如淳曰音繩索之索師古曰沅音元孱陵莽曰孱陸應劭曰孱音踐師古曰音仕連反臨沅莽曰監原應劭曰沅水出牂柯入于江沅陵莽曰沅陸鐔成康谷水南入海玉山潭水所出東至阿林入欝過郡二行七百二十里應劭曰潭水所出東入􅉱音滛孟康曰鐔音譚師古曰孟音是宋祁曰正文鐔字或作潭註阿林入􅉱下當添林字音淫上當添潭字無陽無水首受故且蘭南入沅八百九十里師古曰且音子余反遷陵莽曰遷陸辰陽三山谷辰水所出南入沅七百五十里莽曰會亭應劭曰辰水所出東入沅酉陽應劭曰酉水所出東入湘義陵鄜梁山序水所出西入沅莽曰建平師古曰鄜音敷佷山孟康曰音恒出藥草恒山零陽應劭曰零水所出東南入湘充酉原山酉水所出南至沅陵入沅行千二百里歴山澧水所出東至下雋入沅過郡二行一千二百里師古曰澧音禮雋音辭兖反零陵郡武帝元鼎六年置莽曰九疑屬荆州戸二萬一千九十二口十三萬九千三百七十八縣十零陵陽海山湘水所出北至酃入江過郡二行二千五百三十里又有離水東南至廣信入􅉱林行九百八十里營道九疑山在南莽曰九疑亭始安夫夷營浦都梁侯國路山資水所出東北至益陽入沅過郡二行千八百里泠道莽曰泠陵應劭曰泠水出丹陽宛陵西北入江臣瓚曰宛陵在豫章北界相去三千里又隔諸水不得從下逆至泠道而復入江也師古曰瓚説是泠音零泉陵侯國莽曰溥閏洮陽莽曰洮治如淳曰洮音韜鍾武莽曰鍾桓應劭曰今重安漢中郡泰置莽曰新成屬益州戸十萬一千五百七十口三十萬六百一十四縣十二西城應劭曰世本媯虚在西北舜之居旬陽北山旬水所出南入沔南鄭旱山池水所出東北入漢襃中都尉治漢陽鄉房陵淮山淮水所出東至中廬入沔又有筑水東至筑陽亦入沔東山沮水所出東至郢入江行七百里師古曰筑音逐安陽鬵谷水出西南北入漢在谷水出北南入漢師古曰鬵音濳其字亦或從水成固沔陽有鐡官應劭曰沔水出武都東南入江如淳曰北方人謂漢水為沔水師古曰漢上曰沔音莫踐反錫莽曰錫治應劭曰音陽師古曰即}
