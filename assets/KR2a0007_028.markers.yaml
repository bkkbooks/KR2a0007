  - {type: variant, offset: 896, length: 3, content: 注嗣十, WYG: 遷九鼎周公致太平營以為都是為王城至平王居之師古曰郟音夾鄏音辱緱氏劉聚周大夫劉子邑有延壽城仙人祠莽曰中亭師古曰緱音工侯反卷師古曰音去權反原武莽曰原桓鞏東周所居穀成禹貢瀍水出㬱亭北東南入雒師古曰即今新安㬱音濳故市密故國有大騩山潩水所出南至臨潁入潁應劭曰密人不恭密須氏姞姓之國也臣瓚曰密姬姓之國也見世本密須今安定隂密是也師古曰應瓚二説皆非也此密即春秋僖六年圍新密者也蓋鄭地而詩所云密人即左傳所謂密須之鼓者也在安定隂密騩音隗潩音翼又音昌力反宋祁曰音隗當作音塊新成恵帝}
