  - {type: variant, offset: 9318, length: 0, content: '', WYG: 七縣二十鉅鹿禹貢大陸澤在北紂所作沙丘臺在東北七十里應劭曰鹿林之大者也臣瓚曰山足曰鹿師古曰應説是南䜌莽曰富平孟康曰䜌音良全反廣阿象氏侯國莽曰寧昌廮陶師古曰廮音一井反宋}
  - {type: variant, offset: 9318, length: 0, content: '', krp: 七縣二十鉅鹿禹貢大陸澤在北紂所作沙丘臺在東北七十里應劭曰鹿林之大者也臣瓚曰山足曰鹿師古曰應説是南䜌莽曰富平孟康曰䜌音良全反廣阿象氏侯國莽曰寧昌廮陶師古曰廮音一井反宋}
  - {type: variant, offset: 9319, length: 0, content: '', WYG: 莽曰宜子楊氏莽曰功陸臨平下曲陽都尉治應劭曰晉荀吴滅鼓今鼓聚昔陽亭是也師古曰常山有上曲陽故此云下貰師古曰音式制反郻莽曰秦聚師古曰音苦么反又差梟反劉敞曰衍文新市侯國莽曰市樂堂陽有鹽官嘗分為經縣應劭曰在堂水之陽安定侯國敬武厯鄉侯國莽曰厯聚樂信侯國武陶侯國柏鄉侯國安鄉侯國常山郡高帝置莽曰井闗屬冀州張晏曰恒山在西避文帝諱故改曰常山尸十四萬一千七百四十一口六十七萬七千九百五十六縣十八元氏沮水首受中丘西山窮泉谷東至堂陽入黄河莽曰井闗亭師古曰闞駰云趙公子元之封邑故曰元氏石邑井陘山在西洨水所出東南至廮陶入泜師古曰洨音效又音爻泜音脂又音丁計反其}
