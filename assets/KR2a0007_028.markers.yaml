  - {type: variant, offset: 230, length: 1, content: 肥, krp: 周史辛甲所封鹿谷山濁漳水所出東至鄴入清漳師古曰長讀曰長短之長今俗}
  - {type: variant, offset: 232, length: 0, content: '', WYG: 長幼之長非也屯留桑欽言絳水出西南東入海師古曰屯音純宋祁曰音純當作音純余吾銅鞮有上虒亭下虒聚師古曰虒音斯沾大谷清漳水所出東北至阜成入大河過郡五行千六百八十里冀州川應劭曰沾水出壺闗師古曰沾音它兼反湼氏湼水也師古曰湼水出焉故以名縣也湼音乃結反襄柤莽曰上黨亭宋祁曰柤邵本作垣壺闗有羊腸阪沾水東至朝歌入淇應劭曰黎侯國也今黎亭是泫氏楊谷絶水所出南至壄王入沁應劭曰山海經泫水所出者也師古曰泫音工𤣥反宋祁曰沁别本作泌下同注末工𤣥反一本作故𤣥反高都莞谷丹水所出東南入泫水有天井闗師古曰莞音丸潞故潞子國陭氏師古曰音於義反陽阿榖逺羊頭山世靡谷沁水所出東南至滎陽入河過郡三行九百七十里莽曰榖近師古曰今沁水至懐州武陟縣界入河此云至滎陽疑傳寫錯誤河内郡高帝元年為殷國二年更名莽曰後隊屬司𨽻戸二十四萬一千二百四十六口百六萬七千九十七縣十八懐有工官莽曰河内汲武徳孟康曰始皇東廵置自以武徳定天下波孟康曰今有絺城晉文公所得賜者山陽東太行山在西北師古曰行音胡郎反河陽莽曰河亭州共故國北山淇水所出東至黎陽入河孟康曰共伯入為三公者也師古曰共音恭平臯應劭曰邢侯自襄國徙此當}
