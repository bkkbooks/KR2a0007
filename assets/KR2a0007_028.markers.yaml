  - {type: variant, offset: 7, length: 0, content: '', krp: 越也流讀如流共工之流此兩者之分夷近而蠻逺蔡輕而流重王制曰千里之外曰采曰流采亦當作蔡聲之誤耳東漸于海西被于流沙朔南洎聲教訖于四海師古曰漸入也被加也朔北方也訖盡也言東入于海西加流沙北方南方皆及聲教盡於四海也一曰漸浸洎及也宋祁曰洎疑作􅀢註同禹錫𤣥圭告厥成功師古曰𤣥水色也堯以禹治水功成故賜𤣥圭以表之也自此以上皆禹貢之文後受禪於虞為夏后氏殷因於夏亡所變改周既克殷監於二代而損益之定官分職改禹徐梁二州合之於雍青師古曰省徐州以入青州幷梁州以合雍州分冀州之地以為幽幷故周官有職方氏師古曰夏官之屬也職主也主四方之土地掌天下之地辯九州之國東南曰揚州其山曰會稽師古曰在山陰縣藪曰具區師古曰藪犬澤也具區在吴川曰三江䆮曰五湖師古曰􅐛古浸字也川水之通流者也浸謂引以灌溉者五湖在吴其利金錫竹箭民二男五女畜宜鳥獸師古曰鳥孔翠之屬獸犀象之屬榖宜稻正南曰荆州其山曰衡藪曰雲夢川曰江漢䆮曰潁湛師古曰潁水出陽城陽乾山宜屬豫州許慎又云湛水豫州浸並未詳也湛音直林反又音直減反其利丹銀齒革民一男二女畜及榖宜與揚州同河南曰豫州其山曰華師古曰即華陰之華山也連延東出故屬豫州藪曰圃田師古曰在中牟川曰滎雒䆮曰波溠師古曰滎即流水所溢者也波即上禹貢所云滎波者也溠水在楚亦不當為豫州浸也溠音莊亞反宋祁曰流當作沇其利林漆絲枲民二男三女畜宜六擾師古曰馬牛羊豕犬鷄也謂之擾者言人所馴養也擾音人沼反其榖宜五種師古曰黍稷菽麥稻正東曰青州其山曰沂藪曰孟諸師古曰沂山在蓋縣即沂水所出也孟諸即盟豬也川曰淮泗䆮曰沂沭師古曰沭水出東莞音術其利蒲魚民二男三女其畜宜雞狗榖宜稻麥河東曰兗州其山曰岱藪曰泰壄師古曰即大野其川曰河泲浸曰盧濰師古曰盧水在濟北盧縣鄭康成讀曰雷非也其利蒲魚民二男三女其畜宜六擾榖宜四種師古曰馬牛羊豕犬雞黍稷稻麥也正西曰雍州其山曰嶽師古曰即吴嶽也藪曰弦蒲師古曰在汧縣川曰涇汭師古曰汭在豳地詩大雅公劉之篇曰汭鞠之即􅐛曰渭洛師古曰洛即漆沮也在馮翊其利玉石其民三男二女畜宜牛馬榖宜黍稷東北曰幽州其山曰醫無閭師古曰在遼東藪曰豯養師古曰在長廣川曰河泲浸曰菑時師古曰菑出萊蕪時水出般陽其利魚鹽民一男三女畜宜四擾師古曰馬牛羊豕榖宜三種師古曰黍稷稻河内曰冀州其山曰霍師古曰在平陽永安縣東北藪曰揚紆師古曰爾雅曰秦有掦紆而此以為冀州未詳其義及所在川曰漳􅐛曰汾潞師古曰漳水出上黨長子汾水出汾陽北山潞出歸徳其利松栢民五男三女畜宜牛羊榖宜黍稷正北曰幷州其山曰恒山藪曰昭餘祁師古曰在太原鄔縣鄔音一戸反又音於庶反川曰虖池嘔夷􅐛曰淶易師古曰虖池出鹵城嘔夷出平舒淶出廣昌易出故安虖音呼池音徒河反嘔音於侯反其利布帛民二男三女畜宜五擾師古曰馬牛羊犬豕榖宜五種而保章氏掌天文以星土辯九州之地所封封域皆有分星以視吉凶師古曰保章氏春官之屬也保守也言守天文之職也分音扶問反周爵五等而土三等公侯百里伯七十里子男五十里不滿為附庸蓋千八百國而太昊黄帝之後唐虞侯伯猶存帝王圖籍相踵而可知周室既衰禮樂征伐自諸侯出轉相吞滅數百年間列國耗盡師古曰耗減也音呼到反至春秋時尚有數十國五伯迭興總其盟會師古曰此五伯謂齊桓宋襄晉文秦穆楚莊也迭互也伯讀曰霸迭音徒結反陵夷至於戰國天下分而為七師古曰謂秦韓魏趙燕齊楚也合從連衡經數十年秦遂幷兼四海以為周制微弱終為諸侯所䘮故不立尺土之封分天下為郡縣盪滅前聖之苗裔靡有孑遺者矣漢興因秦制度崇恩徳行簡易以撫海内至武帝攘郤胡越開地斥境南置交阯北置朔方之州師古曰胡廣記云漢既定南越之地置交阯刺史别於諸州令持節治蒼梧分雍州置朔方刺史兼徐梁幽幷夏周之制改雍曰涼改梁曰益凡十三部置刺史先王之迹既逺地名又數改易師古曰數音所角反是以采獲舊聞考迹詩書推表山川以綴禹貢周官春秋下及戰國秦漢焉師古曰中古以來説地理者多矣或觧釋經典或撰述方志競為新異妄有穿鑿安處附會頗失其真後之學者因而祖述曽不考其謬論莫能尋其根本今並不録蓋無尤焉京兆尹故秦内史高帝}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 年屬塞國二年更為渭南郡九年罷復為内史武帝建元六年分為右内史太初元年更為京兆尹元始二年戸十九萬五千七百二口六十八萬二千四百六十八師古曰漢之戸口當元始時最為殷盛故志舉之以為數也後皆類此縣十二長安高帝五年置恵帝元年初城六年成戸八萬八百口二十四萬六千二百}
