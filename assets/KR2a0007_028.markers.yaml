  - {type: variant, offset: 10552, length: 2, content: 歆俱, krp: 蚩尤戰于涿鹿之野且居樂陽水出東南入海莽曰久居茹莽曰榖武女祁東部都尉治莽曰祁下落莽曰下忠漁陽郡秦置莽曰通路屬幽州戸六萬八千八百二口二十六萬四千一百一十六縣十二漁陽沽水出塞外東南至泉州入海行七百五十里有鐵官莽曰得漁狐奴莽曰舉符路莽曰通路亭雍奴泉州有鹽官莽曰泉調平谷安樂厗奚莽曰敦徳孟康曰厗音題字或作蹄獷平莽曰平獷服䖍曰獷音鞏師古曰音九永反又音鑛要陽都尉治莽曰要術師古曰音一妙反白檀洫水出北蠻夷師古曰洫音呼鵙反滑鹽莽曰匡徳應劭曰明帝更名鹽右北平郡秦置莽曰北順屬幽州戸六萬六千六百八十九口三十二萬七百八十縣十六平剛無終故無終子國浭水西至雍奴入海過郡二行六百五十里師古曰浭音庚即下所云入庚者同一水也石成廷陵莽曰鋪武俊靡灅水南至無終東入庚莽曰俊麻師古曰灅音力水反又音郎賄反宋祁曰灅當作㶟薋都尉治莽曰襃睦師古曰音才私反徐無莽曰北順亭字榆水出東土垠師古曰垠音銀白狼莽曰伏狄師古曰有白狼山故以名縣夕陽有鐵官莽曰夕陰昌城莽曰淑武驪成大揭石山在縣西南莽曰揭石師古曰揭音桀廣成莽曰平虜聚陽莽曰篤睦平明莽曰平陽遼西郡秦置有小水四十八并行三千四十六里屬幽州戸七萬二千六百五十四口三十五萬二千三百二十五縣十四且慮有高廟莽曰鉏慮師古曰且音子余反慮音廬海陽龍鮮水東入封大水封大水緩虚水皆南入海有鹽官新安平夷水東入塞外栁城馬首山在西南參栁水北入海西部都尉治令支有孤竹城莽曰令氏亭應劭曰故伯夷國今有孤竹城令音鈴孟康曰支音秪師古曰令又音郎定反肥如𤣥水東入濡水濡水南入海陽又有盧水南入𤣥莽曰肥而應劭曰肥子奔燕燕封於此也師古曰濡音乃官反宋祁曰入𤣥當作入畜賔從莽曰勉武交黎渝水首受塞外南入海東部都尉治莽曰禽虜應劭曰今昌黎師古曰渝音喻其下並同陽樂狐蘇唐就水至徒河入海徒河莽曰河福文成莽曰言虜臨渝渝水首受白狼東入塞外又有侯水北入渝莽曰馮徳師古曰馮讀曰憑絫下官水南入海又有揭石水賔水皆南入官莽曰選武師古曰絫音力追反遼東郡秦置屬幽州戸五萬五千九百七十二口二十七萬二千五百三十九縣十八襄平有牧師官莽曰昌平新昌無慮西部都尉治應劭曰慮音閭師古曰即所謂醫巫閭望平大遼水出塞外南至安市入海行千二百五十里莽曰長說師古曰説讀曰悦房候城中部都尉治遼隊莽曰順睦師古曰隊音遂遼陽大梁水西南至遼陽入遼莽曰遼隂險瀆應劭曰朝鮮王滿都也依水險故曰險瀆臣瓉曰王險城在樂浪郡浿水之東此自是險瀆也師古曰瓚説是也浿音普大反居就室偽山室偽水所出北至襄平入梁也高顯安市武次東部都尉治莽曰桓次平郭有鐵官鹽官西安平莽曰北安平文莽曰文亭番汗沛水出塞外西南入海應劭曰汗水出塞外西南入海番音盤師古曰沛音普盖反汗音寒沓氏應劭曰沓水也音長答反師古曰凡言氏者皆謂因之而立名元菟郡武帝元封四年開髙句驪莽曰下句驪属幽州應劭曰故真番朝鮮胡國戸四萬五千六口二十二萬一千八百四十五縣三髙句驪遼山遼水所出西南至遼隊入大遼水又有南蘇水西北經塞外應劭曰故句驪胡上殷台莽曰下殷如淳曰台音鮐師古曰音胎西蓋馬馬訾水西北入鹽難水西南至西安平入海過郡二行一千一百里莽曰元菟亭樂浪郡武帝元封三年開莽曰樂鮮屬幽州應劭曰故朝鮮國也師古曰樂音洛浪音狼戸六萬二千八百一十二口四十萬六千七百四十八有雲鄣縣二十五朝鮮應劭曰武王封箕子於朝鮮䛁邯孟康曰䛁音男師古曰䛁音乃甘反邯音酣浿水水西至増地入海莽曰樂鮮亭師古曰浿音普大反含資帶水西至帶方入海黏蟬服䖍曰蟬音提遂成增地莽曰增土帶方駟望海㝠莽曰海桓列口長岑屯有昭明南部都尉治鏤方提奚渾彌師古曰渾音下昆反吞列分黎山列水所出西至黏蟬入海行八百二十里東􅀈應劭曰音移不而東部都尉治蠶台師古曰台音胎華麗邪頭昧孟康曰昧音妹前莫夫租南海郡秦置秦敗尉佗王此地武帝元鼎六年開屬交州户萬九千六百一十三口九萬四千二百五十三有圃羞官縣六番禺尉佗都有鹽官如淳曰番音潘禺音愚博羅中宿有洭浦官師古曰洭音匡龍川師古曰裴氏廣州記云本博羅縣之東鄉也有龍穿地而出即穴流泉因以}
