  - {type: variant, offset: 10624, length: 1, content: 及, WYG: 烏獲扛鼎都盧㝷橦又曰非都盧之輕趫孰能超而究升也夫音扶自夫甘都盧國船行可二月餘有黄支國民俗略與珠厓相類其州廣大户口多多異物自武帝以來皆獻見有譯長屬黄門與應募者俱入海市明珠璧流離竒石異物齎黄金雜繒而往所至國皆稟食為耦師古曰稟給也耦嫓也給其食而侣嫓之相隨行也蠻夷賈船轉送致之亦利交易剽殺人師古曰剽劫也音頻妙反又苦逢風波溺死不者數年來還大珠至圍二寸以下宋祁曰逢越本作蓬平帝元始中}
