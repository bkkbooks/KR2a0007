  - {type: variant, offset: 8470, length: 404, content: 陵淪亡辰星出於四孟太白經天而行無雲而雷枉矢夜光熒惑襲月㜸火燒宮野禽戲廷都門內崩長人見臨洮石隕于東郡星孛大角大角以亡觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有泰山臥石自立上林僵柳復起大星如月西行眾星隨之此為特異孝宣興起之表天狗夾漢而西久陰不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉高宗成王亦有雊雉拔木之變能思其故故高宗有百年之福成王有復風之報神明之應應若景嚮世所同聞也臣幸得託末屬誠見陛下有寬明之德冀銷大異而興高宗成王之聲以崇劉氏故豤豤數奸死亡之誅今日食尤屢星孛東井攝提炎及紫宮有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意是以設卦指爻而復說義書曰伻來以圖天文難以相曉臣雖圖上猶須口說然後可知願賜清燕之閒指圖陳狀上輒入之然終不能用也向每召見數言公族者, WYG: 侯}
