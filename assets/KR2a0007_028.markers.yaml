  - {type: variant, offset: 9321, length: 1, content: 聞, WYG: 齊襄公田于貝丘是信成張甲河首受屯氏别河東北至蓨入漳水􅟗題師古曰􅟗古莎字東陽侯國莽曰胥陵信鄉侯國孟康曰順帝更名安平繚師古曰音良笑反棗彊復陽莽曰樂嵗應劭曰音腹涿郡高帝置莽曰垣翰屬幽州戸十九萬五千六百七口七十八萬二千七百六十四有鐡官縣二十九涿桃水首受淶水分東至安次入河應劭曰涿水出上谷涿鹿縣師古曰淶音來逎莽曰逎屛師古曰逎古遒字音字由反榖丘故安閻鄉易水所出東至范陽入濡也并州䆮水亦至范陽入淶師古曰言易水又至范陽入淶也濡音乃官反南深澤范陽莽曰順陰應劭曰在范水}
