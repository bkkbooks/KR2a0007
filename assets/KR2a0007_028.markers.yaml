  - {type: variant, offset: 115, length: 0, content: '', WYG: 字徴莽曰氾愛師古曰徴音懲即今之澄城縣是也左傳所云秦取北徴謂此地耳而杜元凱未詳其處也雲陵昭帝置也萬年高帝置莽曰異赤師古曰三輔黄圖云太上皇葬櫟陽北原起萬年陵是也長陵高帝置戸五萬五十七口十七萬九千四百六十九莽曰長平陽陵故弋陽景帝更名莽曰渭陽宋祁曰弋當作易雲陽有休屠金人及徑路神祠三所越巫􅀈􅀈祠三所孟康曰􅀈音辜磔之辜越人祠也􅀈音穰休音許虬反屠音除右扶風故秦内史高帝元年屬雍國二年更為中地郡九年罷復為内史武帝建元六年分為右内史太初元年更名主爵都尉為右扶風師古曰主爵都尉本秦之主爵中尉掌列侯至太初元年更名右扶風而治於内史右地故此志追書建元六年分為右内史又云更名主爵都尉為右扶風戸二十一萬六千三百七十七口八十三萬六千七十縣二十一渭城故咸陽高帝元年更名新城七年罷屬長安武帝元鼎三年更名渭城有蘭池宮莽曰京城槐里周曰犬丘懿}
