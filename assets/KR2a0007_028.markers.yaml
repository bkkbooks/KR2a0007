  - {type: variant, offset: 10583, length: 0, content: '', krp: 扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂柯越巂益州皆宜屬焉秦之先曰柏益出自帝顓頊堯時助禹治水為舜朕虞飬育草木鳥獸賜姓嬴氏師古曰柏益一號伯翳盖翳益聲相近故也歴夏殷為諸侯至周有造父師古曰造音千到反父讀曰甫善馭習馬得華駵緑耳之乗師古曰華駵言其色如華之赤也緑耳耳緑也幸于穆王封于趙城故更為趙氏後有非子為周孝王飬馬汧渭之間孝王曰昔伯益知禽獸子孫不絶廼封為附庸邑之于秦宋祁曰秦晏本作粲今隴西秦亭秦谷是也至元孫氏為荘公師古曰氏與是同古通用字破西戎有其地子襄公時幽王為犬戎所敗平王東遷雒邑襄公將兵救周有功賜受􅑢酆之地列為諸侯師古曰􅑢亦岐字後八世穆公稱伯以河為竟師古曰伯讀曰霸竟讀曰境言其地界東至於河十餘世孝公用商君制轅田張晏曰周制三年一易以同美惡商鞅始割列田地開立阡陌令民各有常制孟康曰三年爰土易居古制也末世浸廢商鞅相秦復立爰田上田不易中田一易下田再易爰自在其田不復易居也食貨志曰自爰其處而已是也轅爰同開仟佰師古曰南北曰仟東西曰佰皆謂開田之疆畝也佰音莫白反東雄諸侯子惠公初稱王得上郡西河孫昭王開巴蜀滅周取九鼎昭王曾孫政并六國稱皇帝負力怙威燔書阬儒自任私智至子胡亥天下畔之故秦地於禹貢時跨雍梁二州詩風兼秦豳兩國昔后稷封斄師古曰斄讀曰邰今武功故城是也公劉處豳師古曰即今豳州栒邑是太王徙􅑢師古曰今岐山縣是文王作酆師古曰今長安西北界靈臺鄉豐水上是武王治鎬師古曰今昆明池北鎬陂是其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備師古曰謂七月之詩有鄠杜竹林南山檀柘號稱陸海為九州膏腴師古曰言其地高陸而饒物産如海之無所不出故云陸海腹之下肥曰腴故取喩云始皇之初鄭國穿渠引涇水溉田師古曰鄭國人姓名事具在溝洫志沃野千里師古曰沃即溉也言千里之地皆得溉灌民以富饒漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵師古曰訾讀與貲同高訾言多財也蓋亦以彊幹弱支非獨為奉山園也如淳曰黄圖謂陵冢為山師古曰謂京師為幹四方為支也是故五方雜厝晉灼曰厝古錯字風俗不純其世家則好禮文富人則商賈為利豪桀則游俠通姦瀕南山師古曰瀕猶邉瀕音頻又音賔近夏陽師古曰夏陽即河之西岸也今在同州韓城縣界多阻險輕薄易為盗賊常為天下劇又郡國輻湊浮食者多民去本就末列侯貴人車服僭上衆庶放效羞不相及師古曰放依也音甫往反嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近戎狄脩習戰備髙上氣力以射獵為先故秦詩曰在其板屋師古曰小戎之詩也言襄公出征則婦人居板室之中而念其君子又曰王于興師脩我甲兵與子偕行師古曰無衣之詩也言於王之興師則脩我甲兵而與子俱征伐也及車轔四臷小戎之篇皆言車馬田狩之事師古曰車轔美秦仲大有車馬其詩曰有車轔轔有馬白顛四臷美襄公田狩也其詩曰四臷孔阜六轡在手輶車鸞鏕載獫猲獢小戎美襄公􅊀兵甲討西戎其詩曰小戎俴收五楘梁輈文茵暢轂駕我騏馵龍盾之合鋈以觼軜轔音隣臷音耋輶音猶又音誘獫音力瞻反獢音許昭反俴音踐楘音木馵音注鋈音沃觼音玦軜音納宋祁曰載獫當作載斂漢興六郡良家子選給羽林期門如淳曰醫商賈百工不得豫也師古曰六郡謂隴西天水安定北地上郡西河羽林期門觧在百官公卿表以材力為官名將多出焉孔子曰君子有勇而亡誼則為亂小人有勇而亡誼則為盜師古曰論語載孔子對子路之言也故此數郡民俗質木不恥寇盜師古曰質木者無有文飾如木石然自武威以西本匈奴昆邪王休屠王地師古曰昆音下門反休音許蚪反屠音除武帝時攘之師古曰攘却也音人羊反初置四郡以通西域鬲絶南羌匈奴師古曰鬲與隔同其民或以關東下貧或以報怨過當師古曰過其本所殺或以誖逆亡道家屬徙焉師古曰誖亂也惑也音布内反習俗頗殊地廣民稀水屮宜畜牧師古曰屮古草字故涼州之畜為天下饒保邊塞二千石治之咸以兵馬為務酒禮之會上下通焉吏民相親是以其俗風雨時節穀糴常賤少盜賊有和氣之應賢於内郡此政寛厚吏不苛刻之所致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果實之饒師古曰疏菜也南賈滇僰滇僰僮師古曰言滇僰之地多出僮𨽻也滇音顛僰音蒲北反宋祁曰正文滇僰二字當删西近卭莋莋馬旄牛師古曰言卭莋之地出馬及旄牛莋音才各反宋祁曰正文莋莋當刪一莋字民食稻魚亡凶年憂俗不愁苦而輕易淫泆柔弱褊阸師古曰言其材質不彊而心忿陿景武閒文翁為蜀守敎民讀書法令未能篤信道徳反以好文刺譏貴慕權埶及司馬相如游宦京師諸侯以文辭顯於世鄉黨慕循其迹後有王襃嚴遵揚雄之徒師古曰遵即嚴君平文章冠天下繇文翁倡其敎相如為之師師古曰繇讀與由同倡始也音充向反故孔子曰有教亡類師古曰論語載孔子之言言人之性術在所教耳無種類武都地雜氐羌及犍為牂柯越巂皆西南外夷武帝初開置民俗略與巴蜀同而武都近天水俗頗似焉故秦地天下三分之一而人衆不過什三然量其富居什六秦豳吳札觀樂為之歌秦師古曰札吳王夀夢子也來聘魯而請觀周樂事見左氏傳襄二十九年曰此之謂夏聲師古曰夏中國夫能夏則大大之至也其周舊乎自井十度至栁三度謂之鶉首之次秦之分也魏地觜觿參之分野也師古曰觽音弋隨反其界自髙陵以東盡河東河内南有陳留及汝南之召陵㶏彊新汲西華長平師古曰召讀曰邵㶏音於靳反又音殷潁川之舞陽郾許傿陵師古曰郾音一扇反傿音偃河南之開封中牟陽武酸棗卷師古曰卷音去權反皆魏分也河内本殷之舊都周既滅殷分其畿内為三國詩風邶庸衞國是也師古曰自紂城而北謂之邶南謂之庸東謂之衞邶音歩内反字或作鄁庸字或作鄘鄁㠯封紂子武庚庸管叔}
