  - {type: variant, offset: 105, length: 1, content: 見, WYG: 改築城市街里以象豐徙豐民以實之故號新豐船司空莽曰船利服䖍曰縣名師古曰本主船之官遂以為縣藍田山出羙玉有虎候山祠秦孝公置也華陰故陰晉秦恵文王五年更名寧秦高帝八年更名華陰太華山在南有祠豫州山集靈宫武帝起莽曰華壇也鄭周宣王弟鄭桓公邑有鐡官應劭曰宣王母弟友所封也其子與平王東遷更稱新鄭臣瓚曰周自穆王以下都于西鄭不得以封桓公也初桓公為周司徒王室將亂故謀於史伯而寄帑與賄於虢會之間幽王既敗二年而滅會四年而滅虢居於鄭父之丘是以為鄭桓公無封京兆之文也師古曰春秋外傳云幽王既敗鄭桓公死之其子武公與平王東遷故左氏傳云我周之東遷晉鄭焉依又鄭莊公云吾先君新邑於此蓋道新鄭也穆王以下無都西鄭之事瓚説非也會音工外反湖有周天子祠二所故曰胡武帝建元年更名湖下邽應劭曰秦武公伐邽戎置有上邽故加下師古曰邽音圭取邽戎之人而來為此縣南陵文帝七年置沂水出藍田谷北至覇陵入霸水霸水亦出藍田谷北入渭師古曰兹水秦穆公更名以章霸功視子孫沂音先厯反視讀曰示宋祁曰沂越本作泝章淳化本作革奉眀宣帝置也霸陵故芷陽文帝更名莽曰水章也杜陵故杜伯國宣帝更名有周右將軍杜主祠四所莽曰饒安也左馮翊故秦内史高帝元年屬塞國二年更名河上郡九年罷復為内史武帝建元六年分為左内史太初元年更名左馮翊戸二十三萬五千一百一口九十一萬七千八百二十二縣二十四高陵左輔都尉治莽曰千春櫟陽秦獻公自雍徙莽曰師亭如淳曰櫟音藥翟道莽曰渙池陽恵帝四年置巀嶭山在北應劭曰在池水之陽師古曰巀嶭即今俗所呼嵳峩山是也音􅎒齧音才葛反又音五葛反夏陽故少梁秦恵文王十一年更名禹貢梁山在西北龍門山在北有鐡官莽曰冀亭衙莽曰逹昌如淳曰衙音牙師古曰即春秋所云秦晉戰于彭衙粟邑莽曰粟城谷口九嵏山在西有天齊公五牀山僊人五帝祠四所莽曰谷喙師古曰嵏音子公反又音子孔反喙音許穢反蓮勺如淳曰音輦酌鄜莽曰修令孟康曰音敷頻陽秦厲公置應劭曰在頻水之陽臨晉故大荔秦獲之更名有河水祠芮鄉故芮國莽曰監晉應劭曰臨晉水故曰臨晉臣瓉曰晉水在河之間此縣在河之西不得云臨晉水也舊説曰秦築高壘以臨晉國故曰臨晉也師古曰瓚説是也説者或以為魏文侯伐秦始置臨晉非也文侯重城之耳豈始置乎重泉莽曰調泉郃陽應劭曰在郃水之陽也師古曰音合即大雅大眀之詩所謂在洽之陽祋祤}
