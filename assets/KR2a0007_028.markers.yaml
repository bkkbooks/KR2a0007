  - {type: variant, offset: 10617, length: 6, content: 改名秀字穎叔, WYG: 略以為儋耳珠厓郡民皆服布如單被穿中央為貫頭師古曰著時從頭而貫之男子耕農種禾稻紵麻女子桑蠶織績亡馬與虎民有五畜師古曰牛羊豕雞犬山多麈麖師古曰麈似鹿而大麖似鹿而小塵音主麖音京兵則矛盾刀木弓弩竹矢或骨為鏃師古曰鏃矢鋒音子木反自初為郡縣吏卒中國人多侵陵之故率數歲壹反元帝時遂罷棄之自日南障塞徐聞合浦船行可五月有都元國又船行可四月有邑盧沒國又船行可二十餘日有諶離國師古曰諶音士林反步行可十餘日有夫甘都盧國師古曰都盧國人勁㨗善緣髙故張衡西京賦}
  - {type: page-break, offset: 10617, content: '', id: KR2a0007_WYG_028-113b, image: missing/missing}
