  - {type: variant, offset: 0, length: 2, content: 楚元, krp: 欽定四庫全書前漢書卷二十八上漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注地理志第八上昔在黃帝作舟車以濟不通旁行天下師古曰旁行謂四出而行之方制萬里畫壄分州師古曰方制制為方域也畫謂為之界也壄古野字畫音獲得百里之國萬區是故易稱先}
