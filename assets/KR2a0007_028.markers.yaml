  - {type: variant, offset: 9851, length: 0, content: '', WYG: 傳所謂介根也語音有輕重稻侯國臯虞侯國莽曰盈廬平昌長廣有萊山萊王祠奚養澤在西秦地圖曰劇清地幽州藪有鹽官横故山名台水所出東南至東武入淮莽曰令}
  - {type: variant, offset: 9851, length: 0, content: '', krp: 傳所謂介根也語音有輕重稻侯國臯虞侯國莽曰盈廬平昌長廣有萊山萊王祠奚養澤在西秦地圖曰劇清地幽州藪有鹽官横故山名台水所出東南至東武入淮莽曰令}
  - {type: variant, offset: 9852, length: 4, content: 明所修皆, WYG: 師古曰台音怡東莞術水南至下邳入泗過郡三行七百一十里青州􅐛孟康曰故鄆邑今鄆亭是也師古曰莞音官術水即沭水也音同魏其侯國莽曰清泉昌有環山祠兹鄉侯國箕侯國禹貢濰水北至都昌入海過郡三行五百二十里兖州􅐛也椑夜頭水南至海莽曰識命應劭曰音禆高廣侯國高鄉侯國柔侯國即來侯國莽曰盛睦宋祁曰睦字當作陸麗侯國武鄉侯國莽曰順理宋祁曰理當作里伊鄉侯國新山侯國高陽侯國昆山侯國參封侯國折泉侯國折泉水北至莫入淮博石侯國房山侯國慎鄉侯國駟望侯國莽曰泠鄉師古曰泠音零安丘侯國莽曰寧鄉高陵侯國莽曰蒲陸臨安侯國莽曰誠信石山侯國東海郡高帝置莽曰沂平屬徐州應劭曰秦郯郡戸三十五萬八千四百一十四口百五十五萬九千三百五十七縣三十八郯故國少昊後盈姓應劭曰音談蘭陵莽曰蘭東孟康曰次室亭魯伯是襄賁莽曰章信應劭曰賁音肥下邳葛嶧山在西}
