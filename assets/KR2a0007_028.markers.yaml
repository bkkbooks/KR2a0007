  - {type: variant, offset: 10575, length: 0, content: '', WYG: 陽故陽國是東安慮莽曰著善淮陽國高帝十一年置莽曰新平屬兖州孟康曰孝明帝更名陳國戸十三萬五千五百四十四口九十八萬一千四百二十三縣九陳故國舜後胡公所封為楚所滅楚頃襄王自郢徙此莽曰陳陵苦莽曰頼陵師古曰晉太康地記云城東有頼鄉祠老子所生地陽夏應劭曰夏音賈寧平扶溝渦水首受狼湯渠東至向入淮過郡三行千里師古曰狼音浪湯音徒浪反渦音戈又音𤓰固始師古曰本名寢丘楚令尹孫叔敖所封地圉新平柘梁國故秦碭郡高帝五年為梁國莽曰陳定屬豫州師古曰以有碭山故名碭郡戸三萬八千七百九口十萬六千七百五十二縣八碭山出文石莽曰節碭應劭曰碭山在東師古曰碭文石也其山出焉故以名縣碭音唐又音徒浪反甾故戴國莽曰嘉穀應劭曰章帝改曰考城杼秋莽曰予秋師古曰杼音食汝反蒙獲水首受甾獲渠東北至彭城入泗過郡五行五百五十里莽曰䝉恩己氏莽曰已善虞莽曰陳定亭下邑莽曰下洽雎陽故宋國㣲子所封禹貢盟諸澤在東北師古曰雎音雖東平國故梁國景帝}
