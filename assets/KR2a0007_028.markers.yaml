  - {type: variant, offset: 9245, length: 2, content: 學者, krp: 程師古曰洈音危繇讀曰由江夏郡高帝置屬荆州應劭曰沔水自江别至南郡華容為夏水過郡入江故曰江夏戸五萬六千八百四十四口二十一萬九千二百一十八縣十四西陵有雲夢宫莽曰江陽竟陵章山在東北古文以為内方山鄖鄉楚鄖公邑莽曰守平師古曰音云宋祁曰章山上當添丘字音云當作鄖音云西陽襄莽曰襄非邾衡山王吴芮都師古曰音朱又音誅車犬故弦子國孟康曰音汏師古曰又音徒系反鄂師古曰音五各反安陸横尾山在東北古文以為陪尾山沙羡晉灼曰羡音夷蘄春晉灼曰音祁鄳蘇林曰音盲師古曰音萌又音莫耿反雲杜應劭曰左}
  - {type: variant, offset: 9248, length: 1, content: 訓, WYG: 若敖取棄䢵今䢵亭是也師古曰䢵音云宋祁曰棄字當作於字下雉莽曰閏光如淳曰音羊氏反鍾武侯國莽曰當利廬江郡}
  - {type: variant, offset: 9248, length: 1, content: 訓, krp: 若敖取棄䢵今䢵亭是也師古曰䢵音云宋祁曰棄字當作於字下雉莽曰閏光如淳曰音羊氏反鍾武侯國莽曰當利廬江郡}
  - {type: variant, offset: 9250, length: 4, content: 而已及歆, WYG: 淮南文帝十六年别為國金蘭西北有東陵鄉淮水出屬揚州廬江出陵陽東南北入江應劭曰故廬子國戸十二萬四千三百八十三口四十五萬七千三百三十三有樓船官縣十二舒故國莽白昆鄉居巢應劭曰春秋楚人圍巢巢國也龍舒應劭曰羣舒之邑臨湖雩婁決水北至蓼入淮又有灌水亦北至蓼入決過郡二行五百一十里師古曰雩音許于反婁音力于反襄安莽曰廬江亭也摐陽師古曰音七容反尋陽禹貢九江在南皆東合為大江􅈞天柱山在南有祠沘山沘水所出北至壽春入芍陂晉灼曰音濳師古曰沘音比又音布几反芍音酌又音鵲晥有鐡官師古曰音胡管反宋祁曰管當作綰湖陵邑北湖在南松兹侯國莽曰誦善九江郡秦置高帝四年更名為淮南國武帝元狩元年復故莽曰延平屬揚州應劭曰江自廬江尋陽分為九戸十五萬五十二口七十八萬五百二十五有陂官湖官縣十五壽春邑楚考烈王自陳徙此浚遒晉灼曰音酋熟之酋師古曰浚音峻遒音才由反成徳莽曰平阿橐臯孟康曰音拓姑陰陵莽曰陰陸厯陽都尉}
