  - {type: variant, offset: 10574, length: 0, content: '', WYG: 曲周武帝建元四年置莽曰直周南曲曲梁侯國莽曰直梁廣鄉平利平鄉陽臺侯國廣年莽曰富昌城鄉眞定國武帝元鼎四年置屬冀州戸三萬七千一百二十六口十七萬八千六百一十六縣四眞定故東垣高帝十一年更名莽曰思治稾城莽曰槀實師古曰稾音工老反肥纍故肥子國師古曰纍音力追反緜曼斯洨水首受太白渠東至鄡入河莽曰緜延師古曰曼音萬鄡音口堯反中山國高帝郡景帝三年為國莽曰常山属冀州應劭曰中山故國戸十六萬八百七十三口六十六萬八千八十縣十四盧奴應劭曰盧水出右北平東入河北平徐水東至高陽入博又有盧水亦至高陽入河有鐵官莽曰善和北新成桑欽言易水出西北東入滱莽曰朔平唐堯山在南莽曰和親應劭曰故堯國也唐水在西張晏曰堯為唐侯國於此堯山在唐東北望都界孟康曰晉荀呉伐鮮虞及中人今中人亭是深澤莽曰翼和苦陘莽曰北陘應劭曰章帝更名漢昌陘音刑安國莽曰興睦曲逆蒲陽山蒲水所出東入濡又有蘇水亦東入濡莽曰順平張晏曰濡水於城北曲而西流故曰曲逆章帝醜其名改曰蒲陰在蒲水之陰師古曰濡音乃官反望都博水東至高陽入河莽曰順調張晏曰堯山在北堯母慶都山在南登堯山見都山故以為名新市應劭曰鮮虞子國今鮮虞亭是新處毋極陸成安險莽曰寜險應劭曰章帝更名安憙宋祁曰寧險邵本作寧陰信都國景帝二年為廣川國宣帝甘露三年復故莽曰新博屬冀州應劭曰明帝更名樂安安帝改曰安平劉敞曰景帝前二年初封王子彭祖為廣川王都信都四年徙趙國除為信都郡中二年封皇子越為廣川王傳國至王汝陽廢當甘露四年也百官表成帝永始二年有信都太守是廣川削國除為信都郡矣後漢志劉昭註云安平故信都高帝置之疑此信都下註當云高帝置景帝二年為廣川國宣帝甘露四年復故又按志云景帝增六郡若信都髙帝置則不及此數疑註當云景帝前二年為廣川國四年為信都郡中二年復為廣川國宣帝四年復故也戸六萬五千五百五十六口三十萬四千三百八十四縣十七信都王都故章河故虖沱皆在北東入海禹貢絳水亦入海莽曰新博亭歴莽曰歴寜扶柳師古曰闞駰云其地有扶澤澤中多栁故曰扶栁辟陽莽曰樂信師古曰辟音壁南宫莽曰序下下博莽曰閏博應劭曰博水出中山望都入河武邑莽曰順桓觀津莽曰朔定亭師古曰觀音工喚反高隄師古曰隄音丁奚反廣川師古曰闞駰云其縣中有長河為流故曰廣川也至隋仁夀元年初立煬帝為皇太子以避諱故改為長河縣至今為名樂鄉侯國莽曰樂丘平隄侯國桃莽曰桓分西梁侯國昌成侯國東昌侯國莽曰田昌脩莽曰脩治師古曰脩音條河閒國故趙文帝二年别為國莽曰朔定應劭曰在兩河之間戸四萬五千四十三口十八萬七千六百六十二縣四樂成虖池别水首受虖池河東至東光入虖池河莽曰陸信候井武隧莽曰桓隧師古曰隧音遂弓高虖池别河首受虖池河東至平舒入海莽曰樂成廣陽國髙帝燕國昭帝元鳳元年為廣陽郡宣帝本始元年更為國莽曰廣有戸二萬七百四十口七萬六百五十八縣四薊故燕國召公所封莽曰伐戎方城廣陽陰鄉莽曰陰順甾川國故齊文帝十八年别為國後并北海劉敞曰按甾川與漢俱不見井北海時至建武年乃省甾川入北海耳戸五萬二百八十九口二十二萬七千三十一縣三劇義山蕤水所出北至夀光入海莽曰俞應劭曰故肥國今肥亭是東安平菟頭山女水出東北至臨甾入鉅定孟康曰紀季以酅入于齊今酅亭是也師古曰闞駰云博陵有安平故此加東酅音攜樓鄉膠東國故齊高帝元年别為國五月復屬齊國文帝十六年復為國莽曰郁秩戸七萬二千二口三十二萬三千三百三十一縣八即墨有天室山祠莽曰即善昌武下密有三石山祠應劭曰密水出高密壯武莽曰曉武郁秩有鐵官挺師古曰挺音徒鼎反觀陽應劭曰在觀水之陽師古曰觀音工喚反鄒盧莽曰始斯高密國故齊文帝十六年別為膠西國宣帝本始元年更為髙密國戸四萬五百三十一口十九萬二千五百三十六縣五髙密莽曰章牟昌安石泉莽曰飬信夷安莽曰原亭應劭曰故萊夷維邑成鄉莽曰順成成陽國故齊文帝二年别為國莽曰莒陵屬兖州戸五萬六千六百四十二口二十萬五千七百八十四縣四莒故國盈姓三十世為楚所滅少昊後有鐵官莽曰莒陵陽都應劭曰齊人}
