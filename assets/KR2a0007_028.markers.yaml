  - {type: variant, offset: 1951, length: 240, content: 擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政患苦外戚許史在位放縱而中書宦官弘恭石顯弄權望之堪更生議欲白罷退之未白而語泄遂為許史及恭顯所譖愬堪更生下獄及望之皆免官語在望之傳其春地震夏客星見昴卷舌間上感悟下詔賜望之爵關內侯奉朝請秋徵堪向欲以為諫大夫恭顯白皆為中郎冬地復震時恭顯許史子弟侍中諸曹皆側目於望之等更生懼焉乃使其外親上變事言竊聞故前將軍蕭望之等皆忠正無私欲致大治忤於貴戚尚書今道路人聞望之等復進以為且復見毀讒必曰嘗有過之臣不宜復用是大不然臣聞春秋地震為在位執政太盛也不為, WYG: 千}
