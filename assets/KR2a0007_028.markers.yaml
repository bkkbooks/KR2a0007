  - {type: variant, offset: 947, length: 2, content: 后母, WYG: 後亦同長社應劭曰宋人圍長葛是也其社中樹暴長更名長社師古曰長讀如本字新汲師古曰闞駰云本汲鄉也宣帝神爵三年置以河内有汲故加新也襄城有西不羮莽曰相城郾師古曰音一戰反郟師古曰音夾舞陽應劭曰舞水出南潁陰崈高武帝置以奉太室山是為中岳有太室少室山廟古文以崇高為外方山也師古曰崈古崇字許故國姜姓四岳後太叔所封二十四世為楚所滅傿陵戸四萬九千一百一口二十六萬一千四百一十八莽曰左亭李竒曰六國為安師古曰傿音偃宋祁曰安下當添陵字臨潁莽曰監潁父城應鄉故國周武王}
