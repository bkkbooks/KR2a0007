  - {type: variant, offset: 944, length: 0, content: '', WYG: 丘也發干莽曰戢楯范莽曰建睦茬平莽曰功崇應劭曰在茬山之平地者也師古曰音仕疑反宋祁曰茬當作茌東武陽禹治漯水東北至千乘入海過郡三行千二十里莽曰武昌應劭曰武水之陽也師古曰漯音它合反宋祁曰漯當作濕博平莽曰加睦黎莽曰黎治孟康曰詩黎侯國今黎陽也臣瓚曰黎陽在魏郡非黎縣也師古曰瓚説是清莽曰清治應劭曰章帝更名樂平東阿都尉治應劭曰衛邑也有西故稱東離狐莽曰瑞狐臨邑有泲廟莽曰穀城亭師古曰泲亦濟水字也其後並同利苗須昌故須句國太昊後風姓師古曰句音劬壽良蚩尤祠在西北泲上有朐城應劭曰世祖叔父名良改曰壽張樂昌陽平白馬南燕南燕國姞姓黄帝後師古曰姞音其乙反廩丘陳留郡武帝元狩元年置屬兖州戸二十九萬六千二百八十四口一百五十萬九千五十縣十七陳留魯渠水首受狼湯渠東至陽夏入渦渠孟康曰留鄭邑也後為陳所并故曰陳留臣瓚曰宋亦有留彭城留是也留屬陳故稱陳留也師古曰瓚説是也渦音戈小黄成安寜陵莽曰康善孟康曰故葛伯國今葛鄉是雍丘故杞國也周武王封禹後東樓公先春秋時徙魯東北二十一世簡公為楚所滅酸棗東昏莽曰東眀襄邑有服官莽曰襄平應劭曰春秋傳曰師于襄牛是也師古曰圈稱云襄邑宋地本承匡襄陵鄉也宋襄公所葬故曰襄陵秦始皇以承匡卑濕故徙縣於襄陵謂之襄邑縣西三十里冇承匡城然則應説以為襄牛誤也外黄都尉治張晏曰魏郡有内黄故加外臣瓚曰縣有黄溝故氏之也師古曰左氏傳曰恵公敗宋師于黄杜預以為外黄縣東有黄城即此地也封丘濮渠水首受泲東北至都闗入羊里水過郡三行六百三十里孟康曰春秋傳敗狄于長丘今翟溝是長羅侯國莽曰恵澤尉氏應劭曰古獄官曰尉氏鄭之别獄也臣瓚曰鄭大夫尉氏之邑故遂以為邑師古曰鄭大夫尉氏亦以掌獄之官}
