  - {type: variant, offset: 10339, length: 0, content: '', WYG: 方百頃平樂道沮沮水出東狼谷南至沙羨南入江過郡五行四千里荆州川師古曰沮音子余反羨音夷嘉陵道循成道下辨道莽曰揚徳師古曰辨音歩見反隴西郡秦置莽曰厭戎應劭曰有隴坻}
  - {type: variant, offset: 10339, length: 0, content: '', krp: 方百頃平樂道沮沮水出東狼谷南至沙羨南入江過郡五行四千里荆州川師古曰沮音子余反羨音夷嘉陵道循成道下辨道莽曰揚徳師古曰辨音歩見反隴西郡秦置莽曰厭戎應劭曰有隴坻}
  - {type: variant, offset: 10340, length: 2, content: 人賢, WYG: 其西也師古曰隴坻謂隴阪即今之隴山也此郡在隴之西故曰隴西坻音丁計反又音底戸五萬三千九百六十四口二十三萬六千八百二十四有鐵官鹽官縣十一狄道白石山在東莽曰操虜師古曰其地有狄種故云狄道上邽應劭曰史記故邽戎邑也師古曰邽音圭安故氐道禹貢飬水所出至武都為漢莽曰亭道師古曰氐夷種名也氐之所居故曰氐道氐音丁奚反飬音弋向反字本作漾或作瀁首陽禹貢鳥䑕同穴山在西南渭水所出東至船司空入河過郡四行千八百七十里雍州􅐛予道莽曰徳道大夏莽曰順夏羌道羌水出塞外南至陰平入白水過郡三行六百里師古曰水經云羌水出羌中參谷襄武莽曰相桓臨洮洮水出西羌中北至枹罕東入河禹貢西頃山在縣西南部都尉治也師古曰洮音吐高反枹讀曰膚頃讀曰傾西禹貢嶓冢山西漢所出南入廣漢白水東南至江州入江過郡四行二千七百六十里莽曰西治金城郡昭帝始元六年置莽曰西海應劭曰初築城得金故曰金城臣瓚曰稱金取其堅固也故墨子曰雖金城湯池師古曰瓚說是也一云以郡在京師西故謂金城金西方之行戸三萬八千四百七十口十四萬九千六百四十八縣十三允吾烏亭逆水出參街谷東至枝陽入湟莽曰脩逺應劭曰允吾音鈆牙浩亹浩亹水出西塞外東至允吾入湟水莽曰興武孟康曰浩亹音合門師古曰浩音誥浩水名也亹}
