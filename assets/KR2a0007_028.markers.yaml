  - {type: variant, offset: 1210, length: 292, content: 以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸呂道如是則可以免患光然之乃擇宗室可用者辟彊子德待詔丞相府年三十餘欲用之或言父見在亦先帝之所寵也遂拜辟彊為光祿大夫守長樂衛尉時年已八十矣徙為宗正數月卒德字路叔修黃老術有智略少時數言事召見甘泉宮武帝謂之千里駒昭帝初為宗正丞雜治劉澤詔獄父為宗正徙大鴻臚丞遷太中大夫後復為宗正雜案上官氏蓋主事德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏盛滿也蓋長公主孫譚遮德自言德數責以公主起居無狀侍御史以為光望不受女承指劾德誹謗詔獄免為庶人屏居山田光聞而恨之復白召德守青州刺史歲餘復為宗正與立宣帝以定策賜爵關內侯地節中以親親行謹厚封為, WYG: ''}
