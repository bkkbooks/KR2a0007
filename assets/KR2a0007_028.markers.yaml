  - {type: variant, offset: 10542, length: 1, content: 哀, WYG: 水入羌谷莽曰顯徳表是莽曰載武樂涫莽曰樂亭天䧇師古曰音衣此地有天䧇阪故以名玉門莽曰輔平亭師古曰闞駰云漢罷玉門關屯徙其人於此會水北部都尉治偃水障東部都尉治東部障莽曰蕭武師古曰闞駰云衆水所會故曰會水池頭綏彌如淳曰今曰安彌乾齊西部都尉治西部障莽曰測虜孟康曰乾音干敦煌郡武}
  - {type: page-break, offset: 10542, content: '', id: KR2a0007_WYG_028-69a, image: WYG0249/WYG0249-0682c.png}
  - {type: variant, offset: 10542, length: 1, content: 哀, krp: 水入羌谷莽曰顯徳表是莽曰載武樂涫莽曰樂亭天䧇師古曰音衣此地有天䧇阪故以名玉門莽曰輔平亭師古曰闞駰云漢罷玉門關屯徙其人於此會水北部都尉治偃水障東部都尉治東部障莽曰蕭武師古曰闞駰云衆水所會故曰會水池頭綏彌如淳曰今曰安彌乾齊西部都尉治西部障莽曰測虜孟康曰乾音干敦煌郡武}
  - {type: variant, offset: 10544, length: 1, content: 崩, WYG: 後元年分酒泉置正西關外有白龍堆沙有蒲昌海莽曰敦徳應劭曰敦大也煌盛也敦音屯戸萬一千二百口三萬八千三百三十五縣六敦煌中部都尉治部廣候官杜林以為古𤓰州地生美𤓰莽曰敦徳師古曰即春秋左氏傳所云允姓之戎居於𤓰州者也其地今猶出大𤓰長者狐入𤓰中食之首尾不出冥安南籍端水出南羌中西北入其澤溉民田應劭曰冥水出北入其澤效穀師古曰本魚澤障也桑欽說孝武元封六年濟南崔不意為魚澤尉敎力田以勤效得榖因立為縣名淵泉師古曰闞駰云地多泉水故以為名宋祁曰淵泉一本作拼泉廣至宜禾都尉治昆侖障莽曰廣桓龍勒有陽關玉門關皆都尉治氐置水出南羌中東北入澤溉民田安定郡武帝元鼎三年置戸四萬二千七百二十五口十四萬三千二百九十四縣二十一髙平莽曰鋪睦復累師古曰復音服累音力追反安俾孟康曰俾音卑撫夷莽曰撫寜朝那有端旬祠十五所胡巫祝又有湫淵祠應劭曰史記故戎那邑也師古曰湫音子由反涇陽开頭山在西禹貢涇水所出東南至陽陵入渭過郡三行千六十里雍州川師古曰开音苦見反又音牽此山在今靈州東南土俗語訛謂之汧屯山臨涇莽曰監涇鹵灈水出西師古曰灈音其于反烏氏烏水出西北入河都盧山在西莽曰烏亭師古曰氏音支陰密詩密人國有囂安亭師古曰即詩大雅所云密人不恭敢距大邦者安定參䜌主騎都尉治師古曰䜌音力全反三水屬國都尉治有鹽官莽曰廣延亭陰槃安武莽曰安桓祖厲莽曰鄉禮應劭曰祖音罝師古曰厲音頼爰得眴卷河水别出為河溝東至富平北入河應劭曰眴音旬日之旬卷音箘簬之箘彭陽鶉陰月氏道莽曰月順應劭曰氏音支北地郡秦置莽曰威成戸六萬四千四百六十一口二十一萬六百八十八縣十九馬領師古曰川形似馬領故以為名領頸也直路沮水出東西入洛宋祁曰洛疑作路靈武莽曰威成亭富平北部都尉治神泉障渾懐都尉治塞外渾懐障莽曰特武師古曰渾音胡昆反靈洲惠帝四年置有河奇苑號非苑莽曰令周師古曰苑謂馬牧也水中可居者曰洲此地在河之洲隨水高下未嘗淪没故號靈洲又曰河奇也二苑皆在北焉昫衍應劭曰昫音煦師古曰音香于反方渠除道莽曰通道五街莽曰吾街鶉孤歸德洛水出北蠻夷中入河有堵苑白馬苑宋祁曰歸徳景本無德字回獲略畔道莽曰延年道師古曰有略畔山今在慶州界其土俗呼曰洛盤音訛耳泥陽莽曰泥陰應劭曰泥水出郁郅北蠻中郁郅泥水出北蠻夷中有牧師苑官莽曰功著師古曰郁音於六反郅音之日反義渠道莽曰義溝弋居有鹽官大師古曰即古要字也音一遥反廉卑移山在西北莽曰西河亭上郡秦置高帝元年更為翟國七月復故匈歸都尉治塞外匈歸障属并州師古曰匈歸者言匈奴歸附戸十萬三千六百八十三口六十萬六千六百五十八縣二十三膚施有五龍山帝原水黄帝祠四所獨樂有鹽官陽周橋山在南有黄帝冢莽曰上陵畤木禾平都淺水莽曰廣信京室莽曰積粟洛都莽曰卑順白土圜水出西東入河莽曰黄土師古曰圜音銀其釋在下襄洛莽曰上黨亭原都漆垣莽曰漆牆奢延莽曰奢節雕陰應劭曰雕山在西南推邪莽曰排邪師古曰邪音似嗟反楨林莽曰楨幹師古曰楨音貞高望北部都尉治莽曰堅寜雕陰道龜兹屬國都尉治有鹽官應劭曰音丘慈師古曰龜兹國人来降附者處之於此故以名云定陽應劭曰在定水之陽高奴有洧水可㸐莽曰利平師古曰㸐古然字望松北部都尉治宜都莽曰堅寧小邑西河郡武帝元朔四年置南部都尉治塞外翁龍埤是莽曰歸新属并州師古曰翁龍埤是二障名也埤音婢戸十三萬六千三百九十口六十九萬八千八百三十六縣三十六富昌有鹽官莽曰富成騶虞鵠澤孟康曰鵠音告師古曰音古督反平定莽曰陰平亭美稷屬國都尉治中陽樂街莽曰截虜徒經莽曰亷恥臯狼大成莽曰好成廣田莽曰廣翰圜陰惠帝五年置莽曰方陰師古曰圜字本作圁縣在圁水之陰因以為名也}
