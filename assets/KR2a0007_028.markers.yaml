  - {type: variant, offset: 10591, length: 2, content: 紅休, WYG: 庶子以主禹祠君於越地耳故此志云其君禹後豈謂百越之人皆禹苖裔瓚説非也劉敞曰瓉所云越非禹後亦謂百越之君耳豈指七八千里内之民乎班氏所舉但是㑹稽一越爾瓉以一越證之亦未為失而顔遂曲排之非通論也文身斷髮以避蛟龍之害應劭曰常在水中故斷其髪文其身以象龍子故不見傷害也後二十世至句踐稱王與吳王闔廬戰敗之雋李師古曰雋音醉字本作檇其旁從木夫差立句踐乗勝復伐吳吳大敗之棲會稽師古曰㑹稽山名登山而處以避兵難言若鳥之棲臣服請平後用范蠡大夫種計遂伐滅吳兼并其地度淮與齊晉諸}
