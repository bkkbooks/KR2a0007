  - {type: variant, offset: 10584, length: 0, content: '', krp: 之衞蔡叔尹之以監殷民謂之三監師古曰武庚即禄父也尹主也管叔蔡叔皆武王之弟故書序曰武王崩三監畔師古曰周書大誥之序周公誅之盡以其地封弟康叔號曰孟侯以夾輔周室師古曰康叔亦武王弟也孟長也言為諸侯之長遷邶庸之民于雒邑故邶庸衞三國之詩相與同風邶詩曰在浚之下師古曰凱風之詩也浚衞邑也音峻庸曰在浚之郊師古曰干旄之詩邶又曰亦流于淇師古曰泉水之詩河水洋洋師古曰今邶詩無此句庸曰送我淇上師古曰桑中之詩淇上淇水之上在彼中河師古曰柏舟之詩也中河河中也衛曰瞻彼淇奥師古曰淇奥之詩也奥水隈也音於六反河水洋洋師古曰碩人之詩也洋洋盛大也音羊又音翔故吳公子札聘魯觀周樂聞邶庸衛之歌曰美哉淵乎吾聞康叔之徳如是是其衞風乎至十六世懿公亡道為狄所滅齊桓公帥諸侯伐狄而更封衛於河南曹楚丘是為文公師古曰曹及楚丘二邑名而河内殷虚更屬于晉師古曰殷虚汲郡朝歌縣也虚讀曰墟康叔之風既歇而紂之化猶存故俗剛彊多豪桀侵奪薄恩禮好生分師古曰生分謂父母在而昆弟不同財産河東土地平易有鹽鐵之饒本唐堯所居詩風唐魏之國也周武王子唐叔在母未生師古曰謂懷孕時武王夢帝謂己師古曰帝天也曰余名而子曰虞將與之唐屬之參師古曰屬音之欲反參音所林反及生名之曰虞至成王滅唐而封叔虞唐有晉水及叔虞子爕為晉侯云故參為晉星其民有先王遺教君予深思小人儉陋故唐詩蟋蟀山樞葛生之篇曰今我不樂日月其邁師古曰蟋蟀之詩也邁行也言日月行往将老而死也蟋音悉蟀音率宛其死矣它人是婾師古曰山有樞之詩也媮樂也言已儉吝死亡之後當為它人所樂也媮音踰又音偸樞音甌百歲之後歸于其居師古曰葛生之詩也居謂墳墓也言死當歸于墳墓不能復為樂也皆思奢儉之中念死生之慮師古曰中音竹仲反吳札聞唐之歌曰思深哉其有陶唐氏之遺民乎魏國亦姬姓也在晉之南河曲故其詩曰彼汾一曲師古曰汾沮洳之詩沮音子豫反洳音人豫反寘諸河之側師古曰伐檀之詩寘置也音之豉反自唐叔十六世至獻公滅魏以封大夫畢萬師古曰畢萬畢公髙之後魏犨祖父滅耿以封大夫趙夙師古曰趙夙趙衰之兄及大夫韓武子食采於韓原師古曰韓武子韓厥之曾祖也本與周同姓食采於韓更為韓氏此説依史記而與釋春秋傳者不同晉於是始大至于文公伯諸侯尊周室師古曰伯讀曰霸始有河内之土師古曰左氏傳所謂始啓南陽者吳札聞魏之歌曰美哉渢渢乎師古曰渢渢浮貌也言其中庸可與為善可與為惡也渢音馮以徳輔此則明主也文公後十六世為韓魏趙所滅三家皆自立為諸侯是為三晉趙與秦同祖韓魏皆姬姓也自畢萬後十世稱侯至孫稱王徙都大梁故魏一號為梁七世為秦所滅周地柳七星張之分壄也今之河南雒陽穀城平陰偃師鞏緱氏是其分也昔周公營雒邑以為在于土中諸侯蕃屏四方師古曰言雒陽四靣皆有諸侯為蕃屏故立京師至幽王淫襃姒以滅宗周子平王東居雒邑其後五伯更帥諸侯以尊王室師古曰伯讀曰霸觧在刑法志更互也音工衡反故周於三代最為長久八百餘年至於赧王乃為秦所兼初雒邑與宗周通封畿韋昭曰通在二封之地共千里也師古曰宗周鎬京也方八百里八八六十四為方百里者六十四也雒邑成周也方六百里六六三十六為方百里者三十六二都得百里者百方千里也故詩云邦畿千里東西長而南北短短長相覆為千里至襄王以河内賜晉文公又為諸侯所侵故其分墜小師古曰墜古地字周人之失巧偽趨利貴財賤義髙富下貧憙為商賈不好仕宦師古曰憙音許吏反自柳三度至張十二度謂之鶉火之次周之分也韓地角亢氐之分野也韓分晉得南陽郡及潁川之父城定陵襄城潁陽潁陰長社陽翟郟師古曰郟音工治反即今郟城縣是也東接汝南西接𢎞農得新安宜陽皆韓分也及詩風陳鄭之國與韓同星分焉鄭國今河南之新鄭本髙辛氏火正祝融之虚也師古曰虚讀曰墟後皆類此及成臯滎陽潁川之崇髙陽城皆鄭分也本周宣王弟友為周司徒食采於宗周畿内是為鄭師古曰即今之華隂鄭縣鄭桓公問於史伯曰王室多故何所可以逃死史伯曰四方之國非王母弟甥舅則夷狄不可入也其濟洛河潁之間乎師舌曰濟音子禮反子男之國虢會為大師古曰會讀曰鄶字或作檜檜國在豫州外方之北滎嶓之南溱洧之間妘姓之國恃埶與險崈侈貪冒師古曰冒蒙也蔽於義理君若寄帑與賄周亂而敝必將背君師古曰帑讀與孥同謂妻子也君以成周之衆奉辭伐罪亡不克矣公曰南方不可乎對曰夫楚重黎之後也黎為髙辛氏火正昭顯天地以生柔嘉之材姜嬴荆芊實與諸姬代相干也師古曰代遞也干犯也姜伯夷之後也嬴伯益之後也伯夷能禮於神以佐堯伯益能儀百物以佐舜師古曰儀與宜同宜安也其後皆不失祠而未有興者周衰將起不可偪也桓公從其言乃東寄帑與賄虢會受之後三年幽王敗桓公死其子武公與平王東遷卒定虢㑹之地右雒左泲食溱洧焉師古曰溱洧二水也溱音臻洧音鮪土陿而險山居谷汲男女亟聚㑹師古曰亟屢也音丘吏反故其俗淫鄭詩曰出其東門有女如雲師古曰出其東門之詩東門鄭之東門也如雲言其衆多而往來不定又曰溱與洧方灌灌兮士與女方秉菅兮恂盱且樂惟士與女伊其相謔師古曰溱洧之詩也灌灌水流盛也菅蘭也恂信也盱大也伊惟也謔戲言也謂仲春之月二水流盛而士與女執芳草於其間以相贈遺信大樂矣惟以戲謔也灌音胡貫反菅音姦此其風也吳札聞鄭之歌曰美哉其細已甚民弗堪也是其先亡乎臣瓚曰謂音聲細弱也此衰弱之徴自武公後二十三世為韓所滅陳國今淮陽之地陳本太昊之虚周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗巫鬼陳詩曰坎其擊鼓宛丘之下亡冬亡夏值其鷺羽師古曰宛丘之詩也坎坎擊鼓聲四方髙中央下曰宛丘值立也鷺鳥之羽以為翻立之而舞以事神也無冬無夏言其恒也又曰東門之枌宛丘之栩子仲之子婆娑其下師古曰東門之枌之詩也東門陳國之東門也枌白榆也栩杼也子仲陳大夫之氏也婆娑舞貌也亦言於枌栩之下歌舞以娛神也枌音扶云反栩音許羽反杼音神汝反此其風也吳札聞陳之歌曰國亡主其能久乎師古曰言政由婦人不以君為主也自胡公後二十三世為楚所滅陳雖屬楚於天文自若其故宋祁曰世字下淳化本有亦字潁川南陽本夏禹之國夏人上忠其敝鄙朴韓自武子後七世稱侯六世稱王五世而為秦所滅秦既滅韓徙天下不軌之民於南陽師古曰不軌不循法度者故其俗夸奢上氣力好商賈漁獵臧匿難制御也宛西通武關東受江淮一都之㑹也宣帝時鄭𢎞召信臣為南陽太守師古曰召讀曰邵治皆見紀信臣勸民農桑去末歸本郡以殷富潁川韓都士有申子韓非刻害餘烈師古曰申子申不害也烈業也髙仕宦好文法民以貪遴爭訟生分為失師古曰遴與吝同韓延夀為太守先之以敬讓黄霸繼之教化大行獄或八年亡重罪囚南陽好商賈召父富以本業師古曰召父謂召信臣也勸其務農以致富潁川好爭訟分異黄韓化以篤厚君子之徳風也小人之徳草也信矣師古曰論語載孔子之言也曰君子之徳風小人之徳草也草上之風必偃言從教而化自東井六度至亢六度謂之夀星之次鄭之分野與韓同分趙地昴畢之分壄趙分晉得趙國北有信都真定常山中山又得涿郡之髙陽鄚州鄉師古曰鄭音莫東有廣平鉅鹿清河河間又得勃海郡之東平舒中邑文安束州成平章武河以北也南至浮水繁陽内黄斥丘西有太原定襄雲中五原上黨上黨本韓之别郡也逺韓近趙後卒降趙皆趙分也自趙夙後九世稱侯四世敬侯徙都邯鄲至曾孫武靈王稱王五世為秦所滅趙中山地薄人衆猶有沙丘紂淫亂餘民晉灼曰言地薄人衆猶復有沙丘紂淫地餘民通係之於淫風而言之也不説沙丘在中山也宋祁曰正文中山地下别本又一地字丈夫相聚游戲悲歌忼慨起則椎剽掘冡師古曰椎殺人而剽劫之也椎音直追反其字從木剽音頻妙反掘冡發冡也作姦巧多弄物為倡優女子彈弦跕躧游媚富貴徧諸侯之後宫如淳曰跕音蹀足之蹀躧音屣臣瓚曰躡跟為跕拄指為躧師古曰跕音它頰反躧字與屣同屣謂小履之無跟者也跕謂輕躡之也邯鄲北通燕涿南有鄭衛漳河之間一都㑹也其土廣俗雜大率精急髙氣埶輕為姦太原上黨又多晉公族子孫以詐力相傾矜夸功名報仇過直師古曰直亦當也宋祁曰一本傾下有務字嫁取送死奢靡師古曰取讀曰娶其下並同漢興號為難治常擇嚴猛之將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石師古曰訐面相斥罪也音居列反又音居謁反宋祁曰註相字邵本作猶或報殺其親屬鍾代石北迫近胡寇師古曰鍾所在未聞石山險之限在上曲陽民俗懻忮臣瓚曰懻音冀今北土名彊直為懻中師古曰懻堅也忮恨也音章豉反好氣為姦不事農商自全晉時已患其剽悍師古曰剽急也輕也悍勇也剽音頻妙反又音匹妙反悍音胡旦反而武靈王又益厲之故冀州之部盜賊常為它州劇定襄雲中五原本戎狄地頗有趙齊衞楚之徙師古曰言四國之人被遷徙來居之其民鄙朴少禮文好射獵鴈門亦同俗於天文别屬燕燕地尾箕分壄也武王定殷封召公於燕其後三十六世與六國俱稱王東有漁陽右北平遼西遼東西有上谷代郡鴈門南得涿郡之易容城范陽北新成故安涿縣良鄉新昌及勃海之安次皆燕分也樂浪元菟亦宜屬焉燕稱王十世秦欲滅六國燕王太子丹遣勇士荆軻西刺秦王不成而誅秦遂舉兵滅燕薊南通齊趙勃碣之間一都會也師古曰薊縣燕之所都也勃勃海也碣碣石也此石著海旁揭揭然特立之貌也初太子丹賔飬勇士不愛後宫美女民化以為俗至今猶然賔客相過以婦侍宿嫁取之夕男女無别反以為榮後稍頗止然終未改其俗愚悍少慮輕薄無威亦有所長敢於急人如淳曰赴人之急果於赴難也燕丹遺風也上谷至遼東地廣民希數被胡寇俗與趙代相類有漁鹽棗栗之饒北隙烏丸夫餘如淳曰有怨隙也或曰隙際也師古曰訓際是也烏丸本東胡也為冒頓所滅餘類保烏丸山因以為號夫餘在長城之北去元菟千里夫讀曰扶東賈真番之利元莬樂浪武帝時置皆朝鮮濊貉句驪蠻夷師古曰濊音穢字或作薉其音同殷道衰箕子去之朝鮮師古曰史記云武王伐紂封箕子扵朝鮮與此不同教其民以禮義田蠶織作樂浪朝鮮民犯禁八條師古曰八條不具見相殺以當時償殺相傷以穀償相盜者男沒入為其家奴女子為婢欲自償者人五十萬雖免為民俗猶羞之嫁取無所讎師古曰讎匹也一曰讎讀曰售是以其民終不相盜無門戸之閉婦人貞信不淫辟師古曰辟讀曰僻其田民飲食以籩豆師古曰以竹曰籩以木曰豆若今之檠也檠音其敬反都邑頗放效吏及内郡賈人往往以杯器食師古曰都邑之人頗用杯器者效吏及賈人也放音甫往反郡初取吏於遼東吏見民無閉臧及賈人往者夜則為盜俗稍益薄今於犯禁寖多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外師古曰三方謂南西北也故孔子悼道不行設浮於海欲居九夷有以也師古曰論語稱孔子曰道不行乗桴浮於海從我者其由也歟言欲乗桴筏而適東夷以其國有仁賢之化可以行道也桴音孚筏音伐夫樂浪海中有倭人分為百餘國以歲時來獻見云如淳曰如墨委面在帯方東南萬里臣瓚曰倭是國名不謂用墨故謂之委也師古曰如淳云如墨委面盖音委字耳此音非也倭音一戈反今猶冇倭國魏略云倭在帯方東南大海中依山島為國度海千里復有國皆倭種劉敞曰夫字宜屬上句自危四度至斗六度謂之析木之次燕之分也齊地虚危之分壄也東有甾川東萊琅邪髙密膠東南有泰山城陽北有千乗清河以南勃海之髙樂髙城重合陽信西有濟南平原皆齊分也宋祁曰分也一夲作分地少昊之世有爽鳩氏虞夏時有季崱師古曰崱音仕力反湯時有逢公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之以封師尚父是為太公師古曰武王封太公於齊初未得爽鳩之地成王以益之也詩風齊國是也臨甾名營丘故齊詩曰子之營兮遭我虖嶩之間兮師古曰齊國風營詩之辭也毛詩作還齊詩作營之往也嶩山名也字或作峱亦作巙音皆乃髙反言往適營丘而相逢於嶩山也又曰竢我於著乎而師古曰齊國風著詩之辭也著地名即濟南郡著縣也乎而語助也一曰門屏之間曰著音直庶反此亦其舒緩之體也吳札聞齊之歌曰泱泱乎大風也哉師古曰泱泱𢎞大之意也音烏郎反其太公乎國未可量也古有分土亡分民師古曰有分土者謂立封疆也無分民者謂通往來不常厥居也太公以齊地負海舄鹵少五穀而人民寡師古曰舄鹵觧在食貨志廼勸以女工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國師古曰解在食貨志合諸侯成伯功師古曰伯讀曰霸身在陪臣而取三歸師古曰三歸三姓之女故其俗彌侈織作冰紈綺繡純麗之物如淳曰紈白熟也純緣也謂絛組之屬也麗好也臣瓚曰冰紈紈細宻堅如冰者也純麗溫純美麗之物也師古曰如説非也冰謂布帛之細其色鮮絜如冰者也紈素也綺文繒也即今之所謂細綾也純精好也麗華靡也紈音丸純音淳號為冠帶衣履天下師古曰言天下之人冠帯衣履皆仰齊地初太公治齊脩道術尊賢智賞有功故至今其土多好經術矜功名舒緩闊達而足智其失夸奢朋黨言與行繆虚詐不情師古曰不可得其情急之則離散緩之則放縱始桓公兄襄公淫亂姑姊妹不嫁於是令國中民家長女不得嫁名曰巫兒為家主祠嫁者不利其家民至今以為俗痛乎道民之道可不慎哉師古曰上道讀曰導宋祁曰慎疑作憤昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有簒殺之臣其後二十九世為彊臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊師古曰公子完陳厲公之子也左氏傳魯荘二十二年陳人殺其太子禦寇公子完與顓孫奔齊盖禦寇之黨也齊桓公以為大夫更稱田氏九世至和而簒齊至孫威王稱王五世為秦所滅臨甾海岱之間一都會也其中具五民云服䖍曰士農商工賈也如淳曰逰子樂其俗不復歸故有五方之民也師古曰如説是魯地奎婁之分壄也東至東海南有泗水至淮得臨淮之下相雎陵僮取慮皆魯分也師古曰取音趨又音秋慮音閭周興以少昊之虚曲阜封周公子伯禽為魯侯師古曰少昊金天氏之帝以為周公主師古曰主周公之祭祀其民有聖人之教化故孔子曰齊一變至於魯魯一變至於道言近正也師古曰魯庶幾至道齊人不如魯也瀕洙泗之水師古曰言所居皆邊於二水也瀕音頻又音賔其民渉度幼者扶老而代其任師古曰任負戴也俗既益薄長老不自安與幼少相讓故曰魯道衰洙泗之間齗齗如也師古曰齗齗分辨之意也音牛斤反孔子閔王道将廢廼脩六經以述唐虞三代之道弟子受業而通者七十有七人是以其民好學上禮義重廉恥周公始封太公問何以治魯周公曰尊尊而親親太公曰後世寖弱矣師古曰言漸㣲弱也故魯自文公以後禄去公室政在大夫季氏逐昭公陵夷㣲弱三十四世而為楚所滅然本大國故自為分壄今去聖乆逺周公遺化銷㣲孔氏庠序衰壞地陿民衆頗有桑麻之業亡林澤之饒俗儉嗇愛財趨商賈好訾毁多巧偽師古曰以言相毁曰訾訾音子爾反喪祭之禮文備實寡然其好學猶愈於它俗師古曰愈勝也漢興以來魯東海多至卿相東平湏昌夀張皆在濟東屬魯非宋地也當考師古曰當考者言當更考覈之其事未審宋地房心之分壄也今之沛梁楚山陽濟隂東平及東郡之湏昌夀張皆宋分也周封㣲子於宋今之雎陽是也本陶唐氏火正閼伯之虚也濟隂定陶詩風曹國也武王封弟叔振鐸於曹其後稍大得山陽陳留二十餘世為宋所滅昔堯作游成陽如淳曰作起也成陽在定陶今有堯冢靈臺師古曰作游者言為宫室遊止之處也舜漁靁澤師古曰漁捕魚也靁古雷字湯止于亳故其民猶有先王遺風重厚多君子好稼穡惡衣食以致畜藏師古曰畜讀曰蓄宋自㣲子二十餘世至景公滅曹滅曹後五世亦為齊楚魏所滅參分其地魏得其梁陳留齊得其濟陰東平楚得其沛故今之楚彭城本宋也春秋經曰圍宋彭城宋雖滅本大國故自為分野沛楚之失急疾顓已地薄民貧師古曰顓與専同急疾顓已言性褊狹而自用而山陽好為姦盜衞地營室東壁之分壄也今之東郡及魏郡黎陽河内之野王朝歌皆衞分也衞本國既為狄所滅師古曰衞懿公為狄人所滅事在春秋閔公二年文公徙楚丘三十餘年子成公徙於帝丘故春秋經曰衛􅞳于帝丘師古曰􅞳古遷字今之濮陽是也本顓頊之虚故謂之帝丘夏后之世昆吾氏居之成公後十餘世為韓魏所侵盡亡其旁邑獨有濮陽後秦滅濮陽置東郡徙之於野王始皇既并天下猶獨置衞君二世時乃廢為庶人凡四十世九百年最後絶故獨為分野衞地有桑間濮上之阻師古曰阻者言其隐阸得肆淫僻之情也男女亦亟聚㑹聲色生焉師古曰亟屢也音丘吏反故俗稱鄭衞之音周末有子路夏育民人慕之師古曰子路孔子弟子仲由也性好勇夏育亦古之壯士皆衞人故其俗剛武上氣力漢興二千石治者亦以殺戮為威宣帝時韓延夀為東郡太守承聖恩崇禮義尊諫爭至今東郡號善為吏延夀之化也其失頗奢靡嫁取送死過度而野王好氣任俠有濮上風楚地翼軫之分壄也今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也周成王時封文武先師鬻熊之曾孫熊繹於荆蠻為楚子居丹陽後十餘世至熊達是為武王濅以彊大師古曰濅漸也後五世至嚴王總帥諸侯觀兵周室并吞江漢之間内滅陳魯之國劉攽曰嚴王未嘗滅魯也後十餘世頃襄王東徙于陳楚有江漢川澤山林之饒江南地廣或火耕水耨民食魚稻以漁獵山伐為業師古曰山伐謂伐山取竹木果蓏蠃蛤食物常足師古曰蠃音來戈反蛤音閤似蜯而圓故啙窳媮生而亡積聚應劭曰啙弱也言風俗朝夕取給媮生而已無長久之慮也如淳曰啙或作鮆音紫窳音庾晉灼曰啙病也窳惰也師古曰諸家之説非也啙短也窳弱也言短力弱材不能勤作故朝夕取給而無儲偫也如音是也飲食還給不憂凍餓師古曰還及也言常相及而給足也亦亡千金之家信巫鬼重淫祀而漢中淫失枝柱與巴蜀同俗師古曰失讀曰泆柱音竹甫反枝柱言意相節卻不順從也汝南之别皆急疾有氣埶江陵故郢都西通巫巴東有雲夢之饒亦一都會也吳地斗分壄也今之會稽九江丹陽豫章廬江廣陵六安臨淮郡盡吳分也殷道既衰周太王亶父興􅑢梁之地長子太伯次曰仲雍少曰公季公季有聖子昌太王欲傳國焉太伯仲雍辭行采藥遂奔荆蠻公季嗣位至昌為西伯受命而王故孔子美而稱曰太伯可謂至悳也已矣三以天下讓民無得而稱焉謂虞仲夷逸隐居放言身中清廢中權師古曰皆論語載孔子之言也虞仲即仲雍也夷逸言竄扵蠻夷而遁逸也隐居而不言故其身清潔所廢中扵權道太伯初奔荆蠻荆蠻歸之號曰句吳師古曰句音鉤夷俗語之發聲也亦猶越為於越也太伯卒仲雍立至曾孫周章而武王克殷因而封之又封周章弟中於河北是為北吳師古曰中讀曰仲後世謂之虞十二世為晉所滅後二世而荆蠻之呉子壽夢盛大稱王其少子則季札有賢材兄弟欲傳國札讓而不受自太伯夀夢稱王六世闔廬舉伍子胥孫武為將戰勝攻取興伯名於諸侯師古曰伯讀曰霸至于夫差誅子胥用宰嚭師古曰嚭音披美反為粤王句踐所滅呉粤之君皆好勇故其民至今好用劒輕死易發粤既并呉後六世為楚所滅後秦又擊楚徙夀春至子為秦所滅夀春合肥受南北湖皮革鮑木之輸師古曰皮革犀兕之屬也鮑鮑魚也木楓柟豫章之屬亦一都會也始楚賢臣屈原被讒放流作離騷諸賦以自傷悼師古曰諸賦謂九歌天問九章之屬後有宋玉唐勒之屬慕而述之皆以顯名漢興髙祖王兄子濞於呉招致天下之娱游子弟枚乗鄒陽嚴夫子之徒興於文景之際而淮南王安亦都夀春招賔客著書而吳有嚴助朱買臣貴顯漢朝文辭並發故世傳楚辭其失巧而少信初淮南王異國中民家有女者晉灼曰有女者見優異以待游士而妻之故至今多女而少男如淳曰得女寵或去男也臣瓉曰周官職方云揚州之民二男而五女此風氣非由淮南王安能}
  - {type: variant, offset: 10585, length: 1, content: 治, WYG: 多女也師古曰二説皆非也志亦言土地風氣既足女矣因淮南之化又更聚焉劉敞曰班氏作史雜采異説亦安能無失瓉舉揚州之説是矣本呉粤與楚接比數相并兼師古曰比近也音頻寐反故民俗略同呉東有海鹽章山之銅三江五湖之利亦江東之一都會也豫章出黄金然菫菫物之所有取之不足以更費應劭曰菫菫少也更償也言金少耳取不足用顧費用也師古曰應説非也此言所出之金既以少矣自外諸物盖亦不多故總言取之不足償功直也菫讀曰僅更音庚江南卑濕丈夫多夭會稽海外有東鯷人孟康曰音題晉灼曰音鞮師古曰孟音是也分為二十餘國以歲時來獻見云粵地牽牛婺女之分壄也今之蒼梧鬱林合浦交阯九真南海日南皆粵分也其君禹後帝少康之庶子云封於㑹稽臣瓚曰自交趾至㑹稽七八千里百粤雜處各有種姓不得盡云少康之後也按世本越為芊姓與楚同祖故國語曰芊姓夔越然則越非禹後}
