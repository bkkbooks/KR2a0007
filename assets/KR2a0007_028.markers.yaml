  - {type: variant, offset: 894, length: 1, content: 襄, WYG: 禮反本濟水字宋祁曰狼湯邵本作狼浪偃師尸鄉殷湯所都莽曰師成臣瓚曰湯居亳今濟隂縣是也今亳有湯冢己氏有伊尹冢皆相近也師古曰瓚説非也又如皇甫謐所云湯都在穀熟事並不經劉向云殷湯無𦵏處安得湯冢乎京師古曰即鄭共叔叚所居也平陰應劭曰在平城南故曰平隂中牟圃田澤在西豫州藪有筦叔邑趙獻侯自耿徙此師古曰筦與管同平莽曰治平陽武有博狼沙莽曰陽桓師古曰狼音浪河南故郟鄏地周武}
