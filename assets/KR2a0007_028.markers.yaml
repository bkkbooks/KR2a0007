  - {type: variant, offset: 249, length: 152, content: 丘嫂食嫂厭叔與客來陽為羹盡轑釜客以故去已而視釜中有羹繇是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為羹頡侯元王既至楚以穆生白生申公為中大夫高后時浮丘伯在長安元王遣子郢客與申公俱卒業文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩元王亦次之詩傳, WYG: 地屬晉}
