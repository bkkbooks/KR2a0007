  - {type: 'tls:seg', offset: 121, content: '', id: KR2a0007_tls_028-2a.13}
  - {type: variant, offset: 122, length: 0, content: '', WYG: 沔又有洱水東南至魯陽亦入沔皆過郡二行六百里莽曰昌富師古曰洱音耳宋祁曰昌富疑作昌當陜故虢國有焦城故焦國北虢在大陽東虢在滎陽西虢在雍州莽曰黄眉宜陽在黽池有鐡官也黽池高帝八年復黽池中鄉民景帝中二年初城徙萬家為縣榖水出榖陽谷東北至榖城入雒莽曰陜亭師古曰黽音莫踐反又音莫忍反丹水水出上雒冡領山東至析入鈞密陽鄉故商密也師古曰鈞亦水名也音均新安禹貢澗水在東南入雒商秦相衛鞅邑也析黄水出黄谷鞠水出析谷俱東至酈入湍水莽曰君亭師古曰折音先厯反鞠水即今所謂菊潭也酈音持益反湍音專陸渾春秋遷陸渾戎於此有闗師古曰渾音胡昆反上雒禹貢雒水出冡領山東北至鞏入河過郡二行千七十里豫州川又有甲水出秦領山東南至鍚入沔過郡三行五百七十里熊耳獲輿山在東北師古曰鍚音陽河東郡秦置莽曰兆陽有根倉溼倉戸二十三萬六千八百九十六口九十六萬二千九百一十二縣二十四安邑巫咸山在南鹽池在西南魏絳自魏徙此至恵王徙大梁有鐡官鹽官莽曰河東大陽吴山在西上有吴城周}
