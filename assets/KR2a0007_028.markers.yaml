  - {type: variant, offset: 10627, length: 3, content: 篡位歆, WYG: 輔政欲燿威徳厚遺黄支王令遣使獻生犀牛自黄支船行可八月到皮宗船行可二月到日南象林界云黄支之南有已程不國漢之譯使自此還矣前漢書卷二十八下前漢書卷二十八下考證地理志下武都郡河池池監本訛地從宋本改正隴西郡氐道禹貢養水所出至武都}
