  - {type: variant, offset: 10307, length: 2, content: 義雖, WYG: 疏亦訛城字盖後人傳寫誤添土旁耳此成陽有堯冡靈䑓漢時故縣在今濮州東南曹州東北若城陽國則在今莒州非雷夏澤所在也淮沂其乂注淮出大復山沂出泰山臣召南按志沂水出泰山郡盖縣然則泰山乃郡名非謂沂水出泰山之麓也注與淮出大復對言竟似沂出東岳矣泗瀕浮磬泗監本訛四今改正荆河惟豫州注西南至荆山荆山監本訛荆州從宋本改正道嶓冡注嶓冡山在梁州南北臣召南按南北當作西北各本俱誤至于衡山注衡山江所經臣召南按此本孔傳之誤也衡山湘水所經北去岷江甚逺安得謂江所經乎志明曰長沙國湘南禹貢衡山在東南矣兼徐梁幽并夏周之制兼監本訛并從宋本改京兆尹故秦内史云云顧炎武曰地理藝文二志小字皆孟堅本文其師古曰應劭曰服䖍曰之類乃顔氏注也又武帝建元六年分為右内史臣召南按百官公卿表曰内史景帝二年分置左内史右内史與此不同師古謂據史記知志誤按史記景紀二年秋但云置内史祋祤為縣未云分置左右内史也未知師古何據若據本書表則孝景元年即書中大夫鼂錯為左内史矣華隂故隂晉秦惠文王五年更名寧秦臣召南按史記秦本紀惠文王六年魏納陰晉更名寧秦非五年也當是傳寫之訛湖武帝建元年更名湖臣召南按建元下脱某年字宋本亦然南陵沂水出藍田谷北至覇陵入覇水臣召南按沂水當作滻水各本俱訛水經注引此條云滻水出藍田谷北至覇陵入覇水是其証也左馮翊臨晉注臣瓚曰晉水在河之間按河之間應作河之東言縣在河西岸而晉水入河在其東岸也右扶風盩厔有長楊宫監本訛長陽宫從宋本改正𢎞農郡宜陽在黽池有鐡官也臣召南按在黽池有鐡官也七字乃郡戸口下自注有鐡官在黽池誤衍于此宜陽與黽池各自為縣使宜陽有鐡官安得在黽池耶一文重見刋誤不言何也太原郡榆次梗陽郷魏戊邑戊監本訛成今據左傳史記改正又陽曲注師古曰隋文帝自以姓楊監本訛姓陽今改正上黨郡沾大谷清漳水所出東北至阜城入大河臣召南按宋本監本及别本俱作至邑成入大河非也漢無邑成縣名阜城則勃海郡屬縣也尚書􅀈疏史記索隐並引此條曰東北至阜城入大河可為確証今從之河南郡梁􅓆狐聚云云注應劭云云監本梁下脱班志本文􅓆狐聚以下二十四字又脱應劭注十八字今從宋本添東郡東武陽禹治漯水云云按禹治應作禹貢各本俱誤潁川郡有工官工官監本誤二官今改正汝南郡莾曰汝汾分為賞都尉臣召南按汝汾當是汝墳之訛分為賞都尉當是賞都郡之訛盖莾改汝南郡曰汝墳郡又分置賞都郡耳南陽郡雉衡山灃水所出東至􅪧入汝臣召南按漢無􅪧縣以水經注証之􅪧字自是郾字之訛郾潁川郡屬縣也然師古云􅪧音屋則唐初本已訛矣平氏淮水所出東南至淮陵入海臣召南按淮陵當作淮浦各本俱誤淮浦故城在今東安縣淮水於此入海若淮陵故城在今盱眙縣西北去海尚逺水經曰淮水東至淮浦入海是也南郡江陵秦㧞我郢徙東臣召南按徙東當作徙陳此頃襄王二十一年事也志於九江夀春邑自注曰楚考烈王自陳徙此即與此文}
