  - {type: variant, offset: 10633, length: 0, content: '', WYG: 古注洫音呼鵙反則唐初本已作洫字交趾郡茍屚茍訛荀今改正此縣即}
  - {type: variant, offset: 10633, length: 0, content: '', krp: 古注洫音呼鵙反則唐初本已作洫字交趾郡茍屚茍訛荀今改正此縣即}
  - {type: variant, offset: 10634, length: 0, content: '', WYG: 世所謂勾漏也成陽國按當作城陽國宋本誤也城陽劉章所封國長沙國羅注出豫章艾縣界艾監本訛芰今改正道三十二臣召南按百官公卿表邑有蠻夷曰道志中縣邑之以道名者得二十九南郡一夷道也零陵二營道泠道也廣漢三甸氐道剛氐道陰平道也蜀郡二嚴道湔氐道也犍為一僰道也越嶲一靈關道也武都五故道平樂道嘉陵道循成道下辯道也隴西四狄道氐道羌道予道也天水四戎邑道綿諸道略陽道豲道也安定一月氏道也北地三除道略畔道義渠道也上郡一雕陰道也長沙國一連道也尚缺其三以後書郡國志証之則蜀都之汶江道綿虒道武都之武都道恰與三十二之數合此志於汶江綿虒武都三縣不言道殆亦闕文耳民戸千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八臣召南按帝王世紀曰民戸千三百二十三萬三千六百一十二口五千九百一十九萬四千九百七十八人皇甫謐所計戸口必本此志而數目參差似所見古本異也廼封為附庸邑之於秦今隴西秦亭秦谷是也臣召南按此隴西非郡名言隴縣之西有秦亭秦谷即是其地隴縣屬天水郡後書郡國志曰隴有大坂名隴坁豲坻聚有秦亭注云秦之先起于此魏地觜觽參之分野也其界自髙陵以東云云顧炎武曰左傳子産曰遷實沈于大夏主參故參為晉星然其疆界亦當至河而止若志所列陳留以下郡縣並在河南於春秋自屬陳鄭二國角亢氐之分也不當併入魏本都安邑至惠王始徙大梁乃据後來之疆土割以相附豈不謬哉虢會為大注滎嶓之南臣召南按顔注引康成詩譜應作滎播宋本監本作滎嶓訛也别本作滎波依禹貢較是自東井六度至亢六度謂之夀星之次鄭之分野與韓同分臣召南按夀星之次星曰角亢律歴志曰夀星初軫十二度中角十度終于氐四度安在其為自東井六度至亢六度也夫自東井十度至栁三度為鶉首之次秦分野也栁七星張為鶉火之次周分野也翼軫為鶉尾之次楚分野也豈有自未至辰逺及四次以為一地之分星乎哉二句必係傳寫之誤自危四度至斗六度謂之析木之次燕之分也臣召南按析木之次星曰尾箕律歴志曰析木初尾十度中箕七度終于斗十一度此言一次之全度也燕地袛占尾箕不及南斗何縁自危四度至斗六度乎若順數之幾乎週天矣若逆數之則自危而虚而女而牽牛而南斗正當元枵星紀二次又何以云析木也宋本監本俱誤東平湏昌夀張皆在濟東屬魯云云顧炎武曰於宋地下云今之沛梁楚山陽濟隂東平及東郡之湏昌夀張皆宋分也于魯地下又云非宋地也當考此並存異説以偹考當小注于下而誤連書者也至嚴王總帥諸侯觀兵周室并吞江漢之間内滅陳魯之國臣召南按楚之滅魯在頃襄王時去荘王時甚逺又荘王雖嘗入陳旋復其國至惠王始滅陳二}
