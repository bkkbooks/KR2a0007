  - {type: variant, offset: 10581, length: 0, content: '', WYG: 樂屬徐州戸十二萬四千七百三十八宋祁曰十二邵本作十一口四十九萬七千八百四縣七彭城古彭祖國戸四萬一百九十六有鐵官留梧莽曰吾治傅陽故偪陽國莽曰輔陽師古曰偪音福左氏傳所云偪陽妘姓者也呂武原莽曰和樂亭甾丘莽曰善丘泗水國故東海郡武帝元鼎四年别為泗水國莽曰水順戸二萬五千二十五口十一萬九千一百一十四縣三淩莽曰生夌應劭曰淩水所出南入淮泗陽莽曰淮平亭于莽曰于屏廣陵國高帝六年屬荆國十一年更屬吳景帝四年更名江都武帝元狩三年更名廣陵莽曰江平屬徐州戸三萬六千七百七十三口十四萬七百二十二有鐵官縣四廣陵江都易王非廣陵厲王胥皆都此并得鄣郡而不得吳莽曰安定江都有江水祠渠水首受江北至射陽入湖高郵平安莽曰杜鄉六安國故楚高帝元年别為衡山國五年屬淮南文帝十六年復為衡山武帝元狩二年别為六安國莽曰安風戸三萬八千三百四十五口十七萬八千六百一十六縣五六故國臯繇後偃姓為楚所滅如谿水首受沘東北至夀春入芍陂師古曰沘音匕又音鄙芍音鵲蓼故國臯繇後為楚所滅安豐禹貢大别山在西南莽曰美豐安風莽曰安風亭陽泉長沙國秦郡高帝五年為國莽曰塡蠻屬荆州戸四萬三千四百七十口二十三萬五千八百二十五縣十三臨湘莽曰撫睦應劭曰湘水出零山羅應劭曰楚文王徙羅子自枝江居此師古曰盛𢎞之荆州記云縣北帯汨水水原出豫章艾縣界西流注湘㳂汨西北去縣三十里名為屈潭屈原自沉處連道益陽湘山在北應劭曰在益水之陽下雋莽曰閏雋師古曰雋音字兖反又音辭兖反攸音收酃孟康曰音鈴承陽應劭曰承水之陽師古曰承水原出零陵永昌縣界東流注湘也承音烝湘南禹貢衡山在東南荆州山昭陵茶陵泥水西入湘行七百里莽曰聲鄉師古曰茶音弋奢反又音丈加反容陵安成廬水東至廬陵入湖漢莽曰思成本秦京師為内史師古曰京師天子所都畿内也秦并天下改立郡縣而京畿所統特號内史言其在内以别於諸郡守也分天下作三十六郡漢興以其郡太大稍復開置又立諸侯王國武帝開廣三邊故自高祖増二十六文景各六宋祁曰各六越本作五十六武帝二十八昭帝一訖於孝平凡郡國一百三縣邑千三百一十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃師古曰提封者大舉其封疆也其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林澤羣不可墾其三千二百二十九萬九百四十七頃可墾不可墾定墾田宋祁曰可墾下越本無不可墾三字淳化本無不墾二字邵本無可字八百二十七萬五百三十六頃民户千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣凡民函五常之性師古曰函苞也讀與含同而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常師古曰好音呼到反惡音一故反隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂師古曰孝經載孔子之言言聖王在上統理人倫必移其本而易其末此混同天下壹之虖中和然後王教成也漢承百王之末國土變改民人遷徙成帝時劉向略言其地分宋祁曰地字景本作域丞相張禹使屬潁川朱贛條其風俗猶未宣究故輯而論之師古曰輯與集同終其本末著于篇秦地於天官東井輿鬼之分壄也其界自𢎞農故關以西}
