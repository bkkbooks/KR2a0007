  - {type: variant, offset: 116, length: 1, content: 因, krp: 都之秦更名廢丘高祖三年更名有黄山宮孝恵二年起莽曰槐治鄠古國有扈谷亭扈夏啟所伐酆水出東南又有潏水皆北過上林苑入渭有萯陽宫秦文王起師古曰潏音決萯音倍盩厔有長陽宮有射熊館秦昭王起靈軹渠武帝穿也斄周后稷所封師古曰讀與邰同音胎郁夷詩周道郁夷有汧水祠莽曰郁平師古曰小雅四牡之詩曰四牡騑騑周道倭遲韓詩作郁夷字言使臣乘馬行於此道羙陽禹貢岐山在}
  - {type: variant, offset: 118, length: 1, content: 攻, WYG: 北中水鄉周太王所邑有高泉宫秦宣太后起也郿成國渠首受渭東北至上林入蒙籠渠右輔都尉治師古曰郿音媚雍秦恵公都之有五畤太昊黄帝以下祠三百三所橐泉宮孝公起祈年宫恵公起棫陽宫昭王起有鐡官應劭曰四面積高曰雍師古曰棫音域漆水在縣西有鐡官莽曰漆治栒邑有􅃎鄉詩􅃎國公劉所都應劭曰左氏傳曰畢原鄷郇文之昭也郇侯賈伯伐晉是也臣瓚曰汲郡古文晉武公滅荀以賜大夫原氏黯是為荀叔又云文公城荀然則荀當在晉之境内不得在扶風界也今河東有荀城古荀國師古曰瓚説是也此栒讀與荀同自别邑耳非伐晉者隃麋有黄帝子祠莽曰扶亭師古曰隃音踰宋祁曰}
  - {type: variant, offset: 118, length: 1, content: 攻, krp: 北中水鄉周太王所邑有高泉宫秦宣太后起也郿成國渠首受渭東北至上林入蒙籠渠右輔都尉治師古曰郿音媚雍秦恵公都之有五畤太昊黄帝以下祠三百三所橐泉宮孝公起祈年宫恵公起棫陽宫昭王起有鐡官應劭曰四面積高曰雍師古曰棫音域漆水在縣西有鐡官莽曰漆治栒邑有豳鄉詩豳國公劉所都應劭曰左氏傳曰畢原鄷郇文之昭也郇侯賈伯伐晉是也臣瓚曰汲郡古文晉武公滅荀以賜大夫原氏黯是為荀叔又云文公城荀然則荀當在晉之境内不得在扶風界也今河東有荀城古荀國師古曰瓚説是也此栒讀與荀同自别邑耳非伐晉者隃麋有黄帝子祠莽曰扶亭師古曰隃音踰宋祁曰}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 本黄帝下無子字下同陳倉有上公眀星黄帝孫舜妻盲冡祠有羽陽官秦武王起也杜陽杜水南入渭莽曰通杜師古曰大雅綿之詩曰人之初生自土漆沮齊詩作自杜言公劉避狄而來居杜與漆沮之地宋祁曰詩作當作詩曰汧吴山在西古文以為汧山雍州山北有蒲谷鄉弦中谷雍州弦蒲藪汧水出西北入渭芮水出西北東入涇詩芮􅠵雍州川也師古曰􅠵讀與鞠同大雅公劉之詩曰止旅乃密芮鞠之即韓詩作芮􅠵言公劉止其軍旅欲使安静乃就芮􅠵之間耳好畤垝山在東有梁山宮秦始皇起莽曰好邑師古曰垝音丘毁反虢有黄帝子周文武祠虢宫秦宣太后起也安陵恵帝置莽曰嘉平師古曰闞駰以為本周之程邑也茂陵武帝置戸六萬一千八十七口二十七萬七千二百七十七莽曰宣城師古曰黄圖云本槐里之茂鄉宋祁曰宣下當添室字平陵昭帝置莽曰廣利武功太壹山古文以為終南垂山古文以為敦物皆在縣東斜水出衙領山北至郿入渭裦水亦出衙領至南鄭入沔有垂山斜水淮水祠三所莽曰新光師古曰斜音弋奢反衙音牙𢎞農郡武帝元鼎四年置莽曰右隊戸十一萬八千九十一口四十七萬五千九百五十四有鐡官在黽池縣十一𢎞農故秦函谷闗衙山領下谷爥水所出北入河盧氏熊耳山在東伊水出東北入雒過郡一行四百五十里又有育水南至順}
