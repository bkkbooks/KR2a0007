  - {type: variant, offset: 3379, length: 4931, content: 山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨大冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪靁霆失序相乘水旱饑蝝螽螟蠭午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師於貿戎伐其郊鄭傷桓王戎執其使衛侯朔召不往齊逆命而助朔五大夫爭權三君更立莫能正理遂至陵夷不能復興由此觀之和氣致祥乖氣致異祥多者其國安異眾者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午膠戾乖剌更相讒愬轉相是非傳授增加文書紛糾前後錯繆毀譽渾亂所以營或耳目感移心意不可勝載分曹為黨往往群朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權藉勢之人子弟鱗集於朝羽翼陰附者眾輻湊於前毀譽將必用以終乖離之咎是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶卻行而求及前人也初元以來六年矣案春秋六年之中災異未有稠如今者也夫有春秋之異無孔子之救猶不能解紛況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進則眾賢退群枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工驩兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂污辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎是以群小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍于群小小人成群誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅茹以其彙征吉在上則引其類在下則推其類故湯用伊尹不仁者遠而眾賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩歷周唐之所進以為法原秦魯之所消以為戒考祥應之福省災異之禍以揆當世之變於遠佞邪之黨壞散險詖之聚杜閉群枉之門廣開眾正之路決斷狐疑分別猶豫使是非炳然可知則百異消滅而眾祥並至太平之基萬世之利也臣幸得託肺附誠見陰陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以不宜宣泄臣謹重封昧死上恭顯見其書愈與許史比而怨更生等堪性公方自見孤立遂直道而不曲是歲夏寒日青無光恭顯及許史皆言堪猛用事之咎上內重堪又患眾口之寖潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光祿勳何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見眾人聞堪前與劉更生等謀毀骨肉以為當誅故臣前言堪不可誅傷為國養恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百戶勿令典事明主不失師傅之恩此最策之得者也上於是疑會城門校尉諸葛豐亦言堪猛短上因發怒免豐語在其傳又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令顯等專權日甚後三歲餘孝宣廟闕災其晦日有蝕之於是上召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明論議正直秉心有常發憤悃愊信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退卒不克明往者眾臣見異不務自修深惟其故而反晻昧說天託咎此人朕不得已出而試之以彰其材堪出之後大變仍臻眾亦嘿然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隱非所宜明意疑以類欲以陷之朕亦不取也朕迫于俗不得專心乃者天著大異朕甚懼焉今堪年衰歲暮恐不得自信排於異人將安究之哉其徵堪詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中顯幹尚書事尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒顯誣譖猛令自殺於公車更生傷之乃著疾讒擿要救危及世頌凡八篇依興古事悼己及同類也遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向向以故九卿召拜為中郎使領護三輔都水數奏封事遷光祿大夫是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權久之營起昌陵數年不成復還歸延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔高皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨廁意悽愴悲懷顧謂群臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟陰丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宮祈年館下樗里子葬於武庫皆無丘隴之處此聖帝明賢君智士遠覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其高可隱而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非苟為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相呂不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王皆大作丘隴多其瘞臧咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其高五十餘丈周回五里有餘石槨為游館人膏為燈燭水銀為江海黃金為鳧雁珍寶之臧機械之變棺槨之麗宮館之監不可勝原又多殺宮人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宮室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其臧槨自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧豎之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘隴彌高宮廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宮室小寢廟諸人美之斯干之詩是也上章道宮室之如制下章言子孫之眾多也及魯嚴公刻飾宗廟多築臺囿後嗣再絕春秋刺焉周宣如彼而昌魯秦如此而絕是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為高積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動陰陽因之以饑饉物故流離以十萬數臣甚惽焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不說以示眾庶則苦之若苟以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聽明疏達蓋世宜弘漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘隴說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之橅宜從公卿大臣之議以息眾庶書奏上甚感向言而不能從其計向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教由內及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子及采傳記行事著新序說苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然內嘉其言常嗟歎之時上無繼嗣政由王氏出災異浸甚向雅奇陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬絫世蒙漢厚恩身為宗室遺老歷事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫甯魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父甯殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹並專國政卒逐昭公周大夫尹氏筦朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗錄禍福如此類甚眾皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅勢上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢之言而秦復存二世委任趙高專權自恣壅蔽大臣終有閰樂望夷之禍秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂產呂祿席太后之寵據將相之位兼南北軍之眾擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宮之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門筦執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之說執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進遠絕宗室之任不令得給事朝省恐其與己分權數稱燕王蓋主以疑上心避諱呂霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也雖周皇甫秦穰侯漢武安呂霍上官之屬皆不及也物盛必有非常之變先見為其人微象孝昭帝時冠石立於泰山仆柳起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根臿地中雖立石起柳無以過此之明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁隸縱不為身奈宗廟何婦人內夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以安全之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜遠外戚毋授以政皆罷令就弟以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以襃睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不密則失臣臣不密則失身幾事不密則害成唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之以向為中壘校尉向為人簡易無威儀廉靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦元延中星孛東井蜀郡岷山崩雍江向惡此異語在五行志懷不能已復上奏其辭曰臣聞帝舜戒伯禹毋若丹朱敖周公戒成王毋若殷王紂詩曰殷監不遠在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二, WYG: ''}
  - {type: variant, offset: 3379, length: 4931, content: 山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨大冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪靁霆失序相乘水旱饑蝝螽螟蠭午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師於貿戎伐其郊鄭傷桓王戎執其使衛侯朔召不往齊逆命而助朔五大夫爭權三君更立莫能正理遂至陵夷不能復興由此觀之和氣致祥乖氣致異祥多者其國安異眾者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午膠戾乖剌更相讒愬轉相是非傳授增加文書紛糾前後錯繆毀譽渾亂所以營或耳目感移心意不可勝載分曹為黨往往群朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權藉勢之人子弟鱗集於朝羽翼陰附者眾輻湊於前毀譽將必用以終乖離之咎是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶卻行而求及前人也初元以來六年矣案春秋六年之中災異未有稠如今者也夫有春秋之異無孔子之救猶不能解紛況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進則眾賢退群枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工驩兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂污辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎是以群小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍于群小小人成群誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅茹以其彙征吉在上則引其類在下則推其類故湯用伊尹不仁者遠而眾賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩歷周唐之所進以為法原秦魯之所消以為戒考祥應之福省災異之禍以揆當世之變於遠佞邪之黨壞散險詖之聚杜閉群枉之門廣開眾正之路決斷狐疑分別猶豫使是非炳然可知則百異消滅而眾祥並至太平之基萬世之利也臣幸得託肺附誠見陰陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以不宜宣泄臣謹重封昧死上恭顯見其書愈與許史比而怨更生等堪性公方自見孤立遂直道而不曲是歲夏寒日青無光恭顯及許史皆言堪猛用事之咎上內重堪又患眾口之寖潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光祿勳何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見眾人聞堪前與劉更生等謀毀骨肉以為當誅故臣前言堪不可誅傷為國養恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百戶勿令典事明主不失師傅之恩此最策之得者也上於是疑會城門校尉諸葛豐亦言堪猛短上因發怒免豐語在其傳又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令顯等專權日甚後三歲餘孝宣廟闕災其晦日有蝕之於是上召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明論議正直秉心有常發憤悃愊信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退卒不克明往者眾臣見異不務自修深惟其故而反晻昧說天託咎此人朕不得已出而試之以彰其材堪出之後大變仍臻眾亦嘿然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隱非所宜明意疑以類欲以陷之朕亦不取也朕迫于俗不得專心乃者天著大異朕甚懼焉今堪年衰歲暮恐不得自信排於異人將安究之哉其徵堪詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中顯幹尚書事尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒顯誣譖猛令自殺於公車更生傷之乃著疾讒擿要救危及世頌凡八篇依興古事悼己及同類也遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向向以故九卿召拜為中郎使領護三輔都水數奏封事遷光祿大夫是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權久之營起昌陵數年不成復還歸延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔高皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨廁意悽愴悲懷顧謂群臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟陰丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宮祈年館下樗里子葬於武庫皆無丘隴之處此聖帝明賢君智士遠覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其高可隱而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非苟為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相呂不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王皆大作丘隴多其瘞臧咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其高五十餘丈周回五里有餘石槨為游館人膏為燈燭水銀為江海黃金為鳧雁珍寶之臧機械之變棺槨之麗宮館之監不可勝原又多殺宮人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宮室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其臧槨自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧豎之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘隴彌高宮廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宮室小寢廟諸人美之斯干之詩是也上章道宮室之如制下章言子孫之眾多也及魯嚴公刻飾宗廟多築臺囿後嗣再絕春秋刺焉周宣如彼而昌魯秦如此而絕是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為高積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動陰陽因之以饑饉物故流離以十萬數臣甚惽焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不說以示眾庶則苦之若苟以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聽明疏達蓋世宜弘漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘隴說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之橅宜從公卿大臣之議以息眾庶書奏上甚感向言而不能從其計向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教由內及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子及采傳記行事著新序說苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然內嘉其言常嗟歎之時上無繼嗣政由王氏出災異浸甚向雅奇陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬絫世蒙漢厚恩身為宗室遺老歷事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫甯魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父甯殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹並專國政卒逐昭公周大夫尹氏筦朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗錄禍福如此類甚眾皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅勢上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢之言而秦復存二世委任趙高專權自恣壅蔽大臣終有閰樂望夷之禍秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂產呂祿席太后之寵據將相之位兼南北軍之眾擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宮之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門筦執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之說執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進遠絕宗室之任不令得給事朝省恐其與己分權數稱燕王蓋主以疑上心避諱呂霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也雖周皇甫秦穰侯漢武安呂霍上官之屬皆不及也物盛必有非常之變先見為其人微象孝昭帝時冠石立於泰山仆柳起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根臿地中雖立石起柳無以過此之明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁隸縱不為身奈宗廟何婦人內夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以安全之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜遠外戚毋授以政皆罷令就弟以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以襃睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不密則失臣臣不密則失身幾事不密則害成唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之以向為中壘校尉向為人簡易無威儀廉靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦元延中星孛東井蜀郡岷山崩雍江向惡此異語在五行志懷不能已復上奏其辭曰臣聞帝舜戒伯禹毋若丹朱敖周公戒成王毋若殷王紂詩曰殷監不遠在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二, krp: ''}
