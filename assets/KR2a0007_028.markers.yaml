  - {type: punctuation, offset: 9362, content: 》, id: KR2a0007_tls_028-bkkpn2149}
  - {type: variant, offset: 9362, length: 5, content: 及毛詩逸禮, WYG: 桓十五年牟人來朝即此也蒙陰禹貢䝉山在西南有祠顓臾國在䝉山下莽曰䝉恩華莽曰翼隂寧陽侯國莽曰寧順椉丘師古曰春秋莊公十五年公敗宋師于乘丘即此是也富陽桃山侯國莽曰襄魯桃鄉侯國莽曰鄣亭式齊郡秦置莽曰濟南屬青州戸十五萬四千八百二十六口五十五萬四千四百四十四縣十二臨淄師尚父所封如水西北至梁鄒入泲有服官鐡官莽曰齊陵應劭曰齊獻公自營丘徙此臣瓚曰臨淄即營丘也故晏子曰始爽鳩氏居之逄伯陵居之太公居之又曰先君太公築營之丘今齊之城中有丘即營丘也師古曰瓚説是也築營之丘言於營丘地築城邑昌國徳會水西北至西安入如利莽曰利治西安莽曰東寧鉅定馬車瀆水首受鉅定東北至琅槐入海廣為山濁水所出東北至廣饒入鉅定廣饒昭南臨朐有逄山祠石膏山洋水所出東北至廣饒入鉅定莽曰監朐應劭曰臨朐山有伯氏駢邑師古曰朐音劬洋音祥北鄉侯國莽曰禺聚平廣侯國臺鄉北海郡景帝中二年置屬青州戸十二萬七千口五十九萬三千一百五十九縣二十六營陵或曰營丘莽曰北海亭應劭曰師尚父封於營丘陵亦丘也臣瓚曰營丘即臨淄也營陵春秋謂之緣陵師古曰臨淄營陵皆舊營丘地劇魁侯國莽曰上符安丘莽曰誅郅孟康曰今渠丘是瓡侯國莽曰道徳師古曰瓡即執字淳于應劭曰春秋州公如曹左氏傳曰淳于公如曹臣瓚曰州國名也淳于公國之所都益莽曰探陽平壽應劭曰故㘰㝷禹後今㘰城是也臣瓚曰㘰尋在河南不在此也汲郡}
