  - {type: punctuation, offset: 10331, content: 「, id: KR2a0007_tls_028-bkkpn2393}
  - {type: variant, offset: 10331, length: 0, content: '', WYG: 秦并天下以其地為閩中郡漢五年復立無諸為閩越王王閩中故地都冶即此冶縣沈約宋書州郡志曰建安太守本閩越秦立為閩中郡漢武世閩越反滅之徙其民於江淮間虚其地後有逃遁山谷者頗出立為冶縣屬會稽是其說也玩師古説知古本必作冶今改正丹陽郡丹陽楚之先熊繹所封王楙曰熊繹所封在南郡秭歸之丹陽漢志乃以宛陵之丹陽為楚所封誤矣蜀郡湔氐道江水所出東南至江都入海過郡七行二千六百六十里臣召南按里數大誤江為南紀巨川自蜀至海即以地形東西直計亦五六千里况水道紆曲乎所謂過郡七七字其上不有脱}
