  - {type: punctuation, offset: 9255, content: 《, id: KR2a0007_tls_028-bkkpn2126}
  - {type: variant, offset: 9255, length: 0, content: '', WYG: 莽曰眀義當塗侯國莽曰山聚應劭曰禹所娶塗山侯國也有禹虚鍾離莽曰蠶富應劭曰鍾離子國合肥應劭曰夏水岀父城東南至此與淮合故曰合肥東城莽曰武城博鄉侯國莽曰揚陸曲陽侯國莽曰延平亭應劭曰在淮曲之陽建陽全椒阜陵莽曰阜陸山陽郡故梁景帝中六年别為山陽國武帝建元五年别為郡莽曰鉅野屬兖州戸十七萬二千八百四十七口八十萬一千二百八十八有鐡官縣二十三昌邑武帝天漢四年更山陽為昌邑國有梁丘鄉春秋傳曰宋齊會于梁丘南平陽莽曰黽平孟康曰邾庶期以漆來奔又城漆今漆鄉是成武有楚丘亭齊桓公所城遷衛文公於此子成公徙濮陽莽曰成安湖陵禹貢浮于泗淮通于河水在南莽曰湖陸應劭曰尚書一名湖章帝封東平王蒼子為湖陵侯更名湖陵東緍師古曰春秋僖二十三年齊侯伐宋圍緍即謂此音旻方與晉灼曰音房豫橐莽曰高平臣瓚曰音拓鉅壄大壄澤在北兗州藪單父都尉治莽曰利父師古曰音善甫薄臣瓚曰湯所都都關城都侯國莽曰城榖黄侯國爰戚侯國莽曰戚亭郜成侯國莽曰告成宋祁曰郜當作卭中鄉侯國平樂侯國包水東北至泲入泗鄭侯國瑕丘應劭曰瑕丘在西南甾鄉侯國師古曰音側其反栗鄉侯國莽曰足亭曲鄉侯國西陽侯國濟陰郡故梁景帝中六年别為濟陰國宣帝甘露二年更名定陶禹貢荷澤在定陶東屬兗州師古曰荷音柯戸二十九萬二十五口百三十八萬六千二百七十八縣九定陶故曹國周武王弟叔振鐸所封禹貢陶丘在西南陶丘亭􅁈句莽改定陶曰濟平􅁈句縣曰濟平亭師古曰句音劬呂都莽曰祈都葭密師古曰葭音家成陽有堯冢靈臺禹貢雷澤在西北鄄城莽曰鄄良師古曰鄄音工椽反句陽應劭曰}
