  - {type: variant, offset: 9352, length: 6, content: 歆親近欲建立, WYG: 闡今闡亭是也師古曰酄音驩柴蓋臨樂子山洙水所出西北至蓋入池水又沂水南至下邳入泗過郡五行六百里青州􅐛師古曰蓋讀如本字又音古盍反洙音殊梁父師古曰以山名縣也父音甫東平陽南武陽冠石山治水所出南至下邳入泗過郡二行九百四十里莽曰桓宣應劭曰武水所出南入泗萊蕪原山甾水所出東至博昌入泲幽州􅐛又禹貢汶水出西南入泲汶水桑欽所言師古曰泲音子禮反鉅平有亭亭山祠應劭曰}
