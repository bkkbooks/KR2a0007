  - {type: variant, offset: 10408, length: 3, content: 言甚切, WYG: 字從木白石離水出西塞外東至枹罕入河莽曰順礫應劭曰白石山在東宋祁曰礫一本作樂河關積石山在西南𦍑中河水行塞外東北入塞内至章武入海過郡十六行九千四百里破羌宣帝神爵二年置安夷允街宣帝神爵二年置莽曰脩逺孟康曰允音鈆臨羌西北至塞外有西王母石室僊海鹽池北則湟水所出東至允吾入河西有須抵池有弱水昆侖山祠莽曰鹽羌師古曰闞駰云西有卑和羌即獻王莽地為西海郡者也抵音丁禮反天水郡武帝元鼎三年置莽曰填戎明帝改曰漢陽師古曰秦州地記云郡前湖水冬夏無増減因以名焉填音竹真反其後並同戸六萬三百七十口二十六萬一千三百四十八縣十六平襄莽曰平相師古曰闞駰云故襄戎邑也街泉戎邑道莽曰填戎亭望垣莽曰望亭罕开應劭曰音羌肩反師古曰本破罕开之羌處其人於此因以名云緜}
