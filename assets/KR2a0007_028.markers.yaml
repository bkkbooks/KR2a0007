  - {type: variant, offset: 9549, length: 217, content: 之罪道術由是遂滅漢興去聖帝明王遐遠仲尼之道又絕法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有它書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介冑武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出于屋壁朽折散絕今其書見在時師傳讀而已詩始萌牙天下眾書往往頗出皆諸子傳說猶廣立於學官為置博士在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱, WYG: ''}
