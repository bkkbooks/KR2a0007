  - {type: variant, offset: 9245, length: 2, content: 學者, WYG: 程師古曰洈音危繇讀曰由江夏郡高帝置屬荆州應劭曰沔水自江别至南郡華容為夏水過郡入江故曰江夏戸五萬六千八百四十四口二十一萬九千二百一十八縣十四西陵有雲夢宫莽曰江陽竟陵章山在東北古文以為内方山鄖鄉楚鄖公邑莽曰守平師古曰音云宋祁曰章山上當添丘字音云當作鄖音云西陽襄莽曰襄非邾衡山王吴芮都師古曰音朱又音誅􅋴故弦子國孟康曰音汏師古曰又音徒系反鄂師古曰音五各反安陸横尾山在東北古文以為陪尾山沙羡晉灼曰羡音夷蘄春晉灼曰音祁鄳蘇林曰音盲師古曰音萌又音莫耿反雲杜應劭曰左}
