  - {type: variant, offset: 10333, length: 0, content: '', WYG: 都郡武帝元鼎六年置莽曰樂平應劭曰故白馬氐羌戸五萬一千三百七十六口二十三萬五千五百六十縣九武都東漢水受氐道水一名沔過江夏謂}
