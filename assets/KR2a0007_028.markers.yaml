  - {type: variant, offset: 1732, length: 218, content: 南有枕中鴻寶苑秘書書言神僊使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書更生幼而讀誦以為奇獻之言黃金可成上令典尚方鑄作事費甚多方不驗上乃下更生吏吏劾更生鑄偽黃金繫當死更生兄陽城侯安民上書入國戶半贖更生罪上亦奇其材得踰冬減死論會初立穀梁春秋徵更生受穀梁講論五經於石渠復拜為郎中給事黃門遷散騎諫大夫給事中元帝初即位太傅蕭望之為前將軍少傅周堪為諸吏光祿大夫皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有, WYG: 過郡四}
