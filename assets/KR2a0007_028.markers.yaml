  - {type: variant, offset: 10315, length: 1, content: 何, krp: 訛水經注引此文云泡水東北至沛入泗是也濟陰郡秺注孟康曰音妒妒監本訛如從宋本改正勃海郡千童注宋祁曰千當作平臣召南按宋説非也自是千萬之千不當作平水經注可証平原郡樓虚臣召南按當作楊虚各本俱誤文帝封齊悼恵王子為楊虚侯後漢光武封馬武為楊虚侯即此縣也水經注可証濟南郡鄒臣召南按宋本監本及别本俱以鄒為一縣平䑓為一縣此大誤也鄒平故城在今鄒平縣北與騶縣屬魯國者不同臺縣即髙祖封功臣戴野為侯者與常山郡所屬之平臺縣宣帝封史元為侯者又不同也當以鄒平連寫泰山郡盖臨樂子山洙水所出西北至盖入池水臣召南按池水應作泗水水經注引此文云西北至盖入泗水或作池字字誤也觀此則酈道元以前夲已訛作入池水矣南武陽冠石山冶水所出按水經注冠石山洛水所出東萊郡曲成臣世駿按郊祀志作曲城孝武紀祀參山八神於曲城皆作曲城而後書郡國志}
