  - {type: variant, offset: 2192, length: 1172, content: 獨夫動亦已明矣且往者高皇帝時季布有罪至於夷滅後赦以為將軍高后孝文之間卒為名臣孝武帝時兒寬有重罪繫按道侯韓說諫曰前吾丘壽王死陛下至今恨之今殺寬後將復大恨矣上感其言遂貰寬復用之位至御史大夫御史大夫未有及寬者也又董仲舒私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興常有詔問仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗擊獄三年免為庶人宣帝復用勝至長信少府太子太傅名敢直言天下美之若乃群臣多此比類難一二記有過之臣無負國家有益天下此四臣者足以觀矣前弘恭奏望之等獄決三月地大震恭移病出後復視事天陰雨雪由是言之地動殆為恭等臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋玄成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍高許史氏侍中者毀離親戚欲退去之而獨專權為臣不忠幸不伏誅復蒙恩徵用不悔前過而教令人言變事誣罔不道更生坐免為庶人而望之亦坐使子上書自冤前事恭顯白令詣獄置對望之自殺天子甚悼恨之乃擢周堪為光祿勳堪弟子張猛光祿大夫給事中大見信任恭顯憚之數譖毀焉更生見堪猛在位幾己得復進懼其傾危乃上封事諫曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徵表為國欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也況重以骨肉之親又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報忠臣之義一杼愚意退就農畝死無所恨臣聞舜命九官濟濟相讓和之至也眾賢和於朝則萬物和於野故簫韶九成而鳳皇來儀擊石拊石百獸率舞四海之內靡不和寧及至周文開基西郊雜遝眾賢罔不肅和崇推讓之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和於內萬國驩於外故盡得其驩心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐麰釐麰麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方眾小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依君子獨處守正不橈眾枉勉彊以從王事則反見憎毒讒愬故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸當是之時日月薄蝕而無光其詩曰朔日辛卯日有蝕之亦孔之醜又曰彼月而微此日而微今此下民亦孔之哀又曰日月鞠凶不用其行四國無政不用其良天變見於上地變動於下水泉沸騰山谷易處其詩曰百川沸騰山冢卒崩高岸為谷深谷為陵哀今之人胡憯莫懲霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚眾大也此皆不和賢不肖易位之所致也自此之後天下大亂篡殺殃禍並作厲王奔彘幽王見殺至乎平王末年魯隱之始即位也周大夫祭伯乖離不和出奔於魯而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣諸侯背畔而不朝周室卑微二, WYG: ''}
