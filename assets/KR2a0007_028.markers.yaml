  - {type: variant, offset: 10285, length: 6, content: 然孝宣皇帝猶, WYG: 康曰鄨音鷩師古曰音不列反漏卧應劭曰故漏卧侯國平夷同竝應劭曰故同竝侯邑竝音伴談指􅀢温師古曰􅀢音於元反毋斂剛水東至潭中入潭莽曰有斂師古曰潭音大含反夜郎豚水東至廣􅉱都尉治莽曰同亭應劭曰故夜郎侯邑毋單師古曰毋讀與無同單音丹漏江西隨麋水西受徼外東至麊泠入尚龍谿過郡二行千一百六里都夢壺水東南至麊泠入尚龍谿過郡二行千一百六十里談槀師古曰槀音工老反進桑南部都尉治有闗句町文象水東至增食入􅉱又有盧唯水來細水伐水莽曰從化應劭曰故句町國師古曰音劬挺巴郡秦置屬益州應劭曰左氏巴子使韓服告楚戸十五萬八千六百四十二口七十萬八千一百四十八縣十一江州臨江莽曰監江枳如淳曰音徙或音抵師古曰音之爾反閬中彭道將池在南彭道魚池在西南師古曰閬音浪墊江孟康曰音重疊之疊朐忍容毋水所出南有橘官鹽官師古曰朐音劬安漢是魚池在南莽曰安新宕渠符特山在西南潛水西南入灊徐曹水出東北南入灊徐谷師古曰宕音徒浪反魚}
