  - {type: variant, offset: 892, length: 1, content: 薨, WYG: 晉合諸侯于狄泉以其地大成周之城居敬王莽曰宜陽師古曰魚豢云漢火徳忌水故云洛水而加佳如魚氏説則光武以後改為雒字也滎陽卞水馮池皆在西南有狼湯渠首受泲東南至陳入潁過郡四行七百八十里應劭曰故虢國今虢亭是也師古曰狼音浪湯音宕泲音}
