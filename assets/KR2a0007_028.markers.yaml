  - {type: variant, offset: 10329, length: 0, content: '', WYG: 汶水曰入維靈門之浯水横縣之乆台水折泉之折泉水並曰入淮實皆入濰水耳今俗猶呼此水為東淮河知自漢已然矣水經注引此志總曰入濰是也折泉折泉水北至莫入淮臣召南按漢無莫縣水經注引此文曰至箕縣北入濰然則莫字係箕字之訛也臨淮郡富陵莾曰􅻧虜􅻧音朔臣召南按􅻧音朔之上脱師古曰三字各本俱誤此顔注非班氏本文也會稽郡冶師古曰本閩越地臣召南按冶各本俱作治非也閩越}
