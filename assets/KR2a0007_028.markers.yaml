  - {type: variant, offset: 9350, length: 1, content: 義, WYG: 鄒土鼔於陵都尉治莽曰於陸陽丘般陽莽曰濟南亭應劭曰在般水之陽師古曰般音盤菅應劭曰音姦朝陽侯國莽曰脩治應劭曰在朝水之陽厯城有鐡官猇侯國莽曰利成應劭曰音箎蘇林曰音爻今東朝陽有猇亭蔡謩音由音鴞師古曰蔡音是音于虬反著師古曰音竹庶反又音直庶反而韋昭誤以為蓍龜之蓍字乃音弛咨反失之逺矣宜成侯國泰山郡高帝置屬兗州戸十七萬二千八十六口七十二萬六千六百四有工官汶水出萊毋西入濟師古曰汶音問毋與無同縣二十四奉高有眀堂在西南四里武帝元封二年造有工官博有泰山廟岱山在西北求山上茬應劭曰茬山在東北音淄師古曰又音仕疑反宋祁曰茬當作茌盧都尉治濟北王都也肥成應劭曰肥子國蛇丘隧鄉故隧國春秋曰齊人殲于隧也師古曰蛇音移隧音遂剛故闡莽曰柔應劭曰春秋秋取酄}
