  - {type: variant, offset: 9858, length: 4, content: 舊書多者, WYG: 以為嶧陽有鐡官莽曰閏儉應劭曰邳在薛其後徙此故曰下臣瓚曰有上邳故曰下邳也師古曰瓚説是良成侯國莽曰承翰師古曰左氏傳所謂晉侯會吴子于良即此是平曲莽曰平端戚鄭氏曰音憂戚朐秦始皇立石海上以為東門闕有鐡官開陽故鄅國莽曰厭虜師古曰鄅音禹厭音一渉反費故魯季氏邑都尉治莽曰順從師古曰音祕利成莽曰流泉海曲莽曰東海亭蘭祺侯國莽曰博睦繒故國禹後莽曰繒治南成侯國山鄉侯國建鄉侯國即丘莽曰就信孟康曰古祝丘祝其禹貢羽山在南鯀所殛莽曰猶亭臨沂厚丘莽曰祝其亭容丘侯國祠水東南至下邳入泗東安侯國莽曰業亭合鄉莽曰合聚承莽曰承治應劭曰音證建陽侯國莽曰建力曲陽莽曰從羊應劭曰在淮曲之陽司吾莽曰息吾應劭曰左傳吴執鍾吾子于鄉侯國平曲侯國莽曰端平都陽侯國應劭曰春秋齊人遷陽是陰平侯國郚鄉侯國莽曰徐亭師古曰郚音吾又音魚武陽侯國莽曰𢎞亭新陽侯國莽曰博聚建陵侯國莽曰付亭昌慮侯國莽曰慮聚師古曰慮音廬都平侯國臨淮郡武帝元狩六年置莽曰淮平戸}
