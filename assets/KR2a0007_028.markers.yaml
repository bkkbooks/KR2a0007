  - {type: variant, offset: 9259, length: 0, content: '', WYG: 句瀆之丘也師古曰音鉤秺莽曰萬嵗孟康曰音妒乘氏泗水東南至睢陵入淮過郡六行千一百一十里應劭曰春秋敗宋師于乘丘是也師古曰睢音雖沛郡故秦泗水郡高帝更名莽曰吾符屬豫州戸四十萬九千七十九口二百三萬四百八十縣三十七相莽曰吾符亭龍亢晉灼曰亢音岡竹莽曰篤亭李奇曰今竹邑榖陽應劭曰在穀水之陽蕭故蕭叔國宋别封附庸也向故國春秋曰莒人入向姜姓炎帝後師古曰音餉銍師古曰銍音竹乙反廣戚侯國莽曰力聚下蔡故州來國為楚所滅後吴取之至夫差遷昭侯於此後四世侯齊竟為楚所滅豐莽曰吾豐鄲莽曰單城孟康曰音多宋祁曰單當作留譙莽曰延成亭蘄鄉高祖破黥布都尉治莽曰蘄城師古曰音直恚反􅧾莽曰貢師古曰􅧾亦音貢輒與莽曰華樂山桑公丘侯國故滕國周懿王子錯叔繡所封三十一世為齊所滅師古曰左氏傳云郜雍曹滕}
  - {type: page-break, offset: 9259, content: '', id: KR2a0007_WYG_028-34a, image: WYG0249/WYG0249-0665a.png}
  - {type: variant, offset: 9259, length: 0, content: '', krp: 句瀆之丘也師古曰音鉤秺莽曰萬嵗孟康曰音妒乘氏泗水東南至睢陵入淮過郡六行千一百一十里應劭曰春秋敗宋師于乘丘是也師古曰睢音雖沛郡故秦泗水郡高帝更名莽曰吾符屬豫州戸四十萬九千七十九口二百三萬四百八十縣三十七相莽曰吾符亭龍亢晉灼曰亢音岡竹莽曰篤亭李奇曰今竹邑榖陽應劭曰在穀水之陽蕭故蕭叔國宋别封附庸也向故國春秋曰莒人入向姜姓炎帝後師古曰音餉銍師古曰銍音竹乙反廣戚侯國莽曰力聚下蔡故州來國為楚所滅後吴取之至夫差遷昭侯於此後四世侯齊竟為楚所滅豐莽曰吾豐鄲莽曰單城孟康曰音多宋祁曰單當作留譙莽曰延成亭蘄鄉高祖破黥布都尉治莽曰蘄城師古曰音直恚反􅧾莽曰貢師古曰􅧾亦音貢輒與莽曰華樂山桑公丘侯國故滕國周懿王子錯叔繡所封三十一世為齊所滅師古曰左氏傳云郜雍曹滕}
  - {type: variant, offset: 9260, length: 0, content: '', WYG: 之昭也系本亦云錯叔繡文王子而此志云懿王子未詳其義耳符離莽曰符合敬丘侯國應劭曰春秋遇于犬丘眀帝更名大丘夏丘莽曰歸思洨侯國垓下高祖破項羽莽曰育成應劭曰洨水所出南入淮師古曰洨音肴沛有鐡官芒莽曰博治應劭曰世祖更名臨雎雎水出焉師古曰芒音莫郎反睢音雖建成侯國城父夏肥水東南至下蔡入淮過郡二行六百二十里莽曰思善建平侯國莽曰田平酇莽曰贊治應劭曰音嵯師古曰此縣本為䣜應音是也中古}
  - {type: page-break, offset: 9260, content: '', id: KR2a0007_WYG_028-34b, image: WYG0249/WYG0249-0665b.png}
  - {type: variant, offset: 9260, length: 0, content: '', krp: 之昭也系本亦云錯叔繡文王子而此志云懿王子未詳其義耳符離莽曰符合敬丘侯國應劭曰春秋遇于犬丘眀帝更名大丘夏丘莽曰歸思洨侯國垓下高祖破項羽莽曰育成應劭曰洨水所出南入淮師古曰洨音肴沛有鐡官芒莽曰博治應劭曰世祖更名臨雎雎水出焉師古曰芒音莫郎反睢音雖建成侯國城父夏肥水東南至下蔡入淮過郡二行六百二十里莽曰思善建平侯國莽曰田平酇莽曰贊治應劭曰音嵯師古曰此縣本為䣜應音是也中古}
  - {type: variant, offset: 9261, length: 1, content: 解, WYG: 來借酇字為之耳讀皆為䣜而莽呼為贊治則此縣亦有贊音栗侯國莽曰成富扶陽侯國莽曰合治高侯國高柴侯國溧陽如淳曰溧音栗平阿侯國莽曰平寧東鄉臨都義成祁鄉侯國莽曰會穀魏郡高帝置莽曰魏城屬冀州戸二十一萬二千八百四十九口九十萬九千六百五十五縣十八鄴故大河在東北入海館陶河水别出為屯氏河東北至章武入海過郡四行千五百里斥丘莽曰利丘應劭曰斥丘在西南也師古曰闞駰云地多斥鹵故曰斥丘沙内黄清河水出南應劭曰春秋吴子晉侯會于黄池今黄澤在西陳留有外黄故加内云臣瓚曰國語曰吴子會諸侯於黄池掘溝於商魯之間今陳外黄有黄溝是也史記曰伐宋取黄池然則不得在魏郡眀矣師古曰瓚説是也應説失之清淵應劭曰清河在西北魏都尉治莽曰魏城亭應劭曰魏武侯别都繁陽應劭曰在繁水之陽張晏曰其界為繁淵元城應劭曰魏武侯公子元食邑於此因而遂氏焉梁期黎陽莽曰黎蒸晉灼曰黎山在其南河水}
