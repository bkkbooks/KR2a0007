  - {type: variant, offset: 10550, length: 1, content: 少, WYG: 曰香蘭平周鴻門有天封苑火井祠火從地出也藺宣武莽曰討貉千章增山有道西出眩雷塞北部都尉治師古曰眩音州縣之縣圜陽師古曰此縣在圁水之陽廣衍武車莽曰桓車虎猛西部都尉治離石穀羅澤在北饒莽曰饒衍方利莽曰廣德隰成莽曰慈平亭臨水莽曰監水土軍西都莽曰五原亭平陸陰山莽曰山寜觬是莽曰伏觬蘇林曰音麑師古曰觬音倪其字從角博陵莽曰助桓鹽官朔方郡武帝元朔二年開西部都尉治窳渾莽曰溝捜属并州師古曰窳音庾渾音魂戸三萬四千三百三十八口十三萬六千六百二十八縣十三封武帝元狩三年城朔方金連鹽澤青鹽澤皆在南莽曰武符脩都臨河莽曰監河呼遒師古曰遒音在由反窳渾有道西北出雞鹿塞屠申澤在東莽曰極武渠捜中部都尉治莽曰溝捜沃壄武帝元狩三年城有鹽官莽曰綏武廣牧東部都尉治莽曰鹽官臨戎武帝元朔五年城莽曰推武五原郡秦九原郡武帝元朔二年更名東部都尉治稒陽莽曰獲降属并州師古曰稒音固戸三萬九千三百二十二口二十三萬一千三百二十八縣十六九原莽曰成平固陵莽曰固調五原莽曰填河亭臨沃莽曰振武文國莽曰繁聚河陰蒲澤属國都尉治南興莽曰南利武都莽曰桓都宜梁曼柏莽曰延柏師古曰曼音萬成宜中部都尉治原高西部都尉治田辟有鹽官莽曰艾虜師古曰辟讀曰壁艾讀曰刈稒陽北出石門障得光禄城又西北得支就城又西北得頭曼城又西北得虖河城又西得宿虜城莽曰固隂師古曰曼音莫安反虖音呼莫䵣如淳曰音忉怛師古曰音丁葛反西安陽莽曰鄣安河目雲中郡秦置莽曰受降属并州戸三萬八千三百三口十七萬三千二百七十縣十一雲中莽曰逺服咸陽莽曰賁武陶林東部都尉治楨陵緣胡山在西北西部都尉治莽曰楨陸犢和沙陵莽曰希恩原陽沙南北輿中部都尉治師古曰闞駰云廣陵有輿故此加北武泉莽曰順泉陽壽莽曰常得定襄郡高帝置莽曰得降屬并州戸三萬八千五百五十九口十六萬三千一百四十四縣十二成樂桐過莽曰椅桐師古曰過音工禾反都武莽曰通徳武進白渠水出塞外西至沙陵入河西部都尉治莽曰伐蠻襄陰武臯荒干水出塞外西至沙陵入河中部都尉治莽曰永武駱莽曰遮要安陶莽曰迎符武城莽曰桓就武要東部都尉治莽曰厭胡師古曰厭音一葉反其下並同定襄莽曰著武復陸莽曰聞武師古曰復音服鴈門郡秦置句注山在隂館莽曰填狄属并州戸七萬三千一百三十八口二十九萬三千四百五十四縣十四善無莽曰陰館沃陽鹽澤在東北有長丞西部都尉治莽曰敬陽繁畤莽曰當要師古曰畤音止中陵莽曰遮害陰館樓煩鄉景帝後三年置累頭山治水所出東至泉州入海過郡六行千一百里莽曰富代師古曰累音力追反治音弋之反燕刺王傳作台字樓煩有鹽官應劭曰故樓煩胡地武州莽曰桓州陶孟康曰音注宋祁曰景夲作汪音枉劇陽莽曰善陽崞莽曰崞張孟康曰音郭平城東部都尉治莽曰平順埒莽曰填狄亭馬邑莽曰章昭師古曰晉太康地記云秦時建此城輒崩不成有馬周旋馳走反覆父老異之因依以築城遂名為馬邑彊陰諸聞澤在東北莽曰伏隂代郡秦置莽曰厭狄有五原關常山關屬幽州應劭曰故代國户五萬六千七百七十一口二十七萬八千七百五十四縣十八桑乾莽曰安徳孟康曰乾音干道人莽曰道仁師古曰夲有仙人逰其地因以為名當城師古曰闞駰云當桓都城故曰當城高栁西部都尉治馬城東部都尉治班氏秦地圖書班氏莽曰班副延陵狋氏莽曰狋聚孟康曰狋音權氏音精且如于延水出塞外東至寕入沽中部都尉治師古曰且音子如反沽音姑又音故平邑莽曰平胡陽原東安陽莽曰竟安師古曰闞駰云五原有安陽故此加東也參合平舒祁夷水北至桑乾入沽莽曰平葆代莽曰厭狄亭應劭曰故代國靈丘滱河東至文安入大河過郡五行九百四十里并州川應劭曰武靈王𦵏此因氏焉臣瓚曰靈邱之號在趙武靈王之前也師古曰瓚説是也滱音寇又音苦侯反其下並同廣昌淶水東南至容城入河過郡三行五百里并州􅐛莽曰廣屏師古曰淶音來鹵城虖池河東至參合入虖池别過郡九行千三百四十里并州川從河東至文安入海過郡六行千三百七十里莽曰魯盾師古曰虖音呼池音徒河反上谷郡秦置莽曰朔調屬幽州戸三萬六千八口十一萬七千七百六十二縣十五沮陽莽曰沮陰孟康曰音俎泉上莽曰塞泉潘莽曰樹武師古曰音普半反軍都溫餘水東至路南入沽居庸有關雊瞀孟康曰音句無師古曰雊音工豆反瞀音莫豆反夷輿莽曰朔調亭寧西部都尉治莽曰博康昌平莽曰長昌廣寧莽曰廣康涿鹿莽曰抪陸應劭曰黄帝}
