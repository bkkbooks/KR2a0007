  - {type: variant, offset: 10581, length: 0, content: '', krp: 樂屬徐州戸十二萬四千七百三十八宋祁曰十二邵本作十一口四十九萬七千八百四縣七彭城古彭祖國戸四萬一百九十六有鐵官留梧莽曰吾治傅陽故偪陽國莽曰輔陽師古曰偪音福左氏傳所云偪陽妘姓者也呂武原莽曰和樂亭甾丘莽曰善丘泗水國故東海郡武帝元鼎四年别為泗水國莽曰水順戸二萬五千二十五口十一萬九千一百一十四縣三淩莽曰生夌應劭曰淩水所出南入淮泗陽莽曰淮平亭于莽曰于屏廣陵國高帝六年屬荆國十一年更屬吳景帝四年更名江都武帝元狩三年更名廣陵莽曰江平屬徐州戸三萬六千七百七十三口十四萬七百二十二有鐵官縣四廣陵江都易王非廣陵厲王胥皆都此并得鄣郡而不得吳莽曰安定江都有江水祠渠水首受江北至射陽入湖高郵平安莽曰杜鄉六安國故楚高帝元年别為衡山國五年屬淮南文帝十六年復為衡山武帝元狩二年别為六安國莽曰安風戸三萬八千三百四十五口十七萬八千六百一十六縣五六故國臯繇後偃姓為楚所滅如谿水首受沘東北至夀春入芍陂師古曰沘音匕又音鄙芍音鵲蓼故國臯繇後為楚所滅安豐禹貢大别山在西南莽曰美豐安風莽曰安風亭陽泉長沙國秦郡高帝五年為國莽曰塡蠻屬荆州戸四萬三千四百七十口二十三萬五千八百二十五縣十三臨湘莽曰撫睦應劭曰湘水出零山羅應劭曰楚文王徙羅子自枝江居此師古曰盛𢎞之荆州記云縣北帯汨水水原出豫章艾縣界西流注湘㳂汨西北去縣三十里名為屈潭屈原自沉處連道益陽湘山在北應劭曰在益水之陽下雋莽曰閏雋師古曰雋音字兖反又音辭兖反攸音收酃孟康曰音鈴承陽應劭曰承水之陽師古曰承水原出零陵永昌縣界東流注湘也承音烝湘南禹貢衡山在東南荆州山昭陵茶陵泥水西入湘行七百里莽曰聲鄉師古曰茶音弋奢反又音丈加反容陵安成廬水東至廬陵入湖漢莽曰思成本秦京師為内史師古曰京師天子所都畿内也秦并天下改立郡縣而京畿所統特號内史言其在内以别於諸郡守也分天下作三十六郡漢興以其郡太大稍復開置又立諸侯王國武帝開廣三邊故自高祖増二十六文景各六宋祁曰各六越本作五十六武帝二十八昭帝一訖於孝平凡郡國一百三縣邑千三百一十四道三十二侯國二百四十一地東西九千三百二里南北萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃師古曰提封者大舉其封疆也其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林澤羣不可墾其三千二百二十九萬九百四十七頃可墾不可墾定墾田宋祁曰可墾下越本無不可墾三字淳化本無不墾二字邵本無可字八百二十七萬五百三十六頃民户千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣凡民函五常之性師古曰函苞也讀與含同而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常師古曰好音呼到反惡音一故反隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂師古曰孝經載孔子之言言聖王在上統理人倫必移其本而易其末此混同天下壹之虖中和然後王教成也漢承百王之末國土變改民人遷徙成帝時劉向略言其地分宋祁曰地字景本作域丞相張禹使屬潁川朱贛條其風俗猶未宣究故輯而論之師古曰輯與集同終其本末著于篇秦地於天官東井輿鬼之分壄也其界自𢎞農故關以西}
  - {type: variant, offset: 10583, length: 0, content: '', WYG: 扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂柯越巂益州皆宜屬焉秦之先曰柏益出自帝顓頊堯時助禹治水為舜朕虞飬育草木鳥獸賜姓嬴氏師古曰柏益一號伯翳盖翳益聲相近故也歴夏殷為諸侯至周有造父師古曰造音千到反父讀曰甫善馭習馬得華駵緑耳之乗師古曰華駵言其色如華之赤也緑耳耳緑也幸于穆王封于趙城故更為趙氏後有非子為周孝王飬馬汧渭之間孝王曰昔伯益知禽獸子孫不絶廼封為附庸邑之于秦宋祁曰秦晏本作粲今隴西秦亭秦谷是也至元孫氏為荘公師古曰氏與是同古通用字破西戎有其地子襄公時幽王為犬戎所敗平王東遷雒邑襄公將兵救周有功賜受􅑢酆之地列為諸侯師古曰􅑢亦岐字後八世穆公稱伯以河為竟師古曰伯讀曰霸竟讀曰境言其地界東至於河十餘世孝公用商君制轅田張晏曰周制三年一易以同美惡商鞅始割列田地開立阡陌令民各有常制孟康曰三年爰土易居古制也末世浸廢商鞅相秦復立爰田上田不易中田一易下田再易爰自在其田不復易居也食貨志曰自爰其處而已是也轅爰同開仟佰師古曰南北曰仟東西曰佰皆謂開田之疆畝也佰音莫白反東雄諸侯子惠公初稱王得上郡西河孫昭王開巴蜀滅周取九鼎昭王曾孫政并六國稱皇帝負力怙威燔書阬儒自任私智至子胡亥天下畔之故秦地於禹貢時跨雍梁二州詩風兼秦豳兩國昔后稷封斄師古曰斄讀曰邰今武功故城是也公劉處豳師古曰即今豳州栒邑是太王徙􅑢師古曰今岐山縣是文王作酆師古曰今長安西北界靈臺鄉豐水上是武王治鎬師古曰今昆明池北鎬陂是其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備師古曰謂七月之詩有鄠杜竹林南山檀柘號稱陸海為九州膏腴師古曰言其地高陸而饒物産如海之無所不出故云陸海腹之下肥曰腴故取喩云始皇之初鄭國穿渠引涇水溉田師古曰鄭國人姓名事具在溝洫志沃野千里師古曰沃即溉也言千里之地皆得溉灌民以富饒漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵師古曰訾讀與貲同高訾言多財也蓋亦以彊幹弱支非獨為奉山園也如淳曰黄圖謂陵冢為山師古曰謂京師為幹四方為支也是故五方雜厝晉灼曰厝古錯字風俗不純其世家則好禮文富人則商賈為利豪桀則游俠通姦瀕南山師古曰瀕猶邉瀕音頻又音賔近夏陽師古曰夏陽即河之西岸也今在同州韓城縣界多阻險輕薄易為盗賊常為天下劇又郡國輻湊浮食者多民去本就末列侯貴人車服僭上衆庶放效羞不相及師古曰放依也音甫往反嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近戎狄脩習戰備髙上氣力以射獵為先故秦詩曰在其板屋師古曰小戎之詩也言襄公出征則婦人居板室之中而念其君子又曰王于興師脩我甲兵與子偕行師古曰無衣之詩也言於王之興師則脩我甲兵而與子俱征伐也及車轔四臷小戎之篇皆言車馬田狩之事師古曰車轔美秦仲大有車馬其詩曰有車轔轔有馬白顛四臷美襄公田狩也其詩曰四臷孔阜六轡在手輶車鸞鏕載獫猲獢小戎美襄公􅊀兵甲討西戎其詩曰小戎俴收五楘梁輈文茵暢轂駕我騏馵龍盾之合鋈以觼軜轔音隣臷音耋輶音猶又音誘獫音力瞻反獢音許昭反俴音踐楘音木馵音注鋈音沃觼音玦軜音納宋祁曰載獫當作載斂漢興六郡良家子選給羽林期門如淳曰醫商賈百工不得豫也師古曰六郡謂隴西天水安定北地上郡西河羽林期門觧在百官公卿表以材力為官名將多出焉孔子曰君子有勇而亡誼則為亂小人有勇而亡誼則為盜師古曰論語載孔子對子路之言也故此數郡民俗質木不恥寇盜師古曰質木者無有文飾如木石然自武威以西本匈奴昆邪王休屠王地師古曰昆音下門反休音許蚪反屠音除武帝時攘之師古曰攘却也音人羊反初置四郡以通西域鬲絶南羌匈奴師古曰鬲與隔同其民或以關東下貧或以報怨過當師古曰過其本所殺或以誖逆亡道家屬徙焉師古曰誖亂也惑也音布内反習俗頗殊地廣民稀水屮宜畜牧師古曰屮古草字故涼州之畜為天下饒保邊塞二千石治之咸以兵馬為務酒禮之會上下通焉吏民相親是以其俗風雨時節穀糴常賤少盜賊有和氣之應賢於内郡此政寛厚吏不苛刻之所致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果實之饒師古曰疏菜也南賈滇僰滇僰僮師古曰言滇僰之地多出僮𨽻也滇音顛僰音蒲北反宋祁曰正文滇僰二字當删西近卭莋莋馬旄牛師古曰言卭莋之地出馬及旄牛莋音才各反宋祁曰正文莋莋當刪一莋字民食稻魚亡凶年憂俗不愁苦而輕易淫泆柔弱褊阸師古曰言其材質不彊而心忿陿景武閒文翁為蜀守敎民讀書法令未能篤信道徳反以好文刺譏貴慕權埶及司馬相如游宦京師諸侯以文辭顯於世鄉黨慕循其迹後有王襃嚴遵揚雄之徒師古曰遵即嚴君平文章冠天下繇文翁倡其敎相如為之師師古曰繇讀與由同倡始也音充向反故孔子曰有教亡類師古曰論語載孔子之言言人之性術在所教耳無種類武都地雜氐羌及犍為牂柯越巂皆西南外夷武帝初開置民俗略與巴蜀同而武都近天水俗頗似焉故秦地天下三分之一而人衆不過什三然量其富居什六秦豳吳札觀樂為之歌秦師古曰札吳王夀夢子也來聘魯而請觀周樂事見左氏傳襄二十九年曰此之謂夏聲師古曰夏中國夫能夏則大大之至也其周舊乎自井十度至栁三度謂之鶉首之次秦之分也魏地觜觿參之分野也師古曰觽音弋隨反其界自髙陵以東盡河東河内南有陳留及汝南之召陵㶏彊新汲西華長平師古曰召讀曰邵㶏音於靳反又音殷潁川之舞陽郾許傿陵師古曰郾音一扇反傿音偃河南之開封中牟陽武酸􅀥卷師古曰卷音去權反皆魏分也河内本殷之舊都周既滅殷分其畿内為三國詩風邶庸衞國是也師古曰自紂城而北謂之邶南謂之庸東謂之衞邶音歩内反字或作鄁庸字或作鄘鄁㠯封紂子武庚庸管叔}
