  - {type: variant, offset: 9864, length: 0, content: '', WYG: 六萬八千二百八十三口百二十三萬七千七百六十四宋祁曰口百二十邵本作百三十縣二十九徐故國盈姓至春秋時徐子章禹為楚所滅莽曰徐調劉奉世曰為吴所滅非楚也誤取慮師古曰取音趨又音秋慮音廬淮浦游水北入海莽曰淮敬應劭曰淮涯也盱眙都尉治莽曰武匡應劭曰音吁怡厹猶莽曰秉義師古曰厹音仇僮莽曰成信射陽莽曰監淮亭應劭曰在射水之陽開陽贅其師古曰贅音之鋭反高山應劭曰高山在東南雎陵莽曰雎陸師古曰雎音雖鹽瀆有鐡官淮陰莽曰嘉信淮陵莽曰淮陸下相莽曰從徳應劭曰相水出沛國故加下富陵莽曰􅻧虜􅻧音朔東陽播旌莽曰著信西平莽曰永聚高平侯國莽曰成丘開陵侯國莽曰成鄉昌陽侯國廣平侯國莽曰平寧蘭陽侯國莽曰建節襄平侯國莽曰相平海陵有江海會祠莽曰亭間輿莽曰羙徳堂邑有鐡官樂陵侯國會稽郡秦置高帝六年為荆國十二年更名吴景帝四年屬江都屬揚州劉敞曰景帝四年封江都王并得鄣郡而不得吴名曰江都然則會稽不得云屬江都戸二十二萬三千三十八口百三萬二千六百四縣二十六吴故國周大伯所邑具區澤在西揚州藪古文以為震澤南江在南東入海揚州川莽曰泰徳曲阿故雲陽莽曰風羙烏傷莽曰烏孝毗陵季札所居江在北東入海揚州川莽曰毗壇師古曰舊延陵漢改之}
