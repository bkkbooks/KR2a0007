  - {type: variant, offset: 9200, length: 1, content: 歆, WYG: 所云遷陰於下陰者也與酇相近今襄州有陰城縣縣有酇城鄉堵陽莽曰陽城韋昭曰堵音者雉衡山灃水所出東至􅪧入汝師古曰舊讀雉音弋爾反而太康地志云即陳倉人所逐二童子名寳雞者雄止陳倉為石雌止此縣故名雉縣疑不可據也􅪧音屋山都蔡陽莽之母功顯君邑應劭曰蔡水所出東入淮新野筑陽故穀伯國莽曰宜禾應劭曰筑水出漢中房陵東入沔師古曰春秋云穀伯綏來朝是也今襄州有穀城縣在筑水之陽筑音逐棘陽應劭曰在棘水之陽武當舞陰中隂山瀙水所出東至蔡入汝西鄂應劭曰江夏有鄂故加西云穰莽曰農穰師古曰今鄧州穰縣是也音人羊反酈育水出西北南入漢如淳曰酈音蹢躅之蹢劉奉世曰吴芮傳酈音郎益反此乃音蹢如音非也安衆侯國故宛西鄉冠軍武帝置故穰盧陽鄉宛臨駣聚應劭曰武帝以封霍去病去病仍出征匈奴功冠諸軍故曰冠軍駣音桃比陽應劭曰比水所出東入蔡平氏禹貢桐柏}
