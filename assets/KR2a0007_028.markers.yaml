  - {type: variant, offset: 6, length: 0, content: '', WYG: 也劉敞曰田中下而言厥賦貢乃第六明矣自孔氏固誤之宋祁曰正文厥字别本無賦貞師古曰貞正也州第九賦亦正當也作十有三年迺同師古曰治水十三年迺同於它州言用功多也厥貢漆絲師古曰貢獻也地宜漆林又善蠶絲故以獻也厥棐織文師古曰棐與篚同篚竹器筐屬也織文錦綺之類盛於筐篚而獻之浮于泲漯通于河師古曰浮以舟渡也泲漯二水名漯水出東郡東武陽因水入水曰通漯音它合反宋祁曰漯疑作濕註同海岱惟青州師古曰東北據海西南距岱岱即太山也嵎夷既畧惟甾其道師古曰嵎夷地名也即陽谷所在畧言用功少也惟甾二水名皆復故道也惟水出琅邪箕屋山甾水出泰山萊蕪縣惟字今作濰甾字或作淄古今通用也一曰道讀曰導導治也厥土白墳海瀕廣潟師古曰瀕水涯也潟鹵鹹之地瀕音頻又音濱潟音昔田上下賦中上師古曰田第三賦第四貢鹽絺海物惟錯師古曰葛之精者曰絺海中物産既多故雜獻宋祁曰獻下當添也字岱畎絲枲鈆松怪石師古曰畎小谷也枲麻屬也鈆青金也怪石石之次玉羙好者也言岱山之谷出絲枲鈆松怪石五種皆獻之畎音工犬反萊夷作牧厥棐檿絲師古曰萊山之夷地宜畜牧檿檿桑也食檿之蠶絲可以弦琴瑟檿音烏簟反劉敞曰貢絺絲不特言棐檿絲言棐而叙萊夷之下眀此萊夷之貢浮于汶逹于泲師古曰汶水出泰山郡萊蕪縣原山言渡汶水西逹于泲也汶音問海岱及淮惟徐州師古曰東至海北至岱南及淮淮沂其乂蒙羽其蓺師古曰淮沂二水已治蒙羽二山皆可種蓺也淮出大復山沂出泰山沂音牛依反大壄既豬東原底平師古曰大野即鉅野澤也豬停水也東原地名底致也言大野之水既已渟蓄也東原之地致功而平可耕稼也厥土赤埴墳草木漸包師古曰埴黏土也漸包言相漸及包裹而生田上中賦中中師古曰田第二賦第五貢土五色師古曰王者取五色土封以為太社而此州畢貢之言備有羽畎夏狄嶧陽孤桐師古曰羽畎羽山之谷也夏狄狄雉之羽可為旌旄者也羽山之谷出焉嶧陽嶧山之陽也山南曰陽孤桐特生之桐也可為琴瑟嶧山之南生焉嶧音驛泗瀕浮磬師古曰泗水之涯浮出好石可為磬也泗水出濟陰乘氏縣淮夷蠙珠臮魚師古曰淮夷淮水上之夷也蠙珠珠名臮及也言其地出珠及羙魚也蠙音歩千反字或作玭厥棐𤣥纖縞師古曰𤣥黑也纖細繒也縞鮮支也即今所謂素者也言獻黑細繒及鮮支也劉敞曰此棐亦屬淮夷浮于淮泗逹于河師古曰渡二水而入于河淮海惟揚州師古曰北據淮南距海彭蠡既豬陽鳥逌居師古曰彭蠡澤名在彭澤縣西北陽鳥隨陽之鳥也言彭蠡之水既已蓄聚則鴻鴈之屬所共居之蠡音禮三江既入震澤底定師古曰三江謂北江中江南江也震澤在吴西即具區也底致也言三江既入則震澤致定篠簜既敷師古曰篠小竹也簜大竹也敷謂布地而生也篠音先了反簜音蕩屮夭木喬師古曰夭盛貌也喬上竦也夭音於驕反喬音橋又音驕厥土塗泥師古曰瀸洳溼也田下下賦下上錯師古曰田第九賦第七又雜出諸品貢金三品師古曰金銀銅瑤瑻篠簜齒革羽毛師古曰瑤瑻皆羙玉名也齒象齒也革犀革也羽毛謂衆鳥之羽可為旄者也瑻音昆鳥夷卉服師古曰鳥夷東南之夷善捕鳥者也卉服絺葛之屬厥棐織貝師古曰織謂細布也貝水蟲也古以為貨劉敞曰予謂織貝特敘鳥夷之下明鳥夷之棐也緝貝為布如厚繒今亦有之貝木名也厥包橘柚錫貢師古曰柚似橘而大其味尤酸橘柚皆不耐寒故包裹而致之也錫貢者須錫命而獻之言不常來也柚音弋救反均江海通于淮泗師古曰均平也通淮泗而入江海故云平荆及衡陽惟荆州師古曰北據荆山南及衡山之陽也江漢朝宗于海師古曰江漢二水歸入于海有似諸侯朝於天子故曰朝宗宗尊也九江孔殷師古曰孔甚也殷中也言江水於此州界分為九道甚得地形之中沱􅈞既道雲夢土作乂師古曰沱􅈞二水名自江出為沱自漢出為􅈞雲夢澤名言二水既從其道則雲夢之土可為畎畝之治也沱音徒何反􅈞音潛一曰道讀曰導導治也厥土塗泥田下中賦上下師古曰田第八賦第三貢羽旄齒革金三品師古曰自金以上所貢與揚州同杶幹栝栢厲砥砮丹師古曰杶木似樗而實幹柘也栝木栢葉而松身厲磨也砥其尤細者也砮石名可為矢鏃丹赤石也所謂丹沙者也杶音丑倫反栝音古活反砥音指又音抵砮音奴惟箘簵楛三國底貢厥名師古曰箘簵竹名楛木名也皆可為天言此州界本有三國致貢斯物其名稱羙也箘音囷簵音路楛音怙包匭菁茅師古曰匭柙也菁菜也可以為葅茅可以縮酒苞其茅匭其菁而獻之匭音軌菁音精厥棐𤣥纁璣組師古曰𤣥黑色纁絳也璣珠之不圜者組綬類也纁音勲璣音機又音祈九江納錫大龜師古曰大龜尺有二寸出於九江錫命而納不常獻也浮于江沱􅈞漢逾于洛至于南河師古曰逾越也言渡四水而越洛乃至南河也南河在冀州南荆河惟豫州師古曰西南至荆山北距河水伊雒瀍澗既入于河師古曰伊出陸渾山雒出冢領山瀍出穀成山澗出黽池山四水皆入河滎波既豬師古曰滎沇水泆出所為也即今滎澤是也波亦水名言其水並已遏聚矣一説謂滎水之波道荷澤被盟豬師古曰荷澤在湖陵盟豬亦澤名在荷之東北言治荷澤之水衍溢則使被及盟豬不常入也道讀曰導荷音歌被音被馬之被盟音孟厥土惟壤下土墳壚師古曰高地則壤下地則墳壚謂土之剛黒者也音盧田中上賦錯上中師古曰田第四賦第二又雜出第一貢漆枲絺紵棐纖纊師古曰紵織紵為布及練也纖纊細綿也紵音佇纊音曠宋祁曰練淳化本作疎錫貢磬錯師古曰錯治玉之石磬錯言可以治磬也亦待錫命而貢宋祁曰注末貢下當添之字浮于洛入于河師古曰因洛入河也華陽黑水惟梁州師古曰東據華山之南西距黒水岷嶓既蓺沱􅈞既道師古曰岷岷山也嶓嶓冢山也言水已去二山之土皆可種蓺沱􅈞二水治從故道也岷音旻嶓音波道讀曰導宋祁曰岷疑作崏註同蔡蒙旅平和夷底績師古曰蔡蒙二山名旅陳也旅平言已平治而陳祭也和夷地名亦以致功可耕稼也厥土青黎師古曰色青而細疏田下上賦下中三錯師古曰田第七賦第八又雜出第七至第九凡三品貢璆鐡銀鏤砮磬師古曰璆羙玉也鏤剛鐡也磬磬石也璆音虯熊羆狐貍織皮師古曰織皮謂罽也言貢四獸之皮又貢雜罽西頃因桓是倈師古曰西頃山名在臨洮西南桓水名也言治西頃山因桓水是來無它道也頃讀曰傾浮于􅈞逾于沔師古曰漢上曰沔音莫踐反入於渭亂于河師古曰正絶流曰亂黑水西河惟雍州師古曰西據黑水東距西河西河即龍門之河也在冀州西故曰西河弱水既西師古曰治使西流至合黎涇屬渭汭師古曰屬逺也水北曰汭言治涇水入于渭也屬音之欲反汭音芮又音而悦反漆沮既從酆水逌同師古曰漆沮即馮翊之洛水也酆水出鄠之南山言漆沮既從入渭酆水亦來同也逌古攸字也攸所也沮音七余反荆岐既旅師古曰荆岐二山名荆在岐東言二山治畢已旅祭也終南惇物至于鳥鼠師古曰終南惇物二山皆在武功鳥鼠山在隴西首陽西南自終南西出至于鳥鼠也原隰底績至于豬壄師古曰高平曰原下溼曰隰豬壄地名言皆致功也三危既宅三苗丕叙師古曰三危山名已可居也三苗本有苗氏之族徙居於此分而為三故言三苗今皆大得其次叙厥土黄壤田上上賦中下師古曰田第一賦第六貢球琳琅玕師古曰球琳皆玉名琅玕石似珠者也球音求又音虬琳音林琅音郎玕音干浮于積石至于龍門西河師古曰積石山在金城西南龍門山在河東之西界皆河水所經會于渭汭師古曰逆流曰會自渭北涯逆水西上織皮昆崘析支渠叟西戎即叙師古曰昆崘析支渠叟三國名也言此諸國皆織皮毛各得其業而西方逺戎並就次叙也叟讀曰搜宋祁曰姚本各得其下添事字次字改作此道汧及岐至于荆山師古曰自此以下更説所治山水首尾之次也治山通水故舉山言之汧山在汧縣西道讀曰導後皆類此汧音苦堅反逾于河師古曰即梁山龍門壺口雷首至于太嶽師古曰自壺口雷首而至太嶽也雷首在河東蒲阪南太嶽即所謂嶽陽者底柱析城至于王屋師古曰底柱在陜縣東北山在河中形若柱也析城山在濩澤西南王屋山在垣縣東北太行恒山至于碣石入于海師古曰太行山在河内山陽西北恒山在上曲陽西北言二山連延東北接碣石而入于海行音胡郎反西傾朱圉鳥鼠至于太華師古曰朱圉山在漢陽冀縣南太華即今華陰山宋祁曰陰山姚本作陽山熊耳外方桐栢至于倍尾師古曰熊耳在陜東外方在潁川故縣即崇高也桐栢在平氏東南倍尾在安陸東北言四山相連也倍讀曰陪道嶓冡至于荆山師古曰嶓冡山在梁州南北荆山在南郡臨沮東北嶓音波内方至于大别師古曰内方在荆州大别在廬江安豐也崏山之陽至于衡山師古曰崏山在蜀郡湔氐西衡山在長沙湘南之東南崏山江所出衡山江所經過九江至于敷淺原師古曰敷淺原一名傅陽山在豫章歴陵南宋祁曰傅陽尚書注作博陽一本作溥陽道弱水至于合黎餘波入于流沙師古曰合黎山在酒泉流沙在燉煌西道黑水至于三危入于南海師古曰黒水出張掖雞山南流至燉煌過三危山又南流而入于南海道河積石至于龍門師古曰積石山在河闗西羌中龍門山在夏陽北言治河施功自積石起鑿山穿地以通其流至龍門山也南至于華陰東至于底柱師古曰自龍門南流以至華陰又折而東經底柱又東至于盟津師古曰盟讀曰孟孟津在洛陽之北都道所湊故號孟津孟長大也東過洛汭至于大伾師古曰洛汭洛入河處蓋今所謂洛口也山再重曰伾大伾山在成臯伾音平鄙反北過降水至于大陸師古曰降水在信都大陸在鉅鹿又北播為九河師古曰播布也同為逆河入于海師古曰同合也九河又合而為一名為逆河言相迎受也海即渤海是也宋祁曰迎改作逆嶓冡道漾東流為漢師古曰漾水出隴西氐道東流過武闗山南為漢禹治漾水自嶓冡始也漾音恙又東為滄浪之水師古曰出荆山東南流為滄浪之水即漁父所歌者也浪音琅過三澨至于大别師古曰三澨水在江夏竟陵澨音筮南入于江師古曰觸大别山而南入江也東匯澤為彭蠡師古曰匯迴也又東迴而為彭蠡澤也匯音胡賄反東為北江入于海師古曰自彭蠡江分為三遂為北江而入海崏山道江東别為沱師古曰别而出也江東南流沱東行也沱音徒何反又東至于醴師古曰醴水在荆州過九江至于東陵師古曰東陵地名東迆北會于匯師古曰迆溢也東溢分流都共北㑹彭蠡也迆音弋爾反東為中江入于海師古曰亦自彭蠡出道沇水東流為泲師古曰泉出王屋山名為沇流去乃為泲也沇音弋臠反宋祁曰沇音一作㳘入于河軼為滎師古曰軼與溢同言濟水入河並流而南截河又並流溢出乃為滎澤也一曰軼過也音逸東出于陶丘北師古曰陶丘丘再重也在濟隂定陶西南又東至于荷師古曰即荷澤又東北會於汶師古曰濟與汶合又北東入于海師古曰北折而東也道淮自桐栢東會于泗沂東入于海道渭自鳥鼠同穴東會于酆又東至于涇又東過漆沮入于河道洛自熊耳東北會于澗瀍又東會于伊又東北入于河九州逌同師古曰各以其所而同法四奥既宅師古曰奥讀曰墺謂土之可居者也宅亦居也言四方之土已可定居也墺音於六反九山栞旅師古曰九州之山皆已栞木通道而旅祭也九川滌原師古曰九州泉源皆已清滌無壅塞九澤既陂師古曰九州陂澤皆已遏障無決溢四海會同師古曰四海之内同會京師宋祁曰之内下姚本有皆字六府孔修師古曰水火金木土穀皆甚治庶土交正底慎財賦師古曰言衆土各以其所出交易有無而不失正致慎貨財以供貢賦咸則三壤成賦中國師古曰言皆隨其土地自上中下三品而成其賦於中國也中國京師也宋祁曰卲本其土地下自字作田錫土姓祗台徳先不距朕行師古曰台養也言封諸侯賜之土田因以為姓所敬養者惟徳為先故無距我之行也台音怡五百里甸服師古曰規方千里最近王城者為甸服則四面五百里也甸之為言田也主為王者治田百里賦内總師古曰自此以下説甸服之内以差言之也總禾槀總入也内讀曰納下皆類此二百里内銍師古曰銍謂所刈即禾穂也銍音窒三百里内戛服師古曰戛槀也言服者謂有役則服之耳戛音工黠反四百里粟五百里米師古曰精者納少麄者納多五百里侯服師古曰此次甸服之外方五百里也侯候也主斥候而服事也百里采師古曰又説侯服内之差次也采事也王事則供之不主一也二百里男國師古曰男之言任任王事者三百里諸侯師古曰三百里同主斥候故合而言之為一等五百里綏服師古曰此又次侯服外之五百里也綏安也言其安服王者政教三百里揆文教師古曰揆度王者文教而行之也三百里皆同二百里奮武衛師古曰奮其武力以衛王者二百里皆同五百里要服師古曰此又次綏服外之五百里也要以文教要來之也要音一遙反三百里夷師古曰夷易也言行平易之法也三百里皆同二百里蔡師古曰蔡法也遵刑法而已二百里皆同五百里荒服師古曰又次要服外五百里此五服之最在外者也荒言其荒忽各因本俗三百里蠻師古曰蠻謂以文徳蠻幕而覆之三百里皆同二百里流師古曰任其流移不考詰也二百里皆同劉敞曰予謂唐虞九州州方千里通三千里也要荒乃在九州外矣夷者言稍以夷禮通之於春秋譬杞莒也蔡讀如蔡蔡叔之蔡蠻者兼言蠻俗矣於春秋譬}
