  - {type: variant, offset: 10575, length: 0, content: '', krp: 陽故陽國是東安慮莽曰著善淮陽國高帝十一年置莽曰新平屬兖州孟康曰孝明帝更名陳國戸十三萬五千五百四十四口九十八萬一千四百二十三縣九陳故國舜後胡公所封為楚所滅楚頃襄王自郢徙此莽曰陳陵苦莽曰頼陵師古曰晉太康地記云城東有頼鄉祠老子所生地陽夏應劭曰夏音賈寧平扶溝渦水首受狼湯渠東至向入淮過郡三行千里師古曰狼音浪湯音徒浪反渦音戈又音𤓰固始師古曰本名寢丘楚令尹孫叔敖所封地圉新平柘梁國故秦碭郡高帝五年為梁國莽曰陳定屬豫州師古曰以有碭山故名碭郡戸三萬八千七百九口十萬六千七百五十二縣八碭山出文石莽曰節碭應劭曰碭山在東師古曰碭文石也其山出焉故以名縣碭音唐又音徒浪反甾故戴國莽曰嘉穀應劭曰章帝改曰考城杼秋莽曰予秋師古曰杼音食汝反蒙獲水首受甾獲渠東北至彭城入泗過郡五行五百五十里莽曰䝉恩己氏莽曰已善虞莽曰陳定亭下邑莽曰下洽雎陽故宋國㣲子所封禹貢盟諸澤在東北師古曰雎音雖東平國故梁國景帝}
  - {type: variant, offset: 10576, length: 4, content: 壘校尉羲, WYG: 六年别為濟東國武帝元鼎元年為大河郡宣帝甘露二年為東平國莽曰有鹽屬兖州戸十三萬一千七百五十三口六十萬七千九百七十六有鐵官縣七無鹽有郈鄉莽曰有鹽亭師古曰郈音后任城故任國太昊後風姓莽曰延就亭東平陸應劭曰古厥國今有厥亭是富城莽曰成富章亢父詩亭故詩國莽曰順父師古曰音抗甫樊魯國故秦薛郡高后元年為魯國屬豫州戸十一萬八千四十五口六十萬七千三百八十一縣六魯伯禽所封戸五萬二千有鐵官卞泗水西南至方與入沛過郡三行五百里青州川師古曰即春秋僖十七年夫人姜氏會齊侯于卞者也方與音房豫汶陽莽曰汶亭應劭曰詩曰汶水湯湯師古曰即左傳所云公賜季友汶陽之田者也蕃南梁水西至胡陵入沛渠應劭曰邾國也音皮師古曰白裒云陳蕃之子為魯相國人為諱改曰皮此説非也郡縣之名土俗各有别稱不必皆依本字騶故邾國曹姓二十九世為楚所滅嶧山在北莽曰騶亭應劭曰邾文公卜遷于嶧者也音驛薛夏車正奚仲所國後遷于邳湯相仲虺居之楚國高帝置宣帝地節元年更為彭城郡黄龍元年復故莽曰}
