  - {type: variant, offset: 9320, length: 0, content: '', WYG: 亦同桑中侯國靈壽中山桓公居此禹貢衛水出東北東入虖池蒲吾有鐡山大白渠水首受緜曼水東南至下曲陽入斯洨應劭曰蒲水出中山蒲隂東入河宋祁曰有鐡下或有北字上曲陽恒山北谷在西北有祠并州山禹貢恒水所出東入滱莽曰常山亭應劭曰滱音彄九門莽曰久門井陘應劭曰井陘山在南音刑房子贊皇山石濟水所出東至廮陶入泜莽曰多子師古曰濟音子詣反中丘逢山長谷諸水所出東至張邑入蜀莽曰直聚封斯侯國闗平棘應劭曰伐晉取棘蒲也師古曰功臣表棘蒲侯陳武平棘侯林摯是則平棘棘蒲非一地也應説失之宋祁曰林當作杜鄗高祖即位更名高邑莽曰禾成亭師古曰鄗音呼各反宋祁曰高祖當作世祖樂陽侯國莽曰暢苗平臺侯國莽曰順臺都鄉侯國有鐡官莽曰分郡宋祁曰郡當作鄉南行唐牛飲山白陸谷滋水所出東至新市入虖池水都尉治莽曰延億清河郡高帝置莽曰平河屬冀州戸二十萬一千七百七十四口八十七萬五千四百二十二縣十四清陽王都東武城繹幕應劭曰繹音亦師古曰本音弋尺反靈河水别出為鳴犢河東北至蓨入屯氏河莽曰播師古曰蓨音條其下亦同厝莽曰厝治應劭曰安帝以孝徳皇后葬于厝改曰甘陵也師古曰音趨亦反鄃莽曰善陸師古曰音輸貝丘都尉治應劭曰左氏}
