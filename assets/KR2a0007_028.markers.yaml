  - {type: variant, offset: 9250, length: 4, content: 而已及歆, krp: 淮南文帝十六年别為國金蘭西北有東陵鄉淮水出屬揚州廬江出陵陽東南北入江應劭曰故廬子國戸十二萬四千三百八十三口四十五萬七千三百三十三有樓船官縣十二舒故國莽白昆鄉居巢應劭曰春秋楚人圍巢巢國也龍舒應劭曰羣舒之邑臨湖雩婁決水北至蓼入淮又有灌水亦北至蓼入決過郡二行五百一十里師古曰雩音許于反婁音力于反襄安莽曰廬江亭也摐陽師古曰音七容反尋陽禹貢九江在南皆東合為大江灊天柱山在南有祠沘山沘水所出北至壽春入芍陂晉灼曰音濳師古曰沘音比又音布几反芍音酌又音鵲晥有鐡官師古曰音胡管反宋祁曰管當作綰湖陵邑北湖在南松兹侯國莽曰誦善九江郡秦置高帝四年更名為淮南國武帝元狩元年復故莽曰延平屬揚州應劭曰江自廬江尋陽分為九戸十五萬五十二口七十八萬五百二十五有陂官湖官縣十五壽春邑楚考烈王自陳徙此浚遒晉灼曰音酋熟之酋師古曰浚音峻遒音才由反成徳莽曰平阿橐臯孟康曰音拓姑陰陵莽曰陰陸厯陽都尉}
  - {type: punctuation, offset: 9252, content: ，, id: KR2a0007_tls_028-bkkpn2125}
