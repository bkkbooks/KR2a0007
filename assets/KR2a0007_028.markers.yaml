  - {type: variant, offset: 9204, length: 6, content: 時丞相史尹咸, WYG: 陽魯陽有魯山古魯縣御龍氏所遷魯山滍水所出東北至定陵入汝又有昆水東南至定陵入汝師古曰即淮南所云魯陽公與韓戰日反三舍者也滍音峙又音雉舂陵侯國故蔡陽白水郷上唐鄉故唐國師古曰漢記云元朔五年}
