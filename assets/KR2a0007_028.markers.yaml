  - {type: variant, offset: 10331, length: 0, content: '', krp: 秦并天下以其地為閩中郡漢五年復立無諸為閩越王王閩中故地都冶即此冶縣沈約宋書州郡志曰建安太守本閩越秦立為閩中郡漢武世閩越反滅之徙其民於江淮間虚其地後有逃遁山谷者頗出立為冶縣屬會稽是其說也玩師古説知古本必作冶今改正丹陽郡丹陽楚之先熊繹所封王楙曰熊繹所封在南郡秭歸之丹陽漢志乃以宛陵之丹陽為楚所封誤矣蜀郡湔氐道江水所出東南至江都入海過郡七行二千六百六十里臣召南按里數大誤江為南紀巨川自蜀至海即以地形東西直計亦五六千里况水道紆曲乎所謂過郡七七字其上不有脱}
  - {type: variant, offset: 10332, length: 0, content: '', WYG: 則字誤也且湘也漢也沅也皆入江之支水也漢由西縣東南至江州入江曰行二千七百六十里湘由零陵北至酃縣入江沅由故且蘭至益陽入江並曰行二千五百三十里以岷江之逺從西塞蟠折巴蜀襟帯荆揚其里數乃僅與沅湘埒反不如漢水之長乎此為轉寫脱誤灼然易暁又按宋本旄牛下班氏自注鮮水若水云云之外有劉奉世曰里數盖誤八字夫鮮若源出徼外里數難以測量疑此八字當注此條之下益州郡來唯勞水出徼外東至麊泠入南海臣召南按各本俱作麋泠又䍧柯郡西随麋水至麊泠入尚龍谿亦作麋泠誤也麊泠交趾郡之屬縣今改正前漢書卷二十八上考證欽定四庫全書前漢書卷二十八下漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注地理志第八下}
