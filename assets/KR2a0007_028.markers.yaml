  - {type: variant, offset: 458, length: 430, content: 為博士失官隨郢客歸復以為中大夫立四年薨子戊嗣文帝尊寵元王子生爵比皇子景帝即位以親親封元王寵子五人子禮為平陸侯富為休侯歲為沈猶侯埶為宛朐侯調為棘樂侯初元王敬禮申公等穆生不耆酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾臥申公白生強起之曰獨不念先王之德與今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諫不聽胥靡之衣之赭衣使杵臼雅舂於市休侯使人諫王王曰季父不吾與我起先取季父矣休侯懼乃與母太夫人奔京師二十一年春景帝之三年也削書到遂應吳王反其相張尚太傅趙夷吾諫不聽遂殺尚夷吾起兵會吳西攻梁破棘壁至昌邑南與漢將周亞夫戰漢絕吳楚糧道士饑吳王走戊自殺軍遂降漢漢已平吳楚景帝乃立宗正平陸侯禮為楚王奉元王後是為文王四年薨子安王道嗣, WYG: ''}
