  - {type: variant, offset: 9415, length: 0, content: '', WYG: 東萊又有此縣蓋各以所近為名也斯類非一曲成有參山萬里沙祠陽丘山治水所出南至沂入海有鹽官牟平莽曰望利東牟有鐡官鹽官莽曰𢎞徳㡉有百支萊王祠有鹽官師古曰㡉音堅育犁昌陽有鹽官莽曰夙敬亭不夜有成山日祠莽曰夙夜師古曰齊地記云古有日夜出見於東萊故萊子立此城以不夜為名當利有鹽官莽曰東萊亭盧鄉陽樂侯國莽曰延樂陽石莽曰識命徐鄉琅邪郡秦置莽曰填夷屬徐州師古曰填音竹人反戸二十二萬八千九百六十口一百七萬九千一百有鐡官縣五十一東武莽曰祥善不其有太一僊人祠九所及明堂武帝所起如淳曰其音基海曲有鹽官贛榆師古曰贛音紺榆音踰朱虚凡山丹水所出東北至壽光入海東泰山汶水所出東至安丘入維有}
