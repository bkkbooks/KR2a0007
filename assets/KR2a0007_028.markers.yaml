  - {type: variant, offset: 932, length: 0, content: '', WYG: 畜之東虢號曰獸牢苑陵莽曰左亭梁􅓆狐聚秦滅西周徙其君於此陽人聚秦滅東周徙其君於此應劭曰左傳曰秦取梁梁伯翳之後與秦同祖臣瓚曰秦取梁後改曰夏陽今馮翊夏陽是也此梁周之小邑見於春秋師古曰瓚説是也􅓆音乃旦反新鄭詩鄭國鄭桓公之子武公所國後為韓所滅韓自平陽徙都之應劭曰國語曰鄭桓公為周司徒王室將亂寄帑與賄於虢㑹之間幽王敗桓公死之其子武公與平王東遷洛邑遂伐虢會而并其地而邑於此東郡秦置莽曰治亭屬兖州戸四十萬一千二百九十七口百六十五萬九千二十八縣二十二濮陽衛成公自楚丘徙此故帝丘顓頊虚莽曰治亭應劭曰濮水南入鉅野師古曰虚讀曰墟畔觀莽曰觀治應劭曰夏}
