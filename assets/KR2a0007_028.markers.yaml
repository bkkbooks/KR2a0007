  - {type: variant, offset: 10541, length: 0, content: '', WYG: 治滿福莽曰紀德師古曰即今主土俗呼為健士者也隋室之初避皇太子諱因而遂改宋祁曰主土當刪主字成紀清水莽曰識睦奉㨗隴師古曰今呼隴城縣者也豲道騎都尉治密艾亭應劭曰豲戎邑也音桓蘭干莽曰蘭盾武威郡故匈奴休屠王地武帝太初四年開莽曰張掖師古曰休音許虯反屠音直閭反其後並同戸萬七千五百八十一口七萬六千四百一十九縣十姑臧南山谷水所出北至武威入海行七百九十里張掖武威休屠澤在東北古文以為豬壄澤休屠莽曰晏然都尉治熊水障北部都尉治休屠城揟次莽曰播徳孟康曰揟音子如反次音咨諸本作恣鸞鳥宋祁曰鳥邵本作烏樸􅯑莽曰敷虜孟康曰音蒲環媼圍蒼柗南山柗陜水所出北至揟次入海莽曰射楚師古曰柗古松字也陜音下夾反兩山之間也松陜陜名宣威張掖郡故匈奴昆邪王地武帝太初元年開莽曰設屏應劭曰張國臂掖故曰張掖也師古曰昆音胡門反戸二萬四千三百五十二口八萬八千七百三十一縣十觻得千金渠西至樂涫入澤中羌谷水出𦍑中東北至居延入海過郡二行二千二百里莽曰官式應劭曰觻得渠西入澤羌谷孟康曰觻音鹿師古曰孟音是也涫音官其下並同昭武莽曰渠武刪丹桑欽以為道弱水自此西至酒泉合黎莽曰貫虜氐池莽曰否武屋蘭莽曰傳武曰勒都尉治澤索谷莽曰勒治師古曰澤音鐸索音先各反驪靬莽曰揭虜李竒曰音遲䖍如淳曰音弓靬師古曰驪音力遲反靬音䖍是也今其土俗人呼驪靬疾言之曰力䖍掲音其謁反番和農都尉治莽曰羅虜如淳曰番音盤居延居延澤在東北古文以為流沙都尉治莽曰居成師古曰闞駰云武帝使伏波将軍路博徳築遮虜障於居延城顯美酒泉郡武帝太初元年開莽曰輔平應劭曰其水若酒故曰酒泉也師古曰舊俗傳云城下有金泉泉味如酒戸萬八千一百三十七口七萬六千七百二十六縣九祿福呼蠶水出南羌中東北至}
