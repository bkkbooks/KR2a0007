  - {type: variant, offset: 10631, length: 0, content: '', WYG: 漢臣召南按養當作漾前文引禹貢嶓冡道漾即其証也金城郡令居澗水出西北塞外按水經注澗水作閏水武威郡故匈奴休屠王地武帝太初四年開臣召南按孝武紀元狩二年秋匈奴昆邪王殺休屠王并殺其衆來降置五屬}
  - {type: page-break, offset: 10631, content: '', id: KR2a0007_WYG_028-115b, image: missing/missing}
  - {type: variant, offset: 10631, length: 0, content: '', krp: 漢臣召南按養當作漾前文引禹貢嶓冡道漾即其証也金城郡令居澗水出西北塞外按水經注澗水作閏水武威郡故匈奴休屠王地武帝太初四年開臣召南按孝武紀元狩二年秋匈奴昆邪王殺休屠王并殺其衆來降置五屬}
  - {type: variant, offset: 10632, length: 0, content: '', WYG: 以處之以其地為武威酒泉郡豈遲至太初四年乎志與紀自相矛盾自應以紀為實張掖郡故匈奴昆邪王地武帝太初元年開臣召南按孝武紀武威酒泉置于元狩二年至元鼎六年又分武威酒泉地置張掖敦煌俱不俟至太初年間也志於張掖酒泉並云太初元年開誤也酒泉與武威建郡同時張掖稍在其後如志所云武威之置反在張掖之後矣曰勒各本俱作曰勒按匈奴傳當作日勒敦煌郡武帝後元年分酒泉置臣召南按孝武紀敦煌與張掖並元鼎六年置又紀于太初元年書蝗從東方飛至敦煌則置郡久矣安定郡涇陽禹貢涇水所出涇水訛巠水今改正五原郡南興臣召南按水經注於雲中北輿縣曰五原有南輿故此加北据此則縣名南輿不名南興也各本俱誤代郡鹵城虖池河東至參合入虖池别臣召南按參合當是參戸之訛參戸勃海郡屬縣也故下文曰過郡九若其東至參合入虖池别同在一郡安得云過九郡乎且參合故城在北塞之外限隔重山既北至參合安能復南注勃海也又按虖池别見河間國弓髙下云虖池别河首受虖池河東至平舒入海平舒之上脱東字東平舒勃海郡屬縣也但曰平舒便疑向代郡之平舒矣漁陽郡白檀洫水出北蠻夷臣召南按水經注引此文云濡水是古本作濡字也然}
