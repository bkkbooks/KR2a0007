  - {type: variant, offset: 9410, length: 4, content: 唐虞既衰, WYG: 夏桀之居左河濟右太華伊闕在其南羊腸在其北河南城為值之又周書度邑篇曰武王問太公曰吾將因有夏之居南望過於三塗北瞻望於有河有夏之居即河南是也師古曰應氏止云㘰尋本是禹後耳何豫夏國之都乎瓚説非也㘰音斟劇侯國都昌有鹽官平望侯國莽曰所聚平的侯國師古曰的音丁歴反其字從白宋祁曰的當作旳從日柳泉侯國莽曰𢎞睦宋祁曰睦當作陸壽光有鹽官莽曰翼平亭應劭曰古㘰灌禹後今灌亭是樂望侯國饒侯國斟故國禹後桑犢覆甑山漑水所出東北至都昌入海師古曰溉音功代反平城侯國密鄉侯國羊石侯國樂都侯國莽曰㧞壟一作杖一作枝也宋祁曰南本樂都石鄉註皆無一作已下字石鄉侯國一作止鄉上鄉侯國新成侯國成鄉侯國莽曰石樂膠陽侯國東萊郡高帝置屬青州師古曰故萊子國也戸十萬三千二百九十二口五十萬二千六百九十三縣十七掖莽曰掖通腄有之罘山祠居上山聲洋丹水所出丹東北入海師古曰腄音直瑞反洋音祥平度莽曰利盧黄有萊山松林萊君祠莽曰意母臨朐有海水祠莽曰監朐師古曰齊郡已有臨朐}
