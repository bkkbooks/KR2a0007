  - {type: variant, offset: 10613, length: 2, content: 建平, WYG: 為郡云處近海多犀象毒冒珠璣銀銅果布之湊韋昭曰果謂龍眼離支之屬布葛布也師古曰毒音代冐音莫内反璣謂珠之不圓者也音祁又音機布謂諸雜細布皆是也中國往商賈者多取富焉番禺其一都會也自合浦徐聞南入海得大州東西南北方千里武帝元封}
