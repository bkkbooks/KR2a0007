  - {type: variant, offset: 946, length: 0, content: '', WYG: 族耳應説是也傿莽曰順通應劭曰鄭伯克叚於鄢是也師古曰鄢音偃長垣莽曰長固孟康曰春秋會于匡今匡城是平丘濟陽莽曰濟前浚儀故大梁魏恵王自安邑徙此雎水首受狼湯水東至取慮入泗過郡四行千三百六十里應劭曰魏恵王自安邑徙此號曰梁師古曰取慮縣名也音秋廬取又音趨潁川郡秦置高帝五年為韓國六年復故莽曰左隊陽翟有工官屬豫州孟康曰夏啓有鈞臺之饗今鈞臺在南戸四十三萬二千四百九十一口二百二十一萬九百七十三縣二十陽翟夏禹國周末韓景侯自新鄭徙此戸四萬一千六百五十口十萬九千莽曰潁川應劭曰夏禹都也臣瓚曰世本禹都陽城汲郡古文亦云居之不居陽翟也師古曰陽翟本禹所受封耳應瓚之説皆非昆陽應劭曰昆水出南陽潁陽應劭曰潁水出陽城定陵有東不羮莽曰定城師古曰羮音郎}
