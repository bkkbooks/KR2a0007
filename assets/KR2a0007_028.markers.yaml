  - {type: variant, offset: 9242, length: 0, content: '', WYG: 曰俞音踰樂成侯國博望侯國莽曰宜樂復陽侯國故湖陽樂鄉應劭曰在桐柏大復山之陽師古曰復音方目反宋祁曰方邵本作房南郡秦置高帝元年更為臨江郡五年復故景帝二年復為臨江中二年復故莽曰南順屬荆州戸十二萬五千五百七十九口七十一萬八千五百四十有發弩官師古曰主教放弩也縣十八江陵故楚郢都楚文王自丹陽徙此後九世平王城之後十世秦拔我郢徙東莽曰江陸臨沮禹貢南條荆山在東北漳水所出東至江陵入陽水陽水入沔行六百里應劭曰沮水出漢中房陵東入江師古曰沮水即左傳所云江漢沮漳楚之望也音千余反夷陵都尉治莽曰居利應劭曰夷山在西北華容雲夢澤在南荆州藪夏水首受江東入沔行五百里應劭曰春秋許遷于容城是宜城故鄢惠帝三年更名郢楚别邑故郢莽曰郢亭邔孟康曰音忌師古曰音其已反當陽中廬師古曰在襄陽縣南今猶有次廬村以隋室諱忠故改忠為次枝江故羅國江沱出西東入江師古曰沱即江别出者也音徒河反襄陽莽曰相陽應劭曰在襄水之陽編有雲夢宫莽曰南順孟康曰編音鞭秭歸歸鄉故歸國孟康曰秭音姊夷道莽曰江南應劭曰夷水出巫東入江宋祁曰巫}
