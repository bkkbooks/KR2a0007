  - {type: variant, offset: 116, length: 1, content: 因, WYG: 都之秦更名廢丘高祖三年更名有黄山宮孝恵二年起莽曰槐治鄠古國有扈谷亭扈夏啟所伐酆水出東南又有潏水皆北過上林苑入渭有萯陽宫秦文王起師古曰潏音決萯音倍盩厔有長陽宮有射熊館秦昭王起靈軹渠武帝穿也斄周后稷所封師古曰讀與邰同音胎郁夷詩周道郁夷有汧水祠莽曰郁平師古曰小雅四牡之詩曰四牡騑騑周道倭遲韓詩作郁夷字言使臣乘馬行於此道羙陽禹貢岐山在}
