  - {type: variant, offset: 9321, length: 1, content: 聞, krp: 齊襄公田于貝丘是信成張甲河首受屯氏别河東北至蓨入漳水􅟗題師古曰􅟗古莎字東陽侯國莽曰胥陵信鄉侯國孟康曰順帝更名安平繚師古曰音良笑反棗彊復陽莽曰樂嵗應劭曰音腹涿郡高帝置莽曰垣翰屬幽州戸十九萬五千六百七口七十八萬二千七百六十四有鐡官縣二十九涿桃水首受淶水分東至安次入河應劭曰涿水出上谷涿鹿縣師古曰淶音來逎莽曰逎屛師古曰逎古遒字音字由反榖丘故安閻鄉易水所出東至范陽入濡也并州䆮水亦至范陽入淶師古曰言易水又至范陽入淶也濡音乃官反南深澤范陽莽曰順陰應劭曰在范水}
  - {type: variant, offset: 9323, length: 0, content: '', WYG: 陽蠡吾師古曰蠡音禮容城莽曰深澤易廣望侯國鄭莽曰言符應劭曰音莫高陽莽曰高亭應劭曰在高河之陽州鄉侯國安平都尉治莽曰廣望亭樊輿侯國莽曰握符成侯國莽曰宜家良鄉侯國垣水南東至陽鄉入桃莽曰廣陽利鄉侯國莽曰章符臨鄉侯國益昌侯國莽曰有祑宋祁曰作有杖陽鄉侯國莽曰章武西鄉侯國莽曰移風饒陽應劭曰在饒河之陽中水應劭曰在易滱二水之間故曰中水武垣莽曰垣翰亭應劭曰垣水出良鄉東入桃阿陵莽曰阿陸阿武侯國高郭侯國莽曰廣隄新昌侯國勃海郡高帝置莽曰迎河屬幽州師古曰在勃海之濱因以為名戸二十五萬六千三百七十七口九十萬五千一百一十九縣二十六浮陽莽曰浮城陽信東光有胡蘇亭阜城莽曰吾城宋祁曰阜城南本作阜成千童應劭曰靈帝改曰饒安宋祁曰千當作平重合南皮莽曰迎河亭師古曰闞駰云章武有北皮亭故此云南定侯國章武有鹽官莽曰桓章中邑莽曰檢隂高成都尉治也高樂莽曰為鄉參戸侯國成平虖池河民曰徒駭河莽曰澤亭桞侯國臨樂侯國莽曰樂亭東平舒師古曰代郡有平舒故此加東重平安次脩市侯國莽曰居寧應劭曰音條文安景成侯國束州建成章鄉侯國蒲領侯國平原郡高帝置莽曰河平屬青州戸十五萬四千三百八十七口六十六萬四千五百四十三縣十九平原有篤馬河東北入海五百六十里鬲平當以為鬲津莽曰河平亭師古曰讀}
