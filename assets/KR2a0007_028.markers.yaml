  - {type: variant, offset: 185, length: 3, content: 既廢楚, WYG: 行過更名應劭曰今曲沃也秦改為左邑武帝於此聞南越破改曰聞喜濩澤禹貢析城山在西南應劭曰有濩澤在西北師古曰濩音烏虢反端氏臨汾垣禹貢}
  - {type: variant, offset: 185, length: 3, content: 既廢楚, krp: 行過更名應劭曰今曲沃也秦改為左邑武帝於此聞南越破改曰聞喜濩澤禹貢析城山在西南應劭曰有濩澤在西北師古曰濩音烏虢反端氏臨汾垣禹貢}
  - {type: variant, offset: 189, length: 0, content: '', WYG: 屋山在東北沇水所出東南至武徳入河軼出滎陽北地中又東至琅槐入海過郡九行千八百四十里師古曰琅音郎槐音回皮氏耿鄉故耿國晉獻公滅之以賜大夫趙夙後十世獻侯徙中牟有鐡官莽曰延平長脩平陽韓武子𤣥孫貞子居此有鐡官莽曰香平應劭曰堯都也在平河之陽襄陵有班氏鄉亭莽曰幹昌應劭曰襄陵在西北師古曰晉襄公之陵因以名縣彘霍大山在東冀州山周厲王所奔莽曰黄城應劭曰順帝改曰永安宋祁曰州山一本作代山楊莽曰有年亭應劭曰楊侯國北屈禹貢壺口山在東南莽曰朕北應劭曰有南故稱北臣瓚曰汲郡古文翟章救鄭次于南屈師古曰屈音居勿反即晉公子夷吾所居蒲子應劭曰故蒲反舊邑武帝置師古曰重耳所居也應説失之絳晉武公自曲沃徙此有鐡官應劭曰絳水出西南狐讘師古曰讘音之渉反騏侯國師古曰音其太原郡秦置有鹽官在晉陽屬幷州戸十六萬九千八百六十三口六十八萬四百八十八有家馬官臣瓚曰漢有家馬廐一廐萬匹時以邉表有事故分來在此家馬後改曰挏馬也師古曰挏音動縣二十一晉陽故詩唐國周成王滅唐封弟叔虞龍山在西北有鹽官晉水所出東入汾臣瓚曰所謂唐今河東永安是也去晉四百里師古曰瓚説是也葰人如淳曰音璅師古曰又音山寡反界休莽曰界羙師古曰休音許虬反榆次涂水鄉晉大夫知徐吾邑梗陽鄉魏戊邑莽曰太原亭師古曰涂音塗梗音鯁中都于離莽曰于合兹氏莽曰兹同狼孟莽曰狼調鄔九澤在北是為昭餘祁幷州藪晉大夫司馬彌牟邑師古曰音一戸反又音於據反盂晉大夫孟丙邑平陶莽曰多穰汾陽北山汾水所出西南至汾陰入河過郡二行千三百四十里冀州䆮京陵莽曰致城師古曰即九京陽曲應劭曰河千里一曲當其陽故曰陽曲也師古曰隋文帝自以姓楊故惡陽曲之號乃改此縣為陽直今則復舊名焉大陵有鐡官莽曰大寜原平祁晉大夫賈辛邑莽曰示上艾緜曼水東至蒲吾入虖池水師古曰虖音呼池音徒何反慮虒師古曰音廬夷陽邑莽曰繁穰廣武河主賈屋山在北都尉治莽曰}
