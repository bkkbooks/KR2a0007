  - {type: variant, offset: 6, length: 0, content: '', WYG: 十四淮南厲王長髙帝少子也其母故趙王張敖美人髙帝八年從東垣過趙趙王獻美人厲王母也幸有身趙王不敢内宫師古曰不敢更内之於宫中為築外宫舍之師古曰舍止也及貫高等謀反事覺并逮治王盡捕王母兄弟美人繫之河内厲王母亦繫告吏曰日得幸上有子師古曰日謂徃日吏以聞上方怒趙未及理厲王母厲王母弟趙兼因辟陽侯言吕后吕后姤不肯白辟陽侯不强爭厲王母已生厲王恚即自殺吏奉厲王詣上上悔師古曰悔不理其母令吕后母之而葬其母真定真定厲王母家縣也十一年淮南王布反上自將擊滅布即立子長為淮南王王早失母常附吕后孝惠吕后時以故得幸無患然常心怨辟陽侯不敢發及孝文初即位自以為最親師古曰時高帝子唯}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_044-1b, image: WYG0250/WYG0250-0075d.png}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_044-2a, image: WYG0250/WYG0250-0076a.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 十四淮南厲王長髙帝少子也其母故趙王張敖美人髙帝八年從東垣過趙趙王獻美人厲王母也幸有身趙王不敢内宫師古曰不敢更内之於宫中為築外宫舍之師古曰舍止也及貫高等謀反事覺并逮治王盡捕王母兄弟美人繫之河内厲王母亦繫告吏曰日得幸上有子師古曰日謂徃日吏以聞上方怒趙未及理厲王母厲王母弟趙兼因辟陽侯言吕后吕后姤不肯白辟陽侯不强爭厲王母已生厲王恚即自殺吏奉厲王詣上上悔師古曰悔不理其母令吕后母之而葬其母真定真定厲王母家縣也十一年淮南王布反上自將擊滅布即立子長為淮南王王早失母常附吕后孝惠吕后時以故得幸無患然常心怨辟陽侯不敢發及孝文初即位自以為最親師古曰時高帝子唯}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 人在驕蹇數不奉法師古曰蹇謂不順也上寛赦之三年入朝甚横師古曰横音胡孟反從上入苑獵與上同輦常謂上大兄厲王有材力力扛鼎師古曰扛舉也音江乃徃請辟陽侯辟陽侯出見之即自褏金椎椎之師古曰褏古袖字也謂以金椎藏置褏中出而椎之命從者刑之如淳曰刻其形體備五刑也師古曰直斷其首非五刑也事見史記馳詣闕下肉袒而謝曰臣母不當坐趙時事宋祁曰時字浙本添辟陽侯力能得之呂后不爭罪一也趙王如意子母無罪呂后殺之辟陽侯不爭罪二也呂后王諸呂欲以危劉氏辟陽侯不爭罪三也臣謹為天下誅賊報母之仇伏闕下請罪文帝傷其志為親故不治赦之當是時自薄太后及太子諸大臣皆憚厲王厲王以此歸國益恣不用漢法出入警蹕稱制自作法令數上書不遜順師古曰數音所角反文帝重自切責之如淳曰重難也時帝舅薄昭為將軍尊重上令昭予厲王書諫數之曰師古曰數音所具反竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也甚盛不可不察今大王所行不稱天資皇帝初即位易侯邑在淮南者晉灼曰侯邑在淮南者更易以它郡地封之不欲使錯在王國大王不肯皇帝卒易之師古曰卒終也使大王得三縣之實甚厚大王以未嘗與皇帝相見求入朝見未畢昆弟之歡師古曰畢盡也而殺列侯以自為名皇帝不使吏與其間師古曰與讀曰豫謂不令吏干豫治其事赦大王甚厚法二千石缺輙言漢補大王逐漢所置而請自置相二千石皇帝骫天下正法而許大王甚厚蘇林曰不從正法聽王自置二千石師古曰骫古委字骫謂曲也大王欲屬國為布衣守冡真定師古曰屬謂委棄之也音之欲反皇帝不許使大王毋失南面之尊甚厚師古曰毋失不失也南面之尊謂王位也大王宜日夜奉法度修貢職以稱皇帝之厚德今廼輕言恣行以負謗於天下甚非計也夫大王以千里為宅居以萬民為臣妾此高皇帝之厚德也高帝蒙霜露沬風雨師古曰沬亦頮字也䝉冒也沬洗面也音胡内反字從午未之未赴矢石野戰攻城身被創痍師古曰痍音夷以為子孫成萬世之業艱難危苦甚矣大王不思先帝之艱苦日夜怵惕脩身正行養犧牲豐潔粢盛奉祭祀以無忘先帝之功德而欲屬國為布衣甚過且夫貪讓國土之名輕廢先帝之業不可以言孝父為之基而不能守不賢不求守長陵而求之真定先母後父不誼數逆天子之令不順言節行以高兄無禮鄭氏曰淮南王呼帝為大兄也師古曰鄭説非也謂請守母冢自為名節而表異行用此矜高於兄耳幸臣有罪大者立斷小者肉刑不仁師古曰斷謂斬也貴布衣一劒之任賤王侯之位不知不好學問大道觸情妄行不祥師古曰任情意所欲則行之妄行行音下更反此八者危亡之路也而大王行之棄南面之位奮諸賁之勇應劭曰吳專諸衛孟賁也師古曰賁音奔常出入危亡之路臣之所見高皇帝之神必不廟食於大王之手明白昔者周公誅管叔放蔡叔以安周齊桓殺其弟以反國韋昭曰子糾兄也言弟者諱也秦始皇殺兩弟遷其母以安秦應劭曰始皇母與嫪毐私通生二子事覺誅毐并殺二弟遷其母於咸陽宫也頃王亡代高帝奪之國以便事應劭曰頃王高帝兄仲也匈奴入代不能守走歸京師高帝奪其國退為郃陽侯以便國法也師古曰便音頻面反濟北舉兵皇帝誅之以安漢應劭曰濟北王興居與大臣共誅諸呂自以功大怨其賞薄故反故周齊行之於古秦漢用之於今大王不察古今之所以安國便事而欲以親戚之意望於太上不可得也如淳曰太上天子也亡之諸侯游宦事人及舍匿者論皆有法師古曰舍匿謂容止而藏隱也其在王所吏主者坐師古曰言各有所主而坐其罪今諸侯子為吏者御史主如淳曰主御史也自此以下至縣令主皆謂王官屬為軍吏者中尉主客出入殿門者衞尉大行主諸從蠻夷來歸誼及以亡名數自占者内史縣令主相欲委下吏無與其禍不可得也師古曰言諸侯王之相欲委罪於在下小吏而身不干豫之不可得也與讀曰豫王若不改漢繫大王邸論相以下為之奈何夫墮父大業退為布衣所哀師古曰墮毁也布衣貧賤之人王既伏法則貧賤之人反哀憐之墮音火規反幸臣皆伏法而誅為天下笑以羞先帝之德師古曰羞辱也甚為大王不取也宜急改操易行上書謝罪曰臣不幸早失先帝少孤呂氏之世未嘗忘死服䖍曰常恐畏死也陛下即位臣怙恩德驕盈行多不軌師古曰軌法也追念辠過恐懼伏地待誅不敢起皇帝聞之必喜大王昆弟歡欣於上羣臣皆得延壽於下上下得宜海内常安願孰計而疾行之行之有疑禍如發矢不可追已師古曰發矢喻速也已語終辭王得書不説師古曰説讀曰悦六年令男子但等七十人與棘蒲侯柴武太子奇謀以輦車四十乘反谷口孟康曰谷口在長安北故縣也處多嶮阻師古曰輦車人輓行以載兵器也令人使閩越匈奴事覺治之廼使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事宋祁曰孝文三年馮敬為典客七年為御史大夫與宗正廷尉雜奏長廢先帝法不聽天子詔居處無度為黄屋蓋儗天子師古曰儗比也擅為法令不用漢法及所置吏以其郎中春為丞相收聚漢諸侯人及有罪亡者匿與居為治家室賜與財物爵禄田宅爵或至關内侯奉以二千石所不當得如淳曰賜亡畔來者如賜其國二千石也臣瓚曰奉畔者以二千石之秩禄也師古曰瓚説是也奉音扶用反大夫但張晏曰大夫姓也上云男子但明其本姓大夫也如淳曰但大夫名也師古曰既曰大夫但又士伍開章明其為大夫也上言男子但等者總謂反人耳不妨但為大夫也士伍開章等七十人如淳曰律有罪失官爵稱士伍也開章名與棘蒲侯太子奇謀反欲以危宗廟社稷謀使閩越及匈奴發其兵事覺長安尉奇等徃捕開章長匿不予與故中尉蕳忌謀殺以閉口師古曰姓蕳名忌蕳音姧嚴助傳作間字音同耳今流俗書本此蕳字或有作簡者非也蓋後人所改既殺開章所有口語皆無端緒故云閉口為棺椁衣衾葬之肥陵師古曰肥陵地名在肥水之上謾吏曰不知安在師古曰謾誑也實葬肥陵誑云不知處謾音慢又音莫連反此下亦同又陽聚土樹表其上曰開章死葬此下師古曰表者􅆆木為之若柱形也及長身自賊殺無罪者一人令吏論殺無罪者六人為亡命棄市宋祁曰舊本棄字下有之字詐捕命者以除罪晉灼曰亡命者當棄市而王藏之詐捕不命者而言命以脱命者之罪師古曰為音于偽反擅罪人無告劾繫治城旦以上十四人赦免罪人死罪十八人城旦舂以下五十八人賜人爵關内侯以下九十四人前日長病陛下心憂之使使者賜棗脯長不肯見拜使者南海民處廬江界中者反淮南吏卒擊之陛下遣使者齎帛五十匹以賜吏卒勞苦者長不欲受賜謾曰無勞苦者南海王織上書獻璧帛皇帝忌擅燔其書不以聞文穎曰忌蕳忌也吏請召治忌長不遣謾曰忌病長所犯不軌當棄市臣請論如法制曰朕不忍置法於王其與列侯吏二千石議列侯吏二千石臣嬰等四十三人議皆曰宜論如法制曰其赦長死罪廢勿王有司奏請處蜀嚴道卭郵張晏曰嚴道蜀郡縣也卭郵置名也師古曰郵行書之舍音尤遣其子子母從居師古曰子母者所生子之姬妾縣為築蓋家室皆日三食給薪菜鹽炊食器席蓐師古曰炊器釡鬲之屬食器盃椀之屬制曰食長給肉日五斤師古曰食音飤酒二斗令故美人材人得幸者十人從居師古曰上言子母則有子者令從之今此云美人材人則無子者亦令從之於是盡誅所與謀者廼遣長載以輜車師古曰輜衣車也音甾令縣次傳爰盎諫曰上素驕淮南王不為置嚴相傅以故至此且淮南王為人剛今暴摧折之臣恐其逄霧露病死陛下有殺弟之名奈何上曰吾特苦之耳令復之師古曰暫困苦之令其自悔即追還也復音扶目反淮南王謂侍者曰誰謂乃公勇者吾以驕不聞過故至此廼不食而死縣傳者不敢發車封孟康曰檻車有封也至雍師古曰雍扶風雍縣雍令發之以死聞上悲哭謂爰盎曰吾不從公言卒亡淮南王盎曰淮南王不可奈何願陛下自寛上曰為之奈何曰獨斬丞相御史以謝天下廼可上即令丞相御史逮諸縣傳淮南王不發封餽侍者師古曰逮追捕之也餽亦饋字耳皆棄市廼以列侯葬淮南王于雍置守冢三十家孝文八年憐淮南王王有子四人年皆七八歲廼封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯}
