  - {type: variant, offset: 4576, length: 0, content: '', WYG: 先告有反謀又告人與巳反而自得除反罪孝坐與王御婢姦及后徐來坐蠱前后乘舒及太子爽坐告王父不孝皆棄市諸坐與王謀反者皆誅國除為郡濟北貞王勃者景帝四年徙徙二年因前王衡山凡十四年薨子式王胡嗣五十三年薨宋祁曰三或作四子寛嗣十二年寛坐與父式王后光姬孝兒姦誖人倫師古曰誖亂也音布内反又祠祭祝詛上有司請誅上遣大鴻臚利召王王以刃自剄死國除為北安縣屬泰山郡贊曰詩云戎狄是膺荆舒是懲師古曰此魯頌閟宮之章也膺當也懲艾也荆楚也舒羣舒也言北有戎狄南有荊舒土俗强獷好為冦亂常須以兵膺當而懲艾也信哉是言也淮南衡山親為骨肉疆土千里列在諸侯不務遵蕃臣職以丞輔天子而剸懷邪辟之計師古曰剸與專同音之兖反謀為畔逆仍父子再亡國師古曰仍頻也各不終其身此非獨王也亦其俗薄臣下漸靡使然師古曰靡謂相隨從夫荆楚剽輕好作亂廼自古記之矣師古曰剽音匹妙反前漢書卷四十四前漢書卷四十四考證淮南厲王長傳命從者刑之顧炎武曰刑之史記作剄之當從剄音相近而譌下文太子自刑不殊又云王自刑殺史記亦皆作剄也臣召南按從者史記孝文本紀及淮南傳並作從者魏敬數上書不遜順云云臣召南按此文以下文帝令薄昭為書責厲王至王得書不悦皆史記所無而班氏増補之者也與宗正廷尉雜奏按史記作宗正臣逸廷尉臣賀備盜賊中尉臣福所不當得監本脱不字從史記增}
