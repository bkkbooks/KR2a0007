  - {type: variant, offset: 2135, length: 512, content: 夫數以酒失過丞相丞相今者又與夫有隙嬰曰事已解彊與俱酒酣蚡起為壽坐皆避席伏已嬰為壽獨故人避席餘半膝席夫行酒至蚡蚡膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也畢之時蚡不肯行酒次至臨汝侯灌賢賢方與程不識耳語又不避席夫無所發怒乃罵賢曰平生毀程不識不直一錢今日長者為壽乃效女曹兒呫囁耳語蚡謂夫曰程李俱東西宮衛尉今眾辱程將軍仲孺獨不為李將軍地乎夫曰今日斬頭穴匈何知程李坐乃起更衣稍稍去嬰去戲夫夫出蚡遂怒曰此吾驕灌夫罪也乃令騎留夫夫不得出藉福起為謝案夫項令謝夫愈怒不肯順蚡乃戲騎縛夫置傳舍召長史曰今日召宗室有詔劾灌夫罵坐不敬繫居室遂其前事遣吏分曹逐捕諸灌氏支屬皆得棄市罪嬰愧為資使賓客請莫能解蚡吏皆為耳目諸灌氏皆亡匿夫繫遂不得告言蚡陰事嬰銳為救夫嬰夫人諫曰灌將軍得罪丞相與太后家迕寧可救邪嬰曰侯自我得之自我捐之無所恨且終不令灌仲孺獨死嬰獨生乃匿其家竊出上書立召入具告言灌夫醉飽事不足誅上然之賜嬰食曰東朝廷辯之嬰東朝盛推夫善言其醉飽得過乃丞相以它事誣罪之蚡盛毀夫所為橫恣罪逆不道嬰度無可奈何因言蚡短蚡曰天下幸而安樂無事蚡得為肺附所好音樂狗馬田宅所愛倡優巧匠之屬不如魏其灌夫日夜招聚天下豪桀壯士與論議腹誹而心謗卬視天俛畫地辟睨兩宮間幸天下有變而欲有大, WYG: ''}
