  - {type: variant, offset: 4372, length: 0, content: '', WYG: 儀注吏四百石以下自除國中今以王之惡天子皆為置衡山王以此恚}
  - {type: variant, offset: 4372, length: 0, content: '', krp: 儀注吏四百石以下自除國中今以王之惡天子皆為置衡山王以此恚}
  - {type: variant, offset: 4373, length: 1, content: 匈, WYG: 奚慈張廣昌謀求能為兵法候星氣者日夜縱臾王謀反事如淳曰臾讀曰勇縱臾猶言勉强也師古曰縱音子勇反縱臾謂奬勸也后乘舒死立徐來為后厥姬俱幸兩人相妬厥姬乃惡徐來於太子師古曰惡謂讒毁之也下皆類此曰徐來使婢蠱殺太子母太子心怨徐來徐來兄至衡山太子與飲以刃刑傷之后以此怨太子數惡之於王女弟無采嫁棄歸師古曰為夫所棄而歸也與客姦太子數以數讓之師古曰上數音所角反下數音所具反無采怒不與太子通后聞之即善遇無采及孝孝少失母附后后以計愛之師古曰非心實慈念但以事計湏撫之與共毁太子王以故數繫笞太子元朔四年中人有賊傷后假母者師古曰繼母也一曰父之旁妻王疑太子使人傷之笞太子後王病太子時稱病不侍孝無采惡太子實不病自言有喜色王於是大怒欲廢太子而立弟孝后知王决廢太子又欲并廢孝后有侍者善舞王幸之后欲令與孝亂以汚之欲并廢二子而以己子廣代之太子知之念后數惡己無已時師古曰已止也數見讒譖無休止欲與亂以止其口后飲太子太子前為壽因據后股求與卧后怒以告王王廼召欲縛笞之太子知王常欲廢已而立孝廼謂王曰孝與王御者姦無采與}
