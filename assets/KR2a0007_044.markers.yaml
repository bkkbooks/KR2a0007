  - {type: variant, offset: 4371, length: 0, content: '', WYG: 安廢法度行邪辟師古曰辟讀曰僻下皆類此有詐偽心以亂天下營惑百姓師古曰營謂回繞之背畔宗廟妄作妖言春秋曰臣毋將將而誅安罪重於將謀反形已定臣端所見其書印圖及它逆亡道事驗明白當伏法論國吏二百石以上及比者師古曰謂真二百石及秩比二百石以上宗室近幸臣不在法中者不能相敎皆當免師古曰若本有重罪自從其法縱無反狀者亦皆免削爵為士伍毋得宦為吏其非吏它贖死金二斤八兩蘇林曰非吏故曰它師古曰為近幸之人非吏人者宋祁曰姚本正文非吏它字下有者字以章安之罪師古曰章明也使天下明知臣子之道毋敢復有邪僻背畔之意丞相𢎞廷尉湯等以聞上使宗正以符節治王未至安自刑殺后太子諸所與謀皆收夷國除為九江郡師古曰夷謂誅滅之衡山王賜后乘舒生子三人長男爽為太子次女無采少男孝姬徐來生子男女四人美人厥姬生子二人淮南衡山相責望禮節間不相能師古曰兄弟相責故有嫌衡山王聞淮南王作為畔逆具亦心結賓客以應之恐為所并元光六年入朝謁者衞慶有方術欲上書事天子王怒故劾慶死罪强榜服之師古曰榜擊也擊笞之令其自服死罪也榜音彭内史以為非是郤其獄師古曰卻退也音丘畧反王使人上書告内史内史治言王不直師古曰内史被治而具言王之意狀又數侵奪人田壞人冡以為田有司請逮治衡山王上不許為置吏二百石以上如淳曰}
