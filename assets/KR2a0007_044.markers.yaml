  - {type: variant, offset: 5123, length: 1238, content: 隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟累石為城樹榆為塞匈奴不敢飲馬於河置熢燧然後敢牧馬夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也臣故曰擊之便安國曰不然臣聞用兵者以飽待饑正治以待其亂定舍以待其勞故接兵覆眾伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽彊弩之末力不能入魯縞夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長敺難以為功從行則迫脅衡行則中絕疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也意者有它繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士陰伏而處以為之備審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絕其後單于可禽百全必取上曰善乃從恢議陰使聶壹為間亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信以為然而許之聶壹乃詐斬死罪囚縣其頭馬邑城下視單于使者為信曰馬邑長吏已死可急來於是單于穿塞將十萬騎入武州塞當是時漢伏兵車騎材官三十餘萬匿馬邑旁谷中衛尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍太中大夫李息為材官將軍御史大夫安國為護軍將軍諸將皆屬約單于入馬邑縱兵王恢李息別從代主支擊輜重於是單于入塞未至馬邑百餘里覺之還去語在匈奴傳塞下傳言單于已去漢兵追至塞度弗及王恢等皆罷兵上怒恢不出擊單于輜重也恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人眾不敵祗取辱固知還而斬然完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也上朝太后太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊猶頗可得以尉士大夫心今不誅恢無以謝天下於是恢聞乃自殺安國為人多大略知足以當世取舍而出於忠厚貪耆財利然所推舉皆廉士賢於己者於梁舉壺遂臧固至它皆天下名士士亦以此稱慕之唯天子以為國器安國為御史大夫五年丞相蚡薨安國行丞相事引墮車蹇上欲用安國為丞相使使視蹇甚乃更以平棘侯薛澤為丞相安國病免數月瘉復為中尉歲餘徙為衛尉而將軍衛青等擊匈奴破龍城明年匈奴大入邊語在青傳安國為材官將軍屯漁陽捕生口虜言匈奴遠去即上言方佃作時請且罷屯罷屯月餘匈奴大入上谷漁陽安國壁乃有七百餘人出與戰安國傷入壁匈奴虜略千餘人及畜產去上怒使使責讓安國徙益東屯右北平是時虜言當入東方安國始為御史大夫及護軍後稍下遷新壯將軍衛青等有功益貴安國既斥疏將屯又失亡多甚自媿幸得罷歸乃益東徙意忽忽不樂數月病歐血死壺遂與太史遷等定漢律曆官至詹事其人深中篤行君子上方倚欲以為相會其病卒贊曰竇嬰田蚡皆以外戚重灌夫用一時決策而各名顯並位卿相大業定矣然嬰不知時變夫亡術而不遜蚡負貴而驕溢凶德參會待時而發藉福區區其間惡能救斯敗哉以韓安國之見器臨其摯而顛墜陵夷以憂死遇合有命悲夫若王恢為兵首而受其咎豈命也虖, WYG: 考證}
