  - {type: variant, offset: 688, length: 1403, content: 丞相然惡人眾亦且毀君侯君侯能兼容則幸久不能今以毀去矣嬰不聽嬰蚡俱好儒術推轂趙綰為御史大夫王臧為郎中令迎魯申公欲設明堂令列侯就國除關以禮為服制以興太平舉讁諸竇宗室無行者除其屬藉諸外家為列侯列侯多尚公主皆不欲就國以故毀日至竇太后太后好黃老言而嬰蚡趙綰等務隆推儒術貶道家言是以竇太后滋不說二年御史大夫趙綰請毋奏事東宮竇太后大怒曰此欲復為新垣平邪乃罷逐趙綰王臧而免丞相嬰太尉蚡以柏至侯許昌為丞相武彊侯莊青翟為御史大夫嬰蚡以侯家居蚡雖不任職以王太后故親幸數言事多效士吏趨勢利者皆去嬰而歸蚡蚡日益橫六年竇太后崩丞相昌御史大夫青翟坐喪事不辦免上以蚡為丞相大司農韓安國為御史大夫天下士郡諸侯愈益附蚡蚡為人貌侵生貴甚又以為諸侯王多長上初即位富於春秋蚡以肺附為相非痛折節以禮屈之天下不肅當是時丞相入奏事語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏盡未吾亦欲除吏嘗請考工地益宅上怒曰遂取武庫是後乃退召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私橈由此滋驕治宅甲諸第田園極膏腴市買郡縣器物相屬於道前堂羅鐘鼓立曲旃後房婦女以百數諸奏珍物狗馬玩好不可勝數而嬰失竇太后益疏不用無勢諸公稍自引而怠驁唯灌夫獨否故嬰墨墨不得意而厚遇夫也灌夫字仲孺潁陰人也父張孟嘗為潁陰侯灌嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟吳楚反時潁陰侯灌嬰為將軍屬太尉請孟為校尉夫以千人與父俱孟年老潁陰侯彊請之鬱鬱不得意故戰常陷堅遂死吳軍中漢法父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父仇於是夫被甲持戟募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下所殺傷數十人不得前復還走漢壁亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死創少瘳又復請將軍曰吾益知吳壁曲折請復往將軍壯而義之恐亡夫乃言太尉太尉召固止之吳軍破夫以此名聞天下潁陰侯言夫夫為郎中將數歲坐法去家居長安中諸公莫不稱由是復為代相武帝即位以為淮陽天下郊勁兵處故徙夫為淮陽太守入為太僕二年夫與長樂衛尉竇甫飲輕重不得夫醉搏甫甫竇太后昆弟上恐太后誅夫徙夫為燕相數歲坐法免家居長安夫為人剛直使酒不好面諛貴戚諸勢在己之右欲必陵之士在己左愈貧賤尤益禮敬與鈞稠人廣眾薦寵下輩士亦以此多之夫不好文學喜任俠已然諾諸所與交通無非豪桀大猾家累數千萬食客日數十百人波池田園宗族賓客為權利橫潁川潁川兒歌之曰潁水清灌氏寧潁水濁灌氏族夫家居卿相侍中賓客益衰及竇嬰失勢亦欲倚夫引繩排根生平慕之後棄者夫亦得嬰通列侯宗室為名高兩人相為引重其游如父子然相得驩甚無厭恨相知之晚夫嘗有服過丞相蚡蚡從容曰吾欲與仲孺過魏其侯會仲孺有服夫曰將軍乃肯幸臨況魏其侯夫安敢以服為解請語魏其具將軍旦日蚤臨蚡許諾夫以語嬰嬰與夫人益市牛酒夜洒埽張具至旦平明令門下候司至日中蚡不來嬰謂夫曰丞相豈忘之哉夫不懌曰夫以服請不宜乃駕自往迎蚡蚡特前戲許夫殊無意往夫至門蚡尚臥也於是夫見曰將軍昨日幸許過魏其魏其夫妻治具至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言乃駕往往又徐行夫愈益怒及飲酒酣夫起舞屬蚡蚡不起夫徙坐語侵之嬰乃扶夫去謝蚡蚡卒飲至夜極驩而去後蚡使藉福請嬰城南田嬰大望曰老僕雖棄將軍雖貴寧可以勢相奪乎不許夫聞怒罵福福惡兩人有隙乃謾好謝蚡曰魏其老且死易忍且待之已而蚡聞嬰夫實怒不予亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可愛數頃田且灌夫何與也吾不敢復求田由此大怒元光四年春蚡言灌夫家在潁川橫甚民苦之請案之上曰此丞相事何請夫亦持蚡陰事為姦利受, WYG: ''}
