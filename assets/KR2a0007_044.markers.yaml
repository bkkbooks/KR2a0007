  - {type: variant, offset: 4654, length: 467, content: 備然匈奴侵盜不已者無它以不恐之故耳臣竊以為擊之便御史大夫安國曰不然臣聞高皇帝嘗圍於平城匈奴至者投鞍高如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗壹擁天下之精兵聚之廣武常谿然終無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂非故相反也各因世宜也且高帝身被堅執銳蒙霧露沐霜雪行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望此仁人之所隱也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也且自三代之盛夷狄不與正朔服色非威不能制彊弗能服也以為遠方絕地不牧之民不足煩中國也且匈奴輕疾悍亟之兵也至如猋風去如收電畜牧為業弧弓射獵逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其勢不相權也臣故曰勿擊便恢曰不然臣聞鳳鳥乘於風聖人因於時昔秦繆公都雍地方三百里知時宜之變攻取西戎辟地千里并國, WYG: 説前漢書卷四}
