  - {type: variant, offset: 4346, length: 2, content: 匈奴, WYG: 將軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠師古曰法冠御史冠也本楚王冠秦滅楚以其君冠賜御史欲如伍被計使人為得罪而西蘇林曰詐作得罪人而西也師古曰為得罪之狀而去也西謂如京師也事大將軍丞相一日發兵即刺大將軍衞青師古曰發兵謂王發兵反而説丞相𢎞下之如發䝉耳如淳曰以物䝉覆其頭而為發去之則其人欲之耳晉灼曰如發去物上之䝉直取其易也師古曰晉説是欲發國中兵恐相二千石不聽王廼與伍被謀為失火宮中相二千石救火因殺之又欲令人衣求盜衣師古曰求盜卒之掌逐捕賊盜者持羽檄從南方}
  - {type: page-break, offset: 4346, content: '', id: KR2a0007_WYG_044-15b, image: WYG0250/WYG0250-0082d.png}
  - {type: variant, offset: 4346, length: 2, content: 匈奴, krp: 將軍吏中二千石都官令丞印及旁近郡太守都尉印漢使節法冠師古曰法冠御史冠也本楚王冠秦滅楚以其君冠賜御史欲如伍被計使人為得罪而西蘇林曰詐作得罪人而西也師古曰為得罪之狀而去也西謂如京師也事大將軍丞相一日發兵即刺大將軍衞青師古曰發兵謂王發兵反而説丞相𢎞下之如發䝉耳如淳曰以物䝉覆其頭而為發去之則其人欲之耳晉灼曰如發去物上之䝉直取其易也師古曰晉説是欲發國中兵恐相二千石不聽王廼與伍被謀為失火宮中相二千石救火因殺之又欲令人衣求盜衣師古曰求盜卒之掌逐捕賊盜者持羽檄從南方}
  - {type: variant, offset: 4349, length: 3, content: 請和親, WYG: 師古曰羽檄徵兵之書也解在高紀呼言曰南越兵入師古曰呼音火故反欲因以發兵廼使人之廬江㑹稽為求盜未决廷尉以建辭連太子遷聞上遣廷尉監與淮南中尉逮捕太子至淮南王聞與太子謀召相二千石欲殺而發兵召相相至内史以出為解師古曰不應召而云已出也解者解説也若今言分疏矣中尉曰臣受詔使不得見王王念獨殺相而内史中尉不來無益也即罷相師古曰遣出去計猶與未决師古曰與讀曰豫太子念所坐者謀殺漢中尉所與謀殺者已死以為口絶乃謂王曰羣臣可用者皆前繫今無足以舉事者王以非時發恐無功臣願會逮師古曰㑹謂應逮書而徃也王亦愈欲休即許太子太子自刑不殊晉灼曰不殊不死也師古曰殊絶也雖自刑殺而身首不絶也伍被自詣吏具告與淮南王謀反吏因捕太子王后圍王宮盡捕王賓客在國中者索得反具以聞師古曰索捜也音山客反}
  - {type: page-break, offset: 4349, content: '', id: KR2a0007_WYG_044-16a, image: WYG0250/WYG0250-0083a.png}
