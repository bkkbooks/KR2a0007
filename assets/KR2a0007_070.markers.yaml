  - {type: 'tls:seg', offset: 9011, content: '', id: KR2a0007_tls_070-49a.92}
  - {type: variant, offset: 9014, length: 1, content: 憚, WYG: 察周書之意而忘帷盖之施庸臣遇湯卒從吏議師古曰以庸臣之禮待遇之也卒終也使百姓介然有秦民之恨師古曰介然猶耿耿非所以厲死難之臣也書奏天子出湯奪爵為士伍後數嵗西域都䕶叚㑹宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救師古曰西域城郭諸國及燉煌兵也丞相王商大將軍王鳳及百僚議數日不决鳳言湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不詘申湯入見有詔母拜示以㑹宗奏湯辭謝曰}
  - {type: page-break, offset: 9014, content: '', id: KR2a0007_WYG_070-21a, image: WYG0250/WYG0250-0483c.png}
  - {type: variant, offset: 9014, length: 1, content: 憚, krp: 察周書之意而忘帷盖之施庸臣遇湯卒從吏議師古曰以庸臣之禮待遇之也卒終也使百姓介然有秦民之恨師古曰介然猶耿耿非所以厲死難之臣也書奏天子出湯奪爵為士伍後數嵗西域都䕶叚㑹宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救師古曰西域城郭諸國及燉煌兵也丞相王商大將軍王鳳及百僚議數日不决鳳言湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不詘申湯入見有詔母拜示以㑹宗奏湯辭謝曰}
  - {type: punctuation, offset: 9017, content: ，, id: KR2a0007_tls_070-bkkpn1786}
  - {type: 'tls:seg', offset: 9017, content: '', id: KR2a0007_tls_070-49a.93}
  - {type: variant, offset: 9017, length: 0, content: '', WYG: 九卿皆賢材通明小臣罷癃不足以策大事師古曰罷讀曰疲上曰國家有急君其母讓對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵今圍㑹宗者人衆不足以勝㑹宗唯陛下勿憂且兵輕行五十里重行三十里今㑹宗欲發城郭燉煌歴時廼至所謂報讎之兵非救急之用也上曰奈何其觧可必乎度何時觧師古曰度音徒各反湯知烏孫瓦合不能久攻師古曰瓦合謂碎瓦之雜居不齊同故事不過數日師古曰故事謂以舊事測之因對曰已觧矣詘指計其日曰不出五日當有吉語聞師古曰吉善也善謂兵觧之事居四日軍書到言已觧大將軍鳳奏以為從事中郎莫府事壹决於湯湯明法令善因事為埶納説多從常受人金錢作章奏卒以此敗初湯與將作大匠觧萬年相善自元帝時渭陵不復徙民起邑成帝起初陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意師古曰可天子之意自致將作大匠及大司農中丞耿壽昌造杜陵賜爵闗内侯將作大匠乗馬延年以勞苦秩中二千石師古曰姓乘馬名延年乘音食孕反今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之卽上封事言初陵亰師之地最為肥美可立一縣天下民不徙諸陵三十餘嵗矣闗東富人益衆多規良田役使貧民師古曰規畫也自占為疆界也可徙初陵以彊亰師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙内郡國民萬年自詭三年可成師古曰詭責也自以為憂責也後卒不就師古曰卒終也就亦成也羣臣多言其不便者下有司議皆曰昌陵因卑為髙積土為山度便房猶在平地上師古曰度徒各反客土之中不保幽冥之靈淺外不固卒徒工庸以鉅萬數至㸐脂火夜作師古曰㸐古然字也取土東山且與榖同賈師古曰賈讀曰價作治數年天下徧被其勞國家罷敝府臧空虚師古曰罷讀曰疲下至衆庶熬熬苦之師古曰熬熬衆愁聲故陵因天性據真土處埶髙敞旁近祖考前又已有十年功緒師古曰緒謂端次也宜還復故陵勿徙民上廼下詔罷昌陵語在成紀丞相御史請廢昌陵邑中室師古曰徙人新所起室居奏未下人以問湯第宅不徹得毋復發徙師古曰問其不被發徹更移徙邪湯曰縣官且順聽羣臣言猶且復發徙之也時成都侯商新為大司馬衛將軍輔政素不善湯商聞此語白湯惑衆下獄治按騐諸所犯湯前為騎都尉王莽上書言父早死獨不封母明君共養皇太后尤勞苦師古曰莽傳言莽母渠今此云明君則明君者字也宜封竟為新都侯後皇太后同母弟茍參為水衡都尉死子伋為侍中師古曰伋音汲參妻欲為伋求封湯受其金五十斤許為求比上奏師古曰比例也音必寐反𢎞農太守張匡坐臧百萬以上狡猾不道有詔即訊師古曰就其所居考問之恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬皆此類也事在赦前後東萊郡黒龍冬出人以問湯湯曰是所謂𤣥門開㣲行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑衆不道妄稱詐歸異於上非所宜言大不敬廷尉増壽議以為不道無正法晋灼曰増夀姓趙也以所犯劇易為罪師古曰易音弋豉反臣下承用失其中故移獄廷尉如淳曰如今讞罪輕重無比者先以聞師古曰比謂相比附也所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民已申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑衆湯稱詐虛設不然之事非所宜言大不敬也制曰廷尉増壽當是師古曰當謂處正其罪也湯前有討郅支單于功其免湯為庶人徙邉又曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩繇役興卒暴之作師古曰卒讀曰猝卒徒䝉辜死者連屬師古曰䝉被也屬之欲反毒流衆庶海内怨望雖䝉赦令不宜居亰師於是湯與萬年俱徙燉煌久之燉煌太守奏湯前親}
