  - {type: variant, offset: 1041, length: 7, content: 後廣漢心知微指, WYG: 無子國除元始中録功臣不以罪絶者封吉曾孫永為安逺侯甘延壽字君况北地郁郅人也少以良家子善騎射為羽林投石㧞距絶於等倫應劭曰投石以石投人也㧞距即下超踰羽林亭樓是也張晏曰范蠡兵法飛石重十二斤為機}
