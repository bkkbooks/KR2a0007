  - {type: variant, offset: 8664, length: 263, content: 黨震壞渠率效首賊亂蠲除民反農業拊循貧弱鉏耘豪彊長安宿豪大猾東市賈萬城西萬章翦張禁酒趙放杜陵楊章等皆通邪結黨挾養姦軌上干王法下亂吏治并兼役使侵漁小民為百姓豺狼更數二千石二十年莫能禽討尊以正法案誅皆伏其辜姦邪銷釋吏民說服尊撥劇整亂誅暴禁邪皆前所稀有名將所不及雖拜為真未有殊絕襃賞加於尊身今御史大夫奏尊傷害陰陽為國家憂無承用詔書之意靖言庸違象龔滔天原其所以出御史丞楊輔故為尊書佐素行陰賊惡口不信好以刀筆陷人於法輔常醉過尊大奴利家利家捽搏其頰兄子閎拔刀欲剄之輔以故深怨疾毒欲傷害尊疑輔內懷怨恨外依公事建畫為此議傅致奏文浸潤加誣以復私怨, WYG: 辟}
