  - {type: variant, offset: 1055, length: 1, content: 俱, WYG: 漢軍相及頗宼盗後重師古曰重謂輜重也音直用反湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為宼師古曰勿抄掠閒呼其貴人屠墨見之師古曰閒謂宻呼也諭以威信與飲盟遣去徑引行未}
