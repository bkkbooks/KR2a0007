  - {type: variant, offset: 1035, length: 0, content: '', WYG: 利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道師古曰鄯音善神爵中匈奴乖亂日逐王先賢撣欲降}
