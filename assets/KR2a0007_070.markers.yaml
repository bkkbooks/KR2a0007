  - {type: variant, offset: 1049, length: 0, content: '', WYG: 行三百歩延壽有力䏻以手投之㧞距超距也師古曰投石應説是也㧞距者有人連坐相把據地距以為堅而䏻㧞取之皆言其有手掣之力超踰亭樓又言其趫捷耳非㧞距也今人猶有㧞爪之戲盖㧞距之遺法宋祁曰注文堅字疑作掔字掣字疑作擥字嘗超踰羽林亭樓由是遷為郎試弁為期門孟康曰弁手搏宋祁曰注末當有也字以材力愛幸稍遷至遼東太守免官車騎將軍許嘉薦延壽為郎中諫大夫使西域都䕶騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯侯傳國至曾孫王莽敗廼絶陳湯字子公山陽瑕丘人也少好書博逹善屬文師古曰屬音之欲反家貧匄貣無節不為州里所稱師古曰匄乞也貣音吐得反西至}
