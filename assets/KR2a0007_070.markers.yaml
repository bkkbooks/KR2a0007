  - {type: variant, offset: 7816, length: 1, content: 崩, WYG: 内嘉延壽湯功而重違衡顯之議師古曰重難也議久不决故宗正劉向上疏曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毁重羣臣皆閔焉師古曰閔病也陛下赫然欲誅之意未嘗有忘西域都䕶延壽副校尉湯承聖指倚神靈總百蠻之君㩜城郭之兵師古曰㩜總持之也其字從手出百死入絶域遂蹈康居屠五重城搴歙侯之旗師古曰搴㧞也音騫斬郅支之首縣旌萬里之外揚威昆山之西掃谷吉之恥立昭眀之功萬夷慴伏莫不懼震師古曰慴恐也音之渉反呼韓邪單于見郅支己誅且喜且懼鄉風馳義稽首來賔師古曰馳義慕義馳驅而來也鄉讀曰嚮願守北藩累世稱臣立千載之功建萬世之安羣臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威師古曰小雅采芑之詩也嘽嘽衆也焞焞盛也言車徒既衆且盛有如雷霆故能克定獫狁而令荆土之蠻亦畏威而來也嘽他丹反焞他回反易曰有嘉折首獲匪其醜師古曰離上九爻辭也嘉善也醜類也言王者出征克勝斬首多獲非類故以為善言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也盖急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜旣多受祉來歸自鎬我行永久師古曰小雅六月之詩也鎬地名非豐鎬之鎬此鎬及方皆在周之北時獫狁侵鎬及方至於涇陽吉甫薄伐自鎬而還王以燕禮樂之多受福賜以其行役有功日月長久故也千里之鎬猶以為逺况萬里之外其勤至矣延壽湯旣未獲受祉之報反屈捐命之功久挫於刀筆之前師古曰捐棄其軀命言無所頋也挫屈折也刀筆謂吏也非所以勸有功厲戎士也昔齊桓公前有尊周之功師古曰謂伐椘責苞茅及㑹王太子于首止後有滅項之罪師古曰項國名也春秋僖十七年夏滅項公羊傳曰齊滅之也不言齊為桓公諱也桓常有繼絶存亡之功故君子為之諱君子以功覆過而為之諱行事師古曰行事謂滅項之事也劉攽曰諱行事非辭也諱以上為句行事者言已行之事舊例成法也漢世人作文言行事成事者意皆同貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞師古曰靡􅄆也音縻而厪獲駿馬三十匹師古曰厪與僅同僅少也雖斬宛王母鼓之首師古曰西域傳作母寡而此云母鼓鼓寡聲相近盖戎狄之言不甚諦也猶不足以復費師古曰復償也音扶目反其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於貳師功徳百之師古曰百倍勝之且常恵隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則髙於安逺長羅師古曰安逺侯鄭吉長羅侯常恵也而大功未著小惡數布臣竊痛之宜以時觧縣通籍孟康曰縣罪未竟也如言縣罰也通籍不禁止令得出入也除過勿治尊寵爵位以勸有功於是天子下詔曰匈奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優㳺而不征者重動師衆勞將率師古曰重難也故𨼆忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之頼天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法師古曰干犯也内不煩一夫之役不開府庫之蔵因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邉竟得以安師古曰竟讀曰境然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議封焉議者皆以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絶域非真單于元帝取安逺侯鄭吉故事封千戸衡顯復爭廼封延壽為義成侯賜湯爵闗内侯食邑各三百戸加賜黄金百斤告上帝宗廟大赦天下拜延壽為長水校尉湯為射聲校尉延壽遷城門校尉䕶軍都尉薨於官}
