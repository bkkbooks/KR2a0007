  - {type: variant, offset: 1226, length: 6567, content: 覆治禹坐要斬請逮捕廣漢有詔即訊辭服會赦貶秩一等廣漢疑其邑子榮畜教令後以它法論殺畜人上書言之事下丞相御史案驗甚急廣漢使所親信長安人為丞相府門卒令微司丞相門內不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妒殺之府舍而丞相奉齋酎入廟祠廣漢得此使中郎趙奉壽風曉丞相欲以脅之毋令窮正己事丞相不聽按驗愈急廣漢欲告之先問太史知星氣者言今年當有戮死大臣廣漢即上書告丞相罪制曰下京兆尹治廣漢知事迫切遂自將吏卒突入丞相府召其夫人跪庭下受辭收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢廣漢數犯罪法不伏辜以詐巧迫脅臣相幸臣相寬不奏願下明使者治廣漢所驗臣相家事事下廷尉治實丞相自以過譴笞傅婢出至外弟乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅斥除騎士乏軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧養小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪彊小民得職百姓追思歌之至今尹翁歸字子兄河東平陽人也徙杜陵翁歸少孤與季父居為獄小吏曉習文法喜擊劍人莫能當是時大將霍光秉政諸霍在平陽奴客持刀兵入市鬭變吏不能禁及翁歸為市吏莫敢犯者公廉不受餽百賈畏之後去吏居家會田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閱數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜延年曰何傷遂召上辭問甚奇其對除補卒史便從歸府案事發姦窮竟事情延年大重之自以能不及翁歸徙署督郵河東二十八縣分為兩部閎孺部汾北翁歸部汾南所舉應法得其罪辜屬縣長吏雖中傷莫有怨者舉廉為緱氏尉歷守郡中所居治理遷補都內令舉廉為弘農都尉徵拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢將汝不任事也又不可干以私翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政有急名則少緩之吏民小解輒披籍縣縣收取黠吏豪民案致其罪高至於死收取人必於秋冬課吏大會中及出行縣不以無事時其有所取也以一警百吏民皆服恐懼改行自新東海大豪郯許仲孫為姦猾亂吏治郡中苦之二千石欲捕者輒以力勢變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東海大治以高第入守右扶風滿歲為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵類常如翁歸言無有遺脫緩於小弱急於豪彊豪彊有論罪輸掌畜官使斫莝責以員程不得取代不中程輒笞督極者至以鈇自剄而死京師畏其威嚴扶風大治盜賊課常為三輔最翁歸為政雖任刑其在公卿之間清絜自守語不及私然溫良嗛退不以行能驕人甚得名譽於朝廷視事數歲元康四年病卒家無餘財天子賢之制詔御史朕夙興夜寐以求賢為右不異親疏近遠務在安民而已扶風翁歸廉平鄉正治民異等早夭不遂不得終其功業朕其憐之其賜翁歸子黃金百斤以奉其祭祠翁歸三子皆為郡守少子岑歷位九卿至後將軍而閎孺亦至廣陵相有治名由是世稱田延年為知人韓延壽字長公燕人也徙杜陵少為郡文學父義為燕郎中剌王之謀逆也義諫而死燕人閔之是時昭帝富於春秋大將軍霍光持政徵郡國賢良文學問以得失時魏相以文學對策以為賞罰所以勸善禁惡政之本也日者燕王為無道韓義出身彊諫為王所殺義無比干之親而蹈比干之節宜顯賞其子以示天下明為人臣之義光納其言因擢延壽為諫大夫遷淮陽太守治甚有名徙潁川潁川多豪彊難治國家常為選良二千石先是趙廣漢為太守患其俗多朋黨故構會吏民令相告訐一切以為聰明潁川由是以為俗民多怨讎延壽欲更改之教以禮讓恐百姓不從乃歷召郡中長老為鄉里所信向者數十人設酒具食親與相對接以禮意人人問以謠俗民所疾苦為陳和睦親愛銷除怨咎之路長老皆以為便可施行因與議定嫁娶喪祭儀品略依古禮不得過法延壽於是令文學校官諸生皮弁執俎豆為吏民行喪嫁娶禮百姓遵用其教賣偶車馬下里偽物者棄之市道數年徙為東郡太守黃霸代延壽居潁川霸因其迹而大治延壽為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學官春秋鄉射陳鍾鼓管弦盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期會為大事吏民敬畏趨鄉之又置正五長相率以孝弟不得舍姦人閭里仟佰有非常吏輒聞知姦人莫敢入界其始若煩後吏無追捕之苦民無箠楚之憂皆便安之接待下吏恩施甚厚而約誓明或欺負之者延壽痛自刻責豈其負之何以至此吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言延壽聞之對掾史涕泣遣吏毉治視厚復其家延壽嘗出臨上車騎吏一人後至敕功曹議罰白還至府門門卒當車願有所言延壽止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也今旦明府早駕久駐未出騎吏父來至府門不敢入騎吏聞之趨走出謁適會明府登車以敬父而見罰得毋虧大化乎延壽舉手輿中曰微子太守不自知過歸舍召見門卒卒本諸生聞延壽賢無因自達故代卒延壽遂待用之其納善聽諫皆此類也在東郡三歲令行禁止斷獄大減為天下最入守左馮翊滿歲稱職為真歲餘不肯出行縣丞掾數白宜循行郡中覽觀民俗考長吏治迹延壽曰縣皆有賢令長督郵分明善惡於外行縣恐無所益重為煩擾丞掾皆以為方春月可壹出勸耕桑延壽不得已行縣至高陵民有昆弟相與訟田自言延壽大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥咎在馮翊當先退是日移病不聽事因入臥傳舍閉閤思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髡肉袒謝願以田相移終死不敢復爭延壽大喜開閤延見內酒肉與相對飲食厲勉以意告鄉部有以表勸悔過從善之民延壽乃起聽事勞謝令丞以下引見尉薦郡中歙然莫不傳相敕厲不敢犯延壽恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿延壽代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延壽在東郡時放散官錢千餘萬望之與丞相丙吉議吉以為更大赦不須考會御史當問東郡望之因令并問之延壽聞知即部吏案校望之在馮翊時廩犧官錢放散百餘萬廩犧吏掠治急自引與望之為姦延壽劾奏移殿門禁止望之望之自奏職在總領天下聞事不敢不問而為延壽所拘持上由是不直延壽各令窮竟所考望之卒無事實而望之遣御史案東郡具得其事延壽在東郡時試騎士治飾兵車畫龍虎朱爵延壽衣黃紈方領駕四馬傅總建幢棨植羽葆鼓車歌車功曹引車皆駕四馬載棨戟五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延壽車噭咷楚歌延壽坐射室騎吏持戟夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣又使騎士戲車弄馬盜驂延壽又取官銅物侯月蝕鑄作刀劍鉤鐔放效尚方事及取官錢帛私假繇使吏及治飾車甲三百萬以上於是望之劾奏延壽上僭不道又自陳前為延壽所奏今復舉延壽罪眾庶皆以臣懷不正之心侵冤延壽願下丞相中二千石博士議其罪事下公卿皆以延壽前既無狀後復誣愬典法大臣欲以解罪狡猾不道天子惡之延壽竟坐棄市吏民數千人送至渭城老小扶持車轂爭奏酒炙延壽不忍距逆人人為飲計飲酒石餘使掾史分謝送者遠苦吏民延壽死無所恨百姓莫不流涕延壽三子皆為郎吏且死屬其子勿為吏以己為戒子皆以父言去官不仕至孫威乃復為吏至將軍威亦多恩信能拊眾得士死力威又坐奢僭誅延壽之風類也張敞字子高本河東平陽人也祖父孺為上谷太守徙茂陵敞父福事孝武帝官至光祿大夫敞後隨宣帝徙杜陵敞本以鄉有秩補太守卒史察廉為甘泉倉長稍遷太僕丞杜延年甚奇之會昌邑王徵即位動作不由法度敞上書諫曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖承宗廟東近之日唯恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聽風國輔大臣未襃而昌邑小輦先遷此過之大者也後十餘日王賀廢敞以切諫顯名擢為豫州剌史以數上事有忠言宣帝徵敞為太中大夫與于定國並平尚書事以正違忤大將軍霍光而使主兵車出軍省減用度復出為函谷關都尉宣帝初即位廢王賀在昌邑上心憚之徙敞為山陽太守久之大將軍霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬頃之山雲以過歸第霍氏諸壻親屬頗出補吏敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海內之命斷於掌握方其隆時感動天地侵迫陰陽月朓日蝕晝冥宵光地大震裂火生地中天文失度祅祥變怪不可勝記皆陰類盛長臣下顓制之所生也朝臣宜有明言曰陛下襃寵故大將軍以報功德足矣間者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就弟及衛將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽群臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非策之得者也今兩侯以出人情不相遠以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守遠郡其路無由夫心之精微口不能言也言之微眇書不能文也故伊尹五就桀五就湯蕭相國薦淮陰累歲乃得通況乎千里之外因書文諭事指哉唯陛下省察上甚善其計然不徵也久之勃海膠東盜賊並起敞上書自請治之曰臣聞忠考之道退家則盡心於親進宦則竭力於君夫小國中君猶有奮不顧身之臣況於明天子乎今陛下遊意於太平勞精於政事亹亹不舍晝夜群臣有司宜各竭力致身山陽郡戶九萬三千口五十萬以上訖計盜賊未得者七十七人它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡歲數不登盜賊並起至攻官寺篡囚徒搜市朝劫列侯吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀書奏天子徵敞拜膠東相賜黃金三十斤敞辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效者願得壹切比三輔尤異天子許之敞到膠東明設購賞開群盜令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盜賊解散傳相捕斬吏民歙然國中遂平居頃之王太后數出游獵敞奏書諫曰臣聞秦王好淫聲葉陽后為不聽鄭衛之樂楚嚴好田獵樊姬為不食鳥獸之肉口非惡旨甘耳非憎絲竹也所以抑心意絕耆欲者將以率二君而全宗祀也禮君母出門則乘輜軿下堂則從傅母進退則鳴玉佩內飾則結綢繆此言尊貴所以自斂制不從恣之義也今太后資質淑美慈愛寬仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也唯觀覽於往古全行乎來今令后姬得有所法則下臣有所稱誦臣敞幸甚書奏太后止不復出是時潁川太守黃霸以治行第一入守京兆尹霸視事數月不稱罷歸潁川於是制詔御史其以膠東相敞守京兆尹自趙廣漢誅後比更守尹如霸等數人皆不稱職京師浸廢長安市偷盜尤多百賈苦之上以問敞敝以為可禁敝既視事求問長安父老偷盜酋長數人居皆溫厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閱出者汙赭輒收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盜天子嘉之敞為人敏疾賞罰分明見惡輒取時時越法縱舍有足大者其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇郡國二千石以高弟入守及為真久者不過二三年近者數月一歲輒毀傷失名以罪過罷唯廣漢及敝為久任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之然敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮有司以奏敞上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位敝與蕭望之于定國相善始敞與定國俱以諫昌邑王超遷定國為大夫平尚書事敞出為刺史時望之為大行丞後望之先至御史大夫定國後至丞相敝終不過郡守為京兆九歲坐與光祿勳楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免而敞奏獨寢不下敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄是時冬月未盡數日案事吏晝夜驗治舜竟致其死事舜當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎乃棄舜市會立春行冤獄使者出舜家載尸并編敞教自言使者使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也即裝隨使者詣公車上書曰臣前幸得備位列卿待罪京兆坐殺賊捕掾絮舜舜本臣敞素所厚吏數蒙恩貸以臣有章劾當免受記考事便歸臥家謂臣五日京兆背恩忘義傷化薄俗臣竊以舜無狀枉法以誅之臣敞賊殺無辜鞠獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史敞起亡命復奉使典州既到部而廣川王國群輩不道賊連發不得敞以耳目發起賊主名區處誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐吏逐捕窮窘蹤迹皆入王宮敞自將郡國吏車數百兩圍守王宮搜索調等果得之殿屋重轑中敞傅吏皆捕格斷頭縣其頭王宮門外因劾奏廣川王天子不忍致法削其戶敞居部歲餘冀州盜賊禁止守太原太守滿歲為真太原郡清頃之宣帝崩元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問前將軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徵敞欲以為左馮翊會病卒敞所誅殺太原吏吏家怨敞隨至杜陵殺敞中子璜敞三子官皆至都尉初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武武應曰馭黠馬者利其銜策梁國大都吏民凋敝且當以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有迹亦能吏也敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也竦死敞無後王尊字子贛涿郡高陽人也少孤歸諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數歲給事太守府問詔書行事尊無不對太守奇之除補書佐署守屬監獄久之尊稱病去事師郡文學官治尚書論語略通大義復召署守屬治獄為郡決曹史數歲以令舉幽州刺史從事而太守察尊廉補遼西鹽官長數上書言便宜事事下丞相御史初元中舉直言遷虢令轉守槐里兼行美陽令事春正月美陽女子告假子不孝曰兒常以我為妻妒笞我尊聞之遣吏收捕驗問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也尊於是出坐廷上取不孝子縣磔著樹使騎吏五人張弓射殺之吏民驚駭後上行幸雍過虢尊供張如法而辨以高弟擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治明慎所職毋以身試法又出教敕掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢夫羽翮不修則不可以致千里闑內不理無以整外府丞悉署吏行能分別白之賢為上毋以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事已一月矣五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家然適足以葬矣今將輔送獄直符史詣閤下從太守受其事丞戒之戒之相隨入獄矣輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盜賊分散入傍郡界豪彊多誅傷伏辜者坐殘賊免起家復為護羌將軍轉校尉護送軍糧委輸而羌人反絕轉道兵數萬圍尊尊以千餘騎奔突羌賊功未列上坐擅離部署會赦免歸家涿郡太守徐明薦尊不宜久在閭巷上以尊為郿令遷益州刺史先是琅邪王陽為益州刺史行部至邛郲九折阪歎曰奉先人遺體柰何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣尊居部二歲懷來徼外蠻吏歸附其威信博士鄭寬中使行風俗舉奏尊治狀遷為東平相是時東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前說相鼠之詩尊曰毋持布鼓過雷門王怒起入後宮尊亦直趨出就舍先是王數私出入驅馳國中與后姬家交通尊到官召敕廄長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之言相教不得後尊朝王王復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王邪王情得又雅聞尊高名大為尊屈酌酒具食相對極驩太后徵史奏尊為相倨慢不臣王血氣未定不能忍愚誠恐母子俱死今妾不得使王復見尊陛下不留意妾願先自殺不忍見王之失義也尊竟坐免為庶人大將軍王鳳奏請尊補軍中司馬擢為司隸校尉初中書謁者令石顯貴幸專權為姦邪, WYG: ''}
  - {type: variant, offset: 1226, length: 6567, content: 覆治禹坐要斬請逮捕廣漢有詔即訊辭服會赦貶秩一等廣漢疑其邑子榮畜教令後以它法論殺畜人上書言之事下丞相御史案驗甚急廣漢使所親信長安人為丞相府門卒令微司丞相門內不法事地節三年七月中丞相傅婢有過自絞死廣漢聞之疑丞相夫人妒殺之府舍而丞相奉齋酎入廟祠廣漢得此使中郎趙奉壽風曉丞相欲以脅之毋令窮正己事丞相不聽按驗愈急廣漢欲告之先問太史知星氣者言今年當有戮死大臣廣漢即上書告丞相罪制曰下京兆尹治廣漢知事迫切遂自將吏卒突入丞相府召其夫人跪庭下受辭收奴婢十餘人去責以殺婢事丞相魏相上書自陳妻實不殺婢廣漢數犯罪法不伏辜以詐巧迫脅臣相幸臣相寬不奏願下明使者治廣漢所驗臣相家事事下廷尉治實丞相自以過譴笞傅婢出至外弟乃死不如廣漢言司直蕭望之劾奏廣漢摧辱大臣欲以劫持奉公逆節傷化不道宣帝惡之下廣漢廷尉獄又坐賊殺不辜鞠獄故不以實擅斥除騎士乏軍興數罪天子可其奏吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧養小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪彊小民得職百姓追思歌之至今尹翁歸字子兄河東平陽人也徙杜陵翁歸少孤與季父居為獄小吏曉習文法喜擊劍人莫能當是時大將霍光秉政諸霍在平陽奴客持刀兵入市鬭變吏不能禁及翁歸為市吏莫敢犯者公廉不受餽百賈畏之後去吏居家會田延年為河東太守行縣至平陽悉召故吏五六十人延年親臨見令有文者東有武者西閱數十人次到翁歸獨伏不肯起對曰翁歸文武兼備唯所施設功曹以為此吏倨敖不遜延年曰何傷遂召上辭問甚奇其對除補卒史便從歸府案事發姦窮竟事情延年大重之自以能不及翁歸徙署督郵河東二十八縣分為兩部閎孺部汾北翁歸部汾南所舉應法得其罪辜屬縣長吏雖中傷莫有怨者舉廉為緱氏尉歷守郡中所居治理遷補都內令舉廉為弘農都尉徵拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子曰此賢將汝不任事也又不可干以私翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政有急名則少緩之吏民小解輒披籍縣縣收取黠吏豪民案致其罪高至於死收取人必於秋冬課吏大會中及出行縣不以無事時其有所取也以一警百吏民皆服恐懼改行自新東海大豪郯許仲孫為姦猾亂吏治郡中苦之二千石欲捕者輒以力勢變詐自解終莫能制翁歸至論棄仲孫市一郡怖栗莫敢犯禁東海大治以高第入守右扶風滿歲為真選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行治如在東海故迹姦邪罪名亦縣縣有名籍盜賊發其比伍中翁歸輒召其縣長吏曉告以姦黠主名教使用類推迹盜賊所過抵類常如翁歸言無有遺脫緩於小弱急於豪彊豪彊有論罪輸掌畜官使斫莝責以員程不得取代不中程輒笞督極者至以鈇自剄而死京師畏其威嚴扶風大治盜賊課常為三輔最翁歸為政雖任刑其在公卿之間清絜自守語不及私然溫良嗛退不以行能驕人甚得名譽於朝廷視事數歲元康四年病卒家無餘財天子賢之制詔御史朕夙興夜寐以求賢為右不異親疏近遠務在安民而已扶風翁歸廉平鄉正治民異等早夭不遂不得終其功業朕其憐之其賜翁歸子黃金百斤以奉其祭祠翁歸三子皆為郡守少子岑歷位九卿至後將軍而閎孺亦至廣陵相有治名由是世稱田延年為知人韓延壽字長公燕人也徙杜陵少為郡文學父義為燕郎中剌王之謀逆也義諫而死燕人閔之是時昭帝富於春秋大將軍霍光持政徵郡國賢良文學問以得失時魏相以文學對策以為賞罰所以勸善禁惡政之本也日者燕王為無道韓義出身彊諫為王所殺義無比干之親而蹈比干之節宜顯賞其子以示天下明為人臣之義光納其言因擢延壽為諫大夫遷淮陽太守治甚有名徙潁川潁川多豪彊難治國家常為選良二千石先是趙廣漢為太守患其俗多朋黨故構會吏民令相告訐一切以為聰明潁川由是以為俗民多怨讎延壽欲更改之教以禮讓恐百姓不從乃歷召郡中長老為鄉里所信向者數十人設酒具食親與相對接以禮意人人問以謠俗民所疾苦為陳和睦親愛銷除怨咎之路長老皆以為便可施行因與議定嫁娶喪祭儀品略依古禮不得過法延壽於是令文學校官諸生皮弁執俎豆為吏民行喪嫁娶禮百姓遵用其教賣偶車馬下里偽物者棄之市道數年徙為東郡太守黃霸代延壽居潁川霸因其迹而大治延壽為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諫爭舉行喪讓財表孝弟有行修治學官春秋鄉射陳鍾鼓管弦盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期會為大事吏民敬畏趨鄉之又置正五長相率以孝弟不得舍姦人閭里仟佰有非常吏輒聞知姦人莫敢入界其始若煩後吏無追捕之苦民無箠楚之憂皆便安之接待下吏恩施甚厚而約誓明或欺負之者延壽痛自刻責豈其負之何以至此吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不殊因瘖不能言延壽聞之對掾史涕泣遣吏毉治視厚復其家延壽嘗出臨上車騎吏一人後至敕功曹議罰白還至府門門卒當車願有所言延壽止車問之卒曰孝經曰資於事父以事君而敬同故母取其愛而君取其敬兼之者父也今旦明府早駕久駐未出騎吏父來至府門不敢入騎吏聞之趨走出謁適會明府登車以敬父而見罰得毋虧大化乎延壽舉手輿中曰微子太守不自知過歸舍召見門卒卒本諸生聞延壽賢無因自達故代卒延壽遂待用之其納善聽諫皆此類也在東郡三歲令行禁止斷獄大減為天下最入守左馮翊滿歲稱職為真歲餘不肯出行縣丞掾數白宜循行郡中覽觀民俗考長吏治迹延壽曰縣皆有賢令長督郵分明善惡於外行縣恐無所益重為煩擾丞掾皆以為方春月可壹出勸耕桑延壽不得已行縣至高陵民有昆弟相與訟田自言延壽大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥咎在馮翊當先退是日移病不聽事因入臥傳舍閉閤思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髡肉袒謝願以田相移終死不敢復爭延壽大喜開閤延見內酒肉與相對飲食厲勉以意告鄉部有以表勸悔過從善之民延壽乃起聽事勞謝令丞以下引見尉薦郡中歙然莫不傳相敕厲不敢犯延壽恩信周徧二十四縣莫復以辭訟自言者推其至誠吏民不忍欺紿延壽代蕭望之為左馮翊而望之遷御史大夫侍謁者福為望之道延壽在東郡時放散官錢千餘萬望之與丞相丙吉議吉以為更大赦不須考會御史當問東郡望之因令并問之延壽聞知即部吏案校望之在馮翊時廩犧官錢放散百餘萬廩犧吏掠治急自引與望之為姦延壽劾奏移殿門禁止望之望之自奏職在總領天下聞事不敢不問而為延壽所拘持上由是不直延壽各令窮竟所考望之卒無事實而望之遣御史案東郡具得其事延壽在東郡時試騎士治飾兵車畫龍虎朱爵延壽衣黃紈方領駕四馬傅總建幢棨植羽葆鼓車歌車功曹引車皆駕四馬載棨戟五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延壽車噭咷楚歌延壽坐射室騎吏持戟夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鞪居馬上抱弩負籣又使騎士戲車弄馬盜驂延壽又取官銅物侯月蝕鑄作刀劍鉤鐔放效尚方事及取官錢帛私假繇使吏及治飾車甲三百萬以上於是望之劾奏延壽上僭不道又自陳前為延壽所奏今復舉延壽罪眾庶皆以臣懷不正之心侵冤延壽願下丞相中二千石博士議其罪事下公卿皆以延壽前既無狀後復誣愬典法大臣欲以解罪狡猾不道天子惡之延壽竟坐棄市吏民數千人送至渭城老小扶持車轂爭奏酒炙延壽不忍距逆人人為飲計飲酒石餘使掾史分謝送者遠苦吏民延壽死無所恨百姓莫不流涕延壽三子皆為郎吏且死屬其子勿為吏以己為戒子皆以父言去官不仕至孫威乃復為吏至將軍威亦多恩信能拊眾得士死力威又坐奢僭誅延壽之風類也張敞字子高本河東平陽人也祖父孺為上谷太守徙茂陵敞父福事孝武帝官至光祿大夫敞後隨宣帝徙杜陵敞本以鄉有秩補太守卒史察廉為甘泉倉長稍遷太僕丞杜延年甚奇之會昌邑王徵即位動作不由法度敞上書諫曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖承宗廟東近之日唯恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聽風國輔大臣未襃而昌邑小輦先遷此過之大者也後十餘日王賀廢敞以切諫顯名擢為豫州剌史以數上事有忠言宣帝徵敞為太中大夫與于定國並平尚書事以正違忤大將軍霍光而使主兵車出軍省減用度復出為函谷關都尉宣帝初即位廢王賀在昌邑上心憚之徙敞為山陽太守久之大將軍霍光薨宣帝始親政事封光兄孫山雲皆為列侯以光子禹為大司馬頃之山雲以過歸第霍氏諸壻親屬頗出補吏敞聞之上封事曰臣聞公子季友有功於魯大夫趙衰有功於晉大夫田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海內之命斷於掌握方其隆時感動天地侵迫陰陽月朓日蝕晝冥宵光地大震裂火生地中天文失度祅祥變怪不可勝記皆陰類盛長臣下顓制之所生也朝臣宜有明言曰陛下襃寵故大將軍以報功德足矣間者輔臣顓政貴戚太盛君臣之分不明請罷霍氏三侯皆就弟及衛將軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽群臣以義固爭而後許天下必以陛下為不忘功德而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非策之得者也今兩侯以出人情不相遠以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守遠郡其路無由夫心之精微口不能言也言之微眇書不能文也故伊尹五就桀五就湯蕭相國薦淮陰累歲乃得通況乎千里之外因書文諭事指哉唯陛下省察上甚善其計然不徵也久之勃海膠東盜賊並起敞上書自請治之曰臣聞忠考之道退家則盡心於親進宦則竭力於君夫小國中君猶有奮不顧身之臣況於明天子乎今陛下遊意於太平勞精於政事亹亹不舍晝夜群臣有司宜各竭力致身山陽郡戶九萬三千口五十萬以上訖計盜賊未得者七十七人它課諸事亦略如此臣敞愚駑既無以佐思慮久處閒郡身逸樂而忘國事非忠孝之節也伏聞膠東勃海左右郡歲數不登盜賊並起至攻官寺篡囚徒搜市朝劫列侯吏失綱紀姦軌不禁臣敞不敢愛身避死唯明詔之所處願盡力摧挫其暴虐存撫其孤弱事即有業所至郡條奏其所由廢及所以興之狀書奏天子徵敞拜膠東相賜黃金三十斤敞辭之官自請治劇郡非賞罰無以勸善懲惡吏追捕有功效者願得壹切比三輔尤異天子許之敞到膠東明設購賞開群盜令相捕斬除罪吏追捕有功上名尚書調補縣令者數十人由是盜賊解散傳相捕斬吏民歙然國中遂平居頃之王太后數出游獵敞奏書諫曰臣聞秦王好淫聲葉陽后為不聽鄭衛之樂楚嚴好田獵樊姬為不食鳥獸之肉口非惡旨甘耳非憎絲竹也所以抑心意絕耆欲者將以率二君而全宗祀也禮君母出門則乘輜軿下堂則從傅母進退則鳴玉佩內飾則結綢繆此言尊貴所以自斂制不從恣之義也今太后資質淑美慈愛寬仁諸侯莫不聞而少以田獵縱欲為名於以上聞亦未宜也唯觀覽於往古全行乎來今令后姬得有所法則下臣有所稱誦臣敞幸甚書奏太后止不復出是時潁川太守黃霸以治行第一入守京兆尹霸視事數月不稱罷歸潁川於是制詔御史其以膠東相敞守京兆尹自趙廣漢誅後比更守尹如霸等數人皆不稱職京師浸廢長安市偷盜尤多百賈苦之上以問敞敝以為可禁敝既視事求問長安父老偷盜酋長數人居皆溫厚出從童騎閭里以為長者敞皆召見責問因貰其罪把其宿負令致諸偷以自贖偷長曰今一旦召詣府恐諸偷驚駭願一切受署敞皆以為吏遣歸休置酒小偷悉來賀且飲醉偷長以赭汙其衣裾吏坐里閭閱出者汙赭輒收縛之一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盜天子嘉之敞為人敏疾賞罰分明見惡輒取時時越法縱舍有足大者其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢然敞本治春秋以經術自輔其政頗雜儒雅往往表賢顯善不醇用誅罰以此能自全竟免於刑戮京兆典京師長安中浩穰於三輔尤為劇郡國二千石以高弟入守及為真久者不過二三年近者數月一歲輒毀傷失名以罪過罷唯廣漢及敝為久任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之然敞無威儀時罷朝會過走馬章臺街使御吏驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮有司以奏敞上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗備責也然終不得大位敝與蕭望之于定國相善始敞與定國俱以諫昌邑王超遷定國為大夫平尚書事敞出為刺史時望之為大行丞後望之先至御史大夫定國後至丞相敝終不過郡守為京兆九歲坐與光祿勳楊惲厚善後惲坐大逆誅公卿奏惲黨友不宜處位等比皆免而敞奏獨寢不下敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄是時冬月未盡數日案事吏晝夜驗治舜竟致其死事舜當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎乃棄舜市會立春行冤獄使者出舜家載尸并編敞教自言使者使者奏敞賊殺不辜天子薄其罪欲令敞得自便利即先下敞前坐楊惲不宜處位奏免為庶人敞免奏既下詣闕上印綬便從闕下亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功效使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也即裝隨使者詣公車上書曰臣前幸得備位列卿待罪京兆坐殺賊捕掾絮舜舜本臣敞素所厚吏數蒙恩貸以臣有章劾當免受記考事便歸臥家謂臣五日京兆背恩忘義傷化薄俗臣竊以舜無狀枉法以誅之臣敞賊殺無辜鞠獄故不直雖伏明法死無所恨天子引見敞拜為冀州刺史敞起亡命復奉使典州既到部而廣川王國群輩不道賊連發不得敞以耳目發起賊主名區處誅其渠帥廣川王姬昆弟及王同族宗室劉調等通行為之囊橐吏逐捕窮窘蹤迹皆入王宮敞自將郡國吏車數百兩圍守王宮搜索調等果得之殿屋重轑中敞傅吏皆捕格斷頭縣其頭王宮門外因劾奏廣川王天子不忍致法削其戶敞居部歲餘冀州盜賊禁止守太原太守滿歲為真太原郡清頃之宣帝崩元帝初即位待詔鄭朋薦敞先帝名臣宜傅輔皇太子上以問前將軍蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徵敞欲以為左馮翊會病卒敞所誅殺太原吏吏家怨敞隨至杜陵殺敞中子璜敞三子官皆至都尉初敞為京兆尹而敞弟武拜為梁相是時梁王驕貴民多豪彊號為難治敞問武欲何以治梁武敬憚兄謙不肯言敞使吏送至關戒吏自問武武應曰馭黠馬者利其銜策梁國大都吏民凋敝且當以柱後惠文彈治之耳秦時獄法吏冠柱後惠文武意欲以刑法治梁吏還道之敞笑曰審如掾言武必辨治梁矣武既到官其治有迹亦能吏也敞孫竦王莽時至郡守封侯博學文雅過於敞然政事不及也竦死敞無後王尊字子贛涿郡高陽人也少孤歸諸父使牧羊澤中尊竊學問能史書年十三求為獄小吏數歲給事太守府問詔書行事尊無不對太守奇之除補書佐署守屬監獄久之尊稱病去事師郡文學官治尚書論語略通大義復召署守屬治獄為郡決曹史數歲以令舉幽州刺史從事而太守察尊廉補遼西鹽官長數上書言便宜事事下丞相御史初元中舉直言遷虢令轉守槐里兼行美陽令事春正月美陽女子告假子不孝曰兒常以我為妻妒笞我尊聞之遣吏收捕驗問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也尊於是出坐廷上取不孝子縣磔著樹使騎吏五人張弓射殺之吏民驚駭後上行幸雍過虢尊供張如法而辨以高弟擢為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑彊扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君卿勉力正身以率下故行貪鄙能變更者與為治明慎所職毋以身試法又出教敕掾功曹各自底厲助太守為治其不中用趣自避退毋久妨賢夫羽翮不修則不可以致千里闑內不理無以整外府丞悉署吏行能分別白之賢為上毋以富賈人百萬不足與計事昔孔子治魯七日誅少正卯今太守視事已一月矣五官掾張輔懷虎狼之心貪汙不軌一郡之錢盡入輔家然適足以葬矣今將輔送獄直符史詣閤下從太守受其事丞戒之戒之相隨入獄矣輔繫獄數日死盡得其狡猾不道百萬姦臧威震郡中盜賊分散入傍郡界豪彊多誅傷伏辜者坐殘賊免起家復為護羌將軍轉校尉護送軍糧委輸而羌人反絕轉道兵數萬圍尊尊以千餘騎奔突羌賊功未列上坐擅離部署會赦免歸家涿郡太守徐明薦尊不宜久在閭巷上以尊為郿令遷益州刺史先是琅邪王陽為益州刺史行部至邛郲九折阪歎曰奉先人遺體柰何數乘此險後以病去及尊為刺史至其阪問吏曰此非王陽所畏道邪吏對曰是尊叱其馭曰驅之王陽為孝子王尊為忠臣尊居部二歲懷來徼外蠻吏歸附其威信博士鄭寬中使行風俗舉奏尊治狀遷為東平相是時東平王以至親驕奢不奉法度傅相連坐及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前說相鼠之詩尊曰毋持布鼓過雷門王怒起入後宮尊亦直趨出就舍先是王數私出入驅馳國中與后姬家交通尊到官召敕廄長大王當從官屬鳴和鸞乃出自今有令駕小車叩頭爭之言相教不得後尊朝王王復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王邪王情得又雅聞尊高名大為尊屈酌酒具食相對極驩太后徵史奏尊為相倨慢不臣王血氣未定不能忍愚誠恐母子俱死今妾不得使王復見尊陛下不留意妾願先自殺不忍見王之失義也尊竟坐免為庶人大將軍王鳳奏請尊補軍中司馬擢為司隸校尉初中書謁者令石顯貴幸專權為姦邪, krp: ''}
