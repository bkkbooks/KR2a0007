  - {type: variant, offset: 1049, length: 0, content: '', krp: 行三百歩延壽有力䏻以手投之㧞距超距也師古曰投石應説是也㧞距者有人連坐相把據地距以為堅而䏻㧞取之皆言其有手掣之力超踰亭樓又言其趫捷耳非㧞距也今人猶有㧞爪之戲盖㧞距之遺法宋祁曰注文堅字疑作掔字掣字疑作擥字嘗超踰羽林亭樓由是遷為郎試弁為期門孟康曰弁手搏宋祁曰注末當有也字以材力愛幸稍遷至遼東太守免官車騎將軍許嘉薦延壽為郎中諫大夫使西域都䕶騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯侯傳國至曾孫王莽敗廼絶陳湯字子公山陽瑕丘人也少好書博逹善屬文師古曰屬音之欲反家貧匄貣無節不為州里所稱師古曰匄乞也貣音吐得反西至}
  - {type: variant, offset: 1051, length: 0, content: '', WYG: 求官得太官獻食丞數嵗富平侯張勃與湯交髙其能初元二年元帝詔列侯舉茂材勃舉湯湯待遷父死不犇喪師古曰犇古奔字司𨽻奏湯無循行宋祁曰循疑作􅁱勃選舉故不以實坐削戸二百㑹薨因賜諡曰繆侯師古曰以其繆舉人也湯下獄論後復以薦為郎數求使外國久之遷西域副校尉與甘延壽俱出先是宣帝時匈奴乖亂五單于爭立呼韓邪單于與郅支單于俱遣子入侍漢兩受之後呼韓邪單于身入稱臣朝見郅支以為呼韓邪破弱降漢不能自還即西收右地㑹漢發兵送呼韓邪單于郅支由是遂西破呼偈堅昆丁令服䖍曰呼偈小國名在匈奴北師古曰偈起厲反令與零同宋祁曰偈字下當添音字兼三國而都之怨漢擁䕶呼韓邪而不助己困辱漢使者江廼始等初元四年遣使奉獻因求侍子願為内附漢議遣衛司馬谷吉送之御史大夫貢禹博士匡衡以為春秋之義許夷狄者不壹而足師古曰言莭制之不皆稱其所求也今郅支單于鄉化未醇師古曰鄉讀曰嚮不雜曰醇醇壹也厚也所在絶逺宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年徳澤甚厚空絶而不送近從塞還示弃捐不畜師古曰畜謂愛養也使無鄉從之心師古曰鄉讀曰嚮嚮從謂向化而從命也弃前恩立後怨不便議者見前江廼始無應敵之數知勇俱困以致恥辱即豫為臣憂臣幸得建彊漢之節承聖眀之詔宣諭厚恩不宜敢桀師古曰言郅支畏威當不敢桀黠也若懐禽獸加無道於臣則單于長嬰大罪師古曰嬰猶帶也宋祁曰禽獸字下疑有心字長嬰大罪罪字疑作漢必遁逃逺舍不敢近邉師古曰舍止也沒一使以安百姓國之計臣之願也願送至庭師古曰單于庭上以示朝者禹復爭以為吉徃必為國取悔生事不可許右將軍馮奉世以為可遣上許焉既至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益彊遂西奔康居康居王以女妻郅支郅支亦以女予康居王康居甚尊敬郅支欲倚其威以脅諸國師古曰倚音於綺反郅支數借兵擊烏孫深入至赤谷城殺略民人敺畜産師古曰敺與驅同下皆類此烏孫不敢追西邊空虛不居者且千里郅支單于自以大國威名尊重又乘勝驕不為康居王禮怒殺康居王女及貴人人民數百或支觧投都頼水中師古曰支觧謂觧截其四支也都頼郅支水名發民作城日作五百人二嵗廼已又遣使責闔蘇大宛諸國嵗遺師古曰胡廣云康居北可一千里有國名奄蔡一名闔蘇然則闔蘇即奄蔡也嵗遺者年常所獻遺之物遺弋季反宋祁曰弋季字上當有音字不敢不予漢遣使三輩至康居求谷吉等死師古曰死尸也郅支困辱使者不肯奉詔而因都䕶上書言居困戹願歸計彊漢遣子入侍師古曰故為此言以調戲也歸計謂歸附而受計策也其驕嫚如此建昭三年湯與延壽出西域湯為人沈勇有大慮多策謀喜竒功師古曰喜音許}
