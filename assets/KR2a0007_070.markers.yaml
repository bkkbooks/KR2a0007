  - {type: variant, offset: 1035, length: 0, content: '', krp: 利征伐之後初置校尉屯田渠黎至宣帝時吉以侍郎田渠黎積榖因發諸國兵攻破車師遷衛司馬使䕶鄯善以西南道師古曰鄯音善神爵中匈奴乖亂日逐王先賢撣欲降}
  - {type: variant, offset: 1036, length: 1, content: 事, WYG: 師古曰撣音纒使人與吉相聞吉發渠黎龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣亰師漢封日逐王為歸徳侯吉既破車師降日逐威震西域遂并䕶車師以西北道故號都䕶師古曰並䕶南北二道故謂之都都猶大也總也都䕶之置自吉始焉上嘉其功效廼下詔曰都䕶西域騎都尉鄭吉拊循外蠻宣明威信師古曰禮云東夷北狄西戎南蠻然夷蠻戎狄亦四方之總稱耳故史傳又云百蠻也迎匈奴單于從兄日逐王衆擊破車師兠訾城師古曰訾音子移反功效茂著其封吉為安逺侯食邑千戸吉於是中西域而立莫府師古曰中西域者言最處諸國之中近逺均也中音竹仲反治烏壘城鎮撫諸國誅伐懐集之漢之號令班西域矣師古曰班布也始自張騫而成於鄭吉語在西域傳吉薨諡曰繆侯子}
  - {type: page-break, offset: 1036, content: '', id: KR2a0007_WYG_070-6a, image: WYG0250/WYG0250-0476a.png}
