  - {type: variant, offset: 8015, length: 4, content: 殿門下衡, WYG: 師古曰子玉椘大夫也得臣其名也春秋僖二十八年子玉帥師與晋文公戰于城濮椘師敗繢晋師三日館榖而文公猶有憂色曰得臣猶在憂未歇也及椘殺子玉公喜而後可知也禮記曰有憂者仄席而坐盖自貶也仄古側字也趙有亷頗馬服彊秦不敢窺兵井陘師古曰亷頗趙將也馬服君趙奢亦趙將也井陘之口趙之西界山險道也近漢有郅都魏尚匈奴不敢}
