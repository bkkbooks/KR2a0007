  - {type: variant, offset: 387, length: 1, content: 降, WYG: 間候遮漢使}
  - {type: variant, offset: 387, length: 1, content: 降, krp: 間候遮漢使}
  - {type: variant, offset: 389, length: 0, content: '', WYG: 師古曰言為匈奴之間而候伺發兵殺略衛司馬安樂光禄大夫忠期門郎遂成等三輩及安息大宛使盗取節印獻物晋灼曰此安息大宛逺遣使獻漢而楼蘭王使人盗取所獻之物也師古曰節及印漢使者所賫也獻物大宛等使所獻也楼蘭既殺漢使又殺諸國使者甚逆天理平樂監傅介子持節使誅斬樓蘭王安歸首縣之北闕以直報怨師古曰論語載孔子言曰以直報怨以徳報徳言怨於我者則直道以報之故詔引之也不煩師衆其封介子為義陽侯食邑七百戸士刺王者皆補侍郎介子薨子敞有罪不得嗣國除元始中繼功臣世復封介子曾孫長為義陽侯王莽敗廼絶常恵太原人也少時家貧自奮應募隨栘中監蘇武使匈奴師古曰栘中廐名也音移觧在昭紀宋祁曰蘇林曰栘音移如淳曰移爾雅唐棣栘也栘園之中有馬廐也釋文唐棣栘郭璞注云似白楊江東呼為栘音以支反姚本改作移并見拘留十餘年昭帝時廼還漢嘉其勤勞拜為光禄大夫是時烏孫公主上書}
