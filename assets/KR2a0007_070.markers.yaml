  - {type: variant, offset: 7801, length: 2, content: 張譚, WYG: 繁延壽師古曰繁音蒲胡反以為郅支及名王首更歴諸國蠻夷莫不聞知師古曰更音工衡反月令春掩骼埋胔之時應劭曰禽獸之骨曰骼骼大也鳥䑕之骨曰胔胔可惡也臣瓉曰枯骨曰骼有肉曰胔師古曰瓚説是也骼音工客反胔音才賜反宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之師古曰夾谷地名即祝其也定十年公㑹齊侯於夾谷孔子攝相事齊侯奏宫中之樂俳優侏儒戲於前孔子歴階而上曰匹失侮諸侯者罪應誅於是斬侏儒首足異處齊侯懼有慙色施者優人之名夾音頰方盛夏首足異門而出宜縣十日廼埋之有詔將軍議是初中書令石顯嘗欲以姊妻延夀延壽不取及丞相御史亦惡其矯制}
