  - {type: variant, offset: 9610, length: 0, content: '', krp: 諸國兵即誅末振將}
  - {type: variant, offset: 9611, length: 0, content: '', WYG: 子番丘師古曰番音歩安反㑹宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地服䖍曰墊音墊阸之墊鄭氏曰婁音羸師古曰墊音丁念反娄音樓選精兵三十弩李竒曰三十人人持一弩徑至昆彌所在召番丘責以末振將骨月相殺殺漢公主子孫未伏誅而死使者受詔誅番丘即手劒擊殺番丘官屬以下驚恐馳歸小昆彌烏犂靡者末振將兄子也勒兵數千騎圍㑹宗㑹宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪師古曰飲音於禁反食讀曰飤次下亦同㑹宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去㑹宗還奏事公卿議㑹宗權得便宜以輕兵深入烏孫即誅番丘師古曰即就也宣眀國威宜加重賞天子賜㑹宗爵闗内侯黄金百斤是時小昆彌季父卑爰疐師古曰疐音竹二反擁衆欲害昆彌漢復遣㑹宗使安輯與都䕶孫建并力明年㑹宗病死烏孫中年七十五矣城郭諸國為發喪立祠焉賛曰自元狩之際張騫始通西域至於地節鄭吉建都䕶之號訖王莽世凡十八人皆以勇略選然其有功迹者具比亷襃以恩信稱郭舜以亷平著孫建用威重顯其餘無稱焉陳湯儻􅛅不自收歛師古曰儻􅛅無行檢也􅛅音蕩卒用困窮議者閔之故備列云前漢書卷七十前漢書卷七十考證傅介子傳詔曰樓蘭王安歸此傳及昭紀並作安歸西域傳作嘗歸必有一誤嘗為匈奴間候遮漢使者注師古曰言為匈奴之間而候伺}
