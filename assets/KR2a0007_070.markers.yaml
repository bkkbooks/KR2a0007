  - {type: variant, offset: 1052, length: 0, content: '', WYG: 反每過城邑山川常登望既領外國與延壽謀曰夷狄畏服大種其天性也西域本屬匈奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國北擊伊列西取安息南排月氏山離烏弋數年之間城郭諸國危矣服䖍曰山離烏弋不在三十六國中去中國二萬里師古曰謂西域國為城郭者言不隨畜牧遷徙以别於匈奴也且其人剽悍師古曰剽輕也悍勇也剽音頻妙反又音匹妙反悍音胡幹反好戰伐數取勝久畜之必為西域患郅支單于雖所在絶逺蠻夷無金城强弩之守如發屯田吏士敺從烏孫衆兵師古曰驅帥之令隨從也直指其城下彼亡則無所之守則不足自保師古曰之徃保安也千載之功可一朝而成也延壽亦以為然欲奏請之湯曰國家與公卿議大策非凡所見事必不從師古曰言凡庸之人不能逺見故壊其事也宋祁曰注文中壊字上疑有破字延壽猶與不聼師古曰與讀曰豫㑹其久病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起欲止焉湯怒按劒叱延壽曰大衆已集㑹豎子欲沮衆邪師古曰沮止也壊也音才汝反延壽遂從之部勒行陳益置揚威白虎合騎之校張晏曰西域陳法之名也師古曰張説非也一校則别為一部軍故稱校耳湯特新置此等諸校名以為威聲也漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制陳言兵狀即日引軍分行别為六校其三校從南道踰葱領徑大宛其三校都䕶}
