  - {type: variant, offset: 7801, length: 2, content: 張譚, krp: 繁延壽師古曰繁音蒲胡反以為郅支及名王首更歴諸國蠻夷莫不聞知師古曰更音工衡反月令春掩骼埋胔之時應劭曰禽獸之骨曰骼骼大也鳥䑕之骨曰胔胔可惡也臣瓉曰枯骨曰骼有肉曰胔師古曰瓚説是也骼音工客反胔音才賜反宜勿縣車騎將軍許嘉右將軍王商以為春秋夾谷之㑹優施笑君孔子誅之師古曰夾谷地名即祝其也定十年公㑹齊侯於夾谷孔子攝相事齊侯奏宫中之樂俳優侏儒戲於前孔子歴階而上曰匹失侮諸侯者罪應誅於是斬侏儒首足異處齊侯懼有慙色施者優人之名夾音頰方盛夏首足異門而出宜縣十日廼埋之有詔將軍議是初中書令石顯嘗欲以姊妻延夀延壽不取及丞相御史亦惡其矯制}
  - {type: substitution, offset: 7802, original: 譚, replacement: 談, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20152}}
  - {type: variant, offset: 7804, length: 3, content: 阿附畏, WYG: 不與湯師古曰與猶許也湯素貪所鹵獲財物入塞多不法師古曰不法者私自取之不依軍法司𨽻校尉移書道上繫吏士按騐之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅師古曰師入曰振旅振整也旅衆也宜有使者迎勞道路師古曰勞音力到反今司𨽻反逆收繫按驗是為郅支報讐也上立出吏士令縣道具酒食以過軍旣至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危徼幸生}
