  - {type: variant, offset: 1032, length: 2, content: 秉政, WYG: 風恵以便宜從事師古曰言至前所專命而行也風讀曰諷恵與吏士五百人俱至烏孫還過發西國兵二萬人令副使發龜兹東國二萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰廼我先王時為貴人姑翼所誤耳我無罪恵曰即如此縛姑翼来吾置王師古曰置猶放宋祁曰注文放字下疑有也字王執姑翼詣恵恵斬之而還後代蘇武為典屬國眀習外國事勤勞數有功甘露中後將軍趙充國薨天子遂以恵為右將軍典屬國如故宣帝崩恵事元帝三嵗薨諡曰壯武侯傳國至曾孫建武中廼絶鄭吉㑹稽人也以卒伍從軍數出西域由是為郎吉為人彊執習外國事師古曰彊力而有執志者自張騫通西域李}
