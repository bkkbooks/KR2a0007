  - {type: variant, offset: 8395, length: 257, content: 當發吏及長安繫者三月間千人以上尊出行縣男子郭賜自言尊許仲家十餘人共殺賜兄賞公歸舍吏不敢捕尊行縣還上奏曰彊不陵弱各得其所寬大之政行和平之氣通御史大夫中奏尊暴虐不改外為大言倨嫚姍上威信日廢不宜備位九卿尊坐免吏民多稱惜之湖三老公乘興等上書訟尊京兆功效日著往者南山盜賊阻山橫行剽劫良民殺奉法吏道路不通城門至以警戒步兵校尉使逐捕暴師露眾曠日煩費不能禽制二卿坐黜群盜寖強吏氣傷沮流聞四方為國家憂當此之時有能捕斬不愛金爵重賞關內侯寬中使問所徵故司隸校尉王尊捕群盜方略拜為諫大夫守京輔都尉行京兆尹事尊盡節勞心夙夜思職卑體下士厲奔北, WYG: 决執憲}
