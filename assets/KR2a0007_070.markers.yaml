  - {type: variant, offset: 9667, length: 208, content: 見言鳳不可任用宜更選忠賢上初納受章言後不忍退鳳章由是見疑遂為鳳所陷罪至大逆語在元后傳初章為諸生學長安獨與妻居章疾病無被臥牛衣中與妻決涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困戹不自激卬乃反涕泣何鄙也後章仕宦歷位及為京兆欲上封事妻又止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也書遂上果下廷尉獄妻子皆收繫章小女年可十二夜起號哭曰平生獄上呼囚數常至九今八而止我君素剛先死者必君明日問之章果死妻子皆徙合浦大, WYG: 南按此樂昌侯王商以右}
