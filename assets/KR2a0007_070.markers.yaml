  - {type: variant, offset: 9618, length: 5, content: 尊免後代者, WYG: 騎將以下三萬九千人西域傳作名王犁汙都尉千長騎以下四萬級而匈奴傳作名王犂汙都尉千長將以下三萬九千餘級鄭吉傳屯田渠黎臣召南按渠黎黎字應作犁傳冩誤耳使䕶鄯善以西南道臣召南按西域傳出西域有二道自鄯善西行至莎車為南道自車師前王庭西行至疏勒為北道本文西字應讀言䕶鄯善以西之南道也下北道亦然都䕶之置自吉始焉通鑑考異曰百官表云西域都䕶加官地節二年初置盖誤以神爵二年為地節二年也西域傳云神爵三年亦誤陳湯傳由是遂西破呼偈臣召南按呼偈匈奴傳作烏揭又乗勝驕胡三省曰郅支嘗破殺閏振攻破呼韓邪又殺伊利月屢破烏孫兵故驕也投都頼水中注郅支水名臣召南按注稍誤盖康居國水名而郅支来築城其地故下文曰前至郅支城都頼水上也故使都䕶將軍來臣召南按都䕶}
