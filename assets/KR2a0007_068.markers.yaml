  - {type: variant, offset: 44, length: 0, content: '', WYG: 重師古曰椒房殿皇后所居皇后親安女光廼其外祖而顧專制朝事師古曰顧猶反也繇是與光争權師古曰繇讀與由同燕王旦自以昭帝兄常懐怨望及}
  - {type: variant, offset: 44, length: 0, content: '', krp: 重師古曰椒房殿皇后所居皇后親安女光廼其外祖而顧專制朝事師古曰顧猶反也繇是與光争權師古曰繇讀與由同燕王旦自以昭帝兄常懐怨望及}
