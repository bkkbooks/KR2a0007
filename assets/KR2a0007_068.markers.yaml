  - {type: 'tls:seg', offset: 23, content: '', id: KR2a0007_tls_068-1a.5}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 王胥皆多過失是時上年老寵姬鉤弋趙倢伃有男師古曰倢伃居鉤弋宫故稱之上心欲以為嗣命大臣輔之察羣臣唯光任大重可屬社稷師古曰任堪也屬委也任音壬屬音之欲反上廼使黃門畫者畫周公負成王朝諸侯以賜光師古曰黄門之署職任親近以供天子百物在焉故亦有畫工後元二年春上游五柞宮病篤光涕泣問曰如有不諱誰當嗣者師古曰不諱言不可諱也上曰君未諭前畫意耶師古曰諭曉也立}
  - {type: page-break, offset: 23, content: '', id: KR2a0007_WYG_068-2b, image: WYG0250/WYG0250-0440d.png}
  - {type: variant, offset: 23, length: 0, content: '', krp: 王胥皆多過失是時上年老寵姬鉤弋趙倢伃有男師古曰倢伃居鉤弋宫故稱之上心欲以為嗣命大臣輔之察羣臣唯光任大重可屬社稷師古曰任堪也屬委也任音壬屬音之欲反上廼使黃門畫者畫周公負成王朝諸侯以賜光師古曰黄門之署職任親近以供天子百物在焉故亦有畫工後元二年春上游五柞宮病篤光涕泣問曰如有不諱誰當嗣者師古曰不諱言不可諱也上曰君未諭前畫意耶師古曰諭曉也立}
