  - {type: variant, offset: 2669, length: 1, content: 寄, WYG: 傳諡常為孝者以長有天下宋祁曰孝者下當添所字令宗廟血食也如令漢家絶祀師古曰如若也將軍雖死何面目見先帝於地下乎今日之議不得旋踵師古曰宜速決羣臣後應者臣請劔斬之光謝曰九卿責光是也天下匈匈不安光當受難師古曰受其憂責也宋祁曰受難改作處難於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令師古曰言一聽之也光即與羣臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后廼車駕幸未央承明殿詔諸禁門毋内昌邑羣臣王入朝太后還乗輦欲歸温室中黄門宦者各持門扇王入門閉昌邑羣臣不得入王曰何為大將軍跪曰有皇太后詔毋内昌邑羣臣王曰徐之何廼驚人如是光使盡驅出昌邑羣臣置金馬門外車騎將軍安世將羽林騎收縛二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守王光勑左右謹宿衞卒有物故自裁令我負天下有殺主名師古曰卒讀曰猝物故死也自裁自殺也王尚未自知當廢謂左右我故羣臣從官安得罪而大將軍盡繫之乎師古曰安焉也頃之有太后詔召王王聞召意恐廼曰我安得罪而召我哉太后被珠襦如淳曰以珠飾襦也晉灼曰貫珠以為襦形若今革襦矣師古曰晉說是也盛服坐武帳中侍御數百人皆持兵期門武士陛㦸陳列殿下師古曰陛㦸謂執㦸以衞陛下也羣臣以次上殿召昌邑王伏前聽詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞師古曰楊敞也大司馬大將軍臣光車騎將軍臣安世師古曰張子孺度遼將軍臣明友師古曰范明友前將軍臣增師古曰韓增後將軍臣充國師古曰趙充國御史大夫臣誼師古曰蔡誼宜春侯臣譚師古曰王訢子當塗侯臣聖師古曰姓魏也隨桃侯臣昌樂師古曰姓趙故蒼梧王趙光子杜侯臣屠耆堂師古曰故胡人太僕臣延年師古曰杜延年太常臣昌師古曰蒲侯蘇昌大司農臣延年師古曰田延年宗正臣徳師古曰劉向父少府臣樂成師古曰姓史也廷尉臣光師古曰李光執金吾臣延夀師古曰李延夀大鴻臚臣賢師古曰韋賢左馮翊臣廣明師古曰田廣明右扶風臣徳師古曰周徳長信少府臣嘉師古曰不知姓典屬國臣武師古曰蘇武京輔都尉臣廣漢師古曰趙廣漢司𨽻校尉臣辟兵師古曰不知姓諸吏文學光祿大夫臣遷師古曰王遷臣畸師古曰宋畸臣吉師古曰景吉臣賜臣管臣勝臣梁臣長幸師古曰並不知姓也臣夏侯勝李竒曰同官同名故以姓别也大中大夫臣徳師古曰不知姓臣卬師古曰趙充國子也昧死言皇太后陛下臣敞等頓首死罪天子所以永保宗廟總壹海内者以慈孝禮誼賞罰為本}
