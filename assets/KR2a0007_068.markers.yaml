  - {type: variant, offset: 3544, length: 0, content: '', WYG: 太子寃廼夷滅充宗族黨與何羅兄弟懼及師古曰及謂及於禍也遂謀為逆日磾視其志意有非常心疑之隂獨察其動静與俱上下師古曰上下於殿也何羅亦覺日磾意}
