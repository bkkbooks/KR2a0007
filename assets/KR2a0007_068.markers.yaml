  - {type: variant, offset: 3572, length: 117, content: 所長嚮使丞相不先聞馭吏言何見勞勉之有掾史繇是益賢吉吉又嘗出逢清道群鬭者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行, WYG: 功廼得封侯時年俱八九嵗宣帝即位}
