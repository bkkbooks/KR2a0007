  - {type: variant, offset: 2925, length: 4, content: 躬親政省, WYG: 官太后為姨母遇之無禮馮子都數犯法上并以為譲師古曰總以此事責之也山禹等甚恐顯夢第中井水溢流庭下竈居樹上又夢大將軍謂顯曰知捕兒不師古曰知兒見捕不亟下捕之蘇林曰亟疾下捕之師古曰亟音居力反第中䑕暴多與人相觸以尾畫地鴞數鳴殿前樹上師古曰鴞惡聲之鳥也古者室屋髙大則通呼為殿耳非正天子宮中其語亦見黃霸傳鴞音羽驕反宋祁曰正天子姚改止天子第門自壞雲}
