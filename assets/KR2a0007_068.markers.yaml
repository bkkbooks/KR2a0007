  - {type: variant, offset: 51, length: 1, content: 客, WYG: 建造酒𣙜鹽鐵為國興利伐其功師古曰伐矜也欲為子弟得官亦怨恨光於是蓋主上官桀安及𢎞羊皆與燕王旦通謀}
  - {type: variant, offset: 51, length: 1, content: 客, krp: 建造酒𣙜鹽鐵為國興利伐其功師古曰伐矜也欲為子弟得官亦怨恨光於是蓋主上官桀安及𢎞羊皆與燕王旦通謀}
