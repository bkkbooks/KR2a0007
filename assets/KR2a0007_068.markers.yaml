  - {type: variant, offset: 3130, length: 389, content: 上憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果瘉吉上書固辭自陳不宜以空名受賞上報曰朕之封君非空名也而君上書歸侯印是顯朕之不德也方今天下少事君其專精神省思慮近醫藥以自持後五歲代魏相為丞相吉本起獄法小吏後學詩禮皆通大義及居相位上寬大好禮讓掾史有罪臧不稱職輒予長休告終無所案驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉因以為故事公府不案吏自吉始於官屬掾史務掩過揚善吉馭吏耆酒數逋蕩嘗從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之此不過汙丞相車茵耳遂不去也此馭吏邊郡人習知邊塞發犇命警備事嘗出適見驛騎持赤白囊邊郡發犇命書馳來至馭吏因隨驛騎至公車刺取知虜入雲中代郡遽歸府見吉白狀因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視吉善其言召東曹案邊長吏瑣科條其人未已詔, WYG: ''}
