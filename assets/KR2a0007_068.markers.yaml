  - {type: 'tls:seg', offset: 2687, content: '', id: KR2a0007_tls_068-9a.20}
  - {type: variant, offset: 2687, length: 1, content: 發, WYG: 也斬縗謂縗裳下不緶直斬割之而已緶音歩千反亡悲哀之心廢禮誼居道上不素食師古曰素食菜食無肉也言王在道常肉食非居}
  - {type: page-break, offset: 2687, content: '', id: KR2a0007_WYG_068-10a, image: WYG0250/WYG0250-0444c.png}
  - {type: variant, offset: 2687, length: 1, content: 發, krp: 也斬縗謂縗裳下不緶直斬割之而已緶音歩千反亡悲哀之心廢禮誼居道上不素食師古曰素食菜食無肉也言王在道常肉食非居}
  - {type: variant, offset: 2690, length: 0, content: '', WYG: 制也而鄭康成觧喪服素食云平常之食失之逺矣素食義亦見王莽傳使從官畧女子載衣車内所居傳舎始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前孟康曰漢初有三璽天子之璽自佩行璽信璽在符莭臺大行前昭帝柩前也韋昭曰大行不反之辭也就次發璽不封師古曰璽既國噐常當緘封而王於大行前受之退還所次遂爾發漏更不封之得令凢人皆見言不重慎也從官更持節師古曰更音工衡反次下亦同引内昌邑從官騶宰官奴二百餘人常與居禁闥内敖戲自之符璽取節十六師古曰之徃也自徃至署取節也朝暮臨師古曰臨哭臨也力禁反令從官更持節從師古曰更互執節従至哭臨之所為書曰皇帝問侍中君卿師古曰昌邑之侍中名君􅀸也使中御府令高昌奉黄金千斤賜君卿取十妻大行在前殿發樂府樂噐引内昌邑樂人撃鼓歌吹作俳倡師古曰俳優諧戲也倡樂人也俳音排㑹下還上前殿如淳曰下謂柩之入冡葬還不居喪位便處前殿也師古曰下音胡稼反撃鐘磬召内泰壹宗廟樂人輦道牟首鄭氏曰祭泰壹神樂人也孟康曰牟首地名也上有觀如淳曰輦道閣道也牟首屏面也以屏面自隔無哀戚也臣瓚曰牟首池名也在上林苑中方在衰絰而輦游於池言無哀戚也師古曰召泰壹樂人内之於輦道牟首而鼓吹歌舞也牟首瓚説是也屏面之言失之逺矣又左思吳都賦云長塗牟首劉逵以為牟首閣道有室屋也此說更無所出或者思及逵據此輦道牟首便誤用之乎劉敞曰輦道輦仁之牟首也予謂牟者岑牟也岑牟盖鼓角士胄即禰衡為鼓吏所著者鼓吹歌舞悉奏衆樂發長安厨三太牢具祠閣室中如淳曰黄圖北出中門有長安厨故謂之厨城門閣室閣道之有室者不知禱何淫祀也祀已與從官飲㗖師古曰啗食也音徒敢反駕法駕皮軒鸞旗驅馳北宮桂宮弄彘鬬虎師古曰皮軒鸞旗皆法駕所陳也北宮桂宮並在未央宮北召皇太后御小馬車張晏曰皇太后所駕遊宮中輦車也漢廐有果下馬髙三尺以駕輦師古曰小馬可於果樹下乗之故號果下馬使官奴騎乗遊戲掖庭中與孝昭皇帝宮人蒙等淫亂詔掖庭令敢泄言要斬太后曰止師古曰令且止讀奏為人臣子當悖亂如是邪師古曰責王也悖乖也音布内反王離席伏尚書令復讀曰取諸侯王列侯二千石綬及墨綬黄綬以幷佩昌邑郎官者免奴師古曰免奴謂免放為良人者變易節上黃旄以赤師古曰以劉屈氂與戾太子戰加節上黄旄遂以為常賀今輒改之發御府金錢刀劒玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒師古曰湛讀曰沉又讀曰躭沈沔荒迷也詔太官上乗輿食如故食監奏未釋服未可御故食師古曰釋謂觧脫也復詔太官趣具無闗食監師古曰趣讀曰促闗由也太官不敢具即使從官出買雞豚詔殿門内以為常師古曰内入也令每日常入雞豚也獨夜設九賔温室師古曰於温室中設九賔之禮也九賔觧在叔孫通傳延見姊夫昌邑闗内侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝師古曰時在喪服故未祠宗廟而私祭昌邑哀王也受璽以來二十七日使者旁午如淳曰旁午分布也師古曰一縦一横為旁午猶言交横也持節詔諸官署徵發凡千一百二十七事文學光祿大夫夏侯勝等及侍中傅嘉數進諫以過失使人簿責勝師古曰簿音步戸反簿責以文簿具責之縛嘉繫獄荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諫不變更師古曰更改也}
