  - {type: 'tls:seg', offset: 2859, content: '', id: KR2a0007_tls_068-9a.45}
  - {type: variant, offset: 2859, length: 0, content: '', WYG: 之永巷也廣治第室作乗輿輦加畫繡絪馮黃金塗如淳曰絪亦茵馮謂所馮者也以黄金塗飾之師古曰茵蓐也以繡為茵馮而黄金塗於輦也宋祁曰於姚改輿韋絮薦輪晉灼曰御輦以韋緣輪著之以絮師古曰取其行安不揺動也著音張呂反侍婢以五采絲輓顯游戲第中師古曰輓謂牽引車輦也音晚初光愛幸監奴馮子都常與計事及顯寡居與子都亂晉灼曰漢語東閭氏亡顯以婢代立素與馮殷姦也師古曰監奴謂奴之監知家務者也殷者子都之名而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出師古曰請音才姓反多從賔客張圍獵黃山苑中使蒼頭奴上朝謁文頴曰朝當用謁不自行而令奴上謁者也師古曰上謁若今􅄁見尊貴而通名也莫敢譴者而顯及諸女晝夜出入長信宮殿中亡期度師古曰長信宮上官太后所居}
