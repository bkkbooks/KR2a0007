  - {type: variant, offset: 54, length: 1, content: 御, krp: 䟆孟康曰都試也肄習也師古曰謂總閱試習武備也太官先置師古曰供飲食之具又引蘇武前使匈奴拘留二十年不降還廼為典屬國而大將軍長}
  - {type: variant, offset: 56, length: 0, content: '', WYG: 敞亡功為捜粟都尉師古曰楊敞也又擅調益莫府校尉師古曰調選也莫府大將軍府也調音徒釣反光専權自恣疑有非常臣旦願歸符璽入宿衞察姦臣變候司光出沐日奏之桀欲從中下其事師古曰下謂下有司也音胡稼反桑𢎞羊當與諸大臣共執退光書奏帝不肯下眀旦光聞之}
