  - {type: variant, offset: 2920, length: 0, content: '', WYG: 魏相給事中顯謂禹雲山女曹不務奉大將軍餘業師古曰女音汝曹軰也今大夫給事中他人壹間女能復自救邪師古曰間音居莧反後兩家奴爭道師古曰謂霍氏及御史家霍氏奴入御史府欲躢大夫門御史爲叩頭謝廼去人以謂霍氏師古曰告語也顯等始知憂㑹魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山自若領尚書師古曰自若猶言如故也上令吏民得奏封事不闗尚書羣臣進見獨徃來師古曰謂各各得盡言於上也於是霍氏甚惡之宣帝始立微時許妃為皇后宋祁曰微字上别本更有立字顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后師古曰乳醫視産乳之疾者乳音而樹反因勸光内成君代立為后語在外戚傳始許后暴崩吏捕諸醫劾衍侍疾亡狀不道下獄吏簿問急師古曰簿音歩戸反顯恐事敗即具以實語光光大驚宋祁曰語疑作告欲自發舉不忍猶與師古曰猶與不決也與讀曰豫㑹奏上因署衍勿論師古曰署者題其奏後也光薨後語稍泄宋祁曰稍下疑有漏字於是上始聞之而未察師古曰未知其虛實廼徙光女壻度遼將軍未央衞尉平陵侯范眀友為光祿勲次壻宋祁曰次字下當有女字諸吏中郎將羽林監任勝出為安定太守數月復出光姊壻給事中光祿大夫張朔為蜀郡太守羣孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衞尉鄧廣漢為少府更以禹為大司馬冠小冠亡印綬罷其右將軍屯兵官屬特使禹官名與光俱大司馬者蘇林曰特但也宋祁曰使禹官名字刪官字名下當添為字又收范眀友度遼將軍印綬但為光祿勲及光中女壻趙平為散騎騎都尉光祿大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宮衞將屯兵悉易以所親信許史子弟代之禹為大司馬稱病禹故長史任宣候問禹曰我何病縣官非我家將軍不得至是如淳曰縣官謂天子今將軍墳墓未乾盡外我家師古曰外謂疏斥之反任許史奪我印綬令人不省死師古曰不自省有過耳宣見禹恨望深師古曰望怨也廼謂曰大將軍時何可復行師古曰言今何得復如此也持國權柄殺生在手中廷尉李种王平師古曰种音冲左馮翊賈勝胡及車丞相女壻少府徐仁皆坐逆將軍意下獄死使樂成小家子得幸將軍至九卿封侯師古曰即上所云少府樂成者也使者其姓也字或作史百官以下但事馮子都王子方等服䖍曰皆光奴視丞相亡如也師古曰亡如猶言無所象似也各自有時今許史自天子骨肉貴正宜耳大司馬欲用是怨恨愚以為不可禹黙然數日起視事顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令以公田賦與貧民發揚大將軍過失又諸儒生多窶人予師古曰窶貧而無禮音其羽反逺客饑寒喜妄說狂言師古曰喜音許吏反不避忌諱大將軍常讐之師古曰言嫉之如仇讐也今陛下好與諸儒生語人人自使書封事多言我家者嘗有上書言大將軍時主弱臣强専制擅權今其子孫用事昆弟益驕恣恐危宗廟灾異數見盡為是也其言絶痛山屏不奏其書後上書者益黠盡奏封事輒下中書令出取之宋祁曰輒下添使字不闗尚書益不信人顯曰丞相數言我家獨亡罪乎山曰丞相㢘正安得罪我家昆弟諸壻多不謹又聞民間讙言霍氏毒殺許皇后師古曰讙衆聲也音許爰反寕有是邪顯恐急即具以實告山雲禹山雲禹驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小奈何於是始有邪謀矣初趙平客石夏善為天官師古曰曉星文者語平曰熒惑守御星御星太僕奉車都尉也不黜則死平内憂山等雲舅李竟所善張赦見雲家卒卒師古曰卒讀曰猝怱遽之貎也謂竟曰今丞相與平恩侯用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦石夏等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也師古曰重難也竟窮竟其事也然惡端已見又有弑許后事陛下雖寛仁恐左右不聽久之猶發發即族矣不如先也師古曰言先反遂令諸女各歸報其夫皆曰安所相避師古曰言無處相避當受禍也㑹李竟坐與諸侯王交通辭語}
