  - {type: variant, offset: 30, length: 3, content: 舉賢良, WYG: 大夫皆拜卧内牀下師古曰於天子所卧牀前拜職受遺詔輔少主明日武帝崩太子襲尊號是為孝昭皇帝帝年八嵗政事壹决於光先是後元年侍中僕射莽何羅與弟重合侯通謀為逆師古曰莽音莫戸反時光與金日磾上官桀等共誅之功未錄武帝病封璽書曰帝崩發書}
