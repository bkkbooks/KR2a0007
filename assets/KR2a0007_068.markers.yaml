  - {type: variant, offset: 42, length: 1, content: 頃, WYG: 得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慙自先帝時桀已為九卿位在光右師古曰右上也及父子並為將軍有椒房中宮}
  - {type: page-break, offset: 42, content: '', id: KR2a0007_WYG_068-4b, image: WYG0250/WYG0250-0441d.png}
