  - {type: variant, offset: 3546, length: 1, content: 譴, WYG: 發是時上行幸林光宮服䖍曰甘泉一名林光師古曰秦之林光宮胡亥所造漢又於其旁起甘泉宮日磾小疾卧廬師古曰殿中所止曰廬何羅與通及小弟安成矯制夜出共殺使者發兵明旦上未起何羅無何從外入師古曰無何猶言無故也日磾奏厠心動師古曰奏向也日磾方向厠而心動立入坐内戸下須臾何羅褏白刃從東廂上師古曰置刃於衣褏中也褏古袖字見日磾色變走趨卧内欲入師古曰趨讀曰趣嚮也卧内天子卧處行觸寳瑟僵日磾得抱何羅因傳曰莽何羅反師古曰傳謂傳聲而唱之上驚起左右㧞刃欲格之上恐并中日磾師古曰中音竹仲反止勿格日磾捽胡投何羅殿下孟康曰胡音互捽胡若今相僻卧輪之類也晉灼曰胡頸也捽其頸而投殿下也師古曰晉說是也捽音才兀反宋祁曰卧輪當改卧輸得禽縛之窮治皆伏辜繇是著忠孝節師古曰繇讀與由同日磾自在左右目不忤視者數十年師古曰忤逆也賜出宮女不敢近上欲納其女後宮不肯其篤慎如此上尤竒異之及上病屬霍光以輔少主師古曰屬音之欲反宋祁曰及上下當添疾字光}
  - {type: page-break, offset: 3546, content: '', id: KR2a0007_WYG_068-27b, image: WYG0250/WYG0250-0453b.png}
