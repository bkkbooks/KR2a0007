  - {type: variant, offset: 3690, length: 136, content: 罰而已宰相不親小事非所當於道路問也方春少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職當憂是以問之掾史乃服以吉知大體五鳳三年春吉病篤上自臨問吉曰君即有不諱誰可以自代者吉辭謝曰群臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前, WYG: ''}
