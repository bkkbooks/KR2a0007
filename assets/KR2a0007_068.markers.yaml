  - {type: variant, offset: 160, length: 561, content: 我用丞相死不能遇其子使當世貴人非我殆矣武庫令西至長安大將軍霍光果以責過相曰幼主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令今河南太守不深惟國家大策苟見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄久繫踰冬會赦出復有詔守茂陵令遷楊州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫與相書曰朝廷已深知弱翁治行方且大用矣願少慎事自重臧器于身相心善其言為霽威嚴居部二歲徵為諫大夫復為河南太守數年宣帝即位徵相入為大司農遷御史大夫四歲大將軍霍光薨上思其功德以其子禹為右將軍兄子樂平侯山復領尚事書相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以來祿去王室政繇冢宰今光死子復為大將軍兄子秉樞機昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宮或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散陰謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞乃罷其三侯令就第親屬皆出補吏於是韋賢以老病免相遂代為丞相封高平侯食邑八百戶及霍氏怨相又憚之謀矯太后詔先召斬丞相然後廢, WYG: ''}
