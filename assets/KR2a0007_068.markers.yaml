  - {type: variant, offset: 39, length: 2, content: 茂陵, WYG: 秺侯上官桀為安陽侯光為博陸侯文穎曰博大陸平取其嘉名無此縣也食邑北海河東城師古曰蓋亦取鄉聚之名以為國號非必縣也公孫𢎞平津鄉則是矣皆以前捕反者功封時衞尉王莽子男忽侍中師古曰即右將軍王莽也其子名忽揚語曰師古曰揚謂宣唱之帝病忽常在左右安得遺詔封三子事師古曰安猶焉羣兒自相貴耳光聞之切譲王莽師古曰切深也譲責也莽酖殺忽光為人沈静詳審長財七尺三寸師古曰財與纔同白晢疏眉目美須䫇師古曰晢潔白也䫇頬毛也晳音先厯反䫇音人占反毎出入下殿門止進有常處郎僕射竊識視之不失尺寸師古曰識記也音式志反其資性端正如此初輔幼主政自己出師古曰自從也天下想聞其風采師古曰采文采殿中嘗有怪一夜羣臣相驚光召尚符璽郎師古曰恐有變難故欲收取璽郎不肯授光光欲奪之郎按劒曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光師古曰多猶重也以此事為多足重也光與左將軍桀結㛰相親光長女為桀子安妻有女年與帝相配晉灼曰漢語光嫡妻東閭氏生安夫人昭后之母也桀因帝姊鄂邑蓋主内安女後宮為倢伃師古曰鄂邑所食邑為蓋侯所尚故云蓋主也數月立為皇后父安為票騎將軍封桑樂侯光時休沐出桀輒入代光決事桀父子旣尊盛而徳長公主師古曰懐其恩徳也公主内行不修近幸河間丁外人桀安欲為外人求封幸依國家故事以列侯尚公主者光不許又為外人求光祿大夫欲}
