  - {type: variant, offset: 2612, length: 0, content: '', WYG: 武帝六男獨有廣陵王胥在羣臣議所立咸持廣陵王王本以行失道先帝所不用光内不自安郎有上書言周太王廢太伯立王季文王舎伯邑考立武王唯在所宜師古曰太伯者王季之兄伯邑考文王長子也雖廢長立少可也廣陵王不可以承宗廟言合光意光以其書視丞相敞等師古曰視讀曰示敞即楊敞也擢郎為九江太守即日承皇太后詔遣行}
