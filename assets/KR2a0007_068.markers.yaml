  - {type: variant, offset: 2750, length: 0, content: '', WYG: 知亦已長大而抱子矣實不幼少也五辟之屬莫大不孝師古曰五辟即五刑也辟音頻亦反周襄王不能事母春秋曰天王出居于鄭繇不孝出之絶之於天下也師古曰㐮王惠王子也僖二十四年經書天王出居于鄭公羊傳曰王者無外此其言出何不能乎母也繇讀與由同宗廟重於君陛下未見命高廟不可以承天序奉祖宗廟子萬姓當廢臣請有司御史大夫臣誼宗正臣徳太常臣昌與太祝以一太牢具告祠髙廟臣敞等昧死以}
