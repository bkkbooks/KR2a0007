  - {type: variant, offset: 3548, length: 3, content: 而吉見, WYG: 日磾日磾曰臣外國人且使匈奴輕漢於是遂為光副光以女妻日磾嗣子賞初武帝遺詔以討莽何羅功封日磾為秺侯師古曰秺音丁故反日磾以帝少不受封輔政嵗餘病困大將軍光白封日磾卧授印綬一日薨賜葬具冢地送以輕車介士軍陳至茂陵諡曰敬侯日磾兩子賞建俱侍中與昭帝略同年共卧起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上}
