  - {type: variant, offset: 2627, length: 0, content: '', WYG: 問所親故吏大司農田延年延年曰將軍為國柱石師古曰柱者梁下之柱石者承柱之礎也言大臣負國重任如屋之柱及其石也審此人不可何不建白太后師古曰立議而白之更選賢而立之光曰今欲如是於古嘗有此不師古曰光不渉學故有此問也延年曰伊尹相殷廢太甲以安宗廟後世稱其忠師古曰商書太甲篇曰太甲旣立弗明伊尹放諸桐是也將軍若能}
