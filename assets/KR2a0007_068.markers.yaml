  - {type: variant, offset: 4366, length: 0, content: '', WYG: 還歸家以眀為人後之誼益封之後莽復用欽弟遵封侯歴九卿位贊曰霍光以結髪内侍起於階闥之間確然秉志誼形於主師古曰形見也受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官師古曰仆頓也音赴因權制敵以成其忠處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此師古曰阿衡伊尹官號也阿倚也衡平也言天下所倚羣下取平也然光不學亡術闇於大理隂妻邪謀晉灼曰不揚其過也立女為后湛溺盈溢之欲以增顚覆之禍師古曰湛讀曰沈死財三年宗族誅夷師古曰財與纔同哀哉昔霍叔封於晉師古曰霍叔文王之子武王之弟也晉即河東光豈其苗裔乎金日磾夷狄亡國羈虜漢庭而以篤敬寤主忠信}
