  - {type: variant, offset: 1423, length: 1184, content: 之畜尚謂之急元鼎二年平原勃海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此賴明詔振捄乃得蒙更生今歲不登穀暴騰踴臨秋收歛猶有乏者至春恐甚亡以相恤西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備唯陛下留神元元帥繇先帝盛德以撫海內上施行其策又數表采易陰陽及明堂月令奏之曰臣相幸得備員奉職不修不能宣廣教化陰陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇陰陽陰陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓頊乘坎執權司冬中央之神黃帝乘坤艮執繩司下土茲五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則飢秋興震治則華冬興離治則泄夏興坎治則雹明王謹於尊天慎于養人故立羲和之官以乘四時節授民事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生五穀熟絲麻遂屮木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民說上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡廉恥寇賊姦宄所繇生也臣愚以為陰陽者王事之本群生之命自古賢聖未有不繇者也天子之義必純取法天地而觀於先聖高皇帝所述書天子所服第八曰大謁者臣章受詔長樂宮曰令群臣議天子所服以安治天下相國臣何御史大夫臣昌謹與將軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年壽永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫朝錯為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知陰陽者四人各主一時時至明言所職以和陰陽天下幸甚相數陳便宜上納用焉相敕掾史案事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之時丙吉為御史大夫同心輔政上皆重之相為人嚴毅不如吉寬視事九歲神爵三年薨諡曰憲侯子弘嗣甘露中有罪削爵為關內侯丙吉字少卿魯國人也治律令為魯獄史積功勞稍遷至廷尉右監坐法失官歸為州從事武帝末巫蠱事起吉以故廷尉監徵詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉見而憐之又心知太子無事實重哀曾孫無辜吉擇謹厚女徒令保養曾孫置閒燥處吉治巫蠱事連歲不決後元二年武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人亡辜死者猶不可況親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生恩及四海矣曾孫病幾不全者數焉吉數敕保養乳母加致醫藥視遇甚有恩惠以私財物給其衣食後吉為車騎將軍軍市令遷大將軍長史霍光甚重之入為光祿大夫給事中, WYG: ''}
