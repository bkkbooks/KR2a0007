  - {type: variant, offset: 3541, length: 2, content: 能詳, WYG: 得遂其謀師古曰遂成也皆讎有功晉灼曰讎等也師古曰言其功相等類也封章為博成侯忠高昌侯惲平通侯安上都成侯高樂陵侯初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之師古曰右上也霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待廼上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行師古曰灼謂被焼炙者也行音胡郎反餘各以功次坐而不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患師古曰鄉讀曰嚮次下亦同也今論功而請賔曲突徙薪亡恩澤燋頭爛額為上客邪主人廼寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄕使福說得行則國無裂土出爵之費臣亡逆亂誅滅之敗徃事既已而福獨不䝉其功唯陛下察之貴徙薪曲突之策使居焦髪灼爛之右師古曰右上也上廼賜福帛十疋後以為郎宣帝始立謁見高廟大將軍光從驂乗上内嚴憚之若有芒刺在背後車騎將軍張安世代光驂乗天子從容肆體甚安近焉師古曰肆放也展也近音鉅靳反及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乗師古曰萌謂始生也至成帝時為光置守冡百家吏卒奉祠焉元始二年封光從父昆弟曾孫陽為博陸侯千戸金日磾字翁叔師古曰磾音丁奚反本匈奴休屠王太子也師古曰休音許蚪反屠音儲武帝元狩中票騎將軍霍去病將兵擊匈奴右地多斬首虜獲休屠王祭天金人宋祁曰去病傳作天祭金人其夏票騎復西過居延攻祁連山大克獲於是單于怨昆邪休屠居西方多為漢所破師古曰昆音下門反召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之幷將其衆降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱没入官輸黃門養馬時年十四矣久之武帝游宴見馬師古曰方於宴游之時而召閱諸馬後宮滿側日磾等數十人牽馬過殿下莫不竊視師古曰視宮人至日磾獨不敢日磾長八尺二寸容貎甚嚴馬又肥好上異而問之具以本狀對上竒焉卽日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾旣親近未嘗有過失上甚信愛之賞賜累千金出則驂乗入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉日磾母教誨兩子甚有法度上聞而嘉之病死宋祁曰病疑作母詔圖畫於甘泉宮署曰休屠王閼氏師古曰題其畫日磾每見畫常拜鄕之涕泣然後廼去師古曰鄉讀曰嚮日磾子二人皆愛為帝弄兒常在旁側弄兒或自後擁上項師古曰擁抱也日磾在前見而目之師古曰目視怒也弄兒走且啼曰翁怒上謂日磾何怒吾兒為其後弄兒壯大不謹自殿下與宮人戲日磾適見之惡其淫亂遂殺弄兒弄兒即日磾長子也上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀為之泣已而心敬日磾初莽何羅與江充相善及充敗衛太子何羅弟通用誅太子時力戰得封後上}
