  - {type: variant, offset: 4058, length: 0, content: '', WYG: 至衞尉敞為人正直敢犯顔色左右憚之唯上亦難焉師古曰臣下皆敬憚唯有天子一人亦難之病甚上使使者問所欲以弟岑為託上詔岑拜為使主客服䖍曰官名屬鴻臚主胡客也宋祁曰拜為下當添郎字敞子渉本為左曹上拜渉為侍中使待幸綠車載送衛尉舍李竒曰輦綠車常設以待幸也臨敞病困拜子為侍中以此車送欲敞見其榮寵也如淳曰幸綠車常置左右以待召載皇孫今遣渉歸以皇孫車載之寵之也晉灼曰漢注綠車名皇孫車太子有子乘以從師古曰如晉二說是也須臾卒敞三子渉參饒渉眀經儉莭諸儒稱之成帝時為侍中騎都尉領三輔胡越騎師古曰胡越騎之在三輔者若長水長楊宣曲之屬是也哀帝即位為奉車都尉至長信}
