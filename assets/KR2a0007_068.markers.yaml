  - {type: variant, offset: 54, length: 1, content: 御, WYG: 䟆孟康曰都試也肄習也師古曰謂總閱試習武備也太官先置師古曰供飲食之具又引蘇武前使匈奴拘留二十年不降還廼為典屬國而大將軍長}
