  - {type: variant, offset: 3538, length: 0, content: '', WYG: 任宣為代郡太守山又坐寫祕書顯為上書獻城西第入馬千匹以贖山罪書報聞師古曰不許之㑹事發覺雲山眀友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市唯獨霍后廢處昭臺宮與霍氏相連坐誅滅者數千家上廼下詔曰廼者東織室令史張赦使魏郡豪李竟報冠陽侯雲謀為大逆師古曰觧在宣紀也朕以大將軍故抑而不揚冀其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟子冠陽侯雲樂平侯山諸姊妹壻謀為大逆欲詿誤百姓頼宗廟神靈先發得咸伏其辜師古曰事發而捕得朕甚悼之諸為霍氏所詿誤事在丙申前未發覺在吏者皆赦除之男子張章先發覺以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上書以聞侍中史高與金安上建發其事師古曰言共立意發之也言無入霍氏禁闥}
  - {type: page-break, offset: 3538, content: '', id: KR2a0007_WYG_068-23b, image: WYG0250/WYG0250-0451b.png}
