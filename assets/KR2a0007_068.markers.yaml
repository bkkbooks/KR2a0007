  - {type: variant, offset: 4195, length: 4, content: 不受復還, WYG: 金欽以家世忠孝為金氏友徙光祿大夫侍中秩中二千石封都成侯時王莽新誅平帝外家衞氏召眀禮少府宗伯鳳如淳曰宗伯姓入說為人後之誼白令公卿將軍侍中朝臣並聽師古曰白令皆聽之欲以内厲平帝而外塞百姓之議師古曰塞止也欽與族昆弟秺侯當俱封初當曾祖父日磾傳子節侯賞而欽祖父安上傳子夷侯常皆亡子國絶故莽封欽當奉其後當母南即莽母功顯君同産弟也當上南大行為大夫人文穎曰南名也大行官名當上名狀於大行也鄧展曰當上南為大夫人恃莽姨母故耳為父立廟非也欽因緣謂當詔書陳日磾功亡有賞語當名為以孫繼祖也自當為父祖父立廟晉灼曰當是賞弟建之孫此言自當為其父}
