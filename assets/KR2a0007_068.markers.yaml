  - {type: variant, offset: 2751, length: 0, content: '', WYG: 皇太后詔曰可光令王起拜受詔王曰聞天子有争臣七人雖亡道不失天下師古曰引孝經之言光曰皇太后詔廢安得天子廼即持其手師古曰即就也觧脫其璽組奉上太后扶王下殿出金馬門羣臣随送王西面拜宋祁曰西疑作四曰愚戇不任漢事起就乗輿副車大將軍光送至昌邑邸光謝曰王行自絶}
