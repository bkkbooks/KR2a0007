  - {type: variant, offset: 2856, length: 0, content: '', WYG: 就齋宗正府入未央宮見皇太后封為陽武侯師古曰觧並在宣紀軨音零已而光奉上皇帝璽綬謁于髙廟是為孝宣皇帝眀年下詔曰夫褒有徳賞元功古今通誼也大司馬大將軍光宿衞忠正宣徳明恩守莭秉誼以安宗廟其以河北東武陽益封光萬七千戸與故所食凡二萬戸賞賜前後黃金七千斤錢六千萬雜繒三萬疋奴婢百七十人馬二千疋甲第一區自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宮衞尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據}
  - {type: page-break, offset: 2856, content: '', id: KR2a0007_WYG_068-15a, image: WYG0250/WYG0250-0447a.png}
  - {type: variant, offset: 2856, length: 0, content: '', krp: 就齋宗正府入未央宮見皇太后封為陽武侯師古曰觧並在宣紀軨音零已而光奉上皇帝璽綬謁于髙廟是為孝宣皇帝眀年下詔曰夫褒有徳賞元功古今通誼也大司馬大將軍光宿衞忠正宣徳明恩守莭秉誼以安宗廟其以河北東武陽益封光萬七千戸與故所食凡二萬戸賞賜前後黃金七千斤錢六千萬雜繒三萬疋奴婢百七十人馬二千疋甲第一區自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宮衞尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據}
  - {type: variant, offset: 2857, length: 0, content: '', WYG: 朝廷光自後元秉持萬機及上即位廼歸政上謙譲不受諸事皆先闗白光然後奏御天子光毎朝見上虛已歛容禮下之已甚師古曰下音胡稼反光秉政前後二十年地節二年春病篤車駕自臨問光病上為之涕泣光上書謝恩曰願分國邑三千戸以封兄孫奉車都尉山為列侯奉兄票騎將軍去病祀事下丞相御史即日拜光子禹為右將軍光薨上及皇太后親臨光喪太中大夫任宣與侍御史五人持節䕶喪事中二千石治莫府冡上如淳曰典為冡者賜金錢繒絮繡被百領衣五十箧璧珠璣玉衣師古曰漢儀注以玉為襦如鎧状連綴之以黃金為縷要已下玉為札長尺廣二寸半為甲下至足亦綴以黄金縷梓宮服䖍曰棺也師古曰以梓木為之親身之棺也為天子制故亦稱梓宮便房黃腸題湊各一具服䖍曰便房藏中便坐也蘇林曰以栢木黄心致累棺外故曰黄腸木頭皆内向故曰題湊如淳曰漢儀注天子陵中明中髙丈二尺四寸周二丈内梓宮次楩椁栢黄腸題湊師古曰便房小曲室也如氏以為楩木名非也劉敞曰以次言之先親身者衣被次梓宮次便房次題湊次外藏則當以如說為是也且出漢儀注宜以為信爾今但云曲室果用何木為之置於何所耶自是臆説耳宋祁曰小栢室也姚改小曲室也以為梓木姚改以為楩木樅木外臧椁十五具服䖍曰在正臧外婢妾臧也或曰厨廏之屬也蘇林曰樅木栢葉松身師古曰爾雅及毛詩傳並云樅木松葉栢身檜木乃栢葉松身耳蘇說非也樅音七庸反檜音工濶反字亦作栝東園溫眀服䖍曰東園處此器形如方漆桶開一面漆畫之以鏡置其中以懸屍上大斂并盖之師古曰東園署名也屬少府其署主作此器也皆如乗輿制度載光尸柩以輼輬車文穎曰輼輬車如今喪轜車也孟康曰如衣車有窻牖閉之則温開之則涼故名之輼輬車也臣瓚曰秦始皇道崩祕其事載以輼輬車百官奏事如故此不得是轜車類也案杜延年奏載霍光柩以輬車駕大廏白虎駟以輼車駕大廏白鹿駟為倅師古曰輼輬本安車也可以卧息後因載喪飾以栁翣故遂為喪車耳輼者密閉輬者旁開窻牖各别一乗随事為名後人既專以載喪又去其一總為藩飾而合二名呼之耳倅副也音千内反黃屋左纛師古曰觧在髙紀也發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿復土起冡祠堂置園邑三百家長丞奉守如舊法旣葬封山為樂平侯以奉車都尉領尚書事天子思光功徳下詔曰宋祁曰此詔紀中已有故大司馬大將軍博陸侯宿衞孝武皇帝三十餘年輔孝昭皇帝十有餘年遭大難躬秉誼率三公九卿大夫定萬世冊以安社稷天下蒸庶咸以康寕功徳茂盛朕甚嘉之復其後世疇其爵邑應劭曰疇等也師古曰復音方目反世世無有所與功如蕭相國師古曰與讀曰豫眀年夏封太子外祖父許廣漢為平恩侯復下詔曰宣成侯光宿衞忠正勤勞國家善善及後世師古曰善善者謂褒寵善人也其封光兄孫中郎將雲為冠陽侯禹既嗣為博陸侯太夫人顯改光時所自造塋制而侈大之師古曰塋墓域也音營起三出闕築神道北臨昭靈南出承恩服䖍曰昭靈承恩皆館名也李竒曰昭靈高祖母冡園也文穎曰承恩宣平侯冡園也師古曰服説是也文李並失之盛飾祠室輦閣通屬永巷而幽良人婢妾守之晉灼曰閣道乃通屬至永巷中也師古曰此亦其冡上作輦閣之道及永巷也非謂}
