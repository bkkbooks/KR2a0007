  - {type: variant, offset: 2752, length: 0, content: '', WYG: 天臣等駑怯不能殺身報徳臣寧負王不敢負社稷願王自愛臣長不復見左右師古曰言不復得侍見於左右光涕泣而去羣臣奏言古者廢放之人屏於逺方不及以政師古曰言不豫政令請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千戸昌邑羣臣坐亡輔導之誼䧟王於惡光悉誅殺二百餘人出死號呼市中師古曰呼音火故反曰當斷不斷反受其亂師古曰悔不早殺光等也光坐庭中會丞相以下議定所立廣陵王已前不用及燕刺王反誅其子不在議中近親唯有衛太子孫號皇曾孫在}
