  - {type: variant, offset: 22, length: 0, content: '', WYG: 陽侯家師古曰縣遣吏於侯家供事也與侍者衞少兒私通而生去病中孺吏畢歸家娶婦生光因絶不相聞久之少兒女弟子夫得幸於武帝立為皇后去病以皇后姊子貴幸旣壯大廼自知父為霍中孺未及求問㑹為票騎將軍擊匈奴道出河東河東太守郊迎負弩矢先驅師古曰郊迎迎於郊界之上也先驅者導其路也至平陽傳舎遣吏迎霍中孺中孺趨入拜謁將軍迎拜因跪曰去病不早自知為大人遺體也中孺扶服叩頭師古曰服音蒲北反曰老臣得託命將軍此天力也去病大為中孺買田宅奴婢而去還復過焉廼將光西至長安時年十餘嵗任光為郎稍遷諸曹侍中去病死後光為奉車都尉光祿大夫出則奉車入侍左右出入禁闥二十餘年師古曰宮中小門謂之闥小心謹慎未嘗有過甚見親信征和二年衞太子為江充所敗而燕王旦廣}
  - {type: page-break, offset: 22, content: '', id: KR2a0007_WYG_068-1b, image: WYG0250/WYG0250-0440b.png}
  - {type: page-break, offset: 22, content: '', id: KR2a0007_WYG_068-2a, image: WYG0250/WYG0250-0440c.png}
