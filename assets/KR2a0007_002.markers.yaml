  - {type: 'tls:seg', offset: 237, content: '', id: KR2a0007_tls_002-1a.37}
  - {type: variant, offset: 237, length: 0, content: '', WYG: 文穎曰言皇帝者以别仕諸王國也張晏曰時諸侯治民新承六國之後咸慕鄉邑或貪逸豫樂仕諸侯今特爲京師作優裕法也如淳曰知名謂宦人敎帝書學亦可表異者也盜者逃也恐其逃亡故著械也頌者容也言見寛容但處曹吏舍不入狴牢也師古曰諸家之說皆非也宦皇帝而知名者謂雖非五大夫爵六百石吏而早事惠帝特爲所知故亦優之所以云及耳非謂凡在京師異於諸王國亦不必在於宦人敎書學也左宦之律起自武帝此時未有禮記曰宦學事師謂凡仕宦非閹寺也盜械者凡以罪著械皆得稱焉不必逃亡也據山海經貳負之臣相栁之尸皆云盜械其義是也古者頌與容同五大夫第九爵也}
  - {type: page-break, offset: 237, content: '', id: KR2a0007_WYG_002-3a, image: WYG0249/WYG0249-0071a.png}
