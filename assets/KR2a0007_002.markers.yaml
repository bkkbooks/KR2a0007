  - {type: 'tls:seg', offset: 266, content: '', id: KR2a0007_tls_002-1a.39}
  - {type: variant, offset: 266, length: 0, content: '', WYG: 應劭曰上造爵滿十六者也内外公孫謂王侯内外孫也耳孫者𤣥孫之子也言去其曾高益逺但耳聞之也今以上造有功勞内外孫有骨血屬㜕施徳布惠故事從其輕也城旦者旦起行治城舂者婦人不豫外徭但舂作米皆四歲刑也今皆就鬼薪白粲取薪給宗廟爲鬼薪坐擇米使正白爲白粲皆三歲刑也李斐曰耳孫曾孫也張晏曰公孫宗室侯王之孫也晉灼曰耳孫𤣥孫之曾孫也諸侯王表在八世師古曰上造第二爵名也内外公孫國家宗室及外戚之孫也耳孫諸說不同據平紀及諸侯王表說梁孝王𤣥孫之子耳孫耳音仍又匈奴傳說握衍朐䪘單于云烏維單于耳孫以此參之李云曾孫是也然漢書諸處又皆云曾孫非一不應雜兩稱而言據爾雅曾孫之子爲𤣥孫𤣥孫之子爲來孫來孫之子爲昆孫昆孫之子爲仍孫從已而數是爲八葉則與晉說相同仍耳聲相近蓋一號也但班氏唯存古名而計其葉數則錯也㜕音連}
