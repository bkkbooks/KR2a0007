  - {type: variant, offset: 427, length: 0, content: '', WYG: 如淳曰張敖子偃爲魯王故公主得爲太后師古曰此說非也蓋齊王憂不得脱故從内史之言請尊公主爲齊太后以母禮事之用悦媚呂太后耳若魯元以子爲魯王自合稱太后何待齊王尊之乎據張耳傳高后元年魯元太后薨後六年宣平侯敖薨呂太后立敖子偃爲王以母爲太后故也是則偃因母爲齊王太后而得王非母因偃乃爲太后也劉攽曰顔說非也悼惠公主兄弟耳雖欲諂呂后而以母事之於理安乎蓋齊内史本諂呂后欲尊公主以漸王張氏故勸王割郡就益魯邑而更號魯元公主爲魯元太后也太后之號雖更魯元之稱不除豈闗爲齊王母乎又張偃以母爲太后故封魯王太后非齊益明也}
