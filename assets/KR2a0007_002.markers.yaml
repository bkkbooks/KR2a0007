  - {type: variant, offset: 103, length: 0, content: '', WYG: 張晏曰不滿一歲謂不滿四歲之一歲作郎三歲也不滿二歲謂不滿六歲之二歲作郎四歳也師古曰此説非也直謂作郎未經一歲二歲耳劉攽曰此賜爵之差中郎二歲乃當一級今不滿一歲亦一級恩優之也又散郎三歲當賜一級今斷不滿二歲賜錢萬則滿二歲亦賜一級矣}
