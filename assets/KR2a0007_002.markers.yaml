  - {type: variant, offset: 839, length: 0, content: '', WYG: 前漢書卷二前漢書卷二考證惠帝紀第二臣召南按史記於高祖夲紀後孝文夲紀前止作呂后夲紀以惠帝事附入殊非體制班氏列惠帝紀於高后紀之前義理甚正視作斥土者臣照按監夲宋夲俱作斥上今以服䖍如淳注意詳之定為斥土服注斥上壙上也二上字亦並正春正月城長安胡三省曰漢都長安蕭何雖治宮室未暇築城帝始築之至五年始成臣召南按功臣表城及宮殿皆少府陽城延所作郃陽侯仲薨臣召南按高紀及吳王濞傳並作合陽則屬平原此紀作郃陽則屬左馮翊以王子侯表作合陽證之此郃字訛也然水經注已謂是郃陽矣立閩越君搖為東海王注即今泉州是其地臣召南按師古説非也閩越王無諸都冶則泉州地屬閩越矣東海王搖都東甌亦號東甌王即温州永嘉地非泉州地也前漢書卷二考證}
