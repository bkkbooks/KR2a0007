  - {type: variant, offset: 179, length: 0, content: '', WYG: 服䖍曰斥土壙土也如淳曰斥閒也開土地爲冡壙故以開斥言之鄭氏曰四十金四十斤金也晉灼曰近上二千石賜錢二萬此言四十金實金也下凡言黄金眞金也不言黄謂錢也食貨志黄金一斤直錢萬師古曰諸賜言黄金者皆與之金不言黄者一金與萬錢也劉攽曰予謂諸書言若千金則一金萬錢至於賜金若干斤則盡金也}
