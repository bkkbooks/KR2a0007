  - {type: variant, offset: 210, length: 0, content: '', WYG: 鄧展曰漢家初十五税一儉於周十税一也中間廢今復之也如淳曰秦作阿房之宮收太半之賦遂行至此乃復十五而税一師古曰鄧說是也復音房目反宋祁曰注文今復之也當作今復復之也}
  - {type: variant, offset: 210, length: 0, content: '', krp: 鄧展曰漢家初十五税一儉於周十税一也中間廢今復之也如淳曰秦作阿房之宮收太半之賦遂行至此乃復十五而税一師古曰鄧說是也復音房目反宋祁曰注文今復之也當作今復復之也}
