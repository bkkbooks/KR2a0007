  - {type: variant, offset: 17, length: 0, content: '', WYG: 無姚本刪故曽子曰上失其道民散乆矣師古曰論語載曽子之言也觧在刑法志非明王在上視之以好惡齊之以禮法民曷繇知禁而反正乎師古曰視讀曰示繇讀曰由古之正法五伯}
