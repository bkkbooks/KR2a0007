  - {type: variant, offset: 3924, length: 11, content: 聖王分九州制五服務盛內, WYG: 然終不伐其能飲其徳孟康曰有徳於人而不自美也師古曰飲没也謂不稱顯劉奉世曰飲其徳飲字當蒙不字言没非義也飲者猶飲物自飫言不飲有其徳宋祁曰注文顯字下當有也字諸所嘗施唯恐見之振人不贍先從貧賤始家亡餘財衣不兼采食不重味乘不過軥牛晉灼曰軥軥􅀈也軥牛小牛也師古曰軥重挽也音工豆反晉説是也專趨人之急甚於己私師古曰趨讀曰趣趣向也既隂脱季布之厄及布尊貴終身不見自闗以東莫不延頸願交楚田仲以俠聞父事朱家自以為行弗及也田仲死後有劇孟劇孟者洛陽人也周人以商賈為資劇孟以俠顯呉楚反時條侯為太尉乘傳東將師古曰乗傳車而東出為太將也傳音張戀反至河南得劇孟喜曰呉楚舉大事而}
