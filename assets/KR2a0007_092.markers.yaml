  - {type: variant, offset: 39, length: 383, content: 南北有大山中央有河東西六千餘里南北千餘里東則接漢阸以玉門陽關西則限以葱嶺其南山東出金城與漢南山屬焉其河有兩原一出葱嶺山一出于闐于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里其水亭居冬夏不增減皆以為潛行地下南出於積石為中國河云自玉門陽關出西域有兩道從鄯善傍南山北波河西行至莎車為南道南道西踰葱嶺則出大月氏安息自車師前王廷隨北山波河西行至疏勒為北道北道西踰葱嶺則出大宛康居奄蔡焉西域諸國大率土著有城郭田畜與匈奴烏孫異俗故皆役屬匈奴匈奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉黎間賦稅諸國取富給焉自周衰戎狄錯居涇渭之北及秦始皇攘卻戎狄築長城界中國然西不過臨洮漢興至于孝武事征四夷廣威德而張騫始開西域之迹其後驃騎將軍擊破匈奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙民充實之分置武威張掖敦煌列四郡據兩關焉自貳師將軍伐大宛, WYG: ''}
