  - {type: 'tls:seg', offset: 3938, content: '', id: KR2a0007_tls_092-34a.75}
  - {type: variant, offset: 3938, length: 0, content: '', WYG: 孫也觧父任俠孝文時誅死觧為人静悍師古曰性沉静而勇悍不飲酒少時隂賊感槩師古曰隂賊者隂懐賊害之意也感槩者感意氣而立節槩也不快意所殺甚衆以軀耤友報仇師古曰耤古藉字也藉謂借􅂇也臧命作姦剽攻師古曰臧命臧亡命之人也剽劫也攻謂穿窬而盗也剽音匹妙反劉攽曰攻直謂攻奪而取之耳何因知其是穿窬也穿窬而盗亦不甚豪矣然剽是用力淺小之稱攻則用力重害二者異耳休乃鑄錢掘冢師古曰不報仇剽攻則鑄錢𤼵冢也不可勝數適有天幸窘急常得脱若遇赦及觧年長更折節為儉以徳報怨厚施而薄望然其自喜為俠益甚師古曰自好喜為此名也喜音許吏反既已振人之命不矜其功師古曰振謂舉救也矜夸恃也其隂賊著於心本𤼵於睚眦如故云師古曰著音直畧反心本猶言本心也睚音崖眦音漬睚眦又音五􅈈士􅈈反觧具在杜欽𫝊而少年慕其行亦輙為報讎不使知也觧姊子負觧之埶師古曰負恃也與人飲使之釂非其任彊灌之師古曰盡爵曰釂其人不飲而使盡爵乃彊灌之故怨怒也釂音于笑反彊音其兩反人怒刺殺觧姊子去亡觧姊怒曰以翁伯時人殺吾子賊不得師古曰翁伯觧字也棄其尸道旁弗𦵏欲以辱觧觧使人微知賊處師古曰微同問之也賊窘自歸師古曰窘困急具以實告觧觧曰公殺之當吾兒不直遂去其賊師古曰除去其罪也去音邱吕反劉奉世曰去者遣之令去而已何必除罪辠其姊子收而𦵏之諸公聞之皆多觧之義師古曰多猶重也益附焉觧出人皆避有一人獨箕踞視之觧問其姓名客欲殺之觧曰居邑屋不見敬是吾徳不脩也師古曰邑屋猶}
