  - {type: variant, offset: 3937, length: 0, content: '', WYG: 劇孟吾知其無能為己師古曰已語終辭天下騷動大將軍得之若一敵國云宋祁曰浙本無軍字劇孟行大類朱家而好博多少年之戲然孟母死自逺方送䘮蓋千乘及孟死家無十金之財而符離王孟亦以俠稱江淮之間師古曰符離沛郡之縣也是時濟南瞷氏陳周膚亦以豪聞師古曰瞷音閑景帝聞之使使盡誅此屬其後代諸白梁韓母辟陽翟薛况陜寒孺紛紛復出焉師古曰代郡白姓非一家也故稱諸焉梁國人姓韓名母辟陽翟屬潁川陜即今陜州陜縣也薛况寒孺皆人姓名也辟讀曰避郭觧河内軹人也師古曰軹音只温善相人許負}
