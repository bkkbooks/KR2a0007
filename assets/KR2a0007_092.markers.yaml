  - {type: variant, offset: 5742, length: 3, content: 昧蔡讇, WYG: 高祖以下至茂陵為五陵失其本意渉遂傾身與相待人無賢不肖闐門師古曰闐字與窴同音大千反在所閭里盡酒客或譏渉曰子本吏二千石之世結髮自脩以行䘮推財禮讓為名正復讎取仇猶不失仁義何故遂自放縱為輕俠之徒乎渉應曰子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦師古曰伯姬魯宣公女嫁於宋㳟公㳟公卒伯姬寡居至景公時伯姬之宫夜火左右曰夫人少避火伯姬曰婦人之義保傅不具夜不下堂遂逮於火而死陳孝婦者其夫當行戒屬孝婦曰幸有老母吾若不来汝善飬吾母孝婦曰諾夫果死孝婦飬姑愈謹其父母将取嫁之孝婦固欲自殺父母懼而不取遂}
  - {type: page-break, offset: 5742, content: '', id: KR2a0007_WYG_092-17b, image: WYG0251/WYG0251-0074b.png}
  - {type: variant, offset: 5742, length: 3, content: 昧蔡讇, krp: 高祖以下至茂陵為五陵失其本意渉遂傾身與相待人無賢不肖闐門師古曰闐字與窴同音大千反在所閭里盡酒客或譏渉曰子本吏二千石之世結髮自脩以行䘮推財禮讓為名正復讎取仇猶不失仁義何故遂自放縱為輕俠之徒乎渉應曰子獨不見家人寡婦邪始自約敕之時意廼慕宋伯姬及陳孝婦師古曰伯姬魯宣公女嫁於宋㳟公㳟公卒伯姬寡居至景公時伯姬之宫夜火左右曰夫人少避火伯姬曰婦人之義保傅不具夜不下堂遂逮於火而死陳孝婦者其夫當行戒屬孝婦曰幸有老母吾若不来汝善飬吾母孝婦曰諾夫果死孝婦飬姑愈謹其父母将取嫁之孝婦固欲自殺父母懼而不取遂}
