  - {type: 'tls:seg', offset: 5745, content: '', id: KR2a0007_tls_092-50a.21}
  - {type: variant, offset: 5746, length: 3, content: 我國遇, WYG: 飬姑淮陽太守以聞朝廷高其義賜黄金四十斤復之終身號曰孝婦不幸壹為盗賊所汙遂行滛失師古曰失讀曰佚知其非禮然不能自還吾猶此矣師古曰還讀曰旋謂反歸故操也渉自以為前讓南陽􅉠送身得其名而令先人墳墓儉約非孝也廼大治起冢舎周閤重門初武帝時京兆尹曹氏𦵏茂陵民謂其道為京兆仟渉慕之廼買地開道立表署曰南陽仟人不肯從謂之原氏仟費用皆卬富人長者師古曰卬音牛向反然身衣服車馬􅂊具妻子内困專以振施貧窮赴人之急為務人嘗置酒請渉渉入里門客有道渉所知母病避疾在里宅者師古曰在此里之中宅上也渉即徃候叩門家哭渉因入弔問以䘮事家無所有渉曰但潔埽除沐浴待渉還至主人對賔客歎息曰人親卧地不收渉何心鄉此師古曰鄉讀曰向願徹去酒食賔客争問所當得渉廼側席而坐師古曰禮有憂者側席而坐今渉䘏人之䘮故側席削牘為疏師古曰牘木簡也疏音所慮反具記衣被棺木下至飯含之物分付諸客師古曰飯音扶晩反含音胡紺反諸客奔走市買至日昳皆㑹師古曰昳音徒結反宋祁曰注文昳字下當有日側也三字渉親閲視已謂主人願受賜矣既共飲食渉獨不飽廼載棺物從賔客徃至䘮家為棺歛勞倈畢𦵏師古曰勞倈謂慰勉賔客也棺音工喚反歛音力贍反勞音郎到反倈音郎代反其周急待人如此後人有毁渉者曰姦人之雄也䘮家子即時刺殺言者賔客多犯法辠過數上聞王莽數收繫欲殺輙復赦出之渉懼求為卿府掾史欲以避客宋祁曰避字下當有賔字文母太后䘮時守復土校尉蘓林曰文母太后元后也已為中郎后免官宋祁曰后字當作後渉欲上冢不欲㑹賔客宻獨與故人期㑹渉單車􅇌上茂陵師古曰敺與驅同投暮入其里宅因自匿不見人遣奴至市買肉奴乘渉氣與}
