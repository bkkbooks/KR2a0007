  - {type: variant, offset: 5670, length: 0, content: '', WYG: 屬車常載酒食故有鴟夷也屬音之欲反出入兩宫經營公家繇是言之酒何過乎師古曰繇讀與由同其下類此遵大喜之師古曰喜好愛也音許吏反常謂張竦吾與爾猶是矣足下諷誦經書苦身自約師古曰約猶束也不敢差跌師古曰跌音徒結反而我放意自恣浮湛俗間師古曰湛讀曰沈官爵功名不減於子而差獨樂顧不優邪師古曰顧念也竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也及王莽敗二人俱客於池陽師古曰左馮翊之縣也竦為賊兵所殺李竒曰竦知有賊當去㑹反支日不去因為賊所殺桓譚以為通人之蔽也更始至長安大臣薦遵為大司馬䕶軍與歸徳侯劉颯俱使匈奴鄧展曰颯音立單于欲脅詘遵遵陳利害為言曲直單于大竒之}
