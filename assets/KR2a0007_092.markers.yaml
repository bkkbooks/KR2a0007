  - {type: variant, offset: 5752, length: 0, content: '', WYG: 屠字下當有者字新視事渉未謁也聞之大怒知渉名豪欲以示衆厲俗遣兩吏脅守渉至日中奴不出吏欲便殺渉去渉廹窘不知所為㑹渉所與期上冢者車數十乘到皆諸豪也}
