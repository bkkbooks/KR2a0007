  - {type: variant, offset: 5673, length: 0, content: '', WYG: 古曰陽翟潁川之縣也渉父哀帝時為南陽太守天下殷富大郡二千石死官賦斂送𦵏皆千萬以上妻子通共受之以定産業時又少行三年䘮者及渉父死讓還南陽賻送行䘮冢廬三年繇是顯名京師禮畢扶風謁請為議曹師古曰禮畢行䘮終服也衣冠慕之輻輳為大司徒史丹舉能治劇為谷口令師古曰左馮翊之縣今之雲陽谷口是其處也劉攽曰史丹在成帝時為大}
