  - {type: variant, offset: 8, length: 1, content: 西, WYG: 而下無覬覦師古曰覬幸也覦欲也幸得其所欲也覬音冀覦音踰又音諭孔子曰天下有道政不在大夫師古曰論語載孔子之言謂權不移於下也百官有司奉法承令以脩所職失職有誅侵官有罰夫然故上下相順而庶事理焉周室既微禮樂征伐自諸侯出桓文之後大夫世權陪臣執命師古曰齊桓晉文周之二霸也陪重也陵夷至於戰國合從連衡力政争彊師古曰力政者棄背禮義專任威力也從音子容反繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申師古曰繇讀與由同信陵君魏無忌平原君趙勝孟嘗君田文春申君黄歇皆藉王公之埶競為游俠雞鳴狗盗無不賔禮師古曰謂孟嘗君用雞鳴而得亡出闗因狗盗而取狐白裘也宋祁曰此注疑是孟康而趙相虞卿棄國捐君以周窮交魏齊之厄師古曰魏齊虞卿之交也将為范睢所殺卿救之也信陵無忌竊符矯命戮將專師以赴平原之急師古曰秦兵圍趙趙相平原君告急於無忌無忌因如姬以竊兵符矯魏僖侯命代晉鄙為将而令朱亥鎚殺晉鄙遂率兵救趙秦兵以郤而趙得全皆以取重諸侯顯名天下搤而游談者以四豪為稱首師古曰搤捉持也古手腕字也四豪即魏信陵以下也搤音戹於是背公死黨之議成守職奉上之義廢矣及至漢興禁網疏闊未之匡改也師古曰匡正也是故代相陳豨從車千乘而呉濞淮南皆招賔客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭觧之徒馳騖於閭閻權行州}
