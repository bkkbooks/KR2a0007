  - {type: variant, offset: 5099, length: 564, content: 康居驕黠訖不肯拜使者都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啗都護吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也匈奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絕勿復使以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者往來人馬驢橐駝食皆苦之空罷耗所過送迎驕黠絕遠之國非至計也漢為其新通重致遠人終羈縻而未絕其康居西北可二千里有奄蔡國控弦者十餘萬人與康居同俗臨大澤無崖蓋北海云康居有小王五一曰蘇䪥王治蘇䪥城去都護五千七百七十六里去陽關八千二十五里二曰附墨王治附墨城去都護五千七百六十七里去陽關八千二十五里三曰寙匿王治寙匿城去都護五千二百六十六里去陽關七千五百二十五里四曰罽王治罽城去都護六千二百九十六里去陽關八千五百五十五里五曰奧鞬王治奧鞬城去都護六千九百六里去陽關八千三百五十五里凡五王屬康居大宛國王治貴山城去長安萬二千五百五十里戶六萬口三十萬勝兵六萬人副王輔國王各一人東至都護治所四千三十一里北至康居卑闐城千五百一十里西南至大月氏六百九十里北與康居南與大月氏接土地風氣物類民俗與大月氏安息同大宛左右以蒲陶為酒富人藏酒至萬餘石久者至數十歲不敗俗耆酒馬耆目宿宛別邑七十餘城多善馬馬汗血言其先天馬子也張騫始為武帝言之上遺使者持千金及金馬以請宛善馬宛王以漢絕遠大兵不能至愛其寶馬不肯與漢使妄言宛遂攻殺漢使取, WYG: 受}
