  - {type: variant, offset: 10, length: 0, content: '', WYG: 力折公侯衆庶榮其名迹覬而慕之雖其䧟於刑辟自與殺身成名若季路仇牧死而不悔師古曰季路孔子弟子也姓仲名由衛人也衛有蒯瞶之亂季路聞之故入赴難遇孟黶石乞}
  - {type: variant, offset: 10, length: 0, content: '', krp: 力折公侯衆庶榮其名迹覬而慕之雖其䧟於刑辟自與殺身成名若季路仇牧死而不悔師古曰季路孔子弟子也姓仲名由衛人也衛有蒯瞶之亂季路聞之故入赴難遇孟黶石乞}
  - {type: variant, offset: 11, length: 5, content: 孝武時始通, WYG: 戈擊之斷纓季路曰君子死冠不免結纓而死仇牧宋大夫也宋萬殺閔公仇牧聞之趨而至手劍而叱之萬臂撃仇牧碎首齒著于門闔言游俠之徒自許節操同於季路仇牧宋祁曰一有也字邵}
