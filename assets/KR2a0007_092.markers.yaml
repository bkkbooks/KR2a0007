  - {type: variant, offset: 500, length: 568, content: 未盡殄分以為車師前後王及山北六國時漢獨護南道未能盡并北道也然匈奴不自安矣其後日逐王畔單于將眾來降護鄯善以西使者鄭吉迎之既至漢封日逐王為歸德侯吉為安遠侯是歲神爵三年也乃因使吉并護北道故號曰都護都護之起自吉置矣僮僕都尉由此罷匈奴益弱不得近西域於是徙屯田田於北胥鞬披莎車之地屯田校尉始屬都護都護督察烏孫康居諸外國動靜有變以聞可安輯安輯之可擊擊之都護治烏壘城去陽關二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都護治焉至元帝時復置戊己校尉屯田車師前王庭是時匈奴東蒲類王茲力支將人眾千七百餘人降都護都護分車師後王之西為烏貪訾離地以處之自宣元後單于稱藩臣西域服從其土地山川王侯戶數道里遠近翔實矣出陽關自近者始曰婼羌婼羌國王號去胡來王去陽關千八百里去長安六千三百里辟在西南不當孔道戶四百五十口千七百五十勝兵者五百人西與且末接隨畜逐水草不田作仰鄯善且末穀山有鐵自作兵兵有弓矛服刀劍甲西北至鄯善乃當道云鄯善國本名樓蘭王治扜泥城去陽關千六百里去長安六千一百里戶千五百七十口萬四千一百勝兵二千九百十二人輔國侯卻胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人西北去都護治所千七百八十五里至山國千三百六十五里西北至車師千八百九十里地沙鹵少田寄田仰穀旁國國出玉多葭葦檉柳胡桐白草民隨畜牧逐水草有驢馬多橐它能作兵與婼羌同初武帝感張騫之言甘心欲通大宛諸國使者, WYG: 親戚冠葢}
