  - {type: variant, offset: 3939, length: 1, content: 遣, WYG: 人言村舎巷舎也彼何辠乃隂請尉吏曰是人吾所重至踐更時脱之師古曰踐更為踐更之卒也脱免也更音工衡反脱音它活反毎至直更數過吏弗求師古曰直當也次當為更也數音所角反怪之問其故觧使脱之箕踞者廼肉袒謝辠少年聞之愈益慕觧之行洛陽人有相仇者邑中賢豪居閒以十數終不聽師古曰居中間為道地和輯之而不見許也客廼見觧觧夜見仇家仇家曲聽師古曰曲屈從其言觧謂仇家吾聞洛陽諸公在閒多不聽今子幸而聽觧觧奈何從它縣奪人邑賢大夫權乎廼夜去不使人知曰且毋庸待我去令洛陽豪居間廼聽師古曰庸用也且無用休待洛陽豪更言之廼從其言也觧為人短小㳟儉出未嘗有騎師古曰不以騎自随也不敢乗車入其縣庭師古曰所屬之縣也之旁郡國為人請求事事可出出之如淳曰事可為免出者出之不可者各令厭其意師古曰厭滿也音一贍反然後廼敢嘗酒食諸公以此嚴重之争為用邑中少年及旁近縣豪夜半過門常十餘車請得觧客舎養之師古曰舎止也言觧多藏亡命喜事少年與觧同志者知亡命者多歸觧故夜将車来迎取其人居止而飬之及徙豪茂陵也觧貧不中訾師古曰中充也言訾財不充合徙之數也中音竹仲反其下亦同吏恐不敢不徙衛將軍為言郭觧家貧不中徙上曰觧布衣權至使將軍此其家不貧師古曰將軍為之言是為其所使也觧徙諸公送者出千餘萬軹人楊季主子為縣掾鬲之師古曰鬲塞其送不令觧得之也鬲與隔同觧兄子斷楊掾頭觧入闗闗中賢豪知與不知聞聲争交驩師古曰知謂先相知邑人又殺楊季主季主家上書人又殺闕下師古曰於闕下殺上書人上聞廼下吏捕觧觧亡置其母家室夏陽身至臨晉臨晉籍少翁素不知觧因出闗師古曰出觧於闗也籍少翁已出觧觧傳太原所過􅂺告主人處吏逐迹至籍少翁少翁自殺口絶乆之得觧窮治所犯為而觧所殺皆在赦前軹有儒生侍}
