  - {type: variant, offset: 5668, length: 0, content: '', WYG: 辭謝因曰事在元平元年赦令前其見厚如此元帝時徵遂為京兆尹至廷尉遵少孤與張竦伯松俱為京兆史竦博學通逹以廉儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠如淳曰為後進人士之冠首也並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸師古曰言毎日必出飲也曹事數廢西曹以故事適之師古曰案舊法令而罰之也適讀曰讁此下皆同侍曹輙詣寺舎白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宫大儒優士又重遵師古曰優禮賢士而尤敬重遵謂西曹此人大度士柰何以小文責之廼舉遵能治三輔劇縣補郁夷令師古曰右扶風之縣乆之與扶風相失師古曰意不相得也自免去槐里大賊趙朋霍鴻等起遵為校尉撃朋鴻有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪桀至京師者莫不相因到遵門遵耆酒師古曰耆讀曰嗜毎大飲賔客滿堂輙闗門取客車轄投井中雖有急終不得去師古曰既闗閉門又投車轄也而説者便欲改轄字為錧云門之錧籥妄穿鑿耳錧自主人所執何煩投井也嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母師古曰霑溼言其大醉也霑音竹占反叩頭自白當對尚書有期㑹狀母廼令從後閤出去師古曰以其前門闗閉故從後閤出之也遵大率常醉然事亦不廢長八尺餘長頭大鼻容貌甚偉略渉傳記贍於文辭性善書與人尺牘主皆臧去以為榮師古曰去亦臧也音邱吕反又音舉請求不敢逆所到衣冠懐之唯恐在後師古曰懐來也謂招來而禮之時列侯有與遵同姓字者毎至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云王莽素竒遵材在位多稱譽者繇是起為河南太守師古曰繇讀與由同既至官當遣從史西召善書吏十人於前治私書謝京師故人遵馮几師古曰馮讀曰慿口占書吏且省官事師古曰占隐度也口隐其辭以授吏也占音之贍反書數百封親疏各有意河南大驚數月免初遵為河南太守而弟級為荆州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂後司直陳崇聞之劾奏遵兄弟幸得蒙恩超等歴位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷師古曰藩車車之有屏蔽者過寡婦左阿君置酒謌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶卧遵知飲酒飫厭有節師古曰宴食曰飫飫音於庶反禮不入寡婦之門而湛酒溷肴師古曰湛讀曰沈又音耽亂男女之别輕辱爵位羞汙印韍師古曰此韍謂印之組也惡不可忍聞臣請皆免遵既免歸長安賔客愈盛飲食自若師古曰言自如其故乆之復為九江及河内都尉凡三為二千石而張竦亦至丹陽太守封淑徳侯後俱免官以列侯歸長安竦居貧無賔客時時好事者從之質疑問事論道經書而已師古曰質正也而遵晝夜呼號師古曰呼音火故反車騎滿門酒肉相屬師古曰屬連續也屬音之欲反先是黄門郎揚雄作酒箴以諷諫成帝其文為酒客難法度士譬之於物曰子猶瓶矣觀瓶之居居井之眉師古曰眉井邊地若人目上之有眉處高臨深動常近危酒醪不入口臧水滿懐不得左右牽於纆徽一旦叀礙為瓽所轠師古曰纆徽井索也叀縣也瓽井以甎為甃者也轠擊也言瓶忽縣礙不得下而為井瓽所擊則破碎也叀音上絹反瓽音丁浪反轠音雷諸家之説或以叀為疐或音衛又以瓽為㽉皆失之甃音側救反身提黄泉骨肉為泥師古曰提擲也擲入黄泉之中也提音徒計反自用如此不如鴟夷師古曰鴟夷韋囊以盛酒即今鴟夷滕也宋祁曰注文滕當作幐浙本作袋鴟夷滑稽腹如大壺師古曰滑稽圜轉縱捨無窮之狀滑音骨稽音雞盡日盛酒人復借酤師古曰盡猶竟日也常為國器託於屬車師古曰}
