  - {type: variant, offset: 4395, length: 521, content: 來觀漢地以大鳥卵及犂靬眩人獻於漢天子大說安息東則大月氏大月氏國治監氏城去長安萬一千六百里不屬都護戶十萬口四十萬勝兵十萬人東至都護治所四千七百四十里西至安息四十九日行南與罽賓接土地風氣物類所有民俗錢貨與安息同出一封橐駝大月氏本行國也隨畜移徙與匈奴同俗控弦十餘萬故彊輕匈奴本居敦煌祁連間至冒頓單于攻破月氏而老上單于殺月氏以其頭為飲器月氏乃遠去過大宛西擊大夏而臣之都媯水北為王庭其餘小眾不能去者保南山羌號小月氏大夏本無大君長城邑往往置小長民弱畏戰故月氏徙來皆臣畜之共稟漢使者有五翕侯一曰休密翕侯治和墨城去都護二千八百四十一里去陽關七千八百二里二曰雙靡翕侯治雙靡城去都護三千七百四十一里去陽關七千七百八十二里三曰貴霜翕侯治護澡城去都護五千九百四十里去陽關七千九百八十二里四曰肸頓翕侯治薄茅城去都護五千九百六十二里去陽關八千二百二里五曰高附翕侯治高附城去都護六千四十一里去陽關九千二百八十三里凡五翕侯皆屬大月氏康居國王冬治樂越匿地到卑闐城去長安萬二千三百里不屬都護至越匿地馬行七日至王夏所居蕃內九千一百四里戶十二萬口六十萬勝兵十二萬人東至都護治所五千五百五十里與大月氏同俗東羈事匈奴宣帝時匈奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居, WYG: 章逡循甚懼}
