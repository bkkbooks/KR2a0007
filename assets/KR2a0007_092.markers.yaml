  - {type: variant, offset: 5666, length: 0, content: '', WYG: 此為石氏之禍萬氏反當以為福耶諸公以是服而稱之河平中王尊為京兆尹捕撃豪俠殺章及箭張回服䖍曰作箭者姓張名回酒市趙君都賈子光服䖍曰酒市中人也皆長安名豪報仇怨飬刺客者也樓䕶字君卿齊人父世醫也䕶少随父為醫長安出入貴戚家䕶誦醫經本草方術數十萬言長者咸愛重之共謂曰以君卿之材何不宦學乎繇是辭其父學經傳師古曰繇讀與由同為京兆吏數年甚得名譽是時王氏方盛賔客滿門五侯兄弟争名宋祁曰邵本無兄弟字其客各有所厚不得左右師古曰不相經過也唯䕶盡入其門咸得其驩心結士大夫無所不傾其交長者尤見親而敬衆以是服為人短小精辯論議常依名節聽之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿脣舌言其見信用也母死送𦵏者致車二三千兩閭里歌之曰五侯治䘮樓君卿乆之平阿侯舉護方正師古曰王譚也為諌大夫使郡國護假貸師古曰官以物假貸貧人令護監之貸音吐戴反多持幣帛過齊劉奉世曰此謂樓䕶假貸於人多賫幣帛過齊以施親故爾何乃謬斷其句云監䕶官貸耶劉攽説同上書求上先人冢因㑹宗族故人各以親疏與束帛一日散百金之費使還奏事稱意擢為天水太守數歲免家長安中時成都侯商為大司馬衛將軍罷朝欲候護其主簿諫將軍至尊不宜入閭卷商不聽遂徃至䕶家家狹小官屬立車下乆住移時天欲雨主簿謂西曹諸掾曰不肯彊諌反雨立閭巷商還或白主簿語商恨以它職事去主簿終身廢錮後䕶復以薦為廣漢太守元始中王莽為安漢公專政莽長子宇與妻兄吕寛謀以血塗莽第門欲懼莽令歸政發覺莽大怒殺宇而吕寛亡寛父素與䕶相知寛至廣漢過䕶不以事實語也到數日名捕寛詔書至師古曰舉姓名而捕之也䕶執寛莽大喜徵䕶入為前煇光師古曰莽分三輔置前煇光後丞烈以䕶為之煇音暉封息鄉侯列於九卿莽居攝槐里大賊趙朋霍鴻等群起延入前煇光界䕶坐免為庶人其居位爵禄賂遺所得亦縁手盡既退居里巷時五侯皆已死年老失埶賔客益衰至王莽簒位以舊恩召見䕶封為樓舊里附城師古曰莽為此爵名效古之附庸也而成都侯商子邑為大司空貴重商故人皆敬事邑唯䕶自安如舊節邑亦父事之不敢有闕時請召賔客邑居樽下稱賤子上夀師古曰言以父禮事宋祁曰注末當有之字坐者百數皆離席伏䕶獨東鄉正坐師古曰鄉讀曰嚮字謂邑曰公子貴如何蘓林曰邑字公子也初䕶有故人吕公無子歸䕶䕶身與吕公妻與吕嫗同食及䕶家居妻子頗厭吕公䕶聞之流涕責其妻子曰吕公以故舊窮老託身於我義所當奉遂飬吕公終身䕶卒子嗣其爵陳遵字孟公杜陵人也祖父遂字長子宣帝微時與有故相随博奕師古曰博六博奕圍棋也數負進師古曰進者㑹禮之財也謂博所賭也觧在高紀一説進勝也帝博而勝故遂有所負及宣帝即位用遂稍遷至太原太守廼賜遂璽書曰制詔太原太守官尊禄厚可以償博進矣妻君寧時在旁知狀師古曰史皇孫名進而此詔不諱之蓋史家追書故有其字耳君寧遂妻名也云妻知負博之狀者著舊恩之深也劉攽曰顔云史家追書妄也詔書本字史家何苦改之蓋進音贐自不犯諱也遂}
