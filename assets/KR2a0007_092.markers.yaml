  - {type: variant, offset: 1271, length: 2258, content: 欲絕勿通時漢軍正任文將兵屯玉門關為貳師後距捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使候司匈奴匈奴自是不甚親信樓蘭征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下蠶室宮刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質匈奴後王又死匈奴先聞之遣質子歸得立為王漢遣使詔新王令入朝天子將加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子質漢皆不還奈何欲往朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢使又數為吏卒所寇懲艾不便與漢通後復為匈奴反間數遮殺漢使其弟尉屠耆降漢具言狀元鳳四年大將軍霍光白遣平樂監傅介子往刺其王介子輕將勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首馳傳詣闕縣首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重丞相將軍率百官送至橫門外祖而遣之王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之其後更置都尉伊循官置始此矣鄯善當漢道衝西通且末七百二十里自且末以往皆種五穀土地草木畜產作兵略與漢同有異乃記云且末國王治且末城去長安六千八百二十里戶二百三十口千六百一十勝兵三百二十人輔國侯左右將譯長各一人西北至都護治所二千二百五十八里北接尉犂南至小宛可三日行有蒲陶諸果西通精絕二千里小宛國王治扜零城去長安七千二百一十里戶百五十口千五十勝兵二百人輔國侯左右都尉各一人西北至都護治所二千五百五十八里東與婼羌接辟南不當道精絕國王治精絕城去長安八千八百二十里戶四百八十口三千三百六十勝兵五百人精絕都尉左右將譯長各一人北至都護治所二千七百二十三里南至戎盧國四日行地阸陿西通扜彌四百六十里戎盧國王治卑品城去長安八千三百里戶二百四十口千六百一十勝兵三百人東北至都護治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道扜彌國王治扜彌城去長安九千二百八十里戶三千三百四十口二萬四十勝兵三千五百四十人輔國侯左右將左右都尉左右騎君各一人譯長二人東北至都護治所三千五百五十三里南與渠勒東北與龜茲西北與姑墨接西通于闐三百九十里今名寧彌渠勒國王治鞬都城去長安九千九百五十里戶三百一十口二千一百七十勝兵三百人東北至都護治所三千八百五十二里東與戎盧西與婼羌北與扜彌接于闐國王治西城去長安九千六百七十里戶三千三百口萬九千三百勝兵二千四百人輔國侯左右將左右騎君東西城長譯長各一人東北至都護治所三千九百四十七里南與婼羌接北與姑墨接于闐之西水皆西流注西海其東水東流注鹽澤河原出焉多玉石西通皮山三百八十里皮山國王治皮山城去長安萬五十里戶五百口三千五百勝兵五百人左右將左右都尉騎君譯長各一人東北至都護治所四千二百九十二里西南至烏秅國千三百四十里南與天篤接北至姑墨千四百五十里西南當罽賓烏弋山離道西北通莎車三百八十里烏秅國王治烏秅城去長安九千九百五十里戶四百九十口二千七百三十三勝兵七百四十人東北至都護治所四千八百九十二里北與子合蒲犂西與難兜接山居田石間有白草累石為室民接手飲出小步馬有驢無牛其西則有縣度去陽關五千八百八十八里去都護治所五千二十里縣度者石山也谿谷不通以繩索相引而度云西夜國王號子合王治呼犍谷去長安萬二百五十里戶三百五十口四千勝兵千人東北到都護治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接蒲犂及依耐無雷國皆西夜類也西夜與胡異其種類羌氐行國隨畜逐水草往來而子合土地出玉石蒲犂國王治蒲犂谷去長安九千五百五十里戶六百五十口五千勝兵二千人東北至都護治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里侯都尉各一人寄田莎車種俗與子合同依耐國王治去長安萬一百五十里戶一百二十五口六百七十勝兵三百五十人東北至都護治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接俗相與同少穀寄田疏勒莎車無雷國王治盧城去長安九千九百五十里戶千口七千勝兵三千人東北至都護治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氏接衣服類烏孫俗與子合同難兜國王治去長安萬一百五十里戶五千口三萬一千勝兵八千人東北至都護治所二千八百五十里西至無雷三百四十里西南至罽賓三百三十里南與婼羌北與休循西與大月氏接種五穀蒲陶諸果有銀銅鐵作兵與諸國同屬罽賓罽賓國王治循鮮城去長安萬二千二百里不屬都護戶口勝兵多大國也東北至都護治所六千八百四十里東至烏秅國二千二百五十