  - {type: variant, offset: 5753, length: 198, content: 帝六年相國曹參薨安國侯王陵為右丞相平為左丞相王陵沛人也始為縣豪高祖微時兄事陵及高祖起沛入咸陽陵亦聚黨數千人居南陽不肯從沛公及漢王之還擊項籍陵乃以兵屬漢項羽取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母既私送使者泣曰願為老妾語陵善事漢王漢王長者毋以老妾故持二心妾以死送使者遂伏劍而死項王怒亨陵母陵卒從漢王定天下以善雍齒雍齒高祖之仇陵又本無從漢之意以故後封陵為安國侯陵為人少文任氣好直言為右丞相二歲惠帝崩, WYG: ''}
