  - {type: variant, offset: 1040, length: 0, content: '', WYG: 以所善陳人武臣為將軍耳餘為左右校尉與卒三千人從白馬渡河師古曰津名即今滑州白馬縣界也至諸縣説其豪桀鄧展曰至河北縣説之曰秦為亂政虐刑殘滅天下北為長城之役南有五領之戍服䖍曰山領有五因以為名交趾合浦界有此領師古曰服説非也領者西自衡山之南東窮于海一山之限耳而别標名則有五焉裴氏廣州記云大庾始安臨賀桂陽揭陽是為五領鄧徳明南康記曰大庾領一也桂陽騎田領二也九真都龎領三也臨賀萌渚領四也始安越城領五也師古曰裴説是也外内騷動百姓罷敝師古曰罷讀曰疲頭㑹箕歛服䖍曰吏到其家人人頭數出穀以箕歛之以供軍費財匱力盡師古曰匱竭也重以苛法師古曰重音直用反使天下父子不相􅂓師古曰言無聊頼以相保養今陳王奮臂為天下倡始莫不嚮應師古曰倡讀曰唱嚮讀曰響家自為怒各報其怨師古曰為音于偽反縣殺其令丞郡殺其守尉今以張大楚王陳師古曰言張建大楚之國而王於陳也劉奉世曰按陳勝立為王號張楚耳云張大楚者斥其號也使吳廣周文將卒百萬西撃秦於此時而不成封侯之業者非人豪也夫因天下之力而攻無道之君報父兄之怨而成割地之業此一時也豪桀皆然其言廼行收兵得數萬人號武信君師古曰武臣自號也下趙十餘城餘皆城守莫肯下乃引兵東北擊范陽范陽人蒯通說其令徐公降武信君又説武信君以侯印封范陽令語在通傳趙地聞之不戰下者三十餘城至邯鄲耳餘聞周章軍入闗至戲郤蘇林曰至戲地而郤兵又聞諸將為陳王徇地多以䜛毁得罪誅怨陳王不以為將軍而以為校尉廼說武臣曰陳王非必立六國後師古曰非不也今將軍下趙數十城獨介居河北晉灼曰介音戞臣瓚曰介特也師古曰二說並非也介隔也讀如本字不王無以填之師古曰塡音竹刃反且陳王聽䜛還報恐不得脫於禍願將軍毋失時武臣乃聽遂立為趙王以餘為大將軍耳為丞相使人報陳王陳王大怒欲盡族武臣等家而發兵撃趙相國房君諫曰秦未亡今又誅武臣等家此生一秦也不如因而賀之使急引兵西擊秦陳王從其計徙繫武臣等家宫中封耳子敖為成都君使使者賀趙趣兵西入闗師古曰趣讀曰促耳餘說武臣曰王王趙非楚意特以計賀王師古曰言力不能制且事安撫為權宜之計耳楚已滅秦必加兵於趙願王毋西兵北徇燕代南收河内以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨師古曰黶音烏㸃反韓廣至燕燕人因立廣為燕王趙王乃與耳餘北略地燕界趙王閒出為燕軍所得師古曰閒出謂投閒隙而㣲出也燕囚之欲與分地師古曰要劫之令割趙地輸燕以和解也使者往燕輙殺之以固求地耳餘患之有厮養卒謝其舎曰蘇林曰厮取薪者也養養人者也舍謂所舍宿主人也晉灼曰以辭相告曰謝師古曰謝其舍謂告其舍中人也故下言舎中人皆笑今流俗書夲於此舍下輙加人字非也厮音斯吾為二公說燕與趙王載歸師古曰二公張耳陳餘宋祁曰别本為字作謂舎中人皆笑曰使者往十輩皆死若何以能得王師古曰若汝也次下亦同乃走燕壁師古曰走趣也音奏燕將見之問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何如人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城張晏曰言其不用兵革也師古曰箠謂馬撾也音止橤反亦各欲南面而王夫臣之與主豈可同日道哉顧其埶初定師古曰顧思念也且以長少先立武臣以持趙心今趙地已服兩人亦欲分趙而王時未可耳今君囚趙王念此兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕師古曰易輕也音弋豉反况以兩賢王左提右挈而責殺王滅燕易矣師古曰提挈言相扶持也燕以為然乃歸趙王養卒為御而歸李良已定常山還報趙王趙王復使良略太原至石邑秦兵塞井陘未能前秦將詐稱二世使使遺良書不封張晏曰欲其漏泄君臣相疑也曰良嘗事我得顯幸誠能反趙為秦赦良罪貴良良得書疑不信之邯鄲益請兵師古曰之徃也未至道逢趙王姊從百餘騎良望見以為王伏謁道旁王姊醉不知其將使騎謝良良素貴起慙其從官從官有一人曰天下叛秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之良以得秦書欲反趙未决因此怒遣人追殺王姊遂襲邯鄲邯鄲不知竟殺武臣趙人多為耳餘耳目者故得脫出収兵得數萬人客有說耳餘曰兩君羈旅張晏曰羈寄旅客也而欲附趙難可獨立立趙後輔以誼師古曰謂求取六國時趙王後而立之以名義自輔助也可就功師古曰就成也乃求得趙歇立為趙王居信都張晏曰歇趙之苗裔也信都襄國也宋祁曰乃求舊木作仍求非是李良進兵擊餘餘敗良良走歸章邯章邯引兵至邯鄲皆徙其民河内夷其城郭師古曰夷平也耳與趙王歇走入鉅鹿城王離圍之餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原築甬道屬河師古曰屬聨及也饟王離師古曰饟古餉字謂饋運其軍糧也王離兵食多急攻鉅鹿鉅鹿城中食盡耳數使人召餘餘自度兵少不能敵秦不敢前數月耳大怒怨餘使張黶陳釋往讓餘師古曰讓責也曰始吾與公為刎頸交今王與耳旦暮死而公擁兵數萬不肻相救胡不赴秦俱死師古曰胡何也且什有一二相全師古曰十中尚冀得一二勝秦宋祁曰别本無有字餘曰所以不俱死欲為趙王張君報秦今俱死如以肉餧虎何益師古曰餧飤也音於偽反張黶陳釋曰事已急要以俱死立信安知後慮餘曰吾顧以無益師古曰顧思念也廼使五千人令張黶陳釋先嘗秦軍師古曰嘗試也言若嘗食也至皆没當是時燕齊楚聞趙急皆来救張敖亦北收代得萬餘人來皆壁餘旁項羽兵數絶章邯甬道王離軍乏食項羽悉引兵渡河破章邯軍諸侯軍乃敢擊秦軍遂虜王離於是趙王歇張耳得出鉅鹿與餘相見責讓餘問張黶陳釋所在餘曰黶釋以必死責臣臣使將五千人先嘗秦軍皆没耳不信以為殺之數問餘餘怒曰不意君之望臣深也師古曰望怨望也以下亦同豈以臣重去將哉師古曰重難也廼脫解印綬與耳耳不敢受餘起如厠客有說耳曰天予不取反受其咎今陳將軍與君印綬不受反天不祥急取之耳乃佩其印収其麾下餘還亦望耳不讓趨出遂收其兵宋祁曰一本不讓字上無耳字又别本遂收字上有耳字餘獨與麾下數百人之河上澤中漁獵由此有隙趙王歇復居信都耳從項羽入闗項羽立諸侯耳雅遊多為人所稱師古曰雅故也言其久故倦遊交結英傑是以多為人所稱譽也劉攽曰荀卿書有俗儒有雅儒雅儒異於俗者也耳之遊雅故多為人所稱一説多字屬上句項羽素亦聞耳賢廼分趙立耳為常山王治信都師古曰治為治處也音丈吏反信都更名襄國餘客多説項羽陳餘張耳一體有功於趙羽以餘不從入闗聞其在南皮即以南皮旁三縣封之而徙趙王歇王代耳之國餘愈怒曰耳與餘功等也今耳王餘獨侯及齊王田榮叛楚餘乃使夏説説田榮師古曰夏説讀曰悦説田榮音式鋭反曰項羽為天下宰不平盡王諸將善地徙故王王惡地今趙王乃居代願王假臣兵請以南皮為扞蔽師古曰扞蔽猶言藩屛也田榮欲樹黨乃遣兵從餘餘悉三縣兵師古曰悉盡也襲常山王耳耳敗走曰漢王與我有故張晏曰漢王布衣時常從耳遊也而項王彊立我我欲之楚師古曰羽既彊盛又為所立是以狐疑莫知所往甘公曰文穎曰善説星者甘氏也晉灼曰齊人}
