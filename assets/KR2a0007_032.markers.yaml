  - {type: variant, offset: 5953, length: 4, content: 欲立諸呂, WYG: 文景時張王客子孫皆}
  - {type: variant, offset: 5953, length: 4, content: 欲立諸呂, krp: 文景時張王客子孫皆}
  - {type: variant, offset: 5958, length: 1573, content: 王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王呂氏非約也太后不說問左丞相平及絳侯周勃等皆曰高帝定天下王子弟今太后稱制欲王昆弟諸呂無所不可太后喜罷朝陵讓平勃曰始與高帝唼血而盟諸君不在邪今高帝崩太后女主欲王呂氏諸君縱欲阿意背約何面目見高帝於地下乎平曰於面折廷爭臣不如君全社稷定劉氏後君亦不如臣陵無以應之於是呂太后欲廢陵乃陽遷陵為帝太傅實奪之相權陵怒謝病免杜門竟不朝請十年而薨陵之免呂太后徙平為右丞相以辟陽侯審食其為左丞相食其亦沛人也漢王之敗彭城西楚取太上皇呂后為質食其以舍人侍呂后其後從破項籍為侯幸於呂太后及為相不治監宮中如郎中令公卿百官皆因決事呂須常以平前為高帝謀執樊噲數讒平曰為丞相不治事日飲醇酒戲婦人平聞日益甚呂太后聞之私喜面質呂須於平前曰鄙語曰兒婦人口不可用顧君與我何如耳無畏呂須之譖呂太后多立諸呂為王平偽聽之乃呂太后崩平與太尉勃合謀卒誅諸呂立文帝平本謀也審食其免相文帝立舉以為相太尉勃親以兵誅呂氏功多平欲讓勃位乃謝病文帝初立怪平病問之平曰高帝時勃功不如臣及誅諸呂臣功亦不如勃願以相讓勃於是乃以太尉勃為右丞相位第一平徙為左丞相位第二賜平金千斤益封三千戶居頃之上益明習國家事朝而問右丞相勃曰天下一歲決獄幾何勃謝不知問天下錢穀一歲出入幾何勃又謝不知汗出洽背媿不能對上亦問左丞相平平曰有主者上曰主者為誰乎平曰陛下即問決獄責廷尉問錢穀責治粟內史上曰苟各有主者而君所主何事也平謝曰主臣陛下不知其駑下使待罪宰相宰相者上佐天子理陰陽順四時下遂萬物之宜外填撫四夷諸侯內親附百姓使卿大夫各得任其職也上稱善勃大慚出而讓平曰君獨不素教我乎平笑曰君居其位獨不知其任邪且陛下即問長安盜賊數又欲彊對邪於是絳侯自知其能弗如平遠矣居頃之勃謝免相而平顓為丞相孝文二年平薨諡曰獻侯傳子至曾孫何坐略人妻棄市王陵亦至玄孫坐酎金國除辟陽侯食其免後三歲而為淮南王所殺文帝令其子平嗣侯淄川王反辟陽近淄川平降之國除始平曰我多陰謀道家之所禁吾世即廢亦已矣終不能復起以吾多陰禍也其後曾孫陳掌以衛氏親戚貴願得續封然終不得也周勃沛人其先卷人也徙沛勃以織薄曲為生常以吹簫給喪事材官引強高祖為沛公初起勃以中涓從攻胡陵下方與方與反與戰卻敵攻豐擊秦軍碭東還軍留及蕭復攻碭破之下下邑先登賜爵五大夫攻蒙虞取之擊章邯車騎殿略定魏地攻轅戚東緡以往至栗取之攻齧桑先登擊秦軍阿下破之追至濮陽下蘄城攻都關定陶襲取宛朐得單父令夜襲取臨濟攻壽張以前至卷破李由雍丘下攻開封先至城下為多後章邯破項梁沛公與項羽引兵東如碭自初起沛還至碭一歲二月楚懷王封沛公號武安侯為碭郡長沛公拜勃為襄賁令從沛公定魏地攻東郡尉於成武破之攻長社先登攻潁陽緱氏絕河津擊趙賁軍尸北南攻南陽守齮破武關嶢關攻秦軍於藍田至咸陽滅秦項羽至以沛公為漢王漢王賜勃爵為威武侯從入漢中拜為將軍還定三秦賜食邑懷德攻槐里好畤最北擊趙賁內史保於咸陽最北救漆擊章平姚卬軍西定汧還下郿頻陽圍章邯廢丘破之西擊益已軍破之攻上邽東守嶢關擊項籍攻曲遇最還守敖倉追籍籍已死因東定楚地泗水東海郡凡得二十二縣還守雒陽櫟陽賜與潁陰侯共食鍾離以將軍從高祖擊燕王臧荼破之易下所將卒當馳道為多賜爵列侯剖符世世不絕食絳八千二百八十戶以將軍從高帝擊韓王信於代降下霍人以前至武泉搫胡騎破之武泉北轉攻韓信軍銅鞮破之還降太原六城擊韓信胡騎晉陽下破之下晉陽後擊韓信軍於硰石破之追北八十里還攻樓煩三城因擊胡騎平城下所將卒當馳道為多勃遷為太尉擊陳豨屠馬邑所將卒斬豨將軍乘馬降轉擊韓信陳豨趙利軍於樓煩破之得豨將宋最鴈門守圂因轉攻得雲中守遬丞相箕肄將軍博定鴈門郡十七縣雲中郡十二縣因復擊豨靈丘破之斬豨丞相程縱將軍陳武都尉高肄定代郡九縣燕王盧綰反勃以相國代樊噲將擊下薊得綰大將抵丞相偃守陘太尉弱御史大夫施屠渾都破綰軍上蘭後擊綰軍沮陽追至長城定上谷十二縣右北平十六縣遼東二十九縣漁陽二十二縣最從高帝得相國一人丞相二人將軍, WYG: ''}
