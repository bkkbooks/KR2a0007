  - {type: variant, offset: 19, length: 2, content: 開地, WYG: 客如淳曰父時故賔客也師古曰邸歸也音丁禮反父客謂曰必欲求賢夫從張耳女聽為請決嫁之師古曰請決絶於前夫而嫁於耳女家厚奉給耳耳以故致千里客宦為外黄令陳餘亦大梁人好儒術遊趙苦陘張晏曰苦陘章帝醜其名改曰漢昌師古曰陘音刑富人公乗氏以其女妻之餘年少父事耳}
