  - {type: variant, offset: 8212, length: 203, content: 反今居一小縣顧欲反邪文帝既見勃獄辭乃謝曰吏方驗而出之於是使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍安知獄吏之貴也勃復就國孝文十一年薨諡曰武侯子勝之嗣尚公主不相中坐殺人死國絕一年文帝乃擇勃子賢者河內太守亞夫復為侯亞夫為河內守時許負相之君後三歲而侯侯八歲為將相持國秉貴重矣於人臣無二後九年而餓死亞夫笑曰臣之兄以代父侯矣有如卒子當代我何說侯乎然既已貴如負言又何說餓死指視我負指其口曰從理入口此餓死法也居三歲兄絳侯勝之, WYG: 生}
