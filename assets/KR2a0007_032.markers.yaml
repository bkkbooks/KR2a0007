  - {type: variant, offset: 2849, length: 213, content: 惟之豎子固不足遣乃公自行耳於是上自將而東群臣居守皆送至霸上良疾強起至曲郵見上曰臣宜從疾甚楚人剽疾願上慎毋與楚爭鋒因說上令太子為將軍監關中兵上謂子房雖疾彊臥傅太子是時叔孫通已為太傅良行少傅事漢十二年上從破布歸疾益甚俞欲易太子良諫不聽因疾不視事叔孫太傅稱說引古以死爭太子上陽許之猶欲易之及宴置酒太子侍四人者從太子年皆八十有餘須眉皓白衣冠甚偉上怪問曰何為者四人前對各言其姓名上乃驚曰吾求公避逃我今公何自從吾兒游乎四人曰陛下輕士善罵臣, WYG: ''}
