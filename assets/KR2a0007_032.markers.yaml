  - {type: variant, offset: 3067, length: 901, content: 恐而亡匿今聞太子仁孝恭敬愛士天下莫不延頸願為太子死者故臣等來上曰煩公幸卒調護太子四人為壽已畢趨去上目送之召戚夫人指視曰我欲易之彼四人為之輔羽翼已成難動矣呂氏真乃主矣戚夫人泣涕上曰為我楚舞吾為若楚歌歌曰鴻鵠高飛一舉千里羽翼以就橫絕四海橫絕四海又可柰何雖有矰繳尚安所施歌數闋戚夫人歔欷流涕上起去罷酒竟不易太子者良本招此四人之力也良從上擊代出奇計下馬邑及立蕭相國所與從容言天下事甚眾非天下所以存亡故不著良乃稱曰家世相韓及韓滅不愛萬金之資為韓報仇彊秦天下震動今以三寸舌為帝者師封萬戶位列侯此布衣之極於良足矣願棄人間事欲從赤松子游耳乃學道欲輕舉高帝崩呂后德良乃彊食之曰人生一世間如白駒之過隙何自苦如此良不得已彊聽食後六歲薨諡曰文成侯良始所見下邳圯上老父與書者後十三歲從高帝過濟北果得穀城山下黃石取而寶祠之及良死并葬黃石每上冢伏臘祠黃石子不疑嗣侯孝文三年坐不敬國除陳平陽武戶牖鄉人也少時家貧好讀書治黃帝老子之術有田三十畝與兄伯居伯常耕田縱平使游學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家生產曰亦食糠覈耳有叔如此不如無有伯聞之逐其婦棄之及平長可取婦富人莫與者貧者平亦媿之久之戶牖富人張負有女孫五嫁夫輒死人莫敢取平欲得之邑中有大喪平家貧侍喪以先往後罷為助張負既見之喪所獨視偉平平亦以故後去負隨平至其家家乃負郭窮巷以席為門然門外多長者車轍張負歸謂其子仲曰吾欲以女孫予陳平仲曰平貧不事事一縣中盡笑其所為獨柰何予之女負曰固有美如陳平長貧者乎卒與女為平貧乃假貸幣以聘予酒肉之資以內婦負戒其孫曰毋以貧故事人不謹事兄伯如事乃父事嫂如事乃母平既取張氏女資用益饒游道日廣里中社平為宰分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣陳涉起王使周巿略地立魏咎為魏王與秦軍相攻於臨濟平已前謝兄伯從少年往事魏王咎為太僕說魏王王不聽人或讒之平亡去項羽略地至河上平往歸之從入破秦賜爵卿項羽之東王彭城也漢王還定三秦而東殷王反楚項羽乃以平為信武君將魏王客在楚者往擊殷降而還項王使項悍拜平為都尉賜金二十溢居無何漢攻下殷項王怒將誅定殷者平懼誅乃封其金與印使使歸項王而平身間行杖劍亡度河船人見其美丈夫獨行疑其亡將要下當有寶器金玉目之, WYG: ''}
