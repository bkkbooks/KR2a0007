  - {type: variant, offset: 923, length: 1, content: 秦, WYG: 則帝業成矣今獨王陳恐天下解也師古曰解謂離散其心也渉不聽遂立為王耳餘復説陳王曰大王興梁楚務在入闗未及收河北也臣嘗遊趙知其豪桀師古曰與相知也願請竒兵略趙}
