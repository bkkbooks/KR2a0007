  - {type: variant, offset: 199, length: 590, content: 為其老乃彊忍下取履因跪進父以足受之笑去良殊大驚父去里所復還曰孺子可教矣後五日平明與我期此良因怪跪曰諾五日平明良往父已先在怒曰與老人期後何也去後五日蚤會五日雞鳴往父又先在復怒曰後何也去後五日復蚤來五日良夜半往有頃父亦來喜曰當如是出一編書曰讀是則為王者師後十年興十三年孺子見我濟北穀城山下黃石即我已遂去不見旦日視其書乃太公兵法良因異之常習讀誦居下邳為任俠項伯嘗殺人從良匿後十年陳涉等起良亦聚少年百餘人景駒自立為楚假王在留良欲往從之行道遇沛公沛公將數千人略地下邳遂屬焉沛公拜良為廄將良數以太公兵法說沛公沛公喜常用其策良為它人言皆不省良曰沛公殆天授故遂從不去沛公之薛見項梁共立楚懷王良乃說項梁曰君已立楚後韓諸公子橫陽君成賢可立為王益樹黨項梁使良求韓成立為韓王以良為韓司徒與韓王將千餘人西略韓地得數城秦輒復取之往來為游兵潁川沛公之從雒陽南出轘轅良引兵從沛公下韓十餘城擊楊熊軍沛公乃令韓王成留守陽翟與良俱南攻下宛西入武關沛公欲以二萬人擊秦嶢關下軍良曰秦兵尚彊未可輕臣聞其將屠者子賈豎易動以利願沛公且留壁使人先行為五萬人具食益張旗幟諸山上為疑兵令酈食其持重寶啗秦將秦將果欲連和俱西襲咸陽沛公欲聽之良曰此獨其將欲叛士卒恐不從不從必危不如因其解擊之沛公乃引兵擊秦軍大破之逐北至藍田再戰秦兵竟敗遂至咸陽秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聽良曰夫秦為無道故沛公得至此, WYG: 計}
