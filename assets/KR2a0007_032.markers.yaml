  - {type: variant, offset: 8417, length: 1013, content: 文帝擇勃子賢者皆推亞夫乃封為條侯文帝後六年匈奴大入邊以宗正劉禮為將軍軍霸上祝茲侯徐厲為將軍軍棘門以河內守亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎出入送迎已而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是天子乃按轡徐行至中營將軍亞夫揖曰介冑之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者久之月餘三軍皆罷乃拜亞夫為中尉文帝且崩時戒太子曰即有緩急周亞夫真可任將兵文帝崩亞夫為車騎將車孝景帝三年吳楚反亞夫以中尉為太尉東擊吳楚因自請上曰楚兵剽輕難與爭鋒願以梁委之絕其食道乃可制也上許之亞夫既發至霸上趙涉遮說亞夫曰將軍東誅吳楚勝則宗廟安不勝則天下危能用臣之言乎亞夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於殽黽阸陿之間且兵事上神密將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜殽黽間果得吳伏兵乃請涉為護軍亞夫至會兵滎陽吳方攻梁梁急請救亞夫引兵東北走昌邑深壁而守梁王使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓高侯等絕吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅臥不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚既餓乃引而去亞夫出精兵追擊大破吳王濞吳王濞棄其軍與壯士數千人亡走保於江南丹徒漢兵因乘勝遂盡虜之降其縣購吳王千金月餘越人斬吳王頭以告凡相守攻三月而吳楚破平於是諸將乃以太尉計謀為是由此梁孝王與亞夫有隙歸復置太尉官五歲遷為丞相景帝甚重之上廢栗太子亞夫固爭之不得上由此疏之而梁孝王每朝常與太后言亞夫之短竇太后曰皇后兄王信可侯也上讓曰始南皮及章武先帝不侯及臣即位乃侯之信未得封也竇太后曰人生各以時行耳竇長君在時竟不得封侯死後乃其子彭祖顧得侯吾甚恨之帝趣侯信也上曰請得與丞相計之亞夫曰高帝約非劉氏不得王非有功不得侯不如約天下共擊之今信雖皇后兄無功侯之非約也上默然而沮其後匈奴王徐盧等五人降漢上欲侯之以勸後亞夫曰彼背其主降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病, WYG: ''}
