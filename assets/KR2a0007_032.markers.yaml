  - {type: variant, offset: 1117, length: 225, content: 良乃遺項羽書曰漢王失職欲得關中如約即止不敢復東又以齊反書遺羽曰齊與趙欲并滅楚項羽以故北擊齊良乃間行歸漢漢王以良為成信侯從東擊楚至彭城漢王兵敗而還至下邑漢王下馬踞鞍而問曰吾欲捐關已東等棄之誰可與共功者良曰九江王布楚梟將與項王有隙彭越與齊王田榮反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲捐之捐之此三人楚可破也漢王乃遣隨何說九江王布而使人連彭越及魏王豹反使韓信特將北擊之因舉燕代齊趙然卒破楚者此三人力也良多病未嘗特將兵常為畫策臣時時從漢三年項羽急, WYG: 方}
