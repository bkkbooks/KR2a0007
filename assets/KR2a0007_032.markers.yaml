  - {type: variant, offset: 5728, length: 0, content: '', WYG: 輿形如今之食輿矣高時榜笞刺爇委困故以箯輿處之也箯音鞭卬讀曰仰勞苦如平生歡師古曰勞苦相勞問其勤苦也與語問張王果有謀不師古曰果猶决高曰人情豈不各愛其父母妻子哉今吾三族皆以論死豈以王易吾親哉師古曰易代也顧為王實不反師古曰顧思念也獨吾等為之具道本根所以王不知狀於是泄公具以報上上廼赦趙王上賢高能自立然諾使泄公赦之告曰張王已出上多足下師古曰多猶重也故赦足下高曰所以不死白張王不反耳今王已出吾責塞矣師古曰塞當也滿也且人臣有簒弑之名豈有面目復事上哉乃仰絶亢而死蘇林曰亢頸大脈也俗所謂胡脈也師古曰亢者縂謂頸耳爾雅云亢鳥嚨即喉嚨也音下}
