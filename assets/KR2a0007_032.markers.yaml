  - {type: variant, offset: 18, length: 0, content: '', WYG: 梁城也少時及魏公子毋忌為客師古曰毋忌六國時信陵君也言其尚及見毋忌為之賔客嘗亡命遊外黄師古曰命者名也凡言亡命謂脱其名籍而逃亡劉奉世曰顔解太迂直避禍自逃其命爾外黄富人女甚美庸奴其夫師古曰言不恃頼其夫視之若庸奴亡邸}
