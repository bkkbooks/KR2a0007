  - {type: variant, offset: 7775, length: 354, content: 曰誅諸呂臣無功請得除宮乃與太僕汝陰滕公入宮滕公前謂少帝曰足下非劉氏不當立乃顧麾左右執戟皆仆兵罷有數人不肯去宦者令張釋諭告亦去滕公召乘輿車載少帝出少帝曰欲持我安之乎滕公曰就舍少府乃奉天子法駕迎皇帝代邸報曰宮謹除皇帝入未央宮有謁者十人持戟衛端門曰天子在也足下何為者不得入太尉往喻乃引兵去皇帝遂入是夜有司分部誅濟川淮陽常山王及少帝於邸文帝即位以勃為右丞相賜金五千斤邑萬戶居十餘月人或說勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位以厭之則禍及身矣勃懼亦自危乃謝請歸相印上許之歲餘陳丞相平卒上復用勃為相十餘月上曰前日吾詔列侯就國或頗未能行丞相朕所重其為朕率列侯之國乃免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見其後人有上書告勃欲反下廷尉逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘背示之, WYG: 師古}
