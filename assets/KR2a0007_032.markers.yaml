  - {type: variant, offset: 4795, length: 521, content: 以為亞父使乃項王使也復持去以惡草具進楚使使歸具以報項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父亞父聞項王疑之乃大怒曰天下事大定矣君王自為之願乞骸骨歸歸未至彭城疽發背而死平乃夜出女子二千人滎陽東門楚因擊之平乃與漢王從城西門出去遂入關收聚兵而復東明年淮陰侯信破齊自立為假齊王使使言之漢王漢王怒而罵平躡漢王漢王寤乃厚遇齊使使張良往立信為齊王於是封平以戶牖鄉用其計策卒滅楚漢六年人有上書告楚王韓信反高帝問諸將諸將曰亟發兵阬豎子耳高帝默然以問平平固辭謝曰諸將云何上具告之平曰人之上書言信反人有聞知者乎曰未有曰信知之乎曰弗知平曰陛下兵精孰與楚上曰不能過也平曰陛下將用兵有能敵韓信者乎上曰莫及也平曰今兵不如楚精將弗及而舉兵擊之是趣之戰也竊為陛下危之上曰為之柰何平曰古者天子巡狩會諸侯南方有雲夢陛下弟出偽游雲夢會諸侯於陳陳楚之西界信聞天子以好出游其勢必郊迎謁而陛下因禽之特一力士之事耳高帝以為然乃發使告諸侯會陳吾將南游雲夢上因隨以行行至陳楚王信果郊迎道中高帝豫具武士見信即執縛之語在信傳遂會諸侯於陳還至雒陽與功臣剖符定封封平為戶牖侯世世勿絕平辭曰此非臣之功也上曰吾用先生計謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其明年平從, WYG: ''}
