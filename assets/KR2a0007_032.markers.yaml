  - {type: variant, offset: 925, length: 112, content: 可王也故聽之良曰沛公自度能卻項王乎沛公默然曰今為柰何良因要項伯見沛公沛公與伯飲為壽結婚令伯具言沛公不敢背項王所以距關者備它盜也項羽後解語在羽傳漢元年沛公為漢王王巴蜀賜良金百溢珠二斗良具以獻項伯漢王亦因令良厚遺項伯使請漢中地項, WYG: 於是陳}
