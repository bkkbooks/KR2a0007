  - {type: variant, offset: 1145, length: 0, content: '', WYG: 馬俱驚辟易數里師古曰辟易謂開張而易其本處辟音頻亦反與其騎會三處漢軍不知羽所居分軍為三復圍之羽廼馳復斬漢}
  - {type: page-break, offset: 1145, content: '', id: KR2a0007_WYG_031-31a, image: WYG0249/WYG0249-0751c.png}
  - {type: variant, offset: 1145, length: 0, content: '', krp: 馬俱驚辟易數里師古曰辟易謂開張而易其本處辟音頻亦反與其騎會三處漢軍不知羽所居分軍為三復圍之羽廼馳復斬漢}
  - {type: variant, offset: 1148, length: 0, content: '', WYG: 殺數十百人復聚其騎亡兩騎廼謂騎曰何如騎皆服曰如大王言於是羽遂引東欲渡烏江臣瓚曰在牛渚烏江亭長㰕船待服䖍曰㰕音蟻如淳曰南方人謂整船向岸曰㰕謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至亡以渡羽笑曰廼天亡我何渡}
  - {type: variant, offset: 1148, length: 0, content: '', krp: 殺數十百人復聚其騎亡兩騎廼謂騎曰何如騎皆服曰如大王言於是羽遂引東欲渡烏江臣瓚曰在牛渚烏江亭長㰕船待服䖍曰㰕音蟻如淳曰南方人謂整船向岸曰㰕謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至亡以渡羽笑曰廼天亡我何渡}
  - {type: variant, offset: 1149, length: 0, content: '', WYG: 且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎謂亭長曰吾知公長者也吾騎此馬五嵗所當亡敵嘗一日千里吾不忍殺以賜公廼令騎皆去馬歩持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬吕馬童曰若非吾故人乎師古曰若汝也馬童面之張晏曰以故人難親斫之故背之也如淳曰面謂不正視也師古曰如説非也面謂背之不面向也面縛亦謂反背而縛之杜元凱以為但見其面非也劉攽曰面之直面向之耳指王翳曰如淳曰指示王翳此項王也羽廼曰吾聞漢購我頭千金邑萬戸師古曰購以財設賞音工豆反吾為公得鄧展曰令公得我為功也晉灼曰字或作徳廼自剄王翳取其頭亂}
  - {type: page-break, offset: 1149, content: '', id: KR2a0007_WYG_031-31b, image: WYG0249/WYG0249-0751d.png}
  - {type: page-break, offset: 1149, content: '', id: KR2a0007_WYG_031-32a, image: WYG0249/WYG0249-0752a.png}
  - {type: variant, offset: 1149, length: 0, content: '', krp: 且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎謂亭長曰吾知公長者也吾騎此馬五嵗所當亡敵嘗一日千里吾不忍殺以賜公廼令騎皆去馬歩持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬吕馬童曰若非吾故人乎師古曰若汝也馬童面之張晏曰以故人難親斫之故背之也如淳曰面謂不正視也師古曰如説非也面謂背之不面向也面縛亦謂反背而縛之杜元凱以為但見其面非也劉攽曰面之直面向之耳指王翳曰如淳曰指示王翳此項王也羽廼曰吾聞漢購我頭千金邑萬戸師古曰購以財設賞音工豆反吾為公得鄧展曰令公得我為功也晉灼曰字或作徳廼自剄王翳取其頭亂}
  - {type: variant, offset: 1150, length: 0, content: '', WYG: 輮蹈師古曰輮踐也音人九反爭羽相殺者數十人最後楊喜吕馬童郎中吕勝楊武各得其一體故分其地以封五人皆為列侯漢王廼以魯公號葬羽於穀城諸項支屬皆不誅封項伯等四人為列侯賜姓劉氏贊曰昔賈生之過秦曰應劭曰賈生書有過秦二篇言秦之過此第一篇也司馬遷取以為贊班固因之秦孝公據殽函之固擁雍州之地師古曰殽謂殽山今陜縣東二殽是也函謂函谷今桃林縣南洪溜澗是也君臣固守而闚周室有席卷天下包舉宇内囊括四海并吞八荒之心張晏曰括結嚢也言其能包含天下師古曰八荒八方荒忽極逺之地也當是時也商君佐之師古曰衞鞅也封於商内立法度務耕織修守戰之備外連衡而鬭諸侯於是秦人拱手而取西河之外師古曰言其不費功力也孝公既没惠文武昭襄師古曰惠文王孝公之子武王惠文王之子昭襄王武王之弟蒙故業因遺䇿南取漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寳肥饒之地以致天下之士合從締交師古曰締結也從音子容反締音大系反相與為一當此之時齊有孟嘗師古曰孟嘗君田文趙有平原師古曰平原君趙勝楚有春申師古曰春申君黄歇魏有信陵師古曰公子無忌為信陵君此四賢者皆明智而忠信寛厚而愛人尊賢重士約從離横師古曰約誓為從欲以分離為横横謂秦也從音子容反其下亦同兼韓魏燕趙宋衞中山之衆於是六}
