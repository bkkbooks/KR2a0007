  - {type: variant, offset: 112, length: 0, content: '', krp: 車裂留以徇師古曰徇行示也以示衆為戒徇音辭峻反秦嘉等聞勝軍敗廼立景駒為楚王引兵之方與師古曰之往也方與縣名也方音房與音豫欲擊秦軍濟隂下使公孫慶使齊王欲與并力俱進齊王曰陳王戰敗未知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令於天下師古曰首事謂最先起兵田儋殺公孫慶秦左右校復攻陳下之呂將軍走徼兵復聚如淳曰徼要也徼散卒復相聚歛也師古曰徼音工堯反與番盜英布相遇師古曰番即畨陽縣也於番為盜故曰番盜番音蒲何反其後番字改作鄱攻擊秦左右校破之青波文穎曰地名也復以陳為楚會項梁立懐王孫心為楚王陳勝王凡六月初為王其故人嘗與傭耕者聞之乃之陳叩宫門曰吾欲見渉宫門令欲縛之自辯數乃置師古曰辯數謂自分别其姓名也并歴道與渉故舊之事故舍而不縛也數音山羽反不肯為通勝出遮道而呼渉師古曰呼謂大喚也音火故反廼召見載與歸入宫見殿屋帷帳客曰夥渉之為王沈沈者應劭曰夥音禍沈沈宫室深邃之貌也沈音長含反楚人謂多為夥故天下傳之夥渉為王由陳渉始客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者以朱防為中正胡武為司過主司羣臣}
  - {type: variant, offset: 114, length: 0, content: '', WYG: 徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輙自治師古曰不以付吏而防武自治之勝信用之諸將以故不親附此其所以敗也勝雖已死其所置遣侯王將相竟亡秦髙祖時為勝置守冢於碭至今血食王莽敗廼絶師古曰至今血食者司馬遷作史記本語也莽敗廼絶者班固之詞也於文為衍盖失不刪耳項籍字羽下相人也韋昭曰臨淮縣初起年二十四其季父梁梁父即楚名將項燕者也家世楚將封於項師古曰即今項城縣故姓項氏籍少時學書不成去學劔又不成去梁怒之籍曰書足記姓名而已劒一人敵不足學學萬人敵耳於是梁竒其意乃教以兵法籍大喜略知其意又不肯竟梁嘗有櫟陽逮請蘄獄掾曹咎書抵櫟陽獄史司馬欣以故事}
