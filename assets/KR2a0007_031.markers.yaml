  - {type: variant, offset: 1122, length: 0, content: '', WYG: 時漢闗中兵益出食多羽兵食少漢王使侯公説羽羽廼與漢王約中分天下割鴻溝而西者為漢東者為楚歸漢王父母妻子已約羽解而東五年漢王進兵追羽至固陵復為羽所敗漢王用張良計致齊王信建成侯彭越兵及劉賈入楚地圍壽春大司馬周殷叛楚舉九江兵随劉賈迎黥布與齊梁諸侯皆大會羽壁垓下軍少食盡漢帥諸侯兵圍之數重羽夜聞漢軍四面皆楚歌廼驚曰漢皆已得楚乎是何楚人多也起飲帳中有美人姓虞氏常幸從駿馬名騅常騎師古曰蒼白雜毛曰騅蓋以其色名之廼悲歌忼慨自為歌詩曰力拔山兮氣盖世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何師古曰若汝也歌數曲美人和之羽泣下數行左右皆泣莫能仰視於是羽遂}
