  - {type: variant, offset: 1141, length: 0, content: '', WYG: 左也左乃䧟大澤中以故漢追及之羽復引而東至東城宋祁曰東城縣名廼有二十八騎追者數千羽自度不得脱師古曰脱免也音土活反謂其騎曰吾起兵至今八嵗矣身七十餘戰所當者破所撃者服未嘗敗北遂伯有天下師古曰伯讀曰霸然今}
  - {type: variant, offset: 1141, length: 0, content: '', krp: 左也左乃䧟大澤中以故漢追及之羽復引而東至東城宋祁曰東城縣名廼有二十八騎追者數千羽自度不得脱師古曰脱免也音土活反謂其騎曰吾起兵至今八嵗矣身七十餘戰所當者破所撃者服未嘗敗北遂伯有天下師古曰伯讀曰霸然今}
  - {type: variant, offset: 1142, length: 2, content: 五百, WYG: 困於此師古曰卒終也此天亡我非戰之罪也今日固決死願為諸君決戰必三勝斬將艾旗廼後死師古曰艾音刈使諸君知吾非用兵罪天亡我也於是引其騎因四隤山孟康曰四下隤陁也師古曰隤音徒回反而為圜陳外嚮師古曰圜陳四周為之也外嚮謂兵刃皆在外也漢騎圍之數重羽謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是羽大呼馳下師古曰呼呌也音火故反漢軍皆披靡師古曰披音普彼反遂殺漢一將是時楊喜為郎騎追羽羽還叱之師古曰還謂廻面也喜}
