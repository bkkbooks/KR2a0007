  - {type: variant, offset: 114, length: 0, content: '', krp: 徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輙自治師古曰不以付吏而防武自治之勝信用之諸將以故不親附此其所以敗也勝雖已死其所置遣侯王將相竟亡秦髙祖時為勝置守冢於碭至今血食王莽敗廼絶師古曰至今血食者司馬遷作史記本語也莽敗廼絶者班固之詞也於文為衍盖失不刪耳項籍字羽下相人也韋昭曰臨淮縣初起年二十四其季父梁梁父即楚名將項燕者也家世楚將封於項師古曰即今項城縣故姓項氏籍少時學書不成去學劔又不成去梁怒之籍曰書足記姓名而已劒一人敵不足學學萬人敵耳於是梁竒其意乃教以兵法籍大喜略知其意又不肯竟梁嘗有櫟陽逮請蘄獄掾曹咎書抵櫟陽獄史司馬欣以故事}
  - {type: variant, offset: 115, length: 1, content: 爭, WYG: 已應劭曰項梁曾坐事傳繫櫟陽獄從蘄獄掾曹咎取書與司馬欣抵相歸抵也已止也梁嘗殺人與籍避仇吳中吳中賢士大夫皆出梁下師古曰言皆不及也每有大繇役及喪梁常主辦隂以兵法部勒賓客子弟以知其能秦始皇帝東遊會稽渡浙江應劭曰浙音折晉灼曰江水至會稽山隂為浙江梁與籍觀籍曰彼可取而代也梁掩其口曰無妄言族矣師古曰凡言族者謂族誅之梁以此竒籍籍長八尺二寸力扛鼎師古曰扛舉也音江才氣過人吴中子弟皆憚籍秦二世元年陳勝起九月會稽假守通張晏曰假守兼守也晉灼曰楚漢春秋云姓殷素賢梁乃召與計事梁曰方今江西皆反秦此亦天亡秦時也先發制人後發制於人守歎曰聞夫子楚將世家唯足下耳梁曰呉有竒士桓楚亡在澤中人莫知其處獨籍知之梁乃戒籍持劍居外待梁復入與守語曰請召籍使受令召桓楚籍入梁眴籍曰可矣師古曰眴動目也音舜動目而使之也今書本有作眄字者流俗所改耳籍遂拔劍擊斬守梁持守頭佩其印綬門下驚擾籍所擊殺數十百人師古曰數十百人者八九十乃至百也他皆類此府中皆讋伏莫敢復起師古曰讋失氣也音章渉反梁乃召故人所知豪吏諭以所為師古曰諭曉告之遂舉呉中兵使人收下縣師古曰四面諸縣也非郡所都故謂之下也得精兵八千人部署豪桀為校尉候司馬師古曰分部而署置之有一人不得官自言梁曰某時某喪使公主某事不能辦以故不任公衆乃皆服梁為㑹稽將籍為裨將師古曰裨助也相副助也裨音頻移反他皆類此徇下縣秦二年廣陵人召平為陳勝徇廣陵師古曰召讀曰邵未下聞陳勝敗}
