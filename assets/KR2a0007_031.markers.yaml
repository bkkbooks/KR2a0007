  - {type: variant, offset: 2121, length: 676, content: 之東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置又攻下邑以西至虞擊秦將章邯車騎攻轅戚及亢父先登遷為五大夫北救東阿擊章邯軍陷陳追至濮陽攻定陶取臨濟南救雍丘擊李由軍破之殺李由虜秦候一人章邯破殺項梁也沛公與項羽引兵而東楚懷王以沛公為碭郡長將碭郡兵於是乃封參執帛號曰建成君遷為戚公屬碭郡其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻杠里大破之追北西至開封擊趙賁軍破之圍趙賁開封城中西擊秦將楊熊軍於曲遇破之虜秦司馬及御史各一人遷為執珪從西攻陽武下轘轅緱氏絕河津擊趙賁軍尸北破之從南攻犨與南陽守齮戰陽城郭東陷陳取宛虜齮定南陽郡從西攻武關嶢關取之前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定三秦攻下辨故道雍斄擊章平軍於好畤南破之圍好畤取壤鄉擊三秦軍壤東及高櫟破之復圍章平平出好畤走因擊趙賁內史保軍破之東取咸陽更名曰新城參將兵守景陵二十三日三秦使章平等攻參參出擊大破之賜食邑於寧秦以將軍引兵圍章邯廢丘以中尉從漢王出臨晉關至河內下脩武度圍津東擊龍且項佗定陶破之東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍丘王武反於外黃程處反於燕往擊盡破之柱天侯反於衍氏進破取衍氏擊羽嬰於昆陽追至葉還攻武彊因至滎陽參自漢中為將軍中尉從擊諸侯及項王敗還至滎陽漢二年拜為假左丞相入屯兵關中月餘魏王豹反以假丞相別與韓信東攻魏將孫遬東張大破之因攻安邑得魏將王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地凡五十二縣賜食邑平陽因從韓信擊趙相國夏說軍於鄔東大破之斬夏說韓信與故, WYG: ''}
