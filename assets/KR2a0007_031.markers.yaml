  - {type: variant, offset: 1151, length: 1, content: 衛, WYG: 之士有寗越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意師古曰召讀曰邵吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵師古曰臏音頻忍反他音徒何反兒音五奚反廖音聊常以十倍之地百萬之軍仰闗而攻秦師古曰秦之地形髙而}
  - {type: variant, offset: 1151, length: 1, content: 衛, krp: 之士有寗越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意師古曰召讀曰邵吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵師古曰臏音頻忍反他音徒何反兒音五奚反廖音聊常以十倍之地百萬之軍仰闗而攻秦師古曰秦之地形髙而}
