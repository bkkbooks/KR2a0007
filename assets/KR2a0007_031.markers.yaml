  - {type: variant, offset: 12, length: 0, content: '', WYG: 師古曰地理志屬淮陽夏音工雅反勝少時嘗與人傭耕師古曰與人與人俱也傭耕謂受其雇直而為之耕言賣功傭也輟耕之壟上師古曰輟止也之徃也壟上謂田中之髙處悵然甚久曰茍富貴無相忘師古曰但一人富貴不問彼此皆不相忘也傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉師古曰鴻大鳥也水居鵠黄鵠也一舉千里鵠音胡督反秦二世元年秋七月發閭左戌漁陽九百人師古曰閭里門也發閭左之人皆遣戌也解具在食貨志勝廣皆為屯長師古曰人所聚曰屯為其長帥也行至蘄大澤鄉㑹天大雨道不通度已失期失期法斬師古曰度謂量計之音大各反勝廣乃謀曰今亡亦死舉大計亦死等死死國可乎勝曰天下苦秦久矣吾聞二世少子不當立當立者乃公子扶蘇扶蘇}
