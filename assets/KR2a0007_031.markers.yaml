  - {type: variant, offset: 3103, length: 840, content: 人孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人厚幣請之既見蓋公蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之始參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事無所變更壹遵何之約束擇郡國吏長大訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事來者皆欲有言至者參輒飲以醇酒度之欲有言復飲酒醉而後去終莫得開說以為常相舍後園近吏舍吏舍日飲歌呼從吏患之無如何乃請參遊後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆蓋之府中無事參子窋為中大夫惠帝怪相國不治事以為豈少朕與乃謂窋曰女歸試私從容問乃父曰高帝新棄群臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告女也窋既洗沐歸時間自從其所諫參參怒而笞之二百曰趣入侍天下事非乃所當言也至朝時帝讓參曰與窋胡治乎乃者我使諫君也參免冠謝曰陛下自察聖武孰與高皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下言之是也且高皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣參為相國三年薨諡曰懿侯百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧壹窋嗣侯高后時至御史大夫傳國至曾孫襄武帝時為將軍擊匈奴薨子宗嗣有罪完為城旦至哀帝時乃封參玄孫之孫本始為平陽侯二千戶王莽時薨子宏嗣建武中先降河北封平陽侯至今八侯贊曰蕭何曹參皆起秦刀筆吏當時錄錄未有奇節漢興依日月之末光何以信謹守管籥參與韓信俱征伐天下既定因民之疾秦法順流與之更始二人同心遂安海內淮陰黥布等已滅唯何參擅功名位冠群臣聲施後世為一代之宗臣慶流苗裔盛矣哉, WYG: 考證}
