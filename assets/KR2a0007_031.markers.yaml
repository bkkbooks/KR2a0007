  - {type: variant, offset: 253, length: 0, content: '', krp: 塞漢道乃立章邯為雍王王咸陽以西長史司馬欣故櫟陽獄吏嘗有徳於梁都尉董翳本勸章邯降故立欣為塞王王咸陽以東至河立翳為翟王王上郡徙魏王豹為西魏王王河東瑕丘公申陽者孟康曰瑕丘縣之老人也姓申名陽張耳嬖臣也師古曰嬖謂愛幸也先下河南迎楚河上立陽為河南王趙將司馬卬定河内數有功立卬為殷王王河内徙趙王歇王代趙相張耳素賢又從入闗立為常山王王趙地當陽君英布為楚將常冠軍立布為九江王番君吳芮師古曰番音蒲何反帥百粵佐諸侯從入闗立芮為衡山王義帝柱國共敖師古曰共讀曰龔將兵撃南郡功多因立為臨江王徙燕王韓廣為遼東王燕將臧荼師古曰荼音塗從楚救趙因從入闗立荼為燕王徙齊王田市為膠東王齊將田都從共救趙宋祁曰共一作兵入闗立都為齊王故秦所滅齊王建孫田安羽方渡河救趙安下濟北數城引兵降羽立安為濟北王田榮者背梁不肯助楚撃秦以故不得封陳餘棄將印去不從入闗然素聞其賢有功於趙聞其在南皮故因環封之三縣孟康曰繞南皮三縣以封之師古曰環音宦番君將梅鋗功多故封十萬戸侯師古曰鋗音火懸反羽自立為西楚伯王師古曰伯讀曰霸王梁楚地九郡都彭城諸侯各就國田榮聞羽徙齊王市膠東而立田都為齊王大怒不肯遣市之膠東因以齊反迎擊都都走楚市畏羽廼亡之膠東就國榮怒追殺之即墨自立為齊王予彭越將軍印令反梁地越廼擊殺濟北王田安田榮遂并王三齊之地時漢王還定三秦羽聞漢并闗中且東師古曰言方欲出闗而撃楚也齊梁畔之大怒廼以故呉令鄭昌為韓王以距漢令蕭公角等撃彭越越敗蕭公角等時張良徇韓遺項王書曰漢王失職欲得闗中如約即止不敢東師古曰如本要約也又以齊梁反書遺羽羽以此故無西意而北撃齊徴兵九江王布布稱疾不行使將將數千人往二年羽隂使九江王布殺義帝宋祁曰史記云令衡山臨江擊殺之江中陳餘使張同夏説説齊王榮師古曰夏説讀曰悦下説秦王説音式芮反曰項王為天下宰不平今盡王故王於醜地師古曰醜惡也而王羣臣諸將善地逐其故主趙王廼北居代餘以為不可師古曰於義不當然聞大王起兵且不聽不義師古曰凡不義之事皆不聼順願大王資餘兵師古曰資給也使撃常山以復趙王請以國為扞蔽師古曰猶為齊之藩屛齊王許之因遣兵往陳餘悉三縣兵師古曰悉盡也與齊併力撃常山大破之張耳走歸漢陳餘迎故趙王歇反之趙趙王因立餘為代王羽至陽城田榮亦將兵會戰榮不勝走至平原平原民殺之羽遂北燒夷齊城郭宫室師古曰夷平也皆阬降卒係虜老弱婦女徇齊至北海所過殘滅齊人相聚而畔之於是田榮弟横收得亡卒數萬人反城陽羽因留連戰未能下漢王劫五諸侯兵服䖍曰時有十八諸侯漢得其五師古曰常山河南魏韓殷也解在髙紀十八諸侯漢時又先已得塞翟矣服説非也凡五十六萬人東伐楚羽聞之即令諸將撃齊而自以精兵三萬人南從魯出胡陵漢王皆已破彭城収其貨賂美人日置酒髙會羽廼從蕭晨撃漢軍而東至彭城日中大破漢軍張晏曰一日之中或曰早撃之至日中大破師古曰或説是也漢軍皆走廹之榖泗水臣瓚曰二水皆在沛郡彭城漢軍皆南走山師古曰走趣也音奏楚又追擊至靈辟東睢水上師古曰睢音雖漢軍郤為楚所擠臣瓚曰擠排也師古曰音子詣反又音子奚反多殺漢卒十餘萬皆入睢水睢水為不流師古曰言殺人多填於水中漢王乃與數十騎遁去語在髙紀太公吕后閒求漢王師古曰間行而求之反遇楚軍楚軍與歸羽常置軍中漢王稍收散卒蕭何亦發闗中卒悉詣滎陽戰京索間師古曰索音山各反敗楚楚以故不能過滎陽而西漢軍滎陽築甬道取敖倉食三年羽數撃絶漢甬道漢王食乏請和割滎陽以西為漢羽欲聽之歷陽侯范增曰漢易與耳今不取後必悔之羽乃急圍滎陽漢王患之乃與陳平金四萬斤以閒楚君臣師古曰閒音居莧反語在陳平傳項羽以故疑范增稍奪之權范增怒曰天下事大定矣君王自為之願賜骸骨歸行未至彭城疽發背死師古曰疽癰瘡也音千餘反於是漢將紀信詐為漢王出降以誑楚軍故漢王得與數十騎從西門出令周苛樅公魏豹守滎陽師古曰苛音何樅音千容反漢王西入闗收兵還出宛葉閒師古曰葉音式渉反與九江王黥布行收兵羽聞之即引兵南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳殺薛公羽廼東擊彭越漢王亦引兵北軍成臯羽已破走彭越師古曰擊破之令其走引兵西下滎陽城亨周苛殺樅公虜韓王信進圍成臯漢王跳師古曰輕身而急出也跳音徒彫反獨與滕公得出北渡河至修武從張耳韓信楚遂拔成臯漢王得韓信軍留止使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍燕郭西師古曰燕縣故南燕國也屬東郡燒其積聚攻下梁地十餘城羽聞之謂海春侯大司馬曹咎曰謹守成臯即漢欲挑戰慎毋與戰勿令得東而已我十五日必定梁地復從將軍於是引兵東四年羽擊陳留外黄外黄不下數日降羽悉令男子年十五以上詣城東欲阬之外黄令舍人兒年十三蘇林曰令之舍人兒也臣瓚曰稱兒者以其幼弱故係其父往説羽曰彭越彊劫外黄師古曰彊音其兩反外黄恐故且降待大王大王至又皆阬之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黄當阬者而東至睢陽聞之皆爭下漢果數挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵氾水師古曰氾音凡解在髙紀卒半渡漢擊大破之盡得楚國金玉貨賂大司馬咎長史欣皆自剄氾水上咎故蘄獄掾欣故塞王羽信任之羽至睢陽聞咎等破則引兵還漢軍方圍鍾離昧於滎陽東師古曰昧音莫曷反羽軍至漢軍畏楚盡走險阻羽亦軍廣武相守乃為髙爼置太公其上如淳曰髙爼几之上也李竒曰軍中巢櫓謂之爼師古曰爼者所以薦肉示欲烹之故置爼上如説是也告漢王曰今不急下吾亨太公漢王曰吾與若俱北面受命懐王師古曰若汝也約為兄弟吾翁即汝翁師古曰翁謂父也必欲亨廼翁幸分我一盃羮師古曰廼亦汝也古者以杯盛羮今之側杯有兩耳者是也羽怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益但益怨耳羽從之廼使人謂漢王曰天下匈匈徒以吾兩人師古曰匈匈讙擾之意也他皆類此願與王挑戰決雌雄毋徒罷天下父子為也師古曰罷讀曰疲漢王笑謝曰吾寧鬭智不能鬭力羽令壯士出挑戰漢有善騎射曰樓煩應劭曰樓煩胡人也李竒曰後為縣屬鴈門此縣人善騎射謂士為樓煩取其稱耳未必樓煩人也師古曰李説是也劉攽曰安知無姓樓名煩者乎楚挑戰三合樓煩輙射殺之羽大怒自被甲持㦸挑戰樓煩欲射羽瞋目叱之師古曰瞋目張目也音充人反樓煩目不能視手不能發走還入壁不敢復出漢王使間問之廼羽也師古曰閒㣲問之也漢王大驚於是羽與漢王相與臨廣武閒而語漢王數羽十罪師古曰數責也音所具反語在髙紀羽怒伏弩射傷}
