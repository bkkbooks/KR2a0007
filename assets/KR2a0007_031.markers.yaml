  - {type: variant, offset: 171, length: 0, content: '', WYG: 乃遣當陽君蒲將軍將卒二萬人渡河救鉅鹿戰少利陳餘復請兵羽廼悉引兵渡河已渡皆湛船師古曰湛讀曰沈謂沈没其船於水中破釡甑燒廬舎持三日糧視士卒必死無還心師古曰視讀曰示於是至則圍王離與秦軍遇九戰絶甬道大破之殺蘇角文穎曰秦將虜王離渉閒不降自燒殺當是時楚兵冠諸侯師古曰言最為上也諸侯軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯皆從壁上觀楚戰士無不一當十呼聲動天地師古曰呼音火故反諸侯軍人人惴恐於是楚已破秦軍羽見諸侯將入轅門張晏曰軍行以車為陳轅}
  - {type: page-break, offset: 171, content: '', id: KR2a0007_WYG_031-18a, image: WYG0249/WYG0249-0745a.png}
  - {type: variant, offset: 171, length: 0, content: '', krp: 乃遣當陽君蒲將軍將卒二萬人渡河救鉅鹿戰少利陳餘復請兵羽廼悉引兵渡河已渡皆湛船師古曰湛讀曰沈謂沈没其船於水中破釡甑燒廬舎持三日糧視士卒必死無還心師古曰視讀曰示於是至則圍王離與秦軍遇九戰絶甬道大破之殺蘇角文穎曰秦將虜王離渉閒不降自燒殺當是時楚兵冠諸侯師古曰言最為上也諸侯軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯皆從壁上觀楚戰士無不一當十呼聲動天地師古曰呼音火故反諸侯軍人人惴恐於是楚已破秦軍羽見諸侯將入轅門張晏曰軍行以車為陳轅}
  - {type: variant, offset: 172, length: 0, content: '', WYG: 向為門故曰轅門師古曰周禮掌舍王行則設車宫轅門也膝行而前莫敢仰視羽繇是始為諸侯上師古曰繇讀}
  - {type: variant, offset: 172, length: 0, content: '', krp: 向為門故曰轅門師古曰周禮掌舍王行則設車宫轅門也膝行而前莫敢仰視羽繇是始為諸侯上師古曰繇讀}
  - {type: variant, offset: 173, length: 0, content: '', WYG: 由同將軍兵皆屬焉劉敞曰將軍字聨上為句按史記云始為諸侯上將軍諸侯皆屬焉章邯軍棘原晉灼曰地名在鉅鹿南羽軍漳南相持未戰秦軍數郤師古曰郤退也音丘畧反二世使人讓章邯師古曰讓謂責也章邯恐使長史欣請事至咸陽留司馬門三日師古曰凡言司馬門者宫垣之内兵衛所在四面皆有司馬司馬主武事故總謂宫之外門為司馬門趙髙不見有不信之心長史欣恐還走不敢出故道趙髙果使人追之不及欣至軍報曰事亡可為者師古曰言不可復為軍旅之事相國趙髙顓國主斷師古曰顓與專同也今戰而勝髙嫉吾功不勝不免於死願將軍熟計之陳餘亦遺章邯書曰白起為秦將南并鄢郢北阬馬服服䖍曰馬服趙括也父奢為趙將有功賜號馬服馬服猶服馬也故世稱之師古曰鄢郢皆楚邑也鄢音偃郢音弋井反攻城畧地不可勝計而卒賜死師古曰卒終也䝉恬為秦將北逐戎人開榆中地數千里服䖍曰金城縣所治也蘇林曰在上郡師古曰即今之榆林古者上郡界蘇説是也竟斬陽周孟康曰縣名也屬上郡晉灼曰恬賜死死於此縣何者功多秦不能封因以法誅之今將軍為秦將三嵗矣所亡失已十萬數而諸侯並起兹益多彼趙髙素諛日久師古曰諛謟也今事急亦恐二世誅之故欲以法誅將軍以塞責師古曰塞當也使人更代以脱其禍師古曰脱免也將軍居外乆多内隙有功亦誅亡功亦誅且天之亡秦無愚智皆知之今將軍内不能直諫外為亡國將孤立而欲長存豈不哀哉將軍何不還兵與諸侯為從文穎曰闗東為從闗西為横孟康曰南北為從東西為横師古曰言欲如六國時共敵秦二説皆是也還兵謂廻兵内嚮以攻秦也從音子容反南面稱孤孰與身伏斧質妻子為戮乎師古曰質謂鍖也古者斬人加於鍖上而斫之也鍖音竹林反章邯狐疑隂使候始成使羽欲約鄭氏曰候軍候也始姓成名也約未成羽使蒲將軍引兵渡三戸服䖍曰漳水津也孟康曰在鄴西三十里軍漳南與秦戰再破之羽悉引兵擊秦軍汙水上師古曰汙水在鄴西南音于大破之邯使使見羽欲約羽召軍吏謀曰糧少欲聽其約軍吏皆曰善羽乃與盟洹水南殷虛上應劭曰洹水在湯隂界殷虛故殷都也師古曰洹水出林慮縣東北至長樂入清水洹音桓俗音袁非也虛讀曰墟已盟章邯見羽流涕為言趙髙羽廼立章邯為雍王置軍中使長史欣為上將將秦軍行前師古曰行前謂居前而行漢元年羽將諸侯兵三十餘萬行畧地至河南遂西到新安師古曰今穀州新安城是異時諸侯吏卒徭役屯戍過秦中師古曰異時猶言先時也秦中闗中秦地也秦中遇之多亡狀師古曰無善形狀也及秦軍降諸侯諸侯吏卒乘勝奴虜使之輕重折辱秦吏卒宋祁曰一本無重字吏卒多竊言曰章將軍等詐吾屬降諸侯今能入闗破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸將㣲聞其計以告羽羽廼召英布蒲將軍計曰秦吏卒尚衆其心不服至闗不聽事必危不如擊之獨與章邯長史欣都尉翳入秦於是夜擊阬秦軍二十餘萬人至函谷闗有兵守不得入聞沛公已破咸陽羽大怒使當陽君擊闗羽遂入至戲西鴻門聞沛公欲王闗中獨有秦府庫珍寳亞父范增亦大怒勸羽擊沛公饗士旦日合戰羽季父項伯素善張良良時從沛公項伯夜以語良良與俱見沛公因伯自解於羽師古曰自解猶今言分疏明日沛公從百餘騎至鴻門謝羽自陳封秦府庫還軍霸上以待大王閉闗以備他盜不敢背徳羽意既解范增欲害沛公賴張良樊噲得免語在髙紀後數日羽廼屠咸陽殺秦降王子嬰燒其宫室火三月不滅收其寳貨畧婦女而東秦民失望師古曰沛公入闗儉節自處約法三章反秦之政而項羽屠殺焚燒恣其殘酷故闗中之人失所望也宋祁曰景本作収其貨賂婦女而東於是韓生説羽曰闗中阻山帶河四塞之地肥饒可都以伯師古曰伯讀曰霸羽見秦皆已燒殘宋祁曰新本秦字下有宫室字又懐思東歸曰富貴不歸故鄉如衣錦夜行師古曰言無人見之不榮顯矣宋祁曰史記作衣繡韓生曰人謂楚人沐猴而冠果然張晏曰沐猴獼猴也師古曰言雖著人衣冠其心不類人也果然如人之言也羽聞之斬韓生初懐王與諸將}
