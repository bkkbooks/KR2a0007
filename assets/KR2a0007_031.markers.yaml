  - {type: variant, offset: 12, length: 0, content: '', krp: 師古曰地理志屬淮陽夏音工雅反勝少時嘗與人傭耕師古曰與人與人俱也傭耕謂受其雇直而為之耕言賣功傭也輟耕之壟上師古曰輟止也之徃也壟上謂田中之髙處悵然甚久曰茍富貴無相忘師古曰但一人富貴不問彼此皆不相忘也傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉師古曰鴻大鳥也水居鵠黄鵠也一舉千里鵠音胡督反秦二世元年秋七月發閭左戌漁陽九百人師古曰閭里門也發閭左之人皆遣戌也解具在食貨志勝廣皆為屯長師古曰人所聚曰屯為其長帥也行至蘄大澤鄉㑹天大雨道不通度已失期失期法斬師古曰度謂量計之音大各反勝廣乃謀曰今亡亦死舉大計亦死等死死國可乎勝曰天下苦秦久矣吾聞二世少子不當立當立者乃公子扶蘇扶蘇}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 數諫故不得立上使外將兵師古曰數音所角反下皆類此今或聞無罪二世殺之百姓多聞其賢未知其死如淳曰扶蘇自殺故人不知其死或以為不知何坐而死故天下寃二世殺之師古曰如或説皆非此言我聞二世已殺扶蘇矣而百姓皆未知之故勝廣舉事詐自稱扶蘇耳項燕為楚將數有功師古曰燕音一千反愛士卒楚人憐之或以為在今誠以吾衆為天下倡師古曰倡讀曰唱謂首號令也宜多應者廣以為然廼行卜卜者知其指意曰足下事皆成有功然足下卜之鬼乎李竒曰卜者誡曰所卜事雖成當死為鬼惡指斥言而勝失其指反依鬼神起怪也蘇林曰狐鳴祠中即是也如淳曰以鬼道威衆乎但用人事也師古曰李如之説皆非也卜者云事成有功然湏假托鬼神乃可興起耳故勝廣曉其此意則為魚書狐鳴以威衆耳勝廣喜念鬼曰此教我先威衆耳廼丹書帛曰陳勝王置人所罾魚腹中師古曰罾魚網也形如仰繖盖四維而舉之音曾卒買魚亨食得書已怪之矣師古曰亨音普庚反又間令廣之次所旁叢祠中宋祁曰旁音歩浪反夜構火狐鳴呼曰大楚興陳勝王鄭氏曰間謂竊令人行也張晏曰戌人所止處也叢鬼所慿也師古曰張説非也此言密於廣所次舎處旁側叢祠中為之非戌人所止也叢謂草木岑蔚者也祠神祠也構謂結起也呼音火故反卒皆夜驚恐旦日卒中往往指目勝廣師古曰指而私目視之劉奉世曰按此諸詭異但主陳勝耳卒何為并目吳廣然則衍廣字勝廣素愛人士卒多為用將尉醉師古曰將尉者其官本尉耳時領戍人故曰將尉廣故數言欲亡忿尉令辱之以激怒其衆尉果笞廣尉劔挺廣起奪而殺尉師古曰挺㧞也尉劒自抜出廣因奪取之勝佐之并殺兩尉召令徒屬曰公等遇雨皆已失期當斬藉第令母斬服䖍曰藉猶借也第使也應劭曰藉吏士名藉也第次也言今失期當斬就使藉第幸得不斬戌死者固十六七也蘇林曰藉假第且也晉灼曰酈食其傳第言之外戚傳第一見我蘇説是也師古曰服應説第義皆非也晉氏意頗近之而猶未得漢書諸言第者甚衆第但也語有緩急耳言但令無斬也今俗人語稱但者急言之則音如第矣酈食其外戚傳所云第者皆謂但耳義非且也而戌死者固什六七且壯士不死則已死則舉大名耳侯王將相寧有種乎師古曰言求之而得不必𦙍胄徒屬皆曰敬受令乃詐稱公子扶蘇項燕從民望也袒右稱大楚師古曰袒右者脫右肩之衣當時取異於凡衆也為壇而盟祭以尉首師古曰以所殺尉之首祭神也勝自立為將軍廣為都尉攻大澤鄉拔之收兵而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東李竒曰徇畧也師古曰音似峻反攻銍酇苦柘譙皆下之師古曰五縣名也銍音竹乙反酇音才多反行收兵比至陳師古曰比音必寐反兵車六七百乗騎千餘卒數萬人攻陳陳守令皆不在師古曰守郡守也令縣令也劉攽曰按秦不以陳為郡何庸有守乎疑衍皆字又守者非正官權守者耳獨守丞與戰譙門中晉灼曰譙門義闕師古曰守丞謂郡丞之居守者一曰郡守之丞故曰守丞譙門謂門上為髙樓以望者耳樓一名譙故謂美麗之樓為麗譙譙亦呼為巢所謂巢車者亦於兵車之上為樓以望敵也譙巢聲相近本一物也今流俗書本譙下有城字非也此自陳耳非譙之城譙城前已下矣劉攽曰此門名譙陳與譙隣門去譙路者也不勝守丞死乃入據陳數日號召三老豪桀會計事師古曰號令召呼之皆曰將軍身被堅執銳師古曰堅堅甲也銳利兵也伐無道誅暴秦復立楚之社稷功宜為王勝乃立為王號張楚劉徳曰若云張大楚國也張晏曰先是楚為秦滅已弛今立楚為張也師古曰張説是也於是諸郡縣苦秦吏暴皆殺其長吏將以應勝廼以廣為假王監諸將以西擊滎陽令陳人武臣張耳陳餘徇趙汝隂人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數師古曰聚音材喻反葛嬰至東城立襄彊為楚王師古曰東城縣名地理志屬九江郡後聞勝已立因殺襄彊還報至陳勝殺嬰令魏人周市北徇魏地師古曰即梁地非河東之魏也廣圍滎陽李由為三川守守滎陽廣不能下勝徴國之豪桀與計師古曰徴召也以上蔡人房君蔡賜為上柱國鄭氏曰房君官號也姓蔡名賜晉灼曰張耳傳言相國房君是也師古曰房君者封邑之名非官號也周}
