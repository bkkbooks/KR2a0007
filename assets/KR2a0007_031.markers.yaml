  - {type: variant, offset: 581, length: 524, content: 何從其計漢王大說漢五年已殺項羽即皇帝位論功行封群臣爭功歲餘不決上以何功最盛先封為酇侯食邑八千戶功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也上曰諸君知獵乎曰知之知獵狗乎曰知之上曰夫獵追殺獸者狗也而發縱指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也且諸君獨以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也群臣後皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一上已橈功臣多封何至位次未有以復難之然心欲何第一關內侯鄂秋時為謁者進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相距五歲失軍亡眾跳身遯者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬眾會上乏絕者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此萬世功也今雖無曹參等百數何缺於漢漢得之不必待以全柰何欲以一旦之功加萬世之功哉蕭何當第一曹參次之上曰善於是乃令何第一賜帶劍履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高待鄂君乃得明於是因鄂秋故所食關內侯邑二千戶封為安平侯是日悉封何父母兄弟十餘人皆食邑乃益封何二千戶以嘗繇咸陽時何送我獨贏錢二也陳豨反上自將至邯鄲而, WYG: 救齊}
