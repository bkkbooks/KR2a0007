  - {type: variant, offset: 1666, length: 251, content: 之淺也上不懌是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過高祖崩何事惠帝何病上親自臨視何疾因問曰君即百歲後誰可代君對曰知臣莫如主帝曰曹參何如何頓道曰帝得之矣何死不恨矣何買田宅必居窮辟處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪孝惠二年何薨諡曰文終侯子祿嗣薨無子高后乃封何夫人同為酇侯小子延為筑陽侯孝文元年罷同更封延為酇侯薨子遺嗣薨無子文帝復以遺弟則嗣有罪免景帝二年制詔御史故相國蕭何高皇帝大功臣所與為天下也今其祀絕朕甚憐之其以武, WYG: 州滏}
