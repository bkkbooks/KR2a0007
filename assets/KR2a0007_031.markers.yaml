  - {type: variant, offset: 162, length: 0, content: '', WYG: 君世世楚將為能復立楚之後也於是梁乃求楚懐王孫心在民閒為人牧羊立以為楚懐王從民望也陳嬰為上柱國封五縣與懐王都盱台師古曰盱音許于反台音怡梁自號武信君引兵攻亢父師古曰亢音抗父音甫初章邯既殺齊王田儋於臨菑師古曰髙紀及儋傳並言於臨濟此獨言臨菑疑此誤也田假復自立為齊王儋弟榮走保東阿章邯追圍之梁引兵救東阿大破秦軍東阿田榮即引兵歸逐王假假亡走楚相田角亡走趙角弟閒故將居趙不敢歸田榮立儋子市為齊王梁已破東阿下軍遂追秦軍數使使趣齊兵俱西師古曰趣讀曰促榮曰楚殺田假趙殺田角田閒廼發兵梁曰田假與國之王張晏曰與黨與也宋祁曰田假與國之王又在田儋傳作懐王語窮來歸我不忍殺趙亦不殺角閒以市於齊張晏曰若市買相貿易以利也梁救榮難猶不用命梁念殺假等榮未必多出兵不如待以禮又可以貿易他利以除已害遂背徳可輔假以伐齊故曰市市貿易也晉灼曰欲令楚殺田假以為己利而楚保全不殺以買其計師古曰二説皆非也市者以角閒市取齊兵也直言趙不殺角聞以求齊兵耳齊遂不肯發兵助楚梁使羽與沛公别攻城陽屠之西破秦軍濮陽東秦兵收入濮陽沛公羽攻定陶定陶未下去西畧地至雍丘大破秦軍斬李由還攻外黄外黄未下梁起東阿比至定陶再破秦軍師古曰比音必寐反羽等又斬李由益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聽廼使宋義於齊道遇齊使者髙陵君顯張晏曰名顯封於髙陵晉灼曰髙陵是琅邪縣曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行則及禍秦果悉起兵益章邯夜銜枚擊楚大破之定陶師古曰銜枚解在髙紀梁死沛公與羽去外黄攻陳留陳留堅守不下沛公羽相與謀曰今梁軍敗士卒恐乃與呂臣俱引兵而東呂臣軍彭城東羽軍彭城西沛公軍碭章邯已破梁軍則以為楚地兵不足憂廼渡河北擊趙大破之當此之時趙歇為王陳餘為將張耳為相走入鉅鹿城師古曰趙歇張耳共入鉅鹿也秦將王離渉閒圍鉅鹿張晏曰秦二將也王離王翦孫渉姓閒名也章邯軍其南築甬道而輸之粟師古曰章邯為甬道而運粟以饟王離渉閒之軍陳餘將卒數萬人軍鉅鹿北所謂河北軍也宋義所遇齊使者髙陵君顯見楚懐王曰宋義論武信君必敗數日果敗軍未戰先見敗徴師古曰徴證也可謂知兵矣王召宋義與計事而説之師古曰説讀曰悦因以為上將軍羽為魯公為次將范增為末將諸别將皆屬號卿子冠軍師古曰冠軍言其在諸軍之上北救趙至安陽留不進師古曰今相州安陽縣秦三年羽謂宋義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蝨張晏曰搏音博蘇林曰蝱喻秦蝨喻章邯等言小大不同埶欲滅秦當寛邯等也如淳曰猶言本欲以大力伐秦而不可以救趙也師古曰搏撃也言以手撃牛之背可以殺其上蝱而不能破蝨喻今將兵方欲滅秦不可盡力與章邯即戰或未能禽徒費力也如説近也今秦攻趙戰勝則兵罷我承其敝師古曰罷讀曰疲不勝則我引兵鼓行而西必舉秦矣師古曰鼓行謂撃鼓而行無畏懼也故不如先鬭秦趙夫撃輕鋭我不如公坐運籌䇿公不如我因下令軍中曰猛如虎狠如羊貪如狼强不可令者皆斬遣其子襄相齊身送之無鹽師古曰縣名飲酒髙㑹師古曰髙㑹大㑹也天寒大雨士卒凍飢羽曰將勠力而攻秦久留不行今嵗飢民貧卒食半菽孟康曰半五升器名也臣瓚曰士卒食蔬菜以菽雜半之師古曰瓚説是也菽謂豆也軍無見糧師古曰無見在之糧廼飲酒髙會不引兵渡河因趙食與併力擊秦廼曰承其敝夫以秦之强攻新造之趙其埶必舉趙趙舉秦强}
