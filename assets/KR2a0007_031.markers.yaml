  - {type: variant, offset: 143, length: 17, content: 具知天下阸塞戶口多少彊弱處民所疾苦, WYG: 亦從沛往居鄛人范增晉灼曰鄛音𠞰絶之𠞰師古曰居鄛縣名也地理志屬廬江郡鄛音巢字亦作巢本春秋時巢國年七十素好竒計往説梁曰陳勝敗固當師古曰言其計畫非是宜應敗也夫秦滅六國楚最亡罪自懐王入秦不反楚人憐之至今故南公稱曰楚雖三戸亡秦必楚服䖍曰南公南方之老人也蘇林曰但令有三戸在其怨深足以亡秦今陳勝首事不立楚後其埶不長今君起江東楚蠭起之將皆争附君者師古曰蠭古蜂字也蠭起如蠭而起言其衆也一説蠭與鋒同言鋒鋭而起}
