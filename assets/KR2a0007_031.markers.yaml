  - {type: variant, offset: 13, length: 0, content: '', krp: 數諫故不得立上使外將兵師古曰數音所角反下皆類此今或聞無罪二世殺之百姓多聞其賢未知其死如淳曰扶蘇自殺故人不知其死或以為不知何坐而死故天下寃二世殺之師古曰如或説皆非此言我聞二世已殺扶蘇矣而百姓皆未知之故勝廣舉事詐自稱扶蘇耳項燕為楚將數有功師古曰燕音一千反愛士卒楚人憐之或以為在今誠以吾衆為天下倡師古曰倡讀曰唱謂首號令也宜多應者廣以為然廼行卜卜者知其指意曰足下事皆成有功然足下卜之鬼乎李竒曰卜者誡曰所卜事雖成當死為鬼惡指斥言而勝失其指反依鬼神起怪也蘇林曰狐鳴祠中即是也如淳曰以鬼道威衆乎但用人事也師古曰李如之説皆非也卜者云事成有功然湏假托鬼神乃可興起耳故勝廣曉其此意則為魚書狐鳴以威衆耳勝廣喜念鬼曰此教我先威衆耳廼丹書帛曰陳勝王置人所罾魚腹中師古曰罾魚網也形如仰繖盖四維而舉之音曾卒買魚亨食得書已怪之矣師古曰亨音普庚反又間令廣之次所旁叢祠中宋祁曰旁音歩浪反夜構火狐鳴呼曰大楚興陳勝王鄭氏曰間謂竊令人行也張晏曰戌人所止處也叢鬼所慿也師古曰張説非也此言密於廣所次舎處旁側叢祠中為之非戌人所止也叢謂草木岑蔚者也祠神祠也構謂結起也呼音火故反卒皆夜驚恐旦日卒中往往指目勝廣師古曰指而私目視之劉奉世曰按此諸詭異但主陳勝耳卒何為并目吳廣然則衍廣字勝廣素愛人士卒多為用將尉醉師古曰將尉者其官本尉耳時領戍人故曰將尉廣故數言欲亡忿尉令辱之以激怒其衆尉果笞廣尉劔挺廣起奪而殺尉師古曰挺㧞也尉劒自抜出廣因奪取之勝佐之并殺兩尉召令徒屬曰公等遇雨皆已失期當斬藉第令母斬服䖍曰藉猶借也第使也應劭曰藉吏士名藉也第次也言今失期當斬就使藉第幸得不斬戌死者固十六七也蘇林曰藉假第且也晉灼曰酈食其傳第言之外戚傳第一見我蘇説是也師古曰服應説第義皆非也晉氏意頗近之而猶未得漢書諸言第者甚衆第但也語有緩急耳言但令無斬也今俗人語稱但者急言之則音如第矣酈食其外戚傳所云第者皆謂但耳義非且也而戌死者固什六七且壯士不死則已死則舉大名耳侯王將相寧有種乎師古曰言求之而得不必𦙍胄徒屬皆曰敬受令乃詐稱公子扶蘇項燕從民望也袒右稱大楚師古曰袒右者脫右肩之衣當時取異於凡衆也為壇而盟祭以尉首師古曰以所殺尉之首祭神也勝自立為將軍廣為都尉攻大澤鄉拔之收兵而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東李竒曰徇畧也師古曰音似峻反攻銍酇苦柘譙皆下之師古曰五縣名也銍音竹乙反酇音才多反行收兵比至陳師古曰比音必寐反兵車六七百乗騎千餘卒數萬人攻陳陳守令皆不在師古曰守郡守也令縣令也劉攽曰按秦不以陳為郡何庸有守乎疑衍皆字又守者非正官權守者耳獨守丞與戰譙門中晉灼曰譙門義闕師古曰守丞謂郡丞之居守者一曰郡守之丞故曰守丞譙門謂門上為髙樓以望者耳樓一名譙故謂美麗之樓為麗譙譙亦呼為巢所謂巢車者亦於兵車之上為樓以望敵也譙巢聲相近本一物也今流俗書本譙下有城字非也此自陳耳非譙之城譙城前已下矣劉攽曰此門名譙陳與譙隣門去譙路者也不勝守丞死乃入據陳數日號召三老豪桀會計事師古曰號令召呼之皆曰將軍身被堅執銳師古曰堅堅甲也銳利兵也伐無道誅暴秦復立楚之社稷功宜為王勝乃立為王號張楚劉徳曰若云張大楚國也張晏曰先是楚為秦滅已弛今立楚為張也師古曰張説是也於是諸郡縣苦秦吏暴皆殺其長吏將以應勝廼以廣為假王監諸將以西擊滎陽令陳人武臣張耳陳餘徇趙汝隂人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數師古曰聚音材喻反葛嬰至東城立襄彊為楚王師古曰東城縣名地理志屬九江郡後聞勝已立因殺襄彊還報至陳勝殺嬰令魏人周市北徇魏地師古曰即梁地非河東之魏也廣圍滎陽李由為三川守守滎陽廣不能下勝徴國之豪桀與計師古曰徴召也以上蔡人房君蔡賜為上柱國鄭氏曰房君官號也姓蔡名賜晉灼曰張耳傳言相國房君是也師古曰房君者封邑之名非官號也周}
  - {type: variant, offset: 14, length: 1, content: 毋, WYG: 陳賢人也嘗為項燕軍視日文穎曰周文即周章也服䖍曰視日旁氣也如淳曰視日時吉凶舉動之占師古曰視日如說是也事春申君應劭曰楚相黄歇自言習兵勝與之將軍印西撃秦行收兵至闗車千乘卒十萬至戲軍焉師古曰戲水名在新豐東音許宜反解具在髙紀秦令少府章邯免驪山徒人奴産子服䖍曰家人之産奴也師古曰奴産子猶今人云家生奴也悉發以擊楚軍大敗之周文走出闗止屯曹陽晉灼曰亭名也在𢎞農東十三里魏武改為好陽師古曰曹水之陽也其水出陜縣西南峴頭山而北流入河今謂之好陽澗在陜縣西四十五里二月餘章邯追敗之復走黽池師古曰黽音湎十餘日章邯擊大破之周文自剄軍遂不戰武臣至邯鄲自立為趙王陳餘為大將軍張耳召騷為左右丞相師古曰召讀作邵勝怒捕繋武臣等家室欲誅之柱國曰秦未亡而誅趙王將相家屬此生一秦師古曰言為讐敵與秦無異宋祁曰按張耳傳作相國房君諫不如因立之勝乃遣使者賀趙而徙繋武臣等家屬宫中師古曰徙居宫中示優禮也拘而不遣故謂之繋而封張耳子敖為成都君趣趙兵亟入闗師古曰趣讀曰促亟急也音居力反趙王將相相與謀曰王王趙非楚意也楚已誅秦必加兵於趙計莫如母西兵師古曰勿令兵西出也使使北徇燕地以自廣趙南據大河北有燕代楚雖勝秦不敢制趙若不勝秦必重趙師古曰重謂尊重也趙承秦楚之敝可以得志於天下趙王以為然因不西兵而遣故上谷卒史韓廣將兵北徇燕張晏曰卒史曹史也燕地貴人豪桀謂韓廣曰楚趙皆已立王燕雖小亦萬乘之國也願將軍立為王韓廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之强不敢}
