  - {type: variant, offset: 1154, length: 0, content: '', krp: 也烈業也振長䇿而馭宇内師古曰以乗馬為喻也䇿所以撾馬也吞二周而亡諸侯履至尊而制六合執敲扑以鞭笞天下鄧展曰敲短杖也扑捶也師古曰敲音苦交反扑音普木反威震四海南取百粤之地以為桂林象郡百粤之君頫首係頸鄧展曰頫音俯師古曰古俯字委命下吏廼使䝉恬北築長城而守藩籬師古曰言以長城扞蔽胡㓂如人家之有藩籬郤匈奴七百餘里師古曰郤音丘畧反胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊師古曰墮毁也音火規反收天下之兵聚之咸陽銷鋒鍉如淳曰鍉音鏑箭鏃也師古曰鋒戈㦸刃也鍉與鏑同即箭鏃也如音是也鑄以為金人十二師古曰所謂公仲者也三輔黄圖云坐髙三丈其銘曰皇帝二十六年初兼天下改諸侯為郡縣一法律同度量大人來見臨洮其長五丈足跡六尺以弱天下之民然後踐華為城服䖍曰斷華山為城晉灼曰踐登也師古曰晉説是也因河為池據億丈之城臨不測之川以為固良將勁弩守要害之處信臣精卒陳利兵而誰何師古曰問之為誰又云何人其義一也天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇既没餘威震于殊俗然而陳渉甕牖繩樞之子服䖍曰以繩係戸樞孟康曰瓦甕為忩也甿𨽻之人如淳曰甿古文萌字萌民也遷徙之徒也材能不及中庸非有仲尼墨翟之知文穎曰墨翟宋人為墨家者也陶朱猗頓之富師古曰越人范蠡逃越止於陶自謂陶朱公猗頓本魯人大畜牛羊於猗氏之南貲擬王公馳名天下躡足行伍之間如淳曰躡音疊師古曰躡音女渉反而免起阡陌之中如淳曰時}
  - {type: variant, offset: 1155, length: 1, content: 賀, WYG: 僻屈在阡陌之中也師古曰免者言免脱徭役也免字或作俛讀與免同帥罷散之卒將數百之衆師古曰罷讀曰疲轉而攻秦斬木為兵掲竿為旗師古曰掲音竭謂豎之也今讀之者為負掲之揭非也天下雲合嚮應師古曰嚮讀曰響言如響之應聲贏糧而景從師古曰贏擔也景從言如影之随形也山東豪俊遂並起而亡秦族矣且天下非小弱也雍州之地殽函之固自若也師古曰自若猶言如故也陳渉之位不齒於齊楚燕趙韓魏宋衞中山之君師古曰齒謂齊列如齒鉏耰棘矜不敵於鉤㦸長鎩服䖍曰以鉏柄及棘作矛􅚙也晉灼曰耰椎塊椎也師古曰服説非也耰摩田器也棘㦸也矜與􅚙同謂矛鋋之杞也鉤㦸㦸刃鉤曲者也鎩鈹也言往者秦銷兵刃陳渉起時但用鉏耰及戈㦸之􅚙以相攻戰也耰音憂矜音其巾反鎩音山列反適戍之衆不亢於九國之師師古曰適讀曰讁謂罪罰而行也亢當也讀與抗同深謀逺慮行軍用兵之道非及曩時之士也師古曰曩昔也音乃朗反然而成敗異變功業相反何也試使山東之國與陳渉度長絜大師古曰絜謂圍束之也度音徒各反絜音下結反比權量力宋祁曰學官本作重力史記作量力不可同年而語矣然秦以區區之地師古曰區區之貎也宋祁曰姚本注文之作小致萬乘之權招八州而朝同列蘇林曰招舉也鄧展曰招音翹百有餘年然後以六合為家師古曰后與後同古通用字也殽函為宫一夫作難而七廟墮師古曰墮毁也音火規反身死人手為天下笑者何也仁誼不施而攻守之埶異也周生亦有言鄭氏曰周時賢人也師古曰史記稱太史公曰余聞之周生則知非周時人蓋姓周耳舜蓋重童子項羽又重童子師古曰童子目之眸子豈其苖裔邪何其興之暴也夫秦失其政陳渉首難豪桀蜂起相與並爭不可勝數然羽非有尺寸乘埶拔起隴畝之中晉灼曰拔音卒拔之拔鄧展曰疾起也師古曰音歩末反三年遂將五諸侯兵滅秦分裂天下而威海内封立王侯政繇羽出師古曰繇與由同號為伯王師古曰伯讀曰霸位雖不終近古以來未嘗有也師古曰近古猶末代及羽背闗懐楚放逐義帝師古曰背闗謂背約不王髙祖於闗中懐楚謂思東歸而都彭城而怨王侯畔已難矣自矜功伐奮其私智而不師古始霸王之國宋祁曰舊本無霸王之國四字欲以力征經營天下五年卒亡其國宋祁曰舊本無其國二字身死東城尚不覺寤不自責過失廼引天亡我非用兵之罪豈不謬哉前漢書卷三十一前漢書卷三十一考證陳勝傳陽城人注師古曰地理志屬汝南郡臣召南按志屬潁川不屬汝南也師古注誤夜構火按史記作篝火注徐廣曰篝者籠也音溝此作構火故顔以結起解之陳守令皆不在劉敞曰守者非正官權守者耳胡三省曰秦分天下為郡縣郡置守尉監縣置令丞尉原父以此守為權守之守良是遷固二史作守令皆不在通鑑作守尉皆不在蓋二史令下缺尉字而通鑑尉上缺令字也陽城人鄧説將兵居郯注師古曰郯東海縣也司馬貞曰此時章邯軍未至東海此郯恐當作郟張守節曰郟今汝州郟縣地鄧説陽城人陽城與郟地相近還至下城父臣召南按劉昭後志曰汝南山桑縣故屬沛有下城父聚欲撃秦軍濟隂下臣召南按史記作定陶下据志濟隂郡治定陶本是一地固可通稱但濟隂郡名至後始立則史記作定陶是也項籍傳梁曰方今江西云云凌穉隆曰方今四句史記作守通謂梁此作梁語又史記守通使桓楚將此謂自出梁意叙事􅒯别臣召南按此傳與史記本紀多有異同蓋班氏刪訂原文也又按江西二字師古無注顧炎武曰大江自歴陽斜北下京口故有東西之名今所謂江北昔之所謂江西也故晉地理志以廬江九江自合肥以北至夀春皆謂之江西此説甚確下文江東已定渡江而西謂渡江而北也廣陵人}
