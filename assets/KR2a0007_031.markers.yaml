  - {type: variant, offset: 128, length: 0, content: '', WYG: 故未曾貴師古曰廼汝也宋祁曰别本作自我為廼家婦今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰廼不敢為王謂其軍吏曰項氏世世將家有功於楚今欲舉大事將非其人不可師古曰言以不材之人為將不可求勝也劉敞曰言欲舉大事為將者非此人不可耳我倚名族亡秦必矣師古曰倚依也音於綺反其衆從之廼以其兵屬梁梁渡淮英布蒲將軍亦以其兵屬焉服䖍曰英布起於蒲地因以為號也如淳曰史記項羽紀言當陽君蒲將軍皆屬項羽自此更有蒲將軍也師古曰此二人也服説失之若是一人不當先言姓名後乃稱將軍也凡六七萬人軍下邳是時秦嘉已立景駒為楚王軍彭城東欲以距梁梁謂軍吏曰陳王首事戰不利未聞所在今秦嘉背陳王立景駒大逆亡道廼引兵擊秦嘉軍敗走追至胡陵嘉還戰師古曰復來戰一日嘉死軍降景駒走死梁地梁已并秦嘉軍軍胡陵將引而西章邯至栗師古曰栗縣名地理志屬沛郡梁使别將朱雞石餘樊君與戰餘樊君死朱雞石敗亡走胡陵梁廼引兵}
