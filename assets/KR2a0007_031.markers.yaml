  - {type: variant, offset: 76, length: 4, content: 史事第一, WYG: 青帛巾若赤眉之號以相别也師古曰涓潔也涓人主潔除之人涓音蠲起新陽師古曰縣名也屬汝南郡攻陳下之殺莊賈復以陳為楚初勝令銍人宋留將兵定南陽入武闗留已徇南陽聞勝死南陽復為}
