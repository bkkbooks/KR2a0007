  - {type: variant, offset: 24, length: 0, content: '', WYG: 燕王居數月趙奉燕王母家屬歸之是時諸將徇地者不可勝數周市北至狄師古曰縣名也後漢安帝時改名臨濟狄人田儋殺狄令自立為齊王反擊周市市軍散還至魏地立魏後故甯陵君咎為魏王應劭曰魏諸公子名咎欲立六國後以樹黨也咎在勝所不得之魏魏地已定欲立周市為王市不肯使者五反師古曰反謂回還也勝乃立甯陵君為魏王遣之國周市為相將軍田臧等相與謀曰周章軍已破服䖍曰周章即周文秦兵且至我守滎陽城不能下秦軍至必大敗不如少遺兵足以守滎陽師古曰遺留也悉精兵迎秦軍師古曰悉盡也今假王驕不知兵權不可與計非誅之事恐敗因相與矯陳王令以誅呉廣師古曰矯詐也託言受令也獻其首於勝勝使賜田臧楚令尹印使為上將田臧廼使諸將李歸等守滎陽城自以精兵西迎秦軍於敖倉與戰田臧死軍破章邯進撃李歸等滎陽下破之李歸死陽城人鄧說將兵居郯師古曰説讀曰悦郯東海縣也音談章邯别將撃破之劉攽曰按是時章邯方至滎陽何暇遣將圖東海疑郯是郟字下乃有郯下軍耳鄧說走陳銍人五逄將兵居許章邯擊破之五逄亦走陳勝誅鄧說勝初立時凌人秦嘉銍人董緤符離人朱雞石取慮人鄭}
