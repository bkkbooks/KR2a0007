  - {type: 'tls:seg', offset: 1152, content: '', id: KR2a0007_tls_031-8a.12}
  - {type: variant, offset: 1153, length: 0, content: '', WYG: 侯之兵欲攻闗中者皆仰嚮故云仰闗也今流俗書夲仰字作扣非也秦人開闗延敵九國之師遁廵而不敢進師古曰遁廵謂疑出而郤退也遁音千旬反流俗書本廵字誤作逃讀者因之而為遁逃之義潘岳西征賦云遁逃以奔竄斯亦誤矣宋祁曰姚本注文疑出作疑懼秦無亡矢遺鏃之費師古曰鏃矢鋒也音子木反而天下已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂鹵師古曰漂浮也鹵盾也其血可以浮盾言殺人多也因利乗便宰割天下分裂山河强國請服弱國入朝施及孝文莊襄王師古曰施延也孝文王昭襄王之子也莊襄王孝文王之子即始皇父也施音弋豉反享國之日淺國家亡事及至始皇奮六世之餘烈師古曰孝公惠文王武王昭襄王孝文王莊襄王凡六}
  - {type: page-break, offset: 1153, content: '', id: KR2a0007_WYG_031-33b, image: WYG0249/WYG0249-0752d.png}
  - {type: page-break, offset: 1153, content: '', id: KR2a0007_WYG_031-34a, image: WYG0249/WYG0249-0753a.png}
  - {type: variant, offset: 1153, length: 0, content: '', krp: 侯之兵欲攻闗中者皆仰嚮故云仰闗也今流俗書夲仰字作扣非也秦人開闗延敵九國之師遁廵而不敢進師古曰遁廵謂疑出而郤退也遁音千旬反流俗書本廵字誤作逃讀者因之而為遁逃之義潘岳西征賦云遁逃以奔竄斯亦誤矣宋祁曰姚本注文疑出作疑懼秦無亡矢遺鏃之費師古曰鏃矢鋒也音子木反而天下已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂鹵師古曰漂浮也鹵盾也其血可以浮盾言殺人多也因利乗便宰割天下分裂山河强國請服弱國入朝施及孝文莊襄王師古曰施延也孝文王昭襄王之子也莊襄王孝文王之子即始皇父也施音弋豉反享國之日淺國家亡事及至始皇奮六世之餘烈師古曰孝公惠文王武王昭襄王孝文王莊襄王凡六}
  - {type: variant, offset: 1154, length: 0, content: '', WYG: 也烈業也振長䇿而馭宇内師古曰以乗馬為喻也䇿所以撾馬也吞二周而亡諸侯履至尊而制六合執敲扑以鞭笞天下鄧展曰敲短杖也扑捶也師古曰敲音苦交反扑音普木反威震四海南取百粤之地以為桂林象郡百粤之君頫首係頸鄧展曰頫音俯師古曰古俯字委命下吏廼使䝉恬北築長城而守藩籬師古曰言以長城扞蔽胡㓂如人家之有藩籬郤匈奴七百餘里師古曰郤音丘畧反胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊師古曰墮毁也音火規反收天下之兵聚之咸陽銷鋒鍉如淳曰鍉音鏑箭鏃也師古曰鋒戈㦸刃也鍉與鏑同即箭鏃也如音是也鑄以為金人十二師古曰所謂公仲者也三輔黄圖云坐髙三丈其銘曰皇帝二十六年初兼天下改諸侯為郡縣一法律同度量大人來見臨洮其長五丈足跡六尺以弱天下之民然後踐華為城服䖍曰斷華山為城晉灼曰踐登也師古曰晉説是也因河為池據億丈之城臨不測之川以為固良將勁弩守要害之處信臣精卒陳利兵而誰何師古曰問之為誰又云何人其義一也天下已定始皇之心自以為闗中之固金城千里子孫帝王萬世之業也始皇既没餘威震于殊俗然而陳渉甕牖繩樞之子服䖍曰以繩係戸樞孟康曰瓦甕為忩也甿𨽻之人如淳曰甿古文萌字萌民也遷徙之徒也材能不及中庸非有仲尼墨翟之知文穎曰墨翟宋人為墨家者也陶朱猗頓之富師古曰越人范蠡逃越止於陶自謂陶朱公猗頓本魯人大畜牛羊於猗氏之南貲擬王公馳名天下躡足行伍之間如淳曰躡音疊師古曰躡音女渉反而免起阡陌之中如淳曰時}
