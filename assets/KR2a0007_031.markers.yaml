  - {type: variant, offset: 75, length: 0, content: '', WYG: 縣也銍符離沛縣也取慮徐臨淮縣也師古曰緤音先列反取音趨又音秋慮音廬將兵圍東海守於郯勝聞廼使武平君畔為將軍張晏曰畔名也監郯下軍秦嘉自立為大司馬惡屬人師古曰不欲統屬於人告軍吏曰武平君年少不知兵事勿聽因矯以王命殺武平君畔章邯已破五逄擊陳柱國房君死章邯又進擊陳西張賀軍勝出臨戰軍破張賀死臘月張晏曰秦之臘月夏之九月臣瓚曰建丑之月也師古曰史記云胡亥二年十月誅葛嬰十一月周文死十二月陳渉死瓉説是也勝之汝隂還至下城父師古曰下城父地名在城父縣東父音甫其御莊賈殺勝以降秦𦵏碭諡曰隐王勝故涓人將軍呂臣為蒼頭軍應劭曰涓人如謁者將軍姓呂名臣也時軍皆著青巾故曰蒼頭服䖍曰蒼頭謂士}
