  - {type: variant, offset: 2060, length: 0, content: '', WYG: 伯不足侔而三王易為也師古曰侔等也伯讀曰霸宋祁曰郭去而字一本為字下有比字是以聖王覺寤捐子之之心而不說田常之賢應劭曰燕王噲賢其相子之欲禪以燕國國乃大亂田常陳恒也齊簡公悦之而殺簡公今使人君去此心則國家安全也師古曰說讀曰悅封比干之後修孕婦之墓應劭曰紂刳妊者觀其胎産師古曰武王克商反其故政乃封修之故功業覆於天下師古曰覆猶被也何則欲善亡厭也夫晉文親其讎彊伯諸侯齊桓用其仇而一匡天下張晏曰寺人勃鞮為晉獻公逐文公斬其祛及文公即位用其言以免呂郄之難管仲射中桓公帶鉤而用為相師古曰伯讀為霸下皆類此宋祁曰注文郄當作郤何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立彊天下卒車裂之師古曰卒終也越用大夫種之謀禽勁吳而伯中國遂誅其身是以孫叔敖三去相而不悔師古曰叔敖三為楚相而三去之狐丘之封人謂之曰吾聞處官久者士妬之祿厚者衆怨之位尊者君恨之今相國有此三者而不得罪於楚之士衆何也叔敖曰吾三相楚而身愈卑每益祿而施愈博位滋尊而禮愈恭是以不得罪於楚人也於陵子仲辭三公為人灌園師古曰於陵地名也子仲陳仲子也其先與齊同族兄戴為齊相仲子以為不義乃將妻子適楚居于於陵自謂於陵子仲楚王聞其賢使使者持金百鎰聘之欲以為相仲子不許遂夫妻相與逃而為人灌園終身不屈其節今人主誠能去驕傲之心懐可報之意披心腹見情素師古曰見顯示之也素謂心所向也墮肝膽施徳厚師古曰墮毁也音火規反終與之窮達無愛於士師古曰無所吝惜也則桀之犬可使吠堯宋祁曰犬字當從浙本作狗則近古而語直跖之客可使刺由應劭曰盗跖之客為其人使刺由由許由也師古曰此言被之以恩則用命也何况因萬乘之權假聖王之資乎然則軻湛七族要離燔妻子豈足為大王道哉應劭曰荆軻為燕刺秦始皇不成而死其族坐之湛没也吳王闔閭欲殺王子慶忌要離詐以罪亡令呉王燔其妻子要離走見慶忌以劒刺之張晏曰七族上至曽祖下至曽孫師古曰此說云湛七族無荆字也尋諸史籍荆軻無湛族之事不知陽所云者定何人也湛讀曰沈劉敞曰王充書言秦怨荆軻并殺其九族殺則是湛矣非必沈之水也宋祁曰淳化本作荆軻景祐本無荆字按浙本郭本去荆字云據注無荆字南本徐鍇亦滅荆字臣聞明月之珠夜光之璧以闇投人於道衆莫不按劒相眄者何則無因而至前也蟠木根柢輪囷離竒蘇林曰柢音蔕張晏曰柢根下本也輪囷離竒委曲盤戾也師古曰蟠木屈曲之木也囷音去輪反離音力爾反竒音於綺反一曰離竒各讀如本字而為萬乘器者以左右先為之容也師古曰萬乘器天子車輿之屬也容謂彫刻加飾故無因而至前雖出隨珠和璧秪怨結而不見德師古曰隨國之侯見大蛇傷者療而愈之蛇銜明珠以報其德故稱隨珠和氏之璧即卞和所獻之玉耳秪適也音支有人先游則枯木朽株樹功而不忘師古曰先游謂進納之也樹立也今夫天下布衣窮居之士身在貧羸師古曰衣食不充故羸痩也一曰羸謂無威力雖蒙堯舜之術挾伊管之辯師古曰伊伊尹管管仲懐龍逄比干之意而素無根柢之容雖竭精神欲開忠於當世之君師古曰開謂陳說也則人主必襲按劒相眄之迹矣師古曰襲重也言躡其故跡也是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上張晏曰陶家名模下圓轉者為鈞以其制器為大小比之於天也師古曰此說非也陶家名轉者為鈞盖取周回調鈞耳言聖王制馭天下亦猶陶人轉鈞非陶家轉象天也而不牽乎卑辭之語不奪乎衆多之口師古曰奪者言欲行善道而為佞人奪其計也宋祁曰浙本辭作亂故秦皇帝任中庶子蒙之言師古曰蒙者庶子名也今流俗書本蒙下輒加恬字非也以信荆軻而匕首竊發師古曰匕首短劒也其首類匕便於用也周文王獵涇渭載呂尙歸以王天下應劭曰西伯出遇呂尚於渭之陽與語大悦因載歸秦信左右而亡周用烏集而王師古曰言文王之得太公非因舊故若烏鳥之暴集何則以其能越攣拘之語馳域外之議師古曰攣音力全反獨觀乎昭曠之道也師古曰昭明也曠廣也今人主沈謟諛之辭牽帷廧之制孟康曰言為左右便僻侍帷廧臣妾所見牽制矣使不覊之士與牛驥同皁師古曰不覊言才識髙逺不可覊係也皁􅇫也揚雄方言云梁宋齊楚燕之間謂􅇫曰皁皁音在早反此鮑焦}
