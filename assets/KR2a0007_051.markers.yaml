  - {type: variant, offset: 593, length: 0, content: '', WYG: 也棺音工喚反而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顔色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不亡也師古曰令善也聞謂聲之聞也今陛下念思祖考術追厥功師古曰術亦作述圖所以昭光洪業休徳師古曰圖謀也休美也使天下舉賢良方正之士天下皆訢訢焉師古曰訢讀與欣同曰將興堯舜之道三王之功矣天下之士莫不精白以承休德師古曰厲精而為潔白也今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳􅇌射獵師古曰􅇌與驅同一日再三出臣恐朝廷之解弛師古曰解讀曰懈弛放也音式爾反宋祁曰江浙本廷作臣百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止嵗貢省廏馬以賦縣傳師古曰賦給與也傳音張戀反去諸苑以賦農夫出帛十萬餘匹以振貧}
