  - {type: variant, offset: 592, length: 0, content: '', WYG: 宋祁曰禮義下語未屬疑文不足故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數師古曰言心實憂念之不為禮飾也死則往弔哭之臨其小歛大斂已棺塗而後為之服錫衰麻絰師古曰已棺謂已大斂也塗謂塗殯也錫衰十五升布無事其縷}
