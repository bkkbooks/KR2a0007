  - {type: variant, offset: 2068, length: 0, content: '', WYG: 其義一也則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之髙下埀不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之師古曰駭亦驚也鼓擊鼓也係方絶又重鎮之係絶於天不可復結隊入深淵難以復出其出不出間不容髮蘇林曰改計取福正在今日言其激切甚急也能聼忠臣之言百舉必脱師古曰脱者免於禍也音土活反必若所欲為危於絫卵難於上天變所欲為易於反掌安於泰山今欲極天命之夀敝無窮之樂究萬乘之埶師古曰敝盡也究竟也不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難師古曰走趨向之也音奏此愚臣之所以為大王惑也宋祁曰景德本云此愚臣之所大惑也無以為王三字人性有畏其景而惡其跡者郤背而走師古曰背音歩内反迹愈多景愈疾不知就隂而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之凔鄭氏曰音悽愴之愴寒也宋祁曰注文音字上當有凔字注須複文為訓故必待凔字乃足一人炊之百人揚之無益也師古曰炊謂㸑火也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百歩百發百中楊葉之大加百中焉可謂善射矣然其所止廼百歩之内耳比於臣乘未知操弓持矢也師古曰乘自言所知者逺非止見百歩之中故謂由基為不曉射也福生有基禍生有胎服䖍曰基胎皆始也納其基絶其胎禍何自來師古曰納猶藏也何自來言無所從來也泰山之霤穿石單極之䋁斷幹孟康曰西方人名屋梁為極單一也一梁謂井鹿盧也言鹿盧為綆索久鍥斷井幹也晉灼曰䋁古綆字也單盡也盡極之綆斷幹幹井上四交之幹常為汲索所契傷也師古曰晉說近之幹者交木井上以為欄者也孟云鹿盧失其義矣䋁綆皆音鯁鍥契皆刻也音口計反水非石之鑽索非木之鋸漸靡使之然也師古曰靡盡也夫銖銖而稱之至石必差寸寸而度之至文必過鄭氏曰石百二十斤張晏曰乘所轉四萬六千八十銖而至於石合而稱之必有盈縮也師古曰言自小小以至於大數則有輕重不同也度音徒各反石稱丈量徑而寡失師古曰徑直也夫十圍之木始生如蘖足可搔而絶手可擢而㧞師古曰如蘖言若蘖之生牙也搔謂狐也搔音索髙反狐音荘交反據其未生先其未形也磨礱底厲不見其損有時而盡師古曰礱亦磨也底柔石也厲皂石也皆可以磨者礱音聾種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王游景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉師古曰鄉讀曰嚮以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王劉攽曰此枚乘説呉王後是後人以呉事寓言爾故言齊王殺身等事不同又卭筰武帝始通此已云南距𦍑筰之塞益知其非曰昔者秦西舉胡戎之難北備榆中之闗師古曰即今所謂榆闗也南距𦍑筰之塞師古曰筰西南夷也音力各反宋祁曰筰當從艸下同東當六國之從師古曰從音子容反六國乘信陵之籍孟康曰魏公子無忌號信陵君無忌嘗總五國却秦有地資也明蘇秦之約厲荆軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義師古曰修恩義以撫戎狄而南朝𦍑筰此其與秦地相什而民相百大王之所明知也師古曰地十倍於秦衆百倍於秦今夫讒䛕之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍師古曰言勸王之反則於吳為禍也此臣所以為大王患也夫舉吳兵以訾於漢李竒曰訾量也師古曰音子私反譬猶蠅蚋之附羣牛腐肉之齒利劒鋒接必無事矣師古曰蚋蚊屬也齒謂當之也蚋音芮又音人悦反天子聞吳率失職諸侯願責先帝之遺約師古曰失職謂被削黜失其常分今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國師古曰隱匿謂僻在東南夫漢并二十四郡十七諸侯方輸錯出運行數千里不絶於道其珍怪不如東山之府張晏曰漢時有二十四郡十七諸侯王也四方更輸錯互更出攻也如淳曰東方諸郡以封王侯不以封者二十四耳時七國謀反其餘不反者十七也東山呉王之府藏也師古曰二說皆非也言漢此時有二十四郡十七諸侯方軌而輸雜出貢賦入於天子猶不如吳之富也轉粟西鄉陸行不絶水行滿河不如海陵之倉如淳曰言漢京師仰須山東漕運以自給也晉灼曰海陵海中山為倉也臣瓚曰海陵縣名也有吳太倉師古曰瓚說是也鄉讀曰嚮修治上林雜以離宮積聚玩好圈守禽獸不如長洲之苑服䖍曰呉苑孟康曰以江水洲為苑也韋昭曰長洲在吳東宋祁曰注文呉苑字下當有也字游曲臺臨上路不如朝夕之池張晏曰曲臺長安臺臨道上蘇林曰吳以海水朝夕為池也師古曰三輔黄圖未央宮有曲臺殿宋祁曰注文上字下當有也字深壁髙壘副以闗城不如江淮之險此臣之所以為大王樂也師古曰言其富饒及游晏之處踰天子也宋祁曰景祐本無以字今大王還兵疾歸尙得十半師古曰十分之中可兾五分無患故云尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黄頭循江而下蘇林曰羽林黄頭郎習水戰者也張晏曰天子舟立黄旄於其端也師古曰鄧通以擢船為黄頭郎蘇説是也襲大王之都魯東海絶呉之饟道師古曰饟古餉字梁王飭車騎習戰射師古曰飭與勅同飭整也積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已師古曰已語終之辭夫三淮南之計不負其約晉灼曰吳楚反皆守約不從也齊王殺身以滅其跡晉灼曰齊孝王將閭也吳楚反堅守距三國後欒布聞齊初與三國有謀欲伐之王懼自殺師古曰齊王傳云吳楚已平齊王乃自殺今此枚乘諫書即已稱之二傳不同當有誤者四國不得出兵其郡晉灼曰膠東膠西濟北淄川王也發兵應呉楚皆見誅趙囚邯鄲應劭曰漢將酈寄圍趙王於邯鄲與囚無異劉奉世曰按諸傳吳王正月先起兵二月敗走中間五十日爾三國圍齊三月不能下漢兵至乃引歸解圍而後齊王自殺則當在吳走後一月外事又乘此書云梁固守以待吳飢則是未飢以前安得已知齊王殺身與四國不得出兵及趙囚之詳疑乘書非真事後追加之或傳之者増之也此不可掩亦已明矣師古曰言事已彰著大王已去千里之國而制於十里之内矣師古曰梁下屯兵方十里也張韓將北地如淳曰張張羽韓韓安國也時皆仕梁北地良家子善騎射者也師古曰將北地者言將兵而處吳軍之北以距吳非北地良家子也張羽韓安國不將漢兵如說非也弓馬宿左右服䖍曰韓頽當也如淳曰宿軍左右也後弓髙侯竟將輕騎絶吳糧道師古曰宿止也言弓髙所將之兵屯止於吳軍左右也兵不得下壁軍不得大息臣竊哀之願大王孰察焉吳王不用乘䇿卒見禽滅漢既平七國乘由是知名景帝召拜乘為𢎞農都尉乘久為大國上賔與英俊並游得其所好不樂郡吏以病去官復游梁梁客皆善屬辭賦乘尤髙孝王薨乘歸淮隂武帝自為太子聞乘名及即位乘年老廼以安車蒲輪徴乘師古曰蒲輪以蒲裹輪宋祁曰注末當有也字道死師古曰在道病死也詔問乘子無能為文者後廼得其孽子臯師古曰孽庶也臯字少孺乘在梁時取臯母為小妻乘之東歸也臯母不肯隨乘乘怒分臯數千錢留與母居年十七上書梁共王師古曰恭王名買孝王之子也得召為郎三年為王使與冗從爭師古曰冗從散職之從王者也見讒惡遇罪師古曰惡謂冗從言其短惡之事家室没入臯亡至長安㑹赦上書北闕自陳枚乘之子上得之大喜宋祁曰得之大喜越本無之字召入見待詔臯因賦殿中詔使賦平樂館善之拜為郎使匈奴臯不通經術詼笑類俳倡李竒曰詼嘲也師古曰俳雜戱也倡樂人也詼音恢俳音排嘲竹交反宋祁曰注文嘲南本作謿後人不識改從嘲耳為賦頌好嫚戱師古曰嫚褻汙也音慢以故得媟黷貴幸師古曰媟狎也黷垢濁也音瀆比東方朔郭舍人等而不得比嚴助等得尊官師古曰尊髙也武帝春秋二十九廼得皇子羣臣喜故臯與東方朔作皇太子生賦及立皇子禖祝師古曰禮記月令祀於髙禖髙禖求子之神也武帝晩得太子喜而立此禖祠而令臯作祭祝之文也宋祁曰皇子禖祝浙本皇字下有太字受詔所為皆不從故事重皇子也初衛皇后立臯奏賦以戒終師古曰令慎終如始也臯為賦善於朔也從行至甘泉雍河東東廵狩封泰山塞決河宣房游觀三輔離宫館臨山澤弋獵射馭狗馬蹵鞠刻鏤師古曰蹵足蹵之也鞠以韋為之中實以物蹵蹋為戯樂也蹵音千六反鞠音巨六反上有所感輙使賦之為文疾受詔輙成故所賦者多司馬相如善為文而遲故所作少而善於臯臯賦辭中自言為賦不如相如又言為賦廼俳見視如倡自悔類倡也故其賦有詆娸東方朔如淳曰娸音欺詆猶刑辟也師古曰詆毁也娸醜也詆音丁禮反又自詆娸其文骫骳曲隨其事皆得其意師古曰骫古委字也骳音被骫骳猶言屈曲也頗詼笑不甚閑靡凡可讀者百二十篇其尤嫚戱不可讀者尚數十篇路温舒字長君鉅鹿東里人也父為里監門使温舒牧羊温舒取澤中蒲截以為牒編用寫書師古曰小簡曰牒編聨次之稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署决曹史又受春秋通大義舉孝亷為山邑丞蘇林曰縣名在常山晉灼曰地理志常山有石邑無山邑師古曰山邑不知其處今流俗書本云常山石邑丞後人妄加石字耳坐法免復為郡吏元鳯中廷尉光以治詔獄請温舒署奏曹掾師古曰光解光守廷尉史㑹昭帝崩昌邑王賀廢宣帝初即位温舒上書言宜尚徳緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯師古曰伯讀曰霸近世趙王不終諸呂作亂而孝文為太宗繇是觀之師古曰繇讀與由同禍亂之作將以開聖人也故桓文扶㣲興壊尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至悳以承天心崇仁義省刑罰通闗梁一逺近敬賢如大賔愛民如赤子内恕情之所安而施之於海内是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之師古曰援引也音爰然天不授命滛亂其心遂以自亡深察禍變之故廼皇天之所以開至聖也故大將軍受命武帝股肱漢國師古曰謂霍光披肝膽决大計黜亡義立有徳輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受命之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言師古曰遏止也音一曷反故盛服先生不用於世忠良切言皆鬰於胷師古曰鬰積也譽䛕之聲日滿於耳虛美熏心實禍蔽塞師古曰熏氣烝也音勲此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患}
