  - {type: variant, offset: 1548, length: 0, content: '', WYG: 世曰自胡渉北河以下蘇説最近之陽已知趙連匈奴呉交越不欲斥言故謬其辭而云胡攻趙越攻吳四國有怨救兵不専漢梁淮陽不能助已欲吳王曉其謬辭也然文意僻澁故不可通鬭城不休救兵不止死者相隨輦車相屬師古曰屬連也音之欲反宋祁曰不止姚本作不至轉粟流輸千里不絕何則彊趙責於河間應劭曰趙幽王為呂后所幽死文帝立其長子遂為趙王取趙之河間立遂弟辟疆為河間王至子哀王}
