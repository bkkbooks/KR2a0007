  - {type: variant, offset: 3825, length: 797, content: 瑞帝王之盛節也然享薦之義不著于經以為封禪告成合祛於天地神祇祇戒精專以接神明總百官之職各稱事宜而為之節文唯聖主所由制定其當非群臣之所能列今將舉大事優游數年使群臣得人自盡終莫能成唯天子建中和之極兼總條貫金聲而玉振之以順成天慶垂萬世之基上然之乃自制儀采儒術以文焉既成將用事拜寬為御史大夫從東封泰山還登明堂寬上壽曰臣聞三代改制屬象相因間者聖統廢絕陛下發憤合指天地祖立明堂辟雍宗祀泰一六律五聲幽贊聖意神樂四合各有方象以丞嘉祀為萬世則天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅邕永享光輝充塞天文粲然見象日昭報降符應臣寬奉觴再拜上千萬歲壽制曰敬舉君之觴後太史令司馬遷等言曆紀壞廢漢興未改正朔宜可正上乃詔寬與遷等共定漢太初曆語在律曆志初梁相褚大通五經為博士時寬為弟子及御史大夫缺徵褚大大自以為得御史大夫至洛陽聞兒寬為之褚大笑及至與寬議封禪於上前大不能及退而服曰上誠知人寬為御史大夫以稱意任職故久無有所匡諫於上官屬易之居位九歲以官卒贊曰公孫弘卜式兒寬皆以鴻漸之翼困於燕爵遠迹羊豕之間非遇其時焉能致此位乎是時漢興六十餘載海內艾安府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息群士慕嚮異人並出卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已漢之得人於茲為盛儒雅則公孫弘董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚皋應對則嚴助朱買臣曆數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王襃以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂鄭弘召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於世參其名臣亦其次也, WYG: 證}
