  - {type: variant, offset: 355, length: 0, content: '', WYG: 為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士師古曰言貧賤之人也韋帶以單韋為帶無飾也宋祁曰韋帶南本浙本作革帶修身於内成名於外而使後世不絶息至秦則不然貴為天子富有天下賦歛重數百姓任罷師古曰數屢也任謂役事也罷讀曰疲任疲言疲於役使也赭衣半道羣盗滿山師古曰犯罪者則衣赭衣行道之人半著赭衣言被罪者衆也盜賊皆依山為阻故云滿山也使天下之人戴目而視傾耳而聽師古曰戴目者言常逺視有異志也傾耳而聽言樂禍亂也一夫大謼天下嚮應者陳勝是也師古曰謼字與呼同謼呌也音火故反嚮讀曰響秦非徒如此也起咸陽而西至雍離宮三百師古曰凡言離宫者皆謂於别處置之非常所居也鍾鼓帷帳不移而具又為阿房之殿殿髙數十仞師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿}
