  - {type: variant, offset: 362, length: 3, content: 貴爵賞, WYG: 摧折者哉師古曰孟賁古之勇士賁音奔如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦箴諫李竒曰古有誦詩之工記過之史常在君側也師古曰箴戒也音之林反瞽誦詩諫師古曰瞽無目之人公卿比諫李奇曰相親比}
