  - {type: variant, offset: 1991, length: 8, content: 治黨與方急弘病甚, WYG: 見誅囚弟於雍者淮南王長有罪見徙死於雍所以然者坐二國有姦臣如新垣平等勸王其反師古曰仆音赴今天子新據先帝之遺業左規山東右制闗中變權易埶大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝如淳曰新垣平詐言鼎在泗水中臣望東北汾隂有金寳氣鼎其在乎弗迎則不至為吳計者猶新垣平之言周鼎終不可得也服䖍曰過誤也則我呉遺嗣不可期於世矣師古曰言呉當絕滅無遺嗣也髙皇帝燒棧道水章邯應劭曰章邯為雍王髙祖以水灌其城破之也兵不留行師古曰言無所稽留不廢於行收弊民之倦東馳函谷西楚大破張晏曰項羽}
