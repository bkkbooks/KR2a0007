  - {type: variant, offset: 1719, length: 266, content: 御史大夫為布被自九卿以下至於小吏無差誠如黯言且無黯陛下安聞此言上以為有讓愈益賢之元朔中代薛澤為丞相先是漢常以列侯為丞相唯弘無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥祿厚德盛者獲爵尊故武功以顯重而文德以行襃其以高成之平津鄉戶六百五十封丞相弘為平津侯其後以為故事至丞相封自弘始也時上方興功業婁舉賢良弘自見為舉首起徒步數年至宰相封侯於是起客館開東閣以延賢人與參謀議弘身食一肉脫粟飯故人賓客仰衣食奉祿皆以給之家無所餘然其性意忌外寬內深諸常與弘有隙無近遠雖陽與善後竟報其過殺主父偃徙董仲舒膠西皆弘力也後, WYG: 王謂}
