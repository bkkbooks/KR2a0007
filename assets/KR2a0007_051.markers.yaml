  - {type: variant, offset: 2910, length: 222, content: 繇四百人式又盡復與官是時富豪皆爭匿財唯式尤欲助費上於是以式終長者乃召拜式為中郎賜爵左庶長田十頃布告天下尊顯以風百姓初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣屮蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去毋令敗群上奇其言欲試使治民拜式緱氏令緱氏便之遷成皋令將漕最上以式朴忠拜為齊王太傅轉為相會呂嘉反式上書曰臣聞主媿臣死群臣宜盡死節其駑下者宜出財以佐軍如是則強國不犯之道也臣願與子男及臨菑習弩博昌習船者請行死之, WYG: ''}
