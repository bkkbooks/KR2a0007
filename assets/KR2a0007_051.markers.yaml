  - {type: variant, offset: 546, length: 0, content: '', WYG: 也天子}
  - {type: variant, offset: 546, length: 0, content: '', krp: 也天子}
  - {type: variant, offset: 547, length: 1, content: 急, WYG: 尊四海之内其義莫不為臣然而養三老於太學親執醬而餽執爵而酳師古曰餽字與饋同進食曰餽酳者少少飲酒謂食已而蕩口也音􅏷祝䭇在前祝鯁在後師古曰䭇古饐字謂食不下也以老人好饐鯁故為備祝以祝之宋祁曰䭇當作􅀈公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫師古曰修正謂修身正行者故以天子之尊尊養三老視孝也師古曰視讀曰示立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗已而改之從善無不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為闗塞秦地之固大小之埶輕重之權其與一家之富一夫之彊胡可勝計也師古曰胡何也勝盡也然而兵破於陳渉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也師古曰適快也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過嵗三日什一而籍師古曰什一謂十分之中公取一也籍借也謂借人力也一曰為簿籍而税之君有餘財民有餘力而頌聲作師古曰頌者六詩之一羙盛徳之形容盖帝王之嘉致秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求師古曰勝堪也罷讀曰疲以下亦同一君之身耳所以自養者馳騁弋獵之娯天下弗能供也師古曰弋繳射也勞罷者不得休息飢寒者不得衣食亡罪而死刑者無所告訴人與之為怨家與之為讎師古曰言人人為怨家家為讎故天下壞也秦皇帝身在之時天下已壞矣而弗自知也秦皇帝東廵狩至㑹稽琅邪刻石著其功自以為過堯舜統如淳曰統繼也堯舜子不才不能長世而秦自以過堯舜可至萬世也師古曰此說非也統治也言自羙功德治理天下過於堯舜也其下乃言以一至萬之事縣石鑄鍾虡服䖍曰縣石以為磬也蘇林曰秦欲平天下法使輕重如石之在稱也師古曰二說皆非也縣稱也石百二十斤稱銅鐵之斤石以鑄鍾虡言其奢泰也虡猛獸之名謂鍾鼔之柎飾為此獸虡音鉅篩土築阿房之宮師古曰篩以竹簁為之篩音師簁音山爾反自以為萬世有天下也古者聖王作諡三四十世耳雖堯舜禹湯文武絫世廣徳師古曰絫古累字以為子孫基業無過二三十世}
