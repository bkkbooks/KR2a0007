  - {type: variant, offset: 1989, length: 0, content: '', WYG: 濟北也宋祁曰别本注文自張晏至墓故漏此二十一字故報怨當作欲報怨大王不憂臣恐救兵之不專孟康曰不專救漢也如淳曰皆自私怨宿忿不能為呉也若吳舉兵反天子來討謂四國但有意不敢相救也師古曰二說皆非也言諸國各有私怨欲申其志不肯專為吳非不敢相救也胡馬遂進窺於邯鄲越水長沙還舟青陽張晏曰青陽地名還舟聚舟船也言胡為趙難越為吳難不可恃也劉奉世曰越水長沙者陽盖謬言越先以水軍攻長沙而後還舟侵吳也下文云水章邯是其為文如此青陽呉地雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也應劭曰時趙王遂北連匈奴吳王濞素事三越故鄒陽微言胡越亦自受敵救兵之不專也胡馬故曰進越水故曰深蘇林曰折截也陽知呉王隂連結齊趙淮南胡越欲諫不敢指斥言故陳胡越之難齊趙之怨微言梁并淮陽絶越人之糧漢折西河以輔大國以破難其計欲隱其辭故謬言胡益進越益深為大王患之以錯亂其語若吳為憂助漢者也自此以下乃致其意焉師古曰蘇說是也臣聞交龍襄首奮翼則浮雲出流霧雨咸集師古曰襄舉也宋祁曰南本徐鍇改交為蛟聖王底節修徳則游談之士歸義思名師古曰底厲也音指今臣盡智畢議易精極慮如淳曰改易精思以極盡}
