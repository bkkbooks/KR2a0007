  - {type: variant, offset: 2055, length: 0, content: '', WYG: 忠無不報信不見疑臣常以為然徒虛語耳昔荆軻慕燕丹之義白虹貫日太子畏之應劭曰燕太子丹質於秦始皇遇之無禮丹亡去厚養荆軻令西刺秦王精誠感天白虹為之貫日也如淳曰白虹兵象日為君為燕丹表可克之兆師古曰精誠若斯太子尚畏而不信也太白食昴義亦如之衛先生為秦畫長平之事太白食昴昭王疑之蘇林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生說昭王益兵糧為應侯所害事用不成其精誠上逹於天故太白為之食昴昴趙分也將有兵故太白食昴食干歴之也如淳曰太白天之將軍夫精變天地而信不諭兩主豈不哀哉宋祁曰精字下疑有誠字今臣盡忠竭誠畢議願知張晏曰盡其計議願王知之左右不明卒從吏訊為世所疑師古曰言左右不明者不欲斥王也訊謂鞫問也音信是使荆軻衛先生復起而燕秦不寤也願大王孰察之昔玉人獻寳楚王誅之應劭曰卞和得玉璞獻之武王王示玉人曰石也刖其右足武王殁復獻文王玉人復曰石也則其左足至成王時抱其璞哭於郊乃使玉人攻之果得寳玉也宋祁曰玉人南浙本並作玉尹李斯竭忠胡亥極刑張晏曰李斯諫二世以正而二世殺之具五刑是以箕子陽狂接輿避世張晏曰接輿楚賢人陽狂避世師古曰輿音弋於反恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽師古曰以謬聼為後後猶下也毋使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷應劭曰呉王取馬革為鴟夷受子胥沈之江鴟夷榼形師古曰鴟夷即今之盛酒鴟夷幐宋祁曰幐字下當有也字臣始不信廼今知之願大王孰察少加憐焉語曰有白頭如新孟康曰初相識至白頭不相知宋祁曰此注未安越本孟康作師古南本初相識作初不相識傾盖如故文頴曰傾盖猶交盖駐車也何則知與不知也故樊於期逃秦之燕藉荆軻首以奉丹事張晏曰於期為秦将被讒走之燕始皇滅其家又重購之燕遣荆軻欲刺秦王於期自刎首令軻齎徃師古曰之往也藉假也王奢去齊之魏臨城自剄以郤齊而存魏孟康曰王奢齊臣也亡至魏其後齊伐魏奢登城謂齊將曰今君之來不過以奢故也義不茍生以為魏累遂自剄也夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於}
