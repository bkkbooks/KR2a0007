  - {type: variant, offset: 2066, length: 0, content: '', krp: 光之明下不傷百姓之心者有王術也師古曰德政和平上感天象則日月星辰無有錯謬故言不絶三光之明也故父子之道天性也忠臣不避重誅以直諫師古曰言父子}
