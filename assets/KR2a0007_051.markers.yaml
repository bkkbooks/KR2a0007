  - {type: variant, offset: 2057, length: 1, content: 通, WYG: 為燕尾生服䖍曰蘇秦於秦不出其信於燕則出尾生之信也晉灼曰說齊宣王使還燕十城又令閔王厚葬以弊齊終死為燕也師古曰尾生古之信士守志亡軀故以為喻白圭戰亡六城為魏取中山張晏曰白圭為中山將亡六城君欲殺之亡入魏文侯厚遇之還㧞中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劒而怒食以駃騠孟康曰駃騠駿馬也生七日而超其母敬重蘇秦雖有讒謗而更食以珍竒之味師古曰食讀曰飤駃音决騠音題白圭顯於中山師古曰以㧞中山之功而尊顯也人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信師古曰析分也豈移於浮辭哉師古曰不以浮說而移心故女無羙惡入宮見妒士無賢不肖宋祁曰南本賢下有愚字衍字不可從入朝見嫉昔司馬喜臏腳於宋卒相中山蘇林曰六國時人被此刑也范雎拉脅折齒於魏卒為應侯應劭曰魏人也魏相魏齊疑其以國隂事告齊乃掠笞數百拉脅折齒師古曰後入秦為相封為應侯拉摧也音盧合反此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也師古曰言直}
