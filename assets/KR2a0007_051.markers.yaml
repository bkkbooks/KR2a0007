  - {type: variant, offset: 560, length: 2, content: 離和, WYG: 自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諫之士縱恣行誅退誹謗之人殺直諫之士是以道諛媮合茍容師古曰道讀曰導導引主意於邪也媮奥偷同比其徳則賢於堯舜課其功則賢於湯武天下已潰而莫之告也師古曰水旁決曰潰言天下之壞如水潰詩曰匪言}
