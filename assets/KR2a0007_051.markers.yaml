  - {type: variant, offset: 1989, length: 0, content: '', krp: 濟北也宋祁曰别本注文自張晏至墓故漏此二十一字故報怨當作欲報怨大王不憂臣恐救兵之不專孟康曰不專救漢也如淳曰皆自私怨宿忿不能為呉也若吳舉兵反天子來討謂四國但有意不敢相救也師古曰二說皆非也言諸國各有私怨欲申其志不肯專為吳非不敢相救也胡馬遂進窺於邯鄲越水長沙還舟青陽張晏曰青陽地名還舟聚舟船也言胡為趙難越為吳難不可恃也劉奉世曰越水長沙者陽盖謬言越先以水軍攻長沙而後還舟侵吳也下文云水章邯是其為文如此青陽呉地雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也應劭曰時趙王遂北連匈奴吳王濞素事三越故鄒陽微言胡越亦自受敵救兵之不專也胡馬故曰進越水故曰深蘇林曰折截也陽知呉王隂連結齊趙淮南胡越欲諫不敢指斥言故陳胡越之難齊趙之怨微言梁并淮陽絶越人之糧漢折西河以輔大國以破難其計欲隱其辭故謬言胡益進越益深為大王患之以錯亂其語若吳為憂助漢者也自此以下乃致其意焉師古曰蘇說是也臣聞交龍襄首奮翼則浮雲出流霧雨咸集師古曰襄舉也宋祁曰南本徐鍇改交為蛟聖王底節修徳則游談之士歸義思名師古曰底厲也音指今臣盡智畢議易精極慮如淳曰改易精思以極盡}
  - {type: variant, offset: 1990, length: 0, content: '', WYG: 慮也則無國不可奸師古曰奸音干飾固陋之心則何王之門不可曵長裾乎然臣所以歴數王之朝背淮千里而自致者非惡臣國而樂吳民也竊髙下風之行尤説大王之義師古曰言在下風側聼髙尙羙悦大王之行義也說讀曰悦故願大王之無忽察聼其志臣聞鷙鳥絫百不如一鶚孟康曰鶚大鵰也如淳曰鷙鳥比諸侯鶚比天子師古曰鷙擊之鳥鷹鸇之屬也鶚自大鳥而鷙者耳非鵰也絫古累字鶚音愕夫全趙之時服䖍曰全趙趙未分之時武力鼎士􅕼服叢臺之下者一旦成市師古曰袨服盛服也鼎士舉鼎之士也叢臺趙王之臺也在邯鄲袨音州縣之縣而不能止幽王之湛患師古曰幽王謂趙幽王友也湛讀曰沈沈患言幽王為呂后所幽死淮南連山東之俠死士盈朝不能還厲王之西也師古曰厲王淮南厲王長也西謂廢遷嚴道而死於雍也然而計議不得雖諸賁不能安其位亦明矣師古曰諸謂專諸賁謂孟賁皆古勇士也故願大王審畫而已師古曰畫計也音獲始孝文皇帝據闗入立寒心銷志不眀求衣張晏曰據函谷闗立為天子諸國聞文帝入闗為之寒心散志也求衣夜索衣著不及待明意不安也臣瓚曰文帝入闗而立以天下多難故乃寒心戰慄未明而起師古曰瓚說是也自立天子之後使東牟朱虛東褒義父之後應劭曰天下已定文帝遣朱虛侯章東喻齊王嘉其首舉兵欲誅諸呂猶春秋褒邾儀父也師古曰立天子謂立為天子也義讀曰儀父讀曰甫深割嬰兒王之應劭曰封齊王六子為王其中有小小嬰兒者文帝於骨肉厚也或曰皇子武為代王參為太原王揖為梁王師古曰或說是也劉奉世曰使東牟朱虛東言其東使就王封也而義父者似謂悼惠而不可考據褒其後故封其子皆為王封時有㓜者故舉言嬰兒也下文自言梁代淮陽文三子是矣則知此或說非也壤子王梁代如淳曰文帝之二子晉灼曰揚雄方言梁益之間所愛謂其肥盛曰壤或曰言深割嬰兒王之壤壤土也壤字當上屬也師古曰或說非也宋祁曰注文江浙本謂作諱於理最切言謂者漫而無綂益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉應劭曰仆僵仆也濟北王興居}
