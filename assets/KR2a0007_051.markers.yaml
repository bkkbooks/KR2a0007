  - {type: variant, offset: 1546, length: 0, content: '', krp: 又言柴唐子為不善足}
  - {type: variant, offset: 1547, length: 0, content: '', WYG: 戒鄧展曰淮南傳棘蒲侯柴武太子柴竒與士伍開章謀反章下詰責師古曰以其所上之章令有司詰問對以為錢者亡用器也而可以易富貴富貴者人主之操柄也師古曰操持也音千高反令民為之是與人主共操柄不可長也師古曰長謂畜養也言此事宜速禁絶不可畜養其言多激切善指事意然終不加罰所以廣諫爭之路也其後復禁鑄錢云鄒陽齊人也漢興諸侯王皆自治民聘賢呉王濞招致四方游士陽與呉嚴忌枚乘等俱仕呉皆以文辯著名久之呉王以太子事怨望稱疾不朝隂有邪謀陽奏書諫為其事尙隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後廼致其意其辭曰臣聞秦倚曲臺之宫應劭曰始皇帝所治處也若漢家未央宮師古曰倚恃也音於綺反懸衡天下服䖍曰闗西為衡應劭曰衡平也如淳曰衡猶稱之衡也言其懸法度於其上也師古曰此說秦自以為威力彊固非論平法也下又言陳勝連從兵之據則是説從横之事耳服釋是也畫地而不犯兵加胡越師古曰畫地不犯者法制之行也至其晩節末路張耳陳勝連從兵之據師古曰從音子容反以叩函谷咸陽遂危師古曰叩擊也何則列郡不相親萬室不相救也今胡數渉北河之外上覆飛鳥下不見伏菟蘇林曰言胡來人馬之盛揚塵上覆飛鳥下不見伏菟也一曰覆盡也言上射飛鳥下盡伏莬也師古曰覆盡是也音方目反劉}
