  - {type: variant, offset: 570, length: 1, content: 暴, WYG: 言者何也此但畏忌犯顔得罪罰也又言言而見聽則悉意荅對不見信受則屏退也今詩本云聽言則對誦言如醉説者又别為義與此不同宋祁曰注文又言言而見聽南本浙本並無一言字余謂當存二言字又曰濟濟多士文王以寧師古曰此大雅文王之篇也濟濟多威儀也此言文王以多士之}
