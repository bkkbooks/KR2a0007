  - {type: variant, offset: 355, length: 0, content: '', krp: 為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久逺諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士師古曰言貧賤之人也韋帶以單韋為帶無飾也宋祁曰韋帶南本浙本作革帶修身於内成名於外而使後世不絶息至秦則不然貴為天子富有天下賦歛重數百姓任罷師古曰數屢也任謂役事也罷讀曰疲任疲言疲於役使也赭衣半道羣盗滿山師古曰犯罪者則衣赭衣行道之人半著赭衣言被罪者衆也盜賊皆依山為阻故云滿山也使天下之人戴目而視傾耳而聽師古曰戴目者言常逺視有異志也傾耳而聽言樂禍亂也一夫大謼天下嚮應者陳勝是也師古曰謼字與呼同謼呌也音火故反嚮讀曰響秦非徒如此也起咸陽而西至雍離宮三百師古曰凡言離宫者皆謂於别處置之非常所居也鍾鼓帷帳不移而具又為阿房之殿殿髙數十仞師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿}
  - {type: variant, offset: 356, length: 0, content: '', WYG: 為房也房字或作旁説云始皇作此殿未有名以其去咸陽近且號阿旁阿近也八尺曰仞東西五里南北千歩從車羅騎四馬騖馳旌旗不橈師}
  - {type: variant, offset: 356, length: 0, content: '', krp: 為房也房字或作旁説云始皇作此殿未有名以其去咸陽近且號阿旁阿近也八尺曰仞東西五里南北千歩從車羅騎四馬騖馳旌旗不橈師}
  - {type: variant, offset: 357, length: 0, content: '', WYG: 曰橈屈也言庭之廣大殿之髙敞衆騎馳騖無所廹觸建立旌旗不屈撓撓音女孝反宋祁曰注屈橈下當有也字為宫室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極呉楚江湖之上瀕海之觀畢至師古曰瀕水涯也瀕海謂緣海之邊也畢盡也瀕音頻又音賓字或作濵音義同道廣五十歩三文而樹厚築其外隠以金椎服䖍曰作壁如甬道隠築也以鐵椎築之師古曰築令堅實而使隆髙耳不為甬壁也隠音於靳反樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉死葬乎驪山吏徒數十萬人師古曰吏以督領徒以役作也宋祁曰乎當作虖曠日十年師古曰曠空也廢也言為重役空廢時日積年嵗也下徹三泉師古曰三重之泉言其深也合采金石冶銅錮其内桼塗其外師古曰錮謂鑄而合之也音固被以珠玉飾以翡翠應劭曰雄曰翡雌曰翠臣瓚曰異物志云翡色赤而大於翠師古曰鳥各别類非雄雌異名也被音皮義反中成觀游上成山林為葬薶之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉服䖍曰謂塊墣作冢喻小也臣瓚曰蓬顆猶祼顆小冢也晉灼曰東北人名土塊為蓬顆師古曰諸家之説皆非顆謂土塊􅅫顆言塊上生蓬者耳舉此以對冢上山林故言蓬顆蔽冢也顆音口果反秦以熊羆之力虎狼之心蠶食諸侯并吞海内而不篤禮義師古曰篤厚也故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中師古曰中音竹仲反臣聞忠臣之事君也言切直則不用而身危不切直則不可以眀道故切直之言眀主所欲急聞忠臣之所以蒙死而竭知也師古曰䝉冐犯也地之磽者雖有善種不能生焉師古曰磽埆瘠薄也磽音口交反江臯河瀕雖有惡種無不猥大李奇曰臯水邊淤地也師古曰猥盛也昔者夏商之季世雖闗龍逄箕子比干之賢身死亡而道不用服䖍曰闗龍逄桀之忠臣也師古曰比干諫紂而紂殺之論語曰微子去之箕子為之奴比干諫而死文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力師古曰芻刈草也蕘草薪也言執賤役者也大雅板之詩曰詢于芻蕘此周之所以興也故地之羙者善養禾君之仁者善養士雷霆之所擊無不摧折者師古曰霆疾雷也音廷萬鈞之所壓無不糜滅者今人主之威非特雷霆也師古曰特獨也埶重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又廼况於縱欲恣行暴虐惡聞其過乎宋祁曰乎當作虖震之以威壓之以重師古曰震動也則雖有}
