  - {type: variant, offset: 2057, length: 1, content: 通, krp: 為燕尾生服䖍曰蘇秦於秦不出其信於燕則出尾生之信也晉灼曰說齊宣王使還燕十城又令閔王厚葬以弊齊終死為燕也師古曰尾生古之信士守志亡軀故以為喻白圭戰亡六城為魏取中山張晏曰白圭為中山將亡六城君欲殺之亡入魏文侯厚遇之還㧞中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劒而怒食以駃騠孟康曰駃騠駿馬也生七日而超其母敬重蘇秦雖有讒謗而更食以珍竒之味師古曰食讀曰飤駃音决騠音題白圭顯於中山師古曰以㧞中山之功而尊顯也人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信師古曰析分也豈移於浮辭哉師古曰不以浮說而移心故女無羙惡入宮見妒士無賢不肖宋祁曰南本賢下有愚字衍字不可從入朝見嫉昔司馬喜臏腳於宋卒相中山蘇林曰六國時人被此刑也范雎拉脅折齒於魏卒為應侯應劭曰魏人也魏相魏齊疑其以國隂事告齊乃掠笞數百拉脅折齒師古曰後入秦為相封為應侯拉摧也音盧合反此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也師古曰言直}
  - {type: variant, offset: 2059, length: 0, content: '', WYG: 而行不求朋黨之助謂忠信必可恃也畫計也音獲是以申徒狄蹈雍之河服䖍曰殷之末世介士也雍之河雍州之河也師古曰雍者河水溢出為小流也言狄初因蹈雍遂入大河也爾雅曰水自河出為雍又曰江有沲河有雍雍音於龍反服云雍州之河非也徐衍負石入海服䖍曰周之末世人也師古曰負石者欲速沈也不容於世宋祁曰容字下一添身字義不茍取比周於朝以移主上之心師古曰比音頻寐反故百里奚乞食於道路繆公委之以政應劭曰虞人也聞秦繆公賢欲往干之乏資乞食以自致也甯戚飯牛車下桓公任之以國應劭曰齊桓公夜出迎客甯戚疾擊其牛角髙歌曰南山矸白石爛生不遭堯與舜禪短布單衣適至骭從昬飯牛薄夜半長夜曼曼何時旦桓公召與語說之以為大夫師古曰矸字與岸同骭脛也薄止也骭音下諫反曼音莫幹反宋祁曰注文髙字合作商韓昌黎詩云為我商聲謳乃用此事也浙本亦作商作髙盖監本誤刋耳此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠桼昆弟不能離豈惑於衆口哉故偏聼生姦獨任成亂昔魯聼季孫之說逐孔子師古曰季孫魯大夫季桓子也名斯論語云齊人歸女樂季桓子受之三日不朝孔子行盖桓子故使定公受齊之女樂欲令去孔子也宋任子冉之計囚墨翟文頴曰子冉子罕也夫以孔墨之辯不能自免於讒諛而二國以危何則衆口鑠金積毁銷骨也師古曰羙金見毁衆共疑之數被燒鋉以至銷鑠讒佞之人肆其詐巧離散骨肉而不覺知秦用戎人由余而伯中國師古曰伯讀曰霸齊用越人子臧而彊威宣師古曰齊之二王諡也此二國豈係於俗牽於世繫竒偏之浮辭哉公聼竝觀埀明當世師古曰公聼言不私也並觀所見齊同也故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣師古曰朱丹朱堯子象舜弟管蔡周之二叔也今人主誠能用齊秦之明後宋魯之聼則}
