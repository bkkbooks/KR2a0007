  - {type: variant, offset: 2065, length: 0, content: '', WYG: 以十數得茅焦為廓大義鄭氏曰齊人也應劭曰茅焦諫云陛下車裂假父有嫉妬之心囊撲兩弟有不慈之名遷母咸陽有不孝之行臣竊為陛下危之臣所言畢乃解衣趨鑊始皇下殿左手接之曰先生起矣即迎太后遂為母子如初始皇非能說其言也廼自强從之耳師古曰說讀曰悅茅焦亦厪脫死如毛􅈊耳師古曰厪少也言纔免於死也厪音巨刃反故事所以難者也今子欲安之乎師古曰安焉也之往也陽曰鄒魯守經學齊楚多辯知韓魏時有竒莭吾將歴問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為衆不可盖師古曰盖覆蔽也竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王羙人兄也後封為盖侯鄒陽留數日乘間而請曰師古曰間謂空隙無事之時臣非為長君無使令於前故來侍也師古曰使令謂役使之人也令音力成反愚戇竊不自料願有謁也師古曰料量也謁告也長君跪曰幸甚陽曰竊聞長君弟得幸後宮天下無有師古曰言獨一耳無所比類也而長君行迹多不循道理者今爰盎事即窮竟梁王恐誅如此則太后怫鬰泣血無所發怒師古曰怫鬰藴積也怫音佛切齒側目於貴臣矣臣恐長君危於絫卵師古曰絫卵者言其將隤而破碎也竊為足下憂之長君懼然曰將為之奈何師古曰懼讀曰瞿音居具反瞿然無守之貌陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宫如淳曰太后宮及帝宫也金城之固也師古曰言其榮寵無極不可壞故取喻於金城也又有存亡繼絶之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事師古曰言日日欲殺也及舜立為天子封之於有卑服䖍曰音畀予之畀也師古曰地名也音鼻今鼻亭是也在零陵夫仁人之於兄弟無臧怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般師古曰慶父莊公弟也子般莊公太子也僕人即鄧扈樂也父讀曰甫般字與班同獄有所歸師古曰歸罪於鄧扈樂也季友不探其情而誅焉師古曰季友慶父之弟不探慶父本情而誅扈樂慶父親殺閔公季子緩追免賊師古曰慶父出奔季友縱而不追免其賊亂之罪春秋以為親親之道也師古曰公羊之說也言季友親其兄也魯哀姜薨于夷孔子曰齊桓公法而不譎以為過也師古曰哀姜莊公夫人也滛於二叔而豫殺閔公齊人殺之于夷夷齊地也法而不譎者言守法而行不能用權以免其親也以是說天子徼幸梁事不奏長君曰諾乘閒入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守不行漢既破吳齊王自殺不得立嗣劉奉世曰齊孝王自殺景帝聞之以為首善即立其子此云不得立嗣者盖嘗有為此議者耳濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰師古曰玃音俱畧反臣請試為大王眀說梁王通意天子說而不用死未晩也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國張晏曰四方受敵濟北居中央為五晉灼曰四分即交五而裂如田字也權不足以自守勁不足以扞宼師古曰扞禦也音胡旦反又非有竒怪云以待難也如淳曰非有竒材異計欲以為亂逆也但假權許吳以避其禍耳晉灼曰非有以怪異之心而城守須待變難而應吳也師古曰二説皆非也此言權謀勁力既不能扞守又無竒怪神靈可以禦難恐不自全故墜言於吳也宋祁曰徐鍇改云作亡予謂云義安不須改雖墜言於吳非其正計也蘇林曰墜猶失也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也師古曰祭仲鄭大夫祭足也事鄭莊公為公娶鄧曼生昭公故祭仲立之而宋大夫雍氏以女妻莊公而生突昭公既立宋人誘祭仲而執之曰不立突將死祭仲與宋人盟以厲公歸而立之昭公奔衛言足脅於大國茍順其心欲以全昭公也祭音側界反宋祁曰亡也邵本無也字鄉使濟北見情實示不從之端師古曰鄉讀曰嚮見謂顯也則吳必先歴齊畢濟北張晏曰歴過畢盡收濟北之地招燕趙而總之如此則山東之從結而無隙矣師古曰從音子容反今吳楚之王練諸侯之兵􅇌白徒之衆師古曰練選也􅇌與驅同白徒言素非軍旅之人若今言白丁矣西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬歩獨進師古曰半歩曰跬音空絫反宋祁曰跬歩獨進一作行義直可行瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊師古曰區區小貌也是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣師古曰撓曲也音女教反宋祁曰一當作壹功義如此尙見疑於上脅肩低首絫足撫衿師古曰脅翕也謂歛也使有自悔不前之心張晏曰悔不與吳西也非社稷之利也臣恐藩臣守職者疑之臣竊料之師古曰料量也能歴西山徑長樂抵未央攘􅃑而正議者獨大王耳師古曰西山謂崤及華山也抵至也攘郤也袂衣袖也攘袂猶今人云掉臂耳上有全亡之功下有安百姓之名德淪於骨髓師古曰淪入也恩加於無窮願大王留意詳惟之師古曰惟思也孝王大說師古曰說讀曰悦使人馳以聞濟北王得不坐徙封於淄川也宋祁曰姚本及越本並無也字枚乘字叔淮隂人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十户之聚以王諸侯師古曰聚聚邑也音才喻反湯武之土不過百里上不絶}
