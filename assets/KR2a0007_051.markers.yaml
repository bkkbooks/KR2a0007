  - {type: variant, offset: 2685, length: 172, content: 輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有冤欲言事乎式曰臣生與人亡所爭邑人貧者貸之不善者教之所居人皆從式式何故見冤使者曰苟子何欲式曰天子誅匈奴愚以為賢者宜死節有財者宜輸之如此而匈奴可滅也使者以聞上以語丞相弘弘曰此非人情不軌之臣不可以為化而亂法願陛下勿許上不報數歲乃罷式式歸復田牧歲餘會渾邪等降縣官費眾倉府空貧民大徙皆卬, WYG: ''}
