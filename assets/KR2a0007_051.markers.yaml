  - {type: variant, offset: 2095, length: 0, content: '', WYG: 吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計嵗以萬數此仁聖之所以傷也宋祁曰所以傷也江浙本並無以字予謂存以則語緩而迂不如去之則句易了太平之未洽凡以此也夫人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以視之師古曰視讀曰示吏治者利其然則指道以眀之上奏畏郤則鍜鍊而周内之晉灼曰精熟周悉致之法中也師古曰郤退也畏為上所郤退郤音丘畧反盖奏當之成師古曰當謂處其罪也雖咎繇聼之猶以為死有餘辜師古曰咎繇作士善聼獄訟故以為喻也何則成練者衆文致之罪明也是以獄吏專為深刻殘賊而亡極媮為一切如淳曰媮茍且也一切權時也不顧國患此世之大賊}
