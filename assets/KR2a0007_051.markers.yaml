  - {type: variant, offset: 2211, length: 335, content: 臣弘行能不足以稱加有負薪之疾恐先狗馬填溝壑終無以報德塞責願歸侯乞骸骨避賢者路上報曰古者賞有功襃有德守成上文遭遇右武未有易此者也朕夙夜庶幾獲承至尊懼不能寧惟所與共為治者君宜知之蓋君子善善及後世若茲行常在朕躬君不幸罹霜露之疾何恙不已乃上書歸侯乞骸骨是章朕之不德也今事少閒君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事凡為丞相御史六歲年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相自蔡至慶丞相府客館丘虛而已至賀屈氂時壞以為馬廄車庫奴婢室矣唯慶以惇謹復終相位其餘盡伏誅云弘子度嗣侯為山陽太守十餘歲詔徵鉅野令史成詣公車度留不遣坐論為城旦元始中修功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫弘者也位在宰相封侯而為布被脫粟之飯奉祿以給故人賓客無有所餘, WYG: 卿選}
