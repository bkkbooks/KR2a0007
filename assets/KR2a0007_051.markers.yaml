  - {type: variant, offset: 380, length: 163, content: 正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器即賦斂省不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則群臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此, WYG: 永}
