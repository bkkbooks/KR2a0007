  - {type: variant, offset: 550, length: 0, content: '', WYG: 張晏曰夏十七世殷三十一世周三十六世秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也師古曰復重也音扶目反}
  - {type: variant, offset: 550, length: 0, content: '', krp: 張晏曰夏十七世殷三十一世周三十六世秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也師古曰復重也音扶目反}
  - {type: variant, offset: 551, length: 7, content: 法不遠義則民服, WYG: 死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功徳度其後嗣世世無窮師古曰度音大各反然身死纔數月耳師古曰纔音財暫也淺也天下四靣而攻之宗廟滅絶矣秦皇帝居滅絶之中}
