  - {type: variant, offset: 84, length: 0, content: '', WYG: 然孝文本好刑名之言及至孝景不任儒竇太后又好黄老術故諸博士具官待問未有進者師古曰具官謂備員而已漢興言易自淄川田生言書自濟南伏生言詩於魯則申培公於齊則轅固生師古曰培固者其}
  - {type: variant, offset: 84, length: 0, content: '', krp: 然孝文本好刑名之言及至孝景不任儒竇太后又好黄老術故諸博士具官待問未有進者師古曰具官謂備員而已漢興言易自淄川田生言書自濟南伏生言詩於魯則申培公於齊則轅固生師古曰培固者其}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 名公生者其號也它皆類此培音陪韋昭曰培公之名也燕}
  - {type: variant, offset: 85, length: 0, content: '', krp: 名公生者其號也它皆類此培音陪韋昭曰培公之名也燕}
  - {type: variant, offset: 86, length: 0, content: '', WYG: 韓太傅師古曰名嬰也言禮則魯髙堂生言春秋於齊則胡母生於趙則董仲舒及竇太后崩武安君田蚡為丞相黜黄老刑名百家之言延文學儒者以百數而公孫𢎞以治春秋為丞相封侯天下學士靡然鄉風矣師古曰鄉讀曰嚮𢎞為學官悼道之鬱􅆡廼請曰丞相御史言師古曰自此以下皆𢎞奏請之辭宋祁曰景德本無悼字刋誤據史記作悼道据南本作以道制曰蓋聞導民以禮風之以樂師古曰風化也婚姻者居室之大倫也師古曰倫理也今禮廢樂崩朕甚愍焉故詳延天下方聞之士咸登諸朝師古曰詳悉也方道也有道及博聞之士也宋祁曰延字刋誤據史舘本添入其令禮官勸學講議洽聞舉遺興禮以為天下先師古曰舉遺謂經典遺􅇣者求而舉之太常議予博士弟子崇鄉里之化以厲賢材焉師古曰厲勸勉之也一曰砥厲也自此以上宏所引詔文謹與太常臧博士平等議師古曰臧孔臧也曰聞三代之道鄉里有教夏曰校殷曰庠周曰序師古曰教效也言可效道蓺也其勸善也顯之朝廷其懲惡也加之刑罰故教化之行也建首善自京師始繇内及外師古曰繇音由由從也今陛下昭至德開大明配天地本人倫勸學興禮崇化厲賢以風四方太平之原也師古曰風化也宋祁曰姚本改厲賢作屬賢古者政教未洽不備其禮請因舊官而興焉為博士官置弟子五十人復其身師古曰復音方目反太常擇民年十八以上儀狀端正者補博士弟子郡國縣官有好文學敬長上肅政教順鄉里出入不悖師古曰悖乖也音布内反所聞令相長丞上屬所二千石師古曰聞謂聞其部屬有此人也令縣令相侯相長縣長丞縣丞也二千石謂郡守及諸王相也劉攽曰所聞當屬上句讀之則亦不煩訓詁矣二千石謹察可者常與計偕師古曰隨上計吏俱至京師詣太常得受業如弟子一歳皆輙課能通一蓺以上補文學掌故缺其髙第可以為郎中太常籍奏師古曰為名籍而奏宋祁曰注文為字下疑有之字即有秀才異等輒以名聞其不事學若下材及不能通一蓺輒罷之而請諸能稱者師古曰謂列其能通蓺業而稱其任者奏請𥙷用之也臣謹案詔書律令下者師古曰下謂班行也明天人分際師古曰分音扶問反通古今之誼文章爾雅訓辭深厚師古曰爾雅近正也言詔辭雅正而深厚也恩施甚美小吏淺聞弗能究宣亡以明布諭下以治禮掌故以文學禮義為官遷留􅆡師古曰言治禮掌故之官本以有文學習禮義而為之又所以遷擢留􅆡之人劉敞曰下以字衍言治禮掌故其遷常留􅆡故請特選用以勸之請選擇其秩比二百石以上及吏百石通一蓺以上補左右内史大行卒史師古曰左右内史後為左馮翊右扶風而大行後為大鴻臚也比百石以下補郡太守卒史皆各二人師古曰内地之郡郡各補太守卒史二人也邊郡一人先用誦多者不足擇掌故以補中二千石屬蘇林曰屬亦禮史今縣令文書觧言屬某甲也宋祁曰注文禮史姚本作曹史文學掌故補郡屬備員師古曰云備員者示以升擢之非藉其實用也劉攽曰尋此文意本縁小吏弗能䆒宣詔書故使文學士布在州郡也然顔解未甚悉今區别言之治禮掌故以文學禮義為官遷留􅆡者言故治禮掌故令在他官而遷常留􅆡今遷之請選擇其秩比二百石以上及吏百石通一蓺以上補左右内史大行卒史言文學掌故留滯在比二百石以上又百石通一蓺皆補為左右内史大行卒史也吏乃以百石用者為其曉事優之也比百石以下補郡太守卒史皆各二人邊郡一人言故文學掌故在留􅆡及吏比百石皆補郡卒史也不言文學掌故之在百石者與吏百石同也先用誦多者此數品先用誦多者也不足擇掌故言此數品不足則擇見方為掌故也以補中二千石屬以與已同言自比二百石至比百石為卒史者已而臨二千石屬也有掾有屬卒史遷而為屬也文學掌故補郡屬者即不足所擇用故但得為郡屬也備員者縂言此二者皆備員也請著功令師古曰新立此條請以著於功令功令篇名若今選舉令它如律令師古曰此外並如舊律令制曰可自此以來公卿大夫士吏彬彬多文學之士矣師古曰彬彬文章貌音斌昭帝時舉賢良文學增博士弟子員滿百人宣帝末增倍之元帝好儒能通一經者皆復師古曰蠲其徭賦也復音方目反數年以用度不足更為設員千人郡國置五經百石卒史成帝末或言孔子布衣養徒三千人今天子太學弟子少於是增弟子員三千人歲餘復如故平帝時王莽秉政增元士之子得受業如弟子勿以為員師古曰常員之外更開此路歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人補文學掌故云自魯商瞿子木受易孔子師古曰商瞿姓也瞿音衢以授魯橋庇子庸師古曰姓橋名庇字子庸它皆類此庇音必寐反宋祁曰蕭該案史記橋音矯子庸授江東馯臂子弓師古曰馯姓也音韓子弓授燕周醜子家子家授東武孫虞子乗子乗授齊田何子裝及秦禁學易為筮卜之書獨不禁故傳受者不絶也宋祁曰越本無也字漢興田何以齊田徙杜陵號杜田生師古曰髙祖用婁敬之言徙關東大族故何以舊齊田氏見徙也初徙時未為杜陵葢史家本其地追言之也授東武王同子中雒陽周王孫丁寛齊服生皆著易傳數篇師古曰田生授王同周王孫丁寛服生四人而四人皆著易傳也子中王同字也中讀曰仲同授淄川楊何字叔元元光中徴為大中大夫齊即墨成至城陽相師古曰姓即墨名成廣川孟但為太子門大夫魯周霸莒衡胡師古曰莒人姓衡名胡也臨淄主父偃皆以易至大官要言易者本之田何丁寛字子襄梁人也初梁項生從田何受易時寛為項生從者讀易精敏材過項生遂事何學成何謝寛師古曰告令罷去寛東歸何謂門人曰易以東矣師古曰言丁寛得其法術以去宋祁曰易以東矣或無以字注文法字當刪寛至雒陽復從周王孫受古義號周氏傳景帝時寛為梁孝王將軍距吳楚號丁將軍作易説三萬言訓故舉大誼而已師古曰故謂經之㫖趣也它皆類此今小章句是也寛授同郡碭田王孫師古曰碭者梁郡之縣也音唐又音宕王孫授施讎孟喜梁丘賀繇是易有施孟梁丘之學師古曰繇與由同後𩔖此施讎字長卿沛人也沛與碭相近讎為童子從田王孫受易後讎徙長陵田王孫為博士復從卒業師古曰卒終也與孟喜梁丘賀竝為門人謙讓常稱學廢不教授及梁丘賀為少府事多廼遣子臨分將門人張禹等從讎問讎自匿不肯見賀固請不得己乃授臨等於是賀薦讎結髮事師數十年師古曰言從結髮為童丱即從師學著其早也賀不能及詔拜讎為博士甘露中與五經諸儒雜論同異於石渠閣師古曰三輔故事云石渠閣在未央殿北以藏秘書也讎授張禹琅邪魯伯伯為㑹稽太守禹至丞相禹授淮陽彭宣沛戴崇子平崇為九卿宣大司空禹宣皆有傳魯伯授太山毛莫如少路師古曰姓毛名莫如字少路宋祁曰蕭該案漢書衆本悉作毛字風俗通姓氏篇渾屯氏太昊之良佐漢有屯莫如為常山太守又有毛姓云毛伯文王之子也見左傳漢有毛樗之為夀張令按此莫如非姓毛乃應作屯字音徒本反今人相承呼為毛忽聞為屯驚怪者多毛屯相似容是傳冩誤矣應劭解漢書世人皆用何為在風俗通而不信琅邪邴丹曼容宋祁曰此下更有曼容二字著清名莫如至常山太守此其知名者也繇是施家有張彭之學孟喜字長卿東海蘭陵人也父號孟卿師古曰時人以卿呼之若言公矣善為禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆出孟卿孟卿以禮經多春秋煩雜乃使喜從田王孫受易喜好自稱譽得易家候隂陽災變書詐言師田生且死時枕喜䣛獨傳喜諸儒以此耀之師古曰用為光榮也同門梁丘賀疏通證明之師古曰同門同師學者也疏通猶言分别也證明明其偽也曰田生絶於施讎手中時喜歸東海安得此事又蜀人趙賔好小數書後為易飾易文以為箕子明夷隂陽氣亡箕子箕子者萬物方荄兹也師古曰易明夷卦彖曰内文明而外柔順以蒙大難文王以之利艱貞晦其明也内難而能正其志箕子以之而六五爻辭曰箕子之明夷利貞此箕子者謂殷父師説洪範者也而賔妄為説耳荄兹言其根荄方滋茂也荄音該又音皆賔持論巧慧易家不能難皆曰非古法也師古曰心不服云受孟喜喜為名之師古曰名之者承取其名云實授也後賔死莫能持其説喜因不肯仞師古曰仞亦名也仞音刃以此不見信喜舉孝廉為郎曲臺署長師古曰曲臺殿名署者主供其事也病免為丞相掾博士缺衆人薦喜上聞喜改師法遂不用喜喜授同郡白光少子沛翟牧子兄師古曰兄讀曰况皆為博士繇是有翟孟白之學梁丘賀字長翁琅邪諸人也以能心計為武騎從大中大夫京房受易房者淄川楊何弟子也師古曰自别一京房非焦延夀弟子為課吏法者或書字誤耳不當為京房房出為齊郡太守賀更事田王孫宣帝時聞京房為易明求其門人得賀賀時為都司空令坐事論免為庻人待詔黄門數入説教侍中師古曰為諸侍中説經為教授以召賀賀入説上善之師古曰説於天子之前以賀為郎㑹八月飲酎行祠孝昭廟師古曰行謂天子出先􅇌旄頭劍挺墮墬首垂泥中師古曰挺引也劍自然引拔出也墬刃古地字宋祁曰垂字當作臿字鄉乗輿車師古曰鄉讀曰嚮馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅師古曰霍光傳云任宣霍氏之壻此云外孫誤也宣子章為公車丞亡在渭城界中夜𤣥服入廟居郎間師古曰郎著皂衣故章𤣥服以厠也執㦸立廟門待上至欲為逆發覺伏誅故事上常夜入廟其後待明而入自此始也賀以筮有應繇是近幸為大中大夫給事中至少府為人小心周宻上信重之年老終官傳子臨亦入説為黄門郎甘露中奉使問諸儒於石渠臨學精熟專行京房法琅邪王吉通五經聞臨説善之時宣帝選髙材郎十人從臨講吉乃使其子郎中駿上疏從臨受易臨代五鹿充宗君孟為少府駿御史大夫自有傳􅂶宗授平陵士孫張仲方師古曰姓士孫名張字仲方劉奉世曰臨代五鹿充宗代當為授後人誤改之代充宗者召信臣亦非臨也沛}
