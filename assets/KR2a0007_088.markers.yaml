  - {type: variant, offset: 2032, length: 2, content: 鴈門, WYG: 博士師古曰周慶丁姓二人也姓至中山太傅授楚申章昌曼君李竒曰姓申章名昌字曼君宋祁曰蕭該音義曰晉灼作由章予案風俗通姓氏篇云由余秦相也見史記漢有由章至長沙太傅今宜作由章陽夏公案後言由是穀梁春秋有尹胡申章房氏之學則宜從李竒為博士至長沙太傅徒衆尤盛尹更始為諫大夫長樂户將又受左氏傳取其變理合者以為章句傳子咸及翟方進琅邪房鳳咸至大司農方進丞相自有傳房􅃫字子元不其人也師古曰琅邪之縣也其音基以射䇿乙科為太史掌故太常舉方正為縣令}
  - {type: page-break, offset: 2032, content: '', id: KR2a0007_WYG_088-32b, image: WYG0251/WYG0251-0025b.png}
  - {type: variant, offset: 2032, length: 2, content: 鴈門, krp: 博士師古曰周慶丁姓二人也姓至中山太傅授楚申章昌曼君李竒曰姓申章名昌字曼君宋祁曰蕭該音義曰晉灼作由章予案風俗通姓氏篇云由余秦相也見史記漢有由章至長沙太傅今宜作由章陽夏公案後言由是穀梁春秋有尹胡申章房氏之學則宜從李竒為博士至長沙太傅徒衆尤盛尹更始為諫大夫長樂户將又受左氏傳取其變理合者以為章句傳子咸及翟方進琅邪房鳳咸至大司農方進丞相自有傳房鳳字子元不其人也師古曰琅邪之縣也其音基以射䇿乙科為太史掌故太常舉方正為縣令}
