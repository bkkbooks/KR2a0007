  - {type: variant, offset: 7, length: 0, content: '', WYG: 月不知肉味師古曰美舜樂之善也自衛反魯然後樂正雅頌各得其所師古曰自衞反魯謂哀十一年也是時道衰樂廢孔子還修正之故雅頌各得其所究觀古今之篇籍廼稱曰大哉堯之為君也唯天為大唯堯則之師古曰言堯所行皆法天巍巍乎其有成功也煥乎其有文章也師古曰巍巍者髙貌煥明也又曰周監於二世郁郁乎文哉吾從周師古曰言周追視夏殷二代之制而損益之故禮文大備也郁郁文章盛貌自此以上孔子之言皆見論語劉攽曰世改代於是叙書則斷堯典師古曰謂尚書起自堯典也稱樂則法韶舞師古曰論語云顔淵問為邦子曰行夏之時乗殷之輅服周之冕樂則韶舞放鄭聲韶舜樂也孔子歎其盡善盡美故欲用之論詩則首周南師古曰以關雎為始也綴周之禮因魯春秋舉十二公行事繩之以文武之道成一王法師古曰繩謂治正之至獲麟而止蓋晩而好易讀之韋編三絶而為之傳師古曰編所以聨次簡也言愛玩之甚故編簡之韋為之三絶也傳謂彖象繫辭文言説卦之屬皆因近聖之事以立先王之教故曰述而不作信而好古下學而上逹知我者其天乎師古曰皆論語載孔子之言也作者之謂聖述者之謂明故孔子自謙言我但述者耳下學上逹謂下學人事上逹天命也行不違天故唯天知我也仲尼既沒七十子之徒散遊諸侯師古曰七十子謂弟子者七十七人也稱七十者但言其成數也宋祁曰注文弟子字下疑有逹字大者為卿相師傅小者友教士大夫或隱而不見故子張居陳師古曰子張姓顓孫名師澹臺子羽居楚師古曰子羽姓澹臺名滅明澹音徒甘反子夏居西河師古曰子夏姓卜名商子貢終於齊師古曰子貢姓端木名賜宋祁曰貢蕭該本作贛淳化本景本作子貢刊誤改作贛又云子貢當為子夏如田子方叚干木吳起禽滑􅈊之屬皆受業於子夏之倫為王者師師古曰子方以下皆魏人也滑音于㧞反氂音離是時獨魏文侯好學天下並爭於戰國儒術既黜焉然齊魯之間學者猶弗廢至於威宣之際孟子孫卿之列咸遵夫子之業而潤色之以學顯於當世鄧展曰威宣齊二王及至秦始皇兼天下燔詩書殺術士師古曰燔焚也今新豐縣温湯之處號愍儒郷温湯西南三里有馬谷谷之西岸有阬古老相傳以為秦阬儒處也衛宏詔定古文尚書序云秦既焚書患苦天下不從所改更法而諸生到者拜為郎前後七百人廼密令冬種𤓰於驪山阬谷中温處𤓰實成詔博士諸生説之人人不同乃命就視之為伏機諸生賢儒皆至焉方相難不決因𤼵機從上填之以土皆壓終乃無聲此則閔儒之地其不謬矣燔音扶元反六學從此缺矣陳渉之王也魯諸儒持孔氏禮器往歸之於是孔甲為渉博士卒與俱死師古曰孔光傳云鮒為陳渉博士死陳下今此云孔甲將名鮒而字甲也陳渉起匹夫􅇌適戍以立號師古曰敺與驅同適讀曰謫不滿歲而滅亡其事至微淺然而搢紳先生負禮器往委質為臣者何也以秦禁其業積怨而發憤於陳王也及髙皇帝誅項籍引兵圍魯魯中諸儒尚講誦習禮弦歌之音不絶豈非聖人遺化好學之國哉於是諸儒始得修其經學講習大射鄉飲之禮叔孫通作}
