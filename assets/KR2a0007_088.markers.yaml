  - {type: variant, offset: 88, length: 1, content: 宦, WYG: 姓氏篇云衡阿衡也伊尹官也見詩傳漢有衡咸講學祭酒至揚州牧光祿大夫給事中家世傳業彭祖真定太傅咸王莽講學大夫繇是梁丘有士孫鄧衡之學京房受易梁人焦延壽師古曰延壽其字名贛延壽云嘗從孟喜問易會喜死房以為延壽易即孟氏學翟牧白生不肯皆曰非也至成帝時劉向校書考易説以為諸易家説皆祖田何楊叔丁將軍大誼畧同唯京氏為異黨焦延壽獨得隱士之説師古曰黨讀曰儻託之孟氏不相與同房以明災異得幸為石顯所譖誅自有傳房授東海殷嘉河東姚平河南乗𢎞師古曰乗姓也音食證反劉敞曰今有乗姓音如乗黎之乗皆為郎博士繇是易有京氏之學費直字長翁東莱人也師古曰費音扶味反治易為郎至單父令師古曰單音善父音甫長於卦筮亡章句徒以彖象系辭十篇文言解説上下經琅邪王璜平中能傳之師古曰中讀曰仲璜又傳古文尚書髙相沛人也治易與費公同時其學亦亡章句專説隂陽災異自言出於丁將軍傳至相相授子康及蘭陵母將永康以明易為郎永至豫章都尉及王莽居攝東郡太守翟誼謀舉兵誅莽事未𤼵康候知東郡有兵私語門人門人上書言之後數月翟誼兵起莽召問對受師髙康莽惡之以為惑衆斬康繇是易有髙氏學髙費皆未嘗立於學官伏生濟南人也張晏曰名勝伏生碑云也故為秦博士孝文時求能治尚書者天下亡有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故朝錯往受之師古曰衞宏定古文尚書序云伏生老不能正言言不可曉也使其女𫝊言教錯齊人語多與潁川異錯所不知者凡十二三畧以其意屬讀而已秦時禁書伏生壁藏之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教于齊魯之間齊學者由此頗能言尚書山東大師亡不渉尚書以教伏生教濟南張生及歐陽生張生為博士而伏生孫以治尚書徴弗能明定是後魯周霸雒陽賈嘉頗能言尚書云師古曰嘉者賈誼之孫也歐陽生字和伯千乗人也事伏生授兒寛寛又受業孔安國至御史大夫自有𫝊寛有俊材宋祁曰俊字當作雋初見武帝語經學上曰吾始以尚書為樸學弗好及聞寛説可觀乃從寛問一篇歐陽大小夏侯氏學皆出於寛寛授歐陽生子世世相傳至曾孫高子陽為博士師古曰名高字子陽髙孫地餘長賔以太子中庶子授太子後為博士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官屬即送汝財物慎毋受汝九卿儒者子孫以廉潔著可以自成及地餘死少府官屬共送數百萬宋祁曰越本無數字其子不受天子聞而嘉之賜錢百萬地餘少子政為王莽講學大夫由是尚書世有歐陽氏學林尊字長賔濟南人也事歐陽髙為博士論石渠後至少府太子太傅授平陵平當梁陳翁生當至丞相自有𫝊翁生信都太傅家世𫝊業由是歐陽有平陳之學翁生授琅邪殷崇楚國龔勝崇為博士勝右扶風自有傳而平當授九江朱普公文上黨鮑宣普為博士宣司𨽻校尉自有傳徒衆尤盛知名者也夏侯勝其先夏侯都尉從濟南張生受尚書以傳族子始昌始昌傳勝勝又事同郡蕑卿師古曰蕑音姦蕑卿者兒寛門人勝𫝊從兄子建建又事歐陽髙勝至長信少府建太子太傅自有傳由是尚書有大小夏侯之學周堪字少卿齊人也與孔霸俱事大夏侯勝霸為博士堪譯官令論於石渠經為最髙後為太子少傅而孔霸以大中大夫授太子及元帝即位堪為光禄大夫與蕭望之並領尚書事為石顯等所譖宋祁曰越本邵本無等字皆免官望之自殺上愍之廼擢堪為光禄勲語在劉向傳堪授牟卿宋祁曰舊本卿作鄉及長安許商長伯牟卿為博士霸以帝師賜爵號襃成君傳子光宋祁曰光字下更有光字亦事牟卿至丞相自有傳由是大夏侯有孔許之學商善為筭著五行論歴四至九卿號其門人沛唐林子髙為德行平陵吳章偉君為言語重泉王吉少音為政事齊炔欽幼卿為文學師古曰依孔子弟子顔回以下為四科也炔音桂宋祁曰炔字詁曰今炅姓也韋昭音翁決反非王莽時林吉為九卿自表上師冡大夫博士郎吏為許氏學者各從門人會車數百両儒者榮之欽章皆為博士徒衆尤盛章為王莽所誅宋祁曰越本作所誅也張山拊字長賔平陵人也師古曰拊音膚韋昭音抔又音甫尤反事小夏侯建為博士論石渠至少府授同縣李尋鄭寛中少君山陽張無故子儒信都秦恭延君陳留假倉子驕無故善修章句為廣陵太傅守小夏侯説文恭增師法至百萬言師古曰言小夏侯本所説之文不多而秦恭又更增益故至百萬言也為城陽内史倉以謁者論石渠至膠東相尋善説災異為騎都尉自有傳寛中有雋材以博士授太子成帝即位賜爵關内侯食邑八百户遷光禄大夫領尚書事甚尊重會疾卒谷永上疏曰臣聞聖王尊師傅褒賢儁顯有功生則致其爵禄死則異其禮諡昔周公薨成王葬以變禮而當天心師古曰周公死成王欲葬之於成周天乃雷雨以風禾盡偃大木斯㧞國人大恐王乃葬周公於畢示不敢臣也事見尚書大傳與古文尚書不同公叔文子卒衞侯加以美諡著為後法師古曰公叔文子衞大夫公孫𤼵也文子卒其子請諡於君君曰昔者衞國凶饑夫子為粥與國之餓者不亦惠乎衞國有難夫子以其死衛寡人不亦貞乎夫子聼衞國之政脩其班制以與四鄰交衞國社稷不辱不亦文乎謂夫子貞惠文子事見禮記檀弓近事大司空朱邑劉敞曰空當為農右扶風翁歸德茂天年孝宣皇帝愍冊厚賜贊命之臣靡不激揚師古曰贊佐也關内侯鄭寛中有顔子之美質包商偃之文學師古曰論語云文學子游子夏商子夏名偃子游名嚴然總五經之𦕈論立師傅之顯位師古曰嚴與儼同𦕈讀曰妙入則鄉唐虞之閎道王法納乎聖聽師古曰鄉讀曰嚮閎大也言陳聖王之法聞於天子出則參冡宰之重職功列施乎政事退食自公私門不開師古曰退食自公召南羔羊詩之辭言貶退所食之禄而從至公之道也散賜九族田畝不益德配周召忠合羔羊未得登司徒有家臣師古曰師徒掌禮教之官言寛中學行堪為之也家臣若今諸公國官及府佐也卒然早終尤可悼痛師古曰卒讀曰猝臣愚以為宜加其葬禮賜之令諡師古曰令善也以章尊師襃賢顯功之德上弔贈寛中甚厚由是小夏侯有鄭張秦假李氏之學寛中授東郡趙𤣥無故授沛唐尊恭授魯馮賔賔為博士尊王莽太傅𤣥哀帝御史大夫至大官知名者也宋祁曰淳化本越本無故字下更有無故二字馮賔字下更有一馮字刊誤謂當去無故二字添一賔字孔氏有古文尚書孔安國以今文字讀之因以起其家􅇣書得十餘篇蓋尚書兹多於是矣遭巫蠱未立於學官安國為諫大夫授都尉朝服䖍曰朝名都尉姓而司馬遷亦從安國問故遷書載堯典禹貢洪範㣲子金縢諸篇多古文説都尉朝授膠東庸生庸生授清河胡常少子師古曰少子亦常字也以明穀梁春秋為博士部刺史又傳左氏常授虢徐敖敖為右扶風掾又傳毛詩授王璜平陵塗惲子真子真授河南桑欽君長王莽時諸學皆立宋祁曰新本改論作諸劉歆為國師璜惲等皆貴顯世所傳百両篇者出東莱張霸分析合二十九篇以為數十又采左氏傳書叙為作首尾凡百二篇篇或數簡文意淺陋成帝時求其古文者霸以能為百両徴以中書校之非是師古曰以霸私增加分析故與中書之文不同也中書天子所藏之書也霸辭受父父有弟子尉氏樊並時大中大夫平當侍御史周敞勸上存之師古曰存者立其學後樊並謀反廼黜其書申公魯人也少與楚元王交俱事齊人浮丘伯受詩漢興髙祖過魯申公以弟子從師入見于魯南宫呂太后時浮丘伯在長安楚元王遣子郢與申公俱卒學師古曰郢即郢客也元王薨郢嗣立為楚王令申公傅太子戊戊不好學病申公師古曰病苦也及戊立為王胥靡申公師古曰胥靡相係而作役觧具在楚元王傳也申公愧之歸魯退居家教終身不出門復謝賔客師古曰身既不出門非受業弟子其它賔客来者又謝遣之不與相見也獨王命召之乃往弟子自遠方至受業者千餘人申公獨以詩經為訓故以教亡傳師古曰口説其指不為觧説之傳疑}
