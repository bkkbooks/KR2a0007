  - {type: variant, offset: 2030, length: 1, content: 嘉, WYG: 推宋顯師古曰輓音晩穀梁議郎尹更始待詔劉向周慶丁姓並論公羊家多不見從願請内侍郎許廣使者亦並内穀梁家中郎王亥各五人師古曰使者謂當時詔遣監議者也内謂引入議所也公羊家既請内訐廣而使者因並内王亥也議三十餘事望之等十一人各以經誼對多從穀梁由是穀梁之學大盛慶姓皆}
