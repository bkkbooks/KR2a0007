  - {type: variant, offset: 3929, length: 391, content: 故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃卻入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賓客均敵之禮賢歸上聞之喜立拜光兩兄子為諫大夫常侍賢繇是權與人主侔矣是時成帝外家王氏衰廢唯平阿侯譚子去疾哀帝為太子時為庶子得幸及即位為侍中騎都尉上以王氏亡在位者遂用舊恩親近去疾復進其弟閎為中常侍閎妻父蕭咸前將軍望之子也久為郡守病免為中郎將兄弟並列賢父恭慕之欲與結婚姻閎為賢弟駙馬都尉寬信求咸女為婦咸惶恐不敢當私謂閎曰董公為大司馬冊文言允執其中此乃堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪閎性有知略聞咸言心亦悟乃還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不說後上置酒麒麟殿賢父子親屬宴飲王閎兄弟侍中中常侍皆在側上有酒所從容視賢笑曰吾欲法堯禪舜何如閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上默然不說左右皆恐, WYG: ''}
