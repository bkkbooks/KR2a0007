  - {type: variant, offset: 2029, length: 0, content: '', WYG: 即此是也又有管姓云管夷吾齊桓佐也見論語漢有管虢為西河太守今莞路是草下完非竹下完及竹下官由来讀者多惑檢風俗通乃知路為御史中丞禹授潁川堂谿惠師古曰姓堂谿也惠授泰山𠖇都師古曰𠖇音莫零反宋祁曰蕭該案周禮𠖇氏鄭司農云讀如𠖇氏春秋之𠖇劉昌宗莫歴反案都治公羊春秋當是有所注述解釋公羊故司農云冥氏春秋之冥風俗通姓氏篇冥侯國姒姓禹後見史記漢書有𠖇都為丞相都為丞相史都與路又事顔安樂故顔氏復有筦𠖇之學路授孫寳為大司農自有傳豐授馬宮琅邪左咸咸為郡守九卿徒衆尤盛官至大司徒自有傳劉攽曰官改作宮瑕丘江公受穀梁春秋及詩於魯申公傳子至孫為博士武帝時江公與董仲舒竝仲舒通五經能持論善屬文江公呐於口師古曰屬音之欲反呐古訥字上使與仲舒議不如仲舒而丞相公孫𢎞本為公羊學比輯其議卒用董生師古曰比次也輯合也比音頻寐反輯與集同於是上因尊公羊家詔太子受公羊春秋由是公羊大興太子既通復私問穀梁而善之其後浸微師古曰浸漸也唯魯榮廣王孫皓星公二人受焉廣盡能傳其詩春秋髙才㨗敏與公羊大師眭孟等論數困之師古曰孟等窮屈也故好學者頗復受穀梁沛蔡千秋少君梁周慶幼君丁姓子孫師古曰姓丁名姓字子孫皆從廣受千秋又事晧星公為學最篤宣帝即位聞衛太子好穀梁春秋以問丞相韋賢長信少府夏侯勝及侍中樂陵侯史髙皆魯人也言穀梁子本魯學公羊氏廼齊學也宜興穀梁時千秋為郎召見與公羊家竝説上善穀梁説擢千秋為諫大夫給事中後有過左遷平陵令復求能為穀梁者莫及千秋上愍其學且絶廼以千秋為郎中尸將師古曰户將官名解在楊惲蓋寛饒傳選郎十人從受汝南尹更始翁君本自事千秋能説矣會千秋病死徴江公孫為博士劉向以故諫大夫通逹待詔受穀梁欲令助之江博士復死廼徴周慶丁姓待詔保宮師古曰保宫少府之屬官也本名居室使卒授十人自元康中始講至甘露元年積十餘歲皆明習廼召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異各以經處是非時公羊博士嚴彭祖侍郎申輓}
