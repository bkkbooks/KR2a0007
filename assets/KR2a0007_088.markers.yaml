  - {type: variant, offset: 1971, length: 0, content: '', WYG: 皆有傳衡授琅邪師丹伏理斿君潁川滿昌君都君都為詹事理髙密太傅家世傳業丹大司空自有傳由是齊詩有翼匡師伏之學滿昌授九江張邯琅邪皮容皆至大官徒衆尤盛韓嬰燕人也孝文時為博士景帝時至常山太傅嬰推詩人之意而作内外傳數萬言其語頗與齊魯間殊然歸一也淮南賁生受之師古曰賁音肥燕趙間言詩者由韓生韓生亦以易授人推易意而為之傳燕趙間好詩故其易微唯韓氏自傳之武帝時嬰嘗與董仲舒論於上前其人精悍處事分明師古曰悍勇鋭仲舒不能難也後其孫商為博士孝宣時涿郡韓生其後也以易徴待詔殿中曰所受易即先太傅所傳也嘗受韓詩不如韓氏易深太傅故專傳之司𨽻校尉蓋寛饒本受易於孟喜見涿韓生説易而好之即更從受焉趙子河内人也事燕韓生授同郡蔡誼誼至丞相自有傳誼授同郡食子公宋祁曰蕭該音義曰案風俗通曰食我韓公子也見戰國䇿漢有食子公為博士食音嗣與王吉吉為昌邑王中尉自有傳食生為博士授泰山栗豐吉授淄川長孫順順為博士豐部刺史由是韓詩有王食長孫之學豐授山陽張就順授東海髪福皆至大官徒衆尤盛毛公趙人也治詩為河間獻王博士授同國貫長􅀸長􅀸授觧延年延年為阿武令授徐敖敖授九江陳俠為王莽講學大夫由是言毛詩者本之徐敖漢興魯髙堂生傳士禮十七篇而魯徐生善為頌蘇林曰漢舊儀有二郎為此頌貌威儀事有徐氏徐氏後有張氏不知經但能盤辟為禮容天下郡國有容史皆詣魯學之師古曰頌讀與容同下皆類此宋祁曰注文姚本刪徐氏二字能字下添揖讓二字孝文時徐生以頌為禮官大夫傳子至孫延襄師古曰延及襄二人襄其資性善為頌不能通經延頗能未善也襄亦以頌為大夫至廣陵内史延及徐氏弟子公户滿意桓生單次皆為禮官大夫師古曰姓公户名滿意也與桓生及單次凡三人單音善而瑕丘蕭奮以禮至淮陽太守諸言禮為頌者由徐氏孟卿東海人也事蕭奮以授后倉魯閭丘卿倉説禮數萬言號曰后氏曲臺記服䖍曰在曲臺校書著説因以為名師古曰曲臺殿在未央宮授沛聞人通漢子方如淳曰聞人姓也名通漢字子方梁戴德延君戴聖次君沛慶普孝公孝公為東平太傅德號大戴為信都太傅聖號小戴以博士論石渠至九江太守由是禮有大戴小戴慶氏之學通漢以太子舍人論石渠至中山中尉普授魯夏侯敬又傳族子咸為豫章太守大戴授琅邪徐良斿卿為博士州牧郡守家世傳業小戴授梁人橋仁季卿楊榮子孫師古曰子孫榮之字也宋祁曰景本作楊子榮新本作楊榮注同仁為大鴻臚家世傳業榮琅邪太守由是大戴有徐氏小戴有橋楊氏之學胡母生字子都齊人也治公羊春秋為景帝博士與董仲舒同業仲舒著書稱其德年老歸教於齊齊之言春秋者宗事之公孫𢎞亦頗受焉而董生為江都相自有傳弟子遂之者蘭陵褚大東平嬴公廣川叚仲温呂歩舒師古曰遂謂名位成逹者宋祁曰遂之者當刪之字劉敞曰遂之者之字衍大至梁相歩舒丞相長史唯嬴公守學不失師法為昭帝諫大夫授東海孟卿魯眭孟孟為符節令坐説灾異誅自有傳嚴彭祖字公子東海下邳人也與顔安樂俱事眭孟孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授師古曰顓與專同專門言各自名家由是公羊春秋有顔嚴之學彭祖為宣帝博士至河南東郡太守宋祁曰或無東字以髙第入為左馮翊遷太子太傅亷直不事權貴或説曰天時不勝人事君以不脩小禮曲意亡貴人左右之助經誼雖髙不至宰相願少自勉彊彭祖曰凡通經術固當脩行先王之道何可委曲從俗茍求富貴乎彭祖竟以太傅官終授琅邪王中為元帝少府師古曰中讀曰仲家世傳業中授同郡公孫文東門雲雲為荆州刺史文東平太傅徒衆尤盛雲坐為江賊拜辱命下獄誅師古曰逄見賊而拜也顔安樂字公孫宋祁曰一作翁孫魯國薛人眭孟姊子也家貧為學精力宋祁曰一作積力官至齊郡太守丞後為仇家所殺安樂授淮陽泠豐次君師古曰泠音零淄川任公公為少府豐淄川太守由是顔家有冷任之學始貢禹事嬴公成於眭孟至}
