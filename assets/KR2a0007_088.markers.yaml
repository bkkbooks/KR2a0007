  - {type: variant, offset: 5, length: 0, content: '', WYG: 蓺之文師古曰六蓺謂易禮樂詩書春秋六學者王敎之典籍先聖所以明天道正人倫致至治之成法也周道既衰壊於幽厲禮樂征伐自諸侯出陵夷二百餘年而孔子興師古曰陵夷言漸頽替宋祁曰注文頽替字下疑有也字以聖德遭季世知言之不用而道不行廼歎曰鳳鳥不至河不出圖吾已矣夫師古曰論語載孔子之言鳯鳥河圖皆王者之瑞自傷有德而無位故云已矣文王既沒文不在兹乎師古曰言文王乆已沒矣文章之事豈不在此乎蓋自謂也亦見論語於是應聘諸侯以答禮行誼師古曰答禮謂有問禮者則為應答而申明之劉奉世曰答禮者迎之有禮亦以禮答之西入周南至楚畏匡戹陳師古曰匡邑名即陳留匡城縣孔子貌類陽貨陽貨嘗有怨於匡匡人見孔子以為陽貨也故圍而欲害之後得免耳戹陳謂在陳絶糧也奸七}
