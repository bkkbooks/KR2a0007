  - {type: variant, offset: 4828, length: 1, content: 牧, WYG: 講學大夫由是穀梁春秋有尹胡申章房氏之學漢興北平侯張蒼及梁太傅賈誼京兆尹張敞大中大夫劉公子皆脩春秋左氏傳誼為左氏傳訓故授趙人貫公為河間獻王博士子長卿為蕩隂令師古曰蕩隂河内之縣也蕩音湯授清河張禹長子如淳曰非成帝師張禹也禹與蕭望之同時為御史數為望之言左氏望之善之上書數以稱説後望之為太子太傅薦禹於宣帝徴禹待詔未及問會疾死授尹更始師古曰禹先授更始更始傳子咸及翟方進胡常常授黎陽賈䕶季君哀帝時待詔為郎授蒼梧陳欽子佚以左氏授王莽至將軍而劉歆從尹咸及翟方進受由是言左氏者本之賈䕶劉歆賛曰自武帝立五經博士開弟子員設科射䇿勸以官祿訖於元始百有餘年傳業者寖盛支葉蕃滋師古曰寖漸也蕃多也滋益也一經説至百餘萬言大師衆至千餘人蓋祿利之路然也師古曰言為經學者則受爵祿而𫉬其利所以益勸初書唯有歐陽禮后易楊春秋公羊而已至孝宣世復立大小夏侯尚書大小戴禮施孟梁丘易穀梁春秋至元帝世復立京氏易平帝時又立左氏春秋毛詩􅇣禮古文尚書所以罔羅遺失兼而存之是在其中矣如淳曰雖有虗妄之説是當在其中故兼而存之前漢書卷八十八前漢書卷八十八考證儒林傳故詳延天下方聞之士咸登諸朝注師古曰方道也云云臣召南按史記作詳延天下方正博聞之士義甚明鬯當是漢書冩本脱正博二字而師古因曲為之説耳殷曰庠周曰序史記作殷曰序周曰庠與孟子同郡國縣官臣召南按史記作郡國縣道邑是也此文有脱誤耳縣有蠻夷曰道列侯公主所食曰邑謂屬於郡或國之縣及道與邑也漢時稱朝廷曰縣官故凡言令長不曰縣官也而請諸能稱者注師古云云臣召南按史記作而請諸不稱者罰此文祇換一不字省一罰字義遂不同史記言懲儆濫舉此文言登進賢才也自魯商瞿子木云云臣召南按史記祇云商瞿傳易六世至田何未嘗詳六世姓字也自橋庇子庸至孫虞子乗皆班氏所𥙷又田何子装史記作子莊班氏當以避明帝諱而改曰裝耳要言易者本之田何按史記作然要言易者本於楊何之家費直傳琅邪王璜平中能傳之按王璜溝洫志作王横高相傳東郡太}
