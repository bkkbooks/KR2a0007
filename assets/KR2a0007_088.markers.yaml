  - {type: variant, offset: 2542, length: 1268, content: 受取其衣物太后亦怒曰兒至如此往白之帝莽白上上乃免長官遣就國初長為侍中奉兩宮使親密紅陽侯立獨不得為大司馬輔政立自疑為長毀譖常怨毒長上知之及長當就國也立嗣子融從長請車騎長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲侮長定宮謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人莽遂代根為大司馬久之還長母及子酺於長安後酺有罪莽復殺之徙其家屬歸故郡始長以外親親近其愛幸不及富平侯張放放常與上臥起俱為微行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舍人哀帝立賢隨太子官為郎二歲餘賢傳漏在殿下為人美麗自喜哀帝望見說其儀貌識而問之曰是舍人董賢邪因引上與語拜為黃門郎繇是始幸問及其父為雲中侯即日徵為霸陵令遷光祿大夫賢寵愛日甚為駙馬都尉侍中出則參乘入御左右旬月間賞賜絫鉅萬貴震朝廷常與上臥起嘗晝寢偏藉上褏上欲起賢未覺不欲動賢乃斷褏而起其恩愛至此賢亦性柔和便辟善為媚以自固每賜洗沐不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬若吏妻子居官寺舍又召賢女弟以為昭儀位次皇后更名其舍為椒風以配椒房云昭儀及賢與妻旦夕上下並侍左右賞賜昭儀及賢妻亦各千萬數遷賢父為少府賜爵關內侯食邑復徙為衛尉又以賢妻父為將作大匠弟為執金吾詔將作大匠為賢起大第北闕下重殿洞門木土之功窮極技巧柱檻衣以綈錦下至賢家僮僕皆受上賜及武庫禁兵上方珍寶其選物上弟盡在董氏而乘輿所服乃其副也及至東園祕器珠襦玉柙豫以賜賢無不備具又令將作為賢起冢瑩義陵旁內為便房剛柏題湊外為徼道周垣數里明闕罘罳甚盛上欲侯賢而未有緣會待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛下有司治皆伏其辜上於是令躬寵為因賢告東平事者乃以其功下詔封賢為高安侯躬宜陵侯寵方陽侯食邑各千戶頃之復益封賢二千戶丞相王嘉內疑東平事冤甚惡躬等數諫爭以賢為亂國制度嘉竟坐言事下獄死上初即位祖母傅太后母丁太后皆在兩家先貴傅太后從弟喜先為大司馬輔政數諫失太后指免官上舅丁明代為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上𥧲重賢欲極其位而恨明如此遂冊免明曰前東平王雲貪欲上位祠祭祝詛雲后舅伍宏以醫待詔與校祕書郎楊閎結謀反逆禍甚迫切賴宗廟神靈董賢等以聞咸伏其辜將軍從弟侍中奉車都尉吳族父左曹屯騎校尉宣皆知宏及栩丹諸侯王后親而宣除用丹為御屬吳與宏交通厚善數稱薦宏宏以附吳得興其惡心因醫技進幾危社稷朕以恭皇后故不忍有云將軍位尊任重既不能明威立義折消未萌又不深疾雲宏之惡而懷非君上阿為宣吳反痛恨雲等揚言為群下所冤又親見言伍宏善醫死可惜也賢等獲封極幸嫉妒忠良非毀有功於戲傷哉蓋君親無將將而誅之是以季友鴆叔牙春秋賢之趙盾不討賊謂之弒君朕閔將軍陷于重刑故以書飭將軍遂非不改復與丞相嘉相比令嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未忍其上票騎將軍印綬罷歸就第遂以賢代明為大司馬衛將軍冊曰朕承天序惟稽古建爾于公以為漢輔往悉爾心統辟元戎折衝綏遠匡正庶事允執其中天下之眾受制於朕以將為命以兵為威可不慎與是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父恭不宜在卿位徙, WYG: 逹擢}
