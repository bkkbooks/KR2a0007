  - {type: variant, offset: 2036, length: 362, content: 長安謠曰伊徙鴈鹿徙菟去牢與陳實無賈淳于長字子孺魏郡元城人也少以太后姊子為黃門郎未進幸會大將軍王鳳病長侍病晨夜扶丞左右甚有甥舅之恩鳳且終以長屬託太后及帝帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衛尉九卿久之趙飛燕貴幸上欲立以為皇后太后以其所出微難之長主往來通語東宮歲餘趙皇后得立上甚德之乃追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海內侍中衛尉長數白宜止徙家反故處朕以長言下公卿議者皆合長計首建至策民以康寧其賜長爵關內侯後遂封為定陵侯大見信用貴傾公卿外交諸侯牧守賂遺賞賜亦絫鉅萬多畜妻妾淫於聲色不奉法度初許皇后坐執左道廢處長定宮而后姊孊為龍頟思侯夫人寡居長與孊私通因取為小妻許后因孊賂遺長欲求復倢伃長受許后金錢乘輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宮輒與孊書戲侮許后嫚易無不言交通書記賂遺連年是時帝舅曲陽侯王根為, WYG: 失官}
