  - {type: variant, offset: 4410, length: 414, content: 賢頓首幸甚太后遣使者召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得入出宮殿司馬中賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下冊賢曰間者以來陰陽不調菑害並臻元元蒙辜夫三公鼎足之輔也高安侯賢未更事理為大司馬不合眾心非所以折衝綏遠也其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬葬疑其詐死有司奏請發賢棺至獄診視莽復風大司徒光奏賢質性巧佞翼姦以獲封侯父子專朝兄弟並寵多受賞賜治第宅造冢壙放效無極不異王制費以萬萬計國家為空虛父子驕蹇至不為使者禮受賜不拜辠惡暴著賢自殺伏辜死後父恭等不悔過乃復以沙畫棺四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺至尊無以加恭等幸得免於誅不宜在中土臣請收沒入財物縣官諸以賢為官者皆免父恭弟寬信與家屬徙合浦母別歸故郡鉅鹿長安中小民讙譁鄉其弟哭幾獲盜之縣官斥賣董氏財凡四十三萬萬賢既見發臝診其尸因埋獄中賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸葬之王莽聞之而大怒以它辠繫殺詡詡子浮建武中貴顯至大司馬司空封侯而王閎, WYG: 房}
