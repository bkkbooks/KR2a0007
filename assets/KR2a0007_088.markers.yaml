  - {type: variant, offset: 365, length: 476, content: 上大夫文帝時間如通家游戲然通無他伎能不能有所薦達獨自謹身以媚上而已上使善相人者相通曰當貧餓死上曰能富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏布天下其富如此文帝嘗病癰鄧通常為上嗽吮之上不樂從容問曰天下誰最愛我者乎通曰宜莫若太子太子入問疾上使太子齰癰太子齰癰而色難之已而聞通嘗為上齰之太子慚繇是心恨通及文帝崩景帝立鄧通免家居居無何人有告通盜出徼外鑄錢下吏驗問頗有遂竟案盡沒入之通家尚負責數鉅萬長公主賜鄧通吏輒隨沒入之一簪不得著身於是長公主乃令假衣食竟不得名一錢寄死人家趙談者以星氣幸北宮伯子長者愛人故親近然皆不比鄧通韓嫣字王孫弓高侯穨當之孫也武帝為膠東王時嫣與上學書相愛及上為太子愈益親嫣嫣善騎射聰慧上即位欲事伐胡而嫣先習兵以故益尊貴官至上大夫賞賜儗鄧通始時嫣常與上共臥起江都王入朝從上獵上林中天子車駕䟆道未行先使嫣乘副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后繇此銜嫣嫣侍出入永巷不禁以姦聞皇太后太后怒使使賜嫣死上為謝終不能得嫣遂死嫣弟說亦愛幸以軍功封案道侯巫蠱時為戾太子所殺子增封龍雒侯, WYG: ''}
