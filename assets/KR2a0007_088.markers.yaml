  - {type: page-break, offset: 1383, content: '', id: KR2a0007_WYG_088-24a, image: WYG0251/WYG0251-0021a.png}
  - {type: variant, offset: 1384, length: 472, content: 以下畏顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何累累綬若若邪言其兼官據勢也顯見左將軍馮奉世父子為公卿著名女又為昭儀在內顯心欲附之薦言昭儀兄謁者逡修敕宜侍帷幄天子召見欲以為侍中逡請間言事上聞逡言顯顓權天子大怒罷逡歸郎官其後御史大夫缺群臣皆舉逡兄大鴻臚野王行能第一天子以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越眾賢私後宮親以為三公上曰善吾不見是乃下詔嘉美野王廢而不用語在野王傳顯內自知擅權事柄在掌握恐天子一旦納用左右耳目有以間己乃時歸誠取一信以為驗顯嘗使至諸官有所徵發顯先自白恐後漏盡宮門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有上書告顯顓命矯詔開宮門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事群下無不嫉妬欲陷害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬眾任天下之怨臣願歸樞機職受後宮掃除之役死無所恨唯陛下哀憐財幸以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜賞賜及賂遺訾一萬萬初顯聞眾人匈匈言己殺前將軍蕭望之望之當世名儒顯恐天下學士姍己病之是時明經著節士琅邪貢禹, WYG: ''}
