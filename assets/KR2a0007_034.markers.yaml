  - {type: variant, offset: 83, length: 8, content: 關至咸陽沛公立為, WYG: 闗秋毫亡所害師古曰秋毫喩細微之物除秦苛法與民約法三章耳秦民亡不欲得大王王秦者於諸侯之約大王當王闗中闗中民户知之師古曰言家家皆知王失職之蜀民亡不恨者師古曰之徃也今王舉而東三秦可傳檄而定也師古曰檄謂檄書也傳檄可定言不足用兵也檄解在髙紀於是}
