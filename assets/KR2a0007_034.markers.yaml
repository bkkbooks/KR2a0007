  - {type: variant, offset: 1761, length: 0, content: '', WYG: 前漢書卷三十四考證韓信傳項王意烏猝嗟史記作喑噁叱咤又言語姁姁史記作嘔嘔諸侯之見項王逐義帝江南云云臣召南按諸侯歸逐其主自王善地即指田都王臨淄田市王濟北臧荼王燕司馬卭王殷張耳王常山皆徙其故王於他處也不然信拜大將在四月諸侯已各就國罷兵矣烏知後有田榮殺田都田市及臧荼殺韓廣事乎其實不能臣召南按不能斷句言實兵不能數萬也史記作其實不過數千能千里而襲我亦已罷極能字屬下句讀斬成安君泜水上水經注泜水即井陘山水世謂之鹿泉水東北流屈逕陳餘壘又東注綿蔓水其舍}
