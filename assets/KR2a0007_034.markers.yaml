  - {type: variant, offset: 1253, length: 236, content: 食邑千八百戶高后時為御史大夫三歲免孝文元年薨諡曰懿侯傳子至曾孫越人坐為太常廟酒酸不敬國除初任敖免平陽侯曹窋代敖為御史大夫高后崩與大臣共誅諸呂後坐事免以淮南相張蒼為御史大夫蒼與絳侯等尊立孝文皇帝四年代灌嬰為丞相漢興二十餘年天下初定公卿皆軍吏蒼為計相時緒正律曆以高祖十月始至霸上故因秦時本十月為歲首不革推五德之運以為漢當水德之時上黑如故吹律調樂入之音聲及以比定律令若百工天下作程品至於為丞相卒就之故漢家言律曆者本張蒼蒼凡好書無所不觀無所不通而尤邃律曆蒼德安國侯王陵及貴父事陵陵, WYG: 項籍}
