  - {type: variant, offset: 65, length: 1, content: 陵, WYG: 必欲拜之擇日齊戒設壇場具禮乃可王許之諸將皆喜人人各自以為得大將至拜乃韓信也一軍皆驚信已拜上坐王曰丞相數言將軍將軍何以教寡人計䇿信謝因問王曰今東鄉爭權天下豈非項王邪師古曰鄉讀曰嚮上曰然信曰大王自料勇悍仁彊孰與項王師古曰料量也與如也漢王黙然良乆曰弗如也信再拜賀曰唯師古曰唯應辭音弋癸反劉奉世曰唯字當屬下句讀如本字此類甚多信亦以為大王弗如也然臣嘗事項王請言項王為人也項王意烏猝嗟千人皆廢李竒曰猝嗟猶咄嗟也言羽一咄嗟千人皆失氣也晉灼曰意烏恚怒聲也猝嗟形發動也廢不收也師古曰意烏晉説是也猝嗟暴猝嗟嘆也猝音千忽反然不能任屬賢將師古曰屬委也音之欲反此特匹夫之勇也師古曰特但也項王}
  - {type: page-break, offset: 65, content: '', id: KR2a0007_WYG_034-3b, image: WYG0249/WYG0249-0774b.png}
