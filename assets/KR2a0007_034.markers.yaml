  - {type: variant, offset: 100, length: 0, content: '', krp: 二年出闗收魏河南韓殷王皆降令齊趙共擊楚彭城漢兵敗散而還信復發兵與漢王會滎陽復擊破楚京索間師古曰索音山客反以故楚兵不能西漢之敗卻彭城師古曰兵敗於彭城而卻退也卻音丘畧反塞王欣翟王翳亡漢降楚齊趙魏亦皆反與楚和漢王使酈生徃説魏王豹豹不聼乃以信爲左丞相擊魏信問酈生魏得毋用周叔爲大將乎宋祁云一本作大將軍曰栢直也信曰豎子耳遂進兵擊魏魏盛兵蒲坂塞臨晉信廼益爲疑兵師古曰多張兵形令敵人疑也陳船欲渡臨晉而伏兵從夏陽以木罌缶渡軍襲安邑服䖍曰以木柙縳罌缶以渡也韋昭曰以木爲器如罌缶也師古曰服説是也罌缶謂瓶之大腹小口者也音一政反臨晉在今同州朝邑縣界夏陽在韓城縣界宋祁曰伏越本作復劉敞曰復當作伏魏王豹驚引兵迎信信遂虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王會於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與李奇曰夏說代相也孟康曰閼與是邑名也在上黨隰縣師古曰說讀曰悅閼音一曷反與音豫信之下魏代漢輙使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君}
  - {type: variant, offset: 102, length: 0, content: '', WYG: 聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信渉西河虜魏王禽夏說新喋血閼與師古曰喋音牒喋血解在文紀今乃輔以張耳議欲以下趙師古曰言其立計議知此此乘勝而去國遠鬬其鋒不可當臣聞千里餽糧士有飢色師古曰言難繼也餽字與饋同樵蘇後㸑師不宿飽師古曰樵取薪也蘇取草也小雅白華之詩云樵彼桑薪樵音在消反今井陘之道車不得方軌騎不得成列師古曰方軌謂倂行也列行列行數百里其埶糧食必在後願足下假臣奇兵三萬人從間路絕其輜重師古曰間路微路也重音直用反足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絕其後野無所掠鹵不至十日兩將之頭可致戲下師古曰戲讀曰麾又音許宜反願君留意臣之計必不爲二子所禽矣成安君儒者常稱義兵不用詐謀奇計謂曰吾聞兵法什則圍之倍則戰師古曰言多十倍者可以圍敵多一倍者戰則可勝今韓信兵號數萬其實不能千里襲我亦以罷矣師古曰罷讀曰疲今如此避弗}
  - {type: page-break, offset: 102, content: '', id: KR2a0007_WYG_034-6b, image: WYG0249/WYG0249-0775d.png}
  - {type: page-break, offset: 102, content: '', id: KR2a0007_WYG_034-7a, image: WYG0249/WYG0249-0776a.png}
  - {type: variant, offset: 102, length: 0, content: '', krp: 聞漢且襲之聚兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信渉西河虜魏王禽夏說新喋血閼與師古曰喋音牒喋血解在文紀今乃輔以張耳議欲以下趙師古曰言其立計議知此此乘勝而去國遠鬬其鋒不可當臣聞千里餽糧士有飢色師古曰言難繼也餽字與饋同樵蘇後㸑師不宿飽師古曰樵取薪也蘇取草也小雅白華之詩云樵彼桑薪樵音在消反今井陘之道車不得方軌騎不得成列師古曰方軌謂倂行也列行列行數百里其埶糧食必在後願足下假臣奇兵三萬人從間路絕其輜重師古曰間路微路也重音直用反足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絕其後野無所掠鹵不至十日兩將之頭可致戲下師古曰戲讀曰麾又音許宜反願君留意臣之計必不爲二子所禽矣成安君儒者常稱義兵不用詐謀奇計謂曰吾聞兵法什則圍之倍則戰師古曰言多十倍者可以圍敵多一倍者戰則可勝今韓信兵號數萬其實不能千里襲我亦以罷矣師古曰罷讀曰疲今如此避弗}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 後有大者何以距之諸侯謂吾怯而輕來伐我不聽廣武君策信使間人窺知其不用師古曰間人微伺之也還報則大喜乃敢引兵遂下未至井陘口三十里止舎師古曰舍息也夜半傳發選輕騎二千人孟康曰傳令軍中使發也人持一赤幟師古曰幟旌旗之屬也音式志反從間道萆山而望趙軍如淳曰萆音蔽依山自覆蔽也師古曰蔽隱於山間使敵不見戒曰趙見我}
  - {type: page-break, offset: 103, content: '', id: KR2a0007_WYG_034-7b, image: WYG0249/WYG0249-0776b.png}
  - {type: variant, offset: 103, length: 0, content: '', krp: 後有大者何以距之諸侯謂吾怯而輕來伐我不聽廣武君策信使間人窺知其不用師古曰間人微伺之也還報則大喜乃敢引兵遂下未至井陘口三十里止舎師古曰舍息也夜半傳發選輕騎二千人孟康曰傳令軍中使發也人持一赤幟師古曰幟旌旗之屬也音式志反從間道萆山而望趙軍如淳曰萆音蔽依山自覆蔽也師古曰蔽隱於山間使敵不見戒曰趙見我}
  - {type: variant, offset: 104, length: 0, content: '', WYG: 必空壁逐我若疾入拔趙幟立漢幟師古曰若汝也令其裨將傳餐服䖍曰立駐傳餐食也如淳曰小飯曰餐破趙後乃當共飽食也師古曰餐古飡字音千安反曰今日破趙會食諸將皆嘸然陽應曰諾孟康曰嘸音撫不精明也劉德曰音憮師古曰劉音是也音文府反信謂軍吏曰趙已先據便地壁且彼未見大將旗鼓未肻擊前行師古曰行音胡郎反恐吾阻險而還劉奉世曰前行當屬下句言我若前行又恐阻險而還耳所以先使萬人陳也行如字乃使萬人先行出背水陣趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口師古曰聲鼓而行趙開壁擊之大戰良久於是信張耳弃鼓旗走水上軍師古曰走趣也音奏復疾戰趙空壁爭漢鼓旗劉奉世曰復疾戰三字衍文逐信耳信耳已入水上軍軍皆殊死戰不可敗師古曰殊絕也謂決意必死宋祁曰逐信張耳信張耳已入水上軍疑有二張字信所出奇兵二千騎者候趙空壁逐利卽馳入趙壁皆拔趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還歸壁壁皆漢赤幟大驚以漢爲皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁於是漢兵夾擊破虜趙軍斬成安君泜水上師古曰泜音祗又音丁計反禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之師古曰鄉皆讀曰嚮諸校効首虜休皆賀師古曰諸校諸部也猶今言諸營也効致也謂各致其所獲因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳師古曰顧念也兵法不曰䧟之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂敺市人而戰之也師古曰經亦謂兵法也敺與驅同也忽入市􅆵而敺取其人令戰言非素所練習宋祁曰浙本注文同也無也字其埶非置死地人人自爲戰今即予生地皆走寧尚得而用之乎諸將皆服曰非所及也於是問廣武君曰僕欲北攻燕東伐齊何若有功師古曰何若猶言何如也廣武君辭曰臣聞亡國之大夫不可以圖存師古曰圖謀也敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯師古曰百里奚本虞臣也後事於秦遂爲大夫穆公用其言以取霸伯讀曰霸非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用師古曰顧念也願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下李竒曰鄗音羮臛之臛}
