  - {type: variant, offset: 362, length: 2, content: 苛守, WYG: 人決壅囊水大至龍且軍太半不得渡即急擊殺龍且龍且水東軍散走齊王廣亡去信追北至城陽虜廣楚卒皆降遂平齊使人言漢王曰齊夸詐多變反覆之國南邊楚師古曰邉近也不爲假王以塡之其埶不定師古曰塡音竹刃反今權輕不足以安之臣請自立爲假王當是時楚方急圍漢王於}
