  - {type: variant, offset: 74, length: 7, content: 沛公赦勿斬遂西, WYG: 義兵無敵諸侯之衆無不離散而敗也且三秦王為秦將師古曰章邯司馬欣董翳將秦子弟數嵗而所殺亡不可勝計又欺其衆降諸侯至新安項王詐阬秦降卒二十餘萬人唯獨邯欣翳脱師古曰脱免也音土活反秦父兄怨此三人痛於骨髓今楚彊以威王此三人秦民莫愛也大王之}
