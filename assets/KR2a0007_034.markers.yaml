  - {type: variant, offset: 52, length: 5, content: 解衣伏質身, WYG: 其疇十三人皆已斬師古曰疇類也至信信乃仰視適見滕公師古曰夏侯嬰曰上不欲就天下乎宋祁曰或無此上字而斬壯士滕公竒其言壯其貎釋弗斬師古曰釋放也置也與語大說之言於漢王漢王以為治粟都尉上未竒之也數與蕭何語何竒之至南鄭諸將道亡者數十人信度何等已數言師古曰度計量也音大各反上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜罵何曰若亡何也師古曰若汝也何曰臣非敢亡追亡者耳上曰所追者誰也曰韓信上復罵曰諸將亡者以數十公無所追追信詐也何曰諸將易得至如信國士無䨇師古曰為國家之竒士王必欲}
  - {type: page-break, offset: 52, content: '', id: KR2a0007_WYG_034-2b, image: WYG0249/WYG0249-0773d.png}
