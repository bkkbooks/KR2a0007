  - {type: variant, offset: 104, length: 0, content: '', krp: 必空壁逐我若疾入拔趙幟立漢幟師古曰若汝也令其裨將傳餐服䖍曰立駐傳餐食也如淳曰小飯曰餐破趙後乃當共飽食也師古曰餐古飡字音千安反曰今日破趙會食諸將皆嘸然陽應曰諾孟康曰嘸音撫不精明也劉德曰音憮師古曰劉音是也音文府反信謂軍吏曰趙已先據便地壁且彼未見大將旗鼓未肻擊前行師古曰行音胡郎反恐吾阻險而還劉奉世曰前行當屬下句言我若前行又恐阻險而還耳所以先使萬人陳也行如字乃使萬人先行出背水陣趙兵望見大笑平旦信建大將旗鼓鼓行出井陘口師古曰聲鼓而行趙開壁擊之大戰良久於是信張耳弃鼓旗走水上軍師古曰走趣也音奏復疾戰趙空壁爭漢鼓旗劉奉世曰復疾戰三字衍文逐信耳信耳已入水上軍軍皆殊死戰不可敗師古曰殊絕也謂決意必死宋祁曰逐信張耳信張耳已入水上軍疑有二張字信所出奇兵二千騎者候趙空壁逐利卽馳入趙壁皆拔趙旗幟立漢赤幟二千趙軍已不能得信耳等欲還歸壁壁皆漢赤幟大驚以漢爲皆已破趙王將矣遂亂遁走趙將雖斬之弗能禁於是漢兵夾擊破虜趙軍斬成安君泜水上師古曰泜音祗又音丁計反禽趙王歇信乃令軍毋斬廣武君有生得之者購千金頃之有縛而至戲下者信解其縛東鄉坐西鄉對而師事之師古曰鄉皆讀曰嚮諸校効首虜休皆賀師古曰諸校諸部也猶今言諸營也効致也謂各致其所獲因問信曰兵法有右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君弗察耳師古曰顧念也兵法不曰䧟之死地而後生投之亡地而後存乎且信非得素拊循士大夫經所謂敺市人而戰之也師古曰經亦謂兵法也敺與驅同也忽入市鄽而敺取其人令戰言非素所練習宋祁曰浙本注文同也無也字其埶非置死地人人自爲戰今即予生地皆走寧尚得而用之乎諸將皆服曰非所及也於是問廣武君曰僕欲北攻燕東伐齊何若有功師古曰何若猶言何如也廣武君辭曰臣聞亡國之大夫不可以圖存師古曰圖謀也敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯師古曰百里奚本虞臣也後事於秦遂爲大夫穆公用其言以取霸伯讀曰霸非愚於虞而智於秦也用與不用聽與不聽耳向使成安君聽子計僕亦禽矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用師古曰顧念也願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下李竒曰鄗音羮臛之臛}
  - {type: variant, offset: 106, length: 0, content: '', WYG: 縣也光武卽位於此故改曰高邑身死泜水上今足下虜魏}
  - {type: page-break, offset: 106, content: '', id: KR2a0007_WYG_034-10a, image: WYG0249/WYG0249-0777c.png}
  - {type: variant, offset: 106, length: 0, content: '', krp: 縣也光武卽位於此故改曰高邑身死泜水上今足下虜魏}
  - {type: variant, offset: 107, length: 0, content: '', WYG: 禽夏説不旬朝破趙二十萬衆誅成安君名聞海内威震諸侯衆庶莫不輟作怠惰靡衣婾食傾耳以待命者師古曰輟止也靡輕麗也婾與偸字同偸茍且也言為靡麗之衣茍且而食恐懼之甚不為久計也然而衆勞卒罷師古曰罷讀曰疲其實難用也今足下舉勌敝之兵頓之燕堅城之下情見力屈師古曰見顯露也屈盡也見音胡電反屈音其勿反欲戰不拔曠日持久糧食單竭師古曰單亦盡若燕不破宋祁曰若一作弱齊必距境而以自彊二國相持則劉項之權未有所分也臣愚竊以爲亦過矣信曰然則何由師古曰由從也言當從何計也廣武君對曰當今之計不如按甲休兵百里之内牛酒日至以饗士大夫北首燕路師古曰首謂趣向也音式究反然後發一乘之使奉咫尺之書以使燕師古曰八寸曰咫咫尺者言其簡牘或長咫或長尺喩輕率也今俗言尺書或言尺牘蓋其遺語耳燕必不敢不聽從燕而東臨齊雖有智者亦不知爲齊計矣如是則天下事可圖也兵故有先聲而後實者此之謂也信曰善敬奉敎於是用廣武君策發使燕燕從風而靡乃遣使報漢因請立}
  - {type: page-break, offset: 107, content: '', id: KR2a0007_WYG_034-10b, image: WYG0249/WYG0249-0777d.png}
