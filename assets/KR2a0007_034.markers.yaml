  - {type: variant, offset: 70, length: 1, content: 美, krp: 主自王善地項王所過亡不殘滅多怨百姓師古曰結怨於百姓百姓不附特刧於威彊服耳師古曰彊音其兩反其下彊以威王亦同名雖為覇實失天下心師古曰羽自號西楚霸王故云名為霸也故曰其彊易弱師古曰易使弱也今大王誠能反其道任天下武勇何不誅師古曰言何所不誅也下皆類此以天下城邑封功臣何不服以義兵從思東歸之}
