  - {type: variant, offset: 379, length: 3, content: 若趣降, WYG: 吾困於此旦暮望而來佐我師古曰而汝也乃欲自立爲王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自爲守不然變生漢王亦寤因復罵曰大丈夫定諸侯即爲眞王耳何以假爲遣張良立信爲齊王徵其兵使擊楚楚以亡龍且宋祁曰以疑作已項王恐使盱台人武渉徃説信曰足下何不反漢與楚楚王與足下有舊故且}
