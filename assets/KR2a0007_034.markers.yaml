  - {type: variant, offset: 1762, length: 8, content: 而嘉食邑五百戶十, WYG: 得罪信注晉灼曰楚漢春秋云謝公也臣召南按劉奉世即据功臣表以正晉灼之誤是也但本書表作樂説史表作欒説樂欒字形相似未知孰是黥布傳徴兵九江布稱病不往臣召南按叙此事於追殺義帝之後與史記合是也乃項羽傳叙于追殺義帝之前蓋誤太宰主之胡三省曰此非周官之太宰也漢奉常屬官有太宰番陽人殺布兹鄉注師古曰鄡陽縣之鄉也胡三省曰据史漢髙紀皆言追斬布番陽則兹鄉當在番陽界將率封者}
