  - {type: variant, offset: 16, length: 0, content: '', WYG: 家貧無行不得推擇為吏李竒曰無善行可推舉選擇也又不能治生為商賈師古曰行賣曰商坐販曰賈常從人寄食其母死無以葬宋祁曰或無其字廼行營髙燥地令傍可置萬家者師古曰言其有大志也行音下更反燥音先老反信從下鄉南昌亭長食張晏曰下鄉屬淮隂亭長妻苦之師古曰苦厭也廼晨炊蓐食張晏曰未起而牀蓐中食食時信往不為具食信亦知其意自絶去至城下釣有一漂母哀之飯信韋昭曰以水擊絮曰漂師古曰哀憐而飯之漂音匹妙反飯音扶晚反竟漂數十日信謂漂母曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食蘇林曰王孫如言公子也豈望報乎淮隂少年又侮信曰雖長大}
