  - {type: variant, offset: 387, length: 0, content: '', krp: 足下雖自以爲與漢王爲金石交師古曰稱金石者取其堅固然終爲漢王所禽矣足下所以得須臾至今者以項王在項王即亡次取足下何不與楚連和三分天下而王齊今釋此時自必於漢王以擊楚且爲智者固若此邪信謝曰臣得事項王數年官不過郎中位不過執㦸張晏曰郎中宿衞執㦸言不聽畫策不用故背楚歸漢漢王授我上將軍印數萬之衆宋祁曰浙本數萬字上有御字解衣衣我推食食我師古曰下衣音於記反下食讀曰飤也言聽計用吾得至於此夫人深親信我背之不祥幸為信謝項王武渉已去蒯通知天下權在於信深説以三分天下之計宋祁曰景祐本越本無之計字作鼎足而王語在通傳信不忍背漢又自以功大漢王不奪我齊遂不聽漢王之敗固陵用張良計徵信將兵會垓下項羽死髙祖襲奪信軍徙信為楚王都下邳信至國召所從食漂母賜千金及下鄉亭長錢百師古曰以恥辱之曰公小人為徳不竟師古曰言晨炊蓐食召辱已少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時寧不能死死之無名故忍而就此師古曰就成也成今日之功項王亡將鍾離昧師古曰昧音莫曷反家在伊廬劉徳曰東海朐南有此邑韋昭曰今中廬縣也師古曰韋説非也中廬在襄陽之南素與信善項王敗昧亡歸信漢怨昧聞在楚詔楚捕之信初之國行縣邑陳兵出入師古曰行音下更反有變告信欲反師古曰凡言變告者謂告非常之事書聞師古曰聞於天子上患之用陳平謀偽游於雲夢者實欲襲信信弗知髙祖且至楚信欲發兵自度無罪師古曰度音大各反欲謁上恐見禽人或説信曰斬昧謁上上必喜亡患信見昧計事昧曰漢所以不擊取楚以昧在公若欲捕我自媚漢吾今死公隨手亡矣乃罵信曰公非長者卒自剄信持其首謁於陳髙祖令武士縛信載後車信曰果若人言狡兎死良狗亨張晏曰狡猶猾也師古曰此黄石公三畧之言上曰人告公反遂械信至雒陽赦以為淮隂侯信知漢王畏惡其能宋祁曰浙本無王字按六年游雲夢時髙祖已即帝位不容更稱王也稱疾不朝從師古曰朝朝見也從從行也由此日怨望居常鞅鞅師古曰鞅鞅志不滿也音於兩反宋祁曰當作於向反羞與絳灌等列嘗過樊將軍噲噲趨拜送迎言稱臣曰大王乃肻臨臣信出門笑曰生乃與噲等為伍師古曰言俱為列侯上嘗從容與信言諸將能各有差師古曰從音千容反上問曰如我能將幾何信曰陛下不過能將十萬上曰如公何如曰如臣多多益辦耳上笑曰多多益辦何為為我禽信曰陛下不能將兵而善將將此乃信之為陛下禽也且陛下所謂天授非人力也後陳豨為代相監邊辭信信挈其手師古曰挈謂執提之與歩於庭數匝仰天而歎曰子可與言乎吾欲與子有言豨因曰唯將軍命信曰公之所居天下精兵處也而公陛下之信幸臣也人言公反陛下必不信再至陛下乃疑三至必怒而自將吾為公從中起天下可圖也陳豨素知其能信之曰謹奉教漢十年豨果反髙帝自將而徃信病不從宋祁曰浙本病字上有稱字隂使人之豨所而與家臣謀夜詐赦諸官徒奴欲發兵襲呂后太子部署已定待豨報其舎人得罪信信囚欲殺之晉灼曰楚漢春秋云謝公也劉奉世曰按功臣表告信反者舍人欒説也宋祁曰功臣侯表云慎陽欒説為淮隂侯舍人告淮隂侯信反侯二千戸舎人弟上書變告信欲反狀於呂后呂后欲召恐其黨不就師古曰黨音他朗反乃與蕭相國謀詐令人從帝所來稱豨已破羣臣皆賀相國紿信曰雖病強入賀師古曰紿詐也信入呂后使武士縛信斬之長樂鍾室師古曰鍾室謂懸鍾之室信方斬曰吾不用蒯通計反為女子所詐豈非天哉遂夷信三族髙祖已破豨歸至聞信死且喜且哀宋祁曰景祐本哀下有之字問曰信死亦何言呂后道其語髙祖曰此齊辯士蒯通也召欲亨之通至自説釋弗誅師古曰自説謂自解説也釋放也置也劉攽曰釋解也猶云解説也語在通傳宋祁曰浙本無此四字彭越字仲昌邑人也常漁鉅野澤中為盜師古曰漁捕魚也鉅野即今鄆州鉅野縣陳勝起或謂越曰豪桀相立畔秦仲可効之越曰兩龍方鬬且待之師古曰兩龍謂秦與陳勝居嵗餘澤間少年相聚百餘人往從越請仲為長越謝不願也少年強請乃許與期旦日日出時後會者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君強以為長今期而多後不可盡誅誅最後者一人令校長斬之師古曰一校之長也校音下教反皆笑曰何至是請後不敢於是越乃引一人斬之設壇祭令徒屬徒屬皆驚畏越不敢仰視乃行畧地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌邑未下沛公引兵西越亦將其衆居鉅野澤中收魏敗散卒項籍入闗王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟隂以擊楚劉氏曰田榮使越擊楚此不合有漢字楚令蕭公角將兵擊越越大破楚軍漢二年春與魏豹及諸侯東擊楚越將其兵三萬餘人歸漢外黄師古曰於外黄來歸漢漢王曰彭將軍收魏地得十餘城欲急立魏後今西魏王豹魏咎從弟真魏也鄭氏曰豹真魏後也廼拜越為魏相國擅將兵畧定梁地師古曰擅專也使專為此事漢王之敗彭城解而西也越皆亡其所下城獨將其兵北居河上漢三年越常往來為漢游兵擊楚絶其糧於梁地項王與漢王相距滎陽越攻下雎陽外黄十七城項王聞之乃使曹咎守成臯自東收越所下城邑皆復為楚越將其兵北走榖城項王南走陽夏師古曰走並音奏夏音攻雅反越復下昌邑旁二十餘城得粟十餘萬斛以給漢食漢王敗使使召越并力擊楚劉攽曰漢王敗此時漢未敗其敗字疑是數字越曰魏地初定尚畏楚未可去漢王追楚為項籍所敗固陵乃謂留侯曰諸侯兵不從為之奈何留侯曰彭越本定梁地功多始君王以魏豹故拜越為相國今豹死亡後且越亦欲王而君王不蚤定師古曰蚤古早字今取雎陽以北至榖城皆許以王彭越又言所以許韓信語在髙紀於是漢王發使使越如留侯策使者至越乃引兵會垓下項籍死立越為梁王都定陶六年朝陳九年十年皆來朝長安陳豨反代地髙帝自往擊之至邯鄲徵兵梁梁王稱病使使將兵詣邯鄲髙帝怒使人讓梁王師古曰讓責也梁王恐欲自往謝其將扈輒曰王始不往見讓而往往即為禽不如遂發兵反梁王不聽稱病梁太僕有罪亡走漢吿梁王與扈輒謀反於是上使使掩捕梁王囚之雒陽有司治反形已具張晏曰扈輒勸越反越不聽而云反形已具有司非也臣瓚曰扈輒勸越反而越不誅輙是反形已具也師古曰瓚説是也請論如法上赦以為庶人徙蜀青衣文穎曰青衣縣名西至鄭師古曰即今華州鄭縣是也逢呂后從長安東欲之雒陽道見越越為呂后泣涕自言亡罪願處故昌邑呂后許諾詔與俱東宋祁曰一本作涕泣一無詔字至雒陽呂后言上曰彭越壯士也今徙之蜀此自遺患不如遂誅之妾謹與俱來於是呂后令其舎人吿越復謀反廷尉奏請遂夷越宗族宋祁曰宗字當作三字黥布六人也師古曰六縣名也解在髙紀姓英氏少時客相之當刑而王及壯坐法黥布欣然笑曰人相我當刑而王幾是乎臣瓚曰幾近也師古曰幾音鉅依反人有聞者共戱笑之布以論輸驪山師古曰有罪論決而輸作於驪山驪山之徒數十萬人布皆與其徒長豪桀交通乃率其曹耦亡之江中為羣盜師古曰曹輩也陳勝之起也布乃見番君師古曰番音蒲何反其衆數千人番君以女妻之章邯之滅陳勝破呂臣軍布引兵北擊秦左右校破之青波師古曰地名也引兵而東聞項梁定會稽西渡淮布以兵屬梁梁西擊景駒秦嘉等布常冠軍師古曰言其驍勇為衆軍之最項梁聞陳渉死立楚懐王以布為當陽君項梁敗死懷王與布及諸侯將皆軍彭城宋祁曰軍字疑作聚當是時秦急圍趙趙數使人請救懷王懷王使宋義為上將宋祁曰越本將字下有軍字項籍與布皆屬之北救趙及籍殺宋義河上自立為上將軍使布先渉河師古曰渉謂無舟楫而渡也擊秦軍數有利籍乃悉引兵從之遂破秦軍降章邯等楚兵常勝功冠諸侯諸侯兵皆服屬楚者以布數以少敗衆也項籍之引兵西至新安又使布等夜擊阬章邯秦卒二十餘萬人至闗不得入又使布等先從間道破闗下軍師古曰間道㣲道也遂得入至咸陽布為前鋒項王封諸將立布為九江王都六尊懷王為義帝徙都長沙廼隂令布擊之布使將追殺之郴齊王田榮叛楚項王往撃齊徵兵九江布稱病不往遣將將數千人行漢之敗楚彭城布又稱病不佐楚項王由此怨布數使使者譙讓召布師古曰譙讓責之也譙音在笑反布愈恐不敢往項王方北憂齊趙西患漢所與者獨布又多其材師古曰多猶重也欲親用之以故未撃漢王與楚大戰彭城不利出梁地至虞師古曰即今宋州虞城縣是也劉攽曰上文云漢之敗楚彭城此文又云漢與楚大戰彭城不利出梁按隨何説前後殊參差云漢王大戰彭城不利出梁地至虞是則項王已去齊矣安得復言留項王於齊及随何自明已功亦云陛下攻彭城楚王未去齊也然則漢王使随何在未至彭城之前明矣實説項王伐齊召兵黥布漢王度羽得布共伐齊西方有變必留布而羽自至故欲使人説布叛楚布叛楚則項王必自終齊事故必數月留而漢可取天下矣及隨何説布歸漢漢果得以入彭城也然則説辭差錯或楚漢初記事者各不同班氏合之不能無誤耳又檢髙紀二年敗彭城三年布方歸漢此時漢與楚相持榮陽矣此傳文云項王留而攻下邑非事理也及随何説詞亦自不倫疑漢之辯士寓言如此非本語也謂左右曰如彼等者無足與計天下事者謁者隨何進曰不審陛下所謂漢王曰孰能為我使淮南師古曰孰誰也使之發兵背楚留項王於齊數月我之取天下可以萬全隨何曰臣請使之乃與二十人俱使淮南至太宰主之服䖍曰淮南太宰作内主三日不得見隨何因説太宰曰王之不見何必以楚為彊以漢為弱此臣之所為使師古曰此事正是臣所為來欲言之使何得見言之而是邪是大王所欲聞也言之而非邪使何等二十人伏斧質淮南市師古曰質鍖也言伏於鍖上而斧斬之鍖音竹林反以明背漢而與楚也太宰廼言之王王見之隨何曰漢王使使臣敬進書大王御者竊怪大王與楚何親也淮南王曰寡人北鄉而臣事之師古曰鄉讀曰嚮以下亦同隨何曰大王與項王俱列為諸侯北鄉而臣事之必以楚為彊可以託國也項王伐齊身負版築以為士卒先李竒曰版牆版也築杵也大王宜悉淮南之衆師古曰悉盡也身自將為楚軍前鋒今乃發四千人以助楚夫北面而臣事人者固若是乎夫漢王戰於彭城項王未出齊也大王宜埽淮南之衆日夜會戰彭城下師古曰埽者謂盡舉之如埽地之為宋祁曰彭城字下當更有城字今撫萬人之衆無一人度淮者隂拱而觀其孰勝師古曰歛手曰拱孰誰也言不動揺坐觀成敗也宋祁曰觀其字下當有勢字夫託國於人者固若是乎大王提空名以鄉楚師古曰提舉也鄉讀曰嚮而欲厚自託臣竊為大王不取也然大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名師古曰負加也加於身上若言被也以其背明約而殺義帝也然而楚王特以戰勝自彊漢王收諸侯還守成臯滎陽下蜀漢之粟深溝壁壘分卒守徼乘塞楚人還兵間以梁地服䖍曰梁在楚漢之中央師古曰間音居莧反深入敵國八九百里張晏曰羽從齊還當經梁地八九百里乃得羽地也劉奉世曰方是時彭越反梁地故何言羽深入敵國乃至滎陽成臯爾從齊還彭城自不經梁地也欲戰則不得攻城則力不能老弱轉糧千里之外楚兵至滎陽成臯漢堅守而不動進則不得攻退則不能解故楚兵不足罷也師古曰不足者言易也罷讀曰疲使楚兵勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其埶易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王或之臣非以淮南之兵足以亡楚也夫大王發兵而背楚項王必留留數月漢之取天下可以萬全臣請與大王杖劎而歸漢王漢王必裂地而分大王又況淮南必大王有也宋祁曰南本浙本淮南字下更有淮南二字故漢王敬使使臣進愚計願大王之留意也淮南王曰請奉命隂許叛楚與漢未敢泄楚使者在文穎曰在淮南王所也方急責布發兵隨何直入曰九江王已歸漢楚何以得發兵布愕然楚使者起何因説布曰事已搆師古曰搆結也言背楚之事已結成也獨可遂殺楚使毋使歸而疾走漢并力師古曰走音奏以下亦同布曰如使者教因起兵而攻楚楚使項聲龍且攻淮南項王留而攻下邑師古曰縣名也在梁地數月劉奉世曰數月字宜屬上句此文雖符上文留項王於齊數月然事理全在下邑又非齊地龍且攻淮南破布軍布欲引兵走漢恐項王撃之故間行與隨何俱歸漢至漢王方踞牀洗師古曰洗濯足也音先典反而召布入見布大怒悔來欲自殺出就舎張御食飲從官如漢王居布又大喜過望師古曰髙祖以布先久為王恐其意自尊大故峻其禮令布折服已而羙其帷帳厚其飲食多其從官以悦其心此權道也張音竹亮反若今言張設於是乃使人之九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣將衆數千人歸漢漢益分布兵而與俱北收兵至成臯四年秋七月立布為淮南王與撃項籍布使人之九江得數縣五年布與劉賈入九江誘大司馬周殷殷反楚遂舉九江兵與漢撃楚破垓下項籍死上置酒對衆折隨何曰腐儒師古曰腐者爛敗言無所堪任為天下安用腐儒哉師古曰髙祖意欲褒賞隨何恐羣臣不服故對衆折辱令其自數功勞也隨何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩卒五萬人騎五千能以取淮南乎曰不能隨何曰陛下使何與二十人使淮南如陛下之意是何之功賢於歩卒數萬騎五千也然陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功師古曰圖謀也乃以隨何為䕶軍中尉布遂剖符為淮南王都六九江廬江衡山豫章郡皆屬焉六年朝陳七年朝雒陽九年朝長安十一年髙后誅淮隂侯布因心恐夏漢誅梁王彭越盛其醢以徧賜諸侯師古曰反者被誅皆以為醢即刑法志所云葅其骨肉是也至淮南淮南王方獵見醢因大恐隂令人部聚兵候伺旁郡警急師古曰恐被收捕即欲發兵反布有所幸姬病就醫醫家與中大夫賁赫對門師古曰賁音肥姓賁名赫赫乃厚餽遺從姬飲醫家姬侍王從容語次譽赫長者也師古曰從音千容反王怒曰女安從知之師古曰安從何由者也具道王疑與亂赫恐稱病王愈怒欲捕赫赫上變事乘傳詣長安師古曰傳音張戀反布使人追不及赫至上變言布謀反有端可先未發誅也師古曰及其未發兵先誅伐之上以其書語蕭相國蕭相國曰布不宜有此師古曰不應有反謀恐仇怨妄誣之師古曰怨音於元反請繋赫使人微驗淮南王師古曰微驗不顯言其事宋祁曰㣲或作徵舊本及李本並作徵今改作微景徳本無王字布見赫以罪亡上變已疑其言國隂事漢使又來頗有所驗遂族赫家發兵反反書聞上乃赦赫以為將軍宋祁曰浙本上字下更有上字召諸將問布反為之奈何皆曰發兵阬豎子耳何能為汝隂侯滕公以問其客薛公薛公曰是固當反滕公曰上裂地而封之疏爵而貴之張晏曰疏分也南面而立萬乘之主其反何也薛公曰前年殺彭越往年殺韓信張晏曰往年與前年同耳文相避也三人皆同功一體之人也自疑禍及身故反耳滕公言之上曰臣客故楚令尹薛公其人有籌策可問上乃見問薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝負之數未可知也出於下計陛下安枕而卧矣上曰何謂上計薛公對曰東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之險勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙師古曰重輜重也音直用反陛下安枕而卧漢無事矣上曰是計將安出師古曰是者謂布也薛公曰出下計上曰胡為廢上計而出下計師古曰胡何也薛公曰布故驪山之徒也致萬乘之主此皆為身不顧後為百姓萬世慮者也故出下計上曰善封薛公千戸遂發兵自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮隂彭越今已死餘不足畏故遂反果如薛公揣之文穎曰揣度也音初委反劉攽曰上曰善按薛公所言英布出下計不盡如薛言布取荆又敗楚遂與上遇何嘗歸重於越身歸長沙乎又史云果如薛公所揣今未見揣者疑薛公本亦揣知布意上厭兵不來先言之故曰果如也或曰此亦辯士寓言非實事見布後死長沙故云歸重耳東擊荆荆王劉賈走死富陵師古曰縣名屬臨淮郡盡劫其兵渡淮擊楚楚發兵與戰徐僮閒師古曰二縣之閒也爲三軍欲以相救為竒師古曰不聚一處分而為三欲互相救出竒譎或説楚將曰布善用兵民素畏之且兵法諸侯自戰其地為散地師古曰謂在其本地戀土懷安故昜逃散今别為三彼敗吾一餘皆走安能相救不聽布果破其一軍二軍散走遂西與上兵遇蘄西會垂師古曰會音工外反垂音大瑞反解在髙紀宋祁曰髙帝紀作會缶布兵精甚上乃壁庸城鄧展曰地名也望布軍置陳如項籍軍上惡之與布相望見隃謂布何苦而反師古曰隃讀曰遙布曰欲為帝耳上怒罵之遂戰破布軍布走渡淮數止戰不利與百餘人走江南布舊與番君㛰故長沙哀王使人誘布晉灼曰芮之孫囘也師古曰㨿表云惠帝二年哀王囘始立今此是芮之子成王臣耳傳旣不同晉説亦誤也僞與俱亡走越師古曰偽謂詐為此計布信而隨至番陽番陽人殺布兹鄉師古曰鄡陽縣之鄉也鄡音口堯反遂滅之封賁赫為列侯將率封者六人盧綰豐人也與髙祖同里綰親與髙祖太上皇相愛晉灼曰親父也綰之父與髙祖父太上皇相愛及生男髙祖綰同日生里中持羊酒賀兩家及髙祖綰壯學書又相愛也里中嘉兩家親相愛宋祁曰浙本嘉作生子同日壯又相愛復賀羊酒髙祖為布衣時有吏事避宅綰常隨上下師古曰避宅謂不居其家潛匿東西及髙祖初起沛綰以客從入漢為將軍常侍中從東擊項籍以太尉常從出入卧内衣被食飲賞賜羣臣莫敢望雖蕭曹等特以事見禮至其親幸莫及綰者封為長安侯長安故咸陽也項籍死使綰别將與劉賈擊臨江王共尉李竒曰共敖子也師古曰共讀曰龔還從擊燕王臧荼皆破平時諸侯非劉氏而王者七人上欲王綰為羣臣觖望師古曰觖謂相觖也望怨望也觖音決宋祁曰浙本注文相字下有又字及虜臧荼乃下詔詔諸將相列侯擇羣臣有功者以爲燕王羣臣知上欲王綰皆曰太尉長安侯盧綰常從平定天下功最多可王上乃立綰為燕王諸侯得幸莫如燕王者綰立六年以陳豨事見疑而敗豨者宛句人也師古曰宛句縣名也地理志屬濟隂宛音於元反句音劬不知始所以得從及韓王信反入匈奴上至平城還豨以郎中封為列侯以趙相國將監趙代邊邊兵皆屬焉劉奉世曰不知始所以得從按功臣表自著豨起及以破臧荼封陽夏侯當是傳誤爾又曰以趙相國趙字當作代豨少時常稱慕魏公子師古曰謂信陵君無忌及將守邊招致賔客常告過趙師古曰因休告之假而過趙賔客隨之者千餘乘邯鄲官舍皆滿豨所以待客如布衣交皆出客下師古曰言屈已禮之不以富貴自尊大趙相周昌乃求入見上具言豨賔客盛擅兵於外恐有變上令人覆案豨客居代者諸為不法事多連引豨豨恐隂令客通使王黄曼丘臣所師古曰二人皆韓王信將漢十年秋太上皇崩上因是召豨豨稱病遂與王黄等反自立為代王劫畧趙代上聞乃赦吏民為豨所詿誤劫畧者上自擊豨破之語在髙紀初上如邯鄲擊豨師古曰如往也燕王綰亦擊其東北豨使王黄求救匈奴綰亦使其臣張勝使匈奴言豨等軍破勝至胡故燕王臧荼子衍亡在胡見勝曰公所以重於燕者以習胡事也燕所以乆存者以諸侯數反兵連不決也今公為燕欲急滅豨等豨等已盡次亦至燕公等亦且}
