  - {type: variant, offset: 100, length: 0, content: '', WYG: 二年出闗收魏河南韓殷王皆降令齊趙共擊楚彭城漢兵敗散而還信復發兵與漢王會滎陽復擊破楚京索間師古曰索音山客反以故楚兵不能西漢之敗卻彭城師古曰兵敗於彭城而卻退也卻音丘畧反塞王欣翟王翳亡漢降楚齊趙魏亦皆反與楚和漢王使酈生徃説魏王豹豹不聼乃以信爲左丞相擊魏信問酈生魏得毋用周叔爲大將乎宋祁云一本作大將軍曰栢直也信曰豎子耳遂進兵擊魏魏盛兵蒲坂塞臨晉信廼益爲疑兵師古曰多張兵形令敵人疑也陳船欲渡臨晉而伏兵從夏陽以木罌缶渡軍襲安邑服䖍曰以木柙縳罌缶以渡也韋昭曰以木爲器如罌缶也師古曰服説是也罌缶謂瓶之大腹小口者也音一政反臨晉在今同州朝邑縣界夏陽在韓城縣界宋祁曰伏越本作復劉敞曰復當作伏魏王豹驚引兵迎信信遂虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王會於滎陽漢王與兵三萬人遣張耳與俱進擊趙代破代禽夏說閼與李奇曰夏說代相也孟康曰閼與是邑名也在上黨隰縣師古曰說讀曰悅閼音一曷反與音豫信之下魏代漢輙使人收其精兵詣滎陽以距楚信耳以兵數萬欲東下井陘擊趙趙王成安君}
