  - {type: variant, offset: 58, length: 0, content: '', WYG: 王漢中無所事信張晏曰無事用信必欲爭天下非信無可與計事者顧王䇿安決師古曰顧思念也王曰吾亦欲東耳安能鬱鬱乆居此乎宋祁曰或無久字何曰王計必東能用信信即留不能用信信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為}
