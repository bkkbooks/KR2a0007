  - {type: variant, offset: 67, length: 0, content: '', WYG: 人恭謹言語姁姁師古曰姁姁和好貌也音許于反人有病疾涕泣分食飲至使人有功當封爵刻印刓忍不能予蘇林曰刓音刓角之刓刓與摶同手弄角訛不忍授也師古曰刓音五丸反摶音大官反又音專此所謂婦人之仁也項王雖霸天下}
  - {type: variant, offset: 67, length: 0, content: '', krp: 人恭謹言語姁姁師古曰姁姁和好貌也音許于反人有病疾涕泣分食飲至使人有功當封爵刻印刓忍不能予蘇林曰刓音刓角之刓刓與摶同手弄角訛不忍授也師古曰刓音五丸反摶音大官反又音專此所謂婦人之仁也項王雖霸天下}
  - {type: variant, offset: 68, length: 1, content: 怪, WYG: 臣諸侯不居闗中而都彭城又背義帝約而以親愛王諸侯不平諸侯之見項王逐義帝江南亦皆歸逐}
  - {type: variant, offset: 68, length: 1, content: 怪, krp: 臣諸侯不居闗中而都彭城又背義帝約而以親愛王諸侯不平諸侯之見項王逐義帝江南亦皆歸逐}
  - {type: variant, offset: 70, length: 1, content: 美, WYG: 主自王善地項王所過亡不殘滅多怨百姓師古曰結怨於百姓百姓不附特刧於威彊服耳師古曰彊音其兩反其下彊以威王亦同名雖為覇實失天下心師古曰羽自號西楚霸王故云名為霸也故曰其彊易弱師古曰易使弱也今大王誠能反其道任天下武勇何不誅師古曰言何所不誅也下皆類此以天下城邑封功臣何不服以義兵從思東歸之}
