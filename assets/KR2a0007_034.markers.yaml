  - {type: variant, offset: 359, length: 0, content: '', WYG: 南之宛葉師古曰之徃也宛葉二縣名宛音於元反葉音式渉反得九江王布入成臯楚復急圍之四年漢王出成臯度河獨與滕公從張耳軍脩武至宿傳舎晨自稱漢使馳入壁張耳韓信未起即其卧奪其印符師古曰就其卧處麾召諸將易置之信耳起乃知獨漢王來大驚漢王奪兩人軍宋祁曰學官景徳本作兩人軍印浙本無印字即令張耳備守趙地拜信爲相國發趙兵未發者擊齊文穎曰謂趙人未嘗見𤼵者信引兵東未度平原聞漢王使酈食其已説下齊信欲止蒯通説信令擊齊語在通傳信然其計遂度河襲歴下軍至臨菑齊王走髙密使使於楚請救信已定臨菑東追至髙密西楚使龍且將號稱二十萬救齊師古曰且音子余反齊王龍且并軍與信戰未合師古曰欲戰而未交兵也或説龍且曰漢兵遠鬬窮宼戰鋒不可當也宋祁曰一本戰字上有久字齊楚自居其地戰兵易敗散師古曰近其室家懐顧望也不如深壁令齊王使其信臣招所亡城師古曰信臣常所親信之臣城聞王在楚來救必反漢漢二千里客居齊齊城皆反之其埶無所得食可毋戰而降也龍且曰吾平生知韓信爲人易與耳寄食於漂母無資身之策受辱於跨下無兼人之勇不足畏也且救齊而降之吾何功今戰而勝之齊半可得師古曰自謂當得封齊之半地何爲而止遂戰與信夾濰水陳師古曰濰音維濰水出琅邪北經縣東北經臺昌入海即禹貢所云濰淄其道者也宋祁曰注文經縣當作箕縣信乃夜令人爲萬餘囊盛沙以壅水上流引兵半渡擊龍且宋祁曰舊本半字下有夜字}
