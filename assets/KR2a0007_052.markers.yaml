  - {type: variant, offset: 1348, length: 0, content: '', WYG: 亦言灌夫通姦猾侵細民家累巨萬横恣潁川輘轢宗室侵犯骨肉師古曰輘轢謂蹈踐之也輘音凌轢音郎擊反此所謂支大於幹脛大於股不折必披師古曰披音丕靡反丞相言亦是唯明主裁之主爵都尉汲黯是魏其内史鄭當時是魏其後不堅宋祁曰後字當從浙本作復若作後即在一時何容更有前後也餘皆莫敢對上怒内史曰公平生數言魏其武安長短今日廷論局趣效轅下駒應劭曰駒者駕著轅下局趣䠞小之貌張晏曰俛頭於車轅下隨母而已師古曰張説非也駕車不以牝馬小雅皇皇者華之詩曰我馬維駒非隨母也吾并斬若屬矣師古曰若汝也即罷起入上食太后太后亦已使人候司具以語太后太后怒不食曰我在也而人皆藉吾弟晉灼曰藉蹈也令我百嵗後皆魚肉之乎師古曰以比魚肉而食噉也且帝寜能為石人邪師古曰言徒有人形耳不知好惡也一曰石人者謂常存不死也此特帝在即錄錄師古曰録録言循衆也設百嵗後是屬寜有可信者乎師古曰設猶脱也上}
  - {type: page-break, offset: 1348, content: '', id: KR2a0007_WYG_052-13b, image: WYG0250/WYG0250-0193b.png}
