  - {type: variant, offset: 2940, length: 795, content: 追思賀恩欲封其冢為恩德侯置守冢二百家賀有一子蚤死無子子安世小男彭祖彭祖又小與上同席研書指欲封之先賜爵關內侯故安世深辭賀封又求損守冢戶數稍減至三十戶上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里居冢西鬭雞翁舍南上少時所嘗游處也明年復下詔曰朕微眇時故掖庭令張賀輔道朕躬修文學經術恩惠卓異厥功茂焉詩云無言不讎無德不報其封賀弟子侍中關內侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七歲拜為散騎中郎將賜爵關內侯食邑三百戶安世以父子封侯在位大盛乃辭祿詔都內別臧張氏無名錢以百萬數安世尊為公侯食邑萬戶然身衣弋綈夫人自紡績家童七百人皆有手技作事內治產業累積纖微是以能殖其貨富於大將軍光天子甚尊憚大將軍然內親安世心密於光焉元康四年春安世病上疏歸侯乞骸骨天子報曰將軍年老被病朕甚閔之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉何感而上書歸衛將軍富平侯印薄朕忘故非所望也願將軍強餐食近醫藥專精神以輔天年安世復強起視事至秋薨天子贈印綬送以輕車介士諡曰敬侯賜塋杜東將作穿復土起冢祠堂子延壽嗣延壽已歷位九卿既嗣侯國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以能久堪先人大國數上書讓減戶邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戶口如故而租稅減半薨諡曰愛侯子勃嗣為散騎諫大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯湯有罪勃坐削戶二百會薨故賜諡曰繆侯後湯立功西域世以勃為知人子臨嗣臨亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚哉且死分施宗族故舊薄葬不起墳臨尚敬武公主薨子放嗣鴻嘉中上欲遵武帝故事與近臣游宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女上為放供張賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第兩宮使者冠蓋不絕賞賜以千萬數放為侍中中郎將監平樂屯兵置莫府儀比將軍與上臥起寵愛殊絕常從為微行出游北至甘泉南至長楊五莋鬭雞走馬長安中積數年是時上諸舅皆害其寵白, WYG: 朝}
