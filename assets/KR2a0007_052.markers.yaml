  - {type: variant, offset: 1095, length: 0, content: '', WYG: 滿觴夫怒因嘻笑曰將軍貴人也畢之張晏曰行酒過之}
  - {type: variant, offset: 1095, length: 0, content: '', krp: 滿觴夫怒因嘻笑曰將軍貴人也畢之張晏曰行酒過之}
  - {type: variant, offset: 1096, length: 0, content: '', WYG: 已畢如淳曰言雖貴且當盡酒以其埶劫之也師古曰如説近之言將軍雖貴人也請盡此觴嘻强笑也音許其反劉攽曰夫謂蚡所以不能滿觴由其貴人也然當畢之時蚡不肯師古曰不為盡也行酒次至臨汝侯灌賢賢方與程不識耳語師古曰附耳小語也又不避席夫無所發怒迺罵賢曰平生毁程不識不直一錢今日長者為壽廼效女曹兒呫囁耳語師古曰女曹兒猶言兒女軰也呫音昌涉反囁音人渉反蚡謂夫曰程李俱東西宫衛尉孟康曰李廣為東宫程不識為西宫今衆辱程將軍仲孺獨不為李將軍}
