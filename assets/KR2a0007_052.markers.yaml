  - {type: variant, offset: 2231, length: 492, content: 大將軍毋令領光祿勳事使專精神憂念天下思惟得失安世子延壽重厚可以為光祿勳領宿衛臣上亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不達誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命上笑曰君言泰謙君而不可尚誰可者安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事數月罷車騎將軍屯兵更為衛將軍兩宮衛尉城門北軍兵屬焉時霍光子禹為右將軍上亦以禹為大司馬罷其右將軍屯兵以虛尊加之而實奪其眾後歲餘禹謀反夷宗族安世素小心畏忌已內憂矣其女孫敬為霍氏外屬婦當相坐安世瘦懼形於顏色上怪而憐之以問左右乃赦敬以慰其意安世𥧲恐職典樞機以謹慎周密自著外內無間每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絕勿復為通有郎功高不調自言安世應曰君之功高明主所知人臣執事何長短而自言乎絕不許已而郎果遷莫府長史遷辭去之官安世問以過失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹遠權勢如此為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄自言安世曰, WYG: 匈}
