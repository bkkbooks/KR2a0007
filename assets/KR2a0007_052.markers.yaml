  - {type: variant, offset: 4114, length: 0, content: '', WYG: 方倚欲以為相㑹其病卒師古曰倚謂仗任之也於綺反宋祁曰倚欲浙本作欲倚贊曰竇嬰田蚡皆以外戚重灌夫用一時决策師古曰謂馳入吳軍欲報父讐也而各名顯並位卿相大業定矣然嬰不知時變夫亡術而不遜師古曰遜順也蚡負貴而驕溢師古曰負恃也凶徳参㑹待時而發師古曰三人相遇故曰参㑹藉福區區其間惡能救斯敗哉師古曰惡音烏謂於何也以韓安國之見器臨其摯而顛墜李奇曰摯極也陵夷以憂死師古曰陵夷即陵遲也言漸陵替也遇合有命悲夫若王恢為兵首而受其咎豈命也虖師古曰言自己為之非由命也前漢書卷五十二前漢書卷五十二考證竇嬰傳字王孫臣召南按史記無嬰字觀景帝語嬰王孫寜可以讓耶是嬰字王孫矣有如兩宫奭將軍按史記作螫將軍張晏曰螫怒也毒蟲怒必螫人田蚡傳蚡為諸曹郎臣召南按史記無曹字据徐廣注亦不作郎官觧又漢初言郎不以曹稱疑此文曹字訛跪起如子姓凌穉隆曰史記作如子姪此作如子姓於義}
