  - {type: variant, offset: 193, length: 335, content: 少府湯為廷尉兩人交驩兄事禹禹志在奉公孤立而湯舞知以御人始為小吏乾沒與長安富賈田甲魚翁叔之屬交私及列九卿收接天下名士大夫己心內雖不合然陽浮道與之是時上方鄉文學湯決大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑必奏先為上分別其原上所是受而著讞法廷尉挈令揚主之明奏事即譴湯摧謝鄉上意所便必引正監掾史賢者曰固為臣議如上責臣臣弗用愚抵此罪常釋間即奏事上善之曰臣非知為此奏乃監掾史某所為其欲薦吏揚人之善解人之過如此所治即上意所欲辠予監吏深刻者即上意所欲釋予監吏輕平者所治即豪必舞文巧詆即下戶羸弱時口言雖文致法上裁察於是往往釋湯所言湯至於大吏內行修交通賓客飲食於故人子弟為吏及貧昆弟調護之尤厚其造請諸公不避寒暑是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學之士, WYG: ''}
