  - {type: variant, offset: 4261, length: 204, content: 賢千秋以禹為不材歎曰霍氏世衰張氏興矣及禹誅滅而安世子孫相繼自宣元以來為侍中中常侍諸曹散騎列校尉者凡十餘人功臣之世唯有金氏張氏親近寵貴比於外戚放子純嗣侯恭儉自修明習漢家制度故事有敬侯遺風王莽時不失爵建武中歷位至大司空更封富平之別鄉為武始侯張湯本居杜陵安世武昭宣世輒隨陵凡三徙復還杜陵贊曰馮商稱張湯之先與留侯同祖而司馬遷不言故闕焉漢興以來侯者百數保國持寵未有若富平者也湯雖酷烈及身蒙咎其推賢揚善固宜有後安世履道滿, WYG: 廣衛西宫}
