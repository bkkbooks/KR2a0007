  - {type: 'tls:seg', offset: 1081, content: '', id: KR2a0007_tls_052-10a.5}
  - {type: variant, offset: 1081, length: 0, content: '', WYG: 相昌御史大夫青翟坐喪事不辦免上以蚡為丞相大司農韓安國為御史大夫天下士郡諸侯愈益附蚡師古曰郡及諸侯也猶言郡國耳蚡為人貌侵生貴甚服䖍曰侵短小也師古曰生貴謂自尊髙示貴寵也又以為諸侯王多長張晏曰多長年上初即位富於春秋師古曰謂年幼也齒歴方久故云富於春秋也蚡以肺附為相師古曰舊觧云肺附如肝肺之相附著也一説肺斫木札也喻其輕薄附著大材也非痛折節以禮屈之天下不肅師古曰痛猶甚也言以尊貴臨之皆令其屈節而下已也當是時丞相入奏事語移日所言皆聴}
  - {type: page-break, offset: 1081, content: '', id: KR2a0007_WYG_052-5b, image: WYG0250/WYG0250-0189b.png}
  - {type: variant, offset: 1081, length: 0, content: '', krp: 相昌御史大夫青翟坐喪事不辦免上以蚡為丞相大司農韓安國為御史大夫天下士郡諸侯愈益附蚡師古曰郡及諸侯也猶言郡國耳蚡為人貌侵生貴甚服䖍曰侵短小也師古曰生貴謂自尊髙示貴寵也又以為諸侯王多長張晏曰多長年上初即位富於春秋師古曰謂年幼也齒歴方久故云富於春秋也蚡以肺附為相師古曰舊觧云肺附如肝肺之相附著也一説肺斫木札也喻其輕薄附著大材也非痛折節以禮屈之天下不肅師古曰痛猶甚也言以尊貴臨之皆令其屈節而下已也當是時丞相入奏事語移日所言皆聴}
  - {type: variant, offset: 1082, length: 6, content: 數從中文事有, WYG: 人或起家至二千石權移主上上廼曰君除吏盡未吾亦欲除吏師古曰凡言除者除去故官就新官嘗請考工地益宅上怒曰遂取武庫是後廼退師古曰考工少府之屬官也主作器械上責其此請故謂之曰何不遂取武庫蚡乃退也召客飲坐其兄蓋侯北鄉自坐東鄉師古曰自處尊位也鄉讀皆曰嚮以為漢相尊不}
  - {type: variant, offset: 1082, length: 6, content: 數從中文事有, krp: 人或起家至二千石權移主上上廼曰君除吏盡未吾亦欲除吏師古曰凡言除者除去故官就新官嘗請考工地益宅上怒曰遂取武庫是後廼退師古曰考工少府之屬官也主作器械上責其此請故謂之曰何不遂取武庫蚡乃退也召客飲坐其兄蓋侯北鄉自坐東鄉師古曰自處尊位也鄉讀皆曰嚮以為漢相尊不}
  - {type: variant, offset: 1090, length: 0, content: '', WYG: 兄故私橈師古曰橈曲也音女教反由此滋驕師古曰滋益也治宅甲諸第師古曰言為諸第之􅇰也以甲乙之次言甲則為上矣田園極膏腴師古曰膏腴謂肥厚之處市買郡縣器物相屬於道師古曰屬逮及也音之欲反前堂羅鐘鼓立曲旃如淳曰旃旗之名也通帛曰旃曲旃僭也蘇林曰禮大夫建旃曲柄上曲也師古曰蘇説是也許慎云旃旗曲柄也所以旃表士衆也後房婦女以百數諸奏珍物狗馬玩好不可勝數師古曰奏進也而嬰失竇太后益疏不用無埶諸公稍自引而怠驁師古曰驁與傲同唯灌夫獨否宋祁曰南本否作不顧余謂不若作否故嬰墨墨不得意而厚遇夫也灌夫字仲孺潁隂人也父張孟常為潁隂侯灌嬰舍人得幸因進之師古曰進薦也嬰薦孟也宋祁曰南本浙本常並作嘗至二千石故䝉灌氏姓為灌孟師古曰蒙冐也吳楚反時潁隂侯灌嬰為將軍屬太尉師古曰時潁隂侯是灌嬰之子名何轉冩誤為嬰耳請孟為校尉夫以千人與父俱孟康曰官主千人如候司馬也孟年老潁隂侯彊請之鬱鬱不得意故戰常䧟堅遂死吳軍中漢法宋祁曰漢法浙本作軍法從軍是此自説漢何煩以漢别之父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父仇張晏曰自奮厲也於是夫被甲持㦸募軍中壯士所善願從數十人師古曰所善素與己善者及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下師古曰戲大將之旗也讀與麾同又音許宜反所殺}
