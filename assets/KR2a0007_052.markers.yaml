  - {type: 'tls:seg', offset: 1349, content: '', id: KR2a0007_tls_052-10a.57}
  - {type: variant, offset: 1349, length: 0, content: '', WYG: 曰俱外家故廷辨之師古曰嬰景帝從舅子蚡太后同母弟故言俱外家不然此一獄吏所决耳是時郎中令石建為上分别言兩人蚡已罷朝出止車門召御史大夫安國載師古曰韓安國也載謂共乗車怒曰與長孺共一秃翁何為首鼠兩端服䖍曰秃翁言嬰無官位版綬也首鼠一前一却也張晏曰嬰年老又嗜酒頭秃言當共治一秃翁也師古曰服説是也安國良久謂蚡曰君何不自喜師古曰何不自謙遜為可喜之事也喜音許吏反夫魏其毁君君當免冠觧印綬歸師古曰歸印綬於天子也曰臣以肺附幸得待罪固非其任魏其言皆是如此上必多君有讓師古曰多猶重也不廢君魏其必媿杜門齰舌自殺師古曰杜塞也齰齧也音仕客反今人毁君君亦毁之譬如賈豎女子爭言何其無大體也蚡謝曰爭時急不知出此於是}
  - {type: page-break, offset: 1349, content: '', id: KR2a0007_WYG_052-14a, image: WYG0250/WYG0250-0193c.png}
  - {type: page-break, offset: 1349, content: '', id: KR2a0007_WYG_052-14b, image: WYG0250/WYG0250-0193d.png}
