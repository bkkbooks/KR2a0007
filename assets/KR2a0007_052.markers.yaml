  - {type: variant, offset: 1094, length: 0, content: '', WYG: 與交通也孟康曰根者根格引繩以彈排擯根格之也師古曰孟説近之根音下恩反格音下各反言嬰與夫共相提挈有人生平慕嬰夫後見其失職而頗慢弛如此者共排退之不復與交譬如相對挽繩而根格之也今吳楚俗猶謂牽引前却為根格宋祁曰根格二字疑皆從手夫亦得嬰通列侯宗室為名髙兩人相為引重張晏曰相薦逹為聲勢也師古曰相牽引而致於尊重也為音于偽反其游如父子然相得驩甚無厭恨相知之晚夫嘗有服師古曰謂喪服也過丞相蚡蚡從容曰師古曰從音千容反吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍廼肯幸臨況魏其侯師古曰況賜也夫安敢以服為觧師古曰觧謂辭之也若今言分疏矣請語魏其具師古曰具辦具酒食將軍旦日蚤臨師古曰旦日明旦也蚤古早字蚡許諾夫以語嬰嬰與夫人益市牛酒師古曰益多也夜灑掃張具師古曰洒音灑又音所寄反至旦平明令門下候司至日中蚡不來嬰謂夫曰丞相豈忘之哉夫不懌師古曰懌悦也曰夫以服請不宜師古曰不當忘也廼駕自徃迎蚡蚡特前戲許夫師古曰特但也殊無意徃夫至門蚡尚臥也於是夫見曰將軍昨日幸許過魏其魏其夫妻治具至今未敢嘗食蚡悟謝曰吾醉忘與仲孺言廼駕徃徃又徐行夫愈益怒及飲酒酣夫起舞屬蚡師古曰屬付也猶今之舞訖相勸也屬音之欲反蚡不起夫徙坐語侵之師古曰徙坐謂移就其坐也嬰廼扶夫去謝蚡蚡卒飲至夜極驩而去後蚡使藉福請嬰城南田嬰大望曰師古曰望怨也宋祁曰浙本而去字下更有去字老僕雖棄將軍雖貴寜可以埶相奪乎不許夫聞怒罵福福惡兩人有隙廼謾好謝蚡師古曰謾猶詭也詐為好言也謾讀與慢同又音莫連反曰魏其老且死易忍且待之已而蚡聞嬰夫實怒不予亦怒曰魏其子嘗殺人蚡活之蚡事魏其無所不可愛數頃田且灌夫何與也師古曰與讀曰預預干也吾不敢復求田由此大怒元光四年春蚡言灌夫家在潁川横甚民苦之請案之上曰此丞相事何請夫亦持蚡隂事為姦利受淮南王金與語言賔客居間遂已俱觧師古曰兩家賔客處於中間和觧之夏蚡取燕王女為夫人師古曰燕王澤之子康王嘉女太后詔召列侯宗室皆徃賀嬰過夫欲與俱夫謝曰夫數以酒失過丞相師古曰言因酒有失得罪過於丞相丞相今者又與夫有隙嬰曰事已解彊與俱酒酣蚡起為壽坐皆避席伏已嬰為壽獨故人避席餘半膝席蘇林曰下席而膝半在席上也如淳曰以膝跪席上也師古曰如説是也夫行酒至蚡蚡膝席曰不}
