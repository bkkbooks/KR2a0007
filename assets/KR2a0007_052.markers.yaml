  - {type: variant, offset: 1654, length: 1, content: 幸, krp: 黔首無不憂者孝文寤於兵之不可宿師古曰乆留也故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂師古曰襲因也復重也復音扶目反非故相反也各因世宜也且髙帝身被堅執鋭䝉霧露沐霜雪行幾十年師古曰幾近也音鉅依反所以不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望師古曰槥小棺也從軍死者以槥送}
  - {type: variant, offset: 1656, length: 1, content: 位, WYG: 其喪載槥之車相望於道言其多也槥音衛此仁人之所隱也張晏曰隱痛也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也師古曰祖祖廟也占問也重猶難之也且自}
  - {type: variant, offset: 1656, length: 1, content: 位, krp: 其喪載槥之車相望於道言其多也槥音衛此仁人之所隱也張晏曰隱痛也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常是以古之人君謀事必就祖發政占古語重作事也師古曰祖祖廟也占問也重猶難之也且自}
  - {type: variant, offset: 1658, length: 0, content: '', WYG: 代之盛夷狄不與正朔服色師古曰與讀曰預非威不能制彊弗能服也以為逺方絶地不牧之民不足煩中國也師古曰不牧謂不可牧養也且匈奴輕疾悍亟之兵也師古曰悍勇也亟急也音居力反至如猋風去如收電師古曰猋疾風也音必遥反畜牧為業弧弓射獵師古曰以木曰弧以角曰弓逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其埶不相權也師古曰輕重不等也臣故曰勿擊便恢曰不然臣聞鳳鳥乘於風聖人因於時昔秦繆}
