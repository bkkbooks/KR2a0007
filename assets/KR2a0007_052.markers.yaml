  - {type: variant, offset: 2724, length: 214, content: 以恚怒誣汙衣冠告署適奴其隱人過失皆此類也安世自見父子尊顯懷不自安為子延壽求出補吏上以為北地太守歲餘上閔安世年老復徵延壽為左曹太僕初安世兄賀幸於衛太子太子敗賓客皆誅安世為賀上書得下蠶室後為掖庭令而宣帝以皇曾孫收養掖庭賀內傷太子無辜而曾孫孤幼所以視養拊循恩甚密焉及曾孫壯大賀教書令受詩為取許妃以家財聘之曾孫數有徵怪語在宣紀賀聞知為安世道之稱其材美安世輒絕止以為少主在上不宜稱述曾孫及宣帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是, WYG: 報仇}
