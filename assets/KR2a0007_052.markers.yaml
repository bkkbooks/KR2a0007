  - {type: variant, offset: 13, length: 0, content: '', WYG: 師古曰縣名也地理志屬信都觀音工喚反喜賓客師古曰喜好也音許吏反孝文時為吳相病免孝景即位為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲師古曰序家人昆弟之親不為君臣禮也是時上未立太子酒酣上從容曰千秋萬歲後傳王師古曰從音千庸反宋祁曰浙本傳字下有於字太后驩嬰引巵酒進上曰天下者髙祖天下}
