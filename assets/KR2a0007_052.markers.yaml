  - {type: variant, offset: 1659, length: 0, content: '', WYG: 都雍師古曰繆讀與穆同地方三百里知時宜之變攻取西戎辟地千里并國十四師古曰辟讀曰闢其下亦同隴西北地是也及後蒙恬為秦侵胡辟數千里以河為竟師古曰竟讀曰境累石為城樹榆為塞如淳曰塞上種榆也匈奴不敢飲馬於河置㷭􅥂然後敢牧馬師古曰􅥂古燧字夫匈奴獨可以威服不可以仁畜也今以中國之盛萬倍之資遣百分之一以攻匈奴譬猶以彊弩射且潰之癰也必不留行矣師古曰留止也言}
