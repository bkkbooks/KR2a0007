  - {type: variant, offset: 1586, length: 6, content: 使趙禹責湯禹, WYG: 許和親明年鴈門馬邑豪聶壹張晏曰豪猶帥也因大行王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上廼召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盗無已邊竟數驚朕甚閔之師古曰竟讀曰境其下亦同今欲舉兵攻之何如大行恢對曰宋祁曰浙本恢字上有王字陛下雖未言臣固願效之師古曰效致也致其計臣聞全代之時服䖍曰代未分之時也李奇曰六國之時全代為一國尚能以擊匈奴况今加以漢之大乎北有彊胡之敵宋祁曰王本改北為背予謂作北義直不湏為背内連中國之兵然尚得飬老長幼種樹以時倉廪常實師古曰樹殖也匈奴不輕侵也今以陛下之威海内為一天下同任如淳曰任事也又遣子弟乗邊守塞師古曰乘登也登其城而備守也宋祁曰又字當從浙本作人人遣者見天下同任義轉粟輓輸以為之備師古曰輓引車也音晩然匈奴侵盗不已者無它以不恐之故耳師古曰不示威令恐懼也臣竊以為擊之便御史大夫安國曰不然臣聞髙皇帝嘗圍於平城匈奴}
