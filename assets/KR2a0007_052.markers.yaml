  - {type: variant, offset: 1358, length: 0, content: '', krp: 死師古曰痱風病也音肥或聞上無意殺嬰復食治病議定不死矣廼有飛語為惡言聞上張晏曰蚡為作飛揚誹謗之語也臣瓚曰無根而至也故以十二月晦論棄市渭城張晏曰著日月者見春垂至恐遇赦贖之春蚡疾一身盡痛若有擊者謼服謝罪晉灼曰服音瓝闗西俗謂得杖呼及小兒啼為呼瓝或言蚡號呼謝服罪也師古曰兩説皆通謼古呼字若謂啼為謼服則謼音火交反服音平卓反上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死子恬嗣元朔中有罪免後淮南王安謀反覺始安入朝時蚡為太尉迎安霸上謂安曰上未有太子大王最賢髙祖孫即宫車晏駕非大王立尚誰立哉師古曰言大王尚不得立當誰立也淮南王大喜厚遺金錢財物上自嬰夫事時不直蚡特為太后故及聞淮南事上曰使武安侯在者族矣師古曰言其頼自死韓安國字長孺梁成安人也後徙睢陽嘗受韓子雜説鄒田生所師古曰田生鄒縣人事梁孝王為中大夫吳楚反時孝王使安國及張羽為將扞吳兵於東界張羽力戰安國持重以故吳不能過梁吳楚破安國張羽名由此顯梁梁王以至親故得自置相二千石出入游戲僭於天子師古曰僭擬也天子聞之心不善太后知帝弗善廼怒梁使者弗見案責王所為安國為梁使見大長公主而泣如淳曰大長公主景帝姊也曰何梁王為人子之孝為人臣之忠而太后曽不省也師古曰省視也夫前日吳楚齊趙七國反自闗以東皆合從而西嚮師古曰從音子容反唯梁最親為限難梁王念太后帝在中師古曰中闗中也一説謂京師為中猶言中國也宋祁曰一本無難字而諸侯擾亂壹言泣數行而下跪送臣等六人將兵擊却吳楚吳楚以故兵不敢西而卒破亡梁之力也今太后以小苛禮責望梁王師古曰苛細也梁王父兄皆帝王而所見者大故出稱䟆入言警師古曰䟆止行人也警令戒肅也天子出入皆備此儀而今云出稱䟆入言警者互舉之耳車旗皆帝所賜即以嫮鄙小縣服䖍曰嫮夸好也晉灼曰嫮音折嫮之嫮鄧展曰嫮好也自以車服之好曜邊鄙之邑也師古曰服説晉音是也鄙小縣言在外鄙之小縣也驅馳國中欲夸諸侯令天下知太后帝愛之也今梁使來輙案責之梁王恐日夜涕泣思慕不知所為何梁王之忠孝而太后不䘏也長公主具以告太后太后喜曰為帝言之言之帝心廼解而免冠謝太后曰宋祁曰而免冠南本無而字兄弟不能相教廼為太后遺憂悉見梁使厚賜之其後梁王益親驩太后長公主更賜安國直千餘金師古曰更音工衡反由此顯結於漢其後安國坐法抵罪䝉師古曰䝉梁國之縣也劉奉世曰䝉字當屬下句獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然即溺之師古曰溺讀曰尿居無幾梁内史缺師古曰無幾未多時也幾音居豈反漢使使者拜安國為梁内史起徒中為二千石田甲亡安國曰甲不就官我滅而宗師古曰而汝也甲肉袒謝安國笑曰公等足與治乎師古曰治謂當敵也今人猶云對治治音丈吏反一曰不足繩治治讀如本字卒善遇之内史之缺也王新得齊人公孫詭説之師古曰説讀曰悦欲請為内史竇太后所廼詔王以安國為内史公孫詭羊勝説王求為帝太子及益地事恐漢大臣不聴廼陰使人刺漢用事謀臣及殺故吳相爰盎劉奉世曰刺漢謀臣在漢已立太子之後此云求為太子怨大臣不聴故刺之與諸傳不同當是此誤景帝遂聞詭勝等計畫廼使使捕詭勝必得師古曰必令得之漢使十軰至梁相以下舉國大索師古曰索捜也音山客反月餘弗得安國聞詭勝匿王所廼入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與太上皇之與髙帝及皇帝與臨江王親師古曰孰與猶言何如也王曰弗如也安國曰夫太上皇臨江親父子間然髙帝曰提三尺取天下者朕也師古曰三尺謂劍也故太上終不得制事居于櫟陽臨江適長太子師古曰適讀曰嫡以一言過廢王臨江師古曰景帝嘗屬諸姬子太子母栗姬言不遜由是廢太子栗姫憂死也用宮垣事卒自殺中尉府張晏曰以侵堧垣徴自殺也何者治天下終不用私亂公語曰雖有親父安知不為虎雖有親兄安知不為狼師古曰言其恩愛不可必保也今大王列在諸侯訹邪臣浮説師古曰訹誘也音戍宋祁曰江浙本訹作怵音椿戍反犯上禁橈明法師古曰橈曲也音女教反天子以太后故不忍}
  - {type: variant, offset: 1359, length: 0, content: '', WYG: 法於大王太后日夜涕泣幸大王自改大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出之即日詭勝自殺漢使還報梁事皆得釋師古曰釋觧也安國力也景帝太后益重安國孝王薨共王即位師古曰共讀曰恭安國坐法失官家居武帝即位武安侯田蚡為太尉親貴用事安國以五百金遺蚡蚡言安國太后上素聞安國賢即召以為北地都尉遷為大司農閩東越相攻遣安國大行王恢將兵未至越越殺}
