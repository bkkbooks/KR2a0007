  - {type: variant, offset: 36, length: 9, content: 鼠及餘肉劾鼠掠治傳, WYG: 朝請師古曰請音才性反其下亦同孝景三年吳楚反上察宗室諸竇無如嬰賢師古曰宗室帝之同姓親也諸竇總謂帝外家也以吳楚之難故欲用内外之親為將也召入見固讓謝稱病不足任太后亦慙於是上曰天下方有急王孫寧可以讓邪廼拜嬰為大將軍賜金千斤嬰言}
