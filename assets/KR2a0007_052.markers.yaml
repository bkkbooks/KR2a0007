  - {type: variant, offset: 1079, length: 1, content: 中, krp: 大夫嬰蚡以侯家居蚡雖不任職以王太后故親幸數言事多效師古曰效謂見聴用士吏趨埶利者皆去嬰而歸蚡蚡日益横師古曰横恣也音胡孟反六年竇太后崩}
