  - {type: variant, offset: 1345, length: 1, content: 謝, krp: 如魏其灌夫日夜招聚天下豪桀壯士與論議腹誹而心謗卭視天俛畫地張晏曰視天占三光也畫地知分野所在也念欲作反事也師古曰卬讀曰仰辟睨兩宫閒張晏曰占太后與帝吉凶之期也師古曰辟睨傍視也辟音普計反本作䁹睨音吾計反幸天下有變而欲有大功張晏曰幸有反者當為將立大功也臣瓚曰天下有變謂因國家變難之際得立大功也師古曰瓚説為是臣乃不如魏其等所為上問朝臣兩人孰是御史大夫韓安國曰魏其言灌夫父死事身荷㦸馳不測之吳軍師古曰荷負也不測言其彊盛也荷音何宋祁曰荷字當從浙本何可反身被數十創名冠三軍此天下壯士非有大惡爭杯酒不足引它過以誅也魏其言是}
