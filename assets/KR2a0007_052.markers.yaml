  - {type: variant, offset: 1090, length: 0, content: '', krp: 兄故私橈師古曰橈曲也音女教反由此滋驕師古曰滋益也治宅甲諸第師古曰言為諸第之最也以甲乙之次言甲則為上矣田園極膏腴師古曰膏腴謂肥厚之處市買郡縣器物相屬於道師古曰屬逮及也音之欲反前堂羅鐘鼓立曲旃如淳曰旃旗之名也通帛曰旃曲旃僭也蘇林曰禮大夫建旃曲柄上曲也師古曰蘇説是也許慎云旃旗曲柄也所以旃表士衆也後房婦女以百數諸奏珍物狗馬玩好不可勝數師古曰奏進也而嬰失竇太后益疏不用無埶諸公稍自引而怠驁師古曰驁與傲同唯灌夫獨否宋祁曰南本否作不顧余謂不若作否故嬰墨墨不得意而厚遇夫也灌夫字仲孺潁隂人也父張孟常為潁隂侯灌嬰舍人得幸因進之師古曰進薦也嬰薦孟也宋祁曰南本浙本常並作嘗至二千石故䝉灌氏姓為灌孟師古曰蒙冐也吳楚反時潁隂侯灌嬰為將軍屬太尉師古曰時潁隂侯是灌嬰之子名何轉冩誤為嬰耳請孟為校尉夫以千人與父俱孟康曰官主千人如候司馬也孟年老潁隂侯彊請之鬱鬱不得意故戰常䧟堅遂死吳軍中漢法宋祁曰漢法浙本作軍法從軍是此自説漢何煩以漢别之父子俱有死事得與喪歸夫不肯隨喪歸奮曰願取吳王若將軍頭以報父仇張晏曰自奮厲也於是夫被甲持㦸募軍中壯士所善願從數十人師古曰所善素與己善者及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下師古曰戲大將之旗也讀與麾同又音許宜反所殺}
  - {type: variant, offset: 1091, length: 1, content: 湯, WYG: 數十人不得前復還走漢壁師古曰走趣嚮也音奏亡其奴獨與一騎歸夫身中大創十餘適有萬金良藥故得無死師古曰萬金者言其價貴也金字或作全言得之者必生全也創少瘳師古曰瘳差也音丑流反又復請將軍曰吾益知吳壁曲折請復徃師古曰曲折猶言委曲也將軍壯而義之恐亡夫廼言太尉太尉召固止之吳軍破夫以此名聞天下潁隂侯言夫夫為郎中將劉敞曰當云中郎將否則郎中三將也數嵗坐法去家居長安中諸公莫不稱由是復為代相武帝即位以為淮陽天下郊勁兵處師古曰郊謂四交輻湊而兵又勁彊故徙夫為淮陽太守入為太僕二年夫與長樂衛尉竇甫飲輕重不得晉灼曰飲酒輕重不得其平也師古曰禮數之輕重也夫醉搏甫師古曰搏以手擊之甫竇太后昆弟上恐太后誅夫徙夫為燕相數嵗坐法免家居長安夫為人剛直使酒師古曰使酒因酒而使氣也不好面䛕貴戚諸埶在己之右欲必陵之士在己左愈貧賤尤益禮敬與鈞師古曰右尊也左卑也鈞等也稠人廣衆薦寵下軰師古曰稠多也下軰下等之人也每於人衆之中故寵薦也士亦以此多之師古曰多猶重之夫不好文學喜任俠已然諾師古曰已必也謂一言許人必信之也喜音許吏反諸所與交通無非豪桀大猾家累數千萬食客日數十百人師古曰或八九十或百人也波池田園宗族賔客為權利師古曰波讀曰陂横潁川師古曰横音胡孟反其下亦同潁川兒歌之曰潁水清灌氏寜潁水濁灌氏族師古曰深怨嫉之故為此言也夫家居卿相侍中賔客益衰師古曰以夫居家而卿相侍中素為夫之賔客者漸以衰退不復徃也及竇嬰失埶亦欲倚夫引繩排根生平慕之後棄者蘇林曰二人相倚引繩直排根賔客去之}
