  - {type: variant, offset: 1732, length: 0, content: '', WYG: 衝風疾風之衝突者也彊弩之末力不能入魯縞師古曰縞素也曲阜之地俗善作之尤為輕細故以取喻也夫盛之有衰猶朝之必莫也今將卷甲輕舉深入長􅇌難以為功師古曰􅇌與驅同從行則廹脅衡行則中絶師古曰從音子容反衡猶横也疾則糧乏徐則後利師古曰後利謂不及於利不至千里人馬乏食兵法曰遺人獲也師古曰言以軍遺敵人令其虜獲也遺音弋季反意者有它繆巧可以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過師古曰言易零落清水明鏡不可以形逃師古曰言美惡皆見通方之士不可以文亂師古曰方道也今臣言擊之者固}
