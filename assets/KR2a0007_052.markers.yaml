  - {type: variant, offset: 1353, length: 1, content: 案, WYG: 簿責嬰師古曰簿責以文簿一一責之也簿音歩户反所言灌夫頗不讎晉灼曰讎當也劾繫都司空師古曰都司空宗正屬官也見百官公卿表孝景時嬰嘗受遺詔曰事有不便以便宜論上師古曰論説}
  - {type: variant, offset: 1353, length: 1, content: 案, krp: 簿責嬰師古曰簿責以文簿一一責之也簿音歩户反所言灌夫頗不讎晉灼曰讎當也劾繫都司空師古曰都司空宗正屬官也見百官公卿表孝景時嬰嘗受遺詔曰事有不便以便宜論上師古曰論説}
