  - {type: variant, offset: 1097, length: 1, content: 湯, WYG: 乎蘇林曰不為李将軍除道地邪如淳曰二人同號比尊今辱一人不當為毁廣邪師古曰如説近之言既毁程令廣何地自安處夫曰今日斬頭穴匈何知程李晉灼曰斬頭見刺猶不止也坐乃起更衣師古曰坐謂坐上之人也更改也凡乆坐者皆起更衣以其寒煖或變也稍稍去嬰去戲夫晉灼曰戲古麾字也師古曰招麾之令出也漢書多以戲為麾字夫出蚡遂怒曰此吾驕灌夫罪也廼令騎留夫師古曰騎謂常從之騎也夫不得出藉福起為謝案夫項令謝師古曰使其拜也夫愈怒不肯順蚡廼戲騎縛夫師古曰戲讀亦曰麾謂指麾命之而令收縛夫也置傳舍師古曰傳舍觧在酈食其傳召長史曰今日召宗室}
