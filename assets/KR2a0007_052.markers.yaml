  - {type: variant, offset: 64, length: 1, content: 視, WYG: 也金無入家者嬰守滎陽監齊趙兵七國破封為魏其侯游士賔客争歸之毎朝議大事條侯魏其列侯莫敢與亢禮師古曰言特敬此二人也宋祁曰注特字當作時字四年立栗太子師古曰栗姬之子故曰栗太子以嬰為傅七年栗太子廢嬰争弗能得宋祁曰争下當有之字謝病屏居藍田南山下師古曰屏隐也宋祁曰邵夲無藍字居下着㸃越本作屏居田南山下若只云田南山下即當作田字今藍田為是數月諸竇賔客辯士説莫能來梁人髙遂廼説嬰曰能富貴將軍者上也能親將軍者太后也今將軍傅太子太子廢争不能拔又不能死自引謝病擁趙女屏閒處而不朝師古曰擁抱也閒處猶言私處也袛加懟自明揚主之過師古曰袛適也懟怨怒也袛音支其字從衣懟音直類反有如兩宫奭將軍師古曰兩宫太后及帝也奭怒貌也音赫則妻子無類矣師古曰言被誅戮無遺類也嬰然之廼起朝請如故桃侯免相服䖍曰劉舍也竇太后數言魏其景帝曰太后豈以臣有愛相魏其者師古曰愛猶惜也魏其沾沾自喜耳多易張晏曰沾沾言自整頓也多易多輕易之行也或曰沾音瞻師古曰沾沾輕薄也或音他兼反今俗言薄沾沾喜音許吏反易音弋豉反宋祁曰浙本注瞻作幨難以為相持重遂不用用建陵侯衛綰為丞相田蚡蘇林曰蚡音鼢鼠鼢扶粉反孝景王皇后同母弟也生長陵竇嬰已為大將軍方盛蚡為諸曹郎未貴徃來侍酒嬰所跪起如子姓師古曰姓生也言同子禮若已所生及孝景晚節蚡益貴幸師古曰晚節猶言末時也為中大夫辯有口學盤盂諸書應劭曰黄帝史孔甲所作也凡二十九篇書盤盂中所以為法戒也諸書諸子之書也孟康曰孔甲盤盂二十六篇雜家書兼儒墨名法者也晉灼曰案藝}
