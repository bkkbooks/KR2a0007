  - {type: variant, offset: 1654, length: 1, content: 幸, WYG: 黔首無不憂者孝文寤於兵之不可宿師古曰乆留也故復合和親之約此二聖之迹足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂師古曰襲因也復重也復音扶目反非故相反也各因世宜也且髙帝身被堅執鋭䝉霧露沐霜雪行幾十年師古曰幾近也音鉅依反所以不報平城之怨者非力不能所以休天下之心也今邊竟數驚士卒傷死中國槥車相望師古曰槥小棺也從軍死者以槥送}
