  - {type: variant, offset: 1060, length: 4, content: 七歲敗河, WYG: 王臧為郎中令師古曰推轂謂升薦之若轉車轂之為也迎魯申公欲設明堂令列侯就國除闗服䖍曰除關禁也索隐謂除關門之税以禮為服制師古曰謂喪服之制也以興太平舉謫諸竇宗室無行者除其屬籍諸外家為列侯列侯多尚公主皆不欲就國以故毁日至竇太后太后好黄老言而嬰蚡趙綰等務隆推儒術貶道家言是以竇太后滋不説師古曰滋益也説讀曰悦二年御史大夫趙綰請毋奏事}
