  - {type: variant, offset: 3778, length: 284, content: 縱恣奢淫不制前侍御史修等四人奉使至放家逐名捕賊時放見在奴從者閉門設兵弩射吏距使者不肯內知男子李游君欲獻女使樂府音監景武強求不得使奴康等之其家賊傷三人又以縣官事怨樂府游徼莽而使大奴駿等四十餘人群黨盛兵弩白晝入樂府攻射官寺縛束長吏子弟斫破器物宮中皆犇走伏匿莽自髡鉗衣赭衣及守令史調等皆徒跣叩頭謝放放乃止奴從者支屬並乘權勢為暴虐至求吏妻不得殺其夫或恚一人妄殺其親屬輒亡入放第不得幸得勿治放行輕薄連犯大惡有感動陰陽之咎為臣不忠首罪名雖顯前蒙恩驕逸悖理與背畔無異臣子之惡莫大於是不宜宿衛在位臣請免放歸國以銷眾邪之萌厭海內之心上不得已左遷放為北地都尉數月復徵入侍中太后以放為言出放, WYG: 如淳曰}
