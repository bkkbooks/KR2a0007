  - {type: variant, offset: 530, length: 3, content: 弘數稱, krp: 然惡人衆亦且毁君侯君侯能兼容則幸乆師古曰兼容謂不嫉惡人令}
  - {type: variant, offset: 534, length: 439, content: 美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之其治獄所巧排大臣自以為功多此類繇是益尊任遷御史大夫會渾邪等降漢大興兵伐匈奴山東水旱貧民流徙皆卬給縣官縣官空虛湯承上指請造白金及五銖錢籠天下鹽鐵排富商大賈出告緡令鉏豪彊并兼之家舞文巧詆以輔法湯每朝奏事語國家用日旰天子忘食丞相取充位天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁於是痛繩以辠自公卿以下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此匈奴求和親群臣議前博士狄山曰和親便上問其便山曰兵凶器未易數動高帝欲伐匈奴大困平城乃遂結和親孝惠高后時天下安樂及文帝欲事匈奴北邊蕭然苦兵孝景時吳楚七國反景帝往來東宮間天下寒心數月吳楚已破竟景帝不言兵天下富實今自陛下興兵擊匈奴中國以空虛邊大困貧由是觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯別疏骨肉使藩臣不自安臣固知湯之詐忠於是上作色曰吾使生居一郡能無使虜入盜乎山曰, WYG: 怨也}
