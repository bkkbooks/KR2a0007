  - {type: variant, offset: 2301, length: 1, content: 哉, WYG: 㢤師古曰永長也前漢書卷十一前漢書卷十一考證哀帝紀使執金吾任宏守大鴻臚持節徴定陶王胡三省曰大鴻臚掌諸侯故任宏守大鴻臚以迎定陶王守者權守也待詔夏賀良等言赤精子之䜟臣召南按䜟字始見於此髙祖以斬白蛇旗幟上赤然張蒼謂漢本水徳公孫臣非之至武帝時猶謂以土徳王未有言火徳者也赤精子之説亦起于此張平子謂䜟起哀平之間信㢤號曰陳聖劉太平皇帝注如韋二説是也胡三省曰韋説不詭于正如説則近于巫顔以二説為是將安從乎又注宋祁曰予按王莽𫝊以䜟文解釋當作太初元將元年云云臣召南按宋説是也太初是武帝年號此時何至重紀蓋惑于術士之説創立四字年號以示更新其後雖不施行然後世四字年號遂起于此二年監本作元夀二年臣照按帝紀從無此例凡年號于元年特書二年以後即䝉前文未有再書者元夀二字眀係衍文今删去前漢書卷十一考證}
