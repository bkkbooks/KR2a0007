  - {type: variant, offset: 6748, length: 0, content: '', WYG: 師古曰侔等殷之高宗及周宣王也前漢書卷八前漢書卷八考證宣帝紀内謁者令郭穰注劉攽曰謁字衍臣召南按丙吉傳亦作内謁者未必兩文並訛且據百官表謁者署與内者署並屬少府謁字或非衍也皇太后歸長樂宫胡三省曰漢太后常居長樂宫皇太后自昌邑之廢居未央宫今宣帝既立復居長樂宫也自左更至五大夫劉攽曰緣王即位九侯率已為關内侯矣臣召南按兩句俱有訛字宣帝以庶人封侯即帝位並未為王也九侯二字尤不可觧據前文自田廣明以下新封五侯而已以文義推之應作緣帝即位九卿率已為關内侯即指上文之右扶風徳典屬國武廷尉光宗正徳大鴻臚賢等也秋七月詔立燕刺王太子建為廣陽王云云臣召南按封廣陽王表作五月封廣陵王表作十月下有司皆自殺注田千秋子也臣召南按廣明與順皆姓田而順則千秋子也句上應有順字各夲俱誤脱耳鳳皇集魯郡臣召南按魯是時尚為國不得稱郡通鑑但云集魯可謂至慎其罷車騎將軍右將軍屯兵臣召南按此罷兩將軍之屯兵非罷將軍官也是時車騎將軍為張安世右將軍為霍禹帝此舉以收霍氏權柄耳復高皇帝功臣云云通鑑考異曰功臣表詔復家者皆云元康四年其數非一不容盡訛盖紀訛耳其益吏百石以下奉十五通鑑考異曰荀恱漢紀云益吏百石以下俸五十斛盖以十五難曉故改之然詔云以下恐難指五十斛也平通侯楊惲坐前為光禄勲云云臣召南按惲之死在四年此時但與戴長樂相告免官耳通鑑考異已辨此條之誤丙申太上皇廟火甲辰孝文廟火臣照按兩火字並應是灾字左傳曰火人火之也倘係人火之必記事實故知並是灾字之訛四年未央宫宣室閣火亦然遣䕶軍都尉禄將兵擊珠崖珠崖前後文俱作厓前漢書卷八考證}
