  - {type: variant, offset: 6717, length: 0, content: '', WYG: 李竒曰推亡者若紂為無道天下苦之有滅亡之形周武遂推而敝之固存者譬如鄰國以道涖民上下一心勢必能存因就而堅固之今匈奴内自奮争有事故宣帝能朝呼韓邪而固存之走郅支單于使逺遁是謂推亡也師古曰尚書仲虺之誥曰推亡固存邦乃其昌言有亡道者則推而滅之有存道者則輔而固之王者如此國乃昌盛故此賛引之}
