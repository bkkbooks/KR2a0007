  - {type: variant, offset: 4340, length: 0, content: '', WYG: 服䖍曰周時度江越人在船下負船將覆之佽飛入水殺之漢因以材力名官如淳曰吕氏春秋荆有茲非得寳劒於干將渡江中流兩蛟繞舟兹非㧞寳劒赴江刺兩蛟殺之荆王聞之任以執圭後世以為勇力之官兹佽音相近臣瓉曰本秦左弋官也武帝改曰佽飛官有一令九丞在上林苑中結矰繳以弋鳬鴈嵗萬頭以供祀宗廟許慎曰佽便利也便利矰繳以弋鳬鴈故曰佽飛詩曰抉拾既佽者也師古曰取古勇力人以名官熊渠之類是也亦因取其便利輕疾若飛故號佽飛弋鳬鴈事自使佽飛為之非取飛鳥為名瓉説失之佽音次}
