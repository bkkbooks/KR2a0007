  - {type: variant, offset: 6557, length: 0, content: '', WYG: 應劭曰時有請云詔使出者省卒徒以其直自給不復取稟假雖有進入於官非舊章也故絶之張晏曰先是武帝以用度不足宜有以益官者或奉使求不受奉禄自省其徒衆以取其禀者或自給於是姦吏縁以為利所得多於本禄故絶之如淳曰是時有所省卒徒而羣臣有請之以自給官府者先時聴與之今更悔之不復聴也師古曰應張二說是也}
