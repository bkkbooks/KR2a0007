  - {type: variant, offset: 3345, length: 0, content: '', WYG: 李斐曰今吏已修身奉法矣但不能稱上意故赦之師古曰言文王作罰有犯之者皆刑無赦今我意有所閔閔吏修身奉法矣而未稱其任故特赦之與更始耳李說非也劉攽曰言吏修身奉法未有能稱朕意故須赦也何則身不修則不䏻率下法不奉則或阿枉如此則民坐罪者乃無辜安得如文王刑兹無赦也劉敞曰此詔正謂吏未能修身奉法有稱上意者故特赦之與更始申儆之也顔李以意疑宣帝不當謂吏皆未修身奉法乃斷其辭曲為釋觧失之逺矣}
