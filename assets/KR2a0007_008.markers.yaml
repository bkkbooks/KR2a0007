  - {type: variant, offset: 4814, length: 0, content: '', WYG: 如淳曰太守雖號二千石有千石八百石居者有功徳茂異乃得滿秩覇得中二千石九卿秩也晋灼曰此直謂二千石増秩為中二千石耳不謂滿不滿也師古曰如說非也霸舊已二千石矣今増為中二千石以寵異之此與地節三年増膠東相王成秩其事同耳漢制秩二千石者一嵗得一千四百四十石實不滿二千石也其云中二千石者一嵗得二千一百六十石舉成數言之故曰中二千石中者滿也}
