  - {type: variant, offset: 393, length: 0, content: '', WYG: 烏弋最在其西師古曰瞰逺視也音口濫反西厭月􅒸東震日域服䖍曰􅒸音窟穴之窟月􅒸月所生也師古曰日域日初出之處也厭音一渉反又恐後世迷於一時之事常以此取國家之大務滛荒田獵陵夷而不禦也師古曰禦止也宋祁曰取當作為是以車不安軌日未靡旃從者仿佛骩屬而還張晏曰從者見仿佛委釋廻旋師古曰車不安軌未及止也日未靡旃不移景也仿佛讀曰髣髴骩古委字也屬音之欲反還讀曰旋宋祁曰軌越本作軔注同亦所以奉太宗之烈遵文武之度復三王之田反}
