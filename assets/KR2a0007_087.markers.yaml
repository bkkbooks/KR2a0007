  - {type: variant, offset: 4125, length: 1, content: 還, WYG: 免廼從閣上自投下幾死師古曰幾音鉅依反莽聞之曰雄素不與事何故在此師古曰與讀曰豫間請問其故師古曰使人宻問之廼劉棻嘗從雄學作竒字師古曰古文之異者雄不知情師古曰不知獻符命之事有詔勿問然京師為之語曰惟寂寞自投閣爰清静作符命師古曰以雄觧謿之言譏之也今流俗本云惟寂惟寞自投於閣爰清爰静作符命妄増之宋祁曰注文作符命當云作符作命雄以病免復召為大夫家素貧耆酒師古曰耆讀曰嗜人希至其門時有好事者載酒肴從游學而鉅鹿侯芭常從雄居服䖍曰芭音葩受其太𤣥法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有祿利然尚不能明易又如𤣥何師古曰言無奈之何}
