  - {type: variant, offset: 390, length: 0, content: '', krp: 能入水取物凌堅冰犯嚴淵探巖排碕薄索蛟螭師古曰嚴言不可犯也巖水岸嶔巖之處也碕曲岸也薄迫也索搜求也碕音鉅依反嶔音口反蕭該音義曰探字林曰逺取也薄索諸詮上音博下音桑各反蹈獱獺據黿鼉蘇林曰獱音賔師古曰獺形如狗在水中食魚獱小獺也獺音它曷反抾靈蠵鄭氏曰抾音怯應劭曰蠵大龜也雄曰毒冒雌曰觜蠵師古曰抾挹取也又音袪蠵音弋随反又音攜蕭該音義曰蠵字林曰龜也以胃鳴入洞穴出蒼梧晉灼曰洞穴禹穴也師古曰洞通也宋祁曰李善云郭璞山海經注曰呉縣南太湖中有包山山下有洞庭道也言潜行水底無所不通也乗鉅鱗騎京魚師古曰京大也或讀為鯨鯨大魚也浮彭蠡目有虞應劭曰彭蠡大澤在豫章師古曰目猶視也望也有虞謂舜陟方在江南言遥望也方椎夜光之流離剖明月之珠胎師古曰珠在蛤中若懷姙然故謂之胎也椎音直佳反其字從木鞭洛水之虙妃餉屈原與彭胥師古曰彭彭咸胥伍子胥皆水死者虙讀曰伏於兹虖鴻生鉅儒俄軒冕雜衣裳師古曰俄俄陳舉之貌雜者言衣與裳皆雜色也修唐典匡雅頌揖讓於前師古曰匡正也昭光振燿蠁曶如神師古曰蠁與嚮同曶與忽同仁聲惠於北狄武義動於南鄰師古曰南方有金鄰之國極逺也故云南鄰一曰鄰邑也是以旃裘之王胡貉之長移珍來享抗手稱臣如淳曰以物與人曰移師古曰貉東北夷也享獻也抗舉手也言其肅恭合掌}
  - {type: variant, offset: 391, length: 0, content: '', WYG: 拜也貉音莫百反前入圍口後陳盧山孟康曰單于南庭山也宋祁曰庭下當有南字羣公常伯楊朱墨翟之徒師古曰常伯侍中也觧在谷永傳楊朱墨翟取古賢以為喻也喟然稱曰師古曰喟嘆息也音丘位反崇哉乎德雖有唐虞大夏成周之隆何以侈兹太古之覲東嶽禪梁基舍此世也其誰與哉上猶謙讓而未俞也張晏曰俞然也師古曰俞音踰方將上獵三靈之流下決醴泉之滋如淳曰三靈日月星垂象之應也師古曰流者言其和液下流發黄龍之穴窺鳳凰之巢臨麒麟之囿幸神雀之林奢雲夢侈孟諸師古曰雲夢楚藪澤名也春秋昭公三年楚靈王與鄭伯田于江南之夢孟諸宋藪澤名文公十年楚穆王欲伐宋昭公導之以田孟諸言今皆以二者為奢侈而改也非章華是靈臺師古曰言以楚靈王章華之臺為非而周文王靈臺之制為是也罕徂離宫而輟觀游師古曰罕希也徂往也輟止也土事不飾木功不彫承民乎農桑師古曰承舉也勸之以弗迨儕男女使莫違師古曰儕耦也違謂失婚姻時也儕音仕皆反恐貧窮者不徧被洋溢之饒開禁苑散公儲創道徳之囿𢎞仁惠之虞師古曰虞與娛同馳弋乎神明之囿覽觀乎羣臣之有亡放雉菟收罝罘麋鹿芻蕘與百姓共之師古曰芻所以飤牛馬蕘草薪蓋所以臻兹也於是醇洪鬯之徳豐茂世之規師古曰洪大也鬯與暢同暢通也加勞三皇勗勤五帝不亦至乎乃祗荘雍穆之徒師古曰祗荘敬也雍穆和也立君臣之節崇賢聖之業未皇苑囿之麗游獵之靡也師古曰皇暇也因回軫還衡師古曰軫輿後横木也衡轅前横木也背阿房反未央前漢書卷八十七上前漢書卷八十七上考證揚雄傳上不知伯僑周何别也顧炎武曰謂不知是何王之别子客有薦雄文似相如者宋祁曰雄文則線竹頌也按線竹頌當作綿竹頌厥髙慶而不可虖疆度臣召南按疆度昭明文選作彌度注曰彌終也又列新雉於林薄選作新荑又施靡虖延屬選作迆靡又軮軋選作坱圠瞵㻞選作璘㻞掍成選作混成棍根選作棍枇王爾選作王繭流瑕選作流霞清盧選作清矑大抵選所用多近字也臯伊之徒冠倫魁能函甘棠之惠劉攽曰能屬上句臣召南按文選以冠倫魁能為句則劉攽説是也師古誤以魁字斷句而以能字下連函甘棠之惠甚屬牽強靈屖迟兮按選作靈棲遲兮枝鵲露寒按枝鵲應作鳷鵲司馬相如傳可證也嶠髙舉而大興臣召南按嶠字文選作矯又營合圍㑹選作為㑹又建九流選作九旒又校騎萬師選作狡騎又娭澗門選作嬉澗間又沈沈容容選作沇沇溶溶又噍噍昆明選作昆鳴又承民乎農桑選作人乎農桑又勸之以弗迨選作弗怠天弧發射注張晏曰天弧虚危上二星也按注誤弧星在參星南前漢書卷八十七上考證欽定四庫全書前漢書卷八十七下漢蘭臺令史班固撰唐正議大夫行袐書少監琅邪縣開國子顔師古注揚雄傳下第五十七下明年上將大誇胡人以多禽獸秋命右扶風發民入南山西自襃斜東至𢎞農南􅇌漢中師古曰襃斜南山二谷名也漢中今梁州也斜音弋奢反宋祁曰李善云明年謂作羽獵賦之明年即漢書成紀云元延二年冬幸長楊宫從胡客大校獵是也七畧云羽獵賦永始三年十二月上然永始三年去校獵之歳首尾四載謂之明年疑班固誤也又七略云長楊賦綏和元年上綏和在校獵後四歳無容元延二年校獵綏和元年賦又疑七畧誤張羅罔罝罘捕熊羆豪豬虎豹狖玃狐莵麋鹿師古曰狖似獼猴仰鼻而長尾玃亦獼猴類也長臂善搏玃身長金色狖音弋授反玃音钁宋祁曰李善云山海經曰竹山有獸其狀如豚白毛毛大如笄而黒端以毛射物名豪彘竇萃云狀如蝟大如豚載以檻車輸長楊射熊館師古曰長楊宫名也在盩厔縣其中有射熊館宋祁曰射諸詮音食射反以罔為周阹李竒曰阹􅃒禽獸圍陳也師古曰阹音祛宋祁曰阹陳武音古業反縱禽獸其中令胡人手搏之自取其𫉬上親臨觀焉是時農民不得收歛雄從至射熊館還上長楊賦聊因筆墨之成文章故藉翰林以為主人子墨為客卿以風師古曰藉借也風讀曰諷其辭曰子墨客卿問於翰林主人曰盖聞聖主之養民也仁霑而恩洽動不為身師古曰言憂百姓也今年獵長楊先命右扶風左太華而右襃斜師古曰太華即西嶽華山㭬嶻嶭而為弋紆南山以為罝師古曰嶻嶭即所謂嵳峩山也在京師之北凡言此者示獵圍之寛廣也嶻嶭音截齧又音才葛反又音五葛反羅千乗於林莽列萬騎於山隅師古曰草乎曰莾帥軍踤阹錫戎獲胡師古曰踤足蹵之也錫戎獲胡言以禽獸賦戎狄令胡人獲取之踤音才恤反搤熊罷拕豪豬師古曰搤捉持之也豪豬一名帚豲也自為牝牡者也搤音戹陀音陀豲音桓宋祁曰拕諸詮音他木雍槍纍以為儲胥蘇林曰木擁柵其外又以竹槍纍為外儲也服䖍曰儲胥猶言有餘也師古曰儲峙也胥須也以木擁槍及纍繩連結以為儲胥言有儲畜以待所須也槍音干羊反纍音力佳反宋祁曰黄朝英云漢武作儲胥館儲胥猶言皇居也不必言有儲蓄以待時須也甘泉賦云近則洪崖旁皇儲胥弩阹皆宮館名此天下之窮覽極觀也雖然亦頗擾于農民三旬有餘其廑至矣師古曰廑古勤字而功不圖張晏曰不可圖畫以示後人師古曰此説非也圖謀也言百姓其勤勞矣而不見謀贍恤之事恐不識者外之則以為娛樂之遊内之則不以為乾豆之事師古曰乾豆三驅之一也乾豆者言為脯羞以充實豆薦宗廟豈為民乎哉且人君以𤣥默為神澹泊為德師古曰澹泊安静也澹音徒濫反泊音歩各反又音魄今樂遠出以露威靈師古曰露謂顯暴不深固數揺動以罷車甲師古曰罷讀曰疲本非人主之急務也蒙竊或焉師古曰蒙自謂蒙蔽也翰林主人曰吁謂之兹邪師古曰吁疑怪之辭也謂兹邪猶云何為如此也吁音于若客所謂知其一未睹其二見其外不識其内者也僕嘗倦談不能一二其詳師古曰詳悉也請略舉凡而客自覽其切焉師古曰凡大指也切要也客曰唯唯主人曰昔有彊秦封豕其士窫窳其民鑿齒之徒相與摩牙而争之應劭曰淮南子云堯時窫窳封豨鑿齒皆為民害窫窳類貙虎爪食人服䖍曰鑿齒齒長五尺似鑿亦食人李竒曰以喻秦貪婪殘食其民也師古曰封大也窫音於黠反窳音愈豪俊麋沸雲擾羣黎為之不康師古曰黎衆康安也於是上帝眷顧高祖髙祖奉命順斗極運天關横鉅海票昆侖師古曰票猶言揺動也音匹昭反宋祁曰票諸詮音匹妙反提劒而叱之所麾城搟邑下將降旗李竒曰搟音車幰之幰師古曰搟舉手擬之也宋祁曰韋昭曰并也音芟蕭該案李善云鄭𤣥注禮記曰搟之言芟也字林曰搟山檻反呂向云蒼頡篇曰摲指取也一日之戰不可殫記師古曰殫盡也不可盡記言其多也當此之勤頭蓬不暇疏師古曰蓬謂髪亂如蓬也宋祁曰疏與梳疑古通用飢不及餐鞮鍪生蟣蝨介胄被霑汗師古曰鞮鍪即兠鍪也鞮音丁奚反鍪音牟蟣音居豈反宋祁曰李善云韓子曰攻戰無已甲胄生蟣蝨汗文選協韻音寒以為萬姓請命虖皇天迺展民之所詘振民之所乏師古曰展申也振起也宋祁曰諸詮曰詘古屈字規億載恢帝業七年之間而天下密如也師古曰密静也宋祁曰李善云髙祖五年誅羽自六年至十二年崩凡七載逮至聖文隨風乗流方垂意於至寧躬服節儉綈衣不敝革鞜不穿師古曰言不穿敝而已無取紛華也鞜革履音踏宋祁曰注文言字下當有茍字履字下當有也字大夏不居木器無文師古曰大夏夏屋也於是後宮賤瑇􅈘而疎珠璣卻翡翠之飾除彫瑑之巧師古曰瑑刻鏤也瑑音篆惡麗靡而不近斥芬芳而不御師古曰斥却也抑止絲竹晏衍之樂憎聞鄭衞幼眇之聲師古曰衍音弋戰反幼音一笑反眇音妙是以玉衡正而太階平也師古曰玉衡天儀也太階解在東方朔傳其後熏鬻作虐東夷横畔師古曰鬻音弋六反横音胡孟反羌戎睚眦閩越相亂師古曰睚眦瞋目貌睚音五懈反眦音仕懈反睚字或作矔矔者怒其目眥也音工喚反宋祁曰蕭該案晉灼音義睚作矔蘇林音貫習之貫晉灼曰揚雄方言瞋目曰矔該案方言曰矔瞋目也梁益之間瞋目曰矔音光旦反遐萌為之不安中國蒙被其難師古曰遐逺也於是聖武勃怒爰整其旅廼命驃衞師古曰驃驃騎霍去病衞衞靑也宋祁曰驃越本及諸本並作票汾沄沸渭雲合電發師古曰汾沄沸渭奮擊皃汾音紛沄音雲猋騰波流機駭蠭軼師古曰猋疾風也騰舉也蠭與鋒同軼過也如機之駭如蠭之過言其疾也軼與逸同疾如奔星擊如震霆師古曰霆雷之急者霆音廷砰轒輼破穹廬應劭曰轒輼匈奴車也師古曰穹廬氈帳也轒音扶云反輼音於云反宋祁曰砰字當作碎字腦沙幕䯝余吾師古曰腦塗沙幕地䯝入余吾水言其大破死亡䯝古髓字遂獵乎王廷孟康曰匈奴王廷也宋祁曰姚本無乎字􅇌橐它燒􅪈蠡張晏曰􅪈蠡乾酪也以為酪母燒之壞其飬生之具也師古曰􅪈音覔蠡音黎又音來戈反分梨單于磔裂屬國師古曰梨與剺同謂剥析也剺音力私反夷阬谷㧞鹵莽刋山石師古曰鹵莽淺草之地也阬音口衡反莽音莫戸反蹂屍輿厮係累老弱師古曰言已死則蹂踐其屍破傷者則輿之而行也厮破折也音斯累音力追反劉奉世曰輿輿隸厮厮卒也兗鋋瘢耆金鏃滛夷者數十萬人如淳曰兗括也孟康曰瘢耆馬脊創瘢處也蘇林曰以耆字為著字著音憤之著鏃著其頭也師古曰鋋鐵矜小矛也􅁋夷過傷也據如孟氏之説則箭括及鋋所中皆有創瘢於耆而被金鏃過傷者復衆也如蘇氏以耆字為著字依其所釋則括及鋋所傷皆有瘢又著金鏃於頭上而過傷者亦多矣用字既别分句不同據今書夲多作耆字冝從孟説鋋音蟬又音延著音竹略反矜音巨巾反臣佖曰按字書無兖字今俗以為兖州字本作沇此兖鋋合作鈗鋋許慎説文鈗字注曰侍臣所執兵從金允聲周書曰一人冕執鈗讀若允與鋋字相次又案今文尚書云一人冕執鋭孔安國傳云鋭矛屬也疑孔安國之時舊是鈗字後傳寫作鋭耳説文鋭芒也亦與矛不類矣漢書相承疑誤書為兖字如淳注釋乃云兖括也顔師古又依孟康所説為箭括即愈無所據且箭括非刃豈與鋋小矛同可以傷夷人乎此兖字故合作鈗宋祁曰南本亦云憤之著予以意求之當云耆音著幘之著此最為允憤作幘添一著字皆稽顙樹頷扶服蛾伏如淳曰叩頭時項下向則頷樹上向也師古曰樹豎也頷音胡感反服音蒲北反蛾與蟻同蛾伏者言其伏如蟲蟻也宋祁曰蕭該音義案韋昭曰稽顙樹頷當依古本作犁顙樹頷犁顙顙􅠁也樹頷頷觸土也今作稽顙傳冩誤耳服諸詮音扶北反二十餘年矣尚不敢惕息師古曰惕息懼而小息也息出入氣也夫天兵四臨幽都先加師古曰幽都北方謂匈奴回戈邪指南越相夷師古曰夷傷也一曰平殄也靡節西征羌僰東馳是以遐方疏俗殊鄰絶黨之域師古曰疏亦逺也鄰邑也自上仁所不化茂德所不綏莫不蹻足抗手請獻厥珍師古曰蹻舉也音矯使海内澹然師古曰澹安也音徒濫反永亡邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡師古曰靡合韻音武義反英華沈浮洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之師古曰樵夫采樵之人故意者以為事罔􅂭而不殺物靡盛而不􅉛師古曰罔靡皆無也殺衰也音所例反故平不肆險安不忘危服䖍曰肆棄也師古曰肆放也不放心於險而常思念也宋祁曰李善云孫卿子曰平則慮險安則慮危廼時以有年出兵整輿竦戎師古曰有年有豐年也因豐年而時出兵也竦勸也宋祁曰注文有豐年有字當刪振師五莋習馬長楊師古曰振亦整也莋與柞同宋祁曰莋文選音作簡力狡獸校武票禽師古曰校計量也票禽輕疾之禽也票音頻妙反又音匹妙反宋祁曰簡李善曰爾雅曰簡擇也賈逵國語注曰簡習也驃越本别本並作票廼萃然登南山瞰烏弋晉灼曰萃集也服䖍曰三十}
