  - {type: variant, offset: 3641, length: 1, content: 酒, WYG: 賦勸而不止明矣師古曰繇讀與由同又頗似俳優淳于髠優孟之徒師古曰髠孟皆滑稽宋祁曰注末當有者字非法度所存賢人君子詩賦之正也於是輟不復為師古曰輟止也而大潭思渾天師古曰潭深也渾天天象也渾音胡昆反參摹而四分之蘇林曰三析而四分天之宿度甲乙也劉敞曰參摹者𤣥首一二三也四分者𤣥首四重也宋祁曰參摹蘇林音模字林曰摹廣求也七具反注文三析下當更有析字極於八十一旁則三摹九据晉灼曰据今據字也據猶位也處也極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀𤣥者數其畫而定之𤣥首四重者非卦也數也其用自天元推一晝一夜隂陽數度律歴之紀九九大運與天終始故𤣥三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與泰初歴相應亦有顓頊之歴焉􅨸之以三䇿蘇林曰三三而分之師古曰􅨸音食列反開之以休咎絣之以象類晉灼曰絣雜也師古曰絣併也音幷宋祁曰開越夲作關絣説文方并反字林布莖反縷布也播之以人事師古曰播布也文之以五行擬之以道德仁義禮知無主無名劉敞曰當作無名今越本學官本作知名要合五經茍非其事文不虗生為其泰曼漶而不可知張晏曰曼音滿漶音緩師古曰曼漶不分别皃猶言濛鴻也曼音莫幹反漶音奐故有首衝錯測攡瑩數文掜圖告十一篇晉灼曰攡音離服䖍曰掜音睨師古曰攡音摛蕭該音義曰𤣥衝云八十一家相對若輻輪之衝也今漢書或誤作衡者非也攡今漢書及韋昭晉灼音義並作攡字今字書無手傍離字今人讀漢書相承以攡字音力支反案劉向别録揚雄經目有𤣥首𤣥衝𤣥錯𤣥測𤣥舒不作攡字然字林云攡舒也攡音刃支反太𤣥經曰𤣥者幽攡萬物而不見其形宋忠曰攡者張也與晉灼同掜服䖍音兒晉灼曰掜擬也字林五弟反莊子曰終日握之而手不掜司馬彪曰但抱而握之手不捉也太𤣥經曰别一以掜於左手之小指又今人不見太𤣥經及别録以𤣥衝𤣥攡下有𤣥營𤣥數𤣥文𤣥掜𤣥圖𤣥告𤣥問合十二篇今漢書祗有首衝錯測攡營數文掜圖告十一篇皆以觧剥𤣥問一篇故云十一該取未詳是故述之龔疇曰太𤣥自漢宋衷作觧詁吳陸績作釋文范望作贊以至唐及國朝為之注觧及音義之類者非一家皆止有十一篇不知該所謂别録者果}
