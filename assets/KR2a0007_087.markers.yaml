  - {type: variant, offset: 48, length: 0, content: '', krp: 薦雄文似相如者上方郊祠甘泉泰畤汾陰后土以求繼嗣召雄待詔承明之庭師古曰承眀殿在未央宫宋祁曰劉良曰客則楊荘也雄文則線竹頌也李善曰雄荅劉歆書曰雄作成都城四隅銘蜀人有楊荘者為郎誦之於成帝以為似相如雄遂以此得見正月從上甘泉還奏甘泉賦以風師古曰風讀曰諷其辭曰惟漢十世将郊上𤣥定泰畤雍神休尊明號晉灼曰雍祐也休美也言見祐䕶以休美之祥也師古曰雍聚也明號謂總三皇五帝之號而稱皇帝也雍讀曰擁同符三皇錄功五帝䘏𦙍錫羨拓迹開綂應劭曰䘏憂也𦙍續也錫與也羡饒也拓廣也時成帝憂無繼嗣故修祠泰畤后土言神明饒與福祥廣迹而開綂也師古曰羡音弋戰反拓音託於是廼命羣僚歴吉日協靈辰師古曰歴選吉日而合善辰也星陳而天行師古曰如星之陳象天之行也詔招揺與泰陰兮伏鉤陳使當兵張晏曰禮記云招揺在上急繕其怒太隂嵗後三辰也服䖍曰鉤陳紫官外營陳星屬堪輿以壁壘兮梢䕫魖而抶獝狂張晏曰堪輿天地總名也孟康曰堪輿神名造圖宅書者木石之怪曰䕫䕫神如龍有角人靣魖耗鬼也獝狂亦惡鬼也今皆梢而去之師古曰堪輿張説是也屬委也以壁壘委之梢擊也扶笞也梢音山交反魖音虚屬音之欲反抶音丑乙反獝音揆聿反宋祁曰韋昭曰魖音昌慮反一作熙慮反蕭該音義曰獝狂無頭鬼也見字林李善曰許慎云堪天}
