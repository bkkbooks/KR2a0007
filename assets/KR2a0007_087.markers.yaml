  - {type: variant, offset: 359, length: 1, content: 視, WYG: 當有所字掉犇星之流旃彏天狼之威弧晉灼曰有狼弧之星也師古曰彏急張也音钁張燿日之𤣥旄揚左纛被雲梢張晏曰雲梢梢雲也師古曰梢與旓同旓者旌旗之旒以雲為旓也被音皮義反奮電鞭驂雷輜師古曰輜衣車也淮南子云電以為鞭䇿雷以為車輪故雄用此言也鳴洪鍾建五旗師古曰洪大也尚書大傅云天子左右五鍾天子將出則撞黄鍾之鍾左五鍾皆應入則撞蕤賔之鍾右五鍾皆應漢書舊儀云皇帝車駕建五旗盖謂五色之旗也以木牛承其下取其負重致逺宋祁曰注文漢書舊儀當刪書字羲和司日顔倫奉輿師古曰倫古善御者也羲和日御名風發飇拂神騰鬼趡師古曰飇回風也趡走也飇音必遥反趡音子笑反又音才笑反宋祁曰趡一本作􅀢蕭該音義曰今漢書鬼趡或作􅀢字韋昭慈昭反云趡超也字林音才召反千乗霆亂萬騎屈橋師古曰霆亂言如雷霆之盛而亂動也屈橋壮捷貌屈音其勿反橋音其召反蕭該音義曰橋音嶺嶠之嶠嘻嘻旭旭天地稠㟼服䖍曰稠㟼動揺貌師古曰嘻嘻旭旭自得之貌嘻音許其反稠音徒弔反㟼音五到反簸丘跳巒涌渭躍涇師古曰山小而鋭曰巒言車騎之威訇隐之盛至於涌躍涇渭跳簸丘山者也秦神下讋跖䰟負沴蘇林曰秦文公時庭中有怪化為牛走到南山梓樹中伐梓樹後化入豐水文公惡之故作其象以厭焉今之茸頭是也故曰秦神服䖍曰沴河岸之坻也晉灼曰沴渚也師古曰跖蹈也言此神怖讋下入水中自蹈其䰟而負沴渚盖戚懼之甚也跖音之亦反坻音直尸反宋祁曰注文茸字上當有旄字河靈矍踢不華蹈襄蘇林曰河靈巨靈也華華山也襄襄山也掌據之足蹈之也踢音試即反服䖍曰踢音石㚟反師古曰矍踢驚動之貌矍音钁踢二音並通不古掌字凡言此者以車騎之衆羽旄之盛故秦神河靈莫不恐懼而自放也宋祁曰江鄰幾云趙師民指中條山曰此所謂襄山揚雄賦不華蹈襄檢余靖初校漢書監本作襄馳介問之云据郊祀志襄字誤矣郊祀志云自華以西名山七華山薄山薄山者襄山也史記封禪書却作襄山徐廣云蒲坂縣有襄山則知二字紛錯乆矣又襄一本作㠤蕭該音義曰該案説文字林並無㠤字未詳其音請俟來哲李善注西京賦引河東賦云河靈矍踢掌華蹈襄遂臻陰宫穆穆肅肅蹲蹲如也師古曰隂宫汾隂之宫也穆穆靜也肅肅敬也蹲蹲行有節也蹲音千旬反靈祗既鄉五位時叙師古曰鄉讀曰嚮服䖍曰五位五方之神也絪緼𤣥黄將紹厥後師古曰絪緼天地含氣也𤣥黄天地色也易下繫辭曰天地絪縕萬物化淳坤文言曰𤣥黄者天地之雜色也天𤣥而地黄將大也言天地之氣大興發於祭祀之後絪音因緼於云反宋祁曰注文含氣當作合氣於是靈輿安歩周流容與師古曰靈輿天子之輿也容暇而安豫也與讀曰豫以覽虖介山嗟文公而愍推兮勤大禹於龍門師古曰龍門山禹鑿}
