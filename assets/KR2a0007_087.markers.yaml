  - {type: variant, offset: 200, length: 1, content: 取, WYG: 下句釋上句其曰据軨軒而周流兮忽軮軋而亡垠然後言玉樹金人者盖謂依欄檻而四顧見其廣大而無際畔但見庭中玉樹之青葱金人之巖巖耳玉樹植於殿庭金人捧露盤亦在殿庭皆言望見殿庭中物不應反言殿壁也案甘泉賦漢書文選字不同者甚多它皆可以假意而讀惟壁璧二字不可假意通思而注釋者又皆不同不可不辨也又劉禹錫嘉話云雲陽縣界多漢離宫故地有槐而葉細土人謂之玉樹揚子雲甘泉賦玉樹青葱左思以為假稱珍怪盖不詳也金人仡仡其承鍾虡兮嵌巖巖其龍鱗師古曰仡仡勇健状嵌開張貌言其鱗甲開張若真龍之形也仡音魚乙反又音其乞反嵌音火敢反宋祁曰蕭該音義改嵌從山諸詮賦音苦銜反揚光曜之燎燭兮乗景炎之炘炘師古曰炘炘光盛貌也炎音弋贍反炘音欣宋祁曰越本炘作忻配帝居之縣圃兮象泰壹之威神服䖍曰曽城縣圃閬風昆侖之山三}
