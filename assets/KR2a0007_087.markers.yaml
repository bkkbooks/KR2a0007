  - {type: variant, offset: 683, length: 0, content: '', WYG: 稷契人人自以為咎繇戴縰垂纓而談者皆擬於阿衡師古曰縰韜髪者也音山爾反五尺童子羞比晏嬰與夷吾師古曰夷吾管仲也羞比之以其不為王者之佐當塗者入靑雲失路者委溝渠旦握權則為卿相夕失埶則為匹夫譬若江湖之雀勃觧之鳥乗鴈集不為之多䨇鳧飛不為之少應劭曰乗鴈四鴈也師古曰雀字或作厓鳥字或作島島海中山也其義両通乗音食證反宋祁曰一本勃觧旁有水字蕭該音義曰案字林渤澥海别名也字旁宜安水昔三仁去而殷虛師古曰論語稱微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉虗空也一曰虗讀曰墟言其亡國為丘墟二老歸而周熾應劭曰二老伯夷太公也子胥死而吳亡種蠡存而粤伯師古曰伯讀曰霸五羖入而秦喜樂毅出而燕懼師古曰五羖謂百里奚也買以羖羊之皮五故稱五羖也范睢以折摺而危穰侯晉灼曰摺古拉字也蔡澤雖噤吟而笑唐舉師古曰噤吟顉頤之貌澤從唐舉相謂之曰聖人不相殆先生乎澤曰吾自知富貴噤音鉅錦反吟音魚錦反舉合韻音居御反故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患師古曰章句小儒也患合韻音胡關反故世亂則聖哲馳騖而不足世治則庸夫髙枕而有餘夫上世之士或觧縛而相孟康曰管仲也或釋褐而傅孟康曰寗戚也宋祁曰李善云墨子曰傅説被褐𢃄索庸築傅巖武丁得之舉以為三公或倚夷門而笑應劭曰侯嬴也為夷門卒秦伐趙趙求救無忌將十餘人往辭嬴嬴無所戒更還嬴笑之以謀告無忌也或横江潭而漁服䖍曰漁父也師古曰江潭而漁潭音尋漁合韻音牛助反宋祁曰注文江潭而漁四字當刪舊服䖍字作師古今改乂劉淵林注左思魏都賦曰潭淵也屈平卜居曰横江潭而漁龔子曰觀淵林之所引則知子雲之言實本於原也然今卜居無此語豈今楚辭非古全本也楚人名深曰潭淵林亦以潭為淵即當音徒南反若從師古音尋則是水之旁深者耳恐非是或七十説而不遇應劭曰孔丘也或立談間而封侯服䖍曰薛公也宋祁曰李善云史記曰虞卿説趙孝成王再見為趙上卿故號為虞卿譙周曰食邑於虞也或枉千乗於陋巷應劭曰齊有小臣稷桓公一日三至而不得見從者曰可以止矣桓公曰士之傲爵禄者固輕其主主傲霸王者亦輕其士縱彼傲爵禄者吾庸敢傲霸王乎遂見之宋祁曰注文縱彼傲爵禄者者字當刪或擁帚彗而先驅應劭曰鄒衍之燕昭王郊迎擁彗為之先驅也師古曰彗亦以掃者也音似歳反是以士頗得信其舌而奮其筆師古曰信讀曰申窒隙蹈瑕而無所詘也李竒曰君臣上下有釁罅瑕隙乖離之漸則可抵而取也師古曰窒窒塞也罅音呼駕反當今縣令不請士郡守不迎師羣卿不揖客將相不俛眉師古曰自髙抗也俛低也言竒者見疑}
