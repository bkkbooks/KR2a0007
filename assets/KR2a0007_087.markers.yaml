  - {type: variant, offset: 15, length: 0, content: '', krp: 也有罪自投江其神為大波陵乗也言屈原襲陽侯之罪而欲折中求舜未必獨見然許之也宋祁曰注文陽侯之罪罪當作非精瓊靡與秋菊兮将以延夫天年臨汨羅而自隕兮恐日薄於西山應劭曰精細靡屑也瓊玉之華也晉灼曰離騷云精瓊靡以為糧兮予夕餐秋菊之落英又曰老冉冉其将至日忽忽其将暮師古曰此又譏屈原云瓊靡秋菊将以延年崦嵫忽迫喜於未暮何乃自投汨羅言行相反韋昭曰汨音羃蕭該音義曰如淳音河水浼浼之浼案詩浼音莫罪反楚詞曰精瓊靡以為糧讀楚詞者依字不借音也宋祁曰兮字下疑有何字解扶桑之總轡兮縱令之遂奔馳應劭曰總結也扶桑日所拂木也晉灼曰離騷云總余轡於扶桑聊消揺以相羊屈原言結我車轡於扶桑以留日之入人年得不老日以喻君而反離朝自沈觧轡縱君使遂奔馳也鸞凰騰而不屬兮豈獨飛亷與雲師應劭曰楚辭云鸞凰為余先戒兮後飛亷使奔屬雲師告余以未具飛亷風伯也雲師豐隆也鸞凰俊鳥也晉灼曰縱其轡使之奔馳鸞凰迅飛亦無所及非獨飛亷雲師言荘嚴未具使君不適道也卷薜芷與若惠兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之師古曰離騷云貫薜荔之落蘂雜杜衡與芳芷又樹蕙之百畝雜申椒與菌桂皆以自喻徳行芬芳也今何為自投江湘而喪此芳乎棍大束也漚漬也今漚麻也棍音下本反漚音一搆反又音一侯反韋昭曰薜芷若惠四者皆是草也宋祁曰棍疑作混費椒稰以要神兮又勤索彼瓊茅孟康曰椒稰以椒香米饌也離騷云懐椒稰而要之晉灼曰離騷云索瓊茅以筳篿師古曰索求也瓊茅靈草也筳篿折竹所用卜也稰音所又音思呂反筳音廷篿音專蕭該音義曰糈從米按王逸曰精米也違靈氛而不從兮反湛身於江臯晉灼曰靈氛古之善占者離騷曰欲從靈氛之吉占兮心猶豫而狐疑師古曰既不從靈氛之占何為費椒稰而勤瓊茅也湛讀曰沈江臯江水邉之游地也宋祁曰浙本從作定纍既乑夫傅說兮奚不信而遂行晉灼曰乑慕也離騷云説操築於傅巖兮武丁用之而不疑師古曰乑古攀字既攀援傅説何不信其所行自見困而遂去宋祁曰姚本乑作􅦁徒恐鷤䳏之將鳴兮顧先百草為不芳師古曰離騷云鷤䳏之先鳴兮使夫百草為不芳雄言終以自沈何惜芳草而憂鷤䳏也䳏鴂字也鷤鴂鳥一名買䤥一名子規一名杜鵑常以}
  - {type: variant, offset: 16, length: 1, content: 家, WYG: 夏鳴鳴則衆芳皆歇鷤音大系反䳏音桂鷤字或作鶗亦音題鴂又音決䤥音詭韋昭曰鷤䳏趣農鳥也初纍棄彼虙妃兮更思瑶臺之逸女師古曰離騷云吾命豐隆乗雲兮求虙妃之所在又曰望瑶臺之偃蹇兮見有娀之佚女此又譏其執心不定也虙妃古神女有娀女即簡狄也虙讀曰伏抨雄鴆以作媒兮何百離而曾不壹耦師古曰離騷云吾令鴆為媒兮鴆告余以不好雄鳩之鳴逝兮余猶惡其佻巧故云百離不一耦也抨使也耦合也抨音普耕反宋祁曰鳩江南本作鳩監本作鴆今從監本作鴆乗雲蜺之旖旎兮望昆侖以樛流覽四荒而顧懷兮奚必云女彼髙丘蘇林曰離騷云登閬風而緤馬忽反顧以流涕哀高丘之無女女以喻士高丘謂楚也師古曰離騷又云揚雲蜺之晻藹閬風在昆侖山上故云望昆侖也旖旎雲貌也樛流猶周流也女仕也何必要仕於楚也旖音於綺反旎音女綺反樛音居蚪反女音尼據反蕭該音義曰憀應作手旁翏今作心旁翏者亦是古字通用宋祁曰景祐本作旖旎越本旎作柅既亡鸞車之幽藹兮駕八龍之委蛇晉灼曰離騷云駕八龍之蜿蜿兮載雲旗之委蛇師古曰言既無鸞車則不得云駕八龍也幽藹猶晻藹也蛇音移宋祁曰古本駕字上有焉字淳化本無刋誤据史館本添臨江瀕而掩涕兮何有九招與九歌晉灼曰離騷云擥茹蕙以掩涕又曰奏九歌以舞韶師古曰此又譏其哀樂不相副也招讀曰韶夫聖哲之遭兮固時命之所有雖增欷以於邑兮吾恐靈修之不纍改師古曰離騷云増歔欷余鬰邑兮哀朕時之不當増重也雄言}
