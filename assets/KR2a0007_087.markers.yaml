  - {type: variant, offset: 2712, length: 777, content: 賜遂璽書曰制詔太原太守官尊祿厚可以償博進矣妻君寧時在旁知狀遂於是辭謝因曰事在元平元年赦令前其見厚如此元帝時徵遂為京兆尹至廷尉遵少孤與張竦伯松俱為京兆史竦博學通達以廉儉自守而遵放縱不拘操行雖異然相親友哀帝之末俱著名字為後進冠並入公府公府掾史率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹以故事適之侍曹輒詣寺舍白遵曰陳卿今日以某事適遵曰滿百乃相聞故事有百適者斥滿百西曹白請斥大司徒馬宮大儒優士又重遵謂西曹此人大度士奈何以小文責之乃舉遵能治三輔劇縣補郁夷令久之與扶風相失自免去槐里大賊趙朋霍鴻等起遵為校尉擊朋鴻有功封嘉威侯居長安中列侯近臣貴戚皆貴重之牧守當之官及邵國豪桀至京師者莫不相因到遵門遵耆酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去嘗有部刺史奏事過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白當對尚書有期會狀母乃令從後閤出去遵大率常醉然事亦不廢長八尺餘長頭大鼻容貌甚偉略涉傳記贍於文辭性善書與人尺牘主皆藏去以為榮請求不敢逆所到衣冠懷之唯恐在後時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐云王莽素奇遵材在位多稱譽者繇是起為河南太守既至官當遣從史西召善書吏十人於前治私書謝京師故人遵馮几口占書吏且省官事書數百封親疏各有意河南大驚數月免初遵為河南太守而弟級為荊州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂後司直陳崇聞之劾奏遵兄弟幸得蒙恩超等歷位遵爵列侯備郡守級州牧奉使皆以舉直察枉宣揚聖化為職不正身自慎始遵初除乘藩車入閭巷過寡婦左阿君置酒歌謳遵起舞跳梁頓仆坐上暮因留宿為侍婢扶臥遵知飲酒飫宴有節禮不入寡婦之門而湛酒溷肴亂男女之別輕辱爵位羞汙印韍惡不可忍聞臣請皆免遵既免歸長安賓客愈盛飲食自若久之復為九江及河內都尉凡三為二千石而張竦亦至丹陽太守封淑德侯後俱免官以列侯歸長安竦居貧無賓客時時好事者, WYG: ''}
