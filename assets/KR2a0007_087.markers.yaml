  - {type: variant, offset: 3643, length: 1, content: 過, WYG: 書也衝亦不聞作衡當更問知者皆以觧剥𤣥體離散其文章句尚不存焉師古曰𤣥中之文雖有章句其㫖深妙尚不能盡存故觧剥而離散也宋祁曰注文也字當作之劉敞曰言此十一篇財以離散𤣥文未有章句也𤣥文多故不著觀之者難知學之者難成客有難𤣥大深衆人之不好也雄觧之號曰觧難其辭曰客難揚子曰凡著書者為衆人之所好也美味期}
