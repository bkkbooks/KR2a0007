  - {type: variant, offset: 3677, length: 0, content: '', WYG: 天降生民倥侗顓蒙鄭氏曰童蒙無所知也師古曰倥音空侗音同顓與專同蕭該音義曰案字林及埤蒼倥音曰㺯反侗音勑動反恣于情性聰明不開訓諸理師古曰訓告也譔學行第一宋祁曰司馬溫公云行讀如字降周迄孔成于王道師古曰周周公旦也迄至也孔孔子也言}
