  - {type: variant, offset: 5, length: 0, content: '', krp: 卿爭權韓魏趙興而范中行知伯弊當是時偪揚侯晉灼曰漢名臣奏載張衡説云晉大夫食采於楊為揚氏食我有罪而揚氏滅無揚侯有楊侯則非六卿所偪也師古曰晉説是也雄之自序譜諜盖為疎謬范中行不與知伯同時滅何得言當是時偪揚侯乎偪古逼字宋祁曰注文食字上疑有揚字揚侯逃於楚巫山因家焉師古曰巫山今在荆州西南也楚漢之興也揚氏遡江上處巴江州李竒曰江州縣名也巴郡所治也師古曰遡謂逆流而上也音素而揚季官至廬江太守漢元鼎間避仇復遡江上處㟭山之陽曰郫師古曰㟭山江水所出也山南曰陽郫縣名也㟭音旻郫音疲有田一㙻有宅一區晉灼曰周禮上地夫一㙻一百畝也宋祁曰㙻當作㕓世世以農桑為業自季至雄五世而傳一子故雄亡它揚於蜀師古曰蜀諸姓揚者皆非雄族故言雄無它揚雄少而好學不為章句訓詁通而已師古曰詁謂指義也博覽無所不見為人簡易佚蕩張晏曰佚音鐵蕩音讜晉灼曰佚蕩緩也宋祁校本云蕭該蕩亦作偒韋佚為替偒為黨晉音鐵儻口吃不能劇談鄭氏曰劇甚也晉灼曰或作遽遽疾也口吃不能疾言師古曰劇亦疾也無煩作遽也宋祁校本云浙本無吃字黙而好深湛之思師古曰湛讀曰沈清靜亡為少耆欲師古曰耆讀曰嗜不汲汲於富貴不戚戚於貧賤師古曰汲汲欲速之義如井汲之為也宋祁曰注文也字當作耳不修亷隅以徼名當世師古曰徼要也音工堯反徼字或作激激𤼵也音工歴反家産不過}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 金乏無儋石之儲晏如也師古曰儋石觧在蒯通傳韋昭曰儋音若擔戴也説文曰丁甘反宋祁曰乏字上疑有至字自有大度非聖哲之書不好也非其意雖富貴不事也顧嘗好辭賦師古曰顧反也先是時宋祁校本云南本無時字蜀有司馬相如作賦甚𢎞麗温雅雄心壯之每作賦常擬之以為式師古曰擬謂比象也又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以為君子得時則大行不得時則龍蛇應劭曰易曰龍蛇之蟄以存身也師古曰大行安歩徐行遇不遇命也何必湛身哉師古曰湛讀曰沈謂投水而死廼作書往往摭離騷文而反之師古曰摭拾取也音之亦反自㟭山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷師古曰旁依也音歩浪反其下類此重音直用反又旁惜誦以下至懷沙一卷名曰畔牢愁李竒曰畔離也牢聊也與君相離愁而無聊也師古曰惜誦懐沙皆屈原所作九章中之名也宋祁曰蕭該按牢字旁著水晉直作牢韋昭曰浶騷也鄭氏愁音曹畔牢愁廣騷文多不載獨載反離騷宋祁曰獨字疑可删其辭曰有周氏之蟬嫣兮或鼻祖於汾隅應劭曰蟬嫣連也言與周氏親連也劉徳曰鼻始也師古曰雄自言系出周氏而食采於揚故云始祖於汾隅也嫣音於連反宋祁曰注文姚本作鼻有始也靈宗初諜伯僑兮流于末之揚侯應劭曰諜譜也言從伯僑以來可得而叙也淑周楚之豐烈兮超既離虖皇波應劭曰淑善也言去汾隅從巫山得周楚之美烈也超速也晉灼曰離歴也皇大也師古曰言其先祖所居經河及江也河江四瀆之水故云大波也虖古乎字其下並同因江潭而􅐹記兮欽弔楚之湘纍蘇林曰潭水邉也鄧展曰􅐹往也李竒曰諸不以罪死曰纍荀息仇牧皆是也屈原赴湘死故曰湘纍也師古曰記書記也謂弔文也言因江水之邉而投書記以往弔也欽敬也潭音尋􅐹音于放反纍音力追反宋祁曰蕭該􅐹作音誑韋音同潭音淫該案晉灼纍作累此言累世承楚之族案字林纍文索也注文皆是也也字姚本刪惟天軌之不辟兮何純絜而離紛師古曰天軌猶言天路辟開也離遭也紛難也言天路不開故使純善貞絜之人遭此難也易曰天地閉賢人隐辟讀曰闢宋祁曰注文天路下疑有也字紛纍以其淟涊兮暗纍以其繽紛應劭曰淟涊穢濁也師古曰繽紛交雜也淟音吐典反涊音乃典反繽音匹人反宋祁曰淟涊晉灼云俗謂水漿不寒而温為淟涊字林曰淟涊垢濁也淟蕭該音他本反漢十世之陽朔兮招揺紀于周正晉灼曰十世數高祖呂后至成帝也成帝八年廼稱陽朔應劭曰招揺斗杓星也主天時周正十一月也蘇林曰言已以此時弔屈原也正皇天之清則兮度后土之方貞應劭曰平正司法者莫過於天飬物均調者莫過於地也父伯庸名我為平以法天字我為原以法地也晉灼曰此雄取離騷辭反之應説是也師古曰應晉}
