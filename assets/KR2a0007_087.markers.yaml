  - {type: 'tls:seg', offset: 49, content: '', id: KR2a0007_tls_087-1a.9}
  - {type: variant, offset: 49, length: 1, content: 政, WYG: 也輿地道也八神奔而警蹕兮振殷轔而軍裝師古曰自招揺至獝狂凡八神也殷轔盛貌也軍装為軍戎之飾装也轔音來忍反宋祁曰殷音隐劉攽曰此八神齊之八神也劉奉世曰擊而出之固非八神也盖自有八神耳􅃖尤之倫帶干將而秉玉戚兮飛蒙茸而走陸梁張晏曰玉戚以玉為戚柲也晉灼曰飛者䝉茸而亂走者陸梁而跳也師古曰茸音人䝉反柲柄也音秘齊總總撙撙其相膠葛兮猋駭雲訊奮以方攘晉灼曰方攘半散也師古曰總總撙撙聚貌也膠葛猶言膠加也訊亦奮訊也撙音子本反宋祁曰韋昭曰方攘周禮方相氏蕭該音義依韋昭音相别本顔注子本反下更有訊音信攘音人羊反八字駢羅列布鱗以雜沓兮柴虒參差魚頡而鳥䀪師古曰柴虒參差}
