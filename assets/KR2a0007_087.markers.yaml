  - {type: variant, offset: 387, length: 1, content: 辠, WYG: 阸薜嶠高舉而大興師古曰薜亦僻字也嶠舉歩貌也音去昭反蕭該音義曰陿音洽阸諸詮音烏隔反一音於賣反薜音辟韋昭曰薜平狄反嶠音矯歴五帝之寥廓渉三皇之登閎師古曰寥廓空曠也登閎高逺也寥音聊蕭該音義曰登閎韋昭曰髙大也諸詮登張萌反建道德以為師友仁義與為朋於是𤣥冬季月天地􅂭烈師古曰北方色黒故曰𤣥冬􅂭烈者陰氣盛萬物權輿於内徂落於外師古曰權輿始也徂落死也言草木萌牙始生於内而枝葉凋毁死傷於外也帝將惟田于靈之囿師古曰靈囿有靈徳之苑囿也詩大雅靈臺之篇曰王在靈囿開北垠受不周之制孟康曰西北為不周風謂冬時也師古曰垠厓也音銀以終始顓頊𤣥㝠之綂應劭曰顓頊𤣥㝠皆北方之神主殺戮也宋祁曰姚本注文無之字廼詔虞人典澤東延昆鄰西馳闛闔張晏曰東至昆明之邊也師古曰昆明池邊也闛闔門名也闛讀與閶同也又音吐郎反儲積共偫戍卒夾道師古曰共讀曰供偫音丈紀反斬叢棘夷野草師古曰夷平也禦自汧渭經營酆鎬應劭曰禦禁也師古曰將獵其中故止禁不得人行及獸出也汧渭以東酆鎬以西皆為獵圍也章皇周流出入日月天與地杳師古曰章皇周流言匝徧也謂苑囿之大遥望日月皆從中出入而天地之際杳然縣逺也説者反以杳為㳫觧云重㳫非惟􅆾理蓋已失韻宋祁曰杳然舊作者刊誤改者作杳景本無然字爾廼虎路三嵏以為司馬圍經百里而為殿門晉灼曰路音洛服䖍曰以竹虎落此山也應劭曰外門為司馬門殿門在内也師古曰落纍也以繩周繞之也三嵏三峯聚之山也嵏音子公反蕭該音義曰該案晁錯傳中周虎落韋昭曰於城中為藩落如落虎矣謂之虎落外則正南極海邪界虞淵應劭曰虞淵日所入鴻濛沆茫碣以崇山師古曰鴻濛沆茫廣大貌碣山特立貌鴻音胡孔反濛音莫孔反沆音胡浪反茫音莽碣音竭營合圍會然后先置虖白楊之南昆明靈沼之東張晏曰先置供具於前服䖍曰白楊觀名宋祁曰置景本作置諸詮音􅆯靈沼李善云三秦記曰昆明池中有靈沼神池賁育之倫蒙盾負羽杖鏌邪而羅者以萬計師古曰賁孟賁也育夏育也皆古之勇士也鏌邪大㦸也羅列􅃒禽獸鏌音莫邪音弋奢反宋祁曰注文列字當刪獸下當有也字其餘荷垂天之畢張竟壄之罘靡日月之朱竿曵彗星之飛旗如淳曰垂天言長大如天之垂也師古曰畢田罔也罘幡車罔也蕭該音義曰李善云言畢之大垂天邊也朱竿太常之竿也日月為太常河圗曰彗星者天地之旗也楚詞曰攬彗星以為旗青雲為紛紅蜺為繯屬之虖昆侖之虚師古曰紛眊也繯系也屬綴也昆侖西極之山也繯音下犬反屬音之欲反虚讀曰墟蕭該音義曰紛張晏曰紛燕尾也韋昭曰紛旗旒也音邠繯該案説文字林三蒼並于善反云繯絡也陳武音環通俗文曰所以懸繩楚曰繯繯胡犬反渙若天星之羅浩如濤水之波師古曰天星之羅言布列也濤水之波言廣大也􅁋滛與與前後要遮師古曰滛􅁋與與往來貌欃槍為闉明月為候孟康曰闉鬬戰自障蔽如城門外女垣也熒惑司命天弧發射張晏曰熒惑法使司不祥天弧虚危上二星也鮮扁陸離駢衍佖路師古曰鮮扁輕疾貌駢衍言其並廣大也佖次比也一曰滿也扁音篇駢音歩干反佖音頻一反又音歩結反蕭該音義曰鮮扁服䖍曰扁音篇戰鬬車陳貌也該案服云以春秋傳曰高渠彌奉公為魚麗之陳先偏後伍伍承彌􅒌杜預曰司馬法曰車二十五乗為偏以車居前以伍次之承偏之隙而彌􅒌闕漏五人為伍此盖魚麗法也徽車輕武鴻絧緁獵師古曰徽車有徽幟之車也鴻絧直馳貌緁獵相差次也鴻音胡孔反絧音徒孔反緁音㨗蕭該音義曰鴻諸詮胡棟反絧音慟宋祁曰景本注文無之車至次也十四字殷殷軫軫被陵縁阪窮㝠極遠者相與迾虖高原之上師古曰殷軫盛也㝠幽深也殷讀曰隐蕭該音義曰諸詮作夐迾夐呼盛反羽騎營營昈分殊事蘇林曰昈明也師古曰營營周旋貌也言其服飾分明各殊異也昈音戸繽紛往來轠轤不絶若光若滅者布虖青林之下孟康曰轠轤連屬貌如淳曰轠音雷轤音盧師古曰繽紛衆疾也轠轤環轉也繽音匹人反蕭該音義曰轠轤韋昭音壘落於是天子廼以陽鼂始出虖𤣥宮師古曰陽朝日出之後也北方之宮故曰𤣥宮撞鴻鍾建九旒六白虎載靈輿􅃖尤並轂蒙公先驅服䖍曰蒙公蒙恬也孟康曰神名也師古曰服説是也並音歩浪反立歴天之旂曵捎星之旃師古曰歴經也捎猶拂也歴天捎雲言其高也捎音所交反宋祁曰校改祈作旂辟歴列缺吐火施鞭應劭曰辟歴雷也列缺天隙電照也師古曰言獵火之燿及馳騎奮鞭如電吐光及象其疾蕭該音義曰施如淳音䝯萃傱允溶淋離廓落戲八鎮而開關應劭曰四方四隅為八鎮如淳曰不言九者一鎮在中天子居之故也師古曰戲讀曰麾謂指麾八鎮使之開關也傱音先勇反又音叢溶音容蕭該音義曰傱案字林及埤蒼云傱傱走貌也允諸詮音余永反溶音勇戲陳武去危反飛廉雲師吸嚊潚率鱗羅布列攅以龍翰師古曰吸嚊開張也潚率聚斂也言布列則如魚鱗之羅攅聚則如龍之豪翰嚊音許冀反潚音肅翰合韻音韓蕭該音義曰嚊張晏音彭濞之濞秋秋蹌蹌入西園切神光師古曰秋秋蹌蹌騰驤之貌切神光者言車之衆飾相切靡而光起有若神也蹌音千羊反宋祁曰秋秋淳化本作啾啾刊誤据禮樂志龍秋游改啾為秋案蕭該說啾舊作愁韋昭音裁梟反今書或作口旁啾該引埤蒼啾啾衆聲也又引楚詞鳴玉鸞之啾啾猿啾啾兮又夜鳴為据云又諸詮秋作口旁秋蹌蕭該本作此槍望平樂徑竹林張晏曰平樂館名也晉灼曰在上林中蹂蕙圃踐蘭唐師古曰蕙圃蕙草之圃也蘭唐陂唐之上多生蘭也宋祁曰踐韋本作跋又作跃舉㶻烈火轡者施披師古曰轡者御人執轡也宋祁曰披當作技方馳千駟校騎萬師師古曰方馳並驅也校騎騎而為部校者也蕭該音義曰校張晏音効虓虎之陳從横膠輵猋泣雷厲驞駍駖磕服䖍曰虓音哮鄧展曰泣音粒師古曰虓虎之陳謂勇士奮怒狀如猛獸而為行陳也猋泣風疾貌也驞駍駖磕皆聲響衆盛也哮音火交反輵音葛驞音匹人反駍音普萌反駖音力莖反磕音口盍反蕭該音義曰輵舊作鶷又作謁驞諸詮作石旁賔磕諸詮苦蓋反洶洶旭旭天動地岋蘇林曰岋音岋岋動揺之岋師古曰洶音匈岋音五合反蕭該音義曰岋韋昭曰岋擬及反羡漫半散蕭條數千萬里外師古曰羡音弋戰反蕭該音義曰半諸詮音叛若夫壮士忼慨殊鄉别趣師古曰鄉讀曰嚮東西南北騁耆奔欲師古曰言隨其所欲而各馳騁取之也耆讀曰嗜欲合韻音弋樹反蕭該音義曰耆諸詮音市至反欲字書瑜注反拕蒼狶跋犀犛蹶浮麋張晏曰䟦躡也鄭氏曰蹶音馬蹄蹶之蹶師古曰拕曵也跋反戾也蹶蹴也浮麋水上浮者也拕音佗跋音歩末反蕭該音義曰狶字林曰東方名豕曰豨語豈反蹶諸詮居衛反鄭氏居月反斮巨狿搏𤣥蝯師古曰斮斬也狿獸名也觧在司馬相如傳斮音側畧反蕭該音義曰狿音延騰空虚距連卷張晏曰連卷之末也師古曰距即拒字也卷音拳宋祁曰今越本距作歫注歫即距也别本亦同踔夭蟜娭澗門師古曰踔走也夭蟜亦木枝曲也娭戲也踔音丑孝反又音徒釣反蟜音矯娭音許其反蕭該音義曰踔韋音卓晉灼曰踔音魚罩之􅇁今作晉灼音宋祁曰娭澗門當作娭澗間莫莫紛紛山谷為之風猋林叢為之生塵師古曰莫莫塵埃貌紛紛亂起貌及至𫉬夷之徒蹶松栢掌疾棃服䖍曰𫉬夷能𫉬夷狄者也師古曰掌以掌擊也劉敞曰𫉬烏獲夷夷羿皆有力者宋祁曰注文擊字下當有之字獵蒙蘢轔輕飛師古曰蒙蘢草木所蒙蔽處也轔轢也輕飛猶言輕禽也轔音吝履般首𢃄修蛇如淳曰般音班班首虎之類也師古曰履謂踐履之也修長也蕭該音義曰按諸本般首般作般下蟲當作盤鉤赤豹摼象犀師古曰摼古牽字跇巒阬超唐陂師古曰跇渡也巒阬並觧於上唐陂陂之有隄唐者也阬音剛跇音弋制反蕭該音義曰跇鄧展曰跇音厲厲度也該案字林曰跇述也弋世反車騎雲會登降闇藹師古曰闇音烏感反泰華為旒熊耳為綴師古曰旒旌旗之旒也綴所以縣旌也木仆山還漫若天外如淳曰還音旋言山為之回旋也蕭該音義曰仆字林疋豆反又疋住反儲與虖大溥聊浪虖宇内服䖍曰儲與相羊也溥水厓也師古曰聊浪言游放也與音餘溥音普浪音琅於是天清日晏師古曰晏無雲也逢蒙列眥羿氏控弦師古曰逢蒙及羿皆古善射者列整也控引也蕭該音義曰眥字林曰眥目崖也音漬該案淮南曰瞋目裂眥靜計反荘周曰多言而不訾司馬彪曰訾視也皇車幽輵光純天地李竒曰純緣也師古曰幽輵車聲也輵音一轄反純音之允反望舒彌轡師古曰望舒月御也彌歛也言天子之車歛轡徐行故假望舒為言耳彌音莫爾反翼乎徐至於上蘭晉灼曰上蘭觀在上林中移圍徙陳浸滛蹵部師古曰部軍之部校也言稍聚逼而重蹵音千欲反宋祁曰注文重下當有也字曲隊堅重各案行伍師古曰隊亦部也案依也隊音徒内反行音胡郎反蕭該音義曰重直龍反壁壘天旋神抶電擊師古曰言所抶擊如鬼神雷電也抶音丑乙反逢之則碎近之則破鳥不及飛獸不得過軍驚師駭刮野掃地師古曰言殺獲皆盡無遺餘也掃音先早反及至䍐車飛揚武騎聿皇師古曰䍐車畢䍐之車也聿皇疾貌蹈飛豹絹嘄陽師古曰嘄陽費費也人靣黒身有毛反踵見人則笑脣蔽其目絹音工犬反嘄音工聊反費音扶味反蕭該音義曰絹蘇林曰絹音絹鹿之絹追天寳出一方應劭曰矢寳陳寳也晉灼曰天寳雞頭而人身應駍聲擊流光壄盡山窮囊括其雌雄如淳曰陳寳神來下時駍然有聲又有光精也應劭曰下時窮極山川天地之間然後得其雌雄也師古曰雄在陳倉雌在南陽也故云野盡山窮也駍音普萌反沈沈容容遥噱虖紭中師古曰口内之上下名為噱言禽獸奔走倦極皆遥張噱吐舌於紭罔之中也師古曰噱音其畧反紭古紘字宋祁曰沈蕭該本作沇音餘水反文選亦作沇沇紭服䖍音宏三軍芒然窮冘閼與孟康曰冘行也閼止也言三軍之盛窮閼禽獸使不得逸漏也晉灼曰閼與容貌也師古曰閼與容暇之貌也芒音莫郎反冘音滛閼音於庶反與音豫蕭該音義曰窮如淳音穹冘諸詮余腫反亶觀夫票禽之紲隃犀兕之抵觸熊羆之挐攫虎豹之凌遽師古曰亶讀曰但票禽輕疾之禽也紲與跇同紲度也隃與踰同挐牽引也攫搏持之也凌戰栗也遽惶也票音頻妙反紲音弋制反觸合韻音昌樹反挐音女居反攫音钁遽音詎蕭該音義曰亶丁但反挐諸詮奴加反徒角搶題注䠞竦讋怖魂亡魄失觸輻闗脰師古曰徒亦但也搶猶刺也題頟也脰頸也言衆獸迫急以角搶地以頟注地或自觸車輻關頸而死也搶音千羊反䠞音子育反脰音豆妄發期中進退履獲師古曰言矢雖妄發而必有中進則覆之退則獲之創淫輪夷丘累陵聚師古曰淫過也夷平也言創過長血流平於車輪也丘累陵聚言其積多宋祁曰注文長字一本作大於是禽殫中衰師古曰殫盡也中射中也音竹仲反相與集於靖㝠之館晉灼曰靖㝠深閑之館蕭該音義曰張晏曰靖㝠極高之貌也以臨珍池灌以岐梁溢以江河晉灼曰梁梁山也服䖍曰珍池山下之流也宋祁曰景本無以臨珍池并服䖍注十四字今按晉灼曰靖㝠深閑之館服䖍曰珍池山下之流也當在珍池字下東瞰目盡西暢亡厓師古曰瞰視也目盡極望也亡厓言廣逺也隨珠和氏焯爍其陂師古曰焯古灼字也焯爍光貌爍音式藥反玉石嶜崟眩燿青熒師古曰玉石石之似玉者也嶜崟高鋭貌青熒言其色青而有光熒也嶜音仕金反崟音牛林反蕭該音義曰嶜案字詁古文岑字漢女水潛怪物暗冥不可殫形應劭曰漢女鄭交甫所逢二女弄大珠大如荆雞子師古曰不可殫形不能盡其形貌之状𤣥鸞孔雀翡翠垂榮師古曰言其毛羽有光華王雎闗闗鴻鴈嚶嚶師古曰王雎雎鳩也闗闗和聲也嚶嬰相命聲也嚶音於耕反羣娭虖其中噍噍昆鳴師古曰娭戲也昆同也娭音許其反噍音子由反鳬鷖振鷺上下砰磕聲若雷霆師古曰鳬水鳥即今之野鴨也鷖鳬屬也鷺白鳥也振者言振羽翼而飛也詩大雅曰鳬鷖在涇周頌曰振鷺于飛三者皆水鳥也言其羣飛上下翅翼之聲若雷霆也鷖音鳥奚反砰音普萌反乃使文身之技水格鱗蟲服䖍曰文身越}
