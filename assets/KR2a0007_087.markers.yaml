  - {type: variant, offset: 4127, length: 5, content: 猶此矣涉自, WYG: 恐後人用覆醬瓿也師古曰瓿音蔀小甖也雄笑而不應年七十一天鳳五年卒侯芭為起墳喪之三年時大司空王邑納言嚴尤聞雄死謂桓譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也師古曰顧念也凡人賤近而貴逺親見揚子雲禄位容貌不能動人故輕其書昔老􅅨著虗無之言兩篇師古曰謂道德經也薄仁義非禮學然後世好之者尚}
