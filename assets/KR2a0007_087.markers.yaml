  - {type: variant, offset: 3675, length: 1, content: 放, WYG: 者希師古曰老子德經云知我者希則我貴矣此非其操與師古曰與讀曰歟雄見諸子各以其知舛馳師古曰舛相背大氐詆訾聖人即為怪迂析辯詭辭以撓世事師古曰大氐大歸也詆訾毁也迂逺也析分也詭異也言諸子之書大歸皆非毁周孔之教為巧辯異辭以攪亂時政也訾音紫迂音于撓音火髙反其字從手也宋祁曰司馬温公云大氐下脱不字又注文詭異也字下當有撓攪也三字雖小辯終破大道而或衆使溺於所聞而不自知其非也及太史公記六國歴楚漢訖麟止不與聖人同是非頗謬於經師古曰頗普我反故人時有問雄者常用法應之譔以為十三卷師古曰譔與撰同蕭該音義曰字林譔專教也音論惟禮記音撰字書並音詮象論語號曰法言法言文多不著獨著其目師古曰雄有序著篇之}
