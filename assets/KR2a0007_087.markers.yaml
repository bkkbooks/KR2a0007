  - {type: variant, offset: 261, length: 4, content: 吳濞淮南, WYG: 來郊祭禋饗則神祗依附宋祁曰祗一本作秪蕭該音義曰字林曰禋潔祀也音一人反俳佪招揺靈屖遲兮師古曰言神乆留安處不即去也招音上遥反屖音栖遲音文夷反宋祁曰吕向云招揺神名李善云招揺猶彷徨也屖淳化本作遟刋誤据説文改作犀張揖字詁云遲今遲徐也煇光眩燿隆厥福兮師古曰眩音州縣之縣子子孫孫長亡極兮甘泉本因秦離宫既奢泰師古曰本秦之林光宫也而武帝復增通天高光迎風宫外近則洪厓旁皇儲胥弩阹逺則石闗封巒枝鵲露寒棠棃師得遊觀屈竒瑰偉師古曰棠棃宫在甘泉苑垣外師得宫在櫟陽界其餘}
