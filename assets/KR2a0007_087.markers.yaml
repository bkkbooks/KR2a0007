  - {type: variant, offset: 362, length: 3, content: 好惡齊, WYG: 通河水故勤勞也灑沈葘於豁瀆兮播九河於東瀕師古曰灑分也菑古災字也沈災洪水也豁開也瀆謂江河淮濟也播布也九河名在地理志東瀕東海之瀕也禹分治洪水之災通之四瀆布散九河於東海之瀕也灑音所宜反瀕音頻又音賔宋祁曰蕭該音義曰灑沈菑而呀壑瀆兮該案呀或以為呵呵叱問四瀆也孔武仲筆記亦錄此灑韋昭音義作酉旁麗云音䟽佳反又注文江河淮濟字上當有四瀆字禹字上當有言字分治别本作分河洪當改作泄登歴觀而遥望兮聊浮㳺以經營樂往昔之遺風兮喜虞氏之所耕師古曰舜耕歴山故云然宋祁曰喜古本作娭韋昭音熙瞰帝唐之嵩高兮眽􅂭周之大寧師古曰瞰眽皆視也帝唐堯也嵩亦高也嵩高者謂孔子云巍巍乎唯天為大唯堯則之也一曰堯曾遊於陽城故於嵩高山瞰其遺蹟也大寧者詩大雅云濟濟多士文王以寕瞰音苦濫反眽即覔字宋祁曰眽别本作䀼爾雅曰相視也汨低回而不能去兮行睨陔下與彭城應劭曰睨不正視也彭城項羽所都也晉灼曰陔下項羽敗處也師古曰汨往意也低回猶言徘徊也行且也意且欲往覩也汨音于筆反睨音五系反濊南巢之坎坷兮易豳岐之夷平李竒曰南巢桀敗處也易樂也師古曰濊與穢同坎坷不平貌坎音口紺反坷音口賀反易音弋豉反宋祁曰南巢湯放桀之處非桀敗處也乗翠龍而超河兮陟西岳之嶢崝師古曰翠龍穆天子所乗馬也西岳即華山也嶢崝謂嶕嶢而崝嶸也嶢音堯崝音士耕反雲䬠䬠而來迎兮澤滲灕而下降師古曰䬠古霏字䬠䬠雲起貌澤雨露也滲灕流貌也降下也滲音淋灕音離降音湘江反宋祁曰滲韋昭史禁反灕蘇林曰灕音薄酒之灕鬱蕭條其幽藹兮滃汎沛以豐隆師古曰皆雲雨之貌滃音烏孔反汎音敷劒反沛音普蓋反叱風伯於南北兮呵雨師於西東師古曰言皆從命也宋祁曰淳化舊本作東西刊誤謂當作西東叶韻參天地而獨立兮廓盪盪其亡雙師古曰天地曰二儀王者大位與之合徳故曰參天地參之言三也盪盪大貌遵逝虖歸來師古曰遵路而旋京師也以函夏之大漢兮彼曾何足與比功服䖍曰函夏函諸夏也師古曰函包容也彼謂堯舜殷周也函讀與含同建乾坤之貞兆兮将悉總}
