  - {type: variant, offset: 3647, length: 1, content: 喜, WYG: 鑪旁薄羣生師古曰旁薄猶言蕩薄也歴覽者兹年矣而殊不寤師古曰兹益也兹年言其乆也不寤不曉其意宋祁曰兹年及注中兹字並當從水旁亶費精神於此而煩學者於彼師古曰亶讀曰但譬畫者畫於無形弦者放於無聲殆不可乎師古曰放依也殆近也放音甫徃反揚子曰俞師古曰俞然也音踰若夫閎言崇議幽㣲}
