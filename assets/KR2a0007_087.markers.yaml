  - {type: variant, offset: 604, length: 5, content: 嘗施唯恐見, WYG: 改宋祁曰畨蘇林音藩注文馬字上當有此字東南一尉孟康曰㑹稽東部都尉也西北一候孟康曰燉煌玉門關候也徽以紏墨製以質鈇師古曰言有罪者則係於徽墨尤惡者則斬以鈇質也徽紏墨皆繩也質鍖也鈇莝刃也音膚鍖音竹林反蕭該音義曰徽舊作嶶應劭曰徽音以繩嶶弩}
