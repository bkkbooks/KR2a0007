  - {type: variant, offset: 1034, length: 797, content: 以翁伯時人殺吾子賊不得棄其尸道旁弗葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰公殺之當吾兒不直遂去其賊辠其姊子收而葬之諸公聞之皆多解之義益附焉解出人皆避有一人獨箕踞視之解問其姓名客欲殺之解曰居邑屋不見敬是吾德不脩也彼何辠乃陰請尉史曰是人吾所重至踐更時脫之每至直更數過吏弗求怪之問其故解使脫之箕踞者乃肉袒謝辠少年聞之愈益慕解之行洛陽人有相仇者邑中賢豪居間以十數終不聽客乃見解解夜見仇家仇家曲聽解謂仇家吾聞洛陽諸公在間多不聽今子幸而聽解解奈何從它縣奪人邑賢大夫權乎乃夜去不使人知曰且毋庸待我去令洛豪居間乃聽解為人短小恭儉出末嘗有騎不敢乘車入其縣庭之旁郡國為人請求事事可出出之不可者各令厭其意然後乃敢嘗酒食諸公以此嚴重之爭為用邑中少年及旁近縣豪夜半過門常十餘車請得解客舍養之及徙豪陵也解貧不中訾吏恐不敢不徙衛將軍為言郭解家貧不中徙上曰解布衣權至使將軍此其家不貧解徙諸公送者出千餘萬軹人楊季主子為縣掾鬲之解兄子斷楊掾頭解入關關中賢豪知與不知聞聲爭交驩邑人又殺楊季主季主家上書人又殺闕下上聞乃下吏捕解解亡置其母家室夏陽身至臨晉臨晉籍少翁素不知解因出關籍少翁已出解解傳太原所過輒告主人處吏逐迹至籍少翁少翁自殺口絕久之得解窮治所犯為而解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解專以姦犯公法何謂賢解客聞之殺此生斷舌吏以責解解實不知殺者殺者亦竟莫知為誰吏奏解無罪御史大夫公孫弘議曰解布衣為任俠行權以睚眥殺人解不知此辠甚於解知殺之當大逆無道遂族解自是之後俠者極眾而無足數者然關中長安樊中子槐里趙王孫長陵高公子西河郭翁中大原魯翁孺臨淮兒長卿東陽陳君孺雖為俠而恂恂有退讓君子之風至若北道姚氏西道諸杜南道仇景東道佗羽公子南陽趙調之徒盜跖而居民間者耳曷足道哉此乃鄉者朱家所羞也萭章字子夏長安人也長安熾盛街閭各有豪俠章在城西柳市號曰城西萭子夏為京兆尹門下督從至殿中侍中諸侯貴人爭欲揖章莫與京兆尹言者章逡循甚懼其後京兆不復, WYG: 隨}
