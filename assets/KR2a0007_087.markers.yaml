  - {type: variant, offset: 3649, length: 1, content: 常, WYG: 塗盖難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深師古曰麗著也日月星辰之所著也彌廣也普遍也昔人之辭廼玉廼金師古曰貞實美麗如金玉也彼豈好為艱難哉埶不得已也師古曰已止也獨不見夫翠虯絳螭之將登虖天師古曰虯螭觧並在前必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎師古曰撠挶也膠葛上清之氣也騰升也九閎九天之門撠音㦸挶音居足反蕭該音義曰撠如淳曰撠著也膠葛大也韋昭曰撠音據畧反字林撠挶也挶撠持也撠音㦸日月之經不千里則不能燭六合燿八紘師古曰燭照也六合}
