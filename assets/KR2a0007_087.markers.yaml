  - {type: variant, offset: 4, length: 0, content: '', WYG: 五十七上師古曰自長楊賦以後分為下卷揚雄字子雲蜀郡成都人也其先出自有周伯僑者以支庻初食采於晉之揚師古曰采官也以官受地謂之采地因氏焉不知伯僑周何别也師古曰别謂分系緒也揚在河汾之間應劭曰左傳霍揚韓魏皆姬姓也揚今河東揚縣周衰而揚氏或稱侯號曰揚侯會晉}
  - {type: page-break, offset: 4, content: '', id: KR2a0007_WYG_087-1b, image: WYG0250/WYG0250-0727b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 五十七上師古曰自長楊賦以後分為下卷揚雄字子雲蜀郡成都人也其先出自有周伯僑者以支庻初食采於晉之揚師古曰采官也以官受地謂之采地因氏焉不知伯僑周何别也師古曰别謂分系緒也揚在河汾之間應劭曰左傳霍揚韓魏皆姬姓也揚今河東揚縣周衰而揚氏或稱侯號曰揚侯會晉}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 卿爭權韓魏趙興而范中行知伯弊當是時偪揚侯晉灼曰漢名臣奏載張衡説云晉大夫食采於楊為揚氏食我有罪而揚氏滅無揚侯有楊侯則非六卿所偪也師古曰晉説是也雄之自序譜諜盖為疎謬范中行不與知伯同時滅何得言當是時偪揚侯乎偪古逼字宋祁曰注文食字上疑有揚字揚侯逃於楚巫山因家焉師古曰巫山今在荆州西南也楚漢之興也揚氏遡江上處巴江州李竒曰江州縣名也巴郡所治也師古曰遡謂逆流而上也音素而揚季官至廬江太守漢元鼎間避仇復遡江上處㟭山之陽曰郫師古曰㟭山江水所出也山南曰陽郫縣名也㟭音旻郫音疲有田一㙻有宅一區晉灼曰周禮上地夫一㙻一百畝也宋祁曰㙻當作㕓世世以農桑為業自季至雄五世而傳一子故雄亡它揚於蜀師古曰蜀諸姓揚者皆非雄族故言雄無它揚雄少而好學不為章句訓詁通而已師古曰詁謂指義也博覽無所不見為人簡易佚蕩張晏曰佚音鐵蕩音讜晉灼曰佚蕩緩也宋祁校本云蕭該蕩亦作偒韋佚為替偒為黨晉音鐵儻口吃不能劇談鄭氏曰劇甚也晉灼曰或作遽遽疾也口吃不能疾言師古曰劇亦疾也無煩作遽也宋祁校本云浙本無吃字黙而好深湛之思師古曰湛讀曰沈清靜亡為少耆欲師古曰耆讀曰嗜不汲汲於富貴不戚戚於貧賤師古曰汲汲欲速之義如井汲之為也宋祁曰注文也字當作耳不修亷隅以徼名當世師古曰徼要也音工堯反徼字或作激激𤼵也音工歴反家産不過}
