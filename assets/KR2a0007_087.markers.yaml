  - {type: variant, offset: 740, length: 0, content: '', WYG: 言之疏音所據反髙得待詔下觸聞罷師古曰報聞而罷之又安得靑紫宋祁曰此下疑脱師古曰安焉也六字且吾聞之炎炎者滅隆隆者絶觀雷觀火為盈為實天收其聲地藏其熱師古曰炎炎火光也隆隆雷聲也人之觀火聽雷謂其盈實終以天收雷聲地藏火熱則為虗無言極盛者亦滅亡也髙明之家鬼瞰其室李竒曰鬼神害盈而福謙也師古曰瞰視也音口濫反攫挐者亡黙黙者存師古曰攫挐妄有搏執牽引也挐音女居反位極者宗危自守者身全是故知𤣥知黙守道之極爰清爰靜游神之廷師古曰静合韻音才性反宋祁曰景本作爰静爰清案注言合韻才性反則正文自合作爰清爰静也惟寂惟寞守德之宅世異事變人道}
