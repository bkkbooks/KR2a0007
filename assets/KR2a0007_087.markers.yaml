  - {type: variant, offset: 370, length: 2, content: 曷繇, WYG: 師古曰贍給也齊民觧在食貨志然至羽獵田車戎馬器械儲偫禁禦所營師古曰營謂圍守也宋祁曰禦當作籞尚泰奢麗誇詡師古曰詡大也音許羽反非堯舜成湯文王三驅之意也師古曰三驅古射獵之等也一為籩豆二為賔客三為充君之庖也宋祁曰一説三驅者三面驅之闕其一面使有可去之道而不忍盡物蓋先王之仁心也禮所謂天子不合圍者也又恐後世復修前好不折中㠯泉臺服䖍曰魯荘公築泉臺非禮也至文公毁之公羊譏云先祖為之而毁之勿居而已今揚雄以宫觀之盛非成帝所造勿修而已當以泉臺折中也宋祁曰注文勿居字上當有不如字故聊因校獵賦以風師古曰校獵謂圍守禽獸而大獵也風讀曰諷其辭曰或稱戲農豈或帝王之彌文哉師古曰設或人云言儉質者皆舉伏戲神農為之首是則豈謂後代帝王彌加文飾乎故論者答之於下也論者雄自謂也彌猶稍稍也諸家之釋皆不當意徒為煩雜故無所取論者云否各亦並時而得宜奚必同條而共貫師古曰所尚不必同也則泰山之封烏得七十而有二儀孟康曰言封禪各異也師古曰若不如是於何得七十二儀也是以創業垂綂者俱不見其爽遐邇五三孰}
