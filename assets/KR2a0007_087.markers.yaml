  - {type: variant, offset: 4256, length: 616, content: 知母病避疾在里宅者涉即往候叩門家哭涉因入弔問以喪事家無所有涉曰但絜埽除沐浴待涉還至主人對賓客歎息曰人親臥地不收涉何心鄉此願徹去酒食賓客爭問所當得涉乃側席而坐削牘為疏具記衣被棺木下至飯含之物分付諸客諸客奔走市買至日昳皆會涉親閱視已謂主人願受賜矣既共飲食涉獨不飽乃載棺物從賓客往至喪家為棺斂勞倈畢葬其周急待人如此後人有毀涉者曰姦人之雄也喪家子即時刺殺言者賓客多犯法辠過數上聞王莽數收繫欲殺輒復赦出之涉懼求為卿府掾史欲以避客文母太后喪時守復土校尉已為中郎后免官涉欲上冢不欲會賓客密獨與故人期會涉單車敺上茂陵投暮入其里宅因自匿不見人遣奴至市買肉奴乘涉氣與屠爭言斫傷屠者亡是時茂陵守令尹公新視事涉未謁也聞之大怒知涉名豪欲以示眾厲俗遣兩吏脅守涉至日中奴不出吏欲便殺涉去涉迫窘不知所為會涉所與期上冢者車數十乘到皆諸豪也共說尹公尹公不聽諸豪則曰原巨先奴犯法不得使肉袒自縛箭貫耳詣廷門謝辠於君威亦足矣尹公許之涉如言謝復服遣去初涉與新豐富人祁太伯為友太伯同母弟王游公素嫉涉時為縣門下掾說尹公曰君以守令辱原涉如是一旦真令至君復單車歸為府吏涉刺客如雲殺人皆不知主名可為寒心涉治冢舍奢僭踰制辠惡暴著主上知之今為君計莫若墮壞涉冢舍條奏其舊惡君必得真令如此涉亦不敢怨矣尹公如其計莽果以為真令涉繇此怨王游公選賓客遣長子初從車二十乘劫王游公家游公母即祁太伯母也諸客見之皆拜傳曰無驚祁夫人遂殺游公父及子斷兩頭去涉性略似郭解外溫仁謙遜而內隱好殺睚眥於塵中觸死者甚多王莽末, WYG: 増减}
