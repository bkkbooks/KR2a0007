  - {type: variant, offset: 412, length: 181, content: 郭解之倫以匹夫之細竊殺生之權其罪已不容於誅矣觀其溫良泛愛振窮周急謙退不伐亦皆有絕異之姿惜乎不入道德苟放縱於末流殺身亡宗非不幸也自魏其武安淮南之後天子切齒衛霍改節然郡國諸豪桀處處各有京師親戚冠蓋相望亦古今常道莫足言者唯成帝時外家王氏賓客為盛而樓護為帥及王莽時諸公之間陳遵為雄閭里之俠原涉為魁朱家魯人高祖同時也魯人皆以儒教而朱家用俠聞所臧活豪士以百數其餘庸人不可勝言, WYG: 事情}
