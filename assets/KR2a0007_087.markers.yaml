  - {type: variant, offset: 7, length: 0, content: '', WYG: 説皆非也自漢十世以下四句不道屈原也此乃雄自論已心所履行取法天地耳自圖纍以下方論屈原云也如淳曰清正法則也十一月為歳首天之正地稱方貞貞正也十一月坤體成故方貞音真為是圖纍承彼洪族兮又覽纍之昌辭師}
  - {type: variant, offset: 7, length: 0, content: '', krp: 説皆非也自漢十世以下四句不道屈原也此乃雄自論已心所履行取法天地耳自圖纍以下方論屈原云也如淳曰清正法則也十一月為歳首天之正地稱方貞貞正也十一月坤體成故方貞音真為是圖纍承彼洪族兮又覽纍之昌辭師}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 曰圖案其本系之圖書也洪大也覽省視也昌美也宋祁曰彼考作破帶鉤矩而佩衡兮履欃槍以為綦應劭曰鉤規也矩方也衡平也鄧展曰欃槍妖星也晉灼曰綦履跡也此反屈原雖佩帯方平之行而蹈惡人跡以致放退也師古曰綦履下飾也欃音初咸反槍音初行反綦音其晉灼曰綦路也宋祁曰履考作治素初貯厥麗服兮何文肆而質䪥應劭曰貯積也肆放也䪥狹也如淳曰文肆}
