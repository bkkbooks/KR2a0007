  - {type: variant, offset: 396, length: 1, content: 辠, WYG: 虞師古曰虞與娛同合韻音牛具反使農不輟耰工不下機師古曰耰摩田之器也音憂宋祁曰耰當作櫌婚姻以時男女莫違師古曰已觧於上也出愷弟行簡易師古曰易合韻音弋赤反矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼓之樂鳴鞀磬之和建碣磍之虡孟康曰碣磍刻猛獸為之故其形碣磍而盛怒也師古曰鞀古鼗字鞀小鼔也碣音一轄反磍音轄宋祁曰孟武云刻作猛獸其形碣磍而威怒也拮隔鳴球掉八列之舞師古曰拮隔撃考也鳴球玉磬也掉搖也搖身而舞也一曰拮隔彈鼓也鳴球以玉餙琴瑟也拮音居黠反球音求又音虯掉音徒釣反宋祁曰隔韋昭云古文為擊蕭該音擊鳴球韋昭曰玉磬也掉廣雅曰振迅也八列李善云八佾也酌允鑠肴樂胥張晏曰允信也鑠美也言酌信義以當酒帥禮樂以為肴也師古曰小雅車攻之詩曰允矣君子展也大成周頌酌之詩曰於鑠王師小雅桑扈之詩曰君子樂胥故引之為言也胥音先呂反聽廟中之雍雍受神人之福祜師古曰大雅思齊之詩曰雍雍在宫肅肅在廟小雅桑扈之詩曰受天之祜祜福也音户宋祁曰祜考作祐音右歌投頌吹合雅其勤若此故真神之所勞也師古曰大雅旱麓之詩曰愷弟君子神所勞矣勞謂勞来之猶言勸勉也故雄引之云勞音郎到反宋祁曰麓舊鹿刊誤改作麓方將俟元符師古曰元善也符瑞也以禪梁甫之基增泰山之髙延光于將来比榮乎往號豈徒欲滛覽浮觀馳騁稉稻之地宋祁曰稉古作粇周流梨栗之林蹂踐芻蕘誇詡衆庶盛狖玃之收多麋鹿之獲哉且盲不見咫尺宋祁曰盲字下當有者字而離婁燭千里之隅師古曰離婁古明目者一號離朱燭照也宋祁曰婁力朱反客徒愛胡人之𫉬我禽獸曾不知我亦已獲其王侯言未卒墨客降席再拜稽首曰大哉體乎允非小子之所能及也師古曰允信也廼今日發矇廓然已昭矣哀帝時丁傅董賢用事諸附離之者或起家至二千石師古曰離著也音麗時雄方草太𤣥宋祁曰草字下當有創字有以自守泊如也師古曰泊安静也音歩各反或謿雄以𤣥尚白師古曰𤣥黒色也言雄作之不成其色猶白故無禄位也宋祁曰或字上當有人字而雄解之號曰觧謿其辭曰客謿揚子曰吾聞上世之士人綱人紀師古曰為衆人之綱紀也不生則巳生則上尊人君下榮父母析人之圭儋人之爵師古曰析亦分也儋荷負也懐人之符分人之禄紆靑拕紫朱丹其轂師古曰靑紫謂綬之色也紆縈也拕曵也拕音吐賀反又音徒可反蕭該音義曰拕徒何反又音他今子幸得遭明盛之世處不諱之朝與羣賢同行師古曰同行謂同行列歴金門上玉堂有曰矣應劭曰金門金馬門也晉灼曰黄圖有大玉堂卜玉堂殿也曾不能畫一竒出一䇿上説人主下談公卿目如燿星宋祁曰越本燿作曜舌如電光壹從壹衡論者莫當師古曰從音子容反顧而作太𤣥五千文師古曰顧反也支葉扶疎獨説十餘萬言師古曰扶疏分布也深者入黃泉髙者出蒼天大者含元氣纖者入無倫師古曰纖㣲之甚無等倫然而位不過侍郎擢纔給事黄門師古曰纔淺也言僅得之也纔音才意者𤣥得毋尚白乎何為官之拓落也師古曰拓落不耦也拓音託揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也師古曰跌足失厝也見誅殺者必流血故云赤族跌音徒結反宋祁曰竇革云古人謂空盡無物曰赤如赤地千里南史稱其家赤貧是也赤族言盡殺無遺師古注以為流血赤其族大謬往者周罔觧結羣鹿爭􅇣師古曰謂戰國時諸侯也離為十二合為六七師古曰十二謂魯衛齊楚宋鄭燕秦韓趙魏中山也六七者齊趙韓魏燕楚六國及秦為七也四分五剖並為戰國晉灼曰道其分離之意四分則交五而裂如田字宋祁曰剖韋本作􅀈疋力反字林􅀈判也士無常君國亡定臣得士者富失士者貧矯翼厲翮恣意所存師古曰言来去如鳥之飛各任所息也宋祁曰注文任當作止故士或自盛以橐或鑿坏以遁應劭曰自盛以橐謂范睢也鑿坏謂顔闔也魯君聞顔闔賢欲以為相使者往聘因鑿後垣而亡坏壁也蘇林曰坏音陪師古曰又音普回反蕭該音義曰後垣該案作後坏是故騶衍以頡亢而取世資應劭曰衍齊}
