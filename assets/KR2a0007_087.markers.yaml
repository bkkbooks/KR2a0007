  - {type: variant, offset: 356, length: 1, content: 王, WYG: 者盛哉鑠乎越不可載已師古曰勒崇垂鴻勒崇名而垂鴻業也隤降也祉福也欽敬也若順也鑠美也越曰也已辭也言發祥降福敬順神明其事盛美不可盡載於是命羣臣齊法服整靈輿廼撫翠鳳之駕六先景之乗師古曰翠鳳之駕天子乗車為鳳形而飾以翠羽也先景為馬行速疾常}
