  - {type: variant, offset: 596, length: 7, content: 伐其能飲其德諸, WYG: 屈嘗仕於齊位至卿師古曰頡亢上下不定也頡音下結反亢音胡浪反宋祁曰晉本頡旁從手音挈今不用李善云頡亢竒怪之辭孟軻雖連蹇猶為萬乗師張晏曰連蹇難也言值世之屯難也師古曰連音輦今大漢左東海應劭曰㑹稽東海也右渠搜服䖍曰西戎國也應劭曰禹貢析支渠搜屬雍州在金城河間之西前畨禺應劭曰畨禺南海郡張晏曰南越王都也後陶塗如淳曰小國也師古曰駼騊馬出北海上今此云後陶塗則是北方國名也本國出馬因以為名今書本陶字有作椒者流俗}
