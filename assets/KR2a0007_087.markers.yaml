  - {type: variant, offset: 8, length: 0, content: '', krp: 曰圖案其本系之圖書也洪大也覽省視也昌美也宋祁曰彼考作破帶鉤矩而佩衡兮履欃槍以為綦應劭曰鉤規也矩方也衡平也鄧展曰欃槍妖星也晉灼曰綦履跡也此反屈原雖佩帯方平之行而蹈惡人跡以致放退也師古曰綦履下飾也欃音初咸反槍音初行反綦音其晉灼曰綦路也宋祁曰履考作治素初貯厥麗服兮何文肆而質䪥應劭曰貯積也肆放也䪥狹也如淳曰文肆}
  - {type: variant, offset: 9, length: 1, content: 天, WYG: 楚辭逺㳺乗龍之言也質䪥者恨世不用已而自沈也師古曰麗服謂扈江離與辟芷紉秋蘭以為佩之類是也䪥音械資娵娃之珍髢兮鬻九戎而索頼孟康曰娵閭娵也娃吴娃也髢髪也頼得也九戎被髪髢雖珍好無所用也師古曰娵娃皆美女也頼利也言屈原以髙行仕楚亦猶資美女之髢賣於九戎而求其利必不得也娵音}
  - {type: variant, offset: 9, length: 1, content: 天, krp: 楚辭逺㳺乗龍之言也質䪥者恨世不用已而自沈也師古曰麗服謂扈江離與辟芷紉秋蘭以為佩之類是也䪥音械資娵娃之珍髢兮鬻九戎而索頼孟康曰娵閭娵也娃吴娃也髢髪也頼得也九戎被髪髢雖珍好無所用也師古曰娵娃皆美女也頼利也言屈原以髙行仕楚亦猶資美女之髢賣於九戎而求其利必不得也娵音}
  - {type: variant, offset: 11, length: 1, content: 建, WYG: 踰反娃音鳥佳反髢音徒計反韋昭曰娵當作􅎐梁王魏嬰之美人曰閭􅎐鳳皇翔於􅅾陼兮豈鴐鵞之能㨗應劭曰蓬陼􅅾萊之陼在海中晉灼曰㨗及也師古曰鴐鵞鳥名也觧在司馬相如傳鴐音加蕭該音義曰案鴐字亦作鴚音加宋祁曰字林云鴚鵞鳥似鴈鴚音柯騁驊駵以曲囏兮驢騾連蹇而齊足師古曰驊騮駿馬名也其色如華而赤也言使駿馬馳騖於屈曲艱阻之中則與驢騾齊足也驊音華連音力展反囏古艱字蕭該音義曰駵音留俗作騮宋祁曰以字疑作於枳棘之榛榛兮蝯貁擬而不敢下師古曰榛榛梗穢貌也蝯善攀援貁似猴卭鼻而長尾擬疑也榛音臻又土臻反貁音弋授反靈修既信椒蘭之唼佞兮吾纍忽焉而不蚤睹服䖍曰靈修楚王也蘇林曰椒蘭令尹子椒子蘭也師古曰蚤古早字也唼佞譛言也唼音妾宋祁曰韋昭曰唼音祖臘反鄭音接蘇音詩唼唼幡幡之唼蕭該音義按詩作㨗衿芰茄之綠衣兮被夫容之朱裳應劭曰衿音衿系之衿衿帯也芰䔖也師古曰衿音其禁反茄亦荷字也見張揖古今字譜被音披又音皮義反宋祁曰注文字譜一作字詁芳酷烈而莫聞兮不如襞而幽之離房師古曰襞疊衣也離房别房也襞音壁閨中容競淖約兮相態以麗佳應劭曰衆士競善猶女競容也師古曰淖約善容止也相態以麗佳言競為佳麗之態以相傾也淖音綽宋祁曰監本并上二句兮字下皆有固字知衆嫭之嫉妒兮何必颺纍之䖸睂晉灼曰離騷云衆女嫉余之䖸眉師古曰嫭美貌也颺古楊字也䖸眉形若蠶䖸眉也此亦譏屈原自舉䖸眉令衆嫉嫭音胡故反睂古眉字宋祁曰韋昭曰嫭音呼言其目如茱萸之拆也刋誤嫭出故反當作胡故反蕭該音義下故反淳化本火故反睂一本作睂顔注䖸睂字下當有謂眉字衆嫉字下當有之字懿神龍之淵潛竢慶雲而将舉亡春風之被離兮孰焉知龍之所處晉灼曰龍竢風雲而後升士湏眀君而後進}
