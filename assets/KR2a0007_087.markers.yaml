  - {type: variant, offset: 745, length: 0, content: '', WYG: 亦笑子之病甚不遭㬰跗扁鵲師古曰二人皆古良醫也跗音甫無反宋祁曰跗字下當有與字悲夫客曰然則靡𤣥無所成名乎師古曰靡亦無也范蔡以下何必𤣥哉揚子曰范睢魏之亡命也折脅拉髂免於徽索師古曰髂骨也徽繩也髂音格蕭該音義曰髂口亞反字林腰骨也翕肩蹈背扶服入橐師古曰翕歛也服音蒲北反宋祁曰呂向曰翕肩畏懼貌睢初入秦道遇穰侯藏於王稽車中恐穣侯}
