  - {type: variant, offset: 79, length: 0, content: '', WYG: 也柴音初蟻反虒音豸參音初林反頡音胡結反䀪音胡剛反蕭該音義曰柴一本作偨諸詮賦偨音初綺反虒姚本初擬反翕赫曶霍霧集蒙合兮半散照爛粲以成章師古曰翕赫曶霍開合之貌也霧地氣𤼵也蒙天氣下也如霧之集如蒙之合也半散照爛言其分布而光眀也曶讀與忽同於是乗輿廼登夫鳳凰兮翳華芝師古曰鳳凰者車以鳳凰為飾也翳蔽也以華芝為蔽也宋祁曰兮字下疑有而字駟蒼螭兮六素虯師古曰四六駕數也言或四或六也螭似龍一名地螻虯即龍之無角者宋祁曰韋昭曰螭似虎而鱗鄭氏曰螭虎類也龍形李竒曰螭雌龍也字林曰螭若龍而黄北方之地螻淳化本作一名螻刋誤据今説文添虯字監本作地螻金靖刋誤据今說文作一名地螻當有地字蠖畧蕤綏灕虖幓纚師古曰蠖畧蕤綏蚪螭貌也灕虖慘纚車飾貌也蠖音於鑊反灕音離幓音森其字從巾纚音所宜反宋祁曰於鑊反一作於郭反綏先佳反帥􅈛陰閉霅然陽開晉灼曰帥聚也霅散也師古曰霅音所甲反又音先合反騰清霄而軼浮景兮夫何旟旐郅偈之旖旎也師古曰騰升也霄日旁氣也軼過也畫鳥隼曰旟龜蛇曰旐郅偈竿杠之状也旖旎旒縿之形也郅音吉又音質偈音居傑反旖音猗旎音女倚反韋昭曰偈音桀宋祁曰旎越本作柅女支反景本旎作䘦流星旄以電燭兮咸翠蓋而鸞旗師古曰如星之流如電之照也咸皆也敦萬騎於中營兮方玉車之千乗師古曰敦讀曰屯屯聚也方並也聲駍隐以陸離兮輕先疾雷以馺遺風師古曰馺然疾意也駍音普萌反馺音先合反韋昭馺蘇及反宋祁云姚本以作而陵高衍之嵱嵷兮超紆譎之清澄孟康曰衍無厓也紆譎曲折也李竒曰嵱音踊嵷音竦如淳曰嵱嵷上下衆多貌師古曰衍即所謂墳衍也宋祁云姚本衍作愆晉灼作㵪監本注文厓字下有㟁字登椽欒而羾天門兮馳閶闔而入凌兢服䖍曰椽欒甘泉南山也李竒曰羾音貢蘇林曰羾至也師古曰入凌兢者言寒涼戰栗之處也兢音鉅陵反是時未轃夫甘泉也廼望通天之繹繹師古曰轃與臻同臻至也通天臺名也言雖未至甘泉則遥望見通天臺也繹繹}
