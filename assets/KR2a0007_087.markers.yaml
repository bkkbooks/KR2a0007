  - {type: variant, offset: 3674, length: 0, content: '', WYG: 領袖不汙有小飛泥誤著其鼻因令匠石揮斤而斵知匠石之善斵故敢使之也師古曰塈即今之仰泥也獶􅋞拭也故謂塗者為獶人獶音乃髙反又音廼回反今書本獶字有作郢者流俗改之塈音許既反師曠之調鍾竢知音者之在後也應劭曰晉平公鍾工者以為調矣師曠曰臣竊聼之知其不調也至於師涓而果知鍾之不調是師曠欲善調之鍾為後世之有知音宋祁曰注文平公字下當有鑄鍾字孔子作春秋幾君子之前睹也師古曰幾讀曰冀老聃有遺言貴知}
