  - {type: variant, offset: 3927, length: 3, content: 丹舉能, WYG: 篇莫善於倉頡作訓纂箴莫善於虞箴作州箴晉均曰九州之箴也賦莫深於離騷反而廣之辭莫麗於相如作四賦皆斟酌其本相與放依而馳騁云師古曰放音甫往反用心於内不求於外於時人皆曶之師古曰曶與忽同謂輕也宋祁曰注文輕下當有之字唯劉歆及范逡敬焉師古曰逡音千旬反而桓譚以為絶倫師古曰無比類王莽時劉歆甄豐皆為上公莽既以符命自立即位之後欲絶其原以神前事而豐子尋歆子棻復獻之師古曰棻亦分字也音扶云反宋祁曰注文分字當從木莽誅豐父子投棻四裔辭所連及便收不請師古曰不須奏請時雄校書天禄閣上}
