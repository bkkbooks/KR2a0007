  - {type: variant, offset: 13, length: 0, content: '', WYG: 無道則愚誰知其所邪師古曰懿美也竢待也龍以潜居待雲為美以譏屈原不能隐徳自取祸也被讀曰披宋祁曰韋昭曰被讀如光被之被蕭該音義曰慶音羌今漢書亦有作羌字者淵潜字下當有兮字愍吾纍之衆芬兮颺煜煜之芳苓遭季夏之凝霜兮慶夭顇而䘮榮晉灼曰雄愍屈原光香奄先秋遇凋生亦不辰也張晏曰慶辭也師古曰煜煜光盛苓香草名音零慶讀與羌同顇古悴字横江湘以南􅐹兮云走乎彼蒼吾馳江潭之汎溢兮将折衷虖重華應劭曰舜𦵏蒼梧在江湘之南屈原欲啓質聖人陳已情要也師古曰􅐹往也走趣也重華舜名也􅐹音于放反走音奏潭音尋衷音竹仲反宋祁曰蕭本作蒼梧今作蒼吾恐非華叶音敷舒中情之煩或兮恐重華之不纍與張晏曰舜聖卒避父害以全身資於事父以事君恐不與屈原為黨與陵陽侯之素波兮豈吾纍之獨見許應劭曰陽侯古之}
  - {type: page-break, offset: 13, content: '', id: KR2a0007_WYG_087-6b, image: WYG0250/WYG0250-0729d.png}
  - {type: page-break, offset: 13, content: '', id: KR2a0007_WYG_087-7a, image: WYG0250/WYG0250-0730a.png}
  - {type: variant, offset: 13, length: 0, content: '', krp: 無道則愚誰知其所邪師古曰懿美也竢待也龍以潜居待雲為美以譏屈原不能隐徳自取祸也被讀曰披宋祁曰韋昭曰被讀如光被之被蕭該音義曰慶音羌今漢書亦有作羌字者淵潜字下當有兮字愍吾纍之衆芬兮颺煜煜之芳苓遭季夏之凝霜兮慶夭顇而䘮榮晉灼曰雄愍屈原光香奄先秋遇凋生亦不辰也張晏曰慶辭也師古曰煜煜光盛苓香草名音零慶讀與羌同顇古悴字横江湘以南􅐹兮云走乎彼蒼吾馳江潭之汎溢兮将折衷虖重華應劭曰舜𦵏蒼梧在江湘之南屈原欲啓質聖人陳已情要也師古曰􅐹往也走趣也重華舜名也􅐹音于放反走音奏潭音尋衷音竹仲反宋祁曰蕭本作蒼梧今作蒼吾恐非華叶音敷舒中情之煩或兮恐重華之不纍與張晏曰舜聖卒避父害以全身資於事父以事君恐不與屈原為黨與陵陽侯之素波兮豈吾纍之獨見許應劭曰陽侯古之}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 也有罪自投江其神為大波陵乗也言屈原襲陽侯之罪而欲折中求舜未必獨見然許之也宋祁曰注文陽侯之罪罪當作非精瓊靡與秋菊兮将以延夫天年臨汨羅而自隕兮恐日薄於西山應劭曰精細靡屑也瓊玉之華也晉灼曰離騷云精瓊靡以為糧兮予夕餐秋菊之落英又曰老冉冉其将至日忽忽其将暮師古曰此又譏屈原云瓊靡秋菊将以延年崦嵫忽迫喜於未暮何乃自投汨羅言行相反韋昭曰汨音羃蕭該音義曰如淳音河水浼浼之浼案詩浼音莫罪反楚詞曰精瓊靡以為糧讀楚詞者依字不借音也宋祁曰兮字下疑有何字解扶桑之總轡兮縱令之遂奔馳應劭曰總結也扶桑日所拂木也晉灼曰離騷云總余轡於扶桑聊消揺以相羊屈原言結我車轡於扶桑以留日之入人年得不老日以喻君而反離朝自沈觧轡縱君使遂奔馳也鸞凰騰而不屬兮豈獨飛亷與雲師應劭曰楚辭云鸞凰為余先戒兮後飛亷使奔屬雲師告余以未具飛亷風伯也雲師豐􅂭也鸞凰俊鳥也晉灼曰縱其轡使之奔馳鸞凰迅飛亦無所及非獨飛亷雲師言荘嚴未具使君不適道也卷薜芷與若惠兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之師古曰離騷云貫薜荔之落蘂雜杜衡與芳芷又樹蕙之百畝雜申椒與菌桂皆以自喻徳行芬芳也今何為自投江湘而喪此芳乎棍大束也漚漬也今漚麻也棍音下本反漚音一搆反又音一侯反韋昭曰薜芷若惠四者皆是草也宋祁曰棍疑作混費椒稰以要神兮又勤索彼瓊茅孟康曰椒稰以椒香米饌也離騷云懐椒稰而要之晉灼曰離騷云索瓊茅以筳篿師古曰索求也瓊茅靈草也筳篿折竹所用卜也稰音所又音思呂反筳音廷篿音專蕭該音義曰糈從米按王逸曰精米也違靈氛而不從兮反湛身於江臯晉灼曰靈氛古之善占者離騷曰欲從靈氛之吉占兮心猶豫而狐疑師古曰既不從靈氛之占何為費椒稰而勤瓊茅也湛讀曰沈江臯江水邉之游地也宋祁曰浙本從作定纍既乑夫傅說兮奚不信而遂行晉灼曰乑慕也離騷云説操築於傅巖兮武丁用之而不疑師古曰乑古攀字既攀援傅説何不信其所行自見困而遂去宋祁曰姚本乑作􅦁徒恐鷤䳏之將鳴兮顧先百草為不芳師古曰離騷云鷤䳏之先鳴兮使夫百草為不芳雄言終以自沈何惜芳草而憂鷤䳏也䳏鴂字也鷤鴂鳥一名買䤥一名子規一名杜鵑常以}
