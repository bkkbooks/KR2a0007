  - {type: variant, offset: 355, length: 0, content: '', WYG: 成帝所造欲諫則非時欲黙則不能已故遂推而􅂭之廼上比於帝室紫宫師古曰帝謂天也若曰此非人力之所為黨鬼神可也師古曰黨音它莽反又是時趙昭儀方大幸每上甘泉常法從師古曰法從者以言法當從耳非失禮也一曰從法駕也在屬車間豹尾中服䖍曰大駕屬車八十一乗作三行尚書御史乗之最後一乗縣豹尾豹尾以前皆為省中故雄聊盛言車騎之衆參麗之駕非所以感動天地逆釐三神師古曰參三神也麗偶也劉敞曰麗兹也言所以參乗兹駕者非其人也宋祁曰注文神字可刪劉敞兹字當作並字又言屏玉女卻虙妃以微戒齊肅之事賦成奏之天子異焉其三月将祭后土上廼帥羣臣横大河湊汾陰師古曰横横度之也湊趣也既祭行遊介山回安邑師古曰介山在汾隂東北回謂遶過宋祁曰注末當有之字顧龍門覽鹽池師古曰龍門山在今蒲州龍門縣北鹽池在今虞州安邑縣南登歴觀師古曰歴山之上有觀也晉灼曰在河東蒲阪縣陟西岳以望八荒迹殷周之虚眇然以思唐虞之風師古曰陟升也西岳華山之上高峻故言以望八荒殷都河内周在岐豐堯都平陽舜都蒲阪皆可想見故云迹殷周之墟思唐虞之風也虚讀曰墟宋祁曰注文之上當作其上雄以為臨川羡魚不如歸而結罔師古曰言成帝追觀先代遺迹思欲齊其徳號故雄勸令自興至治以儗帝皇之風還上河東賦以勸其辭曰伊年暮春将􅄟后土師古曰伊是也謂是祠甘泉之年也祭地曰瘞薶故曰瘞后土􅄟音乙例反禮靈祗謁汾陰于東郊師古曰京師之東故曰東郊也因兹以勒崇垂鴻發祥隤祉欽若神}
