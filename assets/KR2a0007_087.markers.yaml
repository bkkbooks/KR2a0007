  - {type: variant, offset: 3716, length: 0, content: '', WYG: 皆善也本諸身譔修身第三宋祁曰法言億作意温公云咸感也人欲陳施其意治化天下動而不能感人者蓋由外逐浮偽内無本真不能正已以正物故當必本諸身也芒芒天道在昔聖考李竒曰聖人能成天道宋祁曰宋咸天作大過則失中不及則不至不可姦罔蘇林曰罔誣也言不可作姦誣於聖道譔問道第四神心曶怳經緯萬方師古曰曶讀與忽同蕭該音義曰怳音􅩛韋昭熈放反該案今音况為是事繫諸道德仁誼禮譔問神第五明哲煌煌旁燭無疆師古曰煌煌盛貌也燭照也無疆猶無極也遜于不虞以保天命李竒曰常行遜順備不虞譔問明第六假言周于天地贊于神明師古曰假至也宋祁曰司馬温公云李宗吳皆作遐光謂當作假劉敞曰案本書云}
  - {type: page-break, offset: 3716, content: '', id: KR2a0007_WYG_087-65a, image: WYG0251/WYG0251-0006a.png}
  - {type: variant, offset: 3716, length: 0, content: '', krp: 皆善也本諸身譔修身第三宋祁曰法言億作意温公云咸感也人欲陳施其意治化天下動而不能感人者蓋由外逐浮偽内無本真不能正已以正物故當必本諸身也芒芒天道在昔聖考李竒曰聖人能成天道宋祁曰宋咸天作大過則失中不及則不至不可姦罔蘇林曰罔誣也言不可作姦誣於聖道譔問道第四神心曶怳經緯萬方師古曰曶讀與忽同蕭該音義曰怳音􅩛韋昭熈放反該案今音况為是事繫諸道德仁誼禮譔問神第五明哲煌煌旁燭無疆師古曰煌煌盛貌也燭照也無疆猶無極也遜于不虞以保天命李竒曰常行遜順備不虞譔問明第六假言周于天地贊于神明師古曰假至也宋祁曰司馬温公云李宗吳皆作遐光謂當作假劉敞曰案本書云}
  - {type: variant, offset: 3717, length: 0, content: '', WYG: 寡見人之好假也則假當從充音遐假即遐也其首章曰吾寡見人之好假也指此矣幽𢎞横廣絶于邇言李竒曰理過近世人之言也譔寡見第七聖人聰明淵懿繼天測靈冠于羣倫經諸范師古曰經常也范法也宋祁曰法言作範譔五百第八鄧展曰五百歳聖人一出立政鼓衆動化天下莫上於中和鄧展曰鼓亦動也中和之𤼵在於哲民情師古曰哲知也宋祁曰司馬温公云哲當作哲晢明也言將𤼵中和之政在先明民情譔先知第九宋祁曰先景本作光仲尼以來國君將相卿士名臣參差不齊師古曰言志業不同也參音􅀄林反壹槩諸聖師古曰以聖人大道槩乎槩音工代反宋祁曰别本注文以字上有一字監本無又平字下當有之字譔重黎第十仲尼之後訖于漢道宋祁曰李軌注法言本訖作迄德行顔閔股肱蕭曹爰及名將尊卑之條稱述品藻師古曰品藻者定其差品及文質譔淵騫第十一宋祁曰李軌注法言本無此序云與重􅀺共序張慈據子厚云漢書淵騫自有序慈疑宏範不見漢書中序故云共序子厚又云或班固所作宋咸云品歴世之臣以淵騫冠章首有意哉子雲也有以長爵之逹弗逮乎廣道之尊乎或云是篇與重􅀺共序然漢書有之疑非揚辭}
