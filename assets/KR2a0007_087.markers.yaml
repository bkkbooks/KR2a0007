  - {type: variant, offset: 367, length: 0, content: '', WYG: 羣龍張晏曰乾六爻悉稱龍也麗鉤芒與驂蓐收兮服𤣥㝠及祝融師古曰鉤芒東方神蓐收西方神𤣥㝠北方神祝融南方神麗並駕也驂三馬也言皆役服也宋祁曰驂字可删服字當作驂蕭該音義曰麗按韋昭作儷儷偶也敦衆神使式道兮奮六經以攄頌師古曰敦勉也式表也六經謂易詩書春秋}
  - {type: variant, offset: 367, length: 0, content: '', krp: 羣龍張晏曰乾六爻悉稱龍也麗鉤芒與驂蓐收兮服𤣥㝠及祝融師古曰鉤芒東方神蓐收西方神𤣥㝠北方神祝融南方神麗並駕也驂三馬也言皆役服也宋祁曰驂字可删服字當作驂蕭該音義曰麗按韋昭作儷儷偶也敦衆神使式道兮奮六經以攄頌師古曰敦勉也式表也六經謂易詩書春秋}
  - {type: variant, offset: 368, length: 0, content: '', WYG: 樂也攄散也頌謂詩頌所以美盛徳之形容也言發其志而為歌頌也攄音丑於反頌讀曰容隃於穆之緝熙兮過清廟之雝雝師古曰周頌清廟之詩云於穆清廟肅雍顯相昊天有成命之詩曰於緝熙言漢徳之盛皆過之也隃讀與踰同於讀曰烏軼五帝之遐迹兮躡三皇之高蹤師古曰軼亦過也音逸既發軔於平盈兮誰謂路逺而不能從服䖍曰軔止車之木將行故發去平盈之地無高下也師古曰軔音刃蕭該音義曰軔如戰反其十二月羽獵服䖍曰士負羽雄從以為昔在二帝三王應劭曰二帝堯舜三王夏殷周宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖廚而已師古曰財讀與纔同御待也充當也蕭該音義曰林麓字林守山澤吏御五舉反不奪百姓膏腴榖土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐應劭曰爾雅廟中路謂之唐鳳凰巢其樹黄龍游其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂師古曰益臣名也任以為虞虞主山澤之官也上山也下平地也􅋄古草字宋祁曰益韋昭作古益字成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也師古曰裕饒也宋祁曰大字上當有泰字武帝廣開上林南至宜春鼎胡御宿昆吾晉灼曰鼎胡宫也黄圗以為在藍田昆吾地名也有亭師古曰宜春近下杜御宿在樊圃西也宋祁曰御蕭該音義曰案說文曰籞禁苑也牛呂反注文樊圃西姚本圃作川旁南山而西至長楊五柞師古曰旁音步浪反北繞黄山瀕渭而東師古曰循渭水涯而東也瀕音頻又音賔周袤數百里師古曰袤長也音茂穿昆明池象滇河師古曰滇音丁賢反宋祁曰賢一作𤣥營建章鳳闕神明馺娑師古曰殿名也馺音先合反娑音先河反漸臺泰液師古曰漸臺在泰液池中漸浸也言為池水所浸也象海水周流方丈瀛洲蓬萊服䖍曰海中三山名}
