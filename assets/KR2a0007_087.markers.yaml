  - {type: variant, offset: 3652, length: 2, content: 竦吾, WYG: 晏曰胥相也靡無也言相師以無為作宰者也寂寞為尸李竒曰道化以寂寞為主大味必淡大音必希師古曰淡謂無主味也音徒濫反大語呌呌大道􅊠回師古曰呌呌遠聲也􅊠回紆衍也是以聲之眇者不可同於衆人之耳眇讀曰妙形之美者不可棍於世俗之目師古曰棍亦同也音胡本反辭之衍者不可齊於庸人之聽師古曰衍旁廣也今夫弦者髙張急徽追趨逐耆則坐者不期而附矣師古曰徽琴徽也所以表𤼵撫抑之處也追趨逐耆隨所趨嚮愛嗜而追逐之也趨讀曰趣耆讀曰嗜試為之施咸池揄六莖𤼵簫韶詠九成則莫有和也師古曰揄引也和應也揄音踰和音胡臥反是故鍾期死伯牙絶絃破琴而不肯}
