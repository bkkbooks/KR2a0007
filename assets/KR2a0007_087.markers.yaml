  - {type: variant, offset: 2477, length: 234, content: 居位爵祿賂遣所得亦緣手盡既退居里巷時五侯皆已死年老失勢賓客益衰至王莽篡位以舊恩召見護封為樓舊里附城而成都侯商子邑為大司空貴重商故人皆敬事邑唯護自安如舊節邑亦父事之不敢有闕時請召賓客邑居樽下稱賤子上壽坐者百數皆離席伏護獨東鄉正坐字謂邑曰公子貴如何初護有故人呂公無子歸護護身與呂公妻與呂嫗同食及護家居妻子頗厭呂公護聞之流涕責其妻子曰呂公以故舊窮老託身於我義所當奉遂養呂公終身護卒子嗣其爵陳遵字孟公杜陵人也祖父遂字長子宣帝微時與有故相隨博弈數負進及宣帝即位用遂稍遷至太原太守, WYG: 末篇}
