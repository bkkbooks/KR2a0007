  - {type: variant, offset: 247, length: 1, content: 匡, WYG: 處故曰陽靈之宫也宋祁曰諸詮云齊沮諧反李善云韓康伯周易注曰洗心曰齊側皆反靡薜荔而為席兮折瓊枝以為芳師古曰靡纎密也謂纎織之也一曰靡謂偃而靡之藉地也噏青雲之流瑕兮飲若木之露英師古曰言其齋戒自新居處飲食皆芳絜也瑕謂日旁赤氣也露英言其英華之露集虖禮神之囿登乎頌祗之堂師古曰頌歌也登以祭也地神曰祗建光燿之長旓兮昭華覆之威威服䖍曰昭明也華覆華蓋也師古曰威威猶威蕤也旓旗之旒也一曰燕尾旓音所交反攀琁璣而下視兮行遊目虖三危陳衆車於東阬兮肆玉釱而下馳漂龍淵而還九垠兮窺地底而上回張晏曰三危山名也晉灼曰􅎂車轄也九垠九垓也師古曰假設言周流曠逺升降天地為神通一也肆放也阬大阜也讀與岡同􅎂音大又音弟還讀曰旋宋祁曰張銑曰琁璣北斗也晉灼曰阬古坑字也字書曰阬閬也口盎反注文為神通一也為當作與一字當刪風傱傱而扶轄兮鸞鳯紛其御蕤師古曰傱傱前進之意也御猶乗也蕤車之垂飾纓蕤也傱音竦今書御字或作衘者俗妄}
  - {type: page-break, offset: 247, content: '', id: KR2a0007_WYG_087-19b, image: WYG0250/WYG0250-0736b.png}
