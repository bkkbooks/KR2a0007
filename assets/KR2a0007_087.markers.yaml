  - {type: variant, offset: 197, length: 1, content: 急, WYG: 道壇曼然廣大又列樹辛夷於林薄之間也草藂生曰薄新雉即辛夷耳為樹甚大非香草也其木枝葉皆芳一名新矧壇音徒旦反曼音莫旦反宋祁曰雉當作夷學林云周禮薙氏掌殺草鄭氏注云薙或作夷引春秋傳曰如農夫之務去草芟夷藴崇之又音鬀然則雄賦本用薙為夷而又省薙之草止用雉字耳攅并閭與苃䒷兮紛被麗其亡鄂如淳曰并閭其葉随時改政平則平政不平則傾也師古曰如氏所説自是平慮耳此并閭謂㯶𣗳也苃䒷草名也鄂垠也苃音歩末反䒷音括被音皮義反麗讀如本字被麗又音披離崇丘陵之駊騀兮深溝嶔巖而為谷蘇林曰駊騀音叵我師古曰駊騀高大状也嶔巖深險貌也嶔音口銜反宋祁曰别本口作已􅉨􅉨離宮般以相燭兮封巒石闗施靡虖延屬應劭曰言秦離宫三百武帝復往往修治之師古曰􅉨古往字往往言所往之處則有之般連貌也燭照也封巒石關皆宫名也施靡相及貌屬連也般音盤施音弋爾反屬音之欲反於是大夏雲譎波詭嶊嶉而成觀孟康曰言夏屋變巧廼為雲氣水波相譎詭也嶊嶉材木之崇積貌也晉灼曰嶊音䞓水反師古曰嶊音子水反觀謂形也音工喚反䞓音丑成反仰撟首以高視兮目㝠眴而亡見師古曰撟舉也㝠眴視不諦也撟與矯同其字從手㝠音莫見反眴音州縣之縣正瀏濫以𢎞惝兮指東西之漫漫服䖍曰惝音敞師古曰瀏濫猶汎濫𢎞惝髙大也漫漫長也瀏音劉韋昭瀏劉又反濫音灠徒回回以徨徨兮魂固眇眇而昏亂師古曰言駭其深博據軨軒而周流兮忽軮軋而亡垠師古曰軨軒謂前軒之軨也軨者軒間小木也字與櫺同周流周視也軮軋逺相映也軨音零軮音烏朗反軋音於黠反翠玉樹之青䓤兮壁馬犀之瞵㻞應劭曰瞵音鄰晉灼曰㻞音豳師古曰玉樹者武帝所作集衆寳為之用供神也非謂自然生之而左思不曉其意以為非本土所出盖失之矣馬犀者馬腦及犀角也以此二種飾殿之壁瞵㻞文貌蕭該音義曰該案字畫瞵㻞采色也當從玉旁粦宋祁曰學林云此傳作壁師古訓為殿壁文選作璧五臣訓為璧玉其義迥不同賦曰抑矯首以高視兮目㝠眴而亡見正瀏濫以𢎞敞兮指東西之漫漫徒回回以皇皇兮魂魄眇眇而昏亂據軨軒兩周流兮忽軮軋而亡垠翠玉樹之青葱兮璧馬犀之瞵㻞金人仡仡其承鍾簴兮嵌巖巖其龍鱗凡此}
