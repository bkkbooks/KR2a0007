  - {type: variant, offset: 222, length: 1, content: 背, WYG: 事變物化目駭耳回師古曰言驚視聽也蓋天子穆然珍臺閒館琁題玉英蜵蜎蠖濩之中應劭曰題頭也榱椽之頭皆以玉飾言其英華相燭也張晏曰蜵蜎蠖濩刻鏤之形師古曰穆然天子之容也蜵蜎蠖濩言屋中之深廣也閒讀曰閑蜵音一兖反蜎音下兖反蠖音烏郭反濩音胡郭反蕭該音義曰琁題案左思蜀都賦曰金鋪相映玉題交輝是也蜵蜎予案字書蜵蜎好印也上一甸反下一軟反惟夫所以澄心清魂儲精垂思師古曰言絜精以待兾神降福感動天地逆釐三神者師古曰釐讀曰禧禧福也宋祁曰三神天地人也廼搜逑索耦臯伊之徒冠倫魁應劭曰冠其羣倫魁桀也師古曰言選擇賢臣可匹耦於古賢臯陶伊尹之類冠等倫而魁桀宋祁曰搜逑淳化本作披求刋誤謂求當從辵蕭本同校本作逑又注末當有者字能函甘棠之惠挾東征之意師古曰甘棠之惠召}
