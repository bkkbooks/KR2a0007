  - {type: variant, offset: 4134, length: 0, content: '', WYG: 過於五經自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人師古曰詭違也聖人謂周公孔子若使遭遇時君更閲賢知為所稱善師古曰更音工衡反則必度越諸子矣師古曰度過也諸儒或譏以為雄非聖人而作經猶春秋吳楚之君􅆫號稱王蓋誅絶之罪也師古曰絶謂無􅏷嗣也劉敞曰絶讀如春秋貶絶之絶自雄之沒至今四十餘年其法言大行而𤣥終不顯然篇籍具存}
