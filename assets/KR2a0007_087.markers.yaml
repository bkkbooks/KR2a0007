  - {type: variant, offset: 3649, length: 1, content: 常, krp: 塗盖難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深師古曰麗著也日月星辰之所著也彌廣也普遍也昔人之辭廼玉廼金師古曰貞實美麗如金玉也彼豈好為艱難哉埶不得已也師古曰已止也獨不見夫翠虯絳螭之將登虖天師古曰虯螭觧並在前必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎師古曰撠挶也膠葛上清之氣也騰升也九閎九天之門撠音㦸挶音居足反蕭該音義曰撠如淳曰撠著也膠葛大也韋昭曰撠音據畧反字林撠挶也挶撠持也撠音㦸日月之經不千里則不能燭六合燿八紘師古曰燭照也六合}
  - {type: variant, offset: 3651, length: 0, content: '', WYG: 天地四方八紘八方之綱維也紘音宏泰山之高不嶕嶢則不能浡滃雲而散歊烝師古曰嶕嶢髙皃也浡滃盛也滃雲氣皃歊烝氣上出也嶕嶢音樵堯浡音勃滃音一孔反歊音許照反宋祁曰蕭該音義曰韋昭曰歊氣之𤼵見者也注文許照當作許昭是以宓犧氏之作易也師古曰宓音伏緜絡天地經以八卦文王附六爻師古曰因而重之孔子錯其象而彖其辭然後發天地之臧定萬物之基宋祁曰然後字下當有能字典謨之篇雅頌之聲不温純深潤則不足以揚鴻烈而章緝熈師古曰造化鴻大也烈業也緝熈光明也蓋胥靡為宰李竒曰造化之神宰割萬物也}
