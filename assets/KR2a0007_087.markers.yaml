  - {type: variant, offset: 390, length: 0, content: '', WYG: 能入水取物凌堅冰犯嚴淵探巖排碕薄索蛟螭師古曰嚴言不可犯也巖水岸嶔巖之處也碕曲岸也薄迫也索搜求也碕音鉅依反嶔音口反蕭該音義曰探字林曰逺取也薄索諸詮上音博下音桑各反蹈獱獺據黿鼉蘇林曰獱音賔師古曰􅆩形如狗在水中食魚獱小􅆩也􅆩音它曷反抾靈蠵鄭氏曰抾音怯應劭曰蠵大龜也雄曰毒冒雌曰觜蠵師古曰抾挹取也又音袪蠵音弋随反又音攜蕭該音義曰蠵字林曰龜也以胃鳴入洞穴出蒼梧晉灼曰洞穴禹穴也師古曰洞通也宋祁曰李善云郭璞山海經注曰呉縣南太湖中有包山山下有洞庭道也言潜行水底無所不通也乗鉅鱗騎京魚師古曰京大也或讀為鯨鯨大魚也浮彭蠡目有虞應劭曰彭蠡大澤在豫章師古曰目猶視也望也有虞謂舜陟方在江南言遥望也方椎夜光之流離剖明月之珠胎師古曰珠在蛤中若懷姙然故謂之胎也椎音直佳反其字從木鞭洛水之虙妃餉屈原與彭胥師古曰彭彭咸胥伍子胥皆水死者虙讀曰伏於兹虖鴻生鉅儒俄軒冕雜衣裳師古曰俄俄陳舉之貌雜者言衣與裳皆雜色也修唐典匡雅頌揖讓於前師古曰匡正也昭光振燿蠁曶如神師古曰蠁與嚮同曶與忽同仁聲惠於北狄武義動於南鄰師古曰南方有金鄰之國極逺也故云南鄰一曰鄰邑也是以旃裘之王胡貉之長移珍來享抗手稱臣如淳曰以物與人曰移師古曰貉東北夷也享獻也抗舉手也言其肅恭合掌}
