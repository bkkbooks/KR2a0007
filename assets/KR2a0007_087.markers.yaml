  - {type: variant, offset: 250, length: 0, content: '', WYG: 宋祁曰注文纓蕤字上當有若字傱鄭氏音揔梁弱水之濎濴兮躡不周之逶蛇服䖍曰昆侖之東有弱水度之若濎濴耳師古曰濎濴小水之貌不周山名逶蛇亦言不艱難也濎音吐定反濴音熒又音胡鎣反蛇音移想西王母欣然而上夀兮屏玉女而卻虙妃師古曰西王母在西方周穆王所見者也玉女虙妃皆神女也虙讀曰伏玉女無所眺其清盧兮虙妃曾不得施其䖸睂服䖍曰盧目童子也宋祁曰監本作玉女欣眺浙本無作亡方擥道徳之精剛兮侔神明與之為資晉灼曰等天地之瓉量也師古曰擥總也音覽其字從手宋祁曰瓉量當作忖量擥力敢反於}
  - {type: page-break, offset: 250, content: '', id: KR2a0007_WYG_087-20a, image: WYG0250/WYG0250-0736c.png}
  - {type: variant, offset: 250, length: 0, content: '', krp: 宋祁曰注文纓蕤字上當有若字傱鄭氏音揔梁弱水之濎濴兮躡不周之逶蛇服䖍曰昆侖之東有弱水度之若濎濴耳師古曰濎濴小水之貌不周山名逶蛇亦言不艱難也濎音吐定反濴音熒又音胡鎣反蛇音移想西王母欣然而上夀兮屏玉女而卻虙妃師古曰西王母在西方周穆王所見者也玉女虙妃皆神女也虙讀曰伏玉女無所眺其清盧兮虙妃曾不得施其䖸睂服䖍曰盧目童子也宋祁曰監本作玉女欣眺浙本無作亡方擥道徳之精剛兮侔神明與之為資晉灼曰等天地之瓉量也師古曰擥總也音覽其字從手宋祁曰瓉量當作忖量擥力敢反於}
  - {type: variant, offset: 251, length: 0, content: '', WYG: 欽祡宗祈燎熏皇天師古曰欽敬也祡積祡也宗尊也祈求福也招繇泰壹舉洪頥樹靈旗張晏曰招揺泰壹皆神名也服䖍曰洪頥旗名也李奇曰欲伐南越告祈太一畫旗樹太一壇上名靈旗以指所伐之國也見郊祀志宋祁曰招繇一本作臯陶晉灼音義作臯揺蕭該音義曰如淳作臯揺云臯楔橰積柴於招揺頭致牲玉於其上舉而燒之欲其近天也}
  - {type: variant, offset: 251, length: 0, content: '', krp: 欽祡宗祈燎熏皇天師古曰欽敬也祡積祡也宗尊也祈求福也招繇泰壹舉洪頥樹靈旗張晏曰招揺泰壹皆神名也服䖍曰洪頥旗名也李奇曰欲伐南越告祈太一畫旗樹太一壇上名靈旗以指所伐之國也見郊祀志宋祁曰招繇一本作臯陶晉灼音義作臯揺蕭該音義曰如淳作臯揺云臯楔橰積柴於招揺頭致牲玉於其上舉而燒之欲其近天也}
  - {type: variant, offset: 252, length: 0, content: '', WYG: 曰臯揺樵蒸焜上配藜四施張晏曰配藜披離也師古曰樵木薪也蒸麻幹也焜同也言以樵及蒸燒火炎上於天又披離四出蕭該音義曰焜音昆火貌也配藜如淳曰黎為火正能使火氣施四裔也東燭倉海西燿流沙北爌幽都南煬丹厓服䖍曰丹厓丹水之厓也師古曰爌古晃字煬熱也言祡燎之光逺及四表也煬音弋向反宋祁曰浙本爌作熿𤣥瓚觩䚧秬鬯泔淡服䖍曰以𤣥玉飾之故曰𤣥瓚張晏曰瓚受五升口徑八寸以圭為柄用灌鬯觩䚧其貌也應劭曰泔淡满也師古曰觩音虯䚧音力幽反泔音胡感反淡音大敢反宋祁曰泔淡美味也注文以圭字下别本有文字一作大字肸嚮豐融懿懿芬芬師古曰言秬鬯之芬烈也炎感黄龍兮熛訛碩麟師古曰言光炎熛盛感神物也訛化也碩大也熛音必遥反宋祁曰蕭該音義本炎字作煙選巫咸兮呌帝閽開天庭兮延羣神服䖍曰令巫祝呌呼天門也師古曰巫咸古神巫之名儐暗藹兮降清壇瑞穰穰兮委如山張晏曰儐贊也師古曰暗藹神之形影也穰穰多也委積也暗音烏感反蕭該音義曰儐甫刃反於是事畢功𢎞回車而歸度三巒兮偈棠棃師古曰三巒即封巒觀名也棠棃宫名偈讀曰憇天閫決兮地垠開八荒協兮萬國諧師古曰天閫天門之閫也決亦開也言德澤普洽無極限也登長平兮雷鼓磕天聲起兮勇士厲師古曰長平涇水上坂名也磕擊鼓聲也天聲聲至天也聲字或作嚴言擊嚴鼓也厲奮也蕭該音義曰磕口蓋反又口艾反李善曰字指大聲也雲飛揚兮雨滂沛于胥德兮麗萬世師古曰于曰也胥皆也麗美也沛音普大反亂曰師古曰亂者理也縂理一賦之終也崇崇圜丘􅂭隠天兮師古曰言其高登降峛崺單埢垣兮師古曰峛崺上下之道也單周也埢垣圜貌也峛音力尒反崺音弋尒反單音蟬埢音拳蕭該音義曰字林峛崺沙邱也增宫㠁差駢嵯峨兮師古曰增重也㠁差不齊也駢並也㠁音初林反駢音歩千反嵯音材何反峨音娥岭巆嶙峋洞亡厓兮師古曰岭巆深􅃉貌嶙峋節級貌岭音零巆音營嶙音隣峋音荀宋祁曰李善云埤蒼曰岭巆嶙峋深無厓之貌刋誤云据史館本改嶙峋上天之縡杳旭卉兮師古曰縡事也杳高逺也旭卉速疾也縡讀與載同宋祁曰縡財}
