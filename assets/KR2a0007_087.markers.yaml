  - {type: variant, offset: 202, length: 0, content: '', WYG: 也天帝神在其上洪臺掘其獨出兮㨖北極之嶟嶟應劭曰掘特貌也㨖至也晉灼曰嶟嶟穊㨖也師古曰言髙臺特出乃至北極其状竦峭嶟嶟然也掘音其勿反㨖音竹指反嶟音干旬反又音遵宋祁曰㨖字書竹几反韋昭知已反嶟嶟字林曰山貌穊㮹姚本作穊緻列宿乃施於上榮兮日月纔經於柍桭服䖍曰柍中央也桭屋梠也師古曰施延也榮屋翼也凡此者言屋宇高大之甚施音弋豉反柍音央桭音辰一曰施直謂安施音之耳讀如本字宋祁曰姚本刪音字纔韋昭仕兼反蕭該音義柍於兩反又於郎反桭之人反雷鬱律而巖突兮電倐忽於牆藩師古曰鬱律雷聲也倐忽電光也藩藩籬也倐音式六反藩音甫元反宋祁曰而字當作於鬼魅不能自還兮半長途而下顛師古曰言屋之髙深雖鬼魅亦不能至其極而反故於長途之半而顛墜也還讀曰旋或作建建及也歴倒景而絶飛梁兮浮蔑蠓而撇天晉灼曰飛梁浮道之橋也蔑蠓蚊也師古曰撇猶拂也蠓音莫孔反撇音匹列反又音普結反左欃槍右𤣥㝠兮前熛闕後應門晉灼曰大人賦檻欃槍以為旌又曰左𤣥㝠而右黔雷雄擬相如故云􅈛熛闕赤色之闕南方之帝曰赤熛怒應門正在熛闕之内也師古曰熛音匹遥反宋祁曰浙本右字後字上皆有而字注文旌攷作旗姚本熛必遥反隂西海與幽都兮涌醴汨以生川如淳曰言闕之髙廼隂西海也師古曰䕃映西海也以及幽都幽都北方絶逺之地也涌醴醴泉涌出汨汨然也汨音于筆反蛟龍連蜷於東厓兮白虎敦圉虖昆侖師古曰連蜷卷曲貌敦圉盛怒也言甘泉宫中皆有此象也蜷音拳敦音屯覽樛流於高光兮溶方皇於西清服䖍曰高光宫名也師古曰樛流屈折也溶然閑暇貌也方皇彷徨也西清西箱清閒之處也溶音容宋祁曰樛}
