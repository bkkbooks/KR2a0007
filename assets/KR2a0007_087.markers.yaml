  - {type: variant, offset: 1885, length: 359, content: 與章章不受賓客或問其故章歎曰吾以布衣見哀於石君石君家破不能有以安也而受其財物此為石氏之禍萭氏反當以為福邪諸公以是服而稱之河平中王尊為京兆尹捕擊豪俠殺章及箭張回酒市趙君都賈子光皆長安名豪報仇怨養刺客者也樓護字君卿齊人父世醫也護少隨父為醫長安出入貴戚家護誦醫經本章方術數十萬言長者咸愛重之共謂曰以君卿之材何不宦學乎繇是辭其父學經傳為京兆吏數年甚得名譽是時王氏方盛賓客滿門五侯兄弟爭名其客各有所厚不得左右唯護盡入其門咸得其驩心結士大夫無所不傾其交長者尤見親而敬眾以是服為人短小精辯論議常依名節聽之者皆竦與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿脣舌言其見信用也母死送葬者致車二三千兩閭里歌之曰五侯治喪樓君卿久之平阿侯舉護方正為諫大夫使郡國護假貸多持幣帛過齊上書求上先人冢因會宗族故人各以親疏與束帛一日散百金之費使還奏事稱意擢, WYG: ''}
