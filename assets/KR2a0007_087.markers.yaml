  - {type: variant, offset: 203, length: 2, content: 侯顯, WYG: 詮賦音株溶字林弋冢反前殿崔巍兮和氏瓏玲孟康曰以和氏璧為梁壁帯也其聲瓏玲也晉灼曰以黄金為壁帯含藍田璧瓏玲明見貌也師古曰崔嵬高貌瓏玲晉説是也崔音才回反巍音五回反瓏音聾玲音零宋祁曰瓏玲字林曰瓏禱旱玉為瓏又音龍吕氏春秋曰大旱用瓏玲炕浮柱之飛榱兮神莫莫而扶傾師古曰炕與抗同抗舉也榱屋椽也言舉立浮柱而鴐飛榱其形危竦有神於㝠莫之中扶持故不傾也宋祁曰李善曰毛詩云君婦莫莫毛萇云莫莫清淨也閌閬閬其廖廓兮似紫宫之崢巆師古曰閌高門貌閬閬空虗也寥廓宏逺也􅂵宫天帝之宫也崢巆深䆳也閌音抗閬音浪寥音僚崢音仕耕反巆音宏駢交錯而曼衍兮㟎􅟬隗虖其相嬰師古曰言宫室臺觀相連不絶也㟎安施之貌􅟬隗猶崔嵬也衍音亦戰反㟎音它賄反􅟬音辠隗音五賄反蕭該音義曰㟎案字書勑果反􅟬音罪乗雲閣而上下兮紛蒙籠以棍成師古曰乗登也雲閣亦言其高入於雲也䝉籠深通貌棍成言其有若自然也棍音胡本反曳紅采之流離兮颺翠氣之􅁈延師古曰言宫室曠大自然有紅翠之氣蕭該音義曰寃於元反襲琁室與傾宫兮若登高妙逺肅虖臨淵服䖍曰襲繼也桀作琁室紂作傾宫以此㣲諌也應劭曰登高逺望當以亡國為戒若臨深淵也宋祁曰妙一作眇逺字下當有亡國字回猋肆其碭駭兮翍桂椒鬰栘楊師古曰回猋回風也肆放也碭過也駭動也翍古披字鬰聚也栘唐棣也楊楊樹也言回風放起過動衆樹則桂椒披散而栘楊鬰聚也碭音徒浪反栘音移宋祁曰浙本椒字下有而字香芬茀以窮􅂭兮擊薄櫨而將榮師古曰言桂椒香氣乃擊薄櫨及屋翼也薄枅也櫨音盧蕭該音義曰薄櫨字林曰柱袝也學林云欂弼㦸切通用薄字一作平㦸反薌呹肸以掍根兮聲駍隐而歴鍾師古曰又言風之動樹聲響振起衆根合駍隐而盛歴入殿上之鍾也根猶株也薌讀與響同呹音丑乙反肸音許乙反掍音下本反駍音普耕反蕭該音義曰呹别本丑乙反文選余日反肸别本作盱靈乞反案今漢書本旴或作􅆄者傳寫之誤宋祁曰注文合字下當有同字排玉戸而颺金鋪兮發蘭蕙與穹窮李竒曰鋪門首也師古曰言風之所至又排門揚鋪擊動鍰鈕回旋入宫𤼵奮衆芳惟弸彋其拂汨兮稍暗暗而靚深蘇林曰弸音石堕井弸尒之弸彋音宏孟康曰弸彋風吹帷帳鼓貌師古曰拂汨亦風動貌暗暗幽隐靚即静字耳弸音普萌反拂音普密反汨音于密反暗音烏感反蕭該音義曰弸文萌反彋音宏拂芳勿反陰陽清濁穆羽相和兮若䕫牙之調琴張晏曰聲細不過羽穆然相和也師古曰䕫舜典樂也牙伯牙也般倕弃其剞劂兮王爾􅄬其鉤繩應劭曰剞曲刄也劂曲鑿也師古曰般公輸般也倕共工也王爾亦巧人也見淮南子言土木之功窮極巧麗故令般倕之徒弃其常法也般讀與班同倕音垂剞音居爾反劂音居衛反宋祁曰剞劂當作掎劌注文倕字下當有舜字雖方征僑與偓佺兮猶仿佛其若夢晉灼曰方常也征行也言宫觀之高峻雖使仙人常行其上恐遽不識其形觀猶仿佛若夢也師古曰方謂並行也征僑姓征}
