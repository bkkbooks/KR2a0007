  - {type: variant, offset: 8300, length: 1, content: 即, WYG: 侯者二人服䖍曰吕后兄周吕侯澤建成侯釋之師古曰與讀曰豫言豫其功也故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸吕王陵廷爭孝景將侯王氏修侯犯色師古曰修音條卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋襃紀之義應劭曰春秋天子將納后於紀紀本子爵也故先襃為侯言王者不取於小國}
  - {type: page-break, offset: 8300, content: '', id: KR2a0007_WYG_018-2b, image: WYG0249/WYG0249-0291d.png}
  - {type: variant, offset: 8300, length: 1, content: 即, krp: 侯者二人服䖍曰吕后兄周吕侯澤建成侯釋之師古曰與讀曰豫言豫其功也故誓曰非劉氏不王若有亡功非上所置而侯者天下共誅之是以高后欲王諸吕王陵廷爭孝景將侯王氏修侯犯色師古曰修音條卒用廢黜是後薄昭竇嬰上官衛霍之侯以功受爵其餘后父據春秋襃紀之義應劭曰春秋天子將納后於紀紀本子爵也故先襃為侯言王者不取於小國}
  - {type: variant, offset: 8302, length: 1, content: 位, WYG: 舅緣大雅申伯之意應劭曰申伯周宣王元舅也為邑於謝後世欲光寵外親者緣申伯之恩援}
  - {type: variant, offset: 8302, length: 1, content: 位, krp: 舅緣大雅申伯之意應劭曰申伯周宣王元舅也為邑於謝後世欲光寵外親者緣申伯之恩援}
