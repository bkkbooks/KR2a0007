  - {type: variant, offset: 11447, length: 1095, content: 九尺所占曰月食填星流民千里河平元年二月流民入函谷關河平二年十月下旬填星在東井軒轅南耑大星尺餘歲星在其西北尺所熒惑在其西北二尺所皆從西方來填星貫輿鬼先到歲星次熒惑亦貫輿鬼十一月上旬歲星熒惑西去填星皆西北逆行占曰三星若合是謂驚位是謂絕行外內有兵與喪改立王公其十一月丁巳夜郎王歆大逆不道牂柯太守立捕殺歆三年九月甲戌東郡莊平男子侯母辟兄弟五人群黨為盜攻燔官寺縛縣長吏盜取印綬自稱將軍三月辛卯左將軍千秋卒右將軍史丹為左將軍四年四月戊申梁王賀薨陽朔元年七月壬子月犯心星占曰其國有憂若有大喪房心為宋今楚地十一月辛未楚王友薨四年閏月庚午飛星大如缶出西南入斗下占曰漢使匈奴明年鴻嘉元年正月匈奴單于雕陶莫皋死五月甲午遣中郎將楊興使弔永始二年二月癸未夜東方有赤色大三四圍長二三丈索索如樹南方有大四五圍下行十餘丈皆不至地滅占曰東方客之變氣狀如樹木以此知四方欲動者明年十二月己卯尉氏男子樊並等謀反賊殺陳留太守嚴普及吏民出囚徒取庫兵劫略令丞自稱將軍皆誅死庚子山陽鐵官亡徒蘇令等殺傷吏民篡出囚徒取庫兵聚黨數百人為大賊踰年經歷郡國四十餘一日有兩氣同時起並見而並令等同月俱發也元延元年四月丁酉日餔時天暒晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如雞子燿燿如雨下至昏止郡國皆言星隕春秋星隕如雨為王者失勢諸侯起伯之異也其後王莽遂顓國柄王氏之興萌於成帝時景祐殿本都有時字是以有星隕之變後莽遂篡國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵侯淳于長坐執左道下獄死二年春熒惑守心二月乙丑丞相翟方進欲塞災異自殺二景祐殿本都作三朱一新說作三是三景祐殿本都作三朱一新說作三是月丙戌宮車晏駕哀帝建平元年正月丁未日出時有著天白氣廣如一匹布長十餘丈西南行讙如雷西南行一刻而止名曰天狗傳曰言之不從則有犬禍詩妖到其四年正月二月三月民相驚動讙譁奔走傳行詔籌祠西王母又曰從目人當來十二月白氣出西南從地上至天出參下貫天廁廣如一疋布長十餘丈十餘日去占曰天子有陰病其三年十一月壬子太皇太后詔曰皇帝寬仁孝順奉承聖緒靡有解怠而久病未瘳夙夜惟思殆繼體之君不宜改作春秋大復古其復甘泉泰畤汾陰后土如故二年二月彗星出牽牛七十餘日傳曰彗所以除舊布新也牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其出久者為其事大也其六月甲子夏賀良等建言當改元易號增漏刻詔書改建平二年為太初元將景祐殿本都無元將二字通鑑亦無元年號曰陳聖劉太平皇帝刻漏以百二十為度八月丁巳悉復蠲除之賀良及黨與皆伏誅流放其後卒有王莽篡國之禍元壽元年十一月歲星入太微逆行干右執法占曰大臣有憂執法者誅若有罪二年十月戊寅高安侯董賢免大司馬位歸第自殺, WYG: 考證}
