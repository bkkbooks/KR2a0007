  - {type: variant, offset: 8020, length: 250, content: 攘四夷死人如亂麻又熒惑守心及天市芒角色赤如雞血始皇既死適庶相殺二世即位殘骨肉戮將相太白再經天因以張楚並興兵相跆籍秦遂以亡項羽救鉅鹿枉矢西流枉矢所觸天下之所伐射滅亡象也物莫直於矢今蛇行不能直而枉者執矢者亦不正以象項羽執政亂也羽遂合從阬秦人屠咸陽凡枉矢之流以亂伐亂也漢元年十月五星聚於東井以曆推之從歲星也此高皇帝受命之符也故客謂張耳曰東并景祐殿局本都作井王先謙說作井是井景祐殿局本都作井王先謙說作井是秦地漢王入秦五星從歲星聚當以義取天下秦王子嬰降於枳道漢王以屬吏寶器婦女亡所取閉宮封門還軍次于霸上以候諸侯, WYG: 戚}
