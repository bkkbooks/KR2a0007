  - {type: 'tls:seg', offset: 8303, content: '', id: KR2a0007_tls_018-107a.24}
  - {type: variant, offset: 8304, length: 0, content: '', WYG: 義以為諭也􅐛廣博矣師古曰􅐛漸也是以别而敘之右高后十人五人隨父凡十五人右孝文三人右孝景四人右孝武九人三人隨父凡十二人右孝昭六人一人桑樂侯隨父凡七人右孝成十人安成平阿成都紅陽曲陽高平新都武陽八人隨父凡十八人右孝哀十二人新成新都平陽營陵徳五人隨父凡十八人右孝平二十二人卭成博陸宣平紅舞楊􅀈樂陵都成新甫爰氏合陽義陽章鄉信成隨桃襃新賞都十七人隨父繼世凡三十九人師古曰據功臣表及王子侯表平帝時無紅侯唯周勃𤣥孫恭以元始二年紹封絳侯疑紅字當為絳轉寫者誤耳又功臣表作童鄉侯今此作章鄉二表不同亦當有誤也劉攽曰予謂今有虹縣音降然則紅亦有降音也前漢書卷十八前漢書卷十八考證外戚恩澤侯表據春秋褒紀之義臣召南按此據公羊春秋也臨泗侯吕公臣召南按史表所無然漢世后父封侯權輿於此班氏據外戚世家以領此表是也建成康侯釋之以客從擊秦擊秦監本訛數奉從宋本改正扶栁侯吕平師古曰不當姓吕臣召南按史記表作昌平疑昌吕字形相近而轉寫致訛師古謂史家惟記母族恐未然也安平敬侯陽敞按敞姓楊非陽也各本俱訛富平敬侯張安世六世建武中為武始侯臣召南按武始侯之下有今見二字班氏自言作表時此侯現在也監本各本脱去非是洪邁言侯表惟平陽富平二侯書今見可證昌水侯田廣}
