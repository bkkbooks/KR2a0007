  - {type: variant, offset: 104, length: 1640, content: 本在地而上發于天者也政失於此則變見於彼猶景之象形鄉之應聲是以明君覩之而寤飭身正事思其咎謝則禍除而福至自然之符也中宮天極星其一明者泰一之常居也旁三星三公或曰子屬後句四星末大星正妃餘三星後官景祐殿本都作宮朱一新說作宮是宮景祐殿本都作宮朱一新說作宮是之屬也環之匡衛十二星藩臣皆曰紫宮前列直斗口三星隨北耑銳若見若不見曰陰德或曰天一紫宮左三星曰天槍右四星曰天棓後十七星絕漢抵營室曰閣道北斗七星所謂旋璣玉衡以齊七政杓攜龍角衡殷南斗魁枕參首用昏建者杓杓自華以西南夜半建者衡衡殷中州河濟之間平旦建者魁魁海岱以東北也斗為帝車運于中央臨制四海分陰陽建四時均五行移節度定諸紀皆繫於斗斗魁戴筐六星曰文昌宮一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災在魁中貴人之牢魁下六星兩兩而比者曰三能三能色齊君臣和不齊為乖戾柄輔星明近輔臣親彊斥小疏弱杓端有兩星一內為矛招搖一外為盾天蠭有句圜十五星屬杓曰賤人之牢牢中星實則囚多虛則開出天一槍棓矛盾動搖角大兵起東宮蒼龍房心心為明堂大星天王前後星子屬不欲直直王失計房為天府曰天駟其陰右驂旁有兩星曰衿衿北一星曰舝東北曲十二星曰旗旗中四星曰天市天市中星眾者實其中虛則耗房南眾星曰騎官左角理右角將大角者天王帝坐廷其兩旁各有三星鼎足句之曰攝提攝提者直斗杓所指以建時節故曰攝提格亢為宗廟主疾其南北兩大星曰南門氐為天根主疫尾為九子曰君臣斥絕不和箕為敖客后妃之府曰口舌火犯守角則有戟景祐殿本都作戰王先謙說作戰是戰景祐殿本都作戰王先謙說作戰是房心王者惡之南宮朱鳥權衡衡太微三光之廷筐衛十二星藩臣西將東相南四星執法中端門左右掖門掖門內六星諸侯其內五星五帝坐後聚十五星曰哀鳥郎位旁一大星將位也月五星順入軌道司其出所守天子所誅也其逆入若不軌道以所犯名之中坐成形皆群下不從謀也金火尤甚廷藩西有隨星四名曰少微士大夫權軒轅黃龍體前大星女主象旁小星御者後宮屬月五星守犯者如衡占東井為水事火入之一星居其左右天子且以火為敗東井西曲星曰戉北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質火守南北河兵起穀不登故德成衡觀成潢傷成戉禍成井誅成質柳為鳥喙主木草七星頸為員宮主急事張嗉為廚主觴客翼為羽翮主遠客軫為車主風其旁有一小星曰長沙星星不欲明明與四星等若五星入軫中兵大起軫南眾星曰天庫庫有五車車星角若益眾及不具亡處車馬西宮咸池曰天五潢五潢五帝車舍火入旱金兵水水中有三柱柱不具兵起奎曰封豨為溝瀆婁為聚眾胃為天倉其南眾星曰廥積昴曰旄頭胡星也為白衣會畢曰䍐車為邊兵主弋獵其大星旁小星為附耳附耳搖動有讒亂臣在側昴畢間為天街其陰陰國陽陽國參為白虎三星直者是為衡石下有三星銳曰罰為斬艾事其外四星左右肩股也小三星隅置曰觜觿為虎首主葆旅事其南有四星曰天廁天廁下一星曰天矢矢黃則吉青白黑凶其西有句曲九星三處羅列一曰天旗二曰天苑三曰九斿其東有大星曰狼狼角變色多盜賊下有四星曰弧直狼比地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊北宮玄武虛危危為蓋屋虛為哭泣之事其南有眾星曰羽林天軍軍西為壘或曰戉旁一大星北落北落若微亡軍星動角益稀及五星犯北落入軍軍起火金水尤甚火入軍憂水水患木土軍吉危東六星兩兩而比曰司寇營室為清廟曰離宮閣道漢中四星曰天駟旁一星曰王梁王梁策馬車騎滿野旁有八星絕漢曰天橫天橫旁江星江星動以人涉水杵臼四星在危南匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星上將左左將右右將婺女其北織女織女天女孫也歲星曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣罰見歲星歲星所在國不可伐可以伐人超舍而前為贏退舍為縮贏其國有兵不復縮其國有憂其將死國傾敗所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安靜中度吉出入不當其次必有天祅見其舍也歲星贏而東南石氏見彗星甘氏不出三月乃生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月乃生天棓本類星末銳長四尺縮西南石氏見欃雲如牛甘氏不出三月乃生天槍左右銳長數丈縮西北石氏見槍雲如馬甘氏不出三月乃生天欃本類星末銳長數丈石氏槍欃棓彗異狀其殃, WYG: 揆}
