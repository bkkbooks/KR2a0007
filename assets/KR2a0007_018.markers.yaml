  - {type: variant, offset: 8927, length: 1073, content: 敗三國之師于齊咸伏其辜齊王自殺漢兵以水攻趙城城壞王自殺六月立皇子二人楚元王子一人為王王膠西中山楚徙濟北為淄川王淮陽為魯王汝南為江都王七月兵罷天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦吳楚攻梁梁堅城守遂伏尸流血其下三年填星在婁幾入還居奎奎魯也占曰其國得地為得填是歲魯為國四年七月癸未火入東井行陰又以九月己未入輿鬼戊寅出占曰為誅罰又為火災後二年有栗氏事其後未央東闕災中元年填星當在觜觿參去居東井占曰亡地不乃有女憂其三王念孫說中三年在下文則此三年當作二年二王念孫說中三年在下文則此三年當作二年年正月丁亥金木合於觜觿為白衣之會三月丁酉彗星夜見西北色白長丈在觜觿且去益小十五日不見占曰必有破國亂君伏死其辜觜觿梁也其五月甲午金木俱在東井戉殿本作戊戌朱一新說作戊戌是自甲午至戊戌凡五日戊戌殿本作戊戌朱一新說作戊戌是自甲午至戊戌凡五日金去木留守之二十日占曰傷成於戉木為諸侯誅將行於諸侯也其六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁卯在箕北近漢稍小且去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宮也是時梁王欲為漢嗣使人殺漢爭臣袁盎漢桉誅梁大臣斧戉用梁王恐懼布車入關伏斧戉謝罪然後得免中三年十一月庚午夕金火合於虛相去一寸占曰為鑠為喪虛齊也四年四月丙申金木合於東井占曰為白衣之會非景祐殿本都作井井景祐殿本都作井秦也其五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月城陽王濟陰王死六月成陽公主死出入三月天子四衣白臨邸第後元年五月壬午火金合於輿鬼之東北不至柳出輿鬼北可五寸占曰為鑠有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止孝武建元三年三月有星孛於注張歷太微干紫宮至於天漢春秋星孛於北斗齊魯王先慎說魯為宋字之誤按左傳文十四年作宋齊晉之君宋王先慎說魯為宋字之誤按左傳文十四年作宋齊晉之君晉之君皆將死亂今星孛歷五宿其後濟東膠西江都王皆坐法削黜自殺淮陽衡山謀反而誅三年四月有星孛於天紀至織女占曰織女有女變天紀為地震至四年十月而地動其後陳皇后廢六年熒惑守輿鬼占曰為火變有喪是歲高園有火災竇太后崩元光元年六月客星見于房占曰為兵起其二年十一月單于將十萬騎入武州漢遣兵三十餘萬以待之元光中天星盡搖上以問候星者對曰星搖者民勞也後伐四夷百姓勞于兵革元鼎五年太白入于天苑占曰將以馬起兵也一曰馬將以軍而死秏其後以天馬故誅大宛馬大死於軍元鼎中熒惑守南斗占曰熒惑所守為亂賊喪兵守之久其國絕祀南斗越分也其後越相呂嘉殺其王及太后漢兵誅之滅其國元封中星孛于河戍占曰南戍為越門北戍為胡門其後漢兵擊拔朝鮮以為樂浪玄菟郡朝鮮在海中越之象也居北, WYG: 翟}
