  - {type: variant, offset: 2443, length: 5368, content: 人民流亡晝見與日爭明彊國弱小國彊女主昌太白兵象也出而高用兵深吉淺凶埤淺吉深凶行疾用兵疾吉遲凶行遲用兵遲吉疾凶角敢戰吉不敢戰凶擊角所指吉逆之凶進退左右用兵進退左右吉靜凶圜以靜用兵靜吉趮凶出則兵出入則兵入象太白吉反之凶赤角戰太白者猶軍也而熒惑憂也故熒惑從太白軍憂離之軍舒出太白之陰有分軍出其陽有徧將之戰當其行太白還之破軍殺將辰星殺伐之氣戰鬭之象也與太白俱出東方皆赤而角夷狄敗中國勝與太白俱出西方皆赤而角中國敗夷狄勝五星分天之中積于東方中國大利積于西方夷狄用兵者利辰星不出太白為客辰星出太白為主人辰星與太白不相從雖有軍不戰辰星出東方太白出西方若辰星出西方太白出東方為格野雖有兵不戰辰星入太白中五日乃出及入而上出破軍殺將客勝下出客亡地辰星來抵太白不去將死正其上出破軍殺將客勝下出客亡地視其所指以名破軍辰星繞環太白若鬭大戰客勝主人吏死辰星過太白間可椷劍小戰客勝居太白前旬三日軍罷出太白左小戰歷太白右數萬人戰主人吏死出太白右去三尺軍急約戰凡太白所出所直之辰其國為得位得位者戰勝所直之辰順其色而角者勝其色害者敗太白白比狼赤比心黃比參右肩青比參左肩黑比奎大星色勝位行勝色行得盡勝之辰星曰北方冬水知也聽也知虧聽失逆冬令傷水氣罰見辰星出蚤為月食晚為彗星及天祅一時不出其時不和四時不出天下大饑失其時而出為當寒反溫當溫反寒當出不出是謂擊卒兵大起與它星還而鬭天下大亂出於房心間地動填星曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填星乃為之動填星所居國吉未當居而居之若已去而復還居之國得土不乃得女子當居不居既已居之又東西去之國失土不乃失女不有土事若女之憂居宿久國福厚易福薄當居不居為失填其下國可伐得者不可伐其贏為王不寧縮有軍不復一曰既已居之又東西去之其國凶不可舉事用兵失次而上一舍三舍有王命不成不乃大水失次而下二舍有后慼其歲不復不乃天裂若地動凡五星歲與填合則為內亂與辰合則為變謀而更事與熒惑合則為飢為旱與太白合則為白衣之會為水太白在南歲在北名曰牡景祐殿本都作牝注同朱一新說作牝是牝景祐殿本都作牝注同朱一新說作牝是牡年穀大孰太白在北歲在南年或有或亡熒惑與太白合則為喪不可舉事用兵與填合則為憂主孽卿與辰合則為北軍用兵舉事大敗填與辰合則將有覆軍下師與太白合則為疾為內兵辰與太白合則為變謀為兵憂凡歲熒惑填太白四星與辰鬭皆為戰兵不在外皆為內亂一曰火與水合為淬與金合為鑠不可舉事用兵土與金合國亡地與木合則國饑與水合為雍沮不可舉事用兵木與金合鬭國有內亂同舍為合相陵為鬭二星相近者其殃大二星相遠者殃無傷也從七寸以內必之凡月食五星其國必景祐殿本都作皆皆景祐殿本都作皆亡歲以飢熒惑以亂填以殺太白彊國以戰辰以女亂月食大角王者惡之凡五星所聚宿其國王天下從歲以義從熒惑以禮從填以重從太白以兵從辰以法以法者以法致天下也三星若合是謂驚立絕行其國外內有兵與喪民人乏飢改立王公四星若合是謂大湯其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者掩有四方子孫蕃昌亡德受罰離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小其事亦小也凡五星色皆圜白為喪為旱赤中不平為兵青為憂為水黑為疾為多死黃吉皆角赤犯我城黃地之爭白哭泣之聲青有兵憂黑水五星同色天下匽兵百姓安寧歌舞以行不見災疾五穀蕃昌凡五星歲緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不建急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占五星不失行則年穀豐昌凡以宿星通下之變者維星散句星信則地動有星守三淵天下大水地動海魚出紀星散者山崩不即有喪龜鱉星不居漢中川有易者辰星入五車大水熒惑入積水水兵起入積薪旱兵起守之亦然極後有四星名曰句星斗杓後有三星名曰維星散者不相從也三淵蓋五車之三桂也天紀屬貫索積薪在北戍西北積水在北戍東北角亢氐沇州房心豫州尾箕幽州斗江湖牽牛婺女揚州虛危青州營室東壁并州奎婁胃徐州昴畢冀州觜觿參益州東井輿鬼雍州柳七星張三河翼軫荊州甲乙海外日月不占丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷子周丑翟寅趙卯鄭辰邯鄲巳衛午秦未中山申齊酉魯戌吳越亥燕代秦之疆候太白占狼弧吳楚之疆候熒惑占鳥衡燕齊之疆候辰星占虛危宋鄭之疆候歲星占房心晉之疆亦候辰星占參罰及秦并吞三晉燕代自河山以南者中國中國於四海內則在東南為陽陽則日歲星熒惑填星占於街南畢主之其西北則胡貉月氏旃裘引弓之民為陰陰則月太白辰星占於街北昴主之故中國山川東北流其維首在隴蜀尾沒於勃海碣石是以秦晉好用兵復占太白太白主中國而胡貉數侵掠獨占辰星辰星出入趮疾常主夷狄其大經也凡五星早出為贏贏為客晚出為縮縮為主人五星贏縮必有天應見杓太歲在寅曰攝提格歲星正月晨出東方石氏曰名監德在斗牽牛失次杓早水晚旱甘氏在建星婺女太初曆在營室東壁在卯曰單閼二月出石氏曰名降入在婺女虛危甘氏在虛危失次杓有水災太初在奎婁在辰曰執徐三月出石氏曰名青章在營室東壁失次杓早旱晚水甘氏同太初在胃昴在巳曰大荒落四月出石氏曰名路踵在奎婁甘氏同太初在參罰在午曰敦牂五月出石氏曰名啟明在胃昴畢失次杓早旱晚水甘氏同太初在東井輿鬼在未曰協洽六月出石氏曰名長烈在觜觿參甘氏在參罰太初在注張七星在申曰涒灘七月出石氏曰名天晉在東井輿鬼甘氏在弧太初在翼軫在酉曰作詻爾雅作作噩王先謙說爾雅五字漢書無此例非班自注蓋校書者誤加之八月出石氏曰名長壬在柳七星張失次杓有女喪民疾甘氏在注張失次杓有火太初在角亢在戌曰掩茂九月出石氏曰名天睢在翼軫失次杓水甘氏在七星翼太初在氐房心在亥曰大淵獻十月出石氏曰名天皇在角亢始甘氏在軫角亢太初在尾箕在子曰困敦十一月出石氏曰名天宗在氐房始甘氏同太初在建星牽牛在丑曰赤奮若十二月出石氏曰名天昊在尾箕甘氏在心尾太初在婺女虛危甘氏太初曆所以不同者以星贏縮在前各錄後所見也其四星亦略如此古曆五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫曆者正行也古人有言曰天下太平五星循度亡有逆行日不食朔月不食望夏氏日月傳曰日月食盡主位也不盡臣位也星傳曰日者德也月者刑也故曰日食修德月食修刑然而曆紀推月食與二星之逆亡異熒惑主內亂太白主兵月主刑自周室衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變內臣猶不治四夷猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也詩云彼月而食則惟其常此日而食于何不臧詩傳曰月食非常也比之日食猶常也日食則不臧矣謂之小變可也謂之正行非也故熒惑必行十六舍去日遠而顓恣太白出西方進在日前氣盛乃逆行及月必食於望亦誅盛也國皇星大而赤狀類南極所出其下起兵兵彊其衝不利昭明星大而白無角乍上乍下所出國起兵多變五殘星出正東東方之星其狀類辰去地可六丈大而黃六賊星出正南南方之星去地可六丈大而赤數動有光司詭星出正西西方之星去地可六丈大而白類太白咸漢星出正北北方之星去地可六丈大而赤數動察之中青此四星所出非其方其下有兵衝不利四填星出四隅去地可四丈地維臧光亦出四隅去地可二丈若月始出所見下有亂者亡有德者昌燭星狀如太白其出也不行見則滅所燭城邑亂如星非星如雲非雲名曰歸邪歸邪出必有歸國者星者金之散氣其本曰人星眾國吉少則凶漢者亦金散氣其本曰水星多多水少則旱其大經也天鼓有音如雷非雷音在地而下及地其所住者兵發其下天狗狀如大流星有聲共景祐殿局本都作其王先謙說作其是其景祐殿局本都作其王先謙說作其是下止地類狗所墜及望之如火光炎炎中天其下圜如數頃田處上銳見則有黃色千里破軍殺將格澤者如炎火之狀黃白起地而上下大上銳其見也不種而穫不有土功必有大客蚩尤之旗類彗而後曲象旗見則王者征伐四方旬始出於北斗旁狀如雄雞其怒青黑色象伏鱉枉矢狀類大流星虵行而倉黑望如有毛目然長庚廣如一匹布著天此星見起兵星墜至地則石也天暒而見景星景星者德星也其狀無常常出於有道之國日有中道月有九行中道者黃道一曰光道光道北至東井去北極近南至牽牛去北極遠東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛遠極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極遠近之差晷景長短之制也去極遠近難知要以晷景晷景者所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為溫暑陰用事則日退而南晝退而短陰勝故為涼寒也故日進為暑退為寒若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也故曰為寒暑一曰晷長為潦短為旱奢為扶扶者邪臣進而正臣疏君子不足姦人有餘月有九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一決房中道青赤出陽道白黑出陰道若月失節度而妄行出陽道則旱風出陰道則陰雨凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分之星為候日東行星西轉冬至昏奎八度中夏至氐十三度中春分柳一度中秋分牽牛三度七分中此其正行也日行疾則星西轉疾車勢然也故過中則疾君行急之感也不及中則遲君行緩之象也至月行則以晦朔決之日冬則南夏則北冬至於牽牛夏至於東井日之所行為中道月五星皆隨之也箕星為風東北之星也東北地事天位也故易曰東北喪朋及巽在東南為風風陽中之陰大臣之象也其星軫也月去中道移而東北入箕若東南入軫則多風西方為雨雨少陰之位也月去中道移而西入畢則多雨故詩云月離于畢俾滂沱矣言多雨也星傳曰月入畢則將相有以家犯罪者言陰盛也書曰星有好風星有好雨月之從星則以風雨言失中道而東西也故星傳曰月南入牽牛南戒民間疾疫月北入太微出坐北若犯坐則下人謀上一曰月為風雨日為寒溫冬至日南極晷長南不極則溫為害夏至日北極晷短北不極則寒為害故書曰日月之行則有冬有夏也政治變於下日月運於上矣日景祐殿本都作月王先謙說作月是月景祐殿本都作月王先謙說作月是出房北為雨為陰為亂