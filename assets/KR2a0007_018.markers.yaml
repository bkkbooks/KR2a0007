  - {type: variant, offset: 8343, length: 492, content: 孟是時項羽為楚王而漢已定三秦與相距滎陽太白出西方有光幾中是秦地戰將勝而漢國將興也辰星出四孟易主之表也後二年漢滅楚七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為匈奴參為趙畢為邊兵是歲高皇帝自將兵擊匈奴至平城為冒頓單于所圍七日乃解十二年春熒惑守心四月宮車晏駕孝惠二年天開東北廣十餘丈長二十餘丈地動陰有餘天裂陽不足皆下盛彊將害上之變也其後有呂氏之亂孝文後二年正月壬寅天欃夕出西南占曰為兵喪亂其六年十一月匈奴入上郡雲中漢起三軍以衛京師其四月乙巳水木火三合於東井占曰外內有兵與喪改立王公東井秦也八月天狗下梁野是歲誅反者周殷長安市其七年六月文帝崩其十一月戊戌土水合於危占曰為雍沮所當之國不可舉事用兵必受其殃一曰將覆軍危齊也其七月火東行行畢陽環畢東北出而西逆行至昴即南乃東行占曰為喪死寇亂畢昴趙也孝景元年正月癸酉金水合於婺女占曰為變謀為兵憂婺女粵也又為齊其七月乙丑金木水三合於張占曰外內有兵與喪改立王公張周地今之河南也又為楚其二年七月丙子火與水晨出東方因守斗占曰其國絕祀至其十二月水火合於斗占曰為淬不可舉事用兵必受其殃一曰為北軍用兵舉事大敗斗吳也又為粵是歲彗星出西南其三月立六皇子為王王王, WYG: ''}
