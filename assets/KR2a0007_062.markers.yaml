  - {type: variant, offset: 5446, length: 486, content: 庭下竈居樹上又夢大將軍謂顯曰知捕兒不亟下捕之第中鼠暴多與人相觸以尾畫地鴞數鳴殿前樹上第門自壞雲尚冠里宅中門亦壞巷端人共見有人居雲屋上徹瓦投地就視亡有大怪之禹夢車騎聲正讙來捕禹舉家憂愁山曰丞相擅減宗廟羔菟鼃可以此罪也謀令太后為博平君置酒召丞相平恩侯以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為玄菟太守太中大夫任宣為代郡太守山又坐寫祕書顯為上書獻城西第入馬千匹以贖山罪書報聞會事發覺雲山明友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市唯獨霍后廢處昭臺宮與霍氏相連坐誅滅者數千家上乃下詔曰乃者東織室令史張赦使魏郡豪李竟報冠陽侯雲謀為大逆朕以大將軍故抑而不揚冀其自新今大司馬博陸侯禹與母宣成侯夫人顯及從昆弟子冠陽侯雲樂平侯山諸姊妹壻謀為大逆欲詿誤百姓賴宗廟神靈先發得咸伏其辜朕甚悼之諸為霍氏所詿誤事在丙申前未發覺在吏者皆赦除之男子張章先發覺以語期門董忠忠告左曹楊惲惲告侍中金安上惲召見對狀後章上書以聞侍中史高與金安上建發其事言無入霍氏禁闥卒不得遂其謀皆讎有功封章為博成侯忠高昌侯惲平通侯安上都成侯高樂陵侯初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在, WYG: 俗}
