  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_062-bkkpn1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 耀天下復反無名師古曰反還也凡人所生者神也宋祁曰浙本所字下有以字所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉師古曰凡此皆言道家之教為長也太史公既掌天官不治民有子曰遷遷生龍門蘓林曰禹所鑿龍門也師古曰龍門山其東則在今秦州龍門縣北其西則在今同州韓城縣北而河從其中下流耕牧河山之陽師古曰河之北山之南也年十嵗則誦古文二十而南游江淮上㑹稽探禹穴窺九疑張晏曰禹廵狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴九疑舜墓在焉師古曰㑹稽山名本茅山也禹於此㑹諸侯之計因名曰㑹稽九疑山有九峯觧在司馬相如傳浮沅湘師古曰沅水出牂柯湘水出零陵二水皆入江北渉汶泗師古曰汶泗兩水名在地理志汶音問講業齊魯之都觀夫子遺風鄉射鄒嶧師古曰鄒縣名也嶧山名也近曲阜地也於此行鄉射之禮嶧音懌阸困蕃薛彭城師古曰蕃縣名也音反過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略卭筰昆明師古曰筰才各反還報命是嵗天子始建漢家之封而太史公留滯周南如淳曰周南洛陽也張晏曰洛陽而謂周南者自陜以東皆周南之地也不得與從事師古曰與讀曰豫發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎女復為太史則續吾祖矣今天子接千嵗之統封泰山而予不得從行是命也夫命也夫予死爾必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也師古曰此孔子說孝經之辭也夫天下稱周公言其能論歌文武之徳宣周召之風師古曰召讀曰邵逹大王王季思慮爰及公劉以尊后稷也師古曰爰曰也發語辭也一曰爰於也幽厲之後王道缺禮樂衰孔子脩舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘嵗而諸侯相兼史記放絶今漢興海内壹統明主賢君忠臣義士予為太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三嵗而遷為太史令紬史記石室}
