  - {type: variant, offset: 23, length: 1, content: 父, WYG: 老子言車三十輻運行無窮以象王者如此也師古曰此說非也言衆星共繞北辰諸輻咸歸車轂若文武之臣尊輔天子也輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令已失時師古曰俶儻大節也俶吐歴反立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補蓺成一家言孟康曰蓺音褋謂裳下懐褋李竒曰蓺六蓺也師古曰李說是也蓺古藝字宋祁曰越本補字下有闕字協六經異傳齊百家雜語藏之名山副在京師師古曰藏於山者備亡失也其副貳本乃留京師也以竢後聖君子第七十師古曰竢古俟字遷之自叙云爾師古曰自此以前皆其自叙之辭也自此以後乃班氏作傳語耳而十篇缺有録無書張晏曰遷没之後亡景紀武紀禮書樂書兵書漢興以來将相年表日者列傳三王世家龜策列傳傅靳列傳元成之間褚先生補缺作武帝紀三王世家龜策日者傳言辭鄙陋非遷本意也師古曰序目本無兵書張云亡失此說非也劉奉世曰兵書即律書盖當時有耳遷既被刑之後為}
