  - {type: 'tls:seg', offset: 256, content: '', id: KR2a0007_tls_062-1a.44}
  - {type: variant, offset: 256, length: 1, content: 小, WYG: 矣師古曰言侍從天子之車輿所以自惟師古曰惟思也上之不能納忠效信師古曰效致也有竒䇿材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功師古曰搴㧞也㧞取敵人之旗也搴音騫下之不能累日積勞取尊官厚禄以為宗族交逰光寵四者無一遂茍合取容無所短長之效可見於此矣鄉者僕亦嘗厠下大夫之列韋昭曰周官太史位下大夫也臣瓚曰漢太史令千石故比下大夫師古曰鄉讀曰嚮嚮曩昔時也陪外廷末議不以此時引維綱盡思慮今已虧形為埽除之𨽻在闒茸之中師古曰闒茸猥賤也闒下也茸細毛也言非豪桀也闒吐合反茸人勇反廼欲卬首信眉論列是非師古曰卬讀曰仰信讀曰伸列陳也不亦輕朝廷羞當世之士邪師古曰羞辱也嗟乎嗟乎如僕尚何言哉宋祁曰越本尚何言哉無復句余按太史公語多重復此自一體不可削也尚何言哉且事本末未易明也僕少負不覊之才長無鄉曲之譽師古曰不覊言其材質髙逺不可覊繋也負者亦言無此事也主上幸以先人之故使得奉薄技出入周衛之中服䖍曰薄技薄材也師古曰周衛言宿衛周密也僕以為戴盆何以望天如淳曰頭戴盆則不得望天望天則不得戴盆事不可兼施言已方有所造不暇修人事也師古曰言營職務耳未論造書也如說失之故絶賔客之知忘室家之業日夜思竭其不肖之材力務壹}
