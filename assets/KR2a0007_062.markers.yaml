  - {type: variant, offset: 311, length: 2, content: 嗣命, WYG: 僕沮貳師而為李陵游說師古曰沮毁壊也音才汝反遂下於理拳拳之忠終不能自列師古曰拳拳忠謹之貎劉向傳作惓惓字音義同耳列陳也因為誣上卒從吏議師古曰卒終也家貧財賂不足以自贖交游莫救左右親近不為壹言身非木石獨與法吏為伍深幽囹圄之中誰可告愬者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲孟康曰家世為将有名聲陵降而隤之也師古曰隤墜也音頺而僕又茸以蠶室蘓林曰茸次也若人相俾次師古曰此說非也茸音人勇反推也蠶室乃腐刑所居温宻之室也謂推致蠶室之中也劉奉世曰茸讀如闒茸之茸重為天下觀笑師古曰觀視之而笑也悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星歴近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻螘何異師古曰螻螻蛄也螘蚍蜉也皆蟲之微小者螻音樓而世又不與能死節者比師古曰與許也不許其能死節特以為智窮罪極不能自免卒就死耳何也素所自樹立使然人固有一死死有重於太山或輕於鴻毛用之所趨異也師古曰趨讀曰趣趣嚮也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次闗木索被箠楚受辱師古曰箠杖也音止橤反其次鬄毛髪嬰金鐡受辱師古曰嬰繞也鬄音吐計反其次毁肌膚斷支體受辱最下腐刑極矣師古曰腐刑觧在景紀傳曰刑不上}
