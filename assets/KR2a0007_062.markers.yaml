  - {type: variant, offset: 4489, length: 653, content: 在外戚傳始許后暴崩吏捕諸醫劾衍侍疾亡狀不道下獄吏簿問急顯恐事敗即具以實語光光大驚欲自發舉不忍猶與會奏上因署衍勿論光薨後語稍泄於是上始聞之而未察乃徙光女壻度遼將軍未央衛尉平陵侯范明友為光祿勳次壻諸吏中郎將羽林監任勝出為安定太守數月復出光姊壻給事中光祿大夫張朔為蜀郡太守群孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衛尉鄧廣漢為少府更以禹為大司馬冠小冠亡印綬罷其右將軍屯兵官屬特使禹官名與光俱大司馬者又收范明友度遼將軍印綬但為光祿勳及光中女壻趙平為散騎騎都尉光祿大夫將屯兵又收平騎都尉印綬諸領胡越騎羽林及兩宮衛將屯兵悉易以所親信許史子弟代之禹為大司馬稱病禹故長史任宣候問禹曰我何病縣官非我家將軍不得至是今將軍墳墓未乾盡外我家反任許史奪我印綬令人不省死宣見禹恨望深乃謂曰大將軍時何可復行持國權柄殺生在手中廷尉李种王平左馮翊賈勝胡及車丞相女壻少府徐仁皆坐逆將軍意下獄死使樂成小家子得幸將軍至九卿封侯百官以下但事馮子都王子方等視丞相亡如也各自有時今許史自天子骨肉貴正宜耳大司馬欲用是怨恨愚以為不可禹默然數日起視事顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時法令以公田賦與貧民發揚大將軍過失又諸儒生多窶人子遠客飢寒喜妄說狂言不避忌諱大將軍常讎之今陛下好與諸儒生語人人自使書對事多言我家者嘗有上書言大將軍時主弱臣強專制擅權今其子孫用事昆弟益驕恣恐危宗廟災異數見盡為是也其言絕痛山屏不奏其書後上書者益黠盡奏封事輒下中書令出取之不關尚書益不信人顯曰丞相數言我家獨無罪乎山曰丞相廉正安得罪我家昆弟諸壻, WYG: 辭亦}
