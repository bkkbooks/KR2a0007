  - {type: variant, offset: 14, length: 0, content: '', WYG: 相繼籑其職師古曰籑讀與撰同宋祁曰籑當作篹曰於戱師古曰於戯嘆聲也於讀曰烏戯讀曰呼古字或作嗚虖今字或作烏呼音義皆同耳而俗之讀者随字而别又曲為觧釋云有吉㓙羙惡之殊是不通其大指也義例具在詩及尚書不可一二徧舉之余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉師古曰欽敬也罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代録秦漢上記軒轅下至于兹著十二本紀既科條之矣並時異世年差不明作十表師古曰並時則年歴差殊異代則難以明辨故作表也禮樂損益律歴改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮}
