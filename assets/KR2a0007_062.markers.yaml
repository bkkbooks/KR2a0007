  - {type: variant, offset: 6507, length: 197, content: 莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上奇焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光祿大夫日磾既親近未嘗有過失上甚信愛之賞賜累千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉日磾母教誨兩子甚有法度上聞而嘉之病死詔圖畫於甘泉宮署曰休屠王閼氏日磾每見畫常拜鄉之涕泣然後乃去日磾子二人皆愛為帝弄兒常在旁側弄兒或自後擁上項日磾在前見而目之弄兒走且啼曰翁怒上, WYG: 文選注云}
