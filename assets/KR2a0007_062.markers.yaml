  - {type: variant, offset: 6212, length: 264, content: 焦髮灼爛之右上乃賜福帛十疋後以為郎宣帝始立謁見高廟大將軍光從驂乘上內嚴憚之若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳之曰威震主者不畜霍氏之禍萌於驂乘至成帝時為光置守冢百家吏卒奉祠焉元始二年封光從父昆弟曾孫陽為博陸侯千戶金日磾字翁叔本匈奴休屠王太子也武帝元狩中票騎將軍霍去病將兵擊匈奴右地多斬首虜獲休屠王祭天金人其夏票騎復西過居延攻祁連山大克獲於是單于怨昆邪休屠居西方多為漢所破召其王欲誅之昆邪休屠恐謀降漢休屠王後悔昆邪王殺之并將其眾降漢封昆邪王為列侯日磾以父不降見殺與母閼氏弟倫俱沒入官輸黃, WYG: ''}
