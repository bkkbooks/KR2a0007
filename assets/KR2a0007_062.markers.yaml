  - {type: variant, offset: 2289, length: 323, content: 中大夫臣德臣卬昧死言皇太后陛下臣敞等頓首死罪天子所以永保宗廟總壹海內者以慈孝禮誼賞罰為本孝昭皇帝早棄天下亡嗣臣敞等議禮曰為人後者為之子也昌邑王宜嗣後遣宗正大鴻臚光祿大夫奉節使徵昌邑王典喪服斬縗亡悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前就次發璽不封從官更持節引內昌邑從官騶宰官奴二百餘人常與居禁闥內敖戲自之符璽取節十六朝暮臨令從官更持節從為書曰皇帝問侍中君卿使中御府令高昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引內昌邑樂人擊鼓歌吹作俳倡會下還上前殿擊鐘磬召內泰壹宗廟樂人輦道牟首鼓吹歌舞悉奏眾樂發長安廚三太牢具祠閣室中祀已與從官飲啗駕法駕皮軒鸞旗驅馳北宮桂宮弄彘鬭虎召皇太后御小, WYG: 史公牛}
