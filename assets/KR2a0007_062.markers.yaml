  - {type: variant, offset: 1620, length: 149, content: 漢之伊尹也光乃引延年給事中陰與車騎將軍張安世圖計遂召丞相御史將軍列侯中二千石大夫博士會議未央宮光曰昌邑王行昏亂恐危社稷如何群臣皆驚鄂失色莫敢發言但唯唯而已田延年前離席按劍曰先帝屬將軍以幼孤寄將軍以天下以將軍忠賢能安劉氏也今群下鼎沸社稷將傾且漢之傳諡常為孝者以長有天下令宗廟血食也如令漢家絕祀將軍雖死, WYG: ''}
