  - {type: variant, offset: 930, length: 317, content: 外祖而顧專制朝事繇是與光爭權燕王旦自以昭帝兄常懷怨望及御史大夫桑弘羊建造酒榷鹽鐵為國興利伐其功欲為子弟得官亦怨恨光於是蓋主上官桀安及弘羊皆與燕王旦通謀詐令人為燕王上書言光出都肄郎羽林道上稱䟆太官先置又引蘇武前使匈奴拘留二十年不降還乃為典屬國而大將軍長史敞亡功為搜粟都尉又擅調益莫府校尉光專權自恣疑有非常臣旦願歸符璽入宿衛察姦臣變候司光出沐日奏之桀欲從中下其事桑弘羊當與諸大臣共執退光書奏帝不肯下明旦光聞之止畫室中不入上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍亡罪光曰陛下何以知之上曰將軍之廣明都郎屬耳調校尉以來未能十日燕王何以得知之且將軍為非不須校尉是時帝年十四尚書左右皆驚而上, WYG: ''}
