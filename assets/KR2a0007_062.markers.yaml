  - {type: variant, offset: 7167, length: 183, content: 年共臥起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪霍光對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功乃得封侯時年俱八九歲宣帝即位賞為太僕霍氏有事萌牙上書去妻上亦自哀之獨得不坐元帝時為光祿勳薨亡子國除元始中繼絕世封建孫當為秺侯奉日磾後初日磾所將俱降弟倫字少卿為黃門郎早卒日磾兩子貴及孫則衰矣而倫後嗣遂盛子安上始貴顯封侯安上字子侯少, WYG: ''}
