  - {type: variant, offset: 324, length: 0, content: '', WYG: 罪也鄉讀曰嚮絳侯誅諸吕權傾五伯囚於請室師古曰伯讀曰覇魏其大将也衣赭闗三木師古曰三木在頸及手足季布為朱家鉗奴灌夫受辱居室此人皆身至王侯将相聲聞鄰國及罪至罔加不能引决自財師古曰財與裁同古通用字在塵埃之中古今一體安在其不辱也由此言之勇怯埶也彊弱形也審矣曷足怪乎且人不能蚤自財繩墨之外巳稍陵夷至於鞭箠之間廼欲引節斯不亦逺乎古人所以}
