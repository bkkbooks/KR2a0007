  - {type: variant, offset: 3572, length: 670, content: 故所食凡二萬戶賞賜前後黃金七千斤錢六千萬雜繒三萬疋奴婢百七十人馬二千疋甲第一區自昭帝時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宮衛尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據於朝廷光自後元秉持萬機及上即位乃歸政上謙讓不受諸事皆先關白光然後奏御天子光每朝見上虛己斂容禮下之已甚光秉政前後二十年地節二年春病篤車駕自臨問光病上為之涕泣光上書謝恩曰願分國邑三千戶以封兄孫奉車都尉山為列侯奉兄票騎將軍去病祀事下丞相御史即日拜光子禹為右將軍光薨上及皇太后親臨光喪太中大夫任宣與侍御史五人持節護喪事中二千石治莫府冢上賜金錢繒絮繡被百領衣五十篋璧珠璣玉衣梓宮便房黃腸題湊各一具樅木外臧椁十五具東園溫明皆如乘輿制度載光尸柩以轀輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬諡曰宣成侯發三河卒穿復土起冢祠堂置園邑三百家長丞奉守如舊法既葬封山為樂平侯以奉車都尉領尚書事天子思光功德下詔曰故大司馬大將軍博陸侯宿衛孝武皇帝三十有餘年輔孝昭皇帝十有餘年遭大難躬秉誼率三公九卿大夫定萬世冊以安社稷天下蒸庶咸以康寧功德茂盛朕甚嘉之復其後世疇其爵邑世世無有所與功如蕭相國明年夏封太子外祖父許廣漢為平恩侯復下詔曰宣成侯光宿衛忠正勤勞國家善善及後世其封光兄孫中郎將雲為冠陽侯禹既嗣為博陸侯太夫人顯改光時所自造塋制而侈大之起三出闕築神道北臨昭靈南出承恩盛飾祠室輦閣通屬永巷而幽良人婢妾守之廣治第室作乘輿輦加畫繡絪馮黃金塗韋絮薦輪侍婢以五采絲輓顯游戲第中初光愛幸監奴馮子都常與計事及顯寡居與子都亂而禹山並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出, WYG: 文選}
