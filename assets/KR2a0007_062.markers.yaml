  - {type: variant, offset: 1772, length: 2, content: 見先, WYG: 復上父母之丘墓乎雖累百世垢彌甚耳是以腸一日而九囘居則忽忽若有所亡出則不知所如徃師古曰如亦徃也每念斯耻汗未嘗不發背霑衣也身直為閨閤之臣寜得自引深藏於巖穴邪故且從俗浮湛與時俯仰以通其狂惑師古曰湛讀曰沉今少卿廼教以推賢進士無廼與僕之私指謬乎師古曰指意也今雖欲自彫瑑師古曰瑑刻也音篆曼辭以自觧如淳曰曼美也師古曰曼音萬無益於俗不信祗取辱耳師古曰祗適也要之死日然後是非廼定書不能盡意故略陳固陋遷既死後其書稍出宣}
