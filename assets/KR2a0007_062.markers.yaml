  - {type: variant, offset: 2613, length: 922, content: 車使官奴騎乘遊戲掖庭中與孝昭皇帝宮人蒙等淫亂詔掖庭令敢泄言要斬大后曰止為人臣子當悖亂如是邪王離席伏尚書令復讀曰取諸侯王列侯二千石綬及墨綬黃綬以并佩昌邑郎官者免奴變易節上黃旄以赤發御府金錢刀劍玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒詔太官上乘輿食如故食監奏未釋服未可御故食復詔太官趣具無關食監太官不敢具即使從官出買雞豚詔殿門內以為常獨夜設九賓溫室延見姊夫昌邑關內侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徵發凡千一百二十七事文學光祿大夫夏侯勝等及侍中傅嘉數進諫以過失使人簿責勝縛嘉繫獄荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諫不變更日以益甚恐危社稷天下不安臣敞等謹與博士臣霸臣雋舍臣德臣虞舍臣射臣倉議皆曰高皇帝建功業為漢太祖孝文皇帝慈仁節儉為太宗今陛下嗣孝昭皇帝後行淫辟不軌詩云籍曰未知亦既抱子五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭繇不孝出之絕之於天下也宗廟重於君陛下未見命高廟不可以承天序奉祖宗廟子萬姓當廢臣請有司御史大夫臣誼宗正臣德太常臣昌與太祝以一太牢具告祠高廟臣敞等昧死以聞皇太后詔曰可光令王起拜受詔王曰聞天子有爭臣七人雖無道不失天下光曰皇太后詔廢安得天子乃即持其手解脫其璽組奉上太后扶王下殿出金馬門群臣隨送王西面拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絕於天臣等駑怯不能殺身報德臣寧負王不敢負社稷願王自愛臣長不復見左右光涕泣而去群臣奏言古者廢放之人屏於遠方不及以政請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千戶昌邑群臣坐亡輔導之誼陷王於惡光悉誅殺二百餘人出死號呼市中曰當斷不斷反受其亂光坐庭中會丞相以下議定所立廣陵王已前不用及燕剌王反誅其子不在議中近親唯有衛太子孫號皇曾孫在民間咸稱述焉光遂復與丞相敞等上奏曰禮曰人道親親故尊祖尊祖故敬宗大宗亡嗣擇支子孫賢者為嗣孝武皇帝曾孫病已武帝時有詔掖庭養視至今年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正劉德至曾孫家尚冠里洗沐賜御衣太僕以軨獵車迎曾孫就齋宗正府入未央宮見皇太后封為陽武侯已而光奉上皇帝璽綬謁于高廟是為孝宣皇帝明年下詔曰夫襃有德賞元功古今通誼也大, WYG: 走}
