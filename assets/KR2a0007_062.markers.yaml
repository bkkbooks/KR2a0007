  - {type: variant, offset: 5195, length: 250, content: 是故也此大事誅罰不小柰何於是始有邪謀矣初趙平客石夏善為天官語平曰熒惑守御星御星太僕奉車都尉也不黜則死平內憂山等雲舅李竟所善張赦見雲家卒卒謂竟曰今丞相與平恩侯用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦石夏等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也然惡端已見又有弒許后事陛下雖寬仁恐左右不聽久之猶發發即族矣不如先也遂令諸女各歸報其夫皆曰安所相避會李竟坐與諸侯王交通辭語及霍氏有詔雲山不宜宿衛免就第光諸女遇太后無禮馮子都數犯法上并以為讓山禹等甚恐顯夢第中井水溢, WYG: 而}
