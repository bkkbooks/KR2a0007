  - {type: variant, offset: 7423, length: 268, content: 岑明皆為諸曹中郎將常光祿大夫元帝為太子時敞為中庶子幸有寵帝即位為騎都尉光祿大夫中郎將侍中元帝崩故事近臣皆隨陵為園郎敞以世名忠孝太后詔留侍成帝為奉車水衡都尉至衛尉敞為人正直敢犯顏色左右憚之唯上亦難焉病甚上使使者問所欲以弟岑為託上召岑拜為使主客敞子涉本為左曹上拜涉為侍中使待幸綠車載送衛尉舍須臾卒敞三子涉參饒涉明經儉節譇儒稱之成帝時為侍中騎都尉領三輔胡越騎哀帝即位為奉車都尉至長信少府而參使匈奴匈奴中郎將越騎校尉關內都尉安定東海太守饒為越騎校尉涉兩子湯融皆侍中諸曹將大夫而涉之從父弟欽舉明經為太子門大夫哀帝即位為太中大夫給事中欽從父弟遷為尚, WYG: 顯前漢}
