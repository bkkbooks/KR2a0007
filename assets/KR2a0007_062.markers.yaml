  - {type: variant, offset: 3, length: 2, content: 日磾, krp: 鐀之書如淳曰紬徹舊書故事而次述之師古曰此說非也紬謂綴集之音胄鐀與匱同五年而當太初元年李竒曰遷為太史後五年適當武帝太初元年時述史記也十一月甲子朔旦冬至天歴始改建於明堂諸神受記張晏曰以元新改立明堂朝諸侯及郡守受正朔各有山川之祀故曰諸神受記孟康曰明堂班十二月之政歴紀四時故改建於明堂諸神受記若勾芒祝融之屬皆受瑞記遷因此而作師古曰張說是矣太史公曰先人有言自周公卒五百嵗而有孔子孔子至于今五百嵗有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢攘焉師古曰攘古讓字言當已述成先人之業何敢自謙當五百嵗而讓之也上大夫壺遂曰昔孔子為何作春秋哉太史公曰余聞之董生服䖍曰仲舒也周道廢孔子為魯司冦諸侯害之大夫壅之孔子知時之不用道之不行也是非二百四十二年之中師古曰是非謂本其得失以為天下儀表貶諸侯討大夫以逹王事而已矣師古曰時諸侯僣侈大夫擅權故貶討之也貶退也討治也子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之經紀别嫌疑明是非定猶與師古曰與讀曰豫善善惡惡賢賢賤不肖存亡國繼絶世補敝起廢王道之大者也易著天地隂陽四時五行故長於變師古曰以變化之道為長也長讀如本字一曰長謂崇長之也音竹兩反下皆類此宋祁曰淳化本作長於變化予凖書記等語不當有化字傳者見注中有化字誤足之禮綱紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辨是非故長於治人是故禮以節人樂以發和書以道事詩以逹意易以道化春秋以道義師古曰道言也撥亂世反之正莫近於春秋春秋文成數萬張晏曰春秋萬八千字當言减而云成字誤也師古曰張說非也一萬之外即以萬言之故云數萬何乃忽言减乎學者又為曲觧云公羊經傳凡四萬四千餘字尤疏謬矣史遷豈謂公羊之傳為春秋乎其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保社稷者不可勝數師古曰觧並在劉向傳察其所以皆失其本巳師古曰巳語終之辭故易曰差以豪氂謬以千里師古曰今之易經及彖象繋辭並無此語所稱易緯者則有之焉斯盖易家之别說者也故臣弑君子弑父非一朝一夕之故其漸久矣師古曰易坤卦文言之辭有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權師古曰經常也為人君父者宋祁曰浙本無者字而不通於春秋之義者必䝉首惡之名師古曰䝉猶被也為人臣子不通於春秋之義者必陷簒弑誅死之罪其實皆以善為之而不知其義師古曰其心雖善以不知義理之故則陷於惡也被之空言不敢辭蘓林曰趙盾不知討賊而不敢辭弑君之罪夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯師古曰為臣下所干犯也一曰違犯禮義也臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過予之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施巳然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義師古曰斷决也决之於禮義也當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否晉灼曰唯唯謙應也否否不通也師古曰唯弋癸反不然余聞之先人曰虙戲至純厚作易八卦師古曰虙讀與伏同堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之徳襃周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清師古曰於歎辭也穆美也言天子有美徳而政化清也於讀曰烏劉攽曰言於穆清遂不成文理穆清天也澤流罔極師古曰罔無也極止也海外殊俗重譯款塞師古曰款叩也請來獻見者不可勝道師古曰道言也臣下百官力誦聖徳猶不能盡宣其意師古曰力勤也且士賢能矣而不用有國者恥也主上明聖徳不布聞有司之過也且余掌其官廢明聖盛徳不載滅功臣賢大夫之業不述墮先人所言師古曰墮毁也謂不脩之也音火䂓反罪莫大焉余所謂述故事整齊其世傳宋祁曰本無世字非所謂作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於纍紲師古曰纍係也紲長繩也纍音力追反紲音先列反廼喟然而歎曰是余之辠夫師古曰喟然歎息聲也音邱位反宋祁曰浙本辠字下有也字身虧不用矣退而深惟曰師古曰惟思也夫詩書隱約者欲遂其志之思也師古曰隱憂也約屈也卒述陶唐以來至於麟止服䖍曰武帝得白麟而鑄金作麟足形作史記止於此也張晏曰武帝獲麟遷以為述事之端上記黄帝下至麟止猶春秋止於獲麟也師古曰遷序事盡太初故言至麟而止張說是也自黄帝始師古曰遷之書序衆篇各别有辭班氏以其文多故略而不載但取最後一首故此單目盡於六十九至惟漢繼五帝末流之後乃言第七十讀者不詳其意或於目中加云叙傳第七十此大妄矣五帝本紀第一夏本紀第二殷本紀第三周本紀第四秦本紀第五始皇本紀第六項羽本紀第七髙祖本紀第八吕后本紀第九孝文本紀第十孝景本紀第十一今上本紀第十二三代世表第一十二諸侯年表第二六國年表第三秦楚之際月表第四漢諸侯年表第五髙祖功臣年表第六惠景間功臣年表第七建元以來侯者年