  - {type: variant, offset: 317, length: 6, content: 察群臣唯光任, WYG: 中揺尾而求食師古曰穽掘地以䧟獸也音才性反積威約之漸也故士有畫地為牢埶不入削木為吏議不對定計於鮮也文穎曰未遇刑自殺為鮮明也今交手足受木索暴肌膚受榜箠師古曰榜音彭幽於圜牆之中師古曰圜牆獄也周禮謂之圜土當此之時見獄吏則頭槍地師古曰槍音千羊反視徒𨽻則心惕息師古曰惕懼也息喘息也何者積威約之埶也及巳至此言不辱者所謂彊顔耳曷足貴乎師古曰强音其兩反且西伯伯也拘牖里李斯相也具五刑師古曰說在刑法志淮隂王也受械於陳師古曰髙祖偽逰雲夢而信至陳上謁即見囚執械謂桎梏之彭越張敖南鄉稱孤繋獄具罪師古曰或繋於獄或至}
  - {type: page-break, offset: 317, content: '', id: KR2a0007_WYG_062-25a, image: WYG0250/WYG0250-0351a.png}
