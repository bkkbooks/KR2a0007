  - {type: variant, offset: 4243, length: 245, content: 從賓客張圍獵黃山苑中使蒼頭奴上朝謁莫敢譴者而顯及諸女晝夜出入長信宮殿中亡期度宣帝自在民間聞知霍氏尊盛日久內不能善光薨上始躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業今大夫給事中他人壹間女能復自救邪後兩家奴爭道霍氏奴入御史府欲蹋大夫門御史為叩頭謝乃去人以謂霍氏顯等始知憂會魏大夫為丞相數燕見言事平恩侯與侍中金安上等徑出入省中時霍山自若領尚書上令吏民得奏封事不關尚書群臣進見獨往來於是霍氏甚惡之宣帝始立立微時許妃為皇后顯愛小女成君欲貴之私使乳醫淳于衍行毒藥殺許后因勸光內成君代立為后, WYG: 異助}
