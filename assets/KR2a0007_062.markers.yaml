  - {type: variant, offset: 0, length: 1, content: 霍, WYG: 欽定四庫全書前漢書卷六十二漢蘭臺令史班固撰唐正議大夫行祕書少監瑯邪縣開國子顔師古注司馬遷傳第三十二昔在顓頊命南正重司天火正黎司地張晏曰南方陽也火水配也水為陰故命南正重司天火正黎兼地職也臣瓉曰重黎司天地之官也唐虞謂之羲和則司地者宜曰北正古文作北正師古曰瓉說非也據班氏幽通賦云黎淳燿於髙辛則此為火正是也唐虞之際紹重黎之後使復典之至於夏商故重黎氏世序天地其在周程伯休甫其後也應劭曰封為程國伯休甫字也當宣王時官失其守而為司馬氏師古曰失其所守之職也司馬氏世典周史宋祁曰浙本此句無司馬氏三字惠襄之間司馬氏適晉張晏曰周惠王襄王有子頽叔帶之難故司馬氏奔晉也晉中軍随㑹犇魏如淳曰左氏傳晉偽使魏夀餘誘士㑹於秦譟而還時也師古曰犇古奔字也據春秋随㑹奔秦其後自秦入魏而還晉今此言随㑹奔魏司馬氏因入少梁則似謂自晉出奔魏耳但魏國在獻公時巳滅為邑封畢萬矣既非别國不得言奔未詳遷之所說而司馬氏入少梁師古曰少梁本梁國也為秦所滅號為少梁自司馬氏去周適晉分散或在衛或在趙或在秦其在衛者相中山張晏曰司馬喜為中山相在趙者以傳劔論顯服䖍曰世善劔也師古曰劔論劔術之論也論音來頓反蒯聵其後也如淳曰刺客傳之蒯聵也師古曰蒯苦怪反聵五怪反在秦者錯與張儀爭論應劭曰秦惠王欲伐蜀張儀曰不如伐韓司馬錯以當先伐蜀惠王從之起兵伐蜀取之師古曰錯音千各反於是惠王使錯將兵伐蜀遂㧞因而守之蘓林曰為郡守錯孫蘄師古曰音祈事武安君白起而少梁更名夏陽蘄與武安君阬趙長平軍文穎曰趙孝成王時趙括為将還而與之俱賜死杜郵李竒曰地名在咸陽西十里師古曰郵音尤葬於華池晉灼曰池名也在鄠縣師古曰晉說非也華池在左馮翊界近夏陽非鄠縣蘄孫昌為秦王鐡官當始皇之時蒯聵𤣥孫卬為武信君将而狥朝歌師古曰武信君即武臣也未為趙王之前號武信君項籍傳曰趙将司馬卬是知為武臣之将也劉攽曰此言當始皇時為武信君将則武信君非武臣也諸侯之相王王卬於殷師古曰項羽封卬為殷王漢之伐楚卬歸漢以其地為河内郡昌生母懌師古曰懌弋赤反母懌為漢市長母懌生喜喜為五大夫卒皆葬髙門蘓林曰長安北門也師古曰蘓說非也髙門地名在夏陽西北而東去華池三里喜生談談為太史公如淳曰漢儀注太史公武帝置位在丞相上天下計書先上太史公副上丞相序事如古春秋遷死後宣帝以其官為令行太史公文書而已晉灼曰百官表無太史公在丞相上又衛宏所說多不實未可以為正師古曰談為太史令耳遷尊其父故謂之為公如說非也劉攽曰周制外史掌四方之志布在諸侯國其位上士皆在諸侯之卿上秦亦有之故漢儀注所謂太史公在丞相上謂此也衛宏所說亦不可謂之全非宋祁曰遷與任安書自言僕之先人文史星歴近乎卜祝之間故上所戲弄倡優畜之流俗之所輕也若其位在丞相上安得有此言邪百官表不著其官信其非也太史公學天官於唐都師古曰即律歴志所云方士唐都者受易於楊何師古曰何字叔元菑川人見儒林傳習道論於黄子師古曰景帝時人也儒林傳謂之黄生與轅固爭論於上前謂湯武非受命乃殺也太史公仕於建元元封之間愍學者不逹其意而師誖師古曰誖惑也各習師法惑於所見誖音布内反乃論六家之要指曰易大傳曰宋祁曰越本無曰字天下一致而百慮同歸而殊塗張晏曰大傳謂易繫辭夫隂陽儒墨名法道徳此務為治者也直所從言之異路有省不省耳師古曰言發迹雖殊同歸於治但學者不能省察昧其端緒耳直猶但也嘗竊觀隂陽之術大詳而衆忌諱使人拘而多畏李竒曰隂陽之術月令星官是其枝葉也師古曰拘曲礙也然其叙四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其叙君臣父子之禮列夫婦長㓜之别不可易也師古曰易變也墨者儉而難遵是以其事不可徧循師古曰言難盡用然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真師古曰劉向别録云名家者流出於禮官古者名位不同禮亦異數孔子曰必也正名乎然其正名實不可不察也道家使人精神專一動合無形澹足萬物師古曰澹古贍字其為術也因隂陽之大順采儒墨之善撮名法之要師古曰撮總取也音千活反與時遷徙應物變化立俗施事無所不宜指約而易操事小而功多師古曰操執持也音千髙反儒者則不然以為人主天下之儀表也君唱臣和主先臣随如此則主勞而臣佚師古曰佚樂也字與逸同至於大道之要去健羡服䖍曰門户健壮也如淳曰知雄守雌是去健也不見可欲使心不亂是去羡也晉灼曰老子曰善閉者無闗揵嚴君平曰拆闗破揵使姦者自止服說是也師古曰二義並通揵其偃反然今書本字皆作健字也黜聰明如淳曰不尚賢絶聖棄知也晉灼曰嚴君平曰黜聰棄明倚依太素反本歸真則理得而海内鈞也師古曰黜廢也釋此而任術夫神大用則竭形大勞則敝神形蚤衰師古曰蚤古早字欲與天地長久非所聞也夫隂陽四時八位十二度二十四節各有教令張晏曰八位八卦位也十二度十二次也二十四節就中氣也各有禁謂月令也曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬藏此天道之大經也師古曰經常法弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六蓺為法六蓺經傳以千萬數累世不能通其學當年不能究其禮師古曰究盡也故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長㓜之别雖百家弗能易也墨者亦上堯舜言其徳行曰堂髙三尺土階三等茅茨不翦棌椽不斵師古曰屋蓋曰茨茅茨以茅覆屋也棌柞木也茨音疾兹反棌音采又音菜飯土簋歠土刑師古曰簋所以盛飯也刑以盛羮也土謂燒土為之即瓦器也飯音扶晚反簋音軌歠尺恱反糲粱之食服䖍曰糲粗米也張晏曰一斛粟七斗米為糲音辣師古曰食飯也宋祁曰景本糲作䊪注同越本糲音頼藜藿之羮師古曰藜草似蓬也藿豆葉也夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教䘮禮必以此為萬民率故天下共若此則尊卑無别也宋祁曰越本共作法夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也師古曰給亦足也人人家家皆得足也此墨子之所長雖百家不能廢也法家不别親踈不殊貴賤壹斷於法則親親尊尊之恩絶矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也師古曰分音扶問反名家苛察繳繞如淳曰繳繞猶纒繞也師古曰繳公鳥反使人不得反其意剸决於名時失人情師古曰剸讀與專同又音章免反故曰使人儉而善失真若夫控名責實参伍不失晉灼曰引名責實参錯交互明知事情也此不可不察也道家無為又曰無不為師古曰無為者守静一也無不為者功利大也其實易行其辭難知師古曰言指趣幽逺其術以虛無為本以因循為用師古曰任自然也無成埶無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍師古曰興起也舍廢也故曰聖人不巧時變是守師古曰無機巧之心但順時也虛者道之常也因者君之綱也師古曰言因百姓之心以為教但執其綱而巳羣臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款服䖍曰款空也李竒曰聲則名也師古曰中當也充也音竹仲反款言不聽姦廼不生賢不肖自分黒白廼形師古曰形見也在所欲用耳何事不成廼合大道混混冥冥師古曰元氣之貎也混音胡本反}
