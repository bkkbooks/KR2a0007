  - {type: variant, offset: 25, length: 5, content: 孺河東平陽, WYG: 書令尊寵任職故人益州刺史任安師古曰故人者言其舊交也予遷書責以古賢臣之義遷報之曰少卿足下如淳曰少卿任安字曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇師古曰懇懇至誠也音墾若望僕不相師用師古曰望怨也而流俗人之言師古曰謂随俗人之言而流移其志僕非敢如是也雖罷駑亦嘗側聞長者遺風矣師古曰罷讀曰疲宋祁曰者字下當有之字顧自以為身殘處穢動而見尤師古曰顧思念也尤過也欲益反損是以抑鬱而無誰語師古曰無誰語者言無相知心之人誰可告語諺曰誰為為之孰令聽之師古曰言無知已者設欲修名節立言行誰可為作之又令誰聽之上為音于偽反盖鍾子期死伯牙終身不復鼓琴師古曰伯牙鍾子期皆楚}
