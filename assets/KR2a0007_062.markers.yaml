  - {type: variant, offset: 264, length: 1, content: 甚, WYG: 當師古曰率計戰士殺敵數多故云過當也虜救死扶傷不給師古曰給猶供也旃裘之君長咸震怖廼悉徴左右賢王舉引弓之民師古曰能引弓者皆發之一國共攻而圍之轉鬬千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍師古曰呼音火故反士無不起躬流涕沬血飲泣張空弮冐白刄北首爭死敵孟康曰沬音頮李竒曰弮弩弓也師古曰沬古頮字頮洒面也言流血在面如盥頮冐犯也首嚮也沬音呼内反字從午未之未弮音丘權反又音眷冐音莫克反首音式救反讀者乃以拳掔之拳大謬矣拳則屈指不當言張陵時矢盡故張弩之空弓非是手拳也陵未没時使有來報漢公卿王侯皆奉觴上夀後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤師古曰料量也音聊}
