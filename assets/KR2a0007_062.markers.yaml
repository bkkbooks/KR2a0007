  - {type: variant, offset: 263, length: 0, content: '', WYG: 讓恭儉下人師古曰下音胡亞反嘗思奮不顧身以狥國家之急師古曰狥從也營也其素所畜積也師古曰畜讀曰蓄僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已竒矣今舉事壹不當而全軀保妻子之臣随而媒孽其短臣瓉曰媒謂遘合會之孽謂為生其罪舋也師古曰媒如媒娉之媒孽如麴孽之孽一曰齊人謂麴餅為媒也僕誠私心痛之且李陵提歩卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑彊胡師古曰挑音誂師古曰音徒了反卬億萬之師師古曰卬讀曰仰漢軍北向匃奴南下北方地髙故云然劉奉世曰匃奴乗髙攻故曰卬也與單于連戰十餘日所殺}
