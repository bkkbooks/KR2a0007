  - {type: variant, offset: 2127, length: 1, content: 將, WYG: 漢其言秦漢詳矣至於采經摭傳師古曰摭拾也音之亦反分散數家之事甚多疏略或有抵梧如淳曰梧讀曰迕相觸迕也師古曰抵觸也梧相支拄不安也梧音悟亦其渉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗繆於聖人師古曰頗普我反論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇埶利而羞賤貧此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辨而不華質而不俚劉徳曰俚鄙也如淳曰言雖質猶不如閭里之鄙言也師古曰劉說是也俚音里其文直其事核師古曰核堅實也不虛美不隱善故謂之實録應劭曰言其録事實嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣師古曰言其報任安書自陳己志信不謬迹其所以自傷悼小雅巷伯之倫師古曰巷伯奄官也遇讒而作詩列在小雅其詩曰萋兮菲兮成是貝錦是也夫唯大雅既明且哲能保其身難矣哉師古曰尹吉甫作烝民之詩以美宣王而論仲山甫之徳曰既明且哲以保其身其詩列於大雅故賛云然前漢書卷六十二前漢書卷六十二考證司馬遷傳晉中}
