  - {type: variant, offset: 248, length: 4, content: 出入禁闥, WYG: 師古曰懣煩悶也曉告諭也懣音滿則長逝者魂魄私恨無窮師古曰謂任安恨不見報請略陳固陋闕然不報幸勿過師古曰謂中間久不報也宋祁曰浙本不字上有久字僕聞之修身者智之府也師古曰府者所聚之處也愛施者仁之端也取予者義之符也師古曰符信也恥辱者勇之决也立名者行之極也士有此五者然後可以託於世列於君子之林矣宋祁曰浙本列字上有而字故禍莫㦧於欲利師古曰㦧亦痛也音千敢反悲莫痛於傷心行莫醜於辱先而詬莫大於宫刑師古曰詬恥也音垢刑餘之人無所比數非一世也宋祁曰越本無世字所從來逺矣昔衛靈公與雍渠載孔子適陳應劭曰雍渠奄人也靈公近之商鞅因景監見趙良寒心應劭曰景監秦嬖人也服䖍曰趙良賢者同子驂乗爰絲變色蘓林曰趙談也與遷父同諱故曰同子自古而恥之夫中材之人事闗於宦豎宋祁曰浙本事字下有有字莫不傷氣况忼慨之士乎師古曰忼音口朗反如今朝雖乏人奈何令刀鋸之餘薦天下豪雋哉僕頼先人緒業得待罪輦轂下}
