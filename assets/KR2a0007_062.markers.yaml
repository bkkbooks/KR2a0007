  - {type: variant, offset: 7780, length: 731, content: 千石封都成侯時王莽新誅平帝外家衛氏召明禮少府宗伯鳳入說為人後之誼白令公卿將軍侍中朝臣並聽欲以內厲平帝而外塞百姓之議欽與族昆弟秺侯當俱封初當曾祖父日磾傳子節侯賞而欽祖父安上傳子夷侯常皆亡子國絕故莽封欽當奉其後當母南即莽母功顯君同產弟也當上南大行為太夫人欽因緣謂當詔書陳日磾功亡有賞語當名為以孫繼祖也自當為父祖父立廟賞故國君使大夫主其祭時甄邯在旁庭叱欽因劾奏曰欽幸得以通經術超擢侍帷幄重蒙厚思封襲爵號知聖朝以世有為人後之誼前遭故定陶太后背本逆天孝哀不獲厥福乃者呂寬衛寶復造姦謀至於反逆咸伏厥辜太皇太后懲艾悼懼逆天之咎非聖誣法大亂之殃誠欲奉承天心遵明聖制專壹為後之誼以安天下之命數臨正殿延見群臣講習禮經孫繼祖者謂亡正統持重者也賞見嗣日磾後成為君持大宗重則禮所謂尊祖故敬宗大宗不可以絕者也欽自知與當俱拜同誼即數揚言殿省中教當云云當即如其言則欽亦欲為父明立廟而不入夷侯常廟矣進退異言頗惑眾心亂國大綱開禍亂原誣祖不孝罪莫大焉尤非大臣所宜大不敬秺侯當上母南為太夫人失禮不敬莽白太后下四輔公卿大夫博士議郎皆曰欽宜以時即罪謁者召欽詣詔獄欽自殺邯以綱紀國體亡所阿私忠孝尤著益封千戶更封長信少府涉子右曹湯為都成侯湯受封日不敢還歸家以明為人後之誼益封之後莽復用欽弟遵封侯歷九卿位贊曰霍光以結髮內侍起於階闥之間確然秉志誼形於主受襁褓之託任漢室之寄當廟堂擁幼君摧燕王仆上官因權制敵以成其忠處廢置之際臨大節而不可奪遂匡國家安社稷擁昭立宣光為師保雖周公阿衡何以加此然光不學亡術闇於大理陰妻邪謀立女為后湛溺盈溢之欲以增顛覆之禍死財三年宗族誅夷哀哉昔霍叔封於晉晉即河東光豈其苗裔乎金日磾夷狄亡國羈虜漢庭而以篤敬寤主忠信自著勒功上將傳國後嗣世名忠孝七世內侍何其盛也本以休屠作金人為祭天主故因賜姓金氏云, WYG: 考證}
