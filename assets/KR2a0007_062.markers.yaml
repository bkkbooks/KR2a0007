  - {type: variant, offset: 1344, length: 275, content: 宗族燕王蓋主皆自殺光威震海內昭帝既冠遂委任光訖十三年百姓充實四夷賓服元平元年昭帝崩亡嗣武帝六男獨有廣陵王胥在群臣議所立咸持廣陵王王本以行失道先帝所不用光內不自安郎有上書言周太王廢太伯立王季文王舍伯邑考立武王唯在所宜雖廢長立少可也廣陵王不可以承宗廟言合光意光以其書視丞相敞等擢郎為九江太守即日承皇太后詔遣行大鴻臚事少府樂成宗正德光祿大夫吉中郎將利漢迎昌邑王賀賀者武帝孫昌邑哀王子也既至即位行淫亂光憂懣獨以問所親故吏大司農田延年延年曰將軍為國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此否延年曰伊尹相殷廢太甲以安宗廟後世稱其忠將軍若能行此, WYG: ''}
