  - {type: variant, offset: 188, length: 0, content: '', WYG: 出丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請奈何擅斬之丞相釋仁師古曰釋放也上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之法也大夫何以擅止之勝之惶恐自殺及北軍使者任安坐受太子節懐二心司直田仁縱太子皆要斬上曰侍郎莽通獲反將如侯長安男子景建從通獲少傅石徳可謂元功矣大鴻臚商丘成力戰獲反將張光其封通為重合侯建為徳侯成為秺侯孟康曰秺音妬在濟隂成武今有亭諸太子賔客嘗出入宫門皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡師古曰非其本心然被太子劫略故徙之也以太子在外始置屯兵長安諸城門後二十餘日太子得於湖語在太子傳師古曰湖縣名其明年貳師将軍李廣利將兵出擊匈奴丞相為祖道送至渭橋師古曰祖者送行之祭因設宴飲焉與廣利辭决廣利曰願君侯早請昌邑王為太子如淳曰漢儀注列侯為丞相稱君侯師古曰楊惲傳丘常謂惲為君侯是則通呼列侯之尊稱耳非必在於丞相也如氏之説不為通矣如立為帝君侯長何憂乎師古曰如若也屈􅈊許諾昌邑王者貳師將軍女弟李夫人子也貳師女為屈􅈊子妻故共欲立焉是時治巫蠱獄急内者令郭穰告丞相夫人以丞相數有譴使巫祠社祝詛主上有惡言及與貳師共禱祠欲令昌邑王為帝有司奏請按驗罪至大逆不道有詔載屈􅈊厨車以徇師古曰厨車載食之車也徇行示也要斬東市妻子梟首華陽街貳師將軍妻子亦收貳師聞之降匈奴宗族遂滅車千秋本姓田氏其先齊諸田徙長陵師古曰劉敬所言徙關東大族者也千秋為髙寑郎師古曰髙廟衛寑之郎㑹衛太子為江充所譛敗乆之千秋上急變訟太子寃師古曰所告非常故云急變也曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意廼大感寤召見千秋至前千秋長八尺餘體貌甚麗武帝見而説之師古曰説讀曰悦謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚師古曰當其立見而卽拜之言不移時也數月遂代劉屈􅈊為丞相封富民侯千秋無他材能術學又無伐閲功勞師古曰伐積功也閲經歴也特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之師古曰言此人何以得為相也使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣使者還道單于語武帝}
