  - {type: variant, offset: 12, length: 0, content: '', WYG: 帝女及使人巫祭祠詛上且上甘泉當馳道埋偶人師古曰甘泉宫在北山故欲徃皆言上也刻木為人象人之形謂之偶人偶並也對也劉攽曰使人巫多人字祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗語在江充戾園傳師古曰武五子傳叙戾太子諡戾而置園邑故云戾園也劉屈氂武帝庶兄中山靖}
  - {type: page-break, offset: 12, content: '', id: KR2a0007_WYG_066-3a, image: WYG0250/WYG0250-0416a.png}
  - {type: variant, offset: 12, length: 0, content: '', krp: 帝女及使人巫祭祠詛上且上甘泉當馳道埋偶人師古曰甘泉宫在北山故欲徃皆言上也刻木為人象人之形謂之偶人偶並也對也劉攽曰使人巫多人字祝詛有惡言下有司案驗賀窮治所犯遂父子死獄中家族巫蠱之禍起自朱安世成於江充遂及公主皇后太子皆敗語在江充戾園傳師古曰武五子傳叙戾太子諡戾而置園邑故云戾園也劉屈氂武帝庶兄中山靖}
  - {type: variant, offset: 13, length: 5, content: 伐紂遷九鼎, WYG: 子也師古曰屈音丘勿反又音其勿反不知其始所以進征和二年春制詔御史故丞相賀倚舊故乘髙埶而為邪師古曰帝為太子賀已為舍人故云舊故興羙田以利子弟賔客不顧元元無益邊榖如淳曰戍邊卒糧乏不能為方計以益之也貨賂上流師古曰丞相貪胃受賂于下故使衆庶貨賄上流執事者也朕忍之乆矣終不自革師古曰革改也迺以邊為援如淳曰使内郡自作車耕者自轉所以饒邊饒邊所以行恩施為己名援也或曰以胡為援也使内郡自省作車服䖍曰詐令内郡自省作車轉輸也邊屯無事之時宜自治作車以給軍用師古曰令郡自省減諸餘功用而作車也省音所領反又令耕者自轉以困農文頴曰自輸穀}
