  - {type: variant, offset: 7020, length: 2919, content: 月祿直以辦裝使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎久立門外勝稱病篤為床室中戶西南牖下東首加朝服拕紳使者入戶西行南面立致詔付璽書遷延再拜奉印綬內安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海內勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要說至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋涼乃發有詔許使者五日壹與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜複衾祭祠如法門人衰絰治喪者百數有老父來弔哭其哀既而曰嗟虖薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫知其誰勝居彭城廉里後世刻石表其里門鮑宣字子都渤海高城人也好學明經為縣鄉嗇夫守束州丞後為都尉太守功曹舉孝廉為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曹掾甚敬重焉薦宣為諫大夫遷豫州牧歲餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聽訟所察過詔條行部乘傳去法駕駕一馬舍宿鄉亭為眾所非宣坐免歸家數月復徵為諫大夫宣每居位常上書諫爭其言少文多實是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正議失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諫大夫從其後上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今柰何反覆劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動眾心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省戶下陛下欲與此共承天地安海內甚難今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而眾皆惑古刑人尚服今賞人反惑請寄為姦群小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊歲增於前凡民有七亡陰陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也冤陷亡辜三死也盜賊橫發四死也怨讎相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪群臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賓客為姦利而已以苟容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益豪毛豈徒欲使臣美食大官重高門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞以大萬數使奴從賓客漿酒霍肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天說民服豈不難哉方陽侯孫寵宜陵侯息夫躬辯足以移眾彊可用獨立姦人之雄或世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歷三公智謀威信可與建教化圖安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦可大委任也陛下前以小不忍退武等海內失望陛下尚能容亡功德者甚眾曾不能忍武等邪治天下者當用天下之心為心不得自專快意而已也上之皇天見譴下之黎庶怨恨次有諫爭之臣陛下苟欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受祿賜美食太官廣田宅厚妻子不與惡人結讎怨以安身邪誠迫大義官以諫爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣吶鈍於辭不勝惓惓盡死節而已上以宣名儒優容之是時郡國地震民訛言行籌明年正月朔日蝕上乃徵孔光免孫寵息夫躬罷侍中諸曹黃門郎數十人宣復上書言陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日蝕於三始誠可畏懼小民正月朔日尚恐毀敗器物何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徵拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國眾庶歙然莫不說喜天人同心人心說則天意解矣乃二月丙戍白虹虷日連陰不雨此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜亡度竭盡府藏并合三第尚以為小復壞暴室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冢有會輒太官為供海內貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海內免遣就國收乘輿器物還之縣官如此可以父子終其性命不者海內之所讎未有得久安者也孫寵息夫躬不宜居國可皆免以視天下復徵何武師丹彭宣傅喜曠然使民易視以應天心建立大政以興太平之端高門去省戶數十步求見出入二年未省欲使海瀕仄陋自通遠矣願賜數刻之間極竭毣毣之思退入三泉死亡所恨上感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司隸時哀帝改司隸校尉但為司隸官比司直丞相孔光四時行園陵官屬以令行馳道中宣出逢之使吏鉤止丞相掾史沒入其車馬摧辱宰相事下御史中丞侍御史至司隸官欲捕從事閉門不肯內宣坐距閉使者亡人臣禮大不敬不道下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司隸者會此下諸生會者千餘人朝日遮丞相孔光自言丞相車不得行又守闕上書上遂抵宣罪減死一等髡鉗宣既被刑乃徒之上黨以為其地宜田牧又少豪俊易長雄遂家于長子平帝即位王莽秉政陰有篡國之心乃風州郡以辠法案誅諸豪桀及漢忠直臣不附己者宣及何武等皆死時名捕隴西辛興興與宣女壻許紺俱過宣一飯去宣不知情坐繫獄自殺自成帝至王莽時清名之士琅邪又有紀逡王思齊則薛方子容太原則郇越臣仲郇相稚賓沛郡則唐林子高唐尊伯高皆以明經飭行顯名於世紀逡兩唐皆仕王莽封侯貴重歷公卿位唐林數上疏諫正有忠直節唐尊衣敝履空以瓦器飲食又以歷遺公卿被虛偽名郇越相同族昆弟也並舉州郡孝廉茂材數病去官越散其先人訾千餘萬以分施九族州里志節尤高相王莽時徵為太子四友病死莽太子遣使裞以衣衾其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之薛方嘗為郡掾祭酒嘗徵不至及莽以安車迎方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守箕山之節也使者以聞莽說其言不強致方居家以經教授喜屬文著詩賦數十篇始隃麋郭欽哀帝時為丞相司直奏免豫州牧鮑宣京兆尹薛修等又奏董賢左遷盧奴令平帝時遷南郡太守而杜陵蔣詡元卿為兗州刺史亦以廉直為名王莽居攝欽詡皆以病免官歸鄉里臥不出戶卒於家齊粟融客卿北海禽慶子夏蘇章游卿山陽曹竟子期皆儒生去官不仕於莽莽死漢更始徵竟以為丞相封侯欲視致賢人銷寇賊竟不受侯爵會赤眉入長安欲降竟竟手劍格死世祖即位徵薛方道病卒兩龔鮑宣子孫皆見襃表至大官贊曰易稱君子之道或出或處或默或語言其各得道之一節譬諸草木區以別矣故曰山林之士往而不能反朝廷之士入而不能出二者各有所短春秋列國卿大夫及至漢興將相名臣懷祿耽寵以失其世者多矣是故清節之士於是為貴然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉貞而不諒薛方近之郭欽蔣詡好遯不汙絕紀唐矣, WYG: 考證}
