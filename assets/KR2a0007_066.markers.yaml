  - {type: 'tls:seg', offset: 191, content: '', id: KR2a0007_tls_066-2a.16}
  - {type: variant, offset: 191, length: 0, content: '', WYG: 徳毎公卿朝㑹光謂千秋曰始與君侯俱受先帝遺詔今光治内君侯治外宜有以教督使光毋負天下師古曰督視也千秋曰唯將軍留意即天下幸甚終不肯有所言光以此重之毎有吉祥嘉應數襃賞丞相訖昭帝世國家少事百姓稍益充實始元六年詔郡國舉賢良文學士問以民所疾苦於是鹽鐵之議起焉師古曰議罷鹽鐵之官令百姓皆得煑鹽鑄鐵因總論政治得失也千秋為相十二年薨諡曰定侯初千秋年老上優之朝見得乘小車入宫殿中故因號曰車丞相子順嗣侯官至雲中太守宣帝時以虎牙將軍擊匈奴坐盜増鹵獲自殺國除桑𢎞羊為御史大夫八年自以為國家興𣙜筦之利師古曰𣙜謂專其利使入官也筦即管字也義與幹同皆謂主也𣙜解在昭紀宋祁曰𣙜從木俗從才者非伐其功師古曰自矜其功也欲為子弟得官怨望霍光與上官桀謀反}
  - {type: page-break, offset: 191, content: '', id: KR2a0007_WYG_066-9b, image: WYG0250/WYG0250-0419b.png}
