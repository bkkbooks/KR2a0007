  - {type: variant, offset: 1542, length: 3, content: 益州刺, WYG: 南陽太守所居以殺伐立威豪猾吏及大姓犯法輙論輸府師古曰府謂郡之府宋祁曰輸府下當添下字以律程作司空師古曰司空主作役之官為地臼木杵舂不中程或私解脱鉗釱衣服不如法師古曰鉗在頸􅎂在足皆以鐵為之鉗音其炎反􅎂音弟輙加罪笞督作劇不勝痛師古曰作程劇苦又被督察笞罰既多故不勝痛也自絞死者歲數百千人乆者蠱出腐爛家不得收其治放嚴延年其廉不如所居調發屬縣所出食物以自奉養師古曰調音徒釣反奢侈玉食師古曰玉食羙食如玉也然操持掾}
