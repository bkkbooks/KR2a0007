  - {type: variant, offset: 10, length: 1, content: 昔, WYG: 字同耳音普教反後再以左將軍出定襄無功坐酎金失侯復以浮沮將軍出五原二千餘里無功師古曰沮音子閭反後八歲遂代石慶為丞相封葛繹侯時朝廷多事督責大臣師古曰督謂察視也自公孫宏後丞相李蔡嚴青翟趙周三人比坐事死師古曰比頻也石慶雖以謹得終然數被譴初賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞌馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上廼起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣師古曰殆危也賀子敬聲代賀為太僕父子並居公卿位敬聲以皇后姊子驕奢不奉法征和中擅用北軍錢千九百萬發覺下獄是時詔捕陽陵朱安世不能得上求之急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世者京師大侠也聞賀欲以贖子罪笑曰丞相禍及宗矣南山之竹不足受我辭斜谷之木不足為我械師古曰斜谷名也其中多木械謂桎梏也言我方欲告丞相事獄辭且多械繫方乆故云然也斜音弋奢反安世遂從獄中上書告敬聲與陽石公主私通師古曰}
  - {type: page-break, offset: 10, content: '', id: KR2a0007_WYG_066-2a, image: WYG0250/WYG0250-0415c.png}
  - {type: page-break, offset: 10, content: '', id: KR2a0007_WYG_066-2b, image: WYG0250/WYG0250-0415d.png}
