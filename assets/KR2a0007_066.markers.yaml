  - {type: variant, offset: 1999, length: 313, content: 若成康壽何以不若高宗竊見當世趨務不合於道者謹條奏唯陛下財擇焉吉意以為夫婦人倫大綱夭壽之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆陰陽之位故多女亂古者衣服車馬貴賤有章以襃有德而別尊卑今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絕惡於未萌也又言舜湯不用三公九卿之世而舉皋陶伊尹不仁者遠今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉古者工不造琱瑑商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立而末成其指, WYG: ''}
