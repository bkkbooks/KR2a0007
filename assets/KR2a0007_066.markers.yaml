  - {type: variant, offset: 1592, length: 321, content: 能吏吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也其務在於期會簿書斷獄聽訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠故謹選左右審擇所使左右所以正身也所使所以宣德也詩云濟濟多士文王以寧此其本也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗戶異政人殊服詐偽萌生, WYG: ''}
