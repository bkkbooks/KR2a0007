  - {type: variant, offset: 178, length: 3, content: 見高祖, WYG: 既誅充發兵宣言帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉来幸城西建章宫詔發三輔近縣兵部中二千石以下丞相兼將太子亦遣使者撟制師古曰撟與矯同其字從手矯制託稱詔命也赦長安中都官囚徒師古曰京師請官府發武庫兵命少傅石徳及賔}
