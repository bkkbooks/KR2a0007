  - {type: variant, offset: 7, length: 0, content: '', WYG: 三十六公孫賀字子叔北地義渠人也賀祖父昆邪師古曰昆音戸門反景帝時為隴西守以将軍擊吳楚有功封平曲侯著書十餘篇師古曰蓺文志隂陽家有公孫渾邪十五篇是也賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷至太僕賀夫人君孺衛皇后姊也賀由是有寵元光中為輕車將軍軍馬邑後}
  - {type: page-break, offset: 7, content: '', id: KR2a0007_WYG_066-1b, image: WYG0250/WYG0250-0415b.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 三十六公孫賀字子叔北地義渠人也賀祖父昆邪師古曰昆音戸門反景帝時為隴西守以将軍擊吳楚有功封平曲侯著書十餘篇師古曰蓺文志隂陽家有公孫渾邪十五篇是也賀少為騎士從軍數有功自武帝為太子時賀為舍人及武帝即位遷至太僕賀夫人君孺衛皇后姊也賀由是有寵元光中為輕車將軍軍馬邑後}
  - {type: variant, offset: 8, length: 1, content: 十, WYG: 歲出雲中後五歲以車騎將軍從大將軍青出有功封南窌侯臣瓉曰茂陵中書賀封南窌侯表亦作奅師古曰窌奅}
  - {type: variant, offset: 8, length: 1, content: 十, krp: 歲出雲中後五歲以車騎將軍從大將軍青出有功封南窌侯臣瓉曰茂陵中書賀封南窌侯表亦作奅師古曰窌奅}
