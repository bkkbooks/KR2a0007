  - {type: variant, offset: 210, length: 3, content: 嚴君平, WYG: 異材抗直數言事刺譏近臣書數十上遷為左曹萬年嘗病命咸教戒於牀下語至夜半咸睡頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聼吾言何也咸叩頭謝曰具曉所言大要教咸讇也師古曰大要大歸也讇古諂字也萬年廼不復言萬年死後元帝擢咸為御史中丞總領州郡奏事課第諸刺史内執法殿中公卿以下}
