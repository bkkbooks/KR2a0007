  - {type: variant, offset: 182, length: 3, content: 而敬焉, WYG: 張光等分將使長安囚如侯持節發長水及宣曲胡騎師古曰長水校名宣曲宫也並胡騎所屯今鄠縣東長水鄉即舊營校之地宋祁曰持節發下别本有兵字皆以装㑹侍郎莽通使長安因追捕如侯告胡人曰節有詐勿聼也劉敞曰以當作已遂斬如侯引騎入長安又發輯濯士以予大鴻臚商丘成師古曰輯濯士主用輯及濯行船者也短曰輯長曰濯輯音集字本從木其音同耳濯字本亦作櫂並音直孝反初漢節純赤以太子持赤節故更為黄旄加上以相别太子召監北軍使者任安發北軍兵安受節已閉軍門不肯應太子太子引兵去敺四市人師古曰敺與驅同凡數萬衆至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中師古曰溝街衢之旁通水者丞相附兵浸多師古曰浸漸也太子軍敗南犇覆盎城門得出師古曰長安城南出東頭第一門曰覆盎城門一號杜門㑹夜司直田仁部閉城門坐令}
  - {type: page-break, offset: 182, content: '', id: KR2a0007_WYG_066-5a, image: WYG0250/WYG0250-0417a.png}
