  - {type: variant, offset: 190, length: 0, content: '', WYG: 辱命欲下之吏良乆廼貰之師古曰貰寛縱也謂釋放之也其下亦同然千秋為人敦厚有智居位自稱踰於前後數公師古曰言稱其職也初千秋始視事見上連年治太子獄誅罰尤多羣下恐懼思欲寛廣上意尉安衆庶師古曰尉安之字本無心也是以漢書徃徃存古體字焉宋祁曰當刪字字廼與御史中二千石共上夀頌徳美勸上施恩惠緩刑罰玩聼音樂養志和神為天下自虞樂師古曰虞與娱同上報曰朕之不徳自左丞相與貳師隂謀逆亂巫蠱之禍流及士大夫師古曰謂與太子戰死者也劉攽曰既云自左丞相流及士大夫則不及太子時人也朕日一食者累月廼何樂之聼痛士大夫常在心既事不咎師古曰言既徃之事不可追咎雖然巫蠱始發詔丞相御史督二千石求捕師古曰督察視也廷尉治未聞九卿廷尉有所鞫也師古曰鞫問也曩者江充先治甘泉宫人轉至未央椒房師古曰椒房殿名皇后所居也以椒和泥塗壁取其温而芳也以及敬聲之疇李禹之屬謀入匈奴有司無所發今丞相親掘蘭臺蠱驗所明知也至今餘巫頗脱不止師古曰言往往尚為蠱也隂賊侵身遠近為蠱朕媿之其何夀之有敬不舉君之觴謹謝丞相二千石各就館師古曰謝告也館官舍也書曰毋偏毋黨王道蕩蕩師古曰周書洪範之詞也毋有復言師古曰不許其更請後歲餘武帝疾立皇子鉤弋夫人男為太子師古曰鉤弋宫名也昭帝母趙媫妤居之故號鉤弋夫人也拜大將軍霍光車騎將軍金日磾御史大夫桑𢎞羊及丞相千秋並受遺詔輔道少主師古曰道讀曰導武帝崩昭帝初卽位未任聼政師古曰年㓜故未堪聼政宋祁曰正文未任王本作未堪政事壹決大将軍光千秋居丞相位謹厚有}
