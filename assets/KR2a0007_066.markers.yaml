  - {type: 'tls:seg', offset: 200, content: '', id: KR2a0007_tls_066-3a.2}
  - {type: variant, offset: 200, length: 0, content: '', WYG: 作皇皇也故道不同不相為謀師古曰論語載孔子之辭惲又引之為音于偽反今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有叚干木田子方之遺風應劭曰叚干木田子方魏賢人也漂然皆有節槩知去就之分師古曰漂然髙遠意槩度量也漂音匹遥反槩音工代反分音扶問反頃者足下離舊土臨安定安定山谷之間昆戎舊壤文穎曰昆夷之地也子弟貪鄙豈習俗之移人哉於今廼睹子之志矣師古曰言豈隨安定貪鄙之俗而易其操乎平生謂子為逹道今乃見子之志與我不同者也方當盛漢之隆願勉旃毋多談師古曰旃之也言子當自勉勵以立功名不須多與我言也又惲兄子安平侯譚為典屬國謂惲曰西河太守建平杜侯師古曰杜延年前以罪過出今徵為御史大夫侯罪薄又有功且復用惲曰有功何益縣官不足為盡力惲素與蓋寛饒韓延夀善譚即曰縣官實然蓋司𨽻韓馮翊皆盡力吏也俱坐事誅㑹有日食變騶馬猥佐成上書告惲如淳曰騶馬以給騶使乗之佐主猥馬吏也有吏有佐名成者驕奢不悔過日食之咎此人所致章下廷尉按驗得所予㑹宗書宣帝見而惡之廷尉當惲大逆無道師古曰當謂處斷其罪要斬妻子徙酒泉郡譚坐不諫正惲與相應有怨望語免為庶人召拜成為郎諸在位與惲厚善者未央衞尉韋𤣥成京兆尹張敞及孫㑹宗等皆免官蔡義河内温人也以明經給事大將軍莫府家貧常歩行資禮不逮衆門下好事者相合師古曰言衆斂錢物為義買犢車令乘之數歲遷補覆盎城門候師古曰門候主候時而開閉也乆之詔求能為韓詩者徵義待詔乆不進見義上疏曰臣山東草萊之人行能亡所比容貌不及衆然而不棄人倫者竊以聞道於先師自託於經術也願賜清閒之燕師古曰燕安息也閒讀曰閑得盡精思於前上召見義説詩甚説之師古曰下説讀曰悦擢為光禄大夫給事中進授昭帝數歲拜為少府遷御史大夫代楊敞為丞相封陽平侯又以定策安宗廟益封加賜黄金二百斤義為丞相時年八十餘短小無須眉貌似老嫗行歩俛僂師古曰俛即俯字也僂曲背也僂音力主反劉攽曰俛讀如本字自可常兩吏扶夾廼能行時大將軍光秉政議者或言光置宰相不選賢茍用可顓制者師古曰顓與專同}
