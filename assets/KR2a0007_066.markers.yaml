  - {type: variant, offset: 272, length: 1254, content: 邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閱數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴周之指著書十餘萬言楊雄少時從遊學以而仕京師顯名數為朝廷在位賢者稱君平德杜陵李彊素善雄久之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰楊子雲誠知人君平年九十餘遂以其業終蜀人愛敬至今稱焉及雄著書言當世士稱此二人其論曰或問君子疾沒世而名不稱盍勢諸名卿可幾曰君子德名為幾梁齊楚趙之君非不富且貴也惡虖成其名谷口鄭子真不詘其志耕於巖石之下名震於京師豈其卿豈其卿楚兩龔之絜其清矣乎蜀嚴湛冥不作茍見不治苟得久幽而不改其操雖隨和何以加諸舉茲以旃不亦寶乎自園公綺里季夏黃公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也若王吉貢禹兩龔之屬皆以禮讓進退云王吉字子陽琅邪皋虞人也少好學明經以郡吏舉孝廉為郎補若盧右丞遷雲陽令舉賢良為昌邑中尉而王好遊獵驅馳國中動作亡節吉上疏諫曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心𢛁兮說曰是非古之風也發發者是非古之車也揭揭者蓋傷之也今者大王幸方與曾不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也昔召公述職當民事時舍於棠下而聽斷焉是時人皆得其所後世思其仁恩至虖不伐甘棠甘棠之詩是也大王不好書術而樂逸游馮式撙銜馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣夏之下細旃之上明師居前勤誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥德其樂豈徒銜橛之問哉休則俛仰詘信以利形進退步趨以實下吸新吐故以練臧專意積精以適神於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽美聲廣譽登而上聞則福祿其轃而社稷安矣皇帝仁聖至今思慕未怠於宮館囿池戈獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義孅介有不具者於以上聞非饗國之福也臣吉愚戇願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從自若吉輒諫爭甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大將軍霍光秉政遣大鴻臚宗正迎昌邑王吉即奏書戒王曰臣聞高宗諒闇三年不言今大王以喪事徵宜日夜哭泣悲哀而已慎毋有所發且何獨喪事凡南面之君何言哉天不言四時行焉百物生焉願大王察之大將軍仁愛勇智忠信之德天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄群臣屬以天下寄幼孤焉大將軍抱持幼君襁緥之中布政施教海內晏然雖周公伊尹亡以加也今帝崩亡嗣大將軍惟思可以奉宗廟者攀援而立大王其仁厚豈有量哉臣願大王事之敬之政事壹聽之大王垂拱南面而已願留意常以為念王既到即位二十餘日以行淫亂廢昌邑群臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅唯吉與郎中令龔遂以, WYG: ''}
