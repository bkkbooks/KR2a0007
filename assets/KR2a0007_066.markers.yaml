  - {type: variant, offset: 192, length: 0, content: '', krp: 誅滅王訢濟南人也師古曰訢字與欣同以郡縣吏積功稍遷為被陽令孟康曰故千乘縣也被音罷師古曰音皮彼反武帝末軍旅數發郡國盜賊羣起繡衣御史暴勝之使持斧逐捕盜賊以軍興從事誅二千石以下勝之過被陽欲斬訢訢已解衣伏質師古曰質鍖也欲斬人皆伏於鍖上也鍖音竹林反仰言曰使君顓殺生之柄威震郡國師古曰為使者故謂之使君使音所吏反顓與專同今復斬一訢不足以増威不如時有所寛以明恩貸令盡死力師古曰貸猶假也言饒假之貸音土戴反勝之壮其言貰不誅因與訢相結厚勝之使還薦訢徵為右輔都尉守右扶風上數出幸安定北地過扶風宫館馳道脩治供張辦師古曰供音居用反張音竹亮反武帝嘉之駐車拜訢為真視事十餘年昭帝時為御史大夫代車千秋為丞相封宜春侯明年薨諡曰敬侯子譚嗣以列侯與謀廢昌邑王立宣帝師古曰與讀曰豫益封三百戸薨子咸嗣王莽妻即咸女莽簒位宜春氏以外戚寵張晏曰莽諱取同姓故氏侯邑也師古曰此説非也若云王氏則與莽族相渉故以侯號稱之耳莽本以與譚得姓不同祖系各别故為婚娶既非私竊不湏避諱諱亦不可掩也宋祁曰掩一作卞自訢傳國至𤣥孫莽敗迺絶楊敞華隂人也給事大將軍莫府為軍司馬霍光愛厚之稍遷至大司農元鳳中稻田使者燕蒼知上官桀等反謀以告敞敞素謹畏事不敢言迺移病卧師古曰移病謂移書言病一曰以病而移居也以告諫大夫杜延年延年以聞蒼延年皆封敞以九卿不輙言故不得侯師古曰聞之不即告言也後遷御史大夫代王訢為丞相封安平侯明年昭帝崩昌邑王徵即位淫亂大將軍光與車騎將軍張安世謀欲廢王更立議既定使大司農田延年報敞敞驚懼不知所言汗出洽背徒唯唯而已師古曰唯唯恭應之辭也音弋癸反延年起至更衣師古曰古者延賔必有更衣之處也敞夫人遽從東箱師古曰遽速也謂敞曰此國大事今大將軍議已定使九卿來報君侯君侯不疾應與大將軍同心猶與無決師古曰與讀曰豫先事誅矣延年從更衣還敞夫人與延年參語許諾師古曰三人共言故云參語請奉大將軍教令遂共廢昌邑王立宣帝宣帝即位月餘敞薨諡曰敬侯子忠嗣以敞居位定䇿安宗廟益封三千五百戸忠弟惲惲字子㓜師古曰惲音於粉反以忠任為郎補常侍騎師古曰為騎郎而常侍故謂之常侍騎也惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱好交英俊諸儒名顯朝廷擢為左曹霍氏謀反惲先聞知因侍中金安上以聞召見言状霍氏伏誅惲等五人皆封惲為平通侯遷中郎將郎官故事令郎出錢市財用給文書廼得出名曰山郎張晏曰山財用之所出故取名焉移病盡一日輙償一沐晉灼曰五曰一洗沐也師古曰言出財用者雖非休沐常得在外也貧者實病皆以沐假償之也或至歲餘不得沐其豪富郎日出游戲或行錢得善部師古曰郎官之職各有主部故行錢財而擇其善以招權也貨賂流行傳相放效師古曰放音斧徃反惲為中郎將罷山郎移長度大司農以給財用應劭曰長乆也一歲之調度也蘇林曰簿書給縑之長也師古曰應説是也言總計一歲所須財用及文書之調度而移大司農以官錢供給之更不取於郎也宋祁曰簿書給縑之長也别本給作餘無縑字其疾病休謁洗沐皆以法令從事郎謁者有罪過輙奏免薦舉其髙第有行能者至郡守九卿郎官化之莫不自厲絶請謁貨賂之端令行禁止宫殿之内翕然同聲由是擢為諸吏光禄勲親近用事初惲受父財五百萬及身封侯皆以分宗族後母無子財亦數百萬死皆予惲惲盡復分後母昆弟再受訾千餘萬皆以分施其輕財好義如此惲居殿中亷絜無私郎官稱公平然惲伐其行治師古曰自矜其節行及政治之能也又性刻害好發人隂伏同位有忤已者必欲害之以其能髙人由是多怨於朝廷與太僕戴長樂相失卒以是敗師古曰卒終也長樂者宣帝在民間時與相知及即位拔擢親近長樂甞使行事肄宗廟服䖍曰兼行天子事先肄習威儀也師古曰肄音弋二反還謂掾史曰我親靣見受詔副帝肄秺侯御師古曰我副帝肄而秺侯迺為御耳御謂御車也秺音丁故反人有上書告長樂非所宜言事下廷尉長樂疑惲教人告之亦上書告惲罪髙昌侯車犇入北掖門師古曰犇古奔字也惲語富平侯張延夀曰聞前有犇車抵殿門師古曰抵觸也音丁禮反門關折馬死而昭帝崩今復如此天時非人力也左馮翊韓延夀有罪下獄惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也師古曰脛脛直貌也我不能自保師古曰言我尚不能自保訟人何以得活眞人所謂䑕不容穴銜窶數者也李竒曰眞人正人也如淳曰所以不容穴坐銜窶數自妨故不得入穴也師古曰窶數戴器也窶音其羽反數音山羽反解在東方朔傳惲自云今之訟人亦於己有妨宋祁曰正文數者也多也字又中書謁者令宣持單于使者語視諸將軍中朝二千石師古曰謂譯者所録也視讀曰示惲曰冒頓單于得漢羙食好物謂之殠惡單于不來明甚師古曰時使者云單于欲来朝故惲云不來惲上觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣師古曰過此謂經過此也問其過謂桀紂之過惡畫人有堯舜禹湯不稱而舉桀紂惲聞匈奴降者道單于見殺惲曰得不肖君大臣為畫善計不}
  - {type: variant, offset: 194, length: 0, content: '', WYG: 令身無處所師古曰無處所謂死滅也若秦時但任小臣誅殺忠良竟以滅亡令親任大臣即至今耳師古曰言國祚長逺可以至今猶不亡也古與今如一丘之貉師古曰言其同類也貉獸名似狐而善睡音胡各反惲妄引亡國以誹謗當世無人臣禮又語長樂曰正月以來天隂不雨此春秋所記夏侯君所言也張晏曰夏侯勝諫昌邑王曰天乆隂不雨臣下必有謀上者春秋無乆隂不雨之異也漢史記勝所言故曰春秋所記謂説春秋災異者耳師古曰春秋有不雨事説者因論乆隂附著之也張謂漢史為春秋失之矣行必不至河東矣張晏曰后土祠在河東天子歲祠之以主上為戲語尤悖逆絶理事下廷尉廷尉定國考問左驗明白師古曰定國于定國也左證左也言當時在其左右見此事者也奏惲不服罪而召戸將尊蘇林曰直主門戸者也師古曰戸将官名主戸衛屬光禄也欲令戒飭富平侯延夀師古曰飭與敕同富平侯張延夀也曰太僕定有死罪數事朝暮人也師古曰言不乆活也惲幸與富平侯婚姻今獨三人坐語侯言時不聞惲語自與太僕相觸也師古曰令延夀證云惲無此語長樂誣之也尊曰不可惲怒持大刀曰䝉富平侯力得族罪師古曰惲言富平侯依太僕言而證之則我得罪至於族滅深怨之辭也毋泄惲語令太僕聞之亂餘事文頴曰勿使太僕聞惲此語師古曰亂餘事者恐長樂心忿更加増其餘罪状也惲幸得列九卿諸吏宿衛近臣上所信任與聞政事師古曰與讀曰豫不竭忠愛盡臣子義而妄怨望稱引為訞惡言師古曰訞與妖同大逆不道請逮捕治上不忍加誅有詔皆免惲長樂為庶人惲既失爵位家居治産業起室宅以財自娛歲餘其友人}
