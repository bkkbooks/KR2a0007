  - {type: variant, offset: 159, length: 7, content: 卑辭束帛致禮安, WYG: 為江充所譛殺充發兵入丞相府屈氂挺身逃亡其印綬師古曰挺引也獨引身而逃難故失印綬也是時上避暑在甘泉宫丞相長史乘疾置以聞師古曰置謂所置驛也上問丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也師古曰籍籍猶紛紛也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛}
