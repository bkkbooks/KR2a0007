  - {type: variant, offset: 5092, length: 1843, content: 習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髡鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不解之故四海之內天下之君微孔子之言亡所折中況乎以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其於變世易俗調和陰陽陶冶萬物化正天下易於決流抑隊自成康以來幾且千歲欲為治者甚眾然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念高祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣遠放讇佞放出園陵之女罷倡樂絕鄭聲去甲乙之帳退偽薄之物修節儉之化驅天下之民皆歸於農如此不解則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民產子七歲乃出口錢自此始又罷上林宮館希幸御者及省建章甘泉宮衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意禹又奏欲罷郡國廟定漢宗廟迭毀之禮皆未施行為御史大夫數月卒天子賜錢百萬以其子為郎官至東郡都尉禹卒後上追思其議竟下詔罷郡國廟定迭毀之禮然通儒或非之語在韋玄成傳兩龔皆楚人也勝字君賓舍字君倩二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕久之楚王入朝聞舍高名聘舍為常侍不得已隨王歸國固辭願卒學復至長安而勝為郡吏三舉孝廉以王國人不得宿衛補吏再為尉壹為丞勝輒至官乃去州舉茂材為重泉令病去官大司空何武執金吾閻崇薦勝哀帝自為定陶王固已聞其名徵為諫大夫引見勝薦龔舍及亢父甯壽濟陰侯嘉有詔皆徵勝曰竊見國家徵醫巫常為駕徵賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕龔舍侯嘉至皆為諫大夫甯壽稱疾不至勝居諫官數上書求見言百姓貧盜賊多吏不良風俗薄災異數見不可不憂制度泰奢刑罰泰深賦斂泰重宜以儉約先下其言祖述王吉貢禹之意為大夫二歲餘遷丞相司直徙光祿大夫守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫諸吏給事中勝言董賢亂制度繇是逆上指後歲餘丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下將軍中朝者議左將軍公孫祿司隸鮑宣光祿大夫孔光等十四人皆以為嘉應迷國不道法勝獨書議曰嘉資性邪僻所舉多貪殘吏位列三公陰陽不和諸事並廢咎皆繇嘉迷國不疑今舉相等過微薄日暮議者罷明旦復會左將軍祿問勝君議亡所據今奏當上宜何從勝曰將軍以勝議不可者通劾之博士夏侯常見勝應祿不和起至勝前謂曰宜如奏所言勝以手推常曰去後數日復會議可復孝惠孝景廟不議者皆曰宜復勝曰當如禮常復謂勝禮有變勝疾言曰去是時之變常恚謂勝曰我視君何若君欲小與眾異外以采名君乃申徒狄屬耳先是常又為勝道高陵有子殺母者勝白之尚書問誰受對曰受夏侯常尚書使勝問常常連恨勝即應曰聞之白衣戒君勿言也奏事不詳妄作觸罪勝窮亡以對尚書即自劾奏與常爭言洿辱朝廷事下御史中丞召詰問劾奏勝吏二千石常位大夫皆幸得給事中與論議不崇禮義而居公門下相非恨疾言辯訟媠謾亡狀皆不敬制曰貶秩各一等勝謝罪乞骸骨上乃復加賞賜以子博為侍郎出勝為渤海太守勝謝病不任之官積六月免歸上復徵為光祿大夫勝常稱疾臥數使子上書乞骸骨會哀帝崩初琅邪邴漢亦以清行徵用至京兆尹後為太中大夫王莽秉政勝與漢俱乞骸骨自昭帝時涿郡韓福以德行徵至京師賜策書束帛遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里行道舍傳舍縣次具酒肉食從者及馬長吏以時存問常以歲八月賜羊一頭酒二斛不幸死者賜複衾一祠以中牢於是王莽依故事白遣勝漢策曰惟元始二年六月庚寅光祿大夫太中大夫耆艾二人以老病罷太皇太后使謁者僕射策詔之曰蓋聞古者有司年至則致仕所以恭讓而不盡其力也今大夫年至矣朕愍以官職之事煩大夫其上子若孫若同產同產子一人大夫其修身守道以終高年賜帛及行道舍宿歲時羊酒衣衾皆如韓福故事所上子男皆除為郎於是勝漢遂歸老于鄉里漢兄子曼容亦養志自修為官不肯過六百石輒自免去其名過出於漢初龔舍以龔勝薦徵為諫大夫病免復徵為博士又病去頃之哀帝遣使者即楚拜舍為太山太守舍家居在武原使者至縣請舍欲令至廷拜授印綬舍曰王者以天下為家何必縣官遂於家受詔便道之官既至數月上書乞骸骨上徵舍至京兆東湖界固稱病篤天子使使者收印綬拜舍為光祿大夫數賜告舍終不肯起乃遣歸舍亦通五經以魯詩教授舍勝既歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮舍年, WYG: 卷}
