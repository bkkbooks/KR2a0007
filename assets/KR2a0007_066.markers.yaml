  - {type: variant, offset: 1546, length: 2, content: 病去, WYG: 師古曰操執也音千髙反郡中長吏皆令閉門自歛不得踰法公移勅書曰師古曰公然移書以約勅也即各欲求索自快是一郡百太守也何得然哉下吏畏之豪彊執服師古曰執讀曰慹音之渉反令行禁止然亦以此見廢咸三公子少顯名於朝廷而薛宣朱博翟方進孔光等仕宦絶在咸後皆以廉儉先至公卿而咸滯於郡守時車騎將軍王音輔政信用陳湯咸數賂遺湯予書曰即蒙子公力得入帝城死不恨師古曰子公湯之字後竟徵入為少府少府多寶物屬}
