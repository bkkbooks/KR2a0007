  - {type: variant, offset: 4913, length: 178, content: 諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦禹又言孝文皇帝時貴廉絜賤貪汙賈人贅壻及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海內大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行壹切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者眾郡國恐伏其誅則擇便巧史, WYG: 殺誤也前漢}
