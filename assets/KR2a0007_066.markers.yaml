  - {type: variant, offset: 2715, length: 3, content: 病卒翟, WYG: 坐與京房論議免語在房傳贊曰所謂鹽鐵議者起始元中徵文學賢良問以治亂皆對願罷郡國鹽鐵酒𣙜均輸師古曰酒𣙜均輸解在武紀及食貨志務本抑末毋與天下爭利然後教化可興御史大夫𢎞羊以為此廼所以安邊竟制四夷國家大業不可廢也師古曰竟讀曰境當時相詰難頗有其議文至宣帝時汝南桓寛次公師古曰次公者寛之字治公羊春秋舉為郎至廬江太守丞博通善屬文推衍鹽鐵之議増廣條目極其論難著數萬言師古曰即今之所行鹽鐵論十卷是也亦欲以究治亂成一家之法焉其辭曰師古曰謂桓寛總評議其善惡觀公卿賢良文學之議異乎吾所聞師古曰論語載子張之言言不與己志同也故寛引聞汝南朱生言宋祁曰朱下當添先字當此之時英俊並進賢良茂陵唐生文學魯國萬生之徒六十有餘人咸聚闕庭舒六蓺之風陳治平之原知者贊其慮仁者明其施勇者見其斷師古曰斷音丁唤反辯者騁其辭齗齗焉行行焉師古曰齗齗辯爭之貌行行剛强之貌也齗音牛斤反行音胡浪反雖未詳備斯可略觀矣中山劉子推言王道撟當世反諸正師古曰正曲曰撟諸之也撟讀與矯同其字從手彬彬然𢎞博君子也師古曰彬彬文章貌也音彼旻反九江祝生奮史魚之節發憤懣譏公卿師古曰懣音滿又音莫本反介然直而不撓師古曰撓曲也音女教反可謂不畏彊圉矣桑大夫據當世合時變上權利之略雖非正法鉅儒宿學不能自解師古曰解釋也言理不出於𢎞羊也博物通逹之士也然攝公卿之柄不師古始放於末利師古曰放縱也謂縱心於利也一説放依也音方徃反論語稱孔子曰放於利而行多怨也處非其位行非其道果隕其性以及厥宗師古曰性生也謂與上官桀謀反誅也車丞相履伊吕之列當軸處中括囊不言容身而去師古曰括結也易坤卦六四爻辭曰括囊无咎无譽言自閉慎如囊之括結也彼哉彼哉師古曰論語云或問子西孔子曰彼哉彼哉言彼人者無足稱也若夫丞相御史兩府之士不能正議以輔宰相成同類長同行阿意茍合以説其上師古曰説讀曰悦斗筲之徒何足選也師古曰筲竹器也容一斗選數也論語云子貢問曰今之從政者何如孔子曰噫斗筲之人何足選也言其材器小劣不足数也筲音所交反選音先阮反噫歎聲也噫音於其反前漢書卷六十六前漢書卷六十六考證劉屈氂傳封左丞相為澎侯注晉灼曰東海縣臣召南按地理志東海郡無澎縣侍郎莽通莽通武紀作馬通本姓馬也後漢明德皇后惡其先人有反者易其姓為莽見孟康注楊惲傳廷尉當惲大逆無道顧炎武曰以書中有君父送終語陳萬年傳}
