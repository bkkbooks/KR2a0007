  - {type: variant, offset: 195, length: 0, content: '', WYG: 定太守西河孫㑹宗知略士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意師古曰闔閉也不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝以晻昧}
  - {type: variant, offset: 195, length: 0, content: '', krp: 定太守西河孫㑹宗知略士也與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意師古曰闔閉也不當治産業通賔客有稱譽惲宰相子少顯朝廷一朝以晻昧}
  - {type: variant, offset: 196, length: 0, content: '', WYG: 言見廢師古曰晻與暗同内懐不服報㑹宗書曰惲材朽行穢文質無所底師古曰底致也音之履反幸頼先人餘業得備宿衞遭遇時變以獲爵位終非其任卒與禍㑹師古曰卒亦終也足下哀其愚蒙賜書教督以所不及師古曰䝉蔽也督視也殷勤甚厚然竊恨足下不深惟其終始師古曰惟思也而猥隨俗之毁譽也師古曰猥曲也言鄙陋之愚心若逆指而文過師古曰逆足下之意指而自文飾其過黙而息乎恐違孔氏各言爾志之義師古曰論語云顔囘季路侍子曰盍各言爾志故惲引之宋祁曰息乎疑作自守之義疑作之善故敢略陳其愚唯君子察焉惲家方隆盛時乘朱輪者十人位}
