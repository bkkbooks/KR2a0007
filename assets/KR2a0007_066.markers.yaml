  - {type: variant, offset: 197, length: 1, content: 留, krp: 列卿爵為通}
  - {type: variant, offset: 199, length: 0, content: '', WYG: 總領從官與聞政事師古曰與讀曰豫曾不能以此時有所建明以宣德化又不能與羣僚同心并力陪輔朝廷之遺忘已負竊位素餐之責乆矣師古曰素空也不稱其職空食祿也懐禄貪埶不能自退遭遇變故横被口語師古曰横音胡孟反身幽北闕妻子滿獄當此之時自以夷滅不足以塞責師古曰塞補也豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子游道樂以忘憂小人全軀説以忘罪師古曰説讀曰悦竊自思念過已大矣行已虧矣長為農夫以沒世矣是故身率妻子勠力耕桑灌園治産以給公上師古曰充縣官之賦歛也不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親師古曰父至親君至尊送其終也有時而既張晏曰喪不過三年臣見放逐降居三月復初師古曰既已也劉敞曰惲但云送終三年本不及放逐三月也臣之得罪已三年矣田家作苦歲時伏臘烹羊炰羔斗酒自勞師古曰炰毛炙肉也即今所謂爊也炰音歩交反爊音一髙反勞音來到反家本秦也能為秦聲婦趙女也雅善皷瑟奴婢歌者數人酒後耳熱仰天捬缶應劭曰缶瓦器也秦人擊之以節歌師古曰缶即今之盆類也而呼烏烏師古曰李斯上書云撃甕叩缶彈箏搏髀而呼烏烏快耳者真秦聲也是關中舊有此曲也其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時張晏曰山髙而在陽人君之象也蕪穢不治言朝廷之荒亂也一頃百畝以喻百官也言豆者貞實之物當在囷倉零落在野喻已見放棄也萁曲而不直言朝臣皆諂諛也師古曰萁豆莖也音基須待也是日也拂衣而喜奮褏低卬師古曰褏古袖字頓足起舞誠淫荒無度不知其不可也師古曰自謂為可也惲幸有餘禄方糴賤販貴逐什一之利此賈豎之事汙辱之處惲親行之下流之人衆毁所歸不寒而栗師古曰栗竦縮也雖雅知惲者猶隨風而靡師古曰言逐衆議皆相毁也尚何稱譽之有董生不云乎明明求仁義常恐不能化民者卿大夫之意也宋祁曰卿字當刪明明求財利常恐困乏者庶人之事也師古曰引董仲舒之辭也仲舒}
