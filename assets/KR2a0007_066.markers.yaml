  - {type: variant, offset: 2827, length: 2061, content: 祝詛下獄崇奏封事為放言放外家解氏與崇為昏哀帝以崇為不忠誠策詔崇曰朕以君有累世之美故踰列次在位以來忠誠匡國未聞所繇反懷詐諼之辭欲以攀救舊姻之家大逆之辜舉錯專恣不遵法度亡以示百僚左遷為大司農後徙衛尉左將軍平帝即位王莽秉政大司空彭宣乞骸骨罷崇代為大司空封扶平侯歲餘崇復謝病乞骸骨皆避王莽莽遣就國歲餘為傅婢所毒薨國除自吉至崇世名清廉然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黃金貢禹字少翁琅邪人也以明經絜行著聞徵為博士涼州刺史病去官復舉賢良為河南令歲餘以職事為府官所責免冠謝禹曰冠壹免安復可冠也遂去官元帝初即位徵禹為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言古者宮室有制宮女不過九人秣馬不過八匹牆塗而不琱木摩而不刻車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡它賦歛繇戍之役使民歲不過三日千里之內自給千里之外各置貢職而已故天下家給人足頌聲並作至高祖孝文孝景皇帝循古節儉宮女不過十餘廄馬百餘匹孝文皇帝衣綈履革器亡琱文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效衣服履絝刀劍亂於主上主上時臨朝入廟眾人不能別異甚非其宜然非自知奢僭也猶魯昭公曰吾何僭矣今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂方今宮室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官作工各數千人一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宮見賜杯案盡文畫金銀飾非當所以賜食臣下也東宮之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死死又不葬為犬豬食人至相食而廄馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宮及棄天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宮女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言群臣亦隨故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫及眾庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二子產多少有命審察後宮擇其賢者留二十人餘悉歸之及諸陵園女亡子者宜悉遣獨杜陵宮人數百誠可哀憐也廄馬可亡過數十匹獨舍長安城南苑地以為田獵之囿自城西南至山西至鄠皆復其田以與貧民方今天下飢饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也故詩曰天難諶斯不易惟王上帝臨女毋貳爾心當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也若其阿意順指隨君上下臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食穀馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光祿大夫頃之禹上書曰臣禹年老貧窮家訾不滿萬錢妻子穅豆不贍裋褐不完有田百三十畝陛下過意徵臣臣賣田百畝以供車馬至拜為諫大夫秩八百石奉錢月九千二百廩食太官又蒙賞賜四時雜繒緜絮衣服酒肉諸果物德厚甚深疾病侍醫臨治賴陛下神靈不死而活又拜為光祿大夫秩二千石奉錢月萬二千祿賜愈多家日以益富身日以益尊誠非屮茅愚臣所當蒙也伏自念終亡以報厚德日夜慚愧而已臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸祿洿朝之臣也自痛去家三千里凡有一子年十二非有在家為臣具棺椁者也誠恐一旦蹎仆氣竭不復自還洿席薦於宮室骸骨棄捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里死亡所恨天子報曰朕以生有伯夷之廉史魚之直守經據古不阿當世孳孳於民俗之所寡故親近生幾參國政今未得久聞生之奇論也而云欲退意豈有所恨與將在位者與生殊乎往者嘗令金敞語生欲及生時祿生之子既已諭矣今復云子少夫以王命辨護生家雖百子何以加傳曰亡懷土何必思故鄉生其強飯慎疾以自輔後月餘以禹為長信少府會御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上禹以為古民亡賦算口錢起武帝征伐四夷重賦於民民產子三歲則出口錢故民重困至於生子輒殺甚可悲痛宜令兒七歲去齒乃出口錢年二十乃算又言古者不以金錢為幣專意於農故一夫不耕必有受其飢者今漢家鑄錢及諸鐵官皆置吏卒徒攻山取銅鐵一歲功十萬人已上中農食七人是七十萬人常受其飢也鑿地數百丈銷陰氣之精地臧空虛不能含氣出雲斬伐林木亡有時禁水旱之災未必不繇此也自五銖錢起已來七十餘年民坐盜鑄錢被刑者眾富人積錢滿室猶亡厭足民心動搖商賈求利東西南北各用智巧好衣美食歲有十二之利而不出租稅農夫父子暴露中野不避寒暑捽屮杷土手足胼胝已奉穀租又出稾稅鄉部私求不可勝供故民棄本逐末耕者不能半貧民雖賜之田猶賤賣以賈窮則起為盜賊何者末利深而惑於錢也是以姦邪不可禁其原皆起於錢也疾其末者絕其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣除其租銖之律租稅祿賜皆以布帛及穀使百姓壹歸於農復古道便又言諸離宮及長樂宮衛可減其太半以寬繇役又諸官奴婢十萬餘人戲遊亡事稅良民以給之歲費五六鉅萬宜, WYG: ''}
