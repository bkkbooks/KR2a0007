  - {type: variant, offset: 207, length: 2, content: 真蜀, WYG: 國除陳萬年字㓜公沛郡相人也為郡吏察舉至縣令遷廣陵太守師古曰屢被察亷及舉薦故得遷也宋祁曰遷也改作遷之以高第入為右扶風遷太僕萬年廉平内行修然善事人賂遺外戚許史傾家自盡尤事樂陵侯史高丞相丙吉病中二千石上謁問疾師古曰上謁若今通名也遣家丞出謝謝已皆去萬年獨留昏夜廼歸及吉病甚上自臨問以大臣行能吉薦于定國杜延年及萬年萬年竟代定國為御史大夫八歲病卒子咸字子康年十八以萬年任為郎}
