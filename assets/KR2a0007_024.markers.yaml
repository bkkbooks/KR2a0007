  - {type: variant, offset: 7, length: 4, content: 張耳大梁, krp: 千五百戸也鄰長位下士自此以上稍登一級至鄕而為卿也於里有序而鄉有庠宋祁曰於里有序於字下當添是也序以明敎庠則行禮而視化焉師古曰視讀為示也宋祁曰注末也字當刪春令民畢出在壄冬則畢入於邑其詩曰四之日舉止同我婦子饁彼南畮師古曰此豳詩七月之章也饁饋也四之日周之四月夏之二月也農人無不舉足而耕也則其婦與子同以食來至南畮治田之處而饋之也饁音于輙反又曰十月蟋蟀入我牀下嗟我婦子聿為改歲入此室處師古曰亦七月之章也蟋蟀蛬也今謂之促織聿曰也言寒氣既至蟋蟀漸來則婦子皆曰歲將改矣而去田中入室處也蛬音拱所以順陰陽備寇賊習禮文也春將出民里胥平旦坐於右塾鄰長坐於左塾孟康曰里胥如今里吏也師古曰門側之堂曰塾坐於門側者督促勸之知其早宴防怠惰也塾音孰畢出然後歸夕亦如之師古曰言里胥鄰長亦待入畢然後歸也入者必持薪樵輕重相分班白不提挈師古曰班白者謂髪雜色也不提挈者所以優老}
