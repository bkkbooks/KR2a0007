markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書前漢書卷二十四上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注食貨志第四洪範八政一曰食二曰貨食謂農殖嘉穀可食之物師古曰殖生也嘉善也貨謂布帛可衣師古曰衣音於旣反及金刀龜貝所以分財布利通有無者也師古曰金謂五色之金也黄者曰金白者曰銀赤者曰銅青者曰鈆黑者曰鐵刀謂錢幣也龜以卜占貝以表飾故皆為寶貨也二者生民之本興自神農之世斵木為耜煣木為耒耒耨之利以敎天下而食足師古曰斵斫也煣屈也耒手耕曲木也耜耒端木所以施金也耨耘田也耜音似煣音人九反耒音來内反耨音乃搆反宋祁曰煣木當為揉木煣玉篇曰而九切以火屈木曲案易作揉日中為市致天下之民聚天下之貨交易而退各得其所而貨通師古曰自斵木為耜以至於此事見易上繫辭食足貨通然後國實民富而敎化成黄帝以下通其變使民不倦李竒曰器幣有不便於時則變更通利之使民樂其業而不倦也堯命四子以敬授民時師古曰四子謂羲仲羲叔和仲和叔也事見虞書堯典也宋祁曰堯典也姚本刪去也字舜命后稷以黎民祖饑孟康曰祖始也黎民始饑命棄為稷官也古文言阻師古曰事見舜典宋祁曰祖饑古文言阻是為政首禹平洪水定九州師古曰九州謂冀兖靑徐揚荆豫梁雍制土田各因所生遠近賦入貢棐應劭曰棐竹器也所以盛方曰筐隋曰棐師古曰棐讀與匪同禹貢所謂厥貢漆絲厥篚織文之類是也隋圜而長也隋音他果反楙遷有無萬國作乂師古曰楙與茂同勉也言勸勉天下遷易有無使之交足則萬國皆治殷周之盛詩書所述要在安民富而敎之故易稱天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財師古曰下繫之辭財者帝王所以聚人守位養成羣生奉順天德治國安民之本也故曰不患寡而患不均不患貧而患不安蓋均亡貧和亡寡安亡傾師古曰論語載孔子之言是以聖王域民師古曰為邦域築城郭以居之制廬井以均之師古曰井田之中為屋廬開市肆以通之師古曰肆列也設庠序以敎之師古曰庠序禮宫養老之處士農工商四民有業宋祁曰姚本民作人學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商師古曰鬻賣也鬻音弋六反聖王量能授事四民陳力受職故朝亡廢官邑亡敖民地亡曠土師古曰敖謂逸游也曠空也理民之道地著為本師古曰地著謂安土也音直略反故必建步立畮師古曰畮古畝字也正其經界六尺為步步百為畮畮百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畮公田十畮是為八百八十畮餘二十畮以為廬舍師古曰廬田中屋也春夏居之秋冬則去宋祁曰則去當作即去出入相友守望相助疾病相救民是以和睦而敎化齊同力役生產可得而平也民受田上田夫百畮中田夫二百畮下田夫三百畮歲耕種者為不易上田休一歲者為一易中田休二歲者為再易下田三歲更耕之自爰其處孟康曰爰於也師古曰更互也音工衡反農民户人已受田其家衆男為餘夫亦以口受田如比師古曰比例也音必寐反士工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地晉灼曰淳盡也舄鹵之田不生五穀也各以肥磽多少為差師古曰磽确也謂瘠薄之田也音口交反有賦有稅稅謂公田什一及工商衡虞之入也師古曰賦謂計口發財稅謂收其田入也什一謂十取其一也工商衡虞雖不墾殖亦取其稅者工有技巧之作商有行販之利衡虞取山澤之材產也賦共車馬甲兵士徒之役師古曰徒衆也共讀曰供充實府庫賜予之用稅給郊社宗廟百神之祀天子奉養百官祿食庶事之費民年二十受田六十歸田七十以上上所養也十歲以下上所長也十一以上上所彊也師古曰勉彊勸之令習事也彊音其兩反種穀必雜五種以備災害師古曰歲月有宜及水旱之利也種即五穀謂黍稷麻麥豆也田中不得有樹用妨五穀力耕數耘收穫如寇盜之至師古曰力謂勤作之也如寇盜之至謂促遽之甚恐為風雨所損還廬樹桑師古曰還繞也菜茹有畦𤓰􅉚果蓏應劭曰木實曰果草實曰蓏}
