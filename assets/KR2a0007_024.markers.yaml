  - {type: variant, offset: 524, length: 1, content: 時, WYG: 此後四年衞青比歲十餘萬衆擊胡師古曰比歲頻歲也斬捕首虜之士受賜黄金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉師古曰與讀曰豫於是大司農陳臧錢經用賦稅既竭不足以奉戰士師古曰陳謂列奏之經常也既盡也言常用之錢及諸賦稅並竭盡也有司請令民得買爵及贖禁錮免臧罪請置賞官名曰武功爵臣瓚曰茂陵中書有武功爵一級曰造士二級曰閑輿衞三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衞此武帝所制以寵軍功師古曰此下云級十七萬凡直三十餘萬金今瓚所引茂陵中書止於十一級則計數不足與本文乖矣或者茂陵書說之不盡也級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫師古曰五大夫舊二十等爵之第九級也至此以上始免徭役故每先選以為吏千夫者武功十一等爵之第七也亦得免役今則先除為吏比於五大夫也劉攽曰直三十餘萬金其價之差殊不可詳也秦爵十八大庶長十九則關内侯武功爵比之減一級入關内侯亦其宜也或說七當作一與茂陵中書合矣予謂賣爵當級級稍增其價豈可例云級十七萬若每級十七萬比至三十餘萬金則一萬七千餘級又非也然則誤衍此萬字蓋武功爵其級十七又曰官首亦武功爵名當讀云買武功爵官首試補吏先除言官首補吏稱試但先除之千夫如五大夫五大夫之制於史無傳以理推之當是補吏不試也其有罪又減二等爵得至樂卿師古曰樂卿者武功爵第八等也言買爵唯得至第八也此文止論武功爵級而作注者乃以舊二十等爵解之失其本意故刪}
