  - {type: variant, offset: 907, length: 0, content: '', WYG: 幣除其販賣租銖之律師古曰租銖謂計其所賣物價平其錙銖而收租也租稅祿賜皆以布帛及穀使百姓壹意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寢自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黄金錯其文曰一刀直五千張晏曰案今所見契刀錯刀形質如大錢而肉好輪厚異於此大錢形如大刀環矣契刀身形圓不長二寸也其文左曰契右曰刀無五百字也錯刀則刻之作字也以黄金塡其文上曰一下曰刀二刀泉甚不與志相應也似札單差錯文字磨滅故耳師古曰張說非也王莽錢刀今並尚在形質及文與志相合無差錯也劉奉世曰當時嘗得錯刀文曰一刀平五千當時乃奉世弟字叔鄭敞子也宋祁曰梅聖俞云飲劉原父家原父懷二古錢勸酒其一齊之大刀長五寸半其一王莽時金錯刀長二寸半詩云探懷發二寶太公新室錢獨行齊大刀鎌形末環連文存半辨齊皆有模法圓次觀金錯刀一刀平五千注云其文如此精銅不蠧蝕肉好鉤婉全與五銖錢凡四品並行莽即眞以為書劉字有金刀廼罷錯刀契刀及五銖錢而更作金銀龜貝錢布之品名曰寶貨小錢徑六分重一銖文曰小錢直一次七分三銖曰幺錢一十師古曰幺小也音一堯反次八分五銖曰幼錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十因前大錢五十是為錢貨六品直各如其文黄金重一斤直錢萬朱提銀重八兩為一流直一千五百八十師古曰朱提縣名屬犍為出善銀朱音殊提音上支反它銀一流直千是為銀貨二品元龜岠冉長尺二寸孟康曰冉龜甲緣也岠至也度背兩邊緣尺二寸也臣瓚曰元大也直二千一百六十為大貝十朋蘇林曰兩貝為朋朋直二百一十六元龜十朋故二千一百六十也公龜九寸直五百為壯貝十朋侯龜七寸以上直三百為幺貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上二枚為一朋直五十幺貝二寸四分以上二枚為一朋直三十小貝寸二分以上二枚為一朋直十不盈寸二分漏度不得為朋率枚直錢三是為貝貨五品大布次布弟布壯布中布差布厚布幼布幺布小布小布長寸五分重十五銖文曰小布一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品師古曰布亦錢耳謂之布者言其分布流行也宋祁曰各加一百當刪一字凡寶貨五物六名二十八品鑄作錢布皆用銅殽以連錫孟康曰連錫之别名也李竒曰鉛錫璞名曰連應劭曰連似銅師古曰孟李二說皆非也許愼云鏈銅屬也}
