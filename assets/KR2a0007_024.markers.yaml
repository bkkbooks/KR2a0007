  - {type: variant, offset: 548, length: 130, content: 君報父兄之怨而成割地之業此一時也豪桀皆然其言乃行收兵得數萬人號武信君下趙十餘城餘皆城守莫肯下乃引兵東北擊范陽范陽人蒯通說其令徐公降武信君又說武信君以侯印封范陽令語在通傳趙地聞之不戰下者三十餘城至邯鄲耳餘聞周章軍入關至戲卻又聞諸將為陳王徇地多以讒毀得罪誅怨陳王不, WYG: 物名曰平凖天子}
