  - {type: variant, offset: 1335, length: 3, content: 叛秦能, WYG: 享祀祈福扶衰養疾百禮之會非酒不行故詩曰無酒酤我師古曰小雅伐木之詩酤買也言王於族人恩厚要在燕飫無酒則買而飲之而論語曰酤酒不食師古曰鄉黨所說孔子齋之時也宋祁曰孔子下當添在字二}
