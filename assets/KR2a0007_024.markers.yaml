  - {type: variant, offset: 318, length: 2, content: 則帝, WYG: 歲貢少學之異者亦然及秦孝公用商君壞井田開阡伯注阡伯田間之道也朱子開阡陌辨曰說者皆以開為開置之開言秦廢井田而始置阡陌非也按阡陌舊說謂田間之道蓋即周禮所云遂上之徑溝上之畛洫上之涂澮上之道也其水陸占地不為田者頗多先王非不惜而虛棄之所以正疆界止侵爭時蓄􅂥備水旱為永久之計也商君行茍且之政但見田為阡陌所束而耕者限于百畝是以奮然開之以盡人力地利故秦紀鞅傳皆云為田開阡陌封疆而賦稅平蔡澤亦曰决裂阡陌以靜生民之}
