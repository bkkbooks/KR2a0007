  - {type: variant, offset: 1343, length: 5, content: 王素出將軍, WYG: 廣漢入丞相府破盧瓮師古曰二說皆非也盧者賣酒之區也以其一邊高形如鍜家盧故取名耳非即謂火盧及酒瓮也此言讎五十釀為凖豈一瓮乎廣漢所破盧及罌盧亦謂所居罌瓮之處耳劉奉世曰名賣酒為盧者直此物自有此名耳何必取鍜家盧為義乎天}
