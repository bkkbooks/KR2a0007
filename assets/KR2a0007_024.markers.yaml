  - {type: variant, offset: 2982, length: 2, content: 又憐, krp: 臣浩按鄭樵所言可備一說但古人名物必有義理志謂寶於金云云即解字義非沿鑿也以勸農澹不足百姓䝉利焉顧炎武曰單穆公諫景王鑄大錢本之周語王勿聽卒鑄大錢此廢輕作重不利於民之事班氏乃續之曰以勸農澹不足百姓蒙利焉失}
  - {type: variant, offset: 2985, length: 4, content: 年少孤弱, WYG: 義矣而殽之甚微為利甚厚注師古曰微謂精妙也言殽雜鉛鐵其術精妙而得利其厚臣照按顔說非是錢之為用甚廣一錢之殽其微己甚然總而計之為利甚厚也非謂其術精妙若精妙即費本而無利矣彭吳穿穢貊朝鮮置滄海郡注彭吳人姓名也通鑑考異曰平凖書言彭吳賈滅朝鮮置滄海之郡按滅朝鮮置滄海兩事也不知何者出賈之謀費數十百鉅萬宋祁曰數十下當添萬字臣照按宋不言注則為正文可知正文有數十無萬字師古注}
