  - {type: variant, offset: 1333, length: 0, content: '', WYG: 卬物價起音五剛反亦讀曰仰其賈氐賤減平者聽民自相與市師古曰貴即為卬賤則為氐音丁奚反以防貴庾者師古曰庾積也以防民積物待貴也民欲祭祀喪紀而無用者錢府以所入工商之貢但賒之師古曰但空也徒也言空賒與之不取息利也祭祀毋過旬日喪紀毋過三月民或乏絶欲貸以治產業者均受之除其費計所得受息毋過歲什一師古曰均謂各依先後之次除其費謂衣食之費已用者也羲和魯匡言名山大澤鹽鐵錢布帛五均賒貸斡在縣官師古曰斡謂主領也宋祁曰斡南本作幹主領下當添之字唯酒酤獨未斡酒者天之美祿帝王所以頥養}
