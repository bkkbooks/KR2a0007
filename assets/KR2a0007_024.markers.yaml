  - {type: variant, offset: 273, length: 0, content: '', WYG: 造苑馬以廣用師古曰苑馬謂為苑以牧馬宫室列館車馬益增脩矣然婁敕有司以農為務師古曰婁古屢字民遂樂業}
  - {type: variant, offset: 273, length: 0, content: '', krp: 造苑馬以廣用師古曰苑馬謂為苑以牧馬宫室列館車馬益增脩矣然婁敕有司以農為務師古曰婁古屢字民遂樂業}
  - {type: variant, offset: 274, length: 0, content: '', WYG: 武帝之初七十年間國家亡事非遇水旱則民人給家足都鄙廩庾盡滿而府庫餘財京師之錢累百鉅萬貫朽而不可校師古曰累百鉅萬謂數百萬萬也校謂計數也太倉之粟}
