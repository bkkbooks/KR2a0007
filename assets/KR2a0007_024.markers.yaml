  - {type: variant, offset: 2218, length: 213, content: 東擊楚使告趙欲與俱餘曰漢殺張耳乃從於是漢求人類耳者斬其頭遺餘餘乃遣兵助漢漢敗於彭城西餘亦聞耳詐死即背漢漢遣耳與韓信擊破趙井陘斬餘泜水上追殺趙王歇襄國四年夏立耳為趙王五年秋耳薨諡曰景王子敖嗣立為王尚高祖長女魯元公主為王后七年高祖從平城過趙趙王旦暮自上食體甚卑有子壻禮高祖箕踞罵詈甚慢之趙相貫高趙午年六十餘故耳客也怒曰吾王孱王也說敖曰天下豪桀並起能者先立今王事皇帝甚恭皇帝遇王無禮請為王殺之敖齧其指出血曰君何言之誤且先王亡國賴皇帝, WYG: 毋}
