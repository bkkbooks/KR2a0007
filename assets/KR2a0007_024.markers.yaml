  - {type: variant, offset: 278, length: 1, content: 視, krp: 制除井田民得賣買富者田連仟伯貧者亡立錐之地又顓川澤之利管山林之饒師古曰顓與專同管主也荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一歲屯戍一歲力役三十倍於古師古曰更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歲之中屯戍及力役之事三十倍多於古也更音工衡反田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐵貴故下民受其困也師古曰既收田租又出口賦而官更奪鹽鐵之利率計今人一歲之中失其資產二十倍多於古也或耕豪民之田見稅什五如淳曰十稅其五師古曰言下戸貧人自無田而耕墾豪富家田十分之中以五輸本田主也故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加師古曰重音直用反民愁亡聊亡逃山林轉為盜賊赭衣半道斷獄歲以千萬數漢興循而未改古井田法雖難卒行宜少近古師古曰卒讀曰猝近音其靳反限民名田以澹不足師古曰名田占田也各為立限不使富者過制則貧弱之家可足也塞幷兼之路鹽鐵皆歸於民去奴婢除專殺之威服䖍曰不得專殺奴婢也宋祁曰專當改作顓字薄賦斂省繇役以寛民力然後可善治也仲舒死後功費愈甚}
  - {type: variant, offset: 281, length: 0, content: '', WYG: 虛耗師古曰耗音呼到反人復相食武帝末年悔征伐之事廼封丞相為富民侯韋昭曰沛蘄縣也師古曰欲百姓之殷實故取其嘉名也下詔曰方今之務在於力農以趙過為搜粟都尉過能為代田一畮三甽師古曰甽壟也音工犬反字或作畎歲代處故曰代田師古曰代易也古法也后稷始甽田以二耜為耦師古曰倂兩耜而耕廣尺深尺曰甽長終畮一畮三甽一夫三百甽而播種於三甽中師古曰播布也種謂穀子也宋祁曰三甽中姚刪去三字苗生葉以上稍耨隴草師古曰耨鉏也因隤其土以附苗根師古曰隤謂下之也音頺故其詩曰或芸或芓黍稷儗儗師古曰小雅甫田之詩儗儗盛貌芸音云芓音子儗音擬芸除草也芓附根也言苗稍壯每耨輙附根比盛暑師古曰比音必寐反隴盡而根深能風與旱師古曰能讀曰耐故儗儗而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畮五頃鄧展曰九夫為井三夫為屋夫百畮於古為十二頃古百步為畮漢時二百四十步為畮古千二百畮則得今五頃用耦犂二牛三人一歲之收常過縵田畮一斛以上師古曰縵田謂不為甽者也縵音莫幹反善者倍之師古曰善為甽者又過縵田二斛以上也過使敎田太常三輔蘇林曰太常主諸陵有民故亦課田種也大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀蘇林曰為法意狀也民或苦少牛亡以趨澤師古曰趨讀曰趣趣及也澤雨之潤澤也故平都令光教過以人輓犂師古曰輓引也音晩過奏光以為丞教民相與庸輓犂師古曰庸功也言換功共作也義亦與庸賃同率多人者田日三十畮少者十三畮以故田多墾闢過試以離宫卒田其宫壖地師古曰離宫别處之宫非天子所常居也壖餘也宫壖地謂外垣之内内垣之外也諸緣河壖地廟垣壖地其義皆同守離宫卒閑而無事因令於壖地為田也壖音而緣反課得穀皆多其旁田畮一斛以上令命家田三輔公田李竒曰令使也命者敎也令離宫卒敎其家田公田也韋昭曰命謂爵命者命家謂受爵命一爵為公士以上令得田公田優之也師古曰令音力成反又教邊郡及居延城韋昭曰居延張掖縣也時有甲卒也是後邊城河東𢎞農三輔太常民皆便代田用力少而得穀多至昭帝時流民稍還田野益闢頗有畜積宣帝即位用吏多選賢良百姓安土歲數豐穰師古曰數音所角反穰音人常反宋祁曰人常當作人掌穀至石五錢農人少利時大司農中丞耿壽昌以善為算能商功利師古曰商度也得幸於上五鳳中奏言故事歲漕闗東穀四百萬斛以給京師師古曰漕水運宋祁曰水運下當添也字用卒六萬人宜糴三輔𢎞農河東上黨太原郡穀足供京師可以省闗東漕卒過半又白增海租三倍天子皆從其計御史大夫蕭望之奏言故御史屬徐宫李竒曰御史大夫屬家在東萊言徃年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復予民魚廼出夫隂陽之感物類相應萬事盡然今壽昌欲近糴漕闗内之穀築倉治船費直二萬萬餘師古曰萬萬億也宋祁曰邵本師古作服䖍有動衆之功恐生旱氣民被其災壽昌習於商功分銖之事其深計遠慮誠未足任宜且如故上不聽漕事果便壽昌遂白令邊郡皆築倉以穀賤時增其賈而糴以利農穀貴時減賈而糶名曰常平倉師古曰賈並讀曰價民便之上廼下詔賜壽昌爵闗内侯而蔡癸以好農使勸郡國至大官師古曰為使而勸郡國也使音山吏反元帝即位天下大水闗東郡十一尤甚二年齊地饑穀石三百餘民多餓死琅邪郡人相食在位諸儒多言鹽鐵官及北假田官常平倉可罷孟康曰北假地名也毋與民爭利上從其議皆罷之又罷建章甘泉宫衞角抵齊三服官省禁苑以予貧民減諸侯王廟衞卒半又減闗中卒五百人轉穀振貸窮乏其後用度不足獨復鹽鐵官成帝時天下亡兵革之事號為安樂然俗奢侈不以畜聚為意永始二年梁國平原郡比年傷水災人相食師古曰比頻也刺史守相坐免哀帝即位師丹輔政建言古之聖王莫不設井田然後治廼可平師古曰建立也立其議也孝文皇帝承亡周亂秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有幷兼之害故不為民田及奴婢為限師古曰不為作限制上為音于偽反今累世承平豪富吏民訾數鉅萬而貧弱兪困蓋君子為政貴因循而重改作師古曰重難也然所以有改者將以救急也宋祁曰王本所以上無然字亦未可詳宜略為限師古曰詳謂悉盡也天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及闗内侯吏民名田皆毋過三十頃諸侯王奴婢二百人列侯公主百人關内侯吏民三十人期盡三年犯者没入官時田宅奴婢賈為減賤丁傅用事董賢隆貴皆不便也師古曰丁傅及董賢之家皆不便此事也詔書且須後師古曰須待也遂寢不行宮室苑囿府庫之臧已侈百姓訾富雖不及文景然天下户口最盛矣平帝崩王莽居攝遂簒位王莽因漢承平之業匈奴稱藩百蠻賓服舟車所通盡為臣妾府庫百官之富天下晏然莽一朝有之其心意未滿師古曰謂愛惜之意未厭飽也陿小漢家制度以為疏闊師古曰莽以漢家制度為泰疏濶而更之令陿小宋祁曰而更下當添改字陿小下當添也字宣帝始賜單于印璽與天子同而西南夷鉤町稱王師古曰鉤音鉅于反町音大鼎反莽乃遣使易單于印貶鉤町王為侯二方始怨侵犯邊境莽遂興師發三十萬衆欲同時十道並出一舉滅匈奴募發天下囚徒丁男甲卒轉委輸兵器自負海如淳曰負背也江淮而至北邊使者馳傳督趣師古曰傳音張戀反趣讀曰促海内擾矣又動欲慕古不度時宜師古曰度音大各反分裂州郡改職作官下令曰漢氏減輕田租三十而稅一常有更賦罷癃咸出晉灼曰雖老病者皆復出口算師古曰更音工衡反罷讀曰疲而豪民侵陵分田刼假師古曰分田謂貧者無田而取富人田耕種共分其所收也假亦謂貧人賃富人之田也刼者富人刼奪其稅侵欺之也厥名三十實什稅五也富者質而為邪貧者窮而為姦俱陷於辜刑用不錯師古曰錯置也今更名天下田曰王田奴婢曰}
