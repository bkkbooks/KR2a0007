  - {type: variant, offset: 538, length: 0, content: '', WYG: 式既在位見郡國多不便縣官作鹽鐵器苦惡如淳曰苦或作盬盬不攻嚴也臣瓚曰謂作鐵器民患苦其不好也師古曰二說非也鹽既味苦器又脆惡故總云苦惡也賈䝿師古曰鹽鐵並貴也賈讀曰價或彊令民買之而船有算商者少物䝿廼}
  - {type: page-break, offset: 538, content: '', id: KR2a0007_WYG_024-51b, image: WYG0249/WYG0249-0503d.png}
  - {type: variant, offset: 538, length: 0, content: '', krp: 式既在位見郡國多不便縣官作鹽鐵器苦惡如淳曰苦或作盬盬不攻嚴也臣瓚曰謂作鐵器民患苦其不好也師古曰二說非也鹽既味苦器又脆惡故總云苦惡也賈䝿師古曰鹽鐵並貴也賈讀曰價或彊令民買之而船有算商者少物䝿廼}
  - {type: variant, offset: 539, length: 0, content: '', WYG: 孔僅言船算事上不說漢連出兵三歲誅羌滅兩粤番禺以西至蜀南者置初郡十七晉灼曰元鼎六年定越地以為南海蒼梧鬱林合浦交阯九眞日南珠厓儋耳郡定西南夷以為武都牂柯越嶲沈黎汶山郡及地理志西南夷傳所置犍為零陵益州郡凡十七且以其故俗治無賦稅宋祁曰邵本治無賦稅無無字南陽漢中以往各以地比給初郡吏卒奉食幣物傳車馬被具師古曰地比謂依其次第自近及遠也比音頻寐反傳音張戀反被音皮義反而初郡又時時小反殺吏漢發南方吏卒往誅之間歲萬餘人師古曰間歲隔一歲費皆仰大農宋祁曰邵本費下無皆字大農以均輸調鹽鐵助賦故能澹之宋祁曰澹當作贍然兵所過縣縣以為訾給毋乏而已不敢言輕賦法矣其明年元封元年卜式貶為太子太傅而桑𢎞羊為治粟都尉領大農盡代僅斡天下鹽鐵師古曰代孔僅劉敞曰大司農舊治粟内史耳𢎞羊為搜粟都尉也宋祁曰領大農當作司農𢎞羊以諸官各自市相爭物以故騰躍而天下賦輸或不償其僦費師古曰僦顧也言所輸賦物不足償其餘顧庸之費也僦音子就反宋祁曰償其餘當刪餘字廼請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官令遠方各以其物如異時商賈所轉販者為賦而相灌輸置平凖於京師都受天下委輸召工官治車諸器皆仰給大農大農諸官盡籠}
