  - {type: variant, offset: 278, length: 1, content: 視, WYG: 制除井田民得賣買富者田連仟伯貧者亡立錐之地又顓川澤之利管山林之饒師古曰顓與專同管主也荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一歲屯戍一歲力役三十倍於古師古曰更卒謂給郡縣一月而更者也正卒謂給中都官者也率計今人一歲之中屯戍及力役之事三十倍多於古也更音工衡反田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐵貴故下民受其困也師古曰既收田租又出口賦而官更奪鹽鐵之利率計今人一歲之中失其資產二十倍多於古也或耕豪民之田見稅什五如淳曰十稅其五師古曰言下戸貧人自無田而耕墾豪富家田十分之中以五輸本田主也故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加師古曰重音直用反民愁亡聊亡逃山林轉為盜賊赭衣半道斷獄歲以千萬數漢興循而未改古井田法雖難卒行宜少近古師古曰卒讀曰猝近音其靳反限民名田以澹不足師古曰名田占田也各為立限不使富者過制則貧弱之家可足也塞幷兼之路鹽鐵皆歸於民去奴婢除專殺之威服䖍曰不得專殺奴婢也宋祁曰專當改作顓字薄賦斂省繇役以寛民力然後可善治也仲舒死後功費愈甚}
