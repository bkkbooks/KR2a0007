  - {type: variant, offset: 118, length: 0, content: '', WYG: 乃令民得賣子就食蜀漢天下旣定民亡蓋臧蘇林曰無物可蓋藏自天下不能具醇駟師古曰醇不雜也無色之駟謂四馬雜色也宋祁曰越本作醇而將相或乘牛車師古曰以牛駕車也上於是約法省禁輕田租什五而稅一量吏祿度官用以賦於民師古曰纔取足而山川園池市肆租稅之入自天子以至封君湯沐邑皆各}
