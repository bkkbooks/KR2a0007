  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_024-bkkpn1}
  - {type: variant, offset: 1, length: 5, content: 耳陳餘傳第, WYG: 晏曰有核曰果無核曰蓏臣瓚曰按木上曰果地上曰蓏也師古曰茹所食之菜也畦區也茹音人豫反畦音胡圭反蓏音來果反殖於疆易張晏曰至此易主故曰易師古曰詩小雅信南山云中田有廬疆場有𤓰即謂此也雞豚狗彘毋失其時師古曰彘即豕女脩蠶織則五十可以衣帛七十可以食肉在壄曰廬在邑曰里師古曰廬各在其田中而里聚居也五家為鄰五鄰為里四里為族五族為黨五黨為州五州為鄕鄕萬}
  - {type: page-break, offset: 1, content: '', id: KR2a0007_WYG_024-4b, image: WYG0249/WYG0249-0479b.png}
  - {type: variant, offset: 1, length: 5, content: 耳陳餘傳第, krp: 晏曰有核曰果無核曰蓏臣瓚曰按木上曰果地上曰蓏也師古曰茹所食之菜也畦區也茹音人豫反畦音胡圭反蓏音來果反殖於疆易張晏曰至此易主故曰易師古曰詩小雅信南山云中田有廬疆場有𤓰即謂此也雞豚狗彘毋失其時師古曰彘即豕女脩蠶織則五十可以衣帛七十可以食肉在壄曰廬在邑曰里師古曰廬各在其田中而里聚居也五家為鄰五鄰為里四里為族五族為黨五黨為州五州為鄕鄕萬}
