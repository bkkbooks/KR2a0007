  - {type: variant, offset: 2971, length: 1, content: 偃, WYG: 亦非狗彘食人之食不知斂應劭曰養狗彘者使食人之食而不知以法度斂之也師古曰孟子孟軻之書言歲豐熟菽粟饒多狗彘食人之食此時可斂之宋祁曰此時下當添則字野有餓􅣻而弗知發鄭氏曰􅣻音蔈有梅之蔈􅣻零落也人有饑死零落者不知發倉廩貸之師古曰􅣻音頻小反諸書或作殍字音義亦同宋祁曰而弗知發當刪而字故管氏之輕重服䖍曰作輕重貨在管子書李悝之平糴𢎞羊均輸壽昌常平亦有從徠師古曰言所從來久矣顧古}
