  - {type: variant, offset: 530, length: 0, content: '', krp: 卿大夫小者郎吏道雜而多端則官職耗廢師古曰耗亂也音莫報反自公孫𢎞以春秋之義繩臣下取漢相張湯以峻文決理為廷尉於是見知之法生而廢格沮誹窮治之獄用矣張晏曰吏見知不舉劾為故縱官有所作廢格沮敗誹謗則窮治之也如淳曰廢格天子文法使不行也誹謂非上所行若顏異反脣之比也師古曰沮止壞之音材汝反宋祁曰廢格當作廢閣其明年淮南衡山江都王謀反迹見師古曰蹤跡顯見也而公卿尋端治之竟其黨與坐而死者數萬人吏益慘急而法令察師古曰慘毒也察微視也當是時招尊方正賢良文學之士或至公卿大夫公孫宏以宰相布被食不重味為下先然而無益於俗稍務於功利矣其明年票騎仍再出擊胡大克獲師古曰仍頻也渾邪王率數萬衆來降師古曰渾音胡昆反於是漢發車三萬兩迎之師古曰一兩一乘既至受賞賜及有功之士是歲費凡百餘鉅萬先是十餘歲河決灌梁楚地固已數困而緣河之郡隄塞河輙壞決費不可勝計其後番係欲省底柱之漕師古曰番姓係名也番音普安反係音系穿汾河渠以為溉田鄭當時為渭漕回遠鑿漕直渠自長安至華隂師古曰回曲繞也音胡内反而朔方亦穿溉渠作者各數萬人歴二三期而功未就費亦各以鉅萬十數師古曰謂十萬萬也宋祁曰謂下當添數字天子為伐胡故盛養馬馬之徃來食長安者數萬匹師古曰食讀曰飤卒掌者關中不足廼調旁近郡師古曰調謂選發之也調音徒釣反而胡降者數萬人皆得厚賞衣食仰給縣官師古曰仰音牛向反次下亦同縣官不給師古曰給足也天子乃損膳解乘輿駟出御府禁臧以澹之宋祁曰澹當作贍其明年山東被水災民多饑乏於是天子遣使虛郡國倉廩以振貧猶不足又募豪富人相假貸師古曰貸音土戴反次下亦同尚不能相救廼徙貧民於關以西及充朔方以南新秦中七十餘萬口應劭曰秦始皇遣蒙恬攘郤匈奴得其河南造陽之北千里地甚好於是為築城郭徙民充之名曰新秦四方雜錯奢儉不同今俗名新富貴者為新秦由是名也衣食皆仰給於縣官數歲貸與產業使者分部䕶師古曰分音扶問反冠蓋相望費以億計縣官大空而富商賈或滯財役貧孟康曰滯停也晉灼曰滯音直吏反宋祁曰滯財滯字當從土注同王本墆音滯轉轂百數李竒曰轂車也廢居居邑服䖍曰居穀於邑也如淳曰居賤物於邑中以待貴也師古曰二說皆未盡也此言或有所廢置有所居蓄而居於邑中以乘時射利也封君皆氐首仰給焉晉灼曰氐音抵距之抵服䖍曰仰給於商賈言百姓好末作也師古曰二說皆非也封君受封邑者謂公主及列侯之屬也氐首猶俯首也時公主列侯雖有國邑而無餘財其朝夕所須皆俯首而取給於富商大賈後方以邑入償之氐丁奚反冶鑄䰞鹽財或累萬金而不佐公家之急黎民重困師古曰重音直用反於是天子與公卿議更造錢幣以澹用師古曰更改也宋祁曰澹當作贍而摧浮淫幷兼之徒是時禁苑有白鹿而少府多銀錫自孝文更造四銖錢至是歲四十餘年從建元以來用少縣官往往即多銅山而鑄錢師古曰就多銅之山而鑄錢也民亦盜鑄不可勝數錢益多而輕臣瓚曰鑄錢者多故錢輕輕亦賤也物益少而䝿如淳曰民但鑄錢不作餘物故也有司言曰古者皮幣諸侯以聘享金有三等黄金為上白金為中赤金為下孟康曰白金銀也赤金丹陽銅也今半兩錢法重四銖鄭氏曰其文為半兩實重四銖也而姦或盜摩錢質而取鋊如淳曰錢一面有文一面幕幕為質民盜摩漫面而取其鋊以更鑄作錢也臣瓚曰許愼云鋊銅屑也摩錢漫面以取其屑更以鑄錢西京黄圖叙曰民摩錢取屑是也師古曰鋊音浴瓚說是也宋祁曰鋊俞玉反錢益輕薄而物䝿則遠方用幣煩費不省乃以白鹿皮方尺緣以繢為皮幣師古曰繢繡也繪五綵而為之直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫白金如淳曰雜鑄銀錫為白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名白撰直三千二曰以重差小方之其文馬直五百晉灼曰以半斤之重差為三品此重六兩則下品重四兩也三曰復小橢之其文龜直三百師古曰橢圜而長也音佗果反劉奉世曰白撰當在其一曰之下衍名字二曰三曰之下皆當有金名史文錯脫令縣官銷半兩錢更鑄三銖錢重如其文盜鑄諸金錢罪皆死而吏民之犯者不可勝數於是以東郭咸陽孔僅為大農丞師古曰二人也姓東郭名咸陽姓孔名僅僅音鉅刃反宋祁曰為大下當添司字領鹽鐵事而桑𢎞羊貴幸咸陽齊之大䰞鹽孔僅南陽大冶皆致產累千金故鄭當時進言之𢎞羊洛陽賈人之子以心計師古曰不用籌算年十三侍中故三人言利事析秋豪矣法既益嚴吏多廢免兵革數動民多買復師古曰入財於官以取優復復音方目反宋祁曰買復當作賈復及五大夫千夫徵發之士益鮮師古曰鮮少也音先淺反於是除千夫五大夫為吏不欲者出馬如淳曰千夫五大夫不欲為吏者令之出馬也故吏皆適令伐棘上林作昆明池師古曰適讀曰讁讁責罰也以其久為姦利其明年大將軍票騎大出擊胡賞賜五十萬金軍馬死者十餘萬匹轉漕車甲之費不與焉師古曰與讀曰豫是時財匱師古曰匱空也戰士頗不得祿矣有司言三銖錢輕輕錢易作姦詐廼更請郡國鑄五銖錢周郭其質令不可得摩取鋊孟康曰周匝為郭文漫皆有大農上鹽鐵丞孔僅咸陽言師古曰奏上其言也山海天地之臧宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作䰞鹽官與牢盆蘇林曰牢價直也今世人言顧手牢如淳曰牢廩食也古者名廩曰牢盆鬻鹽盆也師古曰牢蘇說是也䰞古煑字也浮食竒民欲擅斡山海之貨以致富羡師古曰斡謂主領也讀與管同羡饒也音弋戰反役利細民其沮事之議不可勝聽敢私鑄鐵器䰞鹽者釱左趾師古曰釱足鉗也音徒計反没入其器物郡不出鐵者置小鐵官鄧展曰鑄故鐵使屬在所縣使僅咸陽乘傳舉行天下鹽鐵師古曰舉皆也普天之下皆行之也音下更反作官府師古曰主䰞鑄及出納之處也除故鹽鐵家富者為吏吏益多賈人矣商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無產業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貸而民不齊出南畝師古曰言農人尚少不皆務耕種也商賈滋衆貧者畜積無有仰縣官師古曰畜讀曰蓄仰音牛向反宋祁曰無有下當添皆字異時算軺車賈人之緍錢皆有差下師古曰異時言徃時也軺小車也緍謂錢貫也軺音弋昭反緍音武巾反宋祁曰皆有差下姚本作皆有差小請算如故諸賈人末作貰貸賣買居邑貯積諸物師古曰貰賒也貸假與也貰音式制反貸音土戴反及商以取利者雖無市籍各以其物自占師古曰占隱度也各隱度其財物多少而為名簿送之於官也占音之瞻反率緍錢二千而算一師古曰率計有二千錢者則出一算諸作有租及鑄如淳曰以手力所作而賣之者率緍錢四千算一非吏比者三老北邊騎士軺車一算師古曰比例也身非為吏之例非為三老非為北邊騎士而有軺車皆令出一算比音必寐反商賈人軺車二算如淳曰商賈人有軺車又使多出一算重其賦船五丈以上一算匿不自占占不悉戍邊一歲没入緍錢師古曰悉盡也有能吿者以其半畀之師古曰畀與也音必寐反賈人有市籍及家屬皆無得名田以便農師古曰一人有市籍則身及家内皆不得有田也敢犯令没入田貨是時豪富皆爭匿財唯卜式數求入財以助縣官天子廼超拜式為中郎賜爵左庶長田十頃布吿天下以風百姓師古曰風讀曰諷初式不願為官上强拜之稍遷至齊相語自在其傳孔僅使天下鑄作器三年中至大司農列於九卿而桑𢎞羊為大司農中丞管諸會計事稍稍置均輸以通貨物始令吏得入穀補官郎至六百石師古曰吏更遷補高官郎又就增其秩得至六百石自造白金五銖錢後五歲而赦吏民之坐盜鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能半自出天下大氐無慮皆鑄金錢矣師古曰氐讀曰抵歸也大氐猶言大凡也無慮亦謂大率無小計慮耳宋祁曰姚本改耳作也字犯法者衆吏不能盡誅於是遣博士褚大徐偃等分行郡國師古曰行音下更反舉幷兼之徒守相為利者師古曰守郡守相諸侯相而御史大夫張湯方䝿用事減宣杜周等為中丞師古曰減姓也音減省之減義縱尹齊王溫舒等用急刻為九卿直指夏蘭之屬始出而大農顏異誅矣蘇林曰夏蘭人姓名初異為濟南亭長以廉直稍遷至九卿上與湯既造白鹿皮幣問異異曰今王侯朝賀以倉璧直數千而其皮薦反四十萬本末不相稱天子不說師古曰說讀曰悅湯又與異有隙及人有告異以它議事下湯治異異與客語客語初令下有不便者李竒曰異與客語道詔令初下有不便處異不應微反脣師古曰蓋非之湯奏當異九卿見令不便不入言而腹非論死師古曰當謂處斷其罪自是後有腹非之法比師古曰比則例也讀如字又音必寐反而公卿大夫多諂諛取容天子旣下緍錢令而尊卜式百姓終莫分財佐縣官於是告緍錢縱矣師古曰縱放也放令相告言也郡國鑄錢民多姦鑄師古曰謂巧鑄之雜鉛錫宋祁曰鉛錫下當添也字錢多輕而公卿請令京師鑄官赤仄應劭曰所謂子紺錢也如淳曰以赤銅為其郭也令錢郭見有赤者不知作法云何也一當五賦官用非赤仄不得行師古曰充賦及給官用皆令以赤仄白金稍賤民弗寶用縣官以令禁之無益歲餘終廢不行是歲湯死而民不思其後二歲赤仄錢賤民巧法用之不便又廢於是悉禁郡國毋鑄錢專令上林三官鑄錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輸入其銅三官而民之鑄錢益少計其費不能相當師古曰言無利唯眞工大姦廼盜為之師古曰其術巧妙故得利楊可告緍徧天下如淳曰吿緍令楊可所告言也師古曰此說非也楊可據令而發動之故天下皆被告中家以上大氐皆遇告杜周治之獄少反者如淳曰治匿緍之罪其獄少有反者蘇林曰反音幡師古曰幡謂從輕而出宋祁曰而出下當添之字廼分遣御史廷尉正監分曹服䖍曰分曹職案行也師古曰服說非也曹輩也分輩而出為使也往往即治郡國緍錢師古曰就其所在而治也得民財物以億計奴婢以千萬數田大縣數百頃小縣百餘頃宅亦如之於是商賈中家以上大氐破民婾甘食好衣不事畜臧}
  - {type: variant, offset: 532, length: 0, content: '', WYG: 師古曰婾茍且也而縣官以鹽鐡緍錢之故用少饒矣益廣關置左右輔初大農幹鹽鐵官布多置水衡欲以主鹽鐵及楊可告緍上林財物衆廼令水衡主上林上林既充滿益廣是時粤欲與漢用船戰逐孟康曰水戰相逐也廼大脩昆明池列舘環之師古曰環繞也治樓船高十餘丈旗織加其上甚壯師古曰織讀曰幟音昌志反宋祁曰昌志當改作式志於是天子感之廼作柏梁臺高數十丈宫室之脩繇此日麗廼分緍錢諸官而水衡少府太僕大農各置農官往往即郡縣比没入田田之師古曰即就也比謂比}
