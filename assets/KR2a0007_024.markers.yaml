  - {type: variant, offset: 470, length: 6, content: 聊今陳王奮臂, WYG: 疑二矣采銅鑄作者反於耕田三矣銅畢歸於上上挾銅積㠯御輕重師古曰銅積謂多積銅也錢輕則㠯術斂之重則㠯術散之貨物必平四矣㠯作兵器㠯假䝿臣多少有制用别䝿賤五矣如淳曰古者以銅為兵秦銷鋒鍉鑄金人十二是也㠯臨萬貨㠯調盈虛㠯收竒羡師古曰調平均也竒殘餘也羡饒溢也竒音居宜反羡音弋戰反則官富貴而末民困六矣師古曰末謂工商之業也制吾棄財㠯與匈奴逐爭其民則敵必懷七矣師古曰末業既困農人敦本倉廩積實布帛有餘則招誘胡人多來降附故言制吾棄財逐爭其人也棄財者可棄之財逐競也宋祁曰則敵必懷當作壞字故善}
