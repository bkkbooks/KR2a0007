  - {type: variant, offset: 330, length: 0, content: '', krp: 臣召南按文如作自天下以至封君湯沐邑甚為不協宋意因下文言不領於天子之經費遂疑此作自天下耳又按史記平凖書原文云自天子以至封君湯沐邑皆各為私奉養不領於天下之經費文義甚順蓋大司農掌天下之經費若畿輔以内之山川園池市肆租稅則盡入少府為天子私藏其封君湯沐邑又各收以自供俱不領於大司農也此志作天子之經費子字係傳冩之訛好惡乖迕惡監本訛逆從宋本改正漢興循而未改馬端臨曰史既言高祖省賦而復言鹽鐡之賦仍秦者蓋當時封國至多山澤之利在諸侯王國者皆循秦賦法取以自豐非縣官經費所領也以趙過為搜粟都尉搜監本訛􅀈今改正按百官表作騪用耦犁二牛三人臣召南按周禮里宰賈疏曰周時未有牛耕至漢時趙過始敎民牛耕今鄭云合牛耦可知者或周末兼有牛耕至趙過乃絶人耦又按葉少蘊曰古耕而不犁後世變為犂法耦用人犁用牛過特為增損其數耳非用牛自過始也周必大曰疑耕犁起於春秋之世孔子有犁牛之言冉耕字伯牛月令出土牛示農耕早晩按葉周二說是但謂古耕而不犁耕犁起於春秋亦恐未確古藉田之禮曰三推不用犁安用推乎故平都令光敎過以人輓犁臣召南按以人代牛輓犁始此唐夏州都督王方翼為耦耕法張機楗力省而見功多宋武允成獻踏犁不用牛以人力運之皆人輓犁之遺式也課得穀皆多其旁田畮一斛以上顧炎武曰蓋壖地乃乆不耕之地地力有餘其收必多所以作代田之法也陿小漢家制度以為疏濶注師古曰莽以漢家制度為泰疏濶而更之令陿小臣照按顔注非也蓋陿小者即鄙陋之意言鄙陋漢制謂為疏濶不詳備也前漢書卷二十四上考證欽定四庫全書前漢書卷二十四下漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顏師古注食貨志第四下凡貨金錢布帛之用夏殷以前其詳靡記云太公為周立九府圜法李竒曰圜即錢也圜一寸而重九兩師古曰此說非也周官大府玉府内府外府泉府天府職内職金職幣皆掌財幣之官故云九府圜謂均而通也宋祁曰周官下當添有字黄金方寸而重一斤錢圜函方孟康曰外圜而内孔方也輕重以銖師古曰言黄金以斤為名錢則以銖為重也布帛廣二尺二寸為幅長四丈為匹故貨寶於金利於刀如淳曰名錢為刀者以其利於民也流於泉如淳曰流行如泉也布於布如淳曰布於民間束於帛李竒曰束聚也太公退又行之於齊至管仲相桓公通輕重之權曰歲有凶穰師古曰穰音人常反宋祁曰人常當作人掌故穀有貴賤令有緩急故物有輕重李竒曰上令急於求米則民重米緩於求米則民輕米人君不理則畜賈游於市師古曰畜讀曰蓄蓄賈謂賈人之多蓄積者乘民之不給百倍其本矣師古曰給足也故萬乘之國必有萬金之賈千乘之國必有千金之賈者利有所幷也計本量委則足矣師古曰委積也然而民有饑餓者榖有所臧也師古曰言富人多臧榖故令貧者食不足也民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重李竒曰民輕之時為斂糴之重之時官為散也凡輕重斂散之以時則凖平使萬室之邑必有萬鍾之臧臧繈千萬李竒曰繈落也孟康曰六斛四斗為鍾繈錢貫也管子曰凶歲糴釡十繈師古曰孟說是也繈音居兩反千室之邑必有千鍾之臧臧繈百萬春以奉耕夏以奉耘師古曰奉謂供事也耒耜器械種饟糧食必取澹焉師古曰種五榖之種也饟字與餉同謂餉田之具也宋祁曰取澹當作取贍故大賈畜家不得豪奪吾民矣師古曰畜讀曰蓄豪謂輕侮之也字本作􅭍蓋通用字耳桓公遂用區區之齊合諸侯顯伯名師古曰伯讀曰霸其後百餘年周景王時患錢輕將更鑄大錢應劭曰大於舊錢其價重也單穆公曰不可師古曰單穆公周大夫單旗單音善古者天降災戾師古曰戾惡氣也一曰戾至也於是乎量資幣權輕重以救民應劭曰資財也量資幣多少有無平其輕重也師古曰凡言幣者皆所以通貨物易有無也故金之與錢皆名為幣也民患輕則為之作重幣以行之於是有母權子而行民皆得焉應劭曰母重也其大倍故為母也子輕也其輕少半故為子也民患幣之輕而物貴為重幣以平之權時而行以廢其輕故曰母權子猶言重權輕也民皆得者本末有無皆得其利也孟康曰重為母輕為子若市八十錢物以母當五十以子三十續之若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之應劭曰民患幣重則多作輕錢而行之亦不廢去重者言重者行其貴輕者行其賤也今王廢輕而作重民失其資能無匱乎民若匱王用將有所乏乏將厚取於民師古曰厚猶多也重也民不給將有遠志是離民也師古曰遠志謂去其本居而散亡也且絶民用以實王府猶塞川原為潢洿也師古曰原謂水泉之本也潢洿停水也潢音黄洿音一胡反竭亡日矣王其圖之弗聽卒鑄大錢文曰寶貨肉好皆有周郭韋昭曰肉錢形也好孔也以勸農澹不足百姓蒙利焉孟康曰單穆公曰竭亡日矣不得復云百姓蒙利焉臣瓚曰但自不聽不鑄大錢耳猶自從其不廢輕此言母子並用故蒙其利也師古曰二說皆非也單旗雖有此言王終自鑄果有便故百姓蒙其利也秦幷天下幣為二等黄金以溢為名上幣孟康曰二十兩為溢也師古曰改周一斤之制更以溢為金之名數也高祖初賜張良金百溢此尚秦制也上幣者二等之中黄金為上而錢為下也銅錢質如周錢臣瓚曰言錢之形質如周錢唯文異耳文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶臧不為幣然各隨時而輕重無常漢興以為秦錢重難用更令民鑄莢錢知淳曰如楡莢也師古曰莢音頰黄金一斤師古曰復周之制更以斤名金而不軌逐利之民畜積餘贏以稽市物痛騰躍李竒曰稽貯滯也晉灼曰痛甚也言計市物賤豫益畜之物貴而出賣故使物甚騰躍也師古曰不軌謂不循軌度者也言以其贏餘之財蓄積羣貨使物稽滯在已故市價甚騰貴今書本痛字或作踊者誤耳踊騰一也不當重累言之畜讀曰蓄米至石萬錢馬至匹百金天下已平高祖乃令賈人不得衣絲乘車重稅租以困辱之師古曰欲令務農孝惠高后時為天下初定復弛商賈之律師古曰弛}
