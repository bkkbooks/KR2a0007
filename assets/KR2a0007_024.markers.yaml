  - {type: variant, offset: 119, length: 1, content: 布, WYG: 私奉養不領於天子之經費師古曰言各收其所賦稅以自供不入國朝之倉廩府庫也經常也宋祁曰自天子當作自天下漕轉關東粟以給中都官歲不過數十萬石師古曰中都官京師諸官府也孝惠高后之間}
