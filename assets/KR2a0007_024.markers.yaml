  - {type: variant, offset: 145, length: 1, content: 陳, WYG: 饑一女不織或受之寒生之有時而用之亡度則物力必屈師古曰屈盡也音其勿反古之治天下至孅至悉也師古曰孅細也悉盡其事也孅與纎同故其畜積足恃今背本而趨末食者甚衆是天下之大殘也師古曰本農業也末工商也言人已棄農而務工商矣其食米粟者又甚衆殘傷害也淫侈之俗日日以長是天下之大賊也殘賊公行莫之或止大命將泛孟康曰泛音方勇反泛覆也師古曰字本作覂此通用也宋祁曰勇當作濫莫之振救師古曰振舉也生之者甚少而靡之者甚多師古曰靡散也音縻天下財產何得不蹷應劭曰蹷傾竭也師古曰蹷音厥漢之}
