  - {type: variant, offset: 1584, length: 455, content: 今王與耳旦暮死而公擁兵數萬不肯相救胡不赴秦俱死且什有一二相全餘曰所以不俱死欲為趙王張君報秦今俱死如以肉餧虎何益張黶陳釋曰事已急要以俱死立信安知後慮餘曰吾顧以無益乃使五千人令張黶陳釋先嘗秦軍至皆沒當是時燕齊楚聞趙急皆來救張敖亦北收代得萬餘人來皆壁餘旁項羽兵數絕章邯甬道王離軍乏食項羽悉引兵渡河破章邯軍諸侯軍乃敢擊秦軍遂虜王離於是趙王歇張耳得出鉅鹿與餘相見責讓餘問張黶陳釋所在餘曰黶釋以必死責臣臣使將五千人先嘗秦軍皆沒耳不信以為殺之數問餘餘怒曰不意君之望臣深也豈以臣重去將哉乃脫解印綬與耳耳不敢受餘起如廁客有說耳曰天予不取反受其咎今陳將軍與君印綬不受反天不祥急取之耳乃佩其印收其麾下餘還亦望耳不讓趨出耳遂收其兵餘獨與麾下數百人之河上澤中漁獵由此有隙趙王歇復居信都耳從項羽入關項羽立諸侯耳雅遊多為人所稱項羽素亦聞耳賢乃分趙立耳為常山王治信都信都更名襄國餘客多說項羽陳餘張耳一體有功於趙羽以餘不從入關聞其在南皮即以南皮旁三縣封之而徙趙王歇王代耳之國餘愈怒曰耳與餘功等也今耳王餘獨侯及齊王田榮叛楚餘乃使夏說說田榮曰項羽為, WYG: 錯}
