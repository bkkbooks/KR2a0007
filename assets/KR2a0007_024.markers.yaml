  - {type: variant, offset: 2959, length: 1, content: 宣, WYG: 匈奴侵寇甚莽大募天下囚徒人奴名曰豬突豨勇服䖍曰豬性觸突人故取以喩師古曰東方名豕曰豨一曰豨豕走也音許豈反壹切稅吏民訾三十而取一又令公卿以下至郡縣黄綬吏皆保養軍馬師古曰保者不許其死傷吏盡復以與民師古曰轉令百姓養之民搖手觸禁不得耕桑繇役煩劇師古曰繇讀曰徭而枯旱蝗蟲相因又用制作未定上自公侯下至小吏皆不得奉祿而私賦斂貨賂上流獄訟不決吏用苛暴立威旁緣莽禁侵刻小民師古曰旁依也音歩浪反富者不得自保貧者無以自存起為盜賊依阻山澤吏不能禽而覆蔽之浸淫日廣師古曰浸淫猶漸染也它皆類此於是青徐荆楚之地往往萬數戰鬭死亡緣邊四夷所係虜陷罪饑疫人相食及莽未誅而天下戸口減半矣自發豬突豨勇後四年而漢兵誅莽後二年世祖受命盪滌煩苛復五銖錢與天下更始贊曰易稱裒多益寡稱物}
  - {type: page-break, offset: 2959, content: '', id: KR2a0007_WYG_024-62b, image: WYG0249/WYG0249-0509b.png}
