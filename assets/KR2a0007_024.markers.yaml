  - {type: variant, offset: 113, length: 3, content: 刎頸交, krp: 餘子師古曰未任役者是也幼童皆當受業豈論嫡庶乎八歲入小學學六甲五方書計之事蘇林曰五方之異書如今祕書學外國書也臣瓚曰辨五方之名及書蓺也師古曰瓚說是也始知室家長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄕學于庠序庠序之異者移國學于少學諸侯歲貢少學之異者於天子學于大學命曰造士李竒曰造成也行同能偶則别之以射師古曰以射試之然後爵命焉孟春之月羣居者將散師古曰謂各趣農畮也行人振木鐸徇于路以采詩師古曰行人遒人也主號令之官鐸大鈴也以木為舌謂之木鐸徇巡也采詩采取怨刺之詩也獻之大師比其音律以聞於天子師古曰大師掌音律之官敎六詩以六律為之音者比謂次之也比音頻二反宋祁曰比謂下當添調字故曰王者不窺牖戸而知天下此先王制土處民富而敎之之大略也故孔子曰道千乘之國敬事而信節用而愛人使民以時師古曰論語載孔子之言也道治也舉事必敬施令必信不為奢侈愛養其萌無奪農時故民皆勸功樂業先公而後私其詩曰有渰淒淒興雲祁祁雨我公田遂及我私師古曰小雅大田之詩也渰陰雲也淒淒雲起貌也祁祁徐也言陰陽和風雨時萌庶慶悅喜其先雨公田乃及私也宋祁曰興雲當改興雨民三年耕則餘一年之畜師古曰畜讀曰蓄其下並同衣食足而知榮辱廉讓生而爭訟息故三載考績師古曰績功也言主治萌者三年一考其績也孔子曰苟有用我者期月而已可也三年有成成此功也師古曰論語載孔子之言也用謂使為政期月可以易俗三年乃得成功也三考黜陟餘三年食進業曰登鄭氏曰進上百工之業也或曰進上農工諸事業名曰登再登曰平餘六年食三登曰泰平二十七歲遺九年食然後王德流洽禮樂成焉宋祁曰邵本王德作至德故曰如有王者必世而後仁師古曰亦孔子之言也解在刑法志繇此道也師古曰繇讀與由同由用也從也周室旣衰暴君汚吏慢其經界師古曰汚謂貪穢也繇役橫作師古曰繇讀曰徭橫音胡孟反政令不信上下相詐公田不治故魯宣公初稅畮劉攽曰稅畮所謂二也春秋譏焉孟康曰春秋謂之履畮履踐民所種好者而取之譏其貪也於是上貪民怨災害生而禍亂作陵夷至於戰國貴詐力而賤仁誼先富有而後禮讓是時李悝為魏文侯作盡地力之敎師古曰李悝文侯臣也悝音恢以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畮治田勤謹則畮益三升服䖍曰與之三升也臣瓚曰當言三斗謂治田勤則畮加三斗也師古曰計數而言字當為斗瓚說是也宋祁曰治田勤謹當作勸謹下不勤同不勤則損亦如之地方百里之增減輙為粟百八十萬石矣又曰糴甚貴傷民韋昭曰此民謂士工商也甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民無傷而農益勸今一夫挾五口治田百畮歲收畮一石半為粟百五十石除十一之稅十五石餘百三十五石食人月一石半五人終歲為粟九十石餘有四十五石石三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終歲用千五百不足四百五十師古曰少四百五十不足也不幸疾病死喪之費及上賦斂又未與此師古曰與讀曰豫此農夫所以常困有不勸耕之心而令糴至於甚貴者也是故善平糴者必謹觀歲有上中下孰上孰其收自四餘四百石張晏曰平歲百畮收百五十石今大孰四倍收六百石計民食終歲長四百石官糴三百石此為糴三舍一也中孰自三餘三百石張晏曰自三四百五十石也終歲長三百石官糴二百石此為糴二而舍一也下孰自倍餘百石張晏曰自倍收三百石終歲長百石官糴其五十石云下孰糴一謂中分百石之一小饑則收百石張晏曰平歲百畮之收收百五十石今小饑收百石收三分之二也中饑七十石張晏曰收二分之一大饑三十石張晏曰收五分之一也以此凖之大小中饑之率也故大孰則上糴三而舍一中孰則糴二下孰則糴一使民適足賈平則止師古曰賈讀曰價小饑則發小孰之所斂李竒曰官以斂藏出糴也宋祁曰糴也姚改也作之字中饑則發中孰之所斂大饑則發大孰之所斂而糶之故雖遇饑饉水旱糴不貴而民不散取有餘以補不足也行之魏國國以富彊及秦孝公用商君壞井田開仟伯師古曰仟伯田間之道也南北曰仟東西曰伯伯音莫白反宋祁曰仟伯王本伯作陌急耕戰之賞雖非古道猶以務本之故傾鄰國而雄諸侯然王制遂滅僭差亡度庶人之富者累鉅萬師古曰鉅大也大萬謂萬萬也累者兼數非止一也言其貲財積累萬萬也而貧者食糟糠有國彊者兼州域而弱者喪社稷至於始皇遂幷天下内興功作外攘夷狄收泰半之賦師古曰泰半三分取其二發閭左之戍應劭曰秦時以適發之名適戍先發吏有過及贅壻賈人後以嘗有市籍者發又後以大父母父母嘗有市籍者戍者曹輩盡復入閭取其左發之未及取右而秦亡師古曰閭里門也言居在里門之左者一切發之此閭左之釋應最得之諸家之義煩穢舛錯故無所取也男子力耕不足糧饟師古曰饟古餉字女子紡績不足衣服竭天下之資財以奉其政猶未足以澹其欲也師古曰澹古贍字也贍給也下同宋祁曰也字當刪海内愁怨遂用潰畔師古曰下逃其上曰潰漢興接秦之敝諸侯並起民失作業而大饑饉凡米石五千人相食死者過半}
