  - {type: variant, offset: 479, length: 1, content: 倡, WYG: 者因禍而為福轉敗而為功今久退七福而行博禍劉奉世曰今久退七福久當作乃臣誠傷之上不聽是時吳㠯諸侯即山鑄錢富埓天子師古曰即就也埒等也宋祁曰即就也下當添李竒曰三字後卒叛逆鄧通大夫也㠯鑄錢財過王者故吳鄧錢布天下武帝因文景之畜忿胡粤之害師古曰畜讀曰蓄即位數年嚴助朱買臣等招徠東甌事兩粤江淮之間蕭然煩費矣師古曰蕭然猶騷然勞動之貌唐蒙司馬相如}
