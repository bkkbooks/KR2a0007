  - {type: variant, offset: 466, length: 2, content: 父子, WYG: 公得顧租鑄銅錫為錢敢雜以鉛鐵為它巧者其罪黥師古曰顧租謂顧庸之直或租其本然鑄錢之情非殽雜為巧則不可得贏師古曰殽謂亂雜也亡餘利也言不雜鉛鐵則無利也殽音爻宋祁曰亡餘利也姚本改作贏餘利也而殽之甚微為利甚厚師古曰微謂精妙也言殽雜鉛鐵其術精妙而得利甚厚故令人輕犯之姦不可止也夫事有召禍而法有起姦今令細民人操造幣之埶師古曰操持也人人皆得鑄錢也操音千高反各隱屛而鑄作因欲禁其厚利微姦雖黥罪日報其埶不止鄭氏曰報論也廼者民人抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫縣法以誘民師古曰縣謂開立之使入陷阱孰積於此師古曰阱穿地以陷獸也積多也阱音才性反曩禁鑄錢死罪積下蘇林曰下報也積累下報論之也張晏曰死罪者多委積於下也師古曰蘇說是也下音胡亞反後同今公鑄錢黥罪積下為法若此上何頼焉師古曰頼利也一曰恃也又民用錢郡縣不同或用輕錢百加若干應劭曰時錢重四銖法錢百枚當重一斤十六銖輕則以錢足之若干枚令滿平也師古曰若干且設數之言也干猶箇也謂當如此箇數耳而胡廣云若順也干求也當順所求而與之矣宋祁曰干求也下邵本添合也二字或用重錢平稱不受應劭曰用重錢則平稱有餘不能受也臣瓚曰秦錢重半兩漢初鑄莢錢文帝更鑄四銖錢秦錢與莢錢皆當廢而故與四銖並行民以其見廢故用輕錢則百加若干用重錢雖以一當一猶復不受之是以郡縣不同也師古曰應說是也稱音尺孕反法錢不立師古曰法錢依法之錢也吏急而壹之虖則大為煩苛而力不能勝縱而弗呵虖師古曰呵責怒也音火何反則市肆異用錢文大亂苟非其術何鄉而可哉師古曰鄉讀曰嚮今農事棄捐而采銅者日蕃師古曰蕃多也音扶元反其下亦同釋其耒耨冶鎔炊炭應劭曰鎔形容也作錢模也師古曰鎔音容宋祁曰錢模下姚本添樸字姦錢日多五穀不為多師古曰言皆采銅鑄錢廢其農業故五榖不多也為音于偽反不為多猶言為之不多也善人怵而為姦邪李竒曰怵誘也動心於姦邪也師古曰怵音先律反又音黜愿民陷而之刑戮師古曰愿謹也刑戮將甚不詳奈何而忽師古曰詳平也忽忽㤀也宋祁曰忽㤀也姚本改作怠􅁯也國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重師古曰令謂法令也重則其利深盜鑄如雲而起師古曰言其多棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也師古曰數並音所角反故銅布於天下其為禍博矣師古曰博大也今博禍可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣偽錢不蕃民}
