  - {type: variant, offset: 1028, length: 296, content: 問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何如人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面而王夫臣之與主豈可同日道哉顧其勢初定且以長少先立武臣以持趙心今趙地已服兩人亦欲分趙而王時未可耳今君囚趙王念此兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕況以兩賢王左提右挈而責殺王滅燕易矣燕以為然乃歸趙王養卒為御而歸李良已定常山還報趙王趙王復使良略太原至石邑秦兵塞井陘未能前秦將詐稱二世使使遺良書不封曰良嘗事我得顯幸誠能反趙為秦赦良罪貴良良得書疑不信之邯鄲益請兵未至道逢趙王姊從百餘騎良望見以為王伏謁道旁王姊醉不知其將使騎謝良良素貴起慚, WYG: ''}
