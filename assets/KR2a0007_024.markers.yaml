  - {type: variant, offset: 963, length: 0, content: '', WYG: 名也書曰九江納錫大龜大龜又不出蔡國也若龜出楚不可名龜為楚也師古曰瓚說非也本以蔡出善龜故因名大龜為蔡也有者入大卜受直百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢非井田挾五銖錢者為惑衆投諸四裔以御魑魅於是農商失業食貨俱廢民涕泣於市道坐賣買田宅奴婢鑄錢抵罪者自公卿大夫至庶人不可稱數莽知民愁廼但行小錢直一與大錢五十二品並行龜貝布屬且寢莽性躁擾不能無為每有所興造必}
