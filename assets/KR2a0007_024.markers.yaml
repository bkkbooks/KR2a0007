  - {type: variant, offset: 2683, length: 273, content: 以私問之中大夫泄公曰臣素知之此固趙國立名義不侵為然諾者也上使泄公持節問之箯輿前卬視泄公勞苦如平生歡與語問張王果有謀不高曰人情豈不各愛其父母妻子哉今吾三族皆以論死豈以王易吾親哉顧為王實不反獨吾等為之具道本根所以王不知狀於是泄公具以報上上乃赦趙王上賢高能自立然諾使泄公赦之告曰張王已出上多足下故赦足下高曰所以不死白張王不反耳今王已出吾責塞矣且人臣有篡弒之名豈有面目復事上哉乃仰絕亢而死敖已出尚魯元公主如故封為宣平侯於是上賢張王諸客皆以為諸侯相郡守語在田叔傳及孝惠高后文景時張王客子孫皆為二千石初孝惠時齊悼惠王獻城陽郡尊魯元公主為太后高后元年魯元太后薨, WYG: 什六七作貨布}
