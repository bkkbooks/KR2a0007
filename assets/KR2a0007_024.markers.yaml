  - {type: variant, offset: 481, length: 1, content: 莫, WYG: 開西南夷鑿山通道千餘里㠯廣巴蜀巴蜀之民罷焉師古曰罷讀曰疲彭吳穿穢貊朝鮮置滄海郡師古曰彭吳人姓名也本皆荒梗始開通之也故言穿也則燕齊之間靡然發動及王恢謀馬邑匈奴絶和親侵擾北邊兵連而}
  - {type: variant, offset: 481, length: 1, content: 莫, krp: 開西南夷鑿山通道千餘里㠯廣巴蜀巴蜀之民罷焉師古曰罷讀曰疲彭吳穿穢貊朝鮮置滄海郡師古曰彭吳人姓名也本皆荒梗始開通之也故言穿也則燕齊之間靡然發動及王恢謀馬邑匈奴絶和親侵擾北邊兵連而}
  - {type: variant, offset: 483, length: 1, content: 嚮, WYG: 解天下共其勞師古曰共猶同干戈日滋行者齎居者送師古曰齎謂將衣食之具以自隨也音子奚反中外騷擾相奉百姓抏敝以巧法師古曰抏訛也謂摧挫也巧法為巧詐以避法也抏音五官反財賂衰耗而不澹師古曰耗減也澹足也入物者補官出貨者除罪選舉陵夷廉恥相冒師古曰冒蒙也武力進用法嚴令具興利之臣自此而始師古曰謂桑𢎞羊東郭咸陽孔僅之屬也其後衞青歲以數萬騎出擊匈奴遂取河南地築朔方時又通西南夷道作者數萬人千里負擔餽饟師古曰餽亦饋字饟古餉字率十餘鍾致一石師古曰言其勞費用功重散幣於卭僰㠯輯之}
