  - {type: variant, offset: 537, length: 0, content: '', WYG: 齊等也無有貴賤謂之齊民若今言平民矣晉灼曰中國被敎齊整之民也師古曰所姓也忠名也武帝之近臣郊祀志云公孫卿因所忠言寶鼎石慶傳云欲請詔近臣所忠廣川王傳云言漢公卿及幸臣所忠司馬相如傳云所忠往取書考其蹤迹此並一人也而說者或以為所忠信之人此釋大謬齊等之義如說是也廼徵諸犯令相引數千人名曰株送徒入財者得補郎郎選衰矣應劭曰株根本也送致也如淳曰株蔕也諸坐博戲事決為徒者能入錢得補郎李竒曰先至者為魁株也師古曰言被牽引者為其根株所送當充徒役而能入財者即當補郎是時山東被河災及歲不登數年人或相食方二三千里天子憐之令饑民得流就食江淮間欲留留處師古曰流謂恣其行移若水之流至所在有欲住者留而處之宋祁曰處之當改處也使者冠蓋相屬於道䕶之師古曰屬聯續也音之欲反下巴蜀粟以振焉明年天子始出巡郡國東度河河東守不意行至不辯自殺宋祁曰不辯當改不辦行西踰隴卒孟康曰踰度也卒倉卒也從官不得食隴西守自殺於是上北出蕭關從數萬騎行獵新秦中以勒邊兵而歸新秦中或千里無亭徼晉灼曰徼塞也臣瓚曰旣無亭候又不徼循無禦邊之備故誅北地太守師古曰晉說是也於是誅北地太守以下而令民得畜邊縣孟康曰令得畜牧於邊縣官假馬母三歲而歸及息什一以除吿緍用充入新秦中李竒曰邊有官馬今令民能畜官母馬者滿三歲歸之十母馬還官一駒此為息什一也師古曰官得母馬之息以給用度得充實秦中人故除吿緍之令也既得寶鼎立后土泰一祠公卿白議封禪事而郡國皆豫治道脩繕故宮及當馳道縣縣治宮儲設共具師古曰共音居用反而望幸明年南粤反西羌侵邊天子為山東不澹宋祁曰澹當作贍赦天下囚因南方樓船士二十餘萬人擊粤發三河以西騎擊羌又數萬人渡河築令居師古曰令音零初置張掖酒泉郡而上郡朔方西河河西開田官斥塞卒六十萬人戍田之師古曰開田始開屯田也斥塞廣塞令郤初置二郡故塞更廣也以開田之官廣塞之卒戍而田也中國繕道餽糧遠者三千近者千餘里皆仰給大農師古曰仰音牛向反此下並同邊兵不足廼發武庫工官兵器以澹之宋祁曰澹當作贍車騎馬乏縣官錢少買馬難得廼著令令封君以下至三百石吏以上差出牡馬天下亭亭有畜字馬歲課息齊相卜式上書願父子死南粤天子下詔襃揚賜爵關内侯黄金四十斤田十頃布吿天下天下莫應列侯以百數皆莫求從軍至飲酎少府省金李竒曰省視也至嘗酎飲宗廟時少府視其金多少而列侯坐酎金失侯者百餘人廼拜卜式為御史大}
