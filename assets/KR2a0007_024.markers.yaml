  - {type: variant, offset: 282, length: 1, content: 願, WYG: 屬皆不得賣買其男口不滿八而田過一井者分餘田與九族鄉黨犯令法至死制度又不定吏緣為姦天下謷謷然陷刑者衆師古曰謷謷衆口愁聲也音敖後三歲莽知民愁下詔諸食王田及私屬皆得賣買勿拘以法然刑罰深刻它政誖亂師古曰誖乖也音布内反邊兵二十餘萬人仰縣官衣食師古曰仰音牛向反用度不足數横賦斂師古曰數音所角反橫音胡孟反民兪貧困常苦枯旱亡有平歲穀賈翔貴晉灼曰翔音常師古曰晉說非也翔言如鳥之回翔謂不離於貴也若暴貴稱騰踊也末年盜賊羣起發軍擊之將吏放縱於外北邊及青徐地人相食雒陽以東米石二千莽遣三公}
  - {type: page-break, offset: 282, content: '', id: KR2a0007_WYG_024-25a, image: WYG0249/WYG0249-0489c.png}
  - {type: variant, offset: 282, length: 1, content: 願, krp: 屬皆不得賣買其男口不滿八而田過一井者分餘田與九族鄉黨犯令法至死制度又不定吏緣為姦天下謷謷然陷刑者衆師古曰謷謷衆口愁聲也音敖後三歲莽知民愁下詔諸食王田及私屬皆得賣買勿拘以法然刑罰深刻它政誖亂師古曰誖乖也音布内反邊兵二十餘萬人仰縣官衣食師古曰仰音牛向反用度不足數横賦斂師古曰數音所角反橫音胡孟反民兪貧困常苦枯旱亡有平歲穀賈翔貴晉灼曰翔音常師古曰晉說非也翔言如鳥之回翔謂不離於貴也若暴貴稱騰踊也末年盜賊羣起發軍擊之將吏放縱於外北邊及青徐地人相食雒陽以東米石二千莽遣三公}
  - {type: variant, offset: 285, length: 3, content: 毋王急, WYG: 開東方諸倉振貸窮乏又分遣大夫謁者敎民煮木為酪服䖍曰煮木實或曰如今餌术之屬也如淳曰作杏酪之屬也師古曰如說是也酪不可食重為煩擾師古曰重音直用反流民入關者數十萬人置養澹官以稟之吏盜其稟師古曰稟給也盜所給之物稟音彼甚反饑死者什七八莽恥為政所致廼下詔曰予遭陽九之阸百六之會師古曰此歴法應有災歲之期也事在律歴志枯旱霜蝗饑饉薦臻蠻夷猾夏寇賊姦軌百姓流離予甚悼之害氣將究矣師古曰究竟盡也歲為此言以至於亡前漢書卷二十四上前漢書卷二十四上考證食貨志上煣木為耒宋祁曰當為揉木云云臣照按揉者必以火熨則其字從火亦未為非古字不傳于今者甚多他書}
