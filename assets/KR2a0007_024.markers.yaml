  - {type: variant, offset: 2961, length: 0, content: '', WYG: 施師古曰謙卦象辭裒取也言取於多者以益少者故萬物皆稱而施與平也裒音簿}
  - {type: variant, offset: 2961, length: 0, content: '', krp: 施師古曰謙卦象辭裒取也言取於多者以益少者故萬物皆稱而施與平也裒音簿}
  - {type: variant, offset: 2962, length: 8, content: 敖復薨呂太后立敖, WYG: 反書云楙遷有無應劭曰楙勉也遷徙也言天下食貨有無相通足也師古曰虞書益稷之辭言勸勉天下遷徙有無使相通也周有泉府之官師古曰司徒之屬官也掌市之征布斂市貨之不讎貨之滯於人用者以其價買之而孟}
  - {type: variant, offset: 2962, length: 8, content: 敖復薨呂太后立敖, krp: 反書云楙遷有無應劭曰楙勉也遷徙也言天下食貨有無相通足也師古曰虞書益稷之辭言勸勉天下遷徙有無使相通也周有泉府之官師古曰司徒之屬官也掌市之征布斂市貨之不讎貨之滯於人用者以其價買之而孟}
