  - {type: variant, offset: 2982, length: 2, content: 又憐, WYG: 臣浩按鄭樵所言可備一說但古人名物必有義理志謂寶於金云云即解字義非沿鑿也以勸農澹不足百姓䝉利焉顧炎武曰單穆公諫景王鑄大錢本之周語王勿聽卒鑄大錢此廢輕作重不利於民之事班氏乃續之曰以勸農澹不足百姓蒙利焉失}
