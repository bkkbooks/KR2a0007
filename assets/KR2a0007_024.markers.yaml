  - {type: variant, offset: 1339, length: 3, content: 先立且, WYG: 非相反也夫詩據承平之世酒酤在官和㫖便人可以相御也師古曰㫖美也御進也論語孔子當周衰亂酒酤在民宋祁曰在字下一有齊字薄惡不誠是以疑而弗食今絶天下之酒則無以行禮相養放而亡限則費財傷民請法古令官作酒以二千五百石為一均率開一盧以賣如淳曰酒家開肆待客設酒罏故以罏名肆臣瓚曰盧酒瓮也言開一瓮酒也}
