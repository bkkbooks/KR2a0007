  - {type: variant, offset: 22, length: 11, content: 客嘗亡命遊外黃外黃富人, WYG: 十五日凡四十五日也必相從者所以省費燎火同巧拙而合習俗也師古曰省費燎火省燎火之費也燎所以為明火所以為溫也燎音力召反男}
