  - {type: variant, offset: 1327, length: 1, content: 從, WYG: 貸物者以共其所屬吏定價而後與之各以其國服事之稅而輸息謂若受園㕓之田而貸萬錢者一朞之月出息五百貸音土戴反樂語有五均鄧展曰樂語樂元語河問獻王所傳道五均事臣瓚曰其文云天子取諸侯之土以立五均則市無二賈四民常均彊者不得困弱富者不得要貧則公家有餘恩及小民矣傳記各有斡焉今開賖貸張五均設諸斡者所以齊衆庶抑幷兼也遂於長安及五都立五均官更名長安東西市令及洛陽邯鄲臨甾宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商能采金銀銅連錫登龜取貝者如淳曰登進也龜有靈故言登皆自占司市錢府順時氣而取之師古曰各以其所采取之物自隱實於司市錢府也占音之漸反其下並同又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不樹蓺者為不毛師古曰樹蓺謂種樹果木及菜蔬出三夫之布民浮游無事出夫布一匹其不能出布者冗作縣官衣食之師古曰冗散也音人勇反衣音於既反食讀曰飤諸取衆物鳥獸魚鼈百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫師古曰機縷曰紝音人禁反工匠醫巫卜祝及它方技商販賈人坐肆列里區謁舍如淳曰居處所在為區謁舍今之客舍也皆各自占所為於其在所之縣官除其本計其利十一分之而以其一為貢敢不自占自占不以實者盡没入所采取而作縣官一歲諸司市常以四時中月實定所掌師古曰中讀曰仲為物上中下之賈師古曰賈讀曰價其下並同各自用為其市平毋拘它所衆民賣買五穀布帛絲緜之物周於民用而不讎者師古曰讎讀曰售下亦類此均}
