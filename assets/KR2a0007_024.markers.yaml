  - {type: variant, offset: 2044, length: 0, content: '', WYG: 卬以給澹師古曰卬音牛向反其下並同宋祁曰澹當作贍鐵布銅冶通行有無備民用也此六者非編戸齊民所能家作師古曰謂家家自作也必卬於市雖䝿數倍不得不買豪民富賈即要貧弱先聖知其然也故斡之每一斡為設科條防禁犯者辠至死姦吏猾民並侵衆庶各不安生後五歲天鳳元年復申下金銀龜貝之貨頗增減其賈直而罷大小錢改作貨布長二寸五分廣一寸首長八分有竒師古曰竒音居宜反謂有餘也廣八分其圜好徑二分半師古曰好孔也足枝長八分閒廣二分其文右曰貨左曰布重二十五銖直貨泉二十五貨泉徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品並行又以大錢行久罷之恐民挾不止廼令民且獨行大錢與新貨泉俱枚直一並行}
