  - {type: variant, offset: 272, length: 0, content: '', WYG: 令民有車騎馬一匹者復卒三人如淳曰復三卒之算錢也或曰除三夫不作甲卒也師古曰當為卒者免其三人不為卒者復其錢耳復音方目反車騎者天下武備也故為復卒師古曰為音于偽反神農之敎曰有石城十仞應劭曰仞五尺六寸也師古曰此說非也八尺曰仞取人申臂之一尋也湯池百步師古曰池城邊也以沸湯為池不可輙近喻嚴固之甚帶甲百萬而亡粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上廼復一人耳師古曰五大夫第九等爵也復音方目反此其與騎馬之功相去遠矣爵者上之所擅出於口而亡窮師古曰擅專也粟者民之所種生於地而不乏夫得高爵與免罪人之所甚欲也使天下人入粟於邊以受爵免罪不過三歲塞下之粟必多矣於是文帝從錯之言令民入粟邊六百石爵上造師古曰上造第二等爵也稍增至四千石為五大夫師古曰五大夫第九等爵萬二千石為大庶長師古曰大庶長第十八等爵也各以多少級數有差錯復奏言陛下幸使天下入粟塞下以拜爵甚大惠也竊恐塞卒之食不足用大渫天下粟邊食足以支五歲可令入粟郡縣矣師古曰入諸郡縣以備凶災也足支一歲以上可時赦勿收農民租如此德澤加於萬民民俞勤農師古曰俞進也音踰又音愈時有軍役若遭水旱民不困乏天下安寧歲孰且美則民大富樂矣上復從其言廼下詔賜民十二年租稅之半明年遂除民田之租稅後十三歲孝景二年令民半出田租三十而稅一也其後上郡以西旱復修賣爵令而裁其賈以招民師古曰裁謂減省之也及徒復作得輸粟於縣官以除罪師古曰復音方目反解見宣紀}
