  - {type: variant, offset: 2976, length: 1, content: 母, krp: 前其詳靡記云臣召南按管子言湯以莊山之金鑄幣禹以歴山之金鑄幣則夏殷時即有錢幣矣平凖書曰自高辛氏之前靡得而記虞夏之幣金}
  - {type: variant, offset: 2978, length: 2, content: 太后, WYG: 三品或黄或白或赤或錢或布或刀或龜貝其辭甚核蓋据尚書禹貢之文此志不言蓋因下文有司言古者皮幣一叚恐重複也}
  - {type: variant, offset: 2978, length: 2, content: 太后, krp: 三品或黄或白或赤或錢或布或刀或龜貝其辭甚核蓋据尚書禹貢之文此志不言蓋因下文有司言古者皮幣一叚恐重複也}
  - {type: variant, offset: 2981, length: 0, content: '', WYG: 貨寶於金利於刀流於泉布於布鄭樵曰謂之泉者言其形謂之金者言其質謂之刀者言其器謂之貨謂之布者言其用古文錢字作泉者言其形如泉文一變而為刀器再變而為圜法自圜法流通於世民實便之故泉與刀為廢先儒不知本末謂流於泉布於布寶於金利於刀皆沿鑿之義}
