  - {type: variant, offset: 270, length: 1, content: 殘, WYG: 罪如此富人有爵農民有錢粟有所渫師古曰渫散也音先列反下同宋祁曰有所渫下脫矣字夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損師古曰損減也所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二曰民賦少三曰勸農功}
