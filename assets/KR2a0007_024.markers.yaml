  - {type: variant, offset: 269, length: 0, content: '', WYG: 阽危者若是而上不驚者師古曰阽危者欲墜之意也音閻又音丁念反宋祁曰注阽危當刪危者世之有饑穰天之行也李竒曰天之行氣不能常孰也或曰行道也師古曰穰豐也音人常反宋祁曰人常當作人掌禹湯被之矣師古曰謂禹遭水而湯遭旱也即不幸有方二三千里之旱國胡以相恤師古曰胡何也卒然邊境有急數十百萬之衆國胡以餽之師古曰卒讀曰猝餽亦饋字也兵旱相乘天下大屈師古曰屈音其勿反有勇力者聚徒而衡擊師古曰衡橫也罷夫羸老易子而齩其骨師古曰罷讀曰疲齩齧也音五巧反宋祁曰姚本而齩刪而字齩下狡反政治未畢通也遠方之能疑者並舉而爭起矣師古曰疑讀曰擬僭也謂與天子相比擬廼駭而圖之豈將有及乎師古曰圖謂謀也夫積貯者天下之大命也苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至師古曰懷來也安也今毆民而歸之農皆著於本師古曰毆亦驅字著音直略反使天下各食其力末技游食之民轉而緣南畮師古曰言皆趨農作也則畜積足而人樂其所矣可以為富安天下而直為此廩廩也李竒曰廩廩危也師古曰言務耕農厚畜積則天下富安何乃不為而常不足廩廩若此竊為陛下惜之於是上感誼言始開藉田躬耕以勸百姓鼂錯復說上曰聖王在上而民不凍饑者非能耕而食之織而衣之也師古曰食讀曰飤衣音於既反為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者孟康曰肉腐為瘠捐骨不埋者或曰捐謂民有饑相棄捐者或謂貧乞者為捐蘇林曰瘠音漬師古曰瘠瘦病也言無相棄捐而瘦病者耳不當音漬也貧乞之釋尤疏僻焉以畜積多而備先具也今海内為一土地人民之衆不避湯禹劉奉世曰不避湯禹避字未詳宋祁曰言土地人民之衆不讓湯禹也加以亡天災數年之水旱而蓄積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出也游食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有高城深池嚴法重刑猶不能禁也夫寒之於衣不待輕煖師古曰苟禦風霜不求靡麗也煖音乃短反饑之於食不待甘㫖師古曰㫖美也饑寒至身不顧廉恥人情一日不再食則饑終歲不製衣則寒夫腹饑不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而有也民者在上所以牧之趨利如水走下四方亡擇也師古曰走音奏夫珠玉金銀饑不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易臧在於把握可以周海内而亡饑寒之患師古曰周謂周徧而遊行此令臣輕背其主而民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝師古曰中人者處強弱之中也不為姦邪所利一日弗得而饑寒至是故明君貴五穀而賤金玉今農夫五口之家其服役者不下二人師古曰服事也給公事之役也其能耕者不過百畮百畮之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當具有者半賈而賣師古曰本直千錢者止得五百也賈讀曰價亡者取倍稱之息如淳曰取一償二為倍稱師古曰稱舉也今俗所謂舉錢者也於是有賣田宅鬻子孫以償責者矣而商賈大者積貯倍息小者坐列販賣師古曰行賣曰商坐販曰賈列者若今市中賣物行也賈音古操其竒贏日游都市師古曰竒贏謂有餘財而畜聚竒異之物也一說竒謂殘餘物也音居宜反乘上之急所賣必倍師古曰上所急求則其價倍貴故其男不耕耘女不蠶織衣必文采食必粱肉師古曰粱好粟也即今之粱米亡農夫之苦有仟伯之得師古曰仟謂千錢伯謂百錢也伯音莫白反今俗猶謂百錢為一伯因其富厚交通王侯力過吏埶以利相傾千里游敖冠蓋相望乘堅策肥履絲曵縞師古曰堅謂好車也縞皓素也繒之精白者也此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖迕師古曰迕違也好音呼到反惡音烏故反迕音五故反而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以}
