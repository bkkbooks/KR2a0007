  - {type: variant, offset: 291, length: 2, content: 西遣, WYG: 駁古史也宋祁說未必然又按宋本宋祁語至當為揉木而止無玉篇以下云云今據凌本添餘二十畮以為廬舍臣召南按井田畝數何休注公羊趙岐注孟子范寗注穀梁皆本此志之說惟鄭康成毛詩箋稍為不同詳見甫田孔疏其家衆男為餘夫亦以口受田如比馬端臨曰志言受田之法與大司徒遂}
