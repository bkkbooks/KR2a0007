  - {type: variant, offset: 275, length: 0, content: '', WYG: 陳相因師古曰陳謂乆舊也充溢露積於外腐敗不可食衆庶街巷有馬仟伯之間成羣師古曰謂田中之仟伯也乘牸牝者擯}
  - {type: variant, offset: 275, length: 0, content: '', krp: 陳相因師古曰陳謂乆舊也充溢露積於外腐敗不可食衆庶街巷有馬仟伯之間成羣師古曰謂田中之仟伯也乘牸牝者擯}
  - {type: variant, offset: 276, length: 0, content: '', WYG: 不得會聚孟康曰皆乘父馬有牝馬閒其閒則踶齧故斥出不得會同師古曰言時富饒故恥乘牸牝不必以其踶齧也踶蹋也音大奚反守閭閻者食粱肉為吏者長子孫如淳曰時無事吏不數轉至於生長子孫而不轉職也居官者以為姓號如淳曰貨殖傳倉氏庾氏是也人人自愛而重犯法師古曰重難也先行誼而黜媿辱焉師古曰以行誼為先以媿辱相黜也行音下更反於是罔疏而民富役財驕溢或至幷兼豪黨之徒以武斷於鄉曲師古曰恃其饒富則擅行威罰也斷音丁喚反宗室有土公卿大夫以下爭於奢侈師古曰有土謂國之宗姓受封邑土地者也室廬車服僭上亡限物盛而衰固其變也是後外事四夷内興功利役費並興而民去本董仲舒說上曰春秋它穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也今闗中俗不好種麥是歲失春秋之所重而損生民之具也願陛下幸詔大司農使闗中民益種宿麥令毋後時師古曰宿麥謂其苗經冬又言古者稅民不過什一其求易共師古曰共讀曰供次下亦同使民不過三日其力易足民財内足以養老盡孝外足以事上共稅下足以畜妻子極愛故民說從上師古曰說讀曰悅至秦則不然用商鞅之法改帝}
  - {type: page-break, offset: 276, content: '', id: KR2a0007_WYG_024-18a, image: WYG0249/WYG0249-0486a.png}
