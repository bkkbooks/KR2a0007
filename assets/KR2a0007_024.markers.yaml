  - {type: variant, offset: 683, length: 0, content: '', WYG: 許之於是天子北至朔方東封泰山巡海上旁北邊以歸師古曰旁音步浪反所過賞賜用帛百餘萬匹錢金以鉅萬計皆取足大農𢎞羊又請令民得入粟補吏及罪以贖宋祁曰補吏及罪下當加人字令民入粟甘泉各有差以復終身師古曰復音方目反不復告緍它郡各輸急處而諸農各致粟山東漕益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀諸均輸帛五百萬匹民不益賦而天下用饒於是𢎞羊賜爵左庶長師古曰第十等爵黄金者再百焉師古曰凡再賜百金是歲小旱上令百官求雨卜式言曰縣官當食租衣稅而已師古曰衣音於旣反今𢎞羊令吏坐市列販物求利師古曰市列謂列肆宋祁曰列肆下當添也字亨𢎞羊天乃雨師古曰亨䰞也音普庚反久之武帝疾病拜𢎞羊為御史大夫昭帝即位六年詔郡國舉賢良文學之士宋祁曰之士當刪之字問以民所疾苦敎化之要皆對願罷鹽鐵酒𣙜均輸官母與天下爭利視以儉節師古曰視讀曰示然後敎化可興𢎞羊難師古曰詰難議者之言也}
