  - {type: variant, offset: 987, length: 3, content: 安軔日, WYG: 忠罔上不道甫刑之辟皆為上戮罪名明白臣請詔謁者召商詣若盧詔獄孟康曰若盧獄名屬少府黄門北寺是也上素重商知匡言多險制曰勿治鳳固爭之於是制詔御史蓋丞相以徳輔翼國家典領百寮協和萬國為職任莫重焉今樂昌侯商為丞相出入五年}
