  - {type: page-break, offset: 3848, content: '', id: KR2a0007_WYG_082-8b, image: WYG0250/WYG0250-0659b.png}
  - {type: variant, offset: 3849, length: 3, content: 文雅召, WYG: 材丹進曰凡所謂材者敏而好學温故知新師古曰敏速疾也温厚也温故厚蓄故事也皇太子是也若廼器人於絲竹鼓鼙之間則是陳恵李微高於匡衡可相國也如淳曰器人取人器能也陳恵李微是時好音者也服䖍曰二人皆黄門鼓吹也於是上嘿然而咲師古曰咲古笑字其後中山哀王薨太子前弔哀王者帝之少弟與太子游學相長大師古曰同處長養以至於壯大上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎上以責謂丹師古曰謂者告語也丹免冠謝上曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣竊戒屬毋涕泣感傷陛下師古曰屬音之欲反罪廼在臣當死上}
