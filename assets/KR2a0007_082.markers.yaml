  - {type: variant, offset: 4341, length: 0, content: '', WYG: 秦之所惡獨畏趙奢之}
  - {type: variant, offset: 4341, length: 0, content: '', krp: 秦之所惡獨畏趙奢之}
  - {type: variant, offset: 4342, length: 1, content: 嘗, WYG: 趙括為將耳趙王信之因以括為將代廉頗而括軍遂敗數十萬之衆降秦秦皆阬之宋祁曰注末當有於長平三字漢散萬金以疏亞父師古曰事在陳平傳喜立於朝陛下之光煇傅氏之廢興也如淳曰傅喜顯則傅氏興其廢亦如之晉灼曰用喜於陛下有光明而傅氏之廢復得興也師古曰如說是也上亦自重之明年正月廼徙師丹為大司空而拜喜為大司馬封高武侯丁傅驕奢皆嫉喜之恭儉又傅太后欲求}
  - {type: variant, offset: 4342, length: 1, content: 嘗, krp: 趙括為將耳趙王信之因以括為將代廉頗而括軍遂敗數十萬之衆降秦秦皆阬之宋祁曰注末當有於長平三字漢散萬金以疏亞父師古曰事在陳平傳喜立於朝陛下之光煇傅氏之廢興也如淳曰傅喜顯則傅氏興其廢亦如之晉灼曰用喜於陛下有光明而傅氏之廢復得興也師古曰如說是也上亦自重之明年正月廼徙師丹為大司空而拜喜為大司馬封高武侯丁傅驕奢皆嫉喜之恭儉又傅太后欲求}
  - {type: variant, offset: 4344, length: 5, content: 揚雄書豈能, WYG: 尊號與成帝母齊尊喜與丞相孔光大司空師丹共執正議傅太后大怒上不得已先免師丹以感動喜喜終不順後數月遂策免喜曰君輔政出入三年未有昭然匡朕不逮而本朝大臣遂其姦心師古曰遂成也申也咎由君焉其上大司馬印綬就第傅太后又自詔丞相御史曰高武侯喜無功而封内懐不忠附下罔上與故大司空丹同心背畔放命圮族應劭曰放弃教令毁其族類虧損徳化罪惡雖在赦前不宜奉朝請其遣就國後又欲奪喜侯上亦不聼喜在國三嵗餘哀帝崩平帝即位王莽用事免傅氏官爵歸故郡晏將妻子徙合浦莽白太后下詔曰高武侯喜姿性端慤論議忠直師古曰慤謹也音乞角反雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國}
