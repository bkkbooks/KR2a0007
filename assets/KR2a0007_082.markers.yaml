  - {type: variant, offset: 517, length: 460, content: 之間而天下密如也逮至聖文隨風乘流方垂意於至寧躬服節儉綈衣不敝革鞜不穿大夏不居木器無文於是後宮賤瑇瑁而疏珠璣卻翡翠之飾除彫瑑之巧惡麗靡而不近斥芬芳而不御抑止絲竹晏衍之樂憎聞鄭衛幼眇之聲是以玉衡正而太階平也其後熏鬻作虐東夷橫畔羌戎睚眥閩越相亂遐萌為之不安中國蒙被其難於是聖武勃怒爰整其旅乃命票衛汾沄沸渭雲合電發猋騰波流機駭蠭軼疾如奔星擊如震霆砰轒轀破穹廬腦沙幕髓余吾遂獵乎王廷敺橐它燒熐蠡分梨單于磔裂屬國夷阬谷拔鹵莽刊山石蹂屍輿廝係累老弱兗鋌瘢耆金鏃淫夷者數十萬人皆稽顙樹頷扶服蛾伏二十餘年矣尚不敢惕息夫天兵四臨幽都先加回戈邪指南越相夷靡節西征羌僰東馳是以遐方疏俗殊鄰絕黨之域自上仁所不化茂德所不綏莫不蹻足抗手請獻厥珍使海內澹然永亡邊城之災金革之患今朝廷純仁遵道顯義并包書林聖風雲靡英華沈浮洋溢八區普天所覆莫不沾濡士有不談王道者則樵夫笑之故意者以為事罔隆而不殺物靡盛而不虧故平不肆險安不忘危乃時以有年出兵整輿竦戎振師五莋習馬長楊簡力狡獸校武票禽乃萃然登南山瞰烏弋西厭月𩨳東震日域又恐後世迷於一時之事常以此取國家之大務淫荒田獵, WYG: 官職}
