  - {type: variant, offset: 4500, length: 0, content: '', WYG: 史丹父子相繼高以重厚位至三公丹之輔道副主掩惡揚美傅會善意師古曰道讀曰導傅讀曰附雖宿儒逹士無以加焉及其歴房闥入卧内推至誠犯顏色動寤萬乘轉移大謀卒成太子安母后之位無言不讎終獲忠貞之報師古曰大雅抑之詩無言不讎無徳不報故贊引之以喻丹傅喜守節不傾亦䝉後凋之賞哀平際㑹禍福速哉前漢書卷八十二前漢書卷八十二考證王商傳下朝者左將軍丹等問匡劉攽云云臣召南按攽及奉世說是師古誤斷下朝者為句上文張匡願對近臣陳日蝕咎所謂近臣即指中朝將軍侍中等官也又下文知聖主崇孝逺别句不親後庭之事句師古亦誤以逺别不親斷句劉敞紏之是也史丹傳其後中山哀王薨按建昭四年事也天下莫不歸心臣子注師古曰}
