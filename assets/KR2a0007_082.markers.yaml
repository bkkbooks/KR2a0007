  - {type: variant, offset: 10, length: 0, content: '', WYG: 商代匡衡為丞相益封千户天子甚尊任之為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿師古曰在未央宮中丞相商坐未央廷中單于前拜謁商師古曰單于將見天子而經未央廷中過也商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此真漢相矣初大將軍鳳連昬楊彤為琅邪太守如淳曰連昬者婚家之婚親也其郡有災害十四已}
