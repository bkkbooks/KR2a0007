  - {type: variant, offset: 3845, length: 0, content: '', WYG: 領尚書事帝崩太子襲尊號是為孝元帝高輔政五年乞骸骨賜安車駟馬黄金罷就第薨諡曰安侯自元帝為太子時丹以父高任為中庻子侍從十餘年元帝即位為駙馬都尉侍中出常驂乘甚有寵上以丹舊臣皇考外屬親信之詔丹䕶太子家是時傅昭儀子定陶共}
  - {type: page-break, offset: 3845, content: '', id: KR2a0007_WYG_082-8a, image: WYG0250/WYG0250-0659a.png}
  - {type: variant, offset: 3845, length: 0, content: '', krp: 領尚書事帝崩太子襲尊號是為孝元帝高輔政五年乞骸骨賜安車駟馬黄金罷就第薨諡曰安侯自元帝為太子時丹以父高任為中庻子侍從十餘年元帝即位為駙馬都尉侍中出常驂乘甚有寵上以丹舊臣皇考外屬親信之詔丹䕶太子家是時傅昭儀子定陶共}
  - {type: variant, offset: 3846, length: 0, content: '', WYG: 有材蓺子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間宋祁曰間考作後越本作後元帝被疾不親政事留好}
  - {type: variant, offset: 3846, length: 0, content: '', krp: 有材蓺子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間宋祁曰間考作後越本作後元帝被疾不親政事留好}
  - {type: variant, offset: 3847, length: 1, content: 奇, WYG: 樂孟康曰留意於音樂或置鼙鼓殿下師古曰鼙本騎上之鼔音歩迷反天子自臨軒檻上隤銅丸以擿鼓師古曰檻闌版也隤下也擿投也隤音頽擿音持益反一曰擿磓也音丁歴反磓音丁回反韋昭曰擿持歴反如淳音嫡聲中嚴鼓之節李竒曰莊嚴之鼓節也晉灼曰疾擊之鼓也師古曰李說是也後宫及左右習知音者莫能為而定陶王亦能之上數稱}
