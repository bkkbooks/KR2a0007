  - {type: variant, offset: 140, length: 0, content: '', WYG: 中傷也音竹仲反惶怖更欲内女為援廼因新幸李媫好家白見其女㑹日有蝕之大中大夫蜀郡張匡其人佞巧上書願對近臣陳日蝕咎下朝者文穎曰令下朝者平之也孟康曰中朝臣也師古曰文說是也下音胡稼反左將軍丹等問匡師古曰史丹也對曰劉攽曰下朝者左將軍丹等都是一句上以匡章下丹等令問匡也王嘉傅亦有一下朝者劉奉世曰孟說是也時左將軍等俱謂之中朝當屬下句云下朝者左將軍丹等問而後云匡對曰竊見丞相商作威作福從外制中取必於上師古曰意欲所行必果之性殘賊不仁宋祁曰性字上疑有稟字遣票輕吏微求人罪師古曰票疾也微謂私求之也票音頻妙反又音匹妙反欲以立威天下患苦之前頻陽耿定上書言商與父傅通及女弟滛亂師古曰傅謂傅婢也奴殺其私夫疑商教使師古曰私夫女弟之私與姦通者章下有司商私怨懟師古曰懟音直類反宋祁曰懟該音治遂反商}
