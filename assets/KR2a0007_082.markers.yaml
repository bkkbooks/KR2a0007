  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_082-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 七, WYG: 二王商字子威涿郡蠡吾人也師古曰蠡音禮徙杜陵商父武武兄無故皆以宣帝舅封無故為平昌侯武為樂昌侯語在外戚傳商少為太子中庻子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀慽宋祁曰慽疑作戚於是大臣薦商行可以厲羣臣義足以厚風俗宜備近臣繇是擢為諸曹侍中中郎將師古曰繇讀與由同元帝時至右將軍光禄大夫是時定陶共王愛幸幾代太子師古曰共讀曰恭幾鉅依反宋祁曰注文鉅字上當有音字商為外戚重臣輔政擁佑太子頗有力焉師古曰佑助也元帝崩成帝即位甚敬重商徙為左將軍而帝元舅大司馬大將軍王鳳顓權行多驕僭商論議不能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪師古曰蹂踐也躪轢也蹂人九反躪音藺宋祁曰注文人字上當有音字老弱號呼師古曰呼音火故反長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宫可御船令吏民上長安城以避水羣臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭師古曰冒䝉覆也今政治和平世無兵革上}
