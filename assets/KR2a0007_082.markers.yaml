  - {type: variant, offset: 991, length: 3, content: 靡旃從, WYG: 聞忠言嘉謀而有不忠宋祁曰而字下疑有廼字執左道之辜陷于大辟前商女弟内行不脩奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使}
