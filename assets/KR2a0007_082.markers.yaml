  - {type: variant, offset: 1453, length: 1051, content: 者含元氣纖者入無倫然而位不過侍郎擢纔給事黃門意者玄得毋尚白乎何為官之拓落也揚子笑而應之曰客徒欲朱丹吾轂不知一跌將赤吾之族也往者周罔解結群鹿爭逸離為十二合為六七四分五剖並為戰國士無常君國亡定臣得士者富失士者貧矯翼厲翮恣意所存故士或自盛以橐或鑿坏以遁是故騶衍以頡亢而取世資孟軻雖連蹇猶為萬乘師今大漢左東海右渠搜前番禺後陶塗東南一尉西北一侯徽以糾墨製以質鈇散以禮樂風以詩書曠以歲月結以倚廬天下之士雷動雲合魚鱗雜襲咸營于八區家家自以為稷契人人自以為咎繇戴縰垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾當塗者入青雲失路者委溝渠旦握權則為卿相夕失勢則為匹夫譬若江湖之雀勃解之鳥乘雁集不為之多雙鳧飛不為之少昔三仁去而殷虛二老歸而周熾子胥死而吳亡種蠡存而粵伯五羖入而泰喜樂毅出而燕懼范睢以折擢而危穰侯蔡澤雖噤吟而笑唐舉故當其有事也非蕭曹子房平勃樊霍則不能安當其亡事也章句之徒相與坐而守之亦亡所患故世亂則聖哲馳騖而不足世治則庸夫高枕而有餘夫上世之士或解縛而相或釋褐而傅或倚夷門而笑或橫江潭而漁或七十說而不遇或立談間而封侯或枉千乘於陋巷或擁帚彗而先驅是以士頗得信其舌奮其筆窒隙蹈瑕而無所詘也當今縣令不請士郡守不迎師群卿不揖客將相不俛眉言奇者見疑行殊者得辟是以欲談者宛舌而固聲欲行者擬足而投迹鄉使上世之士處虖今策非甲科行非孝廉舉非方正獨可抗疏時道是非高得待詔下觸聞罷又安得青紫且吾聞之炎炎者滅隆隆者絕觀雷觀火為盈為實天收其聲地藏其熱高明之家鬼瞰其室懼挐者亡默默者存位極者宗危自守者身全是故知玄知默守道之極爰清爰靜游神之廷惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如今子乃以鴟梟而笑鳳皇執蝘蜓而謿龜龍不亦病乎子徒笑我玄之尚白吾亦笑子之病甚不遭臾跗扁鵲悲夫客曰然則靡玄無所成名乎范蔡以下何必玄哉揚子曰范睢魏之亡命也折脅拉髂免於徽索翕肩蹈背扶服入橐激卬萬乘之主界涇陽抵穰侯而代之當也蔡澤山東之匹夫也顉頤折頞涕涶流沬西揖彊秦之相搤其咽炕其氣附其背而奪其位時也天下已定金革已平都於雒陽婁敬委輅脫輓掉三寸之舌建不拔之策舉中國徙之長安適也五帝垂典三王傳禮百世不易叔孫通起於枹鼓之間解甲投戈遂作君臣之儀得也甫刑靡敝秦法酷烈聖漢權制而蕭何造律宜也故有造蕭何律於唐虞之世則誖矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之策於成周之世則繆矣有談范蔡之說於金張許史之間則狂矣夫蕭規曹隨留侯畫策陳平出奇功若泰山嚮若阺隤唯其人之贍知哉亦會其時之可為也故為可為於可為之時則從為不可為於不可為之時則凶夫藺先生收功於章臺四皓采榮於南山公孫創業於金馬票騎發迹於祁連, WYG: ''}
