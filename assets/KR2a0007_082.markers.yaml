  - {type: variant, offset: 4153, length: 2, content: 免乃, WYG: 還師古曰寖漸也不自還者言當遂至崩亡也還讀曰旋善輔道太子毋違我意師古曰道讀曰導丹噓唏而起師古曰嘘音虛唏音許既反太子由是遂為嗣矣元帝竟崩成帝初即位擢丹為長樂衞尉遷右將軍賜爵闗内侯食邑三百户給事中後徙左將軍宋祁曰徙字下當有丹字光禄大夫鴻嘉元年上遂下詔曰夫襃有徳賞元功古今通義也左將軍丹徃時導朕以中正秉義醇壹舊徳茂焉其封丹為武陽侯國東海郯之武彊聚戸千一百如淳曰聚字喻反聚邑居也丹為人足知愷弟愛人師古曰愷樂也弟易也言有和樂簡易之徳貌若儻蕩不備師古曰儻蕩疎誕無檢也然心甚謹密故尤得信於上丹兄嗣父爵為侯讓不受分丹盡得父財身又食大國邑重以舊恩數見襃賞師古曰重音直用反賞賜累千金僮奴以百數後房妻妾數十人内奢滛好飲酒極滋味聲色之樂為將軍前後十六年永始中病乞骸骨上賜策曰左將軍寑病不衰師古曰言病不損也願歸治疾朕愍以官職之事久留將軍使躬不瘳使光禄勲賜將軍黄金五十斤安車駟馬其上將軍印綬宜専精神務近醫藥以輔不衰丹歸第數月薨諡曰頃侯有子男女二十人九男皆以丹任並為侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽廼絶唯將陵侯曽無子絶於身云傅喜字稚游河内温人也哀帝祖母定陶傅太后}
