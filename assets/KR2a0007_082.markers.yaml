  - {type: variant, offset: 4328, length: 0, content: '', WYG: 何武尚書令唐林皆上書言喜行義修絜忠誠憂國内輔之臣也今以寑病一旦遣歸衆庻失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衞魯以季友治亂師古曰謂季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晉侯喜可知魏以無忌折衝師古曰信陵君項以范増存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶師古曰已解在上百萬之衆不如一賢故秦行千金以間㢘頗師古曰趙孝成}
