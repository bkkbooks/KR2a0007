  - {type: variant, offset: 2542, length: 1296, content: 賦者將以風也必推類而言極麗靡之辭閎侈鉅衍競於使人不能加也既乃歸之正然覽者已過矣往時武帝好神仙相如上大人賦欲以風帝反縹縹有陵雲之志繇是言之賦勸而不止明矣又頗似俳優淳于髡優孟之徒非法度所存賢人君子詩賦之正也於是輟不復為而大潭思渾天參摹而四分之極於八十一旁則三摹九据極之七百二十九贊亦自然之道也故觀易者見其卦而名之觀玄者數其畫而定之玄首四重者非卦也數也其用自天元推一晝一夜陰陽數度律曆之紀九九大連與天終始故玄三方九州二十七部八十一家二百四十三表七百二十九贊分為三卷曰一二三與泰初歷相應亦有顓頊之曆焉揲之以三策關之人休咎絣之以象類播之以人事文之以五行擬之以道德仁義禮知無主無名要合五經苟非其事文不虛生為其泰曼漶而不可知故有首衝錯測攡瑩數文掜圖告十一篇皆以解剝玄體離散其文章句尚不存焉玄文多故不著觀之者難知學之者難成客有難玄大深眾人之不好也雄解之號曰解難其辭曰客難揚子曰凡著書者為眾人之所好也美味期乎合口工聲調於比耳今吾子乃抗辭幽說閎意眇指獨馳騁於有亡之際而陶冶大鑪旁薄群生歷覽者茲年矣而殊不寤亶費精神於此而煩學者於彼譬畫者畫於無形弦者放於無聲殆不可乎揚子曰俞若夫閎言崇議幽微之塗蓋難與覽者同也昔人有觀象於天視度於地察法於人者天麗且彌地普而深昔人之辭乃玉乃金彼豈好為艱難哉勢不得已也獨不見夫翠虯絳螭之將豋虖天必聳身於倉梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎日月之經不千里則不能燭六合燿八紘泰山之高不嶕嶢則不能浡滃雲而散歊烝是以宓犧氏之作易也緜絡天地經以八卦文王附六爻孔子錯其象而彖其辭然後發天地之臧定萬物之基典謨之篇雅頌之聲不溫純深潤則不足以揚鴻烈而章緝熙蓋胥靡為宰寂寞為尸大味必淡大音必希大語叫叫大道低回是以聲之眇者不可同於眾人之耳形之美者不可棍於世俗之目辭之衍者不可齊於庸人之聽今夫弦者高張急徽追趨逐耆則坐者不期而附矣誠為之施咸池揄六莖發簫韶詠九成則莫有和也是故鍾期死伯牙絕弦破琴而不肯與眾鼓獿人亡則匠石輟斤而不敢妄斲師曠之調鍾竢知音者之在後也孔子作春秋幾君子之前睹也老聃有遺言貴知我者希此非其操與雄見諸子各以其知舛馳大氐詆訾聖人即為怪迂析辯詭辭以撓世事雖小辯終破大道而或眾使溺於所聞而不自知其非也及太史公記六國歷楚漢訖麟止不與聖人同是非頗謬於經故人時有問雄者常用法應之譔以為十三卷象論語號曰法言法言文多不著獨著其目天降生民倥侗顓蒙恣于情性聰明不開訓諸理譔學行第一降周迄孔成于王道終後誕章乖離諸子圖微譔吾子第二事有本真陳施於億動不克咸本諸身譔修身第三芒芒天道在昔聖考過則失中不及則不至不可姦罔譔問道第四神心曶怳經緯萬方事繫諸道德仁誼禮譔問神第五明哲煌煌旁燭亡疆遜于不虞以保天命譔問明第六假言周于天地贊于神明幽弘橫廣絕于邇言譔寡見第七聖人悤明淵懿繼天測靈冠于群倫經諸范譔五百第八立政鼓眾動化天下莫上於中和中和之發在於哲民情譔先知第九仲尼以來國君將相卿士名臣參差不齊壹概諸聖譔重黎第十仲尼之後訖于漢道德行顏閔股肱蕭曹爰及名將尊卑之條稱述品藻譔淵騫第十一君子純終領聞蠢迪檢押旁開聖則譔君子第十二孝莫大於寧親寧親莫大於寧神寧神莫大於四表之驩心譔孝至第十三贊曰雄之自序云爾初雄年四十餘自蜀來至游京師, WYG: ''}
