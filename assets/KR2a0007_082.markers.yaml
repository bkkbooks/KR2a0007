  - {type: variant, offset: 4398, length: 5, content: 兩篇薄仁義, WYG: 以喻有節操之人也其還喜長安以故高安侯莫府賜喜位特進奉朝請喜雖外見襃賞孤立憂懼後復遣就國以夀終莽賜諡曰貞侯子嗣莽敗乃絶師古曰史不得其子名也贊曰自宣元成哀外戚興者許史三王丁傅之家師古曰三王謂卬成侯及商鳳三家也皆重侯累將窮貴極富見其位矣未見其人也師古曰言無善人也陽平之王多有材能好事慕名宋祁曰事當作士其埶尤盛曠貴最久師古曰陽平謂王鳳之家也言居}
