  - {type: variant, offset: 162, length: 3, content: 恩洽動, WYG: 日蝕周書曰以左道事君者誅師古曰逸書也易曰日中見昧則折其右肱蘇林曰日者人君之象中者明之盛盛而昧折去右肱之臣用無咎也師古曰此豐卦九三爻辭宋祁曰易作見沬王弼云沬微昧之明也王觀國云昧與沬義同徃者丞相周勃再建大功及孝文時纖介怨恨而日為之蝕於是退勃使就國卒無怵悐憂師古曰卒終也悐古惕字宋祁曰勃傳及天文志五行志皆無是事疑匡妄為此言以害商爾悐與惕同二字文雖異其音訓則一今商無尺寸之功而有三世之寵師古曰自宣帝至成帝凡三主身位三公宗族為列侯吏二千石侍中諸曹給事禁門内連昏諸侯王權寵至盛審有内亂殺人怨懟之端宜窮竟考問臣聞秦丞相吕}
