  - {type: variant, offset: 1016, length: 234, content: 王之田反五帝之虞使農不輟耰工不下機婚姻以時男女莫違出愷弟行簡易矜劬勞休力役見百年存孤弱帥與之同苦樂然後陳鐘鼓之樂鳴鞀磬之和建碣磍之虡拮隔鳴球掉八列之舞酌允鑠肴樂胥聽廟中之雍雍受神人之福祜歌投頌吹合雅其勤若此故真神之所勞也方將俟元符以禪梁甫之基增泰山之高延光于將來比榮乎往號豈徒欲淫覽浮觀馳騁稉稻之地周流梨栗之林蹂踐芻蕘誇詡眾庶盛狖玃之收多麋鹿之獲哉且盲不見咫尺而離婁燭千里之隅客徒愛胡人之獲我禽獸曾不知我亦已獲其王侯言未卒墨客降席再拜首曰大哉體乎允非小子之所能及也乃今, WYG: ''}
