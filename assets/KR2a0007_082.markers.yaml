  - {type: variant, offset: 3854, length: 1, content: 門, WYG: 然意廼解丹之輔相皆此類也竟寧元年上寑疾傅昭儀及定陶王常在左右而皇太子希得進見上疾稍侵意忽忽不平師古曰稍侵言漸篤也平和也數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衞尉侍中與皇太子皆憂不知所出師古曰不知計所出丹以親密臣得侍視疾候上間獨寑時丹直入卧内頓首伏青蒲上服虔曰青縁蒲席也應劭曰以青規地曰青蒲自非皇后不得至此孟康曰以蒲青為席用蔽地也師古曰應説是也涕泣言曰皇太子以適長立積十餘年師古曰適讀曰嫡名號繫於百姓天}
