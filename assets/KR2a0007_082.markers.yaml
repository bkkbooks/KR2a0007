  - {type: variant, offset: 980, length: 0, content: '', WYG: 大惡著於百姓甚虧損盛徳有鼎折足之凶師古曰易鼎卦九四爻辭曰鼎折足覆公餗其形渥凶餗鼎實也謂所亨之物也渥厚也言鼎折其足則覆喪其實喻大臣非其任則虧敗國典故宜加以厚刑臣愚以為聖主富於春秋即位以來未有懲姦之威加以繼嗣未立大異並見尤宜誅討}
