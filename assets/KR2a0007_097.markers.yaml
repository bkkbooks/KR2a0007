  - {type: variant, offset: 503, length: 1, content: 曲, WYG: 莽丞相大司空曰皇帝暴崩羣衆讙譁怪之掖庭令輔等在後庭左右侍燕廹近雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺哀帝既立尊趙皇后為皇太后封太后弟侍中駙馬都尉欽為新成侯趙氏侯者凡二人後數月司𨽻觧光奏言臣聞許美人及故中宫史曹宫皆御幸孝成皇帝産子子隱不見臣遣從事掾業史望騐問知狀者師古曰業者掾之名望者史之名也皆不言其姓掖庭獄丞籍武故中黄門王舜吳恭靳嚴官婢曹曉道房張棄故趙昭儀御者于客子王偏臧兼等皆曰宫即曉子女前屬中宫為學事史通詩授皇后房與宫對食應邵曰宫人自相與為夫婦名對食甚相妬忌也元延元年中宫語房曰陛下幸宫後數月曉入殿中見宫腹大問宫宫曰御幸有身其十月中宫乳掖庭牛官令舍師古曰乳産也音而具反下皆類此有婢六人中黄門田客持詔記盛綠綈方底師古曰綈厚繒也綠其色也方㡳盛書囊形若今之筭幐耳綈音大奚反封御史中丞印予武曰取牛官令􅃕婦人新産兒婢六人盡置暴室獄母問兒男女誰兒也武迎置獄宫曰善臧我兒胞師古曰胞謂胎之衣也音苞丞知是何等兒也師古曰意言是天子兒耳後三日客持詔記與武問兒死未手書對牘背師古曰牘木簡也時以為詔記問之故令於背上書對辭武即書對兒見在未死有頃客出曰上與昭儀大怒奈何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤惟留意奏入客復持詔記予武曰今夜漏上五刻持兒與舜㑹東交掖門武因問客陛下得武書意何如曰憆也服䖍曰憆直視貌也師古曰憆音丑庚反字本作瞠其音同耳武以兒付舜舜受詔内兒殿中為擇乳母告善養兒且有賞母令漏泄舜擇棄為乳母時兒生八九日後三日客復持詔記封如前予武中有封小綠篋記曰告武以篋中物書予獄中婦人武自臨飲之師古曰飲音於禁反武發篋中有裹藥二枚赫蹏書鄧展曰赫音兄弟䦧牆之䦧應劭曰赫蹏薄小紙也晉灼曰今謂薄小物為䦧蹏師古曰今書本赫字或作擊曰告偉能努力飲此藥不可復入女自知之師古曰女讀曰汝偉能卽宫宫讀書已曰果也欲姊弟擅天下我兒男也頟上有壯髪類孝元皇帝師古曰壯髪當頟前侵下而生今俗呼為圭頭者是也今兒安在危殺之矣師古曰危險也猶今人言險不殺耳奈何令長信得聞之師古曰謂太后宫飲藥死後宫婢六人召入出語武曰昭儀言女無過師古曰言我知汝無罪過也女讀曰汝寜自殺邪若外家也晉灼曰寜便自殺出至外舍死也我曹言願自殺師古曰曹軰也即自繆死晉灼曰繆音繆縳之繆鄭氏曰自縊也師古曰繆絞也音居虬反武皆表奏狀棄所養兒十一日師古曰棄謂張棄也宫長李南以詔書取兒去晉灼曰漢儀注有女長御比侍中宫長豈此耶不知所置師古曰終竟不知置何所也許美人前在上林涿沐館數召入飾室中若舍師古曰或暫入或留止也一歲再三召留數月或半歲御幸元延二年褱子師古曰褱古懐字其十一月乳師古曰乳謂産子也音而樹反其下亦同詔使嚴持乳醫及五種和藥丸三送美人所後客子偏兼聞昭儀謂成帝曰常紿我言從中宫來師古曰紿誑也中宫皇后所居即從中宫來許美人兒何從生中許氏竟當復立邪晉灼曰昭儀前要帝不得立許美人為皇后而今有子中許氏竟當復立為皇后邪此前約之言也師古曰此説非也言美人在内中何從得兒而生也故言何從生中次此下乃始言約耳懟以手自擣師古曰懟怨怒也擣築也懟音直類反以頭擊壁戸柱從牀上自投地啼泣不肯食曰今當安置我欲歸耳帝曰今故告之反怒為師古曰故以許美人産子告汝何為反怒殊不可曉也師古曰言其不可告語也帝亦不食昭儀曰陛下自知是不食謂何師古曰何為不食也陛下常自言約不負女師古曰女讀曰汝次下亦同今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使嚴持綠囊書予許美人告嚴曰美人當有以予女受來置飾室中簾南師古曰簾戸簾也音廉美人以葦篋一合盛所生兒緘封及綠囊報書予嚴嚴持篋書置飾室簾南去帝與昭儀坐使客子觧篋緘未巳師古曰緘束篋之繩也音居咸反帝使客子偏兼皆出自閉户獨與昭儀在須臾開戸嘑客子偏兼使緘封篋及綠綈方底推置屏風東恭受詔持篋方底予武皆封以御史中丞印曰告武篋中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中故長定許貴人及故成都平阿侯家婢王業任孋公孫習前免為庻人師古曰孋音麗詔召入屬昭儀為私婢成帝崩未幸梓宫師古曰言未大歛也食卒悲哀之時昭儀自知罪惡大知業等故許氏王氏婢恐事泄而以大婢羊子等賜與業等各且十人以慰其意屬無道我家過失師古曰屬音欲之反元延二年五月故掖庭令吾丘遵謂武曰師古曰姓吾丘名遵掖庭丞吏以下皆與昭儀合通無可與語者獨欲與武有所言我無子武有子是家輕族人得無不敢乎蘇林曰是家謂成帝也不敢斥故言是家師古曰遵自以無子故無所顧懼武既有子恐禍相及當止不敢言也掖庭中御幸生子者輒死又飲藥傷墯者無數欲與武共言之大臣票騎將軍貪耆錢不足計事師古曰耆讀曰嗜奈何令長信得聞之遵後病困謂武今我已死前所語事武不能獨為也慎語師古曰言汝脱不能獨為勿漏泄其事皆在今年四月丙辰赦令前臣謹案永光三年男子忠等發長陵傅夫人冢事更大赦師古曰更音工衡反孝元皇帝下詔曰比朕不當所得赦也窮治盡伏辜天下以為當魯嚴公夫人殺世子齊桓召而誅焉春秋予之師古曰嚴公夫人謂哀姜也予謂許與之也觧具在五行志趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅前平安剛侯夫人謁坐大逆同産當坐以蒙赦令歸故郡今昭儀所犯尤誖逆罪重於謁而同産親屬皆在尊貴之位廹近帷幄羣下寒心非所以懲惡崇誼示四方也請事窮竟丞相以下議正法哀帝於是免新成侯趙欽欽兄子成}
