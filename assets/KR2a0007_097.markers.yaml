  - {type: variant, offset: 9884, length: 0, content: '', WYG: 婉順也瘱靜也音烏計反自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之乃更號為黄皇室主師古曰莽自謂土徳故云黄皇室主者若漢之稱公主令立國將軍成新公孫建世子襐飾将毉往問疾師古曰襐盛飾也音丈又音象一曰襐首飾也在兩耳後刻鏤而為之后大怒笞鞭其旁侍御因發病不肯起莽遂不復彊也及漢兵誅莽燔燒未央宫后曰何面目以見漢家自投火中而死贊曰易著吉凶而言謙盈之效天地鬼神至于人道靡不同之師古曰易謙卦曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙夫女寵之興繇至微而體至尊師古曰繇與由同窮富貴而不以功}
