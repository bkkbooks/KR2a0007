  - {type: variant, offset: 60, length: 3, content: 群兄弟, WYG: 也五大司馬者鳳音商根莽也一曰鳯嗣禁爲侯不當重數而十人者淳于長卽其一也外戚莫盛焉自有𫝊孝成許皇后大司馬車騎将軍平恩侯嘉女也元帝悼傷母恭哀后居位日淺而遭霍氏之辜故選嘉女以配皇太子初入太子家上令中常侍黄門親近者侍送還白太子懽説狀師古曰說讀作悅元帝喜謂左右酌酒賀我左右}
