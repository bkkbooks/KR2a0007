  - {type: variant, offset: 345, length: 0, content: '', krp: 終死以}
  - {type: variant, offset: 346, length: 4, content: 諸曹蚤死, WYG: 期師古曰共音居容反洒音灑又音所寄反埽音先到反願歸骨於山足兮依松柏之餘休師古曰山足謂陵下也休䕃也重曰師古曰重者情志未申更作賦也音直用反潛𤣥宫兮幽以清應門閉兮禁闥扄師古曰正門謂之應門扄短關也音工熒反華殿塵兮玉階菭中庭萋兮綠草生師古曰菭水氣所生也萋萋青草貌也菭音䑓萋音妻廣室隂兮帷幄暗房櫳虚兮風泠泠師古曰櫳疏檻也音來東反泠音零感帷裳兮𤼵紅羅紛綷縩兮紈素聲師古曰感動也言風動𤼵帷裳羅綺也綷縩衣聲也綷音千賄反縩音蔡神𦕈𦕈兮宻靚處君不御兮誰為榮師古曰靚字與静同俯視兮丹墀思君兮履綦孟康曰丹墀赤地也師古曰綦履下飾也言視殿上之地則想君履綦之迹也綦音其仰視兮雲屋雙涕兮横流師古曰雲屋言其黮䨴狀若雲也黮音徒感反䨴音徒對反顧左右兮和顔酌羽觴兮銷憂劉徳曰酒行疾如羽也孟康曰羽觴爵也作生爵形}
