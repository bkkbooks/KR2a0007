  - {type: variant, offset: 506, length: 0, content: '', krp: 訢皆為庻人将家屬徙遼西郡時議郎耿育上疏言臣聞繼嗣失統廢適立庻師古曰適讀曰嫡次下亦同聖人法禁古今至戒然太伯見歴知適逡循固譲師古曰歴謂王季即文王之父也知適謂知其當為適嗣也委身吳粤權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道徳最備是以尊號追及太王故世必有非常之變然後廼有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歳之後未能持國師古曰末晩暮也萬歳言晏駕也權柄之重制於女主女主驕盛則耆欲無極師古曰耆讀曰嗜少主幼弱則大臣不使師古曰不使不可使從命也世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之徳仁孝子愛之恩懐獨見之明内斷於身故廢後宫就館之漸絶㣲嗣禍亂之}
  - {type: variant, offset: 507, length: 0, content: '', WYG: 師古曰微嗣者謂幼主也乃欲致位陛下以安宗廟愚臣旣不能深援安危定金匱之計師古曰愚臣謂觧光等也援引也金匱言長久之法可蔵於金匱石室者也援音爰又不知推演聖徳述先帝之志師古曰演廣也音弋善反廼反覆校省内暴露私燕師古曰私燕謂成帝閑晏之私也覆音芳目反誣汙先帝傾惑之過成結寵妾妬媚之誅甚失賢聖逺見之明逆負先帝憂國之意夫論大徳不拘俗立大功不合衆此廼孝成皇帝至思所以萬萬於衆臣陛下聖徳盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且褒廣將順君父之美匡捄銷滅旣徃之過師古曰捄古救字古今通義也事不當時固争防禍於未然各随指阿從以求容媚晏駕之後尊號已定萬事已訖廼探追不及之事訐揚幽昧之過師古曰訐音居謁反此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世逺聞百蠻近布海内甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察哀帝為太子亦頗得趙太后力遂不竟其事傅太后恩趙太后趙太后亦歸心師古曰恩謂以厚恩接遇之一曰恩謂銜其立哀帝為嗣之恩也故成帝母及王氏皆怨之哀帝崩王莽}
