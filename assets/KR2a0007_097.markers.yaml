  - {type: variant, offset: 22, length: 0, content: '', WYG: 為元光則是參錯又當言凡立四十五年而云五十一再三乖謬皆是此傳誤合葬霸陵遺詔盡以東宫金錢財物賜長公主嫖師古曰東宫太}
