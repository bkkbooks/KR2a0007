  - {type: variant, offset: 506, length: 0, content: '', WYG: 訢皆為庻人将家屬徙遼西郡時議郎耿育上疏言臣聞繼嗣失統廢適立庻師古曰適讀曰嫡次下亦同聖人法禁古今至戒然太伯見歴知適逡循固譲師古曰歴謂王季即文王之父也知適謂知其當為適嗣也委身吳粤權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道徳最備是以尊號追及太王故世必有非常之變然後廼有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歳之後未能持國師古曰末晩暮也萬歳言晏駕也權柄之重制於女主女主驕盛則耆欲無極師古曰耆讀曰嗜少主幼弱則大臣不使師古曰不使不可使從命也世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之徳仁孝子愛之恩懐獨見之明内斷於身故廢後宫就館之漸絶㣲嗣禍亂之}
