  - {type: variant, offset: 4269, length: 4, content: 求美造作, WYG: 師古曰希望天子意指也上書言宜立丁姬為帝太后師丹劾奏宏懐邪誤朝不道上初即位謙讓從師丹言止後廼白令王太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宫中宫追尊恭皇太后父為崇祖侯恭皇后父為襃徳侯後嵗餘遂下詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶其尊㳟皇太后為帝太太后丁后為帝太后後又更號帝太太后為皇太太后稱永信宫帝太后稱中安宫而成帝母太皇太后本稱長信宫成帝趙后為皇太后並四太后各置少府太僕秩皆中}
