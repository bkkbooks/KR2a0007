  - {type: variant, offset: 36, length: 2, content: 輔政, WYG: 宣帝以光故封去病孫山山弟雲皆為列侯侯者前後四人孝宣王皇后其先高祖時有功賜爵闗内侯自沛徙長陵傳爵至后父奉光奉光少時好鬬雞宣帝在民間數與奉光會相識奉光有女年十餘歲每當適人所當適輒死故久不行及宣帝即位召入後宫稍進為偼伃是時館陶王母華偼伃及淮陽憲王母張倢伃楚孝王母衞偼伃皆愛幸霍皇后廢後上憐許太子蚤失母師古曰許后所生故曰許太子幾為霍氏所害於是乃選後宫素謹慎而無子者遂立王偼伃為皇后令母養太子自為后後希見無寵封父奉光為卭成侯立十六年宣帝崩元帝即位為皇太后封太后兄舜為安平侯後二年奉光薨諡曰共侯葬長門南置園邑三百家長丞奉守如法元帝崩成帝即位為太皇太后復爵太皇太后弟駿為關内侯食邑千户王氏列侯二人闗内侯一人舜子章章從弟咸皆至左右將軍時成帝母亦姓王氏故世號太皇太后為卭成太后卭成太后凡立四十九年年七十餘永始元年崩合葬杜陵稱東園師古曰雖同塋兆而别為墳王后陵次宣帝陵東故曰東園也奉光孫勲坐法免元始中成帝太后下詔曰孝宣王皇后朕之姑深念奉質共脩之義恩結于心師古曰質讀曰贄惟卭成共侯國廢祀絶朕甚閔焉其封共侯曾孫堅固為卭成侯至王莽乃絶前漢書卷九十七上前漢書卷九十七上考證外戚傳殷之興也以有娀又有㜪按又有㜪三字及下文太姒二字並史記所無而漢書𥙷之漢興因秦之稱號云云臣召南按自此以下詳序宫中位號班氏所自撰錄也後書云秦爵列九品即据此傳高祖薄姬傳漢王四年坐河南成臯靈臺史記作坐河南宫成臯臺孝景王皇后傳元朔三年崩史記作元朔四年誤也此與紀合前漢書卷九十七上考證欽定四庫全書前漢書卷九十七下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注外戚列𫝊第六十七下孝元王皇后成帝母也}
