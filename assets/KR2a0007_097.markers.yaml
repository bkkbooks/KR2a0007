  - {type: variant, offset: 483, length: 1, content: 材, WYG: 長前白罷昌陵功封為定陵侯皇后旣立後寵少衰而弟絶幸為昭儀居昭陽舍其中庭彤朱而殿上髤􅃮師古曰以漆漆物謂之髤音許求反又音許昭反今關東俗器物一再著漆者謂之捎漆捎即髤聲之轉重耳髤字或作髹音義亦與髤同今關西俗云黑髤盤朱髤盤其音如此两義並通切皆銅沓冒黄金塗師古曰切門限也音千結反沓冒其頭也塗以金塗銅上也沓音它合反白玉階師古曰階所由升殿陛也壁帶往往為黄金釭函藍田璧眀珠翠羽飾之服䖍曰釭壁中之横帶也晉灼曰以金環飾之也師古曰壁帶壁之横木露出如帶者也於壁帶之中往往以金為釭若車釭之形也其釭中著玉璧明珠翠羽耳藍田山名出美玉釭音工流俗讀之音江非也自後宫未嘗有焉姊弟顓寵十餘年卒皆無子師古曰顓與専同卒終也末年定陶王來朝王祖母傅太后私賂遺趙皇后昭儀定陶王竟為太子明年春成帝崩帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿師古曰白虎殿在未央宫中供音居用反張音竹亮反又欲拜左將軍孔光為丞相已刻侯印書贊師古曰贊謂延拜之文昏夜平善郷晨傅絝韤應劭曰傅著也師古曰郷讀曰嚮傅讀曰附絝古袴字也韤音武伐反欲起因失衣不}
