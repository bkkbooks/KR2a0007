  - {type: variant, offset: 514, length: 3, content: 獲忠直, WYG: 二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在倢伃上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩傅昭儀隨王歸國稱定陶太后後十年恭王薨子代為王王母曰丁姬傅太后躬自養視旣壯大成帝無繼嗣時中山孝王在元延四年孝王及定陶王皆入朝傅太后多以珍寳賂遺趙昭儀及帝舅票騎將軍王根隂為王求漢嗣皆見上無子欲豫自結為久長計更稱譽定陶王師古曰更音工衡反上亦自器之明年遂徴定陶王立為太子}
