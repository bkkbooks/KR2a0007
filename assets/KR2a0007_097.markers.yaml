  - {type: variant, offset: 9331, length: 548, content: 至仁天下太平五穀成孰或禾長丈餘或一粟三米或不種自生或繭不蠶自成甘露從天下醴泉自地出鳳皇來儀神爵降集從四歲以來羌人無所疾苦故思樂內屬宜以時處業置屬國領護事下莽莽復奏曰太后秉統數年恩澤洋溢和氣四塞絕域殊俗靡不慕義越裳氏重譯獻白雉黃支自三萬里貢生犀東夷王度大海奉國珍匈奴單于順制作去二名今西域良願等復舉地為臣妾昔唐堯橫被四表亦亡以加之今謹案已有東海南海北海郡未有西海郡請受良願等所獻地為西海郡臣又聞聖王序天文定地理因山川民俗以制州界漢家地廣二帝三王凡十二州州名及界多不應經堯典十有二州後定為九州漢家廓地遼遠州牧行部遠者三萬餘里不可為九謹以經義正十二州名分界以應正始奏可又增法五十條犯者徙之西海徙者以千萬數民始怨矣泉陵侯劉慶上書言周成王幼少稱孺子周公居攝今帝富於春秋宜令安漢公行天子事如周公群臣皆曰宜如慶言冬熒惑入月中平帝疾莽作策請命於泰畤戴璧秉圭願以身代藏策金滕置于前殿敕諸公勿敢言十二月平帝崩大赦天下莽徵明禮者宗伯鳳等與定天下吏六百石以上皆服喪三年奏尊孝成廟曰統宗孝平廟曰元宗時元帝世絕而宣帝曾孫有見王五人列侯廣戚侯顯等四十八人莽惡其長大曰兄弟不得相為後乃選玄孫中最幼廣戚侯子嬰年二歲託以為卜相最吉是月前輝光謝囂奏武功長孟通浚井得白石上圓下方有丹書著石文曰告安漢公莽為皇帝符命之起自此始矣莽使群公以白, WYG: ''}
