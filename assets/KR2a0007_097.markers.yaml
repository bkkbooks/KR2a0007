  - {type: variant, offset: 13, length: 2, content: 孝元, krp: 非獨内徳茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也用末喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及太任太姒而幽王之禽也淫褒姒故易基乾坤詩首關睢書美釐降春秋譏不親迎夫婦之際人道之大倫也師古曰倫理也禮之用唯昏姻為兢兢師古曰兢兢戒慎也夫樂調而四時和隂陽之變萬物之統也可不慎與人能𢎞道末如命何甚哉妃匹之愛君不能得之臣父不能得之子况卑下乎師古曰言雖君父之尊不能奪其所好而移其本意既驩合矣或不能成子姓師古曰姓生也成子姓矣而不能要其終豈非命也哉孔子罕言命蓋難言之非通幽明之變惡能識乎性命漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 師古曰適讀曰嫡后亦君也天曰皇天地曰后土故天子}
  - {type: variant, offset: 17, length: 0, content: '', krp: 師古曰適讀曰嫡后亦君也天曰皇天地曰后土故天子}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 妃以后為稱取象二儀妾皆稱夫人又有美人良人八子七子長使少使之號焉師古曰良善也八七祿秩之差也長使少使主供使者至武帝制倢伃娙娥傛華充依各有爵位師古曰倢言接幸於上也伃美稱也娙娥皆美貌也傛傛猶言奕奕也便習之意也充依言充後庭而依秩序也倢音接伃音予字或從女其音同耳娙音五經反傛音容而元帝加昭儀之號師古曰昭顯其儀示隆重也凡十四等云師古曰除皇后自昭儀以下至秩百石十四等昭儀位視丞相爵比諸侯王倢伃視上卿比列侯娙娥視中二千石比關内侯師古曰中二千石實得二千石也中之言滿也月得百八十斛是為一嵗凡得二千一百六十石言二千者舉成數耳傛華視眞二千石比大上造師古曰眞二千石月得百五十斛一歲凡得千八百石耳大上造第十六爵美人視二千石比少上造師古曰二千石月得百二十斛一歲凡得一千四百四十石耳少上造第十五爵八子視千石比中更師古曰中更第十三爵也更公衡反其下亦同充依視千石比左更師古曰左更第十二爵七子視八百石比右庻長師古曰右庻長第十一爵良人視八百石比左庻長師古曰左庻長第十爵長使視六百石比五大夫師古曰五大夫第九爵少使視四百石比公乗師古曰公乘第八爵五官視三百石師古曰五官所掌亦象外之五官也順常視二百石無涓共和娛靈保林良使夜者皆視百石師古曰涓絜也無涓言無所不絜也共讀曰恭言恭順而和柔也娛靈可以娛樂情靈也保安也保林言其可安衆如林也良使使令之善者也夜者主職夜事令音力成反上家人子中家人子視有秩斗食云師古曰家人子者言采擇良家子以入宫未有職號但稱家人子也斗食謂佐史也謂之斗食者言一歲不滿百石日食一斗二升五官以下葬司馬門外服䖍曰陵上司馬門之外高祖呂皇后父吕公單父人也師古曰單音善父音甫好相人高祖微時吕公見而異之乃以女妻高祖生惠帝魯元公主高祖為漢王元年封呂公為臨泗侯二年立孝惠為太子後漢王得定陶戚姬愛幸生趙隱王如意太子為人仁弱高祖以為不類已常欲廢之而立如意如意類我戚姬常從上之關東日夜啼泣欲立其子呂后年長常留守希見益疏如意且立為趙王留長安幾代太子者數師古曰幾音鉅依反數音所角反賴公卿大臣爭之及叔孫通諌用留侯之䇿得無易呂后為人剛毅佐高帝定天下兄二人皆為列將從征伐長兄澤為周呂侯次兄釋之為建成侯逮高祖而侯者三人高祖四年臨泗侯吕公薨高祖崩惠帝立呂后為皇太后廼令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王母為虜終日舂薄暮常與死為伍師古曰與死罪者為伍也相離三千里當誰使告女師古曰女讀曰汝此下皆同太后聞之大怒曰乃欲倚女子邪師古曰乃亦汝乃召趙王誅之使者三反師古曰反還也三還猶今言三回也趙相周昌不遣太后召趙相相徴至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王霸上入宫挾與起居飲食數月帝晨出射趙王不能蚤起太后伺其獨居使人持鴆飲之遲帝還趙王死師古曰遲音直二反解在高紀太后遂斷戚夫人手足去眼熏耳飲瘖藥師古曰去其眼精以藥熏耳令聾也瘖不能言也以瘖藥飲之也飲音於禁反瘖音於今反使居鞠域中師古曰鞠域如蹋鞠之域謂窟室也鞠音巨六反名曰人彘居數月廼召惠帝視人彘帝視而問知其戚夫人廼大哭因病歳餘不能起使人請太后曰此非人所為臣為太后子終不能復治天下師古曰令太后視事己自如太子然以此日飲為滛樂不聽政七年而崩太后發喪哭而泣不下師古曰泣謂淚也留侯子張辟彊為侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未師古曰解猶解說其意陳平曰何解辟彊曰帝無壯子太后畏君等今請拜呂台呂産為將將兵居南北軍及諸呂皆官居中用事如此則太后心安君等幸脫禍矣丞相如辟彊計請之太后說其哭廼哀師古曰說讀曰悅呂氏權由此起廼立孝惠後宫子為帝太后臨朝稱制復殺高祖子趙幽王友共王恢師古曰共讀曰恭及燕靈王建遂立周呂侯子台為呂王師古曰台音土來反台弟産為梁王建成侯釋之子祿為趙王台子通為燕王又封諸呂凡六人皆為列侯追尊父吕公為呂宣王兄周呂侯為悼武王太后持天下八年病犬禍而崩語在五行志病困以趙王祿為上將軍居北軍梁王産為相國居南軍戒産祿曰高祖與大臣約非劉氏王者天下共擊之今王呂氏大臣不平我即崩恐其為變必據兵衛宫慎毋送喪為人所制太后崩太尉周勃丞相陳平朱虛侯劉章等共誅産祿悉捕諸呂男女無少長皆斬之而迎立代王是為孝文皇帝孝惠張皇后宣平侯敖尚帝姊魯元公主有女恵帝即位呂太后欲為重親以公主女配帝為皇后欲其生子萬方終無子廼使陽為有身取後宫美人子名之師古曰名為皇后子殺其母立所名子為太子惠帝崩太子立為帝四年廼自知非皇后子出言曰太后安能殺吾母而名我我壯即為所為師古曰為其所為謂所生之母也並音于偽反太后聞而患之恐其作亂廼幽之永巷言帝病甚左右莫得見太后下詔廢之語在高后紀遂幽死更立恒山王𢎞為皇帝而以呂祿女為皇后欲連根固夲牢甚師古曰牢堅也然而無益也呂太后崩大臣正之卒滅呂氏少帝恒山淮南濟川王皆以非孝惠子誅獨置孝惠皇后廢處北宫師古曰置留也北宫在未央宫之北孝文後元年薨葬安陵不起墳高祖薄姬文帝母也父吳人秦時與故魏王宗女魏媼通生薄姬而薄姬父死山隂因葬焉師古曰山隂會稽縣及諸侯畔秦魏豹立為王而魏媼内其女於魏宫許負相薄姬當生天子是時項羽方與漢王相距滎陽天下未有所定豹初與漢撃楚及聞許負言心喜因背漢而中立與楚連和師古曰自謂當得天下漢使曹參等虜魏王豹以其國為郡而薄姬輸織室豹已死漢王入織室見薄姬有詔内後宫歲餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴毋相忘已而管夫人趙子兒先幸漢王漢王四年坐河南成臯靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢龍據妾胷上曰是貴徵也吾為汝成之遂幸有身歲中生文帝年八歲立為代王自有子後希見高祖崩諸幸姬戚夫人之屬呂后怒皆幽之不得出宫而薄姬以希見故得出從子之代為代太后太后弟薄昭從如代師古曰如徃也代王立十七年高后崩大臣議立後疾外家呂氏彊暴皆稱薄氏仁善故迎立代王為皇帝尊太后為皇太后封弟昭為軹侯師古曰軹音只太后母亦前死葬櫟陽北廼追尊太后父為靈文侯會稽郡置園邑三百家長丞以下使奉守寢廟上食祠如法櫟陽亦置靈文夫人園令如靈文侯園儀太后蚤失父其奉太后外家魏氏有力師古曰言太后為外家所養也廼召復魏氏師古曰優復之也復音方目反賞賜各以親疏受之薄氏侯者一人太后後文帝二歲孝景前二年崩師古曰言文帝崩後二歲太后乃崩葬南陵師古曰薄太后陵在霸陵之南故稱南陵即今所謂薄陵用呂后不合葬長陵師古曰以呂后是正嫡故薄不得合葬也故特自起陵近文帝孝文竇皇后景帝母也呂太后時以良家子選入宫太后出宫人以賜諸王各五人竇姬與在行中師古曰與讀曰豫家在清河願如趙近家師古曰如徃也請其主遣宦者吏必置我籍趙之伍中師古曰主遣宦者吏謂宦者為吏而主發遣宫人者也籍謂名簿也伍猶列也宦者忘之誤置籍代伍中籍奏詔可當行竇姬涕泣怨其宦者不欲徃相彊廼肯行至代代王獨幸竇姬生女嫖師古曰嫖音匹昭反孝恵七年生景帝代王王后生四男先代王未入立為帝而王后卒及代王為帝後王后所生四男更病死師古曰更互也音工衡反文帝立數月公卿請立太子而竇姬男最長立為太子竇姬為皇后女為館陶長公主師古曰年最長故謂之長公主明年封少子武為代王後徙梁師古曰初封代王後更為梁王是為梁孝王竇皇后親蚤卒葬觀津師古曰觀津清河之縣也觀音工喚反於是薄太后廼詔有司追封竇后父為安成侯母曰安成夫人令清河置園邑二百家長丞奉守比靈文園法竇后兄長君弟廣國字少君年四五歲時家貧為人所略賣其家不知處傳十餘家至宜陽為其主人入山作炭暮臥岸下百餘人岸崩盡厭殺臥者師古曰厭音一甲反少君獨脫不死自卜數日當為侯從其家之長安師古曰從其主家也之徃也聞皇后新立家在觀津姓竇氏廣國去時雖少識其縣名及姓又嘗與其姊采桑墮師古曰墮謂墮𣗳用為符信上書自陳皇后言帝召見問之具言其故果是復問其所識師古曰識記也音式志反曰姊去我西時與我决傳舍中匄沐沐我已飯我乃去師古曰乞沐具而為之沐沐訖又飯食之也飯音扶晚反於是竇皇后持之而泣侍御左右皆悲廼厚賜之家於長安綘侯灌將軍等曰吾屬不死命乃且縣此兩人師古曰恐其後擅權則將相大臣當被害此兩人所出微不可不為擇師傳又復放呂氏大事也師古曰放音甫徃反於是乃選長者之有節行者與居竇長君少君由此為退讓君子不敢以富貴驕人竇皇后疾失明文帝幸邯鄲慎夫人尹姬皆無子文帝崩景帝立皇后為皇太后乃封廣國為章武侯長君先死封其子彭祖為南皮侯吳楚反時太后從昆}
