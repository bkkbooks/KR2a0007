  - {type: variant, offset: 330, length: 1, content: 矣, WYG: 親結其離而戒之故云自思也叅古累字陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮張晏曰書云牝雞之晨惟家之索喻婦人無男事也哀襃閻之為郵師古曰小雅刺幽王之詩曰赫赫宗周襃姒滅之閻妻煽方處故云為郵郵過也美皇英之女虞兮榮任姒之母周師古曰皇娥皇英女英堯之二女也女妻也虞虞舜也任太任文王之母姒太姒武王之母也女虞女音尼據反雖愚陋其靡及兮}
