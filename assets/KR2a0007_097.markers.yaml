  - {type: variant, offset: 27, length: 0, content: '', krp: 為託上曰夫人病甚殆將不起一見我屬託王及兄弟豈不快哉夫人曰婦人貌不脩飾不見君父妾不敢以燕媠見帝師古曰媠與惰同謂不嚴飾上曰夫人第一見我師古曰第但也將加賜千金而予兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉鄉歔欷而不復言師古曰鄉讀曰嚮轉面而嚮裏也歔音虚欷音許既反於是上不説而起夫人姊妹讓之曰貴人獨不可一見上屬託兄弟邪何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰而愛㢮愛㢮則恩絶上所以攣攣顧念我者乃以平生容貌也今見我毁壊顔色非故必畏惡吐棄我意尚肯復追思閔錄其兄弟哉及夫人卒上以后禮葬焉其後上以夫人兄李廣利為貳師將軍封海西侯延年為協律都尉上思念李夫人不已方士齊人少翁言能致其神廼夜張燈燭設帳帷陳酒肉而令上居他帳遙望見好女如李夫人之貌還幄坐而歩師古曰夫人之神於幄中坐又出而徐歩又不得就視上愈益相思悲感為作詩曰是邪非邪立而望之偏何姍姍其來遲師古曰姍姍行貌音先安反令樂府諸音家絃歌之上又自為作賦以傷悼夫人其辭曰美連娟以脩嫮兮師古曰嫮美也連娟纎弱也嫮音互娟音一全反命樔絶而不長師古曰樔絶也音子小反飾新宫以延貯兮冺不歸乎故郷師古曰新宫待神之處貯與佇同佇待也泯然滅絶意慘鬱鬱其蕪穢兮隠處幽而懐傷釋輿馬於山椒兮奄脩夜之不陽孟康曰山椒山陵也置輿馬於山陵也師古曰自慘欝鬱以下皆言夫人身處墳墓而隱翳也脩長也陽明也秋氣㦧以凄淚兮桂枝落而銷亡師古曰凄淚寒凉之意也桂秋芳香亦喻夫人也㦧音千感反淚音戾神㷀㷀以遙思兮精浮游而出畺託沈隂以壙久兮惜蕃華之未央師古曰沈隂言在地下也壙與曠同未央猶未半也言年歲未半而早落蕃華故痛惜之蕃音扶元反念窮極之不還兮惟幼眇之相羊師古曰惟思也幼眇猶窈窕也相羊翺翔也幼音一小反相音襄函荾荴以俟風兮芳雜襲以彌章李竒曰荴音敷孟康曰荾音綏華中齊也夫人之色如春華含荾敷散以待風也師古曰雜襲重積也的容與以猗靡兮縹飄姚虖愈荘孟康曰言夫人之顔色的然盛美雖在風中縹姚愈益端嚴也師古曰縹音匹妙反燕淫衍而撫楹兮連流視而娥揚師古曰追述平生歡晏之時也娥揚揚其娥眉既激感而心逐兮包紅顔而弗明師古曰心逐者帝自言中心追逐夫人不能已也包紅顔者言在墳墓之中不可見也驩接狎以離别兮宵寤夢之芒芒師古曰言絶接狎之懽而遂離别也宵夜也芒芒無知之貌也芒音莫郎反忽遷化而不反兮魄放逸以飛揚何靈魂之紛紛兮哀裵回以躊躇師古曰躊躇住足也躊音疇躇合韻音丈預反埶路日以逺兮遂荒忽而辭去師古曰荒音呼廣反超兮西征屑兮不見師古曰屑然疾意也以日為喻故言西征寖淫敞􅩛寂兮無音師古曰􅩛古怳字思若流波怛兮在心師古曰流波言恩寵不絶也怛悼也音丁曷反亂曰師古曰亂理也總理賦中之意佳俠函光隕朱榮兮孟康曰佳俠猶佳麗嫉妬闟茸將安程兮師古曰言嫉妬闟茸之徒不足與夫人為程品也闟茸衆賤之稱也闟音吐臘反茸音人勇反方時隆盛年夭傷兮師古曰傷合韻音式向反弟子増欷洿沬悵兮應劭曰弟夫人兄弟也子昌邑王也孟康曰洿沬涕洟也晉灼曰沬音水沬面之沬言涕洟洿集覆面下也師古曰沬晉説是也悵惆悵也洿音烏洿下也沬音呼内反字從午未之未也悲愁於邑喧不可止兮師古曰朝鮮之間謂小兒泣不止名為喧音許逺反嚮不虚應亦云已兮師古曰嚮讀曰響響之隨聲必當有應而今涕泣徒自已耳夫人不知之是虚其應嫶妍太息嘆稚子兮孟康曰夫人蒙被歔欷不見帝哀其子小而孤也晋灼曰三輔謂憂愁面省瘦曰嫶冥嫶冥猶嫶妍也師古曰嫶音在消反懰慄不言倚所恃兮孟康曰恃平日之恩知上必感念之也師古曰懰慄哀愴之意也懰音劉慄音栗仁者不誓豈約親兮如淳曰仁者之行惠尚一不以為恩施豈有親親而反當以言約乎既徃不來申以信兮師古曰死者一徃不返情念酷痛重以此心為信不有忽忘也信合韻音新去彼昭昭就冥冥兮既下新宫不復故庭兮師古曰故庭謂平生所居室之庭也復音扶目反嗚呼哀哉想魂靈兮其後李延年弟季坐姦亂後宫廣利降匈奴家族滅矣孝武鉤弋趙倢伃昭帝母也家在河間武帝巡狩過河間望氣者言此有竒女天子亟使使召之既至女兩手皆拳上自披之手即時伸由是得幸號曰拳夫人先是其父坐法宫刑為中黄門死長安葬雍門師古曰雍門在長安西北孝里西南去長安三十里廣記云趙父冢在門西也拳夫人進為偼伃居鉤弋宫師古曰黄圖鉤弋宫在城外漢武故事曰在直門南也大有寵元始三年生昭帝號鉤弋子任身十四月廼生上曰聞昔堯十四月而生今鉤弋亦然廼命其所生門曰堯母門後衛太子敗而燕王旦廣陵王胥多過失寵姬王夫人男齊懐王李夫人男昌邑哀王皆蚤薨鉤弋子年五六歲壯大多知師古曰壯大者言其形體偉大上常言類我又感其生與衆異甚竒愛之心欲立焉以其年穉母少恐女主顓恣亂國家猶與久之師古曰與讀曰豫鉤弋倢伃從幸甘泉有過見譴以憂死師古曰譴責也音口羡反因葬雲陽師古曰在甘泉宫南今土俗人嘑為女陵後上疾病乃立鉤弋子為皇太子拜奉車都尉霍光為大司馬大將軍輔少主明日帝崩昭帝即位追尊鉤弋偼伃為皇太后發卒二萬人起雲陵邑三千戸追尊外祖趙父為順成侯詔右扶風置園邑二百家長丞奉守如法順成侯有姊君姁賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜趙氏無在位者唯趙父追封孝昭上官皇后祖父桀隴西上邽人也少時為羽林期門郎從武帝上甘泉天大風車不得行解蓋授桀桀奉蓋雖風常屬車師古曰屬連也音之欲反雨下蓋輒御上竒其材力遷未央廐令上嘗體不安及愈見馬馬多瘦上大怒令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為忠由是親近為侍中稍遷至太僕武帝疾病以霍光為大將軍太僕桀為左將軍皆受遺詔輔少主以前捕斬反者莽通功封桀為安陽侯初桀子安取霍光女結婚相親光每休沐出桀嘗代光入决事昭帝始立年八嵗帝長姊鄂邑蓋長公主居禁中共養帝師古曰共音居用反養音弋亮反蓋主私近子客河間丁外人師古曰子客子之賔客也外人其名也上與大將軍聞之不絶主驩有詔外人侍長主長主内周陽氏女令配耦帝時上官安有女即霍光外孫安因光欲内之光以為尚幼不聽安素與丁外人善説外人曰聞長主内女安子容貌端正誠因長主時得入為后師古曰以時得入以臣父子在朝而有椒房之重師古曰椒房殿名在未央宫皇后所居成之在於足下漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召委女入為倢伃安為騎都尉月餘遂立為皇后年甫六歳師古曰甫始也安以后父封桑樂侯食邑千五百户遷車騎將軍日以驕淫受賜殿中出對賔客言與我婿飲大樂見其服飾使人歸欲自燒物安醉則祼行内與後母及父諸良人侍御皆亂師古曰良人謂妾也侍御則兼婢矣子病死仰而罵天數守大將軍光為丁外人求侯師古曰守求請之及桀欲妄官祿外人師古曰不由材徳故曰妄光執正皆不聽又桀妻父所幸充國為太醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十匹贖罪廼得减死論於是桀安父子深怨光而重徳蓋主知燕王旦帝兄不得立亦怨望桀安即記光過失予燕王令上書告之又為丁外人求侯燕王大喜上書稱子路喪姊朞而不除孔子非之子路曰由不幸寡兄弟不忍除之師古曰事見禮記由子路之名故曰觀過知仁師古曰論語云孔子曰人之過也各於其黨觀過斯知仁矣引此言者謂子路厚於骨肉雖違禮制是其仁愛今臣與陛下獨有長公主為姊陛下幸使丁外人侍之外人宜蒙爵號書奏上以問光光執不許及告光罪過上又疑之愈親光而疏桀安桀安寖恚師古曰寖漸也遂結黨與謀殺光誘徴燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧菟邪師古曰言所求者大不顧小也且用皇后為尊一旦人主意有所移雖欲為家人亦不可得師古曰家人言凡庻匹夫此百世之一時也事發覺燕王蓋主皆自殺語在霍光傳桀安宗族既滅皇后以年少不與謀師古曰與讀曰預亦光外孫故得不廢皇后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法皇后自使私奴婢守桀安冢師古曰廟記云上官桀安冢並在霍光冢東東去夏侯勝冢二十歩光欲皇后擅寵有子帝時體不安左右及醫皆阿意言宜禁内雖宫人使令皆為窮絝多其帶服䖍曰窮絝有前後當不得交通也師古曰使令所使之人也絝古袴字也窮絝即今之緄襠袴也令音力征反緄音下昆反後宫莫有進者皇后立十歲而昭帝崩后年十四五云昌邑王賀徴即位尊皇后為皇太后先與太后共廢王賀立孝宣帝元帝即位為太皇太后凡立四十七年年五十二建昭二年崩合葬平陵衞太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣家本魯國有母貞君兄恭以元鼎四年入為良娣生男進號史皇孫師古曰進者皇孫之名武帝末巫蠱事起衞太子及良娣史皇孫皆遭害史皇孫有一男號皇曾孫時生數月猶坐太子繫獄積五歳乃遭赦治獄使者邴吉憐皇曽孫無所歸載以付史恭恭母貞君年老見孫孤甚哀之自養視焉後曽孫収養於掖庭遂登至尊位是為宣帝而貞君及恭已死恭三子}
