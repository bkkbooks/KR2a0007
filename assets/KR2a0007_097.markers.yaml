  - {type: variant, offset: 13, length: 2, content: 孝元, WYG: 非獨内徳茂也蓋亦有外戚之助焉夏之興也以塗山而桀之放也用末喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及太任太姒而幽王之禽也􅁋褒姒故易基乾坤詩首關睢書美釐降春秋譏不親迎夫婦之際人道之大倫也師古曰倫理也禮之用唯昏姻為兢兢師古曰兢兢戒慎也夫樂調而四時和隂陽之變萬物之統也可不慎與人能𢎞道末如命何甚哉妃匹之愛君不能得之臣父不能得之子况卑下乎師古曰言雖君父之尊不能奪其所好而移其本意既驩合矣或不能成子姓師古曰姓生也成子姓矣而不能要其終豈非命也哉孔子罕言命蓋難言之非通幽明之變惡能識乎性命漢興因秦之稱號帝母稱皇太后祖母稱太皇太后適稱}
