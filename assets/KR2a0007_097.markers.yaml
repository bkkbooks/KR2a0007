  - {type: variant, offset: 190, length: 0, content: '', WYG: 師古曰每事皆奏决於天子乃敢行也可覆問也今誠時世異制長短相𥙷不出漢制而已纖微之間未必可同若竟寧前與黄龍前豈相放哉晉灼曰竟寜元帝時也黄龍宣帝時也言二帝奢儉不同豈相放哉師古曰放依也音甫徃反家吏不曉師古曰家吏皇后之官屬今壹受詔如此且使妾搖手不得今言無得發取諸官殆謂未央宫不屬妾不宜獨取也師古曰未央宫天子之宫故其財物皇后不得取也今言者謂詔}
  - {type: page-break, offset: 190, content: '', id: KR2a0007_WYG_097-37b, image: WYG0251/WYG0251-0198d.png}
