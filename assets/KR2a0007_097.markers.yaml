  - {type: variant, offset: 340, length: 4, content: 慚恧莽兄, WYG: 滋師古曰滋益也言時逝不留華色落也蕃音扶元反痛陽祿與柘館兮仍繦褓而離災服䖍曰二館名也生子此館皆失之也師古曰二觀並在上林中仍頻也離遭也豈妾人之殃咎兮將天命之不可求白日忽已移光兮遂晻莫而昧幽師古曰䁆與暗同又音烏感反莫讀曰暮一曰莫静也讀如本音猶被覆載之厚徳兮不廢捐於罪郵師古曰言主上之恩比於天地雖有罪過不廢棄也被音皮義反􅆢共養于東宫兮託長信之末流師古曰末流謂恩顧之末也一曰流謂等列也共音居用反養音弋向反共洒埽於帷幄兮}
