  - {type: variant, offset: 4274, length: 4, content: 統公手劾, WYG: 千石為恭皇立寢廟於京師比宣帝父悼皇考制度序昭穆於前殿如淳曰廟之前曰殿半以後曰寢傅太后父同産弟四人曰子孟中叔子元幼君師古曰中讀曰仲子孟子喜至大司馬封高武侯中叔子晏亦大司馬封孔鄉侯幼君子商封汝昌侯為太后父崇祖侯後更號崇祖曰汝昌哀侯太后同母弟鄭惲前死以惲子業為陽信侯追尊惲為陽信節侯鄭氏傅氏侯者凡六人大司馬二人九卿二千石六人侍中諸曹十餘人傅太后旣尊後尤驕與成帝母語至謂之嫗與中山孝王母馮太后並事元帝追怨之陷以祝詛罪令自殺元壽元年崩合葬渭陵稱孝元傅皇后云定陶丁姬哀帝母也易祖師丁將軍之𤣥孫師古曰祖始也儒林𫝊丁寛易家之始師家在山陽瑕丘父至廬江太守始定陶恭王先為山陽王而丁氏内其女為姬王后姓張氏其母鄭禮即傅大后同母弟也太后以親戚故欲其有子然終無有唯丁姬河平四年生哀帝丁姬為帝太后兩兄忠明明以帝舅封陽安侯忠蚤死封忠子滿為平周侯太后叔父憲望望為左將軍憲為太僕明為大司馬票騎將軍輔政丁氏侯者凡二人大司馬一人將軍九卿二千石六人侍中諸曹亦十餘人丁傅以一二年間暴興尤盛然哀帝不甚假以權埶權埶不如王氏在成帝世也建平二年丁太后崩上曰詩云穀則異室死則同穴師古曰王國大車之詩也穀生也昔季武子成寢杜氏之墓在西階下請合葬而許之師古曰事見禮記附葬之禮自周興焉孝子事亡如事存帝太后宜起陵恭皇之園遣大司馬票騎將軍明東送葬于定陶貴震山東哀帝崩王莽秉政使有司舉奏丁傅罪惡莽以太皇太后詔皆免官爵丁氏徙歸故郡莽奏貶傅太后號為定陶共王母丁太后號曰丁姬元始五年莽復言共王母丁姬前不臣妾師古曰不遵臣妾之道至葬渭陵冢高與元帝山齊懐帝太后皇太太后璽綬以葬師古曰懐謂挾}
