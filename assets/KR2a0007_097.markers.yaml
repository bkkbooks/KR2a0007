  - {type: variant, offset: 328, length: 1, content: 諸, WYG: 後趙飛燕姊弟亦從自微賤興隃越禮制寖盛於前師古曰隃與踰同寖漸也班倢伃及許皇后皆失寵稀復進見鴻嘉三年趙飛燕譖告許皇后班倢伃挟媚道祝詛後宫詈及主上許皇后坐廢考問班倢伃倢伃對曰妾聞死生有命富貴在天脩正尚未蒙福為邪欲以何望使鬼神有知不受不臣之愬師古曰祝詛主上是不臣也如其無知愬之何益故不為也上善其對憐憫之賜黄金百斤趙氏姊弟驕妬倢伃恐久見危求共養太后長信宫師古曰共音居用反養音弋向反上許焉倢伃退處東宫作賦自傷悼其辭曰承祖考之遺徳兮何性命之淑靈師古曰何任也負也登薄軀於宫闕兮充下陳於後庭師古曰陳列也蒙聖皇之渥恵兮當日月之盛眀師古曰渥厚也揚光烈之翕赫兮􅆢隆寵於増成既過幸於非位兮竊庻幾乎嘉時每寤寐而絫息兮申佩離以自思師古曰絫息言懼而喘息也離袿衣之帶也女子適人}
