  - {type: variant, offset: 320, length: 4, content: 談說虛譽, WYG: 小妻長紿之曰師古曰紿誑也我能白東宫復立許后為左皇后廢后因孊私賂遺長數通書記相報謝長書有誖謾師古曰誖惑亂也謾媟汙也誖音布内反謾與慢同發覺天子使廷尉孔光持節賜廢后藥自殺葬延陵交道廐西孝成班倢伃帝初即位選入後宫始為少使蛾而大幸如淳曰蛾無幾之頃也師古曰蛾與俄同古字通用為偼伃居増成舍應劭曰後宫有八區増成第三也再就館蘇林曰外舎産子也晉灼曰謂陽祿與柘觀有男數月失之成帝遊於後庭嘗欲與倢伃同輦載倢伃辭曰觀古圖畫聖賢之君皆有名臣在側三代末主廼有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢伃張晏曰楚王好田樊姬為不食禽獸之肉倢伃誦詩及窈窕徳象女師之篇師古曰詩謂闗睢以下也窈窕徳象女師之篇皆古箴戒之書也故𫝊云誦詩及窈窕以下諸篇明詩外别有此篇耳而説者便謂窈窕等卽是詩篇蓋失之矣每進見上疏依則古禮自鴻嘉後上稍}
