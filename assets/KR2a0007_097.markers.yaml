  - {type: variant, offset: 23, length: 0, content: '', krp: 所居至武帝時魏其侯竇嬰為丞相後誅孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢廢後四年薨葬長安城東平望亭南孝景王皇后武帝母也}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 王仲槐里人也母臧兒故燕王臧荼孫也為仲妻生男信與兩女而仲死􅆇兒更嫁為長陵田氏婦生男蚡勝􅆇兒長女嫁為金王孫婦生一女矣而􅆇兒卜筮曰兩女當貴欲倚兩女師古曰冀其貴而依􅀝之得尊寵也􅀝音於綺反奪金氏金氏怒不肯與决乃内太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懐以告太子太子曰此貴徴也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數歳景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許長主欲與王夫人王夫人許之㑹薄皇后廢長公主日􅉲栗姬短景帝常屬諸姬子師古曰諸姬子諸姬所生之子也屬音之欲反此下皆同曰吾百歲後善視之栗姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又耳曩者所夢日符師古曰耳常聽聞而記之也符猶瑞應計未有所定王夫人又隂使人趣大臣立栗姬為皇后師古曰趣音曰促大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言邪師古曰乃汝也言此事非汝所當得言遂案誅大行而廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子封皇后兄信為蓋侯初皇后始入太子家後女弟兒姁亦復入師古曰姁音許于反諸婦人之名字音皆同生四男兒姁蚤卒四子皆為王師古曰謂廣川恵王越膠東康王寄清河哀王乗常山憲王舜皇后長女為平陽公主次南宫公主次隆慮公主師古曰慮音廬皇后立九年景帝崩武帝即位為皇太后尊太后母臧兒為平原君封田蚡為武安侯勝為周陽侯王氏田氏侯者凡三人蓋侯信好酒田蚡勝貪巧於文辭蚡至丞相追尊王仲為共侯師古曰共讀曰恭槐里起園邑二百家長丞奉守及平原君薨從田氏葬長陵亦置園邑如共侯法初皇太后㣲時所為金王孫生女俗在民間蓋諱之也師古曰言隨俗而在閭巷未顯貴武帝始立韓嫣白之師古曰嫣音偃帝曰何為不蚤言乃車駕自徃迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿扶將出拜帝下車立曰大姊何臧之深也載至長樂宫與俱謁太后太后垂涕女亦悲泣帝奉酒前為夀錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號脩成君男女各一人女嫁諸侯男號脩成子仲以太后故横於京師師古曰横音胡孟反太后凡立二十五年後景帝十五歲元朔三年崩合葬陽陵孝武陳皇后長公主嫖女也曾祖父陳嬰與項羽俱起後歸漢為堂邑侯傳子至孫午午尚長公主生女初武帝得立為太子長主有力取主女為妃及帝即位立為皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉師古曰幾音鉅依反數音所角反上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等坐為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市使有司賜皇后策曰皇后失序惑於巫祝師古曰言失徳義之序而妄祝詛也不可以承天命其上璽綬罷退居長門宫眀年堂邑侯午薨生男須嗣侯主寡居私近董偃十餘年主薨須坐􅁋亂兄弟爭財當死自殺國除後數年廢后乃薨葬霸陵郎官亭東孝武衛皇后字子夫生微也其家號曰衛氏出平陽侯邑子夫為平陽主謳者師古曰齊歌曰謳音一侯反武帝即位數年無子平陽主求良家女十餘人飾置家帝祓霸上師古曰祓除也於霸水上自祓除今三月上已祓禊也師古曰祓音廢禊音系還過平陽主主見所偫美人師古曰偫儲偫也偫音丈紀反帝不説既飲謳者進帝獨説子夫師古曰説皆讀曰悦帝起更衣子夫侍尚衣師古曰尚主也時於軒中侍帝權主衣裳軒中得幸師古曰軒謂軒車即今車之施幰者還坐驩甚賜平陽主金千斤主因奏子夫送入宮子夫上車主拊其背曰行矣師古曰拊謂摩循之也行矣猶今言好去强飯勉之師古曰强音其兩反飯音扶晩反即貴願無相忘入宫歲餘不復幸武帝擇宫人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵召其兄衛長君弟青侍中而子夫生三女元朔元年生男據遂立為皇后先是衛長君死乃以青為將軍撃匈奴有功封長平侯青三子在襁褓中皆為列侯及皇后姊子霍去病亦以軍功為冠軍侯至大司馬票騎將軍青為大司馬大將軍衛氏支屬侯者五人青還尚平陽主皇后立七年而男立為太子後色衰趙之王夫人中山李夫人有寵皆蚤卒後有尹倢伃鉤弋夫人更幸師古曰更互也音工衡反衞后立三十八年遭巫蠱事起江充為姦太子懼不能自明遂與皇后共誅充發兵兵敗太子亡走詔遣宗正劉長樂執金吾劉敢奉策收皇后璽綬自殺黄門蘇文姚定漢輿置公車令空舎盛以小棺瘞之城南桐柏師古曰瘞薶也桐柏亭名也瘞音於例反衞氏悉滅宣帝立乃改葬衞后追諡曰思后置園邑三百家長丞周衞奉守焉師古曰葬在杜門外大道東以娼優雜伎千人樂其園故號千人聚其地在今長安城内金城坊西北隅是孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寜不知傾城與傾國佳人難再得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是為昌邑哀王李夫人少而蚤卒上憐憫焉圖畫其形於甘泉宫及衛思后廢後四年武帝崩大將軍霍光緣上雅意以李夫人配食追上尊號曰孝武皇后初李夫人病篤上自臨候之夫人蒙被謝曰妾久寢病形貌毁壊不可以見帝願以王}
