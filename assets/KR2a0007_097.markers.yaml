  - {type: variant, offset: 31, length: 0, content: '', krp: 侯詔涿郡治冢室置園邑四百家長丞奉守如法歲餘博平君薨諡曰思成夫人詔徙思成侯合葬奉明顧成廟南置園邑長丞師古曰本號廣明故戾太子傳云皇孫及王夫人皆葬廣明其後以置園邑奉守改曰奉明罷涿郡思成園王氏侯者二人無故子接為大司馬車騎將軍而武子商至丞相自有傳孝宣許皇后元帝母也父廣漢昌邑人少時為昌邑王郎從武帝上甘泉誤取它郎鞍以被其馬發覺吏劾從行而盜當死有詔募下蠶室孟康曰死罪囚欲就宫者聽之後為宦者丞上官桀謀反時廣漢部索師古曰部分捜索罪人也索音山客反其殿中廬有索長數尺可以縳人者數千枚滿一篋緘封師古曰殿中廬桀所止宿廬舍在宫中者也緘束篋也音工咸反廣漢索不得它吏徃得之師古曰須得此繩索者用為桀之反具廣漢坐論為鬼薪輸掖庭後為暴室嗇夫時宣帝養於掖庭號皇曾孫與廣漢同寺居時掖庭令張賀本衞太子家吏及太子敗賀坐下刑以舊恩養視皇曾孫甚厚及曾孫壮大賀欲以女孫妻之是時昭帝始冠長八尺二寸賀弟安}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 為右將軍與霍將軍同心輔政聞賀稱譽皇曾孫欲妻以女安世怒曰曾孫廼衞太子後也幸得以庻人衣食縣官足矣勿復言予女事於是賀止時許廣漢有女平君年十四五當為内者令歐侯氏子婦師古曰歐侯姓也歐音烏溝反臨當入歐侯氏子死其母將行卜相當大貴母獨喜賀聞許嗇夫有女廼置酒請之師古曰請召也召嗇夫飲酒也酒酣為言曾孫體近下人乃闗内侯師古曰言曾孫之身於帝為近親縱其人材下劣尚作闗内侯書本或無人字可妻也廣漢許諾明日嫗聞之怒師古曰廣漢之妻不欲與曾孫廣漢重令為介師古曰更令人作媒而結婚姻重音直用反遂與曾孫一歲生元帝數月曾孫立為帝平君為偼伃是時霍將軍有小女與皇太后有親公卿議更立皇后皆心儀霍將軍女晉灼曰儀向也師古曰謂附向之亦未有言上乃詔求㣲時故劒大臣知指白立許偼伃為皇后既立霍光以后父廣漢刑人不宜君國歲餘乃封為昌成君霍光夫人顯欲貴其小女道無從師古曰從因也由也無由得内其女明年許皇后當娠病女醫淳于衍者霍氏所愛嘗入宮侍皇后疾衍夫賞為掖庭戸衞謂衍可過辭霍夫人行師古曰過辭夫人乃行入宫也為我求安池監衍如言報顯顯因生心辟左右師古曰辟音闢謂屏去之字謂衍少夫幸報我以事如淳曰稱衍字曰少夫親之也晉灼曰報我以事謂求池監也我亦欲報少夫可乎晉灼曰報少夫謀弑許后事衍曰夫人所言何等不可者顯曰將軍素愛小女成君欲竒貴之願以累少夫師古曰累託也音力瑞反衍曰何謂邪顯曰婦人免乳大故十死一生師古曰免乳謂産子也大故大事也乳音人喻反今皇后當免身可因投毒藥去也師古曰去謂除去皇后也音丘呂反成君即得為皇后矣如蒙力事成富貴與少夫共之衍曰藥雜治當先嘗安可師古曰與衆醫共雜治之人有先嘗者何可行毒顯曰在少夫為之耳將軍領天下誰敢言者緩急相護但恐少君無意耳衍良久曰願盡力即擣附子齎入長定宫皇后免身後衍取附子并合大醫大丸以飲皇后晉灼曰大丸今澤蘭丸之屬有頃曰我頭岑岑也藥中得無有毒師古曰岑岑痺悶之意對曰無有遂加煩懣崩師古曰懣音滿又音悶衍出過見顯相勞問師古曰勞音來到反亦未敢重謝衍師古曰恐人知覺之後人有上書告諸醫侍疾無狀者皆收繫詔獄劾不道顯恐事急即以状具語光因曰既失計為之無令吏急衍光驚鄂黙然不應其後奏上署衍勿論李竒曰光題其奏也師古曰言之於帝故解釋耳光不自署也許后立三年而崩諡曰恭哀皇后葬杜南是為杜陵南園即古曰即今之所謂小陵者去杜陵十八里後五年立皇太子廼封太子外祖父昌成君廣漢為平恩侯位特進後四年復封廣漢兩弟舜為博望侯延壽為樂成侯許氏侯者凡三人廣漢薨諡曰戴侯無子絶葬南園旁置邑三百家長丞奉守如法宣帝以延壽為大司馬車騎將軍輔政元帝即位復封延壽中子嘉為平恩侯􅆢戴侯後亦為大司馬車騎将軍孝宣霍皇后大司馬大將軍博陸侯光女也母顯既使淳于衍隂殺許后顯因為成君衣補師古曰謂縫作嫁時衣被也為音于偽反治入宫具勸光内之果立為皇后初許后起微賤登至尊日淺從官車服甚節儉五日一朝皇太后於長樂宫親􅆢案上食以婦道共養及霍后立亦脩許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后轝駕侍從甚盛賞賜官屬以千萬計與許后時懸絶矣上亦寵之顓房燕師古曰顓與専同立三歲而光薨後一歲上立許后男為太子昌成君者為平恩侯顯怒恚不食歐血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輙先嘗之后挾毒不得行後殺許后事頗泄顯遂與諸壻昆弟謀反發覺皆誅滅使有司賜皇后策曰皇后熒惑失道懐不徳挾毒與母博陸宣成侯夫人顯謀欲危太子無人母之恩不宜奉宗廟衣服不可以承天命嗚呼傷哉其退避宫上璽綬有司霍后立五年廢處昭䑓宫師古曰在上林中後十二歲徙雲林舘廼自殺葬昆吾亭東師古曰昆吾地名在藍田初霍光及兄驃騎将軍去病皆自以功伐}
