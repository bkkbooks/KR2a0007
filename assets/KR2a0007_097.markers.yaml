  - {type: variant, offset: 1283, length: 2979, content: 宮收取璽綬遣使者馳召莽詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽莽白大司馬高安侯董賢年少不合眾心收印綬賢即日自殺太后詔公卿舉可大司馬者大司徒孔光大司空彭宣舉莽前將軍何武後將軍公孫祿互相舉太后拜莽為大司馬與議立嗣安陽侯王舜莽之從弟其人修飭太后所信愛也莽白以舜為車騎將軍使迎中山王奉成帝後是為孝平皇帝帝年九歲太后臨朝稱制委政於莽莽白趙氏前害皇子傅氏驕僭遂廢孝成趙皇后孝哀傅皇后皆令自殺語在外戚傳莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不說者莽皆傅致其罪為請奏令邯持與光光素畏慎不敢不上之莽白太后輒可其奏於是前將軍何武後將軍公孫祿坐互相舉免丁傅及董賢親屬皆免官爵徙遠方紅陽侯立太后親弟雖不居位莽以諸父內敬憚之畏立從容言太后令己不得肆意乃復令光奏立舊惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝後白以官婢楊寄私子為皇子眾言曰呂氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聽莽曰今漢家衰比世無嗣太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從今以私恩逆大臣議如此群下傾邪亂從此起宜可且遣就國安後復徵召之太后不得已遣立就國莽之所以脅持上下皆此類也於是附順者拔擢忤恨者誅滅王舜王邑為腹心甄豐甄邯主擊斷平晏領機事劉歆典文章孫建為爪牙豐子尋歆子棻涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言方欲有所為微見風采黨與承其指意而顯奏之莽稽首涕泣固推讓焉上以惑太后下用示信於眾庶始風益州令塞外蠻夷獻白雉元始元年正月莽白太后下詔以白雉薦宗廟群臣因奏言太后委任大司馬莽定策安宗廟故大司馬霍光有安宗廟之功益封三萬戶疇其爵邑比蕭相國莽宜如光故事太后問公卿曰誠以大司馬有大功當著之邪將以骨肉故欲異之也於是群臣乃盛陳莽功德致周成白雉之瑞千載同符聖王之法臣有大功則生有美號故周公及身在而託號於周莽有定國安漢家之大功宜賜號曰安漢公益戶疇爵邑上應古制下準行事以順天心太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定策今願獨條光等功賞寑置臣莽勿隨輩列甄邯白太后下詔曰無偏無黨王道蕩蕩屬有親者義不得阿君有安宗廟之功不可以骨肉故蔽隱不揚君其勿辭莽復上書讓太后詔謁者引莽待殿東箱莽稱疾不肯入太后使尚書令恂詔之曰君以選故而辭以疾君任重不可闕以時亟起莽遂固辭太后復使長信太僕閎承制召莽莽固稱疾左右白太后宜勿奪莽意但條孔光等莽乃肯起太后下詔曰太傅博山侯光宿衛四世世為傅相忠孝仁篤行義顯著建議定策益封萬戶以光為太師與四輔之政車騎將軍安陽侯舜積累仁孝使迎中山王折衝萬里功德茂著益封萬戶以舜為太保左將軍光祿勳豐宿衛三世忠信仁篤使迎中山王輔導共養以安宗廟封豐為廣陽侯食邑五千戶以豐為少傅皆授四輔之職疇其爵邑各賜第一區侍中奉車都尉邯宿衛勤勞建議定策封邯為承陽侯食邑二千四百戶四人既受賞莽尚未起群臣復上言莽雖克讓朝所宜章以時加賞明重元功無使百僚元元失望太后乃下詔曰大司馬新都侯莽三世為三公典周公之職建萬世策功德為忠臣宗化流海內遠人慕義越裳氏重譯獻白雉其以召陵新息二縣戶二萬八千益封莽復其後嗣疇其爵邑封功如蕭相國以莽為太傅幹四輔之事號曰安漢公以故蕭相國甲第為安漢公第定著於令傳之無窮於是莽為惶恐不得已而起受策策曰漢危無嗣而公定之四輔之職三公之任而公幹之群僚眾位而公宰之功德茂著宗廟以安蓋白雉之瑞周成象焉故賜嘉號曰安漢公輔翼于帝期於致平毋違朕意莽受太傅安漢公號讓還益封疇爵邑事云願須百姓家給然後加賞群公復爭太后詔曰公自期百姓家給是以聽之其令公奉舍人賞賜皆倍故百姓家給人足大司徒大司空以聞莽復讓不受而建言宜立諸侯王後及高祖以來功臣子孫大者封侯或賜爵關內侯食邑然後及諸在位各有第序上尊宗廟增加禮樂下惠士民鰥寡恩澤之政無所不施語在平紀莽既說眾庶又欲專斷知太后猒政乃風公卿奏言往者吏以功次遷至二千石及州部所舉茂材異等吏率多不稱宜皆見安漢公又太后不宜親省小事令太后下詔曰皇帝幼年朕且統政比加元服今眾事煩碎朕春秋高精氣不堪殆非所以安躬體而育養皇帝者也故選忠賢立四輔群下勸職永以康寧孔子曰巍巍乎舜禹之有天下而不與焉自今以來惟封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問致密恩意厚加贈送其不合指顯奏免之權與人主侔矣莽欲以虛名說太后白言親承前孝哀丁傅奢侈之後百姓未贍者多太后宜且衣繒練頗損膳以視天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉莽帥群臣奏言陛下春秋尊久衣重練減御膳誠非所以輔精氣育皇帝安宗廟也臣莽數叩頭省戶下白爭未見許今幸賴陛下德澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徵同時並至臣莽等不勝大願願陛下愛精休神闊略思慮遵帝王之常服復太官之法膳使臣子各得盡驩心備共養惟哀省察莽又令太后下詔曰蓋聞母后之義思不出乎門閾國不蒙佑皇帝年在襁褓未任親政戰戰兢兢懼於宗廟之不安國家之大綱微朕孰當統之是以孔子見南子周公居攝蓋權時也勤身極思憂勞未綏故國奢則視之以儉矯枉者過其正而朕不身帥將謂天下何夙夜夢想五穀豐孰百姓家給比皇帝加元服委政而授焉今誠未皇于輕靡而備味庶幾與百僚有成其勗之哉每有水旱莽輒素食左右以白太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰公勤於職以時食肉愛身為國莽念中國已平唯四夷未有異乃遣使者齎黃金幣帛重賂匈奴單于使上書言聞中國譏二名故名囊知牙斯今更名知慕從聖制又遣王昭君女須卜居次入侍所以誑耀媚事太后下至旁側長御方故萬端莽既尊重欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宮未建液廷媵未充乃者國家之難本從亡嗣配取不正請考論五經定取禮正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女事下有司上眾女名王氏女多在選中者莽恐其與己女爭即上言身亡德子材下不宜與眾女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省戶下咸言明詔聖德巍巍如彼安漢公盛勳堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生而上書者愈甚太后不得已聽公卿采莽女莽復自白宜博選眾女公卿爭曰不宜采諸女以貳正統莽白願見女太后遣長樂少府宗正尚書令納采見女還奏言公女漸漬德化有窈窕之容宜承天序奉祭祀有詔遣大司徒大司空策告宗廟雜加卜筮皆曰兆遇金水王相卦遇父母得位所謂康強之占逢吉之符也信鄉侯佟上言春秋天子將娶於紀則襃紀子稱侯安漢公國未稱古制事下有司皆曰古者天子封后父百里尊而不臣以重宗廟孝之至也佟言應禮可許請以新野田二萬五千六百頃益封莽滿百里莽謝曰臣莽子女誠不足以配至尊復聽眾議益封臣莽伏自惟念得託肺腑獲爵土如使子女誠能奉稱聖德臣莽國邑足以共朝貢不須復加益地之寵願歸所益太后許之有司奏故事聘皇后黃金二萬斤為錢二萬萬莽深辭讓受四千萬而以其三千三百萬予十一媵家群臣復言今皇后受聘踰群妾亡幾有詔復益二千三百萬合為三千萬莽復以其千萬分予九族貧者陳崇時為大司徒司直與張敞孫竦相善竦者博通士為崇草奏稱莽功德崇奏之曰竊見安漢公自初束脩值世俗隆奢麗之時蒙兩宮厚骨肉之寵被諸父赫赫之光財饒勢足亡所啎意然而折節行仁克心履禮拂世矯俗確然特立惡衣惡食陋車駑馬妃匹無二閨門之內孝友之德眾莫不聞清靜樂道溫良下士惠于故舊篤于師友孔子曰未若貧而樂富而好禮公之謂矣及為侍中故定陵侯淳于長有大逆罪公不敢私建白誅討周公誅管蔡季子鴆叔牙公之謂矣是以孝成皇帝命公大司馬委以國統孝哀即位, WYG: 宫}
  - {type: variant, offset: 1283, length: 2979, content: 宮收取璽綬遣使者馳召莽詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽莽白大司馬高安侯董賢年少不合眾心收印綬賢即日自殺太后詔公卿舉可大司馬者大司徒孔光大司空彭宣舉莽前將軍何武後將軍公孫祿互相舉太后拜莽為大司馬與議立嗣安陽侯王舜莽之從弟其人修飭太后所信愛也莽白以舜為車騎將軍使迎中山王奉成帝後是為孝平皇帝帝年九歲太后臨朝稱制委政於莽莽白趙氏前害皇子傅氏驕僭遂廢孝成趙皇后孝哀傅皇后皆令自殺語在外戚傳莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸哀帝外戚及大臣居位素所不說者莽皆傅致其罪為請奏令邯持與光光素畏慎不敢不上之莽白太后輒可其奏於是前將軍何武後將軍公孫祿坐互相舉免丁傅及董賢親屬皆免官爵徙遠方紅陽侯立太后親弟雖不居位莽以諸父內敬憚之畏立從容言太后令己不得肆意乃復令光奏立舊惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝後白以官婢楊寄私子為皇子眾言曰呂氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聽莽曰今漢家衰比世無嗣太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從今以私恩逆大臣議如此群下傾邪亂從此起宜可且遣就國安後復徵召之太后不得已遣立就國莽之所以脅持上下皆此類也於是附順者拔擢忤恨者誅滅王舜王邑為腹心甄豐甄邯主擊斷平晏領機事劉歆典文章孫建為爪牙豐子尋歆子棻涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言方欲有所為微見風采黨與承其指意而顯奏之莽稽首涕泣固推讓焉上以惑太后下用示信於眾庶始風益州令塞外蠻夷獻白雉元始元年正月莽白太后下詔以白雉薦宗廟群臣因奏言太后委任大司馬莽定策安宗廟故大司馬霍光有安宗廟之功益封三萬戶疇其爵邑比蕭相國莽宜如光故事太后問公卿曰誠以大司馬有大功當著之邪將以骨肉故欲異之也於是群臣乃盛陳莽功德致周成白雉之瑞千載同符聖王之法臣有大功則生有美號故周公及身在而託號於周莽有定國安漢家之大功宜賜號曰安漢公益戶疇爵邑上應古制下準行事以順天心太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定策今願獨條光等功賞寑置臣莽勿隨輩列甄邯白太后下詔曰無偏無黨王道蕩蕩屬有親者義不得阿君有安宗廟之功不可以骨肉故蔽隱不揚君其勿辭莽復上書讓太后詔謁者引莽待殿東箱莽稱疾不肯入太后使尚書令恂詔之曰君以選故而辭以疾君任重不可闕以時亟起莽遂固辭太后復使長信太僕閎承制召莽莽固稱疾左右白太后宜勿奪莽意但條孔光等莽乃肯起太后下詔曰太傅博山侯光宿衛四世世為傅相忠孝仁篤行義顯著建議定策益封萬戶以光為太師與四輔之政車騎將軍安陽侯舜積累仁孝使迎中山王折衝萬里功德茂著益封萬戶以舜為太保左將軍光祿勳豐宿衛三世忠信仁篤使迎中山王輔導共養以安宗廟封豐為廣陽侯食邑五千戶以豐為少傅皆授四輔之職疇其爵邑各賜第一區侍中奉車都尉邯宿衛勤勞建議定策封邯為承陽侯食邑二千四百戶四人既受賞莽尚未起群臣復上言莽雖克讓朝所宜章以時加賞明重元功無使百僚元元失望太后乃下詔曰大司馬新都侯莽三世為三公典周公之職建萬世策功德為忠臣宗化流海內遠人慕義越裳氏重譯獻白雉其以召陵新息二縣戶二萬八千益封莽復其後嗣疇其爵邑封功如蕭相國以莽為太傅幹四輔之事號曰安漢公以故蕭相國甲第為安漢公第定著於令傳之無窮於是莽為惶恐不得已而起受策策曰漢危無嗣而公定之四輔之職三公之任而公幹之群僚眾位而公宰之功德茂著宗廟以安蓋白雉之瑞周成象焉故賜嘉號曰安漢公輔翼于帝期於致平毋違朕意莽受太傅安漢公號讓還益封疇爵邑事云願須百姓家給然後加賞群公復爭太后詔曰公自期百姓家給是以聽之其令公奉舍人賞賜皆倍故百姓家給人足大司徒大司空以聞莽復讓不受而建言宜立諸侯王後及高祖以來功臣子孫大者封侯或賜爵關內侯食邑然後及諸在位各有第序上尊宗廟增加禮樂下惠士民鰥寡恩澤之政無所不施語在平紀莽既說眾庶又欲專斷知太后猒政乃風公卿奏言往者吏以功次遷至二千石及州部所舉茂材異等吏率多不稱宜皆見安漢公又太后不宜親省小事令太后下詔曰皇帝幼年朕且統政比加元服今眾事煩碎朕春秋高精氣不堪殆非所以安躬體而育養皇帝者也故選忠賢立四輔群下勸職永以康寧孔子曰巍巍乎舜禹之有天下而不與焉自今以來惟封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問致密恩意厚加贈送其不合指顯奏免之權與人主侔矣莽欲以虛名說太后白言親承前孝哀丁傅奢侈之後百姓未贍者多太后宜且衣繒練頗損膳以視天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉莽帥群臣奏言陛下春秋尊久衣重練減御膳誠非所以輔精氣育皇帝安宗廟也臣莽數叩頭省戶下白爭未見許今幸賴陛下德澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徵同時並至臣莽等不勝大願願陛下愛精休神闊略思慮遵帝王之常服復太官之法膳使臣子各得盡驩心備共養惟哀省察莽又令太后下詔曰蓋聞母后之義思不出乎門閾國