  - {type: variant, offset: 246, length: 0, content: '', WYG: 皇極皇極者王氣之極也白者西方之氣其於春當廢今正於皇極之月興廢氣於後宫視后妾無能懐任保全者師古曰視讀曰示以著繼嗣之微賤人將起也至其九月流星如𤓰出於文昌貫紫宫尾委曲如龍臨於鉤陳此又章顯前尤著在内也其後則有北宫井溢南流逆理數郡水出流殺人民後則訛言相𫝊驚震女童入殿咸莫覺知師古曰謂陳持弓也夫河者水隂四瀆之長今乃大决沒漂陵邑師古曰大阜曰陵斯昭隂盛盈溢違經絶紀之應也廼昔之月鼠巢于𣗳野鵲變色五月庚子鳥焚其巢太山之域易曰鳥焚其巢旅人先咲後號咷喪牛于易凶師古曰咲古笑字咷音桃觧並在谷永𫝊言王者處民上如鳥之處巢也不顧䘏百姓百姓畔而去之若鳥之自焚也雖先快意説咲師古曰說讀曰悅其後必號而無及也百姓喪其君若牛亡其毛也故稱凶㤗山王者易姓告代之處今正於岱宗之山甚可懼也三月癸未大風自西搖祖宗寢廟揚裂帷席折㧞樹木頓僵車輦毁壊檻屋災及宗廟足為寒心四月己亥日蝕東井轉旋且索與既無異師古曰轉旋且索言須臾之間則欲盡也既亦盡耳春秋書日有食之既故詔引以為言索先各反已猶戊也亥復水也張晏曰巳戊在中宫為君亥為水隂氣也明隂盛咎在内於戊巳虧君體著絶世於皇極顯禍敗及京都於東井變怪衆備末重益大來數益甚成形之禍月以迫切不救之患日寖婁深師古曰寖甚也婁古屢字咎敗灼灼若此豈可以忽哉書云高宗肜日粤有雊雉師古曰肜音弋中反祖已曰惟先假王正厥事又曰雖休勿休惟敬五刑以成三徳師古曰觧並在谷永𫝊即飭椒房及掖庭耳師古曰謂祖已所言皆以戒後宫也飭與敕同今皇后有所疑便不便其條刺使大長秋來白之師古曰條謂分條之也刺謂書之於刺板也刺音千賜反吏拘於法亦安足過蓋矯枉者過直古今同之師古曰矯正也枉曲也言意在正曲遂過於直且財幣之省特牛之祠其於皇后所以扶助徳美為華寵也咎根不除災變相襲祖宗且不血食何戴侯也𫝊不云乎以約失之者鮮審皇后欲從其奢與朕亦當法孝武皇帝也如此則甘泉建章可復興矣世俗嵗殊時變日化遭事制宜因時而移舊之非者何可放焉師古曰放音甫徃反君子之道樂因循而重改作昔魯人為長府閔子騫曰仍舊貫如之何何必改作蓋惡之也詩云雖無老成人尚有典刑曽是莫聽大命以傾師古曰大雅蕩之詩也老成人舊故之臣也典刑常法也言闇亂之時不用舊法以至傾危也孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎師古曰言假令太后昔時不得其志不依常理而皇后今被親厚何可踰於太后制度乎婦不可踰姑也惡音烏皇后其刻心秉徳毋違先后之制度力誼勉行稱順婦道師古曰稱副也減省羣事謙約為右師古曰以謙約為先其孝東宫毋闕朔望師古曰東宫太后所居也朔望朝謁之禮也推誠永䆒爰何不􅆇師古曰究竟也爰于也臧善也于何不善言何事而不善也養名顯行以息衆讙師古曰讙譁衆議也音許元反垂則列妾使有法焉師古曰言垂法於後宫皆使遵行也皇后深惟母忽是時大將軍鳯用事威權尤盛其後比三年日蝕師古曰比頻也言事者頗歸咎於鳯矣而谷永等遂著之許氏許氏自知為鳯所不佑師古曰佑助也久之皇后寵亦益衰而後宫多}
