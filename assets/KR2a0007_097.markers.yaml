  - {type: variant, offset: 13031, length: 1175, content: 遭孺子幼少未能共上下皇天降瑞出丹石之符是以太皇大后則天明命詔安漢公居攝踐祚將以成聖漢之業與唐虞三代比隆也攝皇帝遂開祕府會群儒制禮作樂卒定庶官茂成天功聖心周悉卓爾獨見發得周禮以明因監則天稽古而損益焉猶仲尼之聞韶日月之不可階非聖哲之至孰能若茲綱紀咸張成在一匱此其所以保佑聖漢安靖元元之效也今功顯君薨禮庶子為後為其母緦傳曰與尊者為體不敢服其私親也攝皇帝以聖德承皇天之命受太后之詔居攝踐祚奉漢大宗之後上有天地社稷之重下有元元萬機之憂不得顧其私親故太皇太后建厥元孫俾侯新都為哀侯後明攝皇帝與尊者為體承宗廟之祭奉共養太皇大后不得服其私親也周禮曰王為諸侯緦縗弁而加環絰同姓則麻異姓則葛攝皇帝當為功顯君緦縗弁而加麻環絰如天子弔諸侯服以應聖制莽遂行焉凡壹弔再會而令新都侯宗為主服喪三年云司威陳崇奏衍功侯光私報執金吾竇況令殺人況為收繫致其法莽大怒切責光光母曰女自眡孰與長孫中孫遂母子自殺及況皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉令光子嘉嗣爵為侯莽下書曰遏密之義訖于季冬正月郊祀八音當奏王公卿士樂凡幾等五聲八音條各云何其與所部儒生各盡精思悉陳其義是歲廣饒侯劉京車騎將軍千人扈雲大保屬臧鴻奏符命京言齊郡新井雲言巴郡石牛鴻言扶風雍石莽皆迎受十一月甲子莽上奏太后曰陛下至聖遭家不造遇漢十二世三七之阸承天威命詔臣莽居攝受孺子之託任天下之寄臣莽兢兢業業懼於不稱宗室廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井入地且百尺十一月壬子直建冬至巴郡石牛戊午雍石文皆到于未央宮之前殿臣與太保安陽侯舜等視天風起塵冥風止得銅符帛圖於石前文曰天告帝符獻者封侯承天命用神令騎都尉崔發等眡說及前孝哀皇帝建平二年六月甲子下詔書更為太初元將元年案其本事甘忠可夏賀良讖書臧蘭臺臣莽以為元將元年者大將居攝改元之文也於今信矣尚書康誥王若曰孟侯朕其弟小子封此周公居攝稱王之文也春秋隱公不言即位攝也此二經周公孔子所定蓋為後法孔子曰畏天命畏大人畏聖人之言臣莽敢不承用臣請共事神祇宗廟奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為初始元年漏劾以百二十為度用應天命臣莽夙夜養育隆就孺子令與周之成王比德宣明太皇太后威德於萬方期於富而教之孺子加元服復子明辟如周公故事奏可眾庶知其奉符命指意群臣博議別奏以視即真之漸矣期門郎張充等六人謀共劫莽立楚王發覺誅死梓潼人哀章學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝行璽某傳予黃帝金策書某者高皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名凡為十一人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黃衣持匱至高廟以付僕射僕射以聞戊辰莽至高廟拜受金匱神嬗御王冠謁太后還坐未央宮前殿下書曰予以不德託于皇初祖, WYG: ''}
