  - {type: variant, offset: 23, length: 0, content: '', WYG: 所居至武帝時魏其侯竇嬰為丞相後誅孝景薄皇后孝文薄太后家女也景帝為太子時薄太后取以為太子妃景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢廢後四年薨葬長安城東平望亭南孝景王皇后武帝母也}
