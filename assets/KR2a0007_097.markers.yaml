  - {type: variant, offset: 6967, length: 1508, content: 公也功顯君戶止身不傳襃新賞都兩國合三千戶甚少矣忠臣之節亦宜自屈而信主上之義宜遣大司徒大司空持節承制詔公亟入眡事詔尚書勿復受公之讓奏奏可莽乃起眡事上書言臣以元壽二年六月戊午倉卒之夜以新都侯引入未央宮庚申拜為大司馬充三公位元始元年正月丙辰拜為太傅賜號安漢公備四輔官今年四月甲子復拜為宰衡位上公臣莽伏自惟爵為新都侯號為安漢公官為宰衡太傅大司馬爵貴號尊官重一身蒙大寵者五誠非鄙臣所能堪據元始三年天下歲已復官屬宜皆置穀梁傳曰天子之宰通于四海臣愚以為宰衡官以正百僚平海內為職而無印信名實不副臣莽無兼官之材今聖朝既過誤而用之臣請御史刻宰衡印章曰宰衡太傅大司馬印成授臣莽上太傅與大司馬之印太后詔曰可韍如相國朕親臨授焉莽乃復以所益納徵錢千萬遺與長樂長御奉共養者太保舜奏言天下聞公不受千乘之土辭萬金之幣散財施予千萬數莫不鄉化蜀郡男子路建等輟訟慚怍而退雖文王卻虞芮何以加宜報告天下奏可宰衡出從大車前後各十乘直事尚書郎侍御史謁者中黃門期門羽林宰衡常持節所止謁者代持之宰衡掾史秩六百石三公稱敢言之是歲莽奏起明堂辟雍靈臺為學者築舍萬區作市常滿倉制度甚盛立樂經益博士員經各五人徵天下通一藝教授十一人以上及有逸禮古書毛詩周官爾雅天文圖讖鍾律月令兵法史篇文字通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記說廷中將令正乖繆壹異說云群臣奏言昔周公奉繼體之嗣據上公之尊然猶七年制度乃定夫明堂辟雍墮廢千載莫能興今安漢公起于第家輔翼陛下四年于茲功德爛然公以八月載生魄庚子奉使朝用書臨賦營築越若翊辛丑諸生庶民大和會十萬眾並集平作二旬大功畢成唐虞發舉成周造業誠亡以加宰衡位宜在諸侯王上賜以束帛加璧大國乘車安車各一驪馬二駟詔曰可其議九錫之法冬大風吹長安城東門屋瓦且盡五年正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢封孝宣曾孫信等三十六人為列侯餘皆益戶賜爵金帛之賞各有數是時吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞於安漢公於是莽上書曰臣以外屬越次備位未能奉稱伏念聖德純茂承天當古制禮以治民作樂以移風四海奔走百蠻並轃辭去之日莫不隕涕非有款誠豈可虛致自諸侯王已下至於吏民咸知臣莽上與陛下有葭莩之故又得典職每歸功列德者輒以臣莽為餘言臣見諸侯面言事於前者未嘗不流汗而慚愧也雖性愚鄙至誠自知德薄位尊力少任大夙夜悼栗常恐污辱聖朝今天下治平風俗齊同百蠻率服皆陛下聖德所自躬親太師光太保舜等輔政佐治群卿大夫莫不忠良故能以五年之間至致此焉臣莽實無奇策異謀奉承太后聖詔宣之于下不能得什一受群賢之籌畫而上以聞不能得什伍當被無益之辜所以敢且保首領須臾者誠上休陛下餘光而下依群公之故也陛下不忍眾言輒下其章於議者臣莽前欲立奏止恐其遂不肯止今大禮已行助祭者畢辭不勝至願願諸章下議者皆寢勿上使臣莽得盡力畢制禮作樂事事成以傳示天下與海內平之即有所間非則臣莽當被詿上誤朝之罪如無他譴得全命賜骸骨歸家避賢者路是臣之私願也惟陛下哀憐財幸甄邯等白太后詔曰可唯公功德光於天下是以諸侯王公列侯宗室諸生吏民翕然同辭連守闕庭故下其章諸侯宗室辭去之日復見前重陳雖曉喻罷遣猶不肯去告以孟夏將行厥賞莫不驩悅稱萬歲而退今公每見輒流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聽公制作畢成群公以聞究于前議其九錫禮儀亟奏於是公卿大夫博士議郎列侯張純等九百二人皆曰聖帝明王招賢勸能德盛者位高功大者賞厚故宗臣有九命上公之尊則有九錫登等之寵今九族親睦百姓既章萬國和協黎民時雍聖瑞畢溱太平已洽帝者之盛莫隆於唐虞而陛下任之忠臣茂功莫著於伊周而宰衡配之所謂異時而興如合符者也謹以六藝通義經文所見周官禮記宜於今者為九命之錫臣請命錫奏可策曰惟元始五年五月庚寅太, WYG: ''}
