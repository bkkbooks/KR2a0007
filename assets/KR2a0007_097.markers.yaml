  - {type: variant, offset: 4280, length: 0, content: '', krp: 自隨也不應禮禮有改葬請發共王母及丁姬冢取其璽綬消滅徙共王母及丁姬歸}
  - {type: variant, offset: 4281, length: 4, content: 大綱建白, WYG: 陶葬共王冢次而葬丁姬復其故師古曰復音扶目反太后以為旣已之事不須復發莽固爭之太后詔曰因故棺為致椁作冢師古曰致謂累也祠以太牢謁者護旣發傅太后冢崩壓殺數百人開丁姬椁户火出炎四五丈師古曰炎音弋贍反吏卒以水沃滅廼得入燒燔椁中器物莽復奏言前共王母生僭居桂宫皇天震怒災其正殿丁姬死葬踰制度今火焚其椁此天見變以告當改如媵妾也臣前奏請葬丁姬復故非是師古曰言尚太優僭也共王母及丁姬棺皆名梓宫珠玉之衣非藩妾服請更以木棺代去珠玉衣葬丁姬媵妾之次奏可旣開傅太后棺臭聞數里公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平共王母丁姬故冢二旬間皆平莽又周棘其處以為世戒云師古曰以棘周繞也時有羣燕數千銜土投丁姬穿中師古曰穿謂壙中也丁傅旣敗孔鄉侯晏將家屬徙合浦宗族皆歸故郡唯高武侯喜得全自有𫝊孝哀傅皇后}
