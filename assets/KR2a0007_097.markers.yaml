  - {type: variant, offset: 183, length: 6, content: 叔父成都侯商, WYG: 衣也糲粗米也師古曰言在家時野賤也加以幼稚愚惑不眀義理幸得免離茅屋之下備後宫埽除蒙過誤之􅃂居非命所當託洿穢不脩曠職尸官師古曰洿與汙同曠空也尸主也妄主其官數逆至法踰越制度當伏放流之誅不足以塞責廼壬寅日大長秋受詔椒房儀制御服輿駕所發諸官署及所造作遺賜外家羣臣妾師古曰外家謂后之家族言在外也皆如竟寧以前故事妾伏自念入椒房以來遺賜外家未嘗踰故事每輒决}
