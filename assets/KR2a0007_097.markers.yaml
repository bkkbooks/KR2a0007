  - {type: variant, offset: 30, length: 0, content: '', krp: 為平臺侯及高子丹以功徳封武陽侯侯者凡四人高至大司馬車騎將軍丹左將軍自有傳史皇孫王夫人宣帝母也名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆坐誅莫有收葬者唯宣帝得全即尊位後追尊母王夫人諡曰悼后祖母史良娣曰戾后皆改葬起園邑長丞奉守語在戾太子傳地節三年求得外祖母王媼媪男無故無故弟武皆隨使者詣闕時乗黄牛車故百姓謂之黄牛嫗初上即位數遣使者求外家久逺多似類而非是既得王媼令太中大夫任宣與丞相御史屬雜考問鄉里識知者皆曰王嫗嫗言名妄人家本涿郡蠡吾平鄉年十四嫁為同鄉王更得妻更得死嫁為廣望王廼始婦師古曰廣望亦涿郡之縣産子男無故武女翁須翁須年八九歳時寄居廣望節侯子劉仲卿宅仲卿謂廼始曰予我翁須自養長之媼為翁須作縑單衣師古曰縑即今之絹也音兼送仲卿家仲卿教翁須歌舞徃來歸取冬夏衣居四五歲翁須來言邯鄲賈長兒求歌舞者仲卿欲以我與之媼即與翁須逃走之平鄉師古曰之徃也仲卿載廼始共求媼媼惶急將翁須歸曰兒居君家非受一錢也師古曰言未嘗得其聘幣奈何欲予它人仲卿詐曰不也後數日翁須乗長兒車馬過門呼曰我果見行當之柳宿蘇林曰聚邑名也在中山盧奴東北三十里媼與廼始之柳宿見翁須相對涕泣謂曰我欲為汝自言師古曰言自訟理不肯行翁須曰母置之師古曰置之猶言任聽之不須自言何家不可以居師古曰言所去處皆可安居自言無益也媼與廼始還求錢用隨逐至中山盧奴見翁須與歌舞等比五人同處師古曰比音必寐反媼與翁須共宿明日廼始留視翁須媼還求錢欲隨至邯鄲媼歸糶買未具廼始來歸曰翁須已去我無錢用隨也因絶至今不聞其問賈長兒妻貞及從者師遂辭師古曰辭對辭徃二十歲太子舍人侯明從長安來求歌舞者請翁須等五人長兒使遂送至長安皆入太子家及廣望三老更始劉仲卿妻其等四十五人辭皆驗師古曰其者仲卿妻之名宣奏王媼悼后母明白上皆召見賜無故武爵關内侯旬月間賞賜以鉅萬計頃之制詔御史賜外祖母號為博平君以博平蠡吾兩縣戸萬一千為湯沐邑封舅無故為平昌侯武為樂昌侯食邑各六千户初廼始以本始四年病死後三歲家廼富貴追賜諡曰思}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 侯詔涿郡治冢室置園邑四百家長丞􅆢守如法歲餘博平君薨諡曰思成夫人詔徙思成侯合葬􅆢明顧成廟南置園邑長丞師古曰本號廣明故戾太子傳云皇孫及王夫人皆葬廣明其後以置園邑􅆢守改曰奉明罷􅃰郡思成園王氏侯者二人無故子接為大司馬車騎將軍而武子商至丞相自有傳孝宣許皇后元帝母也父廣漢昌邑人少時為昌邑王郎從武帝上甘泉誤取它郎鞍以被其馬發覺吏劾從行而盜當死有詔募下蠶室孟康曰死罪囚欲就宫者聽之後為宦者丞上官桀謀反時廣漢部索師古曰部分捜索罪人也索音山客反其殿中廬有索長數尺可以縳人者數千枚滿一篋緘封師古曰殿中廬桀所止宿廬舍在宫中者也緘束篋也音工咸反廣漢索不得它吏徃得之師古曰須得此繩索者用為桀之反具廣漢坐論為鬼薪輸掖庭後為暴室嗇夫時宣帝養於掖庭號皇曾孫與廣漢同寺居時掖庭令張賀本衞太子家吏及太子敗賀坐下刑以舊恩養視皇曾孫甚厚及曾孫壮大賀欲以女孫妻之是時昭帝始冠長八尺二寸賀弟安}
