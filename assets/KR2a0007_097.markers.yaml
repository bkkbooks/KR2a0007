  - {type: variant, offset: 11367, length: 1446, content: 豬崇宮室令如古制及崇社宜如亳社以賜諸侯用永監戒願下四輔公卿大夫議以明好惡視四方於是莽大說公卿曰皆宜如嘉言莽白太后下詔曰惟嘉父子兄弟雖與崇有屬不敢阿私或見萌牙相率告之及其禍成同共讎之應合古制忠孝著焉其以杜衍戶千封嘉為帥禮侯嘉子七人皆賜爵關內侯後又封竦為淑德侯長安為之語曰欲求封過張伯松力戰鬭不如巧為奏莽又封南陽吏民有功者百餘人汙池劉崇室宅後謀反者皆汙池云群臣復白劉崇等謀逆者以莽權輕也宜尊重以填海內五月甲辰太后詔莽朝見太后稱假皇帝冬十月丙辰朔日有食之十二月群臣奏請益安漢公宮及家吏置率更令廟廄廚長丞中庶子虎賁以下百餘人又置衛士三百人安漢公盧為攝省府為攝殿第為攝宮奏可莽白太后下詔曰故太師光雖前薨功效已列太保舜大司空豐輕車將軍邯步兵將軍建皆為誘進單于籌策又典靈臺明堂辟雍四郊定制度開子午道與宰衡同心說德合意并力功德茂著封舜子匡為同心侯林為說德侯光孫壽為合意侯豐孫匡為并力侯益邯建各三千戶是歲西羌龐恬傅幡等怨莽奪其地作西海郡反攻西海太守程永永奔走莽誅永遣護羌校尉竇況擊之二年春竇況等擊破西羌五月更造貨錯刀一直五千契刀一直五百大錢一直五十與五銖錢並行民多盜鑄者禁列侯以下不得挾黃金輸御府受直然卒不與直九月東郡太守翟義都試勒車騎因發犇命立嚴鄉侯劉信為天子移檄郡國言莽毒殺平帝攝天子位欲絕漢室今共行天罰誅莽郡國疑惑眾十餘萬莽惶懼不能食晝夜抱孺子告禱郊廟放大誥作策遣諫大夫桓譚等班於天下諭以攝位當反政孺子之意遣王邑孫建等八將軍擊義分屯諸關守阸塞槐里男子趙明霍鴻等起兵以和翟義相與謀曰諸將精兵悉東京師空可攻長安眾稍多至且十萬人莽恐遣將軍王奇王級將兵拒之以太保甄邯為大將軍受鉞高廟領天下兵左杖節右把鉞屯城外王舜甄豐晝夜循行殿中十二月王邑等破翟義於圉司威陳崇使監軍上書言陛下奉天洪範心合寶龜膺受元命豫知成敗咸應兆占是謂配天配天之主慮則移氣言則動物施則成化臣崇伏讀詔書下日竊計其時聖思始發而反虜仍破詔文始書反虜大敗制書始下反虜畢斬眾將未及齊其鋒芒崇未及盡其愚慮而事已決矣莽大說制書始下反虜畢斬眾將未及齊其鋒芒臣崇未及盡其愚慮而事已決矣莽大說三年春地震大赦天下王邑等還京師西與王級等合擊明鴻皆破滅語在翟義傳莽大置酒未央宮白虎殿勞賜將帥詔陳崇治校軍功第其高下莽乃上奏曰明聖之世國多賢人故唐虞之時可比屋而封至功成事就則加賞焉至於夏后塗山之會執玉帛者萬國諸侯執玉附庸執帛周武王孟津之上尚有八百諸侯周公居攝郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭蓋諸侯千八百矣禮記王制千七百餘國是以孔子著孝經曰不敢遺小國之臣而況於公侯伯子男乎故得萬國之歡心以事其先王此天子之孝也秦為亡道殘滅諸侯以為郡縣欲擅天下之利故二世而亡高皇帝受命除殘考功施賞建國數百後稍衰微其餘僅存太皇太后躬統大綱廣封功德以勸善興滅繼絕以永世是以大化流通旦暮且成遭羌寇害西海郡反虜流言東郡逆賊惑眾西土忠臣孝子莫不奮怒所征殄滅盡備厥辜天下咸寧今制禮作樂實考周爵五等地四等有明文殷爵三等有其說無其文孔子曰周監於二代郁郁乎文哉吾從周臣請諸將帥當受爵邑者爵五等地四等奏可於是封者高為侯伯次為子男當賜爵關內侯者更名曰附城凡數百人擊西海者以羌為號槐里以武為號翟義以虜為號群臣復奏言太后修功錄德遠者千載近者當世或以文封或以武爵深淺大小靡不畢舉今攝皇帝背依踐祚宜異於宰國之時制作雖未畢已宜進二子爵皆為公春秋善善及子孫賢者之後宜有土地成王廣封周公庶子六人皆有茅土及漢家名相大將蕭霍之屬咸及支庶兄子光可先封為列侯諸孫制度畢已大司徒大司空上名如前詔書太后詔曰進攝皇帝子襃, WYG: ''}
