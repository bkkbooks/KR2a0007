  - {type: variant, offset: 509, length: 0, content: '', krp: 謀殘滅繼嗣以危宗廟誖天犯祖師古曰誖違也祖先帝也無為天下母之義貶皇太后為孝成皇后晉灼曰使哀帝不母罪之也徙居北宫後月餘復下詔曰皇后自知罪惡深大朝請希闊師古曰請謁也闊猶闕也失婦道無共養之禮而有狼虎之毒師古曰共讀曰恭音居用反養音弋向反其下並同宗室所怨海内之讎也而尚在小君之位誠非皇天之心夫小不忍亂大謀恩之所不能已者義之所割也師古曰言以義割恩也今廢皇后為庻人就其園是日自殺凡立十六年而誅先是有童謡曰燕燕尾涎涎師古曰涎涎光澤之貌也音徒見反張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢成帝每微行出常與張放俱而稱富平侯家故曰張公子倉琅根宫門銅鍰也師古曰鍰讀與環同孝元傅昭儀哀帝祖母也父河内温人蚤卒母更嫁為魏郡鄭翁妻生男惲昭儀少為上官太后才人自元帝為太子得進幸元帝即位立為倢伃甚有寵為人有材畧善事人下至宫人左右飲酒酹地皆祝延之師古曰酹以酒沃地也祝延祝之使}
