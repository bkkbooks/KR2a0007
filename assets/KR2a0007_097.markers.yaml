  - {type: variant, offset: 8555, length: 768, content: 正故定陶共王母之僭坐自是之後朝臣論議靡不據經以病辭位歸于第家為賊臣所陷就國之後孝哀皇帝覺寤復還公長安臨病加劇猶不忘公復特進位是夜倉卒國無儲主姦臣充朝危殆甚矣朕惟定國之計莫宜于公引納于朝即日罷退高安侯董賢轉漏之間忠策輒建綱紀咸張綏和元壽再遭大行萬事畢舉禍亂不作輔朕五年人倫之本正天地之位定欽承神祇經緯四時復千載之廢矯百世之失天下和會大眾方輯詩之靈臺書之作雒鎬京之制商邑之度於今復興昭章先帝之元功明著祖宗之令德推顯嚴父配天之義修立郊禘宗祀之禮以光大孝是以四海雍雍萬國慕義蠻夷殊俗不召自至漸化端冕奉珍助祭尋舊本道遵術重古動而有成事得厥中至德要道通於神明祖考嘉享光耀顯章天符仍臻元氣大同麟鳳龜龍眾祥之瑞七百有餘遂制禮作樂有綏靖宗廟社稷之大勳普天之下惟公是賴官在宰衡位為上公今加九命之錫其以助祭共文武之職乃遂及厥祖於戲豈不休哉於是莽稽首再拜受綠韍袞冕衣裳瑒琫瑒珌句履鸞路乘馬龍旂九旒皮弁素積戎路乘馬彤弓矢盧弓矢左建朱鉞右建朱鉞右建金戚甲冑一具秬鬯二卣主瓚二九命青玉珪二朱戶納陛署宗官祝官卜官史官虎賁三百人家令丞各一人宗祝卜史官皆置嗇夫佐安漢公在中府外第虎賁為門衛當出入者傅籍自四輔三公有事府第皆用傳以楚王邸為安漢公第大繕治通周衛祖禰廟及寢皆為朱戶納陛陳崇又奏安漢公祠祖禰出城門城門校尉宜將騎士從入有門衛出有騎士所以重國也奏可其秋莽以皇后有子孫瑞通子午道子午道從杜陵直絕南山徑漢中風俗使者八人還言天下風俗齊同詐為郡國造歌謠頌功德凡三萬言莽奏定著令又奏為市無二賈官無獄訟邑無盜賊野無飢民道不拾遣男女異路之制犯者象刑劉歆陳崇等十二人皆以治明堂宣教化封為列侯莽既致太平北化匈奴東致海外南懷黃支唯西方未有加乃遣中郎將平憲等多持金幣誘塞外羌使獻地願內屬憲等奏言羌豪良願等種人口可萬二千人願為內臣獻鮮水海允谷鹽池平地美草皆予漢民自居險阻處為藩蔽問良願降意對曰太, WYG: ''}
