  - {type: variant, offset: 10097, length: 1269, content: 與周公異世同符今前輝光囂武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也夫有法成易非聖人者亡法其令安漢公居攝踐祚如周公故事以武功縣為安漢公采地名曰漢光邑具禮儀奏於是群臣奏言太后聖德昭然深見天意詔令安漢公居攝臣聞周成王幼少周道未成成王不能共事天地修文武之烈周公權而居攝則周道成王室安不居攝則恐周隊失天命書曰我嗣事子孫大不克共上下遏失前人光在家不知命不易天應棐諶乃亡隊命說曰周公服天子之冕南面而朝群臣發號施令常稱王命召公賢人不知聖人之意故不說也禮明堂記曰周公朝諸侯於明堂天子負斧依南面而立謂周公踐天子位六年朝諸侯制禮作樂而天下大服也召公不說時武王崩縗麤未除由是言之周公始攝則居天子之位非乃六年而踐阼也書逸嘉禾篇曰周公奉鬯立于阼階延登贊曰假王莅政勤和天下此周公攝政贊者所稱成王加元服周公則致政書曰朕復子明辟周公常稱王命專行不報故言我復子明君也臣請安漢公居攝踐祚服天子韍冕背斧依于戶牖之間南面朝群臣聽政事車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭群神贊曰假皇帝民臣謂之攝皇帝自稱曰予平決朝事常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義隆治平之化其朝見太皇太后帝皇后皆復臣節自施政教於其宮家國采如諸侯禮儀故事臣昧死請太后詔曰可明年改元曰居攝居攝元年正月莽祀上帝於南郊迎春於東郊行大射禮於明堂養三老五更成禮而去置柱下五史秩如御史聽政事侍旁記疏言行三月己丑立宣帝玄孫嬰為皇太子號曰孺子以王舜為太傅左輔甄豐為太阿右拂甄邯為太保後承又置四少秩皆二千石四月安眾侯劉崇與相張紹謀曰安漢公莽專制朝政必危劉氏天下非之音乃莫敢先舉此宗室恥也吾帥宗族為先海內必和紹等從者百餘人遂進攻宛不得入而敗紹者張竦之從兄也竦與崇族父劉喜詣闕自歸莽赦弗罪竦因為嘉作奏曰建平元壽之間大統幾絕宗室幾棄賴蒙陛下聖德扶服振救遮扞匡衛國命復延宗室明目臨朝統政發號施令動以宗室為始登用九族為先並錄支親建立王侯南面之孤計以百數收復絕屬存亡續廢得比肩首復為人者嬪然成行所以藩漢國輔漢宗也建辟雍立明堂班天法流聖化朝群后昭文德宗室諸侯咸益土地天下喁喁引領而歎頌聲洋洋滿耳而入國家所以服此美膺此名饗此福受此榮者豈非太皇太后日昃之思陛下夕惕之念哉何謂亂則統其理危則致其安禍則引其福絕則繼其統幼則代其任晨夜屑屑寒暑勤勤無時休息孳孳不已者凡以為天下厚劉氏也臣無愚智民無男女皆諭至意而安眾侯崇乃獨懷悖惑之心操畔逆之慮興兵動眾欲危宗廟惡不忍聞罪不容誅誠臣子之仇宗室之讎國家之賊天下之害也是故親屬震落而告其罪民人潰畔而棄其兵進不跬步退伏其殃百歲之母孩提之子同時斷斬懸頭竿杪珠珥在耳首飾猶存為計若此豈不誖哉臣聞古者畔逆之國既以誅討則豬其宮室以為汙池納垢濁焉名曰凶虛雖生菜茹而人不食四牆其社覆上棧下示不得通辨社諸侯出門見之著以為戒方今天下聞崇之反也咸欲騫衣手劍而叱之其先至者則拂其頸衡其匈刃其軀切其肌後至者欲撥其門仆其牆夷其屋焚其器應聲滌地則時成創而宗室尤甚言必切齒焉何則以其背畔恩義而不知重德之所在也宗室所居或遠嘉幸得先聞不勝憤憤之願願為宗室倡始父子兄弟負籠荷鍤馳之南, WYG: ''}
