  - {type: variant, offset: 4824, length: 916, content: 家之統揖大福之恩事事謙退動而固辭書曰舜讓于德不嗣公之謂矣自公受策以至于今斖斖翼翼日新其德增修雅素以命下國俊儉隆約以矯世俗割財損家以帥群下彌躬執平以逮公卿教子尊學以隆國化僮奴衣布馬不秼穀食飲之用不過凡庶詩云溫溫恭人如集于木孔子曰食無求飽居無求安公之謂矣克身自約糴食逮給物物卬市日闋亡儲又上書歸孝哀皇帝所益封邑入錢獻田殫盡舊業為眾倡始於是大小鄉和承風從化外則王公列侯內則帷幄侍御翕然同時各竭所有或入金錢或獻田畝以振貧窮收贍不足者昔令尹子文朝不及夕魯公儀子不茹園葵公之謂矣開門延士下及白屋婁省朝政綜管眾治親見牧守以下考迹雅素審知白黑詩云夙夜匪解以事一人易曰終日乾乾夕惕若厲公之謂矣比三世為三公再奉送大行秉冢宰職填安國家四海輻湊靡不得所書曰納于大麓列風雷雨不迷公之謂矣此皆上世之所鮮禹稷之所難而公包其終始一以貫之可謂備矣是以三年之間化行如神嘉瑞疊累豈非陛下知人之效得賢之致哉故非獨君之受命也臣之生亦不虛矣是以伯禹錫玄圭周公受郊祀蓋以達天之使不敢擅天之功也揆公德行為天下紀觀公功勳為萬世基基成而賞不配紀立而襃不副誠非所以厚國家順天心也高皇帝襃賞元功相國蕭何邑戶既倍又蒙殊禮奏事不名入殿不趨封其親屬十有餘人樂善無厭班賞亡遴苟有一策即必爵之是故公孫戎位在充郎選繇旄頭壹明樊噲封二千戶孝文皇帝襃賞絳侯益封萬戶賜黃金五千斤孝武皇帝卹錄軍功裂三萬戶以封衛青青子三人或在繈褓皆為通侯孝宣皇帝顯著霍光增戶命疇封者三人延及兄孫夫絳侯即因漢藩之固杖朱虛之鯁依諸將之遞據相扶之勢其事雖醜要不能遂霍光即席常任之重乘大勝之威未嘗遭時不行陷假離朝朝之執事亡非同類割斷歷久統政曠世雖曰有功所因亦易然猶有計策不審過徵之累及至青戎摽末之功一言之勞然猶皆蒙丘山之賞課功絳霍造之與因也比於青戎地之與天也而公又有宰治之效乃當上與伯禹周公等盛齊隆兼其襃賞豈特與若云者同日而論哉然曾不得蒙青等之厚臣誠惑之臣聞功亡原者賞不限德亡首者襃不檢是故成王之於周公也度百里之限越九錫之檢開七百里之宇兼商奄之民賜以附庸殷民六族大路大旂封父之繁弱夏后之璜祝宗卜史備物典策官司彝器白牡之牲效望之禮王曰叔父建爾元子子父俱延拜而受之可謂不檢亡原者矣非特止此六子皆封詩曰亡言不讎亡德不報報當如之不如非報也近觀, WYG: 權懲丁傅}
