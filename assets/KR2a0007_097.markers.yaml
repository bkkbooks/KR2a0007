  - {type: variant, offset: 196, length: 2, content: 封莽, WYG: 自􅆢養亦小發取其中何害於誼而不可哉又詔書言服御所造皆如竟寧前吏誠不能揆其意即且令妾被服所爲不得不如前師古曰詔書夲云奢儉之制如竟寧耳而吏乃謂衣服處置一一如之也被音皮義反設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣師古曰言或有所求吏不肯備因云詔書不許也此二事誠不可行唯陛下省察宦吏忮佷必欲自勝師古曰宦吏奄人為皇后吏也忮堅也忮音之豉反幸妾尚貴時猶以不急事操人師古曰尚貴時謂昔被寵遇之時也操持也音千高反次下亦同况今日日益侵又獲此詔其操約人豈有所訴陛下見妾在椒房終不肯給妾纖微師古曰言皇后自有湯沐故更無它纎毫給賜内邪若不私府小取将安所仰乎師古曰内邪言内中所須者也邪語辭也仰音牛向反舊故中宫乃私奪左右之賤繒}
  - {type: page-break, offset: 196, content: '', id: KR2a0007_WYG_097-38a, image: WYG0251/WYG0251-0199a.png}
  - {type: variant, offset: 196, length: 2, content: 封莽, krp: 自奉養亦小發取其中何害於誼而不可哉又詔書言服御所造皆如竟寧前吏誠不能揆其意即且令妾被服所爲不得不如前師古曰詔書夲云奢儉之制如竟寧耳而吏乃謂衣服處置一一如之也被音皮義反設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣師古曰言或有所求吏不肯備因云詔書不許也此二事誠不可行唯陛下省察宦吏忮佷必欲自勝師古曰宦吏奄人為皇后吏也忮堅也忮音之豉反幸妾尚貴時猶以不急事操人師古曰尚貴時謂昔被寵遇之時也操持也音千高反次下亦同况今日日益侵又獲此詔其操約人豈有所訴陛下見妾在椒房終不肯給妾纖微師古曰言皇后自有湯沐故更無它纎毫給賜内邪若不私府小取将安所仰乎師古曰内邪言内中所須者也邪語辭也仰音牛向反舊故中宫乃私奪左右之賤繒}
  - {type: punctuation, offset: 198, content: ，, id: KR2a0007_tls_097-bkkpn44}
  - {type: 'tls:seg', offset: 198, content: '', id: KR2a0007_tls_097-2a.5}
  - {type: variant, offset: 199, length: 2, content: 長樂, WYG: 發乘輿服繒言爲待詔補已而貿易其中師古曰託言此繒擬待别詔有所𥙷浣而私換易取其好者以自用左右多竊怨者甚恥為之又故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記師古曰甫始也直豫言使后知之非可復若私府有所取也師古曰若謂如未奉詔之前也其萌芽所以約制妾者恐失人理師古曰萌芽言其初始發意若草木之方生也今但損車駕及毋若未央宫有所發遺賜衣服如故事則可矣師古曰言今止當减損車馬制度及不得同未央宫輒有發取妄遺賜人於事則可而后之衣服自當如舊也其餘誠太廹急奈何妾薄命端遇竟寧前師古曰端正也言不得以它時為比例而正依竟寧前也竟寧前於今世而比之豈可邪師古曰言今時國家制度衆事比竟寜前不肯皆同也故時酒肉有所賜外家輒上表廼决又故杜陵梁美人嵗時遺酒一石肉百斤耳蘇林曰宣帝美人也妾甚}
  - {type: page-break, offset: 199, content: '', id: KR2a0007_WYG_097-38b, image: WYG0251/WYG0251-0199b.png}
  - {type: page-break, offset: 199, content: '', id: KR2a0007_WYG_097-39a, image: WYG0251/WYG0251-0199c.png}
  - {type: variant, offset: 199, length: 2, content: 長樂, krp: 發乘輿服繒言爲待詔補已而貿易其中師古曰託言此繒擬待别詔有所𥙷浣而私換易取其好者以自用左右多竊怨者甚恥為之又故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記師古曰甫始也直豫言使后知之非可復若私府有所取也師古曰若謂如未奉詔之前也其萌芽所以約制妾者恐失人理師古曰萌芽言其初始發意若草木之方生也今但損車駕及毋若未央宫有所發遺賜衣服如故事則可矣師古曰言今止當减損車馬制度及不得同未央宫輒有發取妄遺賜人於事則可而后之衣服自當如舊也其餘誠太廹急奈何妾薄命端遇竟寧前師古曰端正也言不得以它時為比例而正依竟寧前也竟寧前於今世而比之豈可邪師古曰言今時國家制度衆事比竟寜前不肯皆同也故時酒肉有所賜外家輒上表廼决又故杜陵梁美人嵗時遺酒一石肉百斤耳蘇林曰宣帝美人也妾甚}
  - {type: variant, offset: 202, length: 4, content: 府戴崇侍, WYG: 之遺田八子誠不可若是帥古曰當多於梁美人也事率衆多不可勝以文陳師古曰率猶計也類也言以文書陳之不可勝盡俟自見索言之師古曰自見后自見於天子也索盡也唯陛下深察焉上於是采劉向谷永之言以報曰皇帝問皇后所言事聞之夫日者衆陽之宗天光之貴王者之象人君之位也夫以隂而侵陽虧其正體是非下陵上妻乘夫賤踰貴之變與春秋二百四十二年變異為衆莫若日蝕大自漢興日蝕亦爲呂霍之屬見以今揆之豈有此等之效與諸侯拘迫漢制牧相執持之也師古曰牧州牧也相諸侯王相也又安獲齊趙七國之難將相大臣褢誠秉忠唯義是從師古曰褢古懷字又惡有上官博陸宣成之謀師古曰上官上官桀安也博陸博陸侯霍禹也宣成宣成侯夫人顯也惡音烏若乃徒歩豪桀非有陳勝項梁之羣也匈奴夷狄非有冒頓郅支之倫也方外内鄉百蠻賔服師古曰鄉讀曰嚮内嚮皆嚮}
  - {type: page-break, offset: 202, content: '', id: KR2a0007_WYG_097-39b, image: WYG0251/WYG0251-0199d.png}
