  - {type: variant, offset: 4026, length: 0, content: '', WYG: 廪食師古曰給以食令代關東戌卒乗北邉亭塞候望師古曰乗登也又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦禹又言孝文皇帝時貴廉絜賤貪汙賈人贅壻及吏坐臧者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅師古曰白明也疑者以與民師古曰罪疑從輕也亡贖罪之法故令行禁止海内大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲師古曰從讀曰縱耆讀曰嗜用度不足乃行壹切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盗賊並起亡命者衆郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職師古曰上府謂所屬之府右職髙職也姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位師古曰操持也切刻也操音千髙反劉攽曰百姓下多者字宋祁曰去者字故亡義}
