  - {type: variant, offset: 1361, length: 1, content: 成, WYG: 到即位二十餘日以行淫亂廢昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡師古曰道讀曰導皆下獄誅唯吉與郎中令龔遂以忠直數諫正得減死髠為城旦起家復為益州刺史病去官復徴為博士諌大夫是時宣帝頗修武帝故事宫室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務将興太平詔書毎下民欣然若更生臣伏而思}
  - {type: page-break, offset: 1361, content: '', id: KR2a0007_WYG_072-8a, image: WYG0250/WYG0250-0506a.png}
