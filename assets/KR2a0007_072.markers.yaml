  - {type: variant, offset: 37, length: 0, content: '', WYG: 云匪風發兮匪車揭兮顧瞻周道中心􅜢兮師古曰檜國匪風之篇發發飄風貌揭揭疾驅貌􅜢古怛字傷也言見此飄風及疾驅則顧念哀傷思周道也掲音丘列反宋祁曰注文怛字下疑有怛字説曰是非古之風也發發者是非古之車也揭揭者盖傷之也師古曰今之發發然者非古有道之風也今之揭揭然者非古有道之車也故傷之劉攽曰按文及注當云發發者是非古之風也揭揭者是非古之車也􅜢􅜢者盖傷之也今皆誤矣陽夏公云倒文取新古盖多如此不為誤今者大王幸方與師古曰縣名也音房預宋祁曰注文音字上當有方與曽不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也師古曰數音所角反宋祁曰一本無也字昔召公述職師古曰召讀曰邵邵公名奭自陜以西邵公主之當民}
  - {type: page-break, offset: 37, content: '', id: KR2a0007_WYG_072-5a, image: WYG0250/WYG0250-0504c.png}
