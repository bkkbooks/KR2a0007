  - {type: variant, offset: 1378, length: 0, content: '', WYG: 省尚方師古曰尚方主巧作明視天下以儉師古曰視讀曰示古者工不造琱瑑商不通侈靡師古曰瑑者刻鏤為文瑑音篆非工商之獨賢政教使之然也民見儉則歸本本立而末成其指如此上以其言迂闊不甚寵異也師古曰迂逺也音于吉遂謝病歸琅邪始吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉師古曰啖謂使食之音徒濫反啖亦㗖字耳此義與髙紀㗖以利同吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還其厲志如此吉與貢禹為友世稱王陽在位貢公彈冠師古曰彈冠者言入仕也言其取舍同也師古曰取進趣也舍止息也元帝初即位遣使者徴貢禹與吉吉年老道病卒上悼之復遣使者弔祠云初吉兼通五經能為騶氏春秋以詩論語教授好梁丘賀説易令子駿受焉駿以孝廉為郎左曹陳咸薦駿賢父子經明行修宜顯以厲俗光禄勲匡衡亦舉駿有專對材師古曰專對謂見問即對無所疑也論語稱孔子曰使於四方不能專對雖多亦奚以為遷諫大夫使責淮陽憲王師古曰以其有口辭遷趙内史吉坐昌邑王被刑後戒子孫毋為王國吏故駿道病免官歸起家復為幽州刺史遷司𨽻校尉奏免}
