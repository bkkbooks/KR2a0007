  - {type: variant, offset: 4144, length: 396, content: 臣體不敬請逮捕弘恭石顯等知望之素高節不詘辱建白望之前為將軍輔政欲排退許史專權擅朝幸得不坐復賜爵邑與聞政事不悔過服罪深懷怨望教子上書歸非於上自以託師傅懷終不坐非頗詘望之於牢獄塞其怏怏心則聖朝亡以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必亡所憂上乃可其奏顯等封以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其弟使者至召望之望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲雲者好節士勸望之自裁於是望之卬天歎曰吾嘗備位將相年踰六十矣老入牢獄苟求生活不亦鄙乎字謂雲曰游趣和藥來無久留我死竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃卻食為之涕泣哀慟左右於是召顯等責問以議不詳皆免冠謝良久然後已望之有罪死有司請絕其爵邑有詔加恩長子伋嗣為關內侯天子追念望之不忘每歲時遣使者祠祭望之家終元帝世望之八子至大官者育咸由育字次君少以父任為太子庶子元帝即位為郎病免後, WYG: 結反}
