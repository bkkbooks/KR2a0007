  - {type: variant, offset: 2821, length: 4, content: 詔公卿議, WYG: 之臣也師古曰洿與汚同音一故反自痛去家三千里凡有一子年十二非有在家為臣具棺椁者也誠恐一旦蹎仆氣竭不復自還師古曰蹎音顛蹷躓也仆音赴仆頓也不自還者遂死也還讀曰旋洿席薦於宫室骸骨弃捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里師古曰及身生謂及未死之前死亡所恨天子報曰朕以生有伯夷之廉史魚之直師古曰生謂先生也史魚衛大夫史鰌也論語稱孔子曰直哉史魚邦有道如矢邦無道如矢言}
  - {type: page-break, offset: 2821, content: '', id: KR2a0007_WYG_072-18a, image: WYG0250/WYG0250-0511a.png}
  - {type: variant, offset: 2821, length: 4, content: 詔公卿議, krp: 之臣也師古曰洿與汚同音一故反自痛去家三千里凡有一子年十二非有在家為臣具棺椁者也誠恐一旦蹎仆氣竭不復自還師古曰蹎音顛蹷躓也仆音赴仆頓也不自還者遂死也還讀曰旋洿席薦於宫室骸骨弃捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里師古曰及身生謂及未死之前死亡所恨天子報曰朕以生有伯夷之廉史魚之直師古曰生謂先生也史魚衛大夫史鰌也論語稱孔子曰直哉史魚邦有道如矢邦無道如矢言}
  - {type: variant, offset: 2826, length: 4, content: 儀丞相霸, WYG: 壹志守經據古不阿當世孳孳於民俗之所寡師古曰孳與孜同孜孜不怠也寡少也言少有此人故親近生幾參國政師古曰幾讀曰兾今未得久聞生之竒論也而云欲退意豈有所恨與師古曰與讀曰歟将在位者與生殊乎師古曰言志趣不同往者嘗令金敞語生欲及生時禄生之子既已諭矣今復云子少夫以王命辨䕶生家雖百子何以加傳曰亡懐土師古曰論語孔子曰君子懐徳小人懐土何必思故鄉生其強飯慎疾以自輔後月餘以禹為長信少府㑹}
