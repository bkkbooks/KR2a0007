  - {type: variant, offset: 2834, length: 68, content: 定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截陛下聖德充塞天地光被四表匈奴單于鄉風慕化奉珍朝賀, WYG: 陳萬年卒禹代為御史大夫列於三公}
