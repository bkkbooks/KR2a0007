  - {type: variant, offset: 3312, length: 4, content: 中書政本, WYG: 幣市井勿得販賣師古曰賤買貴賣曰販除其租銖之律師古曰租税之法皆依田畝不得雜計百物之銖兩租税禄賜皆以布帛及穀使百姓壹歸於農復古道便師古曰追遵古法於事便也復音扶目反又言諸離宫及長樂宫衞可減其太半以寛繇役師古曰繇讀曰徭又諸官奴婢十萬餘人戲游亡事税良民以給之歲費五六鉅萬}
