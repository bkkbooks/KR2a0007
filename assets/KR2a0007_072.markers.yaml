  - {type: variant, offset: 1632, length: 174, content: 為職不敢不盡愚望之彊復對曰先帝聖德賢良在位作憲垂法為無窮之規永惟邊竟之不贍故金布令甲曰邊郡數被兵離飢寒夭絕天年父子相失令天下共給其費固為軍旅卒暴之事也聞天漢四年常使死罪人入五十萬錢減死罪一等豪彊吏民請奪假貣至為盜賊以贖罪其後姦邪橫暴群盜並起至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使以興兵擊之誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相, WYG: 㑹}
