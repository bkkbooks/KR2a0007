  - {type: variant, offset: 1862, length: 206, content: 書願以漢外孫元貴靡為嗣得復尚少主結婚內附畔去匈奴詔下公卿議望之以為烏孫絕域信其美言萬里結婚非長策也天不子聽神爵二年遺長羅侯惠使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主敦煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此已事之驗也今少主以元貴靡不得立而還信無負於四夷此中國之大福也少主不止繇役將興其原起此天子從, WYG: 然}
