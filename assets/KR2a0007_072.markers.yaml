  - {type: variant, offset: 3317, length: 705, content: 以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人之義白欲更置士人繇是大與高恭顯忤上初即位謙讓重改作議久不定出劉更生為宗正望之堪數薦名儒茂材以備諫官會稽鄭朋陰欲附望之上疏言車騎將軍高遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門朋奏記望之曰將軍體周召之德秉公綽之質有卞莊之威至乎耳順之年履折衝之位號至將軍誠士之高致也窟穴黎庶莫不懽喜咸曰將軍其人也今將軍規橅云若管晏而休遂行日仄至周召乃留乎若管晏而休則下走將歸延陵之皋修農圃之疇畜雞種黍竢見二子沒齒而已矣如將軍昭然度行積思塞邪枉之險蹊宣中庸之常政興周召之遺業親日仄之兼聽則下走其庶幾願竭區區底厲鋒鍔奉萬分之一望之見納朋接待以意朋數稱述望之短車騎將軍言許史過失後朋行傾邪望之絕不與通朋與大司農史李宮俱待詔堪獨白宮為黃門郎朋楚士怨恨更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之聞之以問弘恭石顯顯恭恐望之自訟下於它吏即挾朋及待詔華龍龍者宣帝時與張子蟜等待詔以行汙濊不進欲入堪等堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀候望之出休日令朋龍上之事下弘恭問狀望之對曰外戚在位多奢淫欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譖訴大臣毀離親戚欲以專擅權勢為臣不忠誣上不道請謁者召致延尉時上初即位不省謁者召致延尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使高言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因決免於是制詔丞相御史前將軍望之傅朕八年亡它罪過今事久遠識忘難明其赦望之罪收前將軍光祿勳印綬及堪更生皆, WYG: ''}
