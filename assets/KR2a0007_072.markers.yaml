  - {type: variant, offset: 2775, length: 2, content: 間丙, WYG: 是時成帝舅安成恭侯夫人放寡居共養長信宫師古曰放者夫人之名也共音居用反養音弋亮反坐祝詛下獄崇奏封事為放言放外家解氏與崇為昏師古曰婚姻之家哀帝以崇為不忠誠策詔崇曰朕以君有累世之美師古曰謂自祖及身皆有名也故踰列次在位以来忠誠匡國未聞所繇師古曰繇與由同由從也反懐詐諼之辭師古曰諼詐言也音虚袁反欲以攀救舊姻之家大逆之辜舉錯專恣師古曰錯置也不遵法度亡以示百僚左遷為大司農後徙衞尉左将軍平帝即位王莽秉政大司空彭宣乞骸骨罷崇代為大司空封扶平侯歲餘崇復謝病乞骸骨皆避王莽莽遣就國歲餘為傅婢所毒薨國除師古曰凡言傅婢者謂傅相其衣服衽席之事一讀傅曰附謂近幸也自}
