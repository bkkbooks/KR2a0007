  - {type: variant, offset: 2810, length: 0, content: '', WYG: 僕減食穀馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光禄大夫頃之禹上書曰臣禹年老貧窮家訾不滿萬錢妻}
