  - {type: variant, offset: 4748, length: 0, content: '', krp: 若孫若同産同産子一人師古曰同産兄弟也同産子即兄弟子也大夫其修身守道以終髙年賜帛及行道舍宿歲時羊酒衣衾皆如韓福故事所上子男皆除為郎孔武仲曰龔勝邴漢乞骸骨詔謂之耆艾二人而不名時勝為光禄大夫漢為大中大夫特詔行道舍傳舍傳舍如今驛舍也漢得入驛如此之嚴也於是勝漢遂歸老于鄉里漢兄子曼容亦養志自修為官不肯過六百石輙自免去其名過出於漢初龔舍以龔勝薦徵為諌大夫病免復徵為博士又病去頃之哀帝遣使者即楚拜舍為太山太守師古曰即猶就也舍家居在武原使者至縣請舍欲令至廷拜授印綬師古曰廷謂縣之庭内舍曰王者以天下為家何必縣官遂於家受詔便道之官既至數月上書乞骸骨上徵舍至京兆東湖界師古曰湖縣也時屬京兆固稱病篤天子使使者收印綬拜舍為光禄大夫數賜告舍終不肯起乃遣歸舍亦通五經以魯詩教授舍勝既歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮舍年六十八王莽居攝中卒莽既簒國遣五威将帥行天下風俗将帥親奉羊酒存問勝明年莽遣使者即拜勝為講學祭酒師古曰即就也就其家而拜之勝稱疾不應徵後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜師古曰就家迎之因拜官秩上卿先賜六月禄直以辦装使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔師古曰行義謂鄉邑有行義之人也諸生謂學徒也行音下更反使者欲令勝起迎久立門外勝稱病篤為牀室中户西南牖下師古曰牖窓也於户之西室之南牖下也東首加朝服拕紳師古曰拕引也卧著朝衣故云加引大帶於體也論語稱孔子疾君視之東首加朝服拕紳故放之也拕音土賀反使者入户西行南靣立致詔付璽書遷延再拜奉印綬内安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為}
  - {type: variant, offset: 4749, length: 0, content: '', WYG: 思聞所欲施行以安海内勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路師古曰示若尊敬使者故謂之使君無益萬分使者要説師古曰要音一遥反説音式鋭反至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋凉廼發師古曰須待也有詔許使者五日一與太守俱問起居為勝兩子及門人髙暉}
