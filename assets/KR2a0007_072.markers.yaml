  - {type: variant, offset: 2807, length: 1, content: 授, WYG: 官輸物不過十笥師古曰三服官主作天子之服在齊地笥盛衣竹器音先嗣反方今齊三服官作工各數千人一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬如淳曰地理志河内懐蜀郡成都廣漢皆有工官工官主作銀器物者也師古曰如説非也三工官謂少府之屬官考工室也右工室也東園匠也上已言蜀廣漢主金銀器是不入三工之數也東西織室亦然廐馬食粟将萬匹臣禹嘗從之東宫師古曰從天子徃太后宫見賜杯案盡文畫金銀飾非當所以賜食臣下也師古曰食讀曰飤東宫之費亦不可勝計天下之民所為大饑餓死者是也今民大饑而死死又不葬為犬豬所食師古曰食人之骸骨宋祁曰浙本無所字人至相食而廐馬食粟苦其大肥氣盛怒至乃日歩作之師古曰日日行歩而動作之以散充溢之氣王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫師古曰此填字讀與寘同及弃天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宫女置於園陵宋祁曰以字疑作取字大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣}
