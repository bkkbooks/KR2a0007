  - {type: variant, offset: 2807, length: 1, content: 授, krp: 官輸物不過十笥師古曰三服官主作天子之服在齊地笥盛衣竹器音先嗣反方今齊三服官作工各數千人一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬如淳曰地理志河内懐蜀郡成都廣漢皆有工官工官主作銀器物者也師古曰如説非也三工官謂少府之屬官考工室也右工室也東園匠也上已言蜀廣漢主金銀器是不入三工之數也東西織室亦然廐馬食粟将萬匹臣禹嘗從之東宫師古曰從天子徃太后宫見賜杯案盡文畫金銀飾非當所以賜食臣下也師古曰食讀曰飤東宫之費亦不可勝計天下之民所為大饑餓死者是也今民大饑而死死又不葬為犬豬所食師古曰食人之骸骨宋祁曰浙本無所字人至相食而廐馬食粟苦其大肥氣盛怒至乃日歩作之師古曰日日行歩而動作之以散充溢之氣王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宫師古曰此填字讀與寘同及弃天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鼈牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宫女置於園陵宋祁曰以字疑作取字大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣}
  - {type: variant, offset: 2809, length: 0, content: '', WYG: 帝時陛下惡有所言師古曰不能自言減省之事羣臣亦隨故事甚可痛也故使天下承化取女皆大過度師古曰取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以内多怨女外多曠夫師古曰曠空也室家空也及衆庶葬埋皆虚地上以實地下其過自上生師古曰自從也上謂天子也皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乗輿服御器物三分去二子産多少有命審察後宫擇其賢者留二十人餘悉歸之師古曰言人産子多少自有定命非由廣妾媵也故請止留二十人及諸陵園女亡子者宜悉遣獨杜陵宫人數百誠可哀憐也廐馬可亡過數十匹獨舍長安城南苑地以為田獵之囿師古曰舍置也獨留置之其餘皆廢去自城西南至山西至鄠皆復其田以與貧民師古曰復音方目反方今天下饑饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娱樂而已也故詩曰天難諶斯不易惟王上帝臨女毋貳爾心師古曰大雅大明之詩也諶誠也上帝亦天也言承天之意此誠難矣王者之命不妄改易天常降鑒甚可畏也毋貳爾心機事易失勿猶豫也當仁不讓師古曰論語稱孔子曰當仁不讓於師故引之獨可以聖心參諸天地揆之往古師古曰揆度也不可與臣下議也若其阿意順指隨君上下師古曰上下猶言髙下謂茍順從也上音時掌反臣禹不勝拳拳不敢不盡愚心師古曰拳拳解在劉向傳下鮑宣傳惓惓音義亦同天子納善其忠乃下詔令}
