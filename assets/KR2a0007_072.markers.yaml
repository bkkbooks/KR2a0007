  - {type: variant, offset: 4756, length: 0, content: '', WYG: 曰正月一日為歲之朝月之朝日之朝始猶朝也誠可畏懼小民正月朔日尚恐毁敗器物何况於日虧乎陛下深内自責避正殿舉直言求過失罷退外親及旁仄素餐之人師古曰庂古側字也徴拜孔光為光禄大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜師古曰歙音翕説音悦次亦同也天人同心人心説則天意解矣乃二月丙戌白虹虷日連隂不雨師古曰虷音干此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親師古曰葭音工遐反莩音孚葭莩喻輕薄而附著也解在景十三王𫝊但以令色諛言自進師古曰令善也䛕謟也賞賜亡度竭盡府臧并合三第尚以為小復壊暴室師古曰時以三第總為一第賜賢猶嫌陿小復取暴室之地以増益之也賢父子坐使天子使者将作治第行夜吏卒皆得賞賜師古曰為賢第上持時行夜者行音下更反上冡有㑹輒太官為供海内貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讐海内免遣就國收乗輿器物還之縣官如此可以父子終其性命不者海内之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下師古曰視讀曰示復徵何武師丹彭宣傅喜曠然使民易視以應天心師古曰易改也建立大政以興太平之端髙門去省戸數十歩求見出入二年未省師古曰不被省視也欲使海瀕仄陋自通逺矣師古曰瀕涯也音頻又音賔願賜數刻之間師古曰刻漏刻也間空隙極竭毣毣之思師古曰毣音沐沐沐猶蒙蒙也如淳曰謹愿之貎也宋祁曰浙本無竭字退入三泉死亡所恨師古曰三重之泉言其深也上感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司𨽻時哀帝改司𨽻校尉但為司𨽻官比司直丞相孔光四時行園陵師古曰行音下更反官屬以令行馳道中如淳曰令諸使有制得行馳道中者行旁道無得行中央三丈也宣出逢之使吏鉤止丞相掾史師古曰鉤留也没入其車馬摧辱宰相事下御史中丞侍御史至司𨽻官欲捕從事閉門不肯内師古曰御史欲捕從事而司𨽻閉門不得入也宣坐距閉使者亡人臣禮大不敬不道宋祁曰南本無不道二字下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司𨽻者㑹此下諸生會者千餘人朝日遮丞相孔光自言師古曰朝日謂早旦欲入朝也丞相車不得行又守闕上書上遂抵宣罪減死一等髠鉗宣既被刑乃徙之上黨以為其地宜田牧又少豪俊易長雄師古曰長為之長帥也雄為之雄豪也遂家}
