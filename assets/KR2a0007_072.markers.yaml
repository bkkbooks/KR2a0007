  - {type: variant, offset: 5297, length: 2, content: 社稷, WYG: 曰以仁撫天下云云胡三省曰此以仁壽並言仁者不鄙詐壽者不夭折也顔注非是吉意以為夫婦人倫大綱云云真徳秀曰吉意以下盖史家撮其大㫖如此非本文也左曹陳咸薦駿賢父子}
  - {type: variant, offset: 5297, length: 2, content: 社稷, krp: 曰以仁撫天下云云胡三省曰此以仁壽並言仁者不鄙詐壽者不夭折也顔注非是吉意以為夫婦人倫大綱云云真徳秀曰吉意以下盖史家撮其大㫖如此非本文也左曹陳咸薦駿賢父子}
  - {type: variant, offset: 5300, length: 0, content: '', WYG: 召南按賢父子猶云賢父之子兩龔傳常以歳八月賜羊壹頭酒二斛臣召南按韓福事昭紀作郡縣常以正月賜羊酒紀係録詔書原文疑此八月當為正月之訛又按羊壹頭壹字應作一各本俱誤耳勿隨俗動吾冡云云注師古曰若葬多設器偹則恐被掘云云顧炎武曰古人族葬勝必已自有墓若隨俗人之意更於冡上種栢作祠堂則是動吾冡}
