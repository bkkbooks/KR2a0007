  - {type: variant, offset: 4752, length: 1, content: 定, WYG: 成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正義失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諌大夫從其後上書諌曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷師古曰塞滿也妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今奈何反覆劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士服䖍曰魁壘壮貎也師古曰魁音口賄反壘音磊議論通古今喟然動衆心師古曰喟然嘆息貌音丘位反憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省户下師古曰敦謂厚重也陛下欲與此共承天地安海内甚難師古曰共讀曰供劉奉世曰共讀如字今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服師古曰四罪謂流共工于幽州放驩兜于崇山竄三苖于三危殛鯀于羽山也今除一吏而衆皆惑古刑人尚服今賞人反惑鄧展曰不得其人使天下惑也請寄為姦師古曰請寄謂以事私相託也羣小日進國家空虚用度不足民流亡去城郭盜賊並起吏為殘賊歲増於前凡民有七亡師古曰亡謂失其作業也陰陽不和水旱為災一亡也縣官重責更賦租税二亡也師古曰更謂為更卒也音工行反貪吏並公受取不已三亡也師古曰並依也音步浪反豪強大姓蠶食亡厭四亡也宋祁曰大姓下疑有家字苛吏繇役失農桑時五亡也部落鼓鳴男女􅃒迣六亡也晋灼曰迣古列字也師古曰言聞桴鼓之聲以為有盗賊皆遮列而追捕盗賊劫畧取民財物七亡也七亡尚可又有七死酷吏毆殺一死也師古曰毆擊也音一口反治獄深刻二死也寃陷亡辜三死也盗賊横發四死也師古曰横音胡孟反怨讐相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪師古曰守郡守也相諸侯相也羣臣幸得居尊官食重禄豈有肯加惻隱於細民助陛下流教化者邪師古曰惻隱皆痛也志但在營私家稱賔客為姦利而已師古曰務稱賔客所求也稱音尺孕反以茍容曲從為賢以拱黙尸禄為智師古曰尸主也不憂其職但主食禄而已謂如臣宣等為愚陛下擢臣巖穴誠兾有益豪毛豈徒欲使臣羙食大官重髙門之地哉晉灼曰髙門殿名也師古曰在未央宫中天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩云尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩之鳥養其子七平均如一善人君子布德施惠亦當然也尸鳩拮鞠也拮音居黠反宋祁曰浙本無之詩二字今貧民菜食不厭衣又穿空師古曰空孔也父子夫婦不能相保誠可為酸鼻陛下不救将安所歸命乎師古曰安焉也奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉劉徳曰視酒如漿視肉如霍也師古曰霍豆葉也貧人茹之也蒼頭廬兒皆用致富非天意也孟康曰黎民黔首黎黔皆黒也下民隂類故以黒為號漢名奴為蒼頭非純黒以别於良人也諸給殿中者所居為廬蒼頭侍從因呼為廬兒臣瓉曰漢儀注官奴給書計從侍中已下為蒼頭青幘及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人師古曰此官不當加於此人此人不當受於此官也而望天説民服豈不難哉師古曰説讀曰悦方陽侯孫寵宜}
