  - {type: variant, offset: 79, length: 0, content: '', WYG: 人皆得其所後世思其仁恩至乎不伐甘棠甘棠之詩是也師古曰邵南之詩也其詩曰蔽芾甘棠勿翦勿伐邵伯所茇蔽芾小樹貌也甘棠杜棃也茇舍也蔽音必二反芾音方未反茇音步末反}
  - {type: variant, offset: 79, length: 0, content: '', krp: 人皆得其所後世思其仁恩至乎不伐甘棠甘棠之詩是也師古曰邵南之詩也其詩曰蔽芾甘棠勿翦勿伐邵伯所茇蔽芾小樹貌也甘棠杜棃也茇舍也蔽音必二反芾音方未反茇音步末反}
  - {type: variant, offset: 80, length: 1, content: 將, WYG: 王不好書術而樂逸游馮式撙銜臣瓉曰撙促也師古曰撙挫也音子本反馳騁不止口倦乎叱咤師古曰咤亦吒字也音竹駕反手苦於箠轡師古曰箠馬策音止蘂反身勞乎車輿朝則冒霧露晝則被塵埃師古曰冒犯也音莫克反宋祁曰克景作克校作報浙本作克夏則為大暑之所暴炙冬則為風寒之所匽薄師古曰匽與偃同言遇疾風則偃靡也薄迫也數以耎脆之玉體犯勤勞之煩毒師古曰耎柔也音而兗反非所以全壽命之宗也師古曰宗尊也又非所以進仁義之隆也師古曰隆髙也夫廣夏之下細旃之上師古曰廣夏大屋也旃與氈同明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥徳師古曰訢古欣字其樂豈徒銜橛之閒哉師古曰銜馬銜也橛車鉤心也張揖以橛為馬之長銜非也橛音其月反休則俛仰詘信以利形師古曰形體也信讀曰伸進退步趨以實下如淳曰今人不行則膝已下虚弱不實吸新吐故以練臧專意積精以適神師古曰臧五臧也練練其氣也適和也於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽師古曰喬松仙人伯喬及赤松子也羙聲廣譽登而上聞宋祁曰登疑作發則福禄其轃而社稷安矣師古曰轃與臻同至也皇帝仁聖至今思慕未怠師古曰皇帝謂昭帝也言武帝晏駕未久故尚思慕於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有不具者於以上聞非饗國之福也臣吉愚戇願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰宋祁曰惰疑作愭類篇渠伊反畏也敬也中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從自若師古曰從音子用反吉輙諌爭甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大将}
