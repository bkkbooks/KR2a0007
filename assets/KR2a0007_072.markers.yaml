  - {type: variant, offset: 2781, length: 1, content: 丞, WYG: 鮮明而亡金銀錦繡之物及遷徙去處所載不過嚢衣師古曰一囊之衣也有底曰嚢無底曰槖不畜積餘財師古曰畜讀曰蓄去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黄金師古曰以其無所求取不營産業而車服鮮明故謂自作黄金以給用貢禹字少翁琅邪人也以明經絜行著聞徵為博士凉州刺史病去官復舉賢良為河南令歲餘以職事為府官所責師古曰太守之府免冠謝禹曰冠壹免安復可冠也遂去官元帝初即位徵禹為諌大夫數虚己問以政事師古曰虚己謂聽受其言也是時年歲不登郡國多困禹奏言古者宫室有制宫女不過九人秣馬不過八匹師古曰秣養也謂以粟米飤也牆塗而不琱木摩而不刻師古曰琱字與彫同彫畫也車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而税亡它賦斂繇戍之役使民歲不過三日千里之内自給千里之外各置貢職而已師古曰言天子以畿内賦斂自供千里之外令其以時入貢不欲煩勞也故天下家給人足頌聲並作至髙祖孝文孝景皇帝循古節儉宫女不過十餘廐馬百餘匹孝文皇帝衣綈履革師古曰綈厚繒音徒奚反器亡琱文金銀之飾後世爭為奢侈轉轉益甚臣下亦}
  - {type: page-break, offset: 2781, content: '', id: KR2a0007_WYG_072-13b, image: WYG0250/WYG0250-0508d.png}
