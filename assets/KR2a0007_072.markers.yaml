  - {type: variant, offset: 5290, length: 0, content: '', WYG: 顧謂曰李覺甞奏朕云四皓中一先生姓或言用字加撇或云加㸃爾知否偓佺對曰臣聞刀用為角音𣙜兩㸃為甪音鹿用上一撇一㸃俱不成字据偓佺此論則俗本作甪字者亦非也宋祁曰甪不成字當作角俗本又誤甪作角盖縁不知崔偓佺之論耳其後谷口}
