  - {type: variant, offset: 4745, length: 0, content: '', WYG: 上知勝非撥煩吏乃復還勝光祿大夫師古曰依舊官諸吏給事中勝言董賢亂制度繇是逆上指師古曰繇讀與由同後歲餘丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下将軍中朝者議左将軍公孫禄司𨽻鮑宣光禄大夫孔光等十四人皆以為嘉應迷國不道法勝獨書議曰嘉資性邪僻所舉多貪殘吏位列三公隂陽不和諸事並廢咎皆繇嘉師古曰繇讀與由同迷國不疑文穎曰信必迷國不疑也今舉相等過㣲薄日暮議者罷明旦復㑹左將軍禄問勝君議亡所據今奏當上宜何從師古曰今欲奏此事君定從何議也勝曰将軍以勝議不可者通劾之師古曰并劾勝博士夏侯常見勝應禄不和起至勝前謂曰宜如奏所言師古曰謂如尚書所劾奏也勝以手推常曰去後數日復㑹議可復孝惠孝景廟不議者皆曰宜復勝曰當如禮常復謂勝禮有變勝疾言曰去是時之變師古曰疾急也言時人意自變耳禮不變也常恚謂勝曰我視君何若師古曰何若言無所似也君欲小與衆異外以采名君乃申徒狄屬耳服䖍曰殷之末世介士也自沈於河者先是常又為勝道髙陵有子殺母者勝白之尚書問誰受師古曰言於誰聞之也對曰受夏侯常尚書使勝問常常連恨勝師古曰連恨謂再被譛去即應曰聞之白衣戒君勿言也服䖍曰聞之白衣耳戒君勿言之如何便上之邪師古曰白衣給官府趨走賤人若今諸司亭長掌固之屬奏事不詳妄作觸罪師古曰言奏事不審妄有發作自觸罪也勝窮無以對尚書即自劾奏與常爭言洿辱朝廷事下御史中丞召詰問劾奏勝吏二千石常位大夫皆幸得給事中與論議師古曰與讀曰豫劉奉世曰前云博士後云位大夫然博士非中朝臣疑言博士者誤也不崇禮義而居公門下相非恨疾言辨訟媠謾亡狀師古曰疾急也媠古惰字謾讀與慢同亡狀無善狀也皆不敬制曰貶秩各一等勝謝罪乞骸骨上乃復加賞賜以子博為侍郎出勝為渤海太守勝謝病不任之官積六月免歸上復徵為光禄大夫勝常稱疾卧數使子上書乞骸骨㑹哀帝崩初琅邪邴漢亦以清行徵用至京兆尹後為太中大夫王莽秉政勝與漢俱乞骸骨自昭帝時涿郡韓福以徳行徵至京師賜策書束帛遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里行道舍傳舍師古曰於傳舍止宿若今官人行得過驛也縣次具酒肉食從者及馬師古曰道次給酒肉並飤其從者及馬也食讀曰飤長吏以時存問常以歲八月賜羊壹頭酒二斛不幸死者賜複衾一祠以中牢於是王莽依故事白遣勝漢策曰惟元始二年六月庚寅光禄大夫太中大夫耆艾二人以老病罷太皇太后使謁者僕射策詔之曰蓋聞古者有司年至則致仕所以恭讓而不}
