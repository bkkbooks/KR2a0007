  - {type: variant, offset: 5291, length: 2, content: 輔佐, WYG: 鄭子真按地理志谷口縣屬左馮翊王吉傳琅邪臯虞人也臣召南按吉為琅邪王氏}
  - {type: variant, offset: 5291, length: 2, content: 輔佐, krp: 鄭子真按地理志谷口縣屬左馮翊王吉傳琅邪臯虞人也臣召南按吉為琅邪王氏}
  - {type: variant, offset: 5294, length: 2, content: 能近, WYG: 祖唐書宰相世系表曰秦将王離子元避亂遷琅邪後徒臨沂四世孫吉始家臯虞後徙臨沂都鄉南仁里今者大王幸方與胡三省曰方與縣本屬山陽郡武帝以山陽為昌邑王國方與縣屬焉敺一世之民躋之仁壽之域注師}
