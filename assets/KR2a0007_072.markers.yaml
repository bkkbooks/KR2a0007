  - {type: variant, offset: 18, length: 0, content: '', WYG: 李彊素善雄乆之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰揚子雲誠知人君平年九十餘遂以其業終蜀人愛敬至今稱焉及雄著書言當世士稱此二人其論曰或問君子疾没世而名不稱師古曰以身没而無名為病盍埶諸名卿可㡬曰君子徳名為幾孟康曰盍何不也言何不因名卿之埶以求名韋昭曰言有埶之名卿庶幾可不朽揚子以為不然唯有徳者可以有名師古曰或人以事有權力之卿用自表顯則其名可庶幾而立揚雄以為自蓄其徳則有名也梁齊楚趙之君非不富且貴也師古曰謂當時諸侯王也惡乎成其名師古曰惡於何也惡音烏谷口鄭子真不詘其志耕於巖石之下名震于京師豈其卿豈其卿楚兩龔之絜其清矣乎蜀嚴湛㝠孟康曰蜀郡嚴君平湛深元黙無欲也師古曰湛讀曰沈不作茍見不治茍得師古曰不為茍顯之行不事茍得之業乆幽而不改其操雖隨和何以加諸師古曰隨隨侯珠也和和氏璧也諸之也舉兹以旃不亦寳乎師古曰旃亦之也言舉此人而用之不亦國之寶乎自此已上皆揚雄之言也宋祁曰注文已字疑作以自園公綺里季夏黄公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也若王吉貢禹兩龔之屬皆以禮譲進退云王吉字子陽琅邪臯虞}
  - {type: page-break, offset: 18, content: '', id: KR2a0007_WYG_072-3b, image: WYG0250/WYG0250-0503d.png}
  - {type: page-break, offset: 18, content: '', id: KR2a0007_WYG_072-4a, image: WYG0250/WYG0250-0504a.png}
