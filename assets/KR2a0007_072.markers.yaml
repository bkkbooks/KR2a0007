  - {type: variant, offset: 226, length: 727, content: 相成王躬吐握之禮致白屋之意於是光獨不除用望之而仲翁等皆補大將軍史三歲間仲翁至光祿大夫給事中望之以射策甲科為郎署小苑東門候仲翁出入從倉頭廬兒下車趨門傳呼甚寵顧謂望之曰不肯錄錄反抱關為望之曰各從其志後數年坐弟犯法不得宿衛免歸為郡吏及御史大夫魏相除望之為屬察廉為大行治禮丞時大將軍光薨子禹復為大司馬兄子山領尚書親屬皆宿衛內侍地節三年夏京師雨雹望之因是上疏願賜清閒之宴口陳災異之意宣帝自在民間聞望之名曰此東海蕭生邪下少府宋畸問狀無有所諱望之對以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害今陛下以聖德居位思政求賢堯舜之用心也然而善祥未臻陰陽不和是大臣任政一姓擅勢之所致也附枝大者賊本心私家盛者公室危唯明主躬萬機選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣對奏天子拜望之為謁者時上初即位思進賢良多上書言便宜輒下望之問狀高者請丞相御史次者中二千石試事滿歲以狀聞下者報聞或罷歸田里所白處奏皆可累遷諫大夫丞相司直歲中三遷官至二千石其後霍氏竟謀反誅望之寖益任用是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝遠為郡守內不自得乃上疏曰陛下哀愍百姓恐德化之不究悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善願陛下選明經術溫故知新通於幾微謀慮之士以為內臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎外郡不治豈足憂哉書聞徵入守少府宣帝察望之經明持重論議有餘材任宰相欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病上聞之使侍中成都侯金安上諭意曰所用皆更治民以考功君前為平原太守日淺故復試之於三輔非有所聞也望之即視事是歲西羌反漢遣後將軍征之京兆, WYG: 伊}
