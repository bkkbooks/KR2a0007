  - {type: xml-element, offset: 5301, content: '', id: KR2a0007_tls_072-bkkxmlele54}
  - {type: variant, offset: 5301, length: 0, content: '', WYG: 盖以朝代遷革一切飾終之禮俱不欲用鮑宣傳勃海髙城人也髙城地理志作髙成薛方嘗為郡掾祭酒云云臣召南按鮑宣傳特附薛方郭欽蔣詡栗融禽慶蘇章曹竟皆不仕莽世清節著名者据後書卓茂傳茂與孔休蔡勲劉宣龔勝鮑宣六人同志又申徒剛宣秉王丹王良郭丹蔡茂及陳寵之曽祖咸各見本傳而儒林傳載髙詡包咸獨行傳載譙元李業王皓王嘉劉茂逸民傳載向長逄萌王君公周黨譚賢殷謨王覇戴遵皆立志較然不汚新室爵命宜與薛方諸賢牽連書之乃莽大夫揚雄一傳累牘連篇而於諸賢聊表一二此則班氏之失也皆見褒表至大官臣召南按兩龔子孫後書無傳鮑宣子永孫昱三世司𨽻後書有傳而宣妻桓少君在列女傳前漢書卷七十二考證}
