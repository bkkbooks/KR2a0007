  - {type: variant, offset: 4750, length: 0, content: '', WYG: 言朝廷虚心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事師古曰棺音宫煥反斂音力贍反衣周於身棺周於衣勿隨俗動吾冡種柏作祠堂師古曰若葬多設器備則恐被掘故云動吾冡也亦不得種柏及作祠堂皆不隨俗劉攽曰勝意一葬之後更不得隨俗動冡土種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜複衾祭祠如法門人衰絰治喪者百數有老父来弔哭甚哀既而曰嗟乎薰以香自燒膏以明自銷師古曰薰芳草龔生竟夭天年非吾徒也遂趨而出莫知其誰勝居彭城亷里後世刻石表其里門鮑宣字子都渤海髙城人也好學明經為縣鄉嗇夫守束州丞師古曰束州渤海之縣也後為都尉太守功曹舉孝亷為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曹掾甚敬重焉薦宣為諫大夫遷豫州牧歳餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聽訟所察過詔條師古曰出六條之外行部乗傳去法駕師古曰行音下更反傳音張戀反駕一馬師古曰言其單率不依典制也舍宿鄉亭為衆所非宣}
  - {type: page-break, offset: 4750, content: '', id: KR2a0007_WYG_072-29a, image: WYG0250/WYG0250-0516c.png}
  - {type: page-break, offset: 4750, content: '', id: KR2a0007_WYG_072-29b, image: WYG0250/WYG0250-0516d.png}
