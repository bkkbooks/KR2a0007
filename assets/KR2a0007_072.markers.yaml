  - {type: variant, offset: 1372, length: 0, content: '', WYG: 如此雖於百姓為至恩然未盡政務之本也欲治之主不世出師古曰言有時遇之不常值宋祁曰注文不字下疑有可字公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也師古曰三代夏殷周其務在於期㑹簿書斷獄聽訟而已此非太平之基也臣聞聖王宣徳流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣徳也詩云濟濟多士文王以寜師古曰大雅文王之詩也此其本也春秋所以大一統者六合同風九州共貫也師古曰解在董仲舒傳今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇師古曰繇與由同以意穿鑿各取一切權譎自任故一變之後不可}
  - {type: page-break, offset: 1372, content: '', id: KR2a0007_WYG_072-8b, image: WYG0250/WYG0250-0506b.png}
  - {type: page-break, offset: 1372, content: '', id: KR2a0007_WYG_072-9a, image: WYG0250/WYG0250-0506c.png}
  - {type: variant, offset: 1372, length: 0, content: '', krp: 如此雖於百姓為至恩然未盡政務之本也欲治之主不世出師古曰言有時遇之不常值宋祁曰注文不字下疑有可字公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也師古曰三代夏殷周其務在於期㑹簿書斷獄聽訟而已此非太平之基也臣聞聖王宣徳流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之行發於近必見於逺故謹選左右審擇所使左右所以正身也所使所以宣徳也詩云濟濟多士文王以寜師古曰大雅文王之詩也此其本也春秋所以大一統者六合同風九州共貫也師古曰解在董仲舒傳今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇師古曰繇與由同以意穿鑿各取一切權譎自任故一變之後不可}
  - {type: variant, offset: 1373, length: 0, content: '', WYG: 修也師古曰言其敝深難乆行是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極師古曰萌生言其爭出如草木之初生質樸日消恩愛寖薄師古曰寖漸也孔子曰安上治民莫善於禮師古曰孝經載孔子之言非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛}
  - {type: variant, offset: 1373, length: 0, content: '', krp: 修也師古曰言其敝深難乆行是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極師古曰萌生言其爭出如草木之初生質樸日消恩愛寖薄師古曰寖漸也孔子曰安上治民莫善於禮師古曰孝經載孔子之言非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛}
  - {type: variant, offset: 1374, length: 0, content: '', WYG: 承天心發大業與公卿大臣延及儒生述舊禮明王制􅇌一世之民躋之仁壽之域師古曰以仁撫下則羣生安逸而夀考則俗何以不若成康壽何以不若髙宗師古曰髙宗殷王武丁也享國百年竊見當世趨務不合於道者謹條奏師古曰趨讀曰趣趣嚮也唯陛下財擇焉師古曰財與裁同吉意以為夫婦人倫大綱夭壽之萌也師古曰由之而生故云萌世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主晉灼曰娶天子女則曰尚公主國人娶諸侯女曰承翁主尚承皆卑下之名也師古曰翁主者言}
  - {type: page-break, offset: 1374, content: '', id: KR2a0007_WYG_072-9b, image: WYG0250/WYG0250-0506d.png}
  - {type: variant, offset: 1374, length: 0, content: '', krp: 承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民躋之仁壽之域師古曰以仁撫下則羣生安逸而夀考則俗何以不若成康壽何以不若髙宗師古曰髙宗殷王武丁也享國百年竊見當世趨務不合於道者謹條奏師古曰趨讀曰趣趣嚮也唯陛下財擇焉師古曰財與裁同吉意以為夫婦人倫大綱夭壽之萌也師古曰由之而生故云萌世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主晉灼曰娶天子女則曰尚公主國人娶諸侯女曰承翁主尚承皆卑下之名也師古曰翁主者言}
  - {type: variant, offset: 1375, length: 2, content: 議兩, WYG: 父自主婚也解具在髙帝紀使男事女夫詘於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章以襃有徳而别尊卑今上下僭差人人自制師古曰言無節度是以貪財誅利宋祁曰南本浙本作趨利不畏死亡周之所以能致治刑措而不用者以其禁邪於㝠㝠絶惡於未萌也師古曰㝠㝠言未有端緒又言舜湯不用三公九卿之世而舉臯陶伊尹李竒曰不繼世而爵也言臯陶伊尹非三公九卿之世不仁者逺師古曰任用賢人放黜讒佞今使俗吏得任子弟張晏曰子弟以父兄任為郎率多驕驁不通古今師古曰驁與傲同至於積功治人亡益於民此伐檀所為作也師古曰伐檀詩篇名刺在位貪鄙無功而受禄宋祁曰注文一本刺不用賢也在魏國風也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂}
  - {type: page-break, offset: 1375, content: '', id: KR2a0007_WYG_072-10a, image: WYG0250/WYG0250-0507a.png}
  - {type: page-break, offset: 1375, content: '', id: KR2a0007_WYG_072-10b, image: WYG0250/WYG0250-0507b.png}
