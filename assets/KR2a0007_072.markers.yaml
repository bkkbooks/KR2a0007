  - {type: variant, offset: 11, length: 0, content: '', WYG: 以来春秋左氏傳曰夏之方有徳也逺方圖物貢金九牧以鑄鼎象物桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周伯夷叔齊薄之師古曰夷齊以武王父死不葬而用干戈為不孝以臣伐君為不忠餓死首陽不食其禄師古曰馬融云首陽山在河東蒲阪華山之北河曲之中髙誘則云在雒陽東北阮籍詠懐詩亦以為然今此二山並有夷齊祠耳而曹大家注幽通賦云隴西首陽縣是也今隴西亦有首陽山許慎又云首陽山在遼西諸說不同致有疑惑而伯夷歌云登彼西山則當隴西者近為是也周猶稱盛徳焉然孔子賢此二人以為不降其志不辱其身也師古曰事見論語而孟子亦云聞伯夷之風者貪夫亷懦夫有立志師古曰懦柔弱也音乃喚反又音儒奮乎百世之上百世之下宋祁曰浙本多二}
  - {type: page-break, offset: 11, content: '', id: KR2a0007_WYG_072-1b, image: WYG0250/WYG0250-0502d.png}
  - {type: variant, offset: 11, length: 0, content: '', krp: 以来春秋左氏傳曰夏之方有徳也逺方圖物貢金九牧以鑄鼎象物桀有昏徳鼎遷于商載祀六百商紂暴虐鼎遷于周伯夷叔齊薄之師古曰夷齊以武王父死不葬而用干戈為不孝以臣伐君為不忠餓死首陽不食其禄師古曰馬融云首陽山在河東蒲阪華山之北河曲之中髙誘則云在雒陽東北阮籍詠懐詩亦以為然今此二山並有夷齊祠耳而曹大家注幽通賦云隴西首陽縣是也今隴西亦有首陽山許慎又云首陽山在遼西諸說不同致有疑惑而伯夷歌云登彼西山則當隴西者近為是也周猶稱盛徳焉然孔子賢此二人以為不降其志不辱其身也師古曰事見論語而孟子亦云聞伯夷之風者貪夫亷懦夫有立志師古曰懦柔弱也音乃喚反又音儒奮乎百世之上百世之下宋祁曰浙本多二}
  - {type: variant, offset: 12, length: 5, content: 長倩東海蘭, WYG: 作行乎百世之下莫不興起非賢人而能若是乎漢興有園公綺里季夏黄公甪里先生師古曰四皓稱號本起於此更無姓名可稱知此盖隠居之人匿跡逺害不自標顯祕其氏族故史傳無得而詳至於後代皇甫謐圈稱之徒及諸地理書說競為四人施安姓字自相錯互語又不經班氏不載於書諸家皆臆説今並弃略一無取焉宋祁曰季字下當有公字甪不成字當作角此四人者當秦之世避而入商雒深山師古曰即今之商州商雒縣山也以待天下之定也自髙祖聞而召之不至其後吕后用留侯計使皇太子卑辭束帛致禮安車迎而致之四人既至從太子見髙祖客而敬焉太子得以為重遂用自安語在留侯傳其後谷口有鄭子真蜀有嚴君平師古曰地理志謂君平為嚴遵三輔決録云子真名樸君平名尊則君平子真皆其字也皆修身自保非其服弗服非其食弗食成帝時元舅大将軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因埶導之以善從吾言者已過半矣裁日閲數人師古曰裁與才同閲歴也得百錢足自養則閉肆下簾而授老子師古曰肆者市也列所坐之處也博覧亡不通依老子嚴周之指著書十萬餘言師古曰嚴周即荘周揚雄少時從游學㠯而仕京師顯名數為朝廷在位賢者稱君平徳杜}
