  - {type: variant, offset: 4758, length: 3, content: 厚善免, WYG: 子師古曰上黨之縣也長讀如本字平帝即位王莽秉政隂有篡國之心乃風州郡以辠法案誅諸豪桀師古曰風讀曰諷及漢忠直臣不附己者宣及何武等宋祁曰武字下疑有與宣女壻字皆死時名捕隴西辛興師古曰詔顯其名而捕之興與宣女壻許紺俱過宣一飯去師古曰飯音扶晩反宣不知情宋祁曰情字上疑有其字坐繫獄自殺自成帝至王莽時清名之士琅邪又有紀逡王思齊則薛方子容太原則邭越臣仲郇相稚賔沛郡則唐林子髙唐尊伯髙師古曰并列其人本土及姓名字也後皆類此逡音于旬反郇音荀又音胡頑反今荀郇二姓並有之俱稱周武王之後也皆以明經飭行顯名於世師古曰飭謹也讀與勅同紀逡兩唐皆仕王莽封侯貴重歴公卿位唐林數上疏諌正有忠直節唐尊衣敝履空服䖍曰履猶屨也師古曰衣音於既反著敝衣躡空履也空穿也以瓦器飲食又以歴遺公卿服䖍曰以瓦器遺之也被虛偽名師古曰被音皮義反郇越相同族昆弟也並舉州郡孝亷茂材數病去}
