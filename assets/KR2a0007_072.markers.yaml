  - {type: variant, offset: 4762, length: 0, content: '', WYG: 越散其先人訾千餘萬以分施九族州里志節尤髙相王莽時徵為太子四友病死莽太子遣使裞以衣衾師古曰贈喪衣服曰祱裞音式芮反其字從衣其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之薛方嘗為郡掾祭酒嘗徵不至及莽以安車迎方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之徳小臣欲守箕山之節也張晏曰許由隱於箕山在陽城有許由祠宋祁曰由字按注并賛注及江浙本作許字今字上疑有亦猶二字使者以聞莽説其言不強致師古曰説讀曰悦方居家以經教授喜屬文師古曰喜音許吏反屬音之欲反著詩賦數十篇始隃麋郭欽}
