  - {type: variant, offset: 2811, length: 9, content: 初匈奴呼韓邪單于來, WYG: 穅豆不贍裋褐不完師古曰裋者謂僮豎所著布長襦也褐毛布之衣也裋音豎有田百三十畝陛下過意徵臣師古曰過猶誤也臣賣田百畝以供車馬至拜為諫大夫秩八百石奉錢月九千二百師古曰奉音扶用反其下亦同廩食太官師古曰謂太官給其食又䝉賞賜四時雜繒緜絮衣服酒肉諸果物徳厚甚深疾病侍醫臨治師古曰侍醫天子之醫也賴陛下神靈不死而活又拜為光禄大夫秩二千石奉錢月萬二千禄賜愈多家日以益富身日以益尊誠非少茅愚臣所當䝉也師古曰􅋄古草字伏自念終亡以報厚徳日夜慙愧而已臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸禄洿}
