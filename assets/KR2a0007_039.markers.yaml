  - {type: variant, offset: 2010, length: 3, content: 焉荒王, WYG: 十合攻城畧地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也師古曰顧猶反也上曰諸君知獵乎曰知之知獵狗乎曰知之宋祁曰謝郭本去知獵狗乎曰知之七字上曰夫獵追殺獸者狗也而發縱指示獸處者人也師古曰發縱謂觧紲而放之也指示者以手指示之今俗言放狗縱音子用反而讀者乃為蹤蹟之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也今諸君徒能走得獸耳功狗也至於蕭何發縱指示功人也且諸君獨以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也羣臣後皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一上已橈功臣多封何應劭曰橈屈也師古曰音}
