  - {type: variant, offset: 1995, length: 5, content: 連奏坐削或, WYG: 距京索閒師古曰索音山客反上數使使勞苦丞相師古曰勞音來到反以下亦同鮑生謂何曰師古曰鮑生當時有識之士姓鮑而為諸生也今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大説師古曰説讀曰悦漢五年已殺項羽即皇帝位論功行封羣臣爭功歲餘不決上以何功最盛先封為酇侯文頴曰音贊師古曰先封何者謂諸功臣舊有爵者何最在前封也酇屬南陽觧在髙紀宋祁曰索隐鄒氏云鄼屬沛郡音嵯屬南陽音賛又臣瓉按茂陵書蕭何國在南陽則字當音賛今多呼為嵯也食邑八}
