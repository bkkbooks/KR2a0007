  - {type: variant, offset: 2453, length: 0, content: '', WYG: 言相國彊賤買民田宅數千人上至何謁上笑曰今相國廼利民民所上書皆以與何曰君自謝民後何為民請曰長安地陿上林中多空地棄願令民得入田毋收槀為獸食師古曰槀禾稈也言恣人田之}
  - {type: variant, offset: 2453, length: 0, content: '', krp: 言相國彊賤買民田宅數千人上至何謁上笑曰今相國廼利民民所上書皆以與何曰君自謝民後何為民請曰長安地陿上林中多空地棄願令民得入田毋收槀為獸食師古曰槀禾稈也言恣人田之}
  - {type: variant, offset: 2454, length: 5, content: 拜奏謀篡死, WYG: 收其槀税也槀音工老反稈音工旱反劉攽曰言毋收藁草為獸食而已上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衞尉侍如淳曰百官公卿表衞尉王氏無名字師古曰史失之也侍謂侍天子也前問曰相國胡大}
