  - {type: variant, offset: 2571, length: 2, content: 請收, WYG: 求問蕭相國後在者得𤣥孫建世等十二人復下詔以鄼户二千封建世為鄼侯傳子至孫獲坐使奴殺人減死論成帝時復封何𤣥孫之子南䜌長喜為鄼侯蘇林曰䜌音人足攣躃之攣鉅鹿縣名也師古曰喜為此縣之長傳子至曾孫}
