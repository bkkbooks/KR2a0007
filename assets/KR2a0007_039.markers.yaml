  - {type: variant, offset: 2451, length: 0, content: '', WYG: 皆食邑乃益封何二千户以嘗繇咸陽時何送我獨贏錢二也師古曰贏餘也二謂二百也衆人送皆三百何獨五百故云贏二也陳豨反上自將至邯鄲而韓信謀反關中呂后用何計誅信語在信傳上已聞誅信使使拜丞相為相國益封五千户令卒五百人一都尉為相國衞諸君皆賀召平獨弔師古曰召讀曰邵召平者故秦東陵侯秦破為布衣貧種𤓰長安城東𤓰美故世謂東陵𤓰從召平始也平謂何曰禍自此始矣上暴露於外而君守於内非被矢石之難而益君封置衞者以今者淮隂新反於中有疑君心夫置衞衞君非以寵君也師古曰恐其為變故守衞之宋祁曰浙本句末有也字願君讓封勿受悉以家私財佐軍何從其計上説師古曰説讀曰悦其秋黥布反上自將擊之宋祁云舊本作上自將軍浙本無軍字數使使問相國何為師古曰問其居守何所營為曰為上在軍拊循勉百姓悉所有佐軍如陳豨時師古曰悉盡也盡所有糧食資用出以佐軍也客又説何曰君滅族不乆矣夫君位為相國功第一不可復加然君初入關本得百姓心十餘年矣皆附君尚復孳孳得民和師古曰孳字與孜同孜孜言不怠也宋祁曰注文怠一作逮上所謂數問君宋祁曰此疑有者字畏君傾動關中今君胡不多買田地賤貰貣以自汙上心必安師古曰貰賖也貣音土得反於是何從其計上乃大説上罷布軍歸民道􅃒行師古曰在道上􅃒天子行}
