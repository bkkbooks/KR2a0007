  - {type: variant, offset: 2149, length: 299, content: 莫遠具爾今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥強劾立傅致難明之事獨以偏辭成辠斷獄亡益於治道汙衊宗室以內亂之惡披布宣揚於天下非所以為公族隱諱增朝廷之榮華昭聖德之風化也臣愚以為王少而父同產長年齒不倫梁國之富足以厚聘美女招致妖麗父同產亦有恥辱之心案事者乃驗問惡言何故猥自發舒以三者揆之殆非人情疑有所迫切過誤失言文吏躡尋不得轉移萌牙之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上德通理之吏更審考清問著不然之效定失誤之法而反命於下吏以廣公族附疏之德為宗室刷汙亂之恥甚得治親之誼天子由是寢而不治居數歲元延中立復以公事怨相掾及睢陽丞使奴殺之殺奴以滅口凡殺三人傷五人手敺郎吏二, WYG: ''}
