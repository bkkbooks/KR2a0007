  - {type: variant, offset: 1140, length: 817, content: 宮年使從季父往來送迎則連年不絕有司奏年淫亂年坐廢為庶人徙房陵與湯沐邑百戶立三年國除元始二年新都侯王莽興滅繼絕白太皇太后立年弟子如意為廣宗王奉代孝王後莽篡位國絕梁懷王揖文帝少子也好詩書帝愛之異於他子五年一朝凡再入朝因墮馬死立十年薨無子國除明年梁孝王武徙王梁梁孝王子五人為王太子買為梁共王次子明為濟川王彭離為濟東王定為山陽王不識為濟陰王皆以孝景中六年同日立梁共王買立十年薨子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅武帝弗忍廢為庶人徙房陵國除濟東王彭離立二十九年彭離驕悍昏莫私與其奴亡命少年數十人行剽殺人取財物以為好所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢為庶人徙上庸國除為大河郡山陽哀王定立九年薨亡子國除濟陰哀王不識立一年薨亡子國除孝王支子四王皆絕於身梁平王襄母曰陳太后共王母曰李太后李太后親平王之大母也而平王之后曰任后任后甚有寵於襄初孝王有罍尊直千金戒後世善寶之毋得以與人任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百鉅萬猶自恣任后絕欲得之王襄直使人開府取尊賜任后又王及母陳太后事李太后多不順有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與爭門措指太后啼謼不得見漢使者李太后亦私與食官長及郎尹霸等姦亂王與任后以此使人風止李太后李太后亦已後病薨病時任后未嘗請疾薨又不侍喪元朔中睢陽人犴反人辱其父而與睢陽太守客俱出同車犴反殺其仇車上亡去睢陽太守怒以讓梁二千石二千石以下求反急執反親戚反知國陰事乃上變告梁王與大母爭尊狀時相以下具知之欲以傷梁長吏書聞天子下吏驗問有之公卿治奏以為不孝請誅王及太后天子曰首惡失道任后也朕置相吏不逮無以輔王故陷不誼不忍致法削梁王五縣奪王太后湯沐成陽邑梟任后首于市中郎胡等皆伏誅梁餘尚有八城襄立四十年薨子頃王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣鴻嘉中太傅輔奏立一日至十一犯法臣下愁苦莫敢親近不可諫止願令王非耕祠法駕毋得出宮盡出馬置外苑, WYG: ''}
