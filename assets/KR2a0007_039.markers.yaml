  - {type: variant, offset: 2892, length: 0, content: '', WYG: 事也第一即是課最上不必有事字舊讀恐非漢王怒謀欲攻項羽云云臣召南按漢王就國漢中一叚此史記所缺而班氏補之何為漢功臣之首宜也先封為酇侯注師古曰謂諸功臣舊有爵者何最在前封也臣召南按功臣表六年十二月甲申封曹參靳歙夏侯嬰王吸傅寛召歐薛歐陳濞陳嬰陳平凡十侯至正月丙午封張良劉纒蕭何周勃樊噲酈商灌嬰周昌武虎董渫孔聚陳賀陳豨共十三侯其餘功臣未封者尚多即上文所云羣臣爭功歲餘不决者也注舊有爵者疑應作未封爵者而發縱指示獸處者人也注洪氏隸釋曰蹤縱据漢人數碑固多借用顔注殆未然也列侯畢已受封奏位次臣召南按十八侯位次定於此時是日悉封何父母兄弟十餘人父母史記作父子上已聞誅信使使拜丞相為相國臣召南按丞相紫綬相國則緑綬矣漢初相國惟何及曹參二人自參薨後即仍稱丞相又按何為相國在淮隂既誅之後此傳甚明而公卿表乃列於九年誤也若在九年則豨尚未叛信尚未誅矣當以此傳為正在十一年曹參傳攻秦監公軍注晋灼曰按髙紀名平也臣召南按監泗水郡御史名平不特髙紀可証夏侯嬰傳從攻胡陵嬰與蕭何降泗水監平平以胡陵降即此監公也北擊司馬欣軍碭東臣召南按司馬欣史記作司馬尼是也髙紀作司馬􅊂樊噲傳與司馬􅊂戰碭東即此人尼􅊂二字相似未知孰正但必非長史司馬欣耳守景陵二十三日史記作二十日告舍人趣治行注師古曰舍人猶家人也胡三省曰据戰國䇿蘇秦使舍人資送張儀入秦李斯為吕不韋舍人謂為私屬官可也以為主家事則拘矣講若畫一講史記作顜徐廣曰顜}
