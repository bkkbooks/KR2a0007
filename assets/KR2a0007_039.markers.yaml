  - {type: variant, offset: 1979, length: 0, content: '', WYG: 律令圖書臧之沛公具知天下阸塞户口多少彊弱處民所疾苦者以何得秦圖書也初諸侯相與約先入關破秦者王其地沛公既先定秦項羽後至欲攻沛公沛公謝之得解羽遂屠燒咸陽與范增謀曰巴蜀道險秦之遷民皆居蜀廼曰蜀漢亦關中地也故立沛公為漢王而三分關中地王秦降將以距漢王宋祁曰浙本距字下有塞字漢王怒欲謀攻項羽周勃灌嬰樊噲皆勸之何諌之曰宋祁曰謝郭去之字浙本無之字雖王漢中之惡不猶愈於死乎漢王曰何為乃死也宋祁曰乃字疑作廼何曰今衆弗如百戰百敗不死何為周書曰天予不取反受其咎師古曰周書者本與尚書同類蓋孔子所刪百篇之外劉向所奏有七十一篇語曰天漢其稱甚美孟康曰語古語也言地之有漢若天之有河漢名號休美臣瓚曰流俗語云天漢其言常以漢配天此美名也師古曰瓚説是也天漢河漢也宋祁曰注文河漢當作天河夫能詘於一人之下而信於萬乗之上者湯武是也師古曰信讀曰伸古通用字臣願大王王漢中飬其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相何進韓信漢王以為大將軍説漢令引兵東定三秦宋祁曰浙本説漢字下有王字語在信傳何以丞相留收巴蜀填撫諭告師古曰填音竹刃反使給軍食漢二年漢王與諸侯擊楚何守關中侍太子治櫟陽為令約束立宗廟社稷宮室縣邑輒奏上可許以從事師古曰可其所奏許其所}
