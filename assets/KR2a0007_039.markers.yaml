  - {type: variant, offset: 57, length: 167, content: 代王四年徙為淮陽王十二年徙梁自初王通歷已十一年矣孝王十四年入朝十七年十八年比年入朝留其明年乃之國二十一年入朝二十二年文帝崩二十四年入朝二十五年復入朝是時上未置太子與孝王宴飲從容言曰千秋萬歲後傳於王王辭謝雖知非至言然心內喜太后亦然其春吳楚齊趙七國反先擊梁棘壁殺數萬人梁王城守睢陽而使韓安國張羽等為將軍以距吳楚吳楚以梁為限不敢過而西與太尉, WYG: 丞相}
