  - {type: variant, offset: 2464, length: 1, content: 誅, WYG: 吾苑以自媚於民師古曰媚愛也取愛於民故繫治之王衞尉曰夫職事茍有便於民而請之眞宰相事也陛下柰何乃疑相國受賈民錢乎宋祁曰浙本作民人且陛下距楚數歲陳豨黥布反時陛下自將往當是時相國守關中關中揺足則關西非陛下有也相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也}
