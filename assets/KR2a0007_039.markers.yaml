  - {type: variant, offset: 2578, length: 6, content: 留獄明詔加恩, WYG: 追至濮陽攻定陶取臨濟南救雍丘擊李由軍破之殺李由虜秦候一人章邯破殺項梁也沛公與項羽引兵而東楚懐王以沛公為碭郡長將碭郡兵於是乃封參執帛鄭氏曰楚爵也張晏曰孤卿也號曰建成君遷為戚公屬碭郡師古曰為戚縣之令其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻杠里大破之追北西至開封擊趙賁軍破之師古曰賁音奔圍趙賁開封城中西擊秦將楊熊軍於曲遇師古曰曲音丘羽反遇音顒破之虜秦司馬及御史各一人遷為執珪張晏曰侯伯執珪以朝位比之如淳曰呂氏春秋得伍員者位執珪古爵名也從西攻陽武下轘轅緱氏絶河津擊趙賁軍尸北破之孟康曰尸郷之北從南攻犨與南陽守齮戰陽城郭東應劭曰今堵陽䧟陳取宛虜齮定南陽郡師古曰髙紀言南陽守齮降封為殷侯而此傳言虜齮紀傳不同疑傳誤從西攻武關嶢關取之師古曰嶢音堯前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定三秦攻下辨故道鄧展曰武都二縣也雍斄蘇林曰右扶風二縣也斄音胎擊章平軍於好畤南破之圍好畤取壤郷文頴曰壤地名也擊三秦軍壤東及髙櫟破之師古曰櫟音歴}
