  - {type: variant, offset: 2493, length: 0, content: '', WYG: 赦出何何年老素恭謹徒跣入謝上曰相國休矣師古曰令出外自休息相國為民請苑吾不許宋祁曰越本作相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過髙祖崩何事惠帝何病上親自臨視何疾宋祁曰浙本無親字因問曰君}
