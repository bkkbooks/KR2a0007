  - {type: variant, offset: 2494, length: 5, content: 訊至移書傅, WYG: 百歲後誰可代君對曰知臣莫若主帝曰曹參何如何頓首曰帝得之矣何死不恨矣何買田宅必居窮辟處師古曰辟讀曰僻僻隐也為家不治垣屋師古曰垣墻也曰令後世賢師吾儉不賢毋為埶家所奪孝惠二年何薨諡曰文終侯子禄嗣薨無子髙后廼封何夫人同為鄼侯小子延為筑陽侯師古曰鄼及筑陽皆南陽縣也今其地並屬襄州筑音逐孝文元年罷同更封延為鄼侯薨子遺嗣薨無子文帝復以遺弟則嗣有罪免景帝二年制詔御史故}
