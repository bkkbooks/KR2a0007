  - {type: variant, offset: 295, length: 7, content: 是孝王築東苑方, WYG: 文毋害毋害者取其為人毋害於行則可以為吏矣文毋害者蓋其時擇吏之二事也亞夫所以稱禹無害亷其一節也故韓信乂云無行不得推擇為吏餘説太汎髙祖為布衣時數以吏事䕶髙祖髙祖為亭長常佑之師古曰佑助也言居家時為何所䕶及為亭長何又擁助也宋祁曰注文也字當作之字髙祖以吏繇咸陽師古曰繇讀曰傜傜役也吏皆送奉錢三何獨以五師古曰出錢以資行他人皆}
