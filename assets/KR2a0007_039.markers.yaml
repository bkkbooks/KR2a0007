  - {type: variant, offset: 391, length: 570, content: 官至中尉號曰公孫將軍多作兵弩弓數十萬而府庫金錢且百鉅萬珠玉寶器多於京師二十九年十月孝王入朝景帝使使持乘輿駟迎梁王於關下既朝上疏因留以太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者著引籍出入天子殿門與漢宦官亡異十一月上廢栗太子太后心欲以梁王為嗣大臣及爰盎等有所關說於帝太后議格孝王不敢復言太后以嗣事事祕世莫知乃辭歸國其夏上立膠東王為太子梁王怨爰盎及議臣乃與羊勝公孫詭之屬謀陰使人刺殺爰盎及他議臣十餘人賊未得也於是天子意梁逐賊果梁使之遣使冠蓋相望於道覆案梁事捕公孫詭羊勝皆匿王後宮使者責二千石急梁相軒丘豹及內史安國皆泣諫王王乃令勝詭皆自殺出之上由此怨望於梁王梁王恐乃使韓安國因長公主謝罪太后然後得釋上怒稍解因上書請朝既至關茅蘭說王使乘布車從兩騎入匿於長公主園漢使迎王王已入關車騎盡居外外不知王處太后泣曰帝殺吾子帝憂恐於是梁王伏斧質之闕下謝罪然後太后帝皆大喜相與泣復如故悉召王從官入關然帝益疏王不與同車輦矣三十五年冬復入朝上疏欲留上弗許歸國意忽忽不樂北獵梁山有獻牛足上出背上孝王惡之六月中病熱六日薨孝王慈孝每聞太后病口不能食常欲留長安侍太后太后亦愛之及聞孝王死竇太后泣極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王女五人皆令食湯沐邑奏之太后太后乃說為帝壹餐孝王未死時財以鉅萬計不可勝數及死藏府餘黃金尚四十餘萬斤他, WYG: 帛}
