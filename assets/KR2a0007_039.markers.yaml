  - {type: variant, offset: 2623, length: 0, content: '', WYG: 從漢王出臨晉關至河内下修武度圍津師古曰在東郡東擊龍且項佗定陶破之師古曰且音子餘反佗音徒河反東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍丘王武反於外黄程處反於燕服䖍曰皆漢將師古曰燕東郡之縣故南燕國音一千反往擊盡破之柱天侯反於衍氏進破取衍氏擊羽嬰於昆陽追至葉師古曰葉南陽縣也音式涉反還攻武彊師古曰武彊城在陽武因至滎陽參自漢中為將軍中尉從擊諸侯及項王敗還至滎陽師古曰敗謂戰彭城而敗漢二年拜為假左丞相入屯兵關中月餘魏王豹反以假丞相宋祁曰浙本假字下有左字别與韓信東攻魏將孫遫東張蘇林曰東張屬河東師古曰遫古速字宋祁曰浙本正文遫字下有軍字大破之因攻安邑得魏將王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地凡五十二縣賜食邑平陽因從韓信擊趙相國夏説軍於鄔東蘇林曰鄔太原縣也師古曰説讀曰悦鄔音一戸反又音乙據反大破之斬夏説韓信與故常山王張耳引兵下井陘擊成安君陳餘而令參還圍趙别將戚公於鄔城中戚公出走追斬之廼引兵詣漢王在所韓信已破趙為相國東擊齊參以左丞相屬焉攻破齊歴下軍遂取臨淄還定濟北郡收著漯隂平原鬲盧師古曰五縣名也時未有濟北郡史追書之耳著音竹庻反又音直庻反漯音它合反鬲與隔同已而從韓信擊龍且軍於上假密文頴曰或以為髙密大破之斬龍且虜亞將周蘭師古曰亞將次將也定齊郡凡得七十縣得故齊王田廣相田光其守相許章及故將軍田既師古曰守相為相居守者韓信立為齊王引兵東詣陳與漢王共破項羽而參留平齊未服者漢王即皇帝位韓信徙為楚王參歸相印焉髙祖以長子肥為齊王而以參為相國宋祁曰相國字上當有齊字髙祖六年與諸侯剖符賜參爵列侯食邑平陽萬六百三十户世世勿絶參以齊相國擊陳豨將張春破之黥布反參從悼惠王將車騎十二萬與髙祖會擊黥布軍大破之南至蘄還定竹邑相蕭留師古曰四縣名參功凡下二國縣百二十二得王二人相三人將軍六人大莫嚻郡守司馬候御史各一人如淳曰嚻音敖張晏曰莫敖楚卿號也時近六國故有令尹莫敖之官孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數師古曰數音所具反言人人殊參未知所定聞膠西有蓋公師古曰蓋音古盍反善治黄老言張晏曰黄帝老子之書使人厚幣請之既見蓋公蓋公為言治道貴清静而民自定推此類具言之參於是避正堂舍蓋公焉師古曰舍止也其治要用黄老術故相齊九年齊國安集大稱賢相蕭何薨參聞之告舍人趣治行師古曰舍人猶家人也一説私屬官主家事者也趣讀曰促謂速也治行謂脩治行装也宋祁曰浙木注文作猶言家人也吾且入相居無何使者果召參參去屬其後相師古曰屬音之欲反曰以齊獄市為寄愼勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之孟康曰夫獄市者兼受善惡若窮極姦人姦人無所容竄乆且為亂秦人極刑而天下畔孝武峻法而獄繁此其効也師古曰老子云我無為民自化我好静民自正參欲以道化為本不欲擾其末也宋祁曰浙本注文無師古曰三字始參微時與蕭何善及為宰相有隙師古曰參自以戰闘功多而封賞每在何後故怨何也劉奉世曰此特師古意料之爾至何且死所推賢唯參參代何為相國舉事無所變更壹遵何之約束師古曰舉皆也言凡事皆無變改擇郡國吏長大孟康曰取年長大者訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輙斥去之師古曰斥郤也日夜飲酒卿大夫以下吏及賔客見參不事事如淳曰不事丞相之事來者皆欲有言至者參輙飲以醇酒師古曰醇酒不澆謂厚酒也度之欲有言復飲酒醉而後去師古曰度音大各反飲音於禁反終莫得開説如淳曰開謂有所啓白以為常相舍後園近吏舍吏舍日飲歌呼師古曰呼音火故反其下並同從吏患之無如何師古曰從吏吏之常從相者也從音材用反廼請參遊後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲師古曰張設坐席而飲也坐音才卧反大歌呼與相和參見人之有細過掩匿覆蓋之府中無事參子窋為中大夫師古曰窋音張律反惠帝怪相國不治事以為豈少朕與師古曰言豈以我為年少故也與讀曰歟廼謂窋曰女歸試私從容問乃父師古曰乃汝也曰髙帝新棄羣臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告女也窋既洗沐歸時間自從其所諫參師古曰間謂空隙也自從其所猶言自出其意也參怒而笞之二百曰趣入侍師古曰趣讀曰促天下事非乃所當言也至朝時帝讓參師古曰讓責也曰與窋胡治乎師古曰胡何也言共窋為何治也治音丈吏反乃者我使諌君也師古曰乃者猶言曩者參免冠謝曰陛下自察聖武孰與髙皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢宋祁曰浙本觀參字下有能字上曰君似不及也參曰陛下言之是也且髙皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣師古曰且令出休息參為相國三年薨諡曰懿侯百姓歌之曰蕭何為法講若畫一文穎曰講或作較師古曰講和也畫一言整齊也曹參代之守而勿失載其清靖民以寜壹師古曰載猶乗也窋嗣侯髙后時至御史大夫傳國至曾孫襄武帝時為將軍擊匈奴薨子宗嗣有罪完為城旦至哀帝時乃封參𤣥孫之孫本始為平陽侯二千户王莽時薨子宏嗣建武中先降河北封平陽侯至今八侯劉攽曰八侯字疑衍贊曰蕭何曹參皆起秦刀筆吏師古曰刀所以削書也古者用簡牒故吏}
