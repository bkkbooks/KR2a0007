  - {type: variant, offset: 2574, length: 3, content: 璽綬送, WYG: 莽敗乃絶曹參沛人也秦時為獄掾而蕭何為主吏居縣為豪吏矣師古曰言參及蕭何並為吏之豪長也髙祖為沛公也參以中涓從如淳曰中涓如中謁者也師古曰涓潔也言其在内主知潔清􅎈埽之事盖親近左右也擊胡陵方與師古曰音房豫攻秦監公軍大破之孟康曰監御史監郡者公名也晋灼曰案髙紀名平也秦一郡置守尉監三人師古曰公者時人尊稱之耳晋説是也東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置文頴曰善置置名也晋灼曰祁音坻師古曰狐父祁二縣名也祁音鉅夷反又音十夷反父音甫置若今之驛也又攻下邑以西至虞擊秦將章邯車騎攻轅戚及亢父師古曰亢父音抗甫先登遷為五大夫北救東阿擊章邯軍䧟}
