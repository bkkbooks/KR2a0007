  - {type: variant, offset: 2292, length: 0, content: '', WYG: 然當時在朝常趨和承意師古曰趨讀曰趣趣向也和音胡臥反不敢甚斥臧否漢征匈奴招四夷天下費多財用益屈師古曰屈盡也音其勿反當時為大司農任人賔客僦晉灼曰當時為大司農而任使其賔客辜較作僦也師古曰僦謂受顧賃而載運也言當時保任其賔客於司農載運也僦音子就反入多逋負司馬安為淮陽太守發其事當時以此陷罪贖為庻人頃之守長史如淳曰丞相長史也遷汝南太守數嵗以官卒昆弟以當時}
