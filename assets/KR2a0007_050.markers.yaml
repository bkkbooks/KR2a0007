  - {type: variant, offset: 30, length: 6, content: 卒千人郡又多, WYG: 爭以亟疾苛察相高師古曰亟急也音居力反其敝徒文具亡惻隠之實師古曰文具謂具文而已以故不聞其過陵夷至於二世天下土崩師古曰陵夷穨替也解在成紀今陛下以嗇夫口辯而超遷之臣恐天下隨風靡爭口辯亡其實且下之化上疾於景嚮舉錯不可不察也師古曰嚮讀曰響錯音干故反文帝曰善迺止不拜嗇夫就車召釋之驂乗徐行行問釋之秦之敝師古曰行問且行且問也具以質言如淳曰質誠也至宮上拜釋之}
