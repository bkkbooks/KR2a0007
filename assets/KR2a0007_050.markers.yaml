  - {type: variant, offset: 288, length: 1675, content: 當行者或亡逃自賊殺亦非人臣之節也夫邊郡之士聞熢舉燧燔皆攝弓而馳荷兵而走流汗相屬惟恐居後觸白刃冒流矢議不反顧計不旋踵人懷怒心如報私讎彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮遠急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯居列東第終則遺顯號於後世傳土地於子孫事行甚忠敬居位甚安佚名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤埜屮而不辭也今奉幣使至南夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不遠哉然此非獨行者之罪也父兄之教不先子弟之率不謹寡廉鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使曉諭百姓以發卒之事因數之以不忠死亡之罪讓三老孝弟以不教誨之過方今田時重煩百姓已親見近縣恐遠所谿谷山澤之民不徧聞檄到亟下縣道咸喻陛下意毋忽相如還報唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二歲道不成士卒多物故費以億萬計蜀民及漢用事者多言其不便是時卭莋之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷上問相如相如曰卭莋冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈於南夷上以為然乃拜相如為中郎將建節往使副使者王然于壺充國呂越人馳四乘之傳因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交驩卓王孫喟然而歎自以得使女尚司馬長卿晚乃厚分與其女財與男等相如使略定西南夷卭莋冉駹斯榆之君皆請為臣妾除邊關邊關益斥西至沬若水南至牂牁為徼通靈山道橋孫水以通卭莋還報天子大說相如使時蜀長老多言通西南夷之不為用大臣亦以為然相如欲諫業已建之不敢乃著書藉蜀父老為辭而己詰難之以風天子且因宣其使指令百姓皆知天子意其辭曰漢興七十有八載德茂存乎六世威武紛云湛恩汪濊群生霑濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定莋存卭略斯榆舉苞蒲結軌還轅東鄉將報至于蜀都耆老大夫搢紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之於夷狄也其義羈縻勿絕而已今罷三郡之士通夜郎之塗三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之累也竊為左右患之且夫卭莋西僰之與中國並也歷年茲多不可記已仁者不以德來強者不以力并意者殆不可乎今割齊民以附夷狄弊所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕尚惡聞若說然斯事體大固非觀者之所覯也余之行急其詳不可得聞已請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也故曰非常之元黎民懼焉及臻厥成天下晏如也昔者洪水沸出氾濫衍溢民人升降移徙崎嶇而不安夏后氏戚之乃堙洪原決江疏河灑沈澹災東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬傶骿胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎于茲且夫賢君之踐位也豈特委瑣握齪拘文牽俗循誦習傳當世取說云爾哉必將崇論谹議創業垂統為萬世規故馳騖乎兼容并包而勤思乎參天貳地且詩不云乎普天之下莫非王土率土之濱莫非王臣是以六合之內八方之外浸淫衍溢懷生之物有不浸潤於澤者賢君恥之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絕異黨之域舟車不通人迹罕至政教未加流風猶微內之則犯義侵禮於邊境外之則邪行橫作放殺其上君臣易位尊卑失序父兄不辜幼孤為奴虜係絫號泣內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺己舉踵思慕若枯旱之望雨盭夫為之垂涕況乎上聖又烏能已故北出師以討強胡南馳使以誚勁越四面風德二方之君鱗集仰流願得受號者以億計故乃關沬若徼牂牁鏤靈山梁孫原創道德之塗垂仁義之統將博恩廣施遠撫長駕使疏逖不閉曶爽闇昧得燿乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沈溺奉至尊之休德反衰世之陵夷繼周氏之絕業天子之急務也百姓雖勞又惡可以已哉且夫王者固未有不始於憂勤而終於佚樂者也然則受命之符合在於此方將增太山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩指聽者未聞音猶焦朋已翔乎寥廓而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來失厥所以進喟然並稱曰允哉漢德此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭避, WYG: ''}
