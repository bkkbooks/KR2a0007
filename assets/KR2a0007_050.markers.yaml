  - {type: variant, offset: 169, length: 118, content: 君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆鄉風慕義欲為臣妾道里遼遠山川阻深不能自致夫不順者已誅而為善者未賞故遣中郎將往賓之發巴蜀之士各五百人以奉幣衛使者不然靡有兵革之事戰鬭之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意, WYG: 上良久曰廷尉當是}
