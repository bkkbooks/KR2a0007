  - {type: 'tls:seg', offset: 2536, content: '', id: KR2a0007_tls_050-22a.14}
  - {type: variant, offset: 2536, length: 820, content: 乃遂奏大人賦其辭曰世有大人兮在乎中州宅彌萬里兮曾不足以少留悲世俗之迫隘兮朅輕舉而遠游乘絳幡之素蜺兮載雲氣而上浮建格澤之修竿兮總光燿之采旄垂旬始以為幓兮曳彗星而為髾掉指橋以偃寋兮又猗抳以招搖㩜攙搶以為旌兮靡屈虹而為綢紅杳眇以玄湣兮猋風涌而雲浮駕應龍象輿之蠖略委麗兮驂赤螭青虬之蚴蟉宛蜒低卬夭蟜裾以驕驁兮詘折隆窮躩以連卷沛艾赳螑仡以佁儗兮放散畔岸驤以孱顏跮踱輵螛容以骫麗兮蜩蟉偃寋怵㚟以梁倚糾蓼叫奡踏以𦟣路兮薎蒙踊躍騰而狂趭莅颯芔歙焱至電過兮煥然霧除霍然雲消邪絕少陽而登太陰兮與真人乎相求互折窈窕以右轉兮橫厲飛泉以正東悉徵靈圉而選之兮部署眾神於搖光使五帝先導兮反大壹而從陵陽左玄冥而右黔雷兮前長離而後矞皇廝征伯僑而役羨門兮詔岐伯使尚方祝融警而蹕御兮清氣氛而后行屯余車而萬乘兮綷雲蓋而樹華旗使句芒其將行兮吾欲往乎南娭歷唐堯於崇山兮過虞舜於九疑紛湛湛其差錯兮雜遝膠輵以方馳騷擾衝蓯其紛挐兮滂濞泱軋麗以林離攢羅列聚叢以蘢茸兮衍曼流爛痑以陸離徑入雷室之砰磷鬱律兮洞出鬼谷之堀礨崴魁徧覽八紘而觀四海兮朅度九江越五河經營炎火而浮弱水兮杭絕浮渚涉流沙奄息蔥極氾濫水娭兮使靈媧鼓琴而舞馮夷時若曖曖將混濁兮召屏翳誅風伯刑雨師西望崑崙之軋沕荒忽兮直徑馳乎三危排閶闔而入帝宮兮載玉女而與之歸登閬風而遙集兮亢鳥騰而壹止低徊陰山翔以紆曲兮吾乃今日覩西王母暠然白首戴勝而穴處兮亦幸有三足烏為之使必長生若此而不死兮雖濟萬世不足以喜回車朅來兮絕道不周會食幽都呼吸沆瀣兮餐朝霞咀噍芝英兮嘰瓊華僸祲尋而高縱兮紛鴻溶而上厲貫列缺之倒景兮涉豐隆之滂濞騁游道而脩降兮騖遺霧而遠逝迫區中之隘陜兮舒節出乎北垠遺屯騎於玄闕兮軼先驅於寒門下崢嶸而無地兮上嵺廓而無天視眩泯而亡見兮聽敞怳而亡聞乘虛亡而上遐兮超無友而獨存相如既奏大人賦天子大說飄飄有陵雲氣游天地之閒意相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死, WYG: 當}
