  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_050-bkkpn1}
  - {type: variant, offset: 8, length: 1, content: 七, WYG: 張釋之字季南陽堵陽人也師古曰堵音者索隠堵韋昭音褚又音如字地名屬南陽與兄仲同居以貲為騎郎蘇林曰雇錢若出榖也如淳曰漢注貲五百萬得為常侍郎師古曰如説是也事文帝十年不得調師古曰調選也音徒釣反宋祁曰百官公卿表云孝文三年中郎将張釋之為廷尉此傳云文帝十年不得調恐必有誤也亡所知名釋之曰久宦减仲之産不遂師古曰遂猶逹宋祁曰逹字}
  - {type: page-break, offset: 8, content: '', id: KR2a0007_WYG_050-1b, image: WYG0250/WYG0250-0155d.png}
