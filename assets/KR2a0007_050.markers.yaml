  - {type: variant, offset: 2261, length: 0, content: '', WYG: 侯信服䖍曰景帝王皇后凡也信任宏蘇林曰任保舉官亦再至九卿然衞人仕者皆嚴憚汲黯出其下鄭當時字荘陳人也其先鄭君嘗事項籍籍死而屬漢髙祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時當時以任侠自喜脫張羽於阸服䖍曰梁孝王将楚相之弟也師古曰喜音許吏反脱音佗活反聲聞梁楚間孝景時為太子舍人每五日洗沬常置驛馬長安諸郊如淳曰郊交道四通處也以請賔客便臣瓚曰長安四靣郊祀之處閑静可以請賔客也師古曰二説皆非也此謂長安城外四靣之郊耳邑外謂之郊近郊二十里劉奉世曰近郊乃三十里蓋字誤然不必分别逺近請謝賔客夜以繼日至}
