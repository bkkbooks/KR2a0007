  - {type: variant, offset: 2265, length: 0, content: '', WYG: 年少官薄劉攽曰其慕長者禮意不稱所自見即以為慊然自見當屬上句然其知友皆大父行天下有名之士也師古曰大父謂祖父音胡浪反武帝即位當時稍遷為魯中尉濟南太守江都相至九卿為右内史以武安魏其時議貶秩為詹事師古曰議田蚡及竇嬰事遷為大司農當時為大吏戒門下客至亡貴賤亡留門下者宋祁曰卲本無下字執賔主之禮以其貴下人性廉又不治産卬奉賜給諸公師古曰卬音牛向反奉音扶用反然其餽遺人不過具器食師古曰猶今言一盤食也每朝候上間説未嘗不言天下長者師古曰候天子間隙之時其所稱説皆言長者也其推轂士及官屬丞史誠有味其言也師古曰推轂言薦舉人如推轂之運轉也有味者其言甚羙也常引以為賢}
