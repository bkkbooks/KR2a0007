  - {type: variant, offset: 3915, length: 248, content: 恧焉或謂且天為質闇示珍符固不可辭若然辭之是泰山靡記而梁父罔幾也亦各並時而榮咸濟厥世而屈說者尚何稱於後而云七十二君哉夫修德以錫符奉符以行事不為進越也故聖王弗替而修禮地祇謁款天神勒功中岳以章至尊舒盛德發號榮受厚福以浸黎民皇皇哉斯事天下之壯觀王者之卒業不可貶也願陛下全之而后因雜縉紳先生之略術使獲曜日月之末光絕炎以展采錯事猶兼正列其義祓飾厥文作春秋一藝將襲舊六為七攄之無窮俾萬世得激清流揚微波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其儀而覽焉於是天子沛然改容曰俞乎朕其試哉乃遷思回慮總, WYG: 召南按}
