  - {type: variant, offset: 2186, length: 0, content: '', krp: 已在其位縱愛身柰辱朝廷何黯多病病且滿三月上常賜告者數終不瘉如淳曰杜欽所謂病滿賜告詔恩也數者非一也師古曰數音所角反瘉與愈同最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以瘉人師古曰瘉勝也讀與愈同然至其輔少主守成雖自謂賁育弗能奪也師古曰孟賁夏育皆古之勇士也賁音奔上曰然古有社稷之臣至如汲黯近之矣大将軍青侍中上踞厠視之如淳曰厠溷也孟康曰厠床邉側也師古曰如説是也劉奉世曰厠當從孟説古者見大臣則御坐為起然則踞厠者輕之也丞相𢎞宴見上或時不冠至如見黯不冠不見也上甞坐武帳應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟説是也黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此張湯以更定律令為廷尉師古曰更改也黯質責湯於上前師古曰質對之也曰公為正卿上不能襃先帝之功業下不能化天下之邪心安國富民使囹圄空虚何空取高皇帝約束紛更之為師古曰言何為乃紛亂而改更也而公以此無種矣師古曰言當誅及子孫也黯時與湯論議湯辯常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣師古曰重累其足言懼甚也仄古側字也是時漢方征匈奴招懐四夷黯務少事間常言與胡和親毋起兵師古曰每因間隙而言也上方鄉儒術師古曰鄉讀曰嚮尊公孫𢎞及事益多吏民巧宋祁曰遷史作吏民巧弄上分别文法湯等數決讞以幸而黯常毁儒而觸𢎞等徒懐詐飾智以阿人主取容而刀筆之吏專深文巧詆師古曰詆毁辱也音丁禮反䧟人於罔以自為功上愈益貴𢎞湯𢎞湯心疾黯雖上亦不説也師古曰説讀曰悦欲誅之以事師古曰以事致其罪而誅也𢎞為丞相廼言上曰右内史界部中多貴人宗室難治非素重臣弗能任請徙黯為右内史數歳官事不廢大将軍青既益尊姊為皇后然黯與亢禮或説黯曰自天子欲令羣臣下大将軍師古曰下音胡稼反大将軍尊貴誠重君不可以不拜黯曰}
  - {type: variant, offset: 2187, length: 2, content: 清道, WYG: 以大将軍有揖客反不重耶師古曰言能降貴以禮士最為重也大将軍聞愈賢黯數請問以朝廷所疑遇黯加於平日淮南王謀反憚黯曰黯好直諫守節死義至説公孫𢎞等如發䝉耳師古曰説音式鋭反上既數征匈奴有功黯言益不用始黯列九卿矣}
  - {type: variant, offset: 2187, length: 2, content: 清道, krp: 以大将軍有揖客反不重耶師古曰言能降貴以禮士最為重也大将軍聞愈賢黯數請問以朝廷所疑遇黯加於平日淮南王謀反憚黯曰黯好直諫守節死義至説公孫𢎞等如發䝉耳師古曰説音式鋭反上既數征匈奴有功黯言益不用始黯列九卿矣}
  - {type: variant, offset: 2190, length: 0, content: '', WYG: 公孫𢎞張湯為小吏及𢎞湯稍貴與黯同位黯又非毁𢎞湯已而𢎞至丞相封侯湯御史大夫黯時丞史皆與同列或尊用過之黯褊心不能無少望師古曰褊陿也望怨也見上言曰陛下用羣臣如積薪耳}
