  - {type: 'tls:seg', offset: 2185, content: '', id: KR2a0007_tls_050-18a.2}
  - {type: variant, offset: 2185, length: 0, content: '', WYG: 言屋相近故連延而燒也比音頻寐反不足憂臣過河内河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟以振貧民請歸節伏矯制辠師古曰矯託也託奉制詔而行之上賢而釋之遷為滎陽令黯耻為令稱疾歸田里上聞迺召為中大夫以數切諫不得久留内遷為東海太守黯學黄老言治官民好清靜擇丞史任之如淳曰擇郡丞及史任之也鄭當時為大司農官屬丞史亦是也責大指而已不細苛黯多病臥閤内不出嵗餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法為人性倨少禮師古曰倨簡傲也音居庻反靣折不能容人之過合已者善待之不合者弗能忍見士亦以此不附焉然好游俠任氣節行修絜其諫犯主之顔色常慕傅伯爰盎之為人應劭曰傅伯梁人為孝王将素抗直也善灌夫鄭當時及宗正劉棄疾亦以數直諫不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未甞拜揖之上方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也師古曰云云猶言如此如此也史畧其辭耳黯對曰陛下内多欲而外施仁義柰何欲效唐虞之治虖上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戇也羣臣或數黯師古曰數責之音所具反黯曰天子置公卿輔弼之臣寜令從諛承意䧟主於不誼虖}
  - {type: page-break, offset: 2185, content: '', id: KR2a0007_WYG_050-9b, image: WYG0250/WYG0250-0159d.png}
  - {type: page-break, offset: 2185, content: '', id: KR2a0007_WYG_050-10a, image: WYG0250/WYG0250-0160a.png}
  - {type: variant, offset: 2185, length: 0, content: '', krp: 言屋相近故連延而燒也比音頻寐反不足憂臣過河内河内貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河内倉粟以振貧民請歸節伏矯制辠師古曰矯託也託奉制詔而行之上賢而釋之遷為滎陽令黯耻為令稱疾歸田里上聞迺召為中大夫以數切諫不得久留内遷為東海太守黯學黄老言治官民好清靜擇丞史任之如淳曰擇郡丞及史任之也鄭當時為大司農官屬丞史亦是也責大指而已不細苛黯多病臥閤内不出嵗餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法為人性倨少禮師古曰倨簡傲也音居庻反靣折不能容人之過合已者善待之不合者弗能忍見士亦以此不附焉然好游俠任氣節行修絜其諫犯主之顔色常慕傅伯爰盎之為人應劭曰傅伯梁人為孝王将素抗直也善灌夫鄭當時及宗正劉棄疾亦以數直諫不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未甞拜揖之上方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也師古曰云云猶言如此如此也史畧其辭耳黯對曰陛下内多欲而外施仁義柰何欲效唐虞之治虖上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戇也羣臣或數黯師古曰數責之音所具反黯曰天子置公卿輔弼之臣寜令從諛承意䧟主於不誼虖}
  - {type: variant, offset: 2186, length: 0, content: '', WYG: 已在其位縱愛身柰辱朝廷何黯多病病且滿三月上常賜告者數終不瘉如淳曰杜欽所謂病滿賜告詔恩也數者非一也師古曰數音所角反瘉與愈同最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以瘉人師古曰瘉勝也讀與愈同然至其輔少主守成雖自謂賁育弗能奪也師古曰孟賁夏育皆古之勇士也賁音奔上曰然古有社稷之臣至如汲黯近之矣大将軍青侍中上踞厠視之如淳曰厠溷也孟康曰厠床邉側也師古曰如説是也劉奉世曰厠當從孟説古者見大臣則御坐為起然則踞厠者輕之也丞相𢎞宴見上或時不冠至如見黯不冠不見也上甞坐武帳應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟説是也黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此張湯以更定律令為廷尉師古曰更改也黯質責湯於上前師古曰質對之也曰公為正卿上不能襃先帝之功業下不能化天下之邪心安國富民使囹圄空虚何空取高皇帝約束紛更之為師古曰言何為乃紛亂而改更也而公以此無種矣師古曰言當誅及子孫也黯時與湯論議湯辯常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣師古曰重累其足言懼甚也仄古側字也是時漢方征匈奴招懐四夷黯務少事間常言與胡和親毋起兵師古曰每因間隙而言也上方鄉儒術師古曰鄉讀曰嚮尊公孫𢎞及事益多吏民巧宋祁曰遷史作吏民巧弄上分别文法湯等數決讞以幸而黯常毁儒而觸𢎞等徒懐詐飾智以阿人主取容而刀筆之吏專深文巧詆師古曰詆毁辱也音丁禮反䧟人於罔以自為功上愈益貴𢎞湯𢎞湯心疾黯雖上亦不説也師古曰説讀曰悦欲誅之以事師古曰以事致其罪而誅也𢎞為丞相廼言上曰右内史界部中多貴人宗室難治非素重臣弗能任請徙黯為右内史數歳官事不廢大将軍青既益尊姊為皇后然黯與亢禮或説黯曰自天子欲令羣臣下大将軍師古曰下音胡稼反大将軍尊貴誠重君不可以不拜黯曰}
