  - {type: variant, offset: 1970, length: 0, content: '', krp: 凡罪之等差然以逆順為基宋祁曰基字上疑有本字今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土張晏曰不欲指言故以取土喻也師古曰抔音歩侯反謂手掬之也其字從手不忍言毁徹故止云取土耳今學者讀抔為杯勺之杯非也杯非應盛土之物也宋祁云新本抔作㧵陛下且何以加其法虖文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁}
  - {type: variant, offset: 1971, length: 0, content: '', WYG: 山都侯王恬啓見釋之持議平宋祁曰啓作咸迺結為親友張廷尉繇此天下稱之師古曰繇讀與由同文帝崩景帝立釋之恐師古曰以嘗劾帝不下司馬門稱疾欲免去懼大誅至欲見則未知何}
  - {type: variant, offset: 1971, length: 0, content: '', krp: 山都侯王恬啓見釋之持議平宋祁曰啓作咸迺結為親友張廷尉繇此天下稱之師古曰繇讀與由同文帝崩景帝立釋之恐師古曰以嘗劾帝不下司馬門稱疾欲免去懼大誅至欲見則未知何}
  - {type: variant, offset: 1972, length: 0, content: '', WYG: 用王生計卒見謝景帝不過也王生者善為黄老言處士嘗召居廷中公卿盡會立王生老人曰吾韤解師古曰韤音武伐反顧謂釋之為我結韤釋之跪而結之師古曰結讀曰係既已人或譲王生獨奈何廷辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉廷尉方天下名臣吾故聊}
