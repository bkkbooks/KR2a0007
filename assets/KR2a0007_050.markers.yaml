  - {type: variant, offset: 2258, length: 0, content: '', WYG: 弗取也上弗許曰吾久}
  - {type: variant, offset: 2258, length: 0, content: '', krp: 弗取也上弗許曰吾久}
  - {type: variant, offset: 2259, length: 1, content: 取, WYG: 聞汲黯之言今又復妄發矣後數月黯坐小法會赦免官於是黯隠於田園者數年會更立五銖錢民多盜鑄錢者楚地尤甚上以為淮陽楚地之郊也師古曰郊謂交道衝要之處也召黯拜為淮陽太守黯伏謝不受印綬詔數強予然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下師古曰填音大賢反不意陛下復收之臣常有狗馬之心師古曰思報效今病力不能任郡事師古曰力謂甚也臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣師古曰言後即召也顧淮陽吏民不相得師古曰顧謂思念也吾徒得君重師古曰徒但也重威重也臥而治之黯既辭過大行李息曰黯棄逐居郡不得與朝廷議矣師古曰與讀曰豫然御史大夫湯智足以距諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文法師古曰舞猶弄也内懐詐以御主心外挾賊吏以為重公列九卿不早言之何師古曰言何不早言也公與之俱受其戮矣息畏湯終不敢言黯居郡如其故治淮陽政清後張湯敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽如淳曰諸侯王相在郡守上秩眞二千石律眞二千石月得百五十斛嵗凡得千八百石耳二千石月得百二十斛嵗凡得一千四百四十石耳居淮陽十歳而卒卒後上以黯故官其弟仁至九卿子偃至諸侯相黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿以河南太守卒昆弟以安故同時至二千石十人濮陽段宏始事}
