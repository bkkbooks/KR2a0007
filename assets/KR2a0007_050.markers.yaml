  - {type: variant, offset: 104, length: 0, content: '', WYG: 頃之至中郎将從行至霸陵上居外臨厠師古曰厠岸之邉側也解在劉向傳時愼夫人從上指視愼夫人新豐道曰此走邯鄲道也張晏曰慎夫人邯鄲人也如淳曰走音奏趣也師古曰視讀曰示使愼夫人鼓瑟上自倚瑟而歌李奇曰聲氣依倚瑟也師古曰倚瑟即今之以歌合曲也倚音於綺反意悽愴悲懐顧謂羣臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉師古曰紵音竹呂反斮音側略反左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中亡可欲雖亡石椁又何戚焉師古曰解並在劉向傳文帝稱善其後拜釋之為廷尉頃之上行出中渭橋張晏曰在渭橋中路劉奉世曰渭上有橋非一此在中故曰中渭橋張説非也有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉師古曰屬委也音之欲反次下亦同釋之治問曰縣人來如淳曰長安縣人也聞蹕匿橋下久以為行過師古曰言天子已過既出見車騎即走耳釋之奏當此人犯蹕如淳曰乙令蹕先至而犯者罰金四兩師古曰當謂處其罪也當罰金上怒曰此人親驚吾馬馬頼和柔令它馬固不敗傷我乎而廷尉迺當之罰金釋之曰法者天子所與天下公共也師古曰公謂不私也今法如是更重之是法不信於民也且方其時上使使誅之則已師古曰言初執獲此人天子即令誅之其事即畢今已下廷尉廷尉天下之平也壹傾天下用法皆為之輕重民安所錯其手足師古曰安焉也錯置也音千故反唯}
  - {type: page-break, offset: 104, content: '', id: KR2a0007_WYG_050-3b, image: WYG0250/WYG0250-0156d.png}
  - {type: page-break, offset: 104, content: '', id: KR2a0007_WYG_050-4a, image: WYG0250/WYG0250-0157a.png}
