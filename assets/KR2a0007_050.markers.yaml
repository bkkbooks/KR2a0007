  - {type: variant, offset: 4317, length: 291, content: 月君徂郊祀馳我君輿帝用享祉三代之前蓋未嘗有宛宛黃龍興德而升采色玄耀炳炳煇煌正陽顯見覺寤黎烝於傳載之云受命所乘厥之有章不必諄諄依類託寓諭以封巒披藝觀之天人之際已交上下相發允答聖王之事兢兢翼翼故曰於興必慮衰安必思危是以湯武至尊嚴不失肅祗舜在假典顧省厥遺此之謂也相如既卒五歲上始祭后土八年而遂禮中岳封于太山至梁甫禪肅然相如它所著若遺平陵侯書與五公子相難屮木書篇不采采其尤著公卿者云贊曰司馬遷稱春秋推見至隱易本隱以之顯大雅言王公大人而德逮黎庶小雅譏小己之得失其流及上所言雖殊其合德一也相如雖多虛辭濫說然要其歸引之於節儉此亦詩之風諫何異揚雄以為靡麗之賦勸百而風一猶騁鄭衛之聲曲終而奏雅不已戲乎, WYG: 考證}
