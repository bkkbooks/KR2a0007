  - {type: variant, offset: 2262, length: 0, content: '', krp: 旦常恐不徧當時好黄老言其慕長}
  - {type: variant, offset: 2263, length: 1, content: 遠, WYG: 如恐不稱師古曰恐不稱其意自}
