  - {type: variant, offset: 1987, length: 2, content: 口吃, WYG: 淳曰良善也師古曰説讀曰悦聞頗牧之善帝意大悦劉攽曰聞亷頗李牧為人即是知其實矣良説者甚喜也猶良久也迺拊髀曰師古曰髀音陛嗟乎吾獨不得廉頗李牧為将豈憂匈奴哉唐曰主臣師古曰恐懼之言解在陳平傳宋祁曰解在王陵傳注誤陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐譲曰公衆辱我獨亡閒處虖師古曰何不閒隙之處}
