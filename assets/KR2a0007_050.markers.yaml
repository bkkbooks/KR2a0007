  - {type: variant, offset: 3362, length: 460, content: 有使來求書奏之其遺札書言封禪事所忠奏焉天子異之其辭曰伊上古之初肇自顥穹生民歷選列辟以迄乎秦率邇者踵武聽逖者風聲紛輪威蕤堙滅而不稱者不可勝數也繼昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存軒轅之前遐哉邈乎其詳不可得聞已五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成而后陵夷衰微千載亡聲豈不善始善終哉然無異端慎所由於前謹遺教於後耳故軌迹夷易易遵也湛恩厖洪易豐也憲度著明易則也垂統理順易繼也是以業隆於繈保而崇冠乎二后揆厥所元終都攸卒未有殊尤絕迹可考於今者也然猶躡梁甫登大山建顯號施尊名大漢之德逢涌原泉沕潏曼羨旁魄四塞雲布霧散上暢九垓下泝八埏懷生之類沾濡浸潤協氣橫流武節焱逝爾陿游原迥闊泳末首惡鬱沒闇昧昭晰昆蟲闓懌回首面內然后囿騶虞之珍群徼麋鹿之怪獸導一莖六穗於庖犧雙觡共抵之獸獲周餘放龜于岐招翠黃乘龍於沼鬼神接靈圉賓於閒館奇物譎詭俶儻窮變欽哉符瑞臻茲猶以為薄不敢道封禪蓋周躍魚隕杭休之以燎微夫斯之為符也以登介丘不亦恧乎進攘之道何其爽與於是, WYG: ''}
