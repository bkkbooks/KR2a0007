  - {type: variant, offset: 2252, length: 1, content: 娛, WYG: 奴婢賜從軍死者家鹵獲因與之以謝天下塞百姓之心師古曰塞滿也今縱不能渾邪帥數萬之衆來虚府庫賞賜發良民侍養若奉驕子愚民安知市買長安中而文吏繩以為䦨出財物如邉關乎應劭曰䦨妄也律胡市吏民不得持兵器及鐡出闗雖於京師市買其法一也臣瓚曰無符傳出入為闌也陛下縱不能得匈奴之贏以謝天下師古曰贏餘也音戈成反又以微文殺無知者五百餘人}
