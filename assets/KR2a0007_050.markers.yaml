  - {type: variant, offset: 10, length: 0, content: '', WYG: 當添也字欲免歸中郎将爰盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝曰卑之毋甚髙論師古曰令其議論依附時事也令今可行也於是釋之言秦漢之間事秦所以失漢所以興者宋祁曰漢字上當存而字所以緩其語文帝稱善拜釋之為謁者僕射從行上登虎圏師古曰圈飬獸之所也音求逺反問上林尉禽獸簿師古曰簿謂簿書也音歩户反十餘問尉左右視盡不能對師古曰視其屬官皆不能對也虎圏嗇夫從旁代尉對上所問禽獸簿甚悉師古曰悉謂詳盡也欲以觀其能口對嚮應亡窮者師古曰觀猶示也嚮讀曰響如響應聲言其疾也文帝曰吏不當如此邪尉亡頼張晏曰材無可恃也詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張}
  - {type: page-break, offset: 10, content: '', id: KR2a0007_WYG_050-2a, image: WYG0250/WYG0250-0156a.png}
