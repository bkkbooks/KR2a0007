  - {type: variant, offset: 2060, length: 1, content: 物, WYG: 上古王者遣将也跪而推轂曰闑以内寡人制之闑以外将軍制之韋昭曰門中橛為闑師古曰音牛列反軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙将居邉軍市之租皆自用饗士賞賜決於外不從中覆也師古曰覆謂覆白之也音芳目反委任而責成功故李牧乃得盡其知能選車千三百乗彀騎萬三千匹師古曰彀張弩也音遘百金之士十萬服䖍曰良士直百金也如淳曰黄金一斤直萬言富家子弟可任使也師古曰百金喻其貴重耳服説是也是以北逐單于破東胡滅澹林鄭氏曰澹音擔石之擔如淳曰胡也匈奴傳曰晉北}
  - {type: page-break, offset: 2060, content: '', id: KR2a0007_WYG_050-7a, image: WYG0250/WYG0250-0158c.png}
