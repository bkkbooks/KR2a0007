  - {type: variant, offset: 2190, length: 0, content: '', krp: 公孫𢎞張湯為小吏及𢎞湯稍貴與黯同位黯又非毁𢎞湯已而𢎞至丞相封侯湯御史大夫黯時丞史皆與同列或尊用過之黯褊心不能無少望師古曰褊陿也望怨也見上言曰陛下用羣臣如積薪耳}
  - {type: variant, offset: 2191, length: 1, content: 行, WYG: 來者居上黯罷上曰人果不可以無學觀汲黯之言日益甚矣師古曰言其鄙俚也或曰積薪之言出曽子故云不可無學也居無何匈奴渾邪王帥衆來降師古曰渾音胡昆反漢發車三萬乗縣官亡錢從民貰馬師古曰賖買也民或匿馬馬不具上怒欲斬長安令黯曰長安令亡罪獨斬臣黯民迺肯出馬且匈奴畔其主而降漢徐以縣次傳之何至令天下騷動罷}
