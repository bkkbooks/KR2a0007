  - {type: variant, offset: 1968, length: 1, content: 書, WYG: 大怒曰人亡道迺盜先帝器吾屬廷尉者欲致之族而君以法奏之師古曰法謂常法非吾所以共承宗廟意也師古曰共讀曰㳟釋之免冠頓首謝曰法如是足也且罪等如淳曰俱死罪也盜玉環不若盜長陵土之逆劉奉世曰此等讀如等級之等}
  - {type: variant, offset: 1968, length: 1, content: 書, krp: 大怒曰人亡道迺盜先帝器吾屬廷尉者欲致之族而君以法奏之師古曰法謂常法非吾所以共承宗廟意也師古曰共讀曰㳟釋之免冠頓首謝曰法如是足也且罪等如淳曰俱死罪也盜玉環不若盜長陵土之逆劉奉世曰此等讀如等級之等}
  - {type: variant, offset: 1970, length: 0, content: '', WYG: 凡罪之等差然以逆順為基宋祁曰基字上疑有本字今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土張晏曰不欲指言故以取土喻也師古曰抔音歩侯反謂手掬之也其字從手不忍言毁徹故止云取土耳今學者讀抔為杯勺之杯非也杯非應盛土之物也宋祁云新本抔作㧵陛下且何以加其法虖文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁}
