  - {type: variant, offset: 1985, length: 0, content: '', WYG: 中署長鄭氏曰以至孝聞也師古曰以孝得為郎中而為郎署之長也著音竹助反事文帝帝輦過問唐曰父老何自為郎家安在師古曰言年已老矣何乃自為郎也崔浩以為自從也從何為郎此説非也劉敞曰按文帝問因唐遂及居代時事則何自為郎正問從何處來為郎崔説是索隠過音戈具以實言文帝曰吾居代時吾尚食監高袪數為我言趙将李齊之賢戰於鉅鹿下吾每飯食意未甞不在鉅鹿也張晏曰毎食念監所説李齊在鉅鹿時也父老知之乎唐對曰齊尚不如廉頗李牧之為将也上曰何已師古曰已猶耳唐曰臣大父在趙時為官帥将師古曰大父祖父也帥音所類反将音子亮反善李牧臣父故為代}
  - {type: page-break, offset: 1985, content: '', id: KR2a0007_WYG_050-6a, image: WYG0250/WYG0250-0158a.png}
