  - {type: variant, offset: 4892, length: 345, content: 千七百戶其校尉吏有功侯者六人為將軍者二人路博德西河平州人以右北平太守從票騎將軍封邳離侯票騎死後博德以衛尉為伏波將軍伐破南越益封其後坐法失侯為彊弩都尉屯居延卒趙破奴太原人嘗亡入匈奴已而歸漢為票騎將軍司馬出北地封從票侯坐酎金失侯後一歲為匈河將軍攻胡至匈河水無功後一歲擊虜樓蘭王後為浞野侯後六歲以浚稽將軍將二萬騎擊匈奴左王左王與戰兵八萬騎圍破奴破奴為虜所得遂沒其軍居匈奴中十歲復與其太子安國亡入漢後坐巫蠱族自衛氏興大將軍青首封其後支屬五人為侯凡二十四歲而五侯皆奪國征和中戾太子敗衛氏遂滅而霍去病弟光貴盛自有傳贊曰蘇建嘗說責大將軍至尊重而天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賓客天子常切齒彼親待士大夫招賢黜不肖者人主之柄也人臣奉法遵職而已何與招士票騎亦方此意為將如此, WYG: 考證}
