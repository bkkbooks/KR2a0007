  - {type: variant, offset: 4782, length: 3, content: 為拔胡, WYG: 谷永上疏曰臣聞禮天子外屏不欲見外也師古曰屏謂當門之牆以屏蔽者也外屏於門外爲之是故帝王之意不窺人閨門之私聽聞中冓之言應劭曰中冓材搆在堂之中也晉灼曰魯詩以爲夜也師古曰冓謂舍之交積材木也應說近之冓音工豆反春秋爲親者諱詩云戚戚兄弟莫逺具爾師古曰小雅行葦之詩也戚戚内相親也爾近也言王之族親情無疎逺皆昵近也今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥强劾立傅致難明之事師古曰傅讀曰附獨以偏辭成辠斷獄亡益於治道汙衊宗室孟康曰衊音漫師古曰衊音秣謂塗染也以内亂之惡披布宣揚於天下非所以爲公族隱諱増朝廷之榮華昭聖徳之風化也臣愚以爲王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有耻辱之心師古曰言其姑亦當自耻必不與姦案事者廼驗問惡言師古曰本所問者怨望朝廷之言耳何故猥自發舒師古曰猥曲也以三者揆之殆非人情疑有所迫切過誤失言文吏躡尋不得轉移萌牙之時加恩勿治上也如淳曰覆蓋之則計之上既已案驗舉憲宜及王辭不服詔廷尉選上徳通理之吏更審考清問著不然之效定失誤之法師古曰著明也而反命於下吏師古曰使者還反以清白之狀付有司也以廣公族附疏之徳爲宗室刷汙亂之耻師古曰刷謂拭刷除之也音所劣反甚得治親之誼天子由是寝而不治居數歲元延中立復以公事怨相掾及雎陽丞使奴殺之殺奴以滅口凡殺三人傷五人手􅇌郎吏二十餘人上書不拜奏謀簒死罪囚師古曰逆取曰簒有司請誅上不忍削立五縣哀帝建平中立復殺人天子遣廷尉賞大鴻臚由持節即訊師古曰就問也宋祁曰百官表廷尉方賞君賔大鴻臚畢申世叔申由必有一誤至移書傅相中尉曰王背䇿戒師古曰初封時䇿書有戒勑之言誖暴妄行師古曰誖乖也音布内反連犯大辟毒流吏民比比蒙恩不伏重誅師古曰比猶頻也不思改過復賊殺人幸得蒙恩丞相長史大鴻臚丞即問王陽病抵讕置辭師古曰抵距也讕誣諱也抵音丁禮反讕音來亶反驕嫚不首主令與背畔亡異師古曰不首謂不伏其罪也主令者於法令之條與背畔無異也首音失救反次下亦同劉攽曰驕嫚當屬上句立使賊殺人而拒諱不服也使人殺之此是不首主令之辠也令音零丞相御史請收王璽綬送陳留獄明詔加恩復遣廷尉大鴻臚雜問今王當受詔置辭恐復不首實對宋祁云一本無實字書曰至于再三有不用我降爾命師古曰此周書多方篇之辭也言我教汝至于再三汝不能用則我下罰黜汝命也傅相中尉皆以輔正爲職虎兕出於匣龜玉毁於匵中是誰之過也師古曰此論語孔子責冉有季路之辭也言虎兕出於檻龜玉毁於櫝匱豈非典守者之過邪喻輔相人者當能持危扶顛也宋祁云注文浙本虎作豹檻作柙景徳本郭去虎字蓋以師古宜避唐諱書到明以誼曉王敢復懐詐罪過益深傅相以下不能輔導有正法立惶恐免冠對曰立少失父母孤弱處深宫中獨與宦者婢妾居漸漬小國之俗加以質性下愚有不可移之姿師古曰言不從化也論語稱孔子曰唯上智與下愚不移往者傅相亦不純以仁誼輔翌立大臣皆尚苛刻刺求微密讒臣在其間左右弄口積使上下不和更相眄伺師古曰更音工衡反宫殿之裏毛􅈊過失亡不暴陳當伏重誅以視海内師古曰視讀曰示數蒙聖恩得見貰赦師古曰貰謂寛其罪今立自知賊殺中郎曹}
