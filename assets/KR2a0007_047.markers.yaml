  - {type: variant, offset: 4786, length: 14, content: 軍屯朔方還擊昆明無功奪印荀彘, WYG: 冬月廹促貪生畏死即詐僵仆陽病師古曰僵仆倒地也僵音薑仆音赴徼幸得踰於須臾師古曰冀得踰冬月而減罪也謹以實對伏須重誅師古曰須待也時冬月盡其春大赦不治元始中立坐與平帝外家中山衞氏交通新都侯王莽奏廢立爲庶人徙漢中立自殺二十七年國除後二歲莽白}
