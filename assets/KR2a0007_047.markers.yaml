  - {type: variant, offset: 222, length: 2, content: 聞衛, WYG: 計之廼分梁爲五國盡立孝王男五人爲王女五人皆令食湯沐邑奏之太后太后廼說爲帝壹餐師古曰說讀曰悦餐古飱字孝王未死時財以鉅萬計不可勝數及死藏府餘黄金尚四十餘萬斤他財物稱是代孝王參初立爲太原王四年代王武徙爲淮陽王而參徙爲代王復并得太原都晉陽如故師古曰如文帝在代時劉攽曰如故爲太原王時都晉陽不遷都也五年一朝凡三朝十七年薨}
