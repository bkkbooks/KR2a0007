  - {type: 'tls:seg', offset: 10, content: '', id: KR2a0007_tls_047-1a.2}
  - {type: variant, offset: 10, length: 2, content: 衛青, WYG: 年復入朝是時上未置太子與孝王宴飲從容言曰師古曰從音千容反千秋萬歲後傳於王王辭謝雖知非至言然心内喜太后亦然其春吳楚齊趙七國反先擊梁棘壁文頴曰地名殺數萬人梁王城守雎陽師古曰據雎陽城而自守而使韓安國張羽等爲將軍以距吳楚吳楚以梁爲限不敢過而西與太尉亞夫等相距三月吳楚破而梁所殺虜畧與漢中分孟康曰梁所虜吳楚之㨗畧與漢同明年漢立太子梁最親有功又爲大國居天下膏腴地北界泰山西至髙陽蘇林曰陳留北縣四十餘城多大縣孝王太后少子愛之賞賜不可勝道師古曰道謂言宋祁曰當於言下添也}
  - {type: page-break, offset: 10, content: '', id: KR2a0007_WYG_047-2a, image: WYG0250/WYG0250-0109c.png}
