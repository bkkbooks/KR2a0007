  - {type: variant, offset: 4151, length: 0, content: '', WYG: 削或千户或五百户如是者數焉荒王女弟園子爲立舅任寳妻寳兄子昭爲立后數過寳飲食報寳曰我好翁主師古曰諸王女皆稱翁主言其父自主婚也欲得之寳曰翁主姑也}
