  - {type: variant, offset: 4086, length: 0, content: '', WYG: 明年梁孝王武徙王梁梁孝王子五人爲王太子買爲梁共王師古曰共讀曰恭次子明爲濟川王彭離爲濟東王定爲山陽王不識爲濟隂王皆以孝景中六年同日立梁共王買立十年薨宋祁云越本十作七子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅劉攽曰武紀坐殺太傅中傅與此不同宋祁曰垣表作桓邑武帝弗忍廢爲庶人徙房陵國除濟東王彭離立二十九年彭離驕悍師古曰悍勇也昬暮私與其奴亡命少年數十人行剽師古曰剽劫也音頻妙反殺人取財物以爲好如淳曰以是爲好喜之事師古曰好音呼到反所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢爲庶人徙上庸國除爲大河郡山陽哀王定立九年薨亡子國除濟隂哀王不識立一年薨亡子國除孝王支子四王皆絶於身師古曰支子謂非正嫡也梁平王襄母曰陳太后共王母曰李太后李太后親平王之大母也師古曰大母祖母也共王卽李太后所生故云親祖母也而平王之后曰任后任后甚有寵於襄初孝王有􅪖尊應劭曰詩云酌彼金􅪖􅪖畫雲雷之象以金飾之也鄭氏曰上蓋刻爲山雲雷之象師古曰鄭說是也􅪖古雷字直千金戒後世善寶之毋得以與人師古曰寶謂愛守也任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百鉅萬猶}
  - {type: page-break, offset: 4086, content: '', id: KR2a0007_WYG_047-6b, image: WYG0250/WYG0250-0111d.png}
  - {type: page-break, offset: 4086, content: '', id: KR2a0007_WYG_047-7a, image: WYG0250/WYG0250-0112a.png}
  - {type: variant, offset: 4086, length: 0, content: '', krp: 明年梁孝王武徙王梁梁孝王子五人爲王太子買爲梁共王師古曰共讀曰恭次子明爲濟川王彭離爲濟東王定爲山陽王不識爲濟隂王皆以孝景中六年同日立梁共王買立十年薨宋祁云越本十作七子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅劉攽曰武紀坐殺太傅中傅與此不同宋祁曰垣表作桓邑武帝弗忍廢爲庶人徙房陵國除濟東王彭離立二十九年彭離驕悍師古曰悍勇也昬暮私與其奴亡命少年數十人行剽師古曰剽劫也音頻妙反殺人取財物以爲好如淳曰以是爲好喜之事師古曰好音呼到反所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢爲庶人徙上庸國除爲大河郡山陽哀王定立九年薨亡子國除濟隂哀王不識立一年薨亡子國除孝王支子四王皆絶於身師古曰支子謂非正嫡也梁平王襄母曰陳太后共王母曰李太后李太后親平王之大母也師古曰大母祖母也共王卽李太后所生故云親祖母也而平王之后曰任后任后甚有寵於襄初孝王有􅪖尊應劭曰詩云酌彼金􅪖􅪖畫雲雷之象以金飾之也鄭氏曰上蓋刻爲山雲雷之象師古曰鄭說是也􅪖古雷字直千金戒後世善寶之毋得以與人師古曰寶謂愛守也任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百鉅萬猶}
  - {type: variant, offset: 4087, length: 0, content: '', WYG: 恣任后絶欲得之王襄直使人開府取尊賜任后又王及母陳太后事於太后多不順宋祁曰景徳本於作李有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與争門措指晉灼曰許慎云措置字借以爲笮耳師古曰音壯客反謂爲門扉所笮太后啼謼師古曰謼音火故反不得見漢使者李太后亦私與食官長及郎尹霸等姦亂王與任后以此使人風止李太后師古曰風讀曰諷止者止其自言也李太后亦已師古曰已止也後病薨病時任后未嘗請疾張晏曰請問也薨又不侍喪元朔中雎陽人犴反師古曰犴姓反名也犴音岸宋祁云浙本犴反作犴友人辱其父而與雎陽太守客俱出同車劉攽曰雎陽梁所都無太守當是淮陽劉敞曰下兩雎字當作淮犴反殺其仇車上亡}
