  - {type: variant, offset: 16, length: 4, content: 父鄭季河, WYG: 遺音大治宫室爲復道自宫連屬於平臺三十餘里如淳曰平臺在大梁}
  - {type: page-break, offset: 16, content: '', id: KR2a0007_WYG_047-2b, image: WYG0250/WYG0250-0109d.png}
  - {type: variant, offset: 16, length: 4, content: 父鄭季河, krp: 遺音大治宫室爲復道自宫連屬於平臺三十餘里如淳曰平臺在大梁}
