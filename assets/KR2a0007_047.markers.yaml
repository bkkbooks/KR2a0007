  - {type: variant, offset: 1264, length: 2817, content: 春大將軍青出定襄合騎侯敖為中將軍太僕賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左內史李沮為彊弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急匈奴誘之遂將其餘騎可八百犇降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間不患無威而霸說我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所是歲也霍去病始侯霍去病大將軍青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后尊少兒更為詹事陳掌妻去病以皇后姊子年十八為侍中善騎射再從大將軍大將軍受詔予壯士為票姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是上曰票姚校尉去病斬首捕虜二千二十八級得相國當戶斬單于大父行藉若侯產捕季父羅姑比再冠軍以二千五百戶封去病為冠軍侯上谷太守郝賢四從大將軍捕首虜千三百級封賢為終利侯騎士孟已有功賜爵關內侯邑二百戶是歲失兩將軍亡翕侯功不多故青不益封蘇建至上弗誅贖為庶人青賜千金是時王夫人方幸於上甯乘說青曰將軍所以功未甚多身食萬戶三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親壽青以五百金為王夫人親壽上聞問青青以實對上乃拜甯乘為東海都尉校尉張騫從大將軍以嘗使大夏留匈奴中久道軍知善水草處軍得以無飢渴因前使絕國功封騫為博望侯去病侯三歲元狩二年春為票騎將軍將萬騎出隴西有功上曰票騎將軍率戎士隃烏盭討遫濮涉狐奴歷五王國輜重人眾攝讋者弗取幾獲單于子轉戰六日過焉支山千有餘里合短兵鏖皋蘭下殺折蘭王斬盧侯王銳悍者誅全甲獲醜執渾邪王子及相國都尉捷首虜八千九百六十級收休屠祭天金人師率減什七益封去病二千二百戶其夏去病與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道廣將四千騎先至騫將萬騎後匈奴左賢王將數萬騎圍廣廣與戰二日死者過半所殺亦過當騫至匈奴引兵去騫坐行留當斬贖為庶人而去病出北地遂深入合騎侯失道不相得去病至祁連山捕道虜甚多上曰票騎將軍涉鈞耆濟居延遂臻小月氏攻祁連山揚武乎鱳得得單于單桓酋涂王及相國都尉以眾降下者二千五百人可謂能舍服知成而止矣捷首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戶都尉六十三人師大率減什三益封去病五千四百戶賜校尉從至小月氏者爵左庶長鷹擊司馬破奴再從票騎將軍斬遫濮王捕稽且王右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人封破奴為從票侯校尉高不識從票騎將軍捕呼于耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為煇渠侯合騎侯敖坐行留不與票騎將軍會當斬贖為庶人諸宿將所將士馬兵亦不如去病去病所將常選然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絕也然而諸宿將常留落不耦由此去病日以親貴比大將軍其後單于怒渾邪王居西方數為漢所破亡數萬人以票騎之兵也欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先要道邊是時大行李息將城河上得渾邪王使即馳傳以聞上恐其以詐降而襲邊乃令去病將兵往迎之去病既度河與渾邪眾相望渾邪裨王將見漢軍而多欲不降者頗遁去去病乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其眾度河降者數萬人號稱十萬既至長安天子所以賞賜數十鉅萬封渾邪王萬戶為漯陰侯封其裨王呼毒尼為下摩侯䧹疪為煇渠侯禽黎為河綦侯大當戶調雖為常樂侯於是上嘉去病之功曰票騎將軍去病率師征匈奴西域王渾邪王及厥眾萌咸犇於率以軍糧接食并將控弦萬有餘人誅獟悍捷首虜八千餘級降異國之王三十二戰士不離傷十萬之眾畢懷集服仍興之勞爰及河塞庶幾亡患以千七百戶益封票騎將軍減隴西北地上郡戍卒之半以寬天下繇役乃分處降者於邊五郡故塞外而皆在河南因其故俗為屬國其明年匈奴入右北平定襄殺略漢千餘人其明年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發卒其勢必得所欲是歲元狩四年也春上令大將軍青票騎將軍去病各五萬騎步兵轉者踵軍數十萬而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東乃更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍平陽侯襄為後將軍皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷匈奴可坐收虜耳乃悉遠北其輜重皆以精兵待幕北而適直青軍出塞千餘里見單于兵陳而待於是青令武剛車自環為營而縱五千騎往當匈奴匈奴亦縱萬騎會日且入而大風起沙礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚彊戰而匈奴不利薄莫單于遂乘六臝壯騎可數百直冒漢圍西北馳去昏漢匈奴相紛挐殺傷大當漢軍左校捕虜言單于未昏而去漢軍因發輕騎夜追之青因隨其後匈奴兵亦散走會明行二百餘里不得單于頗捕斬首虜萬餘級遂至窴顏山趙信城得匈奴積粟食軍軍留一日而還悉燒其城餘粟以歸青之與單于會也而前將軍廣右將軍食其軍別從東道或失道大將軍引還過幕南乃相逢青欲使使歸報令長史簿責廣廣自殺食其贖為庶人青軍入塞凡斬首虜萬九千級是時匈奴眾失單于十餘日右谷蠡王自立為單于單于後得其眾右王乃去單于之號去病騎兵車重與大將軍軍等而亡裨將悉以李敢等為大校當裨將出代右北平二千餘里直左方兵所斬捕功已多於青既皆還上曰票騎將軍去病率師躬將所獲葷允之士約輕齎絕大幕涉獲單于章渠以誅北車耆轉擊左大將雙獲旗鼓歷度難侯濟弓盧獲屯頭王韓王等三人將軍相國當戶都尉八十三人封狼居胥山禪於姑衍登臨翰海執訊獲醜七萬有四百四十三級師率減什二取食於敵卓行殊遠而糧不絕以五千八百戶益封票騎將軍右北平太守路博德屬票騎將軍會興城不失期從至檮余山斬首捕虜二千八百級封博德為邳離侯北地都尉衛山從票騎將軍獲王封山為義陽侯故歸義侯因淳王復陸支樓剸王伊即靬皆從票騎將軍有功封復陸支為杜侯伊即靬為眾利侯從票侯破奴昌武侯安稽從票騎有功益封各三百戶漁陽太守解校尉敢皆獲鼓旗賜爵關內侯解食邑三百戶敢二百戶校尉自為爵左庶長軍吏卒為官賞賜甚多而青不得益封吏卒無封者唯西河太守常惠雲中太守遂成受賞遂成秩諸侯相賜食邑二百戶黃金百斤惠爵關內侯兩軍之出塞塞閱官及私馬凡十四萬匹而後入塞者不滿三萬匹乃置大司馬位大將軍票騎將軍皆為大司馬定令令票騎將軍秩祿與大將軍等自是後青日衰而去病日益貴青故人門下多去事去病輒得官爵唯獨任安不肯去去病為人少言不泄有氣敢往上嘗欲教之吳孫兵法對曰顧方略何如耳不至學古兵法上為治第令視之對曰匈奴不滅無以家為也由此上益重愛之然少而侍中貴不省士其從軍上為遣太官齎數十乘既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而去病尚穿域蹋鞠也事多此類青仁喜士退讓以和柔自媚於上然於天下未有稱也去病自四年軍後三歲元狩六年薨上悼之發屬國玄甲軍陳自長安至茂陵為冢象祁連山諡之并武與廣地曰景桓侯子嬗嗣嬗字子侯上愛之幸其壯而將之為奉車都尉從封泰山而, WYG: ''}
  - {type: variant, offset: 1264, length: 2817, content: 春大將軍青出定襄合騎侯敖為中將軍太僕賀為左將軍翕侯趙信為前將軍衛尉蘇建為右將軍郎中令李廣為後將軍左內史李沮為彊弩將軍咸屬大將軍斬首數千級而還月餘悉復出定襄斬首虜萬餘人蘇建趙信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡人降為翕侯見急匈奴誘之遂將其餘騎可八百犇降單于蘇建盡亡其軍獨以身得亡去自歸青青問其罪正閎長史安議郎周霸等建當云何霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威閎安曰不然兵法小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士皆不敢有二心自歸而斬之是示後無反意也不當斬青曰青幸得以胏附待罪行間不患無威而霸說我以明威甚失臣意且使臣職雖當斬將以臣之尊寵而不敢自擅專誅於境外其歸天子天子自裁之於以風為人臣不敢專權不亦可乎軍吏皆曰善遂囚建行在所是歲也霍去病始侯霍去病大將軍青姊少兒子也其父霍仲孺先與少兒通生去病及衛皇后尊少兒更為詹事陳掌妻去病以皇后姊子年十八為侍中善騎射再從大將軍大將軍受詔予壯士為票姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是上曰票姚校尉去病斬首捕虜二千二十八級得相國當戶斬單于大父行藉若侯產捕季父羅姑比再冠軍以二千五百戶封去病為冠軍侯上谷太守郝賢四從大將軍捕首虜千三百級封賢為終利侯騎士孟已有功賜爵關內侯邑二百戶是歲失兩將軍亡翕侯功不多故青不益封蘇建至上弗誅贖為庶人青賜千金是時王夫人方幸於上甯乘說青曰將軍所以功未甚多身食萬戶三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親壽青以五百金為王夫人親壽上聞問青青以實對上乃拜甯乘為東海都尉校尉張騫從大將軍以嘗使大夏留匈奴中久道軍知善水草處軍得以無飢渴因前使絕國功封騫為博望侯去病侯三歲元狩二年春為票騎將軍將萬騎出隴西有功上曰票騎將軍率戎士隃烏盭討遫濮涉狐奴歷五王國輜重人眾攝讋者弗取幾獲單于子轉戰六日過焉支山千有餘里合短兵鏖皋蘭下殺折蘭王斬盧侯王銳悍者誅全甲獲醜執渾邪王子及相國都尉捷首虜八千九百六十級收休屠祭天金人師率減什七益封去病二千二百戶其夏去病與合騎侯敖俱出北地異道博望侯張騫郎中令李廣俱出右北平異道廣將四千騎先至騫將萬騎後匈奴左賢王將數萬騎圍廣廣與戰二日死者過半所殺亦過當騫至匈奴引兵去騫坐行留當斬贖為庶人而去病出北地遂深入合騎侯失道不相得去病至祁連山捕道虜甚多上曰票騎將軍涉鈞耆濟居延遂臻小月氏攻祁連山揚武乎鱳得得單于單桓酋涂王及相國都尉以眾降下者二千五百人可謂能舍服知成而止矣捷首虜三萬二百獲五王王母單于閼氏王子五十九人相國將軍當戶都尉六十三人師大率減什三益封去病五千四百戶賜校尉從至小月氏者爵左庶長鷹擊司馬破奴再從票騎將軍斬遫濮王捕稽且王右千騎將王王母各一人王子以下四十一人捕虜三千三百三十人前行捕虜千四百人封破奴為從票侯校尉高不識從票騎將軍捕呼于耆王王子以下十一人捕虜千七百六十八人封不識為宜冠侯校尉僕多有功封為煇渠侯合騎侯敖坐行留不與票騎將軍會當斬贖為庶人諸宿將所將士馬兵亦不如去病去病所將常選然亦敢深入常與壯騎先其大軍軍亦有天幸未嘗困絕也然而諸宿將常留落不耦由此去病日以親貴比大將軍其後單于怒渾邪王居西方數為漢所破亡數萬人以票騎之兵也欲召誅渾邪王渾邪王與休屠王等謀欲降漢使人先要道邊是時大行李息將城河上得渾邪王使即馳傳以聞上恐其以詐降而襲邊乃令去病將兵往迎之去病既度河與渾邪眾相望渾邪裨王將見漢軍而多欲不降者頗遁去去病乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其眾度河降者數萬人號稱十萬既至長安天子所以賞賜數十鉅萬封渾邪王萬戶為漯陰侯封其裨王呼毒尼為下摩侯䧹疪為煇渠侯禽黎為河綦侯大當戶調雖為常樂侯於是上嘉去病之功曰票騎將軍去病率師征匈奴西域王渾邪王及厥眾萌咸犇於率以軍糧接食并將控弦萬有餘人誅獟悍捷首虜八千餘級降異國之王三十二戰士不離傷十萬之眾畢懷集服仍興之勞爰及河塞庶幾亡患以千七百戶益封票騎將軍減隴西北地上郡戍卒之半以寬天下繇役乃分處降者於邊五郡故塞外而皆在河南因其故俗為屬國其明年匈奴入右北平定襄殺略漢千餘人其明年上與諸將議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發卒其勢必得所欲是歲元狩四年也春上令大將軍青票騎將軍去病各五萬騎步兵轉者踵軍數十萬而敢力戰深入之士皆屬去病去病始為出定襄當單于捕虜虜言單于東乃更令去病出代郡令青出定襄郎中令李廣為前將軍太僕公孫賀為左將軍主爵趙食其為右將軍平陽侯襄為後將軍皆屬大將軍趙信為單于謀曰漢兵即度幕人馬罷匈奴可坐收虜耳乃悉遠北其輜重皆以精兵待幕北而適直青軍出塞千餘里見單于兵陳而待於是青令武剛車自環為營而縱五千騎往當匈奴匈奴亦縱萬騎會日且入而大風起沙礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚彊戰而匈奴不利薄莫單于遂乘六臝壯騎可數百直冒漢圍西北馳去昏漢匈奴相紛挐殺傷大當漢