  - {type: variant, offset: 21, length: 0, content: '', WYG: 北離宫所在也晉灼曰或說在城中東北角師古曰今其城東二十里所有故臺基其處寛博土俗云}
  - {type: variant, offset: 21, length: 0, content: '', krp: 北離宫所在也晉灼曰或說在城中東北角師古曰今其城東二十里所有故臺基其處寛博土俗云}
  - {type: variant, offset: 22, length: 1, content: 陽, WYG: 臺也復音方目反得賜天子旌旗從千乗萬騎出稱警入言䟆師古曰警者戒肅也䟆止行}
  - {type: variant, offset: 22, length: 1, content: 陽, krp: 臺也復音方目反得賜天子旌旗從千乗萬騎出稱警入言䟆師古曰警者戒肅也䟆止行}
