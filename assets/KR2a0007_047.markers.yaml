  - {type: variant, offset: 4150, length: 0, content: '', WYG: 薨子荒王嘉嗣十五年薨子立嗣鴻嘉中太傅輔奏立一日至十一犯法臣下愁苦莫敢親近不可諌止願令王非耕祠法駕毋得出宫盡出馬置外苑收兵杖藏私府毋得以金錢財物假賜人事下丞相御史請許師古曰許太傅所奏奏可後數復􅇌傷郎師古曰􅇌棰擊音一口反宋祁云浙本注文棰擊也夜私出宫傅相連奏}
