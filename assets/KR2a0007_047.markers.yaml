  - {type: 'tls:seg', offset: 25, content: '', id: KR2a0007_tls_047-1a.5}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也儗於天子師古曰儗比也音擬招延四方豪桀自山東游士莫不至齊人羊勝公孫詭鄒陽之屬師古曰言皆游梁公孫詭多竒邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數千萬而府庫金錢且百鉅萬師古曰鉅萬百萬也且百萬者言凡百也宋祁曰千萬一作十珠玉寳器多於京師二十九年十月孝王入朝景帝使使持乗輿駟迎梁王於闗下鄧展曰但持駟馬往也臣瓚曰稱乘輿駟則車馬皆往言駟不駕六馬耳天子副車駕駟馬師古曰輿卽車也瓚說是既朝上疏因留}
  - {type: page-break, offset: 25, content: '', id: KR2a0007_WYG_047-3a, image: WYG0250/WYG0250-0110a.png}
  - {type: variant, offset: 25, length: 0, content: '', krp: 言出入者互文耳出亦有䟆漢儀注皇帝輦動左右侍帷幄者稱警出殿則傳蹕止人清道也儗於天子師古曰儗比也音擬招延四方豪桀自山東游士莫不至齊人羊勝公孫詭鄒陽之屬師古曰言皆游梁公孫詭多竒邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數千萬而府庫金錢且百鉅萬師古曰鉅萬百萬也且百萬者言凡百也宋祁曰千萬一作十珠玉寳器多於京師二十九年十月孝王入朝景帝使使持乗輿駟迎梁王於闗下鄧展曰但持駟馬往也臣瓚曰稱乘輿駟則車馬皆往言駟不駕六馬耳天子副車駕駟馬師古曰輿卽車也瓚說是既朝上疏因留}
  - {type: variant, offset: 26, length: 3, content: 縣吏給, WYG: 太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者著引籍出入天子殿門師古曰著音竹畧反與漢宦官亡異十一月上廢栗太子太后心欲以梁王爲嗣大臣及爰盎等有所闗說於帝太后議格服虔曰格音格鬭張晏曰止也蘇林曰音閣師古曰蘇音張說是孝王不敢復言太后以嗣}
  - {type: variant, offset: 26, length: 3, content: 縣吏給, krp: 太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者著引籍出入天子殿門師古曰著音竹畧反與漢宦官亡異十一月上廢栗太子太后心欲以梁王爲嗣大臣及爰盎等有所闗說於帝太后議格服虔曰格音格鬭張晏曰止也蘇林曰音閣師古曰蘇音張說是孝王不敢復言太后以嗣}
  - {type: variant, offset: 30, length: 13, content: 侯家平陽侯曹壽尚武帝姊陽信, WYG: 師古曰不敢更以此事言於太后事祕世莫知廼辭歸國其夏上立膠東王爲太子梁王怨爰盎及議臣廼與羊勝分孫詭之屬謀隂使人刺殺爰盎及他議臣十餘人賊未得也於是天子意梁師古曰意疑也逐賊果梁使之遣使冠蓋相望於道覆案梁事捕公孫詭羊勝皆匿王後宫使者責二千石急梁相軒丘豹師古曰姓軒丘名豹及内史安國師古曰韓安國皆泣諫王王廼令勝詭皆自殺出之上由此怨望於梁王師古曰望謂責而怨之梁王恐廼使韓安國因}
