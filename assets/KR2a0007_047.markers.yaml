  - {type: variant, offset: 4881, length: 5, content: 方益少胡寇, WYG: 至髙陽注蘇林曰陳留北縣臣召南按高陽鄉聚名非縣也酈食其傳云陳留高陽人又云諸將狥地過高陽者數十人即此高陽矣大臣及爰盎等有所關說于帝按褚先生具言其事見梁孝王世家後北獵梁山梁山史記作良山太后廼說爲帝壹餐史記作爲帝加壹餐梁懐王揖傳揖臣召南按梁懐王名史記表及世家作勝而孝文本紀作揖漢書賈誼傳作勝而紀及本傳作揖李竒謂懐王必有兩名理或然也梁共王買傳十年薨臣召南按諸侯王表作七年薨是也七十字相似傳寫誤耳買以孝景後元年嗣以建元五年薨是七年也梁平王襄傳雎陽人犴反按此文則其人姓犴名反史記作類犴反則其人姓類犴漢書脫一字耳梁餘尚有八城臣召南按史記作削梁八城梁餘尚有十城以地理志証之梁國統八縣則此文是也頃王無傷嗣諸侯王表作貞王毋傷前漢書卷}
