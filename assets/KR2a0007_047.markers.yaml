  - {type: variant, offset: 7, length: 0, content: '', WYG: 十七孝文皇帝四男竇皇后生孝景帝梁孝王武諸姬生代孝王參梁懐王揖師古曰不得其姓氏故曰諸姬言在諸姬之列者也解在髙五王傳梁孝王武以孝文二年與太原王參梁王揖同日立武爲代王四年徙爲淮陽王十二年徙梁自初王通歴已十一年矣師古曰總數其爲王之年孝王十四年入朝十七年十八年比年入朝留師古曰比頻也留謂留在京師其明年乃之國二十一年入朝二十二年文帝崩二十四年入朝}
  - {type: page-break, offset: 7, content: '', id: KR2a0007_WYG_047-1b, image: WYG0250/WYG0250-0109b.png}
