  - {type: variant, offset: 13, length: 2, content: 仲卿, WYG: 於是孝王築東苑方三百餘里廣雎陽城七十里師古曰更廣大之也晉太康地記云城方十三里梁孝王築之鼓倡節杵而後下和之者稱雎陽曲今踵以爲故今之樂家雎陽曲是}
  - {type: variant, offset: 13, length: 2, content: 仲卿, krp: 於是孝王築東苑方三百餘里廣雎陽城七十里師古曰更廣大之也晉太康地記云城方十三里梁孝王築之鼓倡節杵而後下和之者稱雎陽曲今踵以爲故今之樂家雎陽曲是}
