  - {type: variant, offset: 499, length: 245, content: 隴西捕首虜數千畜百餘萬走白羊樓煩王遂取河南地為朔方郡以三千八百戶封青為長平侯青校尉蘇建為平陵侯張次公為岸頭侯使建築朔方城上曰匈奴逆天理亂人倫暴長虐老以盜竊為務行詐諸蠻夷造謀籍兵數為邊害故興師遣將以征厥罪詩不云乎薄伐獫允至于太原出車彭彭城彼朔方今車騎將軍青度西河至高闕獲首二千三百級車輜畜產畢收為鹵已封為列侯遂西定河南地案榆谿舊塞絕梓領梁北河討蒲泥破符離斬輕銳之卒捕伏聽者三千一十七級執訊獲醜敺馬牛羊百有餘萬全甲兵而還益封青三千八百戶其後匈奴比歲入代郡雁門定襄上郡朔方所殺略甚眾語在匈奴傳元朔, WYG: 他子}
