  - {type: variant, offset: 17553, length: 0, content: '', WYG: 劍之任師古曰任用也事也五載而成帝業書傳所記未嘗有焉何則古世相革皆承聖王之烈師古曰革變也烈謂餘烈也今漢獨收孤秦之弊鐫金石者難為功摧枯朽者易為力師古曰鐫琢石也音子全反其埶然也故據漢受命譜十八王月而列之天下一統廼以}
