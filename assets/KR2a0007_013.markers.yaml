  - {type: variant, offset: 3037, length: 13740, content: 故曰玉衡論語云立則見其參於前也在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鐘之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象也五權之制以義立之以物鈞之其餘小大之差以輕重為宜圜而環之令之肉倍好者周旋無端終而復始無窮已也銖者物繇忽微始至於成著可殊異也兩者兩黃鐘律之重也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻陰陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣陰化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也三十斤成鈞者一月之象也石者大也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞為石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黃鐘之象也千九百二十兩者陰陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物歷四時之象也而歲功成就五權謹矣權與物鈞而生衡衡運生規規圜生矩矩方生繩繩直生準準正則平衡而鈞權矣是為五則規者所以規圜器械令得其類也矩者所以矩方器械令不失其形也規矩相須陰陽位序圜方乃成準者所以揆平取正也繩者上下端直經緯四通也準繩連體衡權合德百工繇焉以定法式輔弼執玉以翼天子詩云尹氏大師秉國之鈞四方是維天子是毗俾民不迷咸有五象其義一也以陰陽言之大陰者北方北伏也陽氣伏於下於時為冬冬終也物終臧乃可稱水潤下知者謀謀者重故為權也大陽者南方南任也陽氣任養物於時為夏夏假也物假大乃宣平火炎上禮者齊齊者平故為衡也少陰者西方西遷也陰氣遷落物於時為秋秋𩏶也物𩏶歛乃成孰金從革改更也義者成成者方故為矩也少陽者東方東動也陽氣動物於時為春春蠢也物蠢生乃動運木曲直仁者生生者圜故為規也中央者陰陽之內四方之中經緯通達乃能端直於時為四季土稼嗇蕃息信者誠誠者直故為繩也五則揆物有輕重圜方平直陰陽之義四方四時之體五常五行之象厥法有品各順其方而應其行職在大行鴻臚掌之書曰予欲聞六律五聲八音七始詠以出內五言女聽予者帝舜也言以律呂和五聲施之八音合之成樂七者天地四時人之始也順以歌詠五常之言聽之則順乎天地序乎四時應人倫本陰陽原情性風之以德感之以樂莫不同乎一唯聖人為能同天下之意故帝舜欲聞之也今廣延群儒博謀講道修明舊典同律審度嘉量平衡鈞權正準直繩立于五則備數和聲以利兆民貞天下於一同海內之歸凡律度量衡用銅者名自名也所以同天下齊風俗也銅為物之至精不為燥溼寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也曆數之起上矣傳述顓頊命南正重司天火正黎司地其後三苗亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方堯復育重黎之後使纂其業故書曰乃命羲和欽若昊天曆象日月星辰敬授民時歲三百有六旬有六日以閏月定四時成歲允釐百官眾功皆美其後以授舜曰咨爾舜天之曆數在爾躬舜亦以命禹至周武王訪箕子箕子言大法九章而五紀明曆法故自殷周皆創業改制咸正曆紀服色從之順其時氣以應天道三代既沒五伯之末史官喪紀疇人子弟分散或在夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘秦兼天下未皇暇也亦頗推五勝而自以為獲水德乃以十月為正色上黑漢興方綱紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊曆比於六曆疏闊中最為微近然正朔服色未覩其真而朔晦月見弦望滿虧多非是至武帝元封七年漢興百二歲矣大中大夫公孫卿壺遂太史令司馬遷等言曆紀壞廢宜改正朔是時御史大夫兒寬明經術上乃詔寬曰與博士共議今宜何以為正朔服色何上寬與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復推傳序文則今夏時也臣等聞學褊陋不能明陛下躬聖發憤昭配天地臣愚以為三統之制後聖復前聖者二代在前也今二代之統絕而不序矣唯陛下發聖德宣考天地四時之極則順陰陽以定大明之制為萬世則於是乃詔御史曰乃者有司言曆未定廣延宣問以考星度未能讎也蓋聞古者黃帝合而不死名察發斂定清濁起五部建氣物分數然則上矣書缺樂弛朕甚難之依違以惟未能修明其以七年為元年遂詔卿遂遷與侍郎尊大典星射姓等議造漢曆乃定東西立晷儀下漏刻以追二十八宿相距於四方舉終以定朔晦分至躔離弦望乃以前曆上元泰初四千六百一十七歲至於元封七年復得閼逢攝提格之歲中冬十一月甲子朔旦冬至日月在建星太歲在子已得太初本星度新正姓等奏不能為算願募治曆者更造密度各自增減以造漢太初曆乃選治曆鄧平及長樂司馬可酒泉候宜君侍郎尊及與民間治曆者凡二十餘人方士唐都巴郡落下閎與焉都分天部而閎運算轉曆其法以律起曆曰律容一龠積八十一寸則一日之分也與長相終律長九寸百七十一分而終復三復而得甲子夫律陰陽九六爻象所從出也故黃鐘紀元氣之謂律律法也莫不取法焉與鄧平所治同於是皆觀新星度日月行更以算推如閎平法法一月之日二十九日八十一分日之四十三先藉半日名曰陽曆不藉名曰陰曆所謂陽曆者先朔月生陰曆者朔而後月乃生平曰陽曆朔皆先旦月生以朝諸侯王群臣便乃詔遷用鄧平所造八十一分律曆罷廢尤疏遠者十七家復使校曆律昏明宦者淳于陵渠復覆太初曆晦朔弦望皆最密日月如合璧五星如連珠陵渠奏狀遂用鄧平曆以平為太史丞後二十七年元鳳三年太史令張壽王上書言曆者天地之大紀上帝所為傳黃帝調律曆漢元年以來用之今陰陽不調宜更曆之過也詔下主曆使者鮮于妄人詰問壽王不服妄人請與治曆大司農中丞麻光等二十餘人雜候日月晦朔弦望八節二十四氣鈞校諸曆用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林清臺課諸曆疏密凡十一家以元鳳三年十一月朔旦冬至盡五年十二月各有第壽王課疏遠案漢元年不用黃帝調曆壽王非漢曆逆天道非所宜言大不敬有詔勿劾復候盡六年太初曆第一即墨徐萬且長安徐禹治太初曆亦第一壽王及待詔李信治黃帝調曆課皆疏闊又言黃帝至元鳳三年六千餘歲丞相屬寶長安單安國安陵桮育治終始言黃帝以來三千六百二十九歲不與壽王合壽王又移帝王錄舜禹年歲不合人年壽王言化益為天子代禹驪山女亦為天子在殷周間皆不合經術壽王曆乃太史官殷曆也壽王猥曰安得五家曆又妄言太初曆虧四分日之三去小餘七百五分以故陰陽不調謂之亂世劾壽王吏八百石古之大夫服儒衣誦不詳之辭作祅言欲亂制度不道奏可壽王候課比三年下終不服再劾死更赦勿劾遂不更言誹謗益甚竟以下吏故曆本之驗在於天自漢曆初起盡元鳳六年三十六歲而是非堅定至孝成世劉向總六曆列是非作五紀論向子歆究其微眇作三統曆及譜以說春秋推法密要故述焉夫曆春秋者天時也列人事而目殿本作因景祐本作固因殿本作因景祐本作固以天時傳曰民受天地之中以生所謂命也是故有禮誼動作威儀之則以定命也能者養以之福不能者敗以取禍故列十二公二百四十二年之事以陰陽之中制其禮故春為陽中萬物以生秋為陰中萬物以成是以事舉其中禮取其和曆數以閏正天地之中以作事厚生皆所以定命也易金火相革之卦曰湯武革命順乎天而應乎人又曰治曆明時所以和人道也周道既衰幽王既喪天子不能班朔魯曆不正以閏餘一之歲為蔀首故春秋刺十一月乙亥朔日有食之於是辰在申而司曆以為在建戌史書建亥哀十二年亦以建申流火之月為建亥而怪蟄蟲之不伏也自文公閏月不告朔至此百有餘年莫能正曆數故子貢欲去其餼羊孔子愛其禮而著其法於春秋經曰冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以厎日禮也日御不失日以授百官於朝言告朔也元典曆始曰元傳曰元善之長也共養三德為善又曰元體之長也合三體而為之原故曰元於春三月每月書王元之三統也三統合於一元故因元一而九三之以為法十一三之以為實實如法得一黃鐘初九律之首陽之變也因而六之以九為法得林鐘初六呂之首陰之變也皆參天兩地之法也上生六而倍之下生六而損之皆以九為法九六陰陽夫婦子母之道也律娶妻而呂生子天地之情也六律六呂而十二辰立矣五聲清濁而十日行矣傳曰天六地五數之常也天有六氣降生五味夫五六者天地之中合而民所受以生也故日有六甲辰有五子十一而天地之道畢言終而復始太極中央元氣故為黃鐘其實一龠以其長自乘故八十一為日法所以生權衡度量禮樂之所繇出也經元一以統始易太極之首也春秋二以目歲易兩儀之中也於春每月書王易三極之統也於四時雖亡事必書時月易四象之節也時月以建分至啟閉之分易八卦之位也象事成敗易吉凶之效也朝聘會盟易大業之本也故易與春秋天人之道也傳曰龜象也筮數也物生而後有象象而後有滋滋而後有數是故元始有象一也春秋二也三統三也四時四也合而為十成五體以五乘十大衍之數也而道據其一其餘四十九所當用也故蓍以為數以象兩兩之又以象三三之又以象四四之又歸奇象閏十九及所據一加之困以再扐兩之是為月法之實如日法得一則一月之日數也而三辰之會交矣是以能生吉凶故易曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天也之數五十有五此所以成變化而行鬼神也并終數為十九易窮則變故為閏法參天九兩地十是為會數參天數二十五兩地數三十是為朔望之會以會數乘之則周於朔旦冬至是為會月九會而復元黃鐘初九之數也經於四時雖亡事必書時月時所以記啟閉也月所以紀分至也啟閉者節也分至者中也節不必在其月故時中必在正數之月故傳曰先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不誖此聖王之重閏也以五位乘會數而朔旦冬至是為章月四分月法以其一乘章月是為中法參閏法為周至以乘月法以減中法而約之則六錢大昕說六當作七七錢大昕說六當作七扐之數為一月之閏法其餘七分此中朔相求之術也朔不得中是謂閏月言陰陽雖交不得中不生故日法乘閏法是為統歲三統是為元歲元歲之閏陰陽災三統閏法易九戹曰初入元百六陽九次三百七十四陰九次四百八十陽九次七百二十陰七次七百二十陽七次六百陰五次六百陽五次四百八十陰三次四百八十陽三凡四千六百一十七歲與一元終經歲四千五百六十災歲五十七是以春秋曰舉正於中又曰閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時正也何以為民故善僖五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啟閉必書雲物為備故也至昭二十年二月己丑日南至失閏至在非其月梓慎望氛氣而弗正不履端於始也故傳不曰冬至而曰日南至極於牽牛之初日中之時景最長以此知其南至也斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中凡十二次日至其初為節至其中斗建下為十二辰視其建而知其次故曰制禮上物不過十二天之大數也經曰春王正月傳曰周正月火出於夏為三月商為四月周為五月夏數得天得四時之正也三代各據一統明三統常合而迭為首登降三統之首周還五行之道也故三五相包而生天統之正始施於子半日萌色赤地統受之於丑初日肇化而黃至丑半日牙化而白人統受之於寅初日孽成而黑至寅半日生成而青天施復於子地化自丑畢於辰人生自寅成於申故曆數三統天以甲子地以甲辰人以甲申孟仲季迭用事為統首三微之統既著而五行自青始其序亦如之五行與三統相錯傳曰天有三辰地有五行然則三統五星可知也易曰參五以變錯綜其數通其變遂成天下之文極其數遂定天下之象太極運三辰五星於上而元氣轉三統五行於下其於人皇極統三德五事故三辰之合於三統也日合於天統月合於地統斗合於人統五星之合於五行水合於辰星火合於熒惑金合於太白木合於歲星土合於填星三辰五星而相經緯也天以一生水地以二生火天以三生木地以四生金天以五生土五勝相乘以生小周以乘乾坤之策而成大周陰陽比類交錯相成故九六之變登降於六體三微而成著三著而成象二象十有八變而成卦四營而成易為七十二參三統兩四時相乘之數也參之則得乾之策兩之則得坤之策以陽九九之為六百四十八以陰六六之為四百三十二凡一千八十陰陽各一卦之微算策也八之為八千六百四十而八卦小成引而信之又八之為六萬九千一百二十天地再之為十三萬八千二百四十然後大成五星會終觸類而長之以乘章歲為二百六十二萬六千五百六十而與日月會三會為七百八十七萬九千六百八十而與三統會三統二千三百六十三萬九千四十而復於太極上元九章歲而六之為法太極上元為實實如法得一陰一張文虎說實如法得一當絕句算家常語淺人誤以一陰連屬遂又於陽上亦增一字陽各萬一千五百二十當萬物氣體之數天下之能事畢矣統母日法八十一元始黃鐘初九自乘一龠之數得日法閏法十九因為章歲合天地終數得閏法統法千五百三十九以閏法乘日法得統法元法四千六百一十七參統法得元法會數四十七參天九兩地十得會數章月二百三十五五位乘會數得章月月法二千三百九十二推大衍象得月法通法五百九十八四分月法得通法中法十四萬五百三十以章月乘通法得中法周天五十六萬二千一百二十以章月乘月法得周天歲中十二以三統乘四時得歲中月周二百五十四以章月加閏法得月周朔望之會百三十五參天數二十五兩地數三十得朔望之會會月六千三百四十五以會數乘朔望之會得會月統月萬九千三十五參會月得統月元月五萬七千一百五參統月得元月章中二百二十八以閏法乘歲中得章中統中萬八千四百六十八以日法乘章中得統中元中五萬五千四百四參統中得元中策餘八千八十什乘元中以減周天得策餘周至五十七參閏法得周至統李銳說統是紀之誤紀李銳說統是紀之誤母木金相乘為十二是為歲星小周小周乘巛策為千七百二十八是為歲星歲數見中分二萬七百三十六積中十三中餘百五十七見中法千五百八十三見閏分萬二千九十六積月十三月餘萬五千七十九見月法三萬七十七見中日法七百三十萬八千七百一十一見月日法二百四十三萬六千二百三十七金火相乘為八又以火乘之為十六而小復小復乘乾策為三千四百五十六是為太白歲數見中分四萬一千四百七十二積中十九中餘四百一十三見中法二千一百六十一見閏分二萬四千一百九十二積月十九月餘三萬二千三十九見月法四萬一千五十九晨中分二萬三千三百二十八積中十中餘千七百一十八十一作七王先謙說十一作七四字乃後人校語此下並同按景祐殿本十作七夕中分萬八千一百四十四積中八中餘八百五十六晨閏分萬三千六百八積月十一月餘五千一百九十一夕閏分萬五百八十四積月八月餘二萬六千八百四十八見中日法九百九十七萬七千三百三十七見月日法三百三十二萬五千七百七十九土木相乘而合經緯為三十是為鎮星小周小周乘巛策為四千三百二十是為鎮星歲數見中分五萬一千八百四十積中十二中餘千七百四十見中法四千一百七十五見閏分三萬二百四十積月十二月餘六萬三千三百見月法七萬九千三百二十五見中日法千九百二十萬五千九百七十五見月日法六百四十二萬五千三百二十五火經特成故二歲而過初三十二過初為六十四歲而小周小周乘乾策則太陽大周為萬三千八百二十四歲是為熒惑歲數見中分十六萬五千八百八十八積中二十五中餘四千一百六十三見中法六千四百六十九見閏分九萬六千七百六十八積月二十六月餘五萬二千九百五十四見月法十二萬九百一十一見中日法二千九百八十六萬七千三百七十三見月日法九百九十五萬五千七百九十一水經特成故一歲而及初六十四及初而小復小復乘巛策則太陰大周為九千二百一十六歲是為辰星歲數見中分十一萬五百九十二積中三中餘三萬二千四百六十九見中法二萬九千四十一見閏分六萬四千五百一十二積月三月餘五十一萬四百二十三見月法五十五萬一千七百七十九晨中分六萬二千