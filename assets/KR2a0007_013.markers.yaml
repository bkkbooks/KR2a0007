  - {type: variant, offset: 418, length: 1911, content: 算術宣於天下小學是則職在太史羲和掌之聲者宮商角徵羽也所以作樂者諧八音蕩降景祐殿局本都作滌滌景祐殿局本都作滌人之邪意全其正性移風易俗也八音土曰塤匏曰笙皮曰鼓竹曰管絲曰絃石曰磬金曰鐘木曰柷五聲和八音諧而樂成商之為言章也物成孰可章度也角觸也物觸地而出戴芒角也宮中也居中央暢四方唱始施生為四聲綱也徵祉也物盛大而䋣祉也羽宇也物聚臧宇覆之也夫聲者中於宮觸於角祉於徵章於商宇於羽故四聲為宮紀也協之五行則角為木五常為仁五事為貌商為金為義為言徵為火為禮為視羽為水為智為聽宮為土為信為思以君臣民事物言之則宮為君商為臣角為民徵為事羽為物唱和有象故言君臣位事之體也五聲之本生於黃鐘之律九寸為宮或損或益以定商角徵羽九六相生陰陽之應也律十有二陽六為律陰六為呂律以統氣類物一曰黃鐘二曰太族三曰姑洗四曰蕤賓五曰夷則六曰亡射呂以旅陽宣氣一曰林鐘二曰南呂三曰應鐘四曰大呂五曰夾鐘六曰中呂有三統之義焉其傳曰黃帝之所作也黃帝使泠綸自大夏之西昆侖之陰取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鐘之宮制十二筩以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鐘之宮而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定黃鐘黃者中之色君之服也鐘者種也天之中數五五為聲聲上宮五聲莫大焉地之中數六六為律律有形有色色上黃五色莫盛焉故陽氣施種於黃泉孳萌萬物為六氣元也以黃色名元氣律者著宮聲也宮以九唱六變動不居周流六虛始於子在十一月大呂呂旅也言陰大旅助黃鐘宮景祐殿本都作宣宣景祐殿本都作宣氣而牙物也位於丑在十二月太族族奏也言陽氣大奏地而達物也位於寅在正月夾鐘言陰夾助太族宣四方之氣而出種物也位於卯在二月姑洗洗絜也言陽氣洗物辜絜之也位於辰在三月中呂言微陰始起未成著於其中旅助姑洗宣氣齊物也位於巳在四月蕤賓蕤繼也賓導也言陽始導陰氣使繼養物也位於午在五月林鐘林君也言陰氣受任助蕤賓君主種物使長大楙盛也位於未在六月夷則則法也言陽氣正法度而使陰氣夷當傷之物也位於申在七月南呂南任也言陰氣旅助夷則任成萬物也位於酉在八月亡射射厭也言陽氣究物而使陰氣畢剝落之終而復始亡厭已也位於戌在九月應鐘言陰氣應亡射該臧萬物而雜陽閡種也位於亥在十月三統者天施地化人事之紀也十一月乾之初九陽氣伏於地下始著為一萬物萌動鐘於太陰故黃鐘為天統律長九寸九者所以究極中和為萬物元也易曰立天之道曰陰與陽六月坤之初六陰氣受任於太陽繼養化柔萬物生長楙之於未令種剛彊大故林鐘為地統律長六寸六者所以含陽之施楙之於六合之內令剛柔有體也立地之道曰柔與剛乾知太始坤作成物正月乾之九三萬物棣通族出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故太族為人統律長八寸象八卦宓戲氏之所以順天地通神明類萬物之情也立人之道曰仁與義在天成象在地成形后以裁成天地之道輔相天地之宜以左右民此三律之謂矣是為三統其於三正也黃鐘子為天正林鐘未之衝丑為地正太族寅為人正三正正始是以地正適其始紐於陽東北丑位易曰東北喪朋乃終有慶答應之道也及黃鐘為宮則太族姑洗林鐘南呂皆以正聲應無有忽微不復與它律為役者同心一統之義也非黃鐘而它律雖當其月自宮者則其和應之律有空積忽微不得其正此黃鐘至尊亡與並也易曰參天兩地而倚數天之數始於一終於二十有五其義紀之以三故置一得三又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乘之為八百一十分應曆一統千五百三十九歲之章數黃鐘之實也繇此之義起十二律之周徑地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中數六乘之為三百六十分當期之日林鐘之實人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乘之為六百四十分以應六十四卦大族之實也書曰天功人其代之天兼地人則天故以五位之合乘焉唯天為大唯堯則之之象也地以中數乘者陰道理內在中餽之象也三統相通故黃鐘林鐘太族律長皆全寸而亡餘分也天之中數五地之中數六而二者為合六為虛五為聲周流於六虛虛者爻律夫陰陽登降運行列為十二而律呂和矣太極元氣函三為一極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於巳得二百四十三又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戌得五萬九千四十九又參之於亥得十七萬七千一百四十七此陰陽合德氣鐘於子化生萬物者也故孳萌於子紐牙於丑引達於寅冒茆於卯振美於辰已盛於巳咢布於午昧薆於未申堅於申留孰於酉畢入於戌該閡於亥出甲於甲奮軋於乙明炳於丙大盛於丁豐楙於戊理紀於己斂更於庚悉新於辛懷任於壬陳揆於癸故陰陽之施化萬物之終始既類旅於律呂又經歷於日辰而變化之情可見矣, WYG: 璿璣}
