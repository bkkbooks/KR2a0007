  - {type: variant, offset: 17780, length: 464, content: 年景帝前七年中六年後三年著紀即位十六年武帝建元元光元朔各六年元朔六年十一月甲申朔旦冬至殷曆以為乙酉距初元七十六歲元狩元鼎元封各六年漢曆太初元年距上元十四萬三千一百二十七歲前十一月甲子朔旦冬至歲在星紀婺女六度故漢志曰歲名困敦正月歲星出婺女太初天漢太始征和各四年後二年著紀即位五十四年昭帝始元元鳳各六年元平一年著紀即位十三年宣帝本始地節元康神爵五鳳甘露各四年黃龍一年著紀即位二十五年元帝初元二年十一月癸亥朔旦冬至殷曆以為甲子以為紀首是歲也十月日食非合辰之會不得為紀首距建武七十六歲初元永光建昭各五年竟寧一年著紀即位十六年成帝建始河平陽朔鴻嘉永始元延各四年綏和二年著紀即位二十六年哀帝建平四年元壽二年著紀即位六年平帝著紀即位元始五年以宣帝玄孫嬰為嗣謂之孺子孺子著紀新都侯王莽居攝三年王莽居攝盜襲帝位竊號曰新室始建國五年天鳳六年地皇三年著紀盜位十四年更始帝著紀以漢宗室滅王莽即位二年赤眉賊立宗室劉盆子滅更始帝自漢元年訖更始二年凡二百三十歲光武皇帝著紀以景帝後高祖九世孫受命中興復漢改元曰建武歲在鶉尾之張度建武三十一年中元二年即位三十三年, WYG: 考證}
