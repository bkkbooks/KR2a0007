紂克殷以箕子歸十三年也故書序曰武王克殷以箕子歸作洪範洪範篇曰惟十有三祀王訪于箕子自文王受命而至此十三年歲亦在鶉火故傳曰歲在鶉火則我有周之分野也師初發以殷十一月戊子日在析木箕七度故傳曰日在析木是夕也月在房五度房為天駟故傳曰月在天駟後三日得周正月辛卯朔合辰在斗前一度斗柄也故傳曰辰在斗柄明日壬辰䢅星始見癸巳武王始發丙午還師戊午度于孟津孟津去周九百里師行三十里故三十一日而度明日己未冬至䢅星與婺女伏歷建星及牽牛至於婺女天黿之首故傳曰星在天黿周書武成篇惟一月壬辰旁死霸若翌日癸巳武王乃朝步自周于征伐紂序曰一月戊午師度于孟津至庚申二月朔日也四日癸亥至牧野夜陳甲子昧爽而合矣故外傳曰王以二月癸亥夜陳武成篇曰粵若來三月既死霸粵五日甲子咸劉商王紂是歲也閏數餘十八正大寒中在周二月己丑晦明日閏月庚寅朔三月二日庚申驚蟄四月己丑朔死霸死霸朔也生霸望也是月甲辰望乙巳旁之故武成篇曰惟四月既旁生霸粵六日庚戌武王燎于周廟翌日辛亥祀于天位粵五日乙卯乃以庶國祀馘于周廟文王十五而生武王受命九年而崩崩後四年而武王克殷克殷之歲八十六矣後七歲而崩故禮記文王世子曰文王九十七而終武王九十三而終凡武王即位十一年周公攝政五年正月丁巳朔旦冬至殷曆以為六年戊午距煬公七十六歲入孟統二十九章首也後二歲得周公七年復子明辟之歲是歲二月乙亥朔庚寅望後六日得乙未故召誥曰惟二月既望粵六日乙未又其三月甲辰朔三日丙午召誥曰惟三月丙午朏古文月采篇曰三日曰朏是歲十二月戊辰晦周公以反政故洛誥篇曰戊辰王在新邑烝祭歲命作策惟周公誕保文武受命惟七年成王元年正月己巳朔此命伯禽俾侯于魯之歲也後三十年四月庚戌朔十五日甲子哉生霸故顧命曰惟四月哉生霸王有疾不豫甲子王乃洮沬水作顧命翌日乙丑成王崩康王十二年六月戊辰朔三日庚午故畢命豐刑曰惟十月景祐殿局本都作有王先謙說作有是有景祐殿局本都作有王先謙說作有是二年六月庚午朏王命作策豐刑春秋殷曆皆以殷魯自周昭王以下亡年數故據周公伯禽以下為紀魯公伯禽推即位四十六年至康王十六年而薨故傳曰燮父禽父並事康王言晉侯燮魯公伯禽俱事康王也子考公就立酋考公世家即位四年及煬公熙立煬公二十四年正月丙申朔旦冬至殷曆以為丁酉距微公七十六歲世家煬公即位六十年子幽公宰立幽公世家即位十四年及微公茀立㵒微公二十六年正月乙亥朔旦冬至殷曆以為丙子距獻公七十六歲世家微公即位五十年子厲公翟立擢厲公世家即位三十七年及獻公具立獻公十五年正月甲寅朔旦冬至殷曆以為乙卯距懿公七十六歲世家獻公即位五十年子慎公埶立嚊慎公世家即位三十年及武公敖立武公世家即位二年子懿公被立戲懿公九年正月癸巳朔旦冬至殷曆以為甲午距惠公七十六歲世家懿公即位九年兄子柏御立柏御世家即位十一年叔父孝公稱立孝公世家即位二十七年子惠公皇立惠公三十八年正月壬申朔旦冬至殷曆以為癸酉距釐公七十六歲世家惠公即位四十六年子隱公息立凡伯禽至春秋三百八十六年春秋隱公春秋即位十一年及桓公軌立此元年上距伐紂四百歲桓公春秋即位十八年子莊公同立莊公春秋即位三十二年子愍公啟方立愍公春秋即位二年及釐公申立釐公五年正月辛亥朔旦冬至殷曆以為壬子距成公七十六歲是歲距上元十四萬二千五百七十七歲得孟統五十三章首故傳曰五年春王正月辛亥朔日南至八月甲午晉侯圍上陽章景祐殿本都作童此誤童景祐殿本都作童此誤謠云丙子之辰龍尾伏辰袀服振振取虢之旂鶉之賁賁天策焞焞火中成軍虢公其奔卜偃曰其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子滅虢言曆者以夏時故周十二月夏十月也是歲歲在大火故傳曰晉侯使寺人披伐蒲重耳奔狄董因曰君之行歲在大火後十二年釐之十六歲歲在壽星故傳曰重耳處狄十二年而行過衛五鹿乞食於野人野人舉凷而與之子犯曰天賜也後十二年必獲此土歲復於壽星必獲諸侯後八歲釐之二十四年也歲在實沈秦伯納之故傳曰董因云君以辰出而以參入必獲諸侯春秋釐公即位三十三年子立公興立文公元年距辛亥朔旦冬至二十九歲是歲閏餘十三正小雪閏當在十一月後而在三月故傳曰非禮也後五年閏餘十是歲亡閏而置閏閏所以正中朔也亡閏而置閏又不告朔故經曰閏月不告朔言亡此月也傳曰不告朔非禮也春秋文公即位十八年子宣公倭立宣公春秋即位十八年子成公黑肱立成公十二年正月庚寅朔旦冬至殷曆以為辛卯距定公七年七十六歲春秋成公即位十八年子襄公午立襄公二十七年距辛亥百九歲九月乙亥朔是建申之月也魯史書十二月乙亥朔日有食之傳曰冬十一月乙亥朔日有食之於是辰在申司曆過也再失閏矣言時實行以為十一月也不察其建不, WYG: ''}
