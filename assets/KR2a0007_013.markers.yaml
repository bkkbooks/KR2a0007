  - {type: variant, offset: 17549, length: 1, content: 紀, WYG: 作莊者皆易為嚴也它皆類此蠶食謂漸吞滅之如蠶食葉也百有餘載至始皇廼并天下以徳若彼用力如此其囏難也師古曰囏古艱字也秦既稱帝患周之敗以爲起於處士横議諸侯力爭四夷交侵以弱見奪服䖍曰言因横議而敗也應劭曰孟軻云聖王不作諸侯恣行處士横議師古曰處士謂不官於朝而居家者也横音胡孟反次下横發其音亦同也於是削去五等應劭曰周制公侯伯子男五等爵墮城銷刃應劭曰壞其堅城恐復阻以害已也聚天下之兵鑄以為銅人十二不欲令民復逆命也古者以銅為兵師古曰墮音火規反箝語燒書應劭曰禁民聚語畏其謗已箝緘也箝與鉗同晉灼曰許愼云箝籥也師古曰晉説是也謂箝籥其口不聽妄言也}
  - {type: page-break, offset: 17549, content: '', id: KR2a0007_WYG_013-2a, image: WYG0249/WYG0249-0185a.png}
  - {type: variant, offset: 17549, length: 1, content: 紀, krp: 作莊者皆易為嚴也它皆類此蠶食謂漸吞滅之如蠶食葉也百有餘載至始皇廼并天下以徳若彼用力如此其囏難也師古曰囏古艱字也秦既稱帝患周之敗以爲起於處士横議諸侯力爭四夷交侵以弱見奪服䖍曰言因横議而敗也應劭曰孟軻云聖王不作諸侯恣行處士横議師古曰處士謂不官於朝而居家者也横音胡孟反次下横發其音亦同也於是削去五等應劭曰周制公侯伯子男五等爵墮城銷刃應劭曰壞其堅城恐復阻以害已也聚天下之兵鑄以為銅人十二不欲令民復逆命也古者以銅為兵師古曰墮音火規反箝語燒書應劭曰禁民聚語畏其謗已箝緘也箝與鉗同晉灼曰許愼云箝籥也師古曰晉説是也謂箝籥其口不聽妄言也}
  - {type: punctuation, offset: 17550, content: 》, id: KR2a0007_tls_013-bkkpn4962}
  - {type: variant, offset: 17551, length: 1, content: 位, WYG: 所謂禁耦語者也箝音其占反籥音躡内鋤雄俊外攘胡粤師古曰攘却也粤古越字用壹威權為萬世安師古曰令威權壹歸於已然十餘年間猛敵横𤼵乎不虞師古曰虞度也意所不度謂之不虞適戍彊於五伯師古曰適讀曰謫謫戍謂陳勝吳廣也伯讀曰霸五霸謂昆吾大彭豕韋齊桓晉文也謫音陟厄反閭閻偪於戎狄應劭曰周禮二十五家為閭閻音簷門閭外旋下廕謂之歩簷也閭閻民陳勝之屬言其逼秦甚於戎狄也師古曰閭里門也閻里中門也陳勝吳廣本起閭左之戍故總言閭閻應説非也閭左解在陳勝傳偪音逼嚮應㿊於謗議服䖍曰㿊音惨應劭曰秦法誹謗者族今陳勝奮臂大呼天下莫不嚮應嚮應之害更㿊烈於所謗議也師古曰嚮音響響應者如響之應聲㿊痛也服音是也奮臂威於甲兵鄉秦之禁適所以資豪桀而速自斃也師古曰鄉讀曰嚮謂曩時也秦禁謂墮城銷刃箝語燒書之屬是也是以漢亡尺土之階繇}
  - {type: page-break, offset: 17551, content: '', id: KR2a0007_WYG_013-2b, image: WYG0249/WYG0249-0185b.png}
