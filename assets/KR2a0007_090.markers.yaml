  - {type: variant, offset: 3678, length: 1, content: 降, WYG: 其䘮至也遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢知其母師古曰稱其賢智也延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗師古曰一門之中五二千石故總云萬石次弟彭祖至太子太傅在儒林傳尹賞字子心鉅鹿楊氏人也以郡吏察廉為樓煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令坐殘賊免後以御史舉為鄭令永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕俠臧匿亡命鄧展曰紅陽姓長仲字也如淳曰紅陽南陽縣也長姓仲字也師古曰姓紅陽而兄字長弟字仲今書長字或作張}
