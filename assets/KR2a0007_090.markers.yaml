  - {type: variant, offset: 52, length: 184, content: 右賢王其冬都隆奇與右賢王共立日逐王薄胥堂屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭明年秋屠耆單于使日逐王先賢撣兄右奧鞬王為烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當戶謀共讒右賢王言欲自立為烏藉單于屠耆單于殺右賢王父子後知其冤復殺唯犁當戶於是呼揭王恐遂畔去自立為呼揭單于右奧鞬王, WYG: 竇太后}
