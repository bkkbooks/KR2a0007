  - {type: variant, offset: 728, length: 0, content: '', krp: 宋祁曰校本改時作行太后廼告上上拜義姁弟縱為中郎孟康曰姁縱姊名也師古曰姁音許于反蕭該音義曰姁音熈主反韋昭音同李竒音呼補上黨郡中令治敢徃少温籍服䖍曰敢行暴虐之政師古曰少温籍言無所含容也温音於問反籍音才夜反縣無逋事師古曰逋亡也負也音必胡反舉第一遷為長陵及長安令直法行治不避貴戚以捕按太后外孫脩成子中師古曰修成君王太后所生金氏女也中者其子名也讀曰仲上以為能遷為河内都尉至則族滅其豪穰氏之屬河内道不拾遺而張次公亦為郎以勇悍從軍師古曰悍音胡旦反敢深入有功封為岸頭侯寗成家居上欲以為郡守御史大夫𢎞曰師古曰公孫𢎞臣居山東為小吏時宋祁曰小或作少寗成為濟南都尉其治如狼牧羊成不可令治民上廼拜成為闗都尉嵗餘闗吏税肄郡國出入闗者蘓林曰税音伐閲之閲李竒曰肄閲也師古曰肄音弋二反號曰寧見乳虎無直寗成之怒師古曰猛獸産乳養䕶其子則搏噬過常故以喻也直讀曰值一曰直當其暴如此義縱自河内遷為南陽太守聞寗成家居南陽及至闗寗成側行送迎然縱氣盛弗為禮至郡遂按寗氏破碎其家成坐有罪及孔暴之屬皆奔亡南陽師古曰孔氏暴氏二家素豪猾者吏民重足一迹劉攽曰南陽屬下句而平氏朱彊杜衍杜周為縱爪牙之吏任用師古曰平氏杜衍二縣名也遷為廷尉史軍數出定襄定襄吏民亂敗於是徙縱為定襄太守縱至掩定襄獄中重罪二百餘人及賔客昆弟私入相視者亦二百餘人縱壹切捕鞠曰為死罪觧脱服䖍曰一切皆捕之也律諸囚徒私觧脱桎梏鉗赭加罪一等為人觧脱與同罪縱鞠相賂餉者二百人以為觧脱死罪盡殺之師古曰鞠窮也謂窮治也是日皆報殺四百餘人師古曰奏請得報而論殺劉敞曰縱掩定襄獄一切捕鞠而云是日皆報殺則非奏請報可之報矣然則以論決為報郡中不寒而栗猾民佐吏為治師古曰百姓有素豪猾為罪惡者今畏縱之嚴反為吏耳目助治公務以自效是時趙禹張湯為九卿矣然其治尚寛輔法而行縱以鷹擊毛摰為治師古曰言如鷹隼之擊奮毛羽執取飛鳥也後㑹更五銖錢白金起師右曰更改也民為姦京師尤甚廼以縱為右内史王溫舒為中尉温舒至惡所為弗先言縱縱必以氣陵之師古曰言温舒雖酷惡而縱又甚也敗壊其功其治所誅殺甚多然取為小治姦益不勝晉灼曰取音趣直指始出矣吏之治以斬殺縛束為務閻奉以惡用矣師古曰閻奉以嚴惡之故而見任用言時政尚急刻也縱廉其治效郅都上幸鼎湖病乆已而卒起幸甘泉師古曰已為病愈也言帝乆病既得愈而忽然即幸甘泉卒讀曰猝道不治上怒曰縱以我為不行此道乎銜之師古曰銜含也包含在心以為過也至冬楊可方受告緡縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事孟康曰武帝使楊可主告緡没入其財物縱捕為可使者此為廢格詔書沮已成之事也師古曰沮壊也音材汝反格讀曰閣弃縱市後一歲張湯亦死王溫舒陽陵人也少時椎埋為姦師古曰椎殺人而埋之椎音直追反其字從木已而試縣亭長師古曰試補也數廢數為吏以治獄至廷尉史事張湯遷為御史督盗賊殺傷甚多稍遷至廣平都尉擇郡中豪敢徃吏十餘人為爪牙師古曰豪傑而性果敢一徃無所顧者以為吏也宋祁曰豪字下當有桀字皆把其隂重罪師古曰把音布馬反而縱使督盗賊師古曰縱放也督察視也快其意所欲得此人雖有百罪弗法師古曰言所捕盗賊得其人而快温舒意者則不問其先所犯罪也法謂行法也即有避回夷之亦滅宗師古曰避回謂不盡意捕擊也回音胡内反以故齊趙之郊盗不敢近廣平廣平聲為道不拾遺上聞遷為河内太守素居廣平時皆知河内豪姦之家及徃以九月至令郡具私馬五十疋為驛自河内至長安師古曰以私馬於道上徃徃置驛也部吏如居廣平時方畧捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡没入償臧師古曰以臧致罪者既没入之又令出倍臧或收入官或還其主也奏行不過二曰得可事論報至流血十餘里師古曰天子可其奏而論决之殺人既多故血流十餘里劉敞曰騐此可與報益異矣河内皆怪其奏以為神速盡十二月郡中無犬吠之盗其頗不得失之旁郡追求㑹春温舒頓足嘆曰嗟乎令冬月益展一月足吾事矣師古曰立春之後不復行刑故云然展伸也其好殺行威不愛人如此上聞之以為能遷為中尉其治復放河内師古曰放依也音甫徃反徒請召猜禍吏與從事應劭曰徒但也猜疑也取吏好猜疑作旤害者任用之河内則揚皆麻戊闗中楊贛成信等師古曰此皆猜旤者義縱為内史憚之未敢恣治師古曰言温舒憚縱不得恣其酷暴宋祁曰或無治字及縱死張湯敗後徙為廷尉而尹齊為中尉坐法抵罪温舒復為中尉為人少文居它惛惛不辯師古曰言為餘官則心意䝉蔽職事不舉惛音昏至於中尉則心開素習闗中俗知豪惡吏豪惡吏盡復為用吏苛察淫惡少年投銗購告言姦師古曰銗所以受投書也音項觧在趙廣漢傳置伯落長以收司姦師古曰伯亦長帥之稱也置伯及邑落之長以收捕司察姦人也温舒多謟善事有埶者即無埶視之如奴有埶家雖有姦如山弗犯無埶雖貴戚必侵辱師古曰謂不居權要之職者舞文巧請下戸之猾以動大豪師古曰弄法為巧而治下户之狡猾者用諷動大豪之家所以然者為大豪中有權要不可治故也請謂奏請其治中尉如此姦猾窮治大氐盡靡爛獄中師古曰大氐大歸也靡碎也氐音丁禮反靡音武皮反行論無出者其爪牙吏虎而冠師古曰言其殘暴之甚也非有人情於是中尉部中中猾以下皆伏有埶者為遊聲譽稱治數歳其吏多以權貴富師古曰謂權貴之家所擁佑故積受取致富者也温舒擊東越還議有不中意師古曰不當天子意也中音竹仲反坐以法免是時上方欲作通天臺而未有人温舒請覆中尉脱卒得數萬人作師古曰覆校脱漏未為卒者也脱音它活反上説師古曰説讀曰悦拜為少府徙右内史治如其故姦邪少禁坐法失官復為右輔行中尉如故操歳餘㑹宛軍發孟康曰𤼵兵伐大宛詔徵豪吏温舒匿其吏華成及人有變告温舒受員騎錢它姦利事罪至族自殺師古曰員騎騎之有正員也其時兩弟及兩婚家亦各自坐它罪而族光禄勲徐自為曰悲夫夫古有三族而王温舒罪至同時而五族乎師古曰温舒與弟同三族而兩妻家各一故為五也温舒死家絫千金師古曰絫古累字尹齊東郡茌平人也師古曰茌音仕疑反宋祁曰韋昭音鯔字林曰茌草亦盛也以刀筆吏稍遷至御史事張湯湯數稱以為廉武帝使督盗賊斬伐不避貴埶遷闗都尉聲甚於寗成上以為能拜為中尉吏民益彫敝輕齊木彊少文師古曰木質也言如木石之為也豪惡吏伏匿而善吏不能為治師古曰惡吏不肯為用獨善吏在故不能治事也以故事多廢抵罪師古曰以職事多廢故至於坐罪也後復為淮陽都尉王温舒敗後數年病死家直不滿五十金所誅滅淮陽甚多及死仇家欲燒其尸妻亡去歸𦵏楊僕宜陽人也以千夫為吏孟康曰千夫若五大夫武帝以軍用不足令民出錢穀為之師古曰所謂武功賞官以寵戰士河南守舉為御史使督盗賊宋祁曰越本守作辟闗東治放尹齊韋昭曰放依也音甫徃反以敢擊行師古曰果敢搏撃而行其治也稍遷至主爵都尉上以為能南越反拜為樓船將軍有功封將梁侯東越反上欲復使將為其伐前勞師古曰伐謂矜恃也以書勅責之曰將軍之功獨有先破石門尋陿劉徳曰南越中險地名也宋祁曰陿或作阻非有斬將騫旗之實也師古曰騫與搴同騫㧞取之也烏足以驕人哉師古曰烏於何也前破番禺捕降者以為虜掘死人以為獲是一過也建徳吕嘉逆罪不容於天下師古曰建徳南越王名也尉佗𤣥孫也吕嘉其相也將軍擁精兵不窮追超然以東越為援是二過也師古曰以僕不窮追之故令建徳得以東越為援也士卒暴露連嵗為朝㑹不置酒宋祁曰嵗字下當有朕字將軍不念其勤勞而造佞巧請乘傳行塞師古曰傳音張戀反行音下更反因用歸家懐銀黄垂三組夸鄉里是三過也師古曰銀銀印也黄金印也僕為主爵都尉又為樓船將軍并將梁侯三印故三組也組印綬也先期内顧以道惡為觧師古曰内顧言思妻妾也觧謂自觧説也若今言分疏失尊尊之序是四過也欲請蜀刀問君賈幾何對曰率數百孟康曰僕嘗為将請官蜀刀詔問賈答言此率數百也師古曰賈讀曰價宋祁曰注文嘗字疑作當将字下當有行字武庫日出兵而陽不知挾偽干君是五過也師古曰干犯也受詔不至蘭池宫如淳曰本出軍時欲使之蘭池宫頓而不去蘭池宫在渭城明日又不對假令將軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入將軍能率衆以掩過不僕惶恐對曰願盡死贖罪宋祁曰死字下當有以字與王温舒俱破東越後復與左將軍荀彘俱擊朝鮮為彘所縛語在朝鮮傳還免為庶人病死咸宣楊人也師古曰咸音減省之減楊河東之邑以佐史給事河東守衛將軍青使買馬河東師古曰將軍衛青充使而於河東買馬也見宣無害言上徵為廐丞官事辦稍遷至御史及丞宋祁曰淳化本為御史中丞刋誤據史舘本改予依南本添及字使治主父偃及淮南反獄所以微文深詆殺者甚衆師古曰詆誣也稱為敢决疑數廢數起為御史及中丞者幾二十嵗師古曰幾音鉅依反王温舒為中尉而宣為左内史其治米鹽師古曰米鹽細雜也事大小皆闗其手自部署縣名曹寳物官吏令丞弗得擅揺痛以重法繩之居官數年壹切為小治辯然獨宣以小治大能自行之難以為經師古曰經常也不可為常法也中廢為右扶風坐怒其吏成信信亡藏上林中宣使郿令將吏卒師古曰郿扶風縣也音媚䦨入上林中蠶室門攻亭格殺信射中苑門師古曰中音竹仲反宣下吏為大逆當族自殺而杜周任用是時郡守尉諸侯相二千石欲為治者大抵盡效王温舒等而吏民益輕犯法盗賊滋起師古曰滋亦益也南陽有梅免百政師古曰梅百皆姓也楚有叚中杜少師古曰中讀曰仲齊有徐勃燕趙之間有堅盧范主之屬鄧展曰延篤讀堅曰甄晉灼曰音近甄城字書已先反大羣至數千人擅自號攻城邑庫兵釋死罪師古曰釋觧也縛辱郡守都尉殺二千石為檄告縣趨具食師古曰趨讀曰促小羣以百數掠鹵鄉里者不可稱數於是上始使御史中丞丞相長史使督之師古曰出為使者督察也猶弗能禁師古曰禁音居禽反乃使光禄大夫范昆諸部都尉及故九卿張徳等衣繡衣持節虎符發兵以興擊師古曰以軍興之法而討擊也斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者數千人數歲廼頗得其渠率師古曰渠大也散卒失亡復聚黨阻山川徃徃而羣無可奈何於是作沈命法應劭曰沈没也敢蔽匿盗賊者没其命也孟康曰沈臧匿也命亡逃也師古曰應説是曰羣盗起不發覺發覺而弗捕滿品者師古曰品率也以人數為率也二千石以下至小吏主者皆死其後小吏畏誅雖有盗弗敢發恐不能得坐課累府府亦使不言孟康曰縣有盗賊府亦并坐使縣不言之也師古曰府郡府也累音力瑞反韋昭曰負累及府府亦使其不言也故盗賊寖多師古曰寖漸也上下相為匿以避文法焉田廣明字子公鄭人也師古曰京兆鄭縣即今之華州以郎為天水司馬功次遷河南都尉以殺伐為治郡國盗賊並起遷廣明為淮陽太守歳餘故城父令公孫勇與客胡倩等謀反師古曰倩音千見反倩詐稱光禄大夫從車騎數十言使督盗賊止陳留傳舎太守謁見欲收取之廣明覺知發兵皆捕斬焉而公孫勇衣繡衣乘駟馬車至圉師古曰陳留圉縣圉使小史侍之亦知其非是守尉魏不害與廐嗇夫江徳尉史蘇昌共收捕之上封不害為當塗侯徳轑陽侯師古曰轑音僚昌蒲侯初四人俱拜於前小史竊言武帝問言何對曰為侯者得東歸不上曰女欲不貴矣師古曰言汝意欲歸不吾今貴汝謂賜之爵也宋祁曰不字當有音疑注脱女鄉名為何對曰名遺鄉上曰用遺汝矣師古曰遺音弋季反於是賜小史爵闗内侯食遺鄉六百户上以廣明連禽大姦徵入為大鴻臚擢廣明兄雲中代為淮陽太守昭帝時廣明將兵擊益州還賜爵闗内侯徙衛尉後出為左馮翊治有能名宣帝初立代蔡義為御史大夫以前為馮翊與議定䇿師古曰與讀曰豫宋祁曰為字下當有左字封昌水侯歲餘以祁連將軍將兵擊}
