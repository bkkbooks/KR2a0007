  - {type: variant, offset: 4893, length: 442, content: 十萬眾橫行匈奴中季布曰噲可斬也妄阿順指於是大臣權書遺之然後匈奴之結解中國之憂平及孝文時匈奴侵暴北邊侯騎至雍甘泉京師大駭發三將軍屯細柳棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘匈奴使韓安國將三十萬眾徼於便墬匈奴覺之而去徒費財勞師一虜不可得見況單于之面乎其後深惟社稷之計規恢萬載之策乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絕大幕破寘顏襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨翰海虜名王貴人以百數自是之後匈奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不壹勞者不久佚不蹔費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初匈奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎獵其南而長羅侯以烏孫五萬騎震其西皆至質而還時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩將軍故北狄不服中國未得高枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而匈奴內亂五單于爭立日逐呼韓邪攜國歸化扶伏稱臣然尚羈縻之計不顓制自此之後欲朝者不距不欲者不彊何者, WYG: ''}
