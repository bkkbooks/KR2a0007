  - {type: variant, offset: 8503, length: 1137, content: 咸子登於長安市初北邊自宣帝以來數世不見煙火之警人民熾盛牛馬布野及莽撓亂匈奴與之構難邊民死亡係獲又十二部兵久屯而不出吏士罷弊數年之間北邊虛空野有暴骨矣烏珠留單于立二十一歲建國五年死匈奴用事大臣右骨都侯須卜當即王昭君女伊墨居次云之壻也云常欲與中國和親又素與咸厚善見咸前後為莽所拜故遂越輿而立咸為烏累若鞮單于烏累單于咸立以弟輿為左谷蠡王烏珠留單于子蘇屠胡本為左賢王以弟屠耆閼氏子盧渾為右賢王烏珠留單于在時左賢王數死以為其號不祥更易命左賢王曰護于護于之尊最貴次當為單于故烏珠留單于授其長子以為護于欲傳以國咸怨烏珠留單于貶賤己號不欲傳國及立貶護于為左屠耆王云當遂勸咸和親天鳳元年云當遣人之西河虎猛制虜塞下告塞吏曰欲見和親侯和親侯王歙者王昭君兄子也中部都尉以聞莽遣歙歙弟騎都尉展德侯颯使匈奴賀單于初立賜黃金衣被繒帛紿言侍子登在因購求陳良終帶等單于盡收四人及手殺校尉刀護賊芝音妻子以下二十七人皆械檻付使者遣廚唯姑夕王富等四十人送歙颯莽作焚如之刑燒殺陳良等罷諸將率屯兵但置游擊都尉單于貪莽賂遺故外不失漢故事然內利寇掠又使還知子登前死怨恨寇虜從左地入不絕使者問單于輒曰烏桓與匈奴無狀黠民共為寇入塞譬如中國有盜賊耳咸初立持國威信尚淺盡力禁止不敢有二心天鳳二年五月莽復遣歙與五威將王咸率伏黯丁業等六人使送右廚唯姑夕王因奉歸前所斬侍子登及諸貴人從者喪皆載以常車至塞下單于遣云當子男大且渠奢等至塞迎咸等至多遺單于金珍因諭說改其號號匈奴曰恭奴單于曰善于賜印綬封骨都侯當為後安公當子男奢為後安侯單于貪莽金幣故曲聽之然寇盜如故咸歙又以陳良等購金付云當令自差與之十二月還入塞莽大喜賜歙錢二百萬悉封黯等單于咸立五歲天鳳五年死弟左賢王輿立為呼都而尸道皋若鞮單于匈奴謂孝曰若鞮自呼韓邪後與漢親密見漢諡帝為孝慕之故皆為若鞮呼都而尸單于與既立貪利賞賜遣大且渠奢與云女弟當于居次子醯櫝王俱奉獻至長安莽遣和親侯歙與等俱至制虜塞下與云當會因以兵迫脅將至長安云當小男從塞下得脫歸匈奴當至長安莽拜為須卜單于欲出大兵以輔立之兵調度亦不合而匈奴愈怒並入北邊北邊由是壞敗會當病死莽以其庶女陸逯任妻後安公奢所以尊寵之甚厚終為欲出兵立之者會漢兵誅莽云奢亦死更始二年冬漢遣中郎將歸德侯颯大司馬護軍陳遵使匈奴授單于漢舊制璽綬王侯以下印綬因送云當餘親屬貴人從者單于輿驕謂遵颯曰匈奴本與漢為兄弟匈奴中亂孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所篡匈奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚距單于終持此言其明年夏還會赤眉入長安更始敗贊曰書戒蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運壽策相與爭於廟堂之上乎高祖時則劉敬呂后時樊噲季布孝文時賈誼朝錯孝武時王恢韓安國朱買臣, WYG: ''}
