  - {type: variant, offset: 4277, length: 2, content: 省兩, WYG: 曰安所求子死桓東少年場師古曰安猶焉也死謂尸也生時諒不謹枯骨後何𦵏師古曰諒信也𦵏字合韻音子郎反賞所置皆其魁宿師古曰魁根本也宿乆舊也或故吏善家子失計随輕黠願自改者財數十百人師古曰財與纔同皆貰其罪師古曰貰緩也詭令立功以自贖師古曰詭責也盡力有效者因親用之為爪牙追捕甚精甘耆姦惡甚於凡吏師古曰耆讀曰嗜賞視事數月盗賊止郡國亡命散走各歸其處不敢闞長安江湖中多盗賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山羣盗起以賞為右輔}
