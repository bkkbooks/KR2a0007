  - {type: variant, offset: 731, length: 1, content: 俗, WYG: 竟坐棄市田延年字子賔先齊諸田也徙陽陵師古曰高祖時徙之其地後為陽陵縣宋祁曰先字上當有其字延年以材略給事大將軍莫府霍光重之遷為長史出為河東太守選㧞尹翁歸等以為爪牙誅鉏豪彊姦邪不敢發以選入為大司農㑹昭帝崩昌邑王嗣立􅁋亂霍將軍憂懼與公卿議廢之莫敢發言延年按劍廷叱群臣師古曰止於朝廷之中而叱之也若言廷争矣即日議決語在光𫝊宣帝即位延年以決疑定䇿封陽成侯先是茂陵富人焦氏賈氏以數千萬隂積貯炭葦諸下里物孟康曰死者歸蒿里𦵏地下故曰下里師古曰以數千萬錢為}
