  - {type: variant, offset: 3680, length: 8, content: 今單于詘體稱臣列, WYG: 非也後人所改耳一曰紅陽侯王立之子兄弟長少者也而北地大豪浩商等報怨殺義渠長妻子六人宋祁曰六人或作二十八徃来長安中丞相御史遣掾求逐黨與詔書召捕乆之廼得長安中姦猾浸多閭里少年羣輩殺吏受賕報讎師古曰或有自怨於吏或受人賕賂報仇讎也宋祁曰賕當作財相與探丸}
