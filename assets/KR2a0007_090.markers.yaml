  - {type: variant, offset: 11, length: 11, content: 單于歸庭數月罷兵使各歸, WYG: 陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞之賜都金百斤上亦賜金百斤由此重都濟南瞷氏宗人三百餘家豪猾應劭曰瞷音馬瞷眼之瞷師古曰音閑蕭該音義曰案爾雅馬一目白曰瞷音閑宋祁曰姚本刪注中一瞷字二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股栗師古曰言懼之甚至於股脚戰栗也居歲餘郡中不拾遺旁十餘郡守畏都如大府師古曰言猶如統屬之也都為人勇有氣公亷不發私書問遺無所受請寄無所聽常稱曰已背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條侯至貴居也師古曰居怠傲讀與倨同而都揖丞相是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹師古曰言其鷙擊之甚臨江王徵詣中尉府對簿師古曰簿者獄辭之文書也音歩户反臨江王欲得刀筆為書謝上師古曰刀所以削治書也古者書於簡牘}
