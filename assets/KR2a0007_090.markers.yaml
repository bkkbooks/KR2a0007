  - {type: variant, offset: 734, length: 0, content: '', WYG: 事暴起師古曰方上謂壙中也昭帝暴崩故其事倉猝用度未辦延年奏言商賈或豫收方上不祥器物冀其疾用欲以求利師古曰疾速也非民臣所當為請没入縣官奏可富人亡財者皆怨出錢求延年罪初大司農取民牛車三萬兩為僦師古曰一乘為一兩僦謂賃之與雇直也音子就反宋祁曰服䖍曰雇載曰僦音将秀反載沙便橋下送致方上車直千錢延年上簿詐増僦直車二千凡六千萬盗取其半焦賈兩家告其事下丞相府丞相議奏延年主守盗三千萬不道宋祁曰劉云延年未嘗有酷烈聲而附此傳中何也延年決大議其明勇過雋不疑至詐増僦直是韓延夀比耳劉敞曰議當作義霍將軍召問延年欲為道地師古曰為之開通道路使有安全之地也延年抵曰師古曰抵拒諱也音丁禮反本出將軍之門蒙此爵位師古曰延年嘗給事莫府又為大將軍長史故云然也無有是事光曰即無事當窮竟師古曰既無實事當令有司窮治盡其理御史大夫田廣明謂太僕杜延年春秋之義以功覆過當廢昌邑王時非田子賔之言大事不成今縣官出三千萬自乞之何哉師古曰自謂乞與之也乞音}
