  - {type: variant, offset: 7851, length: 622, content: 出窮追匈奴內之于丁令因分其地立呼韓邪十五子莽將嚴尤諫曰臣聞匈奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫允內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蟁蝱之螫敺之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策今天下遭陽九之阸比年饑饉西北邊尤甚發三十萬眾具三百日糧東援海代南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎鬴鍑薪炭重不可勝食糒飲水以歷四時師有疾疫之憂是故前世伐胡不過百日非不欲久勢力不能此四難也輜重自隨則輕銳者少不得疾行虜徐遁逃勢不能及幸而逢虜又累輜重如遇險阻銜尾相隨虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜莽不聽尤言轉兵穀如故天下騷動咸既受莽孝單于之號馳出塞歸庭具以見脅狀白單于單于更以為於粟置支侯匈奴賤官也後助病死莽以登代助為順單于厭難將軍陳欽震狄將軍王巡屯雲中葛邪塞是時匈奴數為邊寇殺將率吏士略人民敺畜產去甚眾, WYG: ''}
