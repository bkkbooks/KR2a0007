  - {type: variant, offset: 5447, length: 2159, content: 過旬月之役遠不離二時之勞固已犁其庭掃其閭郡縣而置之雲徹席卷後無餘菑唯北狄為不然真中國之堅敵也三垂比之懸矣前世重之茲甚未易可輕也今單于歸義懷款誠之心欲離其庭陳見於前此乃上世之遺策神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙夫款而隙之使有恨心負前言緣往辭歸怨於漢因以自絕終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聽於無聲誠先於未然即蒙恬樊噲不復施棘門細柳不復備馬邑之策安所設衛霍之功何得用五將之威安所震不然壹有隙之後雖智者勞心於內辯者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都護三十六國費歲以大萬計者豈為康居烏孫能踰白龍堆而寇西邊哉乃以制匈奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邊萌之禍書奏天子寤焉召還匈奴使者更報單于書而許之賜雄帛五十匹黃金十斤單于未發會病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言蒙天子神靈人民盛壯願從五百人入朝以明天子盛德上皆許之元壽二年單于來朝上以太歲厭勝所在舍之上林苑蒲陶宮告之以加敬於單于單于知之加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤它如河平時既罷遣中郎將韓況送單于單于出塞到休屯井北度車田盧水道里回遠況等乏食單于乃給其糧失期不還五十餘日初上遣稽留昆隨單于去到國復遣稽留昆同母兄右大且方與婦入侍還歸復遣且方同母兄左日逐王都與婦入侍是時漢平帝幼太皇太后稱制新都侯王莽秉政欲說太后以威德至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚會西域車師後王句姑去胡來王唐兜皆怨恨都護校尉將妻子人民亡降匈奴語在西域傳單于受置左谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆王昌副校尉甄阜侍中謁者帛敞長水校尉王歙使匈奴告單于曰西域內屬不當得受今遣之單于曰孝宣孝元皇帝哀憐為作約束自長城以南天子有之長城以北單于有之有犯塞輒以狀聞有降者不得受臣知父呼韓邪單于蒙無量之恩死遺言曰有從中國來降者勿受輒送至塞以報天子厚恩此外國也得受之使者曰匈奴骨肉相攻國幾絕蒙中國大恩危亡復續妻子完安累世相繼宜有以報厚恩單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受單于遣使送到國因請其罪使者以聞有詔不聽會西域諸國王斬以示之乃造設四條中國人亡入匈奴者烏孫亡降匈奴者西域諸國佩中國印綬降匈奴者烏桓降匈奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匈奴班四條與單于雜函封付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大說白太后遣使者答諭厚賞賜焉漢既班四條後護烏桓使者告烏桓民毋得復與匈奴皮布稅匈奴以故事遣使者責烏桓稅匈奴人民婦女欲賈販者皆隨往焉鳥桓距曰奉天子詔條不當予匈奴稅匈奴使怒收烏桓酋豪縛到懸之酋豪昆弟怒共殺匈奴使及其官屬收略婦女馬牛單于聞之遣使發左賢王兵入烏桓責殺使者因攻擊之烏桓分散或走上山或東保塞匈奴頗殺人民敺婦女弱小且千人去置左地告烏桓曰持馬畜皮布來贖之烏桓見略者親屬二千餘人持財畜往贖匈奴受留不遣王莽之篡位也建國元年遣五威將王駿率甄阜王颯陳饒帛敞丁業六人多齎金帛重遺單于諭曉以受命代漢狀因易單于故印故印文曰匈奴單于璽莽更曰新匈奴單于章將率既至授單于印紱詔令上故印紱單于再拜受詔譯前欲解取故印紱單于舉掖授之左姑夕侯蘇從旁謂單于曰未見新印文宜且勿興單于止不肯與請使者坐穹廬單于欲前為壽五威將曰故印紱當以時上單于曰諾復舉掖授譯蘇復曰未見印文且勿與單于曰印文何由變更遂解故印紱奉上將率受著新紱不解視印飲食至夜乃罷右率陳饒謂諸將率曰鄉者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭說所能距也既得而復失之辱命莫大焉不如椎破故印以絕禍根將率猶與莫有應者饒燕士果悍即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于印言璽不言章又無漢字諸王已下乃有漢言章今即去璽加新與臣下無別願得故印將率示以故印謂曰新室順天制作故印隨將率所自為破壞單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遺即遣弟右賢王輿奉馬牛隨將率入謝因上書求故印將率還到左犁汗王咸所居地見烏桓民多以問咸咸具言狀將率曰前封四條不得受烏桓降者亟還之咸曰請密與單于相聞得語歸之單于使咸報曰當從塞內還之邪從塞外還之邪將率不敢顓決以聞詔報從塞外還之單于始用夏侯藩求地有距漢語後以求稅烏桓不得因寇略其人民釁由是生重以印文改易故怨恨乃遣右大且渠蒲呼盧訾等十餘人將兵眾萬騎以護送烏桓為名勒兵朔方塞下朔方太守以聞明年西域車師後王須置離謀降匈奴都護但欽誅斬之置離兄狐蘭支將人眾二千餘人敺畜產舉國亡降匈奴單于受之狐蘭支與匈奴共入寇擊車師殺後成長傷都護司馬復還入匈奴時戊己校尉史陳良終帶司馬丞韓玄右曲侯任商等見西域頗背叛聞匈奴欲大侵恐并死即謀劫略吏卒數百人共殺戊己校尉刀護遣人與匈奴南犁汗王南將軍相聞匈奴南將軍二千騎入西域迎良等良等盡脅略戊己校尉吏士男女二千餘人入匈奴玄商留南將軍所良帶徑至單于庭人眾別置零吾水上田居單于號良帶曰烏桓都將軍留居單于所數呼與飲食西域都護但欽上書言匈奴南將軍右秩訾將人眾寇擊諸國莽於是大分匈奴為十五單于遣中郎將藺苞副校尉戴級將兵萬騎多齎珍寶至雲中塞下招誘呼韓邪單于諸子欲以次拜之使譯出塞誘呼右犁汗王咸咸子登助, WYG: 害}
