  - {type: variant, offset: 3676, length: 0, content: '', WYG: 延年素輕霸為人及比郡為守襃賞反在已前師古曰比接近也音頻二反心内不服河南界中又有蝗蟲府丞義出行蝗還見延年延年曰此蝗豈鳳凰食邪宋祁曰府丞義當作府丞狐義義又道司農中丞耿夀昌為常平倉利百姓延年曰丞相御史不知為也當避位去夀昌安得權此師古曰作此倉非竒異之功也公卿不知為之是曠官也夀昌安得擅此}
  - {type: page-break, offset: 3676, content: '', id: KR2a0007_WYG_090-23a, image: WYG0251/WYG0251-0052c.png}
  - {type: variant, offset: 3676, length: 0, content: '', krp: 延年素輕霸為人及比郡為守襃賞反在已前師古曰比接近也音頻二反心内不服河南界中又有蝗蟲府丞義出行蝗還見延年延年曰此蝗豈鳳凰食邪宋祁曰府丞義當作府丞狐義義又道司農中丞耿夀昌為常平倉利百姓延年曰丞相御史不知為也當避位去夀昌安得權此師古曰作此倉非竒異之功也公卿不知為之是曠官也夀昌安得擅此}
  - {type: variant, offset: 3677, length: 0, content: '', WYG: 為權乎後左馮翊缺上欲徵延年符已發為其名酷復止應劭曰符竹使符也􅆇在符節臺欲有所拜召治書御史符節令𤼵符下太尉也延年疑少府梁邱賀毁之心恨㑹琅邪太守以視事乆病滿三月免延年自知見廢謂丞曰此人尚能去官我反不能去邪師古曰與丞言云爾又延年察獄史廉有臧不入身師古曰延年察舉其獄史為廉而此人乃有臧罪然臧不入身也宋祁曰越本刪有字延年坐𨕖舉不實貶秩笑曰後敢復有舉人者矣師古曰言已濫被貶秩後人寕敢復舉人乎丞義年老頗悖師古曰心思惑亂悖音布内反素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之無意毁傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安師古曰取休假上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按驗有此數事以結延年師古曰結正其罪也坐怨望非謗政治不道弃市初延年母從東海来欲從延年臘師古曰建丑之月為臘祭因㑹飲若今之蜡節也到雒陽適見報囚師古曰奏報行決也劉攽曰檢尋前後直謂斷決囚為報爾非奏得報也如今有司書囚罪長吏判准斷定所謂報也母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆母乃見之因數責延年師古曰數音所具反幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人師古曰顧反也乘因也欲以立威豈為民父母意哉延年服罪重頓首謝師古曰重音直用反因自為母御歸府舎母畢正臘師古曰臘及正嵗禮畢也正音之盈反謂延年天道神明人不可獨殺師古曰言多殺人者已亦當死我不意當老見壯子被刑戮也師古曰言素意不自謂如此也行矣去女東歸埽除墓地耳師古曰言}
