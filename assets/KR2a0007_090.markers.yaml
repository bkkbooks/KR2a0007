  - {type: variant, offset: 3689, length: 6, content: 北藩遣使朝賀, WYG: 彈師古曰為彈丸作赤黒白三色而共探取之也彈音徒旦反得赤丸者斫武吏得黒者斫文吏白者主治䘮師古曰其黨與有為吏及它人所殺者則主其䘮事也城中薄暮塵起剽劫行者死傷横道枹鼓不絶師古曰枹擊鼓椎也音孚其字從木蕭該音義曰字林曰枹擊鼓柄音浮賞以三輔高第選守長安令得壹切便宜從事賞至脩治長安獄穿地方深各數丈致令辟為郭師古曰致謂積累之也令辟㼾甎也郭謂四周之内也致讀如本字又音綴令音零辟音避歴反以大石覆其口名為虎穴乃部户曹掾史與鄉吏亭長里正父老伍人師古曰五家為伍伍人者各其同伍之人也雜舉長安中輕薄少年惡子師古曰惡子不承父母教命者宋祁曰注文承字下當有籍字}
