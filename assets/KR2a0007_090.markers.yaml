  - {type: variant, offset: 1115, length: 274, content: 群臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬歲單于就邸留月餘遣歸國單于自請願留居光祿塞下有急保漢受降城漢遣長樂衛尉高昌侯董忠車騎都尉韓昌將騎萬六千又發邊郡士馬以千數送單于出朔方雞鹿塞詔忠等留衛單于助誅不服又轉邊穀米糒前後三萬四千斛給贍其食是歲郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八十斤以有屯兵故不復發騎為送始郅支單于以為呼韓邪降漢兵弱不能復自還即引其眾西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支, WYG: 所謂當生者詭}
