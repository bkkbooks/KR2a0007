  - {type: variant, offset: 716, length: 9, content: 呼韓邪議問諸大臣皆, WYG: 律令作見知吏傳相監司以法盡自此始禹為人廉裾師古曰裾亦傲也讀與倨同為史以來舎無食客公卿相造請師古曰造音千到反禹終不行報謝務在絶知友賔客之請師古曰以此意告報公卿劉敞曰報謝當屬上句言公卿造請禹而禹終不詣之孤立行一意而已見法輒取亦不覆案求官屬隂罪師古}
  - {type: variant, offset: 716, length: 9, content: 呼韓邪議問諸大臣皆, krp: 律令作見知吏傳相監司以法盡自此始禹為人廉裾師古曰裾亦傲也讀與倨同為史以來舎無食客公卿相造請師古曰造音千到反禹終不行報謝務在絶知友賔客之請師古曰以此意告報公卿劉敞曰報謝當屬上句言公卿造請禹而禹終不詣之孤立行一意而已見法輒取亦不覆案求官屬隂罪師古}
