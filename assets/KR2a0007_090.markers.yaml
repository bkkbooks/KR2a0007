  - {type: variant, offset: 8, length: 2, content: 呼韓, WYG: 知愧辱而至於治也宋祁曰注文不耻景本作不止刋誤作不耻老氏稱上徳不徳是以有徳下徳不失徳是以無徳法令滋章盗賊多有師古曰老子徳經之言也上徳體合自然是以為徳下徳務於修建更以䘮之法令繁則巧詐益起故多盗賊也宋祁曰注文繁字下疑有滋字信哉是言也法令者治之具而非制治清濁之源也師古曰言為治之體亦須法令而法令非治之本昔天下之罔嘗宻矣師古曰謂秦時然姦􅁤愈起其極也上下相遁至於不振師古曰遁避也言吏避於君民避於吏至乎䘮敗不可振救也當是之時吏治若救火揚沸師古曰言廹急也本敝不除則其末難正非武健嚴酷惡能勝其任而媮快乎師古曰惡讀曰烏烏於何也媮茍且也言道徳者溺於職矣師古曰溺謂沉滯而不舉也故曰聽訟吾猶人也必也使無訟乎師古曰論語載孔子之辭也言使我聽獄訟猶凡人耳然而立政施徳則能使其絶於爭訟下士聞道大笑之師古曰老子道經之言也大道𤣥深非其所及故致笑也非虛言也漢興破觚而為圜斵琱而為樸孟康曰觚方也師古曰去嚴刑而從簡易抑巧偽而務敦厚也琱謂刻鏤也字與雕同號為罔漏吞舟之魚師古曰言其疏也而吏治蒸蒸不至於姦師古曰蒸蒸純壹之貌也黎民艾安師古曰黎衆也艾讀曰乂乂治也由是觀之在彼不在此師古曰言不在於嚴酷也高后時酷吏獨有侯封刻轢宗室侵辱功臣師古曰轢謂陵踐也音來的反宋祁曰轢當音來各反吕氏已敗遂夷侯封之家師古曰夷除也孝景時鼂錯以刻深頗用術輔其資師古曰資材也而七國之亂發怒於錯錯卒被戮師古曰卒終也其後有郅都寗成之倫師古曰郅音之日反郅都河東大陽人也以郎事文帝景帝時為中郎將敢直諫面折大臣於朝嘗從入上林賈姬在厠師古曰賈姬即賈夫人生趙敬肅王彭祖中山靖王勝者野彘入厠上目都師古曰動目以使也都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧姬等}
