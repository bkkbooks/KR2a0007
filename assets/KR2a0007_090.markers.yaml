  - {type: variant, offset: 735, length: 1, content: 力, krp: 宋祁曰江南本作自之徐鍇改自作丐今詳注云自謂乞與之則正文不應云自乞之今兼存願以愚言白大將軍延年言之大將軍大將軍曰誠然實勇士也當發大議時震動朝廷光因舉手自撫心曰使我至今病悸師古曰悸心動也音揆宋祁曰韋昭曰心中喘息曰悸音水季反謝田大夫曉大司農通徃就獄得公議之師古曰曉者告白意指也通者從公家通理也光忿其拒諱故不佑之田大夫使人語延年延年曰幸縣官寛我耳何靣目入牢獄使衆人指笑我卒徒唾吾背乎即閉閤獨居齊舎師古曰齊讀曰齋偏袒持刀東西歩數曰使者召延年詣廷尉聞鼓聲自刎死晉灼曰使者至司農司農𤼵詔書故鳴鼓也師古曰刎謂斷頸也國除嚴延年字次卿東海下邳人也其父為丞相掾延年少學法律丞相府歸為郡吏以選除補御史掾舉侍御史是時大將軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立亡人臣禮不道宋祁曰立字下當有主字奏雖寢然朝廷肅焉敬憚延年後復劾大司農田延年持兵干屬車師古曰干犯也屬車天子後車也音之欲反大司農自訟不干屬車事下御史中丞譴責延年何以不移書宫殿門禁止大司農}
