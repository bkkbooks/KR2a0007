  - {type: variant, offset: 3731, length: 525, content: 而失一國之心擁有罪之臣而絕慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邊吏或者設為反間欲因而生隙受之適合其策使得歸曲而直責此誠邊竟安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使明年單于上書願朝河平四年正月遂入朝加賜錦繡繒帛二萬匹絮二萬斤它如竟寧時復株絫單于立十歲鴻嘉元年死弟且麋胥立為搜諧若鞮單于搜諧單于立遣子左祝都韓王朐留斯侯入侍以且莫車為左賢王搜諧單于立八歲元延元年為朝二年發行未入塞病死弟且莫車立為車牙若鞮單于車牙單于立遣子石於涂仇撣王烏夷當入侍以囊知牙斯為左賢王車牙單于立四歲綏和元年死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以第二閼氏子樂為左賢王以第五閼氏子輿為右賢王遺子右股奴王烏鞮牙斯入侍漢遣中郎將夏侯藩副校尉韓容使匈奴時帝舅大司馬票騎將軍王根領尚書事或說根曰匈奴有斗入漢地直張掖郡生奇材木箭竿就羽如得之於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利上直欲從單于求之為有不得傷命損威根即但以上指曉藩令從藩所說而求之藩至匈奴以語次說單于曰竊見匈奴斗入漢地直張掖郡漢三都尉居塞上士卒, WYG: ''}
