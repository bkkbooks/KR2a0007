  - {type: variant, offset: 10098, length: 712, content: 諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長匈奴無已之詐也夫邊城不選守境武略之臣脩障隧備塞之具厲長戟勁弩之械恃吾所以待邊寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而幾胡馬之不窺不已過乎至孝宣之世承武帝奮擊之威直匈奴百年之運因其壞亂幾亡之阸權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野三世無犬吠之警菞庶亡干戈之役後六十餘載之間遭王莽篡位始開邊隙單于由是歸怨自絕莽遂斬其侍子邊境之禍搆矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮讓而不臣如其後嗣逯逃竄伏使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危遠見識微之明矣至單于咸棄其愛子昧利不顧侵掠所獲歲鉅萬計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而媮恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿分九州列五服物土貢制外內或脩刑政或昭文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左衽人面獸心其與中國殊章服異習俗飲食不同言語不通辟居北垂寒露之野逐草隨畜射獵為生隔以山谷雍以沙幕天地所以絕外內也是故聖王禽獸畜之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羈靡不絕使曲在彼蓋聖王制御蠻夷之常道也, WYG: 證}
