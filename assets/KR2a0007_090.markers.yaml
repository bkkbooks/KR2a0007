  - {type: variant, offset: 715, length: 0, content: '', WYG: 中都以漢法景帝曰都忠臣欲釋之師古曰釋置也觧也謂放免也竇太后曰臨江王獨非忠臣乎於是斬都也宋祁曰傳末也字當刪寗成南陽穰人也以郎謁者事景帝好氣為少吏宋祁曰淳化本越本少作小據史館本作少今兩存之必陵其長吏為人上操下急如束濕師古曰操執持也束濕言其急之甚也濕物則易束操音千高反猾賊任威稍遷至濟南都尉而郅都為守始前數都尉歩入府因吏謁守如縣令其畏都如此及成徃直凌都出其上都素聞其聲善遇與結驩乆之都死後長安左右宗室多犯法師古曰長安左右京邑之中也上召成為中尉其治效郅都其廉弗如然宗室豪桀人皆惴恐師古曰惴戰栗也人人皆戰恐也惴音之瑞反武帝即位徙為内史外戚多毁成之短抵罪髠鉗是時九卿死即死少被刑而成刑極自以為不復收如淳曰以被重刑将不復見收用也師古曰刑極者言殘毁之重也廼觧脱詐刻傳出闗歸家師古曰輙觧脱鉗釱而亡去也傳所以出闗之符也音張戀反稱曰仕不至二千石賈不至千萬安可比人乎師古曰賈謂販賣之廼貰貣陂田千餘頃師古曰貰貣假取之也貣音吐得反假貧民役使數千家師古曰假謂雇賃也數年㑹赦致産數千萬為任俠持吏長短出從數十騎其使民威重於郡守周陽由其父趙兼以淮南王舅侯周陽師古曰封為周陽侯故因氏焉師古曰遂改趙姓而為周陽也由以宗家任為郎事文帝景帝時由為郡守武帝即位吏治尚修謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之師古曰撓亦屈曲也音女教反所居郡必夷其豪師古曰平除之宋祁曰豪字下當有桀字為守視都尉如令為都尉陵太守奪之治汲黯為忮師古曰忮意堅也音章豉反宋祁曰韋昭曰忮音洎字書之豉反司馬安之文惡孟康曰以文法傷害人也俱在二千石列同車未嘗敢均茵馮師古曰茵車中蓐也馮車中所馮者也言此二人皆下讓由故同車之時自處其偏側不均敵也馮讀曰凭宋祁曰茵亦作鞇霍光傳作絪晉灼音義作鞇字亦音因後由為河東都尉與其守勝屠公争權相告言師古曰勝屠姓也勝屠公當抵罪議不受刑自殺劉敞曰議當作義而由弃市自寗成周陽由之後事益多民巧法大抵吏治類多成由等矣師古曰大抵大歸也音丁禮反趙禹斄人也師古曰斄讀曰邰扶風縣也音胎以佐史補中都官師古曰京師諸官為吏也宋祁曰淳化本史作吏刋誤據史館本改作史注文師古曰下當有於字用廉為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害師古曰無害言無人能勝之者劉奉世曰足以知謂廉平之類為無害也然文深應劭曰禹持文法深刻不可以居大府武帝時禹以刀筆吏積勞遷為御史上以為能至中大夫與張湯論}
