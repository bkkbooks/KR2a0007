  - {type: variant, offset: 2571, length: 507, content: 中國尚建梁以制諸侯所以絕臣下之覬欲也設塞徼置屯戍非獨為匈奴而已亦為諸屬國降民本故匈奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜產妻子以此怨恨起而背畔世世不絕今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰聞匈奴中樂無奈侯望急何然時有亡出塞者七也盜賊桀黠群輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落谿谷水門稍稍平之卒徒築治功費久遠不可勝計臣恐議者不深慮其終始欲以壹切省繇戍十年之外百歲之內卒有它變障塞破壞亭隧滅絕當更發屯繕治累世之功不可卒復九也如罷戍卒省侯望單于自以保塞守御必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事使車騎將軍口諭單于曰單于上書願罷北邊吏士屯戍子孫世世保塞單于鄉幕禮義所以為民計者甚厚此長久之策也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為寇害故明法度以專眾心也敬諭單于之意朕無疑焉為單于怪其不罷故使大司馬車騎將軍嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自, WYG: 矜}
