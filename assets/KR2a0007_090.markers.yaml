  - {type: variant, offset: 9698, length: 399, content: 興以至于今曠世歷年多於春秋其與匈奴有脩文而和親之矣有用武而克伐之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邊境孝惠高后時遵而不違匈奴寇盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而匈奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戎服親御鞌馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明效也仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如匈奴者非可以仁義說也獨可說以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以累其心匈奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論, WYG: 書卷九十}
