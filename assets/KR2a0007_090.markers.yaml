  - {type: variant, offset: 1636, length: 269, content: 殺之呼韓邪單于使來漢輒簿責之甚急明年漢遣車騎都尉韓昌光祿大夫張猛送呼韓邪單于侍子求問吉等因赦其罪勿令自疑昌猛見單于民眾益盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸于北歸者恐北去後難約束昌猛即與為盟約曰自今以來漢與匈奴合為一家世世毋得相詐相攻有竊盜者相報行其誅償其物有寇發兵相助漢與匈奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱登匈奴諾水東山刑白馬單于以徑路刀金留犁撓酒以老上單于所破月氏王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為危害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告于天羞國家傷威重, WYG: 文致}
