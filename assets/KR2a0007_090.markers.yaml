  - {type: variant, offset: 1934, length: 368, content: 詔昌猛以贖論勿解盟其後呼韓邪竟北歸庭人眾稍稍歸之國中遂定郅支既殺使者自知負漢又聞呼韓邪益彊恐見襲擊欲遠去會康居王數為烏孫所困與諸翕侯計以為匈奴大國烏孫素服屬之今郅支單于困阸在外可迎置東邊使合兵取烏孫以立之長無匈奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大說遂與相結引兵而西康居亦遣貴人橐它驢馬數千匹迎郅支郅支人眾中寒道死餘財三千人到康居其後都護甘延壽與副陳湯發兵即康居誅斬郅支語在延壽湯傳郅支既誅呼韓邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支已伏誅願入朝見竟寧元年單于復入朝禮賜如初加衣服錦帛絮皆倍於黃龍時單于自言願壻漢氏以自親元帝以後宮良家子王牆字昭君賜單于單于驩喜上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應曰, WYG: 喉咽也二}
