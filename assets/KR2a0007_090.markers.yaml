  - {type: variant, offset: 727, length: 0, content: '', WYG: 見知者無所捜求也嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王温舒等後起治峻禹禹以老徙為燕相宋祁曰老字上當有先字數歳誖亂有罪免歸師古曰誖惑也言其心意昏惑也誖音布内反後十餘年以壽卒於家義縱河東人也少年時常與張次公俱攻剽為羣盗師古曰剽刼也音頻妙反縱有姊以醫幸王太后師古曰武帝母太后問有子兄弟為官者乎姊曰有弟無行不}
