  - {type: variant, offset: 3955, length: 0, content: '', WYG: 前漢書卷九前漢書卷九考證元帝紀以三輔太常郡國公田及苑胡三省曰太常掌諸陵邑故亦有公田及苑中常侍許嘉胡三省曰按表侍中中常侍皆加官西都叅用士人東都以宦者為中常侍北假田官臣召南按水經注曰自髙闕以東夾山帶河陽山以西皆北假也詔丞相御史舉質樸敦厚遜譲有行者光禄嵗以此科第郎從官注臣召南按所云舉光禄四行者即起于此後漢書吳祐以光禄四行遷膠東侯相注引漢官儀曰淳厚質樸遜譲節儉也蓋漢時朝廷從官俱屬光禄勲自太中大夫中大夫諫大夫及郎議郎中郎侍郎郎中其員多至千人故令光禄勲第其賢否以太常任千秋為奮威將軍按馮奉世傳作奮武將軍贊貢薛韋匡迭為宰相臣召南按貢禹薛廣徳止為御史大夫而贊與韋匡並列漢世以御史大夫為丞相之副故與丞相並稱兩府其後改丞相曰司徒改御史大夫曰司空遂並為三公矣蕭望之嘗為御史大夫後為前將軍曰吾備位將相亦是此義前漢書卷九考證}
