  - {type: variant, offset: 6252, length: 0, content: '', WYG: 也劉奉世曰趙高殺二世蓋又以法定其罪投鼠而不忌器之習也臣聞之履雖鮮不加于枕冠雖敝不以苴履師古曰苴者履中之藉也音子余反宋祁曰苴當作子汝反夫嘗已在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今}
