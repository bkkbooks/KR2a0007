  - {type: variant, offset: 5794, length: 345, content: 大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虛德潤草木澤被四海鳳皇來集麒麟來游以古準今壹何不相逮之遠也安所繆盭而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之於古返之於天黨可得見乎夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故眾其奴婢多其牛羊廣其田宅博其產業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羨溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道, WYG: 異在}
