  - {type: variant, offset: 3448, length: 163, content: 犯惡者未必刑也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趣利無恥又好用憯酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業群盜並起是以刑者甚眾死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極群下之知盡天下之美至德昭然施於方外夜郎康居殊方萬里說德歸誼此太平之致也然, WYG: 貴徳則聖智在位}
