  - {type: variant, offset: 6306, length: 1, content: 天, WYG: 耳有便吾身者則欺賣而利之耳人主將何便于此師古曰此于人主為不便也便音頻靣反羣下至衆而主上至少也所託財器職業者粹于羣下也師古曰粹純也言其埶悉在羣下俱亡耻俱茍妄則主上最病故古者禮不及庶人刑不至大夫所以厲寵臣之節也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾師古曰簠簋所以盛飯也方曰簠圓曰簋簠音甫又音扶簋音軌坐汙穢淫亂男女亡别者不曰汙穢曰帷薄不脩坐罷軟不勝任者不謂罷軟曰下官不職師古曰罷廢于事也軟弱也罷讀曰疲軟音人兖反故貴大臣定有其辠矣猶未斥然正以謼之也師古曰謼古呼字尚遷就而為之諱也故其在大譴大何之域者師古曰譴責也何問也域界局也聞譴何則白冠氂纓鄭氏曰以毛作纓白冠喪服也盤水加劒造請室而請辠耳應劭曰請室請罪之室蘇林曰音絜清胡公漢官車駕出有請室令在前先驅此官有别獄也如淳曰水性平若已有正罪君以平法治之也加劒當以自刎也或曰殺牲者以盤水取頸血故示若此也師古曰應如二說皆是上不執縛係引而行也其有中罪者聞命而自弛師古曰中罪非大非小也弛廢也自廢而死弛音式爾反上不使人頸盭而加也蘇林曰不戾其頸而親加刀鋸也師古曰盭古戾字音廬結反其有大辠者聞命則北面再拜跪而自裁師古曰裁謂自刑殺也上不使捽抑而刑之也師古曰捽持頭髪也抑謂按之也捽音才兀反曰}
