  - {type: variant, offset: 7235, length: 0, content: '', krp: 實已諾可期十死一生彼將必至此三表也賜之盛服車乘以壊其目賜之盛食珍味以壞其口賜之音樂婦人以壞其耳賜之髙堂邃宇倉庫奴婢以壊其腹于來降者上以召幸之相娛樂親酌而手食之以壞其心此五餌也宋祁曰注文常義監本及新書皆云帝義也其術固以疏矣誼亦天年早終雖不至公卿未為不遇也凡所著述五十八篇掇其切于世事者著于傅云師古曰掇拾也音丁活反前漢書卷四十八前漢書卷四十八考證賈誼傳謂隨夷溷兮謂跖蹻廉按史記作世謂隨夷溷兮謂盜跖廉文選作謂隨夷為溷兮謂跖蹻為廉其他字句俱有同異今但據本書校正誶曰按史記作訊曰文選從之又如偭蟂獺史記作彌融爚遥增撃而去之史記作搖增翮文選作遙矰繳服似鴞臣召南按史記云楚人命鴞曰服是一物二名漢書云似鴞則二物矣單閼之嵗四月孟夏按史記作單閼之嵗兮以下凡起句俱有兮字此班氏所刪也又按文選注文帝六年嵗在丁卯是時匈奴强云云臣召南按自此以下並漢書所詮叙也史記賈生與屈原同傳于經國之才救時之論㮣未及錄故特詳補之其治安策及上書並賈子新書文刪節以入傳可為流涕者二}
