  - {type: variant, offset: 5399, length: 337, content: 故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也故孔子曰亡為而治者其舜虖改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論議考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言廑能勿失耳若乃論政事之得失察, WYG: 則安置諸危處則危}
