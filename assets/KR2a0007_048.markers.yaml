  - {type: variant, offset: 340, length: 2253, content: 夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或壽或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何脩何飭而膏露降百穀登德潤四海澤臻屮木三光全寒暑平受天之祜享鬼神之靈德澤洋溢施虖方外延及群生子大夫明先聖之業習俗化之變終始之序講聞高誼之日久矣其明以諭朕科別其條勿猥勿并取之於術慎其所出乃其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣彊勉學問則聞見博而知益明彊勉行道則德日起而大有功此皆可使還至而有效者也詩曰夙夜匪解書云茂哉茂哉皆彊勉之謂也道者所繇適於治之路也仁義禮樂皆其具也故聖王已沒而子孫長久安寧數百歲此皆禮樂教化之功也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化人也著故聲發於和而本於情接於肌膚臧於骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚眾所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱誦至今不絕此夙夜不解行善之所致也孔子曰人能弘道非道弘人也故治亂廢興在於己非天降命不可得反其所操持誖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為鳥此蓋受命之符也周公曰復哉復哉孔子曰德不孤必有鄰皆積善絫德之效也及至後世淫佚衰微不能統理群生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則陰陽繆盭而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風小人之德屮屮上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯倈動之斯和此之謂也臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成歲終陽以成歲為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成歲也為政而任刑不順於天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正而亡有邪氣奸其間者是以陰陽調而風雨時群生和而萬民殖五穀孰而屮木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行高而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也埽除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先王之道而顓為自恣苟簡之治故立為天子十四歲而國破亡矣自古以倈未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可彫也糞土之牆不可圬也今漢繼秦之後如朽木糞牆矣雖欲善治之亡可柰何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羨魚不如退而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿于天為政而宜於民者固當受祿于天夫仁誼禮知信五常之道王者所當脩飭也五者脩飭故受天之祐而享鬼神之靈德施于方外延及群生也天子覽其對而異焉乃復冊之曰制曰蓋聞虞舜之時游於巖郎之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造玄黃旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興夫帝王之道豈異指哉或曰良玉不瑑又曰非文無以輔德, WYG: ''}
