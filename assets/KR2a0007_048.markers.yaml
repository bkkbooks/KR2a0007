  - {type: variant, offset: 3875, length: 382, content: 姦為市貧窮孤弱冤苦失職甚不稱陛下之意是以陰陽錯繆氛氣充塞群生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄德而定位則廉恥殊路賢不肖異處矣陛下加惠寬臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復冊之制曰蓋聞善言天者必有徵於人善言古者必有驗於今故朕垂問乎天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改今子大夫明於陰陽, WYG: 饋同}
