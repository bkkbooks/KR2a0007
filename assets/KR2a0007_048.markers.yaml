  - {type: variant, offset: 4573, length: 1, content: 君, WYG: 告訐也師古曰訐謂靣相斥罪也音居謁反固非貴禮義也所上者刑罰也使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然師古曰艾讀曰刈菅茅也音姦豈惟胡亥之性惡哉彼其所以道之者非其理故也師古曰道讀曰導鄙諺曰不習為吏視已成事又曰前車覆後車誡夫三代}
