  - {type: variant, offset: 6502, length: 140, content: 守臣愚以為諸不在六藝之科孔子之術者皆絕其道勿使並進邪辟之說滅息然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉久之王問仲舒曰粵王句踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人亦以為粵有三仁桓公決疑於管仲寡人決疑於君仲舒對曰臣愚, WYG: 吞食}
