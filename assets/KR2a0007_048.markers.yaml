  - {type: variant, offset: 2621, length: 259, content: 不犯囹圄空虛秦國用之死者甚眾刑者相望秏矣哀哉烏虖朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力本任賢今朕親耕藉田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今陰陽錯繆氛氣充塞群生寡遂黎民未濟廉恥貿亂賢不肖渾殽未得其真故詳延特起之士庶幾乎今子大夫待詔百有餘人或道世務而未濟稽諸上古之不同考之于今而難行毋乃牽於文繫而不得騁與將所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷禼咎繇眾聖輔德賢能佐職教化大行天下, WYG: ''}
