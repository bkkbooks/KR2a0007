  - {type: variant, offset: 3225, length: 0, content: '', WYG: 制度定官名興禮樂廼草具其儀法師古曰草謂創造之色上黄數用五為官名悉更奏之師古曰更改也文帝謙讓未皇也師古曰皇暇也自以為不當改制然諸法令所更定及列侯就國其說皆誼發之于是天子議以誼任公卿之位絳灌東陽侯馮敬之屬盡害之師古曰絳絳侯周勃也灌灌嬰也東陽侯張相如也馮敬時為御史大夫廼毁誼曰雒陽之人年少初學専欲擅權紛亂諸事于是天子後亦疎之不用其議以誼為長沙王太傅誼既以適去師古曰適音謫其下亦同意不自得及渡湘水師古曰湘水出零陵陽海山北流入江也為賦以弔屈原屈原楚賢臣也被讒放逐作離騷賦師古曰離遭也憂動曰騷遭憂而作此辭其終篇曰已矣國亡人莫我知也遂自投江而死誼追傷之因以自諭師古曰諭譬也其辭曰恭承嘉惠兮師古曰恭敬也嘉惠謂詔命也竢罪長沙師古曰竢古俟字俟待也仄聞屈原兮自湛汩羅師古曰仄古側字汨水名在長沙羅縣故曰汨羅湛讀曰沉汨音莫歴反造託湘流兮敬弔先生師古曰造至也言至湘水而因託其流也造音千到反遭世罔極兮廼隕厥身張晏曰讒言罔極師古曰罔無也極中也無中正之道一曰極止也烏虖哀哉兮逢時不祥師古曰虖音呼鸞鳯伏竄兮鴟鴞翺翔師古曰鴟鵂鶹怪鳥也鴞惡聲之鳥也鴟音尺夷反鴞音于驕反鵂音休闒茸尊顯兮讒䛕得志師古曰闒茸下材不肖之人也闒音吐盍反茸音人勇反賢聖逆曳兮方正倒植師古曰植立也音值謂隨夷溷兮應劭曰隨卞隨湯時廉士湯以天下讓而不受夷伯夷也不食周粟餓于首陽之下師古曰溷濁也音胡困反謂跖蹻廉李竒曰跖秦大盗也楚之大盗為莊蹻師古曰跖音之石反蹻音居畧反莊周云盗跖栁下惠之弟蓋寓言也莫邪為鈍兮應劭曰莫邪吳大夫也作寳劒因以冠名鈆刀為銛晉灼曰世俗謂利為銛徹師古曰音弋占反于嗟默默生之亡故兮應劭曰默默不得意也鄧展曰言屈原無故遇此禍也師古曰生先生也斡棄周鼎師古曰斡轉也音管寳康瓠兮鄭氏曰康瓠瓦盆底也爾雅曰康瓠謂之甈師古曰甈音五列反騰駕罷牛驂蹇驢兮師古曰罷讀曰疲蹇跛也驥垂兩耳服鹽車兮師古曰駕鹽車也章父薦屨漸不可久兮師古曰章父殷冠名也言冠乃居下屨反在上也父讀曰甫劉奉世曰薦之言藉也言以冠藉屨貴賤顛倒嗟若先生獨離此咎兮應劭曰嗟咨嗟也勞苦屈原遇此難也師古曰離遭也誶曰李竒曰誶告也張晏曰誶離騷下章亂也師古曰誶音碎已矣國其莫吾知兮師古曰一國之人不知我也子獨壹鬱其誰語師古曰壹鬱猶抑鬱也鳳縹縹其高逝兮夫固自引而逺去師古曰縹縹輕舉貌音匹遙反襲九淵之神龍兮鄧展曰襲重也師古曰九淵九旋之川言至深也沕淵潛以自珍鄧展曰沕音昧張晏曰潛藏也偭蟂獺以隱處兮服䖍曰蟂音梟應劭曰蟂獺水蟲害魚者也偭背也欲舍蟂獺從神龍遊也師古曰偭音靣夫豈從蝦與蛭螾服䖍曰蛭水蟲螾今之螼螾也孟康曰言龍自絶於蟂獺况從蝦與蛭螾也師古曰蝦亦水蟲也音遐蛭音質螾字與蚓同音引今合韻當音弋人反螼音丘謹反所貴聖之神德兮逺濁世而自臧使麒麟可係而羈兮豈云異夫犬羊般紛紛其離此郵兮蘇林曰般音槃孟康曰般音班般反也紛紛構讒意也師古曰般孟音是也字從丹青之丹離遭也郵過也亦夫子之故也李竒曰亦夫子不如麟鳯之故離此咎也師古曰此說非也賈誼自言今之離郵亦猶屈原耳劉攽曰顔說全失但誼舉屈原事則可興已矣遂自叙其怨憤則太過矣許應元曰誶曰以下咎屈原不能全身逺害故弔之非誼自喻也顔說非是歴九州而相其君兮何必懐此都也師古曰言往長沙為傅不足哀傷何用茍懐此之都邑蓋亦誼自寛廣之言也鳳皇翔于千仞兮覽徳煇而下之師古曰八尺曰仞千仞言其極高也見細徳之險微兮遙增擊而去之師古曰増重也言見苛細之人險阨之證故重擊其羽而高去宋祁曰浙本微作徵作微者非是上言微注言證意自相㑹彼尋常之汙瀆兮豈容吞舟之魚應劭曰八尺曰尋倍尋曰常師古曰水不泄為汙音一胡反又音一故反横江湖之鱣鯨兮固將制於螻螘如淳曰鱣鯨皆大魚也臣瓚曰鱣魚無鱗口在腹下鯨魚長者長數里晉灼曰小水不容大魚而横鱣鯨于汙瀆必為螻螘所制以况小朝主闇不容受忠逆之言亦為讒賊小臣所害師古曰鱣音竹連反字或作鱏鱏亦大魚也音淫又音尋螻音樓謂螻蛄也誼為長沙傅三年有服飛入誼舍止於坐隅師古曰坐音才臥反服似鴞晉灼曰異物志曰有鳥小雞體有文色土俗因形名之曰服不能逺飛行不出域也宋祁曰注文鳥字下疑有如字不祥鳥也誼既以適居長沙長沙卑濕誼自傷悼以為壽不得長廼為賦以自廣其辭曰單閼之歳四月孟夏應劭曰太歳在卯為單閼師古曰閼音一葛反宋祁曰單音禪庚子日斜服集余舍孟康曰日斜日昳時止于坐隅貌甚閒暇師古曰閒讀曰閑異物來崪私怪其故孟康曰崪音萃萃聚集也發書占之䜟言其度師古曰䜟驗也有徵驗之書也䜟音初禁反曰野鳥入室主人將去問于子服余去何之師古曰子服者言加其美稱也宋祁曰子服姚本作于服吉虖告我凶言其災淹速之度語余其期師古曰淹遲也服乃太息舉首奮翼口不能言請對以意師古曰意字合韻宜音億萬物變化固亡休息斡流而遷或推而還師古曰斡音管斡轉也還讀曰旋形氣轉續變化而嬗服䖍曰嬗音如蟬謂變蛻也蘇林曰相傳與也師古曰此即禪代字合韻故音嬋耳蘇說是也沕穆亡間胡可勝言師古曰沕穆深微貌胡何也言其理深微不可盡言沕音勿禍兮福所倚福兮禍所伏師古曰此老子徳經之言也倚音於綺反憂喜聚門吉凶同域師古曰言禍福相因吉凶不定彼吳彊大夫差以敗粤棲會稽勾踐伯世師古曰會稽山名也句踐避吳之難保於此山故曰棲也句音鉤伯讀曰霸斯遊遂成卒被五刑應劭曰李斯西遊于秦身登相位二世時為趙髙所讒身伏五刑宋祁云注姚本伏作被傅說胥靡廼相武丁張晏曰胥靡刑名也傅說被刑築于傅巖武丁以為已相師古曰胥靡相隨之刑也解在楚元王傳夫禍之與福何異紏纆應劭曰禍福相為表裏如紏繩索相附會也臣瓚曰紏絞也纆索也師古曰纆音墨命不可說孰知其極師古曰極止也水激則旱矢激則逺師古曰言水之激疾則去盡不能浸潤矢之激發則去逺劉攽曰旱讀為悍猛疾也萬物回薄震蕩相轉雲蒸雨降糾錯相紛大鈞播物坱圠無垠如淳曰陶者作器于鈞上此以造化為大鈞也應劭曰其氣坱圠非有限齊也師古曰今造瓦者謂所轉者為鈞言造化為人亦猶陶之造瓦耳坱音烏朗反北音於黠反天不可與慮道不可與謀遲速有命烏識其時師古曰烏猶何也且夫天地為鑪造化為工隂陽為炭萬物為銅師古曰以冶鑄為喻合散消息安有常則千變萬化未始有極忽然為人何足控揣孟康曰控引也揣持也言人生忽然何足引持自貴借也如淳曰控引也揣音團控摶玩弄愛生之意也師古曰如說是宋祁云注文貴借姚本作貴惜化為異物又何足患師古曰患合韻音環小智自私賤彼貴我達人大觀物亡不可貪夫徇財列士徇名臣瓚曰以身從物曰徇宋祁曰浙本徇作殉夸者死權品庶每生臣瓚曰謂夸泰也莊子曰權勢不充則夸者悲孟康曰每貪也師古曰品庶猶庶品也怵廹之徒或趨西東孟康曰怵為利所誘訹也迫迫貧賤東西趨利也師古曰誘訹之訹則音戍或曰怵怵惕也音丑出反其義兩通而說者欲改字為鉥蓋穿鑿耳大人不曲意變齊同愚士繫俗僒若囚拘李竒曰僒音塊蘇林曰皆人肩傴僒爾音欺全反師古曰蘇音是臣佖曰按說文窘音渠隕反迫也文選李善注窘囚拘之貌五臣注窘困也愚者繫縳俗累困如囚人拘束其字並不從人唯孫強新加字玉篇及開元文字有作僒字並音窘疑蘇林音誤今宜定從說文音渠隕反至人遺物獨與道俱衆人惑惑好惡積意李竒曰惑惑東西也所好所惡積之萬億也臣瓚曰言衆懐好惡積之心意也師古曰瓚說是也意合韻音於力反眞人恬漠獨與道息師古曰恬安也漠静也釋智遺形超然自喪服䖍曰絶聖弃智而亡其身也師古曰喪合韻音先郎反寥廓忽荒與道翺翔師古曰荒音呼廣反乗流則逝遇坎則止孟康曰易坎為險遇險難而止也張晏曰謂夷易則仕險難則隐也縱軀委命不私與已其生兮若浮其死兮若休師古曰休息也澹虖若深淵之靚汜虖若不繫之舟師古曰澹安也音徒濫反靚與静同汜音敷劒反不以生故自保養空而浮服䖍曰道家養空虚若浮舟也徳人無累知命不憂細故蔕芥何足以疑師古曰蔕芥小鯁也蔕音丑芥反後歳餘文帝思誼徵之至入見上方受釐坐宣室蘇林曰宣室未央前正室也應劭曰釐祭餘肉也漢儀注祭天地五畤皇帝不自行祠還致福釐音禧師古曰禧福也借釐字為之耳言受神之福也上因感鬼神事而問鬼神之本誼具道}
