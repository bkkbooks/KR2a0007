  - {type: variant, offset: 6718, length: 0, content: '', WYG: 臣得畢其愚忠唯陛下財幸師古曰財與裁同裁擇而幸從其言文帝于是從誼計廼徙淮陽王武為梁王北界泰山西至高陽得大縣四十餘城徙城陽王喜為淮南王撫其民時又封淮南厲王四子皆為列侯誼知上必將復王之也上疏諫曰竊恐陛下接王淮南諸子孟康曰接音挾挾持欲王淮南諸子也臣瓚曰謂以恩接待而王之師古曰二說皆非也謂接今時當即王之言不久也接猶續也猶今人言續復爾曾不與如臣}
