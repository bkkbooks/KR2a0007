  - {type: variant, offset: 4302, length: 264, content: 王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之詩不云虖嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之仲舒復對曰臣聞論語曰有始有卒者其唯聖人虖今陛下幸加惠留聽於承學之臣復下明冊以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不別白指不分明此臣淺陋之罪也冊曰善言天者必有徵於人善言古者必有驗於今臣聞天者群物之祖也故徧覆包函而無所殊建日月風雨以和之經陰陽寒暑以成之故聖人法天而立道亦溥愛而亡私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天, WYG: 代}
