  - {type: variant, offset: 7269, length: 1, content: 耦, WYG: 二諭教太子是為太息之三體貌大臣是為太息之四又等齊篇論名分不正又銅布篇論收銅鑄錢此二者皆太息之說班氏削等齊篇不取而載銅布篇于食貨志故六太息止載三篇夫樹國固必相疑之埶注鄭氏臣瓚云云師古曰鄭說是也臣召南按如鄭說則本文固字應倒在必字之下于義不順如瓚說則樹國固當一讀于義甚長師古取鄭說似誤上數爽其憂顧炎武曰謂秦之所憂在孤立而漢之所憂在諸侯漢初之所憂在異姓而今之所憂在同姓貫高利幾之謀不生臣召南按利幾事見高紀幾本楚將降而封于潁川疑懼遂反高帝撃破之陛下何不試以臣為屬國之官眞德秀曰此文下新書言三表五餌而史削之又威令不信可為流涕者此也下新書言天子之相號為丞相諸侯之臣號為丞相云云是臣主非有相臨之分尊卑之經也可為長太息者此也而史削之擇良日立諸子雒陽上東門之外注師古曰諸侯國皆在關東云云臣召南按諸侯並在關東固不必言此文謂雒陽上東門也考高紀帝雖自雒陽入都關中而六年封子肥齊}
