  - {type: variant, offset: 4587, length: 0, content: '', WYG: 師古曰亟急也音居力反車跡曰轍然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣于太子太子之善在于早諭教與選左右師古曰諭曉告也與猶及也夫心未濫而先諭教則化易成也開于道術智誼之指則教之力也若其服習積貫則左右而已師古曰貫音工宦反夫胡粤之人生而同聲耆欲不異師古曰耆讀曰嗜及其長而成俗累數譯而不能相通行有雖死而不相為者蘇林曰言其人之行不能易事相為處宋祁曰浙本無者字為是不但成語亦與注會則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣宋祁曰越本得字上有有字太子正而天下定矣書曰一人有慶兆民賴之師古曰周書呂}
  - {type: page-break, offset: 4587, content: '', id: KR2a0007_WYG_048-26a, image: WYG0250/WYG0250-0128c.png}
