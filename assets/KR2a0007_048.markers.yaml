  - {type: variant, offset: 3228, length: 0, content: '', krp: 劭曰六親父母兄弟妻子也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程師古曰程式也雖有愚㓜不肖之嗣猶得䝉業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也師古曰少知治體者誼自謂也劉攽曰少知治體泛說爾何必誼自謂乎其具可素陳于前願幸無忽師古曰忽怠忘也臣謹稽之天地師古曰稽考也驗之往古按之當今之務日夜念此至孰也雖使禹舜復生為陛下計亡以易此師古曰易改也夫樹國固必相疑之埶鄭氏曰今建立國泰大其勢必固相疑也臣瓚曰樹國于險固諸侯强大則必與天子有相疑之勢也師古曰鄭說是也下數被其殃上數爽其憂如淳曰爽忒也甚非所以安上而全下也今或親弟謀為東帝應劭曰淮南厲王長親兄之子西鄉而擊如淳曰謂齊悼惠王子興居而為濟北王反欲擊取滎陽也師古曰鄉讀曰嚮今吳又見告矣如淳曰時吳王又不循漢法有告之者天子春秋鼎盛應劭曰鼎方也行義未過師古曰行音下更反德澤有加焉猶尚如是况莫大諸侯師古曰莫大謂無有大于其國者言最大也權力且十此者虖師古曰十倍於此然而天下少安何也大國之王㓜弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠師古曰大抵猶言大畧也音丁禮反其下亦同血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治宋祁云浙本治字上有能字存能則語成文黄帝曰日中必􅡢操刀必割孟康曰􅡢音衞日中盛者必暴􅡢也臣瓚曰太公曰日中不是謂失時操刀不割失利之期言當及時也師古曰此語見六韜􅡢謂暴曬之也曬音所智反又音所懈反今命此道順而全安甚易不肯早為已廼墮骨肉之屬而抗剄之應劭曰抗其頭而剄之也師古曰墮毁也抗舉也剄割頸也墮音火規反剄音工鼎反豈有異秦之季世虖夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時師古曰曩久也謂昔時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫高為相盧綰王燕陳豨在代令此六七公者皆亡恙師古曰無恙言無憂病也當是時而陛下即天子位能自安乎宋祁云浙本位字上有之字臣有以知陛下之不能也天下殽亂高皇帝與諸公併起師古曰殽雜也併音歩鼎反非有仄室之埶以豫席之也應劭曰禮卿大夫之支子為側室席大也臣瓚曰席藉也言非有側室之勢為之資藉也師古曰瓚說是也諸公幸者廼為中涓其次廑得舍人師古曰廑與僅同廑劣也言纔得舍人材之不逮至遠也高皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣悳至渥也師古曰悳古徳字渥厚也音握然其後十年之間反者九起陛下之與諸公非親角材而臣之也師古曰角校也競也又非身封王之也自高皇帝不能以是一歳為安故臣知陛下之不能也然尚有可諉者曰疏孟康曰諉累也以疏為累言不以國也蔡謨曰諉者託也尚可託言信越等以疏故反故其下句曰臣請試言其親者親者亦恃彊為亂明信等不以疏也師古曰蔡說是矣諉音女瑞反臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁師古曰共讀曰恭靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治虖臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心師古曰自以為于天子為昆弟而不論君臣之義慮亡不帝制而天子自為者師古曰慮大計也言諸侯皆欲同皇帝之制度而為天子之事擅爵人赦死辠師古曰擅專也甚者或戴黄屋師古曰天子車戴之制宋祁云注文姚本戴作蓋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎師古曰不軌謂不修法制也致至也幸而來至法安可得加動一親戚天下圜視而起應劭曰圜精正視也師古曰言驚愕也陛下之臣雖有悍如馮敬者如淳曰馮無擇子名忠直為御史大夫奏淮南厲王誅之師古曰悍勇也宋祁曰案功臣表非馮無擇子孝文七年自典客為御史大夫適啓其口匕首已陷其匈矣師古曰始欲發言節制諸侯王則為刺客所殺陛下雖賢誰與領此師古曰領理也故疏者必危親者必亂已然之效也其異姓負彊而動者漢已幸勝之矣又不易其所以然同姓襲是跡而動師古曰易其所以然謂改其法制使不然既有徵矣師古曰徵證驗也其埶盡又復然殃旤之變未知所移師古曰旤古禍字明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛蘇林曰孔子時人也師古曰坦屠牛者之名也事見管子而芒刃不頓者師古曰芒刃謂刃之利如毫芒也頓讀曰鈍所排擊剝割皆衆理解也師古曰解支節也音胡懈反至於髖髀之所非斤則斧師古曰髀股骨也髖髀上也言其骨大故須斤斧也髖音寛髀音陛又音必爾反夫仁義恩厚人主之芒刃也權埶法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃師古曰嬰繞也臣以為不缺則折胡不用之淮南濟北埶不可也晉灼曰二國皆反誅何不施之仁恩埶不可故也臣竊跡前事師古曰尋前事之蹤跡大抵彊者先反淮隂王楚最彊則最先反韓信倚胡則又反師古曰倚依也音於綺反貫高因趙資則又反陳豨兵精則又反彭越用梁則又反晉灼曰用役用之也黥布用淮南則又反盧綰最弱最後反長沙廼在二萬五千戸耳功少而最完埶疏而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖以殘亡可也晉灼曰事埶可亡也師古曰曩亦謂昔時也令信越之倫列為徹侯而居雖至今存可也晉灼曰事埶可存然則天下之大計可知已師古曰已語終辭欲諸王之皆忠附則莫若令如長沙王欲臣子之勿葅醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心師古曰使以義使之遵禮義也令海内之埶如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安宋祁云舊本在作有故天下咸知陛下之明割地定制令齊趙楚各為若干國師古曰若干豫設數也解在食貨志使悼惠王幽王元王之子孫畢以次各受祖之分地師古曰分音扶問反次下亦同地盡而止及燕梁它國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之師古曰須待也諸侯之地其削頗入漢者為徙其侯國及封其子孫也師古曰徙其侯國列侯國邑在諸侯王封内而犬牙相入者則正其疆界令其隔絶也封其子孫者分諸侯王之國邑各自封其子孫而受封之人若有罪黜其地皆入于漢故云頗入也宋祁云新本子孫下有于彼二字注文令其隔絶浙本作令不隔絶所以數償之一寸之地一人之衆天子亡所利焉師古曰償者謂所正列侯疆界有侵諸侯王者則漢償之劉攽曰言諸侯之地先有削而頗入漢者後而以封列侯今為徙之及至封其子孫皆據數償之假令一王合封十縣則予十縣是為以數償之矣所字衍文劉奉世曰償之言還也所以數復還其削地如前所云者明天子不利有其地也誠以定治而已故天下咸知陛下之廉地制壹定宗室子孫莫慮不王師古曰慮計也下無倍畔之心上無誅伐之志師古曰倍讀曰背故天下咸知陛下之仁法立而不犯令行而不逆貫高利幾之謀不生柴竒開章之計不萌應劭曰柴竒開章皆與淮南王謀反者也宋祁云新本開作啟細民鄉善大臣致順師古曰鄉讀曰嚮故天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘而天下不亂服䖍曰言天下安雖赤子遺腹在位猶不危也應劭曰置遺腹朝委裘皆未有所知也孟康曰委裘若容衣天子未坐朝事先帝裘衣也師古曰應孟二說皆是當時大治後世誦聖師古曰稱誦其聖明壹動而五業附陛下誰憚而久不為此師古曰憚畏難也音徒旦反天下之埶方病大瘇如淳曰腫足曰瘇師古曰音止勇反一脛之大幾如要一指之大幾如股師古曰幾並音巨依反平居不可屈信師古曰信讀曰伸一二指搐身慮亡聊師古曰搐謂動而痛也聊頼也搐音丑六反宋祁云越本搐作畜失今不治必為錮疾師古曰錮疾堅久之疾後雖有扁鵲不能為已師古曰扁鵲良醫也為治也已語終辭病非徒瘇也又苦􅏓盭師古曰􅏓古蹠字音之石反足下曰蹠今所呼脚掌是也盭古戾字言足蹠反戾不可行也元王之子帝之從弟也師古曰楚元王高帝之弟其子於文帝為從弟今之王者從弟之子也惠王親兄子也今之王者兄子之子也師古曰惠王齊悼惠王劉攽曰惠王下脫之子二字親者或亡分地以安天下師古曰廣立蕃屏則天下安故曰以安天下疏者或制大權以偪天子師古曰偪古逼字臣故曰非徒病瘇也又苦􅏓盭可痛哭者此病是也天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚娒侵掠至不敬也師古曰娒古侮字為天下患至亡已也師古曰亡已言不可止也而漢歳致金絮采繒以奉之夷狄徵令是主上之操也師古曰徵召也令號令也操謂主上之所操持也操音千高反天子共貢是臣下之禮也師古曰共讀曰恭足反居上首顧居下師古曰顧亦反也言如人反顧然倒縣如此莫之能解猶為國有人乎師古曰顛倒如此而不能解救豈謂國有明智之人乎非亶倒縣而已師古曰亶讀曰但又類辟且病痱服䖍白病癖不能行也師古曰辟足病痱風辟音壁痱音肥宋祁曰浙本注病字下有也字痱下有體傷病也四字若止用舊注則全無意當用浙本夫辟者一靣病痱者一方痛今西邊北邊之郡雖有長爵不輕得復張晏曰長爵高爵也雖受高爵之賞猶將禦宼不得復除逸豫也蘇林曰輕易也不易得復除言難也師古曰復音方目反五尺以上不輕得息如淳曰五尺謂小兒也言無小大皆當自為戰備斥候望烽燧不得臥文頴曰邊方備胡㓂作高土櫓櫓上作桔臯桔臯頭兠零以薪草置其中常低之有㓂即火燃舉之以相告曰烽又多積薪㓂至即燃之以望其煙曰燧張晏曰晝舉烽夜燔燧也師古曰張說誤也晝則燔燧夜則舉烽將吏被介胄而睡師古曰被音皮義反臣故曰一方病矣醫能治之而上不使師古曰醫者誼自謂可為流涕者此也陛下何忍以帝皇之號為戎人諸侯埶既卑辱而旤不息長此安窮師古曰言長養此患將何所窮極也進謀者率以為是固不可解也亡具甚矣師古曰無治安之具臣竊料匈奴之衆師古曰料量也音聊不過漢一大縣以天下之大困於一縣之衆甚為執事者羞之陛下何不試以臣為屬國之官以主匈奴行臣之計請必係單于之頸而制其命伏中行說而笞其背鄭氏曰說奄人也漢使送公主妻匈奴說不肯行強之因以漢事告匈奴也師古曰中行姓也說名也行音胡剛反說讀曰悅中行說事具在匈奴傳舉匈奴之衆唯上之令師古曰聽天子之命今不獵猛敵而獵田彘不搏反寇而搏畜莵翫細娛而不圖大患非所以為安也徳可逺施威可逺加而直數百里外威令不信師古曰信讀曰伸可為流涕者此也今民賣僮者如淳曰僮謂隸妾也為之繡衣絲履偏諸緣服䖍曰加牙條以作履緣師古曰偏諸若今之織成以為要襻及褾領者也古謂之車馬裠其上為乗車及騎從之象也内之閑中服䖍曰閑賣奴婢闌是古天子后服所以廟而不宴者也師古曰入廟則服之宴處則不著蓋貴之也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸晉灼曰以偏諸緁著衣也師古曰緁音妾謂以偏諸緶著之也緶音歩千反美者黼繡師古曰黼者織為斧形繡者刺為衆文是古天子之服今富人大賈嘉會召客者以被牆師古曰被音皮義反古者以奉一帝一后而節適師古曰得其節而合宜今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也師古曰屈謂財力盡也音其勿反且帝之身自衣皁綈師古曰綈厚繒也音徒奚反而富民牆屋被文繡天子之后以緣其領庶人㜸妾緣其履師古曰㜸庶賤也此臣所謂舛也夫百人作之不能衣一人師古曰衣音於既反欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切于民之肌膚欲其亡為姦邪不可得也國已屈矣師古曰屈音其勿反盜賊直須時耳師古曰言待時而發然而獻計者曰毋動師古曰言天下安不可動搖為大耳如淳曰好為大語者夫俗至大不敬也至亡等也師古曰無尊卑之差至冒上也師古曰冒犯也進計者猶曰毋為可為長太息者此也商君遺禮義棄仁恩師古曰謂商鞅并心于進取行之二歳秦俗日敗故秦人家富子壯則出分家貧子壯則出贅應劭曰出作贅壻也師古曰謂之贅壻者言其不當出在妻家亦猶人身體之有肬贅非應所有也一說贅質也家貧無有聘財以身為質也贅音之銳反分音扶問反借父耰鉏慮有徳色師古曰耰摩田器也言以耰及鉏借與其父而容色自矜為恩徳也耰音憂母取箕箒立而誶語服䖍曰誶猶罵也張晏曰誶責讓也師古曰張說是也誶音碎宋祁曰浙本箒作帚抱哺其子與公併倨師古曰哺飤也言婦抱子而哺之乃與其舅併倨無禮之甚也哺音歩併音歩鼎反婦姑不相說則反脣而相稽應劭曰稽計也相與計校也師古曰說音悅稽音工奚反宋祁曰反脣一作反辱劉攽曰辱或作唇其慈子耆利不同禽獸者亡幾耳師古曰唯有慈愛其子而貪嗜財利小異于禽獸也亡幾言不多也幾居豈反劉奉世曰誼謂秦人不知孝義但如禽獸知愛子貪利而已此其去禽獸亡幾也顔解不明乃似云惟此小異于禽獸然并心而赴時猶曰蹷六國兼天下蘇林曰蹷音厥師古曰蹷謂拔而取之功成求得矣師古曰求得所求者得也終不知反廉愧之節仁義之厚師古曰反還也信并兼之法遂進取之業師古曰信讀曰伸一曰信任天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海内徳從天下師古曰大賢謂高祖也徳從天下天下從其徳曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐廉耻日甚可謂月異而歳不同矣逐利不耳慮非顧行也師古曰言其所追赴唯計利與不耳念慮之中非顧行之善惡也劉攽曰慮大率也今其甚者殺父兄矣盜者剟寢户之簾師古曰剟謂割取之也室有東西廂曰廟無東西廂曰寢蓋謂陵上之寢剟音輟搴兩廟之器如淳曰搴取也兩廟高祖惠帝廟也師古曰搴拔也音騫又音蹇白晝大都之中剽吏而奪之金師古曰白晝晝日也言白者謂不隂晦也剽劫也音頻妙反矯偽者出幾十萬石粟服䖍曰吏矯偽徵發盈出十萬石粟師古曰服說非也幾近也言詐為文書以出倉粟近十萬石耳非謂徵發于下也幾音鉅依反賦六百餘萬錢乗傳而行郡國如淳曰此言富者出錢穀得高爵或乃為使者乗傳車循行郡國以為榮也師古曰如說亦非也此又言矯偽之人詐為詔令妄作賦歛其數甚多又詐乗傳而行郡國也行音下更反此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故師古曰特徒也言公卿大臣特以簿書期會為急不知正風俗厲行義也宋祁云注文姚本特以作徒以至於俗流失世壊敗因恬而不知怪師古曰恬安也音徒兼反慮不動于耳目以為是適然耳師古曰適當也謂事理當然夫移風易俗使天下回心而鄉道類非俗吏之所能為也師古曰鄉讀曰嚮俗吏之所務在於刀筆筐篋師古曰刀所以削書扎筐篋所以盛書而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀師古曰紀理也此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壊師古曰植建也僵偃也音疆筦子曰師古曰筦與管同管子管仲也禮義廉耻是謂四維四維不張國乃滅亡使筦子愚人也則可筦子而少知治體則是豈可不為寒心哉師古曰若以管子為愚人其言不實則無禮義廉耻可也若以管子為微識治體則當寒心而憂之秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三歳而社稷為虚師古曰虚讀曰墟謂丘墟今四維猶未備也故姦人幾幸而衆心疑惑師古曰幾讀曰冀次下亦同豈如今定經制師古曰經常也令君君臣臣師古曰君為君徳臣為臣道上下有差父子六親各得其宜姦人亡所幾幸而羣臣衆信上不疑惑師古曰衆信謂共為忠信也此業壹定世世常安而後有所持循矣師古曰執持而順行之若夫經制不定是猶度江河亡維楫師古曰維所以繫舩楫所以刺舩也詩云紼纚維之楫音集又音接中流而遇風波舩必覆矣師古曰覆音芳目反可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人性不甚相逺也師古曰逺音于萬反何三代之君有道之長而秦無道之暴也其故可知也古之王者太子廼生固舉以禮師古曰廼始也使士負之有司齊肅端冕師古曰齊讀曰齋見之南郊見于}
