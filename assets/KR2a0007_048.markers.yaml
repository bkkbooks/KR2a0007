  - {type: variant, offset: 3016, length: 203, content: 世賢者隱處而不為臣守職之人皆奔走逃亡入于河海天下秏亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚於朝廷愛施兆民天下歸之故太公起海濱而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采玄黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者, WYG: ''}
