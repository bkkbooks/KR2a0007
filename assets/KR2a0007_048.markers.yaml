  - {type: variant, offset: 6248, length: 2, content: 推讓, WYG: 戮辱是以黥劓之辠不及大夫以其離主上不逺也禮不敢齒君之路馬蹵其芻者有罰師古曰齒謂審其齒歳也芻所食之草也蹵音千六反見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之辠不加其身者尊君之故也此所以為主上豫逺不敬也師古曰逺離也所以體貌大臣而厲其節也師古曰體貌謂加禮容而敬之今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也師古曰天子呼諸侯長者同姓則曰伯父異姓則曰伯舅伯長也而今與衆庶同黥劓髠刖笞傌棄市之法蘇林曰傌音罵然則堂不亡陛虖被戮辱者不泰迫虖師古曰迫迫天子也廉耻不行大臣無廼握重權大官而有徒隸亡耻之心虖夫望夷之事二世見當以重法者如淳曰決罪曰當閻樂殺二世于望夷宫本由秦制無忌上}
