  - {type: variant, offset: 6668, length: 0, content: '', WYG: 誼諸侯彭越黥布等師古曰蔪讀與芟同謂芟刈之擇良日立諸子雒陽上東門之外師古曰諸侯國皆在關東故于東門外立之也東靣最北出門曰上東門畢以為王而天下安師古曰畢猶盡宋祁曰注末當有也字故大人者不牽小行以成大功今淮南地逺者或數千里越兩諸侯師古曰越過也兩諸侯梁及淮陽而縣屬於漢師古曰為縣而屬漢劉奉世曰縣讀如懸其吏民繇役往來長安者自悉而補中道衣敝應劭曰自悉其家資財補縫作衣師古曰悉盡也宋祁曰新書云自悉以補行錢用諸費稱此師古曰稱音尺孕反其苦屬漢而欲得王至甚逋逃而歸諸侯者已不少矣其埶不}
