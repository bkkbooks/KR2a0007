  - {type: variant, offset: 6412, length: 0, content: '', WYG: 聖人厲此節行以御羣下則人皆懐徳戮力同心國家安固不可毁抜若金城也尋其下文義可曉矣彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安師古曰夫夫人也亦猶彼人耳夫音扶顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤應劭曰言念主忘身憂國忘家如此可託權柄不須復制禦也六尺之孤未能自立者也此厲廉耻行禮誼之所致也主上何喪焉師古曰如此則于主上無所失此之不為而顧彼之久行服䖍曰彼謂亡國也師古曰顧反也久謂久行之也言何不為投鼠忌器之法而反久行無陛級之事故曰可為長太息者此也師古曰誼上疏言可為長太息者六今此至三而止蓋史家直取其要切者耳故下贊云掇其切于世事者著于傳是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自甯成始初文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地}
  - {type: page-break, offset: 6412, content: '', id: KR2a0007_WYG_048-33a, image: WYG0250/WYG0250-0132a.png}
  - {type: variant, offset: 6412, length: 0, content: '', krp: 聖人厲此節行以御羣下則人皆懐徳戮力同心國家安固不可毁抜若金城也尋其下文義可曉矣彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安師古曰夫夫人也亦猶彼人耳夫音扶顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤應劭曰言念主忘身憂國忘家如此可託權柄不須復制禦也六尺之孤未能自立者也此厲廉耻行禮誼之所致也主上何喪焉師古曰如此則于主上無所失此之不為而顧彼之久行服䖍曰彼謂亡國也師古曰顧反也久謂久行之也言何不為投鼠忌器之法而反久行無陛級之事故曰可為長太息者此也師古曰誼上疏言可為長太息者六今此至三而止蓋史家直取其要切者耳故下贊云掇其切于世事者著于傳是時丞相絳侯周勃免就國人有告勃謀反逮繫長安獄治卒亡事復爵邑故賈誼以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑至武帝時稍復入獄自甯成始初文帝以代王入即位後分代為兩國立皇子武為代王參為太原王小子勝則梁王矣後又徙代王武為淮陽王而太原王參為代王盡得故地}
  - {type: variant, offset: 6413, length: 1, content: 君, WYG: 數年梁王勝死亡子誼復上疏曰陛下即不定制如今之埶不過一傳再傳服䖍曰一二傳世也諸侯猶且人恣而不制豪植而大強師古曰植立也漢法不得行矣陛下所以為蕃扞及皇太}
