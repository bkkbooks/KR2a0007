  - {type: variant, offset: 3245, length: 0, content: '', WYG: 廼孩提有識三公三少固明孝仁禮義以道習之師古曰孩小兒也提謂提撕之逐去邪人不使見惡行于是皆選天下之端士師古曰端正也直也孝悌博聞有道術者以衛翼之師古曰悌音徒繼反使與太子居處出入故太子廼生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長于齊不能不齊言也習與不正人居之不能毋不正猶生長于楚之地不能不楚言也故擇其所耆必先受業廼得嘗之師古曰耆讀曰嗜擇其所樂必先有習廼得為之}
