  - {type: variant, offset: 6257, length: 1, content: 訟, WYG: 可也退之可也賜之死可也滅之可也若夫束縛之係緤之師古曰緤謂以長繩係之也緤音先列反輸之司㓂編之徒官師古曰司寇主刑罰之官編次列也司寇小吏詈罵而榜笞之師古曰榜音彭殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦廼可以加此也蘇林曰知其有一旦之刑非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之師古曰行音户剛反移事智伯及趙滅智伯豫讓釁靣吞炭鄭氏曰釁漆面以易貌吞炭以變聲也師古曰釁熏也以毒藥熏之劉奉世曰釁謂以物塗之取以釁鼔}
