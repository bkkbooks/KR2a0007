  - {type: variant, offset: 3683, length: 146, content: 耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大虖太學太學者賢士之所關也教化之本原也今以一郡一國之眾對亡應書者是王道往往而絕也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民, WYG: 餽}
