  - {type: variant, offset: 1395, length: 815, content: 吾不能用頗牧也唐對曰臣聞上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧乃得盡其知能選車千三百乘彀騎萬三千匹百金之士十萬是以北逐單于破東胡滅澹林西抑彊秦南支韓魏當是時趙幾伯後會趙王遷立其母倡也用郭開讒而誅李牧令顏聚代之是以為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日壹殺牛以饗賓客軍吏舍人是以匈奴遠避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚眾夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝說是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士十年景帝立以唐為楚相武帝即位求賢良舉唐唐時年九十餘不能為官乃以子遂為郎遂字王孫亦奇士魏尚槐里人也汲黯字長孺濮陽人也其先有寵於古之衛君也至黯十世世為卿大夫以父任孝景時為太子洗馬以嚴見憚武帝即位黯為謁者東粵相攻上使黯往視之至吳而還報曰粵人相攻固其俗不足以辱天子使者河內失火燒千餘家上使黯往視之還報曰家人先火屋比延燒不足憂臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以振貧民請歸節伏矯制辠上賢而釋之遷為滎陽令黯恥為令稱疾歸田里上聞乃召為中大夫以數切諫不得久留內遷為東海太守黯學黃老言治官民好清靜擇丞史任之責大指而已不細苛黯多病臥閤內不出歲餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法為人性倨少禮面折不能容人之過合己者善待之不合者弗能忍見士亦以此不附焉然好游俠任氣節行修潔其諫犯主之顏色常慕傅伯爰盎之為人善灌夫鄭當時及宗正劉棄疾亦以數直諫不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未嘗拜揖之上方招文學儒者上曰吾欲云云黯對, WYG: ''}
