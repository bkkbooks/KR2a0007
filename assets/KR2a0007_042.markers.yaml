  - {type: variant, offset: 23, length: 0, content: '', WYG: 音式異反苛為客張晏曰為帳下賓客不掌管也從入闗破秦沛公立為漢王以苛為御史大夫昌為中尉漢三年楚圍漢王滎陽急漢王出去而使苛守滎陽城楚破滎陽城欲令苛將苛罵曰若趣降漢王不然今為虜矣師古曰若汝也趣讀曰促項羽怒亨苛漢王於是拜昌為御史大夫常從擊破項籍六年與蕭曹等俱封為汾陰侯苛子成以父死事封為高景侯昌為人强力敢直言自蕭曹等皆卑下之師古曰下音胡駕反昌嘗燕入奏事孟康曰以上宴時入奏事師古曰燕謂安閑之}
