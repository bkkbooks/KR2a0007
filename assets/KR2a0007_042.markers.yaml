  - {type: variant, offset: 926, length: 444, content: 中尉條侯周亞夫與梁相山都侯王恬啟見釋之持議平乃結為親友張廷尉繇此天下稱之文帝崩景帝立釋之恐稱疾欲免去懼大誅至欲見則未知何如用王生計卒見謝景帝不過也王生者善為黃老言處士嘗召居廷中公卿盡會立王生老人曰吾韤解顧謂釋之為我結韤釋之跪而結之既已人或讓王生獨柰何廷辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉廷尉方天下名臣吾故聊使結韤欲以重之諸公聞之賢王生而重釋之釋之事景帝歲餘為淮南相猶尚以前過也年老病卒其子摰字長公官至大夫免以不能取容當世故終身不仕馮唐祖父趙人也父徙代漢興徙安陵唐以孝著為郎中署長事文帝帝輦過問唐曰父老何自為郎家安在具以實言文帝曰吾居代時吾尚食監高祛數為我言趙將李齊之賢戰於鉅鹿下吾每飲食意未嘗不在鉅鹿也父老知之乎唐對曰齊尚不如廉頗李牧之為將也上曰何已唐曰臣大父在趙時為官帥將善李牧臣父故為代相善李齊知其為人也上既聞廉頗李牧為人良說乃拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂匈奴哉唐曰主臣陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐讓曰公眾辱我獨亡間處虖唐謝曰鄙人不知忌諱當是時匈奴新大, WYG: 嘉}
