  - {type: 'tls:seg', offset: 468, content: '', id: KR2a0007_tls_042-4a.12}
  - {type: variant, offset: 468, length: 0, content: '', WYG: 如意之畫師古曰畫謂畫䇿令周昌為相乃扺堯罪以廣阿侯任敖為御史大夫任敖沛人也少為獄吏高祖嘗避吏吏繫呂后遇之不謹任敖素善髙祖怒擊傷主呂后吏及高祖初起敖以客從為御史守豐二歲高祖立為漢王東擊項羽敖遷為上黨守陳豨反敖堅守封為廣阿侯食邑千八百户高后時為御史大夫三歲免孝文元年薨諡曰懿侯傳子至曾孫越人坐為太常廟酒酸不敬國除初任敖免平陽侯曹窋代敖為御史大夫師古曰窋音竹律反高后崩與大臣共誅諸呂後坐事免以淮南相張蒼為御史大夫蒼與絳侯等尊立孝文皇帝四年代灌嬰為丞相漢興二十餘年天下初定公卿皆軍吏蒼為計相時緒正律歴文穎曰緒尋也謂本其統緒而正之以高祖十月始至霸上故因秦時本十月為歲首不革師古曰革改也推五德之運以為漢當水德之時上黑如故吹律調樂入之音聲及以比定律令如淳曰比音比次之比謂五音清濁各有所比不相錯入以定十二律之法令於樂官使長行之或曰謂比方之比音必履反臣瓚曰謂以比故取類以定法律與條令也師古曰依如氏之説比音頻二反若百工天下作程品如淳曰若順也百工為噐物皆有尺寸斤兩斛斗輕重之宜使得其法此之謂順晉灼曰若豫及之辭師古曰言次律調音以定法令及百工程品皆取則也若晉説是也至於為丞相卒就之師古曰卒終也就成也故漢家言律歴者本張蒼蒼尤好書凡宋祁曰學官本尤作凡注不音陽夏公謂當從若從尤則師古當音好字作去聲浙本凡作尤無所不觀無所不通而尤邃律歴師古曰䆳深也音先遂反蒼德安國侯王陵師古曰以救其死刑故也及貴父事陵陵死後蒼為丞相洗沐常先朝陵夫人上食}
