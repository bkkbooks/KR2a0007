  - {type: variant, offset: 474, length: 1, content: 繇, WYG: 召公孫臣以為博士草立土德時歴制度張晏曰以秦水德漢土勝之晉灼曰草創始也更元年蒼由此自詘宋祁曰一作絀謝病稱老蒼任人為中候張晏曰所選舉保任也按中候官名師古曰蒼有所保舉而其人為中候之官大為姦利上以為讓師古曰用此事責蒼蒼遂病免孝景五年薨諡曰文侯傳國至孫類有罪國除初蒼父長不滿五尺蒼長八尺餘蒼子復長八尺及孫類長六尺餘蒼免相後口中無齒食乳女子為乳母師古曰言每就飲之妻妾以百數嘗孕者不復幸年百餘歲廼卒著書十八篇言陰陽律歴事申屠嘉梁人也以材官蹶張如淳曰材官之多力能脚踏彊弩張之故曰蹶張律有蹶張士師古曰今之弩以手張者曰擘張以足蹋者曰蹶張蹶音厥擘音布麥反從高帝擊項籍遷為隊率師古曰一隊之率也音所類反從擊黥布為都尉孝惠時為淮陽守孝文元年舉故以二千石從高祖者悉以為闗内侯食邑二十四人而嘉食邑五百户十六年遷為御史大夫張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國久念不可而高帝時大臣餘見無可者師古曰見謂見在之人乃以御史大夫嘉為丞相因故邑封為故安侯嘉為人廉直門不受私謁}
