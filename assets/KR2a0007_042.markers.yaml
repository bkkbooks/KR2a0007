  - {type: variant, offset: 15, length: 1, content: 堵, krp: 蒼當斬解衣伏質師古曰質鍖也身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬遂西入武闗至咸}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 沛公立為漢王入漢中還定三秦陳餘擊走常山王張耳耳歸漢漢以蒼為常山守從韓信擊趙蒼得陳餘趙地已平漢王以蒼為代相備邊㓂已而徙為趙相相趙王耳耳卒相其子敖復徙相代燕王臧荼反蒼以代相從攻荼有功封為北平侯食邑千二百户遷為計相文穎曰以能計故號曰計相師古曰専主計籍故號計相一月更以列侯為主計四歲張晏曰以列侯典校郡國簿書如淳曰以其所主因以為官號與計相同時所卒立非久施也師古曰去計相之名更號主計劉攽曰四嵗字本在黥布反上誤書在此宋祁曰浙本一月作三月是時蕭何為相國而蒼乃自秦時為柱下御史明習天下圖書計籍又善用算律歴故令蒼以列侯居相府領主郡國上計者黥布反漢立皇子長為淮南王而蒼相之十四年遷為御史大夫周昌者沛}
