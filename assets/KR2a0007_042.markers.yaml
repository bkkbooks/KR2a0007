  - {type: variant, offset: 9, length: 1, content: 釋, WYG: 蒼陽武人也好書律歴秦時為御史主柱下方書如淳曰方板也謂事在板上者也秦置柱下史蒼為御史主其事或曰主四方文書也師古曰下云蒼自秦時為柱下御史明習天下圖書計籍則主四方文書是也柱下居殿柱}
