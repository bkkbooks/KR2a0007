  - {type: variant, offset: 107, length: 3, content: 間事秦, WYG: 難也又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔師古曰以口吃故每重言期期劉攽曰期讀如荀子曰欲綦色之綦楚人謂極為綦宋祁曰學官本云臣口不能言然臣期期知其不可浙本然心知期期不可陛下欲廢太子臣期期不奉詔予据此則前之二吃作其後之二吃乃可為期耳若云臣期知其不可又了無意矣又顔注文元無每字上欣然而笑即罷呂后側耳於東箱聽師古曰正寢之東西室皆曰箱言似箱篋之形見昌為跪謝曰微君太子幾廢師古曰微無也幾音鉅依反是歲戚姬子如意為趙王年十歲高祖憂萬歲之後不全也趙堯為符璽御史趙人方與公孟康曰方與縣名公其號也師古曰音房豫謂御史大夫周昌曰君之史趙堯年雖少然奇士君必異之是且代君之位昌笑曰堯年少刀筆吏耳何至是乎居頃之堯侍高祖高祖獨心不樂悲歌羣臣不知上}
