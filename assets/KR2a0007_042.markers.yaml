  - {type: variant, offset: 470, length: 2, content: 得入, WYG: 敢歸家蒼為丞相十餘年魯人公孫臣上書陳終始五德傳師古曰傳謂傳次也音直戀反言漢土德時其符黄龍見當改正朔易服色事下蒼蒼以為非是罷之其後黃龍見成紀於是}
