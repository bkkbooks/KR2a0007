  - {type: variant, offset: 2937, length: 1244, content: 萬乘縣官亡錢從民貰馬民或匿馬馬不具上怒欲斬長安令黯曰長安令亡罪獨斬臣黯民乃肯出馬且匈奴畔其主而降漢徐以縣次傳之何至令天下騷動罷中國甘心夷狄之人乎上默然後渾邪王至賈人與市者坐當死五百餘人黯入請間見高門曰夫匈奴攻當路塞絕和親中國舉兵誅之死傷不可勝計而費以鉅萬百數臣愚以為陛下得胡人皆以為奴婢賜從軍死者家鹵獲因與之以謝天下塞百姓之心今縱不能渾邪帥數萬之眾來虛府庫賞賜發良民侍養若奉驕子愚民安知市買長安中而文吏繩以為闌出財物如邊關乎陛下縱不能得匈奴之贏以謝天下又以微文殺無知者五百餘人臣竊為陛下弗取也上弗許曰吾久不聞汲黯之言今又復妄發矣後數月黯坐小法會赦免官於是黯隱於田園者數年會更立五秼錢民多盜鑄錢者楚地尤甚上以為淮陽楚地之郊也召黯拜為淮陽太守黯伏謝不受印綬詔數強予然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下不意陛下復收之臣常有狗馬之心今病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重臥而治之黯既辭過大行李息曰黯棄逐居郡不得與朝廷議矣然御史大夫湯智足以距諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毀之主意所欲因而譽之好興事舞文法內懷詐以御主心外挾賊吏以為重公列九卿不早言之何公與之俱受其戮矣息畏湯終不敢言黯居郡如其故治淮陽政清後張湯敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽居淮陽十歲而卒卒後上以黯故官其弟仁至九卿子偃至諸侯相黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿以河南太守卒昆弟以安故同時至二千石十人濮陽段宏始事蓋侯信信任宏官亦再至九卿然衛人仕者皆嚴憚汲黯出其下鄭當時字莊陳人也其先鄭君嘗事項籍籍死而屬漢高祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時當時以任俠自喜脫張羽於阸聲聞梁楚間孝景時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日至明旦常恐不徧當時好黃老言其慕長者如恐不稱自見年少官薄然其知友皆大父行天下有名之士也武帝即位當時稍遷為魯中尉濟南太守江都相至九卿為右內史以武安魏其時議貶秩為詹事遷為大司農當時為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人性廉又不治產卬奉賜給諸公然其餽遺人不過具器食每朝候上間說未嘗不言天下長者其推轂士及官屬丞史誠有味其言也常引以為賢於己未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後山東諸公以此翕然稱鄭莊使視決河自請治行五日上曰吾聞鄭莊行千里不齎糧治行者何也然當時在朝常趨和承意不敢甚斥臧否漢征匈奴招四夷天下費多財用益屈當時為大司農任人賓客僦入多逋負司馬安為淮陽太守發其事當時以此陷罪贖為庶人頃之守長史遷汝南太守數歲以官卒昆弟以當時故至二千石者六七人當時始與汲黯列為九卿內行修兩人中廢賓客益落當時死家亡餘財先是下邽翟公為廷尉賓客亦填門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見贊曰張釋之之守法馮唐之論將汲黯之正直鄭當時之推士不如是亦何以成名哉揚子以為孝文親詘帝尊以信亞夫之軍曷為不能用頗牧彼將有激云爾, WYG: 考證}
