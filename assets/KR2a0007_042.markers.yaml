  - {type: variant, offset: 466, length: 1, content: 梁, WYG: 至孫意有罪國除景帝復封昌孫左車為安陽侯有罪國除初趙堯既代周昌為御史大夫高祖崩事惠帝終世高后元年怨堯前定趙}
