  - {type: variant, offset: 19, length: 0, content: '', WYG: 其從兄苛師古曰苛音何秦時皆為泗水卒史及高祖起沛擊破泗水守監於是苛昌自卒史從沛公宋祁曰越本自作以校改以作自沛公以昌為職志應劭曰掌主職也鄭氏曰主旗志也師古曰志}
