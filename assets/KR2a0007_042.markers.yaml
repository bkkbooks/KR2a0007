  - {type: variant, offset: 2429, length: 311, content: 如此張湯以更定律令為廷尉黯質責湯於上前曰公為正卿上不能襃先帝之功業下不能化天下之邪心安國富民使囹圄空虛何空取高皇帝約束紛更之為而公以此無種矣黯時與湯論議湯辯常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣是時漢方征匈奴招懷四夷黯務少事間常言與胡和親毋起兵上方鄉儒術尊公孫弘及事益多吏民巧上分別文法湯等數奏決讞以幸而黯常毀儒面觸弘等徒懷詐飾智以阿人主取容而刀筆之吏專深文巧詆陷人於罔以自為功上愈益貴弘湯弘湯心疾黯雖上亦不說也欲誅之以事弘為丞相乃言上曰右內史界部中多貴人宗室難治非素重臣弗能任請徙黯為右內史數歲官事不廢大將軍青既益尊姊為皇后然黯與亢禮或說黯曰自天子欲令群臣下大將軍大將軍尊貴誠重君, WYG: ''}
