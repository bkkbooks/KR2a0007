  - {type: variant, offset: 1979, length: 0, content: '', WYG: 如淳曰更有三品有卒更有踐更有過更古者正卒無常人皆當迭為之一月一更是謂卒更也貧者欲得顧更錢者次直者出錢顧之月二千是謂踐更也天下人皆直戍邊三日亦名為更律所謂繇戌也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可往便還因更住一嵗一更諸不行者出錢三百入官官以給戍者是謂過更也律説卒踐更者居也居更縣中五月乃更也後從尉律卒踐更一月休十一月也食貨志曰月為更卒已復為正一嵗屯戍一嵗力役三十倍於古此漢初因秦法而行之也後遂改易有讁乃戍邊一嵗耳逋未出更錢者也師古曰更音工衡反}
