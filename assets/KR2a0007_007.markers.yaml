  - {type: xml-element, offset: 2509, content: '', id: KR2a0007_tls_007-bkkxmlele154}
  - {type: variant, offset: 2509, length: 0, content: '', WYG: 前漢書卷七前漢書卷七考證昭帝紀發軍屯西河監本訛屯河西從宋本改上耕於鉤盾弄田注臣召南按百官表少府屬官有鉤盾令丞後書志鉤盾令一人本注宦者典諸近池苑囿逰觀之處則應劭說是夏陽男子張延年通鑑考異曰紀作張延年雋不疑傳作成方遂又云一姓張名延年封皇后父驃騎將軍上官安為桑樂侯臣召南按驃騎將軍此與霍光傳同而外戚傳及恩澤侯表公卿表俱作車騎將軍必有一誤罷儋耳眞番郡臣召南按儋耳郡罷并入珠厓至元帝時珠厓亦罷又按後書東夷傳此年罷臨屯眞番以并樂浪元菟則不惟罷眞番一郡也將三輔太常徒注胡三省曰此刑徒輸作三輔及太常者也三輔太常郡得以叔粟當賦注顧炎武曰漢時田租本是叔粟今并口筭雜征之用錢者皆令以叔粟當之其獨行于三輔太常郡者不獨為榖賤傷農亦以减漕三百萬石慮儲偫之乏也將北邊七郡郡二千騎擊之臣召南按匈奴傳明友為度遼將軍將二萬騎出遼東則此七郡應作十郡郡二千騎正合二萬之數發中二千石將五校作治注王禕曰五校謂中壘屯騎越騎射聲虎賁也秋罷象郡分屬鬱林牂牁臣召南按此文可疑秦置象郡後屬南越漢破南越即故象郡置日南郡以地理志証之此時無象郡名且日南郡固始終未罷也前漢書卷七考證}
