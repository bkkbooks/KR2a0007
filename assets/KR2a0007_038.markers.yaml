  - {type: 'tls:seg', offset: 48, content: '', id: KR2a0007_tls_038-1a.12}
  - {type: variant, offset: 50, length: 344, content: 恭敬問曰若何有對曰有母不幸失明家貧有姊能鼓瑟高祖曰若能從我乎曰願盡力於是高祖召其姊為美人以奮為中涓受書謁徙其家長安中戚里以姊為美人故也奮積功勞孝文時官至太中大夫無文學恭謹舉無與比東陽侯張相如為太子太傅免選可為傅者皆推奮為太子太傅及孝景即位以奮為九卿迫近憚之徙奮為諸侯相奮長子建次甲次乙次慶皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石人臣尊寵乃舉集其門凡號奮為萬石君孝景季年萬石君以上大夫祿歸老于家以歲時為朝臣過宮門闕必下車趨見路馬必軾焉子孫為小吏來歸謁萬石君必朝服見之不名子孫有過失不誚讓為便坐對案不食然後諸子相責因長老肉袒固謝罪改之乃許子孫勝冠者在側雖燕必冠申申如也僮僕訢訢如也唯謹上時賜食於家必稽首俯伏而食如在上前其執喪哀戚甚子孫遵教亦如之萬石君家以孝謹聞乎郡國雖齊魯諸儒質行皆, WYG: 鴆廼憂}
