  body:
  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_038-bkkpn1}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 八髙皇帝八男吕后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙隱王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建鄭氏曰諸姬姓也張晏曰非一之稱也師古曰諸姬總言在姬妾之列者耳其知姓位者史各具言之不知氏族及秩次者則云諸姬也而趙幽以下三王非必同母盖以皆不知其所生之姬姓故總言之文三王傳云諸姬生代孝王參梁懐王揖景}
  - {type: page-break, offset: 8, content: '', id: KR2a0007_WYG_038-1b, image: WYG0250/WYG0250-0001b.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 八髙皇帝八男吕后生孝惠帝曹夫人生齊悼惠王肥薄姬生孝文帝戚夫人生趙隱王如意趙姬生淮南厲王長諸姬生趙幽王友趙共王恢燕靈王建鄭氏曰諸姬姓也張晏曰非一之稱也師古曰諸姬總言在姬妾之列者耳其知姓位者史各具言之不知氏族及秩次者則云諸姬也而趙幽以下三王非必同母盖以皆不知其所生之姬姓故總言之文三王傳云諸姬生代孝王參梁懐王揖景}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 三王傳云屬諸姬子於栗姬此意皆同張云非一近得之矣春秋左氏傳曰諸子仲子戎子諸子鬻姒此其例也豈以諸為姓乎鄭説非矣共讀曰恭其下類此淮南厲王長自有傳齊悼惠王肥其母髙祖微時外婦也師古曰謂與旁通者髙祖}
  - {type: variant, offset: 9, length: 0, content: '', krp: 三王傳云屬諸姬子於栗姬此意皆同張云非一近得之矣春秋左氏傳曰諸子仲子戎子諸子鬻姒此其例也豈以諸為姓乎鄭説非矣共讀曰恭其下類此淮南厲王長自有傳齊悼惠王肥其母髙祖微時外婦也師古曰謂與旁通者髙祖}
