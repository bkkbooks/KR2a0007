  - {type: punctuation, offset: 404, content: ，, id: KR2a0007_tls_038-bkkpn97}
  - {type: 'tls:seg', offset: 404, content: '', id: KR2a0007_tls_038-4a.3}
  - {type: variant, offset: 404, length: 0, content: '', WYG: 有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟彊及齊悼惠王子朱虚侯章東牟侯興居有功皆可王於是取趙之河閒立辟彊是為河閒文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德内史王悍諫不聼遂燒殺德悍師古曰上云其相建德内史王悍下云燒殺德悍是為相姓建名德也而景武功臣侯表云遽侯横父建德以趙相死事子侯則是不知其姓表傳不同疑後人轉寫此傳誤脱去一建字也發兵住其西界欲待吳楚俱進北使匈奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗匈奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壊王遂自殺國除景帝憐趙相内史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死呂后徙恢王趙恢心不樂太后以呂產女為趙王后王后從官皆諸呂也内擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入匈奴明年立建為燕王十五年薨有美人子師古曰王之美人生子也太后使人殺之絶後齊悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王師古曰辟音壁又讀曰闢賢為葘川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩呂太后稱制元年以其兄子鄜侯呂台為呂王師古曰鄜音敷割齊之濟南郡為呂王奉邑師古曰奉音扶用反他皆類此明年哀王弟章入宿衞於漢髙后封為朱虚侯以呂禄女妻之後四年封章弟興居為東牟侯皆宿衞長安髙后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙王友幽死於邸三趙王既廢髙后立諸呂為三主擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田師古曰欲申諷喻也髙后兒子畜之師古曰比之於子也笑曰顧乃父知田耳師古曰顧念也乃汝也汝父謂髙帝也劉攽曰兒子畜之不以人臣待之也乃父直謂王肥耳下又云齊王自以皃子年少豈可以琅邪為父也若生而為王子安知田乎師古曰若亦汝也章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏師古曰穊稠也穊種者言多生子孫也疏立者四散置之令為藩輔也穊音冀非其種者鉏而去之師古曰以斥諸呂也太后黙然頃之諸呂有一人醉亡酒師古曰避酒而逃亡章追㧞劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸呂憚章雖大臣皆依朱虚侯劉氏為彊師古曰為音于偽反其明年髙后崩趙王呂禄為上將軍呂王產為相國皆居長安中聚兵以威大臣欲為亂章以呂禄女為婦知其謀乃使人隂出告其兄齊王欲令發兵西師古曰西詣京師朱虚侯東牟侯欲從中與大臣為内應以誅諸呂因立齊王為帝齊王聞此計與其舅駟鈞}
