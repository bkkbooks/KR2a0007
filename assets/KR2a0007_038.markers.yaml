  - {type: variant, offset: 423, length: 0, content: '', WYG: 入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宮甲大窮還報皇太后曰王已願尚娥師古曰尚配也然事有所害恐如燕王燕王者與其子昆弟姦坐死師古曰燕王定國傳云與其子女三人姦子昆弟者言是其子女又長㓜非一故云子昆弟也一曰子昆弟者定國之姊妹也言定國姦其子女及其姊妹宋祁曰浙本正}
