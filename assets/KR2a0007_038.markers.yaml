  - {type: variant, offset: 1479, length: 727, content: 謹力景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎綰曰臣代戲車士幸得功次遷待罪中郎將不知也上問曰吾為太子時召君君不肯來何也對曰死罪病上賜之劍綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之所施易獨至今乎綰曰具在上使取六劍劍常盛未嘗服也郎官有譴常蒙其罪不與它將爭有功常讓它將上以為廉忠實無它腸乃拜綰為河間王太傅吳楚反詔綰為將將河間兵擊吳楚有功拜為中尉三歲以軍功封綰為建陵侯明年上廢太子誅栗卿之屬上以綰為長者不忍乃賜綰告歸而使郅都治捕栗氏既已上立膠東王為太子召綰拜為太子太傅遷為御史大夫五歲代桃侯舍為丞相朝奏事如職所奏然自初宦以至相終無可言上以為敦厚可相少主尊寵之賞賜甚多為丞相三歲景帝崩武帝立建元中丞相以景帝病時諸官囚多坐不辜者而君不任職免之後薨諡曰哀侯子信嗣坐酎金國除直不疑南陽人也為郎事文帝其同舍有告歸誤持其同舍郎金去已而同舍郎覺亡意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慚以此稱為長者稍遷至中大夫朝廷見人或毀不疑曰不疑狀貌甚美然特毋柰其善盜嫂何也不疑聞曰我乃無兄然終不自明也吳楚反時不疑以二千石將擊之景帝後元年拜為御史大夫天子修吳楚時功封不疑為塞侯武帝即位與丞相綰俱以過免不疑學老子言其所臨為官如故唯恐人之知其為吏迹也不好立名稱為長者薨諡曰信侯傳子至孫彭祖坐酎金國除周仁其先任城人也以毉見景帝為太子時為舍人積功遷至太中大夫景帝初立拜仁為郎中令仁為人陰重不泄常衣弊補衣溺袴期為不潔清以是得幸入臥內於後宮祕戲仁常在旁終無所言上時問人仁曰上自察之然亦無所毀如此景帝再自幸其家家徙陽陵上所賜甚多然終常讓不敢受也諸侯群臣賂遺終無所受武帝立為先帝臣重之仁乃病免以二千石祿歸老子孫咸至大官張敺字叔高祖功臣安丘侯說少子也敺孝文時以治刑名侍太子然其人長者景帝時尊重常為九卿至, WYG: ''}
