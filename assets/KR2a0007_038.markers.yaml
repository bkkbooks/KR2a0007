  - {type: variant, offset: 735, length: 1, content: 慕, WYG: 絶悼惠王後唯有二國城陽葘川菑川地比齊師古曰比近也音頻二反武帝為悼惠王冢園在齊廼割臨菑東圜悼惠王冢園邑盡以予菑川師古曰圜謂周繞之令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣五鳳中青州刺史奏終古使所愛奴與八子及諸御婢姦如淳曰八子妾號終古或參與被席師古曰與讀曰預或白晝使臝伏犬馬交接師古曰臝者露形體也音郎果反終古親臨觀産子輒曰亂不可知使去}
