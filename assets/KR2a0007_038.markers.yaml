  - {type: variant, offset: 410, length: 0, content: '', krp: 禁衞王令不得發也召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為内史悉發國中兵使祝午紿琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自髙帝將也師古曰言自髙帝之時以為將也習戰事齊王不敢離兵服䖍曰不敢離其兵而到琅邪使臣請大王幸之臨葘見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然廼馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既欺不得反國乃説齊王曰齊悼惠王髙皇帝長子也推本言之大王髙皇帝適長孫也師古曰適讀曰嫡當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻呂國之濟南於是齊王遺諸侯王書曰髙帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩髙后用事春秋髙聼諸呂擅廢帝更立又殺三趙王滅梁趙燕以王諸呂分齊國為四師古曰本自齊國更分為濟南琅邪城陽凡為四也忠臣進諌上或亂不聼今髙后崩皇帝春秋富師古曰言年幼也比之於財方未匱竭故謂之富未能治天下固待大臣諸侯今諸呂又擅自尊官聚兵嚴威劫列侯忠臣撟制以令天下師古曰撟託也託天子之制詔也撟音矯宗廟以危寡人帥兵入誅不當為王者漢聞之相國呂產等遣大將軍潁隂侯灌嬰將兵擊之嬰至滎陽乃謀曰諸呂舉兵關中欲危劉氏而自立今我破齊還報是益呂氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和師古曰諭謂曉告也以待呂氏之變而共誅之齊王聞之乃屯兵西界待約呂禄呂產欲作亂朱虚侯章與太尉勃丞相平等誅之章首先斬呂產太尉勃等乃盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也張晏曰言鈞惡戾如虎著冠訪以呂氏故幾亂天下如淳曰訪猶方也師古曰幾音鉅依反劉攽曰此訪與公羊訪於此義同今又立齊王是欲復為呂氏也代王母家薄氏君子長者且代王髙帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅呂氏事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王反既誅呂氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人後救火乎師古曰言以社稷將危故舉兵以臣之不暇待有詔命也宋祁曰注}
  - {type: variant, offset: 411, length: 2, content: 學獲, WYG: 以臣之或作以匡之因退立股戰而栗師古曰股脚也戰者懼之甚也恐不能言者終無他語灌將軍孰視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷勃師古曰放令去勃父以善鼓琴見秦皇帝及勃少時欲求見齊相曹參家貧無以自通乃常獨早埽齊相舍人門外舍人怪之以為物而司之得勃師古曰物謂鬼神司者察視之勃曰願見相君無因故為子埽欲以求見於是舍人見勃曹參因以為舍人壹為參御言事以為賢言之悼惠王王召見拜為内史始悼惠王得自置二千石及悼惠王薨哀王嗣勃用事重於相齊王既罷兵歸而代王立是為孝文帝文帝元年盡以髙后時所割齊之城陽琅邪濟南郡復予齊而徙琅邪王王燕益封朱虚侯東牟侯各二千戸黄金千斤是歲齊哀王薨子文王則嗣十四年薨無子國除城陽景王章孝文二年以朱虚侯與東牟侯興居俱立二年薨子共王喜嗣孝文十二年徙王淮南五年復還王城陽凡立三十三年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十一年薨宋祁曰越本作十年子荒王順嗣四十六年薨宋祁曰越本作三十六年子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絶成帝復立雲兄俚為城陽王師古曰俚音里王莽時絶濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公俱入清宮師古曰滕公夏侯嬰也遂將少帝出迎皇帝入宮始誅諸呂時朱虚侯章功尤大大臣許盡以趙地王章盡以梁地王興居及文帝立聞朱虚東牟之初欲立齊王故黜其功師古曰不賞之二年王諸子乃割齊二郡以王章興居章興居意自以失職奪功歲餘章薨而匈奴大入邊漢多發兵丞相灌嬰將擊之文帝親幸太原興居以為天子自擊胡遂發兵反上聞之罷兵歸長安使棘蒲侯柴將軍張晏曰柴武擊破虜濟北王王自殺國除文帝憫濟北王逆亂以自滅明年盡封悼惠王諸子罷軍等七人為列侯師古曰罷音皮彼反又讀曰疲至十五年齊文王又薨無子時悼惠王後尚有城陽王在文帝憐悼惠王適嗣之絶師古曰適讀曰嫡宋祁曰越本絶字下有世字於是乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王齊孝王將閭以楊虚侯立濟北王志以安都侯立葘川王賢以武成侯立膠東王雄渠以白石侯立膠西王卬以平昌侯立濟南王辟光以扐侯立服䖍曰扐音勒扐平原縣也孝文十六年六王同日俱立立十一年孝景三年吳楚反膠東膠西葘川濟南王皆發兵應吳楚欲與齊師古曰與之同反齊孝王狐疑城守不聼三國兵共圍齊張晏曰膠西葘川濟南也劉奉世曰吳王濞傳前云膠西膠東與葘川濟南共圍臨葘後云膠西膠東菑川三國各引兵歸則此三國無濟南王也然初言四國共圍齊又言三國疑必有誤齊王使路中大夫告於天子張晏曰姓路為中大夫天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨葘數重無從入三國將與路中大夫盟曰若反言漢已破矣師古曰若汝也反謂反易其辭也齊趣下三國不且見屠師古曰趣讀曰促路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急隂與三國通謀約未定會路中大夫從漢來其大臣乃復勸王無下三國會漢將欒布平陽侯等兵至齊師古曰平陽侯曹襄擊破三國兵解圍已後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺而膠東膠西濟南葘川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善師古曰言其初首無逆亂之心以迫劫有謀非其}
