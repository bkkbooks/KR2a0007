  - {type: variant, offset: 419, length: 0, content: '', WYG: 取其弟紀氏女為王后王不愛紀太后欲其家重寵師古曰重音直用反令其長女紀翁主入王宮師古曰諸王女曰翁主而紀氏所生故謂之紀翁主正其後宮無令得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲師古曰宦者奄人入事漢皇太后張晏曰皇太后武帝之母皇太后有愛女曰脩成君脩成君非劉氏子蘇林曰皇太后前嫁金氏所生太后憐之脩成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后大喜使甲之齊時主父偃知甲之使齊}
