  - {type: variant, offset: 925, length: 460, content: 能服反受其過贖罪元封四年關東流民二百萬口無名數者四十萬公卿議欲請徙流民於邊以適之上以為慶老謹不能與其議乃賜丞相告歸而案御史大夫以下議為請者慶慚不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廩空虛民多流亡罪當伏斧質上不忍致法願歸丞相侯印乞骸骨歸避賢者路上報曰間者河水滔陸泛濫十餘郡隄防勤勞弗能陻塞朕甚憂之是故巡方州禮嵩嶽通八神以合宣房濟淮江歷山濱海問百年民所疾苦惟吏多私徵求無已去者便居者擾故為流民法以禁重賦乃者封泰山皇天嘉況神物並見朕方答氣應未能承意是以切比閭里知吏姦邪委任有司然則官曠民愁盜賊公行往年覲明堂赦殊死無禁錮咸自新與更始今流民愈多計文不改君不繩責長吏而請以興徙四十萬口搖蕩百姓孤兒幼年未滿十歲無罪而坐率朕失望焉今君上書言倉庫城郭不充實民多貧盜賊眾請入粟為庶人夫懷知民貧而請益賦動危之而辭位欲安歸難乎君其反室慶素質見詔報反室自以為得許欲上印綬掾史以為見責甚深而終以反室者醜惡之辭也或勸慶宜引決慶甚懼不知所出遂復起視事慶為丞相文深審謹無他大略後三歲餘薨諡曰恬侯中子德慶愛之上以德嗣後為太常坐法免國除慶方為丞相時諸子, WYG: 謂呼}
