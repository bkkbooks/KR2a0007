  - {type: variant, offset: 10, length: 2, content: 萬石, WYG: 年立食七十餘城諸民能齊言者皆與齊孟康曰此時流移故使齊言者還齊也師古曰欲其國大故多封之孝惠二年入朝帝與齊王燕飲太后前置齊王上坐如家人禮師古曰以兄弟齒列不從}
