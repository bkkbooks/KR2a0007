  - {type: variant, offset: 400, length: 1, content: 建, krp: 言死於長安不得更至齊國也脱音吐活反内史士曰師古曰内史王官士者其名也太后獨有帝與魯}
  - {type: variant, offset: 402, length: 0, content: '', WYG: 公主今王有七十餘城而公主廼食數城王誠以一郡上太后為公主湯沐邑太后必喜王無患矣於是齊王獻城陽郡以尊公主為王太后師古曰為齊王太后也言以母禮事之所以自媚也解具在惠紀呂太后喜而許之廼置酒齊邸樂飲遣王歸國後十三年薨子襄嗣趙隱王如意九年立師古曰髙祖之九年也他皆類此四年髙祖崩師古曰趙王之四年呂太后徵王到長安鴆殺之無子絶趙幽王友十一年立為淮陽王趙隱王如意死孝惠元年徙友王趙凡立十四年宋祁曰四字校添友以諸呂女為后不愛愛它姬諸呂女怒去讒之於太后曰王曰呂氏安得王師古曰安猶焉也太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衞圍守之不得食其羣臣或竊饋之輒捕論之趙王餓乃歌曰諸呂用事兮劉氏微廹脅王侯兮彊授我妃我妃既妒兮誣我以惡師古曰惡音一故反讒女亂國兮上曾不寤我無忠臣兮何故師古曰謂不能明白之也棄國自快中野兮蒼天與直師古曰天色蒼蒼故曰蒼天言己之理直冀天臨監之劉攽曰棄國當屬上句宋祁曰浙本無自字于嗟不可悔兮寧早自賊師古曰賊害也悔不早棄趙國而快意自殺於田野之中今乃被幽餓也為王餓死兮誰者憐之呂氏絶理兮託天報仇宋祁曰仇音渠尤反讎也遂幽死以民禮葬之長安髙后崩孝文即位立幽王子遂為趙王}
