  - {type: variant, offset: 529, length: 201, content: 親而禮之萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家萬石君元朔五年卒建哭泣哀思杖乃能行歲餘建亦死諸子孫咸孝然建最甚甚於萬石君建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣其為謹慎雖他皆如是慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此出, WYG: 武帝拜偃}
