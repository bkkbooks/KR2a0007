  - {type: variant, offset: 404, length: 0, content: '', krp: 有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟彊及齊悼惠王子朱虚侯章東牟侯興居有功皆可王於是取趙之河閒立辟彊是為河閒文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德内史王悍諫不聼遂燒殺德悍師古曰上云其相建德内史王悍下云燒殺德悍是為相姓建名德也而景武功臣侯表云遽侯横父建德以趙相死事子侯則是不知其姓表傳不同疑後人轉寫此傳誤脱去一建字也發兵住其西界欲待吳楚俱進北使匈奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗匈奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壊王遂自殺國除景帝憐趙相内史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死呂后徙恢王趙恢心不樂太后以呂產女為趙王后王后從官皆諸呂也内擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入匈奴明年立建為燕王十五年薨有美人子師古曰王之美人生子也太后使人殺之絶後齊悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王師古曰辟音壁又讀曰闢賢為葘川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩呂太后稱制元年以其兄子鄜侯呂台為呂王師古曰鄜音敷割齊之濟南郡為呂王奉邑師古曰奉音扶用反他皆類此明年哀王弟章入宿衞於漢髙后封為朱虚侯以呂禄女妻之後四年封章弟興居為東牟侯皆宿衞長安髙后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙王友幽死於邸三趙王既廢髙后立諸呂為三主擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田師古曰欲申諷喻也髙后兒子畜之師古曰比之於子也笑曰顧乃父知田耳師古曰顧念也乃汝也汝父謂髙帝也劉攽曰兒子畜之不以人臣待之也乃父直謂王肥耳下又云齊王自以皃子年少豈可以琅邪為父也若生而為王子安知田乎師古曰若亦汝也章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏師古曰穊稠也穊種者言多生子孫也疏立者四散置之令為藩輔也穊音冀非其種者鉏而去之師古曰以斥諸呂也太后黙然頃之諸呂有一人醉亡酒師古曰避酒而逃亡章追㧞劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸呂憚章雖大臣皆依朱虚侯劉氏為彊師古曰為音于偽反其明年髙后崩趙王呂禄為上將軍呂王產為相國皆居長安中聚兵以威大臣欲為亂章以呂禄女為婦知其謀乃使人隂出告其兄齊王欲令發兵西師古曰西詣京師朱虚侯東牟侯欲從中與大臣為内應以誅諸呂因立齊王為帝齊王聞此計與其舅駟鈞}
  - {type: variant, offset: 407, length: 0, content: '', WYG: 祝午中尉魏勃隂謀發兵齊相召平聞之師古曰召讀曰邵乃發兵入衞}
  - {type: variant, offset: 407, length: 0, content: '', krp: 祝午中尉魏勃隂謀發兵齊相召平聞之師古曰召讀曰邵乃發兵入衞}
  - {type: variant, offset: 408, length: 1, content: 臧, WYG: 宮魏勃紿平曰師古曰紿誑也王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衞衞王師古曰謂將兵及衞守之具}
  - {type: variant, offset: 408, length: 1, content: 臧, krp: 宮魏勃紿平曰師古曰紿誑也王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衞衞王師古曰謂將兵及衞守之具}
  - {type: variant, offset: 410, length: 0, content: '', WYG: 禁衞王令不得發也召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為内史悉發國中兵使祝午紿琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自髙帝將也師古曰言自髙帝之時以為將也習戰事齊王不敢離兵服䖍曰不敢離其兵而到琅邪使臣請大王幸之臨葘見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然廼馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既欺不得反國乃説齊王曰齊悼惠王髙皇帝長子也推本言之大王髙皇帝適長孫也師古曰適讀曰嫡當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻呂國之濟南於是齊王遺諸侯王書曰髙帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩髙后用事春秋髙聼諸呂擅廢帝更立又殺三趙王滅梁趙燕以王諸呂分齊國為四師古曰本自齊國更分為濟南琅邪城陽凡為四也忠臣進諌上或亂不聼今髙后崩皇帝春秋富師古曰言年幼也比之於財方未匱竭故謂之富未能治天下固待大臣諸侯今諸呂又擅自尊官聚兵嚴威劫列侯忠臣撟制以令天下師古曰撟託也託天子之制詔也撟音矯宗廟以危寡人帥兵入誅不當為王者漢聞之相國呂產等遣大將軍潁隂侯灌嬰將兵擊之嬰至滎陽乃謀曰諸呂舉兵關中欲危劉氏而自立今我破齊還報是益呂氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和師古曰諭謂曉告也以待呂氏之變而共誅之齊王聞之乃屯兵西界待約呂禄呂產欲作亂朱虚侯章與太尉勃丞相平等誅之章首先斬呂產太尉勃等乃盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也張晏曰言鈞惡戾如虎著冠訪以呂氏故幾亂天下如淳曰訪猶方也師古曰幾音鉅依反劉攽曰此訪與公羊訪於此義同今又立齊王是欲復為呂氏也代王母家薄氏君子長者且代王髙帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅呂氏事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王反既誅呂氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人後救火乎師古曰言以社稷將危故舉兵以臣之不暇待有詔命也宋祁曰注}
