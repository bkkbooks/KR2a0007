  - {type: variant, offset: 733, length: 0, content: '', WYG: 且正其事偃至齊急治王後宮宦者為王通於姊翁主所者辭及王王年少懼以罪宋祁曰越本以作大為吏所執誅乃飲藥自殺是時趙王懼主父偃壹出敗齊恐其漸疏骨肉乃上書言偃受金及輕重之短師古曰輕重謂用心不平天子亦因囚偃公孫𢎞曰齊王以憂死無後非誅偃無以塞天下之望師古曰塞滿也偃遂坐誅厲王立五年國除濟北王志吳楚反時初亦與通謀後堅守不發兵故得不誅徙王菑川元朔中}
