  - {type: variant, offset: 6358, length: 1, content: 京, WYG: 漢也言親昆弟者謂有服屬者也朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問脩治先人冡前日聞王發兵於邊為寇災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎}
