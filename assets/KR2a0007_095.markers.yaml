  - {type: variant, offset: 6435, length: 2, content: 崇祖, WYG: 為帝自帝其國非敢有害於天下也髙皇后聞之大怒削去南粤之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑溼蠻夷中西有西甌其衆半羸師古}
  - {type: variant, offset: 6435, length: 2, content: 崇祖, krp: 為帝自帝其國非敢有害於天下也髙皇后聞之大怒削去南粤之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑溼蠻夷中西有西甌其衆半羸師古}
  - {type: variant, offset: 6438, length: 2, content: 汝昌, WYG: 羸謂劣弱也南面稱王東有閩粤其衆數千人亦稱王西北有長沙其半蠻夷亦稱王師古曰言長沙之國半雜蠻夷之人老夫故敢妄竊帝號聊以自娛老夫身定百邑之地東西南北數千萬里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粤四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色耳不聽鐘皷之音者以不得事漢也今陛下幸}
