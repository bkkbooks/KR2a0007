  - {type: variant, offset: 2255, length: 201, content: 立許后為左皇后廢后因孊私賂遺長數通書記相報謝長書有誖謾發覺天子使廷尉孔光持節賜廢后藥自殺葬延陵交道廄西孝成班倢伃帝初即位選入後宮始為少使蛾而大幸為倢伃居增成舍再就館有男數月失之成帝遊於後庭嘗欲與倢伃同輦載倢伃辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢伃倢伃誦詩及窈窕德象女師之篇每進見上疏依則古禮自鴻嘉後上稍隆於內寵倢伃進侍者李平平得幸, WYG: 以}
