  - {type: variant, offset: 6357, length: 0, content: '', WYG: 之靈功臣之力誅之已畢朕以王侯吏不釋之故孟康曰辭讓帝位不見置也不得不立今即位乃者聞王遺將軍􅂭慮侯書求親昆弟請罷長沙兩將軍師古曰佗之昆弟在故鄉者求訪之而兩將軍將兵擊越者請罷之以賔附}
