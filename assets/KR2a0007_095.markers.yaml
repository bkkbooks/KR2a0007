  - {type: variant, offset: 185, length: 5, content: 與嘉並杜欽, WYG: 王鳳曰大中大夫匡使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者選耎復守和解師古曰選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變廼以聞如此則復曠一時師古曰曠空也一時三月也言空廢一時不早發兵也王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉師古曰言起狂悖之心而殺守尉也逺臧温暑毒草之地雖有孫吳將賁育士師古曰孫孫武也吳吴􅁸也賁孟賁也育夏育也若入水火往必焦沒知勇亡所施屯田守之費不可勝量宜因其罪惡未成未疑漢家加誅隂􅃯旁郡守尉練士馬師古曰練簡也大司農豫調榖積要害處師古曰調發也要害者在我為要於敵為害也調音徒釣反選任職太守往以秋涼時入誅其王侯尤不軌者即}
