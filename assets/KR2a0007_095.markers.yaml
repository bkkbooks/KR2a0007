  - {type: variant, offset: 8313, length: 825, content: 當得至京師乃更立宗室桃鄉侯子成都為中山王奉孝王後遣少傅左將軍甄豐賜衛姬璽綬即拜為中山孝王后以苦陘縣為湯沐邑又賜帝舅衛寶寶弟玄爵關內侯賜帝三妺謁臣號修義君哉皮為承禮君鬲子為尊德君食邑各二千戶莽長子宇非莽隔絕衛氏恐久後受禍即私與衛寶通書記教衛后上書謝恩因陳丁傅舊惡幾得至京師莽白太皇太后詔有司曰中山孝王后深分明為人後之義條陳故定陶傅太后丁姬誖天逆理上僭位號徙定陶王於信都為共王立廟於京師如天子制不畏天命侮聖人言壞亂法度居非其制稱非其號是以皇天震怒火燒其殿六年之間大命不遂禍殃仍重竟令孝哀帝受其餘災大失天心夭命暴崩又令共王祭祀絕廢精魂無所依歸朕惟孝王后深說經義明鏡聖法懼古人之禍敗近事之咎殃畏天命奉聖言是乃久保一國長獲天祿而令孝王永享無疆之祀福祥之大者也朕甚嘉之夫襃義賞善聖王之制其以中山故安戶七千益中山后湯沐邑加賜及中山王黃金各百斤增傅相以下秩衛后日夜啼泣思見帝而但益戶邑宇復教令上書求至京師會事發覺莽殺宇盡誅衛氏支屬衛寶女為中山王后免后徙合浦唯衛后在王莽篡國廢為家人後歲餘卒葬孝王旁孝平王皇后安漢公太傅大司馬莽女也平帝即位年九歲成帝母太皇太后稱制而莽秉政莽欲依霍光故事以女配帝太后意不欲也莽設變詐令女必入因以自重事在莽傳太后不得已而許之遣長樂少府夏侯藩宗正劉宏少府宗伯鳳尚書令平晏納采太師光大司徙馬宮大司空甄豐左將軍孫建執金吾尹賞行太常事太中大夫劉歆及太卜太史令以下四十九人賜皮弁素績以禮雜卜筮太牢祠宗廟待吉月日明年春遣大司徒宮大司空豐左將軍建右將軍甄邯光祿大夫歆奉乘輿法駕迎皇后於安漢公第宮豐歆授皇后璽紱登車稱警蹕便時上林延壽門入未央宮前殿群臣就位行禮大赦天下益封父安漢公地滿百里賜迎皇后及行禮者自三公以下至騶宰執事長樂未央宮安漢公第者皆增秩賜金帛各有差皇后立三月以禮見高廟尊父安漢公號曰宰衡位在諸侯王上賜公夫人號曰功顯君食邑封公子安為襃新侯臨為賞都侯后立歲餘平帝崩莽立孝宣帝玄孫嬰為孺子莽攝帝位尊皇后為皇太后三年莽即真以嬰為定安公改皇太后號為定安公, WYG: 附}
  - {type: variant, offset: 8313, length: 825, content: 當得至京師乃更立宗室桃鄉侯子成都為中山王奉孝王後遣少傅左將軍甄豐賜衛姬璽綬即拜為中山孝王后以苦陘縣為湯沐邑又賜帝舅衛寶寶弟玄爵關內侯賜帝三妺謁臣號修義君哉皮為承禮君鬲子為尊德君食邑各二千戶莽長子宇非莽隔絕衛氏恐久後受禍即私與衛寶通書記教衛后上書謝恩因陳丁傅舊惡幾得至京師莽白太皇太后詔有司曰中山孝王后深分明為人後之義條陳故定陶傅太后丁姬誖天逆理上僭位號徙定陶王於信都為共王立廟於京師如天子制不畏天命侮聖人言壞亂法度居非其制稱非其號是以皇天震怒火燒其殿六年之間大命不遂禍殃仍重竟令孝哀帝受其餘災大失天心夭命暴崩又令共王祭祀絕廢精魂無所依歸朕惟孝王后深說經義明鏡聖法懼古人之禍敗近事之咎殃畏天命奉聖言是乃久保一國長獲天祿而令孝王永享無疆之祀福祥之大者也朕甚嘉之夫襃義賞善聖王之制其以中山故安戶七千益中山后湯沐邑加賜及中山王黃金各百斤增傅相以下秩衛后日夜啼泣思見帝而但益戶邑宇復教令上書求至京師會事發覺莽殺宇盡誅衛氏支屬衛寶女為中山王后免后徙合浦唯衛后在王莽篡國廢為家人後歲餘卒葬孝王旁孝平王皇后安漢公太傅大司馬莽女也平帝即位年九歲成帝母太皇太后稱制而莽秉政莽欲依霍光故事以女配帝太后意不欲也莽設變詐令女必入因以自重事在莽傳太后不得已而許之遣長樂少府夏侯藩宗正劉宏少府宗伯鳳尚書令平晏納采太師光大司徙馬宮大司空甄豐左將軍孫建執金吾尹賞行太常事太中大夫劉歆及太卜太史令以下四十九人賜皮弁素績以禮雜卜筮太牢祠宗廟待吉月日明年春遣大司徒宮大司空豐左將軍建右將軍甄邯光祿大夫歆奉乘輿法駕迎皇后於安漢公第宮豐歆授皇后璽紱登車稱警蹕便時上林延壽門入未央宮前殿群臣就位行禮大赦天下益封父安漢公地滿百里賜迎皇后及行禮者自三公以下至騶宰執事長樂未央宮安漢公第者皆增秩賜金帛各有差皇后立三月以禮見高廟尊父安漢公號曰宰衡位在諸侯王上賜公夫人號曰功顯君食邑封公子安為襃新侯臨為賞都侯后立歲餘平帝崩莽立孝宣帝玄孫嬰為孺子莽攝帝位尊皇后為皇太后三年莽即真以嬰為定安公改皇太后號為定安公, krp: 附}
