  - {type: variant, offset: 2630, length: 3715, content: 后長信宮上許焉倢伃退處東宮作賦目傷悼其辭曰承祖考之遺德兮何性命之淑靈登薄軀於宮闕兮充下陳於後庭蒙聖皇之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵於增成既過幸於非位兮竊庶幾乎嘉時每寤寐而絫息兮申佩離以自思陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮哀襃閻之為郵美皇英之女虞兮榮任姒之母周雖愚陋其靡及兮敢舍心而忘茲歷年歲而悼懼兮閔蕃華之不滋痛陽祿與柘館兮仍繈褓而離災豈妾人之殃咎兮將天命之不可求白日忽已移光兮遂晻莫而昧幽猶被覆載之厚德兮不廢捐於罪郵奉共養于東宮兮託長信之末流共洒埽於帷幄兮永終死以為期願歸骨於山足兮依松柏之餘休重曰潛玄宮兮幽以清應門閉兮禁闥扃華殿塵兮玉階菭中庭萋兮綠草生廣室陰兮帷幄暗房櫳虛兮風泠泠感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮密靚處君不御兮誰為榮俯視兮丹墀思君兮履綦仰視兮雲屋雙涕兮橫流顧左右兮和顏酌羽觴兮銷憂惟人生兮一世忽一過兮若浮已獨享兮高明處生民兮極休勉虞精兮極樂與福祿兮無期綠衣兮白華自古兮有之至成帝崩倢伃充奉園陵薨因葬園中孝成趙皇后本長安宮人初生時父母不舉三日不死乃收養之及壯屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而說之召入宮大幸有女弟復召入俱為倢伃貴傾後宮許后之廢也上欲立趙倢伃皇太后嫌其所出微甚難之太后姊子淳于長為侍中數往來傳語得太后指上立封趙倢伃父臨為成陽侯後月餘乃立倢伃為皇后追以長前白罷昌陵功封為定陵侯皇后既立後寵少衰而弟絕幸為昭儀居昭陽舍其中庭彤朱而殿上髤漆切皆銅沓黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未嘗有焉姊弟顓寵十餘年卒皆無子末年定陶王來朝王祖母傅太后私賂遺趙皇后昭儀定陶王竟為太子明年春成帝崩帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊昏夜平善鄉晨傅絝韤欲起因失衣不能言畫漏上十刻而崩民間歸罪趙昭儀皇太后詔大司馬莽丞相大司空曰皇帝暴崩群眾讙譁怪之掖庭令輔等在後庭左右侍燕迫近雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺哀帝既立尊趙皇后為皇太后封太后弟侍中駙馬都尉欽為新成侯趙氏侯者凡二人後數月司隸解光奏言臣聞許美人及故中宮史曹宮皆御幸孝成皇帝產子子隱不見臣遣從事掾業史望驗問知狀者掖庭獄丞籍武故中黃門王舜吳恭靳嚴官婢曹曉道房張棄故趙昭儀御者于客子王偏臧兼等皆曰宮即曉子女前屬中宮為學事史通詩授皇后房與宮對食元延元年中宮語房曰陛下幸宮後數月曉入殿中見宮腹大問宮宮曰御幸有身其十月中宮乳掖庭牛官令舍有婢六人中黃門田客持詔記盛綠綈方底封御史中丞印予武曰取牛官令舍婦人新產兒婢六人盡置暴室獄毋問兒男女誰兒也武迎置獄宮曰善臧我兒胞丞知是何等兒也後三日客持詔記與武問兒死未手書對牘背武即書對兒見在未死有頃客出曰上與昭儀大怒奈何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復持詔記予武曰今夜漏上五刻持兒與舜會東交掖門武因問客陛下得武書意何如曰瞠也武以兒付舜舜受詔內兒殿中為擇乳母告善養兒且有賞毋令漏泄舜擇棄為乳母時兒生八九日後三日客復持詔記封如前予武中有封小綠篋記曰告武以篋中物書予獄中婦人武自臨飲之武發篋中有裹藥二枚赫蹏書曰告偉能努力飲此藥不可復入女自知之偉能即宮宮讀書已曰果也欲姊弟擅天下我兒男也頟上有壯髮類孝元皇帝今兒安在危殺之矣奈何令長信得聞之宮飲藥死後宮婢六人召入出語武曰昭儀言女無過寧自殺邪若外家也我曹言願自殺即自繆死武皆表奏狀棄所養兒十一日宮長李南以詔書取兒去不知所置許美人前在上林涿沐館數召入飾室中若舍一歲再三召留數月或半歲御幸元延二年褱子其十一月乳詔使嚴持乳毉及五種和藥丸三送美人所後客子偏兼聞昭儀謂成帝曰常紿我言從中宮來即從中宮來許美人兒何從生中許氏竟當復立邪懟以手自擣以頭擊壁戶柱從床上自投地啼泣不肯食曰今當安置我欲歸耳帝曰今故告之反怒為殊不可曉也帝亦不食昭儀曰陛下自知是不食為何陛下常自言約不負女今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使嚴持綠囊書予許美人告嚴曰美人當有以予女受來置飾室中簾南美人以葦篋一合盛所生兒緘封及綠囊報書予嚴嚴持篋書置飾室簾南去帝與昭儀坐使客子解篋緘未已帝使客子偏兼皆出自閉戶獨與昭儀在須臾開戶嘑客子偏兼使緘封篋及綠綈方底推置屏風東恭受詔持篋方底予武皆封以御史中丞印曰告武篋中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中故長定許貴人及故成都平阿侯家婢王業任孋公孫習前免為庶人詔召人屬昭儀為私婢成帝崩未幸梓宮倉卒悲哀之時昭儀自知罪惡大知業等故許氏王氏婢恐事泄而以大婢羊子等賜予業等各且十人以慰其意屬無道我家過失元延二年五月故掖庭令吾丘遵謂武曰掖庭丞吏以下皆與昭儀合通無可與語者獨欲與武有所言我無子武有子是家輕族人得無不敢乎掖庭中御幸生子者輒死又飲藥傷墯者無數欲與武共言之大臣票騎將軍貪耆錢不足計事奈何令長信得聞之遵後病困謂武今我已死前所語事武不能獨為也慎語皆在今年四月丙辰赦令前臣謹案永光三年男子忠等發長陵傅夫人冢事更大赦孝元皇帝下詔曰此朕不當所得赦也窮治盡伏辜天下以為當魯嚴公夫人殺世子齊桓召而誅焉春秋予之趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅前平安剛侯夫人謁坐大逆同產當坐以蒙赦令歸故郡今昭儀所犯尤誖逆罪重於謁而同產親屬怕在尊貴之位迫近幃幄群下寒心非所以懲惡崇誼示四方也請事窮竟丞相以下議正法哀帝於是免新成侯趙欽欽兄子成陽侯訢皆為庶人將家屬徙遼西郡時議郎耿育上疏言臣聞繼嗣失統廢適立庶聖人法禁古今至戒然大伯見歷知適逡循固讓委身吳粵權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道德最備是以尊號追及大王故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歲之後未能持國權柄之重制於女主女主驕盛則耆欲無極少主幼弱則大臣不使世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之德仁孝子愛之恩懷獨見之明內斷於身故廢後宮就館之漸絕微嗣禍亂之根乃欲致位陛下以安宗廟愚臣既不能深援安危定金匱之計又不知推演聖德述先帝之志乃反覆校省內暴露私燕誣汙先帝傾惑之過成結寵妾妒媚之誅甚失賢聖遠見之明逆負先帝憂國之意夫論大德不拘俗立大功不合眾此乃孝成皇帝至思所以萬萬於眾臣陛下聖德盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且襃廣將順君父之美匡捄銷滅既往之過古今通義也事不當時固爭防禍於未然各隨指阿從以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世遠聞百蠻近布海內甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察哀帝為太子亦頗得趙太后力遂不竟其事傅太后恩趙太后趙太后亦歸心故成帝母及王氏皆怨之哀帝崩王莽白太后詔有司曰前皇太后與昭儀俱侍帷幄姊弟專寵錮寢執賊亂之謀殘滅繼嗣以危宗廟誖天犯祖無為天下母之義貶皇太后為孝成皇后徙居北宮後月餘復下詔曰皇后自知罪惡深大朝請希闊失婦道無共養之禮而有狼虎之毒宗室所怨海內之讎也而尚在小君之位誠非皇天之心夫小不忍亂大謀恩之所不能已者義之所割也今廢皇后為庶人就其園是日自殺凡立十六年而誅先是有童謠曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢成帝每微行出常與張放俱而稱富平侯家故曰張公子倉琅根宮門銅鍰也孝元傅昭儀哀帝祖母也父河內溫人蚤卒母更嫁為魏郡鄭翁妻生男惲昭儀少為上官太后才人自元帝為太子得進幸元帝即位立為倢伃甚有寵為人有材略善事人下至宮人左右飲酒酹地皆祝延之產一男一女女為平都公主男為定陶恭王恭王有材藝尤愛於上元帝既重傅倢伃及馮倢伃亦幸生中山孝王上欲殊之於後宮以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在倢伃上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩傅昭儀隨王歸國稱定陶太后後十年恭王薨子代為王王母曰丁姬傅太后躬自養視既壯大成帝無繼嗣時中山孝王在元延四年孝王及定陶王皆入朝傅太后多以珍寶賂遺趙昭儀及帝舅票騎將軍王根陰為王求漢嗣皆見上無子欲豫自結為久長計更稱譽定陶王上亦自器之明年遂徵定陶王立為太子語在哀紀月餘天子立楚孝王孫景為陶王奉恭王後太子議欲謝少傅閻崇以為春秋不以父命廢王父命為人後之禮不得顧私親不當謝太傅趙玄以為當謝太子從之詔問所以謝狀尚書劾奏玄左遷少府以光祿勳師丹為太傅詔傅太后與太子母丁姬自居定陶國邸下有司議皇太子得與傅太后丁姬相見不有司奏議不得相見頃之成帝母王太后欲令傅太后丁姬十日一至太子家成帝曰太子丞正統當共養陛下不得復顧私親王太后曰太子小而傅太后抱養之今至太子家以乳母恩耳不足有所妨於是令傅太后得至太子家丁姬以不小養太子獨不得成帝崩哀帝即位王太后詔令傅太后丁姬十日一至未央宮高昌侯董宏希指上書言宜立丁姬為帝太后師丹劾奏宏懷邪誤朝不道上初即位謙讓從師丹言止後乃白令王太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宮中宮追尊恭皇太后父為崇祖侯恭皇后父為襃德侯後歲餘遂下詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶其尊恭皇太后為帝太太后丁后為帝太后後又更號帝太太后為皇太太后稱永信宮帝太后稱中安宮而成帝母太皇太后本稱長信宮成帝趙后為皇太后並四太后各置少府太僕, WYG: 守}
  - {type: variant, offset: 2630, length: 3715, content: 后長信宮上許焉倢伃退處東宮作賦目傷悼其辭曰承祖考之遺德兮何性命之淑靈登薄軀於宮闕兮充下陳於後庭蒙聖皇之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵於增成既過幸於非位兮竊庶幾乎嘉時每寤寐而絫息兮申佩離以自思陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮哀襃閻之為郵美皇英之女虞兮榮任姒之母周雖愚陋其靡及兮敢舍心而忘茲歷年歲而悼懼兮閔蕃華之不滋痛陽祿與柘館兮仍繈褓而離災豈妾人之殃咎兮將天命之不可求白日忽已移光兮遂晻莫而昧幽猶被覆載之厚德兮不廢捐於罪郵奉共養于東宮兮託長信之末流共洒埽於帷幄兮永終死以為期願歸骨於山足兮依松柏之餘休重曰潛玄宮兮幽以清應門閉兮禁闥扃華殿塵兮玉階菭中庭萋兮綠草生廣室陰兮帷幄暗房櫳虛兮風泠泠感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮密靚處君不御兮誰為榮俯視兮丹墀思君兮履綦仰視兮雲屋雙涕兮橫流顧左右兮和顏酌羽觴兮銷憂惟人生兮一世忽一過兮若浮已獨享兮高明處生民兮極休勉虞精兮極樂與福祿兮無期綠衣兮白華自古兮有之至成帝崩倢伃充奉園陵薨因葬園中孝成趙皇后本長安宮人初生時父母不舉三日不死乃收養之及壯屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而說之召入宮大幸有女弟復召入俱為倢伃貴傾後宮許后之廢也上欲立趙倢伃皇太后嫌其所出微甚難之太后姊子淳于長為侍中數往來傳語得太后指上立封趙倢伃父臨為成陽侯後月餘乃立倢伃為皇后追以長前白罷昌陵功封為定陵侯皇后既立後寵少衰而弟絕幸為昭儀居昭陽舍其中庭彤朱而殿上髤漆切皆銅沓黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未嘗有焉姊弟顓寵十餘年卒皆無子末年定陶王來朝王祖母傅太后私賂遺趙皇后昭儀定陶王竟為太子明年春成帝崩帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊昏夜平善鄉晨傅絝韤欲起因失衣不能言畫漏上十刻而崩民間歸罪趙昭儀皇太后詔大司馬莽丞相大司空曰皇帝暴崩群眾讙譁怪之掖庭令輔等在後庭左右侍燕迫近雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺哀帝既立尊趙皇后為皇太后封太后弟侍中駙馬都尉欽為新成侯趙氏侯者凡二人後數月司隸解光奏言臣聞許美人及故中宮史曹宮皆御幸孝成皇帝產子子隱不見臣遣從事掾業史望驗問知狀者掖庭獄丞籍武故中黃門王舜吳恭靳嚴官婢曹曉道房張棄故趙昭儀御者于客子王偏臧兼等皆曰宮即曉子女前屬中宮為學事史通詩授皇后房與宮對食元延元年中宮語房曰陛下幸宮後數月曉入殿中見宮腹大問宮宮曰御幸有身其十月中宮乳掖庭牛官令舍有婢六人中黃門田客持詔記盛綠綈方底封御史中丞印予武曰取牛官令舍婦人新產兒婢六人盡置暴室獄毋問兒男女誰兒也武迎置獄宮曰善臧我兒胞丞知是何等兒也後三日客持詔記與武問兒死未手書對牘背武即書對兒見在未死有頃客出曰上與昭儀大怒奈何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復持詔記予武曰今夜漏上五刻持兒與舜會東交掖門武因問客陛下得武書意何如曰瞠也武以兒付舜舜受詔內兒殿中為擇乳母告善養兒且有賞毋令漏泄舜擇棄為乳母時兒生八九日後三日客復持詔記封如前予武中有封小綠篋記曰告武以篋中物書予獄中婦人武自臨飲之武發篋中有裹藥二枚赫蹏書曰告偉能努力飲此藥不可復入女自知之偉能即宮宮讀書已曰果也欲姊弟擅天下我兒男也頟上有壯髮類孝元皇帝今兒安在危殺之矣奈何令長信得聞之宮飲藥死後宮婢六人召入出語武曰昭儀言女無過寧自殺邪若外家也我曹言願自殺即自繆死武皆表奏狀棄所養兒十一日宮長李南以詔書取兒去不知所置許美人前在上林涿沐館數召入飾室中若舍一歲再三召留數月或半歲御幸元延二年褱子其十一月乳詔使嚴持乳毉及五種和藥丸三送美人所後客子偏兼聞昭儀謂成帝曰常紿我言從中宮來即從中宮來許美人兒何從生中許氏竟當復立邪懟以手自擣以頭擊壁戶柱從床上自投地啼泣不肯食曰今當安置我欲歸耳帝曰今故告之反怒為殊不可曉也帝亦不食昭儀曰陛下自知是不食為何陛下常自言約不負女今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使嚴持綠囊書予許美人告嚴曰美人當有以予女受來置飾室中簾南美人以葦篋一合盛所生兒緘封及綠囊報書予嚴嚴持篋書置飾室簾南去帝與昭儀坐使客子解篋緘未已帝使客子偏兼皆出自閉戶獨與昭儀在須臾開戶嘑客子偏兼使緘封篋及綠綈方底推置屏風東恭受詔持篋方底予武皆封以御史中丞印曰告武篋中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中故長定許貴人及故成都平阿侯家婢王業任孋公孫習前免為庶人詔召人屬昭儀為私婢成帝崩未幸梓宮倉卒悲哀之時昭儀自知罪惡大知業等故許氏王氏婢恐事泄而以大婢羊子等賜予業等各且十人以慰其意屬無道我家過失元延二年五月故掖庭令吾丘遵謂武曰掖庭丞吏以下皆與昭儀合通無可與語者獨欲與武有所言我無子武有子是家輕族人得無不敢乎掖庭中御幸生子者輒死又飲藥傷墯者無數欲與武共言之大臣票騎將軍貪耆錢不足計事奈何令長信得聞之遵後病困謂武今我已死前所語事武不能獨為也慎語皆在今年四月丙辰赦令前臣謹案永光三年男子忠等發長陵傅夫人冢事更大赦孝元皇帝下詔曰此朕不當所得赦也窮治盡伏辜天下以為當魯嚴公夫人殺世子齊桓召而誅焉春秋予之趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅前平安剛侯夫人謁坐大逆同產當坐以蒙赦令歸故郡今昭儀所犯尤誖逆罪重於謁而同產親屬怕在尊貴之位迫近幃幄群下寒心非所以懲惡崇誼示四方也請事窮竟丞相以下議正法哀帝於是免新成侯趙欽欽兄子成陽侯訢皆為庶人將家屬徙遼西郡時議郎耿育上疏言臣聞繼嗣失統廢適立庶聖人法禁古今至戒然大伯見歷知適逡循固讓委身吳粵權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道德最備是以尊號追及大王故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歲之後未能持國權柄之重制於女主女主驕盛則耆欲無極少主幼弱則大臣不使世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之德仁孝子愛之恩懷獨見之明內斷於身故廢後宮就館之漸絕微嗣禍亂之根乃欲致位陛下以安宗廟愚臣既不能深援安危定金匱之計又不知推演聖德述先帝之志乃反覆校省內暴露私燕誣汙先帝傾惑之過成結寵妾妒媚之誅甚失賢聖遠見之明逆負先帝憂國之意夫論大德不拘俗立大功不合眾此乃孝成皇帝至思所以萬萬於眾臣陛下聖德盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且襃廣將順君父之美匡捄銷滅既往之過古今通義也事不當時固爭防禍於未然各隨指阿從以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世遠聞百蠻近布海內甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察哀帝為太子亦頗得趙太后力遂不竟其事傅太后恩趙太后趙太后亦歸心故成帝母及王氏皆怨之哀帝崩王莽白太后詔有司曰前皇太后與昭儀俱侍帷幄姊弟專寵錮寢執賊亂之謀殘滅繼嗣以危宗廟誖天犯祖無為天下母之義貶皇太后為孝成皇后徙居北宮後月餘復下詔曰皇后自知罪惡深大朝請希闊失婦道無共養之禮而有狼虎之毒宗室所怨海內之讎也而尚在小君之位誠非皇天之心夫小不忍亂大謀恩之所不能已者義之所割也今廢皇后為庶人就其園是日自殺凡立十六年而誅先是有童謠曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢成帝每微行出常與張放俱而稱富平侯家故曰張公子倉琅根宮門銅鍰也孝元傅昭儀哀帝祖母也父河內溫人蚤卒母更嫁為魏郡鄭翁妻生男惲昭儀少為上官太后才人自元帝為太子得進幸元帝即位立為倢伃甚有寵為人有材略善事人下至宮人左右飲酒酹地皆祝延之產一男一女女為平都公主男為定陶恭王恭王有材藝尤愛於上元帝既重傅倢伃及馮倢伃亦幸生中山孝王上欲殊之於後宮以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在倢伃上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩傅昭儀隨王歸國稱定陶太后後十年恭王薨子代為王王母曰丁姬傅太后躬自養視既壯大成帝無繼嗣時中山孝王在元延四年孝王及定陶王皆入朝傅太后多以珍寶賂遺趙昭儀及帝舅票騎將軍王根陰為王求漢嗣皆見上無子欲豫自結為久長計更稱譽定陶王上亦自器之明年遂徵定陶王立為太子語在哀紀月餘天子立楚孝王孫景為陶王奉恭王後太子議欲謝少傅閻崇以為春秋不以父命廢王父命為人後之禮不得顧私親不當謝太傅趙玄以為當謝太子從之詔問所以謝狀尚書劾奏玄左遷少府以光祿勳師丹為太傅詔傅太后與太子母丁姬自居定陶國邸下有司議皇太子得與傅太后丁姬相見不有司奏議不得相見頃之成帝母王太后欲令傅太后丁姬十日一至太子家成帝曰太子丞正統當共養陛下不得復顧私親王太后曰太子小而傅太后抱養之今至太子家以乳母恩耳不足有所妨於是令傅太后得至太子家丁姬以不小養太子獨不得成帝崩哀帝即位王太后詔令傅太后丁姬十日一至未央宮高昌侯董宏希指上書言宜立丁姬為帝太后師丹劾奏宏懷邪誤朝不道上初即位謙讓從師丹言止後乃白令王太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宮中宮追尊恭皇太后父為崇祖侯恭皇后父為襃德侯後歲餘遂下詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶其尊恭皇太后為帝太太后丁后為帝太后後又更號帝太太后為皇太太后稱永信宮帝太后稱中安宮而成帝母太皇太后本稱長信宮成帝趙后為皇太后並四太后各置少府太僕, krp: 守}
