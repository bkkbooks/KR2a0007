  - {type: variant, offset: 9172, length: 3, content: 乃更號, WYG: 國也雍讀曰壅元封二年漢使渉何譙諭右渠終不肻奉詔師古曰譙責譲也音才笑反何去至界臨浿水使馭刺殺送何者朝鮮禆王長師古曰長者裨王名也送何至浿水何因刺殺之即度水馳入塞遂歸報天子曰殺朝鮮將上}
