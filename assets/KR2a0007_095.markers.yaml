  - {type: variant, offset: 9143, length: 0, content: '', WYG: 利亡顧趙氏社稷為萬世慮之意迺與其弟將卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粤妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粤直開道給食師古曰縱之令深入然後誅滅之未至番禺四十里粤以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪師古曰謾誑也音慢又音莫連反發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠師古曰言最為首也封其子延}
