  - {type: variant, offset: 6354, length: 0, content: '', WYG: 曰盗兵且至急絕道聚兵自守因稍以法誅秦所置吏以其黨為守假師古曰令為郡縣之職或守或假也秦已滅佗卽擊幷桂林象郡自}
  - {type: variant, offset: 6354, length: 0, content: '', krp: 曰盗兵且至急絕道聚兵自守因稍以法誅秦所置吏以其黨為守假師古曰令為郡縣之職或守或假也秦已滅佗卽擊幷桂林象郡自}
  - {type: variant, offset: 6355, length: 1, content: 寢, WYG: 為南粤武王髙帝已定天下為中國勞苦故釋佗不誅師古曰釋置也十一年遣陸賈立佗為南粤王與剖符通使使和輯百粤師古曰輯與集同毋為南邊害與長沙接境高后時有司請禁粤關市鐵器佗曰髙皇帝立我通使物今髙后聽讒臣别異蠻夷鬲絕器物師古曰鬲與隔同此必長沙王計欲倚中國師古曰倚音於綺反擊滅南海幷王之自為功也於是佗乃自尊號為南武帝發兵攻長沙邊敗數縣焉髙后遣將軍隆慮侯竈擊之師古曰周竈也慮音廬會暑溼士卒大疫兵不能隃領師古曰隃與踰同下皆類此嵗餘髙后崩即罷兵佗因此以兵威財物賂遺閩粤西甌駱役屬焉師古曰西甌即駱越也言西者以别東甌也宋祁曰甌集韻於口反駱越種也東西萬餘里廼乗黃屋左纛稱制與中國侔師古曰侔等也文帝元年初鎭撫天下使告諸侯四夷從代來即位意諭盛德焉師古曰言不以威武加於逺方也廼為佗親冡在眞定置守邑師古曰親謂父母也嵗時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粤者平言陸賈先帝時使粤上召賈為大中大夫謁者一人為副使賜佗書曰皇帝謹問南粤王甚苦心勞意朕髙皇帝側室之子師古曰言非正嫡所生也棄外奉北藩于代道里遼逺壅蔽樸愚未嘗致書師古曰言未得通使於越髙皇帝棄羣臣孝惠皇帝即世髙后自臨事不幸有疾日進不衰師古曰言疾病益甚也以故誖暴乎治師古曰誖乖也音布内反諸呂為變故亂法不能獨制廼取它姓子為孝惠皇帝嗣賴宗}
