  - {type: variant, offset: 9142, length: 0, content: '', WYG: 恐亂起亦欲倚漢威師古曰倚音於綺反勸王及幸臣求内屬即因使者上書請比内諸侯三嵗壹朝除邊關於是天子許之賜其丞相呂嘉銀印及内史中尉太傅印餘得自置師古曰丞相内史中尉太傅之外皆任其國自選置不受漢之印綬除其故黥劓刑用漢法諸使者皆留塡撫之師古曰填音竹刃反王王太后飭治行裝重資為入朝具相呂嘉年長矣相三王宗族官貴為長吏七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連孟康曰蒼梧越中王自名為秦王連親婚也晉灼曰秦王即下趙光也趙本與秦同姓故曰秦王其居國中甚重粤人信之多為耳目者得衆心愈於王師古曰愈勝也王之上書數諫止王王不聽有畔心數稱病不見漢使者使者注意嘉埶未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等師古曰介恃也置酒請使者大臣皆侍坐飲嘉弟為將將卒居宫外酒行太后謂嘉南粤内屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發師古曰杖音直亮反嘉見耳目非是師古曰異於常也即趨出太后怒鏦嘉以矛師古曰鏦謂撞刺之也音䆫宋祁曰正文鏦字上别本有欲字王止太后嘉遂出介弟兵就舎李奇曰介被也師古曰介甲也被甲而自衛也弟兵即上所云弟將卒居外者稱病不肻見王及使者廼隂謀作亂王素亡意誅嘉嘉知之以故數月不發太后獨欲誅嘉等力又不能天子聞之罪使者怯亡決又以為王王太后已附漢獨呂嘉為亂不足以興兵欲使莊參以二千人往參曰以好往數人足以武往二千人亡足以為也辭不可天子罷參兵郟壯士故濟北相韓千秋師古曰潁川郟縣人也郟音夾奮曰以區區粤又有王應獨呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂將二千人往入粤境呂嘉廼遂反下令國中曰王年少太后中國人又與使者亂專欲内屬盡持先王寶入獻天子以自媚多從人行至長安虜賣以為僮奴自脫一}
