  - {type: variant, offset: 2458, length: 171, content: 倢伃上曰始衛皇后亦從微起乃賜平姓曰衛所謂衛倢伃也其後趙飛燕姊弟亦從自微賤興隃越禮制寖盛於前班倢伃及許皇后皆失寵稀復進見鴻嘉三年趙飛燕譖告許皇后班倢伃挾媚道祝詛後宮詈及主上許皇后坐廢考問班倢伃倢伃對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之愬如其無知愬之何益故不為也上善其對憐憫之賜黃金百斤趙氏姊弟驕妒倢伃恐久見危求共養, WYG: 巴郡}
