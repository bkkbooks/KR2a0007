  - {type: variant, offset: 8, length: 0, content: '', krp: 朝鮮傳亦同耕田有邑聚其外西自桐師以東北至葉楡師古曰葉楡澤名因以立號後為縣屬益州郡名為巂昆眀師古曰巂即今之巂州也昆明又在其西南卽今之南寜州諸所居是其地也巂音髓編髪師古曰編音歩典反隨畜移徙亡常處亡君長地方可數千里自巂以東北君長以十數徙莋都最大師古曰徙及莋都二國也徙後為徙縣屬蜀郡莋都後為沈黎郡徙音斯莋音材各反自莋以東北君長以十數冉駹最大師古曰今䕫州開州首領多姓冉者本皆冉種也駹音尨其俗或土著或移徙師古曰土著謂有常居著於土地也著音直畧反在蜀之西自駹以東北君長以十數白馬最大皆氐類也此皆巴蜀西南外蠻夷也始楚威王時使將軍莊蹻將兵循江上師古曰循順也謂縁江而上也蹻音居畧反畧巴黔中以西師古曰黔中即今黔州是其地本巴人也莊蹻者楚莊王苖裔也蹻至滇池方三百里師古曰地理志益州滇池縣其澤在西北華陽國志云澤下流淺狹狀如倒池故曰滇池旁平地肥饒數千里師古曰池旁之地也以兵威定屬楚欲歸報會秦擊奪楚巴黔中郡道塞不通因迺以其衆王滇變服從其俗以長之師古曰為其長帥也秦時嘗破畧通五尺道師古曰其處險阸故道纔廣五尺諸此國頗置吏焉十餘嵗秦滅及漢興皆棄此國而開蜀故徼師古曰西南之徼猶北方塞也徼音工釣反巴蜀民或竊出商賈取其莋馬僰僮旄牛以此巴蜀殷富建元六年大行王恢擊東粤東粤殺王郢以報恢因兵威使番陽令唐䝉風曉南粤師古曰番音蒲何反風讀曰諷南粤食蒙蜀枸醬晉灼曰枸音矩劉徳曰枸樹如桑其椹長二三寸味酢取其實以為醬美蜀人以為珍味師古曰劉說非也子形如桑椹耳緣木而生非樹也子又不長二三寸味尤辛不酢今宕渠則有之食讀曰飤蒙問所從來曰道西北牂柯江師古曰道由也由此而來江廣數里出番禺城下師古曰番音普安反禺音隅蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘歩足以行船南粤以財物役屬夜郎西至桐師然亦不能臣使也蒙迺上書說上曰南粤王黃屋左纛師古曰言為天子之車服地東西萬餘里名為外臣實一州主今以長沙豫章徃水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粤一奇也誠以漢之强巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙以郎中將劉攽曰當作中郎將後使相如以郎中將往諭同將千人食重萬餘人師古曰食粮及衣重也重音直用反從巴莋關入遂見夜郎侯多同師古曰多同其侯名也厚賜諭以威徳約為置吏使其子為令師古曰比之於漢縣也夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也迺且聽蒙約還報迺以為犍為郡發巴蜀卒治道自僰道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以郎中將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相饟師古曰饟古餉字數嵗道不通士罷餓餧離暑溼死者甚衆師古曰罷讀曰疲餧饑也離遭也餧音能賄反西南夷又數反發兵興擊耗費亡功師古曰耗損也音呼到反上患之使公孫𢎞往視問焉還報言其不便及𢎞為御史大夫時方築朔方據河逐胡𢎞等因言西南夷為害師古曰言通西南夷大為損害可且罷專力事匈奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就師古曰令自保守且脩成其郡縣及元狩元年博望侯張騫言使大夏時見蜀布卭竹杖問所從來曰從東南身毒國師古曰即天竺也亦曰捐篤也可數千里得蜀賈人市或聞卭西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匈奴隔其道誠通蜀身毒國道便近又亡害於是天子廼令王然于柏始昌呂越人等十餘輩閒出西南夷師古曰求閒隙而出也指求身毒國至滇滇王當羌廼留為求道師古曰當羌滇王名宋祁曰遷史當作嘗注云嘗一作賞四嵗餘宋祁曰据遷史當云為求道西此四字當屬上句作西皆閉昆明莫能通師古曰為昆明所閉塞滇王與漢使言漢孰與我大師古曰與猶如及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附師古曰言可專事招來之令其親附天子注意焉及至南粤反上使馳義侯因犍為發南夷兵且蘭君恐逺行旁國虜其老弱師古曰恐發兵與漢行後其國空虛而旁國來㓂鈔取其老弱也且音子餘反乃與其衆反殺使者及犍為太守漢廼發巴蜀罪人嘗擊南粤者八校尉擊之會越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭師古曰言因軍行而便誅之也斬首數萬遂平南夷為䍧柯郡夜郎侯始倚南粤南粤已滅還誅反者師古曰謂軍還而誅且蘭夜郎遂入朝上以為夜郎王南粤破後及漢誅且蘭卭君并殺莋侯冉駹皆震恐請臣置吏以卭都為粤巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粤破及誅南夷兵威風諭滇王入朝師古曰風讀曰諷滇王者其衆數萬人其旁東北勞深靡莫皆同姓相仗未肻聽師古曰仗猶倚也相依倚為援而不聽滇王入朝也仗音直亮反勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅師古曰言初始以來常有善意滇王離西夷師古曰言東嚮事漢滇舉國降劉攽口多一滇字宋祁曰郭本無滇字請置吏入朝於是以為益州郡賜滇王王印復長其民師古曰為之長帥西南夷君長以百入宋祁曰百入越本作數謝本作入獨夜郎滇受王印滇小邑也最寵焉後二十三嵗}
