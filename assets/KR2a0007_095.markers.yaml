  - {type: variant, offset: 284, length: 577, content: 以吏職自絫賜黃金二百斤以特進侯就朝位後歲餘薨諡曰恭侯后聰慧善史書自為妃至即位常寵於上後宮希得進見皇太后及帝諸舅憂上無繼嗣時又數有災異劉向谷永等皆陳其咎在於後宮上然其言於是省減椒房掖廷用度皇后乃上疏曰妾誇布服糲食加以幼稚愚惑不明義理幸得免離茅屋之下備後宮埽除蒙過誤之寵居非命所當託洿穢不修曠職尸官數逆至法踰越制度當伏放流之誅不足以塞責乃壬寅日大長秋受詔椒房儀法御服輿駕所發諸官署及所造作遺賜外家群臣妾皆如竟寧以前故事妾伏自念入椒房以來遺賜外家未嘗踰故事每輒決上可覆問也今誠時世異制長短相補不出漢制而已纖微之間未必可同若竟寧前與黃龍前豈相放哉家吏不曉今壹受詔如此且使妾搖手不得今言無得發取諸官殆謂未央宮不屬妾不宜獨取也言妾家府亦不當得妾竊惑焉幸得賜湯沐邑以自奉養亦小發取其中何害於誼而不可哉又詔書言服御所造皆如竟寧前吏誠不能揆其意即且令妾被服所為不得不如前設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣此二事誠不可行唯陛下省察宦吏忮佷必欲自勝幸妾尚貴時猶以不急事操人況今日日益侵又獲此詔其操約人豈有所訴陛下見妾在椒房終不肯給妾纖微內邪若不私府小取將安所仰乎舊故中宮乃私奪左右之賤繒及發乘輿服繒言為待詔補已而貿易其中左右多竊怨者甚恥為之又故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記直豫言使后知之非可復若私府有所取也, WYG: 因}
