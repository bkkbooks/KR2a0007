  - {type: variant, offset: 9189, length: 2, content: 建世, WYG: 遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不會具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縛樓船將軍師古曰戲讀與麾同宋祁曰戲下字上當更有軍字幷其軍以報天}
