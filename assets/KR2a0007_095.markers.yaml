  - {type: variant, offset: 10, length: 0, content: '', WYG: 元年益州廉頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反師古曰並音伴遣水衡都尉發蜀郡犍為犇命萬餘人師古曰犇古奔字奔命解在昭紀擊牂柯大破之後三嵗姑繒葉榆復反遣水衡都尉呂辟胡將郡兵擊之師古曰辟音璧辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰士戰及溺死者四千餘人眀年復遣軍正}
