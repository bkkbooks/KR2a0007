  - {type: variant, offset: 880, length: 748, content: 毋若未央宮有所發遺賜衣服如故事則可矣其餘誠太迫急奈何妾薄命端遇竟寧前竟寧前於今世而比之豈可耶故時酒肉有所賜外家輒上表乃決又故杜陵梁美人歲時遺酒一石肉百斤耳妾甚少之遺田八子誠不可若是事率眾多不可勝以文陳俟自見索言之唯陛下深察焉上於是采劉向谷永之言以報曰皇帝問皇后所言事聞之夫日者眾陽之宗天光之貴王者之象人君之位也夫以陰而侵陽虧其正體是非下陵上妻乘夫賤踰貴之變與春秋二百四十二年變異為眾莫若日蝕大自漢興日蝕亦為呂霍之屬見以今揆之豈有此等之效與諸侯拘迫漢制牧相執持之也又安獲齊趙七國之難將相大臣褢誠秉忠唯義是從又惡有上官博陸宣成之謀若乃徒步豪桀非有陳勝項梁之群也匈奴夷狄非有冒頓郅支之倫也方外內鄉百蠻賓服殊俗慕義八州懷德雖使其懷挾邪意猶不足憂又況其無乎求於夷狄無有求於臣下無有微後宮也當何以塞之日者建始元年正月白氣出於營室營室者天子之後宮也正月於尚書為皇極皇極者王氣之極也白者西方之氣其於春當廢今正於皇極之月興廢氣於後宮視后妾無能懷任保全者以著繼嗣之微賤人將起也至其九月流星如瓜出於文昌貫紫宮尾委曲如龍臨於鉤陳此又章顯前尤著在內也其後則有北宮井溢南流逆理數郡水出流殺人民後則訛言傳相驚震女童入殿咸莫覺知夫河者水陰四瀆之長今乃大決沒漂陵邑斯昭陰盛盈溢違經絕紀之應也乃昔之月鼠巢于樹野鵲變色五月庚子鳥焚其巢太山之域易曰鳥焚其巢旅人先笑後號咷喪牛于易凶言王者處民上如鳥之處巢也不顧卹百姓百姓畔而去之若鳥之自焚也雖先快意說笑其後必號而無及也百姓喪其君若牛亡其毛也故稱凶泰山王者易姓告代之處今正於岱宗之山甚可懼也三月癸未大風自西搖祖宗寢廟揚裂帷席折拔樹木頓僵車輦毀壞檻屋災及宗廟足為寒心四月己亥日蝕東井轉旋且索與既無異己猶戊也亥復水也明陰盛咎在內於戊己虧君體著絕世於皇極顯禍敗及京都於東井變怪眾備末重益大來數益甚, WYG: 已}
