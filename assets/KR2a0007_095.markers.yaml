  - {type: variant, offset: 7457, length: 358, content: 庶人就其園自殺孝元馮昭儀平帝祖母也元帝即位二年以選入後宮時父奉世為執金吾昭儀始為長使數月至美人後五年就館生男拜為倢伃時父奉世為右將軍光祿勳奉世長男野王為左馮翊父子並居朝廷議者以為器能當其位非用女寵故也而馮倢伃內寵與傅昭儀等建昭中上幸虎圈鬭獸後宮皆坐熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮倢伃直前當熊而立左右格殺熊上問人情驚懼何故前當熊倢伃對曰猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉傅昭儀等皆慚明年夏馮倢伃男立為信都王尊倢伃為昭儀元帝崩為信都太后與王俱居儲元宮河平中隨王之國後徙中山是為孝王後徵定陶王為太子封中山王舅參為宜鄉侯參馮太后少弟也是歲孝王薨有一男嗣為王時未滿歲有眚病太后自養視數禱祠解哀帝即位遣中郎謁者張由將毉治中山小王由素有狂易病病發怒去西歸長安尚書簿責擅去狀由恐因誣言中山太后祝詛上及, WYG: ''}
