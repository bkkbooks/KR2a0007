  - {type: variant, offset: 6442, length: 0, content: '', WYG: 至武帝建元四年佗孫胡為南粤王立三年閩粤王郢興兵南擊邊邑粤使人上書曰兩粤俱為藩臣毋擅興兵相攻擊今東粤擅興兵侵臣臣不敢興兵唯天子詔之於是天子多南粤義師古曰多猶重也守職約師古曰守藩臣之職而不踰約制為興師遣兩將軍往討閩粤兵未隃領閩粤王弟餘善殺郢以降於是罷兵天子使嚴助徃諭意南粤王胡頓首曰天子廼興兵誅閩粤死亡以報德遣}
