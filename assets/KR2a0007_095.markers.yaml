  - {type: variant, offset: 9185, length: 2, content: 成新, WYG: 楊僕從齊浮勃海兵五萬左將軍荀彘出遼東誅右渠右渠發兵距險左將軍卒多率遼東士如淳曰遼東兵多也兵先縱敗散多還走坐法斬師古曰於法合斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其衆遁山中十餘日稍求收散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利乃使衞山因兵威往諭右渠右渠見使者頓首謝願降恐將詐殺臣今見信節請服降遣太子入謝獻馬五千疋及餽軍糧師古曰餽亦饋字也人衆萬餘持兵方度浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐之遂不度浿水復引歸山報天子誅山左將軍破浿水上軍迺前至城下圍其西北樓船亦往會居城南右渠遂堅城守數月未能下左將軍素侍中幸師古曰親幸於天子將燕代卒悍乘勝軍多驕樓船將齊卒入海已多敗亡其先與右渠戰困辱亡卒卒皆恐將心慙其圍右渠常持和節左將軍急擊之朝鮮大臣廼陰間使人私約降樓船師古曰與樓船為要約而請降往來言尚未肻決左將軍數與樓船期戰樓船欲就其約不會左將軍亦使人求閒隙降下朝鮮不肻心附樓船以故兩將不相得左將軍心意樓船前有失軍罪師古曰意疑也今與朝鮮和善而又不降疑其有反計未敢發天子曰將卒不能制宋祁曰卒越本作率乃使衞山諭降右渠不能顓决與左將軍相誤卒沮約師古曰顓與專同卒終也沮壊也今兩將圍城又乖異以故久不決使故濟南太守}
