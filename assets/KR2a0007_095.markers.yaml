  - {type: variant, offset: 1630, length: 174, content: 之禍月以迫切不救之患日寖婁深咎敗灼灼若此豈可以忽哉書云高宗肜日粵有雊雉祖己曰惟先假王正厥事又曰雖休勿休惟敬五刑以成三德即飭椒房及掖庭耳今皇后有所疑便不便其條刺使大長秋來白之吏拘於法亦安足過蓋矯枉者過直古今同之且財幣之省特牛之祠其於皇后所以扶助德美為華寵也咎根不除災變相襲祖宗且不血食何戴侯也傳不云乎以約失之者鮮審皇后欲從其奢與朕亦當法孝武皇帝也如此, WYG: 然後戰師}
