  - {type: variant, offset: 9145, length: 0, content: '', WYG: 萬師往討之元鼎五年秋衞尉路博德為伏波將軍出桂陽下湟水師古曰湟音皇主爵都尉楊僕為樓船將軍出豫章下横浦故歸義粤侯二人為戈船下瀨將軍師古曰從粤來歸義而漢封之出零陵或下離水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下牂柯江咸會番禺六年冬樓船將軍將精卒先陷尋陿破石門得粤船粟因推而前挫粤􅄡以粤數萬人劉敞曰挫粤􅄡以粤多一粤字待伏波將軍伏波將軍將罪人道逺後期與樓船會廼有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面會暮樓船攻敗粤人縱火燒城粤素聞伏波莫不知其兵多少師古曰莫讀曰暮伏波廼為營師古曰設營壘以待降者遣使招降者賜印綬復縱令相招師古曰來降者即賜以侯印而放令還更相招諭之也劉奉世曰何必侯印耶樓船力攻燒敵師古曰力盡力也反􅇌而入伏波營中師古曰􅇌與驅同遲旦城中皆降伏波師古曰遲音丈二反解在髙紀呂嘉建德以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇宏得建德為海常侯師古曰校之司馬若今行軍總管司馬也粤即都稽得嘉為臨蔡侯孟康曰越中所自置郎也師古曰稽音雞蒼梧王趙光與粤王同姓聞漢兵至降為隨桃侯及粤掲陽令史定降漢為安道侯蘇林曰掲音羯南海縣粤將畢取以軍降為膫侯師古曰越將姓畢名取也功臣表膫屬南陽音來彫反粤桂林監居翁服虔曰桂林部監也姓居名翁諭告甌駱四十餘萬口降為湘城侯戈船下瀨將軍兵及馳義侯所發夜郎兵未下南粤已平遂以其地為儋耳珠崖南海蒼梧鬱林合浦交阯九眞日南九郡伏波將軍益封樓船將軍以推鋒陷堅為將梁侯自尉佗王凡五世九十三嵗而亡閩粤王無諸及粤東海王搖其先皆粤王句踐之後也姓騶氏秦幷天下廢為君長以其地為閩中郡師古曰即今之泉州建安是也及諸侯畔秦無諸搖率粤歸番陽令吳芮所謂番君者也師古曰吳芮號也番音蒲河反從諸侯滅秦當是時項王主命不王也孟康曰主號命諸侯不王無諸搖等也以故不佐楚漢擊項籍無諸搖帥粤人佐漢漢五年復立無諸為閩粤王王閩中故地都冶師古曰地名即侯官縣是也冶音弋者反孝惠三年舉髙帝時粤功師古曰追論其功曰閩君搖功多其民便附廼立搖為東海王都東甌世號曰東甌王后數世師古曰后與後同古通用字孝景三年吳王濞反欲從閩粤師古曰招粤令從也閩粤未肻行獨東甌從及吳破東甌受漢購殺吳王丹徒以故得不誅吳王子駒亡走閩粤怨東甌殺其父常勸閩粤擊東甌建元三年閩粤發兵圍東甌東甌使人告急天子天子問太尉田蚡蚡對曰粤人相攻擊固其常不足以煩中國徃救也中大夫嚴助詰蚡言當救天子遣助發會稽郡兵浮海救之語具在助傳漢兵未至閩粤引兵去東粤請舉國徙中國廼悉與衆處江淮之間六年閩粤擊南粤南粤守天子約不敢擅發兵而以聞上遣大行王恢出豫章大司農韓安國出會稽皆為將軍兵未隃領閩粤王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵衆强即幸勝之後來益多師古曰言漢地廣大兵衆强盛今雖勝之後必更來也滅國乃止今殺王以謝天子天子罷兵固國完不聽廼力戰不勝即亡入海皆曰善即鏦殺王師古曰鏦音初江反使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉廼以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵曰郢等首惡獨無諸孫繇君丑不與謀張晏曰繇邑號也師古曰繇音搖與讀曰豫乃使中郎劉敞曰當作中郎將立丑為粤繇王奉閩粤祭祀餘善以殺郢威行國中民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粤王與繇王並處至元鼎五年南粤反餘善上書請以卒}
