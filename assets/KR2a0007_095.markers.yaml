  - {type: variant, offset: 9247, length: 4, content: 易著吉凶, WYG: 澅音獲陶為秋苴侯晉杓曰功臣表秋苴屬勃海師古曰苴音子餘反唊為平州侯長為幾侯最以父死頗有功為涅陽侯左將軍徵至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍蘇林曰列口縣名也度海先得之擅先縱失亡多當誅贖為庶人賛曰楚粤之先厯世有土及周之衰楚地方五千里而句踐亦以粤伯師古曰伯讀曰覇秦滅諸侯唯楚尚有滇王漢誅西南夷獨滇復寵及東粤滅國遷衆繇王居股等猶為萬戸侯三方之開皆自好事之臣故西南夷發於唐蒙司馬相如兩粤起嚴助朱買臣朝鮮由渉何遭世富盛動能成功然已勤矣師古曰已甚也言其事甚勤勞追觀太宗填撫尉佗師古曰言文帝以道德安撫之也塡音竹刃反宋祁曰道德一作恩德豈古所謂招攜以禮懐逺以德者哉師古曰春秋左氏傳僖七年諸侯盟于寗母管仲言於齊侯曰臣聞之招攜以禮懷逺以德攜謂離貳者也懐來也言有離貳者則招集之恃險逺者則懐來之也故賛引之前漢書卷九十五前漢書卷九十五考證西南夷傳自駹以東北君長以十數白馬最大臣召南按白馬氐居仇池山其山四面斗絕上有平田百頃詳後書南蠻傳道西北牂柯江江廣數里出番禺城下臣召南按牂柯江即鬱水之上流豚水在後書謂之遯水者也地理志䍧柯郡夜郎縣豚水東至廣鬱入鬱鬱林郡廣鬱縣鬱水首受夜郎豚水東至四會入海是也今曰盤江自貴州東南流逕廣西又東逕廣東廣州入海夜郎侯以竹為姓詳見後書南粤𫝊南海尉任囂按此郡尉也掌一郡兵事故得移檄發兵朕髙皇帝側室之子注師古云云顧炎武曰注非也左傳卿置側室杜解曰側室衆子也文公十三年傳曰趙有側室曰穿朕以王書罷將軍博陽侯胡三省曰髙祖功臣表有博陽侯陳濞葢於此時為將軍也至武帝建元四年佗孫胡為南粤王臣召南按後文嬰齊嗣立即臧其先武帝文帝璽武帝即佗文帝即胡葢佗之太子早卒而孫胡嗣立也佗至建元三年葢亦壽百嵗矣閩粤傳令諸校留屯豫章梅嶺待命杜佑曰梅嶺在虔州䖍化縣界入白沙武林胡三省曰索隠云今豫章北二百里接番陽界地名白沙白沙東南八十里有武陽亭東南三十里地名武林當閩越之京道封居股為東成侯功臣表作東城侯東粤地遂虛臣召南按東粤地既虛而地理志會稽郡有治縣即故東粤王都也說見沈約宋志朝鮮傳朝鮮王滿臣召南按滿姓衞氏朝鮮自周封箕子後傳四十餘世至朝鮮侯凖始稱王漢初其國大亂燕人衞滿擊破凖而自王也後書傳正補此傳之缺遣樓船將軍楊僕從齊浮勃海兵五萬胡三省曰僕從齊浮勃海葢自青萊以北幽平以南皆濵於海其海通謂之勃海非指勃海郡}
