  - {type: variant, offset: 6494, length: 245, content: 人傅太后既尊後尤驕與成帝母語至謂之嫗與中山孝王母馮太后並事元帝追怨之陷以祝詛罪令自殺元壽元年崩合葬渭陵稱孝元傅皇后云定陶丁姬哀帝母也易祖師丁將軍之玄孫家在山陽瑕丘父至廬江太守始定陶恭王先為山陽王而丁氏內其女為姬王后姓張氏其母鄭禮即傅太后同母弟也太后以親戚故欲其有子然終無有唯丁姬河平四年生哀帝丁姬為帝太后兩兄忠明明以帝舅封陽安侯忠蚤死封忠子滿為平周侯太后叔父憲望望為左將軍憲為太僕明為大司馬票騎將軍輔政丁氏侯者凡二人大司馬一人將軍九卿二千石六人侍中諸曹亦十餘人丁傅以一二年間暴興尤盛然哀帝不, WYG: 嵗胡實病}
