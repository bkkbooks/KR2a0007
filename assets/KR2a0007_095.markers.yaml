  - {type: variant, offset: 6740, length: 546, content: 假以權勢權勢不如王氏在成帝世也建平二年丁太后崩上曰詩云穀則異室死則同穴昔季武子成寢杜氏之墓在西階下請合葬而許之附葬之禮自周興焉季子事亡如事存帝太后宜起陵恭皇之園遣大司馬票騎將軍明東送葬于定陶貴震山東哀帝崩王莽秉政使有司舉奏丁傅罪惡莽以太皇太后詔皆免官爵丁氏徙歸故郡莽奏貶傅太后號為定陶共陶共王母丁太后號曰丁姬元始五年葬復言共王母丁姬前不臣妾至葬渭陵冢高與元帝山齊懷帝太后皇太太后璽綬以葬不應禮禮有改葬請發共王母及丁姬冢取其璽綬消滅徙共王母及丁姬歸定陶葬共王冢次而葬丁姬復其故太后以為既已之事不須復發莽固爭之太后詔曰因故棺為致椁作冢祠以太牢謁者護既發傅太后冢崩壓殺數百人開丁姬椁戶火出炎四五丈吏卒以水沃滅乃得入燒燔椁中器物莽復奏言前共王母生僭居桂宮皇天震怒災其正殿丁姬死葬踰制度今火焚其椁此天見變以告當改如媵妾也臣前奏請葬丁姬復故非是共王母及丁姬棺皆名梓宮珠玉之衣非藩妾服請更以木棺代去珠玉衣葬丁姬媵妾之次奏可既開傅太后棺臭聞數里公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平共王母丁姬故冢二旬間皆平莽又周棘其處以為世戒云時有群燕數千銜土投丁姬穿中丁傅既敗孔鄉侯將家屬徙合浦宗族皆歸故郡唯高武侯喜得全自有傳孝哀傅皇后定陶太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為漢, WYG: ''}
