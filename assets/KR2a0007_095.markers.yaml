  - {type: variant, offset: 6352, length: 1, content: 恭, WYG: 天水太守勸民農桑為天下最賜金四十斤入為左曹衛將軍護軍都尉卒官王莽簒位改漢制貶鉤町王以為侯王邯怨恨師古曰邯其王名也邯音酣牂柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邉蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之更遣寜始將軍廉丹與庸部牧史熊師古曰莽改益州為庸部大發天水隴西騎士廣漢巴蜀犍為吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒饑疫三嵗餘死者數萬而粤嶲蠻夷任貴亦殺太守枚根自立為卭榖王師古曰枚根太守之姓名會莽敗漢興誅貴復舊號云師古曰此漢興者謂光武中興也南粤王趙佗眞定人也師古曰眞定本趙國之縣也佗音徒何反秦并天下略定揚粤師古曰本揚州之分故云揚粤置桂林南海象郡以適徙民與粤雜處師古曰適讀曰讁讁有罪者徙之於越地與其土人雜居十三嵗至二世時南海尉任囂病且死師古曰囂音敖召龍川令趙佗師古曰龍川南海之縣也卽今之循州語曰聞陳勝等作亂豪傑叛秦相立南海辟逺恐盗兵侵此師古曰辟讀曰僻吾欲興兵絶新道師古曰秦所開越道也自備待諸侯變會疾甚且番禺負山險阻師古曰負背也南北東西數千里頗有中國人相輔此亦一州之主可為國郡中長吏亡足與謀者故召公告之卽被佗書行南海尉事師古曰被加也音皮義反囂死佗即移檄告横浦陽山湟谿關師古曰湟音}
