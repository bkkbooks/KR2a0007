  - {type: variant, offset: 9148, length: 0, content: '', WYG: 解師古曰解者自解說若今言分疏不行持兩端陰使南粤師古曰遣使與相知及漢破番禺樓船將軍僕上書願請引兵擊東粤上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命師古曰聽詔命也明年秋餘善聞樓船請誅之漢兵留境且往師古曰言兵在境首恐將來討之廼遂發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒將屯師古曰齒城陽恭王子也舊封山州侯不敢擊郤就便處師古曰郤退也音丘略反皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言師古曰妄自尊大也上遣横海將軍韓說出句章師古曰說讀曰悅句章㑹稽之縣浮海從東方往樓船將軍僕出武林師古曰楊僕也中尉王温舒出梅領粤侯為戈船下瀨將軍出如邪白沙元封元年冬咸入東粤東粤素發兵距嶮使徇北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬徇北將軍師古曰錢唐㑹稽縣也榬姓終古名也榬音袁為語兒侯孟康曰越中地也今吳南亭是師古曰語字或作篽或作禦其音同自兵未往故粤衍侯吳陽前在漢漢使歸諭餘善不聽及横海軍至陽以其邑七百}
