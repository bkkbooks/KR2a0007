  - {type: variant, offset: 9144, length: 0, content: '', WYG: 為成安侯摎樂其姊為王太后首願屬漢封其子廣德為龒侯晉杓曰龒古龍字乃赦天下曰天子微弱諸侯力政譏臣不討賊師古曰力政謂以兵力相加也譏臣不討賊者春秋之義呂嘉建德等反自立晏如師古曰言自相置立而心安泰無恐懼令粤人及江淮以南樓船}
