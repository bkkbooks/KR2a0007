  - {type: variant, offset: 9155, length: 6, content: 劉氏廢常稱疾, WYG: 始燕時嘗略屬真番朝鮮師古曰戰國時燕國略得此地為置吏築障師古曰障所以自障蔽也音之亮反秦滅燕屬遼東外徼漢興為逺難守復脩遼東故塞至浿水為界師古曰浿水在樂浪縣音普盖反屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人椎結蠻夷服而東走出塞度浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及故燕齊亡在者王之師古曰燕齊之人亡居此地及真番朝鮮蠻夷皆屬滿也都王險李奇曰地名也會孝惠髙后天下初定遼東太守即約滿為外臣保塞外蠻夷毋使盜邊蠻夷君長欲入見天子勿得禁止以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠師古曰滿死傳子子死傳孫右渠者其孫名也所誘漢亡人滋多師古曰滋益也又未嘗入見師古曰}
