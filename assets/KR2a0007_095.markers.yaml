  - {type: variant, offset: 1805, length: 192, content: 甘泉建章可復興矣世俗歲殊時變日化遭事制宜因時而移舊之非者何可放焉君子之道樂因循而重改作昔魯人為長府閔子騫曰仍舊貫如之何何必改作蓋惡之也詩云雖無老成人尚有典刑曾是莫聽大命以傾孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎皇后其刻心秉德毋違先后之制度力誼勉行稱順婦道減省群事謙約為右其孝東宮毋闕朔望推誠永究爰何不臧養名顯行以息眾讙垂則列妾使有法焉皇后深惟毋忽是時, WYG: 萬姓被害}
