  - {type: variant, offset: 6454, length: 38, content: 業為陽信侯追尊惲為陽信節侯鄭氏傅氏侯者凡六人大司馬二人九卿二千石六人侍中諸曹, WYG: 期毋失禮要之不可以怵好語入見師古曰怵誘也不可被誘怵以好語而入漢朝也怵音先幸反入見則不得復歸亡國之埶也於是胡稱病竟不入見後}
