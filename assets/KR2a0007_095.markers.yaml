  - {type: variant, offset: 6360, length: 2, content: 比宣, WYG: 古曰言越兵寇邊長沙南郡皆厭苦之而漢軍亦當相拒方有戰鬬於越亦非利也必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇}
