  - {type: variant, offset: 6441, length: 0, content: '', WYG: 憐復故號師古曰復音扶目反通使漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者獻白璧一䨇翠鳥千犀角十紫貝五百桂蠧一器應劭曰桂樹中蝎蟲也蘇林曰漢舊常以獻陵廟載以赤轂小車師古曰此蟲食桂故味辛而漬之以蜜食之也蟲音丁故反生翠四十䨇孔雀二䨇昧死再拜以聞皇帝陛下陸賈還報文帝大說師古曰說讀曰悅遂至孝景時稱臣遣使入朝請師古曰請音才性反然其居國竊如故號其使天子稱王朝命如諸}
