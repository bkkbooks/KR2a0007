  - {type: variant, offset: 6360, length: 2, content: 比宣, krp: 古曰言越兵寇邊長沙南郡皆厭苦之而漢軍亦當相拒方有戰鬬於越亦非利也必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰髙皇}
  - {type: variant, offset: 6363, length: 0, content: '', WYG: 所以介長沙土也師古曰介隔也朕不能擅變焉吏曰得王之地不足以為大得王之財不足以為富服領以南王自治之蘓林曰領山名也如淳曰長沙南界也雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患師古曰彼此共棄故云分終今以來通使如故師古曰從今通使至於終久故云終今以來也故使賈馳諭告王朕意王亦受之毋為寇災矣上褚五十衣中褚三十衣下褚二十衣遺王師古曰以綿裝衣曰褚上中下者綿之多少薄厚之差也褚音竹呂反願王聽樂娛憂存問鄰國師古曰謂東越及甌駱等陸賈至南粤王恐乃頓首謝願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粤吏也髙皇帝幸賜臣佗璽以為南粤王使為外臣時内貢職師古曰言以時輸入貢職孝惠皇帝即位義不忍絕所以賜老夫者甚厚髙后自臨用事近細士信讒臣師古曰細士猶言小人也别異蠻夷出令曰毋予蠻夷外粤金鐵田器馬牛羊師古曰言非中國故云外越即予予牡毋與牝師古曰恐其蕃息老夫處辟馬牛羊齒已長師古曰辟讀曰僻齒已長謂老也自以祭祀不脩有死罪使内史藩中尉髙御史平凡三輩上書謝過皆不反又風聞老夫}
