  - {type: variant, offset: 9195, length: 5, content: 毉往問疾后, WYG: 軍已幷兩軍即急擊朝鮮朝鮮相路人相韓陶尼谿相參將軍王唊應劭曰凡五人也戎狄不知官紀故皆稱相師古曰相路人一也相韓陶二也尼谿相參三也將軍王唊四也應氏乃云五人誤讀為句謂尼谿人名失之矣不當尋下文乎唊音頰相與謀曰始欲降樓船樓船今執獨左將軍幷將戰益急恐不能與如淳曰不能與左將軍相持也師古曰此說非也不能與猶言不如也王又不肻降陶唊路人皆亡降漢路人道死元封三年夏尼谿相參廼使人殺朝鮮王右渠來降王險城未下故右渠之}
