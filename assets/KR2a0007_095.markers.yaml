  - {type: variant, offset: 6, length: 1, content: 七, WYG: 五南夷君長以十數夜郎最大師古曰後為縣屬䍧柯郡其西靡莫之屬以十數滇最大師古曰地有滇池因為名也滇音顚自滇以北君長以十數卭都最大師古曰今之卭州本其地此皆椎結師古曰椎音直追反結讀曰髻為髻如椎之形也陸賈傳及貨殖傳皆作魋字音義同耳此}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_095-1b, image: WYG0251/WYG0251-0134b.png}
  - {type: variant, offset: 6, length: 1, content: 七, krp: 五南夷君長以十數夜郎最大師古曰後為縣屬䍧柯郡其西靡莫之屬以十數滇最大師古曰地有滇池因為名也滇音顚自滇以北君長以十數卭都最大師古曰今之卭州本其地此皆椎結師古曰椎音直追反結讀曰髻為髻如椎之形也陸賈傳及貨殖傳皆作魋字音義同耳此}
