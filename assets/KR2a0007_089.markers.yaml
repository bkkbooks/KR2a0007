  - {type: variant, offset: 7999, length: 3, content: 悉留漢, WYG: 見賞以官宋祁曰姚本正文刪以字坐同産有罪劾免師古曰同産謂兄弟也宋祁曰景本無罪字後復入穀沈黎郡補左馮翊二百石卒史如淳曰三輔郡得仕用他郡人而卒史獨二百石所謂尤異者也馮翊以霸入財為官不署右職師古曰輕其為人也右職高職也}
