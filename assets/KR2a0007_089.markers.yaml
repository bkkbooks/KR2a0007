  - {type: punctuation, offset: 10939, content: 「, id: KR2a0007_tls_089-bkkpn2111}
  - {type: variant, offset: 10939, length: 0, content: '', WYG: 霸具為區處師古曰區處謂分别而處置也音昌女反某所大木可以為棺某亭猪子可以祭宋祁曰猪當作豬吏徃皆如言其識事聰明如此師古曰識記也音式二反吏民不知所出師古曰不知其用何術也咸稱神明姦人去入它郡盗賊日少霸力行教化而後誅罰師古曰力猶勤也言先以徳教化於下若有弗從然後用刑罰也務在成就全安長吏師古曰不欲易代及損傷之也許丞老病聾如淳曰許縣丞督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及姦吏縁絶簿書盗財物師古曰縁因也因交代之際而棄匿簿書以盗官物也公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寛内明得吏民心户口歲増治為天下第一徵守京兆尹秩二千石坐發民治馳道不先以聞又發騎士詣北軍馬不適士孟康曰闗西人謂補滿為適馬少士多不相補滿也宋祁曰不先以聞姚本作不先聞蕭該音義適􅀈足也􅀈音相代反韋昭音詩歴反案今漢書􅀈字作適字注云適始歴反予謂與韋昭音同劾乏軍興}
