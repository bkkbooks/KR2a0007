  - {type: variant, offset: 11069, length: 1, content: 田, WYG: 卒史舉賢良為大司農丞遷北海太守以治行第一入為大司農為人淳厚篤於故舊然性公正不可交以私天子器之朝廷敬焉是時張敞為膠東相與邑書曰明主游心太古廣延茂士師古曰茂善也此誠忠臣竭思之時也直敞遠守劇郡馭於繩墨師古曰直讀曰值匈臆約結固亡竒也師古曰約屈也雖有亦安所施師古曰言在逺郡無足展效也宋祁曰注文舊作放姚本改作效足下以清明之徳掌周稷之業師古曰司農主百榖故云周稷之業猶饑者甘糟糠穰歲餘粱肉師古曰穰嵗豐穰之嵗穰音攘何則有亡之勢異也昔陳平雖賢須魏倩而後進蘇林曰魏無知也韋昭曰無知字也師古曰倩士之美稱故云魏倩也而韋氏便以為無知之字非也譬猶謂汲黯為汲直黯豈字直乎且次下句云賴蕭公而後信亦非何之字也韓信雖竒賴蕭公而後信師古曰信謂為君上所信任也一説信讀曰伸得伸其材用也故事各逹其時之英俊宋祁曰事當作士若必伊尹吕望而後薦之則此人不因足下而進矣師古曰言能自逹也邑感敞言貢薦賢士大夫多得其􅂇者身為列卿居處儉節禄賜以共九族鄉黨師古曰共讀曰供家亡餘財神爵元年卒天子閔惜下詔稱揚曰大司農邑廉潔守節退食自公亡疆外之交束脩之餽師古曰餽與饋同宋祁曰亡疆景本作亡彊可謂淑人君子遭離凶災朕甚閔之師古曰離亦遭其賜邑子黄金百斤以奉其祭祀初邑病且死屬其子師古曰屬音之欲反曰我故為桐鄉吏其民愛我必𦵏我桐鄉後世子孫奉甞我不如桐鄉民師古曰甞謂蒸甞之祭及死其子𦵏之桐鄉西郭外民果然共為邑起冡立祠嵗時祠祭至今不絶龔遂字少卿山陽南平陽人也以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節内諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已師古曰蹇蹇不阿}
