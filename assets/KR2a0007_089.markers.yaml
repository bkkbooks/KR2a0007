  - {type: variant, offset: 3563, length: 4261, content: 係虖淺奉書請獻橐佗一騎馬二駕二駟皇帝即不欲匈奴近塞則且詔吏民遠舍使者至即遣之六月中來至新望之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊也且得匈奴地澤鹵非可居也和親甚便漢許之孝文前六年遣匈奴書曰皇帝敬問匈奴大單于無恙使係虖淺遺朕書云願寢兵休士除前事復故約以安邊民世世平樂朕甚嘉之此古聖王之志也漢與匈奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在匈奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡袷綺衣長襦錦袍各一比疏一黃金飭具帶一黃金犀毗一繡十匹錦二十匹赤綈綠繒各四十匹使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立號曰老上單于老上稽粥單于初立文帝復遣宗人女翁主為單于閼氏使宦者燕人中行說傅翁主說不欲行漢強使之說曰必我也為漢患者中行說既至因降單于單于愛幸之初單于好漢繒絮食物中行說曰匈奴人眾不能當漢之一郡然所以強之者以衣食異無卬於漢今單于變俗好漢物漢物不過什二則匈奴盡歸於漢矣其得漢絮繒以馳草棘中衣袴皆裂弊以視不如旃裘堅善也得漢食物皆去之以視不如重酪之便美也於是說教單于左右疏記以計識其人眾畜牧漢遺單于書以尺一牘辭曰皇帝敬問匈奴大單于無恙所以遺物及言語云云中行說令單于以尺二寸牘及印封皆令廣長大倨驁其辭曰天地所生日月所置匈奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言匈奴俗賤老中行說窮漢使曰而漢俗屯戍從軍當發者其親豈不自奪溫厚肥美齎送飲食行者乎漢使曰然說曰匈奴明以攻戰為事老弱不能鬭故以其肥美飲食壯健以自衛如此父子各得相保何以言匈奴輕老也漢使曰匈奴父子同穹廬臥父死妻其後母兄弟死盡妻其妻無冠帶之節闕庭之禮中行說曰匈奴之俗食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寬則人樂無事約束徑易行君臣簡可久一國之政猶一體也父兄死則妻其妻惡種姓之失也故匈奴雖亂必立宗種今中國雖陽不取其父兄之妻親屬益疏則相殺至到易姓皆從此類也且禮義之敝上下交怨而室屋之極生力屈焉夫力耕桑以求衣食築城郭以自備故其民急則不習戰攻緩則罷於作業嗟土室之人顧無喋喋佔佔冠固何當自是之後漢使欲辯論者中行說輒曰漢使毋多言顧漢所輸匈奴繒絮米蘖令其量中必善美而已何以言為乎且所給備善則已不備善而苦惡則侯秋孰以騎馳蹂乃稼穡也日夜教單于侯利害處孝文十四年匈奴單于十四萬騎入朝那蕭關殺北地都尉卬虜人民畜產甚多遂至彭陽使騎兵入燒回中宮侯騎至雍甘泉於是文帝以中尉周舍郎中令張武為將軍發車千乘十萬騎軍長安旁以備胡寇而拜昌侯盧卿為上郡將軍甯侯魏遫為北地將軍降慮侯周竈為隴西將軍東陽侯張相如為大將軍成侯董赤為將軍大發車騎往擊胡單于留塞內月餘漢逐出塞即還不能有所殺匈奴日以驕歲入邊殺略人民甚眾雲中遼東最甚郡萬餘人漢甚患之乃使使遺匈奴書單于亦使當戶報謝復言和親事孝文後二年使使遣匈奴書曰皇帝敬問匈奴大單于無恙使當戶且渠雕渠難郎中韓遼朕馬二匹已至敬受先帝制長城以北引弓之國受令單于長城以內冠帶之室朕亦制之使萬民耕織射獵衣食父子毋離臣主相安俱無暴虐今聞渫惡民貪降其趨背義絕約忘萬民之命離兩主之驩然其事已在前矣書云二國已和親兩主驩說寢兵休卒養馬世世昌樂翕然更始朕甚嘉之聖者日新改作更始使老者得息幼者得長各保其首領而終其天年朕與單于俱由此道順天恤民世世相傳施之無窮天下莫不咸嘉漢與匈奴鄰敵之國匈奴處北地寒殺氣早降故詔吏遺單于秫糵金帛綿絮它物歲有數今天下大安萬民熙熙獨朕與單于為之父母朕追念前事薄物細故謀臣計失皆不足以離昆弟之驩朕聞天不頗覆地不偏載朕與單于皆捐細故俱蹈大道墮壞前惡以圖長久使兩國之民若一家子元元萬民下及魚鱉上及飛鳥跂行喙息蝡動之類莫不就安利避危殆故來者不止天之道也俱去前事朕釋逃虜民單于母言章尼等朕聞古之帝王約分明而不食言單于留志天下大安和親之後漢過不先單于其察之單于既約和親於是制詔御史匈奴大單于遺朕書和親已定亡人不足以益眾廣地匈奴無入塞漢無出塞犯今約者殺之可以久親後無咎俱便朕已許其布告天下使明知之後四年老上單于死子軍臣單于立而中行說復事之漢復與匈奴和親軍臣單于立歲餘匈奴復絕和親大入上郡雲中各三萬騎所殺略甚眾於是漢使三將軍軍屯北地代屯句注趙屯飛狐口緣邊亦各堅守以備胡寇又置三將軍軍長安西細柳渭北棘門霸上以備胡胡騎入代句注邊烽火通於甘泉長安數月漢兵至邊匈奴亦遠塞漢兵亦罷後歲餘文帝崩景帝立而趙王遂乃陰使於匈奴吳楚反欲與趙合謀入邊漢圍破趙匈奴亦止自是後景帝復與匈奴和親通關市給遺單于遣翁主如故約終景帝世時時小入盜邊無大寇武帝即位明和親約束厚遇關市饒給之匈奴自單于以下皆親漢往來長城下漢使馬邑人聶翁壹間闌出物與匈奴交易陽為賣馬邑城以誘單于單于信之而貪馬邑財物乃以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為護軍將軍護四將軍以伏單于單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時雁門尉史行徼見寇保此亭單于得欲刺之尉史知漢謀乃下具告單于單于單于大驚曰吾固疑之乃引兵還出引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱單于不至以故無所得將軍王恢部出代擊胡輜重聞單于還兵多不敢出漢以恢本建造兵謀而不進誅恢自是後匈奴絕和親攻當路塞往往入盜於邊不可勝數然匈奴貪尚樂關市耆漢財物漢亦通關市不絕以中之自馬邑軍後五歲之秋漢使四將各萬騎擊胡關市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七千李廣出雁門為胡所敗匈奴生得廣廣道亡歸漢囚敖廣敖廣贖為庶人其冬匈奴數千人盜邊漁陽尤甚漢使將軍韓安國屯漁陽備胡其明年秋匈奴二萬騎入漢殺遼西太守略二千餘人又敗漁陽太守軍千餘人圍將軍安國安國時千餘騎亦且盡會燕救之至匈奴乃去又入雁門殺千餘人於是漢使將軍衛青將三萬騎雁門李息出代郡擊胡得首虜數千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時恬所為塞因河而為固漢亦棄上谷之斗辟縣造陽地予胡是歲元朔二年也其後冬軍臣單于死其弟左谷蠡王伊穉斜自立為單于攻敗軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月死伊穉斜單于既立其夏匈奴數萬騎入代郡殺太守共友略千餘人秋又入鴈門殺略千餘人其明年又入代郡定襄上郡各三萬騎殺略數千人匈奴右賢王怨漢奪之河南地而築朔方數寇盜邊及入河南侵擾朔方殺略吏民甚眾其明年春漢遣衛青將六將軍十餘萬人出朔方高闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脫身逃走精騎往往隨後去漢將軍得右賢王人眾男女萬五千人裨小王十餘人其秋匈奴萬騎入代郡殺都尉朱央略千餘人其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里擊匈奴得首虜前後萬九千餘級而漢亦亡兩將軍三千餘騎右將軍建得以身脫而前將軍翕侯趙信兵不利降匈奴趙信者故胡小王降漢漢封為翕侯以前將軍與右將軍并軍介獨遇單于兵故盡沒單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絕幕以盡罷漢兵徼極而取之毋近塞單于從之其明年胡數萬騎入上谷殺數百人明年春漢使票騎將軍去病將萬騎隴西過焉耆山千餘里得胡首虜八十餘級得休屠王祭天金人其夏票騎將軍復與合騎侯數萬出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級裨小王以下十餘人是時匈奴亦來入代郡鴈門殺略數百人漢使博望侯及李將軍廣出右北平擊匈奴左賢王左賢王圍李廣廣軍四千人死者過半殺虜亦過當會博望侯軍救至李將軍得脫盡亡其軍合騎侯後票騎將軍期及博望侯皆當死贖為庶人其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使票騎將軍迎之昆邪王殺休屠王并將其眾降漢凡四萬餘人號十萬於是漢已得昆邪則隴西北地河西益少胡寇徙關東貧民處所奪匈奴河南地新秦中以實之而減北地以西戍卒半明年春匈奴入右北平定襄各數萬騎殺略千餘人其明年春漢謀以為翕侯信為單于計居幕北以為漢兵不能至乃粟馬發十萬騎私負從馬凡十四萬匹糧重不與焉令大將軍青票騎將軍去病中分軍大將軍出定襄票騎將軍出代咸約絕幕擊匈奴單于聞之遠其輜重以精兵待於幕北與漢大將軍接戰一日會暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵遂獨與壯騎數百潰漢圍西北遁走漢兵夜追之不得行捕斬首虜凡萬九千級北至窴顏山趙信城而還單于之走其兵往往與漢軍相亂而隨單于單于久不與其大眾相得右谷蠡王以為單于死乃自立為單于真單于復得其眾右谷蠡乃去號復其故位票騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走票騎封於狼居胥山禪姑衍臨翰海而還是後匈奴遠遁而幕南無王庭漢度河自朔方以西至令居往往通渠置田官吏卒五六萬人稍蠶食地接匈奴以北初漢兩將大出圍單于所殺虜八九萬而漢士物故者亦萬數漢馬死者十餘萬匹匈奴雖病遠去而漢馬亦少無以復往單于用趙信計遺使好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰匈奴新困宜使為外臣朝請於邊漢使敞使於單于單于聞敞計大怒留之不遣先是漢亦有所降匈奴使者單于亦輒留漢使相當漢方復收士馬會票騎將軍去病死於是漢久不北擊胡數歲伊穉斜單于立十三年死子烏維立為單于是歲元鼎三年也烏維單于立而漢武帝始出巡狩郡縣其後漢方南誅兩越不擊匈奴亦不入邊烏維立三年漢已滅兩越遣故太僕公孫賀將萬五千騎出九原二千餘里至浮苴井從票侯趙破奴萬餘騎出令居數千里至匈奴河水皆不見匈奴一人而還是時天子巡邊親至朔方勒兵十八萬騎以見武節而使郭吉風告單于既至匈奴匈奴主客問所使郭吉卑體好言曰吾見單于而口言單于見吉吉曰南越王頭已縣於漢北闕下今單于即能前與漢戰天子自將兵待邊即不能亟南面而臣於漢何但遠走亡匿於幕北寒苦無水草之地為語卒單于大怒立斬主客見者而留郭吉不歸遷辱之北海上而單于終不肯為寇於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬王烏北地人習胡俗去其節黥面入廬單于愛之陽許曰吾為遣其太子入質於漢以求和親漢使楊信使於匈奴是時漢東拔濊貉朝鮮以為郡而西置酒泉郡以隔絕胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國又北益廣田至眩雷為塞而匈奴終不敢以為言是歲翕侯信死漢用事者以匈奴已弱可臣從也楊信為人剛直屈強素非貴臣也單于不親欲召入不肯去節乃坐穹廬外見楊信楊信說單于曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣翁主給繒絮食物有品以和親而匈奴亦不復擾邊今乃欲反古今吾太子為質無幾矣匈奴俗見漢使非中貴人其儒生以為欲說折其辭辯少年以為欲刺折其氣每漢兵入匈奴匈奴輒報償漢留匈奴使匈奴亦留漢使必得當乃止楊信既歸漢使王烏等如匈奴匈奴復讇以甘言欲多得漢財物紿王烏曰吾欲入漢見天子面相結為兄弟王烏歸報漢漢為單于築邸于長安匈奴曰非得漢貴人使吾不與誠語匈奴使其貴人至漢病服藥欲愈之不幸而死漢使路充國佩, WYG: ''}
