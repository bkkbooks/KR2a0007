  - {type: variant, offset: 12204, length: 673, content: 郡備虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犁胡次等入漢請和親未報會單于死是歲神爵二年也虛閭權渠單于立九年死自始立而黜顓渠閼氏顓渠閼氏即與右賢王私通右賢王會龍城而去顓渠閼氏語以單于病甚且勿遠後數日單于死郝宿王刑未央使人召諸王未至顓渠閼氏與其弟左大且渠都隆奇謀立右賢王屠耆堂為握衍朐鞮單于握衍朐鞮單于者代父為右賢王烏維單于耳孫也握衍朐鞮單于立復修和親遣弟伊酋若王勝之入漢獻見單于初立凶惡盡殺虛閭權渠時用事貴人刑未央等而任用顓渠閼氏弟都隆奇又盡免虛閭權渠子弟近親而自以其子弟代之虛閭權渠單于子稽侯狦既不得立亡歸妻父烏禪幕烏禪幕者本烏孫康居間小國數見侵暴率其眾數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其眾居右地日逐王先賢撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其眾數萬騎歸漢漢封日逐王為歸德侯單于更立其從兄薄胥堂為日逐王明年單于又殺先賢撣兩弟烏禪幕請之不聽心恚其後左奧鞬王死單于自立其小子為奧鞬王留庭奧鞬貴人共立故奧鞬王子為王與俱東徙單于遣右丞相將萬騎往擊之失亡數千人不勝時單于已立二歲暴虐殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨其明年烏桓擊匈奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯狦為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰匈奴共攻我若肯發兵助我乎右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我握衍朐鞮單于恚自殺左大且渠都隆奇亡之右賢王所其民眾盡呼韓邪單于是歲神爵四年也握衍朐鞮單于立三年而敗, WYG: 考證}
