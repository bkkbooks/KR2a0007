  - {type: variant, offset: 1387, length: 374, content: 壯令將萬騎冒頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬行獵獸有不射鳴鏑所射輒斬之已而冒頓以鳴鏑自射善馬左右或莫敢射冒頓立斬之居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射復斬之頃之冒頓出獵以鳴鏑射單于善馬左右皆射之於是冒頓知其左右可用從其父單于頭曼獵以鳴鏑射頭曼其左右皆隨鳴鏑而射殺頭曼盡誅其後母與弟及大臣不聽從者於是冒頓自立為單于冒頓既立時東胡強聞冒頓殺父自立乃使使謂冒頓曰欲得頭曼時號千里馬冒頓問群臣群臣皆曰此匈奴寶馬也勿予冒頓曰奈何與人鄰國愛一馬乎遂與之頃之東胡以為冒頓畏之使使謂冒頓曰欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏予東胡東胡王愈驕西侵與匈奴中間有棄地莫居千餘里各居其邊為甌脫東胡使使謂冒頓曰匈奴所與我界甌脫外棄地匈奴不能至也吾欲有之冒頓問群臣或曰此棄地予之於是冒頓大怒曰地者國, WYG: 太守吏民}
