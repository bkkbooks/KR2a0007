  - {type: variant, offset: 11006, length: 0, content: '', krp: 五鳳三年宋祁曰景本三作二代丙吉為丞相封建成侯食邑六百户霸材長於治民及為丞相總綱紀號令風采不及丙魏于定國功名損於治郡時京兆尹張敞舎鶡雀飛集丞相府蘓林曰今虎賁所著鶡也師古曰蘓説非也此鶡音芬字本作鳻此通用耳鳻雀大而色青出羗中非武賁所著也武賁鶡色黒出上黨以其鬭死不止故用其尾飾武臣首云今時俗人所謂鶡鷄者也音曷非此鳻雀也宋祁曰注文鶡音介字本作䲸今本誤作芬竝鳻字予見徐鍇本改芬為介鳻為䲸案許慎説文䲸音古拜反鳥似鶡而色青出羗中與師古所引合徐改為允鳻是鳥聚貌非鳥名霸以為神雀議欲以聞敞奏霸曰竊見丞相請與中二千石博士雜問郡國上計長吏宋祁曰吏當作史守丞為民興利除害成大化條其對有耕者讓畔男女異路道不拾遺及舉孝子弟弟貞婦者為一輩先上殿師古曰丞相所坐屋也古者屋之高嚴通呼為殿不必宫中也宋祁曰景本無弟弟字舉而不知其人數者次之不為條教者在後叩頭謝丞相宋祁曰邵本無後字當作在後雖口不言而心欲其為之也長吏守丞對宋祁曰吏當作史下文上計長吏同時臣敞舎有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏師古曰圖謀也曰臣聞上計長吏守丞以興化條師古曰凡言條者一一而疏舉之若木條然皇天報下神雀後知從臣敞舎來乃止郡國吏竊笑丞相仁厚有知畧微信竒怪也昔汲黯為淮陽守辭去之官謂大行李息曰御史大夫張湯懐詐阿意以傾朝廷公不早白與俱受戮矣息畏湯終不敢言後湯誅敗上聞黯與息語乃抵息罪而秩黯諸侯相取其思竭忠也臣敞非敢毁丞相也誠恐羣臣莫白而長吏守丞宋祁曰吏當作史畏丞相指歸舎法令各為私教師古曰舎廢也務相増加澆淳散樸師古曰不雜為淳以水澆之則味漓薄樸大質也割之則散也並行偽貌有名亡實傾揺觧怠甚者為妖師古曰觧讀曰懈假令京師先行讓畔異路道不拾遺其實亡益廉貪貞滛之行而以偽先天下固未可也即諸侯先行之偽聲軼於京師非細事也師古曰軼過也音逸漢家承敝通變造起律令即以勸善禁姦條貫詳備不可復加宜令貴臣明飭長吏守丞師古曰飭讀與勅同以下類此宋祁曰吏當作史歸告二千石舉三老孝弟力}
  - {type: variant, offset: 11007, length: 1, content: 廣, WYG: 孝廉廉吏務得其人郡事皆以義法令檢式師古曰檢扃也音居儉反宋祁曰郡字疑作群字毋得擅為條教敢挾詐偽以奸名譽者必先受戮師古曰奸求也音干以正}
  - {type: variant, offset: 11007, length: 1, content: 廣, krp: 孝廉廉吏務得其人郡事皆以義法令檢式師古曰檢扃也音居儉反宋祁曰郡字疑作群字毋得擅為條教敢挾詐偽以奸名譽者必先受戮師古曰奸求也音干以正}
  - {type: variant, offset: 11009, length: 0, content: '', WYG: 好惡天子嘉納敞言召上計吏使侍中臨飭如敞􅃌意霸甚慙又樂陵侯史高以外屬舊恩侍中貴重霸薦高可太尉天子使尚書召問霸太尉官罷乆矣丞相兼之所以偃武興文也如國家不虞邊境有事師古曰如若也左右之臣皆將帥也夫宣明教化通逹幽隐使獄亡􅁈刑邑亡盗賊君之職也將相之官朕之任焉師古曰言欲拜将相事自在朕也侍中樂陵侯高帷幄近臣朕之所自親師古曰具知其材質君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃決師古曰乃得免罪自是後不敢復有所請然自漢興言治民吏以霸}
