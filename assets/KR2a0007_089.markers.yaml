  - {type: variant, offset: 1764, length: 3, content: 奈何予, WYG: 宋祁曰越本無也字姚本刪數變易則下不安民知其將乆不可欺罔廼服從其教化故二千石有治理效輒以璽書勉厲増秩賜金或爵至闗内侯公卿缺則選諸所表以次用之師古曰所表謂増秩賜金爵也是故漢世良吏於是為盛稱中興焉若趙廣漢韓延夀尹翁歸嚴延年張敞之屬皆稱其位然任刑罰或抵罪誅師古曰抵至也音丁禮反王成黄霸朱邑龔遂鄭𢎞召信臣等師古曰召讀曰邵所居民富所去見思生有榮號死見奉祀此廩廩庻幾徳讓君子之遺風矣師古曰廩廩言有風采也文翁廬江舒}
