  - {type: variant, offset: 7984, length: 0, content: '', WYG: 長史皆一物也故總言郡國上計長史守丞後漢百官志諸侯王相如太守長史如郡丞又邊郡有丞元有長史長史上計無疑矣長史}
  - {type: variant, offset: 7984, length: 0, content: '', krp: 長史皆一物也故總言郡國上計長史守丞後漢百官志諸侯王相如太守長史如郡丞又邊郡有丞元有長史長史上計無疑矣長史}
  - {type: variant, offset: 7985, length: 0, content: '', WYG: 通於令丞尉之稱與守丞連言之説不可不爾下言長史守丞同黄霸字次公淮陽陽夏人也師古曰夏音工雅反以豪桀役使徙雲陵師古曰身為豪桀而役使鄉里人也霸少學律令喜為吏師古曰喜謂愛好也音許吏反武帝末以待詔}
