  - {type: variant, offset: 8015, length: 8, content: 匈奴使來漢亦輒留, WYG: 遷補復察亷為河南太守丞霸為人明察内敏師古曰内敏言心思捷疾也又習文法然温良有讓足知善御衆為丞處議當於法合人心太守甚任}
