  - {type: variant, offset: 10931, length: 0, content: '', WYG: 在民間時知百姓苦吏急也聞霸持法平召以為廷尉正數決疑獄庭中稱平師古曰此庭中謂廷尉之中宋祁曰庭當作廷下文同守丞相長史坐公卿大議庭中師古曰大議總㑹議也此庭中謂朝廷之中知長信少府夏侯勝非議詔書大不敬霸阿從不舉劾皆下廷尉師古曰勝及霸俱下廷尉繫獄當死霸因從勝受尚書獄中再隃冬師古曰隃與踰同積三嵗廼出語在勝傳勝出復為諌大夫令左馮翊宋畸舉霸賢良勝又口薦霸於上上擢霸為揚州刺史三歲宣帝下詔曰制詔御史其以賢良高第揚州刺史霸為潁川太守秩比二千石居官賜車蓋特高一丈别駕主簿車緹油屏泥於軾前以章有徳宋祁曰景本越本自賜車蓋止以章有徳無此二十三字時上垂意於治數下恩澤詔書吏不奉宣師古曰不令百姓皆知也太守霸為選擇良吏分部宣布詔令師古曰分音扶問反宋祁曰太守當在為字下劉攽曰太守字當在霸為字下令民咸知上意使郵亭鄉官皆畜雞豚師古曰郵亭書舍謂傳送文書所止處亦如今之驛舘矣鄉官者鄉所治處也以贍鰥寡貧窮者然後為條教置父老師帥伍長班行之於民間勸以為善防姦之意及務耕桑節用殖財種樹畜飬去食榖馬米鹽靡宻初若煩碎師古曰米鹽言雜而且細然霸精力能推行之吏民見者語次尋繹師古曰繹謂抽引而出也問它隂伏以相參考嘗欲有所司察擇長年廉吏遣行屬令周宻師古曰屬戒也周宻不泄漏也屬音之欲反吏出不敢舎郵亭師古曰舎止也食於道旁}
