  - {type: variant, offset: 11599, length: 3, content: 乘弱攻, krp: 口種一樹榆百本䪥五十本葱一畦韭師古曰毎一口即如此種也家二母彘五雞師古曰毎一家則如此飬之也民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畆師古曰趨讀曰趣趣嚮也秋冬課收斂益畜果實蓤芡勞來循行郡中皆有畜積師古曰蓤芰也芡雞頭也勞來勸勉也畜讀曰蓄芡音儉勞音盧到反來音盧代反吏民皆富實獄訟止息數年上遣使者徵遂議曹王生願從功曹以王生素耆酒亡節度不可使師古曰耆讀曰嗜遂不忍逆從至京師王生日飲酒不視太守師古曰日日恒飲酒也㑹遂引入宫王生醉從後呼曰師古曰呼音火故反明府且止願有所白遂還問}
  - {type: variant, offset: 11603, length: 0, content: '', WYG: 故師古曰還回也王生曰天子即問君何以治勃海君不可有所陳對宜曰皆聖主之徳非小臣之力也遂受其言既至前上果問以治状遂對如王生言天子説其有讓師古曰説讀曰悦笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也上以遂年老不任公卿拜為水衡都尉議曹王生為水衡丞以襃顯遂云水衡典上林禁苑共張宫館師古曰共音居用反張音知亮反下亦同為宗廟取牲官職親近上甚重之以官夀卒師古曰以夀終而卒於官也召信臣字翁卿九江壽春人也師古曰召讀曰邵以明經甲科為郎出補穀陽長舉高第遷上蔡長其治視民如子所居見稱述超為零陵太守病歸復徵為諫大夫遷南陽太守其治如上蔡信臣為人勤力有方畧好為民興利務在富之躬勸耕農出入阡陌止舎離鄉亭師古曰言休息之時皆在野次稀有安居時行視郡中水泉師古曰行音下更反開通溝瀆起水門提閼凡數十處師古曰閼所以壅水音一曷反以廣溉灌歳歳増加多至三萬頃民得其利畜積有餘師古曰畜讀曰蓄信臣為民作均水約束師古曰言用之有次第也刻石立於田畔以防分爭禁止嫁娶送終奢靡務出於儉約府縣吏家子弟好游敖不以田作為事輒斥罷之甚者案其不法以視好惡師古曰視讀曰示其化大行郡中莫不耕稼力田百姓歸之户口増倍盗賊獄訟衰止吏民親愛信臣號之曰召父荆州刺史奏信臣為百姓興利郡以殷富賜黄金四十斤遷河南太守治行常為第一復數増秩賜金竟寕中徵為少府列於九卿奏請上林諸離逺宫館稀幸御者勿復繕治共張又奏省樂府黄門倡優諸戲及宫館兵弩什器減過太半太官園種冬生葱韭菜茹覆以屋廡師古曰廡周室也茹音人庶反廡音舞晝夜㸐藴火待温氣乃生師古曰㸐古然字藴火蓄火也藴音於云反信臣以為此皆不時之物有傷於人不宜以奉供飬及它非法食物悉奏罷省費歳數千萬師古曰素所費者今皆省也信臣年老以官卒元始四年詔書祀百辟卿士有益於民者師古曰百辟百官蜀郡以文翁九江以召父應詔書歳時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠前漢書卷八十九前漢書卷八十九考證循吏傳以寛厚清静為天下帥注師古曰帥遵也臣召南按帥是率先之意顔注非也文翁傳蜀地學于京師者比齊魯焉臣召南按蜀志秦宓曰文翁遣司馬相如東受七經還教吏民然則相如即文翁所㧞以為蜀人師者其語與地理志所云繇文翁倡其教相如為之師者正合但此傳及相如傳並無明文文翁之化也注師古曰文翁學堂於今猶在益州城内臣召南按文翁學堂即石室講堂也水經注曰文翁為蜀守立講堂作石室於南城後守更増二石室顔有意益州學館記曰華陽國志文翁講堂石室一名玉堂安帝初間烈火為災惟石室獨存至獻帝興平元年太守高联於玉堂東更造一石室為周公禮殿唐志有益州文翁學堂圖一卷黄覇傳風采不及丙魏于定國臣召南按此總計孝宣朝名相而言覇前不及丙魏後不及定國也定國為相實在覇後君何越職而舉之胡三省曰丞相職總百官進賢退不肖覇薦史高以為所薦非其人可也以為越職則不可也葢自武帝以来丞相之失其職也乆矣臣召南按自武帝以後外廷之官統于丞相中朝之官統于大司馬覇以丞相而舉史高堪大司馬故以越職責之朱邑傳少時為舒桐鄉嗇夫按鄉吏之有秩者曰三老曰嗇夫曰游徼嗇夫職聽訟獄收賦税龔遂傳拜為水衡都尉臣召南按公卿表遂以地節四年為水衡都尉即朱邑以}
