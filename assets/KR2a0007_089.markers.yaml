  - {type: variant, offset: 2142, length: 1057, content: 逐水草移徙而左右賢王左右谷蠡最大國左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王相都尉當戶且渠之屬歲正月諸長小會單于庭祠五月大會龍城祭其先天地鬼神秋馬肥大會蹛林課校人畜計其法拔刃尺者死坐盜者沒入其家有罪小者軋大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向日上戊己其送死有棺椁金銀衣裳而無封樹喪服近幸臣妾從死者多至數十百人舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一卮酒而所得鹵獲因以予之得人以為奴婢故其戰人人自為趨利善為誘兵以包敵故其逐利如鳥之集其困敗瓦解雲散矣戰而扶轝死者盡得死者家財後北服渾寙屈射丁零隔昆新䔣之國於是匈奴貴人大臣皆服以冒頓為賢是時漢初定徙韓王信於代都馬邑匈奴大攻圍馬邑韓信降匈奴匈奴得信因引兵南踰句注攻太原至晉陽下高帝自將兵往擊之會冬大寒雨雪卒之墮指者十二三於是冒頓陽敗走誘漢兵漢兵逐擊冒頓冒頓匿其精兵見其羸弱於是漢悉兵多步兵三十二萬北逐之高帝先至平城步兵未盡到冒頓縱精兵三十餘萬騎圍高帝於白登七日漢兵中外不得相救餉匈奴騎其西方盡白東方盡駹北方盡驪南方盡騂馬高帝乃使使間厚遺閼氏閼氏乃謂冒頓曰兩主不相困今得漢地單于終非能居之且漢主有神單于察之冒頓與韓信將王黃趙利期而兵久不來疑其與漢有謀亦取閼氏之言乃開圍一角於是高皇帝令士皆持滿傅矢外鄉從解角直出得與大軍合而冒頓遂引兵去漢亦引兵罷使劉敬結和親之約是後韓信為匈奴將及趙利王黃等數背約侵盜代鴈門雲中居無幾何陳豨反與韓信合謀擊代漢使樊噲往擊之復收代鴈門雲中郡縣不出塞是時匈奴以漢將數率眾往降故冒頓常往來侵盜代地於是高祖患之乃使劉敬奉宗室女翁主為單于閼氏歲奉匈奴絮繒酒食物各有數約為兄弟以和親冒頓乃少止後燕王盧綰復反率其黨且萬人降匈奴往來苦上谷以東終高祖世孝惠高后時冒頓寖驕乃為書使使遺高后曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自虞願以所有易其所無高后大怒召丞相平及樊噲季布等議斬其使者發兵而擊之樊噲曰臣願得十萬眾橫行匈奴中問季布布曰噲可斬也前陳豨反於代漢兵三十二萬噲為上將軍時匈奴圍高帝於平城噲不能解圍天下歌之曰平城之下亦誠苦七日不食不能彀弩今歌唫之聲未絕傷痍者甫起而噲欲搖動天下妄言以十萬眾橫行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也高后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖年老氣衰髮齒墮落行步失度單于過聽不足以自汙弊邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親至孝文即位復修和親其, WYG: 節}
