  - {type: variant, offset: 8, length: 3, content: 匈奴其, WYG: 順公法下順人情也漢興之初反秦之敝與民休息凡事簡易禁罔疏闊而相國蕭曹以寛厚清靜為天下帥師古曰帥遵也民作畫一之歌師古曰謂歌曰蕭何為法講若畫一曹參代之守而勿失孝惠垂拱高后女主不出房闥而天下晏然民務稼穡衣食滋殖師古曰滋益也殖生也至于文景遂移風易俗是時循吏如河南守呉公蜀守文翁之屬皆謹身帥}
