  - {type: variant, offset: 11908, length: 295, content: 人而還時匈奴亡其三騎不敢入即引去是歲也匈奴飢人民畜產死十六七又發兩屯各萬騎以備漢其秋匈奴前所得西嗕居左地者其君長以下數千人皆驅畜產行與甌脫戰所戰殺傷甚眾遂南降漢其明年西域城郭共擊匈奴取車師國得其王及人眾而去單于復以車師王昆弟兜莫為車師王收其餘民東徒不敢居故地而漢益遣屯士分田車師地以實之其明年匈奴怨諸國共擊車師遣左右大將各萬騎屯田右地欲以侵迫烏孫西域後二歲匈奴遣左右奧鞬各六千騎與左大將再擊漢之田車師城者不能下其明年丁令比三歲入盜匈奴殺略人民數千驅馬畜去匈奴遣萬餘騎往擊之無所得其明年單于將十萬餘騎旁獵欲入邊寇未至會其民題除渠堂亡降漢言狀漢以為言兵鹿奚盧侯而遣後將軍趙充國將兵四萬餘騎屯緣邊, WYG: ''}
