  - {type: variant, offset: 11071, length: 0, content: '', WYG: 意也易蹇卦曰王臣蹇蹇面刺王過王至掩耳起走曰郎中令善媿人師古曰媿古愧字愧辱也及國中皆畏憚焉師古曰王及國人皆憚之王嘗乆與騶奴宰人游戲飲食賞賜亡度遂入見王涕泣䣛行左右侍御皆出涕王曰郎中令何}
  - {type: variant, offset: 11071, length: 0, content: '', krp: 意也易蹇卦曰王臣蹇蹇面刺王過王至掩耳起走曰郎中令善媿人師古曰媿古愧字愧辱也及國中皆畏憚焉師古曰王及國人皆憚之王嘗乆與騶奴宰人游戲飲食賞賜亡度遂入見王涕泣䣛行左右侍御皆出涕王曰郎中令何}
  - {type: variant, offset: 11072, length: 0, content: '', WYG: 哭遂曰臣痛社稷危也願賜清閒竭愚王辟左右師古曰閒讀曰閑辟音闢遂曰大王知膠西王所以為無道亡乎王曰不知也曰臣聞膠西王有䛕臣侯得王所為儗於桀紂也師古曰儗比也得以為堯舜也王説其謟諛嘗與寢處師古曰説讀曰悦唯得所言以至於是師古曰唯用得之邪言故至亡今大王親近羣小漸漬邪惡所習存亡之機不可不慎也臣請選郎通經術有行義者與王起居坐則誦詩書立則習禮容宜有益王許之遂廼選郎中張安等十人侍王居數日王皆逐去安等乆之宫中數有妖怪王以問遂遂以為有大憂宫室将空語在昌邑王傳㑹昭帝崩亡子昌邑王賀嗣立官屬皆徵入王相安樂遷長樂衛尉遂見安樂流涕謂曰王立為天子日益驕溢諌之不復聽今哀痛未盡師古曰謂新居䘮服日與近臣飲食作樂鬬}
