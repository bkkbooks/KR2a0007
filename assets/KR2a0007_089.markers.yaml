  - {type: variant, offset: 11599, length: 3, content: 乘弱攻, WYG: 口種一樹榆百本䪥五十本葱一畦韭師古曰毎一口即如此種也家二母彘五雞師古曰毎一家則如此飬之也民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畆師古曰趨讀曰趣趣嚮也秋冬課收斂益畜果實蓤芡勞來循行郡中皆有畜積師古曰蓤芰也芡雞頭也勞來勸勉也畜讀曰蓄芡音儉勞音盧到反來音盧代反吏民皆富實獄訟止息數年上遣使者徵遂議曹王生願從功曹以王生素耆酒亡節度不可使師古曰耆讀曰嗜遂不忍逆從至京師王生日飲酒不視太守師古曰日日恒飲酒也㑹遂引入宫王生醉從後呼曰師古曰呼音火故反明府且止願有所白遂還問}
