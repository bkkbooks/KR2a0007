  - {type: variant, offset: 10932, length: 5, content: 孫昆彌復上, WYG: 攫其肉師古曰攫搏持之也攫音厥縛反宋祁曰攫説文曰捽也音九縛反民有欲詣府口言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盗肉吏大驚以霸具知其起居所問豪釐不敢有所隐鰥寡孤獨有死無以𦵏者鄉部}
