  - {type: variant, offset: 1768, length: 0, content: '', WYG: 也少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風師古曰辟讀曰僻文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲師古曰飭與敕同遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士如淳曰金馬書刀今賜計吏是也作馬形於刀環内以金鏤之晉灼曰刀書刀布布刀也舊時蜀郡工官作金馬書刀者似佩刀形金錯其拊布刀謂婦人割裂財布刀也師古曰少府郡掌財物之府以供太守者也刀凡蜀刀有環者也布蜀布細宻環也二者蜀人作之皆善故齎以為貨無限於書刀布刀也如晉二説皆煩而不當也宋祁曰注文細宻環也景本據史館本改作細宻者也數歲蜀生皆成就還歸文翁以為右職師古曰郡中高職也用次察舉官有至郡守刺史者又脩起學官於成都市中師古曰學官學之官舍也招下縣子弟以為學官弟子師古曰下縣四郊之縣非郡所治也為除更繇師古曰不令從役也更音工衡反繇讀曰徭高者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事師古曰便坐别坐可以視事非正廷也坐音財卧反毎出行縣益從學官}
  - {type: page-break, offset: 1768, content: '', id: KR2a0007_WYG_089-3b, image: WYG0251/WYG0251-0031d.png}
