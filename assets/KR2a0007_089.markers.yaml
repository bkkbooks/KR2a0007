  - {type: variant, offset: 862, length: 523, content: 壹自是之後百有餘年晉悼公使魏絳和戎翟戎翟朝晉後百有餘年趙襄子踰句注而破之并代以臨胡貉後與韓魏共滅知伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎界邊其後義渠之戎築城郭以自守而秦稍蠶食之至於惠王遂拔義渠二十五城惠王伐魏魏盡入西河及上郡于秦秦昭王時義渠戎王與宣太后亂有二子宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠於是秦有隴西北地上郡築長城以距胡而趙武靈王亦變俗胡服習騎射北破林胡樓煩自代並陰山下至高闕為塞而置雲中雁門代郡其後燕有賢將秦開為質於胡胡甚信之歸而襲破東胡東胡卻千餘里與荊軻刺秦王秦舞陽者開之孫也燕亦築長城自造陽至襄平置上谷漁陽右北平遼西遼東郡以距胡當是時冠帶戰國七而三國邊於匈奴其後趙將李牧時匈奴不敢入趙邊後秦滅六國而始皇帝使蒙恬將數十萬之眾北擊胡悉收河南地因河為塞築四十四縣城臨河徙適戍以充之而通直道自九原至雲陽因邊山險塹谿谷可繕者繕之起臨洮至遼東萬餘里又度河據陽山北假中當是時東胡強而月氏盛匈奴單于曰頭曼頭曼不勝秦北徙十有餘年而蒙恬死諸侯畔秦中國擾亂諸秦所徙適邊者皆復去於是匈奴得寬復稍度河南與中國界於故塞單于有太子名曰冒頓後有愛閼氏生少子頭曼欲廢冒頓而立少子乃使冒頓質於月氏冒頓既質而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎亡歸頭曼, WYG: ''}
