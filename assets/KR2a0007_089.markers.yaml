  - {type: variant, offset: 11544, length: 2, content: 勝數, WYG: 急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黄金贈遣乘傳至勃海界師古曰傳音張戀反郡聞新太守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盗賊吏諸持鉏鉤田器者皆為良民吏毋得問師古曰鉤鐮也持兵者廼為盗賊遂單車獨行至府郡中翕然盗賊亦皆罷師古曰罷讀曰疲言為盗賊乆心亦疲厭劉奉世曰盗賊與劫畧相随史以為二事故前云盗賊亦皆罷後云劫略者去兵末乃總云盗賊}
