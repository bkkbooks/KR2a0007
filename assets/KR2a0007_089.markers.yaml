  - {type: variant, offset: 1769, length: 78, content: 言與者皆斬之冒頓上馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王虜其民眾畜產既歸西擊走月氏南并樓煩白羊河南王悉復收秦所使蒙恬所奪匈奴, WYG: 生明經飭行}
