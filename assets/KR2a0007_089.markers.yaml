  - {type: variant, offset: 24, length: 338, content: 上有山戎獫允薰粥居于北邊隨草畜牧而轉移其畜之所多則馬牛羊其奇畜則橐佗驢驘駃騠騊駼驒奚逐水草遷徙無城郭常居耕田之業然亦各有分地無文書以言語為約束兒能騎羊引弓射鳥鼠少長則射狐菟肉食士力能彎弓盡為甲騎其俗寬則隨畜田獵禽獸為生業急則人習戰攻以侵伐其天性也其長兵則弓矢短兵則刀鋋利則進不利則退不羞遁走苟利所在不知禮義自君王以下咸食畜肉衣其皮革被旃裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無字夏道衰而公劉失其稷官變于西戎邑于豳其後三百有餘歲戎狄攻太王亶父亶父亡走于岐下豳人悉從亶父而邑焉作周其後百有餘歲周西伯昌伐畎夷後十有餘年武王伐紂而營雒邑復居于酆鎬放逐戎夷涇洛之北以時入貢名曰荒服其後二百有餘年周道衰而周穆王伐畎戎得四白狼四白鹿以歸自是之後荒服, WYG: 亷平}
