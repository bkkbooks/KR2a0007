  - {type: variant, offset: 9168, length: 722, content: 將精兵左安侯度姑且水御史大夫軍至追邪徑無所見還匈奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳卻敵殺傷虜其眾至蒲奴水虜不利還去重合侯軍至天山匈奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵強引去重合侯無所得失是時漢恐車師兵遮重合侯乃遣闓陵將兵別圍車師盡得其王民眾而還貳師將軍將出塞匈奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹貳師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北至范夫人城匈奴奔走莫敢距敵會貳師妻子坐巫蠱收聞之憂懼其掾胡亞夫亦避罪從軍說貳師曰夫人室家皆在吏若還不稱意適與獄會郅居以北可復得見乎貳師由是狐疑欲深入要功遂北至郅居水上虜已去貳師遺護軍將二萬騎度郅居之水一日逢左賢王左大將將二萬騎與漢軍合戰一日漢軍殺左大將虜死傷甚眾軍長史與決眭都尉煇渠侯謀曰將軍懷異心欲危眾求功恐必敗謀共執貳師貳師聞之斬長史引兵還至速邪烏燕然山單于知漢軍勞倦自將五萬遮擊貳師相殺傷甚眾夜塹漢軍前深數尺從後急擊之軍大亂敗貳師降單于素知其漢大將貴臣以女妻之尊寵在衛律上其明年單于遣使遣漢書云南有大漢北有強胡胡者天之驕子也不為小禮以自煩今欲與漢闓大關取漢女為妻歲給遣我蘖酒萬石稷米五千斛雜繒萬匹它如故約則邊不相盜矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也貳師道前太子發兵反何也使者曰然乃丞相私與太子爭鬭太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過耳孰與冒單于身殺其父代立常妻後母禽獸行也單于留使者三歲乃得還貳師在匈奴歲餘衛律害其寵會母閼氏病律飭胡巫言先單于怒曰胡故時祠兵常言得貳師以社今何故不用於是收貳師貳師駡曰我死必滅匈奴遂屠貳師以祠會連雨雪數月畜產死人民疫病穀稼不孰單于恐為貳師立祠室自貳師沒後漢新失將軍士卒數萬人不復出兵三歲, WYG: ''}
