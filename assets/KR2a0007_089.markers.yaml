  - {type: variant, offset: 11010, length: 8, content: 祁連將軍四萬餘騎, WYG: 首為丞相五嵗甘露三年薨諡曰定侯霸死後樂陵侯高竟為大司馬師古曰史著此者亦言霸奏高為太尉適事宜也霸子思侯賞嗣為闗都尉薨子忠侯輔嗣至衛尉九卿薨子忠嗣侯訖王莾廼絶子孫為吏二千石者五六人始霸少為陽夏㳺徼師古曰游徼主徼廵盗賊者也與善相人者共載}
