  - {type: variant, offset: 553, length: 308, content: 後六十有五年而山戎越燕而伐齊齊釐公與戰于齊郊後四十四年而山戎伐燕燕告急齊齊桓公北伐山戎山戎走後二十餘年而戎翟至雒邑伐周襄王襄王出奔于鄭之氾邑初襄王欲伐鄭故取翟女為后與翟共伐鄭已而黜翟后翟后怨而襄王繼母曰惠后有子帶欲立之於是惠后與翟后子帶為內應開戎翟戎翟以故得入破逐襄王而立子帶為王於是戎翟或居於陸渾東至于衛侵盜尤甚周襄王既居外四年乃使使告急於晉晉文公初立欲修霸業乃興師伐戎翟誅子帶迎內襄王于洛邑當是時秦晉為強國晉文公攘戎翟居于西河圜洛之間號曰赤翟白翟而秦穆公得由余西戎八國服於秦故隴以西有緜諸畎戎狄獂之戒在岐梁涇漆之北有義渠大荔烏氏朐衍之戎而晉北有林胡樓煩之戎燕北有東胡山戎各分散谿谷自有君長往往而聚者百有餘戎然莫能, WYG: ''}
