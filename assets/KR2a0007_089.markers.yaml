  - {type: variant, offset: 9964, length: 757, content: 子而左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復會單于庭又單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿單于死詐撟單于令與貴人飲盟更立子左谷蠡王為壼衍鞮單于是歲始元二年也壼衍鞮單于既立風謂漢使者言欲和親左賢王右谷蠡王不得立怨望率其眾欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫謀擊匈奴盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆冤之於是二王去居其所未嘗肯會龍城後二年秋匈奴入代殺都尉單于年少初立母閼氏不正國內乖離常恐漢兵襲之於是衛律為單于謀穿井築城治樓以藏穀與秦人守之漢兵至無奈我何即穿井數百伐材數千或曰胡人不能守城是遺漢糧也衛律於是止乃更謀歸漢使不降者蘇武馬宏等馬宏者前副光祿大夫王忠使西國為匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意是時單于立三歲矣明年匈奴發左右部二萬騎為四隊並入邊為寇漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以為道擊之即西北遠去不敢南逐水草發人民屯甌脫明年復遺九千騎屯受降城以備漢北橋余吾令可度以備奔走是時衛律已死衛律在時常言和親之利匈奴不信及死後兵數困國益貧單于弟左谷蠡王思衛律言欲和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈摩之其後左谷蠡王死明年單于使犁汙王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾右賢王犁汙王四千騎分三隊入日勒屋蘭番和張掖太守屬國都尉發兵擊大破之得脫者數百人屬國千長義渠王騎士射殺犁汙王賜黃金二百斤馬二百匹因封為犁汙王屬國都尉郭忠封成安侯自是後匈奴不敢入張掖其明年匈奴三千餘騎入五原略殺數千人後數萬騎南旁塞獵行攻塞外亭障略取吏民去是時漢邊郡烽火候望精明匈奴為邊寇者少利希復犯塞漢復得匈奴降者言烏桓嘗發先單于家匈怒怨之方發二萬騎擊烏桓, WYG: 㓜}
