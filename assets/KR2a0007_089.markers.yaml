  - {type: punctuation, offset: 8020, content: ，, id: KR2a0007_tls_089-bkkpn1573}
  - {type: 'tls:seg', offset: 8020, content: '', id: KR2a0007_tls_089-50a.12}
  - {type: variant, offset: 8024, length: 1041, content: 相當是歲漢使貳師將軍西伐大宛而令因杅將軍築受降城其冬匈奴大雨雪畜多飢寒死而單于年少好殺伐國中多不安左大都尉欲殺單于使人間告漢曰我欲殺單于降漢漢遠漢即來兵近我我即發初漢聞此言故築受降城猶以為遠其明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里期至浚稽山而還浞野侯既至期左大都尉欲發而覺單于誅之發兵擊浞野侯浞野侯行捕首虜數千人還未至受降城四百里匈奴八萬騎圍之浞野侯夜出自求水匈奴生得浞野侯因急擊其軍軍吏畏亡將而誅莫相勸而歸軍遂沒於匈奴單于大喜遂遣兵攻受降城不能下乃侵入邊而去明年單于欲自攻受降城未到病死兒單于立三歲而死子少匈奴乃立其季父烏維單于弟右賢王句黎湖為單于是歲大初三年也句黎湖單于立漢使光祿徐自為出五原塞數百里遠者千里築城障列亭至盧朐而使游擊將軍韓說長平侯衛伉屯其旁使強弩都尉路博德築居延澤上其秋匈奴大入雲中定襄五原朔方殺略數千人敗數二千石而去行壞光祿所築亭障又使右賢王入酒泉張掖略數千人會任文擊救盡復失其所得而去聞貳師將軍破大宛斬其王還單于欲遮之不敢其冬病死句黎湖單于立一歲死其弟左大都尉且鞮侯立為單于漢既誅大宛威震外國天子意欲遂困胡乃下詔曰高皇帝遺朕平城之夏高后時單于書絕悖逆昔齊襄公復九世之讎春秋大之是歲太初四年也且鞮侯單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于乃自謂我兒子安敢望漢天子漢天子我丈人行漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年浞野侯破奴得亡歸漢其明年漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還匈奴大圍貳師幾不得脫漢兵物故什六七漢又使因杅將軍出西河與強弩都尉會涿邪山亡所得使騎都尉李陵將步兵五千人出居延千餘里與單于會合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降匈奴其兵得脫歸漢者四百人單于乃貴陵以其女妻之後二歲漢使貳師將軍六萬騎步兵七萬出朔方強弩都尉路博德將萬餘人與貳師會游擊將軍說步兵三萬人出五原因杅將軍敖將騎萬步兵三萬人出雁門匈奴聞悉遠其累重於余吾水北而單于以十萬待水南與貳師接戰貳師解而引歸與單于連鬭十餘日游擊亡所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是歲太始元年也初且鞮侯兩子長為左賢王次為左大將病且死言立左賢王左賢王未至貴人以為有病更立左大將為單于左賢不聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聽謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于狐鹿姑單于立以左大將為左賢王數年病死其子先賢撣不得代更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而匈奴入上谷五原殺略, WYG: ''}
