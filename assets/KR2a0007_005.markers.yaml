  - {type: variant, offset: 1241, length: 0, content: '', WYG: 如淳曰凡言除者除故官就新官也晉灼曰禮有大行人小行人主諡官故以此名之臣瓉曰大行是官名掌九儀之制以賔諸侯者師古曰大鴻臚者夲名典客後改曰大鴻臚大行令者夲名行人即典客之屬官也後改曰大行令故事之尊重者遣大鴻臚而輕賤者遣大行也據此紀文則景帝已改典客為大鴻臚改行人為大行矣而百官公卿表乃云景帝中六年更名典客為大行令武帝太初元年更名大行令為大鴻臚更名行人為大行令當是表誤劉攽曰史記文景事最略漢書則頗有所録蓋班氏博采他書成之故於景帝世謂典客為大鴻臚行人為大行由它書即武帝時官紀景帝世事班氏失於改革耳然則改諸官名在武帝世無疑非表誤也顔氏所疑下文光禄大夫亦景帝所改乎劉敞曰按景十三王傳河間獻王薨猶云大行令奏諡則非表誤也但官名改易未定故史於此追舉最後官名耳武帝初大行王恢李息即大行令也}
