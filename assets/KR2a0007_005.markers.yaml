  - {type: variant, offset: 1223, length: 0, content: '', WYG: 應劭曰皇帝延諸侯王賔王諸侯皆屬大鴻臚故其薨奏其行迹賜與諡及哀策誄文也臣瓉曰景帝此年已置大鴻臚而百官表云武帝太初元年更以大行為大鴻臚與此錯師古曰誄者述累德行之文音力水反}
  - {type: variant, offset: 1223, length: 0, content: '', krp: 應劭曰皇帝延諸侯王賔王諸侯皆屬大鴻臚故其薨奏其行迹賜與諡及哀策誄文也臣瓉曰景帝此年已置大鴻臚而百官表云武帝太初元年更以大行為大鴻臚與此錯師古曰誄者述累德行之文音力水反}
