  - {type: variant, offset: 3246, length: 1, content: 第, WYG: 後文云平陽侯曹夀有惡疾就國事與史記正合然則夀即時之别名也三千一十七級按史記作三千七十一級又益封青三千八百戸史記作三千戸又益封八千七百戸史記作六千戸都尉韓説從大軍出窴渾臣召南按應云從大將軍脱将字耳又按窴渾史記作寙渾徐廣曰寙渾在朔方音庾以地理志核之朔方有寙渾縣為西部都尉治有道西北出雞鹿塞此窴渾當即寙渾也封蔡為樂安侯臣召南按表作安樂侯又封朔為陟軹侯史記作渉軹侯而功臣表但作軹侯又不虞為隨成侯表作隨城侯又中郎將綰史記無此四字正閎長史安注張晏曰正軍正也胡三省曰凡軍行置軍正掌舉軍法以正軍中劉昭志大將軍長史秩千石霍去病傳以}
