  - {type: variant, offset: 1668, length: 1334, content: 石室金鐀之書五年而當太初元年十一月甲子朔旦冬至天曆始改建於明堂諸神受記大史公曰先人有言自周公卒五百歲而有孔子孔子至於今五百歲有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢攘焉上大夫壺遂曰昔孔子為何作春秋哉太史公曰余聞之董生周道廢孔子為魯司寇諸侯害之大夫壅之孔子知時之不用道之不行也是非二百四十二年之中以為天下儀表貶諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之經紀別嫌疑明是非定猶與善善惡惡賢賢賤不肖存亡國繼絕世補弊起廢王道之大者也易著天地陰陽四時五行故長於變禮綱紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辯是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保社稷者不可勝數察其所以皆失其本已故易曰差以豪氂謬以千里故臣弒君子弒父非一朝一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父者而不通於春秋之義者必蒙首惡之名為人臣子不通於春秋之義者必陷篡弒誅死之罪其實皆以善為之而不知其義被之空言不敢辭夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過予之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否不然余聞之先人曰虙戲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之德襃周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清澤流罔極海外殊俗重譯款塞請來獻見者不可勝道臣下百官力誦聖德猶不能宣盡其意且士賢能矣而不用有國者恥也主上明聖德不布聞有司之過也且余掌其官廢明聖盛德不載滅功臣賢大夫之業不述墮先人所言罪莫大焉余所謂述故事整齊其世傳非所謂作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於纍紲乃喟然而歎曰是余之辠夫身虧不用矣退而深惟曰夫詩書隱約者欲遂其志之思也卒述陶唐以來至於麟止自黃帝始五帝本紀第一夏本紀第二殷本紀第三周本紀第四秦本紀第五始皇本紀第六項羽本紀第七高祖本紀第八呂后本紀第九孝文本紀第十孝景本紀第十一今上本紀第十二三代世表第一十二諸侯年表第二六國年表第三秦楚之際月表第四漢諸侯年表第五高祖功臣年表第六惠景間功臣年表第七建元以來侯者年表第八王子侯者年表第九漢興以來將相名臣年表第十禮書第一樂書第二律書第三曆書第四天官書第五封禪書第六河渠書第七平準書第八吳太伯世家第一齊太公世家第二魯周公世家第三燕召公世家第四管蔡世家第五陳𣏌世家第六衛康叔世家第七宋微子世家第八晉世家第九楚世家第十越世家第十一鄭世家第十二趙世家第十三魏世家第十四韓世家第十五田完世家第十六孔子世家第十七陳涉世家第十八外戚世家第十九楚元王世家第二十荊燕王世家第二十一齊悼惠王世家第二十二蕭相國世家第二十三, WYG: ''}
