  - {type: variant, offset: 3835, length: 2951, content: 之行事略三代錄秦漢上記軒轅下至於茲著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律曆改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令己失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補蓺成一家言協六經異傳齊百家雜語臧之名山副在京師以竢後聖君子第七十遷之自敘云爾而十篇缺有錄無書遷既被刑之後為中書令尊寵任職故人益州刺史任安予遷書責以古賢臣之義遷報之曰少卿足下曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇若望僕不相師用而流俗人之言僕非敢如是也雖罷駑亦嘗側聞長者遺風矣顧自以為身殘處穢動而見尤欲益反損是以抑鬱而無誰語諺曰誰為為之孰令聽之蓋鍾子期死伯牙終身不復鼓琴何則士為知己用女為說己容若僕大質已虧缺雖材懷隨和行若由夷終不可以為榮適足以發笑而自點耳書辭宜答會東從上來又迫賤事相見日淺卒卒無須臾之間得竭指意今少卿抱不測之罪涉旬月迫季冬僕又薄從上上雍恐卒然不可諱是僕終已不得舒憤懣以曉左右則長逝者魂魄私恨無窮請略陳固陋闕然不報幸勿過僕聞之修身者智之府也愛施者仁之端也取予者義之符也恥辱者勇之決也立名者行之極也士有此五者然後可以託於世列於君子之林矣故禍莫憯於欲利悲莫痛於傷心行莫醜於辱先而詬莫大於宮刑刑餘之人無所比數非一世也所從來遠矣昔衛靈公與雍渠載孔子適陳商鞅因景監見趙良寒心同子參乘爰絲變色自古而恥之夫中材之人事關於宦豎莫不傷氣況忼慨之士乎如今朝雖乏人柰何令刀鋸之餘薦天下豪雋哉僕賴先人緒業得待罪輦轂下二十餘年矣所以自惟上之不能納忠效信有奇策材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功下之不能累日積勞取尊官厚祿以為宗族交遊光寵四者無一遂苟合取容無所短長之效可見於此矣鄉者僕亦嘗廁下大夫之列陪外廷末議不以此時引維綱盡思慮今已虧形為埽除之隸在闒茸之中乃欲卬首信眉論列是非不亦輕朝廷羞當世之士邪嗟乎嗟乎如僕尚何言哉尚何言哉且事本末未易明也僕少負不羈之才長無鄉曲之譽主上幸以先人之故使得奉薄技出入周衛之中僕以為戴盆何以望天故絕賓客之知忘室家之業日夜思竭其不肖之材力務壹心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趣舍異路未嘗銜盃酒接殷勤之歡然僕觀其為人自奇士事親孝與士信臨財廉取予義分別有讓恭儉下人常思奮不顧身以徇國家之急其素所畜積也僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已奇矣今舉事壹不當而全軀保妻子之臣隨而媒孽其短僕誠私心痛之且李陵提步卒不滿五千深踐戎馬之地足歷王庭垂餌虎口橫挑彊胡卬億萬之師與單于連戰十餘日所殺過當虜救死扶傷不給旃裘之君長咸震怖乃悉徵左右賢王舉引弓之民一國共攻而圍之轉鬭千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍士無不起躬流涕沬血飲泣張空弮冒白刃北首爭死敵陵未沒時使有來報漢公卿王侯皆奉觴上壽後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤見主上慘悽怛悼誠欲效其款款之愚以為李陵素與士大夫絕甘分少能得人之死力雖古名將不過也身雖陷敗彼觀其意且欲得其當而報漢事已無可柰何其所摧敗功亦足以暴於天下僕懷欲陳之而未有路適會召問即以此指推言陵功欲以廣主上之意塞睚眥之辭未能盡明明主不深曉以為僕沮貳師而為李陵游說遂下於理拳拳之忠終不能自列因為誣上卒從吏議家貧財賂不足以自贖交遊莫救左右親近不為壹言身非木石獨與法吏為伍深幽囹圄之中誰可告愬者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲而僕又茸以蠶室重為天下觀笑悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星曆近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻螘何異而世又不與能死節者比特以為智窮罪極不能自免卒就死耳何也素所自樹立使然人固有一死死有重於泰山或輕於鴻毛用之所趨異也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次關木索被箠楚受辱其次鬄毛髮嬰金鐵受辱其次毀肌膚斷支體受辱最下腐刑極矣傳曰刑不上大夫此言士節不可不厲也猛虎處深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也故士有畫地為牢勢不入削木為吏議不對定計於鮮也今交手足受木索暴肌膚受榜箠幽於圜牆之中當此之時見獄吏則頭槍地視徒隸則心惕息何者積威約之勢也及已至此言不辱者所謂彊顏耳曷足貴乎且西伯伯也拘牖里李斯相也具五刑淮陰王也受械於陳彭越張敖南鄉稱孤繫獄具罪絳侯誅諸呂權傾五伯囚於請室魏其大將也衣赭關三木季布為朱家鉗奴灌夫受辱居室此人皆身至王侯將相聲聞鄰國及罪至罔加不能引決自財在塵埃之中古今一體安在其不辱也由此言之勇怯勢也彊弱形也審矣曷足怪乎且人不能蚤自財繩墨之外已稍陵夷至於鞭箠之間乃欲引節斯不亦遠乎古人所以重施刑於大夫者殆為此也夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然乃有不得已也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必死節怯夫慕義何處不勉焉僕雖怯耎欲苟活亦頗識去就之分矣何至自湛溺累紲之辱哉且夫臧獲婢妾猶能引決況若僕之不得已乎所以隱忍苟活函糞土之中而不辭者恨私心有所不盡鄙沒世而文采不表於後也古者富貴而名摩滅不可勝記唯俶儻非常之人稱焉蓋西伯拘而演周易仲尼戹而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子髕腳兵法修列不韋遷蜀世傳呂覽韓非囚秦說難孤憤詩三百篇大氐賢聖發憤之所為作也此人皆意有所鬱結不得通其道故述往事思來者及如左丘明無目孫子斷足終不可用退論書策以舒其憤思垂空文以自見僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗興壞之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適會此禍惜其不成是以就極刑而無慍色僕誠已著此書藏之名山傳之其人通邑大都則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居下流多謗議僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖累百世垢彌甚耳是以腸一日而九回居則忽忽若有所亡出則不知所如往每念斯恥汗未嘗不發背霑衣也身直為閨閤之臣寧得自引深臧於巖穴邪故且從俗浮湛與時俯仰以通其狂惑今少卿乃教以推賢進士無乃與僕之私指謬乎今雖欲自彫瑑曼辭以自解無益於俗不信祇取辱耳要之死日然後是非乃定書不能盡意故略陳固陋遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉至王莽時求封遷後為史通子贊曰自古書契之作而有史官其載籍博矣至孔氏籑之上斷唐堯下訖秦繆唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也及孔子因魯史記而作春秋而左丘明論輯其本事以為之傳又籑異同為國語又有世本錄黃帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國並爭秦兼諸侯有戰國策漢興伐秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖于天漢其言秦漢詳矣至於采經摭傳分散數家之事甚多疏略或有抵梧亦其涉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗繆於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧此其所蔽也然自劉向揚雄博極群書皆稱遷有良中之材服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實錄烏呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉, WYG: 證}
