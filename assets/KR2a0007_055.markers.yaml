  - {type: variant, offset: 1476, length: 4, content: 史毋忘吾, WYG: 后崩為將軍軍北軍後一嵗復從大將軍凡再為將軍後坐法失侯趙信以匈奴相國降為侯武帝立十八年為前將軍與匈奴戰敗降匈奴趙食其祋栩人師古曰馮翊之縣也祋音丁活反又音丁外反栩音許羽反武帝立十八年以主爵都尉從大將軍斬首六百六十級元狩二年賜爵闗内侯黄金百斤眀年為右將軍從大將軍出定襄迷失道當斬贖為庶人郭昌雲中人以校尉從大將軍元封四年以太中大夫為㧞胡将軍屯朔方還擊昆明無功奪印荀彘太原廣武人以御見侍中師古曰以善御得見因為侍中也御謂御車也用校尉數從大將軍元封二年為左將軍擊朝鮮無功坐捕樓船將軍誅最票騎將軍去病凡六出擊匈奴其四出以將軍師古曰再出為票姚校尉也斬首虜十一萬餘級渾邪王以衆降數萬開河西酒泉之地西方益少胡宼四益封凡萬七千七百户其校尉吏有功侯者六人為將軍者二人路博徳西河平州人以右北平太守從票騎將軍封邳離侯票騎死後博徳以衛尉為伏波將軍伐破南越益封其後坐法失侯為彊弩都尉屯居延卒趙破奴太原人嘗亡入匈奴已而歸漢為票騎將軍司馬出北地封從票侯坐財金失侯後一嵗為匈河將軍攻胡至匈河水無功後一嵗擊虜樓蘭王後為浞野侯後六嵗以浚稽將軍將二萬騎擊匈奴左王左王與戰兵八萬騎圍破奴破奴為虜}
