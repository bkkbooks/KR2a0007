  - {type: variant, offset: 366, length: 2, content: 直所, WYG: 𤣥甲謂甲之黒色也為冢象祁連山師古曰在􅌗陵旁冡上有竪石冢前有石人馬者是也諡之并武與廣地曰景桓侯蘇林曰景武諡也桓廣地諡也義見諡法張晏曰諡法布義行剛曰景辟土服逺曰桓也子嬗嗣師古曰嬗音上戰反嬗字子侯上愛之幸其壯而將之為奉車都尉}
  - {type: variant, offset: 366, length: 2, content: 直所, krp: 𤣥甲謂甲之黒色也為冢象祁連山師古曰在茂陵旁冡上有竪石冢前有石人馬者是也諡之并武與廣地曰景桓侯蘇林曰景武諡也桓廣地諡也義見諡法張晏曰諡法布義行剛曰景辟土服逺曰桓也子嬗嗣師古曰嬗音上戰反嬗字子侯上愛之幸其壯而將之為奉車都尉}
  - {type: variant, offset: 369, length: 1082, content: 言之異路有省不省耳嘗竊觀陰陽之術大詳而眾忌諱使人拘而多畏然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神專一動合無形澹足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多儒者則不然以為人主天下之儀表也君唱臣和主先臣隨如此則主勞而臣佚至於大道之要去健羡黜聰明釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長久非所聞也夫陰陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬臧此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六藝為法六藝經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也墨者亦上堯舜言其德行曰堂高三尺土階三等茅茨不翦採椽不斲飯土簋歠土刑䊪粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民率故天下共若此則尊卑無別也夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疏不殊貴賤壹斷於法則親親尊尊之恩絕矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剸決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虛者道之常也因者君之綱也群臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款款言不聽姦乃不生賢不肖自分白黑乃形在所欲用耳何事不成乃合大道混混冥冥光燿天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉太史公既掌天官不治民有子曰遷遷生龍門耕牧河山之陽年十歲則誦古文二十而南游江淮上會稽深禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧阸困蕃薛彭城過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略邛筰昆明還報命是歲天子始建漢家之封而太史公留滯周南不得與從事發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絕於予乎汝復為太史則續吾祖矣今天子接千歲之統, WYG: ''}
