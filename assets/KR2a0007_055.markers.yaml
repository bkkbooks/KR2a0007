  - {type: variant, offset: 1459, length: 0, content: '', WYG: 我奈何左右曰於今尊貴無比於是長公主風白皇后師古曰風讀曰諷皇后言之上廼詔青尚平陽主如淳曰本陽信長公主也為平陽侯所尚故稱平陽主與主合葬起冢象廬山云師古曰在􅌗陵東次去病冢之西相併者是也宋祁云浙本廬作盧最大將軍青師古曰最亦凡也凡七出擊匈奴斬捕首虜五萬餘級一與單于戰收河南地置朔方郡再益封凡萬六千三百户宋祁云景德本無益字封三子為侯侯千三百户并之二萬二百戸其禆將及校尉侯者九人為特將者十五人師古曰特將謂獨别為將而出征也李廣張騫公孫賀李蔡曹襄韓說蘇建皆自有傳師古曰七人自有傳八人今列於此下凡十五人也説讀曰悦李息郁郅人也師古曰北地之縣也郅音之日反事景帝至武帝立八嵗為材官將軍軍馬邑後六嵗為將軍出代後三嵗為將軍從大將軍出朔方皆無功凡三為將軍其後常為大}
