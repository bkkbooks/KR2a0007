  - {type: variant, offset: 1457, length: 1, content: 得, WYG: 疑發干侯登皆坐酎金失侯後二嵗冠軍侯國絶後四年元封五年青薨諡曰烈侯子伉嗣六年坐法免自青圍單于後十四嵗而卒竟不復擊匈奴者以漢馬少又方南誅兩越東伐朝鮮擊羌西南夷以故久不伐胡初青既尊貴而平陽侯曹夀有惡疾就國長公主問列侯誰賢者左右皆言大將軍主笑曰此出吾家常騎}
