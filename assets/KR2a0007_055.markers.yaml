  - {type: variant, offset: 3539, length: 295, content: 西南夷列傳第五十六司馬相如列傳第五十七淮南衡山列傳第五十八循吏列傳第五十九汲鄭列傳第六十儒林列傳第六十一酷吏列傳第六十二大宛列傳第六十三游俠列傳第六十四佞幸列傳第六十五滑稽列傳第六十六日者列傳第六十七龜策列傳第六十八貨殖列傳第六十九惟漢繼五帝末流接三代絕業周道既廢秦撥去古文焚滅詩書故明堂石室金鐀玉版圖籍散亂漢興蕭何次律令韓信申軍法張蒼為章程叔孫通定禮儀則文學彬彬稍進詩書往往間出自曹參薦蓋公言黃老而賈誼朝錯明申韓公孫弘以儒顯百年之間天下遺文古事靡不畢集太史公仍父子相繼籑其職曰於戲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論, WYG: ''}
