  - {type: variant, offset: 3248, length: 0, content: '', WYG: 千五百戸封去病為冠軍侯臣召南按冠軍初無此縣名武帝褒去病功以南陽穰縣盧陽鄉宛縣臨駣聚為冠軍侯國解見地理志二千五百戸史記作千六百戸又封賢為終利侯史記及功臣表作衆利侯過焉支山千有餘里合短兵括地志曰焉支山一名刪丹山在甘州刪丹縣東南五十里王㮊曰合短兵下史記無鏖臯蘭下四字全甲獲醜臣召南按此文上史記無鋭悍者三字則以誅全甲為一句此傳則鋭悍者誅為一句全甲獲醜為一句使人先要道邊按史記作遣使向邊境要􅃒漢人令報天子要邊文雖繁而情事曲折具見登臨翰海注張晏如淳云云臣召南按翰海北史作瀚海即大漠之别名沙磧四際無涯故謂之海張晏如淳直以大海北海解之非也本文明云去病出代右北平二千餘里則其地正在大漠安能及絶逺之北海哉且塞外遇巨澤大湖通稱為海如蘇武牧羊北海上竇憲追至私渠北鞮海皆巨澤大湖如後世稱濶灤海之類非大海也師率减什二什二史記作十三又㑹興城史記作㑹與城又封博徳為邳離侯史記作符離侯北地都尉衛山史記作邢山惟西河太守常惠臣召南按此常惠與從蘇武北使後封長羅侯為石將軍典屬國者别是一人為特將者十五人史記作}
