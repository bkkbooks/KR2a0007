  - {type: variant, offset: 1460, length: 2, content: 是命, WYG: 公孫敖義渠人以郎事景帝至武帝立十二嵗為騎將軍宋祁云十二嵗景徳本作八嵗出代亡卒七千人當斬贖為庶人後五嵗以校尉從大將軍封合騎侯後一嵗以中將軍從大將軍再出定襄無㓛後二嵗以將軍出北地後票騎失期當斬宋祁云景徳本無失字贖為庶人後二嵗以校尉從大將軍無功後十四嵗以因杅將軍築受降城十嵗復以因杅將軍再出擊匈奴至余吾師古曰水名}
