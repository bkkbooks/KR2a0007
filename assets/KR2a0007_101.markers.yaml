  - {type: variant, offset: 2886, length: 2237, content: 博物有可觀采蔚為辭宗賦頌之首述司馬相如傳第二十七平津斤斤晚躋金門既登爵位祿賜頤賢布衾疏食用儉飭身卜式耕牧以求其志忠寤明君乃爵乃試兒生亹亹東髮修學僭列名臣從政輔治述公孫弘卜式兒寬傳第二十八張湯遂達用事任職媚茲一人日旰忘食既成寵祿亦羅咎慝安世溫良塞淵其德子孫遵業全祚保國述張湯傳第二十九杜周治文唯上淺深用取世資幸而免身延年寬和列于名臣欽用材謀有異厥倫述杜周傳第三十博望杖節收功大夏貳師秉鉞身釁胡社致死為福每生作禍述張騫李廣利傳第三十一烏呼史遷薰胥以刑幽而發憤乃思乃精錯綜群言古今是經勒成一家大略孔明述司馬遷傳第三十二孝武六子昭齊亡嗣燕刺謀逆廣陵祝詛昌邑短命昏賀失據戾園不幸宣承天序述武五子傳第三十三六世耽耽其欲浟浟文武方作是庸四克助偃淮南數子之德不忠其身善謀於國述嚴朱吾丘主父徐嚴終王賈傳第三十四東方贍辭詼諧倡優譏苑扞偃正諫舉郵懷肉汙殿弛張沈浮述東方朔傳第三十五葛繹內寵屈氂王子千秋時發宜春舊仕敞義依霍庶幾云已弘惟政事萬年容己咸睡厥誨孰為不子述公孫劉田蔡陳鄭傳第三十六王孫臝葬建乃斬將雲廷許禹福逾刺鳳是謂狂狷敞近其衷述楊胡朱梅云傳第三十七博陸堂堂受遺武皇擁毓孝昭末命導揚遭家不造立帝廢王權定社稷配忠阿衡懷祿耽寵漸化不詳陰妻之逆至子而亡秺侯狄孥虔恭忠信奕世載德貤于子孫述霍光金日磾傳第三十八兵家之策惟在不戰營平皤皤立功立論以不濟可上諭其信武賢父子虎臣之俊述趙充國辛慶忌傳第三十九義陽樓蘭長羅昆彌安遠日逐義成郅支陳湯誕節救在三悊會宗勤事疆外之桀述傅常鄭甘陳傳第四十不疑膚敏應變當理辭霍不婚逡遁致仕疏克有終散金娛老定國之祚于其仁考廣德當宣近於知恥述雋疏于薛平彭傳第四十一四皓遯秦古之逸民不營不拔嚴平鄭真吉困于賀涅而不緇禹既黃髮以德來仕舍惟正身勝死善道郭欽蔣詡近遯之好述王貢兩襲鮑傳第四十二扶陽濟濟聞詩聞禮玄成退讓仍世作相漢之宗廟叔孫是謨革自孝元諸儒變度國之誕章博載其路述韋賢傳第四十三高平師師惟辟作威圖黜凶害天子是毗博陽不伐含弘光大天誘其衷慶流苗裔述魏相丙吉傳第四十四占往知來幽贊神明苟非其人道不虛行學微術昧或見仿佛疑殆匪闕違眾迕世淺為尤悔深作敦害述眭兩夏侯京翼李傳第四十五廣漢尹京克聰克明延壽作翊既和且平矜能訐上俱陷極刑翁歸承風帝揚厥聲敞亦平平文雅自贊尊實赳赳邦家之彥章死非辠士民所歎述趙尹韓張兩王傳第四十六寬饒正色國之司直豐繄好剛輔亦慕直皆陷狂狷不典不式崇執言責隆持官守寶曲定陵並有立志述蓋諸葛劉鄭毋將孫何傳第四十七長倩懙懙覿霍不舉遇宣乃拔傅元作輔不圖不慮見躓石許述蕭望之傳第四十八子明光光發迹西疆列於禦侮厥子亦良述馮奉世傳第四十九宣之四子淮陽聰敏舅氏蘧蒢幾陷大理楚孝惡疾東平失軌中山凶短母歸戎里元之二王孫後大宗昭而不穆大命更登述宣元六王傳第五十樂安襃襃古之文學民具爾瞻困于二司安昌貨殖朱雲作娸博山惇慎受莽之疚述匡張孔馬傳第五十一樂昌篤實不橈不詘遘閔既多是用廢黜武陽殷勤輔導副君既忠且謀饗茲舊勳高武守正因用濟身述王商史丹傅喜傳第五十二高陽文法揚鄉武略政事之材道德惟薄位過厥任鮮終其祿博之翰音鼓妖先作述薛宣朱博傳第五十三高陵修儒任刑養威用合時宜器周世資義得其勇如虎如貔進不跬步宗為鯨鯢述翟方進傳第五十四統徵政缺災眚屢發永陳厥咎戒在三七鄴指丁傅略窺占術述谷永杜鄴傳第五十五哀平之卹丁傅莽賢武嘉戚之乃喪厥身高樂廢黜咸列貞臣述何武王嘉師丹傳第五十六淵哉若人實好斯文初擬相如獻賦黃門輟而覃思草法篹玄斟酌六經放易象論潛于篇籍以章厥身述揚雄傳第五十七獷獷亡秦滅我聖文漢存其業六學析分是綜是理是綱是紀師徒彌散著其終始述儒林傳第五十八誰毀誰譽譽其有試泯泯群黎化成良吏淑人君子時同功異沒世遺愛民有餘思述循吏傳第五十九上替下陵姦軌不勝猛政橫作刑罰用興曾是強圉掊克為雄報虐以威殃亦凶終述酷吏傳第六十四民貪力罔有兼業大不淫侈細不匱乏蓋均無貧遵王之法靡法靡度民肆其詐偪上并下荒殖其貨侯服玉食敗俗傷化述貨殖傳第六十一開國承家有法有制家不臧甲國不專殺矧乃齊民作威作惠如台不匡禮法是謂述游俠傳第六十二彼何人斯竊此富貴營損高明作戒後世述佞幸傳第六十三於惟帝典戎夷猾夏周宣攘之亦列風雅宗幽既昏淫於襃女戎敗我驪遂亡酆鄗大漢初定匈奴強盛圍我平城寇侵邊境至于孝武爰赫斯怒王師雷起霆擊朔野宣承其末乃施洪德震我威靈五世來服王莽竊命是傾是覆備其變理為世典式述匈奴傳第六十四西南外夷種別域殊南越尉佗自王番禺攸攸外寓閩越東甌爰洎朝鮮燕之外區漢興柔遠與爾剖符皆恃其岨乍臣乍驕孝武行師誅滅海隅述西南夷兩越朝鮮傳第六十五西戎即序夏后是表周穆觀兵荒服不旅漢武勞神圖遠甚勤王師驒驒致誅大宛姼姼公主乃女烏孫使命乃通條支之瀕昭宣承業都護是立總督城郭三十有六修奉朝貢各以其職述西域傳第六十六詭矣禍福刑于外戚高后首命呂宗顛覆薄姬墜魏宗文產德寶后違意考盤于代王氏仄微世武作嗣子夫既興扇而不終鉤弋憂傷孝昭以登上官幼尊類禡厥宗史娣王悼身遇不祥及宣饗國二族後光恭哀產元夭而不遂邛成乘序履尊三世飛燕之妖禍成厥妹丁傅朁恣自求凶害中山無辜乃喪馮衛惠張景薄武陳宣霍成許哀傅平王之作事雖歆羨非天所度怨咎若茲如何不恪述外戚傳第六十七元后娠母月精見表遭成之逸政自諸舅陽平作威誅加卿宰成都煌煌假我明光曲陽歊歊亦朱其堂新都亢極作亂以亡述元后傳第六十八咨爾賊臣篡漢滔天行驕夏癸虐烈商辛偽稽黃虞繆稱典文眾怨神怒惡復誅臻百王之極究其姦昏述王莽傳第六十九凡漢書敘帝皇列官司建侯王準天地統陰陽闡元極步三光分州域物土疆窮人理該萬方緯六經綴道綱總百氏贊篇章函雅故通古今正文字惟學林述敘傳第七十, WYG: ''}
