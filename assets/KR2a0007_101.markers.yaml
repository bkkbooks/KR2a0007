  - {type: variant, offset: 1519, length: 887, content: 交斿如父子攜手𨔵秦拊翼俱起據國爭權還為豺虎耳謀甘公作漢藩輔述張耳陳餘傳第二三枿之起本根既朽枯楊生華曷惟其舊橫雖雄材伏于海島沐浴尸鄉北面奉首旅人慕殉義過黃鳥述魏豹田儋韓信傳第三信惟餓隸布實黥徒越亦狗盜芮尹江湖雲起龍襄化為侯王割有齊楚跨制淮梁綰自同閈鎮我北疆德薄位尊非胙惟殃吳克忠信胤嗣乃長述韓彭英盧吳傳第四賈廑從旅為鎮淮楚澤王琅邪權激諸呂濞之受吳疆土踰矩雖戒東南終用齊斧述荊燕吳傳第五太上四子伯兮早夭仲氏王代斿宅于楚戊實淫缺平陵乃紹其在于京奕世宗正劬勞王室用侯陽成子政博學三世成名述楚元王傳第六季氏之詘辱身毀節信于上將議臣震粟欒公哭梁田叔殉趙見危授命誼動明主布歷燕齊叔亦相魯民思其政或金或社述季布欒布田叔傳第七高祖八子二帝六王三趙不辜淮厲自亡燕靈絕嗣齊悼特昌掩有東土自岱徂海支庶分王前後九子六國誅斃適齊亡祀城陽濟北後承我國赳赳景王匡漢社稷述高五王傳第八猗與元勳包漢舉信鎮守關中足食成軍營都立宮定制修文平陽玄默繼而弗革民用作歌化我淳德漢之宗臣是謂相國述蕭何曹參傳第九留侯襲秦作漢腹心圖折武關解阸鴻門推齊銷印敺致越信招賓四老惟寧嗣君陳公擾攘歸漢乃安斃范亡項走狄擒韓六奇既設我罔艱難安國廷爭致仕杜門絳侯矯矯誅呂尊文亞夫守節吳楚有勳述張陳王周傳第十舞陽鼓刀滕公廄騶潁陰商販曲周庸夫攀龍附鳳並乘天衢述樊酈滕灌傅靳周傳第十一北平志古司秦柱下定漢章程律度之緒建平質直犯上干色廣阿之廑食厥舊德故安執節責通請錯蹇蹇帝臣匪躬之故述張周趙任申屠傳第十二食其監門長揖漢王畫襲陳留進收敖倉塞隘杜津王基以張賈作行人百越來賓從容風議博我以文敬繇役夫遷京定都內強關中外和匈奴叔孫奉常與時抑揚稅介免冑禮義是創或悊或謀觀國之光述酈陸朱婁叔孫傳第十三淮南僭狂二子受殃安辯而邪賜頑以荒敢行稱亂窘世薦亡述淮南衡山濟北傳第十四蒯通壹說三雄是敗覆酈驕韓田橫顛沛被之拘係乃成患害充躬罔極交亂弘大述蒯伍江息夫傳第十五萬石溫溫幼寤聖君宜爾子孫夭夭伸伸慶社于齊不言動民衛直周張淑慎其身述萬石衛直周張傳第十六孝文三王代孝二梁懷折亡嗣孝乃尊光內為母弟外扞吳楚怙寵矜功僭欲失所思心既霿牛禍告妖帝庸親親厥國五分德不堪寵四支不傳述文三王傳第, WYG: 經倒}
