  - {type: variant, offset: 2632, length: 253, content: 王承文之慶魯恭館室江都訬輕趙敬險詖中山淫醟長沙寂漠廣川亡聲膠東不亮常山驕盈四國絕祀河間賢明禮樂是修為漢宗英述景十三王傳第二十三李廣恂恂實獲士心控弦貫石威動北鄰躬戰七十遂死于軍敢怨衛青見討去病陵不引決忝世滅姓蘇武信節不詘王命述李廣蘇建傳第二十四長平桓桓上將之元薄伐獫允恢我朔邊戎車七征衝輣閑閑合圍單于北登闐顏騎冠軍猋勇紛紜長驅六舉電擊雷震飲馬翰海封狼居山西規大河列郡祁連述衛青霍去病傳第二十五抑抑仲舒再相諸侯身修國治致仕縣車下帷覃思論道屬書讜言訪對為世純儒述董仲舒傳第二十六文豔用寡子虛烏有寓言淫麗託風終始多, WYG: 劉所未及者條錄以附於每卷云臣召南謹}
