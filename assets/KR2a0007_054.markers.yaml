  - {type: variant, offset: 789, length: 0, content: '', WYG: 去塞百餘里邊塞以聞上欲陵死戰召陵母及婦令相者視之無死喪色後聞陵降上怒甚責問陳歩樂歩樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以殉國家之急師古曰殉營也一曰從也其素所畜積也師古曰畜讀曰蓄有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短服䖍曰媒音欺謂詆欺也孟康曰媒酒教糵麴也謂釀成其罪也師古曰孟説是也齊人名麴餅曰媒誠可痛也且陵提歩卒不滿五千深輮戎馬之地師古曰輮踐也音人九反抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬬千里矢盡道窮士張空拳文頴曰拳弓弩拳也師古曰拳字與絭同音去權反又音眷冐白刃北首爭死敵師古曰冐犯也北首北嚮也冐音莫北反首音式救反宋祁曰南浙兩本冐音莫尅反首音式授反淳化本冐音莫到反首音式受反當從南浙得人之死力雖古名將不過也身雖䧟敗然其所摧敗亦足暴於天下師古曰所摧敗敗匈奴之兵也暴猶章也彼之不死宜欲得當以報漢也師古曰言欲立功以當其罪也初上遣貳師大軍出財令陵為助兵師古曰財與纔同謂淺也僅也史傳通用字他皆類此及陵與單于相值而貳師功少上以遷誣罔欲沮貳師為陵游説師古曰沮謂毁壊之音才吕反下遷腐刑久之上悔陵無救曰陵當發出塞廼詔彊弩都尉令迎軍坐預詔之得令老將生姦詐孟康曰坐預詔彊弩都尉路博徳迎陵博徳老将出塞不至令陵見没也廼遣使勞賜陵餘}
