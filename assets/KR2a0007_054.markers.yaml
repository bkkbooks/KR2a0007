  - {type: variant, offset: 2533, length: 194, content: 言道遠多乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復往天子聞之大怒使使遮玉門關曰軍有敢入斬之貳師恐因留屯敦煌其夏漢亡浞野之兵二萬餘於匈奴公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絕不來烏孫輪臺易苦漢使為外國笑乃案言伐宛尤不便者鄧光等赦囚徒扞寇盜發惡少年及邊騎歲餘而出敦煌六萬人負私從者不與牛十萬馬三萬匹驢橐駝以萬數齎糧兵弩甚設天下騷動轉相奉伐宛, WYG: 卷}
