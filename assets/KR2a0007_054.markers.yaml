  - {type: variant, offset: 1508, length: 428, content: 使者多者十餘少者五六輩遠者八九歲近者數歲而反是時漢既滅越蜀所通西南夷皆震請吏置牂柯越巂益州沈黎文山郡欲地接以前通大夏乃遣使歲十餘輩出此初郡皆復閉昆明為所殺奪幣物於是漢發兵擊昆明斬首數萬後復遣使竟不得通語在西南夷傳自騫開外國道以尊貴其吏士爭上書言外國奇怪利害求使天子為其絕遠非人所樂聽其言予節募吏民無問所從來為具備人眾遣之以廣其道來還不能無侵盜幣物及使失指天子為其習之輒覆按致重罪以激怒令贖復求使使端無窮而輕犯法其吏卒亦輒復盛推外國所有言大者予節言小者為副故妄言無行之徒皆爭相效其使皆私縣官齎物欲賤市以私其利外國亦厭漢使人人有言輕重度漢兵遠不能至而禁其食物以苦漢使漢使乏絕責怨至相攻擊樓蘭姑師小國當空道攻劫漢使王恢等尤甚而匈奴奇兵又時時遮擊之使者爭言外國利害皆有城邑兵弱易擊於是天子遣從票侯破奴將屬國騎及郡兵數萬以擊胡胡皆去明年擊破姑師虜樓蘭王酒泉列亭鄣至玉門矣而大宛諸國發使隨漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢天子大說而漢使窮河源其山多玉石采來天子案古, WYG: ''}
