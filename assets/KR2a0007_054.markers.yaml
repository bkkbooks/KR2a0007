  - {type: variant, offset: 104, length: 0, content: '', WYG: 素聞廣賢令曰得李廣必生致之胡騎得廣廣時傷置兩馬間絡而盛之宋祁曰越本無之字卧行十餘里廣陽死睨其傍有一兒騎善馬師古曰睨邪視也五係反暫騰而上胡兒馬師古曰騰跳躍也因抱兒鞭馬南馳數十里得其餘軍匈奴騎數百追之廣行取兒弓射殺追騎師古曰且行且射也以故得脱於是至漢漢下廣吏吏當廣亡失多為虜所生得師古曰當謂處其罪也當斬贖為庶人數嵗與故潁隂侯屏居藍田南山中射獵師古曰潁隂侯灌嬰之孫名彊嘗夜從一騎出從人田閒飲宋祁曰南本飲作欲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下居無何匈奴入遼西宋祁曰越本作隴西殺太守敗韓將軍蘇林曰韓安國韓將軍後徙居右北平死於是上乃召拜廣為右北平太守廣請霸陵尉與俱師古曰奏請天子而將行至軍而斬之上書自陳謝罪上報曰將軍者國之爪牙也司馬法曰登車不式遭喪不服服䖍曰式撫車之式以禮敬人也式者車前横木也字或作軾振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏師古曰竦驚也是以名聲暴於夷貉威稜憺乎鄰國李奇曰神靈之威曰稜憺猶動也蘇林曰陳留人語恐言憺之師古曰稜音來登反憺音徒濫反夫報忿除害捐殘去殺朕之所圖於將軍也若廼免冠徒跣稽顙請罪豈朕之指哉師古曰指意也將軍其率師東轅彌節白檀孟康曰白檀縣名屬右北平李奇曰彌節少安之貌師古曰彌音亡俾反以臨右北平盛秋師古曰盛秋馬肥恐虜為冦故令折衝禦難也廣在郡匈奴號曰漢飛將軍避之數嵗不入界廣出獵見草中石以為虎而射之中石没矢視之石也他日射之終不能入矣廣所居郡聞有虎常自射之及居右北平射虎虎騰傷廣廣亦射殺之石建卒上召廣代為郎中令元朔六年廣復為將軍從大將軍出定襄諸將多中首虜率為侯者如淳曰中猶充也充本法得首若干封侯也師古曰率謂軍功封賞之科著在法令者也中音竹仲反而廣軍無功後三嵗廣以郎中令將四千騎出右北平博望侯張騫將萬騎與廣俱異道行數百里匈奴左賢王將四萬騎圍廣廣軍士皆恐廣廼使其子敢徃馳之敢從數十騎直貫胡騎出其左右而還報廣曰胡虜易與耳軍士乃安為圜陳外鄉師古曰鄉讀曰嚮胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持滿毋發師古曰注矢於弓弩而張滿之不發矢也而廣身自以大黄射其裨將服䖍曰黄肩弩也孟康曰太公䧟堅郤敵以大黄參連弩也晉灼曰黄肩即黄閒也大黄其大者也師古曰服晉二説是也殺數人胡虜益觧㑹暮吏士無人色師古曰言懼甚而廣意氣自如師古曰自如猶云如舊益治軍師古曰廵部曲整行陳也軍中服其勇也明日復力戰而博望侯軍亦至匈奴廼觧去漢軍罷弗能追師古曰罷讀曰疲是時廣軍幾没罷師古曰幾音鉅依反宋祁曰浙本及越本並無罷字歸漢法博望侯後期當死贖為庶人廣軍自當亡賞師古曰自當謂為虜所勝又能勝虜功過相當也初廣與從弟李蔡俱為郎事文帝景帝時蔡積功至二千石武帝元朔中為輕車將軍從大將軍擊右賢王有功中率封為樂安侯師古曰此傳及百官表並為樂安侯而功臣表作安樂侯是功臣表誤也元狩二年代公孫𢎞為丞相蔡為人在下中師古曰在下軰之中名聲出廣下逺甚然廣不得爵邑官不過九卿廣之軍吏及士卒或取封侯廣與望氣王朔語云自漢擊匈奴廣未甞不在其中而諸妄校尉已下張晏曰妄猶凡也材能不及中師古曰中謂中庸之人也以軍功取侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯邪朔曰將軍自念豈甞有恨者乎師古曰恨悔也廣曰吾為隴西守羌甞反吾誘降者八百餘人詐而同日殺之至今恨獨此耳朔曰禍莫大於殺已降此廼將軍所以不得侯者也廣歴七郡太守前後四十餘年得賞賜輙分其戲下師古曰戲讀曰麾又音許宜反飲食與士卒共之家無餘財終不言生産事為人長爰臂如淳曰臂如猨臂通肩也或曰似當為緩臂也師古曰王國風菟爰之詩云有莬爰爰亦緩意其義兩通其善射亦天性雖子孫他人學者莫能及廣呐口少言師古曰呐亦訥字與人居則畫地為軍陳射闊狹以飲專以射為戲如淳曰為戲求疏密持酒以飲不勝者也將兵乏絶處見水士卒不盡飲不近水不盡餐不甞食寛緩不苛師古曰苛細也士以此愛樂為用其射見敵非在數十歩之内度不中不發師古曰度音待各反中音竹仲反發即應弦而倒用此其將數困辱及射猛獸亦數為所傷云元狩四年大將軍票騎將軍大擊匈奴廣數自請行上以為老不許良久乃許之以為前將軍大將軍青出塞捕虜知}
