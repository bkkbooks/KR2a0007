  - {type: variant, offset: 83, length: 8, content: 堂邑氏奴甘父俱出, WYG: 十餘騎奔射殺白馬將而復還至其百騎中觧鞍縱馬卧師古曰縱放也時㑹暮胡兵終怪之弗敢擊夜半胡兵以為漢有伏軍於傍欲夜取之即引去平旦廣乃歸其大軍後徙為}
