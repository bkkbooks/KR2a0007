  - {type: 'tls:seg', offset: 93, content: '', id: KR2a0007_tls_054-1a.17}
  - {type: variant, offset: 93, length: 1, content: 徑, WYG: 北地鴈門雲中太守武帝即位左右言廣名將也由是入為未央衞尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳師古曰續漢書百官志云将軍領軍皆有部曲大將軍營五部部校尉一人部下有曲曲有軍候一人今廣尚於簡易故行道之中而不立部曲也就善水草頓舍人人自便師古曰頓止也舍息也便安利也音頻靣反其下亦同不擊刁斗自衞孟康曰刁斗以銅作鐎受一斗晝炊飯食夜擊持行故名曰刁斗今在滎陽庫中也蘇林曰形如鋗無縁師古曰鐎音譙郡之譙温器也鋗音火𤣥反鋗即銚也今俗或呼銅銚音姚莫府省文書晉灼曰将軍職在征行無常處所在為治故言莫府也莫大也或曰衛青征匈奴絶大莫大克獲帝就拜大將軍於幕中府故曰莫府莫府之名始於此也師古曰二説皆非也莫府者以軍幕為義古字通單用耳軍旅無常居止故以帳幕言之廉頗李牧市租皆入幕府此則非因衞青始有其號又莫訓大於義乖矣省少也音所領反宋祁曰晉灼二字史記作如淳説然亦逺斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿師古曰簿文簿音歩户反至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁師古曰卒讀曰猝而其士亦佚樂師古曰佚與逸同逸樂謂閑豫也為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識師古曰苦謂厭苦之不識孝景時以數直諌為太中大夫為人廉謹於文法後漢誘單于以馬邑城使大軍伏馬邑傍而廣為驍騎將軍屬䕶軍將軍師古曰韓安國單于覺之去漢軍皆無功後四嵗廣以衞尉為將軍出鴈門擊}
