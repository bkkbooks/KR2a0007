  - {type: variant, offset: 801, length: 5, content: 是歲元朔六, WYG: 城匈奴攻之緒降而單于客遇緒常坐陵上陵痛其家以李緒而誅使人刺殺緒大閼氏欲殺陵師古曰大閼氏單于之母單于匿之北方大閼氏死廼還單于壯陵以女妻之立為右校王衛律為丁靈王師古曰丁靈胡之别種也立為王而主其人也皆貴用事衛律者父本長水胡人律生長漢善協律都尉李延}
