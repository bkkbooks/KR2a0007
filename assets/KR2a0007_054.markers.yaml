  - {type: variant, offset: 919, length: 1, content: 騫, WYG: 召讀曰邵凡十一人皆有傳自丞相黄霸廷尉于定國大司農朱邑京兆尹張敞右扶風尹翁歸及儒者夏侯勝等皆以善終著名宣帝之世然不得列於名臣之圖以此知其選矣贊曰李將軍恂恂如鄙人口不能出辭師古曰恂恂誠謹貌也音荀及死之日天下知與不知皆為流涕彼其中心誠信於士大夫也諺曰桃李不言下自成蹊師古曰蹊謂徑道也言桃李以其華實之故非有所召呼而人争歸趣來徃不絶其下自然成徑以喻人懐誠信之心故能潜有所感也蹊音奚此言雖小可以喻大然三代之將道家所忌宋祁曰南本代作世自廣至陵遂亡其宗哀哉孔子稱志士仁人有殺身以成仁無求生以害仁使於四方不辱君命師古曰皆論語載孔子之言蘇武有之矣前漢書卷五十四前漢書卷五十四考證李廣傳隴西成紀人也臣召南按成紀縣漢初屬隴西郡至元光以後置天水郡改屬焉故志載成紀於天水下而此傳曰隴西成紀人也因抱兒茅坤曰史記作因推墮兒是彌節白檀顧炎武曰彌與弭同司馬相如傳於是楚王乃弭節徘徊郭璞曰弭猶低也節所杖信節也而廣身自以大黄射其禆将注孟康曰太公䧟堅却敵以大黄臣召南按注太公下應有六韜曰三字此刋本訛脱也而令廣并于右將軍軍出東道臣召南按後文注右將軍趙食其也應在此文下李陵傳至東浚稽山南龍勒水上胡三省曰志敦煌龍勒縣有龍勒水出南𦍑中東北入澤溉民田盖其下流至浚稽山下臣召南按陵出居延遮虜障此龍勒水當在居延塞外直北沙磧中故下文曰陵出居延北行三十日至浚稽山不當以西陲敦煌之龍勒縣實之也且志言有氐置水不云即龍勒水胡氏地學極精而此條則誤百五十萬矢皆盡臣召南按百字通鑑作一日然則司馬温公所見本與今本不同也坐預詔之注孟康云云胡三省曰注非也帝意}
