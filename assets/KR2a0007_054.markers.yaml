  - {type: variant, offset: 21, length: 0, content: '', krp: 騎常侍師古曰官為郎而常騎以侍天子故曰騎常侍數從射獵格殺猛獸文帝曰惜廣不逢}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 令當髙祖世萬户侯豈足道哉景帝即位為騎郎將師古曰為騎郎之将主騎郎吳楚反時為驍騎都尉從太尉亞夫戰昌邑下顯名以梁王授廣將軍印故還賞不行文穎曰廣為漢將私受梁印故不得賞也為上谷太守數與}
