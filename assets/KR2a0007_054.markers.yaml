  - {type: variant, offset: 921, length: 4, content: 失侯因曰, WYG: 悔追思前事以為當陵發出塞之時方可詔博徳繼其後以迎陵軍乃于陵未行時預詔之使博徳羞為陵後距得生姦詐上奏而遂令博徳别出西河致陵軍無救也蘇武傳乃徙武北海上}
