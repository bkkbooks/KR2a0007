  - {type: variant, offset: 76, length: 6, content: 郎應募使月氏, WYG: 為誘騎驚上山陳師古曰為陳以待廣也廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匈奴追射我立盡今我留匈奴必以我為大軍之誘不我擊師古曰不我擊不敢擊我也廣令曰前未到匈奴陳二里所止令曰皆下馬觧鞍騎曰虜多如是觧鞍即急奈何廣曰彼虜以我為走今觧鞍以示不去用堅其意師古曰示以堅牢令敵意知之有白馬將出䕶兵師古曰將之乘白馬者也䕶謂監視之廣上馬}
