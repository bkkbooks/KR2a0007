  - {type: variant, offset: 929, length: 4, content: 中聞烏孫, WYG: 北界其外即丁令也塞外遇大水澤通稱為海唐書地理志骨利幹都播二部落北有小海氷堅時馬行八日可渡海北多大山即此北海也今曰白哈兒湖在喀爾喀極北鄂羅斯國之南界賜武馬畜服匿穹廬注師古曰孟晉二説是也臣宗萬按南齊書陸澄傳竟陵}
