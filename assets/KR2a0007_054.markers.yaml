  - {type: variant, offset: 410, length: 328, content: 聞其旁大國五六具為天子言其地形所有語皆在西域傳騫曰臣在大夏時見邛竹杖蜀布問安得此大夏國人曰吾賈人往市之身毒國身毒國在大夏東南可數千里其俗土著與大夏同而卑溼暑熱其民乘象以戰其國臨大水焉以騫度之大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不遠矣今使大夏從羌中險羌人惡之少北則為匈奴所得從蜀宜徑又無寇天子既聞大宛及大夏安息之屬皆大國多奇物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵彊可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威德徧於四海天子欣欣以騫言為然乃令因蜀犍為發間使四道並出出駹出莋出徙邛出僰皆各行一二千里其北方閉氐莋南方閉巂昆明昆明之屬無君長善寇盜輒殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越而蜀賈間出物者或至焉於, WYG: ''}
