  - {type: variant, offset: 847, length: 2, content: 歲驃, krp: 為更負漢國故欲先自殺也重音直用反勝恵共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秩訾曰臣瓚曰胡官之號也即謀單于何以復加師古曰言謀衞律而殺之其罰太重宜皆降之單于使衞律召武受辭師古曰致單于之命而取其對也武謂恵等屈節辱命雖生何靣目以歸漢引佩刀自刺衞律驚自抱持武馳召毉鑿地為坎置煴火師古曰煴謂聚火無焱者也音於云反焱音式膽反覆武其上師古曰覆身於坎上也覆音芳目反蹈其背以出血武氣絶半日復息師古曰息謂出氣也恵等哭輿歸營宋祁曰浙本哭作共單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武師古曰諭説令降也㑹論虞常欲因此時降武劒斬虞常已律曰漢使張勝謀殺單于近臣師古曰衞律自謂也當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山富貴如此師古曰彌滿也蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰女為人臣子不顧恩義畔主背親為降虜於蠻夷何以女為見師古曰言何用見女為也且單于信女使决人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨匈奴未耳若知我不降明師古曰若汝也言汝知我不肯降明矣欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之廼幽武置大窖中師古曰舊米粟之窖而空者也音工孝反絶不飲食師古曰飲音於禁反食讀曰飤天雨雪武臥齧雪與旃毛并咽之師古曰咽吞也音宴數日不死匈奴以為神乃徙武北海上無人處使牧羝羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏白頭馬生角之比也羝音丁奚反乳音人喻反宋祁曰牧羝字下疑有羊字别其官屬常惠等各置他所武既至海上廩食不至師古曰無人給飤之掘野䑕去􅋄實而食之蘇林曰取䑕所去草實而食之張晏曰取䑕及草實并而食之師古曰蘇説是也􅋄古草字去謂藏之也音邱吕反劉攽曰今北方野鼠之類甚多皆可食也武掘野鼠得即食之其草食乃頗去藏耳杖漢節牧羊臥起操持節旄盡落積五六年單于弟於靬王弋射海上師古曰靬音居言反武能網紡繳檠弓弩師古曰繳生絲縷也可以弋射檠謂輔正弓弩也繳音斫檠音警又音巨京反宋祁曰網字上疑有結字於靬王愛之給其衣食三嵗餘王病賜武馬畜服匿穹廬劉徳曰服匿如小旃帳孟康曰服匿如甖小口大腹方底用受酒酪穹廬旃帳也晉灼曰河東北界人呼小石甖受二斗所曰服匿師古曰孟晉二説是也王死後人衆徙去其冬丁令盗武牛羊師古曰令音零丁令即上所謂丁靈耳武復窮厄初武與李陵俱為侍中武使匈奴明年陵降不敢求武久之單于使陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使陵來説足下虛心欲相待終不得歸漢空自苦亡人之地信義安所見乎前長君為奉車服䖍曰武兄嘉從至雍棫陽宫扶輦下除張晏曰主扶輦下除道也師古曰除謂門屏之間觸柱折轅劾大不敬伏劒自刎師古曰刎斷也斷其頭也音武粉反賜錢二百萬以葬孺卿從祠河東后土張晏曰武弟賢宦騎與黄門駙馬争舩師古曰宦騎宦者而為騎也黄門駙馬天子駙馬之在黄門者駙副也金日殫傳曰養馬於黄門也推墮駙馬河中溺死宦騎亡詔使孺卿逐捕不得惶恐飲藥而死來時大夫人已不幸師古曰不幸亦謂死陵送𦵏至陽陵子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露師古曰朝露見日則晞人命短促亦如之何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宫師古曰百官公卿表云少府屬官有居室武帝太初元年更名保宫子卿不欲降何以過陵且陛下春秋髙法令亡常大臣亡罪夷滅者數十家安危不可知子卿尚復誰為乎願聽陵計勿復有云武曰武父子亡功德皆為陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖䝉斧鉞湯鑊誠甘樂之臣事君猶子事父也子為父死無所恨願勿復再言陵與武飲數日復曰子卿壹聴陵言武曰自分已死久矣師古曰分音扶問反王必欲降武請畢今日之驩效死於前師古曰效致也陵見其至誠喟然歎曰嗟乎義士陵與衞律之罪上通於天因泣下霑衿與武决去師古曰决别也陵惡自賜武師古曰謂若示已於匈奴中富饒以夸武使其妻賜武牛羊數十頭後陵復至北海上語武區脱捕得雲中生口服䖍曰區脱土室胡兒所作以候漢者也李奇曰匈奴邊境羅落守衞官也晉灼曰匈奴傳東胡與匈奴間有棄地千餘里各居其邊為區脱又云漢得區脱王發人民屯區脱以備漢此為因邊境以為官李説是也師古曰匈奴邊境為候望之室服説是也本非官號區脱王者以其所部居區脱之處因呼之耳李晉二説皆失之區讀與甌同音一侯反脱音土活反言太守以下吏民皆白服曰上崩武聞之南鄉號哭歐血旦夕臨師古曰鄉讀曰嚮臨哭也音力禁反數月昭帝即位劉敞曰數月字當屬上句數年匈奴與漢和親漢求武等匈奴詭言武死宋祁曰江浙本詭作紿後漢使復至匈奴常恵請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如恵語以讓單于師古曰讓責也單于視左右而驚謝漢使曰武等實在於是李陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢且貰陵罪師古曰貰寛也全其老母使得奮大辱之積志庶幾乎曹柯之盟李奇曰欲劫單于如曹劌劫齊桓公柯盟之時此陵宿昔之所不忘也收族陵家為世大戮陵尚復何顧乎已矣令子卿知吾心耳異域之人壹别長絶陵起舞歌曰徑萬里兮度沙幕為君將兮奮匈奴路窮絶兮矢刃摧士衆滅兮名已隤老母已死雖報恩將安歸師古曰隤墜也音大回反宋祁曰雖字下疑有欲字陵泣下數行因與武决單于召㑹武官屬師古曰㑹謂集聚也前以降及物故凡隨武還者九人師古曰物故謂死也言其同於鬼物而故也一説不欲斥言但云其所服用之物皆已故耳而説者妄欲改物為勿非也宋祁曰物當從南本作歾音没武以始元六年春至京師詔武奉一太牢謁武帝園廟拜為典屬國秩中二千石賜錢二百萬公田二頃宅一區常恵徐聖趙終根皆拜為中郎賜帛各二百匹其餘六人老歸家賜錢人十萬復終身師古曰復音芳目反常惠後至右將軍封列侯自有傳武留匈奴凡十九嵗始以彊壯出及還須髪盡白武來歸明年上官桀子安與桑𢎞羊及燕王盖主謀反武子男元與安有謀坐死初桀安與大將軍霍光争權數疏光過失子燕王師古曰疏謂條錄之令上書告之又言蘇武使匈奴二十年不降還廼為典屬國師古曰實十九年而言二十者欲久其事以見寃屈故多言也大將軍長史無功勞為捜粟都尉光顓權自恣師古曰顓與專同及燕王等反誅窮治黨與武素與桀𢎞羊有舊數為燕王所訟子又在謀中廷尉奏請逮捕武霍光寢其奏免武官數年昭帝崩武以故二千石與計謀立宣帝師古曰與讀作預賜爵闗内侯食邑三百户久之衞將軍張安世薦武明習故事奉使不辱命先帝以為遺言宣帝即時召武待詔宦者署師古曰百官公卿表少府屬官有宦者令丞以其署親近故令於此待詔也數進見復為右曹典屬國以武著節老臣令朝朔望號稱祭酒師古曰加祭酒之號所以示優尊也祭酒已觧在伍被傳甚優寵之武所得賞賜盡以施予昆弟故人家不餘財皇后父平恩侯帝舅平昌侯樂昌侯師古曰平恩侯許伯平昌侯王無故樂昌侯王武也車}
