  - {type: variant, offset: 69, length: 0, content: '', WYG: 貴人者將數十騎從張晏曰放縱逰獵也師古曰張讀作縱此説非也直言將數十騎自隨在大軍前行而忽遇敵也從音才用反見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣師古曰走趣也音奏廣曰是必射鵰者也文頴曰鵰鳥也故使善射者射之師古曰鵰大鷙鳥也一名鷲黒色翮可以為箭羽音彫廣}
  - {type: variant, offset: 69, length: 0, content: '', krp: 貴人者將數十騎從張晏曰放縱逰獵也師古曰張讀作縱此説非也直言將數十騎自隨在大軍前行而忽遇敵也從音才用反見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣師古曰走趣也音奏廣曰是必射鵰者也文頴曰鵰鳥也故使善射者射之師古曰鵰大鷙鳥也一名鷲黒色翮可以為箭羽音彫廣}
  - {type: variant, offset: 70, length: 3, content: 募能使, WYG: 從百騎徃馳三人師古曰疾馳而逐之三人亡馬歩行行數十里廣令其騎張左右翼師古曰旁引其騎若鳥翼之為而廣身自射彼三人}
