  - {type: variant, offset: 791, length: 0, content: '', WYG: 脱者陵在匈奴嵗餘上遣因杅將軍公孫敖孟康曰因杅胡地名也師古曰杅音于將兵深入匈奴迎陵敖軍無功還曰捕得生口言李陵教單于為兵}
