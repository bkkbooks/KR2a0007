  - {type: variant, offset: 2079, length: 453, content: 使往既多其少從率進孰於天子言大宛有善馬在貳師城匿不肯示漢使天子既好宛馬聞之甘心使壯士車令等持千金及金馬以請宛王貳師城善馬宛國饒漢物相與謀曰漢去我遠而鹽水中數有敗出其北有胡寇出其南乏水草又且往往而絕邑乏食者多漢使數百人為輩來常乏食死者過半是安能致大軍乎且貳師馬宛寶馬也遂不肯予漢使漢使怒妄言椎金馬而去宛中貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人強弩射之即破宛矣天子以嘗使浞野侯攻樓蘭以七百騎先至虜其王以定漢等言為然而欲侯寵姬李氏乃以李廣利為將軍伐宛騫孫猛字子游有俊才元帝時為光祿大夫使匈奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上產昌邑哀王太初元年以廣利為貳師將軍發屬國六千騎及郡國惡少年數萬人以往期至貳師城取善馬故號貳師將軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士財有數千皆飢罷攻郁成城郁成距之所殺傷甚眾貳師將軍與左右計至郁成尚不能舉況至其王都乎引而還往來二歲至敦煌士不過什一二使使上, WYG: ''}
