  - {type: variant, offset: 912, length: 5, content: 數問騫大夏, WYG: 太傅蕭望之次曰典屬國蘇武皆有功徳知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉師古曰三人皆周宣王之臣有文武之功佐宣王中興者也言宣帝亦重興漢室而霍光等竝為名臣皆比於方叔}
