  - {type: variant, offset: 908, length: 3, content: 幕北天, WYG: 麒麟閣張晏曰武帝獲麒麟時作此閣圖畫其象於閣遂以為名師古曰漢宫閣疏名云蕭何造法其形貌署其官爵姓名師古曰署表也題也唯霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衞將軍富平侯張安世次曰車騎將軍龍􅋕侯韓増宋祁曰頟或作雒次曰後將軍營平侯趙充國次曰丞相髙平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽城侯劉德次曰少府梁邱賀次曰太}
