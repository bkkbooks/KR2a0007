  - {type: variant, offset: 786, length: 0, content: '', WYG: 與不知老壯皆為垂泣師古曰知謂素相識知也而右將軍獨下吏當死贖為庶人廣三子曰當户椒敢皆為郎上與韓嫣戲嫣少不遜師古曰嫣音偃當户擊嫣嫣走於是上以為能當户蚤死乃拜椒為代郡太守皆先廣死廣死軍中時敢從票騎將軍廣死明年李蔡以丞相坐詔賜冢地陽陵當得二十畝蔡盗取三頃頗賣得四十餘萬又盗取神道外壖地一畝葬其中師古曰壖音人椽反當下獄自殺敢以校尉從票騎將軍擊胡左賢王力戰奪左賢王旗鼔斬首多賜爵關内侯食邑二百户代廣為郎中令頃之怨大將軍青之恨其父師古曰令其父恨而死也廼擊傷大將軍大將軍匿諱之居無何敢從上雍至甘泉宫獵師古曰無何謂未多時也雍之所在地形積髙故云上也上音時掌反他皆類此票騎將軍去病怨敢傷青射殺敢去病時方貴幸上為諱云鹿觸殺之居嵗餘去病死敢有女為太子中人愛幸敢男禹有寵於太子然好利亦有勇甞與侍中貴人飲侵陵之莫敢應師古曰言畏其勇氣後愬之上上召禹使刺虎縣下圏中未至地有詔引出之禹從落中以劒斫絶纍欲刺虎師古曰落與絡同謂當時繦絡之而下也纍索也音力追反上壯之遂救止焉而當户有遺腹子陵將兵擊胡兵敗降匈奴後人告禹謀欲亡從陵下吏死陵字少卿少為侍中建章監善騎射愛人謙讓下士師古曰下音胡亞反甚得名譽武帝以為有廣之風使將八百騎深入匈奴二千餘里過居延視地形不見虜還拜為騎都尉將勇敢五千人教射酒泉張掖以備胡數年漢遣貳師將軍伐大宛使陵將五校兵隨後行至塞㑹貳師還上賜陵書陵留吏士與輕騎五百出敦煌至鹽}
