  - {type: variant, offset: 788, length: 0, content: '', krp: 木令虜火不得延及也南行至山下單于在南山上使其子將騎撃陵陵軍歩鬬樹木間復殺數千人因發連弩射單于服䖍曰三十弩共一弦也張晏曰三十絭共一臂也師古曰張説是也絭音去權反又音眷劉攽曰三十弩一絃三十絭一臂皆無此理妄説也盖如今之合蟬或併兩弩共一絃之類單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得毋有伏兵乎諸當户君長皆言師古曰當户匈奴官名也單于自將數萬騎擊漢數千人不能㓕後無以復使邊臣令漢益輕匈奴復力戰山谷間尚四五十里得平地不能破廼還是時陵軍益急匈奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去㑹陵軍候管敢為校尉所辱亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及成安侯校各八百人為前行以黄與白為幟師古曰幟旗也音式志反當使精騎射之即破矣成安侯者頴川人父韓千秋故濟南相奮擊南越戰死武帝封子延年為侯以校尉隨陵單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降師古曰且戰且呼也呼音火故反趣讀曰促遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山師古曰鞮音丁奚反百五十萬矢皆盡宋祁曰越本百字作一日即棄車去士尚三千餘人徒斬車輻而持之師古曰徒但也軍吏持尺刀抵山入陿谷單于遮其後乘隅下壘石服䖍曰山名也師古曰此説非也言放石以投人因山隅曲而下也壘音盧對反士卒多死不得行昏後陵便衣獨歩山營蘇林曰搴衣卷褏而行也師古曰此説非也便衣謂著短衣小褏也止左右毋隨我丈夫一取單于耳師古曰言一身獨取也良久陵還大息曰兵敗死矣軍吏或曰將軍威震匈奴天命不遂後求道徑還歸如浞野侯為虜所得後亡還天子客遇之况於將軍乎宋祁曰浙本客作容陵曰公止吾不死非壯士也於是盡斬旌旗及珍寳埋地中陵歎曰復得數十矢足以脱矣宋祁曰南本浙本復字下有人字須得人字義乃安若只云數十矢何能脱也今無兵復戰師古曰兵即謂矢及矛㦸之屬也天明坐受縛矣各鳥獸散猶有得脱歸報天子者師古曰脱免也音土活反次下亦同令軍士人持二升糒一半冰如淳曰半讀曰片或曰五升曰半師古曰半讀曰判判大片也時冬寒有冰持之以備渇也期至遮虜鄣者相待夜半時擊鼓起士鼔不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無靣目報陛下遂降軍人分散脱至塞者四百餘人陵敗}
