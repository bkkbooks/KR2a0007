  - {type: variant, offset: 2926, length: 926, content: 十餘日宛貴人謀曰王毋寶匿善馬殺漢使今殺王而出善馬漢兵宜解即不乃力戰而死未晚也宛貴人皆以為然共殺王其外城壞虜宛貴人勇將煎靡宛大恐走入中城相與謀曰漢所為攻宛以王毋寡持其頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我我盡殺善馬康居之救又且至至我居內康居居外與漢軍戰孰計之何從是時康居候視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其內食尚多計以為來誅首惡者毋寡毋寡頭已至如此不許則堅守而康居候漢兵罷來救宛破漢軍必矣軍吏皆以為然許宛之約宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王與盟而罷兵終不得入中城罷而引歸初貳師起敦煌西為人多道上國不能食分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人別至郁成城守不肯給食申生去大軍二百里負而輕之攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等數人脫亡走貳師貳師令搜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縛守詣大將軍四人相謂郁成漢所毒今生將卒失大事欲殺莫適先擊上邽騎士趙弟拔劍擊斬郁成王桀等遂追及大將軍初貳師後行天子使使告烏孫大發兵擊宛烏孫發二千騎往持兩端不肯前貳師將軍之東諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉軍還入玉門者萬餘人馬千餘匹後行非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者眾天子為萬里而伐不錄其過乃下詔曰匈奴為害久矣今雖徙幕北與旁國謀共要絕大月氏使遮殺中郎將江故雁門守攘危須以西及大宛皆合約殺期門車令中郎將朝及身毒國使隔東西道貳師將軍廣利征討厥罪伐勝大宛賴天之靈從泝河山涉流沙通西海山雪不積士大夫徑度獲王首虜珍怪之物畢陳於闕其封廣利為海西侯食邑八千戶又封斬郁成王者趙弟為新畤侯軍正趙始成功最多為光祿大夫上官桀敢深入為少府李哆有計謀為上黨太守軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以適過行者皆黜其勞士卒賜直四萬錢伐宛再反凡四歲而得罷焉後十一歲征和三年貳師復將七萬騎出五原擊匈奴度郅居水兵敗降匈奴為單于所殺語在匈奴傳贊曰禹本紀言河出昆侖昆侖高二千五百里餘日月所相避隱為光明也自張騫使大夏之後窮河原惡睹所謂昆侖者乎故言九州山川尚書近之矣至禹本紀山經所有放哉, WYG: 考證}
