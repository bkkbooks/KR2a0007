  - {type: variant, offset: 787, length: 0, content: '', WYG: 迎貳師還復留屯張掖天漢二年貳師將三萬騎出酒泉擊左賢王於天山召陵欲使為貳師將輜重師古曰重音直用反陵召見武臺師古曰未央宫有武臺殿叩頭自請曰臣所將屯邊者皆荆楚勇士奇材劔客也力扼虎射命中師古曰扼謂捉持之也命中者所指名處即中之也扼音厄願得自當一隊師古曰隊部也音徒内反到蘭干山南以分單于兵毋令專鄉貳師軍師古曰鄉讀曰嚮上曰將惡相屬邪吾發軍多毋騎予女陵對無所事騎師古曰猶言不事須騎也臣願以少擊衆歩兵五千人渉單于庭上壯而許之因詔彊弩都尉路博徳將兵半道迎陵軍博徳故伏波將軍亦羞為陵後距奏言方秋匈奴馬肥未可與戰臣願留陵至春俱將酒泉張掖騎各五千人並擊東西浚稽可必禽也師古曰浚稽山名時虜分居此兩山也浚音峻稽音雞書奏上怒疑陵悔不欲出而教博徳上書廼詔博德吾欲予李陵騎云欲以少擊衆今虜入西河其引兵走西河遮鉤營之道張晏曰胡來要害道令博徳遮之師古曰走音奏詔陵以九月發出遮虜鄣師古曰鄣者塞上險要之處徃徃脩築别置候望之人所以自鄣蔽而伺敵也遮虜鄣名至東浚稽山南龍勒水上俳佪觀虜即亡所見從浞野侯趙破奴故道抵受降城休士師古曰抵歸也受降城本公孫敖所築休息也浞音仕角反因騎置以聞師古曰騎置謂驛騎也所與博徳言者云何張晏曰天子疑陵教博徳上書求至春乃俱西也具以書對陵於是將其歩卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳歩樂還以聞歩樂召見道陵將率得士死力上甚説師古曰説讀曰悦拜歩樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持㦸盾後行持弓弩師古曰行並音胡剛反令曰聞鼔聲而縱聞金聲而止師古曰金謂鉦也一名鐲鐲音濁虜見漢軍少直前就營陵搏戰攻之如淳曰手對戰也千弩俱發應弦而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中師古曰抵當也至也其下亦同連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰陵曰吾士氣少衰而鼓不起者何也師古曰擊鼔進士而士氣不起也一曰士卒以有妻婦故聞鼔音而不時起也軍中豈有女子乎始軍出時關東羣盗妻子徙邊者隨軍為卒妻婦大匿車中宋祁曰大字南本浙本並作伏陵捜得皆劒斬之明日復戰斬首三千餘級引兵東南循故龍城道行四五日抵大澤葭葦中師古曰葭即蘆也音家虜從上風縱火陵亦令軍中縱火以自救師古曰預自燒其旁}
