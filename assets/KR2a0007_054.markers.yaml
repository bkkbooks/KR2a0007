  - {type: variant, offset: 833, length: 0, content: '', WYG: 上官桀輔政素與陵善遣陵故人隴西任立政等三人師古曰故人謂舊與相知者俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵師古曰以目相視而感動之今俗所謂眼語者也而數數自循其刀環師古曰循謂摩循也握其足隂諭之言可還歸漢也後陵律持牛酒勞漢使博飲蘇林曰博且飲也師古曰勞音來到反兩人皆胡服椎結師古曰結讀曰髻一撮之髻其形如椎立政大言曰漢已大赦中國安樂主上富於春秋師古曰言天子年少霍子孟上官少叔用事師古曰子孟光之字少叔桀之字也以此言微動之陵墨不應孰視而自循其髪答曰吾已胡服矣有頃律起更衣立政曰咄少卿良苦師古曰言甚勞苦霍子孟上官少叔謝女師古曰謝以辭相問也陵曰霍與上官無恙乎師古曰恙憂病也立政曰請少卿來歸故鄉毋憂富貴陵字立政曰少公師古曰呼其字宋祁曰字字一作呼歸易耳恐再辱奈何語未卒衞律還頗聞餘語曰李少卿賢者不獨居一國范蠡徧遊天下由余去戎入秦今何語之親也因罷去立政隨謂陵曰亦有意乎師古曰隨其後而語之陵曰丈夫不能再辱陵在匈奴二十餘年元平元年病死蘇建杜陵人也以校尉從大將軍青擊匈奴封平陵侯以將軍築朔方後以衞尉為游擊將軍從大將軍出朔方後一嵗以右將軍再從大將軍出定襄亡翕侯服䖍曰趙信也}
