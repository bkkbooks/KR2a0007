  - {type: variant, offset: 782, length: 1, content: 擊, WYG: 此傳誤也大將軍亦欲使敖與俱當單于故徙廣廣知之固辭大將軍弗聴令長史封書與廣之莫府師古曰之徃也莫府衞靑行軍府宋祁曰廣之莫府景祐本無廣字曰急詣部如書劉攽曰莫府乃廣之前將軍莫府也凡將兵皆有莫府張敖監平樂兵置莫府是矣大將軍既不許廣難面不從故但封書與廣之莫府使奉行耳及後急責廣之莫府亦是劉奉世曰此莫府廣軍之莫府曹吏文書所在也廣見大將軍未肯去靑徑封書與廣莫府令如書也與之莫府者猶言與其莫府也廣不謝大將軍而起行意象愠怒師古曰言愠怒之色形於外也而就部引兵與右將軍食其合軍出東道師古曰趙食其也食音異其音基惑失道後大將軍師古曰惑迷也在後不及期也大將軍與單于接戰單于遁走弗能得而還南絶幕廼遇兩將軍師古曰絶渡也廣已見大將軍還入軍大將軍使長史持糒醪遺廣師古曰糒乾飯也醪汁滓酒也糒音備醪音牢因問廣食其失道狀曰青欲上書報天子失軍曲折師古曰曲折猶言委曲也廣未對大將軍長史急責廣之莫府上簿師古曰之徃也簿謂文狀也音歩户反廣曰諸校尉亡罪乃我自失道吾今自上簿劉奉世曰此兩莫府亦廣之莫府也廣見青已還入軍未至莫府而長史來問廣廣未對而長史又旁責廣之莫府曹吏令上簿故廣云我今自上簿然後退至莫府乃自剄耳至莫府謂其麾下曰廣結髪與}
