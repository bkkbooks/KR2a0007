  - {type: variant, offset: 846, length: 0, content: '', WYG: 其後為代郡太守卒官有三子嘉為奉車都尉賢為騎都尉宋祁曰南夲騎作駙馬中子武最知名武字子卿少以父任兄弟竝為郎稍遷至栘中廐監師古曰栘中厩名為之監也栘音移時漢連伐胡數通使相窺觀匈奴留漢使郭吉路充國等前後十餘軰匈奴使來漢亦留之以相當天漢元年且鞮侯單于初立師古曰且音子閭反鞮音丁奚反恐漢襲之廼曰漢天子我丈人行也師古曰丈人尊老之稱行音胡浪反盡歸漢使路充國等武帝嘉其義廼遣武以中郎將使持節送匈奴使留在漢者因厚賂單于荅其善意武與副中郎將張勝及假吏常恵等師古曰假吏猶言兼吏也時權為使之吏若今之差人充使典矣募士斥候百餘人俱師古曰募人以充士卒及在道為斥候者既至匈奴置幣遺單于單于益驕非漢所望也方欲發使送武等㑹緱王與長水虞常等謀反匈奴中師古曰緱音工侯反緱王者昆邪王姊子也師古曰昆音胡門反與昆邪王俱降漢後隨浞野侯没胡中師古曰從趙破奴擊匈奴兵敗而降及衞律所將降者隂相與謀刼單于母閼氏歸漢㑹武等至匈奴虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之吾母與弟在漢幸䝉其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得師古曰被執獲也單于使衞律治其事張勝聞之恐前語發以狀語武武曰事如此此必及我見犯廼死重負國欲自殺師古曰言被匈奴侵犯然後廼死}
