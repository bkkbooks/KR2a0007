  - {type: variant, offset: 1208, length: 175, content: 下泣廣既歸鄉里日令家共具設酒食請族人故舊賓客與相娛樂數問其家金餘尚有幾所趣賣以共具居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立產業基阯今日飲食費且盡宜從丈人所勸說君買田宅老人即以閒暇時為廣言此計廣曰吾豈老誖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫富者眾人之怨, WYG: 奄奄疏闊}
