  - {type: variant, offset: 3466, length: 3, content: 絫遷長, WYG: 賜黄金百斤然遂起上林苑如壽王所奏云久之隆慮公主子昭平君師古曰慮音廬尙帝女夷安公主隆慮主病因以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫内官服䖍曰主傅主之官也如淳曰禮有傅姆說者又曰傅者老大夫也漢使中行說傅翁主也師古曰傅姆是也服說失之内官署名解在律歴志以公主子廷尉上請請論師古曰論决其罪也左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我師古曰老乃有子言其晩孕育也屬音之欲反於是為之垂涕歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入高廟乎又下負萬民廼可其奏哀不能自止左右盡悲朔前上壽曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩師古曰周書洪範之辭也蕩蕩平坦之貌此二者五帝所重三王所難也陛下行之是以四海之内元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歳壽上廼起入省中夕時召讓朔師古曰讓責也少宋祁曰夕當作曰傳曰時然後言人不厭其言師古曰論語稱孔子問公叔文子於公明賈曰}
