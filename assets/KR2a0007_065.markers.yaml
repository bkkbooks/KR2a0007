  - {type: variant, offset: 1766, length: 557, content: 群臣諫昌邑王者皆超遷定國繇是為光祿大夫平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒步往過定國皆與鈞禮恩敬甚備學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤定國食酒至數石不亂冬月請治讞飲酒益精明為廷尉十八歲遷御史大夫甘露中代黃霸為丞相封西平侯三年宣帝崩元帝立以定國任職舊臣敬重之時陳萬年為御史大夫與定國並位八年論議無所拂後貢禹代為御史大夫數處駮議定國明習政事率常丞相議可然上始即位關東連年被災害民流入關言事者歸咎於大臣上於是數以朝日引見丞相御史入受詔條責以職事曰惡吏負賊妄意良民至亡辜死或盜賊發吏不亟追而反繫亡家後不敢復告以故寖廣民多冤結州郡不理連上書者交於闕廷二千石選舉不實是以在位多不任職民田有災害吏不肯除收趣其租以故重困關東流民飢寒疾疫已詔吏轉漕虛倉廩開府臧相振救賜寒者衣至春猶恐不贍今丞相御史將欲何施以塞此咎悉意條狀陳朕過失定國上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰郎有從東方來者言民父子相棄丞相御史案事之吏匿不言邪將從東方來者加增之也何以錯繆至是欲知其實方今年歲未可預知也即有水旱其憂不細公卿有可以防其未然救其已然者不各以誠對毋有所諱定國惶恐上書自劾歸侯印乞骸骨上報曰君相朕躬不敢怠息萬方, WYG: 泰階}
