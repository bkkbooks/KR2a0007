  - {type: variant, offset: 54, length: 5, content: 衣繡衣持斧, krp: 謂之蜥蜴故朔曰是非守宫則蜥蜴也蜥音先歴反蜴音余赤反蠑音榮螈音原蝘音烏典反蜓音殄劉敞曰守宫即人家屋壁中蝘蜓俗呼為蝎虎者是也此物唯在屋壁窻户間夜亦出盖用此得名耳術家之說安有此理師古乃信之何哉宋祁曰角音盧谷反獸不童也上曰善賜帛十匹復使射他物連中輒賜帛師古曰中音竹仲反其下並同時有幸倡郭舎人滑稽不窮師古曰幸倡倡優之見幸遇者也滑音骨滑稽解在公孫宏傳常侍左右曰朔狂幸中耳非至數也師古曰至實也臣願令朔復射朔中之臣榜百朔不能中臣賜帛師古曰榜擊也音歩行反廼覆樹上寄生令朔射之朔曰是窶數也蘇林曰窶音貧窶之窶數音數錢之數窶數鉤灌四股鉤也師古曰窶數戴器也以盆盛物戴於頭者則以窶數薦之今賣白團餅人所用者是也寄生者芝菌之類淋潦之日著樹而生形有周圜象窶數者今關中俗亦呼為寄生非為蔦之寄生寓木宛童有枝葉者也故朔云著樹為寄生盆下為窶數明其常在盆下今讀書者不曉其意謂射覆之物覆在盆下輒改前覆守宫盂下為盆字失之逺矣楊惲傳云䑕不容穴銜窶數也盆下之物有飲食氣故䑕銜之四股鐵鉤非所銜也宋祁曰數音藪景本作藪舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶數上令倡監榜舍人舍人不勝痛呼謈服䖍曰謈音暴鄧展曰呼音髐箭之髐謈音𤓰瓝之瓝師古曰鄧音是也痛切而叫呼也與田蚡傳呼報音義皆同一曰鄧音近之謈自寃痛之聲也舍人榜痛乃呼云謈今人痛甚則稱阿謈音歩高反是故朔}
