  - {type: variant, offset: 76, length: 0, content: '', WYG: 官當棄市師古曰詆毁辱也音丁禮反上問朔何故詆之對曰臣非敢詆之廼與為隠耳師古曰隠謂隠語也上曰隠云何朔曰夫口無毛者狗竇也聲謷謷者烏哺鷇也韋昭曰凡烏哺子而活者為鷇生而自啄曰雛師古曰鷇音口豆反劉攽曰狗竇文不全明少一字當云狗穴竇也縁兩穴相重遂誤爾凥益高者鶴俛啄也師古曰俛即俯字也俯低也啄鳥觜也俛又音免啄音竹救反舍人不服因曰臣願復問朔隠語不知亦當榜即妄為諧語曰師古曰諧者和韻之言也令壺齟老柏塗伊優亞狋吽牙何謂也張晏曰齟音樝棃之樝應劭曰狋音銀師古曰齟音側加反又音壯加反塗音丈加反優音一侯反亞音烏加反狋音五伊反吽音五侯反朔曰令者}
