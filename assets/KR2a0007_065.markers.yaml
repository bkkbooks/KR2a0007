  - {type: variant, offset: 4033, length: 5, content: 秉政專權宣, WYG: 相如吾丘壽王主父偃朱買臣嚴助汲黯膠倉終軍嚴安徐樂司馬遷之倫皆辯知閎達溢于文辭師古曰溢者言其有餘也先生自視何與比哉師古曰何與猶言何如也朔對曰臣觀其臿齒牙樹頰胲師古曰頰肉曰胲音改吐脣吻擢項頥師古曰頥頷下也音怡結股腳連脽凥師古曰脽臂也音誰遺蛇其迹行歩偊旅師古曰遺蛇猶逶迱也偊旅曲躬貌也蛇音移偊音禹臣朔雖不肖尚兼此數子者朔之進對澹辭皆此類也師古曰澹古贍字也贍給也武帝既招英俊程其器能用之如不及師古曰程謂量計之也如不及者恐失之也時方外事胡越内興制度國家多事自公孫宏以下至司馬遷皆奉使方外或為郡國守相至公卿而朔嘗至太中大夫後常為郎與枚臯郭舍人俱在左右詼啁而已師古曰啁與謿同音竹交反久之朔}
