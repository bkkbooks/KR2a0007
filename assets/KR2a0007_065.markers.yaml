  - {type: variant, offset: 75, length: 0, content: '', WYG: 然盂亦盆類朔故詭言之欲以誤郭舍人也又曰朔意盖以寄生窶數皆是附著他物而得名故謂今在盆下之寄生為窶數大物在盆下小物在盂下固可知也但不當改前盂字為盆爾又不必一日之中用一盂覆射此諸物也顔說未通又以寄生為芝菌形圜似窶數而云非寓木尤疎謬矣宋祁曰呼報當作呼服朔笑之曰咄口無毛聲謷謷凥益髙鄧展曰咄音豽裘之豽也師古曰咄叱咄之聲也音丁骨反鄧說非也謷音敖舍人恚曰朔擅詆欺天子}
