  - {type: variant, offset: 4119, length: 0, content: '', WYG: 詳錄朔之辭語者為俗人多以竒異妄附於朔故耳欲明傳所不記皆非其實也而今之為漢書學者猶更取他書雜說假合東方朔之事以博異聞良可歎矣他皆類此著音直畧反東方朔傳云一日卒有不勝洒掃之職顔師古注云卒讀曰猝洒音信又音山豉反檢諸本及前所校過并如此臣佖按許慎說文洒字解云音先禮反古又為灑埽字其灑字解云汎也汎音信今校定此註合云洒音先禮反古文為灑埽字灑汎也所蟹反汎音信盖傳冩脱誤少一十七字多又音山豉反五字前漢書卷六十五前漢書卷六十五考證東方朔傳朔應聲輙對變詐鏠出鏠當作鋒馳逐平樂觀三}
