  - {type: variant, offset: 35, length: 13, content: 州郡武帝末郡國盜賊群起暴勝, WYG: 朔文辭不遜髙自稱譽上偉之師古曰以為大竒也令待詔公車師古曰公車令屬衛尉上書者所詣也奉禄薄未得省見師古曰不被省納不得見天子也奉音扶用反其下並同久之朔紿騶朱儒文頴曰朱儒}
