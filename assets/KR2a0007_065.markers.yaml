  - {type: variant, offset: 3482, length: 1, content: 姊, WYG: 之女也故曰竇太主也堂邑侯陳午尙之午死主寡居年五十餘矣近幸董偃始偃與母以賣珠為事偃年十三隨母出入主家左右言其姣好師古曰姣美麗也音狡主召見曰吾為母養之因留第中教書計相馬御射師古曰計謂用筭也頗讀傳記至年十八而冠出則執轡入則侍内為人温柔愛人以主故諸公接之名稱城中號曰董君主因推令散財交士令中府曰師古曰中府掌金帛之藏宋祁曰之藏下姚本添者也董君所發一日金滿百斤錢滿百萬帛滿千匹乃白之師古曰言不滿此數者皆恣與之安陵爰叔者爰盎兄}
  - {type: page-break, offset: 3482, content: '', id: KR2a0007_WYG_065-12b, image: WYG0250/WYG0250-0405d.png}
  - {type: variant, offset: 3482, length: 1, content: 姊, krp: 之女也故曰竇太主也堂邑侯陳午尙之午死主寡居年五十餘矣近幸董偃始偃與母以賣珠為事偃年十三隨母出入主家左右言其姣好師古曰姣美麗也音狡主召見曰吾為母養之因留第中教書計相馬御射師古曰計謂用筭也頗讀傳記至年十八而冠出則執轡入則侍内為人温柔愛人以主故諸公接之名稱城中號曰董君主因推令散財交士令中府曰師古曰中府掌金帛之藏宋祁曰之藏下姚本添者也董君所發一日金滿百斤錢滿百萬帛滿千匹乃白之師古曰言不滿此數者皆恣與之安陵爰叔者爰盎兄}
  - {type: variant, offset: 3484, length: 2, content: 衛尉, WYG: 也與偃善謂偃曰足下私侍漢主挾不測之罪将欲安處乎師古曰不測者言其深也安處何以自安處也一曰身挾大罪廼欲自安而居處者乎偃懼曰憂之久矣不知所以師古曰以用也不知用何計也爰叔曰顧城廟逺無宿宫又有萩竹籍田如}
  - {type: variant, offset: 3484, length: 2, content: 衛尉, krp: 也與偃善謂偃曰足下私侍漢主挾不測之罪将欲安處乎師古曰不測者言其深也安處何以自安處也一曰身挾大罪廼欲自安而居處者乎偃懼曰憂之久矣不知所以師古曰以用也不知用何計也爰叔曰顧城廟逺無宿宫又有萩竹籍田如}
  - {type: variant, offset: 3487, length: 1, content: 于, WYG: 曰其間雖有地皆有萩竹籍田無可作宿觀也師古曰如說非也萩即楸字也言有楸樹及竹林可遊玩而籍田所在上又須躬親行事當有宿宫故宜獻此園劉攽曰城改成足下何不白主獻}
  - {type: variant, offset: 3487, length: 1, content: 于, krp: 曰其間雖有地皆有萩竹籍田無可作宿觀也師古曰如說非也萩即楸字也言有楸樹及竹林可遊玩而籍田所在上又須躬親行事當有宿宫故宜獻此園劉攽曰城改成足下何不白主獻}
  - {type: variant, offset: 3489, length: 1, content: 白, WYG: 門園如淳曰竇太主園在長門長門在長安城東南園可以為宿館處所故獻之此上所欲也如是上知計出於足下也則安枕而卧長無慘怛之憂久之不然上且請之於足下何如偃頓首曰敬奉教入}
  - {type: page-break, offset: 3489, content: '', id: KR2a0007_WYG_065-13a, image: WYG0250/WYG0250-0406a.png}
  - {type: variant, offset: 3489, length: 1, content: 白, krp: 門園如淳曰竇太主園在長門長門在長安城東南園可以為宿館處所故獻之此上所欲也如是上知計出於足下也則安枕而卧長無慘怛之憂久之不然上且請之於足下何如偃頓首曰敬奉教入}
  - {type: variant, offset: 3491, length: 1, content: 昌, WYG: 之主主立奏書獻之上大說師古曰說讀曰悅更名竇太主園為長門宫主大喜使偃以黄金百斤為爰叔壽叔因是為董君畫求見上之策令主稱疾不朝上往臨疾問所欲主辭謝曰妾幸䝉陛下厚恩先帝遺德奉朝請之禮備臣妾之使師古曰請音才姓反宋祁曰使景本作儀列為公主賞賜邑入師古曰既别得賞賜又所食之邑入其租賦也隆天重地死無以塞責師古曰塞補也一日卒有不勝洒掃之職師古曰卒讀曰猝洒音信又音山豉反先狗馬填溝壑竊有所恨不勝大願願陛下時忘萬事養精游神從中掖庭回輿枉路臨妾山林應劭曰公主園中有山謙不敢稱第故託山林也服䖍曰主所豫作廟}
  - {type: page-break, offset: 3491, content: '', id: KR2a0007_WYG_065-13b, image: WYG0250/WYG0250-0406b.png}
  - {type: variant, offset: 3491, length: 1, content: 昌, krp: 之主主立奏書獻之上大說師古曰說讀曰悅更名竇太主園為長門宫主大喜使偃以黄金百斤為爰叔壽叔因是為董君畫求見上之策令主稱疾不朝上往臨疾問所欲主辭謝曰妾幸䝉陛下厚恩先帝遺德奉朝請之禮備臣妾之使師古曰請音才姓反宋祁曰使景本作儀列為公主賞賜邑入師古曰既别得賞賜又所食之邑入其租賦也隆天重地死無以塞責師古曰塞補也一日卒有不勝洒掃之職師古曰卒讀曰猝洒音信又音山豉反先狗馬填溝壑竊有所恨不勝大願願陛下時忘萬事養精游神從中掖庭回輿枉路臨妾山林應劭曰公主園中有山謙不敢稱第故託山林也服䖍曰主所豫作廟}
  - {type: variant, offset: 3493, length: 0, content: '', WYG: 故曰山林師古曰山林應說是也不當請帝臨其冢墓也得獻觴上壽娛樂左右如是而死何恨之有上曰主何憂幸得愈恐羣臣從官多大為主費上還有頃主疾愈起謁上以錢千萬從主飲後數日上臨山林主自執宰敝膝師古曰為賤者之服劉攽曰執當作服道入登階就坐坐未定上曰願謁主人翁主廼下殿去簮珥師古曰珥珠玉飾耳者也音餌徒跣頓首謝曰妾無狀師古曰狀形貌也無狀猶言無顔面以見人也一曰自言所行醜惡無善狀負陛下身當伏誅陛下不致之法頓首死罪有詔謝主簮履起之東箱自引董君師古曰之往也董君綠幘傅韝應劭曰宰人服也韋昭曰韝形如射韝以縳左右手於事便也師古曰緑幘賤人之服也傅著也韝即今之臂韝也傅讀曰附韝音工侯反隨主前伏殿下主廼賛師古曰賛進也進傳謁辭館陶公主胞人臣偃昧死再拜謁師古曰胞與庖同因叩頭謝上為之起有詔賜衣冠上師古曰上上坐劉敞曰賜衣冠上上者上殿偃起走就衣冠主自奉食進觴當是時董君見尊不名稱為主人翁飲大驩樂主廼請賜将軍列侯從官金錢雜繒各有數於是董君貴寵天下莫不聞郡國狗馬蹵鞠劍客輻凑師古曰蹵音千六反鞠音鉅六反解在蓺文志董氏常從游戲北宫馳逐平樂觀雞鞠之會角狗馬之足師古曰角猶校也劉敞曰董氏當屬上句上大歡樂之於是上為竇太主置酒宣室使謁者引内董君是時朔陛㦸殿下師古曰持㦸立陛側辟㦸而前曰師古曰辟音頻亦反董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋方積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務師古曰右尊之也盡狗馬之樂極耳目之欲行邪枉之道徑滛辟之路師古曰徑由也辟讀曰僻是乃國家之大賊人主之大蜮也師古曰蜮魅也音或說者以為短狐非也短狐射工耳於此不當其義今俗猶云魅蜮也劉攽曰劉向說春秋蜮南方滛氣所生以應哀姜然則朔正用指偃爾何必遷就魅蜮也宋祁曰姚本句末無也字偃為滛首其罪三也昔伯姬燔而諸侯憚應劭曰憚敬也敬其節直也師古曰伯姬宋恭姬也遇火災待姆不出而死也奈何乎陛下上黙然不應良久曰吾業以設飲後而自改朔曰}
