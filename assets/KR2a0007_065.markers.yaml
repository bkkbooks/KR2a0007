  - {type: variant, offset: 1028, length: 136, content: 師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤, WYG: 諸侯}
