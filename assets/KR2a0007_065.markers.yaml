  - {type: variant, offset: 50, length: 2, content: 直指, WYG: 騶者也師古曰朱儒短人也騶本廐之御騶也後以為騎謂之騶騎宋祁曰一本改本作奉曰上以若曹無益於縣官師古曰若女也曹軰也耕田力作固不及人臨衆處官不能治民從軍擊虜不任兵事無益於國用徒索衣食如淳曰索盡也師古曰音先各反下云索長安米亦同也今欲盡殺若曹朱儒大恐啼泣宋祁曰啼當删王本作號朔教曰上即過叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死臣言可用幸異其禮不可用罷之無令但索長安米上大笑因}
  - {type: page-break, offset: 50, content: '', id: KR2a0007_WYG_065-3a, image: WYG0250/WYG0250-0401a.png}
  - {type: variant, offset: 50, length: 2, content: 直指, krp: 騶者也師古曰朱儒短人也騶本廐之御騶也後以為騎謂之騶騎宋祁曰一本改本作奉曰上以若曹無益於縣官師古曰若女也曹軰也耕田力作固不及人臨衆處官不能治民從軍擊虜不任兵事無益於國用徒索衣食如淳曰索盡也師古曰音先各反下云索長安米亦同也今欲盡殺若曹朱儒大恐啼泣宋祁曰啼當删王本作號朔教曰上即過叩頭請罪居有頃聞上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上知朔多端召問朔何恐朱儒為對曰臣朔生亦言死亦言朱儒長三尺餘奉一囊粟錢二百四十臣朔長九尺餘亦奉一囊粟錢二百四十朱儒飽欲死臣朔飢欲死臣言可用幸異其禮不可用罷之無令但索長安米上大笑因}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 待詔金馬門稍得親近上嘗使諸數家射覆師古曰數家術數之家也於覆器之下而置諸物令闇射之故云射覆數音所具反覆音芳目反置守宫盂下射之皆不能中師古曰守宫蟲名也術家云以器養之食以丹砂滿七斤擣治萬杵以㸃女子體終身不滅若有房室之事則滅矣言可以防閑滛逸故謂之守宫也今俗呼為辟宫辟亦禦扞之義耳盂食器也若􅀢而大今之所謂􅀢盂也􅀢音撥劉攽曰守宫生屋壁如守宫然故名之何在防滛逸也一蟲之微何能食丹砂七斤人亦安肯捐七斤丹砂以餌一蟲也朔自賛曰臣嘗受易請射之師古曰賛進也廼别蓍布卦而對曰師古曰别分也音彼列反臣以為龍又無角謂之為虵又有足跂跂脈脈善縁壁是非守宫即蜥蜴師古曰跂跂行貌也脈脈視貌也爾雅云蠑螈蜥蝪蝘蜓守宫是則一類耳揚雄方言云其在澤中}
  - {type: page-break, offset: 53, content: '', id: KR2a0007_WYG_065-3b, image: WYG0250/WYG0250-0401b.png}
