  - {type: variant, offset: 3504, length: 0, content: '', WYG: 俳優舞鄭女上為滛侈如此而欲使民獨不奢侈失農事之難者也師古曰失農謂失農業也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢應劭曰帳多故以甲乙第之耳孟康曰西域傳賛云興造甲乙之帳絡以隨珠和璧天子襲翠被憑玉几而處其中也師古曰謂推而去之燔焚燒也却走馬示不復用師古曰却退也走馬善走之馬也則堯舜之隆宜可與比}
