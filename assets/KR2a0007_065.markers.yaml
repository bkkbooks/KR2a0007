  - {type: variant, offset: 3503, length: 0, content: '', WYG: 殿帷師古曰集謂合聚也以道徳為麗以仁義為凖師古曰麗大也凖平法也於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳯闕右神明如淳曰闕名也師古曰鳯闕闕名神明臺名也號稱千門萬户木土衣綺繡狗馬被繢罽師古曰繢五綵也罽織毛也即今氍毹之屬是也宮人簮瑇瑁垂珠璣師古曰瑇瑁文甲也璣珠之不圜者瑇音代瑁音昧璣音居依反又音鉅依反設戲車教馳逐飾文采樷珍怪師古曰樷古藂字也撞萬石之鐘擊雷霆之鼓師古曰言其聲震大也}
