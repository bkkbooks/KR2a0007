  - {type: variant, offset: 28, length: 0, content: '', WYG: 材力之士待以不次之位師古曰不拘常次言超擢之四方士多上書言得失自􅃷鬻者以千數師古曰􅃷行賣也鬻亦賣也衒音州縣之縣又音工縣反其不足采者輒報聞罷師古曰報云天子已聞其所上之書而罷之令歸朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用如淳曰貧子冬日乃得學書言文史之事足可用也宋祁曰十二景本作十三十五學擊劍十六學詩書師古曰擊劍遙擊而中之非斬刺也劉敞曰擊劍今有此戲非遙擊也誦二十二萬言十九學孫吳兵法戰陣之具鉦鼔之教師古曰鉦鼔所以為}
  - {type: page-break, offset: 28, content: '', id: KR2a0007_WYG_065-1b, image: WYG0250/WYG0250-0400b.png}
  - {type: variant, offset: 28, length: 0, content: '', krp: 材力之士待以不次之位師古曰不拘常次言超擢之四方士多上書言得失自衒鬻者以千數師古曰衒行賣也鬻亦賣也衒音州縣之縣又音工縣反其不足采者輒報聞罷師古曰報云天子已聞其所上之書而罷之令歸朔初來上書曰臣朔少失父母長養兄嫂年十二學書三冬文史足用如淳曰貧子冬日乃得學書言文史之事足可用也宋祁曰十二景本作十三十五學擊劍十六學詩書師古曰擊劍遙擊而中之非斬刺也劉敞曰擊劍今有此戲非遙擊也誦二十二萬言十九學孫吳兵法戰陣之具鉦鼔之教師古曰鉦鼔所以為}
  - {type: variant, offset: 30, length: 1, content: 必, WYG: 士衆之節也鉦音征亦誦二十二萬言凡臣朔固已誦四十四萬言又常服子路之言服䖍曰無宿諾劉攽曰子路之言可使有勇者劉敞曰既曰子路之言則無宿諾者非子路之言也臣朔年二十二長九尺三寸目若懸珠齒若編貝師古曰編列次也音鞭勇若孟賁師古曰孟賁衛人古之勇士也尸子說云人謂孟賁生乎曰勇貴乎曰勇富乎曰勇三者人之所難而皆不足}
  - {type: page-break, offset: 30, content: '', id: KR2a0007_WYG_065-2a, image: WYG0250/WYG0250-0400c.png}
