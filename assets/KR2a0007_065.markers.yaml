  - {type: variant, offset: 32, length: 2, content: 禮名, WYG: 易勇故能懾三軍服猛獸也㨗若慶忌師古曰王子慶忌也射之矢滿把不能中駟馬追不能及也亷若鮑叔師古曰齊大夫也與管仲分財自取其少而說者乃妄解云鮑焦非也焦自介士耳信若尾生師古曰尾生古之信士與女子期於橋下待之不至遇水而死一曰即微生髙也若此可以為天子大臣矣臣朔昧死再拜以}
