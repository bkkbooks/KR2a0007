  - {type: variant, offset: 4041, length: 0, content: '', krp: 專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位如淳曰都居也澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不釋師古曰服膺俯服其胷臆也釋廢置也宋祁曰數當作記字而不下添可字好學樂道之效明白甚矣自以智能海内無雙則可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執㦸意者尚有遺行邪師古曰可遺之行言不盡善也同胞之徒無所容居其故何也蘇林曰胞音胞胎之胞也言親兄弟東方先生喟然長息仰而應之曰是固非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壊諸侯不朝力政爭權相禽以兵并為十二國未有雌雄師古曰十二國謂魯衛齊楚宋鄭魏燕趙中山秦韓也得士者彊失士者亡故談說行焉宋祁曰故談說行焉改作故說得行焉身處尊位珍寳充内外有廪倉澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賔服師古曰懾恐也音之渉反連四海之外以為帶師古曰言如帶之相連也安於覆盂師古曰言不可傾揺動猶運之掌師古曰言至易也賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下宋祁曰泉疑作淵用之則為虎不用則為䑕雖欲盡節效情安知前後夫天地之大士民之衆竭精談説並進輻湊者不可勝數悉力慕之宋祁曰慕當作募困於衣食或失門戸師古曰言不得所由入也一曰謂被誅戮䘮其家室也使蘇秦張儀與僕並生於今之世曾不得掌故安敢望常侍郎乎宋祁曰常字當刪故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宫聲聞于外師古曰小雅白華之詩也言茍有於中必形於外也鶴鳴于九臯聲聞于天師古曰小雅鶴鳴之詩也言處卑而聲徹其高逺茍能修身何患不榮太公體行仁義七十有二廼設用於文武得信厥說師古曰設施也信讀曰伸封於齊七百歳而不絶此士所以日夜孳孳敏行而不敢怠也師古曰孳與孜同敏勉也辟若䳭鴒飛且鳴矣師古曰䳭鴒雍渠小青雀也飛則鳴行則揺言其勤苦也辟讀曰譬䳭音脊鴒音零傳曰天不為人之惡寒而輟其冬師古曰輟止也地不為人之惡險而輟其廣君子不為小人之匈匈而易其行師古曰匈匈讙議之聲天有常度地有常形君子有常行君子道其常小人計其功師古曰道由也詩云禮義之不愆何恤人之言師古曰逸詩也愆過也恤憂也故曰水至清則無魚人至察則無徒師古曰徒衆也冕而前旒所以蔽明黈纊充耳所以塞聰如淳曰黈音工茍反謂以玉為瑱用黈纊縣之也師古曰如說非也黈黄色也纊綿也以黄綿為丸用組懸之於冕垂兩耳旁示不外聽非玉瑱之縣也明有所不見聰有所不聞舉大德赦小過無求備於一人之義也師古曰論語仲弓問政於孔子孔子曰赦小過舉賢才周公謂魯公曰故舊無大故則不棄也毋求備於一人故朔引此言也士有百行功過相除不可求備也枉而直之使自得之優而柔之使自求之揆而度之使自索之師古曰枉曲也索亦求也度音徒各反盖聖人之教化如此欲自得之自得之則敏且廣矣師古曰敏疾也今世之處士魁然無徒廓然獨居師古曰魁讀曰塊上觀許由下察接輿計同范蠡忠合子胥師古曰許由堯讓以天下而耻聞之楚狂接輿陽狂匿跡范蠡佐句賤功成而退子胥忠諫至死不易天下和平與義相扶寡耦少徒固其宜也師古曰耦合也徒衆也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊說行如流曲從如環所欲必得功若丘山海内定國家安是遇其時也子又何怪之邪語曰以筦闚天以蠡測海服䖍曰筦音管張晏曰蠡瓠瓢也師古曰筦古管字蠡音來奚反瓢音平遙反以莛撞鐘文穎曰謂槀莛也師古曰音徒丁反豈能通其條貫考其文理發其音聲哉師古曰考究也繇是觀之譬猶鼱鼩之襲狗服䖍曰音蹤劬如淳曰鼱鼩小䑕也音精劬孤豚之咋虎師古曰孤豚孤特之豚也咋嚙也音仕客反至則靡耳何功之有師古曰靡碎滅也耳語辭今以下愚而非處士雖欲勿困固不得已此適足以明其不知權變而終惑於大道也又設非有先生之論其辭曰非有先生仕於吳進不稱往古以厲主意退不能揚君美以顯其功黙然無言者}
  - {type: variant, offset: 4042, length: 0, content: '', WYG: 年矣吳王怪而問之曰寡人獲先人之功寄於衆賢之上夙興夜寐未嘗敢怠也今先生率然高舉逺集吳地師古曰率然猶颯然將以輔治寡人誠竊嘉之體不安席食不甘味目不視靡曼之色耳不聽鐘鼓之音虚心定志欲聞流議者三年于兹矣師古曰流末流也猶言餘論也今先生進無以輔治退不揚主譽竊不為先生取之也盖懐能而不見是不忠也見而不行主不明也師古曰見顯也意者寡人殆不明乎非有先生伏而唯唯師古曰唯唯恭應也音弋癸反吳王曰可以談矣寡人將竦意而覽焉師古曰竦企待也先生曰於戲師古曰於讀曰烏戲讀曰呼可乎哉可乎哉師古曰言不可談何容易師古曰不見寛容則事不易故曰何容易也易音弋豉反夫談有悖於目拂於耳謬於心而便於身者師古曰悖逆也拂違戾也悖音布内反拂音弗或有說於目順於耳快於心而毁於行者師古曰說讀曰悅非有明王聖主孰能聽之吳王曰何為其然也中人已上可以語上也師古曰引論語載孔子之言中品之人則可與言上道也先生試言寡人將聽焉先生對曰昔者關龍逢深諫於桀而王子比干直言於紂此二臣者皆極慮盡忠閔主澤不下流而萬民騷動師古曰閔病也故直言其失切諫其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行無人臣之禮師古曰不省其忠而被以此罪也果紛然傷於身䝉不辜之名師古曰䝉被也戮及先人為天下笑故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及蜚亷惡來革等蘇林曰二人皆紂時邪佞人也孟康曰蜚亷善走師古曰蜚古飛字二人皆詐偽巧言利口以進其身隂奉琱瑑刻鏤之好以納其心師古曰琱與彫同畫也瑑謂刻為文也音篆務快耳目之欲以茍容為度遂往不戒身没被戮宗廟崩阤國家為虚師古曰阤穨也音直氏反虚讀曰墟放戮賢聖親近讒夫詩不云乎讒人罔極交亂四國師古曰小雅青蠅之詩也解在戾太子傳此之謂也故卑身賤體說色微辭師古曰說讀曰悅愉愉呴呴終無益於主上之治師古曰愉愉顔色和也呴呴言語順也呴音許于反則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂主之邪下以損百姓之害師古曰拂與弼同損減也則忤於邪主之心歴於衰世之法師古曰忤逆也歴猶經也離也故養壽命之士莫肯進也遂居深山之間積土為室編蓬為戸彈琴其中以咏先王之風亦可以樂而忘死矣是以伯夷叔齊避周餓于首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王懼然易容師古曰懼然失守之貌也懼音居具反捐薦去几危坐而聽師古曰捐薦席而去馮几自貶損也先生曰接輿避世箕子被髮陽狂師古曰解並在鄒陽傳此二人者皆避濁世以全其身者也使遇明王聖主得賜清燕之閒寛和之色師古曰閒讀曰閑閑暇也發憤畢誠師古曰畢盡也圖盡安危揆度得失師古曰圖謀盡計也宋祁曰盡姚本作畫上以安主體下以便萬民則五帝三王之道可幾而見也師古曰幾庶幾故伊尹䝉耻辱負鼎爼和五味以干湯師古曰蒙冒也犯也太}
