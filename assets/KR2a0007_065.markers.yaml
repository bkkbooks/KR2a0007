  - {type: variant, offset: 2449, length: 281, content: 乃賜安車駟馬黃金六十斤罷就第數歲七十餘薨諡曰安侯子永嗣少時耆酒多過失年且三十乃折節修行以父任為侍中中郎將長水校尉定國死居喪如禮孝行聞由是以列侯為散騎光祿勳至御史大夫尚館陶公主施施者宣帝長女成帝姑也賢有行永以選尚焉上方欲相之會永薨子恬嗣恬不肖薄於行始定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未嘗有所冤子孫必有興者至定國為丞相永為御史大夫封侯傳世云薛廣德字長卿沛郡相人也以魯詩教授楚國襲勝舍師事焉蕭望之為御史大夫除廣德為屬數與論議器之薦廣德經行宜充本朝為博士論石渠遷諫大夫代貢禹為長信少府御史大夫廣德為人溫雅有醞藉及為三公直言諫爭始, WYG: 廼}
