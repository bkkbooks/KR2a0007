  - {type: variant, offset: 941, length: 2, content: 許氏, WYG: 足無饑寒之憂故酆鎬之間號為土膏其賈畝一金師古曰賈讀曰價今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖師古曰耗减也音呼到反是其不可一也}
