  - {type: variant, offset: 2731, length: 720, content: 旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚上即日還其秋上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說先敺光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪乃從橋後月餘以歲惡民流與丞相定國大司馬車騎將軍史高俱乞骸骨皆賜安車駟馬黃金六十斤罷廣德為御史大夫凡十月免東歸沛太守迎之界上沛以為榮縣其安車傳子孫平當字子思祖父以訾百萬自下邑徙平陵當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令以明經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失文雅雖不能及蕭望之匡衡然指意略同自元帝時韋玄成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世而後仁三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與何德化休徵不應之久也禍福不虛必有因而至者焉宜深迹其道而務修其本昔者帝堯南面而治先克明俊德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天此聖人之德亡以加於孝也高皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮上納其言下詔復太上皇寢廟園頃之使行流民幽州舉奏刺史二千石勞倈有意者言勃海鹽池可且勿禁以救民急所過見稱奉使者十一人為最遷丞相司直坐法左遷, WYG: ''}
