  - {type: variant, offset: 898, length: 5, content: 太子少白使, WYG: 上林苑屬之南山師古曰屬連也音之欲反又詔中尉左右内史表屬縣草田欲以償鄠杜之民師古曰時未為京兆馮翊扶風故云中尉及左右内史也草田謂荒田未耕墾也吾丘壽王奏事上大說稱善師古曰說讀曰悅時朔在傍進諫曰臣聞謙遊靜慤天表之應應之以福師古曰慤謹也音口角反宋祁曰遊當作遜驕溢靡麗天表之應應之以異今陛下累郎臺恐}
