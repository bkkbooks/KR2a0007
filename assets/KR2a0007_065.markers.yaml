  - {type: variant, offset: 933, length: 2, content: 英俊, WYG: 之阻也南有江淮北有河渭其地從汧隴以東商雒以西服䖍曰商與上雒二縣也師古曰汧汧水也隴隴坻也厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地師古曰髙平曰陸關中地高故稱陸耳海者萬物所出言關中山川物産饒富是以謂之陸海也秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物}
