  - {type: variant, offset: 944, length: 1, content: 太, WYG: 盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之虛師古曰虚讀曰墟又壊人冢墓發人室廬令幼弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之師古曰斥却也騎馳東西車騖南北師古曰亂馳曰騖又有深溝大渠夫一日之樂不足以危無隄之輿蘇林曰隄限也輿乘輿也無限若言不訾也不敢斥天}
