  - {type: variant, offset: 4041, length: 0, content: '', WYG: 專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難已用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位如淳曰都居也澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不釋師古曰服膺俯服其胷臆也釋廢置也宋祁曰數當作記字而不下添可字好學樂道之效明白甚矣自以智能海内無雙則可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執㦸意者尚有遺行邪師古曰可遺之行言不盡善也同胞之徒無所容居其故何也蘇林曰胞音胞胎之胞也言親兄弟東方先生喟然長息仰而應之曰是固非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壊諸侯不朝力政爭權相禽以兵并為十二國未有雌雄師古曰十二國謂魯衛齊楚宋鄭魏燕趙中山秦韓也得士者彊失士者亡故談說行焉宋祁曰故談說行焉改作故說得行焉身處尊位珍寳充内外有廪倉澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賔服師古曰懾恐也音之渉反連四海之外以為帶師古曰言如帶之相連也安於覆盂師古曰言不可傾揺動猶運之掌師古曰言至易也賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在深泉之下宋祁曰泉疑作淵用之則為虎不用則為䑕雖欲盡節效情安知前後夫天地之大士民之衆竭精談説並進輻湊者不可勝數悉力慕之宋祁曰慕當作募困於衣食或失門戸師古曰言不得所由入也一曰謂被誅戮䘮其家室也使蘇秦張儀與僕並生於今之世曾不得掌故安敢望常侍郎乎宋祁曰常字當刪故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宫聲聞于外師古曰小雅白華之詩也言茍有於中必形於外也鶴鳴于九臯聲聞于天師古曰小雅鶴鳴之詩也言處卑而聲徹其高逺茍能修身何患不榮太公體行仁義七十有二廼設用於文武得信厥說師古曰設施也信讀曰伸封於齊七百歳而不絶此士所以日夜孳孳敏行而不敢怠也師古曰孳與孜同敏勉也辟若䳭鴒飛且鳴矣師古曰䳭鴒雍渠小青雀也飛則鳴行則揺言其勤苦也辟讀曰譬䳭音脊鴒音零傳曰天不為人之惡寒而輟其冬師古曰輟止也地不為人之惡險而輟其廣君子不為小人之匈匈而易其行師古曰匈匈讙議之聲天有常度地有常形君子有常行君子道其常小人計其功師古曰道由也詩云禮義之不愆何恤人之言師古曰逸詩也愆過也恤憂也故曰水至清則無魚人至察則無徒師古曰徒衆也冕而前旒所以蔽明黈纊充耳所以塞聰如淳曰黈音工茍反謂以玉為瑱用黈纊縣之也師古曰如說非也黈黄色也纊綿也以黄綿為丸用組懸之於冕垂兩耳旁示不外聽非玉瑱之縣也明有所不見聰有所不聞舉大德赦小過無求備於一人之義也師古曰論語仲弓問政於孔子孔子曰赦小過舉賢才周公謂魯公曰故舊無大故則不棄也毋求備於一人故朔引此言也士有百行功過相除不可求備也枉而直之使自得之優而柔之使自求之揆而度之使自索之師古曰枉曲也索亦求也度音徒各反盖聖人之教化如此欲自得之自得之則敏且廣矣師古曰敏疾也今世之處士魁然無徒廓然獨居師古曰魁讀曰塊上觀許由下察接輿計同范蠡忠合子胥師古曰許由堯讓以天下而耻聞之楚狂接輿陽狂匿跡范蠡佐句賤功成而退子胥忠諫至死不易天下和平與義相扶寡耦少徒固其宜也師古曰耦合也徒衆也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊說行如流曲從如環所欲必得功若丘山海内定國家安是遇其時也子又何怪之邪語曰以筦闚天以蠡測海服䖍曰筦音管張晏曰蠡瓠瓢也師古曰筦古管字蠡音來奚反瓢音平遙反以莛撞鐘文穎曰謂槀莛也師古曰音徒丁反豈能通其條貫考其文理發其音聲哉師古曰考究也繇是觀之譬猶鼱鼩之襲狗服䖍曰音蹤劬如淳曰鼱鼩小䑕也音精劬孤豚之咋虎師古曰孤豚孤特之豚也咋嚙也音仕客反至則靡耳何功之有師古曰靡碎滅也耳語辭今以下愚而非處士雖欲勿困固不得已此適足以明其不知權變而終惑於大道也又設非有先生之論其辭曰非有先生仕於吳進不稱往古以厲主意退不能揚君美以顯其功黙然無言者}
