  - {type: variant, offset: 4018, length: 1, content: 平, WYG: 衣繡衣在乘輿車前師古曰羿音詣宋萬為式道候師古曰萬宋閔公臣亦有勇力也式表也表道之候若今之武候引駕人上廼大笑是時朝廷多賢材上復問朔方今公孫丞相兒大夫師古曰公孫𢎞及兒寛也兒音五奚反董仲舒夏}
