  - {type: variant, offset: 3470, length: 8, content: 少府大鴻臚光祿勳, WYG: 乎夫子不言不笑不取乎對曰夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取今先生上壽時乎師古曰言所上壽豈謂時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則陰損隂陽變則心氣動心氣動則精神散精神散而邪氣及銷憂者莫若酒臣朔所以上壽者明陛下正而不阿因以止哀也愚不知忌諱當死}
