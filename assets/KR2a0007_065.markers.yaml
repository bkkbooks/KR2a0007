  - {type: variant, offset: 4015, length: 2, content: 空封, WYG: 直師古曰史魚衛大夫史鰌也論語稱孔子曰直哉史魚邦有道如矢邦無道如矢蘧伯玉為太傅如淳曰太傅傅人主使無過伯玉欲寡其過故令為之師古曰蘧伯玉衛大夫也名瑗蘧音渠孔父為詹事應劭曰孔父正色而立於朝則莫敢過而致難乎其君故為詹事師古曰孔父宋大夫也父讀曰甫孫叔敖為諸侯相子産為郡守師古曰善治邦邑也王慶忌為期門應劭曰以其勁㨗可為期門郎也師古曰王慶忌即王子慶忌也夏育為鼎官或曰夏育衛人力舉千鈞鼎官今殿前舉鼎者也羿為旄頭應劭曰羿善射故令為旄頭今以羽林為之髪正上向而}
