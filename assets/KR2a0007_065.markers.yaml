  - {type: variant, offset: 4043, length: 1, content: 鼎, krp: 釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也深念逺慮引義以正其身推恩以廣其下本仁祖義師古曰以仁為本以義為始褒有德祿賢能誅惡亂總逺方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽逺方懐之故號聖王臣子之職既加矣於是裂地定封爵為公侯傳國子孫名顯後世民到于今稱之以遇湯與文王也太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易於是吳王穆然張晏曰穆音黙師古曰穆然靜思貌俛而深惟仰而泣下交頥曰嗟乎余國之不亡也綿綿連連殆哉世之不絶也師古曰殆危也於是正明堂之朝齊君臣之位舉賢材布德恵施仁義賞有功躬節儉減後宫之費損車馬之用放鄭聲逺佞人師古曰逺離也音于萬反省庖厨去侈靡卑宫館壊苑囿填池塹以予貧民無産業者開内臧振貧窮存耆老䘏孤獨薄賦斂省刑辟行此三年海内晏然天下大洽隂陽和調萬物咸得其宜國無災害之變民無飢寒之色家給人}
  - {type: variant, offset: 4045, length: 1, content: 承, WYG: 畜積有餘囹圄空虚師古曰畜讀曰蓄鳯皇來集麒麟在郊甘露既降朱草萌牙逺方異俗之人鄉風慕義師古曰鄉讀曰嚮各奉其職而來朝賀故治亂之道存亡之端若此易見而}
