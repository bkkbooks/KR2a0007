  - {type: variant, offset: 4047, length: 2, content: 一足, WYG: 人者莫肯為也臣愚竊以為過故詩云王國克生惟周之楨濟濟多士文王以寧師古曰大雅文王之詩也言文王之國生此多士為周室楨幹之臣所以安寧也此之謂也朔之文辭此二篇最善其餘有封泰山責和氏璧及皇太子生禖屏風殿上柏柱平樂觀賦獵八言七言上下晉灼曰八言七言詩各有上下篇從公孫𢎞借車凡劉向所錄朔書具是矣師古曰劉向别錄所載世所傳他事皆非也師古曰謂如東方朔别傳及俗用五行時日之書皆非實事也贊曰劉向言少時數問長老賢人通於事及朔時者師古曰與朔同時也皆曰朔口諧倡辯}
