  - {type: variant, offset: 3495, length: 0, content: '', WYG: 夫宣室者先帝之正處也非法度之政不得入焉故􅁋亂之漸其變為簒是以豎貂為滛而易牙作患師古曰豎貂易牙皆齊桓公臣也管仲有病桓公往問之曰將何以教寡人管仲曰願君之逺易牙豎貂公曰易牙亨其子以快寡人尚可疑邪對曰人之情非不愛其子其子之忍又將何有於君公曰豎貂自宮以近寡人猶可疑邪對曰人之情非不愛其身也其身之忍又將何有於君公曰諾管仲死盡逐之而公食不甘宮不治居三年公曰仲父不亦過乎於是皆復召即反之明年公有病易牙豎貂相與作亂塞宫門築髙牆不通人有一婦人踰垣入至公所公曰我欲食婦人曰吾無所得又曰我欲飲婦人曰吾無所得公曰何故對曰易牙豎貂相與作亂塞宫門築高牆不通人故無所得公慨然歎涕出曰嗟乎聖人所見豈不逺哉若死者有知我將何面目見仲父乎蒙衣袂而絶乎壽宫蟲流出於户盖以楊門之扉三月不葬慶父死而魯國全師古曰慶父魯桓公子莊公弟也莊公薨慶父殺荘公之子閔公而欲作亂不克奔莒其後僖公立以賂求之于莒莒人歸之及宻乃縊而死僖公乃定其位管蔡誅而周室安上曰善有詔止更置酒北宮引董君從東司馬門東司馬門更名東交門蘇林曰以偃從此門入交㑹於内故以名焉賜朔黄金三十斤董君之寵由是日衰至年三十而終後數歳竇太主卒與董君會葬於覇陵是後公主貴人多踰禮制自董偃始時天下侈靡趨末師古曰趨讀曰趣末謂工商之業百姓多離農畆上從容問朔吾欲化民豈有道乎師古曰從音千容反朔對曰堯舜禹湯文武}
