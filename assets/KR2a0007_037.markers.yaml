  - {type: variant, offset: 15, length: 0, content: '', WYG: 為任俠有名應劭曰任謂有堅完可任託以事也如淳曰相與信為任同是非為俠師古曰任謂任使其氣力俠之言挾也以權力俠輔人也任音人禁反俠音下頰反宋祁曰俠疑作挾項籍使將兵數窘漢王如淳曰窘困也師古曰窘音求閔反項籍滅髙祖購求布千金敢有舍匿罪三族師古曰舍止匿隠也布匿濮陽周氏周氏曰漢求將軍急迹且至臣家師古曰迹謂尋其蹤迹也能聼臣臣敢進計即否願先自剄布許之廼髠鉗布衣褐師古曰衣著之也褐毛布之衣也置廣柳車中服䖍曰東郡謂廣轍車為廣柳車鄭氏曰作大柳衣車若周禮䘮車也李竒曰廣柳大隆穹也晋灼曰周禮説衣翣柳柳聚也衆飾之所聚也此為載以䘮車欲人不知也師古曰晋鄭二説是也隆穹所謂車軬者耳非此之謂也軬音扶晚反并與其家僮數十人之魯朱家所賣之師古曰朱家魯人見游俠傳朱家心知其季布也買置田舍乃之雒陽見汝隂侯滕公師古曰夏侯嬰也}
  - {type: page-break, offset: 15, content: '', id: KR2a0007_WYG_037-1b, image: WYG0249/WYG0249-0829b.png}
  - {type: page-break, offset: 15, content: '', id: KR2a0007_WYG_037-2a, image: WYG0249/WYG0249-0829c.png}
  - {type: variant, offset: 15, length: 0, content: '', krp: 為任俠有名應劭曰任謂有堅完可任託以事也如淳曰相與信為任同是非為俠師古曰任謂任使其氣力俠之言挾也以權力俠輔人也任音人禁反俠音下頰反宋祁曰俠疑作挾項籍使將兵數窘漢王如淳曰窘困也師古曰窘音求閔反項籍滅髙祖購求布千金敢有舍匿罪三族師古曰舍止匿隠也布匿濮陽周氏周氏曰漢求將軍急迹且至臣家師古曰迹謂尋其蹤迹也能聼臣臣敢進計即否願先自剄布許之廼髠鉗布衣褐師古曰衣著之也褐毛布之衣也置廣柳車中服䖍曰東郡謂廣轍車為廣柳車鄭氏曰作大柳衣車若周禮䘮車也李竒曰廣柳大隆穹也晋灼曰周禮説衣翣柳柳聚也衆飾之所聚也此為載以䘮車欲人不知也師古曰晋鄭二説是也隆穹所謂車軬者耳非此之謂也軬音扶晚反并與其家僮數十人之魯朱家所賣之師古曰朱家魯人見游俠傳朱家心知其季布也買置田舍乃之雒陽見汝隂侯滕公師古曰夏侯嬰也}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 為滕令遂號為滕公説曰季布何罪臣各為其主用職耳師古曰職常也言此乃常道也一曰職主掌其事也項氏臣豈可盡誅邪今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急如此此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平之墓也師古曰子胥伍員也荆即楚也子胥之父伍奢為平王所殺子胥奔吳教吳伐楚平王已卒其後吳師入郢子胥掘平王之墓取屍鞭之三百也宋祁曰荆平字下當有王字又浙本忌字作亡君何不從容為上言之師古曰從音千容反滕公心知朱家大俠意布匿其所乃許諾侍閒果言如朱家指師古曰侍侍於天子閒謂事務之隙宋祁曰注末當添也字上乃赦布當是時諸公皆多布能摧剛為柔師古曰多猶重也朱家亦以此名聞當世布召見謝拜郎中宋祁曰浙本拜字下有為字孝惠時為中郎將單于嘗為書嫚吕太后師古曰嫚謂辭語褻汚也讀}
  - {type: page-break, offset: 16, content: '', id: KR2a0007_WYG_037-2b, image: WYG0249/WYG0249-0829d.png}
