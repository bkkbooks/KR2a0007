  - {type: variant, offset: 165, length: 0, content: '', WYG: 王非汝主邪何敢自言主魯王聞之大慚發中府錢使相償之師古曰中府王之財物藏也相曰王自使人償之不爾是王為惡而相為善也師古曰不爾是則王為惡魯王好獵相常從入苑中王輙休相就館相常暴坐苑外師古曰於外自暴露而坐終不休曰吾王暴露獨何為舎王以故不大出遊數年以官卒魯以百金祠少子仁不受曰義不傷先人名仁以壯勇為衞將軍舎人張晏曰衞青也數從擊匈奴衞將軍進言仁為郎中至二千石丞相長史失官後使刺三河還如淳曰為刺史於三河郡三河謂河南河内河東也奏事稱意拜為京輔都尉月餘遷司直數歲戾太子舉兵仁部閉城門令太子得亡坐縱反者族師古曰遣仁掌閉城門乃令太子得出故云縱反也賛曰以項羽之氣而季布以勇顯名楚身履軍搴旗者數矣鄧展曰履軍戰勝蹈履之李竒曰搴㧞也孟康曰搴斬取也師古曰謂勝敵㧞取旗也鄧李二説皆是搴音騫今流俗書本改履謂屢而加典字云身屢典軍非也宋祁曰注文謂屢當作為屢可謂壯士及至困戹奴僇苟活而不變何也師古曰僇古戮字也奴僇謂髠鉗為奴而賣之也彼自負其材受辱不羞欲有所用其未足也故終為漢名將賢者誠重其死夫婢妾賤人感槩而自殺非能勇也師古曰感槩謂感念局狹為小節槩音工代反其畫無俚之至耳張晏曰言其計畫道理無所至故自殺耳蘇林曰俚頼也言其計畫無所成頼晋灼曰揚雄方言曰俚聊也許慎曰頼也此為其計畫無所聊頼至於自殺耳師古曰晋説是也欒布哭彭越田叔隨張敖赴死如歸彼誠知所處如淳曰太史公曰非死者難處死者難也雖古烈士}
