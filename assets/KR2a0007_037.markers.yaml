  - {type: punctuation, offset: 80, content: 「, id: KR2a0007_tls_037-bkkpn23}
  - {type: variant, offset: 80, length: 0, content: '', WYG: 微無也天下已定彭王剖符受封之欲傳之萬世宋祁曰封之之字誤可刪添亦字今漢壹徵兵於梁宋祁曰越本作今帝徵兵於梁浙本從今彭王病不行而疑以為反反形未見以苛細誅之臣恐功臣人人自危也今彭王已死臣生不如死請就亨上乃釋布拜為都尉孝文時為燕相至將軍布稱曰窮困不能辱身非人也富貴不能快意非賢也於是嘗有德厚報之有怨必以法滅之吳楚反時以功封為鄃侯蘇林曰鄃音輸清河縣也復為燕相燕齊之閒皆為立社號曰欒公社布薨子賁嗣侯師古曰賁音奔孝武時坐為太常犧牲不如令國除田叔趙陘城人也蘇林曰陘音刑其先齊田氏也叔好劒學黄老術於樂鉅公師古曰姓樂名鉅也公者老人之稱也為人亷直喜任俠師古曰喜好也音許吏反游諸公師古曰諸公皆長者也趙人舉之趙相趙午言之趙王張敖以為郎中數歲趙王賢之未及遷會趙午貫髙等謀弑上事發覺漢下詔捕趙王及羣臣反者趙有敢隨王罪三族唯田叔孟舒等十餘人赭衣自髠鉗隨王至長安趙王敖事白得出師古曰白明也廢王為宣平侯宋祁云一本無王字乃進言叔等十人上召見與語漢廷臣無能出其右者師古曰材不勝宋祁云浙本注文作材能不勝之也上説師古曰説讀曰悦也宋祁云刪也字盡拜為郡守諸侯相叔為漢中守十餘年孝文帝初立召叔問曰公知天下長者乎對曰臣何}
