  - {type: 'tls:seg', offset: 5648, content: '', id: KR2a0007_tls_037-33a.2}
  - {type: variant, offset: 5649, length: 458, content: 奏上引見躬召公卿將軍大議左將軍公孫祿以為中國常以威信懷伏夷狄躬欲逆詐造不信之謀不可許且匈奴賴先帝之德保塞稱蕃今單于以疾病不任奉朝賀遣使自陳不失臣子之禮臣祿自保沒身不見匈奴為邊竟憂也躬掎祿曰臣為國家計幾先謀將然豫圖未形為萬世慮而左將軍公孫祿欲以其犬馬齒保目所見臣與祿異議未可同日語也上曰善乃罷群臣獨與躬議因建言往年熒惑守心太白高而芒光又角星茀於河鼓其法為有兵亂是後訛言行詔籌經歷郡國天下騷動恐必有非常之變可遣大將軍行邊兵敕武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相丞相嘉對曰臣聞動民以行不以言應天以實不以文下民微細猶不可詐況於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心說而天意得矣辯士見一端或妄以意傅著星曆虛造匈奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有辠車馳詣闕交臂就死恐懼如此而談說者云動安之危辯口快耳其實未可從夫議政者苦其讇諛傾險辯慧深刻也讇諛則主德毀傾險則下怨恨辯慧則破正道深刻則傷恩惠昔秦繆公不從百里奚蹇叔之言以敗其師悔過自責疾詿誤之臣思黃髮之言名垂於後世唯陛下觀覽古戒反覆參, WYG: 卷三十七}
