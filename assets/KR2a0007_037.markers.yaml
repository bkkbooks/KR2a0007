  - {type: variant, offset: 44, length: 1, content: 范, WYG: 不忠使項王失天下者也遂斬之曰使後為人臣無傚丁公也欒布梁人也彭越為家人時嘗與布游師古曰家人猶言編户之人也窮困賣庸於齊為酒家保孟康曰酒家作保保庸也可保信故謂之保師古曰謂庸作受顧也為保謂保可任使數歲别去而布為人所略賣為奴於燕為其主家報仇服䖍曰為買者報仇也燕將臧荼舉以為都尉荼為燕王布為將及荼反漢擊燕虜布梁王彭越聞之乃言上請贖布為梁大夫使於齊未反師古曰反還也漢召彭越責以謀反夷三族梟首雒}
