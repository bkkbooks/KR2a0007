  - {type: variant, offset: 17, length: 1, content: 武, WYG: 慢同太后怒召諸將議之上將軍樊噲曰臣願得十萬衆横行匈奴中諸將皆阿吕太后師古曰阿曲也曲從其意以噲言為然布曰樊噲可斬也夫以髙}
  - {type: variant, offset: 17, length: 1, content: 武, krp: 慢同太后怒召諸將議之上將軍樊噲曰臣願得十萬衆横行匈奴中諸將皆阿吕太后師古曰阿曲也曲從其意以噲言為然布曰樊噲可斬也夫以髙}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 兵三十餘萬困於平城噲時亦在其中今噲柰何以十萬衆横行匈奴中面謾師古曰謾欺誑也音嫚又音莫連反且秦以事胡陳勝等起今創痍未瘳師古曰痍傷也瘳差也痍音夷瘳音丑留反噲又面諛欲揺動天下是時殿上皆恐太后罷朝遂不復議擊匈奴事布為河東守孝文時人有言其賢召欲以為御史大夫又言其勇使酒難近應劭曰使酒􅒬酒也師古曰言因酒霑洽而使氣也近謂附近天子為大臣也宋祁本云一本又言字上有人字至留邸一月師古曰邸諸郡朝宿之舍在京師也見罷師古曰既引見而罷令還郡也劉攽曰見罷猶言見逐見棄耳非引見也布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者師古曰謂妄言其賢故云欺也今臣至無所受事宋祁曰一本無受字罷去此人必有毁臣者夫陛下以一人譽召臣一人毁去臣臣恐天下有識者聞之有以窺陛下師古曰窺見陛下淺深也上黙然慙曰河東吾股肱郡故特召君耳布之官辯士曹丘生數招權顧金錢孟康曰招求也以金錢事權貴而求得其形勢以自炫燿也李竒曰持權屬請人顧以金錢也師古曰二家之説皆非也言招求貴人威權因以請託故得他人顧金錢也劉攽曰招權謂作為形勢招權歸已也顧金錢者謂志在金錢也顧猶念也事貴人趙談等李竒曰宦者趙談也宋祁曰越本談作}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_037-3a, image: WYG0249/WYG0249-0830a.png}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_037-3b, image: WYG0249/WYG0249-0830b.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 兵三十餘萬困於平城噲時亦在其中今噲柰何以十萬衆横行匈奴中面謾師古曰謾欺誑也音嫚又音莫連反且秦以事胡陳勝等起今創痍未瘳師古曰痍傷也瘳差也痍音夷瘳音丑留反噲又面諛欲揺動天下是時殿上皆恐太后罷朝遂不復議擊匈奴事布為河東守孝文時人有言其賢召欲以為御史大夫又言其勇使酒難近應劭曰使酒􅒬酒也師古曰言因酒霑洽而使氣也近謂附近天子為大臣也宋祁本云一本又言字上有人字至留邸一月師古曰邸諸郡朝宿之舍在京師也見罷師古曰既引見而罷令還郡也劉攽曰見罷猶言見逐見棄耳非引見也布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者師古曰謂妄言其賢故云欺也今臣至無所受事宋祁曰一本無受字罷去此人必有毁臣者夫陛下以一人譽召臣一人毁去臣臣恐天下有識者聞之有以窺陛下師古曰窺見陛下淺深也上黙然慙曰河東吾股肱郡故特召君耳布之官辯士曹丘生數招權顧金錢孟康曰招求也以金錢事權貴而求得其形勢以自炫燿也李竒曰持權屬請人顧以金錢也師古曰二家之説皆非也言招求貴人威權因以請託故得他人顧金錢也劉攽曰招權謂作為形勢招權歸已也顧金錢者謂志在金錢也顧猶念也事貴人趙談等李竒曰宦者趙談也宋祁曰越本談作}
  - {type: variant, offset: 20, length: 1, content: 諱, WYG: 與竇長君善服䖍曰景帝舅布聞寄書諫長君曰吾聞曹丘生非長者勿與通及曹丘生歸欲得書請布師古曰欲得竇長君書與布為己紹介也竇長君曰季將軍不説足下師古曰説讀曰悦足下無往固請書遂行使人先發書師古曰使人先致書於布發視也布果大怒待曹丘曹丘至則揖布曰楚人諺曰得黄金百不如得季布諾師古曰諺傳也足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎師古曰顧念也何足下距僕之深也布乃大説師古曰説讀曰悦引入留數月為上客厚送之布名所以益聞者曹丘揚之也布弟季心氣蓋關中遇人恭謹為任俠方數千里士爭為死嘗殺人亡吳從爰絲匿長事爰絲師古曰絲爰盎字言以兄長之禮事也宋祁云浙本注文也字作之弟畜灌夫籍福之屬嘗為中司馬如淳曰中尉之司馬中尉郅都不敢加少年多時時竊借其名以行師古曰詐自稱為心之賔客徒黨也當是時季心以勇布以諾聞關中布母弟丁公晋灼曰}
