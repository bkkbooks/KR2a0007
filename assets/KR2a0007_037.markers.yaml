  - {type: variant, offset: 3102, length: 2265, content: 為吳王之聽往者秦為無道殘賊天下殺術士燔詩書滅聖迹棄禮義任刑法轉海濱之粟致于西河當時之時男子疾耕不足於糧餽女子紡績不足於蓋形遣蒙恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈欲為亂者十室而五又使徐福入海求仙藥多齎珍寶童男女三千人五種百工而行徐福得平原大澤止王不來於是百姓悲痛愁思欲為亂者十室而六又使尉佗踰五嶺攻百越尉佗知中國勞極止王南越行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乘之駕作阿房之宮收太半之賦發閭左之戍父不寧子兄不安弟政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上欲為亂者十室而八客謂高皇帝曰時可矣高帝曰待之聖人當起東南間不一歲陳吳大呼劉項並和天下嚮應所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陳之中以成帝王之功今大王見高祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下壹齊海內氾愛蒸庶布德施惠口雖未言聲疾雷震令雖未出化馳如神心有所懷威動千里下之應上猶景嚮也而大將軍材能非直章邯楊熊也王以陳勝吳廣論之被以為過矣且大王之兵眾不能什分吳楚之一天下安寧又萬倍於秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌痛紂之不用王子比干之言也故孟子曰紂貴為天子死曾不如匹夫是紂先自絕久矣非死之日天去之也今臣亦竊悲大王棄千乘之君將賜絕命之書為群臣先身死于東宮也被因流涕而起後王復召問被苟如公言不可以徼幸邪被曰必不得已被有愚計王曰柰何被曰當今諸侯無異心百姓無怨氣朔方之郡土地廣美民徙者不足以實其地可為丞相御史請書徙郡國豪桀及耐罪以上以赦令除家產五十萬以上者皆徙其家屬朔方之郡益發甲卒急其會日又偽為左右都司空上林中都官詔獄書逮諸侯太子及幸臣如此則民怨諸侯懼即使辯士隨而說之黨可以徼幸王曰此可也雖然吾以不至若此專發而已後事發覺被詣吏自告與淮南王謀反蹤跡如此天子以伍被雅辭多引漢美欲勿誅張湯進曰被首為王畫反計罪無赦遂誅被江充字次倩趙國邯鄲人也充本名齊有女弟善鼓琴歌舞嫁之趙太子丹齊得幸於敬肅王為上客久之太子疑齊以己陰私告王與齊忤使吏逐捕齊不得收繫其父兄按驗皆棄市齊遂絕迹亡西入關更名充詣闕告太子丹與同產姊及王後宮姦亂交通郡國豪猾攻剽為姦吏不能禁書奏天子怒遣使者詔郡發吏卒圍趙王宮收捕太子丹移繫魏郡詔獄與廷尉雜治法至死趙王彭祖帝異母兄也上書訟太子辠言充逋逃小臣苟為姦譌激怒聖朝欲取必於萬乘以復私怨後雖亨醢計猶不悔臣願選從趙國勇敢士從軍擊匈奴極盡死力以贖丹罪上不許竟敗趙太子初充召見犬臺宮自請願以所常被服冠見上上許之充衣紗縠襌衣曲裾後垂交輸冠襌纚步搖冠飛翮之纓充為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上說之充因自請願使匈奴詔問其狀充對曰因變制宜以敵為師事不可豫圖上以充為謁者使匈奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可充即移書光祿勳中黃門逮名近臣侍中諸當詣北軍者移劾門衛禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬上以充忠直奉法不阿所言中意充出逢館陶長公主行馳道中充呵問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾沒入官後充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者唯江君寬之充不聽遂白奏上曰人臣當如是矣大見信用威震京師遷為水衡都尉宗族知友多得其力者久之坐法免會陽陵朱安世告丞相公孫賀子太僕敬聲為巫蠱事連及陽石諸邑公主賀父子皆坐誅語在賀傳後上幸甘泉疾病充見上年老恐晏駕後為太子所誅因是為姦奏言上疾祟在巫蠱於是上以充為使者治巫蠱充將胡巫掘地求偶人捕蠱及夜祠視鬼染汙令有處輒收捕驗治燒鐵鉗灼強服之民轉相誣以巫蠱吏輒劾以大逆亡道坐而死者前後數萬人是時上春秋高疑左右皆為蠱祝詛有與亡莫敢訟其冤者充既知上意因言宮中有蠱氣先治後宮希幸夫人以次及皇后遂掘蠱於太子宮得桐木人太子懼不能自明收充自臨斬之罵曰趙虜亂乃國王父子不足邪乃復亂吾父子也太子繇是遂敗語在戾園傳後武帝知充有詐夷充三族息夫躬字子微河內河陽人也少為博士弟子受春秋通覽記書容貌壯麗為眾所異哀帝初即位皇后父特進孔鄉侯傅晏與躬同郡相友善躬繇是以為援交游日廣先是長安孫寵亦以游說顯名免汝南太守與躬相結俱上書召待詔是時哀帝被疾始即位而人有告中山孝王太后祝詛上太后及弟宜鄉侯馮參皆自殺其罪不明是後無鹽危山有石自立開道躬與寵謀曰上亡繼哃體久不平關東諸侯心爭陰謀今無鹽有大石自立聞邪臣託往事以為大山石立而先帝龍興東平王雲以故與其后日夜祠祭祝詛上欲求非望而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杯杓荊軻之變必起於帷幄事勢若此告之必成發國姦誅主讎取封侯之計也躬寵乃與中郎右師譚共因中常侍宋弘上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅上擢寵為南陽太守譚潁川都尉弘躬皆光祿大夫左曹給事中是時侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為高安侯寵為方陽侯躬為宜陵侯食邑各千戶賜譚爵關內侯食邑丞相王嘉內疑東平獄事爭不欲侯賢等語在嘉傳嘉固言董賢泰盛寵躬皆傾覆有佞邪材恐必撓亂國家不可任用嘉以此得罪矣躬既親近數進見言事論議亡所避眾畏其口見之仄目躬上疏歷詆公卿大臣曰方今丞相王嘉健而蓄縮不可用御史大夫賈延墮弱不任職左將軍公孫祿司隸鮑宣皆外有直項之名內實騃不曉政事諸曹以下僕遬不足數卒有彊弩圍城長戟指闕陛下誰與備之如使狂夫嘄謼於東崖匈奴飲馬於渭水邊竟雷動四野風起京師雖有武蠭精兵未有能窺左足而先應者也軍書交馳而輻湊羽檄重迹而押至小夫懦臣之徒憒眊不知所為其有犬馬之決者仰藥而伏刃雖加夷滅之誅何益禍敗, WYG: 俚}
