  - {type: variant, offset: 2855, length: 236, content: 後漢逮淮南王孫建繫治之王恐陰事泄謂被曰事至吾欲遂發天下勞苦有間矣諸侯頗有失行皆自疑我舉兵西鄉必有應者無應即還略衡山勢不得不發被曰略衡山以擊廬江有尋陽之船守下雉之城結九江之浦絕豫章之口強弩臨江而守以禁南郡之下東保會稽南通勁越屈強江淮間可以延歲月之壽耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成公獨以為無福何被曰大王之群臣近幸素能使眾者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地百人之眾起於大澤奮臂大呼天下嚮應西至於戲而兵百二十萬今吾國雖小勝兵可得二十萬公何以言有禍無福被曰臣, WYG: 中尉郅都}
