  - {type: variant, offset: 451, length: 2296, content: 將東擊齊未度平原聞漢王使酈食其說下齊信欲止通說信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城將軍將數萬之眾乃下趙五十餘城為將數歲反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷備漢守禦信因襲歷下軍遂至臨菑齊王以酈生為欺己而亨之因敗走信遂定齊地自立為齊假王漢方困於滎陽遣張良即立信為齊王以安固之項王亦遣武涉說信欲與連和蒯通知天下權在信欲說信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通因請間曰天下初作難也俊雄豪桀建號壹呼天下之士雲合霧集魚鱗雜襲飄至風起當此之時憂在亡秦而已今劉項分爭使人肝腦塗地流離中野不可勝數漢王將數十萬眾距鞏雒岨山河一日數戰無尺寸之功折北不救敗滎陽傷成皋還走宛葉之間此所謂智勇俱困者也楚人起彭城轉鬭逐北至滎陽乘利席勝威震天下然兵困於京索之間迫西山而不能進三年於此矣銳氣挫於嶮塞糧食盡於內藏百姓罷極無所歸命以臣料之非天下賢聖其勢固不能息天下之禍當今之時兩主縣命足下足下為漢則漢勝與楚則楚勝臣願披心腹墮肝膽效愚忠恐足下不能用也方今為足下計莫若兩利而俱存之參分天下鼎足而立其勢莫敢先動夫以足下之賢聖有甲兵之眾據彊齊從燕趙出空虛之地以制其後因民之欲西鄉為百姓請命天下孰敢不聽足下按齊國之故有淮泗之地懷諸侯以德深拱揖讓則天下君王相率而朝齊矣蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而背恩乎通曰始常山王成安君故相與為刎頸之交及爭張黶陳釋之事常山王奉頭鼠竄以歸漢王借兵東下戰於鄗北成安君死於泜水之南頭足異處此二人相與天下之至驩也而卒相滅亡者何也患生於多欲而人心難測也今足下行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳釋之事者故臣以為足下必漢王之不危足下過矣大夫種存亡越伯句踐立功名而身死語曰野禽殫走犬亨敵國破謀臣亡故以交友言之則不過張王與成安君以忠臣言之則不過大夫種此二者宜足以觀矣願足下深慮之且臣聞之勇略震主者身危功蓋天下者不賞足下涉西河虜魏王禽夏說下井陘誅成安君之罪以令於趙脅燕定齊南摧楚人之兵數十萬眾遂斬龍且西鄉以報此所謂功無二於天下略不世出者也今足下挾不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎夫勢在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之數日通復說曰聽者事之候也計者存亡之機也夫隨廝養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎之猶與不知蠭蠆之致蠚孟賁之狐疑不如童子之必至此言貴能行之也夫功者難成而易敗時者難值而易失時乎時不再來願足下無疑臣之計信猶與不忍背漢又自以功多漢不奪我齊遂謝通通說不聽惶恐乃陽狂為巫天下既定後信以罪廢為淮陰侯謀反被誅臨死歎曰悔不用蒯通之言死於女子之手高帝曰是齊辯士蒯通乃詔齊召蒯通通至上欲亨之曰若教韓信反何也通曰狗各吠非其主當彼時臣獨知齊王韓信非知陛下也且秦失其鹿天下共逐之高材者先得天下匈匈爭欲為陛下所為顧力不能可殫誅邪上乃赦之至齊悼惠王時曹參為相禮下賢人請通為客初齊王田榮怨項羽謀舉兵畔之劫齊士不與者死齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入深山隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國莫若先生者先生知梁石君東郭先生世俗所不及何不進之於相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談說之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國乃見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓通論戰國時說士權變亦自序其說凡八十一首號曰雋永初通善齊人安其生安其生嘗干項羽羽不能用其策而項羽欲封此兩人兩人卒不肯受伍被楚人也或言其先伍子胥後也被以材能稱為淮南中郎是時淮南王安好術學折節下士招致英雋以百數被為冠首久之淮南王陰有邪謀被數微諫後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諫吳王吳王不用乃曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也於是王怒繫被父母囚之三月王復召被曰將軍許寡人乎被曰不臣將為大王畫計耳臣聞聰者聽於無聲明者見於未形故聖人萬舉而萬全文王壹動而功顯萬世列為三王所謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不說曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長幼之序皆得其理上之舉錯遵古之道風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賓服羌僰貢獻東甌入朝廣長榆開朔方匈奴折傷雖未及古太平時然猶為治王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黃義從大將軍擊匈奴言大將軍遇士大夫以禮與士卒有恩眾皆樂為用騎上下山如飛材力絕人如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先須士卒休乃舍穿井得水乃敢飲軍罷士卒已踰河乃度皇太后所賜金錢盡以賞賜雖古名將不過也王曰夫蓼太子知略不世出非常人也以為漢廷公卿列侯皆如沐猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒受几杖而不朝王四郡之眾地方數千里采山銅以為錢煮海水以為鹽伐江陵之木以為船國富民眾行珍寶賂諸侯與七國合從舉兵而西破大梁敗狐父奔走而還為越所禽死於丹徒頭足異處身滅祀絕為天下戮夫以吳眾不能成功者何也誠逆天違眾而不見時也王曰男子之所死者一言耳且吳何知反漢將一日過成皋者, WYG: ''}
