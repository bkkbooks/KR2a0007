  - {type: variant, offset: 5448, length: 148, content: 寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝明年躬因是而上奏以為單于當以十一月入塞後以病為解疑有他變烏孫兩昆彌弱卑爰疐強盛居彊煌之地擁十萬之萬東結單于遣子往侍如因素彊之威循烏孫就屠之迹舉兵南伐并烏孫之勢也烏孫并則匈奴盛而西域危矣可令降胡詐為卑爰疐使者來上書曰所以遣子侍單于者非親信之也實畏, WYG: 計無復}
