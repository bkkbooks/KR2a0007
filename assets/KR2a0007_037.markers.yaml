  - {type: variant, offset: 217, length: 208, content: 為殆矣用臣之計毋戰而略地不攻而下城傳檄而千里定可乎彼將曰何謂也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利之則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守皆為金城湯池不可攻也為君計者莫若以黃屋朱輪迎范陽令使馳騖於燕趙之郊則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此說武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者, WYG: 髙帝兵}
