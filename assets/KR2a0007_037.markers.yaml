  - {type: variant, offset: 43, length: 0, content: '', WYG: 兩賢豈相戹哉孟康曰丁公及彭城頼齮追上故曰兩賢也師古曰孟説非也兩賢髙祖自謂并謂固耳言吾與固俱是賢豈相戹困也故固感此言而止也雖與賴齮俱追而髙祖獨與固言耳丁公引兵而還及項王滅丁公謁見髙祖以丁公徇軍中師古曰徇行示也音辭俊反曰丁公為項王}
