  - {type: variant, offset: 167, length: 49, content: 賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而說之曰必將戰勝而後略地攻得而後下城臣竊, WYG: 加哉前漢書卷三十七前漢書卷三十七考證季布傳夫}
