  - {type: variant, offset: 32, length: 0, content: '', WYG: 滅智伯晉卿荀瑶也貪而好勝率韓魏共攻趙襄子襄子與韓魏約反而喪之夫音扶差音楚宜反宋祁云浙本注文宜作崖秦任刑法不變卒滅趙氏鄭氏曰秦之先造父封於趙城其後以為姓張晏曰莊襄王為質於趙還為太子遂稱趙氏師古曰據秦本紀鄭説是鄉使秦以并天下宋祁曰以疑作已行仁義法先聖陛下安得而有之師古曰鄉讀曰嚮安焉也高帝不懌師古曰懌和樂也有慙色謂賈曰試為我著秦所以失天下吾所以得之者師古曰著明也謂作書明}
  - {type: variant, offset: 32, length: 0, content: '', krp: 滅智伯晉卿荀瑶也貪而好勝率韓魏共攻趙襄子襄子與韓魏約反而喪之夫音扶差音楚宜反宋祁云浙本注文宜作崖秦任刑法不變卒滅趙氏鄭氏曰秦之先造父封於趙城其後以為姓張晏曰莊襄王為質於趙還為太子遂稱趙氏師古曰據秦本紀鄭説是鄉使秦以并天下宋祁曰以疑作已行仁義法先聖陛下安得而有之師古曰鄉讀曰嚮安焉也高帝不懌師古曰懌和樂也有慙色謂賈曰試為我著秦所以失天下吾所以得之者師古曰著明也謂作書明}
  - {type: variant, offset: 33, length: 2, content: 涉獵, WYG: 之也及古成敗之國賈凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬歲稱其}
