  - {type: variant, offset: 274, length: 4, content: 東窮燕齊, WYG: 初定士卒罷於兵革師古曰罷讀曰疲未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何師古曰顧思念也敬曰陛下誠能以適長公主妻單于師古曰適讀曰嫡謂皇后所生厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺師古曰鮮少也問遺謂餉饋之也鮮音息善反遺音弋季反使辯士風諭以禮節師古曰風讀曰諷冐頓在固為子壻死外孫為單于豈曾聞外孫敢與大父亢禮哉宋祁曰聞字下越本無外字可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肻貴近無益也師古曰近音其靳反高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女師古曰言唯以此自慰柰何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于師古曰於外庻人之家取女而名之為公主使敬徃結和親約敬從匈奴來因言匈奴河}
