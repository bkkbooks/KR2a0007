  - {type: variant, offset: 3103, length: 1, content: 上, krp: 六年始更名太常前漢}
  - {type: variant, offset: 3105, length: 702, content: 曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荊軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之事太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭誠畢議願知左右不明卒從吏訊為世所疑是使荊軻衛先生復起而燕秦不寤也願大王孰察之昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子陽狂接輿避世恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽毋使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷臣始不信乃今知之願大王孰察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也故樊於期逃秦之燕藉荊軻首以奉丹事王奢去齊之魏臨城自剄以卻齊而存魏夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於天下為燕尾生白圭戰亡六城為魏取中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劍而怒食以駃騠白圭顯於中山人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女無美惡入宮見妒士無賢不肖入朝見嫉昔司馬喜臏腳於宋卒相中山范睢拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也是以申徒狄蹈雍之河徐衍負石入海不容於世義不苟取比周於朝以移主上之心故百里奚乞食於道路繆公委之以政甯戚飯牛車下桓公任之以國此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠桼昆弟不能離豈惑於眾口哉故偏聽生姦獨任成亂昔魯聽季孫之說逐孔子宋任子冉之計囚墨翟夫以孔墨之辯不能自免於讒諛而二國以危何則眾口鑠金積毀銷骨也秦用戎人由余而伯中國齊用越人子臧而彊威宣此二國豈係於俗牽於世繫奇偏之浮辭哉公聽並觀垂明當世故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣今人主誠能用齊秦之明後宋魯之聽則五伯不足侔而, WYG: 卷四十}
