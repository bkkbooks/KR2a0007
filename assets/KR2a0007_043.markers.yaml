  - {type: variant, offset: 48, length: 0, content: '', krp: 遂反如淳曰遂者布臣也臣瓚曰布用梁甫侯之計而遂反師古曰瓚説是也漢既誅布聞建諫之高祖賜建號平原君家徙長安}
  - {type: variant, offset: 49, length: 1, content: 騎, WYG: 人辯有口刻廉剛直行不茍合義不取容辟陽侯行不正得幸呂太后師古曰審食其欲知建師古曰欲與相知建不肯見及建母死貧未有以發喪方假貣服具師古曰貣音土得反陸賈素與建善乃見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何乃賀我陸生曰前日君侯欲知平原君平原君義不知君以其母故張晏曰相知當同恤災危以母在故義不知君也今其母死君誠厚送喪則彼為君死矣辟陽侯廼奉百金裞師古曰贈終者之衣被曰裞言以百金為衣被之具裞音式芮反其字從衣列侯貴人以辟陽侯故徃賻凡五百金師古曰布帛曰賻久之人或毁辟陽侯惠帝大怒下吏欲誅之太后慙不可言師古曰不可自言之大臣多害辟陽侯行欲遂誅之辟陽侯困急使人欲見建建辭曰獄急不敢見君建乃求見孝惠幸臣閎籍孺師古曰佞幸傳云高祖時則有籍孺孝惠有閎孺斯則二人皆名為孺而姓各别今此云閎籍孺誤剩籍字後人所妄加耳説曰君所以得幸帝天下莫不聞師古曰言不以材徳進今辟陽侯幸太后而下吏師古曰下音胡嫁反他皆類此道路皆言君讒欲殺之今日辟陽侯誅旦日太后含怒亦誅君君何不肉袒為辟陽侯言帝師古曰肉袒謂脱其衣袖而見肉肉袒者自挫辱之甚冀見哀憐帝聽君出辟陽侯太后大驩兩主俱幸君君富貴益倍矣於是閎籍孺大恐從其計言帝帝果出辟陽侯辟陽侯之囚欲見建建不見辟陽侯以為背之大怒及其成功出之大驚呂太后崩大臣誅諸呂辟陽侯於諸呂至深如淳曰辟陽侯與諸呂相親信為罪宜誅者至深也師古曰直言辟陽侯與諸呂相知情義至深重耳如説非也卒不誅計畫所以全者皆陸生平原君之力也}
