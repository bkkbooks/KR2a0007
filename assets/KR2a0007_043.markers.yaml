  - {type: variant, offset: 8, length: 1, content: 一, WYG: 萬之衆軍於歴城劉攽曰此時何縁更有田間按田横傳乃是田解横傳云齊使華毋傷田解軍歴下以距漢諸田宗彊負海岱阻河濟師古曰負背也岱泰山也南近楚齊人多變詐宋祁曰人疑作民足下雖遣數十萬師未可以歲月破也臣請得奉明詔説齊王使為漢而稱東藩上曰善廼從其畫復守敖倉而使食其説齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王背約不與而王之漢中項王遷殺義帝漢王起蜀漢之兵擊三秦出闗而責義帝之負處宋祁曰或無負字收天下之兵立諸侯之後降城即以侯其將得賂則以分其士與天下同其利豪英賢材皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下師古曰方併也項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘師古曰言項羽吝爵賞而念舊惡戰勝而不得其賞㧞城而不得其封非項氏莫得用事師古曰言唯任同姓之親為人刻印玩而不能授孟康曰刻斷無復亷鍔也臣瓚曰項羽吝於爵賞玩惜侯印不能以封人師古曰韓信傳作刓此作玩其義各通孟説非也攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王可坐而䇿也夫漢王發蜀漢定三秦涉西河之外援上黨之兵師古曰援引也音爰下井陘誅成安君破北魏師古曰謂魏豹也梁地既有魏名故謂此為北舉三十二城此黄帝之兵非人之力天之福也今已據敖倉之粟塞成臯之險守白馬之津杜太行之阸距飛狐之口天下後服者先亡矣王疾下漢王齊國社稷可得而保也不下漢王危亡可立而待也田廣以為然廼聽食其罷歴下兵守戰備與食其日縱酒師古曰日日縱意而飲酒韓信聞食其馮軾下齊七十餘城師古曰馮讀曰憑憑據也軾車前横板隆起者也云憑軾者言但安坐乗車而游説不用兵衆廼夜度兵平原襲齊齊王田廣聞漢兵至以為食其賣已師古曰言其與韓信通謀廼亨食其引兵走漢十二年曲周侯酈商以丞相將兵擊黥布有功高祖舉功臣思食其食其子疥師古曰疥音介數將兵上以其父故封疥為高梁侯後更食武陽卒子遂嗣三世侯平有罪國除陸}
