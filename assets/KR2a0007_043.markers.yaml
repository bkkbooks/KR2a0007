  - {type: variant, offset: 1332, length: 1, content: 莫, WYG: 擊鼓也舍枹鼓者言新罷戰陣之事别創漢代之禮故云一王之儀也枹音桴其字從木也遇其時也酈生自匿監門待主然後出猶不免鼎鑊師古曰鼎大而無足曰鑊音胡郭反朱建始名廉直既距辟陽不終其節亦以喪身陸賈位止大夫致仕諸呂師古曰以諸呂僣差託病歸家不受憂責從容平勃之間師古曰謂和輯陳平周勃以安漢朝也從音弋容反附會將相以彊社稷身名俱榮其最優乎前漢書卷四十三前漢書卷四十三考證酈食其傳為里監門然吏縣中賢豪不}
