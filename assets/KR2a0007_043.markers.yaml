  - {type: variant, offset: 1303, length: 0, content: '', krp: 食也淡音大噉反其可背哉陛下必欲廢適而立少師古曰適讀曰嫡臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳師古曰特但也通曰太子天下本本壹揺天下震動奈何以天下戲高帝曰吾聽公及上置酒見留侯所招客從太子入見上遂無易太子志矣高帝崩孝惠即位廼謂通曰先帝園陵寢廟羣臣莫習徙通為奉常師古曰又重為之也定}
  - {type: variant, offset: 1305, length: 2, content: 滅絕, WYG: 儀法及稍定漢諸儀法皆通所論著也惠帝為東朝長樂宮師古曰朝太后於長樂宮及間徃師古曰非大朝時中閒小謁見數蹕煩民孟康曰妨其徃來也作復道方築武庫南如淳曰作復道方始築武庫南也師古曰復音方目反通奏事因請間師古曰請空隙之時不欲對衆言之曰陛下何自築復道高帝寢衣冠月出游高廟服䖍曰持高廟中衣月旦以游於衆廟已而復之應劭曰月旦出高帝衣冠備法駕名曰游衣冠如淳曰高祖之衣冠藏在宮中之寢三月出游其道正值今之所作復道下故言乘宗廟道上行也晉灼曰黄圖高廟在長安城門街東寢在桂宮北服言衣藏於廟中如言宮中皆非也師古曰諸家之説皆未允也謂從高帝陵寢出衣冠游於高廟每月一為之漢制則然而後之學者不曉其意謂以月出之時而夜游衣冠失之遠也子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉師古曰舉事不當有過失今已作百姓皆知之}
