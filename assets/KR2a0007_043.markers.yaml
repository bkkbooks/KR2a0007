  - {type: variant, offset: 40, length: 2, content: 醇儒, krp: 生産賈常乘安車駟馬從歌鼓瑟侍者十人寶劒直百金謂其子曰與女約過女女給人馬酒食極欲十日而更師古曰又改向一子處宋祁曰欲疑作飲所死家得寶劒車騎侍從者一歲中以徃來過它客率不過再過師古曰非徒至諸子所又徃來經過佗處為賓客率計一歳之中每子不過再過至也上過音工禾反數擊鮮毋久溷女為也服䖍曰溷辱也吾常行數擊新美食不久辱汝也師古曰鮮謂新殺之肉也溷亂也言我至之時汝宜數數擊殺牲牢與我鮮食我不久住亂累汝也數音所角反溷音下困反劉攽曰史記作數見不鮮言人情頻見則不美故毋久溷女也馬宮傳君有不鮮不鮮是漢人語也宋祁曰按宮傳自云三公之位鼎足承君不有鮮明固守無以固位劉似誤引呂太后時王諸呂諸呂擅權欲刧少主危劉氏右丞相陳平患之力不能爭恐禍及已平常燕居深念師古曰念思也以國家不安故静居獨慮思其方䇿賈徃不請直入坐師古曰言不因門人將命而徑入自坐陳平方念不見賈師古曰思慮之際故不覺賈至賈曰何念深也平曰生揣我何念孟康曰揣度也韋昭曰揣音初委反賈曰足下位為上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附師古曰豫素也士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯師古曰謂者與之言絳侯與我戲易吾言師古曰言絳侯與我相戲狎輕易其言耳君何不交驩太尉深相結為陳平畫呂氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉師古曰厚為共具而與太尉樂飲太尉亦報如之兩人深相結呂氏謀益壞陳平乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此遊漢廷公卿間師古曰廷謂朝廷名聲籍甚孟康曰言狼籍甚盛及誅呂氏立孝文賈頗有力孝文即位欲使人之南越丞相平乃言賈為太中大夫徃使尉佗去黄屋稱制師古曰黄屋謂車上之蓋也黄屋及稱制皆天子之儀故令去之令比諸侯皆如意指語在南越傳陸生竟以壽終朱建楚人也故}
