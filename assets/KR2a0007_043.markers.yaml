  - {type: variant, offset: 1257, length: 1, content: 始, WYG: 欲叙其下儀法先言儀如此也先平明師古曰未平明之前謁者治禮引以次入殿門廷中陳車騎戍卒衞官設兵張旗志師古曰志與幟同音式餌反傳曰趨師古曰傳聲敎入者皆令趨謂疾行為敬也殿下郎中俠陛陛數百人師古曰俠與挾同挾其兩旁每陛皆數百人也功臣列侯諸將軍軍吏以次陳西方東鄉文官丞相以下陳東方西鄉師古曰鄉讀皆曰嚮大行設九賓臚句傳蘇林曰上傳語告下為臚下告上為句也韋昭曰大行掌賓客之禮今之鴻臚也九賓則周禮九儀也謂公侯伯子男孤卿大夫士也師古曰臚音廬劉攽曰賓謂傳擯之擯九賓擯者九人掌臚句傳也於是}
