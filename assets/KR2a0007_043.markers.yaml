  - {type: variant, offset: 16, length: 0, content: '', krp: 定天下名有口辯師古曰時人皆謂其口辯居左右常使諸侯時中國初定尉佗平南越因王之師古曰佗音徒河反高祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈服䖍曰魋音椎今兵士椎頭髻也師古曰結讀曰髻椎髻者一撮之髻其形如椎箕踞謂伸其兩脚而坐亦曰箕踞其形似箕賈因説佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶師古曰偝}
  - {type: variant, offset: 17, length: 1, content: 袪, WYG: 母之國無骨肉之恩是反天性也欲以區區之越與天子抗衡為敵國師古曰區區小貌禍且及身矣夫秦失其正師古曰正亦政也諸侯豪桀並起唯漢王先入闗據咸陽項籍背約自立為西楚霸王諸侯皆屬可謂至彊矣然漢王起巴蜀鞭笞天下刧諸侯遂誅項羽五年之間海内平定此非人力天之所建也天子聞君王王南越而不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣師古曰郊迎謂出郊而迎乃欲以新造未集之越師古曰集猶成也屈强於此師古曰屈音其勿反屈强謂不柔服也漢誠聞之掘燒君王先人冢墓夷種宗族師古曰夷平也謂平除其種族使一偏將將十萬衆臨越即越殺王降漢如反覆手耳師古曰言其易於是佗乃蹶然起坐師古曰蹶然驚起之貌也音厥謝賈曰居蠻夷中久殊失禮義因問賈曰我孰與蕭何曹參韓信賢師古曰與如也賈曰王似賢也復問曰我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三王之業統天下理中國中國之人以億計地方萬里居天下之膏腴人衆車輿萬物殷富政由一家自天地剖判未始有也師古曰言自開闢以來未嘗有也今王衆不過數萬皆蠻夷崎嶇山海間師古曰崎音丘宜反嶇音區譬如漢一郡王何乃比於漢佗大笑曰吾不起中國}
  - {type: page-break, offset: 17, content: '', id: KR2a0007_WYG_043-7a, image: WYG0250/WYG0250-0065c.png}
  - {type: page-break, offset: 17, content: '', id: KR2a0007_WYG_043-7b, image: WYG0250/WYG0250-0065d.png}
