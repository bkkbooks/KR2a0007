  - {type: variant, offset: 70, length: 1, content: 聞, WYG: 願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見師古曰衣著也帛謂繒也衣褐衣褐見師古曰此褐謂織毛布之衣不敢易衣虞將軍入言上上召見賜食已而問敬敬説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下王天下與周異周之先自后稷堯封之邰師古曰邰邑名也即今武功故城是其處音吐材反積德絫善十餘世師古曰絫古累字公劉避桀居豳大王以狄伐故去豳杖馬箠去居岐師古曰箠馬䇿也杖謂拄之也云杖馬箠者以示無所擕持也箠音止橤反國人爭歸之及文王}
