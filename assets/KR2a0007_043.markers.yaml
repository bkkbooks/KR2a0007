  - {type: variant, offset: 1252, length: 0, content: '', WYG: 師古曰復重也因也音扶目反臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行為之師古曰度音徒各反於是通使徵魯諸生三十餘人師古曰通為使者而徵諸生魯有兩生不肻行曰公所事者且十主皆面諛親貴今天下初定死者未葬傷者未起又欲起禮樂禮樂所由起百年積德而後可興也師古曰言行德敎百年然後可定禮樂吾不忍為公所為公所為不合古吾不行公徃矣毋汚我通笑曰若真鄙儒不知時變師古曰若汝也鄙言不通遂與所徵三十人西師古曰西入關及上左右為學者師古曰左右謂近臣也為學謂素有學術與其弟子百餘人為緜蕞野外應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕞與蕝同並音子悦反如説是習之月餘通曰上可試觀上使行禮曰吾能為此廼令羣臣習肄師古曰肄亦習也音弋二反㑹十月漢七年長樂宮成諸侯羣臣朝十月師古曰適㑹七年十月而長樂宮新成也漢時尚以十月為正月}
