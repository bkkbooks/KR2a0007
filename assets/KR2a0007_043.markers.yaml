  - {type: variant, offset: 1303, length: 0, content: '', WYG: 食也淡音大噉反其可背哉陛下必欲廢適而立少師古曰適讀曰嫡臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳師古曰特但也通曰太子天下本本壹揺天下震動奈何以天下戲高帝曰吾聽公及上置酒見留侯所招客從太子入見上遂無易太子志矣高帝崩孝惠即位廼謂通曰先帝園陵寢廟羣臣莫習徙通為奉常師古曰又重為之也定}
