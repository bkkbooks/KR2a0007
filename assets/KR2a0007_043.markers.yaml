  - {type: variant, offset: 3808, length: 4646, content: 王易為也是以聖王覺寤捐子之之心而不說田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善亡厭也夫晉文親其讎彊伯諸侯齊桓用其仇而一匡天下何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立彊天下卒車裂之越用大夫種之謀禽勁吳而伯中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚終與之窮達無愛於士則桀之犬可使吠堯跖之客可使刺由何況因萬乘之權假聖王之資乎然則荊軻湛七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以闇投人於道眾莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隨珠和璧祗怨結而不見德有人先游則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辯懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑辭之語不奪乎眾多之口故秦皇帝任中庶子蒙嘉之言以信荊軻而匕首竊發周文王獵涇渭載呂尚歸以王天下秦信左右而亡周用烏集而王何則以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷廧之制使不羈之士與牛驥同皁此鮑焦所以憤於世也臣聞盛飾入朝者不以私汙義底厲名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車今欲使天下寥廓之士籠於威重之權脅於位勢之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客初勝詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宮自使梁國士眾築作甬道朝太后爰盎等皆建以為不可天子不許梁王怒令人刺殺盎上疑梁殺之使者冠蓋相望責梁王梁王始與勝詭有謀陽爭以為不可故見讒枚先生嚴夫子皆不敢諫及梁事敗勝詭死孝王恐誅乃思陽言深辭謝之齎以千金令求方略解罪於上者陽素知齊人王先生年八十餘多奇計即往見語以其事王先王曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止況臣下乎昔秦始皇有伏怒於太后群臣諫而死者以十數得茅焦為廓大義始皇非能說其言也乃自強從之耳茅焦亦廑脫死如毛氂耳故事所以難者也今子欲安之乎陽曰鄒魯守經學齊楚多辯知韓魏時有奇節吾將歷問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為眾不可蓋竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王美人兄也後封為蓋侯鄒陽留數日乘間而請曰臣非為長君無使令於前故來侍也愚戇竊不自料願有謁也長君跪曰幸甚陽曰竊聞長君弟得幸後宮天下無有而長君行迹多不循道理者今爰盎事即窮竟梁王恐誅如此則太后怫鬱泣血無所發怒切齒側目於貴臣矣臣恐長君危於絫卵竊為足下憂之長君懼然曰將為之柰何陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宮金城之固也又有存亡繼絕之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事及舜立為天子封之於有卑夫仁人之於兄弟無臧怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般獄有所歸季友不探其情而誅焉慶父親殺閔公季子緩追免賊春秋以為親親之道也魯哀姜薨於夷孔子曰齊桓公法而不譎以為過也以是說天子徼幸梁事不奏長君曰諾乘間入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守不行漢既破吳齊王自殺不得立嗣濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試為大王明說梁王通意天子說而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國權不足以自守勁不足以扞寇又非有奇怪云以待難也雖墜言於吳非其正計也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也鄉使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之從結而無隙矣今吳楚之王練諸侯之兵敺白徒之眾西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬步獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首絫足撫衿使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大說使人馳以聞濟北王得不坐徙封於淄川枚乘字叔淮陰人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十戶之聚以王諸侯湯武之土不過百里上不絕三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不避重誅以直諫則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絕也馬方駭鼓而驚之係方絕又重鎮之係絕於天不可復結隊入深淵難以復出其出不出間不容髮能聽忠臣之言百舉必脫必若所欲為危於絫卵難於上天變所欲為易於反掌安於太山今欲極天命之壽敝無窮之樂究萬乘之勢不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難此愚臣之所以為大王惑也人性有畏其景而惡其跡者卻背而走迹愈多景愈疾不知就陰而止景滅迹絕欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之凔一人炊之百人揚之無益也不如絕薪止火而已不絕之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也福生有基禍生有胎納其基絕其胎禍何自來泰山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡使之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生如蘖足可搔而絕手可擢而拔據其未生先其未形也磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王游景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王曰昔者秦西舉胡戎之難北備榆中之關南距羌筰之塞東當六國之從六國乘信陵之籍明蘇秦之約厲荊軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之眾修戎狄之義而南朝羌筰此其與秦地相什而民相百大王之所明知也今夫讒諛之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍此臣所以為大王患也夫舉吳兵以訾於漢譬猶蠅蚋之附群牛腐肉之齒利劍鋒接必無事矣天子聞吳率失職諸侯願責先帝之遺約今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國夫漢并二十四郡十七諸侯方輸錯出運行數千里不絕於道其珍怪不如東山之府轉粟西鄉陸行不絕水行滿河不如海陵之倉修治上林雜以離宮積聚玩好圈守禽獸不如長洲之苑游曲臺臨上路不如朝夕之池深壁高壘副以關城不如江淮之險此臣之所為大王樂也今大王還兵疾歸尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黃頭循江而下襲大王之都魯東海絕吳之饟道梁王飭車騎習戰射積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已夫三淮南之計不負其約齊王殺身以滅其跡四國不得出兵其郡趙囚邯鄲此不可掩亦已明矣大王已去千里之國而制於十里之內矣張韓將北地弓高宿左右兵不得下壁軍不得大息臣竊哀之願大王孰察焉吳王不用乘策卒見禽滅漢既平七國乘由是知名景帝召拜乘為弘農都尉乘久為大國上賓與英俊並游得其所好不樂郡吏以病去官復游梁梁客皆善屬辭賦乘尤高孝王薨乘歸淮陰武帝自為太子聞乘名及即位乘年老乃以安車蒲輪徵乘道死詔問乘子無能為文者後乃得其孽子皋皋字少孺乘在梁時取皋母為小妻乘之東歸也皋母不肯隨乘乘怒分皋數千錢留與母居年十七上書梁共王得召為郎三年為王使與冗從爭見讒惡遇罪家室沒入皋亡至長安會赦上書北闕自陳枚乘之子上得之大喜召入見待詔皋因賦殿中詔使賦平樂館善之拜為郎使匈奴皋不通經術詼笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等而不得比嚴助等得尊官武帝春秋二十九乃得皇子群臣喜故皋與東方朔作皇太子生賦及立皇子禖祝受詔所為皆不從故事重皇子也初衛皇后立皋奏賦以戒終皋為賦善於朔也從行至甘泉雍河東東巡狩封泰山塞決河宣房游觀三輔離宮館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感輒使賦之為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於皋皋賦辭中自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也故其賦有詆娸東方朔又自詆娸其文骫骳曲隨其事皆得其意頗詼笑不甚閒靡凡可讀者百二十篇其尤嫚戲不可讀者尚數十篇路溫舒字長君鉅鹿東里人也父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝廉為山邑丞坐法免復為郡吏元鳳中廷尉光以治詔獄請溫舒署奏曹掾守廷尉史會昭帝崩昌邑王賀廢宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世趙王不終諸呂作亂而孝文為大宗繇是觀之禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至惪以承天心崇仁義省刑罰通關梁一遠近敬賢如大賓愛民如赤子內恕情之所安而施之於海內是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受之統滌煩文除民疾存亡繼絕以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆鬱於胸譽諛之聲日滿於耳虛美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生𢇍者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相敺以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歲以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏卻則鍛練而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成練者眾文致之罪明也是以獄吏專為深刻殘賊而亡極媮為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毀而後鳳凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬唯陛下除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失尊文武之惪省法制寬刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚上善其言遷廣陽私府長內史舉溫舒文學高第遷右扶風丞時詔書令公卿選可使匈奴者溫舒上書願給厮養暴骨方外以盡臣節事下度遼將軍范明友太僕杜延年問狀罷歸故官久之遷臨淮太守治有異迹卒於官溫舒從祖父受曆數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此及王莽篡位欲章代漢之符著其語焉溫舒子及孫皆至牧守大官贊曰春秋魯臧孫達以禮諫君君子以為有後賈山自下劘上鄒陽枚乘游於危國然卒免刑戮者以其言正也路溫舒辭順而意篤遂為世家宜哉, WYG: 考證}
  - {type: variant, offset: 3808, length: 4646, content: 王易為也是以聖王覺寤捐子之之心而不說田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善亡厭也夫晉文親其讎彊伯諸侯齊桓用其仇而一匡天下何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立彊天下卒車裂之越用大夫種之謀禽勁吳而伯中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚終與之窮達無愛於士則桀之犬可使吠堯跖之客可使刺由何況因萬乘之權假聖王之資乎然則荊軻湛七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以闇投人於道眾莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隨珠和璧祗怨結而不見德有人先游則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辯懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑辭之語不奪乎眾多之口故秦皇帝任中庶子蒙嘉之言以信荊軻而匕首竊發周文王獵涇渭載呂尚歸以王天下秦信左右而亡周用烏集而王何則以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷廧之制使不羈之士與牛驥同皁此鮑焦所以憤於世也臣聞盛飾入朝者不以私汙義底厲名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車今欲使天下寥廓之士籠於威重之權脅於位勢之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客初勝詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宮自使梁國士眾築作甬道朝太后爰盎等皆建以為不可天子不許梁王怒令人刺殺盎上疑梁殺之使者冠蓋相望責梁王梁王始與勝詭有謀陽爭以為不可故見讒枚先生嚴夫子皆不敢諫及梁事敗勝詭死孝王恐誅乃思陽言深辭謝之齎以千金令求方略解罪於上者陽素知齊人王先生年八十餘多奇計即往見語以其事王先王曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止況臣下乎昔秦始皇有伏怒於太后群臣諫而死者以十數得茅焦為廓大義始皇非能說其言也乃自強從之耳茅焦亦廑脫死如毛氂耳故事所以難者也今子欲安之乎陽曰鄒魯守經學齊楚多辯知韓魏時有奇節吾將歷問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為眾不可蓋竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王美人兄也後封為蓋侯鄒陽留數日乘間而請曰臣非為長君無使令於前故來侍也愚戇竊不自料願有謁也長君跪曰幸甚陽曰竊聞長君弟得幸後宮天下無有而長君行迹多不循道理者今爰盎事即窮竟梁王恐誅如此則太后怫鬱泣血無所發怒切齒側目於貴臣矣臣恐長君危於絫卵竊為足下憂之長君懼然曰將為之柰何陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宮金城之固也又有存亡繼絕之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事及舜立為天子封之於有卑夫仁人之於兄弟無臧怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般獄有所歸季友不探其情而誅焉慶父親殺閔公季子緩追免賊春秋以為親親之道也魯哀姜薨於夷孔子曰齊桓公法而不譎以為過也以是說天子徼幸梁事不奏長君曰諾乘間入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守不行漢既破吳齊王自殺不得立嗣濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試為大王明說梁王通意天子說而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國權不足以自守勁不足以扞寇又非有奇怪云以待難也雖墜言於吳非其正計也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也鄉使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之從結而無隙矣今吳楚之王練諸侯之兵敺白徒之眾西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬步獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首絫足撫衿使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大說使人馳以聞濟北王得不坐徙封於淄川枚乘字叔淮陰人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十戶之聚以王諸侯湯武之土不過百里上不絕三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不避重誅以直諫則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絕也馬方駭鼓而驚之係方絕又重鎮之係絕於天不可復結隊入深淵難以復出其出不出間不容髮能聽忠臣之言百舉必脫必若所欲為危於絫卵難於上天變所欲為易於反掌安於太山今欲極天命之壽敝無窮之樂究萬乘之勢不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難此愚臣之所以為大王惑也人性有畏其景而惡其跡者卻背而走迹愈多景愈疾不知就陰而止景滅迹絕欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之凔一人炊之百人揚之無益也不如絕薪止火而已不絕之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也福生有基禍生有胎納其基絕其胎禍何自來泰山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡使之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生如蘖足可搔而絕手可擢而拔據其未生先其未形也磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王游景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉以誅錯為名漢聞之斬錯以謝諸侯枚乘復說吳王曰昔者秦西舉胡戎之難北備榆中之關南距羌筰之塞東當六國之從六國乘信陵之籍明蘇秦之約厲荊軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之眾修戎狄之義而南朝羌筰此其與秦地相什而民相百大王之所明知也今夫讒諛之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍此臣所以為大王患也夫舉吳兵以訾於漢譬猶蠅蚋之附群牛腐肉之齒利劍鋒接必無事矣天子聞吳率失職諸侯願責先帝之遺約今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國夫漢并二十四郡十七諸侯方輸錯出運行數千里不絕於道其珍怪不如東山之府轉粟西鄉陸行不絕水行滿河不如海陵之倉修治上林雜以離宮積聚玩好圈守禽獸不如長洲之苑游曲臺臨上路不如朝夕之池深壁高壘副以關城不如江淮之險此臣之所為大王樂也今大王還兵疾歸尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黃頭循江而下襲大王之都魯東海絕吳之饟道梁王飭車騎習戰射積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已夫三淮南之計不負其約齊王殺身以滅其跡四國不得出兵其郡趙囚邯鄲此不可掩亦已明矣大王已去千里之國而制於十里之內矣張韓將北地弓高宿左右兵不得下壁軍不得大息臣竊哀之願大王孰察焉吳王不用乘策卒見禽滅漢既平七國乘由是知名景帝召拜乘為弘農都尉乘久為大國上賓與英俊並游得其所好不樂郡吏以病去官復游梁梁客皆善屬辭賦乘尤高孝王薨乘歸淮陰武帝自為太子聞乘名及即位乘年老乃以安車蒲輪徵乘道死詔問乘子無能為文者後乃得其孽子皋皋字少孺乘在梁時取皋母為小妻乘之東歸也皋母不肯隨乘乘怒分皋數千錢留與母居年十七上書梁共王得召為郎三年為王使與冗從爭見讒惡遇罪家室沒入皋亡至長安會赦上書北闕自陳枚乘之子上得之大喜召入見待詔皋因賦殿中詔使賦平樂館善之拜為郎使匈奴皋不通經術詼笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等而不得比嚴助等得尊官武帝春秋二十九乃得皇子群臣喜故皋與東方朔作皇太子生賦及立皇子禖祝受詔所為皆不從故事重皇子也初衛皇后立皋奏賦以戒終皋為賦善於朔也從行至甘泉雍河東東巡狩封泰山塞決河宣房游觀三輔離宮館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感輒使賦之為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於皋皋賦辭中自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也故其賦有詆娸東方朔又自詆娸其文骫骳曲隨其事皆得其意頗詼笑不甚閒靡凡可讀者百二十篇其尤嫚戲不可讀者尚數十篇路溫舒字長君鉅鹿東里人也父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝廉為山邑丞坐法免復為郡吏元鳳中廷尉光以治詔獄請溫舒署奏曹掾守廷尉史會昭帝崩昌邑王賀廢宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世趙王不終諸呂作亂而孝文為大宗繇是觀之禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至惪以承天心崇仁義省刑罰通關梁一遠近敬賢如大賓愛民如赤子內恕情之所安而施之於海內是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受之統滌煩文除民疾存亡繼絕以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆鬱於胸譽諛之聲日滿於耳虛美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生𢇍者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相敺以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歲以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏卻則鍛練而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成練者眾文致之罪明也是以獄吏專為深刻殘賊而亡極媮為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毀而後鳳凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬唯陛下除誹謗以招切言開天下之口廣箴諫之路掃亡秦之失尊文武之惪省法制寬刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚上善其言遷廣陽私府長內史舉溫舒文學高第遷右扶風丞時詔書令公卿選可使匈奴者溫舒上書願給厮養暴骨方外以盡臣節事下度遼將軍范明友太僕杜延年問狀罷歸故官久之遷臨淮太守治有異迹卒於官溫舒從祖父受曆數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此及王莽篡位欲章代漢之符著其語焉溫舒子及孫皆至牧守大官贊曰春秋魯臧孫達以禮諫君君子以為有後賈山自下劘上鄒陽枚乘游於危國然卒免刑戮者以其言正也路溫舒辭順而意篤遂為世家宜哉, krp: 考證}
