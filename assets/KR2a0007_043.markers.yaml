  - {type: variant, offset: 21, length: 0, content: '', WYG: 此使我居中國何遽不若漢師古曰言有何廹促而不如漢也遽音其庻反廼大説賈師古曰説讀曰悦謂愛悦之留與飲數月曰越中無足與語至生來令我日聞所不聞師古曰言素所不聞者日聞之賜賈橐中裝直千金張晏曰珠玉之寶也裝褁也如淳曰明月珠之屬也師古曰有底曰囊無底曰橐言其寶物質輕而價重可入囊橐以齎行故曰橐中裝也它送亦千金蘇林曰非橐中物故曰它送也師古曰它猶餘也賈卒拜佗為南越王令稱臣奉漢約歸報高帝大説師古曰説讀曰悦拜賈為太中大夫賈}
