  - {type: variant, offset: 16, length: 0, content: '', WYG: 定天下名有口辯師古曰時人皆謂其口辯居左右常使諸侯時中國初定尉佗平南越因王之師古曰佗音徒河反高祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈服䖍曰魋音椎今兵士椎頭髻也師古曰結讀曰髻椎髻者一撮之髻其形如椎箕踞謂伸其兩脚而坐亦曰箕踞其形似箕賈因説佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶師古曰偝}
