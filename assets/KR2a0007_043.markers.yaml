  - {type: variant, offset: 6, length: 0, content: '', WYG: 十三酈食其陳留高陽人也師古曰食音異其音基好讀書家貧落魄無衣食業鄭氏曰魄音薄應劭曰志行衰惡之貌也師古曰落魄失業無次也鄭音是為里監門然吏縣中賢豪不敢役師古曰吏及賢者豪者皆不敢使役食其皆謂之狂生及陳勝項梁等起諸將徇地過高陽者數十人師古曰徇亦畧也音辭峻反食其聞其將皆握齱好荷禮應劭曰握齱急促之貌師古曰荷與苛同苛細也齱音初角反自用不能聽大度之言食其廼自匿後聞沛公畧地陳留郊沛公麾下騎士適食其里中子服䖍曰食其里中子適會作沛公騎士沛公時時問邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大畧此真吾所願從游莫為我先師古曰先謂紹介也若見沛公師古曰若汝也謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒師古曰喜好也音許吏反諸客冠儒冠來者沛公輙解其冠溺其中師古曰溺讀曰尿音乃釣反與人言常大罵未可以儒生説也食其曰第言之師古曰第但也騎士從容言食其所戒者師古曰從子容反沛公至高陽傳舍師古曰傳舍者人所止息前人已去後人復來轉相傳也一音張戀反謂傳置之舍也其義兩通它皆類此使人召食其食其至入謁沛公方踞牀令兩女子洗而見食其師古曰洗足也音先典反食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎宋祁云浙本破作攻沛公罵曰豎儒師古曰言其賤劣如僮豎夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣師古曰輟止也起衣著衣也延食其上坐謝之食其因言六國從衡時師古曰從子容反衡横也沛公喜賜食其食問曰計安出食其曰足下起瓦合之卒師古曰瓦合謂如破瓦之相合雖曰聚合而不齊同收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五逹之郊也如淳曰四面徃來通之幷數中央凡五逹也臣瓚曰四通五逹言無險阻也今其城中又多積粟臣知其令師古曰素與其縣令相知今請使令下足下師古曰下降也即不聽足下舉兵攻之臣為内應於是遣食其徃沛公引兵隨之遂下陳留號食其為廣野君食其言弟商使將數千人從沛公西南畧地食其嘗為説客馳使諸侯漢三年秋項羽擊漢㧞滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之師古曰救趙及梁韓信方東擊齊漢王數困滎陽成臯計欲捐成臯以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有臧粟甚多楚人㧞滎陽不堅守敖倉乃引而東令適卒分守成臯師古曰適讀曰謫謫卒謂卒之有罪謫者即所謂謫戍此乃天所以資漢方今楚易取而漢反郤自奪便師古曰不圖進取是為自奪便利也郤音丘畧反臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海内揺蕩農夫釋耒紅女下機師古曰耒手耕曲木也音盧對反紅讀曰工天下之心未有所定也願足下急復進兵収取滎陽據敖庾之粟師古曰敖庾即敖倉塞成臯之險杜太行之道師古曰太行山名在河内野王之北上黨之南行音胡剛反距飛狐之口如淳曰上黨壺闗也臣瓚曰飛狐在代郡西南師古曰瓚説是壺闗無飛狐之名守白馬之津以示諸侯形制之勢師古曰以地形而制服則天下知所歸矣方今燕趙以定唯齊未下今田廣據千里之齊田間將}
