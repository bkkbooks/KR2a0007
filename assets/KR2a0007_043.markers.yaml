  - {type: variant, offset: 106, length: 2, content: 諭唯, WYG: 此天下中師古曰中音竹仲反宋祁曰雒字下一有陽字諸侯四方納貢職道里鈞矣有德則易以王無德則易以亡凡居此者欲令務以德致人不欲阻險令後世驕奢以虐民也及周之衰分而為二師古曰謂東周君西周君天下莫朝周周不能制非德薄形勢弱也今}
