  - {type: variant, offset: 22, length: 3, content: 博士弟, WYG: 時前説稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡師古曰夫差吳王闔閭}
