  - {type: variant, offset: 1825, length: 1192, content: 公卿發御府金賜大臣宗族亡不被澤者赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不說喜是以元年膏雨降五穀登此天之所以相陛下也刑輕於它時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須臾毋死思見德化之成也今功業方就各聞方昭四方鄉風今從豪俊之臣方正之士直與之日日獵射擊兔伐狐以傷大業絕天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏歲二月定明堂造太學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴游方正修潔之士不得從射獵使皆務其方以高其節則群臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞而榮日滅矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與眾臣宴游與大臣方正朝廷論議夫游不失樂朝不失禮議不失計軌事之大者也其後文帝除鑄錢令山復上書諫以為變先帝法非是又訟淮南王無大罪宜急令反國又言柴唐子為不善足以戒章下詰責對以為錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其言多激切善指事意然終不加罰所以廣諫爭之路也其後復禁鑄錢云鄒陽齊人也漢興諸侯王皆自治民聘賢吳王濞招致四方游士陽與吳嚴忌枚乘等俱仕吳皆以文辯著名久之吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諫為其事尚隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後乃致其意其辭曰臣聞秦倚曲臺之宮懸衡天下畫地而不犯兵加胡越至其晚節末路張耳陳勝連從兵之據以叩函谷咸陽遂危何則列郡不相親萬室不相救也今胡數涉北河之外上覆飛鳥下不見伏菟鬭城不休救兵不止死者相隨輦車相屬轉粟流輸千里不絕何則彊趙責於河間六齊望於惠后城陽顧於盧博三淮南之心思墳墓大王不憂臣恐救兵之不專胡馬遂進窺於邯鄲越水長沙還舟青陽雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也臣聞交龍襄首奮翼則浮雲出流霧雨咸集聖王底節修德則游談之士歸義思名今臣盡智畢議易精極慮則無國不可奸飾固陋之心則何王之門不可曳長裾乎然臣所以歷數王之朝背淮千里而自致者非惡臣國而樂吳民也竊高下風之行尤說大王之義故願大王之無忽察聽其志臣聞鷙鳥絫百不如一鶚夫全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之俠死士盈朝不能還厲王之西也然而計議不得雖諸賁不能安其位亦明矣故願大王審畫而已始孝文皇帝據關入立寒心銷志不明求衣自立天子之後使東牟朱虛東襃義父之後深割嬰兒王之壤子王梁代益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉今天子新據先帝之遺業左規山東右制關中變權易勢大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝則我吳遺嗣不可期於世矣高皇帝燒棧道水章邯兵不留行收弊民之倦東馳函谷西楚大破水攻則章邯以亡其城陸擊則荊王以失其地此皆國家之不幾者也願大王孰察之吳王不內其言是時, WYG: ''}
