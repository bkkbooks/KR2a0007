  - {type: variant, offset: 1263, length: 2, content: 二世, WYG: 法酒者猶言禮酌謂不飲之至醉劉攽曰謂朝畢以法置酒也上禮畢盡伏謂朝禮也下皆伏抑首謂置酒上壽也故下文又結云竟朝罷無敢讙譁失禮者若如顔説則置法酒便是羣臣飲不至醉而上夀乃在下文又語重複不序矣諸侍坐殿上皆伏抑首師古曰抑屈也謂依禮法不敢平坐而視以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是高帝曰吾廼今日知為}
