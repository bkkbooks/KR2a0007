  - {type: variant, offset: 311, length: 0, content: '', krp: 七勝兵二千人疏勒侯撃胡侯輔國侯都尉左右將左右騎君左右譯長各一人東至都䕶治所二千二百一十里南至莎車}
  - {type: variant, offset: 312, length: 0, content: '', WYG: 百六十里有市列西當大月氏大宛康居道也尉頭國王治尉頭谷去長安八千六百五十里戸三百口二千三百勝兵八百人左右都尉各一人左右騎君各一人東至都䕶治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日田畜隨水草衣服類烏孫前漢書卷九十六上前漢書卷九十六上考證西域傳本三十六國臣召南按荀悅漢紀列三十六國名目王應麟謂傳旣言三十六國皆在匈奴之西烏孫之南則烏孫不與矣又康居大月氏安息罽賔烏弋之屬皆以絶遠不在數中難兠屬罽賔亦不在數中大率祗就屬都䕶者計之也漢使西域者益得職注師古曰賞其勤勞皆得拜職也胡三省曰顔說非也此言漢使入西域諸國不敢輕忽爲得其職耳得職者不失其職也是歲神爵三}
