  - {type: variant, offset: 1209, length: 4, content: 臣鳳典領, WYG: 深陳旣往之悔曰前有司奏欲益民賦三十助邉用師古曰三十者每口轉増三十錢也是重困老弱孤獨也師古曰重音直用反而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時晉灼曰開陵侯匈奴介和王來降者危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍師古曰畜謂馬牛羊等也又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍師古曰食讀曰飤漢軍破城食至多然士自載不足以竟師師古曰士雖各自載糧而在道已盡至於歸塗}
