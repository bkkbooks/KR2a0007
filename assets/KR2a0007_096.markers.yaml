  - {type: variant, offset: 86, length: 1, content: 齊, WYG: 髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始爲武帝言之上遣使者持千金及金馬以請宛善馬宛王以漢絕遠大兵不能至愛其寳馬不肯與漢使妄言師古曰謂詈辱宛王宛遂攻殺漢使取其財物於是天子遣貳師將軍李廣利將兵前後十餘萬人伐宛連四年宛人斬其王母寡首獻馬三千匹漢軍乃還語在張騫傳貳師旣斬宛王更立貴人素遇漢善者名昧蔡爲宛王師古曰昧音秣蔡音千曷反後歲餘宛貴人以爲昧蔡讇使我}
