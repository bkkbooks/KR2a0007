  - {type: variant, offset: 315, length: 3, content: 聖女興, WYG: 至條支者凡言條支所有皆傳聞也故後書紏此文之違安息國傳治番兜城番兜城後書作和櫝城又大月氏國治監氏城後書作藍氏城康居國傳東羈事匃奴注師古云云顧炎武曰言不純臣但羈縻事之與烏孫羈屬同意當用彼注刪此注前漢書卷九十六上考證欽定四庫全書前漢書卷九十六下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注西域傳第六十六下烏孫國大昆彌治赤谷城師古曰烏孫於西域諸戎}
