  - {type: variant, offset: 335, length: 0, content: '', WYG: 欲反烏孫於是恐使使獻馬願得尙漢公主爲昆弟天子問羣臣議許曰必先内聘然後遣女烏孫以馬千匹聘師古曰入聘財漢}
  - {type: variant, offset: 335, length: 0, content: '', krp: 欲反烏孫於是恐使使獻馬願得尙漢公主爲昆弟天子問羣臣議許曰必先内聘然後遣女烏孫以馬千匹聘師古曰入聘財漢}
  - {type: variant, offset: 336, length: 3, content: 城郭東, WYG: 封中遣江都王建女細君爲公主以妻焉賜乗輿服御物爲備官屬宦官侍御數百人贈送甚盛烏孫昆莫以爲右夫人匈奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宮室居歲時一再與昆莫會置酒飲食以幣帛賜王左右貴人昆莫年老語言不通公主悲愁自爲作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬爲室兮旃爲牆以肉爲食兮酪爲漿師古曰食謂飯音飤居常土思兮心内傷師古曰土思謂憂思而懐本土願爲黄鵠兮歸故鄉師古曰鵠音下督反天子聞而憐之間歲遣使者持帷帳錦繡給遺焉師古曰間歲者謂毎隔一歲而往也昆莫年老欲使其孫岑陬尙公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬遂妻公主昆莫死岑陬代立岑陬者官號也名軍須靡昆莫王號也名獵驕靡後書昆彌云師古曰昆莫本是王號而其人名獵驕靡故書云昆彌昆取昆莫彌取驕靡彌靡音}
