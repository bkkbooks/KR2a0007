  - {type: variant, offset: 5320, length: 0, content: '', krp: 絕匈奴大擊北邉而西域亦瓦解焉耆國近匈奴先叛殺都䕶但欽莽不能討天鳳三年廼遣五威將王駿西域都䕶李崇將戊已校尉出西域諸國皆郊迎送兵榖焉耆詐降而聚兵自備駿等將莎車龜兹兵七千餘人分爲數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國兵爲反間還共襲繫駿等皆殺之唯戊已校尉郭欽别將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽爲剼胡子鄧展曰剼音衫師古曰剼絕也音子小反字本作劋轉寫誤耳李崇收餘士還保龜兹數年莽死崇遂沒西域因絕最凡國五十自譯長城長君監吏大祿百長千長都尉且渠當戸將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賔烏弋之屬皆}
  - {type: variant, offset: 5321, length: 2, content: 符命, WYG: 絕遠不在數中其來貢獻則相與報不督錄總領也賛曰孝武之世圖制匈奴患其兼從西國結黨南羌師古曰圖謀也從音子容反廼表河曲列西郡宋祁曰新本西作四開玉門通西域以斷匈奴右臂隔絕南羌月氏單于失援由是遠遁而幕南無王庭遭値文景𤣥默養民五世天下殷富財力有餘士馬彊盛故能睹犀布瑇瑁則建珠崖七郡師古曰瑇音代瑁音妹感枸醬竹杖則開牂柯越嶲師古曰枸音矩聞天馬蒲陶則通大宛安息}
