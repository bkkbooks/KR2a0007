  - {type: variant, offset: 319, length: 1, content: 齊, WYG: 形最異今之胡人青眼赤須狀類彌猴者本其種也去長安八千九百里戸十二萬口六十三萬勝兵十八萬八千八百人相大禄左右宋祁曰楊本無左右二字大將二人侯三人大將都尉各一人宋祁曰楊本大將作大夫大監二人大吏一人舍中大吏二人騎君一人東至都䕶治所千七百二十一里西至康居蕃内地五千里地莽平多雨寒山多松樠師古曰莽平謂有草莽而平坦也一曰莽莽平野之貌樠木名其心似松音武元反不}
