  - {type: variant, offset: 5054, length: 262, content: 間秋歷東館望昆明集黃山宮冬饗飲飛羽校獵上蘭登長平館臨涇水而覽焉太后所至屬縣輒施恩惠賜民錢帛牛酒歲以為常太后從容言曰我始入太子家時見於丙殿至今五六十歲尚頗識之莽因曰太子宮幸近可壹往遊觀不足以為勞於是太后幸太子宮甚說太后旁弄兒病在外舍莽自親候之其欲得太后意如此平帝崩無子莽徵宣帝玄孫選最少者廣戚侯子劉嬰年二歲託以卜相為最吉乃風公卿奏請立嬰為孺子令宰衡安漢公莽踐祚居攝如周公傅成王故事太后不以為可力不能禁於是莽遂為攝皇帝改元稱制焉俄而宗室安眾侯劉崇及東郡太守翟義等惡之更舉兵欲誅莽太后聞之曰人心不相遠也我雖婦人亦知莽必以是自危不可, WYG: ''}
