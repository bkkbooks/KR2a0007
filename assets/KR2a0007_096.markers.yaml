  - {type: variant, offset: 22, length: 1, content: 後, WYG: 欲反因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻於漢天子大說師古曰說讀曰悅安息東則大月氏大月氏國王治監氏城去長安萬一千六百里不屬都䕶戸十萬口四十萬勝兵十萬人東至都䕶治所四千七百四十里西至安息四十九日行南與罽賔接土地風氣物類所有民俗錢貨與安息同出一封橐駝師古曰脊上有一封也封言}
