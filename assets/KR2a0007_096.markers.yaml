  - {type: variant, offset: 689, length: 4, content: 朝皇后乃, WYG: 左右大將都尉皆遣使凡三百餘人入漢迎取少主上廼以烏孫主解憂弟子相夫爲公主宋祁曰越本弟字下無子字置官屬侍御百餘人舍上林中學烏孫言師古曰舍止也天子自臨平樂觀會匈奴使者外國君長大角抵設樂而遣之使長羅侯光祿大夫惠爲副凡持節者四人送少主至敦煌未出塞聞烏孫昆彌翁歸靡死烏孫貴人共從本約立岑陬子泥靡代爲昆彌號狂王惠上書願留少主敦煌惠馳至烏孫責讓不立元貴靡爲昆彌還迎少主事下公卿望之復以爲烏孫持兩端難約結前公主在烏孫四十餘年恩愛不親密邊竟未得安師古曰竟讀曰境此已事之驗也今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興其原起此天子從之徴還少主狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衞司馬魏和意副候任昌送侍子公主言狂王爲烏孫所患苦易誅也遂謀置酒會罷使士㧞劒擊之劒旁下師古曰不正下也狂王傷上馬馳去其子細沈痩師古曰痩音搜會兵圍和意昌及公主於赤谷城數月都護鄭吉發諸國兵救之廼解去漢遣中郎將張遵持醫藥治狂王賜金二十斤采繪因收和意昌係𤨏從尉犂檻車至長安斬之車騎將軍長史張翁留驗公主與使者謀殺狂王狀主不服叩頭謝張翁捽主頭罵詈師古曰捽持其頭音材兀反主上書翁還坐死副使季都别將醫養視狂王狂王從十餘騎送之都還坐知狂王當誅}
