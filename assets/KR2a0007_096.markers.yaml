  - {type: variant, offset: 14, length: 1, content: 姑, WYG: 貌其草木畜産五穀果菜食飲宫室市列錢貨兵􅄊金珠之屬皆與罽賔同而有桃拔師子犀牛孟康曰桃拔一名符拔似鹿長尾一角者或爲天鹿兩角者或爲辟邪師子似虎正黄有􅏋耏尾端茸毛大如斗師古曰師子卽爾雅所謂狻猊}
  - {type: variant, offset: 14, length: 1, content: 姑, krp: 貌其草木畜産五穀果菜食飲宫室市列錢貨兵器金珠之屬皆與罽賔同而有桃拔師子犀牛孟康曰桃拔一名符拔似鹿長尾一角者或爲天鹿兩角者或爲辟邪師子似虎正黄有􅏋耏尾端茸毛大如斗師古曰師子卽爾雅所謂狻猊}
