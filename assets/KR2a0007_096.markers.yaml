  - {type: variant, offset: 331, length: 0, content: '', WYG: 後烏孫昆莫擊破大月氏大月氏徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氏種云始張騫言烏孫本與大月氏共在敦煌間今烏孫雖彊大可厚賂招令東居故地妻以公主與爲昆弟以制匈奴語在張騫傳武帝卽位劉敞曰衍位字令騫齎金幣往昆莫見騫如單于禮師古曰昆莫自比於單于騫大慙謂曰天子致賜王不拜則還賜師古曰還賜謂將賜物還歸漢也昆莫起拜其它如故初昆莫有十餘子中子大祿彊善將師古曰言其材力優彊能爲將將衆萬餘騎别居大祿兄太子太子有子曰岑陬師古曰岑音仕林反陬音子侯反太子蚤死師古曰蚤古早字謂昆莫曰必以岑陬爲太子昆莫哀許之大祿怒廼收其昆弟將衆畔謀攻岑陬昆莫與岑陬萬餘騎令别居昆莫亦自有萬餘騎以自備國分爲三大總羈屬昆莫騫旣致賜諭指曰烏孫能東居故地則漢遣公主爲夫人結爲昆弟共距匈奴不足破也烏孫遠漢未知其大小師古曰遠音于萬反又近匈奴服屬}
