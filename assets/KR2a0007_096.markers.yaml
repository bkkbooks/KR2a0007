  - {type: variant, offset: 815, length: 3, content: 生成帝, WYG: 也時年且七十賜以公主田宅奴婢宋祁曰舊本主作第奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓云元貴靡子星靡代爲大昆彌弱師古曰言其尚㓜少馮夫人上書願使烏孫鎭撫星靡漢遣之卒百人送烏孫焉宋祁曰越本邵本無烏孫字都䕶韓宣奏烏孫大吏大祿大監皆可以賜金印紫綬以尊輔大昆彌漢許之後都䕶韓宣復奏星靡怯弱可免更以季父左大將樂代爲昆彌漢不許宋祁曰大將樂代爲昆彌當作代將樂大爲昆彌後叚㑹宗爲都護招還亡畔安定之師古曰有人衆亡畔者皆招而還之故安定也星靡死子雌栗靡代小昆彌烏就屠死子拊離代立師古曰拊讀與撫同爲弟日貳所殺漢遣使者立拊離子安日爲小昆彌日貳亡阻康居漢徙已校屯姑墨師古曰有戊已兩校兵此直徙已校也欲候便討焉安日使貴人姑莫匿等三人詐亡從日貳刺殺之師古曰詐畔亡而投之因得以刺殺都䕶㢘襃賜姑莫匿等金人二十斤繒三百匹後安日爲降民所殺漢立其弟末振將代時大昆彌雌栗靡健翖侯皆畏服之告民牧馬畜無使入牧師古曰勿入昆彌牧中恐其相擾也國中大安和翁歸靡時師古曰勝}
