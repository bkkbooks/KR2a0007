  - {type: variant, offset: 5372, length: 0, content: '', WYG: 張衡西京賦所云巨獸百尋是爲漫延者也魚龍者爲含利之獸先戲於庭極畢乃入殿前激水化成比目魚跳躍潄水作霧障日畢化成黄龍八丈出水敖戲於庭炫燿日光西京賦云海鱗變而成龍即爲此色也俞音踰碭音徒浪反衍音弋戰反視讀曰示觀示者視之令觀也宋祁曰注文八丈一作入又字徒浪反越本作大浪及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足廼𣙜酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭師古曰屈音其勿反因之以凶年寇盗並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則葱嶺身熱頭痛縣度之阸淮南杜欽揚雄之論皆以爲此}
  - {type: page-break, offset: 5372, content: '', id: KR2a0007_WYG_096-57b, image: WYG0251/WYG0251-0178d.png}
  - {type: variant, offset: 5372, length: 0, content: '', krp: 張衡西京賦所云巨獸百尋是爲漫延者也魚龍者爲含利之獸先戲於庭極畢乃入殿前激水化成比目魚跳躍潄水作霧障日畢化成黄龍八丈出水敖戲於庭炫燿日光西京賦云海鱗變而成龍即爲此色也俞音踰碭音徒浪反衍音弋戰反視讀曰示觀示者視之令觀也宋祁曰注文八丈一作入又字徒浪反越本作大浪及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足廼𣙜酒酤筦鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭師古曰屈音其勿反因之以凶年寇盗並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則葱嶺身熱頭痛縣度之阸淮南杜欽揚雄之論皆以爲此}
  - {type: variant, offset: 5373, length: 0, content: '', WYG: 地所以界别區域絕外内也書曰西戎即序師古曰禹貢之辭也序次也禹既就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能綂率與之進退與漢隔絕道里又遠得之不爲益棄之不爲損盛徳在我無取於彼故自建武以來西域思漢威徳咸樂内屬唯其小邑鄯善車師界迫匈奴尚爲所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都䕶聖上遠覽古今因時之宜羇縻不絕辭而未許雖大禹之序西戎周公之讓白雉太宗之郤走馬義兼之矣亦何以尚兹師古曰西戎即序説已在前昔周公相成王越裳氏重九譯而獻白雉成王問周公公曰徳不加焉則君}
  - {type: page-break, offset: 5373, content: '', id: KR2a0007_WYG_096-58a, image: WYG0251/WYG0251-0179a.png}
