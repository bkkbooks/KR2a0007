  - {type: variant, offset: 1528, length: 1, content: 侍, WYG: 與謀師古曰與讀曰豫參以蓍龜不吉不行師古曰謂共卿大夫謀事尙不專決猶雜問蓍龜也廼者以縛馬書徧視丞相御史二千石諸大夫郎爲文學者師古曰視讀曰示爲文學謂學經書之人廼至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以爲欲以見彊師古曰見顯示宋祁曰别本欲字下有式字劉蹟考異無式字故除之夫不足者視人有餘師古曰言其夸張也視亦讀曰示易之卦得大過爻在九五孟康曰其繇曰枯楊生華象曰枯楊生華何可久也謂匈奴破不久也匈奴困敗公車方士太史治星望氣及太卜龜􅆱皆以爲吉匈奴必破時不可再得也師古曰今便利之時後不可再得也又曰北伐行將於鬴山必克師古曰行將謂遣將率行也鬴山山名也鬴古釡字卦諸將貳師最吉師古曰上遣諸將而於卦}
