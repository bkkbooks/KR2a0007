  - {type: variant, offset: 2040, length: 233, content: 內行篤有威重位歷將相國家柱石臣也其人守正不肯詘節隨鳳委曲卒用閨門之事為鳳所罷身以憂死眾庶愍之又鳳知其小婦弟張美人已嘗適人於禮不宜配御至尊託以為宜子內之後宮苟以私其妻弟聞張美人未嘗任身就館也且羌胡尚殺首子以盪腸正世況於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及它所不見者鳳不可令久典事宜退使就弟選忠賢以代之自鳳之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰微京兆尹直言吾不聞社稷計且唯賢知賢君試為朕求可以自輔者於是章奏封事薦中山孝王舅琅邪太守馮野王先, WYG: 漢昭}
