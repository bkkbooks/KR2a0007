  - {type: variant, offset: 1112, length: 10, content: 邑其夏黃霧四塞終日天, WYG: 宜給足不可乏師古曰言以錐刀及黄金采繒與此旁國易榖食可以給田卒不憂乏糧也臣愚以爲可遣屯田卒詣故輪臺以東置校尉三人分䕶各舉圖地形通利溝渠務使以時益種五榖師古曰益多也張掖酒泉遣騎假司馬爲斥候屬校尉事有便宜因騎置以聞師古曰騎置卽今之驛馬也田一歲有積榖募民壯健有累重敢徙者詣田所師古曰累重謂妻}
