  - {type: variant, offset: 32, length: 0, content: '', krp: 大夏本無大君長城邑徃徃置小長民弱畏戰故月氏徙來皆臣畜之共禀漢使者師古曰同受節度也有五翖侯師古曰翖卽翕字一曰休宻翖侯治和墨城去都䕶二千}
  - {type: variant, offset: 33, length: 27, content: 世生虞舜舜起媯汭以媯為姓至周武王封舜後媯滿於陳是為胡公, WYG: 百四十一里去陽關七千八百二里二曰􅀟靡翖侯治雙靡城去都䕶三千七百四十一里去陽關七千七百八十二里三曰貴霜翖侯治䕶澡城師古曰澡音藻去都䕶五千九百四十里去陽關七千九百八十二里四曰肸頓翖侯師古曰肸音許乙反治薄茅城去都䕶五千九百六十二里去陽關八千二百二里五曰髙附翖侯治髙附城去都䕶六千四十一里去陽關九千二百八}
