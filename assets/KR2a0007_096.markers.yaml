  - {type: variant, offset: 12, length: 0, content: '', WYG: 鳳曰前罽賔王隂末赴本漢所立後卒畔逆師古曰卒終也夫徳莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶遠兵不至也有求則卑辭無欲則驕嫚終不可懐服凡中國所以爲通厚蠻夷㥦快其求者爲壤比而爲宼也師古曰比近也爲其土壤接近能爲宼也㥦音苦頰反比音頻寐反今縣度之阸非罽賔所能越也其郷慕不足以安西域師古曰郷讀曰嚮雖不附不能危城郭師古曰城郭總謂西域諸國也前親逆節惡暴西域師古曰暴謂章露也故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻爲名故煩使者送至縣度恐失實見欺凡遣使送客者欲爲防䕶宼害也起皮山南更不屬漢之國四五師古曰言經歴不屬漢者凡四五國也更音工衡反斥候士百餘人五分夜撃刁斗自守師古曰夜有五更故分而持之也刁斗觧在李廣傳尚時爲所侵盗驢畜負糧須諸國稟食得以自贍師古曰稟給也贍足也食讀曰飤以下並同國或貧小不能食或桀黠不肯給擁彊漢之節餒山谷之間師古曰餒飢也音能賄反乞匄無所得師古曰匄亦乞也音工大反離一二旬則人畜棄捐曠野而不反師古曰離亦歴也曠空也又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然師古曰嘔音一口反又有三池盤石阪道陿者尺六七寸長者徑三十里臨崢嶸不測之深師古曰崢嶸深險之貌也崢音仕耕反嶸音宏行者騎歩相持䋲索相引二千餘里乃到縣度畜隊未半阬谷盡靡碎師古曰隊亦墮也靡散也隊音直類反靡音縻人墯埶不得相收視險阻危害不可勝言聖王分九州制五服師古曰九州冀兗豫青徐荆揚梁雍也五服侯甸綏要荒務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆渉危難之路罷弊所恃以事無用師古曰罷讀曰疲所恃謂中國之人也無用謂遠方蠻夷之國非久長計也使者業已受節可至皮山而還師古曰言已立計遣之不能卽止可至皮山也於是鳳白從欽言罽賔實利賞賜賈市其使數年而壹至云烏弋山離國王去長安萬二千二百里不屬都䕶戸口勝兵大國也東北至都䕶治所六十日行東與罽賔北與撲挑宋祁曰景本挑作桃西與犂靬條支接師古曰撲音布木反犂讀與驪同靬音鉅連反又鉅言反行可百餘日乃至條支國臨西海暑溼田稲有大鳥卵如甕師古曰甕汲水缾也音於龍反人衆甚多徃徃有小君長安息役屬之以爲外國師古曰安息以條支爲外國如言蕃國也善眩師古曰眩讀與幻同解在張騫傳安息長老傳聞條支有弱水西王母亦未嘗見也師古曰𤣥中記云昆侖之弱水鴻毛不能起也爾雅曰觚竹北户西王母日下謂之四荒也自條支乗水西行可百餘日近日所入云烏弋地暑熱}
