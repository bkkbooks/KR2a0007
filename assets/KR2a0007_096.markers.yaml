  - {type: variant, offset: 7, length: 0, content: '', WYG: 里與渠犂田官相近土地肥饒於西域爲中故都䕶治焉至元帝時復置戊巳校尉屯田車師前王庭是時匈奴東蒲類王兹力支將人衆千七百餘人降都䕶都䕶分車師後王之西爲烏貪訾離地以處之自宣元後單于稱藩臣西域服從其土地山川王侯户數道里遠近翔實矣師古曰翔與詳同假借用耳出陽關自近者始曰婼羌孟康曰婼音兒師古曰音而遮反婼羌國王號去胡來王師古曰言去離胡戎來附漢也去陽關千八百里宋祁曰越本八作六去長安六千三百里辟在西南不當孔道師古曰辟讀曰僻孔道者穿山險而爲道猶今言穴徑耳戸四百五十口千七百五十勝兵者五百人西與且末接師古曰且音子餘反隨畜逐水草不田作仰鄯善且末榖師古曰頼以自給也仰音牛向反山有鐵自作兵兵有弓矛服刀劒甲劉徳曰服刀拍髀也師古曰拍音貃髀音俾又音陛西北至鄯善乃當道云鄯善國本名樓蘭王治扜泥城師古曰扜音一胡反去陽關千六百里去長安六千一百里户千五百七十口萬四千一百勝兵二千九百十二人輔國侯卻胡侯師古曰卻音丘畧反其字從卩卩音節下皆類此鄯善都尉撃車師都尉左右且渠撃車師君各一人譯長二人西北去都䕶治所千七百八十五里至山國千三百六十五里師古曰此國山居故名山國也西北至車師千八百九十里地沙鹵少田寄田仰榖旁國師古曰寄於它國種田又糴旁國之榖也仰音牛向反國出玉多葭葦檉栁胡桐白草孟康曰白草草之白者胡桐似桑而多曲師古曰檉栁河栁也今謂之赤檉白草似莠而細無芒其乾􅍄時正白色牛馬所嗜也胡桐亦似桐不類桑也蟲食其𣗳而沬出下流者俗名爲胡桐淚言似眼淚也可以汗金銀也今工匠皆用之流俗語訛呼淚為律檉音丑成反宋祁曰注文工字别本作匠民隨畜牧逐水草有驢馬多橐它師古曰它古駝字也音徒何反能作兵與婼羌同初武帝感張騫之言甘心欲通大宛諸國使者相望於道一歲中多至十餘輩樓蘭姑師當道苦之師古曰每供給使者受其勞費故厭苦也攻劫漢使王恢等又數爲匈奴耳目令其兵􅃒漢使漢使多言其國有城邑兵弱易撃於是武帝遣從票侯趙破奴將屬國騎及郡兵數萬撃姑師師古曰屬國謂諸外國屬漢也王恢數爲樓蘭所苦上令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬師古曰暴謂顯揚也還封破奴爲浞野侯恢爲浩侯蘇林曰浩音吴於是漢列亭障至玉門矣樓蘭旣降服貢獻匈奴聞發兵撃之於是樓蘭遣一子質匈奴一子質漢後貳師軍撃大宛匈奴欲􅃒之貳師兵盛不敢當卽遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門關爲貳師後距師古曰後距者居後以距敵捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王師古曰以文簿一一責之簿音歩戸反對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國師古曰以其言爲直亦因使候伺匈奴匈奴自是不甚親信樓蘭征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下􅁞室宫刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質匈奴後王又死匈奴先聞之遣質子歸得立爲王師古曰匈奴在漢前聞樓蘭王死故卽遣質子還也漢遣使詔新王令入朝天子将加厚賞樓蘭王後妻故􅁇母也謂王曰先王遣兩子質漢皆不還奈何欲徃朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢使又數爲吏卒所宼懲艾不便與漢通師古曰艾讀曰乂後復爲匈奴反間師古曰間音居莧反數􅃒殺漢使其弟尉屠耆降漢具言状元鳳四年大將軍霍光白遣平樂監傅介子徃刺其王介子輕將勇敢士齎金幣揚言以賜外國爲名旣至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首師古曰嘗歸者其王名也昭紀言安歸今此作嘗歸紀傳不同當有誤者馳傳詣闕師古曰傳音張戀反縣首北闕下封介子爲義陽侯乃立尉屠耆爲王更名其國爲鄯善爲刻印章賜以宫女爲夫人備車騎輜重師古曰重音直用反丞相將軍率百官送至横門外孟康曰横音光宋祁曰淳化本作丞相將軍百官景徳監本及浙本作丞相率百官無將軍字今越本作丞相將軍率百官祖而遣之師古曰爲設祖道之禮也王自請天子曰身在漢久今歸單弱而前王有子在恐爲所殺國中有伊循城其地肥羙願漢遣一將屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之師古曰填音竹刃反其後更置都尉伊循官置始此矣鄯善當漢道衝西通且末七百二十里自且末以徃皆種五榖土地草木畜産作兵略與漢同有異乃記云且末國王治且末城去長安六千八百二十里户二百三十口千六百一十勝兵三百二十人輔國侯左右將譯長各一人西北至都䕶治所二千二百五十八里北接尉犂南至小宛可三日行有蒲陶諸果西通精絶二千里小宛國王治扜零城師古曰扜音烏去長安七千二百一十里户百五十口千五十勝兵二百人輔國侯左右都尉各一人西北至都䕶治所二千五百五十八里東與婼羌接辟南不當道師古曰辟讀曰僻下皆類此精絶國王治精絶城去長安八千八百二十里户四百八十口三千三百六十勝兵五百人精絶都尉左右將譯長各一人北至都䕶治所二千七百二十三里南至戎盧國四日行地阸陿西通扜彌四百六十里師古曰扜音烏戎盧國王治卑品城去長安八千三百里户二百四十口千六百一十勝兵三百人東北至都䕶治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道扜彌國王治扜彌城去長安九千二百八十里户三千三百四十口二萬四十勝兵三千五百四十人輔國侯左右將左右都尉左右騎君各一人譯長二人東北至都䕶治所三千五百五十三里南與渠勒東北與龜兹西北與姑墨接師古曰龜音丘兹音慈西通于闐三百九十里今名寧彌渠勒國王治鞬都城師古曰鞬音居言反去長安九千九百五十里戸三百一十口二千一百七十勝兵三百人東北至都䕶治所三千八百五十二里東與戎盧西與婼羌北與扜彌接于闐國王治西城去長安九千六百七十里戸三千三百口萬九千三百勝兵二千四百人輔國侯左右將左右騎君東西城長譯長各一人東北至都䕶治所三千九百四十七里南與婼羌接北與姑墨接于闐之西水皆西流注西海其東水東流注鹽澤河原出焉蘓林曰即中國河也多玉石師古曰玉之璞也一曰石之似玉也西通皮山三百八十里皮山國王治皮山城去長安萬五十里戸五百口三千五百勝兵五百人左右將左右都尉騎君譯長各一人東北至都䕶治所四千二百九十二里西南至烏秅國千三百四十里鄭氏曰烏秅音鷃拏師古曰烏音一加反秅音直加反急言之聲如鷃拏耳非正音也南與天篤接北至姑墨千四百五十里西南當罽賔烏弋山離道西北通莎車三百八十里烏秅國王治烏秅城劉敞曰秅當作耗去長安九千九百五十里戸四百九十口二千七百三十三勝兵七百四十人東北至都䕶治所四千八百九十二里北與子合蒲犂西與難兠接山居田石間有白草累石爲室民接手飲師古曰自髙山下谿澗中飲水故接連其手如猿之爲出小歩馬孟康曰種小能歩也師古曰此說非也小細也細歩言其能蹀足卽今所謂百歩千跡者也豈謂其小種乎有驢無牛其西則有縣度師古曰縣䋲而度也縣古懸字耳去陽關五千八百八十八里去都䕶治所五千二十里縣度者石山也谿谷不通以繩索相引而度云西夜國王號子合王治呼犍谷師古曰犍音鉅言反去長安萬二百五十里戸三百五十口四千勝兵千人東北到都䕶治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接蒲犂及依耐無雷國師古曰耐音奴代反皆西夜類也西夜與胡異其種類羌氐行國師古曰言不土著也隨畜逐水草徃來而子合土地出玉石蒲犂國王治蒲犂谷去長安九千五百五十里戸六百五十口五千勝兵二千人東北至都䕶治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里候都尉各一人寄田莎車種俗與子合同依耐國王治去長安萬一百五十里戸一百二十五口六百七十勝兵三百五十人東北至都䕶治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接俗相與同師古曰與子合同風俗也少榖寄田疏勒莎車無雷國王治盧城去長安九千九百五十里戸千口七千勝兵三千人東北至都䕶治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氏接師古曰捐毒卽身毒天篤也本皆一名語有輕重耳衣服類烏孫俗與子合同難兠國王治去長安萬一百五十里户五千口三萬一千勝兵八千人東北至都䕶治所二千八百五十里西至無雷三百四十里西南至罽賔三百三十里南與婼羌北與休循西與大月氏接劉奉世曰按婼羌小國最近陽關去長安六千里耳在都䕶之東而此渠勒于闐難兠之類去長安且萬里東北行數千里乃至都䕶安得與婼羌相接必誤種五榖蒲陶諸果有銀銅鐵作兵與諸國同屬罽賔罽賔國王治循鮮城去長安萬二千二百里不屬都䕶戸口勝兵多大國也東北至都䕶治所六千八百四十里東至烏秅國二千二百五十里東北至難兠國九日行西北與大月氏西南與烏弋山離接昔匈奴破大月氏大月氏西君大夏而塞王南君罽賔師古曰君謂爲之君也塞音先得反塞種分散徃徃爲數國師古曰卽所謂釋種者也亦語有輕重耳自疏勒以西北休循捐毒之屬皆故塞種也罽賔地平温和有目宿雜草竒木檀櫰梓竹漆師古曰櫰音懐卽槐之類也葉大而黒也種五穀蒲陶諸果糞治園田地下溼生稲冬食生菜其民巧雕文刻鏤治宫室織罽刺文繡好治食有金銀銅錫以爲器市列師古曰市有列肆亦如中國也以金銀爲錢文爲騎馬幕爲人面張晏曰錢文面作騎馬形漫面作人面目也如淳曰幕音漫師古曰幕卽漫耳無勞借音今所呼幕皮者亦謂其平而無文也出封牛水牛象大狗沐猴孔爵師古曰封牛項上􅂭起者也郭義恭廣志云罽賔大狗大如驢赤色數里搖鞉以呼之沐猴卽彌猴也珠璣珊瑚虎魄璧流離孟康曰流離青色如玉師古曰魏略云大秦國出赤白黒黄青綠縹紺紅紫十種流離孟言青色不博通也此蓋自然之物采澤光􅃳踰於衆玉其色不恒今俗所用皆銷冶石汁加以衆藥灌而爲之尤虚脆不貞實非眞物它畜與諸國同自武帝始通罽賔自以絶遠漢兵不能至其王烏頭勞數剽殺漢使師古曰剽劫也音頻妙反烏頭勞死子代立遣使奉獻漢使關都尉文忠送其使王復欲害忠忠覺之廼與容屈王子隂末赴共合謀攻罽賔殺其王立隂末赴爲罽賔王授印綬後軍候趙徳使罽賔與隂末赴相失師古曰相失意也隂末赴鎻琅當徳師古曰琅當長鎻也若今之禁繫人鎻矣琅音郎殺副已下七十餘人遣使者上書謝}
