  - {type: variant, offset: 3201, length: 339, content: 與音不平語在永傳音既以從舅越親用事小心親職歲餘上下詔曰車騎將軍音宿衛忠正勤勞國家前為御史大夫以外親宜典兵馬入為將軍不獲宰相之封朕甚慊焉其封音為安陽侯食邑與五侯等俱三千戶初成都侯商嘗病欲避暑從上借明光宮後又穿長安城引內灃水注第中大陂以行船立羽蓋張周帷輯濯越歌上幸商第見穿城引水意恨內銜之未言後微行出過曲陽侯第又見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓謝太后上聞之大怒乃使尚書責問司隸校尉京兆尹知成都侯商擅穿帝城決引灃水曲陽侯根驕奢僭上赤墀青瑣紅陽侯立父子臧匿姦猾亡命賓客為群盜司隸京兆皆阿縱不舉奏正法二人頓首省戶下又賜車騎將軍音策書曰外家何甘樂禍敗而欲自黥劓相戮辱於太后前傷慈母之心以危亂國外家宗族彊上一身寖弱日久今將一施之君其召諸侯令待府舍是日詔尚書奏文帝, WYG: ''}
