  - {type: variant, offset: 192, length: 1, content: 石, WYG: 三十里北與烏孫接衣服類烏孫隨水草依葱領本塞種也莎車國王治莎車城去長安九千九百五十里戸二千三百三十九口萬六千三百七十三勝兵三千四十九人輔國侯左右將左右騎君備西夜君各一人都尉二人譯長四人東北至都䕶治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里有鐵山出青玉宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心卽上書請萬年爲莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不說師古曰說讀曰悅莎車王弟呼屠徵殺萬年并殺漢使者自立爲王約諸國背漢㑹衛侯馮奉世使送大宛客卽}
