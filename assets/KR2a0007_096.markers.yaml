  - {type: variant, offset: 332, length: 0, content: '', WYG: 久其大臣皆不欲徙昆莫年老國分不能專制廼發使送騫因獻馬數十匹報謝其使見漢人衆富厚歸其國其國後廼益重漢匈奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛}
