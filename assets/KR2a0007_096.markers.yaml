  - {type: variant, offset: 1111, length: 0, content: '', WYG: 是歲元延二年也㑹宗以翖侯難栖殺末振將雖不指爲漢合於討賊奏以爲堅守都尉責大祿大吏大監以雌栗靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰疐師古曰疐音竹二反本共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵師古曰藉借也兼并兩昆彌兩昆彌畏之親倚都䕶師古曰倚依附也音於綺反哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以爲榮至元始中卑爰疐殺烏日領以自效漢封爲歸義侯兩昆彌皆弱卑爰疐侵陵都䕶孫建襲殺之自烏孫分立兩昆彌後漢用憂勞且無寜歲師古曰言或鎭撫或威制之故多事也姑墨國王治南城去長安八千一百五十里戸三千五百口二萬四千五百勝兵四千五百人姑墨侯輔國侯都尉左右將左右騎君各一人譯長二人東至都護治所二千二十一里宋祁曰監本作千二十里晏本作二千二十里南至于闐馬行十五日北與烏孫接出銅鐡雌黄東通龜兹六百七十里王莽時姑墨王丞殺溫宿王并其國溫宿國王治温宿城師古曰今雍州醴泉縣北有山名温宿領者本因漢時得温宿國人令居此地田牧因以爲名去長安八千三百五十里戸二千二百口八千四百勝兵千五百人輔國侯左右將左右都尉左右騎君譯長各二人東至都䕶治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里土地物類所有與鄯善諸國同東通姑墨二百七十里龜兹國王治延城去長安七千四百八十里戸六千九百七十口八萬一千三百一十七勝兵二萬一千七十六人大都尉丞輔國侯安國侯擊胡侯郤胡都尉擊車師都尉左右將左右都尉左右騎君左右力輔君各一人東西南北部千長各一人郤胡君三人譯長四人南與精絕東南與且末西南與扜彌北與烏孫西與姑墨接師古曰扜音烏能鑄冶有鈆東至都護治所烏壘城三百五十里烏壘戸百一十口千二百勝兵三百人城都尉譯長各一人與都䕶同治其南三百三十里至渠犂渠犂城都尉一人戸百三十口千四百八十勝兵百五十人東北與尉犂東南與且末南與精絕接西有河至龜兹五百八十里自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海内虛耗征和中貳師將軍李廣利以軍降匈奴上旣悔遠征伐而搜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東宋祁曰舊本以東有以字元祐考異及越本無以字當除之㨗枝渠犂皆故國地廣饒水草有漑田五千頃以上處温和田羙可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黄金采繒可以易榖}
