  - {type: variant, offset: 5374, length: 1, content: 位, WYG: 不饗其質政不施焉則君子不臣其遠吾何以𫉬此物也譯曰吾受命國之黄耉曰久矣天之無烈風雨雷也意中國有聖人乎盍往朝之然後歸之王稱先王之神所致以薦宗廟太宗漢文帝也却走馬謂有人獻千里馬不受還之賜道路費也老子徳經曰天下有道郤走馬以糞故賛引也前漢書卷九十六下前漢書卷九十六下考證烏孫國傳元康二年烏孫昆彌}
