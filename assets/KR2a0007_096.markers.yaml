  - {type: variant, offset: 312, length: 0, content: '', krp: 百六十里有市列西當大月氏大宛康居道也尉頭國王治尉頭谷去長安八千六百五十里戸三百口二千三百勝兵八百人左右都尉各一人左右騎君各一人東至都䕶治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日田畜隨水草衣服類烏孫前漢書卷九十六上前漢書卷九十六上考證西域傳本三十六國臣召南按荀悅漢紀列三十六國名目王應麟謂傳旣言三十六國皆在匈奴之西烏孫之南則烏孫不與矣又康居大月氏安息罽賔烏弋之屬皆以絶遠不在數中難兠屬罽賔亦不在數中大率祗就屬都䕶者計之也漢使西域者益得職注師古曰賞其勤勞皆得拜職也胡三省曰顔說非也此言漢使入西域諸國不敢輕忽爲得其職耳得職者不失其職也是歲神爵三}
  - {type: punctuation, offset: 313, content: ，, id: KR2a0007_tls_096-bkkpn70}
  - {type: 'tls:seg', offset: 313, content: '', id: KR2a0007_tls_096-3a.15}
  - {type: variant, offset: 313, length: 0, content: '', WYG: 也臣召南按宣紀是神爵二年事此三字訛通鑑考異已辨之矣都䕶治烏壘城宋白曰伊州伊吾郡漢伊吾盧地宣帝時鄭吉爲西域都䕶治烏壘城卽此臣召南按本傳言烏壘城去陽關二千七百三十八里而車師國西南至都䕶治所千八百七里龜兹國東至都䕶治所三百五十里則烏壘尚在車師西南與龜兹相近非伊州伊吾地在車師之東者也伊吾地卽今哈密城後漢永平中始置}
  - {type: page-break, offset: 313, content: '', id: KR2a0007_WYG_096-27a, image: WYG0251/WYG0251-0163c.png}
  - {type: variant, offset: 313, length: 0, content: '', krp: 也臣召南按宣紀是神爵二年事此三字訛通鑑考異已辨之矣都䕶治烏壘城宋白曰伊州伊吾郡漢伊吾盧地宣帝時鄭吉爲西域都䕶治烏壘城卽此臣召南按本傳言烏壘城去陽關二千七百三十八里而車師國西南至都䕶治所千八百七里龜兹國東至都䕶治所三百五十里則烏壘尚在車師西南與龜兹相近非伊州伊吾地在車師之東者也伊吾地卽今哈密城後漢永平中始置}
  - {type: variant, offset: 314, length: 0, content: '', WYG: 禾都尉在前漢未聞其名宋白說非也扜彌國傳今名寧彌按此孟堅自据作史時言也後書曰拘彌國王居寧彌城西夜國傳西夜國王號子合王臣召南按西夜與子合是二國後書云西夜國一名漂沙漢書誤云西夜子合是一國子合國居呼犍谷此則紏漢書之違也無雷國傳北與捐毒西與大月氏接注師古曰􅂢毒卽身毒天篤也臣召南按天篤卽天竺也下文罽賔傳曰塞種分散徃徃爲數國師古曰塞種卽所謂釋種者也蓋卽浮屠氏國其種分散遍於諸國故又云自䟽勒以西北休循捐毒之屬皆故塞種後書傳之天竺卽此傳之捐毒而後世又曰印度國也烏弋山離國傳行可百餘日乃至條支國臨西海臣召南按後漢班超遣掾甘英窮臨西海而還蓋前漢使者但至烏弋莫}
  - {type: page-break, offset: 314, content: '', id: KR2a0007_WYG_096-27b, image: WYG0251/WYG0251-0163d.png}
  - {type: page-break, offset: 314, content: '', id: KR2a0007_WYG_096-28a, image: WYG0251/WYG0251-0164a.png}
