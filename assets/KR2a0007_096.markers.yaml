  - {type: variant, offset: 1753, length: 177, content: 在京師會日蝕鳳因言日蝕陰盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國上不得已於鳳而許之共王辭去上與相對涕泣而決京兆尹王章素剛直敢言以為鳳建遣共王之國非是乃奏封事言日蝕之咎矣天子召見章延問以事章對曰天道聰明佑善而災惡以瑞異為符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正義善事當有祥瑞何故致災異災異之發為大, WYG: 降服}
