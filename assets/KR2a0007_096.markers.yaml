  - {type: variant, offset: 5324, length: 0, content: '', WYG: 是之後明珠文甲通犀翠羽之珍盈於後宮如淳曰文甲即瑇􅈘也通犀中央色白通兩頭蒲梢龍文魚目汗血之馬充於黄門孟康曰四駿馬名也師古曰梢馬音所交反鉅象師子猛犬大雀之羣食於外囿師古曰鉅亦大殊方異物四靣而至於是廣開上林穿昆明池營千門萬戸之宮}
  - {type: variant, offset: 5324, length: 0, content: '', krp: 是之後明珠文甲通犀翠羽之珍盈於後宮如淳曰文甲即瑇瑁也通犀中央色白通兩頭蒲梢龍文魚目汗血之馬充於黄門孟康曰四駿馬名也師古曰梢馬音所交反鉅象師子猛犬大雀之羣食於外囿師古曰鉅亦大殊方異物四靣而至於是廣開上林穿昆明池營千門萬戸之宮}
  - {type: variant, offset: 5325, length: 0, content: '', WYG: 神明通天之臺興造甲乙之帳師古曰其數非一以甲乙次第名之也落以隨珠和璧師古曰落與絡同天子負黼依襲翠被馮玉几而處其中師古曰依讀曰扆扆如小屏風而畫}
