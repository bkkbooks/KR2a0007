  - {type: variant, offset: 64, length: 10, content: 完完字敬仲犇齊齊桓公, WYG: 事然烏孫旣結在前今與匈奴俱稱臣義不可距而康居驕黠訖不肯拜使者師古曰訖竟也都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲㗖都䕶吏師古曰飲音於禁反㗖音徒濫反故爲無所省}
