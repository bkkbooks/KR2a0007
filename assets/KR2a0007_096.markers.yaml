  - {type: variant, offset: 321, length: 2, content: 乎今, WYG: 作種樹師古曰樹殖也隨畜逐水草與匈奴同俗國多馬富人至四五千匹民剛惡貪狠無信多寇盗最為彊國故服匈奴師古曰故謂舊時也服屬於匈奴也後盛大取羈屬不肯往朝㑹師古曰言纔羈縻屬之而已東與匈奴西北與康居西與大宛南與城郭諸國相接本塞地也大月氏西破走塞}
