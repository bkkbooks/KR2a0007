  - {type: variant, offset: 6, length: 0, content: '', WYG: 六上師古曰自烏孫國已後分爲下卷西域以孝武時始通本三十六國其後稍分至五十餘師古曰司馬虎續漢書云至于哀平有五十五國也皆在匈奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢阸以玊門陽關孟康曰二關皆在敦煌西界師古曰阸塞也西則限以葱嶺師古曰西河舊事云葱嶺其山髙大上悉生葱故以名焉其南山東出金城與漢南山屬焉師古曰屬聨也音之欲反其河有兩原一出葱嶺山一出于闐師古曰闐字與窴同音徒賢反又徒見反于闐在南山下其河北流與葱嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里師古曰袤長也音茂其水亭居冬夏不增減皆以爲潛行地下南出於積石爲中國河云自玉門陽關出西域有兩道從鄯善傍南山北波河西行至莎車爲南道師古曰波河循河也鄯音上扇反傍音歩浪反波音彼義反此下皆同也南道西踰葱嶺則出大月氏安息師古曰氏音支自車師前王庭隨北山波河西行至疏勒爲北道北道西踰葱嶺則出大宛康居奄蔡焉耆西域諸國大率土著師古曰言著土地而有常居不隨畜牧移徙也著音直略反有城郭田畜與匈奴烏孫異俗故皆役屬匈奴師古曰服屬於匈奴爲其所役使也匈奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉黎間賦稅諸國取富給焉師古曰給足也自周衰戎狄錯居涇渭之北師古曰錯雜也及秦始皇攘郤戎狄築長城界中國師古曰爲中國之境界也然西不過臨洮師古曰洮音土髙反漢興至于孝武事征四夷廣威徳而張騫始開西域之迹其後票騎將軍撃破匈奴右地降渾邪休屠王師古曰屠音除遂空其地始築令居以西師古曰令音鈴宋祁曰集韻令音連云令居縣名在金城郡初置酒泉郡後稍發徙民􅂶實之分置武威張掖敦煌師古曰敦音徒門反列四郡據兩關焉自貳師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職師古曰賞其勤勞皆得拜職也於是自敦煌西至鹽澤徃徃起亭而輪臺渠犂皆有田卒數百人置使者校尉領䕶師古曰綂領保䕶營田之事也以給使外國者師古曰收其所種五榖以供之至宣帝時遣衛司馬使䕶鄯善以西數國及破姑師未盡殄師古曰雖破其國未能滅之分以爲車師前後王及山北六國時漢獨䕶南道未能盡并北道也然匈奴不自安矣其後日逐王畔單于將衆來降䕶鄯善以西使者鄭吉迎之旣至漢封日逐王爲歸徳侯吉爲安遠侯是歲神爵三年也乃因使吉并䕶北道故號曰都䕶都䕶之起自吉置也師古曰都猶總也言總䕶南北之道僮僕都尉由此罷匈奴益弱不得近西域於是徙屯田田於北胥鞬師古曰胥鞬地名也胥音先餘反鞬音居言反披莎車之地師古曰披分也屯田校尉始屬都䕶都䕶督察烏孫康居諸外國師古曰督視也動静有變以聞可安輯安輯之可撃撃之師古曰輯與集同都䕶治烏壘城宋祁曰烏壘下監本有孫字去陽關二千七百三十}
