  - {type: variant, offset: 699, length: 3, content: 微令旁, WYG: 至敦煌遣使者案行表穿卑鞮侯井以面孟康曰大井六通渠也下流湧出在白龍堆東土山下宋祁曰面當作西欲通渠轉穀積居廬倉以討之初楚主侍者馮嫽師古曰音了嫽者慧也故以爲名能史書習事嘗持漢節爲公主使行賞賜於城郭諸國敬信之號曰馮夫人爲烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人說烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號宣帝徴馮夫人自問狀遣謁者竺次期門甘延壽爲副送馮夫人馮夫人錦車持節服䖍曰錦車以錦衣車也詔烏就屠詣}
