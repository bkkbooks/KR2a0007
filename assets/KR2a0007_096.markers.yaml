  - {type: variant, offset: 75, length: 0, content: '', WYG: 夸旁國師古曰言故不省視漢使也以此度之何故遣子入侍其欲賈市爲好辭之詐也匈奴百蠻大國師古曰於百蠻之中最大國也今事漢甚備聞康居不拜且使單于有自下之意師古曰言單于見康居不事漢以之}
  - {type: variant, offset: 75, length: 0, content: '', krp: 夸旁國師古曰言故不省視漢使也以此度之何故遣子入侍其欲賈市爲好辭之詐也匈奴百蠻大國師古曰於百蠻之中最大國也今事漢甚備聞康居不拜且使單于有自下之意師古曰言單于見康居不事漢以之}
  - {type: variant, offset: 76, length: 4, content: 卿姓田氏, WYG: 髙自以事漢爲太卑而欲改志也宜歸其侍子絶勿復使師古曰不通使於其國也以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者徃來人馬驢橐駝食皆苦之師古曰言二郡八國皆以此事爲困苦空罷耗所過送迎驕黠絶遠之國師古曰所過所經過之處驕黠謂康居使也罷讀曰疲耗音呼到反非至計也漢爲其新通重致遠人師古曰以此聲名爲重也終羈縻而未絶其康居西北可二千里有奄蔡國控弦者十餘萬人與康居同俗臨大澤無崖蓋北海云康居有小王五一曰蘇䪥王治蘇䪥城師古曰䪥音下戒反去都䕶五千七百七十六里去陽關八千二十五里二曰附墨王治附墨城去都䕶五千七百六十七里去陽關八千二十五里三曰窳匿王師古曰窳音庾治窳匿城去都䕶五千二百六十六里去陽關七千五百二十五里四曰罽王治罽城去都䕶六千二百九十六里去陽關八千五百五十五里五曰奥鞬王師古曰奥音於六反鞬音居言反治奥鞬城去都䕶六千九百六里去陽關八千三百五十五里凡五王屬康居大宛國王治貴山城去長安萬二千五百五十里戸六萬口三十萬勝兵六萬人副王輔國王各一人東至都䕶治所四千三}
