  - {type: variant, offset: 5489, length: 722, content: 餘天下豈有而兄弟邪且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久乃仰謂太后臣等已無可言者莽必欲得傳國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之乃出漢傳國璽投之地以授舜曰我老已死如而兄弟今族滅也舜既得傳國璽奏之莽大說乃為太后置酒未央宮漸臺大縱眾樂莽又欲改太后漢家舊號易其璽綬恐不見聽而莽疏屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命莽乃車駕至東宮親以其書白太后太后曰此言是也莽因曰此誖德之臣也罪當誅於是冠軍張永獻符命銅璧文言太皇太后當為新室文母太皇太后莽乃下詔曰予視群公咸曰休哉其文字非刻非畫厥性自然予伏念皇天命予為子更命太皇太后為新室文母太皇太后協于新故交代之際信於漢氏哀帝之代世傳行詔籌為西王母共具之祥當為歷代母昭然著明予祗畏天命敢不欽承謹以令月吉日親率群公諸侯卿士奉上皇太后璽紱以當順天心光于四海焉太后聽許莽於是鳩殺王諫而封張永為貢符子初莽為安漢公時又諂太后奏尊元帝廟為高宗太后晏駕後當以禮配食云及莽改號太后為新室文母絕之於漢不令得體元帝墮壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母篹食堂既成名曰長壽宮以太后在故未謂之廟莽以太后好出遊觀乃車駕置酒長壽宮請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人嫚神多矣能久得祐乎飲酒不樂而罷自莽篡位後知太后怨恨求所以媚太后無不為然愈不說莽更漢家黑貂著黃貂又改漢正朔伏臘日太后令其官屬黑貂至漢家正臘日獨與其左右相對飲酒食太后年八十四建國五年二月癸丑崩, WYG: 城}
