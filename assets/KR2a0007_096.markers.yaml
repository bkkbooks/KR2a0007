  - {type: variant, offset: 16, length: 1, content: 莽, WYG: 狻音酸猊音倪拔音歩葛反耏亦頰旁毛也音而茸音人庸反俗重妄殺師古曰重難也言其仁愛不妄殺也其錢獨文爲人頭幕爲騎馬以金銀飾杖師古曰杖謂所持􅄊也音直亮反絶遠漢使希至}
  - {type: variant, offset: 16, length: 1, content: 莽, krp: 狻音酸猊音倪拔音歩葛反耏亦頰旁毛也音而茸音人庸反俗重妄殺師古曰重難也言其仁愛不妄殺也其錢獨文爲人頭幕爲騎馬以金銀飾杖師古曰杖謂所持器也音直亮反絶遠漢使希至}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 玉門陽關出南道歴鄯善而南行至烏弋山離南道極矣轉北而東得安息安息國王治番兠城蘇林曰番音盤去長安萬一千六百里不屬都䕶北與康居東與烏弋山離西與條支接土地風氣物類所有民俗與烏弋罽賔同亦以銀爲錢文獨爲王面幕爲夫人面王死輙更鑄錢有大馬爵師古曰廣志云大爵頸及膺身蹄似槖駝色蒼舉頭髙八九尺張翅丈餘食大麥宋祁曰注文張翅下當有舉字其屬小大數百城地方數千里最大國也臨嬀水商賈車船行旁國書革旁行爲書記服䖍曰横行爲書記也師古曰今西方胡國及南方林邑之徒書皆横行不直下也革}
