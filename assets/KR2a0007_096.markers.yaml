  - {type: variant, offset: 3699, length: 418, content: 特進領城門兵置幕府得舉吏如將軍杜鄴說車騎將軍音令親附商語在鄴傳王氏爵位日盛唯音為修整數諫正有忠節輔政八年薨弔贈如大將軍諡曰敬侯子舜嗣侯為太僕侍中特進成都侯商代音為大司馬衛將軍而紅陽侯立位特進領城門兵商輔政四歲病乞骸骨天子憫之更以為大將軍益封二千戶賜錢百萬商薨弔贈如大將軍故事諡曰景成侯子況嗣侯紅陽侯立次當輔政有罪過語在孫寶傳上乃廢立而用光祿勳曲陽侯根為大司馬票騎將軍歲餘益封千七百戶高平侯逢時無材能名稱是歲薨諡曰戴侯子買之嗣侯綏和元年上即位二十餘年無繼嗣而定陶共王已薨子嗣立為王王祖母定陶傅太后重賂遺票騎將軍根為王求漢嗣根為言上亦欲立之遂徵定陶王為太子時根輔政五歲矣乞骸骨上乃益封根五千戶賜安車駟馬黃金五百斤罷就第先是定陵侯淳于長以外屬能謀議為衛尉侍中在輔政之次是歲新都侯莽告長伏罪與紅陽侯立相連長下獄死立就國語在長傳故曲陽侯根薦莽以自代上亦以為莽有忠直節遂擢莽從侍中騎都尉光祿大夫為大司馬歲餘成帝崩哀帝即位太后詔莽就第避帝外家哀帝初優, WYG: 聞}
