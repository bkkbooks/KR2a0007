  - {type: variant, offset: 62, length: 1, content: 世, WYG: 里凡五翖侯皆屬大月氏康居國王冬治樂越匿地師古曰樂音來各反到卑闐城師古曰闐音徒干反去長安萬二千三百里不屬都䕶至越匿地馬行七日至王夏所居蕃内九千一百四里師古曰王每冬寒夏暑則徙别居不一處戸十二萬口六十萬勝兵十二萬人東至都䕶治所五千五百五十里與大月氏同俗東羈事匈奴師古曰爲匈奴所羈牽也宣帝時匈奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居師古曰依其險阻以自保固也其後都䕶甘延壽副校尉陳湯發戊巳校尉西域諸國兵至康居誅滅郅支單于語在甘延壽陳湯傳是歲元帝建昭三年也至成帝時康居遣子侍漢貢獻然自以絶遠獨驕嫚不肯與諸國相望都䕶郭舜數上言夲匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國内相輸遺交通如故亦相候伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反爲中國}
  - {type: page-break, offset: 62, content: '', id: KR2a0007_WYG_096-19b, image: WYG0251/WYG0251-0159d.png}
