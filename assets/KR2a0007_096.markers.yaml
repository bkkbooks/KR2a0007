  - {type: variant, offset: 5320, length: 0, content: '', WYG: 絕匈奴大擊北邉而西域亦瓦解焉耆國近匈奴先叛殺都䕶但欽莽不能討天鳳三年廼遣五威將王駿西域都䕶李崇將戊已校尉出西域諸國皆郊迎送兵榖焉耆詐降而聚兵自備駿等將莎車龜兹兵七千餘人分爲數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國兵爲反間還共襲繫駿等皆殺之唯戊已校尉郭欽别將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽爲剼胡子鄧展曰剼音衫師古曰剼絕也音子小反字本作劋轉寫誤耳李崇收餘士還保龜兹數年莽死崇遂沒西域因絕最凡國五十自譯長城長君監吏大祿百長千長都尉且渠當戸將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賔烏弋之屬皆}
