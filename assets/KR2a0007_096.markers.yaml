  - {type: variant, offset: 1540, length: 0, content: '', WYG: 然不能饑渴師古曰能音耐失一狼走千羊廼者貳師敗軍士死略離散師古曰言死及被虜略并自離散也悲痛常在朕心今請遠田輪臺欲起亭隧師古曰隧者依深險之處開通行道也是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封侯之賞以報忿五伯所弗能爲也師古曰伯讀曰覇五覇尚耻不爲況今大漢也且匈奴得漢降者常提掖搜索問以所聞師古曰搜索者恐其或私齎文書也今邉塞未正闌出不禁障候長吏使卒獵獸以皮肉爲利卒苦而㷭火乏失亦上集不得師古曰言邉塞有闌出逃亡之人而主者不禁又長吏利於皮肉多使障候之卒獵獸故今㷭火有乏又其人勞苦因致奔亡凡有此失皆不集於所上文書後降者來若捕生口虜廼知之師古曰旣不上書所以當時不知至有降者來及捕生口或虜得匈奴人言之乃知此事當今務在禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已孟康曰先是令長吏各以秩養馬亭有牝馬民養馬皆復不事後馬多絕乏至此復修之也師古曰此說非也馬復因養馬以免徭賦也復音方目反宋祁曰注文牝應作牡郡國二千石各上進畜馬方略補邉狀與計對師古曰與上計者同來赴對也由是不復出軍而封丞相車千秋爲富民侯以明休息思富養民也初貳師}
