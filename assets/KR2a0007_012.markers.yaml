  - {type: variant, offset: 925, length: 0, content: '', WYG: 如淳曰已論者罪已定也令甲女子犯罪作如徒六月顧山遣歸說以為當於山伐木聴使入錢顧功直故謂之顧山應劭曰舊刑鬼薪取薪於山以給宗廟今使女徒出錢顧薪故曰顧山也師古曰如說近之謂女徒論罪已定並放歸家不親役之但令一月出錢三百以顧人也為此㤙者所以行太皇太后之徳施恵政於婦人}
