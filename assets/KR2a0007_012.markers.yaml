  - {type: variant, offset: 424, length: 0, content: '', WYG: 如淳曰諸官吏初除皆試守一嵗廼為真食全奉平帝即位故賜真師古曰此說非也時諸官有試守者特加非常之㤙令如真耳非凡除吏皆當試守也一切者權時之事非經常也猶如以刀切物茍取整齊不顧長短縦横故言一切他皆放此劉攽曰予謂吏俸雖有其名皆不滿其數平帝即位推㤙故賜令滿秩如二千石者得兩十百也顔百官表注吏俸差是其注云漢制三公稱萬石其俸月各三百五十斛榖其稱中二千石者月百八十斛二千石者百二十斛比二千石者百斛云云據後漢注所定千石以下嵗得多少本數此自建武時所加者非西漢舊事也}
