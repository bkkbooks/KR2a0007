  - {type: variant, offset: 2462, length: 0, content: '', WYG: 如淳曰不可復文飾也前漢書卷十二前漢書卷十二考證平帝紀故桃鄊頃侯子成都為中山王胡三省曰平帝入奉大宗故立成都以奉孝王後臣召南按成帝立定陶王為太子即立楚孝王孫景奉定陶恭王祀即此事所本也封宣帝耳孫信等三十六人皆為列侯通鑑考異曰紀在元年莽𫝊在五年按王子侯表皆以元年二月丙辰封莽𫝊誤也胡三省曰按表陶鄉侯恢等十五人皆以二月丙辰封不及三十六人之數又無信名蓋恢等皆宣帝曾孫也罷安定呼池苑以為安民縣臣召南按志中山國無安民縣何也置西海郡臣召南按莽所置西海郡在金城郡臨羗縣塞外西北地理志可証西海曰僊海亦曰鮮水海即今青海也分京師置前輝光後丞烈二郡胡三省曰前輝光蓋領長安以南諸縣後丞烈蓋領長安以北諸縣也前漢書卷十二考證}
