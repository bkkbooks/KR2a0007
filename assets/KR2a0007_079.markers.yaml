  - {type: variant, offset: 2368, length: 1, content: 在, WYG: 出必有偏裨所以揚威武參計䇿將軍又何疑焉夫愛吏士得衆心舉而無悔禽敵必全將軍之職也若乃轉輸之費則有司存將軍勿憂須奮武将軍兵到合擊羌虜師古曰須待也十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人拜定襄太守韓安國為建威將軍師古曰自别有此安國非武帝時人也未進聞羌破還上曰羌虜破散創艾亡逃出塞師古曰創艾謂懲懼也創音初向反艾讀曰乂其罷吏士頗留屯田備要害處明年二月奉世還京師更為左將軍光祿勳如}
