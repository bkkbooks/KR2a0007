  - {type: variant, offset: 3071, length: 503, content: 王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪將動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能處也元年九月黑龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與群惡沈湎於酒書曰乃用婦人之言自絕于天四方之逋逃多罪是宗是長是信是使詩云燎之方陽寧或滅之赫赫宗周襃姒滅之易曰濡其首有孚失是秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效易曰在中餽無攸遂言婦人不得與事也詩曰懿厥悊婦為梟為鴟匪降自天生自婦人建始河平之際許班之貴頃動前朝熏灼四方賞賜無量空虛內臧女寵至極不可上矣今之後起天所不饗什倍於前廢先帝法度聽用其言官秩不當縱釋王誅驕其親屬假之威權從橫亂政刺舉之吏莫敢奉憲又以掖庭獄大為亂阱榜箠㿊於炮格絕滅人命主為趙李報德復怨反除白罪建治正吏多繫無辜掠立迫恐至為人起責分利受謝坐入死出者不可勝數是以日食再既以昭其辜王者必先自絕然后天絕之陛下棄萬乘之至貴樂家人之賤事厭高美之尊號好匹夫之卑字崇聚僄輕無義小人以為私客數離深宮之固挺身晨夜與群小相隨烏集雜會飲醉吏民之家亂服共坐流湎媟嫚溷殽無別閔免遁樂晝夜在路典, WYG: 黄}
