  - {type: variant, offset: 15, length: 0, content: '', WYG: 諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得其}
  - {type: variant, offset: 15, length: 0, content: '', krp: 諸國悉平威振西域奉世乃罷兵以聞宣帝召見韓増曰賀將軍所舉得其}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還師古曰言馬形似龍者劉攽曰此馬名曰象龍}
