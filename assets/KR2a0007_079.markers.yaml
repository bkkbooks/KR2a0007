  - {type: variant, offset: 12, length: 1, content: 雲, WYG: 明上黨潞人也師古曰潞音路徙杜陵其先馮亭為韓上黨守秦攻上黨絶太行道師古曰太行山名險道所經行也行音胡郎反宋祁曰注文經行疑當刪行字韓不能守馮亭乃入上黨城守於趙師古曰據守上黨城而以降趙趙封馮亭為華陽君與趙將括距秦師古曰括趙括趙奢之子也戰死於長平宗族繇是分散師古曰繇讀與由同或留潞或在趙在趙者為官帥將師古曰帥音所類反字或作師其義兩通官帥將子為代相及秦滅六國而馮亭之後馮毋擇馮去疾馮劫皆為秦將相焉漢興文帝時馮唐顯名即代相子也至武帝末奉世以良家子選為郎昭帝時以功次補武安長失官年三十餘矣乃學春秋渉大義讀兵法宋祁曰浙夲兵法下有明習二字前將軍韓增奏以為軍司空令本始中從軍擊匈奴軍罷復為郎先是時漢數出使西域多辱命不稱或貪汙為外國所苦師古曰苦謂困辱之是時烏孫大有擊匈奴之功而西域諸國新輯師古曰輯與集同集和也漢方善遇欲以安之選可使外國者前將軍增舉奉世以衛候使持節送大宛諸國客至伊修城師古曰伊修城在鄯善國漢於其中置屯田吏士也都尉宋將言莎車與旁國共攻殺漢所置莎車王萬年師古曰莎車國名萬年其王名也莎音素和反宋祁曰宋字疑是宗字并殺漢使者奚充國時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻劫南道與㰱盟畔漢從鄯善以西皆絶不通師古曰鄯音善都護鄭吉校尉司馬意皆在北道諸國間奉世與其副嚴昌計以為不亟擊之師古曰亟急也音居力反則莎車日彊其埶難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進撃莎車攻㧞其城莎車王自殺傳其首詣}
