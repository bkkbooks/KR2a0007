  - {type: variant, offset: 4930, length: 1527, content: 常經百王之所同也加以功德有厚薄期質有修短時世有中季天道有盛衰陛下承八世之功業當陽數之標季涉三七之節紀遭无妄之卦運直百六之災阸三難異科雜焉同會建始元年以來二十載間群災大異交錯鋒起多於春秋所書八世著記久不塞除重以今年正月己亥朔日有食之三朝之會四月丁酉四方眾星白晝流隕七月辛未彗星橫天乘三難之際會畜眾多之災異因之以饑饉接之以不贍彗星極異也土精所生流隕之應出於飢變之後兵亂作矣厥期不久隆德積善懼不克濟內則為深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗北宮苑囿街巷之中臣妾之家幽閒之處徵舒崔杼之亂外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍內亂朝暮日戒諸夏舉兵以火角為期安危之分界宗廟之至憂臣永所以破膽寒心豫言之累年下有其萌然後變見於上可不致慎禍起細微姦生所易願陛下正君臣之義無復與群小媟黷燕飲中黃門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留勤三綱之嚴修後宮之政抑遠驕妒之寵崇近婉順之行加惠失志之人懷柔怨恨之心保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除內亂之路塞矣諸夏舉兵萌在民饑饉而吏不卹興於百姓困而賦斂重發於下怨離而上不知易曰屯其膏小貞吉大貞凶傳曰飢而不損茲謂泰厥災水厥咎亡訞辭曰關動牡飛辟為無道臣為非厥咎亂臣謀篡王者遭衰難之世有飢饉之災不損用而大自潤故凶百姓困貧無以共求愁悲怨恨故水城關守國之固固將去焉故牡飛往年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水泛濫郡國十五有餘此年喪稼時過無宿麥百姓失業流散群輩守關大異較炳如彼水災浩浩黎庶窮困如此宜損常稅小自潤之時而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之狀殆為此發古者穀不登虧膳災婁至損服凶年不塈塗明王之制也詩云凡民有喪扶服捄之論語曰百姓不足君孰予足臣願陛下勿許加賦之奏益減大官導官中御府均官掌畜廩犧用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏開關梁內流民恣所欲之以救其急立春遣使者循行風俗宣布聖德存卹孤寡問民所苦勞二千石敕勸耕桑毋奪農時以慰綏元元之心防塞大姦之隙諸夏之亂庶幾可息臣聞上主可與為善而不可與為惡下主可與為惡而不可與為善陛下天然之性疏通聰敏上主之姿也少省愚臣之言感寤三難深畏大異定心為善捐忘邪志毋貳舊愆厲精致政至誠應天則積異塞於上禍亂伏於下何憂患之有竊恐陛下公志未專私好頗存尚愛群小不肯為耳對奏天子甚感其言永於經書汎為疏達與杜欽杜鄴略等不能洽浹如劉向父子及揚雄也其於天官京氏易最密故善言災異前後所上四十餘事略相反覆專攻上身與後宮而已黨於王氏上亦知之不甚親信也永所居任職為北地太守歲餘衛將軍商薨曲陽侯根為票騎將軍薦永徵入為大司農歲餘永病三月有司奏請免故事公卿病輒賜告至永獨即時免數月卒於家本名並以尉氏樊並反更名永云杜鄴字子夏本魏郡繁陽人也祖父及父積功勞皆至郡守武帝時徙茂陵鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝廉為郎與車騎將軍王音善平阿侯譚不受城門職後薨上閔悔之乃復令譚弟成都侯商位特進領城門兵得舉吏如將軍府鄴見音前與平阿有隙即說音曰鄴聞人情恩深者其養謹愛至者其求詳夫戚而不見殊孰能無怨此棠棣角弓之詩所為作也昔秦伯有千乘之國而不能容其母弟春秋亦書而譏焉周召則不然忠以相輔義以相匡同己之親等已之尊不以聖德獨兼國寵又不為長專受榮任分職於陝並為弼疑故內無感恨之隙外無侵侮之羞俱享天祐兩荷高名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也將軍宜承順聖意加異往時每事凡議必與及之指為誠發出於將軍則孰敢不說諭昔文侯寤大鴈之獻而父子益親陳平共壹飯之籑而將相加驩所接雖在楹階俎豆之間其於為國折衝厭難豈不遠哉竊慕倉唐陸子之義所白奧內唯深察焉音甚嘉其言由是與成都侯商親密二人皆重鄴後以病去郎商為大司馬衛將軍除鄴主簿以為腹心舉侍御史, WYG: ''}
