  - {type: variant, offset: 17, length: 2, content: 父吉, WYG: 上甚説師古曰説讀曰恱下議封奉世師古曰下其事令議之丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也師古曰顓與專同奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指師古曰本}
  - {type: variant, offset: 17, length: 2, content: 父吉, krp: 上甚説師古曰説讀曰恱下議封奉世師古曰下其事令議之丞相將軍皆曰春秋之義大夫出疆有可以安國家則顓之可也師古曰顓與專同奉世功效尤著宜加爵土之賞少府蕭望之獨以奉世奉使有指師古曰本}
