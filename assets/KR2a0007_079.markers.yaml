  - {type: variant, offset: 2872, length: 198, content: 問永受所欲言永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輒上聞則商周不易姓而迭興三正不變改而更用夏商之將亡也行道之人皆知之晏然自以若天有日莫能危是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也陛下誠垂寬明之聽無忌諱之誅使芻蕘之臣得盡所聞於前不懼於後患直言之路開則四方眾賢不遠千里輻湊陳忠群臣之上願社稷之長福也漢家行夏正夏正色黑黑龍同姓之象也龍陽德由小之大故, WYG: 少}
