  - {type: variant, offset: 20, length: 3, content: 衛司馬, WYG: 送諸國客而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉}
  - {type: variant, offset: 20, length: 3, content: 衛司馬, krp: 送諸國客而擅矯制違命發諸國兵雖有功效不可以為後法即封奉世開後奉}
