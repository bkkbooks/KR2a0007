  - {type: variant, offset: 6664, length: 5, content: 是以男雖賤, WYG: 鞠音居六反宋祁曰注中鞠躬當云鞠躬曲躬也可謂淑人君子然卒死於非罪不能自免師古曰卒終也哀哉讒邪交亂貞良被害自古而然故伯竒放流師古曰説苑云王國子前母子伯竒後母子伯封兄弟相重後母欲令其子立為太子乃譖伯竒而王信之乃放伯竒也宋祁曰注文重字當作愛字孟子宫刑張晏曰寺人孟子賢者被讒見宫刑作巷伯之詩也申生雉經師古曰國語云晉獻公黜太子申生乃雉經于新城之廟盖為俛頸閉氣而死若雉之為屈原赴湘師古曰楚辭漁父之篇云屈原曰寧赴湘流葬於江魚腹中也小弁之詩作離騷之辭興師古曰小弁小雅篇名也太子之傅作焉刺幽王信讒黜申后而放太子宜咎也離騷經屈原所作也離遭也騷憂也遭憂而作辭弁音盤經曰心之憂矣涕既隕之師古曰即小弁之詩也隕墜也馮參姊弟亦云悲矣前漢書卷七十九前漢書卷七十九考證馮奉世傳至伊修城注師古曰伊修城在鄯善國云云臣召南按伊修城當作伊循城}
