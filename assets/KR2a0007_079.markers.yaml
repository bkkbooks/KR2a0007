  - {type: variant, offset: 6743, length: 224, content: 興呂太后權私親屬又以外孫為孝惠后是時繼嗣不明凡事多晻晝昏冬雷之變不可勝載竊見陛下行不偏之政每事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌傳相驚恐案春秋災異以指象為言語故在於得一類而達之也日食明陽為陰所臨坤卦乘離明夷之象也坤以法地為土為母以安靜為德震不陰之效也占象甚明臣敢不直言其事昔曾子問從令之義孔子曰是何言與善閔子騫守禮不苟從親所行無非理者故無可間也前大司馬新都侯莽退伏弟家以詔策決復遣就國高昌侯宏去蕃自絕猶受封土制書侍中駙馬, WYG: 置}
