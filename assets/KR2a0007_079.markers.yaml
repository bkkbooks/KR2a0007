  - {type: variant, offset: 2374, length: 0, content: '', WYG: 之法有矯制師古曰無遂事者謂臨時制宜前事不可必遂也漢家之法擅矯詔命雖有功勞不加賞也宋祁曰師古誤注遂事可駮故}
