  - {type: variant, offset: 2316, length: 1, content: 尚, WYG: 兵屯田不言討賊宋祁曰萬二千人浙江本無人字注文屯田字上疑有為字典屬國任立護軍都尉韓昌為偏裨到隴西分屯三處典屬國為右軍屯白石護軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上如淳曰西極山名前軍到降同阪師古曰阪平陂也降同者阪名也阪府板反降音下江反陂音普何反宋祁曰注文府字上當有音字先遣校尉在前與羌爭地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事}
