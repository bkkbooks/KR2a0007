  - {type: variant, offset: 2370, length: 2, content: 抑鬱, WYG: 其後錄功拜爵下詔曰羌虜桀黠賊害吏民攻隴西府寺燔燒置亭師古曰置謂置驛之所也絶道橋甚逆天道左將軍光祿勳奉世前將兵征討斬捕首虜八千餘級鹵馬牛羊以萬數賜奉世爵關内侯食邑五百户黄金六十斤裨將校尉三十餘人皆拜後嵗餘奉世病卒居爪牙官前後十年為折衝宿將功名次趙充國奮武將軍任千秋者其父宫昭帝時以丞相徵事捕斬反者左將軍上官桀封侯宣帝時為太常薨千秋嗣後宋祁曰後疑作侯復為太常成帝時樂昌侯王商代奉世為左將軍而千秋為右將軍後亦為左將軍子孫傳國至王莽乃絶云奉世死後二年西域都護甘延夀以誅郅支單于封為列侯時丞相匡衡亦用延夀矯制生事據蕭望之前議以為不當封而議者咸羙其功上從衆而侯之}
  - {type: page-break, offset: 2370, content: '', id: KR2a0007_WYG_079-8a, image: WYG0250/WYG0250-0623c.png}
