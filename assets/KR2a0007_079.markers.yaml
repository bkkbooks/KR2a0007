  - {type: variant, offset: 2315, length: 0, content: '', WYG: 王接左將軍許嘉右將軍奉世入議是時嵗比不登師古曰比頻也登成也京師榖石二百餘師古曰一石直二百餘錢也下皆類此邊郡四百關東五百四方飢饉朝庭宋祁曰庭當作廷方以為憂而遭羌變元成等漠然莫有對者師古曰漠無聲也音莫奉世曰羌虜近在竟内背畔師古曰竟讀曰境不以時誅亡以威制逺蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決師古曰暴露也亟急也音居力反宋祁曰注文暴字下疑有謂暴字往者數不料敵師古曰料量也音聊而師至於折傷再三發軵如淳曰軵推也淮南子曰内郡軵車而餉音而隴反宋祁曰注文而隴字疑是如腫字則曠日煩費威武虧矣今反虜無慮三萬人法當倍用六萬人師古曰無慮舉凡之言也無小思慮而大計也然羌戎弓矛之兵耳器不犀利如淳曰今俗刀兵利為犀晉灼曰犀堅也師古曰晉説是可用四萬人一月足以決丞相御史兩將軍皆以為民方收斂時未可多發萬人屯守之且足奉世曰不可天下被飢饉士馬羸耗師古曰耗減也音呼到反守戰之備久廢不簡師古曰簡謂選揀宋祁曰注文揀字疑是練字夷狄皆有輕邊吏之心而羌首難師古曰言創首為寇難也今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乗利諸種並和師古曰和應也音胡卧反相扇而起臣恐中國之役不得止於四萬非財幣所能解也故少發師而曠日師古曰曠空也空費其日而無功也與一舉而疾決利害相萬也師古曰相比則為萬倍也固爭之不能得有詔益二千人於是遣奉世將萬二千人騎以將屯為名師古曰且云}
