  - {type: variant, offset: 2316, length: 1, content: 尚, krp: 兵屯田不言討賊宋祁曰萬二千人浙江本無人字注文屯田字上疑有為字典屬國任立護軍都尉韓昌為偏裨到隴西分屯三處典屬國為右軍屯白石護軍都尉為前軍屯臨洮奉世為中軍屯首陽西極上如淳曰西極山名前軍到降同阪師古曰阪平陂也降同者阪名也阪府板反降音下江反陂音普何反宋祁曰注文府字上當有音字先遣校尉在前與羌爭地利又别遣校尉救民於廣陽谷羌虜盛多皆為所破殺兩校尉奉世具上地形部衆多少之計願益三萬六千人乃足以決事}
  - {type: variant, offset: 2318, length: 0, content: '', WYG: 奏天子大為發兵六萬餘人拜太常弋陽侯任千秋為奮武將軍以助焉奉世上言願得其衆不須煩大將宋祁曰須字下當有復字因陳轉輸之費上於是以璽書勞奉世且讓之師古曰讓責也責其不須大將曰皇帝問將兵右將軍師古曰官為右將軍而將兵在外故謂之將兵右將軍也甚苦暴露羌虜侵邊境殺吏民甚逆天道故遣將軍帥士大夫行天誅以將軍材質之羙奮精兵誅不軌百下百全之道也宋祁曰徐鍇去百下二字予謂不當去今乃有畔敵之名如淳曰不敢當敵攻戰為畔敵也大為中國羞以昔不閑習之故邪師古曰言未嘗當羌虜不測其形便以恩厚未洽信約不明也師古曰言將軍恩惠未洽於士卒又不能明其約誓使在下信之朕甚怪之上書言羌虜依深山多徑道不得不多分部遮要害須得後發營士足以決}
  - {type: page-break, offset: 2318, content: '', id: KR2a0007_WYG_079-6a, image: WYG0250/WYG0250-0622c.png}
