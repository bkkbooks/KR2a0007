  - {type: variant, offset: 2338, length: 0, content: '', WYG: 近所隨近之處也日夜言兼行不休息也詣詣軍所也非為擊也師古曰助其守今發三輔河東𢎞農越騎迹射佽飛彀者羽林孤兒及呼速絫嗕種劉德曰嗕音辱羌别種也彀者謂能張弩者也彀音工豆反絫音力追反嗕音乃彀反劉奉世曰呼速絫則呼遫累單于所将五萬衆來降者也嗕者匈奴傳所謂西辱}
