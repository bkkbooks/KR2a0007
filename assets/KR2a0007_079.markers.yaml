  - {type: variant, offset: 2547, length: 0, content: '', WYG: 賜告與妻子歸杜陵就醫藥大將軍鳯風御史中丞劾奏野王師古曰風讀曰諷賜告養病而私自便師古曰便安也音頻面反持虎符出界歸家奉詔不敬杜欽時在大將軍莫府欽素髙野王父子行能奏記於鳯為野王言曰竊見令曰吏二千石告過長安謁如淳曰謁者自白得告也律吏二千石以上告歸歸寧道不過行在所者便道之官無辭不分别予賜如淳曰予予告也賜賜告也今有司以為予告得歸賜告不得是一律两科失省刑之意師古曰省減也音所領反夫三最予告令也師古曰在官連有三最則得予告也病滿三月賜告詔恩也令告則得詔恩則不得宋祁曰景徳本令告詔則得恩不得浙本南本云令告則得詔恩不得失輕重之差又二千石病賜告得歸有故事不得去郡亡著令如淳曰律施行無不得去郡之文也傳曰賞疑從予所以廣恩勸功也師古曰疑當賞不當賞則與之疑厚薄則從厚罰疑從去所以慎刑闕難知也師古曰疑當罰不當罰則赦之疑輕重則從輕今釋令與故事而假不敬之法師古曰釋廢弃也假謂假託法律而致其罪甚違闕疑從去之意即以二千石守千里之地任兵馬之重不宜去郡將以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳯不聽竟}
