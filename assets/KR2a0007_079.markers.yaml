  - {type: variant, offset: 60, length: 2248, content: 繁延壽聞其茂材除補屬舉為太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純德懼天地之戒異飭身修政納問公卿又下明詔帥舉直言燕見紬繹以求咎愆使臣等得造明朝承聖問臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心則庶徵序於下日月理於上如人君淫溺後宮般樂游田五事失於躬大中之道不立則咎徵降而六極至凡災異之發各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭牆之內二者同日俱發以丁寧陛下厥咎不遠宜厚求諸身意豈陛下志在閨門未卹政事不慎舉錯婁失中與內寵大盛女不遵道嫉妒專上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於內勢行於外至覆傾國家或亂陰陽昔襃姒用國宗周以喪閻妻驕扇日以不臧此其效也經曰皇極皇建其有極傳曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統群生方內之治亂在陛下所執誠留意於正身勉強於力行損燕私之閒以勞天下放去淫溺之樂罷歸倡優之笑絕卻不享之義慎節游田之虞起居有常循禮而動躬親政事致行無倦安服若性經曰繼自今嗣王其毋淫于酒毋逸于游田惟正之共未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致慎也昔舜飭正二女以崇至德楚莊忍絕丹姬以成伯功幽王惑於襃姒周德降亡魯桓脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬專寵以絕驕嫚之端抑襃閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宮親屬饒之以財勿與政事以遠皇父之類損妻黨之權未有閨門治而天下亂者也治遠自近始習善在左右昔龍筦納言而帝命惟允四輔既備成王靡有過事誠敕正左右齊栗之臣戴金貂之飭執常伯之職者皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過則左右肅艾群僚仰法化流四方經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢違功則亂誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能考功實以定德無用比周之虛譽毋聽濅潤之譖愬則抱功修職之吏無蔽傷之憂比周邪偽之徒不得即工小人日銷俊艾日隆經曰三載考績三考黜陟幽明又曰九德咸事俊艾在官未有功賞得於前眾賢布於官而不治者也堯遭洪水之災天下分絕為十二州制遠之道微而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海內崩析者刑罰深酷吏行殘賊也夫違天害德為上取怨於下莫甚乎殘賊之吏誠放退殘酷暴之吏錮廢勿用益選溫良上德之士以親萬姓平刑釋冤以理民命務省繇役母奪民時薄收賦稅毋殫民財使天下黎元咸安家樂業不苦踰時之役不患苛暴之政不疾酷烈之吏雖有唐堯之大災民無離上之心經曰懷保小人惠于鰥寡未有德厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極傳曰六沴作見若不共御六罰既侵六極其下今三年之間災異鋒起小大畢具所行不享上帝上帝不豫炳然甚著不求之身無所改正疏舉廣謀又不用其言是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南面之急務唯陛下留神對奏天子異焉特召見永其夏皆令諸方正對策語在杜欽傳永對畢因曰臣前幸得條對災異之效禍亂所極言關於聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虛文欲末殺災異滿讕誣天是故皇天勃然發怒甲己之間暴風三溱拔樹折木此天至明不可欺之效也上特復問永永對曰日食地震皇后貴妾專寵所致語在五行志是時上初即位謙讓委政元舅大將軍王鳳議者多歸咎焉永知鳳方見柄用陰欲自託乃復曰方今四夷賓服皆為臣妾北無薰粥冒頓之患南無趙佗呂嘉之難三垂晏然靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有為亡吳楚燕梁之勢百官盤互親疏相錯骨肉大臣有申伯之忠洞洞屬屬小心畏忌無重合安陽博陸之亂三者無毛髮之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽說欺天者也竊恐陛下舍昭昭之白過忽天地之明戒聽晻昧之瞽說歸咎乎無辜倚異乎政事重失天心不可之大者也陛下即位委任遵舊未有過政元年正月白氣較然起乎東方至其四月黃濁四塞覆冒京師申以大水著以震蝕各有占應相為表裏百官庶事無所歸倚陛下獨不怪與白氣起東方賤人將興之表也黃濁冒京師王道微絕之應也夫賤人當起而京師道微二者已醜陛下誠深察愚臣之言致懼天地之異長思宗廟之計改往反過抗湛溺之意解偏駮之愛奮乾剛之威平天覆之施使列妾得人人更進猶尚未足也急復益納宜子婦人毋擇好醜毋避嘗字毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也後宮女史使令有直意者廣求於微賤之間以遇天所開右慰釋皇太后之憂慍解謝上帝之譴怒則繼嗣蕃滋災異訖息陛下則不深察愚臣之言忽於天地之戒咎根不除水雨之災山石之異將發不久發則災異已極天變成形臣雖欲捐身關策不及事已疏賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也三上封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣腹心大臣以為非天意臣當伏妄言之誅即以為誠天意也奈何忘國家大本背天意而從欲唯陛下省察熟念厚為宗廟計時對者數十人永與杜欽為上第焉上皆以其書示後宮後上嘗賜許皇后書采永言以責之語在外戚傳永既陰為大將軍鳳說矣能實最高由是擢為光祿大夫永奏書謝鳳曰永斗筲之材質薄學朽無一日之雅左右之介將軍說其狂言擢之皂衣之吏廁之爭臣之末不聽浸潤之譖不食膚受之愬雖齊桓晉文用士篤密察父悊兄覆育子弟誠無以加昔豫子吞炭壞形以奉見異齊客隕首公門以報恩施知氏孟嘗猶有死士何況將軍之門鳳遂厚之數年出為安定太守時上諸舅皆修經書任政事平阿侯譚年次當繼大將軍鳳輔政尤與永善陽朔中鳳薨鳳病困薦從弟御史大夫音以自代上從之以音為, WYG: 鄭𢎞}
