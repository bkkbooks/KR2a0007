  - {type: 'tls:seg', offset: 2378, content: '', id: KR2a0007_tls_079-18a.27}
  - {type: variant, offset: 2379, length: 0, content: '', WYG: 匈奴郅支單于殺漢使者亡保康居都護延夀發城郭兵屯田吏士四萬餘人以誅斬之封為列侯臣愚以為比罪則郅支薄量敵則莎車衆用師則奉世寡計勝則奉世為功於邊境安慮敗則延夀為禍於國家深其違命而擅生事同延夀割地封而奉世獨不錄臣聞功同賞異則勞臣疑罪鈞刑殊則百姓惑疑生無常惑生不知所從亡常則節趨不立師古曰趨讀曰趣趣謂意所嚮不知所從則百姓無所錯手足師古曰錯置也音千故反奉世圖難忘死信命殊俗師古曰圖難謀除國難也信讀曰伸威功白著為世使表師古曰白著謂顯明也表猶首也獨抑厭而不揚師古曰厭音一渉反非聖主所以塞疑厲節之意也願下有司議上以先帝時事不復錄奉世有子男九人女四人長女媛以選充後宫為元帝昭儀産中山孝王元帝崩媛為中山太后隨王就國奉世長子譚太常舉孝廉為郎功次補天水司馬如淳曰漢注邊郡置都尉及千人司馬皆不治民也奉世撃西羌譚為校尉隨父從軍有功未拜病死譚弟野王逡立參至大官師古曰逡音千旬反野王字君卿受業博士通詩少以父任為太子中庶子年十八上書願試守長安令宣帝竒其志問丞相魏相相以為不可許後以功次補當陽長遷為櫟陽令徙夏陽令元帝時遷隴西太守以治行髙入為左馮翊嵗餘而池陽令並素行貪汙輕野王外戚年少治行不改野王部督郵掾祋祤趙都師古曰都祋祤人而為掾也祋音丁活反又音丁外反祤音許羽反案驗得其主守盗十金罪收捕並不首吏師古曰不首吏謂不伏從收捕也都格殺並家上書陳寃事下廷尉宋祁曰並字下當更有並字都詣吏自殺以明野王京師稱其威信遷為大鴻臚數年御史大夫李延夀病卒在位多舉野王上使尚書選第中二千石師古曰定其髙下之差也而野王行能第一上曰吾用野王為三公後世必謂我私後宫親屬以野王為比師古曰比例也音必寐反乃下詔曰剛彊堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也廉絜節儉太子少傅張譚是也其以少傅為御史大夫上繇下第而用譚師古曰繇讀與由同越次避嫌不用野王以昭儀兄故也野王乃歎曰人皆以女寵貴我兄弟獨以賤野王雖不為三公甚見器重有名當世成帝立有司奏野王王舅不宜備九卿以秩出為上郡太守如淳曰以鴻臚秩為太守加賜黄金百斤朔方刺史蕭育奏封事薦言野王行能髙妙内足與圖身外足以慮化師古曰圖謀慮思也宋祁曰注文謀字下當添也字竊惜野王懐國之寳而不得陪朝廷與朝者並野王前以王舅出以賢復入明國家樂進賢也上自為太子時聞知野王㑹其病免復以故二千石使行河隄因拜為琅邪太守是時成帝長舅陽平侯王鳯為大司馬}
