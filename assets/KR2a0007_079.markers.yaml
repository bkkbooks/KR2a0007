  - {type: variant, offset: 24, length: 6, content: 送郅支單于侍, WYG: 者利以奉世為比師古曰比必寐反宋祁曰注文比字下疑有音字爭逐發兵要功萬里之外師古曰逐競也為國家生事於夷狄漸不可長奉世不宜受封上善望之議以奉世為光禄大夫水衡都尉宋祁曰善望之議字下疑有竟不封三字元帝即位為執金吾上郡屬國歸義降胡萬餘人反去初昭帝末西河屬國胡伊酋若王亦將衆數千人畔師古曰酋音才由反奉世輙持節將兵追擊師古曰言西河上郡羌胡反畔}
