  - {type: variant, offset: 3575, length: 782, content: 戶奉宿衛之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聽邪臣之計去高敞初陵捐十年功緒改作昌陵反天地之性因下為高積土為山發徒起邑並治宮館大興繇役重增賦斂微發如雨役百乾谿費疑驪山靡敝天下五年不成而後反故又廣盱營表發人冢墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異婁降饑饉仍臻流散冗食餧死於道以百萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不遠在夏后之世願陛下追觀夏商周秦所以失之以鏡考己行有不合者臣當伏妄言之誅漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯發明聖之德昭然遠寤畏此上天之威怒深懼危亡之徵兆蕩滌邪辟之惡志厲精致政專心反道絕群小之私客免不正之詔除悉罷北宮私奴車馬媠出之具克己復禮毋貳微行出飲之過以防迫切之禍深惟日食再既之意抑損椒房玉堂之盛寵毋聽後宮之請謁除掖庭之亂獄出炮格之陷阱誅戮邪佞之臣及左右執左道以事上者以塞天下之望且寑初陵之作止諸繕治宮室闕更滅賦盡休力役存卹振捄困乏之人以弭遠方厲崇忠直放退殘賊無使素餐之吏久尸厚祿以次貫行固執無違夙夜孳孳婁省無怠舊愆畢改新德既章纖介之邪不復載心則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保唯陛下留神反覆熟省臣言臣幸得備邊部之吏不知本朝失得瞽言觸忌諱罪當萬死成帝性寬而好文辭又久無繼嗣數為微行多近幸小臣趙李從微賤專寵皆皇太后與諸舅夙夜所常憂至親難數言故惟永等使因天變而切諫勸上納用之永自知有內應展意無所依違每言事輒見答禮至上此對上大怒衛將軍商密擿永令發去上使侍御史收永敕過交道廄者勿追御史不及永還上意亦解自悔明年徵永為太中大夫遷光祿大夫, WYG: 郎}
