  - {type: variant, offset: 2373, length: 0, content: '', WYG: 是杜欽上疏追訟奉世前功曰前莎車王殺漢使者約諸國背畔師古曰約謂共為契約左將軍奉世以衛候便宜發兵誅莎車王䇿定城郭功施邊境師古曰城郭者謂西域諸國為城郭而居者議者以奉世奉使有指春秋之義亡遂事漢}
  - {type: page-break, offset: 2373, content: '', id: KR2a0007_WYG_079-8b, image: WYG0250/WYG0250-0623d.png}
  - {type: variant, offset: 2373, length: 0, content: '', krp: 是杜欽上疏追訟奉世前功曰前莎車王殺漢使者約諸國背畔師古曰約謂共為契約左將軍奉世以衛候便宜發兵誅莎車王䇿定城郭功施邊境師古曰城郭者謂西域諸國為城郭而居者議者以奉世奉使有指春秋之義亡遂事漢}
