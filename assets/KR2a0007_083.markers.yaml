  - {type: variant, offset: 8076, length: 2, content: 張敞, WYG: 與交結謀成尊號以廣孝道繇是師丹先免師古曰繇讀與由同博代為大司空數燕見奏封事言丞相光志在自守不能憂國大司馬喜至尊至親阿黨大臣無益政治上遂罷喜遣就國免光為庻人以博代光為丞相封陽鄉侯食邑二千戸博上書讓曰故事封丞相不滿千户而獨臣過制誠慙懼願還千户上許焉傅}
