  - {type: variant, offset: 7936, length: 0, content: '', WYG: 置郡縣部刺史奉使典州督察郡國吏民安寧故事居部九嵗舉為守相其有異材功效著者輙登擢秩卑而賞厚咸勸功樂進師古曰勸功自勸勉而立功也前丞相方進奏罷刺史更置州牧秩真二千石位次九卿九卿缺以高第補其中材則苟自守而已恐功效陵夷師古曰陵夷漸廢替姦軌不禁臣請罷州牧置刺史如故奏可博為人㢘儉不好酒色游宴自微賤至富貴食不重味案上不過三桮夜寢早起妻希見其面有一女無男然好樂士大夫為郡守九卿賔客滿門欲仕宦者薦舉之欲報仇怨者解劔以帶之其趨事待士如是博以此自立然終用敗初}
