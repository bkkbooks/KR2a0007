  - {type: variant, offset: 67, length: 183, content: 興以聖德遭季世知言之不用而道不行乃歎曰鳳鳥不至河不出圖吾已矣夫文王既沒文不在茲乎於是應聘諸侯以答禮行誼西入周南至楚畏匡戹陳奸七十餘君適齊聞韶三月不知肉味自衛反魯然後樂正雅頌各得其所究觀古今之篇籍乃稱曰大哉堯之為君也唯天為大唯堯則之巍巍乎其有成功也煥乎其有文章又曰周監於二代郁郁乎文哉吾從周於是敘書則斷堯典稱樂則法韶舞論詩則首周南綴周之禮因魯春秋舉十二公行事繩之以文武, WYG: ''}
