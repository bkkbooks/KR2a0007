  - {type: variant, offset: 4700, length: 2, content: 能就, WYG: 相敕丞化宋祁曰丞當作承而骨肉相疑疑咸受脩言以謗毁宣咸所言皆宣行迹衆人所共見公家所宜聞况知咸給事中恐為司𨽻舉奏宣而公令明等廹切宫闕要􅃒創戮近臣於大道人衆中欲以鬲塞聰明杜絶論議之端師古曰鬲與隔同杜塞也桀黠無所畏忌萬衆讙譁流聞四方不與凡民忿怒爭鬭者同臣聞敬近臣為近主也禮下公門式路馬師古曰過公門則下車見路馬則撫式蓋崇敬也式車前横木君畜產且猶敬之春秋之義意惡功遂不免於誅師古曰遂成也言舉意不善雖有成功猶加誅上浸之源不可長也師古曰浸近也言傷戮大臣有所逼近也浸字或作侵侵犯也}
