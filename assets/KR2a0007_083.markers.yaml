  - {type: variant, offset: 5986, length: 297, content: 衡丞相皆有傳衡授琅邪師丹伏理斿君潁川滿昌君都君都為詹事理高密太傅家世傳業丹大司空自有傳由是齊詩有翼匡師伏之學滿昌授九江張邯琅邪皮容皆至大官徒眾尤盛韓嬰燕人也孝文時為博士景帝時至常山太傅嬰推詩人之意而作內外傳數萬言其語頗與齊魯間殊然歸一也淮南賁生受之燕趙間言詩者由韓生韓生亦以易授人推易意而為之傳燕趙間好詩故其易微唯韓氏自傳之武帝時嬰嘗與董仲舒論於上前其人精悍處事分明仲舒不能難也後其孫商為博士孝宣時涿郡韓生其後也以易徵待詔殿中曰所受易即先太傅所傳也嘗受韓詩不如韓氏易深太傅故專傳之司隸校尉蓋寬饒本受易於孟喜見涿韓生說易而好之即更從受焉趙子河內人也事燕韓生授同郡蔡誼誼至丞相自有傳誼授同郡食子公與, WYG: ''}
