  - {type: variant, offset: 8089, length: 4, content: 左氏傳誼, WYG: 之義姦以事君常刑不舍師古曰舍置也魯大夫叔孫僑如欲顓公室譛其族兄季孫行父於晉晉執囚行父以亂魯國春秋重而書之師古曰僑如叔孫宣伯也行父季文子也宣伯通於成公之母穆姜欲去季孟而取其室使告普曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也若欲得志於魯請止行父而殺之不然歸必畔矣晉人執文子于苕丘事在成十六年今晏放命圯族干亂朝政要大臣以罔上本造計謀職}
