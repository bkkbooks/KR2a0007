  - {type: variant, offset: 7900, length: 1, content: 郎, WYG: 列栢樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之師古曰史言此者著御史大夫之職當休廢也宋祁曰顏之推云漢書御史府中列栢樹常有野烏數千棲宿其上晨去暮來號朝夕烏而文士往往作烏鳶用之浙本亦作鳥子謂烏字當作鳥字後二嵗餘朱博為大司空奏言帝王之道不必相襲各繇時務師古曰繇讀與由同高皇帝以聖徳受命建立鴻業置御史大夫位次丞相典正法度以職相參總領百官上下相監臨歴載二百年天下安寧今更為大司空與丞相同位未獲嘉祐故事選郡國守相高第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相師古曰更經也音工衡反權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率哀帝從之廼更拜博為御史大夫㑹大司馬喜免宋祁曰喜字上當有傅字以陽安侯丁明為大司馬衞}
  - {type: page-break, offset: 7900, content: '', id: KR2a0007_WYG_083-20b, image: WYG0250/WYG0250-0674b.png}
  - {type: page-break, offset: 7900, content: '', id: KR2a0007_WYG_083-21a, image: WYG0250/WYG0250-0674c.png}
