  - {type: variant, offset: 6391, length: 245, content: 俠為王莽講學大夫由是言毛詩者本之徐敖漢興魯高堂生傳士禮十七篇而魯徐生善為頌孝文時徐生以頌為禮官大夫傳子至孫延襄襄其資性善為頌不能通經延頗能未善也襄亦以頌為大夫至廣陵內史延及徐氏弟子公戶滿意桓生單次皆為禮官大夫而瑕丘蕭奮以禮至淮陽太守諸言禮為頌者由徐氏孟卿東海人也事蕭奮以授后倉魯閭丘卿倉說禮數萬言號曰后氏曲臺記授沛聞人通漢子方梁戴德延君戴聖次君沛慶普孝公孝公為東平太傅德號大戴為信都太傅聖號小戴以博士論石渠至九江太守由是禮有大戴小戴慶氏之學通漢以太子舍人論石渠至中山中尉普授魯夏侯敬又傳族子, WYG: ''}
