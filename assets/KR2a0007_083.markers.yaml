  - {type: variant, offset: 4697, length: 1, content: 諸, WYG: 省宣子况為右曹侍郎數聞其語賕客楊明欲令創咸靣目使不居位師古曰創謂傷之也音初良反其下並同蕭該音義曰賕韋昭曰行貨財以有求於人曰賕字林以財枉法相謝曰賕音巨又反該案今人亦為求音㑹司𨽻缺况恐咸為之遂令明遮斫咸宫門外斷鼻脣身八創事下有司御史中丞衆等奏况朝臣父故宰相再封列}
