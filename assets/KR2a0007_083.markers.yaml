  - {type: punctuation, offset: 3944, content: 「, id: KR2a0007_tls_083-bkkpn928}
  - {type: variant, offset: 3944, length: 0, content: '', WYG: 帝王之徳莫大於知人知人則百僚任職天工不曠師古曰工官也曠空也故臯陶曰知人則哲能官人師古曰虞書臯陶謨之辭也哲智也無所不知故能官人也御史大夫内承本朝之風化外佐丞相統理天下任重職大非庸材所能堪今當選於羣卿以充其缺得其人則萬姓欣喜百僚說服師古曰說讀曰悦不得其人則大職墮斁王功不興師古曰墮毁也斁壊也墮音火規反斁音丁固反虞帝之明在兹壹舉可不致詳竊見少府宣材茂行絜達於從政前為御史中丞執憲轂下師古曰言在天子輦轂之下不吐剛茹柔師古曰大雅烝民之詩云惟仲山甫剛亦不吐柔亦不茹言其平正也茹食也音人庻反舉錯時當師古曰言其合時而當理也當音丁浪反出守臨淮陳留二郡稱治為左馮翊崇教飬善威徳並行衆職脩理姦軌絶息辭訟者歴年不至丞相府赦後餘盗賊什分三輔之一丈穎曰減三輔之賊什九也功效卓爾自左内史初置以來未嘗有也師古曰馮翊本左内史之地故云然孔子曰如有所譽其有所試師古曰論語載孔子之言也所以言譽人者必當試之以事宣考績功課簡在兩府師古曰簡大也亦曰明也兩府丞相御史府也不敢過稱以奸欺誣之辠師古曰過稱謂踰其實而妄稱譽之也奸犯也音干}
