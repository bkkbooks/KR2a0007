  - {type: variant, offset: 39, length: 2, content: 成法, WYG: 民職不辦而粟邑縣小辟在山中師古曰辟讀曰僻民謹樸易治令鉅鹿尹賞久郡用事吏為樓煩長舉茂材遷在粟宣即以令奏賞與恭換縣師古曰時令條有材不稱職得改之二人視事數月而兩縣皆治宣因移書勞勉之曰昔孟公綽優於趙魏而不宜滕薛師古曰孟公綽魯大夫}
