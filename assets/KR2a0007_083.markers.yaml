  - {type: variant, offset: 2584, length: 303, content: 自有傳充宗授平陵士孫張仲方沛鄧彭祖子夏齊衡咸長賓張為博士至揚州牧光祿大夫給事中家世傳業彭祖真定太傅咸王莽講學大夫繇是梁丘有士孫鄧衡之學京房受易梁人焦延壽延壽云嘗從孟喜問易會喜死房以為延壽易即孟氏學翟牧白生不肯皆曰非也至成帝時劉向校書考易說以為諸易家說皆祖田何楊叔元丁將軍大誼略同唯京氏為異黨焦延壽獨得隱士之說託之孟氏不相與同房以明災異得幸為石顯所譖誅自有傳房授東海殷嘉河東姚平河南乘弘皆為郎博士繇是易有京氏之學費直字長翁東萊人也治易為郎至單父令長於卦筮亡章句徒以彖象系辭十篇文言解說上下經琅邪王璜平中能傳之璜又傳古文尚書高相沛人也治易與費公同時其學亦亡章句專說陰陽災異自言出於丁將軍傳至相相授子康及蘭陵毋將, WYG: 于}
