  - {type: variant, offset: 4789, length: 1, content: 太, WYG: 律曰鬭以刃傷人完為城旦其賊加罪一等與謀者同罪詔書無以詆欺成罪師古曰詆毁也音丁禮反𫝊曰遇人不以義而見疻者與痏人之罪鈞惡不直也應劭曰以杖手毆擊人剝其皮膚腫起青黒而無創瘢者律謂疻痏遇人不以義為不直雖見毆與毆人罪同也師古曰疻音侈痏音鮪蕭該音義曰案晉灼曰疻音侈侈裂也韋昭曰疻謂毁傷也疻音胥地反說文曰疻毆傷也手支反又思詣反痏說文曰痏病也該案三倉云痏瘡也音如鮪魚之鮪咸厚善脩而數稱宣惡流聞不誼不可謂直師古曰言咸為脩而毁宣是不誼而不直况以故傷咸計謀已定後聞置司𨽻因前謀而趣明師古曰趣讀曰促非以恐咸為司𨽻故造謀也本爭私變雖於掖門外傷咸道}
