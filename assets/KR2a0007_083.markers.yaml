  - {type: variant, offset: 2888, length: 1050, content: 康以明易為郎永至豫章都尉及王莽居攝東郡太守翟誼謀舉兵誅莽事未發康侯知東郡有兵私語門人門人上書言之後數月翟誼兵起莽召問對受師高康莽惡之以為惑眾斬康繇是易有高氏學高費皆未嘗立於學官伏生濟南人也故為秦博士孝文時求能治尚書者天下亡有聞伏生治之欲召時伏生年九十餘老不能行於是詔太常使掌故朝錯往受之秦時禁書伏生壁藏之其後大兵起流亡漢定伏生求其書亡數十篇獨得二十九篇即以教於齊魯之間齊學者由此頗能言尚書山東大師亡不涉尚書以教伏生教濟南張生及歐陽生張生為博士而伏生孫以治尚書徵弗能明定是後魯周霸雒陽賈嘉頗能言尚書云歐陽生字和伯千乘人也事伏生授倪寬寬又受業孔安國至御史大夫自有傳寬有俊材初見武帝語經學上曰吾始以尚書為樸學弗好及聞寬說可觀乃從寬問一篇歐陽大小夏侯氏學皆出於寬寬授歐陽生子世世相傳至曾孫高子陽為博士高孫地餘長賓以太子中庶授太子後為博士論石渠元帝即位地餘侍中貴幸至少府戒其子曰我死官屬即送汝財物慎毋受汝九卿儒者子孫以廉絜著可以自成及地餘死少府官屬共送數百萬其子不受天子聞而嘉之賜錢百萬地餘少子政為王莽講學大夫由是尚書世有歐陽氏學林尊字長賓濟南人也事歐陽高為博士論石渠後至少府太子太傅授平陵平當梁陳翁生當至丞相自有傳翁生信都太傅家世傳業由是歐陽有平陳之學翁生授琅邪殷崇楚國龔勝崇為博士勝右扶風自有傳而平當授九江朱普公文上黨鮑宣普為博士宣司隸校尉自有傳徒眾尤盛知名者也夏侯勝其先夏侯都尉從濟南張生受尚書以傳族子始昌始昌傳勝勝又事同郡蕳卿蕳卿者倪寬門人勝傳從兄子建建又事歐陽高勝至長信少府建太子太傅自有傳由是尚書有大小夏侯之學周堪字少卿齊人也與孔霸俱事大夏侯勝霸為博士堪譯官令論於石渠經為最高後為太子少傅而孔霸以太中大夫授太子及元帝即位堪為光祿大夫與蕭望之領尚書事為石顯等所譖皆免官望之自殺上愍之乃擢堪為光祿勳語在劉向傳堪授牟卿及長安許商長伯牟卿為博士霸以帝師賜爵號襃成君傳子光亦事牟卿至丞相自有傳由是大夏侯有孔許之學商善為算著五行論曆四至九卿號其門人沛唐林子高為德行平陵吳章偉君為言語重泉王吉少音為政事齊炔欽幼卿為文學王莽時林吉為九卿自表上師冢大夫博士郎吏為許氏學者各從門人會車數百兩儒者榮之欽章皆為博士徒眾尤盛章為王莽所誅張山拊字長賓平陵人也事小夏侯建為博士論石渠至少府授同縣李尋鄭寬中少君山陽張無故子儒信都秦恭延君陳留假倉子驕無故善修章句為廣陵太傅守小夏侯說文恭增師法至萬言為城陽內史倉以謁者論石渠至膠東相尋善說災異為騎都尉自有傳寬中有儁材以博士授太子成帝即位賜爵關內侯食邑八百戶遷光祿大夫領尚書事甚尊重會疾, WYG: ''}
