  - {type: variant, offset: 4689, length: 4, content: 綰臧請立, WYG: 數月代張禹為丞相封高陽侯食邑千户宣除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名宣為相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉久之廣漢郡盗賊羣起丞相御史遣掾史逐捕不能克上廼拜河東都尉趙䕶為廣漢太守以軍法從事數月斬其渠帥鄭躬師古曰渠大也降者數千人廼平㑹卭成太后崩喪事倉卒吏賦歛以趨辦師古曰卭成太后宣帝王皇后也趨讀曰趣言苟取辦其後上聞之以過丞相御史遂冊免宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉師古曰不聞其有此行也朕既不}
  - {type: page-break, offset: 4689, content: '', id: KR2a0007_WYG_083-8b, image: WYG0250/WYG0250-0668b.png}
  - {type: variant, offset: 4689, length: 4, content: 綰臧請立, krp: 數月代張禹為丞相封高陽侯食邑千户宣除趙貢兩子為史貢者趙廣漢之兄子也為吏亦有能名宣為相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢也時天子好儒雅宣經術又淺上亦輕焉久之廣漢郡盗賊羣起丞相御史遣掾史逐捕不能克上廼拜河東都尉趙䕶為廣漢太守以軍法從事數月斬其渠帥鄭躬師古曰渠大也降者數千人廼平㑹卭成太后崩喪事倉卒吏賦歛以趨辦師古曰卭成太后宣帝王皇后也趨讀曰趣言苟取辦其後上聞之以過丞相御史遂冊免宣曰君為丞相出入六年忠孝之行率先百僚朕無聞焉師古曰不聞其有此行也朕既不}
