  - {type: variant, offset: 7899, length: 0, content: '', WYG: 屬罷票騎將軍官以御史大夫何武為大司空封列侯皆増奉如丞相以備三公官焉師古曰奉音扶用反議者多以為古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分明無益於治亂是時御史府吏舍百餘區井水皆竭又其府}
