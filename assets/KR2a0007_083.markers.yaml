  - {type: variant, offset: 4792, length: 1, content: 夫, WYG: 不敬公私無差春秋之義原心定罪師古曰原謂尋其本也原况以父見謗𤼵忿怒無它大惡加詆欺輯小過成大辟師古曰輯與集同集合也陷死刑違明詔恐非法意不可施行聖王不以怒増刑明當以賊傷人不直師古曰以其受賕也况與謀者皆爵減完為城旦師古曰以其身有爵級故得減罪而為完也况身及同謀之人皆從此科上以問公卿議臣丞相孔光大司空師丹以中丞議是自將軍以下至博士議郎皆是廷尉况竟減罪一等宋祁曰罪字上當有死字徙敦煌宣坐免為庻人歸故郡卒於家宣子恵亦至二千石始恵為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不脩師古曰郵行書之}
