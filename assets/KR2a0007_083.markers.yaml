  - {type: variant, offset: 4694, length: 1, content: 堂, WYG: 變異數見嵗比不登倉廩空虚師古曰比頻也登成也年穀不成宋祁曰多朕既不明止空虚十六字百姓饑饉流離道路疾疫死者}
  - {type: variant, offset: 4694, length: 1, content: 堂, krp: 變異數見嵗比不登倉廩空虚師古曰比頻也登成也年穀不成宋祁曰多朕既不明止空虚十六字百姓饑饉流離道路疾疫死者}
  - {type: variant, offset: 4696, length: 0, content: '', WYG: 萬數人至相食盗賊並興羣職曠廢是朕之不徳而股肱不良也廼者廣漢羣盗横恣殘賊吏民朕惻然傷之數以問君君對輙不如其實西州鬲絶幾不為郡師古曰鬲與隔同幾音鉅依反三輔賦斂無度酷吏並縁為姦師古曰並音歩浪反侵擾百姓詔君案驗復無欲得事實之意九卿以下咸承風指同時陷于謾欺之辜咎繇君焉師古曰謾誑也音慢又音莫干反繇讀與由同有司法君領職解嫚師古曰法謂據法以劾也解讀曰懈嫚與慢同開謾欺之路傷薄風化無以帥示四方不忍致君于理其上丞相高陽侯印綬罷歸初宣為丞相而翟方進為司直宣知方進名儒有宰相器深結厚焉後方進竟代為丞相思宣舊恩宣免後二嵗薦宣明習文法練國制度師古曰練猶熟也言其詳熟前所坐過薄可復進用上徴宣復爵高陽侯加寵特進位次師安昌侯給事中視尚書事宣復尊重任政數年後坐善定陵侯淳于長罷就第初宣有兩弟明脩明至南陽太守脩歴郡守京兆尹少府善交接得州里之稱後母常從脩居官宣為丞相時脩為臨菑令宣迎後母脩不遣後母病死脩去官持服宣謂脩三年服少能行之者兄弟相駮不可師古曰駮者執意不同猶如色之間雜脩遂竟服繇是兄弟不和師古曰繇讀曰由久之哀帝初即位博士申咸給事中亦東海人也毁宣不供飬行喪服薄於骨肉前以不忠孝免不宜復列封侯在}
