  - {type: variant, offset: 1911, length: 438, content: 禹琅邪魯伯伯為會稽太守禹至丞相禹授淮陽彭宣沛戴崇子平崇為九卿宣大司空禹宣皆有傳魯伯授太山毛莫如少路琅邪邴丹曼容著清名莫如至常山太守此其知名者也繇是施家有張彭之學孟喜字長卿東海蘭陵人也父號孟卿善為禮春秋授后蒼疏廣世所傳后氏禮疏氏春秋皆出孟卿孟卿以禮經多春秋煩雜乃使喜從田王孫受易喜好自稱譽得易家陰陽災變書詐言師田生且死時枕喜䣛獨傳喜諸儒以此耀之同門梁丘賀疏通證明之曰田生絕於施讎手中時喜歸東海安得此事又蜀人趙賓好小數書後為易飾易文以為箕子明夷陰陽氣亡箕子箕子者萬物方荄茲也賓持論巧慧易家不能難皆曰非古法也云受孟喜喜為名之後賓死莫能持其說喜因不肯仞以此不見信喜舉孝廉為郎曲臺署長病免為丞相掾博士缺眾人薦喜上聞喜改師法遂不用喜喜授同郡白光少子沛翟牧子兄皆為博士繇是有翟孟白之學梁丘賀字長翁琅邪諸人也以能心計為武騎從太中大夫京房受易房者淄川楊何弟子也房出為齊郡太守賀更事田王孫宣帝時聞京房為易明求其門人得賀賀時為都司空令坐事論免為庶人待詔黃門數入說教侍中以召賀賀入說上善之以賀為郎會八, WYG: 音竹亮反}
