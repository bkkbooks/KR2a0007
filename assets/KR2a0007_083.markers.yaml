  - {type: variant, offset: 8135, length: 1, content: 數, krp: 大夫並拜於前殿延登受策有音如鍾聲語在五行志贊曰薛宣朱博皆起佐史歴位以登宰相宣所在而治}
  - {type: variant, offset: 8137, length: 0, content: '', WYG: 世吏師及居大位以苛察失名師古曰苛細也器誠有極也宋祁曰别本有字下有所字博馳騁進取不思道徳已亡可言師古曰言其事行不足可道也又見孝成之世委任大臣假借用權師古曰假音休假借音以物借人宋祁曰注末當有之借二字借蕭該謂本作藉字若作借何煩更云音以物借人之借蓋傳寫之繆世主已更好惡異前師古曰更改也復附丁傅稱順孔鄉師古曰稱副也副其所求而順其意也稱音尺孕反事發見詰遂陷誣罔辭窮情得仰藥飲鴆師古曰仰藥謂仰頭而飲藥也孔子曰久矣哉由之行詐也博亦然哉師古曰論語云子疾病子路欲使門人為臣子曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎故贊引之前漢書卷八十三前漢書卷八十三考證薛宣傳都舩獄吏臣召南按百官表中尉屬官有都舩令丞遷樂浪都尉丞地理志樂浪郡有兩都尉其南部都尉治昭明縣東部都尉治不而縣為宛句令宛句屬濟隂郡志作􅁈句上廼拜河東都尉趙䕶為廣漢太守云云按成帝紀鴻嘉三年廣漢男子鄭躬等自號山君四年趙䕶擊之遷䕶為執金吾公卿表䕶字子夏以元延元年為執金吾廷尉直臣召南按公卿表即廷尉龎真也真字與直字相近而誤缺筆耳朱博𫝊封陽鄉侯食邑二千户按表作楊鄉又下文願還千户表作還千五十户即召𤣥詣尚書問狀胡三省曰丞相御史同奏而獨召問𤣥者以博强毅多權詐難遽得其情而𤣥易以窮詰也右將軍蟜}
