  - {type: variant, offset: 4225, length: 459, content: 今文字讀之因以起其家逸書得十餘篇蓋尚書茲多於是矣遭巫蠱未立於學官安國為諫大夫授都尉朝而司馬遷亦從安國問故遷書載堯典禹貢洪範微子金縢諸篇多古文說都尉朝授膠東庸生庸生授清河胡常少子以明穀梁春秋為博士部刺史又傳左氏常授虢徐敖敖為右扶風掾又傳毛詩授王璜平陵塗惲子真子真授河南桑欽君長王莽時諸學皆立劉歆為國師璜惲等皆貴顯世所傳百兩篇者出東萊張霸分析合二十九篇以為數十又采左氏傳書敘為作首尾凡百二篇篇或數簡文意淺陋成帝時求其古文者霸以能為百兩徵以中書校之非是霸辭受父父有弟子尉氏樊並時太中大夫平當侍御史周敞勸上存之後樊並謀反乃黜其書申公魯人也少與楚元王交俱事齊人浮丘伯受詩漢興高祖過魯申公以弟子從師入見于魯南宮呂太后時浮丘伯在長安楚元王遣子郢與申公俱卒學元王薨郢嗣立為楚王令申公傅太子戊戊不好學病申公及戊立為王胥靡申公申公愧之歸魯退居家教終身不出門復謝賓客獨王命召之乃往弟子自遠方至受業者千餘人申公獨以詩經為訓故以教亡傳疑者則闕弗傳蘭陵王臧既從受詩已通事景帝為太子少傅免去武帝初即位臧乃上書宿衛累遷一歲至郎中令及代趙綰亦嘗受詩申公, WYG: 宣}
