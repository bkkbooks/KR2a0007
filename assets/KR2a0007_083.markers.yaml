  - {type: variant, offset: 6927, length: 0, content: '', WYG: 長安令京師治理遷冀州刺史博本武吏不更文法師古曰更歴也音工衡反及為刺史行部師古曰行音下更反吏民數百人􅃒道自言官寺盡滿從事白請且留此縣録見諸自言者事畢廼發欲以觀試博博心知之告外趣駕師古曰趣讀曰促既白駕辦博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黄綬各自詣郡師古曰丞尉職卑皆黄綬欲言二千石墨綬長吏者使者行部還詣治所師古曰治所刺史所止理事處宋祁曰楊本并别本云使者還部越本無使者二字其民為吏所􅁈及言盗賊辭訟事各使屬其部從事師古曰屬委也音之欲反博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變廼至於此後博徐問果老從事教民聚㑹博殺此吏州郡畏博威嚴徙為并州刺史䕶漕都尉遷琅邪太守齊部舒緩飬名師古曰言齊人之俗其性遲緩多自高大以飬名聲博新視事右曹掾史皆移病卧師古曰右曹上曹也移病謂移書言病也一曰以病而移居也博問其故對言惶恐師古曰言懼新太守之威故事二千石新到輙遣吏存問致意廼敢起就職博奮髯抵几曰師古曰髯頰毛也抵擊也音紙觀齊兒欲以此為俗邪廼召見諸曹史書佐及縣大吏選視其可用者出教置之師古曰皆新補置以代移病者皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教主簿師古曰以此教告主簿贛老生不習吏禮主簿且教拜起閑習廼止又敇功曹官屬多襃衣大袑師古曰袑音紹謂大袴也蕭該音義曰按韋昭曰袴上曰袑音􅁰矯反鄧展音紹不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輙罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也師古曰言不能用且持此道歸堯舜君出為陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜師古曰各因其材而任之縣有劇賊及它非常博輙移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輙行師古曰稱副也以是豪强慹服師古曰慹音之渉反姑幕縣有羣軰八人報仇廷中皆不得師古曰於縣廷之中報仇殺人而其賊皆亡捕之不得也長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博廼見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪師古曰與讀皆曰豫閤下書佐入博口占檄文曰師古曰隱度其言口授之占音之贍反府告姑幕令丞言賊發不得有書師古曰言已得縣之文書如此檄到令丞就職游徼王卿力有餘如律令師古曰游徼職主捕盗賊故云如律令王卿得敇惶怖親屬失色晝夜馳騖蕭該音義曰字書曰騖亂馳也十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閲詣府師古曰伐功勞也閲所經歴也蕭該音義曰字林曰閲其數也部掾以下亦可用漸盡其餘矣師古曰部掾所部之掾也其操持下皆此類也以高第入守}
