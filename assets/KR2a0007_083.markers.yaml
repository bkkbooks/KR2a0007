  - {type: variant, offset: 8082, length: 1, content: 劉, WYG: 趙𤣥議𤣥言事已前決得無不宜師古曰得無猶言無乃也博曰已許孔鄉侯有指匹夫相要尚相得死何况至尊博唯有死耳𤣥即許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國師古曰汜音凡事與喜相似即并奏喜武前在位皆無益於治雖已退免爵土之封非所當得也請皆免為庻人上知傅太后素常怨喜疑博𤣥承指即召𤣥詣尚書問狀𤣥辭服有詔左將軍彭宣與中朝者雜問宣等劾奏博宰相𤣥上卿晏以外親封位特進股肱大臣上所信任不思竭誠奉}
