  - {type: variant, offset: 6927, length: 0, content: '', krp: 長安令京師治理遷冀州刺史博本武吏不更文法師古曰更歴也音工衡反及為刺史行部師古曰行音下更反吏民數百人遮道自言官寺盡滿從事白請且留此縣録見諸自言者事畢廼發欲以觀試博博心知之告外趣駕師古曰趣讀曰促既白駕辦博出就車見自言者使從事明敕告吏民欲言縣丞尉者刺史不察黄綬各自詣郡師古曰丞尉職卑皆黄綬欲言二千石墨綬長吏者使者行部還詣治所師古曰治所刺史所止理事處宋祁曰楊本并别本云使者還部越本無使者二字其民為吏所冤及言盗賊辭訟事各使屬其部從事師古曰屬委也音之欲反博駐車決遣四五百人皆罷去如神吏民大驚不意博應事變廼至於此後博徐問果老從事教民聚㑹博殺此吏州郡畏博威嚴徙為并州刺史䕶漕都尉遷琅邪太守齊部舒緩飬名師古曰言齊人之俗其性遲緩多自高大以飬名聲博新視事右曹掾史皆移病卧師古曰右曹上曹也移病謂移書言病也一曰以病而移居也博問其故對言惶恐師古曰言懼新太守之威故事二千石新到輙遣吏存問致意廼敢起就職博奮髯抵几曰師古曰髯頰毛也抵擊也音紙觀齊兒欲以此為俗邪廼召見諸曹史書佐及縣大吏選視其可用者出教置之師古曰皆新補置以代移病者皆斥罷諸病吏白巾走出府門郡中大驚頃之門下掾贛遂耆老大儒教授數百人拜起舒遲博出教主簿師古曰以此教告主簿贛老生不習吏禮主簿且教拜起閑習廼止又敇功曹官屬多襃衣大袑師古曰袑音紹謂大袴也蕭該音義曰按韋昭曰袴上曰袑音黍矯反鄧展音紹不中節度自今掾史衣皆令去地三寸博尤不愛諸生所至郡輙罷去議曹曰豈可復置謀曹邪文學儒吏時有奏記稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡奈生所言聖人道何也師古曰言不能用且持此道歸堯舜君出為陳説之其折逆人如此視事數年大改其俗掾史禮節如楚趙吏博治郡常令屬縣各用其豪桀以為大吏文武從宜師古曰各因其材而任之縣有劇賊及它非常博輙移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輙行師古曰稱副也以是豪强慹服師古曰慹音之渉反姑幕縣有羣軰八人報仇廷中皆不得師古曰於縣廷之中報仇殺人而其賊皆亡捕之不得也長吏自繫書言府賊曹掾史自白請至姑幕事留不出功曹諸掾即皆自白復不出於是府丞詣閤博廼見丞掾曰以為縣自有長吏府未嘗與也丞掾謂府當與之邪師古曰與讀皆曰豫閤下書佐入博口占檄文曰師古曰隱度其言口授之占音之贍反府告姑幕令丞言賊發不得有書師古曰言已得縣之文書如此檄到令丞就職游徼王卿力有餘如律令師古曰游徼職主捕盗賊故云如律令王卿得敇惶怖親屬失色晝夜馳騖蕭該音義曰字書曰騖亂馳也十餘日間捕得五人博復移書曰王卿憂公甚效檄到齎伐閲詣府師古曰伐功勞也閲所經歴也蕭該音義曰字林曰閲其數也部掾以下亦可用漸盡其餘矣師古曰部掾所部之掾也其操持下皆此類也以高第入守}
  - {type: punctuation, offset: 6930, content: ，, id: KR2a0007_tls_083-bkkpn1691}
  - {type: 'tls:seg', offset: 6930, content: '', id: KR2a0007_tls_083-34a.18}
  - {type: variant, offset: 6930, length: 0, content: '', WYG: 滿嵗為真其治左馮翊文理聰明殊不及薛宣而多武譎網絡張設少愛利敢誅殺師古曰言少仁愛而不能便利於人然亦縱舍時有大貸師古曰縱放也舍置也貸謂寛假於下也音吐戴反下吏以此為盡力長陵大姓尚方禁師古曰姓尚方名禁少時嘗盗人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以它事召見視其面果有瘢師古曰瘢創痕也音盤痕音胡恩反博辟左右問禁師古曰辟讀曰闢是何等創也禁自知情得師古曰言其得被斫之情狀叩頭服狀博笑曰大丈夫固時有是師古曰言情欲之事人所不免馮翊欲洒卿恥抆拭用禁師古曰抆拭摩也洒音先禮反抆音文粉反能自效不禁且喜且懼對曰必死師古曰言盡死力也博因敇禁毋得泄語有便宜輙記言師古曰不令泄扙拭之言而外有便宜之事為書記以言於博因親信之以為耳目禁晨夜發起部中盗賊及它伏姦有功效博擢禁連守縣令久之召見功曹閉閤數責以禁等事與筆札使自記積受取一錢以上無得有所匿師古曰積累前後受取之事欺謾半言斷頭矣師古曰謾誑也音慢又音莫連反功曹惶怖具自疏姦臧大小不敢隠博知其對以實廼令就席受敇自改而已投刀使削所記遣出就職功曹後常戰栗不敢蹉跌師古曰蹉音干何反跌音徒結反博遂成就之師古曰言進逹也}
