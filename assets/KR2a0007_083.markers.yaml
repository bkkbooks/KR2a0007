  - {type: variant, offset: 31, length: 3, content: 天道正, WYG: 疑作已故使掾平鐫令如淳曰平鐫激切使之自知過也普灼曰王常為光武鐫說其將帥此謂徐以微言鐫鑿遣之也師古曰平掾之名鐫謂琢鑿也鐫音子全反蕭該音義曰按普灼之意引鐫與之言能無說乎出論語巽與之言蓋依鄧展鐫音子緣反與此引普灼不同孔子曰陳力就列不能者止師古曰論語載孔子之答冉有季路之言也列次也言自審已之力用而就官次不能則退令詳思之方調守師古曰言欲選}
