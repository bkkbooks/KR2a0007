  - {type: variant, offset: 2350, length: 230, content: 飲酎行祠孝昭廟先敺旄頭劍挺墮墬首垂泥中刃鄉乘輿車馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜玄服入廟取郎間執戟立廟門待上至欲為逆發覺伏誅故事上常夜入廟其後待明而入自此始也賀以筮有應繇是近幸為太中大夫給事中至少府為少府為人小心周密上信重之年老終官傳子臨亦入說為黃門郎甘露中奉使問諸儒於石渠臨學精孰專行京房法琅邪王吉通五經聞臨說善之時宣帝選高材郎十人從臨講吉乃使其子郎中駿上疏從臨受易臨代五鹿充宗君孟為少府駿, WYG: 餘}
