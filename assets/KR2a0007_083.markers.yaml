  - {type: variant, offset: 4791, length: 0, content: '', WYG: 與凡民爭鬭無異殺人者死傷人者刑古今之通道三代所不易也孔子曰必也正名名不正則至於刑罰不中刑罰不中而民無所錯手足師古曰論語載孔子之言也錯置也音千故反今以况為首惡明手傷為}
