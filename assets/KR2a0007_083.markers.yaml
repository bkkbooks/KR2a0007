  - {type: variant, offset: 8, length: 0, content: '', WYG: 曰贛音貢郯音談宋祁曰贛如淳音鉗少為廷尉書佐都船獄吏宋祁曰吏疑是史後以大司農斗食屬察廉補不其丞師古曰斗食者禄少一嵗不滿百石計日以斗為數也不其縣名也其音基宋祁曰注文也字當刪琅邪太守趙貢行縣師古曰行下更反其下亦同宋祁曰注文行字下當有音字見宣甚說其能師古曰說讀曰悅從宣歴行屬縣師古曰以宣自從也還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣㢘遷樂浪都尉丞師古曰趙貢察舉宣故得遷也樂音洛浪音郎幽州刺史舉茂材為宛句令師古曰樂浪屬幽州故為刺史所舉也宛於元反句音劬宋祁曰注文宛字下當有音字大將軍王鳳聞其能薦宣為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至徳仁厚哀閔元元躬有日仄}
  - {type: page-break, offset: 8, content: '', id: KR2a0007_WYG_083-1b, image: WYG0250/WYG0250-0664b.png}
