  - {type: variant, offset: 1452, length: 383, content: 乙科二十人為太子舍人丙科四十人補文學掌故云自魯商瞿子木受易孔子以授魯橋庇子庸子庸授江東馯臂子弓子弓授燕周醜子家子家授東武孫虞子乘子乘授齊田何子裝及秦禁學易為筮卜之書獨不禁故傳受者不絕也漢興田何以齊田徙杜陵號杜田生授東武王同子中雒陽周王孫丁寬齊服生皆著易傳數篇同授淄川楊何字叔元元光中徵為太中大夫齊即墨成至城陽相廣川孟但為太子門大夫魯周霸莒衡胡臨淄主父偃皆以易至大官要言易者本之田何丁寬字子襄梁人也初梁項生從田何受易時寬為項生從者讀易精敏材過項生遂事何學成何謝寬寬東歸何謂門人曰易以東矣寬至雒陽復從周王孫受古義號周氏傳景帝時寬為梁孝王將軍距吳楚號丁將軍作易說三萬言訓故舉大誼而已今小章句是也寬授同郡碭田王孫王孫授施讎孟喜梁丘賀繇是易有施孟梁丘之學施讎字長卿沛人也沛與碭相近讎為童子從田王孫受易後讎徙長陵田王孫為博士復從卒業與孟喜梁丘賀並為門人謙讓常稱學廢不教授及梁丘賀, WYG: 清静遷}
