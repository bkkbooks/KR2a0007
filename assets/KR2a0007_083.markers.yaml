  - {type: variant, offset: 4862, length: 155, content: 國至臨淮太守周霸膠西內史夏寬城陽內史碭魯賜東海太守蘭陵繆生長沙內史徐偃膠西中尉鄒人關門慶忌膠東內史其治官民皆有廉節稱其學官弟子行雖不備而至於大夫郎掌故以百數申公卒以詩春秋授而瑕丘江公盡能傳之徒眾最盛及魯許生免中徐公皆守學教授韋賢治詩事大江公及許生又治禮至丞相傳子玄成以淮陽中尉論石渠後亦至丞相玄成及兄子賞以詩授, WYG: 㑹赦因留與主私亂}
