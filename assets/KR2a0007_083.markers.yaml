  - {type: variant, offset: 7456, length: 356, content: 勝及侍中樂陵侯史高皆魯人也言穀梁子本魯學公羊氏乃齊學也宜興穀梁時千秋為郎召見與公羊家並說上善穀梁說擢千秋為諫大夫給事中後有過左遷平陵令復求能為穀梁者莫及千秋上愍其學且絕乃以千秋為郎中戶將選郎十人從受汝南尹更始翁君本自事千秋能說矣會千秋病死徵江公孫為博士劉向以故諫大夫通達待詔受穀梁欲令助之江博士復死乃徵周慶丁姓待詔保宮使卒授十人自元康中始講至甘露元年積十餘歲皆明習乃召五經名儒太子太傅蕭望之等大議殿中平公羊穀梁同異各以經處是非時公羊博士嚴彭祖侍郎申輓伊推宋顯穀梁議郎尹更始待詔劉向周慶丁姓並論公羊家多不見從願請內侍郎許廣使者亦並內穀梁家中郎王亥各五人議三十餘事望之等十一人各以經誼對多從穀梁由是穀梁之學大盛慶姓皆為博士姓至中山太傅授楚申章昌曼君為博士至長沙太傅徒眾尤盛尹更始為諫大夫長樂戶將又受左氏傳取其變理合者, WYG: 張禹禹}
