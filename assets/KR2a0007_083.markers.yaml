  - {type: variant, offset: 8086, length: 1, content: 修, WYG: 知喜武前已䝉恩詔決事更三赦師古曰詔已罷官事又經三赦也更音工衡反博執左道虧損上恩以結信貴戚背君鄉臣師古曰鄉讀曰嚮傾亂政治姦人之雄附下罔上為臣不忠不道𤣥知博所言非法枉義附從大不敬晏與博議免喜失禮不敬臣請詔謁者召博𤣥晏詣廷尉詔獄制曰將軍中二千石二千石諸大夫博士議郎議右將軍蟜望等四十四人師古曰蟜音矯蕭該案吕靖曰蟜毒蟲也已兆反今借以為矯字此蓋古字無定耳以為如宣等言可許諌大夫龔勝等十四人以為}
