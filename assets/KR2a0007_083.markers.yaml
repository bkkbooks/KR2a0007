  - {type: variant, offset: 8, length: 0, content: '', krp: 曰贛音貢郯音談宋祁曰贛如淳音鉗少為廷尉書佐都船獄吏宋祁曰吏疑是史後以大司農斗食屬察廉補不其丞師古曰斗食者禄少一嵗不滿百石計日以斗為數也不其縣名也其音基宋祁曰注文也字當刪琅邪太守趙貢行縣師古曰行下更反其下亦同宋祁曰注文行字下當有音字見宣甚說其能師古曰說讀曰悅從宣歴行屬縣師古曰以宣自從也還至府令妻子與相見戒曰贛君至丞相我兩子亦中丞相史察宣㢘遷樂浪都尉丞師古曰趙貢察舉宣故得遷也樂音洛浪音郎幽州刺史舉茂材為宛句令師古曰樂浪屬幽州故為刺史所舉也宛於元反句音劬宋祁曰注文宛字下當有音字大將軍王鳳聞其能薦宣為長安令治果有名以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史上疏曰陛下至徳仁厚哀閔元元躬有日仄}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 勞而亡佚豫之樂師古曰周書亡逸之篇稱文王之徳曰至于日中仄弗皇暇食宣引此言也仄古側字也佚與逸同允執聖道刑罰惟中師古曰允信也中竹仲反宋祁曰注文竹字上當有音字然而嘉氣尚凝隂陽不和師古曰凝謂不通也是臣下未稱而聖化獨有不洽者也臣竊伏思其一端殆吏多苛政政教煩碎大率咎在部刺史或不循守條職師古曰刺史所察本有六條今則踰越故事信意舉劾妄為苛刻也六條解在百官公卿表舉錯各以其意多與郡縣事師古曰錯置也音千故反與讀曰豫豫干也至開私門聼讒佞以求吏民過失譴呵及細微責義不量力師古曰言求備於人郡縣相廹促亦内相刻流至衆庻是故鄉黨闕於嘉賔之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行師古曰勞郎到反來郎代反宋祁曰注文勞字下來字下並當有音字夫人道不通則隂陽否鬲師古曰否閉也音皮鄙反鬲與隔同和氣不興未必不由此也詩云民之失徳乾餱以愆師古曰小雅伐木之詩也餱食也解在元紀餱音侯鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敇師古曰申束也謂約束也使昭然知本朝之要務臣愚不知治道唯明主察焉上嘉納之宣數言政事便宜舉奏部刺史郡國二千石所貶退稱進白黑分明師古曰稱舉也白黑猶言清濁也繇是知名師古曰繇讀與由同出為臨淮太守政教大行㑹陳留郡有大賊廢亂師古曰廢亂者政教不行也上徙宣為陳留太守盗賊禁止吏民敬其威信入守左馮翊滿嵗稱職為真始高陵令楊湛櫟陽令謝游皆貪猾不遜持郡短長前二千石數案不能竟師古曰雖毎案驗之不能窮竟其事宋祁曰謝疑作尉字及宣視事詣府謁宣設酒飯與相對接待甚備已而隂求其罪臧具得所受取宣察湛有改節敬宣之效廼手自牒書條其姦臧師古曰牒書謂書於簡牒也封與湛曰吏民條言君如牒或議以為疑於主守盗孟康曰法有主守盗斷官錢自入已也宋祁曰注文也字當刪馮翊敬重令又念十金法重不忍相暴章師古曰依當時律條臧直十金則至重罪故密以手書相曉欲君自圖進退可復伸眉於後師古曰伸眉言無憂也且令自去職不廢其後更為官即無其事復封還記得為君分明之師古曰記謂所與湛書也分明謂考問使知清白也宣恐其距諱即欲驗治之湛自知罪臧皆應記師古曰與宣書記相當而宣辭語温潤無傷害意湛即時解印綬付吏為記謝宣終無怨言而櫟陽令游自以大儒有名輕宣宣獨移書顯責之曰告櫟陽令吏民言令治行煩苛適罰作使千人以上師古曰適讀曰讁賊取錢財數十萬給為非法師古曰言斂取錢財以供給興造非法之用宋祁曰賊字浙本作賦字賣買聼任富吏賈數不可知師古曰賈讀曰價證驗以明白欲遣吏考案恐負舉者恥辱儒士師古曰游本因薦舉得官而身又是}
