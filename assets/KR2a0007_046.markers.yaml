  - {type: variant, offset: 1441, length: 0, content: '', WYG: 服虔曰力士能扶戲車也應劭曰能左右超乗師古曰二説皆非也戲車若今之弄車之技功次遷中郎將醇謹無它師古曰無它餘志念也孝景為太子時召上左右飲而綰稱病不行張晏曰恐文帝謂豫有二心事太子文帝且崩時屬孝景曰綰長者善遇之及景帝立歲餘不孰何綰服虔曰不問也李奇曰孰誰也何呵也師古曰何即問也不誰何者猶言不借問耳劉奉世曰誰何漢之通語不須解為借問綰日以謹力師古曰自勉力為謹慎日日益甚景帝幸上林詔中郎將參乘還而問曰君知所以得參乘乎師古曰言何以得參乘綰曰臣代戲車士幸得功次遷待罪中郎將不知也上問曰吾為太子時召君君不肯來何也師古曰言以此特識之對曰死罪病上賜之劒綰曰先帝賜臣劒凡六不敢奉詔上曰劒人之所施易獨至今乎如淳曰施讀曰移言劒者人所好故多數移易貿換之也師古曰施讀曰貤貤延也音弋豉反綰曰具在上使取六劒劒常盛未嘗服也師古曰盛謂在削室之中也盛音成削音先召反郎官有譴常蒙其罪師古曰蒙謂覆蔽之不與它將爭有功常讓它將上以為亷忠實無它腸師古曰心腸之内無它惡宋祁云一本它作心乃拜綰為河間王太傅吳楚反詔綰為將將河間兵擊吳楚有功拜為中尉三歲以軍功封綰為建陵侯明年上廢太子誅栗卿之屬師古曰太子廢為臨江王故誅其外家親屬上以綰為長者不忍乃賜綰告歸而使郅都治捕栗氏既已上立膠東王為太子召綰拜為太子太傅遷為御史大夫五歲代桃侯舎為丞相師古曰劉舍朝奏事如職所奏師古曰言守職分而已然自初宦以至相終無可言師古曰不能有所興建及廢罷上以為敦厚可相少主尊寵之賞賜甚多為丞相三歲景帝崩武帝立建元中丞相以景帝病時諸官囚多坐不辜者而君不任職師古曰天子不親政則丞相當理之而綰不申其寃免之後薨諡曰哀侯子信嗣坐酎金國除直不疑南陽人也為郎事文帝其同舎有告歸誤持其同舍郎金去已而同舍郎覺亡意不疑師古曰疑其盜取不疑謝有之師古曰告云實取宋祁曰别本無謝字買金償後告歸者至而歸金亡金郎大慙以此稱為長者稍遷至中大夫朝廷見人或毁不疑師古曰當於闕廷大朝見之時而人毁之劉敞曰朝廷見人謂逹官也曰不疑狀貌甚美然特無奈其善盜嫂何也師古曰盜謂私之不疑聞曰我乃無兄然終不自明也吳楚反時不疑以二千石將擊之景帝後元年拜為御史大夫天子脩吳楚時功封不疑為塞侯師古曰塞音先代反武帝即位與丞相綰俱以過免不疑學老子言其所臨為官如故唯恐人之知其為吏迹也不好立名稱為長者薨諡曰信侯傳子至孫彭祖坐酎金國除周仁其先任城人也以毉見師古曰見於天子景帝為太子時為舎人積功遷至大中大夫景帝初立拜仁為郎中令仁為人陰重不泄服䖍曰質重不泄人之陰謀也張晏曰陰重不泄下濕故溺袴是以得比宦者得入後宮也仁有子孫先未得此疾時所生也師古曰張服二説皆非也陰宻也為性宻重不泄人言也霍去病少言不泄亦其類也常衣弊補衣溺袴故為不絜清師古曰故為不絜清之事而弊敗其衣服也溺讀曰尿尿袴者為小袴以藉其尿劉奉世曰袴非小袴能藉則近絜矣此常袴溺瀝其上不洗濯之以其不潔之故人惡逺之乃得至後宮也宋祁云越本作期為不絜清以是得幸入卧内於後宮祕戲仁常在旁終無所言師古曰是不泄也上時問人師古曰問以他人之善惡仁曰上自察之然亦無所毁如此師古曰雖知其惡不欲言毁之故云上自察之景帝再自幸其家家徙陽陵上所賜甚多然終常讓不敢受也諸侯羣臣賂遺終無所受武帝立為先帝臣重之師古曰重謂敬難也仁乃病免以二千石禄歸老子孫咸至大官張敺字叔孟康曰敺音驅高祖功臣安丘侯説少子也師古曰説讀曰悦敺孝文時以治刑名侍太子師古曰劉向别録云申子學號曰刑名刑名者循名以責實其尊君卑臣崇上抑下合于六經説者云刑刑家名名家也即太史公所論六家之二也此説非劉攽曰予謂刑名者即并學兩家術耳然其人長者}
