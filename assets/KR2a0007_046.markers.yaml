  - {type: variant, offset: 996, length: 136, content: 之爪牙也司馬法曰登車不式遭喪不服振旅撫師以征不服率三軍之心同戰士之力故怒形則千里竦威振則萬物伏是以名聲暴於夷貉威稜憺乎鄰國夫報忿除害捐殘去殺朕之所圖於將軍也若乃免冠徒跣稽顙請罪豈朕之指哉將軍其率師東轅彌節白檀以臨右北平盛秋廣在郡匈奴號曰漢飛將軍避之數歲不入界廣出獵見草中石, WYG: 雖齊魯諸儒質行皆自}
