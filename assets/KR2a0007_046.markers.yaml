  - {type: variant, offset: 1193, length: 0, content: '', WYG: 少子慶為内史建老白首萬石君尚無恙師古曰恙憂病每五日洗沐歸謁親文穎曰郎官五日一下劉奉世曰建為郎中令慶為内史非郎官也按霍光秉政亦休沐然則漢公卿以下皆有休沐也入子舍師古曰入諸子之舍自其所居也若今言諸房矣竊問侍者取親中帬廁牏身自澣洒服虔曰親身之衣也蘇林曰牏音投賈逵解周官云牏行清也孟康曰厠行清牏中受糞函者也東南人謂鑿木空中如曹謂之牏晉灼曰今世謂反閉小袖衫為侯牏師古曰親謂父也中帬若今言中衣也廁牏者近身之小衫若今汗衫也蘇音晉説是矣洒音先禮反復與侍者不敢令萬石君知之以為常建奏事於上前即有可言屏人乃言極切師古曰有可言謂有事當奏諫至廷見如不能言者師古曰廷見謂當朝而見時上以是親而禮之萬石君徙居陵里師古曰茂陵邑中之里劉攽曰長安中自有里名陵非茂陵里也内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒謝請罪不許舉宗及兄建肉袒萬石君讓曰師古曰讓責也内史貴人入閭里里中長老皆走匿而内史坐車中自如固當師古曰此深責之也言内史貴人正固當爾廼謝罷慶師古曰告令去慶及諸子入里門趨至家萬石君}
