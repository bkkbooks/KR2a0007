  - {type: variant, offset: 1220, length: 1, content: 廣, WYG: 五建時上書誤作四師古曰馬字下曲者為尾并四㸃為四足凡五今乃四不足一獲譴死矣其為謹慎雖他皆如是慶為太僕御出師古曰為上御車而出上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此出為齊相齊國慕其家行不治而齊國大治師古曰不治言無所治罰為立石相祠元狩元年上立太子選羣臣可傅者慶自沛守為太子太傅七歲遷御史大夫宋本七作十元鼎五年丞相趙周坐酎金免制詔御史萬石君先帝尊之子孫至孝其以御史大夫慶為丞相封牧丘侯是時漢方南誅兩越東擊朝鮮北逐匈奴西伐大宛中國多事天子廵狩海内脩古神祠封禪興禮樂公家用少桑宏羊等致利王溫舒之屬峻法兒寛等推文學九卿更進用事師古曰更互也音工衡反事不闗決於慶慶醇謹而已師古曰醇專厚也音純在位九歲無能有所匡言嘗欲請治上近臣所忠九卿咸宣服虔曰咸音減損之減師古曰治所忠及咸宣二人不能服反受其過贖罪元封四年闗東流民二百萬口無名數者四十萬師古曰名數若今户籍公卿議欲請徙流民於邊以適之師古曰適讀曰讁上以為慶老謹不能與其議師古曰與讀曰豫乃賜丞相告歸而案御史大夫以下議為請者慶慙不任職上書曰臣幸得待罪丞相疲駑無以輔治城郭倉廪空虚民多流亡罪當伏斧質上不忍致法願歸丞相侯印乞骸骨歸避賢者路上報曰間者河水滔陸晉灼曰滔漫也師古曰高平曰陸漫音莫干反泛濫十餘郡隄防勤勞弗能陻塞師古曰陻填也音因朕甚憂之是故廵方州張晏曰四方之州也師古曰東方諸州劉奉世曰後有濟淮江則不特東方州也宋祁曰注諸州州字當作侯禮嵩嶽通八神以合宣房孟康曰八神郊祀志八神也於宣房宮合祀之師古曰此説非也自言致禮中岳通敬八神耳合宣房者於宣房塞决河也事見溝洫志濟淮江歴山濱海師古曰濱海者循海涯而行也濱音賓又音頻問百年民所疾苦惟吏多私徵求無已師古曰惟思也已止也去者便居者擾故為流民法以禁重賦師古曰言百姓去其本土者則免於吏徵求在舊居者則見煩擾故朝廷特為流人設法又禁吏之重賦也一曰去者謂吏出使而侵擾居人以自便也劉攽曰是時設此法流民若干吏坐其罪所以禁重賦也劉敞曰此言以流民多少課吏殿最所以禁吏重賦乃者封泰山皇天嘉況神物並見師古曰況賜也見顯示也朕方答氣應未能承意師古曰言自脩整以報瑞應恐未承順上天之意是以切比閭里知吏姦邪師古曰比校考也音頻寐反劉奉世曰比近也此言因廵守經過閭里與民切近始得知吏素為姦故下又言因已委任有司之過故官曠民愁盜賊公行也委任有司然則官曠民愁盜賊公行師古曰曠空也人不舉職是空其官徃年覲明堂赦殊死無禁錮咸自新與更始今流民愈多計文不改蘇林曰校户口文書不改減也如淳曰郡上計文書自文餙不改正也師古曰如説是君不繩責長吏而請以興徙四十萬口劉奉世曰興讀如}
