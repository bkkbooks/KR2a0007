  - {type: variant, offset: 1223, length: 1, content: 功, WYG: 罪而坐率服虔曰率坐刑法也如淳曰率家長也師古曰㓜年無罪坐為父兄所率而并徙如説近之朕失望焉今君上書言倉庫城郭不充實民多貧盜賊衆請入粟為庻人服虔曰慶自以居相位不能理請入粟贖已罪退為庻人夫懷知民貧而請益賦師古曰懷此心宋祁云浙本注此心字下有也字動危之而辭位師古曰揺動百姓使其危急而自欲去位欲安歸難乎師古曰以此危難之事欲歸之於何人君其反室師古曰若此自謂理當然者可還家慶素質見詔報反室自以為得許欲上印綬掾史以為見責甚深而終以反室者醜惡之辭也或勸慶宜引決師古曰令自殺慶甚懼不知所出遂復起視事慶為丞相文深審謹無他大畧}
