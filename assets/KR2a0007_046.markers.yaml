  - {type: substitution, offset: 44, original: 匈, replacement: 胸, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20162}}
  - {type: variant, offset: 47, length: 639, content: 入蕭關而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉景帝即位為騎郎將吳楚反時為驍騎都尉從太尉亞夫戰昌邑下顯名以梁王授廣將軍印故還賞不行為上谷太守數與匈奴戰典屬國公孫昆邪為上泣曰李廣材氣天下亡雙自負其能數與虜确恐亡之上乃徙廣為上郡太守匈奴侵上郡上使中貴人從廣勒習兵擊匈奴中貴人者將數十騎從見匈奴三人與戰射傷中貴人殺其騎且盡中貴人走廣廣曰是必射鵰者也廣乃從百騎往馳三人三人亡馬步行行數十里廣令其騎張左右翼而廣身自射彼三人者殺其二人生得一人果匈奴射鵰者也已縛之上山望匈奴數千騎見廣以為誘騎驚上山陳廣之百騎皆大恐欲馳還走廣曰我去大軍數十里今如此走匈奴追射我立盡今我留匈奴必以我為大軍之誘不我擊廣令曰前未到匈奴陳二里所止令曰皆下馬解鞍騎曰虜多如是解鞍即急柰何廣曰彼虜以我為走今解鞍以示不去用堅其意有白馬將出護兵廣上馬與十餘騎奔射殺白馬將而復還至其百騎中解鞍縱馬臥時會暮胡兵終怪之弗敢擊夜半胡兵以為漢有伏軍於傍欲夜取之即引去平旦廣乃歸其大軍後徙為隴西北地雁門雲中太守武帝即位左右言廣名將也由是入為未央衛尉而程不識時亦為長樂衛尉程不識故與廣俱以邊太守將屯及出擊胡而廣行無部曲行陳就善水草頓舍人人自便不擊刁斗自衛莫府省文書然亦遠斥候未嘗遇害程不識正部曲行伍營陳擊刁斗吏治軍簿至明軍不得自便不識曰李將軍極簡易然虜卒犯之無以禁而其士亦佚樂為之死我軍雖煩擾虜亦不得犯我是時漢邊郡李廣程不識為名將然匈奴畏廣士卒多樂從而苦程不識不識孝景時以數直諫為太, WYG: ''}
