  - {type: variant, offset: 16, length: 0, content: '', WYG: 逢信邪枉貪汙營私多欲皆知陳湯姦佞傾覆利口不軌而親交賂遺以求薦舉後為少府數饋遺湯信咸幸得備九卿不思盡忠正身内自知行辟亡功效師古曰辟讀曰僻而官媚邪臣欲以徼幸苟得亡恥孔子曰鄙夫可與事君也與哉師古曰論語載孔子之言也謂鄙夫可與事君也與哉與讀曰歟咸信之謂也過惡暴見不宜處位臣請免以示天下奏可後二嵗餘詔舉方正直言之士紅陽侯立舉咸對策拜為光祿大夫給事中方進復奏咸前為九卿坐為貪邪免自知罪惡暴陳依託紅陽侯立徼幸有司莫敢舉奏冐濁苟容師古曰冐貪蔽也不顧恥辱不當䝉方正舉備内朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立後數年皇太后姊子侍中衞尉定陵侯淳于長有罪上以太后故免官勿治罪有司奏請遣長就國長以金錢與立立上封事為長求留曰陛下既託文以皇太后故蘇林曰託於詔文也誠不可更有它計師古曰言不宜遣長就國後長隂事發遂下獄宋祁曰浙本云隂事𤼵遂下獄方進劾立懐姦邪亂朝政欲傾誤要主上狡猾不道請下獄上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友曰立素行積為不善衆人所共知邪臣自結附託為黨庻幾立與政事欲獲其利師古曰與讀曰豫今立斥逐就國所交結尤著者不宜備大臣為郡守案後將軍朱博鉅鹿太守孫閎故光禄大夫陳咸與立交通厚善相與為腹心有背公死黨之信師古曰死黨盡死力於朋黨也欲相攀援死而後已師古曰援引也已止也援音爰皆内有不仁之性而外有儁材過絶於人倫宋祁曰一作於人無倫字監本有倫字勇猛果敢處事不疑所居皆尚殘賊酷虐苛刻慘毒以立威而亡纖介愛利之風師古曰愛利謂仁愛而欲安利人也天下所共知愚者猶惑孔子曰人而不仁如禮何人而不仁如樂何師古曰論語載孔子之言也言用不仁之人則禮樂廢壊言不仁之人亡所施用不仁而多材國之患也此三人皆内懐姦猾國之所患而深相與結信於貴戚姦臣此國家大憂大臣所宜没身而爭也師古曰没盡也昔季孫行父有言曰宋祁曰父疑作甫見有善於君者愛之若孝子之養父母也見不善者誅之若鷹鸇之逐鳥爵也師古曰事見左傳行父魯卿季文子也鸇似鷂而小今謂之土鸇鸇音之然反翅翼雖傷不避也貴戚彊黨之衆誠難犯犯之衆敵並怨善惡相冒師古曰冒覆蔽也臣幸得備宰相不敢不盡死請免博閎咸歸故郡以銷姦雄之黨絶羣邪之望奏可咸既廢錮宋祁曰姚本既作知復徙故郡以憂發疾而死宋祁曰監本楊本云以憂𤼵疾而死别本越本云以憂死方進知能有餘兼通文法吏事以儒雅緣飭法律號為通明相天子甚器重之奏事亡不當意内求人主微指以固其位初定陵侯淳于長雖外戚然以能謀議為九卿新用事方進獨與長交稱薦之及長坐大逆誅諸所厚善皆坐長免上以方進大臣又素重之為隱諱方進内慙上疏謝罪乞骸骨上報曰定陵侯長已伏其辜君雖交通𫝊不云乎朝過夕改君子與之師古曰與許也君何疑焉其専心壹意毋怠近醫藥以自持宋祁曰監本有近字别本無方進廼起視事條奏長所厚善京兆尹孫寳右扶風蕭育刺史二千石以上免二十餘人其見任如此方進雖受榖梁然好左氏傳天文星歴其左氏則國師劉歆星歴則長安令田終術師也如淳曰劉歆及田終術二人皆受學於方進厚李尋以為議曹為相九嵗綏和二年春熒惑守心尋奏記言應變之權君侯所自明往者數白三光垂象變動見端張晏曰九年之中而日三食月朓側匿星孛營室東井熒惑守心山川水泉反理視患張晏曰元延中㟭山崩壅江江水不流山地之鎮宜固而崩水逆流反於常理所以示人患也師古曰視讀曰示}
