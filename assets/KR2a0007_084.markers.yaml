  - {type: variant, offset: 11, length: 0, content: '', WYG: 咸最先進自元帝初為御史中丞顯名朝廷矣成帝初即位擢為部刺史歴楚國北海東郡太守陽朔中京兆尹王章譏切大臣而薦琅邪太守馮野王可代大將軍王鳳輔政東郡太守陳咸可御史大夫是時方進甫從博士為刺史云師古曰甫始也後方進為京兆尹咸從南陽太守入為少府與方進厚善先是逢信已從高第郡守歴京兆太僕為衞尉矣官簿皆在方進之右師古曰簿謂伐閱也簿音主簿之簿宋祁曰官簿一作薄及御史大夫缺三人皆名卿俱在選中而方進得之㑹丞相宣有事與方進相連上使五二千石雜問丞相御史晉灼曰大臣獄重故以秩二千石五人詰責之咸詰責方進冀得其處方進心恨初大將軍鳳奏除陳湯為中郎與從事師古曰毎有政事皆與謀之而行也鳳薨後從弟車騎將軍音宋祁曰邵本無從字代鳳輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳳音所久之音薨鳳弟成都侯商復為大司馬衞將軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙敦煌時方進新為丞相陳咸内懼不安廼令小冠杜子夏往觀其意微自解説師古曰解說猶今言分疏子夏既過方進揣知其指不敢發言師古曰揣謂探求之音初委}
