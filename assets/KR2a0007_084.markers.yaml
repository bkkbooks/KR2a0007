  - {type: variant, offset: 4604, length: 189, content: 十斤遷河南太守治行常為第一復數增秩賜金竟寧中徵為少府列於九卿奏請上林諸離遠宮館稀幸御者勿復繕治共張又奏省樂府黃門倡優諸戲及宮館兵弩什器減過泰半太官園種冬生葱韭菜茹覆以屋廡晝夜燃蘊火待溫氣乃生信臣以為此皆不時之物有傷於人不宜以奉供養及它非法食物悉奏罷省費歲數千萬信臣年老以官卒元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠, WYG: 考證}
