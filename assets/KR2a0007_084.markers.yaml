  - {type: variant, offset: 23, length: 4, content: 禁罔疏闊, WYG: 定師古曰粤辭也天道輔誠爾不得改易天之定命況今天降定于漢國惟大囏人翟義劉信大逆欲相伐于厥室豈亦知命之不易乎師古曰言義信不知天命不可改易乃大為囏難以干國紀是自相謀誅伐其室也囏古艱字予永念曰天惟喪翟義劉信若嗇夫予害敢不終予畮師古曰嗇夫治田志除草穢天之欲喪義信事亦如之我當順天以終竟田畮之事天亦惟休于祖宗予害其極卜害敢不于從師古曰言天羙祖宗之事我何其極卜法敢不往從言必從也率寧人有㫖疆土況今卜并吉師古曰言循祖宗之業務在安人}
