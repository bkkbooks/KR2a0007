  - {type: variant, offset: 1530, length: 462, content: 語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問豪氂不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸具為區處某所大木可以為棺某亭猪子可以祭吏往皆如言其識事聰明如此吏民不知所出咸稱神明姦人去入它郡盜賊日少霸力行教化而後誅罰務在成就全安長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及姦吏緣絕簿書盜財物公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寬內明得吏民心戶口歲增治為天下第一徵守京兆尹秩二千石坐發民治馳道不先以聞又發騎士詣北軍馬不適士劾乏軍興連貶秩有詔歸潁川太守官以八百石治如其前前後八年郡中愈治是時鳳皇神爵數集郡國潁川尤多天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子弟弟貞婦順孫日以眾多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年亡重罪囚吏民鄉于教化興於行誼可謂賢人君子矣書不云乎股肱良哉其賜爵關內侯黃金百斤秩中二千石而潁川孝弟有行義民三老力田皆以差賜爵及帛後數月微霸為太子太傅遷, WYG: ''}
