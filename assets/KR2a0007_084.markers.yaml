  - {type: variant, offset: 21, length: 1, content: 簡, WYG: 予思若考作室厥子堂而構之師古曰父有作室之意則子當築堂而構棼橑以成之厥父菑厥子播而穫之師古曰父菑耕其田子當布種而收穫之反土為菑一曰田一嵗曰菑予害敢不於身撫祖宗之所受大命師古曰作室農人猶不弃其本業我於今日不得有避而不征討叛逆也若祖宗廼有效湯武伐厥子民長其勸弗救師古曰譬有人來伐其子而長養彼心反勸助之弗救其子者止以子惡故也言湯武疾惡其心亦然今所征討不得避親當以公義烏虖肆哉師古曰肆陳也勸令陳力諸侯王公列侯卿大夫元士御事其勉助國道明師古曰道由也言當由於明智之事以助國也亦惟宗室之俊民之表儀迪知上帝命師古曰迪亦道也言當遵道而知天命粤天輔誠爾不得}
