  - {type: variant, offset: 6, length: 0, content: '', WYG: 四翟方進字子威汝南上蔡人也家世微賤至方進父翟公好學為郡文學方進年十二三失父孤學給事太守府為小史號遲頓不及事師古曰頓讀曰鈍數為掾史所詈辱方進自傷廼從汝南蔡父相問已能所宜師古曰言從何術蓺可以自達蔡父大竒其形貌謂曰小史有封侯骨當以經術進努力為諸生學問淳化本努作怒方進既厭為小史聞蔡父言心喜因病歸家辭其後母欲西至京師受經母憐其幼宋祁曰於母字上疑有後字隨之長安織屨以給方進讀經博士受春秋積十餘年經學明習徒衆日廣諸儒稱之以射策甲科為郎二三嵗舉明經遷議郎是時宿儒有清河胡常師古曰宿久舊也與方進同經常為先進名譽出方進下師古曰常宦學雖在前而名譽不及方進心害其能論議不右方進師古曰毁短也劉攽曰多一論字方進知之候伺常大都授時師古曰都授謂總集諸生大講授也遣門下諸生至常所問大義疑難因記其說如是者久之常知方進之宗讓已師古曰宗尊也内不自得其後居士大夫之間未甞不稱述方進遂相親友河平中方進轉為博士數年遷朔方刺史居官不煩苛所察應條輙舉甚有威名再三奏事師古曰刺史嵗盡輙奏事京師也遷為丞相司直從上甘泉行馳道中司隸校尉陳慶劾奏方進没入車馬既至甘泉宫㑹殿中慶與廷尉范延夀語時慶有章劾自道行事以贖論師古曰當祭泰畤時行事有闕失罪合贖劉敞曰漢時人言行事成事皆謂已行已成事也王充書亦有之又下文所謂自設不坐之比是也今尚書持我事來當於此決前我為尚書時嘗有所奏事忽忘之留月餘師古曰言此者冀尚書忘已之事不奏劉敞曰予謂非冀尚書忘已不奏也言及之耳尋下文可見方進於是舉劾慶曰案慶奉使刺舉大臣故為尚書知機事周密壹統明主躬親不解師古曰解讀曰懈慶有罪未伏誅無恐懼心豫自設不坐之比師古曰比例也音必寐反又暴揚尚書事言遲疾無所在虧損聖徳之聰明奉詔不謹皆不敬師古曰既自云不坐又言遲疾無所在此之二條於法皆為不敬臣謹以劾慶坐免官㑹北地浩商為義渠長所捕亡師古曰義渠北地之縣也商被縣長捕而逃亡長取其母與豭豬連繫都亭下師古曰以深辱之豭牡豕也音家商兄弟㑹賔客自稱司隸掾長安縣尉殺義渠長妻子六人亡丞相御史請遣掾史與司隸校尉部刺史并力逐捕察無狀者師古曰無狀謂商及義渠長本狀之違曲也劉攽曰謂察司隸刺史捕賊之無狀者故下文云以宰士督察奉使命大夫奏可司隸校尉㳙勲奏言春秋之義王人微者序乎諸侯之上尊王命也臣幸得奉使以督察公卿以下為職師古曰督視也今丞相宣請遣掾史以宰士督察天子奉使命大夫師古曰謂丞相掾史為宰士者言其宰相之屬官而位為士也奉使命大夫謂司隸也甚誖逆順之理師古曰誖乖也音布内反宣本不師受經術因事以立姦威案浩商所犯一家之禍耳而宣欲専權作威乃害于乃國不可之大者師古曰周書洪範云臣之有作福作威乃凶于乃國害于厥躬故引之宋祁曰乃監本作廼姚本刪願下中朝特進列侯將軍以下正國法度議者以為丞相掾不宜移書督趣司隸師古曰趣讀曰促㑹浩商捕得伏誅家屬徙合浦故事司隸校尉位在司直下初除謁兩府師古曰丞相及御史也其有所㑹居中二千石前與司直並迎丞相御史初方進新視事而涓勲亦初拜為司隸不肯謁丞相御史大夫後朝㑹相見禮節又倨師古曰倨傲也方進隂察之勲私過光禄勲辛慶忌又出逢帝舅成都侯商道路下車立􅓄過廼就車師古曰􅓄待也於是方進舉奏其狀因曰臣聞國家之興尊尊而敬長宋祁曰楊本複有敬長二字爵位上下之禮王道綱紀師古曰言王道綱紀以尊卑上下之禮為大也春秋之義尊上公謂之宰海内無不統焉丞相進見聖主御坐為起在輿為下師古曰漢舊儀云皇帝見丞相起謁者贊稱曰皇帝為丞相起起立乃坐皇帝在道丞相迎謁謁者贊稱曰皇帝為丞相下輿立乃升車羣臣宜皆承順聖化以視四方師古曰視讀曰示勲吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿師古曰謾讀與慢同易音弋䜴反而又詘節失度邪讇無常師古曰讇古諂字也私過辛慶忌見王商而下車是邪讇也色厲内荏應劭曰荏屈撓也師古曰論語稱孔子曰色厲而内荏譬諸小人其猶穿窬之盗也與言外色莊厲而内懐荏弱故方進引以為言墮國體師古曰墮毁也音火規反亂朝廷之序不宜處位臣請下丞相免勲時大中大夫平當給事中奏言方進國之司直不自敇正以先羣下前親犯令行馳道中司隸慶平心舉劾方進不自責悔而内挾私恨伺記慶之從容語言師古曰從音七容反以詆欺成罪師古曰詆毁也音丁禮反後丞相宣以一不道賊如淳曰律殺不辜一家三人為不道請遣掾督趣司隸校尉司隸校尉勲自奏暴於朝廷今方進復舉奏勲議者以為方進不以道徳輔正丞相苟阿助大臣欲必勝立威師古曰必勝必取勝宜抑絶其原勲素行公直姦人所惡可少寛假使遂其功名上以方進所舉應科不得用逆詐廢正法師古曰逆詐者謂以詐意逆猜人也逆迎也論語子曰不逆詐遂貶勲為昌陵令方進旬嵗間免兩司隸師古曰旬徧也滿也旬嵗猶言滿嵗也若十日之一周朝廷由是憚之丞相宣甚器重焉常誡掾史謹事司直翟君必在相位不久是時起昌陵營作陵邑貴戚近臣子弟賔客多辜𣙜為姦利者師古曰𣙜専也辜𣙜者言已自専之它人取者輙有辜罪宋祁曰學林云辜𣙜者乃阻障而獨阻其利後漢靈帝紀光和四年豪右辜𣙜馬一匹至二百萬章懐注引前書音義曰辜障也謂障餘人賣買而自取其利此訓是也師古以謂他人取者輙有辜罪此訓迂矣方進部掾史覆案發大姦臧數千萬上以為任公卿師古曰任堪也欲試以治民徙方進為京兆尹搏擊豪彊京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜師古曰言當犯迕貴戚而見毁也方進心知所謂其後少弛威嚴師古曰弛懈也居官三嵗永始二年遷御史大夫數月㑹丞相薛宣坐廣漢盗賊羣起及太皇太后喪時三輔吏並徴發為姦師古曰並音歩浪反免為庻人方進亦坐為京兆尹時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺羣臣多舉方進上亦器其能遂擢方進為丞相封高陵侯食邑千户身既富貴而後母尚在方進内行修飭供養甚篤師古曰飭謹也篤厚也及後母終既𦵏三十六日除服起視事以為身備漢相不敢踰國家之制師古曰漢制自文帝遺詔之後國家遵以為常大功十五日小功十四日緦麻七日方進自以大臣故云不敢踰制為相公絜請託不行郡國師古曰言不以私事託於四方郡國持法刻深舉奏牧守}
