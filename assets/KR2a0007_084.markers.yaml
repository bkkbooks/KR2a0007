  - {type: variant, offset: 17, length: 0, content: '', WYG: 人訛謡斥事感名如淳曰斥事井水溢之事也有言溢者後果井溢感名燕燕尾涎涎是也宋祁曰注文井監作并三者既效可為寒心今提揚眉矢貫中服䖍曰提攝提星也揚眉揚其芒角也矢枉矢也孟康曰綏和元年正月枉矢從東南入北斗攝提與北斗杓建寅貫攝提中是也張晏曰矢一星貫中者謂正直弧中也狼奮角弓且張張晏曰狼一星奮角者有芒角也狼芒角則盗賊起天弓九星不欲明明猶張也兵起之象金歴庫土逆度張晏曰庫二十星在軫南金太白也歴武庫則兵起土鎮星也逆度逆行也輔湛沒火守舍張晏曰北斗第四星旁一小星曰輔沈沒不見則天下之兵銷三十日為守舍謂日月所經宿舍也一曰大守舍熒惑守心師古曰湛讀曰沈萬嵗之期近慎朝暮師古曰萬嵗之期謂死也慎朝暮者言其事在朝夕上無惻怛濟世之功下無推讓避賢之效欲當大位為具臣以全身難矣師古曰具臣具位之臣無功徳也大責日加安得但保斥逐之勠師古曰言其事重不但斥逐而已劉敞曰勠改戮闔府三百餘人唯君侯擇其中與盡節轉凶師古曰三百餘人謂丞相之官屬也方進憂之不知所出㑹郎賁麗善為星師古曰賁姓也麗名也賁音肥言大臣宜當之上廼召見方進還歸未及引決上遂賜冊曰皇帝問丞相君有孔子之慮孟賁之勇朕嘉與君同心一意庻幾有成惟君登位于今十年灾害並臻民被飢餓加以疾疫溺死闗門牡開張晏曰元延元年章門函谷門牡自亡宋祁曰按五行志注晉灼曰章城門西出南頭第一門也牡是出籥者師古曰牡所以下閉者以鐵為之非出籥也失國守備盗賊黨軰師古曰黨衆多宋祁曰監本浙本作盗黨羣軰姚本作盗賊羣軰吏民殘賊毆殺良民師古曰毆擊也音一口反斷獄嵗嵗多前上書言事交錯道路懐姦朋黨相為隠蔽皆亡忠慮羣下兇兇更相嫉妬師古曰更音工衡反其咎安在觀君之治無欲輔朕富民便安元元之念間者郡國榖雖頗孰師古曰間謂近者以來百姓不足者尚衆前去城郭未能盡還夙夜未嘗忘焉朕惟往時之用與今一也師古曰謂財用也百僚用度各有數君不量多少一聼羣下言用度不足奏請一切増賦税城郭堧及園田過更筭馬牛羊張晏曰一切權時也堧城郭旁地園田入多益其稅也百人為卒取一人所贍常為之月用二千使人直之謂之過更又牛馬羊頭數出税筭千輸二十也師古曰堧音人緣反解在食貨志増益鹽鐵變更無常朕既不明隨奏許可後議者以為不便制詔下君君云賣酒醪後請止未盡月復奏議令賣酒醪朕誠怪君何持容容之計無忠固意師古曰容容隨衆上下也將何以輔朕帥道羣下而欲久䝉顯尊之位豈不難哉師古曰蒙冐也𫝊曰高而不危所以長守貴也師古曰孝經之言也欲退君位尚未忍君其孰念詳計塞絶姦原憂國如家務便百姓以輔朕朕既已改君其自思强食慎職使尚書令賜君上尊酒十石養牛一君審處焉方進即日自殺如淳曰漢儀注有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起病聞上祕之遣九卿冊贈以丞相高陵侯印綬賜乘輿祕器少府供張柱檻皆衣素師古曰柱屋柱也檻軒前闌版也皆以白素衣之天子親臨弔者數至禮賜異於它相故事師古曰漢舊儀云丞相有疾皇帝法駕親至問疾從西門入即薨移居第中車駕往弔賜棺棺斂具贈錢葬地葬日公卿已下㑹葬焉宋祁曰注文已字當作以諡曰恭侯長子宣嗣宣字太伯亦明經篤行君子人也及方進在為闗都尉南郡太守師古曰言方進未死之時宣已為此官少子曰義義字文仲少以父任為郎稍遷諸曹年二十出為南陽都尉宛令劉立與曲陽侯為婚又素著名州郡輕義年少義行太守事行縣至宛師古曰行音下更反其下並同丞相史在𫝊舍立持酒肴謁丞相史對飲未訖宋祁曰相對飲浙本無相字景祐本無飲字㑹義亦往外吏白都尉方至立語言自若師古曰自若言如故宋祁曰自監本作目須臾義至内謁徑入師古曰内謁猶今之通名也立廼走下義既還大怒陽以它事召立至以主守盗十金賊殺不辜部掾夏恢等收縛立𫝊送鄧獄師古曰部分其掾而遣之鄧亦南陽之縣恢亦以宛大縣恐見簒奪白義可因隨後行縣送鄧師古曰因太守行縣以立自隨即送鄧之獄義曰欲令都尉自送則如勿收邪師古曰言若都尉自送至獄不如本不收治載環宛市廼送師古曰環繞也音下串反吏民不敢動威震南陽立家輕騎馳從武闗入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏敇義出宛令宛令已出吏還白狀方進曰小兒未知為吏也其意以為入獄當輙死矣師古曰謂其不知立有所持挾以自免脫後義坐法免起家而為𢎞農太守遷河内太守青州牧所居著名有父風烈徙為東郡太守數嵗平帝崩王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望師古曰言漸試天下人心必代漢家其漸可見方今宗室衰弱外無彊蕃天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝師古曰埋名謂身埋而名立今欲發之乃肯從我乎師古曰乃汝也豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀及東郡王孫慶素有勇略以明兵法徴在京師義廼詐移書以重罪傳逮慶師古曰追赴獄也於是以九月都試日如淳曰太守都尉令長丞尉㑹都試課殿最也斬觀令文穎曰觀縣名師古曰音工渙反因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣為王薨無子而信子匡復立為王故義舉兵并東平立信為天子義自號大司馬柱天大將軍以東平王傅蘇隆為丞相中尉臯丹為御史大夫移檄郡國言莽鴆殺孝平皇帝矯攝尊號今天子已立共行天罰師古曰共讀曰恭郡國皆震比至山陽衆十餘萬師古曰比音必寐反莽聞之大懼廼拜其黨親輕車將軍成武侯孫建為奮武將軍光禄勲成都侯王邑為虎牙將軍明義侯王駿為彊弩將軍春王城門校尉王况為震威將軍師古曰春王長安城東出北頭第一門也本名宣平門莽更改焉宗伯忠孝侯劉宏為奮衝將軍中少府建威侯王昌為中堅將軍中郎將震羌侯竇兄為奮威將軍師古曰兄讀曰況凡七人自擇除闗西人為校尉軍吏將闗東甲卒𤼵奔命以擊義焉復以太僕武讓為積弩將軍屯函谷闗將作大匠蒙鄉侯逯並為横壄將軍屯武闗師古曰逯姓也並名也逯音錄又音鹿今東郡有逯姓二音並得書本逯字或作逮今河朔有逮姓自呼音徒戴反其義兩通羲和紅休侯劉歆為揚武將軍屯宛大保後丞丞陽侯甄邯為大將軍屯灞上師古曰丞陽侯音烝常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備宋祁曰兵字下疑有以字莽日抱孺子㑹羣臣而稱曰昔成王幼周公攝政而管蔡挾祿父以畔師古曰祿父紂子也父讀曰甫今翟義亦挾劉信而作亂自古大聖猶懼此況臣莽之斗筲師古曰斗筲自喻材器小也解在公孫劉田傳羣臣皆曰不遭此變不章聖徳莽於是依周書作大誥師古曰武王崩周公相成王而三監淮夷叛周公作大誥莽自比周公故依放其事曰惟居攝二年十月甲子攝皇帝若曰大誥道諸侯王三公列侯于汝卿大夫元士御事應劭曰言以大道告於諸侯以下也御事主事也不弔天降喪于趙傅丁董應劭曰趙飛燕傅太后丁太后董賢也師古曰不弔言不為天所弔閔降下也宋祁曰注文閔字下疑有也字洪惟我幼冲孺子當承繼嗣無疆大歴服事師古曰洪大也惟思也冲稚也大思㓜冲孺子當承繼漢家無竟之歴服行政事予未遭其明悊能道民於安況其能往知天命師古曰予莽自稱也言不遭遇明智之人以自輔佐而道百姓於安蓋為謙辭也道讀曰導熙我念孺子若渉淵水師古曰熙嘆辭予惟往求朕所濟度奔走師古曰言我當求所以濟度之故奔走盡力不憚勤勞以傅近奉承高皇帝所受命師古曰傅讀曰附近音其靳反予豈敢自比於前人乎師古曰前人謂周公天降威明用寧帝室遺我居攝寳龜師古曰威明猶言明威也遺音弋季反太皇太后以丹石之符廼紹天明意師古曰紹承也詔予即命居攝踐阼如周公故事反虜故東郡太守翟義擅興師動衆曰有大難于西土西土人亦不靖師古曰曰者述翟義之言云爾也西土謂京師也言在東郡之西也於是動嚴鄉侯信誕敢犯祖亂宗之序師古曰誕大也天降威遺我寳龜固知我國有呰災使民不安師古曰呰病也言天所以降威遺龜者知國有災病義信當反天下不安之故也呰讀與疵同蕭該曰呰韋昭音疵呰字别有音於地理志及序𫝊中已具也是天反復右我漢國也師古曰復音扶目反右讀曰祐粤其聞曰孟康曰翟義反書上聞日也師古曰粤𤼵語辭也宋祁曰景本曰作日宗室之儁有四百人孟康曰諸劉見在者民獻儀九萬夫孟康曰民之表儀謂賢者予敬以終於此謀繼嗣圖功師古曰我用此宗室之儁及獻儀者共謀圖國事終成其功我有大事休予卜并吉師古曰大事戎事也言人謀既從卜又并吉是為美也故我出大將告郡太守諸侯相令長曰予得吉卜予惟以汝于伐東郡嚴鄉逋播臣師古曰逋亡也播散也爾國君或者無不反曰難大民亦不靜亦惟在帝宮諸侯宗室於小子族父敬不可征師古曰言爾等國君或有言曰禍難既大衆庻不安又劉信國之宗室於孺子為族父當加禮敬不可征討帝不違卜師古曰卜既得吉天命不違故予為冲人長思厥難曰烏虖義信所犯誠動鰥寡哀哉師古曰無妻無夫之人亦同受其害故可哀哉予遭天役遺大解難於予身以為孺子不身自䘏師古曰言天以漢家役事遺我而令身解其難故我征伐以為孺子除亂非自憂己身也予義彼國君泉陵侯上書應劭曰泉陵侯劉慶也上書令莽行天子事曰成王幼弱周公踐天子位以治天下六年朝諸侯於明堂制禮樂班度量而天下大服師古曰班謂布行也太皇太后承順天心成居攝之義皇太子為孝平皇帝子師古曰皇太子即謂孺子年在襁褓宜且為子知為人子道令皇太后得加慈母恩畜養成就加元服然後復子明辟師古曰辟君也以明君之事還孺子熙為我孺子之故師古曰重歎而言予惟趙傅丁董之亂遏絶繼嗣變剝適庻危亂漢朝以成三晉灼曰古厄字服䖍曰厄㑹也謂三七二百一十嵗師古曰適讀曰嫡劉奉世曰者國統三絶也隊極厥命師古曰隊隕也極盡也烏虖害其可不旅力同心戒之哉師古曰害讀曰曷曷何也旅陳也予不敢僭上帝命師古曰僭不信也言順天命而征討天休于安帝室興我漢國惟卜用克綏受兹命師古曰言天美於興復漢國故我惟用卜吉能安受此命今天其相民況亦惟卜用師古曰言天道當思助人況更用卜吉可知矣太皇太后肇有元城沙鹿之右張晏曰沙鹿在元城縣春秋時沙鹿崩王莽以為元后之祥語在元后𫝊師古曰右讀曰祐隂精女主聖明之祥李竒曰李親懐元后夢月入懐隂精女主之祥配元生成以興我天下之符遂獲西王母之應孟康曰民傳祀西王母之應也神靈之徴師古曰徴證也以祐我帝室以安我大宗以紹我後嗣以繼我漢功厥害適統不宗元緒者辟不違親辜不避戚師古曰其有害國之正統不尊大緒者當速加刑辟不避親戚適讀曰嫡夫豈不愛亦惟帝室師古曰非不愛此人但為帝室不得止是以廣立王侯並建曽𤣥俾屏我京師綏撫宇内師古曰屏謂蔽捭其難也博徴儒生講道于廷論序乖繆制禮作樂同律度量混壹風俗師古曰混亦同也音胡本反正天地之位昭郊宗之禮定五畤廟祧咸秩亡文孟康曰諸廢祀無文籍皆祭之建靈臺立明堂設辟雍張太學尊中宗高宗之號服䖍曰宣帝元帝也昔我高宗崇徳建武克綏西域以受白虎威勝之瑞應劭曰元帝誅滅郅支單于懐輯西域時有獻白虎者所以威逺勝猛也天地判合乾坤序徳師古曰言元帝既有威徳太后又兆符應則是天地乾坤夫妻之義相配合也判之言片也太皇太后臨政有龜龍麟鳳之應五徳嘉符相因而備河圖雒書逺自昆侖出於重壄師古曰昆侖河所出重壄洛所出皆有圖書故本言之壄古野字古讖著言肆今享實師古曰肆故也言有其讖故今當其實此廼皇天上帝所以安我帝室俾我成就洪烈也師古曰洪大也烈業也烏虖天明威輔漢始而大大矣師古曰言因此難更以强大爾有惟舊人泉陵侯之言爾不克逺省爾豈知太皇太后若此勤哉師古曰言爾當思久舊之人泉陵侯所言爾不能逺省識古事豈知太后之勤乎天毖勞我成功所孟康曰天慎勞我國家成功之所在予不敢不極卒安皇帝之所圖事師古曰卒終也言我不敢不終祖宗之業安帝室所謀之事肆予告我諸侯王公列侯卿大夫元士御事師古曰肆陳也陳其理而告之天輔誠辭師古曰言有至誠之辭則為天所輔天其累我以民予害敢不於祖宗安人圖功所終師古曰累託也言天以百姓託我我曷敢不謀終祖宗安人之功也累音力瑞反害讀曰曷下皆類此天亦惟勞我民若有疾予害敢不於祖宗所受休輔師古曰言天欲撫勞我衆衆若有疾苦我曷敢不順祖宗之意}
