  - {type: variant, offset: 1996, length: 7, content: 五鳳三年代丙吉, WYG: 孔光共遣掾行視師古曰行音下更反以為決去陂水其地肥羙省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壊陂誰翟子威飯我豆食羮芋魁師古曰言田無溉灌而不生秔稻又無黍稷但有豆及芋也豆食者豆為飯也羮芋魁者以芋根為羮也飯音扶晩反食音飤反乎覆陂當復師古曰事之反覆無常言禍兮福所倚誰云者兩黄鵠師古曰託言有神來告之司徒掾班彪曰丞相方進以孤童攜老母羈旅入京師身為儒宗致位宰相盛矣當莽之起蓋乘天威雖有賁育奚益於敵師古曰賁謂孟賁育謂夏育皆古之勇士言得之無益不能敵莽也賁音奔義不量力懐忠憤𤼵以隕其宗悲夫前漢書卷八十四前漢書卷八十四考證翟方進𫝊受春秋按儒林𫝊方進受榖梁春秋於尹更始又兼左氏春秋胡常與方進同師者也司𨽻校尉陳慶按公卿表慶字君卿後方進}
