  - {type: variant, offset: 3242, length: 236, content: 以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚焉王嘗久與騶奴宰人游戲飲食賞賜亡度遂入見王涕泣䣛行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也願賜清閒竭愚王辟左右遂曰大王知膠西王所以為無道亡乎王曰不知也曰臣聞膠西王有諛臣侯得王所為儗於桀紂也得以為堯舜也王說其諂諛嘗與寑處唯得所言以至於是今大王親近群小漸漬邪惡所習存亡之機不可不慎也臣請選郎通經術有行義者王起居坐則誦詩, WYG: 前漢}
