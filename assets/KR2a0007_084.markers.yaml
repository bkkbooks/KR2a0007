  - {type: variant, offset: 3499, length: 1104, content: 人侍王居數日王皆逐去安等久之宮中數有妖怪王以問遂遂以為有大憂宮室將空語在昌邑王傳會昭帝崩亡子昌邑王賀嗣立官屬皆徵入王相安樂遷衛尉遂見安樂流涕謂曰王立為天子日益驕溢諫之不復聽今哀痛未盡日與近臣飲食作樂鬭虎豹召皮軒車九流驅馳東西所為誖道古制寬大臣有隱退今去不得陽狂恐知身死為世戮奈何君陛下故相宜極諫爭王即位二十七日卒以淫亂廢昌邑群臣坐陷王於惡不道皆誅死者二百餘人唯遂與中尉王陽以數諫爭得減死髡為城旦宣帝即位久之渤海左右郡歲飢盜賊並起二千石不能禽制上選能治者丞相御史舉遂可用上以為渤海太守時遂年七十餘召見形貌短小宣帝望見不副所聞心內輕焉謂遂曰渤海廢亂朕甚憂之君欲何以息其盜賊以稱朕意遂對曰海瀕遐遠不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上聞遂對甚說答曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至渤海界郡聞新太守至發兵以迎遂皆遣還移書勑屬縣悉罷逐捕盜賊吏諸持鉏鉤田器者皆為良民吏無得問持兵者乃為盜賊遂單車獨行至府郡中翕然盜賊亦皆罷渤海又多劫略相隨聞遂教令即時解散棄其兵弩而持鉤鉏盜賊於是悉平民安土樂業遂乃聞倉廩假貧民選用良吏尉安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭家二母彘五雞民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢春夏不得不趨田畝秋冬課收歛益蓄困實蓤芡勞來循行郡中皆有蓄積吏民皆富實獄訟止息數年上遣使者徵遂議曹王生願從功曹以為王生素耆酒亡節度不可使遂不忍逆從至京師王生日飲酒不視太守會遂引入宮王生醉從後呼曰明府且止願有所白遂還問其故王生曰天子即問君何以治渤海君不可有所陳對宜曰皆聖主之德非小臣之力也遂受其言既至前上果問以治狀遂對如王生言天子說其有讓笑曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教戒臣也上以遂年老不任公卿拜為水衡都尉議曹王生為水衡丞以襃顯遂云水衡典上林禁苑共張宮館為宗廟取牲官職親近上甚重之以官壽卒召信臣字翁卿九江壽春人也以明經甲科為郎出補穀陽長舉高第遷上蔡長其治視民如子所居見稱述超為零陵太守病歸復徵為諫大夫遷南陽太守其治如上蔡信臣為人勤力有方略好為民興利務在富之躬勸耕農出入阡陌止舍離鄉亭稀有安居時行視郡中水泉開通溝瀆起水門提閼凡數十處以廣溉灌歲歲增加多至萬頃民得其利畜積有餘信臣為民作均水約束刻石立於田畔以防分爭禁止嫁娶送終奢靡務出於儉約府縣吏家子弟好游敖不以田作為事輒斥罷之甚者案其不法以視好惡其化大行郡中莫不耕稼力田百姓歸之戶口增倍盜賊獄訟衰止吏民親愛信臣號之曰召父荊州刺史奏信臣為百姓興利郡以殷富賜黃金, WYG: ''}
