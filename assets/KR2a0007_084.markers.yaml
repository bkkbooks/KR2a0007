  - {type: variant, offset: 30, length: 2, content: 蕭曹, WYG: 在梁後屬陳留今曰考城與義㑹戰破之斬劉璜首莽大喜復下詔曰太皇太后遭家不造國統三絶師古曰謂成帝哀帝平帝皆無子也絶輙復續恩莫厚焉信莫立焉孝平皇帝短命蚤崩師古曰蚤古早字幼嗣孺沖詔予居攝予承明詔奉社稷之任持大宗之重養六尺之託受天下之寄宋祁曰監本楊本郭本託作孤别本云養六尺之孤託受天下之寄戰戰兢兢不敢安息伏念太皇太后惟經蓺分析王道離散師古曰惟思也宋祁曰姚本散作散漢家制作之業獨未成就故博徴儒士大興典制備物致用立功成器}
