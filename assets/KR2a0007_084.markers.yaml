  - {type: variant, offset: 62, length: 0, content: '', WYG: 於是吏士精銳遂攻圍義於圉城破之義與劉信弃軍庸亡孟康曰謂挺身逃亡如奴庸也至固始界中捕得義尸磔陳都市卒不得信初三輔聞翟義起自茂陵以西至汧二十三縣盗賊並發趙明霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令師古曰斄讀曰邰劫略吏民衆十餘萬火見未央宫前殿莽晝夜抱孺子禱宗廟復拜衞尉王級為虎賁將軍大鴻臚望鄉侯閻遷為折衝將軍與甄邯王}
