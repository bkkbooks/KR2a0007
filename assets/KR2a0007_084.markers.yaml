  - {type: variant, offset: 28, length: 1, content: 相, WYG: 羙疆土況今卜并吉乎言不可不從也故予大以爾東征命不僭差師古曰言必信之矣兆陳惟若此師古曰卜兆陳列惟如此宋祁曰邵本兆作卜廼遣大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城師古曰明告者以其出使能明告諭於外也附城云如古附庸也諸將東至陳留菑孟康曰菑故戴}
