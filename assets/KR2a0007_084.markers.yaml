  - {type: variant, offset: 2061, length: 821, content: 為神雀議欲以聞敞奏霸曰竊見丞相請與中二千石博士雜問郡國上計長吏守丞為民興利除害成大化條其對有耕者讓畔男女異路道不拾遺及舉孝子弟弟貞婦者為一輩先上殿舉而不知其人數者次之不為條教者在後叩頭謝丞相雖口不言而心欲其為之也長吏守丞對時臣敞舍有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏曰臣問上計長吏守丞以興化條皇天報下神雀後知從臣敞舍來乃止郡國吏竊笑丞相仁厚有知略微信奇怪也昔汲黯為淮陽守辭去之官謂大行李息曰御史大夫張湯懷詐阿意以傾朝廷公不早白與俱受戮矣息畏湯終不敢言後湯誅敗上聞黯與息語乃抵息罪而秩黯諸侯相取其思竭忠也臣敞非敢毀丞相也誠恐群臣莫白而長吏守丞畏丞相指歸舍法令各為私教務相增加澆淳散樸並行偽貌有名亡實傾搖解怠甚者為妖假令京師先行讓畔異路道不拾遺其實亡益廉貪貞淫之行而以偽先天下固未可也即諸侯先行之偽聲軼於京師非細事也漢家承敝通變造起律令所以勸善禁姦條貫詳備不可復加宜令貴臣明飭長吏守丞歸告二千石舉三老孝弟力田孝廉廉吏務得其人郡事皆以義法令撿式毋得擅為條教敢挾詐偽以奸名譽者必先受戮以正明好惡天子嘉納敞言召上計吏使侍中臨飭如敞指意霸甚慚又樂陵侯史高以外屬舊恩侍中貴重霸薦高可大尉天子使尚書召問霸太尉官罷久矣丞相兼之所以偃武興文也如國家不虞邊境有事左右之臣皆將率也夫宣明教化通達幽隱使獄無冤刑邑無盜賊君之職也將相之官朕之任焉侍中樂陵侯高帷幄近臣朕之所自親君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃決自是後不敢復有所請然自漢興言治民吏以霸為首為丞相五歲甘露三年薨諡日定侯霸死後樂陵侯高竟為大司馬霸子思侯賞嗣為關都尉薨子忠侯輔嗣至衛尉九卿薨子忠嗣侯訖王莽乃絕子孫為吏二千石者五六人始霸少為陽夏游徼與善相人者共載出見一婦人相者言此婦人當富貴不然相書不可用也霸推問之乃其鄉里巫家女也霸即取為妻與之終身為丞相後徙杜陵朱邑字仲卿廬江舒人也少時為舒桐鄉嗇夫廉平不苛以愛利為行未嘗笞辱人存問耆老孤寡遇之有恩所部吏民愛敬焉遷補, WYG: 琅邪}
