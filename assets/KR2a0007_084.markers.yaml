  - {type: variant, offset: 40, length: 1, content: 帥, WYG: 利王道粲然基業既著千載之廢百世之遺於今廼成道徳庻幾於唐虞功烈比齊於殷周師古曰烈業也今翟義劉信等謀反大逆流言惑衆欲以簒位賊害我孺子罪深於管蔡惡甚於禽獸信父故東平王雲不孝不謹親毒殺其父思王名曰鉅䑕師古曰鉅大也莽誣雲呼其父曰鉅䑕也後雲竟坐大逆誅死義父故丞相方進險詖隂賊師古曰詖佞也音彼義反兄宣静言令色外巧内嫉師古曰静安也令善也言其陽為安静之言外有善色而實嫉害也所殺鄉邑汝南者數十人今積惡二家迷惑相得此時命當殄天所滅也義始發兵上書言宇信等與東平相輔謀反師古曰輔者東平王相之名也劉奉世曰義𤼵兵時東平相蘇隆此輔未喻或者當為傅聲之誤也宋祁曰前云以東平王傅蘇隆為丞相執捕械繫欲以威}
