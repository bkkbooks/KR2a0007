謂障餘人賣買而自取其利此訓是也師古以謂他人取者輙有辜罪此訓迂矣方進部掾史覆案發大姦臧數千萬上以為任公卿師古曰任堪也欲試以治民徙方進為京兆尹搏擊豪彊京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜師古曰言當犯迕貴戚而見毁也方進心知所謂其後少弛威嚴師古曰弛懈也居官三嵗永始二年遷御史大夫數月㑹丞相薛宣坐廣漢盗賊羣起及太皇太后喪時三輔吏並徴發為姦師古曰並音歩浪反免為庻人方進亦坐為京兆尹時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺羣臣多舉方進上亦器其能遂擢方進為丞相封高陵侯食邑千户身既富貴而後母尚在方進内行修飭供養甚篤師古曰飭謹也篤厚也及後母終既𦵏三十六日除服起視事以為身備漢相不敢踰國家之制師古曰漢制自文帝遺詔之後國家遵以為常大功十五日小功十四日緦麻七日方進自以大臣故云不敢踰制為相公絜請託不行郡國師古曰言不以私事託於四方郡國持法刻深舉奏牧守}
