  - {type: variant, offset: 63, length: 9, content: 然民務稼穡衣食滋殖, WYG: 西擊趙明等正月虎牙將軍王邑等自闗東還便引兵西彊弩將軍王駿以無功免揚武將軍劉歆歸故官復以邑弟侍中王竒為揚武將軍城門將軍趙恢為彊弩將軍中郎將李棽為厭難將軍師古曰棽音所林反宋祁曰服䖍棽音禁如淳音琴説文丑心反晉灼音參參音森復將兵西二月明等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥大封拜先是益州蠻夷及金城塞外羌反畔時州郡擊破之莽廼并録以小大為差封侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌宼蠻盗反虜逆賊不得旋踵應時殄滅天下咸服之功封云莽於是自謂大得天人之助}
