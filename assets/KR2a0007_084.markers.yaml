  - {type: variant, offset: 7, length: 2, content: 漢興, WYG: 卿峻文深詆師古曰詆毁也音丁禮反中傷者尤多如陳咸朱博蕭育逢信孫閎之屬皆京師世家以材能少歴牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸等皆罷退}
