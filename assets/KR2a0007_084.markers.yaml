  - {type: variant, offset: 111, length: 738, content: 民從化孝武之世外攘四夷內改法度民用彫敝姦軌不禁時少能以化治稱者惟江都相董仲舒內史公孫弘兒寬居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之仲舒數謝病去弘寬至三公孝昭幼沖霍光秉政承奢侈旅之後海內虛耗光因循守職無所改作至於始元元鳳之間匈奴鄉化百姓益富舉賢良文學問民所疾苦於是罷酒榷而議鹽鐵矣及至孝宣繇仄陋而登至尊興于閭閻知民事之囏難自霍光薨後始躬萬機厲精為治五日一聽事自丞相已下各奉職而進及拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎以為太守吏民之本也數變易則下不安民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至關內侯公卿缺則選諸所表以次用之是故漢世良吏於是為盛稱中興焉若趙廣漢韓延壽尹翁歸嚴延年張敞之屬皆稱其位然任刑罰或抵罪誅王成黃霸朱邑龔遂鄭弘召信臣等所居民富所去見思生有榮號死見奉祀此廩廩庶幾德讓君子之遺風矣文翁廬江舒人也少好學通春秋以郡縣吏察舉景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有材者張叔等十餘人親自飭厲遣詣京師受業博士或學律令減省少府用度買刀布蜀物齎計吏以遺博士數歲蜀生皆成就還歸文翁以為右職用次察舉官有至郡守刺史者又修起學官於成都市中招下縣子弟以為學官弟子為除更繇高者以補郡縣吏次為孝弟力田常選學官僮子使在便坐受事每出行縣益從學官諸生明經飭行者與俱使傳教令出入閨閤縣邑吏民見而榮之數年爭欲為學官弟子富人至出錢以求之繇是大化蜀地學於京師者比齊魯焉至武帝時乃令天下郡國皆立學校官自文翁為之始云文翁終於蜀吏民為立祠堂歲時祭祀不絕至今巴蜀好文雅文翁之化也王成不知何郡人也為膠東相治甚有聲宣帝最先襃之地節三年, WYG: ''}
