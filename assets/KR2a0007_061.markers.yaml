  - {type: 'tls:seg', offset: 24, content: '', id: KR2a0007_tls_061-1a.5}
  - {type: variant, offset: 24, length: 2, content: 家業, WYG: 皆是也本從西域來􅜍音瓮宋祁曰如只曰大鳥則成一事當云大鳥及卵犛靬越本作黎軒者非又注文􅜍子按西域烏弋傳師古音甕於龍反汲水瓶也今雝與雍是一字同從瓦無容别音瓮必無二音亦當云一音瓮天子大說師古曰說讀曰恱而漢使窮河源其山多玉石采來臣瓚曰漢使采取持來至漢天子案古圖書名河所出山曰昆侖云是時上方數廵狩海上廼悉從外國客大都多人過之則散財帛賞賜厚具饒給之以覽視漢富厚焉師古曰視讀曰示言示之令其觀覽大角氐師古曰氐音丁禮反觧在武紀出竒戲諸怪物多聚觀者師古曰聚都邑人令觀看以誇示之觀音工喚反行賞賜酒池肉林令外國客徧觀各倉庫府臧之積欲以見漢廣大傾駭之師古曰見顯示及加其眩者之工而角氐竒戲嵗増變其益興自此始而外國使更來更去師古曰遞互來去前後不絶更音工衡反大宛以西皆自恃逺尚驕恣未可詘以禮羈縻而使也漢使徃既多其少從率進孰於天子孟康曰少從不如計也或曰少者少年從行之微者也進孰美語如成孰也晉灼曰多進虛美之言必成之計於天子而卒不果也師古曰漢時謂随使而出外國者為少從總言其少年而從使也從音材用反事見班固與弟仲升書進孰者但空進成孰之言言大宛有善馬在貳師城匿不肯示漢使天子既好宛馬聞之甘心師古曰志懐美恱專事求之使壯士車令等持}
