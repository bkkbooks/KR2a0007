  - {type: 'tls:seg', offset: 54, content: '', id: KR2a0007_tls_061-1a.13}
  - {type: variant, offset: 55, length: 0, content: '', WYG: 矣師古曰罷讀曰疲軍吏皆以為然許宛之約宛廼出其馬令漢自擇之而多出食食漢軍師古曰下食讀曰飤漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王服䖍曰蔡音楚言蔡師古曰昧音本末之末蔡音千曷反與盟而罷兵終不得入中城罷而引歸初貳師起敦煌西為人多道上國不能食師古曰起發也道上國近道諸國也食讀曰飤分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人别至郁成城宋祁曰成城古本浙本作都城守不肯給食申生去大軍二百里負而輕之師古曰負恃也恃大軍之威而輕敵人攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等數人脫}
