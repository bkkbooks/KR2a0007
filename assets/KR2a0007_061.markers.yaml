  - {type: variant, offset: 4757, length: 8, content: 建臨敵敢斷武昭於, WYG: 三省曰元朔四年罷西夷元狩元年復通西並南山至鹽澤臣召南按鹽澤即蒲昌海于闐及葱嶺二河之所滙也今名洛普池本與大月氏俱在祁連敦煌間小國也注師古曰祁連山以東敦煌以西臣召南按西域傳曰月氏逺去過大宛撃大夏而臣之其餘小衆不能去者保南山𦍑號小月氏然則本文祁連即指酒泉張掖金城之南山霍去病所奪者地在敦煌之東注當云祁連以西敦煌以東也騫即分遣副使使大宛康居月氏大夏大夏下史記有安息身毒于窴杅􅀢諸國而漢使窮河源此句下史記有河源出于窴五字而鹽水中數有敗胡三省曰裴矩西域記鹽水在西州髙昌縣東東南去𤓰州一千三百里並沙磧之地道路不可凖惟以人畜骸骨及駝馬糞為標騐由此數有死亡李廣利傳故浩侯王恢徐廣曰恢先受封一年坐使酒泉矯制國除臣召南按此王恢以撃破車師功封浩侯與元光中設計馬邑以大行令為将軍下獄死者不同此在後烏孫輪臺易苦漢使輪臺史記作侖頭貳師令搜粟都尉上官桀臣召南按}
