  - {type: variant, offset: 19, length: 0, content: '', WYG: 師古曰陳夀益部耆舊傳云騫漢中成固人也宋祁曰也字疑可刪建元中為郎時匈奴降者言匈奴破月氏王師古曰月氏西域胡國也氏音支以其頭為飲器韋昭曰飲器椑榼也晉灼曰飲器虎子屬也或曰飲酒之器也師古曰匃奴傳云以所破月氏王頭共飲血盟然則飲酒之器是也韋云椑榼晉云獸子皆非也椑榼即今之偏榼所以盛酒耳非用飲者也獸子褻器所以溲便者也椑音鼙月氏遁而怨匈奴無與共撃之師古曰無人援助也漢方欲事滅胡聞此言欲通使道必更匈奴中師古曰更過也音工衡反廼募能使者騫以郎應募使月氏與堂邑氏奴甘父服䖍曰堂邑姓也漢人其奴名甘父師古曰堂邑氏之奴本胡人名甘父下云堂邑父者盖取主之姓以為氏而單稱其名曰父劉攽曰奴甘父直是此人名號耳非謂堂邑氏之奴名甘父也按胡人名字多以奴為號又後言堂邑父益知其人自氏堂邑名奴甘父也俱出隴西徑匈奴師古曰道由匈奴過匈奴得之傳詣單于單于曰月氏在吾北漢何以得徃使吾欲使越漢肯聼我乎留騫十餘歳予妻有子然騫持漢節不失居匈奴西騫因與其屬亡鄉月氏師古曰屬謂同使之官屬鄉讀曰嚮西走數十日師古曰走趨也不知其道里多少故以日數言之走音奏一曰走謂奔走也讀如本字至大宛大宛聞漢之饒財欲通不得見騫喜問欲何之騫曰為漢使月氏而為匃奴所閉道脫亡唯王使人道送我師古曰道讀曰導宋祁曰越本脫作今誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發譯道抵康居師古曰抵至也道讀曰導康居傳致大月氏大月氏王已為胡所殺立其夫人為王宋祁曰古本夫人字下有太子二字既臣大夏而君之師古曰以大夏為臣為之作君也地肥饒少㓂志安樂又自以逺逺漢殊無報胡之心師古曰下逺音于萬反騫從月氏至大夏竟不能得月氏要領李竒曰要領要契也師古曰李說非也要衣要也領衣領也凡持衣者則執要與領言騫不能得月氏意趣無以持歸於漢故以要領為喻要音一遥反留歳餘還竝南山欲從𦍑中歸師古曰竝音歩浪反復為匈奴所得留歳餘單于死國内亂騫與胡妻及堂邑父俱亡歸漢拜騫大中大夫堂邑父為奉使君騫為人彊力寛大信人師古曰彊力言堅忍於事蠻夷愛之堂邑父胡人善射窮急射禽獸給食師古曰給供也宋祁云古本胡字上有故字初騫行時百餘人去十三歳唯二人得還騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六宋祁云古本旁字下有有字具為天子言其地形所有師古曰土地之形及所生之物也語皆在西域傳騫曰臣在大夏時見卭竹杖蜀布臣瓚曰卭山名生此竹髙節可作杖服䖍曰布細布也師古曰卭竹杖人皆識之無假多釋而蘓林乃言節間合而體離誤後}
