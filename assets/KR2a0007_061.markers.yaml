  - {type: variant, offset: 808, length: 3774, content: 行法焉丞於用法疑執事不諉上臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建繇是顯名後為渭城令治甚有聲值昭帝幼皇后父上官將軍安與帝姊蓋主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客臧公主廬吏不敢捕渭城令建將吏卒圍捕蓋主聞之與外人上官將軍多從奴客往犇射追吏吏散走主使僕射劾渭城令游徼傷主家奴建報亡它坐蓋主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聽事下吏捕建建自殺吏民稱冤至今渭城立其祠朱雲字游魯人也徙平陵少時通輕俠借客報仇長八尺餘容貌甚壯以勇力聞年四十乃變節從博士白子友受易又事前將軍蕭望之受論語皆能傳其業好倜儻大節當世以是高之元帝時琅邪貢禹為御史大夫而華陰守丞嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武忠正有智略可使以六百石秩試守御史大夫以盡其能上乃下其事問公卿太子少傅匡衡對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不靜矣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也自堯之用舜文王於太公猶試然後爵之又況朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹絜白廉正經術通明有伯夷史魚之風海內莫不聞知而嘉猥稱雲欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案驗以明好惡嘉竟坐之是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乘貴辯口諸儒莫能與抗皆稱疾不敢會有薦雲者召入攝𧞓登堂抗首而請音動左右既論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角繇是為博士遷杜陵令坐故縱亡命會赦舉方正為槐里令時中書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上疏言丞相韋玄成容身保位亡能往來而咸數毀石顯久之有司考雲疑風吏殺人群臣朝見上問丞相以雲治行丞相玄成言雲暴虐亡狀時陳咸在前聞之以語雲雲上書自訟咸為定奏草求下御史中丞事下丞相丞相部吏考立其殺人罪雲亡入長安復與咸計議丞相具發其事奏咸宿衛執法之臣幸得進見漏泄所聞以私語雲為定奏草欲令自下治後知雲亡命罪人而與交通雲以故不得上於是下咸雲獄減死為城旦咸雲遂廢錮終元帝世至成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治檻上曰勿易因而輯之以旌直臣雲自是之後不復仕常居鄠田時出乘牛車從諸生所過皆敬事焉薛宣為丞相雲往見之宣備賓主禮因留雲宿從容謂雲曰在田野亡事且留我東閤可以觀四方奇士雲曰小生乃欲相吏邪宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七十餘終於家病不呼醫飲藥遺言以身服斂棺周於身土周於椁為丈五墳葬平陵東郭外梅福字子真九江壽春人也少學長安明尚書穀梁春秋為郡文學補南昌尉後去官歸壽春數因縣道上言變事求假軺傳詣行在所條對急政輒報罷是時成帝委任大將軍王鳳鳳專勢擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而畔親也不可為言也昔高祖納善若不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以亡敵於天下也孝文皇帝起於代谷非有周召之師伊呂之佐也循高祖之法加以恭儉當此之時天下幾平繇是言之循高祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諫說至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聽用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以眾賢聚於本朝故其大臣勢陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之群蹈藉名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至眾多也然其儁桀指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦亡幾人故爵祿束帛者天下之厎石高祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢敺除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今不循伯者之道乃欲以三代選舉之法取當時之士猶察伯樂之圖求騏驥於市而不可得亦已明矣故高祖棄陳平之過而獲其謀晉文召天王齊桓用其讎有益於時不顧逆順此所謂伯道者也一色成體謂之醇白黑雜合謂之駮欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥增逝愚者蒙戮則知士深退間者愚民上疏多觸不急之法或下廷尉而死者眾自陽朔以來天下以言為諱朝廷尤甚群臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循高祖之軌杜亡秦之路數御十月之歌留意亡逸之戒除不急之法下亡諱之詔博覽兼聽謀及疏賤令深者不隱遠者不塞所謂辟四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數陰盛陽微金鐵為飛此何景也漢興以來社稷三危呂霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸勢陵於君權隆於主然後防之亦亡及已上遂不納成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑而言高者罪也越職觸罪危言世患雖伏質橫分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歷千駟臣不貪也故願壹登文石之陛涉赤墀之塗當戶牖之法坐盡平生之愚慮亡益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絕三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戶所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫穀梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而況聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編戶以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤遠又譏切王氏故終不見納初武帝時始封周後姬嘉為周子南君至元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絕不能紀時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絕之罪者絕而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絕今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絕侯也宜明得殷後而已今之故宋推求其嫡久遠不可得雖得其嫡嫡之先已絕不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏穀梁世本禮記相明遂下詔封孔子世為殷紹嘉公語在成紀是時福居家常以讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云云敞字幼孺平陵人也師事同縣吳章章治尚書經為博士平帝以中山王即帝位年幼莽秉政自號安漢公以平帝為成帝後不得顧私親帝母及外家衛氏皆留中山不得至京師莽長子宇非莽鬲絕衛氏恐帝長大後見怨宇與吳章謀夜以血塗莽門若鬼神之戒冀以懼莽章欲因對其咎事發覺莽殺宇誅滅衛氏謀所聯及死者百餘人章坐要斬磔尸東市門初章為當世名儒教授尤盛弟子, WYG: ''}
  - {type: variant, offset: 808, length: 3774, content: 行法焉丞於用法疑執事不諉上臣謹以斬昧死以聞制曰司馬法曰國容不入軍軍容不入國何文吏也三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建繇是顯名後為渭城令治甚有聲值昭帝幼皇后父上官將軍安與帝姊蓋主私夫丁外人相善外人驕恣怨故京兆尹樊福使客射殺之客臧公主廬吏不敢捕渭城令建將吏卒圍捕蓋主聞之與外人上官將軍多從奴客往犇射追吏吏散走主使僕射劾渭城令游徼傷主家奴建報亡它坐蓋主怒使人上書告建侵辱長公主射甲舍門知吏賊傷奴辟報故不窮審大將軍霍光寢其奏後光病上官氏代聽事下吏捕建建自殺吏民稱冤至今渭城立其祠朱雲字游魯人也徙平陵少時通輕俠借客報仇長八尺餘容貌甚壯以勇力聞年四十乃變節從博士白子友受易又事前將軍蕭望之受論語皆能傳其業好倜儻大節當世以是高之元帝時琅邪貢禹為御史大夫而華陰守丞嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武忠正有智略可使以六百石秩試守御史大夫以盡其能上乃下其事問公卿太子少傅匡衡對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不靜矣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也自堯之用舜文王於太公猶試然後爵之又況朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹絜白廉正經術通明有伯夷史魚之風海內莫不聞知而嘉猥稱雲欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案驗以明好惡嘉竟坐之是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乘貴辯口諸儒莫能與抗皆稱疾不敢會有薦雲者召入攝𧞓登堂抗首而請音動左右既論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角繇是為博士遷杜陵令坐故縱亡命會赦舉方正為槐里令時中書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上疏言丞相韋玄成容身保位亡能往來而咸數毀石顯久之有司考雲疑風吏殺人群臣朝見上問丞相以雲治行丞相玄成言雲暴虐亡狀時陳咸在前聞之以語雲雲上書自訟咸為定奏草求下御史中丞事下丞相丞相部吏考立其殺人罪雲亡入長安復與咸計議丞相具發其事奏咸宿衛執法之臣幸得進見漏泄所聞以私語雲為定奏草欲令自下治後知雲亡命罪人而與交通雲以故不得上於是下咸雲獄減死為城旦咸雲遂廢錮終元帝世至成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君苟患失之亡所不至者也臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逄比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治檻上曰勿易因而輯之以旌直臣雲自是之後不復仕常居鄠田時出乘牛車從諸生所過皆敬事焉薛宣為丞相雲往見之宣備賓主禮因留雲宿從容謂雲曰在田野亡事且留我東閤可以觀四方奇士雲曰小生乃欲相吏邪宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七十餘終於家病不呼醫飲藥遺言以身服斂棺周於身土周於椁為丈五墳葬平陵東郭外梅福字子真九江壽春人也少學長安明尚書穀梁春秋為郡文學補南昌尉後去官歸壽春數因縣道上言變事求假軺傳詣行在所條對急政輒報罷是時成帝委任大將軍王鳳鳳專勢擅朝而京兆尹王章素忠直譏刺鳳為鳳所誅王氏浸盛災異數見群下莫敢正言福復上書曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而畔親也不可為言也昔高祖納善若不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以亡敵於天下也孝文皇帝起於代谷非有周召之師伊呂之佐也循高祖之法加以恭儉當此之時天下幾平繇是言之循高祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌壞井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諫說至言出爵不待廉茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聽用其計升平可致於是積尸暴骨快心胡越故淮南王安緣間而起所以計慮不成而謀議泄者以眾賢聚於本朝故其大臣勢陵不敢和從也方今布衣乃窺國家之隙見間而起者蜀郡是也及山陽亡徒蘇令之群蹈藉名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕故匹夫欲與上爭衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻繆公行伯繇余歸德今欲致天下之士民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至眾多也然其儁桀指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦亡幾人故爵祿束帛者天下之厎石高祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢敺除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今不循伯者之道乃欲以三代選舉之法取當時之士猶察伯樂之圖求騏驥於市而不可得亦已明矣故高祖棄陳平之過而獲其謀晉文召天王齊桓用其讎有益於時不顧逆順此所謂伯道者也一色成體謂之醇白黑雜合謂之駮欲以承平之法治暴秦之緒猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮焉夫䳒鵲遭害則仁鳥增逝愚者蒙戮則知士深退間者愚民上疏多觸不急之法或下廷尉而死者眾自陽朔以來天下以言為諱朝廷尤甚群臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循高祖之軌杜亡秦之路數御十月之歌留意亡逸之戒除不急之法下亡諱之詔博覽兼聽謀及疏賤令深者不隱遠者不塞所謂辟四門明四目也且不急之法誹謗之微者也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數陰盛陽微金鐵為飛此何景也漢興以來社稷三危呂霍上官皆母后之家也親親之道全之為右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸勢陵於君權隆於主然後防之亦亡及已上遂不納成帝久亡繼嗣福以為宜建三統封孔子之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑而言高者罪也越職觸罪危言世患雖伏質橫分臣之願也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歷千駟臣不貪也故願壹登文石之陛涉赤墀之塗當戶牖之法坐盡平生之愚慮亡益於時有遺於世此臣寢所以不安食所以忘味也願陛下深省臣言臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦滅二周夷六國隱士不顯佚民不舉絕三統滅天道是以身危子殺厥孫不嗣所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞明著三統示不獨有也是以姬姓半天下遷廟之主流出於戶所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為此也春秋經曰宋殺其大夫穀梁傳曰其不稱名姓以其在祖位尊之也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適傳曰賢者子孫宜有土而況聖人又殷之後哉昔成王以諸侯禮葬周公而皇天動威雷風著災今仲尼之廟不出闕里孔氏子孫不免編戶以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤遠又譏切王氏故終不見納初武帝時始封周後姬嘉為周子南君至元帝時尊周子南君為周承休侯位次諸侯王使諸大夫博士求殷後分散為十餘姓郡國往往得其大家推求子孫絕不能紀時匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絕之罪者絕而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絕今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絕侯也宜明得殷後而已今之故宋推求其嫡久遠不可得雖得其嫡嫡之先已絕不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經遂見寢至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏穀梁世本禮記相明遂下詔封孔子世為殷紹嘉公語在成紀是時福居家常以讀書養性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云云敞字幼孺平陵人也師事同縣吳章章治尚書經為博士平帝以中山王即帝位年幼莽秉政自號安漢公以平帝為成帝後不得顧私親帝母及外家衛氏皆留中山不得至京師莽長子宇非莽鬲絕衛氏恐帝長大後見怨宇與吳章謀夜以血塗莽門若鬼神之戒冀以懼莽章欲因對其咎事發覺莽殺宇誅滅衛氏謀所聯及死者百餘人章坐要斬磔尸東市門初章為當世名儒教授尤盛弟子, krp: ''}
