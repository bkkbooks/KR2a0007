  - {type: variant, offset: 316, length: 432, content: 反真冥冥亡形亡聲乃合道情夫飾外以華眾厚葬以鬲真使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉裹以幣帛鬲以棺槨支體絡束口含玉石欲化不得鬱為枯腊千載之後棺槨朽腐乃得歸土就其真宅繇是言之焉用久客昔帝堯之葬也窾木為櫝葛藟為緘其穿下不亂泉上不泄殠故聖王生易尚死易葬也不加功於亡用不損財於亡謂今費財厚葬留歸鬲至死者不知生者不得是謂重惑於戲吾不為也祁侯曰善遂臝葬胡建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常步與走卒起居所以尉薦走卒甚得其心時監軍御史為姦穿北軍壘垣以為賈區建欲誅之乃約其走卒曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與護軍諸校列坐堂皇上建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史護軍諸校皆愕驚不知所以建亦已有成奏在其懷中遂上奏曰臣聞軍法立武以威眾誅惡以禁邪今監御史公穿軍垣以求賈利私買賣以與士市不立剛毅之心勇猛之節亡以帥先, WYG: 泝音素}
