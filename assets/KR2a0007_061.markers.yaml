  - {type: variant, offset: 20, length: 2, content: 黃老, krp: 矣問安得此大夏國人曰吾賈人徃市之身毒國鄧展曰一名篤李竒曰一名天篤則浮屠胡是也師古曰即敬佛道者宋祁云注文天篤古本作天竺身毒國在大夏東南可數千里其俗土著師古曰土著者謂有城郭常居不隨畜牧移徙也著音直略反其下亦同與大夏同而卑溼暑熱其民乘象以戰師古曰象大獸垂鼻長牙其國臨大水焉以騫度之師古曰度計也大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從𦍑中險𦍑人惡之少北則為匈奴所得從蜀宜徑又無冦師古曰徑直也宜猶當也從蜀向大夏其道當直宋祁云顔未注前古本宜作直天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵彊可以賂遺設利朝也師古曰設施也施之以利誘令入朝誠得而以義屬之師古曰謂不以兵革則廣地萬里重九譯致殊俗威徳徧於四海天子欣欣以騫言為然廼令因蜀犍為發間使數道竝出師古曰間使者求間隙而行出駹出莋出徙卭出僰師古曰皆夷種名駹音尨莋音材各反徙音斯僰音蒲北反宋祁云新本卭字上有出字皆各行一二千里其北方閉氐莋服䖍曰漢使見閉於夷也師古曰氐與莋二種也宋祁云越本無行字南方閉巂昆明師古曰巂昆明亦皆夷種名也巂音先橤反昆明之屬無君長善宼盗輙殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越而蜀賈間出物者或至焉服䖍曰滇音顛滇馬出其國師古曰間出物謂私徃市者於是漢以求大夏道始通滇國初漢欲通西南夷費多罷之及騫言可以通大夏廼復事西南夷師古曰事謂經略通之專以為事也騫以校尉從大将軍撃匈奴知水草處軍得以不乏劉敞曰水草處宜有知字宋祁云古本将軍下有數字淳化本無知字廼封騫為博望侯師古曰取其能廣博瞻望是歳元朔六年也後二年騫為衛尉與李廣俱出右北平撃匈奴匈奴圍李将軍軍失亡多而騫後期當斬贖為庶人是歳驃騎将軍破匈奴西邊殺數萬人至祁連山其秋渾邪王率衆降漢而金城河西竝南山至鹽澤空無匈奴師古曰竝音歩浪反匈奴時有候者到而希矣後二年漢擊走單于於幕北天子數問騫大夏之屬騫既失侯因曰臣居匈奴中聞烏孫王號昆莫昆莫父難兜靡本與大月氏俱在祁連敦煌閒小國也師古曰祁連山以東敦煌以西大月氏攻殺難兜靡奪其地人民亡走匈奴子昆莫新生傅父布就翖侯抱亡置草中服䖍曰傅父如傅母也李竒曰布就字也翖侯烏孫官名也為昆莫作傅父也師古曰翖侯烏孫大臣官號其數非一亦猶漢之將軍耳而布就者又翖侯之中别號猶右将軍左将軍耳非其人之字翖與翕同為求食還見狼乳之師古曰以乳飲之又烏銜肉翔其旁以為神遂持歸匈奴單于愛養之及壯以其父民衆與昆莫使将兵數有功時月氏已為匈奴所破西撃塞王師古曰塞音先得反西域國名即佛經所謂釋種者塞釋聲相近本一姓耳塞王南走逺徙月氏居其地昆莫既健自請單于報父怨遂西攻破大月氏大月氏復西走徙大夏地昆莫略其衆因留居兵稍彊㑹單于死不肯復朝事匈奴匈奴遣兵撃之不勝益以為神而逺之師古曰逺離也音于萬反今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遺公主為夫人結昆弟其勢宜聽師古曰言事事聽從於漢劉敞曰遺字當作遣宋祁曰作遣是則是斷匈奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎将将三百人馬各二匹牛羊以萬數齎金幣帛直數千鉅萬多持節副使師古曰為騫之副而各令持節道可便遣之旁國宋祁曰古本及浙本遣字下並有一遣字騫既至烏孫致賜諭指師古曰以天子意指曉告之未能得其決語在西域傳騫即分遣副使使大宛康居月氏大夏烏孫發譯道送騫師古曰道讀曰導與烏孫使數十人馬數十匹報謝師古曰與騫相随而來報謝天子因令窺漢知其廣大騫還拜為大行嵗餘騫卒後嵗餘宋祁曰古本騫卒字下複騫卒二字其所遣副使通大夏之屬者皆頗與其人俱來晉灼曰其國人於是西北國始通於漢矣然騫鑿空蘓林曰鑿開也空通也騫始開通西域道也師古曰空孔也猶言始鑿其孔穴也故此下言當空道而西域傳謂孔道也諸後使徃者皆稱博望侯以為質於外國李竒曰質信也外國由是信之其後烏孫竟與漢結婚初天子發書易鄧展曰發易書以卜宋祁曰古本作發易書曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云而漢始築令居以西臣瓚曰令居縣名也屬金城築塞西至酒泉也師古曰令音零初置酒泉郡以通西北國因益發使抵安息奄蔡犛靬條支身毒國李竒曰靬音軒服䖍曰犛靬張掖縣名也師古曰抵至也自安息以下五國皆西域胡也犛靬即大秦國也張掖驪靬縣盖取此國為名耳驪犛聲相近靬讀與軒同李竒音是也服說非也而天子好宛馬使者相望於道一軰大者數百人少者百餘人所齎操大放博望侯時師古曰操持也所齎持謂節及幣也放依也音甫徃反其後益習而衰少焉師古曰以其串習故不多發人漢率一嵗中使者多者十餘少者五六軰逺者八九嵗近者數嵗而反師古曰道逺則還遲近則來疾是時漢既滅越蜀所通西南夷皆震請吏置牂柯越巂益州沈黎文山郡欲地接以前通大夏李竒曰欲地界相接至大夏也廼遣使嵗十餘軰出此初郡師古曰文山以上初置者皆復閉昆明如淳曰為昆明所閉宋祁曰越本無皆字為所殺奪幣物於是漢發兵撃昆明斬首數萬後復遣使竟不得通語在西南夷傳自騫開外國道以尊貴其吏士爭上書言外國竒怪利害求使天子為其絶逺非人所樂聼其言師古曰凡人皆不樂去故有自請為使者即聼而遣之予節募吏民無問所從來為􅊀衆遣之以廣其道師古曰不為限禁逺近雖家人私𨽻竝許應募來還不能無侵盗幣物及使失指師古曰乖天子指意天子為其習之輙覆按致重罪師古曰言其串習不以為難必當更求充使也以激怒令贖師古曰令立功以贖罪復求使使端無窮而輕犯法其吏卒亦輙復盛推外國所有言大者予節言小者為副故妄言無行之徒皆爭相效其使皆私縣官齎物師古曰言所齎官物竊自用之同於私有欲賤市以私其利師古曰所市之物得利多者不盡入官也外國亦厭漢使人人有言輕重服䖍曰漢使言於外國人人輕重不實度漢兵逺不能至師古曰度計也而禁其食物以苦漢使師古曰令其困苦也漢使之絶責怨至相攻撃樓蘭姑師小國當空道師古曰空即孔也宋祁曰怨浙本作怒攻劫漢使王恢等尤甚而匈奴竒兵又時時遮撃之使者爭言外國利害師古曰言服之則利不討則為害皆有城邑兵弱易撃於是天子遣從票侯破奴師古曰趙破奴将屬國騎及郡兵數萬以撃胡胡皆去明年撃破姑師虜樓蘭王酒泉列亭鄣至玉門矣韋昭曰玉關關在龍勒界而大宛諸國發使随漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢應劭曰卵大如一二石􅜍也眩相詐惑也鄧太后時西夷檀國來朝賀詔令為之而諌大夫陳禪以為夷狄偽道不可施行後數日尚書陳忠案漢舊書乃知世宗時犛靬獻見幻人天子大悅與俱廵狩乃知古有此事師古日鳥卵如汲水之􅜍耳無一二石也應說失之眩讀與幻同即今吞刀吐火植𤓰種樹屠人截馬}
