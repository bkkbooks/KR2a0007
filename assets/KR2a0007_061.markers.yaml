  - {type: variant, offset: 4756, length: 0, content: '', WYG: 荀恱誤以放為效字因觧為不效盖失之矣前漢書卷六十一前漢書卷六十一考證張騫傳居匈奴西史記大宛傳作居匈奴中益寛立其夫人為王臣召南按史記作立其太子為王外國固時有女王然以下文推之似史記是去十三歳惟二人得還通鑑考異曰史記西南夷傳曰元狩元年張騫使大夏來言通身毒國之利按年表騫以元朔六年二月封博望侯必非元狩元年始歸也或者元狩元年始令騫通身毒國疑不能明大夏去漢萬二千里居西南史記作居漢西南此漢字似不可省出駹出莋出徙卭出僰史記作出駹出冉出徙出卭僰廼復事西南夷}
