  - {type: variant, offset: 28, length: 1, content: 厚, WYG: 及金馬以請宛王貳師城善馬宛國饒漢物師古曰素有漢地財物故不貪金馬之幣相與謀曰漢去我逺而鹽水中數有敗服䖍曰水名道從水中行師古曰沙磧之中不生草木水又鹹苦即今敦煌西北惡磧者也數有敗言每}
