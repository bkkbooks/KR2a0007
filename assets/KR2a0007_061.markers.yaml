  - {type: variant, offset: 51, length: 0, content: '', WYG: 李廣利為将軍伐宛騫孫猛字子游有俊才元帝時為光禄大夫使匃奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上産昌邑哀王太初元年以廣利為貳師将軍發屬國六千騎及郡國惡少年數萬人以徃師古曰惡少年謂無行義者期至貳師城取善馬故號貳師将軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成師古曰比音必寐}
  - {type: page-break, offset: 51, content: '', id: KR2a0007_WYG_061-11b, image: WYG0250/WYG0250-0334b.png}
  - {type: variant, offset: 51, length: 0, content: '', krp: 李廣利為将軍伐宛騫孫猛字子游有俊才元帝時為光禄大夫使匃奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上産昌邑哀王太初元年以廣利為貳師将軍發屬國六千騎及郡國惡少年數萬人以徃師古曰惡少年謂無行義者期至貳師城取善馬故號貳師将軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成師古曰比音必寐}
  - {type: variant, offset: 52, length: 2, content: 吾真, WYG: 士財有數千皆飢罷師古曰財與才同罷讀曰疲攻郁成城郁成距之所殺傷甚衆貳師将軍與左右計至郁成尚不能舉况至其王都乎引而還徃來二嵗至敦煌士不過什一二師古曰十人之中一二人得還使使上書言道逺多乏食且士卒不患戰而患飢人少不足以㧞宛願且罷兵益發而復往師古曰益多也天子聞之大怒使使遮玉門闗曰軍有敢入斬之貳師恐因留屯敦煌其夏漢亡浞野之兵二萬餘於匈奴師古曰趙破奴後封浞野侯浞音土角反公卿議者皆願罷宛軍專力致胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使晉灼曰易輕也師古曰輪臺亦國名為外國笑廼案言伐宛尤不便者鄧光等師古曰案其罪而行罰赦囚徒扞宼盗如淳曰放囚徒使其扞禦㓂盗師古曰使從軍為斥候發惡少年及邊騎嵗餘而出敦煌六萬人師古曰興發部署嵗餘乃得行負私從者不與師古曰負私糧食及私從者不在六萬人數中也與讀曰豫牛十萬馬三萬匹驢橐駝以萬數齎糧兵弩甚設師古曰施張甚具也天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城師古曰空孔也徙其城下水者令從他道流不迫其城也空以穴其城者圍而攻之令作孔使穿穴也下云決其水原移之又云圍其城攻之皆再敘其事也一曰既徙其水不令於城下流而因其舊引水入城之孔攻而穴之益發戍甲卒十八萬酒泉張掖北置居延休屠以衛酒泉如淳曰立二縣以衛邊也或曰置二部都尉而發天下七科適師古曰適讀曰讁七科觧在武紀及載糒給貳師師古曰糒乾飯音備轉車人徒相連屬至敦煌師古曰屬音之欲反宋祁曰車當作運而拜習馬者二人為執驅馬校尉師古曰習猶便也一人為執馬校尉一人為驅馬校尉備破宛擇取其善馬云於是貳師後復行兵宋祁曰古無後字予謂後字當存為是多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城師古曰平行言無冦難兵到者三萬宛兵迎撃漢兵漢兵射敗之宛兵走入保其城貳師欲攻郁成城恐留行而令宛益生詐師古曰留行謂留止軍廢其行廼先至宛決其水原宋祁曰古本作源移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王毋寡匿善馬殺漢使師古曰毋寡宛王名今殺王而出善馬漢兵宜觧即不宋祁曰不字下當有觧字廼力戰而死未晚也宛貴人皆以為然共殺王其外城壊虜宛貴人勇将煎靡師古曰宛之貴人為将而勇者名煎靡也煎音子延反宛大恐走入中城相與謀曰漢所為攻宛以王毋寡持其頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聼我我盡殺善馬康居之救又且至至我居内康居居外與漢軍戰孰計之何從師古曰令貳師孰計之而欲攻戰乎欲不攻而取馬乎是時康居候視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其内食尚多計以為來誅首惡者毋寡毋寡頭巳至如此不許則堅守而康居候漢兵罷來救宛破漢軍}
