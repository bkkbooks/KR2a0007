  - {type: variant, offset: 34, length: 1, content: 所, WYG: 也出其北有胡寇出其南之水草又且徃徃而絶邑師古曰近道處無城郭之居也乏食者多漢使數百人為軰來常之食死者過半是安能致大軍乎且貳師馬宛寳馬也遂}
