  - {type: variant, offset: 1985, length: 694, content: 石其泥數斗且溉且糞長我禾黍衣食京師億萬之口言此兩渠饒也是時方事匈奴興功利言便宜者甚眾齊人延年上書言河出昆侖經中國注勃海是其地勢西北高而東南下也可案圖書觀地形令水工準高下開大河上領出之胡中東注之海如此關東長無水災北邊不憂匈奴可以省隄防備塞士卒轉輸胡寇侵盜覆軍殺將暴骨原野之患天下常備匈奴而不憂百越者以其水絕壤斷也此功壹成萬世大利書奏上壯之報曰延年計議甚深然河乃大禹所道也聖人作事為萬世功通於神明恐難改更自塞宣房後河復北決於館陶分為屯氏河東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兗州以南六郡無水憂宣帝地節中光祿大夫郭昌使行河北曲三所水流之勢皆邪直貝丘縣恐水盛隄防不能禁乃各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河決清河靈鳴犢口而屯氏河絕成帝初清河都尉馮逡奏言郡承河下流與兗州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖高增隄防終不能泄如有霖雨旬日不霽必盈溢靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有勢故穿九河今既滅難明屯氏河不流行七十餘年新絕未久其處易浚又其口所居高於以分流景祐殿本都有流字殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三歲河水更從故第二曲間北可六里復南合今其曲勢復邪直貝丘百姓寒心宜復穿渠東行不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白博士許商治尚書善為算能度功用遣行視以為屯氏河盈溢所為方用度不足可且勿浚後三歲河果決於館陶及東郡金隄泛溢兗豫入平原千乘濟南凡灌四郡三, WYG: ''}
