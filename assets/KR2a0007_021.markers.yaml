  - {type: variant, offset: 5, length: 0, content: '', WYG: 枚相因之數有十正面之數實九其表六九五十四算中積凡得二百七十一枚徑象乾律黄鐘之一而長象坤呂林鐘之長張晏曰林鐘長六寸韋昭曰黄鐘管九寸十分之一得其一分也其數以易大衍之數五十其用四十九成陽六爻得周流六虚之象也孟康曰以四十九成陽六爻爲乾乾之策數二百一十六以成六爻是爲周流六虚之象也夫推歴生律張晏曰推歴十二辰以生律呂也制器規圜矩方權重衡平凖繩嘉量張晏曰準水平量知多少故曰嘉探賾索隠鉤深致遠莫不用焉師古曰賾亦深也索求也度長短者不失豪氂孟康曰豪兎豪也十豪爲氂師古曰度音大角反量多少者不失圭撮應劭曰圭自然之形隂陽之始也四圭曰撮三指撮之也孟康曰六十四黍爲圭師古曰撮音倉括反權輕重者不失黍絫孟康曰絫音累蠡應劭曰十黍爲絫十絫爲一銖師古曰絫孟音來戈反此字讀亦音纍紲之纍紀於一協於十長於百大於千衍於萬其法在算術宣于天下小學是則職在太史羲和掌之聲者宫商角徴羽也所以作樂者諧八音蕩滌人之邪意全其正性移風易俗也八音土曰塤應劭曰世本暴辛公作塤師古曰燒土爲之其形銳上而平底六孔吹之塤音許元反字或作壎其音同耳匏曰笙應劭曰世本隨作笙師古曰匏􅉚也列管􅉚中施簧管端皮曰鼓師古曰鼓者郭也言郭張皮而爲之宋祁曰郭景本廓作竹曰管孟康曰禮樂器記管漆竹長一尺六孔尚書大傳西王母來獻白玉琯漢章帝時零陵文學奚景於泠道舜祠下得白玉琯古以玉作不但竹也絲曰絃石曰磬金曰鐘木曰柷師古曰柷與俶同俶始也樂將作先鼓之故謂之柷狀如漆桶中有椎連底撞之令左右擊音昌六反五聲和八音諧而樂成商之爲言章也物成孰可章度也師古曰度音大角反角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生爲四聲綱也徴祉也物盛大而緐祉也羽宇也物聚臧宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲爲宫紀也協之五行則角爲木五常爲仁五事爲貌商爲金爲義爲言徴爲火爲禮爲視羽爲水爲智爲聽宫爲土爲信爲思以君臣民事物言之則宫爲君商爲臣角爲民徴爲事羽爲物唱和有象故言君臣位事之體也五聲之本生於黄鐘之律九寸爲宫或損或益以定商角徴羽九六相生隂陽之應也律十有二陽六爲律隂六爲呂律以統氣類物一曰黄鐘二曰太族師古曰族音千豆反三曰姑洗四曰蕤賓五曰夷則六曰亡射師古曰亡讀曰無射音亦石反呂以旅陽宣氣一曰林鐘二曰南呂三曰應鐘四曰大呂五曰夾鐘六曰中呂師古曰中讀曰仲有三統之義焉其傳曰黄帝之所作也黄帝使泠綸師古曰泠音零綸音倫自大}
