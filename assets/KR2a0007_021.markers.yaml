  - {type: variant, offset: 645, length: 0, content: '', WYG: 王訪箕子箕子言大法九章而五紀明歴法孟康曰嵗月日星辰是謂五紀也師古曰大法九章即洪範九疇也其四曰協用五紀也故自殷周皆創業改制咸正歴紀服色從之順其時氣以應天道三代既没五伯之末史官䘮紀疇人子弟分散如淳曰家業世世相傳爲疇或在夷狄故其所記有黄帝顓頊夏殷周及魯歴戰國擾攘秦兼天下未遑暇也亦頗推五勝孟康曰五行相勝秦以周爲火用水勝之而自以爲獲水徳乃以十月爲正色尚黑師古曰獲水徳謂有黒龍之瑞漢興方綱紀大基庶事草創襲秦正朔以北平侯張蒼言用顓頊歴比於六歴疏濶中最爲微近然正朔服色未覩其真而朔晦月見弦望滿虧多非是至武帝}
