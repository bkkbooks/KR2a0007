  - {type: variant, offset: 1500, length: 0, content: '', krp: 舉春秋以目一嵗易兩儀之中也於春每月書王易三極之綂也於四時雖亡事必書時月易四象之節也時月以建分至啟閉之分易八卦之位也張晏曰二至二分立春立夏立秋立冬象事成敗易吉凶之効也朝聘㑹盟易大業之本也故易與春秋天人之道也傳曰龜象也筮數也物生而後有象象而後有滋滋而後有數師古曰左氏傳載韓簡之言也物生則有象冇象而滋益滋益}
  - {type: variant, offset: 1501, length: 0, content: '', WYG: 數起龜以象告吉凶筮以數示禍福是故元始有象一也春秋二也三綂三也四時四也合而爲十成五體以五乘十大衍之數也而道據其一其餘四十九所當用也故筮以爲數以象兩兩之又以象三三之又以象四四之又歸竒象閠十九孟康曰嵗有閠分七分滿十九則爲閠也師古曰竒音居宜反及所據一加之因以再扐兩之師古曰扐音勒劉攽曰兩之得九十八三之得二百九十四四之得一千一百七十六象閏所據一加之爲一千一百九十六兩之爲二千三百九十二是爲月法之實如日法得一則一月之日數也而三辰之㑹交矣是以能生吉凶孟康曰三辰日月星也軌道相錯故有交會交會即隂陽有干陵勝負故生吉凶也故易曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也師古曰皆上繫之辭并終數爲十九易窮則變故爲閠法孟康曰天終數九地終數十窮終也言閠亦日之窮餘故取二終之數以爲義參天九兩地十是爲㑹數參天數二十五兩地數三十是爲朔望之㑹以㑹數乘之則周於朔旦冬至是爲㑹月孟康曰㑹月二十七章之月數也得朔旦冬至日與嵗復九㑹而復元孟康曰謂四千六百一十七嵗之月數也所謂元月黄鐘初九之數也經於四時雖亡事必書時月時所以紀啟閉也月所以紀分至也啟閉者節也分至者中也節不必在其月故時中必在正數之月故傳曰先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不誖師古曰自此以上左氏傳之辭也履端於始謂歩歴之始以爲術之端首也舉正於中謂分一朞爲十二月舉中氣以正月也歸餘於終謂有餘日則歸於終積而成閏也誖乖也音布内反此聖王之重閠也以五位乘㑹數而朔旦冬至是爲章月四分月法以其一乘章月是爲中法參閠法爲周至以乘月法以減中法而約之則六扐之數爲一月之閠法其餘七分此中朔相求之術也朔不得中是爲閠月言隂陽雖交不得中不生故日法乘閠法是爲綂嵗三綂是爲元嵗元嵗之閠隂陽災三綂閠法易九戹曰初入元百六陽九次三百七十四隂九孟康曰易傳也所謂陽九之戹百六之㑹者也初入元百六嵗冇戹者則前元之餘氣也若餘分爲閏也易爻有九六七八百六與三百七十四六乘八之數也六八四十八合爲四百八十嵗也次四百八十陽九孟康曰亦六乘八之數也於易爻六有變故再數也如淳曰六八四十八爲四百八十嵗有九年旱次七百二十隂七孟康曰亦九乘八之數也八九七十二爲七百二十嵗次七百二十陽七孟康曰亦九乘八之數也於易爻九變故再數也如淳曰八十嵗紀一甲子冬至以八乘九八九七十二故七百二十嵗乃有災也次六百隂五次六百陽五孟康曰七八爻乘八之數也七乘八得五百六十嵗八乘八得六百四十嵗合千二百嵗也於易爻七八不變氣不通故合而數之各得六百嵗也如淳曰爻有七八八八六十四七八五十六二爻之數合千二百滿純隂七八不變故通其氣使各六百嵗乃有災次四百八十隂三次四百八十陽三孟康曰此六乘八之數也六既有變又隂爻也陽竒隂偶故九再數而六四數七八不變又無偶各一數一元之中有五陽四隂陽旱隂水九七五三皆陽數也故曰陽九之戹如淳曰九六者陽竒隂偶偶故重出覆取上六八四十八故同四百八十嵗正以九七五三爲災者從天竒數也易天之數曰立天之道曰隂與陽繫天故取其竒爲災嵗數八十嵗則甲子冬至一甲子六十日一嵗三百六十日八十嵗得四百八十甲子又五日五八四十爲四百日又四分日之一八十嵗有八十分八十分爲二十日凡四百八十日得七十甲子八十嵗合四百八十七甲子餘分皆盡故八十嵗則一甲子冬至也凡四千六百一十七嵗與一元終經嵗四千五百六十災嵗五十七孟康曰經嵗從百六終陽三也得災嵗五十七合爲一元四千六百一十七嵗是以春秋曰舉正於中又曰閏月不告朔非禮也閏以正時時以}
