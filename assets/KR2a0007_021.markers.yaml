  - {type: variant, offset: 3688, length: 177, content: 輔三河弘農太守舉吏民能者莫有應書待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水勢所不及大川無防小水得入陂障卑下以為汙澤使秋水多得有所休息左右游波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河, WYG: 千}
