  - {type: variant, offset: 3201, length: 5, content: 敗官亭民舍, krp: 王六百二十九嵗四分上元至伐桀十三萬二千一百一十三嵗其八十八紀甲子府首入伐桀後百二十七嵗春秋歴周文王四十二年十二月丁丑朔旦冬至孟綂之二㑹首也後八嵗而武王伐紂武王書經牧誓武王伐商紂水生木故爲木徳天下號曰周室三綂上元至伐紂之嵗十}
  - {type: variant, offset: 3208, length: 0, content: '', WYG: 二千一百九嵗嵗在鶉火張十三度文王受命九年而崩再期在大祥而伐紂故書序曰惟十有一年武王伐紂太誓八百諸侯㑹還歸二年乃遂伐紂克殷以箕子歸十三年也故書序曰武王克殷以箕子歸作洪範洪範篇曰惟十有三祀王訪于箕子自文王受命而至此十三年嵗亦在鶉火故傳曰嵗在鶉火則我有周之分壄也師初𤼵以殷十一月戊子日在析木箕七度故傳曰日在析木是夕也月在房五度房爲天駟故傳曰月在天駟後三日得周正月辛卯朔合辰在斗前一度斗柄也故傳曰辰在斗柄明日壬辰䢅星始見師古曰䢅古晨字也其字從臼臼音居玉反癸巳武王始𤼵丙午還師戊午度于孟津孟津去周九百里師行三十里故三十一日而度明日己未冬至䢅星與婺女伏歴建星及牽牛至於婺女天黿之首故傳曰星在天黿周書武成篇惟一月壬辰旁死霸孟康曰月二日以往月生魄死故言死魄魄月質也師古曰霸古魄字同若翌日癸巳武王乃朝歩自周于征伐紂序曰一月戊午師度于孟津至庚申二月朔日也四日癸亥至牧壄夜陳甲子昧爽而合矣故外傳曰王以二月癸亥夜陳武成篇曰粤若來三月既死霸粤五日甲子咸劉商王紂師古曰今文尚書之辭劉殺也是嵗也閏數}
