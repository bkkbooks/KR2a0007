  - {type: variant, offset: 3266, length: 6, content: 餘里水道浚利, WYG: 七十七嵗得孟綂五十三章首故傳曰五年春王正月辛亥朔日南至八月甲午晉侯圍上陽童謠云丙子之辰龍尾伏辰袀服振振取虢之旂師古曰袀音均}
