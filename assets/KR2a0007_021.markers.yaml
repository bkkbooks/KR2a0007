  - {type: variant, offset: 679, length: 445, content: 武安侯田蚡為丞相其奉邑食鄃鄃居河北河決而南則鄃無水災邑收入多蚡言於上曰江河之決皆天事未易以人力彊塞彊塞之未必順景祐汲古殿局本都作應應景祐汲古殿局本都作應天而望氣用數者亦以為然是以久不復塞也時鄭當時為大司農言異時關東漕粟從渭上度六日罷而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易遭度可令三月罷罷罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同而渠下民田萬餘頃又可得以溉此捐罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同損罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同漕省卒而益肥關中之地得穀上以為然令齊人水工徐伯表發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉矣後河東守番係言漕從山東西歲百餘萬石更底柱之艱敗亡甚多而煩費穿渠引汾溉皮氏汾陰下引河溉汾陰蒲坂下度可得五千頃故盡河堧棄地民茭牧其中耳今溉田之度可得穀二百萬石以上穀從渭上與關中無異而底柱之東可毋復漕上以為然發卒數萬人作渠田數歲河移徙渠不利田者不能償種久之河東渠田廢予越人令少府以為稍入其後人有上書欲通襃斜道及漕事下, WYG: ''}
