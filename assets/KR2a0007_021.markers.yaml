  - {type: variant, offset: 3285, length: 0, content: '', WYG: 十三正小雪閏當在十一月後而在三月故傳曰非禮也後五年閏餘十是嵗亡閏而置閏閏所以正中朔也亡閏而置閏又不告朔故經曰閏月不告朔言亡此月也傳曰不告朔非禮也春秋文公即位十八年子宣公倭立師古曰倭音於危反宣公春秋即位十八年子成公黑肱立成公十二年正月庚寅朔旦冬至殷歴以爲辛卯距定公七年七十六嵗春秋成公即位十八年子襄公午立襄公二十七年距辛亥百九嵗九月乙亥朔是建申之月也魯史書十二月乙亥朔日有食之傳曰冬十一月乙亥朔日有食之於是辰在申司歴過也再失閏矣言時實行以爲十一月也不察其建不考之於天也二十八年距辛亥百一十嵗嵗在星紀故經曰春無冰傳曰嵗在星紀而滛於𤣥枵三十年嵗在娵訾三十一年嵗在降婁是嵗距辛亥百一十三年二月有癸未上距文公十一年㑹于承匡之嵗夏正月甲子朔凡四百四十有五甲子竒二十日爲日二}
