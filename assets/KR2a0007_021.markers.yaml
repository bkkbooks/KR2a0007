  - {type: variant, offset: 7, length: 4, content: 禹堙洪水, krp: 曰天功人其代之師古曰虞書咎繇謩也言聖人禀天造化之功代而行之天兼地人則天故以五位之合乘焉唯天爲大唯堯則之之象也師古曰則法也論語稱孔子曰大哉堯之爲君也唯天爲大唯堯則之美帝堯能法天而行化地以中數乘者隂道理内在中餽之象也師古曰餽字與饋同易家人卦六二爻辭曰无攸遂在中饋言婦人之道取象於隂無所必遂但居中主饋食而已故云然三統相通故黄鐘林鐘太族律長皆全寸而亡餘分也天之中數五地之中數六而二者爲合六爲虛五爲聲周流於六虛虛者爻律夫隂陽登降運行列爲十二而律呂和矣太極元氣函三爲一孟康曰元氣始起於子未分之時天地人混合爲一故子數獨一也師古曰函讀與含同後皆類此也極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四}
  - {type: variant, offset: 13, length: 1, content: 年, WYG: 又參之於午得七百二十九又參之於未得二千一百八十七又參之於申得六千五百六十一又參之於酉得萬九千六百八十三又參之於戌得五萬九千四十九又參之於亥得十七萬七千一百四十七此隂陽合徳氣鐘於子化生萬物者也故孶萌於子紐牙於丑引逹於寅冒茆於卯師古曰茆謂叢生也音莫保反振美於辰巳盛於巳咢布於午蘇林曰咢音愕昧薆於未師古曰薆蔽也音愛申堅於申留孰於酉畢入於戍該閡於亥出甲於甲奮軋於乙師古曰軋音於黠反明炳於丙大盛於丁豐楙於戊理紀於己斂更於庚悉新於辛懐任於壬陳揆於癸故隂陽之施化萬物之終始既類旅於律呂又經歴於日辰而變化之情可見矣玉衡杓建天之綱也如淳曰杓音猋斗端星也孟康曰斗在天中周制四方猶宮聲處中爲四聲綱也師古曰杓音必遙反日月初躔星之紀也孟康曰躔舍也二十八舍列在四方日月行焉起於星紀而又周之猶四聲爲宮紀也晉灼曰下言斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中是謂天之綱紀也師古曰躔踐也音直連反綱紀之交以原始造設合樂用焉律呂唱和以育生成化歌奏用焉指顧取象然後隂陽萬物靡不條鬯該成師古曰條逹也鬯與暢同故以成之數忖該之積孟康曰成之數者謂黄鐘之法數該之積爲黄鐘變生十二辰積實之數也忖除也言以法數除積得九寸即黄鐘之長也言該者該衆律之數也師古曰忖音于本反劉敞曰故以成之數忖該之積按上言南呂任成萬物然後成之數謂酉也從酉數除亥數則得九矣如法爲一寸則黄鐘之長也孟康曰得一寸則所謂得九寸也言一者張法辭參分損一下生林鐘張晏曰黄鐘長九寸以二乘九得十八以三除之得林鐘六寸其法率如此推當算乃解晉灼曰蔡邕律歴記凡陽生隂曰下隂生陽曰上也參分林鐘益一上生太族參分太族損一下生南呂參分南呂益一上生姑洗參分姑洗損一下生應鐘參分應鐘益一上生蕤賓參分蕤賓損一下生大呂參分大呂益一上生夷則參分夷則損一下生夾鐘參分夾鐘益一上生亡射參分亡射損一下生中呂隂陽相生自黄鐘始而左旋八八爲伍孟康曰從子數辰至未得八下生林鐘數未至寅得八上生太族律上下相生皆以此爲率伍耦也八八爲耦其法皆用銅職在大樂太常掌之度者分寸尺丈引也所以度長短也師古曰度音大各反下皆類此本起黄鐘之長以子榖秬黍中者師古曰子榖猶言榖子秬即黑黍中者不大不小也言取黑黍榖子大小中者率爲分寸也秬音鉅一黍之廣度之九十分黄鐘之長一爲一分十分爲寸十寸爲尺十尺爲丈十丈爲引而五度審矣其法用銅高一寸廣二寸長一丈而分寸尺丈存焉用竹爲引高一分廣六分長十丈其方法矩高廣之數隂陽之象也孟康曰高一分廣六分一爲陽六爲隂也分者自三微而成著可分别也寸者忖也尺者蒦也師古曰蒦音約丈者張也引者信也師古曰信讀曰伸言其長夫度者别於分忖於寸蒦於尺張於丈信於引引者信天下也職在内官師古曰内官署名也百官表云内官長丞初屬少府中屬主爵後屬宗正廷尉掌之師古曰法度所起故屬廷尉也量者龠合升斗斛也師古曰龠音籥合音閤所以量多少也本起於黄鐘之龠用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子榖秬黍中者千有二百實其龠以井水凖其㮣孟康曰㮣欲其直故以水平之井水清清則平也師古曰㮣所以㮣平斗斛之上者也音工代反又音工内反合龠爲合十合爲升十升爲斗十斗爲斛而五量嘉矣師古曰嘉善也其法用銅方尺而圜其外旁有庣焉鄭氏曰庣音條桑之條庣}
