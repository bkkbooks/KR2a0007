  - {type: variant, offset: 7, length: 4, content: 禹堙洪水, WYG: 曰天功人其代之師古曰虞書咎繇謩也言聖人禀天造化之功代而行之天兼地人則天故以五位之合乘焉唯天爲大唯堯則之之象也師古曰則法也論語稱孔子曰大哉堯之爲君也唯天爲大唯堯則之美帝堯能法天而行化地以中數乘者隂道理内在中餽之象也師古曰餽字與饋同易家人卦六二爻辭曰无攸遂在中饋言婦人之道取象於隂無所必遂但居中主饋食而已故云然三統相通故黄鐘林鐘太族律長皆全寸而亡餘分也天之中數五地之中數六而二者爲合六爲虛五爲聲周流於六虛虛者爻律夫隂陽登降運行列爲十二而律呂和矣太極元氣函三爲一孟康曰元氣始起於子未分之時天地人混合爲一故子數獨一也師古曰函讀與含同後皆類此也極中也元始也行於十二辰始動於子參之於丑得三又參之於寅得九又參之於卯得二十七又參之於辰得八十一又參之於已得二百四}
