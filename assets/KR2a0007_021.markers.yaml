  - {type: variant, offset: 138, length: 0, content: '', WYG: 成著可殊異也兩者兩黄鐘律之重也李竒曰黄鐘之管重十二銖兩十二得二十四也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也孟康曰六甲爲六旬一嵗冇八節六甲周行成嵗以六乘八節得之三十斤成鈞者一月之象也石者}
