  - {type: variant, offset: 2798, length: 2, content: 河隄, krp: 始留十日而旋逆日行六十二分度十七六十二日復留十日而旋復順日行九十二分度五十三二百七十六日而伏凡見六百三十四日除逆定行星三百一度伏日行不盈九十二分度七十三分伏百四十六日千五百六十八萬九千七百分行星百一十四度八百二十一萬八千五分一見七百八十日千五百六十八萬九千七百分凡行星四百一十五度八百二十一萬八千五分通其率故曰日行萬三千八百二十四分度之七千三百五十五水晨始見去日半次逆日行二度一日始留二日而旋順日行七分度六十七日順疾日行一度三分度一十八日而伏凡見二十八日除逆定行星二十八度伏日行一度九分度七有竒三十七日一億二千二百二萬九千六百五分行星六十八度四千六百六十一萬一百二十八分凡晨見伏六十五日一億二千二百二萬九千六百五分行星九十六度四千六百六十一萬一百二十八分夕始見去日半次順疾日行一度三分度一十六日二分日一順遲日行七分度六七日留一日二分日一而旋逆日行二度一日而伏凡見二十六日除逆定行星二十六度伏逆日行十五分度四有竒二十四日行星六度五千八百六十六萬二千八百二十分凡夕見伏五十日行星十九度七千五百四十一萬九千四百七十七分壹復百一十五日一億二千二百二萬九千六百五分劉敞曰此壹復字亦妄與金通計義同行星亦如之故曰日行一度綂術推日月元綂置太極上元以來外所求年盈元法除之餘不盈綂者則天綂甲子以來年數也盈綂除之餘則地綂甲辰以來年數也又盈綂除之餘則人綂甲申以來年數也各以其綂首日爲紀推天正以章月乘人綂嵗數盈章嵗得一名曰積月不盈者名曰閏餘閏餘十二以上嵗有閏求地正加積月一求人正加二推正月朔以月法乘積月盈日法得一名曰積日不盈者名曰小餘小餘三十八以上其月大積日盈六十除之不盈者名曰大餘數從綂首日起算外則朔日也求其次月加大餘二十九小餘四十三小餘盈日法得一從大餘數除如法求弦加大餘七小餘三十一求望倍弦推閏餘所在以十二乘閏餘加十得一盈章中數所得起冬至算外則中至終閏盈中氣在朔若二日則前月閏也推冬至以算餘乘人綂嵗數盈綂法得一名曰大餘不盈者名曰小餘除數如法則所求冬至日也求八節加大餘四十五小餘千一百求二十四氣三其小餘加大餘十五小餘千一十林文炳曰當作小餘千一十當云求二十四氣加大餘十五三分其小餘千一十蓋傳寫顚倒漏一分字推中部二十四氣皆以元爲法推五行其四行各七十三日綂嵗分之七十七宋祁曰十七當作十四中央各十八日綂法分之四百四冬至後中央二十七日六百六分推合晨所在星置積日以綂法乘之以十九乘小餘而并之盈周天除去之不盈者令盈綂法得一度數起牽牛算外則合晨所入星度也推其日夜半所在星以章嵗乘月小餘以減合晨度小餘不足者破全度推其月夜半所在星以月周乘月小餘盈綂法得一度以減合晨度推諸加時以十二乘小餘爲實各盈分母爲法數起於子算外則所加辰也推月食置㑹餘嵗積月以二十三乘之盈百三十五除之不盈者加二十三得一月盈百三十五數所得起其正算外則食月也加時在望日衝辰紀術推五星見復置太極上元以來盡所求年乘大綂見復數盈嵗數得一則定見復數也宋祁曰景本大綂作大終不盈者名曰見復餘見復餘盈其見復數一以上見在往年倍一以上又在前往年不盈者在今年也推星所在見中次以見中分乘定見復數盈見中法得一則積中法也不盈者名曰中餘以元中除積中餘則中元餘也以章中除之餘則入章中數也以十二除之餘則星見中次也中數從冬至起次數從星紀起算外則星所見中次也推星見月以閏分乘定見以章嵗乘中餘從之盈見月法得一并積中則積月也不盈者名曰月中餘以元月除積月餘名曰月元餘以章月除月元餘則入章月數也以十二除之至有閏之嵗除十三入章三嵗一閏六嵗二閏九嵗三閏十一嵗四閏十四嵗五閏十七嵗六閏十九嵗七閏不盈者數起於天正算外則星所見月也推至日以中法乘中元餘盈元法得一名曰積日不盈者名曰小餘小餘盈二千五百九十七以上中大數除積日如法算外則冬至也推朔日以月法乘月元餘盈日法得一名曰積日餘名曰小餘小餘三十八以上月大數除積日如法算外則星見月朔日也推入中次日度數以中法乘中餘以見中法乘其小餘并之盈見中日法得一則入中日入次度數也中次至日數次以次初數算外則星所見及日所在度數也求夕在日後十五度推入月日數以月法乘月餘以見月法乘其小餘并之盈見月日法得一則入月日數也并之大餘數除如法則見日也推後見中加積中於中元餘加後餘於中餘盈其法得一從中元餘數如法則見中也宋祁曰景本餘盈下有中字推後見月加積月於月元餘加後月餘於月餘盈其法得一從月元餘除數如法則後見月也推至日及入中次度數如上法推朔日及入月數如上法推晨見加夕夕見加晨皆如上法推五歩置始見以來日數至所求日各以其行度數乘之其星若日有分者分子乘全爲實分母爲法其兩有分者分母分度數乘全分子從之令相乘爲實分母相乘爲法實如法得一名曰積度數起星初見星宿所在宿度算外則星所在宿度也嵗術推嵗所在置上元以來外所求年盈嵗數除去之不盈者以百四十五乘之以百四十四爲法如法得一名曰積次不盈者名曰次餘積次盈十二除去之不盈者名曰定次數從星紀起算盡之外則所在次也欲知太嵗以六十除餘積次餘不盈者數從丙子起算盡之外則太嵗日也贏縮傳曰嵗棄其次而旅於明年之次以害鳥帑師古曰帑與奴同周楚惡之五星之贏縮不是過也過次者殃大過舍者災小不過者亡咎次度六物者嵗時數日月星辰也辰者日月之㑹而建所指也星紀初斗十二度大雪中牽牛初冬至於夏爲十一月商爲十二月周爲正月終於婺女七度𤣥枵初婺女八度小寒中危初大寒於夏爲十二月商爲正月周爲二月終於危十五度諏訾初危十六度立春中營室十四度驚蟄今曰雨水於夏爲正月商爲二月周爲三月終於奎四度降婁初奎五度雨水今曰驚蟄中婁四度春分於夏爲二月商爲三月周爲四月終於胃六度大梁初胃七度榖雨今曰清明中昴八度清明今曰榖雨於夏爲三月商爲四月周爲五月終於畢十一度實沈初畢十二度立夏中井初小滿於夏爲四月商爲五月周爲六月終於井十五度鶉首初井十六度芒種中井三十一度夏至於夏爲五月商爲六月周爲七月終於柳八度鶉火初柳九度小暑中張三度大暑於夏爲六月商爲七月周爲八月終於張十七度鶉尾初張十八度立秋中翼十五度處暑於夏爲七月商爲八月周爲九月終於軫十一度夀星初軫十二度白露中角十度秋分於夏爲八月商爲九月周爲十月終於氐四度大火初氐五度寒露中房五度霜降於夏爲九月商爲十月周爲十一月終於尾九度析木初尾十度立冬中箕七度小雪於夏爲十月商爲十一月周爲十二月終於斗十一度角十二亢九氐十五房五心五尾十八箕十一東七十五度斗二十六牛八女十二虛十危十七營室十六壁九北九十八度奎十六婁十二胃十四昴十一畢十六觜二參九西八十度井三十三鬼四柳十五星七張十八翼十八軫十七南百一十二度九章嵗爲百七十一嵗而九道小終九終千五百三十九嵗而大終三終而與元終進退於牽牛之前四度五分九㑹陽以九終故日有九道隂兼而}
