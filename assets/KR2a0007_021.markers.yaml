  - {type: variant, offset: 3208, length: 0, content: '', krp: 二千一百九嵗嵗在鶉火張十三度文王受命九年而崩再期在大祥而伐紂故書序曰惟十有一年武王伐紂太誓八百諸侯㑹還歸二年乃遂伐紂克殷以箕子歸十三年也故書序曰武王克殷以箕子歸作洪範洪範篇曰惟十有三祀王訪于箕子自文王受命而至此十三年嵗亦在鶉火故傳曰嵗在鶉火則我有周之分壄也師初𤼵以殷十一月戊子日在析木箕七度故傳曰日在析木是夕也月在房五度房爲天駟故傳曰月在天駟後三日得周正月辛卯朔合辰在斗前一度斗柄也故傳曰辰在斗柄明日壬辰䢅星始見師古曰䢅古晨字也其字從臼臼音居玉反癸巳武王始𤼵丙午還師戊午度于孟津孟津去周九百里師行三十里故三十一日而度明日己未冬至䢅星與婺女伏歴建星及牽牛至於婺女天黿之首故傳曰星在天黿周書武成篇惟一月壬辰旁死霸孟康曰月二日以往月生魄死故言死魄魄月質也師古曰霸古魄字同若翌日癸巳武王乃朝歩自周于征伐紂序曰一月戊午師度于孟津至庚申二月朔日也四日癸亥至牧壄夜陳甲子昧爽而合矣故外傳曰王以二月癸亥夜陳武成篇曰粤若來三月既死霸粤五日甲子咸劉商王紂師古曰今文尚書之辭劉殺也是嵗也閏數}
  - {type: variant, offset: 3209, length: 5, content: 所河隄都尉, WYG: 十八正大寒中在周二月己丑晦明日閏月庚寅朔三月二日庚申驚蟄四月己丑朔死霸死霸朔也生霸望也是月甲辰望乙巳旁之故武成篇曰惟四月既旁生霸粤六日庚戌武王燎于周廟翌日辛亥祀于天位粤五日乙卯乃以庶國祀馘于周廟師古曰亦今文尚書也祀馘獻於廟而告祀也截耳曰馘音居獲反文王十五而生武王受命九年而崩崩後四年而武王克殷克殷之嵗八十六矣後七嵗而崩故禮記文王世子曰文王九十七而終武王九十三而終凡武王即位十一年周公攝政五年正月丁巳朔旦冬至殷歴以爲六年戊午距煬公七十六嵗入孟綂二十九章首也後二嵗得周公七年復子明辟之嵗是嵗二月乙亥朔庚寅望後六日得乙未故召誥曰惟二月既望粤六日乙未又其三月甲辰朔三日丙午召誥曰惟三月丙午朏孟康曰朏月出也音敷尾反古文月采篇曰三日曰朏師古曰月采說月之光采其書則亡是嵗十二月戊辰晦周公以反政故洛誥篇曰戊辰王在新邑烝祭嵗命作策惟周公誕保文武受命惟七年成王元年正月己巳朔此命伯禽俾侯于魯之嵗也師古曰俾使也封之使爲諸侯後三十年四月庚戌朔十五日甲子哉生霸師古曰哉始也故顧命曰惟四月哉生霸王有疾不豫甲子王乃洮沬水作顧命師古曰洮盥手也沬洗面也洮音徒高反沬即頮字也音呼内反翌日乙丑成王崩康王十二年六月戊辰朔三日庚午故畢命豐刑曰惟十有二年六月庚午朏王命作策豐刑孟康曰逸書篇名春秋殷歴皆以殷魯自周昭王以下亡年數故據周公伯禽以下爲紀魯公伯禽推即位四十六年至康王十六年而薨故傳曰爕父禽父並事康王師古曰爕父晉唐叔虞之子禽父即伯禽也父讀曰甫甫者男子之美稱言晉侯爕魯公伯禽俱事康王也子考公就立酋師古曰又記此酋者詣說不同而名字或異也下皆放此酋音在由反考公世家即位四年及煬公熙立師古曰及者兄弟相及非子繼父也下皆類此煬公二十四年正月丙申朔旦冬至殷歴以爲丁酉距微公七十六嵗師古曰煬音弋向反世家煬公即位十六年子幽公宰立幽公世家即位十四年及微公茀立㵒師古曰茀音弗㵒古沸字微公二十六年正月乙亥朔旦冬至殷歴以爲丙子距獻公七十六嵗世家微公即位五十年子厲公翟立擢厲公世家即位三十七年及獻公具立獻公十五年正月甲寅朔旦冬至殷歴以爲乙卯距懿公七十六嵗世家獻公即位五十年子愼公埶立嚊師古曰嚊音皮祕反又音}
