  - {type: variant, offset: 5381, length: 120, content: 驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無產業民空居與行役同當衣食衣食縣官而為之作乃兩便可以上繼禹功下除民疾王莽時但崇空語無施行者贊曰古人有言微禹之功吾其魚乎中國川原以百數莫著於四瀆而河為宗孔子曰多聞而志之知之次也國之利害故備論其事, WYG: 證}
