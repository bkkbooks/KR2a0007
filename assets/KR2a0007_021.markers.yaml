  - {type: variant, offset: 1477, length: 0, content: '', WYG: 和人道也周道既衰幽王既䘮天子不能班朔魯歴不正以閏餘一之嵗爲蔀首孟康曰當以閏盡嵗爲蔀首今失正未盡一嵗便以爲蔀首也師古曰蔀音剖又音部}
