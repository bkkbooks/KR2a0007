  - {type: variant, offset: 2792, length: 1, content: 下, WYG: 旋逆日行八十一分度五百一日復留三十三日八十六萬二千四百五十五分而旋復順日行十五分度一八十五日而伏凡見三百四十日八十六萬二千四百五十五分除逆定行星五度四百四十七萬三千九百三十分伏日行不盈十五分度三百三十七日千七百一十七萬一百七十分行星七度八百七十三萬六千五百七十分壹見三百七十七日千八百三萬二千六百二十五分劉敞曰此壹見與火一見字皆妄與木通計義同行星十二度千三百二十一萬五百分通其率故曰日行四千三百二十分度}
