  - {type: variant, offset: 1500, length: 0, content: '', WYG: 舉春秋以目一嵗易兩儀之中也於春每月書王易三極之綂也於四時雖亡事必書時月易四象之節也時月以建分至啟閉之分易八卦之位也張晏曰二至二分立春立夏立秋立冬象事成敗易吉凶之効也朝聘㑹盟易大業之本也故易與春秋天人之道也傳曰龜象也筮數也物生而後有象象而後有滋滋而後有數師古曰左氏傳載韓簡之言也物生則有象冇象而滋益滋益}
