  - {type: variant, offset: 1502, length: 0, content: '', krp: 事事以厚生師古曰言四時漸差則置閏以正之因順時而命事事得其序則年榖豐熟生民之道於是乎在矣不告閏朔棄時正也何以爲民師古曰自此以上皆左氏傳之辭也爲治也故魯僖五年春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啟閉必書雲物爲備故也至昭二十年二月己丑日南至失閏至在非其月梓慎望氛氣而弗正不履端於始也故傳不曰冬至而曰日南至極於牽牛之初日中之時景最長以此知其南至也斗綱之端連貫營室織女之紀指牽牛之初以紀日月故曰星紀五星起其初日月起其中凡十二次日至其初爲節至其中斗建下爲十二辰視其建而知其次故曰制禮上物不過十二天之大數也經曰春王正月傳曰周正月火出於夏爲三月商爲四月周爲五月夏數得天師古曰自此以上左傳之辭得四時之正也三代各據一綂明三綂常合而迭爲首師古曰迭互也音大結反此下亦同登降三綂之首周還五行之道也師古曰還讀曰旋故三五相包而生天綂之正始施於子半蘇林曰子之西亥之東其中間也或曰於子半曰地綂受於丑初臣瓚曰謂分十二辰各有上中下言半謂在中也又受於寅初此謂上也日萌色赤地綂受之於丑初日肇化而黄至丑半日牙化而白人綂受之於寅初日孽成而黒至寅半日生成而青天施復於子地化自丑畢於辰如淳曰地以十二月生萬物三月乃畢人生自寅成於申如淳曰人功自正月至七月乃畢故歴數三綂天以甲子李竒曰夏正月朔日地以甲辰韋昭曰殷正月朔日人以甲申李竒曰周正月朔日孟仲季迭用事爲綂首三微之綂既著而五行自青始其序亦如之五行與三綂相錯傳曰天有三辰地有五行然則三綂五星可知也易曰參五以變錯綜其數通其變遂成天地之文極其數遂定天下之象師古曰易上繫之辭太極運三辰五星於上而元氣轉三綂五行於下其於人皇極綂三徳五事故三辰之合於三綂也日合於天綂月合於地綂斗合於人綂五星之合於五行水合於辰星火合於熒惑金合於太白木合於嵗星土合於塡星三辰五星而相經緯也天以一生水地以二生火天以三生木地以四生金天以五生土五勝相乘以生小周以乘乾坤之策而成大周隂陽比類交錯相成故九六之變登降於六體三微而成著三著而成象二象十有八變而成卦四營而成易爲七十二參三綂兩四時相乘之數也參之則得乾之策兩之則得坤之策蘇林曰策數也以陽九九之爲六百四十八以隂六六之爲四百三十二凡一千八十隂陽各一卦之微算策也八之爲八千六百四十而八卦小成引而信之師古曰信讀曰仲又八之爲六萬九千一百二十天地再之爲十三萬八千二百四十然後大成五星㑹終觸類而長之以乘章嵗爲二百六十二萬六千五百六十而與日月㑹三㑹爲七百八十七萬九千六百八十而與三綂㑹三綂二千三百六十三萬九千四十而復於太極上元九章嵗而六之爲法太極上元爲實實如法得一隂一陽各萬一千五百二十當萬物氣體之數天下之能事畢矣前漢書卷二十一上前漢書卷二十一上考證律歴志上孝武帝時樂官考正臣召南按此即禮樂志所云立樂府置協律都尉本志所云造太初歴是也顔注未明使羲和劉歆典領條奏言之最詳注班氏自云作志取劉歆之義也自此以下訖于用竹爲引者事之宜也則其辭焉臣召南按一曰備數以下皆劉歆之詞而班氏稍加刪節所謂刪僞辭取正義也是以晉志引此志直云劉歆序論而風俗通義引劉歆鍾律書當亦指此若隋書牛𢎞傳引劉歆鍾律書春宫秋律百卉必凋秋宫春律萬物必榮云云今志所無是則班氏所刪去者也一曰備數云云監本接連前文寫非也今另提行其算法用竹徑一分長六寸云云臣召南按隋志曰其算用竹廣二分長三寸正策三亷積二百一十六枚成六觚乾之策也負策四亷積一百四十四枚成方坤之策也觚方皆經十二天地之大數也較此志亦少異木曰柷注連底撞之撞之别本作動之取竹之解谷生其竅厚均者注臣浩按依孟康說應以取竹之解谷斷句生字連下文讀然於文義不順晉灼謂解谷爲谷名甚是但如晉說則之字當作往解亦與上文不順當以取竹之解谷生讀其竅厚均者句於文始順注生而肉孔外内厚薄自然均者監本孔字上脫肉字外内訛外肉今改正又截以爲筩監本訛䇶從宋本改斷兩節間而吹之以爲黄鍾之宮晉志作斷兩節間長三寸九分而吹之九者所以究極中和云云沈約宋志曰班氏所志未能通律呂本原空煩其文而爲辭費又推九六欲符劉歆三統之數假托非類以餙其說皆孟堅之妄矣臣召南按此志附㑹三統誠多穿鑿然皆劉歆條奏本文而班氏述之非班氏欲符劉歆三統之數也正月乾之九三宋祁曰九三當作九二臣召南按宋說非也自子至午爲乾卦六爻自未至亥爲坤卦六爻此言人生于寅正是乾之九三泰卦三陽之象非九二也參分損一下生林鍾云云晉志曰校其相生所得與司馬遷同臣召南按是志本劉歆歆言鍾律專主司馬遷故與呂覽淮南京房三家小異八八爲伍按晉志引此文作八八爲位此傳寫之訛也一黍之廣度之九十分黄鍾之長一爲一分按隋志引此文作度之九十黍爲黄鍾之長一黍爲一分廷尉掌之舊本附注皇祐冬益州進士房庶言嘗得古本漢志云一黍之起積一千二百黍之廣度之九十分今文脫起積一千二百黍之八字臣召南按房庶此說范鎮深是之而司馬光力攻其謬光與鎮書有曰房生家有漢書異於今本不知傳于何世而相承積誤由古及今更大儒甚衆曾不悟也其書既云積一千二百黍之廣何必更云一黍之起此四字者將安設施子駿孟堅之書不宜如此冗長也合龠爲合宋祁曰舊本作十龠杭本作合龠予以後叅考之十當作合臣召南按玉海引胡瑗新樂圖曰今文訛作十龠唐六典曰二龠爲合然則合龠者二龠也書曰予欲聞六律五聲八音七始詠以出内五言劉攽曰七始詠以出内五言古文爲在治忽蓋字之變師說不同非孔氏虞書也臣召南按七始之文見於此泠州鳩言七律晏子言七音與此稍異漢初安世房中}
