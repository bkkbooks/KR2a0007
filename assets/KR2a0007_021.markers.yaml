  - {type: variant, offset: 640, length: 0, content: '', WYG: 苗亂徳二官咸廢師古曰三苗國名縉雲氏之後爲諸侯者即饕餮也二官重黎也而閠餘乖次孟康曰以嵗之餘日爲閠故曰閏餘次十二次也史推歴失閏則斗建與月名錯也孟陬殄滅孟康曰正月爲孟陬歴紀廢絶閏餘乖錯不與正嵗相值謂之殄滅也攝提失方孟康曰攝提星名隨斗杓所指建十二月若歴誤春三月當指辰而乃指已爲失方也堯復育重黎之後使纂其業故書曰廼命羲和欽若昊天歴象日月星辰敬授民時嵗三百有六旬有六日以閏月定四時成嵗允釐百官衆功皆美師古曰此皆虞書堯典之辭也欽敬若順也昊天言天氣廣大也星四方之中星也辰日月所會也羲氏和氏重黎之後以其繼掌天地故堯命之使敬順昊天歴象星辰之分節敬記天時以授下人也匝四時凡三百六}
