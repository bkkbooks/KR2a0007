  - {type: variant, offset: 1937, length: 3, content: 里溉田, WYG: 四十三萬六千二百三十七金火相乘爲八又以火乘之爲十六而小復小復乘乾策爲三千四百五十六是爲太白嵗數見中分四萬一千四百七十二積中十九中餘四百一十三見中法二千一百六十一復數見閏分二萬四千一百九十二積月十九月餘三萬二千三十九見月法四萬一千五十九晨中分二萬三千三百二十八積中七中餘千七百一十八夕中分萬八千一百四十四積中八中餘八百五十六晨閏分萬三千六百八積月十一月餘五千一百九十一夕閏分萬五百八十四積月八月餘二萬六千八百四十八見中日法九百九十七萬七千三百三十七見月日法三百三十二萬五千七百七十九土木相乘而合經緯爲三十是爲鎭星小周小周乘巛策爲四千三百二十是爲鎭星嵗數見中分五萬一千八百四十積中十二中餘一千七百四十見中法四千一百七十五見數也見閏分三萬二百四十積月十二月餘六萬三千三百見月法七萬九千三百二十五見中日法一千九百二十七萬五千九百七十五見月日法六百四十二萬五千三百二十五火經特成故二嵗而過初三十二過初爲六十四嵗而小周小周乘乾策則太陽大周爲一萬三千八百二十四嵗是爲熒惑嵗數見中分十六萬五千八百八十八積中二十五中餘四千一百六十三見中法六千四百六十九見數也見閏分九萬六千七百六十八積月二十六月餘五萬二千九百五十四見月法十二萬一千九百一十一見中日法二千九百八十六萬七千三百七十三見月日法九百九十五萬五千七百九十一水經特成故一嵗而及初六十四及初而小復小復乘巛策則太隂大周爲九千二百一十六嵗是爲辰星嵗數見中分十一萬五百九十二積中三中餘二萬二千四百六十九見中法二萬九千四十一復數也見閏分六萬}
