  - {type: variant, offset: 143, length: 18, content: 河同為迎河入于勃海九川既疏九澤既陂諸, WYG: 百二十兩者隂陽之數也三百八十四爻五行之象也四萬六千八十銖者萬一千五百二十物歴四時之象也而嵗功成就五權謹矣權與物鈞而生衡孟康曰謂錘與物鈞所稱適停則衡平也衡運生規規圜生矩矩方生繩繩直生凖韋昭曰立凖以望繩以水爲平凖正則平衡而鈞權矣是爲五則規者所以規圜器械令得其類也矩者所以矩方器械令不失其形也規矩相須隂陽位序圜方乃成凖者所以揆平取正也繩者上下端直經緯四通也凖繩連體衡權合徳百工繇焉以定法式輔弼執玉以翼天子詩云尹氏大師秉國之鈞四方是維天子是毗俾民不迷師古曰小雅節南山之詩也言尹氏居太師之官執持國之權量維制四方輔翼天子使下無迷惑也咸有五象其義一也以隂陽言之太隂者北方北伏也陽氣伏於下於時爲冬冬終也物終臧乃可稱水潤下知者謀謀者重故爲權也太陽者南方南任也陽氣任養物於時爲}
