  - {type: variant, offset: 1128, length: 3, content: 張湯湯, WYG: 兒寛明經術師古曰兒音五奚反上廼詔寛曰與博士共議今宜何以爲正朔服色何上寛與博士賜等議皆曰帝王必改正朔易服色所以明受命於天也創業變改制不相復師古曰復重也因也音扶目反次下亦同推傳序文則今夏時也臣等}
