  - {type: variant, offset: 1794, length: 0, content: '', WYG: 嵗在丙子仲冬朔旦甲子冬至復得上古歴元之甲寅耳故後文曰太初元年前十一月甲子朔旦冬至嵗在星紀婺女六度又引漢志曰嵗名困敦是也夀王候課比三年下註下下獄也顧炎武曰謂課居下也下文言竟以下吏乃是下獄師古注非向子歆究其微眇作三統歴及譜以說春秋沈約宋志曰歆作三綂歴以說春秋屬辭比事雖甚精巧非其實也列人事而因以天時因汲古閣本作目故春爲陽中云云臣召南按漢世解春秋名義皆是如此故賈逵服䖍之說左氏何休之說公羊並承歆說以隂中陽中爲義降生五味注孟康曰月令五方之味酸鹹是也臣召南按酸鹹之下似應有辛苦甘三字故筮以爲數以象兩筮監本訛蓍今改正前漢書卷二十一上考證欽定四庫全書前漢書卷二十一下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注律歴志第一下綂母日法八十一孟康曰分一日爲八十一分爲三綂之本母也元始黄鐘初九自乘一龠之數得日法閠法十九因爲章嵗合天地終數得閏法綂法一千五百三十九以閠法乘日法得綂法元法四千六百一十七參綂法得元法㑹數四十七參天九兩地十得㑹數章月二百三十五五位乘㑹數得章月月法二千三百九十二推大衍象得月法通法五百九十八四分月法得通法中法十四萬五百三十以章月乘通法得中法周天五十六萬二千一百二十以章月乘月法得周天嵗中十二以三綂乘四時得嵗中月周二百五十四以章月加閏法得月周朔望之會一百三十五參天數二十五兩地數三十得朔望之㑹㑹月六千三百四十五以㑹數乘朔望之㑹得㑹月綂月一萬九千三十五參㑹月得綂月元月五萬七千一百五參綂月得元月章中二百二十八以閏法乘嵗中得章中綂中一萬八千四百六十八以日法乘章中得綂中元中五萬五千四百四參綂中得元中策餘八千八十什乘元中以減周天得策餘周至五十七參閏法得周至綂母木金相乘爲十二是爲嵗星小周小周乘巛策爲一千七百二十八是爲嵗星嵗數見中分二萬七}
