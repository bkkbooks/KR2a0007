  - {type: variant, offset: 4, length: 0, content: '', krp: 一上師古曰志記也積記其事也春秋左氏傳曰前志有之虞書曰乃同律度量衡師古曰虞書舜典也同謂齊等所以齊遠近立民信也自伏戲畫八卦由數起師古曰萬物之數因八卦而起也劉攽曰志言卦起於數顔云數起於卦非也至黄帝堯舜而大備三代稽古法度章焉師古曰三代夏殷周也稽考也考於古事而法度益明周衰官失孔子陳後王之法曰謹權量審法度修廢官舉逸民四方之政行矣師古曰此論語載孔子述古帝王之政以示後世權謂斤兩也量斗斛也法度丈尺也逸民謂有徳而隠處者漢興北平侯張蒼首律歴事師古曰首謂始定也孝武帝時樂官考正師古曰更質正其事至元始中王莽秉政欲燿名譽徴天下通知鐘律者百餘人使羲和劉歆等典領條奏言之最詳故刪其偽辭取正義著于篇師古曰班氏自云作志取劉歆之義也自此以下訖於用竹爲引者事之宜也則其辭焉一曰備數二曰和聲三曰審度四曰嘉量五曰權衡參五以變錯綜其數稽之於古今効之於氣物和之於心耳考之於經傳咸得其實靡不協同數者一十百千萬也所以算數事物順性命之理也書曰先其算命師古曰逸書也言王者統業先立算數以命百事也本起於黄鐘之數始於一而三之三三積之孟康曰黄鐘子之律也子數一泰極元氣含三爲一是以一數變而爲三也歴十二辰之數十有七萬七千一百四十七而五數備矣孟康曰初以子一乘丑三餘則轉因其成數以三乘之歴十二辰得是積數也五行隂陽變化之數備於此矣其算法用竹徑一分長六寸二百七十一枚而成六觚爲一握蘇林曰六觚六角也度角至角其度一寸面容一分算}
