  - {type: variant, offset: 1169, length: 3, content: 船漕漕, WYG: 日月以歩五緯臣瓚曰黄帝聖徳與神靈合契升龍登仙故曰合而不死題名宿度候察進退史記曰名察宿度謂三辰之度吉凶之驗也然則上矣書缺樂弛朕甚難之師古曰弛廢也音式爾反依違以惟未能修明師古曰依違不決之意也惟思也其以七年爲元年李竒曰改元封七年爲太初元年遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢歴廼定東西立晷儀下漏刻以追二十八宿相距於四方舉終以定朔晦分至躔離弦望應劭曰躔徑也離遠也臣瓚曰案離歴也日月之所歴也鄧展曰日月踐歴度次廼以前歴上元泰初四千六百一十七嵗至於元卦七年復得閼逢攝提格之嵗中冬孟康曰言復得者上元泰初時亦是閼逢之嵗嵗在甲曰閼逢在寅曰攝提格此爲甲寅之嵗也師古曰中讀曰仲劉攽曰十七嵗當作十一嵗十一月甲子朔旦冬至日月在建星李竒曰古以建星爲宿今以牽牛爲宿孟康曰建星在牽牛間晉灼曰賈逵論太初歴冬至日在牽牛初者牽牛中星也古歴皆在建星建星即斗星也太初歴四分法在斗二十六度史官舊法冬夏至常不及太初歴五度四分法在斗二十一度與行事候法天度相應宋祁曰建星在斗後十三度在牽牛前十一度當云在斗牛間孟說非太嵗在子已得太初本星度新正姓等奏不能爲算師古曰姓即射姓也願募治歴者更造密度各自增減以造漢太初歴廼選治歴鄧平及長樂司馬可酒泉候宜君師古曰可者司馬之名也宜君亦候之名也候官號也故曰東南一尉西北一候侍郎尊及與民間治歴者凡二十餘人方士唐都巴郡落下閎與焉晉灼曰三人姓名也史記歴書唐都分天部而巴郡落下閎運算推歴師古曰姓唐名都方術之士也姓落下名閎巴郡人也都與閎凡二人都分天部孟康曰謂分部二十八宿爲距度而閎運算轉歴其法以律起歴曰律容一龠積八十一寸則一日之分也孟康曰黄鐘律長九寸圍九分以圍乘長得積八十一寸也與長相終律長九寸百七十一分而終復三復而得甲子夫律隂陽九六爻象所}
