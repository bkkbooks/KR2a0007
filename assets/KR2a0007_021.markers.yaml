  - {type: variant, offset: 2868, length: 2, content: 秩中, WYG: 叔孫昭子也名婼對曰吾祖也我知之矣昔者黄帝氏以雲紀故爲雲師而雲名炎帝氏以火紀故爲火師而火名共工氏以水紀故爲水師而水名師古曰共讀曰龔下皆類此太昊氏以龍紀故爲龍師而龍名我高祖少昊摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名言郯子據少昊受黄帝黄帝受炎帝炎帝受共工共工受太昊故先言黄帝上及太昊稽之於易炮犧神農黄帝相繼之世可知師古曰炮與庖同太昊帝易曰炮犧氏之王天下也言炮犧繼天而王爲百王先首徳始於木故爲帝太昊作罔罟以田漁取犧牲故天下號曰炮犧氏祭典曰共工氏伯九域師古曰祭典即禮經祭法也伯讀與霸同下亦類此言雖有水徳在火木之間非其序也任知刑以彊故伯而不王秦以水徳在周漢木火之間師古曰志言秦爲閏位亦猶共工不當五徳之序周人其行序故易不載鄧展曰去也以其非次故去之師古曰此指謂共工也古遷字其下並同炎帝易曰炮犧氏没神農氏作言共工伯而不王雖有水徳非其序也以火承木故爲炎帝教民耕農故天下號曰神農氏黄帝易曰神農氏没黄帝氏作火生土故爲土徳與炎帝之後戰於阪泉遂王天下始垂衣裳有軒冕之服鄧展曰凡冠前卑後高故曰軒冕也師古曰此說非也軒軒車也冕冕服也春秋左氏傳曰服冕乘軒故天下號曰軒轅氏少昊帝考徳曰少昊曰清師古曰考徳者考五帝徳之書也清者黄帝之子清陽也是其子孫名摯立土生金故爲金徳天下號曰金天氏周其樂故易不載序於行顓頊帝春秋外傳曰少昊之衰九黎亂徳顓頊受之廼命重黎蒼林昌意之子也金生水故爲水徳天下號曰高陽氏周其樂故易不載序於行帝嚳春秋外傳曰顓頊之所建帝嚳受之清陽元囂之孫也水生木故爲木徳天下號曰高辛氏帝摯繼之不知世數周其樂故易不載周人禘之唐帝帝系曰帝嚳四妃陳豐生帝堯封於唐蓋高辛氏衰天下歸之木生火故爲火徳天下號曰陶唐氏讓天下於虞使子朱處于丹淵爲諸侯即位七十載虞帝帝系曰顓頊生窮蟬五世而生瞽叟瞽叟生帝舜處虞之嬀汭師古曰嬀水名也水曲曰汭音人銳反堯嬗以天下師古曰嬗古禪讓字也其下亦同火生土故爲土徳天下號曰有虞氏讓天下於禹使子商均爲諸侯即位五十載伯禹帝系曰顓頊五世而生鯀鯀生禹虞舜嬗以天下土生金故爲金徳天下號曰夏后氏繼世十七王四百三十}
