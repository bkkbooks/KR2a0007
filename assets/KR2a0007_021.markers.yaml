  - {type: variant, offset: 138, length: 0, content: '', krp: 成著可殊異也兩者兩黄鐘律之重也李竒曰黄鐘之管重十二銖兩十二得二十四也二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻隂陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣隂化其物皆得其成就平均也權與物均重萬一千五百二十銖當萬物之象也四百八十兩者六旬行八節之象也孟康曰六甲爲六旬一嵗冇八節六甲周行成嵗以六乘八節得之三十斤成鈞者一月之象也石者}
  - {type: variant, offset: 139, length: 3, content: 陸播為, WYG: 也權之大者也始於銖兩於兩明於斤均於鈞終於石物終石大也四鈞爲石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黄鐘之象也孟康曰稱之數始於銖終於石石重百二十斤象十二月銖之重本取於子律黄鐘一龠容千二百黍爲十二銖故曰復於子黄鐘之象也千}
