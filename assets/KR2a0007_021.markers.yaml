  - {type: variant, offset: 1525, length: 183, content: 得寧功無已時兮吾山平吾山平兮鉅野溢魚弗鬱兮柏冬日正道弛兮離常流蛟龍騁兮放遠游歸舊川兮神哉沛不封禪兮安知外皇謂河公兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿久不反兮水維緩一曰河湯湯兮激潺湲北渡回兮迅流難搴長茭兮湛美玉河公許兮薪不屬薪不屬兮衛人罪燒蕭條兮噫乎何以御水隤林竹兮揵石菑宣防塞兮萬福來於是卒塞瓠子築宮其上名曰宣防而道河北行二渠復禹舊迹而梁楚之地復寧無水災自是之後用, WYG: 與春秋相符殆好}
