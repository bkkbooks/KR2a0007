  - {type: variant, offset: 1499, length: 0, content: '', WYG: 伏也自文公閏月不告朔至此百有餘年莫能正歴數故子貢欲去其餼羊孔子愛其禮師古曰餼生牲也禮人君每月告朔於廟冇祭事故用牲子貢見其禮廢而欲去其羊孔子曰賜也汝愛其羊我愛其禮事見論語而著其法於春秋經曰冬十月朔日有食之傳曰不書日官失之也天子有日官諸侯有日御日官居卿以厎日禮也蘇林曰厎致也師古曰音之履反日御不失日以授百官於朝言告朔也師古曰劉家本有此語元典歴始曰元傳曰元善之長也共養三徳爲善孟康曰謂三統之微氣也當施育萬物故謂之徳師古曰共讀曰供又曰元體之長也合三體而爲之原故曰元於春三月每月書王元之三綂也三綂合於一元故因元一而九三之以爲法孟康曰辰有十二其三爲天地人之綂老子曰三生萬物是以餘九辰得三氣乃能施化故每辰皆以三綂之數乘之是謂九三之法得積萬九千六百八十三十一三之以爲實孟康曰以子數一乘丑三餘次辰亦每三乘之周十二辰得十七萬七千一百四十七實如法得一黄鐘初九律之首陽之變也因而六之以九爲法得林鐘孟康曰以六乘黄鐘之九得五十四初六呂之首隂之變也皆參天兩地之法也孟康曰三三而九二三而六參兩之義也上生六而倍之下生六而損之皆以九爲法九六隂陽夫婦子母之道也孟康曰異類爲子母謂黄鐘生林鐘也同類爲夫婦謂黄鐘以大呂爲妻也律娶妻如淳曰黄鐘生林鐘而吕生子如淳曰林鐘生太族天地之情也六律六呂而十二辰立矣五聲清濁而十日行矣李竒曰聲一清一濁合爲二五聲凡十合於十日從甲至癸也孟康曰謂東方甲乙南方丙丁之屬分在五方故五聲屬焉傳曰天六地五數之常也天有六氣張晏曰六氣隂陽風雨晦明也降生五味孟康曰月令五方之味酸鹹是也夫五六者天地之中合孟康曰天陽數竒一三五七九五在其中地隂數耦二四六八十六在其中故曰天地之中合而民所受以生也故日有六甲辰有五子孟康曰六甲之中唯甲寅無子故有五子十一而天地之道畢言終而復始太極中央元氣故爲黄鐘其實一龠以其長自乘故八十一爲日法所以生權衡度量禮樂之所繇出也經元一以綂始易太極之首也春秋二以目嵗鄧展曰春秋則爲二矣孟康曰春爲陽中萬物以生秋爲隂中萬物以}
