  - {type: variant, offset: 1504, length: 1, content: 瓠, WYG: 七始華始肅倡和聲注孟康曰天地四時人之始即用此志語然則漢初所傳尚書其文如此又按天地人三始即黄鍾林鍾太簇前文已明其四時之始則隋時鄭譯荅蘇䕫云七調所從出謂姑洗爲春蕤賓爲夏南吕爲秋應鍾爲冬是爲四時始也疇人}
