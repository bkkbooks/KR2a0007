  - {type: variant, offset: 4780, length: 594, content: 通有三害民常罷於救水半失作業水行地上湊潤上徹民則病溼氣木皆立枯鹵不生穀決溢有敗為魚鱉食此三害也若有渠溉則鹽鹵下溼填淤加肥故種禾麥更為秔稻高田五倍下田十倍轉漕舟船之便此三利也今瀕河隄吏卒郡數千人代買薪石之費歲數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百歲故謂之中策若乃繕完故隄增卑倍薄勞費無已數逢其害此最下策也王莽時徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢少稍自索雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬史長安張戎言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益高於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣御史臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海勃海地高於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜卻徙完平處更開空使緣西山足乘高地而東北入海乃無水災沛郡桓譚為司空掾典其議為甄豐言凡此數者, WYG: ''}
