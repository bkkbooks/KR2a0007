  - {type: variant, offset: 4077, length: 563, content: 見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河遠者數十里內亦數重此皆前世所排也河從河內北至黎陽為石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫阸如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄勢不能遠泛濫朞月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毀之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄歲費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相奸且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水高於平地歲增隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄高一丈自是東地稍下隄稍高至遮害亭高四五丈往六七歲河水大盛增丈七尺壞黎陽南郭門入至隄下水未踰隄二尺所從隄上北望河高出民屋百姓皆走上山水留十三日隄潰二所景祐殿本無二所二字朱一新說二字涉上文而衍吏民塞之臣循隄上行視水勢南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歲適至隄足由是, WYG: 度星度祗据赤道唐志詳}
