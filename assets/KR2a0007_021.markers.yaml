  - {type: variant, offset: 642, length: 2, content: 歲孝, WYG: 日而定一嵗十二月月三十日正三百六十日則餘六日矣又除小月六日是爲嵗有餘十二日未盈三嵗便得一月則置閏焉以定四時之氣節成一嵗之歴象則能信理百官衆功皆美也其後以授舜曰咨爾舜天之歴數在爾躬舜亦以命禹至周}
