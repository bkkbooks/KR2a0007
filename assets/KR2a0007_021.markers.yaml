  - {type: variant, offset: 3286, length: 2, content: 頃足, WYG: 六千六百有六旬故傳曰絳縣老人曰臣生之嵗正月甲子朔四百四十有五甲子矣其季於今三之一也師曠曰郤成子㑹于承匡之嵗也七十三年矣史趙曰亥有二首六身下二如身則其日數也孟康曰下二畫使就身也師古曰杜預云亥字二畫在上併三六爲身如算之六也下亥上二畫竪置身旁士文伯曰然則二萬六千六百有六旬也春秋襄公即位三十一年子昭公稠立昭公八年嵗在析木十年嵗在顓頊之虛𤣥枵也十八年距辛亥百三十一嵗五月有丙子戊寅壬午火始昬見宋衛陳鄭火二十年春王正月距辛亥百三十三嵗是辛亥後八章首也正月己丑朔旦冬至失閏故傳曰二月己丑日南至三十二年嵗在星紀距辛亥百四十五嵗盈一次矣故傳曰越得嵗吳伐之必受其咎春秋昭公即位三十二年及定公宋立定公七年正月己巳朔旦冬至殷歴}
