  - {type: variant, offset: 1471, length: 0, content: '', WYG: 故有禮誼動作威儀之則以定命也能者養以之福不能者敗以取禍師古曰之徃也徃就福也自此以上皆劉康公辭故列十二公二百四十二年之事以隂陽之中制其禮故春爲陽中萬物以生秋爲隂中萬物以成是以事舉其中禮取其和歴數以閏正天地之中以作事厚生皆所以定命也易金火相革之卦曰湯武革命順乎天而應乎人師古曰離下兌上故云金火相革此革卦彖辭又曰治歴明}
