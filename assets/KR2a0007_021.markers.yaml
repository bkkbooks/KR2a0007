  - {type: variant, offset: 6, length: 0, content: '', WYG: 之西應劭曰大夏西戎之國也昆侖之隂取竹之解谷孟康曰解脫也谷竹溝也取竹之脫無溝節者也一說昆侖之北谷名也晉灼曰谷名是也生其竅厚均者應劭曰生者治也竅孔也孟康曰竹孔與肉薄厚等也晉灼曰取谷中之竹生而肉孔外内厚薄自然均者截以爲筩不復加削刮也師古曰晉說是也斷兩節間而吹之以爲黄鐘之宮師古曰黄鐘之宮律之最長者制十二筩以聽鳯之鳴師古曰筩音大東反其雄鳴爲六雌鳴亦六比黄鐘之宮而皆可以生之是爲律本師古曰比合也可以生之謂上下相生也故謂之律本比音頻寐反至治之世天地之氣合以生風天地之風氣正十二律定孟康曰律得風氣而成聲風和乃律調也臣瓚曰風氣正則十二月之氣各應其律不失其序黄鐘黄者中之色君之服也鐘者種也天之中數五韋昭曰一三在上七九在下五爲聲聲上宮五聲莫大焉地之中數六韋昭曰二四在上八十在下六爲律律有形有色色上黄五色莫盛焉故陽氣施種於黄泉孶萌萬物師古曰孶讀與滋同滋益也萌始生也爲六氣元也以黄色名元氣律者著宮聲也宮以九唱六孟康曰黄鐘陽九林鐘隂六言陽唱隂和變動不居周流六虛始於子在十一月大呂呂旅也言隂大旅助黄鐘宣氣而牙物也位於丑在十二月太族族奏也言陽氣大奏地而逹物也師古曰奏進也位於寅在正月夾鐘言隂夾助大族宣四方之氣而出種物也位於卯在二月姑洗洗絜也言陽氣洗物辜絜之也孟康曰辜必也必使之絜也位於辰在三月中呂言微隂始起未成著於其中旅助姑洗宣氣齊物也位於已在四月蕤賓蕤繼也賓導也言陽始導隂氣使繼養物也位於午在五月林鐘林君也言隂氣受任助蕤賓君主種物使長大楙盛也師古曰種物種生之物楙古茂字種音之勇反位於未在六月夷則則法也言陽氣正法度而使隂氣夷當傷之物也師古曰夷亦傷位於申在七月南呂南任也言隂氣旅助夷則任成萬物也位於酉在八月亡射射厭也言陽氣究物而使隂氣畢剝落之終而復始亡厭已也位於戍在九月應鐘言隂氣應亡射該臧萬物而雜陽閡種也孟康曰閡臧塞也隂雜陽氣臧塞爲萬物作種也晉灼曰外閉曰閡師古曰閡音胡待反下言該閡於亥音訓並同也位於亥在十月三統者天施地化人事之紀李竒曰統緒也十一月乾之初九陽氣伏於地下始著爲一萬物萌動鐘於太隂故黄鐘爲天統律長九寸九者所以究極中和爲萬物元也易曰立天之道曰隂與陽師古曰易說卦之辭六月坤之初六隂氣受任於太陽繼養化柔萬物生長楙之於未令種剛彊大故林鐘爲地統律長六寸六者所以含陽之施楙之於六合之内令剛柔有體也立地之道曰柔與剛師古曰此亦說卦之辭也乾知大始坤作成物師古曰此上繫之辭正月乾之九三宋祁曰九三當作九二萬物棣通孟康曰棣謂通意也師古曰棣音替宋祁曰南本有臣瓚曰案陽氣上下相及逮而通之也族出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也爲仁其聲商也爲義故太族爲人統律長八寸象八卦宓戲氏之所以順天地通神明類萬物之情也師古曰宓讀與伏同立人之道曰仁與義師古曰此說卦之辭在天成象在地成形師古曰此上繫之辭后以裁成天地之道輔相天地之宜以左右民師古曰此泰卦象辭也后君也謂王者也左右助也左讀曰佐右讀曰佑此三律之謂矣是爲三統其於三正也黄鐘子爲天正師古曰正音之成反下皆類此林鐘未之衝丑爲地正太族寅爲人正三正正始是以地正適其始紐於陽東北丑位易曰東北䘮朋迺終有慶孟康曰未在西南陽也隂而入陽爲失其類也師古曰此坤卦彖辭荅應之道也及黄鐘爲宮則太族姑洗林鐘南呂皆以正聲應無有忽微孟康曰忽微若有若無細於髮者也謂正聲無有殘分也不復與它律爲役者同心一統之義也非黄鐘而它律雖當其月自宮者則其和應之律有空積忽微孟康曰十二月之氣各以其月之律爲宮非五音之正則聲有高下差降也空積若鄭氏分一寸爲數千不得其正此黄鐘至尊亡與並也易曰參天兩地而倚數師古曰易說卦之辭也倚立也參謂竒也兩謂耦也七九陽數六八隂數天之數始於一終於二十有五其義紀之以三故置一得三又二十五分之六凡二十五置終天之數得八十一以天地五位之合終於十者乘之爲八百一十分應歴一統孟康曰十九嵗爲一章一統凡八十一章千五百三十九嵗之章數黄鐘之實也繇此之義師古曰繇讀與由同由用也起十二律之周徑孟康曰律孔徑三分參天之數也圍九分終天之數也地之數始於二終於三十其義紀之以兩故置一得二凡三十置終地之數得六十以地中數六乘之爲三百六十分當期之日林鐘之實孟康曰林鐘長六寸圍六分以圍乘長得積三百六十分也師古曰期音基謂十二月爲一期也人者繼天順地序氣成物統八卦調八風理八政正八節諧八音舞八佾監八方被八荒以終天地之功故八八六十四其義極天地之變以天地五位之合終於十者乘之爲六百四十分以應六十四卦大族之實也孟康曰太族長八寸圍八分爲積六百四十分也}
