  - {type: variant, offset: 15, length: 1, content: 家, krp: 也算方一尺所受一斛過九氂五豪然後成斛今尚方有王莽時銅斛制盡與此同師古曰庣}
  - {type: variant, offset: 17, length: 5, content: 入門陸行載, WYG: 滿之處也音吐彫反其上爲斛其下爲斗孟康曰其上謂仰斛也其下謂覆斛之底受一斗左耳爲升右耳爲合龠其狀似爵以縻爵禄晉灼曰縻散也上三下二參天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十孟康曰三十斤爲鈞釣萬一千五百二十銖聲中黄鐘始於黄鐘而反覆焉孟康曰反斛聲中黄鐘覆斛亦中黄鐘之宮宮爲君也臣瓚曰仰斛受一斛覆底受一斗故曰反覆焉師古曰覆音芳目反君制器之象也龠者黄鐘律之實也躍微動氣而生物也合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之師古曰米粟之量故在太倉也衡權者衡平也權重也衡所以任權而均物平輕重也其道如底師古曰底平也謂以底石厲物令平齊也底音指以見凖之正繩之直左旋見規右折見矩其在天也佐助旋璣斟酌建指以齊七政師古曰七政日月五星也故曰玉衡論語云立則見其參於前也孟康曰權衡量三等爲參在}
