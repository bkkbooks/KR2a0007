  - {type: variant, offset: 1462, length: 0, content: '', WYG: 右將軍史各一人雜候上林清臺課諸歴疏密凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第夀王課疏遠案漢元年不用黄帝調歴夀王非漢歴逆天道非所宜言大不敬有詔勿劾復候盡六年太初歴第一即墨徐萬且長安徐禹治太初歴亦第一師古曰且音子余反夀王及待詔李信治黄帝調歴課皆疏闊又言黄帝至元鳯三年六千餘嵗丞相屬寳長安單安國安陵桮育治終始蘇林曰桮音布回反師古曰姓桮名育也單音善言黄帝以來三千六百二十九嵗不與夀王合夀王又移帝王録舜禹年嵗不合人年夀王言化益爲天子代禹師古曰化益即伯益驪山女亦爲天子在殷周間皆不合經術夀王歴廼太史官殷歴也夀王猥曰安得五家歴師古曰猥曲也又妄言太初歴虧四分日之三去小餘七百五分以故隂陽不調謂之亂世劾夀王吏八百石古之大夫服儒衣誦不祥之辭作妖言欲亂制度不道奏可夀王候課比三年下師古曰比頻也下下獄也音胡稼反終不服再劾死更赦勿劾師古曰更經也音工衡反遂不更言誹謗益甚竟以下吏故歴本之驗在於天自漢歴初起盡元鳯六年三十六嵗而是非堅定至孝成世劉向總六歴列是非作五紀論向子歆究其微眇師古曰眇細也音莫小反又讀曰妙他皆類此作三統歴及譜以說春秋推法密要故述焉師古曰自此}
