  - {type: variant, offset: 3201, length: 5, content: 敗官亭民舍, WYG: 王六百二十九嵗四分上元至伐桀十三萬二千一百一十三嵗其八十八紀甲子府首入伐桀後百二十七嵗春秋歴周文王四十二年十二月丁丑朔旦冬至孟綂之二㑹首也後八嵗而武王伐紂武王書經牧誓武王伐商紂水生木故爲木徳天下號曰周室三綂上元至伐紂之嵗十}
