  - {type: variant, offset: 3215, length: 11, content: 商與丞相史孫禁共行視圖, WYG: 器反愼公世家即位三十年及武公敖立武公世家即位二年子懿公被立戲師古曰戲音許宜反懿公九年正月癸巳朔旦冬至殷歴以爲甲午距惠公七十六嵗世家懿公即位九年兄子柏御立柏御世家即位十一年叔父孝公稱立孝公世家即位二十七年子惠公皇立惠公三十八年正月壬申朔旦冬至殷歴以爲癸酉距釐公七十六嵗師古曰釐讀曰僖下皆類此世家惠公即位四十六年子隐公息立凡伯禽至春秋三百八十六年春秋隐公春秋即位十一年及桓公軌立此元年上距伐紂四百嵗桓公春秋即位十八年子莊公同立莊公春秋即位三十二年子愍公啟}
