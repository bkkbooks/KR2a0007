  - {type: variant, offset: 2839, length: 3, content: 月惟延, krp: 十八丁亥七十七乙酉中癸未庚辰戊寅丙子甲戌辛未己巳丁卯乙丑季商太甲元年宋祁曰太甲元年當在楚元三年上癸亥庚申戊午丙辰甲寅獻十五年辛亥己酉丁未乙巳孟楚元三年宋祁曰景本無三字六壬午十五庚辰二十四戊寅三十三丙子四十二癸酉五十一辛未六十己巳六十九丁卯七十八甲子中壬戌庚申戊午丙辰癸丑辛亥己酉丁未甲辰季壬寅庚子戊戌丙申煬二十四年癸巳辛卯己丑丁亥康四年甲申孟七壬戌始建國三年十六庚申二十五戊午三十四乙卯四十三癸丑五十二辛亥宋祁曰改作辛巳六十一己酉七十丙午七十九甲辰中壬寅庚子戊戌乙未癸己辛卯己丑丙戌甲申季壬午庚辰戊寅乙亥癸酉辛未己巳定七年宋祁曰景作十一年丙寅甲子孟八壬寅十七庚子二十六丁酉三十五乙未四十四癸巳五十三辛卯六十二戊子七十一丙戌八十甲申中壬午庚辰丁丑乙亥癸酉辛未戊辰丙寅甲子季壬戌庚申丁巳乙卯癸丑辛亥僖五年戊申丙午甲辰孟九壬午十八己卯二十七丁丑三十六乙亥四十五癸酉五十四庚午六十三戊辰七十二丙寅八十一甲子中壬戍己未丁巳乙卯癸丑庚戌戊申丙午甲辰季壬寅己亥丁酉乙未癸巳懿九年庚寅戊子丙戌甲申孟元朔六年推章首朔旦冬至日置大餘三十九小餘六十一數除如法各從其綂首起求其後章當加大餘三十九小餘六十一各盡其八十一章推篇大餘亦如之小餘加一求周至加大餘五十九小餘二十一}
