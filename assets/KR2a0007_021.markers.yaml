  - {type: variant, offset: 2756, length: 0, content: '', WYG: 晨夕嵗數以嵗中乘嵗數是爲星見中分星見數是爲見中法以嵗閏乘嵗數是爲星見閏分以章嵗乘見數是爲見月法以元法乘見數是爲見中日法以綂法乘見數是爲見月日法五歩木晨始見去日半次順日行十一分度二百二十一日始留二十五日而旋逆日行七分度一八十四日復留二十四日三分而旋復順日行十一分度二百一十一日有百八十二萬八千三百六十二分而伏凡見三百六十五日有百八十二萬八千三百六十五分除逆定行星三十度百六十六萬一千二百八十六分凡見一嵗行一次而後伏日行不盈十一分度一伏三十三日三百三十三萬四千七百三十七分行星三度百六十七萬三千四百五十三分壹見三百九十八日五百一十六萬三千一百二分劉敞曰三百九十八日五百一十六萬三千一百二分者通計上文見伏之日分也今作壹見字疑後人妄改之以下文金晨見伏夕見伏推之可知行星三十三度三百三十三萬四千七百三十七分通其率故曰日行千七百二十八分度之百四十五金晨始見去日半次逆日行二分度一六日始留八日而旋始順日行四十六分度三十三四十六日順疾日行一度九十二分度十五百八十四日而伏凡見二百四十四日除逆定行星二百四十四度伏日行一度九十二分度三十三有竒師古曰竒音}
