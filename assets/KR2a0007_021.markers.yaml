  - {type: variant, offset: 3273, length: 9, content: 乾三郡水地得美田且, WYG: 弋均反振音之人反鶉之賁賁天策焞焞火中成軍虢公其奔師古曰賁音奔焞音徒門反又土門反卜偃曰其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子滅虢言歴者以夏時故周十二月夏十月也是嵗嵗在大火故傳曰晉侯使寺人披伐蒲重耳奔狄師古曰晉侯謂獻公也寺人奄人也披其名也蒲晉邑也公子重耳之所居獻公用驪姬之䜛故令披伐之而重耳懼罪出奔也事見春秋左氏傳及國語董因曰君之行嵗在大火師古曰董因晉史也本周太史辛有之後以董主史官故爲董氏因其名也後十二年釐之十六嵗嵗在夀星故傳曰重耳處狄十二年而行過衛五鹿乞食於壄人壄人舉凷而與之子犯曰天賜也後十二年必獲此土嵗復於夀星必獲諸侯後八嵗釐之}
