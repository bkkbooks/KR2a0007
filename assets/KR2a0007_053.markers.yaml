  - {type: variant, offset: 1309, length: 0, content: '', WYG: 勢使然也自凡人猶繫于習俗而况哀公之倫乎夫唯大雅卓爾不羣河間獻王近之矣前漢書卷五十三前漢書卷五十三考證河間獻王徳傳以孝景前二年立臣召南按漢代賢王河間稱首史記五宗世家文太簡畧自此以下云云並漢書所補也禮禮記注師古曰禮者禮經也禮記者諸儒記禮之説也臣召南按禮經即儀禮十七篇禮記七十子後學所記藝文志所謂記百三十一篇是也戴記在後故師古特觧之立毛氏詩左氏春秋博士臣召南按儒林傳毛公治詩貫公傳左氏皆為河間獻王博士並當時所不立于學官者數代以還齊魯韓詩晦而獨存毛公榖春秋微而盛行左獻王之澤逺矣哉被服儒術注師古云云胡三省曰顔注非被服者言以儒術衣被其身也對三雍宫胡三省曰謂對三雍宫之制度非召對于三雍宫也臣召南按藝文志有獻王對上下三雍宫三篇子剛王堪嗣按堪史記及本書諸侯王表並作基又頃王授表作緩又孝王慶嗣四十三年薨表作四十七年凡名字數目表傳多異如魯頃王勁表作封文王睃嗣十八年薨表作十}
