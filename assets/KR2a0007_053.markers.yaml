  - {type: variant, offset: 729, length: 0, content: '', krp: 多寃鼂錯之策師古曰言錯策為是枉見殺也皆以諸侯連城數十泰彊欲稍侵削數奏暴其過惡師古曰暴謂披布之諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為盤石宗也師古曰錯雜也言其地相交雜今或無罪為臣下所侵辱有司吹毛求疵師古曰疵病也音才斯反笞服其臣使證其君多自以侵寃建元三年代王登長沙王發中山王勝濟川王明來朝天子置酒勝聞樂聲而泣問其故勝對曰臣聞悲者不可為絫欷師古曰絫古累字累重也欷歔欷也音許既反思者不可為歎息師古曰言聞欷歎之聲則悲思益甚故髙漸離擊筑易水之上荆軻為之低而不食應劭曰燕太子丹遣荆軻刺秦王賔客祖於易水之上漸離擊筑士皆垂泣荆卿不能復食也師古曰低謂俛首雍門子壹微吟孟嘗君為之於邑張晏曰齊之賢者居雍門因以為號蘇林曰六國時人名周善鼓琴母死無以𦵏見孟嘗君而微吟也如淳曰雍門子以善鼔琴見孟嘗君先説萬嵗之後髙臺既已顛曲池又已平墳墓生荆棘牧豎游其上孟嘗君亦如是乎孟嘗君喟然歎息也師古曰如説是也蘇失之矣於邑短氣貌於音烏邑音一合反或讀如本字今臣心結日久毎聞幼眇之聲不}
  - {type: variant, offset: 730, length: 4, content: 大將軍指, WYG: 涕泣之横集也師古曰幼音一笑反眇音妙幼妙精微也夫衆喣漂山應劭曰喣吹喣也師古曰漂動也喣音許句反又音許于反漂音匹遥反劉奉世曰喣吐沫也聚蟁成靁師古曰蟁古蚊字靁古雷字言衆蚊飛聲有若雷也朋黨執虎十夫橈椎師古曰橈曲也音女教反是以文王拘於牖里孔子阨於陳蔡此乃烝庶之成風増積之生害也師古曰烝庶謂衆人也臣身逺與寡莫為之先師古曰身逺者去帝京逺與寡者少黨與也先謂素為延譽也衆口鑠金積毁銷骨師古曰觧在鄒陽傳叢輕折軸羽翮飛肉師古曰言積載輕物物多至令車軸毁折而鳥之所以能飛翔者以羽翮扇揚之故也紛驚逢羅澘然出涕晉灼曰言}
