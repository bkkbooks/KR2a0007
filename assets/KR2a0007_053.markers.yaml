  - {type: variant, offset: 931, length: 0, content: '', krp: 立二十二年國除後四嵗宣帝地節四年復立去兄文是為戴王文素正直數諫王去故上立焉二年薨子海陽嗣十五年坐畫屋為男女臝交接置酒請諸父姊妹飲令仰視畫又海陽女弟為人妻}
  - {type: variant, offset: 932, length: 0, content: '', WYG: 使與幸臣姦又與從弟調等謀殺一家三人已殺甘露四年坐廢徙房陵國除後十五年平帝元始二年復立戴王弟襄隄侯子瘉為廣徳王師古曰隄音丁奚反瘉音愈奉恵王後二年薨子赤嗣王莽時絶膠東康王寄以孝景中二年立二十八年薨淮南王謀反時寄微聞其事私作兵車鏃矢應劭曰樓車也所以看敵國營壘之虛實也師古曰兵車止謂戰車耳鏃矢大鏃之矢今所謂兵箭者也鏃音子木反戰守備備淮南之起及吏治淮南事辭出之師古曰辭語所連出其事寄於上最親師古曰寄母王夫人即王皇后之妹於上為從母故寄於諸兄弟之中又更親也此下有常山王云天子為最親其義亦同意自傷發病而死不敢置後於是上聞寄有長子賢母無寵少子慶母愛幸寄常欲立之為非次因有過遂無所言上憐之立賢為膠東王奉康王祀而封慶為六安王王故衡山地膠東王賢立十五年薨諡為哀王子戴王通平嗣二十四年薨子頃王音嗣五十四年薨子共王授嗣十四年薨子殷嗣王莽時絶六安共王慶立三十八年薨子夷王禄嗣十年薨子繆王定嗣二十二年薨子頃王光嗣二十七年薨子育嗣王莽時絶清河哀王乗以孝景中三年立十二年薨無子國除常山憲王舜以孝景中五年立舜帝少子驕淫數犯禁上常寛之三十三年薨子勃嗣為王初憲王有不愛姬生長男棁蘇林曰音奪師古曰音他活反其字從木棁以母無寵故亦不得幸於王王后脩生太子勃王内多所幸姬生子平子商王后稀得幸及憲王疾甚諸幸姬侍病王后以妬媢不常在師古曰媢亦妬也媢音冐輙歸舍醫進藥太子勃不自嘗藥又不宿留侍疾及王薨王后太子乃至憲王雅}
