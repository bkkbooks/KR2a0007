  - {type: variant, offset: 719, length: 1, content: 會, krp: 議議皆曰建失臣子道積久輙䝉不忍遂謀反逆所行無道雖桀紂惡不至於此天誅所不赦當以謀反法誅有詔宗正廷尉即問建師古曰即就也就其國問之建自殺后成光等皆棄市六年國除劉敞曰當云建立六年地入于漢為廣陵郡絶百二十一年平帝時新都侯王莽秉政興滅繼絶立建弟盱眙侯子宫為廣陵王師古曰盱音許于反眙音怡奉易王後莽簒國絶膠西于王端孝景前三年立為人賊盭又隂痿師古曰盭古戾字賊盭言其性賊害狼戾也痿音萎一近婦人病數月有所愛幸少年以為郎郎與後宫亂端禽㓕之及殺其子母數犯法師古曰數音所角反次下亦同漢}
  - {type: variant, offset: 721, length: 1, content: 車, WYG: 卿數請誅端天子弗忍而端所為滋甚師古曰滋益也有司比再請削其國去太半張晏曰三分之二為太半一為少半師古曰比頻也端心愠遂為無訾省蘇林曰為無所省録也師古曰訾訾財也省視也言不視訾財也劉奉世曰無訾省猶今不藉頼忿故為此顔失之府庫壊漏盡腐財物以鉅萬計終不得收徙師古曰不收又不徙置他處令吏毋得收租賦端皆去衞封其宫}
