  - {type: variant, offset: 2341, length: 3125, content: 之來今則吉凶同卒搖易之則民心惑若是者誠難施也今九女之制合於往古無害於今不逆於民心至易行也行之至有福也將軍輔政而不蚤定非天下之所望也唯將軍信臣子之願念關雎之思逮委政之隆及始初清明為漢家建無窮之基誠難以忽不可以遴鳳不能自立法度循故事而已會皇太后女弟司馬君力與欽兄子私通事上聞欽慚懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也臣欽愚戇經術淺薄不足以奉大對臣聞日蝕地震陽微陰盛也臣者君之陰也子者父之陰也妻者夫之陰也夷狄者中國之陰也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乘夫或臣子背君父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無強大之國三垂蠻夷無逆理之節殆為後宮何以言之日以戊申蝕時加未戊未土也土者中宮之部也其夜地震未央宮殿中此必適妾將有爭寵相害而為患者唯陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至高宗遭雊雉之戒飭己正事享百年之壽殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明內推至誠深思天變何應而不感何搖而不動孔子曰仁遠乎哉唯陛下正后妾抑女寵防奢泰去佚游躬節儉親萬事數御安車由輦道親二宮之饔膳致晨昏之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近諂諛之人而遠公方信讒賊之臣以誅忠良賢俊失在巖穴大臣怨於不以雖無變異社稷之憂也天下至大萬事至眾祖業至重誠不可以佚豫為不可以奢泰持也唯陛下忍無益之欲以全眾庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為主遠觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妒之心興矣如此則匹婦之說不可勝也唯陛下純德普施無欲是從此則眾庶咸說繼嗣日廣而海內長安萬事之是非何足備言欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之數稱達名士王駿韋安世王延世等救解馮野王王尊胡常之罪過及繼功臣絕世填撫四夷當世善政多出於欽者見鳳專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰敵有旦莫偃伏之愛心不介然有間然范雎起徒步由異國無雅信開一朝之說而穰侯就封及近者武安侯之見退三事之跡相去各數百歲若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范雎之徒得間其說頃之復日蝕京兆尹王章上封事求見果言鳳專權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指其哀太后涕泣為不食上少而親倚鳳亦不忍廢復起鳳就位鳳心慚稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻己自責至誠動眾愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳非主上所以待將軍非將軍所以報主上也昔周公雖老猶在京師明不離成周示不忘王室也仲山父異姓之臣無親於宣就封於齊猶歎息永懷宿夜徘徊不忍遠去況將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫有將軍主上昭然知之故攀援不遣書稱公毋困我唯將軍不為四國流言自疑於成王以固至忠鳳復起視事上令尚書劾奏京兆尹章章死詔獄語在元后傳章既死眾庶冤之以譏朝廷欽欲救其過復說鳳曰京兆尹章所坐事密吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章內有所犯雖陷正法事不暴揚自京師不曉況於遠方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策欽之補過將美皆此類也優游不仕以壽終欽子及昆弟支屬至二千石者且十人欽兄緩前免太常以列侯奉朝請成帝時乃薨子業嗣業有材能以列侯選復為太常數言得失不事權貴與丞相翟方進衛尉定陵侯淳于長不平後業坐法免官復為函谷關都尉會定陵侯長有罪當就國長舅紅陽侯立與業書曰誠哀老姊垂白隨無狀子出關願勿復用前事相侵定陵侯既出關伏罪復發下雒陽獄丞相史搜得紅陽侯書奏業聽請不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦長陷大惡獨得不坐苟欲障塞前過不為陛下廣持平例又無恐懼之心反因時信其邪辟報睚眥怨故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友後將軍朱博鉅鹿太守孫宏故少府陳咸皆免官歸咸故郡刑罰無平在方進之筆端眾庶莫不疑惑皆言孫宏不與紅陽侯相愛宏前為中丞時方進為御史大夫舉掾隆可侍御史宏奏隆前奉使欺謾不宜執法近侍方進以此怨宏又方進為京兆尹時陳咸為少府在九卿高弟陛下所自知也方進素與司直師丹相善臨御史大夫缺使丹奏咸為姦利請案驗卒不能有所得而方進果自得御史大夫為丞相即時詆欺奏免咸復因紅陽侯事歸咸故郡眾人皆言國家假方進權太甚案師丹行能無異及光祿勳許商被病殘人皆但以附從方進嘗獲尊官丹前親薦邑子丞相史能使巫下神為國求福幾獲大利幸賴陛下至明遣使者毛莫如先考驗卒得其姦皆坐死假令丹知而白之此誣罔罪也不知而白之是背經術惑左道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白專作威福阿黨所厚排擠英俊託公報私橫厲無所畏忌欲以熏轑天下天下莫不望風而靡自尚書近臣皆結舌杜口骨肉親屬莫不股栗威權泰盛而不忠信非所以安國家也今聞方進卒病死不以尉示天下反復賞賜厚葬唯陛下深思往事以戒來今會成帝崩哀帝即位業復上書言王氏世權日久朝無骨骾之臣宗室諸侯微弱與繫囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輒白奏反與趙氏比周恣意妄行譖愬故許后被加以非罪誅破諸許族敗元帝外家內嫉妒同產兄姊紅陽侯立及淳于氏皆老被放棄新喋血京師威權可畏高陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海內尤不可不慎陛下初即位謙讓未皇孤獨特立莫可據杖權臣易世意若探湯宜蚤以義割恩安百姓心竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜徵博置左右以填天下此人在朝則陛下可高枕而臥矣昔諸呂欲危劉氏賴有高祖遺臣周勃陳平尚存不者幾為姦臣笑業又言宜為恭王立廟京師以章孝道時高昌侯董宏亦言宜尊帝母定陶王丁后為帝太后大司空師丹等劾宏誤朝不道坐免為庶人業復上書訟宏前後所言皆合指施行朱博果見拔用業由是徵復為太常歲餘左遷上黨都尉會司隸奏業為太常選舉不實業坐免官復就國哀帝崩王莽秉政諸前議立廟尊號者皆免徙合浦業以前罷黜故見闊略憂恐發病死業成帝初尚帝妹潁邑公主主無子薨業家上書求還京師與主合葬不許而賜諡曰荒侯傳子至孫絕初杜周武帝時徙茂陵至延年徙杜陵云贊曰張湯杜周並起文墨小吏致位三公列於酷吏而俱有良子德器自過爵位尊顯繼世立朝相與提衡至於建武杜氏爵乃獨絕迹其福祚元功儒林之後莫能及也自謂唐杜苗裔豈其然乎及欽浮沈當世好謀而成以建始之初深陳女戒終如其言庶幾乎關雎之見微非夫浮華博習之徒所能規也業因勢而抵垝稱朱博毀師丹愛憎之議可不畏哉, WYG: 證}
  - {type: variant, offset: 2341, length: 3125, content: 之來今則吉凶同卒搖易之則民心惑若是者誠難施也今九女之制合於往古無害於今不逆於民心至易行也行之至有福也將軍輔政而不蚤定非天下之所望也唯將軍信臣子之願念關雎之思逮委政之隆及始初清明為漢家建無窮之基誠難以忽不可以遴鳳不能自立法度循故事而已會皇太后女弟司馬君力與欽兄子私通事上聞欽慚懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也臣欽愚戇經術淺薄不足以奉大對臣聞日蝕地震陽微陰盛也臣者君之陰也子者父之陰也妻者夫之陰也夷狄者中國之陰也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乘夫或臣子背君父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無強大之國三垂蠻夷無逆理之節殆為後宮何以言之日以戊申蝕時加未戊未土也土者中宮之部也其夜地震未央宮殿中此必適妾將有爭寵相害而為患者唯陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至高宗遭雊雉之戒飭己正事享百年之壽殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明內推至誠深思天變何應而不感何搖而不動孔子曰仁遠乎哉唯陛下正后妾抑女寵防奢泰去佚游躬節儉親萬事數御安車由輦道親二宮之饔膳致晨昏之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近諂諛之人而遠公方信讒賊之臣以誅忠良賢俊失在巖穴大臣怨於不以雖無變異社稷之憂也天下至大萬事至眾祖業至重誠不可以佚豫為不可以奢泰持也唯陛下忍無益之欲以全眾庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為主遠觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妒之心興矣如此則匹婦之說不可勝也唯陛下純德普施無欲是從此則眾庶咸說繼嗣日廣而海內長安萬事之是非何足備言欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之數稱達名士王駿韋安世王延世等救解馮野王王尊胡常之罪過及繼功臣絕世填撫四夷當世善政多出於欽者見鳳專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰敵有旦莫偃伏之愛心不介然有間然范雎起徒步由異國無雅信開一朝之說而穰侯就封及近者武安侯之見退三事之跡相去各數百歲若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范雎之徒得間其說頃之復日蝕京兆尹王章上封事求見果言鳳專權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指其哀太后涕泣為不食上少而親倚鳳亦不忍廢復起鳳就位鳳心慚稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻己自責至誠動眾愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳非主上所以待將軍非將軍所以報主上也昔周公雖老猶在京師明不離成周示不忘王室也仲山父異姓之臣無親於宣就封於齊猶歎息永懷宿夜徘徊不忍遠去況將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫有將軍主上昭然知之故攀援不遣書稱公毋困我唯將軍不為四國流言自疑於成王以固至忠鳳復起視事上令尚書劾奏京兆尹章章死詔獄語在元后傳章既死眾庶冤之以譏朝廷欽欲救其過復說鳳曰京兆尹章所坐事密吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章內有所犯雖陷正法事不暴揚自京師不曉況於遠方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策欽之補過將美皆此類也優游不仕以壽終欽子及昆弟支屬至二千石者且十人欽兄緩前免太常以列侯奉朝請成帝時乃薨子業嗣業有材能以列侯選復為太常數言得失不事權貴與丞相翟方進衛尉定陵侯淳于長不平後業坐法免官復為函谷關都尉會定陵侯長有罪當就國長舅紅陽侯立與業書曰誠哀老姊垂白隨無狀子出關願勿復用前事相侵定陵侯既出關伏罪復發下雒陽獄丞相史搜得紅陽侯書奏業聽請不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦長陷大惡獨得不坐苟欲障塞前過不為陛下廣持平例又無恐懼之心反因時信其邪辟報睚眥怨故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友後將軍朱博鉅鹿太守孫宏故少府陳咸皆免官歸咸故郡刑罰無平在方進之筆端眾庶莫不疑惑皆言孫宏不與紅陽侯相愛宏前為中丞時方進為御史大夫舉掾隆可侍御史宏奏隆前奉使欺謾不宜執法近侍方進以此怨宏又方進為京兆尹時陳咸為少府在九卿高弟陛下所自知也方進素與司直師丹相善臨御史大夫缺使丹奏咸為姦利請案驗卒不能有所得而方進果自得御史大夫為丞相即時詆欺奏免咸復因紅陽侯事歸咸故郡眾人皆言國家假方進權太甚案師丹行能無異及光祿勳許商被病殘人皆但以附從方進嘗獲尊官丹前親薦邑子丞相史能使巫下神為國求福幾獲大利幸賴陛下至明遣使者毛莫如先考驗卒得其姦皆坐死假令丹知而白之此誣罔罪也不知而白之是背經術惑左道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白專作威福阿黨所厚排擠英俊託公報私橫厲無所畏忌欲以熏轑天下天下莫不望風而靡自尚書近臣皆結舌杜口骨肉親屬莫不股栗威權泰盛而不忠信非所以安國家也今聞方進卒病死不以尉示天下反復賞賜厚葬唯陛下深思往事以戒來今會成帝崩哀帝即位業復上書言王氏世權日久朝無骨骾之臣宗室諸侯微弱與繫囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輒白奏反與趙氏比周恣意妄行譖愬故許后被加以非罪誅破諸許族敗元帝外家內嫉妒同產兄姊紅陽侯立及淳于氏皆老被放棄新喋血京師威權可畏高陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海內尤不可不慎陛下初即位謙讓未皇孤獨特立莫可據杖權臣易世意若探湯宜蚤以義割恩安百姓心竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜徵博置左右以填天下此人在朝則陛下可高枕而臥矣昔諸呂欲危劉氏賴有高祖遺臣周勃陳平尚存不者幾為姦臣笑業又言宜為恭王立廟京師以章孝道時高昌侯董宏亦言宜尊帝母定陶王丁后為帝太后大司空師丹等劾宏誤朝不道坐免為庶人業復上書訟宏前後所言皆合指施行朱博果見拔用業由是徵復為太常歲餘左遷上黨都尉會司隸奏業為太常選舉不實業坐免官復就國哀帝崩王莽秉政諸前議立廟尊號者皆免徙合浦業以前罷黜故見闊略憂恐發病死業成帝初尚帝妹潁邑公主主無子薨業家上書求還京師與主合葬不許而賜諡曰荒侯傳子至孫絕初杜周武帝時徙茂陵至延年徙杜陵云贊曰張湯杜周並起文墨小吏致位三公列於酷吏而俱有良子德器自過爵位尊顯繼世立朝相與提衡至於建武杜氏爵乃獨絕迹其福祚元功儒林之後莫能及也自謂唐杜苗裔豈其然乎及欽浮沈當世好謀而成以建始之初深陳女戒終如其言庶幾乎關雎之見微非夫浮華博習之徒所能規也業因勢而抵垝稱朱博毀師丹愛憎之議可不畏哉, krp: 證}
