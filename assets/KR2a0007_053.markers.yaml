  - {type: variant, offset: 719, length: 1, content: 會, WYG: 議議皆曰建失臣子道積久輙䝉不忍遂謀反逆所行無道雖桀紂惡不至於此天誅所不赦當以謀反法誅有詔宗正廷尉即問建師古曰即就也就其國問之建自殺后成光等皆棄市六年國除劉敞曰當云建立六年地入于漢為廣陵郡絶百二十一年平帝時新都侯王莽秉政興滅繼絶立建弟盱眙侯子宫為廣陵王師古曰盱音許于反眙音怡奉易王後莽簒國絶膠西于王端孝景前三年立為人賊盭又隂痿師古曰盭古戾字賊盭言其性賊害狼戾也痿音萎一近婦人病數月有所愛幸少年以為郎郎與後宫亂端禽㓕之及殺其子母數犯法師古曰數音所角反次下亦同漢}
