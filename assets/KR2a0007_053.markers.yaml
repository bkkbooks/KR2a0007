  - {type: variant, offset: 752, length: 0, content: '', WYG: 私恩自裂地分其子弟而漢為定制封號輙别屬漢郡漢有厚恩而諸侯地稍自分析弱小云勝為人樂酒好内師古曰好内躭於妻妾也樂音五教反有子百二十餘人常與趙王彭祖相非曰兄為王専代吏治事王者當日聴音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣四十三年薨子哀王昌嗣一年薨子康王昆侈嗣宋祁曰康越本作糠糠惡諡也好樂怠政曰糠學本去米盖誤也二十一年薨子頃王輔嗣四年薨子憲王福嗣十七年薨子懐王循嗣十五年薨無子絶四十五嵗成帝鴻嘉二年復立憲王弟孫利鄉侯子雲客是為廣徳夷王三年薨無子絶十四嵗哀帝復立雲客弟廣漢為廣平王薨無後平帝元始二年復立廣川惠王曽孫倫為廣徳王奉靖王後王莽時絶劉敞曰此倫封廣徳王廣川王後又封廣徳王俱是平帝二年事必有一誤劉奉世曰按表王漢以夷王弟紹封十三年王莽時絶則此倫封廣徳者誤也此云廣漢表云漢必有誤長沙定王發母唐姬故程姬侍者景帝召程姬程姬有所避不願進師古曰謂月事而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因名曰發張晏曰長沙王生乃發寤已之繆幸唐姬以孝景前二年立以其母微無寵故王卑溼貧國應劭曰景帝後二年諸王來朝有詔更前稱夀歌舞定王但張褏小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋帝乃以武陵零陵桂陽益焉二十八年薨子戴王庸嗣二十七年薨子頃王鮒鮈嗣服䖍曰鮈音拘師古曰鮒音附鮈音劬字或作胕朐其音同耳十七年薨子刺王建徳嗣師古曰刺音來曷反宣帝時坐獵縱火燔民九十六家師古曰縱放也殺二人又以縣官事怨内史敎人誣告以棄市罪削八縣罷中尉官師古曰减其官屬所以貶抑之三十四年薨子煬王旦嗣師古曰煬音弋向反二年薨無子絶嵗餘元帝初元三年復立旦弟宗是為孝王五年薨子魯人嗣王莽時絶廣川惠王越以孝景中二年立十三年薨子繆王齊嗣師古曰諡法曰蔽仁傷善曰繆四十四年薨初齊有幸臣乗距已而有罪欲誅距距亡齊因禽其宗族距怨王乃上書告齊與同産姦師古曰謂其姊妹也是後齊數告言漢公卿及幸臣所忠等師古曰所姓忠名觧具在食貨志又告中尉蔡彭祖捕子明孟康曰彭祖子名明也師古曰孟説非也明廣川王子也罵曰吾盡汝種矣師古曰王誣彭祖罵明云然案驗不如王言宋祁云浙本案字上有有司字劾齊誣㒺大不敬請繫治齊恐上書願與廣川勇士奮擊匈奴上許之未發病薨有司請除國奏可後數月下詔曰廣川恵王於朕為兄朕不忍絶其宗廟其以惠王孫去為廣川王去即繆王齊太子也師受易論語孝經皆通好文辭方技博奕倡優其殿門有成慶畫短衣大絝長劍晉灼曰成慶荆軻也衞人謂之慶卿燕人謂之荆軻師古曰成慶古之勇士也事見淮南子非荆卿也去好之作七尺五寸劒被服皆效焉有幸姬王昭平王地餘許以為后去嘗疾姬陽成昭信侍視甚謹師古曰陽成姓也昭信名也更愛之去與地餘戲得褏中刀師古曰褏古衣袖字笞問狀服欲與昭平共殺昭信笞問昭平不服以鐵鍼鍼之師古曰鍼刺也鍼音之林反彊服乃㑹諸姬去以劒自擊地餘令昭信擊昭平皆死昭信曰兩姬婢且泄口復絞殺從婢三人後昭信病夢見昭平等以狀告去去曰虜乃復見畏我師古曰言其見形令我畏忌也見音胡電反獨可燔燒耳掘出尸皆燒為灰後去立昭信為后幸姬陶望卿為脩靡夫人主繒帛崔脩成為明貞夫人主永巷昭信復譖望卿曰與我無禮衣服常鮮於我師古曰鮮謂新華也盡取善繒匄諸宫人師古曰匄乞遺之也音工艾反去曰若數惡望卿不能减我愛師古曰若汝也惡謂讒毁也設聞其淫我亨之矣後昭信謂去曰前畫工畫望卿舍望卿袒裼傅粉其傍師古曰袒裼脱衣露其肩背也袒音但裼音錫又數出入南户窺郎吏疑有姦去曰善司之以故益不愛望卿後與昭信等飲諸姬皆侍去為望卿作歌曰背尊章嫖以忽孟康曰嫖音匹昭反師古曰尊章猶言舅姑也今關中俗婦呼舅為鍾鍾者尊聲之轉也宋祁曰注文呼舅下當有姑字謀屈奇起自絶師古曰屈奇奇異也屈音其勿反行周流自生患諒非望今誰怨師古曰諒信也言昔被愛寵信非所望今見罪責無所怨也使美人相和歌之去曰是中當有自知者昭信知去已怒即誣言望卿歴指郎吏卧處具知其主名又言郎中令錦被疑有姦去即與昭信從諸姬至望卿所臝其身更擊之師古曰更音工衡反令諸姬各持燒鐵共灼望卿望卿走自投井死昭信出之㭬杙其隂中師古曰杙橜也㭬音竹角反杙音弋割其鼻脣斷其舌謂去曰前殺昭平反來畏我師古曰令我恐畏也今欲靡爛望卿使不能神師古曰靡碎也音縻其下亦同與去共支解置大鑊中取桃灰毒藥并煮之召諸姬皆臨觀連日夜靡盡復共殺其女弟都後去數召姬榮愛與飲昭信復譖之曰榮姬視瞻意態不善疑有私時愛為去刺方領繡服䖍曰如今小兒郤襲衣也頸下施衿領正方直晉灼曰今之婦人直領也繡為方領上刺作黼黻文王莽傳曰有人著赤繢方領方領上服也師古曰晉説是也去取燒之愛恐自投井出之未死笞問愛自誣與醫姦去縳繫柱燒刀灼潰兩目師古曰潰决也生割兩股銷鈆灌其口中愛死支觧以棘埋之諸幸於去者昭信輙譖殺之凡十四人皆埋太后所居長壽宫中宫人畏之莫敢復迕師古曰迕逆也不敢逆昭信意昭信欲擅愛曰王使明貞夫人主諸姬淫亂難禁請閉諸姬舍門無令出敖師古曰敖謂游戲也使其大婢為僕射師古曰大婢婢之長年也主永巷盡封閉諸舍上籥於后非大置酒召不得見去憐之為作歌曰愁莫愁居無聊師古曰聊頼也心重結意不舒内茀鬱憂哀積師古曰茀音拂上不見天生何益日崔隤時不再師古曰崔隤猶言蹉􅋸也崔音}
