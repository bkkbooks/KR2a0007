  - {type: variant, offset: 723, length: 1, content: 議, WYG: 從一門出入數變名姓為布衣之它國師古曰之徃也相二千石至者奉漢法以治端輙求其罪告之亡罪者詐藥殺之所以設詐究變師古曰究極也彊足以距諫知足以飾非相二千石從王治則漢繩以法故膠西小國而所殺傷二千石甚衆立四十七年薨無子國除地入于漢為膠西郡趙敬肅王彭祖以孝景前二年立為廣川王趙王遂反破後徙王趙彭祖為人巧佞卑諂足共師古曰共讀曰恭足恭謂便辟也而心刻深好法律持詭辯以中人師古曰詭辯違道之辯也中傷也音竹仲反多内寵姬及子孫相二千石欲奉漢法以治則害於王家是以每相二千石至彭祖衣帛布單衣師古曰或帛或布以為單衣自行迎除舍師古曰至除舍迎之也除舍謂初所至之舍宋祁曰當云迎至除舍多設疑事以詐動之得二千石失言中忌諱輙書之二千石欲治者則以此廹劫不聴廼上書告之及汙以姦利事彭祖立六十餘年相二千石無能滿二嵗輙以罪去大者死小者刑以故二千石莫敢治而趙王擅權使使即縣為賈人𣙜㑹韋昭曰平㑹兩家買賣之賈者𣙜者禁他家獨王家得為之也師古曰即就也就諸縣而專𣙜賈人之㑹若今和市矣𣙜音角㑹音工外反宋祁曰榷從木從手者非是入多於國租税以是趙王家多金錢然所賜姬諸子亦盡之矣彭祖不好治宫室禨祥服䖍曰求福也師古曰禨鬼俗也字或作畿淮南子曰荆人鬼越人畿禨祥總謂鬼神之事也服説失之禨音居衣反宋祁曰禨當作巨衣反好為吏上書願督國中盗賊師古曰督視察也常夜從走卒行徼邯鄲中師古曰徼謂廵察也音工釣反諸使過客以彭祖險陂莫敢留邯鄲師古曰使謂京師使人也過客行客從趙過者也陂謂傾側也音彼義反久之太子丹與其女弟及同産姊姦江充告丹淫亂又使人椎埋攻剽為姦甚衆師古曰椎殺人而埋之故曰椎埋剽劫也椎音直隹反其字從木剽音頻妙反其字從刀武帝遣使者發吏卒捕丹下魏郡詔獄治罪至死彭祖上書寃訟丹願從國中勇敢擊匈奴師古曰以勇敢自隨贖丹罪上不許久之竟赦出後彭祖入朝因帝姊平陽隆慮公主師古曰慮音廬求復立丹為太子上不許彭祖取江都易王寵姬王建所姦淖姬者甚愛之生一男號淖子彭祖以征和元年薨諡敬肅王彭祖薨時淖姬兄為漢宦者上召}
