  - {type: variant, offset: 748, length: 1, content: 光, WYG: 朋友相為使夫宗室擯郤骨肉氷釋師古曰擯郤謂斥退也氷釋言銷散也擯音必刃反郤音邱略反斯伯奇所以流離比干所以横分也師古曰伯奇周尹吉甫之子也事後毋至孝而後母譛之於吉甫吉甫欲殺之伯奇乃亡走山林比干諫紂紂怒殺而剖其心故云横分也詩云我心憂傷惄焉如𢷬假寐永歎唯憂用老心之憂矣疢如疾首師古曰小雅小弁之詩也惄思也𢷬築也不脱衣冠而寐曰假寐永長也疢病也言我心中憂思如被𢷬築假寐長歎以憂致老至於苦病如遇首疾也臣之謂也具以吏所侵聞}
