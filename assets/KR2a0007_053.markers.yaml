  - {type: variant, offset: 1310, length: 2, content: 卿位, WYG: 年中山懐王循表作修廣川恵王越十三年薨表作十二年繆王齊嗣四十四年薨表作四十五年常山憲王舜三十三年薨表作三十二年安王雍嗣二十六年薨表作十六年泗水思王商十年薨表作十五年戴王立二十二年薨表作二十年有遺腹子煖表作綜趙敬肅王彭祖傳又使人椎埋攻剽注師古曰椎殺人而埋之顧炎武曰椎埋即掘塚也新𦵏者謂之埋師古注非中山靖王勝傳有子百二}
