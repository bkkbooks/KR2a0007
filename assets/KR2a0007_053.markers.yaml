  - {type: variant, offset: 18, length: 0, content: '', WYG: 郡魯恭王餘以孝景前二年立為淮}
  - {type: variant, offset: 18, length: 0, content: '', krp: 郡魯恭王餘以孝景前二年立為淮}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 王吳楚反破後以孝景前三年徙王魯好治宫室苑囿狗馬季年好音師古曰季年末年也不喜辭師古曰喜音許吏反為人口吃難言師古曰吃音訖二十八年薨子安王光嗣初好音樂輿馬晚節遴師古曰晚節猶言末時也遴與􅈔同猶言貪嗇也唯恐不足於財四十年薨子孝王慶忌嗣三十七年薨子頃王勁嗣二十八年薨子文王睃嗣宋祁曰睃疑作俊十八年薨亡子國除哀帝建平三年復立頃王子睃弟郚鄉侯閔為王蘇林曰郚音魚縣名也屬東海郡師古曰又音吾宋祁云兩浙本無頃王子三字王莽時絶恭王初好治宫室壊孔子舊宅以廣其宫聞鐘磬琴瑟之聲遂不敢復壊於其壁中得古文經傳江都易王非以孝景前二年立為汝南王吳楚反時非年十五有材氣上書自請擊吳景帝賜非將軍印擊吳吳已破徙王江都治故吳國師古曰治謂都之劉濞所居也以軍功賜天子旗元光中匈奴大入漢邊非上書願擊匈奴上不許非好氣力治宫館招四方豪傑驕奢甚二十七年薨子建嗣建為}
