  - {type: variant, offset: 753, length: 2, content: 秋擅, WYG: 回反隤音頽願棄軀死無悔令昭信聲鼓為節以敎諸姬歌之歌罷輙歸永巷封門獨昭信兄子初為乗華夫人得朝夕見昭信與去從十餘奴博飲游敖初去年十四五事師受易師數諫正去師古曰數音所角反其下亦同去益大逐之師古曰益大謂年漸長大也内史請以為掾師數令内史禁切王家去使奴殺師父子不發覺後去數置酒令倡俳臝戲坐中師古曰倡樂人也俳雜戲者也以為樂相彊劾繫倡闌入殿門如淳曰彊相名也奏狀事下考案倡辭本為王教脩靡夫人望卿弟都歌舞使者}
