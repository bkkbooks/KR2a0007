  - {type: variant, offset: 738, length: 0, content: '', WYG: 出涕者也師古曰澘垂涕貌音所姦反臣聞白日曬光幽隱皆照師古曰曬暴也舒也音山䜴反又音力支反明月曜夜蟁蝱宵見師古曰宵亦夜也蝱音盲然雲蒸列布杳冥晝昏塵埃抪覆昧}
  - {type: variant, offset: 738, length: 0, content: '', krp: 出涕者也師古曰澘垂涕貌音所姦反臣聞白日曬光幽隱皆照師古曰曬暴也舒也音山䜴反又音力支反明月曜夜蟁蝱宵見師古曰宵亦夜也蝱音盲然雲蒸列布杳冥晝昏塵埃抪覆昧}
  - {type: variant, offset: 739, length: 0, content: '', WYG: 見泰山師古曰抪亦布散也昧暗也抪音鋪何則物有蔽之也今臣雍閼不得聞師古曰雍讀曰壅雍塞也閼猶止也音烏曷反讒言之徒􅑣生師古曰􅑣生言衆多也一曰􅑣與鋒同}
