  - {type: variant, offset: 33, length: 1, content: 史, WYG: 考會赦不治易王薨未葬建居服舍師古曰倚廬堊室之次也召易王所愛美人淖姬等凡十人與姦鄭氏曰淖音卓王孫之卓蘇林曰淖音泥淖師古曰蘇説是音女教反建女弟徵臣為葢侯子婦師古曰女弟即妹也以易王喪來歸建復與姦建異母弟定國為淮陽侯易王最小子也其母幸立之師古曰冀得立其子為易王嗣具知建事行錢}
