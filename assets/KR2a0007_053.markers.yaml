  - {type: variant, offset: 740, length: 0, content: '', WYG: 遼路逺曽莫為臣聞臣竊自悲也臣聞社鼷不灌屋鼠不熏師古曰鼷小䑕音奚何則所託者然也臣雖薄也得䝉肺附位雖卑也得為東藩屬又稱兄師古曰言於戚屬為帝兄今羣臣非有葭莩之親鴻毛之重張晏曰葭蘆葉也莩葉裏白皮也晉灼曰莩葭裏之白皮也皆取喻於輕薄也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻著鴻毛喻輕薄甚也莩音孚張言葉裹白皮非也宋祁曰顔以晉説未}
