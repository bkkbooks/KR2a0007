  - {type: variant, offset: 14, length: 2, content: 義縱, WYG: 他皆類此立二十六年薨中尉常麗以聞曰王身端行治師古曰端直治理也温仁恭儉篤敬愛下明知深察恵于鰥寡大行令奏諡法曰聰明睿知曰獻師古曰睿深也通也宜諡曰獻王子共王不害嗣四年薨子剛王堪嗣十二年薨子頃王授嗣師古曰頃音傾諸為諡者皆類此也十七年薨子孝王慶嗣四十三年薨子元嗣元取故廣陵厲王厲王太子及中山懐王故姬亷等以為姬甘露中冀州刺史敞奏元事下廷尉逮召廉等元廹脅凡七人令自殺有司奏請誅元有詔削二縣萬一千户後元怒少史留貴留貴踰垣出欲告元元使人殺留貴母有司奏元殘賊不改不可君國子民廢勿王處漢中房陵師古曰房陵漢中縣居數年坐與妻若共乗朱輪車怒若又笞擊令自髠漢中太守請治病死宋祁云浙本病字上有元字立十七年宋祁云姚本七作五國除絶五嵗成帝建始元年復立元弟上郡庫令良如淳曰漢官北邊郡庫官兵之所藏故置令是為河間惠王良脩獻王之行母太后薨服喪如禮哀帝下詔褒揚曰河間王良喪太后三年為宗室儀表其益封萬户二十七年薨子尚嗣王莽時絶臨江哀王閼以孝景前二年立三年薨無子國除為郡臨江閔王榮以孝景前四年為皇太子四嵗廢為臨江王三嵗坐侵廟壖地為宫師古曰壖音人縁反觧在食貨志及鼂錯傳上徵榮榮行祖於江陵北門師古曰祖者送行之祭因饗飲也昔黄帝之子纍祖好逺遊而死於道故後人以為行神也既上車軸折車廢師古曰廢壊也江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王師古曰簿皆音薄户反訊問也音信王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長亡子國除師古曰榮實最長而傳居二王之後者以其從太子被廢後乃立為王也地入于漢}
