  - {type: variant, offset: 725, length: 0, content: '', WYG: 淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌曰無咎無譽上曰如是可矣遣使者立昌是為頃王十九年薨子懐王尊嗣五年薨無子絶二嵗宣帝立尊弟髙是為哀王數月薨子共王充嗣五十六年薨子隱嗣王莽時絶初武帝復以親親故立敬肅王小子偃為平于王孟康曰今廣平是為頃王十一年薨宋祁曰頃王下疑更有頃王二字子繆王元嗣二十五年薨宋祁曰五當作二大鴻臚禹奏元前以刃賊殺奴婢子男殺謁者為刺史所奏罪名明白病先令令能為樂奴婢從死師古曰先令者預為遺令也能為樂作樂之人也從死以殉葬也廹脅自殺者凡十六人暴虐不道故春秋之義誅君之子不宜立元雖未伏誅不宜立嗣奏可國除中山靖王勝以孝景前三年立武帝初即位大臣懲}
