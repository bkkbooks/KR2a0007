  - {type: variant, offset: 4, length: 0, content: '', WYG: 二十三孝景皇帝十四男王皇后生孝武皇帝栗姬生臨江閔王榮河間獻王德臨江哀王閼師古曰閼音烏曷反程姬生魯共王餘師古曰共讀曰恭下皆類此江都易王非師古曰易音改易之易諡法云好更故舊曰易膠西于王端師古曰于逺也言其所行不善逺乖道徳故以為諡賈夫人生趙敬肅王彭祖中山靖王勝唐姬生長沙定王發王夫人生廣川恵王越膠東康王寄清河哀王乗常山憲王師古曰王夫人即王皇后之妹也河間獻王徳以孝景前二年立脩學好古實事求是師古曰務得事實每求真是也今流俗書本云求長長老以是從人得善書盖妄加之耳從民得善書必為好寫與之留其眞師古曰眞正也留其正本加金帛賜以招之繇是四方道術之人不逺千里師古曰不以千里為逺而自致也繇讀與由同宋祁云加字新添或有先祖舊書多奉以奏獻王者師古曰奏進也故得書多與漢朝等是時淮南王安亦好書所招致率多浮辯師古曰言無實用耳獻王所得書皆古文先秦舊書師古曰先秦猶言秦先謂未焚書之前周官尚書禮禮記師古曰禮者禮經也禮記者諸儒記禮之説也孟子老子之屬皆經傳説記七十子之徒所論師古曰七十子孔子弟子也觧具在藝文志其學舉六藝師古曰此六藝謂六經立毛氏詩左氏春秋博士脩禮樂被服儒術造次必於儒者師古曰被服言常居處其中也造次謂所嚮必行也被音皮義反造音千到反山東諸儒多從而遊武帝時獻王來朝獻雅樂對三雍宫應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也及詔䇿所問}
