  - {type: variant, offset: 1641, length: 336, content: 入錢穀以助用前後數百萬緩六弟五人至大官少弟熊歷五郡二千石三州牧剌史有能名唯中弟欽官不至而最知名欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆乃為小冠高廣財二寸由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云時帝舅大將軍王鳳以外戚輔政求賢知自助鳳父頃侯禁與欽兄緩相善故鳳深知欽能奏請欽為大將軍軍武庫令職閒無事欽所好也欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是說大將軍鳳曰禮壹娶九女所以極陽數廣嗣重祖也必鄉舉求窈窕不問華色所以助德理內也娣姪雖缺不復補所以養壽塞爭也故后妃有貞淑之行則胤嗣有賢聖之君制度有威儀之節則人君有壽考之福廢而不由則女德不厭女德不厭則壽命不究於高年書云或四三年言失欲之生害也男子, WYG: 卷}
