  - {type: variant, offset: 80, length: 0, content: '', WYG: 廷尉治恬受人錢財為上書論棄市建罪不治後數使使至長安迎徵臣魯恭王太后聞之師古曰易王即魯恭王同母之弟徵臣則太后之孫也故與書戒之宋祁曰恭當作共遺徵臣書曰國中口語籍籍慎無復至江都師古曰籍籍諠聒之意後建使謁者吉請問共太后師古曰謂請問起居也太后泣謂吉歸以吾言謂而王師古曰謂告也而汝也王前事漫漫今當自謹獨不聞燕齊事乎張晏曰燕王定國齊王次昌皆與子昆弟姦發覺自殺也言吾為而王泣也吉歸致共太后語建大怒擊吉斥之師古曰斥謂退棄之建游章臺宫令四女子乗小舩建以足蹈覆}
  - {type: page-break, offset: 80, content: '', id: KR2a0007_WYG_053-6a, image: WYG0250/WYG0250-0205c.png}
  - {type: variant, offset: 80, length: 0, content: '', krp: 廷尉治恬受人錢財為上書論棄市建罪不治後數使使至長安迎徵臣魯恭王太后聞之師古曰易王即魯恭王同母之弟徵臣則太后之孫也故與書戒之宋祁曰恭當作共遺徵臣書曰國中口語籍籍慎無復至江都師古曰籍籍諠聒之意後建使謁者吉請問共太后師古曰謂請問起居也太后泣謂吉歸以吾言謂而王師古曰謂告也而汝也王前事漫漫今當自謹獨不聞燕齊事乎張晏曰燕王定國齊王次昌皆與子昆弟姦發覺自殺也言吾為而王泣也吉歸致共太后語建大怒擊吉斥之師古曰斥謂退棄之建游章臺宫令四女子乗小舩建以足蹈覆}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 船師古曰覆音芳目反其下亦同四人皆溺二人死後游雷波師古曰波讀為陂雷陂陂名其下云入波中亦同天大風建使郎二人乗小舩入波中舩覆兩郎溺攀舩乍見乍没建臨觀大笑令皆死師古曰不救上之並死陂中也宫人姬八子有過者輙令臝立擊鼓師古曰八子姬妾官名也臝者露其形也音來果反或置樹上久者三十日乃得衣或髠鉗以鈆杵舂師古曰鈆者錫之類也音弋全反不中程輙掠師古曰程者作之課也掠笞擊也或縱狼令齧殺之師古曰縱放也建觀而大笑或閉不食令餓死凡殺不辜三十五人建欲令人與禽獸交而生子彊令宫人臝而四據與羝羊及狗交師古曰羝羊牡羊音丁奚反專為滛虐自知罪多國中多欲告言者建恐誅心内不安與其后成光共使越婢下神祝詛上與郎中令等語怨望漢廷使者即復來覆我我决不獨死師古曰覆}
