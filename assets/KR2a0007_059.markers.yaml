  - {type: variant, offset: 1351, length: 370, content: 累郎臺恐其不高也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止霸產以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所卬足也又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絕陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荊棘之林而長養麋鹿廣狐兔之苑大虎狼之虛又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大不恤農時非所以彊國富人也夫殷作九市之宮而諸, WYG: 文言武安}
