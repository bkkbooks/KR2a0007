  - {type: variant, offset: 20, length: 3, content: 武帝初, WYG: 父為長安丞出湯為兒守舍師古曰稱為兒者言其尚幼少也還䑕盗肉父怒笞湯湯掘熏得䑕及餘肉劾䑕掠治傳爰書訊鞫論報師古曰傳謂傳逮若今之追逮赴對也爰換也以文書代換其口辭也訊考問也鞫窮也謂窮覈之也論報謂上論之而獲報也訊音信并取䑕與肉具獄磔堂下師古曰具為治獄之文處正其罪而磔䑕也宋祁曰顔觧具獄似失其意直謂成按耳于定國杜緩兩傳已觧緩延年之子父見之視文辭如老獄吏大驚遂使書獄如淳曰決獄之書謂律令也劉奉世曰傳非逮也若傳逮則不當先言掠治矣傳者傳囚辭也爰書者盖趙髙作爰歴教學𨽻書時獄吏書體盖用此故從俗呼為爰書也以此父使之書獄謂案牘耳非律令也父死後湯為長安吏周陽侯為諸卿時師古曰姓趙嘗繫長安湯傾身事之及出為侯大與湯交徧見貴人湯給事内史為寗成掾以湯為無害言大府師古曰大府丞相府也無害言其最勝也觧在蕭何傳調茂陵尉師古曰調選也選以為此官也調音徒釣反治方中孟康曰方中陵上土作方也湯主治之蘓林曰天子}
