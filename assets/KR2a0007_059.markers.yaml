  - {type: variant, offset: 242, length: 0, content: '', WYG: 太僕初安世兄賀幸於衛太子太子敗賔客皆誅安世為賀上書得下蠶室師古曰謂腐刑也凡養蠶者欲其温而早成故為密室蓄火以置之而新腐刑亦有中風之患須入密室乃得以全因呼為蠶室耳後為掖庭令而宣帝以皇曾孫收養掖庭賀内傷太子}
