  - {type: variant, offset: 39, length: 1, content: 待, WYG: 丞相𢎞數稱其美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之師古曰可湯所奏而論决之其治獄所巧排大臣自}
  - {type: variant, offset: 39, length: 1, content: 待, krp: 丞相𢎞數稱其美及治淮南衡山江都反獄皆窮根本嚴助伍被上欲釋之湯爭曰伍被本造反謀而助親幸出入禁闥腹心之臣乃交私諸侯如此弗誅後不可治上可論之師古曰可湯所奏而論决之其治獄所巧排大臣自}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 為功多此類繇是益尊任師古曰繇讀與由同遷御史大夫㑹渾邪等降漢大興兵伐匃奴山東水旱貧民流徙皆卬給縣官師古曰卬音牛向反縣官空虛湯承上指請造白金及五銖錢籠天下鹽鐵師古曰籠羅其事皆令利入官排富商大賈出告緍令鉏豪彊并兼之家舞文巧詆以輔法師古曰輔助也以巧詆助法言}
