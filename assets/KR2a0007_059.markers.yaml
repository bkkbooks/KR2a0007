  - {type: variant, offset: 255, length: 4, content: 臨眾處官, WYG: 妄殺其親屬輙亡入放第不得幸得勿治放行輕薄連犯大惡有感動隂陽之咎為臣不忠首師古曰不忠之罪放為首罪名雖顯前蒙恩驕逸悖理師古曰悖乖也音布内反與背畔無異臣子之惡莫大於是不宜宿衛在位臣請免放歸國以銷衆邪之萌厭海内之心師古曰萌始生者也厭滿也音一艷反上不得巳師古曰已止也左遷放為北地都尉數月復徴入侍中太后以放為言出放為天水屬國都尉永始元延間比年日蝕師古曰比頻也故久不還放璽書勞問不絶居歳餘徴放歸第視母公主疾數月主有瘳出放為河東都尉上雖愛放然上迫太后下用大臣故常涕泣而遣之後復徴放為侍中光禄大夫秩中二千石歳餘丞相方進復奏放上不得巳免放賜錢五百萬遣就國數月成帝崩放思慕哭泣而死初安世長子千秋與霍光子禹俱為中郎将将兵隨度遼将軍范明友撃烏桓還謁大将軍光問千秋戰鬬方略山川形埶千秋口對兵事畫地成圖無所忘失光復問禹禹}
