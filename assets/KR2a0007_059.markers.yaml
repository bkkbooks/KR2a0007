  - {type: variant, offset: 238, length: 0, content: '', krp: 右將軍光禄勲安世輔政宿衛肅敬不怠十有三年咸以康寜夫親親任賢唐虞之道也其封安世為富平侯明年昭帝崩未葬大將軍光白太后徙安世為車騎將軍與共徴立昌邑王王行滛亂光復與安世謀廢王尊立宣帝帝初即位襃賞大臣下詔曰夫襃有徳賞有功古今之通義也車騎將軍光禄勲富平侯安世宿衛忠正宣徳明恩勤勞國家守職秉義以安宗廟其益封萬六百戸功次大將軍光安世子千秋延夀彭祖皆中郎将侍中大将軍光薨後數月御史大夫魏相上封事曰聖王襃有徳以懐萬方師古曰懐來也顯有功以勸百寮是以朝廷尊榮天下鄉風師古曰鄉讀曰嚮國家承祖宗之業制諸侯之重新失大将軍宜宣章盛徳以示天下顯明功臣以填藩國師古曰填音竹刄反毋空大位以塞爭權師古曰大臣位空則起爭奪之權也所以安社稷絶未萌也師古曰未萌謂變故未生者也車騎将軍安世事孝武皇帝三十餘年忠信謹厚勤勞政事夙夜不怠與大将軍定策天下受其福國家重臣也宜尊其位以為大将軍毋令領光禄勲事使專精神憂念天下思惟得失安世子延夀重厚可以為光禄勲領宿衛臣上亦欲用之安世聞指懼不敢當請間求見免冠頓首曰老臣耳妄聞言之為先事不言情不逹師古曰事未施行而遽言之故曰先事也誠自量不足以居大位繼大將軍後唯天子財哀以全老臣之命師古曰財與裁同上笑曰君言泰謙君而不可尚誰可者師古曰言君尚不可更誰可也安世深辭弗能得後數日竟拜為大司馬車騎將軍領尚書事數月罷車騎將軍屯兵更為衛將軍兩宫衛尉城門北軍兵屬焉時霍光子禹為右將軍上亦以禹為大司馬罷其右將軍屯兵以虛尊加之而實奪其衆後歳餘禹謀反夷宗族安世素小心畏忌已内憂矣師古曰忌者戒盈滿之禍其女孫敬為霍氏外屬婦師古曰女孫即今所謂孫女也當相坐安世瘦懼形於顔色師古曰形見也上怪而憐之以問左右乃赦敬以慰其意安世􅐛恐師古曰􅐛益也職典樞機以謹慎周密自著外内無間師古曰著明也間隙也毎定大政已决輙移病出師古曰移病謂移書言病也一曰以病而移居聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也師古曰與讀曰豫嘗有所薦其人來謝安世大恨以為舉賢逹能豈有私謝邪絶弗復為通師古曰有欲謝者皆不通也一曰告此人而絶之更不與相見也宋祁曰南夲浙本並云豈有私邪謝絶勿復為通有郎功髙不調師古曰調選也音徒釣反自言安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷師古曰安世外陽距之而實令其遷莫府長史遷辭去之官安世問以過失師古曰問已有何失長史曰將軍為明主股肱而士無所進論者以為譏安世曰明主在上賢不肖較然師古曰較明貎臣下自修而已何知士而薦之其欲匿名迹逺權埶如此師古曰逺離也音于萬反為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪師古曰反讀曰翻如何以小過成罪郎滛官婢婢兄自言安世曰奴以恚怒誣汙衣冠告署適奴師古曰適讀曰讁其隱人過失皆此類也安世自見父子尊顯懐不自安為子延壽求出補吏}
