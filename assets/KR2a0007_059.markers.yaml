  - {type: variant, offset: 48, length: 1, content: 多, WYG: 之官故呼為生也山曰不能曰居一縣曰不能復曰居一鄣間師古曰鄣謂塞上要險之處别築為城因置吏士而為鄣蔽以捍㓂也鄣音之向反山自度辯窮且下吏師古曰度計也見詰自辯而辭窮當下吏也曰能廼遣山乗鄣師古曰乗登也登而守之至月餘匈奴斬山頭而去是後羣臣震讋師古曰震動也讋失氣也讋音之渉反湯客田甲雖賈人有賢操師古曰操謂所執持之志行也操音千到反始湯為小吏與錢通師古曰為小吏之時與田甲為錢財之交及為大吏而甲所責湯行義有烈士之風湯為御史大夫七歳敗河東人李文故嘗與湯有隙已而為御史中丞薦數從中文事有可以傷湯者不能為地服䖍曰薦藉也文與湯故有隙已而為御史中丞藉已在内臺中文書有可用傷湯者因㑹致之不能為湯作道地蘓林曰薦仍也師古曰薦數義同蘓說是也數數在中其有文書事可用傷湯者不為作道地也薦音在見反數音所角反大雅雲漢之詩曰饑饉薦臻字亦如此劉奉世曰薦數猶言簡閲數音色主反薦如字其訓舉計數從中文事也太史公作悉數從中文書蓋其時文盡閲數從中所下文書或受詔如此其間事有可以傷湯者文以前隙亦不能與之為地然文似本無意造事中之也湯有所愛史魯謁居知湯弗平使人上飛變告文姦事師古曰飛變猶言急變也劉奉世曰飛變謂如飛語無姓名上變者故上問從迹安起而湯云殆文故人也事下湯湯治論殺文而湯心知謁居為之上問變事從迹安起師古曰從讀曰蹤湯陽驚曰此殆文故人怨之師古曰殆近也謁居病卧閭里主人湯自徃視病為謁居摩足趙國以冶鑄為業王數訟鐵官事湯常排趙王趙王求湯隂事謁居嘗案趙王趙王怨之并}
