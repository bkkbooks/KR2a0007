  - {type: variant, offset: 42, length: 1, content: 次, krp: 公平也湯每朝奏事語國家用日旰師古曰旰晚也論事既多至於日晚旰音幹劉攽曰日旰當屬下句天子忘食丞相取充位師古曰但充其位而已無所造設也天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁師古曰並且也劉奉世曰並音歩浪反旁緣為姦也於是痛繩以辠自公卿以下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此宋祁曰南本浙本其字下並有病字匈奴求和親羣臣議前師古曰於上前議也博士狄山曰和親便上問其便山曰兵凶器未易數動師古曰言難可屢動髙帝欲伐匈奴大困平城乃遂結和親孝惠髙后時天下安樂及文帝欲事匈奴北邊蕭然苦兵師古曰蕭然猶騷然擾動}
  - {type: variant, offset: 44, length: 3, content: 位四方, WYG: 貌孝景時吳楚七國反景帝徃来東宫間師古曰謂諮謀於太后也天下寒心數月師古曰懼於兵難也吳楚已破竟景帝不言兵師古曰訖景帝之身更不議征伐之事天下富實今自陛下興兵擊匈奴中國以空虛邊大困貧由是觀之不如和親上問湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠湯之治淮南江都以深文痛詆諸侯别疏骨肉使藩臣不自安臣固知湯之詐忠宋祁曰浙本此句詐字上有為字於是上作色曰吾使生居一郡能無使虜入盗乎師古曰博}
