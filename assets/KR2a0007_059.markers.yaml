  - {type: variant, offset: 76, length: 0, content: '', krp: 瘞埋也埋錢於園陵以送死也丞相青翟朝與湯約俱謝師古曰將入朝之時為此要約至前師古曰至天子之前湯念獨丞相以四時行園當謝湯無與也不謝師古曰行音下更反與讀曰豫無與謂不干其事也丞相謝上使御史案其事湯欲致其文丞相見知張晏曰見知故縱以其罪罪之也丞相患之三長史皆害湯欲陷之師古曰百官表丞相有兩長史今此云三者盖以守者非正貟也始長史朱買}
  - {type: variant, offset: 77, length: 2, content: 朔少, WYG: 素怨湯語在其傳王朝齊人以術至右内史邊通學短長應劭曰短長術興於六國時長短其語隱謬用相激怒也張晏曰蘓秦張儀之謀趣彼為短歸此為長戰國策名短長術也剛暴人也官至濟南相故皆居湯右師古曰言舊在湯上已而}
  - {type: variant, offset: 77, length: 2, content: 朔少, krp: 素怨湯語在其傳王朝齊人以術至右内史邊通學短長應劭曰短長術興於六國時長短其語隱謬用相激怒也張晏曰蘓秦張儀之謀趣彼為短歸此為長戰國策名短長術也剛暴人也官至濟南相故皆居湯右師古曰言舊在湯上已而}
  - {type: variant, offset: 80, length: 1, content: 父, WYG: 官守長史詘體於湯師古曰謂拜伏也湯數行丞相事知此三長史素貴常陵折之故三長史合謀曰始湯約與君謝已而賣君今欲劾君以宗廟事此欲代君耳吾知湯隂事使吏捕案湯左田信等李竒曰左證左也師古曰謂之左者言除罪人正身之外又取其左右者考問也曰湯且欲為請奏信輙先知之居物致富與湯分之服䖍曰居謂儲也及他姦事事辭頗聞師古曰聞於天子也上問湯曰吾所為賈人輙知益居其物師古曰益多也是類有以吾謀告之者師古曰類似也湯不謝又陽驚曰固宜有减宣亦奏謁居事上以湯懐詐面欺師古曰對面欺誣也使使八輩簿責湯蘓林曰簿音主簿之簿簿悉責也師古曰以文簿次第一一責之湯具自道無此不服於是上使趙禹責湯禹至讓湯曰師古曰讓亦責也君何不知分也師古曰分音扶問反君所治夷滅者幾何人矣師古曰幾音居起反今人言君皆有狀宋祁曰南本今字下有之字天子重致君獄師古曰重猶難也欲令君自為計師古曰言引決也何多以對為師古曰言何用多對湯廼為書謝曰湯無尺寸之功起刀筆吏陛下幸致三公宋祁曰越本作致位三公無以塞責師古曰塞當也然謀陷湯者三長史也遂自殺湯死家産直不過五百金皆所得奉賜師古曰奉音扶用反無它贏師古曰贏餘也昆弟諸子欲厚葬湯湯}
