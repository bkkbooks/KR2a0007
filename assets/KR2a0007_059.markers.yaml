  - {type: variant, offset: 28, length: 1, content: 舉, WYG: 名士大夫已心内雖不合然陽浮道與之師古曰陽以道義為交非其中心故云浮也是時上}
  - {type: variant, offset: 28, length: 1, content: 舉, krp: 名士大夫已心内雖不合然陽浮道與之師古曰陽以道義為交非其中心故云浮也是時上}
  - {type: variant, offset: 30, length: 3, content: 正賢良, WYG: 鄉}
  - {type: variant, offset: 30, length: 3, content: 正賢良, krp: 鄉}
  - {type: variant, offset: 35, length: 2, content: 材力, WYG: 師古曰鄉讀曰嚮湯决大獄欲傅古義師古曰傅讀曰附乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑李竒曰亭亦平也師古曰亭均也調也言平均疑法及為讞疑奏之宋祁曰浙本疑字下有事字必奏先為上分别其原上所是受而著讞法廷尉挈令韋昭曰在板挈也師古曰著謂明書之也挈獄訟之要也書於讞法挈令以為後式也挈音口計反揚主之明師古曰言此自天子之意非由臣下有司奏事即譴湯摧謝蘇林曰深自挫按也師古曰若上有責即摧折而謝也鄉上意所便師古曰謂如天子責湯之指而言其端也鄉讀曰嚮必引正監掾史賢者曰固為臣議如此師古曰如上之意上責臣臣弗用愚抵此蘓林曰坐不用諸掾語故至於此劉敞曰上責臣此衍字耳妄斷之罪常釋臣瓚曰謂常見原也間即奏事上善之曰臣非知為此奏乃監掾史某所為師古曰間謂非當朝奏者其欲薦吏揚人之善觧人之過如此所治即上意所欲辠予監吏深刻者即上意所欲釋予監吏輕平者劉攽曰吏皆當作史所治即豪必舞文巧詆師古曰詆誣也音丁禮反即下户羸弱時口言雖文致法上裁察於是徃徃釋湯所言李竒曰先見上口言之欲與輕平故皆見原釋也如淳曰雖文書按察致下戶之罪湯以先口觧之矣上以湯言輙裁察之輕其罪也師古曰李如二說皆非也此言下戸羸弱湯欲佐助雖具文奏之而又口奏言雖律令之文合致此罪聽上裁察盖為此人希恩宥也於是上得湯言徃徃釋其人辠非未奏之前口豫言也宋祁曰注文希字下當添幸字湯至於大吏内行脩交通賔客飲食於故人子弟為吏及貧昆弟調䕶之尤厚師古曰調和適之令得其所也䕶謂保佑也其造請諸公不避寒暑師古曰造至詣也請謁問也造音七到反是以湯雖文深意忌不專平然得此聲譽而深刻吏多為爪牙用者依於文學}
