  - {type: variant, offset: 25, length: 1, content: 徵, WYG: 豫作陵諱之故言方中或言斥土如淳曰漢注陵方中用地一頃深十二丈師古曰蘓說非也古謂掘地為阬曰方今荆楚俗土功築作筭程課者猶以方計之非謂避諱也武安侯為丞相師古曰田蚡徴湯為史薦補侍御史治陳皇后巫蠱獄深竟黨與上以為能遷太中大夫與趙禹共定諸律令務在深文拘守職之吏蘓林曰拘刻於守職之吏已而禹至少府湯為廷尉兩人交驩兄事禹師古曰事之如兄禹志在奉公孤立而湯舞知以御人師古曰舞弄其智制御它人也始為小吏乾没與長安富賈田甲魚翁叔之屬交私服䖍曰乾没射成敗也如淳曰豫居物以待之得利為乾失利為沒師古曰乾音干及列九卿收接}
  - {type: page-break, offset: 25, content: '', id: KR2a0007_WYG_059-2b, image: WYG0250/WYG0250-0307d.png}
