  - {type: variant, offset: 1722, length: 1865, content: 畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省是日因奏泰階之事上乃拜朔為太中大夫給事中賜其金百斤然遂起上林苑如壽王所奏云久之隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢千萬為昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅獄繫內官以公主子廷尉上請請論左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我於是為之垂涕歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入高廟乎又下負萬民乃可其奏哀不能自止左右盡悲朔前上壽曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之內元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歲壽上乃起入省中夕時召讓朔曰傳曰時然後言人不厭其言今先生上壽時乎朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則陰損陰陽變則心氣動心氣動則精神散精神散而邪氣及銷憂者莫若酒臣朔所以上壽者明陛下正而不阿因以止哀也愚不知忌諱當死先是朔嘗醉入殿中小遺殿上劾不敬有詔免為庶人待詔宦者署因此對復為中郎賜帛百匹初帝姑館陶公主號竇太主堂邑侯陳午尚之午死主寡居年五十餘矣近幸董偃始偃與母以賣珠為事偃年十三隨母出入主家左右言其姣好主召見曰吾為母養之因留第中教書計相馬御射頗讀傳記至年十八而冠出則執轡入則侍內為人溫柔愛人以主故諸公接之名稱城中號曰董君主因推令散財交士令中府曰董君所發一日金漢百斤錢漢百萬帛滿千匹乃白之安陵爰叔者爰盎兄子也與偃善謂偃曰足下私侍漢主挾不測之罪將欲安處乎偃懼曰憂之久矣不知所以爰叔曰顧城廟遠無宿宮又有萩竹籍田足下何不白主獻長門園此上所欲也如是上知計出於足下也則安枕而臥長無慘怛之憂久之不然上且請之於足下何如偃頓首曰敬奉教入言之主主立奏書獻之上大說更名竇太主園為長門宮主大喜使偃以黃金百斤為爰叔壽叔因是為董君畫求見上之策令主稱疾不朝上往臨疾問所欲主辭謝曰妾幸蒙陛下厚恩先帝遺德奉朝請之禮備臣妾之儀列為公主賞賜邑入隆天重地死無以塞責一日卒有不勝酒掃之職先狗馬填溝壑竊有所恨不勝大願願陛下時忘萬事養精游神從中掖庭回輿枉路臨妾山林得獻觴上壽娛樂左右如是而死何恨之有上曰主何憂幸得愈恐群臣從官多大為主費上還有頃主疾愈起謁上以錢千萬從主飲後數日上臨山林主自執宰敝膝道入登階就坐坐未定上曰願謁主人翁主乃下殿去簪珥徒跣頓首謝曰妾無狀負陛下身當伏誅陛下不致之法頓首死罪有詔謝主簪履起之東箱自引董君董君綠幘傅韝隨主前伏殿下主乃贊館陶公主胞人臣偃昧死再拜謁因叩頭謝上為之起有詔賜衣冠上偃起走就衣冠主自奉食進觴當是時董君見尊不名稱為主人翁飲大驩樂主乃請賜將軍列侯從官金錢雜繒各有數於是董君貴寵天下莫不聞郡國狗馬蹴鞠劍客輻湊董氏常從游戲北宮馳逐平樂觀雞鞠之會角狗馬之足上大歡樂之於是上為竇太主置酒宣室使謁者引內董君是時朔陛戟殿下辟戟而前曰董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋方積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪枉之道徑淫辟之路是乃國家之大賊人主之大蜮偃為淫首其罪三也昔伯姬燔而諸侯憚奈何乎陛下上默然不應良久曰吾業以設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以豎貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宮引董君從東司馬門東司馬門更名東交門賜朔黃金三十斤董君之寵由是日衰至年三十而終後數歲竇太主卒與董君會葬於霸陵是後公主貴人多踰禮制自董偃始時天下侈靡趨末百姓多離農畝上從容問朔吾欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經歷數千載尚難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劍莞蒲為席兵木無刃衣縕無文集上書囊以為殿帷以道德為麗以仁義為準於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳳闕右神明號稱千門萬戶木土衣綺繡狗馬被繢罽宮人簪玳瑁垂珠璣設戲車教馳逐飾文采樷珍怪撞萬石之鐘擊雷霆之鼓作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣朔之計推甲乙之帳燔之於四通之衢卻走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之豪氂差以千里願陛下留意察之朔雖詼笑然時觀察頻色直言切諫上常用之自公卿在位朔皆敖弄無所為屈上以朔口諧辭給好作問之嘗問朔曰先生視朕何如主也朔對曰自唐虞之隆成康之際未足以諭當世臣伏觀陛下功德陳五帝之上在三王之右非若此而已誠得天下賢士公卿在位咸得其人矣譬若以周邵, WYG: ''}
