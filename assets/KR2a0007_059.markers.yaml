  - {type: variant, offset: 242, length: 0, content: '', krp: 太僕初安世兄賀幸於衛太子太子敗賔客皆誅安世為賀上書得下蠶室師古曰謂腐刑也凡養蠶者欲其温而早成故為密室蓄火以置之而新腐刑亦有中風之患須入密室乃得以全因呼為蠶室耳後為掖庭令而宣帝以皇曾孫收養掖庭賀内傷太子}
  - {type: variant, offset: 243, length: 1, content: 益, WYG: 辜而曽孫孤幼所以視養拊循恩甚密焉及曽孫壯大賀教書令受詩為取許妃以家財聘之曽孫數有徴怪師古曰徴證也語在宣紀賀聞知為安世道之稱其材美安世輙絶止以為少主在上不宜稱述曽孫及宣帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冢為恩徳侯置守冢二百家師古曰身死追封故云封冢也賀有一子蚤死無子師古曰蚤古早字子安世小男彭祖師古曰言養以為子彭祖又小與上同席研書指欲封之先賜爵闗内侯故安世深辭賀封又求損守冢戸數稍减至三十戸上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里師古曰處安也音昌汝反居冢西鬬雞翁舍南上少時所嘗游處也明年復下詔曰朕微眇時故掖庭令張賀輔道朕躬師古曰道讀曰導修文學經術恩惠卓異厥功茂焉詩云無言不讎無徳不報師古曰大雅抑之詩其封賀弟子侍中闗内侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七歳拜為散騎中郎將賜爵關内侯食邑三百戸安世以父子封侯在位太盛乃辭禄宋祁曰浙本作辭禄不受詔都内别臧張氏無名錢以百萬數文頴曰都内主臧官也張晏曰安世以還官官不簿也安世尊為公侯食邑萬戸然身衣弋綈師古曰弋黒色也綈厚繒也夫人自紡績家童七百人皆有手技作事内治産業累積纎微是以能殖其貨師古曰殖生也富}
