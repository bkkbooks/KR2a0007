  - {type: variant, offset: 41, length: 0, content: '', krp: 為功多此類繇是益尊任師古曰繇讀與由同遷御史大夫㑹渾邪等降漢大興兵伐匃奴山東水旱貧民流徙皆卬給縣官師古曰卬音牛向反縣官空虛湯承上指請造白金及五銖錢籠天下鹽鐵師古曰籠羅其事皆令利入官排富商大賈出告緍令鉏豪彊并兼之家舞文巧詆以輔法師古曰輔助也以巧詆助法言}
  - {type: variant, offset: 42, length: 1, content: 次, WYG: 公平也湯每朝奏事語國家用日旰師古曰旰晚也論事既多至於日晚旰音幹劉攽曰日旰當屬下句天子忘食丞相取充位師古曰但充其位而已無所造設也天下事皆決湯百姓不安其生騷動縣官所興未獲其利姦吏並侵漁師古曰並且也劉奉世曰並音歩浪反旁緣為姦也於是痛繩以辠自公卿以下至於庶人咸指湯湯嘗病上自至舍視其隆貴如此宋祁曰南本浙本其字下並有病字匈奴求和親羣臣議前師古曰於上前議也博士狄山曰和親便上問其便山曰兵凶器未易數動師古曰言難可屢動髙帝欲伐匈奴大困平城乃遂結和親孝惠髙后時天下安樂及文帝欲事匈奴北邊蕭然苦兵師古曰蕭然猶騷然擾動}
