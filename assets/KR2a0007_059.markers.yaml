  - {type: variant, offset: 447, length: 212, content: 中朔自贊曰臣嘗受易請射之乃別蓍布卦而對曰臣以為龍又無角謂之為虵又有足跂跂脈脈善緣壁是非守宮即蜥蜴上曰善賜帛十匹復使射他物連中輒賜帛時有幸倡郭舍人滑稽不窮常侍左右曰朔狂幸中耳非至數也臣願令朔復射朔中之臣榜百不能中臣賜帛乃覆樹上寄生令朔射之朔曰是寠藪也舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為寠數上令倡監榜舍人舍人不勝痛呼謈朔笑之曰咄口無毛聲謷謷尻益高舍人恚曰朔擅詆歎天子從官當棄市上問朔何故詆之對曰臣非敢詆之乃, WYG: 屬文博通强記}
