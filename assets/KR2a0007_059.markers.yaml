  - {type: variant, offset: 3947, length: 1652, content: 朔嘗至太中大夫後常為郎與枚皋郭舍人俱在左右詼啁而已久之朔上書陳農戰彊國之計因自訟獨不得大官欲求試用其言專商鞅韓非之語也指意放蕩頗復詼諧辭數萬言終不見用朔因著論設客難己用位卑以自慰諭其辭曰客難東方朔曰蘇秦張儀一當萬乘之主而都卿相之位澤及後世今子大夫修先王之術慕聖人之義諷誦詩書百家之言不可勝數著於竹帛脣腐齒落服膺而不釋好學樂道之效明白甚矣自以智能海內無雙則可謂博聞辯智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執戟意者尚有遺行邪同胞之徒無所容居其故何也東方先生喟然長息仰而應之曰是固非子之所能備也彼一時也此一時也豈可同哉夫蘇秦張儀之時周室大壞諸侯不朝力政爭權相禽以兵并為十二國未有雌雄得士者彊失士者亡敨談說行焉身處尊位珍寶充內外有廩倉澤及後世子孫長享今則不然聖帝流德天下震懾諸侯賓服連四海之外以為帶安於覆盂動猶運之掌賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲人上抑之則在深泉之下用之則為虎不用則為鼠雖欲盡節效情安知前後夫天地之大士民之眾竭精談說並進輻湊者不可勝數悉力募之困於衣食或失門戶使蘇秦張儀與僕並生於今之世曾不得掌故安敢望常侍郎乎故曰時異事異雖然安可以不務修身乎哉詩云鼓鐘于宮聲聞于外鶴鳴于九皋聲聞于天苟能修身何患不榮太公體行仁義七十有二乃設用於文武得信厥說封於齊七百歲而不絕此士所以日夜孳孳敏行而不敢怠也辟若䳭鴒飛且鳴矣傳曰天不為人之惡寒而輟其冬地不為人之惡險而輟其廣君子不為小人之匈匈而易其行天有常度地有常形君子有常行君子道其常小人計其功詩云禮義之不愆何恤人之言故曰水至清則無魚人至察則無徒冕而前旒所以蔽明黈纊充耳所以塞聰明有所不見聰有所不聞舉大德赦小過無求備於一人之義也枉而直之使自得之優而柔之使自求之揆而度之使自索之蓋聖人教化如此欲自得之自得之則敏且廣矣今世之處士魁然無徒廓然獨居上觀許由下察接輿計同范蠡忠合子胥天下和平與義相扶寡耦少徒固其宜也子何疑於我哉若夫燕之用樂毅秦之任李斯酈食其之下齊說行如流曲從如環所欲必得功若丘山海內定國家安是遇其時也子又何怪之邪語曰以筦闚天以蠡測海以莛撞鐘豈能通其條貫考其文理發其音聲哉繇是觀之譬猶鼱鼩之襲狗孤豚之咋虎至則靡耳何功之有今以下愚而非處士雖欲勿困固不得已此適足以明其不知權變而終或於大道也又設非有先生之論其辭曰非有先生仕於吳進不稱往古以厲主意退不能揚君美以顯其功默然無言者三年矣吳王怪而問之曰寡人獲先人之功寄於眾賢之上夙興夜寐未嘗敢怠也今先生率然高舉遠集吳地將以輔治寡人誠竊嘉之體不安席食不甘味目不視靡曼之色耳不聽鐘鼓之音虛心定志欲聞流議者三年于茲矣今先生進無以輔治退不揚主譽竊不為先生取之也蓋懷能而不見是不忠也見而不行主不明也意者寡人殆不明乎非有先生伏而唯唯吳王曰可以談矣寡人將竦意而覽焉先生曰於戲可乎哉可乎哉談何容易夫談有悖於目拂於耳謬於心而便於身者或有說於目順於耳快於心而毀於行者非有明王聖主孰能聽之吳王曰何為其然也中人已上可以語上也先生試言寡人將聽焉先生對曰昔者關龍逢深諫於桀而王子比干直言於紂此二臣者皆極慮盡忠閔王澤不下流而萬民騷動故直言其失切諫其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行無人臣之禮果紛然傷於身蒙不辜之名戮及先人為天下笑故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及蜚廉惡來革等二人皆詐偽巧言利口以進其身陰奉琱瑑刻鏤之好以納其心務快耳目之欲以苟容為度遂往不戒身沒被戮宗廟崩阤國家為虛放戮聖賢親近讒夫詩不云乎讒人罔極交亂四國此之謂也故卑身賤體說色微辭愉愉咰咰終無益於主上之治則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂主之邪下以損百姓之害則忤於邪主之心歷於衰世之法故養壽命之士莫肯進也遂居深山之間積土為室編蓬為戶彈琴其中以詠先王之風亦可以樂而忘死矣是以伯夷叔齊避周餓于首陽之下後世稱其仁如是邪主之行固足畏也故曰談何容易於是吳王懼然易容捐薦去几危坐而聽先生曰接輿避世箕子被髮陽狂此二人者皆避濁世以全其身者也使遇明王聖主得清燕之閒寬和之色發憤畢誠圖畫安危揆度得失上, WYG: ''}
