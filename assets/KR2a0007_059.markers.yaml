  - {type: variant, offset: 5610, length: 687, content: 帝三王之道可幾而見也故伊尹蒙恥辱負鼎俎和五味以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從誠得其君也深念遠慮引義以正其身推恩以廣其下本仁祖義襃有德祿賢能誅惡亂總遠方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽遠方懷之故號聖王臣子之職既加矣於是裂地定封爵為公侯傳國子孫名顯後世民到于今稱之以遇湯與文王也太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易於是吳王穆然俛而深惟仰而泣下交頤曰嗟乎余國之不亡也緜緜連連殆哉世之不絕也於是正明堂之朝齊君臣之位舉賢材布德惠施仁義賞有功躬節儉減後宮之費損車馬之用放鄭聲遠佞人省庖廚去侈靡卑宮館壞苑囿填池塹以予貧民無產業者開內藏振貧窮存耆老卹孤獨薄賦斂省刑辟行此三年海內晏然天下大洽陰陽和調萬物咸得其宜國無災害之變民無飢寒之色家給人足畜積有餘囹圄空虛鳳凰來集麒麟在郊甘露既降朱草萌牙遠方異俗之人鄉風慕義各奉其職而來朝賀故治亂之道存亡之端若此易見而君人者莫肯為也臣愚竊以為過故詩云王國克生惟周之楨濟濟多士文王以寧此之謂也朔之文辭此二篇最善其餘有封泰山責和氏璧及皇太子生禖屏風殿上柏柱平樂觀賦獵八言七言上下從公孫弘借車凡劉向所錄朔書具是矣世所傳他事皆非也贊曰劉向言少時數問長老賢人通於事及朔時者皆曰朔口諧倡辯不能持論喜為庸人誦說故令後世多傳聞者而楊雄亦以為朔言不純師行不純德其流風遺書蔑如也然朔名過實者以其詼達多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢其滑稽之雄乎朔之詼諧逢占射覆其事浮淺行於眾庶童兒牧豎莫不眩燿而後世好事者因取奇言怪語附著之朔故詳錄焉, WYG: 十九考證}
