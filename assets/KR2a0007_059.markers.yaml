  - {type: variant, offset: 243, length: 1, content: 益, krp: 辜而曽孫孤幼所以視養拊循恩甚密焉及曽孫壯大賀教書令受詩為取許妃以家財聘之曽孫數有徴怪師古曰徴證也語在宣紀賀聞知為安世道之稱其材美安世輙絶止以為少主在上不宜稱述曽孫及宣帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冢為恩徳侯置守冢二百家師古曰身死追封故云封冢也賀有一子蚤死無子師古曰蚤古早字子安世小男彭祖師古曰言養以為子彭祖又小與上同席研書指欲封之先賜爵闗内侯故安世深辭賀封又求損守冢戸數稍减至三十戸上曰吾自為掖庭令非為將軍也安世乃止不敢復言遂下詔曰其為故掖庭令張賀置守冢三十家上自處置其里師古曰處安也音昌汝反居冢西鬬雞翁舍南上少時所嘗游處也明年復下詔曰朕微眇時故掖庭令張賀輔道朕躬師古曰道讀曰導修文學經術恩惠卓異厥功茂焉詩云無言不讎無徳不報師古曰大雅抑之詩其封賀弟子侍中闗内侯彭祖為陽都侯賜賀諡曰陽都哀侯時賀有孤孫霸年七歳拜為散騎中郎將賜爵關内侯食邑三百戸安世以父子封侯在位太盛乃辭禄宋祁曰浙本作辭禄不受詔都内别臧張氏無名錢以百萬數文頴曰都内主臧官也張晏曰安世以還官官不簿也安世尊為公侯食邑萬戸然身衣弋綈師古曰弋黒色也綈厚繒也夫人自紡績家童七百人皆有手技作事内治産業累積纎微是以能殖其貨師古曰殖生也富}
  - {type: variant, offset: 245, length: 0, content: '', WYG: 大將軍光天子甚尊憚大將軍然内親安世心密於光焉元康四年春安世病上疏歸侯乞骸骨天子報曰將軍年老被病朕甚閔之雖不能視事折衝萬里君先帝大臣明於治亂朕所不及得數問焉師古曰言意所不及者即以問君也何感而上書歸衛将軍富平侯印師古曰感恨也音胡闇反薄朕忘故蘓林曰本望君重於此也師古曰蘓說非也薄猶嫌也君意嫌朕遺忘故舊而求去也非所望也願将軍彊餐食近醫藥專精神以輔天年安世復强起視事至秋薨天子贈印綬送以輕車介士師古曰輕車古之戰車續漢書云彫朱輪輿不巾不盖菑矛㦸幢也麾􅕈弩介士謂甲士也菑挿也􅕈皮篋盛弩也菑音側事反􅕈音服宋祁曰注文幢也别本浙本並無也字諡曰敬侯賜塋杜東師古曰塋冢地也将作穿復土起冢祠堂子延夀嗣延夀巳歴位九卿既嗣侯國在陳留别邑在魏郡租入歳千餘萬延夀自以身無功徳何以能久堪先人大國數上書讓減戸邑又因弟陽都侯彭祖口陳至誠天子以為有讓廼徙封平原并一國戸口如故而租稅减半薨諡曰愛侯子勃嗣為散騎諫大夫元帝初即位詔列侯舉茂材勃舉太官獻丞陳湯蘓林曰獻丞主貢獻物也湯有罪勃坐削戸二百㑹薨故賜諡曰繆侯師古曰以其所舉不得人故加惡諡繆者妄也後湯立功西域世以勃為知人子臨嗣臨亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚哉師古曰桑桑宏羊也霍霍禹也言以驕奢致禍也且死分施宗族故舊師古曰言将死之時多以財分施也薄葬不起墳臨尚敬武公主文頴曰成帝姊也臣瓚曰敬武公主是元帝姊也師古曰二說皆非也薛宣傳云主怒曰嫂何以取妹殺之既謂元后為嫂是則元帝妹也薨子放嗣鴻嘉中上欲遵武帝故事與近臣游宴放以公主子開敏得幸放取皇后弟平恩侯許嘉女上為放供張師古曰供音居用反張音竹亮反賜甲第充以乘輿服飾號為天子取婦皇后嫁女大官私官並供其第服䖍曰私官皇后之官也兩宫使者冠蓋不絶賞賜以千萬數放為侍中中郎将監平樂屯兵置莫府儀比将軍與上卧起寵愛殊絶常從為微行出游北至甘泉南至長楊五莋師古曰莋與柞同鬬雞走馬長安中積數年是時上諸舅皆害其寵白太后太后以上春秋富動作不節甚以過放師古曰以放為罪過時數有災異議者歸咎放等於是丞相宣御史大夫方進師古曰薛宣翟方進奏放驕蹇縱恣奢滛不制前侍御史修等四人奉使至放家逐名捕賊劉徳曰謂詔捕罪人有名者也時放見在奴從者閉門設兵弩射吏距使者不肯内知男子李游君欲獻女使樂府音監景武强求不得孟康曰音監監主樂人也姓景名武使奴康等之其家賊傷三人又以}
