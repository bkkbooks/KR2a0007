  - {type: variant, offset: 76, length: 0, content: '', WYG: 瘞埋也埋錢於園陵以送死也丞相青翟朝與湯約俱謝師古曰將入朝之時為此要約至前師古曰至天子之前湯念獨丞相以四時行園當謝湯無與也不謝師古曰行音下更反與讀曰豫無與謂不干其事也丞相謝上使御史案其事湯欲致其文丞相見知張晏曰見知故縱以其罪罪之也丞相患之三長史皆害湯欲陷之師古曰百官表丞相有兩長史今此云三者盖以守者非正貟也始長史朱買}
