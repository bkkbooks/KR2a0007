  - {type: variant, offset: 2640, length: 0, content: '', WYG: 故定陶太后造稱􅆫號甚悖義理師古曰悖􅆾也音布内反關内侯師丹端誠於國不顧患難執忠節據聖法分明尊卑之制確然有柱石之固臨大節而不可奪可謂社稷之臣矣有司條奏邪臣建定稱號者已放退而丹功賞未加殆繆乎先賞後罸之義非以章有德報厥功也其以厚丘之中鄉户二千一百封丹為義陽侯月餘薨諡曰節侯子業嗣王莽敗廼絶贊曰何武之舉王嘉之爭師丹之議師古曰何武舉公孫祿為大司馬王嘉争益董賢封邑師丹議丁傅不宜稱尊號考其祸福乃效于後師古曰終以王莽篡位董賢遇祸丁傅䘮敗當王莽之作外内咸服董賢之愛疑於親戚師古曰疑讀曰擬擬比也武嘉區區以一蕢障江河用沒其身師古曰蕢織草為器所以盛土也一蕢之土固不能障塞江河是以其身沉没也蕢音匱丹與董宏更受賞罸師古曰更互也宏初建議尊號為丹所劾而免爵土及丹廢黜宏復𫉬封至王莽執政宏為庻人丹受國邑故云互受賞罸也更音工衡反哀哉故曰依世則廢道違俗則危殆師古曰言随時曲直則廢於正道違忤流俗則其身不安也此古人所以難受爵位者也前漢書卷八十六前漢書卷八十六考證王嘉傳察㢘為南陵丞注師古曰南陵縣名屬宣城臣召南按此注誤劉攽謂漢無南陵縣亦非也南陵屬京兆尹因薄太后陵得名地理志甚眀至宣城非漢郡則宋祁已言之矣武帝擢韓安國于徒中胡三省曰按韓安國傳坐法抵罪㑹梁内史缺漢使使拜安國為梁内史起徒中為二千石此景帝時事也武帝當作景帝亡敖佚欲有國按尚書作毋教佚欲有邦此所引伏生今文也邦字當以避髙帝諱作國注宋祁曰晋文帝謂丞相云云臣召南按此指簡文帝也刋夲脱簡字耳師丹傳皇后尊號未定豫封父為孔鄉侯臣召南按哀帝紀帝以四月即位五月丙戌立皇后傅氏封后父傅晏為孔鄉侯則封后父時后已正位中宫矣以外戚恩澤侯表核之陽安侯丁明及晏俱以四月壬寅封在丙戌立后之前四十四日與此傳正合盖帝紀係史文類叙不如表為確實也郎中令泠褒劉敞曰按是時無郎中令胡三省曰令字衍文也贊武嘉區區以一蕢障江河云云黄震曰班氏説未然也武嘉以剛正之資居大臣之位茍得中主而事之去董賢如殺狐􅇠耳何江河一蕢之足云師丹引經義開陳婉切彼董宏何人而以較勝負也賞罸何足計哉君子惟論是非耳前漢書卷八十六考證}
