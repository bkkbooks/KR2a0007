  - {type: variant, offset: 1698, length: 457, content: 踆鴟至死不飢民工作布易賈乃求遠遷致之臨邛大憙即鐵山鼓鑄運籌算賈滇蜀民富至童八百人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈魋結民富埒卓氏程卓既衰至成哀間成都羅裒訾至鉅萬初裒賈京師隨身數十百萬為平陵石氏持錢其人彊力石氏訾次如苴親信厚資遣之令往來巴蜀數年間致千餘萬裒舉其半賂遣曲陽定陵侯依其權力賒貸郡國人莫敢負擅鹽井之利期年所得自倍遂殖其貨宛孔氏之先梁人也用鐵冶為業秦滅魏遷孔氏南陽大鼓鑄規陂田連騎游諸侯因通商賈之利有游閒公子之名然其贏得過當瘉於孅嗇家致數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而丙氏尤甚以鐵冶起富至鉅萬然家自父兄子弟約頫有拾卬有取貰貸行賈徧郡國鄒魯以其故多去文學而趨利齊俗賤奴虜而刀閒獨愛貴之桀黠奴人之所患唯刀閒收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數千萬故曰寧爵無刀言能使豪奴自饒而盡其力也刀閒既衰至成哀間臨淄姓偉訾五千萬周人既孅而師史尤甚轉轂百數賈郡國無所不至雒陽街居在齊秦楚趙之中富家相矜以久賈過邑不入門設用此等故師史能致十千萬師史既衰至成哀王莽時雒陽張長叔薛子仲訾亦十千萬莽, WYG: 司議}
