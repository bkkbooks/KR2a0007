  - {type: variant, offset: 6, length: 1, content: 昔, WYG: 人時詔書又令光祿歳以此科第郎從官故武以此四行得舉之也遷為鄠令坐法免歸武兄弟五人皆為郡吏郡縣敬憚之武弔顯家有市籍租常不入縣數負其課師古曰以顯家不入租故每令縣負課殿市嗇夫求商捕辱顯家師古曰求姓商名也顯怒欲以吏事中商師古曰中傷之也又音竹仲反武曰以吾家租賦繇役不為衆}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_086-2a, image: WYG0250/WYG0250-0710c.png}
  - {type: variant, offset: 6, length: 1, content: 昔, krp: 人時詔書又令光祿歳以此科第郎從官故武以此四行得舉之也遷為鄠令坐法免歸武兄弟五人皆為郡吏郡縣敬憚之武弔顯家有市籍租常不入縣數負其課師古曰以顯家不入租故每令縣負課殿市嗇夫求商捕辱顯家師古曰求姓商名也顯怒欲以吏事中商師古曰中傷之也又音竹仲反武曰以吾家租賦繇役不為衆}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 奉公吏不亦宜乎武卒白太守召商為卒吏劉攽曰吏改作史州里聞之皆服焉久之太僕王音舉武賢良方正徴對䇿拜為諌大夫遷揚州刺史所舉奏二千石長吏必先露章服罪者為虧除免之而已師古曰虧減也減除其状直命免去也不服極法奏之抵罪或至死九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部錄囚徒有所舉以屬郡師古曰屬委也音之欲反聖曰後進生何知廼欲亂人治師古曰言武仕學未久故謂之後進生也皆無所决武使從事廉得其罪師古曰亷察也聖懼自免後為博士毁武於朝廷武聞之終不揚其惡而聖子賔客為羣盗得師古曰聚為羣盗而吏捕得也繋廬江聖自以子必死武平心决之卒得不死自是後聖慙服武每奏事至京師師古曰刺史每歳盡則入奏事於京師也聖未嘗不造門謝恩師古曰造至也音千到反武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平行部必先即學宫見諸生師古曰即就也學宫學舎也試其誦論問以得失然後入𫝊舎出記問墾田頃畝五榖美惡師古曰記謂教命之書已廼見二千石以為常師古曰常依次第也宋祁曰注文次第字上疑有此字初武為郡吏時事太守何夀壽知武有宰相器以其同姓故厚之後壽為大司農其兄子為廬江長史劉攽曰廬江長史按百官表邉郡有長史秩六百石廬江無縁有長史就命有之已六百石不待刺史一見為重而郡舉之也明此多長字不然是卒字爾時武奏事在邸壽兄子適在長安壽為具召武弟顯及故人楊覆衆等師古曰具謂酒食之具也酒酣見其兄子師古曰令出見顯等曰此子揚州長史師古曰言揚州部内長史也材能駑下未嘗省見師古曰省視也言不為武所識㧞也顯等甚慙退以謂武武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隐逸廼當召見不可有所私問顯覆衆强之不得已召見賜巵酒師古曰對賜一巵之酒也歳中廬江太守舉之師古曰終得武之力助也其守法見憚如此為刺史五歳入為丞相司直丞相薛宣敬重之出為清河太守數歳坐郡中被灾害什四以上免久之大司馬曲陽侯王根薦武徴為諌大夫遷兖州刺史入為司𨽻校尉徙京兆尹二歳坐舉方正所舉者召見槃辟雅拜服䖍曰行禮容拜也師古曰槃辟猶言槃旋也辟音闢有司以為詭衆虚偽師古曰詭違也武坐左遷楚内史遷沛郡太守復入為廷尉綏和元年御史大夫孔光左遷廷尉武為御史大夫成帝欲脩辟雍通三公官師古曰通開也謂更開置之即改御史大夫為大司空師古曰就其所任之人而并官俱改不别拜授也武更為大司空封汜鄉侯食邑千户氾鄉在琅邪不其師古曰為後改食博望鄉故此指言在琅邪不其也氾音凡其音基哀帝初即位褒賞大臣更以南陽犫之博望鄉為氾鄉侯國師古曰犫音昌牛反增邑千户武為人仁厚好進士奨稱人之善師古曰奨勸也進而勸之為楚内史厚兩龔在沛郡厚兩唐師古曰兩龔龔勝龔舎也兩唐唐林唐尊也及為公卿薦之朝廷此人顯於世者何侯力也世以此多焉師古曰多重也重武進賢也然疾朋黨問文吏必於儒者問儒者必於文吏以相參檢欲除吏先為科例以防請託其所居亦無赫赫名去後常見思及為御史大夫司空與丞相方進共奏言徃者諸侯王斷獄治政内史典獄事相總綱紀輔王中尉􅊀盗賊今王不斷獄與政師古曰與讀曰豫中尉官罷職并内史郡國守相委任所以壹綂信安百姓也師古曰令百姓信之而安附也今内史位卑而權重威職相踰不統尊者難以為治臣請相如太守内史如都尉以順尊卑之序平輕重之權制曰可以内史為中尉初武為九卿時奏言宜置三公官又與方進共奏罷刺史更置州牧後皆復復故師古曰又依其舊也下復音扶目反宋祁曰監夲有二復字按注宜有二復字越本無一復字語在朱博𫝊唯内史事施行多所舉奏號為煩碎不稱賢公功名略比薛宣其材不及也而經術正直過之武後母在郡遣吏歸迎㑹成帝崩吏恐道路有盗賊後母留止左右或譏武事親不篤師古曰左右謂天子側近之臣哀帝亦欲改易大臣遂策免武曰君舉錯煩苛不合衆心師古曰錯置也音千故反孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國後五嵗諫大夫鮑宣數稱寃之天子感丞相王嘉之對而髙安侯董賢亦薦武武由是復徴為御史大夫月餘徙為前將軍先是新都侯王莽就國數年上以太皇太后故徴莽還京師莽從弟成都侯王邑為侍中矯稱太皇太后指白哀帝為莽求特進給事中哀帝復請之事發覺師古曰哀帝反更以此事請於太后太后本無此言故矯事𤼵覺也復音扶目反宋祁曰越本無莽字監本有太后為謝上以太后故不忍誅之宋祁曰浙本去之字左遷邑為西河屬國都尉削千户後有詔舉太常莽私從武求舉武不敢舉後數月哀帝崩太后即日引莽入收大司馬董賢印綬詔有司舉可大司馬者莽故大司馬辭位辟丁傅師古曰辟讀曰避衆庶稱以為賢又太后近親自大司徒孔光以下舉朝皆舉莽武為前將軍素與左將軍公孫祿相善二人獨謀以為徃時孝恵孝昭少主之世外戚吕霍上官持權㡬危社稷師古曰㡬音鉅依反今孝成孝哀比世無嗣師古曰比頻也方當選立親近輔㓜主不宜令異姓大臣持權師古曰異姓謂非宗室及外戚宋祁曰南本徐鍇去不字予據顏注刪之為允劉敞曰周禮時揖異姓異姓婚姻也異姓正謂外戚爾恐不當去不字親䟱相錯為國計便師古曰錯謂間雜也於是武舉公孫祿可大司馬而祿亦舉武太后竟自用莽為大司馬莽風有司劾奏武公孫祿互相稱舉皆免師古曰風讀曰諷武就國後莽寖盛為宰衡師古曰寖漸也隂誅不附已者元始三年吕寛等事起時大司空甄豐承莽風指師古曰風謂風采也指意也遣使者乗𫝊案治黨與師古曰𫝊音張戀反連引諸所欲誅上黨鮑宣南陽彭偉杜公子師古曰彭偉及杜公子二人皆南陽人郡國豪桀坐死者數百人武在見誣中大理正檻車徴武武自殺衆人多寃武者莽欲厭衆意師古曰厭滿也音一瞻反令武子況嗣為侯諡武曰刺侯師古曰刺音来葛反莽篡位免況為庶人王嘉字公仲平陵人也以明經射策甲科為郎坐户殿門失䦨免師古曰户止也嘉掌守殿門止不當入者而失䦨入之故坐免也春秋左氏傳云屈蕩户之光祿勲于永除為掾察亷為南陵丞師古曰南陵縣名属宣城劉攽曰南陵薄太后陵耳漢無南陵縣宋祁曰案地理志宣城丹陽郡縣名未為郡復察亷為長陵尉鴻嘉中舉敦朴能直言召見宣室對政事得失超遷大中大夫出為九江河南太守治甚有聲徴入為大鴻臚徙京兆尹遷御史大夫建平三年代平當為丞相封新甫侯加食邑千一百户劉敞曰加食邑多加字嘉為人剛直嚴毅有威重上甚敬之哀帝初立欲匡成帝之政多所變動師古曰匡正也正其乖失者嘉上疏曰臣聞聖}
