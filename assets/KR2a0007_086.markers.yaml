  - {type: variant, offset: 752, length: 598, content: 得見矣故旱則資舟水則資車物之理也推此類而脩之十年國富厚賂戰士遂報彊吳刷會稽之恥范蠡歎曰計然之策十用其五而得意既以施國吾欲施之家乃乘扁舟浮江湖變姓名適齊為鴟夷子皮之陶為朱公以為陶天下之中諸侯四通貨物所交易也乃治產積居與時逐而不責於人故善治產者能擇人而任時十九年之間三致千金而再散分與貧友昆弟後年衰老聽子孫脩業而息之遂至鉅萬故言富者稱陶朱子贛既學於仲尼退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顏淵簞食瓢飲在于陋巷子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之抗禮然孔子賢顏淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我予能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸摯鳥之發故曰吾治生猶伊尹呂尚之謀孫吳用兵商鞅行法是也故智不足與權變勇不足以決斷仁不能以取予彊不能以有守雖欲學吾術終不告也蓋天下言治生者祖白圭猗頓用盬鹽起邯鄲郭縱以鑄冶成業與王者埒富烏氏蠃畜牧及眾斥賣求奇繒物間獻戎王戎王十倍其償予畜畜至用谷量牛馬秦始皇令蠃比封君以時與列臣朝請巴寡婦清其先得丹穴而擅其利數世家亦不訾清寡婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺秦漢之制列侯封君食租稅歲率戶二百千戶之君則二十萬朝覲聘享出其中庶民農工商賈率亦歲萬息二千百萬之家即二十萬而更繇租賦出其中衣食好美矣故曰陸地牧馬二百蹏牛千蹏角千足羊澤中千足彘水居千石魚波山居千, WYG: 改}
