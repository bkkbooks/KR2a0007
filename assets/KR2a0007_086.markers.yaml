  - {type: 'tls:seg', offset: 55, content: '', id: KR2a0007_tls_086-1a.6}
  - {type: variant, offset: 55, length: 1, content: 賤, WYG: 赦嘉奏封事薦相等明習治獄相計謀深沈譚頗知雅文鳯經明行脩聖王有計功除過師古曰收采其功以免罪過也臣竊為朝廷惜此三人書奏上不能平師古曰心怒也後二十餘日嘉封還益董賢户事上乃發怒召嘉詣尚書責問以相等前坐在位不盡忠誠外附諸侯操持兩心背人臣之義今所稱相等材美足以相計除罪君以道徳位在三公以總方略一綂萬類宋祁曰或無萬字劉奉世曰多萬字分眀善惡為職知相等罪惡陳列著聞天下時輒以自劾今又稱譽相等云為朝廷惜之大臣舉錯恣心自在師古曰錯置也迷國罔上近由君始將謂逺者何師古曰近臣尚然則逺者固宜爾也對狀師古曰𠡠令具對也嘉免冠謝罪事下將軍中朝者光祿大夫孔光左將軍公孫祿右將軍王安光祿勳馬宫光祿大夫龔勝劾嘉迷國罔上不道請與廷尉雜治勝獨以為嘉備宰相諸事並廢咎由嘉生師古曰孔光以下衆共劾嘉而勝獨為異議也嘉坐薦相等微薄以應迷國罔上不道恐不可以示天下遂可光等奏光等請謁者召嘉詣廷尉詔獄制曰票騎將軍御史大夫中二千石二千石諸大夫博士議郎議衛尉雲等五十人以為如光等言可許議郎龔等以為嘉言事前後相違無所執守不任宰相之職宜奪爵土免為庻人永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不衘怨而受罪明主躬聖徳重大臣刑辟廣延有司議欲使海内咸服嘉罪名雖應法聖王之於大臣在輿為下御坐則起師古曰觧在翟方進𫝊疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誄之以行師古曰言大臣之死積累其行而為誄也誄者累徳行之文案嘉本以相等為罪罪惡雖著大臣括髮關械裸躬就笞師古曰括結也關貫也祼露也非所以重國褒宗廟也今春月寒氣錯繆霜露數降宜示天下以寛和臣等不知大義唯陛下察焉有詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳寃相踵以為故事師古曰踵由躡也君侯宜引决師古曰令自殺也使者危坐府門上師古曰以逼促嘉也主簿復前進藥嘉引藥杯以擊地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死師古曰咀嚼也音才汝反嘉遂装出見使者再拜受詔乘吏小車去蓋不冠随使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉嘉對曰案事者思得實竊見相等前治東平王獄不以雲為不當死欲關公卿示重慎置驛馬𫝊囚埶}
