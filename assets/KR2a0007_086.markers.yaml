  - {type: variant, offset: 2167, length: 1, content: 能, krp: 及深思逺慮使主簿書漏泄之過不在丹以此貶黜恐不厭衆心師古曰厭音一贍反尚書劾咸欽幸}
  - {type: variant, offset: 2169, length: 0, content: '', WYG: 以儒官選擢備腹心上所折中定疑師古曰折斷也取其言以斷事之中而定所疑知丹社稷重臣議罪處罸國之所慎咸欽初傅經義以為當治師古曰傅讀曰附事以暴列乃復上書妄稱譽丹前後相違不敬上貶咸欽秩各二等遂䇿免丹曰夫三公者朕之腹心也輔善相過匡率百僚和合天下者也朕既不明委政於公間者隂陽不調寒暑失常變異婁臻師古曰婁古屢字山崩地震河決泉涌流殺人民百姓流連無所歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相進不公之名乃者以挺力田議改幣章示君師古曰挺引拔也謂特拔異力田之人優寵之也挺音徒鼎反而說者以挺為縣名失之逺矣君内為朕建可改不疑師古曰其立此議也以君之言宋祁曰言或作議博考朝臣君乃希衆雷同外以為不便令觀聼者歸非於朕朕隐忍不宣為君受愆朕疾夫比周之徒師古曰比音頻寐反虚偽壊化寖以成俗故屢以書飭君師古曰飭與敕同㡬君省過求已師古曰省視也自求諸已不尤人也㡬音兾而反不受退有後言及君奏封事𫝊於道路布聞朝市言事者以為大臣不忠辜陷重辟𫉬虚采名謗譏匈匈流于四方腹心如此謂疏者何殆謬於二人同心之利焉師古曰易上繫辭曰二人同心}
