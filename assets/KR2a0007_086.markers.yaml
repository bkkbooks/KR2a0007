  - {type: variant, offset: 61, length: 2, content: 然故, WYG: 人所子師古曰莊襄王始皇之父也華陽夫人孝文王之夫人也子謂飬以為子也及即位後俱稱太后宜立定陶共王后為皇太后事下有司時丹以左將軍與大司馬王莽共劾奏宏知皇太后至尊之號天下一綂而稱引亡秦以為比喻詿誤聖朝非所宜言大不道}
