  - {type: variant, offset: 1351, length: 345, content: 之萩安邑千樹棗燕秦千樹粟蜀漢江陵千樹橘淮北滎南河濟之間千樹萩陳夏千畝桼齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鐘之田若千畝卮茜千畦薑韭此其人皆與千戶侯等諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也通邑大都酤一歲千釀醯醬千瓨漿千儋屠牛羊彘千皮穀糴千鍾薪槀千車舩長千丈木千章竹竿萬个軺車百乘牛車千兩木器桼者千枚銅器千鈞素木鐵器若卮茜千石馬蹏噭千牛千足羊彘千雙童手指千筯角丹沙千斤其帛絮細布千鈞文采千匹荅布皮革千石桼千大斗孽麴鹽豉千合鮐鮆千斤鮿鮑千鈞棗粟千石者三之狐貂裘千皮羔羊裘千石旃席千具它果采千種子貸金錢千貫節駔儈貪賈三之廉賈五之亦比千乘之家此其大率也蜀卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦行諸遷虜少有餘財爭與吏求近處處葭萌唯卓氏曰此地陿薄吾聞崏山之下沃野, WYG: ''}
