  - {type: variant, offset: 59, length: 0, content: '', WYG: 冬月誠不見其外内顧望阿附為雲驗復幸得蒙大赦相等皆良善吏臣竊為國惜賢不私此三人獄吏曰茍如此則君何以為罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然卬天歎曰師古曰卬讀曰仰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡髙安侯董賢父子邪佞亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死宋祁曰而字當刪帝舅大司馬票騎將軍丁明素重嘉而憐之上遂免眀以董賢代之語在賢𫝊嘉為相三年誅國除死後上覽其對而思嘉言復以孔光代嘉為丞相徴用何武為御史大夫元始四年詔書追錄忠臣封嘉子崇為新甫侯追諡嘉為忠侯師丹字仲公琅邪東武人也治詩事匡衡舉孝亷為郎元帝末為博士免建始中州舉茂材復𥙷博士出為東平王太傅丞相方進御史大夫孔光舉丹議論深博宋祁曰越本作論議亷正守道徴入為光祿大夫丞相司直數月復以光祿大夫給事中由是為少府光祿勲侍中甚見尊重成帝末年立定陶王為皇太子以丹為太子太傅哀帝即位為左将軍賜爵關内侯食邑領尚書事遂代王莽為大司馬封髙樂侯月餘徙為大司空宋祁曰以外戚恩澤侯表攷之丹為大司馬封髙樂侯在綏和二年七月以傅喜𫝊攷之徙為大司徒在明年正月恐不當云月餘上少在國見成帝委政外家王氏僭盛常内邑邑即位多欲有所匡正封拜丁傅奪王氏權丹自以師傅居三公位得信於上上書言古者諒闇不言聼於冡宰師古曰論語云子張曰書云髙宗諒闇三年不言孔子曰何必髙宗古之人皆然君薨百官總已以聼於冡宰三年諒信也闇黙然也宋祁曰注文黙然然字當刪三年無改於父之道師古曰論語稱孔子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣前大行尸柩在堂而官爵臣等以及親屬赫然皆}
