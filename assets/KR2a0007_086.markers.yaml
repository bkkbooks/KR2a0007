  - {type: variant, offset: 53, length: 1, content: 僭, krp: 其宜則衆庻不服感動隂陽其害疾自深師古曰言此氣損害故令天子身自有疾也今聖體久不平此臣嘉所内懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之師古曰單盡也損至尊以寵之師古曰言上意傾惑為下所窺也主威已黜府臧已竭唯恐不足財皆民力所為孝文皇帝欲起露臺惜百金之費宋祁曰惜越本作重克已不作今賢散公賦以施私恵一家至受千金徃古以来貴臣未嘗有流聞四方皆同怨之宋祁曰流字上或有此字里諺曰千人所指無病而死臣常為之寒心今太皇太后以永信太后遺詔詔丞相御史益賢户賜三侯國臣嘉竊惑山崩地動日食於三朝師古曰歲月日之朝也已觧於上皆隂侵陽之戒也前賢已再封晏商再易邑業縁私横求恩已過厚師古曰横音胡孟反宋祁曰求當作受求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵罔隂陽失節師古曰罔謂誣蔽也宋祁曰驕字下當有主字氣感相動害及身體陛下寢疾久不平繼嗣未立宜思正萬事順天人之心以求福祐奈何輕身肆意師古曰肆放也不念髙祖之勤苦垂立制度欲𫝊之於無窮哉孝經曰天子有爭臣七人雖無道不失其天下師古曰言上能納諌則免於過惡也臣謹封上詔書不敢露見非愛死而不自法恐天下聞之故不敢自劾愚戇數犯忌諱唯陛下省察初廷尉梁相與丞相長史御史中丞及五二千石雜治東平王雲獄時冬月未盡二旬而相心疑雲寃獄有餙辭師古曰假飾之辭非其實也奏欲𫝊之長安師古曰𫝊謂移其獄事也更下公卿覆治尚書令鞫譚僕射宗伯鳯以為可許師古曰鞫及宗伯皆姓也鞫音居六反天子以相等皆見上體不平外内顧望操持兩心師古曰操音干髙反幸雲踰冬無討賊疾惡主讎之意制詔免相等皆為庻人後數月}
