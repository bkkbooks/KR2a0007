  - {type: variant, offset: 14, length: 0, content: '', WYG: 為擇臣立命卿以輔之師古曰命卿命於天子者也居是國也累世尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯徃者致選賢材賢材難得㧞擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁内史骨肉以安師古曰言梁孝王得免罪也張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自寃使者覆獄劾敞賊殺人師古曰覆音芳目反上逮捕不下師古曰言使者上奏請逮捕敞而天子不下其事也下音胡稼反會免亡命數十日宣帝徴敞拜為兾州刺史卒𫉬其用前世非私此三人貪其材器有益於}
