  - {type: variant, offset: 3, length: 0, content: '', WYG: 第五十}
  - {type: variant, offset: 3, length: 0, content: '', krp: 第五十}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 何武字君公蜀郡郫縣人也師古曰郫音疲宣帝時天下和平四夷賔服神爵五鳯之間婁䝉瑞應師古曰婁古屢字也宗祁曰注文也字當刪而益州刺史王襄使辯士王褒頌漢徳作中和樂職宣布詩三篇師古曰中和者言政教隆平得中和之道也樂職謂百官萬姓樂得其常道也宣布德化周洽徧於四海也武年}
  - {type: page-break, offset: 4, content: '', id: KR2a0007_WYG_086-1b, image: WYG0250/WYG0250-0710b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 何武字君公蜀郡郫縣人也師古曰郫音疲宣帝時天下和平四夷賔服神爵五鳯之間婁䝉瑞應師古曰婁古屢字也宗祁曰注文也字當刪而益州刺史王襄使辯士王褒頌漢徳作中和樂職宣布詩三篇師古曰中和者言政教隆平得中和之道也樂職謂百官萬姓樂得其常道也宣布德化周洽徧於四海也武年}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 四五與成都楊覆衆等共習歌之是時宣帝循武帝故事宋祁曰循字疑是脩浙本作脩求通逹茂異士召見武等於宣室師古曰殿名也解在賈誼傳上曰此盛徳之事吾何足以當之哉以褒為待詔武等賜帛罷武詣博士受業治易以射䇿甲科為郎與翟方進交志相友光祿勲舉四行師古曰元帝永光元年詔舉質樸敦厚遜譲有行義各}
  - {type: variant, offset: 5, length: 0, content: '', krp: 四五與成都楊覆衆等共習歌之是時宣帝循武帝故事宋祁曰循字疑是脩浙本作脩求通逹茂異士召見武等於宣室師古曰殿名也解在賈誼傳上曰此盛徳之事吾何足以當之哉以褒為待詔武等賜帛罷武詣博士受業治易以射䇿甲科為郎與翟方進交志相友光祿勲舉四行師古曰元帝永光元年詔舉質樸敦厚遜譲有行義各}
