  - {type: variant, offset: 60, length: 0, content: '', WYG: 寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事師古曰比頻也卒暴無漸師古曰卒讀曰猝臣縱不能明陳大義復曾不能牢譲爵位師古曰牢堅也相随空受封侯增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理隂陽溷濁之應也師古曰溷音胡頓反臣伏惟人情無子年雖六七十猶博取而廣求師古曰取讀曰娶孝成皇帝深見天命燭知至德師古曰燭照也至徳指謂哀帝以壯年克已立陛下為嗣先帝暴棄天下而陛下繼體四海安寜百姓不懼此先帝聖德當合天人之功也臣聞天威不違顔咫尺師古曰言常若在前宜自肅懼也願陛下深思先帝所以建立陛下之意且克已躬行以觀羣下之從化天下者陛下之家也胏附何患不富貴不宜倉卒先帝不量臣愚以為太傅陛下以臣託師傅故亡功徳而備鼎足封大國加賜黄金位為三公職在左右師古曰左右助也左讀曰佐右讀曰佑不能盡忠𥙷過而令庻人竊議灾異數見此臣之大罪也臣不敢言乞骸骨歸於海濵恐嫌於偽誠慙負重責義不得不盡死書數十上多切直之言初哀帝即位成帝母稱太皇太后成帝趙皇后稱皇太后宋祁曰一本云成帝趙皇太后而上祖母傳太后與母丁后皆在國邸自以定陶共王為稱髙昌侯董宏上書言秦莊襄王母本夏氏而為華陽}
