  - {type: variant, offset: 14, length: 0, content: '', krp: 為擇臣立命卿以輔之師古曰命卿命於天子者也居是國也累世尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯徃者致選賢材賢材難得㧞擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁内史骨肉以安師古曰言梁孝王得免罪也張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自寃使者覆獄劾敞賊殺人師古曰覆音芳目反上逮捕不下師古曰言使者上奏請逮捕敞而天子不下其事也下音胡稼反會免亡命數十日宣帝徴敞拜為兾州刺史卒𫉬其用前世非私此三人貪其材器有益於}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下𫝊相促急又數改更政事師古曰更亦變也司𨽻部刺史察過悉劾發揚隂私師古曰悉盡也言事無大小盡皆舉劾過於所察之條也吏或居官數月而退送故迎新交錯道路中材茍容求全師古曰不敢操持羣下也下材懐危内顧師古曰常恐𫉬罪每為私計也壹切營私者多二千石益輕賤吏民慢易之師古曰易亦輕也音弋䜴反或持其微過増加成辠言於刺史司𨽻或至上書章下師古曰依其所上之章而下令治之衆庻知其易危師古曰言易可傾危也小失意則有離畔之心前山陽亡徒蘇令等從横師古曰從音子用反横音胡孟反吏士臨難莫肯伏節死義以守相威權素奪也師古曰守郡守也相諸侯相也素奪謂先不假之威權也孝成皇帝悔之下詔書二千石不為縱孟康曰二千石不以故縱為罪所以優也遣使者賜金尉厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏師古曰良善也良民吏善治百姓者宋祁曰爱其良民吏其字當刪有章劾事留中㑹赦壹觧師古曰不即下治其事恐為擾動故每留中或經赦令一切皆觧散也故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字廼下師古曰所以丁寜告者之辭絶其相誣也唯陛下留神於擇賢記善忘過容忍臣子勿責以􅊀師古曰不求􅊀於一人也二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊略師古曰當寛恕其小罪也令盡力者有所勸此方今急務國家之利也前蘇令𤼵師古曰謂蘇令等初發起為盗賊也欲遣大夫使逐問狀時見大夫無可使者師古曰謂見在大夫皆不堪為使也召盩厔令尹逄拜為諫大夫遣之今諸大夫有材能者甚少宜豫畜飬可成就者則士赴難不愛其死臨事倉卒乃求非所以眀朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛脩等皆故二千石有名稱天子納而用之㑹息夫躬孫寵等因中常侍宋𢎞上書告東平王雲祝詛又與后舅伍宏謀弑上為逆宋祁曰弑當作殺字雖作殺讀亦作弑雲等伏誅躬寵擢為吏二千石是時侍中董賢愛幸於上上欲侯之而未有所縁傅嘉勸上因東平事以封賢上於是定躬寵告東平本章師古曰定謂改治也掇去宋𢎞更言因董賢以聞師古曰掇讀曰剟剟削也削去其名也剟音竹劣反欲以其功侯之皆先賜爵關内侯頃之欲封賢等上心惮嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史師古曰視讀曰示於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庻匈匈咸曰賢貴其餘并䝉恩師古曰言董賢以貴寵故妄得封而躬寵等遂䝉恩至今流言未解陛下仁恩於賢等不已宜暴賢等本奏語言師古曰暴謂章露也延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議暴下其事必有言宋祁曰言字上當有對字當封者在陛下所從天下雖不説咎有所分師古曰説讀曰悦不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎於永先帝不獨䝉其議師古曰䝉被也臣嘉臣延材駑不稱死有餘責師古曰稱副也知順指不迕可得容身湏㬰師古曰迕逆也所以不敢者思報厚恩也上感其言止數月遂下詔封賢等因以切責公卿曰朕居位以来寝疾未瘳師古曰瘳差也音丑留反反逆之謀相連不絶賊亂之臣近侍帷幄前東平王雲與后謁祝詛朕使侍毉伍宏等内侍案脉師古曰案謂切診也㡬危社稷殆莫甚焉師古曰幾音鉅依反殆亦危也昔楚有子玉得臣晉文為之側席而坐師古曰已觧於上近事汲黯折淮南之謀今雲等至有圗弑天子逆亂之謀者是公卿股肱莫能悉心務聰眀以銷厭未萌之故師古曰悉盡也務聰眀者廣視聼也厭音一渉反頼宗廟之靈宋祁曰靈字上當有神字侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用德章厥善師古曰商書盤庚之辭也其封賢為高安侯南陽太守寵為方陽侯左曹光祿大夫躬為宜陵侯後數月日食舉直言嘉復奏封事曰臣聞咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬㡬師古曰虞書咎繇謩之辭也言有國之人不可傲慢逸欲但當戒慎危懼以理萬事之機也敖讀曰傲宋祁曰資暇集云孔安國云㡬微也當戒萬事之微也晋文帝謂丞相於事動必經年怪其遲桓温曰萬幾那得速耶此對真得書義近改為即離之具當由漢王嘉封事誤從木傍也顔氏不知引孔注以證後人不根其本且曰漢書尚爾曾不知班顔自誤後人也箕子戒武王曰臣無有作威作福亡有玉食臣之有作威作福玉食害于而家凶于而國人用側頗辟民用僭慝師古曰周書洪範載箕子對武王之辭也玉食精好如玉也而汝也頗偏也僭不信也慝惡也言如此則逆尊卑之序亂隂陽之綂而害及王者其國極危宋祁曰極字當作凶字國家傾仄不正民用僭差不壹此君不由法度上下失序之敗也武王躬履此道隆至成康師古曰言武王能履法度故至成康之時徳化隆盛也自是以後縱心恣欲法度陵遲師古曰陵遲即陵夷也言漸頽替也至於臣弑君子弑父父子至親失禮患生何况異姓之臣孔子曰道千乗之國敬事而信節用而愛人使民以時師古曰論語載孔子之言也道治也千乗謂兵車千乗說在刑法志孝文皇帝備行此道海内䝉恩為漢太宗孝宣皇帝賞罸信明施與有節記人之功忽於小過師古曰忽忘也以致治平孝元皇帝奉承大業溫㳟少欲都内錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬師古曰言不費用故蓄積也嘗幸上林後宫馮貴人從臨獸圏猛獸驚出貴人前當之元帝嘉羙其義賜錢五萬師古曰此言雖嘉其義而賞亦不多掖庭見親有加賞賜屬其人勿衆謝師古曰掖庭宫人有親戚来見而帝賜之者屬其家勿使於衆人中謝也屬音之欲反示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也師古曰見在之錢也雖遭初元永光凶年饑饉加有西羌之變外奉師旅内振貧民終無傾危之憂以府臧内充實也孝成皇帝時諌臣多言燕出之害師古曰燕出謂微行也及女寵専愛耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄師古曰榜笞擊也音彭不以私愛害公義故雖多内譏朝廷安平師古曰雖有好内之譏而不害政也𫝊業陛下陛下在國之時好詩書上儉節徴来所過道上稱誦徳美此天下所以囘心也師古曰望為治也初即位易帷帳去錦繡乘輿席縁綈繒而已師古曰綈厚繒也音徒奚反共皇寢廟比比當作師古曰㳟皇哀帝之父即定陶㳟王也比比猶頻頻也共讀曰㳟憂閔元元惟用度不足師古曰惟思也以義割恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕師古曰郷讀曰嚮引王渠灌園池蘇林曰王渠官渠也猶今御溝也晋灼曰渠名也在城東覆盎門外師古曰晉説是使者䕶作師古曰護監視也賞賜吏卒甚於治宗廟賢母病長安厨給祠具師古曰長安有厨官主為官食道中過者皆飲食如淳曰檮於道中故行人皆得飲食為賢治器器成奏御廼行或物好特賜其工自貢獻宗廟三宫猶不至此師古曰三宫天子太后皇后也劉敞曰予謂是時太皇太后稱長信宫傅太后稱永信宫而丁姬中安宫故以三宫為言賢家有賔婚及見親諸官並共師古曰見親親戚相見也並供言百官各以所掌事及財物就供之共讀曰供賜及倉頭奴婢人十萬錢使者䕶視發取市物百賈震動師古曰賈謂販賣之人也言百賈者非一之稱也賈音古道路讙譁羣臣惶惑詔書罷菀而以賜賢二千餘頃均田之制從此堕壊孟康曰自公卿以下至于吏民名曰均田皆有頃數於品制中令均等今賜賢二千餘頃則壊其等制也師古曰菀古苑字堕音火規反奢􅆫放縱變亂隂陽灾異衆多百姓訛言持籌相驚師古曰言行西王母籌也被髮徒跣而走乗馬者馳夭惑其意不能自止或以為籌者策失之戒也陛下素仁智慎事今而有此大譏孔子曰危而不持顚而不扶則將安用彼相矣師古曰論語稱季氏將伐顓㬰冉有季路見於孔子孔子以此言責之以其不匡諌也臣嘉幸得備位竊内悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎已之所獨鄉察衆人之所共疑師古曰鄉讀曰嚮徃者寵臣鄧通韓嫣師古曰嫣音偃驕貴失度逸豫無厭小人不勝情欲卒陷罪辜師古曰卒終也亂國亡軀不終其禄所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命於是上寖不説師古曰寖漸也説讀曰悦而愈愛賢不能自勝㑹祖母傅太后薨劉奉世曰薨當作崩上因託傅太后遺詔令成帝母王太后下丞相御史益封賢二千户及賜孔鄉侯汝昌侯陽新侯國師古曰傅晏傅商鄭業也嘉封還詔書師古曰還謂郤上之於天子也因奏封事諫上及太后曰臣聞爵祿土地天之有也書云天命有徳五服五章哉師古曰虞書咎繇謨之辭也言皇天命於有徳者以居列位天子諸}
