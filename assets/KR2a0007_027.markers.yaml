  - {type: variant, offset: 27, length: 0, content: '', WYG: 公無徳於下坐致君位故曰以驕鸜鵒鸜鵒往歌來哭師古曰謂昭公生時出奔死乃以喪歸之至昭公時有鸜鵒來巢公攻季氏敗出奔齊居外野次乾侯八年死于外歸葬魯昭公名禂公子宋立是為定公元帝時童謡曰井水溢滅竈煙灌玉堂流金門至成帝建始二年}
