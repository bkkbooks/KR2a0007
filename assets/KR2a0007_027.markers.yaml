  - {type: variant, offset: 2391, length: 1, content: 吳, WYG: 五諸侯星名出河戍北率行軒轅太微後日六度有餘晨出東方十三日夕見西方犯次妃長秋斗填螽炎再貫紫宫中大火當後逹天河除於妃后之域南逝度犯大角攝提至天市而按節徐行服䖍曰謂行遲炎入市中旬而後西去五十六日與蒼龍俱伏谷永對曰上古以來大亂之極所希有也察其馳騁驟歩芒炎或長或短所歴奸犯師古曰奸音干内為後宫女妾之害外為諸夏叛逆之禍劉向亦曰三代之亡攝提易方秦項之滅星孛大角是嵗趙昭儀害两皇子後五年成帝崩昭儀自殺哀帝即位趙氏皆免官爵徙遼西哀帝亡嗣平帝即位}
