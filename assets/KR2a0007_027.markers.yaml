  - {type: variant, offset: 2155, length: 0, content: '', WYG: 曰三年之内但思慕而已不暇見父之非故不改也重音直用反不則為私厥妖人死復生一曰至陰為陽下人為上六月長安女子有生兒兩頭異頸面相鄉四臂共匈俱前鄉師古曰鄉讀曰嚮凥上有目長二寸所京房易𫝊曰睽孤見豕負塗師古曰易睽卦上九爻辭也睽孤乖剌之意也塗泥也睽音苦攜反厥妖人生兩頭下相攘善妖亦同人若六畜首目在下兹謂亡上正將變更凡妖之作以譴失正各象其類二首下不壹也足多所任邪也足少下不勝任或不任下也凡下體生於上不敬也上體生於下媟凟也生非其類淫亂也人生而大上速成也生而能言好虛也羣妖推此類不改乃成凶也景}
