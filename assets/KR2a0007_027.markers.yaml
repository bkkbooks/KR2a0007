  - {type: variant, offset: 2224, length: 0, content: '', WYG: 促急故月行疾也肅者王侯縮朒不任事服䖍曰朒音忸怩之忸鄭氏曰不任事之貌也師古曰朒音女六反臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄慝者十八食晦日朓者一此其效也考之漢家食晦朓者三十六終亡二日仄慝者歆説信矣此皆謂日月亂行者也元帝永光元年四月日色青白亡景韋昭曰日下無景也無景謂唯質見耳正中時有景亡光韋昭曰無光曜也是夏寒至九月日乃有光京房易傳曰羙不上人兹謂上弱厥異日白七日不温順亡所制兹謂弱孟康曰君順從於臣下無所能制日白六十日物無霜而死天子親伐兹謂不知日白體動而寒弱而有任兹謂不亡日白不温眀不動辟􅀢公行兹謂不伸孟康曰辟君也有過而公行之厥異日黑大風起天無雲日光晻師古曰晻與闇同不難上政兹謂見過日黑居仄大如彈丸成帝河平元年正月壬寅朔日月俱在營室時日出赤二月癸未日朝赤且入又赤夜月赤甲申日出赤如血亡光漏上四刻半乃頗有光燭地赤黄食後乃復京房易傳曰辟不聞道兹謂亡厥異日赤三月乙未日出黄有黑氣大如錢居日中央京房易傳曰祭天不順兹謂逆厥異日赤其中黑聞善不予兹謂失知厥異日黄夫大人者與天地合其徳與日月合其明故聖王在上總命羣賢以亮天功師古曰虞書舜典帝曰咨二十有二人欽哉惟時亮天功謂敇九官十二牧四岳令各敬其職事信定其功順天道也故志引之則日之光眀五色備具燭燿亡主有主則為異應行而變也色不虚改形不虚毁觀日之五變足以監矣故曰縣象著眀莫大乎日月此之謂也嚴公七年四月辛卯夜恒星不見夜中星隕如雨董仲舒劉向以為常星二十八宿者人君之象也衆星萬民之類也列宿不見象諸侯微也衆星隕墜民失其所也夜中者為中國也不及地而復象齊桓起而救存之也鄉亡桓公星遂至地中國其良絶矣師古曰鄉讀曰嚮中國中夏之國也良猶信也劉向以為夜中者言不得終性命中道敗也或曰象其叛也言當中道叛其上也天垂象以視下師古曰視讀曰示將欲人君防惡逺非慎卑省微以自全安也師古曰逺離省視也如人君有賢眀之材畏天威命若高宗謀祖已師古曰謂殷之武丁有雊雉之異而祖已訓諸王作高宗彤日高宗之訓成王泣金縢師古曰武王有疾周公作金縢之書為王請命王翌日乃瘳後武王崩成王即位管蔡流言而周公居東天大雷電以風禾盡偃大木斯㧞王啟金縢乃得周公代武王之説王執書以泣遣使者逆公王出郊天乃雨反風禾則盡起改過修正立信布徳存亡繼絶修廢舉逸下學而上逹師古曰下學謂博謀於羣下也上逹謂通於天道而畏威裁什一之税復三日之役師古曰古之田租十税其一一嵗役兆庶不過三日也節用儉服以惠百姓則諸侯懐徳士民歸仁災消而福興矣遂莫肯改寤法則古人而各行其私意終於君臣乖離上下交怨自是之後齊宋之君弑師古曰莊八年齊無知弑其君諸兒十二年宋萬弑其君㨗也譚遂邢衛之國滅師古曰十年齊侯滅譚十三年齊人滅遂閔二年狄人入衛僖二十五年衛侯燬滅邢宿遷於宋師古曰莊十年宋人遷宿蓋取其地也宿國東平無鹽縣是也蔡獲於楚師古曰莊十年荆敗蔡師于莘以蔡侯獻舞歸也晉相弑殺五世乃定師古曰謂殺奚齊卓子及懐公也自獻公以至文公反國凡易五君乃定此其效也左氏傳曰恒星不見夜眀也星隕如雨與雨偕也劉歆以為晝象中國夜象夷狄夜眀故常見之星皆不見象中國微也星隕如雨如而也星隕而且雨故曰與雨偕也眀雨與星隕兩變相成也洪範曰庶民惟星易曰雷雨作解師古曰解卦象辭也是嵗嵗在𤣥枵齊分壄也夜中而星隕象庶民中離上也雨以解過施復從上下象齊桓行伯復興周室也周四月夏二月也日在降婁魯分壄也先是衛侯朔奔齊衛公子黔牟立齊帥諸侯伐之天子使使救衛師古曰已解于上魯公子溺顓政會齊以犯王命師古曰溺魯大夫名也荘三年溺會齊師伐衛疾其專命故貶而去族天子救衛而溺伐之故云犯王命嚴弗能止卒從而伐衛逐天王所立師古曰謂放黔牟也不義至甚而自以為功民去其上政繇下作尤著故星隕於魯天事常象也成帝永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅師古曰繹繹光采貎至雞鳴止谷永對曰日月星辰燭臨下土其有食隕之異則遐邇幽隠靡不咸睹星辰附離于天猶庶民附離王者也王者失道綱紀廢頓下將叛去故星叛天而隕以見其象春秋記異星隕最大自魯嚴以來至今再見臣聞三代所以䘮亡者皆繇婦人羣小湛湎於酒師古曰湛讀曰沈又讀曰耽其下亦同書云乃用其婦人之言四方之逋逃多罪是信是使師古曰周書㤗誓也言紂惑於妲己而昵近亡逃罪人信用之詩曰赫赫宗周褒姒烕之師古曰小雅正月之詩也已解于上烕音許悦反顛覆厥徳荒沈于酒師古曰大雅抑之詩也刺王傾敗其徳荒廢政事而耽酒及秦所以二世而亡者養生大奢奉終大厚方今國家兼而有之社禝宗廟之大憂也京房易傳曰君不任賢厥妖天雨星文公十四年七月有星孛入于北斗董仲舒以為孛者惡氣之所生也謂之孛者言其孛孛有所妨蔽闇亂不眀之貎也北斗大國象後齊宋魯莒晉皆弑君師古曰文十四年齊公子商人弑其君舍十六年宋人弑其君杵臼十八年襄仲殺惡及視莒弑其君庶其宣二年晉趙穿攻靈公於桃園劉向以為君臣亂於朝政令虧於外則上濁三光之精五星贏縮變色逆行甚則為孛北斗人君象孛星亂臣類簒殺之表也星傳曰魁者貴人之牢又曰孛星見北斗中大臣諸侯有受誅者一曰魁為齊晉夫慧星較然在北斗中天之視人顯矣師古曰視讀曰示史之有占眀矣時君終不改寤是後宋魯莒晉鄭陳六國咸弑其君師古曰宋魯莒晉已解於上宣四年鄭公子歸生弑其君夷十年陳夏徴舒弑其君平國齊再弑焉師古曰再弑者謂商人殺舍而閻職等又殺商人中國既亂夷狄並侵兵革從横楚乘威席勝深入諸夏師古曰謂邲戰之後六侵伐師古曰謂宣十二年春楚子圍鄭夏與晉師戰于邲晉師敗績十三年楚子伐宋十四年楚子圍宋成二年楚師侵衛遂侵魯師于蜀成六年楚公子嬰齊帥師伐鄭一滅國師古曰謂宣十二年楚子滅蕭觀兵周室師古曰已解于上晉外滅二國師古曰謂宣十五年晉滅赤狄潞氏十六年滅赤狄甲氏也内敗王師師古曰謂成元年晉敗王師于貿戎是也又連三國之兵大敗齊師於鞌師古曰謂成二年晉郤克㑹魯季孫行父衛孫良夫曹公子首及齊侯戰于鞌齊師敗績鞌齊地追亡逐北東臨海水師古曰謂逐之三周華不注又從之入自丘輿擊馬陘東至海濱也威陵京師武折大齊皆孛星炎之所及流至二十八年師古曰炎音弋瞻反其下並同星傳又曰彗星入北斗有大戰其流入北斗中得名人孟康曰謂得名臣也不入失名人宋華元賢名大夫大棘之戰華元獲於鄭師古曰宣二年宋華元帥師及鄭公子歸生戰于大棘宋師敗績獲華元大棘宋地傳舉其效云左氏傳曰有孛星北斗周史服曰不出七年宋齊晉之君皆將死亂師古曰史服周内史叔服也劉歆以為北斗有環域四星入其中也斗天之三辰綱紀星也宋齊晉天子方伯中國綱紀彗所以除舊布新也斗七星故曰不出七年至十六年宋人弑昭公師古曰即杵臼十八年齊人弑懿公師古曰即商人宣公二年晉趙穿弑靈公昭公十七年冬有星孛于大辰董仲舒以為大辰心也心為眀堂天子之象後王室大亂三王分爭此其效也師古曰三王已解于上劉向以為星傳曰心大星天王也其前星太子後星庶子也尾為君臣乖離孛星加心象天子適庶將分爭也其在諸侯角亢氐陳鄭也房心宋也後五年周景王崩王室亂大夫劉子單子立王猛尹氏召伯毛伯立子鼂子鼂楚出也師古曰姊妹之子曰出時楚彊宋衛陳鄭皆南附楚王猛既卒敬王即位子鼂入王城天王居狄泉莫之敢納五年楚平王居卒子鼂奔楚王室乃定後楚帥六國伐吴吴敗之于雞父殺獲其君臣師古曰昭二十三年楚薳越帥師及頓胡沈蔡陳許之師與吴師戰于雞父楚師敗績胡子髠沈子逞滅獲陳大夫夏齧雞父楚地也父讀曰甫蔡怨楚而滅沈楚怒圍蔡吴人救之遂為柏舉之戰敗楚師屠郢都妻昭王母鞭平王墓師古曰沈楚之與國定四年四月蔡公孫姓帥師滅沈以沈子嘉歸秋楚為沈故圍蔡冬吴興師以救之與楚戰于柏舉楚師敗績庚辰吴入郢君舍乎君室大夫舍乎大夫室妻楚王之母撻平王之墓也此皆孛彗流炎所及之效也左氏傳曰有星孛于大辰西及漢申繻曰彗所以除舊布新也師古曰申繻魯大夫天事恒象今除於火火出必布焉諸侯其有火災乎梓慎曰往年吾見是其徴也火出而見今兹火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虚陳太昊之虚鄭祝融之虚師古曰虚讀皆曰墟其下並同皆火房也星孛及漢漢水祥也衛顓頊之虚其星為大水水火之牡也張晏曰水以天一為地二牡丙與午南方火也子及壬北方水也又其配合其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過見之月眀年夏五月火始昏見丙子風梓慎曰是謂融風火之始也張晏曰融風立春木風也火之母也火所始生也淮南子曰東北曰炎風高誘以為艮氣所生也炎風一曰融風七日其火作乎張晏曰自丙子至壬午凡七日既其配合之日又火以七為紀戊寅風甚壬午太甚師古曰太甚者又更甚也宋衛陳鄭皆火劉歆以為大辰房心尾也八月心星在西方孛從其西過心東及漢也宋大辰虚謂宋先祖掌祀大辰星也陳太昊虚虙義木徳師古曰虙讀與伏同火所生也鄭祝融虚高辛氏火正也故皆為火所舍衛顓頊虚星為大水營室也天星既然又四國失政相似及為王室亂皆同哀公十三年冬十一月有星孛于東方董仲舒劉向以為不言宿名者不加宿也孟康曰不在二十八宿之中也以辰乘日而出亂氣蔽君眀也眀年春秋事終一曰周之十一月夏九月日在氐出東方者軫角亢也軫楚角亢陳鄭也或曰角亢大國象為齊晉也其後楚滅陳師古曰襄十七年楚公孫朝帥師滅陳也田氏簒齊師古曰齊平公十三年春秋之傳終矣平公二十五年卒卒後七十年而康公為田和所滅六卿分晉師古曰晉出公八年春秋之傳終矣出公十七年卒卒後八十年至靖公為韓魏趙所滅而三分其地蓋晉之衰也六卿擅權其後范氏中行氏智氏滅而韓魏趙兼其土田人衆故總言六卿分晉也此其效也劉歆以為孛東方大辰也不言大辰旦而見與日爭光星入而彗猶見是嵗再失閏十一月實八月也日在鶉火周分野也十四年冬有星孛在獲麟後劉歆以為不言所在官失之也高帝三年七月有星孛於大角旬餘乃入劉向以為是時項羽為楚王伯諸侯而漢已定三秦與羽相距滎陽天下歸心於漢楚將滅故彗除王位也一曰項羽阬秦卒燒宫室弑義帝亂王位故彗加之也文帝後七年九月有星孛于西方其本直尾箕末指虚危長丈餘及天漢十六日不見劉向以為尾宋地今楚彭城也箕為燕又為吴越齊宿在漢中負海之國水澤地也是時景帝新立信用鼂錯將誅正諸侯王其象先見後三年吴楚四齊與趙七國舉兵反師古曰四齊膠東}
