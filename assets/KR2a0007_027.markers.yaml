  - {type: variant, offset: 27, length: 0, content: '', krp: 公無徳於下坐致君位故曰以驕鸜鵒鸜鵒往歌來哭師古曰謂昭公生時出奔死乃以喪歸之至昭公時有鸜鵒來巢公攻季氏敗出奔齊居外野次乾侯八年死于外歸葬魯昭公名禂公子宋立是為定公元帝時童謡曰井水溢滅竈煙灌玉堂流金門至成帝建始二年}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 月戊子北宮中井泉稍上溢出南流象春秋時先有鸜鵒之謡而後有來巢之驗井水隂也竈煙陽也玉堂金門至尊之居象隂盛而滅陽竊有宮室之應也王莽生於元帝初元四年至成帝封侯為三公輔政因以簒位成帝時童謡曰燕燕尾涎涎師古曰涎涎光澤貌也音徒見反張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢其後帝為微行出遊常與富平侯張放俱稱富平侯家人過河陽主作樂見舞者趙飛燕而幸之故曰燕燕尾涎涎美好貎也張公子謂富平侯也木門倉琅根謂宫門銅鍰師古曰門之鋪首及銅鍰也銅色青故曰倉琅鋪首銜環故謂之根鍰讀與環同言將尊貴也後遂立為皇后弟昭儀賊害後宫皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢者也成帝時謌謡又曰邪徑敗良田讒口亂善人桂樹華不實黄爵巢其顛故為人所羡今為人所憐桂赤色象漢家華不實無繼嗣也王莽自謂黄象黄爵巢其顛也嚴公十七年冬多麋劉歆以為毛蟲之孽為災劉向以為麋色青近青祥也麋之為言迷也蓋牝獸之淫者也是時嚴公將取齊之淫女其象先見天戒若曰勿取齊女淫而迷國嚴不寤遂取之夫人既入淫於二叔終皆誅死師古曰謂慶父縊死叔牙鴆卒齊人殺哀姜也幾亡社稷師古曰謂子般閔公前後見殺而齊侯欲取魯國也董仲舒指畧同京房易傳曰廢正作淫大不明國多麋又曰震遂泥李竒曰從三至五有坎象坎為水四為泥在水中故曰震遂泥泥者泥溺於水不能自拔道未光也或以為溺於淫女故其妖多麋麋迷也師古曰此易震卦九四爻辭也泥音乃計反厥咎國多麋昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見以問郎中令龔遂遂曰熊山野之獸而來入宫室王獨見之此天戒大王恐宫室將空危亡象也賀不改寤後卒失國左氏傳襄公十七年十一月甲午宋國人逐狾狗師古曰狾狂也音征例反狾狗入於華臣氏師古曰華臣華元之子也國人從之臣懼遂奔陳先是臣兄閱為宋卿師古曰為右師閱卒臣使賊殺閱家宰遂就其妻宋平公聞之曰臣不唯其宗室是暴大亂宋國之政欲逐之左師向戍曰大臣不順國之恥也不如蓋之師古曰向戍宋桓公曾孫也蓋謂覆掩其事也公廼止華臣炕暴失義内不自安故犬禍至以犇亡也髙后八年三月祓霸上師古曰祓者除惡之祭也音廢還過枳道見物如倉狗橶髙后掖師古曰橶謂拘持之也橶音㦸拘音居足反忽而不見卜之趙王如意為祟遂病掖傷而崩先是髙后鴆殺如意支斷其母戚夫人手足㩁其眼以為人彘師古曰㩁謂敲擊去其精也㩁音口角反凡言彘者皆豕之别名文帝後五年六月齊雍城門外有狗生角師古曰雍城門者齊門名也春秋左氏傳平陽之役趙武及}
