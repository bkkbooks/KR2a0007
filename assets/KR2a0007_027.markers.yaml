  - {type: variant, offset: 21, length: 0, content: '', krp: 師古曰炎讀曰燄災宗廟燒宫館雖興師衆弗能救也是為火不炎上春秋桓公十四年八月壬申御廩災董仲舒以為先是四國共伐魯大破之於龍門韋昭曰魯郭門百姓傷者未瘳怨咎未復而君臣俱惰内怠政事外侮四鄰非能保守宗廟終其天年者也故天災御廩以戒之劉向以為御廩夫人八妾所舂米之臧以奉宗廟者也師古曰一娶九女正嫡一人餘者妾也故云八妾}
