  - {type: variant, offset: 145, length: 0, content: '', WYG: 漦化為𤣥黿章昭曰𤣥黑黿蜤蜴也似蛇而有足師古曰黿似鼈而大非蛇及蜤蜴入後宫處妾遇之而孕師古曰處妾宫中之童女生子懼而棄之宣王立女童䚻曰檿弧萁服實亡周國師古曰女童謡閭里之童女為歌謡也檿山桑之有㸃文者也木弓曰弧服盛箭者即今之歩义也萁草似荻而細織之為服也檿音一簟反萁音基荻音敵後有夫婦鬻是器者宣王使執而僇之師古曰鬻賣也音弋六反既去見處妾所棄妖子聞其夜號哀而收之遂亡奔襃後襃人有罪入妖子以贖是為襃姒幽王見而愛之生子伯服王廢申后及太子宜咎而立襃姒伯服代之廢后之父申侯與繒西畎戎共攻殺幽王師古曰畎戎即犬戎亦曰昆夷詩曰赫赫宗周襃姒烕之師古曰小雅正月之詩也赫赫盛貌也宗周鎬京也烕滅也音呼悅反劉向以為夏后季世周之幽厲皆誖亂逆天故有龍黿之怪近龍蛇孽也漦血也一曰沬也檿弧桑弓也萁服蓋以萁草為箭服近射妖也女童䚻者禍將生於女國以兵寇亡也師古曰因婦人以致兵寇也左氏傳昭公十九年龍鬭於鄭時門之外洧淵師古曰時門鄭城門也洧泉洧水之泉也洧水出滎陽密縣東南至潁川長平入潁也劉向以為近龍孽也鄭以小國攝乎晉}
