  - {type: variant, offset: 146, length: 3, content: 佐賈舉, krp: 之間師古曰攝收持也重以彊吳鄭當其衝不能修徳將鬭三國以自危亡師古曰言若不修徳則三國伐之必危亡是時子産任政内惠於民外善辭令以交三國鄭卒亡患能以徳消變之效也京房易傳曰衆心不安厥妖龍鬭惠帝二年正月癸酉旦有兩龍見於蘭陵廷東里温陵井中師古曰蘭陵縣之廷東里也温陵人姓名也至乙亥夜去劉向以為龍貴象而困於庶人井中象諸侯將有幽執之禍其後吕太后幽殺三趙王諸吕亦終誅滅京房易傳曰有徳遭害厥妖龍見井中又曰行刑暴惡黑龍從井出左氏傳魯嚴公時有内蛇與外蛇鬭鄭南門中内蛇死劉向以為近蛇孽也先是鄭厲公劫相祭仲而逐兄昭公代立師古曰厲公母宋廱氏之女也祭仲祭封人仲足也桓十一年宋人執祭仲曰不立突將死仲乃與宋盟而立厲公昭公奔衞祭音側介反後厲公出奔昭公復入師古曰桓十五年厲公與祭仲之壻廱糾謀殺祭仲不克五月出奔蔡六月昭公復歸于鄭}
  - {type: variant, offset: 150, length: 0, content: '', WYG: 月厲公殺檀伯而居櫟也死弟子儀代立師古曰桓十七年高渠彌弑昭公而立其弟子舋十八年齊人殺子舋祭仲乃立舋之弟儀也厲公自外劫大夫傅瑕使僇子儀師古曰傳瑕鄭大夫也莊十四年厲公自櫟侵鄭獲傅瑕與之盟於是傅瑕殺子儀而納厲公此外蛇殺内蛇之象也蛇死六年而厲公立嚴公聞之問申繻曰猶有妖乎師古曰申繻魯大夫也繻音湏對曰人之所忌其氣炎以取之師古曰炎音弋贍反妖由人興也人亡釁焉妖不自作人棄常故有妖師古曰已解于上京房易傳曰立嗣子疑厥妖蛇居國門鬭左氏傳文公十六年夏有蛇自泉宫出師古曰泉宫即泉臺入于國如先君之數劉向以為近蛇孽也泉宫在囿中公母姜氏嘗居之蛇從之出象宫將不居也詩曰維虺維蛇女子之祥師古曰小雅斯干之詩又蛇入國國將有女憂也如先君之數者公母將薨象也秋公母薨公惡之乃毁泉臺夫妖孽應行而自見非見而為害也文不改行循正共御厥罰師古曰共讀曰恭御讀曰禦又讀如本字而作非禮以重其過後二年薨公子遂殺文之二子惡視而立宣公師古曰惡即子赤也視其母弟文公夫人大歸于齊師古曰本齊女故出而歸齊所謂哀姜者也武帝大始四年七月趙有蛇從郭外入與邑中蛇鬭孝文廟下邑中蛇死後二年秋有衞太子事事自趙人}
