  - {type: variant, offset: 2397, length: 14, content: 膠西王膠東王菑川王濟南王趙王, WYG: 周内史叔興曰是何祥也吉凶何在對曰今兹魯多大䘮眀年齊有亂師古曰今兹謂此年君將得諸侯而不終退而告人曰是陰陽之事非吉凶之所生也吉凶繇人吾不敢逆君故也是嵗魯公子季友鄫季姬公孫兹皆卒師古曰僖十六年三月公子季友卒四月季姬卒七月公孫兹卒季姬魯女適鄫者也公孫兹叔孫戴伯也眀年齊桓死適庶亂宋襄公伐齊行伯卒為}
