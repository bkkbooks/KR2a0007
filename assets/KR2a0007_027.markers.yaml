  - {type: variant, offset: 36, length: 0, content: '', krp: 節四年五月山陽濟陰雨雹如雞子深二尺五寸殺二十人蜚鳥皆死其十月大司馬霍禹宗族謀反誅霍皇后廢成帝河平二年四月楚國雨雹大如斧蜚鳥死左傳曰釐公三十二年十二月己卯晉文公卒庚辰將殯于曲沃出絳柩有聲如牛劉向以為近鼓妖也喪凶事聲如牛怒象也將有急怒之謀以生兵革之禍是時秦穆公遣兵襲鄭而不假道還晉大夫先軫謂襄公曰秦師過不假塗請擊之師古曰先軫即原軫遂要崤阸師古曰即今之二崤山也以敗秦師匹馬觭輪無反者服䖍曰觭音竒偶之竒師古曰觭隻也言盡虜獲之觭音居宜反操之急矣師古曰操持也謂執持所虜獲也晉不惟舊而聽虐謀結怨彊國四被秦寇禍流數世凶惡之效也師古曰舊者謂晉襄之父文公本為秦所納而得國是舊恩也虐謀先軫之計也四被秦寇謂魯文二年秦孟明視帥師伐晉三年秦伯伐晉濟河焚舟取王官及郊十年秦伯伐晉取北徵十二年秦伯伐晉取覊馬禍流謂自襄公至厲公凡五君與秦搆難也哀帝建平二年四月乙亥朔御史大夫朱博為丞相少府趙𤣥為御史大夫臨延登受策有大聲如鐘鳴師古曰延入而登殿也漢舊儀云丞相御史大夫初拜皇帝延登親詔也殿中郎吏陛者皆聞焉師古曰陛者謂執兵列於陛側上以問黄門侍郎揚雄李尋尋對曰洪範所謂鼓妖者也師法以為人君不聰為衆所惑空名得進則有聲無形不知所從生其傳曰嵗月日之中則正卿受之今以四月日加辰巳有異是為中焉正卿謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自䝉其咎師古曰期年十二月也蒙猶被也揚雄亦以為鼓妖聽失之象也朱博為人彊毅多權謀宜將不宜相恐有凶惡亟疾之怒師古曰亟急也音居力反八月博𤣥坐為姦謀博自殺𤣥減死論京房易傳曰令不修本下不安金毋故自動若有音史記秦二世元年天無雲而雷劉向以為雷當託於雲猶君託於臣陰陽之合也二世不恤天下萬民有怨畔之心是嵗陳勝起天下畔趙高作亂秦遂以亡一曰易震為雷為貌不恭也史記秦始皇八年河魚大上劉向以為近魚孽也是嵗始皇弟長安君將兵擊趙反死屯留軍吏皆斬遷其民於臨洮師古曰本使長安君擊趙至屯留而謀反作亂故賜長安君死斬其軍吏遷其黔首也屯留上黨縣也臨洮即今之洮州也屯音純洮音土高反明年有嫪毐之誅魚陰類民之象逆流而上者民將不從君令為逆行也其在天文魚星中河而處車騎滿野至于二世暴虐愈甚終用急亡京房易傳曰衆逆同志厥妖河魚逆流上武帝元鼎五年秋蛙與蝦蟇羣鬬師古曰蛙音胡蝸反蝦音遐蟇音麻是嵗四將軍衆十萬征南越師古曰謂伏波將軍路博徳出桂陽下湟水樓船將軍楊僕出豫章下湞水歸義越侯嚴為戈船將軍出零陵下灕水田甲為下瀬將軍下蒼梧開九郡師古曰謂得越地以為南海蒼梧鬱林合浦交趾九真日南珠崖儋耳郡也成帝鴻嘉四年秋雨魚于信都長五寸以下成帝永始元年春北海出大魚長六丈高一丈四枚哀帝建平三年東萊平度出大魚師古曰平度東萊之縣長八丈髙丈一尺七枚皆死京房易傳曰海數見巨魚邪人進賢人疎師古曰數音所角反桓公五年秋螽師古曰螽即阜螽即今之蝩蟲也螽音終蝩音之庸反劉歆以為貪虐取民則螽介蟲之孽也與魚同占劉向以為介蟲之孽屬言不從是嵗公獲二國之聘取鼎易邑師古曰二國宋鄭也宋以郜鼎賂公鄭以泰山之田易許田也興役起城師古曰謂五年夏城祝丘也諸螽略皆從董仲舒說云嚴公二十九年有蜚劉歆以為負蠜也性不食榖食榖為災介蟲之孽師古曰蜚音扶味反蠜音煩劉向以為蜚色青近青眚也非中國所有南越盛暑男女同川澤淫風所生為蟲臭惡師古曰蜚者中國所有非南越之蟲未詳向所說是時嚴公取齊淫女為夫人既入淫於兩叔故蜚至天戒若曰今誅絶之尚及不將生臭惡聞於四方嚴不寤其後夫人與兩叔作亂二嗣以殺師古曰二嗣謂子般及閔公也卒皆被辜師古曰謂二叔哀姜皆不得其死也已解于上董仲舒指略同釐公十五年八月螽劉向以為先是釐有鹹之會後城緣陵師古曰僖十三年公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯于鹹鹹衞地十四年而與諸侯城緣陵緣陵杞邑也是嵗復以兵車為牡丘會使公孫敖帥師及諸侯大夫救徐師古曰十五年公會齊侯宋公陳侯衞侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐公孫敖孟穆伯也諸侯之大夫即所與㑹諸侯也時楚伐徐故救之兵比三年在外師古曰比頻也文公三年秋雨螽于宋劉向以為先是宋殺大夫而無罪師古曰謂僖二十五年經書宋殺其大夫不書名以其無罪有暴虐賦歛之應師古曰謂宋昭公也榖梁傳曰上下皆合言甚師古曰上下皆合螽之多董仲舒以為宋三世内取師古曰三世謂襄公成公昭公也内取於國之大夫也事見公羊傳取讀曰娶大夫專恣殺生不中師古曰中音竹仲反故螽先死而至劉歆以為螽為榖災卒遇賊陰墜而死也八年十月螽時公伐邾取湏朐城郚師古曰湏朐邾邑郚魯邑也事並在文七年朐音鉅俱反郚音吾宣公六年八月螽劉向以為先是時宣伐莒向師古曰事在四年向莒邑也向音餉後比再如齊謀伐萊師古曰謂四年秋及五年春公如齊七年公㑹齊侯伐萊是也十三年秋螽公孫歸父會齊伐莒師古曰事在十二年歸父車門襄仲子也字子家父讀曰甫十五年秋螽宣亡熟嵗數有軍旅襄公七年八月螽劉向以為先是襄興師救陳師古曰謂五年楚伐陳公會晉侯宋公衞侯鄭伯齊太子光救陳也滕子郯子小邾子皆來朝師古曰六年滕子來朝七年郯子小邾子來朝夏城費師古曰亦七年之夏費魯邑也音祕哀公十二年十二月螽是時哀用田賦師古曰言重歛也解在刑法志劉向以為春用田賦冬而螽十三年九月螽十二月螽比三螽虐取於民之效也劉歆以為周十二月夏十月也火星既伏蟄蟲皆畢天之見變因物類之宜不得以螽是嵗再失閏矣周九月夏七月故傳曰火猶西流司厯過也宣公十五年冬蝝生師古曰爾雅曰蝝蝮蜪說者以為螽蝗之類蝮音蒲北反又音服蜪音徒高反劉歆以為蝝螕􅲗之有翼者孟康曰螕􅲗音蚍蜉食榖為災黑眚也董仲舒劉向以為蝝螟始生也一曰螟始生是時民患上力役解於公田師古曰解讀曰懈宣是時初稅畝稅畝就民田畝擇美者稅其什一亂先王制而為貪利故應是而蝝生屬蠃蟲之孽景帝中三年秋蝗先是匈奴寇邊中尉不害將車騎材官士屯代高柳師古曰魏不害武帝元光五年秋螟六年夏蝗先是五將軍衆三十萬伏馬邑欲襲單于也師古曰已解于上是嵗四將軍征匈奴師古曰謂車騎將軍衞青出上谷驃騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門也元鼎五年秋蝗是嵗四將軍征南越師古曰已解于上及西南夷師古曰越馳義侯遺將巴蜀罪人發夜郎兵征西南夷平之開十餘郡師古曰定越地為九郡定西南夷為武都牂柯越嶲沈黎汶山郡凡十四郡元封六年秋蝗先是兩將軍征朝鮮師古曰二年樓船將軍楊僕左將軍荀彘將應募罪人擊之開三郡師古曰武紀云以其地為樂浪臨屯𤣥真番郡是四郡也而此云三蓋傳寫志者誤太初元年夏蝗}
