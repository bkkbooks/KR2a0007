  - {type: variant, offset: 110, length: 5, content: 彭越相保漢, WYG: 彊楚爭盟師古曰子魚公子目夷也桓公之子而為司馬争盟謂為鹿上之盟以求諸侯於楚子魚諫曰小國爭盟禍也公不聽之後六年為楚所執師古曰僖二十一年楚執宋公以伐宋距六鶂退飛凡六年應六鶂之數云京房易傳曰潛龍勿用師古曰乾初九爻辭衆逆同志至徳廼潛厥異風其風也行不解物不長師古曰不解物謂物逢之而不解散也不長所起者近也雨小而傷政悖徳隐兹謂亂厥風先風不雨大風暴起發屋折木守義不進兹謂耄厥風與雲俱起折五榖莖臣易上政兹謂不順厥風大猋發屋師古曰猋疾風也音必遥反賦歛不理兹謂禍厥風絶經緯如淳曰有所破壞絶匹帛之屬也晉灼曰南北為經東西為緯絲因風暴亂不端理也止即温温即蟲侯専封兹謂不綂厥風疾而樹不揺榖不成辟不思道利兹謂無澤師古曰道讀曰導不思導示於下而安利之厥風不揺木旱無雲傷禾公常於利兹謂亂師古曰公上爵也常於利謂心常求利也厥風微而温生蟲蝗害五榖棄正作淫兹謂惑厥風温螟蟲起害有益人之物侯不朝兹謂叛厥風無恒地變赤而殺人文帝二年六月淮南}
