  - {type: variant, offset: 69, length: 0, content: '', krp: 出酒泉征和三年貳師七萬人沒不還平帝元始二年秋蝗徧天下是時王莽秉政左氏傳曰嚴公八年齊襄公田于貝丘師古曰貝丘齊地見豕從者曰公子彭生也公怒曰射之豕人立而嗁公懼墜車傷足喪屨劉向以為近豕禍也先是齊襄淫於妹魯桓公夫人使公子彭生殺桓公又殺彭生以謝魯公孫無知有寵於先君襄公絀之師古曰無知僖公弟夷仲年之子也於襄公從父昆弟先君即僖公無知帥怨恨之徒攻襄於田所師古曰怨恨之徒謂連稱管至父久戍葵丘也襄匿其戸間足見於戸下遂殺之傷足喪屨卒死於足虐急之效也昭帝元鳳元年燕王宫永巷中豕出圂壞都竈師古曰圂者養豕之牢也都竈烝炊之大竈也圂音胡頓反銜其鬴六七枚置殿前晉灼曰鬴古文釡字劉向以為近豕禍也時燕王旦與長公主左將軍謀為大逆誅殺諫者暴急無道竈者生養之本豕而敗竈陳鬴於庭鬴竈將不用宫室將廢辱也燕王不改卒伏其辜京房易傳曰衆心不安君政厥妖豕入居室史記魯襄公二十三年榖洛水鬬將毁王宫劉向以為近火沴水也周靈王將擁之有司諫曰不可長民者不崇藪不墮山不防川不竇澤師古曰長民為民之長也崇聚也藪謂澤之無水者墮毁也防止也竇穴也墮音火規反今吾執政毋乃有所辟服䖍曰音邪辟之辟而滑夫二川之神師古曰滑亂也音骨使至于爭明臣瓚曰明水道也師古曰明謂神靈以防王宫室王而飾之母乃不可乎師古曰言為欲防固王宫使水不得毁故遏飾二川懼及子孫王室愈卑王卒擁之以傳推之以四瀆比諸侯榖洛其次卿大夫之象也師古曰榖洛皆大水故為四瀆之次為卿大夫將分爭以危亂王室也是時世卿專權儋括將有簒殺之謀師古曰儋括儋季之子簡王之孫也簒殺之謀謂除喪服將見靈王過庭而歎曰嗚呼必有此夫如靈王覺寤匡其失政師古曰匡正也懼以承戒則災禍除矣不聽諫謀簡嫚大異師古曰諫謀謂單公子愆旗聞儋括之言恐必為害請殺之王不聽也簡嫚大異謂不憂榖洛任其私心塞埤擁下師古曰埤卑也音婢以逆水勢而害鬼神後}
  - {type: variant, offset: 70, length: 5, content: 百擊楚度白, WYG: 年有黑如日者五是嵗蚤霜靈王崩景王立二年儋括欲殺王而立王弟佞夫佞夫不知景王并誅佞夫師古曰事在襄三十年及景王死五大夫爭權或立子猛或立子朝王室大亂師古曰五大夫謂劉子單子尹氏召伯毛伯也已解于上京房易傳曰天子弱諸侯力政師古曰政亦征也言専以武力相征討一說諸侯之政當以徳禮今王室微弱文教不行遂乃以力為政相攻伐也厥異水鬬史記曰秦武王三年渭水赤者三日昭王三十四年渭水又赤三日劉向以為近火沴水也秦連相坐之法棄灰於道者黥孟康曰商鞅為政以棄灰於道必坋人坋人必鬬故設黥刑以絶其原也臣瓚曰棄灰或有火火則燔廬舍故刑之也師古曰孟說是也坋音蒲頓反罔密而刑虐加以武伐横出殘賊鄰國至於變亂五行氣色謬亂天戒若曰勿為刻急將致敗亡秦遂不改至始皇滅六國二世而亡昔三代居三河河洛出圖書師古曰謂夏都安邑即河東也殷都朝歌即河内也周都洛陽即河南也秦居渭陽而渭水數赤瑞異應徳之效也京房易傳曰君湎于酒師古曰湎流也音莫踐反淫于色賢人潛國家危厥異流水赤也前漢書卷二十七中之下前漢書卷二十七中之下考證五行志中之下在於眚祥眚監本訛青從宋本改正南方喙為鳥星喙監本訛啄臣浩按天文志柳為鳥喙從宋本改正郡國有以為便宜者臣召南按孝武紀作郡國有以為便者無宜字惟先假王正厥事假古文作格孔傳曰言至道之王先是大夫華元出奔晉注師古曰事在成十五年舊本作襄十七年非也今從汲古閣本改正京房易傳曰歸獄不解獄監本訛獄從宋本改正是嵗四將軍征匈奴注驃騎將軍公孫敖出代臣召南按公孫敖為騎將軍非驃騎將軍也驃字衍前漢書卷二十七中之下考證欽定四庫全書前漢書卷二十七下之上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注五行志第七下之上傳曰思心之不䜭是謂不聖厥咎霿師古曰霿音莫豆反厥罰恒風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黄眚黄祥時則有金木水火沴土思心之不䜭是謂不聖思心者心思慮也䜭寛也孔子曰居上不寛吾何以觀之哉師古曰論語載孔子之言言上不寛大包容臣下則不能居聖位貌言視聽以心為主四者皆失則區霿無識師古曰區音口豆反故其咎霿也雨旱寒奥亦以風為本師古曰奥音於六反四氣皆亂故其罰常風也常風傷物故其極凶短折也傷人曰凶禽獸曰短􅋄木曰折師古曰􅋄古草字一曰凶夭也兄喪弟曰短父喪子曰折在人腹中肥而包裏心者脂也心區霿則㝠晦故有脂夜之妖師古曰脂妖及夜妖一曰有脂物而夜為妖若脂水夜汙人衣淫之象也一曰夜妖者雲風並起而杳㝠故與常風同象也温而風則生螟螣師古曰螣音徒得反有祼蟲之孽師古曰祼亦臝字也從衣果聲劉向以為於易巽為風為木卦在三月四月繼陽而治主木之華實風氣盛至秋冬木復華故有華孽一曰地氣盛則秋冬復華一曰華者色也土為内事為女孽也於易坤為土為牛牛大心而不能思慮思心氣毁故有牛禍一曰牛多死及為怪亦是也及人則多病心腹者故有心腹之痾土色黄故有黄眚黄祥凡思心傷者病土氣土氣病則金木水火沴之故曰時則有金木水火沴土不言惟而獨曰時則有者非一衝氣所沴明其異大也其極曰凶短折順之其福曰考終命師古曰壽考而終其命劉歆思心傳曰時則有臝蟲之孽謂螟螣之屬也庶徵之常風劉向以為春秋無其應釐公十六年正月六鶂退蜚過宋都師古曰鶂音五狄反左氏傳曰風也劉歆以為風發於它所至宋而高鶂高蜚而逢之則退經以見者為文故記退蜚傳以實應著言風常風之罰也象宋襄公區霿自用不容臣下逆司}
