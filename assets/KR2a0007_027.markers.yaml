  - {type: variant, offset: 26, length: 0, content: '', WYG: 天漢元年發適民師古曰適讀曰讁二年夏三將軍征匈奴師古曰謂貳師將軍三萬騎出酒泉因杅將軍出西河騎都尉李陵將歩兵五千人出居延北也李陵沒不還征和元年夏大旱是嵗發三輔騎士閉長安城門大搜始治巫蠱明年衞皇后太子敗昭帝始元六年大旱先是大鴻臚田廣明征益州暴師連年宣帝本始三年夏大旱東西數千里先是五將軍衆二十萬征匈奴師古曰本始三年御史大夫田廣明為祁連將軍後將軍趙充國為蒲類將軍雲中太守田順為武牙將軍及度遼將軍范明友前將軍韓増凡五將軍兵十五萬騎校尉常恵特節護烏孫兵咸擊匈奴是為二十萬衆也神爵元年秋大旱是嵗後將軍趙充國征西𦍑成帝永始三年四年夏大旱左氏傳晉獻公時童謡曰丙之晨龍尾伏辰袀服振振取虢之旂師古曰徒歌曰謡袀服黑衣振振袀服之貌也袀音均又音弋春反振音只人反鶉之賁賁天策焞焞火中成軍虢公其犇師古曰賁音奔焞音吐敦反又音敦是時虢為小國介夏陽之阸怙虞國之助師古曰介隔也亢衡於晉有炕陽之節失臣下之心晉獻伐之問於卜偃曰吾其濟虖師古曰卜偃晉大夫主卜者偃以童謡對曰克之十月朔丙子旦曰在尾月在策鶉火中必此時也冬十二月丙子朔晉師滅虢虢公醜犇周周十二月夏十月也言天者以夏正史記晉惠公時童謡曰恭太子更葬兮後十四年晉亦不昌昌廼在其兄是時惠公賴秦力得立立而背秦内殺二大夫師古曰謂里克丕鄭國人不說及更葬其兄恭太子申生而不敬故詩妖作也後與秦戰為秦所獲立十四年而死晉人絶之更立其兄重耳是為文公遂伯諸侯左氏傳文成之世童謡曰鸜之鵒之公出辱之師古曰鸜音劬鵒音欲鸜鵒之羽公在外野徃饋之馬鸜鵒跦跦公在乾侯臣瓉曰乾侯在魏郡斥丘縣師古曰跦跦跳行貌也跦音誅乾音干徵褰與􅃭師古曰徵求也褰袴也言公出外求袴􅃭之服鸜鵒之巢逺哉揺揺師古曰揺揺不安之貌禂父喪勞宋父以驕師古曰父讀曰甫甫者男子之通號故云禂父宋父也言昭公欲去季氏不遂而出故曰喪勞}
