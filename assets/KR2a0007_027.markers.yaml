  - {type: 'tls:seg', offset: 151, content: '', id: KR2a0007_tls_027-3a.8}
  - {type: variant, offset: 151, length: 3, content: 迎英布, WYG: 充起左氏傳定公十年宋公子地有白馬駟師古曰地宋元公子也四馬曰駟公嬖向魋欲之師古曰公謂景公即地之兄也魋宋司馬桓魋也向音式尚反魋音大回反公取而朱其尾鬛師古曰鬛領上鬛也音力渉反以予之地怒使其徒抶魋而奪之師古曰抶擊也音丑失反魋懼將走公閉門而泣之目盡腫公弟辰謂地曰子為君禮不過出竟君必止子師古曰辰亦元公子也言若見君怒懼而出奔是為臣之禮也竟讀曰境地出奔陳公弗止辰為之請不聽辰曰是我迋吾兄也師古曰迋欺也音求往反吾以國人出君誰與處遂與其徒出奔陳明年俱入于蕭以叛大為宋患師古曰蕭宋邑近馬禍也史記秦孝公二十一年有馬生人昭王二十年牡馬生子而死劉向以為皆馬禍也孝公始用商君攻守之法東侵諸侯至於昭王用}
