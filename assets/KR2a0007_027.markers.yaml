  - {type: variant, offset: 22, length: 0, content: '', krp: 夫人有淫行師古曰謂通於齊侯挾逆心師古曰謂欲弑桓公天戒若曰夫人不可以奉宗廟桓不寤與夫人俱㑹齊師古曰十八年春公㑹齊侯于濼公與夫人姜氏遂如齊也夫人譖桓公於齊侯師古曰言世子同非吾子齊侯之子齊侯殺桓公師古曰齊侯享公公醉使公子彭生乘公拉其幹而殺之公薨于車劉歆以為御廪公所親耕籍田以奉粢盛者也師古曰黍稷曰粢在器曰盛也棄法度亡禮之應也嚴公二十年夏齊大災師古曰嚴公謂莊公也避明帝諱故改曰嚴凡漢書載諡姓為嚴者皆類此劉向以為齊桓好色聽女口以妾為妻適庶數更師古曰更改也桓公之夫人三王姬徐嬴蔡姬皆無子而桓公好内多寵内嬖如夫人者六人長衞姬生公子無虧即武孟也少衞姬生恵公鄭姬生孝公葛嬴生昭公密姬生懿公宋華子生公子雍公與管仲屬孝公於宋襄公以為太子易牙有寵於衞恭姬因侍人貂以薦羞於公請立武孟公許之管仲卒五公子皆求立適讀曰嫡下亦同數音所角反故致大災桓公不寤及死適庶分爭九月不得葬師古曰魯僖十七年齊桓公卒易牙入因内寵以殺羣吏立無虧孝公奔宋十八年齊立孝公不勝四公子之徒遂與宋人戰敗齊師于甗立孝公而還八月葬桓公是為過於九月乃得葬也公羊傳曰大災疫也董仲舒以為魯夫人淫於齊齊桓姊妹不嫁者七人國君民之父母夫婦生化之本本傷則末夭故天災所予也李竒曰以為疫殺其民人釐公二十年五月乙巳西宫災師古曰釐讀曰僖後皆類此榖梁以為愍公宫也以諡言之則若疏故謂之西宫劉向以為釐立妾母為夫人以入宗廟師古曰僖公之母謂成風也本非正嫡僖既為君而母遂同夫人禮文四年經書夫人風氏薨五年王使榮叔歸含且賵是也故天災愍宫若曰去其卑而親者將害宗廟之正禮師古曰愍公於僖公為弟故云卑董仲舒以為釐娶於楚而齊媵之脅公使立以為夫人師古曰僖公初聘楚女為嫡齊女為媵時齊先致其女脅魯使立為夫人事見公羊穀梁傳西宫者小寢夫人之居也若曰妾何為此宫誅去之意也以天災之故大之曰西宫也左氏以為西宫者公宫也言西知有東東宫太子所居言宫舉國皆災也宣公十六年夏成周宣榭火師古曰公羊經曰成周洛陽也榭者所以臧樂器宣其名也董仲舒劉向以為十五年王札子殺召伯毛伯師古曰王札子即王子㨗也召伯毛伯周二大夫也召讀曰邵後皆類此天子不能誅天戒若曰不能行政令何以禮樂為而臧之左氏經曰成周宣榭火人火也人火曰火天火曰災榭者講武之坐屋成公三年二月甲子新宫災榖梁以為宣宫不言諡恭也劉向以為時魯三桓子孫始執國政宣公欲誅之恐不能使大夫公孫歸父如晉謀未反宣公死三家譖歸父於成公成公父䘮未葬聽讒而逐其父之臣使奔齊師古曰三桓謂孟孫叔孫季孫三家俱出桓公之子也公孫歸父東門襄仲之子也歸父欲去三桓以張公室與宣公謀而聘于晉欲以晉人去之而宣公薨成公即位季文子及臧宣叔乃逐東門氏歸父還復命於介遂出奔齊故天災宣宫明不用父命之象也一曰三家親而亡禮猶宣公殺子赤而立師古曰赤文公太子即子惡也宣公文公之庶子襄仲殺赤而立宣公亡禮而親天災宣廟欲示去三家也董仲舒以為成居䘮亡哀戚心數興兵戰伐師古曰謂元年作丘甲二年季孫行父帥師㑹晉郤克及齊侯戰于鞌三年叔孫僑如帥師圍棘故天災其父廟示失子道不能奉宗廟也一曰宣殺君而立不當列於羣祖也襄公九年春宋炎劉向以為先是宋公聽讒逐其大夫華弱出奔魯師古曰華弱華耦之孫也與樂轡少相狎長相優又相謗轡以弓梏弱于朝宋平公怒逐之遂來奔事在襄六年左氏傳曰宋災樂喜為司城師古曰司城本司空避武公之諱故改其官為司城先使火所未至徹小屋師古曰恐火及之故徹去塗大屋師古曰大屋難徹故以泥塗之令火至不可焚陳畚輂應劭曰畚草籠也讀與本同輂所以輿土也師古曰輂居玉反具綆缶師古曰綆汲索也缶即盎也綆音工杏反備水器師古曰罃甕之屬也許氏説文解字曰罃備火今之長頸瓶也畜水潦積土塗師古曰潦行潦也畜讀曰蓄蓄謂障遏聚之也塗泥也繕守備師古曰繕謂補修之也修守禦之備恐因火有它故也表火道師古曰火之所起之道皆立摽記也儲正徒師古曰儲偫也正徒役徒也偫音丈紀反郊保之民使奔火所師古曰郊保之人謂郊野之外保聚者也使奔火所共救災也又飭衆官各慎其職師古曰飭讀與敕同晉侯聞之問士弱曰師古曰士弱晉大夫士莊伯宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出入火師古曰咮音竹救反是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閱其􅫚敗之釁必始於火是以知有天道公曰可必乎對曰在道國亂亡象不可知也韋昭曰大亂之君天不復告故無象説曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星宋祁曰咮邵本作啄鳥首正在南方則用火季秋星入則止火以順天時救民疾帝嚳則有祝融堯時有閼伯民賴其德死則以為火祖配祭火星故曰或食於心或食於咮也相土商祖契之曾孫師古曰契讀曰偰音先列反字或作卨其用同耳據諸典籍相土即卨之孫今云曾孫未詳其意代閼伯後主火星宋其後也世司其占故先知火災賢君見變能脩道以除凶亂君亡象天不譴告故不可必也三十年五月甲午宋災董仲舒以為伯姬如宋五年宋恭公卒師古曰伯姬魯宣公女恭姬也成九年歸于宋十五年而宋公卒今云如宋五年則是傳寫誤伯姬幽居守節三十餘年又憂傷國家之患禍積隂生陽故火生災也劉向以為先是宋公聽讒而殺太子痤師古曰座宋平公太子也寺人惠牆伊戾讚太子云與楚客盟平公殺之事在襄二十六年痤音在戈反應火不炎上之罰也左氏傳昭公六年六月丙戌鄭災是春三月鄭人鑄刑書士文伯曰火見鄭其火乎師古曰士文伯晉大夫伯瑕也火未出而作火以鑄刑器臧爭辟焉師古曰鑄刑於鼎故稱刑器法設下爭故云爭辟火而象之不火何為説曰火星出於周五月而鄭以三月作火鑄鼎刻刑辟書以為民約是為刑器爭辟故火星出與五行之火爭明為災其象然也又棄法律之占也不書於經時不告魯也九年夏四月陳火師古曰公羊經董仲舒以為陳夏徵舒殺君楚嚴王託欲為陳討賊陳國闢門而待之至因滅陳師古曰夏徵舒陳卿夏南即少西氏也徵舒之母通於靈公靈公飲酒于夏氏徵舒射而殺之楚子為夏氏亂故伐陳謂陳人無動將討於少西氏遂入陳殺夏徵舒轘諸栗門因縣陳事在宣公十一年劉敝曰予按昭九年夏徵舒事且六十歲矣仲舒之言一何謬乎陳臣子尤毒恨甚極隂生陽故致火災劉向以為先是陳侯弟招殺陳太子偃師師古曰招謂陳哀公之弟偃師即哀公子也哀公有廢疾招殺太子而立公子留事在昭八年招音韶皆外事不因其宫館者略之也八年十月壬午楚師滅陳師古曰莊王初雖縣陳納申叔時之諫乃復封陳至此時陳又為楚靈王所滅春秋不與蠻夷滅中國故復書陳火也師古曰九年火時陳已為楚縣猶追書陳國者以楚蠻夷不許其滅中夏之國左氏經曰陳災傳曰鄭禆竈曰五年陳將復封師古曰禆竈鄭大夫封五十二年而遂亡子産問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五成故曰五年歲五及鶉火而後陳卒亡楚克有之天之道也説曰顓頊以水王陳其族也師古曰陳舜後也舜本出顓頊今兹歳在星紀後五年在大梁大梁昴也金為水宗得其宗而昌故曰五年陳將復封楚之先為火正故曰楚所相也天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而合而隂陽易位故曰妃以五成然則水之大數六火七木八金九土十故水以天一為火二牡木以天三為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽竒為牡隂耦為妃師古曰竒音居宜反故曰水火之牡也火水妃也於易坎為水為中男離為火為中女蓋取諸此也自大梁四歲而及鶉火四周四十八歲凡五及鶉火五十二年而陳卒亡火盛水衰故曰天之道也哀公十七年七月己卯楚滅陳昭十八年五月壬午宋衞陳鄭災董仲舒以為象王室將亂天下莫救故災四國言亡四方也又宋衞陳鄭之君皆荒淫於樂不恤國政與周室同行陽失節則火災出是以同日災也劉向以為宋陳王者之後師古曰宋微子啓本出殷陳胡公滿有虞苗裔皆王者之後衞鄭周同姓也師古曰衞康叔文王之子鄭桓公宣王之弟時周景王老劉子單子事王子猛師古曰劉子劉獻公摯也單子穆公旗也皆周大夫也猛景王太子單音善尹氏召伯毛伯事王子鼂師古曰尹氏文公圉也召伯莊公奂也毛伯毛得也皆周大夫也子鼂景王庶子也鼂古朝字子鼂椘之出也師古曰姊妹之子曰出及宋衛陳鄭亦皆外附於楚亡尊周室之心後三年景王崩王室亂故天災四國天戒若曰不救周反從楚廢世子立不正以害王室明同辠也定公二年五月雉門及兩觀災師古曰雉門公宫南門也兩觀謂闕董仲舒劉向以為此皆奢僭過度者也先是季氏逐昭公昭公死于外師古曰謂薨于乾侯定公即位既不能誅季氏又用其邪説淫於女樂而退孔子師古曰齊人歸女樂季桓子勸定公受之君臣相與觀之廢朝禮三日孔子乃行天戒若曰去髙顯而奢僭者一曰門闕號令所由出也今舍大聖而縱有辠亡以出號令矣京房易傳曰君不思道厥妖火燒宫哀公三年五月辛卯桓釐宫災董仲舒劉向以為此二宫不當立違禮者也哀公又以季氏之故不用孔子孔子在陳聞魯災曰其桓釐之宫乎以為桓季氏之所出釐使季氏世卿者也四年六月辛丑亳社災師古曰亳社殷社也董仲舒劉向以為亡國之社所以為戒也師古曰存其社者欲使君常思敬慎懼危亡也天戒若曰國將危亡不用戒矣春秋火災屢於定哀之間不用聖人而縱驕臣將以亡國不明甚也一曰天生孔子非為定哀也蓋失禮不明火災應之自然象也髙后元年五月丙申趙叢臺災劉向以為是時吕氏女為趙王后嫉妬將為讒口以害趙王王不寤焉卒見幽殺恵帝四年十月乙亥未央宫凌室災師古曰臧氷之室也丙子織室災師古曰織作之室劉向以為元年吕太后殺趙王如意殘戮其母戚夫人是歲十月壬寅太后立帝姊魯元公主女為皇后其乙亥凌室災明日織室災凌室所以供養飲食織室所以奉宗廟衣服與春秋御廩同義天戒若曰皇后亡奉宗廟之德將絶祭祀其後皇后亡子後宫美人有男太后使皇后名之而殺其母恵帝崩嗣子立有怨言太后廢之更立吕氏子𢎞為少帝賴大臣共誅諸吕而立文帝恵后幽廢文帝七年六月癸酉未央宫東闕罘罳災師古曰罘罳闕之屏也解具在文紀劉向以為東闕所以朝諸侯之門也罘罳在其外諸侯之象也漢興大封諸侯王連城數十文帝即位賈誼等以為違古制度必將叛逆先是濟北淮南王皆謀反其後吳楚七國舉兵而誅景帝中五年八月己酉未央宫東闕災先是栗太子廢為臨江王師古曰景帝太子栗姬所生謂之栗太子以罪徵詣中尉自殺丞相條侯周亞夫以不合㫖稱疾免後二年下獄死武帝建元六年六月丁酉遼東髙廟災四月壬子髙園便殿火董仲舒對曰春秋之道舉往以明來是故天下有物視春秋所舉與同比者師古曰比類也音必寐反精微眇以存其意通倫類以貫其理天地之變國家之事粲然皆見亡所疑矣按春秋魯定公哀公時季氏之惡已孰師古曰孰成也而孔子之聖方盛夫以盛聖而易孰惡季孫雖重魯君雖輕其勢可成也故定公二年五月兩觀災兩觀僭禮之物師古曰兩觀天子之制也天災之者若曰僭禮之臣可以去已見辠徵而後告可去此天意也定公不知省至哀公三年五月桓宫釐宫災二者同事所為一也若曰燔貴而去不義云爾師古曰燔音煩哀公未能見故四年六月毫社災兩觀桓釐廟亳社四者皆不當立天皆燔其不當立者以示魯欲其去亂臣而用聖人也季氏亡道久矣前是天不見災者魯未有賢聖臣雖欲去季孫其力不能昭公是也師古曰前是謂此時之前也見顯示也音胡電反以下並同至定哀廼見之其時可也不時不見天之道也今髙廟不當居遼東髙園殿不當居陵旁於禮亦不當立與魯所災同其不當立久矣至於陛下時天廼災之者殆亦其時可也昔秦受亡周之敝而亡以化之漢受亡秦之敝又亡以化之夫繼二敝之後承其下流兼受其猥難治甚矣師古曰猥積也謂積敝也又多兄弟親戚骨肉之連驕揚奢侈師古曰揚謂振揚張大也恣睢者衆服䖍曰自恣意怒貎也師古曰睢音呼季反所謂重難之時者也陛下正當大敝之後又遭重難之時甚可憂也故天災若語陛下當今之世雖敝而重難非以太平至公不能治也視親戚貴屬在諸侯逺正冣甚者忍而誅之師古曰逺離也謂離正道者也如吾燔遼東髙廟廼可視近臣在國中處旁仄及貴而不正者忍而誅之師古曰仄古側字如吾燔髙園殿廼可云爾在外而不正者雖貴如髙廟猶災燔之况諸侯乎在内不正者雖貴如髙園殿猶燔災之况大臣乎此天意也辠在外者天災外辠在内者天災内燔甚辠當重燔簡辠當輕承天意之道也先是淮南王安入朝始與帝舅太尉武安侯田蚡有逆言其後膠西于王趙敬肅王常山憲王皆數犯法或至夷滅人家藥殺二千石而淮南衡山王遂謀反膠東江都王皆知其謀隂治兵弩欲以應之至元朔六年廼發覺而伏辜時田蚡已死不及誅上思仲舒前言使仲舒弟子吕步舒持斧鉞治淮南獄以春秋誼顓斷於外不請師古曰顓與專同不請者不待奏報既還奏事上皆是之太初元年十一月乙酉未央宫柏梁臺災先是大風發其屋夏侯始昌先言其災日後有江充巫蠱衞太子事征和二年春涿郡鐵官鑄鐵鐵銷皆飛上去宋祁曰鐵鐵疑作錢錢此火為變使之然也其三月涿郡太守劉屈釐為丞相後月巫蠱事興帝女諸邑公主陽石公主師古曰諸琅邪之縣也公主所食曰邑故謂之諸邑陽石北海之縣字亦作羊丞相公孫賀子太僕敬聲平陽侯曹宗等皆下獄死七月使者江充掘蠱太子宫太子與母皇后議恐不能自明乃殺充舉兵與丞相劉屈釐戰死者數萬人太子敗走至湖自殺師古曰湖縣名也即今閿鄉湖城二縣界明年屈釐復坐祝􅀈要斬師古曰􅀈古詛字也音側據反妻梟首也成帝河平二年正月沛郡鐵官鑄鐵鐵不下宋祁曰作錢錢不下隆隆如雷聲又如鼓音工十三人驚走音止還視地地陷數尺鑪分為十一鑪中銷鐵散如流星皆上去與征和二年同象其夏帝舅五人封列侯號五侯師古曰譚商立根逢時凡五人元舅王鳳為大司馬大將軍秉政後二年丞相王商與鳳有隙鳳譖之免官自殺明年京兆尹王章訟商忠直言鳳顓權鳳誣章以大逆罪下獄死妻子徙合浦後許皇后坐巫蠱廢而趙飛燕為皇后妹為昭儀賊害皇子成帝遂亡嗣皇后昭儀皆伏辜一曰鐵飛屬金不從革昭帝元鳳元年燕城南門災劉向以為時燕王使邪臣通於漢為讒賊謀逆亂南門者通漢道也天戒若曰邪臣往來為姦讒於漢絶亡之道也燕王不寤卒伏其辜元鳳四年五月丁丑孝文廟正殿災劉向以為孝文太宗之君與成周宣榭火同義先是皇后父車騎將軍上官安安父左將軍桀謀為逆大將軍霍光誅之皇后以光外孫年少不知居位如故光欲后有子因上侍疾醫言禁内後宫皆不得進唯皇后顓寢皇后年六歲而立十三年而昭帝崩遂絶繼嗣光執朝政猶周公之攝也是歲正月上加元服師古曰謂冠也通詩尚書有明悊之性光亡周公之德秉政九年久於周公上既已冠而不歸政將為國害故正月加元服五月而災見古之廟皆在城中孝文廟始出居外天戒若曰去貴而不正者宣帝既立光猶攝政驕溢過制至妻顯殺許皇后光聞而不討後遂誅滅宣帝甘露元年四月丙申中山太上皇廟災甲辰孝文廟災元帝初元三年四月乙未孝武園白鶴館災劉向以為先是前將軍蕭望之光祿大夫周堪輔政為佞臣石顯許章等所譖望之自殺堪廢黜明年白鶴館災園中五里馳逐走馬之館師古曰五里者言其周廻五里不當在山陵昭穆之地天戒若曰去貴近逸遊不正之臣將害忠良後章坐走馬上林下烽馳逐免官孟康曰夜於上林苑下舉火馳射也烽或作㷭晉灼曰冠首曰烽競走曰逐師古曰孟説是永光四年六月甲戌孝宣杜陵園東闕南方災劉向以為先是上復徵用周堪為光祿勲及堪弟子張猛為大中大夫石顯等復譖毁之皆出外遷是歲上復徵堪領尚書猛給事中石顯等終欲害之園陵小於朝廷闕在司馬門中内臣石顯之象也孝宣親而貴門闕法令所從出也天戒若曰去法令内臣親而貴者必為國害後堪希得進見因顯言事事決顯口堪病不能言顯誣告張猛自殺於公車成帝即位顯卒伏辜成帝建始元年正月乙丑皇考廟災初宣帝為昭帝後而立父廟於禮不正是時大將軍王鳳顓權擅朝甚於田蚡將害國家故天於元年正月而見象也其後􅐛盛師古曰􅐛古浸字浸漸也五將世權遂以亡道孟康曰謂王五大司馬也師古曰謂鳳音商根莽也鴻嘉三年八月乙卯孝景廟北闕災十一月甲寅許皇后廢永始元年正月癸丑大官凌室災戊午戾后園南闕災是時趙飛燕大幸許后既廢上將立之故天見象於凌室與恵帝四年同應戾后衞太子妄遭巫蠱之􅫚宣帝既立追加尊號於禮不正又戾后起於微賤與趙氏同應天戒若曰微賤亡徳之人不可以奉宗廟將絶祭祀有凶惡之􅫚至其六月丙寅趙皇后遂立姊妹驕妒賊害皇子卒皆受誅永始四年四月癸未長樂宫臨華殿及未央宫東司馬門災六月甲午孝文霸陵園東闕南方災長樂宫成帝母王太后之所居也未央宫帝所居也霸陵太宗盛徳園也是時太后三弟相續秉政師古曰謂陽平侯鳳安陽侯音成都侯商相代為大司馬舉宗居位充塞朝廷兩宫親屬將害國家師古曰謂太后家王氏皇后家趙氏故云兩宫親屬故天象仍見師古曰仍重也明年成都侯商薨弟曲陽侯根代為大司馬秉政後四年根乞骸骨薦兄子新都侯莽自代遂覆國焉哀帝建平三年正月癸卯桂宫鴻寧殿災帝祖母傅太后之所居也時傅太后欲與成帝母等號齊尊大臣孔光師丹等執政以為不可太后皆免官爵遂稱尊號後三年帝崩傅氏誅滅平帝元始五年七月己亥髙皇帝原廟殿門災盡師古曰原廟重廟也髙皇帝廟在長安城中後以叔孫通譏複道故復起原廟於渭北非正也是時平帝㓜成帝母王太后臨朝委任王莽將簒絶漢墮髙祖宗廟師古曰墮毁也音火規反故天象見也其冬平帝崩明年莽居攝因以簒國後卒夷滅傳曰治宫室飾臺榭師古曰臺有室曰榭内淫亂犯親戚侮父兄則稼穡不成説曰土中央生萬物者也其於王者為内事宫室夫婦親屬亦相生者也古者天子諸侯宫廟大小髙卑有制后夫人媵妾多少進退有度九族親疏長㓜有序孔子曰禮與其奢也寧儉師古曰論語載孔子之言也若不得禮之中而失於奢則不如儉故禹卑宫室師古曰論語載孔子曰禹吾無間然矣卑宫室而盡力於溝洫謂勤於治水而所居狹陋也文王刑于寡妻師古曰大雅思齊之詩云刑于寡妻至于兄弟以御于家邦刑法也寡妻謂正嫡也御治也此美文王以禮法接待其妻旁及兄弟宗族又廣以政教治家邦此聖人之所以昭教化也如此則土得其性矣若廼奢淫驕慢則土失其性有水旱之災而草木百榖不孰是為稼穡不成嚴公二十八年冬大水亡麥禾董仲舒以為夫人哀姜淫亂師古曰哀姜莊公夫人齊女也逆隂氣故大水也劉向以為水旱當書不書水旱而曰大亡麥禾者土氣不養稼穡不成者也是時夫人淫於二叔内外亡别師古曰二叔謂莊公二弟仲慶父及叔牙又因凶饑一年而三築臺師古曰謂三十一年春築臺于郎夏築臺于薛秋築臺于秦也郎薛秦皆魯地也故應是而稼穡不成飾臺榭内淫亂之罸云遂不改寤四年而死師古曰莊公三十二年薨距大水無麥禾凡四歲也旤流二世師古曰謂子般及閔公皆殺死奢淫之患也傳曰好戰攻輕百姓飾城郭侵邊境則金不從革説曰金西方萬物既成殺氣之始也故立秋而鷹隼擊秋分而微霜降其於王事出軍行師把旄杖鉞誓士衆抗威武所以征畔逆止暴亂也詩云有䖍秉鉞如火烈烈師古曰商頌長發之詩也䖍固也此美殷湯興師出征固持其鉞以誅有罪威力猛盛如火熾烈又曰載戢干戈載櫜弓矢師古曰周頌時邁之詩也戢聚也櫜韜也言天下太平兵不復用故戢歛而韜藏也動靜應誼説以犯難民忘其死師古曰言以和悦使人雖犯危難不顧其生也易兌卦彖曰説以犯難人忘其死故引之也説讀曰悦如此則金得其性矣若廼貪欲恣雎師古曰睢音呼季反務立威勝不重民命則金失其性蓋工冶鑄金鐵金鐵冰滯涸堅不成者衆師古曰涸讀與沍同沍凝也音下故反春秋左氏傳曰固隂沍寒劉敞曰冰音凝及為變怪是為金不從革左氏傳曰昭公八年春石言於晉晉平公問於師曠師古曰晉掌樂大夫對曰石不能言神或馮焉作事不時怨讟動於民師古曰讟痛怨之言也音讀則有非言之物而言今宫室崇侈民力彫盡怨讟並興莫信其性師古曰信猶保也性生也一説信讀曰申言不得申其性命也石之言不亦宜乎於是晉侯方築虒祁之宫師古曰虒祁地在絳西臨汾水虒音斯叔向曰君子之言信而有徵師古曰叔向晉大夫羊舌肸也劉歆以為金石同類是為金不從革失其性也劉向以為石白色為主屬白祥成帝鴻嘉三年五月乙亥天水冀南山大石鳴師古曰天水之冀縣南山也聲隆隆如雷有頃止聞平襄二百四十里韋昭曰天水縣壄雞皆鳴師古曰雉也石長丈三尺廣厚略等師古曰廣及厚皆知其長旁著岸脅去地二百餘丈民俗名曰石鼓石鼓鳴有兵是歲廣漢鉗子謀攻牢師古曰鉗子謂鉗徒也牢繫重囚之處簒死辠囚鄭躬等盜庫兵劫略吏民衣繡衣自號曰山君黨與􅎊廣明年冬廼伏誅自歸者三千餘人後四年尉氏樊並等謀反殺陳留太守嚴普自稱將軍山陽亡徒蘇令等黨與數百人盜取庫兵經歴郡國四十餘皆踰年廼伏誅是時起昌陵作者數萬人徙郡國吏民五千餘户以奉陵邑作治五年不成乃罷昌陵還徙家師古曰初徙人陪昌陵者令皆還其本居石鳴與晉石言同應師曠所謂民力彫盡傳云輕百姓者也虒祁離宫去絳都四十里昌陵亦在郊壄皆與城郭同占城郭屬金宫室屬土外内之别云傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下説曰水北方終藏萬物者也其於人道命終而形臧精神放越聖人為之宗廟以收魂氣春秋祭祀以終孝道王者即位必郊祀天地禱祈神祗望秩山川懐柔百神亡不宗事師古曰懐來也柔安也謂招來而祭祀之使其安也宗尊也慎其齊戒致其嚴敬鬼神歆饗多獲福助此聖王所以順事隂氣和神人也至發號施令亦奉天時十二月咸得其氣則隂陽調而終始成如此則水得其性矣若廼不敬鬼神政令逆時則水失其性霧水暴出百川逆溢壊鄉邑溺人民及淫雨傷稼穡是為水不潤下京房易傳曰顓事有知誅罰絶理厥災水其水也雨殺人以隕霜大風天黄饑而不損兹謂泰厥災水水殺人辟遏有徳兹謂狂應劭曰辟天子也有徳者雍遏不見用也厥災水水流殺人已水則地生蟲歸獄不解兹謂追非李竒曰歸罪過於民不罪已也張晏曰謂釋有罪之人而歸無辜者也解止也追非遂非也厥水寒殺人追誅不解兹謂不理厥水五榖不收大敗不解兹謂皆隂解舍也王者於大敗誅首惡赦其衆不則皆函隂氣師古曰函讀與含同厥水流入國邑隕霜殺榖宋祁曰榖當作殺桓公元年秋大水董仲舒劉向以為桓弑兄隱公民臣痛隱而賤桓後宋督弑其君師古曰宗華父督為太宰弑殤公事在桓公二年諸侯㑹將討之師古曰謂齊陳鄭也桓受宋賂而歸師古曰謂郜大鼎又背宋諸侯由是伐魯仍交兵結讎伏尸流血百姓愈怨師古曰桓㑹宋公者五與宋公燕人盟已而背盟伐宋宋公燕人怨而求助齊衞助之桓公懼而㑹紀侯鄭伯及四國之師大戰故十三年夏復大水一曰夫人驕淫將弑君隂氣盛桓不寤卒弑死劉歆以為桓易許田不祀周公師古曰許田魯朝宿之邑而有周公别廟桓既簒位遂以許田與鄭而取鄭之祊田故云不祀周公廢祭祀之罰也嚴公七年秋大水亡麥苗董仲舒劉向以為嚴母文姜與兄齊襄公淫共殺桓公嚴釋父讎復取齊女未入先與之淫一年再出㑹於道逆亂臣下賤之之應也十一年秋宋大水董仲舒以為時魯宋比年為乘丘鄑之戰師古曰比年頻年也莊十年公敗宋師于乘丘十一年公敗宋師于鄑乘丘鄑魯地鄑音子移反百姓愁怨隂氣盛故二國俱水劉向以為時宋愍公驕慢睹災不改明年與其臣宋萬博戲婦人在側矜而罵萬萬殺公之應師古曰萬宋大夫也戰敗獲于魯復歸宋又為大夫與愍公博婦人在側萬曰甚矣魯侯之淑魯侯之美天下諸侯宜為君者唯魯侯耳愍公矜此婦人妒其言顧曰此虜也爾虜焉故魯侯之美惡乎至萬怒搏愍公絶其脰而死事在莊十二年二十四年大水董仲舒以為夫人哀姜淫亂不婦隂氣盛也劉向以為哀姜初入公使大夫宗婦見用幣師古曰宗婦同姓之婦也大夫妻及宗婦見夫人者皆令執幣是踰禮也又淫於二叔公弗能禁臣下賤之故是歲明年仍大水劉歆以為先是嚴飾宗廟刻桷丹楹以夸夫人臣瓚曰桷榱也韋昭曰楹柱也師古曰莊公二十三年丹桓宫楹二十四年刻桓宫桷將迎夫人故為盛飾簡宗廟之罰也師古曰簡慢也宣公十年秋大水饑董仲舒以為時比伐邾取邑師古曰比頻也九年秋取根牟公羊傳曰根牟者何邾婁之邑也十年公孫歸父帥師伐邾取繹故云比年也亦見報復兵讎連結百姓愁怨劉向以為宣公殺子赤而立子赤齊出也師古曰赤母姜氏赤死姜氏大歸齊市人皆哭魯人謂之哀姜故懼以濟西田賂齊師古曰宣既即位與齊侯㑹于平州以定其位元年六月齊人取濟西田為立公故以賂齊也邾子貜且亦齊出也師古曰貜且邾文公之子邾定公也亦齊女所生貜音俱碧反又音钁且音子余反而宣比與邾交兵師古曰比頻也臣下懼齊之威創邾之旤師古曰創懲艾也音初亮反皆賤公行而非其正也成公五年秋大水董仲舒劉向以為時成幼弱政在大夫前此一年再用師師古曰成三年春公㑹晉侯宋公衞侯曹伯代鄭秋叔孫僑如帥師圍棘是也明年復城鄆以彊私家師古曰四年城鄆鄆季氏邑音運仲孫蔑叔孫僑如顓㑹宋晉隂勝陽師古曰仲孫蔑孟獻子也成五年春仲孫蔑如宋夏叔孫僑如㑹晉荀首于穀顓與専同専者不禀命於公襄公二十四年秋大水董仲舒以為先是一年齊伐晉襄使大夫帥師救晉師古曰襄二十三年秋齊伐衞遂伐晉八月叔孫豹帥師救晉次于雍楡後又侵齊師古曰二十四年仲孫羯帥師侵齊國小兵弱數敵彊大百姓愁怨隂氣盛劉向以為先是襄慢鄰國是以邾伐其南師古曰十五年邾人伐我南鄙是也齊伐其北師古曰十六年齊人伐我北鄙是也莒伐其東師古曰十二年莒人伐我東鄙是也百姓騷動後又仍犯彊齊也師古曰十八年公㑹晉侯宋公衞侯鄭伯同圍齊二十三年救晉二十四年又侵齊是重犯也大水饑榖不成其災甚也髙后三年夏漢中南郡大水水出流四千餘家四年秋河南大水伊雒流千六百餘家汝水流八百餘家八年夏漢中南郡水復出流六千餘家南陽沔水流萬餘家師古曰沔漢水之上也音彌善反是時女主獨治諸吕相王文帝後三年秋大雨晝夜不絶三十五日藍田山水出流九百餘家燕壊民室八千餘所殺三百餘人先是趙人新垣平以望氣得幸為上立渭陽五帝廟欲出周鼎以夏四月郊見上帝師古曰事並見郊祀志歲餘懼誅謀為逆發覺要斬夷三族是時比再遣公主配單于賂遺甚厚師古曰比頻也髙祖使劉敬奉宗室女翁主為冒頓單于閼氏冒頓死其子老上單于初立文帝復遣宗室女為單于閼氏匈奴愈驕侵犯北邊殺略多至萬餘人漢連發軍征討戍邊元帝永光五年夏及秋大水潁川汝南淮陽廬江雨壊鄉聚民舍及水流殺人先是一年有司奏罷郡國廟是歲又定迭毁師古曰親盡則毁故云迭毁事在韋𤣥成傳罷太上皇孝恵帝寢廟皆無復修通儒以為違古制刑臣石顯用事師古曰石顯宦者故曰刑臣成帝建始三年夏大水三輔霖雨三十餘日郡國十九雨山谷水出凡殺四千餘人壊官寺民舍八萬三千餘所元年有司奏徙甘泉泰畤河東后土于長安南北郊二年又罷雍五畤郡國諸舊祀凡六所前漢書卷二十七上前漢書卷二十七上考證五行志上禹治洪水賜雒書法而陳之洪範是也臣召南按易大傳曰河出圖洛出書聖人則之是言圖書二者皆出于伏羲之世故則之以畫八卦即尚書本文祗云天乃錫禹洪範九疇不云錫禹以洛書亦不云禹因洛書陳洪範也以洛書為洪範始于孔安國書傳而劉歆父子又言之後儒遂依其説登車有和鸞之節注亦以金為鸞鳥而栖衡銜鈴焉銜監本訛衡從宋本改春秋火災屢於定哀之間定哀監本作哀定非也今改正征和二年春涿郡鐵官鑄鐵鐵銷皆飛上去宋祁曰鐵鐵疑作錢錢臣召南按此條及下成帝河平二年正月沛郡鐵官鑄鐵鐵不下其事正同宋祁並疑鑄鐵當作鑄錢非也元狩五年以後令天下非三官錢不行安得有外郡鑄錢之事雖涿郡鐵飛武紀不載而涿郡有鐵官地理志有明文矣至河平沛郡鐵散則孝成紀亦載其事不得疑鐵字為錢字之訛也則土失其性無水旱之災而草木百榖不孰無監本訛有從宋本改嚴公二十八年冬大水亡麥禾董仲舒云云臣召南按經但云大無麥禾三家所同並無大水水字故劉向以屬土不稼穡然玩董仲舒説又似公羊經有大水之文乃今本公羊亦無水字何也於是晉侯方築虒祁之宫注在絳西臨汾縣絳監本訛鋒今改正嚴公七年秋大水亡麥苗苗監本訛田今改正前漢書卷二十七上考證欽定四庫全書前漢書卷二十七中之上漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注五行志第七中之上經曰羞用五事五事一曰貎二曰言三曰視四曰聽五曰思貎曰恭言曰從視曰明聽曰聰思曰䜭應劭曰䜭通也古文作睿恭作肅從作艾師古曰艾讀曰乂乂治也其下亦同明作悊聰作謀應劭曰上聰則下謀故聰為謀也䜭作聖張晏曰䜭通逹以至於聖休徵孟康曰善行之驗也曰肅時雨若應劭曰居上而敬則雨順之艾時陽若應劭曰君政治則陽順之悊時奥若應劭曰悊明也師古曰奥讀曰燠燠温也音於六反謀時寒若聖時風若師古曰凡言時者皆謂行得其道則寒暑風雨以時應而順之咎徵師古曰言惡行之驗曰狂恒雨若僭恒陽若應劭曰僭差僭舒恒奥若急恒寒若霿恒風若服䖍曰霿音人傋霿應劭曰人君瞉霿鄙吝則風不順之也師古曰凡言恒者謂所行者失道則寒暑風雨不時而恒乆為災也霿音莫豆反傋䐨並音構又音寇傳曰貎之不恭是謂不肅厥咎狂厥罰恒雨厥極惡時則有服妖時則有龜孽師古曰孽音魚列反其下並同時則有雞旤師古曰旤與禍同時則有下體生上之痾韋昭曰若牛之足反出背上下欲伐上之禍也師古曰痾音阿時則有青眚青祥李竒曰内曰眚外曰祥唯金沴木服䖍曰沴害也如淳曰沴音拂戾之戾義亦同說曰凡草木之類謂之妖妖猶夭貽言尚微師古曰夭音烏老反蟲豸之類謂之孽師古曰有足謂之蟲無足謂之豸孽則牙孽矣及六畜謂之旤言其著也及人謂之痾痾病貎言􅐛深也甚則異物生謂之眚自外來謂之祥祥猶禎也氣相傷謂之沴沴猶臨莅不和意也每一事云時則以絶之言非必俱至或有或亡或在前或在後也孝武時夏侯始昌通五經善推五行傳以傳族子夏侯勝下及許商皆以教所賢弟子其傳與劉向同唯劉歆傳獨異貎之不恭是謂不肅肅敬也内曰恭外曰敬人君行已體貎不恭怠慢驕蹇則不能敬萬事失在狂易故其咎狂也師古曰狂易謂狂而易其常性上慢下暴則隂氣勝故其罰常雨也水傷百榖衣食不足則姦軌並作故其極惡也一曰民多被刑或形貎醜惡亦是也風俗狂慢變節易度則為剽輕竒怪之服師古曰剽音匹妙反故有服妖水類動故有龜孽如淳曰河魚大上以為魚孽之比於易巽為雞雞有冠距文武之貎不為威儀貎氣毁故有雞旤一曰水嵗雞多死及為怪亦是也上失威儀則下有彊臣害君上者故有下體生於上之痾木色青故有青眚青祥凡貎傷者病木氣木氣病則金沴之衝氣相通也於易震在東方為春為木也兌在西方為秋為金也離在南方為夏為火也坎在北方為冬為水也春與秋日夜分寒暑平是以金木之氣易以相變故貎傷則致秋隂常雨言傷則致春陽常旱也至於冬夏日夜相反寒暑殊絶水火之氣不得相併故視傷常奥聽傷常寒者其氣然也逆之其極曰惡順之其福曰攸好徳孟康曰政不順則致妖順則致福也師古曰攸所也所好者徳也劉歆貎傳曰有鱗蟲之孽羊旤鼻痾說以為於天文東方辰為龍星故為鱗蟲於易兌為羊木為金所病故致羊旤與常雨同應此說非是春與秋氣隂陽相敵木病金盛故能相并唯此一事耳旤與妖痾祥眚同類不得獨異史記師古曰此志凡稱史記者皆謂司馬遷所撰也成公十六年公會諸侯于周單襄公見晉厲公視逺歩高師古曰單襄公周卿士單子朝也晉厲公景公之子也名州蒲單音善告公曰晉將有亂魯侯曰敢問天道也抑人故也對曰吾非瞽史師古曰瞽樂太師史太史焉知天道吾見晉君之容殆必禍者也夫君子目以定體足以從之師古曰體定則目安足之進退皆無違也是以觀其容而知其心矣目以處誼足以歩目師古曰視瞻得其宜行歩中其節也晉侯視逺而足高目不在體而足不歩目其心必異矣目體不相從何以能乆夫合諸侯民之大事也於是虖觀存亡故國將無咎其君在會歩言視聽必皆無讁則可以知徳矣師古曰讁責也無讁謂得其義理無可咎責也視逺曰絶其誼足高曰棄其徳言爽曰反其信師古曰爽差也聽淫曰離其名師古曰淫邪也夫目以處誼足以踐徳師古曰踐履也所履皆徳行也口以庇信師古曰庇覆也言行相覆則為信矣耳以聽名者也故不可不慎偏䘮有咎師古曰茍䘮其一則有咎既䘮則國從之師古曰既盡也若盡䘮之則國亦亡晉侯爽二吾是以云張晏曰視逺一也歩高二也後二年晉人殺厲公凡此屬皆貎不恭之咎云左氏傳桓公十三年楚屈瑕伐羅鬬伯比送之師古曰屈瑕即莫囂也鬬伯比楚大夫羅國名在南郡枝江西還謂其馭曰莫囂必敗師古曰莫囂楚官名也字或作敖其音同舉止高心不固矣師古曰止足也遽見楚子以告師古曰遽速也楚子使賴人追之弗及莫囂行遂無次且不設備師古曰無次不為次列也及羅羅人軍之大敗莫囂縊死釐公十一年周使内史過賜晉惠公命師古曰内史過周大夫晉惠公夷吾也諸侯即位天子則賜命圭以為瑞受玉惰師古曰不敬其事也過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也師古曰無禮則國不立故謂之幹無敬則禮不行故比之於輿不敬則禮不行禮不行則上下昏何以長世二十一年晉惠公卒子懐公立晉人殺之更立文公成公十三年晉侯使郤錡乞師于魯將事不敬師古曰郤錡晉大夫駒伯也乞師欲以伐秦也將事致其君命也錡音牛爾反孟獻子曰郤氏其亡虖師古曰孟獻子仲孫蔑也禮身之幹也敬身之基也師古曰無禮則身不立不敬則身不安也郤子無基且先君之嗣卿也受命以求師將社稷是衞而惰棄君命也不亡何為十七年郤氏亡成公十三年諸侯朝王遂從劉康公伐秦成肅公受脤于社不敬服䖍曰脤祭社之肉也盛以􅜹器故謂之脤師古曰劉康公成肅公皆周大夫也脤讀與􅜹同以出師而祭社謂之宜脤者即宜社之肉也􅜹大蛤也音上忍反劉子曰吾聞之曰民受天地之中以生所謂命也師古曰劉子即康公也中謂中和之氣是以有禮義動作威儀之則以定命也能者養以之福不能者敗以取禍師古曰之往也能養生者則定禮義威儀自致於福不能者則䘮之以取禍亂是故君子勤禮小人盡力勤禮莫如致敬盡力莫如惇篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤應劭曰膰祭肉也師古曰膰音扶元反神之大節也師古曰交神之節今成子惰棄其命矣其不反虖五月成肅公卒成公十四年衞定公享苦成叔寗惠子相師古曰定公名臧苦成叔晉大夫郤犫也晉使郤犫如衞故定公享之惠子衞大夫寗殖也相謂賛相其禮苦成叔敖師古曰敖讀曰傲其下並同寗子曰苦成家其亡虖古之為享食也以觀威儀省旤福也師古曰食讀曰飤故詩曰兕觥其觩㫖酒思柔匪儌匪傲萬福來求張晏曰觥罰爵也飲酒和柔無失禮可罰罰爵徒觩然而已應劭曰言在位者不儌訐不倨傲也師古曰小雅桑扈之詩也儌謂儌幸也萬福言其多也謂飲酒者不儌倖不傲慢則福禄就而求之也觩音虯儌音工堯反今夫子傲取旤之道也後三年苦成家亡師古曰十七年晉攻郤氏長魚矯以戈殺郤錡郤犫郤至而滅其家襄公七年衞孫文子聘于魯君登亦登師古曰文子衞大夫孫林父也禮之登階臣後君一等叔孫穆子相師古曰穆子叔孫豹趨進曰諸侯之會寡君未嘗後衞君今吾子不後寡君寡君未知所過吾子其少安師古曰安徐也孫子亡辭亦亡悛容師古曰悛改也音千全反穆子曰孫子必亡為臣而君過而不悛亡之本也十四年孫子逐其君而外叛師古曰逐其君謂衞獻公出奔齊也外叛謂以戚叛之襄公二十八年蔡景侯歸自晉入于鄭師古曰景侯名固文侯之子也鄭伯享之不敬子産曰蔡君其不免虖師古曰言不免於禍日其過此也君使子展往勞于東門而敖師古曰日謂往日始適晉之時也子展鄭大夫公孫舎之吾曰猶將更之師古曰更改也今還受享而惰廼其心也師古曰言心之所常行也君小國事大國師古曰言身為小國之君而事于大國而惰敖以為己心將得死虖君若不免必由其子淫而不父師古曰通太子之妻如是者必有子旤三十年為世子般所殺師古曰般讀與班同襄公三十一年公薨季武子將立公子禂師古曰禂襄公之子齊歸所生禂音直留反穆叔曰是人也居䘮而不哀在慼而有嘉容是謂不度不度之人鮮不為患師古曰穆叔即叔孫穆子也不度不遵禮度也若果立必為季氏憂武子弗聽卒立之比及葬三易衰衰祍如故衰師古曰衣前曰祍言游戲無已也比音必寐反衰音千囬反祍音人禁反是為昭公立二十五年聽讒攻季氏兵敗出奔死于外師古曰謂薨于乾侯襄公三十一年衞北宫文子見楚令尹圍之儀師古曰北宫文子衞大夫也名佗令尹圍即公子圍楚恭王之子也時為令尹文子從衞侯在楚故見之言於衞侯曰令尹似君矣將有它志師古曰謂有為君之心言語視瞻非其常雖獲其志弗能終也公曰子何以知之對曰詩云敬慎威儀惟民之則師古曰大雅抑之詩也則法也言君能慎其威儀乃臣下所法效之令尹無威儀民無則焉民所不則以在民上不可以終師古曰遂以殺君簒國而取敗於乾谿也昭公十一年夏周單子會于戚師古曰單子周大夫單成公也戚衞地視下言徐應劭曰視下視不登帶言徐不聞於表著晉叔向曰單子其死虖師古曰叔向晉大夫羊舌肸也向音許兩反朝有著定師古曰朝内列位有定處所謂表著者也著音直庶反又音除會有表師古曰會於野設表以為位衣有禬帶有結師古曰禬領之交會也結紳帶之結也禬音工外反會朝之言必聞于表著之位所以昭事序也視不過結禬之中所以道容貌也師古曰道讀曰導其下並同言以命之容貌以明之失則有闕今單子為王官伯師古曰伯長也而命事於會視不登帶言不過歩貌不道容而言不昭矣不道不恭不昭不從無守氣矣師古曰貌正曰恭言正曰從十二月單成公卒昭公二十一年三月葬蔡平公蔡太子朱失位位在卑師古曰不在正嫡之位而以長㓜序之魯大夫送葬者歸告昭子師古曰昭子叔孫婼昭子歎曰蔡其亡虖若不亡是君也必不終詩曰不觧於位民之攸塈師古曰大雅假樂之詩也塈息也言在上者能率位不怠則其臣下恃以安息也觧讀曰懈塈音許既反今始即位而適卑身將從之十月蔡侯朱出奔楚晉魏舒合諸侯之大夫于翟泉應劭曰水名今洛陽是也師古曰魏舒晉卿魏獻子也事在定公元年志不書者盖闕文將以城成周魏子涖政師古曰謂代天子大夫為政以臨其事也衞彪傒曰將建天子而易位以令非誼也師古曰傒衞大夫建天子謂立天子之居也傒音奚大事奸誼必有大咎師古曰奸犯也音干晉不失諸侯魏子其不免虖是行也魏獻子屬役於韓簡子師古曰簡子亦晉卿韓不信以城周之功役委簡子也而田於大陸焚焉而死師古曰高平曰陸因放火田獵而見燒殺也定公十五年邾隐公朝於魯執玉高其容仰公受玉卑其容俯師古曰隐公邾子益也玉謂朝者之贄子贛觀焉師古曰子贛孔子弟子端木賜也贛音貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是虖取之朝祀喪戎於是虖觀之今正月相朝而皆不度心已亡矣師古曰不度不合法度嘉事不體何以能乆師古曰嘉事嘉禮之事謂朝祀也不體不得身體之節高仰驕也卑俯替也師古曰替廢惰也驕近亂替近疾君為主其先亡虖師古曰是年五月定公薨哀公七年秋伐邾以邾子益來也庶徵之恒雨劉歆以為春秋大雨也劉向以為大水隐公九年三月癸酉大雨震電庚辰大雨雪師古曰雨雪雨音于具反大雨雨水也師古曰下兩音于具反後類並同震雷也劉歆以為三月癸酉於歴數春分後一日始震電之時也當雨而不當大雨大雨常雨之罰也於始震電八日之間而大雨雪常寒之罰也劉向以為周三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異於易雷以二月出其卦曰豫師古曰坤下震上也言萬物隨雷出地皆逸豫也以八月入其卦曰歸妹師古曰兌下震上也言雷復歸入地則孕毓根核保藏蟄蟲師古曰毓字與育同核亦荄字也草根曰荄音該避盛隂之害出地則養長華實發揚隐伏宣盛陽之德入能除害出能興利人君之象也是時隐以弟桓幼入而攝立公子翬見隐居位已乆勸之遂立師古曰公子翬魯大夫羽父也勸殺桓公以求為太宰翬音揮隐既不許翬懼而易其辭師古曰反謂桓公云隐欲殺之遂與桓共殺隐天見其將然故正月大雨水而雷電是陽不閉隂出渉危難而害萬物天戒若曰為君失時賊弟佞臣將作亂矣後八日大雨雪隂見間隙而勝陽簒殺之旤將成也公不寤後二年而殺昭帝始元元年七月大水雨自七月至十月成帝建始三年秋大雨三十餘日四年九月大雨十餘日左氏傳愍公二年晉獻公使太子申生帥師師古曰以伐東山臯落氏公衣之偏衣佩之金玦師古曰偏衣謂左右異色其半象公之服也金玦以金為玦也半環曰玦狐突歎曰時事之徵也衣身之章也佩𠂻之旗也師古曰狐突晉大夫伯行時為太子御戎也徴證也章明也旗表也衣所以明貴賤佩所以表中心故敬其事則命以始師古曰賞以春夏服其身則衣之純師古曰壹其色用其𠂻則佩之度師古曰佩玉者君子之常度劉奉世曰欲表其𠂻則當佩之使合法度世子佩瑜玉而綦組綬今命以時卒閟其事也師古曰卒盡也閟閉也謂十二月盡時也衣以尨服逺其躬也師古曰尨雜色也謂偏衣也逺音于萬反其下並同佩以金玦棄其𠂻也服以逺之時以閟之尨凉冬殺金寒玦離胡可恃也師古曰凉薄也尨色不能純故曰薄也冬主殺氣金行在西是謂之寒玦形半缺故云離梁餘子養曰帥師者受命于廟受脤於社有常服矣師古曰梁餘子養晉大夫也時為下軍御軍之常服則韋弁弗獲而尨命可知也死而不孝不如逃之罕夷曰尨竒無常金玦不復君有心矣應劭曰竒竒怪非常意復反也金玦猶決去不反意也師古曰罕夷晉大夫時為下軍卿也有心害太子之心也復音扶目反後四年申生以讒自殺近服妖也左氏傳曰鄭子臧好聚鷸冠張晏曰鷸鳥赤足黄文以其毛飾冠韋昭曰鷸今翠鳥也師古曰子臧鄭文公子也鷸大鳥即戰國䇿所云啄蚌者也天之將雨鷸則知之翠鳥自有鷸名而此飾冠非翠鳥也逸周書曰知天文者冠鷸冠盖以鷸鳥知天時故也禮圖謂之術氏冠鷸音聿又音術鄭文公惡之使盜殺之師古曰時已得罪出奔宋故使盗殺之於陳宋之間劉向以為近服妖者也一曰非獨為子臧之身亦文公之戒也初文公不禮晉文師古曰晉文公之為公子也避驪姬之難而出奔欲之楚過鄭鄭不禮焉又犯天子命而伐滑師古曰僖二十四年鄭公子士洩及堵俞彌帥師伐滑王使伯服游孫伯如鄭請滑鄭伯不聽而執二子不尊尊敬上其後晉文伐鄭幾亡國師古曰僖三十年晉侯秦伯圍鄭佚之狐曰國危矣使燭之武見秦伯師乃退也昭帝時昌邑王賀遣中大夫之長安多治仄注冠應劭曰今法冠是也李竒曰一曰高山冠本齊冠也謁者服之師古曰仄古側字也謂之側注者言形側立而下注也蔡邕云高九寸鐵為卷非法冠及高山也卷音去權反以賜大臣又以冠奴劉向以為近服妖也時王賀狂悖聞天子不豫師古曰言有疾不恱豫也周書顧命曰王有疾不豫弋獵馳騁如故與騶奴宰人游居娛戲驕嫚不敬師古曰騶廐御也宰人主膳者也娛樂也戲音僖冠者尊服奴者賤人賀無故好作非常之冠暴尊象也以冠奴者當自至尊墜至賤也其後帝崩無子漢大臣徵賀為嗣即位狂悖無道縛戮諫者夏侯勝等於是大臣白皇太后廢賀為庶人賀為王時又見大白狗冠方山冠而無尾鄧展曰方山冠以五采縠為之樂舞人所服此服妖亦犬旤也賀以問郎中令龔遂遂曰此天戒言在仄者盡冠狗也師古曰言王左右侍側之人不識禮義若狗而著冠者耳冠音工喚反其下亦同去之則存不去則亡矣賀既廢數年宣帝封之為列侯復有辠死不得置後又犬旤無尾之效也京房易傳曰行不順厥咎人奴冠天下亂辟無適如淳曰辟君也適適子也妾子拜如淳曰無適子故也又曰君不正臣欲簒厥妖狗冠出朝門成帝鴻嘉永始之間好為微行出游選從期門郎有材力者及私奴客多至十餘少五六人皆白衣袒幘師古曰袒幘不加上冠帶持刀劍或乗小車御者在茵上蘇林曰茵車上蓐也御者錯亂更在茵上坐也師古曰車小故御者不得廻避而在天子茵上也或皆騎出入市里郊壄逺至旁縣時大臣車騎將軍王音及劉向等數以切諫谷永曰易稱得臣無家師古曰損卦上九爻辭言王者臣天下無私家也今陛下棄萬乗之至貴樂家人之賤事厭高美之尊稱好匹夫之卑字如淳曰稱張放家人是為卑字師古曰為微行故變易姓名崇聚票輕無誼之人以為私客師古曰票音匹妙反又音頻妙反置私田於民間畜私奴車馬於北宫數去南面之尊離深宫之固挺身獨與小人晨夜相隨師古曰挺引也烏集醉飽吏民之家師古曰乍合乍離如烏之集亂服共坐溷肴亡别師古曰溷肴謂雜亂也溷音胡困反閔勉遯樂晝夜在路師古曰閔勉猶黽勉言不息也遯樂言流遯為樂也典門戸奉宿衞之臣執干戈守空宫公卿百寮不知陛下所在積數年矣昔虢公為無道有神降曰賜爾土田師古曰春秋左氏傳荘公三十二年有神降于莘虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎言將以庶人受土田也諸侯夢得土田為失國祥師古曰僖五年晉滅虢虢公醜奔京師而况王者畜私田財物為庶人之事乎左氏傳曰周景王時大夫賔起見雄雞自斷其尾師古曰賔起即賔孟劉向以為近雞旤也是時王有愛子子鼂王與賔起隂謀欲立之師古曰子鼂王之庶長子田于北山將因兵衆殺適子之黨師古曰適讀曰嫡嫡子王子猛及後為悼王子猛之黨謂劉獻公單穆公未及而崩三子爭國王室大亂其後賔起誅死師古曰三子謂子鼂子猛及子猛弟敬王丐也劉子遂攻賔起殺之事並在昭二十二年子鼂奔楚而敗師古曰昭二十六年邵伯盈逐王子鼂子鼂奔楚定公五年王人殺之于楚京房易傳曰有始無終厥妖雄雞自齧斷其尾宣帝黄龍元年未央殿輅軨中雌雞化為雄孟康曰輅軨廐名也師古曰百官表太僕屬官有輅軨丞輅與路同軨音零毛衣變化而不鳴不將無距師古曰將謂率領其羣也距雞附足骨鬬時所用刺之元帝初元中丞相府史家雌雞伏子漸化為雄師古曰初尚伏子後乃稍稍化為雄也伏音房富反冠距鳴將永光中有獻雄雞生角者京房易傳曰雞知時知時者當死房以為已知時恐當之劉向以為房失雞占雞者小畜主司時起居人師古曰至時而鳴以為人起居之節小臣執事為政之象也言小臣將秉君威以害正事猶石顯也竟寧元年石顯伏辜此其效也一曰石顯何足以當此昔武王伐殷至于牧壄誓師曰古人有言曰牝雞無晨牝雞之晨惟家之索今殷王紂惟婦言用師古曰周書牧誓之辭晨謂晨時鳴也索盡也言婦人為政猶雌雞而代雄鳴是喪家之道也繇是論之黄龍初元永光雞變廼國家之占妃后象也孝元王皇后以甘露二年生男立為太子妃王禁女也黄龍元年宣帝崩太子立是為元帝王妃將為皇后故是嵗未央殿中雌雞為雄明其占在正宫也不鳴不將無距貴始萌而尊未成也至元帝初元元年將立王皇后先以為婕妤三月癸卯制書曰其封婕妤父丞相少史王禁為陽平侯位特進丙午立王婕妤為皇后明年正月立皇后子為太子故應是丞相府史家雌雞為雄其占即丞相少史之女也伏子者明已有子也冠距鳴將者尊已成也永光二年陽平頃侯禁薨子鳯嗣侯為侍中衞尉元帝崩皇太子立是為成帝尊皇后為皇太后以后弟鳯為大司馬大將軍領尚書事上委政無所與師古曰與讀曰豫言政皆出鳯天子不豫王氏之權自鳯起故於鳯始受爵位時雄雞有角明視作威師古曰視讀曰示顓君害上師古曰顓與専同其下類此危國者從此人始也其後羣弟世權以至於莽遂簒天下即位五年王太后廼崩此其效也京房易傳曰賢者居明夷之世知時而傷師古曰易之明夷卦曰明入地中明夷夷傷也離下坤上言日在地中傷其明也知時謂知天時者也賢而被傷故取明夷之義或衆在位師古曰言虛偽無實之人矯惑於衆在職位也厥妖雞生角雞生角時主獨又曰婦人顓政國不静牝雞雄鳴主不榮故房以為已亦在占中矣成公七年正月鼷䑕食郊牛角師古曰鼷小䑕也即今所謂甘䑕者音奚改卜牛又食其角劉向以為近青祥亦牛旤也不敬而傋霿之所致也昔周公制禮樂成周道故成王命魯郊祀天地以尊周公至成公時三家始顓政魯將從此衰天愍周公之徳痛其將有敗亡之旤故於郊祭而見戒云䑕小蟲性盗竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷䑕食至尊之牛角象季氏乃陪臣盗竊之人將執國命以傷君威而害周公之祀也改卜牛鼷䑕又食其角天重語之也師古曰重音直用反成公怠慢昏亂遂君臣更執于晉師古曰更互也十年秋公如晉晉人以公為貳於楚故止公至十一年三月乃得歸十六年秋公㑹晉侯于沙隨晉受叔孫僑如之譛而止公是年九月又信僑如之譛執季孫行父舍之于苕丘十二月乃得歸故云君臣更執也更音工衡反至于襄公晉為湨梁之會師古曰襄十六年晉平公會諸侯于湨梁湨梁者湨水之梁也湨水出河内軹縣東南至溫入河湨音工覔反天下大夫皆奪君政師古曰湨梁之會諸侯皆在而魯叔孫豹晉荀偃宋向戍衞寗殖鄭公孫蠆小邾之大夫盟是奪其君政也其後三家逐昭公卒死于外師古曰已觧于上幾絶周公之祀董仲舒以為鼷䑕食郊牛皆養牲不謹也京房易傳曰祭天不慎厥妖鼷䑕齧郊牛角定公十五年正月鼷䑕食郊牛牛死劉向以為定公知季氏逐昭公辠惡如彼親用孔子為夾谷之會齊人倈歸鄆讙龜隂之田師古曰夾谷齊地也一名祝其定公十年公與齊侯會于夾谷齊侯欲使萊人以兵劫公孔子以公退命士衆兵之齊侯乃止又欲以盟要公孔子不欲使兹無還以辭對又欲詐享公孔子又距而不受於是齊人乃服先是季氏之臣陽虎以鄆讙龜隂之田奔齊至此會乃以歸我鄆讙二邑名龜隂龜山之隂夾音頰讙音驩聖徳如此反用季桓子淫於女樂而退孔子無道甚矣師古曰桓子季平子之子季孫斯也女樂已觧于上詩曰人而亡儀不死何為師古曰衞詩相䑕之篇也亡儀無禮儀也是嵗五月定公薨牛死之應也京房易傳曰子不子䑕食其郊牛哀公元年正月鼷䑕食郊牛劉向以為天意汲汲於用聖人逐三家故復見戒也哀公年少不親見昭公之事故見敗亡之異已而哀不寤身奔於粤此其效也師古曰哀二十七年公欲以越伐魯而去三桓公如公孫有山氏因遜于邾遂如越國人施罪於公孫有山氏而立哀公之子悼公昭帝元鳯元年九月燕有黄䑕銜其尾舞王宫端門中師古曰宫之正門王往視之䑕舞如故王使吏以酒脯祠䑕舞不休一日一夜死近黄祥時燕刺王旦謀反將死之象也其月發覺伏辜京房易傳曰誅不原情厥妖䑕舞門師古曰不原情者不得其本情成帝建始四年九月長安城南有䑕銜黄蒿栢葉上民冢栢及榆樹上為巢桐栢尤多師古曰桐栢本亭名衞思后於其地葬也巢中無子皆有乾䑕矢數十時議臣以為恐有水災䑕盗竊小蟲夜出晝匿今晝去穴而登木象賤人將居顯貴之位也桐栢衞思后園所在也其後趙皇后自微賤登至尊與衞后同類趙后終無子而為害明年有鳶焚巢殺子之異也天象仍見甚可畏也一曰皆王莽竊位之象云京房易傳曰臣私禄罔辟李竒曰辟君也擅私爵禄誣罔其君厥妖䑕巢文公十三年太室屋壞近金沴木木動也先是冬釐公薨十六月廼作主師古曰主廟主也僖公三十三年十二月薨至文二年二月廼作主間有一閠故十六月也後六月又吉禘於太廟而致釐公師古曰禘祭也一一而祭之文二年八月而禘距作主六月也致謂升其主於廟春秋譏之經曰大事於太廟躋釐公師古曰躋音子奚反又音子詣反左氏說曰太廟周公之廟饗有禮義者也祀國之大事也惡其亂國之大事於太廟故言大事也躋登也登釐公於愍公上逆祀也釐雖愍之庶兄嘗為愍臣臣子一例不得在愍上又未三年而吉禘前後亂賢父聖祖之大禮内為貌不恭而狂外為言不從而僣故是嵗自十二月不雨至于秋七月後年若是者三而太室屋壞矣前堂曰太廟中央曰太室屋其上重屋尊高者也象魯自是陵夷將墮周公之祀也師古曰墮毁也音火規反榖梁公羊經曰世室魯公伯禽之廟也周公稱太廟魯公稱世室大事者祫祭也師古曰祫合也毁廟及未毁廟之主皆合祭於太祖躋釐公者先禰後祖也景帝三年十二月吳二城門自傾大船自覆劉向以為近金沴木木動也先是吳王濞以太子死於漢稱疾不朝隂與楚王戊謀為逆亂城猶國也其一門名曰楚門一門曰魚門吳地以船為家以魚為食天戒若曰與楚所謀傾國覆家吳王不寤正月與楚俱起兵身死國亡京房易傳曰上下咸誖厥妖城門壞師古曰誖惑也音布内反宣帝時大司馬霍禹所居第門自壞時禹内不順外不敬見戒不改卒受滅亡之誅哀帝時大司馬董賢第門自壞時賢以私愛居大位賞賜無度驕嫚不敬大失臣道見戒不改後賢夫妻自殺家徙合浦傳曰言之不從是謂不艾厥咎僭厥罰恒陽厥極憂時則有詩妖時則有介蟲之孽時則有犬旤時則有口舌之痾時則有白眚白祥惟木沴金言之不從從順也是謂不乂乂治也孔子曰君子居其室出其言不善則千里之外違之况其邇者虖師古曰易上繫之辭也邇近也詩云如蜩如螗如沸如羮師古曰大雅蕩之詩也蜩蟬也螗蝘也即虭蟟也謂政無文理虛言噂沓如蜩螗之鳴湯之沸涫羮之將孰也蜩音調螗音唐蝘音偃虭音貂蟟音聊涫音下館反言上號令不順民心虛譁憒亂則不能治海内失在過差故其咎僭僭差也刑罰妄加羣隂不附則陽氣勝故其罰常陽也旱傷百榖則有寇難上下俱憂故其極憂也君炕陽而暴虐師古曰凡言炕陽者枯涸之意謂無惠澤於下也炕音口浪反臣畏刑而拑口師古曰拑籋也音其亷反籋音女渉反則怨謗之氣發於謌謡故有詩妖介蟲孽者謂小蟲有甲飛揚之類陽氣所生也於春秋為螽今謂之蝗皆其類也於易兌為口犬以吠守而不可信言氣毁故有犬旤一曰旱嵗犬多狂死及為怪亦是也及人則多病口喉欬者故有口舌痾金色白故有白眚白祥凡言傷者病金氣金氣病則木沴之其極憂者順之其福曰康寧劉歆言傳曰時有毛蟲之孽說以為於天文西方參為虎星故為毛蟲史記周單襄公與晉郤錡郤犫郤至齊國佐語師古曰單襄公觧已在前郤錡駒伯也郤犫苦成叔也郤至昭子即溫季也國佐齊國武子也告魯成公曰晉將有亂三郤其當之虖夫郤氏晉之寵人也二卿而五大夫可以戒懼矣高位實疾顛厚味實腊毒師古曰顛仆也腊乆也言位高者必速顛仆也味厚者為毒乆今郤伯之語犯叔迂季伐師古曰伯駒伯也叔苦成叔也季溫季也犯侵也迂夸誕也伐矜尚也犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於淫亂之國而好盡言以招人過蘇林曰招音翹招舉也師古曰盡言猶極言也怨之本也唯善人能受盡言齊其有虖師古曰言無善人不能受盡言十七年晉殺三郤十八年齊殺國佐凡此屬皆言不從之咎云晉穆侯以條之役生太子名之曰仇師古曰穆侯僖侯之孫也條晉地也蓋以敵來侵已當戰時而生故取仇忿之義以名子其弟以千畮之戰生名之曰成師師古曰太子之弟即桓叔也畮古畝字也千畮亦地名意取能成其師衆也師服曰異哉君之名子也師古曰師服晉大夫夫名以制誼誼以出禮師古曰先制義理然後立名義理既定禮由之出禮以體政政以正民師古曰政以禮成俗所以正是以政成而民聽易則生亂師古曰反易禮義則亂生也嘉耦曰妃怨耦曰仇古之命也師古曰本自古昔而有此名今君名太子曰仇弟曰成師始兆亂矣兄其替虖師古曰替廢也及仇嗣立是為文侯文侯卒子昭侯立封成師于曲沃號桓叔師古曰昭侯國亂身危不能自安故封成師為曲沃伯也桓謚也昭侯叔父故謂之叔也後晉人殺昭侯而納桓叔不克復立昭侯子孝侯桓叔子嚴伯殺之晉人立其弟鄂侯鄂侯生哀侯嚴伯子武公復殺哀侯及其弟滅之而代有晉國師古曰武始并晉國故稱公也事在桓三年宣公六年鄭公子曼滿與王子伯廖語欲為卿師古曰曼滿伯廖皆鄭大夫也廖音聊伯廖告人曰無徳而貪其在周易豐之離張晏曰離下震上豐上六變而之離曰豐其屋蔀其家也弗過之矣師古曰言無道徳而大其屋不過三嵗必滅亡也間一嵗鄭人殺之師古曰間一嵗者中間隔一嵗襄公二十九年齊高子容與宋司徒見晉知伯汝齊相禮師古曰高子容齊大夫高止也宋司徒華定知伯晉大夫荀盈也汝齊晉大夫司馬侯也賔出汝齊語知伯曰二子皆將不免子容専司徒侈皆亡家之主也師古曰専自是也侈奢泰専則速及侈將以其力敝専則人實敝之將及矣九月高子出奔燕襄公三十一年正月魯穆叔會晉歸告孟孝伯曰趙孟將死矣師古曰穆叔即叔孫穆子也孟孝伯魯大夫仲孫羯也趙孟晉卿趙文子也名武前年十月穆叔與武同㑹澶泉至此年正月乃歸其語偷不似民主師古曰偷茍且且年未盈五十而諄諄焉如八九十者弗能乆矣師古曰諄諄重頓之貌也音之閏反若趙孟死為政者其韓子虖師古曰韓子韓宣子也名起吾子盍與季孫言之可以樹善君子也師古曰季孫謂季武子也名宿言韓起有君子之徳方執晉政可素厚之以立善也孝伯曰民生幾何誰能毋偷師古曰幾何言無多時也幾音居豈反朝不及夕將焉用樹穆叔告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉九月孟孝伯卒昭公元年周使劉定公勞晉趙孟師古曰周周景王也劉定公周卿也食邑於劉名夏是時孟與諸侯會於虢故就而勞之因曰子弁冕以臨諸侯盍亦逺績禹功而大庇民乎師古曰時館於洛汭因見河洛而美禹功故言之也弁冕冠也言今服冠冕有國家何不追績禹功而庇䕃其人乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也師古曰儕等也言且得食而已茍免目前不能念其長乆也儕音仕皆反劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂虖師古曰諺俗所傳言也八十曰耄亂也言人年老閱歴既多謂將益智而又耄亂也為晉正卿以主諸侯而儕於隸人朝不謀夕棄神人矣神怒民畔何以能乆師古曰言其自比賤隸而無恤下之心人為神主故神人皆去也趙孟不復年矣師古曰謂其即死不復見明年是嵗秦景公弟后子奔晉師古曰后子即公子鍼趙孟問秦君何如對曰無道趙孟曰亡虖對曰何為一世無道國未艾也師古曰艾讀曰刈刈絶也國於天地有與立焉師古曰言在天地之間多欲輔助相與共成立之不數世淫弗能敝也趙孟曰天虖對曰有焉趙孟曰其幾何師古曰言當幾時也對曰鍼聞國無道而年榖和孰天賛之也鮮不五稔師古曰賛佐助之也鮮少也稔孰也榖孰為一稔言少尚當五年多則或不啻也稔音人甚反趙孟視䕃曰朝夕不相及誰能待五師古曰䕃謂日之䕃影也趙孟自以年暮朝不及夕故言五年不可待也䕃讀與隂同后子出而告人曰趙孟將死矣主民玩嵗而愒日其與幾何師古曰玩愛也愒貪也與幾何言不能乆也愒音口蓋反冬趙孟卒昭五年秦景公卒昭公元年楚公子圍會盟師古曰圍楚恭王之子也時為楚令尹與齊宋衞陳蔡鄭會于虢設服離衞張晏曰設服者設人君之服離衞者二人執戈在前也師古曰離列人君之侍衞也魯叔孫穆子曰楚公子美矣君哉師古曰穆子叔孫豹也言其服美似人君也伯州犂曰此行也辭而假之寡君師古曰伯州犂楚太宰也言受楚王之命假以此禮耳蓋為其令尹文過鄭行人子羽曰假不反矣師古曰行人官名子羽公孫揮字也假不反矣言將遂為君伯州犂曰子姑憂子晢之欲背誕也應劭曰子晢攻殺伯有今又背盟欲復作亂也師古曰子晢鄭大夫公孫黒也背誕者背命放誕欲為亂也子且自憂此無憂令尹不反戈也子羽曰假而不反子其無憂虖師古曰言令尹將圖為君則楚國有難子亦有憂也齊國子曰吾代二子閔矣應劭曰閔憂也二子伯州犂行人子羽也師古曰國子齊大夫國弱也二子謂王子圍及伯州犂也圍以是年簒位而不能令終州犂亦為圍所殺故言可閔應説非也陳公子招曰不憂何成二子樂矣應劭曰言國有憂己乃得以成功也師古曰招陳公子哀公弟也言因憂以成事事成而樂也招音韶衞齊子曰茍或知之雖憂不害師古曰齊子衞大夫齊惡也言先知為備雖有憂難無所損害退會子羽告人曰齊衞陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也師古曰弗及而憂謂憂不及已而妄憂也太誓曰民之所欲天必從之師古曰太誓周書也三大夫兆憂矣能無至乎師古曰兆憂謂開憂兆也言以知物其是之謂矣師古曰物類也察其所言以知禍福之類昭公十五年晉籍談如周葬穆后師古曰籍談晉大夫也穆后周景王之后謚穆也既除喪而燕師古曰燕與宴同王曰諸侯皆有以填撫王室晉獨無有何也師古曰填撫王室謂獻器物也填音竹刃反籍談對曰諸侯之封也皆受明器於王室故能薦彝器師古曰明器明徳之器也彝器常可寶用之器也晉居深山戎翟之與鄰拜戎不暇其何以獻器王曰叔氏其忘諸乎師古曰叔籍談字也一曰叔父之使故謂之叔氏也叔父唐叔成王之母弟其反亡分乎師古曰分音扶問反昔而高祖司晉之典籍師古曰而亦汝以為大正故曰籍氏女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖師古曰忘祖業籍談歸以語叔嚮叔嚮曰王其不終乎吾聞所樂必卒焉師古曰言志之所樂終於此事今王樂憂若卒以憂不可謂終王一嵗而有三年之喪二焉師古曰為太子三年妻死三年乃娶逹子之志言三年之喪二后及太子也於是乎以喪賔燕又求彝器樂憂甚矣三年之喪雖貴遂服禮也師古曰遂猶竟王雖弗遂燕樂已早師古曰天子除喪當在卒哭今適既葬故譏其早也禮王之大經也一動而失二禮無大經矣師古曰經謂常法也既不遂服又即宴樂是失二禮言以考典典以志經師古曰考成也志記也忘經而多言舉典將安用之哀公十六年孔丘卒公誄之曰旻天不弔不憗遺一老俾屏予一人應劭曰憗且辭也言旻天不善於魯不且遺一老使屏蔽我一人也師古曰憗音魚覲反子贛曰君其不歿於魯乎夫子之言曰禮失則昏名失則愆師古曰夫子謂孔子也昏謂惑也愆過也失志為昏失所為愆生弗能用死而誄之非禮也稱予一人非名也師古曰天子自稱曰予一人非諸侯之號故云非名君兩失之二十七年公孫于邾師古曰孫讀曰遜遂死于越師古曰已解于上庶徵之恒陽劉向以為春秋大旱也其夏旱雩祀謂之大雩不傷二榖謂之不雨京房易傳曰欲徳不用兹謂張孟康曰欲得賢者而不用人君徒張此意厥災荒荒旱也其旱隂雲不雨變而赤因而除師出過時兹謂廣李竒曰廣音曠韋昭曰謂怨曠也其旱不生上下皆蔽兹謂隔其旱天赤三月時有雹殺飛禽上緣求妃兹謂僭師古曰緣歴也言歴衆處而求妃妾也其旱三月大溫亡雲居高臺府兹謂犯隂侵陽其旱萬物根死數有火災庶位踰節兹謂僭其旱澤物枯為火所傷釐公二十一年夏大旱董仲舒劉向以為齊桓既死諸侯從楚釐尤得楚心楚來獻捷釋宋之執師古曰謂此年楚執宋公以伐宋冬使宜申來獻捷十二月盟于薄釋宋公也外倚彊楚炕陽失衆又作南門勞民興役師古曰南門本名稷門更改高大而作之事在二十年諸雩旱不雨畧皆同說宣公七年秋大旱是夏宣與齊侯伐萊師古曰萊國即東萊黄縣也襄公五年秋大雩先是宋魚石犇楚師古曰犇古奔字也事在成十五年魚石宋左師也公子目夷之曾孫也楚伐宋取彭城以封魚石師古曰事在成十八年鄭畔于中國而附楚師古曰自鄢陵戰後鄭遂不服故諸侯屢侵伐之襄與諸侯共圍彭城師古曰謂襄元年使仲孫蔑㑹晉欒黶宋華元衞寗殖曹人莒人邾人滕人薛人圍彭城城鄭虎牢以禦楚師古曰事在二年虎牢本鄭邑時已屬晉蓋追言之是嵗鄭伯使公子發來聘師古曰公子𤼵鄭穆公之子子産之父也字子國使大夫會吳于善道師古曰使仲孫蔑會吳也善道吳地外結二國内得鄭聘有炕陽動衆之應八年九月大雩時作三軍季氏盛師古曰萬二千五百人為軍魯本立上下二軍皆屬於公有事則三卿遞帥之而征伐今季氏欲専其人故増立中軍三卿各主其一也事在十一年二十八年八月大雩先是比年晉使荀吳齊使慶封來聘師古曰比年頻年也荀吳晉大夫即荀偃之子也二十六年晉侯使來聘慶封齊大夫也二十七年齊侯使來聘是夏邾子來朝襄有炕陽自大之應昭公三年八月大雩劉歆以為昭公即位年十九矣猶有童心居喪不哀炕陽失衆六年九月大雩先是莒牟夷以二邑來犇師古曰事在五年牟夷莒大夫也二邑謂牟婁及防兹也莒怒伐魯叔弓帥師距而敗之昭得入晉師古曰叔弓魯大夫時昭公適欲朝晉而遇莒人來討將不果行叔弓既敗莒師公乃得去故傳云成禮大國以為援好也外和大國内獲二邑取勝鄰國有炕陽動衆之應十六年九月大雩先是昭公母夫人歸氏薨昭不慼又大蒐于比蒲師古曰事在昭十一年歸氏胡國之女歸姓即齊歸也齊謚也蒐謂聚衆而田獵也比蒲魯地名晉叔嚮曰魯有大喪而不廢蒐國不恤喪不忌君也君亡慼容不顧親也殆其失國與三年同占二十四年八月大雩劉歆以為左氏傳二十三年邾師城翼還經魯地師古曰翼邾邑也經者道出其中也魯地謂武城也魯襲取邾師獲其三大夫師古曰謂徐鉏丘弱茅地也邾人愬于晉晉人執我行人叔孫婼師古曰叔孫昭子也婼音丑畧反是春廼歸之二十五年七月上辛大雩季辛又雩旱甚也劉歆以為時后氏與季氏有隙師古曰后氏郈昭伯也季氏季平子也季郈之雞鬭季氏芥其雞郈子為之金距平子怒益宫於郈氏且責讓之故郈昭伯怨之又季氏之族有淫妻為讒使季平子與族人相惡皆共譖平子師古曰謂平子庶叔父公鳥之妻季姒與雍人檀通而譖季氏之族人季公亥公思展故平子殺思展以故族人皆怨之子家駒諫曰讒人以君徼幸不可師古曰子家駒即子家懿伯莊公之𤣥孫也一名羈昭公遂伐季氏為所敗出奔齊定公十年九月大雩先是定公自將侵鄭歸而城中城二大夫帥師圍鄆師古曰事並在六年中城魯之邑也二大夫謂季孫斯仲孫何忌嚴公三十一年冬不雨是嵗一年而三築臺師古曰是年春築臺于郎夏築臺于薛秋築臺于秦秦郎薛皆魯地奢侈不恤民釐公二年冬十月不雨三年春正月不雨夏四月不雨六月雨先是者嚴公夫人與公子慶父淫而殺二君師古曰慶父桓公之子莊公弟也二君謂子般及閔公宋祁曰朱子文云者字宜去國人攻之夫人遜于邾慶父犇莒釐公即位南敗邾師古曰謂元年公敗邾師于偃東敗莒獲其大夫師古曰謂元年公子友帥師敗莒師于酈獲莒挐也有炕陽之應文公二年自十有二月不雨至于秋七月文公即位天子使叔服會葬師古曰叔服周之内史也叔氏服字㑹葬葬僖公毛伯賜命師古曰亦天子使之也毛伯周之卿士毛國伯爵也賜命者賜以命圭為瑞信也又會晉侯于戚師古曰謂大夫公孫敖㑹之也戚衞邑在頓丘衞縣西公子遂如齊納幣師古曰納𤣥纁之幣謂公為婚于齊又與諸侯盟師古曰謂公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴也垂隴鄭地上得天子外得諸侯沛然自大師古曰沛音普大反躋釐公主大夫始顓事師古曰謂季孫行父也十年自正月不雨至于秋七月先是公子遂會四國而救鄭師古曰謂九年楚人伐鄭公子遂㑹晉人宋人衞人許人以救之楚使越椒來聘師古曰越椒楚大夫名也事亦在九年秦人歸禭師古曰謂九年秦人來歸僖公及成風之禭也凡問喪者衣服曰禭成風僖公之母也成諡也風姓也禭音遂有炕陽之應十三年自正月不雨至于秋七月先是曹伯杞伯滕子來朝師古曰十一年曹伯來朝十二年杞伯滕子來朝郕伯來犇師古曰事在十二年郕國伯爵也秦伯使遂來聘師古曰事在十二年遂秦大夫名即左氏所謂西乞術季孫行父城諸及鄆師古曰事在十一年諸鄆二邑名也諸即琅邪諸縣也二年之間五國趨之内城二邑炕陽失衆一曰不雨而五榖皆孰異也文公時大夫始顓盟會公孫敖會晉侯又會諸侯盟于垂隴故不雨而生者隂不出氣而私自行以象施不由上出臣下作福而私自成一曰不雨近常隂之罰君弱也恵帝五年夏大旱江河水少谿谷絶先是發民男女十四萬六千人城長安是嵗城乃成文帝三年秋天下旱是嵗夏匈奴右賢王寇侵上郡詔丞相灌嬰𤼵車騎士八萬五千人詣高奴師古曰即上郡之縣擊右賢王走出塞其秋濟北王興居反使大將軍討之皆伏誅後六年春天下大旱先是發車騎材官屯廣昌師古曰武都之縣是嵗二月復發材官屯隴西後匈奴大入上郡雲中烽火通長安三將軍屯邊師古曰謂以中大夫令免為車騎將軍屯飛狐故楚相蘇意為將軍屯句注將軍張武屯北地又三將軍屯京師師古曰謂河内太守周亞夫為將軍次細柳宗正劉禮為將軍次覇上祝兹侯徐厲為將軍次棘門景帝中三年秋大旱武帝元光六年夏大旱是嵗四將軍征匈奴師古曰謂車騎將軍衞青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門元朔五年春大旱是嵗六將軍衆十餘萬征匈奴師古曰謂衞青將六將軍兵也六將軍者衞尉蘇建為游擊將軍左内史李沮為彊弩將軍太僕公孫賀為騎將軍代相李蔡為輕車將軍俱出朔方大行李息岸頭侯張次公為將軍出右北平元狩三年夏大旱是嵗發天下故吏伐棘上林穿昆明池天}
