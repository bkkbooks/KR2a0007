  - {type: variant, offset: 14, length: 1, content: 兄, WYG: 師位而典之師古曰父師即太師殷之三公}
  - {type: variant, offset: 14, length: 1, content: 兄, krp: 師位而典之師古曰父師即太師殷之三公}
