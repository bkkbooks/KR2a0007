  - {type: variant, offset: 130, length: 1, content: 還, krp: 大風毁民室殺人劉向以為是嵗南越反攻淮南邊淮南王長破之後年入朝殺漢故丞相辟陽侯上赦之歸聚姦人謀逆亂自稱東帝見異不寤後遷于蜀道死廱文帝五年吳暴風雨壞城官府民室時吳王濞謀為逆亂天戒數見終不改寤後卒誅滅五年十月楚王都彭城大風從東南來毁市門殺人是月王戊初嗣立後坐淫削國與吳王謀反刑僇諫者師古曰謂楚相張尚太傅趙夷吾也僇古戮字吳在楚東南天戒若曰勿與吳為惡將敗市朝王戊不寤卒隨吳亡昭帝元鳳元年燕王都薊大風雨師古曰薊縣名燕國之所都拔宫中樹七圍以上十六枚壞城樓燕王旦不寤謀反𤼵覺卒伏其辜釐公十五年九月己卯晦震夷伯之廟師古曰夷伯司空無駭之後本魯公族也號展氏劉向以為晦暝也震雷也夷伯世大夫正晝雷其廟獨㝠師古曰㝠暗也天戒若曰勿使大夫世官將専事暝晦明年公子季友卒果世官師古曰謂季友之孫行父仍執政專國自此以後常為卿政在季氏}
