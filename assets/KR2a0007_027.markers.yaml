  - {type: variant, offset: 33, length: 0, content: '', WYG: 太中大夫李息為材官將軍欲襲單于單于覺之而去自是始征伐四夷師出三十餘年天下戸口減半京房易傳曰興兵妄誅兹謂亡法厥災霜夏殺五榖冬殺麥誅不原情兹謂不仁其霜夏先大雷風冬先雨廼隕霜有芒角賢聖遭害其霜附木不下地佞人依刑兹謂私賊其霜在草根土隙間不教而誅兹謂虐其霜反在草下元帝永光元年三月隕霜殺桑九月二日隕霜殺稼天下大飢是時中書令石顯用事専權與春秋}
