  - {type: variant, offset: 244, length: 670, content: 王淮東立六年而淮南王黥布反東擊荊賈與戰弗勝走富陵為布軍所殺燕王劉澤高祖從祖昆弟也高祖三年澤為郎中十一年以將軍擊陳豨將王黃封為營陵侯高后時齊人田生游乏資以畫奸澤澤大說之用金二百斤為田生壽田生已得金即歸齊二歲澤使人謂田生曰弗與矣田生如長安不見澤而假大宅令其子求事呂后所幸大謁者張卿居數月田生子請張卿臨親脩具張卿往見田生帷帳具置如列侯張卿驚酒酣乃屏人說張卿曰臣觀諸侯邸第百餘皆高帝一切功臣今呂氏雅故本推轂高帝就天下功至大又有親戚太后之重太后春秋長諸呂弱太后欲立呂產為呂王王代太后又重發之恐大臣不聽今卿最幸大臣所敬何不風大臣以聞太后太后必喜諸呂以王萬戶侯亦卿之有太后心欲之而卿為內臣不急發恐禍及身矣張卿大然之乃風大臣語太后太后朝因問大臣大臣請立呂產為呂王太后賜張卿千金張卿以其半進田生田生弗受因說之曰呂產王也諸大臣未大服今營陵侯澤諸劉長為大將軍獨此尚觖望今卿言太后裂十餘縣王之彼得王喜於諸呂王益固矣張卿入言之又太后女弟呂須女亦為營陵侯妻故遂立營陵侯澤為琅邪王琅邪王與田生之國急行毋留出關太后果使人追之已出即還澤王琅邪二年而太后崩澤乃曰帝少諸呂用事諸劉孤弱引兵與齊王合謀西欲誅諸呂至梁聞漢灌將軍屯滎陽澤還兵備西界遂跳驅至長安代王亦從代至諸將相與琅邪王共立代王是為孝文帝文帝元年徙澤為燕王而復以琅邪歸齊澤王燕二年薨諡曰敬王子康王嘉嗣九年薨子定國嗣定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦定國有所欲誅殺臣肥如令郢人郢人等告定國定國使謁者以它法劾捕格殺郢人滅口至元朔中郢人昆弟復上書具言定國事下公卿皆議曰定國禽獸行亂人倫逆天道當誅上許之定國自殺立四, WYG: ''}
