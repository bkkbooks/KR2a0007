  - {type: variant, offset: 16, length: 0, content: '', WYG: 箕子紂之諸父而為太師故曰父師周既克殷以箕子歸武王親虚已而問焉故經曰惟十有三祀王訪于箕子師古曰祀年也商曰祀自此以下皆周書洪範之文王廼言曰烏嘑箕子惟天隂騭下民相協厥居我}
  - {type: variant, offset: 16, length: 0, content: '', krp: 箕子紂之諸父而為太師故曰父師周既克殷以箕子歸武王親虚已而問焉故經曰惟十有三祀王訪于箕子師古曰祀年也商曰祀自此以下皆周書洪範之文王廼言曰烏嘑箕子惟天隂騭下民相協厥居我}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 彞倫逌叙服䖍曰騭音陟應劭曰隂覆也騭升也相助也協和也倫理也逌所也言天覆下民王者當助天居我不知居天常理所次序也師古曰騭音質騭定也協和也天不言而黙定下人助合其居也箕子廼言曰我聞在昔鯀陻洪水汩陳其五行應劭曰陻塞也汩亂也水性流行而鯀障塞之失其本性其餘所陳列皆亂故曰亂陳五行也師古曰汩音骨帝乃震怒弗畀洪範九疇彞倫逌斁師古曰帝謂上帝即天也震動也畀與也疇類也九類即九章也斁敗也音丁故反鯀則殛死禹廼嗣興師古曰殛誅也見誅而死殛音居力反天廼錫禹洪範九疇彞倫逌敘此武王問雒書於箕子箕子對禹得雒書之意也}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_027-2a, image: WYG0249/WYG0249-0578c.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 彞倫逌叙服䖍曰騭音陟應劭曰隂覆也騭升也相助也協和也倫理也逌所也言天覆下民王者當助天居我不知居天常理所次序也師古曰騭音質騭定也協和也天不言而黙定下人助合其居也箕子廼言曰我聞在昔鯀陻洪水汩陳其五行應劭曰陻塞也汩亂也水性流行而鯀障塞之失其本性其餘所陳列皆亂故曰亂陳五行也師古曰汩音骨帝乃震怒弗畀洪範九疇彞倫逌斁師古曰帝謂上帝即天也震動也畀與也疇類也九類即九章也斁敗也音丁故反鯀則殛死禹廼嗣興師古曰殛誅也見誅而死殛音居力反天廼錫禹洪範九疇彞倫逌敘此武王問雒書於箕子箕子對禹得雒書之意也}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 一曰五行師古曰謂之行者言順天行氣次二曰羞用五事師古曰羞進也次三曰農用八政張晏曰農食之本食為八政首故以農為名也師古曰此説非也農厚也羞用義例皆同非田農之義也次四曰旪用五紀應劭曰旪合也合成五行為之條紀也師古曰旪讀曰叶和也次五曰建用皇極應劭曰皇大極中也次六曰艾用三徳應劭曰艾治也治大中之道用三徳也師古曰艾讀曰乂次七曰明用稽疑應劭曰疑事明考之於蓍龜次八曰念用庶徵師古曰念思也庶衆也徵應也次九曰嚮用五福畏用六極應劭曰天所以嚮樂人用五福所以畏懼人用六極凡此六十五字皆雒書本文所謂天廼錫禹大法九章常事所次者也以為河圖雒書相為經緯八卦九章相為表裏昔殷道弛文王演周易師古曰演廣也更廣其文也演音弋善反周道敝孔子述春秋則乾坤之隂陽效洪範之咎徵天人之道粲然著矣漢興承秦滅學之後景武之世董仲舒治公羊春秋始推隂陽為儒者宗宣元之後劉向治榖梁春秋數其􅫚福傳以洪範師古曰􅫚古文禍字以洪範義傳而説之傳字或作傅讀曰附謂附著與仲舒錯師古曰錯互不同也至向子歆治左氏傳其春秋意亦已乖矣言五行傳又頗不同是以㩜仲舒别向歆師古曰㩜字與擥同謂引取之㩜音來敢反傳載眭孟夏侯勝京房谷永李尋之徒所陳行事訖于王莽舉十二世以傅春秋著于篇師古曰傅讀曰附謂比附其事經曰初一曰五行五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上師古曰皆水火自然之性也木曰曲直師古曰言可揉而曲可矯而直金曰從革張晏曰革更也可更銷鑄也土爰稼穡師古曰爰亦曰也一説爰於也可於其上稼穡也種之曰稼收聚曰穡傳曰田獵不宿服䖍曰不得其時也或曰不豫戒曰不宿不戒以其時也飲食不享師古曰不行享獻之禮也出入不節奪民農時及有姦謀李竒曰姦謀増賦履畝之事也臣瓚曰姦謂邪謀也師古曰即下所謂作為姦詐以奪農時則木不曲直説曰木東方也於易地上之木為觀師古曰坤下巽上觀巽為木故云地上之木也其於王事威儀容貌亦可觀者也故行步有佩玉之度師古曰玉佩上有雙衡下有雙璜琚瑀以雜之衝牙玭珠以納其間右徵角而左宫羽進則掩之退則揚之然後玉鏘鳴焉是為行步之節度也璜音黄琚音居瑀音禹玭音步于反登車有和鸞之節師古曰和鈴也以金為之施於衡上鸞亦以金為鸞鳥而栖衡衘鈴焉施於鑣上動皆有聲以為舒疾之節也田狩有三驅之制師古曰謂田獵三驅也三驅之禮一為乾豆二為賔客三為充君之庖也飲食有享獻之禮師古曰以禮飲食謂之享進爵於前謂之獻出入有名使民以時務在勸農桑謀在安百姓如此則木得其性矣若廼田獵馳騁不反宫室飲食沈湎不顧法度師古曰沈湎謂溺於酒食湎音彌善反妄興繇役以奪民時作為姦詐以傷民財則木失其性矣蓋工匠之為輪矢者多傷敗如淳曰揉輪不曲矯矢不直也及木為變怪臣瓚曰梓柱更生及變為人形是也是為木不曲直春秋成公十六年正月雨木冰劉歆以為上陽施不下通下隂施不上逹故雨而木為之冰雰氣寒師古曰雰音紛木不曲直也劉向以為冰者隂之盛而水滯者也木者少陽貴臣卿大夫之象也此人將有害則隂氣脅木木先寒故得雨而冰也是時叔孫喬如出奔公子偃誅死師古曰叔孫喬如叔孫宣伯也通於宣公夫人穆姜謀欲作亂不克而出奔齊公子偃宣公庶子成公弟也豫喬如之謀故見誅事並在十六年冬一曰時晉執季孫行父又執公此執辱之異師古曰行父季文子也十六年秋公㑹晉侯于沙隨晉受喬如之譛而止公是年九月又信喬如之譛而執行父也或曰今之長老名木冰為木介介者甲甲兵象也是歲晉有􅋣陵之戰楚王傷目而敗師古曰晉楚戰于􅋣陵吕錡射恭王中目􅋣陵鄭地屬常雨也傳曰棄法律逐功臣殺太子以妾為妻則火不炎上説曰火南方揚光煇為明者也其於王者南面鄉明而治師古曰鄉讀曰嚮書云知人則悊能官人師古曰虞書咎繇謩之辭悊智也能知其材則能官之所以為智也故堯舜舉羣賢而命之朝師古曰謂稷卨以下逺四佞而放諸壄師古曰四佞即四凶也逺離也壄古野字孔子曰浸潤之讚膚受之訴不行焉可謂明矣師古曰論語載孔子之言也浸潤言積漸也膚受謂初入皮膚以至骨髓也賢佞分别官人有序帥由舊章師古曰帥循也敬重功勲殊别適庶師古曰適讀曰嫡如此則火得其性矣若廼信道不篤或燿虛偽讒夫昌邪勝正則火失其性矣自上而降及濫炎妄}
