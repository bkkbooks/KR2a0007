  - {type: variant, offset: 33, length: 0, content: '', krp: 太中大夫李息為材官將軍欲襲單于單于覺之而去自是始征伐四夷師出三十餘年天下戸口減半京房易傳曰興兵妄誅兹謂亡法厥災霜夏殺五榖冬殺麥誅不原情兹謂不仁其霜夏先大雷風冬先雨廼隕霜有芒角賢聖遭害其霜附木不下地佞人依刑兹謂私賊其霜在草根土隙間不教而誅兹謂虐其霜反在草下元帝永光元年三月隕霜殺桑九月二日隕霜殺稼天下大飢是時中書令石顯用事専權與春秋}
  - {type: variant, offset: 34, length: 1, content: 塞, WYG: 公時隕霜同應成帝即位顯坐作威福誅釐公二十九年秋大雨雹劉向以為盛陽雨水温煖而湯熱陰氣脅之不相入則轉而為雹盛陰雨雪凝滯而冰寒陽氣薄之不相入則散而為霰師古曰霰雨雪雜下音先見反故沸湯之在閉器而湛於寒泉則為冰孟康曰投湯器中以沈寒泉而成也師古曰湛讀曰沈及雪之銷亦冰解而散此其驗也故雹者陰脅陽也霰者陽薄陰也春秋不書霰者猶月食也釐公末年信用公子遂遂專權自恣將至於殺君故隂脅陽之象見釐公不寤遂終專權後二年殺子赤立宣公師古曰公子遂者東門襄仲也赤文公太子即惡也劉敞曰二年殺子赤立宣公案自僖公末年至文公卒凡二十三年今言二年誤也左氏傳曰聖人在上無雹雖有不為災說曰凡物不為災不書書大言為災也凡雹皆冬之愆陽夏之伏陰也師古曰愆過也過陽冬温也伏隂夏寒也昭公三年大雨雹是時季氏專權脅君之象見昭公不寤後季氏卒逐昭公元封三年十二月雷雨雹大如馬頭宣帝}
