  - {type: variant, offset: 141, length: 0, content: '', krp: 氏鄭氏凡六人為列侯師古曰外戚傳傅太后弟子喜封高武侯晏封孔鄉侯商封汝昌侯同母弟子鄭業為陽信侯丁太后兄明封陽安侯子滿封平周侯傅氏鄭氏侯者四人丁氏侯者二人今此言六人為列侯其數是也傅氏丁氏鄭氏則有之而不見周氏所出志傳不同未詳其意楊宣對曰五侯封日天氣赤黄丁傅復然服䖍曰楊宣諫大夫也此殆爵土過制傷亂土氣之祥也京房易傳曰經稱觀其生師古曰易觀卦上九爻辭言大臣之義當觀賢人知其性行推而貢之否則為聞善不與兹謂不知師古曰徒知之而已不能進助也厥異黄厥咎聾厥災不嗣黄者日上黄光不散如火然有黄濁氣四塞天下蔽賢絶道故災異至絶世也經曰良馬逐師古曰此易大畜九三爻辭逐進也言大臣得賢者謀當顯進其人否則為下相攘善師古曰攘郤也言不進逹之也一曰攘因也因而竊取曰攘音人羊反兹謂盜明厥咎亦不嗣至於身僇家絶師古曰僇古戮字史記周幽王二年周三川皆震應劭曰震地震三川竭也師古曰三川涇渭洛也洛即漆沮也川自震耳故將壅塞非地震也劉向以為金木水火沴土者也伯陽甫曰服䖍曰周太史周將亡矣天地之氣不過其序若過其序民亂之也陽伏而不能出陰廹而不能升應劭曰廹陰廹陽使不能升也於是有地震今三川實震是陽失其所而填陰也應劭曰失其所失其道也填陰為陰所填不得升也師古曰填音竹刃反陽失而在陰原必塞師古曰原謂水泉之本也原塞國必亡夫水土演而民用也應劭曰演引也所以引出土氣者也師古曰演音衍土無所演而民乏財用不亡何待昔伊雒竭而夏亡河竭而商亡今周徳如二代之季其原又塞塞必竭川竭山必崩夫國必依山川山崩川竭亡之徵也若國亡不過十年數之紀也是嵗三川竭岐山崩劉向以為陽失在陰者謂火氣來煎枯水故川竭也山川連體下竭上崩事埶然也時幽王暴虐妄誅伐不聽諫迷於襃姒廢其正后師古曰襃姒襃人所獻之女也正后申后也蓋白華之詩所為作也廢后之父申侯與犬戎共攻殺幽王一曰其在天文水為辰星辰星為蠻夷月食辰星國以女亡幽王之敗女亂其内夷攻其外京房易傳曰君臣相背厥異名水絶師古曰有名之水文公九年九月癸酉地震劉向以為先是時齊桓晉文魯釐二伯賢君新没師古曰齊桓晉文二伯也魯僖賢君也伯讀曰覇周襄王失道師古曰謂避叔帶之難而出奔失為君之道楚穆王殺父師古曰穆王商臣也殺其父成王也諸侯皆不肖權傾於下天戒若曰臣下彊盛者將動為害後宋魯晉莒鄭陳齊皆殺君師古曰文十六年宋人殺其君杵臼十八年襄仲殺惡宣二年晉趙盾殺其君夷臯文十八年莒弑其君庶其宣四年鄭公子歸生殺其君夷十年陳夏徵舒殺其君平國文十八年齊人殺其君商人諸震略皆從董仲舒說也京房易傳曰臣事雖正專必震其震於水則波於木則揺於屋則瓦落大經在辟而易臣兹謂陰動服䖍曰經常也辟音刑辟之辟蘇林曰大經五行之常經也在辟衆陰犯殺其上也師古曰辟讀曰僻謂常法僻壞而易臣也厥震揺政宫大經揺政兹謂不陰厥震揺山山出涌水嗣子無徳専祿兹謂不順厥震動丘陵涌水出襄公十六年五月甲子地震劉向以為先是雞澤之會諸侯盟大夫又盟師古曰雞澤衞地也襄三年公會單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤陳侯使袁僑如會戊寅叔孫豹及諸侯大夫及陳袁僑盟也是嵗三月諸侯為湨梁之會而大夫獨相與盟師古曰經書諸大夫盟謂晉宋衞鄭曹莒邾薛杞小邾之大夫五月地震矣其後崔氏專齊欒盈亂晉良霄傾鄭閽殺吳子燕逐其君楚滅陳蔡師古曰崔氏齊卿崔杼也欒盈晉大夫欒桓子之子懷子也二十一年奔楚二十三年復入于晉而作亂良霄鄭大夫伯有也三十年子晳以駟氏之甲伐而焚之伯有奔廱梁遂奔許晨自墓門之竇入介于襄庫以伐舊北門駟帶率國人伐之伯有死于羊肆閽守門者也吳子餘祭也吳人伐越獲俘焉以為閽使守舟二十九年餘祭觀舟閽以刀殺之燕北燕國也昭三年冬燕大夫殺公之外嬖公懼奔齊昭八年楚師滅陳十一年楚滅蔡也昭公十九年五月己卯地震劉向以為是時季氏將有逐君之變其後宋三臣曹會皆以地叛師古曰二十年宋華亥向寧華定出奔陳二十一年自陳入于宋南里以叛曹會大夫公孫會也二十年自鄸出奔宋榖梁傳曰自鄸者專鄸也鄸會之邑也鄸音莫風反蔡莒逐其君吳敗中國殺二君師古曰昭二十一年蔡人信費無極之言出蔡侯朱朱出奔楚二十三年莒子庚輿虐而好劒國人患之秋七月烏存帥國人以逐之庚輿出奔魯戊辰吳敗楚頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅是也二十三年八月乙未地震劉向以為是時周景王崩劉單立王子猛尹氏立子朝師古曰已解于上其後季氏逐昭公黑肱叛邾師古曰黑肱邾大夫也三十一年經書邾黑肱以濫來奔濫邾邑吳殺其君僚師古曰二十七年吳公子光使専設諸抽劒刺王是也宋五大夫晉二大夫皆以地叛師古曰定十年宋公之弟辰暨仲它石彄出奔陳十一年春辰及仲它石彄公子地自陳入于蕭以叛秋宋樂大心自曹入于蕭十三年晉荀寅士吉射入朝歌以叛哀公三年四月甲午地震劉向以為是時諸侯皆信邪臣莫能用仲尼盜殺蔡侯齊陳乞弑君師古曰哀四年經書盜殺蔡侯申左氏傳曰蔡昭侯將如吳諸大夫恐其又遷也公孫翩逐而射之入千家人而卒陳乞齊大夫陳僖子也六年乞殺其君荼荼景公之子安孺子也惠帝二年正月地震隴西厭四百餘家師古曰厭音一甲反次下亦同武帝征和二年八月癸亥地震厭殺人宣帝本始四年四月壬寅地震河南以東四十九郡北海琅邪壞祖宗廟城郭殺六千餘人元帝永光三年冬地震綏和二年九月丙辰地震自京師至北邊郡國三十餘壞城郭凡殺四百一十五人釐公十四年秋八月辛卯沙麓崩榖梁傳曰林屬於山曰麓師古曰屬聯也音之欲反沙其名也劉向以為臣下背叛散落不事上之象也先是齊桓行伯道會諸侯事周室管仲既死桓徳日衰天戒若曰伯道將廢諸侯散落政逮大夫陪臣執命臣下不事上矣桓公不寤天子蔽晦師古曰被掩蔽而暗也及齊桓死天下散而從楚王札子殺二大夫師古曰二大夫召伯毛伯也晉敗天子之師師古曰謂敗之於貿戎也已解于上莫能征討從是陵遲公羊以為沙麓河上邑也董仲舒說略同一曰河大川象齊大國桓徳衰伯道將移於晉文故河為徙也左氏以為沙麓晉地沙山名也地震而麓崩不書震舉重者也伯陽甫所謂國必依山川山崩川竭亡之徵也不過十年數之紀也至二十四年晉懷公殺於高梁師古曰懷公謂子圉惠公之子也文公入國而使殺之高梁晉地京房易傳曰小人剝廬師古曰剝卦上九爻之辭厥妖山崩兹謂陰乗陽弱勝彊成公五年夏梁山崩榖梁傳曰廱河三日不流師古曰廱讀曰壅晉君帥羣臣而哭之廼流師古曰從伯宗用輦者之言劉向以為山陽君也水陰民也天戒若曰君道崩壞下亂百姓將失其所矣哭然後流喪亡象也梁山在晉地自晉始而及天下也後晉暴殺三卿厲公以弑師古曰三卿謂郤犨郤錡郤至也厲公殺之而欒書中行偃又弑厲公事在成十七年湨梁之會天下大夫皆執國政師古曰已解于上其後孫寗出衞獻師古曰孫孫林父寗寗殖皆衞大夫也衞獻公定公之子也名衎獻公戒二子食日旰不召而射鴻於囿二子怒因作亂公如鄄遂出奔齊孫氏追之敗公徒於柯澤事在襄十四年三家逐魯昭單尹亂王室師古曰並解于上董仲舒說略同劉歆以為梁山晉望也崩弛崩也師古曰言漸解散也弛音式爾反古者三代命祀祭不越望吉凶禍福不是過也國主山川山崩川竭亡之徵也美惡周必復師古曰復音扶目反是嵗嵗在鶉火至十七年復在鶉火欒書中行偃殺厲公而立悼公髙后二年正月武都山崩殺七百六十人地震至八月廼止文帝元年四月齊楚地山二十九所同日俱大發水潰出劉向以為近水沴土也天戒若曰勿盛齊楚之君今失制度將為亂後十六年帝庶兄齊悼惠王之孫文王則薨無子帝分齊地立悼惠王庶子六人皆為王師古曰謂齊孝王將閭濟北王志菑川王賢膠東王雄渠膠西王卬濟南王辟光賈誼鼂錯諫以為違古制恐為亂至景帝三年齊楚七國起兵百餘萬漢皆破之春秋四國同日災師古曰宋衞陳鄭漢七國同日衆山潰咸被其害不畏天威之明效也成帝河平三年二月丙戌犍為柏江山崩捐江山崩皆廱江水師古曰廱讀曰壅次下亦同江水逆流壞城殺十三人地震積二十一日百二十四動元延三年正月丙寅蜀郡岷山崩廱江江水逆流三日廼通劉向以為周時岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角從參至辰如淳曰孛星尾長及攝提大角始𤼵於參至辰也殆必亡矣其後三世亡嗣王莽簒位傳曰皇之不極是謂不建厥咎眊服䖍曰眊音老耄厥罰恒陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行皇之不極是謂不建皇君也極中建立也人君貌言視聽思心五事皆失不得其中則不能立萬事失在眊悖故其咎眊也師古曰眊不明也悖惑也音布内反王者自下承天理物雲起於山而彌於天師古曰彌滿也天氣亂故其罰常陰也一曰上失中則下彊盛而蔽君明也易曰亢龍有悔貴而亡位髙而亡民賢人在下位而亡輔師古曰乾上九文言也如此則君有南面之尊而亡一人之助故其極弱也盛陽動進輕疾服䖍曰陽行輕且疾也禮春而大射以順陽氣韋昭曰將祭與羣臣射謂之大射上微弱則下奮動故有射妖易曰雲從龍師古曰乾九五文言又曰龍蛇之蟄以存身也師古曰下繫辭也陰氣動故有龍蛇之孽於易乾為君為馬馬任用而彊力君氣毁故有馬禍一曰馬多死及為怪亦是也君亂且弱人之所叛天之所去不有明王之誅則有簒弑之禍故有下人伐上之痾凡君道傷者病天氣不言五行沴天而曰日月亂行星辰逆行者為若下不敢沴天猶春秋曰王師敗績于貿戎不言敗之者以自敗為文尊尊之意也劉歆皇極傳曰有下體生上之痾說以為下人伐上天誅已成不得復為痾云皇極之常陰劉向以為春秋亡其應一曰久陰不雨是也劉歆以為自屬常陰昭帝元平元年四月崩亡嗣立昌邑王賀賀即位天陰晝夜不見日月賀欲出光禄大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言臣瓚曰不敢察察明言之故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明效也京房易傳曰有蜺蒙霧霧上下合也蒙如塵雲蜺日旁氣也其占曰后妃有専蜺再重赤而専至衝旱孟康曰專員也若五月再重赤而員至十一月旱也妻不壹順黑蜺四背又白蜺雙出日中妻以貴髙夫兹謂擅陽蜺四方日光不陽解而温服䖍曰蒙氣解而温内取兹謂禽服䖍曰人君内淫於骨肉也師古曰取如禮記聚麀之聚蜺如禽在日旁以尊降妃兹謂薄嗣蜺直而塞六辰廼除夜星見而赤韋昭曰六辰謂從卯至申女不變始兹謂乗夫孟康曰始貴髙於夫終行此不變也蜺白在日側黑蜺果之氣正直師古曰果謂干之也妻不順正兹謂擅陽蜺中窺貫而外専夫妻不嚴兹謂媟韋昭曰媟言媟慢也師古曰音先列反蜺與日會婦人擅國兹謂頃師古曰頃讀曰傾蜺白貫日中赤蜺四背服䖍曰蜺背日適不荅兹謂不次服䖍曰言適妻不見荅也臣瓚曰夫不接妻為不荅師古曰適讀曰嫡荅報也言妻有承順之心不見報荅也一曰荅對也言不以恩意接對之蜺直在左蜺交在右取於不専兹謂危嗣蜺抱日兩未及君淫外兹謂亡蜺氣左日交於外取不逹兹謂不知蜺白奪明而大温温而雨師古曰取讀曰聚尊卑不别兹謂媟蜺三出三巳三辰除韋昭曰若從寅至辰也蜺旦見西晏則雨除則日出且雨臣私禄及親兹謂罔辟韋昭曰辟君也厥異蒙其蒙先大温已蒙起日不見行善不請於上兹謂作福蒙一日五起五解辟不下謀臣辟異道兹謂不見上蒙下霧風三變而俱解立嗣子疑兹謂動欲蒙赤日不明徳不序兹謂不聰蒙日不明温而民病徳不試空言禄師古曰試用也兹謂主窳臣夭孟康曰謂君惰窳用人不以次第為夭也師古曰窳音庾蒙起而白君樂逸人兹謂放蒙日青黑雲夾日左右前後行過日公不任職兹謂怙禄蒙三日又大風五日蒙不解利邪以食兹謂閉上蒙大起白雲如山行蔽日公懼不言道兹謂閉下蒙大起日不見若雨不雨至十二日解而有大雲蔽日禄生於下兹謂誣君蒙微而小雨已乃大雨下相攘善兹謂盜明蒙黄濁下陳功求於上兹謂不知蒙微而赤風鳴條解復蒙下専刑兹謂分威蒙而日不得明大臣厭小臣兹謂蔽蒙微日不明若解不解大風發赤雲起而蔽日衆不惡惡兹謂閉蒙尊卦用事孟康曰尊卦乾坤也臣瓚曰京房謂之方伯卦震兌坎離也師古曰孟說是也三日而起日不見漏言亡喜兹謂下厝用師古曰厝音干各反蒙微日無光有雨雲雨不降廢忠惑佞兹謂亡蒙天先清而暴蒙微而日不明有逸民兹謂不明蒙濁奪日光公不任職兹謂不絀蒙白三辰止則日青青而寒寒必雨忠臣進善君不試兹謂遏師古曰試用也蒙先小雨雨已蒙起微而日不明惑衆在位兹謂覆國蒙微而日不明一温一寒風揚塵知佞厚之兹謂庫蒙甚而温君臣故弼兹謂悖師古曰弼猶相戾也悖惑也厥災風雨霧風拔木亂五榖已而大霧庶正蔽惡兹謂生孽災厥異霧此皆陰雲之類云嚴公十八年秋有蜮劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人射人有處甚者至死師古曰以氣射人也南方謂之短弧師古曰即射工也亦呼水弩近射妖死亡之象也時嚴將取齊之淫女故蜮至天戒若曰勿娶齊女將生淫惑簒弑之禍嚴不寤遂取之入後淫於二叔二叔以死兩子見弑夫人亦誅師古曰並解於上劉歆以為蜮盛暑所生非自越來也京房易傳曰忠臣進善君不試厥咎國生蜮史記魯哀公時有隼集于陳廷而死師古曰隼鷙鳥即今之鴩也說者以為鷂失之矣廷朝廷也鴩字音胡骨反楛矢貫之應劭曰楛木名師古曰音怙其木堪為箭笴今豳以北皆用之土俗呼其木為楛子也石砮應劭曰砮鏃也音奴又乃互反長尺有咫張晏曰八寸曰咫陳閔公使使問仲尼師古曰閔公名周懷公之子仲尼曰隼之來逺矣昔武王克商通道百蠻使各以方物來貢肅慎貢楛矢臣瓚曰肅慎東北夷石砮長尺有咫先王分異姓以逺方職使毋忘服師古曰服事也故分陳以肅慎矢試求之故府果得之師古曰得昔所分之矢於府藏中劉向以為隼近黑祥貪暴類也矢貫之近射妖也死於廷國亡表也象陳眊亂不服事周師古曰眊音莫報反而行貪暴將致逺夷之禍為所滅也是時中國齊晉南夷吳楚為彊師古曰中國則齊晉為彊南夷則吳楚為彊陳交晉不親附楚不固數被二國之禍後楚有白公之亂師古曰白公楚平王太子建之子勝也建遇讒奔鄭而死勝在吳子西召之使處吳境為白公吳人伐慎白公敗之請以戰備獻因作亂子西子期皆死事在哀十六年陳乗而侵之師古曰白公之亂陳人恃其聚而侵楚事在哀十七年卒為楚所滅師古曰陳閔公之二十年獲麟之嵗也其二十四年而為楚所滅史記夏后氏之衰有二龍止於夏廷而言余襃之二君也師古曰襃古國名夏帝卜殺之去之止之莫吉卜請其漦而藏之乃吉應劭曰漦沬也鄭氏曰漦音牛齝之齝師古曰去謂驅逐也止謂拘留也去音丘吕反漦音丑之反於是布幣策告之師古曰奠幣為禮讀策辭而告之也說者以為策者􅀈米蓋失之矣龍亡而漦在乃匵去之師古曰匵匵也去藏也匵音讀去音丘吕反其後夏亡傳匵於}
