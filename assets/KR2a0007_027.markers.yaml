  - {type: variant, offset: 4796, length: 2, content: 錯哉, WYG: 郤行厥異鶂退飛適當黜則鶂退飛師古曰適讀曰嫡惠帝三年隕石緜諸一師古曰緜諸道也屬天水郡也武帝征和四年二月丁酉隕石雍二天晏亡雲聲聞四百里師古曰雍扶風之縣也晏天清也元帝建昭元年正月戊辰隕石梁國六成帝建始四年正月癸卯隕石槀四肥累一孟康曰皆縣名也故屬真定師古曰槀音工老反累音力追反陽朔三年二月壬戌隕石白馬八師古曰東郡之縣名鴻嘉二年五月癸未隕石杜衍三師古曰南陽之縣名元延四年三月隕石都闗二師古曰山陽之縣名哀帝建平元年正月丁未隕石北地十其九月甲辰隕石虞二師古曰梁國之縣名平帝元始二年六月隕石鉅鹿二自惠盡平隕石凡十一皆有光燿雷聲成哀尤屢前漢書卷二十七下之下前漢書卷二十七下之下考證五行志下之下後鄭拒王師拒監本别本俱訛岠從宋本改正史記推合朔在夜監本無記字宋本有從之十二年三月庚午朔日有食之臣召南按僖十二年經無朔字在斗二十三度宋本作二十二度後四年四月丙辰晦日有食之臣召南按孝文紀作丙寅晦又七年正月辛未朔日食紀未及書又景帝三年二月壬午晦孝經紀作壬子晦紀于四年十月戊戌晦書食此志不書中元年九月甲戌晦紀未及書紀于中四年十月戊午書食此志不書又後元年七月乙巳紀但言晦不言先晦一日孝武帝建元五年正月己巳朔及元光元年二月丙辰晦紀皆不書七月癸未書食但不云先晦一日元朔二年二月乙巳晦紀作三月乙亥六年十一月癸丑晦及元封四年六月己酉朔太始元年正月乙巳晦紀皆不書孝昭帝元鳯元年七月己亥晦紀作乙亥孝宣帝五鳳四年四月辛丑朔紀作晦孝成帝永始元年九月丁巳晦紀不書孝哀帝元夀二年三月壬辰晦紀作夏四月壬辰晦紀志互異如此前漢書卷二十七下之下考證}
