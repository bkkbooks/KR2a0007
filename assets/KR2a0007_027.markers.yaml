  - {type: variant, offset: 8, length: 5, content: 劉賈高帝從, WYG: 師古曰虙讀與伏同受河圖則而畫之八卦是也師古曰放效河圖而畫八卦也禹治洪水賜雒書法而陳之洪範是也師古曰取法雒書而陳洪範也聖人行其道而寳其真降及于殷箕子在}
