  - {type: variant, offset: 69, length: 0, content: '', WYG: 出酒泉征和三年貳師七萬人沒不還平帝元始二年秋蝗徧天下是時王莽秉政左氏傳曰嚴公八年齊襄公田于貝丘師古曰貝丘齊地見豕從者曰公子彭生也公怒曰射之豕人立而嗁公懼墜車傷足喪屨劉向以為近豕禍也先是齊襄淫於妹魯桓公夫人使公子彭生殺桓公又殺彭生以謝魯公孫無知有寵於先君襄公絀之師古曰無知僖公弟夷仲年之子也於襄公從父昆弟先君即僖公無知帥怨恨之徒攻襄於田所師古曰怨恨之徒謂連稱管至父久戍葵丘也襄匿其戸間足見於戸下遂殺之傷足喪屨卒死於足虐急之效也昭帝元鳳元年燕王宫永巷中豕出圂壞都竈師古曰圂者養豕之牢也都竈烝炊之大竈也圂音胡頓反銜其鬴六七枚置殿前晉灼曰鬴古文釡字劉向以為近豕禍也時燕王旦與長公主左將軍謀為大逆誅殺諫者暴急無道竈者生養之本豕而敗竈陳鬴於庭鬴竈將不用宫室將廢辱也燕王不改卒伏其辜京房易傳曰衆心不安君政厥妖豕入居室史記魯襄公二十三年榖洛水鬬將毁王宫劉向以為近火沴水也周靈王將擁之有司諫曰不可長民者不崇藪不墮山不防川不竇澤師古曰長民為民之長也崇聚也藪謂澤之無水者墮毁也防止也竇穴也墮音火規反今吾執政毋乃有所辟服䖍曰音邪辟之辟而滑夫二川之神師古曰滑亂也音骨使至于爭明臣瓚曰明水道也師古曰明謂神靈以防王宫室王而飾之母乃不可乎師古曰言為欲防固王宫使水不得毁故遏飾二川懼及子孫王室愈卑王卒擁之以傳推之以四瀆比諸侯榖洛其次卿大夫之象也師古曰榖洛皆大水故為四瀆之次為卿大夫將分爭以危亂王室也是時世卿專權儋括將有簒殺之謀師古曰儋括儋季之子簡王之孫也簒殺之謀謂除喪服將見靈王過庭而歎曰嗚呼必有此夫如靈王覺寤匡其失政師古曰匡正也懼以承戒則災禍除矣不聽諫謀簡嫚大異師古曰諫謀謂單公子愆旗聞儋括之言恐必為害請殺之王不聽也簡嫚大異謂不憂榖洛任其私心塞埤擁下師古曰埤卑也音婢以逆水勢而害鬼神後}
