  - {type: variant, offset: 2149, length: 0, content: '', WYG: 召弟子新都侯王莽入收賢印綬賢恐自殺莽因代之并誅外家丁傅又廢哀帝傅皇后令自殺發掘帝祖母傅太后母丁太后陵更以庶人葬之辜及至尊大臣微弱之禍也文公十一年敗狄于鹹師古曰鹹魯地也榖梁公羊傳曰長狄師古曰防風之後漆姓也國號鄋瞞鄋音所求反瞞音莫干反兄弟三人一者之魯師古曰僑如也來伐魯為叔孫得臣所獲一者之齊師古曰榮如也齊襄公二年伐齊為王子成父所獲一者之晉師古曰焚如也宣十五年晉滅潞國而獲之皆殺之身横九畮師古曰畮古畝字斷其首而載之眉見於軾師古曰軾車前横木何以書記異也劉向以為是時周室衰微三國為大可責者也天戒若曰不行禮義大為夷狄之行將至危亡其後三國皆有簒弑之禍師古曰謂魯文公薨襄仲弑惡及視而立宣公齊連稱管至父弑襄公而立無知晉欒書中行偃弑厲公而立悼公近下人伐上之痾也劉歆以為人變屬黄祥一曰屬臝蟲之孽一曰天地之性人為貴凡人為變皆屬皇極下人伐上之痾云京房易𫝊曰君暴亂疾有道厥妖長狄入國又曰豐其屋下獨苦師古曰豐其屋易豐卦上六爻辭也豐大也長狄生世主虜史記秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見于臨洮師古曰隴西之縣也音土高反天戒若曰勿大為夷狄之行將受其禍是嵗始皇初并六國反喜以為瑞銷天下兵器作金人十二以象之遂自賢聖燔詩書阬儒士奢淫暴虐務欲廣地南戌五嶺北築長城以備胡越師古曰五嶺解在張耳陳餘傳塹山填谷西起臨洮東至遼東徑數千里故大人見於臨洮明禍亂之起後十四年而秦亡亡自戌卒陳勝𤼵史記魏襄王十三年魏有女子化為丈夫京房易𫝊曰女子化為丈夫兹謂陰昌賤人為王丈夫化為女子兹謂陰勝厥咎亡一曰男化為女宫刑濫也女化為男婦政行也哀帝建平中豫章有男子化為女子嫁為人婦生一子長安陳鳳言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子者將復一世乃絶哀帝建平四年四月山陽方與女子田無嗇生子師古曰方與者山陽之縣也女子姓田名無嗇方與音房豫先未生二月兒嗁腹中及生不舉葬之陌上三日人過聞嗁聲母掘收養平帝元始元年二月朔方廣牧女子趙春病死師古曰廣牧朔方之縣也姓趙名春歛棺積六日出在棺外自言見夫死父曰年二十七不當死太守譚以聞京房易𫝊曰幹父之蠱有子考亡咎韋昭曰蠱事也子能正父之事是為有子故考不為咎累師古曰易蠱卦初六爻辭也子三年不改父道思慕不皇亦重見先人之}
