  - {type: variant, offset: 2217, length: 0, content: '', krp: 師古曰哀姜為齊人所殺兩弟死師古曰謂叔牙及慶父也狄滅邢師古曰已解于上徐取舒師古曰僖三年徐人取舒舒國名也在廬江舒縣也晉殺世子師古曰僖五年晉侯殺其太子申生楚滅弦師古曰僖五年楚人滅弦弦國名也在弋陽劉歆以為八月秦周分僖公五年九月戊申朔日有食之董仲舒劉向以為先是齊桓行伯江黄自至師古曰江黄二國名也僖二年齊侯宋公江人黄人盟于貫傳曰服江黄也江國在汝南安陽縣黄國在弋陽縣南服彊楚師古曰僖四年齊侯以諸侯之師侵蔡遂伐楚盟于召陵其後不内自正而外執陳大夫則陳楚不附師古曰召陵盟後以陳轅濤塗為誤軍而執之陳不服罪故伐之楚自是不復通鄭伯逃盟師古曰僖五年秋齊侯與諸侯盟于首止鄭伯逃歸不盟諸侯將不從桓政故天見戒其後晉滅虢師古曰事在僖五年楚圍許諸侯伐鄭師古曰事竝在僖六年晉弑二君師古曰謂里克弑奚齊及卓子狄滅温師古曰温周邑也僖十年狄滅之楚伐黄師古曰僖十一年黄不歸楚貢故之伐桓不能救劉歆以為七月秦晉分十二年三月庚午朔日有食之董仲舒劉向以為是時楚滅黄師古曰事在十二年夏狄侵衛鄭師古曰僖十三年狄侵衛十四年狄侵鄭莒滅杞師古曰僖十四年諸侯城緣陵公羊傳曰曷為城杞滅也孰滅之蓋徐莒也劉歆以為三月齊衛分十五年五月日有食之劉向以為象晉文公將行伯道後遂伐衛執曹伯敗楚城濮師古曰事竝在二十八年再㑹諸侯師古曰二十八年五月盟于踐土冬㑹于温召天王而朝之師古曰晉侯不欲就朝王故召王使來經書天王狩于河陽此其效也日食者臣之惡也夜食者掩其罪也以為上亡明王桓文能行伯道攘夷狄安中國雖不正猶可蓋春秋實與而文不與之義也董仲舒以為後秦獲晉侯師古曰晉侯夷吾也僖十五年十一月晉侯及秦伯戰于韓秦獲晉侯以歸也齊滅項師古曰事在公羊傳僖十七年項國今項城縣是也楚敗徐于婁林師古曰事在僖十五年冬婁林徐地劉歆以為二月朔齊越分文公元年二月癸亥日有食之董仲舒劉向以為先是大夫始執國政師古曰謂東門襄仲也公子遂如京師師古曰事在僖三十年報宰周公之聘後楚世子商臣殺父齊公子商人弑君皆自立師古曰已解于上宋子哀出奔師古曰宋子哀宋卿高哀也不義宋公而來奔魯事在文十四年晉滅江師古曰春秋文四年楚人滅江今此云晉未詳其説楚滅六師古曰六國名也在廬江六縣文五年楚人滅之大夫公孫敖叔彭生竝專㑹盟師古曰文七年冬公孫敖如莒蒞盟十一年叔彭生會郤缺于承匡公孫敖孟穆伯叔彭生叔仲惠伯也劉歆以為正月朔燕越分十五年六月辛丑朔日有食之董仲舒劉向以為後宋齊莒晉鄭八年之間五君殺死師古曰文十六年宋弑其君杵臼十八年夏齊人弑其君啇人冬莒弑其君庶其宣二年晉趙盾弑其君夷臯四年鄭公子歸生弑其君夷也楚滅舒蓼劉歆以為四月二日魯衛分宣公八年七月甲子日有食之既董仲舒劉向以為先是楚商臣弑父而立至于嚴王遂彊諸夏大國唯有齊晉齊晉新有簒弑之禍内皆未安故楚乘弱横行八年之間六侵伐而一滅國師古曰六侵伐者謂宣元年侵陳三年侵鄭四年伐鄭五年伐鄭六年伐鄭八年伐陳也一滅國者謂八年滅舒蓼也伐陸渾戎觀兵周室師古曰宣三年楚子伐陸渾之戎遂至于洛觀兵于周疆觀兵者示威武也後又入鄭鄭伯肉袒謝罪北敗晉師于邲流血色水師古曰事並在十二年邲鄭地色水謂血流入水而變水之色也邲音蒲必反圍宋九月析骸而炊之師古曰事在十五年炊㸑也言無薪樵示困之甚也劉歆以為十月二日楚鄭分十年四月丙辰日有食之董仲舒劉向以為後陳夏徴舒弑其君師古曰弑靈公也事在十年楚滅蕭師古曰蕭宋附庸國也事在十二年晉滅二國師古曰謂十五年滅赤狄潞氏十六年滅赤狄甲氏王札子殺召伯毛伯師古曰事在十五年劉歆以為二月魯衛分十七年六月癸卯日有食之董仲舒劉向以為後邾支解鄫子師古曰十八年邾人戕鄫子于鄫支解而節斷之謂解其四支斷其骨節晉敗王師于貿戎師古曰事在成元年敗齊于鞌師古曰事在成二年劉歆以為三月晦朓魯衛分服䖍曰朓相覜也日晦食為朓臣瓉曰志云晦而月見西方曰朓以此名之非日食晦之名也師古曰朓音佗了反成公十六年六月丙寅朔日有食之董仲舒劉向以為後晉敗楚鄭于鄢陵師古曰事在十六年鄢陵鄭地執魯侯師古曰已解于上劉歆以為四月二日魯衛分十七年十二月丁巳朔日有食之董仲舒劉向以為後楚滅舒庸師古曰事在十七年日食之後舒庸蓋羣舒之一種楚與國也晉弑其君師古曰謂厲公也事在十八年宋魚石因楚奪君邑師古曰魚石宋大夫也十五年出奔楚至十八年楚伐宋取彭城而納之莒滅鄫齊滅萊師古曰事並在襄六年鄫萊皆小國鄭伯弑死師古曰鄭僖公也襄七年會于鄬其大夫子駟使賊夜殺之而以瘧疾赴鄬音為劉歆以為九月周楚分襄公十四年二月乙未朔日有食之董仲舒劉向以為後衛大夫孫寗共逐獻公立孫剽孟康曰剽音驃師古曰孫林父寗殖逐獻公襄十四年四月出奔齊而立剽剽穆公之孫也剽又音匹妙反劉歆以為前年十二月二日宋燕分十五年八月丁巳日有食之董仲舒劉向以為先是晉為雞澤之㑹諸侯盟又大夫盟後為溴梁之㑹諸侯在而大夫獨相與盟師古曰竝已解于上君若綴斿不得舉手應劭曰斿旌旗之旒隨風動揺也師古曰言為下所執隨人東西也劉歆以為五月二日魯趙分二十年十月丙辰朔日有食之董仲舒以為陳慶虎慶寅蔽君之明師古曰二慶竝陳大夫也襄二十年陳侯之弟黄出奔楚將出呼於國曰慶氏無道求專陳國暴蔑其君而去其親五年不滅是無天也邾庶其有叛心師古曰庶其邾大夫後庶其以漆閭丘來奔師古曰事在二十一年漆及閭丘邾之二邑陳殺二慶師古曰二十三年陳侯如楚公子黄訴二慶楚人召之慶氏以陳叛楚屈建從陳侯圍陳遂殺二慶也劉歆以為八月秦周分二十一年九月庚戍朔日有食之董仲舒以為晉欒盈將犯君後入于曲沃師古曰已解于上劉歆以為七月秦晉分十月庚辰朔日有食之董仲舒以為宿在軫角楚大國象也後楚屈氏譛殺公子追舒師古曰公子追舒楚令尹子南也二十二年楚殺之齊慶封脅君亂國師古曰慶封齊大夫也二十七年使盧蒲嫳帥甲攻崔氏殺成及彊盡俘其家崔杼縊而死自是慶封當國專執政也劉歆以為八月秦周分二十三年二月癸酉朔日有食之董仲舒以為後衛侯入陳儀師古曰衛侯衎也前為孫寗所逐二十五年入于陳儀陳儀衛邑左傳曰夷儀寗喜弑其君剽師古曰二十六年寗喜殺剽而衎入於衛寗喜殖子也劉歆以為前年十二月二日宋燕分二十四年七月甲子朔日有食之既劉歆以為五月魯趙分八月癸巳朔日有食之董仲舒以為比食又既師古曰比頻也象陽將絶孟康曰陽君也夷狄主中國之象也後六君弑師古曰謂二十五年齊崔杼殺其君光二十六年衛寗喜弑其君剽二十九年閽殺吴子餘祭三十年蔡太子班弑其君固三十一年莒人弑其君宻州昭元年楚令尹子圍入問王疾縊而殺之楚子果從諸侯伐鄭師古曰二十四年冬楚子蔡侯陳侯許男伐鄭滅舒鳩師古曰二十五年楚屈建帥師滅舒鳩舒鳩亦羣舒一種也魯往朝之師古曰二十八年公如楚卒主中國師古曰謂楚靈王以昭四年與諸侯會于申伐吳討慶封師古曰慶封以二十八年為慶舍之難自齊出奔魯遂奔吳至申之㑹楚靈王伐吳執慶封而殺之劉歆以為六月晉趙分二十七年十二月乙亥朔日有食之董仲舒以為禮義將大滅絶之象也時吳子好勇使刑人守門師古曰吳子即餘祭也刑人閽者蔡侯通於世子之妻師古曰即蔡侯固為太子所殺者也莒不早立嗣師古曰即宻州也生去疾及展輿既立展輿又廢之後閽戕吳子師古曰戕傷也他國臣來弑君曰戕蔡世子般弑其父莒人亦弑君而庶子爭師古曰展輿因國人攻其父而殺之展輿即位去疾奔齊明年去疾入而展輿出奔吳竝非嫡嗣故云庶子爭劉向以為自二十年至此嵗八年間日食七作禍亂將重起師古曰重音直用反故天仍見戒也師古曰仍頻也後齊崔杼弑君宋殺世子師古曰宋平公太子痤也事在二十六年北燕伯出奔孟康曰有南燕故言北燕南燕姞姓北燕姬姓也師古曰昭三年北燕伯欵出奔齊鄭大夫自外入而簒位師古曰謂伯有也指略如董仲舒劉歆以為九月周楚分昭公七年四月甲辰朔日有食之董仲舒劉向以為先是楚靈王弑君而立㑹諸侯師古曰已解于上執徐子滅頼師古曰申之會楚人執徐子遂滅頼後陳公子招殺世子師古曰招成公子哀公弟也昭八年經書陳侯之弟招殺陳太子偃師偃師即哀公之子也招音韶楚因而滅之師古曰偃師之死哀公縊其九月楚公子棄疾奉偃師之子孫吳圍陳遂滅之又滅蔡師古曰十一年楚師滅蔡也執太子有以歸用之後靈王亦弑死師古曰十三年楚公子比弑其君䖍于乾谿是也劉歆以為二月魯衛分傳曰晉侯問於士文伯曰誰將當日食師古曰士文伯晉大夫伯瑕對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災其衛君乎魯將上卿是嵗八月衛襄公卒十一月魯季孫宿卒晉侯謂士文伯曰吾所問日食從矣可常乎師古曰從謂如士文伯之言也可常謂常可以此占之不對曰不可六物不同民心不壹事序不類官職不則同始異終胡可常也詩曰或宴宴居息或盡顇事國如淳曰顇古悴字也師古曰小雅北山之詩也宴宴安息之貌也盡悴言盡力而悴病也其異終也如是公曰何謂六物對曰嵗時日月星辰是謂公曰何謂辰對曰日月之㑹是謂公曰詩所謂此日而食于何不臧何也師古曰小雅十月之交之詩也臧善也對曰不善政之謂也國無政不用善則自取適于日月之災師古曰適讀曰讁故政不可不慎也務三而已一曰擇人二曰因民三曰從時此推日食之占循變復之要也易曰縣象著明莫大於日月師古曰上繋之辭也是故聖人重之載于三經師古曰謂易詩春秋於易在豐之震曰豐其沛日中見昧折其右肱亡咎服䖍曰日中而昏也師古曰此豐卦九三爻辭也言遇此災則當退去右肱之臣乃免咎於詩十月之交則著卿士司徒下至趣馬師氏咸非其材師古曰十月之交詩曰皇父卿士番維司徒蹶維趣馬􅀈維師氏豔妻煽方處司徒地官卿也掌邦教趣馬中士也掌王馬之政師氏中大夫也掌司朝得失之事番蹶􅀈皆氏也羙色曰豔豔妻襃姒也豔或作閻閻亦嬪妾之姓也煽熾也詩人刺王淫於色故皇父之徒皆用后寵而處職位不以徳選也趣音千后反蹶音居衛反􅀈音居禹反番音扶元反同於右肱之所折協於三務之所擇明小人乘君子陰侵陽之原也十五年六月丁巳朔日有食之劉歆以為三月魯衛分十七年六月甲戌朔日有食之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失衆心以弑死師古曰四大夫謂三郤及胥童也胥童非厲公所誅以導亂而死故總書四大夫厲公竟為欒書中行偃所殺後莫敢復責大夫六卿遂相與比周專晉國君還事之師古曰六卿謂范氏中行氏智氏韓魏趙也日比再食其事在春秋後故不載於經劉歆以為魯趙分左氏傳平子曰師古曰季平子唯正月朔慝未作日有食之於是乎天子不舉伐鼓於社諸侯用幣於社伐鼔於朝禮也其餘則否太史曰在此月也日過分而未至三辰有災百官降物君不舉避移時樂奏鼓祝用幣史用辭嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏説曰正月謂周六月夏四月正陽純乾之月也慝謂陰爻也冬至陽爻起初故曰復至建巳之月為純乾亡陰爻而陰侵陽為災重故伐鼓用幣責隂之禮降物素服也不舉去樂也避移時避正堂須時移災復也嗇夫掌幣吏庶人其徒役也劉歆以為六月二日魯趙分二十一年七月壬午朔日有食之董仲舒以為周景王老劉子單子專權師古曰已解于上蔡侯朱驕君臣不説之象也師古曰蔡侯朱蔡平公之子説讀曰悦後蔡侯朱果出奔師古曰昭二十一年出奔楚劉子單子立王猛劉歆以為五月二日魯趙分二十二年十二月癸酉朔日有食之董仲舒以為宿在心天子之象也後尹氏立王子朝天王居于狄泉師古曰天王敬王也避子朝之難故居狄泉劉歆以為十月楚鄭分二十四年五月乙未朔日有食之董仲舒以為宿在胃魯象也後昭公為季氏所逐劉向以為自十五年至此嵗十年間天戒七見人君猶不寤後楚殺戎蠻子師古曰昭十六年楚子誘戎蠻子殺之戎蠻國在河南新城縣晉滅陸渾戎師古曰十七年晉荀吳帥師滅陸渾之戎其地今陸渾縣是也盜殺衛侯兄師古曰衛靈公兄也名縶二十年為齊豹所殺以豹不義故貶稱盜所謂求名而不得也蔡莒之君出奔師古曰蔡君即朱也莒君莒子庚輿也二十三年出奔魯吳滅巢師古曰二十四年吳滅巢巢吳楚間小國即居巢城是也公子光殺王僚師古曰事在二十七年宋三臣以邑叛其君師古曰二十一年宋華亥向寧華定入于宋南里以叛是也它如仲舒劉歆以為二日魯趙分是月斗建辰左氏傳梓慎曰將大水師古曰梓慎魯大夫昭子曰旱也師古曰叔孫昭子日過分而陽猶不克克必甚能無旱乎孟康曰謂春分後陰多陽少為不克陽勝則盛故言甚陽不克莫將積聚也蘇林曰莫莫爾不勝為積聚也是嵗秋大雩旱也二至二分日有食之不為災日月之行也春秋分日夜等故同道冬夏至長短極故相過相過同道而食輕不為大災水旱而已三十一年十二月辛亥朔日有食之董仲舒以為宿在心天子象也時京師微弱後諸侯果相率而城周師古曰定元年晉魏舒合諸侯之大夫于狄泉以城周是也宋中幾亡尊天子之心而不衰城師古曰中幾宋大夫衰城謂以差次受功賦也衰音初為反一曰衰謂曰蓑蓑城謂以草覆城也蓑音先和反中讀曰仲劉向以為時吳滅徐師古曰事在昭三十年而蔡滅沈師古曰定四年蔡公孫姓帥師滅沈楚圍蔡吳敗楚入郢昭王走出師古曰事竝在定四年劉歆以為二日宋燕分定公五年三月辛亥朔日有食之董仲舒劉向以為後鄭滅許師古曰六年鄭游速帥師滅許以許男斯歸魯陽虎作亂竊寳玉大弓季桓子退仲尼宋三臣以邑叛師古曰已解于上劉歆以為正月二日燕趙分十二年十一月丙寅朔日有食之董仲舒劉向以為後晉三大夫以邑叛薛弑其君師古曰十三年晉趙鞅入于晉陽以叛荀寅士吉射入朝歌以叛薛弑其君比楚滅頓胡師古曰十四年楚公子結帥師滅頓以頓子牂歸十五年楚人滅胡以胡子豹歸越敗吳師古曰十四年五月於越敗吳于檇李是也檇音醉衛逐世子師古曰十四年衛太子蒯􅀈出奔宋劉歆以為十二月二日楚鄭分十五年八月庚辰朔日有食之董仲舒以為宿在栁周室大壊夷狄主諸夏之象也明年中國諸侯果累累從楚而圍蔡師古曰哀元年楚子陳侯隨侯許男圍蔡是也累讀曰纍纍不絶之貌蔡恐遷于州來師古曰哀二年十一月蔡遷于州來州來楚邑今下蔡縣是也晉人執戎蠻子歸于楚師古曰哀公四年晉人執戎蠻子赤歸於楚京師楚也師古曰言以楚為京師劉向以為盗殺蔡侯師古曰哀四年蔡公孫翩殺蔡侯申翩非大夫故賤之而書盗齊陳乞弑其君而立陽生師古曰哀六年齊陳乞弑其君荼荼即景公之子也陽生荼之兄即悼公也孔子終不用劉歆以為六月晉趙分哀公十四年五月庚申朔日有食之在獲麟後劉歆以為三月二日齊衛分凡春秋十二公二百四十二年日食三十六榖梁以為朔二十六晦七夜二二日一公羊以為朔二十七二日七晦二左氏以為朔十六二日十八晦一不書日者二高帝三年十月甲戌晦日有食之在斗二十度燕地也後二年燕王臧荼反誅立盧綰為燕王後又反敗十一月癸卯晦日有食之在虚三度齊地也後二年齊王韓信徙為楚王明年廢為列侯後又反誅九年六月乙未晦日有食之既在張十三度惠帝七年正月辛丑朔日有食之在危十三度谷永以為嵗首正月朔日是為三朝尊者惡之五月丁卯先晦一日日有食之幾盡師古曰幾音鉅依反後皆類此在七星初劉向以為五月微陰始起而犯至陽其占重至其八月宮車晏駕有呂氏詐置嗣君之害京房易傳曰凡日食不以晦朔者名曰薄人君誅將不以理或賊臣將暴起日月雖不同宿陰氣盛薄日光也高后二年六月丙戌晦日有食之七年正月己丑晦日有食之既在營室九度為宫室中時高后惡之曰此為我也明年應師古曰謂高后崩也文帝二年十一月癸卯晦日有食之在婺女一度三年十月丁酉晦日有食之在斗二十三度十一月丁卯晦日有食之在虚八度後四年四月丙辰晦日有食之在東井十三度七年正月辛未朔日有食之景帝三年二月壬午晦日有食之在胃二度七年十一月庚寅晦日有食之在虚九度中元年十二月甲寅晦日有食之中二年九月甲戌晦日有食之三年九月戊戌晦日有食之幾盡在尾九度六年七月辛亥晦日有食之在軫七度後元年七月乙巳先晦一日日有食之在翼十七度武帝建元二年二月丙戌朔日有食之在奎十四度劉向以為奎為卑賤婦人後有衛皇后自至微興卒有不終之害師古曰皇后自殺不終其位也三年九月丙子晦日有食之在尾二度五年正月己巳朔日有食之元光元年二月丙辰晦日有食之七月癸未先晦一日日有食之在翼八度劉向以為前年高園便殿災與春秋御廪災後日食於翼軫同其占内有女變外為諸侯其後陳皇后廢江都淮南衡山王謀反誅日中時食從東北過半晡時復元朔二年二月乙巳晦日有食之在胃三度六年十一月癸丑晦日有食之元狩元年五月乙巳晦日有食之在柳六度京房易傳推以為是時日食從旁右法曰君失臣明年丞相公孫𢎞薨日食從旁左者亦君失臣從上者臣失君從下者君失民元鼎五年四月丁丑晦日有食之在東井二十三度元封四年六月己酉朔日有食之太始元年正月乙巳晦日有食之四年十月甲寅晦日有食之在斗十九度征和四年八月辛酉晦日有食之不盡如鉤在亢二度晡時食從西北日下晡時復昭帝始元三年十一月壬辰朔日有食之在斗九度燕地也後四年燕刺王謀反誅元鳳元年七月己亥晦日有食之幾盡在張十二度劉向以為己亥而既其占重孟康曰己土亥水也純陰故食為最重也日食盡為既後六年宮車晏駕卒以亡嗣宣帝地節元年十二月癸亥晦日有食之在營室十五度五鳳元年十二月乙酉朔日有食之在婺女十度四年四月辛丑朔日有食之在畢十九度是為正月朔慝未作左氏以為重異元帝永光二年三月壬戌朔日有食之在婁八度四年六月戊寅晦日有食之在張七度建昭五年六月壬申晦日有食之不盡如鉤因入成帝建始三年十二月戊申朔日有食之其夜未央殿中地震谷永對曰日食婺女九度占在皇后地震蕭牆之内咎在貴妾師古曰蕭牆謂門屏也蕭肅也人臣至此加肅敬也二者俱𤼵明同事異人共掩制陽將害繼嗣也亶日食則妾不見師古曰亶讀曰但下例竝同亶地震則后不見異日而發則似殊事亡故動變則恐不知是月后妾當有失節之郵師古曰郵與尤同尤過也故天因此兩見其變若曰違失婦道隔逺衆妾師古曰逺音于萬反妨絶繼嗣者此二人也杜欽對亦曰日以戊申食時加未戊未土也中宫之部其夜殿中地震此必適妾將有爭寵相害而為患者師古曰適讀曰嫡人事失於下變象見於上能應之以徳則咎異消忽而不戒則禍敗至應之非誠不立非信不行河平元年四月己亥晦日有食之不盡如鉤在東井六度劉向對曰四月交於五月月同孝惠日同孝昭東井京師地且既其占恐害繼嗣日蚤食時從西南起三年八月乙卯晦日有食之在房四年三月癸丑朔日有食之在昴陽朔元年二月丁未晦日有食之在胃永始元年九月丁巳晦日有食之谷永以京房易占對曰元年九月日食酒亡節之所致也獨使京師知之四國不見者若曰湛湎於酒君臣不别禍在内也師古曰湛讀曰沈又讀曰耽永始二年二月乙酉晦日有食之谷永以京房易占對曰今年二月日食賦歛不得度民愁怨之所致也所以使四方皆見京師隂蔽者若曰人君好治宫室大營墳墓賦歛兹重而百姓屈竭師古曰兹益也屈盡也音其勿反禍在外也三年正月己卯晦日有食之四年七月辛未晦日有食之元延元年正月己亥朔日有食之哀帝元夀元年正月辛丑朔日有食之不盡如鉤在營室十度與惠帝七年同月日二年三月壬辰晦日有食之平帝元始元年五月丁巳朔日有食之在東井二年九月戊申晦日有食之既凡}
