  - {type: variant, offset: 2394, length: 2, content: 濞敬, WYG: 向以為象宋襄公欲行伯道將自敗之戒也石陰類五陽數自上而隕此陰而陽行欲高反下也石與金同類色以白為主近白祥也鶂水鳥六陰數退飛欲進反退也其色青青祥也屬於貎之不恭天戒若曰徳薄國小勿持炕陽欲長諸侯與彊大争必受其害襄公不寤眀年齊桓死伐齊䘮師古曰僖十七年齊桓公卒十八年宋襄公以諸侯伐齊執滕子圍曹師古曰十九年三月宋人執滕子嬰齊秋宋人圍曹為盂之㑹與楚争盟卒為所執後得反國師古曰二十一年春為鹿上之盟秋會于盂於是楚執宋公以伐宋冬會于薄以釋之鹿上盂薄皆宋地不悔過自責復會諸侯伐鄭與楚戰于泓軍敗身傷為諸侯笑師古曰二十二年夏宋公衛侯許男滕子伐鄭十一月宋公及楚人戰於泓宋師敗績公傷股門官殱焉二十三年卒傷於泓故也泓水名也音於宏反左氏傳曰隕石星也鶂退飛風也宋襄公以}
