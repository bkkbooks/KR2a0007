  - {type: variant, offset: 132, length: 0, content: '', WYG: 成公十六年六月甲午晦正晝皆暝陰為陽臣制君也成公不寤其冬季氏殺公子偃師古曰為季文子所殺也已解于上季氏萌於釐公師古曰萌喻草木始生也言其始有威權大於成公此其應也董仲舒以為夷伯季氏之孚也師古曰孚信也所信任之臣也陪臣不當有廟震者雷也晦暝雷擊其廟明當絶去僭差之類也向又以為此皆所謂夜妖者也劉歆以為春秋及朔言朔及晦言晦人道所不及則天震之展氏有隐慝故天加誅於其祖夷伯之廟以譴告之也成公十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵皆月晦云隐公五年秋螟董仲舒劉向以為時公觀漁于棠貪利之應也師古曰棠魯地也陳漁者之事而觀之也劉歆以為又逆臧釐伯之諫師古曰臧僖伯公子彄也孝公之子諫觀漁貪利區霿以生臝蟲之孽也八年九月螟時鄭伯以邴將易許田師古曰邴祀泰山之邑也音彼命反已解于上有貪利心京房易傳曰臣安禄兹謂貪厥災蟲蟲食根徳無常兹謂煩蟲食葉不絀無徳蟲食本與東作爭兹謂不時師古曰奪農時也蟲食節蔽惡生孽蟲食心師古曰蔽謂惡人蔽君之明為災孽也嚴公六年秋螟董仲舒劉向以為先是衞侯朔出奔齊齊侯會諸侯納朔師古曰朔謂惠公也桓十六年以左公子泄右公子職立公子黔牟故惠公奔齊至莊五年會齊人宋人蔡人伐衞而納惠公也許諸侯賂師古曰諸國各有賂齊人歸衞寶魯受之師古曰以伐衞所獲之寳來歸魯貪利應也文帝後六年秋螟是嵗匈奴大入上郡雲中㷭火通長安遣三將軍屯邊三將軍屯京師師古曰並已解于上宣公三年郊牛之口傷改卜牛牛死劉向以為近牛禍也是時宣公與公子遂謀共殺子赤而立師古曰已解于上又以喪娶師古曰宣元年正月公子遂如齊逆女三月遂以夫人婦姜至自齊時文公喪制未除區霿昏亂亂成於口幸有季文子得免於禍天猶惡之生則不饗其祀師古曰謂郊牛傷死是天不欲饗其祀死則災燔其廟師古曰成三年新宫災新宫者宣之廟也以其新成故謂之新宫董仲舒指略同秦孝文王五年斿朐衍有獻五足牛者師古曰朐衍地名在北地朐音許于反劉向以為近牛禍也先是文惠王初都咸陽廣大宫室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢泰將致危亡如淳曰建立基止泰奢也秦遂不改至於離宫三百復起阿房未成而亡一曰牛以力為人用足所以行也其後秦大用民力轉輸起負海至北邊師古曰負海猶言背海也天下叛之京房易傳曰興繇役奪民時厥妖牛生五足景帝中六年梁孝王田北山有獻牛足上出背上劉向以為近牛禍先是孝王驕奢起苑方三百里宫舘閣道相連三十餘里納於邪臣羊勝之計欲求為漢嗣刺殺議臣爰盎事發負斧歸死既退歸國猶有恨心内則思慮霿亂外則土功過制故牛旤作足而出於背下奸上之象也師古曰奸犯也音干猶不能自解發疾暴死又凶短之極也左氏傳昭公二十一年春周景王將鑄無䠶鍾師古曰鍾聲中無䠶之律也䠶音弋石反泠州鳩曰應劭曰泠官也州鳩名也師古曰樂官曰泠後遂以為氏泠音零其字從水王其以心疾死乎夫天子省風以作樂應劭曰風土地風俗也省中和之風以作樂然後可移惡風易惡俗也臣瓚曰省風俗之流遁作樂以救其弊也師古曰應說是也省觀也小者不窕大者不摦師古曰窕輕小也摦横大也窕音他堯反摦音胡化反摦則不容心是以感感實生疾今鍾摦矣王心弗􅨹孟康曰古堪字其能久乎劉向以為是時景王好聽淫聲適庶不明師古曰適讀曰嫡謂太子壽卒王立子猛為嗣後又欲立子朝也思心霿亂明年以心疾崩近心腹之痾凶短之極者也昭二十五年春魯叔孫昭子聘于宋元公與燕飲酒樂語相泣也師古曰昭子叔孫婼也元公宋平公子也相泣相對而俱泣也樂祁佐師古曰樂祁宋司城子梁也佐佐酒告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也師古曰哀樂可樂而反哀也樂哀可哀而反樂也喪失之也心之精爽是謂魂魄魂魄去之何以能久冬十月叔孫昭子死十一月宋元公卒昭帝元鳳元年九月燕有黄䑕衘其尾舞王宫端門中往視之䑕舞如故王}
