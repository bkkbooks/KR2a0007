  - {type: variant, offset: 1830, length: 310, content: 十餘年常患見疑無以自白脅肩絫足猶懼不見釋竊聞大王以爵事有過所聞諸侯削地罪不至此此恐不止削地而已王曰有之子將柰何高曰同惡相助同好相留同情相求同欲相趨同利相死今吳王自以與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰寡人何敢如是主上雖急固有死耳安得不事高曰御史大夫朝錯營或天子侵奪諸侯蔽忠塞賢朝廷疾怨諸侯皆有背叛之意人事極矣彗星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王內以朝錯為誅外從大王後車方洋天下所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷關守滎陽敖倉之粟距漢兵治次舍須大王大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王猶恐其不果乃身自為使者至膠西面約之膠西群臣或聞王謀諫曰諸侯地不能為漢, WYG: ''}
