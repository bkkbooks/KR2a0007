  - {type: variant, offset: 29, length: 1, content: 賈, krp: 周伐雍門之荻是也劉敞曰平陽當作平隂先是帝兄齊悼惠王亡後帝分齊地立其庶子七人皆為王師古曰謂齊孝王將閭濟北王志菑川王賢膠東王雄渠膠西王卬濟南王辟光并成陽恭王喜是謂七王兄弟並彊有炕陽心故犬禍見也犬守御角兵象在前而上鄉者也師古曰鄉讀曰嚮此下亦同犬不當生角猶諸侯不當舉兵鄉京師也天之戒人蚤矣諸侯不寤後六年吳楚畔濟南膠西膠東三國應之舉兵至齊齊王猶與城守師古曰與讀曰豫三國圍之會漢破吳楚因誅四王故天狗下梁而吳楚攻梁狗生角於齊而三國圍齊漢卒破吳楚於梁誅四王於齊京房易傳曰執政失下將害之厥妖狗生角君子茍免小人陷之厥妖狗生角景帝三年二月邯鄲狗與彘交悖亂之氣近犬豕之禍也是時趙王遂悖亂與吳楚謀為逆遣使匈奴求助兵卒伏其辜犬兵革失衆之占如淳曰犬吠守似兵革外附它類失衆也豕北方匈奴之象逆言失聽交於異類以生害也京房易傳曰夫婦不嚴厥妖狗與豕交兹謂反徳國有兵革成帝河平元年長安男子石良劉音相與同居師古曰二人共止一室有如人狀在其室中擊之為狗走出去後有數人被甲持兵弩至良家良等格擊或死或傷皆狗也自二月至六月乃止鴻嘉中狗與彘交左氏昭公二十四年十月癸酉王子鼂以成周之寶圭湛于河師古曰以祭河也爾雅曰祭川曰浮沉湛讀曰沈後皆類此幾以獲神助師古曰幾讀曰冀甲戌津人得之河上隂不佞取將賣之則為石師古曰隂不佞周大夫也是時王子鼂簒天子位萬民不鄉號令不從師古曰鄉讀曰嚮故有玉變近白祥也癸酉入而甲戌出神不享之驗云玉化為石貴將為賤也後二年子鼂犇楚而死史記秦始皇帝三十六年鄭客從關東來至華隂望見素車白馬從華山上下知其非人道住止而待之遂至師古曰於道上住而待此車馬持璧與客曰為我遺鎬池君張晏曰武王居鎬鎬池君則武王也武王伐商故神云始皇荒淫若紂矣今亦可伐也孟康曰長安西南有鎬池師古曰鎬池在昆明池北此直江神告鎬池之神云始皇將死耳無豫于武王也張說失矣因言今年祖龍死蘇林曰祖始也龍人君象謂始皇也忽不見鄭客奉璧即始皇二十八年過江所湛璧也與周子鼂同應是嵗石隕于東郡民或刻其石曰始皇死而地分此皆白祥炕陽暴虐號令不從孤陽獨治羣隂不附之所致也一曰石隂類也隂持髙節臣將危君趙高李斯之象也始皇不畏戒自省反夷滅其旁民而燔燒其石是嵗始皇死後三年而秦滅孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立髙丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁眭孟以為石隂類下民象泰山岱宗之嶽王者易姓告代之處當有庶人為天子者孟坐伏誅京房易傳曰復崩來無咎師古曰復卦之辭也今易崩字作朋字自上下者為崩厥應泰山之石顛而下師古曰顛墜也聖人受命人君虜又曰石立如人庶士為天下雄立於山同姓平地異姓立於水聖人於澤小人天漢元年三月天雨白毛三年八月天雨白氂師古曰凡言氂者毛之强曲者也音力之反京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛史記周威烈王二十三年九鼎震孟康曰威烈一王之諡也六國時也師古曰即赧王之高祖也金震木動之也是時周室衰微刑重而虐號令不從以亂金氣鼎者宗廟之寶器也宗廟將廢寶鼎将遷故震動也是嵗晉三卿韓魏趙簒晉君而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣後三世周致徳祚於秦晉灼曰赧王奔秦獻其邑此為致徳祚也其後秦遂滅周而取九鼎九鼎之震木沴金失衆甚成帝元延元年止月長安章城門門牡自亡晉灼曰西出南頭第一門也牡是出籥者師古曰牡所以下閉者也亦以鐵為之非出籥也函谷關次門牡亦自亡韋昭曰函谷關邊小門也師古曰非行人出入所由蓋關司曹府所在之門也京房易傳曰饑而不損兹謂泰厥災水厥咎牡亡妖辭曰關動牡飛辟為亡道臣為非厥咎亂臣謀簒李竒曰易妖變傳辭故谷永對曰章城門通路寢之路函谷關距山東之險城門關守國之固固將去焉故牡飛也前漢書卷二十七中之上前漢書卷二十七中之上考證五行志中之上僭恒陽若注應劭曰僭差僭監本訛潛差今改正此說非是春與秋氣隂陽相敵云云臣召南按班書十志半取𠂻于劉歆惟五行志時糾劉歆之失史記成公十六年云云注此志凡稱史記者皆謂司馬遷所撰也臣召南按單襄公見晉厲公一叚史記晉世家不載此國語文也國語本于各國之史記故以史記稱之師古以司馬遷所撰為解非也下文尚有數處稱史記皆國語文是以有禮義動作威儀之則左傳禮義二字在動作之下能者養以之福注師古曰之往也云云臣召南按之字訓往與下句取字相對今俗本左傳作能者養之以福非是師古注與杜注孔疏合是古本不訛也監本從俗本左傳亦作能者養之以福今從宋本改正三大夫兆憂矣三監本訛二今改正先是發車騎材官屯廣昌注師古曰武都之縣臣召南按注非也廣昌縣屬代郡地理志甚明至武都郡武帝元鼎六年始置文帝時豈容有其地乎五將軍衆二十萬注度遼將軍范明友度監本訛渡今改正赤色象漢家監本訛漢家象從宋本移正前漢書卷二十七中之上考證欽定四庫全書前漢書卷二十七中之下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注五行志第七中之下傳曰視之不明是謂不悊厥咎舒厥罰恒奥師古曰奥讀曰燠㬉也音於六反其下並同厥極疾韋昭曰以疾為罰時則有草妖時則有蠃蟲之孽師古曰螽螟之類無鱗甲毛羽故謂之蠃蟲也音郎果反時則有羊旤時則有目痾時則有赤眚赤祥惟水沴火視之不明是謂不悊悊知也詩云爾徳不明以亡陪亡卿不明爾徳以亡背亡仄師古曰大雅蕩之詩也言不别善惡有逆背傾仄者有堪為卿大夫者皆不知之也仄古側字言上不明暗昧蔽惑則不能知善惡親近習長同類師古曰習狎也近狎者則親愛之同類者則長益也亡功者受賞有罪者不殺百官廢亂失在舒緩故其咎舒也盛夏日長暑以養物政弛緩故其罰常奥也奥則冬温春夏不和傷病民人故極疾也誅不行則霜不殺草繇臣下則殺不以時師古曰繇言誅罰由於臣下故有草妖凡妖貌則以服言則以詩聽則以聲視則以色者五色物之大分也在於眚祥故聖人以為草妖失秉之明者也師古曰謂失所執之權也温奥生蟲故有蠃蟲之孽謂螟螣之類師古曰螟食苖心螣食苖葉之蟲也螟音㝠螣音徒得反當死不死未當生而生或多於故而為災也劉歆以為屬思心不䜭於易剛而包柔為離師古曰兩陽居外一隂在内故云剛包柔離為火為目羊上角下蹏剛而包柔羊大目而不精明視氣毁故有羊旤一曰暑嵗羊多疫死及為怪亦是也及人則多病目者故有目痾火色赤故有赤眚赤祥凡視傷者病火氣火氣傷則水沴之其極疾者順之其福曰壽李竒曰於六極之中為疾者逆火氣致疾病也能順火氣則旤更為福劉歆視傳曰有羽蟲之孽雞旤說以為於天文南方喙為鳥星故為羽蟲旤亦從羽故為雞雞於易自在巽說非是庶徵之恒奥劉向以為春秋亡冰也小奥不書無冰然後書舉其大者也京房易傳曰禄不遂行兹謂欺厥咎奥雨雪四至而温臣安禄樂逸兹謂亂奥而生蟲知罪不誅兹謂舒其奥夏則暑殺人冬則物華實重過不誅兹謂亡徵其咎當寒而奥六日也桓公十五年春亡冰劉向以為周春今冬也先是連兵鄰國三戰而再敗也師古曰三戰者謂十年齊侯衞侯鄭伯來戰于郎十二年與鄭師伐宋戰于宋十三年㑹紀侯鄭伯及齊侯宋公衞侯燕人戰也再敗者謂郎之戰榖梁傳曰以吾敗也又宋之戰榖梁亦曰諱敗舉其可道者也據左氏傳公羊榖梁亦曰無冰並在十四年今此云十五年未詳其意内失百姓外失諸侯不敢行誅罰鄭伯突簒兄而立公與相親師古曰突鄭莊公子即厲公也兄謂太子忽即昭公也莊公既卒突因宋莊公之寵而得立遂使昭公奔衞故云簒兄也公與相親者謂十五年突為祭仲所逐奔蔡遂居櫟而昭公入公再與諸侯伐鄭謀納厲公長養同類不明善惡之罰也師古曰言桓簒立與突志同故曰長養同類董仲舒以為象夫人不正陰失節也師古曰夫人姜氏通于齊侯故云不正成公元年二月無冰董仲舒以為方有宣公之喪君臣無悲哀之心而炕陽作丘甲師古曰時宣公薨始踰年故云有喪也丘甲解在刑法志劉向以為時公幼弱政舒緩也襄公二十八年春無冰劉向以為先是公作三軍有侵陵用武之意師古曰作三軍者季氏欲專其權非公本意此說非也侵陵用武者謂入鄆取邿也邿音詩於是鄰國不和伐其三鄙師古曰謂十二年三月十四年夏莒人伐我東鄙十五年夏齊侯伐我北鄙秋邾人伐我南鄙十六年二月齊侯伐我北鄙被兵十有餘年因之以饑饉百姓怨望臣下心離公懼而施緩不敢行誅罰師古曰㢮放也音式爾反楚有夷狄行公有從楚心不明善惡之應師古曰有從楚心謂二十八年公朝于楚董仲舒指略同一曰水旱之災寒暑之變天下皆同故曰無冰天下異也桓公殺兄弑君外成宋亂與鄭易邑背畔周室師古曰隐攝公位又桓之兄故云殺兄弑君也成宋亂者謂宋華父督弑其君殤公及其大夫孔父以郜大鼎賂公公㑹齊侯鄭伯于稷而平其亂也與鄭易邑謂以太山之田易許田也許田者魯朝宿之邑也而以與鄭明魯之不朝於王故云背畔周室成公時楚横行中國師古曰謂成二年楚師侵衞遂侵我師于蜀六年七月楚公子嬰齊帥師伐鄭九年嬰齊帥師伐莒十五年楚子伐鄭十六年楚子與晉侯鄭伯戰于鄢陵十八年楚子伐宋王札子殺召伯毛伯師古曰王札子即王子㨗也召伯毛伯皆周大夫也今春秋經王札子殺召伯毛伯事在宣十五年而此言成公時未逹其說召讀曰邵晉敗天子之師于貿戎師古曰貿戎戎别種也公羊傳成元年王師敗績于貿戎孰敗之蓋晉敗之貿音莫候反天子皆不能討襄公時天下諸侯之大夫皆執國權師古曰謂襄十六年㑹于溴梁諸侯之大夫盟皆類此君不能制漸將日甚善惡不明誅罰不行周失之舒秦失之急故周衰亡寒嵗秦滅亡奥年武帝元狩六年冬亡冰先是比年遣大將軍衞青霍去病攻祁連絶大幕師古曰祁連山名也幕沙磧也直度曰絶窮追單于斬首十餘萬級還大行慶賞乃閔海内勤勞是嵗遣博士禇大等六人持節廵行天下存賜鰥寡假與乏困舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞天下咸喜昭帝始元二年冬亡冰是時上年九嵗大將軍霍光秉政始行寛緩欲以說下僖公三十三年十二月隕霜不殺草劉歆以為草妖也劉向以為今十月周十二月於易五為天位為君位九月陰氣至五通於天位其卦為剥師古曰坤下艮上剥落萬物始大殺矣明陰從陽命臣受君令而後殺也今十月隕霜而不能殺草此君誅不行舒緩之應也是時公子遂顓權師古曰公子遂莊公之子即東門襄仲也時為卿專執國政也三桓始世官師古曰謂父子相繼為卿也天戒若曰自此之後將皆為亂矣文公不寤其後遂殺子赤三家逐昭公師古曰並已解于上董仲舒指略同京房易傳曰臣有緩兹謂不順厥異霜不殺也書序曰伊陟相太戊亳有祥桑榖共生師古曰商書咸乂之序也其書亡伊陟伊尹子也太戊太甲孫也亳殷所都也桑榖二木合而共生榖音彀傳曰俱生乎朝七日而大拱師古曰兩手合為拱伊陟戒以修徳而木枯劉向以為殷道既衰髙宗承敝而起盡涼陰之哀天下應之師古曰涼信也陰默也言居喪信默三年不言也涼讀曰諒一說涼陰謂居喪之廬也謂三年處於廬中不言涼音力羊反據今尚書及諸傳記太戊卒子仲丁立卒弟河亶甲立卒子祖乙立卒子盤庚立卒小乙之子武丁立是為髙宗桑榖自太戊時生涼陰乃髙宗之事而此云桑榖即髙宗時出其說與尚書大傳不同未詳其義也或者伏生差謬既獲顯榮怠於政事國將危亡故桑榖之異見桑猶喪也榖猶生也殺生之秉失而在下近草妖也一曰野木生朝而暴長小人將暴在大臣之位危亡國家象朝將為虛之應也師古曰虛讀曰墟書序又曰髙宗祭成湯有蜚雉登鼎耳而雊師古曰商書高宗肜日之序也蜚古飛字雊音工豆反祖已曰惟先假王正厥事師古曰祖已殷賢臣假大也言先代大道之王能正其事而災異銷也劉向以為雉雊鳴者雄也以赤色為主於易離為雉雉南方近赤祥也劉歆以為羽蟲之孽易有鼎卦師古曰巽下離上也鼎宗廟之器主器奉宗廟者長子也野鳥自外來入為宗廟器主是繼嗣將易也一曰鼎三足三公象而以耳行師古曰鼎非舉耳不得行故云以耳行野鳥居鼎耳小人將居公位敗宗廟之祀野木生朝野鳥入廟敗亡之異也武丁恐駭謀於忠賢修徳而正事内舉傅說授以國政師古曰武丁夢得賢相乃以所夢之像使求之得於傅巖立以為相作說命三篇說讀曰悅外伐鬼方以安諸夏師古曰鬼方絶逺之地一曰國名夏大也中國大於戎狄故曰諸夏故能攘木鳥之妖致百年之壽所謂六沴作見若是共御五福廼降用章于下者也師古曰共讀曰恭御讀曰禦言恭已以禦災也一說御治也恭治其事也一曰金沴木曰木不曲直僖公三十三年十二月李梅實劉向以為周十二月今十月也李梅當剝落今反華實近草妖也先華而後實不書華舉重者也陰成陽事象臣顓君作威福一曰冬當殺反生象驕臣當誅不行其罰也故冬華華者象臣邪謀有端而不成至於實則成矣是時僖公死公子遂顓權文公不寤後有子赤之變一曰君舒緩甚奥氣不臧則華實復生董仲舒以為李梅實臣下彊也記曰不當華而華易大夫不當實而實易相室應劭曰冬水王木相故象大臣冬實者變置丞相與宫室也但華則變大夫也師古曰相室猶言相國謂宰相也合韻故言相室相室者相王室冬水王木相故象大臣劉歆以為庶徵皆以蟲為孽思心蠃蟲孽也李梅實屬草妖惠帝五年十月桃李華棗實昭帝時上林苑中大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立又昌邑王國社有枯樹復生枝葉眭孟以為木陰類下民象當有故廢之家公孫氏從民間受命為天子者昭帝富於春秋霍光秉政以孟妖言誅之後昭帝崩無子徵昌邑王賀嗣位狂亂失道光廢之更立昭帝兄衞太子之孫是為宣帝帝本名病已京房易傳曰枯楊生稊師古曰大過九二爻辭也稊楊秀之始生者音徒奚反枯木復生人君亡子元帝初元四年皇后曾祖父濟南東平陵王伯墓門梓柱卒生枝葉上出屋孟康曰王伯莽之祖也師古曰莽髙祖父也故下云髙祖考卒讀曰猝猝暴也劉向以為王氏貴盛將代漢家之象也後王莽簒位自說之曰初元四年莽生之嵗也當漢九世火徳之厄而有此祥興於髙祖考之門門為開通梓猶子也言王氏當有賢子開通祖統起於柱石大臣之位受命而王之符也建昭五年兗州刺史浩賞禁民私所自立社張宴曰民間三月九月立社號曰私社臣瓉曰舊制二十五家為一社而民或十家五家共為田社是私社師古曰瓉說是山陽橐茅鄉社有大槐樹師古曰橐縣名也屬山陽郡茅鄉橐縣之鄉也橐音拓吏伐斷之其夜樹復立其故處成帝永始元年二月河南街郵樗樹生支如人頭師古曰郵謂行書之舍樗樹似杶樗音丑余反杶音丑倫反眉目湏皆具亡髪耳哀帝建平三年十月汝南西平遂陽鄉柱仆地生支如人形身青黄色面白頭有頿髪稍長大凡長六寸一分京房易傳曰王徳衰下人將起則有木生為人狀哀帝建平三年零陵有樹僵地師古曰僵偃也圍丈六尺長十丈七尺民斷其本長九尺餘皆枯三月樹卒自立故處師古曰卒讀曰猝京房易傳曰棄正作淫厥妖木斷自屬師古曰屬連續也妃后有顓木仆反立斷枯復生師古曰顓謂專寵天辟惡之如淳曰天辟謂天子也元帝永光二年八月天雨草而葉相樛結大如彈丸師古曰樛繞也樛音居虯反平帝元始三年正月天雨草狀如永光時京房易傳曰君吝於禄信衰賢去厥妖天雨草昭公二十五年夏有鸜鵒來巢劉歆以為羽蟲之孽其色黑又黑祥也視不明聽不聰之罰也劉向以為有蜚有􅈮不言來者氣所生所謂眚也師古曰此蜚謂負蠜也其為蟲臭􅈮短弧即今所謂水弩也隐元年有蜚莊十八年有􅈮蜚音翡􅈮音域蜚亦作蜰其音同耳鸜鵒言來者氣所致所謂祥也鸜鵒夷狄穴藏之禽來至中國不穴而巢陰居陽位師古曰今之鸜鵒中國皆有依周官而言但不踰濟水耳左氏以為魯所常無故異而書之而此云夷狄禽未喻其意又此鳥本亦巢居不皆穴處也書巢者著其居止字乳不即去也象季氏將逐昭公去宫室而居外野也鸜鵒白羽旱之祥也穴居而好水黑色為主急之應也天戒若曰既失衆不可急暴急暴陰將持節陽以逐爾去宫室而居外野矣昭不寤而舉兵圍季氏為季氏所敗出犇于齊遂死于外野董仲舒指略同景帝三年十一月有白頸烏與黑烏羣鬬楚國吕縣白頸不勝墯泗水中死者數千劉向以為近白黑祥也時楚王戊暴逆無道師古曰戊楚元王之孫也刑辱申公與吳王謀反烏羣鬬者師戰之象也白頸者小明小者敗也墯於水者將死水地王戊不寤遂舉兵應吳與漢大戰兵敗而走至於丹徒為越人所斬墯死於水之效也劉奉世曰死於丹徒者吳王濞耳向說誤京房易傳曰逆親親厥妖白黑烏鬭於國昭帝元鳳元年有烏與鵲鬬燕王宫中池上烏墯池死近黑祥也時燕王旦謀為亂遂不改寤伏辜而死楚燕皆骨肉藩臣以驕怨而謀逆俱有烏鵲鬬死之祥行同而占合此天人之明表也燕一烏鵲鬬於宫中而黑者死楚以萬數鬬於野外而白者死象燕陰謀未發獨王自殺於宫故一烏水色者死楚炕陽舉兵軍師大敗於野故衆烏金色者死天道精微之效也京房易傳曰專征劫殺厥妖烏鵲鬬昭帝時有鵜鶘或曰秃鶖師古曰鵜鶘即汙澤也一名淘河腹下胡大如數升囊好羣入澤中抒水食魚因名禿鶖亦水鳥也鵜音大奚反鶘音胡鶖音秋集昌邑王殿下王使人射殺之劉向以為水鳥色青青祥也時王馳騁無度慢侮大臣不敬至尊有服妖之象師古曰謂多治仄注冠又以冠奴也故青祥見也野鳥入處宫室將空王不寤卒以亡京房易傳曰辟退有徳厥咎狂厥妖水鳥集于國中師古曰辟君也成帝河平元年二月庚子泰山山桑谷有䳒焚其巢師古曰䳒鴟也音緣男子孫通等聞山中羣鳥䳒鵲聲往視見巢㸐盡墯池中師古曰㸐古然字有三䳒鷇燒死師古曰鳥子新生而哺者曰鷇音口豆反又音工豆反樹大四圍巢去地五丈五尺太守平以聞䳒色黑近黑祥貪虐之類也易曰鳥焚其巢旅人先笑後號咷師古曰旅卦上九爻辭也咷音逃泰山岱宗五嶽之長王者易姓告代之處也天戒若曰勿近貪虐之人聽其賊謀將生焚巢自害其子絶世易姓之禍其後趙蜚燕得幸立為皇后弟為昭儀姊妹専寵聞後宫許美人曹偉能生皇子也師古曰曹偉能宫人姓名也偉能一名宫見外戚傳昭儀大怒令上奪取而殺之皆并殺其母成帝崩昭儀自殺事乃發覺趙后坐誅此焚巢殺子後號咷之應也一曰王莽貪虐而任社稷之重卒成易姓之禍云京房易傳曰人君暴虐鳥焚其舍鴻嘉二年三月博士行大射禮有飛雉集于庭歴階登堂而雊後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央宫承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以類相應師古曰以經術待詔其人名寵不記姓也流俗書本寵上輒加孫字非也譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣師古曰謂季冬之月云雉雊雞乳也經載髙宗雊雉之異師古曰已解于上以明轉禍為福之驗今雉以博士行禮之日大衆聚會飛集于庭歴階登堂萬衆睢睢師古曰睢睢仰目視貌也睢音呼惟反驚怪連日徑歴三公之府太常宗正典宗廟骨肉之官然後入宫其宿留告曉人具備深切師古曰宿音先就反留音力救反雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之師古曰言人放此雉故欲為變異者音復對曰陛下安得亡國之語不知誰主為佞讇之計師古曰讇古諂字也誣亂聖徳如此者左右阿諛甚衆不待臣音復讇而足師古曰足益也音子喻反公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先受誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出泆行流聞師古曰言帝行多驕泆醜惡流布聞於逺方也海内傳之甚於京師外有微行之害内有疾病之憂皇天數見災異師古曰見顯示欲人變更終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有髙祖天下當以誰屬乎如淳曰老母音之老母也當隨已受誅也又謂已言深切觸捂人主積恚而死必行之誅不能復顧太后也師古曰如說非也此言總屬於成帝耳不然者謂不如所諫而自修改也老母帝之母即太后也言帝不自修改國家危亡太后不知處所高祖天下無所付屬也屬音之欲反宜謀於賢知克己復禮以求天意繼嗣可立災變尚可銷也成帝綏和二年三月天水平襄有燕生爵哺食至大俱飛去師古曰哺音蒲固反食讀曰飤謂與母俱去京房易傳曰賊臣在國厥咎燕生爵諸侯銷一曰生非其類子不嗣世史記魯定公時季桓子穿井得土缶中得蟲若羊師古曰缶盎也即今之盆近羊禍也羊者地上之物幽於土中象定公不用孔子而聽季氏暗昧不明之應也一曰羊去野外而拘土缶者象魯君失其所而拘於季氏季氏亦將拘於家臣也是嵗季氏家臣陽虎囚季桓子後三年陽虎劫公伐孟氏兵敗竊寶玉大弓而出亡師古曰寶玉謂夏后氏之璜大弓謂封父之繁弱皆魯始封之分器所受於周也定八年陽虎作亂不克竊之而入讙陽闗以叛左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之師古曰平公宋共公之子也名成共讀曰恭因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之師古曰事在襄二十六年痤音才戈反先是大夫華元出奔晉師古曰事在成十五年華弱奔魯師古曰事在襄六年華臣奔陳師古曰事在襄十七年華合比奔衞師古曰事在昭六年據今春秋合比奔在殺太子痤後而志總言先是未詳其意劉向以為時則火災赤眚之明應也京房易傳曰尊卑不别厥妖女生赤毛惠帝二年天雨血於宜陽一頃所劉向以為赤眚也時又冬雷桃李華常奥之罰也是時政舒緩諸吕用事讒口妄行殺三皇子建立非嗣師古曰三皇子謂趙隐王如意趙幽王友趙恭王恢皆高帝子也建立非嗣謂立後宫美人子為嗣及不當立之王孟康曰吕氏三王也退王陵趙堯周昌師古曰惠帝六年王陵為右丞相恵帝崩吕后欲廢陵遷為太傅實奪之相權高祖以趙堯為御史大夫高后元年怨堯前定趙王如意之策乃抵堯罪周昌為趙相趙王見鴆殺昌謝病不朝見三嵗而薨吕太后崩大臣共誅滅諸吕僵尸流血京房易傳曰歸獄不解兹謂追非厥咎天雨血兹謂不親民有怨心不出三年無其宗人又曰佞人禄功臣僇天雨血師古曰僇古戮字哀帝建平四年四月山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子後二年帝崩王莽擅朝誅貴戚丁傅大臣董賢等皆放徙逺方與諸吕同象誅死者少雨血亦少京房易傳曰聽之不聰是謂不謀厥咎急厥罰恒寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水聽之不聰是謂不謀言上偏聽不聰下情隔塞則不能謀慮利害失在嚴急故其咎急也盛冬日短寒以殺物政促廹故其罰常寒也寒則不生百榖上下俱貧故其極貧也君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖寒氣動故有魚孽雨以龜為孽服䖍曰多雨則龜多出龜能陸處非極陰也魚去水而死極陰之孽也於易坎為豕豕大耳而不聰察聽氣毁故有豕禍也一曰寒嵗豕多死及為怪亦是也及人則多病耳者故有耳痾水色黑故有黑眚黑祥凡聽傷者病水氣水氣病則火沴之其極貧者順之其福曰富劉歆聽傳曰有介蟲孽也庶徵之恒寒劉向以為春秋無其應周之末世舒緩微弱政在臣下奥煖而已故籍秦以為驗師古曰籍假借也秦始皇帝即位尚幼委政太后太后淫於吕不韋及嫪毐師古曰嫪或音居虯反嫪姓也毐名也許慎說以為嫪毐士之無行者嫪音郎到反毐音烏改反與今史記漢書本文不同且摎樂之姓又非嫪也故當依本字以讀封毐為長信侯以太原郡為毐國宫室苑囿自恣政事斷焉故天冬雷以見陽不禁閉以渉危害舒奥廹近之變也始皇既冠毐懼誅作亂始皇誅之斬首數百級大臣二十人皆車裂以徇夷滅其宗遷四千餘家於房陵是嵗四月寒民有凍死者數年之間緩急如此寒奥輒應此其效也劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺菽草皆常寒之罰也劉向以為常雨屬貌不恭京房易傳曰有徳遭險兹謂逆命厥異寒誅過深當奥而寒盡六日亦為雹害正不誅兹謂養賊寒七十二日殺蜚禽師古曰蜚讀曰飛道人始去兹謂傷服䖍曰有道之人去其寒物無霜而死涌水出戰不量敵兹謂辱命其寒雖雨物不茂聞善不予厥咎聾桓公八年十月雨雪周十月今八月也未可以雪劉向以為時夫人有淫齊之行而桓有妬媢之心師古曰媢謂夫妬婦也夫人將殺其象見也師古曰謂欲殺桓公桓不覺寤後與夫人俱如齊而殺死凡雨陰也雪又雨之陰也出非其時廹近象也董仲舒以為象夫人専恣陰氣盛也釐公十年冬大雨雪劉向以為先是釐公立妾為夫人隂居陽位陰氣盛也公羊經曰大雨雹董仲舒以為公脅於齊桓公立妾為夫人不敢進羣妾師古曰已解于上故專壹之象見諸雹皆為有所漸脅也孟康曰謂陰氣漸脅行専壹之政云昭公四年正月大雨雪劉向以為昭取於吳而為同姓謂之吳孟子師古曰魯與吳俱姬也周禮同姓不為婚故諱不稱吳姬而云孟子也取讀曰娶君行於上臣非於下又三家已彊皆賤公行慢㑄之心生師古曰㑄古侮字董仲舒以為季孫宿任政陰氣盛也師古曰季孫宿季武子也文帝四年六月大雨雪後三嵗淮南王長謀反發覺遷道死師古曰遷於蜀未至而死於雍故曰道死京房易傳曰夏雨雪戒臣為亂景帝中六年三月雨雪其六月匈奴入上郡取苑馬吏卒戰死者二千餘人明年條侯周亞夫下獄死武帝元狩元年十二月大雨雪民多凍死是嵗淮南衡山王謀反發覺皆自殺使者行郡國治黨與坐死者數萬人元鼎二年三月雪平地厚五尺是嵗御史大夫張湯有罪自殺丞相嚴青翟坐與三長史謀陷湯師古曰謂朱買臣為丞相長史王朝及邊通皆守丞相長史也青翟自殺三長史皆棄市元鼎三年三月水冰四月雨雪關東十餘郡人相食是嵗民不占緡錢有告者以半畀之師古曰言政急刻也占音之贍反元帝建昭二年十一月齊楚地大雪深五尺是嵗魏郡太守京房為石顯所告坐與妻父淮陽王舅張博博弟光勸視淮陽王以不義師古曰視讀曰示博要斬光房棄市御史大夫鄭宏坐免為庶人成帝即位顯伏辜淮陽王上書寃博辭語增加師古曰言博本為石顯所冤増加其語故陷罪家屬徙者復得還建昭四年三月雨雪燕多死谷永對曰皇后桑蠶以治祭服共事天地宗廟師古曰共讀曰恭正以是日疾風自西北大寒雨雪壞敗其功以章不鄉師古曰言不當天心鄉讀曰嚮宜齊戒辟寢以深自責師古曰齊讀曰齋辟讀曰避請皇后就宫鬲閉門戸母得擅上師古曰鬲與隔同擅上謂輒至御所也上音時掌反一曰擅專也上謂天子也讀如本字勿令皇后專固天子且令衆妾人人更進以時博施皇天說喜師古曰更音工衡反說讀曰恱庶幾可以得賢明之嗣即不行臣言災異愈甚天變成形臣雖欲復捐身關策不及事已師古曰言雖欲捐棄其身不懷顧慮極陳計策闗說天子亦無所及其後許后坐祝詛廢陽朔四年四月雨雪燕雀死後十六年許皇后自殺定公元年十月隕霜殺菽師古曰菽大豆劉向以為周十月今八月也於卦為觀師古曰坤下巽上也陰氣未至君位而殺誅罰不由君出在臣下之象也是時季氏逐昭公公死于外定公得立故天見災以視公也師古曰視讀曰示釐公二年十月隕霜不殺草為嗣君微失秉事之象也師古曰謂襄仲専權殺嫡立庶公室遂弱其後卒在臣下則災為之生矣異故言草災故言菽重殺榖師古曰以其事為重不比於殺草也一曰菽草之難殺者也言殺菽知草皆死也言不殺草知菽亦不死也董仲舒以為菽草之彊者天戒若曰加誅於彊臣言菽以微見季氏之罰也武帝元光四年四月隕霜殺草木先是二年遣五將軍三十萬衆伏馬邑下師古曰謂御史大夫韓安國為䕶軍將軍衞尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢}
