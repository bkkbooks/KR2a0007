  - {type: variant, offset: 2216, length: 0, content: '', WYG: 伐之而自立王命遂壊師古曰莊五年冬公會齊人宋人陳人蔡人伐衛莊六年春王人子突救衛夏衛侯朔入放公子黔牟于周也是魯夫人淫失於齊卒殺威公師古曰失讀曰佚董仲舒以為言朔不言日惡魯桓且有夫人之禍將不終日也劉歆以為楚鄭分嚴公十八年三月日有食之穀梁傳曰不言日不言朔夜食張晏曰日夜食則無景立六尺木不見其景以此為候史記推合朔在夜明旦日食而出出而解孟康曰夜食地中出而止是為夜食劉向以為夜食者陰因日明之衰而奪其光象周天子不明齊桓將奪其威專㑹諸侯而行伯道其後遂九合諸侯師古曰解在郊祀志天子使世子㑹之師古曰僖五年齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王太子于首止是也此其效也公羊傳曰食晦董仲舒以為宿在東壁魯象也後公子慶父叔牙果通於夫人以弑公劉歆以為晦魯衛分二十五年六月辛未朔日有食之董仲舒以為宿在畢主邊兵夷狄象也後狄滅邢衛師古曰春秋閔元年狄伐邢二年狄滅衛其後竝為齊所立而邢遷于夷儀衛遷于楚丘劉歆以為五月二日魯趙分二十六年十二月癸亥朔日有食之董仲舒以為宿在心心為明堂文武之道廢中國不絶若綫之象也師古曰綫縷也音先箭反劉向以為時戎侵曹師古曰事在莊二十四年魯夫人淫於慶父叔牙將以弑君故比年再蝕以見戒劉歆以為十月二日楚鄭分三十年九月庚午朔日有食之董仲舒劉向以為後魯二君弑師古曰謂子般為圉人所殺閔公為卜齮所殺也夫人}
