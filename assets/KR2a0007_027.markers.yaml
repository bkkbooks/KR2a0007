  - {type: variant, offset: 2620, length: 2171, content: 燕王趙王故與胡王有約燕王北定代雲中轉胡眾入蕭關走長安匡正天下以安高廟願王勉之楚元王子淮南三王或不沐洗十餘年怨入骨髓欲壹有所出久矣寡人未得諸王之意未敢聽今諸王苟能存亡繼絕振弱伐暴以安劉氏社稷所願也吳國雖貧寡人節衣食用積金錢脩兵革聚糧食夜以繼日三十餘年矣凡皆為此願諸王勉之能斬捕大將者賜金五千斤封萬戶列將三千斤封五千戶裨將二千斤封二千戶二千石千斤封千戶皆為列侯其以軍若城邑降者卒萬人邑萬戶如得大將人戶五千如得列將人戶三千如得裨將人戶千如得二千石其小吏皆以差次受爵金它封賜皆倍軍法其有故爵邑者更益勿因願諸王明以令士大夫不敢欺也寡人金錢在天下者往往而有非必取於吳諸王日夜用之不能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子乃遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵初吳楚反書聞兵未發竇嬰言故吳相爰盎召入見上問以吳楚之計盎對曰吳楚相遺書曰賊臣朝錯擅適諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨斬錯發使赦七國復其故地則兵可毋血刃而俱罷上從其議遂斬錯語具在盎傳以盎為泰常奉宗廟使吳王吳王弟子德侯為宗正輔親戚使至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王拜受詔吳王聞盎來亦知其欲說笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得夜亡走梁遂歸報條侯將乘六乘傳會兵滎陽至雒陽見劇孟喜曰七國反吾乘傳至此不自意全又以為諸侯已得劇孟孟今無動吾據滎陽滎陽以東無足憂者至淮陽問故父絳侯客鄧都尉曰策安出客曰吳兵銳甚難與爭鋒楚兵輕不能久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝高壘使輕兵絕淮泗口塞吳饟道使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其策遂堅壁昌邑南輕兵絕吳饟道吳王之初發也吳臣田祿伯為大將軍田祿伯曰兵屯聚而西無它奇道難以立功臣願得五萬人別循江淮而上收淮南長沙入武關與大王會此亦一奇也吳王太子諫曰王以反為名此兵難以藉人人亦且反王柰何且擅兵而別多它利害徒自損耳吳王即不許田祿伯吳少將桓將軍說王曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問吳老將老將曰此年少推鋒可耳安知大慮於是王不用桓將軍計王專并將其兵未度淮諸賓客皆得為將校尉行間候司馬獨周丘不用周丘者下邳人亡命吳酤酒無行王薄之不任周丘乃上謁說王曰臣以無能不得待罪行間臣非敢求有所將也願請王一漢節必有以報王乃予之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入戶使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯至矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬破城陽中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至癰發背死二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃高皇帝親垂功德建立諸侯幽王悼惠王絕無後孝文皇帝哀憐加惠王幽王子遂悼惠王子卬等令奉其先王宗廟為漢藩國德配天地明並日月而吳王濞背德反義誘受天下亡命罪人亂天下幣稱疾不朝二十餘年有司數請濞罪孝文皇帝寬之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光菑川王賢膠東王雄渠約從謀反為逆無道起兵以危宗廟賊殺大臣及漢使者迫劫萬民伐殺無罪燒殘民家掘其丘壟甚為虐暴而卬等又重逆無道燒宗廟鹵御物朕甚痛之朕素服避正殿將軍其勸士大夫擊反虜擊反虜者深入多殺為功斬首捕虜比三百石以上皆殺無有所置敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乘勝而前銳甚梁孝王恐遣將軍擊之又敗梁兩軍士卒皆還走梁數使使條侯求救條侯不許又使使愬條侯於上上使告條侯救梁又守便宜不行梁使韓安國及楚死事相弟張羽為將軍乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍會下邑欲戰條侯壁不肯戰吳糧絕卒飢數挑戰遂夜奔條侯壁驚東南條侯使備西北果從西北不得入吳大敗士卒多飢死叛散於是吳王乃與其戲下壯士千人夜亡去度淮走丹徒保東越東越兵可萬餘人使人收聚亡卒漢使人以利啗東越東越即紿吳王吳王出勞軍使人鏦殺吳王盛其頭馳傳以聞吳王太子駒亡走閩越吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍楚王戊軍敗自殺三王之圍齊臨菑也三月不能下漢兵至膠西膠東菑川王各引兵歸國膠西王徒跣席稾飲水謝太后王太子德曰漢兵還臣觀之以罷可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壞不可用不聽漢將弓高侯頹當遺王書曰奉詔誅不義降者赦除其罪復故不降者滅之王何處須以從事王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍遠道至于窮國敢請葅醢之罪弓高侯執金鼓見之曰王苦軍事願聞王發兵狀王頓道膝行對曰今者朝錯天子用事臣變更高皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且以誅錯今聞錯已誅卬等謹已罷兵歸將軍曰王苟以錯為不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之曰王其自圖之王曰如卬等死有餘罪遂自殺太后太子皆死膠東菑川濟南王皆伏誅酈將軍攻趙十月而下之趙王自殺濟北王以劫故不誅初吳王首反并將楚兵連齊趙正月起三月皆破滅贊曰荊王王也由漢初定天下未集故雖疏屬以策為王鎮江淮之間劉澤發於田生權激呂氏然卒南面稱孤者三世事發相重豈不危哉吳王擅山海之利能薄斂以使其眾逆亂之萌自其子興古者諸侯不過百里山海不以封蓋防此矣朝錯為國遠慮禍反及身毋為權首將, WYG: 衝厭}
