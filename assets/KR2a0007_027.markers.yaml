  - {type: variant, offset: 2215, length: 0, content: '', krp: 諸侯從之七國俱滅京房易傳曰冢宰専政厥妖人生角成帝建始三年十月丁未京師相驚言大水至渭水虒上小女陳持弓年九嵗師古曰虒上地名也音斯走入横城門入未央宫尚方掖門殿門門衞戸者莫見至句盾禁中而覺得師古曰句盾少府之署覺得事覺而見執得也民以水相驚者陰氣盛也小女而入宫殿中者下人將因女寵而居有宫室之象也名曰持弓有似周家檿弧之祥易曰弧矢之利以威天下師古曰下繫之辭也是時帝母王太后弟鳳始為上將秉國政天知其後將威天下而入宫室故象先見也其後王氏兄弟父子五侯秉權至莽卒簒天下蓋陳氏之後云京房易傳曰妖言動衆兹謂不信路將亡人司馬死成帝綏和二年八月庚申鄭通里男子王襃師古曰鄭縣之通里衣絳衣小冠帶劒入北司馬門殿東門師古曰入北司馬門又入殿之東門也上前殿入非常室中如淳曰殿上室名解帷組結佩之師古曰組綬類所以係帷又垂以為飾也佩帶之招前殿署長業等曰天帝令我居此業等收縛考問襃故公車大誰卒應劭曰在司馬殿門掌讙呵者也服䖍曰衞士之帥也著樊噲冠師古曰大誰者主問非常之人云姓名是誰也而應氏乃以讙譁為義云大讙呵不當厥理後之學者輒改此書誰字為讙違本文矣大誰本以誰何稱因用名官有大誰長今此卒者長所領士卒也病狂易師古曰謂病狂而變易其常也不自知入宫狀下獄死是時王莽為大司馬哀帝即位莽乞骸骨就第天知其必不退故因是而見象也姓名章服甚明徑上前殿路寢入室取組而佩之稱天帝命然時人莫察後莽就國天下寃之哀帝徵莽還京師明年帝崩莽復為大司馬因是而簒國哀帝建平四年正月民驚走持槀或掫一枚如淳曰掫麻幹也師古曰槀禾稈也音二老反掫音鄒又音側九反傳相付與曰行詔籌道中相過逢多至千數或被髪徒踐師古曰徒踐謂徒跣也或夜折闗或踰牆入或乗車騎奔馳以置驛傳行經歴郡國二十六至京師其夏京師郡國民聚會里巷阡陌設祭張博具師古曰博戲之具歌舞祠西王母又傳書曰母告百姓佩此書者不死不信我言視門樞下當有白髪師古曰樞門扇所由開閉者也至秋止是時帝祖母傅太后驕與政事師古曰與讀曰豫故杜鄴對曰春秋災異以指象為言語籌所以紀數民陰水類也水以東流為順走而西行反類逆上象數度放溢妄以相予違忤民心之應也西王母婦人之稱博弈男子之事於街巷阡陌明離闑内師古曰闑門橛也音魚列反與疆外師古曰與讀曰預臨事盤樂炕陽之意白髪衰年之象體尊性弱難理易亂門人之所由樞其要也居人之所由制持其要也其明甚著今外家丁傅並侍帷幄布於列位有罪惡者不坐辜罰亡功能者畢受官爵皇甫三桓詩人所刺春秋所譏亡以甚此師古曰皇甫周卿士之字也用后嬖寵而處職位詩人刺之事見小雅十月之交篇指象昭昭以覺聖朝奈何不應後哀帝崩成帝母王太后臨朝王莽為大司馬誅滅丁傅一曰丁傅所亂者小此異乃王太后莽之應云前漢書卷二十七下之上前漢書卷二十七下之上考證五行志下之上秦孝文王五年斿朐衍臣召南按斿當作遊傳寫訛耳但孝文王即位祇一年遂卒安得有五年也此文可疑燕有黄䑕銜其尾舞王宫云云臣召南按此事已見於中上卷内引京房易傳亦同此一事重見未及刋除者也兹謂閉下閉監本訛蔽按此與前文閉上相對宋本作閉是也從之有兩龍見于蘭陵廷東里温陵井中孝惠紀作見蘭陵家人井中是時吳王濞封有四郡五十三城注師古云云顧炎武曰四郡當作三郡古四字積畫以成與三易混猶左傳陳蔡不羔三國為四國也前漢書卷二十七下之上考證欽定四庫全書前漢書卷二十七下之下漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注五行志第七下之下隠公三年二月己巳日有食之榖梁傳曰言日不言朔食晦公羊傳曰食二日董仲舒劉向以為其後戎執天子之使師古曰凡伯周大夫也隠七年天王使凡伯來聘戎伐凡伯于楚丘以歸鄭獲魯隠師古曰公羊傳隠六年春鄭人來渝平渝平墮成也曰吾成敗矣吾與鄭人未有成狐壤之戰隠公獲焉何以不言戰諱獲也滅戴師古曰十年秋宋人蔡人衛人伐戴鄭伯伐取之戴國今外黄縣東南戴城是也讀者多誤為載故隋室置載州焉衛魯宋咸殺君師古曰四年衛州吁殺其君完十一年羽父使賊殺公于寪氏桓二年春宋督弑其君與夷左氏劉歆以為正月二日燕越之分野也凡日所躔而有變則分野之國失政者受之師古曰躔踐也音纒人君能修政共御厥罰則災消而福至師古曰共讀曰恭御讀曰禦又讀如本字不能則災息而禍生師古曰息謂蕃滋也故經書災而不記其故蓋吉凶亡常隨行而成禍福也周衰天子不班朔師古曰班布也魯厯不正置閏不得其月月大小不得其度史記日食或言朔而實非朔或不言朔而實朔或脱不書朔與日皆官失之也京房易傳曰亡師兹謂不御厥異日食其食也既竝食不一處誅衆失理兹謂生叛厥食既光散縱畔兹謂不明厥食先大雨三日雨除而寒寒即食專禄不封兹謂不安厥食既先日出而黒光反外燭韋昭曰中無光四邊有明外燭君臣不通兹謂亡厥蝕三既同姓上侵兹謂誣君厥食四方有雲中央無雲其日大寒公欲弱主位兹謂不知厥食中白青四方赤已食地震諸侯相侵兹謂不承厥食三毁三復君疾善下謀上兹謂亂厥食既先雨雹殺走獸弑君獲位兹謂逆厥食既先風雨折木日赤内臣外鄉兹謂背師古曰鄉讀曰嚮厥食食且雨地中鳴韋昭曰地中冇聲如鳴耳或曰如狗子聲冡宰專政兹謂因厥食先大風食時日居雲中四方亡雲伯正越職兹謂分威師古曰伯讀曰覇正者長帥之稱厥食日中分諸侯争羙於上兹謂泰厥食日傷月食半天營而鳴韋昭曰食半謂食望也臣瓉曰月食半謂食月之半也月食常以望不為異也賦不得兹謂竭厥食星隨而下受命之臣專征云試厥食雖侵光猶明師古曰試用也自擅意也一説試與弑同謂欲弑君若文王臣獨誅紂矣韋昭曰是時紂臣尚未欲誅紂獨文王之臣欲誅之小人順受命者征其君云殺厥食五色至大寒隕霜師古曰殺亦讀曰弑若紂臣順武王而誅紂矣韋昭曰紂惡益甚其臣欲順武王而誅紂諸侯更制兹謂叛師古曰更改也厥食三復三食食已而風地動適讓庶兹謂生欲師古曰適讀曰嫡厥食日失位光晻晻月形見師古曰晻音烏感反見音胡電反酒亡節兹謂荒厥食乍青乍黒乍赤明日大雨發霧而寒凡食二十占其形二十有四改之輒除不改三年三年不改六年六年不改九年推隠三年之食貫中央上下竟而黒臣弑從中成之形也後衛州吁弑君而立桓公三年七月壬辰朔日有食之既董仲舒劉向以為前事已大後事將至者又大則既先是魯宋弑君魯又成宋亂易許田亡事天子之心楚僭稱王後鄭拒王師射桓王師古曰竝已解于上又二君相簒師古曰謂厲公奔蔡而昭公入高渠彌殺昭公而立子亹劉歆以為六月趙與晉分晉灼曰周之六月今之四月始去畢而入參參晉分也畢趙也日行去趙逺入晉分多故曰與計二十八宿分其次度其月及所屬下皆以為例先是晉曲沃伯再弑晉侯師古曰曲沃伯本桓叔成師之封號也其後遂繼襲馬魯惠公三十年大夫潘父殺昭侯而納成師不克晉人立孝侯惠之四十五年成師之子曲沃莊伯伐翼殺孝侯也是嵗晉大亂師古曰桓三年莊伯之子曲沃武公伐翼逐翼侯于汾隰夜獲而殺之滅其宗國師古曰桓八年曲沃武公滅翼遂并其國京房易傳以為桓三年日食貫中央上下竟而黄臣弑而不卒之形也後楚嚴稱王兼地千里師古曰楚武王荆尸乆已見傳今此言莊始稱王未詳其説十七年十月朔日有食之榖梁傳曰言朔不言日食二日也劉向以為是時衛侯朔有罪出奔齊師古曰朔衛惠公也桓十六年經書衛侯朔出奔齊公羊傳曰得罪乎天子穀梁傳曰天子召而不往也天子更立衛君師古曰衛公子黔牟朔藉助五國舉}
