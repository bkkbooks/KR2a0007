  - {type: variant, offset: 57, length: 0, content: '', WYG: 此者也師古曰易改也朕夙夜庶幾獲承至尊懼不能寧惟所與共為治者君宜知之師古曰惟思也知謂知治道也蓋君子善善及後世若兹行常在朕躬師古曰朕常思此不息於心也君不幸罹霜露之疾何恙不已師古曰罹遭也恙憂也已止也言何憂於疾不止也禮記曰疾止復初也乃上書歸侯乞骸骨是章朕之不徳也師古曰章明也今事少間師古曰間言有空隙也間讀曰閑君其存精神止念慮輔助醫藥以自持因賜告牛酒雜帛居數月有瘳視事凡為丞相御史六歲年八十終丞相位其後李蔡嚴青翟趙周石慶公孫賀劉屈􅈊繼踵為丞相師古曰繼踵言相躡也屈音邱勿反又鉅勿反􅈊音力之反自蔡至慶丞相府客館邱虛而已師古曰言不能進賢故不繕脩其室屋也虚讀曰墟至賀屈氂時壞以為馬廐車庫奴婢室矣唯慶以惇謹復終相位師古曰惇厚也音敦其餘盡伏誅云𢎞子度嗣侯為山陽太守十餘歲詔徵鉅野令史成詣公車度留不遣坐論為城旦元始中脩功臣後下詔曰漢興以來股肱在位身行儉約輕財重義未有若公孫𢎞者也位在宰相封侯而為布被脱粟之飯奉祿以給故人賔客無有所餘可謂減於制度而率下篤俗者也應劭曰禮貴有常尊衣服有品師古曰篤厚也與内厚富而外為詭服以釣虛譽者殊科師古曰詭違也詭服謂與心志相違也一曰違衆之服也夫表徳章義所以率世厲俗聖王之制也其賜𢎞後子孫之次見為適者師古曰見音胡電反適讀曰嫡爵關内侯食邑三百户卜式河南人也以田畜為事有少弟弟壯式脱身出師古曰脱身謂引身出也脱音徒活反獨取畜羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與弟者數矣師古曰數音所角反時漢方事匈奴式上書願輸家財半助邊上使使問式欲為官乎式曰自小牧羊不習仕宦不願也使者曰家豈有寃欲言事乎式曰臣生與人亡所爭邑人貧者貸之師古曰貸音土戴反不善者教之所居人皆從式式何故見寃使者曰茍子何欲師古曰言子茍如此輸財必有所欲式曰天子誅匈奴愚以為賢者宜死節有財者宜輸之如此而匈奴可滅也使者以聞上以語丞相𢎞𢎞曰此非人情不軌之臣師古曰軌亦法也不可以為化而亂法願陛下勿許上不報數歲乃罷式式歸復田牧歲餘㑹渾邪等降縣官費衆倉府空師古曰倉粟所積也府錢所聚也貧民大徙皆卬給縣官師古曰卬音牛向反無以盡贍式復持錢二十萬與河南太守以給徙民河南上富人助貧民者上識式姓名曰是固前欲輸其家半財助邊乃賜式外繇四百人蘓林曰外繇謂戍邊也一人出三百錢謂之過更式歲得十二萬錢也一説在繇役之外得復除四百人也師古曰一説是也式又盡復與官是時富豪皆爭匿財師古曰匿藏也唯式尤欲助費上於是以式終長者乃召拜式為中郎賜爵左庶長師古曰第十爵田十頃布告天下尊顯以風百姓師古曰風讀曰諷初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊師古曰蹻即今草屨也南方謂之蹻字本作屩並音居畧反宋祁曰注文今草屨也景本作今之鞋也歲餘羊肥息師古曰息生也言羊既肥而又生多也上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去師古曰去除也音邱巨反毋令敗羣上竒其言欲試使治民拜式緱氏令緱氏便之遷成臯令將漕最師古曰為縣令而又使領漕其課最上上以式朴忠師古曰朴質也拜為齊王太傅轉為相㑹呂嘉反式上書曰臣聞主媿臣死羣臣宜盡死節其駑下者宜出財以佐軍如是}
