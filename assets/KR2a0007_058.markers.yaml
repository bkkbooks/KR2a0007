  - {type: variant, offset: 47, length: 1, content: 當, WYG: 故曰好問近乎知師古曰疑則問之故成其智力行近乎仁師古曰屈已濟物故為仁也知恥近乎勇師古曰不求茍得故為勇也知此三者知所以自治知所以自治然後知所以治人師古曰自好問近乎知以下皆禮記中庸之辭未有不能自治而能治人者也陛下躬孝弟監三王建周道兼文武招倈四方之士任賢序位量能授官將以厲百姓勸賢材也今臣愚駑無汗馬之勞師古曰言未嘗從軍旅陛下過意擢臣𢎞卒伍之中師古曰過猶誤也封為列侯致位三公臣𢎞行能不足以稱師古曰不副其任也加有負薪之疾恐先狗馬填溝壑終無以報徳塞責願歸侯乞骸骨避賢者路上報曰古者賞有功襃有徳守成上文遭禍右武師古曰右亦上也禍亂}
