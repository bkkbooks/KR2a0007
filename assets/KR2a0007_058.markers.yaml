  - {type: variant, offset: 1708, length: 0, content: '', WYG: 式既在位言郡國不便鹽鐵而船有筭可罷上由是不説式師古曰説讀曰悦明年當封禪式又不習文章貶秩為太子太傅以兒寛代之式以夀終兒寛千乗人也師古曰千乗郡千乗縣也兒音五奚反治尚書事歐陽生以郡國選詣博士受業孔安國貧無資用嘗為弟子都飬師古曰都凡衆也飬主給烹炊者也貧無資用故供諸弟子烹炊也飬弋向反時行賃作帶經而鉏休息輒讀誦其精如此以射策為掌故功次補廷尉文學卒史蘇林曰秩六百石舊郡亦有也臣瓚曰漢注卒史秩百石師古曰瓚説是也寛為人温良有廉知自將師古曰將衛也以智自衛䕶也善屬文師古曰屬綴也音之欲反然懦於武師古曰懦柔也音乃喚反又音儒口弗能發明也時}
