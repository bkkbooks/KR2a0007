  front:
  - {type: variant, offset: 0, length: 1, content: 嚴, WYG: 欽定四庫全書前漢書卷五十八漢蘭臺令史班固撰唐正議大夫行祕書少監琅琊縣開國子顔師古注公孫𢎞卜式兒寛傳第二十八公孫𢎞葘川薛人也少時為獄吏有罪免家貧牧豕海上年四十餘乃學春秋雜説武帝初即位招賢良文學士宋祁曰士字上疑有之字是時𢎞年六十以賢良徵為博士使匈奴還報不合意師古曰奏事不合天子之意上怒以為不能𢎞乃移病免歸師古曰移病謂移書言病也一曰以病移居元光五年復徵賢良文學葘川國復推上𢎞𢎞謝曰前已嘗西用不能罷願更選國人固推𢎞𢎞至太常上策詔諸儒制曰蓋聞上古至治畫衣冠異章服而民不犯隂陽和五穀登六畜蕃師古曰登成也蕃多也音扶元反甘露降風雨時嘉禾興}
