  - {type: variant, offset: 4975, length: 1, content: 陳, WYG: 從東封泰山還登明堂寛上壽曰臣聞三代改制屬象相因李竒曰政教之法象相因屬師古曰屬連也音之欲反間者聖統廢絶師古曰聖統聖人之遺業謂禮文也陛下發憤合指天地祖立明堂辟雍師古曰祖始也宗祀泰山師古曰宗尊也六律五聲師古曰六律謂黄鍾太蔟姑洗㽔賓夷則無射也五聲宫商角徵羽也幽贊聖意師古曰幽深也贊明也神樂四合各有方象如淳曰四方色及五神祭祀聲樂各有等以丞嘉祀為}
  - {type: page-break, offset: 4975, content: '', id: KR2a0007_WYG_058-17a, image: WYG0250/WYG0250-0304c.png}
  - {type: variant, offset: 4975, length: 1, content: 陳, krp: 從東封泰山還登明堂寛上壽曰臣聞三代改制屬象相因李竒曰政教之法象相因屬師古曰屬連也音之欲反間者聖統廢絶師古曰聖統聖人之遺業謂禮文也陛下發憤合指天地祖立明堂辟雍師古曰祖始也宗祀泰山師古曰宗尊也六律五聲師古曰六律謂黄鍾太蔟姑洗㽔賓夷則無射也五聲宫商角徵羽也幽贊聖意師古曰幽深也贊明也神樂四合各有方象如淳曰四方色及五神祭祀聲樂各有等以丞嘉祀為}
  - {type: variant, offset: 4977, length: 0, content: '', WYG: 世則師古曰則法也天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅邕永享李竒曰太平之世日抱重光謂日有重日也蘇林曰將甫始之辭也大元太初歴也本瑞謂白麟寳鼎之屬也以候景至冬至之景也上元甲子太初元}
  - {type: variant, offset: 4977, length: 0, content: '', krp: 世則師古曰則法也天下幸甚將建大元本瑞登告岱宗發祉闓門以候景至癸亥宗祀日宣重光上元甲子肅邕永享李竒曰太平之世日抱重光謂日有重日也蘇林曰將甫始之辭也大元太初歴也本瑞謂白麟寳鼎之屬也以候景至冬至之景也上元甲子太初元}
  - {type: variant, offset: 4978, length: 0, content: '', WYG: 甲子朔旦冬至也師古曰宗尊也肅敬也雍和也既敬且和則長為天所享也闓讀與開同光輝充塞天文粲然師古曰塞滿也粲然明貌見象日昭報降符應師古曰言天顯示景象白日昭明也降下符應以報徳化臣寛奉觴再拜上千萬歲壽制曰敬舉君之觴後太史令司馬遷等言歴紀壞廢漢興未改正朔宜可正上乃詔寛與遷等共定漢太初歴語在律歴志初梁相褚大通五經為博士時寛為弟子及御史大夫缺徵褚大夫自}
  - {type: page-break, offset: 4978, content: '', id: KR2a0007_WYG_058-17b, image: WYG0250/WYG0250-0304d.png}
  - {type: variant, offset: 4978, length: 0, content: '', krp: 甲子朔旦冬至也師古曰宗尊也肅敬也雍和也既敬且和則長為天所享也闓讀與開同光輝充塞天文粲然師古曰塞滿也粲然明貌見象日昭報降符應師古曰言天顯示景象白日昭明也降下符應以報徳化臣寛奉觴再拜上千萬歲壽制曰敬舉君之觴後太史令司馬遷等言歴紀壞廢漢興未改正朔宜可正上乃詔寛與遷等共定漢太初歴語在律歴志初梁相褚大通五經為博士時寛為弟子及御史大夫缺徵褚大夫自}
  - {type: variant, offset: 4980, length: 0, content: '', WYG: 御史大夫宋祁曰褚大下夫字}
  - {type: variant, offset: 4980, length: 0, content: '', krp: 御史大夫宋祁曰褚大下夫字}
  - {type: variant, offset: 4981, length: 2, content: 擊丞, WYG: 作大至洛陽聞兒寛為之褚大笑及至與寛議封禪於上前大不能及退而服曰上誠知人寛為御史大夫以稱意任職故久無有所匡諫於上官屬易之師古曰易輕也音弋豉反居位九歲以官卒贊曰公孫𢎞卜式兒寛皆以鴻漸之翼困於燕爵李竒曰漸進也鴻一舉而進千里者羽翼之材也𢎞等皆以大材初為俗所薄若燕爵不知鴻志也師古曰易漸卦上九爻辭曰鴻漸于陸其羽可以為儀鴻大鳥漸進也髙平曰陸言鴻進於陸以其羽翼為威儀也喻𢎞等皆有鴻之羽儀未進之時燕爵所輕也逺迹羊豕之間師古曰逺竄其迹也非遇其時焉能致此位乎師古曰焉於何也是時漢興六十餘載海内艾安師古曰艾讀曰乂府庫充實而四夷未賔制度多闕上方欲用文武求之如弗及師古曰恐失之始以蒲輪迎枚生見主父而歎息師古曰謂言公皆安在何}
  - {type: page-break, offset: 4981, content: '', id: KR2a0007_WYG_058-18a, image: WYG0250/WYG0250-0305a.png}
