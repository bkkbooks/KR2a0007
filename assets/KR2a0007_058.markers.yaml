  - {type: variant, offset: 3073, length: 0, content: '', WYG: 心師古曰下音胡嫁反擇用仁厚士推情與下不求聲名吏民大信愛之寛表奏開六輔渠韋昭曰六輔為京兆馮翊扶風河東河南河内也劉徳曰於六輔界中為渠也師古曰二説皆非也溝洫志云兒寛為左内史奏請穿六輔渠以益溉鄭國旁髙卬之田此則於鄭國渠上流南岸更開六道小渠以輔助溉灌耳今雍州雲陽三原兩縣界此渠尚存鄉}
  - {type: variant, offset: 3073, length: 0, content: '', krp: 心師古曰下音胡嫁反擇用仁厚士推情與下不求聲名吏民大信愛之寛表奏開六輔渠韋昭曰六輔為京兆馮翊扶風河東河南河内也劉徳曰於六輔界中為渠也師古曰二説皆非也溝洫志云兒寛為左内史奏請穿六輔渠以益溉鄭國旁髙卬之田此則於鄭國渠上流南岸更開六道小渠以輔助溉灌耳今雍州雲陽三原兩縣界此渠尚存鄉}
  - {type: variant, offset: 3074, length: 0, content: '', WYG: 名曰六渠亦號輔渠故河渠書云關内則輔渠靈軹是也焉説三河之地哉定水令以廣溉田師古曰為用水之次具立法令皆得其所也宋祁曰注令皆下當添使字收租税時裁闊狹與民相假貸師古曰謂有貧弱及農要之時不即徵收也貸音土代反以故租多不入後有軍發左内史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶師古曰繦索也言輸者接連不絶於道若繩索之相屬也猶今言續索矣屬音之欲反課更以最上由此愈竒寛及議欲放古巡狩封禪之事師古曰放依也音甫往反諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳言符瑞足以封泰山上竒其書以問寛寛對曰陛下躬發聖徳統楫羣元張晏曰統察楫聚也如淳曰歴數之元也}
