  - {type: punctuation, offset: 5409, content: 「, id: KR2a0007_tls_058-bkkpn1132}
  - {type: variant, offset: 5409, length: 303, content: 我復見言君房也捐之復短石顯興曰顯鼎貴上信用之今欲進弟從我計且與合意即得入矣捐之即與興共為薦顯奏曰竊見石顯本山東名族有禮義之家也持正六年未嘗有過明習於事敏而疾見出公門入私門宜賜爵關內侯引其兄弟以為諸曹又共為薦興奏曰竊見長安令興幸得以知名數召見興事父母有曾氏之孝事師有顏閔之材榮名聞於四方明詔舉茂材列侯以為首為長安令吏民敬鄉道路皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直用之介冑則冠軍侯施之治民則趙廣漢抱公絕私則尹翁歸興兼此六人而有之守道堅固執義不回臨大節而不可奪國之良臣也可試守京兆尹石顯聞知白之上乃下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懷詐偽以上語相風更相薦譽欲得大位漏泄省中語罔上不道, WYG: 虞}
