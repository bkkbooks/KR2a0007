  - {type: variant, offset: 2384, length: 686, content: 南越傳軍死時年二十餘故世謂之終童王襃字子淵蜀人也宣帝時修武帝故事講論六藝群書博盡奇異之好徵能為楚辭九江被公召見誦讀益召高材劉向張子僑華龍柳襃等待詔金馬門神爵五鳳之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者渤海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於眾庶聞王襃有俊材請與相見使襃作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之時氾鄉侯何武為僮子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之襃既為刺史作頌又作其傳益州刺史因奏襃有軼材上乃徵襃既至詔襃為聖主得賢臣頌其意襃對曰夫荷旃被毳者難與道純綿之麗密羹藜唅糗者不足與論太牢之滋味今臣辟在西蜀生於窮巷之中長於蓬茨之下無有游觀廣覽之知顧有至愚極陋之累不足以塞厚望應明指雖然敢不略陳愚而抒情素記曰共惟春秋法五始之要在乎審己正統而已夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效眾故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將之樸清水焠其鋒越砥斂其咢水斷蛟龍陸剸犀革忽若彗氾畫塗如此則使離褸督繩公輸削墨雖崇臺五增延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝策而不進於行匈喘膚汗人極馬倦及至駕齧䣛驂乘旦王良執靶韓哀附輿縱馳騁騖忽如景靡過都越國蹶如歷塊追奔電逐遺風周流八極萬里壹息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煗者不憂至寒之悽愴何則有其具者易其備賢人君子亦聖王之所以易海內也是以嘔喻受之開寬裕之路以延天下英俊也夫竭知附賢者必建仁策索人求士者必樹伯迹昔周公躬吐捉之勞故有圉空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸, WYG: ''}
