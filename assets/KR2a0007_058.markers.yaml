  - {type: variant, offset: 307, length: 1366, content: 至也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起伯者常佐天子興利除害誅暴禁邪匡正海內以尊天子五伯既沒賢聖莫續天子孤弱號令不行諸侯恣行彊陵弱眾暴寡田常篡齊六卿分晉並為戰國此民之始苦也於是彊國務攻弱國修守合從連衡馳車轂擊介冑生蟣蝨民無所告愬及至秦王蠶食天下并吞戰國稱號皇帝一海內之政壞諸侯之城銷其兵鑄以為鍾虡示不復用元元黎民得免於戰國逢明天子人人自以為更生鄉使秦綬刑罰薄賦斂省繇役貴仁義賤權利上篤厚下佞巧變風易俗化於海內則世世必安矣秦不行是風循其故俗為知巧權利者進篤厚忠正者退法嚴令苛讇諛者眾日聞其美意廣心逸欲威海外使蒙恬將兵以北攻彊胡辟地進境戍於北河飛芻輓粟以隨其後又使尉屠睢將樓般之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絕越人擊之秦兵大敗秦乃使尉佗將卒以戍越當是時秦禍北構於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔陳勝吳廣舉陳武臣張耳舉趙項梁舉吳田儋舉齊景駒舉郢周市舉魏韓廣舉燕窮山通谷豪士並起不可勝載也然本皆非公侯之後非長官之吏無尺寸之勢起閭巷杖棘矜應時而動不謀而俱起不約而同會壤長地進至乎伯王時教使然也秦貴為天子富有天下滅世絕祀窮兵之禍也故周失之弱秦失之彊不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長策也今中國無狗吠之警而外累於遠方之備靡敝國家非所以子民也行無窮之欲甘心快意結怨於匈奴非所以安邊也禍挐而不解兵休而復起近者愁苦遠者驚駭非所以持久也今天下鍛甲摩劍矯箭控弦輔輸軍糧未見休時此天下所共憂也夫兵久而變起事煩而慮生今外郡之地或幾千里列城數十形束壤制帶脅諸侯非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也後以安為騎馬令終軍字子雲濟南人也少好學以辯博能屬文聞於郡中年十八選為博士弟子至府受遺太守聞其有異材召見軍甚奇之與交結軍揖太守而去至長安上書言事武帝異其文拜軍為謁者給事中從上幸雍祠五畤獲白麟一角而五蹄時又得奇木其枝旁出輒復合於木上上異此二物博謀群臣軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚群正朔不及其俗有司臨境而東甌內附閩王伏辜南越賴救北胡隨畜薦居禽獸行虎狼心上古未能攝大將軍秉鉞單于犇幕票騎抗旌昆邪右衽是澤南洽而威北暢也若罰不阿近舉不遺遠設官竢賢縣賞待功能者進以保祿罷者退而勞力刑於宇內矣履眾美而不足懷聖明而不專建三宮之文質章厥職之所宜封禪之君無聞焉夫天命初定萬事草創及臻六合同風九州共貫必待明聖潤色祖業傳於無窮故周至成王然後制定而休徵之應見陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宮獻享之精交神積和之氣塞明而異獸來獲宜矣昔武王中流未濟白魚入於王舟俯取以燎群公咸曰休哉今郊祀未見於神祇而獲獸以饋此天之所以示饗而上通之符合也宜因昭時令日改定告元苴白茅於江淮發嘉號于營丘以應緝熙使著事者有紀焉蓋六鶂退飛逆也白魚登舟順也夫明闇之徵上亂飛鳥下動淵魚各以類推今野獸并角明同本也眾支內附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而蒙化者焉斯拱而竢之耳對奏上甚異之由是改元為元狩後數月越地及匈奴名王有率眾來降者時皆以軍言為中, WYG: ''}
