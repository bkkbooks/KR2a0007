  - {type: variant, offset: 3075, length: 1, content: 亦, WYG: 瓚曰統猶總覽也楫當作輯師古曰輯楫與集三字並同虞書曰楫五瑞是也其字從木瓚曰當為輯不通宗祀天地薦禮百神精神所鄉徵兆必報師古曰鄉讀曰嚮徵證也天地並應符瑞昭明其封泰山禪梁父昭姓考瑞帝王之盛節也}
