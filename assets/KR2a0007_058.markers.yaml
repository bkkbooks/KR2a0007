  - {type: variant, offset: 4984, length: 0, content: '', WYG: 見之晩羣士慕嚮異人並出卜式拔於芻牧𢎞羊擢於賈豎衞青奮於奴僕日磾出於降虜斯亦曩時版築飯牛之朋已師古曰版築傅説也飯牛甯戚也已語終辭也飯音扶晩反漢之得人於茲為盛儒雅則公孫𢎞董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯宋祁曰南本令作律文章則司馬遷相如滑稽則東方朔枚臯師古曰滑稽轉利之稱也滑亂也稽礙也言其變亂無留礙也一説稽考也言可滑亂不可考校也滑音骨稽音工奚反應對則嚴助朱買臣厯數則唐都洛下閎協律則李延年運籌則桑𢎞羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀師古曰紀記也是以興造功業制度遺文後世莫及孝宣承統纂脩洪業亦講論六蓺招選茂異而蕭望之梁邱賀夏侯勝韋𤣥成嚴彭祖尹更始以儒術進劉向王襃以文章顯將相則張安世趙充國魏相丙吉}
