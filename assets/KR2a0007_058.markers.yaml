  - {type: variant, offset: 2, length: 2, content: 吾丘, WYG: 屮生師古曰􅋄古草字山不童澤不涸師古曰童無草木也涸水竭也音胡各反麟鳯在郊藪龜龍游於沼師古曰邑外謂之郊澤無水曰藪沼池也河洛出圖書父不喪子兄不哭弟北發渠搜南撫交阯師古曰言威徳之盛北則徵發于渠搜南則綏撫於交阯也渠搜逺夷之國也舟車所至人迹所及跂行喙息咸得其宜師古曰跂行有足而行者也喙息謂有口能息者也跂音岐喙音許穢反朕甚嘉之今何道而臻乎此師古曰臻至也子大夫脩先聖之術明君臣之義講論洽聞有聲乎當世敢問子大夫天人之道何所本始吉凶之效安所期焉師古曰安焉也禹湯水旱厥咎何由仁義禮知四者之宜當安設施屬統垂業物鬼變化師古曰屬繫也音之欲反其下亦同天命之符廢興何如天文地理人事之紀子大夫習焉其悉意正議詳具其對著之于篇師古曰悉盡也篇簡也朕將親覽焉靡有所隱𢎞對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也師古曰躬謂身親行之遇謂處待之而已宋祁曰注文而已字疑當刪末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治師古曰分音扶問反去無用之言則事情得不作無用之器則賦斂省不奪民時不妨民力則百姓富有徳者進無徳者退則朝廷尊有功者上無功者下則羣臣逡李竒曰言有次第也師古曰逡音七旬反其字從辵宋祁曰逡疑作俊姚本注文改辵作辶罰當罪則姦邪止賞當賢則臣下勸凡此八者治民之本也宋祁云江南本無民字故民者業之即不爭理得則不怨有禮則不暴愛之則親上師古曰各得其業則無爭心各申其理則無所怨使之由禮則無暴慢子而愛之則知親上也此有天下之急者也故法不逺義則民服而不離和不逺禮則民親而不暴師古曰遠違也音于萬反故法之所罰義之所去也師古曰去棄也音邱舉反和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣宋祁曰監本浙本止云不犯矣南本云民之所服也不犯禁矣而賞罰順之則民從余謂不犯禁矣四字疑當删止作則民從故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應師古曰比和也音頻寐反今人主和徳於上百姓和合於下師古曰合謂與上合徳也故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五穀登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟徳配天地明並日月則麟鳯至龜龍在郊河出圖洛出書逺方之君莫不説義師古曰説讀曰悦奉幣而來朝此和之極也臣聞之仁者愛也義者宜也禮者所履也師古曰視履而行之智者術之原也致利除害兼愛無私謂之仁師古曰致謂引而至也明是非立可否謂之義進退有度尊卑有分謂之禮師古曰分音扶問反擅殺生之柄通壅塞之塗師古曰擅專也權輕重之數論得失之道使逺近情偽必見於上謂之術師古曰見顯也凡此四者治之本道之用也皆當設施不可廢也得其要則天下安樂宋祁曰南本云得其要道浙本云得其要術法設而不用師古曰下不犯法無所加刑也不得其術則主蔽於上官亂於下此事之情屬統垂業之本也臣聞堯遭鴻水使禹治之未聞禹之有水也若湯之旱則桀之餘烈也桀紂行惡受天之罰禹湯積徳以王天下因此觀之天徳無私親宋祁曰天徳浙本無徳字順之和起逆之害生此天文地理人事之紀臣𢎞愚戇不足以奉大對師古曰大對大問之對也時對者百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一召見容貌甚麗宋祁曰浙本云召入見拜為博士待詔金馬門如淳曰武帝時相馬者東門京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門𢎞復上疏曰陛下有先聖之位而無先聖之民有先聖之民而無先聖之吏是以勢同而治異先世之吏正故其民篤師古曰篤厚也今世之吏邪故其民薄政弊而不行令倦而不聼夫使邪吏行弊政用倦令治薄民民不可得而化此治之所以異也臣聞周公旦治天下期年而變三年而化五年而定唯陛下之所志師古曰言志所在也書奏天子以册書答曰宋祁曰答字下疑有焉字問𢎞稱周公之治𢎞之材能自視孰與周公賢師古曰與猶如也𢎞對曰愚臣淺薄安敢比材於周公雖然愚心曉然見治道之可以然也夫虎豹馬牛禽獸之不可制者也及其教馴服習之師古曰馴順也音巡至可牽持駕服唯人之從師古曰從人意臣聞揉曲木者不累日師古曰揉謂矯而正之也累積也揉音人九反宋祁曰累當作絫注文積累字上當有絫古累字四字銷金石者不累月夫人之於利害好惡豈比禽獸木石之類哉師古曰好音呼到反惡音一故反朞年而變臣𢎞尚竊遲之上異其言時方通西南夷巴蜀苦之詔使𢎞視焉還奏事盛毁西南夷無所用上不聽每朝㑹議開陳其端使人主自擇不肻面折庭爭於是上察其行慎厚辯論有餘習文法吏事緣飾以儒術師古曰緣飾者譬之於衣加純緣者上説之師古曰説讀曰悦一歲中至左内史𢎞奏事有所不可不肻庭辯師古曰不於朝廷顯辯論之宋祁曰庭當作廷後庭詰並同常與主爵都尉汲黯請間師古曰求空隙之暇黯先發之𢎞推其後上常説師古曰説讀曰悦所言皆聽以此日益親貴嘗與公卿約議師古曰約要也至上前皆背其約以順上指汲黯庭詰𢎞曰齊人多詐而無情始為與臣等建此議今皆背之不忠上問𢎞𢎞謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然𢎞言左右幸臣每毁𢎞上益厚遇之𢎞為人談笑多聞師古曰善於談笑而又多聞也談字或作詼音恢謂啁也善啁謔也常稱以為人主病不廣大人臣病不儉節飬後母孝謹後母卒服喪三年為内史數年遷御史大夫時又東置蒼海宋祁云一作滄北築朔方之郡𢎞數諫以為罷弊中國以奉無用之地願罷之於是上廼使朱買臣等難𢎞置朔方之便發十策𢎞不得一師古曰言其利害十條𢎞無以應之𢎞廼謝曰山東鄙人不知其便若是願罷西南夷蒼海專奉朔方上廼許之汲黯曰𢎞位在三公奉祿甚多師古曰奉音扶用反其下亦同然為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無過黯然今日庭詰𢎞誠中𢎞之病夫以三公為布被誠飾詐欲以釣名師古曰釣取也言若釣魚之謂也且臣聞管仲相齊有三歸師古曰三歸取三姓女也婦人謂嫁曰歸侈擬於君桓公以霸亦上僭於君師古曰擬疑也言相似也晏嬰相景公食不重肉妾不衣絲齊國亦治亦下比於民師古曰比方也一曰比近也音頻寐反今臣𢎞位為御史大夫為布被自九卿以下至於小吏無差誠如黯言且無黯陛下安聞此言上以為有讓愈益賢之元朔中代薛澤為丞相先是漢常以列侯為丞相唯𢎞無爵上於是下詔曰朕嘉先聖之道開廣門路宣招四方之士蓋古者任賢而序位量能以授官勞大者厥祿厚徳盛者獲爵尊故武功以顯重而文徳以行襃其以髙成之平津鄉戸六百五十封丞相𢎞為平津侯其後以為故事至丞相封自𢎞始也時上方興功業婁舉賢良師古曰婁古屢字𢎞自見為舉首起徒歩數年至宰相封侯於是起客館開東閤以延賢人師古曰閤者小門也東向開之避當庭門而引賔客以别於掾史官屬也與參謀議𢎞身食一肉脱粟飯師古曰才脱粟而已不精鑿也脱音他活反故人賔客仰衣食師古曰故人平生故交也仰音牛向反奉祿皆以給之家無所餘然其性意忌外寛内深師古曰意忌多所忌害也諸常與𢎞有隙宋祁曰南本常作嘗無近逺雖陽與善後竟報其過殺}
