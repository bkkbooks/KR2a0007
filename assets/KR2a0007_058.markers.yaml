  - {type: variant, offset: 3222, length: 960, content: 故虎嘯而風冽龍興而致雲蟋蟀俟秋唫蜉蝤出以陰易曰飛龍在天利見大人詩曰思皇多士生此王國故世平主聖俊艾將自至若堯舜禹湯文武之君獲稷契皋陶伊尹呂望明明在朝穆穆列布聚精會神相得益章雖伯牙操遞鍾逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而弘功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛過順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行化溢四表橫被無窮遐夷貢獻萬祥畢溱是以聖王不徧窺望而視已明不單頃耳而聽已聰恩從祥風翱德與和氣游太平之責塞優游之望得遵遊自然之勢恬淡無為之場休徵自至壽考無疆雍容垂拱永永萬年何必偃卬詘信若彭祖呴噓呼吸如僑松眇然絕俗離世哉詩云濟濟多士文王以寧蓋信乎其以寧也是時上頗好神僊故襃對及之上令襃與張子僑等並待詔數從襃等放獵所幸宮館輒為歌頌第其高下以差賜帛議者多以為淫靡不急上曰不有博弈者乎為之猶賢乎已辭賦大者與古詩同義小者辯麗可喜辟如女工有綺縠音樂有鄭衛今世俗猶皆以此虞說耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博弈遠矣頃之擢襃為諫大夫其後太子體不安苦忽忽善忘不樂詔使襃等皆之太子宮虞侍太子朝夕誦讀奇文及所自造作疾平復乃歸太子喜襃所為甘泉及洞簫頌令後宮貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀致也宣帝使襃往祀焉襃於道病死上閔惜之賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門初武帝征南越元封元年立儋耳珠厓郡皆在南方海中洲居廣袤可千里合十六縣戶二萬三千餘其民暴惡自以阻絕數犯吏禁吏亦酷之率數年壹反殺吏漢輒發兵擊定之自初為郡至昭帝始元元年二十餘年間凡六反叛至其五年罷儋耳郡并屬珠厓至宣帝神爵三年珠厓三縣復反反後七年甘露元年九縣反輒發兵擊定之元帝初元元年珠厓又反發兵擊之諸縣更叛連年不定上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠厓內屬為郡久矣今背畔逆節而云不當擊長蠻夷之亂虧先帝功德經義何以處之捐之對曰臣幸得遭明盛之朝蒙危言之策無忌諱之患敢昧死竭卷卷臣聞堯舜聖之盛也禹入聖域而不優故孔子稱堯曰大哉韶曰盡善禹曰無間以三聖之德地方不過數千里西被流沙東漸于海朔南暨聲教迄于四海欲與聲教則治之不欲與者不彊治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荊北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻此非兵革, WYG: ''}
