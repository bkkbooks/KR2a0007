  - {type: variant, offset: 219, length: 2, content: 是以, WYG: 齊相雅行躬耕臣瓚曰雅素也言卜式躬耕於野不要名利晉灼曰雅正也師古曰言其行雅正又躬耕也隨牧畜蕃輒分昆弟更造師古曰言其畜牧滋多則與昆弟而更自營為也番音扶元反不為利惑師古曰言不惑於利宋祁曰惑一作或注同日者北邊有興師古曰日者往日也興謂發軍上書助官往年西河歲惡率齊人入粟師古曰歲惡猶凶歲也禮記曰歲凶年穀不登今又首奮師古曰為首而奮厲願從軍也雖未戰可謂義形於内矣師古曰形見也其賜式爵關内侯黄金四十斤田十頃布告}
