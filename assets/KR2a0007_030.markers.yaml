  - {type: variant, offset: 10, length: 0, content: '', WYG: 篇右賦二十五家百三十六篇客主賦十八篇雜行出及頌徳賦二十四篇雜四夷及兵賦二十篇雜中賢失意賦十二篇雜思慕悲哀死賦十六篇雜鼓琴劒戲賦十三篇雜山陵水泡雲氣雨旱賦十六篇師古曰泡水上浮漚也泡音普交反漚音一侯反雜禽獸六畜昆蟲賦十八篇雜器械草木賦三十三篇大雜賦三十四篇成相雜辭十一篇隐書十八篇師古曰劉向别錄云隱書者疑其言以相問對者以慮思之可以無不論右雜賦十二家二百三十三篇髙祖歌詩二篇泰一雜甘泉壽宫歌詩十四篇宗廟歌詩五篇漢興以來兵所誅滅歌詩十四篇出行廵狩及游歌詩十篇臨江王及愁思節士歌詩四篇李夫人及幸貴人歌詩三篇詔賜中山靖王子噲及孺子妾冰未央材人歌詩四篇師古曰孺子王妾之有品號者也妾王之衆妾也冰其名材人天子内官吳楚汝南歌詩十五篇燕代謳鴈門雲中隴西歌詩九篇邯鄲河間歌詩四篇齊鄭歌詩四篇淮南歌詩四篇左馮翊秦歌詩三篇京兆尹秦歌詩五篇河東蒲反歌詩一篇黄門倡車忠等歌詩十五篇雜各有主名歌詩十篇雜歌詩九篇雒陽歌詩四篇河南周歌詩七篇河南周歌聲曲折七篇周謡歌詩七十五篇周謡歌詩聲曲折七十五篇諸神歌詩三篇送迎靈頌歌詩三篇周歌詩二篇南郡歌詩五篇右歌詩二十八家三百一十四篇凡詩賦百六家千三百一十八篇入揚雄八篇傳曰不歌而誦謂之賦登髙能賦可以為大夫言感物造耑材知深美師古曰耑古端字也因物動志則造辭義之端緒可與圖事故可以為列大夫也古者諸侯卿大夫交接鄰國以㣲言相感當揖讓之時必稱詩以諭其志蓋以别賢不肖而觀盛衰焉故孔子曰不學詩無以言也師古曰論語載孔子戒伯魚之辭也春秋之後周道􅎊壞師古曰􅎊漸也聘問歌詠不行於列國學詩之士逸在布衣而賢人失志之賦作矣大儒孫卿及楚臣屈原離讒憂國皆作賦以風師古曰離遭也風讀曰諷次下亦同咸有惻隐古詩之義其後宋玉唐勒漢興枚乗司馬相如下及揚子雲競為侈麗閎衍之詞沒其風諭之義是以揚子悔之曰詩人之賦麗以則辭人之賦麗以淫師古曰辭人言後代之為文辭如孔氏之門人用賦也則賈誼登堂相如入室矣如其不用何師古曰言孔氏之門既不用賦不可如何謂賈誼相如無所施也自孝武立樂府而采歌謡於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知薄厚云序詩賦為五種吳孫子兵法八十二篇圖九卷師古曰孫武也臣於闔閭齊孫子八十九篇圖四卷師古曰孫臏公孫鞅二十七篇吳起四十八篇有列傳范蠡二篇越王句踐臣也大夫種二篇與范蠡俱事句踐李子十篇娷一篇師古曰娷音女瑞反蓋說兵法者人名也兵春秋三篇龎煖三篇師古曰煖音許逮反又音許元反兒良一篇師古曰六國時人也兒音五奚反廣武君一篇李左車韓信三篇師古曰淮隂侯右兵權謀十三家二百五十九篇省伊尹太公管子孫卿子鶡冠子蘇子蒯通陸賈淮南王二百五十九種出司馬法入禮也劉奉世曰種當作重九下又脫一篇字注二百五十九恐合作五百二十一篇數已在前權謀者以正守國以竒用兵先計而後戰兼形勢包隂陽用技巧者也楚兵法七篇圖四卷蚩尤二篇見呂刑孫軫五篇圖二卷繇叙二篇王孫十六篇圖五卷尉繚三十一篇魏公子二十一篇圖十卷名無忌有列傳景子十三篇李良三篇丁子一篇項王一篇名籍右兵形勢十一家九十二篇圖十八卷形勢者靁動風舉後發而先至離合背鄉變化無常以輕疾制敵者也師古曰背音歩内反鄉讀曰嚮太壹兵法一篇天一兵法三十五篇神農兵法一篇黄帝十六篇圖三卷封胡五篇黄帝臣依託也風后十三篇圖二卷黄帝臣依託也力牧十五篇黄帝臣依託也鵊治子一篇圖一卷晉灼曰鵊音夾宋祁曰治一作冶鬼容區三篇圖一卷黄帝臣依託師古曰即鬼㬰區也地典六篇孟子一篇東父三十一篇師曠八篇晋平公臣萇宏十五篇周史别成子望軍氣六篇圖三卷辟兵威勝方七十篇右隂陽十六家二百四十九篇圖十卷隂陽者順時而發推刑徳隨斗擊因五勝假鬼神而為助者也師古曰五勝五行相勝也鮑子兵法十篇圖一卷伍子胥十篇圖一卷公勝子五篇苖子五篇圖一卷逢門射法二篇師古曰即逢蒙隂通成射法十一篇李將軍射法三篇師古曰李廣魏氏射法六篇彊弩將軍王圍射法五卷師古曰圍郁郅人也見趙充國傳望逺連弩射法具十五篇護軍射師王賀射書五篇蒲苴子弋法四篇師古曰苴音子余反劔道三十八篇手搏六篇雜家兵法五十七篇蹵􅨲二十五篇師古曰􅨲以韋為之實以物蹵蹋之以為戲也蹵􅨲陳力之事故附於兵法焉蹵音子六反􅨲音巨六反右兵技巧十三家百九十九篇省墨子重入蹵􅨲也技巧者習手足便器械積機關以立攻守之勝者也凡兵書五十三家七百九十篇圖四十三卷省十家二百七十一篇重入蹵􅨲一家二十五篇出司馬法百五十五篇入禮也劉奉世曰此註二百七十一又當作五百九十二两註篇數皆不足蓋訛謬也兵家者蓋出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵師古曰論語載孔子之言無兵與食不可以為國以不教民戰是謂棄之師古曰亦論語所載孔子之言非其不素習武備明兵之重也易曰古者弦木為弧剡木為矢弧矢之利以威天下師古曰下繫之辭也弧木弓也剡謂鋭而利之也音弋冉反其用上矣後世燿金為刃割革為甲師古曰燿讀與鑠同謂銷也器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出竒設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盜取之武帝時軍政楊僕劉奉世曰軍政當作正捃摭遺逸紀奏兵録師古曰捃摭謂拾取之捃音九問反摭音之石反猶未能備至于孝成命任宏論次兵書為四種泰壹雜子星二十八卷五殘雜變星二十一卷師古曰五殘星名也見天文志黄帝雜子氣三十三篇常從日月星氣二十一卷師古曰常從人姓名也老子師之皇公雜子星二十二卷淮南雜子星十九卷泰壹雜子雲雨三十四卷國章觀霓雲雨三十四卷泰階六符一卷李奇曰三台謂之泰階两两成體三台故六觀色以知吉凶故曰符宋祁曰淳化本六作陸金度玉衡漢五星客流出入八篇漢五星彗客行事占驗八卷漢日旁氣行事占驗三卷漢流星行事占驗八卷漢日旁氣行占驗十三卷漢日食月暈雜變行事占驗十三卷海中星占驗十二卷海中五星經雜事二十二卷海中五星順逆二十八卷海中二十八宿國分二十八卷海中二十八宿臣分二十八卷海中日月彗虹雜占十八卷圖書祕記十七篇右天文二十一家四百四十五卷天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎天文以察時變師古曰賁卦之彖辭也然星事􅓇悍非湛密者弗能由也師古曰􅓇讀與凶同湛讀曰沋由用也夫觀景以譴形非明王亦不能服聴也以不能由之臣諫不能聴之主此所以兩有患也黄帝五家歴三十三卷顓頊歴二十一卷顓頊五星歴十四卷日月宿歴十三卷夏殷周魯歴十四卷天歴大歴十八卷漢元殷周諜歴十七卷耿昌月行帛圖二百三十二卷耿昌月行度二巻傳周五星行度三十九卷律歴數法三卷自古五星宿紀三十卷太歲謀日晷二十九卷帝王諸侯世譜二十卷古來帝王年譜五卷日晷書三十四卷許商筭術二十六卷杜忠筭術十六卷右歴譜十八家六百六卷歴譜者序四時之位正分至之節會日月五星之辰以考寒暑殺生之實故聖王必正歴數以定三統服色之制又以探知五星日月之會凶阨之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至材其孰與焉師古曰與讀曰豫道之亂也患出於小人而强欲知天道者壞大以為小削逺以為近是以道術破碎而難知也泰一隂陽二十三卷黄帝隂陽二十五巻黄帝諸子論隂陽二十五巻諸王子論隂陽二十五卷太元隂陽二十六卷三典隂陽談論二十七卷神農大幽五行二十七卷四時五行經二十六卷猛子閭昭二十五巻陰陽五行時令十九巻堪輿金匱十四巻師古曰許慎云堪天道輿地道也務成子災異應十四巻十二典災異應十二巻鍾律災應二十六卷鍾律叢辰日苑二十二卷鍾律消息二十九卷黄鍾七巻天一六卷泰一二十九卷刑徳七卷風鼓六甲二十四巻風后孤虚二十卷六合隨典二十五卷轉位十二神二十五巻羡門式法二十卷羡門式二十卷文解六甲十八巻文解二十八宿二十八卷五音竒胲用兵二十三卷如淳曰音該師古曰許愼云胲軍中約也五音竒胲刑徳二十一卷五音定名十五卷右五行三十一家六百五十二卷五行者五常之形氣也書云初一曰五行次二曰羞用五事師古曰周書洪範之辭也言進用五事以順五行也貌言視聴思心失而五行之序亂五星之變作皆出於律歴之數而分為一者也師古曰說皆在五行志也其法亦起五徳終始推其極則無不至而小數家因此以為吉凶而行於世􅎊以相亂師古曰􅎊漸也龜書五十二巻夏龜二十六卷南龜書二十八卷巨龜三十六卷雜龜十六卷蓍書二十八卷周易三十八卷周易明堂二十六卷周易隨曲射匿五十卷大筮衍易二十八卷大次雜易三十卷䑕序卜黄二十五卷於陵欽易吉凶二十三卷任良易旗七十一卷易卦八具右蓍龜十五家四百一卷蓍龜者聖人之所用也書曰女則有大疑謀及卜筮師古曰周書洪範之辭也言所為之事有疑則以卜筮决之也龜曰卜蓍曰筮易曰定天下之吉凶成天下之亹亹者莫善於蓍龜是故君子將有為也將有行也問焉而以言其受命也如嚮無有逺近幽深遂知來物非天下之至精其孰能與於此師古曰皆上繋之辭也亹亹深致也言君子所為行皆以其言問於易受命如嚮者謂示以吉凶其應速疾如響之隨聲也遂猶究也來物謂當來之事也嚮與響同與讀曰豫及至衰世解於齊戒而婁煩卜筮師古曰解讀曰懈齊讀曰齋婁讀曰屢神明不應故筮瀆不告易以為忌師古曰易蒙卦之辭曰初筮告再三瀆瀆則不告言童蒙之來決疑初則以實而告至于再三為其煩瀆乃不告也龜厭不吿詩以為刺師古曰小雅小旻之詩曰我龜既厭不我告猶言卜問煩數媟嫚於龜龜靈厭之不告以道也黄帝長栁占夢十一卷甘徳長栁占夢二十卷武禁相衣器十四卷嚏耳鳴雜占十六卷師古曰嚏音丁計反禎祥變怪二十一卷人鬼精物六畜變怪二十一巻變怪誥咎十三卷執不祥劾鬼物八卷請官除訞祥十九卷師古曰訞字與妖同禳祀天文十八卷師古曰禳除災也音人羊反請禱致福十九卷請雨止雨二十六卷泰壹雜子候歲二十二卷子贛雜子候歲二十六卷五法積貯寶藏二十三卷神農敎田相土耕種十四卷昭明子釣種生魚鼈八卷種樹臧果相蠶十三卷右雜占十八家三百一十三卷雜占者紀百事之象候善惡之徵師古曰徴證也易曰占事知來師古曰下繫之辭也言有事而占則覩方來之驗也衆占非一而夢為大故周有其官師古曰謂大卜掌三夢之法又占夢中士二人皆宗伯之屬官而詩載熊羆虺蛇衆魚旐旟之夢著明大人之占以考吉凶師古曰小雅斯干之詩曰吉夢維何維熊維羆}
