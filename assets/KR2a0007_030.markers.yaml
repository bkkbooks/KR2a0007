  - {type: variant, offset: 11, length: 2, content: 呂后, WYG: 子之祥維虺維蛇女子之祥無羊之詩曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱言熊羆虺蛇皆為吉祥之夢而}
  - {type: variant, offset: 11, length: 2, content: 呂后, krp: 子之祥維虺維蛇女子之祥無羊之詩曰牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱言熊羆虺蛇皆為吉祥之夢而}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 男女及見衆魚則為豐年之應旐旟則為多盛之象大人占之謂以聖人占夢之法占之也􅀞龜蛇曰旐烏隼曰旟蓋參卜筮春秋之説訞也曰人之所忌其氣炎以取之訞由人興也人失常則訞興人無釁焉訞不自作師古曰申繻之辭也事見莊公十四年炎謂火之光始燄燄也言人之所忌其氣燄引致於災也釁瑕也失常謂反五常之徳也炎讀與燄同故曰徳勝不祥義厭不惠師古曰厭音伊葉反惠順也桑穀共生太戊以興雊雉登鼎武丁為宗師古曰說在郊祀五行志然惑者不稽諸躬而忌訞之見師古曰稽考也計也是以詩刺召彼故老訊之占夢師古曰小雅正月之詩也故老元老也訊問也言不能修徳以禳災但問元老以占夢之吉凶傷其舍本而憂末不能勝凶咎也山海經十三篇國朝七卷宮宅地形二十巻相人二十四卷相寶劒刀二十卷相六畜三十八卷右形法六家百二十二巻形法者大舉九州之埶以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶猶律有長短而各徵其聲非有鬼神數自然也然形與氣相首尾亦有有其形而無其氣有其氣而無其形此精㣲之獨異也凡數術百九十家二千五百二十八巻數術者皆明堂羲和史卜之職也史官之宋祁曰史官之字下舊本有術字廢久矣其書既不能具雖有其書而無其人易曰茍非其人道不虚行師古曰下繫之辭也言道由人行春秋時魯有梓慎鄭有禆竈晉有卜偃宋有子韋六國時楚有甘公魏有石申夫漢有唐都庶得麤觕師古曰觕粗略也音才戸反蓋有因而成易無因而成難故因舊書以序數術為六種黄帝内經十八卷外經三十七卷扁鵲内經九巻外經十二巻白氏内經三十八巻外經三十六巻旁篇二十五卷右醫經七家二百一十六巻醫經者原人血脉經落骨髓陰陽表裏以起百病之本死生之分而用度箴石湯火所施師古曰箴所以刺病也石謂砭石即石箴也古者攻病則有砭今其術絶矣箴音之林反砭音彼廉反調百藥齊和之所宜師古曰齊音才詣反其下並同和音呼臥反至齊之徳猶慈石取鐵以物相使拙者失理以瘉為劇以死為生師古曰瘉讀與愈同愈差也五藏六府痺十二病方三十卷師古曰痺風溼之病音必二反五藏六府疝十六病方四十卷師古曰疝心腹氣病音山諌反又音刪五藏六府癉十二病方四十巻師古曰癉黄病音丁韓反風寒熱十六病方二十六巻泰始黄帝扁鵲俞拊方二十三卷應劭曰黄帝時醫也師古曰拊音膚五藏傷中十一病方三十一卷客疾五藏狂顛病方十七卷金創瘲瘛方三十卷服虔曰音􅪴引之􅪴師古曰小兒病也瘛音充制反瘲音子用反婦人嬰兒方十九卷湯液經法三十二卷神農黄帝食禁七卷右經方十一家二百七十四巻經方者本草石之寒溫量疾病之淺深假藥味之滋因氣感之宜辯五苦六辛致水火之齊以通閉解結反之於平及失其宜者以熱益熱以寒增寒精氣内傷不見於外是所獨失也故諺曰有病不治常得中醫容成隂道二十六卷務成子隂道三十六卷堯舜隂道二十三卷湯盤庚隂道二十卷天老雜子隂道二十五卷天一隂道二十四巻黄帝三王飬陽方二十卷三家内房有子方十七巻右房中八家百八十六卷房中者情性之極至道之際是以聖王制外樂以禁内情而為之節文傳曰先王之作樂所以節百事也樂而有節則和平壽考及迷者弗顧以生疾而隕性命宓戲雜子道二十篇上聖雜子道二十六卷道要雜子十八巻黄帝雜子步引十二卷黄帝岐伯按摩十卷黄帝雜子芝菌十八卷師古曰服餌芝菌之法也菌音求閔反黄帝雜子十九家方二十一卷泰壹雜子十五家方二十二卷神農雜子技道二十三卷泰壹雜子黄冶三十一巻師古曰黄冶釋在郊祀志右神􅋖十家二百五巻神􅋖者所以保性命之真而游求於其外者也聊以盪意平心同死生之域師古曰盪滌一曰盪放也而無怵􅅥於胷中然而或者專以為務則誕欺怪迂之文彌以益多師古曰誕大言也迂逺也非聖王之所以教也孔子曰索隐行怪後世有述焉吾不為之矣師古曰禮記載孔子之言索隱求索隠暗之事而行怪迂之道妄令後人有所祖述非我夲志臣佖曰志序神僊者内云孔子曰索隱行怪顔師古註云禮記載孔子之言索隱求索隱暗之事臣佖案禮記中庸篇有云子曰素隱行怪後世有述焉吾弗為之矣鄭元註云索讀如攻城攻其所傃之傃傃猶鄉也言方鄉避害隱身而行佹譎以作後世名也弗為之矣耻之也今志作索隱師古從而解之文注即與禮記不同意義亦不相逺故索字不更刋正作素字凡方技三十六家八百六十八卷方技者皆生生之具王官之一守也大古有岐伯俞拊中世有扁鵲秦和師古曰和秦醫名也蓋論病以及國原診以知政師古曰診視驗謂視其脉及色候也診音軫又音丈刃反漢興有倉公今其技術晻昧師古曰晻與暗同故論其書以序方技為四種大凡書六略三十八種五百九十六家萬三千二百六十九卷入三家五十篇省兵十家前漢書卷三十前漢書巻三十考證藝文志大收篇籍廣開獻書之路臣召南按此二句既叙在}
