  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_030-bkkpn1}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 韋昭曰謂左氏公羊榖梁鄒氏夾氏也詩分為四韋昭曰謂毛氏齊魯韓易有數家之傳戰國從衡真偽分爭師古曰從音子容反諸子之言紛然殽亂師古曰殽雜也至秦患之乃燔滅文章以愚黔首師古曰燔燒也秦謂人為黔首言其頭黒也燔音扶元反黔音其炎反又音琴漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脱禮壞樂崩師古曰編絶散落故簡脱脱音吐活反聖上喟然而稱曰師古曰喟歎息之貌也音丘位反朕甚閔焉於是建臧書之䇿如淳曰劉歆七略曰外則冇太常太史博士之藏内則有延閣廣内祕室之府置寫書之官下及諸子傳説皆充祕府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術師古曰占卜之書侍醫李柱國校方技師古曰醫藥之書也每一書已師古曰已畢也向輙條其篇目撮其指意録而奏之師古曰撮縂取也音千括反會向卒哀帝復使向子侍中奉車都尉歆卒父業師古曰卒終也歆於是總羣書而奏其七畧故有輯畧師古曰輯與集同謂諸書之總要有六蓺畧師古曰六蓺六經也有諸子畧有詩賦畧有兵書畧有術數畧有方技畧今刪其要以備篇籍師古曰刪去浮冗取其指要也其每畧所條家及篇數有與總凡不同者傳寫脱誤年代乆逺無以詳知易經十二篇施孟梁丘三家師古曰上下經及十翼故十二篇易傳周氏二篇字}
  - {type: page-break, offset: 2, content: '', id: KR2a0007_WYG_030-1b, image: WYG0249/WYG0249-0700d.png}
  - {type: page-break, offset: 2, content: '', id: KR2a0007_WYG_030-2a, image: WYG0249/WYG0249-0701a.png}
