  - {type: variant, offset: 6, length: 1, content: 高, krp: 卦以通神明之徳以類萬物之情師古曰下繫之辭也鳥獸之文謂其跡在地者宓讀與伏同至于殷周之際紂在上位逆天暴物文王以諸侯順命而行道天人之占可得而効於是重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬十篇故曰易道深矣人更三聖韋昭曰伏羲文王孔子師古曰更經也音工衡反世歴三古孟康曰易繫辭曰易之興其於中古乎然則伏羲為上古文王為中古孔子為下古及秦燔書而易為筮卜之事傳者不絶漢興田何傳之訖于宣元有施孟梁丘京氏列於學官而民間有費髙二家之説師古曰費音扶味反劉向以中古文易經校施孟梁丘經師古曰中者天子之書也言中以别於外耳或脱去無咎悔亡唯費氏經與古文同尚書古文經四十六卷為五十七篇師古曰孔安國書序云凡五十九篇為四十六卷承詔作傳引序各冠其篇首定五十八篇鄭元敘贊云後又亡其一篇故五十七經二十九卷大小夏侯二家歐陽經三十二卷師古曰此二十九巻伏生傳授者傳四十一篇歐陽章句三十一巻大小夏侯章句各二十九卷大小夏侯解故二十九篇歐陽説義二篇劉向五行傳記十一巻許商五行傳記一篇周書七十一篇周史記師古曰劉向云周時誥誓號令也盖孔子所論百篇之餘也今之存者四十五篇矣議奏四十二篇宣帝時石渠論韋昭曰間名也於此論書凡書九家四百一十二篇入劉向稽疑一篇師古曰此凡言入者謂七略之外班氏新入之也其云出者與此同易曰河出圖雒出書聖人則之師古曰上繋之辭也故書之所起遠矣至孔子篹焉孟康曰篹音撰上斷於堯下訖于秦凡百篇而為之序言其作意秦燔書禁學濟南伏生獨壁臧之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立於學官古文尚書者出孔子壁中師古曰家語云孔騰字子襄畏秦法峻急藏尚書孝經論語於夫子舊堂壁中而漢記尹敏傳云孔鮒所藏二説不同未知孰是武帝末魯共王壞孔子宅欲以廣其宫而得古文尚書及禮記論語孝經凡數十篇皆古字也共王往入其宅聞鼔琴瑟鐘磬之音於是懼乃止不壞孔安國者孔子後也悉得其書以考二十九篇得多十六篇師古曰壁中書多以考見行世二十九篇之外更得十六篇安國獻之遭巫蠱事未列于學官劉向以中古文校歐陽大小夏侯三家經文酒誥脱簡一召誥脱簡二師古曰召讀曰卲率簡二十五字者脱亦二十五字簡二十二字者脱亦二十二字文字異者七百有餘脱字數十書者古之號令號令於衆其言不立具則聽受施行者弗曉古文讀應爾雅故解古今語而可知也詩經二十八卷魯齊韓三家應劭曰申公作魯詩后蒼作齊詩韓嬰作韓詩魯故二十五卷師古曰故者通其指義也它皆類此今流俗毛詩改故訓傳為詁字失真耳魯説二十八巻齊后氏故二十巻齊孫氏故二十七卷齊后氏傳三十九巻齊孫氏傳二十八巻齊雜記十八巻韓故三十六卷韓内傳四巻韓外傳六巻韓説四十一巻毛詩二十九巻毛詩故訓傳三十卷凡詩六家四百一十六巻書曰詩言志歌詠言師古曰虞書舜典之辭也在心為志𤼵言為詩詠者永也永長也歌所以長言之故哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌故古有采詩之官王者所以觀風俗知得失自考正也孔子純取周詩上采殷下取魯宋祁曰景本取作采凡三百五篇遭秦而全者以其諷誦不獨在竹帛故也漢興魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜説咸非其本義與不得已魯最為近之師古曰與不得已者言皆不得也三家皆不得其真而魯最近之三家皆列於學官又有毛公之學自謂子夏所傳而河間獻王好之未得立禮古經五十六巻經七十篇后氏戴氏劉敞曰此七十與後七十皆當作十七計其篇數則然記百三十一篇七十子後學者所記也明堂隂陽三十三篇古明堂之遺事王史氏二十一篇七十子後學者師古曰劉向别録云六國時人也曲臺后倉九篇如淳曰行禮射於曲臺后倉為記故名曰曲臺記漢官曰大射于曲臺晉灼曰天子射宮也西京無太學於此行禮也宋祁曰景本曲臺下有至字中庸説二篇師古曰今禮記有中庸一篇亦非本禮經盖此之流明堂隂陽説五篇周官經六篇王莽時劉歆置博士師古曰即今之周官禮也亡其冬官以考工記充之周官傳四篇軍禮司馬法百五十五篇古封禪羣祀二十二篇封禪議對十九篇武帝時也漢封禪羣祀三十六篇議奏三十八篇石渠凡禮十三家五百五十五篇八司馬法一家百五十五篇易曰有夫婦父子君臣上下禮義有所錯師古曰序卦之辭也錯置也音千故反而帝王質文世有損益至周曲為之防事為之制師古曰委曲防閑每事為制也故曰禮經三百威儀三千韋昭曰周禮三百六十官也三百舉成數也臣瓚曰禮經三百謂冠婚吉凶周禮三百是官名也師古曰禮經三百韋説是也威儀三千乃謂冠婚吉凶蓋儀禮是也及周之衰諸侯将踰法度惡其害已皆滅去其籍自孔子時而不具至秦大壞漢興魯髙堂生傳士禮十七篇訖孝宣世后倉最明戴徳戴聖慶普皆其弟子三家立於學官禮古經者出於魯淹中蘇林曰里名也劉敞曰讀當云禮古經者出於魯淹中及孔氏孔氏則安國所得壁中書也及孔氏學七十篇文相似多三十九篇劉敞曰學七十篇當作與十七篇文相似五十六卷除十七正多三十九也及明堂隂陽王史氏記所見多天子諸侯卿大夫之制雖不能備猶瘉倉等推士禮而致於天子之説師古曰瘉與愈同愈勝也樂記二十三篇王禹記二十四篇雅歌詩四篇雅琴趙氏七篇名定勃海人宣帝時丞相魏相所奏雅琴師氏八篇名中東海人傳言師曠後雅琴龍氏九十九篇名徳梁人師古曰劉向别録云亦魏相所奏也與趙定俱召見待詔後拜為侍郎凡樂六家百六十五篇出淮南劉向等琴頌七篇易曰先王作樂崇徳殷薦之上帝以享祖考師古曰豫卦象辭也殷盛也故自黄帝下至三代樂各有名孔子曰安上治民莫善於禮移風易俗莫善於樂師古曰孝經載孔子之言二者相與並行周衰俱壞樂尤㣲眇以音律為節師古曰眇細也言其道精㣲節在音律不可具於書眇亦讀曰妙又為鄭衛所亂故無遺法漢興制氏以雅樂聲律世在樂官頗能紀其鏗鏘鼔舞而不能言其義師古曰鏗音初耕反六國之君魏文侯最為好古孝文時得其樂人竇公師古曰桓譚新論云竇公年百八十歲兩目皆盲文帝竒之問曰何因至此對曰臣年十三失明父母哀其不及衆技教鼓琴臣導引無所服餌獻其書乃周官大宗伯之大司樂章也武帝時河間獻王好儒與毛生等共采周官及諸子言樂事者以作樂記獻八佾之舞與制氏不相逺其内史丞王定傳之以授常山王禹禹成帝時為謁者數言其義師古曰數音所角反獻二十四巻記劉向校書得樂記二十三篇與禹不同其道􅎊以益㣲師古曰􅎊漸也春秋古經十二篇經十一巻公羊穀梁二家左氏傳三十巻左丘明魯太史公羊傳十一巻公羊子齊人師古曰名髙穀梁傳十一巻榖梁子魯人師古曰名喜鄒氏傳十一巻夾氏傳十一巻有録無書師古曰夾音頰左氏㣲二篇師古曰㣲謂釋其㣲指鐸氏㣲三篇楚太傅鐸椒也張氏㣲十篇虞氏㣲傳二篇趙相虞卿公羊外傳五十篇穀梁外傳二十篇公羊章句三十八篇穀梁章句三十三篇公羊雜記八十三篇公羊顔氏記十一篇公羊董仲舒治獄十六篇議奏三十九篇石渠論國語二十一篇左丘明著新國語五十四篇劉向分國語世本十五篇古史官記黄帝以來訖春秋時諸侯大夫戰國策三十三篇記春秋後奏事二十篇秦時大臣奏事及刻石名山文也楚漢春秋九篇陸賈所記太史公百三十篇十篇有録無書馮商所續太史公七篇韋昭曰馮商受詔續太史公十餘篇在班彪别録商字子髙師古曰七畧云商陽陵人治易事五鹿充宗後事劉向能屬文後與孟栁俱待詔頗序列傳未卒病死太古以來年紀二篇漢著記百九十卷師古曰若今之起居注漢大年紀五篇凡春秋二十三家九百四十八篇省太史公四篇古之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事事為春秋言為尚書帝王靡不同之周室既㣲載籍殘缺仲尼思存前聖之業乃稱曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也文獻不足故也足則吾能徵之矣師古曰論語載孔子之言也徴成也獻賢也孔子自謂能言夏殷之禮而杞宋之君文章賢材不足以成之故我不得成此禮也以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道師古曰仍亦因也因興以立功敗以成罸假日月以定歴數藉朝聘以正禮樂有所襃諱貶損不可書見口授弟子弟子退而異言師古曰謂人執所見各不同也丘明恐弟子各安其意以失其真故論本事而作傳明夫子不以空言説經也春秋所貶損大人當世君臣有威權勢力其事實皆形於傳是以隐其書而不宣所以免時難也及末世口説流行故有公羊穀梁鄒夾之傳四家之中公羊穀梁立於學官鄒氏無師夾氏未有書論語古二十一篇出孔子壁中兩子張如淳曰分堯曰篇後子張問何如可以從政已下為篇名曰從政齊二十二篇多問王知道如淳曰問王知道皆篇名也魯二十篇傳十九篇師古曰觧釋論語意者齊説二十九篇魯夏侯説二十一篇魯安昌侯説二十一篇師古曰張禹也魯王駿説二十篇師古曰王吉子燕傳説三卷議奏十八篇石渠論孔子家語二十七巻師古曰非今所有家語孔子三朝七篇師古曰今大戴禮有其一篇盖孔子對魯哀公語也三朝見公故曰三朝孔子徒人圖法二巻凡論語十二家二百二十九篇論語者孔子應答弟子時人及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子既卒門人相與輯而論篹故謂之論語師古曰輯與集同篹與撰同漢興有齊魯之説傳齊論者昌邑中尉王吉少府宋畸師古曰畸音居宜反御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家師古曰王吉字子陽故謂之王陽傳魯論語者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前将軍蕭望之安昌侯張禹皆名家張氏最後而行於世孝經古孔氏一篇二十二章師古曰劉向云古文字也庶人章分為二也曾子敢問章為三又多一章凡二十二章孝經一篇十八章長孫氏江氏后氏翼氏四家長孫氏説二篇江氏説一篇翼氏説一篇后氏説一篇雜傳四篇安昌侯說一篇五經雜議十八篇石渠論爾雅三巻二十篇張晏曰爾近也雅正也小雅一篇宋祁曰小字下卲本冇爾字古今字一卷弟子職一篇應劭曰管仲所作在管子書說三篇凡孝經十一家五十九篇孝經者孔子為曾子陳孝道也夫孝天之經地之義民之行也舉大者言故曰孝經漢興長孫氏博士江翁少府后倉諌大夫翼奉安昌侯張禹傳之各自名家經文皆同唯孔氏壁中古文為異父母生之續莫大焉故親生之膝下諸家説不安處古文字讀皆異臣瓚曰孝經云續莫大焉而諸家之説各不安處之也師古曰桓譚新論云古孝經千八百七十二字今異者四百餘字史籀十五篇周宣王太史作大篆十五篇建武時亡六篇矣師古曰籀音胄八體六技韋昭曰八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署七曰殳書八曰𨽻書宋祁曰注文署下當有書字蒼頡一篇上七章秦丞相李斯作爰歴六章車府令趙髙作博學七章太史令胡母敬作凡將一篇司馬相如作急就一篇元帝時黄門令史游作元尚一篇成帝時将作大匠李長作訓纂一篇揚雄作别字十三篇蒼頡傳一篇揚雄蒼頡訓纂一篇杜林蒼頡訓纂一篇杜林蒼頡故一篇凡小學十家四十五篇入揚雄杜林二家三篇易曰上古結繩以治後世聖人易之以書契百官以治萬民以察蓋取諸夬師古曰下繋之辭夬揚于王庭師古曰夬卦之辭言其宣揚於王者朝廷其用最大也古者八歲入小學故周官保氏掌飬國子教之六書師古曰保氏地官之屬也保安也謂象形象事象意象聲轉注假借造字之本也師古曰象形謂畫成其物隨體詰屈日月是也象事即指事也謂視而可識察而見意上下是也象意即會意也謂比類合誼以見指撝武信是也象聲即形聲謂以事為名取譬相成江河是也轉注謂建類一首同意相受考老是也假借謂本無其字依聲託事令長是也文字之義總歸六書故曰立字之本焉漢興蕭何草律師古曰草創造之亦著其法曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史韋昭曰若今尚書蘭臺令史也臣瓚曰史書今之太史書劉奉世曰史與書令史二名今冇書令史吏民上書字或不正輙舉劾六體者古文竒字篆書𨽻書繆篆蟲書師古曰古文謂孔子壁中書竒字即古文而異者也篆書謂小篆盖秦始皇使程邈所作也𨽻書亦程邈所獻主於徒𨽻從簡易也繆篆謂其文屈曲纏繞所以摹印章也蟲書謂為蟲鳥之形所以書幡信也皆所以通知古今文字摹印章書幡信也古制書必同文不知則闕問諸故老至於衰世是非無正人用其私師古曰各任私意而為字故孔子曰吾猶及史之闕文也今亡矣夫師古曰論語載孔子之言謂文字冇疑則當闕而不説孔子自言我初渉學尚見闕文今則皆無任意改作也蓋傷其􅎊不正師古曰􅎊漸也史籀篇者周時史官教學童書也與孔氏壁中古文異體蒼頡七章者秦丞相李斯所作也爰歴六章者車府令趙髙所作也博學七章者太史令胡母敬所作也文字多取史籕篇而篆體復頗異所謂秦篆者也是時始建𨽻書矣宋祁曰建當作造起於官獄多事茍趨省易師古曰趨讀曰趣謂趣向之也易音弋䜴反施之於徒𨽻也漢興閭里書師合蒼頡爰歴博學三篇斷六十字以為一章凡五十五章并為蒼頡篇師古曰并合也總合以為蒼頡篇也武帝時司馬相如作凡將篇無復字師古曰復重也音扶目反後皆類此元帝時黄門令史游作急就篇成帝時將作大匠李長元尚篇皆蒼頡中正字也宋祁曰李長下當冇作字凡將則頗有出矣至元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂篇順續蒼頡又易蒼頡中重復之字凡八十九章臣復續揚雄作十三章韋昭曰臣班固自謂也作十三章後人不别疑在蒼頡下篇三十四章中凡一百三章無復字六蓺羣書所載畧備矣蒼頡多古字俗師失其讀宣帝時徴齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故并列焉凡六蓺一百三家三千一百二十三篇入三家一百五十九篇出重十一篇六蓺之文樂以和神仁之表也詩以正言義之用也禮以明體明者著見故無訓也書以廣聽知之術也春秋以斷事信之符也五者蓋五常之道相須而備而易為之原故曰易不可見則乾坤或幾乎息矣蘇林曰不能見易意則乾坤近於滅息也師古曰此上繫之辭也幾近也音鉅依反言與天地為終始也至於五學世有變改猶五行之更用事焉師古曰更互也音工衡反古之學者耕且飬三年而通一蓺存其大體玩經文而已是故用日少而畜徳多師古曰畜讀曰蓄蓄聚也易大畜卦象辭曰君子以多識前言往行以畜其徳三十而五經立也後世經傳既已乖離博學者又不思多聞闕疑之義師古曰論語稱孔子曰多聞闕疑慎言其餘則寡尤言為學之道務在多聞疑則闕之慎於言語則少過也故志引之而務碎義逃難便辭巧説破壞形體師古曰茍為僻碎之義以避佗人之攻難者故為便辭巧説以析破文字之形體也説五字之文至於二三萬言師古曰言其煩妄也桓譚新論云秦近君能説堯典篇目兩字之説至十餘萬言但説曰若稽古三萬言後進彌以馳逐故幼童而守一蓺白首而後能言安其所習毁所不見師古曰己所常習則保安之未嘗所見者則妄毁誹終以自蔽此學者之大患也序六蓺為九種晏子八篇名嬰諡平仲相齊景公孔子稱善與人交有列傳師古曰有列傳者謂太史公書子思二十三篇名伋孔子孫為魯繆公師曾子十八篇名參孔子弟子漆雕子十三篇孔子弟子漆雕啓後宓子十六篇名不齊字子賤孔子弟子師古曰宓讀與伏同景子三篇説宓子語似其弟子世子二十一篇名碩陳人也七十子之弟子魏文侯六篇李克七篇子夏弟子為魏文侯相公孫尼子二十八篇七十子之弟子孟子十一篇名軻鄒人子思弟子有列傳師古曰聖證論云軻字子車而此志無字未詳其所得孫卿子三十三篇名况趙人為齊稷下祭酒有列傳師古曰本曰荀卿避宣帝諱故曰孫芊子十八篇名嬰齊人七十子之後師古曰芊音弭内業十五篇不知作書者周史六弢六篇惠襄之間或曰顯王時或曰孔子問焉師古曰即今之六韜也蓋言取天下及軍旅之事弢字與韜同也周政六篇周時法度政教周法九篇法天地立百官河間周制十八篇似河間獻王所述也讕言十篇不知作者陳人君法度如淳曰讕音粲爛師古曰説者引孔子家語云孔穿所造非也功議四篇不知作者論功徳事寗越一篇中牟人為周威王師王孫子一篇一曰巧心公孫固一篇十八章齊閔王失國問之固因為陳古今成敗也李氏春秋二篇羊子四篇百章故秦博士董子一篇名無心難墨子俟子一篇李竒曰或作侔子徐子四十二篇宋外黄人魯仲連子十四篇有列傳平原老七篇朱建也宋祁曰老一作君虞氏春秋十五篇虞卿也髙祖傳十三篇髙祖與大臣述古語及詔策也陸賈二十三篇劉敬三篇孝文傳十一篇文帝所稱及詔策賈山八篇太常蓼侯孔臧十篇父聚髙祖時以功臣封臧嗣爵賈誼五十八篇河間獻王對上下三雍宫三篇董仲舒百二十三篇兒寛九篇公孫宏十篇終軍八篇吾丘壽王六篇虞丘説一篇難孫卿也莊助四篇臣彭四篇鉤盾兄從李步昌八篇宣帝時數言事宋祁曰兄當作冗儒家言十八篇不知作者桓寛鹽鐵論六十篇師古曰寛字次公汝南人也孝昭帝時丞相御史與諸賢良文學論鹽鐵事寛撰次之劉向所序六十七篇新序説苑世説列女傳頌圖也揚雄所序三十八篇太𤣥十九法言十三樂四箴二右儒五十三家八百三十六篇入揚雄一家三十八篇儒家者流蓋出於司徒之官助人君順隂陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言師古曰祖始也述修也憲法也章明也宗尊也言以堯舜為本始而遵修之以文王武王為明法又師尊仲尼之道於道最為髙孔子曰如有所譽其有所試師古曰論語載孔子之言也言於人有所稱譽者輒試以事取其實效也譽音弋於反唐虞之隆殷周之盛仲尼之業已試之效者也然惑者既失精㣲而辟者又隨時抑揚違離道本師古曰辟讀曰僻茍以譁衆取寵師古曰譁諠也寵尊也譁音呼華反後進循之是以五經乖析儒學􅎊衰此辟儒之患師古曰􅎊漸也辟讀曰僻伊尹五十一篇湯相太公二百三十七篇吕望為周師尚父本有道者或有近世又以為太公術者所増加也師古曰父讀曰甫也謀八十一篇言七十一篇兵八十五篇辛甲二十九篇紂臣七十五諌而去周封之鬻子二十二篇名熊為周師自文王以下問焉周封為楚祖師古曰鬻音弋六反筦子八十六篇名夷吾相齊桓公九合諸侯不以兵車也有列傳師古曰筦讀與管同老子鄰氏經傳四篇姓李名耳鄰氏傳其學老子𫝊氏經説三十七篇述老子學老子徐氏經説六篇字少季臨淮人傳老子劉向説老子四篇文子九篇老子弟子與孔子並時而稱周平王問似依託者也蜎子十三篇名淵楚人老子弟子師古曰蜎姓也音一元反關尹子九篇名喜為關吏老子過關喜去吏而從之莊子五十二篇名周宋人列子八篇名圄寇先莊子莊子稱之老成子十八篇長盧子九篇楚人王狄子一篇公子牟四篇魏之公子也先莊子莊子稱之田子二十五篇名駢齊人游稷下號天口駢師古曰駢音歩田反老萊子十六篇楚人與孔子同時黔婁子四篇齊隱士守道不詘威王下之師古曰黔音其炎反下音胡稼反宮孫子二篇師古曰宫孫姓也不知名鶡冠子一篇楚人居深山以鶡為冠師古曰以鶡鳥羽為冠周訓十四篇師古曰劉向别錄云人間小書其言俗薄黄帝四經四篇黄帝銘六篇黄帝君臣十篇起六國時與老子相似也雜黄帝五十八篇六國時賢者所作力牧二十二篇六國時所作託之力牧力牧黄帝相孫子十六篇六國時㨗子二篇齊人武帝時說曹羽二篇楚人武帝時說於齊王郎中嬰齊十二篇武帝時師古曰劉向云故待詔不知其姓數從游觀名能為文臣君子二篇蜀人鄭長者一篇六國時先韓子韓子稱之師古曰别錄云鄭人不知姓名楚子三篇道家言二篇近世不知作者右道三十七家九百九十三篇道家者流蓋出於史官歴記成敗存亡禍福古今之道然後知秉要執本清虚以自守卑弱以自持此君人南面之術也合於堯之克攘師古曰虞書堯典稱堯之德曰允恭克讓言其信恭能讓也故志引之云攘古讓字易之嗛嗛一謙而四益此其所長也師古曰四益謂天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙也此謙卦彖辭嗛字與謙同劉奉世曰嗛若與謙同何為作两字蓋易文辭有云嗛嗛者及放者為之則欲絶去禮學兼棄仁義師古曰放蕩也曰獨任清虚可以為治宋司星子韋三篇景公之史公檮生終始十四篇傳鄒奭始終書師古曰檮音疇其字從木公孫發二十二篇六國時鄒子四十九篇名衍齊人為燕昭王師居稷下號談天衍鄒子終始五十六篇師古曰亦鄒衍所說乗丘子五篇六國時杜文公五篇六國時師古曰劉向别錄云韓人也黄帝泰素二十篇六國時韓諸公子所作師古曰劉向别錄云或言韓諸公孫之所作也言隂陽五行以為黄帝之道也故曰泰素南公三十一篇六國時容成子十四篇張蒼十六篇丞相北平侯鄒奭子十二篇齊人號曰雕龍奭師古曰奭音試亦反閭丘子十三篇名快魏人在南公前馮促十三篇鄭人將鉅子五篇六國時先南公南公稱之五曹官制五篇漢制似賈誼所條周伯十一篇齊人六國時衞侯官十二篇近世不知作者于長天下忠臣九篇平隂人近世師古曰劉向别錄云傳天下忠臣公孫渾邪十五篇平曲侯雜隂陽三十八篇不知作者右隂陽二十一家三百六十九篇隂陽家者流蓋出於羲和之官敬順昊天歴象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數師古曰泥滯也音乃計反舍人事而任鬼神師古曰舎廢也李子三十二篇名悝相魏文侯富國彊兵商君二十九篇名鞅姬姓衛後也相秦孝公有列傳申子六篇名不害京人相韓昭侯終其身諸侯不敢侵韓師古曰京河南京縣處子九篇師古曰史記云趙有處子慎子四十二篇名到先申韓申韓稱之韓子五十五篇名非韓諸公子使秦李斯害而殺之游棣子一篇師古曰棣音徒計反鼂錯三十一篇燕十事十篇不知作者法家言二篇不知作者右法十家二百一十七篇法家者流蓋出於理官信賞必罸以輔禮制易曰先王以明罸飭法師古曰噬嗑之象辭也飭整也讀與敕同此其所長也及刻者為之則無教化去仁愛專任刑法而欲以致治至於殘害至親傷恩薄厚師古曰薄厚者變厚為薄鄧析二篇鄭人與子産並時師古曰列子及孫卿並云子産殺鄧析據左傳昭公二十年子産卒定公九年駟歂殺鄧析而用其竹刑則非子産所殺也尹文子一篇說齊宣王先公孫龍師古曰劉向云與宋鈃俱游稷下鈃音形公孫龍子十四篇趙人師古曰卽為堅白之辯者成公生五篇與黃公等同時師古曰姓成公劉向云與李斯子由同時由為三川守成公生游談不仕惠子一篇名施與莊子並時黄公四篇名疵為秦博士作歌詩在秦時歌詩中師古曰疵音才斯反毛公九篇趙人與公孫龍等並游平原君趙勝家師古曰劉向别錄云論堅白同異以為可以治天下此葢史記所云藏於博徒者右名七家三十六篇名家者流蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎名不正則言不順言不順則事不成師古曰論語載孔子之言也言欲為政必先正其名此其所長也及譥者為之晋灼曰譥訐也師古曰譥音工釣反則茍鉤鈲析亂而已師古曰鈲破也音普革反又音普狄反尹佚二篇周臣在成康時也田俅子三篇先韓子蘇林曰俅音仇我子一篇師古曰劉向别錄云為墨子之學隨巢子六篇墨翟弟子胡非子三篇墨翟弟子墨子七十一篇名翟為宋大夫在孔子後右墨六家八十六篇墨家者流蓋出於清廟之守茅屋采椽是以貴儉師古曰采柞木也字作棌本從木以茅覆屋以棌為椽言其質素也采音千在反飬三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼如淳曰右鬼謂信鬼神若杜伯射宣王是親鬼而右之師古曰右猶尊尚也順四時而行是以非命蘇林曰非有命者言儒者執有命而反勸人修德積善政敎與行相反故譏之也如淳曰言無吉凶之命但有賢不肖善惡以孝視天下是以上同如淳曰言皆同可以治也師古曰墨子有節用兼愛上賢明鬼神非命上同等諸篇故志歴序其本意也視讀曰示此其所長也及蔽者為之見儉之利因以非禮推兼愛之意而不知别親疏蘇子三十一篇名秦有列傳張子十篇名儀有列傳龎煖二篇為燕將師古曰煖音許遠反闕子一篇國筮子十七篇秦零陵令信一篇難秦相李斯蒯子五篇名通鄒陽七篇主父偃二十八篇徐樂一篇莊安一篇待詔金馬聊蒼三篇趙人武帝時師古曰嚴助傳作膠蒼而此志作聊志傳不同未知孰是右從横十二家百七篇從横家者流蓋出於行人之官孔子曰誦詩三百使於四方不能顓對雖多亦奚以為師古曰論語載孔子之言也謂人不達於事誦詩雖多亦無所用又曰使乎使乎師古曰亦論語載孔子之言歎使者之難其人言其當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信師古曰諼詐言也音許逺反孔甲盤盂二十六篇黄帝之史或曰夏帝孔甲似皆非大􆂎三十七篇傳言禹所作其文似後世語師古曰􆂎古禹字宋祁曰一作􅀢伍子胥八篇名員春秋時為吳將忠直遇讒死子晩子三十五篇齊人好議兵與司馬法相似由余三篇戎人秦穆公聘以為大夫尉繚二十九篇六國時師古曰尉姓繚名也音了又音聊劉向别錄云繚為商君學尸子二十篇名佼魯人秦相商君師之鞅死佼逃入蜀師古曰佼音絞呂氏春秋二十六篇秦相呂不韋輯智畧士作淮南内二十一篇王安淮南外三十三篇師古曰内篇論道外篇雜說宋祁曰雜邵夲作新東方朔二十篇伯象先生一篇應劭曰蓋隱者也故公孫敖難以無益世主之治荆軻論五篇軻為燕刺秦王不成而死司馬相如等論之吳子一篇公孫尼一篇博士臣賢對一篇漢世難韓子商君臣說三篇武帝時作賦師古曰說者其人名讀曰悅解子簿書三十五篇推雜書八十七篇雜家言一篇王伯不知作者師古曰言伯王之道伯讀曰霸右雜二十家四百三篇入兵法雜家者流蓋出於議官兼儒墨合名法知國體之有此師古曰治國之體亦當有此雜家之說見王治之無不貫師古曰王者之治於百家之道無不貫綜此其所長也及盪者為之則漫羡而無所歸心師古曰漫放也羡音弋戰反神農二十篇六國時諸子疾時怠於農業道耕農事託之神農師古曰劉向别録云疑李悝及商君所說野老十七篇六國時在齊楚間應劭曰年老居田野相民耕種故號野老宰氏十七篇不知何世董安國十六篇漢代内史不知何帝時尹都尉十四篇不知何世宋祁曰尹一作郡趙氏五篇不知何世汜勝之十八篇成帝時為議郎師古曰劉向别錄云使敎田三輔有好田者師之徙為御史汜音凡又音敷劔反王氏六篇不知何世蔡癸一篇宣帝時以言便宜至𢎞農太守師古曰劉向别錄云邯鄲人右農九家百一十四篇農家者流蓋出於農稷之官播百穀勸耕桑以足衣食故八政一曰食二曰貨孔子曰所重民食師古曰論語載孔子稱殷湯伐桀告天辭也言為君之道所重者在人之食此其所長也及鄙者為之以為無所事聖王師古曰言不須聖王天下自治欲使君臣並耕誖上下之序師古曰誖亂也音布内反伊尹說二十七篇其語淺薄似依託也鬻子說十九篇後世所加周考七十六篇考周事也青史子五十七篇古史官記事也師曠六篇見春秋其言淺薄本與此同似因託也務成子十一篇稱堯問非古語宋子十八篇孫卿道宋子其言黄老意天乙三篇天乙謂湯其言非殷時皆依託也黄帝說四十篇迂誕依託封禪方説十八篇武帝時待詔臣饒心術二十五篇武帝時師古曰劉向别錄云饒齊人也不知其姓武帝時待詔作書名曰心術待詔臣安成未央術一篇應劭曰道家也好養生事為未央之術臣壽周紀七篇項國圉人宣帝時虞初周說九百四十三篇河南人武帝時以方士侍郎號黄車使者應劭曰其說以周書為本師古曰史記云虞初洛陽人即張衡西京賦小說九百本自虞初者也百家百三十九巻右小説十五家千三百八十篇劉奉世曰又少十篇小說家者流蓋出於稗官如淳曰稗音鍜家排九章細米為稗街談巷說其細碎之言也王者欲知閭巷風俗故立稗官使稱說之今世亦謂偶語為稗師古曰稗音稊稗之稗不與鍜排同也稗官小官漢名臣奏唐林請省置吏公卿大夫至都官稗官各減什三是也街談巷語道聴塗説者之所造也孔子曰雖小道必有可觀者焉致遠恐泥是以君子弗為也師古曰論語載孔子之言泥滯也音乃細反然亦弗滅也閭里小知者之所及亦使綴而不忘如或一言可采此亦芻蕘狂夫之議也凡諸子百八十九家四千三百二十四篇出蹵􅨲一家二十五篇諸子十家其可觀者九家而已皆起於王道既㣲諸侯力政時君世主好惡殊方師古曰好音呼到反惡音一故反是以九家之術蠭出並作師古曰蠭與鋒同各引一端崇其所善以此馳説取合諸侯其言雖殊辟猶水火相滅亦相生也師古曰辟讀曰譬仁之與義敬之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮師古曰下繫之辭今異家者各推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔師古曰裔衣末也其於六經如水之下流衣之末裔使其人遭明王聖主得其所折中皆股肱之材已師古曰已語終之辭仲尼有言禮失而求諸野師古曰言都邑失禮則於外野求之亦將有獲方今去聖乆逺道術缺廢無所更索師古曰索求也彼九家者不猶瘉於野乎師古曰瘉與愈同愈勝也若能修六蓺之術而觀此九家之言舍短取長則可以通萬方之畧矣師古曰舎廢也屈原賦二十五篇楚懐王大夫有列傳唐勒賦四篇楚人宋玉賦十六篇楚人與唐勒並時在屈原後也趙幽王賦一篇莊夫子賦二十四篇名忌呉人賈誼賦七篇枚乗賦九篇司馬相如賦二十九篇淮南王賦八十二篇淮南王羣臣賦四十四篇太常蓼侯孔臧賦二十篇陽丘侯劉隁賦十九篇師古曰隁音偃吾丘壽王賦十五篇蔡甲賦一篇上所自造賦二篇師古曰武帝也兒寛賦二篇光禄大夫張子僑賦三篇與王襃同時也陽成侯劉徳賦九篇劉向賦三十三篇王襃賦十六篇右賦二十家三百六十一篇陸賈賦三篇枚臯賦百二十篇朱建賦二篇常侍郎莊怱竒賦十一篇枚臯同時師古曰七畧云怱奇者或言荘夫子子或言族家子荘助昆弟也從行至茂陵詔造賦嚴助賦三十五篇師古曰上言荘怱奇下言嚴助史駮文朱買臣賦三篇宗正劉辟彊賦八篇司馬遷賦八篇郎中臣嬰齊賦十篇臣説賦九篇師古曰說名音悦臣吾賦十八篇遼東太守蘇季賦一篇蕭望之賦四篇河内太守徐明賦三篇字長君東海人元成世歴五郡太守有能名給事黄門侍郎李息賦九篇淮陽憲王賦二篇揚雄賦十二篇待詔馮商賦九篇博士弟子杜參賦二篇師古曰劉向别錄云臣向謹與長社尉杜參校中祕書劉歆又云參杜陵人以陽朔元年病死死時年二十餘車郎張豐賦三篇張子僑子驃騎將軍朱宇賦三篇師古曰劉向别錄云驃騎将軍史朱宇志以宇在驃騎府故總言驃騎将軍劉奉世曰其實惟脫一史字耳右賦二十一家二百七十四篇入揚雄八篇孫卿賦十篇秦時雜賦九篇李思孝景}
