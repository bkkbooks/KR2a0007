  - {type: variant, offset: 17, length: 1, content: 曹, WYG: 時除挾書之令文帝使鼂錯受尚書使博士作王制又置論語孝經爾雅孟子博士即其事也以備篇籍注傳冩脫誤傳監本訛轉今從舊本改正古五子十八篇自甲子至壬子說易隂陽臣召南按易有先甲後甲先庚後庚已曰之文然古人說易未有以甲子配卦爻者至漢始有律歴志曰日有六甲辰有六子注云六甲之中惟甲寅無子然則後世占易以六辰定六爻亦不自京房始也於是重易六爻作上下篇王應麟蓺文志考曰重卦之人有四說王輔嗣等以為伏羲鄭康成以為神農孫盛以為夏禹史遷以為文王楊繪曰筮必六十四然後可為舜禹之際曰龜筮協從則何文王重卦之有乎八卦成列象在其中矣因而重之爻在其中矣据此而言重卦之始其在上古乎京房引}
