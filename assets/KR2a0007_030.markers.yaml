  - {type: variant, offset: 2438, length: 1438, content: 三年薨子頃王延嗣二十六年薨子敬王義嗣九年薨子惠王武嗣十一年薨子荒王順嗣四十六年薨子戴王恢嗣八年薨子孝王景嗣二十四年薨子哀王雲嗣一年薨無子國絕成帝復立雲兄俚為城陽王王莽時絕濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公俱入清宮遂將少帝出迎皇帝入宮始誅諸呂時朱虛侯章功尤大大臣許盡以趙地王章盡以梁地王興居及文帝立聞朱虛東牟之初欲立齊王故黜其功二年王諸子乃割齊二郡以王章興居章興居意自以失職奪功歲餘章薨而匈奴大入邊漢多發兵丞相灌嬰將擊之文帝親幸太原興居以為天子自擊胡遂發兵反上聞之罷兵歸長安使棘蒲侯柴將軍擊破虜濟北王王自殺國除文帝憫濟北王逆亂以自滅明年盡封悼惠王諸子罷軍等七人為列侯至十五年齊文王又薨無子時悼惠王後尚有城陽王在文帝憐悼惠王適嗣之絕於是乃分齊為六國盡立前所封悼惠王子列侯見在者六人為王齊孝王將閭以楊虛侯立濟北王志以安都侯立菑川王賢以武成侯立膠東王雄渠以白石侯立膠西王卬以平昌侯立濟南王辟光以扐侯立孝文十六年六王同日俱立立十一年孝景三年吳楚反膠東膠西菑川濟南王皆發兵應吳楚欲與齊齊孝王狐疑城守不聽三國兵共圍齊齊王使路中大夫告於天子天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢已破矣齊趣下三國不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急陰與三國通謀約未定會路中大夫從漢來其大臣乃復勸王無下三國會漢將欒布平陽侯等兵至齊擊破三國兵解圍已後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺而膠東膠西濟南菑川王皆伏誅國除獨濟北王在齊孝王之自殺也景帝聞之以為齊首善以迫劫有謀非其罪也召立孝王太子壽是為懿王二十三年薨子厲王次昌嗣其母曰紀太后太后取其弟紀氏女為王后王不愛紀太后欲其家重寵令其長女紀翁主入王宮正其後宮無令得近王欲令愛紀氏女王因與其姊翁主姦齊有宦者徐甲入事漢皇太后皇太后有愛女曰脩成君脩成君非劉氏子太后憐之脩成君有女娥太后欲嫁之於諸侯宦者甲乃請使齊必令王上書請娥皇太后大喜使甲之齊時主父偃知甲之使齊以取后事亦因謂甲即事成幸言偃女願得充王後宮甲至齊風以此事紀太后怒曰王有后後宮備具且甲齊貧人及為宦者入事漢初無補益乃欲亂吾王家且主父偃何為者乃欲以女充後宮甲大窮還報皇太后曰王已願尚娥然事有所害恐如燕王燕王者與其子昆弟姦坐死故以燕感太后太后曰毋復言嫁女齊事事濅淫聞於上主父偃由此與齊有隙偃方幸用事因言齊臨菑十萬戶市租千金人眾殷富鉅於長安非天子親弟愛子不得王此今齊王於親屬益疏乃從容言呂太后時齊欲反及吳楚時孝王幾為亂今聞齊王與其姊亂於是武帝拜偃為齊相且正其事偃至齊急治王後宮宦者為王通於姊翁主所者辭及王王年少懼以罪為吏所執誅乃飲藥自殺是時趙王懼主父偃壹出敗齊恐其漸疏骨肉乃上書言偃受金及輕重之短天子亦因囚偃公孫弘曰齊王以憂死無後非誅偃無以塞天下之望偃遂坐誅厲王立五年國除濟北王志吳楚反時初亦與通謀後堅守不發兵故得不誅徒王菑川元朔中齊國絕悼惠王後唯有二國城陽菑川菑川地比齊武帝為悼惠王冢園在齊乃割臨菑東圜悼惠王冢園邑盡以予菑川令奉祭祀志立三十五年薨是為懿王子靖王建嗣二十年薨子頃王遺嗣三十五年薨子思王終古嗣五鳳中青州刺史奏終古使所愛奴與八子及諸御婢姦終古或參與被席或白晝使裸伏犬馬交接終古親臨觀產子輒曰亂不可知使去其子事下丞相御史奏終古位諸侯王以令置八子秩比六百石所以廣嗣重祖也而終古禽獸行亂君臣夫婦之別悖逆人倫請逮捕有詔削四縣二十八年薨子, WYG: ''}
