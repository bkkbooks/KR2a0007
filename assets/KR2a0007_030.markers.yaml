  - {type: variant, offset: 17, length: 1, content: 曹, krp: 時除挾書之令文帝使鼂錯受尚書使博士作王制又置論語孝經爾雅孟子博士即其事也以備篇籍注傳冩脫誤傳監本訛轉今從舊本改正古五子十八篇自甲子至壬子說易隂陽臣召南按易有先甲後甲先庚後庚已曰之文然古人說易未有以甲子配卦爻者至漢始有律歴志曰日有六甲辰有六子注云六甲之中惟甲寅無子然則後世占易以六辰定六爻亦不自京房始也於是重易六爻作上下篇王應麟蓺文志考曰重卦之人有四說王輔嗣等以為伏羲鄭康成以為神農孫盛以為夏禹史遷以為文王楊繪曰筮必六十四然後可為舜禹之際曰龜筮協從則何文王重卦之有乎八卦成列象在其中矣因而重之爻在其中矣据此而言重卦之始其在上古乎京房引}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 子曰神農重乎八純臣召南按王氏紏漢志之失是也但易大傳明曰因而重之即伏羲重為六十四耳王弼之說最當經二十九卷注伏生傳授者王應麟曰伏生口傳二十八篇後得㤗􅊎一篇也臣召南按㤗誓即偽㤗誓凡漢}
  - {type: variant, offset: 19, length: 0, content: '', krp: 子曰神農重乎八純臣召南按王氏紏漢志之失是也但易大傳明曰因而重之即伏羲重為六十四耳王弼之說最當經二十九卷注伏生傳授者王應麟曰伏生口傳二十八篇後得㤗誓一篇也臣召南按㤗誓即偽㤗誓凡漢}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 所引赤烏白魚等語皆是也故併伏}
  - {type: variant, offset: 20, length: 0, content: '', krp: 所引赤烏白魚等語皆是也故併伏}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 所傳為二十九卷詩經二十八卷魯齊韓三家注應劭曰申公作魯詩后蒼作齊詩韓嬰作韓詩臣召南按應說非是后蒼傳齊詩者非其始也齊詩始於轅固雅歌詩四篇王應麟曰晋志杜䕫傳舊雅樂四曲一曰鹿鳴二曰騶虞三曰伐檀四曰文王皆古聲辭此四篇豈即四曲歟魏文侯最為好古孝文時得其樂人竇公注桓譚新論云竇公年百八十嵗云云臣召南按竇公事見正史必得其實但桓譚言百八十嵗則可疑也魏文侯在位三十八年而卒時為周安王十五年自安王十五年計至秦二世三年即已一百八十一年矣又加髙祖十二年惠帝七年髙后八年而孝文始即帝位則是二百零八年也竇公在魏文侯時已為樂工則其年必非甚㓜至見文帝又未必即在元年則其夀蓋二百三四十嵗矣謂之百八十歲可乎急就一篇隋志作急就章一卷揚雄取其有用者以作訓纂揚此卷並訛楊今改正孫卿子三十三篇王應麟曰當作三十二篇後進循之宋本作修之按文應作循之今從監本筦子八十六篇臣召南按志於道家列太公二百三十七篇謀八十一篇言七十一篇兵八十五篇理不可觧然其書後世失傳或不專言兵法未可知也至管子則其書具在志亦列於道家何耶隋志改列於法家之首是也鄒奭子十二篇齊人號曰雕龍奭雕監本訛彫從宋本改韓子五十五篇名非韓諸公子使秦使監本訛吏從汲古閣本改正伍子胥八篇伍監本訛五今改正天乙三篇天乙謂湯其言非殷時非監本訛者今改正陽邱侯劉隁賦十九篇臣召南按王子侯表陽邱應作楊邱隁應作偃}
