  - {type: variant, offset: 1647, length: 90, content: 大王高皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻呂國之濟南於是齊王遺諸侯王, WYG: 從宋本改正前漢}
