  - {type: variant, offset: 3, length: 0, content: '', WYG: 孫也服氏二篇師古曰劉向别録云服氏齊人號服光楊氏二篇名何字叔元菑川人蔡公二篇衛人事周王孫韓氏二篇名嬰王氏二篇名同丁氏八篇名寛字子襄梁人也古五子十八篇自甲子至壬子説易隂陽淮南道訓二篇淮南王安聘明易者九人號九師説古雜八十篇雜災異三十五篇神輸五篇圖一師古曰劉向别録云神輸者王道失則災害生得則四海輸之祥瑞孟氏京房十一篇災異孟氏京房六十六篇五鹿充宗畧説三篇京氏段嘉十二篇蘇氏曰東海人為博士晉灼曰儒林不見師古曰蘇説是也嘉即京房所從受易者也見儒林}
  - {type: page-break, offset: 3, content: '', id: KR2a0007_WYG_030-3a, image: WYG0249/WYG0249-0701c.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 孫也服氏二篇師古曰劉向别録云服氏齊人號服光楊氏二篇名何字叔元菑川人蔡公二篇衛人事周王孫韓氏二篇名嬰王氏二篇名同丁氏八篇名寛字子襄梁人也古五子十八篇自甲子至壬子説易隂陽淮南道訓二篇淮南王安聘明易者九人號九師説古雜八十篇雜災異三十五篇神輸五篇圖一師古曰劉向别録云神輸者王道失則災害生得則四海輸之祥瑞孟氏京房十一篇災異孟氏京房六十六篇五鹿充宗畧説三篇京氏段嘉十二篇蘇氏曰東海人為博士晉灼曰儒林不見師古曰蘇説是也嘉即京房所從受易者也見儒林}
  - {type: variant, offset: 4, length: 1, content: 第, WYG: 及劉向别録章句施孟梁丘氏各二篇凡易十三家二百九十四篇易曰宓戲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作}
  - {type: page-break, offset: 4, content: '', id: KR2a0007_WYG_030-3b, image: WYG0249/WYG0249-0701d.png}
