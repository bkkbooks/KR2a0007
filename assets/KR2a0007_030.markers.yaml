  - {type: variant, offset: 0, length: 1, content: 高, WYG: 欽定四庫全書前漢書卷三十漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顔師古注藝文志第十昔仲尼沒而㣲言絶李竒曰隐㣲不顯之言也師古曰精㣲要妙之言耳七十子喪而大義乖師古曰七十子謂弟子達者七十二人舉其成數故言七十故春秋分為}
