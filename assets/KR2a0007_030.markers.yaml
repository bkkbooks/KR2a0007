  - {type: variant, offset: 168, length: 1473, content: 因不敢飲陽醉去問知其鴆乃憂自以為不得脫長安內史士曰太后獨有帝與魯元公主今王有七十餘城而公主乃食數城王誠以一郡上太后為公主湯沐邑太后必喜王無患矣於是齊王獻城陽郡以尊公主為王太后呂太后喜而許之乃置酒齊邸樂飲遣王歸國後十三年薨子襄嗣趙隱王如意九年立四年高祖崩呂太后徵王到長安鴆殺之無子絕趙幽王友十一年立為淮陽王趙隱王如意死孝惠元年徙友王趙凡立十四年友以諸呂女為后不愛愛它姬諸呂女怒去讒之於太后曰王曰呂氏安得王太后百歲後吾必擊之太后怒以故召趙王趙王至置邸不見令衛圍守之不得食其群臣或竊饋之輒捕論之趙王餓乃歌曰諸呂用事兮劉氏微迫脅王侯兮彊授我妃我妃既妒兮誣我以惡讒女亂國兮上曾不寤我無忠臣兮何故棄國自快中野兮蒼天與直于嗟不可悔兮寧早自賊為王餓死兮誰者憐之呂氏絕理兮託天報仇遂幽死以民禮葬之長安高后崩孝文即位立幽王子遂為趙王二年有司請立皇子為王上曰趙幽王幽死朕甚憐之已立其長子遂為趙王遂弟辟彊及齊悼惠王子朱虛侯章東牟侯興居有功皆可王於是取趙之河間立辟彊是為河間文王文王立十三年薨子哀王福嗣一年薨無子國除趙王遂立二十六年孝景時鼂錯以過削趙常山郡諸侯怨吳楚反遂與合謀起兵其相建德內史王悍諫不聽遂燒殺德悍發兵住其西界欲待吳楚俱進北使匈奴與連和漢使曲周侯酈寄擊之趙王城守邯鄲相距七月吳楚敗匈奴聞之亦不肯入邊欒布自破齊還并兵引水灌趙城城壞王遂自殺國除景帝憐趙相內史守正死皆封其子為列侯趙共王恢十一年梁王彭越誅立恢為梁王十六年趙幽王死呂后徙恢王趙恢心不樂太后以呂產女為趙王后王后從官皆諸呂也內擅權微司趙王王不得自恣王有愛姬王后鴆殺之王乃為歌詩四章令樂人歌之王悲思六月自殺太后聞之以為用婦人故自殺無思奉宗廟禮廢其嗣燕靈王建十一年燕王盧綰亡入匈奴明年立建為燕王十五年薨有美人子太后使人殺之絕後齊悼惠王子前後凡九人為王太子襄為齊哀王次子章為城陽景王興居為濟北王將閭為齊王志為濟北王辟光為濟南王賢為菑川王卬為膠西王雄渠為膠東王齊哀王襄孝惠六年嗣立明年惠帝崩呂太后稱制元年以其兄子鄜侯呂台為呂王割齊之濟南郡為呂王奉邑明年哀王弟章入宿衛於漢高后封為朱虛侯以呂祿女妻之後四年封章弟興居為東牟侯皆宿衛長安高后七年割齊琅邪郡立營陵侯劉澤為琅邪王是歲趙王友幽死于邸三趙王既廢高后立諸呂為三王擅權用事章年二十有氣力忿劉氏不得職嘗入侍燕飲高后令章為酒吏章自請曰臣將種也請得以軍法行酒高后曰可酒酣章進歌舞已而曰請為太后言耕田高后兒子畜之笑曰顧乃父知田耳若生而為王子安知田乎章曰臣知之太后曰試為我言田意章曰深耕穊種立苗欲疏非其種者鉏而去之太后默然頃之諸呂有一人醉亡酒章追拔劍斬之而還報曰有亡酒一人臣謹行軍法斬之太后左右大驚業已許其軍法亡以罪也因罷酒自是後諸呂憚章雖大臣皆依朱虛侯劉氏為彊其明年高后崩趙王呂祿為上將軍呂王產為相國皆居長安中聚兵以威大臣欲為亂章以呂祿女為婦知其謀乃使人陰出告其兄齊王欲令發兵西朱虛侯東牟侯欲從中與大臣為內應以誅諸呂因立齊王為帝齊王聞此計與其舅駟鈞郎中令祝午中尉魏勃陰謀發兵齊相召平聞之乃發兵入衛王宮魏勃紿平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衛衛王召平信之乃使魏勃將勃既將以兵圍相府召平曰嗟乎道家之言當斷不斷反受其亂遂自殺於是齊王以駟鈞為相魏勃為將軍祝午為內史悉發國中兵使祝午紿琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也習戰事齊王不敢離兵使臣請大王幸之臨菑見齊王計事并將齊兵以西平關中之亂琅邪王信之以為然乃馳見齊王齊王與魏勃等因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王劉澤既欺不得反國乃說齊王曰齊悼惠王高皇帝長, WYG: ''}
