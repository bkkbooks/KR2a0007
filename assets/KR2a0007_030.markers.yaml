  - {type: variant, offset: 1738, length: 698, content: 曰高帝平定天下王諸子弟悼惠王薨惠帝使留侯張良立臣為齊王惠帝崩高后用事春秋高聽諸呂擅廢帝更立又殺三趙王滅梁趙燕以王諸呂分齊國為四忠臣進諫上或亂不聽今高后崩皇帝春秋富未能治天下固待大臣諸侯今諸呂又擅自尊官聚兵嚴威劫列侯忠臣撟制以令天下宗廟以危寡人帥兵入誅不當為王者漢聞之相國呂產等遣大將軍潁陰侯灌嬰將兵擊之嬰至滎陽乃謀曰諸呂舉兵關中欲危劉氏而自立今我破齊還報是益呂氏資也乃留兵屯滎陽使人諭齊王及諸侯與連和以待呂氏之變而共誅之齊王聞之乃屯兵西界待約呂祿呂產欲作亂朱虛侯章與太尉勃丞相平等誅之章首先斬呂產太尉勃等乃盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也訪以呂氏故幾亂天下今又立齊王是欲復為呂氏也代王母家薄氏君子長者且代王高帝子於今見在最為長以子則順以善人則大臣安於是大臣乃謀迎代王而遣章以誅呂氏事告齊王令罷兵灌嬰在滎陽聞魏勃本教齊王反既誅呂氏罷齊兵使使召責問魏勃勃曰失火之家豈暇先言丈人後救火乎因退立股戰而栗恐不能言者終無他語灌將軍孰視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷勃勃父以善鼓琴見秦皇帝及勃少時欲求見齊相曹參家貧無以自通乃常獨早埽齊相舍人門外舍人怪之以為物而司之得勃勃曰願見相君無因故為子埽欲以求見於是舍人見勃曹參因以為舍人壹為參御言事以為賢言之悼惠王王召見拜為內史始悼惠王得自置二千石及悼惠王薨哀王嗣勃用事重於相齊王既罷兵歸而代王立是為孝文帝文帝元年盡以高后時所割齊之城陽琅邪濟南郡復予齊而徙琅邪王王燕益封朱虛侯東牟侯各二千戶黃金千斤是歲齊哀王薨子文王則嗣十四年薨無子國除城陽景王章孝文二年以朱虛侯與東牟侯興居俱立二年薨子共王喜嗣孝文十二年徙王淮南五年復還王城陽凡立, WYG: 卷}
