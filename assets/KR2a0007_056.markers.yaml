  - {type: variant, offset: 3994, length: 0, content: '', WYG: 夷也康居西域國也説讀曰悦此太平之致也然而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣宋祁曰浙本尊作遵行其所知則光大矣髙眀光大不在於它在乎加之意而已師古曰曾子之書也曾子曾參願陛下因用所聞設誠於内而致行之則三王何異哉陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟徃古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也師古曰厲謂勸勉之也一曰砥礪其行也夫不素養士而欲求賢譬猶不瑑玉而求文采也宋祁曰景祐本瑑作琢當從此本故養士之大者莫大虖太學太學者賢士之所闗也師古曰闗由也教化之本原也今以一郡一國之衆對亡應書者師古曰書謂舉賢良文學之詔書也是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也宋祁曰古本流作㳅故師帥不賢則主徳不宣恩澤不流今吏既亡敎訓於下或不承用主上之法暴虐百姓與姦為市師古曰言小吏有為姦欺者守令不舉乃反與之交易求利也貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未㴉皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也師古曰訾與資同且古所謂功者以任官稱職為差師古曰差次也非所謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐師古曰害猶妨也是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積久以致官是以廉恥質亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也師古曰授之以官以使其材也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄徳而定位師古曰錄謂存視也則廉恥殊路賢不肖異處矣陛下加惠寛臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復冊之宋祁曰浙本之字下有曰字二曰雖相重史體則然制曰盖聞善言天者必有徴於人師古曰徴證也善言古者必有驗於今故朕埀問虖天人之應上嘉唐虞下悼桀紂􅎊㣲􅎊滅􅎊明􅎊昌之道師古曰􅎊古浸字􅎊漸也虛心以改今子大夫明於隂陽所以造化習於先聖之道業宋祁曰所以予按古本無以字語徑易了浙本道作遺文典可從作道傳寫誤耳然而文采未極豈惑虖當世之務哉條貫靡竟統紀未終意朕之不明與聼若眩與師古曰眩惑也音郡縣之縣與皆讀曰歟夫三王之敎所祖不同而皆有失師古曰祖始也或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之師古曰悉盡也究竟也復反復重言之也復音扶目反詩不云虖嗟爾君子母常安息神之聽之介爾景福師古曰小雅小明之詩也安息安處也介助也景大也言人君不當茍自安處而已若能靖㳟其位直道而行則神聼而知之助以大福也朕將親覽焉子大夫其茂明之師古曰茂勉也仲舒復對曰臣聞論語曰有始有卒者其唯聖人虖師古曰論語載子夏之言卒終也言終始如一者惟聖能之宋祁曰景祐本注子夏作孔子今陛下幸加惠留聼於承學之臣師古曰言轉承師説而學之盖謙辭也復下明冊以切其意而究盡聖徳非愚臣之所能具也前所上對條貫靡竟統紀不終辭不别白指不分明此臣淺陋之罪也冊曰善言天者必有徴於人善言古者必有驗於今臣聞天者羣物之祖也故徧覆包函而無所殊師古曰函與含同殊異也建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而亡私師古曰溥徧也音普布徳施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之師古曰繇讀與由同下皆類此天人之徴古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者脩敎訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不脩亡以化民民以故棄行誼而死財利是以犯法而罪多宋祁曰犯法古本浙本並作法犯予謂法犯罪多語中輕重自偶易之非是一嵗之獄以萬千數以此見古之不可不用也師古曰古謂古法也故春秋變古則譏之天令之謂命命非聖人不行質樸之謂性性非敎化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明敎化民以成性也正法度之宜别上下之序以防欲也脩此三者而大本舉矣人受命於天固超然異於羣生入有父子兄弟之親出有君臣上下之誼㑹聚相遇則有耆老長㓜之施師古曰施設也陳設其序粲然有文以相接師古曰粲明貌驩然有恩以相愛此人之所以貴也生}
