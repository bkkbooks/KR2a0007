  - {type: variant, offset: 5101, length: 641, content: 賀曰城門與郭門等耳且至未央宮東闕遂曰昌邑帳在是闕外馳道北未至帳所有南北行道馬足未至數步大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與群臣議白孝昭皇后廢賀歸故國賜湯沐邑二千戶故王家財物皆與賀及哀王女四人各賜湯沐邑千戶語在霍光傳國除為山陽郡初賀在國時數有怪嘗見白犬高三尺無頭其頸以下似人而冠方山冠後見熊左右皆莫見又大鳥飛集宮中王知惡之輒以問郎中令遂遂為言其故語在五行志王卬天歎曰不祥何為數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不說夫國之存亡豈在臣言哉願王內自揆度大王誦詩三百五篇人事浹王道備王之所行中詩一篇何等也大王位為諸侯王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂叫然號曰宮空不久祅祥數至血者陰憂象也宜畏慎自省賀終不改節居無何徵既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢也以問遂遂曰陛下之詩不云乎營營青蠅至于藩愷悌君子毋信讒言陛下左側讒人眾多如是青蠅惡矣宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有凶咎願詭禍為福皆放逐之臣當先逐矣賀不用其言卒至於廢大將軍光更尊立武帝曾孫是為孝宣帝即位心內忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盜賊察往來過客毋下所賜書敝於是條奏賀居處著其廢亡之效曰臣敞地節三年五月視事故昌邑王居故宮奴婢在中者百八十三人閉大門開小門廉吏一人為領錢物市買朝內食物它不得出入督盜一人別主徼循察往來者以王家錢取卒迾宮清中備盜賊臣敞數遣丞吏行察四年九月中臣敞入視居處狀故王年二十六七, WYG: 災異仲舒}
