  - {type: variant, offset: 4000, length: 1, content: 輕, WYG: 為貴師古曰孝經載孔子之言也性生也明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善師古曰處於善道以為安安處善然後樂循理師古曰循順也樂循理然後謂之君子故孔子曰不知命亡以為君子師古曰論語載孔子之言也此之謂也冊曰上嘉唐虞下悼桀紂􅎊㣲􅎊滅􅎊明􅎊昌之道虛}
