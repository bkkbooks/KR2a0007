  - {type: variant, offset: 4085, length: 158, content: 嗣昭帝初立益封胥萬三千戶元鳳中入朝復益萬戶賜錢二千萬黃金二千斤安車駟馬寶劍及宣帝即位封胥四子聖曾寶昌皆為列侯又立胥小子弘為高密王所以襃賞甚厚始昭帝時胥見上年少無子有覬欲心而楚地巫鬼胥迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢使禱巫山會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛, WYG: 繼大亂}
