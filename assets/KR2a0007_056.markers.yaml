  - {type: variant, offset: 3993, length: 0, content: '', WYG: 詩也為政而宜於民者固當受祿于天夫仁誼禮知信五常之道王者所當脩飭也宋祁曰越本飭作飾下亦同五者脩飭故受天之祐而享鬼神之靈徳施于方外延及羣生也天子覽其對而異焉乃復冊之曰宋祁曰景徳本冊作䇿制曰盖聞虞舜之時游於巖廊之上文頴曰巖廊殿下小屋也晉灼曰堂邊廡巖廊謂嚴峻之廊也師古曰晉説是也宋祁曰古本浙本廊並作郎余按廊本作郎後人加广而俗人作郎則驚而不喜更改為廊吁可惜耶垂拱無為而天下太平周文王至於日昃不暇食師古曰昃亦昊字而宇内亦治夫帝王之道豈不同條共貫與師古曰與讀曰歟何逸勞之殊也盖儉者不造𤣥黄旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興師古曰兩觀謂闕也大路玉路之車也干盾也戚鉞也朱丹其盾玉為戚把也佾列也舞者之行列也一列八人天子八列六十四人也夫帝王之道豈異指哉師古曰言意趣不同或曰良玉不瑑師古曰瑑謂彫刻為文也音篆下皆類此又云非文亡以輔徳二端異焉殷人執五刑以督姦傷肌膚以懲惡師古曰督視責也懲止也成康不式四十餘年師古曰式用也成康之時刑措不用天下不犯囹圄空虛秦國用之死者甚衆刑者相望耗矣哀哉師古曰耗虗也言用刑酷烈誅殺甚衆天下空虛也耗音呼到反或曰耗不明也言刑罰闇亂音莫報反烏虖師古曰虖讀曰呼朕夙寤晨興師古曰夙早也寤寐之覺也興起也覺音工孝反惟前帝王之憲師古曰憲法也永思所以奉至尊章洪業師古曰永深也章明也洪大也皆在力本任賢師古曰力本謂勤力行於本業也本謂農也今朕親耕藉田以為農先勸孝弟崇有徳使者冠盖相望問勤勞恤孤獨盡思極神功烈休徳未始云獲也今隂陽錯繆氛氣充塞師古曰氛惡氣也充滿也羣生寡遂黎民未濟師古曰遂成也宋祁曰濟古作㴉下同廉恥貿亂賢不肖渾殽師古曰貿易也渾殽雜也貿音武又反渾音胡本反未得其真故詳延特起之士意庶㡬乎師古曰詳盡也一曰審也宋祁曰古浙本有意字他本無但云庶㡬乎則促而不緩必待意字句乃自安今子大夫待詔百有餘人或道世務而未濟稽諸上古而不同考之于今而難行毋乃牽於文繫而不得騁與師古曰牽於文繫謂懼於文吏之法將所繇異術所聞殊方與師古曰繇讀與由同方謂道也各悉對著于篇師古曰悉謂盡意而對也毋諱有司師古曰言不當忌畏有司而不極言明其指略切磋究之以稱朕意師古曰究極也磋音千何反仲舒對曰臣聞堯受命以天下為憂而未以位為樂也宋祁曰古本位字上有在字故誅逐亂臣務求賢聖是以得舜禹稷卨咎繇衆聖輔徳賢能佐職敎化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道師古曰從音千容反中音竹仲反故孔子曰如有王者必世而後仁此之謂也師古曰論語載孔子之言也言如有受命王者必三十年仁政乃成堯在位七十載廼遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟師古曰辟讀曰避乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡羙矣又盡善也師古曰韶舜樂也孔子嘉舜之徳故聼其樂而云盡善盡羙矣此之謂也至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入於河海師古曰謂若鼔方叔播鼗武少師陽之屬也事在禮樂志天下耗亂萬民不安師古曰耗不明也音莫報反故天下去殷而從周文王順天理物師用賢聖是以閎夭太顛散宜生等亦聚於朝廷臣瓚曰皆文王賢臣愛施兆民天下歸之故太公起海濱而即三公也師古曰濱涯也即就也濱音賓又音頻當此之時紂尚在上尊卑昬亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉師古曰見顯示也繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也師古曰亦論語載孔子之言也武周武王樂也以其用兵伐紂故有慙徳未盡善也此之謂也臣聞制度文采𤣥黄之飾所以明尊卑異貴賤而勸有徳也故春秋受命所先制者改正朔易服色所以應天也然則宫室旌旗之制有法而然者也故孔子曰奢則不遜儉則固師古曰論語載孔子之言遜順也固陋也儉非聖人之中制也臣聞良玉不瑑資質潤羙不待刻瑑此亡異於達巷黨人不學而自知也孟康曰人項槖也然則常玉不瑑不成文章君子不學不成其徳臣聞聖王之治天下也少則習之學長則材諸位服䖍曰在位當知材知日有益於政也應劭曰隨其材之優劣而授之位也師古曰應説近之謂授之位以試其材也爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦敎化之漸而仁誼之流宋祁曰古本流作㳅非獨傷肌膚之效也至秦則不然師申商之法師古曰申申不害也商商鞅也行韓非之説憎帝王之道以貪狼為俗師古曰狼性皆貪故謂貪為貪狼也非有文徳以敎訓於天下也宋祁曰景徳本無天字古本有誅名而不察實師古曰誅責也為善者不必免而犯惡者未必刑也是以百官皆飾空言虛辭而不顧實宋祁曰景祐本無空言二字古本有外有事君之禮内有背上之心造偽飾詐趣利無恥又好用憯酷之吏師古曰憯痛也音千感反賦歛亡度竭民財力百姓散亡不得從耕織之業羣盗並起是以刑者甚衆死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥師古曰論語載孔子之言也言以政法敎導之以刑戮整齊之則人茍免而已無恥愧也宋祁曰古本齊作亝此之謂也今陛下并有天下海内莫不率服廣覽兼聼極羣下之知盡天下之美至徳昭然施于方外夜郎康居殊方萬里説徳歸誼師古曰夜郎西}
