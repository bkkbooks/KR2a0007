  - {type: variant, offset: 3388, length: 9, content: 會蓋主舍人父燕倉知, WYG: 法出而姦生令下而詐起師古曰下音胡亞反如以湯止沸抱薪救火愈甚亡益也宋祁曰越本甚作}
  - {type: variant, offset: 3388, length: 9, content: 會蓋主舍人父燕倉知, krp: 法出而姦生令下而詐起師古曰下音胡亞反如以湯止沸抱薪救火愈甚亡益也宋祁曰越本甚作}
  - {type: variant, offset: 3398, length: 307, content: 謀告之由是發覺丞相賜璽書部中二千石逐捕孫縱之及左將軍桀等皆伏誅旦聞之召相平曰事敗遂發兵乎平曰左將軍已死百姓皆知之不可發也王憂懣置酒萬載宮會賓客群臣妃妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮固知國中之無人華容夫人起舞曰髮紛紛兮寘渠骨籍籍兮亡居母求死子兮妻求死夫裴回兩渠間兮君子獨安居坐者皆泣有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之明光殿王曰老虜曹為事當族欲自殺左右曰黨得削國幸不死后姬夫人共啼泣止王會天子使使者賜燕王璽書曰昔高皇帝王天下建立子弟以藩屏社稷先日諸呂陰謀大逆劉氏不絕若髮賴絳侯等誅討賊亂尊立孝文以安宗廟非以中外有人表裏相應故邪樊酈曹灌攜劍推鋒從高皇帝墾菑除害耘鉏海內當此之時頭如蓬葆勤苦至, WYG: 甚與其小差則成誤}
