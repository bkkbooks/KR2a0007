  - {type: variant, offset: 6493, length: 0, content: '', WYG: 兩國輒事驕王正身以率下數上疏諫爭敎令國中所居而治及去位歸居終不問家産業以脩學著書為事仲舒在家朝廷如有大議宋祁曰古本無如字使使者及廷尉張湯就其家而問之其對皆有明灋自武帝初立魏其武安侯為相而隆儒矣及仲舒對冊推明孔氏抑黜百家立學校之官師古曰校音下敎反州郡舉􅌗材孝廉皆自仲舒發之年老以夀終於家家徙茂陵子及孫皆以學至大官仲舒所著皆明經術之意及上疏條敎凡百二十三篇而説春秋事得失聞舉玉杯蕃露清明竹林之}
