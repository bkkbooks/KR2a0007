  - {type: variant, offset: 29, length: 0, content: '', WYG: 已没而子孫長久安寧數百嵗此皆禮樂敎化之功也王者未作樂之時廼用先王之樂宜於世者而以深入敎化於民敎化之情不得雅頌之樂不成故王者功成作樂樂其徳也樂者所以變民風化民俗也其變民也易其化人也著師古曰著明也易音弋豉反著音竹筯反故聲發於和而本於情接於肌膚臧於骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也宋祁曰古本齊作亝}
