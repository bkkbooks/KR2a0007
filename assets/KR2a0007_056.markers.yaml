  - {type: variant, offset: 2494, length: 693, content: 八年呂太后崩大臣誅諸呂迎立文帝天下乃知非孝惠子也我親武帝長子反不得立上書請立廟又不聽立者疑非劉氏即與劉澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨淄與燕王俱起旦遂招來郡國姦人賦斂銅鐵作甲兵數閱其車騎材官卒建旌旗鼓車旄頭先敺郎中侍從者著貂羽黃金附蟬皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日郎中韓義等數諫旦旦殺義等凡十五人會缾侯劉成知澤等謀告之青州刺史雋不疑不疑收捕澤以聞天子遣大鴻臚丞治連引燕王有詔弗治而劉澤等皆伏誅益封缾侯久之旦姊鄂邑蓋長公主左將軍上官桀父子與霍光爭權有隙皆知旦怨光即私與燕交通旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主上官桀及御史大夫桑弘羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章旦聞之喜上疏曰昔秦據南面之位制一世之命威服四夷輕弱骨肉顯重異族廢道任刑無恩宗室其後尉佗入南夷陳涉呼楚澤近狎作亂內外俱發趙氏無炊火焉高皇帝覽蹤迹觀得失見秦建本非是故改其路規土連成布王子孫是以支葉扶疏異姓不得間也今陛下承明繼成委任公卿群臣連與成朋非毀宗室膚受之愬日騁於廷惡吏廢法立威主恩不及下究臣聞武帝使中郎將蘇武使匈奴見留二十年不降還亶為典屬國今大將軍長史敞無勞為搜粟都尉又將軍都郎羽林道上移蹕太官先置臣旦願歸符璽入宿衛察姦臣之變是時昭帝年十四覺其有詐遂親信霍光而疏上官桀等桀等因謀共殺光廢帝迎立燕王為天子旦置驛書往來相報許立桀為王外連郡國豪桀以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕易車騎將軍少而驕臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之正讙, WYG: 牆}
