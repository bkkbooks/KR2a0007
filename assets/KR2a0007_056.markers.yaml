  - {type: variant, offset: 21, length: 7, content: 趙婕妤生孝昭帝, WYG: 大夫眀先聖之業習俗化之變終始之序講聞髙誼之日久矣其明以諭朕師古曰諭謂曉告也科别其條勿猥勿幷師古曰猥積也并合也欲其一一疏理而言之取之於術慎其所出廼其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害師古曰極中也公卿執事有不忠直而阿枉者皆令言之朕自發書不有漏泄勿懼有後害而不言也子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發徳音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天廼先出災害以譴告之師古曰譴責也不知自省又出怪異以警懼之師古曰省視也尚不知變而傷敗廼至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣師古曰彊音其兩反此下亦同彊勉學問則聞見博而知益眀彊勉行道則徳日起而大有功此皆可使還至而立有效者也師古曰還讀曰旋旋速也宋祁曰越本無立字詩曰夙夜匪解師古曰大雅烝民之詩也解讀曰懈懈怠也其下亦同書云茂哉茂哉師古曰虞書咎繇謨之辭也茂勉也皆彊勉之謂也道者所繇適於治之路也師古曰繇讀與由同由從也適往也仁義禮樂皆其具也故聖}
