  - {type: variant, offset: 1675, length: 260, content: 夫湯廟立子閎為齊王曰烏呼小子閎受茲青社朕承天序惟稽古建爾國家封于東土世為漢藩輔烏呼念哉共朕之詔惟命不于常人之好德克明顯光義之不圖俾君子怠悉爾心允執其中天祿永終厥有愆不臧乃凶于乃國而害于爾躬鳴呼保國乂民可不敬與王其戒之閎母王夫人有寵閎尤愛幸立八年薨無子國除燕刺王旦賜策曰鳴呼小子旦受茲玄社建爾國家封于北土世為漢藩輔鳴呼薰鬻氏虐老獸心以姦巧邊甿朕命將率徂征厥罪萬夫長千夫長三十有二帥降旗奔師薰鬻徙域北州以妥悉爾心毋作怨毋作棐德毋乃廢備非教士不得從徵王其戒之旦壯大就國為人辯略博學經書雜說好星曆數術倡優射獵之事招致游士及衛太子, WYG: ''}
