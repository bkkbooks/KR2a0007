  - {type: variant, offset: 6557, length: 0, content: '', WYG: 之耦師古曰耦對也宋祁曰越本無乃字王者不得則不興故顔淵死孔子曰噫天喪余師古曰事見論語噫歎聲也言失其輔佐也噫音於其反唯此一人為能當之自宰我子贛子游子夏不與焉師古曰與讀曰豫仲舒遭漢承秦滅學之後六經離析下帷發憤潛心大業令後學者有所統壹為羣儒首然考其師友淵源所漸猶未及虖游夏師古曰漸浸潤也游子游夏子夏也而曰筦晏弗及伊呂不加過矣至向曾孫龔篤論君子也}
