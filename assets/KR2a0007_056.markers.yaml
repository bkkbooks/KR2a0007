  - {type: variant, offset: 4013, length: 5, content: 正嗚呼悉爾, WYG: 晻致明以㣲致顯師古曰晻與暗同是以堯發於諸侯師古曰謂從唐侯升天子之位舜興虖深山孟康曰舜耕於歴山非一日而顯也盖有漸以致之矣言出於已不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎㣲者著師古曰能盡衆小則致髙大能慎至㣲則著明也詩云惟此文王小}
