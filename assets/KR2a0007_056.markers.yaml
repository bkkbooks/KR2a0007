  - {type: variant, offset: 4701, length: 0, content: '', WYG: 如是是故下髙其行而從其敎民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻師古曰小雅節南山之詩也節髙峻貌巖巖積石貌赫赫顯盛也師尹周太師尹氏也言三公之位人所瞻仰若山之髙也節音才結反爾好誼則民鄉仁而俗善師古曰爾汝也鄉讀曰嚮爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效逺方之所四靣而内望也近者視而放之師古曰放依也音甫往反逺者望而效之豈可以居賢人之位而}
