  - {type: variant, offset: 4080, length: 0, content: '', krp: 桀紂暴謾師古曰謾與慢同讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天師古曰晏然自安意也如日在天言}
  - {type: variant, offset: 4082, length: 1, content: 得, WYG: 墜亡也終陵夷而大壊夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其􅎊微􅎊滅之道也册曰三王之敎所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道師古曰復謂反復行之也音扶目反道者萬世亡弊弊者道之失也師古曰言有弊非道由失道故有弊先王之道必有偏而不起之處故政有眊而不行師古曰眊不明也音莫報反舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也師古曰捄古救字故孔子曰亡}
  - {type: page-break, offset: 4082, content: '', id: KR2a0007_WYG_056-22a, image: WYG0250/WYG0250-0256a.png}
  - {type: variant, offset: 4082, length: 1, content: 得, krp: 墜亡也終陵夷而大壊夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其􅎊微􅎊滅之道也册曰三王之敎所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道師古曰復謂反復行之也音扶目反道者萬世亡弊弊者道之失也師古曰言有弊非道由失道故有弊先王之道必有偏而不起之處故政有眊而不行師古曰眊不明也音莫報反舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也師古曰捄古救字故孔子曰亡}
  - {type: variant, offset: 4084, length: 0, content: '', WYG: 而治者其舜虖師古曰論語載孔子之言改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也師古曰繼謂所受先代之次也救謂救其弊也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也師古曰論語載孔子之言謂忠敬與文因循為敎立政垂則不逺此也宋祁曰浙本云孔子曰殷因於夏禮周因於殷禮其損益可知也當考此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也師古曰言政和平不湏救弊也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今}
  - {type: page-break, offset: 4084, content: '', id: KR2a0007_WYG_056-22b, image: WYG0250/WYG0250-0256b.png}
