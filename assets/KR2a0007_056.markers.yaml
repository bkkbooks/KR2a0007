  - {type: variant, offset: 4, length: 1, content: 第, krp: 以久次相授業或莫見其面師古曰言新學者但就其舊弟子受業不必親見仲舒劉氏曰久衍字盖}
  - {type: variant, offset: 6, length: 1, content: 十, WYG: 年不窺園其精如此師古曰雖有園圃不窺視之言專學也進退容止非禮不行學士皆師尊之武帝即位舉賢良文學之士前後百數師古曰數音所具反而仲舒以賢良對䇿焉制曰朕獲承至尊休徳師古曰休羙也言承先帝極尊之位至羙之徳也宋祁曰浙本至尊下有之字傳之亡窮而施之㒺極師古曰㒺亦無也極盡也任大而守重是以夙夜不皇康寧師古曰皇暇也康樂也永惟萬事之統猶懼有闕師古曰永深也惟思也統緒也故廣延四方之豪儁郡國諸侯公選賢良脩絜博習之士師古曰郡郡守也國王國也諸侯列侯也郡國及諸侯總謂四方在外者公選謂以公正之道選士無偏私也欲聞大道之要至論之極師古曰極中也今子大夫褎然為舉首服虔曰子男子之美號也張晏曰褎進也為舉賢良之首也師古曰褎然盛服貌也詩邶風旄邱之篇曰褎如充耳褎音弋授反朕甚嘉之子大夫其精心致思朕埀聼而問焉盖聞五帝}
