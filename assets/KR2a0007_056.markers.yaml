  - {type: variant, offset: 774, length: 1, content: 隸, krp: 法其中旋轉者甄音吉延反猶金之在鎔唯冶者之所鑄師古曰鎔謂鑄器之模範也鎔音容綏之斯倈動之斯和此之謂也師古曰論語載子貢對陳子禽之言也綏安也言治國家者安之則競來動之則和悦耳}
  - {type: variant, offset: 776, length: 1, content: 耳, WYG: 謹案春秋之文求王道之端得之於正師古曰謂正月也音之成反宋祁曰正越本作之盛反正次王王次春師古曰解春秋書春王正月之一句也春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在隂陽陽為徳隂為刑刑主殺而徳主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虛不用之處以此見天之任徳不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名蘇林曰卒以陽名嵗尚徳不尚刑也師古曰謂年首稱春也即上所云王次春者是也此天意也王者承天意以從事故任徳敎而不任刑刑者不可任以治世猶隂之不可任以成嵗也為政而任刑不順於天故先王莫之肯為也今廢先王徳敎之官而獨任執法之吏治民毋乃任刑之意與師古曰與讀曰歟孔子曰不敎而誅謂之虐師古曰論語載孔子之言虐政用於下而欲徳敎之被四海故難成也臣謹案春秋謂一元之意師古曰釋公始即位何不稱一年而言元年也一者萬物之所從始也元者辭之所謂大也師古曰易辭元者善之長也故曰辭之所謂大也宋祁曰辭古本作解謂一為元者視大始而欲正本也師古曰視讀曰示春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不壹於正而亡有邪氣奸其間者師古曰奸犯也音干是以隂陽調而風雨時羣生和而萬民殖五榖孰而􅋄木茂天地之間被潤澤而大豐美四海之内聞盛德而皆倈臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳯鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也師古曰鳯鳥河圖皆王者之瑞仲尼自歎有徳無位故不至也今}
