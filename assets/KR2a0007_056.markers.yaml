  - {type: variant, offset: 31, length: 0, content: '', WYG: 君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道師古曰繇讀與由同下亦類此是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之徳興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為}
