  - {type: variant, offset: 1228, length: 179, content: 太子者初為北地太守後族上憐太子無辜乃作思子宮為歸來望思之臺於湖天下聞而悲之初太子有三男一女女者平輿侯嗣子尚焉及太子敗皆同時遇害衛后史良娣葬長安城南史皇孫皇孫妃王夫人及皇女孫葬廣明皇孫二人隨太子者與太子并葬湖太子有遺孫一人史皇孫子王夫人男年十八即尊位是為孝宣帝帝初即位下詔曰故皇太子在湖未有號諡歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之, WYG: 仁}
