  - {type: variant, offset: 8, length: 9, content: 孝武皇帝六男衛皇后, WYG: 王之道改制作樂而天下洽和百王同之宋祁曰淳化本作制禮按古本無禮字下云韶勺寧有禮字存之不成文洽一作治當虞氏之樂莫盛於韶師古曰韶舜樂於周莫盛於勺張晏曰勺周頌篇也言能成先祖之功以養天下也師古曰勺讀與酌同聖王已没鐘鼓筦絃之聲未衰師古曰筦與管字同而大道微缺陵夷至虖桀紂之行師古曰陵夷言漸穨替也解在成紀宋祁曰行字古本作作字今浙本亦有作字又一本題云又云桀紂之行語意常苦不了王道大壊矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆師古曰翼助也然猶不能反日以仆滅師古曰反還也還於正道也仆斃也音赴至後王而後止豈其所持操或誖謬而失其統與師古曰操執也誖乖也統緒也操音千髙反與讀曰歟後皆類此固天降命不可復反必推之於大衰而後息與師古曰息止也烏虖師古曰虖讀曰呼嗚呼歎辭也凡所為屑屑夙興夜寐務法上古者又將無補與師古曰屑屑動作之貌補益也三代受命其符安在災異之變何緣而起性命之情或夭或夀或仁或鄙師古曰夭夀命也仁鄙性也鄙謂不通也習聞其號未燭厥理師古曰燭照也伊欲風流而令行刑輕而姦改師古曰伊惟也百姓和樂政事宣昭何脩何飾而膏露降百榖登師古曰登成也宋祁曰古本飾作飭徳潤四海澤臻屮木師古曰臻至也􅋄古草字也三光全寒暑平受天之祜師古曰祜福也音怙享鬼神之靈師古曰為鬼神所歆饗徳澤洋溢施虖方外延及羣}
