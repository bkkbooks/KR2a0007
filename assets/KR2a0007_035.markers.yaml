  - {type: variant, offset: 1279, length: 256, content: 食其賣己乃亨食其引兵走漢十二年曲周侯酈商以丞相將兵擊黥布有功高祖舉功臣思食其食其子疥數將兵上以其父故封疥為高梁侯後更食武陽卒子遂嗣三世侯平有罪國除陸賈楚人也以客從高祖定天下名有口辯居左右常使諸侯時中國初定尉佗平南越因王之高祖使賈賜佗印為南越王賈至尉佗魋結箕踞見賈賈因說佗曰足下中國人親戚昆弟墳墓在真定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣夫秦失其正諸侯豪桀並起唯漢王先入關據咸陽項籍背約自立為西楚霸王諸侯皆屬可謂至彊矣然漢王起巴蜀鞭笞天下劫諸侯遂誅項羽五年之間海內平定此非人力天之所建也天子聞君, WYG: 荆}
