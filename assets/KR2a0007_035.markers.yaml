  - {type: variant, offset: 4435, length: 0, content: '', WYG: 謂偉誤作危顔遂以重為罪累劉攽曰謂田生謀欲王劉澤先説張卿王諸吕而後請王澤是發於相重也太史公作偉哉美其有成班固作危哉謂其艱難幸成也然觀上言稱孤者三世疑危亦本是偉字後人不曉改之吳王擅山海之利能薄歛以使其衆宋祁曰歛字上當有賦字逆亂之萌自其子興師古曰萌謂始生也古者諸侯不過百里山海不以封蓋防此矣鼂錯為國逺慮禍反及身毋為權首將受其咎豈謂錯哉師古曰此逸周書之言贊引之者謂錯適當此言耳前漢書卷三十五前漢書卷三十五考證荆王劉賈傳髙帝從父兄也臣召南按史記曰劉賈諸劉者}
