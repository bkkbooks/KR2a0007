  - {type: variant, offset: 4506, length: 234, content: 服服短衣楚製漢王喜通之降漢從弟子百餘人然無所進剸言諸故群盜壯士進之弟子皆曰事先生數年幸得從降漢今不進臣等剸言大猾何也通乃謂曰漢王方蒙矢石爭天下諸生寧能鬭乎故先言斬將搴旗之士諸生且待我我不忘矣漢王拜通為博士號稷嗣君漢王已并天下諸侯共尊為皇帝於定陶通就其儀號高帝悉去秦儀法為簡易群臣飲爭功醉或妄呼拔劍擊柱上患之通知上益饜之說上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀高帝曰得無難乎通曰五帝異樂三王不同禮禮者因時世人情為之節文者也故夏殷周禮所因損益可知者謂不相復, WYG: 名}
