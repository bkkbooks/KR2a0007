  - {type: variant, offset: 3038, length: 0, content: '', WYG: 劇孟喜曰七國反吾乘傳至此不自意全師古曰意不自言得安全至雒陽也又以為諸侯已得劇孟孟今無動吾據滎陽師古曰言劇孟既不動揺吾又得據滎陽也滎陽以東無足憂者至雒陽宋祁曰雒陽浙本作淮陽前已有雒陽此當作淮陽夏公謂劉固善疑顧未見景本所見浙本爾然則雌黄可妄下乎問故父絳侯客鄧都尉曰䇿安出客曰吳楚兵鋭甚難與爭鋒楚兵輕不能乆方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡鋭攻之將軍深溝髙壘使輕兵絶淮泗口塞吳饟道師古曰饟古餉字使吳梁相敝而糧食竭乃以全制其極破吳必矣條侯曰善從其䇿遂堅壁昌邑南輕兵絶吳饟道吳王之初發也吳臣田禄伯為大將軍田禄伯曰兵屯聚而西無他竒道難以立功臣願得五萬人别循江淮而上収淮南長沙入武闗與大王會此亦一竒也吳王太子諫曰王以反為名此兵難以藉人師古曰藉假也人亦且反王柰何且擅兵而别多它利害蘇林曰禄伯儻將兵降漢自為己利於吳為生患害師古曰蘇説非也上言難以藉人人亦且反王是則已疑禄伯矣下乃云多它利害謂分兵而去前事不測或有利害難可决機耳非重云畏其降漢者徒自損耳吳王即不許田祿伯吳少將桓將軍説王曰吳多歩兵歩兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據雒陽武庫食敖倉粟阻山河之險以令諸侯雖無入闗天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問吳老將老將曰此年少推鋒可耳安知大慮於是王不用桓將軍計王專幷將其兵未渡淮諸賓客皆得為將校尉行閒候司馬孟康曰行伍間候也師古曰在行伍閒或為候或為司馬也獨周丘不用周丘者下邳人亡命吳酤酒無行宋祁曰南本酤作酷王薄之不任周丘乃上謁説王曰臣以無能不得待罪行閒臣非敢求有所將也願請王一漢節必有以報王廼予之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入戸使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯至矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至城陽兵十餘萬師古曰比音必寐反破城陽中尉軍聞吳王敗走自度無與共成功師古曰度音大各反即引兵歸下邳未至癰發背死宋祁曰癰當作㿈二月吳王兵既破敗走於是天子制詔將軍蓋聞為善者天報以福為非者天報以殃髙皇帝親垂功徳建立諸侯幽王悼惠王絶無後孝文皇帝哀憐加惠師古曰憐其國絶故加恩惠而更封王幽王子遂悼惠王子卬等令奉其先王宗廟為漢藩國徳配天地明並日月而吳王濞背德反義誘受天下亡命罪人亂天下幣如淳曰幣錢也以私錢殽亂天下錢宋祁曰注文天下錢浙本作天子錢稱疾不朝二十餘年有司數請濞罪孝文皇帝寛之欲其改行為善今乃與楚王戊趙王遂膠西王卬濟南王辟光甾川王賢膠東王雄渠約從謀反師古曰從音子容反為逆無道起兵以危宗廟賊殺大臣及漢使者廹劫萬民伐殺無罪燒殘民家掘其丘壟甚為虐暴而卬等又重逆無道師古曰重音直用反燒宗廟鹵御物如淳曰鹵抄掠也師古曰御物供宗廟之服器也朕甚痛之朕素服避正殿將軍其勸士大夫撃反虜擊反虜者深入多殺為功斬首捕虜比三百石以上皆殺無有所置師古曰置放釋也敢有議詔及不如詔者皆要斬初吳王之度淮與楚王遂西敗棘壁乗勝而前鋭甚梁孝王恐遣將軍擊之又敗梁兩軍士卒皆還走梁數使使條侯求救條侯不許又使使愬條侯於上上使告條侯救梁宋祁曰上使告當作上使人告又守便宜不行梁使韓安國及楚死事相弟張羽為將軍李竒曰相即張尚也乃得頗敗吳兵吳兵欲西梁城守不敢西即走條侯軍師古曰走音奏會下邑欲戰師古曰下邑梁之縣條侯壁不肯戰吳糧絶卒飢數挑戰遂夜奔條侯壁驚東南條侯使偹西北果從西北不得入吳大敗士卒多飢死叛散於是吳王廼與其戲下壯士千人夜亡去師古曰戲讀曰麾又音許宜反度淮走丹徒保東越東越兵可萬餘人使人收聚亡卒漢使人以利啗東越師古曰啗音徒濫反解在髙紀東越即紿吳王師古曰紿誑也吳王出勞軍使人鏦殺吳王孟康曰方言㦸謂之鏦蘇林曰鏦音從容之從師古曰鏦謂以矛㦸撞之音楚江反盛其頭馳傳以聞師古曰傳音張戀反吳王太子駒亡走閩越吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍楚王戊軍敗自殺三王之圍}
