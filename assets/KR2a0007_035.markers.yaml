  - {type: variant, offset: 2885, length: 1, content: 辟, WYG: 至梁聞漢灌將軍屯滎陽澤還兵備西界遂跳驅至長安師古曰齊王傳云使祝午紿琅邪王琅邪王馳見齊王齊王因留琅邪王而使祝午盡發琅邪國而并將其兵琅邪王既見欺不得反國乃説齊王求入闗計事齊王以為然乃益具車送琅邪王與此傳不同疑此傳誤也宋祁云浙本注文紿字下有説字一本紿作詭代王亦從代至諸將相與琅邪王共立代王是為孝文帝文帝元年徙澤為燕王而復以琅邪歸齊李竒曰本齊地前分以王澤今復與齊也澤王燕二年薨諡曰敬王子康王嘉嗣九年薨宋祁曰九年當作二十六年史記年表漢表皆同子定國嗣定國與父康王姬姦生子男一人奪弟妻為姬與子女三人姦定國有所欲誅殺臣肥如令郢人郢人等告定國如淳曰定國自欲有所殺餘臣肥如知令郢人以告也師古曰此説非也肥如燕之屬縣也郢人者縣令之名也定國别欲誅其臣又欲誅肥如令郢人而為郢人等所告也定國使謁者以它法劾捕格殺郢人滅口至元朔中郢人昆弟復上書具言定國事下公卿皆議曰定國禽獸行亂人倫逆天道當誅上許之定國自殺立四十二年國除宋祁曰四十二年當作二十四年哀帝時繼絶世乃封敬王澤𤣥孫之孫無終公士歸生為營陵侯師古曰無終其所屬縣也公士第一爵歸生名也更始中為兵所殺師古曰更始劉聖公之號也吳王濞髙帝兄仲之子也髙帝立仲為代王匈奴攻代仲不能堅守棄國閒行走雒陽自歸天子不忍致法廢為合}
