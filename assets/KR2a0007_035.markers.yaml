  - {type: variant, offset: 3039, length: 2, content: 人虞, WYG: 臨甾也三月不能下漢兵至膠西膠東甾川王各引兵歸國膠西王徒跣席槀飲水謝太后王太子徳曰漢兵還臣觀之以罷師古曰罷讀曰疲可襲願収王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壊不可用之宋祁曰浙本無之字不聼漢將弓髙侯穨當遺王書師古曰韓穨當曰奉詔誅不義降者赦除其罪復故不降者滅之王何處湏以從事師古曰言王欲以何理自安處吾待以行事也處音昌汝反王肉袒叩頭漢軍壁謁曰臣卬奉法不謹驚駭百姓廼苦將軍逺道至于窮國敢請葅醢之罪弓髙侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首膝行對曰今者鼂錯天子用事臣變更髙皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下七國發兵且誅錯宋祁曰浙本且字下有以字今聞錯已誅卬等謹已罷兵歸}
