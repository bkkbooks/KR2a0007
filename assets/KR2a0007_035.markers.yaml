  - {type: variant, offset: 1540, length: 951, content: 不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦且休之遣臣授君王印剖符通使君王宜郊迎北面稱臣乃欲以新造未集之越屈強於此漢誠聞之掘燒君王先人冢墓夷種宗族使一偏將將十萬眾臨越即越殺王降漢如反覆手耳於是佗乃蹶然起坐謝賈曰居蠻夷中久殊失禮義因問賈曰我孰與蕭何曹參韓信賢賈曰王似賢也復問曰我孰與皇帝賢賈曰皇帝起豐沛討暴秦誅彊楚為天下興利除害繼五帝三王之業統天下理中國中國之人以億計地方萬里居天下之膏腴人眾車輿萬物殷富政由一家自天地剖判未始有也今王眾不過數萬皆蠻夷崎嶇山海間譬如漢一郡王何乃比於漢佗大笑曰吾不起中國故王此使我居中國何遽不若漢乃大說賈留與飲數月曰越中無足與語至生來令我日聞所不聞賜賈橐中裝直千金它送亦千金賈卒拜佗為南越王令稱臣奉漢約歸報高帝大說拜賈為太中大夫賈時時前說稱詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯極武而亡秦任刑法不變卒滅趙氏鄉使秦以并天下行仁義法先聖陛下安得而有之高帝不懌有慚色謂賈曰試為我著秦所以失天下吾所以得之者乃古成敗之國賈凡著十二篇每奏一篇高帝未嘗不稱善左右呼萬歲稱其書曰新語孝惠時呂太后用事欲王諸呂畏大臣及有口者賈自度不能爭之乃病免以好畤田地善往家焉有五男乃出所使越橐中裝賣千金分其子子二百金令為生產賈常乘安車駟馬從歌鼓瑟侍者十人寶劍直百金謂其子曰與女約過女女給人馬酒食極欲十日而更所死家得寶劍車騎侍從者一歲中以往來過它客率不過再過數擊鮮毋久溷女為也呂太后時王諸呂諸呂擅權欲劫少主危劉氏右丞相陳平患之力不能爭恐禍及己平常燕居深念賈往不請直入坐陳平方念不見賈賈曰何念深也平曰生揣我何念賈曰足下位為上相食三萬戶侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分權不分為社稷計在兩君掌握耳臣常欲謂太尉絳侯絳侯與我戲易吾言君何不交驩太尉深相結為陳平畫呂氏數事平用其計乃以五百金為絳侯壽厚具樂飲太尉太尉亦報如之兩人深相結呂氏謀益壞陳平乃以奴婢百人車馬五十乘錢五百萬遺賈為食飲費賈以此游漢廷公卿間名聲籍甚及誅呂氏立孝文賈頗有力孝文即位欲使人之南越丞相平乃言賈為太中大夫往使尉佗去黃屋稱制令比諸侯皆如意指語在南越傳陸生竟以壽終朱建楚人也故嘗為, WYG: ''}
