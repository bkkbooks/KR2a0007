  - {type: variant, offset: 2543, length: 0, content: '', WYG: 不見澤而假大宅令其子求事吕后所幸大謁者張卿如淳曰奄人也宋祁曰南本浙本並作張澤卿澤或作釋卿按周勃傳宦者令張釋諭告顔注曰荆燕吳傳云張澤今此作釋未知孰是然則此宜作澤卿矣但釋澤二字不知何從後云今卿最幸疑卿是字釋其名也居數月田生子請張卿臨親脩具師古曰親父也具供具也張卿往見田生帷帳具置如列侯張卿驚酒酣廼屏人説張卿曰臣觀諸侯邸第百餘皆髙帝一切功臣今呂氏雅故本推轂髙帝就天下如淳曰吕公知髙祖貴以女妻之推轂使}
