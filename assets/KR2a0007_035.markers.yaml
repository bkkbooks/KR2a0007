  - {type: variant, offset: 2980, length: 0, content: '', WYG: 不忍因賜几杖德至厚也不改過自新廼益驕恣公即山鑄錢煑海為鹽師古曰公謂顯然為之也即就也誘天下亡人謀作亂逆今削之亦反不削亦反削之其反亟禍小不削之其反遲禍大師古曰亟急也音居力反三年冬楚王來朝錯因言楚王戊往年為薄太后服私姦服舍服䖍曰服在䘮次而私姦宫中也師古曰言於服舍為姦非宫中也服舍居䘮之次堊室之屬也請誅之詔赦削東海郡及前二年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣漢廷臣方議削吳吳王恐削地無已因欲發謀舉事念諸侯無足與計者}
  - {type: page-break, offset: 2980, content: '', id: KR2a0007_WYG_035-8a, image: WYG0249/WYG0249-0795c.png}
