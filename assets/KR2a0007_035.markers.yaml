  - {type: variant, offset: 3006, length: 0, content: '', WYG: 嗣國除庶子二人為列侯不得嗣王志將不滿故誘與之反也幸教以漢有賊臣錯無功天下侵奪諸侯之地使吏劾繫訊治以侵辱之為故孟康曰故事也師古曰言專以侵辱諸侯為事業不以諸侯人君}
