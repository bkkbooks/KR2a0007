  - {type: variant, offset: 3007, length: 7, content: 罵單于遂死匈奴, WYG: 遇劉氏骨肉師古曰人君者言諸王各自君其國絶先帝功臣進任姦人誑亂天下欲危社稷陛下多病志逸不能省察師古曰逸放也欲舉兵誅之謹聞教敝國雖狹地方三千里師古曰狹音胡夾反人民雖少精兵可具五十萬宋祁曰浙本無精字寡人素事南越三十餘年其王諸君皆不辭分其兵以隨寡人師古曰諸君謂其酋豪又可得三十萬寡人雖不肖願以身從諸王南越直長沙者因王子定長沙以北如淳曰南越直長沙者因王子定之師古曰直當也言越地之北當長沙者也西走蜀漢}
