  - {type: variant, offset: 2892, length: 2, content: 深卒, WYG: 沛而封拜濞也王三郡五十三城宋祁曰故東陽郡鄣郡吳郡即賈舊封已拜受印髙祖召濞相之曰若狀有反相師古曰若汝也此下亦同獨悔業已拜師古曰獨悔者心自懐悔}
