  - {type: variant, offset: 2496, length: 0, content: '', WYG: 反東擊荆賈與戰弗勝走富陵師古曰縣名地理志屬臨淮郡為布軍所殺燕王劉澤髙祖從祖昆弟也師古曰言同曾祖從祖而别也髙祖三年澤為郎中十一年以將軍擊陳豨將王黄封為營陵侯髙后時齊人田生游乏資晉灼曰楚漢春秋云字子春以畫奸澤服䖍曰以計畫干之文穎曰以工畫得寵也師古曰共為計䇿欲以求王服説是也畫音獲澤大説之師古曰説讀曰悦用金二百斤為田生夀師古曰因飲酒獻夀而與之金田生已得金即歸齊二嵗澤使人謂田生曰弗與矣孟康曰與黨與也言不復與我為友也文穎曰不復與汝}
