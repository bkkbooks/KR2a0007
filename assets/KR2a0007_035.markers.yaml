  - {type: variant, offset: 3031, length: 0, content: '', WYG: 尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得夜亡走梁服䖍曰梁王與吳戰盎得奔梁遂歸報條侯將乘六乘傳會兵滎陽師古曰會兵謂集大兵傳音張戀反至雒陽劉攽曰按此文有两至雒陽失於刪除又按太尉云吾據滎陽然則得劇孟}
