  - {type: variant, offset: 3392, length: 833, content: 急百萬之眾可具因秦之故資甚美膏腴之地此所謂天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬭不搤其亢拊其背未能全勝今陛下入關而都按秦之故此亦搤天下之亢而拊其背也高帝問群臣群臣皆山東人爭言周王數百年秦二世則亡不如都周上疑未能決及留侯明言入關便即日駕西都關中於是上曰本言都秦地者婁敬婁者劉也賜姓劉氏拜為郎中號曰奉春君漢七年韓王信反高帝自往擊至晉陽聞信與匈奴欲擊漢上大怒使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十輩來皆言匈奴易擊上使劉敬復往使匈奴還報曰兩國相擊此宜夸矜見所長今臣往徒見羸胔老弱此必欲見短伏奇兵以爭利愚以為匈奴不可擊也是時漢兵以踰句注三十餘萬眾兵已業行上怒罵敬曰齊虜以舌得官乃今妄言沮吾軍械繫敬廣武遂往至平城匈奴果出奇兵圍高帝白登七日然後得解高帝至廣武赦敬曰吾不用公言以困平城吾已斬先使十輩言可擊者矣乃封敬二千戶為關內侯號建信侯高帝罷平城歸韓王信亡入胡當是時冒頓單于兵彊控弦四十萬騎數苦北邊上患之問敬敬曰天下初定士卒罷於兵革未可以武服也冒頓殺父代立妻群母以力為威未可以仁義說也獨可以計久遠子孫為臣耳然陛下恐不能為上曰誠可何為不能顧為奈何敬曰陛下誠能以適長公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子代單于何者貪漢重幣陛下以歲時漢所餘彼所鮮數問遺使辯士風諭以禮節冒頓在固為子壻死外孫為單于豈曾聞孫敢與大父亢禮哉可毋戰以漸臣也若陛下不能遣長公主而令宗室及後宮詐稱公主彼亦知不肯貴近無益也高帝曰善欲遣長公主呂后泣曰妾唯以一太子一女奈何棄之匈奴上竟不能遣長公主而取家人子為公主妻單于使敬往結和親約敬從匈奴來因言匈奴河南白羊樓煩王去長安近者七百里輕騎一日一夕可以至秦中新破少民地肥饒可益實夫諸侯初起時非齊諸田楚昭屈景莫與今陛下雖都關中實少人北近胡寇東有六國彊族一日有變陛下亦未得安枕而臥也臣願陛下徙齊諸田楚昭屈景燕趙韓魏後乃豪傑名家且實關中無事可以備胡諸侯有變亦足率以東伐此彊本弱末之術也上曰善乃使劉敬徙所言關中十餘萬口叔孫通薛人也秦時以文學徵待, WYG: ''}
