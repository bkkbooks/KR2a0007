  - {type: variant, offset: 2922, length: 0, content: '', WYG: 朝聘也如淳曰濞不自行也使人代己致請禮師古曰二説皆是也請音材姓反上復責問吳使者使者曰察見淵中魚不祥服䖍曰天子察見下之私則不祥也今吳王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯上與更始師古曰言赦其已往之事於是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益觧然其居國}
  - {type: variant, offset: 2922, length: 0, content: '', krp: 朝聘也如淳曰濞不自行也使人代己致請禮師古曰二説皆是也請音材姓反上復責問吳使者使者曰察見淵中魚不祥服䖍曰天子察見下之私則不祥也今吳王始詐疾及覺見責急愈益閉恐上誅之計乃無聊唯上與更始師古曰言赦其已往之事於是天子皆赦吳使者歸之而賜吳王几杖老不朝吳得釋其謀亦益觧然其居國}
