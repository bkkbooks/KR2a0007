  - {type: 'tls:seg', offset: 34, content: '', id: KR2a0007_tls_035-1a.8}
  - {type: variant, offset: 41, length: 384, content: 敢役皆謂之狂生及陳勝項梁等起諸將徇地過高陽者數十人食其聞其將皆握齱好荷禮自用不能聽大度之言食其乃自匿後聞沛公略地陳留郊沛公麾下騎士適食其里中子沛公時時問邑中賢豪騎士歸食其見謂曰吾聞沛公嫚易人有大略此真吾所願從游莫為我先若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生自謂我非狂騎士曰沛公不喜儒諸客冠儒來者沛公輒解其冠溺其中與人言常大罵未可以儒生說也食其曰第言之騎士從容言食其所戒者沛公至高陽傳舍使人召食其食其至入謁沛公方踞床令兩女子洗而見食其食其入即長揖不拜曰足下欲助秦攻諸侯乎欲率諸侯破秦乎沛公罵曰豎儒夫天下同苦秦久矣故諸侯相率攻秦何謂助秦食其曰必欲聚徒合義兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐謝之食其因言六國從衡時沛公喜賜食其食問曰計安出食其曰足下起瓦合之卒收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五達之郊也今其城中又多積粟臣, WYG: ''}
