  - {type: variant, offset: 2900, length: 1, content: 全, WYG: 語人也既以封拜為事臣下皆知之故不改因拊其背師古曰拊摩循之也一曰拊輕擊之音芳羽反曰漢後五十年東南有亂豈若邪然天下同姓一家愼無反濞頓首曰不敢會孝惠髙后時天下初定郡國諸侯各務自拊循其民吳有豫章郡銅山韋昭曰此有豫字誤也但當言章郡今故章也即招致天下亡命}
