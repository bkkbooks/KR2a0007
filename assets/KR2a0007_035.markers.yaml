  - {type: variant, offset: 3015, length: 2, content: 婁敬, WYG: 告越如淳曰告東越使定之也師古曰此説非也言王子定長沙已北而西趣蜀及漢中平定以訖使報南越也走音奏宋祁曰顔注已北當作以北使報當作便報楚王淮南三王與寡人西面師古曰淮南三王謂厲王三子為王者淮南衡山濟北也}
