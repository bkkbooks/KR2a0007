  - {type: variant, offset: 5130, length: 568, content: 百斤通因進曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務九年高帝徙通為太子太傳十二年高帝欲以趙王如意易太子通諫曰昔者晉獻公以驪姬故廢太子立奚齊晉國亂者數十年為天下笑秦以不早定扶蘇胡亥詐立自使滅祀此陛下所親見今太子仁孝天下皆聞之呂后與陛下攻苦食啖其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地高帝曰公罷矣吾特戲耳通曰太子天下本本壹搖天下震動奈何以天下戲高帝曰吾聽公及上置酒見留侯所招客從太子見上遂無易太子志矣高帝崩孝惠即位乃謂通曰先帝園陵寢廟群臣莫習徒通為奉常定宗廟儀法及稍定漢諸儀法皆通所論著也惠帝為東朝長樂宮及問往數蹕煩民作復道方築武庫南通奏事因請間曰陛下何自築復道高帝寢衣冠月出游高廟子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出游之益廣宗廟大孝之本上乃詔有司立原廟惠帝常出游離宮通曰古者有春嘗菓方今櫻桃孰可獻願陛下出因取櫻桃獻宗廟上許之諸菓獻由此興贊曰高祖以征伐定天下而縉紳之徒騁其知辯並成大業語曰廊廟之材非一木之枝帝王之功非一士之略信哉劉敬脫輓輅而建金城之安叔孫通舍枹鼓而立一王之儀遇其時也酈生自匿監門待主然後出猶不免鼎鑊朱建始名廉直既距辟陽不終其節亦以喪身陸賈位止大夫致仕諸呂不受憂責從容平勃之間附會將相以彊社稷身名俱榮其最優乎, WYG: 考證}
