  - {type: variant, offset: 2888, length: 1, content: 與, WYG: 子濞封為沛侯黥布反髙祖自將往誅之濞年二十以騎將從破布軍荆王劉賈為布殺無後宋祁云浙本為布字下有所字上患吳㑹稽輕悍無壯王填之師古曰悍勇也塡音竹刃反}
