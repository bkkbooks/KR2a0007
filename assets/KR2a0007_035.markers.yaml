  - {type: 'tls:seg', offset: 2927, content: '', id: KR2a0007_tls_035-20a.5}
  - {type: variant, offset: 2927, length: 1, content: 孝, WYG: 百姓無賦卒踐更輙予平賈服䖍曰以當為更卒出錢三百謂之過更自行為卒謂之踐更吳王欲得民心為卒者顧其庸隨時月與平賈也晉灼曰謂借人自代為卒者官為出錢顧其時庸平賈也師古曰晉説是也賈讀曰價謂庸直也宋祁曰謂卒踐更皆得庸直也溝洫志蘇林注曰平賈以錢取人作卒顧其時庸之平賈如淳曰律説平賈有得錢二千歳時存問茂材賞賜閭里師古曰茂美也茂材者有美材之人也它郡國吏欲來捕亡人者頌共禁不與如淳曰頌猶公也師古曰頌讀曰容如此者三十餘年以故能使其衆鼂錯為太子家令得幸皇太子數從容言吳過可削師古曰從音子容反數上書説之}
