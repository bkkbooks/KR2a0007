  - {type: variant, offset: 3029, length: 1, content: 高, WYG: 師古曰臨晉闗即今之蒲津闗燕王趙王故與胡王有約燕王北定代雲中轉胡衆入蕭闗走長安匡正天下以安髙廟願王勉之楚元王子淮南三王或不沐洗十餘年怨入骨髓師古曰言心有所懐志不在洗沐也欲壹有所出久矣師古曰謂發兵寡人未得諸王之意未敢聽今諸王茍能存亡繼絶振弱伐暴以安劉氏社稷所願也吳國雖貧寡人節衣食用積金錢脩兵革聚糧食夜以繼日三十餘年矣凡皆為此師古曰為此謂欲反也為音于偽反願諸王勉之能斬捕大將者賜金五千斤封萬户列將三千斤封五千户裨將二千斤封二千户二千石千斤封千户皆為列侯其以軍若城邑降者卒萬人邑萬戸如得大將師古曰以卒萬人或邑萬户來降附者其封賞則與大將同下皆類此人户五千如得列將人戸三千如得裨將人户千如得二千石其小吏皆以差次受爵金它封賜皆倍軍法服䖍曰封賜倍漢之常法其有故爵邑者更益勿因師古曰於舊爵之外特更與之願諸王明以令士大夫不敢欺也寡人金錢在天下者往徃而有非必取於吳師古曰言處處郡國皆有之諸王日夜用之不能盡有當賜者告寡人寡人且往遺之敬以聞七國反書聞天子廼遣太尉條侯周亞夫將三十六將軍往擊吳楚遣曲周侯酈寄擊趙將軍欒布擊齊大將軍竇嬰屯滎陽監齊趙兵初吳楚反書聞兵未發竇嬰言故吳相爰盎召入見上問以吳楚之計盎對曰吳楚相遺書曰賊臣鼂錯擅適諸侯削奪之地師古曰適讀曰讁宋祁曰浙本適字下有過字以故反名為西共誅錯復故地而罷師古曰復音扶目反以下亦同方今計獨斬錯發使赦七國復其故地則兵可毋血刃而俱罷師古曰血刃謂殺傷人而刃著血也上從其議遂斬錯語具在盎傳以盎為㤗常奉宗廟使吳王師古曰奉宗廟之指意也吳王弟子德侯為宗正師古曰德哀侯廣之子也名通輔親戚使至吳師古曰以親戚之意諭説也吳楚兵已攻梁壁矣宗正以親故先入見諭吳王拜受詔吳王聞盎來亦知其欲説笑而應曰我已為東}
