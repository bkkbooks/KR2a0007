  - {type: variant, offset: 2914, length: 3, content: 淮南厲, WYG: 吳太子入見得侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博争道不恭皇太子引博局提吳太子殺之師古曰提擲也音徒計反於是遣其䘮歸𦵏吳吳}
