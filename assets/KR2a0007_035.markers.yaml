  - {type: variant, offset: 2918, length: 3, content: 殺辟陽, WYG: 愠師古曰愠怒也音於問反曰天下一宗師古曰猶言同姓共為一家死長安即𦵏長安何必來𦵏復遣䘮之長安𦵏吳王由是怨望稍失藩臣禮稱疾不朝京師知其以子故驗問實不病諸吳使來輙繫責治之吳王恐所謀滋甚師古曰滋益也及後使人為秋請孟康曰律春曰朝秋曰請如古諸}
