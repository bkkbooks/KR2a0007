  - {type: variant, offset: 3000, length: 0, content: '', WYG: 應髙口説膠西王曰吳王不肖有夙夜之憂師古曰凡言不肖者謂鄙陋無所象似也觧在刑法志不敢自外使使臣諭其愚心王曰何以教之髙曰今者主上任用邪臣聽信䜛賊變更律令師古曰更改也侵削諸侯徵求滋多誅罰良重師古曰滋亦益也良實也信也日以益甚語有之曰狧糠及米師古曰狧古􅜻字􅜻用舌食也盖以犬為喻也言初􅜻糠遂至食米也􅜻音食爾反吳與膠西知名諸侯也一時見察不得安肆矣師古曰肆縱也吳王身有内疾不能朝請二十餘年師古曰内疾謂在身中不顯於外請音材姓反常患見疑無以自白師古曰白明也脅肩絫足猶懼不見釋師古曰脅翕也謂歛之也絫古累字也累足重足也並謂懼耳釋觧也放也竊聞大王以爵事有過所聞諸侯削地罪不至此師古曰言其本罪皆不合削地也此恐不止削地而已王曰有之子將奈何髙曰同惡相助同好相留同情相求同欲相趨同利相死今吳王自以與大王同憂願因時循理弃軀以除患於天下師古曰循順也意亦可乎膠西王瞿然駭曰師古曰瞿然無守之貌音居具反寡人何敢如是主上雖急固有死耳安得不事師古曰安焉也髙曰御史大夫鼂錯營或天子侵奪諸侯師古曰營謂回繞之也蔽忠塞賢朝廷疾怨諸侯皆有背叛之意宋祁曰叛當作畔人事極矣彗星出蝗蟲起此萬世一時而愁勞聖人所以起也吳王内以鼂錯為誅外從大王後車方洋天下師古曰方洋猶翺翔也方音房又音旁洋音羊所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷闗守滎陽敖倉之粟距漢兵治次舎湏大王師古曰次舍息止之處也湏待也大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王猶恐其不果廼身自為使者師古曰濳行而去也至膠西面約之膠西羣臣或聞王謀諫曰諸侯地不能為漢十二師古曰不當漢十分之二為叛逆以憂太后非計也文穎曰王之太后也今承一帝尚云不易假令事成兩主分争患廼益生王不聽遂發使約齊甾川膠東濟南皆許諾諸侯既新削罰震恐多怨錯及削吳會稽豫章郡書至則吳王先起兵誅漢吏二千石以下膠西膠東甾川濟南楚趙亦皆反發兵西齊王後悔背約城守濟北王城壊未完其郎中令劫守王不得發兵膠西王膠東王為渠率師古曰渠大也與甾川濟南共攻圍臨甾趙王遂亦隂}
