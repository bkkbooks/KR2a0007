  - {type: variant, offset: 3003, length: 2, content: 單于, WYG: 與連兵七國之發也吳王悉其士卒師古曰悉盡也盡發使行下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同下與少子等皆發二十餘萬人南使閩東越閩東越亦發兵從孝景前三年正月甲子初起兵於廣陵西渉淮因并楚兵發使遺諸侯書曰吳王劉濞敬問膠西王膠東王甾川王濟南王趙王楚王淮南王衡山王廬江王故長沙王子如淳曰吳芮後四世}
