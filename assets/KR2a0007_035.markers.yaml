  - {type: variant, offset: 499, length: 1, content: 三, WYG: 元}
  - {type: variant, offset: 499, length: 1, content: 三, krp: 元}
  - {type: variant, offset: 501, length: 624, content: 秋項羽擊漢拔滎陽漢兵遁保鞏楚人聞韓信破趙彭越數反梁地則分兵救之韓信方東擊齊漢王數困滎陽成皋計欲捐成皋以東屯鞏雒以距楚食其因曰臣聞之知天之天者王事可成不知天之天者王事不可成王者以民為天而民以食為天夫敖倉天下轉輸久矣臣聞其下乃有臧粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成皋此乃天所以資漢方今楚易取而漢反卻自奪便臣竊以為過矣且兩雄不俱立楚漢久相持不決百姓騷動海內搖蕩農夫釋耒紅女下機天下之心未有所定也願足下急復進兵收取滎陽據敖庾之粟塞成皋之險杜太行之道距飛狐之口守白馬之津以示諸侯形制之勢則天下知所歸矣方今燕趙已定唯齊未下今田廣據千里之齊田間將二十萬之眾軍於歷城諸田宗彊負海岱阻河濟南近楚齊人多變詐足下雖遣數十萬師未可以歲月破也臣請得奉明詔說齊王使為漢而稱東藩上曰善乃從其畫復守敖倉而使食其說齊王曰王知天下之所歸乎曰不知也曰知天下之所歸則齊國可得而有也若不知天下之所歸即齊國未可保也齊王曰天下何歸食其曰天下歸漢齊王曰先生何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王背約不與而王之漢中項王遷殺義帝漢王起蜀漢之兵擊三秦出關而責義帝之負處收天下之兵立諸侯之後降城即以侯其將得賂則以分其士與天下同其利豪英賢材皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下項王有背約之名殺義帝之負於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事為人刻印玩而不能授攻城得賂積財而不能賞天下畔之賢材怨之而莫為之用故天下之士歸於漢王可坐而策也夫漢王發蜀漢, WYG: 還}
