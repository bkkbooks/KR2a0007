  - {type: variant, offset: 5474, length: 0, content: '', WYG: 應劭曰雍翟塞殷韓也如淳曰塞翟魏殷河南也韋昭曰塞翟韓殷魏也雍時已敗師古曰諸家之説皆非也張良遺羽書云漢欲得關中如約卽止不敢復東東謂出關之東今羽聞漢東之時漢固已得三秦矣五諸侯者謂常山河南韓魏殷也此年十月常山王張耳降河南王申陽降韓王鄭昌降三月魏王豹降虜殷王卬皆在漢東之後故知謂此為五諸侯時雖未得常山之地據功臣表云張耳棄國與大臣歸漢則亦有士卒也又叔孫通傳云二年漢王從五諸侯入彭城爾時雍王猶在廢丘被圍卽非五諸侯之數也尋此紀文昭然可曉前賢注釋並失指趣劉攽曰張耳奉頭䑕竄安得有兵五諸侯者陳餘其一也事見餘傳}
