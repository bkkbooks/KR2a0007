  - {type: variant, offset: 10474, length: 0, content: '', WYG: 應劭曰輕罪不至于髠完其耏鬢故曰耏古耐字從彡髪膚之意也杜林以為法度之字皆從寸後改如是言耐罪已上皆當先請也耐音若能如淳曰耐猶任也任其事也師古曰依應氏之説耏當音而如氏之解則音乃代反其義亦兩通耏謂頰旁毛也彡毛髪貎也音所亷反又先亷反而功臣侯表宣曲侯通耏為鬼薪則應氏之説斯為長矣宋祁曰師古曰依應氏之説又云彡毛髮貎余以顔氏之説似不審應意反誤引説文不了其義更有兩通之語且今説文耏無而音止於乃代一音耳案古者能字皆作耐字亦取堪任其事之意後世以三足之能為能故今人書能無有作耐字者應云耐音若能之能能耐自然聲近矣本不為而音也顔云耐謂頰旁毛據説文自訓而字為頰毛耳象毛之形至耐字直釋云罪不至髠則顏謬意而誤説文明矣}
