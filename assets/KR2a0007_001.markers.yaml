  - {type: variant, offset: 1944, length: 0, content: '', WYG: 文穎曰卽閏九月也時律歴廢不知閏謂之後九月如淳曰時因秦以十月為歲首至九月則歲終後九月即閏月師古曰文説非也若以律歴廢不知閏者則當徑謂之十月不應有後九月蓋秦之歴法應置閏者總致之於歲末觀其此意當取左傳所謂歸餘於終耳何以明之據漢書表及史記漢未改秦歴之前迄至高后文帝屢書後九月是知故然非歴廢也劉攽曰余謂顔説後九月亦為未盡秦知置歴有閏何故皆以為九月乎蓋司馬氏為史旣以秦正月稱十月遂以閏月溥謂之後九月是司馬氏如此敘之非秦法也}
