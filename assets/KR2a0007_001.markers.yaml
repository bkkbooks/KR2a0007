  - {type: variant, offset: 13666, length: 0, content: '', WYG: 孟康曰十一月天統物萌色赤故云得天統也臣瓚曰漢承堯緒為火徳秦承周後以火代木得天之統序故曰得天統漢初因秦正至太初元年始用夏正不用十一月為正也師古曰瓚説得之前漢書卷一下前漢書卷一下考證高帝紀下灌嬰追斬羽東城胡三省曰東城故城括地志在定遠東南五十里高起王陵對曰注魏相邴吉奏高帝時奏事臣浩按監本魏相邴吉奏下衍事字蓋涉於下文奏事而誤也今從宋本刪之邴吉依本書當作丙是日車駕西都長安臣召南按史記作是日車駕入都關中是也櫟陽長安俱是關中是日但决計入關營造長安宫殿實則仍居櫟陽故至七年二月書自櫟陽徙都長安也治長樂宫程大昌曰長樂宫本秦之興樂宫周廻二十里高祖改修而居之在長安城東隅西有濁河之限注胡三省曰孟津在河内去平原甚遠晉灼説失之拘蓋河流渾濁故謂之濁河也赦韓信封為淮隂侯臣召南按此文追叙也据功臣表曹參等以十二月甲申封而淮隂侯之封直至四月則知此文為追敘矣以故東陽郡鄣郡呉郡云云劉攽曰云云臣召南按攽所疑是也但灌嬰傳云破呉郡長呉下得呉守遂定呉豫章會稽又功臣表博陽侯周聚布反定呉郡豈項氏嘗分會稽為呉及漢定天下復合為一郡乎攽並疑鄣非秦郡非也漢之丹陽即秦之鄣郡也蕭何治未央宫胡三省曰宫在長安城西南隅周廻二十八里元和志曰東距長樂宫一里中隔武庫夏五月太上皇后通鑑考異曰荀悦漢紀五月無后字七月無崩字蓋荀悦時本尚未訛謬故也秦徙中縣之民南方三郡注如淳曰秦始皇畧取彊梁地臣召南按彊梁地當作陸梁地史記秦始皇本紀三十一年畧取陸梁地為桂林象郡南海是也宋本亦誤存説於此居南方長治之注謂為之長帥而治理之也帥字訛師理字訛李今改正漢别將擊布軍洮水南北臣召南按胡三省謂洮水當在江南甚是但即以零陵郡之洮陽當之零陵去淮南太遠與下文所云追斬布鄱陽者不合也其處者為劉氏孔穎逹左傳疏曰士會之帑在秦不顯於會之身復無所辟傳説處秦為劉氏未知何意討尋上下其文不類深疑此句或非本㫖蓋以為漢室􅀄興捐棄古學左氏不顯於世先儒無以自申劉氏從秦徙魏其源本出劉累揷注此辭將以媚於世明帝時賈逵上疏曰五經皆無證圖䜟明劉氏為堯後者而左氏獨有明文竊謂前世藉此以求道通故後引之以為證耳臣召南按孔疏所見甚卓但加此文於左傳實不始於賈逵且幷不始於哀平之世據昭帝元鳳三年符節令睦𢎞上書言漢家承堯之後則彼時左傳已有此文至劉向頌高祖曰出自唐帝王莽稱漢為堯後有傳國之運班彪王命論曰帝堯之苗裔皆在其後者也前漢書卷一下考證}
