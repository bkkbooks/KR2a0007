  - {type: variant, offset: 1219, length: 0, content: '', WYG: 應劭曰黄帝戰於阪泉以定天下蚩尤亦古天子好五兵故祠祭之求福祥也臣瓚曰孔子三朝記云蚩尤庶人之貪者非天子也管仲曰割廬山發而出水金從之出蚩尤受之以作劍㦸也師古曰瓚所引者同是大戴禮出用兵篇而非三朝記也其餘則如應説沛廷沛縣之廷}
