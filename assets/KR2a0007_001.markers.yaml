  - {type: 'tls:seg', offset: 9729, content: '', id: KR2a0007_tls_001-75a.44}
  - {type: variant, offset: 9729, length: 0, content: '', WYG: 應劭曰齊得十之二耳故愍王稱東帝後復歸之卒為秦所滅者利鈍之勢異也李斐曰齊有山河之限地方二千里是與天下縣隔也設有持㦸百萬之衆齊得十中之二焉百萬十分之二亦二十萬也但文相避故言東西秦其勢敵也蘇林曰十二得十中之二二十萬人當百萬言齊雖固不如秦二萬乃當百萬也晉灼曰案文攷義蘇説是也師古曰蘇晉之釋得其意也秦得百二者二萬人當諸侯百萬人也齊得十二者二十萬人當諸侯百萬也所以言縣隔千里之外者除去秦地而齊乃與諸侯計利便也宋祁曰景德本蘇林注文云十二得十中之二萬人無二十當百萬五字景祐刋誤本據史記注當作二十萬人當百萬又余以為若蘇説已明顏安得更於下解云齊得十二者二十萬人當諸侯百萬也}
