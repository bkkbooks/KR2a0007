  - {type: punctuation, offset: 11805, content: ，, id: KR2a0007_tls_001-bkkpn2669}
  - {type: 'tls:seg', offset: 11805, content: '', id: KR2a0007_tls_001-98a.34}
  - {type: variant, offset: 11805, length: 0, content: '', WYG: 臣瓚曰茂陵書何封國在南陽酇音贊師古曰瓚説是也而或云何封沛郡酇縣音才何反非也案地理志南陽酇縣云侯國沛酇縣不云侯國也又南陽酇者本是春秋時隂國所謂遷隂于下隂者也今為襄州隂城縣有酇城城西見有蕭何廟彼土又有筑水筑水之陽古曰筑陽縣與酇側近連接據何本傳何薨之後子祿無嗣高后封何夫人同為酇侯小子延為筑陽侯孝文罷同更封延為酇侯是知何封酇國兼得筑陽此明驗也但酇字别有音是以沛之縣史記漢書皆作酇字明其音同也班固泗水亭碑以蕭何相國所封與何同韻於義無爽然其封邑實在南陽非沛縣也且地理志云王莽改沛酇曰贊治然則沛酇亦有贊音酇相亂無所取信也説者又引江統徂淮賦以為證此乃統之疏謬不可考覈亦猶潘岳西征以陜之曲沃為成師所居耳斯例甚多不可具載}
