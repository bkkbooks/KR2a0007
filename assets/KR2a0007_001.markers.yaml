  - {type: variant, offset: 10416, length: 0, content: '', WYG: 應劭曰陳平使畫工圖美女間遣人遺閼氏云漢有美女如此今皇帝困厄欲獻之閼氏畏其奪巳寵因謂單于曰漢天子亦有神靈得其土地非能有也於是匈奴開其一角得突出鄭氏曰以計鄙陋故秘不傳師古曰應氏之説出桓譚新論蓋譚以意測之事當然耳非記傳所説也}
