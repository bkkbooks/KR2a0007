  - {type: variant, offset: 12794, length: 0, content: '', WYG: 文穎曰高祖五年以象郡桂林南海長沙立呉芮為長沙王象郡桂林南海屬尉佗佗未降遙虚奪以封芮耳後佗降漢十一年更立佗為南越王自此王三郡芮唯得長沙桂林零陵耳今復封織為南海王復遥奪佗一郡織未得王之劉攽曰零陵武帝始立郡文説誤矣且始敘高帝封呉芮無零陵之文疑亦傳寫妄加之}
