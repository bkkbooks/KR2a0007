  - {type: 'tls:seg', offset: 11049, content: '', id: KR2a0007_tls_001-93a.4}
  - {type: variant, offset: 11049, length: 0, content: '', WYG: 如淳曰王陵傳楚取太上皇吕后為質又項羽歸太公吕后不見歸媼也又上五年追尊母媼為昭靈夫人高后時乃追尊為昭靈后耳漢儀注高帝母兵起時死小黄北後於小黄作陵廟以此二者推之不得有太上皇后崩也李竒曰高祖後母也晉灼曰五年追尊先媼曰昭靈夫人言追尊則明其已亡史記十年春夏無事七月太上皇崩葬櫟陽宫無此夏五月太上皇后崩八字也又漢儀注先媼巳葬陳留小黄師古曰如晉二說皆得之無此太上皇后也諸家之説更有異端適為煩穢不足采也}
