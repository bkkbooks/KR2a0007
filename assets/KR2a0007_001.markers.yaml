  - {type: variant, offset: 12867, length: 0, content: '', WYG: 如淳曰公羊傳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主百官表列侯所食曰國皇后公主所食曰邑帝姊妹曰長公主諸王女曰翁主師古曰如説得之天子不親主婚故謂之公主諸王即自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也高祖答項羽曰吾翁即若翁也揚雄方言云周晉秦隴謂父曰翁而臣瓚王楙或云公者比於上爵或云主者婦人尊稱皆失之劉攽曰予謂公主之稱本出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主則周之事秦不知用也古之嫁女當如周使大夫為主何不謂之夫主乎然則謂之王主者猶言王子也謂之翁主者緣公而生耳}
