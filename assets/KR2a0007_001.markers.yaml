  - {type: variant, offset: 418, length: 0, content: '', WYG: 服䖍曰元長也食邑於魯韋昭曰元諡也師古曰公主惠帝之姊也以其最長故號曰元吕后謂高帝曰張王以魯元故不宜有謀齊悼惠王尊魯元公主為太后當時並已謂之元不得為諡也韋説失之劉攽曰予謂顏舉吕后言以明元非諡未必然也史家記事或有如此追言諡者貫高欲謀叛與張敖言謂為高祖公羊公子翬與桓公言吾為子口隱矣皆此類}
