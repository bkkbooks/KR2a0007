  - {type: variant, offset: 7739, length: 0, content: '', WYG: 前漢書卷一上前漢書卷一上考證高帝紀第一上監本刋此六字於第一行下非也今從古本提行顏注紀理也云云卽解此目後凡某紀某傳俱倣此沛豐邑中陽里人也劉攽曰予謂沛豐郡縣名臣召南按攽説非也史家記事必用當時地名秦無沛郡沛縣屬泗水郡若全記郡縣必云泗水沛矣時蕭何曹參王陵周勃樊噲夏侯嬰周緤周苛周昌任敖皆同縣人而盧綰則同鄉同里故於蕭曹等傳但曰沛人綰傳則曰豐人又曰與高祖同里也師古說是則見交龍於上臣召南按史記作見蛟龍於其上又為泗上亭長史記作為泗水亭長据後書郡國志云沛有泗水亭亭有高祖碑班固為文見固集是亭名泗水不名泗上也引入坐上坐注坐才臥反次如字監本脫如字二字從宋本添又監本於顏注本文十刪四五全非古人之舊今並從宋本添補因餔之宋祁曰餔當作必故反監本脫宋祁一段今從宋本凡三劉刋誤宋祁朱子文諸説别以一圏脫者俱補高祖乃書帛射上城按監本作射城上非也不能完父兄子弟臣召南按監本作父子兄弟非也此及史記皆作父兄子弟故師古注曰老及長者父兄之行少及幼者子弟之黨也今改正沛公攻胡陵方與臣召南按史記本紀此事在上年之末此從月表在二年十月凡漢書月日與史記本紀不同者皆据月表也走至戚注東海之縣也胡三省通鑑注曰以地理考之沛郡與東海相去頗遠壯兵敗而走未必能至東海之戚班志沛郡有廣戚縣章懐太子曰廣戚故城在今徐州沛縣東恐是走至廣戚之戚也臣召南按此説足以正顏注之失至陽城與杠里注孟康曰二縣名也胡三省曰陽城史記作成陽索隱曰在濟陰臣召南按陽城係成陽轉寫之誤不獨史記可證本書曹參傳擊王離軍成陽南又攻杠里大破之卽此事也與魏將皇欣武滿軍合臣召南按功臣表樂平侯衛無擇以隊卒從高祖起沛屬皇訢當卽此皇欣武滿史記作武蒲蒲滿字形相近未知孰是攻開封未拔注師古曰開封縣名屬滎陽臣召南按注非也漢時開封縣屬河南郡其滎陽郡至晉始置繞嶢關踰蕢山宋敏求曰嶢關卽藍田關在藍田縣東南九十里蕢山在縣東南二十五里元年冬十月五星聚於東井臣召南按魏書高允傳允語崔浩曰按星傳金水二星常附日而行冬十月日旦在尾箕昏没於申南而東井方出於寅北何因背日而行是史官欲神其事不復推之於理浩初謂不然後歲餘謂允曰先所論者本不經心及更考究果如君語以前三月聚東井非十月也高允此論足以發千古之蔽司馬溫公通鑑所以於十月之下從史記直言沛公至霸上不言五星聚井劉攽謂五星本以秦十月聚東井高帝廼以夏十月入秦亦卽崔浩前三月之説也羽自立為西楚霸王句上監本衍二月二字從宋本刪去故齊王建孫田安為濟北王臣召南按月表濟北王都博陽遼東王都無終膠東王都卽墨代王都代常山王都襄國此紀於諸國俱言所都而此數國獨闕諸侯罷戲下注顧炎武曰注引一説云時從項羽在戲水之上此説為是蓋羽入咸陽而諸侯自留軍戲下耳他處固有以戲為麾者但云罷麾下似不成文從杜南入蝕中程大昌雍録曰以地望求之關中南靣背礙南山其有微徑可逹漢中者惟子午谷在長安正南其次向西則駱谷此蝕中若非駱谷卽是子午谷拜信為大將軍問以計䇿信對曰云云臣召南按此段語史記但曰韓信與韓王信傳一字不易其上亦無拜大將軍明文似此策本出於韓王信也漢書韓王信傳直用史記而高紀以為淮隂語自相矛盾矣繕治河上塞注臣召南按河上塞卽河上郡之北境與匈奴邊界處非秦時䝉恬所取河南地因河為塞者也蓋自諸侯叛秦匈奴復稍度河南與中國界於故塞匈奴傳可証也河上郡後為馮翊前卽塞王國此時初得其地卽復繕治障塞耳晉灼注以遠在朔方五原者解之非也大戰彭城靈壁東大戰監本訛大敗從宋本改正置河上渭南中地隴西上郡臣召南按史記置郡卽在二年歲首蓋不待章邯自殺其地已入漢也此紀敘於六月蓋因廢邱旣降而總言之割鴻溝以西為漢注監本注後有索隱引張華及北征記一段按此宋本所無而監本自增者也凡索隱說已見史記不當附麗於此今從宋本刪之前漢書卷一上考證欽定四庫全書前漢書卷一下漢蘭臺令史班固撰唐正議大夫行秘書少監琅邪縣開國子顏師古注高帝紀第一下}
