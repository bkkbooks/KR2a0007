  - {type: variant, offset: 2864, length: 2, content: 一過, WYG: 以明王愛養基本不敢窮極使民如承大祭師古曰言常畏懼今陛下輕奪民財不愛民力聼邪臣之計去高敞初陵捐十年功緒師古曰緒謂功作之端次改作昌陵反天地之性因下為高積土為山發徒起邑並治宫館大興繇役重増賦斂徴𤼵如雨師古曰言其多}
