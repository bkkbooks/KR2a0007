  - {type: variant, offset: 1545, length: 3, content: 乃拜成, WYG: 封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦師古曰由從也苦勞苦也由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣如淳曰永}
