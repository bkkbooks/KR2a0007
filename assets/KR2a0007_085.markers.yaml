  - {type: variant, offset: 1556, length: 3, content: 稅肄郡, WYG: 厠之爭臣之末不聼浸潤之譖不食膚受之愬師古曰食猶受納也膚受謂入皮膚至骨髓言其深也雖齊桓晉文用士篤密父悊兄覆育子弟誠無以加師古曰察明也悊智也昔豫子吞炭壊形以奉見異師古曰豫讓也為智伯報讎欲殺趙襄子恐人識之故吞炭以變其聲釁面以壊其形云智伯}
