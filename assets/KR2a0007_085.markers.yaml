  - {type: variant, offset: 2259, length: 430, content: 義縱為內史憚之未敢恣治及縱死張湯敗後徙為廷尉而尹齊為中尉坐法抵罪溫舒復為中尉為人少文居它惛惛不辯至於中尉則心開素習關中俗知豪惡吏豪惡吏盡復為用吏苛察淫惡少年投缿購告言姦置伯落長以收司姦溫舒多諂善事有勢者即無勢視之如奴有勢家雖有姦如山弗犯無勢雖貴戚必侵辱舞文巧請下戶之猾以動大豪其治中尉如此姦猾窮治大氐盡靡爛獄中行論無出者其爪牙吏虎而冠於是中尉部中中猾以下皆伏有勢者為遊聲譽稱治數歲其吏多以權貴富溫舒擊東越還議有不中意坐以法免是時上方欲作通天臺而未有人溫舒請覆中尉脫卒得數萬人作上說拜為少府徙右內史治如其故姦邪少禁坐法失官復為右輔行中尉如故操歲餘會宛軍發詔徵豪吏溫舒匿其吏華成及人有變告溫舒受員騎錢它姦利事罪至族自殺其時兩弟及兩婚家亦各自坐它罪而族光祿勳徐自為曰悲夫夫古有三族而王溫舒罪至同時而五族乎溫舒死家絫千金尹齊東郡茌平人也以刀筆吏稍遷至御史事張湯湯數稱以為廉武帝使督盜賊斬伐不避貴勢遷關都尉聲甚於甯成上以為能拜為中尉吏民益彫敝輕齊木彊少文豪惡吏伏匿而善吏, WYG: 愚劣}
