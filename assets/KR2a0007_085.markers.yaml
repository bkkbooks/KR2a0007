  - {type: variant, offset: 4544, length: 0, content: '', WYG: 稱主人主人謂壻也不稱母母不通也殺謂減降也音所例反昔鄭伯隨姜氏之欲終有叔叚簒國之禍周襄王内迫恵后之難而遭居鄭之危師古曰解並在前漢興吕太后權私親屬又以外孫為孝恵后是時繼嗣不明凡事多晻師古曰晻與暗同晝昏冬雷之變不可勝載竊見陛下行不偏之政毎事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌𫝊相驚恐案春秋災異以指象為言語師古曰謂天不言但以景象指意告喻人故在於得一類而達之也日食眀陽為隂所臨坤卦乘離明夷之象也應劭曰明夷之卦上六不明晦初登于天後入于地明夷者明傷也初登于天者初為天子言以善聞于天也後入于地者傷賢害仁佞惡在朝必以惡終入于地也坤以法地為土為母以安靜為徳震不隂之效也師古曰言地當安静而今乃震是為不遵隂}
