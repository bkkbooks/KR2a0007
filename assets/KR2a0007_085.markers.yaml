  - {type: variant, offset: 2856, length: 2, content: 虜掘, WYG: 樂㿊音千感反蕭該音義曰榜音彭絶滅人命主為趙李報徳復怨師古曰復亦報也音扶福反反除白罪建治正吏師古曰反讀曰幡罪之明白者反而除之吏之公正者建議劾治也多繫無辜掠立迫恐師古曰掠笞服之立其罪名至為人起責分利受謝師古曰言富賈有錢假託其名代之為主放與它人以取利息而共分之或受報謝别取財物生入}
