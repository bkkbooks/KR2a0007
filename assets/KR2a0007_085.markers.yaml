  - {type: variant, offset: 3480, length: 0, content: '', WYG: 破膽寒心師古曰言懼甚豫言之累年下有其萌然後變見於上師古曰萌謂事之始生如草木之萌牙者也可不致慎禍起細微姦生所易師古曰易輕也音弋䜴反願陛下正君臣之義無復與羣小媟黷燕飲師古曰媟狎也黷汙也中黄門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留動三綱之嚴修後宫之政師古曰三綱君臣父子夫婦也抑逺驕妬之寵崇近婉順之行加恵失志之人懐柔怨恨之心師古曰懐和也保至尊之重秉帝王之威朝覲}
