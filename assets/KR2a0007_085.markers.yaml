  - {type: variant, offset: 3486, length: 3, content: 坐相連, WYG: 臣妾之家三者既除内亂之路塞矣諸夏舉兵萌在民飢饉而吏不䘏興於百姓困而賦歛重發於下怨離而上不知易曰屯其膏小貞吉大貞凶孟康曰膏者所以潤人肌膚爵祿亦所以養人者也小貞臣也大貞君也遭屯難飢荒君當開倉廩振百姓而反吝則凶臣吝嗇則吉論語曰出納之吝謂之有司師古曰易屯卦九五爻辭𫝊曰飢而不損兹謂泰厥災水厥咎亡師古曰洪範𫝊之辭訞辭曰闗動牡飛辟為無道臣為非厥咎亂臣謀簒師古曰易訞占之辭也訞即妖字耳王者遭衰難之世有飢饉之災不損用而大自潤故凶百姓困貧無以共求師古曰共讀曰供無以供在上之所求愁悲怨恨故水城闗守國之固固將去焉故牡飛往年}
