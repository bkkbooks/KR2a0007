  - {type: variant, offset: 175, length: 617, content: 樸號為罔漏吞舟之魚而吏治蒸蒸不至於姦黎民艾安由是觀之在彼不在此高后時酷吏獨有侯封刻轢宗室侵辱功臣呂氏已敗遂夷侯封之家孝景時鼂錯以刻深頗用術輔其資而七國之亂發怒於錯錯卒被戮其後郅都甯成之倫郅都河東大陽人也以郎事文帝景帝時為中郎將敢直諫面折大臣於朝嘗從入上林賈姬在廁野彘入廁上目都都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧姬等邪陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞之賜都金百斤上亦賜金百斤由此重都濟南瞷氏宗人三百餘家豪猾二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股粟居歲餘郡中不拾遣旁十餘郡守畏都如大府都為人勇有氣公廉不發私書問遣無所受請寄無所聽常稱曰己背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條侯至貴居也而都揖丞相是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹臨江王徵詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏弗與魏其侯使人間予臨江王臨江王既得為書謝上因自殺竇太后聞之怒以危法中都都免歸家景帝乃使使即拜都為鴈門太守便道之官得以便宜從事匈奴素聞郅都節舉邊為引兵去竟都死不近鴈門匈奴至為偶人象都令騎馳射莫能中其見憚如此匈奴患之乃中都以漢法景帝曰都忠臣欲釋之竇太后曰臨江王獨非忠臣乎於是斬都也甯成南陽穰人也以郎謁者事景帝好氣為少吏必陵其長吏為人上操下急如束溼猾賊任威稍遷至濟南都尉而郅都為守始前數尉步入府因吏謁守如縣令其畏都如此及成往直凌都出其上都素聞其聲善遇與結驩久之都死後, WYG: ''}
