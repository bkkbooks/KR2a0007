  - {type: variant, offset: 2955, length: 157, content: 序是四過也欲請蜀刀問君賈幾何對曰率數百武庫日出兵而陽不知挾偽干君是五過也受詔不至蘭池宮明日又不對假令將軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入將軍能率眾以掩過不僕惶恐對曰願盡死贖罪與王溫舒俱破東越後復與左將軍荀彘俱擊朝鮮為彘所縛語在朝鮮傳還免為庶人病死咸宣楊人也以佐史給事河東守衛將軍青, WYG: 音它歴反上}
