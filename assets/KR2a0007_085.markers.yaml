  - {type: variant, offset: 3452, length: 13, content: 九卿張德等衣繡衣持節虎符發, WYG: 云三朝四月丁酉四方衆星白晝流隕七月辛未彗星横天乘三難之際㑹畜衆多之災異師古曰畜讀曰蓄蓄積聚也因之以飢饉接之以不贍彗星極異也土精所生流隕之應出於飢變之後兵亂作矣厥期不久隆徳積善懼不克濟師古曰修徳積善尚恐不濟況不隆不積者乎内則為深宫後庭將有驕臣悍妾醉酒狂悖卒起之敗師古曰卒讀曰猝北官苑囿街巷之中臣妾之家幽閒之處師古曰閒讀曰閑徴舒崔杼之亂師古曰陳夏徵舒弑其君平國齊崔杼弑其君光外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍内亂朝暮日戒諸夏師古曰内亂則禍在朝暮諸夏則日戒有兵舉}
