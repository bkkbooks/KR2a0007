  - {type: variant, offset: 5533, length: 162, content: 驗有此數事以結延年坐怨望非謗政治不道棄市初延年母從東海來欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良久母乃見之因數責延年幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舍母畢正臘謂延年天道神明人不可獨殺我不意當老見壯, WYG: 育韋𤣥成孫寛}
