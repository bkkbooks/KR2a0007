  - {type: variant, offset: 4516, length: 5, content: 霍光廢昌邑, WYG: 而帝舅陽安侯丁明為大司馬票騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對曰臣聞禽息憂國碎首不恨應劭曰禽息秦大夫薦百里奚而不見納繆公出當車以頭撃闑腦乃播出曰臣生無補於國而不如死也繆公感寤而用百里奚秦以大治卞和獻寶刖足願之師古曰解在鄒陽傳臣幸得奉直言之詔無二者之危敢不極陳臣聞陽尊隂卑卑者隨尊尊者兼卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義師古曰謂婦人在家從父既嫁從夫夫死從子宋祁曰晏本無國字雖有文母之徳必繫於子師古曰文母文}
