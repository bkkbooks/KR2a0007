  - {type: variant, offset: 4054, length: 1, content: 懼, WYG: 乖異也說讀曰悦昔文侯寤大鴈之獻而父子益親師古曰魏文侯廢太子擊立擊弟訢封擊於中山三年不往來擊臣趙倉唐進大鴈於文侯應對以禮文侯感寤廢訢而召立擊父子更親也陳平共壹飯之籑而將相加驩師古曰陳平用陸賈説以五百金為絳侯具食是也共讀曰供宋祁曰籑景本作饌舊本作籑聲類曰饌字或作籑晉灼同聲類籑即饌字蕭該音義曰今人不識籑逐易識作饌字耳所接雖在楹階俎豆之間其於為國折衝厭難豈不逺哉師古曰厭音一葉反竊慕倉唐陸子之義所白奥内唯深察焉師古曰奥内室中隐奥之處也音甚嘉其言由是}
