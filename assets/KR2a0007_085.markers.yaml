  - {type: variant, offset: 1515, length: 1, content: 弘, krp: 繁延夀師古曰即李延夀也一姓繁音蒲河反聞其有茂材除補屬舉為太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純徳懼天地之戒異飭身修政師古曰飭與敕同敕整也納問公卿又下明詔帥舉直言師古曰帥舉謂公卿守相皆令舉也帥字或作師師衆也燕見紬繹以求咎愆師古曰紬讀曰抽紬繹者引其端緒也韋昭曰繹陳也使臣等得造明朝承聖問師古曰造至也音千到反臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心師古曰五事貌言視聼思也大中即皇極也解在五行志則庻徴序於下日月理於上師古曰庻衆也徴證也如人君滛溺後宫般樂游田師古曰如若也般讀與盤同五事失於躬大中之道不立則咎徴降而六極至師古曰六極謂一曰凶短折二曰疾三曰憂四曰貧五曰惡六曰弱凡災異之𤼵各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭牆之内師古曰蕭牆屏牆也解在五行志二者同日俱發以丁寧陛下師古曰丁寧謂再三告示也厥咎不逺宜厚求諸身師古曰厚猶深也意豈陛下志在閨門未䘏政事不慎舉錯師古曰志在閨門謂留心於女色也錯置也音千故反婁失中與師古曰婁古屢字也與讀曰歟下皆類此内寵太盛女不遵道嫉妬専上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於内埶行於外至覆傾國家或亂隂陽師古曰謁請也内則所請必外則擅其權力言女寵盛也行昔襃姒用國宗周以喪師古曰襃姒襃人所獻之女也幽王惑之卒有犬戎之禍閻妻驕扇日以不臧師古曰閻嬖寵之族也扇熾也臧善也魯詩小雅十月之交篇曰此日而食于何不臧又曰閻妻扇方處言厲王無道内寵熾盛政化失理故致災異日為之食為不善也蕭該音義曰劉氏曰閻音滛該按毛詩作艶此其效也經曰皇極皇建其有極師古曰周書洪範之辭也皇大也極中也大立其有中所以行九疇之義也𫝊曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統羣生方内之治亂在陛下所執師古曰方内四方之内也誠留意於正身勉强於力行損燕私之間以勞天下師古曰損減也間讀曰閑勞憂也放去淫溺之樂罷歸倡優之关師古曰关古笑字絶郤不享之義慎節游田之虞師古曰郤退也享當也言所為不善不當天心也一曰天不祐之不歆享其祀也虞與娱同應劭曰享呼庚反起居有常循禮而動躬親政事致行無倦安服若性師古曰致至也安心而服行之如天性自然也經曰繼自今嗣王其毋滛于酒毋逸于游田惟正之共師古曰周書無逸之辭也言從今以往繼業嗣立之王毋過欲於酒毋放於田獵惟宜正身恭己也共讀與恭同未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致慎也宋祁曰南本無致字别本作之所慎也昔舜飭正二女以崇至徳師古曰虞書堯典云釐降二女于媯汭嬪于虞謂堯以二女妻舜觀其治家欲使治國而舜謹敕正躬以待二女其徳益崇遂受堯禪也飭與敕同楚莊忍絶丹姬以成伯功應劭曰楚莊王得丹姬三月不聼朝保申諌忍絶不復見乃勤政事遂為盟主也師古曰丹姬是楚文王姬也莊王用申公巫臣之諫不納夏姬谷永集丹字作夏是也今此傳作丹轉寫誤耳應氏就而謬釋非本實也伯讀曰霸幽王惑於襃姒周徳降亡魯桓脅於齊女社稷以傾師古曰解並在五行志誠修後宫之政明尊卑之序貴者不得嫉妬専寵以絶驕嫚之端抑襃閻之亂賤者咸得秩進各得厥職師古曰秩次也以次而進御也以廣繼嗣之統息白華之怨師古曰詩小雅白華之篇也幽王惑於襃姒而黜申后故國人作此詩以刺之永言此者譏成帝専寵趙昭儀也劉奉世曰按永後疏云建始河平許班之事傾動前朝今之後起天所不享則建始四年未當有趙昭儀也後宫親屬饒之以財勿與政事師古曰與讀曰豫以逺皇父之類損妻黨之權師古曰皇父周卿士也小雅十月之交詩曰皇父卿士番惟司徒刺厲王淫於色故皇父之屬因嬖寵而為官也逺音于萬反父讀曰甫未有閨門治而天下亂者也治逺自近始習善在左右昔龍筦納言而帝命惟允師古曰龍舜臣名也筦字與管同管主也虞書舜典曰帝曰龍命汝作納言夙夜出納朕命惟允允信也四輔既備成王靡有過事師古曰四輔謂左輔右弼前疑後丞也周書洛誥稱成王曰誕保文武受命亂為四輔誠敇正左右齊栗之臣孟康曰左右尚書官也齊栗言其整齊萬事常戰栗謹敬也戴金貂之飾執常伯之職者師古曰常伯侍中也伯長也常使長事者也一曰常任使之人此為長也皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過師古曰孚信也則左右肅艾師古曰肅敬也艾讀曰乂乂治也羣僚仰法化流四方經曰亦惟先正克左右師古曰周書君牙之辭也言王者欲正百官要在能先正其左右近臣也未有左右正而百官枉者也師古曰枉曲也治天下者尊賢考功則治簡賢違功則亂師古曰簡畧也謂輕慢也誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能師古曰程效也考功實以定徳無用比周之虚譽毋聼寖潤之譖愬師古曰比周言阿黨親密也寖潤積漸之深也比音頻寐反則抱功脩職之吏無蔽傷之憂比周邪偽之徒不得即工李竒曰即就也工官也小人日銷俊艾日隆師古曰艾讀曰乂其下亦同經曰三載考績三考黜陟幽明師古曰虞書舜典之辭也言居官者三年一考其功三考則退其幽闇無功者升其昭明有功者又曰九徳咸事俊艾在官師古曰虞書咎繇謨之辭也言使九徳之人皆用事俊桀治能之士並在位也九徳謂寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而㢘剛而塞强而義未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下分絶為十二州制逺之道微孟康曰本九州洪水隔分更為十二州處所離逺相制之道微也師古曰十二州謂冀兗豫青徐荆揚雍梁幽并營也而無乖畔之難者徳厚恩深無怨於下也秦居平土一夫大呼而海内崩析者師古曰呼音火故反刑罰深酷吏行殘賊也夫違天害徳為上取怨於下莫甚乎殘賊之吏誠放退殘賊酷暴之吏錮廢勿用益選温良上徳之士以親萬姓師古曰親謂愛養之平刑釋寃以理民命師古曰釋解也務省繇役毋奪民時薄收賦稅毋殫民財師古曰殫盡也音單使天下黎元咸安家樂業不苦踰時之役師古曰古者行役不踰時時謂三月是為一時不患苛暴之政不疾酷烈之吏師古曰言免此疾患雖有唐堯之大災民無離上之心師古曰堯遭洪水故云大災經曰懐保小人恵于鰥寡師古曰周書無逸之辭也懐和也保安也未有徳厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極師古曰周書洪範之辭饗當也言所行當於天心則降以五福若所為不善則以六極畏罰之五福一曰夀二曰富三曰康寧四曰攸好徳五曰考終命六極之解已具於前𫝊曰六沴作見若不共御六罰既侵六極其下師古曰此洪範之𫝊也沴災氣也共讀曰恭御讀曰禦言敬而修徳以禦災今三年之間災異鋒起小大畢具所行不享上帝師古曰享當也不當天心上帝不豫師古曰豫悦也炳然甚著不求之身無所改正疏舉廣謀又不用其言晉灼曰疏逺也是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南靣之急務唯陛下留神對奏天子異焉特召見永其夏皆令諸方正對策語在杜欽𫝊永對畢因}
