  - {type: variant, offset: 4053, length: 0, content: '', WYG: 王音善平阿侯譚不受城門職後薨上閔悔之乃復令譚弟成都侯商位特進領城門兵得舉吏如將軍府鄴見音前與平阿有隙即說音曰鄴聞人情恩深者其飬謹愛至者其求詳師古曰詳悉也夫戚而不見殊孰能無怨師古曰戚近也殊謂異於疏也此棠棣角弓之詩所為作也師古曰棠棣角弓皆小雅篇名也棠棣美燕兄弟角弓刺不親九族也昔秦伯有千乘之國而不能容其母弟春秋亦書而譏焉師古曰秦景公母弟公子鍼有寵於其父桓公景公立鍼懼而奔晉事在昭元年故經書秦伯之弟鍼出奔晉傳曰稱弟罪秦伯也周召則不然師古曰言周公召公無私怨也忠以相輔義以相匡同己之親等己之尊不以聖徳獨兼國寵又不為長專受榮任分職於陜並為弼疑師古曰分職於陜謂自陜以東周公主之自陜以西召公主之陜即今陜州縣也音式冉反而說者妄云分郟是潁州郟縣繆矣弼疑謂左輔右弼前疑後丞也故内無感恨之隙外無侵侮之羞師古曰感音胡闇反俱享天祐兩荷高名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也將軍宜承順聖意加異往時毎事凡議必與及之指為誠發出於將軍則孰敢不説諭師古曰言此之意指皆出忠誠彼必和悦無}
