  - {type: variant, offset: 2859, length: 0, content: '', WYG: 出者不可勝數是以日食再既以昭其辜孟康曰既盡也師古曰昭明也王者必先自絶然後天絶之陛下棄萬乘之至貴樂家人之賤事師古曰謂私畜田及奴婢財物厭高羙之尊號好匹夫之卑字孟康曰成帝好微行更作私字以相呼崇聚僄輕無義小}
