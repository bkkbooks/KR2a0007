  - {type: variant, offset: 5342, length: 190, content: 當避位去壽昌安得權此後左馮翊缺上欲徵延年符已發為其名酷復止延年疑少府梁丘賀毀之心恨會琅邪太守以視事久病滿三月免延年自知見廢謂丞曰此人尚能去官我反不能去邪又延年察獄史廉有臧不入身延年坐選舉不實貶秩笑曰後敢復有舉人者矣丞義年老頗悖素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之無意毀傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞, WYG: 扶陽侯韋育}
