  - {type: variant, offset: 3447, length: 3, content: 部都尉, WYG: 蕃屏之臣身雖在外其心常當忠篤而在王室臣永幸得給事中出入三年雖執干戈守邊垂思慕之心常存于省闥是以敢越郡吏之職陳累年之憂臣聞天生蒸民不能相治師古曰蒸衆也為立王者以統理之方制海内非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有徳不私一姓明天下廼天下之天下非一人之天下也王者躬行道徳承順天地博愛仁恕恩}
  - {type: page-break, offset: 3447, content: '', id: KR2a0007_WYG_085-21a, image: WYG0250/WYG0250-0703a.png}
  - {type: variant, offset: 3447, length: 3, content: 部都尉, krp: 蕃屏之臣身雖在外其心常當忠篤而在王室臣永幸得給事中出入三年雖執干戈守邊垂思慕之心常存于省闥是以敢越郡吏之職陳累年之憂臣聞天生蒸民不能相治師古曰蒸衆也為立王者以統理之方制海内非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有徳不私一姓明天下廼天下之天下非一人之天下也王者躬行道徳承順天地博愛仁恕恩}
  - {type: variant, offset: 3451, length: 0, content: '', WYG: 行葦師古曰詩大雅行葦之篇曰敦彼行葦牛羊勿踐履言政化所及仁道霑被雖草木至賤無所殘傷籍税取民不過常法宮室車服不踰制度事節財足黎庻和睦則卦氣理效五徴時序百姓夀考庻􅋄蕃滋師古曰庻衆也􅋄古草字也蕃多也音扶元反符瑞並降以昭保右師古曰保安也右助也言為天所安助也右讀曰佑失道妄行逆天暴物窮奢極欲湛湎荒滛師古曰湛讀曰沈婦言是從誅逐仁賢離逖骨肉羣小用事師古曰逖逺也峻刑重賦百姓愁怨則卦氣悖亂咎徴著郵師古曰悖乖也郵字與尤同尤過也悖音布内反上天震怒災異婁降日月薄食五星失行山崩川潰水泉踊出妖孽並見茀星耀光師古曰茀與孛同音歩内反飢饉荐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有徳詩云乃眷西顧此惟予宅師古曰大雅皇矣之詩也言天以殷紂為惡不變乃眷然西顧見文王之徳而與之宅居也夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功徳有厚薄期質有脩短時世有中季天道有盛衰師古曰中讀曰仲陛下承八世之功業當陽數之標季孟康曰陽九之末季也師古曰標音必遥反渉三七之節紀孟康曰至平帝乃三七二百一十嵗之厄今已渉向其節紀遭无妄之卦運應劭曰天必先雲而後雷雷而後雨而今無雲而雷无妄者無所望也萬物无所望於天災異之最大者也師古曰取易之无妄卦為義直百六之災阸師古曰直當也三難異科雜焉同㑹師古曰雜謂相參也一曰雜音先合反雜焉總萃貌建始元年以來二十載間羣災大異交錯鋒起多於春秋所書八世著記久不塞除李竒曰高祖以來至元帝著記災異未塞除也重以今年正月己亥朔日有食之師古曰重音直用反三朝之㑹師古曰嵗月日三者之始}
