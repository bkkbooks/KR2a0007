  - {type: variant, offset: 5105, length: 201, content: 神冬月傳屬縣囚會論府上流血數里河南號曰屠伯令行禁止郡中正清是時張敞為京兆尹素與延年善敞治雖嚴然尚頗有縱舍聞延年用刑刻急乃以書諭之曰昔韓盧之取菟也上觀下獲不甚多殺願次卿少緩誅罰思行此術延年報曰河南天下喉咽二周餘斃莠盛苗穢何可不鉏也自矜伐其能終不衰止時黃霸在潁川以寬恕為治郡中亦平婁蒙豐年鳳皇下上賢焉下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守襃賞反在己前心內不服河南界中又有蝗蟲府丞義出行蝗還見延年延年, WYG: 淳云云劉奉世云云胡三省}
