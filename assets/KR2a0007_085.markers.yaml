  - {type: variant, offset: 2862, length: 1, content: 獲, WYG: 私客師古曰僄疾也音頻妙反又匹妙反數離深宫之固挺身晨夜與羣小相隨師古曰挺引也音大鼎反烏集雜㑹飲醉吏民之家師古曰言聚散不恒如烏鳥之集亂服共坐流湎媟嫚溷殽無别閔免遁樂晝夜在路師古曰閔免猶黽勉也遁流遁也典門户奉宿衞之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡}
