  - {type: variant, offset: 1518, length: 1, content: 居, WYG: 前幸得條對災異之效禍亂所極言闗於聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虚文師古曰角竟也宋祁曰竟疑作競欲末殺災異滿讕誣天師古曰末殺掃滅也滿讕謂欺罔也殺音先曷反讕音來亶反蕭該曰滿讕或音漫是故皇天勃然發怒甲己之間暴風三溱拔樹折木師古曰從甲至己凡六日也溱與臻同臻至也此天至明不可欺之效也上特復問永永對曰日食地震皇后貴妾専寵所致語在五行志是時上初即位謙譲委政元舅大將軍王鳳議者多歸咎焉永知鳳方見柄用師古曰言任用之授以權也隂欲自託乃復曰方今四夷賔服皆為臣妾北無薫粥冒頓之患師古曰粥音弋六反南無趙佗吕嘉之難三垂晏然靡有兵革之警師古曰晏安也諸侯大者乃食數縣漢吏制其權柄不得有為亡呉楚燕梁之埶百官盤互親疏相錯師古曰盤互盤結而交互也錯間雜也互字或作牙言如豕牙之盤曲犬牙之相入也骨肉大臣有申伯之忠師古曰申伯周申后之父洞洞屬屬小心畏忌師古曰洞洞驚肅也屬屬専謹也洞音動屬音之欲反無重合安陽博陛之亂師古曰重合莽通安陽上官桀博陸霍禹也三者無毛髪之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽說欺天者也師古曰檻義取檻柙之檻檻猶開也其字從木瞽説言不中道若無目之人也宋祁曰蘇林曰濫汜也淳音作檻閉也晉灼曰於義蘇音是該案蘇濫汜者字林曰濫汜濫也濫音力暫反如淳曰檻閉者字林曰檻櫳也一曰圏也丁斬反又力甘反宦官或無宦字顏注文開字越本作閉竊恐陛下舍昭昭之白過忽天地之明戒聼晻昧之瞽説師古曰舍謂留也晻字與暗同又音一感反歸咎乎無辜倚異乎政事師古曰倚依也音於綺反次下亦同重失天心師古曰重音直用反不可之大者也師古曰此則為大不可也陛下即位逶任遵舊宋祁曰逶或作委未有過政元年正月白氣較然起乎東方師古曰較明貌也宋祁曰注文也字當刪至其四月黄濁四塞覆冒京師申以大水著以震蝕師古曰申重也著明也各有占應相為表裏百官庻士無所歸倚陛下獨不怪與師古曰倚音於綺反與讀曰歟白氣起東方賤人將興之表也黄濁冒京師王道微絶之應也夫賤人當起而京師道微二者已醜師古曰已甚也陛下誠深察愚臣之言致懼天地之異長思宗廟之計改往反過抗湛溺之意解偏駮之愛師古曰抗舉也湛讀曰沈駮不周普也奮乾剛之威平天覆之施使列妾得人人更進猶尚未足也師古曰更互也音工衡反急復益納宜子婦人毋擇好醜毋避嘗字如淳曰王鳳上小妻弟以納後宫以嘗字乳王章言之坐死今永及此為鳳洗前過也劉奉世曰按王章言事坐誅在陽朔初而永此對乃是建始四年則非為鳳而言也然觀永前後之文實若為鳳但班固於此對後乃云永為上第擢為光禄大夫則同是建始四年中事也毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也師古曰苟得子耳勿論其母之貴賤後宫女史使令有直意者廣求於微賤之間師古曰直當也令音力成反以遇天所開右師古曰右讀曰佑佑助也慰釋皇太后之憂愠師古曰釋散也解謝上帝之譴怒則繼嗣蕃滋災異訖息師古曰蕃多也訖止也蕃音扶元反陛下則不深察愚臣之言忽於天地之戒咎根不除水雨之災}
