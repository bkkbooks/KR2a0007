  - {type: variant, offset: 2878, length: 0, content: '', WYG: 師古曰靡散也音武皮反五年不成而後反故又廣旴營表晉灼曰旴音吁旴大也宋祁曰姚本注末有廣大營表四字發人冢墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異婁降饑饉仍臻師古曰婁古屢字也仍頻也流散冗食餧死於道以百萬數師古曰冗亦散也餧餓也冗音人勇反餧音乃賄反公家無一年之畜百姓無旬日之儲師古曰畜讀曰蓄上下俱匱無以相救詩云殷監不逺在夏后之世師古曰大雅蕩之詩也願陛下追觀夏商周秦所以失之以鏡考已行師古曰鏡謂鑑照之考校也有不合者臣當伏妄言之誅師古曰言上之所為違於節儉與永言同漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯發明聖之徳昭然逺寤畏此上天之威怒深懼危亡之徴兆蕩滌邪辟之惡志師古曰辟讀曰僻厲精致政専心反道師古曰反猶還也絶羣小之私客免不正之詔除師古曰除謂除補為官者悉罷北宫私奴車馬媠出之具師古曰媠亦惰字耳媠出惰游也宋祁曰姚本媠作姷音又耦也蕭該音義媠作姷音侑克己復禮毋貳微行出飲之過師古曰貳謂重為之也論語稱孔子云顏回不貳過以防迫切之禍深惟日食再既之意抑損椒房玉堂之盛寵師古曰椒房皇后所居玉堂嬖妾之舍也毋聼後宫之請謁除掖庭之亂獄出炮烙之陷阱誅戮佞邪之臣及左右執左道以事上者以塞天下之望且寢初陵之作止諸繕治宫室闕更減賦盡休力役師古曰闕亦謂減削之更謂更卒也音工衡反存恤振捄困乏之人以弭逺方師古曰捄古救字也弭安也厲崇忠直放退殘賊無使素餐之吏久尸厚祿以次貫行固執無違師古曰貫聫續也謂上所陳衆條諸事宜次第相續行之不當更違異也貫音工端反宋祁曰工端反當作工斷反夙夜孳孳婁省無怠師古曰婁古屢字也屢省屢自觀省也舊愆畢改新徳既章師古曰章明也纎介之邪不復載心宋祁曰載當作惑則赫赫大異庻幾可銷天命去就庻幾可復師古曰去就者言去離無徳而就有徳社稷宗廟庻幾可保唯陛下留神反覆熟省臣言臣幸得備邊部之吏不知本朝失得瞽言觸忌諱罪當萬死成帝性寛而好文辭又久無繼嗣數為微行多近幸小臣趙李從微賤専寵皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諌勸上納用之永自知有内應展意無所依違師古曰展申也毎言事輙見荅禮師古曰加禮而荅之至上此對上大怒衞}
