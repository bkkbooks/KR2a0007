  - {type: variant, offset: 5696, length: 832, content: 被刑戮也行矣去女東歸埽除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢知其母延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗次弟彭祖至太子太傅在儒林傳尹賞字子心鉅鹿楊氏人也以郡吏察廉為樓煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令坐殘賊免後以御史舉為鄭令永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕俠臧匿亡命而北地大豪浩商等報怨殺義渠長妻子六人往來長安中丞相御史遣掾求逐黨與詔書召捕久之乃得長安中姦猾浸多閭里少年群輩殺吏受賕報仇相與探丸為彈得赤丸者斫武吏得黑丸者斫文吏白者主治喪城中薄暮塵起剽劫行者死傷橫道枹鼓不絕賞以三輔高第選守長安令得壹切便宜從事賞至修治長安獄穿地方深各數丈致令辟為郭以大石覆其口名為虎穴乃部戶曹掾史與鄉吏亭長里正父老伍人雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服鎧扞持刀兵者悉籍記之得數百人賞一朝會長安吏車數百兩分行收捕皆刻以為通行飲食群盜賞親閱見十置一其餘盡以次內虎穴中百人為輩覆以大石數日壹發視皆相枕藉死便輿出瘞寺門桓東楬著其姓名百日後乃令死者家各自發取其尸親屬號哭道路皆歔欷長安中歌之曰安所求子死桓東少年場生時諒不謹枯骨後何葬賞所置皆其魁宿或故吏善家子失計隨輕黠願自改者財數十百人皆貰其罪詭令立功以自贖盡力有效者因親用之為爪牙追捕甚精甘耆姦惡其於凡吏賞視事數月盜賊止郡國亡命散走各歸其處不敢闚長安江湖中多盜賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山群盜起以賞為右輔都尉遷執金吾督大姦猾三輔吏民甚畏之數年卒官疾病且死戒其諸子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢棄無有赦時其羞辱甚於貪汙坐臧慎毋然賞四子皆至郡守長子立為京兆尹皆尚威嚴有治辦名贊曰自郅都以下皆以酷烈為聲然都抗直引是非爭大體張湯以知阿邑人主與俱上下時辯當否國家賴其便趙禹据法守正杜周從諛以少言為重張湯死後罔密事叢以浸耗廢九卿奉職救過不給何暇論繩墨之外乎自是以至哀平酷吏眾多然莫足數此其知名見紀者也其廉者足以為儀表其汙者方略教道壹切禁姦亦質, WYG: 雖}
