  - {type: variant, offset: 806, length: 705, content: 尉其治效郅都其廉弗如然宗室豪桀人皆惴恐武帝即位徙為內史外戚多毀成之短抵罪髡鉗是時九卿死即死少被刑而成刑極自以為不復收乃解脫詐刻傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貫貣陂田千餘頃假貧民役使數千家數年會赦致產數千萬為任俠持吏長短出從數十騎其使民威重於郡守周陽由其父趙兼以淮南王舅侯周陽故因氏焉由以宗家任為郎事文帝景帝時由為郡守武帝即位吏治尚脩謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之所居郡必夷其豪為守視都尉如令為都尉陵太守奪之治汲黯為忮司馬安之文惡俱在二千石列同車未嘗敢均茵馮後由為河東都尉與其守勝屠公爭權相告言勝屠公當抵罪義不受刑自殺而由棄市自甯成周陽由之後事益多民巧法大抵吏治類多成由等矣趙禹斄人也以佐史補中都官用廉為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深不可以居大府武帝時禹以刀筆吏積勞遷為御史上以為能至中大夫與張湯論定律令作見知吏傳相監司以法盡自此始禹為人廉裾為吏以來舍無食客公卿相造請禹終不行報謝務在絕知友賓客之請孤立行一意而已見法輒取亦不履案求官屬陰罪嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王溫舒等後起治峻禹禹以老徙為燕相數歲誖亂有罪免歸後十餘年以壽卒于家義縱河東人也少年時嘗與張次公俱攻剽為群盜縱有姊以醫幸王太后太后問有子兄弟為官者乎姊曰有弟無行不可太后乃告上上拜義姁弟縱為中郎補上黨郡中令治敢往少溫籍縣無逋事舉第一遷為長陵及長安令直法行治不避貴戚以捕桉太后外孫脩成子中上以為能遷為河內都尉至則族滅其豪穰氏之屬河內道不拾遺而張次公亦為郎以勇悍從軍敢深入有功封為岸頭侯甯成家居上欲以為郡守, WYG: ''}
