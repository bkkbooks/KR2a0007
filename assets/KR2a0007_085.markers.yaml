  - {type: variant, offset: 4573, length: 1, content: 農, WYG: 馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日晻然日食師古曰晻音烏感反不在前後臨事而發者明陛下謙遜無専承指非一所言輙聼所欲輙隨師古曰謂皆迫於太后也有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是師古曰尤過也言過惡正在於此欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之師古曰由從也邑於邑也逮身所行不}
