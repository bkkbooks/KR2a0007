  - {type: variant, offset: 1549, length: 6, content: 關都尉歲餘關, WYG: 鳳言而言示腹心大臣無不可矣腹心大臣以為非天意臣當伏妄言之誅則以為誠天意也宋祁曰則字姚本改作即奈何忘國家大本背天意而從欲師古曰從讀曰縱唯陛下省察熟念厚為宗廟計時對者數千人宋祁曰姚本改千作十永與杜欽為上第焉上皆以其書示後宫後上嘗賜許皇后書采永言以責之語在外戚𫝊永既隂為大將軍鳳説矣能實最高由是擢為光禄大夫永奏書謝鳳曰永斗筲之材師古曰筲竹器也斗筲喻小而不大也解在公孫劉田傳筲音所交反質薄學朽無一日之雅左右之介師古曰雅素也介紹也言非宿素之交又無紹介而進也將軍說其狂言師古曰説讀曰悦擢之皂衣之}
