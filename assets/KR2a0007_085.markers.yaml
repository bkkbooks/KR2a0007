  - {type: variant, offset: 4562, length: 5, content: 農田延年持, WYG: 馬新都侯莽退伏第家以詔策決復遣就國高昌侯宏去蕃自絶猶受封土師古曰董宏也制書侍中駙馬都尉遷不忠巧佞免歸故郡師古曰傅遷也閒未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使顯寵過故及陽信侯業皆緣私君國非功義所止師古曰謂緣私恩而得封爵為一國之君耳非有功而侯也諸外家昆弟無賢不肖並侍帷幄布在列位師古曰不問賢與不肖皆親近在位或典}
