  - {type: variant, offset: 2826, length: 0, content: '', WYG: 道字守尾變也意豈將軍忘湛漸之義委曲從順師古曰湛讀曰沈漸讀曰潛周書洪範曰沈潛剛克言人性沈密而潛深者行之以剛則能堪也故激勸之云爾所執不彊不廣用士尚有好惡之忌蕩蕩之徳未純師古曰此永自知有忤於音故以斯言自救解方與將相大臣乖離之萌也何故始襲司馬之號俄而金火並有此變上天至明不虛見異唯將軍畏之慎之深思其故改求其路以享天意音猶不平薦永為䕶菀使者音薨成都侯商代為大司馬衞將軍永乃遷為涼州刺史奏事京師訖當之部時有黑龍見東萊上使尚書問永受所欲言師古曰永有所言令尚書即受之永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輙上聞師古曰如若也有即上聞則商周不易姓而迭興三正不變改而更用師古曰迭音徒結反更音工衡反夏商之將亡也行道之人皆知之師古曰凡在道路行者也晏然自以若天有日莫能危師古曰自謂如日在天而無有能傷危也是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也師古曰下繫之辭也言安必思危存不忘亡乃得保其安存陛下誠垂寛明之聼無忌諱之誅使芻蕘之臣得盡所聞於前不懼於後患直言之路開則四方衆賢不逺千里輻湊陳忠羣臣之上願社稷之長福也漢家行夏正夏正色黒黒龍同姓之象也張晏曰夏以建寅為正萬物在地中色黑今黑龍見同姓象也龍陽徳由小之大師古曰言因小以至大故為王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪將動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能處也師古曰處謂斷決也元年九月宋祁曰元年當作去年黒龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒書曰乃用婦人之言自絶于天師古曰今文周書泰誓之辭婦人妲己言紂用妲己之言自取殄滅非天絶之四方之逋逃多罪是宗是長是信是使師古曰亦泰誓之辭也宗尊也言紂容納逃亡多罪之人親信使用尊而長之詩云燎之方陽能或滅之赫赫宗周襃姒烕之師古曰小雅正月之詩烕亦滅也言火燎方熾寧有能滅之者乎而宗周之盛乃為襃姒所滅怨其甚也烕音呼悦反宋祁曰説文曰烕滅也從火戌聲火死乃戌陽氣至戍而盡音許滅反姚本能作寧注文盛作熾易曰濡其首有孚失是師古曰未濟上九爻辭也言躭樂無節飲酒濡首有信之道於是遂失也濡濕也秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請畧陳其效易曰在中餽無攸遂師古曰家人六二爻辭也餽與饋同饋食也言婦人之道居中主食遜順而已無所必遂言婦人不得與事也師古曰與讀曰豫詩曰懿厥悊婦為梟為鴟匪降自天生自婦人師古曰大雅瞻卬之詩懿羙也悊智也言幽王以悊婦為羙實乃為梟鴟也婦謂襃姒也梟鴟惡聲之鳥故以喻焉又言此禍亂非從天而下以寵襃姒之故生此災耳建始河平之際許班之貴頃動前朝師古曰許皇后及班媫妤之家熏灼四方賞賜無量空虚内臧女寵至極不可上矣師古曰上猶加也今之後起天所不饗什倍于前如淳曰謂趙李本從卑賤起也廢}
