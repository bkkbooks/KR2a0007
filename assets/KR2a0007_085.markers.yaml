  - {type: variant, offset: 3444, length: 2, content: 范昆, krp: 給事中元延元年為北地太守時災異尤數永當之官上使衞尉淳于長受永所欲言永對曰臣永幸得以愚朽之材為大中大夫備拾遺之臣從朝者之後進不能盡思納忠輔宣聖徳退無被堅執鋭討不義之功猥蒙厚恩仍遷至北地太守絶命隕首身膏野草不足以報塞萬分陛下聖徳寛仁不遺易忘之臣師古曰易忘言其微賤不足記也垂周文之聼下及芻蕘之愚有詔使衞尉受臣永所欲言臣聞事君之義有言責者盡其忠師古曰謂職當諫諍有官守者脩其職臣永幸得免於言責之辜有官守之任師古曰言不為諌官但郡守耳當畢力遵職飬綏百姓而已師古曰綏安也不宜復闗得失之辭忠臣之於上志在過厚是故逺不違君死不忘國昔史魚既没餘忠未訖委柩後寑以屍達誠如淳曰禮大夫殯於正室士於適室韓非曰史魚卒委柩後寑衞君弔而問之曰不能進蘧伯玉退彌子瑕以屍諌也汲黯身外思内𤼵憤舒憂遺言李息師古曰謂論張湯也事見黯𫝊經曰雖爾身在外乃心無不在王室師古曰周書康王之誥也言}
