  - {type: variant, offset: 2823, length: 2, content: 功獨, WYG: 位食膏腴之都任周召之職擁天下之樞師古曰擁持也可謂富貴之極宋祁曰之疑作至人臣無二天下之責四面至矣將何以居之宜夙夜孳孳師古曰孳孳不怠也孳與孜同執伊尹之彊徳以守職匡上誅惡不避親愛舉善不避仇讎以章至公立信四方師古曰章明也篤行三者乃可以長堪重任久享盛寵師古曰篤厚也享當也太白出西方六十日法當參天今已過期服䖍曰太白出當居天三分之一已過期言其行遲在戌亥之間尚在桑榆之間質弱而行遲形小而光微如淳曰言其行遲象王音也永見音為司馬以疏間親自以位過故以太白喻司馬司馬主兵故也是永之佞曲從苟合也熒惑角怒明大逆行守尾其逆常也宋祁曰常字下疑}
