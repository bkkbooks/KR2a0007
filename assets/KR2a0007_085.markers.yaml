  - {type: variant, offset: 1541, length: 3, content: 令治民, WYG: 如何也已語終辭也疏賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾師古曰間音居莧反自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也師古曰右讀曰佑三}
