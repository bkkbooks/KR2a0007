  - {type: variant, offset: 2880, length: 74, content: 擁精兵不窮追超然以東越為援是二過也士卒暴露連歲為朝會不置酒將軍不念其勤勞而造佞巧請乘傳行塞因用歸家懷銀黃垂三組夸鄉里是三過也失期內顧以道惡為解失尊尊, WYG: 商密擿永令發去師古曰擿謂𤼵動}
