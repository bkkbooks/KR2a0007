  - {type: variant, offset: 4104, length: 850, content: 軍吏將關東甲卒發奔命以擊義焉復以太僕武讓為積弩將軍屯函谷關將作大匠蒙鄉侯逯並為橫野將軍屯武關羲和紅休侯劉歆為揚武將軍屯宛太保後丞丞陽侯甄邯為大將軍屯霸上常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備莽日抱孺子會群臣而稱曰昔成王幼周公攝政而管蔡挾祿父以畔今翟義亦挾劉信而作亂自古大聖猶懼此況臣莽之斗筲群臣皆曰不遭此變不章聖德莽於是依周書作大誥曰惟居攝二年十月甲子攝皇帝若曰大誥道諸侯王三公列侯于汝卿大夫元士御事不弔天降喪于趙傅丁董洪惟我幼沖孺子當承繼嗣無疆大歷服事予未遭其明悊能道民於安況其能往知天命熙我念孺子若涉淵水予惟往求朕所濟度奔走以傅近奉承高皇帝所受命予豈敢自比於前人乎天降威明用寧帝室遺我居攝寶龜太皇太后以丹石之符乃紹天明意詔予即命居攝踐祚如周公故事反虜故東郡太守翟義擅興師動眾曰有大難于西土西土人亦不靖於是動嚴鄉侯信誕敢犯祖亂宗之序天降威遺我寶龜固知我國有呰災使民不安是天反復右我漢國也粵其聞日宗室之儁有四百人民獻儀九萬夫予敬以終於此謀繼嗣圖功我有大事休予卜并吉故我出大將告郡太守諸侯相令長曰予得吉卜予惟以汝于伐東郡嚴鄉逋播臣爾國君或者無不反曰難大民亦不靜亦惟在帝宮諸侯宗室於小子族父敬不可征帝不違卜故予為沖人長思厥難曰烏虖義信所犯誠動鰥寡哀哉予遭天役遺大解難於予身以為孺子不身自卹予義彼國君泉陵侯上書曰成王幼弱周公踐天子位以治天下六年朝諸侯於明堂制禮樂班度量而天下大服太皇太后承順天心成居攝之義皇太子為孝平皇帝子年在襁褓宜且為子知為人子道令皇太后得加慈母恩畜養成就加元服然後復子明辟熙為我儒子之故予惟趙傅丁董之亂遏絕繼嗣變剝適庶危亂漢朝以成三𨸷隊極厥命烏虖害其可不旅力同心戒之哉予不敢僭上帝命天休於安帝室興我漢國惟卜用克綏受茲命今天其相民況亦惟卜用太皇太后肇有元城沙鹿之右陰精女主聖明之祥配元生成以興我天下之符遂獲西王母之應神靈之徵以祐我帝室以安我大宗以紹我後嗣以繼我漢功厥害適統不宗元緒者辟不違親辜不避戚夫豈不愛亦惟帝室是以廣立王侯並建曾玄俾屏我, WYG: ''}
