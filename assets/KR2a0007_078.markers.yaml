  - {type: variant, offset: 835, length: 652, content: 敬長爵位上下之禮王道綱紀春秋之義尊上公謂之宰海內無不統焉丞相進見聖主御坐為起在輿為下群臣宜皆承順聖化以視四方勳吏二千石幸得奉使不遵禮儀輕謾宰相賤易上卿而又詘節失度邪讇無常色厲內荏墮國體亂朝廷之序不宜處位臣請下丞相免勳時太中大夫平當給事中奏言方進國之司直不自敕正以先群下前親犯令行馳道中司隸慶平心舉劾方進不自責悔而內挾私恨伺記慶之從容語言以詆欺成罪後丞相宣以一不道賊請遣掾督趣司隸校尉司隸校尉勳自奏暴於朝廷今方進復舉奏勳議者以為方進不以道德輔正丞相苟阿助大臣欲必勝立威宜抑絕其原勳素行公直姦人所惡可少寬假使遂其功名上以方進所舉應科不得用逆詐廢正法遂貶勳為昌陵令方進旬歲間免兩司隸朝廷由是憚之丞相宣甚器重焉常誡掾史謹事司直翟君必在相位不久是時起昌陵營作陵邑貴戚近臣子弟賓客多辜權榷為姦利者方進部掾史覆案發大姦贓數千萬上以為任公卿欲試以治民徙方進為京兆尹搏擊豪彊京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜方進心知所謂其後少弛威嚴居官三歲永始二年遷御史大夫數月會丞相薛宣坐廣漢盜賊群起及太皇太后喪時三輔吏並徵發為姦免為庶人方進亦坐為京兆尹時奉喪事煩擾百姓左遷執金吾二十餘日丞相官缺群臣多舉方進上亦器其能遂擢方進為丞相封高陵侯食邑千戶身既富貴而後母尚在方進內行修飾供養甚篤及後母終既葬三十六日除服起視事以為身備漢相不敢踰國家之制為相公絜請託不行郡國持法刻深舉奏牧守九卿峻文深詆中傷者尤多如陳咸朱博蕭育逢信孫閎之屬皆京師世家以材能少歷牧守列卿知名當世而方進特立後起十餘年間至宰相據法以彈咸, WYG: 仲翁}
