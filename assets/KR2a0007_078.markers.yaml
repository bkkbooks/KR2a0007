  - {type: variant, offset: 2044, length: 0, content: '', krp: 時上初即位不省謁者召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事宋祁曰令出視事疑作今出視事一本作出乃使視事恭顯因使髙宋祁曰恭顯因使髙疑作恭顯乃因史髙言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因决免於是制詔丞相御史前將軍望之傅朕八年亡它罪過今事久遠識忘難明師古曰言不能盡記有遺忘者故難明其赦望之罪收前將軍光祿勲印綬及堪更生皆免為庶人而朋為黃門郎後數月制詔御史國之將興尊師而重傅故前將軍望之傅朕八年道以經術厥功茂焉師古曰道讀曰導茂美也其賜望之爵關内侯食邑六百戶給事中朝朔望坐次將軍天子方倚欲以為丞相師古曰倚音於綺反會望之子散騎中郎伋上書訟望之前事師古曰伋音級事下有司復奏望之前所坐明白無譛訴者師古曰言望之自有罪非人讒譛而訴之也而教子上書稱引亡辜之詩失大臣體不敬請逮捕𢎞恭石顯等知望之素高節不詘辱建白望之師古曰建立此議而白之於天子前為將軍輔政欲排退許史專權擅朝幸得不坐復賜爵邑與聞政事師古曰與讀曰豫不悔過服罪深懐怨望教子上書歸非於上師古曰言歸惡於天子也自以託師傅懐終不坐師古曰言恃舊恩自謂終無罪坐懐此心非頗詘望之於牢獄塞其怏怏心則聖朝亡以施恩厚服䖍曰非不也上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必亡所憂上乃可其奏顯等封以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第宋祁曰越本車作軍字使者至召望之望之欲自殺其夫人止之以為非天子意望之以問門下生朱雲雲者好節士勸望之自裁於是望之卬天歎曰師古曰卬讀曰仰吾嘗備位將相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰游師古曰朱雲字游呼其字趣和藥來無久留我死師古曰趣讀曰促竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃卻食為之涕泣哀慟左右師古曰慟動也於是召顯等責問以議不詳師古曰詳審也皆免冠謝良久然後已望之有罪死有司請絶其爵邑有詔加恩長子伋嗣為關内侯天子追念望之不忘每歲時遣使者祠祭望之冢終元帝世望之八子至大官者育咸由育字次君少以父任為太子庶子元帝即位為郎病免後為御史大將軍王鳳以育名父子著材能除為功曹遷謁者使匈奴副校尉師古曰時令校尉為使於匈奴而育為之副使故授副校尉也後為茂陵令會課育第六師古曰如今之考第髙下而漆令郭舜殿見責問師古曰殿後也言有所負最居下也殿音登見反育為之請扶風怒曰君課第六裁自脫師古曰脫免也音吐活反何暇欲為左右言師古曰左右者言與同列在其左右若今言旁人也及罷出傳召茂陵令詣後曹如淳曰賊曹決曹皆後曹當以職事對師古曰忿其為漆令言故欲以職事責之宋祁曰注文忿字越本作怒育徑出曹書佐隨牽育育案佩刀曰蕭育杜陵男子何詣曹也師古曰自言欲免官而去但是杜陵一白衣男子耳何須召我詣曹乎遂趨出欲去官明旦詔召入拜為司𨽻校尉育過扶風府門官屬掾史數百人拜謁車下後坐失大將軍指免官復為中郎將使匈奴歴冀州青州兩部刺史長水校尉泰山太守入守大鴻臚以鄠名賊梁子政阻山為害久不伏辜師古曰名賊者自顯其名無所避匿言其事也宋祁曰注文事字當作彊字育為右扶風數月盡誅子政等坐與}
