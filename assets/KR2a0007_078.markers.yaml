  - {type: variant, offset: 2040, length: 0, content: '', krp: 初匈奴呼韓邪單于來朝詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截師古曰商頌長發之詩也率循也遂徧也既盡也發行也相土契之孫也烈烈威也截齊也言殷宗受命為諸侯能修禮度無有所踰越也徧省視之教令盡行而相土之威烈烈然盛四海之外皆整齊宋祁曰注末當有也字陛下聖德充塞天地師古曰充實也塞滿也光被四表師古曰四表四海之外匈奴單于鄉風慕化奉珍朝賀師古曰鄉讀曰嚮自古未之有也其禮儀宜如諸侯王位次在下宋祁曰如疑作加望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也師古曰易謙卦之辭曰謙亨天道下濟而光明地道卑而上行言謙之為德無所不通也亨音火庚反書曰戎狄荒服師古曰逸書也言其來服荒忽亡常如使匈奴後嗣卒有鳥竄䑕伏闕於朝享不為畔臣師古曰卒終也本以客禮待之若後不來非叛臣信讓行乎蠻貉福祚流于亡窮萬世之長䇿也天子采之下詔曰蓋聞五帝三王教化所不施不及以政今匈奴單于稱北藩朝正朔朕之不逮德不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名及宣帝寢疾選大臣可屬者師古曰屬音之欲反引外屬}
  - {type: variant, offset: 2042, length: 1, content: 衛, WYG: 樂陵侯史髙太子太傅望之少傅周堪至禁中拜髙為大司馬車騎將軍望之為前將軍光祿勲堪為光祿大夫皆受遺詔輔政領尚書事宣帝崩太子襲尊號是為孝元帝望之堪本以師傅見尊重上即位數宴見言治亂陳王事望之選白宗室明經逹學散騎諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸道上以古制師古曰道讀曰導多所欲匡正上甚鄉納之師古曰鄉讀曰嚮意信嚮之而納用其言初宣帝不甚從儒術任用法律而中書宦官用事中書令宏恭石顯久典樞機明習文法亦與車騎將軍髙為表裏論議常獨持故事不從望之等恭顯又時傾仄見詘文頴曰恭顯心不自安也師古曰文説非也言其不能持正故議論大事見詘於天子也仄古側字望之以為中書政本宜以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人之義師古曰禮曰刑人不在君側也白欲更置士人繇是大與髙恭顯忤師古曰繇讀與由同忤謂相違逆也上初即位謙讓重改作師古曰重難也未欲更置士人於中書也議久不定出劉更生為宗正望之堪數薦名儒茂材以備諫官會稽鄭朋隂欲附望之上疏言車騎將軍髙遣客為姦利郡國及言許史子弟罪過章視周堪師古曰視讀曰示以朋所奏之章示堪也堪白令朋待詔金馬門朋奏記望之曰將軍體周召之德秉公綽之質有卞莊之威師古曰周謂周公旦召謂召公奭公綽孟公綽也廉正寡欲卞莊子魯卞邑大夫蓋勇士也召讀曰邵至乎耳順之年師古曰論語孔子曰六十而耳順履折衝之位號至將軍誠士之髙致也窟穴黎庶莫不懽喜咸曰將軍其人也師古曰國家委任誠得其人也今將軍䂓橅云若管晏而休遂行日仄至周召乃留乎師古曰問望之立意當趣如管晏而止為欲恢廓其道日昃不食追周召之蹟然後已乎橅讀曰模其字從木若管晏而休則下走將歸延陵之臯應劭曰下走僕也張晏曰吳公子札食邑延陵薄吳王之行弃國而耕於臯澤朋云望之所為若但如管晏則不處漢朝將歸會稽尋延陵之軌隱耕臯澤之中也師古曰下走者自謙言趨走之役也修農圃之疇師古曰美田曰疇畜雞種黍竢見二子没齒而已矣師古曰論語云子路從而後遇丈人以杖荷蓧止子路宿殺雞為黍而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣朋之所云蓋謂此也竢古俟字也俟待也没齒終身也蓧草器也音徒釣反如將軍昭然度行積思塞邪枉之險蹊宣中庸之常政師古曰度行度越常檢而為髙行也蹊徑謂道也音奚興周召之遺業親日仄之兼聽則下走其庶幾願竭區區底厲鋒鍔師古曰鋒刃端也鍔刃旁也音五各反奉萬分之一望之見納朋接待以意師古曰與之相見納用其説也朋數稱述望之短車騎將軍師古曰短謂毁其短惡也言許史過失後朋行傾邪望之絶不與通朋與大司農史李宮俱待詔堪獨白宮為黃門郎朋楚士怨恨張晏曰朋會稽人會稽并屬楚蘇林曰楚人脃急也更求入許史推所言許史事曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一中書令在旁知我言狀望之聞之以問宏恭石顯顯恭恐望之自訟下於它吏即挾朋及待詔華龍師古曰華音胡化反龍者宣帝時與張子蟜等待詔師古曰蟜音巨遙反字或作僑以行汙濊不進師古曰濊與穢同欲入堪等堪等不納故與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀候望之出休日令朋龍上之事下𢎞恭問狀望之對曰外戚在位多奢滛欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譛訴大臣毁離親戚欲以專擅權埶為臣不忠誣上不道請謁者召致廷}
