  - {type: variant, offset: 3441, length: 489, content: 立語言自若須臾義至內謁徑入立乃走下義既還大怒陽以他事召立至以主守盜十金賊殺不辜部掾夏恢等收縛立傳送鄧獄恢亦以宛大縣恐見篡奪白義可因隨後行縣送鄧義曰欲令都尉自送則如勿收邪載環宛市乃送吏民不敢動威震南陽立家輕騎馳從武關入語曲陽侯曲陽侯白成帝帝以問丞相方進遣吏敕義出宛令宛令已出吏還白狀方進曰小兒未知為吏也其意以為入獄當輒死矣後義坐法免起家而為弘農太守遷河內太守青州牧所居著名有父風烈徙為東郡太守數歲平帝崩王莽居攝義心惡之乃謂姊子上蔡陳豐曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望必代漢家其漸可見方今宗室衰弱外無彊蕃天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慚於先帝今欲發之乃肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀及東郡王孫慶素有勇略以明兵法徵在京師義乃詐移書以重罪傳逮慶於是以九月都試日斬觀令因勒其車騎材官士募郡中勇敢部署將帥嚴鄉侯信者東平王雲子也雲誅死信兄開明嗣為王薨無子而信子匡復立為王故義舉兵并東平立信為天子義自號, WYG: ''}
