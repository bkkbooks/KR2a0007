  - {type: variant, offset: 1638, length: 296, content: 人皆名卿俱在選中而方進得之會丞相宣有事與方進相連上使五二千石雜問丞相御史咸詰責方進冀得其處方進心恨初大將軍鳳奏除陳湯為中郎與從事鳳薨後從弟車騎將軍音代鳳輔政亦厚湯逢信陳咸皆與湯善湯數稱之於鳳音所久之音薨鳳弟成都侯商復為大司馬衛將軍輔政商素憎陳湯白其罪過下有司案驗遂免湯徙敦煌時方進新為丞相陳咸內懼不安乃令小冠杜子夏往觀其意微自解說子夏既過方進揣知其指不敢發言居亡何方進奏咸與逢信邪枉貪汙營私多欲皆知陳湯姦佞傾覆利口不軌而親交賂遺以求薦舉後為少府數饋遺湯信咸幸得備九卿不思盡忠正身內自知行辟亡功效而官媚邪臣欲以徼幸苟得亡恥孔子曰鄙夫可與事君也與哉咸信之謂也過惡暴見不宜處位臣請免以示天下奏可後二, WYG: ''}
