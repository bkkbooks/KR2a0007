  - {type: variant, offset: 2035, length: 0, content: '', krp: 坐弟犯法不得宿衛免歸為郡吏及御史大夫魏相宋祁曰浙本無及字除望之為屬察廉為大行治禮丞時大將軍光薨子禹復為大司馬兄子山領尚書師古曰霍山去病之孫今云兄子者轉寫誤爾親屬皆宿衞内侍地節三年夏京師雨雹望之因是上疏願賜清閒之宴口陳災異之意師古曰間讀曰閑宣帝自在民間聞望之名曰此東海蕭生邪下少府宋畸問狀師古曰畸音居宜反無有所諱望之對以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害師古曰鄉讀曰嚮亡讀曰無今陛下以聖德居位思政求賢堯舜之用心也然而善祥未臻隂陽不和是大臣任政一姓擅埶之所致也附枝大者賊本心私家盛者公室危師古曰本心樹之本株也唯明主躬萬機宋祁曰一本作躬親浙本無選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣對奏天子拜望之為謁者時上初即位思進賢良多上書言便宜輙下望之問狀髙者請丞相御史師古曰望之以其人所言之狀請于丞相御史或以奏聞即見超擢劉奉世曰顔非也髙者則令丞相御史試事次者則令中二千石試事歲滿各以狀聞誤斷其文爾劉敞説同次者中二千石試事滿歲以狀聞師古曰試令行其所言之事或以諸它職事試之下者報聞或罷歸田里所白處奏皆可師古曰當主上之意也累遷諫大夫丞相司直歲中三遷官至二千石其後霍氏竟謀反誅望之寖益任用師古曰寖漸也是時選博士諫大夫通政事者補郡國守相以望之為平原太守望之雅意在本朝遠為郡守内不自得乃上疏曰陛下哀愍百姓恐德化之不究師古曰究竟也謂周徧於天下悉出諌官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無逹士則不聞善師古曰逹士謂逹於政事也願陛下選明經術温故知新通於幾微謀慮之士以為内臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎師古曰周成康二王致太平也宋祁曰乎一作矣外郡不治豈足憂哉書聞徵入守少府宣帝察望之經明持重論議有餘材任宰相師古曰任堪也欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病師古曰移病謂移書言病一曰以病而移居上聞之使侍中成都侯金安上諭意曰所用皆更治民以考功師古曰更猶經歴也音工衡反君前為平原太守日淺故復試之於三輔非有所聞也師古曰所聞謂聞其短失望之即視事是歲西羌反漢遣後將軍征之京兆尹張敞上書言國兵在外軍以夏發隴西以北安定以西吏民並給轉輸田事頗廢素無餘積雖羌虜以破來春民食必之窮辟之處買亡所得師古曰辟讀曰僻縣官穀度不足以振之師古曰度音徒各反願令諸有辠非盜受財宋祁曰浙本改財作賕殺人及犯法不得赦者皆得以差入穀此八郡贖罪師古曰差次也八郡即隴西以北安定以西務益致穀以豫備百姓之急事下有司望之與少府李彊議以為民函隂陽之氣師古曰函與含同也宋祁曰注未也當刪有好義欲利之心在教化之所助堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分在於義利而已道民不可不慎也師古曰道讀曰導今欲令民量粟以贖罪如此則富者得生貧者獨死是貧富異刑而法不壹也宋祁曰壹或作一人情貧窮父兄囚執聞出財得以生活為人子弟者將不顧死亡之患敗亂之行以赴財利求救親戚一人得生十人以喪如此伯夷之行壞公綽之名滅師古曰公綽魯大夫孟公綽也論語稱孔子曰若臧武仲之智公綽之不欲卞莊子之勇冉求之蓺文之以禮樂可以為成人矣政教壹傾雖有周召之佐恐不能復師古曰召讀曰卲復扶目反古者臧於民不足則取有餘則予詩曰爰及矜人哀此鰥寡師古曰小雅鴻鴈之詩也矜人可哀矜之人謂貧弱者也言王者惠澤下及哀矜之人以至鰥寡上惠下也又曰雨我公田遂及我私師古曰小雅大田之詩也言衆庶喜於時雨先潤公田又及私田是則其心先公後私雨于具反宋祁曰注文于字上當有音字下急上也今有西邊之役民失作業雖戸賦口斂以贍其困乏師古曰率戸而賦計口而斂也古之通義百姓莫以為非以死救生恐未可也師古曰子弟竭死以救父兄令其生也陛下布德施教教化既成堯舜亡以加也今議開利路以傷既成之化臣竊痛之於是天子復下其議兩府丞相御史以難問張敞敞曰少府左馮翊所言常人之所守耳昔先帝征四夷兵行三十餘年百姓猶不加賦而軍用給今羌虜一隅小夷跳梁於山谷間漢但令辠人出財減辠以誅之其名賢於煩擾良民橫興賦歛也師古曰横音胡孟反又諸盜及殺人犯不道者百姓所疾苦也皆不得贖首匿見知縱所不當得為之屬議者或頗言其法可蠲除師古曰以其罪輕而法重故常欲除此科條今因此令贖其便明甚何化之所亂甫刑之罰小過赦薄罪贖師古曰吕侯為周穆王司寇作贖刑之法謂之呂刑後改為甫侯故又稱甫刑也有金選之品應劭曰選音刷金銖兩名也師古曰音刷是也字本作鋝鋝即鍰也其重十一銖二十五分銖之十三一曰重六兩呂刑曰墨辟疑赦其罸百鍰劓辟疑赦其罰惟倍剕辟疑赦其罰倍差宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰是其品也所從來久矣何賊之所生敞備皁衣二十餘年如淳曰雖有五時服至朝皆著皁衣嘗聞罪人贖矣未聞盜賊起也竊憐涼州被寇方秋饒時民尚有飢乏病死於道路况至來春將大困乎宋祁曰大字上疑有不字不早慮所以振救之䇿而引常經以難恐後為重責常人可與守經未可與權也敞幸得備列卿以輔兩府為職不敢不盡愚望之彊復對曰先帝聖德賢良在位作憲埀法為無窮之規永惟邊竟之不贍師古曰惟思也竟讀曰境其下亦同故金布令甲曰師古曰金布者令篇名也其上有府庫金錢布帛之事因以名篇令甲者其篇甲乙之次邊郡數被兵離飢寒師古曰離遭也夭絶天年父子相失令天下共給其費師古曰同共給之也自此以上令甲之文固為軍旅卒暴之事也師古曰卒讀曰猝言此令文專為軍旅猝暴而施設宋祁曰注文疑有之字聞天漢四年常使死罪人入五十萬錢減死罪一等豪彊吏民請奪假貣師古曰貣音土得反至為盜賊以贖罪其後姦邪橫暴羣盜並起師古曰横音胡孟反至攻城邑殺郡守充滿山谷吏不能禁明詔遣繡衣使者以興兵擊之師古曰軍興之法也宋祁曰浙本無興字劉攽曰當云以軍興兵擊之誅者過半然後衰止愚以為此使死罪贖之敗也故曰不便時丞相魏相御史大夫丙吉亦以為羌虜且破轉輸略足相給遂不施敞議望之為左馮翊三年京師稱之遷大鴻臚先是烏孫昆彌翁歸靡因長羅侯常惠上書師古曰昆彌烏孫之王號也翁歸靡其人名也願以漢外孫元貴靡為嗣得復尚少主蘇林曰宗室女也結婚内附畔去匈奴詔下公卿議望之以為烏孫絶域信其羙言萬里結婚非長策也天子不聽神爵二年遣長羅侯惠使送公主配元貴靡未出塞翁歸靡死其兄子狂王背約自立惠從塞下上書願留少主敦煌郡惠至烏孫責以負約因立元貴靡還迎少主詔下公卿議望之復以為不可烏孫持兩端亡堅約其效可見前少主在烏孫四十餘年恩愛不親密邊境未以安此已事之驗也今少主以元貴靡不得立而還信無負於四夷此中國之大福也少主不止繇役將興其原起此天子從其議徵少主還後烏孫雖分國兩立以元貴靡為大昆彌漢遂不復與結婚三年代丙吉為御史大夫五鳯中匈奴大亂議者多曰匈奴為害日乆可因其壞亂舉兵滅之詔遣中朝大司馬車騎將軍韓増諸吏富平侯張延壽光祿勲楊惲太僕戴長樂問望之計䇿望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐喪師古曰士匄晉大夫范宣子也春秋公羊傳襄十九年齊侯環卒晉士匄帥師侵齊至穀聞齊侯卒乃還還者何善辭也大其不伐喪也以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟蘇林曰弟順也師古曰鄉讀曰嚮弟音悌劉奉世曰漢興匈奴嘗約為兄弟此弟直自謂為弟耳遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走遠遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂䝉恩得復其位必稱臣服從此德之盛也上從其議後竟遣兵護輔呼韓邪單于定其國是時大司農中丞耿壽昌奏設常平倉上善之望之非壽昌師古曰此望之不知權道丞相丙吉年老上重焉望之又奏言百姓或乏困盜賊未止二千石多材下不任職三公非其人則三光為之不明今首歲日月少光師古曰首歲歲之初首謂正月也咎在臣等上以望之意輕丞相師古曰言三公非其人又云咎在臣等是其意毁丞相乃下侍中建章衞尉金安上光祿勲楊惲御史中丞王忠并詰問望之師古曰三人同共問之望之免冠置對天子繇是不説師古曰繇讀與由同説讀曰悦後丞相司直緐延壽師古曰緐音婆奏侍中謁者良使承制詔望之望之再拜已良與望之言望之不起因故下手蘇林曰伏地而言也而謂御史曰良禮不備故事丞相病明日御史大夫輙問病朝奏事會庭中差居丞相宋祁曰南本庭作廷下同後丞相謝大夫少進揖今丞相數病望之不問病會庭中與丞相鈞禮師古曰不為前後之差也時議事不合意望之曰侯年寧能父我邪服䖍曰寜能與吾父同年邪劉攽曰言侯年雖髙寧能為我父邪不足敬也劉奉世曰此直謂其安能為我之父輕之之辭知御史有令不得擅使望之多使守史自給車馬之杜陵護視家事如淳曰漢儀注御史大夫史員四十五人皆六百石其十五人給事殿中其餘三十人留守治百事皆冠法冠師古曰自給車馬者令其自乘私車馬也少史冠法冠為妻先引蘇林曰少史曹史之下者也文頴曰先引謂導車前宋祁曰注末當添也字又使賣買私所附益凡十萬三千師古曰使其史為望之家有所賣買而史以其私錢增益之用潤望之也案望之大臣通經術居九卿之右師古曰右上也本朝所仰至不奉法自修踞慢不遜攘師古曰攘古讓字受所監臧二百五十以上師古曰二百五十以上者當時律令坐罪之次若今律條言一尺以上一疋以上矣請逮捕繫治上於是䇿望之曰有司奏君責使者禮遇丞相亡禮廉聲不聞敖慢不遜師古曰敖讀曰傲亡以扶政帥先百僚君不深思陷于玆穢朕不忍致君于理使光祿勲惲䇿詔左遷君為太子太傅授印其上故印使者師古曰使者即謂楊惲也命惲授太傅印而望之以大夫印上於惲便道之官君其秉道明孝正直是與帥意亡諐靡有後言師古曰諐古愆字後言謂自申理望之既左遷而黃霸代為御史大夫數月間丙吉薨霸為丞相霸薨于定國復代焉望之遂見廢不得相為太傅以論語禮服授}
