  - {type: variant, offset: 6516, length: 300, content: 虜劉信翟義誖逆作亂於東而芒竹群盜趙明霍鴻造逆西土遣武將征討咸伏其辜惟信義等始發自濮陽結姦無鹽殄滅於圉趙明依阻槐里環隄霍鴻負倚盩厔芒竹咸用破碎亡有餘類其取反虜逆賊之鯨鯢聚之通路之旁濮陽無鹽圉槐里盩厔凡五所各方六丈高六尺築為武軍封以為大戮薦樹之棘建表木高丈六尺書曰反虜逆賊鯨鯢在所長吏常以秋循行勿令壞敗以懲淫慝焉初汝南舊有鴻隙大陂郡以為饒成帝時關東數水陂溢為害方進為相與御史大夫孔光共遣掾行視以為決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謠曰壞陂誰翟子威飯我豆食羹芋魁反乎覆陂當復誰云者兩黃鵠司徒掾班彪曰丞相方進以孤童攜老母羈旅入京師, WYG: ''}
