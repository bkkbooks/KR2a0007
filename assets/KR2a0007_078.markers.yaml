  - {type: variant, offset: 5116, length: 907, content: 漢始而大大矣爾有惟舊人泉陵侯之言爾不克遠省爾豈知太皇太后若此勤哉天毖勞我成功所予不敢不極卒安皇帝之所圖事肆予告我諸侯王公列侯卿大夫元士御事天輔誠辭天其累我以民予害敢不於祖宗安人圖功所終天亦惟勞我民若有疾予害敢不於祖宗所受休輔予聞孝子善繼人之意忠臣善成人之事予思若考作室厥子堂而構之厥父菑厥子播而穫之予害敢不於身撫祖宗之所受大命若祖宗乃有效湯武伐厥子民長其勸弗救烏虖肆哉諸侯王公列卿大夫元士御事其勉助國道明亦惟宗室之俊民之表儀迪知上帝命粵天輔誠爾不得易定況今天降定于漢國惟大囏人翟義劉信大逆欲相伐於厥室豈亦知命之不易乎予永念曰天惟喪翟義劉信若嗇夫予害敢不終予畮天亦惟休於祖宗予害其極卜害敢不于從率寧人有旨疆土況今卜并吉故予大以爾東征命不僭差卜陳惟若此乃遣大夫桓譚等班行諭告當反位孺子之意還封譚為明告里附城諸將東至陳留菑與義會戰破之斬劉璜首莽大喜復下詔曰太皇太后遭家不造國統三絕絕輒復續恩莫厚焉信莫立焉孝平皇帝短命蚤崩幼嗣孺沖詔予居攝予承明詔奉社稷之任持大宗之重養六尺之託受天下之寄戰戰兢兢不敢安息伏念太皇太后惟經藝分析王道離散漢家制作之業獨未成就故博徵儒士大興典制備物致用立功成器以為天下利王道粲然基業既著千載之廢百世之遺於今乃成道德庶幾於唐虞功烈比齊於殷周今翟義劉信等謀反大逆流言惑眾欲以篡位賊害我孺子罪深於管蔡惡甚於禽獸信父故東平王雲不孝不謹親毒殺其父思王名曰鉅鼠後雲竟坐大逆誅死義父故丞相方進險詖陰賊兄宣靜言令色外巧內嫉所殺鄉邑汝南者數十人今積惡二家迷惑相得此時命當殄天所滅也義始發兵上書言宇信等與東平相輔謀反執捕械繫欲以威民先自相被以反逆大惡轉相捕械此其破殄之明證也已捕斬斷信二子穀鄉侯章德廣侯鮪義母練兄宣親屬二十四人皆磔暴于長安都市四通之衢當其斬時觀者重疊天氣和清可謂當矣命遣大將軍共行皇天之罰討海內之讎功效著焉予甚嘉之司馬法不云乎賞不踰時欲民速覩為善之利也今先封車騎都尉孫賢等五十五人皆為列侯戶邑之數別下遣使者持黃金印赤韍縌朱輸車即軍中拜授因大赦天下於是吏士精銳遂攻圍義於圉城破之義與劉信棄軍庸亡至固始界中捕得義尸磔陳都市卒不得信初三輔聞翟義起自茂陵以西至洴二十三縣盜賊並發趙明霍鴻等自稱將軍攻燒官寺殺右, WYG: 左}
