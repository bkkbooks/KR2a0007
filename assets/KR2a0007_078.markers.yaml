  - {type: variant, offset: 2040, length: 0, content: '', WYG: 初匈奴呼韓邪單于來朝詔公卿議其儀丞相霸御史大夫定國議曰聖王之制施德行禮先京師而後諸夏先諸夏而後夷狄詩云率禮不越遂視既發相土烈烈海外有截師古曰商頌長發之詩也率循也遂徧也既盡也發行也相土契之孫也烈烈威也截齊也言殷宗受命為諸侯能修禮度無有所踰越也徧省視之教令盡行而相土之威烈烈然盛四海之外皆整齊宋祁曰注末當有也字陛下聖德充塞天地師古曰充實也塞滿也光被四表師古曰四表四海之外匈奴單于鄉風慕化奉珍朝賀師古曰鄉讀曰嚮自古未之有也其禮儀宜如諸侯王位次在下宋祁曰如疑作加望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也師古曰易謙卦之辭曰謙亨天道下濟而光明地道卑而上行言謙之為德無所不通也亨音火庚反書曰戎狄荒服師古曰逸書也言其來服荒忽亡常如使匈奴後嗣卒有鳥竄䑕伏闕於朝享不為畔臣師古曰卒終也本以客禮待之若後不來非叛臣信讓行乎蠻貉福祚流于亡窮萬世之長䇿也天子采之下詔曰蓋聞五帝三王教化所不施不及以政今匈奴單于稱北藩朝正朔朕之不逮德不能𢎞覆其以客禮待之令單于位在諸侯王上贊謁稱臣而不名及宣帝寢疾選大臣可屬者師古曰屬音之欲反引外屬}
