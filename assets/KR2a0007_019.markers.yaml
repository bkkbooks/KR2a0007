  - {type: variant, offset: 44771, length: 1, content: 六, WYG: 詹事東海宋疇臣召南按宣紀作宋畸注蘇林曰畸音踦隻之踦師古曰音居宜反據此則表作疇誤也下文同博士后倉為少府一年遷執金吾辟兵三年遷臣召南按一年監本訛作三年又脱兩遷字從宋本補但以后倉及辟兵考之後文並無遷陟則兩遷字或係古本之衍文也地節元年水衡都尉朱輔為右扶風監本風字下衍博字今刪四年弋陽侯任宫為太常監本訛邱宫從宋本改正孝元初元元年水衡都尉馮奉世監本脱馮奉世三字從宋本補孝成河平三年太僕王章為右將軍四年司𨽻校尉王章為京兆尹許應元曰同時有兩王章又兩王商一昌樂侯宣帝舅王武之子為丞相一成都侯孝元皇后之弟代王音為大司馬者也永始二年翟方進為御史大夫八}
