  - {type: variant, offset: 5122, length: 1, content: 內, WYG: 天下上事及四方貢獻闕下凢所徵召皆總領之令秩六百石旅衆也賁與奔同言為奔走之任也衛士三丞又諸屯衛侯司馬二十二官皆屬焉長樂建章甘泉衛尉皆掌其宮師古曰各隨所掌之宮以名官職略同不常置太僕秦官應劭曰周穆王所置也蓋大御衆僕之長中大夫也掌輿馬有兩丞屬官有大廐未央家馬三令各五丞一尉師古曰家馬者主供天子私用非大祀戎事軍國所須故謂之家馬也又車府路軨騎馬駿馬四令丞伏儼曰主乗輿路車又主凢小車軨今之小馬車曲輿也師古曰軨音零又龍馬閑駒槖泉騊駼丞華五監長丞如淳曰槖泉廐在槖泉宮下騊駼野馬也師古曰閑闌養馬之所也故曰閑駒騊駼出北海中其狀如馬非野馬也騊音徒髙反駼音塗又邊郡六牧師菀令各三丞師古曰漢官儀云牧師諸菀三十六所分置北邊西邊分養馬三十萬頭又牧槖昆蹏令丞應劭曰槖槖駞昆蹏好馬名也蹏音啼如淳曰爾雅曰昆蹏趼善升甗者也因以為廐名師古曰牧槖言牧養槖駞也昆獸名也蹏趼者謂其蹏下平也善升甗者謂山形如甑而能升之也蹏即古蹄字耳趼音五見反甗音言又音牛偃反皆屬焉中太僕掌皇太后輿馬不常置也武帝太初元年更名家馬為挏馬應劭曰主乳馬取其汁挏治之味酢可飲因以名官也如淳曰主乳馬以韋革為夾兠受數斗盛馬乳挏取其上肥因名曰挏馬禮樂志丞相孔光奏省樂官七十二人給大官挏馬酒今梁州亦名馬酪為馬酒晉灼曰挏音挺挏之挏師古曰晉音是也挏音徒孔反初置路軨廷尉秦官應劭曰聼獄必質諸朝廷與衆共之兵獄同制故稱廷尉師古曰廷平也治獄貴平故以為號掌刑辟有正左右監秩皆千石景帝中六年更名大理武帝建元四年復為廷尉宣帝地節三年初置左右平秩皆六百石哀帝元夀二年復為大理王莽改曰作士典客秦官掌諸歸義蠻夷有丞景帝中六年更名大行令武帝太初元年更名大鴻臚應劭曰郊廟行禮讚九賔鴻聲臚傳之也屬官有行人譯官别火三令丞如淳曰漢儀注别火獄令官主治改火之事及郡邸長丞師古曰主諸郡之邸在京師者也武帝太初元年更名行人爲大行令初置别火王莽改大鴻臚曰典樂初置郡國邸屬少府中屬中尉後屬大鴻臚宗正秦官應劭曰周成王之時彤伯入為宗正也師古曰彤伯為宗伯不謂之宗正掌親屬有丞平帝元始四年更名宗伯屬官有都司空令丞如淳曰律司空主水及罪人賈誼曰輸之司空編之徒官内官長丞師古曰律歴志主分寸尺丈也又諸公主家令門尉皆屬焉王莽并其官於秩宗初内官屬少府中屬主爵後屬宗正治粟内史秦官掌榖貨有兩丞景帝後元年更名大農令武帝太初元年更名大司農屬官有太倉均輸平準都内籍田五令丞孟康曰均輸謂諸當所有輸於官者皆令輸其地土所饒平其所在時賈官更於佗處賣之輸者既便而官有利也斡官鐵市兩長丞如淳曰斡音筦或作幹幹主也主均輸之事所謂斡鹽鐵而𣙜酒酤也晉灼曰此竹箭幹之官長也均輸自有令師古曰如説近是也縱作幹讀當以幹持財貨之事耳非謂箭幹也又郡國諸倉農監都水六十五官長丞皆屬焉騪粟都尉服䖍曰騪音蒐狩之蒐蒐索也武帝軍官不常置王莽改大司農曰羲和後更為納言初斡官屬少府中屬主爵後屬大司農少府秦官掌山海池澤之税以給共養應劭曰名曰禁錢以給私養自别為藏少者小也故稱少府師古曰大司農供軍國之用少府以養天子也共音居用反養音弋亮反有六丞屬官有尚書符節太醫太官湯官導官樂府若盧考工室左弋居室甘泉居室左右司空東織西織東園匠十六官令丞服䖍曰若盧詔獄也鄧展曰舊洛陽兩獄一名若盧主受親戚婦女如淳曰若盧官名也藏兵器品令曰若盧郎中二十人主弩射漢儀注有若盧獄令主治庫兵將相大}
