  - {type: variant, offset: 44734, length: 0, content: '', WYG: 省綏和二年哀帝復置但為司𨽻冠進賢冠屬大司空比司直城門校尉掌京師城門屯兵有司馬師古曰八屯各有司馬也十二城門候師古曰門各有候蕭望之署小苑東門候亦其比也中壘校尉掌北軍壘門内外掌西域師古曰掌北軍壘門之内而又外掌西域屯騎校尉掌騎士歩兵校尉掌上林苑門屯兵越騎校尉掌越騎如淳曰越人内附以為騎也晉灼曰取其材力超越也師古曰宣紀言佽飛騎士胡越騎又此有胡騎校尉如說是長水校尉掌長水宣曲胡騎師古曰長水胡名也宣曲觀名胡騎之屯於宣曲者又有胡騎校尉掌池陽胡騎不常置師古曰胡騎之屯池陽者也射聲校尉掌待詔射聲士服䖍曰工射者也㝠㝠中聞聲則中之因以名也應劭曰須詔所命而射故曰待詔射也虎賁校尉掌輕車凡八校尉皆武帝初置有丞司馬師古曰自中壘以下凡八校尉城中不在此數中自司𨽻至虎賁校尉秩皆二千石西域都護加官宣帝地節二年初置以騎都尉諌大夫使護西域}
