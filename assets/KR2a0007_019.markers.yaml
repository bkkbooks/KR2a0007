  - {type: punctuation, offset: 478, content: 「, id: KR2a0007_tls_019-bkkpn154}
  - {type: variant, offset: 478, length: 451, content: 初一曰五行五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡傳曰田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直說曰木東方也於易地上之木為觀其於王事威儀容貌亦可觀者也故行步有佩玉之度登車有和鸞之節田狩有三驅之制飲食有享獻之禮出入有名使民以時務在勸農桑謀在安百姓如此則木得其性矣若乃田獵馳騁不反宮室飲食沈湎不顧法度妄興繇役以奪民時作為姦詐以傷民財則木失其性矣蓋工匠之為輪矢者多傷敗及木為變怪是為木不曲直春秋成公十六年正月雨木冰劉歆以為上陽施不下通下陰施不上達故雨而木為之冰雰氣寒木不曲直也劉向以為冰者陰之盛而水滯者也木者少陽貴臣卿大夫之象也此人將有害則陰氣協景祐殿本都作脅脅景祐殿本都作脅木木先寒故得雨而冰也是時叔孫喬如出奔公子偃誅死一曰時晉執季孫行父又執公此執辱之異或曰今之長老名木冰為木介介者甲甲兵象也是歲晉有𨻳陵之戰楚王傷目而敗屬常雨也傳曰棄法律逐功臣殺太子以妾為妻則火不炎上說曰火南方揚光煇為明者也其於王者南面鄉明而治書云知人則悊能官人故堯舜舉群賢而命之朝遠四佞而放諸野, WYG: 論語稱}
