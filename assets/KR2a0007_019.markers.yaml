  - {type: variant, offset: 5080, length: 5, content: 顯等復譖毀, WYG: 太初元年更名中大夫為光禄大夫秩比二千石太中大夫秩比千石如故郎掌守門户出充車騎有議郎中郎侍郎郎中皆無員多至千人議郎中郎秩比六百石侍郎比四百石郎中比三百石中郎有五官左右三將秩皆比二千石郎中有車户騎三將如淳曰王車曰車郎主户衛曰户郎漢儀注郎中令主郎中左右車將主左右車郎左右户將主左右户郎也秩皆比千石謁者掌賓讚受事員七十八秩比六百石有僕射應劭曰謁請也白也僕主也秩比千石期門掌執兵送從武帝建元三年初置比郎無員多至千人有僕射秩比千石平帝元始元年更名虎賁郎師古曰賁讀與奔同言如猛獸}
