  - {type: variant, offset: 4644, length: 312, content: 天戒若曰邪臣往來為姦讒於漢絕亡之道也燕王不寤卒伏其辜元鳳四年五月丁丑孝文廟正殿災劉向以為孝文太宗之君與成周宣榭火同義先是皇后父車騎將軍上官安安父左將軍桀謀為逆大將軍霍光誅之皇后以光外孫年少不知居位如故光欲后有子因上侍疾醫言禁內後宮皆不得進唯皇后顓寢皇后年六歲而立十三年而昭帝崩遂絕繼嗣光執朝政猶周公之攝也是歲正月上加元服通詩尚書有明悊之性光亡周公之德秉政九年久於周公上既已冠而不歸政將為國害故正月加元服五月而災見古之廟皆在城中孝文廟始出居外天戒若曰去貴而不正者宣帝既立光猶攝政驕溢過制至妻顯殺許皇后光聞而不討後遂誅滅宣帝甘露元年四月丙申中山太上皇廟災甲辰孝文廟災元帝初元三年四月乙未孝武園白鶴館災劉向以為先是前將軍蕭望之光祿, WYG: ''}
