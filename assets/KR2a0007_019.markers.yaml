  - {type: punctuation, offset: 430, content: 》, id: KR2a0007_tls_019-bkkpn136}
  - {type: punctuation, offset: 430, content: ，, id: KR2a0007_tls_019-bkkpn137}
  - {type: 'tls:seg', offset: 430, content: '', id: KR2a0007_tls_019-3a.16}
  - {type: variant, offset: 430, length: 0, content: '', WYG: 也禮記眀堂位曰夏后氏官百殷二百蓋言其大數而無職號統屬也周官則備矣師古曰事見周書周官篇及周禮也天官冢宰地官司徒春官宗伯夏官司馬秋官司㓂冬官司空是爲六卿師古曰冢宰掌邦治司徒掌邦教宗伯掌邦禮司馬掌邦政司冦掌邦禁司空掌邦土也各有徒屬職分用於百事師古曰言百者舉大數也分音扶問反太師太傅太保是爲三公應劭曰師訓也傅覆也保養也師古曰傅相也蓋參天子坐而議政無不總綂故不以一職爲官名}
  - {type: page-break, offset: 430, content: '', id: KR2a0007_WYG_019-3b, image: WYG0249/WYG0249-0310b.png}
  - {type: variant, offset: 430, length: 0, content: '', krp: 也禮記眀堂位曰夏后氏官百殷二百蓋言其大數而無職號統屬也周官則備矣師古曰事見周書周官篇及周禮也天官冢宰地官司徒春官宗伯夏官司馬秋官司㓂冬官司空是爲六卿師古曰冢宰掌邦治司徒掌邦教宗伯掌邦禮司馬掌邦政司冦掌邦禁司空掌邦土也各有徒屬職分用於百事師古曰言百者舉大數也分音扶問反太師太傅太保是爲三公應劭曰師訓也傅覆也保養也師古曰傅相也蓋參天子坐而議政無不總綂故不以一職爲官名}
  - {type: variant, offset: 431, length: 0, content: '', WYG: 立三少爲之副少師少傅少保是爲孤卿與六卿爲九焉記曰三公無官言有其人然後充之師古曰不必備員有德者乃處之舜之於堯伊尹於湯周公召公於周是也或説司馬主天司徒主人司空主土是爲三公四岳謂四方諸侯自周衰官失而百職亂戰國並爭各變異秦兼天下建皇帝之號張晏曰五帝自以徳不及三皇故自去其皇號三王又以徳不及五帝自損稱王秦自以徳襃二行故兼稱之立百官之職漢因循而不革眀簡易随時宜也其後}
