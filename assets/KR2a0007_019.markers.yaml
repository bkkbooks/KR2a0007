  - {type: variant, offset: 419, length: 0, content: '', krp: 官長故爲龍師}
  - {type: variant, offset: 420, length: 0, content: '', WYG: 官爲青龍夏官爲赤龍}
  - {type: variant, offset: 420, length: 0, content: '', krp: 官爲青龍夏官爲赤龍}
  - {type: punctuation, offset: 421, content: 》, id: KR2a0007_tls_019-bkkpn133}
  - {type: variant, offset: 421, length: 2, content: 意亦, WYG: 官爲白龍冬官爲黒龍中官爲黄龍張晏曰庖羲將興神龍負圖而至因以名師與官也神農火師火名應劭曰火徳也故為炎帝春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火張晏曰神農有火星之瑞因以名師與官也黄帝雲師雲名應劭曰黄帝受命有雲瑞故以雲紀事也由是而言故春官為青雲夏官為縉雲秋官為白雲冬官為黒雲中官為黄雲張晏曰黄帝有景雲之應因以名師與官也少昊鳥師鳥名應劭曰金天氏黄帝子青陽也張晏曰少昊之立鳯鳥適至因以名官鳳鳥氏為歴正𤣥鳥司分伯趙司至青鳥司開丹鳥司閉師古曰𤣥鳥燕也伯趙伯勞也青鳥鶬鴳也丹鳥鷩雉也自顓頊以來爲民師而命以民事應劭曰顓頊氏代少昊者也不能紀遠始以職事命官也春官爲木正夏官爲火正秋官爲金正冬官爲水正中官爲土正師古曰自此以上皆郯子之辭也有重黎句芒祝融后土蓐收𤣥冥之官然}
  - {type: page-break, offset: 421, content: '', id: KR2a0007_WYG_019-2a, image: WYG0249/WYG0249-0309c.png}
