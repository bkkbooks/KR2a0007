  - {type: variant, offset: 34496, length: 678, content: 人不當生角猶諸侯不當舉兵以鄉京師也禍從老人生七國俱敗云諸侯不寤明年吳王先起諸侯從之七國俱滅京房易傳曰冢宰專政厥妖人生角成帝建始三年十月丁未京師相驚言大水至渭水虒上小女陳持弓年九歲走入橫城門入未央宮尚方掖門殿門門衛戶者莫見至句盾禁中而覺得民以水相驚者陰氣盛也小女而入宮殿中者下人將因女寵而居有宮室之象也名曰持弓有似周家檿弧之祥易曰弧矢之利以威天下是時帝母王太后弟鳳始為上將秉國政天知其後將威天下而入宮室故象先見也其後王氏兄弟父子五侯秉權至莽卒篡天下蓋陳氏之後云京房易傳曰妖言動眾茲謂不信路將亡人司馬死成帝綏和二年八月庚申鄭通里男子王襃衣絳衣小冠帶劍入北司馬門殿東門上前殿入非常室中解帷組結佩之招前殿署長業等曰天帝令我居此業等收縛考問襃故公車大誰卒病狂易不自知入宮狀下獄死是時王莽為大司馬哀帝即位莽乞骸骨就第天知其必不退故因是而見象也姓名章服甚明徑上前殿路寢入室取組而佩之稱天帝命然時人莫察後莽就國天下冤之哀帝徵莽還京師明年帝崩莽復為大司馬因是而篡國哀帝建平四年正月民驚走持稾或棷一枚傳相付與曰行詔籌道中相過逢多至千數或被髮徒踐或夜折關或踰牆入或乘車騎奔馳以置驛傳行經歷郡國二十六至京師其夏京師郡國民聚會里巷仟佰設祭錢大昭說閩本無祭字朱一新說汪本無祭字景祐本亦無張博具歌舞祠西王母又傳書曰母告百姓佩此書者不死不信我言視門樞下當有白髮至秋止是時帝祖母傅太后驕與政事故杜鄴對曰春秋災異以指象為言語籌所以紀數民陰水類也水以東流為順走而西行反類逆上象數度放溢妄以相予違忤民心之應也西王母婦人之稱博弈男子之事於街巷仟伯明離闑內與疆外臨事盤樂炕陽之意白髮衰年之象體尊性弱難, WYG: 地}
