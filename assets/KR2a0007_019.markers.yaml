  - {type: variant, offset: 44145, length: 504, content: 郡平帝亡嗣莽遂篡國釐公十六年正月戊申朔隕石于宋五是月六鶂退飛過宋都董仲舒劉向以為象宋襄公欲行伯道將自敗之戒也石陰類五陽數自上而隕此陰而陽行欲高反下也石與金同類色以白為主近白祥也鶂水鳥六陰數退飛欲進反退也其色青青祥也屬於貌之不恭天戒若曰德薄國小勿持炕陽欲長諸侯與彊大爭必受其害襄公不寤明年齊威死伐齊喪執滕子圍曹為盂之會與楚爭盟卒為所執後得反國不悔過自責復會諸侯伐鄭與楚戰于泓軍敗身傷為諸侯笑左氏傳曰隕石星也鶂退飛風也宋襄公以問周內史叔興曰是何祥也吉凶何在對曰今茲魯多大喪明年齊有亂君將得諸侯而不終退而告人曰是陰陽之事非吉凶之所生也吉凶繇人吾不敢逆君故也是歲魯公子季友鄫季姬公孫茲皆卒明年齊威死適庶亂宋襄公伐齊行伯卒為楚所敗劉歆以為是歲歲在壽星其衝降婁降婁魯分野也故為魯多大喪正月日在星紀厭在玄枵玄枵齊分野也石山物齊大嶽後五石象齊威卒而五公子作亂故為明年齊有亂庶民惟星隕於宋象宋襄將得諸侯之眾而治五公子之亂星隕而鶂退飛故為得諸侯而不終六鶂象後六年伯業始退執於盂也民反德為亂亂則妖災生言吉凶繇人然后陰陽衝厭受其咎齊魯之災非君所致故曰吾不敢逆君故也京房易傳曰距諫自彊茲謂卻行厥異鶂退飛適當黜則鶂退飛惠帝三年隕石緜諸一, WYG: 云司𨽻}
