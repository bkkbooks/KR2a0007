  - {type: variant, offset: 12642, length: 3558, content: 京房易傳曰臣私祿罔辟厥妖鼠巢文公十三年大室屋壞近金沴木木動也先是冬釐公薨十六月乃作主後六月又吉禘於太廟而致釐公春秋譏之經曰大事於太廟躋釐公左氏說曰太廟周公之廟饗有禮義者也祀國之大事也惡其亂國之大事於太廟故言大事也躋登也登釐公於愍公上逆祀也釐雖愍之庶兄嘗為愍臣臣子一例不得在愍上又未三年而吉禘前後亂賢父聖祖之大禮內為貌不恭而狂外為言不從而僭故是歲自十二月不雨至于秋七月後年若是者三而太室屋壞矣前堂曰太廟中央曰太室屋其上重屋尊高者也象魯自是陵夷將墮周公之祀也穀梁公羊經曰世室魯公伯禽之廟也周公稱太廟魯公稱世室大事者祫祭也躋釐公者先禰後祖也景帝三年十二月吳二城門自傾大船自覆劉向以為近金沴木木動也先是吳王濞以太子死於漢稱疾不朝陰與楚王戊謀為逆亂城猶國也其一門名曰楚門一門曰魚門吳地以船為家以魚為食天戒若曰與楚所謀傾國覆家吳王不寤正月與楚俱起兵身死國亡京房易傳曰上下咸誖厥妖城門壞宣帝時大司馬霍禹所居第門自壞時禹內不順外不敬見戒不改卒受滅亡之誅哀帝時大司馬董賢第門自壞時賢以私愛居大位賞賜無度驕嫚不敬大失臣道見戒不改後賢夫妻自殺家徙合浦傳曰言之不從是謂不艾厥咎僭厥罰恆陽厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟木沴金言之不從從順也是謂不乂乂治也孔子曰君子居其室出其言不善則千里之外違之況其邇者虖詩云如蜩如螗如沸如羹言上號令不順民心虛譁憒亂則不能治海內失在過差故其咎僭僭差也刑罰妄加群陰不附則陽氣勝故其罰常陽也旱傷百穀則有寇難上下俱憂故其極憂也君炕陽而暴虐臣畏刑而柑口則怨謗之氣發於歌謠故有詩妖介蟲孽者謂小蟲有甲飛揚之類陽氣所生也於春秋為螽今謂之蝗皆其類也於易兌為口犬以吠守而不可信言氣毀故有犬禍一曰旱歲犬多狂死及為怪亦是也及人則多病口喉欬者故有口舌痾金色白故有白眚白祥凡言傷者病金氣金氣病則木沴之其極憂者順之其福曰康寧劉歆言傳曰時有毛蟲之孽說以為於天文西方參為虎星故為毛蟲史記周單襄公與晉郤錡郤犨郤至齊國佐語告魯成公曰晉將有亂三郤其當之虖夫郤氏晉之寵人也二景祐本作三朱一新說作三是三景祐本作三朱一新說作三是卿而五大夫可以戒懼矣高位實疾顛厚味實腊毒今郤伯之語犯叔迂季伐犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有虖十七年晉殺三郤十八年齊殺國佐凡此屬皆言不從之咎云晉穆侯以條之役生太子名之曰仇其弟以千畮之戰生名之曰成師師服曰異哉君之名子也夫名以制誼誼以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君名太子曰仇弟曰成師始兆亂矣兄其替虖及仇嗣立是為文侯文侯卒子昭侯立封成師于曲沃號桓叔後晉人殺昭侯而納桓叔不克復立昭侯子孝侯桓叔子嚴伯殺之晉人立其弟鄂侯鄂侯生哀侯嚴伯子武公復殺哀侯及其弟滅之而代有晉國宣公六年鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣間一歲鄭人殺之襄公二十九年齊高子容與宋司徒見晉知伯汝齊相禮賓出汝齊語知伯曰二子皆將不免子容專司徒侈皆亡家之主也專則速及侈將以其力敝專則人實敝之將及矣九月高子出奔燕襄公三十一年正月魯穆叔會晉歸告孟孝伯曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子虖吾子盍與季孫言之可以樹善君子也孝伯曰民生幾何誰能毋偷朝不及夕將焉用樹穆叔告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉九月孟孝伯卒昭公元年周使劉定公勞晉趙孟因曰子弁冕以臨諸侯盍亦遠績禹功而大庇民乎對曰老夫罪戾是懼焉能恤遠吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂虖為晉正卿以主諸侯而儕于隸人朝不謀夕棄神人矣神怒民畔何以能久趙孟不復年矣是歲秦景公弟后子奔晉趙孟問秦君何如對曰無道趙孟曰亡虖對曰何為一世無道國未艾也國于天地有與立焉不數世淫弗能敝也趙孟曰天王念孫說當從景祐本作夭下文其幾何正承夭字言之夭王念孫說當從景祐本作夭下文其幾何正承夭字言之虖對曰有焉趙孟曰其幾何對曰鍼聞國無道而年穀和孰天贊之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民玩歲而愒日其與幾何冬趙孟卒昭五年秦景公卒昭公元年楚公子圍會盟設服離衛魯叔孫穆子曰楚公子美矣君哉伯州犂曰此行也辭而假之寡君鄭行人子羽曰假不反矣伯州犂曰子姑憂子晢之欲背誕也子羽曰假而不反子其無憂虖齊國子曰吾代二子閔矣陳公子招曰不憂何成二子樂矣衛齊子曰苟或知之雖憂不害退會子羽告人曰齊衛陳大夫其不免乎國子代人憂子招樂憂齊雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也太誓曰民之所欲天必從之三大夫兆憂矣能無至乎言以知物其是之謂矣昭公十五年晉籍談如周葬穆后既除喪而燕王曰諸侯皆有以填撫王室晉獨無有何也籍談對曰諸侯之封也皆受明器於王室故能薦彝器晉居深山戎翟之與鄰拜戎不暇其何以獻器王曰叔氏其忘諸乎叔父唐叔成王之母弟其反亡分乎昔而高祖司晉之典籍以為大正故曰籍氏女司典之後也何故忘之籍談不能對賓出王曰籍父其無後乎數典而忘其祖籍談歸以語叔嚮叔嚮曰王其不終乎吾聞所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉於是乎以喪賓燕又求彝器樂憂甚矣三年之喪雖貴遂服禮也王雖弗遂燕樂已早禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將安用之哀公十六年孔丘卒公誄之曰昊景祐殿本都作旻注同按左傳作旻旻景祐殿本都作旻注同按左傳作旻天不弔不憖遺一老俾屏予一人子贛曰君其不歿於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所謂景祐殿本都作為為景祐殿本都作為愆生弗能用死而誄之非禮也稱予一人非名也君兩失之二十七年公孫于邾遂死於越庶徵之恆陽劉向以為春秋大旱也其夏旱雩祀謂之大雩不傷二穀謂之不雨京房易傳曰欲德不用茲謂張厥災荒荒旱也其旱陰雲不雨變而赤因而除師出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上緣求妃茲謂僭其旱三月大溫亡雲居高臺府茲謂犯陰侵陽其旱萬物根死數有火災庶位踰節茲謂僭其旱澤物枯為火所傷釐公二十一年夏大旱董仲舒劉向以為齊威景祐殿本都作桓桓景祐殿本都作桓既死諸侯從楚釐尤得楚心楚來獻捷釋宋之執外倚彊楚炕陽失眾又作南門勞民興役諸雩旱不雨略皆同說宣公七年秋大旱是夏宣與齊侯伐莢襄公五年秋大雩先是宋魚石犇楚楚伐宋取彭城以封魚石鄭畔于中國而附楚襄與諸侯共圍彭城城鄭虎牢以禦楚是歲鄭伯使公子發來聘使大夫會吳于善道外結二國內得鄭聘有炕陽動眾之應八年九月大雩時作三軍季氏盛二十八年八月大雩先是比年晉使荀吳齊使慶封來聘是夏邾子來朝襄有炕陽自大之應昭公三年八月大雩劉歆以為昭公即位年十九矣猶有童心居喪不哀炕陽失眾六年九月大雩先是莒矣夷以二邑來犇莒怒伐魯叔弓帥師距而敗之昭得入晉外和大國內獲二邑取勝鄰國有炕陽動眾之應十六年九月大雩先是昭公母夫人歸氏薨昭不慼又大蒐于比蒲晉叔嚮曰魯有大喪而不廢蒐國不恤喪不忌君也君亡慼容不顧親也殆其失國與三年同占二十四年八月大雩劉歆以為左氏傳二十三年邾師城翼還經魯地魯襲取邾師獲其三大夫邾人愬于晉晉人執我行人叔孫婼是春乃歸之二十五年七月上辛大雩季辛又雩旱甚也劉歆以為時后氏與季氏有隙又季氏之族有淫妻為讒使季平子與族人相惡皆共譖平子子家駒諫曰讒人以君徼幸不可昭公遂伐季氏為所敗出犇齊定公十蘇輿說據春秋經定十年無大雩事其書九月大雩在定七年十疑七之誤七蘇輿說據春秋經定十年無大雩事其書九月大雩在定七年十疑七之誤年九月大雩先是定公自將侵鄭歸而城中城二大夫帥師圍鄆嚴公三十一年冬不雨是歲一年而三築臺奢侈不恤民釐公二年冬十月不雨三年春正月不雨夏四月不雨六月雨先是者嚴公夫人與公子慶父淫而殺二君國人攻之夫人遜于邾鹿父犇莒釐公即位南敗邾東敗莒獲其大夫有炕陽之應文公二年自十有二月不雨至于秋七月文公即位天子使叔服會葬毛伯賜命又會晉侯于戚公子遂如齊納幣又與諸侯盟上得天子外得諸侯沛然自大躋釐公主大夫始顓事十年自正月不雨至于秋七月先是公子遂會四國而救鄭楚使越椒來聘秦人歸禭有炕陽之應十三年自正月不雨至于秋七月先是曹伯杞伯滕子來朝郕伯來犇秦伯使遂來聘季孫行父城諸及鄆二年之間五國趨之內城二邑炕陽失眾一曰不雨而五穀皆孰異也文公時大夫始顓盟會公孫敖會晉侯又會諸侯盟于垂隴故不雨而生者陰不出氣而私自行以象施不由上出臣下作福而私自成一曰不雨近常陰之罰君弱也惠帝五年夏大旱江河水少谿谷絕先是發民男女十四萬六千人城長安是歲城乃成文帝三年秋天下旱是歲夏匈奴右賢王寇侵上郡詔丞相灌嬰發車騎士八萬五千人詣高奴擊右賢王走出塞其秋濟北王興居反使大將軍討之皆伏誅後六年春天下大旱先是發車騎材官屯廣昌是歲二月復發材官屯隴西後匈奴大入上郡雲中烽火通長安三將軍屯邊又三將軍屯京師景帝中三年秋大旱武帝元光六年夏大旱是歲四將軍征匈奴元朔五年春大旱是歲六將軍眾十餘萬征匈奴元狩三年夏大旱是歲發天下故吏伐棘, WYG: ''}
  - {type: variant, offset: 12642, length: 3558, content: 京房易傳曰臣私祿罔辟厥妖鼠巢文公十三年大室屋壞近金沴木木動也先是冬釐公薨十六月乃作主後六月又吉禘於太廟而致釐公春秋譏之經曰大事於太廟躋釐公左氏說曰太廟周公之廟饗有禮義者也祀國之大事也惡其亂國之大事於太廟故言大事也躋登也登釐公於愍公上逆祀也釐雖愍之庶兄嘗為愍臣臣子一例不得在愍上又未三年而吉禘前後亂賢父聖祖之大禮內為貌不恭而狂外為言不從而僭故是歲自十二月不雨至于秋七月後年若是者三而太室屋壞矣前堂曰太廟中央曰太室屋其上重屋尊高者也象魯自是陵夷將墮周公之祀也穀梁公羊經曰世室魯公伯禽之廟也周公稱太廟魯公稱世室大事者祫祭也躋釐公者先禰後祖也景帝三年十二月吳二城門自傾大船自覆劉向以為近金沴木木動也先是吳王濞以太子死於漢稱疾不朝陰與楚王戊謀為逆亂城猶國也其一門名曰楚門一門曰魚門吳地以船為家以魚為食天戒若曰與楚所謀傾國覆家吳王不寤正月與楚俱起兵身死國亡京房易傳曰上下咸誖厥妖城門壞宣帝時大司馬霍禹所居第門自壞時禹內不順外不敬見戒不改卒受滅亡之誅哀帝時大司馬董賢第門自壞時賢以私愛居大位賞賜無度驕嫚不敬大失臣道見戒不改後賢夫妻自殺家徙合浦傳曰言之不從是謂不艾厥咎僭厥罰恆陽厥極憂時則有詩妖時則有介蟲之孽時則有犬禍時則有口舌之痾時則有白眚白祥惟木沴金言之不從從順也是謂不乂乂治也孔子曰君子居其室出其言不善則千里之外違之況其邇者虖詩云如蜩如螗如沸如羹言上號令不順民心虛譁憒亂則不能治海內失在過差故其咎僭僭差也刑罰妄加群陰不附則陽氣勝故其罰常陽也旱傷百穀則有寇難上下俱憂故其極憂也君炕陽而暴虐臣畏刑而柑口則怨謗之氣發於歌謠故有詩妖介蟲孽者謂小蟲有甲飛揚之類陽氣所生也於春秋為螽今謂之蝗皆其類也於易兌為口犬以吠守而不可信言氣毀故有犬禍一曰旱歲犬多狂死及為怪亦是也及人則多病口喉欬者故有口舌痾金色白故有白眚白祥凡言傷者病金氣金氣病則木沴之其極憂者順之其福曰康寧劉歆言傳曰時有毛蟲之孽說以為於天文西方參為虎星故為毛蟲史記周單襄公與晉郤錡郤犨郤至齊國佐語告魯成公曰晉將有亂三郤其當之虖夫郤氏晉之寵人也二景祐本作三朱一新說作三是三景祐本作三朱一新說作三是卿而五大夫可以戒懼矣高位實疾顛厚味實腊毒今郤伯之語犯叔迂季伐犯則陵人迂則誣人伐則掩人有是寵也而益之以三怨其誰能忍之雖齊國子亦將與焉立於淫亂之國而好盡言以招人過怨之本也唯善人能受盡言齊其有虖十七年晉殺三郤十八年齊殺國佐凡此屬皆言不從之咎云晉穆侯以條之役生太子名之曰仇其弟以千畮之戰生名之曰成師師服曰異哉君之名子也夫名以制誼誼以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君名太子曰仇弟曰成師始兆亂矣兄其替虖及仇嗣立是為文侯文侯卒子昭侯立封成師于曲沃號桓叔後晉人殺昭侯而納桓叔不克復立昭侯子孝侯桓叔子嚴伯殺之晉人立其弟鄂侯鄂侯生哀侯嚴伯子武公復殺哀侯及其弟滅之而代有晉國宣公六年鄭公子曼滿與王子伯廖語欲為卿伯廖告人曰無德而貪其在周易豐之離弗過之矣間一歲鄭人殺之襄公二十九年齊高子容與宋司徒見晉知伯汝齊相禮賓出汝齊語知伯曰二子皆將不免子容專司徒侈皆亡家之主也專則速及侈將以其力敝專則人實敝之將及矣九月高子出奔燕襄公三十一年正月魯穆叔會晉歸告孟孝伯曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八九十者弗能久矣若趙孟死為政者其韓子虖吾子盍與季孫言之可以樹善君子也孝伯曰民生幾何誰能毋偷朝不及夕將焉用樹穆叔告人曰孟孫將死矣吾語諸趙孟之偷也而又甚焉九月孟孝伯卒昭公元年周使劉定公勞晉趙孟因曰子弁冕以臨諸侯盍亦遠績禹功而大庇民乎對曰老夫罪戾是懼焉能恤遠吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將知而耄及之者其趙孟之謂虖為晉正卿以主諸侯而儕于隸人朝不謀夕棄神人矣神怒民畔何以能久趙孟不復年矣是歲秦景公弟后子奔晉趙孟問秦君何如對曰無道趙孟曰亡虖對曰何為一世無道國未艾也國于天地有與立焉不數世淫弗能敝也趙孟曰天王念孫說當從景祐本作夭下文其幾何正承夭字言之夭王念孫說當從景祐本作夭下文其幾何正承夭字言之虖對曰有焉趙孟曰其幾何對曰鍼聞國無道而年穀和孰天贊之也鮮不五稔趙孟視蔭曰朝夕不相及誰能待五后子出而告人曰趙孟將死矣主民玩歲而愒日其與幾何冬趙孟卒昭五年秦景公卒昭公元年楚公子圍會盟設服離衛魯叔孫穆子曰楚公子美矣君哉伯州犂曰此行也辭而假之寡君鄭行人子羽曰假不反矣伯州犂曰子姑憂子晢之欲背誕也子羽曰假而不反子其無憂虖齊國子曰吾代二子閔矣陳公子招曰不憂何成二子樂矣衛齊子曰苟或知之雖憂不害退會子羽告人曰齊衛陳大夫其不免乎國子代人憂子招樂憂齊雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也太誓曰民之所欲天必從之三大夫兆憂矣能無至乎言以知物其是之謂矣昭公十五年晉籍談如周葬穆后既除喪而燕王曰諸侯皆有以填撫王室晉獨無有何也籍談對曰諸侯之封也皆受明器於王室故能薦彝器晉居深山戎翟之與鄰拜戎不暇其何以獻器王曰叔氏其忘諸乎叔父唐叔成王之母弟其反亡分乎昔而高祖司晉之典籍以為大正故曰籍氏女司典之後也何故忘之籍談不能對賓出王曰籍父其無後乎數典而忘其祖籍談歸以語叔嚮叔嚮曰王其不終乎吾聞所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉於是乎以喪賓燕又求彝器樂憂甚矣三年之喪雖貴遂服禮也王雖弗遂燕樂已早禮王之大經也一動而失二禮無大經矣言以考典典以志經忘經而多言舉典將安用之哀公十六年孔丘卒公誄之曰昊景祐殿本都作旻注同按左傳作旻旻景祐殿本都作旻注同按左傳作旻天不弔不憖遺一老俾屏予一人子贛曰君其不歿於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所謂景祐殿本都作為為景祐殿本都作為愆生弗能用死而誄之非禮也稱予一人非名也君兩失之二十七年公孫于邾遂死於越庶徵之恆陽劉向以為春秋大旱也其夏旱雩祀謂之大雩不傷二穀謂之不雨京房易傳曰欲德不用茲謂張厥災荒荒旱也其旱陰雲不雨變而赤因而除師出過時茲謂廣其旱不生上下皆蔽茲謂隔其旱天赤三月時有雹殺飛禽上緣求妃茲謂僭其旱三月大溫亡雲居高臺府茲謂犯陰侵陽其旱萬物根死數有火災庶位踰節茲謂僭其旱澤物枯為火所傷釐公二十一年夏大旱董仲舒劉向以為齊威景祐殿本都作桓桓景祐殿本都作桓既死諸侯從楚釐尤得楚心楚來獻捷釋宋之執外倚彊楚炕陽失眾又作南門勞民興役諸雩旱不雨略皆同說宣公七年秋大旱是夏宣與齊侯伐莢襄公五年秋大雩先是宋魚石犇楚楚伐宋取彭城以封魚石鄭畔于中國而附楚襄與諸侯共圍彭城城鄭虎牢以禦楚是歲鄭伯使公子發來聘使大夫會吳于善道外結二國內得鄭聘有炕陽動眾之應八年九月大雩時作三軍季氏盛二十八年八月大雩先是比年晉使荀吳齊使慶封來聘是夏邾子來朝襄有炕陽自大之應昭公三年八月大雩劉歆以為昭公即位年十九矣猶有童心居喪不哀炕陽失眾六年九月大雩先是莒矣夷以二邑來犇莒怒伐魯叔弓帥師距而敗之昭得入晉外和大國內獲二邑取勝鄰國有炕陽動眾之應十六年九月大雩先是昭公母夫人歸氏薨昭不慼又大蒐于比蒲晉叔嚮曰魯有大喪而不廢蒐國不恤喪不忌君也君亡慼容不顧親也殆其失國與三年同占二十四年八月大雩劉歆以為左氏傳二十三年邾師城翼還經魯地魯襲取邾師獲其三大夫邾人愬于晉晉人執我行人叔孫婼是春乃歸之二十五年七月上辛大雩季辛又雩旱甚也劉歆以為時后氏與季氏有隙又季氏之族有淫妻為讒使季平子與族人相惡皆共譖平子子家駒諫曰讒人以君徼幸不可昭公遂伐季氏為所敗出犇齊定公十蘇輿說據春秋經定十年無大雩事其書九月大雩在定七年十疑七之誤七蘇輿說據春秋經定十年無大雩事其書九月大雩在定七年十疑七之誤年九月大雩先是定公自將侵鄭歸而城中城二大夫帥師圍鄆嚴公三十一年冬不雨是歲一年而三築臺奢侈不恤民釐公二年冬十月不雨三年春正月不雨夏四月不雨六月雨先是者嚴公夫人與公子慶父淫而殺二君國人攻之夫人遜于邾鹿父犇莒釐公即位南敗邾東敗莒獲其大夫有炕陽之應文公二年自十有二月不雨至于秋七月文公即位天子使叔服會葬毛伯賜命又會晉侯于戚公子遂如齊納幣又與諸侯盟上得天子外得諸侯沛然自大躋釐公主大夫始顓事十年自正月不雨至于秋七月先是公子遂會四國而救鄭楚使越椒來聘秦人歸禭有炕陽之應十三年自正月不雨至于秋七月先是曹伯杞伯滕子來朝郕伯來犇秦伯使遂來聘季孫行父城諸及鄆二年之間五國趨之內城二邑炕陽失眾一曰不雨而五穀皆孰異也文公時大夫始顓盟會公孫敖會晉侯又會諸侯盟于垂隴故不雨而生者陰不出氣而私自行以象施不由上出臣下作福而私自成一曰不雨近常陰之罰君弱也惠帝五年夏大旱江河水少谿谷絕先是發民男女十四萬六千人城長安是歲城乃成文帝三年秋天下旱是歲夏匈奴右賢王寇侵上郡詔丞相灌嬰發車騎士八萬五千人詣高奴擊右賢王走出塞其秋濟北王興居反使大將軍討之皆伏誅後六年春天下大旱先是發車騎材官屯廣昌是歲二月復發材官屯隴西後匈奴大入上郡雲中烽火通長安三將軍屯邊又三將軍屯京師景帝中三年秋大旱武帝元光六年夏大旱是歲四將軍征匈奴元朔五年春大旱是歲六將軍眾十餘萬征匈奴元狩三年夏大旱是歲發天下故吏伐棘, krp: ''}
