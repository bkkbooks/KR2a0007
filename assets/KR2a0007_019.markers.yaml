  - {type: variant, offset: 17543, length: 16845, content: 也天之戒人蚤矣諸侯不寤後六年吳楚畔濟南膠西膠東三國應之舉兵至齊齊王猶與城守三國圍之會漢破吳楚因誅四王故天狗下梁而吳楚攻梁狗生角於齊而三國圍齊漢卒破吳楚於梁誅四王於齊京房易傳曰執政失下將害之厥妖狗生角君子苟免小人陷之厥妖狗生角景帝三年二月邯鄲狗與彘交悖亂之氣近犬豕之禍也是時趙王遂悖亂與吳楚謀為逆遣使匈奴求助兵卒伏其辜犬兵革失眾之占豕北方匈奴之象逆言失聽交於異類以生害也京房易傳曰夫婦不嚴厥妖狗與豕交茲謂反德國有兵革成帝河平元年長安男子石良劉音相與同居有如人狀在其室中擊之為狗走出去後有數人被甲持兵弩至良家良等格擊或死或傷皆狗也自二月至六月乃止鴻嘉中狗與彘交左氏昭公二十四年十月癸酉王子鼂以成周之寶圭湛于河幾以獲神助甲戌津人得之河上陰不佞取將賣之則為石是時王子鼂篡天子位萬民不鄉號令不從故有玉變近白祥也癸酉入而甲戌出神不享之驗云玉化為石貴將為賤也後二年子鼂犇楚而死史記秦始皇帝三十六年鄭客從關東來至華陰望見素車白馬從華山上下知其非人道住止而待之遂至持璧與客曰為我遺鎬池君因言今年祖龍死忽不見鄭客奉璧即始皇二十八年過江所湛璧也與周子鼂同應是歲石隕于東郡民或刻其石曰始皇死而地分此皆白祥炕陽暴虐號令不從孤陽獨治群陰不附之所致也一曰石陰類也陰持高節臣將危君趙高李斯之象也始皇不畏戒自省反夷滅其旁民而燔燒其石是歲始皇死後三年而秦滅孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁眭孟以為石陰類下民象泰山岱宗之嶽王者易姓告代之處當有庶人為天子者孟坐伏誅京房易傳曰復崩來無咎自上下者為崩厥應泰山之石顛而下聖人受命人君虜又曰石立如人庶士為天下雄立文於山同姓平地異姓立於水聖人於澤小人天漢元年三月天雨白毛三年八月天雨白氂京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛史記周威烈王二十三年九鼎震金震木動之也是時周室衰微刑重而虐號令不從以亂金氣鼎者宗廟之寶器也宗廟將廢寶鼎將遷故震動也是歲晉三卿韓魏趙篡晉君而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣後三世周致德祚於秦其後秦遂滅周而取九鼎九鼎之震木沴金失眾甚成帝元延元年正月長安章城門門牡自亡函谷關次門牡亦自亡京房易傳曰飢而不損茲謂泰厥災水厥咎牡亡妖辭曰關動牡飛辟為亡道臣為非厥咎亂臣謀篡故谷永對曰章城門通路寢之路函欲關距山東之險城門關守國之固固將去焉故牡飛也傳曰視之不明是謂不悊厥咎舒厥罰恆奧厥極疾時則有草妖時則有羸蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火視之不明是謂不悊悊知也詩云爾德不明以亡陪亡卿不明爾德以亡背亡仄言上不明暗昧蔽惑則不能知善惡親近習長同類亡功者受賞有罪者不殺百官廢亂失在舒緩故其咎舒也盛夏日長暑以養物政弛緩故其罰常奧也奧則冬溫春夏不和傷病民人故極疾也誅不行則霜不殺草繇臣下則殺不以時故有草妖凡妖貌則以服言則以詩聽則以聲視則以色者五色物之大分也在於眚祥故聖人以為草妖失秉之明者也溫奧生蟲故有羸蟲之孽謂螟螣之類當死不死未當生而生或多於故而為災也劉則歆以為屬思心不容於易剛而包柔為離離為火為目羊上角下號景祐殿本都作蹏蹏景祐殿本都作蹏剛而包柔羊大目而不精明視氣毀故有羊禍一曰暑歲羊多疫死及為怪亦是也及人則多病目者故有目痾火色赤故有赤眚赤祥凡視傷者病火氣火氣傷則水沴之其極疾者順之其福曰壽劉歆視傳曰有羽蟲之蘖雞禍說以為於天文南方喙為鳥星故為羽蟲禍亦從羽故為雞雞於易自在巽說非是庶徵之恆奧劉向以為春秋亡冰也小奧不書無冰然後書舉其大者也京房易傳曰祿不遂行茲謂欺厥咎奧雨雪四至而溫臣安祿樂逸茲謂亂奧而生蟲知罪不誅茲謂舒其奧夏則暑殺人冬則物華實重過不誅茲謂亡徵其咎當寒而奧六日也桓公十五年春亡冰劉向以為周春今冬也先是連兵鄰國三戰而再敗也內失百姓外失諸侯不敢行誅罰鄭伯突篡兄而立公與相親長養同類不明善惡之罰也董仲舒以為象夫人不正陰失節也成公元年二月無冰董仲舒以為方有宣公之喪君臣無悲哀之心而炕陽作丘甲劉向以為時公幼弱政舒緩也襄公二十八年春無冰劉向以為先是公作三軍有侵陵用武之意於是鄰國不和伐其三鄙被兵十有餘年因之以饑饉百姓怨望臣下心離公懼而弛緩不敢行誅罰楚有夷狄行公有從楚心不明善惡之應董仲舒指略同一曰水旱之災寒暑之變天下皆同故曰無冰天下異也桓公殺兄弒君外成宋亂與鄭易邑背畔周室成公時楚橫行中國王札子殺召伯毛伯晉敗天子之師于貿戎天子皆不能討襄公時天下諸侯之大夫皆執國權君不能制漸將日甚善惡不明誅罰不行周失之舒秦失之急故周衰亡寒歲秦滅亡奧年武帝元狩六年冬亡冰先是比年遣大將軍衛青霍去病攻祁連絕大幕窮追單于斬首十餘萬級還大行慶賞乃閔海內勤勞是歲遣博士褚大等六人持節巡行天下存賜鰥寡假與乏困舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞天下咸喜昭帝始元二年冬亡冰是時上年九歲大將軍霍光秉政始行寬緩欲以說下僖公三十三年十二月隕霜不殺草劉歆以為草妖也劉向以為今十月周十二月於易五為天位為景祐本無下為字君位九月陰氣至五通於天位其卦為剝剝落萬物始大殺矣明陰從陽命臣受君令而後殺也今十月隕霜而不能殺草此君誅不行舒緩之應也是時公子遂顓權三桓始世官天戒若曰自此之後將皆為亂矣文公不寤其後遂殺子赤三家逐昭公董仲舒指略同京房易傳曰臣有緩茲謂不順厥異霜不殺也書序曰伊涉景祐殿局本都作陟王先謙說作陟是陟景祐殿局本都作陟王先謙說作陟是相太戊亳有祥桑穀共生傳曰俱生乎朝七日而大拱伊陟戒以修德而木枯劉向以為殷道既衰高宗承敝而起盡涼陰之哀天下應之既獲顯榮怠於政事國將危亡故桑穀之異見桑猶喪也穀猶生也殺生之秉失而在下近草妖也一曰野木生朝而暴長小人將暴在大臣之位危亡國家象朝將為虛之應也書序又曰高宗祭成湯有蜚雉登鼎耳而雊祖己曰惟先假王正厥事劉向以為雉雊鳴者雄也以赤色為主於易離為雉雉南方近赤祥也劉歆以為羽蟲之孽易有鼎卦鼎宗廟之器主器奉宗廟者長子也野鳥自外來入為宗廟器主是繼嗣將易也一曰鼎三足三公象而以耳行野鳥居鼎耳小人將居公位敗宗廟之祀野木生朝野鳥入廟敗亡之異也武丁恐駭謀於忠賢修德而正事內舉傅說授以國政外伐鬼方以安諸夏故能攘木鳥之妖致百年之壽所謂六沴作見若是共御五福乃降用章于下者也一曰金沴木曰木不曲直僖公三十三年十二月李梅實劉向以為周十二月今十月也李梅當剝落今反華實近草妖也先華而後實不書華舉重者也陰成陽事象臣顓君作威福一曰冬當殺反生象驕臣當誅不行其罰也故冬華王念孫說景祐本作故冬華者是也華字不宜疊華者象臣邪謀有端而不成至於實則成矣是時僖公死公子遂顓權文公不寤後有子赤之變一曰君舒緩甚奧氣不臧則華實復生董仲舒以為李梅實臣下彊也記曰不當華而華易大夫不當實而實易相室冬水王木相故象大臣劉歆以為庶徵皆以蟲為孽思心蠃蟲茱也李梅實屬草妖惠帝五年十月桃李華棗實昭帝時上林苑中大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立又昌邑王國社有枯樹復生枝葉眭孟以為木陰類下民象當有故廢之家公孫氏從民間受命為天子者昭帝富於春秋霍光秉政以孟妖言誅之後昭帝崩無子徵昌邑王賀嗣位狂亂失道光廢之更立昭帝兄衛太子之孫是為宣帝帝本名病已京房易傳曰枯楊生稊枯木復生人君亡子元帝初元四年皇后曾祖父濟南東平陵王伯墓門梓柱卒生枝葉上出屋劉向以為王氏貴盛將代漢家之象也後王莽篡位自說之曰初元四年莽生之歲也當漢九世火德之厄而有此祥興於高祖考之門門為開通梓猶子也言王氏當有賢子開通祖統起於柱石大臣之位受命而王之符也建昭五年兗州刺史浩賞禁民私所自立社山陽橐茅鄉社有大槐樹吏伐斷之其夜樹復立其故處成帝永始元年二月河南街郵樗樹生支如人頭眉目須皆具亡髮耳哀帝建平三年十月汝南西平遂陽鄉柱仆地生支如人形身青黃色面白頭有頿髮稍長大凡長六寸一分京房易傳曰王德衰下人將起則有木生為人狀哀帝建平三年零陵有樹僵地圍丈六尺長十丈七尺民斷其本長九尺餘皆枯三月樹卒自立故處京房易傳曰棄正作淫厥妖木斷自屬妃后有顓木仆反立斷枯復生天辟惡之元帝永光二年八月天雨草而葉相摎結大如彈丸平帝元始三年正月天雨草狀如永光時京房易傳曰君吝於祿信衰賢去厥妖天雨草昭公二十五年夏有鸜鵒來巢劉歆以為羽蟲之孽其色黑又黑祥也視不明聽不聰之罰也劉向以為有蜚有蜮不言來者氣所生所謂眚也鸜鵒言來者氣所致所謂祥也鸜鵒夷狄穴藏之禽來至中國不穴而巢陰居陽位象季氏將逐昭公去宮室而居外野也鸜鵒白羽旱之祥也穴居而好水黑色為主急之應也天戒若曰既失眾不可急暴急暴陰將持節陽以逐爾去宮室而居外野矣昭不寤而舉兵圍季氏為季氏所敗出犇于齊遂死于外野董仲舒指略同景帝三年十一月有白頸烏與黑烏群鬭楚國呂縣白頸不勝墮泗水中死者數千劉向以為近白黑祥也時楚王戊暴逆無道刑辱申公與吳王謀反烏群鬭者師戰之象也白頸者小明小者敗也墮於水者將死水地王戊不寤遂舉兵應吳與漢大戰兵敗而走至於丹徒為越人所斬墮死於水之效也京房易傳曰逆親親厥妖白黑烏鬭於國昭帝元鳳元年有烏與鵲鬭燕王宮中池上烏墮池死近黑祥也時燕王旦謀為亂遂不改寤伏辜而死楚燕皆骨肉藩臣以驕怨而謀逆俱有烏鵲鬭死之祥行同而占合此天人之明表也燕一烏鵲鬭於宮中而黑者死楚以萬數鬭於野外而白者死象燕陰謀未發獨王自殺於宮故一烏水色者死楚炕陽舉兵軍師大敗於野故眾烏金色者死天道精微之效也京房易傳曰專征劫殺厥妖烏鵲鬭昭帝時有鵜鶦或曰禿鶖集昌邑王殿下王使人射殺之劉向以為水鳥色青青祥也時王馳騁無度慢侮大臣不敬至尊有服妖之象故青祥見也野鳥入處宮室將空王不寤卒以亡京房易傳曰辟退有德厥咎狂厥妖水鳥集于國中成帝河平元年二月庚子泰山山桑谷有䳒焚其巢男子孫通等聞山中群鳥䳒鵲聲往視見巢㸐盡墮地中有三䳒鷇燒死樹大四圍巢去地五丈五尺太守平以聞䳒色黑近黑祥貪虐之類也易曰鳥焚其巢旅人先笑後號咷泰山岱宗五嶽之長王者易姓告代之處也天戒若曰勿近貪虐之人聽其賊謀將生焚巢自害其子絕世易姓之禍其後趙蜚燕得幸立為皇后弟為昭儀姊妹專寵聞後宮許美人曹偉能生皇子也昭儀大怒令上奪取而殺之皆并殺其母成帝崩昭儀自殺事乃發覺趙后坐誅此焚巢殺子後號咷之應也一曰王莽貪虐而任社稷之重卒成易姓之禍云京房易傳曰人君暴虐鳥焚其舍鴻嘉二年三月博士行大射禮有飛雉集于庭歷階登堂而雊後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央宮承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以類相應譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣經載高宗雊雉之異以明轉禍為福之驗今雉以博士行禮之日大眾聚會飛集於庭歷階登堂萬眾睢睢驚怪連日徑歷三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖德如此者左右阿諛甚眾不待臣音復讇而足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先受誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出泆行流聞海內傳之甚於京師外有微行之害內有疾病之憂皇天數見災異欲人變更終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有高祖天下當以誰屬乎宜謀於賢知克己復禮以求天意繼嗣可立災變尚可銷也成帝綏和二年三月天水平襄有燕生爵哺食至大俱飛去京房易傳曰賊臣在國厥咎燕生銷一曰生非其類子不嗣也史記魯定公時季桓子穿井中得蟲若羊近羊禍也羊者地上之物幽於土中象定公不用孔子而聽季氏暗昧不明之應也一曰羊去野外而拘土缶者象魯君失其所而拘於季氏季氏亦將拘於家臣也是歲季氏家臣陽虎囚季桓子後三年陽虎劫公伐孟氏兵敗竊寶玉大弓而出亡左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之先是大夫華元出奔晉華弱奔魯華臣奔陳華合比奔衛劉向以為時則火災赤眚之明應也京房易傳曰尊卑不別厥妖女生赤毛惠帝二年天雨血於宜陽一頃所劉向以為赤眚也時又冬雷桃李華常奧之罰也是時政舒緩諸呂用事讒口妄行殺三皇子建立非嗣及不當立之王退王陵趙堯周昌呂太后崩大臣共誅滅諸呂僵尸流血京房易傳曰歸獄不解茲謂追非厥咎天雨血茲謂不親民有怨心不出三年無其宗人又曰佞人祿功臣僇天雨血哀帝建平四年四月山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子後二年帝崩王莽擅朝誅貴戚丁傅大臣董賢等皆放徙遠方與諸呂同眾景祐殿本都作象朱一新說作象是象景祐殿本都作象朱一新說作象是誅死者少雨血亦少傳曰聽之不聰是謂不謀厥咎急厥罰恆寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水聽之不聰是謂不謀言上偏聽不聰下情隔塞則不能謀慮利害失在嚴急故其咎急也盛冬日短寒以殺物政促迫故其罰常寒也寒則不生百穀上下俱貧故其極貧也君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖寒氣動故有魚孽而以龜為孽龜能陸處非極陰也魚去水而死極陰之孽也於易坎為豕豕大耳而不聰察聽氣毀故有豕禍也一曰寒歲豕多死及為怪亦是也及人則多病耳者故有耳痾水色黑故有黑眚黑祥凡聽傷者病水氣水氣病則火沴之其極貧者順之其福曰富劉歆聽傳曰有介蟲孽也庶徵之恆寒劉向以為春秋無其應周之末世舒緩微弱政在臣下奧煖而已故籍秦以為驗秦始皇帝即位尚幼委政太后太后淫於呂不韋及嫪毐封毐為長信侯以太原郡為毐國宮室苑囿自恣政事斷焉故天冬雷以見陽不禁閉以涉危害舒奧迫近之變也始皇既冠毐懼誅作亂始皇誅之斬首數百級大臣二十人皆車裂以徇夷滅其宗遷四千餘家於房陵是歲四月寒民有凍死者數年之間緩急如此寒奧輒應此其效也劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺叔草皆常寒之罰也劉向以為常雨屬貌不恭京房易傳曰有德遭險茲謂逆命厥異寒誅過深當奧而寒盡六日亦為雹害正不誅茲謂養賊寒七十二日殺蜚禽道人始去茲謂傷其寒物無霜而死涌水出戰不量敵茲謂辱命其寒雖雨物不茂聞善不予厥咎聾桓公八年十月雨雪周十月今八月也未可以雪劉向以為時夫人有淫齊之行而桓有妬媚景祐殿局本都作媢葉德輝說作媢是媢景祐殿局本都作媢葉德輝說作媢是之心夫人將殺其象見也桓不覺寤後與夫人俱如齊而殺死凡雨陰也雪又雨之陰也出非其時迫近象也董仲舒以為象大景祐殿本都作夫王先謙說作夫是夫景祐殿本都作夫王先謙說作夫是人專恣陰氣盛也釐公十年冬大雨雪劉向以為先是釐公立妾為夫人陰居陽位陰氣盛也公羊經曰大雨雹董仲舒以為公脅於齊桓公立妾為夫人不敢進群妾故專壹之象見諸雹皆為有所漸脅也行專壹之政云昭公四年正月大雨雪劉向以為昭取於吳而為同姓謂之吳孟子君行於上臣非於下又三家已彊皆賤公行慢侮之心生董仲舒以為季孫宿任政陰氣盛也文帝四年六月大雨雪後三歲淮南王長謀反發覺遷道死京房易傳曰夏雨雪戒臣為亂景帝中六年三月雨雪其六月匈奴入上郡取苑馬吏卒戰死者二千餘人明年條侯周亞夫下獄死武帝元狩元年十二月大雨雪民多凍死是歲淮南衡山王謀反發覺皆自殺使者行郡國治黨與坐死者數萬人元鼎二年三月雪平地厚五尺是歲御史大夫張湯有罪自殺丞相嚴青翟坐與三長史謀陷湯青翟自殺三長史皆棄市元鼎三年三月水冰四月雨雪關東十餘郡人相食是歲民不占緡錢有告者以半畀之元帝建昭二年十一月齊楚地大雪深五尺是歲魏郡太守京房為石顯所告坐與妻父淮陽王舅張博博弟光勸視淮陽王以不義博要斬光房棄市御史大夫鄭弘坐免為庶人成帝即位顯伏辜淮陽王上書冤博辭語增加家屬徙者復得還建昭四年三月雨雪燕多死谷永對曰皇后桑蠶以治祭服共事天地宗廟正以是日疾風自西北大寒雨雪壞敗其功以章不鄉宜齊戒辟寢以深自責請皇后就宮鬲閉門戶毋得擅上且令眾妾人人更進以時博施皇天說喜庶幾可以得賢明之嗣即不行臣言災異俞甚天變成形臣雖欲復捐身關策不及事已其後許后坐祝詛廢陽朔四年四月雨雪燕雀死後十六年許皇后自殺定公元年十月隕霜殺菽劉向以為周十月今八月也消卦為觀陰氣未至君位而殺誅罰不由君出在臣下之象也是時季氏逐昭公公死于外定公得立故天見災以視公也釐公二年十月隕霜不殺草為嗣君微失秉事之象也其後卒在臣下則災為之生矣異故言草災故言菽重殺穀一曰菽草之難殺者也言殺菽知草皆死也言不殺草知菽亦不死也董仲舒以為菽草之彊者天戒若曰加誅於彊臣言菽以微見季氏之罰也武帝元光四年四月隕霜殺草木先是二年遣五將軍三十萬眾伏馬邑下欲襲單于單于覺之而去自是始征伐四夷師出三十餘年天下戶口減半京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土隙間不教而誅茲謂虐其霜反在草下元帝永光元年三月隕霜殺桑九月二日隕霜殺稼天下大飢是時中書令石顯用事專權與春秋定公時隕霜同應成帝即位顯坐作威福誅釐公二十九年秋大雨雹劉向以為盛陽雨水溫煖而湯熱陰氣脅之不相入則轉而為雹盛陰雨雪凝滯而冰寒陽氣薄之不相入則散而為霰故沸湯之在閉器而湛於寒泉則為冰及雪之銷亦冰解而散此其驗也故雹者陰脅陽也霰者陽脅陰也春秋不書霰者猶月食也釐公末年信用公子遂遂專權自恣將至於殺君故陰脅陽之象見釐公不寤遂終專權後二年殺子赤立宣公左氏傳曰聖人在上無雹雖有不為災說曰凡物不為災不書書大言為災也凡雹皆冬之愆陽夏之伏陰也昭公三年大雨雹是時季氏專權脅君之象見昭公不寤後季氏卒逐昭公元封三年十二月雷雨雹大如馬頭宣帝地節四年五月山陽濟陰雨雹如雞子深二尺五寸殺二十人蜚鳥皆死其十月大司馬霍禹宗族謀反誅霍皇后廢成帝河平二年四月楚國雨雹大如斧蜚鳥死左傳曰釐公三十二年十二月己卯晉文公卒庚辰將殯于曲沃出絳柩有聲如牛劉向以為近鼓妖也喪凶事聲如牛怒象也將有急怒之謀以生兵革之禍是時秦穆公遣兵襲鄭而不假道還晉大夫先軫謂襄公曰秦師過不假塗請擊之遂要崤阸以敗秦師匹馬觭輪無反者操之急矣晉不惟舊而聽虐謀結怨彊國四被秦寇禍流數世凶惡之效也哀帝建平二年四月乙亥朔御史大夫朱博為丞相少府趙玄為御史大夫臨延登受策有大聲如鍾鳴殿中郎吏陛者皆聞焉上以問黃門侍郎揚雄李尋尋對曰洪範所謂鼓妖者也師法以為人君不聰為眾所惑空名得進則有聲無形不知所從生其傳曰歲月日之中則正卿受之今以四月日加辰巳有異是為中焉正卿謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自蒙其咎揚雄亦以為鼓妖聽失之象也朱博為人彊毅多權謀宜將不宜相恐有凶惡亟疾之怒八月博玄坐為姦謀博自殺玄減死論京房易傳曰令不修本下不安金毋故自動若有音史記秦二世元年天無雲而雷劉向以為雷當託於雲猶君託於臣陰陽之合也二世不恤天下萬民有怨畔之心是歲陳勝起天下畔趙高作亂秦遂以亡一曰易震為雷為貌不恭也史記秦始皇八年河魚大上劉向以為近魚孽也是歲始皇弟長安君將兵擊趙反死屯留軍吏皆斬遷其民於臨洮明年有嫪毒景祐殿本都作毐此誤毐景祐殿本都作毐此誤之誅魚陰類民之象逆流而上者民將不從君令為逆行也其在天文魚星中河而處車騎漢野至于二世暴虐愈甚終用急亡京房易傳曰眾逆同志厥妖河魚逆流上武帝元鼎五年秋蛙與蝦蟆群鬭是歲四將軍眾十萬征南越開九郡成帝鴻嘉四年秋雨魚于信都長五寸以下成帝永始元年春北海出大魚長六丈高一丈四枚哀帝建平三年東萊平度出大魚長八丈高丈一尺七枚皆死京房易傳曰海數見巨魚邪人進賢人疏桓公五年秋螽劉歆以為貪虐取民則螽介蟲之孽也與魚同占劉向以為介蟲之孽屬言不從是歲公獲二國之聘取鼎易邑興役起城諸螽略皆從董仲舒說云嚴公二十九年有蜚劉歆以為負蠜也性不食穀食穀為災介蟲之孽劉向以為蜚色青近青眚也非中國所有南越盛暑男女同川澤淫風所生為蟲臭惡是時嚴公取齊淫女為夫人既入淫於兩叔故蜚至天戒若曰今誅絕之尚及不將生臭惡聞於四方嚴不寤其後夫人與兩叔作亂二嗣以殺卒皆被辜董仲舒指略同釐公十五年八月螽劉向以為先是釐有鹹之會後城緣陵是歲復以兵車為牡丘會使公孫敖帥師及諸侯大夫救徐兵比三年在外文公三年秋雨螽于宋劉向以為先是宋殺大夫而無罪有暴虐賦斂之應穀梁傳曰上下皆合言甚董仲舒以為宋三世內取大夫專恣殺生不中故螽先死而至劉歆以為螽為穀災卒遇賊陰墜而死也八年十月螽時公伐邾取須朐城郚宣公六年八月螽劉向以為先是時宣伐莒向後比再如齊謀伐萊十三年秋螽公孫歸父會齊伐莒十五年秋螽宣亡熟歲數有軍旅襄公七年八月螽劉向以為先是襄興師救陳滕子郯子小邾子皆來朝夏城費哀公十二年十二月螽是時哀用田賦劉向以為春用田賦冬而螽十三年九月螽十二月螽比三螽虐取於民之效也劉歆以為周十二月夏十月也火星既伏蟄蟲皆畢天之見變因物類之宜不得以螽是歲再失閏矣周九月夏七月故傳曰火猶西流司曆過也宣公十五年冬蝝生劉歆以為蝝螕蠹之有翼者食穀為災黑眚也董仲舒劉向以為蝝螟始生也一曰螟葉德輝說螟為蝗之誤既云一曰則非螟明矣蝗葉德輝說螟為蝗之誤既云一曰則非螟明矣始生是時民患上力役解於公田宣是時初稅畝稅畝就民田畝擇美者稅其什一亂先王制而為貪利故應是而蝝生屬蠃蟲之孽景帝中三年秋蝗先是匈奴寇邊中尉不害將車騎材官士屯代高柳武帝元光五年秋螟六年夏蝗先是五將軍眾三十萬伏馬邑欲襲單于也是歲四將軍征匈奴元將五年秋蝗是歲四將軍征南越及西南夷開十餘郡元封六年秋蝗先是雨將軍征朝鮮開三郡太初元年夏蝗從東方蜚至敦煌三年秋復蝗元年貳師將軍征大宛天下奉其役連年征和三年秋蝗四年夏蝗先是一年三將軍眾十餘萬征匈奴征和三年貳師七萬人沒不還平帝元始二年秋蝗徧天下是時王莽秉政左氏傳曰嚴公八年齊襄公田于貝丘見豕從者曰公子彭生也公怒曰射之豕人立而嗁公懼墜車傷足喪屨劉向以為近豕禍也先是齊襄淫於妹魯桓公夫人使公子彭生殺威景祐殿本都作桓桓景祐殿本都作桓公又殺彭生以謝魯公孫無知有寵於先君襄公絀之無知帥怨恨之徒攻襄於田所襄匿其戶間足見於戶下遂殺之傷足喪屨卒死於足虐急之效也昭帝元鳳元年燕王宮永巷中豕出圂壞都竈銜其鬴六七枚置殿前劉向以為近豕禍也時燕王旦與長公主左將軍謀為大逆誅殺諫者暴急無道竈者生養之本豕而敗竈陳鬴於庭鬴竈將不用宮室將廢辱也燕王不改卒伏其辜京房易傳曰眾心不安君政厥妖豕入居室史記魯襄公二十三年穀洛水鬭將毀王宮劉向以為近火沴水也周靈王將擁之有司諫曰不可長民者不崇藪不墮山不防川不竇澤今吾執政毋乃有所辟而滑夫二川之神使至于爭明以防王宮室王而飾之毋乃不可乎懼及子孫王室愈卑王卒擁之以傳推之以四瀆比諸侯穀洛其次卿大夫之象也為卿大夫將分爭以危亂王室也是時世卿專權儋括將有篡殺之謀如靈王覺寤匡其失政懼以承戒則災禍除矣不聽諫謀簡嫚大異任其私心塞埤擁下以逆水勢而害鬼神後數年有黑如日者五是歲蚤霜靈王崩景王立二年儋括欲殺王而立王弟佞夫佞夫不知景王并誅佞夫及景王死五大夫爭權或立子猛或立子朝王室大亂京房易傳曰天子弱諸侯力政厥異水鬭史記曰秦武王三年渭水赤者三日昭王三十四年渭水又赤三日劉向以為近火沴水也秦連相坐之法棄灰於道者黥罔密而刑虐加以武伐橫出殘賊鄰國至於變亂五行氣色謬亂天戒若曰勿為刻急將致敗亡秦遂不改至始皇滅六國二世而亡昔三代居三河河洛出圖書秦居渭陽而渭水數赤瑞異應德之效也京房易傳曰君湎于酒淫于色賢人潛國家危厥異流水赤也傳曰思心之不䜭是謂不聖厥咎霿厥罰恆風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黃眚黃祥時則有金木水火沴土思心之不䜭是謂不聖思心者心思慮也䜭寬也孔子曰居上不寬吾何以觀之哉言上不寬大包容臣下則不能居聖位貌言視聽以心為主四者皆失則區霿無識故其咎霿也雨旱寒奧亦以風為本四氣皆亂故其罰常風也常風傷物故其極凶短折也傷人曰凶禽獸曰短屮木曰折一曰凶夭也兄喪弟曰短父喪子曰折在人腹中肥而包裹心者脂也心區霿則冥晦故有脂夜之妖一曰有脂物而夜為妖若脂水夜汙人衣淫之象也一曰夜妖者雲風並起而杳冥故與常風同象也溫而風則生螟螣有裸蟲之孽劉向以為於易巽為風為木卦在三月四月繼陽而治主木之華實風氣盛至秋冬木復華故有華孽一曰地氣盛則秋冬復華一曰華者色也土為內事為女孽也於易坤為土為牛牛大心而不能思慮思心氣毀故有牛禍一曰牛多死及為怪亦是也及人則多病心腹者故有心腹之痾土色黃故有黃眚黃祥凡思心傷者病土氣土氣病則金木水火沴之故曰時則有金木水火沴土不言惟而獨曰時則有者非一衝氣所沴明其異大也其極曰凶短折順之其福曰考終命劉歆思心傳曰時則有臝蟲之孽謂螟螣之屬也庶徵之常風劉向以為春秋無其應釐公十六年正月六鶂退蜚過宋都左氏傳風也劉歆以為風發於它所至宋而高鶂高蜚而逢之則退經以見者為文故記退蜚傳以實應著言風常風之罰也象宋襄公區霿自用不容臣下逆司馬子魚之諫而與彊楚爭盟後六年為楚所執應六鶂之數云京房易傳曰潛龍勿用眾逆同志至德乃潛厥異風其風也行不解物不長雨小而傷政悖德隱茲謂亂厥風先風不雨大風暴起發屋折木守義不進茲謂耄厥風與雲俱起折五穀莖臣易上政茲謂不順厥風大焱發屋賦斂不理茲謂禍厥風絕經紀殿局本都作緯王先謙說據注文作緯是緯殿局本都作緯王先謙說據注文作緯是止即溫溫即蟲侯專封茲謂不統厥風疾而樹不搖穀不成辟不思道利茲謂無澤厥風不搖木旱無雲傷禾公常於利茲謂亂厥風微而溫生蟲蝗害五穀棄正作淫茲謂惑厥風溫螟蟲起害有益人之物侯不朝茲謂叛厥風無恆地變赤而殺人文帝二年六月淮南王都壽春大風毀民室殺人劉向以為是歲南越反攻淮南邊淮南王長破之後年入朝殺漢故丞相辟陽侯上赦之歸聚姦人謀逆亂自稱東帝見異不寤後遷于蜀道死廱文帝五年吳暴風雨壞城官府民室時吳王濞謀為逆亂天戒數見終不改寤後卒誅滅五年十月楚王都彭城大風從東南來毀市門殺人是月王戊初嗣立後坐淫削國與吳王謀反刑僇諫者吳在楚東南天戒若曰勿與吳為惡將敗市朝王戊不寤卒隨吳亡昭帝元鳳元年燕王都薊大風雨拔宮中樹七圍以上十六枚壞城樓燕王旦不寤謀反發覺卒伏其辜釐公十五年九月己卯晦震夷伯之廟劉向以為晦暝也震雷也夷伯世大夫正書景祐殿本都作晝王先謙說作晝是晝景祐殿本都作晝王先謙說作晝是雷其廟獨冥天戒若曰勿使大夫世官將專事暝晦明年公子季友卒果世官政在季氏至成公十六年六月甲午晦正晝皆暝陰為陽臣制君也成公不寤其冬季氏殺公子偃季氏萌於釐公大於成公此其應也董仲舒以為夷伯季氏之孚也陪臣不當有廟震者雷也晦暝雷擊其廟明當絕去僭差之類也向又以為此皆所謂夜妖者也劉歆以為春秋及朔言朔及晦言晦人道所不及則天震之展氏有隱慝故天加誅於其祖夷伯之廟以譴告之也成公十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵皆月晦云隱公五年秋螟董仲舒劉向以為時公觀漁于棠貪利之應也劉歆以為又逆臧釐伯之諫貪利區霧以生臝蟲之孽也八年九月螟時鄭伯以邴將易許田有貪利心京房易傳曰臣安祿茲謂貪厥災蟲蟲食根德無常茲謂煩蟲食葉不絀無德蟲食本與東作爭茲謂不時蟲食節蔽惡生孽蟲食心嚴公六年秋螟董仲舒劉向以為先是衛侯朔出奔齊齊侯會諸侯納朔許諸侯賂齊人歸衛寶魯受之貪利應也文帝後六年秋螟是歲匈奴大入上郡雲中烽火通長安遣三將軍屯邊三將軍屯京師宣公三年郊牛之口傷改卜牛牛死劉向以為近牛禍也是時宣公與公子遂謀共殺子赤而立又以喪娶區霿昏亂亂成於口幸有季文子得免於禍天猶惡之生則不饗其祀死則災燔其廟董仲舒指略同秦孝文王五年斿朐衍有獻五足牛者劉向以為近牛禍也先是文惠王初都咸陽廣大宮室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢泰將致危亡秦遂不改至於離宮三百復起阿房未成而亡一曰牛以力為人用足所以行也其後秦大用民力轉輸起負海至北邊天下叛之京房易傳曰興繇役奪民時厥妖牛生五足景帝中六年梁孝王田北山有獻牛足上出背上劉向以為近牛禍先是孝王驕奢起苑方三百里宮館閣道相連三十餘里納於邪臣羊勝之計欲求為漢嗣刺殺議臣爰盎事發負斧歸死既退歸國猶有恨心內則思慮霿亂外則土功過制故牛禍作足而出於背下奸上之象也猶不能自解發疾暴死又凶短之極也左氏傳昭公二十一年春周景王將鑄無射鍾泠州鳩曰王其以心疾死乎夫天子省風以作樂小者不窕大者不摦摦則不容心是以感感實生疾今鍾摦矣王心弗景祐殿本作𢦟朱一新說作𢦟是𢦟景祐殿本作𢦟朱一新說作𢦟是其能久乎劉向以為是時景王好聽淫聲適庶不明思心霿亂明年以心疾崩近心腹之痾凶短之極者也昭二十五年春魯叔孫昭子聘于宋元公與燕飲酒樂語相泣也樂祁佐告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久冬十月叔孫昭子死十一月宋元公卒昭帝元鳳元年九月燕有黃鼠銜其尾舞王宮端門中往視之鼠舞如故王使夫人以酒脯祠鼠舞不休夜死黃祥也時燕剌王旦謀反將敗死亡象也其月發覺伏辜京房易傳曰誅不原情厥妖鼠舞門成帝建始元年四月辛丑夜西北有如火光壬寅晨大風從西北起雲氣赤黃四塞天下終日夜下著地者黃土塵也是歲帝元舅大司馬大將軍王鳳始用事又封鳳母弟崇為安成侯食邑萬戶庶弟譚等五人賜爵關內侯食邑三千戶復益封鳳五千戶悉封譚等為列侯是為五侯哀帝即位封外屬丁氏傅氏周氏鄭氏凡六人為列侯楊宣對曰五侯封日天氣赤黃丁傅復然此殆爵土過制傷亂土氣之祥也京房易傳曰經稱觀其生言大臣之義當觀賢人知其性行推而貢之否則為聞善不與茲謂不知厥異黃厥咎聾厥災不嗣黃者日上黃光不散如火然有黃濁氣四塞天下蔽賢絕道故災異至絕世也經曰良馬逐逐進也言大臣得賢者謀當顯進其人否則為下相攘善茲謂盜明厥咎亦不嗣至於身僇家絕史記周幽王二年周三川皆震劉向以為金木水火沴土者也伯陽甫曰周將亡矣天地之氣不過其序若過其序民亂之也陽伏而不能出陰迫而不能升於是有地震今三川實震是陽失其所而填陰也陽失而在陰原必塞原塞國必亡夫水土演而民用也土無所演而民乏財用不亡何待昔伊雒竭而夏亡河竭而商亡今周德如二代之季其原又塞塞必竭川竭山必崩夫國必依山川山崩川竭亡之徵也若國亡不過十年數之紀也是歲二景祐殿本都作三葉德輝說作三是三景祐殿本都作三葉德輝說作三是川竭岐山崩劉向以為陽失在陰者謂火氣來煎枯水故川竭也山川連體下竭上崩事勢然也時幽王暴虐妄誅伐不聽諫迷於襃姒廢其正后廢后之父申侯與犬戎共攻殺幽王一曰其在天文水為辰星辰星為蠻夷月食辰星國以女亡幽王之敗女亂其內夷攻其外京房易傳曰君臣相背厥異名水絕文公九年九月癸酉地震劉向以為先是時齊桓晉文魯釐二伯賢君新沒周襄王失道楚穆王殺父諸侯皆不肖權傾於下天戒若曰臣下彊盛者將動為害後宋魯晉莒鄭陳齊皆殺君諸震略皆從董仲舒說也京房易傳曰臣事雖正專必震其震於水則波於木則搖於屋則瓦落大經在辟而易臣茲謂陰動厥震搖政宮大經搖政茲謂不陰厥震搖山山出涌水嗣子無德專祿茲謂不順厥震動丘陵涌水出襄公十六年五月甲子地震劉向以為先是雞澤之會諸侯盟大夫又盟是歲三月諸侯為溴梁之會而大夫獨相與盟五月地震矣其後崔氏專齊欒盈亂晉良霄傾鄭𨵽殺吳子燕逐其君楚滅陳蔡昭公十九年五月己卯地震劉向以為是時季氏將有逐君之變其後宋三臣曹會皆以地叛蔡莒逐其君吳敗中國殺二君二十三年八月乙未地震劉向以為是時周景王崩劉單立王子猛尹氏立子朝其後季氏逐昭公黑肱叛邾吳殺其君僚宋五大夫晉二大夫皆以地叛哀公三年四月甲午地震劉向以為是時諸侯皆信邪臣莫能用仲尼盜殺蔡侯齊陳乞弒君惠帝二年正月地震隴西厭四百餘家武帝征和二年八月癸亥地震厭殺人宣帝本始四年四月壬寅地震河南以東四十九郡北海琅邪壞祖宗廟城郭殺六千餘人元帝永光三年冬地震綏和二年九月丙辰地震自京師至北邊郡國三十餘壞城郭凡殺四百一十五人釐公十四年秋八月辛卯沙麓崩穀梁傳曰林屬於山曰麓沙其名也劉向以為臣下背叛散落不事上之象也先是齊桓行伯道會諸侯事周室管仲既死桓德日衰天戒若曰伯道將廢諸侯散落政逮大夫陪臣執命臣下不事上矣桓公不寤天子蔽晦及齊威景祐殿本都作桓桓景祐殿本都作桓死天下散而從楚王札子殺二大夫晉敗天子之師莫能征討從是陵遲公羊以為沙麓河上邑也董仲舒說略同一曰河大川象齊大國桓德衰伯道將移於晉文故河為徙也左氏以為沙麓晉地沙山名也地震而麓崩不書震舉重者也伯陽甫所謂國必依山川山崩川竭亡之徵也不過十年數之紀也至二十四年晉懷公殺於高梁京房易傳曰小人剝廬厥妖山崩茲謂陰乘陽弱勝彊成公五年夏梁山崩穀梁傳曰廱河三日不流晉君帥群臣而哭之乃流劉向以為山陽君也水陰民也天戒若曰君道崩壞下亂百姓將失其所矣哭然後流喪亡象也梁山在晉地自晉始而及天下也後晉暴殺三卿厲公以弒溴梁之會天下大夫皆執國政其後孫甯出衛獻三家逐魯昭單尹亂王室董仲舒說略同劉歆以為梁山晉望也崩弛崩也古者三代命祀祭不越望吉凶禍福不是過也國主山川山崩川竭亡之徵也美惡周必復是歲歲在鶉火至十七年復在鶉火欒書中行偃殺厲公而立悼公高后二年正月武都山崩殺七百六十人地震至八月乃止文帝元年四月齊楚地山二十九所同日俱大發水潰出劉向以為近水沴土也天戒若曰勿盛齊楚之君今失制度將為亂後十六年帝庶兄齊悼惠王之孫文王則薨無子帝分齊地立悼惠王庶子六人皆為王賈誼鼂錯諫以為違古制恐為亂至景帝三年齊楚七國起兵百餘萬漢皆破之春秋四國同日災漢七國同日眾山潰咸被其害不畏天威之明效也成帝河平三年二月丙戌犍為柏江山崩捐江山崩皆廱江水江水逆流壞城殺十三人地震積二十一日百二十四動元延三年正月丙寅蜀郡岷山崩廱江江水逆流三日乃通劉向以為周時岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角從參至辰殆必亡矣其後三世亡嗣王莽篡位傳曰皇之不極是謂不建厥咎眊厥罰恆陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行皇之不極是謂不建皇君也極中建立也人君貌言視聽思心五事皆失不得其中則不能立萬事失在眊悖故其咎眊也王者自下承天理物雲起於山而彌於天天氣亂故其罰常陰也一曰上失中則下彊盛而蔽君明也易曰亢龍有悔貴而亡位高而亡民賢人在下位而亡輔如此則君有南面之尊而亡一人之助故其極弱也盛陽動進輕疾禮春而大射以順陽氣上微弱則下奮動故有射妖易曰雲從龍又曰龍蛇之蟄以存身也陰氣動故有龍蛇之孽於易乾為君為馬馬任用而彊力君氣毀故有馬禍一曰馬多死及為怪亦是也君亂且弱人之所叛天之所去不有明王之誅則有篡弒之禍故有下人伐上之痾凡君道傷者病天氣不言五行沴天而曰日月亂行星辰逆行者為若下不敢沴天猶春秋曰王師敗績于貿戎不言敗之者以自敗為文尊尊之意也劉歆皇極傳曰有下體生上之痾說以為下人伐上天誅已成不得復為痾云皇極之常陰劉向以為春秋亡其應一曰久陰不雨是也劉歆以為自屬常陰昭帝元平元年四月崩亡嗣立昌邑王賀賀即位天陰晝夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明效也京房易傳曰有蜺蒙霧霧上下合也蒙如塵雲蜺日旁氣也其占曰后妃有專蜺再重赤而專至衝旱妻不壹順黑蜺四背又白蜺雙出日中妻以貴高夫茲謂擅陽蜺四方日光不陽解而溫內取茲謂禽蜺如禽在日旁以尊降妃茲謂薄嗣蜺直而塞六辰乃除夜星見而赤女不變始茲謂乘夫蜺白在日側黑蜺果之氣正直妻不順正茲謂擅陽蜺中窺貫而外專夫妻不嚴茲謂媟蜺與日會婦人擅國茲謂頃蜺白貫日中赤蜺四背適不答茲謂不次蜺直在左蜺交在右取於不專茲謂危嗣蜺抱日兩未及君淫外茲謂亡蜺氣左日交於外取不達茲謂不知蜺白奪明而大溫溫而雨尊卑不別茲謂媟蜺三出三已三辰除除則日出且雨臣私祿及親茲謂罔辟厥異蒙其蒙先大溫已蒙起日不見行善不請於上茲謂作福蒙一日五起五解辟不下謀臣辟異道茲謂不見上蒙下霧風三變而俱解立嗣子疑茲謂動欲蒙赤日不明德不序茲謂不聰蒙日灰明溫而民病德不試空言祿茲謂主窳臣夭蒙起而白君樂逸人茲謂放蒙日青黑雲夾日左右前後行過日公不任職茲謂怙祿蒙三日又大風五日蒙不解利邪以食茲謂閉上蒙大起白雲如山行蔽日公懼不言道茲謂閉下蒙大起日不見若雨不雨至十二日解而有大雲蔽日祿生於下茲謂誣君蒙微而小雨已乃大雨下相攘善茲謂盜明蒙黃濁下陳功求於上茲謂不知蒙微而赤風鳴條解復蒙下專刑茲謂分威蒙而日不得明大臣厭小臣茲謂蔽蒙微日不明若解不解大風發赤雲起而蔽日眾不惡惡茲謂閉蒙尊卦用事三日而起日不見漏言亡喜茲謂下厝用蒙微日無光有雨雲雨不降廢忠惑佞茲謂亡蒙天先清而暴蒙微而日不明有逸民茲謂不明蒙濁奪日光公不任職茲謂不絀蒙白三辰止則日青青而寒寒必雨忠臣進善君不試茲謂遏蒙先小雨雨已蒙起微而日不明惑眾在位茲謂覆國蒙微而日不明一溫一寒風揚塵知佞厚之茲謂庳蒙甚而溫君臣故弼茲謂悖厥災風雨霧風拔木亂五穀已而大霧庶正蔽惡茲謂生孽災厥異霧此皆陰雲之類云嚴公十八年秋有蜮劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人射人有處甚者至死南方謂之短弧近射妖死亡之象也時嚴將取齊之淫女故蜮至天戒若曰勿取齊女將生淫惑篡弒之禍嚴不寤遂取之入後淫於二叔二叔以死雨子見弒夫人亦誅劉歆以為蜮盛暑所生非自越來也京房易傳曰忠臣進善君不試厥咎國生蜮史記魯哀公時有隼集于陳廷而死楛矢貫之石砮長尺有咫陳閔公使使問仲尼仲尼曰隼之來遠矣昔武王克商通道百蠻使各以方物來貢肅慎貢楛矢石砮長尺有咫先王分異姓以遠方職使毋忘服故分陳以肅慎矢試求之故府果得之劉向以為隼近黑祥貪暴類也矢貫之近射妖也死於廷國亡表也象陳眊亂不服事周而行貪暴將致遠夷之禍為所滅也是時中國齊晉南夷吳楚為彊陳交晉不親附楚不固數被二國之禍後楚有白公之亂陳乘而侵之卒為楚所滅史記夏后氏之衰有二龍止於夏廷而言余襃之二君也夏帝卜殺之去之止之莫吉卜請其漦而藏之乃吉於是布幣策告之龍亡而漦在乃櫝去之其後夏亡傳櫝於殷周三代莫發至厲王末發而觀之漦流于廷不可除也厲王使婦人臝而譟之漦化為玄黿入後宮處妾遇之而孕生子懼而棄之宣王立女童謠曰檿弧萁服實亡周國後有夫婦鬻是器者宣王使執而僇之既去見處妾所棄妖子聞其夜號哀而收之遂亡奔襃後襃人有罪入妖子以贖是為襃姒幽王見而愛之生子伯服王廢申后及太子宜咎而立襃姒伯服代之廢后之父申侯與繒西畎戎共攻殺幽王詩曰赫赫宗周襃姒烕之劉向以為夏后季世周之幽厲皆誖亂逆天故有龍黿之怪近龍蛇孽也漦血也一曰沫也檿弧桑弓也萁服蓋以萁草為箭服近射妖也女童謠者禍將生於女國以兵寇亡也左氏傳昭公十九年龍鬭於鄭時門之外洧淵劉向以為近龍孽也鄭以小國攝乎晉楚之間重以彊吳鄭當其衝不能修德將鬭三國以自危亡是時子產任政內惠於民外善辭令以交三國鄭卒亡患能以德消變之效也京房易傳曰眾心不安厥妖龍鬭惠帝二年正月癸酉旦有兩龍見於蘭陵廷東里溫陵井中至乙亥夜去劉向以為龍貴象而困於庶人井中象諸侯將有幽執之禍其後呂太后幽殺三趙王諸呂亦終誅滅京房易傳曰有德遭害厥妖龍見井中又曰行刑暴惡黑龍從井出左氏傳魯嚴公時有內蛇與外蛇鬭鄭南門中內蛇死劉向以為近蛇孽也先是鄭厲公劫相祭仲而逐兄昭公代立後厲公出奔昭公復入死弟子儀代立厲公自外劫大夫傅瑕使僇子儀此外蛇殺內蛇之象也蛇死六年而厲公立嚴公聞之問申繻曰猶有妖乎對曰人之所忌其氣炎以取之妖由人興也人亡舋焉妖不自作人棄常故有妖京房易傳曰立嗣子疑厥妖蛇居國門鬭左氏傳文公十六年夏有蛇自泉宮出入于國如先君之數劉向以為近蛇孽也泉宮在囿中公母姜氏嘗居之蛇從之出象宮將不居也詩曰維虺維蛇女子之祥又蛇入國國將有女憂也如先君之數者公母將薨象也秋公母薨公惡之乃毀泉臺夫妖孽應行而自見非見而為害也文不改行循正共御厥罰而作非禮以重其過後二年薨公子遂殺文之二子惡視而立宣公文公夫人大歸于齊武帝太始四年七月趙有蛇從郭外入與邑中蛇鬭孝文廟下邑中蛇死後二年秋有衛太子事事自趙人江充起左氏傳定公十年宋公子地有白馬駟公嬖向魋欲之公取而朱其尾鬣以予之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫公弟辰謂地曰子為君禮不過出竟君必止子地出奔陳公弗止辰為之請不聽辰曰是我迋吾兄也吾以國人出君誰與處遂與其徒出奔陳明年俱入于蕭以叛大為宋患近馬禍也史記秦孝公二十一年有馬生人昭王二十年牡馬生子而死劉向以為皆馬禍也孝公始用商君攻守之法東侵諸侯至於昭王用兵彌烈其象將以兵革抗極成功而還自害也牡馬非生類妄生而死猶秦恃力彊得天下而還自滅之象也一景祐殿本都有一字曰諸畜生非其類子孫必有非其姓者至於始皇果呂不韋子京房易傳曰方伯分威厥妖牡馬生子亡天子諸侯相伐厥妖馬生人文帝十二年有馬生角於吳角在耳前上鄉右角長三寸左角長二寸皆大二寸劉向以為馬不當生角猶吳不當舉兵鄉上也是時吳王濞封有四郡五十餘城內懷驕恣變見於外天戒早矣王不寤後卒舉兵誅滅京房易傳曰臣易上政不順厥妖馬生角茲謂賢士不足又曰天子親伐馬生角成帝綏和三景祐殿本都作二二景祐殿本都作二年二月大廄馬生角在左耳前圍長各二寸是時王莽為大司馬害上之萌自此始矣哀帝建平二年定襄牡馬生駒三足隨群飲食太守以聞馬國之武用三足不任用之象也後侍中董賢年二十二為大司馬居上公之位天下不宗哀帝暴崩成帝母王太后召弟子新都侯王莽入收賢印綬賢恐自殺莽因代之並誅外家丁傅又廢哀帝傅皇后令自殺發掘帝祖母傅太后母丁太后陵更以庶人葬之辜及至尊大臣微弱之禍也文公十一年敗狄于鹹穀梁公羊傳曰長狄兄弟三人一者之魯一者之齊一者之晉皆殺之身橫九畮斷其首而載之眉見於軾何以書記異也劉向以為是時周室衰微三國為大可責者也天戒若曰不行禮義大為夷狄之行將至危亡其後三國皆有篡弒之禍近下人伐上之痾也劉歆以為人變屬黃祥一曰屬臝蟲之孽一曰天地之性人為貴凡人為變皆屬皇極下人伐上之痾云京房易傳曰君暴亂疾有道厥妖長狄入國又曰豐其屋下獨苦長狄生世主虜史記秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見于臨洮天戒若曰勿大為夷狄之行將受其禍是歲始皇初并六國反喜以為瑞銷天下兵器作金人十二以象之遂自賢聖燔詩書阬儒士奢淫暴虐務欲廣地南戍五嶺北築長城以備胡越塹山填谷西起臨洮東至遼東徑數千里故大人見於臨洮明禍亂之起後十四年而秦亡亡自戍卒陳勝發史記魏襄王十三年魏有女子化為丈夫京房易傳曰女子化為丈夫茲謂陰昌賤人為王丈夫化為女子茲謂陰勝厥咎亡一曰男化為女宮刑濫也女化為男婦政行也哀帝建平中豫章有男子化為女子嫁為人婦生一子長安陳鳳言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子者景祐殿本都有者字將復一世乃絕哀帝建平四年四月山陽方與女子田無嗇生子先未生二月兒嗁腹中及生不舉葬之陌上三日人過聞嗁聲母掘收養平帝元始元年二月朔方廣牧女子趙春病死斂棺積六日出在棺外自言見夫死父曰年二十七不當死太守譚以聞京房易傳曰幹父之蠱有子考亡咎子三年不改父道思慕不皇亦重見先人之非不則為私厥妖人死復生一曰至陰為陽下人為上六月長安女子有生兒兩頭異頸面相鄉四臂共匈俱前鄉凥上有目長二寸所京房易傳曰睽孤見豕負塗厥妖人生兩頭下相攘善妖亦同人若六畜首目在下茲謂亡上正將變更凡妖之作以譴失正各象其類二首下不壹也足多所任邪也足少下不勝任或不任下也凡下體生於上不敬也上體生於下媟瀆也生非其類淫亂也人生而大上速成也生而能言好虛也群妖推此類不改乃成凶也, WYG: ''}
  - {type: variant, offset: 17543, length: 16845, content: 也天之戒人蚤矣諸侯不寤後六年吳楚畔濟南膠西膠東三國應之舉兵至齊齊王猶與城守三國圍之會漢破吳楚因誅四王故天狗下梁而吳楚攻梁狗生角於齊而三國圍齊漢卒破吳楚於梁誅四王於齊京房易傳曰執政失下將害之厥妖狗生角君子苟免小人陷之厥妖狗生角景帝三年二月邯鄲狗與彘交悖亂之氣近犬豕之禍也是時趙王遂悖亂與吳楚謀為逆遣使匈奴求助兵卒伏其辜犬兵革失眾之占豕北方匈奴之象逆言失聽交於異類以生害也京房易傳曰夫婦不嚴厥妖狗與豕交茲謂反德國有兵革成帝河平元年長安男子石良劉音相與同居有如人狀在其室中擊之為狗走出去後有數人被甲持兵弩至良家良等格擊或死或傷皆狗也自二月至六月乃止鴻嘉中狗與彘交左氏昭公二十四年十月癸酉王子鼂以成周之寶圭湛于河幾以獲神助甲戌津人得之河上陰不佞取將賣之則為石是時王子鼂篡天子位萬民不鄉號令不從故有玉變近白祥也癸酉入而甲戌出神不享之驗云玉化為石貴將為賤也後二年子鼂犇楚而死史記秦始皇帝三十六年鄭客從關東來至華陰望見素車白馬從華山上下知其非人道住止而待之遂至持璧與客曰為我遺鎬池君因言今年祖龍死忽不見鄭客奉璧即始皇二十八年過江所湛璧也與周子鼂同應是歲石隕于東郡民或刻其石曰始皇死而地分此皆白祥炕陽暴虐號令不從孤陽獨治群陰不附之所致也一曰石陰類也陰持高節臣將危君趙高李斯之象也始皇不畏戒自省反夷滅其旁民而燔燒其石是歲始皇死後三年而秦滅孝昭元鳳三年正月泰山萊蕪山南匈匈有數千人聲民視之有大石自立高丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁眭孟以為石陰類下民象泰山岱宗之嶽王者易姓告代之處當有庶人為天子者孟坐伏誅京房易傳曰復崩來無咎自上下者為崩厥應泰山之石顛而下聖人受命人君虜又曰石立如人庶士為天下雄立文於山同姓平地異姓立於水聖人於澤小人天漢元年三月天雨白毛三年八月天雨白氂京房易傳曰前樂後憂厥妖天雨羽又曰邪人進賢人逃天雨毛史記周威烈王二十三年九鼎震金震木動之也是時周室衰微刑重而虐號令不從以亂金氣鼎者宗廟之寶器也宗廟將廢寶鼎將遷故震動也是歲晉三卿韓魏趙篡晉君而分其地威烈王命以為諸侯天子不恤同姓而爵其賊臣天下不附矣後三世周致德祚於秦其後秦遂滅周而取九鼎九鼎之震木沴金失眾甚成帝元延元年正月長安章城門門牡自亡函谷關次門牡亦自亡京房易傳曰飢而不損茲謂泰厥災水厥咎牡亡妖辭曰關動牡飛辟為亡道臣為非厥咎亂臣謀篡故谷永對曰章城門通路寢之路函欲關距山東之險城門關守國之固固將去焉故牡飛也傳曰視之不明是謂不悊厥咎舒厥罰恆奧厥極疾時則有草妖時則有羸蟲之孽時則有羊禍時則有目痾時則有赤眚赤祥惟水沴火視之不明是謂不悊悊知也詩云爾德不明以亡陪亡卿不明爾德以亡背亡仄言上不明暗昧蔽惑則不能知善惡親近習長同類亡功者受賞有罪者不殺百官廢亂失在舒緩故其咎舒也盛夏日長暑以養物政弛緩故其罰常奧也奧則冬溫春夏不和傷病民人故極疾也誅不行則霜不殺草繇臣下則殺不以時故有草妖凡妖貌則以服言則以詩聽則以聲視則以色者五色物之大分也在於眚祥故聖人以為草妖失秉之明者也溫奧生蟲故有羸蟲之孽謂螟螣之類當死不死未當生而生或多於故而為災也劉則歆以為屬思心不容於易剛而包柔為離離為火為目羊上角下號景祐殿本都作蹏蹏景祐殿本都作蹏剛而包柔羊大目而不精明視氣毀故有羊禍一曰暑歲羊多疫死及為怪亦是也及人則多病目者故有目痾火色赤故有赤眚赤祥凡視傷者病火氣火氣傷則水沴之其極疾者順之其福曰壽劉歆視傳曰有羽蟲之蘖雞禍說以為於天文南方喙為鳥星故為羽蟲禍亦從羽故為雞雞於易自在巽說非是庶徵之恆奧劉向以為春秋亡冰也小奧不書無冰然後書舉其大者也京房易傳曰祿不遂行茲謂欺厥咎奧雨雪四至而溫臣安祿樂逸茲謂亂奧而生蟲知罪不誅茲謂舒其奧夏則暑殺人冬則物華實重過不誅茲謂亡徵其咎當寒而奧六日也桓公十五年春亡冰劉向以為周春今冬也先是連兵鄰國三戰而再敗也內失百姓外失諸侯不敢行誅罰鄭伯突篡兄而立公與相親長養同類不明善惡之罰也董仲舒以為象夫人不正陰失節也成公元年二月無冰董仲舒以為方有宣公之喪君臣無悲哀之心而炕陽作丘甲劉向以為時公幼弱政舒緩也襄公二十八年春無冰劉向以為先是公作三軍有侵陵用武之意於是鄰國不和伐其三鄙被兵十有餘年因之以饑饉百姓怨望臣下心離公懼而弛緩不敢行誅罰楚有夷狄行公有從楚心不明善惡之應董仲舒指略同一曰水旱之災寒暑之變天下皆同故曰無冰天下異也桓公殺兄弒君外成宋亂與鄭易邑背畔周室成公時楚橫行中國王札子殺召伯毛伯晉敗天子之師于貿戎天子皆不能討襄公時天下諸侯之大夫皆執國權君不能制漸將日甚善惡不明誅罰不行周失之舒秦失之急故周衰亡寒歲秦滅亡奧年武帝元狩六年冬亡冰先是比年遣大將軍衛青霍去病攻祁連絕大幕窮追單于斬首十餘萬級還大行慶賞乃閔海內勤勞是歲遣博士褚大等六人持節巡行天下存賜鰥寡假與乏困舉遺逸獨行君子詣行在所郡國有以為便宜者上丞相御史以聞天下咸喜昭帝始元二年冬亡冰是時上年九歲大將軍霍光秉政始行寬緩欲以說下僖公三十三年十二月隕霜不殺草劉歆以為草妖也劉向以為今十月周十二月於易五為天位為景祐本無下為字君位九月陰氣至五通於天位其卦為剝剝落萬物始大殺矣明陰從陽命臣受君令而後殺也今十月隕霜而不能殺草此君誅不行舒緩之應也是時公子遂顓權三桓始世官天戒若曰自此之後將皆為亂矣文公不寤其後遂殺子赤三家逐昭公董仲舒指略同京房易傳曰臣有緩茲謂不順厥異霜不殺也書序曰伊涉景祐殿局本都作陟王先謙說作陟是陟景祐殿局本都作陟王先謙說作陟是相太戊亳有祥桑穀共生傳曰俱生乎朝七日而大拱伊陟戒以修德而木枯劉向以為殷道既衰高宗承敝而起盡涼陰之哀天下應之既獲顯榮怠於政事國將危亡故桑穀之異見桑猶喪也穀猶生也殺生之秉失而在下近草妖也一曰野木生朝而暴長小人將暴在大臣之位危亡國家象朝將為虛之應也書序又曰高宗祭成湯有蜚雉登鼎耳而雊祖己曰惟先假王正厥事劉向以為雉雊鳴者雄也以赤色為主於易離為雉雉南方近赤祥也劉歆以為羽蟲之孽易有鼎卦鼎宗廟之器主器奉宗廟者長子也野鳥自外來入為宗廟器主是繼嗣將易也一曰鼎三足三公象而以耳行野鳥居鼎耳小人將居公位敗宗廟之祀野木生朝野鳥入廟敗亡之異也武丁恐駭謀於忠賢修德而正事內舉傅說授以國政外伐鬼方以安諸夏故能攘木鳥之妖致百年之壽所謂六沴作見若是共御五福乃降用章于下者也一曰金沴木曰木不曲直僖公三十三年十二月李梅實劉向以為周十二月今十月也李梅當剝落今反華實近草妖也先華而後實不書華舉重者也陰成陽事象臣顓君作威福一曰冬當殺反生象驕臣當誅不行其罰也故冬華王念孫說景祐本作故冬華者是也華字不宜疊華者象臣邪謀有端而不成至於實則成矣是時僖公死公子遂顓權文公不寤後有子赤之變一曰君舒緩甚奧氣不臧則華實復生董仲舒以為李梅實臣下彊也記曰不當華而華易大夫不當實而實易相室冬水王木相故象大臣劉歆以為庶徵皆以蟲為孽思心蠃蟲茱也李梅實屬草妖惠帝五年十月桃李華棗實昭帝時上林苑中大柳樹斷仆地一朝起立生枝葉有蟲食其葉成文字曰公孫病已立又昌邑王國社有枯樹復生枝葉眭孟以為木陰類下民象當有故廢之家公孫氏從民間受命為天子者昭帝富於春秋霍光秉政以孟妖言誅之後昭帝崩無子徵昌邑王賀嗣位狂亂失道光廢之更立昭帝兄衛太子之孫是為宣帝帝本名病已京房易傳曰枯楊生稊枯木復生人君亡子元帝初元四年皇后曾祖父濟南東平陵王伯墓門梓柱卒生枝葉上出屋劉向以為王氏貴盛將代漢家之象也後王莽篡位自說之曰初元四年莽生之歲也當漢九世火德之厄而有此祥興於高祖考之門門為開通梓猶子也言王氏當有賢子開通祖統起於柱石大臣之位受命而王之符也建昭五年兗州刺史浩賞禁民私所自立社山陽橐茅鄉社有大槐樹吏伐斷之其夜樹復立其故處成帝永始元年二月河南街郵樗樹生支如人頭眉目須皆具亡髮耳哀帝建平三年十月汝南西平遂陽鄉柱仆地生支如人形身青黃色面白頭有頿髮稍長大凡長六寸一分京房易傳曰王德衰下人將起則有木生為人狀哀帝建平三年零陵有樹僵地圍丈六尺長十丈七尺民斷其本長九尺餘皆枯三月樹卒自立故處京房易傳曰棄正作淫厥妖木斷自屬妃后有顓木仆反立斷枯復生天辟惡之元帝永光二年八月天雨草而葉相摎結大如彈丸平帝元始三年正月天雨草狀如永光時京房易傳曰君吝於祿信衰賢去厥妖天雨草昭公二十五年夏有鸜鵒來巢劉歆以為羽蟲之孽其色黑又黑祥也視不明聽不聰之罰也劉向以為有蜚有蜮不言來者氣所生所謂眚也鸜鵒言來者氣所致所謂祥也鸜鵒夷狄穴藏之禽來至中國不穴而巢陰居陽位象季氏將逐昭公去宮室而居外野也鸜鵒白羽旱之祥也穴居而好水黑色為主急之應也天戒若曰既失眾不可急暴急暴陰將持節陽以逐爾去宮室而居外野矣昭不寤而舉兵圍季氏為季氏所敗出犇于齊遂死于外野董仲舒指略同景帝三年十一月有白頸烏與黑烏群鬭楚國呂縣白頸不勝墮泗水中死者數千劉向以為近白黑祥也時楚王戊暴逆無道刑辱申公與吳王謀反烏群鬭者師戰之象也白頸者小明小者敗也墮於水者將死水地王戊不寤遂舉兵應吳與漢大戰兵敗而走至於丹徒為越人所斬墮死於水之效也京房易傳曰逆親親厥妖白黑烏鬭於國昭帝元鳳元年有烏與鵲鬭燕王宮中池上烏墮池死近黑祥也時燕王旦謀為亂遂不改寤伏辜而死楚燕皆骨肉藩臣以驕怨而謀逆俱有烏鵲鬭死之祥行同而占合此天人之明表也燕一烏鵲鬭於宮中而黑者死楚以萬數鬭於野外而白者死象燕陰謀未發獨王自殺於宮故一烏水色者死楚炕陽舉兵軍師大敗於野故眾烏金色者死天道精微之效也京房易傳曰專征劫殺厥妖烏鵲鬭昭帝時有鵜鶦或曰禿鶖集昌邑王殿下王使人射殺之劉向以為水鳥色青青祥也時王馳騁無度慢侮大臣不敬至尊有服妖之象故青祥見也野鳥入處宮室將空王不寤卒以亡京房易傳曰辟退有德厥咎狂厥妖水鳥集于國中成帝河平元年二月庚子泰山山桑谷有䳒焚其巢男子孫通等聞山中群鳥䳒鵲聲往視見巢㸐盡墮地中有三䳒鷇燒死樹大四圍巢去地五丈五尺太守平以聞䳒色黑近黑祥貪虐之類也易曰鳥焚其巢旅人先笑後號咷泰山岱宗五嶽之長王者易姓告代之處也天戒若曰勿近貪虐之人聽其賊謀將生焚巢自害其子絕世易姓之禍其後趙蜚燕得幸立為皇后弟為昭儀姊妹專寵聞後宮許美人曹偉能生皇子也昭儀大怒令上奪取而殺之皆并殺其母成帝崩昭儀自殺事乃發覺趙后坐誅此焚巢殺子後號咷之應也一曰王莽貪虐而任社稷之重卒成易姓之禍云京房易傳曰人君暴虐鳥焚其舍鴻嘉二年三月博士行大射禮有飛雉集于庭歷階登堂而雊後雉又集太常宗正丞相御史大夫大司馬車騎將軍之府又集未央宮承明殿屋上時大司馬車騎將軍王音待詔寵等上言天地之氣以類相應譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣經載高宗雊雉之異以明轉禍為福之驗今雉以博士行禮之日大眾聚會飛集於庭歷階登堂萬眾睢睢驚怪連日徑歷三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖德如此者左右阿諛甚眾不待臣音復讇而足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先受誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出泆行流聞海內傳之甚於京師外有微行之害內有疾病之憂皇天數見災異欲人變更終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有高祖天下當以誰屬乎宜謀於賢知克己復禮以求天意繼嗣可立災變尚可銷也成帝綏和二年三月天水平襄有燕生爵哺食至大俱飛去京房易傳曰賊臣在國厥咎燕生銷一曰生非其類子不嗣也史記魯定公時季桓子穿井中得蟲若羊近羊禍也羊者地上之物幽於土中象定公不用孔子而聽季氏暗昧不明之應也一曰羊去野外而拘土缶者象魯君失其所而拘於季氏季氏亦將拘於家臣也是歲季氏家臣陽虎囚季桓子後三年陽虎劫公伐孟氏兵敗竊寶玉大弓而出亡左氏傳魯襄公時宋有生女子赤而毛棄之隄下宋平公母共姬之御者見而收之因名曰棄長而美好納之平公生子曰佐後宋臣伊戾讒太子痤而殺之先是大夫華元出奔晉華弱奔魯華臣奔陳華合比奔衛劉向以為時則火災赤眚之明應也京房易傳曰尊卑不別厥妖女生赤毛惠帝二年天雨血於宜陽一頃所劉向以為赤眚也時又冬雷桃李華常奧之罰也是時政舒緩諸呂用事讒口妄行殺三皇子建立非嗣及不當立之王退王陵趙堯周昌呂太后崩大臣共誅滅諸呂僵尸流血京房易傳曰歸獄不解茲謂追非厥咎天雨血茲謂不親民有怨心不出三年無其宗人又曰佞人祿功臣僇天雨血哀帝建平四年四月山陽湖陵雨血廣三尺長五尺大者如錢小者如麻子後二年帝崩王莽擅朝誅貴戚丁傅大臣董賢等皆放徙遠方與諸呂同眾景祐殿本都作象朱一新說作象是象景祐殿本都作象朱一新說作象是誅死者少雨血亦少傳曰聽之不聰是謂不謀厥咎急厥罰恆寒厥極貧時則有鼓妖時則有魚孽時則有豕禍時則有耳痾時則有黑眚黑祥惟火沴水聽之不聰是謂不謀言上偏聽不聰下情隔塞則不能謀慮利害失在嚴急故其咎急也盛冬日短寒以殺物政促迫故其罰常寒也寒則不生百穀上下俱貧故其極貧也君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖寒氣動故有魚孽而以龜為孽龜能陸處非極陰也魚去水而死極陰之孽也於易坎為豕豕大耳而不聰察聽氣毀故有豕禍也一曰寒歲豕多死及為怪亦是也及人則多病耳者故有耳痾水色黑故有黑眚黑祥凡聽傷者病水氣水氣病則火沴之其極貧者順之其福曰富劉歆聽傳曰有介蟲孽也庶徵之恆寒劉向以為春秋無其應周之末世舒緩微弱政在臣下奧煖而已故籍秦以為驗秦始皇帝即位尚幼委政太后太后淫於呂不韋及嫪毐封毐為長信侯以太原郡為毐國宮室苑囿自恣政事斷焉故天冬雷以見陽不禁閉以涉危害舒奧迫近之變也始皇既冠毐懼誅作亂始皇誅之斬首數百級大臣二十人皆車裂以徇夷滅其宗遷四千餘家於房陵是歲四月寒民有凍死者數年之間緩急如此寒奧輒應此其效也劉歆以為大雨雪及未當雨雪而雨雪及大雨雹隕霜殺叔草皆常寒之罰也劉向以為常雨屬貌不恭京房易傳曰有德遭險茲謂逆命厥異寒誅過深當奧而寒盡六日亦為雹害正不誅茲謂養賊寒七十二日殺蜚禽道人始去茲謂傷其寒物無霜而死涌水出戰不量敵茲謂辱命其寒雖雨物不茂聞善不予厥咎聾桓公八年十月雨雪周十月今八月也未可以雪劉向以為時夫人有淫齊之行而桓有妬媚景祐殿局本都作媢葉德輝說作媢是媢景祐殿局本都作媢葉德輝說作媢是之心夫人將殺其象見也桓不覺寤後與夫人俱如齊而殺死凡雨陰也雪又雨之陰也出非其時迫近象也董仲舒以為象大景祐殿本都作夫王先謙說作夫是夫景祐殿本都作夫王先謙說作夫是人專恣陰氣盛也釐公十年冬大雨雪劉向以為先是釐公立妾為夫人陰居陽位陰氣盛也公羊經曰大雨雹董仲舒以為公脅於齊桓公立妾為夫人不敢進群妾故專壹之象見諸雹皆為有所漸脅也行專壹之政云昭公四年正月大雨雪劉向以為昭取於吳而為同姓謂之吳孟子君行於上臣非於下又三家已彊皆賤公行慢侮之心生董仲舒以為季孫宿任政陰氣盛也文帝四年六月大雨雪後三歲淮南王長謀反發覺遷道死京房易傳曰夏雨雪戒臣為亂景帝中六年三月雨雪其六月匈奴入上郡取苑馬吏卒戰死者二千餘人明年條侯周亞夫下獄死武帝元狩元年十二月大雨雪民多凍死是歲淮南衡山王謀反發覺皆自殺使者行郡國治黨與坐死者數萬人元鼎二年三月雪平地厚五尺是歲御史大夫張湯有罪自殺丞相嚴青翟坐與三長史謀陷湯青翟自殺三長史皆棄市元鼎三年三月水冰四月雨雪關東十餘郡人相食是歲民不占緡錢有告者以半畀之元帝建昭二年十一月齊楚地大雪深五尺是歲魏郡太守京房為石顯所告坐與妻父淮陽王舅張博博弟光勸視淮陽王以不義博要斬光房棄市御史大夫鄭弘坐免為庶人成帝即位顯伏辜淮陽王上書冤博辭語增加家屬徙者復得還建昭四年三月雨雪燕多死谷永對曰皇后桑蠶以治祭服共事天地宗廟正以是日疾風自西北大寒雨雪壞敗其功以章不鄉宜齊戒辟寢以深自責請皇后就宮鬲閉門戶毋得擅上且令眾妾人人更進以時博施皇天說喜庶幾可以得賢明之嗣即不行臣言災異俞甚天變成形臣雖欲復捐身關策不及事已其後許后坐祝詛廢陽朔四年四月雨雪燕雀死後十六年許皇后自殺定公元年十月隕霜殺菽劉向以為周十月今八月也消卦為觀陰氣未至君位而殺誅罰不由君出在臣下之象也是時季氏逐昭公公死于外定公得立故天見災以視公也釐公二年十月隕霜不殺草為嗣君微失秉事之象也其後卒在臣下則災為之生矣異故言草災故言菽重殺穀一曰菽草之難殺者也言殺菽知草皆死也言不殺草知菽亦不死也董仲舒以為菽草之彊者天戒若曰加誅於彊臣言菽以微見季氏之罰也武帝元光四年四月隕霜殺草木先是二年遣五將軍三十萬眾伏馬邑下欲襲單于單于覺之而去自是始征伐四夷師出三十餘年天下戶口減半京房易傳曰興兵妄誅茲謂亡法厥災霜夏殺五穀冬殺麥誅不原情茲謂不仁其霜夏先大雷風冬先雨乃隕霜有芒角賢聖遭害其霜附木不下地佞人依刑茲謂私賊其霜在草根土隙間不教而誅茲謂虐其霜反在草下元帝永光元年三月隕霜殺桑九月二日隕霜殺稼天下大飢是時中書令石顯用事專權與春秋定公時隕霜同應成帝即位顯坐作威福誅釐公二十九年秋大雨雹劉向以為盛陽雨水溫煖而湯熱陰氣脅之不相入則轉而為雹盛陰雨雪凝滯而冰寒陽氣薄之不相入則散而為霰故沸湯之在閉器而湛於寒泉則為冰及雪之銷亦冰解而散此其驗也故雹者陰脅陽也霰者陽脅陰也春秋不書霰者猶月食也釐公末年信用公子遂遂專權自恣將至於殺君故陰脅陽之象見釐公不寤遂終專權後二年殺子赤立宣公左氏傳曰聖人在上無雹雖有不為災說曰凡物不為災不書書大言為災也凡雹皆冬之愆陽夏之伏陰也昭公三年大雨雹是時季氏專權脅君之象見昭公不寤後季氏卒逐昭公元封三年十二月雷雨雹大如馬頭宣帝地節四年五月山陽濟陰雨雹如雞子深二尺五寸殺二十人蜚鳥皆死其十月大司馬霍禹宗族謀反誅霍皇后廢成帝河平二年四月楚國雨雹大如斧蜚鳥死左傳曰釐公三十二年十二月己卯晉文公卒庚辰將殯于曲沃出絳柩有聲如牛劉向以為近鼓妖也喪凶事聲如牛怒象也將有急怒之謀以生兵革之禍是時秦穆公遣兵襲鄭而不假道還晉大夫先軫謂襄公曰秦師過不假塗請擊之遂要崤阸以敗秦師匹馬觭輪無反者操之急矣晉不惟舊而聽虐謀結怨彊國四被秦寇禍流數世凶惡之效也哀帝建平二年四月乙亥朔御史大夫朱博為丞相少府趙玄為御史大夫臨延登受策有大聲如鍾鳴殿中郎吏陛者皆聞焉上以問黃門侍郎揚雄李尋尋對曰洪範所謂鼓妖者也師法以為人君不聰為眾所惑空名得進則有聲無形不知所從生其傳曰歲月日之中則正卿受之今以四月日加辰巳有異是為中焉正卿謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自蒙其咎揚雄亦以為鼓妖聽失之象也朱博為人彊毅多權謀宜將不宜相恐有凶惡亟疾之怒八月博玄坐為姦謀博自殺玄減死論京房易傳曰令不修本下不安金毋故自動若有音史記秦二世元年天無雲而雷劉向以為雷當託於雲猶君託於臣陰陽之合也二世不恤天下萬民有怨畔之心是歲陳勝起天下畔趙高作亂秦遂以亡一曰易震為雷為貌不恭也史記秦始皇八年河魚大上劉向以為近魚孽也是歲始皇弟長安君將兵擊趙反死屯留軍吏皆斬遷其民於臨洮明年有嫪毒景祐殿本都作毐此誤毐景祐殿本都作毐此誤之誅魚陰類民之象逆流而上者民將不從君令為逆行也其在天文魚星中河而處車騎漢野至于二世暴虐愈甚終用急亡京房易傳曰眾逆同志厥妖河魚逆流上武帝元鼎五年秋蛙與蝦蟆群鬭是歲四將軍眾十萬征南越開九郡成帝鴻嘉四年秋雨魚于信都長五寸以下成帝永始元年春北海出大魚長六丈高一丈四枚哀帝建平三年東萊平度出大魚長八丈高丈一尺七枚皆死京房易傳曰海數見巨魚邪人進賢人疏桓公五年秋螽劉歆以為貪虐取民則螽介蟲之孽也與魚同占劉向以為介蟲之孽屬言不從是歲公獲二國之聘取鼎易邑興役起城諸螽略皆從董仲舒說云嚴公二十九年有蜚劉歆以為負蠜也性不食穀食穀為災介蟲之孽劉向以為蜚色青近青眚也非中國所有南越盛暑男女同川澤淫風所生為蟲臭惡是時嚴公取齊淫女為夫人既入淫於兩叔故蜚至天戒若曰今誅絕之尚及不將生臭惡聞於四方嚴不寤其後夫人與兩叔作亂二嗣以殺卒皆被辜董仲舒指略同釐公十五年八月螽劉向以為先是釐有鹹之會後城緣陵是歲復以兵車為牡丘會使公孫敖帥師及諸侯大夫救徐兵比三年在外文公三年秋雨螽于宋劉向以為先是宋殺大夫而無罪有暴虐賦斂之應穀梁傳曰上下皆合言甚董仲舒以為宋三世內取大夫專恣殺生不中故螽先死而至劉歆以為螽為穀災卒遇賊陰墜而死也八年十月螽時公伐邾取須朐城郚宣公六年八月螽劉向以為先是時宣伐莒向後比再如齊謀伐萊十三年秋螽公孫歸父會齊伐莒十五年秋螽宣亡熟歲數有軍旅襄公七年八月螽劉向以為先是襄興師救陳滕子郯子小邾子皆來朝夏城費哀公十二年十二月螽是時哀用田賦劉向以為春用田賦冬而螽十三年九月螽十二月螽比三螽虐取於民之效也劉歆以為周十二月夏十月也火星既伏蟄蟲皆畢天之見變因物類之宜不得以螽是歲再失閏矣周九月夏七月故傳曰火猶西流司曆過也宣公十五年冬蝝生劉歆以為蝝螕蠹之有翼者食穀為災黑眚也董仲舒劉向以為蝝螟始生也一曰螟葉德輝說螟為蝗之誤既云一曰則非螟明矣蝗葉德輝說螟為蝗之誤既云一曰則非螟明矣始生是時民患上力役解於公田宣是時初稅畝稅畝就民田畝擇美者稅其什一亂先王制而為貪利故應是而蝝生屬蠃蟲之孽景帝中三年秋蝗先是匈奴寇邊中尉不害將車騎材官士屯代高柳武帝元光五年秋螟六年夏蝗先是五將軍眾三十萬伏馬邑欲襲單于也是歲四將軍征匈奴元將五年秋蝗是歲四將軍征南越及西南夷開十餘郡元封六年秋蝗先是雨將軍征朝鮮開三郡太初元年夏蝗從東方蜚至敦煌三年秋復蝗元年貳師將軍征大宛天下奉其役連年征和三年秋蝗四年夏蝗先是一年三將軍眾十餘萬征匈奴征和三年貳師七萬人沒不還平帝元始二年秋蝗徧天下是時王莽秉政左氏傳曰嚴公八年齊襄公田于貝丘見豕從者曰公子彭生也公怒曰射之豕人立而嗁公懼墜車傷足喪屨劉向以為近豕禍也先是齊襄淫於妹魯桓公夫人使公子彭生殺威景祐殿本都作桓桓景祐殿本都作桓公又殺彭生以謝魯公孫無知有寵於先君襄公絀之無知帥怨恨之徒攻襄於田所襄匿其戶間足見於戶下遂殺之傷足喪屨卒死於足虐急之效也昭帝元鳳元年燕王宮永巷中豕出圂壞都竈銜其鬴六七枚置殿前劉向以為近豕禍也時燕王旦與長公主左將軍謀為大逆誅殺諫者暴急無道竈者生養之本豕而敗竈陳鬴於庭鬴竈將不用宮室將廢辱也燕王不改卒伏其辜京房易傳曰眾心不安君政厥妖豕入居室史記魯襄公二十三年穀洛水鬭將毀王宮劉向以為近火沴水也周靈王將擁之有司諫曰不可長民者不崇藪不墮山不防川不竇澤今吾執政毋乃有所辟而滑夫二川之神使至于爭明以防王宮室王而飾之毋乃不可乎懼及子孫王室愈卑王卒擁之以傳推之以四瀆比諸侯穀洛其次卿大夫之象也為卿大夫將分爭以危亂王室也是時世卿專權儋括將有篡殺之謀如靈王覺寤匡其失政懼以承戒則災禍除矣不聽諫謀簡嫚大異任其私心塞埤擁下以逆水勢而害鬼神後數年有黑如日者五是歲蚤霜靈王崩景王立二年儋括欲殺王而立王弟佞夫佞夫不知景王并誅佞夫及景王死五大夫爭權或立子猛或立子朝王室大亂京房易傳曰天子弱諸侯力政厥異水鬭史記曰秦武王三年渭水赤者三日昭王三十四年渭水又赤三日劉向以為近火沴水也秦連相坐之法棄灰於道者黥罔密而刑虐加以武伐橫出殘賊鄰國至於變亂五行氣色謬亂天戒若曰勿為刻急將致敗亡秦遂不改至始皇滅六國二世而亡昔三代居三河河洛出圖書秦居渭陽而渭水數赤瑞異應德之效也京房易傳曰君湎于酒淫于色賢人潛國家危厥異流水赤也傳曰思心之不䜭是謂不聖厥咎霿厥罰恆風厥極凶短折時則有脂夜之妖時則有華孽時則有牛禍時則有心腹之痾時則有黃眚黃祥時則有金木水火沴土思心之不䜭是謂不聖思心者心思慮也䜭寬也孔子曰居上不寬吾何以觀之哉言上不寬大包容臣下則不能居聖位貌言視聽以心為主四者皆失則區霿無識故其咎霿也雨旱寒奧亦以風為本四氣皆亂故其罰常風也常風傷物故其極凶短折也傷人曰凶禽獸曰短屮木曰折一曰凶夭也兄喪弟曰短父喪子曰折在人腹中肥而包裹心者脂也心區霿則冥晦故有脂夜之妖一曰有脂物而夜為妖若脂水夜汙人衣淫之象也一曰夜妖者雲風並起而杳冥故與常風同象也溫而風則生螟螣有裸蟲之孽劉向以為於易巽為風為木卦在三月四月繼陽而治主木之華實風氣盛至秋冬木復華故有華孽一曰地氣盛則秋冬復華一曰華者色也土為內事為女孽也於易坤為土為牛牛大心而不能思慮思心氣毀故有牛禍一曰牛多死及為怪亦是也及人則多病心腹者故有心腹之痾土色黃故有黃眚黃祥凡思心傷者病土氣土氣病則金木水火沴之故曰時則有金木水火沴土不言惟而獨曰時則有者非一衝氣所沴明其異大也其極曰凶短折順之其福曰考終命劉歆思心傳曰時則有臝蟲之孽謂螟螣之屬也庶徵之常風劉向以為春秋無其應釐公十六年正月六鶂退蜚過宋都左氏傳風也劉歆以為風發於它所至宋而高鶂高蜚而逢之則退經以見者為文故記退蜚傳以實應著言風常風之罰也象宋襄公區霿自用不容臣下逆司馬子魚之諫而與彊楚爭盟後六年為楚所執應六鶂之數云京房易傳曰潛龍勿用眾逆同志至德乃潛厥異風其風也行不解物不長雨小而傷政悖德隱茲謂亂厥風先風不雨大風暴起發屋折木守義不進茲謂耄厥風與雲俱起折五穀莖臣易上政茲謂不順厥風大焱發屋賦斂不理茲謂禍厥風絕經紀殿局本都作緯王先謙說據注文作緯是緯殿局本都作緯王先謙說據注文作緯是止即溫溫即蟲侯專封茲謂不統厥風疾而樹不搖穀不成辟不思道利茲謂無澤厥風不搖木旱無雲傷禾公常於利茲謂亂厥風微而溫生蟲蝗害五穀棄正作淫茲謂惑厥風溫螟蟲起害有益人之物侯不朝茲謂叛厥風無恆地變赤而殺人文帝二年六月淮南王都壽春大風毀民室殺人劉向以為是歲南越反攻淮南邊淮南王長破之後年入朝殺漢故丞相辟陽侯上赦之歸聚姦人謀逆亂自稱東帝見異不寤後遷于蜀道死廱文帝五年吳暴風雨壞城官府民室時吳王濞謀為逆亂天戒數見終不改寤後卒誅滅五年十月楚王都彭城大風從東南來毀市門殺人是月王戊初嗣立後坐淫削國與吳王謀反刑僇諫者吳在楚東南天戒若曰勿與吳為惡將敗市朝王戊不寤卒隨吳亡昭帝元鳳元年燕王都薊大風雨拔宮中樹七圍以上十六枚壞城樓燕王旦不寤謀反發覺卒伏其辜釐公十五年九月己卯晦震夷伯之廟劉向以為晦暝也震雷也夷伯世大夫正書景祐殿本都作晝王先謙說作晝是晝景祐殿本都作晝王先謙說作晝是雷其廟獨冥天戒若曰勿使大夫世官將專事暝晦明年公子季友卒果世官政在季氏至成公十六年六月甲午晦正晝皆暝陰為陽臣制君也成公不寤其冬季氏殺公子偃季氏萌於釐公大於成公此其應也董仲舒以為夷伯季氏之孚也陪臣不當有廟震者雷也晦暝雷擊其廟明當絕去僭差之類也向又以為此皆所謂夜妖者也劉歆以為春秋及朔言朔及晦言晦人道所不及則天震之展氏有隱慝故天加誅於其祖夷伯之廟以譴告之也成公十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵皆月晦云隱公五年秋螟董仲舒劉向以為時公觀漁于棠貪利之應也劉歆以為又逆臧釐伯之諫貪利區霧以生臝蟲之孽也八年九月螟時鄭伯以邴將易許田有貪利心京房易傳曰臣安祿茲謂貪厥災蟲蟲食根德無常茲謂煩蟲食葉不絀無德蟲食本與東作爭茲謂不時蟲食節蔽惡生孽蟲食心嚴公六年秋螟董仲舒劉向以為先是衛侯朔出奔齊齊侯會諸侯納朔許諸侯賂齊人歸衛寶魯受之貪利應也文帝後六年秋螟是歲匈奴大入上郡雲中烽火通長安遣三將軍屯邊三將軍屯京師宣公三年郊牛之口傷改卜牛牛死劉向以為近牛禍也是時宣公與公子遂謀共殺子赤而立又以喪娶區霿昏亂亂成於口幸有季文子得免於禍天猶惡之生則不饗其祀死則災燔其廟董仲舒指略同秦孝文王五年斿朐衍有獻五足牛者劉向以為近牛禍也先是文惠王初都咸陽廣大宮室南臨渭北臨涇思心失逆土氣足者止也戒秦建止奢泰將致危亡秦遂不改至於離宮三百復起阿房未成而亡一曰牛以力為人用足所以行也其後秦大用民力轉輸起負海至北邊天下叛之京房易傳曰興繇役奪民時厥妖牛生五足景帝中六年梁孝王田北山有獻牛足上出背上劉向以為近牛禍先是孝王驕奢起苑方三百里宮館閣道相連三十餘里納於邪臣羊勝之計欲求為漢嗣刺殺議臣爰盎事發負斧歸死既退歸國猶有恨心內則思慮霿亂外則土功過制故牛禍作足而出於背下奸上之象也猶不能自解發疾暴死又凶短之極也左氏傳昭公二十一年春周景王將鑄無射鍾泠州鳩曰王其以心疾死乎夫天子省風以作樂小者不窕大者不摦摦則不容心是以感感實生疾今鍾摦矣王心弗景祐殿本作𢦟朱一新說作𢦟是𢦟景祐殿本作𢦟朱一新說作𢦟是其能久乎劉向以為是時景王好聽淫聲適庶不明思心霿亂明年以心疾崩近心腹之痾凶短之極者也昭二十五年春魯叔孫昭子聘于宋元公與燕飲酒樂語相泣也樂祁佐告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久冬十月叔孫昭子死十一月宋元公卒昭帝元鳳元年九月燕有黃鼠銜其尾舞王宮端門中往視之鼠舞如故王使夫人以酒脯祠鼠舞不休夜死黃祥也時燕剌王旦謀反將敗死亡象也其月發覺伏辜京房易傳曰誅不原情厥妖鼠舞門成帝建始元年四月辛丑夜西北有如火光壬寅晨大風從西北起雲氣赤黃四塞天下終日夜下著地者黃土塵也是歲帝元舅大司馬大將軍王鳳始用事又封鳳母弟崇為安成侯食邑萬戶庶弟譚等五人賜爵關內侯食邑三千戶復益封鳳五千戶悉封譚等為列侯是為五侯哀帝即位封外屬丁氏傅氏周氏鄭氏凡六人為列侯楊宣對曰五侯封日天氣赤黃丁傅復然此殆爵土過制傷亂土氣之祥也京房易傳曰經稱觀其生言大臣之義當觀賢人知其性行推而貢之否則為聞善不與茲謂不知厥異黃厥咎聾厥災不嗣黃者日上黃光不散如火然有黃濁氣四塞天下蔽賢絕道故災異至絕世也經曰良馬逐逐進也言大臣得賢者謀當顯進其人否則為下相攘善茲謂盜明厥咎亦不嗣至於身僇家絕史記周幽王二年周三川皆震劉向以為金木水火沴土者也伯陽甫曰周將亡矣天地之氣不過其序若過其序民亂之也陽伏而不能出陰迫而不能升於是有地震今三川實震是陽失其所而填陰也陽失而在陰原必塞原塞國必亡夫水土演而民用也土無所演而民乏財用不亡何待昔伊雒竭而夏亡河竭而商亡今周德如二代之季其原又塞塞必竭川竭山必崩夫國必依山川山崩川竭亡之徵也若國亡不過十年數之紀也是歲二景祐殿本都作三葉德輝說作三是三景祐殿本都作三葉德輝說作三是川竭岐山崩劉向以為陽失在陰者謂火氣來煎枯水故川竭也山川連體下竭上崩事勢然也時幽王暴虐妄誅伐不聽諫迷於襃姒廢其正后廢后之父申侯與犬戎共攻殺幽王一曰其在天文水為辰星辰星為蠻夷月食辰星國以女亡幽王之敗女亂其內夷攻其外京房易傳曰君臣相背厥異名水絕文公九年九月癸酉地震劉向以為先是時齊桓晉文魯釐二伯賢君新沒周襄王失道楚穆王殺父諸侯皆不肖權傾於下天戒若曰臣下彊盛者將動為害後宋魯晉莒鄭陳齊皆殺君諸震略皆從董仲舒說也京房易傳曰臣事雖正專必震其震於水則波於木則搖於屋則瓦落大經在辟而易臣茲謂陰動厥震搖政宮大經搖政茲謂不陰厥震搖山山出涌水嗣子無德專祿茲謂不順厥震動丘陵涌水出襄公十六年五月甲子地震劉向以為先是雞澤之會諸侯盟大夫又盟是歲三月諸侯為溴梁之會而大夫獨相與盟五月地震矣其後崔氏專齊欒盈亂晉良霄傾鄭𨵽殺吳子燕逐其君楚滅陳蔡昭公十九年五月己卯地震劉向以為是時季氏將有逐君之變其後宋三臣曹會皆以地叛蔡莒逐其君吳敗中國殺二君二十三年八月乙未地震劉向以為是時周景王崩劉單立王子猛尹氏立子朝其後季氏逐昭公黑肱叛邾吳殺其君僚宋五大夫晉二大夫皆以地叛哀公三年四月甲午地震劉向以為是時諸侯皆信邪臣莫能用仲尼盜殺蔡侯齊陳乞弒君惠帝二年正月地震隴西厭四百餘家武帝征和二年八月癸亥地震厭殺人宣帝本始四年四月壬寅地震河南以東四十九郡北海琅邪壞祖宗廟城郭殺六千餘人元帝永光三年冬地震綏和二年九月丙辰地震自京師至北邊郡國三十餘壞城郭凡殺四百一十五人釐公十四年秋八月辛卯沙麓崩穀梁傳曰林屬於山曰麓沙其名也劉向以為臣下背叛散落不事上之象也先是齊桓行伯道會諸侯事周室管仲既死桓德日衰天戒若曰伯道將廢諸侯散落政逮大夫陪臣執命臣下不事上矣桓公不寤天子蔽晦及齊威景祐殿本都作桓桓景祐殿本都作桓死天下散而從楚王札子殺二大夫晉敗天子之師莫能征討從是陵遲公羊以為沙麓河上邑也董仲舒說略同一曰河大川象齊大國桓德衰伯道將移於晉文故河為徙也左氏以為沙麓晉地沙山名也地震而麓崩不書震舉重者也伯陽甫所謂國必依山川山崩川竭亡之徵也不過十年數之紀也至二十四年晉懷公殺於高梁京房易傳曰小人剝廬厥妖山崩茲謂陰乘陽弱勝彊成公五年夏梁山崩穀梁傳曰廱河三日不流晉君帥群臣而哭之乃流劉向以為山陽君也水陰民也天戒若曰君道崩壞下亂百姓將失其所矣哭然後流喪亡象也梁山在晉地自晉始而及天下也後晉暴殺三卿厲公以弒溴梁之會天下大夫皆執國政其後孫甯出衛獻三家逐魯昭單尹亂王室董仲舒說略同劉歆以為梁山晉望也崩弛崩也古者三代命祀祭不越望吉凶禍福不是過也國主山川山崩川竭亡之徵也美惡周必復是歲歲在鶉火至十七年復在鶉火欒書中行偃殺厲公而立悼公高后二年正月武都山崩殺七百六十人地震至八月乃止文帝元年四月齊楚地山二十九所同日俱大發水潰出劉向以為近水沴土也天戒若曰勿盛齊楚之君今失制度將為亂後十六年帝庶兄齊悼惠王之孫文王則薨無子帝分齊地立悼惠王庶子六人皆為王賈誼鼂錯諫以為違古制恐為亂至景帝三年齊楚七國起兵百餘萬漢皆破之春秋四國同日災漢七國同日眾山潰咸被其害不畏天威之明效也成帝河平三年二月丙戌犍為柏江山崩捐江山崩皆廱江水江水逆流壞城殺十三人地震積二十一日百二十四動元延三年正月丙寅蜀郡岷山崩廱江江水逆流三日乃通劉向以為周時岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角從參至辰殆必亡矣其後三世亡嗣王莽篡位傳曰皇之不極是謂不建厥咎眊厥罰恆陰厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有下人伐上之痾時則有日月亂行星辰逆行皇之不極是謂不建皇君也極中建立也人君貌言視聽思心五事皆失不得其中則不能立萬事失在眊悖故其咎眊也王者自下承天理物雲起於山而彌於天天氣亂故其罰常陰也一曰上失中則下彊盛而蔽君明也易曰亢龍有悔貴而亡位高而亡民賢人在下位而亡輔如此則君有南面之尊而亡一人之助故其極弱也盛陽動進輕疾禮春而大射以順陽氣上微弱則下奮動故有射妖易曰雲從龍又曰龍蛇之蟄以存身也陰氣動故有龍蛇之孽於易乾為君為馬馬任用而彊力君氣毀故有馬禍一曰馬多死及為怪亦是也君亂且弱人之所叛天之所去不有明王之誅則有篡弒之禍故有下人伐上之痾凡君道傷者病天氣不言五行沴天而曰日月亂行星辰逆行者為若下不敢沴天猶春秋曰王師敗績于貿戎不言敗之者以自敗為文尊尊之意也劉歆皇極傳曰有下體生上之痾說以為下人伐上天誅已成不得復為痾云皇極之常陰劉向以為春秋亡其應一曰久陰不雨是也劉歆以為自屬常陰昭帝元平元年四月崩亡嗣立昌邑王賀賀即位天陰晝夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明效也京房易傳曰有蜺蒙霧霧上下合也蒙如塵雲蜺日旁氣也其占曰后妃有專蜺再重赤而專至衝旱妻不壹順黑蜺四背又白蜺雙出日中妻以貴高夫茲謂擅陽蜺四方日光不陽解而溫內取茲謂禽蜺如禽在日旁以尊降妃茲謂薄嗣蜺直而塞六辰乃除夜星見而赤女不變始茲謂乘夫蜺白在日側黑蜺果之氣正直妻不順正茲謂擅陽蜺中窺貫而外專夫妻不嚴茲謂媟蜺與日會婦人擅國茲謂頃蜺白貫日中赤蜺四背適不答茲謂不次蜺直在左蜺交在右取於不專茲謂危嗣蜺抱日兩未及君淫外茲謂亡蜺氣左日交於外取不達茲謂不知蜺白奪明而大溫溫而雨尊卑不別茲謂媟蜺三出三已三辰除除則日出且雨臣私祿及親茲謂罔辟厥異蒙其蒙先大溫已蒙起日不見行善不請於上茲謂作福蒙一日五起五解辟不下謀臣辟異道茲謂不見上蒙下霧風三變而俱解立嗣子疑茲謂動欲蒙赤日不明德不序茲謂不聰蒙日灰明溫而民病德不試空言祿茲謂主窳臣夭蒙起而白君樂逸人茲謂放蒙日青黑雲夾日左右前後行過日公不任職茲謂怙祿蒙三日又大風五日蒙不解利邪以食茲謂閉上蒙大起白雲如山行蔽日公懼不言道茲謂閉下蒙大起日不見若雨不雨至十二日解而有大雲蔽日祿生於下茲謂誣君蒙微而小雨已乃大雨下相攘善茲謂盜明蒙黃濁下陳功求於上茲謂不知蒙微而赤風鳴條解復蒙下專刑茲謂分威蒙而日不得明大臣厭小臣茲謂蔽蒙微日不明若解不解大風發赤雲起而蔽日眾不惡惡茲謂閉蒙尊卦用事三日而起日不見漏言亡喜茲謂下厝用蒙微日無光有雨雲雨不降廢忠惑佞茲謂亡蒙天先清而暴蒙微而日不明有逸民茲謂不明蒙濁奪日光公不任職茲謂不絀蒙白三辰止則日青青而寒寒必雨忠臣進善君不試茲謂遏蒙先小雨雨已蒙起微而日不明惑眾在位茲謂覆國蒙微而日不明一溫一寒風揚塵知佞厚之茲謂庳蒙甚而溫君臣故弼茲謂悖厥災風雨霧風拔木亂五穀已而大霧庶正蔽惡茲謂生孽災厥異霧此皆陰雲之類云嚴公十八年秋有蜮劉向以為蜮生南越越地多婦人男女同川淫女為主亂氣所生故聖人名之曰蜮蜮猶惑也在水旁能射人射人有處甚者至死南方謂之短弧近射妖死亡之象也時嚴將取齊之淫女故蜮至天戒若曰勿取齊女將生淫惑篡弒之禍嚴不寤遂取之入後淫於二叔二叔以死雨子見弒夫人亦誅劉歆以為蜮盛暑所生非自越來也京房易傳曰忠臣進善君不試厥咎國生蜮史記魯哀公時有隼集于陳廷而死楛矢貫之石砮長尺有咫陳閔公使使問仲尼仲尼曰隼之來遠矣昔武王克商通道百蠻使各以方物來貢肅慎貢楛矢石砮長尺有咫先王分異姓以遠方職使毋忘服故分陳以肅慎矢試求之故府果得之劉向以為隼近黑祥貪暴類也矢貫之近射妖也死於廷國亡表也象陳眊亂不服事周而行貪暴將致遠夷之禍為所滅也是時中國齊晉南夷吳楚為彊陳交晉不親附楚不固數被二國之禍後楚有白公之亂陳乘而侵之卒為楚所滅史記夏后氏之衰有二龍止於夏廷而言余襃之二君也夏帝卜殺之去之止之莫吉卜請其漦而藏之乃吉於是布幣策告之龍亡而漦在乃櫝去之其後夏亡傳櫝於殷周三代莫發至厲王末發而觀之漦流于廷不可除也厲王使婦人臝而譟之漦化為玄黿入後宮處妾遇之而孕生子懼而棄之宣王立女童謠曰檿弧萁服實亡周國後有夫婦鬻是器者宣王使執而僇之既去見處妾所棄妖子聞其夜號哀而收之遂亡奔襃後襃人有罪入妖子以贖是為襃姒幽王見而愛之生子伯服王廢申后及太子宜咎而立襃姒伯服代之廢后之父申侯與繒西畎戎共攻殺幽王詩曰赫赫宗周襃姒烕之劉向以為夏后季世周之幽厲皆誖亂逆天故有龍黿之怪近龍蛇孽也漦血也一曰沫也檿弧桑弓也萁服蓋以萁草為箭服近射妖也女童謠者禍將生於女國以兵寇亡也左氏傳昭公十九年龍鬭於鄭時門之外洧淵劉向以為近龍孽也鄭以小國攝乎晉楚之間重以彊吳鄭當其衝不能修德將鬭三國以自危亡是時子產任政內惠於民外善辭令以交三國鄭卒亡患能以德消變之效也京房易傳曰眾心不安厥妖龍鬭惠帝二年正月癸酉旦有兩龍見於蘭陵廷東里溫陵井中至乙亥夜去劉向以為龍貴象而困於庶人井中象諸侯將有幽執之禍其後呂太后幽殺三趙王諸呂亦終誅滅京房易傳曰有德遭害厥妖龍見井中又曰行刑暴惡黑龍從井出左氏傳魯嚴公時有內蛇與外蛇鬭鄭南門中內蛇死劉向以為近蛇孽也先是鄭厲公劫相祭仲而逐兄昭公代立後厲公出奔昭公復入死弟子儀代立厲公自外劫大夫傅瑕使僇子儀此外蛇殺內蛇之象也蛇死六年而厲公立嚴公聞之問申繻曰猶有妖乎對曰人之所忌其氣炎以取之妖由人興也人亡舋焉妖不自作人棄常故有妖京房易傳曰立嗣子疑厥妖蛇居國門鬭左氏傳文公十六年夏有蛇自泉宮出入于國如先君之數劉向以為近蛇孽也泉宮在囿中公母姜氏嘗居之蛇從之出象宮將不居也詩曰維虺維蛇女子之祥又蛇入國國將有女憂也如先君之數者公母將薨象也秋公母薨公惡之乃毀泉臺夫妖孽應行而自見非見而為害也文不改行循正共御厥罰而作非禮以重其過後二年薨公子遂殺文之二子惡視而立宣公文公夫人大歸于齊武帝太始四年七月趙有蛇從郭外入與邑中蛇鬭孝文廟下邑中蛇死後二年秋有衛太子事事自趙人江充起左氏傳定公十年宋公子地有白馬駟公嬖向魋欲之公取而朱其尾鬣以予之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫公弟辰謂地曰子為君禮不過出竟君必止子地出奔陳公弗止辰為之請不聽辰曰是我迋吾兄也吾以國人出君誰與處遂與其徒出奔陳明年俱入于蕭以叛大為宋患近馬禍也史記秦孝公二十一年有馬生人昭王二十年牡馬生子而死劉向以為皆馬禍也孝公始用商君攻守之法東侵諸侯至於昭王用兵彌烈其象將以兵革抗極成功而還自害也牡馬非生類妄生而死猶秦恃力彊得天下而還自滅之象也一景祐殿本都有一字曰諸畜生非其類子孫必有非其姓者至於始皇果呂不韋子京房易傳曰方伯分威厥妖牡馬生子亡天子諸侯相伐厥妖馬生人文帝十二年有馬生角於吳角在耳前上鄉右角長三寸左角長二寸皆大二寸劉向以為馬不當生角猶吳不當舉兵鄉上也是時吳王濞封有四郡五十餘城內懷驕恣變見於外天戒早矣王不寤後卒舉兵誅滅京房易傳曰臣易上政不順厥妖馬生角茲謂賢士不足又曰天子親伐馬生角成帝綏和三景祐殿本都作二二景祐殿本都作二年二月大廄馬生角在左耳前圍長各二寸是時王莽為大司馬害上之萌自此始矣哀帝建平二年定襄牡馬生駒三足隨群飲食太守以聞馬國之武用三足不任用之象也後侍中董賢年二十二為大司馬居上公之位天下不宗哀帝暴崩成帝母王太后召弟子新都侯王莽入收賢印綬賢恐自殺莽因代之並誅外家丁傅又廢哀帝傅皇后令自殺發掘帝祖母傅太后母丁太后陵更以庶人葬之辜及至尊大臣微弱之禍也文公十一年敗狄于鹹穀梁公羊傳曰長狄兄弟三人一者之魯一者之齊一者之晉皆殺之身橫九畮斷其首而載之眉見於軾何以書記異也劉向以為是時周室衰微三國為大可責者也天戒若曰不行禮義大為夷狄之行將至危亡其後三國皆有篡弒之禍近下人伐上之痾也劉歆以為人變屬黃祥一曰屬臝蟲之孽一曰天地之性人為貴凡人為變皆屬皇極下人伐上之痾云京房易傳曰君暴亂疾有道厥妖長狄入國又曰豐其屋下獨苦長狄生世主虜史記秦始皇帝二十六年有大人長五丈足履六尺皆夷狄服凡十二人見于臨洮天戒若曰勿大為夷狄之行將受其禍是歲始皇初并六國反喜以為瑞銷天下兵器作金人十二以象之遂自賢聖燔詩書阬儒士奢淫暴虐務欲廣地南戍五嶺北築長城以備胡越塹山填谷西起臨洮東至遼東徑數千里故大人見於臨洮明禍亂之起後十四年而秦亡亡自戍卒陳勝發史記魏襄王十三年魏有女子化為丈夫京房易傳曰女子化為丈夫茲謂陰昌賤人為王丈夫化為女子茲謂陰勝厥咎亡一曰男化為女宮刑濫也女化為男婦政行也哀帝建平中豫章有男子化為女子嫁為人婦生一子長安陳鳳言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子者景祐殿本都有者字將復一世乃絕哀帝建平四年四月山陽方與女子田無嗇生子先未生二月兒嗁腹中及生不舉葬之陌上三日人過聞嗁聲母掘收養平帝元始元年二月朔方廣牧女子趙春病死斂棺積六日出在棺外自言見夫死父曰年二十七不當死太守譚以聞京房易傳曰幹父之蠱有子考亡咎子三年不改父道思慕不皇亦重見先人之非不則為私厥妖人死復生一曰至陰為陽下人為上六月長安女子有生兒兩頭異頸面相鄉四臂共匈俱前鄉凥上有目長二寸所京房易傳曰睽孤見豕負塗厥妖人生兩頭下相攘善妖亦同人若六畜首目在下茲謂亡上正將變更凡妖之作以譴失正各象其類二首下不壹也足多所任邪也足少下不勝任或不任下也凡下體生於上不敬也上體生於下媟瀆也生非其類淫亂也人生而大上速成也生而能言好虛也群妖推此類不改乃成凶也, krp: ''}
