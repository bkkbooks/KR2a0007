  - {type: variant, offset: 426, length: 1, content: 言, WYG: 應劭曰少昊有四叔重爲句芒胲爲蓐收修及熈爲𤣥冥顓頊氏有子曰黎爲祝融共工氏有子曰句龍爲后土故有}
  - {type: variant, offset: 426, length: 1, content: 言, krp: 應劭曰少昊有四叔重爲句芒胲爲蓐收修及熈爲𤣥冥顓頊氏有子曰黎爲祝融共工氏有子曰句龍爲后土故有}
  - {type: punctuation, offset: 427, content: 《, id: KR2a0007_tls_019-bkkpn135}
  - {type: variant, offset: 429, length: 0, content: '', WYG: 之官皆封爲上公祀爲貴神師古曰上謂其事乆逺也胲音該書載唐虞之際命羲和四子應劭曰堯命四子分掌四時之教化也張晏曰四子謂羲仲羲叔和仲和叔也師古曰事見虞書堯典順天文授民時咨四岳以舉賢材揚側陋師古曰四嶽分主四方諸侯者十有二牧柔遠能邇應劭曰牧州牧也師古曰柔安也能善也邇近也禹作司空平水土師古曰空穴也古人穴居主土爲穴以居人也穿棄作后稷播百榖應劭曰棄臣名也后主也為此稷官之主也師古曰播謂布種也卨作司徒敷五教應劭曰五教父義母慈兄友弟恭子孝也師古曰卨音先列反咎繇作士正五刑應劭曰士獄官之長張晏曰五刑謂墨刖劓剕宫大辟也師古曰咎音臯繇音弋昭反墨鑿其額而湼以墨也刖斷足也劓割鼻也剕去髕骨也宫陰刑也大辟殺之也􅂷作共工利器用應劭曰埀臣名也為共工理百工之事也師古曰共讀曰龔作朕虞育草木鳥獸應劭曰伯益也虞掌山澤禽獸官名也師古曰古益字也虞度也主商度山川之事伯夷作秩宗典三禮應劭曰伯夷臣名也典天神地祇人鬼之禮也師古曰秩次也宗尊也主尊神之禮可以次序也􅇪典樂和神人應劭曰䕫臣名也師古曰䕫音鉅龜反龍作納言出入帝命應劭曰龍臣名也納言如今尚書管王之喉舌也師古曰自此以上皆堯典之文夏殷亡聞焉師古曰言夏殷置官事不見於書}
  - {type: page-break, offset: 429, content: '', id: KR2a0007_WYG_019-2b, image: WYG0249/WYG0249-0309d.png}
  - {type: page-break, offset: 429, content: '', id: KR2a0007_WYG_019-3a, image: WYG0249/WYG0249-0310a.png}
