  - {type: variant, offset: 16931, length: 610, content: 故曰燕燕尾涏涏美好貌也張公子謂富平侯也木門倉琅根謂宮門銅鍰言將尊貴也後遂立為皇后弟昭儀賊害後宮皇子卒皆伏辜所謂燕飛來啄皇孫皇孫死燕啄矢者也成帝時歌謠又曰邪徑敗良田讒口亂善人桂樹華不實黃爵巢其顛故為人所羨今為人所憐桂赤色漢家象華不實無繼嗣也王莽自謂黃象黃爵巢其顛也嚴公十七年冬多麋劉歆以為毛蟲之孽為災劉向以為麋色青近青祥也麋之為言迷也蓋牝獸之淫者也是時嚴公將取齊之淫女其象先見天戒若曰勿取齊女淫而迷國嚴不寤遂取之夫人既入淫於二叔終皆誅死幾亡社稷董仲舒指略同京房易傳曰廢正作淫大不明國多麋又曰震遂泥厥咎國多麋昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見以問郎中令龔遂遂曰熊山野之獸而來入宮室王獨見之此天戒大王恐宮室將空危亡象也賀不改寤後卒失國左氏傳襄公十七年十一月甲午宋國人逐狾狗狾狗入於華臣氏國人後之臣懼遂奔陳先是臣兄閱為宋卿閱卒臣使賊殺閱家宰遂就其妻宋平公聞之曰臣不唯其宗室是暴大亂宋國之政欲逐之左師向戌曰大臣不順國之恥也不如蓋之公乃止華臣炕暴失義內不自安故犬禍至以犇亡也高后八年三月祓霸上還過枳道見物如倉狗橶高后掖忽而不見卜之趙王如意為祟遂病掖傷而崩先是高后鴆殺如意支斷其母戚夫人手足搉其服錢大昭說服當作眼按景祐殿本都作眼眼錢大昭說服當作眼按景祐殿本都作眼以為人彘文帝後五年六月齊雍城門外有狗生角先是帝兄齊悼惠王亡後帝分齊地立其庶子七人皆為王兄弟並彊有炕陽心故犬禍見也犬守御角兵象在前而上鄉者也犬不當生角猶諸侯不當舉兵鄉, WYG: 掌治}
