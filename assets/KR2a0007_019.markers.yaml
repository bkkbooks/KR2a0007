  - {type: variant, offset: 1140, length: 322, content: 奉宗廟桓不寤與夫人俱會齊夫人譖桓公於齊侯齊侯殺桓公劉歆以為御廩公所親耕籍田以奉粢盛者也棄法度亡禮之應也嚴公二十年夏齊大災劉向以為齊桓好色聽女口以妾為妻適庶數更故致太景祐殿本都作大大景祐殿本都作大災桓公不寤及死適庶分爭九月不得葬公羊傳曰大災疫也董仲舒以為魯夫人淫於齊齊桓姊妹不嫁者七人國君民之父母夫婦生化之本本傷則末夭故天災所予也釐公二十年五月己酉景祐殿本都作乙巳與春秋經同乙巳景祐殿本都作乙巳與春秋經同西宮災穀梁以為愍公宮也以諡言之則若疏故謂之西宮劉向以為釐立妾母為夫人以入宗廟故天災愍宮若曰去其卑而親者將害宗廟之正禮董仲舒以為釐娶於楚而齊媵之脅公使立以為夫人西宮者小寢夫人之居也若曰妾何為此宮誅去之意也以天災之故大之曰西宮也左氏以為西宮者公宮, WYG: 爲師矣温猶厚}
