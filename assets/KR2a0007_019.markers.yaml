  - {type: variant, offset: 44768, length: 0, content: '', WYG: 年非也今從宋本改正征和四年光祿勲有禄監本有字下脱祿字從宋本補孝昭始元四年騎都尉上官安為車騎將軍臣召南按昭紀及霍光傳並作驃騎將軍元鳯四年御史大夫王訢為相按文相字上脱丞字蒲侯蘇昌為太常十一年坐籍霍山書泄秘書免師古曰以秘書借霍山顧炎武曰師古説非也蓋籍沒霍山之書中有秘記當密奏之而輙以示人故以宣泄罪之耳山本傳言山坐寫秘書顯為上書獻城西第入馬千匹以贖山罪若山之秘書從昌借之昌之罪將不止免官而元康四年昌復為太常薄責昌而厚䋲山非法之平也且如顔説當云坐借霍山秘書免足矣何用文之重辭之複乎五年十二月庚戌丞相訢薨監本脱十二月九字從宋本補孝宣本}
