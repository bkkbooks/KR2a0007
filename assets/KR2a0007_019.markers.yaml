  - {type: variant, offset: 431, length: 0, content: '', krp: 立三少爲之副少師少傅少保是爲孤卿與六卿爲九焉記曰三公無官言有其人然後充之師古曰不必備員有德者乃處之舜之於堯伊尹於湯周公召公於周是也或説司馬主天司徒主人司空主土是爲三公四岳謂四方諸侯自周衰官失而百職亂戰國並爭各變異秦兼天下建皇帝之號張晏曰五帝自以徳不及三皇故自去其皇號三王又以徳不及五帝自損稱王秦自以徳襃二行故兼稱之立百官之職漢因循而不革眀簡易随時宜也其後}
