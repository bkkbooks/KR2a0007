  - {type: variant, offset: 44741, length: 0, content: '', WYG: 千石侍中左右曹諸吏散騎中常侍皆加官應劭曰入侍天子故曰侍中晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹魏文帝合散騎中常侍為散騎常侍也所加或列侯將軍卿大夫將都尉尚書太醫太官令至郎中亡員如淳曰將謂郎將以下也自列侯下至郎中皆得有散騎及中常侍加官是時散騎及常侍各自一官亡員也多至數十人侍中中常侍得入禁中諸曹受尙書事諸吏得舉法散騎騎並乗輿車師古曰並音歩浪反騎而散從無常職也給事中亦加官師古曰漢官觧詁云掌侍從左右無員常侍中所加或大夫博士議郎掌顧問應對位次中常侍中黄門有給事黃門位從將大夫皆秦制爵一級曰公士師古曰言有爵命異於士卒故稱公士也二上造師古曰造成也言冇成命於上也三簮裊師古曰以組帯馬曰裊簮裊者言飾此馬也四不更師古曰言不豫更卒之事也更音工行反五大夫師古曰列位從大夫六官大夫七公大夫師古曰加官公者示稍尊也八公乗師古曰言其得乗公家之車也九五大夫師古曰大夫之尊也十左庶長十一右庶長師古曰庶長言為衆列之長也十二左更十三中更十四右更師古曰更言主領更卒部其役使也更音工行反十五少上造十六大上造師古曰言皆主上造之士也十七駟車庶長師古曰言乗駟馬之車而為衆長也十八大庶長師古曰又更尊也十九闗内侯師古曰言有侯號而居京畿無國邑二十徹侯師古曰言其爵位上通於天子皆秦制以賞功勞徹侯金印紫綬避武帝諱曰通侯或曰列侯改所食國令長名相又有家丞門大夫庶子諸侯王高帝初置師古曰蔡邕云漢制皇子封為王其實諸侯也周末諸侯或稱王而漢天子自以皇帝為稱故以王號加之總名諸侯王也金璽盭綬如淳曰盭音戾緑也以緑為質晉灼曰盭草名也出琅邪平昌縣似艾可染緑因以為綬名也師古曰晉說是也璽之言信也古者印璽通名今則尊卑有别漢舊儀云諸侯王黄金璽橐佗鈕文曰璽謂刻云某王之璽掌治其國有太傅輔王内史治國民中尉掌武職丞相綂衆官羣卿大夫都官如漢朝景帝中五年令諸侯王不得復治國天子為置吏改丞相曰相省御史大夫廷尉少府宗正博士官大夫謁者郎諸官長丞皆損其員武帝改漢内史爲京兆尹中尉為執金吾郎中令為光禄勲故王國如故損其郎中令秩千石改太僕曰僕秩亦千石成帝綏和元年省内史更令相治民如郡太守中尉如郡都尉監御史秦官掌監郡漢省丞相遣史分刺州不常置武帝元封五年初置部刺史掌奉詔條察州師古曰漢官典職儀云刺史班宣周行郡國省察治狀黜渉能否斷治􅁈獄以六條問事非條所問即不省一條强宗豪右田宅踰制以强陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔守利侵漁百姓聚歛為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂訞祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮埶請託所監六條二千石違公下比阿附豪强通行貨賂割損正令也秩六百石員十三人成帝綏和元年更名牧秩二千石}
