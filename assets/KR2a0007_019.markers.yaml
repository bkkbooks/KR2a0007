  - {type: variant, offset: 11948, length: 561, content: 賢者居明夷之世知時而傷或眾在位厥妖雞生角雞生角時主獨又曰婦人顓政國不靜牝雞雄鳴主不榮故房以為己亦在占中矣成公七年正月鼷鼠食郊牛角改卜牛又食其角劉向以為近青祥亦牛禍也不敬而傋霿之所致也昔周公制禮樂成周道故成王命魯郊祀天地以尊周公至成公時三家始顓政魯將從此衰天愍周公之德痛其將有敗亡之禍故於郊祭而見戒云鼠小蟲性盜竊鼷又其小者也牛大畜祭天尊物也角兵象在上君威也小小鼷鼠食至尊之牛角象季氏乃陪臣盜竊之人將執國命以傷君威而害周公之祀也改卜牛鼷鼠又食其角天重語之也成公怠慢昏亂遂君臣更執于晉至于襄公晉為溴梁之會天下大夫皆奪君政其後三家逐昭公卒死于外幾絕周公之祀董仲舒以為鼷鼠食郊牛皆養牲不謹也京房易傳曰祭天不慎厥妖鼷鼠齧郊牛角定公十五年正月鼷鼠食郊牛牛死劉向以為定公知季氏逐昭公辠惡如彼親用孔子為夾谷之會齊人倈歸鄆讙龜陰之田聖德如此反用季桓子淫於女樂而退孔子無道甚矣詩曰人而亡儀不死何為是歲五月定公薨牛死之應也京房易傳曰子不子鼠食其郊牛哀公元年正月鼷鼠食郊牛劉向以為天意汲汲於用聖人逐三家故復見戒也哀公年少不親見昭公之事故見敗亡之異已而哀不寤身奔於粵此其效也昭帝元鳳元年九月燕有黃鼠銜其尾舞王宮端門中王往視之鼠舞如故王使吏以酒脯祠鼠舞不休一日一夜死近黃祥時燕剌王旦謀反將死之象也其月發覺伏辜京房易傳曰誅不原情厥妖鼠舞門成帝建始四年九月, WYG: 御宿則今}
