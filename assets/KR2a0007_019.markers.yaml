以為二月魯衛分十七年六月癸卯日有食之董仲舒劉向以為後邾支解鄫子晉敗王師于貿戎敗齊于鞌劉歆以為三月晦朓魯衛分成公十六年六月丙寅朔日有食之董仲舒劉向以為後晉敗楚鄭于鄢陵執魯侯劉歆以為四月二日魯衛分十七年十二月丁巳朔日有食之董仲舒劉向以為後楚滅舒庸晉弒其君宋魚石因楚奪君邑莒滅鄫齊滅萊鄭伯弒死劉歆以為九月周楚分襄公十四年二月乙未朔日有食之董仲舒劉向以為後衛大夫孫甯其逐獻公立孫剽劉歆以為前年十二月二日宋燕分十五年八月丁巳朔錢大昭說閩本有朔字按景祐本有日有食之董仲舒劉向以為先是晉為雞澤之會諸侯盟又大夫盟後為溴梁之會諸侯在而大夫獨相與盟君若綴斿不得舉手劉歆以為五月二日魯趙分二十年十月丙辰朔日有食之董仲舒以為陳慶虎慶寅蔽君之明邾庶其有叛心後庶其以漆閭丘來奔陳殺二慶劉歆以為八月秦周分二十一年九月庚戌朔日有食之董仲舒以為晉欒盈將犯君後入于曲沃劉歆以為七月秦晉分十月庚辰朔日有食之董仲舒以為宿在軫角楚大國象也後楚屈氏譖殺公子追舒齊慶封脅君亂國劉歆以為八月秦周分二十三年二月癸西朔日有食之董仲舒以為後衛侯入陳儀甯喜弒其君剽劉歆以為前年十二月二日宋燕分二十四年七月甲子朔日有食之既劉歆以為五月魯趙分八月癸巳朔日有食之董仲舒以為比食又既象陽將絕夷狄主上國之象也後六君弒楚子果從諸侯伐鄭滅舒鳩魯往朝之卒主中國伐吳討慶封劉歆以為六月晉趙分二十七年十二月乙亥朔日有食之董仲舒以為禮義將大滅絕之象也時吳子好勇使刑人守門蔡侯通於世子之妻莒不早立嗣後閽戕吳子蔡世子般弒其父莒人亦弒君而庶子爭劉向以為自二十年至此歲八年間日食七作禍亂將重起故天仍見戒也後齊崔杼弒君宋殺世子北燕伯出奔鄭大夫自外入而篡位指略如董仲舒劉歆以為九月周楚分昭公七年四月甲辰朔日有食之董仲舒劉向以為先是楚靈王弒君而立會諸侯執徐子滅賴後陳公子招殺世子楚因而滅之又滅蔡後靈王亦弒死劉歆以為二月魯衛分傳曰晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災其衛君乎魯將上卿是歲八月衛襄公卒十一月魯季孫宿卒晉侯謂士文伯曰吾所問日食從矣可常乎對曰不可六物不同民心不壹事序不類官職不則同始異終胡可常也詩曰或宴宴居息或盡顇事國其異終也如是公曰何謂六物對曰歲時日月星辰是謂公曰何謂辰對曰日月之會是謂公曰詩所謂此日而食于何不臧何也對曰不善政之謂也國無政不用善則自取適于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時此推日食之占循變復之要也易曰縣象著明莫大於日月是故聖人重之載于三經於易在豐之震曰豐其沛日中見昧折其右肱亡咎於詩十月之交則著卿士司徒下至趣馬師氏咸非其材同於右肱之所折協於三務之所擇明小人乘君子陰侵陽之原也十五年六月丁巳朔日有食之劉歆以為三月魯衛分十七年六月甲戌朔日有食之董仲舒以為時宿在畢晉國象也晉厲公誅四大夫失眾心以弒死後莫敢復責大夫六卿遂相與比周專晉國君還事之日比再食其事在春秋後故不載於經劉歆以為魯趙分左氏傳平子曰唯正月朔慝未作日有食之於是乎天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也其餘則否太史曰在此月也日過分而未至三辰有災百官降物君不舉避移時樂奏鼓祝用幣史用辭嗇夫馳庶人走此月朔之謂也當夏四月是謂孟夏說曰正月謂周六月夏四月正陽純乾之月也慝謂陰爻也冬至陽爻起初故曰復至建巳之月為純乾亡陰爻而陰侵陽為災重故伐鼓用幣責陰之禮降物素服也不舉去樂也避移時避正堂須時移災復也嗇夫掌幣吏庶人其徒役也劉歆以為六月二日魯趙分二十一年七月壬午朔日有食之董仲舒以為周景王老劉子單子專權蔡侯朱驕君臣不說之象也後蔡侯朱果出奔劉子單子立王猛劉歆以為五月二日魯趙分二十二年十二月癸酉朔日有食之董仲舒以為宿在心天子之象也後尹氏立王子朝天王居于狄泉劉歆以為十月楚鄭分二十四年五月乙未朔日有食之董仲舒以為宿在胃魯象也後昭公為季氏所逐劉向以為自十五年至此歲十年間天戒七見人君猶不寤後楚殺戎蠻子晉滅陸渾戎盜殺衛侯兄蔡莒之君出奔吳滅巢公子光殺王僚宋三臣以邑叛其君它如仲舒劉歆以為二日魯趙分是月斗建辰左氏傳梓慎曰將大水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也是歲秋大雩旱也二至二分日有食之不為災日月之行也春秋分日夜等故同道冬夏至長短極故相過相過同道而食輕不為大災水旱而已三十一年十二月辛亥朔日有食之董仲舒以為宿在心天子象也時京師微弱後諸侯果相率而城周宋中幾亡尊天子之心而不衰城劉向以為時吳滅徐而蔡滅沈楚圍蔡吳敗楚入郢昭王走出劉歆以為二日宋燕分定公五年三月辛亥朔日有食之董仲舒劉向以為後鄭滅許魯陽虎作亂竊寶玉大弓季桓子退仲尼宋三臣以邑叛劉歆以為正月二日燕趙分十二年十一月丙寅朔日有食之董仲舒劉向以為後晉三大夫以邑叛薛弒其君楚滅頓胡越敗吳衛逐世子劉歆以為十二月二日楚鄭分十五年八月庚辰朔日有食之董仲舒以為宿在柳周室大壞夷狄主諸夏之象也明年中國諸侯果累累後楚而圍蔡蔡恐遷于州來晉人執戎蠻子歸于楚京師楚也劉向以為盜殺蔡侯齊陳乞弒其君而立陽生孔子終不用劉歆以為六月晉趙分哀公十四年五月庚申朔日有食之在獲麟後劉歆以為三月二日齊衛分凡春秋十二公二百四十二年日食三十六穀梁以為朔二十六晦七夜二二日一公羊以為朔二十七二日七晦二左氏以為朔十六二日十八晦一不書日者二高帝三年十月甲戌晦日有食之在斗二十度燕地也後二年燕王臧荼反誅立盧綰為燕王後又反敗十一月癸卯晦日有食之在虛三度齊地也後二年齊王韓信徙為楚王明年廢為列侯後又反誅九年六月乙未晦日有食之既在張十三度惠帝七年正月辛丑朔日有食之在危十三度谷永以為歲首正月朔日是為三朝尊者惡之五月丁卯先晦一日日有食之幾盡在七星初劉向以為五月微陰始起而犯至陽其占重至其八月宮車晏駕有呂氏詐置嗣君之害京房易傳曰凡日食不以晦朔者名曰薄人君誅將不以理或賊臣將暴起日月雖不同宿陰氣盛薄日光也高后二年六月丙戌晦日有食之七年正月己丑晦日有食之既在營室九度為宮室中時高后惡之曰此為我明年應文帝二年十一月癸卯晦日有食之在婺女一度三年十月丁酉晦日有食之在斗二十三錢大昭說閩本作二按景祐本作二二錢大昭說閩本作二按景祐本作二度十一月丁卯晦日有食之在虛八度後四年四月丙辰晦日有食之在東井十三度七年正月辛未朔日有食之景帝三年二月壬午晦日有食之在胃二度七年十一月庚寅晦日有食之在虛九度中元年十二月甲寅晦日有食之中二年九月甲戌晦日有食之三年九月戊戌晦日有食之幾盡在尾九度六年七月辛亥晦日有食之在軫七度後元年七月乙巳先晦一日日有食之在翼十七度武帝建元二年二月丙戌朔日有食之在奎十四度劉向以為奎為卑賤婦人後有衛皇后自至微興卒有不終之害三年九月丙子晦日有食之在尾二度五年正月己巳朔日有食之元光元年二月丙辰晦日有食之七月癸未先晦一日日有食之在翼八度劉向以為前年高園便殿災與春秋御廩災後日食於翼軫同其占內有女變外為諸侯其後陳皇后廢江都淮南衡山王謀反誅日中時食從東北過半晡時復元朔二年二月乙巳晦日有食之在胃三度六年十一月癸丑晦日有食之元狩元年五月乙巳晦日有食之在柳六度京房易傳推以為是時日食從旁右法曰君失臣明年丞相公孫弘薨日食從旁左者亦君失臣從上者臣失君從下者君失民元鼎五年四月丁丑晦日有食之在東井二十三度元封四年六月己酉朔日有食之太始元年正月乙巳晦日有食之四年十月甲寅晦日有食之在斗十九度征和四年八月辛酉晦日有食之不盡如鉤在亢二度晡時食從西北日下晡時復昭帝始元三年十一月壬辰朔日有食之在斗九度燕地也後四年燕剌王謀反誅元鳳元年七月己亥晦日有食之幾盡在張十二度劉向以為己亥而既其占重後六年宮車晏駕卒以亡嗣宣帝地節元年十二月癸亥晦日有食之在營室十五度五鳳元年十二月乙酉朔日有食之在婺女十度四年四月辛丑朔日有食之在畢十九度是為正月朔慝未作左氏以為重異元帝永光二年三月壬戌朔日有食之在婁八度四年六月戊寅晦日有食之在張七度建昭五年六月壬申晦日有食之不盡如鉤因入成帝建始三年十二月戊申朔日有食之其夜未央殿中地震谷永對曰日食婺女九度占在皇后地震蕭牆之內咎在貴妾二者俱發明同事異人共掩制陽將害繼嗣也亶日食則妾不見亶地震則后不見異日而發則似殊事亡故動變則恐不知是月后妾當有失節之郵故天因此兩見其變若曰違失婦道隔遠眾妾紡絕繼嗣者此二人也杜欽對亦曰日以戊申食時加未戊未土也中宮之部其夜殿中地震此必適妾將有爭寵相害而為患者人事失於下變象見於上能應之司景祐殿局本都作以以景祐殿局本都作以德則咎異消忽而不戒則禍敗至應之非誠不立非信不行河平元年四月己亥晦日有食之不盡如鉤在東井六度劉向對曰四月交於五月月同孝惠日同孝昭東井京師地且既其占恐害繼嗣日蚤食時從西南起三年八月乙卯晦日有食之在房四年三月癸丑朔日有食之在昴陽朔元年二月丁未晦日有食之在胃永始元年九月丁巳晦日有食之谷永以京房易占對曰元年九月日蝕酒亡節之所致獨使京師知之四國不見者若曰湛湎于酒君臣不別禍在內也永始二年二月乙酉晦日有食之谷永以京房易占對曰今年二月日食賦斂不得度民愁怨之所致也所以使四方皆見京師陰蔽者若曰人君好治宮室大營墳墓賦斂茲重而百姓屈竭禍在外也三年正月己卯晦日有食之四年七月辛未晦日有食之元延元年正月己亥朔日有食之哀帝元壽元年正月辛丑朔日有食之不盡如鉤在營室十度與惠帝七年同月日二年三月壬辰晦日有食之平帝元始元年五月丁巳朔日有食之在東井二年九月戊申晦日有食之既凡漢著紀十二世二百一十二年日食五十三朔十四晦三十六先晦一日三成帝建始元年八月戊午晨漏未盡三刻有兩月重見京房易傳曰婦貞厲月幾望君子征凶言君弱而婦彊為陰所乘則月並出晦而月見西方謂之朓朔而月見東方謂之仄慝仄慝則侯王其肅朓則侯王其舒劉向以為朓者疾也君舒緩則臣驕慢故日行遲而月行疾也仄慝者不進之意君肅急則臣恐懼故日行疾而月行遲不敢迫近君也不舒不急以正失之者食朔日劉歆以為舒者侯王展意顓事臣下促急故月行疾也肅者王侯縮朒不任事臣下弛縱故月行遲也當春秋時侯王率多縮朒不任事故食二日仄慝者十八食晦日朓者一此其效也考之漢家食晦朓者三十六終亡二日仄慝者歆說信矣此皆謂日月亂行者也元帝永光元年四月日色青白亡景正中時有景亡光是夏寒至九月日乃有光京房易傳曰美不上人茲謂上弱厥異日白七日不溫順亡所制茲謂弱日白六十日物亡霜而死天子親伐茲謂不知日白體動而寒弱而有任茲謂不亡日白不溫明不動辟楊樹達說當作諐諐與愆同按各本皆誤諐楊樹達說當作諐諐與愆同按各本皆誤公行茲謂不伸厥異日黑大風起天無雲日光晻不難上政茲謂見過日黑居仄大如彈丸成帝河平元年正月壬寅朔日月俱在營室時日出赤二月癸未日朝赤且入又赤夜月赤甲申日出赤如血亡光漏上四刻半乃頗有光燭地赤黃食後乃復京房易傳曰辟不聞道茲謂亡厥異日赤三月乙未日出黃有黑氣大如錢居日中央京房易傳曰祭天不順茲謂逆厥異日赤其中黑聞善不予茲謂失知厥異日黃夫大人者與天地合其德與日月合其明故聖王在上總命群賢以亮天功則日之光明五色備具燭燿亡主有主則為異應行而變也色不虛改形不虛毀觀日之五變足以監矣故曰縣象著明莫大乎日月此之謂也嚴公七年四月辛卯夜恆星不見夜中星隕如雨董仲舒劉向以為常星二十八宿者人君之象也眾星萬民之類也列宿不見象諸侯微也眾星隕墜民失其所也夜中者為中國也不及地而復象齊桓起而救存之也鄉亡桓公星遂至地中國其良絕矣劉向以為夜中者言不得終性命中道敗也或曰象其叛也言當中道叛其上也天垂象以視下將欲人君防惡遠非慎卑省微以自全安也如人君有賢明之材畏天威命若高宗謀祖己成王泣金縢改過修正立信布德存亡繼絕修廢舉逸下學而上達裁什一之稅復三日之役節用儉服以惠百姓則諸侯懷德士民歸仁災消而福興矣遂莫肯改寤法則古人而各行其私意終於君臣乖離上下交怨自是之後齊宋之君弒譚遂邢衛之國滅宿遷於宋蔡獲於楚晉相弒殺五世乃定此其效也左氏傳曰恆星不見夜明也星隕如雨與雨偕也劉歆以為晝象中國夜象夷狄夜明故常見之星皆不見象中國微也星隕如雨如而也星隕而且雨故曰與雨偕也明雨與星隕兩變相成也洪範曰庶民惟星易曰雷雨作解是歲歲在玄枵齊分野也夜中而星隕象庶民中離上也雨以解過施復從上下象齊桓行伯復興周室也周四月夏二月也日在降婁魯分野也先是衛侯朔奔齊衛公子黔牟立齊帥諸侯伐之天子使使救衛魯公子溺專政會齊以犯王命嚴弗能止卒從而伐衛逐天王所立不義至甚而自以為功名景祐殿本都作民此誤民景祐殿本都作民此誤去其上政繇下作尤著故星隕於魯天事常象也成帝永始二年二月癸未夜過中星隕如雨長一二丈繹繹未至地滅至雞鳴止谷永對曰日月星辰燭臨下土其有食隕之異則遐邇幽隱靡不咸睹星辰附離于天猶庶民附離王者也王者失道綱紀廢頓下將叛去故星叛天而隕以見其象春秋記異星隕最大自魯嚴以來至今再見臣聞三代所以喪亡者皆繇婦人群小湛湎於酒書云乃用其婦人之言四方之逋逃多罪是信是使詩曰赫赫宗周襃姒烕之顛覆厥德荒沈于酒及秦所以二世而亡者養生大奢奉終大厚方今國家兼而有之社稷宗廟之大憂也京房易傳曰君不任賢厥妖天雨星文公十四年七月有星孛入于北斗董仲舒以為孛者惡氣之所生也謂之孛者言其孛孛有所妨蔽闇亂不明之貌也北斗大國象後齊宋魯莒晉皆弒君劉向以為君臣亂於朝政令虧於外則上濁三光之精五星贏縮變色逆行甚則為孛北斗人君象孛星亂臣類篡殺之表也星傳曰魁者貴人之牢又曰孛星見北斗中大臣諸侯有受誅者一曰魁為齊晉夫彗星較然在北斗中天之視人顯矣史之有占明矣時君終不改寤是後宋魯莒晉鄭陳六國咸弒其君齊再弒焉中國既亂夷狄並侵兵革從橫楚乘威席勝深入諸夏六侵伐一滅國觀兵周室晉外滅二國內敗王師又連三國之兵大敗齊師于鞌追亡逐北東臨海水威陵京師武折大齊皆孛星炎之所及流至二十八年星傳又曰彗星入北斗有大戰其流入北斗中得名人不入失名人宋華元賢名大夫大棘之戰華元獲於鄭傳舉其效云左氏傳曰有星孛北斗周史服曰不出七年宋齊晉之君皆將死亂劉歆以為北斗有環域四星入其中也斗天之三辰綱紀星也宋齊晉天子方伯中國綱紀彗所以除舊布新也斗七星故曰不出七年至十六年宋人弒昭公十八年齊人弒懿公宣公二年晉趙穿弒靈公昭公十七年冬有星孛于大辰董仲舒以為大辰心也心在景祐殿本都作為王先謙說作為是為景祐殿本都作為王先謙說作為是明堂天子之象後王室大亂三王分爭此其效也劉向以為星傳曰心大星天王也其前星太子後星庶子也尾為君臣乖離孛星加心象天子適庶將分爭也其在諸侯角亢氐陳鄭也房心宋也後五年周景王崩王室亂大夫劉子單子立王猛尹氏召伯毛伯立子鼂子鼂楚出也時楚彊宋衛陳鄭皆南附楚王猛既卒敬王即位子鼂入王城天王居狄泉莫之敢納五年楚平王居卒子鼂奔楚王室乃定後楚帥六國伐吳吳敗之于雞父殺獲其君臣蔡怨楚而滅沈楚怒圍蔡吳人救之遂為柏舉之戰敗楚師屠郢都妻昭王母鞭平王墓此皆孛彗流炎所及之效也左氏傳曰有星孛于大辰西及漢申繻曰彗所以除舊布新也天事恆象今除於火火出必布焉諸侯其有火災乎梓慎曰往年吾見是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之在宋衛陳鄭乎宋大辰之虛陳太昊之虛鄭祝融之虛皆火房也星孛及漢漢水祥也衛顓頊之虛其星為大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過見之月明年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午太甚宋衛陳鄭皆火劉歆以為大辰房心尾也八月心星在西方孛從其西過心東及漢也宋大辰虛謂宋先祖掌祀大辰星也陳太昊虛虙羲木德火所生也鄭祝融虛高辛氏火正也故皆為火所舍衛顓頊虛星為大水營室也天星既然又四國失政相似及為王室亂皆同哀公十三年冬十一月有星孛于東方董仲舒劉向以為不言宿名者不加宿也以辰乘日而出亂氣蔽君明也明年春秋事終一曰周之十一月夏九月日在氐出東方者軫角亢也軫楚角亢陳鄭也或曰角亢大國象為齊晉也其後楚滅陳田氏篡齊六卿分晉此其效也劉歆以為孛東方大辰也不言大辰旦而見與日爭光星入而彗猶見是歲再失閏十一月實八月也日在鶉火周分野也十四年冬有星孛在獲麟後劉歆以為不言所在官失之也高帝三年七月有星孛于大角旬餘乃入劉向以為是時項羽為楚王伯諸侯而漢已定三秦與羽相距滎陽天下歸心於漢楚將滅故彗除王位也一曰項羽阬秦卒燒宮室弒義帝亂王位故彗加之也文帝後七年九月有星孛于西方其本直尾箕末指虛危長丈餘及天漢十六日不見劉向以為尾宋地今楚彭城也箕為燕又為吳越齊宿在漢中負海之國水澤地也是時景帝新立信用鼂錯將誅正諸侯王其象先見後三年吳楚四齊與趙七國舉兵反皆誅滅, krp: 志}
