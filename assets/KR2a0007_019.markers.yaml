  - {type: variant, offset: 5299, length: 1012, content: 凌室災戊午戾后園南闕災是時趙飛燕大幸許后既廢上將立之故天見象於凌室與惠帝四年同應戾后衛太子妾遭巫蠱之禍宣帝既立追加尊號於禮不正又戾后起於微賤與趙氏同應景祐殿本都有應字天戒若曰微賤亡德之人不可以奉宗廟將絕祭祀有凶惡之禍至其六月丙寅趙皇后遂立姊妹驕妒賊害皇子卒皆受誅永始四年四月癸未長樂宮臨華殿及未央宮東司馬門災六月甲午孝文霸陵園東闕南方災長樂宮成帝母王太后之所居也未央宮帝所居也霸陵太宗盛德園也是時太后三弟相續秉政舉宗居位充塞朝廷兩宮親屬將害國家故天象仍見明年成都侯商薨弟曲陽侯根代為大司馬秉政後四年根乞骸骨薦兄子新都侯莽自代遂覆國焉哀帝建平三年正月癸卯桂宮鴻寧殿災帝祖母傅太后之所居也時傅太后欲與成帝母等號齊尊大臣孔光師丹等執政以為不可太后皆免官爵遂稱尊號後三年帝崩傅氏誅滅平帝元始五年七月己亥高皇帝原廟殿門災盡高皇帝廟在長安城中後以叔孫通譏復道故復起原廟於渭北非正也是時平帝幼成帝母王太后臨朝委任王莽將篡絕漢墮高祖宗廟故天象見也其冬平帝崩明年莽居攝因以篡國後卒夷滅傳曰治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成說曰土中央生萬物者也其於王者為內事宮室夫婦親屬亦相生者也古者天子諸侯宮廟大小高卑有制后夫人媵妾多少進退有度九族親疏長幼有序孔子曰禮與其奢也寧儉故禹卑宮室文王刑于寡妻此聖人之所以昭教化也如此則土得其性矣若乃奢淫驕慢則土失其性亡水旱之災而草木百穀不孰是為稼穡不成嚴公二十八年冬大水景祐本無水字春秋經亦無注同亡麥禾董仲舒以為夫人哀姜淫亂逆陰氣故大水也劉向以為水旱當書不書水旱而曰大亡麥禾者土氣不養稼穡不成者也是時夫人淫於二叔內外亡別又因凶飢一年而三築臺故應是而稼穡不成飾臺榭內淫亂之罰云遂不改寤四年而死禍流二世奢淫之患也傳曰好戰攻輕百姓飾城郭侵邊境則金不從革說曰金西方萬物既成殺氣之始也故立秋而鷹隼擊秋分而微霜降其於王事出軍行師把旄杖鉞誓士眾抗威武所以征畔逆止暴亂也詩云有虔秉鉞如火烈烈又曰載戢干戈載櫜弓矢動靜應誼說以犯難民忘其死如此則殿本有如此則三字王先謙說此脫按景祐本亦無金得其性矣若乃貪欲恣睢務立威勝不重民命則金失其性蓋工冶鑄金鐵金鐵冰滯涸堅不成者眾及為變怪是為金不從革左氏傳曰昭公八年春石言於晉晉平公問於師曠對曰石不能言神或馮焉作事不時怨讟動於民則有非言之物而言今宮室崇侈民力彫盡怨讟並興莫信其性石之言不亦宜乎於是晉侯方築虒祁之宮叔向曰君子之言信而有徵劉歆以為金石同類是為金不從革失其性也劉向以為石白色為主屬白祥, WYG: ''}
