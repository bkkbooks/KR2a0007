  - {type: variant, offset: 6657, length: 4288, content: 慎其齊戒致其嚴敬鬼神歆饗多獲福助此聖王所以順事陰氣和神人也至發號施令亦奉天時十二月咸得其氣則陰陽調而終始成如此則水得其性矣若乃不敬鬼神致景祐本作政朱一新說作政是政景祐本作政朱一新說作政是令逆時則水失其性霧水暴出百川逆溢壞卿邑溺人民及淫雨傷稼穡是為水不潤下京房易傳曰顓事有知誅罰絕理厥災水其水也雨殺人以隕霜大風天黃飢而不損茲謂泰厥災水水殺人辟遏有德茲謂狂厥災水水流殺人已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰解舍也王者於大敗誅首惡赦其眾不則皆函陰氣厥水流入國邑隕霜殺穀宋祁說穀當作菽按景祐本作叔草楊樹達說中之下卷亦云隕霜殺叔草叔草宋祁說穀當作菽按景祐本作叔草楊樹達說中之下卷亦云隕霜殺叔草桓公元年秋大水董仲舒劉向以為桓弒兄隱公民臣痛隱而賤桓後宋督弒其君諸侯會將討之桓受宋賂而歸又背宋諸侯由是伐魯仍交兵結讎伏尸流血百姓愈怨故十三年夏復大水一曰夫人驕淫將弒君陰氣盛桓不寤卒弒死劉歆以為桓易許田不祀周公廢祭祀之罰也嚴公七年秋大水亡麥苗董仲舒劉向以為嚴母文姜與兄齊襄公淫共殺威景祐殿本都作桓錢大昭說作桓是桓景祐殿本都作桓錢大昭說作桓是公嚴釋父讎復取齊女未入先與之淫一年再出會於道逆亂臣下賤之之應也十一年秋宋大水董仲舒以為時魯宋比年為乘丘鄑之戰百姓愁怨陰氣盛故二國俱水劉向以為時宋愍公驕慢睹災不改明年與其臣宋萬博戲婦人在側矜而駡萬萬殺公之應二十四大水董仲舒以為夫人哀姜淫亂不婦陰氣盛也劉向以為哀姜初入公使大夫宗婦見用幣又淫於二叔公弗能禁臣下賤之故是歲明年仍大水劉歆以為先是嚴飾宗廟刻桷丹楹以夸夫人簡宗廟之罰也宣公十年秋大水飢董仲舒以為時比伐邾取邑亦見報復兵讎連結百姓愁怨劉向以為宣公殺子赤而立子赤齊出也故懼以濟西田賂齊邾子貜且亦齊出也而宣比與邾交兵臣下懼齊之威創邾之禍皆賤公行而非其正也成公五年秋大水董仲舒劉向以為時成幼弱政在大夫前此一年再用師明年復城鄆以彊私家仲孫蔑叔孫僑如顓會宋晉陰勝陽襄公二十四年秋大水董仲舒以為先是一年齊伐晉襄使大夫帥師救晉後又侵齊國小兵弱數敵彊大百姓愁怨陰氣盛劉向以為先是襄慢鄰國是以邾伐其南齊伐其北莒伐其東百姓騷動後又仍犯彊齊也大水饑穀不成其災甚也高后三年夏漢中南郡大水水出流四千餘家四年秋河南大水伊雒流千六百餘家汝水流八百餘家八年夏漢中南郡水復出流六千餘家南陽沔水流萬餘家是時女主獨治諸呂相王文帝後三年秋大雨晝夜不絕三十五日藍田山水出流九百餘家燕王念孫據漢紀孝文紀改漢水出王念孫據漢紀孝文紀改壞民室八千餘所殺三百餘人先是趙人新垣平以望氣得幸為上立渭陽五帝廟欲出周鼎以夏四月郊見上帝歲餘懼誅謀為逆發覺要斬夷三族是時比再遣公主配單于賂遺甚厚匈奴愈驕侵犯北邊殺略多至萬餘人漢連發軍征討戍邊元帝永光五年夏及秋大水潁川汝南淮陽廬江雨壞鄉聚民舍及水流殺人先是一年有司奏罷郡國廟是歲又定迭毀罷太上皇孝惠帝寢廟皆無復修通儒以為違古制刑臣石顯用事成帝建始三年夏大水三輔霖雨三十餘日郡國十九雨山谷水出凡殺四千餘人壞官寺民舍八萬三千餘所元年有司奏徙甘泉泰畤河東后土于長安南北郊二年又罷雍五畤郡國諸舊祀凡六所經曰羞用五事五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰䜭恭作肅從作艾明作悊聰作謀䜭作聖休徵曰肅時雨若艾時陽若悊時奧若謀時寒若聖時風若咎徵曰狂恆雨若僭恆陽若舒恆奧若急恆寒若霿恆風若傳曰貌之不恭是謂不肅厥咎狂厥罰恆雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥唯金沴水景祐殿本都作木朱一新說作木是木景祐殿本都作木朱一新說作木是說曰凡草物之類謂之妖妖猶夭胎言尚微蟲豸之類謂之孽孽則牙孽矣及六畜謂之禍言其著也及人謂之痾痾病貌言𥧲深也甚則異物生謂之眚自外來謂之祥祥猶禎也氣相傷謂之沴沴猶臨莅不和意也每一事云時則以絕之言非必俱至或有或亡或在前或在後也孝武時夏侯始昌通五經善推五行傳以傳族子夏侯勝下及許商皆以教所賢弟子其傳與劉向同唯劉歆傳獨異貌之不恭是謂不肅肅敬也內曰恭外曰敬人君行己體貌不恭怠慢驕蹇則不能敬萬事失在狂易故其咎狂也上嫚下暴則陰氣勝故其罰常雨也水傷百穀衣食不足則姦軌並作故其極惡也一曰民多被刑或形貌醜惡亦是也風俗狂慢變節易度則為剽輕奇怪之服故有服妖水類動故有龜孽於易巽為雞雞有冠距文武之貌不為威儀貌氣毀故有雞禍一曰水歲雞多死及為怪亦是也上失威儀則下有彊臣害君上者故有下體生於上之痾木色青故有青眚青祥凡貌傷者病木氣木氣病則金沴之衝氣相通也於易震在東方為春為木也兌在西方為秋為金也離在南方為夏為火也坎在北方為冬為水也春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反寒暑殊絕水火之氣不得相併故視傷常奧聽傷常寒者其氣然也逆之其極曰惡順之其福曰攸好德劉歆貌傳曰有鱗蟲之孽羊禍鼻痾說以為於天文東方辰為龍星故為鱗蟲於易兌為羊木為金所病故致羊禍與常雨同應此說非是春與秋氣陰陽相敵木病金盛故能相并唯此一事耳禍與妖痾祥眚同類不得獨異史記成公十六年公會諸侯于周單襄公見晉厲公視遠步高告公曰晉將有亂魯侯曰敢問天道也抑人故也對曰吾非瞽史焉知天道吾見晉君之容殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處誼足以步目晉侯視遠而足高目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯民之大事也於是虖觀存亡故國將無咎其君在會步言視聽必皆無讁則可以知德矣視遠曰絕其誼足高曰棄其德言爽曰反其信聽淫曰離其名夫目以處誼足以踐德口以庇信耳以聽名者也故不可不慎偏喪有咎既喪則國從之晉侯爽二吾是以云後二年晉人殺厲公凡此屬皆貌不恭之咎云左氏使景祐殿局本都作傳此誤傳景祐殿局本都作傳此誤桓公十三年楚屈瑕伐羅鬭伯比送之還謂其馭曰莫囂必敗舉止高心不固矣遽見楚子以告楚子使賴人追之弗及莫囂行遂無次且不設備及羅羅人軍之大敗莫囂縊死釐公十一年周使內史過賜晉惠公命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世二十一年晉惠公卒子懷公立晉人殺之更立文公成公十三年晉侯使郤錡乞師于魯將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為十七年郤氏亡成公十三年諸侯朝王遂從劉康公伐秦成肅公受賑景祐殿本都作脤此誤局本亦誤脤景祐殿本都作脤此誤局本亦誤于社不敬劉子曰吾聞之曰民受天地之中以生所謂命也是以有禮義動作威儀之則以定命也能者養以之福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如惇篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反虖五月成肅公卒成公十四年衛定公享苦成叔甯惠子相苦成叔敖甯子曰苦成家其亡虖古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔匪儌匪傲萬福來求今夫子傲取禍之道也後三年苦成家亡襄公七年衛孫文子聘于魯君登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子亡辭亦亡悛容穆子曰孫子必亡為臣而君過而不悛亡之本也十四年孫子逐其君而外叛襄公二十八年蔡景侯歸自晉入于鄭鄭伯享之不敬子產曰蔡君其不免虖日其過此也君使子展往勞于東門而敖吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰敖以為己心將得死虖君若不免必由其子淫而不父如是者必有子禍三十年為世子般所殺襄公三十一年公薨季武子將立公子裯穆叔曰是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立必為季氏憂武子弗聽卒立之比及葬三易衰衰衽如故衰是為昭公立二十五年聽讒攻季氏兵敗出奔死于外襄公三十一年衛北宮文子見楚令尹圍之儀言於衛侯曰令尹似君矣將有它志雖獲其志弗能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終昭公十一年夏周單子會於戚視下言徐晉叔向曰單子其死虖朝有著定會有表衣有襘帶有結會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事於會視不登帶言不過步貌不道容而言不昭矣不道不恭不昭不從無守氣矣十二月單成公卒昭公二十一年三月葬蔡平公蔡太子朱失位位在卑魯大夫遂葬者歸告昭子昭子歎曰蔡其亡虖若不亡是君也必不終詩曰不解於位民之攸塈今始即位而適卑身將從之十月蔡侯朱出奔楚晉魏舒合諸侯之大夫于翟泉將以城成周魏子涖政衛彪傒曰將建天子而易位以令非誼也大事奸誼必有大咎晉不失諸侯魏子其不免色虖是行也魏獻子屬役於韓簡子而田於大陸焚焉而死定公十五年邾隱公朝於魯執玉高其容仰公受玉卑其容俯子贛觀焉曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是虖取之朝祀喪戎於是虖觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡虖庶徵之恆雨劉歆以為春秋大雨也劉向以為大水隱公九年三月癸酉大雨震電庚辰大雨雪大雨雨水也震雷也劉歆以為三月癸酉於曆數春分後一日始震電之時也當雨而不當大雨大雨常雨之罰也於始震電八日之間而大雨雪常寒之罰也劉向以為周三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異於易雷以二月出其卦曰豫言萬物隨雷出地皆逸豫也以八月入其卦曰歸妹言雷復歸入地則孕毓根核保藏蟄蟲避盛陰之害出地則養長華實發揚隱伏宣盛陽之德入能除害出能興利人君之象也是時隱以弟桓幼代而攝立公子翬見隱居位已久勸之遂立隱既不許翬懼而易其辭遂與桓共殺隱天見其將然故正月大雨水而雷電是陽不閉陰出涉危難而害萬物天戒若曰為君失時賊弟佞臣將作亂矣後八日大雨雪陰見間隙而勝陽篡殺之禍將成也公不寤後二年而殺昭帝始元元年七月大水雨自七月至十月成帝建始三年秋大雨三十餘日四年九月大雨十餘日左氏傳愍公二年晉獻公使太子申生帥師公衣之偏衣佩之金玦狐突歎曰時事之徵也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣以尨服遠其躬也佩以金玦棄其衷也服以遠之時以閟之尨涼冬殺金寒玦離胡可恃也梁餘子養曰帥師者受命于廟受脤於社有常服矣弗獲而尨命可知也死而不孝不如逃之罕夷曰尨奇無常金玦不復君有心矣後四年申生以讒自殺近服妖也左氏傳曰鄭子臧好聚鷸冠鄭文公惡之使盜殺之劉向以為近服妖者也一曰非獨為子臧之身亦文公之戒也初文公不禮晉文又犯天子命而伐滑不尊尊敬上其後晉文伐鄭幾亡國昭帝時昌邑王賀遣中大夫之長安多治仄注冠以賜大臣又以冠奴劉向以為近服妖也時王賀狂悖聞天子不豫弋獵馳騁如故與騶奴宰人游居娛戲驕嫚不敬冠者尊服奴者賤人賀無故好作非常之冠暴尊象也以冠奴者當自至尊墜至賤也其後帝崩無子漢大臣徵賀為嗣即位狂亂無道縛戮諫者夏侯勝等於是大臣白, WYG: 掌}
  - {type: variant, offset: 6657, length: 4288, content: 慎其齊戒致其嚴敬鬼神歆饗多獲福助此聖王所以順事陰氣和神人也至發號施令亦奉天時十二月咸得其氣則陰陽調而終始成如此則水得其性矣若乃不敬鬼神致景祐本作政朱一新說作政是政景祐本作政朱一新說作政是令逆時則水失其性霧水暴出百川逆溢壞卿邑溺人民及淫雨傷稼穡是為水不潤下京房易傳曰顓事有知誅罰絕理厥災水其水也雨殺人以隕霜大風天黃飢而不損茲謂泰厥災水水殺人辟遏有德茲謂狂厥災水水流殺人已水則地生蟲歸獄不解茲謂追非厥水寒殺人追誅不解茲謂不理厥水五穀不收大敗不解茲謂皆陰解舍也王者於大敗誅首惡赦其眾不則皆函陰氣厥水流入國邑隕霜殺穀宋祁說穀當作菽按景祐本作叔草楊樹達說中之下卷亦云隕霜殺叔草叔草宋祁說穀當作菽按景祐本作叔草楊樹達說中之下卷亦云隕霜殺叔草桓公元年秋大水董仲舒劉向以為桓弒兄隱公民臣痛隱而賤桓後宋督弒其君諸侯會將討之桓受宋賂而歸又背宋諸侯由是伐魯仍交兵結讎伏尸流血百姓愈怨故十三年夏復大水一曰夫人驕淫將弒君陰氣盛桓不寤卒弒死劉歆以為桓易許田不祀周公廢祭祀之罰也嚴公七年秋大水亡麥苗董仲舒劉向以為嚴母文姜與兄齊襄公淫共殺威景祐殿本都作桓錢大昭說作桓是桓景祐殿本都作桓錢大昭說作桓是公嚴釋父讎復取齊女未入先與之淫一年再出會於道逆亂臣下賤之之應也十一年秋宋大水董仲舒以為時魯宋比年為乘丘鄑之戰百姓愁怨陰氣盛故二國俱水劉向以為時宋愍公驕慢睹災不改明年與其臣宋萬博戲婦人在側矜而駡萬萬殺公之應二十四大水董仲舒以為夫人哀姜淫亂不婦陰氣盛也劉向以為哀姜初入公使大夫宗婦見用幣又淫於二叔公弗能禁臣下賤之故是歲明年仍大水劉歆以為先是嚴飾宗廟刻桷丹楹以夸夫人簡宗廟之罰也宣公十年秋大水飢董仲舒以為時比伐邾取邑亦見報復兵讎連結百姓愁怨劉向以為宣公殺子赤而立子赤齊出也故懼以濟西田賂齊邾子貜且亦齊出也而宣比與邾交兵臣下懼齊之威創邾之禍皆賤公行而非其正也成公五年秋大水董仲舒劉向以為時成幼弱政在大夫前此一年再用師明年復城鄆以彊私家仲孫蔑叔孫僑如顓會宋晉陰勝陽襄公二十四年秋大水董仲舒以為先是一年齊伐晉襄使大夫帥師救晉後又侵齊國小兵弱數敵彊大百姓愁怨陰氣盛劉向以為先是襄慢鄰國是以邾伐其南齊伐其北莒伐其東百姓騷動後又仍犯彊齊也大水饑穀不成其災甚也高后三年夏漢中南郡大水水出流四千餘家四年秋河南大水伊雒流千六百餘家汝水流八百餘家八年夏漢中南郡水復出流六千餘家南陽沔水流萬餘家是時女主獨治諸呂相王文帝後三年秋大雨晝夜不絕三十五日藍田山水出流九百餘家燕王念孫據漢紀孝文紀改漢水出王念孫據漢紀孝文紀改壞民室八千餘所殺三百餘人先是趙人新垣平以望氣得幸為上立渭陽五帝廟欲出周鼎以夏四月郊見上帝歲餘懼誅謀為逆發覺要斬夷三族是時比再遣公主配單于賂遺甚厚匈奴愈驕侵犯北邊殺略多至萬餘人漢連發軍征討戍邊元帝永光五年夏及秋大水潁川汝南淮陽廬江雨壞鄉聚民舍及水流殺人先是一年有司奏罷郡國廟是歲又定迭毀罷太上皇孝惠帝寢廟皆無復修通儒以為違古制刑臣石顯用事成帝建始三年夏大水三輔霖雨三十餘日郡國十九雨山谷水出凡殺四千餘人壞官寺民舍八萬三千餘所元年有司奏徙甘泉泰畤河東后土于長安南北郊二年又罷雍五畤郡國諸舊祀凡六所經曰羞用五事五事一曰貌二曰言三曰視四曰聽五曰思貌曰恭言曰從視曰明聽曰聰思曰䜭恭作肅從作艾明作悊聰作謀䜭作聖休徵曰肅時雨若艾時陽若悊時奧若謀時寒若聖時風若咎徵曰狂恆雨若僭恆陽若舒恆奧若急恆寒若霿恆風若傳曰貌之不恭是謂不肅厥咎狂厥罰恆雨厥極惡時則有服妖時則有龜孽時則有雞禍時則有下體生上之痾時則有青眚青祥唯金沴水景祐殿本都作木朱一新說作木是木景祐殿本都作木朱一新說作木是說曰凡草物之類謂之妖妖猶夭胎言尚微蟲豸之類謂之孽孽則牙孽矣及六畜謂之禍言其著也及人謂之痾痾病貌言𥧲深也甚則異物生謂之眚自外來謂之祥祥猶禎也氣相傷謂之沴沴猶臨莅不和意也每一事云時則以絕之言非必俱至或有或亡或在前或在後也孝武時夏侯始昌通五經善推五行傳以傳族子夏侯勝下及許商皆以教所賢弟子其傳與劉向同唯劉歆傳獨異貌之不恭是謂不肅肅敬也內曰恭外曰敬人君行己體貌不恭怠慢驕蹇則不能敬萬事失在狂易故其咎狂也上嫚下暴則陰氣勝故其罰常雨也水傷百穀衣食不足則姦軌並作故其極惡也一曰民多被刑或形貌醜惡亦是也風俗狂慢變節易度則為剽輕奇怪之服故有服妖水類動故有龜孽於易巽為雞雞有冠距文武之貌不為威儀貌氣毀故有雞禍一曰水歲雞多死及為怪亦是也上失威儀則下有彊臣害君上者故有下體生於上之痾木色青故有青眚青祥凡貌傷者病木氣木氣病則金沴之衝氣相通也於易震在東方為春為木也兌在西方為秋為金也離在南方為夏為火也坎在北方為冬為水也春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋陰常雨言傷則致春陽常旱也至於冬夏日夜相反寒暑殊絕水火之氣不得相併故視傷常奧聽傷常寒者其氣然也逆之其極曰惡順之其福曰攸好德劉歆貌傳曰有鱗蟲之孽羊禍鼻痾說以為於天文東方辰為龍星故為鱗蟲於易兌為羊木為金所病故致羊禍與常雨同應此說非是春與秋氣陰陽相敵木病金盛故能相并唯此一事耳禍與妖痾祥眚同類不得獨異史記成公十六年公會諸侯于周單襄公見晉厲公視遠步高告公曰晉將有亂魯侯曰敢問天道也抑人故也對曰吾非瞽史焉知天道吾見晉君之容殆必禍者也夫君子目以定體足以從之是以觀其容而知其心矣目以處誼足以步目晉侯視遠而足高目不在體而足不步目其心必異矣目體不相從何以能久夫合諸侯民之大事也於是虖觀存亡故國將無咎其君在會步言視聽必皆無讁則可以知德矣視遠曰絕其誼足高曰棄其德言爽曰反其信聽淫曰離其名夫目以處誼足以踐德口以庇信耳以聽名者也故不可不慎偏喪有咎既喪則國從之晉侯爽二吾是以云後二年晉人殺厲公凡此屬皆貌不恭之咎云左氏使景祐殿局本都作傳此誤傳景祐殿局本都作傳此誤桓公十三年楚屈瑕伐羅鬭伯比送之還謂其馭曰莫囂必敗舉止高心不固矣遽見楚子以告楚子使賴人追之弗及莫囂行遂無次且不設備及羅羅人軍之大敗莫囂縊死釐公十一年周使內史過賜晉惠公命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世二十一年晉惠公卒子懷公立晉人殺之更立文公成公十三年晉侯使郤錡乞師于魯將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為十七年郤氏亡成公十三年諸侯朝王遂從劉康公伐秦成肅公受賑景祐殿本都作脤此誤局本亦誤脤景祐殿本都作脤此誤局本亦誤于社不敬劉子曰吾聞之曰民受天地之中以生所謂命也是以有禮義動作威儀之則以定命也能者養以之福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如惇篤敬在養神篤在守業國之大事在祀與戎祀有執膰戎有受脤神之大節也今成子惰棄其命矣其不反虖五月成肅公卒成公十四年衛定公享苦成叔甯惠子相苦成叔敖甯子曰苦成家其亡虖古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔匪儌匪傲萬福來求今夫子傲取禍之道也後三年苦成家亡襄公七年衛孫文子聘于魯君登亦登叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君今吾子不後寡君寡君未知所過吾子其少安孫子亡辭亦亡悛容穆子曰孫子必亡為臣而君過而不悛亡之本也十四年孫子逐其君而外叛襄公二十八年蔡景侯歸自晉入于鄭鄭伯享之不敬子產曰蔡君其不免虖日其過此也君使子展往勞于東門而敖吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰敖以為己心將得死虖君若不免必由其子淫而不父如是者必有子禍三十年為世子般所殺襄公三十一年公薨季武子將立公子裯穆叔曰是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立必為季氏憂武子弗聽卒立之比及葬三易衰衰衽如故衰是為昭公立二十五年聽讒攻季氏兵敗出奔死于外襄公三十一年衛北宮文子見楚令尹圍之儀言於衛侯曰令尹似君矣將有它志雖獲其志弗能終也公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終昭公十一年夏周單子會於戚視下言徐晉叔向曰單子其死虖朝有著定會有表衣有襘帶有結會朝之言必聞于表著之位所以昭事序也視不過結襘之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事於會視不登帶言不過步貌不道容而言不昭矣不道不恭不昭不從無守氣矣十二月單成公卒昭公二十一年三月葬蔡平公蔡太子朱失位位在卑魯大夫遂葬者歸告昭子昭子歎曰蔡其亡虖若不亡是君也必不終詩曰不解於位民之攸塈今始即位而適卑身將從之十月蔡侯朱出奔楚晉魏舒合諸侯之大夫于翟泉將以城成周魏子涖政衛彪傒曰將建天子而易位以令非誼也大事奸誼必有大咎晉不失諸侯魏子其不免色虖是行也魏獻子屬役於韓簡子而田於大陸焚焉而死定公十五年邾隱公朝於魯執玉高其容仰公受玉卑其容俯子贛觀焉曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是虖取之朝祀喪戎於是虖觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡虖庶徵之恆雨劉歆以為春秋大雨也劉向以為大水隱公九年三月癸酉大雨震電庚辰大雨雪大雨雨水也震雷也劉歆以為三月癸酉於曆數春分後一日始震電之時也當雨而不當大雨大雨常雨之罰也於始震電八日之間而大雨雪常寒之罰也劉向以為周三月今正月也當雨水雪雜雨雷電未可以發也既已發也則雪不當復降皆失節故謂之異於易雷以二月出其卦曰豫言萬物隨雷出地皆逸豫也以八月入其卦曰歸妹言雷復歸入地則孕毓根核保藏蟄蟲避盛陰之害出地則養長華實發揚隱伏宣盛陽之德入能除害出能興利人君之象也是時隱以弟桓幼代而攝立公子翬見隱居位已久勸之遂立隱既不許翬懼而易其辭遂與桓共殺隱天見其將然故正月大雨水而雷電是陽不閉陰出涉危難而害萬物天戒若曰為君失時賊弟佞臣將作亂矣後八日大雨雪陰見間隙而勝陽篡殺之禍將成也公不寤後二年而殺昭帝始元元年七月大水雨自七月至十月成帝建始三年秋大雨三十餘日四年九月大雨十餘日左氏傳愍公二年晉獻公使太子申生帥師公衣之偏衣佩之金玦狐突歎曰時事之徵也衣身之章也佩衷之旗也故敬其事則命以始服其身則衣之純用其衷則佩之度今命以時卒閟其事也衣以尨服遠其躬也佩以金玦棄其衷也服以遠之時以閟之尨涼冬殺金寒玦離胡可恃也梁餘子養曰帥師者受命于廟受脤於社有常服矣弗獲而尨命可知也死而不孝不如逃之罕夷曰尨奇無常金玦不復君有心矣後四年申生以讒自殺近服妖也左氏傳曰鄭子臧好聚鷸冠鄭文公惡之使盜殺之劉向以為近服妖者也一曰非獨為子臧之身亦文公之戒也初文公不禮晉文又犯天子命而伐滑不尊尊敬上其後晉文伐鄭幾亡國昭帝時昌邑王賀遣中大夫之長安多治仄注冠以賜大臣又以冠奴劉向以為近服妖也時王賀狂悖聞天子不豫弋獵馳騁如故與騶奴宰人游居娛戲驕嫚不敬冠者尊服奴者賤人賀無故好作非常之冠暴尊象也以冠奴者當自至尊墜至賤也其後帝崩無子漢大臣徵賀為嗣即位狂亂無道縛戮諫者夏侯勝等於是大臣白, krp: 掌}
