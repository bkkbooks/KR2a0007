  - {type: variant, offset: 5201, length: 4, content: 正月乙丑, WYG: 省東織更名西織為織室綏和二年哀帝省樂府王莽改少府曰共工中尉秦官掌徼循京師如淳曰所謂遊徼徼循禁備盜賊也師古曰徼謂遮繞也徼音工釣反有兩丞候司馬千人師古曰候及司馬及千人皆官名也屬國都尉云有丞候千人西域都䕶云司馬候千人各二人凡此千人皆官名也武帝太初元年更名執金吾應劭曰吾者禦也掌執金革以禦非常師古曰金吾鳥名也主辟不祥天子出行職主先導以禦非常故執此鳥之象因以名官屬官有中壘寺互武庫都船四令丞如淳曰漢儀注有寺互都船獄令治水官也都船武庫有三丞中壘兩尉又式道左右中候候丞及左右京輔都尉尉丞兵卒皆屬焉應劭曰式道凡三候車駕出還式道候持麾至宮門門乃開師古曰式表也初寺互屬少府中屬主爵後屬中尉自太常至執金吾秩皆中二千石丞皆千石太子太傅少傅古官屬官有太子門大夫應劭曰員五人秩六百石庶子應劭曰員五人秩六百石先馬張晏曰先馬員十六人秩比謁者如淳曰前驅也國語曰句踐親為夫差先馬先或作洗也舍人將作少府秦官掌治宫室有兩丞左右中候景帝中六年更名將作大匠屬官有石庫東園主章左右前後中校七令丞如淳曰章謂大材也舊將作大匠主材吏名章曹掾師古曰今所謂木鍾者盖章聲之轉耳東園主章掌大材以供東圍大匠也又主章長丞師古曰掌凢大木也武帝太初元年更名東園主章為木工成帝陽朔三年省中候及左右前後中校五丞詹事秦官應劭曰詹省也給也臣瓉曰茂陵書詹事秩真二千石掌}
