  - {type: variant, offset: 11039, length: 613, content: 行不順厥咎人奴冠天下亂辟無適妾子拜又曰君不正臣欲篡厥妖狗冠出朝門成帝鴻嘉永始之間好為微行出游選從期門郎有材力者及私奴客多至十餘少五六人皆白衣袒幘帶持刀劍或乘小車御者在茵上或皆騎出入市里郊野遠至旁縣時大臣車騎將軍王音及劉向等數以切諫谷永曰易稱得臣無家言王者臣天下無私家也今陛下棄萬乘之至貴樂家人之賤事厭高美之尊稱好匹夫之卑字崇聚票輕無誼之人以為私客置私田於民間畜私奴車馬於北宮數去南面之尊離深宮之固挺身獨與小人晨夜相隨烏集醉飽吏民之家亂服共坐溷肴亡別閔勉遯樂晝夜在路典門戶奉宿衛之臣執干戈守空宮公卿百寮不知陛下所在積數年矣昔虢公為無道有神降曰賜爾土田言將以庶人受土田也諸侯夢得土田為失國祥而況王者畜私田財物為庶人之事乎左氏傳曰周景王時大夫賓起見雄雞自斷其尾劉向以為近雞禍也是時王有愛子子鼂王與賓起陰謀欲立之田于北山將因兵眾殺適子之黨未及而崩三子爭國王室大亂其後賓起誅死子鼂奔楚而敗京房易傳曰有始無終厥妖雄雞自齧斷其尾宣帝黃龍元年未央殿輅軨中雌雞化為雄毛衣變化而不鳴不將無距元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角者京房易傳曰雞知時知時者當死房以為己知時恐當之劉向以為房失雞占雞者小畜主司時起居人小臣執事為政之象也言小臣將秉君威以害正事猶石顯也竟寧元年石顯伏辜此其效也一曰石顯何足以當此昔武王伐殷至于牧野誓師曰古人有言曰牝雞無晨牝雞之晨惟家之索今殷王紂惟婦言用繇是論之黃龍初元永光雞變乃國家之占妃后象也孝元王, WYG: ''}
