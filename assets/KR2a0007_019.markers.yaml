  - {type: variant, offset: 44748, length: 0, content: '', WYG: 班表之失也据史記循吏傳公儀休魯博士也以高第為魯相則魯有博士官矣太中大夫秩比千石如故劉攽曰此言太中大夫秩比千石如故則中大夫舊小于太中秩無二千石故言更名中大夫為光禄大夫秩比二千石太中大夫秩比千石也太僕秦官注周穆王所置也臣召南按周禮夏官有太僕下大夫二人不得云始于秦也周穆王命伯冏為太僕耳亦不得云穆王始置此官也表及注並誤中太僕監本于太僕後提行寫非是凡九卿屬官如奉常下博士光禄勲下大夫郎謁者期門羽林僕射宋本俱不提行今從之又中書謁者唐六典曰自武帝游宴後庭故用宦者司馬遷為中書令即其任也不言謁者省文也洪邁曰中書尚書令在西漢為少府屬官在東漢亦屬少府雖典機要而去公卿甚逺魏晉以來浸以華重唐遂為三省長官居真宰相之任矣初置尚書員五人文獻通考曰其一人為僕射四人分為四曹常侍曹二千石曹民曹客曹又置三公曹是為五曹臣召南按後志及宋志尚書令尚書僕射尚書丞皆秦官而漢因之此表言初置者謂尚書之分五曹自成帝始也先馬注如淳曰前驅也驅訛軀今改正司𨽻校尉周官臣召南按劉昭注後志云豈即司寇乎按周司寇不名司𨽻且秦漢以廷尉更司寇名矣此說非也葢周禮秋官之屬有司𨽻中士二人鄭注𨽻給勞辱之役者漢始置司𨽻亦使將徒治道溝渠之事後稍尊之使主官府及近郡此表所謂周官也侍中臣召南按表不言置官本末葢漢官也沈約宋志甚詳若晉志謂黃帝時風后為侍中則杜佑所云出兵家䜟書不足信者也前漢書卷十九上考證欽定四庫全書前漢書卷十九下漢蘭臺令史班固撰唐正議大夫行祕書少監琅邪縣開國子顔師古注百官公卿表第七下師古曰此表中記公卿姓名不具及但舉其官而無名或言若干年不載遷免死者皆史之闕文不可得知也前漢書卷十九下前漢書卷十九下考證百官公卿表下十二年臣召南按陳平傳高帝崩平固請得宿衛中太后乃以為郎中令惠帝六年為左丞相据此則是年郎中令一格應書曲逆侯陳平為郎中令六年遷作表時脱漏耳孝惠三年長修侯杜恬為廷尉臣召南按恬為廷尉應在二年以功臣表證之恬以二年薨其子中以三年嗣則此表列於三年誤也高后四年平陽侯曹窋為御史大夫窋訛窟從宋本改正高后七年七}
