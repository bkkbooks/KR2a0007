  - {type: variant, offset: 44759, length: 3, content: 甲辰隕, WYG: 丙戌復為丞相後九月免司馬光曰史記將相表八年七月辛巳食其為太傅九月丙戌復為丞相後九月免漢書表乃云云以長歴推之八年七月無辛巳九月無丙戌閏月羣臣迎代邸無食其名二表皆誤孝文十年廷尉昌廷尉嘉臣召南按張釋之傳釋之為廷尉至景帝初年始出為淮南相是釋之終文帝之世為廷尉也此表文帝十年書廷尉昌廷尉嘉十五年書廷尉宜昌後元年書廷尉信孝景元年書廷尉􅇌凡五易其人矣表傳不同如此孝景中二年中尉臣照按中尉下脱一字蓋中尉某也古本亦脱又太初二年少府王偉中尉某亦脱一字中五年主爵都尉不疑臣召南按直不疑傳但云景帝後元年拜御史大夫而已此表不疑於中五年為主爵都尉六年由中大夫令更為衛尉後元年由衛尉遷御史大夫可以補傳之所不及孝武建元二年郎中令}
