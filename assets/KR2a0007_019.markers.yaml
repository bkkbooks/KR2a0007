  - {type: variant, offset: 44745, length: 0, content: '', krp: 二年復爲刺史元夀二年復為牧郡守秦官掌治其郡秩二千石有丞邉郡又有長史掌兵馬秩皆六百石景帝中二年更名太守郡尉秦官掌佐守典武職甲卒秩比二千石有丞秩皆六百石景帝中二年更名都尉關都尉秦官農都尉屬國都尉皆武帝初置縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏師古曰吏理也主理其縣内也百石以下有斗食佐史之秩師古曰漢官名秩簿云斗食月俸十一斛佐史月俸八斛也一說斗食者嵗俸不滿百石計日而食一斗二升故云斗食也是為少吏大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌敎化嗇夫職聽訟收賦稅游徼徼循禁賊盜縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道凡縣道國邑千五百八十七鄉六千六百二十二亭二萬九千六百三十五凡吏秩比二千石以上皆銀印青綬師古曰漢舊儀云銀印背龜鈕其文曰章謂刻曰某官之章也光禄大夫無師古曰無印綬秩比六百石以上皆銅印黑綬大夫博士御史謁者郎無師古曰大夫以下亦無印綬其僕射御史治書尚符璽者有印綬比二百石以上皆銅印黄綬師古曰漢舊儀云六百石四百石至二百石以上皆銅印鼻鈕文曰印謂鈕但作鼻不為蟲獸之形而刻文云某官之印成帝陽朔二年除八百石五百石秩綏和}
  - {type: variant, offset: 44747, length: 0, content: '', WYG: 長相皆黑綬哀帝建平二年復黃綬吏員自佐史至丞相十三萬二百八十五人前漢書卷十九上前漢書卷十九上考證百官公卿表上注師古曰漢制三公云云監本直刋此注於表前非也葢標題之下有此注耳今從宋本丞相秦有左右注荀悅曰秦本次國命卿二人是以置左右丞相無三公官臣召南按荀恱說非也秦置左右丞相始於悼武王二年以樗里疾甘茂為之是時秦已稱王數世豈猶守周制次國二卿故事耶且左相右相商湯已然左傳仲虺居薛為湯左相是其眀證但丞相之名始於秦耳高后置左右丞相文帝二年復置一丞相王應麟曰秦以左為上漢以右為尊又曰武帝征和二年雖詔分丞相長史為兩府拜劉屈氂為左丞相然右相未嘗置也内領侍御史臣召南按周禮春官之屬御史中士八人則御史始於周此表云秦官者謂御史大夫官始於秦也唐六典曰周官有御史以其在殿柱之間亦謂之柱下史秦改為侍御史史記張蒼自秦時為御史主柱下方書即其任也前後左右將軍皆周末官秦因之臣召南按沈約宋志云周制王立六軍晉獻公作二軍公將上軍將軍之名起此左傳昭二十八年豈將軍食之而有不足孔穎達疏曰晉使卿為軍將謂之將中軍將上軍此以魏子將中軍故謂之將軍及六國以來遂以將軍為官名盖其原始于此按此說甚當史記封禪書周宣王時有右將軍杜伯然不可為典要也奉常秦官景帝中六年更名太常注師古曰太常王者旌旗也劉攽曰顔說太常都非晉語作執秩之官亦是主禮者秩亦猶常也然則古通謂常耳王建太常自是周禮秦何庸知之且禮官主于一旗亦非義矣臣召南按唐六典云漢高名曰太常惠帝復曰奉常景帝又曰太常與此表異据史記叔孫通傳高帝拜通為太常漢官典職亦云惠帝改太常為奉常則六典所云自確班表盖祗標其大畧耳又廱太宰太祝令丞劉攽曰多有字不然則是又字臣浩按各本俱作又据攽此條則宋以前本作有字也博士秦官沈約宋志曰按六國時往往有博士臣召南按宋志此文所以糾}
