  - {type: punctuation, offset: 16356, content: 、, id: KR2a0007_tls_019-bkkpn4428}
  - {type: variant, offset: 16357, length: 388, content: 年夏大旱左氏傳晉獻公時童謠曰丙子景祐本有子字王念孫說景祐本是之晨龍尾伏辰袀服振振取虢之旂鶉之賁賁天策焞焞火中成軍虢公其犇是時虢為小國介夏陽之阸怙虞國之助亢衡于晉有炕陽之節失臣下之心晉獻伐之問於卜偃曰吾其濟乎偃以童謠對曰克之十月朔丙子旦日在尾月在策鶉火中必此時也冬十二月丙子朔晉師滅虢虢公醜犇周周十二月夏十月也言天者以夏正史記晉惠公時童謠曰恭太子更葬兮後十四年晉亦不昌昌乃在其兄是時惠公賴秦力得立立而背秦內殺二大夫國人不說及更葬其兄恭太子申生而不敬故詩妖作也後與秦戰為秦所獲立十四年而死晉人絕之更立其兄重耳是為文公遂伯諸侯左氏傳文成之世童謠曰鸜之鵒之公出辱之鸜鵒之羽公在外野往饋之馬鸜鵒跦跦公在乾侯徵褰與襦鸜鵒之巢遠哉搖搖裯父喪勞宋父以驕鸜鵒鸜鵒往歌來哭至昭公時有鸜鵒來巢公攻季氏敗出奔齊居外野次乾侯八年死于外歸葬魯昭公名裯公子宋立是為定公元帝時童謠曰井水溢滅竈煙灌玉堂流金門至, WYG: 丞}
