  - {type: variant, offset: 6372, length: 163, content: 石鼓石鼓鳴有兵是歲廣漢鉗子謀攻牢篡死辠囚鄭躬等盜庫兵劫略吏民衣繡衣自號曰山君黨與浸廣明年冬乃伏誅自歸者三千餘人後四年尉氏樊並等謀反殺陳留太守嚴普自稱將軍山陽亡徒蘇令等黨與數百人盜取庫兵經歷郡國四十餘皆踰年乃伏誅是時起昌陵作者數萬人徙郡國吏民五千餘戶以奉陵邑作治五年不成乃罷昌陵還徙家石鳴與晉石言同應師曠所謂民力彫盡傳云輕百姓者, WYG: 省皇后詹事總屬長秋}
