  - {type: variant, offset: 1553, length: 367, content: 火也人火曰火天火曰災榭者講武之坐屋成公三年二月甲子新宮災穀梁以為宣宮不言諡恭也劉向以為時魯三桓子孫始執國政宣公欲誅之恐不能使大夫公孫歸父如晉謀未反宣公死三家譖歸父於成公成公父喪未葬聽讒而逐其父之臣使奔齊故天災宣宮明不用父命之象也一曰三家親而亡禮猶宣公殺子赤而立亡禮而親天災宣廟欲示去三家也董仲舒以為成居喪亡哀戚心數興兵戰伐故天災其父廟示失子道不能奉宗廟也一曰宣殺君而立不當列於群祖也襄公九年春宋災劉向以為先是宋公聽讒逐其大夫華弱出奔魯左氏傳曰宋災樂喜為司城先使火所未至徹小屋塗大屋陳畚輂具綆缶備水器畜水潦積土塗繕守備表火道儲正徒郊保之民使奔火所又飭眾官各慎其職晉侯聞之問士弱曰宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出入火是故咮為鶉火心為大火陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火商人閱其禍敗之釁必始於火, WYG: ''}
