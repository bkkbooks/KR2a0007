  - {type: variant, offset: 44738, length: 0, content: '', WYG: 丞一人司馬候千人各二人戊己校尉元帝初元元年置師古曰甲乙丙丁庚辛壬癸皆有正位唯戊巳寄治耳今所置校尉亦無常居故取戊巳爲名也有戊校尉有巳校尉一說戊巳居中鎭覆四方今所置校尉亦處西域之中撫諸國也有丞司馬各一人候五人秩比六百石奉車}
