  - {type: variant, offset: 44745, length: 0, content: '', WYG: 二年復爲刺史元夀二年復為牧郡守秦官掌治其郡秩二千石有丞邉郡又有長史掌兵馬秩皆六百石景帝中二年更名太守郡尉秦官掌佐守典武職甲卒秩比二千石有丞秩皆六百石景帝中二年更名都尉關都尉秦官農都尉屬國都尉皆武帝初置縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏師古曰吏理也主理其縣内也百石以下有斗食佐史之秩師古曰漢官名秩簿云斗食月俸十一斛佐史月俸八斛也一說斗食者嵗俸不滿百石計日而食一斗二升故云斗食也是為少吏大率十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌敎化嗇夫職聽訟收賦稅游徼徼循禁賊盜縣大率方百里其民稠則減稀則曠鄉亭亦如之皆秦制也列侯所食縣曰國皇太后皇后公主所食曰邑有蠻夷曰道凡縣道國邑千五百八十七鄉六千六百二十二亭二萬九千六百三十五凡吏秩比二千石以上皆銀印青綬師古曰漢舊儀云銀印背龜鈕其文曰章謂刻曰某官之章也光禄大夫無師古曰無印綬秩比六百石以上皆銅印黑綬大夫博士御史謁者郎無師古曰大夫以下亦無印綬其僕射御史治書尚符璽者有印綬比二百石以上皆銅印黄綬師古曰漢舊儀云六百石四百石至二百石以上皆銅印鼻鈕文曰印謂鈕但作鼻不為蟲獸之形而刻文云某官之印成帝陽朔二年除八百石五百石秩綏和}
