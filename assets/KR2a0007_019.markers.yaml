  - {type: variant, offset: 44763, length: 1, content: 虞, WYG: 建六年卒臣召南按六年卒當作十六年卒萬石君以元朔五年沒建哀毁嵗餘亦遂死焉而李廣代建為郎中令两傳可證也宋本監本俱于六年之上脱十字耳且田竇廷辯時建為分别言两人事若建為郎中令僅閲六年安得彼時尚有建在乎元光四年九月中尉張􅇌為御史大夫宣平侯張歐為太常臣召南按張歐與敺字形相近御史大夫是安邱侯悦子即列傳所謂張叔宣平侯則張敖之孫張偃之子也但功臣表哀侯歐以景帝中}
