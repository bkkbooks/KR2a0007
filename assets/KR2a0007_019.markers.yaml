  - {type: variant, offset: 1952, length: 1477, content: 也掌祭火星行火政季春昏心星出東方而咮七星鳥首正在南方則用火季秋星入則止火以順天時救民疾帝嚳則有祝融堯時有閼伯民賴其德死則以為火祖配祭火星故曰或食於心或食於咮也相土商祖契之曾孫代閼伯後主火星宋其後也世司其占故先知火災賢君見變能修道以除凶亂君亡象天不譴告故不可必也三十年五月甲午宋災董仲舒以為伯姬如宋五年宋恭公卒伯姬幽居守節三十餘年又憂傷國家之患禍積陰生陽故火生災也劉向以為先是宋公聽讒而殺太子痤應火不炎上之罰也左氏傳昭公六年六月丙戌鄭災是春三月鄭人鑄刑書士文伯曰火見鄭其火乎火未出而作火以鑄刑器臧爭辟焉火而象之不火何為說曰火星出於周五月而鄭以三月作火鑄鼎刻刑辟書以為民約是為刑器爭辟故火星出與五行之火爭明為災其象然也又棄法律之占也不書於經時不告魯也九年夏四月陳火董仲舒以為陳夏徵舒殺君楚嚴王託欲為陳討賊陳國闢門而待之至因滅陳陳臣子尤毒恨甚極陰生陽故致火災劉向以為先是陳侯弟招殺陳太子偃師皆外事不因其宮館者略之也八年十月壬午楚師滅陳春秋不與蠻夷滅中國故復書陳火也左氏經曰陳災傳曰鄭裨竈曰五年陳將復封封五十二年而遂亡子產問其故對曰陳水屬也火水妃也而楚所相也今火出而火陳逐楚而建陳也妃以五陳景祐殿局本都作成成景祐殿局本都作成故曰五年歲五及鶉火而後陳卒亡楚克有之天之道也說曰顓頊以水王陳其族也今茲歲在星紀後五年在大梁大梁昴也金為水宗得其宗而昌故曰五年陳將復封楚之先為火正故曰楚所相也天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而合而陰陽易位故曰妃以五成然則水之大數六火七木八金九土十故水以天一為火二牡木以天三為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽奇為牡陰耦為妃故曰水火之牡也火水妃也於易坎為水為中男離為火為中女蓋取諸此也自大梁四歲而及鶉火四周四十八歲凡五及鶉火五十二年而陳卒亡火盛水衰故曰天之道也哀公十七年七月己卯楚滅陳昭十八年五月壬午宋衛陳鄭災董仲舒以為象王室將亂天下莫救故災四國言亡四方也又宋衛陳鄭之君皆荒淫於樂不恤國政與周室同行陽失節則火災出是以同日災也劉向以為宋陳王者之後衛鄭周同姓也時周景王老劉子單子事王子猛尹氏召伯毛伯事王子鼂子鼂楚之出也及宋衛陳鄭亦皆外附於楚亡尊周室之心後三年景王崩王室亂故天災四國天戒若曰不救周反從楚廢世子立不正以害王室明同辠也定公二年五月雉門及兩觀災董仲舒劉向以為此皆奢僭過度者也先是季氏逐昭公昭公死于外定公即位既不能誅季氏又用其邪說淫於女樂而退孔子天戒若曰去高顯而奢僭者一曰門闕號令所由出也今舍大聖而縱有辠亡以出號令矣京房易傳曰君不思道厥妖火燒宮哀公三年五月辛卯桓釐宮災董仲舒劉向以為此二宮不當立違禮者也哀公又以季氏之故不用孔子孔子在陳聞魯災曰其桓釐之宮乎以為桓季氏之所出釐使季氏世卿者也四年六月辛丑亳社災董仲舒劉向以為亡國之社所以為戒也天戒若曰國將危亡不用戒矣春秋火災屢於定哀之間不用聖人而縱驕臣將以亡國不明甚也一曰天生孔子非為定哀也蓋失禮不明火災應之自然象也高后元年五月丙申趙叢臺災劉向以為是時呂氏女為趙王后嫉妒將為讒口以害趙王王不寤焉卒見幽殺惠帝四年十月乙亥未央宮凌室災丙子織室災劉向以為元年呂太后殺趙王如意殘戮其母戚夫人是歲十月壬寅太后立帝姊魯元公主女為皇后其乙亥凌室災明日織室災凌室所以供養飲食織室所以奉宗廟衣服與春秋御廩同義天戒若曰皇后亡奉宗廟之德將絕祭祀其後皇后亡子後宮美人有男太后使皇后名之而殺其母惠帝崩嗣子立有怨言太后廢之更立呂氏子弘為少帝賴大臣共誅諸呂而立文帝惠后幽廢文帝七年六月癸酉未央宮東闕罘思災劉向以為東闕所以朝諸侯之門也罘思在其外諸侯之象也漢興大封諸侯王連城數十文, WYG: 髙}
