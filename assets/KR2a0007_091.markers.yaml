  - {type: variant, offset: 4001, length: 6, content: 書請立摎氏女, WYG: 爭王者之利下錮齊民之業師古曰錮亦謂專取之也皆䧟不軌奢僭之惡又况掘冢搏掩犯姦成富師古曰搏掩謂搏撃掩襲取人物者也搏字或作博一説博六博也掩意錢之屬也皆戲而賭取財物曲叔稽發雍樂成之徒師古曰姓曲名叔姓稽名發姓雍名樂成也稽音工奚反猶復齒列師古曰身}
