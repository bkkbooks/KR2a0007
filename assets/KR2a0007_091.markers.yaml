  - {type: variant, offset: 3709, length: 0, content: '', WYG: 贏得過當瘉於孅嗇師古曰瘉讀為愈愈勝也孅細也嗇愛􅈔也言其於利雖不汲汲茍得然所𫉬贏餘多於細􅈔者也孅與纖同下云周人既孅義亦類此家致數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而丙氏尤甚以鐵冶起富至鉅萬然家自父兄子弟約頫有拾卬有取師古曰頫古俯字也俯仰必有所取拾無鉅細好惡也宋祁曰注末也字上當有者字貰貸行賈徧郡國鄒魯以其故多去文學而趨利齊俗賤奴虜而刁閒獨愛貴之師古曰刁姓閒名也刁音貂桀黠奴人之所患唯刁閒收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數千萬故曰寧爵無刁孟康曰刁閒能畜豪奴奴或有連車騎交守相奴自謂寧欲免去作民有爵邪無將止為刁氏作奴乎無發聲助也言能使豪奴自饒而盡其力也刁閒既衰至成哀間臨淄姓偉訾五千萬師古曰姓姓名偉周人既孅而師史尤甚轉轂百數師古曰轉轂謂以車載物而逐利者宋祁曰尤舊本作光姚改作尤賈郡國無所不至雒陽街}
