  - {type: variant, offset: 1701, length: 1201, content: 職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之民聖王不以勞中國宜罷郡放棄其民絕其王侯勿復通如以先帝所立累世之功不可墮壞亦宜因其萌牙早斷絕之及已成形然後戰師則萬姓被害大將軍鳳於是薦金城司馬陳立為牂柯太守立者臨邛人前為連然長不韋令蠻夷畏之及至牂柯諭告夜王興興不從命立請誅之未報乃從吏數十人出行縣至興國且同亭召興興將數千人往至亭從邑君數十人入見立立數責因斷頭邑君曰將軍誅亡狀為民除害願出曉士眾以興頭示之皆釋兵降鉤町王禹漏臥侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使奇兵絕其饟道縱反間以誘其眾都尉萬年曰兵久不決費不可共引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絕其水道蠻夷共斬翁指持首出降立已平定西夷微詣京師會巴郡有盜賊復以立為巴郡太守秩中二千石居賜爵左庶長徙為天水太守勸民農桑為天下最賜金四十斤入為左曹衛將軍護軍都尉卒官王莽篡位改漢制貶鉤町王以為侯王邯怨恨牂柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邊蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之更遣寧始將軍廉丹與庸部牧史熊大發天水隴西騎士廣漢巴蜀犍為吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒飢疫三歲餘死者數萬而粵巂蠻夷任貴亦殺太守枚根自立為邛穀王會莽敗漢興誅貴復舊號云南粵王趙佗真定人也秦并天下略定揚粵置桂林南海象郡以適徙民與粵雜處十三歲至二世時南海尉任囂病且死召龍川令趙佗語曰聞陳勝等作亂豪桀叛秦相立南海辟遠恐盜兵侵此吾欲興兵絕新道自備待諸侯變會疾甚且番禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國郡中長吏亡足與謀者故召公告之即被佗書行南海尉事囂死佗即移檄告橫浦陽山湟谿關曰盜兵且至急絕道聚兵自守因稍以法誅秦所置吏以其黨為守假秦已滅佗即擊并桂林象郡自立為南粵武王高帝已定天下為中國勞苦故釋佗不誅十一年遣陸賈立佗為南粵王與剖符通使使和輯百粵毋為南邊害與長沙接境高后時有司請禁粵關市鐵器佗曰高皇帝立我通使物今高后聽讒臣別異蠻夷鬲絕器物此必長沙王計欲倚中國擊滅南海并王之自為功也於是佗乃自尊號為南武帝發兵攻長沙邊敗數縣焉高后遣將軍隆慮侯竈擊之會暑溼士卒大疫兵不能隃領歲餘高后崩即罷兵佗因此以兵威財物賂遺閩粵西甌駱役屬焉東西萬餘里乃乘黃屋左纛稱制與中國侔文帝元年初鎮撫天下使告諸侯四夷從代來即位意諭盛德焉乃為佗親冢在真定置守邑歲時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粵者平言陸賈先帝時使粵上召賈為太中大夫謁者一人為副使賜佗書曰皇帝謹問南粵王甚苦心勞意朕高皇帝側室之子棄外奉北藩于代道里遼遠壅蔽樸愚未嘗致書高皇帝棄群臣孝惠皇帝即世高后自臨事不幸有疾日進不衰以故誖暴乎治諸呂為變故亂法不能獨制乃取它姓子為孝惠皇帝嗣賴宗廟之靈功臣之, WYG: 智}
