  - {type: variant, offset: 4225, length: 250, content: 中尉太傅印餘得自置除其故黥劓刑用漢法諸使者皆留填撫之王王太后飭治行裝重資為入朝具相呂嘉年長矣相三王宗族官貴為長吏七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連其居國中甚重粵人信之多為耳目者得眾心愈於王王之上書數諫止王王不聽有畔心數稱病不見漢使者使者注意嘉勢未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等置酒請使者大臣皆侍坐飲嘉弟為將將卒居宮外酒行太后謂嘉南粵內屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發嘉見耳目非是即趨出太后怒欲鏦嘉以矛王止太后嘉遂出介弟兵就舍稱病不肯見王及使者乃陰謀, WYG: 記}
