  - {type: variant, offset: 3617, length: 1, content: 陛, WYG: 俗猶有大量糵麴鹽豉千合師古曰麴糵以斤石稱之輕重齊則為合鹽豉則斗斛量之多少等亦為合合者相配偶之言耳今西楚荆沔之俗賣鹽豉者鹽豉各一升則各為裹而相随焉此則合也説者不曉廼讀為升合之合又改作台競為解説失之逺矣鮐鮆千斤師古曰鮐海魚也鮆刀魚也飲而不食者鮐音胎又音菭鮆音薺又音才爾反而説者妄讀鮐為夷非惟失於訓物亦不知音矣鮿鮑千鈞師古曰鮿膊魚也即今不著鹽而乾者也鮑今之䱒魚也鮿音輒膊音普各反䱒音於業反而説者乃讀鮑為鮠魚之鮠音五回反失義逺矣鄭康成以為䱒於煏室乾之亦非也煏室乾之即鮿耳蓋今巴荆人所呼鰎魚者是也音居偃反秦始皇載鮑亂臭則是䱒魚耳而煏室乾者本不臭也煏音蒲北反棗栗千石者三之師古曰三千石狐貂裘千皮羔羊裘千石師古曰狐貂貴故計其數羔羊賤故稱其量也旃席千具它果采千種師古曰果采謂於山野采取果實也子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其餘利比於千乗之家也師古曰儈者合㑹二家交易者也駔者其首率也駔音子朗反儈音工外反貪賈三之廉賈五之孟康曰貪賈未當賣而賣未當買而買故得利少而十得其三廉賈貴乃賣賤乃買故十得五也劉敞曰貪賈務賒貸仍取厚利常多亡失故三之廉賈取之約未嘗亡失故五之劉奉世曰此謂子貸取息也貪賈取利多故三分取息一分廉賈則五分取一耳所謂歲萬息二千也亦比千乗之家此其大率也蜀卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦行師古曰歩車曰輦諸遷虜少有餘財爭與吏求近處處葭萌師古曰縣名地理志屬廣漢葭音家惟卓氏曰此地陿薄吾聞㟭山之}
