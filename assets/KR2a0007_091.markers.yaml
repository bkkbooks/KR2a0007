  - {type: variant, offset: 3615, length: 0, content: '', WYG: 之制列侯封君食租稅歲率戸二百千戸之君則二十萬朝覲聘享出其中庶民農工商賈率亦歲萬息二千百萬之家即二十萬而更繇租賦出其中師古曰更音工衡反繇讀曰徭衣食好美矣故曰陸地牧馬二百蹏孟康曰五十匹也師古曰蹏古蹄字牛千蹏角孟康曰百六十七頭也馬貴而牛賤以此為率也師古曰百六十七頭牛則為蹄與角凡一千二也言千者舉成數也宋祁曰牛千蹏角越本作牛蹏角千千足羊師古曰凡言千足者二百五十頭也澤中千足彘水居千石魚波師古曰波讀曰陂言有大陂飬魚一歲收千石魚也説者不曉乃改其波字為皮又讀為披皆失之矣山居千章之萩孟康曰萩任方章者千枚也師古曰大材曰章解在百官公卿表萩即楸樹字也其下並同也宋祁曰注文浙本百官公卿表句下有萩不在山明矣六字刪樹字兩也字安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北滎南河濟之間千樹萩師古曰滎亦水名濟水所溢作也即今所謂滎澤也陳夏千畝桼師古曰陳陳縣也夏夏縣也皆屬淮陽種桼樹而取其汁夏音嘏齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田孟康曰一鍾受六斛四斗師古曰一畝收鍾者凡千畝也宋祁曰注文師古曰下當有言字若千畝巵茜孟康曰茜草巵子可用染也師古曰茜音千見反千畦薑韭師古曰畦音􅂝此其人皆與千户侯等諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也師古曰言其易以得利也通邑大都酤一歲千釀師古曰千瓮以釀酒醯醬千瓨師古曰瓨長頭甖也受十升瓨音胡􅀟反宋祁曰注文中頭字當作頸字升字當作斗字􅀟字當作江字漿千儋孟康曰儋甖也師古曰儋人儋之也一儋兩甖儋音丁濫反屠牛羊彘千皮榖糴千鐘師古曰謂常糴取而居之薪槀千車舡長千丈師古曰總積舡之丈數也木千章竹竿萬个孟康曰个者一个兩个師古曰个讀曰箇箇枚也宋祁白注文師字上當有也字軺車百乗師古曰軺車輕小之車也軺音弋昭反牛車千兩師古曰車一乗曰一兩謂之兩者言其轅輪兩兩而耦木器桼者千枚銅器千鈞孟康曰三十斤為一鈞素木鐵器若巵茜千石孟康曰百二十斤為石素木素器也馬蹏噭千師古曰噭口也蹄與口共千則為馬二百也噭音江釣反又音口釣反牛千足羊彘千雙師古曰彘即豕童手指千孟康曰童奴婢也古者無空手游口皆有作務作務須手指故曰手指以别馬牛蹏角也師古曰手指謂有巧技者指千則人百筋角丹砂千斤其帛絮細布千鈞文采千匹師古曰文文繒也帛之有色者曰采荅布皮革千石孟康曰荅布白疊也師古曰麤厚之布也其價賤故與皮革同其量耳非白疊也荅者厚重之貌而讀者妄為搨音非也桼千大斗師古曰大斗者異於量米粟之斗}
