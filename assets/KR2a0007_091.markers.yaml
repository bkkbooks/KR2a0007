  - {type: variant, offset: 3613, length: 0, content: '', krp: 雜處師古曰管仲之書也士相與言仁誼於間宴師古曰間讀曰閑工相與議技巧於官府商相與語財利於市井師古曰凡言市井者市交易之處井共汲之所故總而言之也説者云因井而為市其義非也農相與謀稼穡於田壄朝夕從}
  - {type: variant, offset: 3614, length: 0, content: '', WYG: 不見異物而遷焉師古曰言非其本業則弗觀視故能各精其事不移易宋祁曰注末疑有也字故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見竒麗紛華非其所習辟猶戎翟之與于越不相入矣孟康曰于越南方越名也師古曰于發語聲也戎蠻之語則然于越猶句呉耳辟讀曰譬是以欲寡而事節財足而不爭於是在民上者道之以徳師古曰道讀曰導齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大畧也師古曰直道而行謂以徳禮率下不飾偽也及周室衰禮法墮師古曰墮毁也音火規反諸侯刻桷丹楹大夫山節藻棁師古曰桷椽也楹柱也節栭也山刻為山形也棁侏儒柱也藻謂刻鏤為水藻之文也刻桷丹楹魯桓宫也山節藻棁臧文仲也宋祁曰注文椽字疑作欀八佾舞於庭雍徹於堂師古曰八佾舞於庭謂季氏也以雍樂徹食三家則然事見論語其流至於士庶人莫不離制而棄本稼穡之民少商旅之民多榖不足而貸有餘陵夷至乎桓文之後師古曰齊桓晉文也禮誼大壞上下相冒國異政家殊俗耆欲不制僭差亡極師古曰耆讀曰嗜其下並同極止也於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資師古曰追逐也偽民背實而要名姦夫犯害而求利簒弑取國者為王公圉奪成家者為雄桀師古曰圉謂禁守其人也劉敞曰圉讀如禦人於國門之禦禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者裋褐不完唅菽飲水師古曰裋布長襦也褐編枲衣也裋音豎唅亦含字也菽豆也其為編戸齊民同列而以財力相君雖為僕虜猶亡愠色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於饑寒之患其教自上興繇法度之無限也師古曰繇讀與由同故列其行事以傳世變云昔粤王句踐困於㑹稽之上廼用范蠡計然孟康曰姓計名然越臣也蔡謨曰計然者范蠡所著書篇名耳非人也謂之計然者所計而然也羣書所稱句踐之賢佐種蠡為首豈聞復有姓計名然者乎若有此人越但用半䇿便以致霸是功重於范蠡蠡之師也焉有如此而越國不記其事書籍不見其名史遷不述其傳乎師古曰蔡説謬矣據古今人表計然列在第四等豈是范蠡書篇乎計然一號計研故戲賔曰研桑心計於無垠即謂此耳計然者濮上人也博學無所不通尤善計筭嘗南遊越范蠡卑身事之其書則有萬物録著五方所出皆直述之事見皇覽及晉中經簿又呉越春秋及越絶書並作計倪此則倪研及然聲皆相近實一人耳何云書籍不見哉宋祁曰注文故戲賔當作故荅賔戲計然曰知鬭則脩偹時用則知物二者形則萬貨之情可得見矣師古曰形顯見故旱則資舟水則資車物之理也師古曰旱極則水水極則旱故於旱時而預蓄舟水時預蓄車以待其貴收其利也推此類而脩之十年國富厚賂戰士遂報彊呉刷㑹稽之恥師古曰刷謂拭除之也音所劣反范蠡歎曰計然之䇿十用其五而得意既以施國吾欲施之家廼乗扁舟孟康曰特舟也師古曰音匹延反浮江湖變姓名適齊為鴟夷子皮師古曰自號鴟夷者言若盛酒之鴟夷多所容受而可卷懷與時張弛也鴟夷皮之所為故曰子皮之陶為朱公孟康曰陶即今定陶也以為陶天下之中諸侯四通貨物所交易也廼治産積居與時逐孟康曰逐時而居買也師古曰此説非也言豫居貨物與時而逐利而不責於人劉攽曰與時逐宜屬下句治産治凡可以生息者積居積貯成物居停之與時逐而不責於人言此兩事自與天時馳逐無求責於人也故善治産者能擇人而任時十九年之間三致千金而再散分與貧友昆弟後年衰老聽子孫脩業而息之師古曰息生也遂至鉅萬故言富者稱陶朱子贛既學於仲尼退而仕衛師古曰孔子弟子姓端木名賜也發貯鬻財曹魯之間師古曰多有積貯趣時而發鬻賣之也鬻音弋六反七十子之徒賜􅇰為饒師古曰言於弟子之中􅇰為富而顔淵簞食瓢飲在於陋巷師古曰簞笥也食飯也瓢瓠勺也一簞之飯一瓢之飲至貧也簞音丁安反食音似瓢音頻遥反宋祁曰注文至字上當有言字子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之亢禮師古曰為賔主之禮然孔子賢顔淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中師古曰論語載孔子之言也顔回庶幾聖道雖數空匱而樂在其中子贛不受教命惟財是殖億度是非幸而中耳意讀曰億中音竹仲反白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我予能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生猶伊尹吕尚之謀孫呉用兵商鞅行法是也故智不足與權變勇不足以決斷仁不足以取予彊不能以有守雖欲學吾術終不告也蓋天下言治生者祖白圭師古曰祖始也以其法為本始也猗頓用盬鹽起師古曰猗頓魯之窮士也盬鹽池也於盬造鹽故曰盬鹽盬音古邯鄲郭縱以鑄冶成業與王者埓富師古曰埓等也烏氏蠃畜牧師古曰氏音支烏氏姓也嬴名也其人為畜牧之業也及衆斥賣師古曰畜牧蕃盛其數多則出而賣之也求竒繒物間獻戎王師古曰避時之禁故伺間隙私遺戎王戎王十倍其償宋祁曰償字上當有價字予畜畜至用谷量牛馬師古曰言其數饒不可計筭故以山谷多少言之秦始皇令蠃比封君以時與列臣朝請師古曰與讀曰豫請音才姓反巴寡婦清師古曰以其行絜故號曰清也其先得丹穴而擅其利數世師古曰丹丹砂也穴者山谷之穴出丹也家亦不訾師古曰言資財衆多無限數訾音子移反清寡婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺秦}
