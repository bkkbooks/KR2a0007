  - {type: variant, offset: 675, length: 917, content: 上患之使公孫弘往視問焉還報言其不便及弘為御史大夫時方築朔方據河逐胡弘等因言西南夷為害可且罷專力事匈奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就及元狩元年博望侯張騫言使大夏時見蜀布邛竹杖問所從來曰從東南身毒國可數千里得蜀賈人市或聞邛西可二千里有身毒國騫因盛言大夏在漢西南慕中國患匈奴隔其道誠通蜀身毒國道便近又亡害於是天子乃令王然于柏始昌呂越人等十餘輩間出西南夷指求身毒國至滇滇王當羌乃留為求道四歲餘皆閉昆明莫能通滇王與漢使言漢孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南粵反上使馳義侯因犍為發南夷兵且蘭君恐遠行旁國虜其老弱乃與其眾反殺使者及犍為太守漢乃發巴蜀罪人當擊南粵者八校尉擊之會越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭斬首數萬遂平南夷為牂柯郡夜郎侯始倚南粵南粵已滅還誅反者夜郎遂入朝上以為夜郎王南粵破後及漢誅且蘭邛君并殺莋侯冉駹皆震恐請臣置吏以邛都為粵巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粵破及誅南夷兵威風諭滇王入朝滇王者其眾數萬人其旁東北勞深靡莫皆同姓相杖未肯聽勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷滇舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後二十三歲孝昭始元元年益州廉頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反遣水衡都尉發蜀郡犍為犇命萬餘人擊牂柯大破之後三歲姑繒葉榆復反遣水衡都尉呂辟胡將郡兵擊之辟胡不進蠻夷遂殺益州太守乘勝與辟胡戰士戰及溺死者四千餘人明年復遣軍正王平與大鴻臚田廣明等並進大破益州斬首捕虜五萬餘級獲畜產十餘萬上曰鉤町侯亡波率其邑君長人民擊反者斬首捕虜有功其立亡波為鉤町王大鴻臚廣明賜爵關內侯食邑三百戶後間歲武都氐人反遣執金吾馬適建龍頟侯韓增與大鴻臚廣明將兵擊之至成帝河平中夜郎王興與鉤町王禹漏臥侯俞更舉兵相攻牂柯太守請發兵誅興等議者以為道遠不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽說大將軍王鳳曰太中大夫匡使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者選耎復守和解太守察動靜有變乃以聞, WYG: 用}
