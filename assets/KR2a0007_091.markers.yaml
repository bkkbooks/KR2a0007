  - {type: variant, offset: 393, length: 281, content: 以行船南粵以財物役屬夜郎西至桐師然亦不能臣使也蒙乃上書說上曰南粵王黃屋左纛地東西萬餘里名為外臣實一州主今以長沙豫章往水道多絕難行竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粵一奇也誠以漢之強巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙以郎中將將千人食重萬餘人從巴苻關入遂見夜郎侯多同厚賜諭以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報乃以為犍為郡發巴蜀卒治道自僰道指牂柯江蜀人司馬相如亦言西夷邛莋可置郡使相如以郎中將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相饟數歲道不通士罷餓餧離暑溼死者甚眾西南夷又數反發兵興擊耗費亡, WYG: ''}
