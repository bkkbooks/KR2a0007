  - {type: variant, offset: 11, length: 0, content: '', WYG: 一昔先王之制自天子公侯卿大夫士至於皁𨽻抱關擊橛者師古曰皁飬馬者也𨽻之言著也屬著於人也抱關守門者也擊橛守夜擊木以警衆也橛音吐各反其爵祿奉飬宫室車服棺槨祭祀死生之制各有差品小不得僭大賤不得踰貴夫然故上下序而民志定於是辯其土地川澤邱陵衍沃原隰之宜師古曰衍謂地平衍者也沃水之所灌沃也廣平曰原下溼曰隰宋祁曰注文地字下疑有形字下沃疑作浸教民樹種畜飬師古曰樹殖也}
