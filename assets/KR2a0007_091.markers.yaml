  - {type: variant, offset: 4997, length: 192, content: 挫粵鋒以粵數萬人待伏波將軍伏波將軍將罪人道遠後期與樓船會乃有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面會暮樓船攻敗粵人縱火燒城粵素聞伏波莫不知其兵多少伏波乃為營遣使招降者賜印綬復縱令相招樓船力攻燒敵反敺而入伏波營中遲旦城中皆降伏波呂嘉建德以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇弘得建德為海常侯粵郎都稽得嘉為臨蔡侯蒼梧王趙光與粵王同姓聞, WYG: ''}
