  - {type: variant, offset: 5315, length: 2266, content: 三歲而亡閩粵王無諸及粵東海王搖其先皆粵王句踐之後也姓騶氏秦并天下廢為君長以其地為閩中郡及諸侯畔秦無諸搖率粵歸番陽令吳芮所謂番君者也從諸侯滅秦當是時項羽主命不王也以故不佐楚漢擊項籍無諸搖帥粵人佐漢漢五年復立無諸為閩粵王王閩中故地都冶孝惠三年舉高帝時粵功曰閩君搖功多其民便附乃立搖為東海王都東甌世號曰東甌王后數世孝景三年吳王濞反欲從閩粵閩粵未肯行獨東甌從及吳破東甌受漢購殺吳王丹徒以故得不誅吳王子駒亡走閩粵怨東甌殺其父常勸閩粵擊東甌建元三年閩粵發兵圍東甌東甌使人告急天子天子問太尉田蚡蚡對曰粵人相攻擊固其常不足以煩中國往救也中大夫嚴助詰蚡言當救天子遣助發會稽郡兵浮海救之語具在助傳漢兵未至閩粵引兵去東粵請舉國徙中國乃悉與眾處江淮之間六年閩粵擊南粵南粵守天子約不敢擅發兵而以聞上遣大行王恢出豫章大司農韓安國出會稽皆為將軍兵未隃領閩粵王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵眾強即幸勝之後來益多滅國乃止今殺王以謝天子天子罷兵固國完不聽乃力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉乃以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵曰郢等首惡獨無諸孫繇君丑不與謀乃使郎中將立丑為粵繇王奉閩粵祭祀餘善以殺郢威行國中民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粵王與繇王並處至元鼎五年南粵反餘善上書請以卒八千從樓船擊呂嘉等兵至揭陽以海風波為解不行持兩端陰使南粵及漢破番禺樓船將軍僕上書願請引兵擊東粵上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命明年秋餘善聞樓船請誅之漢兵留境且往乃遂發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒將屯不敢擊卻就便處皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言上遣橫海將軍韓說出句章浮海從東方往樓船將軍僕出武林中尉王溫舒出梅領粵侯為戈船下瀨將軍出如邪白沙元封元年冬咸入東粵東粵素發兵距嶮使徇北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬徇北將軍為語兒侯自兵未往故粵衍侯吳陽前在漢漢使歸諭餘善不聽及橫海軍至陽以其邑七百人反攻粵軍於漢陽及故粵建成侯敖與繇王居股謀俱殺餘善以其眾降橫海軍封居股為東成侯萬戶封敖為開陵侯封陽為卯石侯橫海將軍說為按道侯橫海校尉福為繚嫈侯福者城陽王子故為海常侯坐法失爵從軍亡功以宗室故侯及東粵將多軍漢兵至棄軍降封為無錫侯故甌駱將左黃同斬西于王封為下鄜侯於是天子曰東粵陿多阻閩粵悍數反覆詔軍吏皆將其民徙處江淮之間東粵地遂虛朝鮮王滿燕人自始燕時嘗略屬真番朝鮮為置吏築障秦滅燕屬遼東外徼漢興為遠難守復修遼東故塞至浿水為界屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人椎結蠻夷服而東走出塞度浿水居秦故空地上下障稍伇屬真番朝鮮蠻夷及故燕齊亡在者王之都王險會孝惠高后天下初定遼東太守即約滿為外臣保塞外蠻夷毋使盜邊蠻夷君長欲入見天子勿得禁止以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真番辰國欲上書見天子又雍閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔何去至界臨浿水使馭刺殺送何者朝鮮裨王長即渡水馳入塞遂歸報天子曰殺朝鮮將上為其名美弗詰拜何為遼東東部都尉朝鮮怨何發兵攻襲殺何天子募罪人繫朝鮮其秋遣樓船將軍楊僕從齊浮勃海兵五萬左將軍荀彘出遼東誅右渠右渠發兵距險左將軍卒多率遼東士兵先縱敗散多還走坐法斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其眾遁山中十餘日稍求收散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝願降恐將詐殺臣今見信節請服降遣太子入謝獻馬五千匹及餽軍糧人眾萬餘持兵方度浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐之遂不度浿水復引歸山報天子誅山左將軍破浿水上軍乃前至城下圍其西北樓船亦往會居城南右渠遂堅城守數月未能下左將軍素侍中幸將燕代卒悍乘勝軍多驕樓船將齊卒入海已多敗亡其先與右渠戰困辱亡卒卒皆恐將心慚其圍右渠常持和節左將軍急擊之朝鮮大臣乃陰間使人私約樓船往來言尚未肯決左將軍數與樓船期戰樓船欲就其約不會左將軍亦使人求間隙降下朝鮮不肯心附樓船以故兩將不相得左將軍心意樓船前有失軍罪今與朝鮮和善而又不降疑其有反計未敢發天子曰將率不能前乃使衛山諭降右渠不能顓決與左將軍相誤卒沮約今兩將圍城又乖異以故久不決使故濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不會具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縛樓船將軍并其軍以報天子誅遂左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓陶尼谿相參將軍王唊相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與王又不肯降陶唊路人皆亡降漢路人道死元封三年夏尼谿相參乃使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成已故遂定朝鮮為真番臨屯樂浪玄菟四郡封參為澅清侯陶為秋苴侯唊為平州侯長為幾侯最以父死頗有功為沮陽侯左將軍徵至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍擅先縱失亡多當誅贖為庶人贊曰楚粵之先歷世有土及周之衰楚地方五千里而句踐亦以粵伯秦滅諸侯唯楚尚有滇王漢誅西南夷獨滇復寵及東粵滅國遷眾繇王居股等猶為萬戶侯三方之開皆自好事之臣故西南夷發於唐蒙司馬相如兩粵起嚴助朱買臣朝鮮由涉何遭世富盛動能成功然已勤矣追觀太宗填撫尉佗豈古所謂招攜以禮懷遠以德者哉, WYG: 一考證}
