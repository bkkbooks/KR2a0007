  - {type: variant, offset: 3619, length: 1, content: 幸, WYG: 沃壄下有踆鴟至死不饑孟康曰踆音蹲水鄉多鴟其山下有沃野灌溉師古曰孟説非也踆鴟謂芋也其根可食以充糧故無饑年華陽國志曰汶山郡都安縣有大芋如蹲鴟也民工作布易賈乃求逺遷致之臨卭大憙即鐵山鼓鑄師古曰即就也運籌筭賈滇蜀民師古曰行販賣於滇蜀之間也滇音丁賢反富至童八百人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈魋結民富埓卓氏師古曰魋結西南夷也言程鄭行賈求利於其人也埓等也魋音直追反結讀曰髻程卓既衰至成}
