  - {type: variant, offset: 4575, length: 303, content: 相韓千秋奮曰以區區粵又有王應獨呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂將二千人往入粵境呂嘉乃遂反下令國中曰王年少太后中國人又與使者亂專欲內屬盡持先王寶入獻天子以自媚多從人行至長安虜賣以為僮取自脫一時利亡顧趙氏社稷為萬世慮之意乃與其弟將卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粵妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粵直開道給食未至番禺四十里粵以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠封其子延年為成安侯摎樂其姊為王太后首願屬漢封其子廣德為龒侯乃赦天下曰天子微弱諸侯力政譏臣不討賊呂嘉建德等反自立晏如令粵人及江淮, WYG: 常山}
  - {type: variant, offset: 4575, length: 303, content: 相韓千秋奮曰以區區粵又有王應獨呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂將二千人往入粵境呂嘉乃遂反下令國中曰王年少太后中國人又與使者亂專欲內屬盡持先王寶入獻天子以自媚多從人行至長安虜賣以為僮取自脫一時利亡顧趙氏社稷為萬世慮之意乃與其弟將卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粵妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粵直開道給食未至番禺四十里粵以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠封其子延年為成安侯摎樂其姊為王太后首願屬漢封其子廣德為龒侯乃赦天下曰天子微弱諸侯力政譏臣不討賊呂嘉建德等反自立晏如令粵人及江淮, krp: 常山}
