  - {type: variant, offset: 3993, length: 7, content: 女生子興及即位, WYG: 以賣醬而隃侈質氏以洒削而鼎食服䖍曰治刀劍者也如淳曰作刀劍削者師古曰二説皆非也洒濯也削謂刀劍室也謂人有刀劍削故惡者主為洒刷之去其垢穢更飾令新也洒音先禮反削音先召反濁氏以胃脯而連騎晉灼曰今太官常以十月作沸湯燖羊胃以末椒薑坋之暴使燥是也師古曰燖音似廉反坋音蒲頓反張里以馬醫而撃鍾皆越法矣然常循守事業積累贏利漸有所起至於蜀卓宛孔齊之刁間公擅山川銅鐵魚鹽市井之入運其籌䇿}
