  - {type: variant, offset: 2903, length: 680, content: 誅之已畢朕以王侯吏不釋之故不得不立今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問脩治先人冢前日聞王發兵於邊為寇災不止當其時長沙苦之南邵尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰高皇帝所以介長沙土也朕不得擅變焉吏曰得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患終今以來通使如故故使賈馳諭告王朕意王亦受之毋為寇災矣上褚五十衣中褚三十衣下褚二十衣遺王願王聽樂娛憂存問鄰國陸賈至南粵王恐乃頓首謝願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故粵吏也高皇帝幸賜臣佗璽以為南粵王使為外臣時內貢職孝惠皇帝即位義不忍絕所以賜老夫者厚甚高后自臨用事近細士信讒臣別異蠻夷出令曰毋予蠻夷外粵金鐵田器馬牛羊即予予牡毋與牝老夫處辟馬牛羊齒已長自以祭祀不脩有死罪使內史藩中尉高御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論吏相與議曰今內不得振於漢外亡以自高異故更號為帝自帝其國非敢有害於天下也高皇后聞之大怒削去南粵之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑溼蠻夷中西有西甌其眾半羸南面稱王東有閩粵其眾數千人亦稱王西北有長沙其半蠻夷亦稱王老夫故敢妄竊帝號聊以自娛老夫身定百邑之地東西南北數千萬里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粵四十九年于今抱孫焉然, WYG: ''}
