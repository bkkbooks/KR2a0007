  - {type: variant, offset: 3987, length: 1, content: 時, WYG: 中列侯封君行從軍旅齎貣子錢家師古曰行者須齎糧而出於子錢家貣之也貣謂求假之也音吐得反子錢家以為關東成敗未决莫肯予唯母鹽氏出捐千金貸師古曰貸謂假與之音吐戴反其息十之三月呉楚平一歲之中則母鹽氏息十倍用此富關中關中富商大賈大氐盡諸田師古曰氐讀曰抵抵歸也田牆田蘭韋家栗氏安陵杜氏亦鉅萬前富者既衰自元成訖王莽京師富人杜陵樊嘉茂陵摯網平陵如氏苴氏長安丹王君房豉樊少翁王孫大卿為天下髙訾師古曰王君房賣丹樊少翁及王孫大卿賣豉亦致髙訾訾讀與資同髙訾謂多資財樊嘉五千萬其餘皆鉅萬矣王孫卿以財飬士與雄傑交王莽以為京司市師漢司東市令也此其章章尤著者也其餘郡國富民兼業顓利師古曰顓與專同以貨賂自行}
