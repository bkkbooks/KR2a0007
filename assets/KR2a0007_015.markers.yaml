  - {type: variant, offset: 5833, length: 1289, content: 便民者也孔子曰如有王者必世而後仁善人為國百年可以勝殘去殺矣言聖王承衰撥亂而起被民以德教變而化之必世然後仁道成焉至於善人不入於室然猶百年勝殘去殺矣此為國者之程式也今漢道至盛歷世二百餘載考自昭宣元成哀平六世之間斷獄殊死率歲千餘口而一人耐罪上至右止三倍有餘古人有言滿堂而飲酒有一人鄉隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其冤死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不明民多貧窮豪桀務私姦不輒行獄豻不平之所致也書云伯夷降典悊民惟刑言制禮以止刑猶隄之防溢水也今隄防凌遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪桀擅私為之囊橐姦有所隱則狃而寖廣此刑之所以蕃也孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣凡此五疾獄刑所以尤多者也自建武永平民亦新免兵革之禍人有樂生之慮與高惠之間同而政在抑彊扶弱朝無威福之臣邑無豪桀之俠以口率計斷獄少於成哀之間什八可謂清矣然而未能稱意比隆於古者以其疾未盡除而刑本不正善乎孫卿之論刑也曰世俗之為說者以為治古者無肉刑有象刑墨黥之屬菲履赭衣而不純是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡且懲其末錢大昭說荀子作未按殿本作未未錢大昭說荀子作未按殿本作未也殺人者不死傷人者不刑是惠暴而寬惡也故象刑非生於於字據景祐殿本補治古方起於亂今也凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也德不稱位能不稱官賞不當功刑不當罪不祥莫大矣錢大昭說矣字衍按殿本無焉夫征暴誅悖治之威也殺人者死傷人者刑是百王之所同也未有知其所由來者也故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書云刑罰世重世輕此之謂也所謂象刑惟明者言象天道而作刑安有菲屨赭衣者哉孫卿之言既然又因俗說而論之曰禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極敝之流俗已薄於三代而行堯舜之刑是猶以鞿而御駻突違救時之宜矣且除肉刑者本欲以全民也今去髡鉗一等轉而入於大辟以死罔民失本惠矣故死者歲以萬數刑重之所致也至乎穿窬之盜忿怒傷人男女淫佚吏為姦臧若此之惡髡鉗之罰又不足以懲也故刑者歲十萬數民既不畏又曾不恥刑輕之所生也故俗之能吏公以殺盜為威專殺者勝任奉法者不治亂名傷制不可勝條是以罔密而姦不塞刑蕃而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也豈宜惟思所以清原正本之論刪定律令籑二百章以應大辟其餘罪次於古當生今觸死者皆可募行肉刑乃傷人與盜吏受賕枉法男女淫亂皆復古刑為三千章詆欺文致微細之法悉蠲除如此則刑可畏而禁易避吏不專殺法無二門輕重當罪民命得全合刑罰之中殷天人之和順稽古之制成時雍之化成康刑錯雖未可致孝文斷獄庶幾可及詩云宜民宜人受祿于天書曰立功立事可以永年言為政而宜於民者功成事立則受天祿而永年命所謂一人有慶萬民賴, WYG: 誤留}
