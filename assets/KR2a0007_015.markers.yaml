  - {type: variant, offset: 3697, length: 742, content: 刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免具為令丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂當黥者髡鉗為城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市罪人獄已決完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人隸臣妾滿二歲為司寇司寇一歲及作如司寇二歲皆免為庶人其亡逃及有罪耐以上不用此令前令之刑城旦舂歲而非禁錮者如完為城旦舂歲數以免臣昧死請制曰可是後外有輕刑之名內實殺人斬右止者又當死斬左止者笞五百當劓者笞三百率多死景帝元年下詔曰加笞與重罪無異幸而不死不可為人其定律笞五百曰三百笞三百曰二百猶尚不全至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀毋得更人畢一罪乃更人自是笞者得全然酷吏猶以為威死刑既重而生刑又輕民易犯之及至孝武即位外事四夷之功內盛耳目之好徵發煩數百姓貧耗窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後姦猾巧法轉相比況禁罔寖密律令凡三百五十九章大辟四百九條千八百八十二事死罪決事比萬三千四百七十二事文書盈於几閣典者不能徧睹是以郡國承用者駮或罪同而論異姦吏因緣為市所欲活則傅生議所欲陷則予死比議者咸冤傷之宣帝自在閭閻而知其若此及即尊位廷史路溫舒上疏言秦有十失其一尚存治獄之吏是也語在溫舒傳上深愍焉乃下詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮父, WYG: ''}
