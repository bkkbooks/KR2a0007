  - {type: variant, offset: 41, length: 672, content: 避利害無毛羽以禦寒暑必將役物以為養任智而不恃力此其所以為貴也故不仁愛則不能群不能群則不勝物不勝物則養不足群而不足爭心將作上聖卓然先行敬讓博愛之德者眾心說而從之從之成群是為君矣歸而往之是為王矣洪範曰天子作民父母為天下王聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威也聖人既躬明悊之性必通天地之心制禮作教立法設刑動緣民情而則天象地故曰先王立禮則天之明因地之性也刑罰威獄以類天之震曜殺戮也溫慈惠和以效天之生殖長育也書云天秩有禮天討有罪故聖人因天秩而制五禮因天討而作五刑大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭扑大者陳諸原野小者致之市朝其所繇來者上矣自黃帝有涿鹿之戰以定火災顓頊有共工之陳以定水害唐虞之際至治之極猶流共工放讙兜竄三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下既定戢臧干戈教以文德而猶立司馬之官設六軍之眾因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有租王鳴盛說下文即云稅以足食賦以足兵證之顏注則合作有稅有賦按景祐殿本都作有賦賦王鳴盛說下文即云稅以足食賦以足兵證之顏注則合作有稅有賦按景祐殿本都作有賦稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法一同百里提封萬井除山川沈斥城池邑居園囿術路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此, WYG: ''}
