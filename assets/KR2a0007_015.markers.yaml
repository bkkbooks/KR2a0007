  - {type: variant, offset: 3583, length: 2, content: 虞氏, WYG: 明徳故天祚}
  - {type: variant, offset: 3583, length: 2, content: 虞氏, krp: 明徳故天祚}
  - {type: variant, offset: 3586, length: 0, content: '', WYG: 子孫嫡者為天子支庶為諸侯皆不絶也信矣哉師古曰侯所食邑皆書其郡縣於下其有不書者史失之也或但言某人嗣及直書薨不具年月皆闕文也右髙后右孝文右孝景右孝武前漢書卷十五上前漢書卷十五上考證王子侯表上徳哀侯廣以兄子封七年八月薨監本作十年薨凡數目字監本多舛今並以宋本是正句容哀侯黨自注㑹稽臣召南按表下注某地指侯國所在也此文可疑句容縣屬丹陽㑹稽但有句章無句容也陸城侯貞中山靖王子臣召南按此侯即昭烈帝之祖蜀志曰先主涿郡涿縣人漢景帝子中山靖王勝之後勝子貞元狩六年封􅃰縣陸城亭侯坐酎金失侯因家焉按貞封于元朔二年不封於元狩六年也蜀志誤耳薪處侯嘉按薪處應作新處縣屬中山宋本亦誤又陸地侯下自注作辛處亦誤也畢梁侯監本作卑梁今從宋本改正隂安哀侯秦容宋本作秦客舊監本作秦容荼陵節侯訢注師古曰荼音􅂗臣召南按地里志長沙國荼陵師古注荼音弋奢反此侯以長沙王子封長沙屬邑當即此縣師古乃别音塗豈因班自注云桂陽而疑别有一荼陵乎舂陵節侯買長沙定王子臣召南按此侯即光武帝之祖光武其元孫也舂陵本屬零陵元帝}
