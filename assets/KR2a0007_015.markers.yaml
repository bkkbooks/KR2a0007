  - {type: variant, offset: 918, length: 2658, content: 乃作內政而寓軍令焉故卒伍定虖里而軍政成虖郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其教已成外攘夷狄內尊天子以安諸夏齊威景祐殿本都作桓桓景祐殿本都作桓既沒晉文接之亦先定其民作被廬之法總帥諸侯迭為盟主然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷至魯成公作丘甲哀公用田賦搜狩治兵大閱之事皆失其正春秋書而譏之以存王道於是師旅亟動百姓罷敝無伏節死難之誼孔子傷焉曰以不教民戰是謂棄之故稱子路曰由也千乘之國可使治其賦也而子路亦曰千乘之國攝虖大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也治其賦兵教以禮誼之謂也春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣雄桀之士因勢輔時作為權詐以相傾覆吳有孫武齊有孫臏魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡轉相攻伐代為雌雄齊愍以技擊彊魏惠以武卒奮秦昭以銳士勝世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道而非之曰彼孫吳者上勢利而貴變詐施於暴亂昏嫚之國君臣有間上下離心政謀不良故可變而詐也夫仁人在上為下所卬猶子弟之衛父兄若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有詩曰武王載旆有虔秉鉞如火烈烈則莫我敢遏言以仁誼綏民者無敵於天下也若齊之技擊得一首則受賜金事小敵脃則媮可用也事鉅敵堅則渙然離矣是亡國之兵也魏氏武卒衣三屬之甲操十二石之弩負矢五十个置戈其上冠冑帶劍贏三日之糧日中而趨百里中試則復其戶利其田宅如此則其地雖廣其稅必寡其氣力數年而衰是危國之兵也秦人其生民也陿阸其使民也酷烈劫之以勢隱之以阸狃之以賞慶道之以刑罰使其民所以要利於上者非戰無由也功賞相長五甲首而隸五家是最為有數故能四世有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳未有安制矜節之理也故雖地廣兵彊鰓鰓常恐天下之一合而共軋己也至乎齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之銳士秦之銳士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏寇賊姦軌而刑無所用所謂善師不陳者也湯武征伐陳師誓眾而放禽桀紂所謂善陳不戰者也齊桓南服彊楚使貢周室北伐山戎為燕開路存亡繼絕功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或犇走赴秦號哭請救秦人憐之謂景祐本無憐之二字王念孫說通典亦無疑後人所加謂作為為景祐本無憐之二字王念孫說通典亦無疑後人所加謂作為之出兵二國并力遂走吳師昭王返國所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒隸之徒還為敵讎猋起雲合果共軋之斯為下矣凡兵所以存亡繼絕救亂除害也故伊呂之將子孫有國與商周並至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而功錢大昭說監本閩本功作國按景祐殿本都作國王先謙說作國是國錢大昭說監本閩本功作國按景祐殿本都作國王先謙說作國是滅亡於後報應之勢各以類至其道然矣漢興高祖躬神武之材行寬仁之厚總㩜英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辯明叔孫通之儀文武相配大略舉焉天下既定踵秦而置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船皆歲時講肄修武備云至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之廢一不可誰能去兵鞭扑不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也昔周之法建三典以刑邦國詰四方一曰刑新邦用輕典二曰刑平邦用中典三曰刑亂邦用重典五刑墨罪五百劓罪五百宮罪五百刖罪五百殺罪五百所謂刑平邦用中典者也凡殺人者踣諸市墨者使守門劓者使守關宮者使守內刖者使守囿完者使守積其奴男子入于罪隸女子入舂槁凡有爵者與七十者與未齓者皆不為奴周道既衰穆王眊荒命甫侯度時作刑以詰四方墨罰之屬千劓罰之屬千髕罰之屬五百宮罰之屬三百大辟之罰其屬二百五刑之屬三千蓋多於平邦中典五百章所謂刑亂邦用重典者也春秋之時王道寖壞教化不行子產相鄭而鑄刑書晉叔嚮非之曰昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故閑之以誼糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠𢥠之以行教之以務使之以和臨之以敬莅之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐貨賂並行終子之世鄭其敗虖子產報曰若吾子之言僑不材不能及子孫吾以救世也媮薄之政自是滋矣孔子傷之曰導之以德齊之以禮有恥且格導之以政齊之以刑民免而無恥禮樂不興則刑罰不中刑罰不中則民無所錯手足孟氏使陽膚為士師問於曾子亦曰上失其道民散久矣如得其情則哀矜而勿喜陵夷至於戰國韓任申子秦用商鞅連相坐之法造參夷之誅增加肉刑大辟有鑿顛抽脅鑊亨之刑至於秦始皇兼吞戰國遂毀先王之法滅禮誼之官專任刑罰躬操文墨晝斷獄夜理書自程決事日縣石之一而姦邪並生赭衣塞路囹圄成市天下愁怨潰而叛之漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大說其後四夷未附兵革未息三章之法不足以禦姦於是相國蕭何攈摭秦法取其宜於時者作律九章當孝惠高后時百姓新免毒蠚人欲長幼養老蕭曹為相填以無為從民之欲而不擾亂是以衣食滋殖刑罰用稀及孝文即位躬脩玄默勸趣農桑減省租賦而將相皆舊功臣少文多質懲惡亡秦之政論議務在寬厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業畜積歲增戶口寖息風流篤厚禁罔疏闊選張釋之為廷尉罪疑者予民是以刑罰大省至於斷獄四百有刑錯之風即位十三年齊太倉令淳于公有罪當刑詔獄逮繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也宋祁說姚本益也刪去也字按景祐本無也字其少女緹縈自傷悲泣乃隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰, WYG: ''}
