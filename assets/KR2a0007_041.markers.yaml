  - {type: variant, offset: 7348, length: 255, content: 言其無能為也盎對曰吳銅鹽之利則有之安得豪桀而誘之誠令吳得豪桀亦且輔而為誼不反矣吳所誘皆亡賴子弟亡命鑄錢姦人故相誘以亂錯曰盎策之善上問曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東箱甚恨上卒問盎對曰吳楚相遺書言高皇帝王子弟各有分地今賊臣鼂錯擅適諸侯削奪之地以故反名為西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可毋血刃而俱罷於是上默然良久曰顧誠何如吾不愛一人謝天下盎曰愚計出此唯上孰計之乃拜盎為太常密裝治行後十餘日丞相青翟中尉嘉廷尉敺劾奏錯曰吳王反逆亡道欲危宗廟天下所當共誅今, WYG: ''}
