  - {type: variant, offset: 1616, length: 1946, content: 為君從史盜侍兒者也盎乃驚謝曰公幸有親吾不足絫公司馬曰君弟去臣亦且亡辟吾親君何患乃以刀決帳道從醉卒直出司馬與分背盎解節旄懷之屐步行七十里明見梁騎馳去遂歸報吳楚已破上更以元王子平陸侯禮為楚王以盎為楚相嘗上書不用盎病免家居與閭里浮湛相隨行鬭雞走狗雒陽劇孟嘗過盎盎善待之安陵富人有謂盎曰吾聞劇孟博徒將軍何自通之盎曰劇孟雖博徒然母死客送喪車千餘乘此亦有過人者且緩急人所有夫一旦叩門不以親為解不以在亡為辭天下所望者獨季心劇孟今公陽從數騎一旦有緩急寧足恃乎遂罵富人弗與通諸公聞之皆多盎盎雖居家景帝時時使人問籌策梁王欲求為嗣盎進說其後語塞梁王以此怨盎使人刺盎刺者至關中問盎稱之皆不容口乃見盎曰臣受梁王金刺君君長者不忍刺君然後刺者十餘曹備之盎心不樂家多怪乃之棓生所問占還梁刺客後曹果遮刺殺盎安陵郭門外鼂錯潁川人也學申商刑名於軹張恢生所與雒陽宋孟及劉帶同師以文學為太常掌故錯為人陗直刻深孝文時天下亡治尚書者獨聞齊有伏生故秦博士治尚書年九十餘老不可徵乃詔太常使人受之太常遣錯受尚書伏生所還因上書稱說詔以為太子舍人門大夫遷博士又上書言人主所以尊顯功名揚於萬世之後者以知術數也故人主知所以臨制臣下而治其眾則群臣畏服矣知所以聽言受事則不欺蔽矣知所以安利萬民則海內必從矣知所以忠孝事上則臣子之行備矣此四者臣竊為皇太子急之人臣之議或曰皇太子亡以知事為也臣之愚誠以為不然竊觀上世之君不能奉其宗廟而劫殺於其臣者皆不知術數者也皇太子所讀書多矣而未深知術數者不問書說也夫多誦而不知其說所謂勞苦而不為功臣竊觀皇太子材智高奇馭射伎藝過人絕遠然於術數未有所守者以陛下為心也竊願陛下幸擇聖人之術可用今世者以賜皇太子因時使太子陳明於前唯陛下裁察上善之於是拜錯為太子家令以其辯得幸太子太子家號曰智囊是時匈奴彊數寇邊上發兵以禦之錯上言兵事曰臣聞漢興以來胡虜數入邊地小入則小利大入則大利高后時再入隴西攻城屠邑敺略畜產其後復入隴西殺吏卒大寇盜竊聞戰勝之威民氣百倍敗兵之卒沒世不復自高后以來隴西三困於匈奴矣民氣破傷亡有勝意今茲隴西之吏賴社稷之神靈奉陛下之明詔和輯士卒底厲其節起破傷之民以當乘勝之匈奴用少擊眾殺一王敗其眾而大有利非隴西之民有勇怯乃將吏之制巧拙異也故兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法曰丈五之溝漸車之水山林積石經川丘阜屮木所在此步兵之地也車騎二不當一土山丘陵曼衍相屬平原廣野此車騎之地步兵十不當一平陵相遠川谷居間仰高臨下此弓弩之地也短兵百不當一兩陳相近平地淺屮可前可後此長戟之地也劍楯三不當一萑葦竹蕭屮木蒙蘢支葉茂接此矛鋋之地也長戟二不當一曲道相伏險阸相薄此劍楯之地也弓弩三不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金鼓之指相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與袒裼同弩不可以及遠與短兵同射不能中與亡矢同中不能入與亡鏃同此將不省兵之禍也五不當一故兵法曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也四者兵之至要也臣又聞小大異形彊弱異勢險易異備夫卑身以事彊小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今匈奴地形技藝與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之騎弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之眾易撓亂也勁弩長戟射疏及遠則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的則匈奴之革笥木薦弗能支也下馬地鬭劍戟相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之眾以誅數萬之匈奴眾寡之計以一擊十之術也雖然兵凶器戰危事也以大為小以彊為弱在俛卬之間耳夫以人之死爭勝跌而不振則悔之亡及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其眾數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以眾此萬全之術也傳曰狂夫之言而明主擇焉臣錯愚陋昧死上狂言唯陛下財擇文帝嘉之乃賜錯璽書寵答焉曰皇帝問太子家令上書言兵體三章聞之書言狂夫之言而明主擇焉今則不然言者不狂而擇者不明國之大患故在於此使夫不明擇於不狂是以萬聽而萬不當也錯復言守邊備塞勸農力本當世急務二事曰臣聞秦時北攻胡貉築塞河上南攻楊粵置戍卒焉其起兵而攻胡粵者非以衛邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫胡貉之地積陰之處也木皮三寸冰厚六尺食肉而飲酪其人密理鳥獸毳毛其性能寒楊粵之地少陰多陽其人疏理鳥獸希毛其性能暑秦之戍卒不能其水土戍者死於邊輸者僨於道, WYG: ''}
