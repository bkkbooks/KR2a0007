  - {type: variant, offset: 7616, length: 1, content: 群, WYG: 太尉勃以相國代丞相噲擊豨一月徙為代相國將屯如淳曰既為相國有警則將卒而屯守也師古曰此説非也時代國常有屯兵以備邊㓂寛為代相兼將此屯兵也二歲為丞相將屯孝惠五年薨諡曰景侯傳至曾孫偃謀反誅國除靳歙以中涓從起宛朐師古曰歙音翕宛音於元反胊音其于反攻濟陽破李由軍擊秦軍開封東斬騎千人將一人如淳曰騎將率號為千人漢儀注邊郡置部都尉千人司馬候也首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人張晏曰主車也騎長一人張晏曰騎之長首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦别西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘擊反者王武等畧梁地别西擊邢説軍葘南破之師古曰葘縣名也後為考城説讀曰悦身得説都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東食邑四千二百户别之河内擊趙賁軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下十縣别攻破趙軍得其將司馬二人候四人降吏卒二千四百人從降下邯鄲别下平陽身斬守相所將卒斬兵守郡一人李奇曰或以為郡守也字反耳晉灼曰將兵郡守也師古曰當言兵郡守一人也降鄴從攻朝歌邯鄲又别擊破趙軍降邯鄲郡六縣還軍敖倉破項籍軍成臯南擊絶楚饟道起滎陽至襄邑破項冠魯下畧地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之别定江陵降柱國大司馬以下八人身得江陵王致雒陽師古曰江陵王謂共敖之子共尉也得而送致於雒陽因定南郡從至陳取楚王信剖符世世勿絶定食四千六百户為信武侯以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎别擊陳豨丞相敞破之師古曰侯敞因降曲逆從擊黥布有功益封定食邑五千三百户凡斬首九十級虜百四十二人别破軍十四降城五十九定郡國各一縣二十三得王柱國各一人二千石以下至五百石三十九人高后五年薨諡曰肅侯子亭嗣有罪國除周緤沛人也師古曰緤音息列反以舍人從高祖起沛至霸上西入蜀漢還定三秦常為參乘賜食邑池陽師古曰即馮翊池陽縣從東擊項羽滎陽絶甬道從出度平陰遇韓信軍襄國戰有利不利終亡離上心上以緤為信武侯師古曰以其忠信故加此號食邑三千三百户上欲自擊陳豨緤泣曰始秦攻破天下未曾自行今上常自行是亡人可使者乎上以為愛我賜入殿門不趨十二年更封緤為䣙城侯服䖍曰音菅蒯之蒯蘇林曰音簿催反晉灼曰功}
