  - {type: variant, offset: 7610, length: 0, content: '', krp: 䧺長之長也師古曰此説非也吳郡長當時為吳郡長嬰破之於吳下得吳守遂定吳豫章會稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千户以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絶食潁陰二千五百户從擊韓王信於代至馬邑别降樓煩以北六縣斬代左將破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人師古曰胡名也又受詔并將燕趙齊梁楚車騎擊破胡騎於硰石師古曰硰音子坐反至平城為胡所困從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人師古曰卒謂所將之卒也特獨也各獨為將降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布别將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又進破布别將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上益食邑二千五百戸布已破高帝歸定令嬰食潁陰五千户除前所食邑凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人嬰自破布歸高帝崩以列侯事惠帝及呂后呂后崩呂禄等欲為亂齊哀王聞之舉}
  - {type: variant, offset: 7611, length: 1, content: 數, WYG: 西呂禄等以嬰為大將軍徃擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅呂氏事師古曰風讀曰諷齊兵止不前絳侯等既誅諸呂齊王罷兵歸嬰自滎陽還與絳侯陳平共立文帝於是益封嬰三千户賜金千斤為太尉三歲絳侯勃免相嬰為丞相罷太尉官是歲匈奴大入北地上令丞相嬰將騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵後歲餘以丞相薨諡曰懿侯傳至孫彊有罪絶武帝復封嬰孫賢為臨汝侯奉嬰後後有罪國除傅寛以魏五大夫騎將從為舍人起橫陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寛封號共德君師古曰共讀曰恭從入漢中為右騎將定三秦賜食邑雕陰孟康曰縣名屬上郡從擊項籍待懷服䖍曰待高帝於懷懷縣名也師古曰地理志屬河内即今懷州賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下師古曰敖地名敖倉蓋取此名也左氏傳曰敖鄗之間益食邑屬淮陰張晏曰韓信也信時為相國云淮陰者終言之也擊破齊歴下軍擊田解屬相國參殘博師古曰參曹參也博大山縣也益食邑因定齊地剖符世世不絶封陽陵侯二千六}
