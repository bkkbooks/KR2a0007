  - {type: variant, offset: 24, length: 0, content: '', WYG: 項籍死漢王即皇帝位以噲有功益食邑八百户其秋燕王臧荼反噲從攻虜荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絶食舞陽號為舞陽侯除前所食以將軍從攻反者韓王信於代自霍人以往至雲中與絳侯等共定之益食千五百戸因擊陳豨與曼丘臣軍戰襄國破柏人先登降之定清河常山凡二十七縣殘東垣張晏曰殘有所毁也臣瓚曰殘為多所殺傷也師古曰瓚説是遷為左丞相破得綦毋卬尹潘軍於無終廣昌師古曰姓綦毋名卬也綦音其破豨别將胡人王黃軍代南因擊韓信軍參合軍所將卒斬韓信擊豨胡騎橫谷斬將軍趙既虜代丞相馮梁守孫奮大將王黃將軍大將一人太僕解福等十人與諸將共定代鄉邑七十三後燕王盧綰反噲以相國擊綰破其丞相抵薊南師古曰抵至也一説抵者其丞相之名也音丁禮反定燕縣十八鄉邑五十一益食千三百戸定食舞陽五千四百户從斬首百七十六級虜二百八十七人别破軍七下城五定郡六縣五十二得丞相一人將軍十三人二千石以下至三百石十二人噲以呂后弟呂嬃為婦生子伉師古曰伉音抗又音剛故其比諸將最親先黥布反時高帝嘗病師古曰黥布未反之前惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日噲廼排闥直入師古曰闥宫中小門也一曰門屏也音土曷反大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也師古曰憊力極也音蒲拜反且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎師古曰顧猶反也且陛下獨不見趙高之事乎師古曰謂始皇崩趙高矯為詔命殺扶蘇而立胡亥高帝笑而起其後盧綰反高帝使噲以相國擊燕是時高帝病甚人有惡噲黨於呂氏師古曰惡謂毁譛言其罪惡也即上一日宫車晏駕則噲欲以兵盡誅戚氏趙王如意之屬高帝大怒廼使陳平載絳侯代將而即軍中斬噲師古曰即就也陳平畏呂后執噲詣長安至則高帝已崩呂后釋噲師古曰釋解也解免其罪得復爵邑孝惠六年噲薨諡曰武侯子伉嗣而伉母呂嬃亦為臨光侯}
