  - {type: variant, offset: 18, length: 0, content: '', krp: 噲專屠以賣後與高祖俱隱於芒碭山澤間陳勝初起蕭何曹參使噲求迎高祖立}
  - {type: variant, offset: 19, length: 3, content: 群盜徙, WYG: 沛公師古曰高祖時亡在外故求而迎之噲以舍人從攻胡陵方與師古曰皆縣名方音房與音豫還守豐擊泗水監豐下破之師古曰泗水郡名監謂御史監郡者也破之於豐縣下復東定沛破泗守薛西師古曰破郡守於薛縣之西宋祁曰泗字下疑有水字與司馬􅊂戰碭東師古曰秦將章邯之司馬也􅊂讀與夷同郤敵斬首十五級賜爵國大夫文穎曰即官大夫也爵第六級常從沛公擊章邯軍濮陽攻城先登斬首二十三級賜爵列大夫文穎曰即公大夫也爵第七級從攻陽城先登下户牗師古曰陽武縣之鄉破李由軍斬首十六級賜上聞爵張晏曰得徑上聞也如淳曰呂氏春秋曰魏文侯東勝齊於長城天子賞文侯以上聞晉灼曰名通於天子也從攻圉都尉東郡守尉於成武師古曰圉即陳留圉縣劉攽曰圉縣名有尉無都尉又郡都尉至景帝方置明此衍都字郤敵斬首十四級捕虜十六人師古曰生獲曰虜賜爵五大夫從攻秦軍出亳南鄭氏曰亳成湯封邑今河南偃師湯亭是河間守軍於杠里破之師古曰杠音江擊破趙賁軍開封北師古曰賁音奔以郤敵先登斬候一人首六十八級捕虜二十六人師古曰既斬候一人又更斬它首六十八賜爵卿從攻破揚熊於曲遇師古曰曲音丘羽反遇音顒攻宛陵先登斬首八級捕虜四十四人賜爵封號賢成君張晏曰食禄比封君而無邑也臣瓚曰秦制列侯乃有封爵師古曰瓚説非也楚漢之際權設寵榮假其位號或得邑地或空受爵此例多矣約以秦制於義不通從攻長社轘轅絶河津東攻秦軍尸鄉南攻秦軍於犨破南陽守齮於陽城東攻宛城先登西至酈師古曰南陽之縣也音直益反以郤敵斬首十四級捕虜四十人賜重封張晏曰益禄也如淳曰正爵名也臣瓚曰增封也師古曰諸家之説皆非也重封者加二號耳攻武闗至霸上斬都尉一人首十級捕虜百四十六人降卒二千九百人項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中酒張晏曰酒酣也師古曰飲酒之中也不醉不醒故謂之中中音竹仲反亞父謀欲殺沛公令項莊㧞劔舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急廼持盾入初入營營衞止噲師古曰營衞謂營壘之守衞者噲直撞入立帳下師古曰謂以盾撞擊人撞音丈江反項羽目之問為誰張良曰沛公參乘樊噲也項羽曰壯士賜之巵酒彘肩噲既飲酒拔劔切肉食之項羽曰能復飲乎噲曰臣死且不辭豈特巵酒乎且沛公先入定咸陽暴師覇上以待大王師古曰時項羽未為王故高紀云以待將軍此言大王史追書耳大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽黙然沛公如厠麾噲去既出沛公留車騎師古曰沛公所乘之車及從者之騎獨騎馬噲等四人步從從山下走歸覇上軍而使張良謝項羽羽亦因遂已師古曰已止也無誅沛公之心是日微樊噲奔入營宋祁曰奔疑作犇譙讓項羽沛公幾殆師古曰微無也譙責也殆危也譙音才笑反幾音鉅依反後數日項羽入屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦别擊西丞白水北服䖍曰西丞縣名也晉灼曰白水今廣平魏縣也地理志無西丞似秦將名也師古曰二説並非也西謂隴西郡西縣也白水水名經西縣東南流而過言擊西縣之丞於白水之北擁輕車騎雍南破之從攻雍斄城先登師古曰斄讀與邰同縣名即后稷所封今武功故城是音胎擊章平軍好畤攻城先登陷陣斬縣令丞各一人首十一級虜二十人遷為郎中騎將從擊秦車騎壤東師古曰地名也郤敵遷為將軍攻趙賁下郿槐里柳中咸陽師古曰柳中即細柳地也在長}
