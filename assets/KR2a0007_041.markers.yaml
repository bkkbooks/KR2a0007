  - {type: 'tls:seg', offset: 21, content: '', id: KR2a0007_tls_041-1a.5}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 西灌廢邱最李奇曰以水灌廢丘也張晏曰最功第一也晉灼曰京輔治華陰灌北也師古曰高紀言引水灌廢丘李説是也或者云漢王自彭城敗還始灌廢丘此時未也此説非矣彭城還更灌廢丘始平定之無廢丘此時已當灌矣至櫟陽賜食邑杜之樊鄉師古曰杜縣之鄉也今曰樊川從攻項籍屠煮棗晋灼曰地理志無也清河有煑棗城功臣表有煑棗侯師古曰既云攻項籍屠煑棗則其地當在大河之南非清河之城明矣但未詳其處耳宋祁曰後漢地理志濟陰郡宛胊有煑棗城擊破王武程處軍於外黄攻鄒魯瑕丘薛項羽敗漢王於彭城盡復取魯梁地噲還至滎陽益食平陰二千户以將軍守廣武一歲師古曰即滎陽之廣武項羽引東從高祖擊項籍下陽夏師古曰夏音工雅反虜楚周將軍卒四千人師古曰周殷圍項籍陳大破之師古曰於陳縣圍之屠胡}
