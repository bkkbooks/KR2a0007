  - {type: variant, offset: 1372, length: 6, content: 盎盎恐夜見竇, WYG: 高祖高祖時為亭長重坐傷人如淳曰為吏傷人其罪重告故不傷嬰蘇林曰自告情故不傷嬰也嬰證之移獄覆嬰坐高祖繫歲餘掠笞數百終脱高祖劉攽曰告故不傷嬰者髙祖抵言不曽傷嬰故嬰證其實然告故者反坐栲告者不服故移獄覆矣嬰以此坐繫掠笞也高祖之初與徒屬欲攻沛也師古曰謂始亡在外未被樊噲召時劉奉世曰欲攻沛者以沛令後悔閉城城守也此即被樊噲召時按帝紀未嘗兩至沛下文義相屬非兩事甚明嬰時以縣令史為高祖使上降沛一日師古曰謂老父開城門迎高祖時也高祖為沛公賜爵七大夫以}
