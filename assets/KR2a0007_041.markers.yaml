  - {type: variant, offset: 7797, length: 1, content: 矣, WYG: 半席相如傳酒中樂酣師古曰酒中飲酒中之半也一人注書前後不同獨騎馬噲等四人步從臣召南按四人噲與靳彊夏侯嬰紀成也見高紀從擊秦車騎壤東注師古曰地名也臣召南按曹參傳曰取壤鄉擊三秦軍壤東然則壤是鄉名壤東壤鄉之東也酈商傳高陽人也臣召南按商即食其弟食其傳曰陳留高陽人是也高陽乃陳留縣之鄉聚名此文似脱陳留二字别定北地郡臣召南按史記作定北地}
