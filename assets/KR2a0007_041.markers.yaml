  - {type: variant, offset: 3911, length: 2984, content: 費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然令遠方之卒守塞一歲而更不知胡人之能不如選常居者家室田作且以備之以便為之高城深塹具藺石布渠答復為一城其內城間百五十步要害之處通川之道調立城邑毋下千家為中周虎落先為室屋具田器乃募辠人及免徒復作令居之不足募以丁奴婢贖辠及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家予冬夏衣廩食能自給而止郡縣之民得買其爵以自增至卿其亡夫若妻者縣官買予之人情非有匹敵不能久安其處塞下之民祿利不厚不可使久居危難之地胡人入驅而能止其所驅者以其半予之縣官為贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使遠方無屯戍之事塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣上從其言募民徙塞下錯復言陛下幸募民相徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明法存卹所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其屮木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二內門戶之閉置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以脩祭祀男女有昏生死相卹墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有護習地形知民心者居則習民於射法出則教民於應敵故卒伍成於內則軍正定於外服習以成勿令遷徙幼則同游長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絕匈奴不與和親臣竊意其冬來南也壹大治則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也愚臣亡識唯陛下財察後詔有司舉賢良文學士錯在選中上親策詔之曰惟十有五年九月壬子皇帝曰昔者大禹勤求賢士施及方外四極之內舟車所至人迹所及靡不聞命以輔其不逮近者獻其明遠者通厥聰以善戮力以翼天子是以大禹能亡失德夏以長楙高皇帝親除大害去亂從並建豪英以為官師為諫爭輔天子之闕而翼戴漢宗也賴天之靈宗廟之福方內以安澤及四夷今朕獲執天子之正以承宗廟之祀朕既不德又不敏明弗能燭而智不能治此大夫之所著聞也故詔有司諸侯王三公九卿及主郡吏各帥其志以選賢良明於國家之大體通於人事之終始及能直言極諫者各有人數將以匡朕之不逮二三大夫之行當此三道朕甚嘉之故登大夫于朝親諭朕志大夫其上三道之要及永惟朕之不德吏之不平政之不宣民之不寧四者之闕悉陳其志毋有所隱上以薦先帝之宗廟下以興愚民之休利著之于篇朕親覽焉觀大夫所以佐朕至與不至書之周之密之重之閉之興自朕躬大夫其正論毋枉執事烏虖戒之二三大夫其帥志毋怠錯對曰平陽侯臣窋汝陰侯臣竈潁陰侯臣何廷尉臣宜昌隴西太守臣昆邪所選賢良太子家令臣錯昧死再拜言臣竊聞古之賢主莫不求賢以為輔翼故黃帝得力牧而為五帝先大禹得咎繇而為三王祖齊桓得筦子而為五伯長今陛下講于大禹及高皇之建豪英也退託於不明以求賢良讓之至也臣竊觀上世之傳若高皇帝之建功業陛下之德厚而得賢佐皆有司之所覽刻於玉版藏於金匱歷之春秋紀之後世為帝者祖宗與天地相終今臣窋等乃以臣錯充賦甚不稱明詔求賢之意臣錯屮茅臣亡識知昧死上愚對曰詔策曰明於國家大體愚臣竊以古之五帝明之臣聞五帝神聖其臣莫能及故自親事處于法宮之中明堂之上動靜上配天下順地中得人故眾生之類亡不覆也根著之徒亡不載也燭以光明亡偏異也德上及飛鳥下至水蟲草木諸產皆被其澤然後陰陽調四時節日月光風雨時膏露降五穀孰祅孽滅賊氣息民不疾疫河出圖洛出書神龍至鳳鳥翔德澤滿天下靈光施四海此謂配天地治國大體之功也詔策曰通於人事終紿愚臣竊以古之三王明之臣聞三王臣主俱賢故合謀相輔計安天下莫不本於人情人情莫不欲壽三王生而不傷也人情莫不欲富三王厚而不困也人情莫不欲安三王扶而不危也人情莫不欲逸三王節其力而不盡也其為法令也合於人情而後行之其動眾使民也本於人事然後為之取人以己內恕及人情之所惡不以彊人情之所欲不以禁民是以天下樂其政歸其德望之若父母從之若流水百姓和親國家安寧名位不失施及後世此明於人情終始之功也詔策曰直言極諫愚臣竊以五伯之臣明之臣聞五伯不及其臣故屬之以國任之以事五伯之佐之為人臣也察身而不敢誣奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以亡能居尊顯之位自行若此可謂方正之士矣其立法也非以苦民傷眾而為之機陷也以之興利除害尊主安民而救暴亂也其行賞也非虛取民財妄予人也以勸天下之忠孝而明其功也故功多者賞厚功少者賞薄如此斂民財以顧其功而民不恨者知與而安己也其行罰也非以忿怒妄誅而從暴心也以禁天下不忠不孝而害國者也故辠大者罰重辠小者罰輕如此民雖伏罪至死而不怨者知罪罰之至自取之也立法若此可謂平正之吏矣法之逆者請而更之不以傷民主行之暴者逆而復之不以傷國救主之失補主之過揚主之美明主之功使主內亡邪辟之行外亡騫汙之名事君若此可謂直言極諫之士矣此五伯之所以德匡天下威正諸侯功業甚美名聲章明舉天下之賢主五伯與焉此身不及其臣而使得直言極諫補其不逮之功也今陛下人民之眾威武之重德惠之厚令行禁止之勢萬萬於五伯而賜愚臣策曰匡朕之不逮愚臣何足以識陛下之高明而奉承之詔策曰吏之不平政之不宣民之不寧愚臣竊以秦事明之臣聞秦始并天下之時其主不及三王而臣不及其佐然功力不遲者何也地形便山川利財用足民利戰其所與並者六國六國者臣主皆不肖謀不輯民不用故當此之時秦最富彊夫國富彊而鄰國亂者帝王之資也故秦能兼六國立為天子當此之時三王之功不能進焉及其末塗之衰也任不肖而信讒賊宮室過度耆慾亡極民力罷盡賦斂不節矜奮自賢群臣恐諛驕溢縱恣不顧患禍妄賞以隨喜意妄誅以快怒心法令煩憯刑罰暴酷輕絕人命身自射殺天下寒心莫安其處姦邪之吏乘其亂法以成其威獄官主斷生殺自恣上下瓦解各自為制秦始亂之時吏之所先侵者貧人賤民也至其中節所侵者富人吏家也及其末塗所侵者宗室大臣也是故親疏皆危外內咸怨離散逋逃人有走心陳勝先倡天下大潰絕祀亡世為異姓福此吏不平政不宣民不寧之禍也今陛下配天象地覆露萬民絕秦之迹除其亂法躬親本事廢去淫末除苛解嬈寬大愛人肉刑不用辠人亡帑非謗不治鑄錢者除通關去塞不孽諸侯賓禮長老愛卹少孤辠人有期後宮出嫁尊賜孝悌農民不租明詔軍師愛士大夫求進方正廢退姦邪除去陰刑害民者誅憂勞百姓列侯就都親耕節用視民不奢所為天下興利除害變法易故以安海內者大功數十皆上世之所難及陛下行之道純德厚元元之民幸矣詔策曰永惟朕之不德愚臣不足以當之詔策曰悉陳其志毋有所隱愚臣竊以五帝之賢臣明之臣聞五帝其臣莫能及則自親之三王臣主俱賢則共憂之五伯不及其臣則任使之此所以神明不遺而聖賢不廢也故各當其世而立功德焉傳曰往者不可及來者猶可待能明其世者謂之天子此之謂也竊聞戰不勝者易其地民貧窮者變其業今以陛下神明德厚資財不下五帝臨制天下至今十有六年民不益富盜賊不衰邊竟未安其所以然意者陛下未之躬親而待群臣也今執事之臣皆天下之選已然莫能望陛下清光譬之猶五帝之佐也陛下不自躬親而待不望清光之臣臣竊恐神明之遺也日損一日歲亡一歲日月益暮盛德不及究於天下以傳萬世愚臣不自度量竊為陛下惜之昧死上狂惑屮茅之愚臣言唯陛下財擇時賈誼已死對策者百餘人唯錯為高第繇是遷, WYG: ''}
