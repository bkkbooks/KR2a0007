  - {type: variant, offset: 7861, length: 1, content: 喟, WYG: 王皇后母臧兒也臣召南按事在孝景中二年臧兒尚未尊稱平原君也史官記事隨後文稱之耳夏侯嬰傳常蹳兩兒棄之蹳史記作蹶德嬰之脱孝惠魯元于下邑間也按下邑縣名屬梁國灌嬰傳重泉人李必駱甲按李必後封戚侯功臣表作季必身虜騎將入攻博陽臣召南按入字係一人兩字傳冩誤并史記作身虜騎將一人句攻博陽句是也攻博陽上不須入字宋本及各本俱讀入攻博陽為句非是破吳郡長吳下臣召南按後儒以會稽吳郡至東漢順帝始分遂疑二史此文為譌}
