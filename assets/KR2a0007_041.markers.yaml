  - {type: variant, offset: 1384, length: 0, content: '', WYG: 固士卒心而令敵不測也鄉讀曰嚮卒以得脱師古曰卒終也益食嬰細陽千户師古曰益其邑使食之從擊胡騎句注北大破之擊胡騎平城南三陷陳功為多賜所奪邑五百户孟康曰時有罪過奪邑者以賜之劉奉世曰言賜所奪則嬰蓋以過嘗奪邑今以功復賜之耳從擊陳豨黥布軍陷陳郤敵益千户定食汝陰六千九百户除前所食嬰自上初起沛常為太僕從竟高祖崩以太僕事惠帝惠帝及高后德嬰之脱孝惠魯元於下邑間也乃賜嬰北第第一師古曰北第者近北闕之第嬰最第一也故張衡西京賦云北闕甲第當道直啓曰近我以尊異之惠帝崩以太僕事高后高后崩代王之來嬰以太僕與東牟侯入清宮廢少帝以天子法駕迎代王代邸與大臣共立文帝復為太僕八歲薨諡曰文侯傳至曽孫頗師古曰頗音普河}
