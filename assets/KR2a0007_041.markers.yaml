  - {type: variant, offset: 7610, length: 0, content: '', WYG: 䧺長之長也師古曰此説非也吳郡長當時為吳郡長嬰破之於吳下得吳守遂定吳豫章會稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千户以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絶食潁陰二千五百户從擊韓王信於代至馬邑别降樓煩以北六縣斬代左將破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人師古曰胡名也又受詔并將燕趙齊梁楚車騎擊破胡騎於硰石師古曰硰音子坐反至平城為胡所困從擊陳豨别攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人師古曰卒謂所將之卒也特獨也各獨為將降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布别將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又進破布别將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上益食邑二千五百戸布已破高帝歸定令嬰食潁陰五千户除前所食邑凡從所得二千石二人别破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人嬰自破布歸高帝崩以列侯事惠帝及呂后呂后崩呂禄等欲為亂齊哀王聞之舉}
