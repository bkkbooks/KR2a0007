  - {type: variant, offset: 1380, length: 0, content: '', krp: 太僕常奉車師古曰為沛公御車從攻胡陵嬰與蕭何降泗水監平張晏曰胡陵平所止縣何嘗紿之故與降平以胡陵降賜嬰爵五大夫從擊秦軍碭東攻濟陽下户牗破李由軍雍丘以兵車趣攻戰疾破之師古曰趣讀曰促謂急速也次下亦同賜爵執帛從擊章邯軍東阿濮陽下以兵車趣攻戰疾破之賜爵執圭從擊趙賁軍開封揚熊軍曲遇嬰從捕虜六十八人降卒八百五十人得印一匱師古曰時自相署置官之印又擊秦軍雒陽東以兵車趣攻戰疾賜爵封轉為滕令鄧展曰今沛郡公丘縣宋祁曰浙本封字上有重字因奉車師古曰因此又每奉車從攻戰以至覇上從攻定南陽戰於藍田芷陽師古曰芷陽後為霸陵縣至霸上沛公為漢王賜嬰爵列侯號昭平侯復為太僕從入蜀漢還定三秦從擊項籍至彭城項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後師古曰罷讀曰疲常蹳兩兒棄之服䖍曰蹳音撥晉灼曰音足跋物之跋師古曰服音是嬰常收載行面雍樹馳服䖍曰高祖欲斬之故嬰圍樹走面向樹也應劭曰古者立乘嬰恐小兒墮墜各置一面擁持之樹立也蘇林曰南方人謂抱小兒為雍樹面者以面首向臨之也師古曰面偕也雍抱持之}
  - {type: variant, offset: 1381, length: 1, content: 吳, WYG: 取兩兒令面背已而抱持之以馳故云面雍樹馳服言圍樹而走義尤疎越雍讀曰擁劉奉世曰抱兩兒者未有能背面而能抱持者况復馳乎蘇説是也漢王怒欲斬嬰者十餘卒得脱而致孝惠魯元於豐漢王既至滎陽收散兵復振賜嬰食邑沂陽師古曰沂音魚依反擊項籍下邑追至陳卒定楚至魯益食兹氏師古曰兹氏縣名地理志屬太原漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝陰剖符世世勿絶從擊代至武泉雲中益食千户因從擊韓信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉師古曰故示閑暇}
  - {type: page-break, offset: 1381, content: '', id: KR2a0007_WYG_041-11b, image: WYG0250/WYG0250-0048b.png}
