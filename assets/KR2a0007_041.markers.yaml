  - {type: variant, offset: 7611, length: 1, content: 數, krp: 西呂禄等以嬰為大將軍徃擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅呂氏事師古曰風讀曰諷齊兵止不前絳侯等既誅諸呂齊王罷兵歸嬰自滎陽還與絳侯陳平共立文帝於是益封嬰三千户賜金千斤為太尉三歲絳侯勃免相嬰為丞相罷太尉官是歲匈奴大入北地上令丞相嬰將騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵後歲餘以丞相薨諡曰懿侯傳至孫彊有罪絶武帝復封嬰孫賢為臨汝侯奉嬰後後有罪國除傅寛以魏五大夫騎將從為舍人起橫陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寛封號共德君師古曰共讀曰恭從入漢中為右騎將定三秦賜食邑雕陰孟康曰縣名屬上郡從擊項籍待懷服䖍曰待高帝於懷懷縣名也師古曰地理志屬河内即今懷州賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下師古曰敖地名敖倉蓋取此名也左氏傳曰敖鄗之間益食邑屬淮陰張晏曰韓信也信時為相國云淮陰者終言之也擊破齊歴下軍擊田解屬相國參殘博師古曰參曹參也博大山縣也益食邑因定齊地剖符世世不絶封陽陵侯二千六}
