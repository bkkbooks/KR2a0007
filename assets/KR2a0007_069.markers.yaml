  - {type: variant, offset: 335, length: 0, content: '', WYG: 利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌彊弩將軍時羌降者萬餘人矣充國度其必壊欲罷騎兵屯田以待其敝作奏未上㑹得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保師古曰繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪師古曰言豫防之可無今日之㓂也徃者舉可先行羌者吾舉辛武賢師古曰行音下更反丞相御史復白遣義渠安國竟沮敗羌師古曰沮壊也音才汝反金城湟中榖斛八錢吾謂耿中丞服䖍曰耿夀昌也為司農中丞糴二百萬斛榖羌人不敢動矣師古曰言豫儲糧食可以制敵耿中丞請糴百萬斛廼得四十萬斛耳義渠冄使且費其半失此二册羌人故敢為}
  - {type: page-break, offset: 335, content: '', id: KR2a0007_WYG_069-13b, image: WYG0250/WYG0250-0464b.png}
  - {type: variant, offset: 335, length: 0, content: '', krp: 利吏士鋭氣以十二月擊先零羌即疾劇留屯毋行獨遣破羌彊弩將軍時羌降者萬餘人矣充國度其必壊欲罷騎兵屯田以待其敝作奏未上㑹得進兵璽書中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保師古曰繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪師古曰言豫防之可無今日之㓂也徃者舉可先行羌者吾舉辛武賢師古曰行音下更反丞相御史復白遣義渠安國竟沮敗羌師古曰沮壊也音才汝反金城湟中榖斛八錢吾謂耿中丞服䖍曰耿夀昌也為司農中丞糴二百萬斛榖羌人不敢動矣師古曰言豫儲糧食可以制敵耿中丞請糴百萬斛廼得四十萬斛耳義渠冄使且費其半失此二册羌人故敢為}
  - {type: variant, offset: 336, length: 0, content: '', WYG: 失之豪釐差以千里是旣然矣今兵久}
  - {type: variant, offset: 336, length: 0, content: '', krp: 失之豪釐差以千里是旣然矣今兵久}
  - {type: variant, offset: 337, length: 0, content: '', WYG: 决四夷卒有動揺相因而起師古曰卒讀曰猝雖有知者不能善其後羌獨足憂邪師古曰言儻如此則所憂不獨在羌吾固以死守之眀主可為忠言遂上屯田奏曰臣聞兵者所以眀徳除害也故舉得於外則福生於内不可不慎臣所將吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石師古曰茭乾芻也藁禾稈也石百二十斤稈音工旱反難久不觧繇役不息又恐它夷卒有不虞之變師古曰卒讀曰猝相因並起為明主憂誠非素定廟勝之册師古曰廟勝謂謀於廟堂而勝敵也且羌虜易以計破難用兵碎故也臣愚以為擊之不便宋祁曰故也當作也故計度臨羌東至浩亹師古曰度音大各反羌虜故田宋祁曰故田姚刪故字及公田民所未墾可二千頃以上其間郵亭多壊敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者合凡萬二百八十一人用榖月二萬七千三百六十三斛鹽三百八斛分屯要害䖏氷觧漕下繕鄉亭浚溝渠師古曰漕下以水運木而下也繕補也浚深治也治湟陿以西}
