  - {type: variant, offset: 338, length: 1, content: 皆, WYG: 橋七十所令可至鮮水左右田事出賦人二十畮師古曰田事出謂至春人出營田也賦謂班與之也畮古畝字至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草師古曰倅副也什二者千騎則與副馬二百匹也伉音口浪反為田者遊兵以充入金城郡益積畜省大費師古曰畜讀曰蓄今大司農所轉榖至者足支萬人一嵗食謹上田處及器用簿師古曰簿音歩户反唯陛下裁許上報曰皇帝問後將軍言欲罷騎兵萬人留田即如將軍之計虜當何時}
