  - {type: variant, offset: 316, length: 2, content: 秉政, WYG: 定册尊立宣帝封營平侯本始中為蒲類將軍征匈奴斬虜數百級還為後將軍少府匈奴大發十餘萬騎南旁塞至符奚盧山師古曰旁依也音歩浪反劉敞曰按百官表本始年後少府皆有姓名充國未嘗為之亦未嘗有將軍兼少府者明此府字是時字少時猶言無幾也欲入為㓂亡者題除渠堂降漢言之遣充國將四萬騎屯縁邉九郡文穎曰五原朔方之屬也師古曰九郡者五原朔方雲中代郡鴈門定襄北平上谷漁陽也四萬騎分屯之而充國縂統領之單于聞之引去是時光禄大夫義渠安國使行諸𦍑師古曰行音下更反先零豪言願時渡湟水北鄭氏曰零音憐孟康曰豪帥長也師古曰湟水出金城臨𦍑塞外東入河湟水之北是漢地湟音皇劉奉世曰湟北非謂漢地也𦍑意欲稍北近匈奴合而為㓂安國不知其情故受其詞詳下文可見逐民所不田䖏畜牧安國以聞充國劾安國奉使不敬是後𦍑人旁緣前言抵冒渡湟水師古曰旁依也抵冒犯突而前旁音歩浪反冒音莫北反宋祁曰冒作莫報反郡縣不能禁元康三年先零遂與諸羌種豪二百餘人觧仇交質盟詛師古曰羌人無大君長而諸種豪遁相殺伐故每有仇讎徃来相報今觧仇交質者自相親結欲入漢為㓂也上聞之以問充國對曰羌人所以易制者以其種自有豪數相攻擊埶不壹也徃三十餘嵗西羌反時亦先觧仇合約攻令居師古曰合約共為要契也與漢相距五六年廼定至征和五年先零豪封煎等通使匈奴師古曰煎讀曰翦匈奴使人至小月氏師古曰氏音支傳告諸羌曰漢貳師將軍衆十餘萬人降匈奴羌人為漢事苦師古曰事使役張掖酒泉本我地地肥美可共擊居之以此觀匈奴欲與羌合非一世也間者匈奴困於西方聞烏桓来保塞恐兵復從東方起數使使尉黎危須諸國設以子女貂裘欲沮觧之師古曰設謂開許之也沮壊也欲壊其計令觧散之沮音才汝反其計不合疑匈奴更遣使至羌中道從沙隂地出鹽澤過長阬入窮水塞南抵屬國與先零相直師古曰直當也臣恐羌變未止此且復結聫他種宜及未然為之備師古曰未然者其計未成後月餘羌侯狼何果遣使至匈奴藉兵師古曰藉借也欲擊鄯善敦煌以絶漢道師古曰鄯音善充國以為狼何小月氏種在陽闗西南埶不能獨造此計疑匈奴使已至羌中先零䍐开廼觧仇作約蘓林曰䍐开在金城南師古曰䍐开羌之别種也此下言遣开豪雕庫宣天子至徳䍐开之屬皆聞知明􅇉其下又云河南大开小开則䍐羌开羌姓族殊矣开音口堅反而地理志天水有䍐开縣盖以此二種羌來降䖏之此地因以名縣也而今之羌姓有䍐井者總是䍐开之類合而言之因為姓耳變开為井字之訛也到秋馬肥變必起矣宜遣使者行邊兵豫為備敇視諸羌毋令觧仇師古曰行音下更反視讀曰示示語之也其下並同宋祁曰觧仇上疑有復字以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善}
