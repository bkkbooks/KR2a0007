  - {type: 'tls:seg', offset: 344, content: '', id: KR2a0007_tls_069-2a.50}
  - {type: variant, offset: 344, length: 2, content: 孝宣, WYG: 時不分别人而并擊我如淳曰此語謂本始五年伐先零不分别大小开本意是以大小开有此言也劉奉世曰本始年未伐先零此即元康五年未改神爵已前義渠安國召誅先零之時所謂無所信鄉即是今無事但羌人不能追言爾其意常恐今兵不出得亡變生與先零為一將軍孰計復奏充國奏曰臣聞兵以計為本故多􅈫勝少􅈫先零羌精兵今餘不過七八千人失地逺客分􅄆飢凍䍐开莫須又頗暴略其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壊可日月冀逺在來春故曰兵决可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大衆攻之而不能害今留歩士萬人屯田地埶平易多髙山逺望之便部曲相保為壍壘木樵師古曰樵與譙同謂為髙樓以望敵也音才消反校聫不絶如淳曰播校相連也師古曰此校謂用木自相貫穿以為固者亦猶周易荷校滅耳也周禮校人掌王馬之政六廐成校盖用關械闌養馬也説文觧字云校木囚也亦謂以木相貫遮闌禽獸也今云校聫不絶言營壘相次便兵弩飭鬭具師古曰便利也飭整也其字從力㷭火幸通埶及并力以逸待勞兵之利者也臣愚以為屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸徳宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺渉河山而來為宼又見屯田之士精兵萬人終不敢復將其累重還歸故地師古曰累重謂妻子也累音力瑞反重音直用反是臣之愚計所以度虜且必瓦觧其處師古曰各於其䖏自瓦觧不戰而自破之册也至於虜小宼盗時殺人民其原未可卒禁師古曰卒讀曰猝臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令虜絶不為小㓂則出兵可也師古曰亶讀曰但即今同是師古曰俱不䏻止小冦盗而釋坐勝之道從乘危之埶徃終不見利空内自罷敝師古曰罷讀曰疲貶重而自損非所以視蠻夷也師古曰視讀曰示又大兵一出還不可復留湟中亦未可空如是繇役復發也宋祁曰别本復下有更字且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以澹一隅師古曰澹古贍字贍給也臣愚以為不便校尉臨衆幸得承威徳奉厚幣拊循衆羌諭以明詔宜皆鄉風師古曰諭曉告之鄉讀曰嚮雖其前辭嘗曰得亡校五年宜亡它心不足以故出兵宋祁曰校當作效臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵􅄆車甲於山野雖亡尺寸之功媮得避慊之便師古曰媮茍且也慊亦嫌字而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅師古曰言不早殄滅賊也罪當萬死陛下寛仁未忍加誅令臣數得孰計師古曰數音所角反其下亦同愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輙下公卿議臣宋祁曰議臣字下當更有一議字初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍册其言常是臣任其計可必用也師古曰任保也上於是報充國曰皇}
