  - {type: variant, offset: 353, length: 2, content: 徵孟, WYG: 已極豈嫌伐一時事以欺明主哉兵埶國之大事當為後法老臣不以餘命壹為陛下明言兵之利害卒死誰當復言之者師古曰卒讀曰猝卒以其意對師古曰卒終也上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉其秋羌若零離留且種兒庫師古曰且音}
