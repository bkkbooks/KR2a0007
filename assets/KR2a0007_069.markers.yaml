  - {type: variant, offset: 327, length: 4, content: 孟妄設祅, WYG: 飲食遣還諭種人䕶軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營師古曰茍取文墨之便而自營衛便音頻面反非為公家忠計也師古曰為于偽反語未卒璽書報令靡忘以贖論後䍐竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦脚脛寒泄師古曰脛膝以下骨也寒泄下利也}
  - {type: variant, offset: 327, length: 4, content: 孟妄設祅, krp: 飲食遣還諭種人䕶軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營師古曰茍取文墨之便而自營衛便音頻面反非為公家忠計也師古曰為于偽反語未卒璽書報令靡忘以贖論後䍐竟不煩兵而下其秋充國病上賜書曰制詔後將軍聞苦脚脛寒泄師古曰脛膝以下骨也寒泄下利也}
