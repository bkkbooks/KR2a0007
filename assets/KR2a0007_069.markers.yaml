  - {type: variant, offset: 319, length: 0, content: '', WYG: 安國至召先零諸豪三十餘人以尤桀黠皆斬}
  - {type: variant, offset: 319, length: 0, content: '', krp: 安國至召先零諸豪三十餘人以尤桀黠皆斬}
