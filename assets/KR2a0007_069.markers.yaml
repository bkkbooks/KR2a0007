  - {type: 'tls:seg', offset: 341, content: '', id: KR2a0007_tls_069-2a.49}
  - {type: variant, offset: 341, length: 0, content: '', WYG: 兵當何時得决孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝師古曰此兵法之辭也言先自完堅令敵不䏻勝我乃可以勝敵也蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草師古曰薦稠草愁於寄託逺遯骨月離心人有畔志而明主般師罷兵鄧展曰般音班班還也萬人留田順天時因地利以待可勝之虜雖未即伏辜兵决可期月而望羌虜瓦觧前}
  - {type: page-break, offset: 341, content: '', id: KR2a0007_WYG_069-15b, image: WYG0250/WYG0250-0465b.png}
  - {type: variant, offset: 341, length: 0, content: '', krp: 兵當何時得决孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝師古曰此兵法之辭也言先自完堅令敵不䏻勝我乃可以勝敵也蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草師古曰薦稠草愁於寄託逺遯骨月離心人有畔志而明主般師罷兵鄧展曰般音班班還也萬人留田順天時因地利以待可勝之虜雖未即伏辜兵决可期月而望羌虜瓦觧前}
  - {type: variant, offset: 342, length: 0, content: '', WYG: 降者萬七百餘人及受言去者凡七十輩如淳曰羌胡言欲降受其言遣去者師古曰如説非也謂羌受充國之言歸相告喻者也羌虜即羌賊耳無豫於胡也宋祁曰七十疑作五十七此坐支觧羌虜之具也臣謹條不出兵留田便宜十二事歩兵九校師古曰一部為一校也吏士萬人留屯以為武備因田致榖威徳並行一也又因排折羌虜令不得歸肥饒之墬師古曰墬古地字也貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也師古曰並且也讀如本字又音歩浪反劉奉世曰居民得並田作並亦俱也軍馬一月之食度支田士一嵗師古曰度音大各反罷騎兵以省大費四也至春省甲士卒循河湟漕榖至臨羌以眎羌虜師古曰眎亦示字揚威武傳世折衝之具五也以閒暇時下所伐材師古曰閒讀曰閑繕治郵亭充入金城六也兵出乗危徼幸師古曰言不可必勝不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患師古曰離遭也墯謂因寒瘃而墯指者也坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乗閒之埶九也師古曰閒謂軍之間隙者也又亡驚動河南大开小开服䖍曰皆羌種在河西之河南也使生它變之憂十也治湟陿中道橋令可至鮮水以制西域信威千里師古曰信讀曰申從枕席上過師十一也鄭氏曰橋成軍行安易若於枕席上過也大費旣省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長册唯明詔博詳公卿議臣採擇上復賜報曰皇帝問後將軍言十二便聞之虜雖未伏誅兵决可期月而望期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之又大开小开前言曰我告漢軍先零所在兵不往擊久留得亡效}
