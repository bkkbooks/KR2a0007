  - {type: variant, offset: 325, length: 0, content: '', krp: 以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回逺千里師古曰回謂路紆曲也音胡悔反以一馬自佗負三十日食師古曰佗音徒何反凡以畜産載負物者皆為佗為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍引去師古曰商計度也宋祁曰稍引去當更添一稍字逐水􅋄入山林師古曰􅋄古草字隨而深入虜即據前險守後阸以絶糧道必有傷危之憂為夷狄笑千載不可復師古曰復音扶目反而武賢以為可奪其畜産虜其妻子此殆空言非至計也師古曰殆僅也又武威縣張掖日勒皆當北塞有通谷水草師古曰日勒張掖之縣臣恐匈奴與羌有謀且欲大入幸能要杜張掖酒泉以絶西域師古曰要遮也杜塞也其郡兵尤不可發先零首為畔逆它種劫略師古曰言被劫略而反叛非其本心故臣愚册欲捐䍐开闇昧之過隠而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯師古曰拊古撫字輯與集同此全師保勝安邊之册天子下其書公卿議者咸以為先零兵盛而負䍐开之助師古曰負恃也不先破䍐开則先零未可圖也上廼拜侍中樂成侯許延夀為强弩將軍即拜酒泉太守武賢為破羌將軍師古曰即就也就其郡而拜之賜璽書嘉納其册以書敕讓充國曰師古曰讓責也皇帝問後將軍甚苦暴露將軍計欲至正月廼擊䍐羌羌人當獲麥已逺其妻子師古曰徙其妻子令逺居而身來為宼也精兵萬人欲為酒泉燉煌宼邊兵少民守保不得田作今張掖以東粟石百餘芻槀束數十師古曰皆謂錢直之數言其貴轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食師古曰此畜謂畜産牛羊之屬也食謂穀麥之屬也一曰畜食畜之所食即謂草也欲至冬虜皆當畜食師古曰此畜讀曰蓄蓄聚積也多蔵匿山中依險阻將軍士寒手足皸瘃文穎曰皸坼裂也瘃寒創也師古曰皸音軍瘃音竹足反寜有利哉將軍不念中國之費欲以嵗數而勝微師古曰久歴年嵗乃勝小敵也數音所具反劉奉世曰㣲無也讀當屬下句言雖無充國誰不樂此安便也將軍誰不樂此者師古曰言凡為將軍者皆樂此今詔破羌將軍武賢將兵六千一百人燉煌太守快將二千人長水校尉富昌酒泉侯奉世將婼月氏兵四千人服䖍曰婼音兒羌名也蘇林曰婼音兒遮反師古曰蘇音是也亡慮萬二千人師古曰亡慮大計也觧在食貨志齎三十日食以七月二十二日擊䍐羌入鮮水北句亷上服䖍曰句音鉤師古曰句亷謂水岸曲而有亷稜也去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來宋祁曰並來越本作正來分散其心意離其黨與雖不能殄滅當有瓦觧者已詔中郎將卬將胡越佽飛射士歩兵二校益將軍兵今五星出東方中國大利蠻夷大敗張晏曰五星所聚其下勝羌人在西星在東則為漢太白出髙用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國旣得讓以為將任兵在外便宜有守以安國家師古曰言為將之道受任行兵於外雖受詔命若有便宜則當固守以取安利也廼上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使䍐諭告以大軍當至漢不誅䍐以觧其謀恩澤甚厚非臣下所能及臣獨私美陛下盛徳至計亡已故遣开豪雕庫宣天子至徳䍐开之屬皆聞知眀詔今先零羌楊玉此羌之首帥名王將騎四千及煎鞏騎五千阻石山木候便為宼師古曰謂依阻山之木石以自保固䍐羌未有所犯今置先零先擊䍐釋有罪誅無辜師古曰釋置也放也起壹難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人師古曰皆兵法之辭也致人引致而取之也致於人為人所引也今䍐羌欲為燉煌酒泉㓂宜飭兵馬練戰士以須其至師古曰飭整也須待也飭與勑同也坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道師古曰釋廢也宋祁曰廢也姚改作廢棄臣愚以為不便先零羌虜欲為背畔故與䍐开觧仇結約然其私心不能亡恐漢兵至而䍐开背之也臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施徳於䍐羌堅其約合其黨師古曰施徳自樹恩徳也虜交堅黨合精兵二萬餘人廹脇諸小種附著者稍衆莫須之屬不輕得離也服䖍曰莫須小種羌名也如是虜兵寖多師古曰寖漸也誅之用力數倍臣恐國家憂累繇十年數不二三嵗而已師古曰累音力瑞反繇與由同臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為眀詔填溝壑死骨不朽亡所顧念獨思惟兵利害至孰悉也於臣之計先誅先零已則䍐开之屬不煩兵而服矣先零已誅而䍐开不服渉正月擊之得利之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申}
  - {type: variant, offset: 326, length: 0, content: '', WYG: 七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚觧弛師古曰觧讀曰懈弛放也望見大軍棄車重欲渡湟水師古曰重直用反道阸狹充國徐行驅之或曰逐利行遲師古曰逐利宜疾今行太遲充國曰此窮㓂不可廹也緩之則走不顧急之則還致死師古曰謂更廻還盡力而死戰諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至䍐地令軍毋燔聚落芻牧田中師古曰不得燔燒人居及於田畝之中刈芻放牧也䍐羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得復還故地服䖍曰靡忘羌帥名也宋祁曰復還一本作還復充國以聞未報靡忘來自歸充國}
