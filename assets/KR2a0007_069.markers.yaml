  - {type: variant, offset: 320, length: 0, content: '', krp: 師古曰桀堅也言不順從也黠惡也為惡堅也縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉師古曰恐中國汎怒不信其心而納嚮之鄉讀曰嚮劉奉世曰恐怒且恐且怒也羌未有變而漢吏無故誅殺其人故楊玉等謂漢無所信向於是與他族皆叛也遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹師古曰浩音誥亹音門水名也觧在地理志為虜所擊失亡車重兵器甚衆師古曰重音直用反安國引還至令居以聞是嵗神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人師古曰度計也音大各反其下亦同充國曰百聞不如一見兵難隃度鄭氏曰隃遥也三輔言也師古曰隃讀作遥臣願馳至金城圖上方略師古曰圖其地形并為攻討方略俱奏上也然羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂師古曰屬委也音之欲反上笑曰諾充國至金城須兵滿萬騎師古曰須待也欲渡河恐為虜所遮即夜遣三校銜枚先渡師古曰銜枚者欲其無聲使虜不覺渡輙營陳㑹眀畢遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望陿中亡虜文穎曰金城有三陿在南六百里師古曰山陗而夾水曰陿四望者陿名也陿音狹夜引兵上至落都服䖍曰山名也召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數十人守杜四望陿中兵豈得入哉師古曰杜塞也充國常以逺斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府孟康曰在金城日饗軍士師古曰日饗飲之士皆欲為用虜數挑戰充國堅守捕得生口言羌豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲壹鬭而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒胡越騎為支兵至令居虜竝出絶轉道師古曰竝猶俱也轉道運糧之道也竝讀如字又音歩浪反劉奉世曰竝猶具爾羣聚不一同出鈔絶故曰竝也何煩曲觧下文分兵竝出又當為且邪卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間虜蘇林曰疏捜索也師古曰疏字本作疏言尋跡而捕之也通轉道津渡宋祁曰渡姚改作度初䍐开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪廼遣歸告種豪大兵誅有罪者明白自别母取并滅師古曰言勿相和同自取滅亡天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降䍐开及劫略者解𣪚虜謀徼極廼擊之師古曰徼要也要其倦極者也徼音工堯反時上已發三輔太常徒弛刑師古曰弛刑謂不加鉗􅎂者也弛之言觧也音式爾反三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛埶不可久或曰至秋冬廼進兵此虜在竟外之册師古曰竟讀曰境今虜朝夕為宼土地寒苦漢馬不能冬師古曰能讀曰耐屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵竝出張掖酒泉合擊䍐开在鮮水上者虜以畜産為命今皆離散兵即分出雖不能盡誅亶奪其畜産虜其妻子師古曰亶讀曰但復引兵還冬復擊之大兵仍出虜必震壊師古曰仍頻也天子}
