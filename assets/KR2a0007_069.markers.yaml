  - {type: variant, offset: 124, length: 178, content: 大柳樹斷枯臥地亦自立生有蟲食樹葉成文字曰公孫病已立孟推春秋之意以為石柳皆陰類下民之象泰山者岱宗之嶽王者易姓告代之處今大石自立僵柳復起非人力所為此當有從匹夫為天子者枯社木復生故廢之家公孫氏當復興者也孟意亦不知其所在即說曰先師董仲舒有言雖有繼體守文之君不害聖人之受命漢家堯後有傳國之運漢帝宜誰差天下求索賢人襢以帝位而退自封百里如殷周二王後以承順天命孟使友人內官, WYG: 郎遷車騎將軍}
