  - {type: variant, offset: 607, length: 0, content: '', krp: 本持橐簪筆張晏曰橐契囊也近臣負橐簪筆從備顧問或有所紀也師古曰橐所以盛書也有底曰囊無底曰橐簪筆者插筆於首宋祁曰橐舊音丁各反今讀又音託事孝武帝數十年見謂忠謹宜全度之師古曰全安而免度之不令喪敗也安世用是得免及充國還言兵事武賢罷歸故官深恨上書告卬泄省中語卬坐禁止而入至充國莫府司馬中亂屯兵如淳曰方見禁止而入至充國莫府司馬中司馬中律所謂營軍司馬中也下吏自殺充國乞骸骨賜安車駟馬黄金六十斤罷就第朝庭每有四夷大議常與參兵謀問籌策焉師古曰與讀曰豫宋祁曰庭改作廷年八十六甘露二年薨諡曰壯侯傳子至孫欽欽尚敬武公主主亡子主教欽良人習詐有身名它人子欽薨子岑嗣侯習為太夫人岑父母求錢財亡已忿恨相告岑坐非子免國除元始中修功臣後復封充國曾孫伋為營平侯師古曰伋音汲初充國以功徳與霍光等列畫未央宫成帝時西羌嘗有警上思將帥之臣追美充國廼召黄門郎揚雄卽充國圖畫而頌之師古曰即就也於畫側而書頌也曰明靈惟宣戎有先零先零昌狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震師古曰震合韻音真旣臨其域諭以威徳有守矜功謂之弗克請奮其旅于䍐之羌天子命我從之鮮陽應劭曰酒泉太守辛武賢自將萬騎出張掖擊羌宣帝使充國共武賢討䍐开於鮮水之陽也營平守節婁奏封章師古曰婁古屢字料敵制勝威謀靡亢師古曰料量也亢當也合韻音康遂克西戎還師於京鬼方賔服罔有不庭師古曰鬼方言其幽昧也庭來帝庭也一説庭直也昔周之宣有方有虎張晏曰方叔召虎也詩人歌功廼列于雅師古曰大雅小雅之詩也在漢中興充國作武赳赳桓桓亦紹厥後師古曰赳赳勁也桓桓威也紹厥後謂繼周之方召也充國為後將軍徙杜陵辛武賢自羌軍還後七年復為破羌將軍征烏孫至燉煌後不出徴未到病卒子慶忌至大官辛慶忌字子真少以父任為右校丞隨長羅侯常恵屯田烏孫赤谷城與歙侯戰師古曰歙即翕字也歙侯烏孫官名宋祁曰歙改作翖䧟陳郤敵恵奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將軍劉敞曰郎中車騎將軍不成文明衍軍字是歴郎中兼車騎將史省文總言之耳又曰郎中車騎將軍衍車軍字當云郎中騎將不然著車去騎為車將也朝廷多重之者轉為校尉遷張掖太守徙酒泉所在著名成帝初徴為光禄大夫遷左曹中郎將至執金吾始武賢與趙充國有隙後充國家殺辛氏至慶忌為執金吾坐子殺趙氏左遷酒泉太守嵗餘大將軍王鳳薦慶忌前在兩郡著功迹徴入歴位朝廷莫不信鄉師古曰鄉讀曰嚮質行正直仁勇得衆心通於兵事明略威重任國柱石師古曰任堪也父破羌將軍武賢顯名前世有威西夷臣鳳不能久䖏慶忌之右師古曰右上也廼復徴為光禄大夫執金吾數年坐小法左遷雲中太守復徴為光禄勲時數有災異丞相司直何武上封事曰虞有宫之竒晋獻不寐應劭曰晋獻公欲伐虞以宫之之竒在寢不寐宋祁曰注不寐下當添也字衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形師古曰厭抑也未有禍難之形豫勝之也厭音一葉反司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒師古曰卒讀曰猝謂暴也士不素厲則難使死敵是以先帝建列將之官近戚主内異姓距外故姦軌不得萌動而破滅師古曰始生曰萌誠萬世之長册也光禄勲慶忌行義修正柔毅敦厚師古曰和柔而能沈毅也尚書咎繇謩曰擾而毅擾亦柔也今流俗書本柔字作果者妄改之謀慮深逺前在邊郡數破敵獲虜外夷莫不聞廼者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之師古曰莊十八年公追戎於濟西公羊傳曰此未有伐中國者言追何大其未至而豫禦也劉敞曰衍災字宋祁曰注國者下當添其字慶忌宜在爪牙官以備不虞師古曰虞度也言有㓂難非意所度也其後拜為右將軍諸吏𣪚騎給事中嵗餘徙為左將軍慶忌居䖏恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平匈奴西域親附敬其威信年老卒官長子通為䕶羌校尉中子遵函谷闗都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人元始中安漢公王莽秉政見慶忌本大將軍鳳所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷水衡都尉茂自見名臣子孫兄弟並列不甚詘事兩甄時平帝幼外家衛氏不得在京師而䕶羌校尉通長子次兄素與帝從舅衛子伯相善師古曰次兄其字也兄讀如本字亦讀曰况兩人俱游俠賔客甚盛及吕寛事起莽誅衛氏兩甄搆言諸辛陰與衛子伯為心腹有背恩不説安漢公之謀師古曰説讀曰悦於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢師古曰繇讀與由同慶忌本狄道人為將軍徙昌陵昌陵罷留長安贊曰秦漢已來宋祁曰已當作以山東出相山西出將秦將軍白起郿人師古曰郿扶風之縣也音媚宋祁曰秦下當添時字王翦頻陽人漢興郁郅王圍甘延壽師古曰圍為强弩將軍見藝文志郁音於六反郅音質義渠公孫賀傅介子成紀李廣李蔡杜陵蘇建蘇武上邽上官桀趙充國襄武亷襃狄道辛武賢慶忌皆以勇武顯聞蘇辛父子著節此其可稱列者也其餘不可勝數何則山西天水隴西安定北地䖏埶廹近羌胡民俗修習戰備髙上勇力鞍馬騎射故秦詩曰王于興師修我甲兵與子皆行師古曰小戎之詩也觧在地理志其風聲氣俗自古而然今之歌謡慷慨風流猶存耳前漢書卷六十九前漢書卷六十九考證趙充國傳以假司馬從貳師將軍擊匈奴臣召南按天漢二年事也李廣利以三萬騎出酒泉擊右賢王於天山得首虜萬餘級即此役也武都氐人反充國以大將軍䕶軍云云臣召南按昭紀元鳳元年武都氐人反遣執金吾馬適建龍頟侯韓増大鴻臚廣明將三輔太常徒皆免刑擊之然則充國以䕶軍為禆將而戰功多耳又按匈奴傳匈奴降者言匈奴方發二萬騎擊烏桓霍光欲發兵要擊之以問充國充國}
