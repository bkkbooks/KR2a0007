  - {type: variant, offset: 199, length: 0, content: '', WYG: 謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不説師古曰説讀曰悦曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長㓜之序也宋祁曰新本去也字皆}
