  - {type: variant, offset: 9, length: 3, content: 孝景皇, krp: 國引兵將東擊齊未度平原聞漢王使酈食其説下齊信欲止通説信曰將軍受詔擊齊而漢獨發閒使下齊寜有詔止將軍乎師古曰閒使謂使人伺間隙而單行何以得無行且酈生一士伏軾掉三寸舌下齊七十餘城師古曰掉揺也音徒釣反將軍將數萬之衆廼下趙五十餘城為將數歲反不如一豎儒之功乎於是信然之從其計遂度河齊已聽酈生即留之縱酒罷備漢守禦信因襲歴下軍遂至臨菑齊王以酈生為欺已而亨之因敗走信遂定齊地自立為齊假王漢方困於滎陽遣張良即立信為齊王以安固之項王亦遣武涉説信欲與連和蒯通知天下權在信欲説信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言張晏曰言背者云背畔則大貴信曰何謂也通因請間師古曰不欲顯言故請問隙而私説曰天下初作難也俊䧺豪桀建號壹呼師古曰建號者自立為侯王呼音火故反天下之士雲合霧集魚鱗雜襲師古曰雜襲猶雜沓言相雜而累積飄至風起師古曰飄讀曰焱謂疾風音必遥反當此之時憂在亡秦而已師古曰志滅秦所憂者唯此今劉項分爭使人肝腦塗地流離中野不可勝數漢王將數十萬衆距鞏雒岨山河一日數戰亡尺寸之功折北不救師古曰折挫也北奔也不救謂無援助也敗滎陽傷成臯張晏曰於成臯戰傷胷也還走宛葉之間此所謂智勇俱困者也楚人起彭城轉鬭逐北至滎陽乘利席勝威震天下師古曰席因也若人之在席上然兵困於京索之間師古曰索音山客反廹西山而不能進三年於此矣師古曰至今已三年鋭氣挫於嶮塞糧食盡於内藏百姓罷極無所歸命師古曰罷讀曰疲以臣料之師古曰料量也非天下賢聖其埶固不能息天下之禍當今之時兩主縣命足下足下為漢則漢勝與楚則楚勝臣願披心腹墮肝膽師古曰墮毁也音火規反效愚忠恐足下不能用也方今為足下計莫若兩利而俱存之參分天下鼎足而立其埶莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虚之地以制其後因民之欲西鄉為百姓請命師古曰鄉讀曰嚮齊國在東故曰西嚮止楚漢之戰鬭士卒不死亡故云請命天下孰敢不聽足下按齊國之故有淮泗之地懷諸侯以德深拱揖讓師古曰深拱猶高拱則天下君王相率而朝齊矣蓋聞天與弗取反受其咎時至弗行反受其殃願足下孰圖之信曰漢遇我厚吾豈可見利而背恩乎通曰始常山王成安君故相與為刎頸之交宋祁曰一本無之字及爭張黶陳釋之事師古曰黶音一㸃反常山王奉頭䑕竄以歸漢王師古曰言其廹窘逃亡如鼠之藏竄宋祁曰史記韓信傳作奉項嬰頭而竄逃歸於漢借兵東下戰於鄗北成安君死於泜水之南師古曰鄗音呼各反泜音祗又音丁計反頭足異處此二人相與天下之至驩也而卒相滅亡者何也患生於多欲而人心難測也今足下行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳釋之事者故臣以為足下必漢王之不危足下過矣師古曰過猶誤也宋祁曰楊本用諸名公本校郭去必漢王之不危足下八字大夫種存亡越伯句踐師古曰令句踐致覇功也伯讀曰霸立功名而身死語曰野禽殫走犬亨師古曰殫盡也音單敵國破謀臣亡故以交友言之則不過張王與成安君以忠臣言之則不過大夫種此二者宜足以觀矣願足下深慮之且臣聞之勇畧震主者身危功蓋天下者不賞足下涉西河虜魏王禽夏説師古曰説讀曰悦下井陘誅成安君之罪以令於趙脅燕定齊南摧楚人之兵數十萬衆遂斬龍且西鄉以報師古曰且音子餘反鄉讀曰嚮此所謂功無二於天下畧不世出者也師古曰言其計畧奇異世所希有今足下挾不賞之功戴震主之威歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎師古曰安焉也此下亦同夫埶在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之師古曰念猶思也數日通復説曰聽者事之候也師古曰謂能聽善謀也計者存亡之機也夫隨厮養之役者失萬乘之權守儋石之禄者闕卿相之位應劭曰齊人名小甖為儋受二斛晉灼曰石斗石也師古曰儋音都濫反或曰儋者一人之所負擔也計誠知之而決弗敢行者百事之禍也故猛虎之猶與不如蠭蠆之致蠚師古曰與讀曰豫蠆蝎也蠚毒也蠆音丑界反蠚音呼各反孟賁之狐疑不如童子之必至師古曰孟賁古之勇力士賁音奔此言貴能行之也夫功者難成而易敗時者難值而易失時乎時不再來師古曰此古語歎時之不可失願足下無疑臣之計信猶與不忍背漢又自以功多漢不奪我齊遂謝通師古曰告令罷去通説不聽惶恐乃陽狂為巫天下既定後信以罪廢為淮陰侯謀反被誅臨死歎曰悔不用蒯通之言死於女子之手高}
