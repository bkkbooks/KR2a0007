  - {type: variant, offset: 6, length: 0, content: '', WYG: 十五蒯通范陽人也師古曰涿郡之縣也舊屬燕通本燕人後游於齊故高祖云齊辯士蒯通本與武帝同諱師古曰本名為徹其後史家追書為通楚漢初起武臣畧定趙地宋祁曰一本定作燕號武信君通説范陽令徐公曰臣范陽百姓蒯通也竊閔公之將死故弔之雖然賀公得通而生也徐公再拜曰何以弔之通曰足下為令十餘年矣殺人之父孤人之子斷人之足黥人之首甚衆慈父孝子所以不敢事刃於公之腹者畏秦法也李奇曰東方人以物臿地中為事師古曰事音側吏反字本作倳周官考工記又作菑音皆同耳今天下大亂秦政不施師古曰施設也立也然則慈父孝子將爭接刃於公之腹以復其怨而成其名師古曰復猶報也音扶目反宋祁曰越本名上有功字此通之所以弔者也曰何以賀得子而生也曰趙武信君不知通不肖使人候問其死生通且見武信君而説之師古曰今將欲見之曰必將戰勝而後畧地攻得而後下城臣竊以為殆矣師古曰殆危也用臣之計毋戰而畧地不攻而下城傳檄而千里定可乎彼將曰何謂也師古曰彼謂武信君也臣因對曰范陽令宜整頓其士卒以守戰者也怯而畏死貪而好富貴故欲以其城先下君先下君而君不利宋祁曰一本利下有之字則邊地之城皆將相告曰范陽令先降而身死必將嬰城固守孟康曰嬰以城自繞皆為金城湯池不可攻也師古曰金以喻堅湯喻沸熱不可近為君計者莫若以黃屋朱輪迎范陽令使馳騖於燕趙之郊師古曰令衆皆見則邊城皆將相告曰范陽令先下而身富貴必相率而降猶如阪上走丸也師古曰言乗勢便易此臣所謂傳檄而千里定者也徐公再拜具車馬遣通通遂以此説武臣武臣以車百乘騎}
