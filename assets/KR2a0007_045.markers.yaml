  - {type: variant, offset: 4796, length: 1, content: 議, krp: 相連下獄百餘人師古曰親黨及朋友躬母聖坐祠竈祝詛上大逆不道聖棄市妻充漢與家屬徙合浦躬同族親屬素所厚}
  - {type: variant, offset: 4799, length: 0, content: '', WYG: 免廢錮師古曰終身不得仕哀帝崩有司奏方陽侯寵及右師譚等皆造作姦謀罪及王者骨肉雖蒙赦令不宜處爵位在中土皆免寵等徙合浦郡初躬待詔數危言高論自恐遭害著絶命辭曰𤣥靈泱鬱將安歸兮師古曰泱鬱盛貌泱音烏朗反鷹隼横厲鸞徘徊兮師古曰厲疾飛也鸞神鳥也赤靈之精赤色五采雞形鳴中五音徘徊謂不得其所也矰若浮猋動則機兮師古曰矰弋射矢也猋疾風也言繒弋張設其疾若風動則機發猋音必遥反叢棘􅳞􅳞曷可棲兮師古曰􅳞􅳞衆盛貌音仕山反宋祁曰􅳞當作棧發忠忘身自繞罔兮寃頸折翼庸得往兮應劭曰雖寃頸折翼庸得不徃也張晏曰䧟於讒人之網何用得去也師古曰寃屈也張説是涕泣流兮萑蘭張晏曰萑蘭草名也蔓延於地有所依憑則起躬怨哀帝不用己為大臣}
