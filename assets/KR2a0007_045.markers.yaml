  - {type: variant, offset: 2705, length: 4, content: 懲吳楚七, WYG: 師古曰詆謂毁訾也音丁禮反曰方今丞相王嘉健而蓄縮不可用師古曰蓄縮謂􅈔於事也御史大夫賈延墮弱不任職左將軍公孫禄司𨽻鮑宣皆外有直項之名内實騃不曉政事師古曰騃愚也音五駭反諸曹以下僕遫不足數師古曰僕遫凡短之貌也僕音步木反遫古速字卒有彊弩圍城長㦸指闕師古曰卒讀曰猝陛下誰與備之如使狂夫嘄謼於東崖師古曰東崖謂東海之邊也嘄古呌字謼音火故反匈奴飲馬於渭水邊竟雷動四野風起師古曰竟讀曰境京師雖有武蠭精兵未有能窺左足而先應者也蘓林曰窺音跬師古曰跬半步也言一舉足也音口婢反軍書交馳而輻湊羽檄重迹而押至文頴曰押音狎習之狎師古曰押至言相因而至也羽檄檄之揷羽者也解在高紀小夫愞臣之徒憒眊不知所為師古曰憒心亂也眊目闇也憒音工内反眊音莫報反其有犬馬之決者仰藥而伏刃師古曰仰藥仰首而飲藥雖加夷滅之誅何益禍敗之至哉躬又言秦開鄭}
  - {type: page-break, offset: 2705, content: '', id: KR2a0007_WYG_045-21b, image: WYG0250/WYG0250-0098b.png}
  - {type: variant, offset: 2705, length: 4, content: 懲吳楚七, krp: 師古曰詆謂毁訾也音丁禮反曰方今丞相王嘉健而蓄縮不可用師古曰蓄縮謂吝於事也御史大夫賈延墮弱不任職左將軍公孫禄司𨽻鮑宣皆外有直項之名内實騃不曉政事師古曰騃愚也音五駭反諸曹以下僕遫不足數師古曰僕遫凡短之貌也僕音步木反遫古速字卒有彊弩圍城長㦸指闕師古曰卒讀曰猝陛下誰與備之如使狂夫嘄謼於東崖師古曰東崖謂東海之邊也嘄古呌字謼音火故反匈奴飲馬於渭水邊竟雷動四野風起師古曰竟讀曰境京師雖有武蠭精兵未有能窺左足而先應者也蘓林曰窺音跬師古曰跬半步也言一舉足也音口婢反軍書交馳而輻湊羽檄重迹而押至文頴曰押音狎習之狎師古曰押至言相因而至也羽檄檄之揷羽者也解在高紀小夫愞臣之徒憒眊不知所為師古曰憒心亂也眊目闇也憒音工内反眊音莫報反其有犬馬之決者仰藥而伏刃師古曰仰藥仰首而飲藥雖加夷滅之誅何益禍敗之至哉躬又言秦開鄭}
  - {type: variant, offset: 2710, length: 1, content: 行, WYG: 渠以富國彊兵今京師土地肥饒可度地埶水泉廣溉灌之利師古曰度音徒各反天子使躬持節領䕶三輔都水躬立表欲穿長安城引漕注太倉下以省轉輸議不可成廼止董賢貴幸日盛丁傅害其寵孔鄉侯晏與躬謀欲求居位輔政會單于當來朝遣使言病願朝明年躬因是而上奏以為單于當以十一月入塞後以病為解師古曰自解説云病疑有他變烏孫兩昆彌弱卑爰强盛蘇林曰音欬嚏之嚏晉灼曰音載疐其尾之疐師古曰以字言之晉音是音竹二反而匈奴傳服䖍乃音㨗既已失之末俗學者又改疐字為􅛨以應服氏之音尤離真矣宋祁曰正文弱字上當有微字居彊煌之地臣瓚曰是其國所都地名擁十萬之衆東結單于遣子往侍如因素彊之威循烏孫就屠之跡孟康曰烏孫先王也舉兵南伐并烏孫之埶也烏孫并則匈奴盛而西域危矣可令降胡詐為卑爰􅕆使者來上書曰曰所以遣子侍單于者非親信之也實畏之耳唯天子哀師古曰謂閔念之告單于歸臣侍子願助戊已校尉保惡都奴之界因下其章諸將軍令匈奴客聞焉則是所謂上兵伐謀服䖍曰謀者舉兵伐解之也師古曰此説非也言知敵有謀者則以}
