  - {type: variant, offset: 2703, length: 0, content: '', WYG: 皇后父特進孔鄉侯傅晏與躬同郡相友善躬繇是以為援交㳺日廣師古曰繇讀與由同先是長安孫寵亦以游説顯名免汝南太守師古曰為太守免而歸也與躬相結俱上書召待詔是時哀帝被疾始即位而人有告中山孝王太后祝詛上太后及弟宜鄉侯馮參皆自殺其罪不明是後無鹽危山有石自立開道服䖍曰山開自成道也張晏曰從石立之下徑道自通也躬與寵謀曰上亡繼嗣體久不平闗東諸侯心爭陰謀今無鹽有大石自立聞邪臣託往事以為大山石立而先帝龍興師古曰言邪人有此私議東平王雲以故與其后日夜祠祭祝詛上欲求非望師古曰言求帝位也而后舅伍宏反因方術以醫技得幸出入禁門霍顯之謀將行於杯杓師古曰杓所以抒挹也字與勺同音上灼反荆軻之變必起於帷幄事勢若此告之必成察國姦誅主讎取封侯之計也宋祁曰察當作發躬寵廼與中郎右師譚張晏曰右師姓譚名也共因中常侍宋宏上變事告焉上惡之下有司案驗東平王雲雲后謁及伍宏等皆坐誅師古曰謁者后之名也上擢寵為南陽太守譚潁川都尉宏躬皆光禄大夫左曹給事中是時侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為高安侯寵為方陽侯躬為宜陵侯食邑各千戸賜譚爵闗内侯食邑丞相王嘉内疑東平獄事師古曰疑不實也爭不欲侯賢等語在嘉傳嘉固言董賢泰盛寵躬皆傾覆有佞邪材恐必撓亂國家師古曰撓攪也撓音呼高反不可任用嘉以此得罪矣躬既親近數進見言事論議亡所避衆畏其口見之庂目師古曰庂古側字躬上疏歴詆公卿}
