  - {type: variant, offset: 1145, length: 629, content: 立之具知建事行錢使男子荼恬上書告建淫亂不當為後事下廷尉廷尉治恬受人錢財為上書論棄市建罪不治後數使使至長安迎徵臣魯恭王太后聞之遺徵臣書曰國中口語籍籍慎無復至江都後建使謁者吉請問共太后太后泣謂吉歸以吾言謂而王王前事漫漫今當自謹獨不聞燕齊事乎言吾為而王泣也吉歸致共太后語建大怒擊吉斥之建游章臺宮令四女子乘小舩建以足蹈覆其舩四人皆溺二人死後游雷波天大風建使郎二人乘小舩入波中舩覆兩郎溺攀舩乍見乍沒建臨觀大笑令皆死宮人姬八子有過者輒令臝立擊鼓或置樹上久者三十日乃得衣或髡鉗以鈆杵舂不中程輒掠或縱狼令齧殺之建觀而大笑或閉不食令餓死凡殺不辜三十五人建欲令人與禽獸交而生子彊令宮人臝而四據與羝羊及狗交專為淫虐自知罪多國中多欲告言者建恐誅心內不安與其后成光共使越婢下神祝詛上與郎中令等語怨望漢廷使者即復來覆我我決不獨死建亦頗聞淮南衡山陰謀恐一日發為所并遂作兵器號王后父胡應為將軍中大夫疾有材力善騎射號曰靈武君作治黃屋蓋刻皇帝璽鑄將軍都尉金銀印作漢使節二十綬千餘具置軍官品員及拜爵封侯之賞具天下之輿地及軍陳圖遣人通越繇王閩侯遺以錦帛奇珍繇王閩侯亦遺建荃葛珠璣犀甲翠羽蝯熊奇獸數通使往來約有急相助及淮南事發治黨與頗連及建建使人多推金錢絕其獄後復謂近臣曰我為王詔獄歲至生又無驩怡日壯士不坐死欲為人所不能為耳建時佩其父所賜將軍印載天子旗出積數歲事發覺漢遣丞相長史與江都相雜案索得兵器璽綬節反具有司請捕誅建制曰與列侯吏二千石博士議議皆曰建失臣子道積久輒蒙不忍遂謀反逆所行無道雖桀紂惡不至, WYG: ''}
