  - {type: variant, offset: 2400, length: 0, content: '', WYG: 竟敗趙太子張晏曰雖遇赦終見廢也初充召見犬臺宮晉灼曰黄圖上林有犬臺宮外有走狗觀也師古曰今書本犬臺有作太壹字者誤也漢無太壹宮也自請願以所常被服冠見上師古曰被音皮義反宋祁曰冠字上當有衣字上許之充衣紗縠襌衣師古曰紗縠紡絲而織之也輕者為紗縐者為縠襌衣制若今之朝服中襌也漢官儀曰武賁中郎將衣紗縠襌衣襌音單字從衣次下亦同曲裾後􅂷交輸張晏曰曲裾者如婦人衣也如淳曰交輸割正幅使一頭狹若燕尾垂之兩旁見於後是禮深衣續袵鉤邊賈逵謂之衣圭蘇林曰交輸如今新婦袍上挂全幅繒角割名曰交輸裁也師古曰如蘇二説皆是也冠襌纚步揺冠飛翮之纓服䖍曰冠襌纚故行歩則揺以鳥羽作纓也蘇林曰析翠鳥羽以作蕤也臣瓚曰飛翮之纓謂如蟬翼者也師古曰服説是也纚織絲為之即今方目紗是也纚音山爾反揺音弋招反充為人魁岸容貌甚壯師古曰魁大也岸者有亷稜如崖岸之形帝望見而異之謂左右曰燕趙固多奇士既至前問以當世政事上説之充因自請願使匈奴詔問其狀充對曰因變制宜以敵為師事不可豫圖上以充為謁者使匈奴還拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僭充皆舉劾奏請没入車馬令身待北軍擊匈奴文穎曰令貴戚身待於北軍也奏可充即移書光禄勲中黄門逮名近臣侍中宋祁曰浙本名作召諸當詣北軍者移劾門衞禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍凡數千萬上以充忠直奉法不阿所言中意師古曰中當也充出逄館陶長公主行馳道中師古曰武帝之姑即陳皇后母也充呵問之公主曰有太后詔劉攽曰是時太后已崩言太后詔者素得此詔許其行馳道中也充曰獨公主得行車騎皆不得師古曰從公主之車騎也盡劾没入官如淳曰令乙騎乗車馬行馳道中已論者没入車馬被具後充從上甘泉師古曰甘泉在北山故言上也他皆類此逄太子家使師古曰太子遣人之甘泉請問者也使音山吏反乘車馬行馳道中充以屬吏師古曰屬音之欲反太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者師古曰言素不教敕左右唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師遷為水衡都尉宗族知友多得其力者}
