  - {type: variant, offset: 4800, length: 0, content: '', WYG: 致治也臣瓚曰萑蘭泣涕闌干也師古曰瓚説是萑音完心結愲兮傷肝師古曰結愲亂也孟康曰愲音骨虹蜺曜兮日微張晏曰虹蜺邪陰之氣而有照曜以蔽日月云讒言流行忠良浸微也孽杳冥兮未開如淳曰虹蜺覆日光明謂之孽師古曰孽邪氣也音牛列反痛入天兮鳴謼寃際絶兮誰語張晏曰躬自以被讒枉而與君絶也師古曰鳴謼者以鳥自喻也誰語言無所告語也謼音火故反語音牛助反仰天光兮自列招上帝兮我察張晏曰上帝天也招呼也師古曰列謂陳列其本心秋風}
  - {type: page-break, offset: 4800, content: '', id: KR2a0007_WYG_045-27a, image: WYG0250/WYG0250-0101a.png}
  - {type: variant, offset: 4800, length: 0, content: '', krp: 致治也臣瓚曰萑蘭泣涕闌干也師古曰瓚説是萑音完心結愲兮傷肝師古曰結愲亂也孟康曰愲音骨虹蜺曜兮日微張晏曰虹蜺邪陰之氣而有照曜以蔽日月云讒言流行忠良浸微也孽杳冥兮未開如淳曰虹蜺覆日光明謂之孽師古曰孽邪氣也音牛列反痛入天兮鳴謼寃際絶兮誰語張晏曰躬自以被讒枉而與君絶也師古曰鳴謼者以鳥自喻也誰語言無所告語也謼音火故反語音牛助反仰天光兮自列招上帝兮我察張晏曰上帝天也招呼也師古曰列謂陳列其本心秋風}
  - {type: variant, offset: 4801, length: 6, content: 去悖虐聽后昭, WYG: 我唫浮雲為我陰師古曰唫古吟字嗟若是兮欲何留師古曰言變故如是何用久留而生撫神龍兮㩜其湏師古曰㩜與擥同謂執持之游曠廻兮反亡期師古曰言一死不可復生宋祁曰姚本廻作迥雄失據兮世我思師古曰雄謂君上也據謂尊位也言上失所據乃思我耳後數年乃死如其文贊曰仲尼惡利口之覆邦家應劭曰事具論語蒯通一説而䘮三雋應劭曰亨酈食其敗田横驕韓信也其得不亨者幸也伍被安於危國身為謀主忠不終而詐讎李奇曰詐為王畫䇿而讎見納也師古曰讎讀曰售謂被初忠於漢而不能終為王畫詐偽之䇿而見納用也宋祁曰注文售姚本作誅夷不亦宜乎書放四罪師古曰謂流共工放驩兠竄三苖殛鯀也事見虞書詩歌青蠅師古曰小雅青蠅之詩也其首章曰營營青蠅止於樊愷悌君子無}
  - {type: page-break, offset: 4801, content: '', id: KR2a0007_WYG_045-27b, image: WYG0250/WYG0250-0101b.png}
