  - {type: variant, offset: 5012, length: 507, content: 年平帝元始二年復立戴王弟襄隄侯子瘉為廣德王奉惠王後二年薨子赤嗣王莽時絕膠東康王寄以孝景中二年立二十八年薨淮南王謀反時寄微聞其事私作兵車鏃矢戰守備備淮南之起及吏治淮南事辭出之寄於上最親意自傷發病而死不敢置後於是上聞寄有長子賢母無寵少子慶母愛幸寄常欲立之為非次因有過遂無所言上憐之立賢為膠東王奉康王祀而封慶為六安王王故衡山地膠東王賢立十五年薨諡為哀王子戴王通平嗣二十四年薨子頃王音嗣五十四年薨子共王授嗣十四年薨子殷嗣王莽時絕六安共王慶立三十八年薨子夷王祿嗣十年薨子繆王定嗣二十二年薨子頃王光嗣二十七年薨子育嗣王莽時絕清河哀王乘以孝景中三年立十二年薨無子國除常山憲王舜以孝景中五年立舜帝少子驕淫數犯禁上常寬之三十三年薨子勃嗣為王初憲王有不愛姬生長男梲梲以母無寵故亦不得幸於王王后脩生太子勃王內多所幸姬生子平子商王后稀得幸及憲王疾甚諸幸姬侍病王后以妒媢不常在輒歸舍醫進藥太子勃不自嘗藥又不宿留侍疾及王薨王后太子乃至憲王雅不以梲為子數不分與財物郎或說太子王后令分梲財皆不聽太子代立又不收恤梲梲怨王后及太子漢使者視憲王喪梲自言憲王病時王后太子不侍及薨六日出舍太子勃私姦飲酒博戲擊筑與女子載馳環城過市入獄視囚天子遣大行騫驗問逮諸, WYG: 考}
