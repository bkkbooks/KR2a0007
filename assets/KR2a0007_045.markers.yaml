  - {type: variant, offset: 3481, length: 290, content: 有身已乃覺非程姬也及生子因名曰發以孝景前二年立以其母微無寵故王卑溼貧國二十八年薨子戴王庸嗣二十七年薨子頃王鮒鮈嗣十七年薨子剌王建德嗣宣帝時坐獵縱火燔民九十六家殺二人又以縣官事怨內史教人誣告以棄市罪削八縣罷中尉官三十四年薨子煬王旦嗣二年薨無子絕歲餘元帝初元三年復立旦弟宗是為孝王五年薨子魯人嗣王莽時絕廣川惠王越以孝景中二年立十三年薨子繆王齊嗣四十四年薨初齊有幸臣乘距已而有罪欲誅距距亡齊因禽其宗族距怨王乃上書告齊與同產姦是後齊數告言漢公卿及幸臣所忠等又告中尉蔡彭祖捕子明罵曰吾盡汝種矣有司案驗不如王言劾齊誣罔大不敬請繫治齊恐上書願與廣川勇士奮擊匈奴上許之未發病薨有司請除國奏可後數月, WYG: ''}
