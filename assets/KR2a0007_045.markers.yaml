  - {type: variant, offset: 199, length: 0, content: '', krp: 謂因天心以動作者也王曰方今漢庭治乎亂乎被曰天下治王不説師古曰説讀曰悦曰公何以言治也被對曰被竊觀朝廷君臣父子夫婦長㓜之序也宋祁曰新本去也字皆}
  - {type: variant, offset: 200, length: 0, content: '', WYG: 其理上之舉錯遵古之道師古曰錯音千故反風俗紀綱未有所缺重裝富賈周流天下道無不通交易之道行南越賓服羌􅈎貢獻東甌入朝師古曰􅈎西南夷也音蒲北反廣長榆如淳曰廣謂斥大之也長榆塞名王恢所謂樹榆以為塞者也師古曰長榆在朔方即衛青傳所云榆谿舊塞是也或謂之榆中開朔方匈奴折傷雖未及古太平時然猶為治宋祁曰浙本句末有也字王怒被謝死罪王又曰山東即有變漢必使大將軍將而制山東公以為大將軍何如人也被曰臣所善黄義從大將軍擊匈奴言大將軍遇士大夫以禮與士卒有恩衆皆樂為用騎上下山如飛神力絶人如此宋祁曰一本作材力絶人一本作人材知此浙本作身材如此數將習兵未易當也及謁者曹梁使長安來言大將軍號令明當敵勇常為士卒先湏士卒休乃舍穿井得水廼敢飲軍罷士卒已踰河廼度皇太后所賜金錢盡以賞賜雖古名將不過也王曰夫蓼太子服䖍曰淮南太子也文穎曰食采於此或言外家姓也師古曰蓼自地名而王之太子豈以食地為號文言外家姓近為得之亦猶漢之栗太子也知畧不世出非常人也以為漢廷公卿列侯皆如沐猴而冠耳被曰獨先刺大將軍乃可舉事王復問被曰公以為吳舉兵非邪被曰非也夫吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒尊之也如淳曰祭祠時唯尊長者以酒沃酹師古曰如説是也受几杖而不朝王四郡之衆地方數千里采山銅以為錢煑海水以為鹽伐江陵之木以為船國富民衆行珍寶賂諸侯與七國合從舉兵而西破大梁敗狐父師古曰在梁碭之間也父音甫奔走而還為越所禽死於丹徒師古曰即今潤州丹徒縣也頭足異處身滅祀絶為天下戮師古曰天下之人皆共戮之一曰天下之大戮也夫以吳衆不能成功者何也誠逆天違衆而不見時也王曰男子之所死者一言耳張晏曰不成即死一言耳臣瓚曰或有一言云以死報也師古曰二説死並非也言男子感氣相許一言不顧其死或曰一言之恨不顧危亡以此致死也劉攽曰此言所死雖不同等是死耳且吳何知反漢將一日過成臯者四十餘人師古曰言不知塞成臯口而令漢將得出之是不知反計也今我令緩先要成臯之口韋昭曰淮南臣名也師古曰緩者名也不言其姓今流俗}
