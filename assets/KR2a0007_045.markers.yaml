  - {type: variant, offset: 201, length: 0, content: '', krp: 本於緩上妄加樓字非也周被下潁川兵塞轘轅伊闕之道陳定發南陽兵守武闗河南太守獨有雒陽耳師古曰如此計則漢河南郡唯有雒陽在耳餘}
  - {type: variant, offset: 202, length: 0, content: '', WYG: 不屬何足憂然此北尚有臨晉闗河東上黨與河内趙國界者通谷數行如淳曰言此北尚嶮阻其谿谷可得通行者有數處人言絶成臯之道天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐陰事泄謂被曰事至吾欲遂發天下勞苦有間矣如淳曰言天下勞苦人心有間隙易動亂師}
  - {type: variant, offset: 202, length: 0, content: '', krp: 不屬何足憂然此北尚有臨晉闗河東上黨與河内趙國界者通谷數行如淳曰言此北尚嶮阻其谿谷可得通行者有數處人言絶成臯之道天下不通據三川之險招天下之兵公以為何如被曰臣見其禍未見其福也後漢逮淮南王孫建繫治之王恐陰事泄謂被曰事至吾欲遂發天下勞苦有間矣如淳曰言天下勞苦人心有間隙易動亂師}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 曰此説非也有間猶言中閒已有也故謂此者乃為間也宋祁曰浙本注文此者作比者諸侯頗有失行皆自疑我舉兵西鄉必有應者師古曰鄉讀曰嚮無應即還畧衡山勢不得不發被曰畧衡山以擊廬江有尋陽之船守下雉之城孟康曰下雉江夏縣名師古曰雉音羊氏反結九江之浦絶豫章之口彊弩臨江而守以禁南郡之下東保㑹稽南通勁越屈彊江淮間師古曰屈音具勿反可以延歲月之壽耳未見其福也王曰左吳趙賢朱驕如皆以為什八九成師古曰吳賢驕如王之三臣也公獨以為無福何被曰大王之羣臣近幸素能使衆者皆前繫詔獄餘無可用者王曰陳勝吳廣無立錐之地百人之聚起于大澤奮臂大呼天下嚮應師古曰呼音火故反嚮讀曰響西至於戲而兵百二十萬今吾國雖小勝兵可得二十萬公何以言有禍無福被曰臣不敢避子胥之誅願大王無為吳王之聽徃者秦為無道殘賊天下殺術士燔詩書滅聖跡棄禮義任刑法轉海瀕之粟致于西河師古曰瀕涯也海瀕謂縁海涯之地瀕音頻又音賓當是之時男子疾耕不足於糧餽師古曰餽亦饋字也女子紡績不足於蓋形遣䝉恬築長城東西數千里暴兵露師常數十萬死者不可勝數僵尸滿野流血千里於是百姓力屈師古曰屈盡也音其勿反欲為亂者十室而五又使徐福入海求仙藥多齎珍寶童男女三千人五種百工而行師古曰五種五穀之種也徐福得平原大澤止王不來於是百姓悲痛愁思欲為亂者十室而六又使尉佗踰五嶺攻百越師古曰五嶺解在張耳傳尉佗知中國勞極止王南越師古曰南越傳云南海尉任囂謂趙佗曰聞陳勝等作亂豪桀叛秦相立即被佗書行南海尉事囂死後佗始自為王今此乃言尉佗先王陳勝乃反此蓋伍被一時對辭不究其實也行者不還往者莫返於是百姓離心瓦解欲為亂者十室而七興萬乘之駕作阿房之宮收太半之賦發閭左之戍師古曰閭左解在食貨志父不寧子兄不安弟師古曰言不能相保政苛刑慘民皆引領而望傾耳而聽悲號仰天叩心怨上師古曰叩擊也欲為亂者十室而八客謂高皇帝曰時可矣高帝曰待之聖人當起東南間不一歲陳吳大呼師古曰中間不經一歲也呼音火故反劉項並和天下嚮應師古曰和音胡卧反嚮讀曰響所謂蹈瑕釁因秦之亡時而動百姓願之若枯旱之望雨故起於行陣之中以成帝王之功今大王見高祖得天下之易也獨不觀近世之吳楚乎當今陛下臨制天下一齊海内汜愛蒸庻師古曰氾普也蒸亦衆也汜音敷劒反布德施惠口雖未言聲疾雷震令雖未出化馳如神心有所懷威動千里下之應上猶景嚮也師古曰言如影之隨形響之應聲嚮讀曰響而大將軍材能非直章邯揚熊也王以陳勝吳廣論之被以為過矣師古曰過誤也且大王之兵衆不能什分吳楚之一天下安寧又萬倍于秦時願王用臣之計臣聞箕子過故國而悲作麥秀之歌張晏曰箕子將朝周過殷故都見麥及禾黍心悲乃作歌曰麥秀之漸漸兮黍苖之繩繩兮彼狡童兮不與我好兮狡童謂紂也痛紂之不用王子比干之言也故孟子曰紂貴為天子死曾不如匹夫是紂先自絶久矣非死之日天去之也今臣亦竊悲大王棄千乘之君將賜絶命之書為羣臣先師古曰在羣臣先死宋祁曰浙本注}
