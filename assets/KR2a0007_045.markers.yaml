  - {type: punctuation, offset: 587, content: 「, id: KR2a0007_tls_045-bkkpn134}
  - {type: variant, offset: 587, length: 294, content: 河間王良喪太后三年為宗室儀表其益封萬戶二十七年薨子尚嗣王莽時絕臨江哀王閼以孝景前二年立三年薨無子國除為郡臨江閔王榮以孝景前四年為皇太子四歲廢為臨江王三歲坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕竊言曰吾王不反矣榮至詣中尉府對簿中尉郅都簿責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之榮最長亡子國除地入于漢為南郡魯恭王餘以孝景前二年立為淮陽王吳楚反破後以孝景前三年徙王魯好治宮室苑囿狗馬季年好音不喜辭為人口吃難言二十八年薨子安王光嗣初好音樂輿馬晚節遴唯恐不足於財四十年薨子孝王慶忌嗣三十七年薨子頃王勁嗣二十八年薨子文王睃嗣十八年薨亡子國除哀帝建平三年復立頃王子睃弟郚鄉侯閔, WYG: 被首}
