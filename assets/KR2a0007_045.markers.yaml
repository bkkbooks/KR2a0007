  - {type: variant, offset: 4810, length: 4, content: 燔燒亨煮, WYG: 蓋蠅之為蟲毁汙白黑以喻佞人變亂善惡春秋以來禍敗多矣昔子翬謀桓而魯隱危應劭曰公子翬謂隱公曰吾將為君殺桓公以我為太宰公曰為其少故今將授之矣翬懼反譖隱公而殺之欒書搆郤而晉厲弑應劭曰變書使楚公子茷語厲公曰鄢陵之戰郤至以為必敗欲奉孫周以代君也公信之而滅三卻欒書因以反弑厲公宋祁曰注文孫周姚本作孫同豎牛奔仲叔孫卒張晏曰牛叔孫穆子之孽子也仲正妻子也牛讒仲叔孫怒而逐之奔齊叔孫病牛餓殺之郈伯毁季昭公逐張晏曰郈昭伯毁季平子於昭公昭公伐平子不勝因出奔齊費忌納女楚建走應劭曰楚平王為太子建娶於秦無忌曰秦女美甚勸王自納之因而構焉云其怨望今將畔令王殺之宰嚭譖胥夫差䘮應劭曰吳將伐齊子胥諫之宰嚭曰伍胥自以先王謀臣心常鞅鞅臨事沮大衆冀國之敗夫差大怒賜之屬鏤之劒其明年越滅吳李園進妹春申斃張晏曰李園春申君之舍人也進其妹於春申君已有身使妹謂春申君曰楚王無子百年之後將立兄弟君用事日久多失禮於王之兄弟兄弟誠立禍將及身今妾有子人莫知若進妾於王後若}
  - {type: page-break, offset: 4810, content: '', id: KR2a0007_WYG_045-28a, image: WYG0250/WYG0250-0101c.png}
