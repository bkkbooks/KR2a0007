  - {type: variant, offset: 1775, length: 303, content: 此天誅所不赦當以謀反法誅有詔宗正廷尉即問建建自殺后成光等皆棄市六年國除地入于漢為廣陵郡絕百二十一年平帝時新都侯王莽秉政興滅繼絕立建弟盱眙侯子宮為廣陵王奉易王後莽篡國絕膠西于王端孝景前三年立為人賊盭又陰痿一近婦人病數月有所愛幸少年以為郎郎與後宮亂端禽滅之及殺其子母數犯法漢公卿數請誅端天子弗忍而端所為滋甚有司比再請削其國去太半端心慍遂為無訾省府庫壞漏盡腐財物以鉅萬計終不得收徙令吏毋得收租賦端皆去衛封其宮門從一門出入數變名姓為布衣之它國相二千石至者奉漢法以治端輒求其罪告之亡罪者詐藥殺之所以設詐究變彊足以距諫知足以飾非相二千石從王治則漢繩以法故膠西小國而所殺傷二千石甚眾立四十七年薨無子國除地入于漢為膠西郡趙, WYG: ''}
