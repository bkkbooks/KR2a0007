  - {type: variant, offset: 192, length: 5, content: 率多浮辯獻, WYG: 英雋以百數被為冠首師古曰最居其上也久之淮南王陰有邪謀被數微諫師古曰私諫之後王坐東宮召被欲與計事呼之曰將軍上被曰王安得亡國之言乎昔子胥諌吳王吳王不用廼曰臣今見麋鹿㳺姑蘇之臺也張晏曰吳臺名也師古曰吳地記云因山為名西南去國三十五里今臣亦將見宮中生荆棘露霑衣也於是王怒繫被父母囚之三月王復召被曰將軍許寡人乎被曰小臣將為大王畫計耳宋祁曰越本作下臣臣聞聰者聽於無聲明者見於未形師古曰言智慮通達事未形兆皆豫見故聖人萬舉而萬全文王壹動而功顯萬世列為三}
