  - {type: variant, offset: 3882, length: 904, content: 地餘戲得褏中刀笞問狀服欲與昭平共殺昭信笞問昭平不服以鐵鍼鍼之彊服乃會諸姬去以劍自擊地餘令昭信擊昭平皆死昭信曰兩姬婢且泄口復絞殺從婢三人後昭信病夢見昭平等以狀告去去曰虜乃復見畏我獨可燔燒耳掘出尸皆燒為灰後去立昭信為后幸姬陶望卿為脩靡夫人主繒帛崔脩成為明貞夫人主永巷昭信復譖望卿曰與我無禮衣服常鮮於我盡取善繒匄諸宮人去曰若數惡望卿不能減我愛設聞其淫我亨之矣後昭信謂去曰前畫工畫望卿舍望卿袒裼傅粉其傍又數出入南戶窺郎吏疑有姦去曰善司之以故益不愛望卿後與昭信等飲諸姬皆侍去為望卿作歌曰背尊章嫖以忽謀屈奇起自絕行周流自生患諒非望今誰怨使美人相和歌之去曰是中當有自知者昭信知去已怒即誣言望卿歷指郎吏臥處具知其主名又言郎中令錦被疑有姦去即與昭信從諸姬至望卿所臝其身更擊之令諸姬各持燒鐵共灼望卿望卿走自投井死昭信出之椓杙其陰中割其鼻脣斷其舌謂去曰前殺昭平反來畏我今欲靡爛望卿使不能神與去共支解置大鑊中取桃灰毒藥并煮之召諸姬皆臨觀連日夜靡盡復共殺其女弟都後去數召姬榮愛與飲昭信復譖之曰榮姬視瞻意態不善疑有私時愛為去刺方領繡去取燒之愛恐自投井出之未死笞問愛自誣與醫姦去縛繫柱燒刀灼潰兩目生割兩股銷鈆灌其口中愛死支解以棘埋之諸幸於去者昭信輒譖殺之凡十四人皆埋太后所居長壽宮中宮人畏之莫敢復迕昭信欲擅愛曰王使明貞夫人主諸姬淫亂難禁請閉諸姬舍門無令出敖使其大婢為僕射主永巷盡封閉諸舍上籥於后非大置酒召不得見去憐之為作歌曰愁莫愁居無聊心重結意不舒內茀鬱憂哀積上不見天生何益日崔隤時不再願棄軀死無悔令昭信聲鼓為節以教諸姬歌之歌罷輒歸永巷封門獨昭信兄子初為乘華夫人得朝夕見昭信與去從十餘奴博飲游敖初去年十四五事師受易師數諫正去去益大逐之內史請以為掾師數令內史禁切王家去使奴殺師父子不發覺後去數置酒令倡俳臝戲坐中以為樂相彊劾繫倡闌入殿門奏狀事下考案倡辭本為王教脩靡夫人望卿弟都歌舞使者召望卿都去對皆淫亂自殺會赦不治望卿前亨煮即取他死人與都死并付其母母曰都是望卿非也數號哭求死昭信令奴殺之奴得辭服本始三年相內史奏狀具言赦前所犯天子遣大鴻臚丞相長史御史丞廷尉正雜治鉅鹿詔獄奏請逮捕去及后昭信制曰王后昭信諸姬奴婢證者皆下獄辭服有司復請誅王制曰與列侯, WYG: ''}
