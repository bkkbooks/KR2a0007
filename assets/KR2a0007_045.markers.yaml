  - {type: variant, offset: 4815, length: 4, content: 割剝人距, WYG: 男則君之子為王也春申君乃言之王召入之遂生男立為太子後孝烈王薨李園害春申君之寵乃刺殺之上官訴屈懷王執張晏曰屈平忠而有謀為上官子蘭所譖見放逐後秦昭誘懷王會於武闗遂執以歸卒死於秦趙高敗斯二世縊張晏曰趙高譖殺李斯而代其位乃使其壻閻樂攻二世於望夷宮乞為黔首不聽乃縊而死伊戾坎盟宋痤死李奇曰伊戾為太子傅無寵欲敗太子言與楚客盟謀宋詐㰱血加盟書以證之公以故殺痤}
