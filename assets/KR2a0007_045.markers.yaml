  - {type: variant, offset: 4793, length: 2, content: 博士, WYG: 一人耳顔失之就拜孔鄉侯傅晏為大司馬衞將軍陽安侯丁明又為大司馬票騎將軍是日日有食之董賢因此沮躬晏之䇿後數日收晏衛將軍印綬而丞相御史奏躬辠過上繇是惡躬等師古曰繇讀與由同下詔曰南陽太守方陽侯寵素亡亷聲有酷惡之資毒流百姓左曹光禄大夫宜陵侯躬虚造詐諼之䇿師古曰諼詐辭也音虚遠反欲以詿誤朝廷皆交遊貴戚趨權門為名其免躬寵官遣就國躬歸國未有第宅寄居丘亭張晏曰丘亭野亭名師古曰此説非也丘空也姦人以為侯家富常夜守之師古曰謂欲盜之伺其便躬邑人河内掾賈惠徃過躬教以祝盜方以桑東南指枝為匕師古曰桑東南出之枝畫北斗七星其上躬夜自被髪立中庭向北斗師古曰被音皮義反持匕招指祝盜師古曰或招或指所以求福排禍也人有上書言躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫同祝詛上遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬仰天大謼師古曰謼古呼字音火故反宋祁曰浙本躬字下更有躬字因僵仆吏就問云咽已絶師古曰咽喉嚨音一千反血從鼻耳出食頃死黨友謀}
