  - {type: variant, offset: 4790, length: 0, content: '', WYG: 舉明習兵法有大慮者各一人將軍二人詣公車師古曰堪為將軍者必舉二人劉攽曰將軍二人但謂令將軍舉二人中}
  - {type: variant, offset: 4790, length: 0, content: '', krp: 舉明習兵法有大慮者各一人將軍二人詣公車師古曰堪為將軍者必舉二人劉攽曰將軍二人但謂令將軍舉二人中}
