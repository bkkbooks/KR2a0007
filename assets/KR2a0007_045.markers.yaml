  - {type: variant, offset: 5520, length: 411, content: 者王又匿之吏求捕勃使人致擊笞掠擅出漢所疑囚有司請誅勃及憲王后脩上曰脩素無行使梲陷之罪勃無良師傅不忍致誅有司請廢勿王徙王勃以家屬處房陵上許之勃王數月廢國除月餘天子為最親詔有司曰常山憲王早夭后妾不和適孽誣爭陷于不誼以滅國朕甚閔焉其封憲王子平三萬戶為真定王子商三萬戶為泗水王頃王平立二十五年薨子烈王偃嗣十八年薨子孝王由嗣二十二年薨子安王雍嗣二十六年薨子共王普嗣十五年薨子陽嗣王莽時絕泗水思王商立十二年薨子哀王安世嗣一年薨無子於是武帝憐泗水王絕復立安世弟賀是為戴王立二十二年薨有遺腹子煖相內史不以聞太后上書昭帝閔之抵相內史罪立煖是為勤王立三十九年薨子戾王駿嗣三十一年薨子靖嗣王莽時絕贊曰昔魯哀公有言寡人生於深宮之中長於婦人之手未嘗知憂未嘗知懼信哉斯言也雖欲不危亡不可得已是故古人以宴安為鴆毒亡德而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中居勢使然也自凡人猶繫于習俗而況哀公之倫乎夫唯大雅卓爾不群河間獻王近之矣, WYG: ''}
  - {type: variant, offset: 5520, length: 411, content: 者王又匿之吏求捕勃使人致擊笞掠擅出漢所疑囚有司請誅勃及憲王后脩上曰脩素無行使梲陷之罪勃無良師傅不忍致誅有司請廢勿王徙王勃以家屬處房陵上許之勃王數月廢國除月餘天子為最親詔有司曰常山憲王早夭后妾不和適孽誣爭陷于不誼以滅國朕甚閔焉其封憲王子平三萬戶為真定王子商三萬戶為泗水王頃王平立二十五年薨子烈王偃嗣十八年薨子孝王由嗣二十二年薨子安王雍嗣二十六年薨子共王普嗣十五年薨子陽嗣王莽時絕泗水思王商立十二年薨子哀王安世嗣一年薨無子於是武帝憐泗水王絕復立安世弟賀是為戴王立二十二年薨有遺腹子煖相內史不以聞太后上書昭帝閔之抵相內史罪立煖是為勤王立三十九年薨子戾王駿嗣三十一年薨子靖嗣王莽時絕贊曰昔魯哀公有言寡人生於深宮之中長於婦人之手未嘗知憂未嘗知懼信哉斯言也雖欲不危亡不可得已是故古人以宴安為鴆毒亡德而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中居勢使然也自凡人猶繫于習俗而況哀公之倫乎夫唯大雅卓爾不群河間獻王近之矣, krp: ''}
