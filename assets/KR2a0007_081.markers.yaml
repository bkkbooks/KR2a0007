  - {type: variant, offset: 3617, length: 0, content: '', WYG: 分解此時意猶今言分疏也郡即復以四百頃付樂安國衡遣從史之僮収取所還田租榖千餘石入衡家司𨽻校尉駿少府忠行廷尉事劾奏衡監臨盗所主守直十金以上師古曰十金以上當時律定罪之次若今律條言一尺以上一匹以上春秋之義諸侯不得専地所以一統尊法制也衡位三公輔國政領計簿知郡實正國界計簿已定而背法制専地盗土以自益及賜明阿承衡意猥舉郡計亂減縣界師古曰猥曲也宋祁曰南本無承字只云阿丞相衡意浙本作阿承附下罔上擅以地附益大臣皆不道於是上可其奏勿治丞相免}
