  - {type: variant, offset: 2816, length: 411, content: 駕六先景之乘掉犇星之流旃彏天狼之威弧張燿日之玄旄揚左纛被雲梢奮電鞭驂電輜鳴洪鍾建五旗羲和司日顏倫奉輿風發飆拂神騰鬼趡千乘霆亂萬騎屈橋嘻嘻旭旭天地稠㟼簸丘跳巒涌渭濯涇秦神下讋跖魂負沴河靈矍踢爪華蹈衰遂臻陰宮穆穆肅肅蹲蹲如也靈祇既鄉五位時敘絪縕玄黃將紹厥後於是靈輿安步周流容與以覽虖介山嗟文公而愍推兮勤大禹於龍門灑沈菑於豁瀆兮播九河於東瀕登歷觀而遙望兮聊浮游以經營樂往昔之遺風兮喜虞氏之所耕瞰帝唐之嵩高兮賑隆周之大寧汩低回而不能去兮行睨陔下與彭城濊南巢之坎坷兮易豳岐之夷平乘翠龍而超河兮陟西岳之嶢崝雲霏霏而來迎兮澤滲灕而下降鬱蕭條其幽藹兮滃汎沛以豐隆叱風伯於南北兮呵雨師於西東參天地而獨立兮廓盪盪其亡雙遵逝虖歸來以函夏之大漢兮彼曾何足與比功建乾坤之貞兆兮將悉總之以群龍麗鉤芒與驂蓐收兮服玄冥及祝融敦眾神使式道兮奮六經以攄頌隃於穆之緝熙兮過清廟之雝雝軼五帝之遐迹兮躡三皇之高蹤既發軔於平盈兮誰謂路遠而不能從其十二月羽獵雄從以為昔, WYG: 王務}
