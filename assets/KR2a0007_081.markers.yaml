  - {type: variant, offset: 190, length: 0, content: '', WYG: 法則或見侈靡而放效之師古曰放依也音甫往反此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪李竒曰祲氣也言天人精氣相動也師古曰祲謂隂陽氣相浸漸以成災祥者也音子鴆反宋祁曰字林云祲精氣成祥也音字鴆反善惡有以相推事作乎下者象動乎上隂陽之理各應其感隂變則靜者動陽蔽則明者晻鄧展曰静者動謂地震也明者晻謂日蝕也師古曰晻與暗同蕭該案字林曰晻}
