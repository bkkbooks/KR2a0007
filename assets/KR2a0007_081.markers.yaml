  - {type: variant, offset: 4172, length: 0, content: '', WYG: 作師古曰沴惡氣也音戾宋祁曰韋昭云沴謂皇極五行之氣相沴戾不和音持軫反服䖍曰沴音戾嵗之朝曰三朝師古曰嵗之朝月之朝日之朝故曰三朝其應至重廼正月辛丑朔日有蝕之變見三朝之會上天聰明苟無其事變不虛}
