  - {type: variant, offset: 3568, length: 4, content: 爽遐邇五, WYG: 本性者也師古曰悖乖也音布内反故審六蓺之指則天人之理可得而和草木昆蟲可得而育此永永不易之道也師古曰易變也及論語孝經聖人言行之要宜究其意師古曰究盡也臣又聞聖王之自為動静周旋奉天承親臨朝享臣物有節文以章人倫師古曰物事也事事皆有節文蓋欽翼祗栗事天之容也温恭敬遜承親之禮也宋祁曰浙本禮作體正躬嚴恪臨衆之儀也師古曰嚴讀曰儼嘉恵和說饗下之顏也師古曰說讀曰悦饗宴饗也舉錯動作物遵其儀故形為仁義動為法則孔子曰徳義可尊容止可觀進退可度以臨其民是以其民畏而愛之則而象之師古曰孝經載孔子之言也則法也象似也大雅云敬慎威儀惟民之則師古曰抑之詩諸侯正月朝覲天子天子惟道徳昭穆穆以視之師古曰昭明也穆穆天子之容也視讀曰示又觀以禮樂饗醴廼歸師古曰觀亦視也饗醴以醴酒饗也故萬國莫不獲賜祉福䝉化而成俗今正月初幸路寢臨朝賀置酒以饗萬方傳曰君子慎始願陛下留神動靜之節使羣下得望盛徳休光師古曰休羙也以立基楨天下幸甚上敬納其言頃之衡復奏正南北郊罷諸滛祀語在郊祀志初元帝時中書令石顯用事自前相韋𤣥成及衡皆畏顯不敢失其意至成帝初即位衡廼與御史大夫甄譚共奏顯劉奉世曰甄當作張追條其舊惡并及黨與於是司𨽻校尉王尊劾奏衡譚居大臣位知顯等専權埶作威福為海内患害不以時白奏行罰而阿䛕曲從附下罔上無大臣輔政之義既奏顯等不自陳不忠之罪而反揚著先帝任用傾覆之徒師古曰著明也罪至不道有詔勿劾衡慙懼上疏謝罪因稱病乞骸骨上丞相樂安侯印綬上報曰君以道徳修明位在}
