  - {type: variant, offset: 3573, length: 1, content: 孰, WYG: 公先帝委政遂及朕躬君遵修法度勤勞公家朕嘉與君同心合意庻幾有成今司𨽻校尉尊妄詆欺加非於君師古曰詆毁也音丁禮反朕甚閔焉方下有司問狀師古曰問司𨽻君何疑而上書歸侯乞骸骨是章朕之未燭也師古曰燭照也傳不云乎禮義不愆何恤人之言師古曰愆過也恤憂也君其察焉専精神近醫藥强食自愛因賜上尊酒養牛師古曰上尊解在薛廣徳傳衡起視事上以新即位襃優大臣然羣下多是王尊者衡嘿嘿不自安毎有水旱風雨不時連乞骸骨讓位上輙以詔書慰撫不許久之衡子昌為越騎校尉醉殺人繫詔獄越騎官屬與昌弟且謀簒昌師古曰逆取曰簒宋祁曰注文逆監本作奪事發覺衡免冠徒跣待罪天子使謁者詔衡冠履而有司奏衡専地盗土衡竟坐免初衡封僮之樂安鄉文穎曰屬臨淮鄉鄉本田提封三千一百頃師古曰提封舉其封界内之總數南以閩佰為界師古曰佰者田之東西界也閩者佰之名也佰音莫客反宋祁曰佰當作陌注及下文並同初元元年郡圖誤以閩佰為平陵佰積十餘嵗衡封蘇林曰平陵佰在閩佰南誤十餘嵗衡乃始封此鄉臨淮郡遂封真平陵佰以為界多四百頃至建始元年郡廼定國界上計簿更定圖言丞相府衡謂所親吏趙殷曰師古曰所親素所親任者主簿陸賜故居奏曹習事曉}
