  - {type: variant, offset: 4115, length: 1, content: 壯, WYG: 以選授皇太子經遷詹事高密相是時諸侯王相在郡守上元帝即位徴霸以師賜爵闗内侯食邑八百户號襃成君如淳曰為帝師教令成就故曰襃成君宋祁曰注文為帝師教令成就當作嘗為帝師教帝今成就給事中加賜黄金二百斤第一區徙名數于長安師古曰名數户籍也霸為人謙退不好權埶常稱爵位泰過何徳以堪之上欲致霸相位自御史大夫貢禹卒及薛廣徳免輙欲拜霸霸讓位自陳至三上深知其至誠廼弗用宋祁曰三字下當有日字以是敬之賞賜甚厚及霸薨上素服臨弔者再至賜東園祕器錢帛策贈以列侯禮宋祁曰贈一作賜諡曰烈君霸四子長子福嗣闗内侯宋祁曰監浙二本皆云嗣爵次子㨗㨗弟喜皆列校尉諸曹光最少子也經學尤明年未二十宋祁曰二一作三舉為議郎光禄勲匡衡舉光方正為諫議大夫坐議有不合左遷虹長師古曰不合謂不合天子意也虹沛縣也音貢自免歸教授成帝初即位舉為博}
