  - {type: variant, offset: 4180, length: 4, content: 蹶松柏掌, WYG: 進用賢良之吏平刑罰薄賦斂恩澤加於百姓誠為政之大本應變之至務也天下幸甚書曰天既付命正厥徳師古曰商書高宗肜日之辭言既受天命宜正其徳言正徳以順天也又曰天棐諶辭師古曰周書大誥之辭棐輔也諶誠也諶辭至誠之辭也棐音匪諶音上林反言有誠道天輔之也明承順天道在於崇徳博施加精致誠孳孳而已師古曰孳孳不怠也孳音兹俗之祈禳小數終無益於應天塞異銷禍興福師古曰祈求福也禳除禍也較然甚明無可疑惑師古曰較明貌較音角書奏上説師古曰說讀曰悦賜光束帛拜為光禄大夫秩中二千石給事中位次丞相詔光舉可尚書令者封上光謝曰臣以朽材前比歴位典大職卒無尺寸之效師古曰卒終也宋祁曰謝字上當有固字前比歴位典大職考本越本邵本並作前所歴位天職幸免罪誅全保首領今復拔擢備内朝臣與聞政事師古曰與讀曰豫臣光智謀淺短犬馬齒臷師古曰臷老也讀與耋同今書本有作截字者俗寫誤也誠恐一旦顛仆無以報稱師古曰稱副也竊見國家故事尚書以久次轉遷非有踔絶之能不相踰越師古曰踔高逺也音竹角反尚書僕射敞公正勤職通敏於事可尚書令謹封上敞以舉故為東平太守宋祁曰舉字上當有光字敞姓成公東海人也光為大夫月餘丞相嘉下獄死師古曰王嘉也御史大夫賈延免光復為御史大夫二月為丞相復故國博山侯上廼知光前免非其罪以過近臣毁短光者免傅嘉宋祁曰免字上當有復字曰前為侍中毁譖仁賢誣愬大臣令俊艾者久失其位師古曰艾讀曰乂嘉傾覆巧偽挾姦以罔上崇黨以蔽朝傷善以肆意師古曰肆極也詩不云乎讒人罔極交亂四國師古曰小雅青蠅之詩解在車千秋傳其免嘉為庻人歸故郡明年定三公官光更為大司徒㑹哀帝崩太皇太后以新都侯王莽為大司馬徴立中山王是為平帝帝年幼太后稱制委政於莽初哀帝罷黜王氏故太后與莽怨丁傅董賢之黨莽以光為舊相名儒天下所信太后敬之備禮事光所欲搏擊輙為草以太后指風光令上之師古曰謂文書之槀草風讀曰諷次下亦同厓㫮莫不誅傷師古曰厓音崖眥音漬厓又音五解反眥又音仕懈反具在杜欽傳宋祁曰學林云史記游俠傳曰以睚眦殺人此用厓者省文也莽權日盛光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衞供養行内師古曰行内行在所之内中猶言禁中也署門户省服御食物師古曰省視也明年徙為太師而莽為太傅光常稱}
