  - {type: variant, offset: 4111, length: 2, content: 里外, krp: 禹為人謹厚内殖貨財師古曰殖生也家以田為業宋祁曰晏本業作樂及富貴多買田至四百頃皆涇渭溉灌極膏腴上賈師古曰賈讀曰價它財物稱是禹性習知音聲内奢滛身居大第後堂理絲竹筦弦如淳曰今樂家五日一習樂為理樂師古曰筦亦管字劉敞曰絲竹管絃等二物爾於文為駢禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智師古曰愷樂也弟易也言性和樂而簡易二人異行禹心親愛崇敬宣而疏之崇毎候禹常責師宜置酒設樂與弟子相娱禹將崇入後堂飲食婦女相對優人筦弦鏗鏘極樂昏夜乃罷師古曰極樂盡其歡樂之情而宣之來也禹見之於便坐師古曰便坐謂非正寢在於旁側可以延賓者也坐音才卧反講論經義日宴賜食不過一肉巵酒相對師古曰一豆之肉一巵行酒宣未嘗得至後堂及兩人皆聞知各自得也服䖍曰各自為得宜禹年老自治冡塋起祠室好平陵肥牛亭部處地師古曰肥牛亭名欲得置亭處之地為冢塋又近延陵宋祁曰别本無延字子謂當存延字成帝營昌陵不成更還延陵奏請求之上以賜禹詔令平陵徙亭它所曲陽侯根聞而爭之此地當平陵寢廟衣冠所出游道禹為師傅不遵謙讓至求衣冠所游之道又徙壊舊亭重非所宜師古曰重音直用反孔子稱賜愛其羊我愛其禮師古曰論語云子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮故引之宜更賜禹它地根雖為舅上敬重之不如禹根言雖切猶不見從卒以肥牛亭地賜禹根由是害禹寵數毁惡之師古曰惡謂言其過惡天子愈益敬厚禹禹毎病輙以起居聞師古曰謂其食飲寢卧之増損車駕自臨問之上親拜禹牀下禹頓首謝恩歸誠宋祁曰恩字下當有因字言老臣有四男一女愛女甚於男逺嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為𢎞農太守又禹小子未有官上臨候禹禹數視其小子上即禹牀下拜為黄門郎宋祁曰郎字上疑有侍字給事中禹雖家居以特進為天子師國家毎有大政必與定議師古曰與讀曰豫永始元延之間日蝕地震尤數吏民多上書言災異之應譏切王氏専政所致上懼變異數見意頗然之未有以明見宋祁曰未字上當有而字廼車駕至禹第辟左右師古曰辟讀曰闢親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨禹則謂上曰宋祁曰則當作即春秋二百四十二年間日蝕三十餘地震五十六宋祁曰按劉向傳日蝕三十六地震五今云五十六疑衍十六兩字今越本與别本無十六兩字劉敞曰按春秋地震五耳疑衍十六字或為諸侯相殺或夷狄侵中國災變之意深逺難見故聖人罕言命不語怪神師古曰罕稀也論語云子罕言利與命與仁又曰子不語怪力亂神性與天道自子贛之屬不得聞師古曰論語云夫子之言性與天道不可得而聞也謂孔子未嘗言性命之事及天道何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福善此經義意也宋祁曰福善越本作福喜新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜說師古曰說讀曰悦宋祁曰皆當作此遂親就禹禹見時有變異}
