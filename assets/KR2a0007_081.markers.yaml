  - {type: variant, offset: 186, length: 2, content: 博覽, WYG: 師古曰上謂崇尚也今之偽薄忮害不讓極矣臣聞教化之流非家至而人說之也師古曰言非家家皆到人人勸說也賢者在位能者在職宋祁曰下在字越本作布字别本同朝廷崇禮百僚敬讓道徳之行由内及外自近者始然後民知所法遷善日進而不自知是以百姓安隂陽和神靈應而嘉祥見詩曰商邑翼翼四方之極夀考且寧以保我後生師古曰商頌殷武之詩也商邑京師也極中也言商邑之禮俗翼翼然可則效乃四方之中正也王則夀考且安以此全守我子孫也宋祁曰我一作爾此成湯所以建至治保子孫化異俗而懐鬼方也應劭曰鬼方逺方也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者}
