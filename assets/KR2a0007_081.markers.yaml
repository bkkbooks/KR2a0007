  - {type: variant, offset: 4211, length: 9, content: 騎雲會登降闇藹泰華, WYG: 及副各一乗也輼輬解具在霍光傳宋祁曰輼輬下當有車字注文同羽林孤兒諸生合四百人輓送車萬餘兩道路皆舉音以過喪師古曰喪到之處行道之人皆舉音哭須過廼止將作穿復土可甲卒五百人劉奉世曰可字疑非起墳如大將軍王鳳制度諡曰簡烈侯初光以丞相封後益封凡食邑萬一千户宋祁曰益字上當有再字病甚上書讓還七千户及還所賜一第宋祁曰一字當刪子放嗣莽簒位後以光兄子永}
