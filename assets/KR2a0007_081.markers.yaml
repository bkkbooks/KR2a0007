  - {type: variant, offset: 4230, length: 5, content: 漫若天外儲, WYG: 小異而大同言長安則後人妄添且復終始無義昔潁川陳彭年亦以安字為衍龔子曰長如字凡以安為衍字者誤以長為長㓜之長也福雖霸之長子然此傳前言霸於魯徙名數於長安此言還長安子福名數其義自明無可疑者當從江南本奉夫子祀霸薨子福嗣福薨子房嗣房薨子莽嗣元始元年封周公孔子後為列侯食邑各二千户莽更封為襃成侯後避王莽更名均馬宫字游卿東海戚人也治春秋嚴氏以射䇿甲科為郎遷楚長史免官後為丞相史司直師丹薦宫行能高絜遷廷尉平青州刺史汝南九江太守所在見稱徴為詹事光禄勲右將軍代孔光為大司徒封扶徳侯光為太師薨宫復代光為太師兼司徒官初宫哀帝時}
