  - {type: variant, offset: 3567, length: 0, content: '', WYG: 色於容儀也師古曰介繫也言不以情欲繫心而著於容儀者宋祁曰無當作毋宴私之意不形乎動靜師古曰形見也夫然後可以配至尊而為宗廟主此綱紀之首王教之端也自上世已來宋祁曰已當作以三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有徳戒聲色近嚴敬逺技能師古曰無徳之人雖有技能則斥逺之竊見聖徳純茂専精詩書好樂無厭師古曰樂音五教反臣衡材駑宋祁曰蕭該作材伮伮亦駑也無以輔相善義宣揚徳音師古曰相助也臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正師古曰分音扶問反使不悖於}
