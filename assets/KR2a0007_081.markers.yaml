  - {type: variant, offset: 4652, length: 168, content: 鄰是以旃裘之王胡貉之長移珍來享抗手稱臣前入圍口後陳盧山群公常伯楊朱墨翟之徒喟然稱曰崇哉乎德雖有唐虞大夏成周之隆何以侈茲太古之覲東嶽禪梁基舍此世也其誰與哉上猶謙讓而未俞也方將上獵三靈之流下決醴泉之滋發黃龍之穴窺鳳皇之巢臨麒麟之囿幸神雀之林奢雲夢侈孟諸非章華是靈臺罕徂離宮而輟觀游土事不飾木功不彫承民乎農桑勸之以弗迨儕男女使莫違恐貧窮者不徧, WYG: 召南}
