  - {type: variant, offset: 3877, length: 231, content: 要遮欃槍為闉明月為候熒惑司命天弧發射鮮扁陸離駢衍佖路徽車輕武鴻絧緁獵殷殷軫軫被陵緣阪窮冥極遠者相與迾虖高原之上羽騎營營昈分殊事繽紛往來轠轤不絕若光若滅者布虖青林之下於是天子乃以陽鼂始出虖玄宮撞鴻鍾建九旒六白虎載靈輿蚩尤並轂蒙公先驅立歷天之旂曳捎星之旃辟歷列缺吐火施鞭萃傱允溶淋離廓落戲八鎮而開關飛廉雲師吸嚊潚率鱗羅布列攢以龍翰秋秋蹌蹌入西園切神光望平樂徑竹林蹂惠圃踐蘭唐舉烽烈火轡者施披方馳千駟校騎萬師虓虎之陳從橫膠輵猋泣雷厲驞駍駖磕洶洶旭旭天動地吸羡漫半散蕭條, WYG: ''}
