  - {type: variant, offset: 3618, length: 4, content: 驂乘陿三, WYG: 庻人終於家子咸亦明經歴位九卿家世多為博士者張禹字子文河内軹人也至禹父徙家蓮勺師古曰左馮翊縣名也音輦酌禹為兒數隨家至市喜觀於卜相者前師古曰至其人之前而觀之喜音許吏反久之頗曉其别蓍布卦意師古曰别分也音彼列反時從旁言卜者愛之又竒其靣貌謂禹父是兒多知可令學經宋祁曰父字下當有曰字及禹壯至長安學從沛郡施讎受易琅邪}
