  - {type: variant, offset: 4131, length: 16, content: 拕蒼豨跋犀犛蹶浮麋斮巨狿搏玄蝯騰, WYG: 稱尊號貴寵其親屬使上不得直道行師古曰不得依正直之道宋祁曰行字上監本有而字頃之太后從弟子傅遷在左右尤傾邪上免官遣歸故郡傅太后怒上不得已復留遷光與大司空師丹奏言詔書侍中駙馬都尉遷巧佞無義漏泄不忠國之賊也免歸故郡復有詔止天下疑惑無所取信虧損聖徳誠不小愆陛下以變異連見避正殿見羣臣思求其故至今未有所改師古曰舊有不善之事皆未改除臣請歸遷故郡以銷姦黨應天戒卒不得遣復為侍中脅於傅太后皆此類也又傅太后欲與成帝母俱稱尊號羣下多順指言母以子貴宜立尊號以厚孝道唯師丹與光持不可蘇林曰執持不可也上重違大臣正議師古曰重難也又内迫傅太后猗違者連嵗如淳曰不決事之言也師古曰猗違猶依違猗音於竒反丹以罪免宋祁曰丹字下當有先字而朱博代為大司空光自先帝時議繼嗣有持異之隙矣又重忤傅太后指師古曰重直用反宋祁曰又字上當有後字由是傅氏在位者與朱博為表裏共毁譖光後數月遂策免光曰丞相者朕之股肱所與共承宗廟統理海内師古曰共讀曰恭輔朕之不逮以治天下也朕既不明災異重仍師古曰仍頻也重音直用反日月無光山崩河決五星失行是章朕之不徳而股肱之不良也師古曰章明也君前為御史大夫翼輔先帝出入八年卒無忠言嘉謀今相朕出入三年憂國之風復無聞焉隂陽錯謬嵗比不登師古曰比頻也天下}
