  - {type: variant, offset: 4114, length: 0, content: '', WYG: 上體不安擇日絜齋露蓍服䖍曰露易蓍於星宿下明日乃用言得天氣也師古曰蓍草名筮者所用也音式夷反宋祁曰有字上疑有常字正衣冠立筮得吉卦則獻其占如有不吉禹為感動憂色宋祁曰感動字下疑有有字成帝崩禹及事哀帝建平二年薨諡曰節侯禹四子長子宏嗣侯官至太常列於九卿三弟皆為校尉散騎諸曹初禹為師以上難數對已問經為論語章句獻之始魯扶卿及夏侯勝王陽蕭望之韋𤣥成皆説論語篇第或異禹先事王陽後從庸生采獲所安最後出而尊貴諸儒為之語曰欲為論念張文宋祁曰監本越本欲字下有不字由是學者多從張氏餘家寖微師古曰寖漸也孔光字子夏孔子十四世之孫也孔子生伯魚鯉師古曰名鯉字伯魚先言其字者孔氏自為譜諜示尊其先也下皆類此鯉生子思伋師古曰伋音級伋生子上帛宋祁曰帛禮記作白漢書作帛古字通用監本浙本同帛生子家求求生子真箕箕生子高穿穿生順順為魏相順生鮒鮒為陳渉博士死陳下鮒弟子襄為孝恵博士長沙太傅襄生忠忠生武及安國武生延年宋祁曰浙本監本無忠生二字於安國字下又添忠字云襄生忠武及安國忠武生延年延年生霸字次儒霸生光焉安國延年皆以治尚書為武帝博士安國至臨淮太守霸亦治尚書事太傅夏侯勝昭帝末年為博士宣帝時為大中大}
