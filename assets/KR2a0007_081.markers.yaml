  - {type: variant, offset: 23, length: 0, content: '', WYG: 知師古曰言髙輕忽此事不自知其非然一夫竊議語流天下夫富貴在身而列士不譽是}
  - {type: variant, offset: 23, length: 0, content: '', krp: 知師古曰言髙輕忽此事不自知其非然一夫竊議語流天下夫富貴在身而列士不譽是}
  - {type: variant, offset: 24, length: 3, content: 周伯僑, WYG: 狐白之裘而反衣之也師古曰狐白謂狐掖下之皮其毛純白集之為裘輕柔難得故貴也反衣之}
  - {type: variant, offset: 24, length: 3, content: 周伯僑, krp: 狐白之裘而反衣之也師古曰狐白謂狐掖下之皮其毛純白集之為裘輕柔難得故貴也反衣之}
