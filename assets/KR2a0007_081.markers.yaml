  - {type: variant, offset: 1166, length: 323, content: 郊上玄定泰畤雍神休尊明號同符三皇錄功五帝卹胤錫羨拓迹開統於是乃命群僚歷吉日協靈辰星陳而天行詔招搖與泰陰兮伏鉤陳使當兵屬堪輿以壁壘兮梢夔魖而抶獝狂八神奔而警蹕兮振殷轔而軍裝蚩尤之倫帶干將而秉玉戚兮飛蒙茸而走陸梁齊總總撙撙其相膠葛兮猋駭雲訊奮以方攘駢羅列布鱗以雜沓兮柴虒參差魚頡而鳥䀪翕赫曶霍霧集蒙合兮半散照爛粲以成章於是乘輿乃登夫鳳皇兮翳華芝駟蒼螭兮六素虯蠖略蕤綏灕虖幓纚帥爾陰閉霅然陽開騰清霄而軼浮景兮夫何旟旐郅偈之旖柅也流星旄以電燭兮咸翠蓋而鸞旗敦萬騎於中營兮方玉車之千乘聲駍隱以陸離兮輕先疾雷而馺遺風陵高衍之嵱嵷兮超紆譎之清澄登椽欒而羾天門兮馳閭闔而入凌兢是時未轃夫甘泉也乃望通天之繹繹下陰潛以慘廩兮上洪紛而相錯直嶢嶢以造天兮厥高慶而不可虖疆, WYG: 欲}
