  - {type: variant, offset: 3564, length: 1, content: 俱, WYG: 成王之嗣位思述文武之道以飬其心休烈盛羙皆歸之二后而不敢専其名師古曰休亦美也烈業也后君也二君文王武王也是以上天歆享鬼神祐焉其詩曰念我皇祖陟降廷止師古曰周頌閔予小子之詩言成王常念文王武王之徳奉而行之故鬼神上下臨其朝廷宋祁曰注文詩字下疑有也字言成王常思祖考之業而鬼神祐助其治也陛下聖徳天覆子愛海内然隂陽未和姦邪未禁者殆論議者未丕揚先帝之盛功師古曰丕大也丕字或作本言修其本業而顯揚也爭言制度不可用也務變更之師古曰更改也宋祁曰也字當刪所更或不可行而復復之師古曰下復音扶目反是以羣下更相是非師古曰更音工衡反吏民無所信臣竊恨國家釋樂成之業而虚為此紛紛也師古曰釋廢也樂成謂已成之業人情所樂也願陛下詳覽統業之事留神於遵制揚功以定羣下之心大雅曰無念爾祖聿修厥徳師古曰大雅文王之詩也無念念也聿述也孔子著之孝經首章蓋至徳之本也傳曰審好惡理情性而王道畢矣能盡其性然後能盡人物之性能盡人物之性宋祁曰江南本二句中並無物字浙本有可以贊天地之化師古曰贊助也治性之道必審已之所有餘而彊其所不足師古曰彊勉也音其兩反蓋聰明疏通者戒於大察寡聞少見者戒於雍蔽師古曰雍讀曰壅勇猛剛彊者戒於大暴仁愛温良者戒於無斷湛靜安舒者戒於後時師古曰湛讀曰沈廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進師古曰比音頻寐反唯陛下戒所以崇聖徳臣又聞室家之道修則天下之理得故詩始國風師古曰關雎美后妃之徳而為國風之首禮本冠婚師古曰禮記冠義曰冠者禮之始也婚義曰婚者禮之本也始乎國風原情性而明人倫也本乎冠婚正基兆而防未然也福之興莫不本乎室家道之衰莫不始乎梱内師古曰梱與閫同謂門橛也音苦本反故聖王必慎妃后之際别適長之位師古曰適讀曰嫡其下竝同禮之於内也卑不隃尊親不先故師古曰隃與踰同所以統人情而理隂氣也其尊適而卑庻也適子冠乎阼禮之用醴師古曰阼主階也醴甘酒也貴於衆酒衆子不得與列所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜游燕所親物得其序師古曰言凡物大小髙卑皆有次序得其序則海内自修百姓從化如當親者疏當尊者卑師古曰如若也則巧佞之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義陛下聖徳純備莫不修正則天下無為而治詩云于以四方克定厥家師古曰周頌桓之詩也言欲治四方者先當能定其家從内以及外傳曰正家而天下定矣師古曰易家人卦之彖辭衡為少傅數年數上疏陳便宜及朝廷有政議傅經以對師古曰傅讀曰附附依也言多法義上以為任公卿師古曰任堪也由是為光禄勲御史大夫建昭三年代韋𤣥成為丞相封樂安侯食邑六百户元帝崩成帝即位衡上疏戒妃匹勸經學威儀之則曰陛下秉至孝哀傷思慕不絶於心未有游虞弋射之宴師古曰虞與娱同誠隆於慎終追逺無窮已也師古曰慎終慎孝道之終也追逺不忘本也論語稱孔子慎終追逺則民徳歸厚矣故衡引之竊願陛下雖聖性得之宋祁曰聖字可刪猶復加聖心焉師古曰言天性已自然矣又當加意也詩云焭焭在疚師古曰周頌閔予小子之詩焭焭憂貌疚病也言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也師古曰就成也臣又聞之師曰匹配之際宋祁曰匹配當作妃匹生民之始萬福之原婚姻之禮正然後品物遂而天命全師古曰遂成也孔子論詩以關雎為始言太上者民之父母師古曰太上居尊上之位者后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜師古曰侔等也故詩曰窈窕淑女君子好仇師古曰周南闗雎之詩也窈窕幽閒也仇匹也言能致其貞淑不貳其操情欲之感無介乎容儀服䖍曰}
