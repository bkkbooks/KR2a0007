  - {type: variant, offset: 4326, length: 19, content: 至罕車飛揚武騎聿皇蹈飛豹絹嘄陽追天寶出, WYG: 當子晏咸以儒宗居宰相位服儒衣冠孟康曰方領逢掖之衣傳先王語其醖藉可也師古曰醖藉謂如醖醸及薦藉道其寛博重厚也醖音於問反藉音才夜反然皆持禄保位被阿䛕之譏彼以古人之迹見繩烏能勝其任乎如淳曰迹謂既明且哲也繩謂抨彈之也師古曰古人之迹謂直道以事人也烏何也抨音普耕反宋祁曰注文抨彈字書曰抨彈也抨音迮堇反前漢書卷八十}
