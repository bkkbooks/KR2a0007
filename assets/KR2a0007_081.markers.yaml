  - {type: variant, offset: 1490, length: 1060, content: 平原唐其壇曼兮列新雉於林薄攢并閭與茇䒷兮紛被麗其亡鄂崇丘陵之駊騀兮深溝嶔巖而為谷往往離宮般以相燭兮封巒石關施靡虖延屬於是大夏雲譎波詭摧嗺而成觀仰撟首以高視兮目冥眴而亡見正瀏濫以弘惝兮指東西之漫漫徒回回以徨徨兮魂固眇眇而昏亂據軨軒而周流兮忽軮軋而亡垠翠玉樹之青蔥兮璧馬犀之瞵㻞金人仡仡其承鍾虡兮嵌巖巖其龍鱗揚光曜之燎燭兮乘景炎之炘炘配帝居之縣圃兮象泰壹之威神洪臺掘其獨出兮㨖北極之嶟嶟列宿乃施於上榮兮日月纔於柍桭雷鬱律而巖突兮電倏忽於牆藩鬼魅不能自還兮半長途而下顛歷倒景而絕飛梁兮浮蔑蠓而撇天左欃槍右玄冥兮前熛闕後應門陰西海與幽都兮涌醴汩以生川蛟龍連蜷於東厓兮白虎敦圉虖昆侖覽樛流於高光兮溶方皇於西清前殿崔巍兮和氏瓏玲炕浮柱之飛榱兮神莫莫而扶傾閌閬閬其寥廓兮似紫宮之崢嶸駢交錯而曼衍兮㟎𡽁隗虖其相嬰乘雲閣而上下兮紛蒙籠以掍成曳紅采之流離兮颺翠氣之冤延襲琁室與傾宮兮若登高妙遠肅虖臨淵回猋肆其碭駭兮翍桂椒鬱栘楊香芬茀以窮隆兮擊薄櫨而將榮薌呹肸以掍根兮聲駍隱而歷鍾排玉戶而颺金鋪兮發蘭惠與穹窮惟弸彋其拂汩兮稍暗暗而靚深陰陽清濁穆羽相和兮若夔牙之調琴般倕棄其剞劂兮王爾投其鉤繩雖方征僑與偓佺兮猶仿佛其若夢於是事變物化目駭耳回蓋天子穆然珍臺閒館琁題玉英蜵蜎蠖濩之中惟夫所以澄心清魂儲精垂思感動天地逆釐三神者乃搜逑索耦皋伊之徒冠倫魁能函甘棠之惠挾東征之意相與齊虖陽靈之宮靡薜荔而為席兮折瓊枝以為芳噏清雲之流瑕兮飲若木之露英集虖禮神之囿登乎頌祇之堂建光耀之長旓兮昭華覆之威威攀琁璣而下視兮行遊目虖三危陳眾車於東阬兮肆玉釱而下馳漂龍淵而還有垠兮窺地底而上回風傱傱而扶轄兮鸞鳳紛其御蕤梁弱水之濎濴兮躡不周之逶蛇想西王母欣然而上壽兮屏玉女而卻虙妃玉女無所眺其清盧兮虙妃曾不得施其蛾眉方㩜道德之精剛兮侔神明與之為資於是欽祡宗祈燎熏皇天招繇泰壹舉洪頤樹靈旗樵蒸焜上配藜四施東燭倉海西燿流沙北爌幽都南煬丹厓玄瓚觩䚧秬鬯泔淡肸嚮豐融懿懿芬芬炎感黃龍兮熛訛碩麟選巫咸兮叫帝閽開天庭兮延群神儐暗藹兮降清壇瑞穰穰兮委如山於是事畢功弘回車而歸度三巒兮偈棠梨天閫決兮地垠開八荒協兮萬國諧登長平兮雷鼓磕天聲起兮勇士厲雲飛揚兮雨滂沛于胥德兮麗萬世亂曰崇崇圜丘隆隱天兮登降峛崺單埢垣兮增宮嵾差駢嵯峨兮岒巆嶙峋洞亡厓兮上天之縡杳旭卉兮聖皇穆穆信厥對兮倈祗郊禋神所依兮俳佪招搖靈遟遲兮輝光眩耀隆厥福兮子子孫孫長亡極兮甘泉本因秦離宮既奢泰而武帝復增通天高光迎風宮外近則洪厓旁皇儲胥弩阹遠則石關封巒枝鵲露寒棠梨師得遊觀屈奇瑰瑋非木摩而不彫牆塗而不畫周宣所考般庚所遷夏卑宮室, WYG: ''}
