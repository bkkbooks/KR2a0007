  - {type: variant, offset: 4117, length: 9, content: 忼慨殊鄉別趣東西南, krp: 數使録寃獄行風俗師古曰行下更反振贍流民奉使稱㫖宋祁曰㫖當作意越本作意由是知名是時博士選三科高為尚書宋祁曰監本浙本作三科高第次為刺史其不通政事以久次補諸侯太傅光以高第為尚書觀故事品式數嵗明習漢制及法令上甚信任之轉為僕射尚書令師古曰先為僕射後為尚書令有詔光周密謹慎未嘗有過宋祁曰有詔字下當有以字加諸吏官以子男放為侍郎給事黄門數年遷諸吏光禄大夫秩中二千石給事中賜黄金百斤領尚書事後為光禄勲復領尚書諸吏給事中如故凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合師古曰希指希望天子㫖意也如或不從不敢强諫爭以是久而安宋祁曰浙本云獲安時有所言輙削草槀服䖍曰言已繕書輙削壊其草也宋祁曰注文繕字下監本有事字以為章主之過以奸忠直人臣大罪也師古曰奸求也奸忠直之名也奸音干宋祁曰注文奸忠當作求忠有所薦舉唯恐其人之聞知沭日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也晉灼曰長樂宫中有温室殿光嘿不應更答以它語其不泄如是光帝師傅子少以經行自著進官蚤成師古曰蚤古早字不結黨友養游說有求於人既性自守亦其勢然也師古曰言以名父之子學宦早成不須黨援也宋祁曰注文宦字别本作官徙光禄勲為御史大夫綏和中上即位二十五年無繼嗣至親有同產弟中山孝王及同產弟子定陶王在定陶王好學多材於帝子行師古曰行音胡浪反宋祁曰於帝子行越本云於帝為子行而王祖母傅太后隂為王求漢嗣私事趙皇后昭儀及帝舅大司馬票騎將軍王根故皆勸上上於是召丞相翟方進御史大夫光右將軍㢘襃後將軍朱博皆引入禁中議中山定陶王誰可為嗣者宋祁曰可字越本作宜字方進根以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也定陶王宜為嗣襃博皆如方進根議光獨以為禮立嗣以親中山王先帝之子帝親弟也以尚書盤庚殷之及王為比師古曰兄終弟及也比音必寐反中山王宜為嗣上以禮兄弟不相入廟又皇后昭儀欲立定陶王故遂立為太子光以議不中意左遷廷尉師古曰中當也光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻廼始等六人皆以長事未發覺時棄去或更嫁及長事發丞相方進大司空武議師古曰翟方進及何武以為令犯法者各以法時律令論之師古曰此具引令條之文也法時謂始犯法之時也明有所訖也師古曰訖止也長犯大逆時廼始等見為長妻已有當坐之罪與身犯法無異後廼棄去於法無以解師古曰解免也請論光議以為大逆無道父母妻子同產無少長皆棄市欲懲犯法者也師古曰懲創止也宋祁曰監本正文懲字下有後字夫婦之道有義則合無義則離長未知當坐大逆之法宋祁曰知字上當有自字而棄去廼始等或更嫁義已絶而欲以為長妻論殺之名不正不當坐有詔光議是是嵗右將軍襃後將軍博坐定陵紅陽侯師古曰㢘襃朱博坐與淳于長王立交厚也皆免為庻人以光為左將軍居右將軍官職執金吾王咸為右將軍居後將軍官職罷後將軍官數月丞相方進薨召左將軍光當拜已刻侯印書贊師古曰贊進也延進而拜之書贊者書贊辭於䇿也上暴崩即其夜於大行前拜受丞相博山侯印綬哀帝初即位躬行儉約省減諸用政事由已出朝廷翕然望至治焉襃賞大臣益封光千户時成帝母太皇太后自居長樂宫而帝祖母定陶傅太后在國邸有詔問丞相大司空定陶共王太后宜當何居光素聞傅太后為人剛暴長於權謀自帝在襁褓而飬長教道至於成人帝之立又有力光心恐傅太后與政事師古曰與讀曰豫不欲令與帝旦夕相近即議以為定陶太后宜改築宫大司空何武曰可居}
