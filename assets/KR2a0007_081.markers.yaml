  - {type: variant, offset: 4149, length: 8, content: 歫連卷踔夭蟜娭澗, WYG: 百姓飢饉父子分散流離道路以十萬數而百官羣職曠廢師古曰曠空也姦軌放縱盗賊並起或攻官寺殺長吏數以問君君無怵惕憂懼之意對毋能為師古曰言盗賊不能為害是以羣卿大夫咸惰哉莫以為意咎由君焉君秉社稷之重總百僚之任上無以匡朕之闕下不能綏安百姓書不云乎毋曠庻官天工人其代之師古曰虞書咎繇謩之辭也位非其人是為空官言人代天理官不可以天官私非其材於虖師古曰於讀曰烏虖讀曰呼君其上丞相博山侯印綬罷歸師古曰漢舊儀云丞相有它過使者奉策書即時歩出府乘棧車歸田里光退閭里杜}
