  - {type: 'tls:seg', offset: 4174, content: '', id: KR2a0007_tls_081-36a.18}
  - {type: variant, offset: 4176, length: 2, content: 獲夷, WYG: 也言先代至道之王必正其事言異變之來起事有不正也臣聞師曰天右與王者師古曰右讀曰佑佑助也宋祁曰右景佑本作左注亦作左予按王商𫝊擁佑太子注佑助也凡右為親左為逺故左遷左道皆離背去正之義不得訓左為助也故災異數見以譴告之欲其改更若不畏懼有以塞除而輕忽簡誣則凶罰加焉其至可必師古曰言輕忽天戒簡傲欺誣者其罰必至詩曰敬之敬之天惟顯思命不易哉師古曰周頌敬之篇顯明也思辭也言天甚明察宜敬之以承受天命甚難也宋祁曰浙本注云師古曰周頌敬之篇也敬肅也顯明也思辭也言天甚明察宜敬以承之受天命甚難也又曰畏天之威于時保之師古曰周頌我將之詩言必敬天之威於是乃得安皆謂不懼者凶懼之則吉也陛下聖徳聰明兢兢業業師古曰兢兢戒也業業危也承順天戒敬畏變異勤心虛已延見羣臣思求其故然後敇躬自約總正萬事放逺讒說之黨援納斷斷之介師古曰援引也斷斷専壹之貌介謂一介之人援音爰退去貪殘}
  - {type: page-break, offset: 4176, content: '', id: KR2a0007_WYG_081-29a, image: WYG0250/WYG0250-0651a.png}
