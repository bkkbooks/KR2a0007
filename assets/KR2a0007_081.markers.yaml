  - {type: variant, offset: 179, length: 5, content: 章句訓詁通, WYG: 衰止今日大赦明日犯法相隨入獄此殆導之未得其務也蓋保民者陳之以徳義示之以好惡師古曰保飬也陳施也孝經曰陳之以徳義而民莫遺其親示之以好惡而民知禁故衡引以為言觀其失而制其宜故動之而和綏之而安今天下俗貪財賤義好聲色上侈靡廉耻之節薄滛辟之意縱師古曰辟讀曰僻綱紀失序疏者踰内師古曰疏者妻妾之家内者同姓骨肉也踰謂過越也親戚之恩薄婚姻之黨隆苟合徼幸以身設利不改其原師古曰設施也原本也雖嵗赦之刑猶難使錯而不用也師古曰嵗赦謂毎嵗一赦也錯置也音千故反臣愚以為宜壹曠然大變其俗孔子曰能以禮讓為國乎何有師古曰論語載孔子之言謂能以禮讓治國則其事甚易朝廷者天下之楨幹也公卿大夫相與循禮恭讓則民不爭師古曰循順也好仁樂施則下不暴上義高節則民興行寛柔和恵則衆相愛四者明王之所以不嚴而成化也何者朝有變色之言則下有爭鬭之患上有自専之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盗竊之民此其本也師古曰言下之所行皆取化於上也今俗吏之治皆不本禮讓而上克暴宋祁曰克當作刻或忮害好䧟人於罪師古曰忮堅也謂酷害之心堅也忮音之䜴反宋祁曰忮字說見酷吏甯成傳韋昭曰忮音洎如淳曰詩云不忮不求屐弊也蕭該案字書忮恨也之豉反貪財而慕埶故犯法者衆姦邪不止雖嚴刑峻法猶不為變此非其天性有由然也師古曰非其天性自惡由上失於教化耳臣竊考國風之詩周南召南被賢聖之化深故篤於行而廉於色師古曰篤厚也謂樂得淑女以配君子憂在進賢不滛其色之類也鄭伯好勇而國人暴虎師古曰詩鄭風太叔于田之篇曰禮裼暴虎獻于公所將叔無狃戒其傷汝襢裼肉袒也暴虎空手以搏之也公鄭莊公也將請也叔莊公之弟太叔也狃􅏸也汝亦太叔也言以莊公好勇之故太叔肉袒空手搏虎取而獻之國人愛叔故請之曰勿􅏸為之恐傷汝也襢音袒裼音錫字並從衣將音千羊反狃音女九反宋祁曰注文中三虎字浙本並作鼔字秦穆貴信而士多從死應劭曰秦穆公與羣臣飲酒酒酣公曰生共此樂死共此哀於是奄息仲行鍼虎許諾及公薨皆從死黄鳥詩所為作也宋祁曰穆字浙本作繆字陳夫人好巫而民滛祀張晏曰胡公夫人武王之女大姬無子好祭鬼神鼓舞而祀故其詩云坎其擊鼓宛丘之下無冬無夏值其鷺羽晉侯好儉而民畜聚師古曰唐風山有樞之詩序云刺晉昭公也不能修道以正其國有財不能用有鐘鼔不能以自樂其詩曰子有衣裳弗曵弗婁子有車馬弗馳弗驅宛其死矣它人是愉故其俗皆吝嗇而積財也畜讀曰蓄太王躬仁邠國貴恕師古曰太王周文王之祖即古公亶父也國於邠修徳行義戎狄攻之欲得地與之人人皆怒欲戰古公曰以我故戰殺人父子而居之予不忍也乃與其私屬度漆沮踰梁山止於岐下邠人舉國扶老攜弱盡復歸古公於岐下及它旁國聞古公仁亦多歸之邠即今􅃎州是其地也言化太王之仁故其俗皆貴誠恕宋祁曰注文父子而居之浙本作父子而君之由此觀之治天下者審所上}
