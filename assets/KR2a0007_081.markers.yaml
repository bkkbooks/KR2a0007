  - {type: variant, offset: 19, length: 0, content: '', WYG: 師古曰承音證宋祁曰集解音證集解蓋臣瓚書也父世農夫至衡好學家貧庸作以供資用師古曰庸作言賣功庸為人作役而受顧也尤精力過絶人諸儒為之語曰無說詩匡鼎來服䖍曰鼎猶言當也若言匡且來也應劭曰鼎方也張晏曰匡衡少時字鼎長乃易字稚圭世所傳衡與貢禹書上言衡敬報下言匡鼎白知是字也師古曰服應二説是也賈誼曰天子春秋鼎盛}
  - {type: page-break, offset: 19, content: '', id: KR2a0007_WYG_081-1b, image: WYG0250/WYG0250-0637b.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 師古曰承音證宋祁曰集解音證集解蓋臣瓚書也父世農夫至衡好學家貧庸作以供資用師古曰庸作言賣功庸為人作役而受顧也尤精力過絶人諸儒為之語曰無說詩匡鼎來服䖍曰鼎猶言當也若言匡且來也應劭曰鼎方也張晏曰匡衡少時字鼎長乃易字稚圭世所傳衡與貢禹書上言衡敬報下言匡鼎白知是字也師古曰服應二説是也賈誼曰天子春秋鼎盛}
  - {type: variant, offset: 20, length: 1, content: 先, WYG: 義亦同而張氏之説盖穿鑿矣假有其書乃是後人見此傳云匡鼎來不曉其意妄作衡書云鼎白耳字以表徳豈人所自稱乎今有西京雜記者其書淺俗}
  - {type: variant, offset: 20, length: 1, content: 先, krp: 義亦同而張氏之説盖穿鑿矣假有其書乃是後人見此傳云匡鼎來不曉其意妄作衡書云鼎白耳字以表徳豈人所自稱乎今有西京雜記者其書淺俗}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 於里巷多有妄說乃云匡衡小名鼎蓋絶知者之聼宋祁曰祝季張云匡鼎來來音離協上韻僕檢左傳宣公二年棄申復來亦音離注文若言匡且來也考無若字匡語詩解人頤如淳曰使人笑不能止也宋祁曰南本浙本以語為說衡射䇿甲科以不應令除為太常掌故師古曰投射得甲科之策而所對文指不應令條也儒林傳説嵗課甲科為郎中乙科為太子舍人景科補文學掌故今不應令是不中甲科之令所以止為掌故宋祁曰注文浙本無說字調補平原文學師古曰調選也音徒釣反學者多上書薦衡經明當世少雙今為文學就官京師後進皆欲從衡平原衡不宜在逺方事下太子太傅蕭望之少府梁邱賀問衡對詩諸大義其對深羙宋祁曰别本作矣當作羙望之奏衡經學精習說有師道可觀覽宣帝不甚用儒遣衡歸官而皇太子見衡對私善之㑹宣帝崩元帝初即位樂陵侯史高以外屬為大司馬車騎將軍領尚書事前將軍蕭望之為副望之名儒有師傅舊恩天子任之多所貢薦髙充位而已師古曰言凡事不任也與望之有隙長安令楊興說髙曰將軍以親戚輔政貴重於天下無二然衆庻論議令問休譽不専在將軍者何也師古曰令善問名休美也宋祁曰注文善字名字下並當有也字彼誠有所聞也師古曰以其不能進賢也以將軍之莫府海内莫不卬望師古曰卬讀曰仰而所舉不過私門賔客乳母子弟人情忽不}
  - {type: page-break, offset: 22, content: '', id: KR2a0007_WYG_081-2a, image: WYG0250/WYG0250-0637c.png}
  - {type: page-break, offset: 22, content: '', id: KR2a0007_WYG_081-2b, image: WYG0250/WYG0250-0637d.png}
