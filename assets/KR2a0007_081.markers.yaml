  - {type: variant, offset: 29, length: 3, content: 支庶初, WYG: 其毛在内也今人則以背毛為裘而棄其白蓋取厚而温也衣音於既反宋祁曰注文故貴字下疑有之字於既字上疑有音字古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以}
  - {type: page-break, offset: 29, content: '', id: KR2a0007_WYG_081-3a, image: WYG0250/WYG0250-0638a.png}
  - {type: variant, offset: 29, length: 3, content: 支庶初, krp: 其毛在内也今人則以背毛為裘而棄其白蓋取厚而温也衣音於既反宋祁曰注文故貴字下疑有之字於既字上疑有音字古人病其若此故卑體勞心以求賢為務傳曰以賢難得之故因曰事不待賢以}
  - {type: variant, offset: 33, length: 1, content: 采, WYG: 難得之故而曰飽不待食惑之甚者也平原文學匡衡材智有餘經學絶倫但以無階朝廷故隨牒在逺方師古曰階謂升次也隨牒謂隨選補之恒牒不被超擢者將軍誠召置莫府學士歙然歸仁師古曰誠謂實行之也歙音翕與參事議觀其所有貢之朝廷必為國器師古曰所有謂材藝所長以此顯示衆庻名流}
