  - {type: variant, offset: 3228, length: 331, content: 二帝三王宮館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賓客充庖廚而已不奪百姓膏腴穀土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳳皇巢其樹黃龍游其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎胡御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁禦所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風其辭曰或稱戲農豈或帝王之彌文哉論者云否各亦並時而得宜奚必同條而共貫則泰山之封烏得七十而有二儀是以, WYG: ''}
