  - {type: variant, offset: 4171, length: 0, content: '', WYG: 大中不立其傳曰時則有日月亂行謂朓側慝孟康曰朓行疾也側慝行遲也師古曰朓音吐了反宋祁曰浙本有兩亂行字朓按書曰朓晦而日見西方也蕭該音丑召反甚則薄蝕是也又曰六沴}
