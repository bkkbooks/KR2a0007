  - {type: variant, offset: 255, length: 870, content: 有大度非聖哲之書不好也非其意雖富貴不事也顧嘗好辭賦先是時蜀有司馬相如作賦甚弘麗溫雅雄心壯之每作賦常擬之以為式又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以為君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉乃作書往往摭離騷文而反之自崏山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔牢愁廣騷文多不載獨載反離騷其辭曰有周氏之蟬嫣兮或鼻祖於汾隅靈宗初諜伯僑兮流于末之揚侯淑周楚之豐烈兮超既離虖皇波因江潭而往記兮欽弔楚之湘纍惟天軌之不辟兮何純絜而離紛紛纍以其淟涊兮暗纍以其繽紛漢十世之陽朔兮招搖紀于周正正皇天之清則兮度后土之方貞圖纍承彼洪族兮又覽纍之昌辭帶鉤矩而佩衡兮履欃槍以為綦素初貯厥麗服兮何文肆而質䪥資娵娃之珍髢兮鬻九戎而索賴鳳皇翔於蓬陼兮豈駕鵝之能捷騁驊騮以曲囏兮驢騾連蹇而齊足枳棘之榛榛兮蝯貁擬而不敢下靈修既信椒蘭之唼佞兮吾纍忽焉而不蚤睹衿芰茄之綠衣兮被夫容之朱裳芳酷烈而莫聞兮不如襞而幽之離房閨中容競淖約兮相態以麗佳知眾嫭之嫉妒兮何必颺纍之蛾眉懿神龍之淵潛竣慶雲而將舉亡春風之被離兮孰焉知龍之所處愍吾纍之眾芬兮颺燁燁之芳苓遭季夏之凝霜兮慶夭顇而喪榮橫江湘以南往兮云走乎彼蒼吾馳江潭之汎溢兮將折衷虖重華舒中情之煩或兮恐重華之不纍與陵陽侯之素波兮豈吾纍之獨見許精瓊靡與秋菊兮將以延夫天年臨汨羅而自隕兮恐日薄於西山解扶桑之總轡兮縱令之遂奔馳鸞皇騰而不屬兮豈獨飛廉與雲師卷薛芷與若蕙兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之費椒稰以要神兮又勤索彼瓊茅違靈氛而不從兮反湛身於江皋纍既夫傅說兮奚不信而遂行徒恐鷤䳏之將鳴兮顧先百草為不芳初纍棄彼虙妃兮更思瑤臺之逸女抨雄鴆以作媒兮何百離而曾不壹耦乘雲蜺之旖柅兮望昆侖以樛流覽四荒而顧懷兮奚必云女彼高丘既亡鸞車之幽藹兮駕八龍之委蛇臨江瀕而掩涕兮何有九招與九歌夫聖哲之遭兮固時命之所有雖增欷以於邑兮吾恐靈修之不纍改昔仲尼之去魯兮婓婓遲遲而周邁終回復於舊都兮何必湘淵與濤瀨溷漁父之餔歠兮絜沐浴之振衣棄由聃之所珍兮蹠彭咸之所遺孝成帝時客有薦雄文似相如者上方郊祠, WYG: 減損省}
