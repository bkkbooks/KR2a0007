  - {type: 'tls:seg', offset: 4183, content: '', id: KR2a0007_tls_081-36a.20}
  - {type: variant, offset: 4185, length: 25, content: 梨獵蒙蘢轔輕飛履般首帶修蛇鉤赤豹摼象犀跇巒阬超唐陂, WYG: 不敢與莽並有詔朝朔望領城門兵莽又風羣臣奏莽功徳稱宰衡位在諸侯王上百官統焉宋祁曰統字上當有總字光愈恐固稱疾辭位太后詔曰太師光聖人之後先師之子徳行純淑道術通明居四輔職輔道于帝師古曰道讀曰導今年耆有疾俊艾大臣惟國之重其猶不可以闕焉師古曰乂讀曰艾書曰無遺耉老師古曰周書召誥之辭也言不遺老成之人也國之將興尊師而重傅其令太師毎朝十日一賜餐賜太師靈夀杖孟康曰扶老杖也服䖍曰靈夀木名師古曰木有枝節長不過八九尺圍三四寸自然有合杖制不似竹須削治也黄門令為太師省中坐置几太師入省中用杖賜餐十七物師古曰食具有十七種物然後歸老于第官屬按職如故師古曰言十日一入朝受此寵禮它日則常在家自養而其屬官依常各行職務光凡為御史大夫丞相各再壹為大司徒太傅太師歴三世居公輔位前後十七年自為尚書止不教授後為卿時㑹門下大生講問疑難舉大義云其弟子多成就為博士大夫者見師居大位幾得其助力師古曰幾讀曰冀光終無所薦舉至或怨之其公如此光年七十元始五年薨莽白太后使九卿策贈以太師博山侯印綬賜乘輿祕器金錢雜帛少府供張諫大夫持節與謁者二人使䕶喪事博士䕶行禮太后亦遣中謁者持節視喪公卿百官㑹弔送𦵏載以乘輿輼輬及副各一乘師古曰輼輬}
