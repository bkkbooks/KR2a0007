  - {type: variant, offset: 191, length: 9, content: 見為人簡易佚蕩口吃, WYG: 明也應劭曰晻音闇水旱之災隨類而至今關東連年飢饉百姓乏困或至相食此皆生於賦斂多民所共者大師古曰共讀曰供而吏安集之宋祁曰江南本無之字浙本有}
