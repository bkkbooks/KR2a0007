  - {type: variant, offset: 741, length: 395, content: 尤桀黠皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌侯楊玉等恐怒亡所信鄉遂劫略小種背畔犯塞攻城邑殺長吏安國以騎都尉將騎三千屯備羌至浩亹為虜所擊失亡車重兵器甚眾安國引還至令居以聞是歲神爵元年春也時充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略然羌戎小夷逆天背畔滅亡不久願陛下以屬老臣勿以為憂上笑曰諾充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陳會明畢遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望陿中亡虜夜引兵上至落都召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數千人守杜田四望陿中兵豈得入哉充國常以遠斥候為務行必為戰備此必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲為用虜數挑戰充國堅守捕得生, WYG: 絶}
