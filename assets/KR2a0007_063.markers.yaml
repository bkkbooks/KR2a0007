  - {type: variant, offset: 6928, length: 0, content: '', WYG: 之終始何獨一嬖臣哉秦始皇即位三十九年内平六國外攘四夷死人如亂麻暴骨長城之下頭盧相屬於道師古曰盧頟骨也屬連也音之欲反不一日而無兵由是山東之難興四方潰而逆秦秦將吏外畔宋祁曰一本無下秦字賊臣内發亂作蕭牆禍成二世師古曰蕭牆謂屏牆也解在五行志故曰兵猶火也弗戢必自焚師古曰左傳隠四年衛有州吁之亂公問於衆仲曰州吁其成乎對曰兵猶火也不戢將自焚也言兵不可妄動乆而不戢則自焚燒戢歛也信矣是以倉頡作書止戈為武師古曰武字從止從戈所謂㑹意聖人以武禁暴整亂止息兵戈非以為殘而興縱之也易曰天之所助者順也人之所助者信也君}
