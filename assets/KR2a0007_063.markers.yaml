  - {type: variant, offset: 12, length: 0, content: '', WYG: 髙詐殺扶蘇而立胡亥也太子急然徳言征和二年七月壬午乃使客為使者收捕}
  - {type: variant, offset: 12, length: 0, content: '', krp: 髙詐殺扶蘇而立胡亥也太子急然徳言征和二年七月壬午乃使客為使者收捕}
  - {type: variant, offset: 13, length: 1, content: 國, WYG: 等按道侯說疑使者有詐不肯受詔客格殺說御史章贛被創突亡自歸甘泉太子使舎人無且師古曰且音子閭反持節夜入未央宫殿長秋門因長御倚華鄭氏曰長音長者如淳曰漢儀注女長御比侍中皇后見娙娥以下長御稱謝倚華}
  - {type: variant, offset: 13, length: 1, content: 國, krp: 等按道侯說疑使者有詐不肯受詔客格殺說御史章贛被創突亡自歸甘泉太子使舎人無且師古曰且音子閭反持節夜入未央宫殿長秋門因長御倚華鄭氏曰長音長者如淳曰漢儀注女長御比侍中皇后見娙娥以下長御稱謝倚華}
  - {type: variant, offset: 15, length: 4, content: 翁孫隴西, WYG: 也師古曰倚音於綺反具白皇后發中廐車載射士師古曰中廐皇后車馬所在也出武庫兵發長樂宫衛告令百官曰江充反廼斬充以狥炙胡巫}
  - {type: page-break, offset: 15, content: '', id: KR2a0007_WYG_063-3b, image: WYG0250/WYG0250-0356d.png}
