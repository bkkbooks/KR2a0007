  - {type: variant, offset: 50, length: 0, content: '', krp: 司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉眀縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家齊懐王閎與燕王旦廣陵王胥同日立皆賜策各以國土風俗申戒焉曰惟元狩六年四月乙巳皇帝使御史}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 夫湯師古曰張湯廟立子閎為齊王師古曰於廟授策也曰嗚呼小子閎受茲青社張晏曰王者以五色土為太社封四方諸侯各以其方色土與之苴以白茅歸以立社朕承天序惟稽古建爾國家師古曰言考於古道而立子為王封于東土世為漢藩輔嗚呼念哉共朕之詔師古曰共讀曰恭言敬聼我詔惟命不于常師古曰言皇天無親惟徳是輔善則得之惡則失之人之好徳克眀顯光義之不圗俾君子怠師古曰言人若好徳則能眀顯有光輝若不圗於義則君子懈怠無歸附之者圗謀也俾使也悉爾心允執其中天祿永終師古曰能盡爾心信執中和之徳則能終天祿者也厥有愆不臧廼凶于乃國而害于爾躬師古曰臧善也乃汝也嗚呼保國乂民可不敬與王其戒之師古曰保安也乂治也與讀曰歟閎母王夫人有寵閎尤愛幸立八年薨無子國除燕刺王旦賜策曰嗚呼小子旦受茲𤣥土建爾國家封于北土世為漢藩輔嗚呼薫鬻氏虐老獸心以姦巧邊甿服䖍曰薫鬻堯時匃奴號也孟康曰甿音萌師古曰虐老謂貴少壯而食甘肥賤耆老而與粗惡也獸心言貪暴而無仁義也甿庶人薫音勲鬻音育朕命將率徂征厥罪師古曰徂徃也萬夫長千夫長三十有二帥張晏曰時所獲三十二帥也宋祁曰别本三十並作三千誤降旗奔師如淳曰昆邪王偃其旗鼓而来降也薰鬻徙域張晏曰匃奴徙東劉奉世曰匃奴徙漠奴北州以妥孟康曰古綏字也臣瓉曰妥安也師古曰瓉說是也妥音他果反悉爾心毋作怨毋作棐徳服䖍曰棐薄也師古曰棐古匪字也匪非也毋廼廢備師古曰禦邊之備不可廢非敎士不得從徵張晏曰士不素習不得應召王其戒之旦壯大就國為人辯}
