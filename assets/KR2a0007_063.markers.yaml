  - {type: variant, offset: 1152, length: 0, content: '', krp: 廷尉大鴻臚即訊師古曰就問也宋祁曰浙本鴻臚字下有卿字胥謝曰罪死有餘誠皆有之師古曰誠實也事乆逺請歸思念具對胥既見使者還置酒顯陽殿召太子覇及子女董訾胡生等夜飲師古曰董訾胡生皆女名宋祁曰注文當云皆其女名使所幸八子郭昭君家人子}
  - {type: variant, offset: 1153, length: 0, content: '', WYG: 左君等鼓瑟歌舞師古曰八子姬妾之秩號也家人子無官秩者也王自歌曰欲乆生兮無終長不樂兮安窮師古曰人所以欲乆生者貴其安豫無有終極而我在生長不歡樂焉用窮盡年夀也奉天期兮不得須臾張晏曰奉天子期當死不得復延年千里馬兮駐待路張晏曰二卿亭驛待以答詔命黄泉下兮幽深人生要死何為苦心師古曰言人生必當有死無假勞心懐悲戚何用為樂心所喜出入無悰為樂亟韋昭曰悰亦樂也音裁宗反亟數亦疾也謂不乆也言人生以何為樂但以心志所喜好耳今我出入皆無歡怡不得乆長也喜音許吏反亟音丘吏反蒿里召兮郭門閱師古曰蒿里死人里死不得取代庸身自逝師古曰言死當自去不如他徭役得顧庸自代也逝合韻音上列反左右悉更涕泣奏酒師古曰更互也奏進也更音工衡反至雞鳴時罷胥謂太子覇曰上遇我厚今負之甚我死骸骨當暴幸而得𦵏薄之無厚也即以綬自絞死父八子郭昭君等二人皆自殺宋祁曰姚本父作及天子加恩赦王諸子皆為庶人賜諡曰厲王立六十四年而誅國除後七年元帝復立胥太子覇是為孝王十三年薨子共王意嗣師古曰共讀曰恭三年薨子哀王䕶嗣十六年薨無子絶後六年成帝後立孝王子守宋祁曰後立姚本作復立是為靖王立二十年薨子宏嗣王莽時絶初髙宻哀王𢎞本始元年以廣陵王胥少子立九年薨子頃王章嗣三十三年薨子懐王寛嗣十一年薨子慎嗣王莽時絶昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大}
  - {type: page-break, offset: 1153, content: '', id: KR2a0007_WYG_063-19b, image: WYG0250/WYG0250-0364d.png}
  - {type: page-break, offset: 1153, content: '', id: KR2a0007_WYG_063-20a, image: WYG0250/WYG0250-0365a.png}
