  - {type: variant, offset: 3141, length: 12, content: 誠令兵出破軍殺將以傾國家, WYG: 我嗌痛不能哭師古曰嗌喉咽也音益至城門遂復言賀曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北文頴曰弔哭帳也師古曰是謂此未至帳所有南北行道馬足未至數歩大王宜下車鄉闕西面伏哭盡哀止師古曰鄉讀曰嚮王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行􅁋亂大}
