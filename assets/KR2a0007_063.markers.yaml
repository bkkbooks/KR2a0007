  - {type: variant, offset: 3171, length: 0, content: '', WYG: 法度王自謂當於何詩之文也中音竹仲反大王位為諸侯王行汙於庶人師古曰汙濁也以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不乆祅祥數至血者隂憂象也宜畏慎自省賀終不改節居無何徴既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆師古曰版瓦大瓦也發視之青蠅矢也以問遂遂曰陛下之詩不云乎蘇林曰猶言陛下所讀之詩也營營青蠅至於藩愷悌君子毋信讒言師古曰已解于}
