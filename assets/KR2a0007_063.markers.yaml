  - {type: variant, offset: 5266, length: 458, content: 虜勢窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵勢國之大事當為後法老臣不以餘命壹為陛下明言兵之利害卒死誰當復言之者卒以其意對上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍衛尉其秋羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黃羝之屬四千餘人降漢封若零弟澤二人為帥眾王離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨眾時湯已拜受節有詔更用臨眾後臨眾病免五府復舉湯湯數醉䣱羌人羌人反畔卒如充國之言初破羌將軍武賢在軍中時與中郎將卬宴語卬道車騎將軍張安世始嘗不快上上欲誅之卬家將軍以為安世本持橐簪筆事孝武帝數十年見謂忠謹宜全度之安世用是得免及充國還言兵事武賢罷歸故官深恨上書告卬泄省中語卬坐禁止而入至充國莫府司馬中亂屯兵下吏自殺充國乞骸骨賜安車駟馬黃金六十斤罷就第朝庭每有四夷大議常與參兵謀問籌策焉年八十六甘露二年薨諡曰壯, WYG: 海昬}
