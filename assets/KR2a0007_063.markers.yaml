  - {type: variant, offset: 239, length: 2, content: 斬虜, WYG: 見留二十年不降還亶為典屬國師古曰亶音但今大將軍長史敞無勞為搜粟都尉師古曰楊敞也又將軍都郎羽林張晏曰都試郎羽林也師古曰都大也謂大㑹試之漢光祿挈令諸當試者不㑹都所免之宋祁曰又將軍浙本作又聞大將軍道上移蹕如淳曰移猶傳也太官先置師古曰昭紀云詐令人為燕王旦上書又云上曰朕知此書詐也將軍都郎屬耳燕王何以得知之而此傳乃云旦自上疏此下又云帝覺有詐遂親信光參錯不同疑此傳為誤臣旦願歸符璽入宿衛察姦臣之變是時昭帝年十四覺其有詐遂親信霍光而疏上官桀等桀等因謀共殺光廢帝迎立燕王為天子旦置驛書徃来相報許立桀為王外連郡國豪桀以千}
  - {type: page-break, offset: 239, content: '', id: KR2a0007_WYG_063-13b, image: WYG0250/WYG0250-0361d.png}
