  - {type: variant, offset: 3184, length: 0, content: '', krp: 體長大疾痿行歩}
  - {type: variant, offset: 3185, length: 3, content: 能自保, WYG: 便師古曰痿風痺疾也音人佳反衣短衣大絝冠恵文冠蘇林曰治獄法冠也孟康曰今侍中所著也服䖍曰武冠也或曰趙恵文王所服故曰恵文晉灼曰柱後恵文法冠也但言恵文侍中冠孟說是也佩玉環簪筆持牘趨謁師古曰簪筆挿筆於首也牘木簡也臣敞與坐語中庭閱妻子奴婢臣敞欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復来東至濟陽廼復聞梟聲臣敞閱至子女持轡師古曰賀之子女名持轡故王跪曰持轡母嚴長孫女也臣敞故知執金吾嚴延年字長孫女羅紨師古曰羅紨其名也紨音敷前為故王妻察故王衣服言語跪起清狂不恵蘇林曰凡狂者隂陽脉盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不慧曰清狂清狂如今白癡也妻十六人子二十二人其十一人男十一人女昧死奏名籍及奴婢財物簿臣敞前書言昌邑哀王歌舞者張修等十人無子又非姬但良人無官名王薨當罷歸太傅豹等擅留以為哀王園中人所不當得為師古曰於法不當然請罷歸故王聞之曰中人守園疾者當勿治相殺傷者當勿法欲令亟死太守奈}
  - {type: page-break, offset: 3185, content: '', id: KR2a0007_WYG_063-24a, image: WYG0250/WYG0250-0367a.png}
