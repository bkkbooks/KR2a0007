  - {type: variant, offset: 27, length: 3, content: 令居始, WYG: 縣之西閿鄉之東基趾猶存天下聞而悲之初太子有三男一女女者平輿侯嗣子尚焉及太子敗皆同時遇害衛后史良娣葬長安城南史皇孫皇孫妃王夫人及皇女孫葬廣眀蘇林曰苑名也皇孫二人随太子者與太子并葬湖師古曰今太子冡北有二冡相次則二皇孫也太子有遺孫一人史王孫子王夫人男年十八即尊位是}
