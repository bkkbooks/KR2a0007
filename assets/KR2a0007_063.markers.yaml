  - {type: variant, offset: 224, length: 0, content: '', WYG: 諸侯交手事之八年師古曰交手謂拱手也呂太后崩大臣誅諸呂迎立文帝天下乃知非孝恵子也我親武帝長子反不得立上書請立廟又不聼立者疑非劉氏即與劉澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以揺動百姓澤謀歸發兵臨淄與燕王俱起旦遂招來郡國姦人賦斂銅鐡作甲兵數閱其車騎材官卒建旌旗鼓車旄頭先􅇌師古曰􅇌與驅同郎中侍從者著貂羽黄金附蟬晋灼曰以翠羽飾冠也師古曰貂羽以貂尾為冠之羽也附蟬為金蟬以附冠前也凡此旄頭先驅皆天子之制而貂羽附蟬又天子侍中之飾王僭為之皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日師古曰講習也須待也郎中韓義等數諌旦旦殺義等凡十五人會缾侯劉成知澤等謀師古曰缾侯菑川靖王子也缾音歩丁反告之青州刺史雋不疑不疑收捕澤以聞天子遣大鴻臚丞治連引燕王有詔勿治而劉澤等皆伏誅益}
