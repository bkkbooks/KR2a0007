  - {type: variant, offset: 23, length: 0, content: '', krp: 炙燒也師古曰胡巫受充意指妄作蠱狀太子特忿且欲得其情實故以火炙之令毒痛耳遂部賓客為將率與丞相劉屈氂等戰長安中擾亂言太子反以故衆不肯附太子兵敗亡不得師古曰太子出亡而吏追捕不得也宋祁曰不肯越本無肯字上怒甚羣臣憂懼不知所出師古曰計無所出壺關三老茂上書曰師古曰壺關上黨之縣也荀恱漢紀云令狐茂班史不載其姓不知於何得也臣聞父者猶天母者猶地子猶萬物也故天平地安隂陽和調物乃茂成父慈母愛室家之中子廼孝順隂陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸師古曰論語云齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾豈得而食諸言父子君臣之道不立則國必危亡倉廪雖多吾不得食也昔者虞舜孝之至也而不中於瞽叟師古曰中當也瞽叟舜父也言不當其意也中音竹仲反孝巳被謗伯竒放流師古曰孝已伯竒並巳解於上骨肉至親父子相疑何者積毁之所生也由是觀之子無不孝而父有不察今皇太子為漢適嗣師古曰適讀曰嫡承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之𨽻臣耳師古曰𨽻賤也陛下顯而用之銜至尊之命以迫蹵皇太子師古曰蹵音千六反造飾姦詐羣邪錯謬是以親戚之路鬲塞而不通師古曰鬲與隔同太子進則不得上見退則困於亂臣獨寃結而亡告不忍忿忿之心起而殺充恐懼逋逃師古曰逋亡也子盗父兵以救難自免耳臣竊以為無邪心詩曰營營青蠅止於藩愷悌君子無信讒言讒言罔極交亂四國師古曰小雅青蠅之詩也營營徃來之貎也藩籬也愷樂悌易也言青蠅來徃止於藩籬變白作黑讒人搆毁間親令疏樂易之君子不當信用若讒言無極則四國亦以交亂宜深察也徃者江充讒殺趙太子天下莫不聞其罪固宜師古曰充宜得罪也陛下不省察深過太子師古曰以太子為罪過而深責之發盛怒舉大兵而求之三公自將智者不敢言辯士不敢說臣竊痛之臣聞子胥盡忠而忘其號師古曰忘亡也吳王殺之被以惡名失其善稱號比干盡仁而遺其身師古曰比干殷之賢臣以道諌紂紂怒殺之而剖其心也忠臣竭誠不顧鈇鉞之誅師古曰鈇所以斫人如今莝刃也音膚以陳其愚志在匡君安社稷也師古曰匡正也正其失也詩云取彼譖人投畀豺虎師古曰小雅巷伯之詩也言譖讒之人誠可疾惡願投與猛獸食之畀音必寐反唯陛下寛心慰意少察所親師古曰父子之道天性之親也毋患太子之非亟罷甲兵無令太子乆亡師古曰亟急也音居力反臣不勝惓惓師古曰惓讀曰拳解在劉向傳出一旦之命待罪建章闕下書奏天子感寤太子之亡也東至湖師古曰湖縣名今虢州䦩鄉湖城二縣皆其地也臧匿泉鳩里師古曰泉鳩水今在䦩鄉縣東南十五里見有戾太子冡冡在澗東也主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之師古曰贍足也而發覺吏圍捕太子太子自度不得脫師古曰度音大各反即入室距戸自經山陽男子張富昌為卒足蹋開戸新安令史李夀趨抱解太子主人公遂格鬬死皇孫二人皆并遇害上既傷太子乃下詔曰葢行疑賞所以申信也其封李夀為邘侯韋昭曰邘在河内師古曰為其解救太子也邘音于張富昌為題侯孟康曰縣名也晋灼曰地理志無也功臣表食邑鉅鹿師古曰晋說是也乆之巫蠱事多不信上知太子惶恐無他意而田千秋復訟太子寃上遂擢千秋為丞相而族滅江充家焚蘇文於横橋上孟康曰横音光師古曰即横門渭橋也及泉鳩里加兵刃於太子者初為北地太守}
