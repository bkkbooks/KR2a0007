  - {type: variant, offset: 1921, length: 1099, content: 書嘉納其冊以書敕讓充國曰皇帝問後將軍甚苦暴露將軍計欲至正月乃擊罕羌羌人當獲麥已遠其妻子精兵萬人欲為酒泉敦煌寇邊兵少民守保不得田作今張掖以東粟石百餘芻槀束數十轉輸並起百姓煩擾將軍將萬餘之眾不早及秋共水草之利爭其畜食欲至冬虜皆當畜食多藏匿山中依險阻將軍士寒手足皸瘃寧有利哉將軍不念中國之費欲以歲數而勝微將軍誰不樂此者今詔破羌將軍武賢將兵六千一百人敦煌太守快將二千人長水校尉富昌酒泉候奉世將婼月氏兵四千人亡慮萬二千人齎三十日食以七月二十二日擊罕羌入鮮水北句廉上去酒泉八百里去將軍可千二百里將軍其引兵便道西並進雖不相及使虜聞東方北方兵並來分散其心意離其黨與雖不能殄滅當有瓦解者已詔中郎將卬將胡越佽飛射士步兵二校益將軍兵今五星出東方中國大利蠻夷大敗太白出高用兵深入敢戰者吉弗敢戰者凶將軍急裝因天時誅不義萬下必全勿復有疑充國既得讓以為將任兵在外便宜有守以安國家乃上書謝罪因陳兵利害曰臣竊見騎都尉安國前幸賜書擇羌人可使使罕諭告以大軍當至漢不誅罕以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛德至計亡已故遣开豪雕庫宣天子至德罕开之屬皆聞知明詔今先零羌楊玉將騎四千及煎鞏騎五千阻石山木候便為寇罕羌未有所犯今置先零先擊罕釋有罪誅亡辜起壹難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今罕羌欲為敦煌酒泉寇飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與罕解仇結約然其私心不能亡恐漢兵至而罕开背之也臣愚以為其計常欲先赴罕开之急以堅其約先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌堅其約合其黨虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍眾莫須之屬不輕得離也如是虜兵寖多誅之用力數倍臣恐國家憂累繇十年數不二三歲而已臣得蒙天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至孰悉也於臣之計先誅先零已則罕开之屬不煩兵而服矣先零已誅而罕开不服涉正月擊之得計之理又其時也以今進兵誠不見其利唯陛下裁察六月戊申奏七月甲寅璽書報從充國計焉充國引兵至先零在所虜久屯聚解弛望見大軍棄車重欲渡湟水道阸狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善虜赴水溺死者數百降及斬首五百餘人鹵馬牛羊十萬餘頭車四千餘兩兵至罕地令軍毋燔聚落芻牧田中罕羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非為公家忠計也語未卒璽書報令靡忘以贖論後罕竟不煩兵而下其秋充國病上賜, WYG: ''}
