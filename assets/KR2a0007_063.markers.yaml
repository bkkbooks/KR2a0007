  - {type: variant, offset: 236, length: 1, content: 征, WYG: 上官桀父子與霍光争權有隙皆知旦怨光即私與燕交通旦遣孫縱之等前後十餘軰多齎金寳走馬師古曰走馬馬之善走者賂遺葢主上官桀及御史大夫桑𢎞羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章師古曰下音胡稼反旦聞之喜上疏曰昔秦據南面之位制一世之命威服四夷輕弱骨肉宋祁曰浙本輕字上有然字顯重異族廢道任刑無恩宗室其後尉陀入南夷陳渉呼楚澤師古曰呼音火故反近狎作亂内外俱發師古曰狎習也近習之人謂趙髙也趙氏無炊火焉韋昭曰趙秦之别氏師古曰無炊火言絶祀也髙皇帝覽蹤迹觀得失見秦建本非是故改其路規土連城布王子孫師古曰規畫也是以支葉扶疏異姓不得間也師古曰閒音工莧反今陛下承眀繼成師古曰承聖眀之後繼已成之業委任公卿羣臣連與成朋非毁宗室師古曰與謂黨與也膚受之愬日騁於廷惡吏廢法立威主恩不及下究師古曰究竟也言不終竟於下臣聞武帝使中郎將蘇武使}
