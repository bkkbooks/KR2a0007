  - {type: variant, offset: 50, length: 0, content: '', WYG: 司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉眀縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家齊懐王閎與燕王旦廣陵王胥同日立皆賜策各以國土風俗申戒焉曰惟元狩六年四月乙巳皇帝使御史}
