  - {type: variant, offset: 4845, length: 420, content: 之精兵散車甲於山野雖亡尺寸之功媮得避慊之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寬仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服丞相魏相曰臣愚不習兵事利害後將軍數畫軍冊其言常是臣任其計可必用也上於是報充國曰皇帝問後將軍上書言羌虜可勝之道今聽將軍將軍計善其上留屯田及當罷者人馬數將軍強食慎兵事自愛上以破羌強弩將軍數言當擊又用充國屯田處離散恐虜犯之於是兩從其計詔兩將軍與中郎將卬出擊強弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田明年五月充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟飢餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還所善浩星賜迎說充國曰眾人皆以破羌強弩出擊多斬首獲降虜以破壞然有識者以, WYG: 代宗}
