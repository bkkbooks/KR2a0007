  - {type: variant, offset: 4391, length: 389, content: 聞天子明令相捕斬之賞臣愚以為虜破可日月冀遠在來春故曰兵決可期月而望竊見北邊自敦煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大眾攻之而不能害今留步士萬人屯田地勢平易多高山遠望之便部曲相保為塹壘木樵校聯不絕便兵弩飭鬭具熢火幸通勢及并力以逸待勞兵之利者也臣愚以為屯田內有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸德宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於他種中遠涉河山而來為寇又見屯田之士精兵萬人終不敢復將其累重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之冊也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不苟接刃攻不必取不苟勞眾誠令兵出雖不能滅先零亶能令虜絕不為小寇則出兵可也即令同是而釋坐勝之道從乘危之勢往終不見利空內自罷敝貶重而自損非所以視蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以澹一隅臣愚, WYG: ''}
