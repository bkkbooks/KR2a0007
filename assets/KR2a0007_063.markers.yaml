  - {type: variant, offset: 218, length: 3, content: 定冊尊, WYG: 秉政襃賜燕王錢三千萬益封萬三千戸旦怒曰我當為帝何賜也遂與宗室中山哀王子劉長齊孝王孫劉澤等結謀詐言以武帝時受詔得職吏事修武備備非常如淳曰諸侯不得治民與職事是以為詐言受詔得知職事發兵為備也長於是為旦命令羣臣曰寡人賴先帝休徳師古曰休羙也獲奉北藩親受眀詔職吏事領庫兵飭武備師古曰飭讀與勅同飭整也任重職大夙夜兢兢子大夫將何以規佐寡人且燕國雖小成周之建國也師古曰自周以來即為燕國言以乆逺上自召公下及昭襄師古曰召公謂召公奭也昭㐮六國時燕之二王也召讀曰邵於今千載豈可謂無賢哉寡人束帯聼朝三十餘年曾無聞焉其者寡人之不及與師古曰與讀曰歟意亦子大夫之思有所不至乎其咎安在方今寡人欲撟邪防非章聞揚和師古曰撟正也章表也撟與矯同其字從手也撫慰百姓移風易俗厥路何由子大夫其各悉心以對寡人將察焉羣臣皆免冠謝郎中成軫謂旦曰大王失職獨可起而索不可坐而得也師古曰失職謂當為漢嗣而不被用也索求也大王壹起國中雖女子皆奮臂随大王旦曰前髙后時偽}
