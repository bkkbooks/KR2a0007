  - {type: variant, offset: 3133, length: 2, content: 卬懼, WYG: 利漢師古曰不知姓徴王乘七乘傳詣長安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諌王令還郎謁者五十餘人賀到濟陽求長鳴雞師古曰鳴聲長者也道買積竹杖文穎曰合竹作杖也過𢎞農}
