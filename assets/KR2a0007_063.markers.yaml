  - {type: variant, offset: 6928, length: 0, content: '', krp: 之終始何獨一嬖臣哉秦始皇即位三十九年内平六國外攘四夷死人如亂麻暴骨長城之下頭盧相屬於道師古曰盧頟骨也屬連也音之欲反不一日而無兵由是山東之難興四方潰而逆秦秦將吏外畔宋祁曰一本無下秦字賊臣内發亂作蕭牆禍成二世師古曰蕭牆謂屏牆也解在五行志故曰兵猶火也弗戢必自焚師古曰左傳隠四年衛有州吁之亂公問於衆仲曰州吁其成乎對曰兵猶火也不戢將自焚也言兵不可妄動乆而不戢則自焚燒戢歛也信矣是以倉頡作書止戈為武師古曰武字從止從戈所謂㑹意聖人以武禁暴整亂止息兵戈非以為殘而興縱之也易曰天之所助者順也人之所助者信也君}
  - {type: variant, offset: 6929, length: 1, content: 皆, WYG: 履信思順自天祐之吉無不利也師古曰易上繋辭也故車千秋指眀蠱情章太子之寃千秋材知未必能過人也以其銷惡運遏亂原師古曰遏止也音一曷反因衰激極道迎善氣師古曰激去至極之災引致福善之氣也道讀曰導傳得天人之祐助云師古曰傳引也前漢書卷六十三前漢書卷六十三考證戾太子傳上為立博望苑三輔黄圗曰苑在長安杜門外五里具白皇后發中廐車載射士注中廐皇后車馬所在也胡三省曰廐者天子之内廐也秦二世時公子髙曰中廐之寳馬得賜之非専主皇后車馬也有司奏請禮為人後云云臣召南按韋元成傳此議本始元年丞相蔡義等所奏也後八嵗有司復言禮父為士云云元康元年丞相魏相等所奏也長安白亭東為戾后園顧炎武曰此文云爾下云後八嵗封戾夫人曰戾后置園奉邑此兩收而未貫通者也燕刺王旦傳三十有二帥臣召南按事見霍去病傳上嘉去病之功曰渾邪王及厥衆萌咸奔於率降異國之王三十二大獵文安縣顧炎武曰上文言武帝時旦坐削良郷安次文安三縣是文安已削不屬燕又云昭帝立褒賜燕王益封萬三千戸然則文安之仍屬於燕必在益封之後也史文之互見者可以恭考得之廣陵厲王胥傳孝武帝下我注師古云云顧炎武曰言孝武帝降憑其身而言也昌邑王賀傳徴王乘七乘傳胡三省曰文帝之入立也乘六乘傳今乘七乘傳嘗見白犬髙三尺無頭通鑑考異曰傳云無頭五}
