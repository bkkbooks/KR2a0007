  - {type: variant, offset: 3136, length: 3, content: 客諫充, WYG: 大奴善以衣車載女子師古曰凡言大奴者謂奴之尤長大者也至湖師古曰即湖縣使者以讓相安樂張晏曰使者長安使人也師古曰讓責也安樂告遂遂入問賀賀曰無有遂曰即無有何愛一善以毁行義請收屬吏師古曰以善付吏也屬音之欲反其下亦同以湔洒大王師古曰湔澣也洒濯也湔音子顛反洒音先禮反即捽善屬衛士長行法師古曰捽持頭也衛士長主衛之官捽音材兀反賀到霸上大鴻臚郊迎騶奉乘輿車王使僕夀成御郎中令遂參乘旦至廣眀東都門遂曰禮奔䘮望見}
