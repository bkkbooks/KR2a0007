  - {type: variant, offset: 1163, length: 757, content: 兵今請欲一鬭而死可得邪充國子右曹中郎將卬將期門佽飛羽林孤兒胡越騎為支兵至令居虜並出絕轉道卬以聞有詔將八校尉與驍騎都尉金城太守合疏捕山間虜通轉道津渡初罕开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為亡罪乃遣歸告種豪大兵誅有罪者明白自別毋取并滅天子告諸羌人犯法者能相捕斬除罪斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬大男三千女子及老小千錢又以其所捕妻子財物盡與之充國計欲以威信招降罕开及劫略者解散虜謀徼極乃擊之時上已發三輔太常徒弛刑三河潁川沛郡淮陽汝南材官金城隴西天水安定北地上郡騎士羌騎與武威張掖酒泉太守各屯其郡者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虛勢不可久或曰至秋冬乃進兵此虜在竟外之冊今虜朝夕為寇土地寒苦漢馬不能冬屯兵在武威張掖酒泉萬騎以上皆多羸瘦可益馬食以七月上旬齎三十日糧分兵並出張掖酒泉合擊罕开在鮮水上者虜以畜產為命今皆離散兵即分出雖不能盡誅亶奪其畜產虜其妻子復引兵還冬復擊之大兵仍出虜必震壞天子下其書充國令與校尉以下吏士知羌事者博議充國及長史董通年以為武賢欲輕引萬騎分為兩道出張掖回遠千里以一馬自佗負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐勤勞而至虜必商軍進退稍引去逐水屮入山林隨而深入虜即據前險守後阸以絕糧道必有傷危之憂為夷狄笑千載不可復而武賢以為可奪其畜產虜其妻子此殆空言非至計也又武威縣張掖日勒皆當北塞有通谷水草臣恐匈奴與羌有謀且欲大入幸能要杜張掖酒泉以絕西域其郡兵尤不可發先零首為畔逆它種劫略故臣愚冊欲捐罕开闇昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者捬循和輯此全師保勝安邊之冊天子下其書公卿議者咸以為先零兵盛而負罕开之助不先破罕开則先零未可圖也上乃拜侍中樂成侯許延壽為強弩將軍即拜酒泉太守武賢為破羌將軍賜, WYG: 䘮主}
