  - {type: variant, offset: 257, length: 0, content: '', krp: 人天子加恩赦王太子建為庶人賜旦諡曰刺王旦立三十八年而誅國除後六年宣帝即位封旦兩子慶為新昌侯賢為安定侯又立故太子建是為廣陽頃王二十九年薨子穆王舜嗣二十一年薨子思王璜嗣二十年薨宋祁曰二十年浙本作二十九年子嘉嗣王莾時皆廢漢藩王為家人嘉獨以獻符命封扶羙侯賜姓王氏廣陵厲王胥賜策曰嗚呼小子胥受茲赤社建爾國家封於南土世世為漢藩輔劉攽曰多一世字古人有言曰大江之南五湖之間其人輕心揚州保彊李奇曰保恃也三代要服不及以正師古曰要服次荒服之内者也正政也要音一遥反烏呼悉爾心祗祗兢兢廼恵廼順師古曰祗祗敬也兢兢順也言當慈恵於下忠順於上也毋桐好逸毋邇宵人應劭曰無好逸游之事邇近小人也張晏曰桐音同師古曰桐音通桐輕脫之貌也惟法惟則師古曰言當依法則書云臣不作福不作威師古曰周書洪範云臣無有作威作福也靡有後羞王其戒之師古曰言宜戒慎勿令後有羞辱之事也胥壯大好倡樂逸㳺力扛鼎師古曰扛舉也音江空手摶熊彘猛獸動作無法度故終不得為漢嗣昭帝初立益封胥}
