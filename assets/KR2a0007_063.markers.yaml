  - {type: variant, offset: 5758, length: 1026, content: 習為太夫人岑父母求錢財亡已忿恨相告岑坐非子免國除元始中修功臣後復封充國曾孫伋為營平侯初充國以功德與霍光等列畫未央宮成帝時西羌嘗有警上思將帥之臣追美充國乃召黃門郎楊雄即充國圖畫而頌之曰明靈惟宣戎有先零先零昌狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震既臨其域諭以威德有守矜功謂之弗克請奮其旅于罕之羌天子命我從之鮮陽營平守節婁奏封章料敵制勝威謀靡亢遂克西戎還師於京鬼方賓服罔有不庭昔周之宣有方有虎詩人歌功乃列于雅在漢中興充國作武赳赳桓桓亦紹厥後充國為後將軍徙杜陵辛武賢自羌軍還後七年復為破羌將軍征烏孫至敦煌後不出徵未到病卒子慶忌至大官辛慶忌字子真少以父任為右校丞隨長羅侯常惠屯田烏孫赤谷城與歙侯戰陷陳卻敵惠奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂材遷郎中車騎將朝庭多重之者輔為校尉遷張掖太守徙酒泉所在著名成帝初徵為光祿大夫遷左曹中郎將至執金吾始武賢與趙充國有隙後充國家殺辛氏至慶忌為執金吾坐子殺趙氏左遷酒泉太守歲餘大將軍王鳳薦慶忌前在兩郡著功迹徵入歷位朝廷莫不信鄉質行正直仁勇得眾心通於兵事明略威重任國柱石父破羌將軍武賢顯名前世有威西夷臣鳳不宜久處慶忌之右乃復徵為光祿大夫執金吾數年坐小法左遷雲中太守復徵為光祿勳時數有災異丞相司直何武上封事曰虞有宮之奇晉獻不寐衛青在位淮南寢謀故賢人立朝折衝厭難勝於亡形司馬法曰天下雖安忘戰必危夫將不豫設則亡以應卒士不素厲則難使死敵是以先帝建列將之官近戚主內異姓距外故姦軌不得萌動而破滅誠萬世之長冊也光祿勳慶忌行義修正柔毅敦厚謀慮深遠前在邊郡數破敵獲虜外夷莫不聞乃者大異並見未有其應加以兵革久寢春秋大災未至而豫禦之慶忌宜在爪牙官以備不虞其後拜為右將軍諸吏散騎給事中歲餘徙為左將軍慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明唯是為奢為國虎臣遭世承平匈奴西域親附敬其威信年老卒官長子通為護羌校尉中子遵函谷關都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人元始中安漢公王莽秉政見慶忌本大將軍鳳所成三子皆能欲親厚之是時莽方立威柄用甄豐甄邯以自助豐邯新貴威震朝廷水衡都尉茂自見名臣子孫兄弟並列不甚詘事兩甄時平帝幼外家衛氏不得在京師而護羌校尉通長子次兄素與帝從舅衛子伯相善兩人俱游俠賓客甚盛及呂寬事起莽誅衛氏兩甄搆言諸辛陰與衛子伯為心腹有背恩不說安漢公之謀於是司直陳崇舉奏其宗親隴西辛興等侵陵百姓威行州郡莽遂按通父子遵茂兄弟及南郡太守辛伯等皆誅殺之辛氏繇是廢慶忌本狄道人為將軍徙昌陵昌陵罷留長安, WYG: ''}
