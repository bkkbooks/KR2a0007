  - {type: variant, offset: 3172, length: 6, content: 意遣繡衣來責, WYG: 陛下左側讒人衆多如是青蠅惡矣師古曰惡即矢也越王句踐為吳王嘗惡亦其義也宜進先帝大臣子孫親近以為左右如不忍昌邑故人師古曰如若也不忍謂不能疏逺也信用讒諛必有凶咎願詭禍為福師古曰詭猶反皆放逐之臣當先逐矣賀不用其言卒至於廢大}
