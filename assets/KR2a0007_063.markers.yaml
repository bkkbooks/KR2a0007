  - {type: variant, offset: 47, length: 2, content: 沈勇, WYG: 後者為之子也故降其父母不得祭師古曰謂本生之父母也尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰閑師古曰閑猶限也謹行視孝昭帝所為故皇太子起位在湖文頴曰位冡位也師古曰行音下更反史良娣冢在博望苑北親史皇孫位在廣眀郭北如淳曰親謂父也諡法曰諡者行之迹也愚以為親諡宜曰悼皇母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冢三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園孟康曰閿古闅字從門中􅡚建安中正作閿師古曰􅡚舉目使人也􅡚音許密反閿字本從􅡚其後轉訛誤遂作門中受耳而郭璞廼音汝授反葢失理逺耳長安白亭東為戾后園廣眀成鄉為悼園皆改葬焉後八嵗}
