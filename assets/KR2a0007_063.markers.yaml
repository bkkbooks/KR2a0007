  - {type: variant, offset: 11, length: 0, content: '', WYG: 乃得太子甚喜為立禖師古曰禖求子之神也解在枚臯傳使東方朔枚臯作禖祝師古曰祝禖之祝辭少壯詔受公羊春秋師古曰少壯者言漸長大也少讀如本字又従瑕丘江公受糓梁及冠就宫上為立博望苑師古曰取其廣博觀望也使通賓客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣太子之内官也太子有妃有良娣有孺子凡三等師古曰娣音弟産子男進號曰史皇孫張晏曰皆以舅氏姓為氏以相别也師古曰進者皇孫名武帝末衛后寵衰江充用事充與太子及衛氏有隙師古曰充為直指使者劾太子家車行馳道上没入車馬太子求充充不聴也恐上晏駕後為太子所誅㑹巫蠱事起充因此為姦是時上春秋髙意多所惡以為左右皆為蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主師古曰両公主及皇后弟子長平侯衛伉皆坐誅師古曰伉音抗又音剛語在公孫賀江充傳充典治巫蠱既知上意白言宫中有蠱氣入宫至省中壊御座掘地上使按道侯韓說御史章贛黄門蘇文等助充師古曰說讀曰恱贛音貢充遂至太子宫掘蠱得桐木人時上疾辟暑甘泉宫師古曰辟讀曰避獨皇后太子在師古曰在亰師太子召問少傅石徳師古曰石慶子徳懼為師傅并誅因謂太子曰前丞相父子兩宫主及衛氏皆坐此今巫與使者掘地得徴騐不知巫置之邪將實有也無以自眀可矯以節收捕充等繋獄師古曰矯託也託詔命也窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報蘇林曰家吏皇后吏也臣瓉曰太子稱家家吏是太子吏也師古曰既言皇后及家吏此為皇后吏及太子吏耳瓉說是也上存亡未可知而姦臣如此太子將不念秦扶蘇事耶韋昭曰始皇死}
