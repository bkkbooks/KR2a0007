  - {type: variant, offset: 3180, length: 2, content: 將軍, WYG: 光更尊立武帝曽孫是為孝宣帝即位心内忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盗賊察徃来過客毋下所賜書師古曰宻令警察不欲宣露也敞於是條奏賀居處著其廢亡}
  - {type: variant, offset: 3180, length: 2, content: 將軍, krp: 光更尊立武帝曽孫是為孝宣帝即位心内忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盗賊察徃来過客毋下所賜書師古曰宻令警察不欲宣露也敞於是條奏賀居處著其廢亡}
  - {type: variant, offset: 3183, length: 0, content: '', WYG: 效師古曰著眀也曰臣敞地節三年五月視事故昌邑王居故宫奴婢在中者百八十三人閉大門開小門亷吏一人為領錢物市買朝内食物師古曰每旦一内之它不得出入師古曰食物之外皆不得妄有出入督盗一人别主徼循察徃来者以王家錢取卒迾宫清中備盗賊李竒曰迾遮也鄧展曰令其宫中清靖不得妄有異人也師古曰以王家錢顧人為卒也臣敞數遣丞吏行察師古曰行音下更反四年九月中臣敞入視居處狀故王年二十六七為人青黒色小目鼻末銳卑少須眉}
  - {type: page-break, offset: 3183, content: '', id: KR2a0007_WYG_063-23b, image: WYG0250/WYG0250-0366d.png}
  - {type: variant, offset: 3183, length: 0, content: '', krp: 效師古曰著眀也曰臣敞地節三年五月視事故昌邑王居故宫奴婢在中者百八十三人閉大門開小門亷吏一人為領錢物市買朝内食物師古曰每旦一内之它不得出入師古曰食物之外皆不得妄有出入督盗一人别主徼循察徃来者以王家錢取卒迾宫清中備盗賊李竒曰迾遮也鄧展曰令其宫中清靖不得妄有異人也師古曰以王家錢顧人為卒也臣敞數遣丞吏行察師古曰行音下更反四年九月中臣敞入視居處狀故王年二十六七為人青黒色小目鼻末銳卑少須眉}
