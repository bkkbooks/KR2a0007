  - {type: substitution, offset: 251, original: 匈, replacement: 胸, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3879}}
  - {type: variant, offset: 254, length: 0, content: '', WYG: 王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之師古曰鄉讀曰嚮正讙不可止師古曰人衆既多故讙譁也大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂羣臣葢主報言獨患大將軍與右將軍王莾張晏曰天水人也字稚叔今右將軍物故師古曰謂死也丞相病幸事必成徵不乆令羣臣皆裝是時天雨虹下屬宫中師古曰屬猶注也音之欲反飲井水井水泉竭宋祁曰越本無泉字厠中豕羣出壊大官竈師古曰厠養豕圂也圂音胡困反烏鵲鬬死䑕舞殿端門中師古曰端門正門也殿上戸自閉不可開天火燒城門大風壊宫城樓折㧞樹木流星下墯后姬以下皆恐王驚病使人祠葭水台水晋灼曰地理志葭水在廣平南和台水在鴈門師古曰葭音家台音怡王客吕廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者語具在五行志王愈憂恐謂廣等曰謀事不成妖祥數見兵氣且至奈何㑹葢主舎人父燕倉知其謀告之由是}
  - {type: page-break, offset: 254, content: '', id: KR2a0007_WYG_063-14b, image: WYG0250/WYG0250-0362b.png}
  - {type: variant, offset: 254, length: 0, content: '', krp: 王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之師古曰鄉讀曰嚮正讙不可止師古曰人衆既多故讙譁也大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂羣臣葢主報言獨患大將軍與右將軍王莾張晏曰天水人也字稚叔今右將軍物故師古曰謂死也丞相病幸事必成徵不乆令羣臣皆裝是時天雨虹下屬宫中師古曰屬猶注也音之欲反飲井水井水泉竭宋祁曰越本無泉字厠中豕羣出壊大官竈師古曰厠養豕圂也圂音胡困反烏鵲鬬死䑕舞殿端門中師古曰端門正門也殿上戸自閉不可開天火燒城門大風壊宫城樓折㧞樹木流星下墯后姬以下皆恐王驚病使人祠葭水台水晋灼曰地理志葭水在廣平南和台水在鴈門師古曰葭音家台音怡王客吕廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者語具在五行志王愈憂恐謂廣等曰謀事不成妖祥數見兵氣且至奈何㑹葢主舎人父燕倉知其謀告之由是}
  - {type: variant, offset: 255, length: 0, content: '', WYG: 覺丞相賜璽書部中二千石逐捕孫縱之及左將軍桀等皆伏誅旦聞之召相平曰事敗遂發兵乎平曰左將軍已死百姓皆知之不可發也王憂懣師古曰懣音滿又音悶解在司馬遷傳置酒萬載宫㑹賓客羣臣妃妾坐飲王自歌曰歸空城兮狗不吠雞不鳴横術何廣廣兮固知國中之無人蘇林曰廣音曠臣瓉曰術道路也師古曰廣讀如本字此歌意言身死之後國當空也華容夫人起舞曰髪紛紛兮窴渠孟康曰窴音羃髪歴羃挂岸也臣瓉曰窴塞溝渠師古曰瓉說是也窴音徒千反骨籍籍兮亡居師古曰籍籍從横皃也居處也母求死子兮妻求死夫裴囘両渠間兮君子獨安居師古曰置酒之宫池沼所在其間有渠故即其所見以為歌辭也坐者皆泣有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之眀光殿王曰老虜曹為事當族師古曰曹軰也欲自殺左右曰黨得削國師古曰黨音他朗反幸不死后姬夫人共啼泣止王會天子使使者賜燕王璽書曰昔髙皇帝王天下建立子弟以藩屏社稷先日諸呂隂謀大逆劉氏不絶若髪賴絳侯等誅討賊亂尊立孝文以安宗廟非以中外有人表裏相應故邪樊酈曹灌攜劒推鋒師古曰樊噲酈商曹參灌嬰等從髙皇帝墾菑除害耘鉏海内師古曰菑古災字當此之時頭如蓬葆頭乆不理如蓬草羽葆也師古曰草叢生曰葆音保宋祁曰浙本注文頭字上有服䖍曰三字勤苦至矣然其賞不過封侯今宗室子孫曾無暴衣露冠之勞裂地而王之分財而賜之父死子繼兄終弟及今王骨肉至親敵吾一體師古曰言若四肢之一也廼與他姓異族謀害社稷親其所疏疏其所親有逆悖之心無忠愛之義如使古人有知當何面目復奉齊酎見髙祖之廟乎師古曰古人謂先人旦得書以符璽屬醫工長師古曰屬委也醫工長王官之主醫者也屬音之欲反謝相二千石奉事不謹死矣即以綬自絞后夫人隨旦自殺者二}
