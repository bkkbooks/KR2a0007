  - {type: variant, offset: 1152, length: 0, content: '', WYG: 廷尉大鴻臚即訊師古曰就問也宋祁曰浙本鴻臚字下有卿字胥謝曰罪死有餘誠皆有之師古曰誠實也事乆逺請歸思念具對胥既見使者還置酒顯陽殿召太子覇及子女董訾胡生等夜飲師古曰董訾胡生皆女名宋祁曰注文當云皆其女名使所幸八子郭昭君家人子}
