  - {type: variant, offset: 10, length: 0, content: '', WYG: 三師古曰諸帝子傳皆言王而此獨云子者以戾太子在其中也孝武皇帝六男衛皇后生戾太子趙婕妤生孝昭帝王夫人生齊懐王閎師古曰閎音宏李姬生燕刺王旦廣陵厲王胥師古曰不知官秩故云李姬諡法暴戾無親曰刺刺音来葛反李夫人生昌邑哀王髆師古曰髆音博戾太子據元狩元年立為皇太子年七嵗矣初上年二十}
