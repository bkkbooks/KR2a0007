  - {type: variant, offset: 3823, length: 372, content: 畔志而明主般師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事步兵九校吏士萬人留屯以為武備因田致穀威德並行一也又因排折羌虜令不得歸肥饒之墬貧破其眾以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也至春省甲士卒循河湟漕穀至臨羌以眎羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墯之患坐得必勝之道七也亡經阻遠追死傷之害八也內不損威武之重外不令虜得乘間之勢九也又亡驚動河南大开小开使生它變之憂十也治湟陿中道橋令可至鮮水以制西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長冊唯明詔博詳公卿, WYG: 司}
