  - {type: variant, offset: 6, length: 0, content: '', WYG: 四十四魏相字弱翁濟隂定陶人也師古曰說者謂相即魏無知之後蓋承淺近之書為妄深矣徙平陵少學易為郡卒史舉賢良以對策髙第為茂陵令頃之御史大夫桑宏羊客詐稱御史止傳師古曰傳謂縣之傳舍丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市師古曰殺之於市茂陵大治後遷河南太守宋祁曰浙本遷字下有為字禁止姦邪豪彊畏服會丞相車千秋死先是千秋子為雒陽武庫令自見失父而相治郡嚴恐久獲罪宋祁曰罪字疑從辠書乃自免去相使掾追呼之遂不肯還相獨恨曰大將軍聞此令去官必以為我用丞相死不能遇其子使當世貴人非我殆矣師古曰殆危也武庫令西至長安大將軍霍光果以責過相曰㓜主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令今河南太守不深惟國家大策師古曰惟思也苟見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人師古曰來京師諸官府為戍卒若今衞士上番分守諸司􅃒大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄師古曰光心以武庫令事嫌之而下其賊殺不辜之獄久繫踰冬會赦出宋祁曰繫字下疑有之字復有詔守茂陵令遷揚州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫予相書曰朝廷已深知弱翁治行方且大用矣願少愼事自重臧器于身師古曰易下繫辭云君子臧器於身待時而動言不顯見其材能相心善其言為霽威嚴蘇林曰霽音限齊之齊臣瓉曰此雨霽字也霽止也師古曰二説皆是也音才詣反又子詣反居部二嵗徵為諫大夫復為河南太守數年宣帝即位徴相入為大司農遷御史大夫四嵗大將軍霍光薨上思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事師古曰山者去病之孫今言兄子此傳誤相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫師古曰解在}
