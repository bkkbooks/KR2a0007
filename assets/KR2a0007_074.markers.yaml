  - {type: variant, offset: 145, length: 3192, content: 法律聰達有材帝甚愛之太子寬仁喜儒術上數嗟歎憲王曰真我子也常有意欲立張倢伃與憲王然用太子起於微細上少依倚許氏及即位而許后以殺死太子蚤失母故弗忍也久之上以故丞相韋賢子玄成陽狂讓侯兄經明行高稱於朝廷乃召拜玄成為淮陽中尉欲感諭憲王輔以推讓之臣由是太子遂安宣帝崩元帝即位乃遣憲王之國時張倢伃已卒憲王有外祖母舅張博兄弟三人歲至淮陽見親輒受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬願王為償王不許博辭去令弟光恐云王遇大人益解博欲上書為大人乞骸骨去王乃遣人持黃金五十斤送博博喜還書謝為諂語盛稱譽王因言當今朝廷無賢臣災變數見足為寒心萬姓咸歸望於大王大王奈何恬然不求入朝見輔助主上乎使弟光數說王宜聽博計令於京師說用事貴人為王求朝王不納其言後光欲至長安辭王復言願盡力與博共為王求朝王即日至長安可因平陽侯光得王欲求朝語馳使人語博博知王意動復遺王書曰博幸得肺腑數進愚策未見省察北游燕趙欲循行郡國求幽隱之士聞齊有駟先生者善為司馬兵法大將之材也博得謁見承間進問五帝三王究竟要道卓爾非世俗之所知今邊境不安天下騷動微此人其莫能安也又聞北海之瀕有賢人焉累世不可逮然難致也得此二人而薦之功亦不細矣博願馳西以此赴助漢急無財幣以通顯之趙王使謁者持牛酒黃金三十斤勞博博不受復使人願尚女聘金二百斤博未許會得光書云大王已遣光西與博并力求朝博自以棄捐不意大王還意反義結以朱顏願殺身報德朝事何足言大王誠賜咳唾使得盡死湯禹所以成大功也駟先生蓄積道術書無不有願知大王所好請得輒上王得書喜說報博書曰子高乃幸左顧存恤發心惻隱顯至誠納以嘉謀語以至事雖亦不敏敢不諭意今遣有司為子高償責二百萬是時博女壻京房以明易陰陽得幸於上數召見言事自謂為石顯五鹿充宗所排謀不得用數為博道之博常欲誑耀淮陽王即具記房諸所說災異及召見密語持予淮陽王以為信驗詐言已見中書令石君求朝許以金五百斤賢聖制事蓋慮功而不計費昔禹治鴻水百姓罷勞成功既立萬世賴之今聞陛下春秋未滿四十髮齒墮落太子幼弱佞人用事陰陽不調百姓疾疫飢饉死者且半鴻水之害殆不過此大王緒欲救世將比功德何可以忽博已與大儒知道者為大王為便宜奏陳安危指災異大王朝見先口陳其意而後奏之上必大說事成功立大王即有周邵之名邪臣散亡公卿變節功德亡比而梁趙之寵必歸大王外家亦將富貴何復望大王之金錢王喜說報博書曰乃者詔下止諸侯朝者寡人憯然不知所出子高素有顏冉之資臧武之智子貢之辯卞莊子之勇兼此四者世之所鮮既開端緒願卒成之求朝義事也奈何行金錢乎博報曰已許石君須以成事王以金五百斤予博會房出為郡守離左右顯具得此事告之房漏泄省中語博兄弟詿誤諸侯王誹謗政治狡猾不道皆下獄有司奏請逮捕欽上不忍致法遣諫大夫王駿賜欽璽書曰皇帝問淮陽王有司奏王王舅張博數遺王書非毀政治謗訕天子襃舉諸侯稱引周湯以讇惑王所言尤惡悖逆無道王不舉奏而多與金錢報以好言辠至不赦朕惻焉不忍聞為王傷之推原厥本不祥自博惟王之心匪同于凶已詔有司勿治王事遣諫大夫駿申諭朕意詩不云乎靖恭爾位正直是與王其勉之駿諭指曰禮為諸侯制相朝聘之義蓋以考禮壹德尊事天子也且王不學詩乎詩云俾侯於魯為周室輔今王舅博數遺王書所言悖逆王幸受詔策通經術知諸侯名譽不當出竟天子普覆德布於朝而恬有博言多予金錢與相報應不忠莫大焉故事諸侯王獲罪京師罪惡輕重縱不伏誅必蒙遷削貶黜之罪未有但已者也今聖主赦王之罪又憐王失計忘本為博所惑加賜璽書使諫大夫申諭至意殷勤之恩豈有量哉博等所犯惡大群下之所共攻王法之所不赦也自今以來王毋復以博等累心務與眾棄之春秋之義大能變改易曰藉用白茅无咎言臣子之道改過自新絜己以承上然後免於咎也王其留意慎戒惟思所以悔過易行塞重責稱厚恩者如此則長有富貴社稷安矣於是淮陽王欽免冠稽首謝曰奉藩無狀過惡暴列陛下不忍致法加大恩遣使者申諭道術守藩之義伏念博罪惡尤深當伏重誅臣欽願悉心自新奉承詔策頓首死罪京房及博兄弟三人皆棄市妻子徙邊至成帝即位以淮陽王屬為叔父敬寵之異於它國王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還丞相御史復劾欽前與博相遺私書指意非諸侯王所宜蒙恩勿治事在赦前不悔過而復稱引自以為直失藩臣體不敬上加恩許王還徙者三十六年薨子文王玄嗣二十六年薨子縯嗣王莽時絕楚孝王囂甘露二年立為定陶王三年徙楚成帝河平中入朝時被疾天子閔之下詔曰蓋聞天地之性人為貴人之行莫大於孝楚王囂素行孝順仁慈之國以來二十餘年孅介之過未嘗聞朕甚嘉之今乃遭命離于惡疾夫子所痛曰蔑之命矣夫斯人也而有斯疾也朕甚閔焉夫行純茂而不顯異則有國者將何勗哉書不云乎用德章厥善今王朝正月詔與子男一人俱其以廣戚縣戶四千三百封其子勳為廣戚侯明年囂薨子懷王文嗣一年薨無子絕明年成帝復立文弟平陸侯衍是為思王二十一年薨子紆嗣王莽時絕初成帝時又立紆弟景為定陶王廣戚侯勳薨諡曰煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝後莽篡位以嬰為定安公漢既誅莽更始時嬰在長安平陵方望等頗知天文以為更始必敗嬰本統當立者也共起兵將嬰至臨涇立為天子更始遣丞相李松擊破殺嬰云東平思王宇甘露二年立元帝即位就國壯大通姦犯法上以至親貰弗罪傅相連坐久之事太后內不相得太后上書言之求守杜陵園上於是遣太中大夫張子蟜奉璽書敕諭之曰皇帝問東平王蓋聞親親之恩莫重於孝尊尊之義莫大於忠故諸侯在位不驕以致孝道制節謹度以翼天子然後富貴不離於身而社稷可保今聞王自修有闕本朝不和流言紛紛謗自內興朕甚憯焉為王懼之詩不云乎毋念爾祖述修厥德永言配命自求多福朕惟王之春秋方剛忽於道德意有所移忠言未納故臨遣太中大夫子蟜諭王朕意孔子曰過而不改是謂過矣王其深惟孰思之無違朕意又特以璽書賜王太后曰皇帝使諸吏宦者令承問東平王太后朕有聞王太后少加意焉夫福善之門莫美於和睦患咎之首莫大於內離今東平王出繈褓之中而託于南面之位加以年齒方剛涉學日寡驁忽臣下不自它於太后以是之間能無失禮義者其唯聖人乎傳曰父為子隱直在其中矣王太后明察此意不可不詳閨門之內母子之間同氣異息骨肉之恩豈可忽哉豈可忽哉昔周公戒伯禽曰故舊無大故則不可棄也毋求備於一人夫以故舊之恩猶忍小惡而況此乎已遣使者諭王王既悔過服罪太后寬忍以貰之後宜不敢王太后強餐止思念慎疾自愛宇慚懼因使者頓首謝死罪願洒心自改詔書又敕傅相曰夫人之性皆有五常及其少長耳目牽於耆欲故五常銷而邪心作情亂其性利勝其義而不失厥家者未之有也今王富於春秋氣力勇武獲師傅之教淺加以少所聞見自今以來非五經之正術敢以游獵非禮道王者輒以名聞宇立二十年元帝崩宇謂中謁者信等曰漢大臣議天子少弱未能治天下以為我知文法建欲使我輔佐天子我見尚書晨夜極苦使我為之不能也今暑熱縣官年少持服恐無處所我危得之比至下宇凡三哭飲酒食肉妻妾不離側又姬朐臑故親幸後疏遠數歎息呼天宇聞斥朐臑為家人子掃除永巷數笞擊之朐臑私疏宇過失數令家告之宇覺知絞殺朐臑有司奏請逮捕有詔削樊亢父二縣後三歲天子詔有司曰蓋聞仁以親親古之道也前東平王有闕有司請廢朕不忍又請削朕不敢專惟王之至親未嘗忘於心今聞王改行自新尊修經術親近仁人非法之求不以奸吏朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故後年來朝上疏求諸子及太史公書上以問大將軍王鳳對曰臣聞諸侯朝聘考文章正法度非禮不言今東平王幸得來朝不思制節謹度以防危失而求諸書非朝聘之義也諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國從橫權譎之謀漢興之初謀臣奇策天官災異地形阸塞皆不宜在諸侯王不可予不許之辭宜曰五經聖人所制萬事靡不畢載王審樂道傅相皆儒者旦夕講誦足以正身虞意夫小辯破義小道不通致遠恐泥皆不足以留意諸益於經術者不愛於王對奏天子如鳳言遂不與立三十三年薨子煬王雲嗣哀帝時無鹽危山土自起覆草如馳道狀又瓠山石轉立雲及后謁自之石所祭治石象瓠山立石束倍草并祠之建平三年息夫躬孫寵等共因幸臣董賢告之是時哀帝被疾多所惡事下有司逮王后謁下獄驗治言使巫傅恭婢合歡等祠祭詛祝上為雲求為天子雲又與知災異者高尚等指星宿言上疾必不愈雲當得天下石立宣帝起之表也有司請誅王有詔廢徙房陵雲自殺謁棄市立十, WYG: 卷}
  - {type: variant, offset: 145, length: 3192, content: 法律聰達有材帝甚愛之太子寬仁喜儒術上數嗟歎憲王曰真我子也常有意欲立張倢伃與憲王然用太子起於微細上少依倚許氏及即位而許后以殺死太子蚤失母故弗忍也久之上以故丞相韋賢子玄成陽狂讓侯兄經明行高稱於朝廷乃召拜玄成為淮陽中尉欲感諭憲王輔以推讓之臣由是太子遂安宣帝崩元帝即位乃遣憲王之國時張倢伃已卒憲王有外祖母舅張博兄弟三人歲至淮陽見親輒受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬願王為償王不許博辭去令弟光恐云王遇大人益解博欲上書為大人乞骸骨去王乃遣人持黃金五十斤送博博喜還書謝為諂語盛稱譽王因言當今朝廷無賢臣災變數見足為寒心萬姓咸歸望於大王大王奈何恬然不求入朝見輔助主上乎使弟光數說王宜聽博計令於京師說用事貴人為王求朝王不納其言後光欲至長安辭王復言願盡力與博共為王求朝王即日至長安可因平陽侯光得王欲求朝語馳使人語博博知王意動復遺王書曰博幸得肺腑數進愚策未見省察北游燕趙欲循行郡國求幽隱之士聞齊有駟先生者善為司馬兵法大將之材也博得謁見承間進問五帝三王究竟要道卓爾非世俗之所知今邊境不安天下騷動微此人其莫能安也又聞北海之瀕有賢人焉累世不可逮然難致也得此二人而薦之功亦不細矣博願馳西以此赴助漢急無財幣以通顯之趙王使謁者持牛酒黃金三十斤勞博博不受復使人願尚女聘金二百斤博未許會得光書云大王已遣光西與博并力求朝博自以棄捐不意大王還意反義結以朱顏願殺身報德朝事何足言大王誠賜咳唾使得盡死湯禹所以成大功也駟先生蓄積道術書無不有願知大王所好請得輒上王得書喜說報博書曰子高乃幸左顧存恤發心惻隱顯至誠納以嘉謀語以至事雖亦不敏敢不諭意今遣有司為子高償責二百萬是時博女壻京房以明易陰陽得幸於上數召見言事自謂為石顯五鹿充宗所排謀不得用數為博道之博常欲誑耀淮陽王即具記房諸所說災異及召見密語持予淮陽王以為信驗詐言已見中書令石君求朝許以金五百斤賢聖制事蓋慮功而不計費昔禹治鴻水百姓罷勞成功既立萬世賴之今聞陛下春秋未滿四十髮齒墮落太子幼弱佞人用事陰陽不調百姓疾疫飢饉死者且半鴻水之害殆不過此大王緒欲救世將比功德何可以忽博已與大儒知道者為大王為便宜奏陳安危指災異大王朝見先口陳其意而後奏之上必大說事成功立大王即有周邵之名邪臣散亡公卿變節功德亡比而梁趙之寵必歸大王外家亦將富貴何復望大王之金錢王喜說報博書曰乃者詔下止諸侯朝者寡人憯然不知所出子高素有顏冉之資臧武之智子貢之辯卞莊子之勇兼此四者世之所鮮既開端緒願卒成之求朝義事也奈何行金錢乎博報曰已許石君須以成事王以金五百斤予博會房出為郡守離左右顯具得此事告之房漏泄省中語博兄弟詿誤諸侯王誹謗政治狡猾不道皆下獄有司奏請逮捕欽上不忍致法遣諫大夫王駿賜欽璽書曰皇帝問淮陽王有司奏王王舅張博數遺王書非毀政治謗訕天子襃舉諸侯稱引周湯以讇惑王所言尤惡悖逆無道王不舉奏而多與金錢報以好言辠至不赦朕惻焉不忍聞為王傷之推原厥本不祥自博惟王之心匪同于凶已詔有司勿治王事遣諫大夫駿申諭朕意詩不云乎靖恭爾位正直是與王其勉之駿諭指曰禮為諸侯制相朝聘之義蓋以考禮壹德尊事天子也且王不學詩乎詩云俾侯於魯為周室輔今王舅博數遺王書所言悖逆王幸受詔策通經術知諸侯名譽不當出竟天子普覆德布於朝而恬有博言多予金錢與相報應不忠莫大焉故事諸侯王獲罪京師罪惡輕重縱不伏誅必蒙遷削貶黜之罪未有但已者也今聖主赦王之罪又憐王失計忘本為博所惑加賜璽書使諫大夫申諭至意殷勤之恩豈有量哉博等所犯惡大群下之所共攻王法之所不赦也自今以來王毋復以博等累心務與眾棄之春秋之義大能變改易曰藉用白茅无咎言臣子之道改過自新絜己以承上然後免於咎也王其留意慎戒惟思所以悔過易行塞重責稱厚恩者如此則長有富貴社稷安矣於是淮陽王欽免冠稽首謝曰奉藩無狀過惡暴列陛下不忍致法加大恩遣使者申諭道術守藩之義伏念博罪惡尤深當伏重誅臣欽願悉心自新奉承詔策頓首死罪京房及博兄弟三人皆棄市妻子徙邊至成帝即位以淮陽王屬為叔父敬寵之異於它國王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還丞相御史復劾欽前與博相遺私書指意非諸侯王所宜蒙恩勿治事在赦前不悔過而復稱引自以為直失藩臣體不敬上加恩許王還徙者三十六年薨子文王玄嗣二十六年薨子縯嗣王莽時絕楚孝王囂甘露二年立為定陶王三年徙楚成帝河平中入朝時被疾天子閔之下詔曰蓋聞天地之性人為貴人之行莫大於孝楚王囂素行孝順仁慈之國以來二十餘年孅介之過未嘗聞朕甚嘉之今乃遭命離于惡疾夫子所痛曰蔑之命矣夫斯人也而有斯疾也朕甚閔焉夫行純茂而不顯異則有國者將何勗哉書不云乎用德章厥善今王朝正月詔與子男一人俱其以廣戚縣戶四千三百封其子勳為廣戚侯明年囂薨子懷王文嗣一年薨無子絕明年成帝復立文弟平陸侯衍是為思王二十一年薨子紆嗣王莽時絕初成帝時又立紆弟景為定陶王廣戚侯勳薨諡曰煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝