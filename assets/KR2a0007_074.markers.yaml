  - {type: variant, offset: 3698, length: 211, content: 年徙中山成帝之議立太子也御史大夫孔光以為尚書有殷及王兄終弟及中山王元帝之子宜為後成帝以中山王不材又兄弟不得相入廟外家王氏與趙昭儀皆欲用哀帝為太子故遂立焉上乃封孝王舅馮參為宜鄉侯而益封孝王萬戶以尉其意三十年薨子衎嗣七年哀帝崩無子徵中山王衎入即位是為平帝太皇太后以帝為成帝後故立東平思王孫桃鄉頃侯子成都為中山王奉孝王後王莽時絕贊曰孝元之後徧有天下然而世絕於孫豈非天哉淮陽憲王於時諸侯為聰察矣張博誘之幾陷無道詩云貪人敗類古今一也, WYG: 考證}
