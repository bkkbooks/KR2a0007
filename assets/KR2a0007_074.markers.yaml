  - {type: variant, offset: 12, length: 0, content: '', krp: 以皇曾孫在郡邸獄宋祁曰景祐本作孝武無以皇字淳化本作孝武非江浙本曾孫上無皇字刋誤據衆本添皇字是時治獄使者丙吉見皇曾孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍臥庭上師古曰郡邸之庭也侍謂參省之也時皇孫孩弱常在襁褓故指言臥也後遭條獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官孟康曰郡守丞也來詣京師邸治獄姓誰名如言皇孫不當在獄官宜屬郡縣也文頴曰不當在郡邸官也師古曰守丞者守獄官之丞耳非郡丞也誰如者其人名本作譙字言姓又非也劉奉世曰守丞諸説皆非蓋郡邸守邸之丞也與朱買臣傳守丞同使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令留與郭徴卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫亡詔令師古曰少内掖庭主府臧之官也食讀曰飤詔令無文無從得其廪具也宋祁曰注文廩字疑作禀時吉得食米肉月月以給皇孫吉即時病師古曰有病時也輙使臣尊朝夕請問皇孫視省席蓐燥濕候伺組徵卿不得令晨夜去皇孫敖盪師古曰去離也敖游戲也盪放也盪讀與蕩同數奏甘毳食物師古曰奏進也毳讀與脆同所以擁全神靈成育聖躬功徳已亡量矣時豈豫知天下之福而徼其報哉師古曰徼要也音工堯反誠其仁恩内結於心也雖介之推割肌以存君不足以比師古曰韓詩外傳云晉公子重耳之亡也過曹里鳬須以從因盗其資而逃重耳無糧餧不能行介子推割其股肉以食重耳然後能行也孝宣皇帝時臣上書言狀幸得下吉吉謙讓不敢自伐刪去臣辭師古曰刪削也專歸美於組徴卿組徴卿皆以受田宅賜錢吉封為博陽侯臣尊不得比組徴卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐㣲文奪爵為關内侯臣愚以為宜復其爵邑師古曰復音防目反以報先人功徳先是顯為太僕十餘年與官屬大為姦利臧千餘萬司𨽻校尉昌案劾罪至不道奏請逮捕上曰故丞相吉有舊恩朕不忍絶免顯官奪邑四百户後復以為城門校尉顯卒子昌嗣爵關内侯成帝時修廢功以吉舊恩尤重鴻嘉元年制詔丞相御史蓋聞褒功徳繼絶統宋祁曰浙本無徳字校本添所以重宗廟廣賢聖之路也故博陽侯吉以舊恩有功而封今其祀絶朕甚憐之夫善善及子孫古今之通誼也其封吉孫中郎將關内侯昌為博陽侯奉吉後國絶三十二嵗復續云昌傳子至孫王莾時乃絶賛曰古之制名必繇象類師古曰繇讀與由同遠取諸物近取諸身故經謂君為元首臣為股肱師古曰謂虞書益稷云元首明哉股肱良哉明其一體相待而成也是故君臣相配古今常道自然之埶也近觀漢相髙祖開基蕭曹為冠師古曰名位在衆臣之上孝宣中興丙魏有聲是時黜陟有序衆職修理公卿多稱其位師古曰稱副也海内興於禮讓覽其行事豈虛虖哉師古曰言君明臣賢所以致治非徒然也前漢書卷七十四前漢書卷七十四考證魏相傳舉賢良以對策髙第臣召南按相對策見韓延壽傳但彼文云以文學對策又祗舉褒崇節義一叚亦非全文也兄子樂平侯山復領尚書事注師古曰山者去病之孫今言兄子此傳誤臣召南按依顔注當如張敞傳稱兄孫山然下文魏相封事曰兄子秉樞機即説此事蒙霍禹言之可稱兄子蕭望之傳亦曰光薨子禹復為大司馬兄子山領尚書與此文同似非誤也願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可蘇轍曰三人者非賢于趙充國也然其與國同憂樂無徼倖功名之心則過于充國遠甚中謁者趙堯舉春云云臣召南按此趙堯疑另是一人必非江邑侯代周昌為御史大夫者也上文云相國臣何御史大夫臣昌將軍臣陵太子太傅臣通其事當在髙帝十年之初丞相之改稱相國周昌之出為趙相而趙堯代為御史大夫叔孫通之由奉常徙為太子太傅皆此年事也据功臣表江邑侯趙堯以漢}
