  - {type: variant, offset: 6, length: 0, content: '', krp: 四十四魏相字弱翁濟隂定陶人也師古曰說者謂相即魏無知之後蓋承淺近之書為妄深矣徙平陵少學易為郡卒史舉賢良以對策髙第為茂陵令頃之御史大夫桑宏羊客詐稱御史止傳師古曰傳謂縣之傳舍丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市師古曰殺之於市茂陵大治後遷河南太守宋祁曰浙本遷字下有為字禁止姦邪豪彊畏服會丞相車千秋死先是千秋子為雒陽武庫令自見失父而相治郡嚴恐久獲罪宋祁曰罪字疑從辠書乃自免去相使掾追呼之遂不肯還相獨恨曰大將軍聞此令去官必以為我用丞相死不能遇其子使當世貴人非我殆矣師古曰殆危也武庫令西至長安大將軍霍光果以責過相曰㓜主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令今河南太守不深惟國家大策師古曰惟思也苟見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人師古曰來京師諸官府為戍卒若今衞士上番分守諸司遮大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄師古曰光心以武庫令事嫌之而下其賊殺不辜之獄久繫踰冬會赦出宋祁曰繫字下疑有之字復有詔守茂陵令遷揚州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫予相書曰朝廷已深知弱翁治行方且大用矣願少愼事自重臧器于身師古曰易下繫辭云君子臧器於身待時而動言不顯見其材能相心善其言為霽威嚴蘇林曰霽音限齊之齊臣瓉曰此雨霽字也霽止也師古曰二説皆是也音才詣反又子詣反居部二嵗徵為諫大夫復為河南太守數年宣帝即位徴相入為大司農遷御史大夫四嵗大將軍霍光薨上思其功徳以其子禹為右將軍兄子樂平侯山復領尚書事師古曰山者去病之孫今言兄子此傳誤相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫師古曰解在}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 行志及魯季孫之專權皆危亂國家自後元以來祿去王室政繇冢宰師古曰繇與由同今光死子復為大將軍劉敞曰禹不為大將軍字之誤也兄子秉樞機昆弟諸壻據權埶在兵官光夫人顯及諸女皆通籍長信宮師古曰通籍謂禁門之中皆有名籍恣出入也或夜詔門出入驕奢放縱恐寖不制師古曰寖漸也不制不可制御也宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽師古曰雍讀曰壅宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞乃罷其三侯令就第師古曰禹及雲山也親屬皆出補吏於是韋賢以老病免相遂代為丞相封髙平侯食邑八百戶及霍氏怨相又憚之謀矯太后詔先召斬丞相然後廢天子事發覺伏誅宣帝始親萬機厲精為治練羣臣核名實而相總領衆職甚稱上意元康中匈奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輙奉歸之未有犯於邊境雖爭屯田車師宋祁曰浙本無屯字不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵師古曰不可以兵事動之軍旅之後必有凶年師古曰此引老子道經之語言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選師古曰言不得其人風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二}
