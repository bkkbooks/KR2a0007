  - {type: variant, offset: 15673, length: 1532, content: 人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀樂有別有合其合樂曰以六律六鐘五聲八音六舞大合樂祀天神祭墬祇祀四望祭山川享先妣先祖凡六樂奏六歌而天墬神祇之物皆至四望蓋謂日月星海也三光高而不可得親海廣大無限界故其樂同祀天則天文從祭墬則墬理從三光天文也山川地理也天地合祭先祖配天先妣配墬其誼一也天墬合精夫婦判合祭天南郊則以墬配一體之誼也天墬位皆南鄉同席墬在東共牢而食高帝高后配於壇上西鄉后在北亦同席共牢牲用繭栗玄酒陶匏禮記曰天子籍田千畮以事天墬繇是言之宜有黍稷天地用牲一燔尞瘞薶用牲一高帝高后用牲一天用牲左及黍稷燔尞南郊墬用牲右及黍稷瘞於北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祇嘉享萬福降輯此天墬合祀以祖妣配者也其別樂曰冬日至於墬上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則墬祇皆出天墬有常位不得常合此其各特祀者也陰陽之別於日冬夏至其會也以孟春正月上辛若丁天子親合祀天墜於南郊以高帝高后配陰陽有離合易曰分陰分陽迭用柔剛以日冬至使有司奉祠南郊高帝配而望群陽日夏至使有司奉祭北郊高后配而望群陰皆以助致微氣通道幽弱當上此之時后不省方故天子不親而遣有司所以正承天順地復聖王之制顯太祖之功也渭陽祠勿復修群望未悉定定復奏奏可三十餘年間天地之祠五徙焉後莽又奏言書曰類於上帝禋于六宗歐陽大小夏侯三家說六宗皆曰上不及天下不及墬旁不及四方在六者之間助陰陽變化實一而名六名實不相應禮記祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火不相逮靁風不相誖山澤通氣然後能變化既成萬物也臣前奏徙甘泉泰畤汾陰后土皆復於南北郊謹案周官兆五帝於四郊山川各因其方今五帝兆居在雍五畤不合於古又日月靁風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宮羲和歆等八十九人議皆曰天子父事天母事墬今稱天神曰皇天上帝泰一兆曰泰畤而稱地祇曰后土與中央黃靈同又兆北郊未有尊稱宜令地祇稱皇墬后祇兆曰廣畤易曰方以類聚物以群分分群神以類相從為五部兆天墬之別神中央帝黃靈后土畤及日廟北辰北斗填星中宿中宮於長安城之未墬兆東方帝太昊青靈勾芒畤及靁公風伯廟歲星東宿東宮於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宮於南郊兆西方帝少皞白靈蓐收畤及太白星西宿西宮於西郊兆北方帝顓頊黑靈玄冥畤及月廟雨師廟辰星北宿北宮於北郊兆奏可於是長安旁諸廟兆畤甚盛矣莽又言帝王建立社稷百王不易社者土也宗廟王者所居稷者百穀之主所以奉宗廟共粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土又曰以御田祖以祈甘雨禮記曰唯祭宗廟社稷為越紼而行事聖漢興禮儀稍定已有官社未立官稷遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種穀樹徐州牧歲貢五色土各一斗莽篡位二年興神僊事以方士蘇樂言起八風臺於宮中臺成萬金作樂其上順風作液湯又種五粱禾於殿中各順色置其方面先鬻鶴髓毒冒犀玉二十餘物漬種計粟斛成一金言此黃帝穀僊之術也以樂為黃門郎令主之莽遂崇鬼神淫祀至其末年自天地六宗以下至諸小鬼神凡千七百所用三牲鳥獸三千餘種後不能備乃以雞當鶩鴈犬當麋鹿數下詔自以當僊語在其傳贊曰漢興之初庶事草創唯一叔孫生略定朝廷之儀若乃正朔服色郊望之事數世猶未章焉至於孝文始以夏郊而張倉據水德公孫臣賈誼更以為土德卒不能明孝武之世文章為盛太初改制而兒寬司馬遷等猶從臣誼之言服色數度遂順黃德彼以五德之傳從所不勝秦在水德故謂漢據土而克之劉向父子以為帝出於震故包羲氏始受木德其後以母傳子終而復始自神農黃帝下歷唐虞三代而漢得火焉故高祖始起神母夜號著赤帝之符旗章遂赤自得天統矣昔共工氏以水德間於木火與秦同運非其次序故皆不永由是言之祖宗之制蓋有自然之應順時宜矣究觀方士祠官之變谷永之言不亦正乎不亦正乎, WYG: 考證}
