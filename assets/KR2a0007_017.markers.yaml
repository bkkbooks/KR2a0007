  - {type: variant, offset: 10734, length: 4860, content: 年又祠神人於交門宮若有鄉坐拜者云後五年上復修封於泰山東游東萊臨大海是歲雍縣無雲如靁者三或如虹氣蒼黃若飛鳥集棫陽宮南聲聞四百里隕石二黑如黳有司以為美祥以薦宗廟而方士之候神入海求蓬萊者終無驗公孫卿猶以大人之迹為解天子猶羈縻不絕幾遇其真諸所興如薄忌泰一及三一冥羊馬行赤星五床寬舒之祠宮王先謙說床字疑後人誤加封禪書孝武紀並無宮字封禪書孝武紀並作官是此誤官王先謙說床字疑後人誤加封禪書孝武紀並無宮字封禪書孝武紀並作官是此誤以歲時致禮凡六祠皆大祝領之至如八神諸明年凡山它名祠行過則祠去則已方士所興祠各自主其人終則已祠官不主它祠皆如故甘泉泰一汾陰后土三年親郊祠而泰山五年一修封武帝凡五修封昭帝即位富於春秋未嘗親巡祭云宣帝即位由武帝正統興故立三年尊孝武廟為世宗行所巡狩郡國皆立廟告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興於殿旁有鳥如白鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音門戶大開夜有光殿上盡明上乃下詔赦天下時大將軍霍光輔政上共己正南面非宗廟之祀不出十二年乃下詔曰蓋聞天子尊事天地修祀山川古令通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齊祠之禮頗作詩歌其三月幸河東祠后土有神爵集改元為神爵制詔太常夫江海百川之大者也今闕焉無祠其令祠官以禮為歲事以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮東嶽泰山於博中嶽泰室於嵩高南嶽灊山於灊西嶽華山於華陰北嶽常山於上曲陽河於臨晉江於江都淮於平氏濟於臨邑界中皆使者持節侍祠唯泰山與河歲五祠江水四餘皆一禱而三祠云時南郡獲白虎獻其皮牙爪上為立祠又以方士言為隨侯劍寶玉寶璧周康寶鼎立四祠於未央宮中又祠太室山於即墨三戶山於下密祠天封苑火井於鴻門又立歲星辰星太白熒惑南斗祠於長安城旁又祠參山八神於曲城蓬山石社石鼓於臨朐之罘山於腄成山於不夜萊山於黃成山祠日萊山祠月又祠四時於琅邪蚩尤於壽良京師近縣鄠則有勞谷五床山日月五帝僊人玉女祠雲陽有徑路神祠祭休屠王也又立五龍山僊人祠及黃帝天神帝原水凡四祠於膚施或言益州有金馬碧雞之神可醮祭而致於是遣諫大夫王襃使持節而求之大夫劉更生獻淮南枕中洪寶苑祕之方令尚於鑄作事不驗更生坐論京兆尹張敞上疏諫曰願明主時忘車馬之好斥遠方士之虛語游心帝王之術太平庶幾可興也後尚方待詔皆罷是時美陽得鼎獻之下有司議多以為宜薦見宗廟如元鼎時故事張敞好古文字桉鼎銘勒而上議曰臣聞周祖始乎后稷后稷封於斄公劉發迹於豳大王建國於𨙸梁文武興於酆鎬由此言之則𨙸梁豐鎬之間周舊居也固宜有宗廟壇場祭祀之臧今鼎出於𨙸東中有刻書曰王命尸臣官此栒邑賜爾旂鸞黼黻琱戈尸臣拜手稽首曰敢對揚天子丕顯休命臣愚不足以迹古文竊以傳記言之此鼎殆周之所以襃賜大臣大臣子孫刻銘其先功臧之於宮廟也昔寶鼎之出於汾脽也河東太守以聞詔曰朕巡祭后土祈為百姓蒙豐年今穀嗛未報鼎焉為出哉博問耆老意舊臧與誠欲考得事實也有司驗脽上非舊臧處鼎大八尺一寸高三尺六寸殊異於眾鼎今此鼎細小又有款識不宜薦見於宗廟制曰京兆尹議是上自幸河東之明年正月鳳皇集祋祤於所集處得玉寶起步壽宮乃下詔赦天下後間歲鳳皇神爵甘露降集京師赦天下其冬鳳皇集上林乃作鳳皇殿以答嘉瑞明年正月復幸甘泉郊泰畤改元曰五鳳明年幸雍祠五畤其明年春幸河東祠后土赦天下後間歲改元為甘露正月上幸甘泉郊泰畤其夏黃龍見新豐建章未央長樂宮鍾虡銅人皆生毛長一寸所時以為美祥後間歲正月上郊泰畤因朝單于於甘泉宮後間歲改元為黃龍正月復幸甘泉郊泰畤又朝單于於甘泉宮至冬而崩鳳皇下郡國凡五十餘所元帝即位遵舊儀間歲正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百戶牛酒或賜爵赦罪人元帝好儒貢禹韋玄成匡衡等相繼為公卿禹建言漢家宗廟祭祀多不應古禮上是其言後韋玄成為丞相議罷郡國廟自太上皇孝惠帝諸園寢廟皆罷後元帝寢疾夢神靈譴罷諸廟祠上遂復焉後或罷或復至哀平不定語在韋玄成傳成帝初即位丞相衡御史大夫譚奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即陰之象也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宮即於雲陽立泰畤祭於宮南今行常幸長安郊見皇天反北之泰陰祠后土反東之少陽事與古制殊又至雲陽行谿谷中阸陝且百里汾陰則渡大川有風波舟楫之危皆非聖主所宜數乘郡繇治道共張吏民困苦百官煩費勞所保之民行危陰之地難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與群臣議定奏可大司馬車騎將軍許嘉等八人以為所從來久遠宜如故右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴於太壇祭天也瘞薶於大折祭地也兆於南郊所以定天位也祭地於大折在北郊就陰位也郊處各在聖王所都之南北書曰越三日丁巳用牲於郊牛二周公加牲告徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所饗宜徙就正陽大陰之處違俗復古循聖制定天位如禮便於是衡譚奏議曰陛下聖德怱明上通承天之大典覽群下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從眾則合於天心故洪範曰三人占則從二人言言少從多之義也論當往古宜於萬民則依而從之違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著於經傳同於上世便於吏民八人不案經藝考古制而以為不宜無法之議難以定吉凶太誓曰正稽古立功立事可以永年丕天之大律詩曰毋曰高高在上陟降厥士日監在茲言天之日監王者之處也又曰乃眷西顧此維予宅言天以文王之都為居也宜於長安定南北郊為萬世基天子從之既定衡言甘泉泰畤紫壇八觚宣通象八方五帝壇周環其下又有群神之壇以尚書禋六宗望山川徧群神之義紫壇有文章采鏤黼黻之飾及玉女樂石壇僊人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊紫壇何焯說以文義求之作柴為是亦不當有壇字按景祐殿本紫都作柴無壇字柴何焯說以文義求之作柴為是亦不當有壇字按景祐殿本紫都作柴無壇字饗帝之義埽地而祭上質也歌大呂舞雲門以竢天神歌太蔟舞咸池以竢地祇其牲用犢其席槀稭其器陶匏皆因天地之性貴誠上質不敢修其文也以為神祇功德至大雖修精微而備庶物猶不足以報功唯至誠為可致景祐殿本都作故朱一新說作故是故景祐殿本都作故朱一新說作故是上質不飾以章天德紫壇偽飾女樂鸞路騂駒龍馬石壇之屬宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之今雍鄜密上下畤本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黃黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠由是皆罷明年上始祀南郊赦奉郊之縣及中都官耐罪囚徒是歲衡譚復條奏長安廚官縣官給祠郡國候神方士使者所祠凡六百八十三所其二百八所應禮及疑無明文可奉祠如故其餘四百七十五所不應禮或復重請皆罷奏可本雍舊祠二百三所唯山川諸星十五所為應禮云若諸布諸嚴諸逐皆罷杜主有五祠置其一又罷高祖所立梁晉秦荊巫九天南山萊中之屬及孝文渭陽孝武薄忌泰一三一黃帝冥羊馬行泰一皋山山君武夷夏后啟母石萬里沙八神延年之屬及孝宣參山蓬山之罘成山萊山四時蚩尤勞谷五床僊人玉女徑路黃帝天神原水之屬皆罷候神方士使者副佐本草待詔七十餘人皆歸家明年匡衡坐事免官爵眾庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壞甘泉竹宮折拔畤中樹木十圍以上百餘天子異之以問劉向對曰家人尚不欲絕種祠況於國之神寶舊畤且甘泉汾陰及雍五畤始立皆有神祇感應然後營之非苟而已也武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動及陳寶祠自秦文公至今七百餘歲矣漢興世世常來光色赤黃長四五丈直祠而息音聲砰隱野雞皆雊每見雍太祝祠以太牢遣候者乘一乘傳馳詣行在所以為福祥高祖時五來文帝二十六來武帝七十五來宣帝二十五來初元元年以來亦二十來此陽氣舊祠也及漢宗廟之禮不得擅議皆祖宗之君與賢臣所共定古今異制經無明文至尊至重難以疑說正也前始納貢禹之議後人相因多所動搖易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之後上以無繼嗣故令皇太后詔有司曰蓋聞王者承事天地文接泰一尊莫著於祭祀孝武皇帝大聖通明始建上下之祀營泰畤於甘泉定后土於汾陰而神祇安之饗國長久子孫蕃滋累世遵業福流於今今皇帝寬仁孝順奉循聖緒靡有大愆而久無繼嗣思其咎職殆在徙南北郊違先帝之制改神祇舊位失天地之心以妨繼嗣之福春秋六十未見皇孫食不甘味寢不安席朕甚悼焉春秋大復古善順祀其復甘泉泰畤汾陰后土如故及雍五畤陳寶祠在陳倉者天子復親郊禮如前又復長安雍及郡國祠著明者且半成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中長安城旁費用甚多然無大貴盛者谷永說上曰臣聞明於天地之性不可或以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱奇怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遙興輕舉登遐倒景覽觀縣圃浮游蓬萊耕耘五德朝種暮穫與山石無極黃冶變化堅冰淖溺化色五倉之術者皆姦人惑眾挾左道懷詐偽以欺罔世主聽其言洋洋滿耳若將可遇求之盪盪如係風捕景終不可得是以明王距而不聽聖人絕而不語昔周史萇弘欲以鬼神之術輔尊靈王會朝諸侯而周室愈微諸侯愈叛楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵挫地削身辱國危秦始皇初并天下甘心於神僊之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以僊人黃冶祭祠事鬼使物入海求神采藥貴幸賞賜累千金大尤尊盛至妻公主爵位重絫震動海內元鼎元封之際燕齊之間方士瞋目扼掔言有神僊祭祀致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜至初元中有天淵玉女鉅鹿神人轑陽侯師張宗之姦紛紛復起夫周秦之末三五之隆已嘗專意散財厚爵祿竦精神舉天下以求之矣曠日經年靡有毫氂之驗足以揆今經曰享多儀儀不及物惟曰不享論語說曰子不語怪神唯陛下距絕此類毋令姦人有以窺朝者上善其言後成都侯王商為大司馬衛將軍輔政杜鄴說商曰東鄰殺牛不如西鄰之瀹祭言奉天之道貴以誠質大得民心也行穢祀豐猶不蒙祐德修薦薄吉必大來古者壇場有常處尞禋有常用贊見有常禮犧牲玉帛雖備而財不匱車輿臣役雖動而用不勞是故每奉景祐殿本都作舉朱一新說作舉是舉景祐殿本都作舉朱一新說作舉是其禮助者歡說大路所歷黎元不知今甘泉河東天地郊祀咸失方位違陰陽之宜及雍五畤皆曠遠奉尊之役休而復起繕治共張無解已時皇天著象殆可略知前上甘泉先敺失道禮月之夕奉引復迷祠后土還臨河當渡疾風起波船不可御又雍大雨壞平陽宮垣及三月甲子震電災林光宮門祥瑞未著咎徵仍臻迹三郡所奏皆有變故不答不饗何以甚此詩曰率由舊章舊章先王法度文王以之交神于祀子孫千億宜如異時公卿之議復還長安南北郊後數年成帝崩皇太后詔有司曰皇帝即位思順天心遵經義定郊禮天下說憙懼未有皇孫故復甘泉泰畤汾陰后土庶幾獲福皇帝恨難之卒未得其祐其復南北郊長安如故以順皇帝之意也哀帝即位寢疾博徵方術士京師諸縣皆有侍祠使者盡復前世所常興諸神祠官凡七百餘所一歲三萬七千祠云明年復令太皇太后詔有司曰皇帝孝順奉承聖業靡有解怠而久疾未瘳夙夜唯思殆繼體之君不宜改作其復甘泉泰畤汾陰后土祠如故上亦不能親至遣有司行事而禮祠焉後三年哀帝崩平帝元始五年大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天王者尊其考欲以配天緣考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於明堂以配上帝禮記天子祭天地及山川歲徧春秋穀梁傳以十二月下辛卜正月上辛郊高皇帝受命因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平初起渭陽五帝廟祭泰一地祇以太祖高皇帝配日冬至祠泰一夏至祠地祇皆并祠五帝而共一牲上親郊拜後平伏誅乃不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不答也於是元鼎四年十一月甲子始立后土祠於汾陰或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉二歲一郊與雍更祠亦以高祖配不歲事天皆未應古制建始元年徒甘泉泰畤河東后土於長安南北郊永始元年三月以未有皇孫復甘泉河東祠綏, WYG: ''}
