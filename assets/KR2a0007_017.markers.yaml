  - {type: variant, offset: 3558, length: 380, content: 禪書亦無冬字東擊項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黃赤帝之祠高祖曰吾聞天有五帝而四何也莫知其說於是高祖曰吾知之矣乃待我而具五也乃立黑帝祠名曰北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮因令縣為公社下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故後四歲天下已定詔御史令豐治枌榆社常以時春以羊彘祠之令祝立蚩尤之祠於長安長安置祠祀官女巫其梁巫祠天地天社天水房中當景祐殿局本都作堂堂景祐殿局本都作堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬秦巫祠杜主巫保族纍之屬荊巫祠堂下巫先司命施糜之屬九天巫祠九天皆以歲時祠宮中其河巫祠河於臨晉而南山巫祠南山秦中秦中者二世皇帝也各有時日其後二歲或言曰周興而邑立后稷之祠至今血食天下於是高祖制詔御史其令天下立靈星祠常以歲時祠以牛高祖十年春有司請令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠制曰可, WYG: 于}
