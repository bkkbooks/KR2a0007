  - {type: variant, offset: 4790, length: 3291, content: 歲一郊是時上求神君舍之上林中磃氏館神君者長陵女子以乳死見神於先後宛若宛若祠之其室民多往祠平原君亦往祠其後子孫以尊顯及上即位則厚禮置祠之內中聞其言不見其人云是時李少君亦以祠竈穀道卻老方見上上尊之少君者故深澤侯人主方匿其年及所生長常自謂七十能使物卻老其游以方徧諸侯無妻子人聞其能使物及不死更餽遺之常餘金錢衣食人皆以為不治產業而饒給又不知其何所人愈信爭事之少君資好方善為巧發奇中常從武安侯宴坐中有年九十餘老人少君乃言與其大父游射處老人為兒從其大父識其處一坐盡驚少君見上上有故銅器問少君少君曰此器齊桓公十年陳於柏寢已而按其刻果齊桓公器一宮盡駭以為少君神數百歲人也少君言上祠竈皆可致物致物而丹沙可化為黃金黃金成以為飲食器則益壽益壽而海中蓬萊僊者乃可見之以封禪則不死黃帝是也臣嘗游海上見安期生安期生食臣棗大如瓜安期生僊者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣久之少君病死天子以為化去不死也使黃錘史寬舒受其方而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊日一太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子常以春解祠祠黃帝用一梟破鏡冥羊用羊祠馬行用一青牡馬泰一皋山山君用牛武夷君用乾魚陰陽使者以一牛令祠官領之如其方而祠泰一於忌泰一壇旁後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合於天也於是濟北王以為天子且封禪上書獻泰山及其旁邑天子以它縣償之常山王有罪𠨧天子封其弟真定以續先王祀而以常山為郡然後五嶽皆在天子之郡明年齊人少翁以方見上上有所幸李夫人夫人卒少翁以方蓋夜致夫人及竈鬼之貌云天子自帷中望見焉乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宮室被服非象神神物不至乃作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宮中為臺室畫天地泰一諸鬼神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛陽不知言此牛腹中有奇書景祐本無書字封禪書亦無王念孫說無書字是殺視得書書言甚怪天子識其手問之果為書於是誅文成將軍隱之其後又作柏梁銅柱承露僊人掌之屬矣文成死明年天子病鼎湖甚巫醫無所不致游水發根言上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少瘉強與我會甘泉於是上病瘉遂起幸甘泉病良已大赦置壽宮神君神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所欲言行下又置壽宮北宮張羽旗設共具以禮神君神君所言上使受書其名曰畫法其所言世俗之所知也無絕殊者而天子心獨憙其事祕世莫知也後三年有司言元宜以天瑞不宜以一二數一元曰建二元以長星曰光今郊得一角獸曰狩云其明年天子郊雍曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寬舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黃犢牢具已祠盡瘞而從祠衣上黃於是天子東幸汾陰汾陰男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上如寬舒等議上親望拜如上帝禮禮畢天子遂至滎陽還過雒陽下詔封周後令奉其祀語在武紀上始巡幸郡縣寖尋於泰山矣其春樂成侯登王先謙說登字蓋衍上書言欒大欒大膠東宮人故嘗與文成將軍同師已而為膠東王尚方而樂成侯姊為康王后無子王死它姬子立為王而康后有淫行與王不相中相危以法康后聞文成死而欲自媚於上乃遣欒大入因樂成侯求見言方天子既誅文成後悔其方不盡及見欒大大說大為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羨門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣數以言康王康王又不用臣臣之師曰黃金可成而河決可塞不死之藥可得僊人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之勿卑使各佩其信印乃可使通言於神人神人尚肯邪不邪尊其使然後可致也於是上使驗小方鬭棊棊自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍居月餘得四印得天士將軍地士將軍大通將軍印制詔御史昔禹疏九河決四瀆間者河溢皋陸隄繇不息朕臨天下二十有八年天若遺朕士而大通焉乾稱飛龍鴻漸于般朕意庶幾與焉其以二千戶封地士將軍大為樂通侯賜列侯甲第童千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金十萬斤更名其邑曰當利公主天子親如五利之弟使者存問共給相屬於道自大主將相以下皆置酒其家獻遺之天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以視不臣也而佩天道者且為天子道天神也於是五利常夜祠其家欲以下神後裝治行東入海求其師云大見數月佩六印貴震天下而海上燕齊之間莫不搤掔而自言有禁方能神僊矣其夏六月汾陰巫錦為民祠魏脽后土營旁見地如鉤狀掊視得鼎鼎大異於罪鼎文鏤無款識怪之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行薦之至中山晏溫有黃雲焉有鹿過上自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故巡祭后土祈為百姓育穀今年豐楙未報鼎曷為出哉有司皆言聞昔泰帝興神鼎一一者一統天地萬物所繫象也黃帝作寶鼎三象天地人禹收九牧之金鑄九鼎象九州皆嘗鬺享上帝鬼神其空足曰鬲以象三德饗承天祜夏德衰鼎遷於殷殷德衰鼎遷於周周德衰鼎遷於秦秦德衰宋之社亡鼎乃淪伏而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不㕦不敖胡考之休今鼎至甘泉以光潤龍變承休無疆合茲中山有黃白雲降蓋若獸為符路弓乘矢集獲壇下報祠大亨唯受命而帝者心知其意而合德焉鼎宜視宗禰廣景祐殿局本都作廟廟景祐殿局本都作廟臧於帝庭以合明應制曰可入海求蓬萊者言蓬萊不遠而不能至者殆不見其氣上乃遣望氣佐候其氣云其秋上雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿有札書曰黃帝得寶鼎冕候問於鬼臾區鬼臾區對曰黃帝得寶鼎神策是歲己酉朔旦冬至得天之紀終而復始於是黃帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黃帝僊登于天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大說乃召問卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黃帝言無書獨有此鼎書曰漢興復當黃帝之時曰漢之聖者在高祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黃帝得上泰山封申公曰漢帝亦當上封禪據景祐本改王念孫說景祐本是上據景祐本改王念孫說景祐本是封禪則能僊登天矣據景祐本改王念孫說景祐本是黃帝萬諸侯而神靈之封君七千天下名山八而三在蠻夷五在中國中國華山首山太室山泰山東萊山此五山黃帝之所常游與神會黃帝且戰且學僊患百姓非其道乃斷斬非鬼神者百餘歲然後得與神通黃帝郊雍上帝宿三月鬼臾區號大鴻死葬雍故鴻冢是也其後黃帝接萬靈明庭明庭者甘泉也所謂寒門者谷口也黃帝采首山銅鑄鼎於荊山下鼎既成有龍垂胡䫇下迎黃帝黃帝上騎群臣後宮從上龍七十餘人龍乃上景祐殿本都有上字朱一新說史記同此脫去餘小臣不得上乃悉持龍䫇龍䫇拔墯墯黃帝之弓百姓卬望黃帝既上天乃抱其弓與龍䫇號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳拜卿為郎使東候神於太室上遂郊雍至隴西登空桐幸甘泉令祠官寬舒等具泰一祠壇祠壇放亳忌泰一壇三陔五帝壇環居其下各如其方黃帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食群神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中鹿中水而酒之祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至昒爽天子始郊拜泰一朝朝日夕夕月則揖而見泰一如雍郊禮其贊饗曰天始以寶鼎神授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黃其祠列火滿壇壇旁亨炊具有司云祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉嘉牲薦饗是夜有美光及晝黃氣上屬天太史令談祠官寬舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠二景祐殿本都作三王先謙說封禪書通鑑作三是此, WYG: 劉刋}
  - {type: variant, offset: 4790, length: 3291, content: 歲一郊是時上求神君舍之上林中磃氏館神君者長陵女子以乳死見神於先後宛若宛若祠之其室民多往祠平原君亦往祠其後子孫以尊顯及上即位則厚禮置祠之內中聞其言不見其人云是時李少君亦以祠竈穀道卻老方見上上尊之少君者故深澤侯人主方匿其年及所生長常自謂七十能使物卻老其游以方徧諸侯無妻子人聞其能使物及不死更餽遺之常餘金錢衣食人皆以為不治產業而饒給又不知其何所人愈信爭事之少君資好方善為巧發奇中常從武安侯宴坐中有年九十餘老人少君乃言與其大父游射處老人為兒從其大父識其處一坐盡驚少君見上上有故銅器問少君少君曰此器齊桓公十年陳於柏寢已而按其刻果齊桓公器一宮盡駭以為少君神數百歲人也少君言上祠竈皆可致物致物而丹沙可化為黃金黃金成以為飲食器則益壽益壽而海中蓬萊僊者乃可見之以封禪則不死黃帝是也臣嘗游海上見安期生安期生食臣棗大如瓜安期生僊者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣久之少君病死天子以為化去不死也使黃錘史寬舒受其方而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊日一太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子常以春解祠祠黃帝用一梟破鏡冥羊用羊祠馬行用一青牡馬泰一皋山山君用牛武夷君用乾魚陰陽使者以一牛令祠官領之如其方而祠泰一於忌泰一壇旁後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合於天也於是濟北王以為天子且封禪上書獻泰山及其旁邑天子以它縣償之常山王有罪𠨧天子封其弟真定以續先王祀而以常山為郡然後五嶽皆在天子之郡明年齊人少翁以方見上上有所幸李夫人夫人卒少翁以方蓋夜致夫人及竈鬼之貌云天子自帷中望見焉乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宮室被服非象神神物不至乃作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宮中為臺室畫天地泰一諸鬼神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛陽不知言此牛腹中有奇書景祐本無書字封禪書亦無王念孫說無書字是殺視得書書言甚怪天子識其手問之果為書於是誅文成將軍隱之其後又作柏梁銅柱承露僊人掌之屬矣文成死明年天子病鼎湖甚巫醫無所不致游水發根言上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少瘉強與我會甘泉於是上病瘉遂起幸甘泉病良已大赦置壽宮神君神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所欲言行下又置壽宮北宮張羽旗設共具以禮神君神君所言上使受書其名曰畫法其所言世俗之所知也無絕殊者而天子心獨憙其事祕世莫知也後三年有司言元宜以天瑞不宜以一二數一元曰建二元以長星曰光今郊得一角獸曰狩云其明年天子郊雍曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寬舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黃犢牢具已祠盡瘞而從祠衣上黃於是天子東幸汾陰汾陰男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上如寬舒等議上親望拜如上帝禮禮畢天子遂至滎陽還過雒陽下詔封周後令奉其祀語在武紀上始巡幸郡縣寖尋於泰山矣其春樂成侯登王先謙說登字蓋衍上書言欒大欒大膠東宮人故嘗與文成將軍同師已而為膠東王尚方而樂成侯姊為康王后無子王死它姬子立為王而康后有淫行與王不相中相危以法康后聞文成死而欲自媚於上乃遣欒大入因樂成侯求見言方天子既誅文成後悔其方不盡及見欒大大說大為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羨門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣數以言康王康王又不用臣臣之師曰黃金可成而河決可塞不死之藥可得僊人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之勿卑使各佩其信印乃可使通言於神人神人尚肯邪不邪尊其使然後可致也於是上使驗小方鬭棊棊自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍居月餘得四印得天士將軍地士將軍大通將軍印制詔御史昔禹疏九河決四瀆間者河溢皋陸隄繇不息朕臨天下二十有八年天若遺朕士而大通焉乾稱飛龍鴻漸于般朕意庶幾與焉其以二千戶封地士將軍大為樂通侯賜列侯甲第童千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金十萬斤更名其邑曰當利公主天子親如五利之弟使者存問共給相屬於道自大主將相以下皆置酒其家獻遺之天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以視不臣也而佩天道者且為天子道天神也於是五利常夜祠其家欲以下神後裝治行東