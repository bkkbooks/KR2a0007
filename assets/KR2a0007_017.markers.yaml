  - {type: variant, offset: 8770, length: 1963, content: 問下下不言乃令祠官加增太室祠禁毋伐其山木以山下戶凡三百封崇高為之奉邑獨給祠復無有所與上因東上泰山泰山草木未生乃令人上石立之泰山顛上遂東巡海上行禮祠八神齊人之上疏言神怪奇方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行侯名山至東萊言夜見大人長數丈就之則不見見其迹甚大類禽獸云群臣有言見一老父牽狗言五欲見鉅公已忽不見上既見大迹未信及群臣又言老父則大以為僊人也宿留海上與方士傳車及間使求神僊人以千數四月還至奉高上念諸儒及方士言封禪人殊不經難施行天子至梁父禮祠地主至乙卯令侍中儒者皮弁縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下阯東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱遠方奇獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中天子從禪還坐明堂群臣更上壽下詔改元為元封語在武紀又曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉奉車子侯暴病一日死上乃遂去並海上北至碣石巡自遼西歷北邊至九原五月乃至甘泉周萬八千里云其秋有星孛於東井後十餘日有星孛於三能望氣王朔言候獨見填星出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云其來年冬郊雍五帝還拜祝祠泰一贊饗曰德星昭衍厥維休祥壽星仍出淵燿光明信星昭見皇帝敬拜泰祝之享其春公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日毋所見見大人迹云復遣方士求神人采藥以千數是歲旱天子既出亡名乃禱萬里沙過祠泰山還至瓠子自臨塞決河留二日湛泀而去是時既滅兩粵粵人勇之乃言粵人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼壽百六十歲後世怠嫚故衰耗乃命粵巫立粵祝祠安臺無壇亦祠天神帝百鬼而以雞卜上信之粵祠雞卜自此始用公孫卿曰僊人可見上往常遽以故不見今陛下可為館如緱氏城置脯棗神人宜可致且僊人好樓居於是上令長安則作飛廉桂館甘泉則作益壽廷壽館使卿持節設具而候神人乃作通天臺置祠具其下將招來神僊之屬於是甘泉更置前殿始廣諸宮室夏有芝生甘泉殿房內中天子為塞河興通天若有光云乃下詔赦天下其明年伐朝鮮夏旱公孫卿曰黃帝時封則天旱乾封三年上乃下詔天旱意乾封乎其令天下尊祠靈星焉明年上郊雍五畤通回中道遂北出蕭關歷獨鹿鳴澤自西河歸幸河東祠后土明年冬上巡南郡至江陵而東登禮灊之天柱山號曰南嶽浮江自潯陽出樅陽過彭蠡禮其名山川此至琅邪並海上四月至奉高修封焉初天子封泰山泰山東北阯古時有明堂處處險不敞上欲治明堂奉高旁未曉其制度濟南人公玉帶上帝時明堂圖明堂中有一殿四面無壁以茅蓋通水水圜宮垣為復道上有樓從西南入名曰昆侖天子從之入以拜祀上黃帝焉於是上令奉高作明堂汶上如帶圖及是歲修封則祠泰一五帝於明堂上坐合高皇帝祠坐對之祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮畢尞堂下而上又上泰山自有祕祠其顛而泰山下祠五帝各如其方黃帝并赤帝所有司侍祠焉山上舉火下悉應之還幸甘泉郊泰畤春幸汾陰祠后土明年幸泰山以十一月甲子朔旦冬至日祀上帝於明堂後每宋祁說越本每作毋新本無後字但云毋修封按景祐本作毋修封毋宋祁說越本每作毋新本無後字但云毋修封按景祐本作毋修封修封其贊饗曰天增授皇帝泰元神策周而復始皇帝敬拜泰一東至海上考入海及方士求神者莫驗然益遣幾遇之乙酉柏梁災十二月甲午朔上親禪高里祠后土臨勃海將以望祀蓬萊之屬幾至殊庭焉上還以柏梁災故受計甘泉公孫卿曰黃帝就青靈臺十二日燒黃帝乃治明庭明庭甘泉也方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸勇之乃曰粵俗有火災復起屋必以大用勝服之於是作建章宮度為千門萬戶前殿度高未央其東則鳳闕高二十餘丈其西則商中數十里虎圈其北治大池漸臺高二十餘丈名曰泰液池中有蓬萊方丈瀛州壺梁象海中神山龜魚之屬其南有玉堂璧門大鳥之屬立神明臺井幹樓高五十丈輦道相屬焉夏漢改曆以正月為歲首而色上黃官更印章以五字因為太初元年是歲西伐大宛蝗大起丁夫人雒陽虞初等以方祠詛匈奴大宛焉明年有司言雍五畤無牢孰具芬芳不備乃令祠官進畤犢牢具色食所勝而以木寓馬代駒云乃諸名山川用駒者悉以木寓馬代獨行過親祠乃用駒它禮如故明年東巡海上考神僊之屬未有驗者方士有言黃帝時為五城十二樓以候神人於執期名曰迎年上許作之如方名曰明年上親禮祠上犢黃焉公玉帶曰黃帝時雖封泰山然風后封鉅岐伯令黃帝封東泰山禪凡山合符然後不死天子既令設祠具至東泰山東泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下阯南方方士言僊人閭也故上親禪焉其後五年復至泰山修封還過祭恆山自封泰山後十三歲而周徧於五嶽四瀆矣後五年復至泰山修封東幸琅邪禮日成山登之罘浮大海用事八神, WYG: 何耶葛繹}
