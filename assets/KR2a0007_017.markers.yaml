  - {type: variant, offset: 2495, length: 629, content: 之如雲及到三神山反居水下水臨之患且至則風輒引船而去終莫能至云世主莫不甘心焉及秦始皇至海上則方士爭言之始皇如恐弗及使人齎童男女入海求之船交海中皆以風為解曰未能至望見之焉其明年始皇復游海上至琅邪過恆山從上黨歸後三年游碣石考入海方士從上郡歸後五年始皇南至湘山遂登會稽並海上幾遇海中三神山之奇藥不得還到沙丘崩二世元年東巡碣石並海南歷泰山至會稽皆禮祠之而刻勒始皇所立石書旁以章始皇之功德其秋諸侯叛秦三年而二世弒死始皇封禪之後十二年而秦亡諸儒生疾秦焚詩書誅滅文學百姓怨其法天下叛之皆說曰始皇上泰山為風雨所擊不得封禪云此豈所謂無其德而用其事者邪昔三代之居皆河洛之間故嵩高為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦迭興迭衰名山大川或在諸侯或在天子其禮損益世殊不可勝記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也於是自崤以東名山五大川祠二曰太室太室嵩高也恆山泰山會稽湘山水曰泲曰淮春以脯酒為歲禱因泮凍秋涸凍冬塞禱祠其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山者襄山也岳山岐山吳山鴻冢瀆山瀆山蜀之岷山也水曰河祠臨晉沔祠漢中湫淵祠朝那江水祠蜀亦春秋泮涸禱塞如東方山川而牲亦牛犢牢具圭幣各異而四大冢鴻岐吳嶽皆有嘗禾陳寶節來祠其河加有嘗醪此皆雍州之域近天子都故加車一乘駵駒四霸產豐澇涇渭長水皆不在大山川數以近咸陽盡得比山川祠而無諸加岍洛二淵鳴澤蒲山嶽壻山之屬為小山川亦皆禱塞泮涸祠禮不必同而雍有日月參辰南北斗熒惑太白歲星填星辰星, WYG: 樂成}
