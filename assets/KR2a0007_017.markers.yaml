  - {type: variant, offset: 3940, length: 697, content: 即位十三年下詔曰祕祝之官移過於下朕甚弗取其除之始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以歲時致禮如故明年以歲比登詔有司增雍五畤路車各一乘駕被具西畤畦畤寓車各一乘寓馬四匹駕被具河湫漢水玉加各二及諸祀皆廣壇場圭幣俎豆以差加之魯人公孫臣上書曰始秦得水德及漢受之推終始傳則漢當土德土德之應黃龍見宜改正朔服色上黃時丞相張蒼好律曆以為漢乃水德之時河決金隄其符也年始冬十月色外黑內赤與德相應公孫臣言非是罷之明年黃龍見成紀文帝召公孫臣拜為博士與諸生申明土德草改曆服色事其夏下詔曰有異物之神見於成紀毋害於民歲以有年朕幾郊祀上帝諸神禮官議毋諱以朕勞有司皆曰古者天子夏親郊祀上帝於郊故曰郊於是夏四月文帝始幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之會以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水權火舉而祠若光煇然屬天焉於是貴平至上大夫賜累千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長門若見五人於道北遂因其直立五帝壇祠以五牢其明年平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延壽平又言臣候日再中居頃之日卻復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾陰直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅夷平是後文帝怠於改正服鬼神之事而渭陽長門五帝使祠官領以時致禮不往焉明年匈奴數入邊興兵守御後歲少不登數歲而孝景即位, WYG: ''}
