  - {type: variant, offset: 15612, length: 5, content: 懼孝哀皇帝, WYG: 擊匈奴功三年訛二年從宋本改正煇渠愼侯應疕臣召南按煇渠既封僕朋又封應疕自注並在魯陽則是共食此地而中分其户數者也杜侯屠耆嗣臣召南按宣紀作屠耆堂似此表脱堂字下鄜侯左將黃同斬西于王功西于訛西千今改正開陵侯建成臣召南按此侯名敖建成侯是東粤舊爵非名也史漢二表並以建成為名何耶又臨蔡侯孫都据南粤傳則姓都名稽不姓孫名都也荻苴侯韓陶以朝鮮相将兵漢圍}
