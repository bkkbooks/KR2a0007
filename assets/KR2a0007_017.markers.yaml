  - {type: variant, offset: 1424, length: 555, content: 自至者十有五焉今鳳皇麒麟不至嘉禾不生而蓬蒿藜莠茂鴟梟群翔而欲封禪無乃不可乎於是桓公乃止是歲秦穆公納晉君夷吾其後三置晉國之君平其亂穆公立三十九年而卒後五十年周靈王即位時諸侯莫朝周萇弘乃明鬼神事設射不來不來者諸侯之不來朝者也依物怪欲以致諸侯諸侯弗從而周室愈微後二世至敬王時晉人殺萇弘是時季氏專魯旅於泰山仲尼譏之自秦宣公作密畤後二百五十年而秦靈公於吳陽作上畤祭黃帝作下畤祭炎帝後四十八年周太史儋見秦獻公曰周始與秦國合而別別五百載當復合合七十年而伯王出焉儋見後七年櫟陽雨金獻公自以為得金瑞故作畦畤櫟陽而祀白帝後百一十歲周赧王卒九鼎入於秦或曰周顯王之四十二年宋大丘社亡而鼎淪沒於泗水彭城下自赧王卒後七年秦莊襄王滅東周周祀絕後二十八年秦并天下稱皇帝秦始皇帝既即位或曰黃帝得土德黃龍地螾見夏得木德青龍止於郊草木鬯茂殷得金德銀自山溢周得火德有赤烏之符今秦變周水德之時昔文公出臘景祐殿局本都作獵王先謙說作獵是獵景祐殿局本都作獵王先謙說作獵是獲黑龍此其水德之瑞於是秦更名河曰德水以冬十月為年首色尚黑度以六為名音上大呂事統上法即帝位三年東巡狩郡縣祠騶嶧山頌功業於是從齊魯之儒生博士七十人至於泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祠席用苴稭言其易遵也始皇聞此議各乖異難施用由此黜儒生而遂除車道上自泰山陽至顛立石頌德明其, WYG: ''}
