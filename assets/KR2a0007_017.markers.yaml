  - {type: variant, offset: 8082, length: 686, content: 三景祐殿本都作三王先謙說封禪書通鑑作三是此誤歲天子壹郊見其秋為伐南越告禱泰一以牡荊畫幡日月北斗登龍以象太一三星為泰一鋒旗王念孫說鋒旗之旗後人以意加之也景祐本無旗字注同命曰靈旗為兵禱則太史奉以指所伐國而五利將軍使不敢入海之泰山祠上使人隨驗實無所見五利妄言見其師其方盡多不讎上乃誅五利其冬公孫卿候神河南言見僊人迹緱氏城上有物如雉往來城上天子親幸緱氏視迹問卿得毋效文成五利乎卿曰僊者非有求人主人主者求之其道非少寬暇神不來言神事如迂誕積以歲乃可致於是郡國各除道繕治宮館名山神祠所以望幸矣其春既滅南越嬖臣李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祇可得而禮或曰泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃於是塞南越禱祠泰一后土始用樂舞益召歌兒作二十五絃及空侯瑟自此起其來年冬上議曰古者先振兵釋旅然後封禪乃遂北巡朔方勒兵十餘萬騎還祭黃帝冢橋山釋兵涼如上曰吾聞黃帝不死有冢何也或對曰黃帝以僊上天群臣葬其衣冠既至甘泉為且用事泰山先類祠泰一自得寶鼎上與公卿諸生議封禪封禪用希曠絕莫知其儀體而群儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以接神人蓬萊高世比德於九皇而頗采儒術以文之群儒既已不能辯明封禪事又拘於詩書古文而不敢騁上為封祠器視群儒群儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事於是上黜偃霸而盡罷諸儒弗用三月乃東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上, WYG: ''}
