  - {type: variant, offset: 66, length: 269, content: 覡在女曰巫使制神之處位為之牲器使先聖之後能知出川敬於禮儀明神之事者以為祝能知四時犧牲壇場上下氏姓所出者以為宗故有神民之官各司其序不相亂也民神異業敬而不黷故神降之嘉生民以物序災禍不至所求不匱及少昊之衰九黎亂德民神雜擾不可放物家為巫史享祀無度黷齊明而神弗蠲嘉生不降禍災荐臻莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常亡相侵黷自共工氏霸九州其子曰句龍能平水土死為社祠有烈山氏王天下其子曰柱能殖百穀死為稷祠故郊祀社稷所從來尚矣虞書曰舜在璿璣玉衡以齊七政遂類于上帝禋于六宗望秩于山川徧于群神揖五瑞擇吉月日見四嶽諸牧班瑞歲二月東巡狩, WYG: 潞音路漢興}
