  - {type: variant, offset: 3136, length: 341, content: 十四臣諸布諸嚴諸逐之屬百有餘廟西亦有數十祠於湖有周天子祠於下邽有天神豐鎬有昭明天子辟池於杜亳有五杜主之祠壽星祠而雍菅廟祠亦有杜主杜主故周之右將軍其在秦中最小鬼之神者也各以歲時奉祠唯雍四時景祐殿局本都作畤王先謙說作畤是畤景祐殿局本都作畤王先謙說作畤是上帝為尊其光景動人民唯陳寶故雍四畤春以為歲祠禱因泮凍秋涸凍冬賽祠五月嘗駒及四中之月月祠若陳寶節來一祠春夏用騂秋冬用駵畤駒四匹木寓龍一駟木寓車馬一駟各如其帝色黃犢羔各四圭幣各有數皆生瘞埋無俎豆之具三年一郊秦以十月為歲首故常以十月上宿郊見通權火拜於咸陽之旁而衣上白其用如經祠云西畤畦畤祠如其故上不親往諸此祠皆太祝常主以歲時奉祠之至如它名山川諸神及八神之屬上過則祠去則已郡縣遠方祠者民各自奉祠不領於天子之祝官祝官有祕祝即有災祥輒祝祠移過於下, WYG: 表}
