  - {type: variant, offset: 498, length: 252, content: 桑穀生於廷一暮大拱懼伊陟曰祅不勝德太戊修德桑穀死伊陟贊巫咸後十三世帝武丁得傅說為相殷復興焉稱高宗有雉登鼎耳而雊武丁懼祖己曰修德武丁從之位以永寧後五世帝乙嫚神而震死後三世帝紂淫亂武王伐之由是觀之始未嘗不肅祇後稍怠嫚也周公相成王王道大洽制禮作樂天子曰明堂辟雍諸侯曰泮宮郊祀后稷以配天宗祀文王於明堂以配上帝四海之內各以其職來助祭天子祭天下名山大川懷柔百神咸秩無文五嶽視三公四瀆視諸侯而諸侯祭其畺內名山大川大夫祭門戶井竈中霤五祀士庶人祖考而已各有典禮而淫祀有禁後十三世世益衰禮樂廢幽王無道為犬戎所敗平王東徙雒邑秦, WYG: 弓髙}
