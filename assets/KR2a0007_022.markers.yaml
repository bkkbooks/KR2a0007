  - {type: variant, offset: 7975, length: 447, content: 卷淮南雜子星十九卷泰壹雜子雲雨三十四卷國章觀霓雲雨三十四卷泰階六符一卷金度玉衡漢五星客流出入八篇漢五星彗客行事占驗八卷漢日旁氣行事占驗三卷漢流星行事占驗八卷漢日旁氣行占驗十三卷漢日食月暈雜變行事占驗十三卷海中星占驗十二卷海中五星經雜事二十二卷海中五星順逆二十八卷海中二十八宿國分二十八卷海中二十八宿臣分二十八卷海中日月彗虹雜占十八卷圖書祕記十七篇右天文二十一家四百四十五卷天文者序二十八宿步五星日月以紀吉凶之象聖王所以參政也易曰觀乎天文以察時變然星事凶悍非湛密者弗能由也夫觀景以譴形非明王亦不能服聽也以不能由之臣諫不能聽之王此所以兩有患也黃帝五家曆三十三卷顓頊曆二十一卷顓頊五星曆十四卷日月宿曆十三卷夏殷周魯曆十四卷天曆大曆十八卷漢元殷周諜曆十七卷耿昌月行帛圖二百三十二卷耿昌月行度二卷傳周五星行度三十九卷律曆數法三卷自古五星宿紀三十卷太歲謀日晷二十九卷帝王諸侯世譜二十卷古來帝王年譜五卷日晷書三十四卷許商算術二十六卷杜忠算術十六卷右曆譜十八家六百六卷曆譜者序四時之位正分至之節會日月五星之辰以, WYG: ''}
