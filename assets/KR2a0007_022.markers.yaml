  - {type: variant, offset: 1781, length: 0, content: '', krp: 心而不使邪氣得接焉宋祁曰善心而當作善心也是先王立樂之方也王者未作樂之時因先王之樂以教化百姓說樂其俗師古曰說樂其俗使和說而安樂也說讀曰恱樂音來各反然後改作以章功徳易曰先王以作樂崇徳殷薦之上帝以配祖考師古曰此豫卦象辭也殷盛大也上帝天也言王者作樂崇表其徳大薦}
  - {type: variant, offset: 1782, length: 0, content: '', WYG: 天而以祖考配饗之也昔黄帝作咸池顓頊作六莖帝嚳作五英師古曰嚳音酷堯作大章舜作招師古曰招讀曰韶下皆類此禹作夏湯作濩師古曰濩音護武王作武周公作勺勺言能勺先祖之道也師古曰勺讀曰酌酌取也武言以功定天下也濩言救民也夏大承二帝也師古曰夏大也二帝謂堯舜也招繼堯也師古曰韶之言紹故曰繼堯也大章章之也師古曰章明也五英英華茂也宋祁曰邵本英華無華字六莖及根莖也師古曰澤及下也咸池備矣師古曰咸皆也池言其包容浸潤也故云備矣自夏以徃其流不可聞已師古曰言歌頌皆亡也已語終辭殷頌猶有存者師古曰謂正考甫所得那以下是周詩既備師古曰謂雅頌皆得其所而其器用張陳周官具焉師古曰謂大司}
