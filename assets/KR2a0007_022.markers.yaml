  - {type: variant, offset: 1872, length: 0, content: '', WYG: 充宫廷晉灼曰四縣樂四縣也天子宫縣師古曰謂設宫縣而髙張之縣古懸字芬樹羽林雲景杳㝠師古曰言所樹羽葆其盛若林芬然衆多仰視髙逺如雲日之杳㝠也金支秀華庶旄翠旌張宴曰金支百二十支秀華中主有華艷也旄鍾之旄也文穎曰析羽為旌翠羽為之也臣瓚曰樂上衆飾有流遡羽葆以黄金為支其首敷散若草木之秀華也師古曰金支秀華瓚說是也庶衆也庶旄翠旌謂析五采羽注翠旄之首而為旌耳七始華始肅倡和聲孟康曰七始天地四時人之始華始萬物英華之始也以為樂名如六英也師古曰肅敬也言歌者敬而唱諧和之聲神來宴娭庶幾是聽師古曰娭戲也言庶幾神來宴戲聽此樂也娭音許其反粥粥音送細亝人情晉灼曰粥粥敬懼貌也細微也以樂送神微感人情使之齊肅也師古曰粥音弋六反忽乗青𤣥熙事備成師古曰言還神禮畢忽登青天而去福熙之事皆備成也熙與禧同清思聈聈經緯冥冥蘇林曰聈音窈師古曰聈聈幽静也經緯謂經緯天地我定歴數人告其心師古曰言臣下各竭其心致誠慤也敕身齊戒施教申申應劭曰敕謹敬之貌師古曰齊讀曰齋乃立祖廟敬明尊親大矣孝熙四極爰轃師古曰熙亦福也四極四方極逺之處也爾雅曰東至於泰逺西至於邠國南至於濮鉛北至於祝栗謂之四極邠音彬轃字與臻同王侯秉徳其鄰翼翼師古曰鄰言徳不孤必有鄰也翼翼恭敬也顯明昭式清明鬯矣皇帝孝徳師古曰鬯古暢字暢通也竟全大功撫安四極海内有姦紛亂東北師古曰謂匈奴詔撫成師武臣承徳師古曰成師言各置部校師出以律也春秋左氏傳曰成師以出行樂交逆簫勺羣慝晉灼曰簫舜樂也勺周樂也言以樂征伐也師古曰言制定新樂教化流行則逆亂之徒盡交歡也慝惡也勺讀曰酌劉敞曰予謂逆迎也樂音洛言師行而和樂逺邇皆迎也肅為濟哉蓋定燕國師古曰匈奴服從則燕國安静無冦難也大海蕩蕩水所歸髙賢愉愉民所懷李竒曰愉愉懌也師古曰蕩蕩廣大貌也愉愉和樂貌也懐思也言海以廣大之故衆水歸之王者有和樂之徳則人皆思附也大山崔百卉殖民何貴貴有徳師古曰言大山以崔嵬之故能生養百卉明君以崇髙其徳故為萬姓所尊也崔音才回反安其所樂終産師古曰萬物各安其所而樂終其生也樂終産世繼緒師古曰言傳祚無窮飛龍秋游上天蘇林曰秋飛貌也師古曰莊子有秋駕之法者亦言駕馬騰驤秋秋然也揚雄賦曰秋秋蹌蹌入西園其義亦同讀者不曉秋義或改此秋字為秫稷之秫失之逺矣髙賢愉樂民人師古曰言王者有愉愉之徳故使衆人皆安樂豐草葽女羅施孟康曰葽音四月秀葽之葽盛貌也應劭曰女蘿兎絲也延于松栢之上異類而猶載之况同姓言族親不可不覆遇也譱何如誰能回師古曰回亂也言至徳之善上古帝皇皆不如之而不可干亂大莫大成教徳長莫長被無極師古曰被音皮義反次下亦同靁震震電燿燿明徳鄉治本約服䖍曰與臣民之約師古曰鄉方也言王者之威取象靁電明示徳義之方而治政本之約約讀曰要治本約澤𢎞大師古曰政教有常則恩惠溥洽加被寵咸相保師古曰言徳政所加人被寵渥則室家老㓜皆相保也徳施大世曼夀師古曰曼延也都荔遂芳窅窊桂華蘇林曰窅音窅晊之窅窊音窊下之窊孟康曰窅出窊入都良薜荔之香鼓動桂華也晉灼曰桂華似殿名次下言桂華馮馮翼翼承天之則言樹此香草以絜齊其芳氣乃達於宫殿也臣瓚曰茂陵中書歌都孋桂英美芳鼓行如此復不得為殿名師古曰諸家說皆未盡也此言都良薜荔俱有芬芳桂華之形窅窊然也皆謂神宫所有耳窅音一交反窊音一𤓰反宋祁曰諸家下添之字孝奏天儀若日月光師古曰言以孝道進承於天天神下降故有光宋祁曰有光下添也字乗𤣥四龍回馳北行羽旄殷盛芬哉芒芒師古曰芬亦謂衆多芒芒廣逺之貌孝道隨世我署文}
