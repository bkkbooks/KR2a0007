  - {type: variant, offset: 1746, length: 0, content: '', WYG: 徳教獨用執法之吏治民而欲徳化被四海故難成也是故古之王者莫不以教化為大務立大學以教於國設庠序以化於邑師古曰庠序行禮養老之處也教化以明習俗以成天下嘗無一人之獄矣至周末世大為無道以失天下秦繼其後又益甚之自古以來未嘗以亂濟亂大敗天下如秦者也師古曰濟益也習俗薄惡民人抵冒師古曰抵忤也冒犯也言無㢘恥不畏懼也抵音丁禮反今漢繼秦之後雖欲治之無可奈何法出而姦生令下而詐起一嵗之獄以萬千數如以湯止沸沸兪甚而無益師古曰兪進也音踰又音愈它皆類此辟之琴瑟師古曰辟讀曰譬不調甚者必觧而更張之廼可鼓也為政而不行甚者必變而更化之廼可理也故漢得天下以來常欲善治而至今不能勝殘去殺者失之當更化而不能更化也古人有言臨淵羡魚不如歸而結網今臨政而願治七十餘嵗矣不如退而更化更化則可善治而災害日去福祿日來矣是時}
