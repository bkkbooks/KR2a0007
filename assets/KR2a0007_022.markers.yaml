  - {type: variant, offset: 1779, length: 1, content: 莫, WYG: 易師古曰易音弋䜴反宋祁曰邵本於感人深上無其字故先王著其教焉師古曰著明也夫民有血氣心知之性而無哀樂喜怒之常應感而動然後心術形焉師古曰言人之性感物則動也術道徑也心術心之所由也形見也是以纎微癄瘁一作衰之音作而民思憂師古曰癄瘁謂减縮也音子笑反劉攽曰樂聲無癄瘁當依禮讀為噍殺闡諧嫚易之音作而民康樂師古曰闡廣也諧和也嫚易言不急刻也易音弋豉反麤厲猛奮之音作而民剛毅師古曰麤厲抗厲也猛奮𤼵揚也麤古作麄字宋祁曰姚本改古作作字若云麤古麄字非是㢘直正誠之音作而民肅敬寛裕和順之音作而民慈愛師古曰裕饒也流辟邪散之音作而民淫亂先王恥其亂也師古曰辟讀曰僻故制雅頌之聲本之情性稽之度數制之禮儀師古曰稽考也合生氣之和導五常之行師古曰生氣隂陽之氣也導引也使之陽而不散隂而不集師古曰集謂聚滯也剛氣不怒柔氣不懾師古曰懾恐也音之渉反四暢交於中而發作於外師古曰暢通達也皆安其位而不相奪也宋祁曰景本舊無也字足以感動人之}
