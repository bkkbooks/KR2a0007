  - {type: variant, offset: 6088, length: 2, content: 王群, WYG: 按監本以涓選休成為下章天地並况之首句又以肅若舊典為下章日出入安窮之首句此大誤也今改正又按衡所更定詩祗記其首句餘不𫝊泊如四海之池句徧觀是邪謂何句}
