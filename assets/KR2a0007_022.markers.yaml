  - {type: variant, offset: 1789, length: 3, content: 周衰俱, WYG: 設兩觀乗大路應劭曰觀闕門邉兩觀也禮諸侯一觀大路天子之車陪臣管仲季氏之屬師古曰陪重也諸侯者天子之臣故其臣稱重臣也季氏魯桓公子季友之後専執國政而奢僭也三歸雍徹八佾舞廷師古曰三歸取三姓女也婦人謂嫁曰歸故曰三歸盖謂管仲耳雍樂詩也徹饌奏之八佾八列之舞皆僭天子禮也此謂季氏耳制度遂}
