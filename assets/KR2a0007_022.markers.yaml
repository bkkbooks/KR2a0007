  - {type: variant, offset: 6054, length: 1, content: 賦, WYG: 納妃叔孫制禮以為天子無親迎似其書尚有𫝊者不可觧也顓頊作六莖帝嚳作五英臣召南按六莖五英此與白虎通同又有稱五莖六英者周禮疏引樂緯曰顓頊之樂曰五莖帝嚳之樂曰六英又元結補古樂歌亦作五莖六英樂官師瞽抱其器而犇散注云云臣召南按此志本史記殷本紀言紂時太師少師持其祭樂器奔周班氏遂以論語實其事耳主出武徳舞注蘇林曰言昭容樂生於武徳舞隋志牛宏曰昭徳生于武徳猶古之昭夏禮容生于文始矯秦之五行臣召南按宏言矯秦之五行非也蓋禮容樂生于文始五行}
