  - {type: variant, offset: 1934, length: 1, content: 數, WYG: 衆師古曰趍讀曰趣趣嚮也鄭衛之聲興則淫辟之化流師古曰辟讀曰僻也而欲黎庶敦朴家給猶濁其源而求其清流師古曰源水泉之本豈不難哉孔子不云乎放鄭聲鄭聲淫師古曰論語載孔子之}
  - {type: variant, offset: 1934, length: 1, content: 數, krp: 衆師古曰趍讀曰趣趣嚮也鄭衛之聲興則淫辟之化流師古曰辟讀曰僻也而欲黎庶敦朴家給猶濁其源而求其清流師古曰源水泉之本豈不難哉孔子不云乎放鄭聲鄭聲淫師古曰論語載孔子之}
  - {type: variant, offset: 1937, length: 2, content: 義獻, WYG: 罷樂府官郊祭樂及古兵法武樂在經非鄭衛之樂者條奏别屬他官丞相孔光大司空何武奏郊祭樂人員六十二人給祠南北郊大樂鼓員六人嘉至鼓員十人邯鄲鼓員二人騎吹鼓員三人江南鼓員二人淮南鼓員四人巴俞鼓員三十六人師古曰巴巴人也俞俞人也當髙祖初為漢王得巴俞人並趫㨗善鬭與之定三秦滅楚因存其武樂也巴俞之樂因此始也巴即今之巴州俞即今之渝州各其本地歌鼓員}
