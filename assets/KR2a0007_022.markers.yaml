  - {type: variant, offset: 1783, length: 0, content: '', WYG: 以下諸官所掌典者自卿大夫師瞽以下皆選有道徳之人師古曰師樂工瞽無目者朝夕習業以教國子國子者卿大夫之子弟也皆學歌九徳師古曰水火金木土榖謂之六府正徳利用厚生謂之三事六府三事謂之九功九功之徳皆可歌也故言九徳也誦六詩應劭曰六詩者詩有六義一曰風}
