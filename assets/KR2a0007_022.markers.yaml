  - {type: variant, offset: 2555, length: 420, content: 及弟子相與言而接聞於夫子之語也當時弟子各有所記夫子既卒門人相與輯而論篹故謂之論語漢興有齊魯之說傳齊論者昌邑中尉王吉少府宋畸御史大夫貢禹尚書令五鹿充宗膠東庸生唯王陽名家傳魯論語者常山都尉龔奮長信少府夏侯勝丞相韋賢魯扶卿前將軍蕭望之安昌侯張禹皆名家張氏最後而行於世孝經古孔氏一篇孝經一篇長孫氏說二篇江氏說一篇翼氏說一篇后氏說一篇雜傳四篇安昌侯說一篇五經雜議十八篇爾雅三卷二十篇小爾雅一篇古今字一卷弟子職一篇說三篇凡孝經十一家五十九篇孝經者孔子為曾子陳孝道也夫孝天之經地之義民之行也舉大者言故曰孝經漢興長孫氏博士江翁少府后倉諫大夫翼奉安昌侯張禹傳之各自名家經文皆同唯孔氏壁中古文為異父母生之續莫大焉故親生之膝下諸家說不安處古文字讀皆異史籀十五篇八體六技蒼頡一篇凡將一篇急就一篇元尚一篇訓纂一篇別字十三篇蒼頡傳一篇揚雄蒼頡訓纂一篇杜林蒼頡訓纂一篇杜林蒼頡故一篇凡小學十家四十五篇易曰上古結繩以治後世聖人易之以書契百官以治萬民以察蓋取諸夬夬揚於王庭言, WYG: ''}
