  - {type: variant, offset: 8423, length: 2111, content: 寒暑殺生之實故聖王必正曆數以定三統服色之制又以探知五星日月之會凶阨之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至材其孰與焉道之亂也患出於小人而強欲知天道者壞大以為小削遠以為近是以道術破碎而難知也泰一陰陽二十三卷黃帝陰陽二十五卷黃帝諸子論陰陽二十五卷諸王子論陰陽二十五卷太元陰陽二十六卷三典陰陽談論二十七卷神農大幽五行二十七卷四時五行經二十六卷猛子閭昭二十五卷陰陽五行時令十九卷堪輿金匱十四卷務成子災異應十四卷十二典災異應十二卷鍾律災異二十六卷鍾律叢辰日苑二十三卷鍾律消息二十九卷黃鍾七卷天一六卷泰一二十二景祐殿本都作二十九卷二字衍九卷刑德七卷風鼓六甲二十四卷風后孤虛二十卷六合隨典二十五卷轉位十二神二十五卷羨門式法二十卷羨門式二十卷文解六甲十八卷文解二十八宿二十八卷五音奇胲用兵二十三卷五音奇胲刑德二十一卷五音定名十五卷右五行三十一家六百五十二卷五行者五常之形氣也書云初一曰五行次二曰羞用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出於律曆之數而分為一者也其法亦起五德終始推其極則無不至而小數家因此以為吉凶而行於世𥧲以相亂龜書五十二卷夏龜二十六卷南龜書二十八卷巨龜三十六卷雜龜十六卷蓍書二十八卷周易三十八卷周易明堂二十六卷周易隨曲射匿五十卷大筮衍易二十八卷大次雜易三十卷鼠序卜黃二十五卷於陵欽易吉凶二十三卷任良易旗七十一卷易卦八具右蓍龜十五家四百一卷蓍龜者聖人之所用也書曰女則有大疑謀及卜筮易曰定天下之吉凶成天下之亹亹者莫善於蓍龜是故君子將有為也將有行也問焉而以言其受命也如嚮無有遠近幽深遂知來物非天下之至精其孰能與於此及至衰世解於齊戒而婁煩卜筮神明不應故筮瀆不告易以為忌龜厭不告詩以為刺黃帝長柳占夢十一卷甘德長柳占夢二十卷武禁相衣器十四卷嚏耳鳴雜占十六卷禎祥變怪二十一卷人鬼精物六畜變怪二十一卷變怪誥咎十三卷執不祥劾鬼物八卷請官除訞祥十九卷禳祀天文十八卷請禱致福十九卷請雨止雨二十六卷泰壹雜子候歲二十二卷子贛雜子候歲二十六卷五法積貯寶臧二十三卷神農教田相土耕種十四卷昭明子釣種生魚鱉八卷種樹臧果相蠶十三卷右雜占十八家三百一十三卷雜占者紀百事之象侯善惡之徵易曰占事知來眾占非一而夢為大故周有其官而詩載熊羆虺蛇眾魚旐旟之夢著明大人之占以考吉凶蓋參卜筮春秋之說訞也曰人之所忌其氣炎以取之訞由人興也人失常則訞興人無釁焉訞不自作故曰德勝不祥義厭不惠桑穀共生大戊以興鴝雉登鼎武丁為宗然惑者不稽諸躬而忌訞之見是以詩刺召彼故老訊之占夢傷其舍本而憂末不能勝凶咎也山海經十三篇國朝七卷宮宅地形二十卷相人二十四卷相寶劍刀二十卷相六畜三十八卷右形法六家百二十二卷形法者大舉九州之勢以立城郭室舍形人及六畜骨法之度數器物之形容以求其聲氣貴賤吉凶猶律有長短而各徵其聲非有鬼神數自然也然形與氣相首尾亦有有其形而無其氣有其氣而無其形此精微之獨異也凡數術百九十家二千五百二十八卷數術者皆明堂羲和史卜之職也史官之廢久矣其書既不能具雖有其書而無其人易曰苟非其人道不虛行春秋時魯有梓慎鄭有裨竈晉有卜偃宋有子韋六國時楚有甘公魏有石申夫漢有唐都庶得麤觕蓋有因而成易無因而成難故因舊書以序數術為六種黃帝內經十八卷外經三十九景祐殿本都作七七景祐殿本都作七卷扁鵲內經九卷外經十二卷白氏內經三十八卷外經三十六卷旁篇二十五卷右醫經七家二百一十六卷醫經者原人血脈經絡景祐殿本都作落落景祐殿本都作落骨髓陰陽表裏以起百病之本死生之分而用度箴石湯火所施調百藥齊和之所宜至齊之得猶慈石取鐵以物相使拙者失理以瘉為劇以死為生景祐殿本都作以生為死以生為死景祐殿本都作以生為死五藏六府痺十二病方三十卷五藏六府疝十六病方四十卷五藏六府癉十二病方四十卷風寒熱十六病方二十六卷泰始黃帝扁鵲俞拊方二十三卷五藏傷中十一病方三十一卷客疾五藏狂顛病方十七卷金創瘲瘛方三十卷婦人嬰兒方十九卷湯液經法三十二卷神農黃帝食禁七卷右經方十一家二百七十四卷經方者本草石之寒溫量疾病之淺深假藥味之滋因氣感之宜辯五苦六辛致水火之齊以通閉解結反之於平及失其宜者以熱益熱以寒增寒精氣內傷不見於外是所獨失也故諺曰有病不治常得中醫容成陰道二十六卷務成子陰道三十六卷堯舜陰道二十三卷湯盤庚陰道二十卷天老雜子陰道二十五卷天一陰道二十四卷黃帝三王養陽方二十卷三家內房有子方十七卷右房中八家百八十六卷房中者性情景祐殿本都作情性情性景祐殿本都作情性之極至道之際是以聖王制外樂以禁內情而為之節文傳曰先王之作樂所以節百事也樂而有節則和平壽考及迷者弗顧以生疾而隕性命宓戲雜子道二十篇上聖雜子道二十六卷道要雜子十八卷黃帝雜子步引十二卷黃帝岐伯按摩十卷黃帝雜子芝菌十八卷黃帝雜子十九家方二十一卷泰壹雜子十五家方二十二卷神農雜子技道二十三卷泰壹雜子黃冶三十一卷右神僊十家二百五卷神僊者所以保性命之真而游求於其外者也聊以盪意平心同死生之域而無怵惕於胸中然而或者專以為務則誕欺怪迂之文彌以益多非聖王之所以教也孔子曰索隱行怪後世有述焉吾不為之矣凡方技三十六家八百六十八卷方技者皆生生之具王官之一守也太古有岐伯俞拊中世有扁鵲秦和蓋論病以及國原診以知政漢興有倉公今其技術晻昧故論其書以序方技為四種大凡書六略三十八種五百九十六家萬三千二百六十九卷, WYG: 證}
