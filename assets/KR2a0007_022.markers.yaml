  - {type: variant, offset: 1852, length: 0, content: '', krp: 廟奏昭徳文始四}
  - {type: variant, offset: 1853, length: 0, content: '', WYG: 五行之舞孝武廟奏盛徳文始四時五行之舞武徳舞者髙祖四年作以象天下樂已行武以除亂也文始舞者曰本舜招舞也髙祖六年更名曰文始以示不相襲也五行舞者本周舞也秦始皇二十六年更名曰五行也四時舞者孝文所作以眀示天下之安和也宋祁曰邵本以明示無明字蓋樂已所自作明有制也師古曰言自制作也樂先王之樂明有法也師古曰遵前代之法孝景采武徳舞以為昭徳以尊太宗廟至孝宣采昭徳舞為盛徳以尊世宗廟諸帝廟皆常奏文始四時五行舞云髙祖六年又作昭容樂禮容樂昭容者猶古之昭夏也主出武徳舞蘇林曰言昭容樂生於武徳舞劉奉世曰予謂主出者此舞出則主奏之故下文云出用樂者言舞不失節能以樂終也禮容者主出文始五行舞舞入無樂者將至至尊之前不敢以樂也出用樂者言舞不失節能以樂終也大氐皆因秦舊事焉師古曰氐歸也音丁禮反其後字或作抵音義竝同初髙祖既定天下過沛與故人父老相樂醉酒歡哀作風起之詩令沛中僮兒百二十人習而歌之至孝惠時以沛宫為原廟師古曰原重也言已有正廟更重立也皆令歌兒習吹以相和常以百二十人為員文景之間禮官肄業而已師古曰肄習也音弋二反至武帝定郊祀之禮祠太一於甘泉就乾位也師古曰言在京師之西北也祭后土於汾隂澤中方丘也師古曰汾水之旁土特堆起是澤中方丘也祭地以方象地形乃立樂府師古曰始置之也樂府之名盖起於此哀帝時罷之采詩夜誦師古曰采詩依古遒人徇路采取百姓謳謡以知政教}
