  - {type: variant, offset: 7418, length: 554, content: 形勢者靁動風舉後發而先至離合背鄉變化無常以輕疾制敵者也太壹兵法一篇天一兵法三十五篇神農兵法一篇黃帝十六篇封胡五篇風后十三篇力牧十五篇鵊冶子一篇鬼容區三篇地典六篇孟子一篇東父三十一篇師曠八篇萇弘十五篇別成子望軍氣六篇辟兵威勝方七十篇右陰陽十六家二百四十九篇圖十卷陰陽者順時而發推刑德隨斗擊因五勝假鬼神而為助者也鮑子兵法十篇五子胥十篇公勝子五篇苗子五篇逢門射法二篇陰通成射法十一篇李將軍射法三篇魏氏射法六篇彊弩將軍王圍射法五卷望遠連弩射法具十五篇護軍射師王賀射書五篇蒲苴子弋法四篇劍道三十八篇手搏六篇雜家兵法五十七篇蹴𩌽二十五篇右兵技巧十三家百九十九篇技巧者習手足便器械積機關以立攻守之勝者也凡兵書五十三家七百九十篇圖四十三卷兵家者蓋出古司馬之職王官之武備也洪範八政八曰師孔子曰為國者足食足兵以不教民戰是謂棄之明兵之重也易曰古者弦木為弧剡木為矢弧矢之利以威天下其用上矣後世燿金為刃割革為甲器械甚備下及湯武受命以師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋至於戰國出奇設伏變詐之兵並作漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸呂用事而盜取之武帝時軍政楊僕捃摭遺逸紀奏兵錄猶未能備至于孝成命任宏論次兵書為四種泰壹雜子星二十八卷五殘雜變星二十一卷黃帝雜子氣三十三篇常從日月星氣二十一卷皇公雜子星, WYG: ''}
