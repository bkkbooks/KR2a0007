  - {type: variant, offset: 1892, length: 3, content: 諸子言, WYG: 輔佐阿衡周召太公申伯召虎仲山甫之屬師古曰阿衡伊尹職號也周周公旦也召召公奭也太公師尚父也申伯召虎仲山甫皆周宣王臣也君臣男女有功徳者靡不襃揚功徳既信美矣襃揚之聲盈乎天地之間是以光名著於當世遺譽垂於無窮也今漢郊廟詩歌未有祖宗之事八音調均又不協於鐘律而内有掖庭材人外有上林}
