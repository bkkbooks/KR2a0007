  - {type: variant, offset: 1842, length: 2, content: 君魏, WYG: 聲也鏗音立耕反鎗音初庚反其下亦同髙祖時叔孫通因秦樂人制宗廟樂大祝迎神于廟門奏嘉至李竒曰嘉善也善神之至也猶古降神之樂也皇帝入廟門奏永至以為行歩之節猶古采薺肆夏也劉徳曰歌樂在逸詩師古曰薺音才私反禮經或作薋又作茨音竝同耳乾豆上奏登歌師古曰乾豆脯羞之屬獨上歌不以筦弦亂人聲欲在位者徧聞之猶古清廟之歌也登歌再終下奏休成之樂服䖍曰叔孫通所奏作也美神明既饗也皇帝就酒東廂坐定奏永安之樂美禮已成也又有房中祠樂髙祖唐山夫人所作也服䖍曰髙帝姬也韋昭曰唐山姓也宋祁曰又有當刪又字周有房中樂宋祁曰周上有曰字至秦名曰夀人凡樂樂其所生禮不忘本髙祖樂楚聲故房中樂楚聲也孝惠二年使樂府令夏侯寛備其簫管更名曰安世樂髙祖廟奏武徳}
