  - {type: variant, offset: 6083, length: 0, content: '', WYG: 句云云臣世駿按舊本監本俱以大孝備矣為一叚粥粥音送為一叚我定歴數為一叚豐草葽為一叚雷震震為一叚都荔遂芳為一叚桂華馮馮翼翼為一叚嘉薦芳矣為一叚皇皇鴻明至末為一叚判然九章與志所云}
