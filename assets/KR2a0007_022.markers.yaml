  - {type: variant, offset: 93, length: 339, content: 崩聖上喟然而稱曰朕甚閔焉於是建藏書之策置寫書之官下及諸子傳說皆充祕府至成帝時以書頗散亡使謁者陳農求遺書於天下詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技每一書已向輒條其篇目撮其指意錄而奏之會向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總群書而奏其七略故有輯略有六藝略有諸子略有詩賦略有兵書略有術數略有方技略今刪其要以備篇籍易經十二篇施孟梁丘三家易傳周氏二篇服氏二篇楊氏二篇蔡公二篇韓氏二篇王氏二篇丁氏八篇古五子十八篇淮南道訓二篇古雜八十篇雜災異三十五篇神輸五篇圖一孟氏京房十一篇災異孟氏京房六十六篇五鹿充宗略說三篇京氏段嘉十二篇章句施孟梁丘氏各二篇凡易十三家二百九十四篇易曰宓戲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦, WYG: 所}
