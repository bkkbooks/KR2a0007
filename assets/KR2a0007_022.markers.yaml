  - {type: variant, offset: 1881, length: 3, content: 好儒與, WYG: 有雅材亦以為治道非禮樂不成因獻所集雅樂天子下大樂官常存肄之師古曰肄習也音弋二反歲時以備數然不常御常御及郊廟皆非雅聲然詩樂施於後嗣猶得有所祖述昔殷周之雅頌廼上本有娀姜嫄應劭曰簡狄有娀之女吞燕卵而生契師古曰姜嫄后稷之母也卨稷始生元王公劉古公太伯王季姜女太任太姒之徳師古曰卨殷之始祖稷周之始祖𤣥王亦殷之先祖承黑帝之後故曰𤣥王公劉后稷之曾孫也古公亶甫即豳公也太伯太王之子王季之兄也王季文王之父也姜女亶甫之妃也太任文王之母也太姒文王之妃武王之母也}
