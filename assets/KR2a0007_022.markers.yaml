  - {type: variant, offset: 490, length: 1002, content: 彖象繫辭文言序卦之屬十篇故曰易道深矣人更三聖世歷三古及秦燔書而易為筮卜之事傳者不絕漢興田和錢大昭說和當作何按景祐殿本都作何何錢大昭說和當作何按景祐殿本都作何傳之訖于宣元有施孟梁丘京氏列於學官而民間有費高二家之說劉向以中古文易經校施孟梁丘經或脫去無咎悔亡唯費氏經與古文同尚書古文經四十六卷經二十九卷傳四十一篇歐陽章句三十一卷大小夏侯章句各二十九卷大小夏侯解故二十九篇歐陽說義二篇劉向五行傳記十一卷許商五行傳記一篇周書七十一篇議奏四十二篇凡書九家四百一十二篇易曰河出圖雒出書聖人則之故書之所起遠矣至孔子篹焉上斷於堯下訖于秦凡百篇而為之序言其作意秦燔書禁學濟南伏生獨壁藏之漢興亡失求得二十九篇以教齊魯之間訖孝宣世有歐陽大小夏侯氏立於學官古文尚書者出孔子壁中武帝末魯共王壞孔子宅欲以廣其宮而得古文尚書及禮記論語孝經凡數十篇皆古字也共王往入其宅聞鼓琴瑟鍾磬之音於是懼乃止不壞孔安國者孔子後也悉得其書以考二十九篇得多十六篇安國獻之遭巫蠱事未列于學官劉向以中古文校歐陽大小夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字文字異者七百有餘脫字數十書者古之號令號令於眾其言不立具則聽受施行者弗曉古文讀應爾雅故解古今語而可知也詩經二十八卷魯齊韓三家魯故二十五卷魯說二十八卷齊后氏故二十卷齊孫氏故二十七卷齊后氏傳三十九卷齊孫氏傳二十八卷齊雜記十八卷韓故三十六卷韓內傳四卷韓外傳六卷韓說四十一卷毛詩二十九卷毛詩故訓傳三十卷凡詩六家四百一十六卷書曰詩言志哥景祐殿本都作歌下及注並同歌景祐殿本都作歌下及注並同詠言故哀樂之心感而哥歌詠之聲發誦其言謂之詩詠其聲謂之哥歌故古有采詩之官王者所以觀風俗知得失自考正也孔子純取周詩上采殷下取魯凡三百五篇遭秦而全者以其諷誦不獨在竹帛故也漢興魯申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜說咸非其本義與不得已魯最為近之三家皆列於學官又有毛公之學自謂子夏所傳而河間獻王好之未得立禮古經五十六卷經七十劉敞說此七十與後七十皆當作十七錢大昭王先謙都說劉說是十七劉敞說此七十與後七十皆當作十七錢大昭王先謙都說劉說是篇記百三十一篇明堂陰陽三十三篇王史氏二十一篇曲臺后倉九篇中庸說二篇明堂陰陽說五篇周官經六篇周官傳四篇軍禮司馬法百五十五篇古封禪群祀二十二篇封禪議對十九篇漢封禪群祀三十六篇議奏三十八篇凡禮十三家五百五十五篇易曰有夫婦父子君臣上下禮義有所錯而帝王質文世有損益至周, WYG: 制}
