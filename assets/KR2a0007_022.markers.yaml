  - {type: variant, offset: 1687, length: 3, content: 說樂記, WYG: 貴也以通為奉常遂定儀法師古曰奉常即太常也觧在百官公卿表未盡備而通終至文帝時賈誼以為漢承秦之敗俗廢禮義捐㢘恥今其甚者殺父兄盗者取廟器而大臣特以簿書不報期㑹為故師古曰特但也簿文簿也故謂大事也言公卿但以文案簿書報荅為事也簿音歩户反至於風俗流溢恬而不怪師古曰恬安也謂心以為安以為是適然耳師古曰言正當如此非失道也夫移風易俗使天下回心而鄉道師古曰鄉讀曰嚮類非俗吏之所能為也夫立君臣等上下使綱紀有序六親和睦如淳曰六親賈誼書以為父也子也從父昆弟也從祖昆弟也曾祖昆弟也族昆弟也此非天之所為人之所設也人之所設不為不立不修則壞師古曰為作也漢興至今}
