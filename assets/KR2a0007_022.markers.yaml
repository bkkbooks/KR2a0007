  - {type: variant, offset: 6219, length: 409, content: 賦三篇宗正劉辟彊賦八篇司馬遷賦八篇郎中臣嬰齊賦十篇臣說賦九篇臣吾賦十八篇遼東太守蘇季賦一篇蕭望之賦四篇河內太守徐明賦三篇給事黃門侍郎李息賦九篇淮陽憲王賦二篇揚雄賦十二篇待詔馮商賦九篇博士弟子杜參賦二篇車郎張豐賦三篇驃騎將軍朱宇賦三篇右賦二十一家二百七十四篇孫卿賦十篇秦時雜賦九篇李思孝景皇帝頌十五篇廣川惠王越賦五篇長沙王群臣賦三篇魏內史賦二篇東暆令延年賦七篇衛士令李忠賦二篇張偃賦二篇賈充賦四篇張仁賦六篇秦充賦二篇李步昌賦二篇侍郎謝多賦十篇平陽公主舍人周長孺賦二篇雒陽錡華賦九篇眭弘賦一篇別栩陽賦五篇臣昌市賦六篇臣義賦二篇黃門書者假史王商賦十三篇侍中徐博賦四篇黃門書者王廣呂嘉賦五篇漢中都尉丞華龍賦二篇左馮翊史路恭賦八篇右賦二十五家百三十六篇客主賦十八篇雜行出及頌德賦二十四篇雜四夷及兵賦二十篇雜中賢失意賦十二篇雜思慕悲哀死賦十六篇雜鼓琴劍戲賦十三篇雜山陵水泡雲氣雨旱賦十六篇雜禽獸六畜昆蟲賦十八篇雜器械草木賦三十三篇, WYG: 召南按藝}
  - {type: variant, offset: 6219, length: 409, content: 賦三篇宗正劉辟彊賦八篇司馬遷賦八篇郎中臣嬰齊賦十篇臣說賦九篇臣吾賦十八篇遼東太守蘇季賦一篇蕭望之賦四篇河內太守徐明賦三篇給事黃門侍郎李息賦九篇淮陽憲王賦二篇揚雄賦十二篇待詔馮商賦九篇博士弟子杜參賦二篇車郎張豐賦三篇驃騎將軍朱宇賦三篇右賦二十一家二百七十四篇孫卿賦十篇秦時雜賦九篇李思孝景皇帝頌十五篇廣川惠王越賦五篇長沙王群臣賦三篇魏內史賦二篇東暆令延年賦七篇衛士令李忠賦二篇張偃賦二篇賈充賦四篇張仁賦六篇秦充賦二篇李步昌賦二篇侍郎謝多賦十篇平陽公主舍人周長孺賦二篇雒陽錡華賦九篇眭弘賦一篇別栩陽賦五篇臣昌市賦六篇臣義賦二篇黃門書者假史王商賦十三篇侍中徐博賦四篇黃門書者王廣呂嘉賦五篇漢中都尉丞華龍賦二篇左馮翊史路恭賦八篇右賦二十五家百三十六篇客主賦十八篇雜行出及頌德賦二十四篇雜四夷及兵賦二十篇雜中賢失意賦十二篇雜思慕悲哀死賦十六篇雜鼓琴劍戲賦十三篇雜山陵水泡雲氣雨旱賦十六篇雜禽獸六畜昆蟲賦十八篇雜器械草木賦三十三篇, krp: 召南按藝}
