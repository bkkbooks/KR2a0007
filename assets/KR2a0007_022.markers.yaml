  - {type: variant, offset: 1931, length: 2, content: 為謁, WYG: 疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧師古曰孫讀曰遜文巧則趍末背本}
  - {type: variant, offset: 1931, length: 2, content: 為謁, krp: 疾之又性不好音及即位下詔曰惟世俗奢泰文巧而鄭衛之聲興夫奢泰則下不孫而國貧師古曰孫讀曰遜文巧則趍末背本}
