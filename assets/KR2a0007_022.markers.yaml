  - {type: variant, offset: 1692, length: 2, content: 三篇, WYG: 餘年宜定制度興禮樂然後諸侯軌道百姓素樸獄訟衰息師古曰軌道言遵道猶車行之依軌轍也廼草具其儀師古曰草謂創立其事也他皆類此天子說焉師古曰說讀曰恱而大臣絳灌之屬害之故其議遂寢師古曰舊說以為絳謂絳侯周勃也灌謂灌嬰也而楚漢春秋髙祖之臣别有絳灌疑昧之文不可明也此既言大臣則當謂周勃灌嬰也至武帝即位進用英雋議立明堂制禮服以興太平師古曰服謂衣服之色也㑹竇太后好黄老言不說儒術師古曰說讀曰恱其事又廢後董仲舒對策言}
