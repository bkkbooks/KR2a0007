  - {type: variant, offset: 444, length: 0, content: '', WYG: 妬忌之别為制婚姻之禮有交接長㓜之序為制鄉飲之禮有哀死思遠之情為制喪祭之禮有尊尊敬上之心為制朝覲之禮哀有哭踊之節樂有歌舞之容師古曰踊跳也哀甚則踊正人足以副其誠邪人足以防其失師古曰副稱也故婚姻之禮廢則夫婦之道苦而淫辟之罪多孟康曰苦音盬夫婦之行盬不固也師古曰苦惡也不當假借辟讀曰僻鄉飲之禮廢則長㓜之序亂而爭鬭之獄蕃師古曰蕃亦多也音扶元反他皆類此喪祭之禮廢則骨肉之恩薄而背死忘先者衆師古曰先者先人謂祖考宋祁曰祖考下添也字朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫譱於禮移風易俗莫譱於樂師古曰此孝經載孔子之言也譱古善字禮節民心樂和民聲政以行之刑以防之禮樂政刑四逹而不誖則王道備矣師古曰誖乖也音布内反樂以治内而為同李竒曰同於和樂也禮以脩外而為異李竒曰尊卑為異也同則和親異則畏敬和親則無怨畏敬則不爭揖讓而天下治者禮樂之謂也二者竝行合為一體畏敬之意難見則著之於享獻辭受登降跪拜師古曰見謂彰顯也和親之說難形則𤼵之於詩歌詠言鐘石筦弦師古曰說讀曰恱形亦見也筦字與管同蓋嘉其敬意而不及其財賄美其歡心而不流其聲音師古曰流移也心不移溢於音聲也故孔子曰禮云禮云玉帛云乎哉樂云樂云鐘鼓云乎哉師古曰論語載孔子之言也謂禮以節人為貴樂以和人為本玉帛鐘鼔乃其末也宋祁曰其末下當添事字此禮樂之本也故曰知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也師古曰作謂有所興造也述謂明辨其義而循行也宋祁曰景徳本循行作脩行王者必因前王之禮順時施宜有所損益即民之心稍稍制作師古曰即就也}
