  - {type: variant, offset: 1876, length: 0, content: '', krp: 自言拓境廣逺安固也師古曰此說非也乆猶長也自言疆易逺大耳非武帝時也不得云拓境慈惠所愛美若休徳師古曰若順也休亦美也杳杳㝠㝠克綽永福師古曰綽緩也亦謂延長也美芳磑磑即即師象山則孟康曰磑磑崇積也即即充實也師衆也則法也積實之盛衆類於山也師古曰磑音五回反劉奉世曰桂華美芳皆二詩章名本側注在前篇之末傳寫之誤遂以冠後後詞無美芳亦當作美若矣嗚呼孝哉案撫戎國蠻夷竭歡象來致福李竒曰象譯也蠻夷遣譯致福貢也兼臨是愛終無兵革師古曰兼臨言在上位者普包容也嘉薦芳矣告靈饗矣告靈既饗徳音孔臧師古曰饗字合韻皆音鄉孔甚也臧善也惟徳之臧建侯之常承保天休令問不忘師古曰建侯封建諸侯也易屯卦曰利建侯休美也令善也問名也皇皇鴻明蕩侯休徳服䖍曰侯維也臣瓚曰天下蕩平惟帝之休徳嘉承天和伊樂厥福師古曰伊是也在樂不荒惟民之則師古曰則法也浚則師徳下民咸殖令問在舊孔容翼翼師古曰浚深也師衆也則法也殖生也舊乆也翼翼敬也言有深法衆徳故能生育羣黎乆有善名其容甚敬也孔容之常承帝之明師古曰帝謂天也下皆類此下民之樂子孫保光師古曰言永保其光寵也承順溫良受帝之光嘉薦令芳夀考不忘師古曰不忘言長乆也承帝明徳師象山則師古曰衆象山而為法言不騫不崩雲施稱民永受厥福師古曰言稱物平施其澤如雲也稱音尺孕反承容之常承帝之明下民安樂受福無疆師古曰疆竟也下皆類此郊祀歌十九章其詩曰練時日侯有望師古曰練選也􅌊膋蕭延四方李竒曰膋腸間脂也蕭香蒿也師古曰以蕭焫脂合馨香也四方四方之神也膋音來彫反焫音人說反九重開靈之斿師古曰天有九重言皆開門而來降厥福垂惠恩鴻祜休師古曰鴻大也祜福也休美也祜音怙靈之車結𤣥雲駕飛龍羽旄紛師古曰紛紛言其多靈之下若風馬師古曰言速疾也左倉龍右白虎師古曰以為衛靈之來神哉沛師古曰沛疾貌音補蓋反先以雨般裔裔師古曰先以雨言神欲行令兩先驅也般讀與班同班布也裔裔飛流之貌靈之至慶隂隂師古曰言垂隂覆徧於下相放􅜜震澹心師古曰放􅜜猶髣髴也澹動也放音昉􅜜音弗澹音大濫反靈已坐五音飭師古曰飭讀與敕字同謂整也虞至旦承靈億師古曰虞樂也億安也牲繭栗粢盛香尊桂酒賓八鄉應劭曰桂酒切桂置酒中也晉灼曰尊大尊也元帝時大宰丞李元記云以水漬桂為大尊酒師古曰繭栗言角之小如繭及栗之形也八鄉八方之神靈安留吟青黄服䖍曰吟音含師古曰服說非也吟謂歌誦也青黄謂四時之樂也徧觀此眺瑶堂應劭曰眺望也瑶石而似玉者也師古曰以瑶飾堂瑶音遥衆嫭竝綽竒麗孟康曰嫭音互嫭好也如淳曰嫭美目貌晉灼曰嫭音坼罅之罅師古曰孟說是也謂供神女樂竝好麗也顔如荼兆逐靡應劭曰荼野菅白華也言此竒麗白如荼也孟康曰兆逐靡者兆民逐觀而猗靡也師古曰菅茅也言美女顔貌如茅荼之柔也荼者今俗所謂蒹錐也荼音塗菅音姦靡合韻音武義反被華文厠霧縠曵阿錫佩珠玉如淳曰阿細繒錫細布也師古曰厠雜也霧縠言其輕細若雲霧也俠嘉夜茝蘭芳如淳曰佳俠皆美人之稱也嘉夜芳草也師古曰俠與挾同言懷挾芳草也茝即今白芷茝音昌改反澹容與獻嘉觴師古曰澹安也容與言閑舒也澹音大濫反練時日一帝臨中壇四方承宇師古曰言天神尊者來降中壇四方之神各承四字也壇字或作䄠讀亦曰壇字加示者神靈之耳下言紫壇嘉壇其義竝同繩繩意變備得其所應劭曰繩繩謹敬更正意也孟康曰衆多也臣瓚曰爾雅繩繩戒也師古曰瓚說是也清和六合制數以五張晏曰此后土之歌也土數五海内安寧興文匽武師古曰匽古偃字后土富媪昭明三光張晏曰媪老母稱也坤為母故稱媪海内安定富媪之功耳穆穆優游嘉服上黄孟康曰土色上黄也劉攽曰予謂此帝指天子耳後之制數以五即謂武帝改服色而尚黄數用五也言后土富媪者由漢以土徳也顔緣中壇故疑是祠祭但以堂壇諭中央耳帝臨二青陽開動根荄以遂臣瓚曰春為青陽師古曰草根曰荄遂者言皆生出也荄音該膏潤并愛跂行畢逮孟康曰跂音岐師古曰并兼也逮及也凡有足而行者稱跂行也霆聲發榮壧處頃聽晉灼曰壧穴也謂蟄蟲驚聽也師古曰壧與巖同言靁霆始𤼵草木舒榮則蟄蟲處巖崖者莫不頃聽而起頃讀曰傾枯槀復産廼成厥命師古曰枯槀謂草木經冬零落者也槀音口老反衆庶熙熙施及夭胎師古曰熙熙和樂貌也施延也少長曰夭在孕曰胎施音弋䜴反夭音烏老反羣生啿啿惟春之祺服䖍曰啿音湛湛露斯如淳曰祺福也師古曰啿啿豐厚之貌也音徒感反祺音其青陽三鄒子樂朱明盛長旉與萬物臣瓚曰夏為朱明師古曰旉古敷字也敷與言開舒也與音弋於反桐生茂豫靡有所詘師古曰桐讀為通茂豫美盛而光悅也言草木皆通逹而生美悅光澤各無所詘皆申遂也詘音丘物反劉攽曰桐幼稚也揚子云師哉師哉桐子之命敷華就實既阜既昌師古曰敷布也就成也阜大也昌盛也登成甫田百鬼廸嘗師古曰甫田大田也百鬼百神也廸進也嘗謂歆饗之也言此廸盛皆因大田而登成進於祀所而為百神所歆饗也廸音大歴反廣大建祀肅雍不忘神若宥之傳世無疆師古曰若善也宥祐也朱明四鄒子樂西顥沆碭秋氣肅殺韋昭曰西方少昊也師古曰沆音胡浪反碭音蕩沆碭白氣之貌也含秀垂穎續舊不廢師古曰五榖百草秀穎成實皆因舊苗無廢絶也不榮而實曰秀葉末曰穎廢合韻音𤼵姦偽不萌祅孽伏息隅辟越逺四貉咸服師古曰四貉猶言四夷辟讀曰僻貉音莫客反既畏兹威惟慕純徳附而不驕正心翊翊師古曰純大也言畏威懷徳者皆來賓附無敢驕怠盡䖍敬宋祁曰䖍敬下當添也字西顥五鄒子樂𤣥㝠陵隂蟄蟲蓋臧師古曰𤣥㝠北方之神也屮木零落抵冬降霜孟康曰抵至也至冬而降霜師古曰屮古草字宋祁曰抵作底易亂除邪革正異俗師古曰易變革改也兆民反本抱素懷樸條理信義望禮五嶽師古曰條分也暢也籍斂之時掩收嘉榖師古曰籍斂謂收籍田也𤣥㝠六鄒子樂惟泰元尊媼神蕃釐李竒曰元尊天也媼神地也祭天燔燎祭地瘞埋也師古曰李說非也泰元天也蕃多也釐福也言天神至尊而地神多福也蕃音扶元反釐讀曰禧經緯天地作成四時精建日月星辰度理隂陽五行周而復始雲風靁電降甘露雨百姓蕃滋咸循厥緒師古曰蕃多也滋益也循順也緒業也繼統共勤順皇之徳師古曰共讀曰恭皇皇天也此言天子繼承祖統恭勤為心而順天也鸞路龍鱗罔不肸飾蘇林曰肸音塈塗之塈塈飾也師古曰罔無也肸振也謂皆振整而飾之也肸音許乙反嘉籩列陳庶幾宴享師古曰嘉籩謂祭祀之籩實也木曰豆竹曰籩享字合韻宜音鄉滅除凶災烈騰八荒師古曰言威烈之盛踰於八荒鐘鼓竽笙雲舞翔翔招揺靈旗九夷賓將師古曰畫招揺於旗以征伐故稱靈旗將猶從也惟泰元七建始元年丞相匡衡奏罷鸞路龍鱗更定詩曰涓選休成臣瓚曰涓除也除惡選取美成者也天地並況惟予有慕師古曰況賜也爰熙紫壇思求厥路師古曰熙興也紫壇壇紫色也思求降神之路也恭承禋祀縕豫為紛孟康曰積聚脩飾為此紛華也師古曰緼音於粉反黼繡周張承神至尊師古曰白與黑畫為斧形謂之黼千童羅舞成八溢師古曰溢與佾同佾列也合好効歡虞泰一師古曰虞與娛同也九歌畢奏斐然殊鳴琴竽瑟會軒朱師古曰軒朱即朱軒也言總合音樂會於軒檻之前璆磬金鼓靈其有喜師古曰璆美玉名以為磬也喜合韻音許吏反百官濟濟各敬厥事宋祁曰邵本厥作其盛牲實爼進聞膏師古曰言以牲實爼以蕭焫脂則其芬馨逹於神所故曰盛牲實爼進聞膏神奄留臨須揺晉灼曰須揺須臾也師古曰奄讀曰淹長麗前掞光耀明孟康曰欲令神宿留言日雖暮長庚星在前扶助常有光明也掞或作扶晉灼曰掞即光炎字也臣瓚曰長麗靈烏也故相如賦曰前長麗而後矞皇舊說云鸞也張衡思𤣥賦亦曰前長麗使拂羽師古曰晉瓚二說是也麗音離掞音艷寒暑不忒況皇章晉灼曰況賜也皇君也章明也言長庚星終始不改其光神永以此賜明君也臣瓚曰忒差也寒暑不差言隂陽和也以此賜君章賢徳也師古曰瓚說是也展詩應律鋗玉鳴晉灼曰鋗鳴玉聲也師古曰鋗音火𤣥反函宫吐角激徵清𤼵梁揚羽申以商晉灼曰下有梁黄鼔員四人似新造音樂者姓名也師古曰晉說非也自函宫吐角以下總言五聲之備耳申重也發梁歌聲繞梁也函與含同造兹新音永欠長宋祁曰欠當作乆聲氣逺條鳳鳥鴹師古曰條達也鴹古翔字神夕奄虞蓋孔享師古曰虞樂也蓋語辭也孔甚也享合韻音鄉天地八丞相匡衡奏罷黼繡周張更定詩曰肅若舊典師古曰肅敬也若順也日出入安窮時世不與人同晉灼曰日月無窮而人命有終世長而夀短故春非我春夏非我夏秋非我秋冬非我冬泊如四海之池徧觀是邪謂何晉灼曰言人夀不能安固如四海徧觀是乃知命甚促謂何當如之何也師古曰泊水貌也音歩各反又音魄吾知所樂獨樂六龍六龍之調使我心若應劭曰易曰時乗六龍以御天武帝願乗六龍仙而升天曰吾所樂獨乗六龍然御六龍得其調使我心若訾黄其何不徠下應劭曰訾黄一名乗黄龍翼而馬身黄帝乘之而仙武帝意欲得之曰何不來邪師古曰訾嗟歎之辭也黄乗黄也歎乗黄不來下也訾音咨日出入九太一況天馬下師古曰言此天馬乃太一所賜故來下也霑赤汗沬流赭應劭曰大宛馬汗血霑濡也流沬如赭也李竒曰沬音靧面之靧晉灼曰沬古靧字也師古曰沬沫兩通沬者言被面如頮也字從水傍午未之未音呼内反沫者言汗流沫出也字從水傍本末之末音亦如之然今書字多作沬面之沫也志俶儻精權竒籋浮雲晻上馳蘇林曰籋音躡言天馬上躡浮雲也師古曰晻音烏感反言晻然而上馳體容與迣萬里孟康曰迣音逝如淳曰迣超踰也晉灼曰古迾字師古曰孟音非也迣讀與厲同言能厲渡萬里也今安匹龍為友師古曰言今更無與匹者唯龍可為之友耳元狩三年馬生渥洼水中作天馬徠從西極渉流沙九夷服師古曰言九夷皆服故此馬逺來也徠古徃來字也天馬徠出泉水虎脊兩化若鬼應劭曰馬毛色如虎脊者有兩也師古曰言其變化若鬼神天馬徠歴無草徑千里循東道張晏曰馬從西而來東也師古曰言馬從西來經行磧鹵之地無草者凡千里而至東道天馬徠執徐時應劭曰太嵗在辰曰執徐言得天馬時歲在辰也孟康曰東方震為龍又青龍宿言以其方來也師古曰應說是也將揺舉誰與期如淳曰遥逺也揺或作遥師古曰如說非也言當奮揺髙舉不可與期也天馬徠開逺門竦予身逝昆侖應劭曰言天馬雖去人逺當豫開門以待之也文穎曰言武帝好仙常庶幾天馬來當乗之徃𤼵昆侖也師古曰文說是也天馬徠龍之媒應劭曰言天馬者乃神龍之類今天馬已來此龍必至之效也游閶闔觀玉臺應劭曰閶闔天門玉臺上帝之所居太初四年誅宛王獲宛馬作天馬十天門開詄蕩蕩如淳曰詄讀如迭詄蕩蕩天體堅清之狀也師古曰詄音大結反穆並騁以臨饗師古曰言衆神穆然方駕馳騁而臨祠祭光夜燭徳信著師古曰神光夜照應誠而來是徳信著明靈􅎊平而鴻長生豫師古曰神靈徳澤所浸溥博無私其福甚大故我得長生之道而安豫也大朱涂廣夷石為堂師古曰涂道路也夷平也言通神之路飾以朱丹又甚廣大平夷宻石累以為堂飾玉梢以舞歌體招揺若永望師古曰梢竿也舞者所持王梢以玉飾之也招揺申動之貌永長也梢音所交反招音韶望合韻音亡星留俞塞隕光師古曰俞荅也言衆星留神荅我饗薦降其光燿四面充塞也俞音踰照紫幄珠熉黄如淳曰熉音殞黄貌也師古曰紫幄饗神之幄也帳上四下而覆曰幄言光照紫幄故其珠色熉然而黄也熉音云幡比翄囬集貳雙飛常羊文穎曰舞者骨騰肉飛如鳥之囘翅而雙集也師古曰常羊猶逍遥也月穆穆以金波日華燿以宣明師古曰言月光穆穆若金之波流也宣徧也假清風軋忽激長至重觴師古曰軋忽長逺之貌也重觴謂累獻也神裴囘若留放殣冀親以肆章孟康曰殣音覲師古曰言神靈裴囘留而不去故我得覲見冀以親附而陳誠意遂章明之函䝉祉福常若期師古曰函包也蒙被也言為神所饗故能包含䝉被祉福應誠而至有常期也寂漻上天知厥時應劭曰言天雖寂漻髙逺而知我饗薦之時也漻音來朝反泛泛滇滇從髙斿應劭曰泛泛上浮之意也滇滇盛貌也晉灼曰滇音振旅闐闐師古曰音徒千反殷勤此路臚所求應劭曰臚陳也言所以殷勤此路乃欲陳所求也師古曰臚音力於反佻正嘉吉𢎞以昌如淳曰佻讀曰肇肇始也休嘉砰隱溢四方師古曰休美也嘉慶也砰普萌反砰隱盛意專精厲意逝九閡如淳曰閡亦陔也淮南子曰若士者謂盧敖曰吾與汗漫期乎九陔之上陔重也謂九天之上也師古曰閡合韻音改又音亥紛云六幕浮大海師古曰紛云興作之貌六幕猶言六合也天門十一景星顯見信星彪列如淳曰景星者徳星也見無常常出有道之國鎮星為信星居國益地師古曰謂彰著而為行列也象載昭庭日親以察師古曰象謂縣象也載事也縣象祕事昭顯於庭日來親近甚明察也劉攽曰象載則瑞應車也參侔開闔爰推本紀應劭曰參三也言景星光明開闔乃三於日月也晉灼曰侔等也開闔猶開闢也言今之鼎瑞參等於上世師古曰晉說是汾脽出鼎皇祐元始師古曰皇大也祜福也脽音誰祜音怙五音六律依韋饗昭師古曰依韋諧和不相乖離也饗讀曰響昭明也言聲響之明也雜變並會雅聲逺姚師古曰姚僄姚言飛揚也空桑琴瑟結信成張晏曰傳曰空桑為瑟一彈三歎祭天質故也師古曰空桑地名也出善木可為琴瑟也四興遞代八風生應劭曰四時遞代成隂陽八風以生也臣瓚曰舞者四縣代奏也左氏傳曰夫舞者所以節八音而行八風也師古曰瓚說是也八方之風謂東北曰條風東方曰明庶風東南曰清明風南方曰景風西南曰凉風西方曰閶闔風西北曰不周風北方曰廣莫風殷殷鐘石羽籥鳴師古曰殷殷聲盛也石謂磬也羽籥韶舞所持者也殷音隠河龍供鯉醇犧牲晉灼曰河龍夏之所賜者也供鯉給厨祭也師古曰醇謂色不雜也犧牲牛羊全體者也百末㫖酒布蘭生張晏曰百末末作之末也晉灼曰百日之末酒也芬香布刻若蘭之生也師古曰百末百草華之末也㫖美也以百草華末雜酒故香且美也事見春秋繁露宋祁曰百末作百米布刻作布列泰尊柘漿析朝酲應劭曰柘漿取甘柘汁以為飲也酲病酒也析觧也言柘漿可以觧朝酲也微感心攸通脩名師古曰言精微所應其心攸逺故得通逹成長乆之名周流常羊思所并師古曰周流猶周行也常羊猶逍遥也思所并思與神道合也下言合所思是也穰穰復正直徃寗師古曰穰穰多也復猶歸也直當也寗願也言獲福既多歸於正道克當徃日所願也復音扶目反寗合韻音寧馮蠵切和疏寫平晉灼曰馮馮夷河伯也蠵觜蠵龜屬也師古曰言馮夷命靈蠵使切厲諧和水神令之疏導川潦寫散平均無災也蠵音弋隨反又音携上天布施后土成穰穰豐年四時榮景星十二元鼎五年得鼎汾隂作齊房産草九莖連葉師古曰齊讀曰齊其下並同宫童効異披圗案諜臣瓚曰宫之童豎致此異瑞也蘇林曰諜譜第之也宋祁曰第之衍之字𤣥氣之精囘復此都師古曰𤣥天也言天氣之精囘旋反復於此雲陽之都謂甘泉也蔓蔓日茂芝成靈華師古曰蔓蔓言其長乆日以茂盛也齊房十三元封二年芝生甘泉齊房作后皇嘉壇立𤣥黄服師古曰壇祭壇也服祭服也物發冀州兆蒙祉福晉灼曰得寳鼎於汾隂也臣瓚曰汾隂屬冀州沇沇四塞徦狄合處孟康曰沇音兖師古曰沇沇流行之貌也徦狄逺夷也合處内附也徦即遐字耳其字從彳彳音丑益反經營萬億咸遂厥宇師古曰宇居也言我經營萬方億兆故得咸遂其居后皇十四華煜煜固靈根神之斿過天門車千乗敦昆侖師古曰敦讀曰屯屯聚也神之出排玉房周流雜拔蘭堂師古曰拔舎止也音歩曷反神之行旌容容騎沓沓般傱傱孟康曰傱音總晉灼曰音人相傱勇作惡師古曰容容飛揚之貌也沓沓疾行也般相連也傱傱衆也容音勇傱音總一曰容讀如本字傱音才公反神之徠泛翊翊甘露降慶雲集如淳曰天文志云若烟非烟若雲非雲郁郁紛紛是謂慶雲師古曰翊音弋入反又音立神之揄臨壇宇師古曰揄引也壇宇謂祭祠壇場及宫室言神引來降臨之也揄音踰九疑賓夔龍舞如淳曰九疑舜所葬言以舜為賓客也夔典樂龍管納言皆隨舜而來舞以樂神神安坐鴹吉時師古曰鴹古翔字也言神安坐囘翔皆趣吉時也共翊翊合所思師古曰共讀曰恭翊翊敬也神嘉虞申貳觴師古曰虞樂也貳觴猶重觴也福滂洋邁延長師古曰滂洋饒廣也滂音普郎反洋音羊又音祥沛施祐汾之阿師古曰沛音普大反沛然泛貌也阿水之曲隅揚金光横泰河師古曰横充滿也泰河大河也莽若雲增陽波師古曰莽雲貌言光明之盛莽莽然如雲也徧臚驩騰天歌師古曰臚陳也騰升也言陳其歡慶令歌上升於天華煜煜十五五神相包四鄰如淳曰五帝為太一相也師古曰包含也四鄰四方也土地廣揚浮雲扢嘉壇椒蘭芳孟康曰扢摩也師古曰音公忽反謂摩拭其壇加以椒蘭之芳璧玉精垂華光師古曰言禮神之璧乃玉之精英故有光華也益億年美始興師古曰言福慶方興起也交於神若有承師古曰言神來降臨故盡其肅恭廣宣延咸畢觴師古曰言徧延諸神咸歆祭祀畢盡觴爵也靈輿位偃蹇驤師古曰神既畢饗則嚴駕靈輿引其侍從之位偃蹇髙驤也蹇音居偃反卉汨臚析奚遺師古曰卉汨疾意也臚陳也析分也奚何也言速自陳列分散而歸無所留也汨音于筆反淫淥澤􅓭然歸師古曰淫久也淥澤澤名言我饗神之後乆在淥澤乃􅓭然而歸也淥音綠􅓭音烏黄反宋祁曰按淫淥澤􅓭然歸師古注似取義未安淥當是福祿之祿淫溢也言神之賜祿􅓭然廣溢然後歸而上天也五神十六朝隴首覽西垠臣瓚曰謂朝於隴首而覽西北也師古曰隴坻之首也垠厓也坻音丁禮反靁電尞獲白麟臣瓚曰尞祭五畤皆有報應聲若靁光若電也師古曰尞古燎字爰五止顯黄徳師古曰爰曰也𤼵語辭也止足也時白麟足有五蹏圖匈虐熏鬻殛應劭曰熏鬻匈奴本號也師古曰殛窮也一曰殛誅也音居力反闢流離抑不詳師古曰流離不得其所者為開道路使之安集違道不詳善者則抑黜之以申懲勸也賓百僚山河饗師古曰百僚百神之官也饗合韻音鄉掩囘轅鬗長馳如淳曰鬗音樠鬗鬗長貌也師古曰音武元反騰雨師洒路陂師古曰洒灑也路陂路傍也言使雨師灑道也洒音灑又音山跂反流星隕感惟風籋歸雲撫懷心師古曰懷心懷柔之心也籋音躡朝隴首十七元狩元年行幸雍獲白麟作象載瑜白集西服䖍曰象載鳥名也師古曰此說非也象載象輿也山出象輿瑞應車也瑜美貌也言此瑞車瑜然色白而出西方也西合韻音先食甘露飲榮泉師古曰駕輿者之所飲食也榮泉言泉有光華劉攽曰此詩四句先叙所見祥瑞之物也象載瑜黑車也白集西雍之麟也甘露榮泉天之所降地之所出也注非赤鴈集六紛員師古曰言六者所獲赤鴈之數也紛員多貌也言西獲象輿東獲赤鴈祥瑞多也員音云殊翁雜五采文孟康曰翁鴈頸也言其文采殊異也神所見施祉福登蓬萊結無極師古曰見顯示也蓬萊神山也在海中結成也象載瑜十八太始三年行幸東海獲赤鴈作赤蛟綏黄華蓋師古曰綏綏赤蛟貌黄華蓋言其上有黄氣狀若蓋也露夜零書晻濭師古曰晻音烏感反濭音靄晻濭雲氣之貌百君禮六龍位師古曰百君亦謂百神也勺椒漿靈已醉師古曰勺讀曰酌靈既享錫吉祥芒芒極降嘉觴師古曰芒芒廣大貌音莫郎反靈殷殷爛揚光師古曰殷殷盛也爛光貌殷音隱延夀命永未央沓㝠㝠塞六合澤汪濊輯萬國師古曰塞滿也輯和也天地四方謂之六合汪濊言饒多也濊音於廢反又音烏外反輯與集同靈禗禗象輿轙孟康曰禗音近枲不安欲去也轙待也如淳曰僕人嚴駕待𤼵之意也師古曰轙音儀禗孟音是也轙如說是也宋祁曰原本儀作蟻票然逝旗逶蛇師古曰票然輕舉意也逶蛇旗貌也票音匹遥反蛇音移禮樂成靈將歸託𤣥徳長無衰師古曰言託恃天徳冀獲長生無衰竭也赤蛟十九其餘廵狩福應之事不序郊廟故弗論是}
