  - {type: variant, offset: 6093, length: 36, content: 十四篇太常蓼侯孔臧賦二十篇陽丘侯劉隁賦十九篇吾丘壽王賦十五篇蔡甲賦一篇上, WYG: 海人如池也日行於天出東入西徧觀居此世者其謂之何作問之辭以起下文欲仙之意也晉灼注未明拔蘭堂注拔舎止也按如顔注則本文拔字應作召伯}
