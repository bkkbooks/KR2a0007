  - {type: 'tls:seg', offset: 1928, content: '', id: KR2a0007_tls_022-69a.37}
  - {type: variant, offset: 1929, length: 0, content: '', WYG: 今曅等守習孤學大指歸於興助教化衰微之學興廢在人宜領屬雅樂以繼絶表微師古曰表顯也孔子曰人能𢎞道非道𢎞人師古曰論語載孔子之言河間區區小國藩臣師古曰區區小貌也以好學修古能有所存師古曰存意於禮樂民到于今稱之況於宋祁曰況於當作況以聖主廣被之資師古曰被猶覆也音皮義反修起舊文放鄭近雅述而不作信而好古於以風示海内揚名後世誠非小功小美也事下公卿以為乆逺難分明當議復寢是時鄭聲尤甚黄門名倡丙彊景武之屬富顯於世貴戚五侯定陵富平外戚之家師古曰五侯王鳳以下也定陵淳于長也富平張放淫侈過度至與人主爭女樂哀}
  - {type: page-break, offset: 1929, content: '', id: KR2a0007_WYG_022-37b, image: WYG0249/WYG0249-0456b.png}
  - {type: page-break, offset: 1929, content: '', id: KR2a0007_WYG_022-38a, image: WYG0249/WYG0249-0456c.png}
  - {type: variant, offset: 1929, length: 0, content: '', krp: 今曅等守習孤學大指歸於興助教化衰微之學興廢在人宜領屬雅樂以繼絶表微師古曰表顯也孔子曰人能𢎞道非道𢎞人師古曰論語載孔子之言河間區區小國藩臣師古曰區區小貌也以好學修古能有所存師古曰存意於禮樂民到于今稱之況於宋祁曰況於當作況以聖主廣被之資師古曰被猶覆也音皮義反修起舊文放鄭近雅述而不作信而好古於以風示海内揚名後世誠非小功小美也事下公卿以為乆逺難分明當議復寢是時鄭聲尤甚黄門名倡丙彊景武之屬富顯於世貴戚五侯定陵富平外戚之家師古曰五侯王鳳以下也定陵淳于長也富平張放淫侈過度至與人主爭女樂哀}
