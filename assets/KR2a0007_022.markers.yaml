  - {type: variant, offset: 1855, length: 1, content: 樂, WYG: 言辭或祕不可宣露故於夜中歌誦也宋祁曰歌誦下當添之字有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十}
  - {type: variant, offset: 1855, length: 1, content: 樂, krp: 言辭或祕不可宣露故於夜中歌誦也宋祁曰歌誦下當添之字有趙代秦楚之謳以李延年為協律都尉多舉司馬相如等數十}
  - {type: variant, offset: 1857, length: 3, content: 竇公獻, WYG: 造為詩賦略論律吕以合八音之調作十九章之歌以正月上辛用事甘泉圜丘師古曰用上辛用周禮郊天日也辛取齊戒自新之義也為圜丘者取象天形也使童男女七十人俱歌昏祠至明夜常有神光如流星止集于祠壇天子自竹宫而望拜韋昭曰以竹為宫天子居中師古曰漢舊儀云竹宫去壇三里百官侍祠者數百人皆肅然動心焉安世房中歌十七章}
