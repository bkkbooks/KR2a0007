  - {type: variant, offset: 1870, length: 1, content: 司, WYG: 孝備矣一章八句七始華始一章十句我定歴數一章八句王侯秉徳一章七句其鄰翼翼鄰謂近臣也海内有姦一章八句大海蕩水所歸髙賢愉民所懷依註當有蕩蕩愉愉字大海蕩蕩一章六句安其所一章六句豐草葽一章八句雷震震一章十句桂華一章十句桂華馮馮翼翼此桂華前章之名也古詩皆有章名今此獨兩章存美芳一章八句磑磑即即一章八句嘉薦芳矣一章八句皇皇鴻明一章六句浚則師徳一章四句孔容之常一章八句承帝明徳一章八句大孝備矣休徳昭清髙張四縣}
  - {type: variant, offset: 1870, length: 1, content: 司, krp: 孝備矣一章八句七始華始一章十句我定歴數一章八句王侯秉徳一章七句其鄰翼翼鄰謂近臣也海内有姦一章八句大海蕩水所歸髙賢愉民所懷依註當有蕩蕩愉愉字大海蕩蕩一章六句安其所一章六句豐草葽一章八句雷震震一章十句桂華一章十句桂華馮馮翼翼此桂華前章之名也古詩皆有章名今此獨兩章存美芳一章八句磑磑即即一章八句嘉薦芳矣一章八句皇皇鴻明一章六句浚則師徳一章四句孔容之常一章八句承帝明徳一章八句大孝備矣休徳昭清髙張四縣}
