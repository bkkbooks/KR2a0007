  - {type: variant, offset: 6080, length: 2, content: 王賦, WYG: 按周詩所謂房中樂者人倫始于夫婦故首以闗睢鵲巢漢安世房中歌直是祀神之樂故曹魏初改名正始之樂後因繆襲言又改名享神歌也注劉敞曰今分别之大孝備矣一章}
