  - {type: variant, offset: 1783, length: 0, content: '', krp: 以下諸官所掌典者自卿大夫師瞽以下皆選有道徳之人師古曰師樂工瞽無目者朝夕習業以教國子國子者卿大夫之子弟也皆學歌九徳師古曰水火金木土榖謂之六府正徳利用厚生謂之三事六府三事謂之九功九功之徳皆可歌也故言九徳也誦六詩應劭曰六詩者詩有六義一曰風}
  - {type: variant, offset: 1784, length: 0, content: '', WYG: 曰賦三曰比四曰興五曰雅六曰頌習六舞五聲八音之和師古曰六舞謂帗舞羽舞䍿舞旄舞干舞人舞也五聲宫商角徵羽也八音金石絲竹匏土革木帗音弗䍿音皇故帝舜命夔曰女典樂教胄子師古曰虞書舜典所載也夔舜臣名胄子即國子也直而溫師古曰正直溫和也寛而栗師古曰寛大而敬栗剛而無虐師古曰剛毅而不害虐也簡而無敖師古曰簡約而無敖慢也敖讀曰傲宋祁曰簡約而無敖慢也無字當作不字詩言志歌咏言師古曰咏古詠字也在心為志𤼵言為詩咏永也永長也歌所以長言之聲依咏律和聲師古曰依助也五聲所以助歌也六律所以和聲也八音克諧師古曰諧亦和也自此以上皆帝舜之言此之謂也又以外賞諸侯徳盛而教尊}
  - {type: page-break, offset: 1784, content: '', id: KR2a0007_WYG_022-12a, image: WYG0249/WYG0249-0442c.png}
  - {type: variant, offset: 1784, length: 0, content: '', krp: 曰賦三曰比四曰興五曰雅六曰頌習六舞五聲八音之和師古曰六舞謂帗舞羽舞䍿舞旄舞干舞人舞也五聲宫商角徵羽也八音金石絲竹匏土革木帗音弗䍿音皇故帝舜命夔曰女典樂教胄子師古曰虞書舜典所載也夔舜臣名胄子即國子也直而溫師古曰正直溫和也寛而栗師古曰寛大而敬栗剛而無虐師古曰剛毅而不害虐也簡而無敖師古曰簡約而無敖慢也敖讀曰傲宋祁曰簡約而無敖慢也無字當作不字詩言志歌咏言師古曰咏古詠字也在心為志𤼵言為詩咏永也永長也歌所以長言之聲依咏律和聲師古曰依助也五聲所以助歌也六律所以和聲也八音克諧師古曰諧亦和也自此以上皆帝舜之言此之謂也又以外賞諸侯徳盛而教尊}
  - {type: variant, offset: 1785, length: 0, content: '', WYG: 其威儀足以充目音聲足以動耳詩語足以感心故聞其音而徳和省其詩而志正師古曰省視也論其數而法立是以薦之郊廟則鬼神饗作之朝廷則羣臣和立之學官則萬民協聽者無不虚已竦神說而承流師古曰竦敬也說讀曰恱是以海内徧知上徳被服其風師古曰被音皮義反言䝉其風化若被而服之光煇日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰師古曰此周頌執競之詩也鍠鍠和也鏘鏘盛也穰穰多也言周王祭祖考之廟奏樂而八音和盛則神降之福至多也鍠音皇穰音人羊反書云擊石拊石百獸率舞師古曰虞書舜典也石謂磬也言樂之和諧也至於擊拊磬石則百獸}
  - {type: page-break, offset: 1785, content: '', id: KR2a0007_WYG_022-12b, image: WYG0249/WYG0249-0442d.png}
  - {type: variant, offset: 1785, length: 0, content: '', krp: 其威儀足以充目音聲足以動耳詩語足以感心故聞其音而徳和省其詩而志正師古曰省視也論其數而法立是以薦之郊廟則鬼神饗作之朝廷則羣臣和立之學官則萬民協聽者無不虚已竦神說而承流師古曰竦敬也說讀曰恱是以海内徧知上徳被服其風師古曰被音皮義反言䝉其風化若被而服之光煇日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰鐘鼓鍠鍠磬管鏘鏘降福穰穰師古曰此周頌執競之詩也鍠鍠和也鏘鏘盛也穰穰多也言周王祭祖考之廟奏樂而八音和盛則神降之福至多也鍠音皇穰音人羊反書云擊石拊石百獸率舞師古曰虞書舜典也石謂磬也言樂之和諧也至於擊拊磬石則百獸}
  - {type: variant, offset: 1786, length: 0, content: '', WYG: 率而舞也宋祁曰和諧也應刪去也字鳥獸且猶感應而况於人乎况於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在師古曰言若周時尚有殷紂之餘聲是謂淫過凶嫚之聲為設禁焉世衰民散小人乗君子師古曰乗陵也心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂廼作淫聲用變亂正聲以說婦人師古曰今文周書泰誓之辭也說讀曰恱樂官師瞽抱其器而犇散或適諸侯或入河海師古曰犇古奔字論語云太師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海此志所云及古今人表所叙皆謂是也云諸侯者追繫其地非為當時已有國名而說論語者乃以為魯哀公時禮壊樂崩樂人皆去斯亦未允也夫六經殘缺學者異師文義競馳各守所見而馬鄭羣儒皆在班揚之後向歆博學又居王杜之前校其是非不可偏據其漢書所引經文}
  - {type: page-break, offset: 1786, content: '', id: KR2a0007_WYG_022-13a, image: WYG0249/WYG0249-0443a.png}
  - {type: variant, offset: 1786, length: 0, content: '', krp: 率而舞也宋祁曰和諧也應刪去也字鳥獸且猶感應而况於人乎况於鬼神乎故樂者聖人之所以感天地通神明安萬民成性類者也然自雅頌之興而所承衰亂之音猶在師古曰言若周時尚有殷紂之餘聲是謂淫過凶嫚之聲為設禁焉世衰民散小人乗君子師古曰乗陵也心耳淺薄則邪勝正故書序殷紂斷棄先祖之樂廼作淫聲用變亂正聲以說婦人師古曰今文周書泰誓之辭也說讀曰恱樂官師瞽抱其器而犇散或適諸侯或入河海師古曰犇古奔字論語云太師摯適齊亞飯干適楚三飯繚適蔡四飯缺適秦鼓方叔入於河播鼗武入於漢少師陽擊磬襄入於海此志所云及古今人表所叙皆謂是也云諸侯者追繫其地非為當時已有國名而說論語者乃以為魯哀公時禮壊樂崩樂人皆去斯亦未允也夫六經殘缺學者異師文義競馳各守所見而馬鄭羣儒皆在班揚之後向歆博學又居王杜之前校其是非不可偏據其漢書所引經文}
  - {type: variant, offset: 1787, length: 1, content: 並, WYG: 近代儒家徃徃乖别既自成義指即就而通之庶免守株以申賢逹之意非茍越異理固然也它皆類此宋祁曰文義競馳姚本作文義舛駮劉攽曰顔云追繫其地是謂周以前未有齊楚秦蔡也不亦謬乎夫樂本情性浹肌膚而臧骨髓雖經乎千載其遺風餘烈尚猶不絶至春秋時陳公子完犇齊師古曰完陳厲公子即敬仲也莊二十二年遇難出奔齊也陳舜之後招樂存焉故孔子適齊聞韶三月不知肉味曰不圗為樂之至於斯美之甚也師古曰事見論語周道始缺怨刺之詩起王澤既竭而詩不能作王官失業雅頌相錯師古曰錯雜也孔子論而定之故曰吾自衛反魯然後樂正雅頌各得其所師古曰事亦見論語是時周室大壞諸侯恣}
