  - {type: variant, offset: 1695, length: 42, content: 禹記二十四篇雅歌詩四篇雅琴趙氏七篇雅琴師氏八篇雅琴龍氏九十九篇凡樂六家百六十五篇易曰, WYG: 者欲有所為宜求其端於天天道大者在於隂陽陽為徳隂為刑天使陽常居大夏而以生育長養為事隂常居大冬而積於空虚不用之處以此見天之任徳不任刑也陽出布施於上而主嵗功隂入伏藏於下而時出佐陽陽不得隂之助亦不能獨成嵗功王者承天意以從事故務徳教而省刑罰刑罰不可任以治世猶隂之不可任以成嵗也今廢}
