  - {type: variant, offset: 2976, length: 2723, content: 宣揚於王者朝廷其用最大也古者八歲入小學故周官保氏掌養國子教之六書謂象形象事象意象聲轉注假借造字之本也漢興蕭何草律亦著其法曰太史試學童能諷書九千字以上乃得為史又以六體試之課最者以為尚書御史史書令史吏民上書字或不正輒舉劾六體者古文奇字篆書隸書繆篆蟲書皆所以通知古今文字摹印章書幡信也古制書必同文不知則闕問諸故老至於衰世是非無正人用其私故孔子曰吾猶及史之闕文也今亡矣夫蓋傷其𥧲不正史籀篇者周時史官教學童書也與孔氏壁中古文異體蒼頡七章者秦丞相李斯所作也爰歷六章者車府令趙高所作也博學七章者太史令胡母敬所作也文字多取史籀篇而篆體復頗異所謂秦篆者也是時始造隸書矣起於官獄多事苟趨省易施之於徒隸也漢書景祐殿本都作興此誤興景祐殿本都作興此誤閭里書師合蒼頡爰歷博學三篇斷六十字以為一章凡五十五章并為蒼頡篇武帝時司馬相如作凡將篇無復字元帝時黃門令史游作急就篇成帝時將作大匠李長作元尚篇皆蒼頡中正字也凡將則頗有出矣至元始中徵天下通小學者以百數各令記字於庭中揚雄取其有用者以作訓纂篇順續蒼頡又易蒼頡中重復之字凡八十九章臣復續揚雄作十二景祐殿本都作三王先謙說作三是三景祐殿本都作三王先謙說作三是章凡一百二章無復字六藝群書所載略備矣蒼頡多古字俗師失其讀宣帝時徵齊人能正讀者張敞從受之傳至外孫之子杜林為作訓故并列焉凡六藝一百三家三千一百二十三篇六藝之文樂以和神仁之表也詩以正言義之用也禮以明體明者著見故無訓也書以廣聽知之術也春秋以斷事信之符也五者蓋五常之道相須而備而易為之原故曰易不可見則乾坤或幾乎息矣言與天地為終始也至於五學世有變改猶五行之更用事焉古之學者耕且養三年而通一藝存其大體玩經文而已是故用日少而畜德多三十而五經立也後世經傳既已乖離博學者又不思多聞闕疑之義而務碎義逃難便辭巧說破壞形體說五字之文至於二三萬言後進彌以馳逐故幼童而守一藝白首而後能言安其所習毀所不見終以自蔽此學者之大患也序六藝為九種晏子八篇子思二十三篇曾子十八篇漆雕子十三篇宓子十六篇景子三篇世子二十一篇魏文侯六篇李克七篇公孫尼子二十八篇孟子十一篇孫卿子三十三篇羋子十八篇內業十五篇周史六弢六篇周政六篇周法九篇河間周制十八篇讕言十一景祐殿本都作十篇篇功議四篇甯越一篇王孫子一篇公孫固一篇李氏春秋二篇羊子四篇董子一篇侯景祐殿本都作俟王先謙說作俟是俟景祐殿本都作俟王先謙說作俟是子一篇徐子四十二篇魯仲連子十四篇平原君七篇虞氏春秋十五篇高祖傳十三篇陸賈二十三篇劉敬三篇孝文傳十一篇賈山八篇太常蓼侯孔臧十篇賈誼五十八篇河間獻王對上下三雍宮三篇董仲舒百二十三篇兒寬九篇公孫弘十篇終軍八篇吾丘壽王六篇虞丘說一篇莊助四篇臣彭四篇鉤盾冗從李步昌八篇儒家言十八篇不知作者桓寬鹽鐵論六十篇劉向所序六十七篇楊雄所序三十八篇右儒五十三家八百三十六篇儒家者流蓋出於司徒之官助人君順陰陽明教化者也游文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高孔子曰如有所譽其有所試唐虞之隆殷周之盛仲尼之業已試之效者也然惑者既失精微而辟者又隨時抑揚違離道本苟以譁眾取寵後進循之是以五經乖析儒學𥧲衰此辟儒之患伊尹五十一篇太公二百三十七篇謀八十一篇言七十一篇兵八十五篇辛甲二十九篇鬻子二十二篇筦子八十六篇老子鄰氏經傳四篇老子傅氏經說三十七篇老子徐氏經說六篇劉向說老子四篇文子九篇蜎子十三篇關尹子九篇莊子五十二篇列子八篇老成子十八篇長盧子九篇楚人二字據景祐殿本補王狄子一篇公子牟四篇田子二十五篇老萊子十六篇黔婁子四篇宮孫子二篇鶡冠子一篇周訓十四篇黃帝四經四篇黃帝銘六篇黃帝君臣十篇雜黃帝五十八篇力牧二十二篇孫子十六篇捷子二篇曹羽二篇郎中嬰齊十二篇臣君子二篇鄭長者一篇楚子三篇道家言二篇右道三十七家九百九十三篇道家者流蓋出於史官歷記成敗存亡禍福古今之道然後知秉要執本清虛以自守卑弱以自持此君人南面之術也合於堯之克攘易之嗛嗛一謙而四益此其所長也及放者為之則欲絕去禮學兼棄仁義曰獨任清虛可以為治宋司星子韋三篇公檮生終始十四篇公孫發二十二篇鄒子四十九篇鄒子終始五十六篇乘丘子五篇杜文公五篇黃帝泰素二十篇南公三十一篇容成子十四篇張蒼十六篇鄒奭子十二篇閭丘子十三篇馮促十三篇將鉅子五篇五曹官制五篇周伯十一篇衛侯官十二篇于長天下忠臣九篇公孫渾邪十五篇雜陰陽三十八篇右陰陽二十一家三百六十九篇陰陽家者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神李子三十二篇商君二十九篇申子六篇處子九篇慎子四十二篇韓子五十五篇游棣子一篇鼂錯三十一篇燕十事十篇法家言二篇右法十家二百一十七篇法家者流蓋出於理官信賞必罰以輔禮制易曰先王以明罰飭法此其所長也及刻者為之則無教化去仁愛專任刑法而欲以致治至於殘害至親傷恩薄厚鄧析二篇尹文子一篇公孫龍子十四篇成公生五篇