  - {type: variant, offset: 1927, length: 1, content: 禹, krp: 世受河間樂能說其義其弟子宋曅等上書言之師古曰曅音于輙反下大夫博士平當等考試當以為漢承秦滅道之後頼先帝聖徳博受兼聽修廢官立太學河間獻王聘求幽隱修興雅樂以助化時大儒公孫𢎞董仲舒等皆以為音中正雅立之大樂春秋鄉射作於學官希闊不講師古曰講謂習也故自公卿大夫觀聽者但聞鏗鎗不䁱其意而欲以風諭衆庶其道無由師古曰風化也是以行之百有餘年徳化至今未}
