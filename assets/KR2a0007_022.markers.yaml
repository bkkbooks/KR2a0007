  - {type: variant, offset: 1781, length: 0, content: '', WYG: 心而不使邪氣得接焉宋祁曰善心而當作善心也是先王立樂之方也王者未作樂之時因先王之樂以教化百姓說樂其俗師古曰說樂其俗使和說而安樂也說讀曰恱樂音來各反然後改作以章功徳易曰先王以作樂崇徳殷薦之上帝以配祖考師古曰此豫卦象辭也殷盛大也上帝天也言王者作樂崇表其徳大薦}
