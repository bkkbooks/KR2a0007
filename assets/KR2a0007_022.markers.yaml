  - {type: variant, offset: 1775, length: 0, content: '', WYG: 非空言也願與大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域師古曰言以仁道治之皆得其性則夀考也域界也則俗何以不若成康夀何以不若髙宗師古曰成康周之二王太平之時也髙宗殷王武丁也有徳可尊故曰髙宗享國五十九年故云夀上不納其言吉以病去至成帝時犍為郡於水濱得古磬十六枚師古曰濱水涯也音賓議者以為譱祥劉向因是說上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖攘之容師古曰攘古讓字以風化天下如此而不治者未之有也或曰不能具禮師古曰或曰者劉向設為難者之言而後荅釋也禮以養人為本如有過差是過而養人也師古曰過差猶失錯也刑罰之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆服虔曰言隨君意也師古曰削者謂有所刪去以刀削簡牘也筆者謂有所增益以筆就而書也救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆筦弦之間小不備因是絶而不為是去小不備而就大不備大不備或莫甚焉師古曰大不備者事之虧失莫甚於此夫教化之比於刑法刑法輕是舎所重而急所輕也師古曰舎廢也且教化所恃以為治也刑法所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫師古曰誖乖也音布内反至於䧟大辟受刑戮者不絶繇不習五常之道也師古曰繇與由同五常仁義禮智信人性所常行之也宋祁曰宋本無之字邵本有之夫承千歲之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理師古曰貪甚曰饕言行險曰詖饕音吐髙反詖音彼義反不示以大化而獨歐以刑罰終已不改師古曰􅀈與驅同故曰導之以禮樂而民和睦師古曰孝經載孔子之言也初叔孫通將制定禮儀見非於齊魯之士然卒為漢儒宗業垂後嗣斯成法也成帝以向言下公卿議㑹向病卒丞相大司空奏請立辟廱案行長安城南師古曰行音下更反營表未作遭成帝崩羣臣引以定謚孟康曰謚法曰安民立政曰成帝欲立辟廱未就而崩羣臣議諡引為美謂之成及王莽為宰衡欲燿衆庶遂興辟廱因以簒位海内畔之世祖受命中興撥亂反正師古曰謂後漢光武帝也改定京師于土中師古曰謂都洛陽即位三十年四夷賓服百姓家給政教清明師古曰給足也言家家皆足廼營立明堂辟廱顯宗即位李竒曰明帝曰顯宗躬行其禮宗祀光武皇帝于明堂養三老五更於辟廱李竒曰王者父事三老兄事五更詩云三夀作朋鄧展曰漢直以一公為三老用大夫為五更毋常人行禮乃置師古曰鄭𤣥說云三老五更謂老人更知三徳五事者也更音工衡反蔡邕以為更當為叟叟老人之稱也威儀既盛美矣然徳化未流洽者禮樂未具羣下無所誦說而庠序尚未設之故也孔子曰辟如為山未成一匱止吾止也師古曰論語載孔子之言匱者織草為器所以盛土也言為山欲成尚少一匱之土止而不為則其功終已不就如斯之人吾所不能教喻也辟讀曰譬今叔孫通所撰禮儀與律令同錄臧於理官師古曰古書懐藏之字本皆作臧漢書例為臧耳理官即法官也法家又復不𫝊劉攽曰法家當屬上句漢典寢而不著民臣莫有言者師古曰寢息也又通沒之後河間獻王采禮樂古事稍稍增輯至五百餘篇師古曰輯與集同今學者不能昭見但推士禮以及天子說義又頗謬異故君臣長㓜交接之道寖以不章師古曰寖漸也樂者聖人之所樂也而可以善民心其感人深其}
