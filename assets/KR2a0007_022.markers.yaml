  - {type: variant, offset: 6699, length: 718, content: 興以來兵所誅滅歌詩十四篇出行巡狩及游歌詩十篇臨江王及愁思節士歌詩四篇李夫人及幸貴人歌詩三篇詔賜中山靖王子噲及孺子妾冰未央材人歌詩四篇吳楚汝南歌詩十五篇燕代謳雁門雲中隴西歌詩九篇邯鄲河間歌詩四篇齊鄭歌詩四篇淮南歌詩四篇左馮翊秦歌詩三篇京兆尹秦歌詩五篇河東蒲反歌詩一篇黃門倡車忠等歌詩十五篇雜各有主名歌詩十篇雜歌詩九篇雒陽歌詩四篇河南周歌詩七篇河南周歌聲曲折七篇周謠歌詩七十五篇周謠歌詩聲曲折七十五篇諸神歌詩三篇送迎靈頌歌詩三篇周歌詩二篇南郡歌詩五篇右歌詩二十八家三百一十四篇凡詩賦百六家千三百一十八篇傳曰不歌而誦謂之賦登高能賦可以為大夫言感物造耑材知深美可與圖事故可以為列大夫也古者諸侯卿大夫交接鄰國以微言相感當揖讓之時必稱詩以諭其志蓋以別賢不肖而觀盛衰焉故孔子曰不學詩無以言也春秋之後周道𥧲壞聘問歌詠不行於列國學詩之士逸在布衣而賢人失志之賦作矣大儒孫卿及楚臣屈原離讒憂國皆作賦以風咸有惻隱古詩之義其後宋玉唐勒漢興枚乘司馬相如下及揚子雲競為侈麗閎衍之詞沒其風諭之義是以揚子悔之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門人用賦也則賈誼登堂相如入室矣如其不用何自孝武立樂府而采歌謠於是有代趙之謳秦楚之風皆感於哀樂緣事而發亦可以觀風俗知薄厚云序景祐殿本都有序字詩賦為五種吳孫子兵法八十二篇齊孫子八十九篇公孫鞅二十七篇吳起四十八篇范蠡二篇大夫種二篇季景祐殿本都作李李景祐殿本都作李子十篇娷一篇兵春秋一篇龐煖三篇兒良一篇廣武君一篇韓信三篇右兵權謀十三家二百五十九篇權謀者以正守國以奇用兵先計而後戰兼形勢包陰陽用技巧者也楚兵法七篇蚩尤二篇孫軫五篇繇敘二篇王孫十六篇尉繚三十一篇魏公子二十一篇景子十三篇李良三篇丁子一篇項王一篇右兵形勢十一家九十二篇圖十八, WYG: 書}
