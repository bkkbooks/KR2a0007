  - {type: variant, offset: 1811, length: 1, content: 法, WYG: 戎而由余去應劭曰戎西戎也由余其賢臣也秦欲兼之遺以女樂由余諫而不聽遂去入秦齊人餽魯而孔子行師古曰餽亦饋字論語云齊人餽女樂季桓子受之三日不朝孔子行也至於六國魏文侯最為好古師古曰魏文侯本晉大夫畢萬之後僭諸侯者而謂子夏曰寡人聽古樂則欲寐及聞鄭衛余不知倦焉子夏辭而辨之終不見納師古曰事見禮之樂記自此禮樂喪矣}
