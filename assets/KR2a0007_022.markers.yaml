  - {type: variant, offset: 1748, length: 10, content: 以享祖考故自黃帝下至, WYG: 時琅邪王吉為諫大夫又上疏言欲治之主不世出師古曰言時時而一出難常遇也公卿幸得遭遇其時未有建萬世之長策舉明主於}
