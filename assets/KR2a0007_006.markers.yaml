  - {type: variant, offset: 4357, length: 0, content: '', WYG: 張晏曰嚴故越人降為歸義侯越人於水中負人船又有蛟龍之害故置戈於船下因以為名也臣瓉曰伍子胥書有戈船以載干戈因謂之戈船也離水出零陵師古曰以樓船之例言之則非為載干戈也此蓋船下安戈㦸以御蛟鼉水蟲之害張說近之劉攽曰船下安戈既難措置又不可以行且今造舟船甚多未嘗有置戈者顔北人不知行船故信張說予謂瓉說是宋祁曰戈船將軍當時所建之官如驃騎虎牙之類是也戈船今有之設干戈於船上以禦敵也}
