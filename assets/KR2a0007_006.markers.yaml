  - {type: variant, offset: 4045, length: 0, content: '', WYG: 臣瓉曰汲冡古文謂衞將軍文子為子南彌牟其後有子南國子南勁紀年勁朝于魏後惠成王如衞命子南為侯秦并六國衞最後亡疑嘉是衞後故氏子南而稱君也初元五年為周承休侯元始四年為鄭公建武十三年封於觀為衞公師古曰子南其封邑之號以為周後故總言周子南君瓉説非也例不先言姓而後稱君且自嘉已下皆姓姫氏著在史傳宋祁曰注本舊文作元始三年建武三年此本乃刋誤據平紀改正}
