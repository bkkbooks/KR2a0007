  - {type: variant, offset: 7766, length: 0, content: '', WYG: 師古曰美其雄材大畧而非其不恭儉也前漢書卷六前漢書卷六考證武帝紀建元元年劉攽云云臣照按攽論當矣然謂元鼎以前之元皆有司所追命則恐無臣子妄造元號之理蓋必有詔命追稱而今不可考耳或治申商注李奇曰申不害書執術監本訛執衞宋本無術字中尉程不識為車騎將軍臣召南按公卿表中尉無程不識是時中尉為張􅇌又按李廣傳廣為未央衞尉不識為長樂衞尉即灌夫傳田蚡所云程李俱為東西宫衞尉者也此文當云長樂衞尉訛作中尉起龍淵宫注漢章帝賜尚書韓稜龍淵劒章訛帝今改正置五屬國以處之臣召南按杜佑通典曰安定上郡天水張掖五原為五屬國以地理志核之安定屬國都尉治三水上郡屬國都尉治龜兹天水屬國都尉治勇士滿福五原屬國都尉治蒲澤而張掖屬國都尉後書郡國志云武帝置知通典之説甚確但安定天水至元鼎三年始置張掖至元鼎六年始分則此時豈容先置都尉乎胡三省注通鑑云五郡故塞外以隴西北地上郡朔方雲中當之蓋有由也攻故安圍枹䍐胡三省曰故安縣屬􅃰郡西羗之兵安能至此當作安故地理志安故枹䍐二縣皆屬隴西郡初置刺史部十三州監本訛十二州今改正臣召南按晉志冀幽并兖徐青揚荆豫益凉及朔方交阯所謂十三州也至征和四年又置司𨽻校尉督察三輔三河𢎞農秋閉城門大捜注捜索踰侈者也顧炎武曰此與二年及征和元年之大捜同皆捜索奸人非踰侈者也出酒泉與右賢王戰于天山注師古曰即祁連山也臣召南按晉灼說是師古說非也此天山即白山括地志云今云折羅漫山在伊州伊吾縣者師古以甘州張掖縣之祁連當之則戰于内地上文不應云出酒泉矣祁連固即天字但此天山遠在西北非前此霍去病所奪之祁連近在内地者也還幸北地祠常山臣召南按此北地非郡名猶言北邊耳常山即北岳恒山在常山郡上曲陽西北秋九月令死罪入贖錢五十萬減死一等臣浩按此文天漢四年也至太始二年九月又云募死罪人贖錢五十萬减死一等二文相類一作令一作募一作入一作人必有一訛顧炎武曰此一事而重見又同是九月疑衍文也後元元年王禕曰武帝沿文景故事復為後元然始以後元二字加于年上此為異也非史官追書之前漢書卷六考證}
