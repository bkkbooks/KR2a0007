  - {type: variant, offset: 1150, length: 0, content: '', WYG: 服䖍曰宮在長安西作銅飛龍故以冠名也如淳曰三輔黄圖云有龍淵宮今長安城西有其處溝洫志救河決亦起龍淵宫于其傍孟康曰在西平界其水可用淬刀劎特堅利古龍淵之劎取於此水師古曰黄圖云龍淵廟在茂陵東不言宫也此言救決河起龍淵宫則宫不在長安之西矣又漢章帝賜尚書韓稜龍淵劎孟説是也淬音千内反劉攽曰予謂救決河起龍淵宫各自一事非因救河且起宫也顔疑當云龍淵廟按景帝紀起德陽廟亦云德陽宫寧可復謂非德陽廟乎此龍淵宫應如黄圖所說是}
