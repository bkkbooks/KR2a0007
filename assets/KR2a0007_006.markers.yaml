  - {type: variant, offset: 4976, length: 0, content: '', WYG: 孟康曰王者功成治定告成功於天封崇也助天之高也刻石紀號有金䇿石函金泥玉檢之封焉應劭曰封者壇廣十二丈高二丈階三等封於其上示增高也刻石紀績也立石三丈一尺其辭曰事天以禮立身以義事親以孝育民以仁四守之内莫不為郡縣四夷八蠻咸來貢職與天無極人民蕃息天祿永得尚𤣥酒而爼生魚下禪梁父祀地主示増廣此古制也武帝封廣丈二尺高九尺其下則有縢書秘語在郊祀志}
