  - {type: 'tls:seg', offset: 22, content: '', id: KR2a0007_tls_080-1a.4}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 而有斯疾也師古曰夫子孔子也論語云伯牛有疾子問之自牖執其手曰蔑之命矣夫斯人也而有斯疾也蔑無也言命之所遭無有善惡如斯善人而有如斯惡疾深痛之也朕甚閔焉夫行純茂而不顯異則有國者將何朂哉師古曰純大也一曰善也茂美也朂勉厲也書不云乎用徳章厥善師古曰尚書盤庚之辭也言襃賞有徳以明其善行今王朝正月詔與子男一人俱師古曰從王入朝也其以廣戚縣戸四千三百封其子勲為廣戚侯眀年嚻薨子懐王文嗣一年薨無子絶明年成帝復立文弟平陸侯衍宋祁曰陸一本作陵是為思王二十一年薨子紆嗣王莽時絶初成帝時又立紆弟景為定陶王廣戚侯勲薨諡曰煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝後莽簒位以嬰為定安公漢既誅莽更始時嬰在長安平陵方望等頗知天文以為更始必敗嬰本統當立者也師古曰言其舊已繼平帝後當正統共起兵將嬰至臨涇立為天子更始遣丞相李松擊破殺嬰云東平思王宇甘露二年立元帝即位就國壯大通姦犯法師古曰與姦猾交通好犯法也上以至親貰弗罪傅相連坐師古曰頻坐王獲罪久之事太后内不相得太后上書言之求守杜陵園張晏曰}
