  - {type: variant, offset: 11, length: 9, content: 何武字君公蜀郡郫縣, WYG: 爻辭也茅者絜白之物取其自然故用藉致享於神慎之至也宋祁曰注文故用藉當作故用為藉言臣子之道改過自新絜已以承上然後免於咎也王其留意慎戒惟思所以悔過易行塞重責稱厚恩者師古曰塞猶補也稱副也如此則長有富貴社稷安矣於是淮陽王欽免冠稽首謝曰奉藩無狀師古曰無善狀過惡暴列師古曰暴謂章顯也陛下不忍致法加大恩遣使者申諭道術守藩之義伏念博罪惡尤深當伏重誅臣欽願悉心自新奉承詔䇿師古曰悉盡也頓首死罪京房及博兄弟三人皆棄市妻子徙邉至成帝即位以淮陽王屬為叔父敬寵之異於它國王上書自陳舅張博時事頗為石顯等所侵因為博家屬徙者求還丞相御史復劾欽前與博相遺私書指意非諸侯王所宜䝉恩勿治事在赦前不悔過而復稱引自以為直失藩臣體不敬上加恩許王還徙者三十六年薨子文王𤣥嗣二十六年薨子縯嗣孟康曰縯音引師古曰音弋善反王莽時絶楚孝王嚻甘露二年立為定陶王三年徙楚成帝河平中入朝時被疾天子閔之下詔曰盖聞天地之性人為貴人之行莫大於孝師古曰孝絰載孔子之言楚王嚻素行孝順仁慈之國以来二十餘年孅介之過未嘗聞朕甚嘉之今廼遭命離于惡疾師古曰離亦遭也夫子所痛曰蔑之命矣夫斯}
