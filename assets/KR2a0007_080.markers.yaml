  - {type: variant, offset: 10, length: 0, content: '', krp: 孝宣皇帝五男許皇后生孝元帝張倢伃生淮陽憲王欽衛倢伃生楚孝王嚻師古曰嚻音敖公孫倢伃生東平思王宇戎倢伃生中山哀王竟淮陽憲王欽元康三年立母張倢伃有寵於宣帝霍皇后廢後上欲立張倢伃為后久之懲艾霍氏欲害皇太子師古曰艾讀曰乂乂創也廼更選後宫無子而謹慎者廼立長陵王倢伃為后令母養太子后無寵希御見唯張倢伃最幸而憲王壯大好經書法律聰逹有材帝甚愛之太子寛仁喜儒術師古曰喜好也音許吏反上數嗟歎憲王曰真我子也常有意欲立張倢伃與憲王然用太子起於微細上少依倚許氏師古曰倚音於起反及即位而許后以殺死太子蚤失母故弗忍也師古曰蚤古早字也宋祁曰也字疑可刪久之上以故丞相韋賢子元成陽狂讓侯兄宋祁曰兄字上疑有於字經明行髙稱於朝廷乃召拜元成為淮陽中尉欲感諭憲王輔以推讓之臣宋祁曰推字疑作禮字由是太子遂安宣帝崩元帝即位乃遣憲王之國時張倢伃已卒憲王有外祖母舅張博兄弟三人歲至淮陽見親師古曰憲王外祖母隨王在淮陽博等每来謁見其母輙受王賜後王上書請徙外家張氏於國博上書願留守墳墓獨不徙王恨之後博至淮陽王賜之少博言負責數百萬師古曰責謂假貸人財物未償者也責音側懈反願王為償王不許博辭去令弟光恐云王遇大人益解師古曰恐謂怖動也大人博自稱其母也解讀曰懈宋祁曰恐字下疑有王字注文怖字下疑有之字博欲上書為大人乞骸骨去王乃遣人持黄金五十斤送博博喜還書謝師古曰還書報書宋祁曰注末當有也字為諂語盛稱譽王因言當今朝廷無賢臣灾變數見足為寒心萬姓咸歸望於大王大王奈何恬然師古曰恬然安靜貌也恬音大兼反不求入朝見輔助主上乎使弟光數説王宜聽博計令於京師說用事貴人為王求朝王不納其言後光欲至長安辭王復言願盡力與博共為王求朝王即日至長安可因平陽侯宋祁曰陽字疑作陵字光得王欲求朝語馳使人語博博知王意動復遺王書曰博幸得肺腑師古曰自云於王有親也數進愚䇿未見省察北游燕趙欲循行郡國求幽隱之士聞齊有駟先生者善為司馬兵法大將之材也博得謁見承閒進問五帝三王究竟要道卓爾非世俗之所知師古曰卓爾髙逺貌也自言見駟先生問以要道知其髙逺也今邉境不安天下騷動微此人其莫能安也師古曰微無也宋祁曰浙本無人其字又一本無此人字又聞北海之瀕有賢人焉師古曰瀕涯也音頻又音賔累世不可逮然難致也師古曰逮及也言其材智不可及也致至也難得召而至也得此二人而薦之功亦不細矣博願馳西以此赴助漢急無財幣以通顯之趙王使謁者持牛酒黄金三十斤勞博師古曰勞謂問遺之音来到反博不受復使人願尚女師古曰尚女者王欲取博女以自配也聘金二百斤博未許㑹得光書云大王巳遣光西與博并力求朝博自以棄捐不意大王還意反義結以朱顔師古曰還猶回也願殺身報徳朝事何足言大王誠賜咳唾使得盡死湯禹所以成大功也駟先生蓄積道術書無不有師古曰言凡是書籍皆有之願知大王所好請得輒上宋祁曰此下當添八字云師古曰上上與王也王得書喜說如淳曰上與王也宋祁曰此注當改作師古曰説讀曰悦報博書曰子髙廼幸左顧存恤發心惻隱師古曰左顧猶言枉顧也顯至誠宋祁曰顯字下疑有以字納以嘉謀語以至事師古曰以至極之事告語我宋祁曰注末疑有也字雖亦不敏敢不諭意師古曰諭曉也今遣有司為子髙償責二百萬是時博女壻京房以明易隂陽得幸於上數召見言事自謂爲石顯五鹿充宗所排謀不得用數為博道之博常欲誑燿淮陽王即具記房諸所説灾異及召見宻語持予淮陽王以為信驗詐言已見中書令石君求朝許以金五百斤賢聖制事盖慮功而不計費師古曰志在成功不惜財費也宋祁曰詐言别本無詐字昔禹治鴻水百姓罷勞師古曰罷讀曰疲成功既立萬世頼之今聞陛下春秋未滿四十髮齒墮落太子幼弱佞人用事隂陽不調百姓疾疫飢饉死者且半鴻水之害殆不過此師古曰謂堯時水災不火於今大王緖欲救世師古曰緒業也一曰始為端緒將比功徳何可以忽師古曰言比功徳於古帝王也忽怠忘也博己與大儒知道者為大王為便宜奏師古曰大儒知道謂京房也道道術也陳安危指灾異大王朝見先口陳其意而後奏之上必大説師古曰說讀曰悦事成功立大王即有周邵之名邪臣散亡公卿變節功徳亡比而梁趙之寵必歸大王如淳曰梁王景帝弟欲為嗣趙王如意幾代惠帝也外家亦将富貴何復望大王之金錢王喜説師古曰説讀曰悦報博書曰廼者詔下止諸侯朝者寡人憯然不知所出師古曰憯痛也不知計䇿何所出也憯音才感反子髙素有顔冉之資臧武之智師古曰顔顔回也冉冉耕也字伯牛皆孔子弟子論語稱孔子曰徳行顔淵閔子騫冉伯牛仲弓臧武者魯大夫臧武仲也名紇論語稱子曰若臧武仲之智故王引之為言子貢之辯師古曰論語稱孔子云言語宰我子貢卞莊子之勇師古曰卞莊子古之勇士兼此四者世之所鮮師古曰鮮少也音先踐反既開端緒願卒成之師古曰卒終也求朝義事也奈何行金錢乎博報曰已許石君須以成事師古曰須待也王以金五百斤予博會房出為郡守離左右顯具得此事告之宋祁曰顯字上疑有石字告之之字當刪房漏泄省中語博兄弟詿誤諸侯王誹謗政治狡猾不道皆下獄有司奏請逮捕欽上不忍致法遣諫大夫王駿賜欽璽書曰皇帝問淮陽王有司奏王王舅張博數遺王書非毁政治謗訕天子襃舉諸侯稱引周湯以讇惑王師古曰讇古諂字宋祁曰周當作禹所言尤惡悖逆無道王不舉奏而多與金錢報以好言辜至不赦朕惻焉不忍聞師古曰惻痛也宋祁曰朕惻焉當云朕甚惻焉為王傷之推原厥本不祥自博師古曰祥善也自從也不善之事從博起也惟王之心匪同于凶已詔有司勿治王事遣諫大夫駿申諭朕意師古曰申謂約束之宋祁曰注文申字下當有諭字詩不云乎靖恭爾位正直是與師古曰大雅小眀之詩也與偕也言人能安靜而恭以守其位偕於正直則眀神聽之用錫福善王其勉之駿諭指曰師古曰璽書之外天子又有指意并今駿曉告於王也禮為諸侯制相朝聘之義盖以考禮壹徳尊事天子也師古曰考成也壹徳謂不二其心也且王不學詩乎詩云俾侯於魯為周室輔師古曰魯頌閟宫之詩也言立周公子伯禽使為諸侯于魯國而作周家之藩輔今王舅博數遺王書所言悖逆王幸受詔䇿通經術如淳曰詔策若廣陵王策曰無邇宵人毋作匪徳也經術之義不得内交知諸侯名譽不當出竟師古曰竟讀曰境天子普覆徳布於朝而恬有博言師古曰恬安也聞博邪言安而受之多予金錢與相報應不忠莫大焉故事諸侯王獲罪京師罪惡輕重縱不伏誅必蒙遷削貶黜之罪師古曰故事者言舊制如此也未有但已者也師古曰但徒也空也已止也未有空然而止者也今聖主赦王之罪又憐王失計忘本為博所惑加賜璽書使諫大夫申諭至意殷勤之恩豈有量哉博等所犯惡大宋祁曰犯字下當有罪字羣下之所共攻王法之所不赦也自今以来王毋復以博等累心師古曰累音力瑞反務與衆棄之春秋之義大能變改師古曰以有過而能變改者為大易曰藉用白茅旡咎師古曰此大過初}
