  - {type: punctuation, offset: 7471, content: 「, id: KR2a0007_tls_080-bkkpn1423}
  - {type: variant, offset: 7472, length: 355, content: 高昌侯宏首建尊號之議而為丹所劾奏免為庶人時天下衰麤委政於丹丹不深惟襃廣尊親之義而妄稱說抑貶尊號虧損孝道不忠莫大焉陛下聖仁昭然定尊號宏以忠孝復封高昌侯丹惡逆暴著雖蒙赦令不宜有爵邑請免為庶人奏可丹於是廢歸鄉里者數年平帝即位新都侯王莽白太皇太后發掘傅太后丁太后冢奪其璽綬更以民葬之定陶隳廢共皇廟諸造議泠襃段猶等皆徙合浦復免高昌侯宏為庶人徵丹詣公車賜爵關內侯食故邑數月太皇太后詔大司徒大司空曰夫襃有德賞元功先聖之制百王不易之道也故定陶太后造稱僭號甚悖義理關內侯師丹端誠於國不顧患難執忠節據聖法分明尊卑之制確然有枉石之固臨大節而不可奪可謂社稷之臣矣有司條奏邪臣建定稱號者已放退而丹功賞未加殆繆乎先賞後罰之義非所以章有德報厥功也其以厚丘之中鄉戶二千一百封丹為義陽侯月餘薨諡曰節侯子業嗣王莽敗乃絕贊曰何武之舉王嘉之爭師丹之議, WYG: 漢書卷八十}
