  - {type: 'tls:seg', offset: 25, content: '', id: KR2a0007_tls_080-1a.5}
  - {type: variant, offset: 27, length: 1, content: 和, WYG: 以為我知文法建欲使我輔佐天子師古曰建謂立其議我見尚書晨夜極苦使我為之不能也今暑熱縣官年少張晏曰不敢指斥成帝謂之縣官也持服恐無處所如淳曰言不從道冀如昌邑王也我危得之孟康曰危殆也我殆得為天子也師古曰危者猶今之言險不得之矣比至下宇凡三哭張晏曰下下棺也師古曰比音必寐反下音胡稼反飲酒食肉妻妾不離側又姬朐臑故親幸後疏逺服䖍曰胊音劬臑音奴溝反又音奴臯反數歎息呼天宇聞斥朐臑為家人子師古曰黜其秩位掃除永巷數笞擊之朐臑私疏宇過失數令家告之宇覺知絞殺朐臑有司奏請逮捕有詔削樊亢父二縣師古曰音抗甫後三歳天子詔有司曰盖聞仁以親親古之道也前東}
  - {type: page-break, offset: 27, content: '', id: KR2a0007_WYG_080-12b, image: WYG0250/WYG0250-0634b.png}
