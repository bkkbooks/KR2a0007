  - {type: variant, offset: 280, length: 430, content: 千石長吏必先露章服罪者為虧除免之而已不服極法奏之抵罪或至死九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部錄囚徙有所舉以屬郡聖曰後進生何知乃欲亂人治皆無所決武使從事廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡而聖子賓客為群盜得繫廬江聖自以子必死武平心決之卒得不死自是後聖慚服武每奏事至京師聖未嘗不造門謝恩武為刺史二千石有罪應時舉奏其餘賢與不肖敬之如一是以郡國各重其守相州中清平行部必先即學官見諸生試其誦論問以得失然後入傳舍出記問墾田頃畝五穀美惡已乃見二千石以為常初武為郡吏時事太守何壽壽知武有宰相器以其同姓故厚之後壽為大司農其兄子為廬江長史時武奏事在邸壽兄子適在長安壽為具召武弟顯及故人楊覆眾等酒酣見其兄子曰此子楊州長史材能駑下未嘗省見顯等甚慚退以謂武武曰刺史古之方伯上所委任一州表率也職在進善退惡吏治行有茂異民有隱逸乃當召見不可有所私問顯覆眾強之不得已召見賜卮酒歲中廬江太守舉之其守法見憚如此為刺史五歲入為丞相司直丞相薛宣敬重之出, WYG: 年立}
