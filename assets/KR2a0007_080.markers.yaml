  - {type: variant, offset: 7467, length: 4, content: 趙玄奏言, krp: 張子蟜注師古曰蟜字或作僑臣召南按藝文志及劉向王褒傳並作僑則僑字是也毋念爾祖述修厥德今詩作聿修即漢書他傳亦作聿修惟此文作述或齊魯韓三家所傳不同耳無鹽危山土自起覆草如馳道狀息夫躬傳作無鹽危山有石自立開道與此稍異贊詩云貪人敗類注師古曰大雅蕩之詩也顧炎武曰大雅桑柔之詩師古誤以爲蕩}
  - {type: punctuation, offset: 7471, content: ：, id: KR2a0007_tls_080-bkkpn1422}
