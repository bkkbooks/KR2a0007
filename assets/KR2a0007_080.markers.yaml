  - {type: variant, offset: 4433, length: 1812, content: 之長安更下公卿覆治尚書令鞫譚僕射宗伯鳳以為可許天子以相等皆見上體不平外內顧望操持兩心幸雲踰冬無討賊疾惡主讎之意制詔免相皆為庶人後數月大赦嘉奏封事薦相等明習治獄相計謀深沈譚頗知雅文鳳經明行修聖王有討功除過臣竊為朝廷惜此三人書奏上不能平後二十餘日嘉封還益董賢戶事上乃發怒召嘉詣尚書責問以相等前坐位不盡忠誠外附諸侯操持兩心背人臣之義今所稱相等材美足以相計除罪君以道德位在三公以總方略一統萬類分明善惡為職知相等罪惡陳列著聞天下時輒以自劾今又稱譽相等云為朝廷惜之大臣舉錯恣心自在迷國罔上近由君始將謂遠者何對狀嘉免冠謝罪事下將軍中朝者光祿大夫孔光左將軍公孫祿右將軍王安光祿勳馬宮光祿大夫龔勝劾嘉迷國罔上不道請與廷尉雜治勝獨以為嘉備宰相諸事並廢咎由嘉生嘉坐薦相等微薄以應迷國罔上不道恐不可以示天下遂可光等奏光等請謁者召嘉詣尉詔獄制曰票騎將軍御史大夫中二千石二千石諸大夫博士議郎議衛尉雲等五十人以為如光等言可許議郎龔以為嘉言事前後相違無所執守不任宰相之職宜奪爵土免為庶人永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖德重大臣刑辟廣延有司議欲使海內咸服嘉罪名雖應法聖王之於大臣在輿為下御坐則起疾病視之無數死則臨弔之廢宗廟之祭進之以禮退之以義誄之以行案嘉本以相等為罪罪惡雖著大臣括髮關械裸躬就笞非所以重國襃宗廟也今春月寒氣錯繆霜露數降宜示天下以寬和臣等不知大義唯陛下察焉有詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳冤相踵以為故事君侯宜引決使者危坐府門上主簿復前進藥嘉引藥杯以繫地謂官屬曰丞相幸得備位三公奉職負國當伏刑都市以示萬眾丞相豈兒女子邪何謂咀藥而死嘉遂裝出見使者再拜受詔乘吏小車去蓋不冠隨使者詣廷尉廷尉收嘉丞相新甫侯印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉嘉對曰案事者思得實竊見相等前東平王獄不以雲為不當死欲關公卿示重慎置驛馬傳囚勢不得踰冬月誠不見其外內顧望阿附為雲驗復幸得蒙大赦相等皆良善吏臣竊為國惜賢不私此三人獄吏曰苟如此則君何以為罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然卬天歎曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死帝舅大司馬票騎將軍丁明素重嘉而憐之上遂免明以董賢代之語在賢傳嘉為相三年誅國除死後上覽其對而思嘉言復以孔光代嘉為丞相徵用何武為御史大夫元始四年詔書追錄忠臣封嘉子崇為新甫侯追諡嘉為忠侯師丹字仲公琅邪東武人也治詩事匡衡舉孝廉為郎元帝末為博士免建始中州舉茂材復補博士出為東平王太傅丞相方進御史大夫孔光舉丹論議深博廉正守道徵入為光祿大夫丞相司直數月復以光祿大夫給事中由是為少府光祿勳侍中甚見尊重成帝末年立定陶王為皇太子以丹為太子太傅哀帝即位為左將軍賜爵關內侯食邑領尚書事遂代王莽為大司馬封高樂侯月餘徙為大司空上少在國見成帝委政外家王氏僭盛常內邑邑即位多欲有所匡正封拜丁傅奪王氏權丹自以師傅居三公位得信於上上書言古者諒闇不言聽於冢宰三年無改於父之道前大行尸柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縱不能明陳大義復曾不能牢讓爵位相隨空受封侯增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理陰陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至德以壯年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖德當合天人之功臣聞天威不違顏咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀群下之從化天下者陛下之家也胏附何患不富貴不宜倉卒先帝不量臣愚以為太傅陛下以臣託師傅故亡功德而備鼎足封大國加賜黃金位為三公職在左右不能盡忠補過而令庶人竊議災異數見此臣之罪也臣不敢言乞骸骨歸於海濱恐嫌於偽誠慚負重責義不得不盡死書數十上多切直之言初哀帝即位成帝母稱太皇太后成帝趙皇后稱皇太后而上祖母傅太后與母丁后皆在國邸自以定陶共王為稱高昌侯董宏上書言秦莊襄王母本夏氏而為華陽夫人所子及即位後俱稱太后宜立定陶共王后為皇太后事下有司時丹以左將軍與大司馬王莽共劾奏宏知皇太后至尊之號天下一統而稱引亡秦以為比喻詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號, WYG: ''}
