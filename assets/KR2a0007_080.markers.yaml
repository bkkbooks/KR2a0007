  - {type: variant, offset: 3959, length: 222, content: 母王太后下丞相御史益封賢二千戶及賜孔鄉侯汝昌侯陽新侯國嘉封還詔書因奏封事諫上及太后曰臣聞爵祿土地天之有也書云天命有德五服五章哉王者代天爵人尤宜慎之裂地而封不得其宜則眾庶不服感動陰陽其害疾自深今聖體久不平此臣嘉所內懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之損至尊以寵之主威已黜府藏已竭唯恐不足財皆民力所為孝文皇帝欲起露臺重百金之費克己不作今賢散公賦以施私惠一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常為之寒心今, WYG: ''}
