  - {type: variant, offset: 6274, length: 1191, content: 令泠褎黃門郎段猶等復奏言定陶共皇太后共皇后皆不宜復引定陶蕃國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議有司皆以為宜如襃猶言丹議獨曰聖王制禮取法於天地故尊卑之禮明則人倫之序正人倫之序正則乾坤得其位而陰陽順其節人主與萬民俱蒙祐福尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊卑亡二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子亡爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深遠故為共王立後奉承祭祀今共皇長為一國太祖萬世不毀恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不得復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毀空去一國太祖不墮之祀而就無主當毀不正之禮非所以尊厚共皇也丹由是浸不合上意會有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以為行錢以來久難卒變易丹老人忘其前語後從公卿議又丹使吏書奏吏私寫其章丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問將軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄令吏民傳寫流聞四方臣不密則失身宜下廷尉治事下廷尉廷尉劾丹大不敬事未決給事中博士申咸炔欽上書言丹經行無比自近世大臣能若丹者少發憤懣奏封事不及深思遠慮使主簿書漏泄之過不在丹以此貶黜恐不厭眾心尚書劾咸欽幸得以儒官選擢備腹心上所折中定疑知丹社稷重臣議罪處罰國之所慎咸欽初傅經義以為當治事以暴列乃復上書妄稱譽丹前後相違不敬上貶咸欽秩各二等遂策免丹曰夫三公者朕之腹心也輔善相過匡率百僚和合天下者也朕既不明委政於公間者陰陽不調寒暑失常變異婁臻山崩地震河決泉涌流殺人民百姓流連無所歸心司空之職尤廢焉君在位出入三年未聞忠言嘉謀而反有朋黨相進不公之名乃者以挺力田議改幣章示君君內為朕建可改不疑以君之言博考朝臣君乃希眾雷同外以為不便令觀者歸非於朕朕隱忍不宣為君受愆朕疾夫比周之徒虛偽壞化寖以成俗故屢以書飭君幾君省過求己而反不受退有後言及君奏封事傳於道路布聞朝市言事者以為大臣不忠辜陷重辟獲虛采名謗譏匈匈流於四方腹心如此謂疏者何殆謬於二人同心之利焉將何以率示群下附親遠方朕惟君位尊任重慮不周密懷諼迷國進退違命反覆異言甚為君恥之非所以共承天地永保國家之意以君嘗託傅位未忍考於理已詔有司赦君勿治其上大司空高樂侯印綬罷歸尚書令唐林上疏曰竊見免大司空丹策書泰深痛切君子作文為賢者諱丹經為世儒宗德為國黃耇親傅聖躬位在三公所坐者微海內未見其大過事既已往免爵大重京師識者咸以為宜復丹邑爵使奉朝請四方所瞻卬也惟陛下財覽眾心有以尉復師傅之臣上從林言下詔賜丹爵關內侯食邑三百戶丹既免數月上用朱博議尊傅太后為皇太太后丁后為帝太后與太皇太后及皇太后同尊又為共皇立廟京師儀如孝元皇帝博遷為丞相復與御史, WYG: ''}
