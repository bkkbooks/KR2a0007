  - {type: variant, offset: 3613, length: 345, content: 賢治大第開門鄉北闕引王渠灌園池使者護作賞賜吏卒甚於治宗廟賢母病長安廚給祠具道中過者皆飲食為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宮猶不至此賢家有賓婚及見親諸官並共賜及倉頭奴婢人十萬錢使者護視發取市物百賈震動道路讙譁群臣惶惑詔書罷菀而以賜賢二千餘頃均田之制從此墮壞奢僭放縱變亂陰陽災異眾多百姓訛言持籌相驚被髮徒跣而走乘馬者馳天惑其意不能自止或以為籌者策失之戒也陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣臣嘉幸得備位竊內悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎己之所獨鄉察眾人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜亂國亡軀不終其祿所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命於是上寖不說而愈愛賢不能自勝會祖母傅太后薨上因託傅太后遺詔令成, WYG: 平}
