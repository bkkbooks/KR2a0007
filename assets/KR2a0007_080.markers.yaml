  - {type: variant, offset: 22, length: 0, content: '', krp: 而有斯疾也師古曰夫子孔子也論語云伯牛有疾子問之自牖執其手曰蔑之命矣夫斯人也而有斯疾也蔑無也言命之所遭無有善惡如斯善人而有如斯惡疾深痛之也朕甚閔焉夫行純茂而不顯異則有國者將何朂哉師古曰純大也一曰善也茂美也朂勉厲也書不云乎用徳章厥善師古曰尚書盤庚之辭也言襃賞有徳以明其善行今王朝正月詔與子男一人俱師古曰從王入朝也其以廣戚縣戸四千三百封其子勲為廣戚侯眀年嚻薨子懐王文嗣一年薨無子絶明年成帝復立文弟平陸侯衍宋祁曰陸一本作陵是為思王二十一年薨子紆嗣王莽時絶初成帝時又立紆弟景為定陶王廣戚侯勲薨諡曰煬侯子顯嗣平帝崩無子王莽立顯子嬰為孺子奉平帝後莽簒位以嬰為定安公漢既誅莽更始時嬰在長安平陵方望等頗知天文以為更始必敗嬰本統當立者也師古曰言其舊已繼平帝後當正統共起兵將嬰至臨涇立為天子更始遣丞相李松擊破殺嬰云東平思王宇甘露二年立元帝即位就國壯大通姦犯法師古曰與姦猾交通好犯法也上以至親貰弗罪傅相連坐師古曰頻坐王獲罪久之事太后内不相得太后上書言之求守杜陵園張晏曰}
  - {type: variant, offset: 24, length: 1, content: 時, WYG: 陵也宫人無子乃守園陵上於是遣太中大夫張子蟜師古曰蟜字或作僑並音鉅昭反奉璽書敕諭之師古曰約敇而曉告之也曰皇帝問東平王盖聞親親之恩莫重於孝尊尊之義莫大於忠故諸侯在位不驕以致孝道制節謹度以翼天子師古曰翼佐也然後富貴不離其身宋祁曰舊無不字云離於身蘇子瞻云此文與孝經小異離附離也今作不離其身疑為俗儒所添也而社稷可保今聞王自修有闕本朝不和師古曰謂東平國之朝也流言紛紛宋祁曰下紛字當作然謗自内興朕甚憯焉為王懼之師古曰憯痛也音才感反詩不云乎毋念爾祖述修厥徳永言配命自求多福師古曰大雅文王之詩也無念念也言當念爾先祖之道修其徳則長配天命此乃所以自求多福朕惟王之春秋方剛師古曰言其少年血氣盛宋祁曰注末當有也字忽於道徳師古曰忽遺忘也意有所移忠言未納師古曰謂漸染其惡人而移其性未受忠言也故臨遣太中大夫子蟜諭王朕意師古曰親臨遣之令以朕意曉告王孔子曰過而不改是謂過矣師古曰論語載孔子之言也謂人有失行許以自新王其深惟孰思之無違朕意又特以璽書賜王太后曰皇帝使諸吏宦者令承問東平王太后朕有聞師古曰言母子不和也不欲指斥言之故云有聞也王太后少加意焉夫福善之門莫美於和睦患咎之首莫大於内離今東平王出繦褓之中而託于南靣之位加以年齒方剛宋祁曰考諸本無位加字劉敞曰南面之文不具渉學日寡驁忽臣下師古曰驁讀與敖同不自它於太后李竒曰不自它者親之辭也師古曰言不自同它人宋祁曰注文親字上疑有自字以是之間能無失禮義者其惟聖人乎傳曰父為子隱直在其中矣師古曰論語云葉公謂孔子曰吾黨有直躬者其父攘羊而子證之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣故引之也王太后眀察此意不可不詳閨門之内母子之間同氣異息骨肉之恩豈可忽哉豈可忽哉昔周公戒伯禽曰故舊無大故則不可棄也毋求備於一人師古曰事見論語言人有小惡當思其善不可責以備行而即棄之也夫以故舊之恩猶忍小惡而况此乎已遣使者諭王王既悔過服罪太后寛忍以貰之師古曰貰猶緩宋祁曰注末當有也字後宜不敢師古曰言王於後當不敢更為非也王太后强餐止思念慎疾自愛宇慙懼因使者頓首謝死罪願洒心自改師古曰洒音先弟反詔書又勅傅相曰夫人之性皆有五常及其少長耳目牽於耆欲師古曰耆讀曰嗜故五常銷而邪心作情亂其性利勝其義張晏曰性者所受而生也情者見物而動者也而不失厥家者未之有也今王富於春秋氣力勇武獲師傅之教淺加以少所聞見自今以来非五經之正術敢以游獵非禮道王者輒以名聞師古曰道音導宇立二十年元帝崩宇謂中謁者信等曰漢大臣議天子少弱未能治}
