  - {type: variant, offset: 1419, length: 2133, content: 收大司馬董賢印綬詔有司舉可大司馬者莽故大司馬辭位辟丁傅眾庶稱以為賢又太后近親自大司徒孔光以下舉朝皆舉莽武為前將軍素與左將軍公孫祿相善二人獨謀以為往時孝惠孝昭少主之世外戚呂霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔幼主不宜令異姓大臣持權親疏相錯為國計便於是武舉公孫祿可大司馬而祿亦舉武太后竟自用莽為大司馬莽風有司劾奏武公孫祿互相稱舉皆免武就國後莽浸盛為宰衡陰誅不附己者元始三年呂寬等事起時大司空甄豐承莽風指遣使者乘傳案治黨與連引諸所欲誅上黨鮑宣南陽彭偉杜公子郡國豪桀坐死者數百人武在見誣中大理正檻車徵武武自殺眾人多冤武者莽欲厭眾意令武子況嗣為侯諡武曰刺侯莽篡位免況為庶人王嘉字公仲平陵人也以明經射策甲科為郎坐戶殿門失闌免光祿勳于永除為掾察廉為南陵丞復察廉為長陵尉鴻嘉中舉敦朴能直言召見宣室對政事得失超遷太中大夫出為九江河南太守治甚有聲徵入為大鴻臚徙京兆尹遷御史大夫建平三年代平當為丞相封新甫侯加食邑千一百戶嘉為人剛直嚴毅有威重上甚敬之哀帝初立欲匡成帝之政多所變動嘉上疏曰臣聞聖王之功在於得人孔子曰材難不其然與故繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也累世尊重然後士民之眾附焉是以教化行而治功立今之郡守重於古諸侯往者致選賢材賢材難得拔擢可用者或起於囚徙昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁內史骨肉以安張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自冤使者覆獄劾敞賊殺人上逮捕不下會免亡命數十日宣帝徵敞拜為冀州刺史卒獲其用前世非私此三人貪其材器有益於公家也孝文時吏居官者或長子孫以官為氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有苟且之意其後稍稍變易公卿以下傳相促急又數改更政事司隸部刺史察過悉劾發揚陰私吏或居官數月而退送故迎新交錯道路中材苟容求全下材懷危內顧壹切營私者多二千石益輕賤吏民慢易之或持其微過增加成辠言於刺史司隸或至上書章下眾庶知其易危小失意則有離畔之心前山陽亡徒蘇令等從橫吏士臨難莫肯伏節死義以守相威權素奪也孝成皇帝悔之下詔書二千石不為縱遣使者賜金尉厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其良民吏有章劾事留中會赦壹解故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字乃下唯陛下留神於擇賢記善忘過容忍臣子勿責以備二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊略令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢為諫大夫遣之今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛修等皆故二千石有名稱天子納而用之會息夫躬孫寵等因中常侍宋弘上書告東平王雲祝詛又與后舅伍宏謀弒上為逆雲等伏誅躬寵擢為吏二千石是時侍中董賢愛幸於上上欲侯之而未有所緣傅嘉勸上因東平事以封賢上於是定躬寵告東平本章掇去宋弘更言因董賢以聞欲以其功侯之皆先賜爵關內侯頃之欲封賢等上心憚嘉乃先使皇后父孔鄉侯傅晏持詔書視丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵眾庶匈匈咸曰賢貴其餘并蒙恩至今流言未解陛下仁恩於賢等不已宜暴賢等本奏語言延問公卿大夫傅士議郎考合古今明正其義然後乃加爵土不然恐大失眾心海內引領而議暴平其事必有言當封者在陛下所從天下雖不說咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封眾人歸咎於永先帝不獨蒙其譏臣嘉臣延材駑不稱死有餘責知順指不迕可得容身須臾所以不敢者思報厚恩也上感其言止數月遂下詔封賢等因以切責公卿曰朕居位以來寢疾未瘳反逆之謀相連不絕賊亂之臣近侍帷幄前東平王雲與后謁祝詛朕使侍醫伍宏等內侍案脈幾危社稷殆莫甚焉昔楚有子玉得臣晉文為之側席而坐近事汲黯折淮南之謀今雲等至有圖弒天子逆亂之謀者是公卿股肱莫能悉心務聰明以銷厭未萌之故賴宗廟之靈侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用德章厥善其封賢為高安侯南陽太守寵為方陽侯左曹光祿大夫躬為宜陵侯後數月日食舉直言嘉復奏封事曰臣聞咎繇戒帝舜曰亡敖佚欲有國兢兢業業一日二日萬機箕子戒武王曰臣無有作威作福亡有玉食臣之有作威作福玉食害于而家凶于而國人用側頗辟民用僭慝言如此則逆尊卑之序亂陰陽之統而害及王者其國極危國人傾仄不正民用僭差不壹此君不由法度上下失序之敗也武王躬履此道隆至成康自是以後縱心恣欲法度陵遲至於臣弒君子弒父父子至親失禮患生何況異姓之臣孔子曰道千乘之國敬事而信節用而愛人使民以時孝文皇帝備行此道海內蒙恩為漢太宗孝宣皇帝賞罰信明施與有節記人之功忽於小過以致治平孝元皇帝奉大業溫恭少欲都內錢四十萬萬水衡錢二十五萬萬少府錢十八萬萬嘗幸上林後宮馮貴人從臨獸圈猛獸驚出貴人前當之元帝嘉美其義賜錢五萬掖庭見親有加賞賜屬其人勿眾謝示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也雖遭初元永光凶年飢饉加有西羌之變外奉師旅內振貧民終無傾危之憂以府臧內充實也孝成皇帝時諫臣多言燕出之害及女寵專愛耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄不以私愛害公義故雖多內譏朝廷安平傳業陛下陛下在國之時好詩書上儉節徵來所過道上稱誦德美此天下所以回心也初, WYG: ''}
