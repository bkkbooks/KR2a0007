  - {type: variant, offset: 29, length: 0, content: '', krp: 王有闕師古曰闕謂過失也有司請廢朕不忍又請削朕不敢專宋祁曰削字下疑有地字惟王之至親未甞忘於心今聞王改行自新尊修經術親近仁人非法之求不以奸吏師古曰奸音干朕甚嘉焉傳不云乎朝過夕改君子與之其復前所削縣如故師古曰復音扶目反後年来朝上疏求諸子及太史公書上以問大將軍王鳳宋祁曰鳳字下當更有鳳字對曰臣聞諸侯朝聘考文章正法度非禮不言今東平王幸得来朝不思制節謹度以防危失師古曰危失謂失道而傾危也而求諸書宋祁曰書字上當有子字非朝聘之義也諸子書或反經術非聖人或眀鬼神信物怪師古曰物亦鬼太史公書有戰國從横權譎之謀漢興之初謀臣竒䇿天官灾異地形阸塞皆不宜在諸侯王不可予不許之辭宜曰五經聖人所制萬事靡不畢載王審樂道傅相皆儒者旦夕講誦足以正身虞意師古曰虞與娱同夫小辯破義小道不通致逺恐泥皆不足以留意師古曰論語稱孔子曰雖小道必有可觀者焉致逺恐泥是以君子不為也泥謂䧟滯不通也音乃細反諸益於經術者不愛於王師古曰愛惜也於王無所惜之對奏天子如鳳言遂不與立三十三年薨師古曰皇覽云東平思王冢在無鹽人傳言王在國思歸京師後葬其冢上松栢皆西靡也子煬王雲嗣哀帝時無鹽危山土自起覆草如馳道狀又瓠山石轉立晉灼曰漢注作報山山脇石一枚轉側起立髙九尺六寸旁行一丈廣}
