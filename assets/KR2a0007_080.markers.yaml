  - {type: variant, offset: 1092, length: 222, content: 輕重之權制曰可以內史為中尉初武為九卿時奏言宜置三公官又與方進共奏罷刺史更置州牧後皆復復故語在朱博傳唯內史事施行多所舉奏號為煩碎不稱賢公功名略比薛宣其材不及也而經術正直過之武後母在郡遣吏歸迎會成帝崩吏恐道路有盜賊後母留止左右或譏武事親不篤哀帝亦欲改易大臣遂策免武曰君舉錯煩苛不合眾心孝聲不聞惡名流行無以率示四方其上大司空印綬罷歸就國後五歲諫大夫鮑宣數稱冤之天子感丞相王嘉之對而高安侯董賢亦薦武武由是復徵為御史大夫月餘徙為前將軍先是新都侯王莽就國數, WYG: 紀字七}
