  - {type: variant, offset: 439, length: 7, content: 樓蘭王安歸嘗為, WYG: 博之類不用箭但行梟散孟康曰格音各行伍相各故言各劉徳曰格五棊行簺法曰簺白乘五至五格不得行故云格五師古曰即今戲之簺也音先代反詔使從中大夫董仲舒受春秋髙材通明遷侍中中郎坐法免上書謝罪願養馬黄門上不許師古曰請於黄門供養馬之事後願守塞捍宼難復不許久之上疏願擊}
