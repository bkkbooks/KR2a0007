  - {type: variant, offset: 3592, length: 3, content: 車騎將, WYG: 置也顓顓獨居一海之中師古曰顓與專同專專猶區區也一曰圜貌也霧露氣濕多毒草蟲虵水土之害人未見虜戰士自死又非獨珠厓有珠犀瑇瑁也師古曰瑇瑁文甲也瑇音代瑁音妹棄之不足惜不擊不損威其民譬猶魚鼈何足貪也臣竊以往者羌}
