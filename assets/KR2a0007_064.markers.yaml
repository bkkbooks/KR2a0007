  - {type: variant, offset: 425, length: 1, content: 卿, WYG: 車糧用乏上計吏卒更乞匄之師古曰更音工衡反乞音氣匄音工大反會邑子嚴助貴幸薦買臣召見說春秋言楚詞帝甚說之師古曰說讀曰悅拜買臣為中大夫與嚴助俱侍中是時方築朔方公孫𢎞諫以為罷敝中國師古曰罷讀曰疲上使買臣難詘𢎞語在𢎞傳後買臣坐事免久之召待詔是時東越數反覆買臣因言故東越王居保泉山師古曰泉山即今泉州之山也臨海去海十餘里保者保守之以自固也說者乃云保是地名失之矣一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也上拜買臣會稽太守上謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進師古曰須待也初買臣免待詔常從會稽守邸者寄居飯食師古曰飯音扶晚反拜為太守買臣衣故衣懷其印綬歩歸郡邸直上計時會稽吏方相與羣飲師古曰直讀曰值不視買臣買臣入室中守邸與共食食且飽少見其綬師古曰見顯示也守邸怪之前引其綬視其印會稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳師古曰誕大言也呼音火故反次下亦同守邸曰試來視之其故人素輕買臣者入視之還走疾呼曰實然坐中驚駭白守丞服䖍曰守邸丞也張晏曰漢舊郡國丞長吏與計吏俱送計也師古曰張說是也謂之守丞者繫太守而言也守音式授反相推排陳列中庭拜謁買臣徐出戸有頃長安廐吏乘駟馬車來迎張晏曰故事大夫乘官車駕駟如今州牧刺史矣買臣遂乘傳去師古曰傳音張戀反會稽聞太守且至發民除道縣吏並送迎車百餘乘入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之師古曰食讀曰飤居一月妻自經死買臣乞其夫錢令葬師古曰乞音氣悉召見故人與飲食諸嘗有恩者皆報復焉師古曰復音扶目反居歲餘買臣受詔將兵與横海}
