  - {type: variant, offset: 3086, length: 449, content: 所守穿塹塞門戶鹵楯為前戟弩為後卬射城中樓上人樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨己為漢內應又聞烏孫諸國兵皆發自以無所之郅支已出復還曰不如堅守漢兵遠來不能久攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于下騎傳戰大內夜過半木城穿中人卻入土城乘城呼時康居兵萬餘騎分為十餘處四面環城亦與相應和夜數犇營不利輒卻平明四面火起吏士喜大呼乘之鉦鼓聲動地康居兵引卻漢兵四面推鹵楯並入土城中單于男女百餘人走入大內漢兵縱火吏士爭入單于被創死軍候假丞杜勳斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦予城郭諸國所發十五王於是延壽湯上疏曰臣聞天下之大義當混為一昔有唐虞今有彊漢匈奴呼韓邪單于已稱北藩唯郅支單于叛逆未伏其辜大夏之西以為彊漢不能臣也郅支單于慘毒行於民大惡通于天臣延壽臣湯將義兵行天誅賴陛下神靈陰陽並應天氣精明陷陳克敵斬郅支首及名王以下宜縣頭槀街蠻夷邸間以, WYG: 詔}
