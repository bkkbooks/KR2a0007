  - {type: variant, offset: 3568, length: 0, content: '', WYG: 也列子云伯樂秦穆公時人考其年代不相當張說云良字伯樂斯失之矣韓哀附輿應劭曰世本韓哀作御師古曰宋衷云韓哀韓文侯也時已有御此復言作者加其精巧也然則善御者耳非始作也縱馳騁騖忽如景靡師古曰亂馳曰騖景靡者如光景之徙靡也過都越國蹶如歴塊師古曰如經歴一塊言其速疾之甚塊音口内反追奔電逐遺風師古曰吕氏春秋云遺風之乗言馬行尤疾每在風前故遺風於後今此言逐遺風則是風之遺逸在後者馬能逐及也周流八極萬里一息何其遼哉人馬相得也師古曰遼謂所行逺故服絺綌之涼者不苦盛暑之鬱燠師古曰鬱熱氣也燠温也音於六反襲貂狐之煗者不憂至寒之悽愴師古曰悽愴寒冷也煗音乃短反何則有其具者易其備賢人君子亦聖}
