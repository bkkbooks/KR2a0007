  - {type: variant, offset: 2613, length: 472, content: 三校從南道踰蔥領徑大宛其三校都護自將發溫宿國從北道入赤谷過烏孫涉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東殺略大昆彌千餘人歐畜產甚多從後與漢軍相及頗寇盜後重湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為寇間呼其貴人屠墨見之諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以為導貝色子即屠墨母之弟皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困阸願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都護將軍來迎單于妻子恐左右驚動故未敢至城下使數往來相答報延壽湯因讓之我為單于遠來而至今無名王大人見將軍受事者何單于忽大計失客主之禮也兵來道遠人畜罷極食度且盡恐無以自還願單于與大臣審計策明日前至郅支城都賴水上離城三里止營傅陳望見單于城上立五采幡織數百人披甲乘城又出百餘騎往來馳城下步兵百餘人夾門魚鱗陳講習用兵城上人更招漢軍曰鬭來百餘騎馳赴營營皆張弩持滿指之騎引郤頗遣吏士射城門騎步兵騎步兵皆入延壽湯令軍聞鼓音皆薄城下四面圍城各, WYG: 詰}
