  - {type: variant, offset: 3663, length: 2, content: 亦惡, WYG: 大夫師古曰瘉與愈同我易助也君房下筆言語妙天下師古曰於天下最為精妙耳使君房為尚書令勝五鹿充宗逺甚捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣捐之前言平恩侯可為將軍張晏曰許嘉也期思侯並可為諸曹師古曰期思侯當是賁赫之後嗣也而表不載皆如言又薦謁者滿宣立為冀州刺史言中謁者不宜受事宦者不宜入宗廟立止相薦之信不當如是乎師古曰兾相薦之效當如前所言諸士見納用宋祁曰注文士字姚本作事興曰我復見言君房也捐之復短石顯興曰顯鼎貴如淳曰鼎音釘言方且欲貴矣師古曰方且是也讀如本字上信用之今欲進弟從我計師古曰弟但也且與合意即得入矣捐之即與興共為薦顯奏曰竊見石顯本山東名族有禮義之家也持正六年未甞有過明習於事敏而疾見出公門入私門師古曰言自公庭出即歸}
