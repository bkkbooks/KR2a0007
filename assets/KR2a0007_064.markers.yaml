  - {type: variant, offset: 3559, length: 3, content: 繁延壽, krp: 初軍從濟南當詣博士歩入關關吏予軍繻張晏曰繻音須繻符也書帛裂而分之若劵契矣蘇林曰繻帛邊也舊關出入皆以傳傳煩因裂繻頭合}
  - {type: punctuation, offset: 3564, content: 「, id: KR2a0007_tls_064-bkkpn690}
  - {type: variant, offset: 3564, length: 2, content: 郅支, WYG: 符信也師古曰蘇說是也軍問以此何為吏曰為復傳師古曰復返也謂返出關更以為傳復音扶福反傳音張戀反次下亦同還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國師古曰行音下更反其後亦同劉奉世曰還當以合符還字宜屬上句建節東出關關吏識之曰此使者迺前棄繻生也軍行郡國所見便宜以聞還奏事上甚說師古曰說讀曰悅當發使使匈奴師古曰漢朝欲遣人為使於匈奴也軍自請曰軍無横草之功師古曰言行草中使草偃臥故云横草也得列宿衛食祿五年邊境時有風塵之警臣宜被堅執銳當矢石啓前行師古曰行音下郎反駑下不習金革之事今聞將遣匈奴使者臣願盡精厲氣奉佐明使畫吉凶於單于之前臣年少材下孤於外官師古也孤逺也外官謂非侍衛之臣也不足以亢一方之任師古曰亢當也音抗竊不勝憤懣詔問畫吉凶之狀上竒軍對擢為諫大夫南越與漢和親迺遣軍使南越說其王欲令入朝比内諸侯軍自請願受長纓必覊南越王而致之闕下師古曰言如馬覊也軍遂往說越王越王聽許請舉國内屬天子大說師古曰說讀曰悅賜南越大臣印綬壹用漢法以新改其俗令使者留填撫之師古曰填音竹刃反越相吕嘉不欲内屬發兵攻殺其王}
