  - {type: variant, offset: 6152, length: 799, content: 黑龍冬出人以問湯湯曰是所謂玄門開微行數出出入不時故龍以非時出也又言當復發徙傳相語者十餘人丞相御史奏湯惑眾不道妄稱詐歸異於上非所宜言大不敬廷尉增壽議以為不道無正法以所犯劇易為罪臣下承用失其中故移獄廷尉無比者先以聞所以正刑罰重人命也明主哀憫百姓下制書罷昌陵勿徙吏民已申布湯妄以意相謂且復發徙雖頗驚動所流行者少百姓不為變不可謂惑眾湯稱詐虛設不然之事非所宜言大不敬也制曰廷尉增壽當是湯前有討郅支單于功其免湯為庶人徙邊又曰故將作大匠萬年佞邪不忠妄為巧詐多賦斂煩繇役興卒暴之作卒徒蒙辜死者連屬毒流眾庶海內怨望雖蒙赦令不宜居京師於是湯與萬年俱徙敦煌久之敦煌太守奏湯前親誅郅支單于威行外國不宜近邊塞詔徙安定議郎耿育上書言便宜因冤訟湯曰延壽湯為聖漢揚鉤深致遠之威雪國家累年之恥討絕域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下明詔宣著其功改年垂曆傳之無窮應是南郡獻白虎邊陲無警備會先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功獨丞相匡衡排而不予封延壽湯數百戶此功臣戰士所以失望也孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪讒佞在朝曾不深惟本末之難以防未然之戒欲專主威排妒有功使湯塊然被冤拘囚不能自明卒以無罪老棄敦煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不忘危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯耳假使異世不及陛下尚望國家追錄其功封表其墓以勸後進也湯幸得身當聖世功曾未久反聽邪臣鞭逐斥遠使亡逃分竄死無處所遠覽之士莫不計度以為湯功累世不可及而湯過人情所有湯尚如此雖復破絕筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳此臣所以為國家尤戚戚也書奏天子還湯卒於長安死後數年王莽為安漢公秉政既內德湯舊思又欲讇皇太后以討郅支功尊元帝廟稱高宗以湯延壽前功大賞薄及候丞杜勳不賞乃益封延壽孫遷千, WYG: ''}
