  - {type: variant, offset: 1127, length: 0, content: '', WYG: 故丞相史上書曰臣聞鄒子曰師古曰鄒衍之書也政敎文質者所以云救也師古曰以救敝當時則用過則舍之師古曰非其時則廢置也有易則易之師古曰可變易者則易也故守一而不變者未睹治之至也今天下人民用財侈靡車馬衣裘宮室皆競修飾調五聲使有節族蘇林曰族音奏師古曰節止也奏進也雜五色使有文章重五味方丈於前以觀欲天下孟康曰觀猶顯也師古曰顯示之使其慕欲也彼民之情見美則願之是敎民以侈也侈而無節則不可贍師古曰贍足也民離本而徼末矣師古曰徼要求也音工堯反末不可徒得師古曰徒空也故搢紳者不憚為詐帶劒者夸殺人以矯奪師古曰夸大也競也矯偽也而世不知媿故姦軌浸長師古曰浸漸也夫佳麗珍怪固順於耳目故養失而泰樂失而滛禮失而采如淳曰采飾也師古曰采者文過其實也敎失而偽偽采􅁋泰非所以範民之道也師古曰範謂為之立法也是以天下人民逐利無已犯法者衆臣願為民制度以防其滛使貧富不相燿以和其心心旣和平其性恬安恬安不營則盜賊銷盜賊銷則刑罰少刑罰少則陰陽和四時正風雨時草木暢茂五榖蕃熟六畜遂字師古曰蕃多也遂成也字生也蕃音扶元反民不夭厲和之至也師古曰厲病也臣聞周有天下其治三百餘歲成康其隆也刑錯四十餘年而不用及其衰亦三百餘年故五伯更起師古曰伯讀曰霸更音工衡反其下並同伯者常佐天子興利除害誅暴禁邪匡正海内以尊天子五伯既没賢聖莫續天子孤弱號令不行諸侯恣行彊陵弱衆暴寡田常篡齊六卿分晉並為戰國此民之始苦也於是彊國務攻弱國修守合從連衡馳車轂擊師古曰車轂相擊言其衆多也從音子容反介胄生蟣蝨民無所告愬及至秦王蠶食天下并吞戰國稱號皇帝一海内之政壞諸侯之城銷其兵鑄以為鍾虡師古曰虡懸鍾者也解在賈山司馬相如傳示不復用元元黎民得免於戰國逢明天子人人自以爲更生師古曰言天下既免戰國之苦若逢明聖之主則可以更生而秦皇反為虐政以殘害也鄉使秦緩刑罰薄賦斂師古曰鄉讀曰嚮省繇役貴仁義賤權利上篤厚下佞巧變風易俗化於海内則世世必安矣秦不行是風循其故俗為知巧權利者進篤厚忠正者退法嚴令苛讇諛者衆師古曰讇古謟字日聞其美意廣心逸欲威海外使蒙恬將兵以北攻彊胡辟地進境師古曰辟讀曰闢戍於北河飛芻輓粟以隨其後又使尉屠睢將樓船之士攻越使監祿鑿渠運糧深入越地越人遁逃曠日持久糧食乏絶越人擊之秦兵大敗秦乃使尉佗將}
