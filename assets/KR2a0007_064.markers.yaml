  - {type: 'tls:seg', offset: 211, content: '', id: KR2a0007_tls_064-3a.7}
  - {type: variant, offset: 211, length: 0, content: '', WYG: 畜飬六畜也師古曰直謂畜養之耳非六畜也此必委質為藩臣世共貢職師古曰共讀曰供陛下以方寸之印丈二之組填撫方外師古曰組者印之綬不勞一卒不頓一㦸師古曰頓壞也一曰頓讀曰鈍而威徳並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兎逃入山林險阻師古曰如雉兎之逃竄而入山林險阻之中背而去之則復相羣聚留而守之歴歲經年則士卒罷勌食糧乏絶師古曰罷讀曰疲勌亦倦字男子不得耕稼樹種婦人不得紡績織絍師古曰樹梢也機縷曰絍絍音人禁反丁壯從軍老弱轉餉師古曰餉亦饟字居者無食行者無糧民苦兵事亡逃者必衆隨而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠雎擊越張晏曰郡都尉姓屠名雎也又使監禄鑿渠通道張晏曰監郡御史也名祿越人逃入深山林叢不可得攻留軍屯守空地曠日持久宋祁曰越本持作引士卒勞勌越廼出擊之宋祁曰越本無廼字秦兵大破廼發適戍以備之師古曰適讀曰讁當此之時外内騷動百姓靡敝師古曰靡散也音縻行者不還往者莫反皆不聊生亡逃相從羣為盜賊於是山東之難始興此老子所謂師之所處荆棘生之者也師古曰老子道經之言也師旅行必殺傷士衆侵暴田畝故荒殘而生荆棘也兵者凶事一方有急四面皆從臣恐變故之生姦邪之作由此始也周}
  - {type: page-break, offset: 211, content: '', id: KR2a0007_WYG_064-8a, image: WYG0250/WYG0250-0373c.png}
  - {type: page-break, offset: 211, content: '', id: KR2a0007_WYG_064-8b, image: WYG0250/WYG0250-0373d.png}
  - {type: variant, offset: 211, length: 0, content: '', krp: 畜飬六畜也師古曰直謂畜養之耳非六畜也此必委質為藩臣世共貢職師古曰共讀曰供陛下以方寸之印丈二之組填撫方外師古曰組者印之綬不勞一卒不頓一㦸師古曰頓壞也一曰頓讀曰鈍而威徳並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兎逃入山林險阻師古曰如雉兎之逃竄而入山林險阻之中背而去之則復相羣聚留而守之歴歲經年則士卒罷勌食糧乏絶師古曰罷讀曰疲勌亦倦字男子不得耕稼樹種婦人不得紡績織絍師古曰樹梢也機縷曰絍絍音人禁反丁壯從軍老弱轉餉師古曰餉亦饟字居者無食行者無糧民苦兵事亡逃者必衆隨而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠雎擊越張晏曰郡都尉姓屠名雎也又使監禄鑿渠通道張晏曰監郡御史也名祿越人逃入深山林叢不可得攻留軍屯守空地曠日持久宋祁曰越本持作引士卒勞勌越廼出擊之宋祁曰越本無廼字秦兵大破廼發適戍以備之師古曰適讀曰讁當此之時外内騷動百姓靡敝師古曰靡散也音縻行者不還往者莫反皆不聊生亡逃相從羣為盜賊於是山東之難始興此老子所謂師之所處荆棘生之者也師古曰老子道經之言也師旅行必殺傷士衆侵暴田畝故荒殘而生荆棘也兵者凶事一方有急四面皆從臣恐變故之生姦邪之作由此始也周}
  - {type: variant, offset: 212, length: 0, content: '', WYG: 曰高宗伐鬼方三年而克之師古曰旣濟九三爻辭鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也師古曰校計也不敢與計强弱曲直如使越人蒙死徼幸以逆執事之顔行文頴曰顔行猶鴈行在前行故曰顔也師古曰䝉犯也行音胡郎反宋祁曰越本無死字厮輿之卒有一不備而歸者張晏曰厮微輿衆也師古曰厮析薪者輿主駕車者此皆言賤役之人雖}
  - {type: page-break, offset: 212, content: '', id: KR2a0007_WYG_064-9a, image: WYG0250/WYG0250-0374a.png}
  - {type: variant, offset: 212, length: 0, content: '', krp: 曰高宗伐鬼方三年而克之師古曰旣濟九三爻辭鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也師古曰校計也不敢與計强弱曲直如使越人蒙死徼幸以逆執事之顔行文頴曰顔行猶鴈行在前行故曰顔也師古曰䝉犯也行音胡郎反宋祁曰越本無死字厮輿之卒有一不備而歸者張晏曰厮微輿衆也師古曰厮析薪者輿主駕車者此皆言賤役之人雖}
  - {type: variant, offset: 213, length: 0, content: '', WYG: 越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池師古曰八藪謂魯有大野晉有大陸秦有楊汙宋有孟諸楚有雲夢吳越之間有具區齊有海隅鄭有圃田生民之屬皆為臣妾人徒之衆足以奉千官之共師古曰千官猶百官}
  - {type: variant, offset: 213, length: 0, content: '', krp: 越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池師古曰八藪謂魯有大野晉有大陸秦有楊汙宋有孟諸楚有雲夢吳越之間有具區齊有海隅鄭有圃田生民之屬皆為臣妾人徒之衆足以奉千官之共師古曰千官猶百官}
