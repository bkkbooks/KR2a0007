  - {type: variant, offset: 402, length: 1, content: 質, WYG: 嬰齊入侍病有瘳願伏北闕望大廷以報盛德閩王以八月舉兵於冶南蘇林曰山名也今名東冶屬會稽士卒罷倦師古曰罷讀曰疲三王之衆相與攻之因其弱弟餘善以成其誅至今國空虛遣使者上符節請所立不敢自立以待天子之明詔此一舉不挫一兵之鋒不用一卒之死而閩王伏辜南越被澤威震暴王義存危國此則陛下深計遠慮之所出也事效見前師古曰見顯也前謂目前故使臣助來諭王意於是王謝曰雖湯伐桀文王伐崇誠不過此臣安妄以愚意狂言陛下不忍加誅使使者臨詔臣安以所不聞師古曰先未聞者今得聞也誠不勝厚幸助由是與淮南王相結而還上大說師古曰說讀曰悅助侍燕從容師古曰從容閒語也從音千容反上問助居鄉里時助對曰家貧為友壻富人所辱師古曰友壻同門之壻上問所欲對願為㑹稽太守於是拜為會稽太守數年不聞問師古曰無善聲賜書曰制詔㑹稽太守君厭承明之廬張晏曰承明廬}
