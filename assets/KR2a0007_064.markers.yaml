  - {type: variant, offset: 3733, length: 5, content: 逆收繫按驗, WYG: 欲得大位漏泄省中語罔上不道書曰讒說殄行震驚朕師師古曰虞書舜典之辭也言讒巧之說殄絶君子之行震驚我衆王制順非而澤不聽而誅師古曰禮記王制云行偽而堅言偽而辯學非而博順非而澤以疑衆殺謂人有堅為辯言不以誠質學於非道雖博無用飾非文過辭語順澤不聽教命有如此者皆誅殺也劉敞曰不聽而誅者即王制所云此四誅者不以聽耳何說不聽教命乎請論如法捐之竟坐棄市興減死罪一等髠鉗為城旦成帝時至部刺史贊曰詩稱戎狄是膺荆舒是懲師古曰魯頌閟宫之詩也膺當也懲創刈也言魯僖公與齊桓舉義兵北當戎狄南創荆蠻與羣舒以靖難久矣其為諸夏患也漢興征伐胡越於}
