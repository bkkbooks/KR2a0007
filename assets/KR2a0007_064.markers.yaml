  - {type: variant, offset: 3568, length: 0, content: '', krp: 也列子云伯樂秦穆公時人考其年代不相當張說云良字伯樂斯失之矣韓哀附輿應劭曰世本韓哀作御師古曰宋衷云韓哀韓文侯也時已有御此復言作者加其精巧也然則善御者耳非始作也縱馳騁騖忽如景靡師古曰亂馳曰騖景靡者如光景之徙靡也過都越國蹶如歴塊師古曰如經歴一塊言其速疾之甚塊音口内反追奔電逐遺風師古曰吕氏春秋云遺風之乗言馬行尤疾每在風前故遺風於後今此言逐遺風則是風之遺逸在後者馬能逐及也周流八極萬里一息何其遼哉人馬相得也師古曰遼謂所行逺故服絺綌之涼者不苦盛暑之鬱燠師古曰鬱熱氣也燠温也音於六反襲貂狐之煗者不憂至寒之悽愴師古曰悽愴寒冷也煗音乃短反何則有其具者易其備賢人君子亦聖}
  - {type: variant, offset: 3569, length: 0, content: '', WYG: 之所以易海内也是以嘔喻受之應劭曰嘔喻和悅貌師古曰嘔音於付反開寛裕之路以延天下英俊也師古曰裕饒也夫竭知附賢者必建仁策索人求士者必樹伯迹師古曰伯讀曰霸昔周公躬吐捉之勞故有圄空之隆師古曰一飯三吐食一沐三捉髪以賔賢士故能成太平之化刑措不用囹圄空虚也齊桓設庭燎之禮故有匡合之功應劭曰有以九九求見桓公桓公不納其人曰九九小術而君不納之况大於九九者乎於是桓公設庭燎之禮而見之居無幾隰朋自逺而至齊桓遂以霸師古曰九九計數之書若今算經也匡謂一匡天下也合謂九合諸侯由此觀之君人者勤於求賢而逸於得人師古曰逸閑也人臣亦然昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠則上不然其信師古曰悃至也音口本反進仕不得施效斥逐又非其愆是故伊尹勤於鼎爼太公困於鼓刀師古曰勤於鼎爼謂負鼎爼以干湯也鼓刀謂屠牛於朝歌也百里自鬻寗子飯牛師古曰鬻賣也吕氏春秋云百里奚之未遇時也虞亡而虜縳鬻以五羊之皮公孫枝得而悅之獻諸穆公飯牛解在鄒陽傳鬻音弋六反離此患也師古曰離遭也及其遇明君遭聖主也運籌合上意諫諍即見聽進退得關其忠任職得行其術去卑辱奥渫而升本朝張晏曰奥幽也渫狎也汙也言敝奥渫汙不章顯也師古曰渫音先列反離疏釋蹻而享膏梁應劭曰離此疏食釋此木蹻也臣瓚曰以繩為蹻也師古曰蹻即今之鞋耳瓉說是也蹻音居畧反剖符錫壤而光祖考傳之子孫以資說士師古曰談說之士傳以為資也故世必有聖知之君而後有賢明之臣故虎嘯而風冽師古曰冽冽風貌也音列龍興而致雲蟋蟀竢秋唫蜉蝤出以隂孟康曰蜉蝤渠畧也師古曰蟋蟀今之促織也蜉蝤甲蟲也好叢聚而生也朝生而夕死蝤音由字亦作蝣其音同也易曰飛龍在天利見大人師古曰乾卦九五爻辭也言王者居正陽之位賢才見之則利用也詩曰思皇多士生此王國師古曰大雅文王之詩也思語辭也皇美也言美哉此衆多賢士生此周王之國也故世平主聖俊艾將自至師古曰艾讀曰乂若堯舜禹湯文武之君獲稷契臯陶伊尹吕望師古曰契讀與卨同字本作偰後從省耳明明在朝穆穆列布師古曰明明察也穆穆美也聚精會神相得益章師古曰章明也雖伯牙操遞鍾晉灼曰遞音遞送之遞二十四鍾各有節奏擊之不常故曰遞臣瓉曰楚辭云奏伯牙之號鍾號鍾琴名也馬融笛賦曰號鍾髙調伯牙以善鼓琴不聞說能擊鍾也師古曰琴名是也字既作遞則與楚辭不同不得即讀為號當依晉音耳宋祁曰景本作號鍾校作遞又注文中當字上當有遞字逢門子彎烏號師古曰逢門善射者即逢䝉也烏號弓名也並解在前也猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑師古曰巨亦大也沛音普大反宋祁曰越本遇作過其得意若此則胡禁不止曷令不行師古曰胡曷皆何也化溢四表横被無窮遐夷貢獻萬祥畢溱師古曰溱字與臻同是以聖主不徧窺望而視已明不單頃耳而聽已聰師古曰單盡極也頃讀曰傾恩從祥風翺德與和氣游師古曰翺翔也太平之責塞優游之望得師古曰塞滿也遵遊自然之埶恬淡無為之場休徵自至壽考無疆雍容垂拱永永萬年何必偃卬詘信若彭祖呴嘘呼吸如僑松如淳曰五帝紀彭祖堯舜時人列仙傳彭祖殷大夫也歴夏至商末號年七百師古曰信讀曰伸呴噓皆開口出氣也僑王僑松赤松子皆仙人也呴音許于反嘘音虚眇然絶俗離世哉師古曰眇然髙逺之意也詩云濟濟多士文王以寧師古曰亦文王之詩也濟濟盛貌也言文王能多用賢人故邦國得以安寧也盖信乎其以寧也是時上頗好神僊故襃對及之上令襃與張子僑等並待詔數從襃等放獵師古曰放士衆大獵也一曰游放及田獵所幸宫館輒為歌頌第其高下以差賜帛議者多以為滛靡不急上曰不有博奕者乎為之猶賢乎已師古曰此論語載孔子之辭也言博奕雖非道藝無事為之猶賢也奕今之圍碁也辭賦大者與古詩同義小者辯麗可喜師古曰喜好也音許吏反辟如女工有綺縠音樂有鄭衛師古曰辟讀曰譬今世俗猶皆以此虞說耳目師古曰虞與娱同說讀曰悅辭賦比之尚有仁義風諭師古曰風讀曰諷鳥獸草木多聞之觀賢於倡優博奕逺矣頃之擢襃為諫大夫其後太子體不安苦忽忽善忘不樂詔使襃等皆之太子宫虞侍太子師古曰之往也朝夕誦讀竒文及所自造作疾平復廼歸師古曰復音扶目反太子喜襃所為甘泉及洞簫頌師古曰喜音許吏反令後宫貴人左右皆誦讀之後方士言益州有金馬碧雞之寶可祭祀致也宣帝使襃往祀焉襃於道病死上閔惜之賈捐之字君房賈誼之曾孫也元帝初即位上疏言得失召待詔金馬門初武帝征南越元封元年立儋耳珠厓郡皆在南方海中洲居師古曰居海中之洲也水中可居者曰洲宋祁曰海字上當有大字廣袤可千里師古曰袤長也合十六縣戸二萬三千餘其民暴惡自以阻絶數犯吏禁吏亦酷之率數年壹反殺吏漢輒發兵擊定之自初為郡至昭帝始元元年二十餘年間凡六反叛至其五年罷儋耳郡并屬珠厓至宣帝神爵三年珠厓三縣復反反後七年甘露元年九縣反輒發兵擊定之元帝初元元年珠厓又反發兵擊之諸縣更叛連年不定師古曰更音工衡反上與有司議大發軍捐之建議以為不當擊上使侍中駙馬都尉樂昌侯王商詰問捐之曰珠厓内屬為郡久矣今背畔逆節而云不當擊長蠻夷之亂虧先帝功德經義何以處之師古曰於六經之内當何者之科條也捐之對曰臣幸得遭明盛之朝蒙危言之策無忌諱之患師古曰危言直言也言出而身危故云危言論語稱孔子曰邦有道危言危行敢昧死竭卷卷師古曰卷讀與拳同臣聞堯舜聖之盛也禹入聖域而不優臣瓉曰禹之功德裁入聖人區域但不能優泰耳故孔子稱堯曰大哉韶曰盡善禹曰無間師古曰論語稱孔子曰大哉堯之為君也又曰韶盡美矣又盡善也又曰禹吾無間然矣韶舜樂名間音工莧反以三聖之德地方不過數千里西被流沙東漸于海朔南曁聲教迄于四海師古曰此引禹貢之辭漸入也一曰浸也朔北方也暨及也迄至也欲與聲教則治之不欲與者不彊治也師古曰與讀曰豫故君臣歌德師古曰言皆有德可歌頌含氣之物各得其宜武丁成王殷周之大仁也師古曰武丁殷之高宗然地東不過江黄西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻晉灼曰逺國使來因九譯言語乃通也張晏曰越不著衣裳慕中國化遣譯來著衣裳也故曰越裳也師古曰張說非也越裳自是國名非以襲衣裳始為稱號王充論衡作越甞此則不作衣裳之字明矣此非兵革之所能致及其衰也南征不還師古曰謂昭王也為楚所溺也齊桓捄其難師古曰謂襄王也初為太子而恵王欲立王子帶齊桓公為}
