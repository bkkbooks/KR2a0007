  - {type: variant, offset: 642, length: 2, content: 匈奴, WYG: 横海將軍韓說等臣召南按說出勾章浮海從東方往即前買臣所畫浮海直指泉山之策也吾邱壽王傳連十餘城之守地理志東郡領二十二縣都尉治東阿壽王時以都尉兼太守則並屬都尉矣主父偃傳元光元年廼西入關云云通鑑考異曰漢書謂元光元年三人上書按嚴安書云狥南夷朝夜郎降𦍑僰畧州其事皆在元光元年以後盖誤以朔字}
