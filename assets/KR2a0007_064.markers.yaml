  - {type: variant, offset: 3564, length: 2, content: 郅支, krp: 符信也師古曰蘇說是也軍問以此何為吏曰為復傳師古曰復返也謂返出關更以為傳復音扶福反傳音張戀反次下亦同還當以合符軍曰大丈夫西游終不復傳還棄繻而去軍為謁者使行郡國師古曰行音下更反其後亦同劉奉世曰還當以合符還字宜屬上句建節東出關關吏識之曰此使者迺前棄繻生也軍行郡國所見便宜以聞還奏事上甚說師古曰說讀曰悅當發使使匈奴師古曰漢朝欲遣人為使於匈奴也軍自請曰軍無横草之功師古曰言行草中使草偃臥故云横草也得列宿衛食祿五年邊境時有風塵之警臣宜被堅執銳當矢石啓前行師古曰行音下郎反駑下不習金革之事今聞將遣匈奴使者臣願盡精厲氣奉佐明使畫吉凶於單于之前臣年少材下孤於外官師古也孤逺也外官謂非侍衛之臣也不足以亢一方之任師古曰亢當也音抗竊不勝憤懣詔問畫吉凶之狀上竒軍對擢為諫大夫南越與漢和親迺遣軍使南越說其王欲令入朝比内諸侯軍自請願受長纓必覊南越王而致之闕下師古曰言如馬覊也軍遂往說越王越王聽許請舉國内屬天子大說師古曰說讀曰悅賜南越大臣印綬壹用漢法以新改其俗令使者留填撫之師古曰填音竹刃反越相吕嘉不欲内屬發兵攻殺其王}
  - {type: variant, offset: 3567, length: 0, content: '', WYG: 漢使者皆死語在南越傳軍死時年二十餘故世謂之終童王襃字子淵蜀人也宣帝時修武帝故事講論六蓺羣書博盡竒異之好徵能為楚辭九江被公師古曰被姓也音皮義反召見誦讀益召高材劉向張子僑華龍栁襃等待詔金馬門師古曰華音戸化反神爵五鳯之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓雅琴者勃海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於衆庶聞王襃有俊材請與相見使襃作中和樂職宣布詩師古曰中和者言政治和平也樂職者言百官各得其職也宣布者風化普洽無所不被選好事者令依鹿鳴之聲習而歌之時汜鄉侯何武為僮子選在歌中師古曰汜音凡久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之襃既為刺史作頌師古曰即上中和樂職宣布詩也以美盛德故謂之頌也又作其傳師古曰解釋頌歌之義及作者之意益州刺史因奏襃有軼材師古曰軼與逸同上廼徵襃既至詔襃為聖主得賢臣頌其意襃對曰夫荷旃被毳者難與道純綿之麗宻師古曰純絲也謂織為繒帛之麗絲纊之宻也一說純綿不雜綿也羮藜唅糗者不足與論太牢之滋味服䖍曰唅音含師古曰糗即今之熬米麥所為者音丘九反又音昌少反今臣辟在西蜀師古曰辟讀曰僻生於窮巷之中長於蓬茨之下師古曰􅅫茨以蓬盖屋也茨音才私反無有遊觀廣覽之知顧有至愚極陋之累師古曰顧猶反也累音力瑞反不足以塞厚望應明指師古曰塞當也雖然敢不畧陳愚而抒情素師古曰抒猶泄也音食汝反記曰共惟春秋法五始之要服䖍曰共敬也張晏曰要春秋稱元年春王正月此五始也師古曰元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始是為五始共讀曰恭在乎審已正統而已夫賢者國家之器用也所任賢則趨舍省而功施普師古曰趨讀曰趣普博也器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻應劭曰矻矻勞極貌如淳曰健作貌也師古曰如說是也矻音口骨反及至巧冶鑄干將之樸清水焠其鋒師古曰焠謂燒而内水中以堅之也鋒刅芒端也焠音千内反越砥斂其咢晉灼曰砥石出南昌故曰越也師古曰咢刃旁也音五各反宋祁曰别本注文砥字下無石字水斷蛟龍陸剸犀革師古曰剸截也音之兗反又音徒官反忽若彗汜畫塗師古曰彗帚也汜汜灑地也塗泥也如以帚埽汜灑之地以刀畫泥中言其易宋祁曰别本注文只一汜字如此則使離婁督繩公輸削墨張晏曰離婁黄帝時明目者也應劭曰公輸魯般性巧者也師古曰督察視也雖崇臺五增延袤百丈而不溷者工用相得也師古曰溷亂也音胡頓反庸人之御駑馬亦傷吻敝策而不進於行師古曰吻口角也策所以擊馬也匈喘膚汗人極馬倦及至駕齧䣛驂乗旦孟康曰良馬低頭口至䣛故曰齧䣛張晏曰駕則旦至故曰乘旦師古曰乗音食證反王良執靶張晏曰王良郵無恤字伯樂晉灼曰靶音霸謂轡也師古曰參驗左氏傳及國語孟子郵無恤郵良劉無止王良總一人也楚辭云驥躊躇於敝輦遇孫陽而得代王逸云孫陽伯樂姓}
