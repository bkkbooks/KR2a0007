  - {type: variant, offset: 5889, length: 262, content: 敝府臧空虛下至眾庶熬熬苦之故陵因天性據真土處勢高敞旁近祖考前又已有十年功緒宜還復故陵勿徙民上乃下詔罷昌陵語在成紀丞相御史請廢昌陵邑中室奏未下人以問湯第宅不徹得毋復發徙湯曰縣官且順聽群臣言猶且復發徙之也時成都侯商新為大司馬衛將軍輔政素不善湯商聞此語白湯惑眾下獄治按驗諸所犯湯前為騎都尉王莽上書言父早死獨不封母明君共養皇太后尤勞苦宜封竟為新都侯後皇太后同母弟苟參為水衡都尉死子伋為侍中參妻欲為伋求封湯受其金五十斤許為求比上奏弘農太守張匡坐臧百萬以上狡猾不道有詔即訊恐下獄使人報湯湯為訟罪得踰冬月許謝錢二百萬皆此類也事在赦前後東萊, WYG: 凡立}
