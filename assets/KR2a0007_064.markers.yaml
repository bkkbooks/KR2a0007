  - {type: variant, offset: 632, length: 0, content: '', WYG: 世務書奏上召見三人謂曰公皆安在何相見之晩也師古曰言皆者各在何處宋祁曰皆字疑作比謂言比來在何處也若云皆安在則似淺而不雅廼拜偃樂安皆為郎中偃數上疏言事遷謁者中郎中大夫歲中四遷偃說上曰古者諸侯地不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為滛亂急則阻其彊而合從師古曰從音子容反以逆京師今以法割削則逆節萌起師古曰萌謂事之始生如草木之萌芽也前日朝錯是也今諸侯子弟或十數而適嗣代立師古曰適讀曰嫡餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計又說上曰茂陵初立天下豪桀兼并之家亂衆民皆可徙茂陵内實京師外銷姦猾此所謂不誅而害除上又從之尊立衛皇后及發燕王定國陰事偃有功焉大臣皆畏其口賂遺累千金或說偃曰大横師古曰横音胡孟反偃曰臣結髪游學四十餘年身不得遂師古曰遂猶逹也親不以為子昆弟不收賔客棄我我阨日久矣丈夫生不五鼎食死則五鼎亨耳張晏曰五鼎食牛羊豕魚麋也諸侯五卿大夫三師古曰五鼎亨之謂被鑊亨之誅吾日暮故倒行逆施之師古曰暮言年齒老也倒行逆施謂不遵常理此語本出伍子胥偃述而稱之偃盛言朔方地肥饒外阻河䝉恬築城以逐}
