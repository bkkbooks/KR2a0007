  - {type: variant, offset: 404, length: 1, content: 漢, WYG: 石渠閣外直宿所止曰廬勞侍從之事懷故土師古曰懐思也出為郡吏會稽東接於海南近諸越師古曰越種非一故言諸北枕大江師古曰枕臨也間}
