  - {type: variant, offset: 1359, length: 0, content: '', WYG: 之義也非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也師古曰言不可盡諱者言必滅亡也後以安為騎馬令師古曰主天子之騎馬也騎音}
