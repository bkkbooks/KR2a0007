  - {type: variant, offset: 406, length: 3, content: 漢兵方, WYG: 濶焉久不聞問具以春秋對毋以蘇秦從横師古曰從音子容反助恐上書謝稱春秋天王出居于鄭不能事母故絶之師古曰周恵王之子襄王也弟叔𢃄有寵於惠后欲立之故襄王避難而出奔也僖二十四年經書天王出居於鄭公羊傳曰王者無外此其言出何不能乎母也臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最如淳曰舊法當使丞奉歲計今助自欲入奉也晉灼曰最凡要也詔許因留侍中有竒異輒使為文師古曰謂非常之文及作賦頌數十篇後淮南王來朝厚賂遺助交私論議及淮南王反事與助相連上薄其罪欲勿誅師古曰以其過為輕小廷尉張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市朱買臣字翁子吳人也家貧好讀書不治産業常艾薪樵賣以給食師古曰艾讀曰刈給供也擔束薪行且誦書其妻亦負戴相隨數止買臣毋歌嘔道中師古曰嘔讀曰謳音一侯反買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴宋祁曰浙本無富字今已四十餘矣女苦日久待我富貴報女功師古曰女皆讀曰汝妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聽去其後買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣饑寒呼飯飲之師古曰飯謂飤之音扶晚反飲音於禁反後數歲買臣隨上計吏為卒將重車}
