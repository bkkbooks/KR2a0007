  - {type: variant, offset: 193, length: 0, content: '', WYG: 不足煩中國往救也自秦時棄不屬師古曰言不臣屬於中華於是助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也師古曰舉總也言總天下乃至京師皆棄也今小國以窮困來告急天子不振尚安所愬師古曰振舉也起也安焉也又何以子萬國乎師古曰子謂畜為臣子也上曰太尉不足與計吾新即位不欲出虎符發兵郡國廼遣助以節發兵會稽會稽守欲距法不為發師古曰以法距之為無符騐也助廼斬一司馬諭意指師古曰以天子意指曉告之遂發兵浮海救東甌未至閩越引兵罷後三歲閩越復興兵擊南越南越守天子約不敢擅發兵而上書以聞上多其義師古曰多猶重也大為發興遣兩將軍將兵誅閩越淮南王安上書諫曰陛下臨天下布德施惠緩刑罰薄賦歛哀鰥寡恤孤獨養耆老振匱乏盛德上隆和澤下洽近者親附遠者懷德天下攝然孟康曰攝安也音奴協反人安其生自以没身不見兵革今聞有司舉兵将以誅越臣安竊為陛下重之師古曰重難也越方外之地劗髮文身之民也晉灼曰淮南云越人劗髪張揖以為古翦字也師古曰劗與翦同張說是也不可以冠帶之國法度理也自三代之盛胡越不與受正朔師古曰與讀曰豫非彊弗能服威弗能制也以為不居之地不牧之民不足以煩中國也師古曰地不可居而民不可牧養也故古者封内甸服師古曰封内謂封圻千里之内也甸服主治王田以供祭祀也封外侯服師古曰封外千里之外也侯候也為王者斥候侯衛賓服服䖍曰侯服之外又有衞服賔賔見於王也侯衞二服同為賓也蠻夷要服師古曰又在侯衛之外而居九州之内也要言以文徳要來之耳音一遙反戎狄荒服師古曰此在九州之外者也荒言其荒忽絶遠來去無常也遠近埶異也自漢初定已來七十二年吳越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中服䖍曰竹叢也音皇師古曰竹田曰篁習於水鬬便於用舟地深昧而多水險師古曰昧暗也言多草木中國之人不知其埶阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里師古曰間中間也或八九百里或千里也阻險林叢弗能盡著師古曰不可盡載於圖也著音竹助反視之若易行之甚難天下賴宗廟之靈方内大寧戴白之老不見兵革師古曰戴白言白髪在首民得夫婦相守父子相保陛下之德也越人名爲藩臣貢酎之奉不輸大内應劭曰越國僻逺珍竒之貢宗廟之祭皆不與也大内都内也國家寶藏也師古曰百官公卿表云治粟屬官有都内令丞也一卒之用不給上事師古曰給供也自相攻擊而陛下發兵救之是反以中國而勞蠻夷也師古曰疲勞中國之人於蠻夷之地且越人愚戇輕薄負約反覆其不用天子之法度非一日之積也師古曰積久也壹不奉詔舉兵誅之臣恐後兵革無時得息也間者數年歲比不登民得賣爵贅子以接衣食如淳曰淮南俗賣子與人作奴婢名為贅子三年不能贖遂為奴婢師古曰贅質也一說云贅子者謂令子出就婦家為贅壻耳贅壻解在賈誼傳賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復師古曰生謂生業復音扶目反今發兵行數千里資衣糧入越地師古曰資猶齎輿轎而隃領服䖍曰轎音橋謂隘道輿車也臣瓚曰今竹輿車也江表作竹輿以行是也項昭曰陵絶水曰轎音旗廟反領山嶺也不通船車運轉皆擔輿也師古曰服音瓚說是也項氏謬矣此直言以轎過領耳何云陵絶水乎又旗廟之音無所依據隃與踰同劉攽曰按今南方竹輿正作旗廟音項亦未可全非柁舟而入水師古曰柁曵也音它行數百千里夾以深林叢竹水道上下擊石師古曰謂船觸石難以行也林中多蝮蛇猛獸師古曰蝮惡蛇也音敷福反解在田儋傳夏月暑時歐泄霍亂之病相隨屬也師古曰泄吐也音弋制反屬音之欲反曾未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍間忌將兵擊之文頴曰先臣淮南厲王長也間忌人姓名師古曰淮南王傳作簡忌此本作間轉寫字誤省耳以其軍降處之上淦蘇林曰淦音耿弇之弇師古曰音工含反後復反會天暑多雨樓船卒水居擊櫂師古曰言常居舟中水上而又有擊櫂行舟之役故多死也櫂音直孝反未戰而疾死者過半親老涕泣孤子謕號師古曰謕古啼字破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣臣聞軍旅之後必有凶年言民之各以其愁苦之氣薄陰陽之和感天地之精師古曰薄廹也而災氣為之生也陛下徳配天地明象日月恩至禽獸澤及草木一人有饑寒不終其天年而死者為之悽愴於心今方内無狗吠之警師古曰方内中國四方之内也而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開師古曰晏晚也言有兵難故邊城早閉而晚開也鼂不及夕師古曰鼂古朝字也言憂危亡不自保也臣安竊為陛下重之師古曰重難也不習南方地形者多以越為人衆兵彊能難邉城服䖍曰謂邊城作難也淮南全國之時多為邊吏師古曰全國謂未分為三之時也淮南人於邊為吏與越接境故知其地形也臣竊聞之與中國異師古曰言其風土不同限以髙山人迹所絶車道不通天地所以隔外内也其入中國必下領水領水之山峭峻漂石破舟師古曰言水流湍急石為之漂轉觸破舟船也漂音匹遙反不可以大船載食糧下也越人欲爲變必先田餘干界中韋昭曰越邑今鄱陽縣也積食糧廼入伐材治船邊城守候誠謹越人有入伐材者輒收捕焚其積聚雖百越奈邊城何宋祁曰浙本奈字上有無字且越人緜力薄材孟康曰緜音滅薄力也師古曰緜弱也言其柔弱如緜讀如本字孟說非也不能陸戰又無車騎弓弩之用然}
