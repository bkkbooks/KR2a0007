  - {type: variant, offset: 623, length: 0, content: '', krp: 侍中丞相公孫𢎞奏言民不得挾弓弩十賊彍弩百吏不敢前張晏曰彍音郭師古曰引滿曰彍盜賊不輒伏辜免脫者衆害寡而利多此盜賊所以蕃也師古曰蕃亦多也音扶元反禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其埶必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議壽王對曰臣聞古者作五兵非以相害以禁暴討邪也師古曰五兵謂矛㦸弓劒戈安居則以制猛獸而備非常有事則以設守衛而施行陣及至周室衰微上無明王諸侯力政彊侵弱衆暴寡海内抏敝師古曰抏訛盡也音五官反巧詐並生是以知者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令師古曰以法令為首去仁恩而任刑戮師古曰去除也墮名城師古曰墮毁也音火規反殺豪桀銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊師古曰耰摩田之器也箠馬撾也梃大杖也耰音憂箠音之累反梃音大鼎反犯法滋衆盜賊不勝師古曰滋益也不勝言不可勝也至於赭衣塞路羣盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭眀德建太平舉俊材興學官三公有司或由窮巷起白屋裂地而封師古曰白屋以白茅覆屋也壽王言此者并以譏公孫宏宇内日化方外鄉風師古曰鄉讀曰嚮然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也師古曰有四方捍禦之事孔子曰吾何執執射乎師古曰論語載孔子之言大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功師古曰小雅賔之初筵之詩也侯所以居的以皮為之天子射豹侯諸侯射熊侯卿大夫射麋侯士射鹿豕侯抗舉也射夫衆射者也同同耦也言既舉大侯又張弓矢分耦而射則獻其發矢中的之功也言貴中也師古曰中音竹仲反愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁師古曰抵觸也是擅賊威而奪民救也師古曰擅專也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相𢎞𢎞詘服焉及汾陰得寶鼎武帝嘉之薦見宗廟臧於甘泉宮羣臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎上聞之召而問之曰今朕得周鼎羣臣皆以為然壽王獨以為非何也有說則可無說則死壽王對曰臣安敢無說臣聞周德始乎后稷長於公劉大於太王師古曰公劉后稷曾孫也太王文王之祖則古公亶父也成於文武顯於周公德澤上昭天下漏泉師古曰昭明也漏言潤澤下霑如屋之漏無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周亦昭德顯行布恩施惠六合和同至於陛下恢廓祖業功德愈盛天瑞並至珍祥畢見昔秦始皇親出鼎於彭城而不能得天祚有德而寶鼎自出此天之所以與漢廼漢寶非周寶也上曰善羣臣皆稱萬歲是日賜壽王黄金十斤後坐事誅主父偃齊國臨菑人也學長短縱横術服䖍曰蘇秦法百家書說也師古曰長短解在張湯傳從横說在藝文志晚廼學易春秋百家之言游齊諸子間師古曰諸子諸侯王子諸儒生相與排儐不容於齊家貧假貣無所得師古曰貣音土得反北游燕趙中山皆莫能厚客甚困以諸侯莫足游者元光元年廼西入關見衛將軍師古曰衛青衛將軍數言上上不省資用乏留久諸侯賔客多厭之廼上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺策而功流萬世今臣不敢隱忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危師古曰司馬穰苴善用兵著書言兵法謂之司馬法一說司馬古主兵之官有軍陳用兵之法天下既平天子大愷應劭曰大愷周禮還師振旅之樂也春蒐秋獮諸侯春振旅秋治兵所以不忘戰也師古曰春為陽中其行木也秋為陰中其行金也金木兵器所資故於此時蒐獮治兵也蒐蒐索也取不孕者獮應殺氣也振整旅衆也獮音先淺反且怒者逆德也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之師古曰重難也夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海内為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也李竒曰不可和調也勝必棄之非民父母靡敝中國甘心匈奴師古曰靡散也音縻其下類此非完計也秦皇帝不聽遂使蒙恬將兵而攻胡郤地千里以河為境地固澤鹵不生五榖師古曰地多沮澤而鹹鹵然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆之不足兵革之不備哉其埶不可也又使天下飛芻輓粟師古曰運載芻槀令其疾至故曰飛芻也輓謂引車船也音晚起於黄腄琅邪負海之郡轉輸北河師古曰黄腄二縣名也並在東萊言自東萊及琅邪緣海諸郡皆令轉輸至北河也腄音直瑞反又音誰率三十鍾而致一石師古曰六斛四斗為鍾計其道路所費凡用百九十二斛乃得一石至男子疾耕不足於糧餉師古曰餉亦饟字女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道死者相望師古曰道死謂死於路也盖天下始叛也及至高皇帝定天下略地於邊聞匈奴聚代谷之外而欲擊之御史成諌曰不可夫匈奴獸聚而鳥散從之如搏景師古曰摶擊也摶人之陰景言不可得也今以陛下盛德攻匈奴臣竊危之髙帝不聽遂至代谷果有平城之圍髙帝悔之廼使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺將師古曰覆音芳目反係虜單于適足以結怨深讎不足以償天下之費夫匈奴行盜侵敺所以為業天性固然師古曰來侵邊境而敺略人畜也敺與驅同其字從攴音普木反上自虞夏殷周固不程督師古曰程課也督視責也禽獸畜之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所疾苦也且夫兵久則變生事苦則慮易師古曰言思慮變易失其常也使邊境之民靡敝愁苦將吏相疑而外市張晏曰與外國交市已利若章邯之比也故尉佗章邯得成其私師古曰佗音徒何反而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用師古曰此周書者木尚書之餘願陛下孰計之而加察焉}
