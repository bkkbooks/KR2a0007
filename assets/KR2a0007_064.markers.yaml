  - {type: variant, offset: 637, length: 1, content: 車, WYG: 蚡通鑑考異曰是時蚡不為太尉云太尉誤也下云太尉不足與計盖亦追呼其官或亦誤耳必先田餘干界中注韋昭曰越邑臣召南按韋注非也餘干卽志所謂餘汗屬豫章郡非越邑也越人先於餘干縣接界之地治田耳閩越王弟甲注}
