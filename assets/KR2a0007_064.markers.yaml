  - {type: variant, offset: 4070, length: 1112, content: 今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不錄小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫燕喜既多受祉來歸自鎬我行永久千里之鎬猶以為遠況萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功久挫於刀筆之前非所以勸有功厲戎士也昔齊桓公前有尊周之功後有滅項之罪君子以功覆過而為之諱行事貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞而廑獲駿馬三十匹雖斬宛王母鼓之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不錄其過遂封拜兩侯三卿二千石百有餘人今康居國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於貳師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則高於安遠長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔曰匈奴郅支單于背畔禮義留殺漢使者吏士甚逆道理朕豈忘之哉所以優游而不征者重動師眾勞將帥故隱忍而未有云也今延壽湯睹便宜乘時利結城郭諸國擅興師矯制而征之賴天地宗廟之靈誅討郅支單于斬獲其首及閼氏貴人名王以下千數雖踰義干法內不煩一夫之役不開府庫之臧因敵之糧以贍軍用立功萬里之外威震百蠻名顯四海為國除殘兵革之原息邊竟得以安然猶不免死亡之患罪當在於奉憲朕甚閔之其赦延壽湯罪勿治詔公卿議封焉議者皆以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絕域非真單于元帝取安遠侯鄭吉故事封千戶衡顯復爭及封延壽為義成侯賜湯爵關內侯食邑各三百戶加賜黃金百斤告上帝宗廟大赦天下拜延壽為長水校尉湯為射聲校尉延壽遷城門校尉護軍都尉薨於官成帝初即位丞相衡復奏湯以吏二千石奉使顓命蠻夷中不正身以先下而盜所收康居財物戒官屬曰絕域事不覆校雖在赦前不宜處位湯坐免後湯上書言康居王侍子非王子也按驗實王子也湯下獄當死太中大夫谷永上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐趙有廉頗馬服彊秦不敢窺兵井陘近漢有郅都魏尚匈奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將率之臣竊見關內侯陳湯前使副西域都護忿郅支之無道閔王誅之不加策慮愊億義勇奮發卒興師奔逝橫厲烏孫踰集都賴屠三重城斬郅支首報十年之逋誅雪邊吏之宿恥威震百蠻武暢西海漢元以來征伐方外之將未嘗有也今湯坐言事非是幽囚久繫歷時不決執憲之吏欲致之大辟昔白起為秦將南拔郢都北阬趙括以纖介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告類上帝介冑之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷蓋之報況國之功臣者哉竊恐陛下忽於鼓鼙之聲不察周書之意而忘帷蓋之施庸臣遇湯卒從吏議使百姓介然有秦民, WYG: 亦何排陷}
