  - {type: variant, offset: 1627, length: 3, content: 帝詔列, WYG: 鼎三年有司始言元不宜以一二數乃云三元為狩盖於此年追述三元也而軍此云宜改元史又云由是改元有来降者皆可疑軍對非真史誤因之苴白茅於江淮發嘉號于營丘以應緝熙服䖍曰苴作席也張晏曰江淮職貢三脊茅為藉也孟康曰嘉號封禪也泰山在齊分野故曰營丘也或曰登封泰山以明姓號也師古曰苴音祖又音子豫反非苞苴之苴也使著事者有紀焉師古曰謂史官也紀記也蓋六鶂退飛逆也張晏曰六鶂退飛象諸}
  - {type: page-break, offset: 1627, content: '', id: KR2a0007_WYG_064-38b, image: WYG0250/WYG0250-0389b.png}
  - {type: variant, offset: 1627, length: 3, content: 帝詔列, krp: 鼎三年有司始言元不宜以一二數乃云三元為狩盖於此年追述三元也而軍此云宜改元史又云由是改元有来降者皆可疑軍對非真史誤因之苴白茅於江淮發嘉號于營丘以應緝熙服䖍曰苴作席也張晏曰江淮職貢三脊茅為藉也孟康曰嘉號封禪也泰山在齊分野故曰營丘也或曰登封泰山以明姓號也師古曰苴音祖又音子豫反非苞苴之苴也使著事者有紀焉師古曰謂史官也紀記也蓋六鶂退飛逆也張晏曰六鶂退飛象諸}
  - {type: variant, offset: 1631, length: 7, content: 舉茂材勃舉湯湯, WYG: 畔逆宋襄公伯道退也白魚登舟順也張晏曰周木德也舟木也殷水德魚水物魚躍登舟象諸侯順周以紂畀武王也臣瓉曰時論者未以周為木殷為水也謂武王伐殷而魚入王舟象征而必獲故曰順也師古曰瓉說是也夫明闇之徵上亂飛鳥下動淵魚師古曰亂變也各以類推今野獸并角明同本也師古曰并合也獸皆兩角今此獨一故云并也衆支内附示無外也若此之應殆將有解編髮削左祍襲冠帶要衣裳而蒙化者焉師古曰要衣裳謂著中國之衣裳也編讀曰辮要音一遙反斯拱而竢之耳師古曰拱手而}
  - {type: page-break, offset: 1631, content: '', id: KR2a0007_WYG_064-39a, image: WYG0250/WYG0250-0390a.png}
