  - {type: variant, offset: 3729, length: 3, content: 今司隸, WYG: 皆稱能觀其下筆屬文則董仲舒進談動辭則東方生置之爭臣則汲直張晏曰汲黯方直故世謂之汲直用之介胄則冠軍侯施之治民則趙廣漢抱公絶私則尹翁歸興兼此六人而有之守道堅固執義不囘師古曰囘邪也臨大節而不可奪國之良臣也可試守京兆尹石顯聞知白之上廼下興捐之獄令皇后父陽平侯禁與顯共雜治奏興捐之懐詐偽以上語相風更相薦譽師古曰風讀曰諷更音工衡}
