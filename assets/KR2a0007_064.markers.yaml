  - {type: variant, offset: 635, length: 1, content: 騎, WYG: 三十萬衆築北河終不可就師古曰就成也已而棄之朱買臣難詘𢎞遂置朔方本偃計也元朔中偃言齊王内有滛失之行師古曰失讀曰佚音尹一反上拜偃為齊相至齊徧召昆弟賔客散五百金予之數曰師古曰數責也數音所具反始吾貧時昆弟不我衣食賔客不我内門師古曰衣音於既反食讀曰飤内門謂内之於門中也今我相齊諸君迎我或千里吾與諸君絶矣毋復入偃之門廼使人告王與姊姦事動王宋祁曰越本告作以王以為終不得脫恐效燕王論死廼自殺偃始為布衣時嘗游燕趙及其貴發燕事趙王恐其為國患欲上書言其陰事為居中不敢發及其為齊相出關即使人上書告偃受諸侯金以故諸侯子多以得封者及齊王以自殺聞宋祁曰浙本云及齊以王自殺聞上大怒以為偃劫其王令自殺廼徵下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫𢎞爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下廼遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以車為長者徐樂燕郡無終人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳渉無千乘之尊尺土之地宋祁曰越本尺作疆身非王公大人名族之後鄉曲之譽非有孔曾墨子之賢陶朱猗頓之富也然起窮巷奮棘矜師古曰棘㦸也矜者㦸之把也時秦銷兵器故但有㦸之把耳矜音巨巾反此下亦同偏袒大呼師古曰呼音火故反天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不脩此三者陳渉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地師古曰攘謂侵取漢地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳渉也當是之時先帝之德未衰而安土樂俗之民衆故諸侯無竟外之助師古曰竟讀曰境其下同此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之埶雖布衣窮處之士或首難而危海内師古曰首難謂首唱而作難也陳渉是也況三晉之君或存乎師古曰韓魏趙三國本共分晉故稱三晉天下雖未治也誠能無土崩之埶雖有彊國勁兵不得還踵而身為禽師古曰還讀曰旋吳楚是也況羣臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也閒者闗東五榖數不登宋祁曰浙本無數字年歲未復師古曰復音扶目反民多窮困重之以邊境之事師古曰重音直用反推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之埶也故賢主獨觀萬化之原明於安危之機脩之廟堂之上而銷未形之患也其要期使天下無土崩之埶而已矣故雖有彊國勁兵陛下逐走獸射飛鳥𢎞游燕之囿􅁋從恣之觀極馳騁之樂自若師古曰自若者言如其常無所廢損也從讀曰縱金石絲竹之聲不絶於耳帷幄之私俳優朱儒之笑不乏於前而天下無宿憂師古曰宿久也名何必夏子俗何必成康服䖍曰夏禹也子湯也湯子姓雖然臣竊以為陛下天然之質寛仁之資而誠以天下為務則禹湯之名不難侔而成康之俗未必不復興也師古曰侔等也此二體者立然後處尊安之實揚廣譽於當世親天下而服四夷餘恩遺德為數世隆南面背依攝袂而揖王八師古曰依讀曰扆已解於上此陛下之所服也師古曰服事也臣聞圖王不成其敝足以安師古曰言其敝末之法猶足自安也安則陛下何求而不得何威而不成奚征而不服哉師古曰奚何也前漢書卷六十四上前漢書卷六十四上考證嚴助傳獨擢助爲中大夫臣召南按助對策在建元元年膠倉臣召南按藝文志作聊蒼縱横家有待詔金馬聊蒼三篇班自注曰趙人武帝時又嚴葱竒志作莊怱竒官常侍郎有賦十一篇班自注曰枚臯同時盖其人本姓莊史因避明帝諱改為嚴猶莊忌莊助稱嚴忌嚴助也以問太尉}
