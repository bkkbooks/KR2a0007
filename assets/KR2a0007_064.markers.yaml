  - {type: variant, offset: 1360, length: 154, content: 封吉為安遠侯食邑千戶吉於是中西域而立莫府治烏壘城鎮撫諸國誅伐懷集之漢之號令班西域矣始自張騫而成於鄭吉語在西域傳吉薨諡曰繆侯子光嗣薨無子國除元始中錄功臣不以罪絕者封吉曾孫永為安遠侯甘延壽字君況北地郁郅人也少以良家子善騎射為羽林投石拔距絕於等倫嘗超踰羽林亭樓由是遷為郎試弁為期門以材力愛幸稍遷至遼東太守免官車騎將, WYG: 寄反終}
