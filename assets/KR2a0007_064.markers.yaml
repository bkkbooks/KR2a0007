  - {type: variant, offset: 349, length: 0, content: '', WYG: 上書言事聞之朕奉先帝之休德夙興夜寐明不能燭師古曰燭照也重以不德師古曰重音直用反是以比年凶葘害衆師古曰葘古災字夫以𦕈𦕈之身託于}
  - {type: variant, offset: 349, length: 0, content: '', krp: 上書言事聞之朕奉先帝之休德夙興夜寐明不能燭師古曰燭照也重以不德師古曰重音直用反是以比年凶葘害衆師古曰葘古災字夫以𦕈𦕈之身託于}
  - {type: variant, offset: 350, length: 4, content: 起隨介子, WYG: 侯之上内有饑寒之民南夷相攘師古曰攘謂相侵奪也音人羊反使邊騷然不安朕甚懼焉今王深惟重慮師古曰惟思也慮計也明太平以弼朕失稱三代至盛際天接地人迹所及咸盡賓服藐然甚慙如淳曰王之所言藐然聞之甚慙也師古曰藐謂遠也言不可及也藐音武卓反嘉王之意靡有所終師古曰靡無也終極也使中大夫助諭朕意告王越事助諭意曰今者大王以發屯臨越事上書陛下故遣臣助告王其事王居遠事薄遽不與王同其計如淳曰薄廹也言事迫不暇得先與王共議之或曰薄語助也師古曰薄迫是也遽速也音其据反朝有闕政遺王之憂師古曰朝政有闕乃使王有憂也遺猶與也陛下甚恨之夫兵固凶器明主之所重出也師古曰重難也然自五帝三王禁暴止亂非兵未之聞也漢為天下宗操殺生之柄師古曰操執持也音千髙反以制海内之命危者望安亂者卬治師古曰卬讀曰仰謂仰而望之今閩越王狼戾不仁師古曰狼性貪戾凡言狼戾者謂貪而戾殺其骨肉離其親戚所為甚多不義又數舉兵侵陵百越并兼鄰國以為暴彊陰計竒策}
