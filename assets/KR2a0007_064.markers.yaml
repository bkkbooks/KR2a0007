  - {type: variant, offset: 1601, length: 1, content: 求, WYG: 上書言事武帝異其文拜軍為謁者給事中從上幸雍祠五畤獲白麟一角而五蹄師古曰每一足有五蹄也時又得竒木其枝旁出輙復合於木上上異此二物博謀羣臣師古曰訪其徵應也軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚羣師古曰葭蘆也成長則曰葦葭音加正朔不及其俗有司臨境而東甌内附閩王伏辜南越賴救北胡隨畜薦居蘇林曰薦草也師古曰蘇說非也薦讀曰荐荐屢也言隨畜牧屢易故居不安住也左傳戎狄荐居者也宋祁曰注文中左字下當有氏字禽獸行虎狼心上古未能攝大將軍秉鉞單于犇幕師古曰犇古奔字票騎抗旌昆邪右衽師古曰抗舉也右衽從中國化也昆音下門反是澤南洽而威北暢也師古曰洽溥也暢達也若罰不阿近舉不遺逺設}
  - {type: page-break, offset: 1601, content: '', id: KR2a0007_WYG_064-37a, image: WYG0250/WYG0250-0388a.png}
  - {type: variant, offset: 1601, length: 1, content: 求, krp: 上書言事武帝異其文拜軍為謁者給事中從上幸雍祠五畤獲白麟一角而五蹄師古曰每一足有五蹄也時又得竒木其枝旁出輙復合於木上上異此二物博謀羣臣師古曰訪其徵應也軍上對曰臣聞詩頌君德樂舞后功異經而同指明盛德之所隆也南越竄屏葭葦與鳥魚羣師古曰葭蘆也成長則曰葦葭音加正朔不及其俗有司臨境而東甌内附閩王伏辜南越賴救北胡隨畜薦居蘇林曰薦草也師古曰蘇說非也薦讀曰荐荐屢也言隨畜牧屢易故居不安住也左傳戎狄荐居者也宋祁曰注文中左字下當有氏字禽獸行虎狼心上古未能攝大將軍秉鉞單于犇幕師古曰犇古奔字票騎抗旌昆邪右衽師古曰抗舉也右衽從中國化也昆音下門反是澤南洽而威北暢也師古曰洽溥也暢達也若罰不阿近舉不遺逺設}
  - {type: punctuation, offset: 1603, content: ，, id: KR2a0007_tls_064-bkkpn313}
  - {type: 'tls:seg', offset: 1603, content: '', id: KR2a0007_tls_064-16a.9}
  - {type: variant, offset: 1603, length: 3, content: 得太官, WYG: 竢賢縣賞待功師古曰竢古俟字次下亦同能者進以保祿罷者退而勞力師古曰罷讀曰疲謂不堪職任者也勞力歸農畝也刑於宇内矣師古曰刑法也言成法於宇内也一曰刑見也履衆美而不足懷聖明而不專師古曰言自謙也建三宫之文質章厥職之所宜服䖍曰三宫明堂辟雍靈臺也鄭氏曰於三宫班政敎有文質者也封禪之君無聞焉張晏曰前世封禪之君不聞若斯之美也夫天命初定萬事草創師古曰謂始受命之君也及臻六合同風九州共貫必待明聖潤色祖業傳於無窮師古曰潤色謂光飾之故周至成王然後制定而休徵之應見師古曰休美也徵證也陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宫師古曰燔祭天也瘞祭地也祭天則燒之祭地則薶之郊宫謂泰畤及后土也劉攽曰是時未有泰畤后土顔注失之}
  - {type: page-break, offset: 1603, content: '', id: KR2a0007_WYG_064-37b, image: WYG0250/WYG0250-0388b.png}
  - {type: variant, offset: 1603, length: 3, content: 得太官, krp: 竢賢縣賞待功師古曰竢古俟字次下亦同能者進以保祿罷者退而勞力師古曰罷讀曰疲謂不堪職任者也勞力歸農畝也刑於宇内矣師古曰刑法也言成法於宇内也一曰刑見也履衆美而不足懷聖明而不專師古曰言自謙也建三宫之文質章厥職之所宜服䖍曰三宫明堂辟雍靈臺也鄭氏曰於三宫班政敎有文質者也封禪之君無聞焉張晏曰前世封禪之君不聞若斯之美也夫天命初定萬事草創師古曰謂始受命之君也及臻六合同風九州共貫必待明聖潤色祖業傳於無窮師古曰潤色謂光飾之故周至成王然後制定而休徵之應見師古曰休美也徵證也陛下盛日月之光垂聖思於勒成專神明之敬奉燔瘞於郊宫師古曰燔祭天也瘞祭地也祭天則燒之祭地則薶之郊宫謂泰畤及后土也劉攽曰是時未有泰畤后土顔注失之}
  - {type: variant, offset: 1607, length: 7, content: 食丞數歲富平侯, WYG: 享之精交神積和之氣塞明師古曰塞荅也明者明靈亦謂神也而異獸來獲宜矣昔武王中流未濟白魚入於王舟俯取以燎羣公咸曰休哉師古曰謂伐紂時解在董仲舒傳今郊祀未見於神祗而獲獸以饋師古曰以饋謂充祭爼也此天之所以示饗而上通之符合也宜因昭時令日改定告元}
