  - {type: variant, offset: 641, length: 0, content: '', WYG: 古注非朱買臣傳故東越王居保泉山注師古曰卽今泉州之山也臣召南按泉山今曰清源山在泉州府城北去海甚近而下文乃云今聞東越王更徙處南行去泉山五百里居大澤中然則所謂大澤中者卽大海中島嶼歟買臣入室中顧炎武曰卽㑹稽邸中也邸如今京師之會館受詔將兵}
