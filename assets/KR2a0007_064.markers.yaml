  - {type: variant, offset: 5575, length: 224, content: 陵數年後樂霸陵曲亭南更營之萬年與湯議以為武帝時工楊光以所作數可意自致將作大匠及大司農中丞耿壽昌造杜陵賜爵關內侯將作大匠乘馬延年以勞苦秩中二千石今作初陵而營起邑居成大功萬年亦當蒙重賞子公妻家在長安兒子生長長安不樂東方宜求徙可得賜田宅俱善湯心利之即上封事言初陵京師之地最為肥美可立一縣天下民不徙諸陵三十餘歲矣關東富人益眾多規良田役使貧民可徙初陵以彊京師衰弱諸侯又使中家以下得均貧富湯願與妻子家屬徙初陵為天下先於是天子從其計果起昌陵邑後徙內郡國民萬年自詭, WYG: 元}
