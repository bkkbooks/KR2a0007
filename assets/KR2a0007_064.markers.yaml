  - {type: 'tls:seg', offset: 214, content: '', id: KR2a0007_tls_064-3a.8}
  - {type: variant, offset: 214, length: 3, content: 願往刺, WYG: 多言之耳共讀曰供租稅之收足以給乘輿之御玩心神明秉執聖道負黼依師古曰負背也白與黑畫為斧文謂之黼也依讀曰扆扆形如屏風而曲之畫以黼文張於户牖之間馮玉几師古曰馮讀曰凭南面而聽斷號令天下四海之内莫不嚮應師古曰嚮讀曰響陛下垂德惠以覆露之師古曰露謂使之沾潤澤也或露或覆言飬育也使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也師古曰維謂聨繫之夷狄之地何足以為一日之閒如淳曰得其地物不足為一日閒暇之虞也而煩汗馬之勞乎詩云王猶允塞徐方旣來師古曰大雅常武之詩猶道也允信也塞滿也既盡也言王道信充滿於天下則徐方淮夷盡來服也言王道甚大而遠方懷之也臣聞之農夫勞而君子養焉師古曰言農夫勤力於耕稼所得五榖以飬君子也愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邊境有警愛身之死而不畢其愚非忠臣也師古曰畢盡也盡言其意也臣安竊恐將吏}
  - {type: page-break, offset: 214, content: '', id: KR2a0007_WYG_064-9b, image: WYG0250/WYG0250-0374b.png}
  - {type: page-break, offset: 214, content: '', id: KR2a0007_WYG_064-10a, image: WYG0250/WYG0250-0374c.png}
