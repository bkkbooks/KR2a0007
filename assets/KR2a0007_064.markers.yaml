  - {type: variant, offset: 6952, length: 763, content: 百戶追諡湯曰破胡壯侯封湯子馮為破胡侯勳為討狄侯段會宗字子松天水上邽人也竟寧中以杜陵令五府舉為西域都護騎都尉光祿大夫西域敬其威信三歲更盡還拜為沛郡太守以單于當朝徙為雁門太守數年坐法免西域諸國上書願得會宗陽朔中復為都護會宗為人好大節矜功名與谷永相友善谷永閔其老復遠出予書戒曰足下以柔遠之令德復典都護之重職甚休甚休若子之材可優遊都城而取卿相何必勒功昆山之仄總領百蠻懷柔殊俗子之所長愚無以喻雖然朋友以言贈行敢不略意方今漢德隆盛遠人賓服傅鄭甘陳之功沒齒不可復見願吾子因循舊貫毋求奇功終更亟還亦足以復雁門之踦萬里之外以身為本願詳思愚言會宗既出諸國遣子弟郊迎小昆彌安日前為會宗所立德之欲往謁諸翕侯止不聽遂至龜茲謁城郭甚親附康居太子保蘇匿率眾萬餘人欲降會宗奏狀漢遣衛司馬逢迎會宗發戊己校尉兵隨司馬受降司馬畏其眾欲令降者皆自縛保蘇匿怨望舉眾亡去會宗更盡還以擅發戊己校尉之兵乏興有詔贖論拜為金城太守以病免歲餘小昆彌為國民所殺諸翕侯大亂微會宗為左曹中郎將光祿大夫使安輯烏孫立小昆彌兄末振將定其國而還明年末振將殺大昆彌會病死漢恨誅不加元延中復遣會宗發戊己校尉諸國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地選精兵三十弩徑至昆彌所在召番丘責以末振將骨肉相殺殺漢公主子孫未伏誅而死使者受詔誅番丘即手劍擊殺番丘官屬以下驚恐馳歸小昆彌烏犁靡者末振將兄子也勒兵數千騎圍會宗會宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪會宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去會宗還奏事公卿議會宗權得便宜以輕兵深入烏孫即誅番丘宣明國威宜加重賞天子賜會宗爵關內侯黃金百斤是時小昆彌季父卑爰疐擁眾欲害昆彌漢復遣會宗使安輯與都護孫建并力明年會宗病死烏孫中年七, WYG: ''}
