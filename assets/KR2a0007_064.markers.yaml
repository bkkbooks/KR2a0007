  - {type: variant, offset: 1352, length: 2, content: 兜訾, WYG: 古曰累音力瑞反非所以子民也師古曰子謂養之如子也行無窮之欲甘心快意結怨於匈奴非所以安邊也禍挐而不解師古曰挐相連引也音女居反兵休而復起近者愁苦遠者驚駭非所以持久也今天下鍜甲摩劒矯箭控弦師古曰矯正曲使直也控引也轉輸軍糧未見休時此天下所共憂也夫兵多而變起宋祁曰多或作久事煩而慮生今外郡之地或幾千里師古曰幾音鉅依反次下亦同列}
