  - {type: variant, offset: 396, length: 4, content: 當更立前, WYG: 隕命輙遣使者罷屯毋後農時師古曰令及農時不待後也南越王甚嘉被惠澤䝉休德願革心易行身從使者入謝師古曰革改也有狗馬之病不能勝服師古曰服謂朝服也故遣}
