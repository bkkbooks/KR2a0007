  - {type: variant, offset: 195, length: 0, content: '', WYG: 可入者以保地險而中國之人不能其水土也師古曰能堪也臣聞越甲卒不下數十萬所以入之五倍廼足師古曰不下言不減也漢軍多之五倍然後可入其地也輓車奉饟者不在其中師古曰輓引也音晚饟亦餉字南方暑溼近夏癉熱師古曰癉黄病音丁幹反暴露水居蝮蛇蠚生師古曰蠚毒也音壑宋祁曰浙本生作蟲疾癘多作宋祁曰景木癘作災兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡師古曰舉謂總取也臣聞道路言閩越王弟甲弑而殺之師古曰甲者閩王弟之名甲以}
