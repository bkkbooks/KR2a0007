  - {type: variant, offset: 3596, length: 7, content: 許嘉右將軍王商, WYG: 言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡廼以少府禁錢續之師古曰少府錢主供天子故曰禁錢夫一隅為不善費尚如此況於勞師逺攻亡士毋功乎求之往古則不合施之當今又不便臣愚}
