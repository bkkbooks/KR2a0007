  - {type: variant, offset: 1977, length: 2, content: 節承, WYG: 中稱以出疆何也且鹽鐵郡有餘臧師古曰先有畜積正二國廢國家不足以為利害而以安社稷存萬民為辭何也又詰偃膠東南近琅邪北接北海魯國西枕泰山東有東海受其鹽鐵偃度四郡口數田地師古曰度計也音大各反率其用器食鹽不足以并給二郡邪將埶宜有餘而吏不能也何以言之偃矯制而鼓鑄者欲及春耕種贍民器也師古曰贍足也今魯國之鼓當先具其備師古曰備者猶今言調度至秋乃能舉火此言與實反者非師古曰重問之偃已前三奏無詔師古曰不報聽也不惟所為不許師古曰惟思也而直矯作威福以從民望干名采譽師古曰干求也采取也此}
