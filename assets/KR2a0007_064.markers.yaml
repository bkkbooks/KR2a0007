  - {type: variant, offset: 3589, length: 2, content: 宜勿, WYG: 寇賊並起軍旅數發父戰死於前子鬬傷於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭師古曰淚流被面以入於口故言飲泣也遙設虚祭想魂乎萬里之外淮南王盜寫虎符隂聘名士關東公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路如淳曰席音藉師古曰席即藉也不勞借音人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中師古曰擠墜也音子詣反又子奚反快心幽㝠之地非所以校助饑饉保全元元也宋祁曰校助當作救助詩云蠢爾蠻荆大邦為讎師古曰詩小雅采芑之詩也蠢動貌也蠻荆荆州之蠻也言敢與大國為讎敵也言聖人起則後服中國衰則先畔動為國家難自古而患之久矣何况廼復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡}
