  - {type: variant, offset: 8145, length: 843, content: 謂之風好惡取舍動靜亡常隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其末此混同天下一之虖中和然後王教成也漢承百年朱一新說汪本年作王是按景祐殿本都作王王朱一新說汪本年作王是按景祐殿本都作王之末國土變改民人遷徙成帝時劉向略言其域景祐殿本都作地地景祐殿本都作地分丞相張禹使屬潁川朱贛條其風俗猶未宣究故輯而論之終其本末著於篇秦地於天官東井輿鬼之分野也其界自弘農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂柯越巂益州皆宜屬焉秦之先曰柏益出自帝顓頊堯時助禹治水為舜朕虞養育草木鳥獸賜姓嬴氏歷夏殷為諸侯至周有造父善馭習馬得華駵綠耳之乘幸於穆王封於趙城故更為趙氏後有非子為周孝王養馬汧渭之間孝王曰昔伯益知禽獸子孫不絕乃封為附庸邑之於秦今隴西秦亭秦谷是也至玄孫氏為莊公破西戎有其地子襄公時幽王為犬戎所敗平王東遷雒邑襄公將兵救周有功賜受𨙸酆之地列為諸侯後八世穆公稱伯以河為竟十餘世孝公用商君制轅田開仟伯東雄諸侯子惠公初稱王得上郡西河孫昭王開巴蜀滅周取九鼎昭王曾孫政并六國稱皇帝負力怙威燔書阬儒自任私智至子胡亥天下畔之故秦地於禹貢時跨雍梁二州詩風兼秦豳兩國昔后稷封斄公劉處豳大王徙𨙸文王作酆武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備有鄠杜竹林南山檀柘號稱陸海為九州膏腴始皇之初鄭國穿渠引涇水溉田沃野千里民以富饒漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵蓋亦以彊幹弱支非獨為奉山園也是故五方雜厝風俗不純其世家則好禮文富人則商賈為利豪桀則游俠通姦瀕南山近夏陽多阻險輕薄易為盜賊常為天下劇又郡國輻湊浮食者多民去本就末列侯貴人車服僭上眾庶放效羞不相及嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近戎狄修習戰備高上氣力以射獵為先故秦詩曰在其板屋又曰王于興師修我甲兵與子偕行及車轔四臷小戎之篇皆言車馬田狩之事漢興六郡良家子選給羽林期門以材力為官名將多出, WYG: 博采}
