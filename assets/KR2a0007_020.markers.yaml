  - {type: variant, offset: 9391, length: 319, content: 三分之一而人眾不過什三然量其富居什六吳札觀樂為之歌秦曰此之謂夏聲夫能夏則大大之至也其周舊乎自井十度至柳三度謂之鶉首之次秦之分也魏地觜觿參之分野也其界自高陵以東盡河東河內南有陳留及汝南之召陵㶏彊新汲西華長平潁川之舞陽郾許傿陵河南之開封中牟陽武酸棗卷皆魏分也河內本殷之舊都周既滅殷分其畿內為三國詩風邶庸衛國是也鄁以封紂子武庚庸管叔尹之衛蔡叔尹之以監殷民謂之三監故書序曰武王崩三監畔周公誅之盡以其地封弟康叔號曰孟侯以夾輔周室遷邶庸之民于雒邑故邶庸衛三國之詩相與同風邶詩曰在浚之下庸曰在浚之郊邶又曰亦流于淇河水洋洋庸曰送我淇上在彼中河衛曰瞻彼淇奧河水洋洋故吳公子札聘魯觀周樂聞邶庸衛之歌曰美哉淵乎吾聞康叔之德如是是其衛風乎至十六世懿公亡道為狄所滅, WYG: 愚}
