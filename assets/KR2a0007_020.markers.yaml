  - {type: variant, offset: 39, length: 1712, content: 先王以景祐本無以字建萬國親諸侯書云協和萬國此之謂也堯遭洪水褱山襄陵天下分絕為十二州使禹治之水土既平更制九州列五服任土作貢曰禹敷土隨山栞木奠高山大川冀州既載壺口治梁及岐既脩太原至于嶽陽覃懷底績至于衡章厥土惟白壤厥賦上上錯厥田中中恆衛既從大陸既作鳥夷皮服夾右碣石入于河泲河惟兗州九河既道雷夏既澤雍沮會同桑土既蠶是降丘宅土厥土黑墳屮繇木條厥田中下賦貞作十有三年乃同厥貢漆絲厥棐織文浮于泲漯通于河海岱惟青州嵎夷既略惟甾其道厥土白墳海瀕廣潟田上下賦中上貢鹽絺海物惟錯岱畎絲枲鈆松怪石萊夷作牧厥棐檿絲浮于汶達于泲海岱及淮惟徐州淮沂其乂蒙羽其藝大野既豬東原底平厥土赤埴墳草木漸包田上中賦中中貢土五色羽畎夏狄嶧陽孤桐泗瀕浮磬淮夷蠙珠臮魚厥棐玄纖縞浮于淮泗達于河淮海惟揚州彭蠡既豬陽鳥逌居三江既入震澤厎定篠簜既敷屮禾木喬厥土塗泥田下下賦下上錯貢金三品瑤琨篠簜齒革羽毛鳥夷卉服厥棐織貝厥包橘柚錫貢均江海通于淮泗荊及衡陽惟荊州江漢朝宗于海九江孔殷沱灊既道雲夢土作乂厥土塗泥田下中賦上下貢羽旄齒革金三品杶幹栝柏厲砥砮丹惟箘簵楛三國厎貢厥名包匭菁茅厥棐玄纁璣組九江納錫大龜浮于江沱灊漢逾于洛至于南河荊河惟豫州伊雒瀍澗既入于河滎波既豬道荷澤被盟豬厥土惟壤下土墳壚田中上賦錯上中貢漆枲絺紵棐纖纊錫貢磬錯浮于洛入于河華陽黑水惟梁州岷嶓既藝沱灊既道蔡蒙旅平和夷厎績厥土青黎田下上賦下中三錯貢璆鐵銀鏤砮磬熊羆狐貍織皮西頃因桓是倈浮于灊逾于沔入于渭亂于河黑水西河惟雍州弱水既西涇屬渭汭漆沮既從酆水逌同荊岐既旅終南惇物至于鳥鼠原隰厎績至于豬野三危既宅三苗丕敘厥土黃壤田上上賦中下貢球琳琅玕浮于積石至于龍門西河會于渭汭織皮昆崙析支渠叟西戎即敘道汧及岐至于荊山逾于河壺口雷首至于大嶽厎柱析城至于王屋太行恆山至于碣石入于海西傾朱圉鳥鼠至于太華熊耳外方桐柏至于倍尾道嶓冢至于荊山內方至于大別崏山之陽至于衡山過九江至于敷淺原道弱水至于合藜餘波入于流沙道黑水至于三危入于南海道河積石至于龍門南至于華陰東至于厎柱又東至于盟津東過洛汭至于大伾北過降水至于大陸又北播為九河同為逆河入于海嶓冢道漾東流為漢又東為滄浪之水過三澨至于大別南入于江東匯澤為彭蠡東為北江入于海崏山道江東別為沱又東至于醴過九江至于東陵東迆北會于匯東為中江入于海道沇水東流為泲入于河軼為滎東出于陶丘北又東至于荷又東北會於汶又北東入于海道淮自桐柏東會于泗沂東入于海道渭自鳥鼠同穴東會于酆又東至于涇又東過漆沮入于河道洛自熊耳東北會于澗瀍又東會于伊又東北入于河九州逌同四奧既宅九山栞旅九川滌原九澤既陂四海會同六府孔修庶土交正厎慎財賦咸則三壤成賦中國錫土姓祗台德先不距朕行五百里甸服百里賦內總二百里納景祐殿本都作內內景祐殿本都作內銍三百里內戛服四百里粟五百里米五百里侯服百里采二百里男國三百里諸侯五百里綏服三百里揆文教二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南臮聲教訖于四海禹錫玄圭告厥成功後受禪於虞為夏后氏殷因於夏亡所變改周既克殷監於二代而損益之定官分職改禹徐梁二州合之於雍青分冀州之地以為幽并故周官有職方氏掌天下之地辯九州之國東南曰揚州其山曰會稽藪曰具區川曰三江𥧲曰五湖其利金錫竹箭民二男五女畜宜鳥獸穀宜稻正南曰荊州其山曰衡藪曰雲夢川曰江漢寖曰潁湛其利丹銀齒革民一男二女畜及穀宜與揚州同河南曰豫州其山曰華藪曰圃田川曰滎雒寖曰波溠其利林漆絲枲民二男三女畜宜六擾其穀宜五種正東曰青州其山曰沂藪曰孟諸川曰淮泗寖曰沂沭其利蒲魚民二男三女其畜宜雞狗穀宜稻麥河東曰兗州其山曰岱藪曰泰野其川曰河泲浸曰盧濰其利蒲魚民二男三女其畜宜六擾穀宜四種正西曰雍州其山曰嶽藪曰弦蒲川曰涇汭其浸曰渭洛其利玉石其民三男二女畜宜牛馬穀宜黍稷東北曰幽州其山曰醫無閭藪曰豯養川曰河泲浸曰菑時其利魚鹽民一男三女畜宜四擾穀宜三種河內曰冀州其山曰霍藪曰揚紆川曰漳𥧲曰汾潞其利松柏民五男三女畜宜牛羊穀宜黍稷正北曰并州其山曰恆山藪曰昭餘祁川曰虖池嘔夷𥧲曰淶易其利布帛民二男三女畜宜五擾穀宜五種而保章氏掌天文以星土辯九州之地所封封域皆有分星以視吉凶周爵五等而土三等公侯百里伯七十里子男五十里不滿為附庸蓋千八百國而太昊黃帝之後, WYG: ''}
