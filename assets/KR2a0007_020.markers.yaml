  - {type: variant, offset: 10776, length: 2102, content: 三世為韓所滅陳國今淮陽之地陳本太昊之虛周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗巫鬼陳詩曰坎其擊鼓宛丘之下亡冬亡夏值其鷺羽又曰東門之枌宛丘之栩子仲之子婆娑其下此其風也吳札聞陳之歌曰國亡主其能久乎自胡公後二十三世為楚所滅陳雖屬楚於天文自若其故潁川南陽本夏禹之國夏人上忠其敝鄙朴韓自武子後七世稱侯六世稱王五世而為秦所滅秦既滅韓徙天下不軌之民於南陽故其俗夸奢上氣力好商賈漁獵藏匿難制御也宛西通武關東受江淮一都之會也宣帝時鄭弘召信臣為南陽太守治皆見紀信臣勸民農桑去末歸本郡以殷富潁川韓都士有申子韓非刻害餘烈高士景祐殿本都作仕錢大昭說作仕是仕景祐殿本都作仕錢大昭說作仕是宦好文法民以貪遴爭訟生分為失韓延壽為太守先之以敬讓黃霸繼之教化大行獄或八年亡重罪囚南陽好商賈召父富以本業潁川好爭訟分異黃韓化以篤厚君子之德風也小人之德草也信矣自東井六度至亢六度謂之壽星之次鄭之分野與韓同分趙地昴畢之分野趙分晉得趙國北有信都真定常山中山又得涿郡之高陽鄚州鄉東有廣平鉅鹿清河河間又得渤海郡之東平舒中邑文安束州成平章武河以北也南至浮水繁陽內黃斥丘西有太原定襄雲中五原上黨上黨本韓之別郡也遠韓近趙後卒降趙皆趙分也自趙夙後九世稱侯四世敬侯徙都邯鄲至曾孫武靈王稱王五世為秦所滅趙中山地薄人眾猶有沙丘紂淫亂餘民丈夫相聚游戲悲歌忼慨起則椎剽掘冢作姦巧多弄物為倡優女子彈弦跕躧游媚富貴徧諸侯之後宮邯鄲北通燕涿南有鄭衛漳河之間一都會也其土廣俗雜大率精急高氣勢輕為姦太原上黨又多晉公族子孫以詐力相傾矜夸功名報仇過直嫁取送死奢靡漢興號為難治常擇嚴猛之將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石或報殺其親屬鍾代石北迫近胡寇民俗懻忮好氣為姦不事農商自全晉時已患其剽悍而武靈王又益厲之故冀州之部盜賊常為它州劇定襄雲中五原本戎狄地頗有趙齊衛楚之徙其民鄙朴少禮文好射獵雁門亦同俗於天文別屬燕燕地尾箕分野也武王定殷封召公於燕其後三十六世與六國俱稱王東有漁陽右北平遼西遼東西有上谷代郡雁門南得涿郡之易容城范陽北新城故安涿縣良鄉新昌及勃海之安次皆燕分也樂浪玄菟亦宜屬焉燕稱王十世秦欲滅六國燕王太子丹遣勇士荊軻西刺秦王不成而誅秦遂舉兵滅燕薊南通齊趙勃碣之間一都會也初太子丹賓養勇士不愛後宮美女民化以為俗至今猶然賓客相過以婦侍宿嫁取之夕男女無別反以為榮後稍頗止然終未改其俗愚悍少慮輕薄無威亦有所長敢於急人燕丹遺風也上谷至遼東地廣民希數被胡寇俗與趙代相類有魚鹽棗栗之饒北隙烏丸夫餘東賈真番之利玄菟樂浪武帝時置皆朝鮮濊貉句驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條相殺以當時償殺相傷以穀償相盜者男沒入為其家奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁取無所讎是以其民終不相盜無門戶之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效吏及內郡賈人往往以杯器食郡初取吏於遼東吏見民無閉臧及賈人往者夜則為盜俗稍益薄今於犯禁𥧲多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮於海欲居九夷有以也夫樂浪海中有倭人分為百餘國以歲時來獻見云自危四度至斗六度謂之析木之次燕之分也齊地虛危之分野也東有甾川東萊琅邪高密膠東南有泰山城陽北有千乘清河以南勃海之高樂高城重合陽信西有濟南平原皆齊分也少昊之世有爽鳩氏虞夏時有季崱湯時有逢公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之以封師尚父是為太公詩風齊國是也臨甾名營丘故齊詩曰子之營兮遭我虖嶩之間兮又曰竢我於著乎而此亦其舒緩之體也吳札聞齊之歌曰泱泱乎大風也哉其太公乎國未可量也古有分土亡分民太公以齊地負海舄鹵少五穀而人民寡乃勸以女工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國合諸侯成伯功身在陪臣而取三歸故其俗彌侈織作冰紈綺繡純麗之物號為冠帶衣履天下初太公治齊修道術尊賢智賞有功故至今其土多好經術矜功名舒緩闊達而足智其失夸奢朋黨言與行繆虛詐不情急之則離散緩之則放縱始桓公兄襄公淫亂姑姊妹不嫁於是令國中民家長女不得嫁名曰巫兒為家主祠嫁者不利其家民至今以為俗痛乎道民之道可不慎哉昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有篡殺之臣其後二十九世為彊臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊齊桓公以為大夫更稱田氏九世至和而篡齊至孫威王稱王五世為秦所滅臨甾海岱之間一都會也其中具五民云魯地奎婁之分野也東至東海南有泗水至淮得臨淮之下相睢陵僮取慮皆魯分也周興以少昊之虛曲阜封周公子伯禽為魯侯以為周公主其民有聖人之教化故孔子曰齊一變至於魯魯一變至於道言近正也瀕洙泗之水其民涉度幼者扶老而代其任俗既益薄長老不自安與幼少相讓故曰魯道衰洙泗之間齗齗如也孔子閔王道將廢乃修六經以述唐虞三代之道弟子受業而通者七十有七人是以其民好學上禮義重廉恥周公始封太公問何以治魯周公曰尊尊而親親太公曰後世𥧲弱矣故魯自文公以後祿去公室政在大夫季氏逐昭公陵夷微弱三十四世而為楚所滅然本大國故自為分野今去聖久遠周公遺化銷微孔氏庠序衰壞地陿民眾頗有桑麻之業亡林澤之饒俗儉嗇愛財趨商賈好訾毀多巧偽喪祭之禮文備實寡然其好學猶愈於它俗漢興以來魯東海多至卿相東平須昌壽良皆在濟東屬魯非宋地也當, WYG: ''}
