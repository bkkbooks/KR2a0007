  - {type: variant, offset: 10102, length: 200, content: 柳七星張之分野也今之河南雒陽穀成平陰偃師鞏緱氏是其分也昔周公營雒邑以為在于土中諸侯蕃屏四方故立京師至幽王淫襃姒以滅宗周子平王東居雒邑其後五伯更帥諸侯以尊周室故周於三代最為長久八百餘年至於赧王乃為秦所兼初雒邑與宗周通封畿東西長而南北短短長相覆為千里至襄王以河內賜晉文公又為諸侯所侵故其分墜小周人之失巧偽趨利貴財賤義高富下貧憙為商賈不好仕宦自柳三度至張十二度謂之鶉火之次周之分也韓地角亢氐之分野也韓分晉得, WYG: 理志}
