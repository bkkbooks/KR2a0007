  - {type: variant, offset: 8994, length: 0, content: '', WYG: 自謙不敢當聖與仁也又曰何事於仁必也聖乎師古曰言能博施於人而濟衆者非止稱仁乃為聖人也未知焉得仁師古曰言智者雖能利物猶不及仁者所濟逺也生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣師古曰困謂}
