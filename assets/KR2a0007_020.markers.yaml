  - {type: variant, offset: 12879, length: 1866, content: 宋地房心之分野也今之沛梁楚山陽濟陰東平及東郡之須昌壽張皆宋分也周封微子於宋今之睢陽是也本陶唐氏火正閼伯之虛也濟陰定陶詩風曹國也武王封弟叔振鐸於曹其後稍大得山陽陳留二十餘世為宋所滅昔堯作游成陽舜漁靁澤湯止于亳故其民猶有先王遺風重厚多君子好稼穡惡衣食以致畜藏宋自微子二十餘世至景公滅曹滅曹後五世亦為齊楚魏所滅參分其地魏得其梁陳留齊得其濟陰東平楚得其沛故今之楚彭城本宋也春秋經曰圍宋彭城宋雖滅本大國故自為分野沛楚之失急疾顓己地薄民貧而山陽好為姦盜衛地營室東壁之分野也今之東郡及魏郡黎陽河內之野王朝歌皆衛分也衛本國既為狄所滅文公徙封楚丘三十餘年子成公徙於帝丘故春秋經曰衛𠨧于帝丘今之濮陽是也本顓頊之虛故謂之帝丘夏后之世昆吾氏居之成公後十餘世為韓魏所侵盡亡其旁邑獨有濮陽後秦滅濮陽置東郡徙之於野王始皇既并天下猶獨置衛君二世時乃廢為庶人凡四十世九百年最後絕故獨為分野衛地有桑間濮上之阻男女亦亟聚會聲色生焉故俗稱鄭衛之音周末有子路夏育民人慕之故其俗剛武上氣力漢興二千石治者亦以殺戮為威宣帝時韓延壽為東郡太守承聖思崇禮義尊諫爭至今東郡號善為吏延壽之化也其失頗奢靡嫁取送死過度而野王好氣任俠有濮上風楚地翼軫之分野也今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也周成王時封文武先師鬻熊之曾孫熊繹於荊蠻為楚子居丹陽後十餘世至熊達是為武王浸以彊大後五世至嚴王總帥諸侯觀兵周室并吞江漢之間內滅陳魯之國後十餘世頃襄王東徙于陳楚有江漢川澤山林之饒江南地廣或火耕水耨民食魚稻以漁獵山伐為業果蓏蠃蛤食物常足故啙窳媮生而亡積聚飲食還給不憂凍餓亦亡千金之家信巫鬼重淫祀而漢中淫失枝柱與巴蜀同俗汝南之別皆急疾有氣勢江陵故郢都西通巫巴東有雲夢之饒亦一都會也吳地斗分野也今之會稽九江丹陽豫章廬江廣陵六安臨淮郡盡吳分也殷道既衰周大王亶父興𨙸梁之地長子大伯次曰仲雍少曰公季公季有聖子昌大王欲傳國焉大伯仲雍辭行采藥遂奔荊蠻公季嗣位至昌為西伯受命而王故孔子美而稱曰大伯可謂至惪也已矣三以天下讓民無得而稱焉謂虞仲夷逸隱居放言身中清廢中權大伯初奔荊蠻荊蠻歸之號曰句吳大伯卒仲雍立至曾孫周章而武王克殷因而封之又封周章弟中於河北是為北吳後世謂之虞十二世為晉所滅後二世而荊蠻之吳子壽夢盛大稱王其少子則季札有賢材兄弟欲傳國札讓而不受自大伯陳奐說大伯二字疑衍壽夢稱王六世闔廬舉伍子胥孫武為將戰勝攻取興伯名於諸侯至子夫差誅子胥用宰嚭為粵王句踐所滅吳粵之君皆好勇故其民至今好用劍輕死易發粵既并吳後六世為楚所滅後秦又擊楚徙壽春至子為秦所滅壽春合肥受南北湖皮革鮑木之輸亦一都會也始楚賢臣屈原被讒放流作離騷諸賦以自傷悼後有宋玉唐勒之屬慕而述之皆以顯名漢興高祖王兄子濞於吳招致天下之娛游子弟枚乘鄒陽嚴夫子之徒興於文景之際而淮南王安亦都壽春招賓客著書而吳有嚴助朱買臣貴顯漢朝文辭並發故世傳楚辭其失巧而少信初淮南王異國中民家有女者以待游士而妻之故至今多女而少男本吳粵與楚接比數相并兼故民俗略同吳東有海鹽章山之銅三江五湖之利亦江東之一都會也豫章出黃金然菫菫物之所有取之不足以更費江南卑溼丈夫多夭會稽海外有東鯷人分為二十餘國以歲時來獻見云粵地牽牛婺女之分野也今之蒼梧鬱林合浦交阯九真南海日南皆粵分也其君禹後帝少康之庶子云封於會稽文身斷髮以避蛟龍之害後二十世至句踐稱王與吳王闔廬戰敗之雋李夫差立句踐乘勝復伐吳吳大破之棲會稽臣服請平後用范蠡大夫種計遂伐滅吳兼并其地度淮與齊晉諸侯會致貢於周周元王使使賜命為伯諸侯畢賀後五世為楚所滅子孫分散君服於楚後十世至閩君搖佐諸侯平秦漢興復立搖為越王是時秦南海尉趙佗亦自王傳國至武帝時盡滅以為郡云處近海多犀象毒冒珠璣銀銅果布之湊中國往商賈者多取富焉番禺其一都會也自合浦徐聞南入海得大州東西南北方千里武帝元封元年略以為儋耳珠厓郡民皆服布如單被穿中央為貫頭男子耕農種禾稻紵麻女子桑蠶織績亡馬與虎民有五畜山多塵麖兵則矛盾刀木弓弩竹矢或骨為鏃自初為郡縣吏卒中國人多侵陵之故率數歲壹反元帝時遂罷棄之自日南障塞徐聞合浦船行可五月有都元國又船行可四月有邑盧沒國又船行可二十餘日有諶離國步行可十餘日有夫甘都盧國自夫甘都盧國船行可二月餘有黃支國民俗略與珠厓相類其州廣大戶口多多異物自武帝以來皆獻見有譯長屬黃門與應募者俱入海市明珠璧流離奇石異物齎黃金雜繒而往所至國皆稟食為耦蠻夷賈船轉送致之亦利交易剽殺人又苦逢風波溺死不者數年來還大珠至圍二寸以下平帝元始中王莽輔政欲燿威德厚遺黃支王令遣使獻生犀牛自黃支船行可八月到皮宗船行可八景祐殿本都作二二景祐殿本都作二月到日南象林界云黃支之南有已程不國漢之譯使自此還矣, WYG: 證}
