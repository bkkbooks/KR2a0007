  - {type: variant, offset: 10305, length: 0, content: '', WYG: 湖陽古廖國師古注曰廖音力救反左氏傳作飂字可證此注戮字係刊本之誤鼓叜象商均監本列第八格今從宋本移列于第九格石户之農監本誤分石為一人户之農為一人今連寫秦不虛注雒陶已下皆舜之友也臣召南按雒陶以下戰國䇿顏觸所云舜有七友是也此表但記五人又方回列之二等與王兒並列而不}
