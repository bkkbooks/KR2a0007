  - {type: variant, offset: 3903, length: 0, content: '', krp: 憂乎夫明者視於無形聰者聽於無聲誠先於未然即䝉恬樊噲不復施棘門細栁不復備馬邑之䇿安所設衛霍之功何得用五將之威安所震師古曰先於未然謂計䇿素定禦難折衝不然壹有隙之後雖智者勞心於内辯者轂擊於外師古曰轂擊言使車交馳其轂相擊也猶不若未然之時也且徃者圖西域制車師師古曰圖謀也置城郭都䕶三十六國費歲以大萬計者師古曰財用之費一歲數百萬也豈為康居烏孫能踰白龍堆而㓂西邊哉孟康曰龍堆形如土龍身無頭有尾髙大者二三丈埤者丈餘皆東北向相似也在西域中廼以制匈奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邊萌之禍書奏天子寤焉召還匈奴使者更報單于書而許之賜雄帛五十匹黄金十斤單于未發㑹病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言䝉天子神靈人民盛壯願從五百人入朝以明天子盛徳上皆許之元壽二年單于來朝上以太歲厭勝所在師古曰厭音一渉反舍之上林苑蒲陶宫師古曰舍止宿告之以加敬於單于師古曰云以敬於單于故令止上林單于知之加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤它如河平時既罷遣中郎將韓况送單于單于出塞到休屯井北度車田盧水道里回逺師古曰回音胡内反况等乏食單于廼給其糧失期不還五十餘日初上遣稽留昆隨單于去到國復遣稽留昆同母兄右大且方與婦入侍師古曰且音子閭反還歸復遣且方同母兄左日逐王都與婦入侍是時漢平帝㓜太皇太后稱制新都侯王莽秉政欲説太后以威徳至盛異於前師古曰説讀曰悦以此事取悦於太后廼風單于師古曰風讀曰諷令遣王昭君女須卜居次云入侍師古曰云者其女名太后所以賞賜之甚厚㑹西域車師後王句姑師古曰句音鉤去胡來王唐兠師古曰為其去胡而來降漢故以為王號皆怨恨都䕶校尉將妻子人民亡降匈奴語在西域傳單于受置左谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆王昌副校尉甄阜侍中謁者帛敞長水校尉王歙使匈奴師古曰歙音翕告單于曰西域内屬不當得受師古曰既屬漢家不得復臣匈奴今遣之師古曰今即遣還單于曰孝宣孝元皇帝哀憐為作約束自長城以南天子有之長城以北單于有之有犯塞輙以狀聞有降者不得受臣知父呼韓邪單于蒙無量之恩死遺言曰有從中國來降者勿受輙送至塞以報天子厚恩此外國也得受之使者曰匈奴骨肉相攻國幾絶師古曰幾音鉅依反䝉中國大恩危亡復續妻子完安累世相繼宜有以報厚恩單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受服䖍曰惡都奴西域之谷名也師古曰逆受迎而受之單于遣使送到國因請其罪使者以聞有詔不聽師古曰不免其罪㑹西域諸國王斬以示之廼造設四條師古曰更新為此制也中國人亡入匈奴者烏孫亡降匈奴者西域諸國佩中國印綬降匈奴者烏桓降匈奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匈奴班四條與單于雜函封師古曰與璽書同一函而封之付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于師古曰風讀曰諷宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名嚢知牙斯今謹更名曰知莽大説師古曰説讀曰悦白太后遣使者答諭厚賞賜焉漢既班四條後䕶烏桓使者告烏桓民毋得復與匈奴皮布税匈奴以故事遣使者責烏桓税師古曰故時常税是以求之匈奴人民婦女欲賈販者皆隨徃焉烏桓距曰奉天子詔條不當予匈奴税匈奴使怒收烏桓酋豪縳到懸之酋豪昆弟怒共殺匈奴使及其官屬收略婦女馬牛單于聞之遣使發左賢王兵入烏桓責殺使者因攻擊之烏桓分散或走上山或東保塞匈奴頗殺人民敺婦女弱小且千人去師古曰敺與驅同置左地告烏桓曰持馬畜皮布來贖之烏桓見略者親屬二千餘人持財畜徃贖匈奴受留不遣師古曰受其皮布而留人不遣王莽之簒位也建國元年遣五威將王駿率甄阜王颯陳饒帛敞丁業六人多齎金帛重遺單于師古曰颯音立諭曉以受命代漢狀因易單于故印故印文曰匈奴單于璽莽更曰新匈奴單于章師古曰新者莽自係其國號將率既至授單于印紱師古曰紱者印之組也音弗詔令上故印紱單于再拜受詔譯前欲觧取故印紱單于舉掖授之左姑夕侯蘇從旁謂單于曰未見新印文宋祁曰一本作止不見新印文宜且勿與單于止不肯與請使者坐穹廬單于欲前為夀五威將曰故印紱當以時上單于曰諾復舉掖授譯蘇復曰未見印文且勿與單于曰印文何由變更遂觧故印紱奉上將率受著新紱不觧視印飲食至夜廼罷右率陳饒謂諸將率曰鄉者姑夕侯疑印文幾令單于不與人師古曰鄉讀曰嚮幾音鉅依反如令視印見其變改必求故印此非辭説所能距也旣得而復失之辱命莫大焉不如椎破故印以絶禍根將率猶與莫有應者師古曰與讀曰豫饒燕士果悍師古曰果决也悍勇也音胡幹反即引斧椎壊之明日單于果遣右骨都侯當白將率曰漢賜單于印言璽不言章又無漢字諸王已下宋祁曰已當作以廼有漢言章今印去璽加新與臣下無别願得故印將率示以故印謂曰新室順天制作故印隨將率所自為破壊單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遺即遣弟右賢王輿奉馬牛隨將率入謝因上書求故印將率還到左犂汗王咸所居地見烏桓民多以問咸咸具言狀師古曰謂前驅略得婦女弱小贖之不還者將率曰前封四條不得受烏桓降者亟還之師古曰亟急也音居力反咸曰請密與單于相聞得語歸之單于使咸報曰當從塞内還之邪從塞外還之邪將率不敢顓决以聞詔報從塞外還之宋祁曰决一作使單于始用夏侯藩求地有距漢語後以求税烏桓不得因略㓂其人民釁由是生重以印文改易師古曰重音直用反故怨恨廼遣右大且渠蒲呼盧訾等十餘人將兵衆萬騎以䕶送烏桓為名師古曰陽言云䕶送烏桓人衆實來為㓂宋祁曰注文陽字楊本作揚勒兵朔方塞下朔方太守以聞明年西域車師後王須置離謀降匈奴都䕶但欽誅斬之置離兄狐蘭支將人衆二千餘人敺畜産舉國亡降匈奴師古曰敺與驅同舉其一國之人皆亡降也單于受之狐蘭支與匈奴共入冦擊車師殺後成長師古曰後成車師小國名也長其長帥也傷都䕶}
