  - {type: variant, offset: 3151, length: 0, content: '', krp: 老之稱也行音胡浪反漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年浞野侯破奴得亡歸漢其明年漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還匈奴大圍貳師幾不得脱師古曰幾音鉅依反漢兵物故什六七師古曰物故謂死也漢又使因杅將軍出西河與强弩都尉會涿邪山亡所得使騎都尉李陵將歩兵五千人出居延北千餘里與單于會合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降匈奴其兵得脱歸漢者四百人單于廼貴陵以其女妻之後二嵗漢使貳師將軍六萬騎歩兵七萬出朔方强弩都尉路博徳宋祁曰博舊本作萬校本改作博將萬餘人與貳師㑹㳺擊將軍説步兵三萬人出五原師古曰即上韓説也因杅將軍敖將騎萬步兵三萬人出鴈門匈奴聞悉逺其累重於余吾水北師古曰累重謂妻子資産也累音力瑞反重音直用反而單于以十萬待水南與貳師接戰貳師解而引歸與單于連鬬十餘日㳺擊亡所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是嵗}
  - {type: variant, offset: 3152, length: 1, content: 后, WYG: 始元年也初且鞮侯兩子長為左賢王次為左大將病且死言立左賢王左賢王未至貴人以為有病更立左大將為單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聼謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于狐鹿姑單于立以左大將為左賢王數年病死其子先賢撣不得代師古曰撣音􅅶更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而匈奴入上谷五原殺略吏民其年匈奴復入五原酒泉殺兩部都尉於是漢遣貳師將軍七萬人出五原御史大夫商丘成將三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水師古曰邸至也音丁禮反郅音之日反左賢王驅其人民度余吾水六七百里居兠銜山單于自將精兵左安侯度姑且水師古曰且音子余反御史大夫軍至追邪徑無所見還師古曰從疾道而追之不見虜而還也邪音似嗟反匈奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳郤敵殺傷虜甚衆至蒲奴水虜不利還去重合侯軍至天山匈奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵彊引去重合侯無所得失是時漢恐車師兵遮重合侯廼遣闓陵侯將兵别圍車師師古曰闓讀與開同盡得其王民衆而還貳師將軍將出塞匈奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹服䖍曰夫羊地名也師古曰句山西山也句音鉤貳師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北至范夫人城應劭曰本漢將築此城將亡其妻率餘衆完保之因以為名也張晏曰范氏能胡詛者匈奴奔走莫敢距敵㑹貳師妻子坐巫蠱收聞之憂懼其掾胡亞夫亦避罪從軍説貳師曰夫人室家皆在吏若還不稱意適與獄㑹郅居以北可復得見乎如淳曰以就誅後雖復欲降匈奴不可得貳師由是狐疑欲深入要功遂北至郅居水上虜已去貳師遣䕶軍將二萬騎度郅居之水一日逄左賢王左大將將二萬騎與漢軍合戰一日漢軍殺大將虜死傷甚衆軍長史與決眭都尉煇渠侯謀晉灼曰本匈奴官也功臣表歸義侯僕多子雷電以屬國都尉擊匈奴封煇渠煇渠魯陽縣也師古曰眭音息隨反煇音輝多字當為朋曰將軍懐異心欲危衆求功恐必敗謀共執貳師貳師聞之斬長史引兵還至速邪烏燕然山師古曰速邪烏地名也燕然山在其中燕音一千反單于知漢軍勞倦自將五萬騎􅃒擊貳師相殺傷甚衆夜塹漢軍前深數尺從後急擊之軍大亂敗貳師降單于素知其漢大將貴臣以女妻之尊寵在衛律上其明年單于遣使遺漢書云南有大漢北有强胡胡者天之驕子也不為小禮以自煩今欲與漢闓大闗取漢女為妻師古曰闓讀與開同嵗給遺我糵酒萬石稷米五千斛師古曰以糵為酒味尤甜稷米稷粟米也雜繒萬匹它如故約則邊不相盗矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也貳師道前太子發兵反何也使者曰然廼丞相私與太子爭鬬太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過耳孰與冒頓單于身殺其父代立常妻後}
