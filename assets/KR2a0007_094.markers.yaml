  - {type: variant, offset: 534, length: 0, content: '', WYG: 左屠耆王自左右賢王以下至當戸大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏師古曰呼衍即今鮮卑姓呼延者是也蘭姓今亦有之其後有湏卜氏此三姓其貴種也諸左王將居東方直上谷以東師古曰直當也其下亦同也劉攽曰以東屬下句接􅐮貉朝鮮右王將居西方直上郡以西接氐羌而單于庭直代雲中各有分地逐水草移徙而左右賢王左右谷蠡最大國劉攽曰衍國字左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王師古曰禆音頻移反宋祁曰百長下舊本有行長二字相都尉當户且渠之屬師古曰且音子餘反今之沮渠姓盖本因此官嵗正月諸長少㑹單于庭祠五月大㑹龍城祭其先天地鬼神秋馬肥大㑹蹛林課校}
