  - {type: variant, offset: 1195, length: 1, content: 氏, krp: 反以視不如重酪之便美也師古曰重乳汁也重音竹用反字本作湩其音則同於是説教單于左右劉攽曰説當作施鋭反疏記以計識其人衆畜牧師古曰説者舉中行説之名也疏分條之也識亦記音式志反漢遺單于書以尺一牘辭曰皇帝敬問匈奴}
