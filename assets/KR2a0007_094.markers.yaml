  - {type: variant, offset: 5375, length: 4, content: 昭上官皇, WYG: 文時賈誼鼂錯孝武時王恢韓安國朱買臣公孫𢎞董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究匈奴之終始也自漢興以至於今曠世歴年多於春秋其與匈奴有脩文而和親之矣有用武而克伐之矣有卑下而承事之矣師古曰下音胡亞反有威服而臣畜之矣詘伸異變强弱相反是故其詳可得而言也昔和親之論𤼵於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邊境孝惠髙}
