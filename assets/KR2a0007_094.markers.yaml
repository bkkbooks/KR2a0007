  - {type: variant, offset: 3147, length: 0, content: '', krp: 賣馬邑城以誘單于單于信之而貪馬邑財物廼以十萬騎入武州塞漢伏兵三十餘萬馬邑旁御史大夫韓安國為䕶軍將軍䕶四將軍以伏單于師古曰伏兵而待單于也單于既入漢塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭時鴈門尉史行徼見宼保此亭師古曰漢律近塞郡皆置尉百里一人士史尉史各二人廵行徼塞也行音下孟反單于得欲刺之尉史知漢謀廼下師古曰尉史在亭樓上虜欲以矛㦸刺之懼廼自下以謀告具告單于劉攽曰廼下具告單于作一句單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王漢兵約單于入馬邑而縱兵師古曰放兵以擊單于單于不至以故無所得將軍王恢部出代擊胡輜重師古曰重音直用反聞單于還兵多不敢出漢以恢本建造兵謀而不進誅恢自是後匈奴絶和親攻當路塞師古曰塞之當行道處者往往入盗於邊不可勝數然匈奴貪尚樂闗市耆漢財物師古曰耆讀曰嗜漢亦通闗市不絶以中之師古曰以闗市中其意中音竹仲反自馬邑軍後五嵗之秋漢使四將各萬騎擊胡闗市下將軍衛青出上谷至龍城得胡首虜七百人公孫賀出雲中無所得公孫敖出代郡為胡所敗七千李廣出鴈門為胡所敗匈奴生得廣廣道亡歸師古曰於道上亡歸漢囚敖廣敖廣贖為庶人其冬匈奴數千人盗邊漁陽尤甚漢使將軍韓安國屯漁陽備胡其明年秋匈奴二萬騎入漢殺遼西太守略二千餘人又敗漁陽太守軍千餘人圍將軍安國師古曰即韓安國也安國時千餘騎亦且盡㑹燕救之至劉攽曰衍之字匈奴廼去又入鴈門殺略千餘人於是漢使將軍衛青將三萬騎出鴈門李息出代郡擊胡得首虜數千其明年衛青復出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千羊百餘萬於是漢遂取河南地築朔方復繕故秦時䝉恬所為塞因河而為固漢亦棄上谷之斗辟縣造陽地以予胡孟康曰縣斗辟曲近胡師古曰斗絶也縣之斗曲入匈奴界者其中造陽地也辟讀曰僻是嵗元朔二年也其後冬軍臣單于死其弟左谷蠡王伊穉斜自立為單于攻敗軍臣單于太子於單於單亡降漢漢封於單為陟安侯數月死伊穉斜單于既立其夏匈奴數萬騎入代郡殺太守共友師古曰共友太守姓名也共讀曰龔略千餘人秋又入鴈門殺略千餘人其明年又入代郡定襄上郡各三萬騎殺略數千人匈奴右賢王怨漢奪之河南地而築朔方數宼盗邊及入河南侵擾朔方殺略吏民甚衆其明年春漢遣衛青將六將軍十餘萬人出朔方高闕右賢王以為漢兵不能至飲酒醉漢兵出塞六七百里夜圍右賢王右賢王大驚脱身逃走精騎往往隨後去漢將軍得右賢王人衆男女萬五千人禆小王十餘人其秋匈奴萬騎入代郡殺尉朱央略千餘人其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里師古曰仍頻也擊匈奴得首虜前後萬九千餘級而漢亦亡兩將軍三千餘騎右將軍建得以身脱而前將軍翕侯趙信兵不利降匈奴趙信者故胡小王降漢漢封為翕侯以前將軍與右將軍并軍介獨遇單于兵故盡没晉灼曰介音戞師古曰介特也本雖并軍至遇單于時特也介讀如本字單于既得翕侯以為自次王師古曰自次者尊重次於單于用其姊妻之與謀漢信教單于益北絶幕師古曰直度曰絶以誘罷漢兵徼極而取之師古曰罷讀曰疲徼要也誘令疲要其困極然後取之徼音工堯反毋近塞師古曰不近塞居所以疲勞漢兵也單于從之其明年胡數萬騎入上谷殺數百人明年春漢使票騎將軍去病將萬騎出隴西過焉耆山千餘里得胡首虜八千餘級得休屠王祭天金人孟康曰匈奴祭天處本在雲陽甘泉山下秦擊奪其地後徙之休屠王右地故休屠有祭天金人象也師古曰作金人以為天神之主而祭之即今佛像是其遺法其夏票騎將軍復與合騎侯數萬騎出隴西北地二千里過居延攻祁連山得胡首虜三萬餘級禆小王以下十餘人是時匈奴亦來入代郡鴈門殺略數百人漢使博望侯及李將軍廣出右北平擊匈奴左賢王左賢王圍李廣廣軍四千人死者過半殺虜亦過當㑹博望侯軍救至李將軍得脱盡亡其軍劉奉世曰既云死者過半又云盡亡其軍與武紀本傳無同者必有一誤合騎侯後票騎將軍期及博望侯皆當死贖為庶人其秋單于怒昆邪王休屠王居西方為漢所殺虜數萬人欲召誅之昆邪休屠王恐謀降漢漢使票騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人號十萬於是漢已得昆邪則隴西北地河西益少胡宼徙闗東貧民處所奪匈奴河南地新秦中以實之師古曰新秦解在食貨志西減北地以西戍卒半劉敞曰西當作而明年春匈奴入右北平定襄各數萬騎殺略千餘人其年春漢謀以為翕侯信為單于計居幕北以為漢兵不能至乃粟馬師古曰以粟秣馬也發十萬騎私負從馬凡十四萬匹師古曰私負衣裝者及私將馬從者皆非公家發與之限糧重不與焉師古曰負戴粮食者重音直用反與讀曰豫令大將軍青票騎將軍去病中分軍大將軍出定襄票騎將軍出代咸約絶幕擊匈奴師古曰約謂為期要單于聞之逺其輜重師古曰徙其輜重令逺去以精兵待於幕北與漢大將軍接戰一日㑹暮大風起漢兵縱左右翼圍單于單于自度戰不能與漢兵師古曰與猶如也度音徒各反遂獨與壯騎數百潰漢圍西北遁走漢兵夜追之不得行捕斬首虜凡萬九千級師古曰且行且捕斬之北至窴顔山趙信城而還孟康曰趙信所作因以名城師古曰窴音徒千反單于之走其兵往往與漢軍相亂而隨單于單于久不與其大衆相得右谷蠡王以為單于死乃自立為單于真單于復得其衆右谷蠡乃去號復其故位票騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王將皆遁走票騎封於狼居胥山禪姑衍臨翰海而還是後匈奴逺遁而幕南無王庭漢度河自朔方以西至令居師古曰令音零下亦類此往往通渠置田官吏卒五六萬人稍𧖟食地接匈奴以北師古曰其地相接不絶初漢兩將大出圍單于所殺虜八九萬而漢士物故者亦萬數師古曰物故謂死也漢馬死者十餘萬匹匈奴雖病逺去而漢馬亦少無以復往單于用趙信計遣使好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰匈奴新困宜使為外臣朝請於邊師古曰請才性反漢使敞使於單于單于聞敞計大怒留之不遣先是漢亦有所降匈奴使者單于亦輙留漢使相當漢方復收士馬㑹票騎將軍去病死於是漢久不北擊胡數嵗伊穉斜單于立十三年死子烏維立為單于是嵗元鼎三年也烏維單于立而漢武帝始出巡狩郡縣其後漢方南誅兩越不擊匈奴匈奴亦不入邊烏維立三年漢已滅兩越遣故太僕公孫賀將萬五千騎出九原二千餘里至浮苴井師古曰苴音子餘反武紀苴字作沮其音同從票侯趙破奴萬餘騎出令居數千里至匈奴河水臣瓚曰水名也去令居千里劉敞曰趙破奴傳但云至匈河此衍奴字劉攽説同皆不見匈奴一人而還是時天子巡邊親至朔方勒兵十八萬騎以見武節師古曰見示也而使郭吉風告單于師古曰風讀曰諷既至匈奴匈奴主客問所使師古曰主客主接諸客者也問以何事而來郭吉卑體好言曰吾見單于而口言單于見吉吉曰南越王頭已縣於漢北闕下今單于即能與漢戰天子自將兵待邊即不能亟南面而臣於漢師古曰亟急也音居力反何但逺走亡匿於幕北寒苦無水草之地為師古曰但空也語卒單于大怒立斬主客見者而留郭吉不歸遷辱之北海上而單于終不肯為宼於漢邊休養士馬習射獵數使使好辭甘言求和親漢使王烏等闚匈奴匈奴法漢使不去節不以墨黥其面不得入穹廬師古曰以墨黥面也王烏北地人習胡俗去其節黥面入廬單于愛之陽許曰吾為遣其太子入質於漢以求和親師古曰言為王烏故遣太子入質漢使楊信使於匈奴是時漢東拔濊貉朝鮮以為郡師古曰濊與穢同亦或作薉而西置酒泉郡以隔絶胡與羌通之路又西通月氏大夏以翁主妻烏孫王以分匈奴西方之援國又北益廣田至眩雷為塞服䖍曰眩雷地在烏孫北也眩音州縣之縣而匈奴終不敢以為言是嵗翕侯信死漢用事者以匈奴已弱可臣從也楊信為人剛直屈彊素非貴臣也師古曰屈音其勿反彊音其兩反單于不親欲召入不肯去節廼坐穹廬外見楊信楊信説單于曰即欲和親以單于太子為質於漢單于曰非故約故約漢常遣翁主給繒絮食物有品以和親師古曰品謂等差也而匈奴亦不復擾邊今乃欲反古師古曰反違也令吾太子為質無幾矣師古曰言遣太子為質則匈奴國中所餘者無幾皆當盡也㡬音居豈反匈奴俗見漢使非中貴人其儒生以為欲説折其辭辯少年以為欲刺折其氣每漢兵入匈奴匈奴輙報償漢留匈奴使匈奴亦留漢使必得當廼止楊信既歸漢使王烏等如匈奴匈奴復讇以甘言師古曰讇古諂字欲多得漢財物紿王烏曰吾欲入漢師古曰紿詐也見天子面相結為兄弟王烏歸報漢漢為單于築邸於長安匈奴曰非得漢貴人使吾不與誠語師古曰誠實也匈奴使其貴人至漢病服藥欲愈之不幸而死漢使路充國佩二千石印綬使送其䘮厚幣直數千金單于以為漢殺吾貴使者廼留路充國不歸諸所言者單于特空紿王烏師古曰特但也殊無意入漢遣太子來質於是匈奴數使竒兵侵犯漢邊漢廼拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡師古曰浞野侯趙破奴也浞音仕角反烏維單于立十嵗死子詹師廬立年少號為兒單于是歳元封六年也自是後單于益西北左方兵直雲中右方兵直酒泉敦煌兒單于立漢使兩使一人弔單于一人弔右賢王欲以乖其國使者入匈奴匈奴悉將致單于單于怒而悉留漢使漢使留匈奴者前後十餘軰而匈奴使來漢亦輒留之相當是嵗漢使貳師將軍西伐大宛而令因杅將軍築受降城師古曰杅音于其冬匈奴大雨雪師古曰雨音于具反畜多飢寒死而單于年少劉攽曰而改兒好殺伐國中多不安左大都尉欲殺單于使人閒告漢師古曰私來報曰我欲殺單于降漢漢逺漢即來兵近我我即發師古曰來兵言以兵來也初漢聞此言故築受降城猶以為逺其明年春漢使浞野侯破奴將二萬騎出朔方北二千餘里師古曰以迎左大都尉期至浚稽山而還師古曰浚音俊稽音雞在武威北浞野侯既至期左大都尉欲發而覺單于誅之發兵擊浞野侯浞野侯行捕首虜數千人還未至受降城四百里匈奴八萬騎圍之浞野侯夜出自求水匈奴生得浞野侯因急擊其軍軍吏畏亡將而誅莫相勸而歸軍遂没於匈奴單于大喜遂遣兵攻受降城不能下乃侵入邊而去明年單于欲自攻受降城未到病死兒單于立三嵗而死子少匈奴廼立其季父烏維單于弟右賢王句黎湖為單于師古曰句音鉤是嵗太初三年也句黎湖單于立漢使光禄徐自為出五原塞數百里逺者千里築城障列亭至廬朐師古曰廬朐山名也朐音劬而使游擊將軍韓説長平侯衛伉屯其旁師古曰説讀曰悦伉音抗即衛青子使强弩都尉路博徳築居延澤上其秋匈奴大入雲中定襄五原朔方殺略數千人敗數二千石而去行壞光祿所築亭障又使右賢王入酒泉張掖略數千人會任文擊救服䖍曰任文漢將也師古曰擊救者擊匈奴而自救漢人盡復失其所得而去聞貳師將軍破大宛斬其王還單于欲遮之不敢其冬病死句黎湖單于立一嵗死其弟左大都尉且鞮侯立為單于師古曰且音子余反鞮音丁奚反漢既誅大宛威震外國天子意欲遂困胡廼下詔曰髙}
  - {type: variant, offset: 3148, length: 0, content: '', WYG: 帝遺朕平城之憂師古曰遺留也髙后時單于書絶悖逆昔齊襄公復九世之讎春秋大之師古曰公羊傳莊四年春齊襄公滅紀復讎也襄公之九世祖昔為紀侯所譖而亨殺于周故襄公滅紀也九世猶可以復讎乎曰雖百世可也是嵗}
  - {type: variant, offset: 3148, length: 0, content: '', krp: 帝遺朕平城之憂師古曰遺留也髙后時單于書絶悖逆昔齊襄公復九世之讎春秋大之師古曰公羊傳莊四年春齊襄公滅紀復讎也襄公之九世祖昔為紀侯所譖而亨殺于周故襄公滅紀也九世猶可以復讎乎曰雖百世可也是嵗}
  - {type: variant, offset: 3149, length: 1, content: 后, WYG: 初四年也且鞮侯單于初立恐漢襲之盡歸漢使之不降者路充國等於漢單于廼自謂我兒子安敢望漢天子漢天子我丈人行師古曰丈人}
