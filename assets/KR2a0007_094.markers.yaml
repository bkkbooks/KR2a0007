  - {type: variant, offset: 115, length: 0, content: '', WYG: 師古曰繕𥙷也起臨洮至遼東萬餘里又度河據陽山北假中師古曰北假地名當是時東胡强而月氏盛師古曰氏音支匈奴單于曰頭曼師古曰曼音莫安反頭曼不勝秦北徙十有餘年而蒙恬死諸侯畔秦中國擾亂諸秦所徙適邊者皆復去師古曰適音讁於是匈奴得寛復稍度河南與中國界於故塞單于有太子名曰冒頓後有愛閼氏生少子師古曰閼氏匈奴皇后號也閼音於連反氏音支宋祁曰冒音墨頓音毒無别訓姚令威云僕閲董仲舒𫝊冒音莫克反又知字司馬遷𫝊亦音莫克反劉攽曰匈奴單于號其妻為閼氏爾顔便以皇后解之太俚俗也頭曼欲廢冒頓而立少子廼使冒頓質於月氏冒頓既質而頭曼急擊月氏月氏欲殺冒頓冒頓盗其善馬騎亡歸頭曼以為壯令將萬騎冒頓廼作鳴鏑應劭曰髐箭也師古曰鏑音嫡髐音呼交反習勒其騎射師古曰勒其所部騎皆習射也令曰鳴鏑所射而不悉射者斬行獵獸有不射鳴鏑所射輙斬之已而冒頓以鳴鏑自射善馬左右或莫敢射冒頓立斬之居頃之復以鳴鏑自射其愛妻左右或頗恐不敢射復斬之頃之冒頓出獵以鳴鏑射單于善馬左右皆射之於是冒頓知其左右可用從其父單于頭曼獵以鳴鏑射頭曼其左右皆隨鳴鏑而射殺頭曼盡誅其後母與弟及}
