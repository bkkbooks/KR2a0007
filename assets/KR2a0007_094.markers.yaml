  - {type: variant, offset: 4640, length: 264, content: 傷悼夫人其辭曰美連娟以脩嫮兮命樔絕而不長飾新宮以延貯兮泯不歸乎故鄉慘鬱鬱其蕪穢兮隱處幽而懷傷釋輿馬於山椒兮奄修夜之不陽秋氣憯以淒淚兮桂枝落而銷亡神煢煢以遙思兮精浮游而出畺託沈陰以壙久兮惜蕃華之未央念窮極之不還兮惟幼眇之相羊函荾荴以俟風兮芳雜襲以彌章的容與以猗靡兮縹飄姚虖愈莊燕淫衍而撫楹兮連流視而娥揚既激感而心逐兮包紅顏而弗明驩接狎以離別兮宵寤夢之芒芒忽遷化而不反兮魄放逸以飛揚何靈魂之紛紛兮哀裴回以躊躇勢路日以遠兮遂荒忽而辭去超兮西征屑兮不見寖淫敞𦬺寂兮無音思若流波怛兮在心亂曰佳俠函光隕朱榮兮嫉妒闟茸將安程兮方時隆盛年夭傷兮, WYG: 聞莽遣歙歙}
