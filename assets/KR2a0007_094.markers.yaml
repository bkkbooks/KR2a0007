  - {type: variant, offset: 1193, length: 1, content: 王, WYG: 單于變俗好漢物漢物不過什二則匈奴盡歸于漢矣師古曰言漢費物十分之二則盡得匈奴之衆也其得漢絮繒以馳草棘中衣袴皆裂弊以視不如旃裘堅善也師古曰視讀曰示下皆類此得漢食物皆去之師古曰去棄也音􅉌}
  - {type: variant, offset: 1193, length: 1, content: 王, krp: 單于變俗好漢物漢物不過什二則匈奴盡歸于漢矣師古曰言漢費物十分之二則盡得匈奴之衆也其得漢絮繒以馳草棘中衣袴皆裂弊以視不如旃裘堅善也師古曰視讀曰示下皆類此得漢食物皆去之師古曰去棄也音􅉌}
  - {type: variant, offset: 1195, length: 1, content: 氏, WYG: 反以視不如重酪之便美也師古曰重乳汁也重音竹用反字本作湩其音則同於是説教單于左右劉攽曰説當作施鋭反疏記以計識其人衆畜牧師古曰説者舉中行説之名也疏分條之也識亦記音式志反漢遺單于書以尺一牘辭曰皇帝敬問匈奴}
