  - {type: variant, offset: 3270, length: 1, content: 蚤, WYG: 可許上問狀應曰周秦以來匈奴暴桀㓂侵邊境漢興尤被其害臣聞北邊塞至遼東外有隂山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為㓂是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北師古曰斥開也攘郤也音人羊反建塞徼起亭隧師古曰隧謂深開小道而行避敵鈔㓂也隧音隊築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙匈奴來㓂少所蔽隐從塞以南徑深山谷徃來差難邊長老}
