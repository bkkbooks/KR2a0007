  - {type: variant, offset: 3253, length: 2, content: 蓋諱, WYG: 者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆竒與右賢王共立日逐王薄胥堂為屠􅂄單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王師古曰瞀音莫搆反留居單于庭明年秋屠耆單于使日逐王先賢撣兄右奥鞬王為烏藉都尉師古曰撣音纒奥音郁鞬音居言反劉攽曰衍為字劉奉世曰為當作與各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當户謀師古曰揭音丘例反唯音弋癸反共讒右賢王言欲自立為烏藉單于屠􅂄單于殺右賢王父子後知其􅁈復殺唯犂當户於是呼揭王恐遂畔去自立為呼揭單于右奥鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠􅂄單于自將兵東擊車犂單于使都隆竒擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犂單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犂單于車犂單于敗西北走屠􅂄單于即引西南留闟敦地師古曰闟音蹋敦音頓又音對其明年呼韓邪單于遣其弟右谷蠡王等西襲屠􅂄單于屯兵殺略萬餘人屠耆單于聞之即自將六萬騎擊呼韓邪單于行千里未至嗕姑地師古曰嗕音力榖反逢呼韓邪單于兵可四萬人合戰屠􅂄單于兵敗自殺都隆竒乃與屠􅂄少子右谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于呼韓邪單于左大將烏厲屈與父呼遫累烏厲温敦師古曰呼遫累者其官號也遫古速字也累音力追反皆見匈奴亂率其衆數萬人南降漢封烏厲屈為新城侯烏厲温敦為義陽侯是時李陵子復立烏藉都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從弟休旬王將所主五六百騎擊殺左大且渠并其兵至右地自立為閏振單于在西邊其後呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊其後二年閏振單于率其衆東擊郅支單于郅支單于與戰殺之并其兵遂進攻呼韓邪呼韓邪破其兵劉攽曰多呼韓邪三字宋祁曰浙本無破其兵三字走郅支都單于庭呼韓邪之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此匈奴乃定呼韓邪議問諸大臣皆曰不可匈奴之俗本上氣力而下服役師古曰以服役於人為下以馬上戰鬬為國故有威名於百蠻戰死壯士所有也師古曰言人皆有此事耳今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國師古曰為諸國之長帥也漢雖强猶不能兼并匈奴奈何亂先古之制臣事於漢卑辱先單于師古曰言忝辱之更令卑下也為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然强弱有時今漢方盛烏孫城郭諸國皆為臣妾師古曰謂西域諸國為城郭而居也自且鞮侯單于以來匈奴日削不能取復師古曰且音子余反復音扶目反雖屈彊於此未嘗一日安也師古曰屈音其勿反今事漢則安存不事則危亡計何以過此諸大人相難乆之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍師古曰婁音力于反郅支單于亦遣子右大將駒于利受入侍是歲甘露元年也明年呼韓邪單于欵五原塞師古曰欵叩也願朝三年正月師古曰㑹正旦之朝賀也漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上師古曰所過之郡毎為𤼵兵陳列於道以為寵衛也單于正月朝天子於甘泉宫漢寵以殊禮位在諸侯王上賛謁稱臣而不名賜以冠帯衣裳黄金璽盭綬師古曰盭古戾字戾草名也以戾染綬亦諸侯王之制也玉具劍孟康曰摽首鐔衛盡用玉為}
