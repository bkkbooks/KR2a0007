  - {type: 'tls:seg', offset: 1196, content: '', id: KR2a0007_tls_094-8a.12}
  - {type: variant, offset: 1197, length: 0, content: '', WYG: 單于無恙所以遺物及言語云云中行説令單于以尺二寸牘及印封皆令廣長大倨驁其辭師古曰倨慢也驁與傲同曰天地所生日月所置匈奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言匈奴俗賤老中行説窮漢使曰而漢俗屯戍從軍當發者其親豈不自奪温厚肥羙齎送飲食行者乎師古曰而汝也飲音於禁反食音似其下亦同漢使曰然説曰匈奴明以攻戰為事老弱不能鬬故以其肥美飲食壯健以自衛如此父子各得相保何以言匈奴輕老也漢使曰匈奴父子同穹廬卧師古曰穹廬旃帳也其形穹隆故曰穹廬父死妻其後母兄弟死盡妻其妻無冠帶之節闕庭之禮中行説曰匈奴之俗食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寛則人樂無事約束徑易行君}
  - {type: page-break, offset: 1197, content: '', id: KR2a0007_WYG_094-17a, image: WYG0251/WYG0251-0096c.png}
  - {type: variant, offset: 1197, length: 0, content: '', krp: 單于無恙所以遺物及言語云云中行説令單于以尺二寸牘及印封皆令廣長大倨驁其辭師古曰倨慢也驁與傲同曰天地所生日月所置匈奴大單于敬問漢皇帝無恙所以遺物言語亦云云漢使或言匈奴俗賤老中行説窮漢使曰而漢俗屯戍從軍當發者其親豈不自奪温厚肥羙齎送飲食行者乎師古曰而汝也飲音於禁反食音似其下亦同漢使曰然説曰匈奴明以攻戰為事老弱不能鬬故以其肥美飲食壯健以自衛如此父子各得相保何以言匈奴輕老也漢使曰匈奴父子同穹廬卧師古曰穹廬旃帳也其形穹隆故曰穹廬父死妻其後母兄弟死盡妻其妻無冠帶之節闕庭之禮中行説曰匈奴之俗食畜肉飲其汁衣其皮畜食草飲水隨時轉移故其急則人習騎射寛則人樂無事約束徑易行君}
  - {type: variant, offset: 1198, length: 0, content: '', WYG: 簡可久師古曰徑直也簡率也一國之政猶一體也父兄死則妻其妻惡種姓之失也故匈奴雖亂必立宗種今中國雖陽}
  - {type: variant, offset: 1198, length: 0, content: '', krp: 簡可久師古曰徑直也簡率也一國之政猶一體也父兄死則妻其妻惡種姓之失也故匈奴雖亂必立宗種今中國雖陽}
  - {type: variant, offset: 1199, length: 2, content: 平我, WYG: 取其父兄之妻親屬益踈則相殺至制易姓皆從此類也宋祁曰至制舊本越本作至到且禮義之敝上下交怨而室屋之極生力屈焉師古曰言忠信衰薄强為禮義故其末流怨恨彌起棟宇之作土木競勝勞役既重所以力屈屈盡也屈音其勿反夫力耕桑以求衣食師古曰力謂竭力也築城郭以自備故其民急則不習戰攻緩則罷於作業師古曰罷讀曰疲嗟土室之人顧無喋喋佔佔冠固何當師古曰嗟者嘆愍之言喋喋利口也佔佔衣裳貌也言漢人且當思念無為喋喋佔佔耳雖自謂著冠何所當益也喋音牒佔音昌占反自是之後漢使欲辯論者中行説輒曰漢使毋多言顧漢所輸匈奴繒絮米糵令其量中必善美而已師古曰顧念也中猶滿也量中者滿其數也中音竹仲反何以言為乎且所給備善則已不備善而苦惡則候秋孰以騎馳蹂廼稼穡也師古曰苦猶麤也蹂踐也廼汝也蹂音人九反日夜教單于候利害處孝文十四年匈奴單于十四萬騎入朝那蕭闗殺北地都尉卬虜人民畜産甚多遂至彭陽服䖍曰安定縣也師古曰}
