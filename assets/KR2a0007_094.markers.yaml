  - {type: variant, offset: 604, length: 1, content: 爭, WYG: 皆服以冒頓為賢是時漢初定徙韓王信於代都馬邑匈奴大攻圍馬邑韓信降匈奴匈奴得信因引兵南踰句注攻太原至晉陽下髙帝自將兵往擊}
  - {type: variant, offset: 604, length: 1, content: 爭, krp: 皆服以冒頓為賢是時漢初定徙韓王信於代都馬邑匈奴大攻圍馬邑韓信降匈奴匈奴得信因引兵南踰句注攻太原至晉陽下髙帝自將兵往擊}
