  - {type: variant, offset: 3494, length: 0, content: '', WYG: 不絶如髪頼䝉漢力故得復安今平定未乆人民創艾戰鬬師古曰創音初亮反艾讀曰乂且莫車年少百姓未附恐復危國我與大閼氏一家共子師古曰一家言親姊妹也共子兩人所生恩慈無别也不如立雕陶莫臯大閼氏曰且莫車雖少大臣共持國事今舍貴立賤後世必亂師古曰舍謂棄置也單于卒從顓渠閼氏計立雕陶莫臯約令傳國與弟呼韓邪死雕陶莫臯立為復株絫若鞮單于師古曰復音服絫音力追反復株絫若鞮單于立遣子右致盧兒王醯諧屠奴侯入侍以且麋胥為左賢王且莫車為左谷蠡王嚢知牙斯為右賢王復株絫單于復妻王昭君生二女長女云為須卜居次李竒曰居次者女之號若漢言公主也文穎曰須卜氏匈奴貴族也小女為當于居次文潁曰當于亦匈奴大族也師古曰須卜當于皆其夫家氏族河平元年單于遣右臯林王伊邪莫演等奉獻朝正月師古曰演音衍既罷遣使者送至蒲坂師古曰河東之縣也伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光禄大夫谷永議郎杜欽以為漢興匈奴數為邊害故設金爵之賞以待降者今單于詘體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於徃時今既享單于聘貢之質師古曰享當也質誠也}
