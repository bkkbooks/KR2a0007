  - {type: variant, offset: 3204, length: 6, content: 侯槐里起園邑, WYG: 攻我若肯發兵助我乎師古曰若汝也其下亦同右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我師古曰言於汝所居處自死握衍朐鞮單于恚自殺左大且渠都隆竒亡之右賢王所其民衆盡降呼韓邪單于是嵗神爵四年也握衍朐鞮單于立三年而敗前漢書卷九十四上前漢書卷九十四上考證匈奴傳上左右谷蠡史記谷蠡下有王字善為誘兵以包敵包敵史記作冒敵後北服渾窳屈射丁零按渾窳史記作渾庾丁零史記作丁靈本傳後文又作丁令冒頓縱精兵三十餘萬騎三十史記作四十數背約侵盗代鴈門雲中史記無鴈門}
