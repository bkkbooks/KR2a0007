  - {type: variant, offset: 1948, length: 0, content: '', WYG: 制長城以北引弓之國受令單于長城以内冠帶之室朕亦制之使萬民耕織射獵衣食父子毋離臣主相安俱無暴虐今聞渫惡民貪降其趨晉灼曰渫音渫水之渫邪惡不正之民師古曰渫音先列反降下也謂下意於利也趨讀曰趣背義絶約忘萬民之命離兩主之驩然其事已在前矣書云}
