  - {type: variant, offset: 3900, length: 0, content: '', WYG: 王根領尚書事或説根曰匈奴有斗入漢地直張掖郡師古曰斗絶也直當也生竒材木箭竿就羽師古曰就大鶚也黄頭赤目其羽可為箭竿音工旱反宋祁曰注鶚當作鵰如得之於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利上直欲從單于求之師古曰直猶正爾為有不得傷命損威師古曰詔命不行故云傷命也根即但以上指曉藩令從藩所説而求之師古曰自以藩意説單于而求之藩至匈奴以語次説單于曰竊見匈奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望乆勞單于宜上書獻此地直斷閼之宋祁曰閼當作閉省兩都尉士卒數百人以復天子厚恩師古曰復亦報也其報必大師古曰漢得此地必厚報賞單于宋祁曰賞字當作償單于曰此天子詔語邪將從使者所求也藩曰詔指也然藩亦為單于畫善計耳單于曰孝宣孝元皇帝哀憐父呼韓邪單于從長城以北匈奴有之此温偶駼王所居地也師古曰偶音五口反駼音􅂗次下亦同未曉其形狀所生請遣使問之師古曰所生謂山之所出草木鳥獸為用者藩容歸漢後復使匈奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也已問温偶駼王匈奴西邊諸侯作穹廬及車皆仰此山材木師古曰謂諸小王為諸侯者效中國之言耳仰音牛向反且先父地不敢失也藩還遷為太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔從單于求地法當死更大赦二師古曰更經也更音工衡反今徙藩為濟南太守不令當匈奴明年侍子死歸塟復遣子左於駼􅄷撣王稽留昆入侍師古曰撣音􅅶稽音雞至哀帝建平二年烏孫庶子卑援疐師古曰援音爰疐音竹二反翕侯人衆入匈奴西界㓂盗牛畜頗殺其民單于聞之遣左大當户烏夷泠師古曰泠音零將五千騎擊烏孫殺數百人畧千餘人敺牛畜去師古曰敺與驅同卑援疐恐遣子趨逯為質匈奴師古曰逯音録單于受以狀聞漢遣中郎將丁野林副校尉公乘音使匈奴責譲單于告令還歸卑援疐質子單于受詔遣歸建平四年單于上書願朝五年時哀帝被疾或言匈奴從上游來厭人服䖍曰游猶流也河水從西北來故曰上游也師古曰上游亦總謂地形耳不必係於河水也厭音一涉反自黄龍竟寜時單于朝中國輙有大故師古曰大故謂國之大喪上由是難之以問公卿亦以為虛費府帑師古曰府物所聚也帑藏金帛之所也音它莽反又音奴可且勿許單于使辭去未𤼵黄門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰師古曰已亂而後治之戰鬬而後𫉬勝則不足貴二者皆微師古曰微謂精妙也然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴從此隙矣本北地之狄五帝所不能臣三王所不能制其不可使隙甚明臣不敢逺稱請引秦以來明之以秦始皇之彊蒙恬之威帯甲四十餘萬然不敢窺西河廼築長城以界之㑹漢初興以髙祖之威靈三十萬衆困於平城士或七日不食時竒譎之士石畫之臣甚衆鄧展曰石大也師古曰石言堅固如石也畫計䇿也音𫉬卒其所以脱者世莫得而言也師古曰卒終也莫得而言謂自免之計其事醜惡故不傳又髙皇后嘗忿匈奴羣臣庭議樊噲請以十萬衆横行匈奴中季布曰噲可斬也妄阿順指於是大臣權書遺之師古曰以權道為書順辭以答之然後匈奴之結觧中國之憂平及孝文時匈奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯細栁棘門覇上以備之數月廼罷孝武即位設馬邑之權欲誘匈奴使韓安國將三十萬衆徼於便墬師古曰徼要也音工堯反墬古地字匈奴覺之而去徒費財勞師一虜不可得見况單于之面乎其後深惟社稷之計規恢萬載之䇿師古曰恢大也廼大興師數十萬使衛}
