  - {type: variant, offset: 3257, length: 1, content: 武, krp: 師古曰鐔劍口旁横出者也衛劍鼻也鐔音滛衛字本作彘其音同耳佩刀弓一張矢四發服䖍曰𤼵十二矢也韋昭曰射禮三而止每射四矢故以十二為一𤼵也師古曰𤼵猶今言箭一放兩放也今則以一矢為一放也􅙶㦸十師古曰􅙶㦸有衣之㦸也􅙶音啓安車一乗鞍勒一具師古曰勒馬轡也馬十五匹黄金二十斤錢二十萬衣被七十七襲師古曰一稱為一襲猶今人之言一副衣服也宋祁曰注文之字服字當刪錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平師古曰道讀曰導長平涇水上坂也觧在宣紀上自甘泉宿池陽宫上登長平詔單于毋謁師古曰不令拜也其左右當户之羣臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬嵗單于就邸留月餘遣歸國單于自請願留居光禄塞下師古曰即徐自為所築者也有急保漢受降城師古曰保守也於此自守漢遣長樂衛尉髙昌侯董忠車騎都尉韓昌將騎萬六千又發邊郡士馬以千數送單于出朔方雞鹿塞師古曰在朔方窳渾縣西北詔忠等留衞單于助誅不服又轉邊榖米糒前後三萬四千斛給贍其食師古曰糒乾飯也音備是嵗郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八千斤以有屯兵故不復發騎為送始郅支單于以為呼韓邪降漢兵弱不能復自還即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支殺之并其兵五萬餘人聞漢出兵榖助呼韓邪即遂留居右地自度力不能定匈奴師古曰度音徒各反乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠見呼韓邪為漢所擁郅支亡虜欲攻之以稱漢師古曰稱漢朝之意也稱音尺孕反乃殺郅支使持頭送都䕶在所發八千騎迎郅支郅支見烏孫兵多其使又不反勒兵逢擊烏孫破之師古曰以兵逆之相逢即擊故云逢擊因北擊烏揭師古曰揭音丘例反烏揭降發其兵西破堅昆北降丁令師古曰令音零并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元}
  - {type: variant, offset: 3259, length: 1, content: 始, WYG: 初即位呼韓邪單于復上書言民衆困乏漢詔雲中五原郡轉榖二萬斛以給焉郅支單于自以道逺又怨漢擁䕶呼韓邪遣使上書求侍子漢遣谷吉送之郅支殺吉漢不知吉音問而匈奴降者言聞甌脱皆殺之師古曰於甌脱得聲問云殺之劉攽曰郅支殺谷吉漢不聞音問而降者言甌脱殺吉甌脱屬呼韓邪故漢責其使也言皆者吉有徒衆呼韓邪單于使來漢輙簿責之甚急師古曰簿責以文簿一一責之也簿音歩戸反明年漢遣車騎都尉韓昌光禄大夫張猛送呼韓邪單于侍子求問吉等因赦其罪勿令自疑師古曰疑者疑漢欲討伐也昌猛見單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸單于北歸者師古曰塞下無禽獸則射獵無所得又不畏郅支故欲北歸舊處恐北去後難約束師古曰不可更共為言要昌猛即與為盟約曰自今以來漢與匈奴合為一家世世毋得相詐相攻有竊盗者相報行其誅償其物師古曰漢人為盗於匈奴匈奴人為盗於漢皆相告報而誅償有冦𤼵兵相助漢與匈奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱登匈奴諾水東山師古曰諾水即今突厥地諾真水也刑白馬單于以徑路刀金留犂撓酒應劭曰徑路匈奴寶刀也金契金也留犂飯匕也撓和也契金著酒中撓攪飲之師古曰契刻撓攪也音呼髙反宋祁曰注文契刻下當有也字以老上單于所破月氏王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為危害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告于天羞國家傷威重師古曰羞辱也不可得行宜遣使徃告祠天與觧盟昌猛奉使無狀罪至不道師古曰無狀言無善狀上薄其過師古曰以其罪過為輕薄有詔昌猛以贖論勿觧盟其後呼韓邪竟北歸庭人衆稍稍歸之國中遂定郅支既殺使者自知負漢又聞呼韓邪益彊恐見襲擊欲逺去㑹康居王數為烏孫所困與諸翕侯計以為匈奴大國烏孫素服屬之今郅支單于困阸在外可迎置東邊使合兵取烏孫以}
