  - {type: variant, offset: 3183, length: 5, content: 信好酒田蚡, WYG: 而遣後將軍趙充國將兵四萬餘騎屯縁邊九郡備虜月餘單于病歐血因不敢入還去即罷兵廼使題王都犁胡次等入漢請和親未報㑹單于死是嵗神爵二年也虚閭權渠單于立九年死自始立而黜顓渠閼氏顓渠閼氏即與右賢王私通右賢王㑹龍城而去顓渠閼氏語以單于病甚且勿逺後數日單于死郝宿王刑未央使人召諸王未至師古曰郝音呼各反顓渠閼氏與其弟左大且渠都隆竒謀立右賢王屠耆堂為握衍朐鞮單于握衍朐鞮單于者代父為右賢王師古曰胊音劬烏維單于耳孫也握衍朐鞮單于立復修和親遣弟伊酋若王}
