  - {type: variant, offset: 3181, length: 1, content: 蓋, WYG: 民死者什三畜産什五匈奴大虚弱諸國羈屬者皆瓦解攻盗不能理其後漢出三千餘騎為三道並入匈奴捕虜得數千人還匈奴終不敢取當師古曰當者報其直兹欲郷和親師古曰兹益也郷讀曰嚮而邊境少事矣壺衍鞮單于立十七年死弟左賢王立為虚閭權渠單于是嵗地節二年也虚閭權渠單于立以右大將女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏父左大且渠怨望是時匈奴不能為邊宼於是漢罷外城以休百姓師古曰外城塞外諸城單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後令亦效漢發兵先使使者入廼自請與呼盧訾王各將萬騎南旁塞獵相逄俱入師古曰訾音子移反旁音步浪反行未到㑹三騎亡降漢言匈奴欲為宼於是天子詔發邊騎屯要害處使大將軍軍監治衆等四人師古曰治衆者軍監之名將五千騎分三隊師古曰隊音徒内反出塞各數百里捕得虜各數十人而還時匈奴亡其三騎不敢入即引去是嵗也匈奴飢人民畜産死十六七又發兩屯各萬騎以備漢其秋匈奴前所得西嗕居左地者孟康曰嗕音辱匈奴種也師古曰嗕音奴獨反其君長以下數千人皆驅畜産行與甌脱戰所戰殺傷甚衆遂南降漢其明年西域城郭共擊匈奴取車師國師古曰城郭謂諸國為城居者得其王及人衆而去單于復以車師王昆弟兠莫為車師王收其餘民東徙不敢居故地而漢益遣屯士分田車師地以實之其明年匈奴怨諸國共擊車師遣左右大將各萬餘騎屯田右地欲以侵廹烏孫西域後二嵗匈奴遣左右奥鞬各六千騎師古曰奧音郁鞬音居言反與左大將再擊漢之田車師城者不能下其明年丁令比三嵗入盗匈奴師古曰比頻也殺略人民數千驅馬畜去匈奴遣萬餘騎往擊之無所得其明年單于將十萬餘騎旁塞獵師古曰旁音歩浪反欲入邊宼未至㑹其民題除渠堂亡降漢言狀漢以為言兵鹿奚盧}
