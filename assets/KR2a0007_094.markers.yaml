  - {type: variant, offset: 1189, length: 0, content: '', WYG: 歌之曰平城之下亦誠苦七日不食不能彀弩師古曰彀張也音工豆反今歌唫之聲未絶傷痍者甫起師古曰唫古吟字痍創也甫始也痍音夷而噲欲揺動天下妄言以十萬衆横行是面謾也師古曰謾欺誑也音慢又音莫連反且匈奴何與得失得其善言不足喜惡言不足怒也髙后曰善令大謁者張澤報書曰單于不忘弊邑賜之以書弊邑恐懼退日自圖師古曰圖謀也年老氣衰髪齒墮落行步失度單于過聼不足以自汙師古曰過誤也弊邑無罪宜在見赦竊有御車二乘馬二駟以奉常駕冒頓得書復使使來謝曰未嘗聞中國禮義宋祁曰晏本無嘗字陛下幸而赦之因獻馬遂和親至孝文即位復脩和親其三年夏匈奴右賢王入居河南地為㓂於是文帝下詔曰漢與匈奴約為昆弟無侵害邊境所以輸遺匈奴甚厚今右賢王離其國將衆居河南地非常故師古曰言異於常非舊事往來入塞捕殺吏卒􅇌侵上郡保塞蠻夷令不得居其故師古曰􅇌與驅同保塞蠻夷謂本來屬漢而居邊塞自保守陵轢邊吏入盗甚驁無道師古曰轢音來各反驁與傲同非約也其𤼵邊吏車騎八萬詣髙奴師古曰上郡之縣也遣丞相灌嬰將擊右賢王右賢王走出塞文帝幸太原是時濟北王反文帝歸罷丞相擊胡之兵其明年單于遺漢書曰天所立匈奴大單于敬問皇帝無恙前時皇帝言和親事稱書意合驩師古曰稱副也言與所遺書意相副而}
