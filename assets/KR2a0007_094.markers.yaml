  - {type: variant, offset: 3158, length: 0, content: '', WYG: 陵侯匈奴繇是恐師古曰繇讀與由同不能出兵即使使之烏孫求欲得漢公主擊烏孫取車延惡師地烏孫公主上書下公卿議救未決昭帝崩宣帝即位烏孫昆彌復上書言連為匈奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊匈奴唯天子出兵哀救公主本始二年漢大發闗東輕鋭士選郡國吏三百石伉健習騎射者皆從軍師古曰伉音古浪反遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓増三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五}
