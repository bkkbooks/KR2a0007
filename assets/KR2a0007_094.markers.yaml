  - {type: variant, offset: 104, length: 1, content: 譏, WYG: 所書晉師滅赤狄潞氏郤缺𫉬白狄子者而秦穆公得由余西戎八國服於秦故隴以西有緜諸畎戎狄獂之戎師古曰皆在天水界即緜諸道及貆道是也獂音桓在岐梁涇漆之北有義渠大荔烏氏朐􅄛之戎師古曰此漆水在新平荔音隸氏音支朐音許于反而晉北有林胡樓煩之戎燕北有東胡山戎服䖍曰烏桓之先也後為鮮卑各分散谿谷自有君長往往而聚者百有餘戎然莫能相壹自是之後百有餘年晉悼公使魏絳和戎翟戎翟朝晉後百有餘年趙襄子踰句注而破之并代以臨胡貉師古曰貉音莫伯反後與韓魏共滅智伯分晉地而有之則趙有代句注以北而魏有西河上郡以與戎界邉其後義渠之戎築城郭以自守而秦稍蠶食之至於惠王遂㧞義渠二十五城惠王伐魏魏盡入西河及上郡于秦秦昭王時義渠戎王與宣太后亂有二子師古曰即昭王母也宣太后詐而殺義渠戎王於甘泉遂起兵伐滅義渠於是秦有隴西北地上郡築長城以距胡而趙武靈王亦變俗胡服習騎射北破林胡樓煩自代並隂山下至髙闕為塞師古曰並音步浪反髙闕解在衛青傳宋祁曰邵本樓煩隂山為句而置雲中鴈門代郡其後燕有賢將秦開為質於胡胡甚信之歸而襲破東胡東胡郤千餘里師古曰郤退也音丘畧反與荆軻刺秦王秦舞陽者開之孫也燕亦築長城自造陽至襄平師古曰造陽地名在上谷界襄平即遼東所治也置上谷漁陽右北平遼西遼東郡以距胡當是時冠帶戰國七而三國邊於匈奴如淳曰燕趙秦其後趙將李牧時匈奴}
