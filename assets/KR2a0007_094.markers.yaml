  - {type: variant, offset: 2669, length: 335, content: 子無寵立六年薄太后崩皇后廢廢後四年薨葬長安城東平望亭南孝景王皇后武帝母也父王仲槐里人也母臧兒故燕王臧荼孫也為仲妻生男信與兩女而仲死臧兒更嫁為長陵田氏婦生男蚡勝臧兒長女嫁為金王孫婦生一女矣而臧兒卜筮曰兩女當貴欲倚兩女奪金氏金氏怒不肯與決乃內太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徵也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊粟姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃粟姬妒而景帝諸美人皆因長公主見得貴幸粟姬日怨怒謝長主不許長主欲與王夫人王夫人許之會薄皇后廢長公主日譖粟姬短景帝嘗屬諸姬子曰吾百歲後善視之粟姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又耳曩者所夢日符計未有所定王夫人又陰使人趣, WYG: ''}
