  - {type: variant, offset: 4548, length: 0, content: '', WYG: 能負此三難也胡地秋冬甚寒春夏甚風多齎鬴鍑薪炭重不可勝師古曰鬴古釡字也鍑釡之大口者也鍑音富食糒飲水以歴四時師有疾疫之憂是故前世伐胡不過百日非不欲乆埶力不能此四難也輜重自隨則輕鋭者少師古曰重音直用反其下亦同不得疾行虜徐遁逃埶不能及幸而逢虜又累輜重師古曰累音力瑞反如遇險阻銜尾相隨師古曰銜馬銜也尾馬尾也言前後單行不得並驅虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜師古曰請率見到之兵且以擊虜莽不聽尤言轉兵榖如故天下騷動咸既受莽孝單于之號馳出塞歸庭具以見脅狀白單于單于更以為於粟置支侯匈奴賤官也後助病死莽以登代助為順單于厭難將軍陳欽震狄將軍王廵屯雲中葛邪塞師古曰厭音一渉反是時匈奴數為邊㓂殺將率吏士略人民􅇌畜産去甚衆師古曰􅇌與驅同捕得虜生口驗問皆曰孝單于咸子角數為㓂兩將以聞四年莽㑹諸蠻夷斬咸子登於長安市初北邊自宣帝以來數世不見煙火之警人民熾盛牛馬布野及莽撓亂匈奴與之搆難師古曰撓攪也音火髙反邊民死亡係獲又十二部兵乆屯而不出吏士罷弊師古曰罷讀曰疲數年之間北邊虛空野有暴骨矣烏珠留單于立二十一歲建國五年死匈奴用事大臣右骨都侯須卜當即王昭君女伊墨居次云之壻也云常欲與中國和親又素與咸厚善見咸前後為莽所拜故遂越輿而立咸為烏累若鞮單于師古曰累音力追反烏累單于咸立以弟輿為左谷蠡王烏珠留單于子蘇屠胡本為左賢王以弟屠耆閼氏子盧渾為右賢王師古曰渾音胡昆反烏珠留單于在時左賢王數死以為其號不祥更易命左賢王曰䕶于䕶于之尊最貴次當為單于故烏珠留單于授其長子以為䕶于欲𫝊以國咸怨烏珠留單于貶賤}
