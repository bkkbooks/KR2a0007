  - {type: variant, offset: 5492, length: 1, content: 忠, WYG: 義動君子利動貪人如匈奴者非可以仁義説也師古曰此説謂勸諭獨可説以厚利結之於天耳師古曰此説讀曰悦故與之厚利以沒其意師古曰沒溺也與盟於天以堅其約質其愛子以累其心師古曰累音力瑞反匈奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何師古曰展轉為移動其心夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約晉灼曰堅城固守不勝遣貞士為和親之約也而使邊城守境之民父兄緩𢃄稚子咽哺師古曰咽吞也哺謂所食在口者也咽音晏哺音捕胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事廼知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輙拘留漢使以相報復師古曰復音扶目反其桀驁尚如斯師古曰驁與傲同安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既徃之悔而長匈奴無已之詐也師古曰襲重也重叠為其事夫邊城不選守境武略之臣脩障隧備塞之具厲長㦸勁弩之械恃吾所以待邊㓂而務賦歛於民逺行貨賂割剥百姓以奉㓂讐信甘言守空約而幾胡馬之不窺不已過乎師古曰幾讀曰冀至孝宣之世承武帝奮擊之威直匈奴百年之運師古曰直當也因其壊亂幾亡之阸師古曰幾近也音鉅依反權時施宜覆以威徳然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野師古曰晏晚也三世無犬吠之警菞庶亡干戈之役師古曰菞古黎字後六十餘載之間遭王莽簒位始開邊隙單于}
