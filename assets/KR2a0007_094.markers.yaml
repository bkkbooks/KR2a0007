  - {type: variant, offset: 90, length: 8, content: 易基乾坤詩首關雎, WYG: 取翟女為后與翟共伐鄭已而黜翟后翟后怨而襄王繼母曰惠后有子帶欲立之於是惠后與翟后子帶為内應開戎翟戎翟以故得入破逐襄王而立子帶為王於是戎翟或居於陸渾師古曰今伊闕南陸渾山川是其地東至於衛侵盗尤甚周襄王既居外四年廼使使告急於晉晉文公初立欲脩覇業廼興師伐戎翟誅子帶迎内襄王于雒邑當是時秦晉為彊國晉文公攘戎翟居于西河圜洛之間晉灼曰圜音嚚三倉作圁地理志圜水出上郡白土縣西東流入河師古曰圜水即今銀州銀水是也}
