  - {type: variant, offset: 433, length: 2, content: 家人, WYG: 馬令國中有後者斬遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王虜其民衆畜産既歸西擊走月氏南并樓煩白羊河南王師古曰二王之居在河南悉復收秦所使蒙恬所奪匈奴地者與漢闗故河南塞至朝那膚施師古曰朝那屬安定膚施屬上郡遂侵燕代是時漢方與項羽相距中國罷於兵革師古曰罷讀曰疲以故冒頓得自彊控弦之士三十餘萬師古曰控引也控弦言能引弓者自淳維以至頭曼千有餘嵗時大時小别散分離尚矣師古曰尚乆逺其世傳不可得而次然至冒頓而匈奴最彊大盡服從北夷而南與諸夏為敵國其世姓官號可得而記云單于姓攣鞮氏師古曰攣音力全反鞮音丁奚反其國稱之曰撐犁孤塗單于蘇林曰撐音牚距之牚師古曰音丈庚反匈奴謂天為撐犁謂}
