  - {type: variant, offset: 534, length: 0, content: '', krp: 左屠耆王自左右賢王以下至當戸大者萬餘騎小者數千凡二十四長立號曰萬騎其大臣皆世官呼衍氏蘭氏師古曰呼衍即今鮮卑姓呼延者是也蘭姓今亦有之其後有湏卜氏此三姓其貴種也諸左王將居東方直上谷以東師古曰直當也其下亦同也劉攽曰以東屬下句接􅐮貉朝鮮右王將居西方直上郡以西接氐羌而單于庭直代雲中各有分地逐水草移徙而左右賢王左右谷蠡最大國劉攽曰衍國字左右骨都侯輔政諸二十四長亦各自置千長百長什長裨小王師古曰禆音頻移反宋祁曰百長下舊本有行長二字相都尉當户且渠之屬師古曰且音子餘反今之沮渠姓盖本因此官嵗正月諸長少㑹單于庭祠五月大㑹龍城祭其先天地鬼神秋馬肥大㑹蹛林課校}
  - {type: variant, offset: 535, length: 4, content: 仁弱高祖, WYG: 畜計服䖍曰蹛音帶匈奴秋社八月中㑹􅀕處也師古曰蹛者繞林木而祭也鮮卑之俗自古相𫝊秋天之祭無林木者尚竪栁枝衆騎馳遶三周廼止此其遺法計者人畜之數其法拔刃尺者死坐盗者没入其家有罪小者軋服䖍曰刃刻其面也如淳曰軋撾杖也師古曰二説皆非軋謂輾轢其骨節若今之厭踝者也軋音於黠反輾音女展反大者死獄久者不滿十日一國之囚不過數人而單于朝出營拜日之始生夕拜月其坐長左而北向師古曰坐者以左為尊日上戊巳其送死有棺椁金銀衣裳而無封樹喪服近幸臣妾從死者多至數十百人師古曰或數十人或百人舉事常隨月盛壯以攻戰月虧則退兵其攻戰斬首虜賜一巵酒而所得鹵𫉬因以予之得人}
