  - {type: variant, offset: 3151, length: 0, content: '', WYG: 老之稱也行音胡浪反漢遣中郎將蘇武厚幣賂遺單于單于益驕禮甚倨非漢所望也明年浞野侯破奴得亡歸漢其明年漢使貳師將軍將三萬騎出酒泉擊右賢王於天山得首虜萬餘級而還匈奴大圍貳師幾不得脱師古曰幾音鉅依反漢兵物故什六七師古曰物故謂死也漢又使因杅將軍出西河與强弩都尉會涿邪山亡所得使騎都尉李陵將歩兵五千人出居延北千餘里與單于會合戰陵所殺傷萬餘人兵食盡欲歸單于圍陵陵降匈奴其兵得脱歸漢者四百人單于廼貴陵以其女妻之後二嵗漢使貳師將軍六萬騎歩兵七萬出朔方强弩都尉路博徳宋祁曰博舊本作萬校本改作博將萬餘人與貳師㑹㳺擊將軍説步兵三萬人出五原師古曰即上韓説也因杅將軍敖將騎萬步兵三萬人出鴈門匈奴聞悉逺其累重於余吾水北師古曰累重謂妻子資産也累音力瑞反重音直用反而單于以十萬待水南與貳師接戰貳師解而引歸與單于連鬬十餘日㳺擊亡所得因杅與左賢王戰不利引歸明年且鞮侯單于死立五年長子左賢王立為狐鹿姑單于是嵗}
