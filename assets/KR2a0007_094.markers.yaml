  - {type: variant, offset: 5510, length: 3, content: 霍光為, WYG: 山谷雍以沙幕師古曰雍讀曰壅天地所以絶外内也是故聖王以徳綏之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招㓂其地不可耕而食也其民不可臣而畜也是以外而不内疎而不戚師古曰戚近也政教不及其人正朔不加其國來則懲而御之去則備而守之師古曰懲謂使其創乂其慕義而貢獻則接之以禮譲覊縻不絶使曲在彼蓋聖王制御蠻夷之常道也前漢書卷九十四下前漢書卷九十四下考證匈奴傳下呼韓邪單于左}
