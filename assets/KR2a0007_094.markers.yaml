  - {type: variant, offset: 3262, length: 2, content: 嫣白, WYG: 邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支已伏誅願入朝見竟寜元年單于復入朝禮賜如初加衣服錦帛絮皆倍於黄龍時單于自言願壻漢氏以自親師古曰言欲取漢女而身為漢家壻元帝以後宫良家子王嬙字昭君賜單于單于驩喜上書願保塞上谷以西至敦煌師古曰保守也自請保守}
