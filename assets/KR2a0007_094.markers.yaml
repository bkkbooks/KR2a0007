  - {type: variant, offset: 4541, length: 0, content: '', WYG: 諸邊王入塞㓂盗大軰萬餘中軰數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數縁邊虛耗莽新即位怙府庫之富欲立威廼拜十二部將率發郡國勇士武庫精兵各有所屯守轉委輸於邊議滿三十萬衆齎三百日糧同時十道並出窮追匈奴内之于丁令師古曰逐之遣入丁令地令音零因分其地立呼韓邪十五子莽將嚴尤諫曰臣聞匈奴為害所從來乆矣未聞}
  - {type: page-break, offset: 4541, content: '', id: KR2a0007_WYG_094-77b, image: WYG0251/WYG0251-0127b.png}
  - {type: variant, offset: 4541, length: 0, content: '', krp: 諸邊王入塞㓂盗大軰萬餘中軰數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數縁邊虛耗莽新即位怙府庫之富欲立威廼拜十二部將率發郡國勇士武庫精兵各有所屯守轉委輸於邊議滿三十萬衆齎三百日糧同時十道並出窮追匈奴内之于丁令師古曰逐之遣入丁令地令音零因分其地立呼韓邪十五子莽將嚴尤諫曰臣聞匈奴為害所從來乆矣未聞}
  - {type: variant, offset: 4542, length: 4, content: 思念李夫, WYG: 世有必征之者也後世三家周秦漢征之然皆未有得上䇿者也周得中䇿漢得下䇿秦無䇿焉當周宣王時獫􅁢内侵至於涇陽命將征之盡境而還其視戎狄之侵譬猶蟁蝱之螫敺之而已師古曰蟁古蚊字也蝱音盲螫音式亦反敺與驅同故天下稱明是為中䇿漢武帝選將練兵約齎輕糧深入逺戍師古曰約少也少齎衣裝雖有克獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創艾師古曰罷讀曰疲耗損也創音初向反艾讀曰乂次下亦同而天下稱武是為下䇿秦始皇不忍小耻而輕民力築長城之固延袤萬里師古曰袤長也音茂轉輸之行起於負海疆境既完中國内竭以喪社稷是為無䇿今天下遭陽九之戹比年饑饉西北邊尤甚發三十萬衆具三百日糧東援海代南取江淮然後乃備師古曰援引也音爰計其道里一年尚未集合兵先至者聚居暴露師老械弊埶不可用此一難也邊既空虛不能奉軍糧内調郡國不相及屬此二難也師古曰調發也音徒釣反屬音之欲反計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以徃事揆之軍出未滿百日牛必物故且盡師古曰物故謂死也餘糧尚多}
