  - {type: variant, offset: 3189, length: 7, content: 貪巧於文辭蚡至, WYG: 之入漢獻見師古曰酋音材由反單于初立凶惡盡殺虚閭權渠時用事貴人刑未央等而任用顓渠閼氏弟都隆竒又盡免虚閭權渠子弟近親而自以其子弟代之虚閭權渠單于子稽侯狦既不得立師古曰狦音先安反又音所姦反亡歸妻父烏禪幕師古曰禪音蟬烏禪幕者本烏孫康居閒小國數見侵暴率其衆數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地師古曰長衆為之長帥日逐王先賢禪宋祁曰禪當作撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即率其衆數萬騎歸漢漢封日逐王為歸徳侯單于更立其從兄薄胥堂為日逐王師古曰胥音先余反明年單于又殺先賢撣兩弟烏禪幕請之不聼心恚其後左奧鞬王死單于自立其小子為奧鞬王留庭奧鞬貴人共立故奧鞬王子為王與俱東徙單于遣右}
  - {type: page-break, offset: 3189, content: '', id: KR2a0007_WYG_094-45b, image: WYG0251/WYG0251-0111b.png}
