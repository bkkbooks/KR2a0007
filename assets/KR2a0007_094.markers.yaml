  - {type: variant, offset: 3243, length: 0, content: '', WYG: 築始皇二十九年廵隴西過回中宮即此括地志云秦回中宮在岐州雍縣西四十里武帝元封四年幸雍通回中道遂北出蕭闗又以下文証之則在雍明矣漢亦棄上谷之斗辟縣造陽地以予胡注云云臣召南按造陽地當在上谷最北即前文所云燕亦築長城自造陽至襄平者也据後文則造陽之北凡九百里後世如開平小興州等地疑即古之造陽又北益廣田至眩雷}
  - {type: page-break, offset: 3243, content: '', id: KR2a0007_WYG_094-48b, image: WYG0251/WYG0251-0112d.png}
  - {type: variant, offset: 3243, length: 0, content: '', krp: 築始皇二十九年廵隴西過回中宮即此括地志云秦回中宮在岐州雍縣西四十里武帝元封四年幸雍通回中道遂北出蕭闗又以下文証之則在雍明矣漢亦棄上谷之斗辟縣造陽地以予胡注云云臣召南按造陽地當在上谷最北即前文所云燕亦築長城自造陽至襄平者也据後文則造陽之北凡九百里後世如開平小興州等地疑即古之造陽又北益廣田至眩雷}
  - {type: variant, offset: 3244, length: 2, content: 金王, WYG: 塞注服䖍曰眩雷地在烏}
  - {type: variant, offset: 3244, length: 2, content: 金王, krp: 塞注服䖍曰眩雷地在烏}
  - {type: variant, offset: 3247, length: 3, content: 生女俗, WYG: 北也臣召南按地理志西河郡增山縣有道西出眩雷塞北部都尉治則眩雷塞在西河郡之西北邊不得逺在烏孫國也悉遠其累重于余吾水北臣召南按山海經曰北鮮之山鮮水出焉北流注于余吾疑即此余吾水也穿井築城治樓以藏榖與秦人守之注師古曰秦時有人云云顧炎武曰顔注非也彼時匈奴謂中國人為秦人猶後世言漢人耳西域傳匈奴縳馬前後足置城下馳言秦人我丐若馬師古曰謂中國人為秦人習言故也彼注甚是又大宛傳聞宛城中新得秦人亦謂中國人前漢書卷九十四上考證欽定四庫全書前漢書卷九十四下漢蘭臺令史班固撰唐正議大夫行秘書少監琅琊縣開國子顔師古注匈奴傳第六十四下呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯}
