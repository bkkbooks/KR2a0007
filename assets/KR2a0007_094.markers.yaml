  - {type: variant, offset: 1190, length: 0, content: '', WYG: 結驩親漢邊吏侵侮右賢王右賢王不請師古曰不告單于也聼後義盧侯難支等計與漢吏相恨絶二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不至師古曰讓書有責讓之言也謂匈奴再得漢書而𤼵使將書以報漢漢留其使不得來還而漢又更不發使至匈奴也漢以其故不和隣國不附今以少吏之敗約師古曰少吏猶言小吏故罰右賢王使至西方求月氏}
  - {type: page-break, offset: 1190, content: '', id: KR2a0007_WYG_094-14a, image: WYG0251/WYG0251-0095a.png}
  - {type: variant, offset: 1190, length: 0, content: '', krp: 結驩親漢邊吏侵侮右賢王右賢王不請師古曰不告單于也聼後義盧侯難支等計與漢吏相恨絶二主之約離昆弟之親皇帝讓書再至發使以書報不來漢使不至師古曰讓書有責讓之言也謂匈奴再得漢書而𤼵使將書以報漢漢留其使不得來還而漢又更不發使至匈奴也漢以其故不和隣國不附今以少吏之敗約師古曰少吏猶言小吏故罰右賢王使至西方求月氏}
  - {type: punctuation, offset: 1192, content: ，, id: KR2a0007_tls_094-bkkpn265}
  - {type: 'tls:seg', offset: 1192, content: '', id: KR2a0007_tls_094-8a.11}
  - {type: variant, offset: 1192, length: 0, content: '', WYG: 以天之福吏卒良馬力强以滅夷月氏師古曰夷平也盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆已為匈奴師古曰皆入匈奴國也掲音丘列反諸引弓之民并為一家北州以定願寢兵休士養馬除前事復故約師古曰復音扶目反以安邊民以應古始使少者得成其長老者得安其處世世平樂未得皇帝之志故使郎中係虖淺奉書請師古曰虖音火姑反獻橐佗一騎馬二駕二駟師古曰騎馬堪為騎也駕可駕車也二駟八匹皇帝即不欲匈奴近塞則且詔吏民逺舍師古曰舍居止也使者至即遣之六月中來至新望之地服䖍曰漢界上塞下之地書至漢議擊與和親孰便公卿皆曰單于新破月氏乘勝不可擊也且得匈奴地澤鹵非可居也和親甚便漢許之孝文前六年遺匈奴書曰皇帝敬問匈奴大單于無恙使係虖淺遺朕書云願寢兵休士除前事復故約以安邊民世世平樂朕甚嘉之此古聖王之志也漢與匈奴約為兄弟所以遺單于甚厚背約離兄弟之親者常在匈奴然右賢王事已在赦前勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書使者言單于自將并國有功甚苦兵事服繡祫綺衣長襦錦袍各一師古曰服者言天子自所服也祫者衣無絮也繡祫綺衣以繡為表綺為裏也祫音工洽反比踈一師古曰辮髪之飾也以金為之比音頻寐反踈字或作余黄金飭具帶一黄金犀毗一孟康曰要中大帶也張晏曰鮮卑郭洛帶瑞獸名也東胡好服之師古曰犀毗胡帶之鉤也亦曰鮮卑亦謂師比總一物也語有輕重耳繡十匹錦二十匹赤綈緑繒各四十匹師古曰繒者帛之總稱綈厚繒也音徒奚反使中大夫意謁者令肩遺單于後頃之冒頓死子稽粥立師古曰稽音雞粥音育號曰老上單于老上稽粥單于初立文帝復遣宗人女翁主為單于閼氏師古曰宗人女亦諸侯王之女使宦者燕人中行説傅翁主師古曰姓中行名説也行音胡郎反説讀曰悦説不欲行漢强使之説曰必我也為漢患者師古曰言我必於漢生患中行説既至因降單于單于愛幸之初單于好漢繒絮食物中行説曰匈奴人衆不能當漢之一郡然所以强之者以衣食異無卬於漢師古曰卬音牛向反}
