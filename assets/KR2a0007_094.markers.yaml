  - {type: variant, offset: 615, length: 2, content: 策得, WYG: 復收代鴈門雲中郡縣不出塞是時匈奴以漢將數率衆往降師古曰即謂韓信陳豨之屬耳故冒頓常往來侵盗代地於是髙祖患之廼使劉敬奉宗室女翁主為單于閼氏師古曰諸王女曰翁主者言其父自主婚嵗奉匈奴絮繒酒食物各有數約為兄弟以和親冒頓廼少止後燕王盧綰復反率其黨且萬人降匈奴往來苦上谷以東終髙祖世孝惠髙后時冒頓寖驕師古曰寖漸也廼為書使使遺髙后曰孤僨之君如淳曰僨仆也猶言不能自立也師古曰僨音方問反生於沮澤之中師古曰沮浸濕之地音子豫反長於平野牛馬之域數至邊境願逰中國陛下獨立孤僨獨居兩主不樂}
