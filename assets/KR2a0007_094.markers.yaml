  - {type: variant, offset: 3348, length: 0, content: '', WYG: 愁苦欲亡者多曰聞匈奴中樂無奈候望急何然時有亡出塞者七也盗賊桀黠羣軰犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落谿谷水門稍稍平之師古曰僵落謂山下樹木摧折或立死枯僵墯落者僵音薑卒徒築治功費乆逺不可勝計臣恐議者不深慮其終始欲以壹切省繇戍師古曰壹切謂權時也繇讀曰徭十年之外百嵗之内卒有它變障塞破壊亭隧㓕絶當更發屯繕治累世之功不可卒復九也師古曰卒讀皆曰猝如罷戍卒省候望單于自以保塞守御必深徳漢師古曰於漢自稱恩徳也請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長䇿也對奏天子有詔勿議罷邊塞事使車騎將軍口諭單于師古曰將軍許嘉也諭謂曉告曰單于上書願罷北邊吏士屯戍子孫世世保塞單于鄉慕禮義師古曰鄉讀曰嚮所以為民計者甚厚此長乆之䇿也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為㓂害故明法度以專衆心也敬諭單于之意師古曰言已曉知其意也朕無疑焉為單于怪其不罷故使大司馬車騎將軍嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞅鞅師古曰伐謂矜其功力呼韓邪疑之左伊秩訾懼誅將其衆千餘人降漢漢以為關内侯食邑}
