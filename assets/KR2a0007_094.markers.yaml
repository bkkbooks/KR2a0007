  - {type: variant, offset: 5815, length: 1246, content: 母及父諸良人侍御皆亂子病死仰而罵天數守大將軍光為丁外人求侯及桀欲妄官祿外人光執正皆不聽又桀妻父所幸充國為太醫監闌入殿中下獄當死冬月且盡蓋主為充國入馬二十匹贖罪乃得減死論於是桀安父子深怨光而重德蓋主知燕王旦帝兄不得立亦怨望桀安即記光過失予燕王令上書告之又為丁外人求侯燕王大喜上書稱子路喪姊朞而不除孔子非之子路曰由不幸寡兄弟不忍除之故曰觀過知仁今臣與陛下獨有長公主為姊陛下幸使丁外人侍之外人宜蒙爵號書奏上以問光光執不許及告光罪過上又疑之愈親光而疏桀安桀安寢恚遂結黨與謀殺光誘徵燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧菟邪且用皇后為尊一旦人主意有所移雖欲為家人亦不可得此百世之一時也事發覺燕王蓋主皆自殺語在霍光傳桀安宗族既滅皇后以年少不與謀亦光外孫故得不廢皇后母前死葬茂陵郭東追尊曰敬夫人置園邑二百家長丞奉守如法皇后自使私奴婢守桀安冢光欲皇后擅寵有子帝時體不安左右及醫皆阿意言宜禁內雖宮人使令皆為窮絝多其帶後宮莫有進者皇后立十歲而昭帝崩后年十四五云昌邑王賀徵即位尊皇后為皇太后光與太后共廢王賀立孝宣帝宣帝即位為太皇太后凡立四十七年年五十二建昭二年崩合葬平陵衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣家本魯國有母貞君兄恭以元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫有一男號皇曾孫時生數月猶坐太子繫獄積五歲乃遭赦治獄使者邴吉憐皇曾孫無所歸載以付史恭恭母貞君年老見孫孤甚哀之自養視焉後曾孫收養於掖庭遂登至尊位是為宣帝而貞君及恭己死恭三子皆以舊恩封長子高為樂陵侯曾為將陵侯玄為平臺侯及高子丹以功德封武陽侯侯者凡四人高至大司馬車騎將軍丹左將軍自有傳史皇孫王夫人宣帝母也名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆坐誅莫有收葬者唯宣帝得全即尊位後追尊母王夫人諡曰悼后祖母史良娣曰戾后皆改葬起園邑長丞奉守語在戾太子傳地節三年求得外祖母王媼媼男無故無故弟武皆隨使者詣闕時乘黃牛車故百姓謂之黃牛嫗初上即位數遣使者求外家久遠多似類而非是既得王媼令太中大夫任宣與丞相御史屬雜考問鄉里識知者皆曰王嫗嫗言名妄人家本涿郡蠡吾平鄉年十四嫁為同鄉王更得妻更得死嫁為廣望王乃始婦產子男無故武女翁須翁須年八九歲時寄居廣望節侯子劉仲卿宅仲卿謂乃始曰予我翁須自養長之媼為翁須作縑單衣送仲卿家仲卿教翁須歌舞往來歸取冬夏衣居四五歲翁須來言邯鄲賈長兒求歌舞者仲卿欲以我與之媼即與翁須逃走之平鄉仲卿載乃始共求媼媼惶急將翁須歸曰兒居君家非受一錢也奈何欲予它人仲卿詐曰不也後數日翁須乘長兒車馬過門呼曰我果見行當之柳宿媼與乃始之柳宿見翁須相對涕泣謂曰我欲為汝自言翁須曰母置之何家不可以居自言無益也媼與乃始還求錢用隨逐至中山盧奴見翁須與歌舞等比五人同處媼與翁須共宿明日乃始留視翁須媼還求錢欲隨至邯鄲媼歸糶買未具乃始來歸曰翁須已去我無錢用隨也因絕至今不聞其問賈長兒妻貞及從者師遂辭往二十歲太子舍人侯明從長安來求歌舞者請翁須等五人長兒使遂送, WYG: ''}
