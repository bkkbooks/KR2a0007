  - {type: variant, offset: 3158, length: 0, content: '', krp: 陵侯匈奴繇是恐師古曰繇讀與由同不能出兵即使使之烏孫求欲得漢公主擊烏孫取車延惡師地烏孫公主上書下公卿議救未決昭帝崩宣帝即位烏孫昆彌復上書言連為匈奴所侵削昆彌願發國半精兵人馬五萬匹盡力擊匈奴唯天子出兵哀救公主本始二年漢大發闗東輕鋭士選郡國吏三百石伉健習騎射者皆從軍師古曰伉音古浪反遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓増三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五}
  - {type: variant, offset: 3159, length: 1, content: 君, WYG: 凡五將軍兵十餘萬騎出塞各二千餘里及校尉常恵使䕶發兵烏孫西域昆彌自將翕侯以下五萬餘騎從西方入與五將軍兵凡二十餘萬衆匈奴聞漢兵大出老弱犇走􅇌畜産逺遁逃師古曰犇古奔字􅇌與驅同是以五將少所得度遼將軍出塞千二百餘里至蒲離候水斬首捕虜七百餘級鹵獲馬牛羊萬餘前將軍出塞千二百餘里至烏員師古曰烏員地名也音云斬首捕虜至候山百餘級師古曰候山山名也於此山斬捕得人鹵馬牛羊二千餘蒲類將軍兵當與烏孫合擊匈奴蒲類澤烏孫先期至而去漢兵不與相及蒲類將軍出塞千八百餘里西去候山斬首捕虜得單于使者蒲隂王以下三百餘級鹵馬牛羊七千餘聞虜已引去皆不至期還天子薄其過寛而不罪祁連將軍出塞千六百里至雞秩山斬首捕虜十九級獲牛馬羊百餘逄漢使匈奴還者冉𢎞等言雞秩山西有虜衆祁連即戒𢎞使言無虜欲還兵御史屬公孫益夀諌以為不可祁連不聼遂引兵還虎牙將軍出塞八百餘里至丹余吾水上即止兵不進斬首捕虜千九百餘級鹵馬牛羊七萬餘引兵還上以虎牙將軍不至期詐増鹵𫉬而祁連知虜在前逗遛不進孟康曰律語也謂軍行頓止稽留不進也師古曰逗讀與住同又音豆皆下吏自殺擢公孫益夀為侍御史校尉常恵與烏孫兵至右谷蠡庭𫉬單于父行師古曰行音胡浪反及嫂居次名王犁汙都尉千長將以下三萬九千餘級虜馬牛羊驢驘橐駝七十餘萬漢}
