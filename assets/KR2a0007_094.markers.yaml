  - {type: variant, offset: 3272, length: 3, content: 乃車駕, WYG: 匈奴失隂山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖徳廣被天覆匈奴師古曰如天之覆也匈奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以候望通㷭火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又况單于能必其衆不犯約哉三也師古曰必極也極保之也}
