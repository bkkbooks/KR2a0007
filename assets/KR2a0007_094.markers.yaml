  - {type: variant, offset: 5363, length: 1, content: 趙, WYG: 遣大且渠奢與云女弟當戸居次子醯櫝王師古曰櫝音讀俱奉獻至長安莽遣和親侯歙與奢等俱至制虜塞下與云當㑹因以兵迫脅將至長安云當小男從塞下得脱歸匈奴當至長安莽拜為須卜單于欲出大兵以輔立之兵調度亦不合而匈奴愈怒並入北邊北邊由是壊敗㑹當病死莽以其庻女陸逯任妻後安公奢李竒曰陸逯邑也莽改公主曰任奢本為侯莽以女妻之故進爵為公師古曰逯音録任音壬所以尊寵之甚厚終為欲出兵立之者師古曰言為此計意不止㑹漢兵誅莽云奢亦死更始二年冬漢遣中郎將歸徳侯颯大司馬䕶軍陳遵使匈奴授單于漢舊制璽綬王侯以下印綬因送云當餘親屬貴人從者單于輿驕謂遵颯曰匈奴本與漢為兄弟匈奴中亂師古曰言中閒之時也讀如本字又音竹仲反孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所簒匈奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚距師古曰牚謂支柱也音丈庚反又丑庚反單于終持此言其明年夏還㑹赤眉入長安更始敗贊曰書戒蠻夷猾夏師古曰虞書舜典載舜命臯陶作士之言也猾亂也夏謂中夏諸國也詩稱戎狄是膺師古曰魯頌閟宫之詩美僖公興師與齊桓討難膺當也春秋有道守在四夷師古曰春秋左}
