  - {type: punctuation, offset: 0, content: 《, id: KR2a0007_tls_094-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 四上匈奴其先夏后氏之苗裔曰淳維師古曰以殷時始奔北邊唐虞以上有山戎獫允薰粥師古曰皆匈奴别號獫音險粥音弋六反居于北邊隨草畜牧而轉移其畜之所多則馬牛羊其竒畜則橐佗驢驘駃騠騊駼驒奚師古曰橐佗言能負槖囊而䭾物也驘驢種而馬生也駃騠駿馬也生}
  - {type: page-break, offset: 6, content: '', id: KR2a0007_WYG_094-1b, image: WYG0251/WYG0251-0088d.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 四上匈奴其先夏后氏之苗裔曰淳維師古曰以殷時始奔北邊唐虞以上有山戎獫允薰粥師古曰皆匈奴别號獫音險粥音弋六反居于北邊隨草畜牧而轉移其畜之所多則馬牛羊其竒畜則橐佗驢驘駃騠騊駼驒奚師古曰橐佗言能負槖囊而䭾物也驘驢種而馬生也駃騠駿馬也生}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 日而超其母騊駼馬類也生北海驒奚駏驉類也佗音徒河反駃音決騠音提騊音桃駼音塗驒音顛逐水草遷徙無城郭常居耕田之業然亦各有分地師古曰分音扶問反其下亦同無文書以言語為約束兒能騎羊引弓射鳥䑕師古曰言其幼小則能射少長則射狐菟師古曰少長言漸大肉食師古曰言無米粟惟食肉士力能彎弓盡為甲騎其俗寛則隨畜田獵禽獸為生業急則人習戰攻以侵伐師古曰人人皆習之其天性也其長兵則弓矢短兵則刀鋋師古曰鋋鐵把小矛也音蟬利則進不利則退不羞遁走茍利所在不知禮義自君王以下咸食畜肉衣其皮革被㫋裘壯者食肥美老者飲食其餘貴壯健賤老弱父死妻其後母兄弟死皆取其妻妻之其俗有名不諱而無字夏道衰而公劉失其稷官變于西戎師古曰公劉后稷之曽孫也變化也謂行化於其俗邑于豳師古曰即今之豳州是其地也其後三百有餘歲戎狄攻太王亶父師古曰自公劉至亶父凡九君也父讀曰甫亶父亡走于岐下師古曰岐山之下豳人悉從亶父而邑焉作周師古曰始作周國也其後百有餘歲周西伯昌伐畎夷師古曰西伯昌即文王也畎音工犬反畎夷即畎戎也又曰昆夷昆字或作混又作緄二字並音工本反昆緄畎聲相近耳亦曰犬戎也山海經云黄帝生苗龍苗龍生融吾融吾生弄明弄明生白犬白犬有二牝牡是為犬戎許氏説文解字曰赤狄本犬種也故字從犬後十有餘年武王伐紂而營雒邑復居于酆鎬放逐戎夷涇洛之北師古曰北洛即漆沮水也本出}
