  - {type: variant, offset: 8046, length: 692, content: 年而崩諡曰恭哀皇后葬杜南是為杜陵陵南園後五年立皇太子乃封太子外祖父昌成君廣漢為平恩侯位特進後四年復封廣漢兩弟舜為博望侯延壽為樂成侯許氏侯者凡三人廣漢薨諡曰戴侯無子絕葬南園旁置邑三百家長丞奉守如法宣帝以延壽為大司馬車騎將軍輔政元帝即位復封延壽中子嘉為平恩侯奉戴侯後亦為大司馬車騎將軍孝宣霍皇后大司馬大將軍博陸侯光女也母顯既使淳于衍陰殺許后顯因為成君衣補治入宮具勸光內之果立為皇后初許后起微賤登至尊日淺從官車服甚節儉五日一朝皇太后於長樂宮親奉案上食以婦道共養及霍后立亦修許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后轝駕侍從甚盛賞賜官屬以千萬計與許后時縣絕矣上亦寵之顓房燕立三歲而光薨後一歲上立許后男為太子昌成君者為平恩侯顯怒恚不食歐血曰此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輒先嘗之后挾毒不得行後殺許后事頗泄顯遂與諸壻昆弟謀反發覺皆誅滅使有司賜皇后策曰皇后熒惑失道懷不德挾毒與母博陸宣成侯夫人顯謀欲危太子無人母之恩不宜奉宗廟衣服不可以承天命烏呼傷哉其退避宮上璽綬有司霍后立五年廢處昭臺宮後十二歲徙雲林館乃自殺葬昆吾亭東初霍光及兄驃騎將軍去病皆自以功伐封侯居位宣帝以光故封去病孫山山弟雲皆為列侯侯者前後四人孝宣王皇后其先高祖時有功賜爵關內侯自沛徙長陵傳爵至后父奉光奉光少時好鬭雞宣帝在民間數與奉光會相識奉光有女十餘歲每當適人所當適輒死故久不行及宣帝即位召入後宮稍進為倢伃是時館陶王母華倢伃及淮陽憲王母張倢伃楚孝王母衛倢伃皆愛幸霍皇后廢後上憐許太子蚤失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王倢伃為皇后令母養太子自為后後希見無寵封父奉光為邛成侯立十六, WYG: ''}
