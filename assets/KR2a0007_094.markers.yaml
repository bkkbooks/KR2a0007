  - {type: variant, offset: 3261, length: 0, content: '', WYG: 之師古曰言與郅支并力共㓕烏孫以其地立郅支令居之也長無匈奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大説師古曰説讀曰悦遂與相結引兵而西康居亦遣貴人橐它驢馬數千匹迎郅支郅支人衆中寒道死師古曰中寒傷於寒也道死死於道上也宋祁曰景本無馬字史舘本添餘財三千人到康居師古曰財與纔同其後都䕶甘延壽與副陳湯發兵即康居誅斬郅支師古曰即就也語在延夀湯傳郅支既誅呼}
