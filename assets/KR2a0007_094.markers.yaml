  - {type: variant, offset: 5496, length: 0, content: '', WYG: 賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而媮恃一時之事者未可以經逺也師古曰媮與偷同若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿師古曰度音大各反中音竹仲反分九州列五服師古曰九州五服觧並在前物土貢制外内師古曰物土貢者各因其土所生之物而貢之也制外内謂五服之差逺}
