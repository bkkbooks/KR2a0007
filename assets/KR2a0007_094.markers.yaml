  - {type: variant, offset: 606, length: 0, content: '', WYG: 㑹冬大寒雨雪師古曰雨音于具反卒之墮指者十二三於是冒頓陽敗走誘漢兵漢兵逐擊冒頓冒頓匿其精兵見其羸弱於是漢悉兵多步兵三十二萬北逐之髙帝先至平城步兵未盡到冒頓縱精兵三十餘萬騎圍髙帝於白登七日師古曰白登在平城東南去平城十餘里漢兵中外不得相救餉匈奴騎其西方盡白東方盡駹北方盡驪南方盡騂馬師古曰駹青馬也驪深黒騂赤馬也駹音尨騂音先營反髙帝廼使使間厚遺閼氏師古曰求間隙而私遺之閼氏廼謂冒頓曰兩主不相困今得漢地單于終非能居之且漢主有神單于察之冒頓與韓信將王黄趙利期而兵久不來疑其與漢有謀亦取閼氏之言廼開圍一角於是髙皇帝令士皆持滿傅矢外鄉從解角直出師古曰傅讀曰附鄉讀曰嚮言滿引弓弩注矢外捍從解圍之隅角直以出去得與大軍合而冒頓遂引兵去漢亦引兵罷使劉敬結和親之約是後韓信為匈奴將}
  - {type: page-break, offset: 606, content: '', id: KR2a0007_WYG_094-11a, image: WYG0251/WYG0251-0093c.png}
  - {type: page-break, offset: 606, content: '', id: KR2a0007_WYG_094-11b, image: WYG0251/WYG0251-0093d.png}
