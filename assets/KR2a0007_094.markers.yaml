  - {type: variant, offset: 5495, length: 0, content: '', WYG: 歸怨自絶莽遂斬其侍子邊境之禍搆矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮譲而不臣如其後嗣􅋟逃竄伏師古曰􅋟古遁字使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危逺見識微之明矣至單于咸棄其愛子昧利不顧師古曰昧貪也音妹侵掠所獲歲鉅萬計而和}
