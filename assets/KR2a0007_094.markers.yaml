  - {type: variant, offset: 3152, length: 1, content: 后, krp: 始元年也初且鞮侯兩子長為左賢王次為左大將病且死言立左賢王左賢王未至貴人以為有病更立左大將為單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聼謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于狐鹿姑單于立以左大將為左賢王數年病死其子先賢撣不得代師古曰撣音纏更以為日逐王日逐王者賤於左賢王單于自以其子為左賢王單于既立六年而匈奴入上谷五原殺略吏民其年匈奴復入五原酒泉殺兩部都尉於是漢遣貳師將軍七萬人出五原御史大夫商丘成將三萬餘人出西河重合侯莽通將四萬騎出酒泉千餘里單于聞漢兵大出悉遣其輜重徙趙信城北邸郅居水師古曰邸至也音丁禮反郅音之日反左賢王驅其人民度余吾水六七百里居兠銜山單于自將精兵左安侯度姑且水師古曰且音子余反御史大夫軍至追邪徑無所見還師古曰從疾道而追之不見虜而還也邪音似嗟反匈奴使大將與李陵將三萬餘騎追漢軍至浚稽山合轉戰九日漢兵陷陳郤敵殺傷虜甚衆至蒲奴水虜不利還去重合侯軍至天山匈奴使大將偃渠與左右呼知王將二萬餘騎要漢兵見漢兵彊引去重合侯無所得失是時漢恐車師兵遮重合侯廼遣闓陵侯將兵别圍車師師古曰闓讀與開同盡得其王民衆而還貳師將軍將出塞匈奴使右大都尉與衛律將五千騎要擊漢軍於夫羊句山狹服䖍曰夫羊地名也師古曰句山西山也句音鉤貳師遣屬國胡騎二千與戰虜兵壞散死傷者數百人漢軍乘勝追北至范夫人城應劭曰本漢將築此城將亡其妻率餘衆完保之因以為名也張晏曰范氏能胡詛者匈奴奔走莫敢距敵㑹貳師妻子坐巫蠱收聞之憂懼其掾胡亞夫亦避罪從軍説貳師曰夫人室家皆在吏若還不稱意適與獄㑹郅居以北可復得見乎如淳曰以就誅後雖復欲降匈奴不可得貳師由是狐疑欲深入要功遂北至郅居水上虜已去貳師遣䕶軍將二萬騎度郅居之水一日逄左賢王左大將將二萬騎與漢軍合戰一日漢軍殺大將虜死傷甚衆軍長史與決眭都尉煇渠侯謀晉灼曰本匈奴官也功臣表歸義侯僕多子雷電以屬國都尉擊匈奴封煇渠煇渠魯陽縣也師古曰眭音息隨反煇音輝多字當為朋曰將軍懐異心欲危衆求功恐必敗謀共執貳師貳師聞之斬長史引兵還至速邪烏燕然山師古曰速邪烏地名也燕然山在其中燕音一千反單于知漢軍勞倦自將五萬騎遮擊貳師相殺傷甚衆夜塹漢軍前深數尺從後急擊之軍大亂敗貳師降單于素知其漢大將貴臣以女妻之尊寵在衛律上其明年單于遣使遺漢書云南有大漢北有强胡胡者天之驕子也不為小禮以自煩今欲與漢闓大闗取漢女為妻師古曰闓讀與開同嵗給遺我糵酒萬石稷米五千斛師古曰以糵為酒味尤甜稷米稷粟米也雜繒萬匹它如故約則邊不相盗矣漢遣使者報送其使單于使左右難漢使者曰漢禮義國也貳師道前太子發兵反何也使者曰然廼丞相私與太子爭鬬太子發兵欲誅丞相丞相誣之故誅丞相此子弄父兵罪當笞小過耳孰與冒頓單于身殺其父代立常妻後}
  - {type: variant, offset: 3154, length: 2, content: 臧兒, WYG: 禽獸行也單于留使者三嵗廼得還貳師在匈奴嵗餘衛律害其寵㑹母閼氏病師古曰單于之母也律飭胡巫師古曰飭與敕同言先單于怒曰胡故時祠兵常言得貳師以社師古曰以祠社今何故不用宋祁曰越本無今字於是收貳師貳師罵曰我死必滅匈奴遂屠貳師以祠㑹連雨雪數月畜産死人民疫病榖稼不孰師古曰北方早寒雖不宜禾稷匈奴中亦種􅁰穄單于恐為貳師立祠室自貳師没後漢新失大將軍士卒數萬人不復出兵三嵗武帝崩前此者漢兵深入窮追二十餘年匈奴孕重墯殰罷極苦之師古曰孕重懐任者也墯落也殰敗也音讀罷讀曰疲極困也苦之心厭苦也自單于以下常有欲和親計後三年單于欲求和親㑹病死初單于有異母弟為左大都尉賢國人鄉之師古曰鄉讀曰嚮謂悉皆附之母閼氏恐單于不立子而立左大都尉也廼私使殺之左大都尉同母兄怨遂不肯復㑹單于庭又單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿單于死詐撟單于令師古曰撟與矯同其字從手矯託也與貴人飲盟更立子左谷蠡王為壺衍鞮單于是嵗始元二年也壺衍鞮單于既立風謂漢使者言欲和親師古曰風讀曰諷謂不正言也左賢王右谷蠡王以不得立怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫謀擊匈奴盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆寃之於是二王去居其所未嘗肯㑹龍城師古曰各自居其本處不復㑹龍城祭也後二年秋匈奴入代殺都尉單于年少初立母閼氏不正國内乖離常恐漢兵襲之於是衛律為單于謀穿井築城治樓以蔵榖與秦人守之師古曰秦時有人亡入匈奴者今其子孫尚號秦人漢兵至無柰我何即穿井數百伐材數千或曰胡人不能守城是遺漢糧也師古曰遺音弋季反衛律於是止廼更謀歸漢使不降者蘇武馬宏等馬宏者前副光祿大夫王忠使西國為匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意是時單于立三嵗矣明年匈奴發左右部二萬騎為四隊師古曰隊部也音徒内反並入邊為宼漢兵追之斬首獲虜九千人生得甌脱王漢無所失亡匈奴見甌脱王在漢恐以為道擊之師古曰道讀曰導即西北逺去不敢南逐水草發人民屯甌脱明年復遣九千騎屯受降城以備漢北橋余吾令可度師古曰於余吾水上作橋以備奔走師古曰擬有迫急北走避漢從此橋度也是時衛律已死衛律在時常言和親之利匈奴不信及死後兵數困國益貧單于弟左谷蠡王思衛律言欲和親而恐漢不聼故不肯先言常使左右風漢使者師古曰風讀曰諷然其侵盗益希遇漢使愈厚欲以漸致和親漢亦羈縻之其後左谷蠡王死明年單于使犁汚王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾師古曰無幾謂不多時也幾音居豈反右賢王犁汚王四千騎分三隊入日勒屋蘭番和師古曰皆張掖縣也番音盤張掖太守屬國都尉發兵擊大破之得脱者數百人屬國千長義渠王騎士射殺犁汚王師古曰千長者千人之長賜黄金二百斤馬二百匹因封為犁汚王屬國都尉郭忠封成安侯自是後匈奴不敢入張掖其明年匈奴三千餘騎入五原略殺數千人後數萬騎南旁塞獵師古曰旁音步浪反行攻塞外亭障略取吏民去是時漢邊郡㷭火候望精明匈奴為邊宼者少利希復犯塞漢復得匈奴降者言烏桓嘗發先單于冢匈奴怨之方發二萬騎擊烏桓大將軍霍光欲發兵邀擊之師古曰邀迎而擊之邀音工堯反以問䕶軍都尉趙充國充國以為烏桓間數犯塞師古曰間即中間也猶言比日也今匈奴擊之於漢便又匈奴希寇盗北邊幸無事蠻夷自相攻擊而發兵要之招寇生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍將二萬騎出遼東匈奴聞漢兵至引去初光誡明友兵不空出即後匈奴遂擊烏桓師古曰後匈奴者言兵遲後邀匈奴不及烏桓時新中匈奴兵師古曰為匈奴所中傷明友既後匈奴因乗烏桓敝擊之斬首六千餘級獲三王首還封}
