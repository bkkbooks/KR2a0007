  - {type: variant, offset: 56, length: 2, content: 娀及, WYG: 獫允之難故也豈不日日相警戒乎獫允之難甚急至懿王曽孫宣王興師命將以征伐之詩人美大其功曰薄伐獫允至於太原師古曰小雅六月之詩也薄伐言逐出之出車彭彭城彼朔方師古曰小雅出車之詩也彭彭盛也朔方北方也言獫允既去北方安静乃築城以守是時四夷賓服稱為中興至于幽王用寵姬襃姒之故與申侯}
