  - {type: variant, offset: 6524, length: 201, content: 廟親未盡不毀此兩統貳父違於禮制案義奏親諡曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖繆本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之高祖受命而王者也非謂繼祖統為後者也臣請皇高祖考廟奉明園毀勿修罷南陵雲陵為縣奏可司徒掾班彪曰漢承亡秦絕學之後祖宗之制因時施宜自元成後學者蕃滋貢禹毀宗廟匡衡改郊兆何武定三公後皆數復故紛紛不定何者禮文缺微古今異制各為一家未易可偏定也考觀諸儒之議劉歆博而篤矣, WYG: 證}
