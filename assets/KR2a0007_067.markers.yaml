  - {type: punctuation, offset: 1913, content: ，, id: KR2a0007_tls_067-bkkpn438}
  - {type: 'tls:seg', offset: 1913, content: '', id: KR2a0007_tls_067-23a.23}
  - {type: variant, offset: 1913, length: 2, content: 代于, WYG: 書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上書言丞相韋𤣥成容身保位亡能往来李奇曰不能有所前郤也師古曰周書君奭之篇稱周公曰惟文王尚克修和有夏有若虢叔閎天散宜生泰顛南宫括又曰亡能往来故雲引此以為言也宋祁曰上書越本作上疏而咸數毁石顯久之有司考雲疑風吏殺人師古曰風讀曰諷羣臣朝見上問丞相以雲治行丞相𤣥成言雲暴虐亡状師古曰亡善状也時陳咸在前聞之以語雲雲上書自訟咸為}
  - {type: page-break, offset: 1913, content: '', id: KR2a0007_WYG_067-7b, image: WYG0250/WYG0250-0431b.png}
  - {type: variant, offset: 1913, length: 2, content: 代于, krp: 書令石顯用事與充宗為黨百僚畏之唯御史中丞陳咸年少抗節不附顯等而與雲相結雲數上書言丞相韋𤣥成容身保位亡能往来李奇曰不能有所前郤也師古曰周書君奭之篇稱周公曰惟文王尚克修和有夏有若虢叔閎天散宜生泰顛南宫括又曰亡能往来故雲引此以為言也宋祁曰上書越本作上疏而咸數毁石顯久之有司考雲疑風吏殺人師古曰風讀曰諷羣臣朝見上問丞相以雲治行丞相𤣥成言雲暴虐亡状師古曰亡善状也時陳咸在前聞之以語雲雲上書自訟咸為}
  - {type: variant, offset: 1916, length: 1, content: 國, WYG: 奏草求下御史中丞事下丞相丞相部吏考立其殺人罪師古曰立成也雲亡入長安復與咸計議丞相具發其事奏咸宿衛執法之臣幸得進見漏泄所聞以私語雲為定奏草欲令自下治師古曰咸為御史中丞而奏請下中丞故云自下治後知雲亡命罪人而與交通雲以故不得師古曰吏捕之不得上於是下咸雲獄減死為城旦宋祁曰獄下當添治字咸雲遂廢錮終元帝之世至成帝時丞相故安昌侯張禹劉攽曰故字當在丞相上禹時罷相侯如故也以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐師古曰尸主也素空也尸位者不舉其事但主其位而已素餐者徳不稱官空當食禄孔子所謂鄙夫不可與事君苟患失之亡所不至者也師古曰皆論語所載孔子之言也茍患失其寵禄則言行僻邪無所不至也臣願賜尚方斬馬劍斷佞臣一人以厲其餘師古曰尚方少府之屬官也作供御器物故有斬馬劍劍利可以斬馬也上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅師古曰訕謗也音所諫反又音刪罪死不赦御史將雲下雲攀殿檻檻折師古曰檻軒前欄也雲呼曰師古曰呼叫也音火故反臣得下從龍逄比干遊於地下足矣師古曰闗龍逄桀臣王子比干紂之諸父皆以諫而死故云然未知聖朝何如耳師古曰言殺直臣其聲惡御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世師古曰著表也言此名久彰表使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已及後當治殿檻上曰勿易因而輯之以旌直臣師古曰輯與集同謂補合之也旌表也雲自是之後不復仕常居鄠田時乘牛車從諸生所過皆敬事焉薛宣}
