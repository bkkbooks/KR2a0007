  - {type: variant, offset: 1935, length: 1, content: 榮, WYG: 之重器得士則重失士則輕詩云濟濟多士文王以寜師古曰大雅文王之詩也已解于上廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曺之輩今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩闗自鬻師古曰秦武王即孝公之孫恵文王之子也任鄙力士也繆公行伯繇余歸徳師古曰即秦穆公伯讀曰霸繇讀曰由今欲致天下之士民有上書求見者輙使詣尚書問其所言言可采取者秩以升斗之禄賜以一束之帛若此則天下之士發憤懣師古曰懣音滿吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣師古曰爛然分明之貌也夫以四海之廣士民之數能言之類至衆多也然其儁傑指世陳政言成文章質之先聖而不繆施之}
  - {type: page-break, offset: 1935, content: '', id: KR2a0007_WYG_067-12a, image: WYG0250/WYG0250-0434c.png}
