  - {type: variant, offset: 5569, length: 920, content: 國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右肩單于孤特遠遁于幕北四垂無事斥地遠境起十餘郡功業既定乃封丞相為富民侯以大安天下富實百姓其規撫可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守藩百蠻服從萬世之基也中興之功未有高焉者也高帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋穀梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也苟有功德則宗之不可預為設數故於殷太甲為太宗大戊曰中宗武丁曰高宗周公為毋逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毀以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之況于先祖或說天子五廟無見文又說中宗高宗者宗其道而毀其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿鬋勿伐邵伯所茇思其人猶愛其樹況宗其道而毀其廟乎迭毀之禮自有常法無殊功異德固以親疏相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛說定也孝宣皇帝舉公卿之議用眾儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝立之如此不宜毀上覽其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺故春秋外傳曰日祭月祀時享歲貢終王祖禰則日祭曾高則月祀二祧則時享壇墠則歲貢大禘則終王德盛而游廣親親之殺也彌遠則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毀廟自貢禹建迭毀之議惠景及太上寢園廢而為虛失禮意矣至平帝元始中大司馬王莽奏本始元年丞相義等議謐孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四, WYG: ''}
