  - {type: variant, offset: 302, length: 1, content: 放, WYG: 言之焉用久客師古曰言不用久為客也繇讀與由同昔帝堯之𦵏也窾木為匵葛藟為緘服䖍曰窾音款窾空也空木為匵師古曰匵即櫝字也櫝小棺也藟葛蔓也一曰藟亦草名葛之類也緘束也藟音力水反緘音工咸反其穿下不亂泉上不泄殠師古曰亂絶也故聖王生易尚死易葬也師古曰尚崇也言生死皆儉約也不加功於亡用不損財於亡謂師古曰謂者名稱也亦指趣也今費財厚𦵏留歸鬲至死者不知生者不得}
