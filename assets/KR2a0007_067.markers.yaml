  - {type: variant, offset: 2542, length: 3, content: 昭靈后, WYG: 皇天動威雷風著災師古曰尚書大傳云周公疾曰吾死必𦵏於成周示天下臣於成王也周公死天乃雷雨以風禾盡偃大木斯拔國恐王與大夫開金縢之書執書以泣曰周公勤勞王家予幼人弗及知乃不𦵏於成周而𦵏之於畢示天下不敢臣今仲尼之廟不出闕里師古曰闕里孔子舊里也言除此之外更無祭祀孔子者孔氏子孫不免編户師古曰列為庶人也以聖人而歆匹夫之祀非皇天之意也今陛下誠能據仲尼之素功以封其子孫師古曰素功素王之功也穀梁傳曰孔子素王則國家必獲其福又陛下之名與天亡極何者追聖人素功封其子孫未有法也後聖必以為則不滅之名可不勉哉福孤逺又譏切王氏故終不見納初}
