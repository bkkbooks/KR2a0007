  - {type: variant, offset: 32, length: 9, content: 夷王及孫王戊戊荒淫, WYG: 稱天氣為魂延陵季子云骨肉下歸於土是以云然精神離形各歸其真故謂之鬼鬼之為言歸也其尸塊然獨處豈有知哉師古曰塊音口對反裹以幣帛鬲以棺槨支體絡束口含玉石欲化}
