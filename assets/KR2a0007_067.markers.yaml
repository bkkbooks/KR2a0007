  - {type: variant, offset: 5338, length: 230, content: 興冒頓始彊破東胡禽月氏并其土地地廣兵彊為中國害南越尉佗總百粵自稱帝故中國雖平猶有四夷之患且無寧歲一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬眾近屯京師及四邊歲發屯備虜其為患久矣非一世之漸也諸侯郡守連匈奴及百粵以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大將軍驃騎伏波樓船之屬南滅百粵起七郡北攘匈奴降昆邪十萬之眾置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄菟樂浪以斷匈奴之左臂西伐大宛並三十, WYG: 書卷}
