  - {type: variant, offset: 1959, length: 0, content: '', WYG: 毋若火始庸庸師古曰周書洛誥之辭也庸庸微小貌也言火始微小不早撲滅則至熾盛大臣貴擅亦當早圖黜其權也埶陵}
