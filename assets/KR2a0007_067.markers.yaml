  - {type: variant, offset: 2021, length: 237, content: 靡惰天子我監登我三事顧我傷隊爵復我舊我既此登望我舊階先后茲度漣漣孔懷司直御事我熙我盛群公百僚我嘉我慶于異卿士非同我心三事惟囏莫我肯矜赫赫三事力雖此畢非我所度退其罔日昔我之隊畏不此居今我度茲戚戚其懼嗟我後人命其靡常靖享爾位瞻仰靡荒慎爾會同戒爾車服無媠爾儀以保爾域爾無我視不慎不整我之此復惟祿之幸於戲後人惟肅惟栗無忝顯祖以蕃漢室玄成為相七年守正持重不及父賢而文釆過之建昭三年薨諡曰共侯初賢以昭帝時徙平陵玄成別徙杜陵病且死因使者自白曰不勝父子恩願乞骸骨歸葬父墓上許焉子頃侯寬嗣薨子, WYG: 在}
