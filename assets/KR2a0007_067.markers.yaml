  - {type: variant, offset: 4494, length: 630, content: 惟念高皇帝聖德茂盛受命溥將欽若稽古承順天心子孫本支陳錫亡疆誠以為遷廟合祭久長之策高皇帝之意乃敢不聽即以今日遷太上孝惠廟孝文太后孝昭太后寢將以昭祖宗之德順天人之序定無窮之業今皇帝未受茲福乃有不能共職之疾皇帝願復修承祀臣衡等咸以為禮不得如不合高皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毀廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六藝所載皆言不當無所依緣以作其文事如失指罪乃在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天亡極群生百神有所歸息諸廟皆同文久之上疾連年遂盡復諸所罷寢廟園皆修祀如故初上定迭毀禮獨尊孝文廟為太宗而孝武廟親未盡故未毀上於是乃復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云元帝崩衡奏言前以上體不平故復諸所罷祠卒不蒙福案衛思后戾太子戾后園親未盡孝惠孝景廟親盡宜毀及太上皇孝文孝昭太后昭靈后昭哀后武哀王嗣請悉罷勿奉奏可初高后時患臣下妄非議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后并食於太上寢廟如故又復擅議宗廟之命成帝崩哀帝即位丞相孔光大司空何武奏言永光五年制書高皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之體不敢有與臣愚以為迭毀之次當以時定非令所為擅議宗廟之意也臣請與群臣雜議奏可於是光祿勳彭宣詹事滿昌, WYG: ''}
