  - {type: variant, offset: 1966, length: 3, content: 德儀服, WYG: 孫不嗣張晏曰身為燕丹張良所謀子二世見殺孫謂子嬰所謂壅人以自塞者也故武王克殷未下車存五帝之後封殷於宋紹夏於杞師古曰謂封黄帝之後於薊帝堯之後於祝帝舜之後於陳并杞宋是為五帝眀著三統示不獨有也是以姬姓半天下遷廟之主流出於戸李奇曰言其多所謂存人以自立者也今成湯不祀殷人亡後陛下繼嗣久微殆為}
