  - {type: variant, offset: 1220, length: 494, content: 丞相史乃與玄成書曰古之辭讓必有文義可親故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜晻而不宣微哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然怨子傷高而僕為小人也玄成友人侍郎章亦上疏言聖王貴以禮讓為國宜優養玄成勿枉其志使得自安衡門之下而丞相御史遂以玄成實不病劾奏之有詔勿劾引拜玄成不得已受爵宣帝高其節以玄成為河南太守兄弘太山都尉遷東海太守數歲玄成徵為未央衛尉遷太常坐與故平通侯楊惲厚善惲誅黨友皆免官後以列侯侍祀孝惠廟當晨入廟天雨淖不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為關內侯玄成自傷貶黜父爵歎曰吾何面目以奉祭祀作詩自劾責曰赫矣我祖侯于豕韋賜命建伯有殷以綏厥績既昭車服有常朝宗商邑四牡翔翔德之令顯慶流于裔宗周至漢群后歷世肅肅楚傅輔翼元夷厥駟有庸惟慎惟祗嗣王孔佚越遷于鄒五世壙僚至我節侯惟我節侯顯德遐聞左右昭宣五品以訓既耇致位惟懿惟奐厥賜祁祁百金洎館國彼扶陽在京之東惟帝是留政謀是從繹繹六轡是列是理威儀濟濟朝享天子天子穆穆是宗是師四方遐爾觀國之煇茅土之繼在我俊兄惟我俊兄是讓是形於休厥德於赫有聲致我小子越留於京惟我小子不肅會同媠彼車服黜此附庸赫赫顯爵自我隊之微微附庸自我招之誰能忍媿寄之我顏誰, WYG: 前}
