  - {type: variant, offset: 3657, length: 836, content: 之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義壹體孝景皇帝廟及皇考廟皆親盡其正禮儀玄成等奏曰祖宗之廟世世不毀繼祖以下五廟而迭毀今高皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毀太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寢園皆無復修奏可議者又以為清廟之詩言交神之禮無不清靜今衣冠出游有車騎之眾風雨之氣非所謂清靜也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寢園日月間祀皆可勿復修上亦不改也明年玄成復言古者制禮別尊卑貴賤國君之母非適不得配食則薦於寢身沒而已陛下躬至孝承天心建祖宗定迭毀序昭穆大體既定孝文太后孝昭太后寢祠園宜如禮勿復修奏可後歲餘玄成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾久不平衡惶恐禱高祖孝文孝武廟曰嗣曾孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功故動作接神必因古聖之經往者有司以為前因所幸而立廟將以繫海內之心非為尊祖嚴親也今賴宗廟之靈六合之內莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明即告于祖宗而不敢失今皇帝有疾不豫乃夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹案上世帝王承祖禰之大禮皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者歲數不登百姓困乏郡國廟無以修立禮凶年則歲事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊在溝瀆之中皇帝至孝肅慎宜蒙祐福唯高皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉壽亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毀廟曰往者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接于天萬世不墮繼烈以下五廟而遷上陳太祖間歲而祫其道應天故福祿永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止尊祖嚴父之義也寢日四上食園廟間祠皆可亡修皇帝思慕悼懼未敢盡, WYG: ''}
