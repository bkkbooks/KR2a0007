  - {type: variant, offset: 1920, length: 2, content: 貶黜, WYG: 雲往見之宣備賓主禮因留雲宿從容謂雲曰師古曰從音七庸反在田野亡事且留我東閤可以觀四方奇士雲曰小生廼欲相吏邪師古曰小生謂其新學後進言欲以我為吏乎宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七}
  - {type: page-break, offset: 1920, content: '', id: KR2a0007_WYG_067-9b, image: WYG0250/WYG0250-0433b.png}
  - {type: variant, offset: 1920, length: 2, content: 貶黜, krp: 雲往見之宣備賓主禮因留雲宿從容謂雲曰師古曰從音七庸反在田野亡事且留我東閤可以觀四方奇士雲曰小生廼欲相吏邪師古曰小生謂其新學後進言欲以我為吏乎宣不敢復言其教授擇諸生然後為弟子九江嚴望及望兄子元字仲能傳雲學皆為博士望至泰山太守雲年七}
  - {type: variant, offset: 1923, length: 0, content: '', WYG: 餘終於家病不呼醫飲藥遺言以身服斂棺周於身土周於槨師古曰棺周於身小棺裁容身也土周於槨冡壙裁容槨也為丈五墳𦵏平陵東郭外梅福字子真九江夀春人也少學長安明尚書榖梁春秋為郡文學補南昌尉師古曰豫章之縣後去官歸夀春數因縣道上言變事師古曰附縣道之使而封奏也變謂非常之事求假軺傳師古曰小車之傳也軺音遙傳音張戀反詣行在所條對急政師古曰條對者一一條録而對之輙報罷是時成帝委任大將軍王鳯鳯專埶擅朝而京兆尹王章素忠直譏刺鳯為鳯所誅王氏浸盛師古曰浸漸也災異數見羣下莫敢正言福復上書曰臣聞箕子佯狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品師古曰遁逃也夫叔孫先非不忠也師古曰先猶言先生也一曰先謂在秦時箕子非疏其家而畔親也師古曰箕子紂之諸父故言䟽家畔親也不可為言也昔髙祖納善若不及從諫若轉圜師古曰不及恐失之也轉圜言其順易也聽言不求其能舉功不考其素師古曰直取其功不論其舊行及所從来也陳平起於亡命而為謀主韓信拔於行陳而建上將師古曰立以為大將軍故天下之士雲合歸漢師古曰言四面而至爭進奇異知者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺師古曰鴻毛喻輕拾遺言其易也此髙祖所以亡敵於天下也師古曰亡讀曰無孝文皇帝起於代谷師古曰從代而来即帝位非有周召之師伊吕之佐也師古曰召讀曰邵循髙祖之法加以恭儉當此之時天下㡬平師古曰㡬音距依反繇是言之循髙祖之法則治不循則亂何者秦為亡道削仲尼之迹滅周公之軌師古曰軌法也壊井田除五等禮廢樂崩王道不通故欲行王道者莫能致其功也孝武皇帝好忠諌說至言師古曰說讀曰恱出爵不待廉茂慶賜不湏顯功師古曰謂諫爭合意即得官爵不由薦舉及軍功也㢘亷吏也茂茂材也是以天下布衣各厲志竭精以赴闕廷自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聽用其計升平可致張晏曰民有三}
