  - {type: variant, offset: 1926, length: 3, content: 遂繼父, WYG: 而起所以計慮不成而謀議泄者以衆賢聚於本朝師古曰本朝漢朝也故其大臣埶陵不敢和從也服䖍曰臣埶陵君也師古曰謂淮南大臣}
