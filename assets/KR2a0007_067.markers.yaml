  - {type: variant, offset: 502, length: 2, content: 微微, WYG: 臣聞軍法立武以威衆誅惡以禁邪今監御史公穿軍垣以求賈利師古曰公謂顯然為之私買賣以與士市不立剛毅之心勇猛之節亡以帥先士大夫尤失理不公用文吏議不至重法黄帝李法曰蘇林曰獄官名也天文志左角李右角将孟康曰兵書之法也師古曰李者法官之號也總主征伐刑戮之事也故稱其書曰李法蘇說近之壁壘已定穿窬不繇路是謂姦人姦人者殺師古曰窬}
