  - {type: variant, offset: 1963, length: 2, content: 既令, WYG: 之世以為殷後復上書曰臣聞不在其位不謀其政政者職也位卑而言髙者罪也越職觸罪危言世患雖伏質横分臣之願也師古曰伏貭斬刑也横分謂身首分離也守職不言沒齒身全死之日尸未腐而名滅雖有景公之位伏歴千駟臣不貪也師古曰景公齊景公也論語云齊景公有馬千駟死之日民無得而稱馬故引之也故願壹登文石之陛渉赤墀之塗應劭曰以丹淹泥塗殿上也當戸牖之法坐師古曰戸牗之間謂之扆言自扆也法坐正坐也聼朝之處猶言法宫法駕也坐音才卧反宋祁曰自扆當作負扆也盡平生之愚慮亡益於時有遺於世師古曰遺留也此臣寢所以不安食所以忘味也願陛下深省臣言師古曰省察也臣聞存人所以自立也壅人所以自塞也善惡之報各如其事昔者秦㓕二周夷六國師古曰二周東周西周君也六國齊椘韓魏燕趙隠士不顯佚民不舉師古曰佚與逸同也絶三統㓕天道是以身危子殺}
  - {type: page-break, offset: 1963, content: '', id: KR2a0007_WYG_067-15b, image: WYG0250/WYG0250-0436b.png}
  - {type: page-break, offset: 1963, content: '', id: KR2a0007_WYG_067-16a, image: WYG0250/WYG0250-0436c.png}
