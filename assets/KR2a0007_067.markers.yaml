  - {type: variant, offset: 2808, length: 0, content: '', WYG: 以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久逺不可得雖得其嫡嫡之先已絶不當得立禮記孔子曰丘殷人也先師所共傳宜以孔子世為湯後上以其語不經師古曰不合於經也遂見寝至成帝時梅福復言宜封孔子後以奉湯祀綏和元年立二王後推迹古文以左氏榖梁世本禮記相明遂下詔封孔子世為殷紹嘉公語在成紀是時福居家常以讀書養性為事至元始中王莽顓政師古曰顓讀與専同福一朝棄妻子去九江至今傳以為仙其後人有見福於㑹稽者變名姓為吴市門卒云師古曰其後謂棄妻子去之後云敞字幼孺平陵人也師事同縣吳章章治尚書經為博士平帝以中山王即帝位年幼莽秉政自號安漢公以平帝為成帝後不得顧私親帝母及外家衛氏皆留中山不得至京師莽長子宇非莽鬲絶衛氏師古曰鬲讀與隔同恐帝長大後見怨宇與吳章謀夜以血塗莽第門若鬼神之戒兾以懼莽章欲因對其咎事發覺莽殺宇誅㓕衛氏謀所聫及死者百餘人章坐要斬磔尸東市門初章為當世名儒教授尤盛弟子千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師師古曰更以他人為師諱不言是章弟子敞時為大司徒掾自劾吳章弟子收抱章尸歸棺斂𦵏之師古曰棺音工喚反斂音力贍反京師稱焉車騎將軍王舜髙其志節比之欒布表奏以為掾薦為中}
