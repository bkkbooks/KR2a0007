  - {type: variant, offset: 1955, length: 1, content: 示, WYG: 成王除不急之法下亡諱之詔博覽兼聽謀及疏賤令深者不隠逺者不塞所謂辟四門明四目也師古曰虞書舜典曰闢四門明四目言開四門以致衆賢則明視於四方也且不急之法誹謗之微者也往者不可及来者猶可追方今君命犯而主威奪師古曰君命犯者謂大臣犯君之命外戚之權日以益隆陛下不見其形願察其景建始以来日食地震以率言之三倍春秋水灾亡與比數師古曰言其極多不可比較而數也隂盛陽微金鐵為飛此何景也張晏曰河平二年沛郡鐵官鑄錢如星飛上去權臣用事之異也蘇林曰言之不從是謂不艾則金不從革景象也何象言将危亡也漢興以来社稷三危吕霍上官皆母后之家也親親之道全之為右師古曰務全安之此為上當與之賢師良傅教以忠孝之道今廼尊寵其位授以魁柄師古曰以斗為喻也斗身為魁使之驕逆至於夷㓕師古曰夷平也謂平除之此失親親之大者也自霍光之賢不能為}
  - {type: page-break, offset: 1955, content: '', id: KR2a0007_WYG_067-14b, image: WYG0250/WYG0250-0435d.png}
  - {type: page-break, offset: 1955, content: '', id: KR2a0007_WYG_067-15a, image: WYG0250/WYG0250-0436a.png}
