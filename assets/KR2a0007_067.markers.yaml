  - {type: variant, offset: 50, length: 250, content: 遂去位徙家於鄒又作一篇甚諫詩曰肅肅我祖國自豕韋黼衣朱紱四牡龍旂彤弓斯征撫寧遐荒總齊群邦以翼大商迭彼大彭勳績惟光至于有周歷世會同王赧聽譖寔絕我邦我邦既絕厥政斯逸賞罰之行非繇王室庶尹群后靡扶靡衛五服崩離宗周以隊我祖斯微遷于彭城在予小子勤誒厥生阸此嫚秦耒耜以耕悠悠嫚秦上天不寧乃眷南顧授漢于京於赫有漢四方是征靡適不懷萬國逌平乃命厥弟建侯於楚俾我小臣惟傅是輔兢兢元王恭儉淨壹惠此黎民納彼輔弼饗國漸世垂烈于後乃及夷王克奉厥緒咨命不永唯王統祀左右陪臣此惟皇士如何我王不思守保不惟履冰以繼祖考邦事是廢逸游是娛犬馬繇, WYG: 棺槨朽腐廼得歸土就其真宅}
