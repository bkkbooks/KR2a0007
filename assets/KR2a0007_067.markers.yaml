  - {type: variant, offset: 498, length: 0, content: '', WYG: 下亦同建欲誅之廼約其走卒師古曰約束也曰我欲與公有所誅吾言取之則取斬之則斬於是當選士馬日監御史與䕶軍諸校列坐堂皇上師古曰校者軍之諸部校也室無四壁曰皇建從走卒趨至堂皇下拜謁因上堂皇走卒皆上建指監御史曰取彼走卒前曳下堂皇建曰斬之遂斬御史䕶軍諸校皆愕驚不知所以建亦已有成奏}
