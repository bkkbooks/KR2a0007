  - {type: variant, offset: 1926, length: 3, content: 遂繼父, krp: 而起所以計慮不成而謀議泄者以衆賢聚於本朝師古曰本朝漢朝也故其大臣埶陵不敢和從也服䖍曰臣埶陵君也師古曰謂淮南大臣}
  - {type: variant, offset: 1930, length: 3, content: 位封侯, WYG: 内史之屬也方今布衣廼窺國家之隙見間而起者蜀郡是也孟康曰成帝鴻嘉中廣漢男子鄭躬等反是也及山陽亡徒蘇令之羣蹈藉名都大郡求黨與索随和李奇曰求索與已和及随已者而亡逃匿之意此皆輕量大臣亡所畏忌國家之權輕}
