  - {type: 'tls:seg', offset: 1939, content: '', id: KR2a0007_tls_067-23a.28}
  - {type: variant, offset: 1939, length: 3, content: 玄成復, WYG: 夫䳒鵲遭害則仁鳥増逝師古曰䳒䲭也仁鳥鸞鳯也䳒音緣愚者䝉戮則知士深退師古曰蒙被也間者愚民上疏多觸不急之法或下廷尉而死者衆師古曰以其所言為不急而罪之也自陽朔以来天下以言為諱朝廷尤甚師古曰防人之口法禁嚴切也羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝師古曰具臣具位之臣無益者也矯正也及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及家折直士之節結諌臣之舌羣臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循髙祖之軌杜亡秦之路師古曰杜塞也數御十月之歌孟康曰福譏切王氏十月之詩刺后族太盛也師古曰詩小雅十月之交篇也留意亡逸之戒師古曰周書篇名也周公}
  - {type: page-break, offset: 1939, content: '', id: KR2a0007_WYG_067-14a, image: WYG0250/WYG0250-0435c.png}
