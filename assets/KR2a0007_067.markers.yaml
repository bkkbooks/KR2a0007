  - {type: variant, offset: 2259, length: 267, content: 侯育嗣薨子節侯沈嗣自賢傳國至玄孫乃絕玄成兄高寢令方山子安世歷郡守大鴻臚長樂衛尉朝廷稱有宰相之器會其病終而東海太守弘子賞亦明詩哀帝為定陶王時賞為太傅哀帝即位賞以舊恩為大司馬車騎將軍列為三公賜爵關內侯食邑千戶亦年八十餘以壽終宗族至吏二千石者十餘人初高祖時令諸侯王都皆立太上皇廟至惠帝尊高帝廟為太祖廟景帝尊孝文廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始二年復尊孝武廟為世宗廟行所巡狩亦立焉凡祖宗廟在郡國六十八合百六十七所而京師自高祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食廟歲, WYG: ''}
