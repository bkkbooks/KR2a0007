  - {type: variant, offset: 2529, length: 6, content: 祠便殿歲四祠, WYG: 年榖梁所云在祖位者謂孔子本宋孔父之後防叔奔魯遂為魯人今宋所殺者亦孔父之後留在宋者於孔子為祖列故尊而不名也此言孔子故殷後也雖不正統封其子孫以為殷後禮亦宜之何者諸侯奪宗聖庶奪適如淳曰奪宗始封之君尊為諸侯則奪其舊為宗子之事也奪適文王舍伯邑考而立武王是也孔子雖庶可為殷後師古曰適讀曰嫡傳曰賢者子孫宜有土而况聖人}
