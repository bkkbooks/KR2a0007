  - {type: variant, offset: 1910, length: 2, content: 永光, WYG: 而華隂守丞嘉上封事師古曰守華隂縣丞者其人名嘉言治道在於得賢御史之官宰相之副九卿之右師古曰右言在上也不可不選平陵朱雲兼資文武忠正有智畧可使以六百石秩試守御史大夫以盡其能上廼下其事問公卿太子少傅匡衡對以為大臣者國家之股肱萬姓所瞻仰眀王所慎擇也傳曰下輕其上爵賤人圖柄臣則國家搖動而民不静矣師古曰上爵大官也圖謀也柄臣執權之臣今嘉從守丞而圖大臣之位欲以匹夫徒步之人而超九卿之右非所以重國家而尊社稷也自堯之用舜文王於太公猶試然後爵之又况朱雲者乎雲素好勇數犯法亡命受易頗有師道其行義未有以異今御史大夫禹絜白廉正經術通眀有伯夷史魚之風海内莫不聞知而嘉猥稱雲師古曰猥曲也欲令為御史大夫妄相稱舉疑有姦心漸不可長宜下有司案騐以眀好惡嘉竟坐之是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏説元帝好之欲考其異同令充宗與諸易家論充宗乗貴辯口師古曰乘因也言因藉尊貴之權也諸儒莫能與抗皆稱疾不敢㑹有薦雲者召入攝􅒥登堂師古曰􅒥衣下之裳音子私反抗首而請師古曰抗舉也音動左右既論難連拄五鹿君師古曰拄刺也距也音竹庾反故諸儒為之語曰五鹿嶽嶽朱雲折其角師古曰嶽嶽長角之貌繇是為博士遷杜陵令坐故縱亡命㑹赦舉方正為槐里令時}
