  - {type: variant, offset: 26, length: 2, content: 楚元, WYG: 衣衾棺槨者也反歸也真者自然之道也臝音郎果反劉敞曰形魂復歸于土此其所謂反真也何自然之謂必亡易吾意師古曰易改也死則為布囊盛尸入地七尺既下從足引脫其嚢以身親土其子欲黙而不從重廢父命師古曰重難也欲從之心又不忍廼往見}
  - {type: variant, offset: 26, length: 2, content: 楚元, krp: 衣衾棺槨者也反歸也真者自然之道也臝音郎果反劉敞曰形魂復歸于土此其所謂反真也何自然之謂必亡易吾意師古曰易改也死則為布囊盛尸入地七尺既下從足引脫其嚢以身親土其子欲黙而不從重廢父命師古曰重難也欲從之心又不忍廼往見}
  - {type: variant, offset: 29, length: 2, content: 傅傅, WYG: 孫友人祁侯師古曰祁侯繒賀之孫承嗣者名它祁侯與王孫書曰王孫苦疾僕廹從上祠雍未得詣前師古曰詣至也至前言来見也願存精神省思慮進近醫藥宋祁曰近字當刪厚自持竊聞王孫先令臝𦵏令死者亡知則已若其有知是戮尸地下將臝見先人竊為王孫不取也且孝經曰為之棺槨衣衾是亦聖人之遺制何必區區獨守所聞師古曰區區小意也願王孫察焉王孫報曰盖聞古之聖王縁人情不忍其親故為制禮今則越之師古曰言踰禮而厚𦵏也吾是以臝𦵏将以矯世也師古曰正曲曰矯夫厚𦵏誠亡益於死者而俗人競以相髙靡財單幣腐之地下師古曰靡散也單盡也或廼今日入而明日發師古曰言見發掘也此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真也反真㝠㝠亡形亡聲廼合道情夫飾外以華衆厚𦵏以鬲真師古曰鬲與隔同其後並類此使歸者不得至化者不得變是使物各失其所也且吾聞之精神者天之有也形骸者地之有也師古曰文}
