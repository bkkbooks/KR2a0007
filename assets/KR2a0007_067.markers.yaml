  - {type: variant, offset: 1935, length: 1, content: 榮, krp: 之重器得士則重失士則輕詩云濟濟多士文王以寜師古曰大雅文王之詩也已解于上廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也師古曰九九算術若今九章五曺之輩今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩闗自鬻師古曰秦武王即孝公之孫恵文王之子也任鄙力士也繆公行伯繇余歸徳師古曰即秦穆公伯讀曰霸繇讀曰由今欲致天下之士民有上書求見者輙使詣尚書問其所言言可采取者秩以升斗之禄賜以一束之帛若此則天下之士發憤懣師古曰懣音滿吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣師古曰爛然分明之貌也夫以四海之廣士民之數能言之類至衆多也然其儁傑指世陳政言成文章質之先聖而不繆施之}
  - {type: variant, offset: 1938, length: 0, content: '', WYG: 合時務師古曰質正也若此者亦亡㡬人師古曰無㡬言不多也㡬音居豈反故爵禄束帛者天下之底石髙祖所以厲世摩鈍也師古曰底細石也音之履反又音秖孔子曰工欲善其事必先利其器師古曰論語載孔子之言也工以喻國政利器喻賢才至秦則不然張誹謗之罔以為漢敺除倒持泰阿授楚其柄師古曰泰阿劒名歐冶所鑄也言秦無道令陳涉項羽乗間而發喻倒持劒而以把授與人也故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也師古曰辟讀曰闢今不循伯者之道師古曰伯讀曰覇次下亦同廼欲以三代選舉之法取當時之士猶察伯樂之圖求騏驥於市而不可得亦已明矣宋祁曰而當作其字故髙祖棄陳平之過而獲其謀師古曰盗嫂受金之事晋文召天王齊桓用其讎師古曰召天王謂狩于河陽也用其讎謂以管仲為相並解於上亡益於時不顧逆順此所謂伯道者也一色成體謂之純白黒雜合謂之駮欲以承平之法治暴秦之緒師古曰緒謂餘業也猶以鄉飲酒之禮理軍市也今陛下既不納天下之言又加戮}
