body:
  text: 司馬相如傳第二十七下相如為郎數歲會唐蒙使略通夜郎僰中發巴蜀吏卒千人郡又多為發轉漕萬餘人用軍興法誅其渠率巴蜀民大驚恐上聞之乃遣相如責唐蒙等因諭告巴蜀民以非上意檄曰告巴蜀太守蠻夷自擅不討之日久矣時侵犯邊境勞士大夫陛下即位存撫天下集安中國然後興師出兵北征胸奴單于怖駭交臂受事屈膝請和康居西域重譯納貢稽首來享移師東指閩越相誅右弔番禺太子入朝南夷之君西僰之長常效貢職不敢惰怠延頸舉踵喁喁然皆鄉風慕義欲為臣妾道里遼遠山川阻深不能自致夫不順者已誅而為善者未賞故遣中郎將往賓之發巴蜀之士各五百人以奉幣衛使者不然靡有兵革之事戰鬭之患今聞其乃發軍興制驚懼子弟憂患長老郡又擅為轉粟運輸皆非陛下之意也當行者或亡逃自賊殺亦非人臣之節也夫邊郡之士聞熢舉燧燔皆攝弓而馳荷兵而走流汗相屬惟恐居後觸白刃冒流矢議不反顧計不旋踵人懷怒心如報私讎彼豈樂死惡生非編列之民而與巴蜀異主哉計深慮遠急國家之難而樂盡人臣之道也故有剖符之封析圭而爵位為通侯居列東第終則遺顯號於後世傳土地於子孫事行甚忠敬居位甚安佚名聲施於無窮功烈著而不滅是以賢人君子肝腦塗中原膏液潤野屮而不辭也今奉幣使至南夷即自賊殺或亡逃抵誅身死無名諡為至愚恥及父母為天下笑人之度量相越豈不遠哉然此非獨行者之罪也父兄之教不先子弟之率不謹寡廉鮮恥而俗不長厚也其被刑戮不亦宜乎陛下患使者有司之若彼悼不肖愚民之如此故遣信使曉諭百姓以發卒之事因數之以不忠死亡之罪讓三老孝弟以不教誨之過方今田時重煩百姓已親見近縣恐遠所溪谷山澤之民不遍聞檄到亟下縣道咸喻陛下意毋忽相如還報唐蒙已略通夜郎因通西南夷道發巴蜀廣漢卒作者數萬人治道二歲道不成士卒多物故費以億萬計蜀民及漢用事者多言其不便是時卭莋之君長聞南夷與漢通得賞賜多多欲願為內臣妾請吏比南夷上問相如相如曰卭莋冉駹者近蜀道易通異時嘗通為郡縣矣至漢興而罷今誠復通為置縣愈於南夷上以為然乃拜相如為中郎將建節往使副使者王然于壺充國呂越人馳四乘之傳因巴蜀吏幣物以賂西南夷至蜀太守以下郊迎縣令負弩矢先驅蜀人以為寵於是卓王孫臨卭諸公皆因門下獻牛酒以交歡卓王孫喟然而歎自以得使女尚司馬長卿晚乃厚分與其女財與男等相如使略定西南夷卭莋冉駹斯榆之君皆請為臣妾除邊關邊關益斥西至沫若水南至牂牁為徼通靈山道橋孫水以通卭莋還報天子大説相如使時蜀長老多言通西南夷之不為用大臣亦以為然相如欲諫業已建之不敢乃著書藉蜀父老為辭而己詰難之以風天子且因宣其使指令百姓皆知天子意其辭曰漢興七十有八載德茂存乎六世威武紛云湛恩汪濊群生霑濡洋溢乎方外於是乃命使西征隨流而攘風之所被罔不披靡因朝冉從駹定莋存卭略斯榆舉苞蒲結軌還轅東鄉將報至于蜀都耆老大夫搢紳先生之徒二十有七人儼然造焉辭畢進曰蓋聞天子之於夷狄也其義羈縻勿絶而已今罷三郡之士通夜郎之塗三年於茲而功不竟士卒勞倦萬民不贍今又接之以西夷百姓力屈恐不能卒業此亦使者之纍也竊為左右患之且夫卭莋西僰之與中國並也歷年茲多不可記已仁者不以德來強者不以力并意者殆不可乎今割齊民以附夷狄弊所恃以事無用鄙人固陋不識所謂使者曰烏謂此乎必若所云則是蜀不變服而巴不化俗也僕尚惡聞若説然斯事體大固非觀者之所覯也余之行急其詳不可得聞已請為大夫粗陳其略蓋世必有非常之人然後有非常之事有非常之事然後有非常之功非常者固常人之所異也故曰非常之元黎民懼焉及臻厥成天下晏如也昔者洪水沸出泛濫衍溢民人升降移徙崎嶇而不安夏后氏戚之乃堙洪原決江疏河灑沈淡災東歸之於海而天下永寧當斯之勤豈惟民哉心煩於慮而身親其勞躬傶骿胝無胈膚不生毛故休烈顯乎無窮聲稱浹乎于茲且夫賢君之踐位也豈特委瑣握齪拘文牽俗循誦習傳當世取説云爾哉必將崇論谹議創業垂統為萬世規故馳騖乎兼容并包而勤思乎參天二地且詩不云乎普天之下莫非王土率土之濱莫非王臣是以六合之內八方之外浸淫衍溢懷生之物有不浸潤於澤者賢君恥之今封疆之內冠帶之倫咸獲嘉祉靡有闕遺矣而夷狄殊俗之國遼絶異黨之域舟車不通人迹罕至政教未加流風猶微內之則犯義侵禮於邊境外之則邪行橫作放殺其上君臣易位尊卑失序父兄不辜幼孤為奴虜係絫號泣內鄉而怨曰蓋聞中國有至仁焉德洋恩普物靡不得其所今獨曷為遺己舉踵思慕若枯旱之望雨盩夫為之垂涕況乎上聖又烏能已故北出師以討強胡南馳使以誚徑越四面風德二方之君鱗集仰流願得受號者以億計故乃關沫若徼牂牁鏤靈山梁孫原創道德之塗垂仁義之統將博恩廣施遠撫長駕使疏逖不閉曶爽暗昧得耀乎光明以偃甲兵於此而息討伐於彼遐邇一體中外禔福不亦康乎夫拯民於沈溺奉至尊之休德反衰世之陵夷繼周氏之絶業天子之急務也百姓雖勞又惡可以已哉且夫王者固未有不始於憂勤而終於佚樂者也然則受命之符合在於此方將增太山之封加梁父之事鳴和鸞揚樂頌上咸五下登三觀者未覩指聽者未聞音猶焦朋已翔乎寥廓而羅者猶視乎藪澤悲夫於是諸大夫茫然喪其所懷來失厥所以進喟然並稱曰允哉漢德此鄙人之所願聞也百姓雖勞請以身先之敞罔靡徙遷延而辭避其後人有上書言相如使時受金失官居歲餘復召為郎相如口吃而善著書常有消渴病與卓氏婚饒於財故其仕宦未嘗肯與公卿國家之事常稱疾間居不慕官爵嘗從上至長楊獵是時天子方好自擊熊豕馳逐野獸相如因上疏諫其辭曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之技不能用枯木朽株盡為難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變況乎涉豐草騁丘虛前有利獸之樂而內無存變之意其為害也不亦難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取蓋明者遠見於未萌而知者避危於無形禍固多藏於隱微而發於人之所忽者也故鄙諺曰家絫千金坐不垂堂此言雖小可以諭大臣願陛下留意幸察上善之還過宜春宮相如奏賦以哀二世行失其辭曰登陂陀之長阪兮坌入曾宮之嵯峨臨曲江之隑州兮望南山之參差巖巖深山之谾谾兮通谷𧯆乎谽谺汩淢靸以永逝兮注平皋之廣衍觀衆樹之蓊薆兮覽竹林之榛榛東馳土山兮北揭石瀨弭節容與兮歷弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絶烏乎操行之不得墓蕪穢而不修兮魂亡歸而不食相如拜為孝文園令上既美子虛之事相如見上好仙因曰上林之事未足美也尚有靡者臣嘗為大人賦未就請具而奏之相如以為列仙之儒居山澤間形容甚臞此非帝王之仙意也乃遂奏大人賦其辭曰世有大人兮在乎中州宅彌萬里兮曾不足以少留悲世俗之迫隘兮朅輕舉而遠遊乘絳幡之素霓兮載雲氣而上浮建格澤之修竿兮總光耀之采旄垂旬始以為幓兮曳彗星而為髾掉指橋以偃寋兮又猗抳以招搖攬攙搶以為旌兮靡屈虹而為綢紅杳眇以玄湣兮猋風涌而雲浮駕應龍象輿之蠖略委麗兮驂赤螭青虬之蚴蟉宛蜒低卬夭蟜裾以驕驁兮詘折隆窮躩以連卷沛艾赳螑仡以佁擬兮放散畔岸驤以孱顏跮踱輵螛容以骫麗兮蜩蟉偃寋怵㲋以梁倚糾蓼叫奡踏以𦟣路兮薎蒙踊躍騰而狂趭蒞颯卉歙焱至電過兮煥然霧除霍然雲消邪絶少陽而登太陰兮與真人乎相求互折窈窕以右轉兮橫厲飛泉以正東悉徵靈圉而選之兮部署衆神於搖光使五帝先導兮反大一而從陵陽左玄冥而右黔雷兮前長離而後矞皇廝征伯僑而役羡門兮詔岐伯使尚方祝融警而蹕御兮清氣氛而后行屯余車而萬乘兮綷雲蓋而樹華旗使句芒其將行兮吾欲往乎南娭歷唐堯於崇山兮過虞舜於九疑紛湛湛其差錯兮雜遝膠輵以方馳騷擾衝蓯其紛拿兮滂濞泱軋麗以林離攢羅列聚叢以蘢茸兮衍曼流爛痑以陸離徑入雷室之砰磷鬱律兮洞出鬼谷之堀礨崴魁遍覽八紘而觀四海兮朅度九江越五河經營炎火而浮弱水兮杭絶浮渚涉流沙奄息蔥極泛濫水娭兮使靈媧鼓琴而舞馮夷時若曖曖將混濁兮召屏翳誅風伯刑雨師西望崑崙之軋沕荒忽兮直徑馳乎三危排閶闔而入帝宮兮載玉女而與之歸登閬風而遙集兮亢鳥騰而一止低徊陰山翔以紆曲兮吾乃今日覩西王母皓然白首戴勝而穴處兮亦幸有三足烏為之使必長生若此而不死兮雖濟萬世不足以喜回車朅來兮絶道不周會食幽都呼吸沆瀣兮餐朝霞咀噍芝英兮嘰瓊華僸祲尋而高縱兮紛鴻溶而上厲貫列缺之倒景兮涉豐隆之滂濞騁遊道而修降兮騖遺霧而遠逝迫區中之隘陜兮舒節出乎北垠遺屯騎於玄闕兮軼先驅於寒門下崢嶸而無地兮上嵺廓而無天視眩泯而亡見兮聽敞恍而亡聞乘虛亡而上遐兮超無友而獨存相如既奏大人賦天子大説飄飄有陵雲氣遊天地之間意相如既病免家居茂陵天子曰司馬相如病甚可往從悉取其書若後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求書奏之其遺札書言封禪事所忠奏焉天子異之其辭曰伊上古之初肇自皓穹生民歷選列辟以迄乎秦率邇者踵武聽逖者風聲紛輪威蕤堙滅而不稱者不可勝數也繼昭夏崇號諡略可道者七十有二君罔若淑而不昌疇逆失而能存軒轅之前遐哉邈乎其詳不可得聞已五三六經載籍之傳維見可觀也書曰元首明哉股肱良哉因斯以談君莫盛於堯臣莫賢於后稷后稷創業於唐公劉發迹於西戎文王改制爰周郅隆大行越成而后陵夷衰微千載亡聲豈不善始善終哉然無異端慎所由於前謹遺教於後耳故軌迹夷易易遵也湛恩厖洪易豐也憲度著明易則也垂統理順易繼也是以業隆於繈保而崇冠乎二后揆厥所元終都攸卒未有殊尤絶迹可考於今者也然猶躡梁甫登大山建顯號施尊名大漢之德逢涌原泉沕潏曼羡旁魄四塞雲布霧散上暢九垓下泝八埏懷生之類沾濡浸潤協氣橫流武節焱逝爾狹遊原迥闊泳末首惡鬱沒暗昧昭晰昆蟲闓懌回首面內然后囿騶虞之珍群徼麋鹿之怪獸導一莖六穗於庖犧雙觡共抵之獸獲周餘放龜于岐招翠黃乘龍於沼鬼神接靈圉賓於間館奇物譎詭俶儻窮變欽哉符瑞臻茲猶以為薄不敢道封禪蓋周躍魚隕杭休之以燎微夫斯之為符也以登介丘不亦恧乎進攘之道何其爽與於是大司馬進曰陛下仁育群生義征不譓諸夏樂貢百蠻執贄德牟往初功無與二休烈液洽符瑞衆變期應紹至不特創見意者太山梁父設壇場望幸蓋號以況榮上帝垂恩儲祉將以慶成陛下嗛讓而弗發也挈三神之歡缺王道之儀群臣恧焉或謂且天為質暗示珍符固不可辭若然辭之是泰山靡記而梁父罔幾也亦各並時而榮咸濟厥世而屈説者尚何稱於後而云七十二君哉夫修德以錫符奉符以行事不為進越也故聖王弗替而修禮地祇謁款天神勒功中嶽以章至尊舒盛德發號榮受厚福以浸黎民皇皇哉斯事天下之壯觀王者之卒業不可貶也願陛下全之而后因雜縉紳先生之略術使獲曜日月之末光絶炎以展采錯事猶兼正列其義祓飾厥文作春秋一藝將襲舊六為七攄之無窮俾萬世得激清流揚微波蜚英聲騰茂實前聖之所以永保鴻名而常為稱首者用此宜命掌故悉奏其儀而覽焉於是天子沛然改容曰俞乎朕其試哉乃遷思回慮總公卿之議詢封禪之事詩大澤之博廣符瑞之富遂作頌曰自我天覆雲之油油甘露時雨厥壤可遊滋液滲漉何生不育嘉穀六穗我穡曷蓄匪唯雨之又潤澤之匪唯偏我泛布護之萬物熙熙懷而慕之名山顯位望君之來君兮君兮侯不邁哉班班之獸樂我君圃白質黑章其儀可喜旻旻穆穆君子之態蓋聞其聲今視其來厥塗靡從天瑞之徵茲爾於舜虞氏以興濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君輿帝用享祉三代之前蓋未嘗有宛宛黃龍興德而升采色玄耀炳炳輝煌正陽顯見覺寤黎蒸於傳載之云受命所乘厥之有章不必諄諄依類託寓諭以封巒披藝觀之天人之際已交上下相發允答聖王之事兢兢翼翼故曰於興必慮衰安必思危是以湯武至尊嚴不失肅祗舜在假典顧省厥遺此之謂也相如既卒五歲上始祭后土八年而遂禮中嶽封于太山至梁甫禪肅然相如它所著若遺平陵侯書與五公子相難屮木書篇不采采其尤著公卿者云贊曰司馬遷稱春秋推見至隱易本隱以之顯大雅言王公大人而德逮黎庶小雅譏小己之得失其流及上所言雖殊其合德一也相如雖多虛辭濫説然要其歸引之於節儉此亦詩之風諫何異揚雄以為靡麗之賦勸百而風一猶騁鄭衛之聲曲終而奏雅不已戲乎
