body:
  text: 刑法志第三夫人宵天地之䫉懷五常之性聰明精粹有生之最靈者也爪牙不足以供耆欲趨走不足以避利害無毛羽以禦寒暑必將役物以為養任智而不恃力此其所以為貴也故不仁愛則不能群不能群則不勝物不勝物則養不足群而不足爭心將作上聖卓然先行敬讓博愛之德者衆心說而從之從之成群是為君矣歸而往之是為王矣洪範曰天子作民父母為天下王聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威也聖人既躬明哲之性必通天地之心制禮作教立法設刑動緣民情而則天象地故曰先王立禮則天之明因地之性也刑罰威獄以類天之震曜殺戮也溫慈惠和以效天之生殖長育也書云天秩有禮天討有罪故聖人因天秩而制五禮因天討而作五刑大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭撲大者陳諸原野小者致之市朝其所繇來者上矣自黃帝有涿鹿之戰以定火災顓頊有共工之陳以定水害唐虞之際至治之極猶流共工放歡兜竄三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下既定戢臧干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦地方一里為井井十為通通十為成成方十里成十為終終十為同同方百里同十為封封十為畿畿方千里有稅有租王鳴盛說下文即云稅以足食賦以足兵證之顏注則合作有稅有賦按景祐殿本都作有賦賦王鳴盛說下文即云稅以足食賦以足兵證之顏注則合作有稅有賦按景祐殿本都作有賦稅以足食賦以足兵故四井為邑四邑為丘丘十六井也有戎馬一匹牛三頭四丘為甸甸六十四井也有戎馬四匹兵車一乘牛十二頭甲士三人卒七十二人干戈備具是謂乘馬之法一同百里提封萬井除山川沈斥城池邑居園囿術路三千六百井定出賦六千四百井戎馬四百匹兵車百乘此卿大夫采地之大者也是謂百乘之家一封三百一十六里提封十萬井定出賦六萬四千井戎馬四千匹兵車千乘此諸侯之大者也是謂千乘之國天子畿方千里提封百萬井定出賦六十四萬井戎馬四萬匹兵車萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以搜夏拔舍以苗秋治兵以獮冬大閲以狩皆於農隙以講事焉五國為屬屬有長十國為連連有帥三十國為卒卒有正二百一十國為州州有牧連帥比年簡車卒正三年簡徒群牧五載大簡車徒此先王為國立武足兵之大略也周道衰法度隳至齊桓公任用管仲而國富民安公問行伯用師之道管仲曰公欲定卒伍修甲兵大國亦將修之而小國設備則難以速得志矣於是乃作內政而寓軍令焉故卒伍定呼里而軍政成呼郊連其什伍居處同樂死生同憂禍福共之故夜戰則其聲相聞晝戰則其目相見緩急足以相死其教已成外攘夷狄內尊天子以安諸夏齊威景祐殿本都作桓桓景祐殿本都作桓既沒晉文接之亦先定其民作被廬之法總帥諸侯迭為盟主然其禮已頗僭差又隨時苟合以求欲速之功故不能充王制二伯之後寖以陵夷至魯成公作丘甲哀公用田賦搜狩治兵大閲之事皆失其正春秋書而譏之以存王道於是師旅亟動百姓罷敝無伏節死難之誼孔子傷焉曰以不教民戰是謂棄之故稱子路曰由也千乘之國可使治其賦也而子路亦曰千乘之國攝呼大國之間加之以師旅因之以饑饉由也為之比及三年可使有勇且知方也治其賦兵教以禮誼之謂也春秋之後滅弱吞小並為戰國稍增講武之禮以為戲樂用相夸視而秦更名角抵先王之禮沒於淫樂中矣雄桀之士因勢輔時作為權詐以相傾覆吳有孫武齊有孫臏魏有吳起秦有商鞅皆禽敵立勝垂著篇籍當此之時合從連衡轉相攻伐代為雌雄齊愍以技擊彊魏惠以武卒奮秦昭以鋭士勝世方爭於功利而馳說者以孫吳為宗時唯孫卿明於王道而非之曰彼孫吳者上勢利而貴變詐施於暴亂昏嫚之國君臣有間上下離心政謀不良故可變而詐也夫仁人在上為下所卬猶子弟之衛父兄若手足之扞頭目何可當也鄰國望我歡若親戚芬若椒蘭顧視其上猶焚灼仇讎人情豈肯為其所惡而攻其所好哉故以桀攻桀猶有巧拙以桀詐堯若卵投石夫何幸之有詩曰武王載旆有虔秉鉞如火烈烈則莫我敢遏言以仁誼綏民者無敵於天下也若齊之技擊得一首則受賜金事小敵脆則偷可用也事巨敵堅則渙然離矣是亡國之兵也魏氏武卒衣三屬之甲操十二石之弩負矢五十個置戈其上冠胄帶劍贏三日之糧日中而趨百里中試則復其戶利其田宅如此則其地雖廣其稅必寡其氣力數年而衰是危國之兵也秦人其生民也狹厄其使民也酷烈劫之以勢隱之以厄狃之以賞慶道之以刑罰使其民所以要利於上者非戰無由也功賞相長五甲首而隸五家是最為有數故能四世有勝於天下然皆干賞蹈利之兵庸徒鬻賣之道耳未有安制矜節之理也故雖地廣兵彊鰓鰓常恐天下之一合而共軋己也至乎齊桓晉文之兵可謂入其域而有節制矣然猶未本仁義之統也故齊之技擊不可以遇魏之武卒魏之武卒不可以直秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義故曰善師者不陳善陳者不戰善戰者不敗善敗者不亡若夫舜修百僚咎繇作士命以蠻夷猾夏寇賊姦軌而刑無所用所謂善師不陳者也湯武征伐陳師誓衆而放禽桀紂所謂善陳不戰者也齊桓南服彊楚使貢周室北伐山戎為燕開路存亡繼絶功為伯首所謂善戰不敗者也楚昭王遭闔廬之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之謂景祐本無憐之二字王念孫說通典亦無疑後人所加謂作為為景祐本無憐之二字王念孫說通典亦無疑後人所加謂作為之出兵二國并力遂走吳師昭王返國所謂善敗不亡者也若秦因四世之勝據河山之阻任用白起王翦豺狼之徒奮其爪牙禽獵六國以并天下窮武極詐士民不附卒隸之徒還為敵讎猋起雲合果共軋之斯為下矣凡兵所以存亡繼絶救亂除害也故伊呂之將子孫有國與商周並至於末世苟任詐力以快貪殘爭城殺人盈城爭地殺人滿野孫吳商白之徒皆身誅戮於前而功錢大昭說監本閩本功作國按景祐殿本都作國王先謙說作國是國錢大昭說監本閩本功作國按景祐殿本都作國王先謙說作國是滅亡於後報應之勢各以類至其道然矣漢興高祖躬神武之材行寬仁之厚總攬英雄以誅秦項任蕭曹之文用良平之謀騁陸酈之辨明叔孫通之儀文武相配大略舉焉天下既定踵秦而置材官於郡國京師有南北軍之屯至武帝平百粵內增七校外有樓船皆歲時講肄修武備云至元帝時以貢禹議始罷角抵而未正治兵振旅之事也古人有言天生五材民並用之廢一不可誰能去兵鞭撲不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑錯兵寢者其本末有序帝王之極功也昔周之法建三典以刑邦國詰四方一曰刑新邦用輕典二曰刑平邦用中典三曰刑亂邦用重典五刑墨罪五百劓罪五百宮罪五百刖罪五百殺罪五百所謂刑平邦用中典者也凡殺人者踣諸市墨者使守門劓者使守關宮者使守內刖者使守囿完者使守積其奴男子入于罪隸女子入舂槁凡有爵者與七十者與未齓者皆不為奴周道既衰穆王眊荒命甫侯度時作刑以詰四方墨罰之屬千劓罰之屬千臏罰之屬五百宮罰之屬三百大辟之罰其屬二百五刑之屬三千蓋多於平邦中典五百章所謂刑亂邦用重典者也春秋之時王道寖壞教化不行子産相鄭而鑄刑書晉叔嚮非之曰昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故間之以誼糾之以政行之以禮守之以信奉之以仁制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠悚之以行教之以務使之以和臨之以敬蒞之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上並有爭心以徵於書而徼幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國制參辟鑄刑書將以靖民不亦難乎詩曰儀式刑文王之德日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徵於書錐刀之末將盡爭之亂獄滋豐貨賂並行終子之世鄭其敗呼子産報曰若吾子之言僑不材不能及子孫吾以救世也偷薄之政自是滋矣孔子傷之曰導之以德齊之以禮有恥且格導之以政齊之以刑民免而無恥禮樂不興則刑罰不中刑罰不中則民無所錯手足孟氏使陽膚為士師問於曾子亦曰上失其道民散久矣如得其情則哀矜而勿喜陵夷至於戰國韓任申子秦用商鞅連相坐之法造參夷之誅增加肉刑大辟有鑿顛抽脅鑊亨之刑至於秦始皇兼吞戰國遂毀先王之法滅禮誼之官專任刑罰躬操文墨晝斷獄夜理書自程決事日縣石之一而姦邪並生赭衣塞路囹圄成市天下愁怨潰而叛之漢興高祖初入關約法三章曰殺人者死傷人及盜抵罪蠲削煩苛兆民大說其後四夷未附兵革未息三章之法不足以禦姦於是相國蕭何攈托秦法取其宜於時者作律九章當孝惠高后時百姓新免毒蠚人欲長幼養老蕭曹為相填以無為從民之欲而不擾亂是以衣食滋殖刑罰用稀及孝文即位躬修玄默勸趣農桑減省租賦而將相皆舊功臣少文多質懲惡亡秦之政論議務在寬厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業畜積歲增戶口寖息風流篤厚禁罔疏闊選張釋之為廷尉罪疑者豫民是以刑罰大省至於斷獄四百有刑錯之風即位十三年齊太倉令淳于公有罪當刑詔獄逮繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也宋祁說姚本益也刪去也字按景祐本無也字其少女緹縈自傷悲泣乃隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止其咎安在非乃朕德之薄而教不明與吾甚自愧故夫訓道不純而愚民陷焉詩曰愷弟君子民之父母今人有過教未施而刑已加焉或欲改行為善而道亡繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免具為令丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂當黥者髡鉗為城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市罪人獄已決完為城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人隸臣妾滿二歲為司寇司寇一歲及作如司寇二歲皆免為庶人其亡逃及有罪耐以上不用此令前令之刑城旦舂歲而非禁錮者如完為城旦舂歲數以免臣昧死請制曰可是後外有輕刑之名內實殺人斬右止者又當死斬左止者笞五百當劓者笞三百率多死景帝元年下詔曰加笞與重罪無異幸而不死不可為人其定律笞五百曰三百笞三百曰二百猶尚不全至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令丞相劉舍御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀毋得更人畢一罪乃更人自是笞者得全然酷吏猶以為威死刑既重而生刑又輕民易犯之及至孝武即位外事四夷之功內盛耳目之好徵發煩數百姓貧耗窮民犯法酷吏擊斷姦軌不勝於是招進張湯趙禹之屬條定法令作見知故縱監臨部主之法緩深故之罪急縱出之誅其後姦猾巧法轉相比況禁罔寖密律令凡三百五十九章大辟四百九條千八百八十二事死罪決事比萬三千四百七十二事文書盈於几閣典者不能遍睹是以郡國承用者駮或罪同而論異姦吏因緣為市所欲活則傅生議所欲陷則豫死比議者咸冤傷之宣帝自在閭閻而知其若此及即尊位廷史路溫舒上疏言秦有十失其一尚存治獄之吏是也語在溫舒傳上深愍焉乃下詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕祿薄其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寬恕黃霸等以為廷平季秋後請讞時上常幸宣室齊居而決事獄刑號為平矣時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣宣帝未及修正至元帝初立乃下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律令煩多而不約自典文者不能分明而欲羅元元之不逮斯豈刑中之意哉其議律令可蠲除輕減者條奏唯在便安萬姓而已至成帝河平中復下詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百有餘萬言奇請它比日以益滋自明習者不知所由欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議減死刑及可蠲除約省者令較然易知條奏書不云乎惟刑之恤哉其審核之務準古法朕將盡心覽焉有司無仲山父將明之材不能因時廣宣主恩建立明制為一代之法而徒鉤托微細毛舉數事以塞詔而已是以大議不立遂以至今議者或曰法難數變此庸人不達疑塞治道聖智之所常患者也故略舉漢興以來法令稍定而合古便今者漢興之初雖有約法三章網漏吞舟之魚然其大辟尚有夷三族之令令曰當三族者皆先黥劓斬左右止笞殺之梟其首菹其骨肉於市其誹謗詈詛者又先斷舌故謂之具五刑彭越韓信之屬皆受此誅至高后元年乃除三族罪祅言令孝文二年又詔丞相太尉御史法者治之正所以禁暴而衛善人也今犯法者已論而使無罪之父母妻子同産坐之及收朕甚弗取其議左右丞相周勃陳平奏言父母妻子同産相坐及收所以纍其心使重犯法也收之之道所由來久矣臣之愚計以為如其故便文帝復曰朕聞之法正則民愨罪當則民從且夫牧民而道之以善者吏也既不能道又以不正之法罪之是法反害於民為暴者也朕未見其便宜孰計之平勃乃曰陛下幸加大惠於天下使有罪不收無罪不相坐甚盛德臣等所不及也臣等謹奉詔盡除收律相坐法其後新垣平謀為逆復行三族之誅由是言之風俗移易人性相近而習相遠信矣夫以孝文之仁平勃之知猶有過刑謬論如此甚也而況庸材溺於末流者乎周官有五聽八議三刺三宥三赦之法五聽一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽八議一曰議親二曰議故三曰議賢四曰議能五曰議功六曰議貴七曰議勤八曰議賓三刺一曰訊群臣二曰訊群吏三曰訊萬民三宥一曰弗識二曰過失三曰遺忘三赦一曰幼弱二曰老眊三曰憃愚凡囚上罪梏拲而桎中罪梏桎下罪梏王之同族拲有爵者桎以待弊高皇帝七年制詔御史獄之疑者吏或不敢決有罪者久而不論無罪者久繫不決自今以來縣道官獄疑者各讞所屬二千石官二千石官以其罪名當報之所不能決者皆移廷尉廷尉亦當報之廷尉所不能決謹具為奏傳所當比律令以聞上恩如此吏猶不能奉宣故孝景中五年復下詔曰諸獄疑雖文致於法而於人心不厭者輒讞之其後獄吏復避微文遂其愚心至後元年又下詔曰獄重事也人有愚智官有上下獄疑者讞有令讞者已報讞而後不當讞者不為失自此之後獄刑益詳近於五聽三宥之意三年復下詔曰高年老長人所尊敬也鰥寡不屬逮者人所哀憐也其著令年八十以上八歲以下及孕者未乳師朱儒當鞠繫者頌繫之至孝宣元康四年又下詔曰朕念夫耆老之人髮齒墮落血氣既衰亦無暴逆之心今或羅于文法執于囹圄不得終其年命朕甚憐之自今以來諸年八十非誣告殺傷人它皆勿坐至成帝鴻嘉元年定令年未滿七歲賊鬭殺人及犯殊死者上請廷尉以聞得減死合於三赦幼弱老眊之人此皆法令稍定近古而便民者也孔子曰如有王者必世而後仁善人為國百年可以勝殘去殺矣言聖王承衰撥亂而起被民以德教變而化之必世然後仁道成焉至於善人不入於室然猶百年勝殘去殺矣此為國者之程式也今漢道至盛歷世二百餘載考自昭宣元成哀平六世之間斷獄殊死率歲千餘口而一人耐罪上至右止三倍有餘古人有言滿堂而飲酒有一人鄉隅而悲泣則一堂皆為之不樂王者之於天下譬猶一堂之上也故一人不得其平為之悽愴於心今郡國被刑而死者歲以萬數天下獄二千餘所其冤死者多少相覆獄不減一人此和氣所以未洽者也原獄刑所以蕃若此者禮教不立刑法不明民多貧窮豪桀務私姦不輒行獄犴不平之所致也書云伯夷降典哲民惟刑言制禮以止刑猶隄之防溢水也今隄防凌遲禮制未立死刑過制生刑易犯饑寒並至窮斯濫溢豪桀擅私為之囊橐姦有所隱則狃而寖廣此刑之所以蕃也孔子曰古之知法者能省刑本也今之知法者不失有罪末矣又曰今之聽獄者求所以殺之古之聽獄者求所以生之與其殺不辜寧失有罪今之獄吏上下相驅以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死也今治獄吏欲陷害人亦猶此矣凡此五疾獄刑所以尤多者也自建武永平民亦新免兵革之禍人有樂生之慮與高惠之間同而政在抑彊扶弱朝無威福之臣邑無豪桀之俠以口率計斷獄少於成哀之間什八可謂清矣然而未能稱意比隆於古者以其疾未盡除而刑本不正善乎孫卿之論刑也曰世俗之為說者以為治古者無肉刑有象刑墨黥之屬菲履赭衣而不純是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡且懲其末錢大昭說荀子作未按殿本作未未錢大昭說荀子作未按殿本作未也殺人者不死傷人者不刑是惠暴而寬惡也故象刑非生於於字據景祐殿本補治古方起於亂今也凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也德不稱位能不稱官賞不當功刑不當罪不祥莫大矣錢大昭說矣字衍按殿本無焉夫征暴誅悖治之威也殺人者死傷人者刑是百王之所同也未有知其所由來者也故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書云刑罰世重世輕此之謂也所謂象刑惟明者言象天道而作刑安有菲屨赭衣者哉孫卿之言既然又因俗說而論之曰禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極敝之流俗已薄於三代而行堯舜之刑是猶以鞿而御駻突違救時之宜矣且除肉刑者本欲以全民也今去髡鉗一等轉而入於大辟以死罔民失本惠矣故死者歲以萬數刑重之所致也至乎穿窬之盜忿怒傷人男女淫佚吏為姦臧若此之惡髡鉗之罰又不足以懲也故刑者歲十萬數民既不畏又曾不恥刑輕之所生也故俗之能吏公以殺盜為威專殺者勝任奉法者不治亂名傷制不可勝條是以罔密而姦不塞刑蕃而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也豈宜惟思所以清原正本之論刪定律令饌二百章以應大辟其餘罪次於古當生今觸死者皆可募行肉刑乃傷人與盜吏受賕枉法男女淫亂皆復古刑為三千章詆欺文致微細之法悉蠲除如此則刑可畏而禁易避吏不專殺法無二門輕重當罪民命得全合刑罰之中殷天人之和順稽古之制成時雍之化成康刑錯雖未可致孝文斷獄庶幾可及詩云宜民宜人受祿于天書曰立功立事可以永年言為政而宜於民者功成事立則受天祿而永年命所謂一人有慶萬民賴之者也
