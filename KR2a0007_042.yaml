body:
  text: 張馮汲鄭傳第二十張釋之字季南陽堵陽人也與兄仲同居以資為騎郎事文帝十年不得調亡所知名釋之曰久宦減仲之産不遂欲免歸中郎將爰盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝曰卑之毋甚高論令今可行也於是釋之言秦漢之間事秦所以失漢所以興者文帝稱善拜釋之為謁者僕射從行上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對嚮應亡窮者文帝曰吏不當如此邪尉亡賴詔釋之拜嗇夫為上林令釋之前曰陛下以絳侯周勃何如人也上曰長者又復問東陽侯張相如何如人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相高其敝徒文具亡惻隱之實以故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨亡其實且下之化上疾於景嚮舉錯不可不察也文帝曰善乃止不拜嗇夫就車召釋之驂乘徐行行問釋之秦之敝具以質言至宮上拜釋之為公車令頃之太子與梁王共車入朝不下司馬門於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹薄太后使使承詔赦太子梁王然後得入文帝繇是奇釋之拜為中大夫頃之至中郎將從行至霸陵上居外臨廁時慎夫人從上指視慎夫人新豐道曰此走邯鄲道也使慎夫人鼓瑟上自倚瑟而歌意悽愴悲懷顧謂群臣曰嗟乎以北山石為椁用紵絮斫陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中亡可欲雖亡石椁又何戚焉文帝稱善其後拜釋之為廷尉頃之上行出中渭橋有一人從橋下走乘輿馬驚於是使騎捕之屬廷尉釋之治問曰縣人來聞蹕匿橋下久以為行過既出見車騎即走耳釋之奏當此人犯蹕當罰金上怒曰此人親驚吾馬馬賴和柔令它馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足唯陛下察之上良久曰廷尉當是也其後人有盜高廟座前玉環得文帝怒下廷尉治案盜宗廟服御物者為奏當棄市上大怒曰人亡道乃盜先帝器吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等然以逆順為基今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其法呼文帝與太后言之乃許廷尉當是時中尉條侯周亞夫與梁相山都侯王恬啓見釋之持議平乃結為親友張廷尉繇此天下稱之文帝崩景帝立釋之恐稱疾欲免去懼大誅至欲見則未知何如用王生計卒見謝景帝不過也王生者善為黃老言處士嘗召居廷中公卿盡會立王生老人曰吾襪解顧謂釋之為我結襪釋之跪而結之既已人或讓王生獨奈何廷辱張廷尉如此王生曰吾老且賤自度終亡益於張廷尉廷尉方天下名臣吾故聊使結襪欲以重之諸公聞之賢王生而重釋之釋之事景帝歲餘為淮南相猶尚以前過也年老病卒其子摰字長公官至大夫免以不能取容當世故終身不仕馮唐祖父趙人也父徙代漢興徙安陵唐以孝著為郎中署長事文帝帝輦過問唐曰父老何自為郎家安在具以實言文帝曰吾居代時吾尚食監高祛數為我言趙將李齊之賢戰於巨鹿下吾每飲食意未嘗不在巨鹿也父老知之乎唐對曰齊尚不如廉頗李牧之為將也上曰何已唐曰臣大父在趙時為官帥將善李牧臣父故為代相善李齊知其為人也上既聞廉頗李牧為人良説乃拊髀曰嗟乎吾獨不得廉頗李牧為將豈憂胸奴哉唐曰主臣陛下雖有廉頗李牧不能用也上怒起入禁中良久召唐讓曰公衆辱我獨亡間處呼唐謝曰鄙人不知忌諱當是時胸奴新大入朝那殺北地都尉卬上以胡寇為意乃卒復問唐曰公何以言吾不能用頗牧也唐對曰臣聞上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之軍功爵賞皆決於外歸而奏之此非空言也臣大父言李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧乃得盡其知能選車千三百乘彀騎萬三千匹百金之士十萬是以北逐單于破東胡滅淡林西抑強秦南支韓魏當是時趙幾伯後會趙王遷立其母倡也用郭開讒而誅李牧令顏聚代之是以為秦所滅今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客軍吏舍人是以胸奴遠避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行吏奉法必用愚以為陛下法太明賞太輕罰太重且雲中守尚坐上功首虜差六級陛下下之吏削其爵罰作之繇此言之陛下雖得李牧不能用也臣誠愚觸忌諱死罪文帝説是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉主中尉及郡國車士十年景帝立以唐為楚相武帝即位求賢良舉唐唐時年九十餘不能為官乃以子遂為郎遂字王孫亦奇士魏尚槐里人也汲黯字長孺濮陽人也其先有寵於古之衛君也至黯十世世為卿大夫以父任孝景時為太子洗馬以嚴見憚武帝即位黯為謁者東粵相攻上使黯往視之至吳而還報曰粵人相攻固其俗不足以辱天子使者河內失火燒千餘家上使黯往視之還報曰家人先火屋比延燒不足憂臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河內倉粟以振貧民請歸節伏矯制罪上賢而釋之遷為滎陽令黯恥為令稱疾歸田里上聞乃召為中大夫以數切諫不得久留內遷為東海太守黯學黃老言治官民好清靜擇丞史任之責大指而已不細苛黯多病臥閣內不出歲餘東海大治稱之上聞召為主爵都尉列於九卿治務在無為而已引大體不拘文法為人性倨少禮面折不能容人之過合己者善待之不合者弗能忍見士亦以此不附焉然好遊俠任氣節行修潔其諫犯主之顏色常慕傅伯爰盎之為人善灌夫鄭當時及宗正劉棄疾亦以數直諫不得久居位是時太后弟武安侯田蚡為丞相中二千石拜謁蚡弗為禮黯見蚡未嘗拜揖之上方招文學儒者上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼上退謂人曰甚矣汲黯之戇也群臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不誼呼且已在其位縱愛身奈辱朝廷何黯多病病且滿三月上常賜告者數終不愈最後嚴助為請告上曰汲黯何如人也曰使黯任職居官亡以愈人然至其輔少主守成雖自謂賁育弗能奪也上曰然古有社稷之臣至如汲黯近之矣大將軍青侍中上踞廁視之丞相弘宴見上或時不冠至如見黯不冠不見也上嘗坐武帳黯前奏事上不冠望見黯避帷中使人可其奏其見敬禮如此張湯以更定律令為廷尉黯質責湯於上前曰公為正卿上不能褒先帝之功業下不能化天下之邪心安國富民使囹圄空虛何空取高皇帝約束紛更之為而公以此無種矣黯時與湯論議湯辨常在文深小苛黯憤發罵曰天下謂刀筆吏不可為公卿果然必湯也令天下重足而立仄目而視矣是時漢方征胸奴招懷四夷黯務少事間常言與胡和親毋起兵上方鄉儒術尊公孫弘及事益多吏民巧上分別文法湯等數奏決讞以幸而黯常毀儒面觸弘等徒懷詐飾智以阿人主取容而刀筆之吏專深文巧詆陷人於罔以自為功上愈益貴弘湯弘湯心疾黯雖上亦不説也欲誅之以事弘為丞相乃言上曰右內史界部中多貴人宗室難治非素重臣弗能任請徙黯為右內史數歲官事不廢大將軍青既益尊姊為皇后然黯與亢禮或説黯曰自天子欲令群臣下大將軍大將軍尊貴誠重君不可以不拜黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯數請問以朝廷所疑遇黯加於平日淮南王謀反憚黯曰黯好直諫守節死義至説公孫弘等如發蒙耳上既數征胸奴有功黯言益不用始黯列九卿矣而公孫弘張湯為小吏及弘湯稍貴與黯同位黯又非毀弘湯已而弘至丞相封侯湯御史大夫黯時丞史皆與同列或尊用過之黯褊心不能無少望見上言曰陛下用群臣如積薪耳後來者居上黯罷上曰人果不可以無學觀汲黯之言日益甚矣居無何胸奴渾邪王帥衆來降漢發車二萬乘縣官亡錢從民貰馬民或匿馬馬不具上怒欲斬長安令黯曰長安令亡罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢徐以縣次傳之何至令天下騷動罷中國甘心夷狄之人乎上默然後渾邪王至賈人與市者坐當死五百餘人黯入請間見高門曰夫胸奴攻當路塞絶和親中國舉兵誅之死傷不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢賜從軍死者家鹵獲因與之以謝天下塞百姓之心今縱不能渾邪帥數萬之衆來虛府庫賞賜發良民侍養若奉驕子愚民安知市買長安中而文吏繩以為闌出財物如邊關乎陛下縱不能得胸奴之贏以謝天下又以微文殺無知者五百餘人臣竊為陛下弗取也上弗許曰吾久不聞汲黯之言今又復妄發矣後數月黯坐小法會赦免官於是黯隱於田園者數年會更立五秼錢民多盜鑄錢者楚地尤甚上以為淮陽楚地之郊也召黯拜為淮陽太守黯伏謝不受印綬詔數強豫然後奉詔召上殿黯泣曰臣自以為填溝壑不復見陛下不意陛下復收之臣常有狗馬之心今病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重臥而治之黯既辭過大行李息曰黯棄逐居郡不得與朝廷議矣然御史大夫湯智足以距諫詐足以飾非非肯正為天下言專阿主意主意所不欲因而毀之主意所欲因而譽之好興事舞文法內懷詐以御主心外挾賊吏以為重公列九卿不早言之何公與之俱受其戮矣息畏湯終不敢言黯居郡如其故治淮陽政清後張湯敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽居淮陽十歲而卒卒後上以黯故官其弟仁至九卿子偃至諸侯相黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿以河南太守卒昆弟以安故同時至二千石十人濮陽段宏始事蓋侯信信任宏官亦再至九卿然衛人仕者皆嚴憚汲黯出其下鄭當時字莊陳人也其先鄭君嘗事項籍籍死而屬漢高祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時當時以任俠自喜脫張羽於厄聲聞梁楚間孝景時為太子舍人每五日洗沐常置驛馬長安諸郊請謝賓客夜以繼日至明旦常恐不遍當時好黃老言其慕長者如恐不稱自見年少官薄然其知友皆大父行天下有名之士也武帝即位當時稍遷為魯中尉濟南太守江都相至九卿為右內史以武安魏其時議貶秩為詹事遷為大司農當時為大吏戒門下客至亡貴賤亡留門者執賓主之禮以其貴下人性廉又不治産卬奉賜給諸公然其餽遺人不過具器食每朝候上間説未嘗不言天下長者其推轂士及官屬丞史誠有味其言也常引以為賢於己未嘗名吏與官屬言若恐傷之聞人之善言進之上唯恐後山東諸公以此翕然稱鄭莊使視決河自請治行五日上曰吾聞鄭莊行千里不齎糧治行者何也然當時在朝常趨和承意不敢甚斥臧否漢征胸奴招四夷天下費多財用益屈當時為大司農任人賓客僦入多逋負司馬安為淮陽太守發其事當時以此陷罪贖為庶人頃之守長史遷汝南太守數歲以官卒昆弟以當時故至二千石者六七人當時始與汲黯列為九卿內行修兩人中廢賓客益落當時死家亡餘財先是下邽翟公為廷尉賓客亦填門及廢門外可設爵羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見贊曰張釋之之守法馮唐之論將汲黯之正直鄭當時之推士不如是亦何以成名哉揚子以為孝文親詘帝尊以信亞夫之軍曷為不能用頗牧彼將有激云爾
