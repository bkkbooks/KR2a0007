body:
  text: 魏相丙吉傳第四十四魏相字弱翁濟陰定陶人也徙平陵少學易為郡卒史舉賢良以對策高第為茂陵令頃之御史大夫桑弘羊客詐稱御史止傳丞不以時謁客怒縛丞相疑其有姦收捕案致其罪論棄客市茂陵大治後遷河南太守禁止姦邪豪彊畏服會丞相車千秋死先是千秋子為雒陽武庫令自見失父而相治郡嚴恐久獲罪乃自免去相使掾追呼之遂不肯還相獨恨曰大將軍聞此令去官必以為我用丞相死不能遇其子使當世貴人非我殆矣武庫令西至長安大將軍霍光果以責過相曰幼主新立以為函谷京師之固武庫精兵所聚故以丞相弟為關都尉子為武庫令今河南太守不深惟國家大策苟見丞相不在而斥逐其子何淺薄也後人有告相賊殺不辜事下有司河南卒戍中都官者二三千人遮大將軍自言願復留作一年以贖太守罪河南老弱萬餘人守關欲入上書關吏以聞大將軍用武庫令事遂下相廷尉獄久繫踰冬會赦出復有詔守茂陵令遷楊州刺史考案郡國守相多所貶退相與丙吉相善時吉為光祿大夫與相書曰朝廷已深知弱翁治行方且大用矣願少慎事自重臧器于身相心善其言為霽威嚴居部二歲徵為諫大夫復為河南太守數年宣帝即位徵相入為大司農遷御史大夫四歲大將軍霍光薨上思其功德以其子禹為右將軍兄子樂平侯山復領尚事書相因平恩侯許伯奏封事言春秋譏世卿惡宋三世為大夫及魯季孫之專權皆危亂國家自後元以來祿去王室政繇冢宰今光死子復為大將軍兄子秉樞機昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宮或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散陰謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽宣帝善之詔相給事中皆從其議霍氏殺許后之謀始得上聞乃罷其三侯令就第親屬皆出補吏於是韋賢以老病免相遂代為丞相封高平侯食邑八百戶及霍氏怨相又憚之謀矯太后詔先召斬丞相然後廢天子事發覺伏誅宣帝始親萬機厲精為治練群臣核名實而相總領眾職甚稱上意元康中匈奴遣兵擊漢屯田車師者不能下上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之眾欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輒奉歸之未有犯於邊境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難於動兵軍旅之後必有凶年言民以其愁苦之氣傷陰陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纖介之忿於遠夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內也願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可上從相言而止相明易經有師法好觀漢故事及便宜章奏以為古今異制方今務在奉行故事而已數條漢興已來國家便宜行事及賢臣賈誼鼂錯董仲舒等所言奏請施行之曰臣聞明主在上賢輔在下則君安虞而民和睦臣相幸得備位不能奉明法廣教化理四方以宣聖德民多背本趨末或有飢寒之色為陛下之憂臣相罪當萬死臣相知能淺薄不明國家大體時用之宜惟民終始未得所繇竊伏觀先帝聖德仁恩之厚勤勞天下垂意黎庶憂水旱之災為民貧窮發倉廩賑乏餧遣諫大夫博士巡行天下察風俗舉賢良平冤獄冠蓋交道省諸用寬租賦弛山澤波池禁秣馬酤酒貯積所以周急繼困慰安元元便利百姓之道甚備臣相不能悉陳昧死奏故事詔書凡二十三事臣謹案王法必本於農而務積聚量入制用以備凶災亡六年之畜尚謂之急元鼎二年平原勃海太山東郡溥被災害民餓死於道路二千石不豫慮其難使至於此賴明詔振捄乃得蒙更生今歲不登穀暴騰踴臨秋收歛猶有乏者至春恐甚亡以相恤西羌未平師旅在外兵革相乘臣竊寒心宜蚤圖其備唯陛下留神元元帥繇先帝盛德以撫海內上施行其策又數表采易陰陽及明堂月令奏之曰臣相幸得備員奉職不修不能宣廣教化陰陽未和災害未息咎在臣等臣聞易曰天地以順動故日月不過四時不忒聖王以順動故刑罰清而民服天地變化必繇陰陽陰陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干東方之神太昊乘震執規司春南方之神炎帝乘離執衡司夏西方之神少昊乘兌執矩司秋北方之神顓頊乘坎執權司冬中央之神黃帝乘坤艮執繩司下土茲五帝所司各有時也東方之卦不可以治西方南方之卦不可以治北方春興兌治則飢秋興震治則華冬興離治則泄夏興坎治則雹明王謹於尊天慎于養人故立羲和之官以乘四時節授民事君動靜以道奉順陰陽則日月光明風雨時節寒暑調和三者得敘則災害不生五穀熟絲麻遂屮木茂鳥獸蕃民不夭疾衣食有餘若是則君尊民說上下亡怨政教不違禮讓可興夫風雨不時則傷農桑農桑傷則民飢寒飢寒在身則亡廉恥寇賊姦宄所繇生也臣愚以為陰陽者王事之本群生之命自古賢聖未有不繇者也天子之義必純取法天地而觀於先聖高皇帝所述書天子所服第八曰大謁者臣章受詔長樂宮曰令群臣議天子所服以安治天下相國臣何御史大夫臣昌謹與將軍臣陵太子太傅臣通等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年壽永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時大謁者襄章奏制曰可孝文皇帝時以二月施恩惠於天下賜孝弟力田及罷軍卒祠死事者頗非時節御史大夫朝錯為太子家令奏言其狀臣相伏念陛下恩澤甚厚然而災氣未息竊恐詔令有未合當時者也願陛下選明經通知陰陽者四人各主一時時至明言所職以和陰陽天下幸甚相數陳便宜上納用焉相敕掾史案事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之時丙吉為御史大夫同心輔政上皆重之相為人嚴毅不如吉寬視事九歲神爵三年薨諡曰憲侯子弘嗣甘露中有罪削爵為關內侯丙吉字少卿魯國人也治律令為魯獄史積功勞稍遷至廷尉右監坐法失官歸為州從事武帝末巫蠱事起吉以故廷尉監徵詔治巫蠱郡邸獄時宣帝生數月以皇曾孫坐衛太子事繫吉見而憐之又心知太子無事實重哀曾孫無辜吉擇謹厚女徒令保養曾孫置閒燥處吉治巫蠱事連歲不決後元二年武帝疾往來長楊五柞宮望氣者言長安獄中有天子氣於是上遣使者分條中都官詔獄繫者亡輕重一切皆殺之內謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人亡辜死者猶不可況親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生恩及四海矣曾孫病幾不全者數焉吉數敕保養乳母加致醫藥視遇甚有恩惠以私財物給其衣食後吉為車騎將軍軍市令遷大將軍長史霍光甚重之入為光祿大夫給事中昭帝崩亡嗣大將軍光遣吉迎昌邑王賀賀即位以行淫亂廢光與車騎將軍張安世諸大臣議所立未定吉奏記光曰將軍事孝武皇帝受襁褓之屬任天下之寄孝昭皇帝早崩亡嗣海內憂懼欲亟聞嗣主發喪之日以大誼立後所立非其人復以大誼廢之天下莫不服焉方今社稷宗廟群生之命在將軍之壹舉竊伏聽於眾庶察其所言諸侯宗室在位列者未有所聞於民間也而遺詔所養武帝曾孫名病已在掖庭外家者吉前使居郡邸時見其幼少至今十八九矣通經術有美材行安而節和願將軍詳大議參以蓍龜豈宜襃顯先使入侍令天下昭然知之然後決定大策天下幸甚光覽其議遂尊立皇曾孫遣宗正劉德與吉迎曾孫於掖庭宣帝初即位賜吉爵關內侯吉為人深厚不伐善自曾孫遭遇吉絕口不道前恩故朝廷莫能明其功也地節三年立皇太子吉為太子太傅數月遷御史大夫及霍氏誅上躬親政省尚書事是時掖庭宮婢則令民夫上書自陳嘗有阿保之功章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝安得有功獨渭城胡組淮陽郭徵卿有恩耳分別奏組等共養勞苦狀詔吉求組徵卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之制詔丞相朕微眇時御史大夫吉與朕有舊恩厥德茂焉詩不云虖亡德不報其封吉為博陽侯邑千三百戶臨當封吉疾病上將使人加紼而封之及其生存也上憂吉疾不起太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果瘉吉上書固辭自陳不宜以空名受賞上報曰朕之封君非空名也而君上書歸侯印是顯朕之不德也方今天下少事君其專精神省思慮近醫藥以自持後五歲代魏相為丞相吉本起獄法小吏後學詩禮皆通大義及居相位上寬大好禮讓掾史有罪臧不稱職輒予長休告終無所案驗客或謂吉曰君侯為漢相姦吏成其私然無所懲艾吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉因以為故事公府不案吏自吉始於官屬掾史務掩過揚善吉馭吏耆酒數逋蕩嘗從吉出醉歐丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之此不過汙丞相車茵耳遂不去也此馭吏邊郡人習知邊塞發犇命警備事嘗出適見驛騎持赤白囊邊郡發犇命書馳來至馭吏因隨驛騎至公車刺取知虜入雲中代郡遽歸府見吉白狀因曰恐虜所入邊郡二千石長吏有老病不任兵馬者宜可豫視吉善其言召東曹案邊長吏瑣科條其人未已詔召丞相御史問以虜所入郡吏吉具對御史大夫卒遽不能詳知以得譴讓而吉見謂憂邊思職馭吏力也吉乃歎曰士亡不可容能各有所長嚮使丞相不先聞馭吏言何見勞勉之有掾史繇是益賢吉吉又嘗出逢清道群鬭者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吐舌吉止駐使騎吏問逐牛行幾里矣掾史獨謂丞相前後失問或以譏吉吉曰民鬭相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可大熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職當憂是以問之掾史乃服以吉知大體五鳳三年春吉病篤上自臨問吉曰君即有不諱誰可以自代者吉辭謝曰群臣行能明主所知愚臣無所能識上固問吉頓首曰西河太守杜延年明於法度曉國家故事前為九卿十餘年今在郡治有能名廷尉于定國執憲詳平天下自以不冤太僕陳萬年事後母孝惇厚備於行止此三人能皆在臣右唯上察之上以吉言皆是而許焉及吉薨御史大黃霸為丞相徵西河太守杜延年為御史大夫會其年老乞骸骨病免以延尉于定國代為御史大夫黃霸薨而定國為丞相太僕陳萬年代定國為御史大夫居位皆稱職上稱吉為知人吉薨諡曰定侯子顯嗣甘露中有罪削爵為關內侯官至衛尉太僕始顯少為諸曹嘗從祠高廟至夕牲日乃使出取齋衣丞相吉大怒謂其夫人曰宗廟至重而顯不敬慎亡吾爵者必顯也夫人為言然後乃已吉中子禹為水衡都尉少子高為中壘校尉元帝時長安士伍尊上書言臣少時為郡邸小吏竊見孝宣皇帝以皇曾孫在郡邸獄是時治獄使者丙吉見皇曾孫遭離無辜吉仁心感動涕泣悽惻選擇復作胡組養視皇孫吉常從臣尊日再侍臥庭上後遭條獄之詔吉扞拒大難不避嚴刑峻法既遭大赦吉謂守丞誰如皇孫不當在官使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢顧組令留與郭徵卿並養數月乃遣組去後少內嗇夫白吉曰食皇孫亡詔令時吉得食米肉月月以給皇孫吉即時病輒使臣尊朝夕請問皇孫視省席蓐燥濕候伺組徵卿不得令晨夜去皇孫敖盪數奏甘毳食物所以擁全神靈成育聖躬功德已亡量矣時豈豫知天下之福而徼其報哉誠其仁恩內結於心也雖介之推割肌以存君不足以比孝宣皇帝時臣上書言狀幸得下吉吉謙讓不敢自伐刪去臣辭專歸美於組徵卿組徵卿皆以受田宅賜錢吉封為博陽侯臣尊不得比組徵卿臣年老居貧死在旦暮欲終不言恐使有功不著吉子顯坐微文奪爵為關內侯臣愚以為宜復其爵邑以報先人功德先是顯為太僕十餘年與官屬大為姦利臧千餘萬司隸校尉昌案劾罪至不道奏請逮捕上曰故丞相吉有舊恩朕不忍絕免顯官奪邑四百戶後復以為城門校尉顯卒子昌嗣爵關內侯成帝時修廢功以吉舊恩尤重鴻嘉元年制詔丞相御史蓋聞襃功德繼絕統所以重宗廟廣賢聖之路也故博陽侯吉以舊恩有功而封今其祀絕朕甚憐之夫善善及子孫古今之通誼也其封吉孫中郎將關內侯昌為博陽侯奉吉後國絕三十二歲復續云昌傳子至孫王莽時乃絕贊曰古之制名必繇象類遠取諸物近取諸身故經謂君為元首臣為股肱明其一體相待而成也是故君臣相配古今常道自然之勢也近觀漢相高祖開基蕭曹為冠孝宣中興丙魏有聲是時黜陟有序眾職修理公卿多稱其位海內興於禮讓覽其行事豈虛虖哉
