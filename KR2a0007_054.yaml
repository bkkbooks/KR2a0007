body:
  text: 張騫李廣利傳第三十一張騫漢中人也建元中為郎時胸奴降者言胸奴破月氏王以其頭為飲器月氏遁而怨胸奴無與共擊之漢方欲事滅胡聞此言欲通使道必更胸奴中乃募能使者騫以郎應募使月氏與堂邑氏奴甘父俱出隴西徑胸奴胸奴得之傳詣單于單于曰月氏在吾北漢何以得往使吾欲使越漢肯聽我乎留騫十餘歲豫妻有子然騫持漢節不失居胸奴西騫因與其屬亡鄉月氏西走數十日至大宛大宛聞漢之饒財欲通不得見騫喜問欲何之騫曰為漢使月氏而為胸奴所閉道今亡唯王使人道送我誠得至反漢漢之賂遺王財物不可勝言大宛以為然遣騫為發譯道抵康居康居傳致大月氏大月氏王已為胡所殺立其夫人為王既臣大夏而君之地肥饒少寇志安樂又自以遠遠漢殊無報胡之心騫從月氏至大夏竟不能得月氏要領留歲餘還並南山欲從羌中歸復為胸奴所得留歲餘單于死國內亂騫與胡妻及堂邑父俱亡歸漢拜騫太中大夫堂邑父為奉使君騫為人彊力寬大信人蠻夷愛之堂邑父胡人善射窮急射禽獸給食初騫行時百餘人去十三歲唯二人得還騫身所至者大宛大月氏大夏康居而傳聞其旁大國五六具為天子言其地形所有語皆在西域傳騫曰臣在大夏時見邛竹杖蜀布問安得此大夏國人曰吾賈人往市之身毒國身毒國在大夏東南可數千里其俗土著與大夏同而卑溼暑熱其民乘象以戰其國臨大水焉以騫度之大夏去漢萬二千里居西南今身毒又居大夏東南數千里有蜀物此其去蜀不遠矣今使大夏從羌中險羌人惡之少北則為胸奴所得從蜀宜徑又無寇天子既聞大宛及大夏安息之屬皆大國多奇物土著頗與中國同俗而兵弱貴漢財物其北則大月氏康居之屬兵彊可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威德遍於四海天子欣欣以騫言為然乃令因蜀犍為發間使四道並出出駹出莋出徙邛出僰皆各行一二千里其北方閉氐莋南方閉巂昆明昆明之屬無君長善寇盜輒殺略漢使終莫得通然聞其西可千餘里有乘象國名滇越而蜀賈間出物者或至焉於是漢以求大夏道始通滇國初漢欲通西南夷費多罷之及騫言可以通大夏乃復事西南夷騫以校尉從大將軍擊胸奴知水草處軍得以不乏乃封騫為博望侯是歲元朔六年也後二年騫為衛尉與李廣俱出右北平擊胸奴胸奴圍李將軍軍失亡多而騫後期當斬贖為庶人是歲驃騎將軍破胸奴西邊殺數萬人至祁連山其秋渾邪王率衆降漢而金城河西並南山至鹽澤空無胸奴胸奴時有候者到而希矣後二年漢擊走單于於幕北天子數問騫大夏之屬騫既失侯因曰臣居胸奴中聞烏孫王號昆莫昆莫父難兜靡本與大月氏俱在祁連焞煌間小國也大月氏攻殺難兜靡奪其地人民亡走胸奴子昆莫新生傅父布就翎侯抱亡置草中為求食還見狼乳之又烏銜肉翔其旁以為神遂持歸胸奴單于愛養之及壯以其父民衆與昆莫使將兵數有功時月氏已為胸奴所破西擊塞王塞王南走遠徙月氏居其地昆莫既健自請單于報父怨遂西攻破大月氏大月氏復西走徙大夏地昆莫略其衆因留居兵稍彊會單于死不肯復朝事胸奴胸奴遣兵擊之不勝益以為神而遠之今單于新困於漢而昆莫地空蠻夷戀故地又貪漢物誠以此時厚賂烏孫招以東居故地漢遣公主為夫人結昆弟其勢宜聽則是斷胸奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使道可便遣之旁國騫既至烏孫致賜諭指未能得其決語在西域傳騫即分遣副使使大宛康居月氏大夏烏孫發譯道送騫與烏孫使數十人馬數十匹報謝因令窺漢知其廣大騫還拜為大行歲餘騫卒後歲餘其所遣副使通大夏之屬者皆頗與其人俱來於是西北國始通於漢矣然騫鑿空諸後使往者皆稱博望侯以為質於外國外國由是信之其後烏孫竟與漢結婚初天子發書易曰神馬當從西北來得烏孫馬好名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云而漢始築令居以西初置酒泉郡以通西北國因益發使抵安息奄蔡犛靬條支身毒國而天子好宛馬使者相望於道一輩大者數百少者百餘人所齎操大放博望侯時其後益習而衰少焉漢率一歲中使者多者十餘少者五六輩遠者八九歲近者數歲而反是時漢既滅越蜀所通西南夷皆震請吏置牂柯越巂益州沈黎文山郡欲地接以前通大夏乃遣使歲十餘輩出此初郡皆復閉昆明為所殺奪幣物於是漢發兵擊昆明斬首數萬後復遣使竟不得通語在西南夷傳自騫開外國道以尊貴其吏士爭上書言外國奇怪利害求使天子為其絶遠非人所樂聽其言豫節募吏民無問所從來為具備人衆遣之以廣其道來還不能無侵盜幣物及使失指天子為其習之輒覆按致重罪以激怒令贖復求使使端無窮而輕犯法其吏卒亦輒復盛推外國所有言大者豫節言小者為副故妄言無行之徒皆爭相效其使皆私縣官齎物欲賤市以私其利外國亦厭漢使人人有言輕重度漢兵遠不能至而禁其食物以苦漢使漢使乏絶責怨至相攻擊樓蘭姑師小國當空道攻劫漢使王恢等尤甚而胸奴奇兵又時時遮擊之使者爭言外國利害皆有城邑兵弱易擊於是天子遣從票侯破奴將屬國騎及郡兵數萬以擊胡胡皆去明年擊破姑師虜樓蘭王酒泉列亭鄣至玉門矣而大宛諸國發使隨漢使來觀漢廣大以大鳥卵及犛靬眩人獻於漢天子大說而漢使窮河源其山多玉石采來天子案古圖書名河所出山曰昆侖云是時上方數巡狩海上乃悉從外國客大都多人則過之散財帛賞賜厚具饒給之以覽視漢富厚焉大角氐出奇戲諸怪物多聚觀者行賞賜酒池肉林令外國客遍觀各倉庫府臧之積欲以見漢廣大傾駭之乃加其眩者之工而角氐奇戲歲增變其益興自此始而外國使更來更去大宛以西皆自恃遠尚驕恣未可詘以禮羈縻而使也漢使往既多其少從率進孰於天子言大宛有善馬在二師城匿不肯示漢使天子既好宛馬聞之甘心使壯士車令等持千金及金馬以請宛王二師城善馬宛國饒漢物相與謀曰漢去我遠而鹽水中數有敗出其北有胡寇出其南乏水草又且往往而絶邑乏食者多漢使數百人為輩來常乏食死者過半是安能致大軍乎且二師馬宛寶馬也遂不肯豫漢使漢使怒妄言椎金馬而去宛中貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人強弩射之即破宛矣天子以嘗使浞野侯攻樓蘭以七百騎先至虜其王以定漢等言為然而欲侯寵姬李氏乃以李廣利為將軍伐宛騫孫猛字子游有俊才元帝時為光祿大夫使胸奴給事中為石顯所譖自殺李廣利女弟李夫人有寵於上産昌邑哀王太初元年以廣利為二師將軍發屬國六千騎及郡國惡少年數萬人以往期至二師城取善馬故號二師將軍故浩侯王恢使道軍既西過鹽水當道小國各堅城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士財有數千皆飢罷攻郁成城郁成距之所殺傷甚衆二師將軍與左右計至郁成尚不能舉況至其王都乎引而還往來二歲至敦煌士不過什一二使使上書言道遠多乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復往天子聞之大怒使使遮玉門關曰軍有敢入斬之二師恐因留屯敦煌其夏漢亡浞野之兵二萬餘於胸奴公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使為外國笑乃案言伐宛尤不便者鄧光等赦囚徒扞寇盜發惡少年及邊騎歲餘而出敦煌六萬人負私從者不與牛十萬馬三萬匹驢橐駝以萬數齎糧兵弩甚設天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城益發戍甲卒十八萬酒泉張掖北置居延休屠以衛酒泉而發天下七科適及載糒給二師轉車人徒相連屬至敦煌而拜習馬者二人為執驅馬校尉備破宛擇取其善馬云於是二師後復行兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城二師欲攻郁成城恐留行而令宛益生詐乃先至宛決其水原移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王毋寶匿善馬殺漢使今殺王而出善馬漢兵宜解即不乃力戰而死未晚也宛貴人皆以為然共殺王其外城壞虜宛貴人勇將煎靡宛大恐走入中城相與謀曰漢所為攻宛以王毋寡持其頭遣人使二師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我我盡殺善馬康居之救又且至至我居內康居居外與漢軍戰孰計之何從是時康居候視漢兵尚盛不敢進二師聞宛城中新得漢人知穿井而其內食尚多計以為來誅首惡者毋寡毋寡頭已至如此不許則堅守而康居候漢兵罷來救宛破漢軍必矣軍吏皆以為然許宛之約宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王與盟而罷兵終不得入中城罷而引歸初二師起敦煌西為人多道上國不能食分為數軍從南北道校尉王申生故鴻臚壺充國等千餘人別至郁成城守不肯給食申生去大軍二百里負而輕之攻郁成急郁成窺知申生軍少晨用三千人攻殺申生等數人脫亡走二師二師令搜粟都尉上官桀往攻破郁成郁成降其王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縛守詣大將軍四人相謂郁成漢所毒今生將卒失大事欲殺莫適先擊上邽騎士趙弟拔劍擊斬郁成王桀等遂追及大將軍初二師後行天子使使告烏孫大發兵擊宛烏孫發二千騎往持兩端不肯前二師將軍之東諸所過小國聞宛破皆使其子弟從入貢獻見天子因為質焉軍還入玉門者萬餘人馬千餘匹後行非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者衆天子為萬里而伐不録其過乃下詔曰胸奴為害久矣今雖徙幕北與旁國謀共要絶大月氏使遮殺中郎將江故雁門守攘危須以西及大宛皆合約殺期門車令中郎將朝及身毒國使隔東西道二師將軍廣利征討厥罪伐勝大宛賴天之靈從泝河山涉流沙通西海山雪不積士大夫徑度獲王首虜珍怪之物畢陳於闕其封廣利為海西侯食邑八千戶又封斬郁成王者趙弟為新畤侯軍正趙始成功最多為光祿大夫上官桀敢深入為少府李哆有計謀為上黨太守軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望以適過行者皆黜其勞士卒賜直四萬錢伐宛再反凡四歲而得罷焉後十一歲征和三年二師復將七萬騎出五原擊胸奴度郅居水兵敗降胸奴為單于所殺語在胸奴傳贊曰禹本紀言河出昆侖昆侖高二千五百里餘日月所相避隱為光明也自張騫使大夏之後窮河原惡睹所謂昆侖者乎故言九州山川尚書近之矣至禹本紀山經所有放哉
