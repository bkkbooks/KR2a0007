body:
  text: 揚雄傳第五十七上揚雄字子雲蜀郡成都人也其先出自有周伯僑者以支庶初食采於晉之揚因氏焉不知伯僑周何別也揚在河汾之間周衰而揚氏或稱侯號曰揚侯會晉六卿爭權韓魏趙興而范中行知伯弊當是時逼揚侯揚侯逃於楚巫山因家焉楚漢之興也揚氏遡江上處巴江州而揚季官至廬江太守漢元鼎間避仇復遡江上處崏山之陽曰郫有田一廛有宅一區世世以農桑為業自季至雄五世而傳一子故雄亡它揚於蜀雄少而好學不為章句訓詁通而已博覽無所不見為人簡易佚蕩口吃不能劇談默而好深湛之思清靜亡為少耆欲不汲汲於富貴不戚戚於貧賤不修廉隅以徼名當世家産不過十金乏無儋石之儲晏如也自有大度非聖哲之書不好也非其意雖富貴不事也顧嘗好辭賦先是時蜀有司馬相如作賦甚弘麗溫雅雄心壯之每作賦常擬之以為式又怪屈原文過相如至不容作離騷自投江而死悲其文讀之未嘗不流涕也以為君子得時則大行不得時則龍蛇遇不遇命也何必湛身哉乃作書往往托離騷文而反之自崏山投諸江流以弔屈原名曰反離騷又旁離騷作重一篇名曰廣騷又旁惜誦以下至懷沙一卷名曰畔牢愁畔牢愁廣騷文多不載獨載反離騷其辭曰有周氏之蟬嫣兮或鼻祖於汾隅靈宗初諜伯僑兮流于末之揚侯淑周楚之豐烈兮超既離呼皇波因江潭而往記兮欽弔楚之湘纍惟天軌之不辟兮何純潔而離紛紛纍以其淟涊兮暗纍以其繽紛漢十世之陽朔兮招搖紀于周正正皇天之清則兮度后土之方貞圖纍承彼洪族兮又覽纍之昌辭帶鉤矩而佩衡兮履欃槍以為綦素初貯厥麗服兮何文肆而質䪥資娵娃之珍髢兮鬻九戎而索賴鳳皇翔於蓬渚兮豈駕鵝之能捷騁驊騮以曲囏兮驢騾連蹇而齊足枳棘之榛榛兮猿貁擬而不敢下靈修既信椒蘭之唼佞兮吾纍忽焉而不蚤睹襟芰茄之緑衣兮被夫容之朱裳芳酷烈而莫聞兮不如襞而幽之離房閨中容競淖約兮相態以麗佳知衆嫭之嫉妒兮何必揚纍之蛾眉懿神龍之淵潛竣慶雲而將舉亡春風之被離兮孰焉知龍之所處愍吾纍之衆芬兮揚燁燁之芳苓遭季夏之凝霜兮慶夭悴而喪榮橫江湘以南往兮云走乎彼蒼吾馳江潭之泛溢兮將折衷呼重華舒中情之煩或兮恐重華之不纍與陵陽侯之素波兮豈吾纍之獨見許精瓊靡與秋菊兮將以延夫天年臨汨羅而自隕兮恐日薄於西山解扶桑之總轡兮縱令之遂奔馳鸞皇騰而不屬兮豈獨飛廉與雲師卷薛芷與若蕙兮臨湘淵而投之棍申椒與菌桂兮赴江湖而漚之費椒稰以要神兮又勤索彼瓊茅違靈氛而不從兮反湛身於江皋纍既夫傅說兮奚不信而遂行徒恐鷤䳏之將鳴兮顧先百草為不芳初纍棄彼虙妃兮更思瑤臺之逸女抨雄鴆以作媒兮何百離而曾不一耦乘雲霓之旖柅兮望昆侖以樛流覽四荒而顧懷兮奚必云女彼高丘既亡鸞車之幽藹兮駕八龍之委蛇臨江瀕而掩涕兮何有九招與九歌夫聖哲之遭兮固時命之所有雖增欷以於邑兮吾恐靈修之不纍改昔仲尼之去魯兮婓婓遲遲而周邁終回復於舊都兮何必湘淵與濤瀨溷漁父之餔啜兮潔沐浴之振衣棄由聃之所珍兮跖彭咸之所遺孝成帝時客有薦雄文似相如者上方郊祠甘泉泰畤汾陰后土以求繼嗣召雄待詔承明之庭正月從上甘泉還奏甘泉賦以風其辭曰惟漢十世將郊上玄定泰畤雍神休尊明號同符三皇録功五帝恤胤錫羡拓迹開統於是乃命群僚歷吉日協靈辰星陳而天行詔招搖與泰陰兮伏鉤陳使當兵屬堪輿以壁壘兮梢夔魖而抶獝狂八神奔而警蹕兮振殷轔而軍裝蚩尤之倫帶干將而秉玉戚兮飛蒙茸而走陸梁齊總總撙撙其相膠葛兮猋駭雲訊奮以方攘駢羅列布鱗以雜沓兮柴虒參差魚頡而鳥䀪翕赫曶霍霧集蒙合兮半散照爛粲以成章於是乘輿乃登夫鳳皇兮翳華芝駟蒼螭兮六素虯蠖略蕤綏灕呼幓纚帥爾陰閉霅然陽開騰清霄而軼浮景兮夫何旟旐郅偈之旖柅也流星旄以電燭兮咸翠蓋而鸞旗敦萬騎於中營兮方玉車之千乘聲駍隱以陸離兮輕先疾雷而馺遺風陵高衍之嵱嵷兮超紆譎之清澄登椽欒而羾天門兮馳閭闔而入凌兢是時未轃夫甘泉也乃望通天之繹繹下陰潛以慘廩兮上洪紛而相錯直嶢嶢以造天兮厥高慶而不可呼疆度平原唐其壇曼兮列新雉於林薄攢并閭與茇䒷兮紛被麗其亡鄂崇丘陵之駊騀兮深溝嶔巖而為谷往往離宮般以相燭兮封巒石關施靡呼延屬於是大夏雲譎波詭摧嗺而成觀仰嬌首以高視兮目冥眴而亡見正瀏濫以弘惝兮指東西之漫漫徒回回以徨徨兮魂固眇眇而昏亂據軨軒而周流兮忽軮軋而亡垠翠玉樹之青蔥兮璧馬犀之瞵㻞金人仡仡其承鍾虡兮嵌巖巖其龍鱗揚光曜之燎燭兮乘景炎之炘炘配帝居之縣圃兮象泰一之威神洪臺掘其獨出兮㨖北極之嶟嶟列宿乃施於上榮兮日月才於柍桭雷鬱律而巖突兮電倏忽於牆藩鬼魅不能自還兮半長途而下顛歷倒景而絶飛梁兮浮蔑蠓而撇天左欃槍右玄冥兮前熛闕後應門陰西海與幽都兮涌醴汩以生川蛟龍連蜷於東崖兮白虎敦圉呼昆侖覽樛流於高光兮溶方皇於西清前殿崔巍兮和氏瓏玲炕浮柱之飛榱兮神莫莫而扶傾閌閬閬其寥廓兮似紫宮之崢嶸駢交錯而曼衍兮㟎𡽁隗呼其相嬰乘雲閣而上下兮紛蒙籠以掍成曳紅采之流離兮揚翠氣之冤延襲琁室與傾宮兮若登高妙遠肅呼臨淵回猋肆其碭駭兮翍桂椒鬱栘楊香芬茀以窮隆兮擊薄櫨而將榮薌呹肸以掍根兮聲駍隱而歷鍾排玉戶而揚金鋪兮發蘭惠與穹窮惟弸彋其拂汩兮稍暗暗而靚深陰陽清濁穆羽相和兮若夔牙之調琴般倕棄其剞劂兮王爾投其鉤繩雖方征僑與偓佺兮猶仿佛其若夢於是事變物化目駭耳回蓋天子穆然珍臺閒館琁題玉英蜵蜎蠖濩之中惟夫所以澄心清魂儲精垂思感動天地逆釐三神者乃搜逑索耦皋伊之徒冠倫魁能函甘棠之惠挾東征之意相與齊呼陽靈之宮靡薜荔而為席兮折瓊枝以為芳吸清雲之流瑕兮飲若木之露英集呼禮神之囿登乎頌祇之堂建光耀之長旓兮昭華覆之威威攀琁璣而下視兮行遊目呼三危陳衆車於東坑兮肆玉釱而下馳漂龍淵而還有垠兮窺地底而上回風傱傱而扶轄兮鸞鳳紛其御蕤梁弱水之濎濴兮躡不周之逶蛇想西王母欣然而上壽兮屏玉女而卻虙妃玉女無所眺其清盧兮虙妃曾不得施其蛾眉方攬道德之精剛兮侔神明與之為資於是欽祡宗祈燎熏皇天招繇泰一舉洪頤樹靈旗樵蒸焜上配藜四施東燭倉海西耀流沙北爌幽都南煬丹崖玄瓚觩䚧秬鬯泔淡肸嚮豐融懿懿芬芬炎感黃龍兮熛訛碩麟選巫咸兮叫帝閽開天庭兮延群神儐暗藹兮降清壇瑞穰穰兮委如山於是事畢功弘回車而歸度三巒兮偈棠梨天閫決兮地垠開八荒協兮萬國諧登長平兮雷鼓磕天聲起兮勇士厲雲飛揚兮雨滂沛于胥德兮麗萬世亂曰崇崇圜丘隆隱天兮登降峛崺單埢垣兮增宮嵾差駢嵯峨兮岒巆嶙峋洞亡崖兮上天之縡杳旭卉兮聖皇穆穆信厥對兮徠祗郊禋神所依兮俳佪招搖靈遲遲兮輝光眩耀隆厥福兮子子孫孫長亡極兮甘泉本因秦離宮既奢泰而武帝復增通天高光迎風宮外近則洪崖旁皇儲胥弩阹遠則石關封巒枝鵲露寒棠梨師得遊觀屈奇瑰瑋非木摩而不雕牆塗而不畫周宣所考般庚所遷夏卑宮室唐虞棌椽三等之制也且為其已久矣非成帝所造欲諫則非時欲默則不能已故遂推而隆之乃上比於帝室紫宮若曰此非人力之所為黨鬼神可也又是時趙昭儀方大幸每上甘泉常法從在屬車間豹尾中故雄聊盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女卻虙妃以微戒齊肅之事賦成奏之天子異焉其三月將祭后土上乃帥群臣橫大河湊汾陰既祭行遊介山回安邑顧龍門覽鹽池登歷觀陟西嶽以望八荒迹殷周之虛眇然以思唐虞之風雄以為臨川羡魚不如歸而結罔還上河東賦以勸其辭曰伊年暮春將瘞后土禮靈祇謁汾陰于東郊因茲以勒崇垂鴻發祥隤祉欽若神明者盛哉鑠乎越不可載已於是命群臣齊法服整靈輿乃撫翠鳳之駕六先景之乘掉奔星之流旃彏天狼之威弧張耀日之玄旄揚左纛被雲梢奮電鞭驂電輜鳴洪鍾建五旗羲和司日顏倫奉輿風發飆拂神騰鬼趡千乘霆亂萬騎屈橋嘻嘻旭旭天地稠㟼簸丘跳巒涌渭濯涇秦神下讋跖魂負沴河靈矍踢爪華蹈衰遂臻陰宮穆穆肅肅蹲蹲如也靈祇既鄉五位時敘絪縕玄黃將紹厥後於是靈輿安步周流容與以覽呼介山嗟文公而愍推兮勤大禹於龍門灑沈菑於豁瀆兮播九河於東瀕登歷觀而遙望兮聊浮游以經營樂往昔之遺風兮喜虞氏之所耕瞰帝唐之嵩高兮賑隆周之大寧汩低回而不能去兮行睨陔下與彭城濊南巢之坎坷兮易豳岐之夷平乘翠龍而超河兮陟西嶽之嶢崝雲霏霏而來迎兮澤滲灕而下降鬱蕭條其幽藹兮滃泛沛以豐隆叱風伯於南北兮呵雨師於西東參天地而獨立兮廓蕩蕩其亡雙遵逝呼歸來以函夏之大漢兮彼曾何足與比功建乾坤之貞兆兮將悉總之以群龍麗鉤芒與驂蓐收兮服玄冥及祝融敦衆神使式道兮奮六經以攄頌隃於穆之緝熙兮過清廟之雍雍軼五帝之遐迹兮躡三皇之高蹤既發軔於平盈兮誰謂路遠而不能從其十二月羽獵雄從以為昔在二帝三王宮館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賓客充庖廚而已不奪百姓膏腴穀土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳳皇巢其樹黃龍游其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和屮木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為大裕民之與奪民也武帝廣開上林南至宜春鼎胡御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭而東周袤數百里穿昆明池象滇河營建章鳳闕神明馺娑漸臺泰液象海水周流方丈瀛洲蓬萊游觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵田車戎馬器械儲偫禁禦所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風其辭曰或稱戲農豈或帝王之彌文哉論者云否各亦並時而得宜奚必同條而共貫則泰山之封烏得七十而有二儀是以創業垂統者俱不見其爽遐邇五三孰知其是非遂作頌曰麗哉神聖處於玄宮富既與地呼侔訾貴正與天呼比崇齊桓曾不足使扶轂楚嚴未足以為驂乘狹三王之厄薜嶠高舉而大興歷五帝之寥廓涉三皇之登閎建道德以為師友仁義與為朋於是玄冬季月天地隆烈萬物權輿於內徂落於外帝將惟田于靈之囿開北垠受不周之制以終始顓頊玄冥之統乃詔虞人典澤東延昆鄰西馳闛闔儲積共偫戍卒夾道斬叢棘夷野草禦自汧渭經營酆鎬章皇周流出入日月天與地杳爾乃虎路三嵕以為司馬圍經百里為殿門外則正南極海邪界虞淵鴻濛沆茫碣以崇山營合圍會然后先置呼白楊之南昆明靈沼之東賁育之倫蒙盾負羽杖鏌邪而羅者以萬計其餘荷垂天之畢張竟野之罘靡日月之朱竿曳彗星之飛旗青雲為紛紅霓為繯屬之呼昆侖之虛渙若天星之羅浩如濤水之波淫淫與與前後要遮欃槍為闉明月為候熒惑司命天弧發射鮮扁陸離駢衍佖路徽車輕武鴻絧緁獵殷殷軫軫被陵緣阪窮冥極遠者相與迾呼高原之上羽騎營營昈分殊事繽紛往來轠轤不絶若光若滅者布呼青林之下於是天子乃以陽鼂始出呼玄宮撞鴻鍾建九旒六白虎載靈輿蚩尤並轂蒙公先驅立歷天之旗曳捎星之旃辟歷列缺吐火施鞭萃傱允溶淋離廓落戲八鎮而開關飛廉雲師吸嚊潚率鱗羅布列攢以龍翰秋秋蹌蹌入西園切神光望平樂徑竹林蹂惠圃踐蘭唐舉烽烈火轡者施披方馳千駟校騎萬師虓虎之陳從橫膠輵猋泣雷厲驞駍駖磕洶洶旭旭天動地吸羡漫半散蕭條數千萬里外若夫壯士慷慨殊鄉別趣東西南北騁耆奔欲拖蒼豨跋犀犛蹶浮麋斫巨狿搏玄猿騰空虛歫連卷踔夭蟜娭澗門莫莫紛紛山谷為之風猋林叢為之生塵及至獲夷之徒蹶松柏掌疾梨獵蒙蘢轔輕飛履般首帶修蛇鉤赤豹摼象犀跇巒坑超唐陂車騎雲會登降暗藹泰華為旒熊耳為綴木仆山還漫若天外儲與呼大溥聊浪呼宇內於是天清日晏逢蒙列眥羿氏控弦皇車幽輵光純天地望舒彌轡翼乎徐至於上蘭移圍徙陳浸淫蹴部曲隊堅重各按行伍璧壘天旋神抶電擊逢之則碎近之則破鳥不及飛獸不得過軍驚師駭刮野掃地及至罕車飛揚武騎聿皇蹈飛豹絹嘄陽追天寶出一方應駍聲擊流光野盡山窮囊括其雌雄沈沈容容遙噱呼紘中三軍芒然窮冘閼與亶觀夫票禽之紲隃犀兕之抵觸熊罷之拿攫虎豹之凌遽徒角搶題注蹙竦讋怖魂亡魄失觸輻關脰妄發期中進退履獲創淫輪夷丘纍陵聚於是禽殫中衰相與集於靖冥之館以臨珍池灌以岐梁溢以江河東瞰目盡西暢亡崖隨珠和氏焯爍其陂玉石嶜崟眩耀青熒漢女水潛怪物暗冥不可殫形玄鸞孔雀翡翠垂榮王睢關關鴻鴈嚶嚶群娭呼其中噍噍昆鳴鳧鷖振鷺上下砰磕聲若雷霆乃使文身之技水格鱗蟲凌堅冰犯嚴淵探巖排崎薄索蛟螭蹈猵獺據黿鼉抾靈蠵入洞穴出蒼梧乘巨鱗騎京魚浮彭蠡目有虞方椎夜光之流離剖明月之珠胎鞭洛水之虙妃餉屈原與彭胥於茲呼鴻生巨儒俄軒冕雜衣裳修唐典匡雅頌揖讓於前昭光振耀蠁曶如神仁聲惠於北狄武義動於南鄰是以旃裘之王胡貉之長移珍來享抗手稱臣前入圍口後陳盧山群公常伯楊朱墨翟之徒喟然稱曰崇哉乎德雖有唐虞大夏成周之隆何以侈茲太古之覲東嶽禪梁基舍此世也其誰與哉上猶謙讓而未俞也方將上獵三靈之流下決醴泉之滋發黃龍之穴窺鳳皇之巢臨麒麟之囿幸神雀之林奢雲夢侈孟諸非章華是靈臺罕徂離宮而輟觀游土事不飾木功不雕承民乎農桑勸之以弗逮儕男女使莫違恐貧窮者不遍被洋溢之饒開禁苑散公儲創道德之囿弘仁惠之虞馳弋乎神明之囿覽觀乎群臣之有亡放雉菟收罝罘麋鹿芻蕘與百姓共之蓋所以臻茲也於是醇洪鬯之德豐茂世之規加勞三皇勗勤五帝不亦至乎乃祇莊雍穆之徒立君臣之節崇賢聖之業未皇苑囿之麗游獵之靡也因回軫還衡背阿房反未央
