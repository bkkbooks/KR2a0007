body:
  text: 景帝紀第五孝景皇帝文帝太子也母曰竇皇后後七年六月文帝崩丁未太子即皇帝位尊皇太后薄氏曰太皇太后皇后曰皇太后九月有星孛于西方元年冬十月詔曰蓋聞古者祖有功而宗有德制禮樂各有由歌者所以發德也舞者所以明功也高廟酎奏武德文始五行之舞孝惠廟酎奏文始五行之舞孝文皇帝臨天下通關梁不異遠方除誹謗去肉刑賞賜長老收恤孤獨以遂群生減耆欲不受獻罪人不帑不誅亡罪不私其利也除宮刑出美人重絶人之世也朕既不敏弗能勝識此皆上世之所不及而孝文皇帝親行之德厚侔天地利澤施四海靡不獲福明象乎日月而廟樂不稱朕甚懼焉其為孝文皇帝廟為昭德之舞以明休德然后祖宗之功德施于萬世永永無窮朕甚嘉之其與丞相列侯中二千石禮官具禮儀奏丞相臣嘉等奏曰陛下永思孝道立昭德之舞以明孝文皇帝之盛德皆臣嘉等愚所不及臣謹議世功莫大於高皇帝德莫盛於孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟諸侯王列侯使者侍祠天子所獻祖宗之廟請宣布天下制曰可春正月詔曰間者歲比不登民多乏食夭絶天年朕甚痛之郡國或磽狹無所農桑毄畜或地饒廣薦草莽水泉利而不得徙其議民欲徙寬大地者聽之夏四月赦天下賜民爵一級遣御史大夫青翟至代下與胸奴和親五月令田半租秋七月詔曰吏受所監臨以飲食免重受財物賤買貴賣論輕廷尉與丞相更議著令廷尉信謹與丞相議曰吏及諸有秩受其官屬所監所治所行所將其與飲食計償費勿論它物若買故賤賣故貴皆坐臧為盜沒入臧縣官吏遷徙免罷受其故官屬所將監治送財物奪爵為士伍免之無爵罰金二斤令沒入所受有能捕告畀其所受臧二年冬十二月有星孛于西南令天下男子年二十始傅春三月立皇子德為河間王閼為臨江王餘為淮陽王非為汝南王彭祖為廣川王發為長沙王夏四月壬午太皇太后崩六月丞相嘉薨封故相國蕭何孫係為列侯秋與胸奴和親三年冬十二月詔曰襄平侯嘉子恢說不孝謀反欲以殺嘉大逆無道其赦嘉為襄平侯及妻子當坐者復故爵論恢說及妻子如法春正月淮陽王宮正殿災吳王濞膠西王卬楚王戊趙王遂濟南王辟光菑川王賢膠東王雄渠皆舉兵反大赦天下遣太尉亞夫大將軍竇嬰將兵擊之斬御史大夫朝錯以謝七國二月壬子晦日有食之諸將破七國斬首十餘萬級追斬吳王濞於丹徒膠西王卬楚王戊趙王遂濟南王辟光菑川王賢膠東王雄渠皆自殺夏六月詔曰乃者吳王濞等為逆起兵相脅詿誤吏民吏民不得已今濞等已滅吏民當坐濞等及逋逃亡軍者皆赦之楚元王子藝等與濞等為逆朕不忍加法除其籍毋令汙宗室立平陵侯劉禮為楚王續元王後立皇子端為膠西王勝為中山王賜民爵一級四年春復置諸關用傳出入夏四月己巳立皇子榮為皇太子徹為膠東王六月赦天下賜民爵一級秋七月臨江王閼薨十月戊戌晦日有蝕之五年春正月作陽陵邑夏募民徙陽陵賜錢二十萬遣公主嫁胸奴單于六年冬十二月雷霖雨秋九月皇后薄氏廢七年冬十一月庚寅晦日有蝕之春正月廢皇太子榮為臨江王二月罷太尉官夏四月乙巳立皇后王氏丁巳立膠東王徹為皇太子賜民為父後者爵一級中元年夏四月赦天下賜民爵一級封故御史大夫周苛周昌孫子為列侯二年春二月令諸侯王薨列侯初封及之國大鴻臚奏諡誄策列侯薨及諸侯太傅初除之官大行奏諡誄策王薨遣光祿大夫弔襚祠賵視喪事因立嗣子列侯薨遣大中大夫弔祠視喪事因立嗣其葬國得發民挽喪穿復土治墳無過三百人畢事胸奴入燕改磔曰棄市勿復磔三月臨江王榮坐侵太宗廟地徵詣中尉自殺夏四月有星孛于西北立皇子越為廣川王寄為膠東王秋七月更郡守為太守郡尉為都尉九月封故楚趙傅相內史前死事者四人子皆為列侯甲戌晦日有蝕之三年冬十一月罷諸侯御史大夫官春正月皇太后崩夏旱禁酤酒秋九月蝗有星孛于西北戊戌晦日有蝕之立皇子乘為清河王四年春三月起德陽宮御史大夫綰奏禁馬高五尺九寸以上齒未平不得出關夏蝗秋赦徒作陽陵者死罪欲腐者許之十月戊午日有蝕之五年夏立皇子舜為常山王六月赦天下賜民爵一級秋八月己酉未央宮東闕災更名諸侯丞相為相九月詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周以苛為察以刻為明令亡罪者失職朕甚憐之有罪者不伏罪姦法為暴甚亡謂也諸獄疑若雖文致於法而於人心不厭者輒讞之六年冬十月行幸雍郊五畤十二月改諸官名定鑄錢僞黃金棄市律春三月雨雪夏四月梁王薨分梁為五國立孝王子五人皆為王五月詔曰夫吏者民之師也車駕衣服宜稱吏六百石以上皆長吏也亡度者或不吏服出入閭里與民亡異令長吏二千石車朱兩轓千石至六百石朱左轓車騎從者不稱其官衣服下吏出入閭巷亡吏體者二千石上其官屬三輔舉不如法令者皆上丞相御史請之先是吏多軍功車服尚輕故為設禁又惟酷吏奉憲失中乃詔有司減笞法定箠令語在刑法志六月胸奴入鴈門至武泉入上郡取苑馬吏卒戰死者二千人秋七月辛亥晦日有蝕之後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉有令讞而後不當讞者不為失欲令治獄者務先寬三月赦天下賜民爵一級中二千石諸侯相爵右庶長夏大酺五日民得酤酒五月地震秋七月乙巳晦日有蝕之條侯周亞夫下獄死二年冬十月省徹侯之國春胸奴入鴈門太守馮敬與戰死發車騎材官屯春以歲不登禁內郡食馬粟沒入之夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則飢之本也女紅害則寒之原也夫飢寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減太官省繇賦欲天下務農蠶素有畜積以備災害彊毋攘弱衆毋暴寡老耆以壽終幼孤得遂長今歲或不登民食頗寡其咎安在或詐僞為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也奸法與盜盜甚無謂也其令二千石各修其職不事官職耗亂者丞相以聞請其罪布告天下使明知朕意五月詔曰人不患其不知患其為詐也不患其不勇患其為暴也不患其不富患其亡厭也其唯廉士寡欲易足今訾算十以上乃得宦廉士算不必衆有市籍不得宦無訾又不得宦朕甚愍之訾算四得宦亡令廉士久失職貪夫長利秋大旱三年春正月詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始間歲或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸采黃金珠玉者坐臧為盜二千石聽者與同罪皇太子冠賜民為父後者爵一級甲子帝崩于未央宮遺詔賜諸侯王列侯馬二駟吏二千石黃金二斤吏民戶百錢出宮人歸其家復終身二月癸酉葬陽陵贊曰孔子稱斯民三代之所以直道而行也信哉周秦之敝罔密文峻而姦軌不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間至於移風易俗黎民醇厚周云成康漢言文景美矣
