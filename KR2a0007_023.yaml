body:
  text: 陳勝項籍傳第一陳勝字涉陽城人吳廣字叔陽夏人也勝少時嘗與人傭耕輟耕之壟上悵然甚久曰苟富貴無相忘傭者笑而應曰若為傭耕何富貴也勝太息曰嗟乎燕雀安知鴻鵠之志哉秦二世元年秋七月發閭左戍漁陽九百人勝廣皆為屯長行至蘄大澤鄉會天大雨道不通度已失期失期法斬勝廣乃謀曰今亡亦死舉大計亦死等死死國可乎勝曰天下苦秦久矣吾聞二世少子不當立當立者乃公子扶蘇扶蘇以數諫故不得立上使外將兵今或聞無罪二世殺之百姓多聞其賢未知其死項燕為楚將數有功愛士卒楚人憐之或以為在今誠以吾衆為天下倡宜多應者廣以為然乃行卜卜者知其指意曰足下事皆成有功然足下卜之鬼乎勝廣喜念鬼曰此教我先威衆耳乃丹書帛曰陳勝王置人所罾魚腹中卒買魚亨食得書已怪之矣又聞令廣之次所旁叢祠中夜構火狐鳴呼曰大楚興陳勝王卒皆夜驚恐旦日卒中往往指目勝廣勝廣素愛人士卒多為用將尉醉廣故數言欲亡忿尉令辱之以激怒其衆尉果笞廣尉劍挺廣起奪而殺尉勝佐之并殺兩尉召令徒屬曰公等遇雨皆已失期當斬藉弟令毋斬而戍死者固什六七且壯士不死則已死則舉大名耳侯王將相寧有種乎徒屬皆曰敬受令乃詐稱公子扶蘇項燕從民望也袒右稱大楚為壇而盟祭以尉首勝自立為將軍廣為都尉攻大澤鄉拔之收兵而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東攻銍酇苦柘譙皆下之行收兵比至陳兵車六七百乘騎千餘卒數萬人攻陳陳守令皆不在獨守丞與戰譙門中不勝守丞死乃入據陳數日號召三老豪桀會計事皆曰將軍身被堅執鋭伐無道誅暴秦復立楚之社稷功宜為王勝乃立為王號張楚於是諸郡縣苦秦吏暴皆殺其長吏將以應勝乃以廣為假王監諸將以西擊滎陽令陳人武臣張耳陳餘徇趙汝陰人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數葛嬰至東城立襄彊為楚王後聞勝已立因殺襄彊還報至陳勝殺嬰令魏人周市北徇魏地廣圍滎陽李由為三川守守滎陽廣不能下勝徵國之豪桀與計以上蔡人房君蔡賜為上柱國周文陳賢人也嘗為項燕軍視日事春申君自言習兵勝與之將軍印西擊秦行收兵至關車千乘卒十萬至戲軍焉秦令少府章邯免驪山徒人奴産子悉發以擊楚軍大敗之周文走出關止屯曹陽二月餘章邯追敗之復走黽池十餘日章邯擊大破之周文自剄軍遂不戰武臣至邯戰自立為趙王陳餘為大將軍張耳召騷為左右丞相勝怒捕擊武臣等家室欲誅之柱國曰秦未亡而誅趙王將相家屬此生一秦不如因立之勝乃遣使者賀趙而徒繫武臣等家屬宮中而封張耳子敖為成都君趣趙兵亟入關趙王將相相與謀曰王王趙非楚意也楚已誅秦必加兵於趙計莫如毋西兵使使北徇燕地以自廣趙南據大河北有燕代楚雖勝秦不敢制趙若不勝秦必重趙趙承秦楚之敝可以得志於天下趙王以為然因不西兵而遣故上谷卒史韓廣將兵北徇燕燕地貴人豪桀謂韓廣曰楚趙皆已立王燕雖小亦萬乘之國也願將軍立為王韓廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之強不敢害趙王將相之家今趙獨安敢害將軍家乎韓廣以為然乃自立為燕王居數月趙奉燕王母家屬歸之是時諸將徇地者不可勝數周市北至狄狄人田儋殺狄令自立為齊王反擊周市市軍散還至魏地立魏後故寧陵君咎為魏王咎在勝所不得之魏魏地已定欲立周市為王市不肯使者五反勝乃立寧陵君為魏王遣之國周市為相將軍田臧等相與謀曰周章軍已破秦兵且至我守滎陽城不能下秦軍至必大敗不如少遺兵足以守滎陽悉精兵迎秦軍今假王驕不知兵權不可與計非誅之事恐敗因相與矯陳王令以誅吳廣獻其首於勝勝使賜田臧楚令尹印使為上將田臧乃使諸將李歸等守滎陽城自以精兵西迎秦軍於敖倉與戰田臧死軍破章邯進擊李歸等滎陽下破之李歸死陽城人鄧說將兵居郯章邯別將擊破之鄧說走陳銍人五逢將兵居許章邯擊破之五逢亦走陳勝誅鄧說勝初立時淩人秦嘉銍人董緤符離人朱雞石取慮人鄭布徐人丁疾等皆特起將兵圍東海守於郯勝聞乃使武平君畔為將軍監郯下軍秦嘉自立為大司馬惡屬人告軍吏曰武平君年少不知兵事勿聽因矯以王命殺武平君畔章邯已破五逢擊陳柱國房君死章邯又進擊陳西張賀軍勝出臨戰軍破張賀死臘月勝之汝陰還至下城父其御莊賈殺勝以降秦葬碭諡曰隱王勝故涓人將軍呂臣為蒼頭軍起新陽攻陳下之殺莊賈復以陳為楚初勝令銍人宋留將兵定南陽入武關留已徇南陽聞勝死南陽復為秦宋留不能入武關乃東至新蔡遇秦軍宋留以軍降秦秦傳留至咸陽車裂留以徇秦嘉等聞勝軍敗乃立景駒為楚王引兵之方與欲擊秦軍濟陰下使公孫慶使齊王欲與并力俱進齊王曰陳王戰敗未知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令於天下田儋殺公孫慶秦左右校復攻陳下之呂將軍走徼兵復聚與番盜英布相遇攻擊秦左右校破之青波復以陳為楚會項梁立懷王孫心為楚王陳勝王凡六月初為王其故人嘗與傭耕者聞之乃之陳叩宮門曰吾欲見涉宮門令欲縛之自辨數乃置不肯為通勝出遮道而呼涉乃召見載與歸入宮見殿屋帷帳客曰夥涉之為王沈沈者楚人謂多為夥故天下傳之夥涉為王由陳涉始客出入愈益發舒言勝故情或言客愚無知專妄言輕威勝斬之諸故人皆自引去由是無親勝者以朱防為中正胡武為司過主司群臣諸將徇地至令之不是者繫而罪之以苛察為忠其所不善者不下吏輒自治勝信用之諸將以故不親附此其所以敗也勝雖已死其所置遣侯王將相竟亡秦高祖時為勝置守冢于碭至今血食王莽敗乃絶項籍守羽下相人也初起年二十四其季父梁梁父即楚名將項燕者也家世楚將封於項故姓項氏籍少時學書不成去學劍又不成去梁怒之籍曰書足記姓名而已劍一人敵不足學學萬人敵耳於是梁奇其意乃教以兵法籍大喜略知其意又不肯竟梁嘗有櫟陽逮請蘄獄掾曹咎書抵櫟陽獄史司馬欣以故事皆已梁嘗殺人與籍避仇吳中吳中賢士大夫皆出梁下每有大繇役及喪梁常主辦陰以兵法部勒賓客子弟以知其能秦始皇帝東遊會稽渡浙江梁與籍觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此奇籍籍長八尺二寸力扛鼎才氣過人吳中子弟皆憚籍秦二世元年陳勝起九月會稽假守通素賢梁乃召與計事梁曰方今江西皆反秦此亦天亡秦時也先發制人後發制於人守歎曰聞夫子楚將世家唯足下耳梁曰吳有奇士桓楚亡在澤中人莫知其處獨籍知之梁乃戒籍持劍居外待梁復入與守語曰請召籍使受令召桓楚籍入梁眴籍曰可行矣籍遂拔劍擊斬守梁持守頭佩其印綬門下驚擾籍所擊殺數十百人府中皆讋伏莫敢復起梁乃召故人所知豪吏諭以所為遂舉吳中兵使人收下縣得精兵八千人部署豪桀為校尉候司馬有一人不得官自言梁曰某時某喪使公主某事不能辦以故不任公衆乃皆服梁為會稽將籍為裨將徇下縣秦二年廣陵人召平為陳勝徇廣陵未下聞陳勝敗走秦將章邯且至乃渡江矯陳王令拜梁為楚上柱國曰江東已定急引兵西擊秦梁乃以八千人渡江而西聞陳嬰已下東陽使使欲與連和俱西陳嬰者故東陽令吏居縣素信為長者東陽少年殺其令相聚數千人欲立長無適用乃請陳嬰嬰謝不能遂強立之縣中從之者得二萬人欲立嬰為王異軍蒼頭特起嬰母謂嬰曰自吾為乃家婦聞先故未曾貴今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰乃不敢為王謂其軍吏曰項氏世世將家有名於楚今欲舉大事將非其人不可我倚名族亡秦必矣其衆從之乃以其兵屬梁梁渡淮英布蒲將軍亦以其兵屬焉凡六七萬人軍下邳是時秦嘉已立景駒為楚王軍彭城東欲以距梁梁謂軍吏曰陳王首事戰不利未聞所在今秦嘉背陳王立景駒大逆亡道乃引兵擊秦嘉嘉軍敗走追至胡陵嘉還戰一日嘉死軍降景駒走死梁地梁已并秦嘉軍軍胡陵將引而西章邯至栗梁使別將朱雞石餘樊君與戰餘樊君死朱雞石敗亡走胡陵梁乃引兵入薛誅朱雞石梁前使羽別攻襄城襄城堅守不下已拔皆坑之還報梁聞陳王定死召諸別將會薛計事時沛公亦從沛往居鄛人范增年七十素好奇計往說梁曰陳勝敗固當夫秦滅六國楚最亡罪自懷王入秦不反楚人憐之至今故南公稱曰楚雖三戶亡秦必楚今陳勝首事不立楚後其勢不長今君起江東楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也於是梁乃求楚懷王孫心在民間為人牧羊立以為楚懷王從民望也陳嬰為上柱國封五縣與懷王都盱台梁自號武信君引兵攻亢父初章邯既殺齊王田儋於臨菑田假復自立為齊王儋弟榮走保東阿章邯追圍之梁引兵救東阿大破秦軍東阿田榮即引兵歸逐王假假亡走楚相田角亡走趙角弟閒故將居趙不敢歸田榮立儋子巿為齊王梁已破東阿下軍遂追秦軍數使使趣齊兵俱西榮曰楚殺田假趙殺田角田閒乃發兵梁曰田假與國之王窮來歸我不忍殺趙亦不殺角閒以市於齊齊遂不肯發兵助楚梁使羽與沛公別攻城陽屠之西破秦軍濮陽東秦兵收入濮陽沛公羽攻定陶定陶未下去西略地至雍丘大破秦軍斬李由還攻外黃外黃未下梁起東阿比至定陶再破秦軍羽等又斬李由益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今少惰矣秦兵日益臣為君畏之梁不聽乃使宋義於齊道遇齊使者高陵君顯曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行則及禍秦果悉起兵益章邯夜銜枚擊楚大破之定陶梁死沛公與羽去外黃攻陳留陳留堅守不下沛公羽相與謀曰今梁軍敗士卒恐乃與呂臣俱引兵而東呂臣軍彭城東羽軍彭城西沛公軍碭章邯已破梁軍則以為楚地兵不足憂乃渡河北擊趙大破之當此之時趙歇為王陳餘為將張耳為相走入巨鹿城秦將王離涉閒圍巨鹿章邯軍其南築甬道而輸之粟陳餘將卒數萬人軍巨鹿北所謂河北軍也宋義所遇齊使者高陵君顯見楚懷王曰宋義論武信君必敗數日果敗軍未戰先見敗徵可謂知兵矣王召宋義與計事而說之因以為上將軍羽為魯公為次將范增為末將諸別將皆屬號卿子冠軍北救趙至安陽留不進秦三年羽謂宋義曰今秦軍圍巨鹿疾引兵渡河楚擊其外趙應其內破秦軍必矣宋義曰不然夫搏牛之虻不可以破蝨今秦攻趙戰勝則兵罷我承其敝不勝則我引兵鼓行而西必舉秦矣故不如先鬭秦趙夫擊輕鋭我不如公坐運籌策公不如我因下令軍中曰猛如虎佷如羊貪如狼強不可令者皆斬遣其子襄相齊身送之無鹽飲酒高會天寒大雨士卒凍飢羽曰將勠力而攻秦久留不行今歲飢民貧卒食半菽軍無見糧乃飲酒高會不引兵渡河因趙食與并力擊秦乃曰承其敝夫以秦之強攻新造之趙其勢必舉趙趙舉秦強何敝之承且國兵新破王坐不安席掃境內而屬將軍國家安危在此一舉今不恤士卒而徇私非社稷之臣也羽晨朝上將軍宋義即其帳中斬義頭出令軍中曰宋義與齊謀反楚楚王陰令籍誅之諸將讋服莫敢枝梧皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍使人追宋義子及之齊殺之使桓楚報命於王王因使使立羽為上將軍羽已殺卿子冠軍威震楚國名聞諸侯乃遣當陽君蒲將軍將卒二萬人渡河救巨鹿戰少利陳餘復請兵羽乃悉引兵渡河已渡皆湛船破釜甑燒廬舍持三日糧視士必死無還心於是至則圍王離與秦軍遇九戰絶甬道大破之殺蘇角虜王離涉閒不降自燒殺當是時楚兵冠諸侯諸侯軍救巨鹿者十餘壁莫敢縱兵及楚擊秦諸侯皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍人人惴恐於是楚已破秦軍羽見諸侯將入轅門膝行而前莫敢仰視羽繇是始為諸侯上將軍兵皆屬焉章邯軍棘原羽軍漳南相持未戰秦軍數卻二世使人讓章邯章邯恐使長史欣請事至咸陽留司馬門三日趙高不見有不信之心長史欣恐還走不敢出故道趙高果使人追之不及欣至軍報曰事亡可為者相國趙高顓國主斷今戰而勝高嫉吾功不勝不免於死願將軍熟計之陳餘亦遺章邯書曰白起為秦將南并鄢郢北坑馬服攻城略地不可勝計而卒賜死蒙恬為秦將北逐戎人開榆中地數千里竟斬陽周何者功多秦不能封因以法誅之今將軍為秦將三歲矣所亡失已十萬數而諸侯並起茲益多彼趙高素諛日久今事急亦恐二世誅之故欲以法誅將軍以塞責使人更代以脫其禍將軍居外久多內隙有功亦誅亡功亦誅且天之亡秦無愚智皆知之今將軍內不能直諫外為亡國將孤立而欲長存豈不哀哉將軍何不還兵與諸侯為從南面稱孤孰與身伏斧質妻子為戮乎章邯狐疑陰使候始成使羽欲約約未成羽使蒲將軍引兵渡三戶軍漳南與秦戰再破之羽悉引兵擊秦軍汙水上大破之邯使使見羽欲約羽召軍吏謀曰糧少欲聽其約軍吏皆曰善羽乃與盟洹水南殷虛上已盟章邯見羽流涕為言趙高羽乃立章邯為雍王置軍中使長史欣為上將將秦軍行前漢元年羽將諸侯兵三十餘萬行略地至河南遂西到新安異時諸侯吏卒徭役屯戍過秦中秦中遇之多亡狀及秦軍降諸侯諸侯吏卒乘勝奴虜使之輕折辱秦吏卒吏卒多竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子諸將微聞其計以告羽羽乃召英布蒲將軍計曰秦吏卒尚衆其心不服至關不聽事必危不如擊之獨與章邯長史欣都尉翳入秦於是夜擊坑秦軍二十餘萬人至函谷關有兵守不得入聞沛公已屠咸陽羽大怒使當陽君擊關羽遂入至戲西鴻門聞沛公欲王關中獨有秦府庫珍寶亞父范增亦大怒勸羽擊沛公饗士旦日合戰羽季父項伯素善張良良時從沛公項伯夜以語良良與俱見沛公因伯自解於羽明日沛公從百餘騎至鴻門謝羽自陳封秦府庫還軍霸上以待大王閉關以備他盜不敢背德羽意既解范增欲害沛公賴張良樊噲得免語在高紀後數日羽乃屠咸陽殺秦降王子嬰燒其宮室火三月不滅收其寶貨略婦女而東秦民失望於是韓生說羽曰關中阻山帶河四塞之地肥饒可都以伯羽見秦宮室皆已燒殘又懷思東歸曰富貴不歸故鄉如衣錦夜行韓生曰人謂楚人沐猴而冠果然羽聞之斬韓生初懷王與諸將約先入關者王其地羽既背約使人致命於懷王懷王曰如約羽乃曰懷王者吾家武信君所立耳非有功伐何以得顓主約天下初發難假立諸侯後以伐秦然身被堅執鋭首事暴露於野三年滅秦定天下者皆將相諸君與籍力也懷王亡功固當分其地王之諸將皆曰善羽乃陽尊懷王為義帝曰古之王者地方千里必居上游徙之長沙都郴乃分天下以王諸侯羽與范增疑沛公業已講解又惡背約恐諸侯叛之陰謀曰巴蜀道險秦之遷民皆居之乃曰巴蜀亦關中地故立沛公為漢王王巴蜀漢中而參分關中王秦降將以距塞漢道乃立章邯為雍王王咸陽以西長史司馬欣故櫟陽獄吏嘗有德於梁都尉董翳本勸章邯降故立欣為塞王王咸陽以東至河立翳為翟王王上郡徙魏王豹為西魏王王河東瑕丘公申陽者張耳嬖臣也先下河南迎楚河上立陽為河南王趙將司馬卬定河內數有功立卬為殷王王河內徙趙王歇王代趙相張耳素賢又從入關立為常山王王趙地當陽君英布為楚將常冠軍立布為九江王番君吳芮帥百粵佐諸侯從入關立芮為衡山王義帝柱國共敖將兵擊南郡功多因立為臨江王徙燕王韓廣為遼東王燕將臧荼從楚救趙因從入關立荼為燕王徙齊王田巿為膠東王齊將田都從共救趙入關立都為齊王故秦所滅齊王建孫田安羽方渡河救趙安下濟北數城引兵降羽立安為濟北王田榮者背梁不肯助楚擊秦以故不得封陳餘棄將印去不從入關然素聞其賢有功於趙聞其在南皮故因環封之三縣番君將梅鋗功多故封十萬戶侯羽自立為西楚伯王王梁楚地九郡都彭城諸侯各就國田榮聞羽徙齊王巿膠東而立田都為齊王大怒不肯遣巿之膠東因以齊反迎擊都都走楚巿畏羽乃亡之膠東就國榮怒追殺之即墨自立為齊王豫彭越將軍印令反梁地越乃擊殺濟北王田安田榮遂并王三齊之地時漢王還定三秦羽聞漢并聞中且東齊梁畔之大怒乃以故吳令鄭昌為韓王以距漢令蕭公角等擊彭越越敗蕭公角等時張良徇韓遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺羽羽以此故無西意而北擊齊徵兵九江王布布稱疾不行使將將數千人往二年羽陰使九江王布殺義帝陳餘使張同夏說說齊王榮曰項王為天下宰不平今盡王故王於醜地而王群臣諸將善地逐其故主趙王乃北居代餘以為不可聞大王起兵且不聽不義願大王資餘兵使擊常山以復趙王請以國為扞蔽齊王許之因遣兵往陳餘悉三縣兵與齊併力擊常山大破之張耳走歸漢陳餘迎故趙王歇反之趙趙王因立餘為代王羽至城陽田榮亦將兵會戰榮不勝走至平原平原民殺之羽遂北燒夷齊城郭室屋皆坑降卒係虜老弱婦女徇齊至北海所過殘滅齊人相聚而畔之於是田榮弟橫收得亡卒數萬人反城陽羽因留連戰未能下漢王劫五諸侯兵凡五十六萬人東伐楚羽聞之即令諸將擊齊而自以精兵三萬人南從魯出胡陵漢王皆已破彭城收其貨賂美人日置酒高會羽乃從蕭晨擊漢軍而東至彭城日中大破漢軍漢軍皆走迫之穀泗水漢軍皆南走山楚又追擊至靈辟東睢水上漢軍卻為楚所擠多殺漢卒十餘萬皆入睢水睢水為不流漢王乃與數十騎遁去語在高紀太公呂后間求漢王反遇楚軍楚軍與歸羽常置軍中漢王稍收散卒蕭何亦發關中卒悉詣滎陽戰京索間敗楚楚以故不能過滎陽而西漢軍滎陽築甬道取敖倉食三年羽數擊絶漢甬道漢王食乏請和割滎陽以西為漢羽欲聽之歷陽侯范增曰漢易與耳今不取後必悔之羽乃急圍滎陽漢王患之乃與陳平金四萬斤以間楚君臣語在陳平傳項羽以故疑范增稍奪之權范增怒曰天下事大定矣君王自為之願賜骸骨歸行未至彭城疽發背死於是漢將紀信詐為漢王出降以誑楚軍故漢王得與數十騎從西門出令周苛樅公魏豹守滎陽漢王西入關收兵還出宛葉間與九江王黥布行收兵羽聞之即引兵南漢王堅壁不與戰是時彭越渡睢與項聲薛公戰下邳殺薛公羽乃東擊彭越漢王亦引兵北軍成皋羽已破走彭越引兵西下滎陽城亨周苛殺樅公虜韓王信進圍成皋漢王跳獨與滕公得出北渡河至修武從張耳韓信楚遂拔成皋漢王得韓信軍留止使盧綰劉賈渡白馬津入楚地佐彭越共擊破楚軍燕郭西燒其積聚攻下梁地十餘城羽聞之謂海春侯大司馬曹咎曰謹守成皋即漢欲挑戰慎毋與戰勿令得東而已我十五日必定梁地復從將軍於是引兵東四年羽擊陳留外黃外黃不下數日降羽悉令男子年十五以上詣城東欲坑之外黃令舍人兒年十三往說羽曰彭越強劫外黃外黃恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言乃赦外黃當坑者而東至睢陽聞之皆爭下漢果數挑楚軍戰楚軍不出使人辱之五六日大司馬怒渡兵泛水卒半渡漢擊大破之盡得楚國金玉貨賂大司馬咎長史欣皆自剄泛水上咎故蘄獄掾欣故塞王羽信任之羽至睢陽聞咎等破則引兵還漢軍方圍鍾離眛於滎陽東羽軍至漢軍畏楚盡走險阻羽亦軍廣武相守乃為高俎置太公其上告漢王曰今不急下吾亨太公漢王曰吾與若俱北面受命懷王約為兄弟吾翁即汝翁必欲亨乃翁幸分我一杯羹羽怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益但益怨耳羽從之乃使人謂漢王曰天下胸胸徒以吾兩人願與王挑戰決雌雄毋徒罷天下父子為也漢王笑謝曰吾寧鬭智不能鬭力羽令壯士出挑戰漢有善騎射曰樓煩楚挑戰三合樓煩輒射殺之羽大怒自被甲持戟挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使間問之乃羽也漢王大驚於是羽與漢王相與臨廣武間而語漢王數羽十罪語在高紀羽怒伏弩射傷漢王漢王入成皋時彭越數反梁地絶楚糧食又韓信破齊且欲擊楚羽使從兄子項它為大將龍且為裨將救齊韓信破殺龍且追至成陽虜齊王廣信遂自立為齊王羽聞之恐使武涉往說信語在信傳時漢關中兵益出食多羽兵食少漢王使侯公說羽羽乃與漢王約中分天下割鴻溝而西者為漢東者為楚歸漢王父母妻子已約羽解而東五年漢王進兵追羽至固陵復為羽所敗漢王用張良計致齊王信建成侯彭越兵乃劉賈入楚地圍壽春大司馬周殷叛楚舉九江兵隨劉賈迎黥布與齊梁諸侯皆大會羽壁垓下軍少食盡漢帥諸侯兵圍之數重羽夜聞漢軍四面皆楚歌乃驚曰漢皆已得楚乎是何楚人多也起飲帳中有美人姓虞氏常幸從駿馬名騅常騎乃悲歌慷慨自為歌詩曰力拔山兮氣蓋時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數曲美人和之羽泣下數行左右皆泣莫能仰視於是羽遂上馬戲下騎從者八百餘人夜直潰圍南出馳平明漢軍乃覺之令騎將灌嬰以五千騎追羽羽渡淮騎能屬者百餘人羽至陰陵迷失道問一田父田父紿曰左左乃陷大澤中以故漢追及之羽復引而東至東城乃有二十八騎追者數千羽自度不得脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂伯有天下然今卒困於此此天亡我非戰之罪也今日固決死願為諸軍快戰必三勝斬將艾旗乃後死使諸君知我非用兵罪天亡我也於是引其騎因四隤山而為圜陳外嚮漢騎圍之數重羽謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是羽大呼馳下漢軍皆披靡遂殺漢一將是時楊喜為郎騎追羽羽還叱之喜人馬俱驚辟易數里與其騎會三處漢軍不知羽所居分軍為三復圍之羽乃馳復斬漢一都尉殺數十百人復聚其騎亡兩騎乃謂騎曰何如騎皆服曰如大王言於是羽遂引東欲渡烏江烏江亭長檥船待謂羽曰江東雖小地方千里衆數十萬亦足王也願大王急渡今獨臣有船漢軍至亡以渡羽笑曰乃天亡我何渡為且籍與江東子弟八千人渡而西今亡一人還縱江東父兄憐而王我我何面目見之哉縱彼不言籍獨不愧於心乎謂亭長曰吾知公長者也吾騎此馬五歲所當亡敵嘗一日千里吾不忍殺以賜公乃令騎皆去馬步持短兵接戰羽獨所殺漢軍數百人羽亦被十餘創顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽乃曰吾聞漢購我頭千金邑萬戶吾為公得乃自剄王翳取其頭亂相輮蹈爭羽相殺者數十人最後楊喜呂馬童郎中呂勝楊武各得其一體故分其地以封五人皆為列侯漢王乃以魯公號葬羽於穀城諸項支屬皆不誅封項伯等四人為列侯賜姓劉氏贊曰昔賈生之過秦曰秦孝公據殽函之固擁雍州之地君臣固守而窺周室有席卷天下包舉宇內囊括四海并吞八荒之心當是時也商君佐之內立法度務耕織修守戰之備外連衡而鬭諸侯於是秦人拱手而取西河之外孝公既沒惠文武昭襄蒙故業因遺策南取漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合從締交相與為一當此之時齊有孟嘗趙有平原楚有春申魏有信陵此四賢者皆明智而忠信寬厚而愛人尊賢重士約從離橫兼韓魏燕趙宋衛中山之衆於是六國之士有寧越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵常以十倍之地百萬之軍仰關而攻秦秦人開關延敵九國之師遁巡而不敢進秦無亡矢遺鏃之費而天下已困矣於是從散約敗爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂山河強國請服弱國入朝施及孝文莊襄王享國之日淺國家亡事及至始皇奮六世之餘烈振長策而馭宇內吞二周而亡諸侯履至尊而制六合執敲撲以鞭笞天下威震四海南取百粵之地以為桂林象郡百粵之君俯首係頸委命下吏乃使蒙恬北築長城而守藩籬卻胸奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒匙鑄以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之川以為固良將徑弩守要害之處信臣精卒陳利兵而誰何天下已定始皇之心自以為關中之固金城千里子孫帝王萬世之業也始皇既沒餘威震于殊俗然而陳涉甕牖繩樞之子氓隸之人遷徙之徒也材能不及中庸非有仲尼墨翟之知陶朱猗頓之富躡足行伍之間而免起阡陌之中帥罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲合嚮應贏糧而景從山東豪俊遂並起而亡秦族矣且天下非小弱也雍州之地殺函之固自若也陳涉之位不齒於齊楚燕趙韓魏宋衛中山之君鉏耰棘矜不敵於鉤戟長鎩適戍之衆不亢於九國之師深謀遠慮行軍用兵之道非及曩時之士也然而成敗異變功業相反何也試使山東之國與陳涉度長潔大比權量力不可同年而語矣然秦以區區之地致萬乘之權招八州而朝同列百有餘年然后以六合為家殽函為宮一夫作難而七廟墮身死人手為天下笑者何也仁誼不施而攻守之勢異也周生亦有言舜蓋重童子項羽又重童子豈其苗裔邪何其興之暴也夫秦失其政陳涉首難豪桀蜂起相與並爭不可勝數然羽非有尺寸乘勢拔起隴畝之中三年遂將五諸侯兵滅秦分裂天下而威海內封立王侯政繇羽出號為伯王位雖不終近古以來未嘗有也及羽背關懷楚放逐義帝而怨王侯畔己難矣自矜功伐奮其私智而不師古始霸王之國欲以力征經營天下五年卒亡其國身死東城尚不覺寤不自責過失乃引天亡我非用兵之罪豈不謬哉
