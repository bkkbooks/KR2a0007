body:
  text: 王商史丹傅喜傳第五十二王商字子威涿郡蠡吾人也徙杜陵商父武武兄無故皆以宣帝舅封無故為平昌侯武為樂昌侯語在外戚傳商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以厲群臣義足以厚風俗宜備近臣繇是擢為諸曹侍中中郎將元帝時至右將軍光祿大夫是時定陶共王愛幸幾代太子商為外戚重臣輔政擁佑太子頗有力焉元帝崩成帝即位甚敬重商徙為左將軍而帝元舅大司馬大將軍王鳳顓權行多驕僭商論議不能平鳳鳳知之亦疏商建始三年秋京師民無故相驚言大水至百姓奔走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水群臣皆從鳳議左將軍商獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慚自恨失言明年商代匡衡為丞相益封千戶天子甚尊任之為人多質有威重長八尺餘身體鴻大容貌甚過絶人河平四年單于來朝引見白虎殿丞相商坐未央廷中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣初大將軍鳳連昏楊肜為琅邪太守其郡有災害十四已上商部屬按問鳳以曉商曰災異天事非人力所為肜素善吏宜以為後商不聽竟奏免肜奏果寢不下鳳重以是怨商陰求其短使人上書言商閨門內事天子以為暗昧之過不足以傷大臣鳳固爭下其事司隸先是皇太后嘗詔問商女欲以備後宮時女病商意亦難之以病對不入及商以閨門事見考自知為鳳所中惶怖更欲內女為援乃因新幸李婕妤家白見其女會日有蝕之太中大夫蜀郡張匡其人佞巧上書願對近臣陳日蝕咎下朝者左將軍丹等問匡對曰竊見丞相商作威作福從外制中取必於上性殘賊不仁遣票輕吏微求人罪欲以立威天下患苦之前頻陽耿定上書言商與父傅通及女弟淫亂奴殺其私夫疑商教使章下有司商私怨懟商子俊欲上書告商俊妻左將軍丹女持其書以示丹丹惡其父子乖忤為女求去商不盡忠納善以輔至德知聖主崇孝遠別不親後庭之事皆受命皇太后太后前聞商有女欲以備後宮商言有固疾後有耿定事更詭道因李貴人家內女執左道以亂政誣罔悖大臣節故應是而日蝕周書曰以左道事君者誅易曰日中見昧則折其右肱往者丞相周勃再建大功及孝文時纖介怨恨而日為之蝕於是退勃使就國卒無怵惕憂今商無尺寸之功而有三世之寵身位三公宗族為列侯吏二千石侍中諸曹給事禁門內連昏諸侯王權寵至盛審有內亂殺人怨懟之端宜窮竟考問臣聞秦丞相呂不韋見王無子意欲有秦國即求好女以為妻陰知其有身而獻之王産始皇帝及楚相春申君亦見王無子心利楚國即獻有身妻而産懷王自漢興幾遭呂霍之患今商有不仁之性乃因怨以內女其姦謀未可測度前孝景世七國反將軍周亞夫以為即得雒陽劇孟關東非漢之有今商宗族權勢合資巨萬計私奴以千數非特劇孟匹夫之徒也且失道之至親戚畔之閨門內亂父子相訐而欲使之宣明聖化調和海內豈不謬哉商視事五年官職陵夷而大惡著於百姓甚虧損盛德有鼎折足之凶臣愚以為聖主富於春秋即位以來未有懲姦之威加以繼嗣未立大異並見尤宜誅討不忠以遏未然行之一人則海內震動百姦之路塞矣於是左將軍丹等奏商位三公爵列侯親受詔策為天下師不遵法度以翼國家而回辟下媚以進其私執左道以亂政為臣不忠罔上不道甫刑之辟皆為上戮罪名明白臣請詔謁者召商詣若盧詔獄上素重商知匡言多險制曰弗治鳳固爭之於是制詔御史蓋丞相以德輔翼國家典領百寮協和萬國為職任莫重焉今樂昌侯商為丞相出入五年未聞忠言嘉謀而有不忠執左道之辜陷于大辟前商女弟內行不修奴賊殺人疑商教使為商重臣故抑而不窮今或言商不以自悔而反怨懟朕甚傷之惟商與先帝有外親未忍致于理其赦商罪使者收丞相印綬商免相三日發病驅血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏商罪過未決請除國邑有詔長子安嗣爵為樂昌侯至長樂衛尉光祿勳商死後連年日蝕地震直臣京兆尹王章上封事召見訟商忠直無罪言鳳顓權蔽主鳳竟以法誅章語在元后傳至元始中王莽為安漢公誅不附己者樂昌侯安見被以罪自殺國除史丹字君仲魯國人也徙杜陵祖父恭有女弟武帝時為衛太子良娣産悼皇考皇考者孝宣帝父也宣帝微時依倚史氏語在史良娣傳及宣帝即尊位恭已死三子高曾玄曾玄皆以外屬舊恩封曾為將陵侯玄平臺侯高侍中貴幸以發舉反者大司馬霍禹功封樂陵侯宣帝疾病拜高為大司馬車騎將軍領尚書事帝崩太子襲尊號是為孝元帝高輔政五年乞骸骨賜安車駟馬黃金罷就第薨諡曰安侯自元帝為太子時丹以父高任為中庶子侍從十餘年元帝即位為駙馬都尉侍中出常驂乘甚有寵上以丹舊臣皇考外屬親信之詔丹護太子家是時傅昭儀子定陶共王有材藝子母俱愛幸而太子頗有酒色之失母王皇后無寵建昭之間元帝被疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅丸以擲鼓聲中嚴鼓之節後宮及左右習知音者莫能為而定陶王亦能之上數稱其材丹進曰凡所謂材者敏而好學溫故知新皇太子是也若乃器人於絲竹鼓鼙之間則是陳惠李微高於匡衡可相國也於是上默然而笑其後中山哀王薨太子前弔哀王者帝之少弟與太子遊學相長大上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎上以責謂丹丹免冠謝上曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣竊戒屬毋涕泣感傷陛下罪乃在臣當死上以為然意乃解丹之輔相皆此類也竟寧元年上寢疾傅昭儀及定陶王常在左右而皇后太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平侯王鳳為衛尉侍中與皇后太子皆憂不知所出丹以親密臣得侍視疾候上間獨寢時丹直入臥內頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見定陶王雅素愛幸今者道路流言為國生意以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示群臣天子素仁不忍見丹涕泣言又切至上意大感喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即卻頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔道太子毋違我意丹噓唏而起太子由是遂為嗣矣元帝竟崩成帝初即位擢丹為長樂衛尉遷右將軍賜爵關內侯食邑三百戶給事中後徙左將軍光祿大夫鴻嘉元年上遂下詔曰夫褒有德賞元功古今通義也左將軍丹往時導朕以忠正秉義醇一舊德茂焉其封丹為武陽侯國東海郯之武彊聚戶千一百丹為人足知愷弟愛人貌若儻蕩不備然心甚謹密故尤得信於上丹兄嗣父爵為侯讓不受分丹盡得父財身又食大國邑重以舊恩數見褒賞賞賜纍千金僮奴以百數後房妻妾數十人內奢淫好飲酒極滋味聲色之樂為將軍前後十六年永始中病乞骸骨上賜策曰左將軍寢病不衰願歸治疾朕愍以官職之事久留將軍使躬不瘳使光祿勳賜將軍黃金五十斤安車駟馬其上將軍印綬宜專精神務近醫藥以輔不衰丹歸第數月薨諡曰頃侯有子男女二十人九男皆以丹任並為侍中諸曹親近在左右史氏凡四人侯至卿大夫二千石者十餘人皆訖王莽乃絶唯將陵侯曾無子絶於身云傅喜字稚游河內溫人也哀帝祖母定陶傅太后從父弟少好學問有志行哀帝立為太子成帝選喜為太子庶子哀帝初即位以喜為衛尉遷右將軍是時王莽為大司馬乞骸骨避帝外家上既聽莽退衆庶歸望於喜喜從弟孔鄉侯晏親與喜等而女為皇后又帝舅陽安侯丁明皆親以外屬封喜執謙稱疾傅太后始與政事喜數諫之由是傅太后不欲令喜輔政上於是用左將軍師丹代王莽為大司馬賜喜黃金百斤上將軍印綬以光祿大夫養病大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國內輔之臣也今以寢病一旦遣歸衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將則文公側席而坐及其死也君臣相慶百萬之衆不如一賢故秦行千金以間廉頗漢散萬金以疏亞父喜立於朝陛下之光輝傅氏之廢興也上亦自重之明年正月乃徒師丹為大司空而拜喜為大司馬封高武侯丁傅驕奢皆嫉喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與丞相孔光大司空師丹共執正議傅太后大怒上不得已先免師丹以感動喜喜終不順後數月遂策免喜曰君輔政出入三年未有昭然匡朕不逮而本朝大臣遂其姦心咎由君焉其上大司馬印綬就第傅太后又自詔丞相御史曰高武侯喜無功而封內懷不忠附下罔上與故大司空丹同心背畔放命圮族虧損德化罪惡雖在赦前不宜奉朝請其遣就國後又欲奪喜侯上亦不聽喜在國三歲餘哀帝崩平帝即位王莽用事免傅氏官爵歸故郡晏將妻子徙合浦莽白太后下詔曰高武侯喜姿性端愨論議忠直雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎歲寒然後知松柏之後凋也其還喜長安以故高安侯莫府賜喜位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終莽賜諡曰貞侯子嗣莽敗乃絶贊曰自宣元成哀外戚興者許史三王丁傅之家皆重侯纍將窮貴極富見其位矣未見其人也陽平之王多有材能好事慕名其勢尤盛曠貴最久然至於莽亦以覆國王商有剛毅節廢黜以憂死非其罪也史丹父子相繼高以重厚位至三公丹之輔道副主掩惡揚美傅會善意雖宿儒達士無以加焉及其歷房闥入臥內推至誠犯顏色動寤萬乘轉移大謀卒成太子安母后之位無言不讎終獲忠貞之報傅喜守節不傾亦蒙後凋之賞哀平際會禍福速哉
