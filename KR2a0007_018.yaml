時十五年間彗星四見久者八十日長或竟天後秦遂以兵內兼六國外攘四夷死人如亂麻又熒惑守心及天市芒角色赤如雞血始皇既死適庶相殺二世即位殘骨肉戮將相太白再經天因以張楚並興兵相跆籍秦遂以亡項羽救巨鹿枉矢西流枉矢所觸天下之所伐射滅亡象也物莫直於矢今蛇行不能直而枉者執矢者亦不正以象項羽執政亂也羽遂合從坑秦人屠咸陽凡枉矢之流以亂伐亂也漢元年十月五星聚於東井以曆推之從歲星也此高皇帝受命之符也故客謂張耳曰東并景祐殿局本都作井王先謙説作井是井景祐殿局本都作井王先謙説作井是秦地漢王入秦五星從歲星聚當以義取天下秦王子嬰降於枳道漢王以屬吏寶器婦女亡所取閉宮封門還軍次于霸上以候諸侯與秦民約法三章民亡不歸心者可謂能行義矣天之所豫也五年遂定天下即帝位此明歲星之崇義東井為秦之地明效也三年秋太白出西方有光幾中乍北乍南過期乃入辰星出四孟是時項羽為楚王而漢已定三秦與相距滎陽太白出西方有光幾中是秦地戰將勝而漢國將興也辰星出四孟易主之表也後二年漢滅楚七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為胸奴參為趙畢為邊兵是歲高皇帝自將兵擊胸奴至平城為冒頓單于所圍七日乃解十二年春熒惑守心四月宮車晏駕孝惠二年天開東北廣十餘丈長二十餘丈地動陰有餘天裂陽不足皆下盛強將害上之變也其後有呂氏之亂孝文後二年正月壬寅天欃夕出西南占曰為兵喪亂其六年十一月胸奴入上郡雲中漢起三軍以衛京師其四月乙巳水木火三合於東井占曰外內有兵與喪改立王公東井秦也八月天狗下梁野是歲誅反者周殷長安市其七年六月文帝崩其十一月戊戌土水合於危占曰為雍沮所當之國不可舉事用兵必受其殃一曰將覆軍危齊也其七月火東行行畢陽環畢東北出而西逆行至昴即南乃東行占曰為喪死寇亂畢昴趙也孝景元年正月癸酉金水合於婺女占曰為變謀為兵憂婺女粵也又為齊其七月乙丑金木水三合於張占曰外內有兵與喪改立王公張周地今之河南也又為楚其二年七月丙子火與水晨出東方因守斗占曰其國絶祀至其十二月水火合於斗占曰為淬不可舉事用兵必受其殃一曰為北軍用兵舉事大敗斗吳也又為粵是歲彗星出西南其三月立六皇子為王王王字原缺據景祐殿局本補淮陽汝南河間臨江長沙廣川其三年吳楚膠西膠東緇川濟南趙七國反吳楚兵先至攻梁膠西膠東淄川三國攻圍齊漢遣大將軍周亞夫等戍止河南以候吳楚之敝遂敗之吳王亡走粵粵攻而殺之平陽侯敗三國之師于齊咸伏其辜齊王自殺漢兵以水攻趙城城壞王自殺六月立皇子二人楚元王子一人為王王膠西中山楚徙濟北為淄川王淮陽為魯王汝南為江都王七月兵罷天狗下占為破軍殺將狗又守禦類也天狗所降以戒守禦吳楚攻梁梁堅城守遂伏尸流血其下三年填星在婁幾入還居奎奎魯也占曰其國得地為得填是歲魯為國四年七月癸未火入東井行陰又以九月己未入輿鬼戊寅出占曰為誅罰又為火災後二年有栗氏事其後未央東闕災中元年填星當在觜觿參去居東井占曰亡地不乃有女憂其三王念孫説中三年在下文則此三年當作二年二王念孫説中三年在下文則此三年當作二年年正月丁亥金木合於觜觿為白衣之會三月丁酉彗星夜見西北色白長丈在觜觿且去益小十五日不見占曰必有破國亂君伏死其辜觜觿梁也其五月甲午金木俱在東井戉殿本作戊戌朱一新説作戊戌是自甲午至戊戌凡五日戊戌殿本作戊戌朱一新説作戊戌是自甲午至戊戌凡五日金去木留守之二十日占曰傷成於戉木為諸侯誅將行於諸侯也其六月壬戌蓬星見西南在房南去房可二丈大如二斗器色白癸亥在心東北可長丈所甲子在尾北可六丈丁卯在箕北近漢稍小且去時大如桃壬申去凡十日占曰蓬星出必有亂臣房心間天子宮也是時梁王欲為漢嗣使人殺漢爭臣袁盎漢桉誅梁大臣斧戉用梁王恐懼布車入關伏斧戉謝罪然後得免中三年十一月庚午夕金火合於虛相去一寸占曰為鑠為喪虛齊也四年四月丙申金木合於東井占曰為白衣之會非景祐殿本都作井井景祐殿本都作井秦也其五年四月乙巳水火合於參占曰國不吉參梁也其六年四月梁孝王死五月城陽王濟陰王死六月成陽公主死出入三月天子四衣白臨邸第後元年五月壬午火金合於輿鬼之東北不至柳出輿鬼北可五寸占曰為鑠有喪輿鬼秦也丙戌地大動鈴鈴然民大疫死棺貴至秋止孝武建元三年三月有星孛於注張歷太微干紫宮至於天漢春秋星孛於北斗齊魯王先慎説魯為宋字之誤按左傳文十四年作宋齊晉之君宋王先慎説魯為宋字之誤按左傳文十四年作宋齊晉之君晉之君皆將死亂今星孛歷五宿其後濟東膠西江都王皆坐法削黜自殺淮陽衡山謀反而誅三年四月有星孛於天紀至織女占曰織女有女變天紀為地震至四年十月而地動其後陳皇后廢六年熒惑守輿鬼占曰為火變有喪是歲高園有火災竇太后崩元光元年六月客星見于房占曰為兵起其二年十一月單于將十萬騎入武州漢遣兵三十餘萬以待之元光中天星盡搖上以問候星者對曰星搖者民勞也後伐四夷百姓勞于兵革元鼎五年太白入于天苑占曰將以馬起兵也一曰馬將以軍而死耗其後以天馬故誅大宛馬大死於軍元鼎中熒惑守南斗占曰熒惑所守為亂賊喪兵守之久其國絶祀南斗越分也其後越相呂嘉殺其王及太后漢兵誅之滅其國元封中星孛于河戍占曰南戍為越門北戍為胡門其後漢兵擊拔朝鮮以為樂浪玄菟郡朝鮮在海中越之象也居北方胡之域也太初中星孛于招搖星朱一新説汪本有星字此脫按景祐殿本都有星字傳曰客星守招搖蠻夷有亂民死君其後漢兵擊大宛斬其王招搖遠夷之分也孝昭始元中漢宦者梁成恢及燕王候星者吳莫如見蓬星出西方天市東門行過河鼓入營室中恢曰蓬星出六十日不出三年下有亂臣戮死於市後太白出西方下行一舍復上行二舍而下去太白主兵上復下將有戮死者後太白出東方入咸池東下入東井人臣不忠有謀上者後太白入太微西藩第一星北出東藩第一星北東下去太微者天廷也太白行其中宮門當閉大將被甲兵邪臣伏誅熒惑在婁逆行至奎法曰當有兵後太白入昴莫如曰蓬星出西方當有大臣戮死者太白星入東井太微廷出東門漢有死將後熒惑出東方守太白兵當起主人不勝後流星下燕萬載宮極東去法曰國恐有誅其後左將軍桀票騎將軍安與長公主燕剌王謀亂咸伏其辜兵誅烏桓元鳳四年九月客星在紫宮中斗樞極間占曰為兵其五年六月發三輔郡國少年詣北軍五年四月燭星見奎婁間占曰有土功胡人死邊城和其六年正月築遼東玄菟城二月度遼將軍范明友擊烏桓還元平元年正月庚子日出時有黑雲狀如焱王先謙説當從三犬猋飆之通借字猋王先謙説當從三犬猋飆之通借字風亂鬊轉出西北東南行轉而西有頃亡占曰有雲如衆風是謂風師法有大兵其後兵起烏孫五將征胸奴二月甲申晨有大星如月有衆星隨而西行乙酉牂雲如狗赤色長尾三枚夾漢西行大星如月大臣之象衆星隨之衆皆隨從也天文以東行為順西行為逆此大臣欲行權以安社稷占曰太白散為天狗為卒起卒起見禍無時臣運柄牂雲為亂君到其四月昌邑王賀行淫辟立二十七日大將軍霍光白皇太后廢賀三月丙戌流星出翼軫東北干太微入紫宮始出小且入大有光入有頃聲如雷三鳴止占曰流星入紫宮天下大凶其四月癸未宮車晏駕孝宣本始元年四月壬戌甲夜辰星與參出西方其二年七月辛亥夕辰星與翼出皆為蚤占曰大臣誅其後熒惑守房之鉤鈐鉤鈐天子之御也占曰不太僕則奉車不黜即死也房心天子宮也房為將相心為子屬也其地宋今楚彭城也四年七月甲辰辰星在翼月犯之占曰兵起上卿死將相也是日熒惑入輿鬼天質占曰大臣有誅者名曰天賊在大人之側地節元年正月戊午乙夜月食熒惑熒惑在角亢占曰憂在宮中非賊而盜也有內亂讒臣在旁其辛酉熒惑入氐中氐天子之宮熒惑入之有賊臣其六月戊戌甲夜客星又居左右角間東南指長可二尺色白占曰有姦人在宮廷間其丙寅又有客星見貫索東北南行至七月癸酉夜入天市芒炎東南指其色白占曰有戮卿一曰有戮王期皆一年遠二年是時楚王延壽謀逆自殺四年故大將軍霍光夫人顯將軍霍禹范明友奉車霍山及諸昆弟賓婚為侍中諸曹九卿郡守皆謀反咸伏其辜黃龍元年三月客星居王梁東北可九尺長丈餘西指出閣道間至紫宮其十二月宮車晏駕元帝初元元年四月客星大如瓜色青白在南斗第二星東可四尺占曰為水飢其五月勃海水大溢六月關東大飢民多餓死琅邪郡人相食二年五月客星見昴分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月巨鹿都尉謝君男詐為神人論死父免官五年四月彗星出西北赤黃色長八尺所後數日長丈餘東北指在參分後二歲餘西羌反孝成建始元年九月戊子有流星出文昌色白光燭地長可四丈大一圍動搖如龍蛇形有頃長可五六丈大四圍所詘折委曲貫紫宮西在斗西北子亥間後詘如環北方不合留一合景祐殿本都作刻朱一新説作刻是刻景祐殿本都作刻朱一新説作刻是所占曰文昌為上將貴相是時帝舅王鳳為大將軍其後宣帝舅子王商為丞相皆貴重任政鳳妬商譖而罷之商自殺親屬皆廢黜四年七月熒惑隃歲星居其東北半寸所如連李時歲星在關星西四尺所熒惑初從畢口大星東東北往數日至往疾去遲占曰熒惑與歲星鬭有病君飢歲至河平元年三月旱傷麥民食榆皮二年十二月壬申太皇太后避時昆明東觀十一月乙卯月食填星星不見時在輿鬼西北八九尺所占曰月食填星流民千里河平元年二月流民入函谷關河平二年十月下旬填星在東井軒轅南專大星尺餘歲星在其西北尺所熒惑在其西北二尺所皆從西方來填星貫輿鬼先到歲星次熒惑亦貫輿鬼十一月上旬歲星熒惑西去填星皆西北逆行占曰三星若合是謂驚位是謂絶行外內有兵與喪改立王公其十一月丁巳夜郎王歆大逆不道牂柯太守立捕殺歆三年九月甲戌東郡莊平男子侯母辟兄弟五人群黨為盜攻燔官寺縛縣長吏盜取印綬自稱將軍三月辛卯左將軍千秋卒右將軍史丹為左將軍四年四月戊申梁王賀薨陽朔元年七月壬子月犯心星占曰其國有憂若有大喪房心為宋今楚地十一月辛未楚王友薨四年閏月庚午飛星大如缶出西南入斗下占曰漢使胸奴明年鴻嘉元年正月胸奴單于雕陶莫皋死五月甲午遣中郎將楊興使弔永始二年二月癸未夜東方有赤色大三四圍長二三丈索索如樹南方有大四五圍下行十餘丈皆不至地滅占曰東方客之變氣狀如樹木以此知四方欲動者明年十二月己卯尉氏男子樊並等謀反賊殺陳留太守嚴普及吏民出囚徒取庫兵劫略令丞自稱將軍皆誅死庚子山陽鐵官亡徒蘇令等殺傷吏民篡出囚徒取庫兵聚黨數百人為大賊踰年經歷郡國四十餘一日有兩氣同時起並見而並令等同月俱發也元延元年四月丁酉日餔時天暒晏殷殷如雷聲有流星頭大如缶長十餘丈皎然赤白色從日下東南去四面或大如盂或如雞子耀耀如雨下至昏止郡國皆言星隕春秋星隕如雨為王者失勢諸侯起伯之異也其後王莽遂顓國柄王氏之興萌於成帝時景祐殿本都有時字是以有星隕之變後莽遂篡國綏和元年正月辛未有流星從東南入北斗長數十丈二刻所息占曰大臣有繫者其年十一月庚子定陵侯淳于長坐執左道下獄死二年春熒惑守心二月乙丑丞相翟方進欲塞災異自殺二景祐殿本都作三朱一新説作三是三景祐殿本都作三朱一新説作三是月丙戌宮車晏駕哀帝建平元年正月丁未日出時有著天白氣廣如一匹布長十餘丈西南行歡如雷西南行一刻而止名曰天狗傳曰言之不從則有犬禍詩妖到其四年正月二月三月民相驚動歡譁奔走傳行詔籌祠西王母又曰從目人當來十二月白氣出西南從地上至天出參下貫天廁廣如一匹布長十餘丈十餘日去占曰天子有陰病其三年十一月壬子太皇太后詔曰皇帝寬仁孝順奉承聖緒靡有解怠而久病未瘳夙夜惟思殆繼體之君不宜改作春秋大復古其復甘泉泰畤汾陰后土如故二年二月彗星出牽牛七十餘日傳曰彗所以除舊布新也牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其出久者為其事大也其六月甲子夏賀良等建言當改元易號增漏刻詔書改建平二年為太初元將景祐殿本都無元將二字通鑑亦無元年號曰陳聖劉太平皇帝刻漏以百二十為度八月丁巳悉復蠲除之賀良及黨與皆伏誅流放其後卒有王莽篡國之禍元壽元年十一月歲星入太微逆行干右執法占曰大臣有憂執法者誅若有罪二年十月戊寅高安侯董賢免大司馬位歸第自殺
