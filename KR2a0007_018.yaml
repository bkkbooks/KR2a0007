body:
  text: 天文志第六凡天文在圖籍昭昭可知者經星常宿中外官凡百一十八名積數七百八十三星皆有州國官宮物類之象其伏見蚤晚邪正存亡虛實闊狹及五星所行合散犯守陵歷鬭食彗孛飛流日月薄食暈適背穴抱珥虹霓迅雷風祅怪雲變氣此皆陰陽之精其本在地而上發于天者也政失於此則變見於彼猶景之象形鄉之應聲是以明君覩之而寤飭身正事思其咎謝則禍除而福至自然之符也中宮天極星其一明者泰一之常居也旁三星三公或曰子屬後句四星末大星正妃餘三星後官景祐殿本都作宮朱一新説作宮是宮景祐殿本都作宮朱一新説作宮是之屬也環之匡衛十二星藩臣皆曰紫宮前列直斗口三星隨北專鋭若見若不見曰陰德或曰天一紫宮左三星曰天槍右四星曰天棓後十七星絶漢抵營室曰閣道北斗七星所謂旋璣玉衡以齊七政杓攜龍角衡殷南斗魁枕參首用昏建者杓杓自華以西南夜半建者衡衡殷中州河濟之間平旦建者魁魁海岱以東北也斗為帝車運于中央臨制四海分陰陽建四時均五行移節度定諸紀皆繫於斗斗魁戴筐六星曰文昌宮一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災在魁中貴人之牢魁下六星兩兩而比者曰三能三能色齊君臣和不齊為乖戾柄輔星明近輔臣親強斥小疏弱杓端有兩星一內為矛招搖一外為盾天蜂有句圜十五星屬杓曰賤人之牢牢中星實則囚多虛則開出天一槍棓矛盾動搖角大兵起東宮蒼龍房心心為明堂大星天王前後星子屬不欲直直王失計房為天府曰天駟其陰右驂旁有兩星曰襟襟北一星曰舝東北曲十二星曰旗旗中四星曰天市天市中星衆者實其中虛則耗房南衆星曰騎官左角理右角將大角者天王帝坐廷其兩旁各有三星鼎足句之曰攝提攝提者直斗杓所指以建時節故曰攝提格亢為宗廟主疾其南北兩大星曰南門氐為天根主疫尾為九子曰君臣斥絶不和箕為敖客后妃之府曰口舌火犯守角則有戟景祐殿本都作戰王先謙説作戰是戰景祐殿本都作戰王先謙説作戰是房心王者惡之南宮朱鳥權衡衡太微三光之廷筐衛十二星藩臣西將東相南四星執法中端門左右掖門掖門內六星諸侯其內五星五帝坐後聚十五星曰哀鳥郎位旁一大星將位也月五星順入軌道司其出所守天子所誅也其逆入若不軌道以所犯名之中坐成形皆群下不從謀也金火尤甚廷藩西有隨星四名曰少微士大夫權軒轅黃龍體前大星女主象旁小星御者後宮屬月五星守犯者如衡占東井為水事火入之一星居其左右天子且以火為敗東井西曲星曰戉北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質火守南北河兵起穀不登故德成衡觀成潢傷成戉禍成井誅成質柳為鳥喙主木草七星頸為員宮主急事張嗉為廚主觴客翼為羽翮主遠客軫為車主風其旁有一小星曰長沙星星不欲明明與四星等若五星入軫中兵大起軫南衆星曰天庫庫有五車車星角若益衆及不具亡處車馬西宮咸池曰天五潢五潢五帝車舍火入旱金兵水水中有三柱柱不具兵起奎曰封豨為溝瀆婁為聚衆胃為天倉其南衆星曰廥積昴曰旄頭胡星也為白衣會畢曰罕車為邊兵主弋獵其大星旁小星為附耳附耳搖動有讒亂臣在側昴畢間為天街其陰陰國陽陽國參為白虎三星直者是為衡石下有三星鋭曰罰為斬艾事其外四星左右肩股也小三星隅置曰觜觿為虎首主葆旅事其南有四星曰天廁天廁下一星曰天矢矢黃則吉青白黑凶其西有句曲九星三處羅列一曰天旗二曰天苑三曰九斿其東有大星曰狼狼角變色多盜賊下有四星曰弧直狼比地有大星曰南極老人老人見治安不見兵起常以秋分時候之南郊北宮玄武虛危危為蓋屋虛為哭泣之事其南有衆星曰羽林天軍軍西為壘或曰戉旁一大星北落北落若微亡軍星動角益稀及五星犯北落入軍軍起火金水尤甚火入軍憂水水患木土軍吉危東六星兩兩而比曰司寇營室為清廟曰離宮閣道漢中四星曰天駟旁一星曰王梁王梁策馬車騎滿野旁有八星絶漢曰天橫天橫旁江星江星動以人涉水杵臼四星在危南匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星上將左左將右右將婺女其北織女織女天女孫也歲星曰東方春木於人五常仁也五事貌也仁虧貌失逆春令傷木氣罰見歲星歲星所在國不可伐可以伐人超舍而前為贏退舍為縮贏其國有兵不復縮其國有憂其將死國傾敗所去失地所之得地一曰當居不居國亡所之國昌已居之又東西去之國凶不可舉事用兵安靜中度吉出入不當其次必有天祅見其舍也歲星贏而東南石氏見彗星甘氏不出三月乃生彗本類星末類彗長二丈贏東北石氏見覺星甘氏不出三月乃生天棓本類星末鋭長四尺縮西南石氏見欃雲如牛甘氏不出三月乃生天槍左右鋭長數丈縮西北石氏見槍雲如馬甘氏不出三月乃生天欃本類星末鋭長數丈石氏槍欃棓彗異狀其殃一也必有破國亂君伏死其辜餘殃不盡為旱凶飢暴疾至日行一尺出二十餘日乃入甘氏其國凶不可舉事用兵出而易所當之國是受其殃又曰祅星不出三年其下有軍及失地若國君喪熒惑曰南方夏火禮也視也禮虧視失逆夏令傷火氣罰見熒惑逆行一舍二舍為不祥居之三月國有殃五月受兵七月國半亡地九月地太半亡因與俱出入國絶祀熒惑為亂為成景祐殿局本都作賊朱一新説作賊是賊景祐殿局本都作賊朱一新説作賊是為疾為喪為飢為兵所居之宿國受殃殃還至者雖大當小居之久殃乃至者當小反大已去復還居之若居之而角者若動者繞環之及乍前乍後乍左乍右殃愈甚一曰熒惑出則有大兵入則兵散周還止息乃為其死喪寇亂在其野者亡地以戰不勝東行疾則兵聚于東方西行疾則兵聚于西方其南為丈夫喪北為女子喪熒惑天子理也故曰雖有明天子必視熒惑所在太白曰西方秋金義也言也義虧言失逆秋令傷金氣罰見太白日方南太白居其南日方北太白居其北為贏侯王不寧用兵進吉退凶日方南太白居其北日方北太白居其南為縮侯王有憂用兵退吉進凶當出不出當入不入為失舍不有破軍必有死王之墓有亡國一曰天下匽兵野有兵者所當之國大凶當出不出未當入而入天下匽兵兵在外入未當出而出當入而不入天下起兵有至破國未當出而出未當入而入天下舉兵所當之國亡當期而出其國昌出東為東方入為北方出西為西方入為南方所居久其國利易其鄉凶入七日復出將軍戰死入十日復出相死之入又復出人君惡之已出三日而復微入三日乃復盛出是為耎而伏其下國有軍其衆敗將北已入三日又復微出三日乃復盛入其下國有憂帥師雖衆敵食其糧用其兵虜其帥出西方失其行夷狄敗出東方失其行中國敗一曰出蚤為月食晚為天祅及彗星將發於亡道之國太白出而留桑榆間病其下國上而疾未盡期日過參天病其對國太白經天天下革民更王是為亂紀人民流亡晝見與日爭明強國弱小國強女主昌太白兵象也出而高用兵深吉淺凶埤淺吉深凶行疾用兵疾吉遲凶行遲用兵遲吉疾凶角敢戰吉不敢戰凶擊角所指吉逆之凶進退左右用兵進退左右吉靜凶圜以靜用兵靜吉躁凶出則兵出入則兵入象太白吉反之凶赤角戰太白者猶軍也而熒惑憂也故熒惑從太白軍憂離之軍舒出太白之陰有分軍出其陽有遍將之戰當其行太白還之破軍殺將辰星殺伐之氣戰鬭之象也與太白俱出東方皆赤而角夷狄敗中國勝與太白俱出西方皆赤而角中國敗夷狄勝五星分天之中積于東方中國大利積于西方夷狄用兵者利辰星不出太白為客辰星出太白為主人辰星與太白不相從雖有軍不戰辰星出東方太白出西方若辰星出西方太白出東方為格野雖有兵不戰辰星入太白中五日乃出及入而上出破軍殺將客勝下出客亡地辰星來抵太白不去將死正其上出破軍殺將客勝下出客亡地視其所指以名破軍辰星繞環太白若鬭大戰客勝主人吏死辰星過太白間可緘劍小戰客勝居太白前旬三日軍罷出太白左小戰歷太白右數萬人戰主人吏死出太白右去三尺軍急約戰凡太白所出所直之辰其國為得位得位者戰勝所直之辰順其色而角者勝其色害者敗太白白比狼赤比心黃比參右肩青比參左肩黑比奎大星色勝位行勝色行得盡勝之辰星曰北方冬水知也聽也知虧聽失逆冬令傷水氣罰見辰星出蚤為月食晚為彗星及天祅一時不出其時不和四時不出天下大飢失其時而出為當寒反溫當溫反寒當出不出是謂擊卒兵大起與它星還而鬭天下大亂出於房心間地動填星曰中央季夏土信也思心也仁義禮智以信為主貌言視聽以心為正故四星皆失填星乃為之動填星所居國吉未當居而居之若已去而復還居之國得土不乃得女子當居不居既已居之又東西去之國失土不乃失女不有土事若女之憂居宿久國福厚易福薄當居不居為失填其下國可伐得者不可伐其贏為王不寧縮有軍不復一曰既已居之又東西去之其國凶不可舉事用兵失次而上一舍三舍有王命不成不乃大水失次而下二舍有后戚其歲不復不乃天裂若地動凡五星歲與填合則為內亂與辰合則為變謀而更事與熒惑合則為飢為旱與太白合則為白衣之會為水太白在南歲在北名曰牡景祐殿本都作牝注同朱一新説作牝是牝景祐殿本都作牝注同朱一新説作牝是牡年穀大孰太白在北歲在南年或有或亡熒惑與太白合則為喪不可舉事用兵與填合則為憂主孽卿與辰合則為北軍用兵舉事大敗填與辰合則將有覆軍下師與太白合則為疾為內兵辰與太白合則為變謀為兵憂凡歲熒惑填太白四星與辰鬭皆為戰兵不在外皆為內亂一曰火與水合為淬與金合為鑠不可舉事用兵土與金合國亡地與木合則國飢與水合為雍沮不可舉事用兵木與金合鬭國有內亂同舍為合相陵為鬭二星相近者其殃大二星相遠者殃無傷也從七寸以內必之凡月食五星其國必景祐殿本都作皆皆景祐殿本都作皆亡歲以飢熒惑以亂填以殺太白強國以戰辰以女亂月食大角王者惡之凡五星所聚宿其國王天下從歲以義從熒惑以禮從填以重從太白以兵從辰以法以法者以法致天下也三星若合是謂驚立絶行其國外內有兵與喪民人乏飢改立王公四星若合是謂大湯其國兵喪並起君子憂小人流五星若合是謂易行有德受慶改立王者掩有四方子孫蕃昌亡德受罰離其國家滅其宗廟百姓離去被滿四方五星皆大其事亦大皆小其事亦小也凡五星色皆圜白為喪為旱赤中不平為兵青為憂為水黑為疾為多死黃吉皆角赤犯我城黃地之爭白哭泣之聲青有兵憂黑水五星同色天下匽兵百姓安寧歌舞以行不見災疾五穀蕃昌凡五星歲緩則不行急則過分逆則占熒惑緩則不出急則不入違道則占填緩則不建急則過舍逆則占太白緩則不出急則不入逆則占辰緩則不出急則不入非時則占五星不失行則年穀豐昌凡以宿星通下之變者維星散句星信則地動有星守三淵天下大水地動海魚出紀星散者山崩不即有喪龜鱉星不居漢中川有易者辰星入五車大水熒惑入積水水兵起入積薪旱兵起守之亦然極後有四星名曰句星斗杓後有三星名曰維星散者不相從也三淵蓋五車之三桂也天紀屬貫索積薪在北戍西北積水在北戍東北角亢氐沇州房心豫州尾箕幽州斗江湖牽牛婺女揚州虛危青州營室東壁并州奎婁胃徐州昴畢冀州觜觿參益州東井輿鬼雍州柳七星張三河翼軫荊州甲乙海外日月不占丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北一曰甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕趙癸北夷子周丑翟寅趙卯鄭辰邯鄲巳衛午秦未中山申齊酉魯戌吳越亥燕代秦之疆候太白占狼弧吳楚之疆候熒惑占鳥衡燕齊之疆候辰星占虛危宋鄭之疆候歲星占房心晉之疆亦候辰星占參罰及秦并吞三晉燕代自河山以南者中國中國於四海內則在東南為陽陽則日歲星熒惑填星占於街南畢主之其西北則胡貉月氏旃裘引弓之民為陰陰則月太白辰星占於街北昴主之故中國山川東北流其維首在隴蜀尾沒於勃海碣石是以秦晉好用兵復占太白太白主中國而胡貉數侵掠獨占辰星辰星出入躁疾常主夷狄其大經也凡五星早出為贏贏為客晚出為縮縮為主人五星贏縮必有天應見杓太歲在寅曰攝提格歲星正月晨出東方石氏曰名監德在斗牽牛失次杓早水晚旱甘氏在建星婺女太初曆在營室東壁在卯曰單閼二月出石氏曰名降入在婺女虛危甘氏在虛危失次杓有水災太初在奎婁在辰曰執徐三月出石氏曰名青章在營室東壁失次杓早旱晚水甘氏同太初在胃昴在巳曰大荒落四月出石氏曰名路踵在奎婁甘氏同太初在參罰在午曰敦牂五月出石氏曰名啓明在胃昴畢失次杓早旱晚水甘氏同太初在東井輿鬼在未曰協洽六月出石氏曰名長烈在觜觿參甘氏在參罰太初在注張七星在申曰涒灘七月出石氏曰名天晉在東井輿鬼甘氏在弧太初在翼軫在酉曰作詻爾雅作作噩王先謙説爾雅五字漢書無此例非班自注蓋校書者誤加之八月出石氏曰名長壬在柳七星張失次杓有女喪民疾甘氏在注張失次杓有火太初在角亢在戌曰掩茂九月出石氏曰名天睢在翼軫失次杓水甘氏在七星翼太初在氐房心在亥曰大淵獻十月出石氏曰名天皇在角亢始甘氏在軫角亢太初在尾箕在子曰困敦十一月出石氏曰名天宗在氐房始甘氏同太初在建星牽牛在丑曰赤奮若十二月出石氏曰名天昊在尾箕甘氏在心尾太初在婺女虛危甘氏太初曆所以不同者以星贏縮在前各録後所見也其四星亦略如此古曆五星之推亡逆行者至甘氏石氏經以熒惑太白為有逆行夫曆者正行也古人有言曰天下太平五星循度亡有逆行日不食朔月不食望夏氏日月傳曰日月食盡主位也不盡臣位也星傳曰日者德也月者刑也故曰日食修德月食修刑然而曆紀推月食與二星之逆亡異熒惑主內亂太白主兵月主刑自周室衰亂臣賊子師旅數起刑罰失中雖其亡亂臣賊子師旅之變內臣猶不治四夷猶不服兵革猶不寢刑罰猶不錯故二星與月為之失度三變常見及有亂臣賊子伏尸流血之兵大變乃出甘石氏見其常然因以為紀皆非正行也詩云彼月而食則惟其常此日而食于何不臧詩傳曰月食非常也比之日食猶常也日食則不臧矣謂之小變可也謂之正行非也故熒惑必行十六舍去日遠而顓恣太白出西方進在日前氣盛乃逆行及月必食於望亦誅盛也國皇星大而赤狀類南極所出其下起兵兵強其衝不利昭明星大而白無角乍上乍下所出國起兵多變五殘星出正東東方之星其狀類辰去地可六丈大而黃六賊星出正南南方之星去地可六丈大而赤數動有光司詭星出正西西方之星去地可六丈大而白類太白咸漢星出正北北方之星去地可六丈大而赤數動察之中青此四星所出非其方其下有兵衝不利四填星出四隅去地可四丈地維臧光亦出四隅去地可二丈若月始出所見下有亂者亡有德者昌燭星狀如太白其出也不行見則滅所燭城邑亂如星非星如雲非雲名曰歸邪歸邪出必有歸國者星者金之散氣其本曰人星衆國吉少則凶漢者亦金散氣其本曰水星多多水少則旱其大經也天鼓有音如雷非雷音在地而下及地其所住者兵發其下天狗狀如大流星有聲共景祐殿局本都作其王先謙説作其是其景祐殿局本都作其王先謙説作其是下止地類狗所墜及望之如火光炎炎中天其下圜如數頃田處上鋭見則有黃色千里破軍殺將格澤者如炎火之狀黃白起地而上下大上鋭其見也不種而穫不有土功必有大客蚩尤之旗類彗而後曲象旗見則王者征伐四方旬始出於北斗旁狀如雄雞其怒青黑色象伏鱉枉矢狀類大流星蛇行而倉黑望如有毛目然長庚廣如一匹布著天此星見起兵星墜至地則石也天暒而見景星景星者德星也其狀無常常出於有道之國日有中道月有九行中道者黃道一曰光道光道北至東井去北極近南至牽牛去北極遠東至角西至婁去極中夏至至於東井北近極故晷短立八尺之表而晷景長尺五寸八分冬至至於牽牛遠極故晷長立八尺之表而晷景長丈三尺一寸四分春秋分日至婁角去極中而晷中立八尺之表而晷景長七尺三寸六分此日去極遠近之差晷景長短之制也去極遠近難知要以晷景晷景者所以知日之南北也日陽也陽用事則日進而北晝進而長陽勝故為溫暑陰用事則日退而南晝退而短陰勝故為涼寒也故日進為暑退為寒若日之南北失節晷過而長為常寒退而短為常燠此寒燠之表也故曰為寒暑一曰晷長為潦短為旱奢為扶扶者邪臣進而正臣疏君子不足姦人有餘月有九行者黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東立春春分月東從青道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道然用之一決房中道青赤出陽道白黑出陰道若月失節度而妄行出陽道則旱風出陰道則陰雨凡君行急則日行疾君行緩則日行遲日行不可指而知也故以二至二分