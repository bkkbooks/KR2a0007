body:
  text: 外戚傳第六十七下孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉自有傳孝成許皇后大司馬車騎將軍平恩侯嘉女也元帝悼傷母恭哀后居位日淺而遭霍氏之辜故選嘉女以配皇太子初入太子家上令中常侍黃門親近者侍送還白太子歡說狀元帝喜謂左右酌酒賀我左右皆稱萬歲久之有一男失之及成帝即位立許妃為皇后復生一女失之初后父嘉自元帝時為大司馬車騎將軍輔政已八九年矣及成帝立復以元舅陽平侯王鳳為大司馬大將軍與嘉並杜欽以為故事后父重於帝舅乃說鳳曰車騎將軍至貴將軍宜尊之敬之無失其意蓋輕細微眇之漸必生乖忤之患不可不慎衛將軍之日盛於蓋侯近世之事語尚在於長老之耳唯將軍察焉久之上欲專委任鳳乃策嘉曰將軍家重身尊不宜以吏職自絫賜黃金二百斤以特進侯就朝位後歲餘薨諡曰恭侯后聰慧善史書自為妃至即位常寵於上後宮希得進見皇太后及帝諸舅憂上無繼嗣時又數有災異劉向谷永等皆陳其咎在於後宮上然其言於是省減椒房掖廷用度皇后乃上疏曰妾誇布服糲食加以幼稚愚惑不明義理幸得免離茅屋之下備後宮掃除蒙過誤之寵居非命所當託汙穢不修曠職尸官數逆至法踰越制度當伏放流之誅不足以塞責乃壬寅日大長秋受詔椒房儀法御服輿駕所發諸官署及所造作遺賜外家群臣妾皆如竟寧以前故事妾伏自念入椒房以來遺賜外家未嘗踰故事每輒決上可覆問也今誠時世異制長短相補不出漢制而已纖微之間未必可同若竟寧前與黃龍前豈相放哉家吏不曉今一受詔如此且使妾搖手不得今言無得發取諸官殆謂未央宮不屬妾不宜獨取也言妾家府亦不當得妾竊惑焉幸得賜湯沐邑以自奉養亦小發取其中何害於誼而不可哉又詔書言服御所造皆如竟寧前吏誠不能揆其意即且令妾被服所為不得不如前設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣此二事誠不可行唯陛下省察宦吏忮佷必欲自勝幸妾尚貴時猶以不急事操人況今日日益侵又獲此詔其操約人豈有所訴陛下見妾在椒房終不肯給妾纖微內邪若不私府小取將安所仰乎舊故中宮乃私奪左右之賤繒及發乘輿服繒言為待詔補已而貿易其中左右多竊怨者甚恥為之又故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記直豫言使后知之非可復若私府有所取也其萌牙所以約制妾者恐失人理今但損車駕及毋若未央宮有所發遺賜衣服如故事則可矣其餘誠太迫急奈何妾薄命端遇竟寧前竟寧前於今世而比之豈可耶故時酒肉有所賜外家輒上表乃決又故杜陵梁美人歲時遺酒一石肉百斤耳妾甚少之遺田八子誠不可若是事率衆多不可勝以文陳俟自見索言之唯陛下深察焉上於是采劉向谷永之言以報曰皇帝問皇后所言事聞之夫日者衆陽之宗天光之貴王者之象人君之位也夫以陰而侵陽虧其正體是非下陵上妻乘夫賤踰貴之變與春秋二百四十二年變異為衆莫若日蝕大自漢興日蝕亦為呂霍之屬見以今揆之豈有此等之效與諸侯拘迫漢制牧相執持之也又安獲齊趙七國之難將相大臣褱誠秉忠唯義是從又惡有上官博陸宣成之謀若乃徒步豪桀非有陳勝項梁之群也胸奴夷狄非有冒頓郅支之倫也方外內鄉百蠻賓服殊俗慕義八州懷德雖使其懷挾邪意猶不足憂又況其無乎求於夷狄無有求於臣下無有微後宮也當何以塞之日者建始元年正月白氣出於營室營室者天子之後宮也正月於尚書為皇極皇極者王氣之極也白者西方之氣其於春當廢今正於皇極之月興廢氣於後宮視后妾無能懷任保全者以著繼嗣之微賤人將起也至其九月流星如瓜出於文昌貫紫宮尾委曲如龍臨於鉤陳此又章顯前尤著在內也其後則有北宮井溢南流逆理數郡水出流殺人民後則訛言傳相驚震女童入殿咸莫覺知夫河者水陰四瀆之長今乃大決沒漂陵邑斯昭陰盛盈溢違經絶紀之應也乃昔之月鼠巢于樹野鵲變色五月庚子鳥焚其巢太山之域易曰鳥焚其巢旅人先笑後號咷喪牛于易凶言王者處民上如鳥之處巢也不顧恤百姓百姓畔而去之若鳥之自焚也雖先快意說笑其後必號而無及也百姓喪其君若牛亡其毛也故稱凶泰山王者易姓告代之處今正於岱宗之山甚可懼也三月癸未大風自西搖祖宗寢廟揚裂帷席折拔樹木頓僵車輦毀壞檻屋災及宗廟足為寒心四月己亥日蝕東井轉旋且索與既無異己猶戊也亥復水也明陰盛咎在內於戊己虧君體著絶世於皇極顯禍敗及京都於東井變怪衆備末重益大來數益甚成形之禍月以迫切不救之患日寖婁深咎敗灼灼若此豈可以忽哉書云高宗肜日粵有雊雉祖己曰惟先假王正厥事又曰雖休勿休惟敬五刑以成三德即飭椒房及掖庭耳今皇后有所疑便不便其條刺使大長秋來白之吏拘於法亦安足過蓋矯枉者過直古今同之且財幣之省特牛之祠其於皇后所以扶助德美為華寵也咎根不除災變相襲祖宗且不血食何戴侯也傳不云乎以約失之者鮮審皇后欲從其奢與朕亦當法孝武皇帝也如此則甘泉建章可復興矣世俗歲殊時變日化遭事制宜因時而移舊之非者何可放焉君子之道樂因循而重改作昔魯人為長府閔子騫曰仍舊貫如之何何必改作蓋惡之也詩云雖無老成人尚有典刑曾是莫聽大命以傾孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎皇后其刻心秉德毋違先后之制度力誼勉行稱順婦道減省群事謙約為右其孝東宮毋闕朔望推誠永究爰何不臧養名顯行以息衆歡垂則列妾使有法焉皇后深惟毋忽是時大將軍鳳用事威權尤盛其後比三年日蝕言事者頗歸咎於鳳矣而谷永等遂著之許氏許氏自知為鳳所不佑久之皇后寵亦益衰而後宮多新愛后姊平安剛侯夫人謁等為媚道祝謯後宮有身者王美人及鳳等事發覺太后大怒下吏考問謁等誅死許后坐廢處昭臺宮親屬皆歸故郡山陽后弟子平恩侯旦就國凡立十四年而廢在昭臺歲餘還徙長定宮後九年上憐許氏下詔曰蓋聞仁不遺遠誼不忘親前平安剛侯夫人謁坐大逆罪家屬幸蒙赦令歸故郡朕惟平恩戴侯先帝外祖魂神廢棄莫奉祭祀念之未嘗忘于心其還平恩侯旦及親屬在山陽郡者是歲廢后敗先是廢后姊孊寡居與定陵侯淳于長私通因為之小妻長紿之曰我能白東宮復立許后為左皇后廢后因孊私賂遺長數通書記相報謝長書有悖謾發覺天子使廷尉孔光持節賜廢后藥自殺葬延陵交道廄西孝成班倢妤帝初即位選入後宮始為少使蛾而大幸為倢妤居增成舍再就館有男數月失之成帝遊於後庭嘗欲與倢妤同輦載倢妤辭曰觀古圖畫賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班倢妤倢妤誦詩及窈窕德象女師之篇每進見上疏依則古禮自鴻嘉後上稍隆於內寵倢妤進侍者李平平得幸立為倢妤上曰始衛皇后亦從微起乃賜平姓曰衛所謂衛倢妤也其後趙飛燕姊弟亦從自微賤興隃越禮制寖盛於前班倢妤及許皇后皆失寵稀復進見鴻嘉三年趙飛燕譖告許皇后班倢妤挾媚道祝詛後宮詈及主上許皇后坐廢考問班倢妤倢妤對曰妾聞死生有命富貴在天修正尚未蒙福為邪欲以何望使鬼神有知不受不臣之訴如其無知訴之何益故不為也上善其對憐憫之賜黃金百斤趙氏姊弟驕妒倢妤恐久見危求共養太后長信宮上許焉倢妤退處東宮作賦目傷悼其辭曰承祖考之遺德兮何性命之淑靈登薄軀於宮闕兮充下陳於後庭蒙聖皇之渥惠兮當日月之盛明揚光烈之翕赫兮奉隆寵於增成既過幸於非位兮竊庶幾乎嘉時每寤寐而絫息兮申佩離以自思陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮哀褒閻之為郵美皇英之女虞兮榮任姒之母周雖愚陋其靡及兮敢舍心而忘茲歷年歲而悼懼兮閔蕃華之不滋痛陽祿與柘館兮仍繈褓而離災豈妾人之殃咎兮將天命之不可求白日忽已移光兮遂暗莫而昧幽猶被覆載之厚德兮不廢捐於罪郵奉共養于東宮兮託長信之末流共灑掃於帷幄兮永終死以為期願歸骨於山足兮依松柏之餘休重曰潛玄宮兮幽以清應門閉兮禁闥扃華殿塵兮玉階菭中庭萋兮緑草生廣室陰兮帷幄暗房櫳虛兮風泠泠感帷裳兮發紅羅紛綷縩兮紈素聲神眇眇兮密靚處君不御兮誰為榮俯視兮丹墀思君兮履綦仰視兮雲屋雙涕兮橫流顧左右兮和顏酌羽觴兮銷憂惟人生兮一世忽一過兮若浮已獨享兮高明處生民兮極休勉虞精兮極樂與福祿兮無期緑衣兮白華自古兮有之至成帝崩倢妤充奉園陵薨因葬園中孝成趙皇后本長安宮人初生時父母不舉三日不死乃收養之及壯屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而說之召入宮大幸有女弟復召入俱為倢妤貴傾後宮許后之廢也上欲立趙倢妤皇太后嫌其所出微甚難之太后姊子淳于長為侍中數往來傳語得太后指上立封趙倢妤父臨為成陽侯後月餘乃立倢妤為皇后追以長前白罷昌陵功封為定陵侯皇后既立後寵少衰而弟絶幸為昭儀居昭陽舍其中庭彤朱而殿上髤漆切皆銅沓黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未嘗有焉姊弟顓寵十餘年卒皆無子末年定陶王來朝王祖母傅太后私賂遺趙皇后昭儀定陶王竟為太子明年春成帝崩帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊昏夜平善鄉晨傅褲襪欲起因失衣不能言畫漏上十刻而崩民間歸罪趙昭儀皇太后詔大司馬莽丞相大司空曰皇帝暴崩群衆歡譁怪之掖庭令輔等在後庭左右侍燕迫近雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺哀帝既立尊趙皇后為皇太后封太后弟侍中駙馬都尉欽為新成侯趙氏侯者凡二人後數月司隸解光奏言臣聞許美人及故中宮史曹宮皆御幸孝成皇帝産子子隱不見臣遣從事掾業史望驗問知狀者掖庭獄丞籍武故中黃門王舜吳恭靳嚴官婢曹曉道房張棄故趙昭儀御者于客子王偏臧兼等皆曰宮即曉子女前屬中宮為學事史通詩授皇后房與宮對食元延元年中宮語房曰陛下幸宮後數月曉入殿中見宮腹大問宮宮曰御幸有身其十月中宮乳掖庭牛官令舍有婢六人中黃門田客持詔記盛緑綈方底封御史中丞印豫武曰取牛官令舍婦人新産兒婢六人盡置暴室獄毋問兒男女誰兒也武迎置獄宮曰善臧我兒胞丞知是何等兒也後三日客持詔記與武問兒死未手書對牘背武即書對兒見在未死有頃客出曰上與昭儀大怒奈何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復持詔記豫武曰今夜漏上五刻持兒與舜會東交掖門武因問客陛下得武書意何如曰瞪也武以兒付舜舜受詔內兒殿中為擇乳母告善養兒且有賞毋令漏泄舜擇棄為乳母時兒生八九日後三日客復持詔記封如前豫武中有封小緑篋記曰告武以篋中物書豫獄中婦人武自臨飲之武發篋中有裹藥二枚赫蹄書曰告偉能努力飲此藥不可復入女自知之偉能即宮宮讀書已曰果也欲姊弟擅天下我兒男也額上有壯髮類孝元皇帝今兒安在危殺之矣奈何令長信得聞之宮飲藥死後宮婢六人召入出語武曰昭儀言女無過寧自殺邪若外家也我曹言願自殺即自繆死武皆表奏狀棄所養兒十一日宮長李南以詔書取兒去不知所置許美人前在上林涿沐館數召入飾室中若舍一歲再三召留數月或半歲御幸元延二年褱子其十一月乳詔使嚴持乳醫及五種和藥丸三送美人所後客子偏兼聞昭儀謂成帝曰常紿我言從中宮來即從中宮來許美人兒何從生中許氏竟當復立邪懟以手自搗以頭擊壁戶柱從床上自投地啼泣不肯食曰今當安置我欲歸耳帝曰今故告之反怒為殊不可曉也帝亦不食昭儀曰陛下自知是不食為何陛下常自言約不負女今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使嚴持緑囊書豫許美人告嚴曰美人當有以豫女受來置飾室中簾南美人以葦篋一合盛所生兒緘封及緑囊報書豫嚴嚴持篋書置飾室簾南去帝與昭儀坐使客子解篋緘未已帝使客子偏兼皆出自閉戶獨與昭儀在須臾開戶呼客子偏兼使緘封篋及緑綈方底推置屏風東恭受詔持篋方底豫武皆封以御史中丞印曰告武篋中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中故長定許貴人及故成都平阿侯家婢王業任孋公孫習前免為庶人詔召人屬昭儀為私婢成帝崩未幸梓宮倉卒悲哀之時昭儀自知罪惡大知業等故許氏王氏婢恐事泄而以大婢羊子等賜豫業等各且十人以慰其意屬無道我家過失元延二年五月故掖庭令吾丘遵謂武曰掖庭丞吏以下皆與昭儀合通無可與語者獨欲與武有所言我無子武有子是家輕族人得無不敢乎掖庭中御幸生子者輒死又飲藥傷墯者無數欲與武共言之大臣票騎將軍貪耆錢不足計事奈何令長信得聞之遵後病困謂武今我已死前所語事武不能獨為也慎語皆在今年四月丙辰赦令前臣謹案永光三年男子忠等發長陵傅夫人冢事更大赦孝元皇帝下詔曰此朕不當所得赦也窮治盡伏辜天下以為當魯嚴公夫人殺世子齊桓召而誅焉春秋豫之趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅前平安剛侯夫人謁坐大逆同産當坐以蒙赦令歸故郡今昭儀所犯尤悖逆罪重於謁而同産親屬怕在尊貴之位迫近幃幄群下寒心非所以懲惡崇誼示四方也請事窮竟丞相以下議正法哀帝於是免新成侯趙欽欽兄子成陽侯欣皆為庶人將家屬徙遼西郡時議郎耿育上疏言臣聞繼嗣失統廢適立庶聖人法禁古今至戒然大伯見歷知適逡循固讓委身吳粵權變所設不計常法致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道德最備是以尊號追及大王故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歲之後未能持國權柄之重制於女主女主驕盛則耆欲無極少主幼弱則大臣不使世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之德仁孝子愛之恩懷獨見之明內斷於身故廢後宮就館之漸絶微嗣禍亂之根乃欲致位陛下以安宗廟愚臣既不能深援安危定金匱之計又不知推演聖德述先帝之志乃反覆校省內暴露私燕誣汙先帝傾惑之過成結寵妾妒媚之誅甚失賢聖遠見之明逆負先帝憂國之意夫論大德不拘俗立大功不合衆此乃孝成皇帝至思所以萬萬於衆臣陛下聖德盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且褒廣將順君父之美匡救銷滅既往之過古今通義也事不當時固爭防禍於未然各隨指阿從以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世遠聞百蠻近布海內甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察哀帝為太子亦頗得趙太后力遂不竟其事傅太后恩趙太后趙太后亦歸心故成帝母及王氏皆怨之哀帝崩王莽白太后詔有司曰前皇太后與昭儀俱侍帷幄姊弟專寵錮寢執賊亂之謀殘滅繼嗣以危宗廟悖天犯祖無為天下母之義貶皇太后為孝成皇后徙居北宮後月餘復下詔曰皇后自知罪惡深大朝請希闊失婦道無共養之禮而有狼虎之毒宗室所怨海內之讎也而尚在小君之位誠非皇天之心夫小不忍亂大謀恩之所不能已者義之所割也今廢皇后為庶人就其園是日自殺凡立十六年而誅先是有童謠曰燕燕尾涏涏張公子時相見木門倉琅根燕飛來啄皇孫皇孫死燕啄矢成帝每微行出常與張放俱而稱富平侯家故曰張公子倉琅根宮門銅鍰也孝元傅昭儀哀帝祖母也父河內溫人蚤卒母更嫁為魏郡鄭翁妻生男惲昭儀少為上官太后才人自元帝為太子得進幸元帝即位立為倢妤甚有寵為人有材略善事人下至宮人左右飲酒酹地皆祝延之産一男一女女為平都公主男為定陶恭王恭王有材藝尤愛於上元帝既重傅倢妤及馮倢妤亦幸生中山孝王上欲殊之於後宮以二人皆有子為王上尚在未得稱太后乃更號曰昭儀賜以印綬在倢妤上昭其儀尊之也至成哀時趙昭儀董昭儀皆無子猶稱焉元帝崩傅昭儀隨王歸國稱定陶太后後十年恭王薨子代為王王母曰丁姬傅太后躬自養視既壯大成帝無繼嗣時中山孝王在元延四年孝王及定陶王皆入朝傅太后多以珍寶賂遺趙昭儀及帝舅票騎將軍王根陰為王求漢嗣皆見上無子欲豫自結為久長計更稱譽定陶王上亦自器之明年遂徵定陶王立為太子語在哀紀月餘天子立楚孝王孫景為陶王奉恭王後太子議欲謝少傅閻崇以為春秋不以父命廢王父命為人後之禮不得顧私親不當謝太傅趙玄以為當謝太子從之詔問所以謝狀尚書劾奏玄左遷少府以光祿勳師丹為太傅詔傅太后與太子母丁姬自居定陶國邸下有司議皇太子得與傅太后丁姬相見不有司奏議不得相見頃之成帝母王太后欲令傅太后丁姬十日一至太子家成帝曰太子丞正統當共養陛下不得復顧私親王太后曰太子小而傅太后抱養之今至太子家以乳母恩耳不足有所妨於是令傅太后得至太子家丁姬以不小養太子獨不得成帝崩哀帝即位王太后詔令傅太后丁姬十日一至未央宮高昌侯董宏希指上書言宜立丁姬為帝太后師丹劾奏宏懷邪誤朝不道上初即位謙讓從師丹言止後乃白令王太后下詔尊定陶恭王為恭皇哀帝因是曰春秋母以子貴尊傅太后為恭皇太后丁姬為恭皇后各置左右詹事食邑如長信宮中宮追尊恭皇太后父為崇祖侯恭皇后父為褒德侯後歲餘遂下詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶其尊恭皇太后為帝太太后丁后為帝太后後又更號帝太太后為皇太太后稱永信宮帝太后稱中安宮而成帝母太皇太后本稱長信宮成帝趙后為皇太后並四太后各置少府太僕秩皆中二千石為恭皇立寢廟於京師比宣帝父悼皇考制度序昭穆於前殿傅太后父同産弟四人曰子孟中叔子元幼君子孟子喜至大司馬封高武侯中叔子晏亦大司馬封孔鄉侯幼君子商封汝昌侯為太后父崇祖侯後更號崇祖曰汝昌哀侯太后同母弟鄭惲前死以惲子業為陽信侯追尊惲為陽信節侯鄭氏傅氏侯者凡六人大司馬二人九卿二千石六人侍中諸曹十餘人傅太后既尊後尤驕與成帝母語至謂之嫗與中山孝王母馮太后並事元帝追怨之陷以祝詛罪令自殺元壽元年崩合葬渭陵稱孝元傅皇后云定陶丁姬哀帝母也易祖師丁將軍之玄孫家在山陽瑕丘父至廬江太守始定陶恭王先為山陽王而丁氏內其女為姬王后姓張氏其母鄭禮即傅太后同母弟也太后以親戚故欲其有子然終無有唯丁姬河平四年生哀帝丁姬為帝太后兩兄忠明明以帝舅封陽安侯忠蚤死封忠子滿為平周侯太后叔父憲望望為左將軍憲為太僕明為大司馬票騎將軍輔政丁氏侯者凡二人大司馬一人將軍九卿二千石六人侍中諸曹亦十餘人丁傅以一二年間暴興尤盛然哀帝不甚假以權勢權勢不如王氏在成帝世也建平二年丁太后崩上曰詩云穀則異室死則同穴昔季武子成寢杜氏之墓在西階下請合葬而許之附葬之禮自周興焉季子事亡如事存帝太后宜起陵恭皇之園遣大司馬票騎將軍明東送葬于定陶貴震山東哀帝崩王莽秉政使有司舉奏丁傅罪惡莽以太皇太后詔皆免官爵丁氏徙歸故郡莽奏貶傅太后號為定陶共陶共王母丁太后號曰丁姬元始五年葬復言共王母丁姬前不臣妾至葬渭陵冢高與元帝山齊懷帝太后皇太太后璽綬以葬不應禮禮有改葬請發共王母及丁姬冢取其璽綬消滅徙共王母及丁姬歸定陶葬共王冢次而葬丁姬復其故太后以為既已之事不須復發莽固爭之太后詔曰因故棺為致椁作冢祠以太牢謁者護既發傅太后冢崩壓殺數百人開丁姬椁戶火出炎四五丈吏卒以水沃滅乃得入燒燔椁中器物莽復奏言前共王母生僭居桂宮皇天震怒災其正殿丁姬死葬踰制度今火焚其椁此天見變以告當改如媵妾也臣前奏請葬丁姬復故非是共王母及丁姬棺皆名梓宮珠玉之衣非藩妾服請更以木棺代去珠玉衣葬丁姬媵妾之次奏可既開傅太后棺臭聞數里公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平共王母丁姬故冢二旬間皆平莽又周棘其處以為世戒云時有群燕數千銜土投丁姬穿中丁傅既敗孔鄉侯將家屬徙合浦宗族皆歸故郡唯高武侯喜得全自有傳孝哀傅皇后定陶太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為漢太子傅氏女為妃哀帝即位成帝大行尚在前殿而傅太后封傅妃父晏為孔鄉侯與帝舅陽安侯丁明同日俱封時師丹諫以為天下自王者所有親戚何患不富貴而倉卒若是其不久長矣晏封後月餘傅妃立為皇后傅氏既盛晏最尊重哀帝崩王莽白太皇太后下詔曰定陶共王太后與孔鄉侯晏同心合謀背恩忘本專恣不軌與至尊同稱號終沒至乃配食於左坐悖逆無道今令孝哀皇后退就桂宮後月餘復與孝成趙皇后俱廢為庶人就其園自殺孝元馮昭儀平帝祖母也元帝即位二年以選入後宮時父奉世為執金吾昭儀始為長使數月至美人後五年就館生男拜為倢妤時父奉世為右將軍光祿勳奉世長男野王為左馮翊父子並居朝廷議者以為器能當其位非用女寵故也而馮倢妤內寵與傅昭儀等建昭中上幸虎圈鬭獸後宮皆坐熊佚出圈攀檻欲上殿左右貴人傅昭儀等皆驚走馮倢妤直前當熊而立左右格殺熊上問人情驚懼何故前當熊倢妤對曰猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉傅昭儀等皆慚明年夏馮倢妤男立為信都王尊倢妤為昭儀元帝崩為信都太后與王俱居儲元宮河平中隨王之國後徙中山是為孝王後徵定陶王為太子封中山王舅參為宜鄉侯參馮太后少弟也是歲孝王薨有一男嗣為王時未滿歲有眚病太后自養視數禱祠解哀帝即位遣中郎謁者張由將醫治中山小王由素有狂易病病發怒去西歸長安尚書簿責擅去狀由恐因誣言中山太后祝詛上及太后太后即傅昭儀也素常怨馮太后因是遣御史丁玄案驗盡收御者官吏及馮氏昆弟在國者百餘人分繫雒陽魏郡巨鹿數十日無所得更使中謁者令史立與丞相長史大鴻臚丞雜治立受傅太后指幾得封侯治馮太后女弟習及寡弟婦君之死者數十人巫劉吾服祝詛醫徐遂成言習君之曰武帝時醫修氏刺治武帝得二千萬耳今愈上不得封侯不如殺上令中山王代可得封立等劾奏祝詛謀反大逆責問馮太后無服辭立曰熊之上殿何其勇今何怯也太后還謂左右此乃中語前世事吏何用知之是欲陷我效也乃飲藥自殺先未死有司請誅之上不忍致法廢為庶人徙雲陽宮既死有司復奏太后死在未廢前有詔以諸侯王太后儀葬之宜鄉侯參君之習夫及子當相坐者或自殺或伏法參女辨為孝王后有兩女有司奏免為庶人與馮氏宗族徙歸故郡張由以先告賜爵關內侯史立遷中太僕哀帝崩大司徒孔光奏由前誣告骨肉立陷人入大辟為國家結怨於天下以取秩遷獲爵邑幸蒙赦令請免為庶人徙合浦云中山衛姬平帝母也父子豪中山盧奴人官至衛尉子豪女弟為宣帝倢妤生楚孝王長女又為元帝倢妤生平陽公主成帝時中山孝王無子上以衛氏吉祥以子豪少女配孝王元延四年生平帝平帝年二歲孝王薨代為王哀帝崩無嗣太皇太后與新都侯莽迎中山王立為帝莽欲顓國權懲丁傅行事以帝為成帝後母衛姬及外家不當得至京師乃更立宗室桃鄉侯子成都為中山王奉孝王後遣少傅左將軍甄豐賜衛姬璽綬即拜為中山孝王后以苦陘縣為湯沐邑又賜帝舅衛寶寶弟玄爵關內侯賜帝三妹謁臣號修義君哉皮為承禮君鬲子為尊德君食邑各二千戶莽長子宇非莽隔絶衛氏恐久後受禍即私與衛寶通書記教衛后上書謝恩因陳丁傅舊惡幾得至京師莽白太皇太后詔有司曰中山孝王后深分明為人後之義條陳故定陶傅太后丁姬悖天逆理上僭位號徙定陶王於信都為共王立廟於京師如天子制不畏天命侮聖人言壞亂法度居非其制稱非其號是以皇天震怒火燒其殿六年之間大命不遂禍殃仍重竟令孝哀帝受其餘災大失天心夭命暴崩又令共王祭祀絶廢精魂無所依歸朕惟孝王后深說經義明鏡聖法懼古人之禍敗近事之咎殃畏天命奉聖言是乃久保一國長獲天祿而令孝王永享無疆之祀福祥之大者也朕甚嘉之夫褒義賞善聖王之制其以中山故安戶七千益中山后湯沐邑加賜及中山王黃金各百斤增傅相以下秩衛后日夜啼泣思見帝而但益戶邑宇復教令上書求至京師會事發覺莽殺宇盡誅衛氏支屬衛寶女為中山王后免后徙合浦唯衛后在王莽篡國廢為家人後歲餘卒葬孝王旁孝平王皇后安漢公太傅大司馬莽女也平帝即位年九歲成帝母太皇太后稱制而莽秉政莽欲依霍光故事以女配帝太后意不欲也莽設變詐令女必入因以自重事在莽傳太后不得已而許之遣長樂少府夏侯藩宗正劉宏少府宗伯鳳尚書令平晏納采太師光大司徙馬宮大司空甄豐左將軍孫建執金吾尹賞行太常事太中大夫劉歆及太卜太史令以下四十九人賜皮辨素績以禮雜卜筮太牢祠宗廟待吉月日明年春遣大司徒宮大司空豐左將軍建右將軍甄邯光祿大夫歆奉乘輿法駕迎皇后於安漢公第宮豐歆授皇后璽紱登車稱警蹕便時上林延壽門入未央宮前殿群臣就位行禮大赦天下益封父安漢公地滿百里賜迎皇后及行禮者自三公以下至騶宰執事長樂未央宮安漢公第者皆增秩賜金帛各有差皇后立三月以禮見高廟尊父安漢公號曰宰衡位在諸侯王上賜公夫人號曰功顯君食邑封公子安為褒新侯臨為賞都侯后立歲餘平帝崩莽立孝宣帝玄孫嬰為孺子莽攝帝位尊皇后為皇太后三年莽即真以嬰為定安公改皇太后號為定安公太后太后時年十八矣為人婉瘱有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之乃更號為黃皇室主令立國將軍成新公孫建世子襐飾將醫往問疾后大怒笞鞭其旁侍御因發病不肯起莽遂不復彊也及漢兵誅莽燔燒未央宮后曰何面目以見漢家自投火中而死贊曰易著吉凶而言謙盈之效天地鬼神至于人道靡不同之夫女寵之興繇至微而體至尊窮富貴而不以功此固道家所畏禍福之宗也序自漢興終于孝平外戚後庭色寵者聞二十有餘人然其保位全家者唯文景武帝太后及邛成后四人而已至如史良娣王悼后許恭哀后身皆夭折不辜而家依託舊恩不敢縱恣是以能全其餘大者夷滅小者放流烏呼鑒茲行事變亦備矣
