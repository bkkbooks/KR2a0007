body:
  text: 胸奴傳第六十四下呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民間者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆奇與右賢王共立日逐王薄胥堂屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭明年秋屠耆單于使日逐王先賢撣兄右奧鞬王為烏藉都尉各二萬騎屯東方以備呼韓邪單于是時西方呼揭王來與唯犂當戶謀共讒右賢王言欲自立為烏藉單于屠耆單于殺右賢王父子後知其冤復殺唯犁當戶於是呼揭王恐遂畔去自立為呼揭單于右奧鞬王聞之即自立為車犁單于烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自將兵東擊車犁單于使都隆奇擊烏藉烏藉車犁皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犁單于屠耆單于聞之使左大將都尉將四萬騎分屯東方以備呼韓邪單于自將四萬騎西擊車犁單于車犁單于敗西北走屠耆單于即引西南留闟敦地其明年呼韓邪單于遣其弟右谷蠡王等西襲屠耆單于屯兵殺略萬餘人屠耆單于聞之即自將六萬騎擊呼韓邪單于行千里未至嗕姑地逢呼韓邪單于兵可四萬人合戰屠耆單于兵敗自殺都隆奇乃與屠耆少子右谷蠡王姑瞀樓頭亡歸漢車犁單于東降呼韓邪單于呼韓邪單于左大將烏厲屈與父呼遫纍烏厲溫敦皆見胸奴亂率其衆數萬人南降漢封烏厲屈為新城侯烏厲溫敦為義陽侯是時李陵子復立烏藉都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從休旬王將所主五六百騎擊殺左大且渠并其兵至右地自立為閏振單于在西邊其後呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊其後二年閏振單于率其衆東擊郅支單于郅支單于與戰殺之并其兵遂進攻呼韓邪呼韓邪破其兵走郅支都單于庭呼韓邪之敗也左伊秩訾王為呼韓邪計勸令稱臣入朝事漢從漢求助如此胸奴乃定呼韓邪議問諸大臣皆曰不可胸奴之俗本上氣力而下服役以馬上戰鬭為國故有威名於百蠻戰死壯士所有也今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國漢雖彊猶不能兼并胸奴奈何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然彊弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮侯單于以來胸奴日削不能取復雖屈彊於此未嘗一日安也今事漢則安存不事則危亡計何以過此諸大人相難久之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍郅支單于亦遣子右大將駒于利受入侍是歲甘露元年也明年呼韓邪單于款五原塞願朝三年正月漢遣車騎都尉韓昌迎發過所七郡郡二千騎為陳道上單于正月朝天子于甘泉宮漢寵以殊禮位在諸侯王上贊謁稱臣而不名賜以冠帶衣裳黃金璽盩綬玉具劍佩刀弓一張矢四發棨戟十安車一乘鞍勒一具馬十五匹黃金二十斤錢二十萬衣被七十七襲錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平上自甘泉宿池陽宮上登長平詔單于毋謁其左右當戶之群臣皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬歲單于就邸留月餘遣歸國單于自請願留居光祿塞下有急保漢受降城漢遣長樂衛尉高昌侯董忠車騎都尉韓昌將騎萬六千又發邊郡士馬以千數送單于出朔方雞鹿塞詔忠等留衛單于助誅不服又轉邊穀米糒前後三萬四千斛給贍其食是歲郅支單于亦遣使奉獻漢遇之甚厚明年兩單于俱遣使朝獻漢待呼韓邪使有加明年呼韓邪單于復入朝禮賜如初加衣百一十襲錦帛九千匹絮八十斤以有屯兵故不復發騎為送始郅支單于以為呼韓邪降漢兵弱不能復自還即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支殺之并其兵五萬餘人聞漢出兵穀助呼韓邪即遂留居右地自度力不能定胸奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠見呼韓邪為漢所擁郅支亡虜欲攻之以稱漢乃殺郅支使持頭送都護在所發八十千騎迎郅支郅支見烏孫兵多其使又不反勒兵逢擊烏孫破之因北擊烏揭烏揭降發其兵西破堅昆北降丁令并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之元帝初即位呼韓邪單于復上書言民衆困乏漢詔雲中五原郡轉穀二萬斛以給焉郅支單于自以道遠又怨漢擁護呼韓邪遣使上書求侍子漢遣谷吉送之郅支殺吉漢不知吉音問而胸奴降者言聞甌脫皆殺之呼韓邪單于使來漢輒簿責之甚急明年漢遣車騎都尉韓昌光祿大夫張猛送呼韓邪單于侍子求問吉等因赦其罪勿令自疑昌猛見單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支聞其大臣多勸于北歸者恐北去後難約束昌猛即與為盟約曰自今以來漢與胸奴合為一家世世毋得相詐相攻有竊盜者相報行其誅償其物有寇發兵相助漢與胸奴敢先背約者受天不祥令其世世子孫盡如盟昌猛與單于及大臣俱登胸奴諾水東山刑白馬單于以徑路刀金留犁撓酒以老上單于所破月氏王頭為飲器者共飲血盟昌猛還奏事公卿議者以為單于保塞為藩雖欲北去猶不能為危害昌猛擅以漢國世世子孫與夷狄詛盟令單于得以惡言上告于天羞國家傷威重不可得行宜遣使往告祠天與解盟昌猛奉使無狀罪至不道上薄其過有詔昌猛以贖論勿解盟其後呼韓邪竟北歸庭人衆稍稍歸之國中遂定郅支既殺使者自知負漢又聞呼韓邪益彊恐見襲擊欲遠去會康居王數為烏孫所困與諸翕侯計以為胸奴大國烏孫素服屬之今郅支單于困厄在外可迎置東邊使合兵取烏孫以立之長無胸奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大說遂與相結引兵而西康居亦遣貴人橐它驢馬數千匹迎郅支郅支人衆中寒道死餘財三千人到康居其後都護甘延壽與副陳湯發兵即康居誅斬郅支語在延壽湯傳郅支既誅呼韓邪單于且喜且懼上書言曰常願謁見天子誠以郅支在西方恐其與烏孫俱來擊臣以故未得至漢今郅支已伏誅願入朝見竟寧元年單于復入朝禮賜如初加衣服錦帛絮皆倍於黃龍時單于自言願壻漢氏以自親元帝以後宮良家子王牆字昭君賜單于單于歡喜上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應曰周秦以來胸奴暴桀寇侵邊境漢興尤被其害臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙胸奴來寇少所蔽隱從塞以南徑深山谷往來差難邊長老言胸奴失陰山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆胸奴胸奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順彊則驕逆天性然也前以罷外城省亭隧今裁足以侯望通烽火而已古者安不忘危不可復罷二也中國有禮義之教刑罰之誅愚民猶尚犯禁又況單于能必其衆不犯約哉三也自中國尚建梁以制諸侯所以絶臣下之覬欲也設塞徼置屯戍非獨為胸奴而已亦為諸屬國降民本故胸奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔世世不絶今罷乘塞則生嫚易分爭之漸五也往者從軍多沒不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰聞胸奴中樂無奈侯望急何然時有亡出塞者七也盜賊桀黠群輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木柴僵落溪谷水門稍稍平之卒徒築治功費久遠不可勝計臣恐議者不深慮其終始欲以一切省繇戍十年之外百歲之內卒有它變障塞破壞亭隧滅絶當更發屯繕治纍世之功不可卒復九也如罷戍卒省侯望單于自以保塞守御必深德漢請求無已小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事使車騎將軍口諭單于曰單于上書願罷北邊吏士屯戍子孫世世保塞單于鄉幕禮義所以為民計者甚厚此長久之策也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為寇害故明法度以專衆心也敬諭單于之意朕無疑焉為單于怪其不罷故使大司馬車騎將軍嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞅鞅呼韓邪疑之左伊秩訾懼誅將其衆千餘人降漢漢以為關內侯食邑三百戶令佩其王印綬及竟寧中呼韓邪來朝與伊秩訾相見謝曰王為我計甚厚令胸奴至今安寧王之力也德豈可忘我失王意使王去不復顧留皆我過也今欲白天子請王歸庭伊秩訾曰單于賴天命自歸於漢得以安寧單于神靈天子之祐也我安得力既已降漢又復歸胸奴是兩心也願為單于侍使於漢不敢聽命單于固請不能得而歸王昭君號寧胡閼氏生一男伊屠智牙師為右日逐王呼韓邪立二十八年建始二年死始呼韓邪嬖左伊秩兄呼衍王女二人長女顓渠閼氏生二子長曰且莫車次曰囊知牙斯少女為大閼氏生四子長曰雕陶莫皋次曰且麋胥皆長於且莫車少子咸樂二人皆小於囊知牙斯又它閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車其母顓渠閼氏曰胸奴亂十餘年不絶如髮賴蒙漢力故得復安今平定未久人民創艾戰鬭且莫車年少百姓未附恐復危國我與大閼氏一家共子不如立雕陶莫皋大閼氏曰且莫車雖少大臣共持國事今舍貴立賤後世必亂單于卒從顓渠閼氏計立雕陶莫皋約令傳國與弟呼韓邪死雕陶莫皋立為復株絫若鞮單于復株絫若鞮單于立遣子右致盧兒王醯諧屠奴侯入侍以且麋胥為左賢王且莫車為左谷蠡王囊知牙斯為右賢王復株絫單于復妻王昭君生二女長女云為須卜居次小女為當于居次河平元年單于遣右皋林王伊邪莫演等奉獻朝正月既罷遣使者送至蒱反伊邪莫演言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為漢興胸奴數為邊害故設金爵之賞以待降者今單于詘體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏不親邊吏或者設為反間欲因而生隙受之適合其策使得歸曲而直責此誠邊竟安危之原師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使明年單于上書願朝河平四年正月遂入朝加賜錦繡繒帛二萬匹絮二萬斤它如竟寧時復株絫單于立十歲鴻嘉元年死弟且麋胥立為搜諧若鞮單于搜諧單于立遣子左祝都韓王朐留斯侯入侍以且莫車為左賢王搜諧單于立八歲元延元年為朝二年發行未入塞病死弟且莫車立為車牙若鞮單于車牙單于立遣子石於涂仇撣王烏夷當入侍以囊知牙斯為左賢王車牙單于立四歲綏和元年死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以第二閼氏子樂為左賢王以第五閼氏子輿為右賢王遺子右股奴王烏鞮牙斯入侍漢遣中郎將夏侯藩副校尉韓容使胸奴時帝舅大司馬票騎將軍王根領尚書事或說根曰胸奴有斗入漢地直張掖郡生奇材木箭竿就羽如得之於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利上直欲從單于求之為有不得傷命損威根即但以上指曉藩令從藩所說而求之藩至胸奴以語次說單于曰竊見胸奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望久勞單于宜上書獻此地直斷閼之省兩都尉士卒數百人以復天子厚恩其報必大單于曰此天子詔語邪將從使者所求也藩曰詔指也然藩亦為單于畫善計耳單于曰孝宣孝元皇帝哀憐父呼韓邪單于從長城以北胸奴有之此溫偶駼王所居地也未曉其形狀所生請遣使問之藩容歸漢後復使胸奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也已問溫偶駼王胸奴西邊諸侯作穹廬及車皆仰此山材木且先父地不敢失也藩還遷為太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔從單于求地法當死更大赦二今徙藩為濟南太守不令當胸奴明年侍子死歸葬復遣子左於駼仇撣王稽留昆入侍至哀帝建平二年烏孫庶子卑援疐翕侯人衆入胸奴西界寇盜牛畜頗殺其民單于聞之遣左大當戶烏夷泠將五千騎擊烏孫殺數百人略千餘人驅牛畜去卑援疐恐遣子趨逯為質胸奴單于受以狀聞漢遣中郎將丁野林副校尉公乘音使胸奴責讓單于告令還歸卑援疐質子單于受詔遣歸建平四年單于上書願朝五年時哀帝被疾或言胸奴從上游來厭人自黃龍竟寧時單于朝中國輒有大故上由是難之以問公卿亦以為虛費府帑可且勿許單于使辭去未發黃門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰二者皆微然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與胸奴從此隙矣本北地之狄五帝所不能臣三王所不能制其不可使隙甚明臣不敢遠稱請引秦以來明之以秦始皇之彊蒙恬之威帶甲四十餘萬然不敢窺西河乃築長城以界之會漢初興以高祖之威靈三十萬衆困於平城士或七日不食時奇譎之士石畫之臣甚衆卒其所以脫者世莫得而言也又高皇后嘗忿胸奴群臣庭議樊噲請以十萬衆橫行胸奴中季布曰噲可斬也妄阿順指於是大臣權書遺之然後胸奴之結解中國之憂平及孝文時胸奴侵暴北邊侯騎至雍甘泉京師大駭發三將軍屯細柳棘門霸上以備之數月乃罷孝武即位設馬邑之權欲誘胸奴使韓安國將三十萬衆徼於便墬胸奴覺之而去徒費財勞師一虜不可得見況單于之面乎其後深惟社稷之計規恢萬載之策乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破置顏襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨翰海虜名王貴人以百數自是之後胸奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不一勞者不久佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初胸奴有桀心欲掠烏孫侵公主乃發五將之師十五萬騎獵其南而長羅侯以烏孫五萬騎震其西皆至質而還時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩將軍故北狄不服中國未得高枕安寢也逮至元康神爵之間大化神明鴻恩溥洽而胸奴內亂五單于爭立日逐呼韓邪攜國歸化扶伏稱臣然尚羈縻之計不顓制自此之後欲朝者不距不欲者不彊何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡其彊難詘其和難得故未服之時勞師遠攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城蹈烏桓之壘探姑繒之璧籍蕩姐之場艾朝鮮之旃拔兩越之旗近不過旬月之役遠不離二時之勞固已犁其庭掃其閭郡縣而置之雲徹席卷後無餘菑唯北狄為不然真中國之堅敵也三垂比之懸矣前世重之茲甚未易可輕也今單于歸義懷款誠之心欲離其庭陳見於前此乃上世之遺策神靈之所想望國家雖費不得已者也奈何距以來厭之辭疏以無日之期消往昔之恩開將來之隙夫款而隙之使有恨心負前言緣往辭歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聽於無聲誠先於未然即蒙恬樊噲不復施棘門細柳不復備馬邑之策安所設衛霍之功何得用五將之威安所震不然一有隙之後雖智者勞心於內辨者轂擊於外猶不若未然之時也且往者圖西域制車師置城郭都護三十六國費歲以大萬計者豈為康居烏孫能踰白龍堆而寇西邊哉乃以制胸奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邊萌之禍書奏天子寤焉召還胸奴使者更報單于書而許之賜雄帛五十匹黃金十斤單于未發會病復遣使願朝明年故事單于朝從名王以下及從者二百餘人單于又上書言蒙天子神靈人民盛壯願從五百人入朝以明天子盛德上皆許之元壽二年單于來朝上以太歲厭勝所在舍之上林苑蒲陶宮告之以加敬於單于單于知之加賜衣三百七十襲錦繡繒帛三萬匹絮三萬斤它如河平時既罷遣中郎將韓況送單于單于出塞到休屯井北度車田盧水道里回遠況等乏食單于乃給其糧失期不還五十餘日初上遣稽留昆隨單于去到國復遣稽留昆同母兄右大且方與婦入侍還歸復遣且方同母兄左日逐王都與婦入侍是時漢平帝幼太皇太后稱制新都侯王莽秉政欲說太后以威德至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚會西域車師後王句姑去胡來王唐兜皆怨恨都護校尉將妻子人民亡降胸奴語在西域傳單于受置左谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆王昌副校尉甄阜侍中謁者帛敞長水校尉王歙使胸奴告單于曰西域內屬不當得受今遣之單于曰孝宣孝元皇帝哀憐為作約束自長城以南天子有之長城以北單于有之有犯塞輒以狀聞有降者不得受臣知父呼韓邪單于蒙無量之恩死遺言曰有從中國來降者勿受輒送至塞以報天子厚恩此外國也得受之使者曰胸奴骨肉相攻國幾絶蒙中國大恩危亡復續妻子完安纍世相繼宜有以報厚恩單于叩頭謝罪執二虜還付使者詔使中郎將王萌待西域惡都奴界上逆受單于遣使送到國因請其罪使者以聞有詔不聽會西域諸國王斬以示之乃造設四條中國人亡入胸奴者烏孫亡降胸奴者西域諸國佩中國印綬降胸奴者烏桓降胸奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使胸奴班四條與單于雜函封付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大說白太后遣使者答諭厚賞賜焉漢既班四條後護烏桓使者告烏桓民毋得復與胸奴皮布稅胸奴以故事遣使者責烏桓稅胸奴人民婦女欲賈販者皆隨往焉鳥桓距曰奉天子詔條不當豫胸奴稅胸奴使怒收烏桓酋豪縛到懸之酋豪昆弟怒共殺胸奴使及其官屬收略婦女馬牛單于聞之遣使發左賢王兵入烏桓責殺使者因攻擊之烏桓分散或走上山或東保塞胸奴頗殺人民驅婦女弱小且千人去置左地告烏桓曰持馬畜皮布來贖之烏桓見略者親屬二千餘人持財畜往贖胸奴受留不遣王莽之篡位也建國元年遣五威將王駿率甄阜王颯陳饒帛敞丁業六人多齎金帛重遺單于諭曉以受命代漢狀因易單于故印故印文曰胸奴單于璽莽更曰新胸奴單于章將率既至授單于印紱詔令上故印紱單于再拜受詔譯前欲解取故印紱單于舉掖授之左姑夕侯蘇從旁謂單于曰未見新印文宜且勿興單于止不肯與請使者坐穹廬單于欲前為壽五威將曰故印紱當以時上單于曰諾復舉掖授譯蘇復曰未見印文且勿與單于曰印文何由變更遂解故印紱奉上將率受著新紱不解視印飲食至夜乃罷右率陳饒謂諸將率曰鄉者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭說所能距也既得而復失之辱命莫大焉不如椎破故印以絶禍根將率猶與莫有應者饒燕士果悍即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于印言璽不言章又無漢字諸王已下乃有漢言章今即去璽加新與臣下無別願得故印將率示以故印謂曰新室順天制作故印隨將率所自為破壞單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遺即遣弟右賢王輿奉馬牛隨將率入謝因上書求故印將率還到左犁汗王咸所居地見烏桓民多以問咸咸具言狀將率曰前封四條不得受烏桓降者亟還之咸曰請密與單于相聞得語歸之單于使咸報曰當從塞內還之邪從塞外還之邪將率不敢顓決以聞詔報從塞外還之單于始用夏侯藩求地有距漢語後以求稅烏桓不得因寇略其人民釁由是生重以印文改易故怨恨乃遣右大且渠蒲呼盧訾等十餘人將兵衆萬騎以護送烏桓為名勒兵朔方塞下朔方太守以聞明年西域車師後王須置離謀降胸奴都護但欽誅斬之置離兄狐蘭支將人衆二千餘人驅畜産舉國亡降胸奴單于受之狐蘭支與胸奴共入寇擊車師殺後成長傷都護司馬復還入胸奴時戊己校尉史陳良終帶司馬丞韓玄右曲侯任商等見西域頗背叛聞胸奴欲大侵恐并死即謀劫略吏卒數百人共殺戊己校尉刀護遣人與胸奴南犁汗王南將軍相聞胸奴南將軍二千騎入西域迎良等良等盡脅略戊己校尉吏士男女二千餘人入胸奴玄商留南將軍所良帶徑至單于庭人衆別置零吾水上田居單于號良帶曰烏桓都將軍留居單于所數呼與飲食西域都護但欽上書言胸奴南將軍右秩訾將人衆寇擊諸國莽於是大分胸奴為十五單于遣中郎將藺苞副校尉戴級將兵萬騎多齎珍寶至雲中塞下招誘呼韓邪單于諸子欲以次拜之使譯出塞誘呼右犁汗王咸咸子登助三人至則脅拜咸為孝單于賜安車鼓車各一黃金千斤雜繒千匹戲戟十拜助為順單于賜黃金五百斤傳送助登長安莽封苞為宣威公拜為虎牙將軍封級為揚威公拜為虎賁將軍單于聞之怒曰先單于受漢宣帝恩不可負也今天子非宣帝子孫何以得立遣左骨都侯右伊秩訾王呼盧訾及左賢王樂將兵入雲中益壽塞大殺吏民是歲建國三年也是後單于歷告左右部都尉諸邊王入塞寇盜大輩萬餘中輩數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數緣邊虛耗莽新即位怙府庫之富欲立威乃拜十二部將率發郡國勇士武庫精兵各有所屯守轉委輸於邊議滿三十萬衆齎三百日糧同時十道並出窮追胸奴內之于丁令因分其地立呼韓邪十五子莽將嚴尤諫曰臣聞胸奴為害所從來久矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫允內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫驅之而已故天下稱明是為中策漢武帝選將練兵約齎輕糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十餘年中國罷耗胸奴亦創艾而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策今天下遭陽九之厄比年饑饉西北邊尤甚發三十萬衆具三百日糧東援海代南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎釜鍑薪炭重不可勝食糒飲水以歷四時師有疾疫之憂是故前世伐胡不過百日非不欲久勢力不能此四難也輜重自隨則輕鋭者少不得疾行虜徐遁逃勢不能及幸而逢虜又纍輜重如遇險阻銜尾相隨虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜莽不聽尤言轉兵穀如故天下騷動咸既受莽孝單于之號馳出塞歸庭具以見脅狀白單于單于更以為於粟置支侯胸奴賤官也後助病死莽以登代助為順單于厭難將軍陳欽震狄將軍王巡屯雲中葛邪塞是時胸奴數為邊寇殺將率吏士略人民驅畜産去甚衆捕得虜生口驗問皆曰孝單于咸子角數為寇兩將以聞四年莽會諸蠻夷斬咸子登於長安市初北邊自宣帝以來數世不見煙火之警人民熾盛牛馬布野及莽撓亂胸奴與之構難邊民死亡係獲又十二部兵久屯而不出吏士罷弊數年之間北邊虛空野有暴骨矣烏珠留單于立二十一歲建國五年死胸奴用事大臣右骨都侯須卜當即王昭君女伊墨居次云之壻也云常欲與中國和親又素與咸厚善見咸前後為莽所拜故遂越輿而立咸為烏纍若鞮單于烏纍單于咸立以弟輿為左谷蠡王烏珠留單于子蘇屠胡本為左賢王以弟屠耆閼氏子盧渾為右賢王烏珠留單于在時左賢王數死以為其號不祥更易命左賢王曰護于護于之尊最貴次當為單于故烏珠留單于授其長子以為護于欲傳以國咸怨烏珠留單于貶賤己號不欲傳國及立貶護于為左屠耆王云當遂勸咸和親天鳳元年云當遣人之西河虎猛制虜塞下告塞吏曰欲見和親侯和親侯王歙者王昭君兄子也中部都尉以聞莽遣歙歙弟騎都尉展德侯颯使胸奴賀單于初立賜黃金衣被繒帛紿言侍子登在因購求陳良終帶等單于盡收四人及手殺校尉刀護賊芝音妻子以下二十七人皆械檻付使者遣廚唯姑夕王富等四十人送歙颯莽作焚如之刑燒殺陳良等罷諸將率屯兵但置游擊都尉單于貪莽賂遺故外不失漢故事然內利寇掠又使還知子登前死怨恨寇虜從左地入不絶使者問單于輒曰烏桓與胸奴無狀黠民共為寇入塞譬如中國有盜賊耳咸初立持國威信尚淺盡力禁止不敢有二心天鳳二年五月莽復遣歙與五威將王咸率伏黯丁業等六人使送右廚唯姑夕王因奉歸前所斬侍子登及諸貴人從者喪皆載以常車至塞下單于遣云當子男大且渠奢等至塞迎咸等至多遺單于金珍因諭說改其號號胸奴曰恭奴單于曰善于賜印綬封骨都侯當為後安公當子男奢為後安侯單于貪莽金幣故曲聽之然寇盜如故咸歙又以陳良等購金付云當令自差與之十二月還入塞莽大喜賜歙錢二百萬悉封黯等單于咸立五歲天鳳五年死弟左賢王輿立為呼都而尸道皋若鞮單于胸奴謂孝曰若鞮自呼韓邪後與漢親密見漢諡帝為孝慕之故皆為若鞮呼都而尸單于與既立貪利賞賜遣大且渠奢與云女弟當于居次子醯櫝王俱奉獻至長安莽遣和親侯歙與等俱至制虜塞下與云當會因以兵迫脅將至長安云當小男從塞下得脫歸胸奴當至長安莽拜為須卜單于欲出大兵以輔立之兵調度亦不合而胸奴愈怒並入北邊北邊由是壞敗會當病死莽以其庶女陸逯任妻後安公奢所以尊寵之甚厚終為欲出兵立之者會漢兵誅莽云奢亦死更始二年冬漢遣中郎將歸德侯颯大司馬護軍陳遵使胸奴授單于漢舊制璽綬王侯以下印綬因送云當餘親屬貴人從者單于輿驕謂遵颯曰胸奴本與漢為兄弟胸奴中亂孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所篡胸奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚距單于終持此言其明年夏還會赤眉入長安更始敗贊曰書戒蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運壽策相與爭於廟堂之上乎高祖時則劉敬呂后時樊噲季布孝文時賈誼朝錯孝武時王恢韓安國朱買臣公孫弘董仲舒人持所見各有同異然總其要歸兩科而已縉紳之儒則守和親介胄之士則言征伐皆偏見一時之利害而未究胸奴之終始也自漢興以至于今曠世歷年多於春秋其與胸奴有修文而和親之矣有用武而克伐之矣有卑下而承事之矣有威服而臣畜之矣詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約結和親賂遺單于冀以救安邊境孝惠高后時遵而不違胸奴寇盜不為衰止而單于反以加驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而胸奴數背約束邊境屢被其害是以文帝中年赫然發憤遂躬戎服親御鞍馬從六郡良家材力之士馳射上林講習戰陳聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明效也仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如胸奴者非可以仁義說也獨可說以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以纍其心胸奴雖欲展轉奈失重利何奈欺上天何奈殺愛子何夫賦斂行賂不足以當三軍之費城郭之固無以異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知其未合於當時而有闕於後世也當孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里胸奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子而為質乎此不合當時之言也若不置質空約和親是襲孝文既往之悔而長胸奴無已之詐也夫邊城不選守境武略之臣修障隧備塞之具厲長戟徑弩之械恃吾所以待邊寇而務賦斂於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而幾胡馬之不窺不已過乎至孝宣之世承武帝奮擊之威直胸奴百年之運因其壞亂幾亡之厄權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱藩賓於漢庭是時邊城晏閉牛馬布野三世無犬吠之警菞庶亡干戈之役後六十餘載之間遭王莽篡位始開邊隙單于由是歸怨自絶莽遂斬其侍子邊境之禍搆矣故呼韓邪始朝於漢漢議其儀而蕭望之曰戎狄荒服言其來服荒忽無常時至時去宜待以客禮讓而不臣如其後嗣逯逃竄伏使於中國不為叛臣及孝元時議罷守塞之備侯應以為不可可謂盛不忘衰安必思危遠見識微之明矣至單于咸棄其愛子昧利不顧侵掠所獲歲巨萬計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之固而偷恃一時之事者未可以經遠也若乃征伐之功秦漢行事嚴尤論之當矣故先王度土中立封畿分九州列五服物土貢制外內或修刑政或昭文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左衽人面獸心其與中國殊章服異習俗飲食不同言語不通辟居北垂寒露之野逐草隨畜射獵為生隔以山谷雍以沙幕天地所以絶外內也是故聖王禽獸畜之不與約誓不就攻伐約之則費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內疏而不戚政教不及其人正朔不加其國來則懲而御之去則備而守之其慕義而貢獻則接之以禮讓羈靡不絶使曲在彼蓋聖王制御蠻夷之常道也
