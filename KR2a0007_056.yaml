body:
  text: 武五子傳第三十三孝武皇帝六男衛皇后生戾太子趙婕妤生孝昭帝王夫人生齊懷王閎李姬生燕刺王旦廣陵厲王胥李夫人生昌邑哀王髆戾太子據元狩元年立為皇太子年七歲矣初上年二十九乃得太子甚喜為立禖使東方朔枚皋作禖祝少壯詔受公羊春秋又從瑕丘江公受穀梁及冠就宮上為立博望苑使通賓客從其所好故多以異端進者元鼎四年納史良娣產子男進號曰史皇孫武帝末衛后寵衰江充用事充與太子及衛氏有隙恐上晏駕後為太子所誅會巫蠱事起充因此為姦是時上春秋高意多所惡以為左右皆為蠱道祝詛窮治其事丞相公孫賀父子陽石諸邑公主及皇后弟子長平侯衛伉皆坐誅語在公孫賀江充傳充典治巫蠱既知上意白言宮中有蠱氣入宮至省中壞御座掘地上使按道侯韓說御史章贛黃門蘇文等助充充遂至太子宮掘蠱得桐木人時上疾辟暑甘泉宮獨皇后太子在太子召問少傅石德德懼為師傅并誅因謂太子曰前丞相父子兩公主及衛氏皆坐此今巫與使者掘地得徵驗不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事耶太子急然德言征和二年七月壬午及使客為使者收捕充等按道侯說疑使者有詐不肯受詔客格殺說御史章贛被創突亡自歸甘泉太子使舍人無且持節夜入未央宮殿長秋門因長御倚華具白皇后發中廄車載射士出武庫兵發長樂宮衛告令百官曰江充反乃斬充以徇炙胡巫上林中遂部賓客為將率與丞相劉屈氂等戰長安中擾亂言太子反以故眾不肯附太子兵敗亡不得上怒甚群下憂懼不知所出壺關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安陰陽和調物乃茂成父慈母愛室家之中子乃孝順陰陽不和則萬物夭傷父子不和則室家喪亡故父不父則子不子君不君則臣不臣雖有粟吾豈得而食諸昔者虞舜孝之至也而不中於瞽叟孝己被謗伯奇放流骨肉至親父子相疑何者積毀之所生也由是觀之子無不孝而父有不察今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之隸臣耳陛下顯而用之銜至尊之命以迫蹴皇太子造飾姦詐群邪錯謬是以親戚之路鬲塞而不通太子進則不得上見退則困於亂臣獨冤結而亡告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以為無邪心詩云營營青蠅止于藩愷悌君子無信讒言讒言罔極交亂四國往者江充讒殺趙太子天下莫不聞其罪固宜陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辯士不敢說臣竊痛之臣聞子胥盡忠而忘其號比干盡仁而遺其身忠臣竭誠不顧鈇鉞之誅以陳其愚志在匡君安社稷也詩云取彼譖人投畀豺虎唯陛下寬心慰意少察所親毋患太子之非亟罷甲兵無令太子久亡臣不勝惓惓出一旦之命待罪建章闕下書奏天子感寤太子之亡也東至湖臧匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺吏圍捕太子太子自度不得脫即入室距戶自經山陽男子張富昌為卒足蹋開戶新安令史李壽趨抱解太子主人公遂格鬭死皇孫二人皆并遇害上既傷太子乃下詔曰蓋行疑賞所以申信也其封李壽為邘侯張富昌為題侯久之巫蠱事多不信上知太子惶恐無他意而車千秋復訟太子冤上遂擢千秋為丞相而族滅江充家焚蘇文於橫橋上及泉鳩里加兵刃於太子者初為北地太守後族上憐太子無辜乃作思子宮為歸來望思之臺於湖天下聞而悲之初太子有三男一女女者平輿侯嗣子尚焉及太子敗皆同時遇害衛后史良娣葬長安城南史皇孫皇孫妃王夫人及皇女孫葬廣明皇孫二人隨太子者與太子并葬湖太子有遺孫一人史皇孫子王夫人男年十八即尊位是為孝宣帝帝初即位下詔曰故皇太子在湖未有號諡歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭尊祖之義也陛下為孝昭帝後承祖宗之祀制禮不踰閑謹行視孝昭帝所為故皇太子起位在湖史良娣冢在博望苑北親史皇孫位在廣明郭北諡法曰諡者行之迹也愚以為親諡宜曰悼母曰悼后比諸侯王園置奉邑三百家故皇太子諡曰戾置奉邑二百家史良娣曰戾夫人置守冢三十家園置長丞周衛奉守如法以湖閿鄉邪里聚為戾園長安白亭東為戾后園廣明成鄉為悼園皆改葬焉後八歲有司復言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寢以時薦享焉益奉園民滿千六百家以為奉明縣尊戾夫人曰戾后置園奉邑及益戾園各滿三百家齊懷王閎與燕王旦廣陵王胥同日立皆賜策各以國土風俗申戒焉曰惟元狩六年四月乙巳皇帝使御史大夫湯廟立子閎為齊王曰烏呼小子閎受茲青社朕承天序惟稽古建爾國家封于東土世為漢藩輔烏呼念哉共朕之詔惟命不于常人之好德克明顯光義之不圖俾君子怠悉爾心允執其中天祿永終厥有愆不臧乃凶于乃國而害于爾躬鳴呼保國乂民可不敬與王其戒之閎母王夫人有寵閎尤愛幸立八年薨無子國除燕刺王旦賜策曰鳴呼小子旦受茲玄社建爾國家封于北土世為漢藩輔鳴呼薰鬻氏虐老獸心以姦巧邊甿朕命將率徂征厥罪萬夫長千夫長三十有二帥降旗奔師薰鬻徙域北州以妥悉爾心毋作怨毋作棐德毋乃廢備非教士不得從徵王其戒之旦壯大就國為人辯略博學經書雜說好星曆數術倡優射獵之事招致游士及衛太子敗齊懷王又薨旦自以次第當立上書求入宿衛上怒下其使獄後坐臧匿亡命削良鄉安次文安三縣武帝由是惡旦後遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭曰璽書封小京師疑有變遣幸臣壽西長孫縱之王孺等之長安以問禮儀為名王孺見執金吾廣意問帝崩所病立者誰子年幾歲廣意言待詔五莋宮宮中讙言帝崩諸將軍共立太子為帝年八九歲葬時不出臨歸以報王王曰上棄群臣無語言蓋主又不得見甚可怪也復遣中大夫至京師上書言竊見孝武皇帝躬聖道孝宗廟慈愛骨肉和集兆民德配天地明並日月威武洋溢遠方執寶而朝增郡數十斥地且倍封泰山禪梁父巡狩天下遠方珍物陳于太廟德甚休盛請立廟郡國奏報聞時大將軍霍光秉政襃賜燕王錢三千萬益封萬三千戶旦怒曰我當為帝何賜也遂與宗室中山哀王子劉長齊孝王孫劉澤等結謀詐言以武帝時受詔得職吏事修武備備非常長於是為旦命令群臣曰寡人賴先帝休德獲奉北藩親受明詔職吏事領庫兵飭武備任重職大夙夜兢兢子大夫將何以規佐寡人且燕國雖小成周之建國也上自召公下及昭襄于今千載豈可謂無賢哉寡人束帶聽朝三十餘年曾無聞焉其者寡人之不及與意亦子大夫之思有所不至乎其咎安在方今寡人欲撟邪防非章聞揚和撫慰百姓移風易俗厥路何由子大夫其各悉心以對寡人將察焉群臣皆免冠謝郎中成軫謂旦曰大王失職獨可起而索不可坐而得也大王壹起國中雖女子皆奮臂隨大王旦曰前高后時偽立子弘為皇帝諸侯交手事之八年呂太后崩大臣誅諸呂迎立文帝天下乃知非孝惠子也我親武帝長子反不得立上書請立廟又不聽立者疑非劉氏即與劉澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨淄與燕王俱起旦遂招來郡國姦人賦斂銅鐵作甲兵數閱其車騎材官卒建旌旗鼓車旄頭先敺郎中侍從者著貂羽黃金附蟬皆號侍中旦從相中尉以下勒車騎發民會圍大獵文安縣以講士馬須期日郎中韓義等數諫旦旦殺義等凡十五人會缾侯劉成知澤等謀告之青州刺史雋不疑不疑收捕澤以聞天子遣大鴻臚丞治連引燕王有詔弗治而劉澤等皆伏誅益封缾侯久之旦姊鄂邑蓋長公主左將軍上官桀父子與霍光爭權有隙皆知旦怨光即私與燕交通旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主上官桀及御史大夫桑弘羊等皆與交通數記疏光過失與旦令上書告之桀欲從中下其章旦聞之喜上疏曰昔秦據南面之位制一世之命威服四夷輕弱骨肉顯重異族廢道任刑無恩宗室其後尉佗入南夷陳涉呼楚澤近狎作亂內外俱發趙氏無炊火焉高皇帝覽蹤迹觀得失見秦建本非是故改其路規土連成布王子孫是以支葉扶疏異姓不得間也今陛下承明繼成委任公卿群臣連與成朋非毀宗室膚受之愬日騁於廷惡吏廢法立威主恩不及下究臣聞武帝使中郎將蘇武使匈奴見留二十年不降還亶為典屬國今大將軍長史敞無勞為搜粟都尉又將軍都郎羽林道上移蹕太官先置臣旦願歸符璽入宿衛察姦臣之變是時昭帝年十四覺其有詐遂親信霍光而疏上官桀等桀等因謀共殺光廢帝迎立燕王為天子旦置驛書往來相報許立桀為王外連郡國豪桀以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕易車騎將軍少而驕臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之正讙不可止大將軍恐出兵陳之以自備耳我帝長子天下所信何憂見反後謂群臣蓋主報言獨患大將軍與右將軍王莽今右將軍物故丞相病幸事必成徵不久令群臣皆裝是時天雨虹下屬宮中飲井水井水竭廁中豕群出壞大官竈烏鵲鬭死鼠舞殿端門中殿上戶自閉不可開天火燒城門大風壞宮城樓折拔樹木流星下墯后姬以下皆恐王驚病使人祠葭水台水王客呂廣等知星為王言當有兵圍城期在九月十月漢當有大臣戮死者語具在五行志王愈憂恐謂廣等曰諆事不成妖祥數見兵氣且至柰何會蓋主舍人父燕倉知其謀告之由是發覺丞相賜璽書部中二千石逐捕孫縱之及左將軍桀等皆伏誅旦聞之召相平曰事敗遂發兵乎平曰左將軍已死百姓皆知之不可發也王憂懣置酒萬載宮會賓客群臣妃妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮固知國中之無人華容夫人起舞曰髮紛紛兮寘渠骨籍籍兮亡居母求死子兮妻求死夫裴回兩渠間兮君子獨安居坐者皆泣有赦令到王讀之曰嗟乎獨赦吏民不赦我因迎后姬諸夫人之明光殿王曰老虜曹為事當族欲自殺左右曰黨得削國幸不死后姬夫人共啼泣止王會天子使使者賜燕王璽書曰昔高皇帝王天下建立子弟以藩屏社稷先日諸呂陰謀大逆劉氏不絕若髮賴絳侯等誅討賊亂尊立孝文以安宗廟非以中外有人表裏相應故邪樊酈曹灌攜劍推鋒從高皇帝墾菑除害耘鉏海內當此之時頭如蓬葆勤苦至矣然其賞不過封侯今宗室子孫曾無暴衣露冠之勞裂地而王之分財而賜之父死子繼兄終弟及今王骨肉至親敵吾一體乃與他姓異族謀害社稷親其所疏疏其所親有逆悖之心無忠愛之義如使古人有知當何面目復奉齊酎見高祖之廟乎旦得書以符璽屬醫工長謝相二千石奉事不謹死矣即以綬自絞后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰刺王旦立三十八年而誅國除後六年宣帝即位封旦兩子廢為新昌侯賢為安定侯又立故太子建是為廣陽頃王二十九年薨子穆王舜嗣二十一年薨子思王璜嗣二十年薨子嘉嗣王莽時皆廢漢藩王為家人嘉獨以獻符命偭封扶美侯賜姓王氏廣陵厲王胥賜策曰嗚呼小子胥受茲赤社建爾國家封于南土世世為漢藩輔古人有言曰大江之南五湖之間其人輕心揚州保彊三代要服不及以正嗚呼悉爾心祗祗兢兢乃惠乃順毋桐好逸毋邇宵人惟法惟則書云臣不作福不作威靡有後羞王其戒之胥壯大好倡樂逸游力扛鼎空手搏熊彘猛獸動作無法度故終不得為漢嗣昭帝初立益封胥萬三千戶元鳳中入朝復益萬戶賜錢二千萬黃金二千斤安車駟馬寶劍及宣帝即位封胥四子聖曾寶昌皆為列侯又立胥小子弘為高密王所以襃賞甚厚始昭帝時胥見上年少無子有覬欲心而楚地巫鬼胥迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須錢使禱巫山會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛之後王廢胥寖信女須等數賜予錢物宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦數相餽遺通私書後延壽坐謀反誅辭連及胥有詔勿治賜胥黃金前後五千斤它器物甚眾胥又聞漢立太子謂姬南等曰我終不得立矣乃止不詛後胥子南利侯寶坐殺人奪爵還歸廣陵與胥姬左修姦事發覺繫獄棄市相勝之奏奪王射陂草田以賦貧民奏可胥復使巫祝詛如前胥宮園中棗樹生十餘莖莖正赤葉白如素池水變赤魚死有鼠晝立舞王后廷中胥謂姬南等曰棗水魚鼠之怪甚可惡也居數月祝詛事發覺有司按驗胥惶恐藥殺巫及宮人二十餘人以絕口公卿請誅胥天子遣廷尉大鴻臚即訊胥謝曰罪死有餘誠皆有之事久遠請歸思念具對胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲久生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閱死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥謂太子霸曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死及八子郭昭君等二人皆自殺天子加恩赦王諸子皆為庶人賜諡曰厲王立六十四年而誅國除後七年元帝復立胥太子霸是為孝王十三年薨子共王意嗣三年薨子哀王護嗣十六年薨無子絕後六年成帝復立孝王子守是為靖王立二十年薨子宏嗣王莽時絕初高密哀王弘本始元年以廣陵王胥少子立九年薨子頃王章嗣三十三年薨子懷王寬嗣十一年薨子慎嗣王莽時絕昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徵王賀典喪璽書曰制詔昌邑王使行大鴻臚事少府樂成宗正德光祿大夫吉中郎將利漢徵王乘七乘傳詣長安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖過弘農使大奴善以衣車載女子至湖使者以讓相安樂安樂告遂遂入問賀賀曰無有遂曰即無有何愛一善以毀行義請收屬吏以湔洒大王即捽善屬衛士長行法賀到霸上大鴻臚郊迎騶奉乘輿車王使僕壽成御郎中令遂參乘旦至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也賀曰我嗌痛不能哭至城門遂復言賀曰城門與郭門等耳且至未央宮東闕遂曰昌邑帳在是闕外馳道北未至帳所有南北行道馬足未至數步大王宜下車鄉闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與群臣議白孝昭皇后廢賀歸故國賜湯沐邑二千戶故王家財物皆與賀及哀王女四人各賜湯沐邑千戶語在霍光傳國除為山陽郡初賀在國時數有怪嘗見白犬高三尺無頭其頸以下似人而冠方山冠後見熊左右皆莫見又大鳥飛集宮中王知惡之輒以問郎中令遂遂為言其故語在五行志王卬天歎曰不祥何為數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不說夫國之存亡豈在臣言哉願王內自揆度大王誦詩三百五篇人事浹王道備王之所行中詩一篇何等也大王位為諸侯王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂叫然號曰宮空不久祅祥數至血者陰憂象也宜畏慎自省賀終不改節居無何徵既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢也以問遂遂曰陛下之詩不云乎營營青蠅至于藩愷悌君子毋信讒言陛下左側讒人眾多如是青蠅惡矣宜進先帝大臣子孫親近以為左右如不忍昌邑故人信用讒諛必有凶咎願詭禍為福皆放逐之臣當先逐矣賀不用其言卒至於廢大將軍光更尊立武帝曾孫是為孝宣帝即位心內忌賀元康二年遣使者賜山陽太守張敞璽書曰制詔山陽太守其謹備盜賊察往來過客毋下所賜書敝於是條奏賀居處著其廢亡之效曰臣敞地節三年五月視事故昌邑王居故宮奴婢在中者百八十三人閉大門開小門廉吏一人為領錢物市買朝內食物它不得出入督盜一人別主徼循察往來者以王家錢取卒迾宮清中備盜賊臣敞數遣丞吏行察四年九月中臣敞入視居處狀故王年二十六七為人青黑色小目鼻末銳卑少須眉身體長大疾痿行步不便衣短衣大絝冠惠文冠佩玉環簪筆持牘趨謁臣敞與坐語中庭閱妻子奴婢臣敞欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復來東至濟陽乃復聞梟聲臣敞閱至子女持轡故王跪曰持轡母嚴長孫女也臣敞故知執金吾嚴延年字長孫女羅紨前為故王妻察故王衣服言語跪起清狂不惠妻十六人子二十二人其十一人男十一人女昧死奏名籍及奴婢財物簿臣敞前書言昌邑哀王歌舞者張修等十人無子又非姬但良人無官名王薨當罷歸太傅豹等擅留以為哀王園中人所不當得為請罷歸故王聞之曰中人守園疾者當勿治相殺傷者當勿法欲令亟死太守柰何而欲罷之其天資喜由亂亡終不見仁義如此後丞相御史以臣敞書聞奏可皆以遣上由此知賀不足忌其明年春乃下詔曰蓋聞象有罪舜封之骨肉之親析而不殊其封故昌邑王賀為海昏侯食邑四千戶侍中衛尉金安上上書言賀天之所棄陛下至仁復封為列侯賀嚚頑放廢之人不宜得奉宗廟朝聘之禮奏可賀就國豫章數年揚州刺史柯奏賀與故太守卒史孫萬世交通萬世問賀前見廢時何不堅守毋出宮斬大將軍而聽人奪璽綬乎賀曰然失之萬世又以賀且王豫章不久為列侯賀曰且然非所宜言有司案驗請逮捕制曰削戶三千後薨豫章太守廖奏言舜封象於有鼻死不為置後以為暴亂之人不宜為太祖海昏侯賀死上當為後者子充國充國死復上弟奉親奉親復死是天絕之也陛下聖仁於賀甚厚雖舜於象無以加也宜以禮絕賀以奉天意願下有司議議皆以為不宜為立嗣國除元帝即位復封賀子代宗為海昏侯傳子至孫今見為侯贊曰巫蠱之禍豈不哀哉此不唯一江充之辜亦有天時非人力所致焉建元六年蚩尤之旗見其長竟天後遂命將出征略取河南建置朔方其春戾太子生自是之後師行三十年兵所誅屠夷滅死者不可勝數及巫蠱事起京師流血僵尸數萬太子子父皆敗故太子生長於兵與之終始何獨一嬖臣哉秦始皇即位三十九年內平六國外攘四夷死人如亂麻暴骨長城之下頭盧相屬於道不一日而無兵由是山東之難興四方潰而逆秦秦將吏外畔賊臣內發亂作蕭牆禍成二世故曰兵猶火也弗戢必自焚信矣是以倉頡作書止戈為武聖人以武禁暴整亂止息干戈非以為殘而興縱之也易曰天之所助者順也人之所助者信也君子履信思順自天祐之吉無不利也故車千秋指明蠱情章太子之冤千秋材知未必能過人也以其銷惡運遏亂原因衰激極道迎善氣傳得天人之祐助云
