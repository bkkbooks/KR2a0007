body:
  text: 敘傳第七十下固以為唐虞三代詩書所及世有典籍故雖堯舜之盛必有典謨之篇然後揚名於後世冠德於百王故曰巍巍乎其有成功煥乎其有文章也漢紹堯運以建帝業至於六世史臣乃追述功德私作本紀編於百王之末廁於秦項之列太初以後闕而不録故探纂前記綴輯所聞以述漢書起元高祖終于孝平王莽之誅十有二世二百三十年綜其行事旁貫五經上下洽通為春秋考紀表志傳凡百篇其敘曰皇矣漢祖纂堯之緒實天生德聰明神武秦人不綱罔漏于楚爰茲發迹斷蛇奮旅神母告符朱旗乃舉粵蹈秦郊嬰來稽首革命創制三章是紀應天順民五星同晷項氏畔換黜我巴漢西土宅心戰士憤怨乘釁而運席卷三秦割據河山保此懷民股肱蕭曹社稷是經爪牙信布腹心良平襲行天罰赫赫明明述高紀第一孝惠短世高后稱制罔顧天顯呂宗以敗述惠紀第二高后紀第三太宗穆穆允恭玄默化民以躬帥下以德農不供貢罪不收孥宮不新館陵不崇墓我德如風民應如屮國富刑清登我漢道述文紀第四孝景蒞政諸侯方命克伐七國王室以定匪怠匪荒務在農桑著于甲令民用寧康述景紀第五世宗曄曄思弘祖業疇咨熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外博四荒武功既抗亦迪斯文憲章六學統一聖真封禪郊祀登秩百神協律改正饗茲永年述武紀第六孝昭幼沖冢宰惟忠燕蓋譸張實睿聰聰罪人斯得邦家和同述昭紀第七中宗明明夤用刑名時舉傅納聽斷惟精柔遠能邇燀耀威靈龍荒幕朔莫不來庭不顯祖烈尚於有成述宣紀第八孝元翼翼高明柔克賓禮故老優繇亮直外割禁囿內損御服離宮不衛山陵不邑閹尹之呰穢我明德述元紀第九孝成煌煌臨朝有光威儀之盛如圭如璋壼闈恣趙朝政在王朝政在王炎炎燎火亦允不陽述成紀第十孝哀彬彬克攬威神雕落洪支底剭鼎臣婉孌董公惟亮天功大過之困實橈實凶述哀紀第十一孝平不造新都作宰不周不伊喪我四海述平紀第十二漢初受命諸侯並政制自項氏十有八姓述異姓諸侯王表第一太祖元勳啓立輔臣支庶藩屏侯王並尊述諸侯王表第二侯王之祉祚及宗子公族蕃滋支葉碩茂述王子侯表第三受命之初贊功剖符奕世弘業爵土乃昭述高惠高后孝文功臣侯表第四景征吳楚武興師旅後昆承平亦有紹土述景武昭宣元成哀功臣侯表第五亡德不報爰存二代宰相外戚昭韙見戒述外戚恩澤侯表第六漢迪於秦有革有因粗舉僚職並列其人述百官公卿表第七篇章博舉通于上下略差名號九品之敘述古今人表第八元元本本數始於一産氣黃鍾造計秒忽八音七始五聲六律度量權衡曆算逌出官失學微六家分乖一彼一此庶研其幾述律曆志第一上天下澤春靁奮作先王觀象爰制禮樂厥後崩壞鄭衛荒淫風流民化湎湎紛紛略存大綱以統舊文述禮樂志第二靁電皆至天威震耀五刑之作是則是效威實輔德刑亦助教季世不詳背本爭末吳孫狙詐申商酷烈漢章九法太宗改作輕重之差世有定籍述刑法志第三厥初生民食貨惟先割制廬井定爾土田什一供貢下富上尊商以足用茂遷有無貨自龜貝至此五銖揚榷古今監世盈虛述食貨志第四昔在上聖昭事百神類帝禋宗望秩山川明德惟馨永世豐年季末淫祀營信巫史大夫臚岱侯伯僭畤放誕之徒緣間而起瞻前顧後正其終始述郊祀志第五炫炫上天縣象著明日月周輝星辰垂精百官立法宮室混成降應王政景以燭形三季之後厥事放紛舉其占應覽故考新述天文志第六河圖命庖洛書賜禹八卦成列九疇逌敘世代實寶光演文武春秋之占咎徵是舉告往知來王事之表述五行志第七坤作墬勢高下九則自昔黃唐經略萬國燮定東西疆理南北三代損益降及秦漢革剗五等制立郡縣略表山川彰其剖判述地理志第八夏乘四載百川是導唯河為囏災及後代商竭周移秦決南涯自茲歫漢北亡八支文堙棗野武作瓠歌成有平年後遂滂沱爰及溝渠利我國家述溝洫志第九虙羲畫卦書契後作虞夏商周孔篡其業纂書刪詩綴禮正樂彖系大易因史立法六學既登遭世罔弘群言紛亂諸子相騰秦人是滅漢修其缺劉向司籍九流以別爰著目録略序洪烈述藝文志第十上嫚下暴惟盜是伐勝廣熛起梁籍扇烈赫赫炎炎遂焚咸陽宰割諸夏命立侯王誅嬰放懷詐虐以亡述陳勝項籍傳第一張陳之交斿如父子攜手𨔵秦拊翼俱起據國爭權還為豺虎耳謀甘公作漢藩輔述張耳陳餘傳第二三枿之起本根既朽枯楊生華曷惟其舊橫雖雄材伏于海島沐浴尸鄉北面奉首旅人慕殉義過黃鳥述魏豹田儋韓信傳第三信惟餓隸布實黥徒越亦狗盜芮尹江湖雲起龍襄化為侯王割有齊楚跨制淮梁綰自同閈鎮我北疆德薄位尊非胙惟殃吳克忠信胤嗣乃長述韓彭英盧吳傳第四賈廑從旅為鎮淮楚澤王琅邪權激諸呂濞之受吳疆土踰矩雖戒東南終用齊斧述荊燕吳傳第五太上四子伯兮早夭仲氏王代斿宅于楚戊實淫缺平陵乃紹其在于京奕世宗正劬勞王室用侯陽成子政博學三世成名述楚元王傳第六季氏之詘辱身毀節信于上將議臣震粟欒公哭梁田叔殉趙見危授命誼動明主布歷燕齊叔亦相魯民思其政或金或社述季布欒布田叔傳第七高祖八子二帝六王三趙不辜淮厲自亡燕靈絶嗣齊悼特昌掩有東土自岱徂海支庶分王前後九子六國誅斃適齊亡祀城陽濟北後承我國赳赳景王匡漢社稷述高五王傳第八猗與元勳包漢舉信鎮守關中足食成軍營都立宮定制修文平陽玄默繼而弗革民用作歌化我淳德漢之宗臣是謂相國述蕭何曹參傳第九留侯襲秦作漢腹心圖折武關解厄鴻門推齊銷印驅致越信招賓四老惟寧嗣君陳公擾攘歸漢乃安斃范亡項走狄擒韓六奇既設我罔艱難安國廷爭致仕杜門絳侯矯矯誅呂尊文亞夫守節吳楚有勳述張陳王周傳第十舞陽鼓刀滕公廄騶潁陰商販曲周庸夫攀龍附鳳並乘天衢述樊酈滕灌傅靳周傳第十一北平志古司秦柱下定漢章程律度之緒建平質直犯上干色廣阿之廑食厥舊德故安執節責通請錯蹇蹇帝臣匪躬之故述張周趙任申屠傳第十二食其監門長揖漢王畫襲陳留進收敖倉塞隘杜津王基以張賈作行人百越來賓從容風議博我以文敬繇役夫遷京定都內強關中外和胸奴叔孫奉常與時抑揚稅介免胄禮義是創或哲或謀觀國之光述酈陸朱婁叔孫傳第十三淮南僭狂二子受殃安辨而邪賜頑以荒敢行稱亂窘世薦亡述淮南衡山濟北傳第十四蒯通一説三雄是敗覆酈驕韓田橫顛沛被之拘係乃成患害充躬罔極交亂弘大述蒯伍江息夫傳第十五萬石溫溫幼寤聖君宜爾子孫夭夭伸伸慶社于齊不言動民衛直周張淑慎其身述萬石衛直周張傳第十六孝文三王代孝二梁懷折亡嗣孝乃尊光內為母弟外扞吳楚怙寵矜功僭欲失所思心既霿牛禍告妖帝庸親親厥國五分德不堪寵四支不傳述文三王傳第十七賈生矯矯弱冠登朝遭文睿聖屢抗其疏暴秦之戒三代是據建設藩屏以強守圉吳楚合從賴誼之慮述賈誼傳第十八子絲慷慨激辭納説攬轡正席顯陳成敗錯之瑣材智小謀大禍如發機先寇受害述爰盎朝錯傳第十九釋之典刑國憲以平馮公矯魏增主之明長孺剛直義形於色下折淮南上正元服莊之推賢於茲為德述長馮汲鄭傳第二十榮如辱如有機有樞自下摩上惟德之隅賴依忠正君子采諸述賈鄒枚路傳第二十一魏其翩翩好節慕聲灌夫矜勇武安驕盈凶德相挺禍敗用成安國壯趾王恢兵首彼若天命此近人咎述竇田灌韓傳第二十二景十三王承文之慶魯恭館室江都訬輕趙敬險詖中山淫醟長沙寂漠廣川亡聲膠東不亮常山驕盈四國絶祀河間賢明禮樂是修為漢宗英述景十三王傳第二十三李廣恂恂實獲士心控弦貫石威動北鄰躬戰七十遂死于軍敢怨衛青見討去病陵不引決忝世滅姓蘇武信節不詘王命述李廣蘇建傳第二十四長平桓桓上將之元薄伐獫允恢我朔邊戎車七征衝輣間間合圍單于北登闐顏騎冠軍猋勇紛紜長驅六舉電擊雷震飲馬翰海封狼居山西規大河列郡祁連述衛青霍去病傳第二十五抑抑仲舒再相諸侯身修國治致仕縣車下帷覃思論道屬書讜言訪對為世純儒述董仲舒傳第二十六文豔用寡子虛烏有寓言淫麗託風終始多識博物有可觀采蔚為辭宗賦頌之首述司馬相如傳第二十七平津斤斤晚躋金門既登爵位祿賜頤賢布衾疏食用儉飭身卜式耕牧以求其志忠寤明君乃爵乃試兒生亹亹東髮修學僭列名臣從政輔治述公孫弘卜式兒寬傳第二十八張湯遂達用事任職媚茲一人日旰忘食既成寵祿亦羅咎慝安世溫良塞淵其德子孫遵業全祚保國述張湯傳第二十九杜周治文唯上淺深用取世資幸而免身延年寬和列于名臣欽用材謀有異厥倫述杜周傳第三十博望杖節收功大夏二師秉鉞身釁胡社致死為福每生作禍述張騫李廣利傳第三十一烏呼史遷薰胥以刑幽而發憤乃思乃精錯綜群言古今是經勒成一家大略孔明述司馬遷傳第三十二孝武六子昭齊亡嗣燕刺謀逆廣陵祝詛昌邑短命昏賀失據戾園不幸宣承天序述武五子傳第三十三六世耽耽其欲浟浟文武方作是庸四克助偃淮南數子之德不忠其身善謀於國述嚴朱吾丘主父徐嚴終王賈傳第三十四東方贍辭詼諧倡優譏苑扞偃正諫舉郵懷肉汙殿弛張沈浮述東方朔傳第三十五葛繹內寵屈氂王子千秋時發宜春舊仕敞義依霍庶幾云已弘惟政事萬年容己咸睡厥誨孰為不子述公孫劉田蔡陳鄭傳第三十六王孫裸葬建乃斬將雲廷許禹福逾刺鳳是謂狂狷敞近其衷述楊胡朱梅云傳第三十七博陸堂堂受遺武皇擁育孝昭末命導揚遭家不造立帝廢王權定社稷配忠阿衡懷祿耽寵漸化不詳陰妻之逆至子而亡秺侯狄孥虔恭忠信奕世載德貤于子孫述霍光金日磾傳第三十八兵家之策惟在不戰營平皤皤立功立論以不濟可上諭其信武賢父子虎臣之俊述趙充國辛慶忌傳第三十九義陽樓蘭長羅昆彌安遠日逐義成郅支陳湯誕節救在三哲會宗勤事疆外之桀述傅常鄭甘陳傳第四十不疑膚敏應變當理辭霍不婚逡遁致仕疏克有終散金娛老定國之祚于其仁考廣德當宣近於知恥述雋疏于薛平彭傳第四十一四皓遁秦古之逸民不營不拔嚴平鄭真吉困于賀涅而不緇禹既黃髮以德來仕舍惟正身勝死善道郭欽蔣詡近遁之好述王貢兩襲鮑傳第四十二扶陽濟濟聞詩聞禮玄成退讓仍世作相漢之宗廟叔孫是謨革自孝元諸儒變度國之誕章博載其路述韋賢傳第四十三高平師師惟辟作威圖黜凶害天子是毗博陽不伐含弘光大天誘其衷慶流苗裔述魏相丙吉傳第四十四占往知來幽贊神明苟非其人道不虛行學微術昧或見仿佛疑殆匪闕違衆忤世淺為尤悔深作敦害述眭兩夏侯京翼李傳第四十五廣漢尹京克聰克明延壽作翊既和且平矜能訐上俱陷極刑翁歸承風帝揚厥聲敞亦平平文雅自贊尊實赳赳邦家之彥章死非罪士民所歎述趙尹韓張兩王傳第四十六寬饒正色國之司直豐繄好剛輔亦慕直皆陷狂狷不典不式崇執言責隆持官守寶曲定陵並有立志述蓋諸葛劉鄭毋將孫何傳第四十七長倩懙懙覿霍不舉遇宣乃拔傅元作輔不圖不慮見躓石許述蕭望之傳第四十八子明光光發迹西疆列於禦侮厥子亦良述馮奉世傳第四十九宣之四子淮陽聰敏舅氏蘧蒢幾陷大理楚孝惡疾東平失軌中山凶短母歸戎里元之二王孫後大宗昭而不穆大命更登述宣元六王傳第五十樂安褒褒古之文學民具爾瞻困于二司安昌貨殖朱雲作娸博山惇慎受莽之疚述匡張孔馬傳第五十一樂昌篤實不橈不詘遘閔既多是用廢黜武陽殷勤輔導副君既忠且謀饗茲舊勳高武守正因用濟身述王商史丹傅喜傳第五十二高陽文法揚鄉武略政事之材道德惟薄位過厥任鮮終其祿博之翰音鼓妖先作述薛宣朱博傳第五十三高陵修儒任刑養威用合時宜器周世資義得其勇如虎如貔進不跬步宗為鯨鯢述翟方進傳第五十四統徵政缺災眚屢發永陳厥咎戒在三七鄴指丁傅略窺占術述谷永杜鄴傳第五十五哀平之恤丁傅莽賢武嘉戚之乃喪厥身高樂廢黜咸列貞臣述何武王嘉師丹傳第五十六淵哉若人實好斯文初擬相如獻賦黃門輟而覃思草法纂玄斟酌六經放易象論潛于篇籍以章厥身述揚雄傳第五十七獷獷亡秦滅我聖文漢存其業六學析分是綜是理是綱是紀師徒彌散著其終始述儒林傳第五十八誰毀誰譽譽其有試泯泯群黎化成良吏淑人君子時同功異沒世遺愛民有餘思述循吏傳第五十九上替下陵姦軌不勝猛政橫作刑罰用興曾是強圉掊克為雄報虐以威殃亦凶終述酷吏傳第六十四民貪力罔有兼業大不淫侈細不匱乏蓋均無貧遵王之法靡法靡度民肆其詐逼上并下荒殖其貨侯服玉食敗俗傷化述貨殖傳第六十一開國承家有法有制家不臧甲國不專殺矧乃齊民作威作惠如台不匡禮法是謂述遊俠傳第六十二彼何人斯竊此富貴營損高明作戒後世述佞幸傳第六十三於惟帝典戎夷猾夏周宣攘之亦列風雅宗幽既昏淫於褒女戎敗我驪遂亡酆鄗大漢初定胸奴強盛圍我平城寇侵邊境至于孝武爰赫斯怒王師雷起霆擊朔野宣承其末乃施洪德震我威靈五世來服王莽竊命是傾是覆備其變理為世典式述胸奴傳第六十四西南外夷種別域殊南越尉他自王番禺攸攸外寓閩越東甌爰洎朝鮮燕之外區漢興柔遠與爾剖符皆恃其岨乍臣乍驕孝武行師誅滅海隅述西南夷兩越朝鮮傳第六十五西戎即序夏后是表周穆觀兵荒服不旅漢武勞神圖遠甚勤王師驒驒致誅大宛姼姼公主乃女烏孫使命乃通條支之瀕昭宣承業都護是立總督城郭三十有六修奉朝貢各以其職述西域傳第六十六詭矣禍福刑于外戚高后首命呂宗顛覆薄姬墜魏宗文産德寶后違意考盤于代王氏仄微世武作嗣子夫既興扇而不終鉤弋憂傷孝昭以登上官幼尊類禡厥宗史娣王悼身遇不祥及宣饗國二族後光恭哀産元夭而不遂邛成乘序履尊三世飛燕之妖禍成厥妹丁傅朁恣自求凶害中山無辜乃喪馮衛惠張景薄武陳宣霍成許哀傅平王之作事雖歆羡非天所度怨咎若茲如何不恪述外戚傳第六十七元后娠母月精見表遭成之逸政自諸舅陽平作威誅加卿宰成都煌煌假我明光曲陽歊歊亦朱其堂新都亢極作亂以亡述元后傳第六十八咨爾賊臣篡漢滔天行驕夏癸虐烈商辛偽稽黃虞繆稱典文衆怨神怒惡復誅臻百王之極究其姦昏述王莽傳第六十九凡漢書敘帝皇列官司建侯王準天地統陰陽闡元極步三光分州域物土疆窮人理該萬方緯六經綴道綱總百氏贊篇章函雅故通古今正文字惟學林述敘傳第七十
