body:
  text: 王貢兩龔鮑傳第四十二昔武王伐紂遷九鼎於雒邑伯夷叔齊薄之餓死于首陽不食其祿周猶稱盛德焉然孔子賢此二人以為不降其志不辱其身也而孟子亦云聞伯夷之風者貪夫廉懦夫有立志奮乎百世之上百世之下莫不興起非賢人而能若是乎漢興有園公綺里季夏黃公甪里先生此四人者當秦之世避而入商雒深山以待天下之定也自高祖聞而召之不至其後呂后用留侯計使皇太子卑辭束帛致禮安車迎而致之四人既至從太子見高祖客而敬焉太子得以為重遂用自安語在留侯傳其後谷口有鄭子真蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮者賤業而可以惠眾人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言者已過半矣裁日閱數人得百錢足自養則閉肆下簾而授老子博覽亡不通依老子嚴周之指著書十餘萬言楊雄少時從遊學以而仕京師顯名數為朝廷在位賢者稱君平德杜陵李彊素善雄久之為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼人可見而不可得詘也彊心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰楊子雲誠知人君平年九十餘遂以其業終蜀人愛敬至今稱焉及雄著書言當世士稱此二人其論曰或問君子疾沒世而名不稱盍勢諸名卿可幾曰君子德名為幾梁齊楚趙之君非不富且貴也惡虖成其名谷口鄭子真不詘其志耕於巖石之下名震於京師豈其卿豈其卿楚兩龔之絜其清矣乎蜀嚴湛冥不作茍見不治苟得久幽而不改其操雖隨和何以加諸舉茲以旃不亦寶乎自園公綺里季夏黃公甪里先生鄭子真嚴君平皆未嘗仕然其風聲足以激貪厲俗近古之逸民也若王吉貢禹兩龔之屬皆以禮讓進退云王吉字子陽琅邪皋虞人也少好學明經以郡吏舉孝廉為郎補若盧右丞遷雲陽令舉賢良為昌邑中尉而王好遊獵驅馳國中動作亡節吉上疏諫曰臣聞古者師日行三十里吉行五十里詩云匪風發兮匪車揭兮顧瞻周道中心𢛁兮說曰是非古之風也發發者是非古之車也揭揭者蓋傷之也今者大王幸方與曾不半日而馳二百里百姓頗廢耕桑治道牽馬臣愚以為民不可數變也昔召公述職當民事時舍於棠下而聽斷焉是時人皆得其所後世思其仁恩至虖不伐甘棠甘棠之詩是也大王不好書術而樂逸游馮式撙銜馳騁不止口倦乎叱咤手苦於箠轡身勞乎車輿朝則冒霧露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所匽薄數以耎脆之玉體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣夏之下細旃之上明師居前勤誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥德其樂豈徒銜橛之問哉休則俛仰詘信以利形進退步趨以實下吸新吐故以練臧專意積精以適神於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽美聲廣譽登而上聞則福祿其轃而社稷安矣皇帝仁聖至今思慕未怠於宮館囿池戈獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義孅介有不具者於以上聞非饗國之福也臣吉愚戇願大王察之王賀雖不遵道然猶知敬禮吉乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放從自若吉輒諫爭甚得輔弼之義雖不治民國中莫不敬重焉久之昭帝崩亡嗣大將軍霍光秉政遣大鴻臚宗正迎昌邑王吉即奏書戒王曰臣聞高宗諒闇三年不言今大王以喪事徵宜日夜哭泣悲哀而已慎毋有所發且何獨喪事凡南面之君何言哉天不言四時行焉百物生焉願大王察之大將軍仁愛勇智忠信之德天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄群臣屬以天下寄幼孤焉大將軍抱持幼君襁緥之中布政施教海內晏然雖周公伊尹亡以加也今帝崩亡嗣大將軍惟思可以奉宗廟者攀援而立大王其仁厚豈有量哉臣願大王事之敬之政事壹聽之大王垂拱南面而已願留意常以為念王既到即位二十餘日以行淫亂廢昌邑群臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道陷王大惡皆下獄誅唯吉與郎中令龔遂以忠直數諫正得減死髡為城旦起家復為益州刺史病去官復徵為博士諫大夫是時宣帝頗修武帝故事宮室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰陛下躬聖質總萬方帝王圖籍日陳于前惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也其務在於期會簿書斷獄聽訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠故謹選左右審擇所使左右所以正身也所使所以宣德也詩云濟濟多士文王以寧此其本也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗戶異政人殊服詐偽萌生刑罰亡極質樸日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民濟之仁壽之域則俗何以不若成康壽何以不若高宗竊見當世趨務不合於道者謹條奏唯陛下財擇焉吉意以為夫婦人倫大綱夭壽之萌也世俗嫁娶太早未知為人父母之道而有子是以教化不明而民多夭聘妻送女亡節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆陰陽之位故多女亂古者衣服車馬貴賤有章以襃有德而別尊卑今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絕惡於未萌也又言舜湯不用三公九卿之世而舉皋陶伊尹不仁者遠今使俗吏得任子弟率多驕驁不通古今至於積功治人亡益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉古者工不造琱瑑商不通侈靡非工商之獨賢政教使之然也民見儉則歸本本立而末成其指如此上以其言迂闊不甚寵異也吉遂謝病歸琅邪始吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽婦去東家棗完去婦復還其厲志如此吉與貢禹為友世稱王陽在位貢公彈冠言其取舍同也元帝初即位遣使者徵貢禹與吉吉年老道病卒上悼之復遣使者弔祠云初吉兼通五經能為騶氏春秋以詩論語教授好梁丘賀說易令子駿受焉駿以孝廉為郎左曹陳咸薦駿賢父子經明行修宜顯以厲俗光祿勳匡衡亦舉駿有專對材遷諫大夫使責淮陽憲王遷趙內史吉坐昌邑王被刑後戒子孫毋為王國吏故駿道病免官歸起家復為幽州刺史遷司隸校尉奏免丞相匡衡遷少府八歲成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王而薛宣從左馮翊代駿為少府會御史大夫缺谷永奏言聖王不以名譽加於實效考績用人之法薛宣政事已試上然其議宣為少府月餘遂超御史大夫至丞相駿乃代宣為御史大夫並居位六歲病卒翟方進代駿為大夫數月薛宣免遂代為丞相眾人為駿恨不得封侯駿為少府時妻死因不復娶或問之駿曰德非曾參子非華元亦何敢娶駿子崇以父任為郎歷刺史郡守治有能名建平三年以河南太守徵入為御史大夫數月是時成帝舅安成恭侯夫人放寡居共養長信宮坐祝詛下獄崇奏封事為放言放外家解氏與崇為昏哀帝以崇為不忠誠策詔崇曰朕以君有累世之美故踰列次在位以來忠誠匡國未聞所繇反懷詐諼之辭欲以攀救舊姻之家大逆之辜舉錯專恣不遵法度亡以示百僚左遷為大司農後徙衛尉左將軍平帝即位王莽秉政大司空彭宣乞骸骨罷崇代為大司空封扶平侯歲餘崇復謝病乞骸骨皆避王莽莽遣就國歲餘為傅婢所毒薨國除自吉至崇世名清廉然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極為鮮明而亡金銀錦繡之物及遷徙去處所載不過囊衣不畜積餘財去位家居亦布衣疏食天下服其廉而怪其奢故俗傳王陽能作黃金貢禹字少翁琅邪人也以明經絜行著聞徵為博士涼州刺史病去官復舉賢良為河南令歲餘以職事為府官所責免冠謝禹曰冠壹免安復可冠也遂去官元帝初即位徵禹為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言古者宮室有制宮女不過九人秣馬不過八匹牆塗而不琱木摩而不刻車輿器物皆不文畫苑囿不過數十里與民共之任賢使能什一而稅亡它賦歛繇戍之役使民歲不過三日千里之內自給千里之外各置貢職而已故天下家給人足頌聲並作至高祖孝文孝景皇帝循古節儉宮女不過十餘廄馬百餘匹孝文皇帝衣綈履革器亡琱文金銀之飾後世爭為奢侈轉轉益甚臣下亦相放效衣服履絝刀劍亂於主上主上時臨朝入廟眾人不能別異甚非其宜然非自知奢僭也猶魯昭公曰吾何僭矣今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如太古難宜少放古以自節焉論語曰君子樂節禮樂方今宮室已定亡可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官作工各數千人一歲費數鉅萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宮見賜杯案盡文畫金銀飾非當所以賜食臣下也東宮之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死死又不葬為犬豬食人至相食而廄馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宮及棄天下昭帝幼弱霍光專事不知禮正妄多臧金錢財物鳥獸魚鱉牛馬虎豹生禽凡百九十物盡瘞臧之又皆以後宮女置於園陵大失禮逆天心又未必稱武帝意也昭帝晏駕光復行之至孝宣皇帝時陛下惡有所言群臣亦隨故事甚可痛也故使天下承化取女皆大過度諸侯妻妾或至數百人豪富吏民畜歌者至數十人是以內多怨女外多曠夫及眾庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二子產多少有命審察後宮擇其賢者留二十人餘悉歸之及諸陵園女亡子者宜悉遣獨杜陵宮人數百誠可哀憐也廄馬可亡過數十匹獨舍長安城南苑地以為田獵之囿自城西南至山西至鄠皆復其田以與貧民方今天下飢饉可亡大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也故詩曰天難諶斯不易惟王上帝臨女毋貳爾心當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也若其阿意順指隨君上下臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食穀馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光祿大夫頃之禹上書曰臣禹年老貧窮家訾不滿萬錢妻子穅豆不贍裋褐不完有田百三十畝陛下過意徵臣臣賣田百畝以供車馬至拜為諫大夫秩八百石奉錢月九千二百廩食太官又蒙賞賜四時雜繒緜絮衣服酒肉諸果物德厚甚深疾病侍醫臨治賴陛下神靈不死而活又拜為光祿大夫秩二千石奉錢月萬二千祿賜愈多家日以益富身日以益尊誠非屮茅愚臣所當蒙也伏自念終亡以報厚德日夜慚愧而已臣禹犬馬之齒八十一血氣衰竭耳目不聰明非復能有補益所謂素餐尸祿洿朝之臣也自痛去家三千里凡有一子年十二非有在家為臣具棺椁者也誠恐一旦蹎仆氣竭不復自還洿席薦於宮室骸骨棄捐孤魂不歸不勝私願願乞骸骨及身生歸鄉里死亡所恨天子報曰朕以生有伯夷之廉史魚之直守經據古不阿當世孳孳於民俗之所寡故親近生幾參國政今未得久聞生之奇論也而云欲退意豈有所恨與將在位者與生殊乎往者嘗令金敞語生欲及生時祿生之子既已諭矣今復云子少夫以王命辨護生家雖百子何以加傳曰亡懷土何必思故鄉生其強飯慎疾以自輔後月餘以禹為長信少府會御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上禹以為古民亡賦算口錢起武帝征伐四夷重賦於民民產子三歲則出口錢故民重困至於生子輒殺甚可悲痛宜令兒七歲去齒乃出口錢年二十乃算又言古者不以金錢為幣專意於農故一夫不耕必有受其飢者今漢家鑄錢及諸鐵官皆置吏卒徒攻山取銅鐵一歲功十萬人已上中農食七人是七十萬人常受其飢也鑿地數百丈銷陰氣之精地臧空虛不能含氣出雲斬伐林木亡有時禁水旱之災未必不繇此也自五銖錢起已來七十餘年民坐盜鑄錢被刑者眾富人積錢滿室猶亡厭足民心動搖商賈求利東西南北各用智巧好衣美食歲有十二之利而不出租稅農夫父子暴露中野不避寒暑捽屮杷土手足胼胝已奉穀租又出稾稅鄉部私求不可勝供故民棄本逐末耕者不能半貧民雖賜之田猶賤賣以賈窮則起為盜賊何者末利深而惑於錢也是以姦邪不可禁其原皆起於錢也疾其末者絕其本宜罷採珠玉金銀鑄錢之官亡復以為幣市井勿得販賣除其租銖之律租稅祿賜皆以布帛及穀使百姓壹歸於農復古道便又言諸離宮及長樂宮衛可減其太半以寬繇役又諸官奴婢十萬餘人戲遊亡事稅良民以給之歲費五六鉅萬宜免為庶人廩食令代關東戍卒乘北邊亭塞候望又欲令近臣自諸曹侍中以上家亡得私販賣與民爭利犯者輒免官削爵不得仕宦禹又言孝文皇帝時貴廉絜賤貪汙賈人贅壻及吏坐贓者皆禁錮不得為吏賞善罰惡不阿親戚罪白者伏其誅疑者以與民亡贖罪之法故令行禁止海內大化天下斷獄四百與刑錯亡異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂從耆欲用度不足乃行壹切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者眾郡國恐伏其誅則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓者以苛暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故俗皆曰何以孝弟為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髡鉗者猶復攘臂為政於世行雖犬彘家富勢足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅亡但免官則爭盡力為善貴孝弟賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不解之故四海之內天下之君微孔子之言亡所折中況乎以漢地之廣陛下之德處南面之尊秉萬乘之權因天地之助其於變世易俗調和陰陽陶冶萬物化正天下易於決流抑隊自成康以來幾且千歲欲為治者甚眾然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念高祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣遠放讇佞放出園陵之女罷倡樂絕鄭聲去甲乙之帳退偽薄之物修節儉之化驅天下之民皆歸於農如此不解則三王可侔五帝可及唯陛下留意省察天下幸甚天子下其議令民產子七歲乃出口錢自此始又罷上林宮館希幸御者及省建章甘泉宮衛卒減諸侯王廟衛卒省其半餘雖未盡從然嘉其質直之意禹又奏欲罷郡國廟定漢宗廟迭毀之禮皆未施行為御史大夫數月卒天子賜錢百萬以其子為郎官至東郡都尉禹卒後上追思其議竟下詔罷郡國廟定迭毀之禮然通儒或非之語在韋玄成傳兩龔皆楚人也勝字君賓舍字君倩二人相友並著名節故世謂之楚兩龔少皆好學明經勝為郡吏舍不仕久之楚王入朝聞舍高名聘舍為常侍不得已隨王歸國固辭願卒學復至長安而勝為郡吏三舉孝廉以王國人不得宿衛補吏再為尉壹為丞勝輒至官乃去州舉茂材為重泉令病去官大司空何武執金吾閻崇薦勝哀帝自為定陶王固已聞其名徵為諫大夫引見勝薦龔舍及亢父甯壽濟陰侯嘉有詔皆徵勝曰竊見國家徵醫巫常為駕徵賢者宜駕上曰大夫乘私車來邪勝曰唯唯有詔為駕龔舍侯嘉至皆為諫大夫甯壽稱疾不至勝居諫官數上書求見言百姓貧盜賊多吏不良風俗薄災異數見不可不憂制度泰奢刑罰泰深賦斂泰重宜以儉約先下其言祖述王吉貢禹之意為大夫二歲餘遷丞相司直徙光祿大夫守右扶風數月上知勝非撥煩吏乃復還勝光祿大夫諸吏給事中勝言董賢亂制度繇是逆上指後歲餘丞相王嘉上書薦故廷尉梁相等尚書劾奏嘉言事恣意迷國罔上不道下將軍中朝者議左將軍公孫祿司隸鮑宣光祿大夫孔光等十四人皆以為嘉應迷國不道法勝獨書議曰嘉資性邪僻所舉多貪殘吏位列三公陰陽不和諸事並廢咎皆繇嘉迷國不疑今舉相等過微薄日暮議者罷明旦復會左將軍祿問勝君議亡所據今奏當上宜何從勝曰將軍以勝議不可者通劾之博士夏侯常見勝應祿不和起至勝前謂曰宜如奏所言勝以手推常曰去後數日復會議可復孝惠孝景廟不議者皆曰宜復勝曰當如禮常復謂勝禮有變勝疾言曰去是時之變常恚謂勝曰我視君何若君欲小與眾異外以采名君乃申徒狄屬耳先是常又為勝道高陵有子殺母者勝白之尚書問誰受對曰受夏侯常尚書使勝問常常連恨勝即應曰聞之白衣戒君勿言也奏事不詳妄作觸罪勝窮亡以對尚書即自劾奏與常爭言洿辱朝廷事下御史中丞召詰問劾奏勝吏二千石常位大夫皆幸得給事中與論議不崇禮義而居公門下相非恨疾言辯訟媠謾亡狀皆不敬制曰貶秩各一等勝謝罪乞骸骨上乃復加賞賜以子博為侍郎出勝為渤海太守勝謝病不任之官積六月免歸上復徵為光祿大夫勝常稱疾臥數使子上書乞骸骨會哀帝崩初琅邪邴漢亦以清行徵用至京兆尹後為太中大夫王莽秉政勝與漢俱乞骸骨自昭帝時涿郡韓福以德行徵至京師賜策書束帛遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里行道舍傳舍縣次具酒肉食從者及馬長吏以時存問常以歲八月賜羊一頭酒二斛不幸死者賜複衾一祠以中牢於是王莽依故事白遣勝漢策曰惟元始二年六月庚寅光祿大夫太中大夫耆艾二人以老病罷太皇太后使謁者僕射策詔之曰蓋聞古者有司年至則致仕所以恭讓而不盡其力也今大夫年至矣朕愍以官職之事煩大夫其上子若孫若同產同產子一人大夫其修身守道以終高年賜帛及行道舍宿歲時羊酒衣衾皆如韓福故事所上子男皆除為郎於是勝漢遂歸老于鄉里漢兄子曼容亦養志自修為官不肯過六百石輒自免去其名過出於漢初龔舍以龔勝薦徵為諫大夫病免復徵為博士又病去頃之哀帝遣使者即楚拜舍為太山太守舍家居在武原使者至縣請舍欲令至廷拜授印綬舍曰王者以天下為家何必縣官遂於家受詔便道之官既至數月上書乞骸骨上徵舍至京兆東湖界固稱病篤天子使使者收印綬拜舍為光祿大夫數賜告舍終不肯起乃遣歸舍亦通五經以魯詩教授舍勝既歸鄉里郡二千石長吏初到官皆至其家如師弟子之禮舍年六十八王莽居攝中卒莽既篡國遣五威將帥行天下風俗將帥親奉羊酒存問勝明年莽遣使者即拜勝為講學祭酒勝稱疾不應徵後二年莽復遣使者奉璽書太子師友祭酒印綬安車駟馬迎勝即拜秩上卿先賜六月祿直以辦裝使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎久立門外勝稱病篤為床室中戶西南牖下東首加朝服拕紳使者入戶西行南面立致詔付璽書遷延再拜奉印綬內安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海內勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要說至以印綬就加勝身勝輒推不受使者即上言方盛夏暑熱勝病少氣可須秋涼乃發有詔許使者五日壹與太守俱問起居為勝兩子及門人高暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舍示有行意必為子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩亡以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺斂喪事衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣使者太守臨斂賜複衾祭祠如法門人衰絰治喪者百數有老父來弔哭其哀既而曰嗟虖薰以香自燒膏以明自銷龔生竟夭天年非吾徒也遂趨而出莫知其誰勝居彭城廉里後世刻石表其里門鮑宣字子都渤海高城人也好學明經為縣鄉嗇夫守束州丞後為都尉太守功曹舉孝廉為郎病去官復為州從事大司馬衛將軍王商辟宣薦為議郎後以病去哀帝初大司空何武除宣為西曹掾甚敬重焉薦宣為諫大夫遷豫州牧歲餘丞相司直郭欽奏宣舉錯煩苛代二千石署吏聽訟所察過詔條行部乘傳去法駕駕一馬舍宿鄉亭為眾所非宣坐免歸家數月復徵為諫大夫宣每居位常上書諫爭其言少文多實是時帝祖母傅太后欲與成帝母俱稱尊號封爵親屬丞相孔光大司空師丹何武大司馬傅喜始執正議失傅太后指皆免官丁傅子弟並進董賢貴幸宣以諫大夫從其後上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今柰何反覆劇於前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動眾心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省戶下陛下欲與此共承天地安海內甚難今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而眾皆惑古刑人尚服今賞人反惑請寄為姦群小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊歲增於前凡民有七亡陰陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也冤陷亡辜三死也盜賊橫發四死也怨讎相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪群臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賓客為姦利而已以苟容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益豪毛豈徒欲使臣美食大官重高門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞以大萬數使奴從賓客漿酒霍肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天說民服豈不難哉方陽侯孫寵宜陵侯息夫躬辯足以移眾彊可用獨立姦人之雄或世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歷三公智謀威信可與建教化圖安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦可大委任也陛下前以小不忍退武等海內失望陛下尚能容亡功德者甚眾曾不能忍武等邪治天下者當用天下之心為心不得自專快意而已也上之皇天見譴下之黎庶怨恨次有諫爭之臣陛下苟欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受祿賜美食太官廣田宅厚妻子不與惡人結讎怨以安身邪誠迫大義官以諫爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣吶鈍於辭不勝惓惓盡死節而已上以宣名儒優容之是時郡國地震民訛言行籌明年正月朔日蝕上乃徵孔光免孫寵息夫躬罷侍中諸曹黃門郎數十人宣復上書言陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日蝕於三始誠可畏懼小民正月朔日尚恐毀敗器物何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徵拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國眾庶歙然莫不說喜天人同心人心說則天意解矣乃二月丙戍白虹虷日連陰不雨此天有憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜亡度竭盡府藏并合三第尚以為小復壞暴室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冢有會輒太官為供海內貢獻當養一君今反盡之賢家豈天意與民意邪天不可久負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海內免遣就國收乘輿器物還之縣官如此可以父子終其性命不者海內之所讎未有得久安者也孫寵息夫躬不宜居國可皆免以視天下復徵何武師丹彭宣傅喜曠然使民易視以應天心建立大政以興太平之端高門去省戶數十步求見出入二年未省欲使海瀕仄陋自通遠矣願賜數刻之間極竭毣毣之思退入三泉死亡所恨上感大異納宣言徵何武彭宣旬月皆復為三公拜宣為司隸時哀帝改司隸校尉但為司隸官比司直丞相孔光四時行園陵官屬以令行馳道中宣出逢之使吏鉤止丞相掾史沒入其車馬摧辱宰相事下御史中丞侍御史至司隸官欲捕從事閉門不肯內宣坐距閉使者亡人臣禮大不敬不道下廷尉獄博士弟子濟南王咸舉幡太學下曰欲救鮑司隸者會此下諸生會者千餘人朝日遮丞相孔光自言丞相車不得行又守闕上書上遂抵宣罪減死一等髡鉗宣既被刑乃徒之上黨以為其地宜田牧又少豪俊易長雄遂家于長子平帝即位王莽秉政陰有篡國之心乃風州郡以辠法案誅諸豪桀及漢忠直臣不附己者宣及何武等皆死時名捕隴西辛興興與宣女壻許紺俱過宣一飯去宣不知情坐繫獄自殺自成帝至王莽時清名之士琅邪又有紀逡王思齊則薛方子容太原則郇越臣仲郇相稚賓沛郡則唐林子高唐尊伯高皆以明經飭行顯名於世紀逡兩唐皆仕王莽封侯貴重歷公卿位唐林數上疏諫正有忠直節唐尊衣敝履空以瓦器飲食又以歷遺公卿被虛偽名郇越相同族昆弟也並舉州郡孝廉茂材數病去官越散其先人訾千餘萬以分施九族州里志節尤高相王莽時徵為太子四友病死莽太子遣使裞以衣衾其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之薛方嘗為郡掾祭酒嘗徵不至及莽以安車迎方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守箕山之節也使者以聞莽說其言不強致方居家以經教授喜屬文著詩賦數十篇始隃麋郭欽哀帝時為丞相司直奏免豫州牧鮑宣京兆尹薛修等又奏董賢左遷盧奴令平帝時遷南郡太守而杜陵蔣詡元卿為兗州刺史亦以廉直為名王莽居攝欽詡皆以病免官歸鄉里臥不出戶卒於家齊粟融客卿北海禽慶子夏蘇章游卿山陽曹竟子期皆儒生去官不仕於莽莽死漢更始徵竟以為丞相封侯欲視致賢人銷寇賊竟不受侯爵會赤眉入長安欲降竟竟手劍格死世祖即位徵薛方道病卒兩龔鮑宣子孫皆見襃表至大官贊曰易稱君子之道或出或處或默或語言其各得道之一節譬諸草木區以別矣故曰山林之士往而不能反朝廷之士入而不能出二者各有所短春秋列國卿大夫及至漢興將相名臣懷祿耽寵以失其世者多矣是故清節之士於是為貴然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉貞而不諒薛方近之郭欽蔣詡好遯不汙絕紀唐矣
