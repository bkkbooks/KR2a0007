body:
  text: 郊祀志第五洪範八政三曰祀祀者所以昭孝事祖通神明也旁及四夷莫不修之下至禽獸豺獺有祭是以聖王為之典禮民之精爽不二齊肅聰明者神或降之在男曰覡在女曰巫使制神之處位為之牲器使先聖之後能知出川敬於禮儀明神之事者以為祝能知四時犧牲壇場上下氏姓所出者以為宗故有神民之官各司其序不相亂也民神異業敬而不黷故神降之嘉生民以物序災禍不至所求不匱及少昊之衰九黎亂德民神雜擾不可放物家為巫史享祀無度黷齊明而神弗蠲嘉生不降禍災荐臻莫盡其氣顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常亡相侵黷自共工氏霸九州其子曰句龍能平水土死為社祠有烈山氏王天下其子曰柱能殖百穀死為稷祠故郊祀社稷所從來尚矣虞書曰舜在璿璣玉衡以齊七政遂類于上帝禋于六宗望秩于山川遍于群神揖五瑞擇吉月日見四嶽諸牧班瑞歲二月東巡狩至于岱宗岱宗泰山也柴望秩于山川遂見東后東后者諸侯也合時月正日同律度量衡修五禮五樂三帛二生一死為贄五月巡狩至南嶽南嶽者衡山也八月巡狩至西嶽西嶽者華山也十一月巡狩至北嶽北嶽者恆山也皆如岱宗之禮中嶽嵩高也五載一巡狩禹遵之後十三世至帝孔甲淫德好神神黷二龍去之其後十三世湯伐桀欲遷夏社不可作夏社乃遷烈山子柱而以周棄代為稷祠後八世帝太戊有桑穀生於廷一暮大拱懼伊陟曰祅不勝德太戊修德桑穀死伊陟贊巫咸後十三世帝武丁得傅説為相殷復興焉稱高宗有雉登鼎耳而雊武丁懼祖己曰修德武丁從之位以永寧後五世帝乙嫚神而震死後三世帝紂淫亂武王伐之由是觀之始未嘗不肅祇後稍怠嫚也周公相成王王道大洽制禮作樂天子曰明堂辟雍諸侯曰泮宮郊祀后稷以配天宗祀文王於明堂以配上帝四海之內各以其職來助祭天子祭天下名山大川懷柔百神咸秩無文五嶽視三公四瀆視諸侯而諸侯祭其疆內名山大川大夫祭門戶井竈中霤五祀士庶人祖考而已各有典禮而淫祀有禁後十三世世益衰禮樂廢幽王無道為犬戎所敗平王東徙雒邑秦襄公攻戎救周列為諸侯而居西自以為主少昊之神作西畤祠白帝其牲用駵駒黃牛羝羊各一云其後十四年秦文公東獵汧渭之間卜居之而吉文公薨景祐殿局本都作夢朱一新説作夢是封禪書同夢景祐殿局本都作夢朱一新説作夢是封禪書同黃蛇自天下屬地其田止於鄜衍文公問史敦敦曰此上帝之徵君其祠之於是作鄜畤用三牲郊祭白帝焉自未作鄜畤而雍旁故有吳陽武畤雍東有好畤皆廢無祀或曰自古以雍州積高神明之隩故立畤郊上帝諸神祠皆聚云蓋黃帝時嘗用事雖晚周亦郊焉其語不經見縉紳者弗道作鄜畤後九年文公獲若石云于陳倉北阪城祠之其神或歲不至或歲數來也常以夜光輝若流星從東方來集於祠城若雄雉其聲殷殷云野雞夜鳴以一牢祠之名曰陳寶作陳寶祠後七十一年秦德公立卜居雍子孫飲馬於河遂都雍雍之諸祠自此興用三百牢於鄜畤作伏祠磔狗邑四門以御蠱災後四年秦宣公作密畤於渭南祭青帝後十三年秦穆公立病臥五日不寤寤乃言夢見上帝上帝命穆公平晉亂史書而藏之府而後世皆曰上天穆公立九年齊桓公既霸會諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農氏封泰山禪云云炎帝封泰山禪云云黃帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪會稽湯封泰山禪云云周成王封泰山禪於社首皆受命然後得封禪桓公曰寡人北伐山戎過孤竹西伐束馬縣車上卑耳之山南伐至召陵登熊耳山以望江漢兵車之會三乘車之會六九合諸侯一匡天下諸侯莫違我昔三代受命亦何以異乎於是管仲睹桓公不可窮以辭因設之以事曰古之封禪鄗上黍北里禾所以為盛江淮間一茅三脊所以為藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳳皇麒麟不至嘉禾不生而蓬蒿藜莠茂鴟梟群翔而欲封禪無乃不可乎於是桓公乃止是歲秦穆公納晉君夷吾其後三置晉國之君平其亂穆公立三十九年而卒後五十年周靈王即位時諸侯莫朝周萇弘乃明鬼神事設射不來不來者諸侯之不來朝者也依物怪欲以致諸侯諸侯弗從而周室愈微後二世至敬王時晉人殺萇弘是時季氏專魯旅於泰山仲尼譏之自秦宣公作密畤後二百五十年而秦靈公於吳陽作上畤祭黃帝作下畤祭炎帝後四十八年周太史儋見秦獻公曰周始與秦國合而別別五百載當復合合七十年而伯王出焉儋見後七年櫟陽雨金獻公自以為得金瑞故作畦畤櫟陽而祀白帝後百一十歲周赧王卒九鼎入於秦或曰周顯王之四十二年宋大丘社亡而鼎淪沒於泗水彭城下自赧王卒後七年秦莊襄王滅東周周祀絶後二十八年秦并天下稱皇帝秦始皇帝既即位或曰黃帝得土德黃龍地蚓見夏得木德青龍止於郊草木鬯茂殷得金德銀自山溢周得火德有赤烏之符今秦變周水德之時昔文公出臘景祐殿局本都作獵王先謙説作獵是獵景祐殿局本都作獵王先謙説作獵是獲黑龍此其水德之瑞於是秦更名河曰德水以冬十月為年首色尚黑度以六為名音上大呂事統上法即帝位三年東巡狩郡縣祠騶嶧山頌功業於是從齊魯之儒生博士七十人至於泰山下諸儒生或議曰古者封禪為蒲車惡傷山之土石草木掃地而祠席用苴秸言其易遵也始皇聞此議各乖異難施用由此黜儒生而遂除車道上自泰山陽至顛立石頌德明其得封也從陰道下禪於梁父其禮頗采泰祝之祀雍上帝所用而封臧皆祕之世不得而記也始皇之上泰山中阪遇暴風雨休於大樹下諸儒既黜不得與封禪聞始皇遇風雨即譏之於是始皇遂東遊海上行禮祠名山川及八神來景祐殿本都作求朱一新説作求是封禪書同求景祐殿本都作求朱一新説作求是封禪書同仙人羡門之屬八神將自古而有之或曰太公以來作之齊所以為齊以天齊也其祀絶莫知起時八神一曰天主祠天齊天齊淵水居臨災南郊山下下者二曰地主祠泰山梁父蓋天好陰祠之必於高山之下畤命曰畤地貴陽祭之必於澤中圜丘云三曰兵主祠蚩尤蚩尤在東平陸監鄉齊之西竟也四曰陰主祠三山五曰陽主祠之罘山六曰月主祠之王先謙説之字不當有緣上之字而衍萊山皆在齊北並勃海七曰日主祠盛山盛山斗入海最居齊東北陽以迎日出云八曰四時主祠琅邪琅邪在齊東北蓋歲之所始皆各用牢具祠而巫祝所損益圭幣雜異焉自齊威宣時騶子之徒論著終始五德之運及秦帝而齊人奏之故始皇采用之而宋毋忌正伯僑元尚羡門高最後皆燕人為方仙道形解銷化依於鬼神之事騶衍以陰陽主運顯於諸侯而燕齊海上之方士傳其術不能通然則怪迂阿諛苟合之徒自此興不可勝數也自威宣燕昭使人入海求蓬萊方丈瀛洲此三神山者其傳在勃海中去人不遠蓋嘗有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黃金銀為宮闕未至望之如雲及到三神山反居水下水臨之患且至則風輒引船而去終莫能至云世主莫不甘心焉及秦始皇至海上則方士爭言之始皇如恐弗及使人齎童男女入海求之船交海中皆以風為解曰未能至望見之焉其明年始皇復遊海上至琅邪過恆山從上黨歸後三年遊碣石考入海方士從上郡歸後五年始皇南至湘山遂登會稽並海上幾遇海中三神山之奇藥不得還到沙丘崩二世元年東巡碣石並海南歷泰山至會稽皆禮祠之而刻勒始皇所立石書旁以章始皇之功德其秋諸侯叛秦三年而二世弒死始皇封禪之後十二年而秦亡諸儒生疾秦焚詩書誅滅文學百姓怨其法天下叛之皆説曰始皇上泰山為風雨所擊不得封禪云此豈所謂無其德而用其事者邪昔三代之居皆河洛之間故嵩高為中嶽而四嶽各如其方四瀆咸在山東至秦稱帝都咸陽則五嶽四瀆皆并在東方自五帝以至秦迭興迭衰名山大川或在諸侯或在天子其禮損益世殊不可勝記及秦并天下令祠官所常奉天地名山大川鬼神可得而序也於是自崤以東名山五大川祠二曰太室太室嵩高也恆山泰山會稽湘山水曰泲曰淮春以脯酒為歲禱因泮凍秋涸凍冬塞禱祠其牲用牛犢各一牢具圭幣各異自華以西名山七名川四曰華山薄山薄山者襄山也嶽山岐山吳山鴻冢瀆山瀆山蜀之岷山也水曰河祠臨晉沔祠漢中湫淵祠朝那江水祠蜀亦春秋泮涸禱塞如東方山川而牲亦牛犢牢具圭幣各異而四大冢鴻岐吳嶽皆有嘗禾陳寶節來祠其河加有嘗醪此皆雍州之域近天子都故加車一乘駵駒四霸産豐潦涇渭長水皆不在大山川數以近咸陽盡得比山川祠而無諸加岍洛二淵鳴澤蒲山嶽壻山之屬為小山川亦皆禱塞泮涸祠禮不必同而雍有日月參辰南北斗熒惑太白歲星填星辰星二十八宿風伯雨師四海九臣十四臣諸布諸嚴諸逐之屬百有餘廟西亦有數十祠於湖有周天子祠於下邽有天神豐鎬有昭明天子辟池於杜亳有五杜主之祠壽星祠而雍菅廟祠亦有杜主杜主故周之右將軍其在秦中最小鬼之神者也各以歲時奉祠唯雍四時景祐殿局本都作畤王先謙説作畤是畤景祐殿局本都作畤王先謙説作畤是上帝為尊其光景動人民唯陳寶故雍四畤春以為歲祠禱因泮凍秋涸凍冬賽祠五月嘗駒及四中之月月祠若陳寶節來一祠春夏用騂秋冬用駵畤駒四匹木寓龍一駟木寓車馬一駟各如其帝色黃犢羔各四圭幣各有數皆生瘞埋無俎豆之具三年一郊秦以十月為歲首故常以十月上宿郊見通權火拜於咸陽之旁而衣上白其用如經祠云西畤畦畤祠如其故上不親往諸此祠皆太祝常主以歲時奉祠之至如它名山川諸神及八神之屬上過則祠去則已郡縣遠方祠者民各自奉祠不領於天子之祝官祝官有祕祝即有災祥輒祝祠移過於下漢興高祖初起殺大蛇有物曰蛇白帝子而殺者赤帝子也及高祖禱豐枌榆社殉沛為沛公則祀蚩尤釁鼓旗遂以十月至霸上立為漢王因以十月為年首色上赤二年冬王念孫説景祐本無冬字是也按封禪書亦無冬字東擊項籍而還入關問故秦時上帝祠何帝也對曰四帝有白青黃赤帝之祠高祖曰吾聞天有五帝而四何也莫知其説於是高祖曰吾知之矣乃待我而具五也乃立黑帝祠名曰北畤有司進祠上不親往悉召故秦祀官復置太祝太宰如其故儀禮因令縣為公社下詔曰吾甚重祠而敬祭今上帝之祭及山川諸神當祠者各以其時禮祠之如故後四歲天下已定詔御史令豐治枌榆社常以時春以羊彘祠之令祝立蚩尤之祠於長安長安置祠祀官女巫其梁巫祠天地天社天水房中當景祐殿局本都作堂堂景祐殿局本都作堂上之屬晉巫祠五帝東君雲中君巫社巫祠族人炊之屬秦巫祠杜主巫保族纍之屬荊巫祠堂下巫先司命施糜之屬九天巫祠九天皆以歲時祠宮中其河巫祠河於臨晉而南山巫祠南山秦中秦中者二世皇帝也各有時日其後二歲或言曰周興而邑立后稷之祠至今血食天下於是高祖制詔御史其令天下立靈星祠常以歲時祠以牛高祖十年春有司請令縣常以春二月及臘祠稷以羊彘民里社各自裁以祠制曰可文帝即位十三年下詔曰祕祝之官移過於下朕甚弗取其除之始名山大川在諸侯諸侯祝各自奉祠天子官不領及齊淮南國廢令太祝盡以歲時致禮如故明年以歲比登詔有司增雍五畤路車各一乘駕被具西畤畦畤寓車各一乘寓馬四匹駕被具河湫漢水玉加各二及諸祀皆廣壇場圭幣俎豆以差加之魯人公孫臣上書曰始秦得水德及漢受之推終始傳則漢當土德土德之應黃龍見宜改正朔服色上黃時丞相張蒼好律曆以為漢乃水德之時河決金隄其符也年始冬十月色外黑內赤與德相應公孫臣言非是罷之明年黃龍見成紀文帝召公孫臣拜為博士與諸生申明土德草改曆服色事其夏下詔曰有異物之神見於成紀毋害於民歲以有年朕幾郊祀上帝諸神禮官議毋諱以朕勞有司皆曰古者天子夏親郊祀上帝於郊故曰郊於是夏四月文帝始幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之會以郊見渭陽五帝五帝廟臨渭其北穿蒲池溝水權火舉而祠若光輝然屬天焉於是貴平至上大夫賜纍千金而使博士諸生刺六經中作王制謀議巡狩封禪事文帝出長門若見五人於道北遂因其直立五帝壇祠以五牢其明年平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延壽平又言臣候日再中居頃之日卻復中於是始更以十七年為元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾陰直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎人有上書告平所言皆詐也下吏治誅夷平是後文帝怠於改正服鬼神之事而渭陽長門五帝使祠官領以時致禮不往焉明年胸奴數入邊興兵守御後歲少不登數歲而孝景即位十六年祠官各以歲時祠如故無有所興武帝初即位尤敬鬼神之祀漢興已六十餘歲矣天下艾安縉紳之屬皆望天子封禪改正度也而上鄉儒術招賢良趙綰王臧等以文學為公卿欲議古立明堂城南以朝諸侯草巡狩封禪改曆服色事未就竇太后不好儒術使人微伺趙綰等姦利事按綰臧綰臧自殺諸所興為皆廢六年竇太后崩其明年徵文學之士明年上初至雍郊見五畤後常三歲一郊是時上求神君舍之上林中磃氏館神君者長陵女子以乳死見神於先後宛若宛若祠之其室民多往祠平原君亦往祠其後子孫以尊顯及上即位則厚禮置祠之內中聞其言不見其人云是時李少君亦以祠竈穀道卻老方見上上尊之少君者故深澤侯人主方匿其年及所生長常自謂七十能使物卻老其遊以方遍諸侯無妻子人聞其能使物及不死更餽遺之常餘金錢衣食人皆以為不治産業而饒給又不知其何所人愈信爭事之少君資好方善為巧發奇中常從武安侯宴坐中有年九十餘老人少君乃言與其大父遊射處老人為兒從其大父識其處一坐盡驚少君見上上有故銅器問少君少君曰此器齊桓公十年陳於柏寢已而按其刻果齊桓公器一宮盡駭以為少君神數百歲人也少君言上祠竈皆可致物致物而丹沙可化為黃金黃金成以為飲食器則益壽益壽而海中蓬萊仙者乃可見之以封禪則不死黃帝是也臣嘗遊海上見安期生安期生食臣棗大如瓜安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣久之少君病死天子以為化去不死也使黃錘史寬舒受其方而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠泰一方曰天神貴者泰一泰一佐曰五帝古者天子以春秋祭泰一東南郊日一太牢七日為壇開八通之鬼道於是天子令太祝立其祠長安城東南郊常奉祠如忌方其後人上書言古者天子三年一用太牢祠三一天一地一泰一天子許之令太祝領祠之於忌泰一壇上如其方後人復有言古天子常以春解祠祠黃帝用一梟破鏡冥羊用羊祠馬行用一青牡馬泰一皋山山君用牛武夷君用乾魚陰陽使者以一牛令祠官領之如其方而祠泰一於忌泰一壇旁後二年郊雍獲一角獸若麃然有司曰陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以薦五畤畤加一牛以燎賜諸侯白金以風符應合於天也於是濟北王以為天子且封禪上書獻泰山及其旁邑天子以它縣償之常山王有罪𠨧天子封其弟真定以續先王祀而以常山為郡然後五嶽皆在天子之郡明年齊人少翁以方見上上有所幸李夫人夫人卒少翁以方蓋夜致夫人及竈鬼之貌云天子自帷中望見焉乃拜少翁為文成將軍賞賜甚多以客禮禮之文成言上即欲與神通宮室被服非象神神物不至乃作畫雲氣車及各以勝日駕車辟惡鬼又作甘泉宮中為臺室畫天地泰一諸鬼神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛陽不知言此牛腹中有奇書景祐本無書字封禪書亦無王念孫説無書字是殺視得書書言甚怪天子識其手問之果為書於是誅文成將軍隱之其後又作柏梁銅柱承露仙人掌之屬矣文成死明年天子病鼎湖甚巫醫無所不致遊水發根言上郡有巫病而鬼下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少愈強與我會甘泉於是上病愈遂起幸甘泉病良已大赦置壽宮神君神君最貴者曰太一其佐曰太禁司命之屬皆從之非可得見聞其言言與人音等時去時來來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所欲言行下又置壽宮北宮張羽旗設共具以禮神君神君所言上使受書其名曰畫法其所言世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也後三年有司言元宜以天瑞不宜以一二數一元曰建二元以長星曰光今郊得一角獸曰狩云其明年天子郊雍曰今上帝朕親郊而后土無祀則禮不答也有司與太史令談祠官寬舒議天地牲角繭栗今陛下親祠后土后土宜於澤中圜丘為五壇壇一黃犢牢具已祠盡瘞而從祠衣上黃於是天子東幸汾陰汾陰男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上如寬舒等議上親望拜如上帝禮禮畢天子遂至滎陽還過雒陽下詔封周後令奉其祀語在武紀上始巡幸郡縣寖尋於泰山矣其春樂成侯登王先謙説登字蓋衍上書言欒大欒大膠東宮人故嘗與文成將軍同師已而為膠東王尚方而樂成侯姊為康王后無子王死它姬子立為王而康后有淫行與王不相中相危以法康后聞文成死而欲自媚於上乃遣欒大入因樂成侯求見言方天子既誅文成後悔其方不盡及見欒大大説大為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣數以言康王康王又不用臣臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之勿卑使各佩其信印乃可使通言於神人神人尚肯邪不邪尊其使然後可致也於是上使驗小方鬭棊棊自相觸擊是時上方憂河決而黃金不就乃拜大為五利將軍居月餘得四印得天士將軍地士將軍大通將軍印制詔御史昔禹疏九河決四瀆間者河溢皋陸隄繇不息朕臨天下二十有八年天若遺朕士而大通焉乾稱飛龍鴻漸于般朕意庶幾與焉其以二千戶封地士將軍大為樂通侯賜列侯甲第童千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金十萬斤更名其邑曰當利公主天子親如五利之弟使者存問共給相屬於道自大主將相以下皆置酒其家獻遺之天子又刻玉印曰天道將軍使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以視不臣也而佩天道者且為天子道天神也於是五利常夜祠其家欲以下神後裝治行東入海求其師云大見數月佩六印貴震天下而海上燕齊之間莫不扼掔而自言有禁方能神仙矣其夏六月汾陰巫錦為民祠魏脽后土營旁見地如鉤狀掊視得鼎鼎大異於罪鼎文鏤無款識怪之言吏吏告河東太守勝勝以聞天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行薦之至中山晏溫有黃雲焉有鹿過上自射之因之以祭云至長安公卿大夫皆議尊寶鼎天子曰間者河溢歲數不登故巡祭后土祈為百姓育穀今年豐楙未報鼎曷為出哉有司皆言聞昔泰帝興神鼎一一者一統天地萬物所繫象也黃帝作寶鼎三象天地人禹收九牧之金鑄九鼎象九州皆嘗鬺享上帝鬼神其空足曰鬲以象三德饗承天祜夏德衰鼎遷於殷殷德衰鼎遷於周周德衰鼎遷於秦秦德衰宋之社亡鼎乃淪伏而不見周頌曰自堂徂基自羊徂牛鼐鼎及鼒不㕦不敖胡考之休今鼎至甘泉以光潤龍變承休無疆合茲中山有黃白雲降蓋若獸為符路弓乘矢集獲壇下報祠大亨唯受命而帝者心知其意而合德焉鼎宜視宗禰廣景祐殿局本都作廟廟景祐殿局本都作廟臧於帝庭以合明應制曰可入海求蓬萊者言蓬萊不遠而不能至者殆不見其氣上乃遣望氣佐候其氣云其秋上雍且郊或曰五帝泰一之佐也宜立泰一而上親郊之上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿有札書曰黃帝得寶鼎冕候問於鬼臾區鬼臾區對曰黃帝得寶鼎神策是歲己酉朔旦冬至得天之紀終而復始於是黃帝迎日推策後率二十歲復朔旦冬至凡二十推三百八十年黃帝仙登于天卿因所忠欲奏之所忠視其書不經疑其妄言謝曰寶鼎事已決矣尚何以為卿因嬖人奏之上大説乃召問卿對曰受此書申公申公已死上曰申公何人也卿曰齊人與安期生通受黃帝言無書獨有此鼎書曰漢興復當黃帝之時曰漢之聖者在高祖之孫且曾孫也寶鼎出而與神通封禪封禪七十二王唯黃帝得上泰山封申公曰漢帝亦當上封禪據景祐本改王念孫説景祐本是上據景祐本改王念孫説景祐本是封禪則能仙登天矣據景祐本改王念孫説景祐本是黃帝萬諸侯而神靈之封君七千天下名山八而三在蠻夷五在中國中國華山首山太室山泰山東萊山此五山黃帝之所常遊與神會黃帝且戰且學仙患百姓非其道乃斷斬非鬼神者百餘歲然後得與神通黃帝郊雍上帝宿三月鬼臾區號大鴻死葬雍故鴻冢是也其後黃帝接萬靈明庭明庭者甘泉也所謂寒門者谷口也黃帝采首山銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎群臣後宮從上龍七十餘人龍乃上景祐殿本都有上字朱一新説史記同此脫去餘小臣不得上乃悉持龍髯龍髯拔墯墯黃帝之弓百姓卬望黃帝既上天乃抱其弓與龍髯號故後世因名其處曰鼎湖其弓曰烏號於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳拜卿為郎使東候神於太室上遂郊雍至隴西登空桐幸甘泉令祠官寬舒等具泰一祠壇祠壇放亳忌泰一壇三陔五帝壇環居其下各如其方黃帝西南除八通鬼道泰一所用如雍一畤物而加醴棗脯之屬殺一氂牛以為俎豆牢具而五帝獨有俎豆醴進其下四方地為腏食群神從者及北斗云已祠胙餘皆燎之其牛色白白鹿居其中彘在鹿中鹿中水而酒之祭日以牛祭月以羊彘特泰一祝宰則衣紫及繡五帝各如其色日赤月白十一月辛巳朔旦冬至曶爽天子始郊拜泰一朝朝日夕夕月則揖而見泰一如雍郊禮其贊饗曰天始以寶鼎神授皇帝朔而又朔終而復始皇帝敬拜見焉而衣上黃其祠列火滿壇壇旁亨炊具有司云祠上有光公卿言皇帝始郊見泰一雲陽有司奉瑄玉嘉牲薦饗是夜有美光及晝黃氣上屬天太史令談祠官寬舒等曰神靈之休祐福兆祥宜因此地光域立泰畤壇以明應令太祝領秋及臘間祠二景祐殿本都作三王先謙説封禪書通鑑作三是此誤三景祐殿本都作三王先謙説封禪書通鑑作三是此誤歲天子一郊見其秋為伐南越告禱泰一以牡荊畫幡日月北斗登龍以象太一三星為泰一鋒旗王念孫説鋒旗之旗後人以意加之也景祐本無旗字注同命曰靈旗為兵禱則太史奉以指所伐國而五利將軍使不敢入海之泰山祠上使人隨驗實無所見五利妄言見其師其方盡多不讎上乃誅五利其冬公孫卿候神河南言見仙人迹緱氏城上有物如雉往來城上天子親幸緱氏視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主者求之其道非少寬暇神不來言神事如迂誕積以歲乃可致於是郡國各除道繕治宮館名山神祠所以望幸矣其春既滅南越嬖臣李延年以好音見上善之下公卿議曰民間祠有鼓舞樂今郊祀而無樂豈稱乎公卿曰古者祠天地皆有樂而神祇可得而禮或曰泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃於是塞南越禱祠泰一后土始用樂舞益召歌兒作二十五絃及空侯瑟自此起其來年冬上議曰古者先振兵釋旅然後封禪乃遂北巡朔方勒兵十餘萬騎還祭黃帝冢橋山釋兵涼如上曰吾聞黃帝不死有冢何也或對曰黃帝以仙上天群臣葬其衣冠既至甘泉為且用事泰山先類祠泰一自得寶鼎上與公卿諸生議封禪封禪用希曠絶莫知其儀體而群儒采封禪尚書周官王制之望祀射牛事齊人丁公年九十餘曰封禪者古不死之名也秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒習射牛草封禪儀數年至且行天子既聞公孫卿及方士之言黃帝以上封禪皆致怪物與神通欲放黃帝以接神人蓬萊高世比德於九皇而頗采儒術以文之群儒既已不能辨明封禪事又拘於詩書古文而不敢騁上為封祠器視群儒群儒或曰不與古同徐偃又曰太常諸生行禮不如魯善周霸屬圖封事於是上黜偃霸而盡罷諸儒弗用三月乃東幸緱氏禮登中嶽太室從官在山上聞若有言萬歲云問上上不言問下下不言乃令祠官加增太室祠禁毋伐其山木以山下戶凡三百封崇高為之奉邑獨給祠復無有所與上因東上泰山泰山草木未生乃令人上石立之泰山顛上遂東巡海上行禮祠八神齊人之上疏言神怪奇方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行侯名山至東萊言夜見大人長數丈就之則不見見其迹甚大類禽獸云群臣有言見一老父牽狗言五欲見巨公已忽不見上既見大迹未信及群臣又言老父則大以為仙人也宿留海上與方士傳車及間使求神仙人以千數四月還至奉高上念諸儒及方士言封禪人殊不經難施行天子至梁父禮祠地主至乙卯令侍中儒者皮辨縉紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺高九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下陰道丙辰禪泰山下址東北肅然山如祭后土禮天子皆親拜見衣上黃而盡用樂焉江淮間一茅三脊為神藉五色土益雜封縱遠方奇獸飛禽及白雉諸物頗以加祠兕牛象犀之屬不用皆至泰山然後去封禪祠其夜若有光晝有白雲出封中天子從禪還坐明堂群臣更上壽下詔改元為元封語在武紀又曰古者天子五載一巡狩用事泰山諸侯有朝宿地其令諸侯各治邸泰山下天子既已封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉奉車子侯暴病一日死上乃遂去並海上北至碣石巡自遼西歷北邊至九原五月乃至甘泉周萬八千里云其秋有星孛於東井後十餘日有星孛於三能望氣王朔言候獨見填星出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云其來年冬郊雍五帝還拜祝祠泰一贊饗曰德星昭衍厥維休祥壽星仍出淵耀光明信星昭見皇帝敬拜泰祝之享其春公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日毋所見見大人迹云復遣方士求神人采藥以千數是歲旱天子既出亡名乃禱萬里沙過祠泰山還至瓠子自臨塞決河留二日湛泀而去是時既滅兩粵粵人勇之乃言粵人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼壽百六十歲後世怠嫚故衰耗乃命粵巫立粵祝祠安臺無壇亦祠天神帝百鬼而以雞卜上信之粵祠雞卜自此始用公孫卿曰仙人可見上往常遽以故不見今陛下可為館如緱氏城置脯棗神人宜可致且仙人好樓居於是上令長安則作飛廉桂館甘泉則作益壽廷壽館使卿持節設具而候神人乃作通天臺置祠具其下將招來神仙之屬於是甘泉更置前殿始廣諸宮室夏有芝生甘泉殿房內中天子為塞河興通天若有光云乃下詔赦天下其明年伐朝鮮夏旱公孫卿曰黃帝時封則天旱乾封三年上乃下詔天旱意乾封乎其令天下尊祠靈星焉明年上郊雍五畤通回中道遂北出蕭關歷獨鹿鳴澤自西河歸幸河東祠后土明年冬上巡南郡至江陵而東登禮灊之天柱山號曰南嶽浮江自潯陽出樅陽過彭蠡禮其名山川此至琅邪並海上四月至奉高修封焉初天子封泰山泰山東北址古時有明堂處處險不敞上欲治明堂奉高旁未曉其制度濟南人公玉帶上帝時明堂圖明堂中有一殿四面無壁以茅蓋通水水圜宮垣為復道上有樓從西南入名曰昆侖天子從之入以拜祀上黃帝焉於是上令奉高作明堂汶上如帶圖及是歲修封則祠泰一五帝於明堂上坐合高皇帝祠坐對之祠后土於下房以二十太牢天子從昆侖道入始拜明堂如郊禮畢尞堂下而上又上泰山自有祕祠其顛而泰山下祠五帝各如其方黃帝并赤帝所有司侍祠焉山上舉火下悉應之還幸甘泉郊泰畤春幸汾陰祠后土明年幸泰山以十一月甲子朔旦冬至日祀上帝於明堂後每宋祁説越本每作毋新本無後字但云毋修封按景祐本作毋修封毋宋祁説越本每作毋新本無後字但云毋修封按景祐本作毋修封修封其贊饗曰天增授皇帝泰元神策周而復始皇帝敬拜泰一東至海上考入海及方士求神者莫驗然益遣幾遇之乙酉柏梁災十二月甲午朔上親禪高里祠后土臨勃海將以望祀蓬萊之屬幾至殊庭焉上還以柏梁災故受計甘泉公孫卿曰黃帝就青靈臺十二日燒黃帝乃治明庭明庭甘泉也方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸勇之乃曰粵俗有火災復起屋必以大用勝服之於是作建章宮度為千門萬戶前殿度高未央其東則鳳闕高二十餘丈其西則商中數十里虎圈其北治大池漸臺高二十餘丈名曰泰液池中有蓬萊方丈瀛州壺梁象海中神山龜魚之屬其南有玉堂璧門大鳥之屬立神明臺井幹樓高五十丈輦道相屬焉夏漢改曆以正月為歲首而色上黃官更印章以五字因為太初元年是歲西伐大宛蝗大起丁夫人雒陽虞初等以方祠詛胸奴大宛焉明年有司言雍五畤無牢孰具芬芳不備乃令祠官進畤犢牢具色食所勝而以木寓馬代駒云乃諸名山川用駒者悉以木寓馬代獨行過親祠乃用駒它禮如故明年東巡海上考神仙之屬未有驗者方士有言黃帝時為五城十二樓以候神人於執期名曰迎年上許作之如方名曰明年上親禮祠上犢黃焉公玉帶曰黃帝時雖封泰山然風后封巨岐伯令黃帝封東泰山禪凡山合符然後不死天子既令設祠具至東泰山東泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山修五年之禮如前而加禪祠石閭石閭者在泰山下址南方方士言仙人閭也故上親禪焉其後五年復至泰山修封還過祭恆山自封泰山後十三歲而周遍於五嶽四瀆矣後五年復至泰山修封東幸琅邪禮日成山登之罘浮大海用事八神延年又祠神人於交門宮若有鄉坐拜者云後五年上復修封於泰山東遊東萊臨大海是歲雍縣無雲如靁者三或如虹氣蒼黃若飛鳥集棫陽宮南聲聞四百里隕石二黑如黳有司以為美祥以薦宗廟而方士之候神入海求蓬萊者終無驗公孫卿猶以大人之迹為解天子猶羈縻不絶幾遇其真諸所興如薄忌泰一及三一冥羊馬行赤星五床寬舒之祠宮王先謙説床字疑後人誤加封禪書孝武紀並無宮字封禪書孝武紀並作官是此誤官王先謙説床字疑後人誤加封禪書孝武紀並無宮字封禪書孝武紀並作官是此誤以歲時致禮凡六祠皆大祝領之至如八神諸明年凡山它名祠行過則祠去則已方士所興祠各自主其人終則已祠官不主它祠皆如故甘泉泰一汾陰后土三年親郊祠而泰山五年一修封武帝凡五修封昭帝即位富於春秋未嘗親巡祭云宣帝即位由武帝正統興故立三年尊孝武廟為世宗行所巡狩郡國皆立廟告祠世宗廟日有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興於殿旁有鳥如白鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音門戶大開夜有光殿上盡明上乃下詔赦天下時大將軍霍光輔政上共己正南面非宗廟之祀不出十二年乃下詔曰蓋聞天子尊事天地修祀山川古令通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齊祠之禮頗作詩歌其三月幸河東祠后土有神爵集改元為神爵制詔太常夫江海百川之大者也今闕焉無祠其令祠官以禮為歲事以四時祠江海雒水祈為天下豐年焉自是五嶽四瀆皆有常禮東嶽泰山於博中嶽泰室於嵩高南嶽灊山於灊西嶽華山於華陰北嶽常山於上曲陽河於臨晉江於江都淮於平氏濟於臨邑界中皆使者持節侍祠唯泰山與河歲五祠江水四餘皆一禱而三祠云時南郡獲白虎獻其皮牙爪上為立祠又以方士言為隨侯劍寶玉寶璧周康寶鼎立四祠於未央宮中又祠太室山於即墨三戶山於下密祠天封苑火井於鴻門又立歲星辰星太白熒惑南斗祠於長安城旁又祠參山八神於曲城蓬山石社石鼓於臨朐之罘山於腄成山於不夜萊山於黃成山祠日萊山祠月又祠四時於琅邪蚩尤於壽良京師近縣鄠則有勞谷五床山日月五帝仙人玉女祠雲陽有徑路神祠祭休屠王也又立五龍山仙人祠及黃帝天神帝原水凡四祠於膚施或言益州有金馬碧雞之神可醮祭而致於是遣諫大夫王褒使持節而求之大夫劉更生獻淮南枕中洪寶苑祕之方令尚於鑄作事不驗更生坐論京兆尹張敞上疏諫曰願明主時忘車馬之好斥遠方士之虛語遊心帝王之術太平庶幾可興也後尚方待詔皆罷是時美陽得鼎獻之下有司議多以為宜薦見宗廟如元鼎時故事張敞好古文字桉鼎銘勒而上議曰臣聞周祖始乎后稷后稷封於斄公劉發迹於豳大王建國於岐梁文武興於酆鎬由此言之則岐梁豐鎬之間周舊居也固宜有宗廟壇場祭祀之臧今鼎出於岐東中有刻書曰王命尸臣官此栒邑賜爾旗鸞黼黻雕戈尸臣拜手稽首曰敢對揚天子丕顯休命臣愚不足以迹古文竊以傳記言之此鼎殆周之所以褒賜大臣大臣子孫刻銘其先功臧之於宮廟也昔寶鼎之出於汾脽也河東太守以聞詔曰朕巡祭后土祈為百姓蒙豐年今穀嗛未報鼎焉為出哉博問耆老意舊臧與誠欲考得事實也有司驗脽上非舊臧處鼎大八尺一寸高三尺六寸殊異於衆鼎今此鼎細小又有款識不宜薦見於宗廟制曰京兆尹議是上自幸河東之明年正月鳳皇集祋祤於所集處得玉寶起步壽宮乃下詔赦天下後間歲鳳皇神爵甘露降集京師赦天下其冬鳳皇集上林乃作鳳皇殿以答嘉瑞明年正月復幸甘泉郊泰畤改元曰五鳳明年幸雍祠五畤其明年春幸河東祠后土赦天下後間歲改元為甘露正月上幸甘泉郊泰畤其夏黃龍見新豐建章未央長樂宮鍾虡銅人皆生毛長一寸所時以為美祥後間歲正月上郊泰畤因朝單于於甘泉宮後間歲改元為黃龍正月復幸甘泉郊泰畤又朝單于於甘泉宮至冬而崩鳳皇下郡國凡五十餘所元帝即位遵舊儀間歲正月一幸甘泉郊泰畤又東至河東祠后土西至雍祠五畤凡五奉泰畤后土之祠亦施恩澤時所過毋出田租賜百戶牛酒或賜爵赦罪人元帝好儒貢禹韋玄成匡衡等相繼為公卿禹建言漢家宗廟祭祀多不應古禮上是其言後韋玄成為丞相議罷郡國廟自太上皇孝惠帝諸園寢廟皆罷後元帝寢疾夢神靈譴罷諸廟祠上遂復焉後或罷或復至哀平不定語在韋玄成傳成帝初即位丞相衡御史大夫談奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義也瘞地於北郊即陰之象也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宮即於雲陽立泰畤祭於宮南今行常幸長安郊見皇天反北之泰陰祠后土反東之少陽事與古制殊又至雲陽行溪谷中厄陝且百里汾陰則渡大川有風波舟楫之危皆非聖主所宜數乘郡繇治道共張吏民困苦百官煩費勞所保之民行危陰之地難以奉神靈而祈福祐殆未合於承天子民之意昔者周文武郊於豐鄗成王郊於雒邑由此觀之天隨王者所居而饗之可見也甘泉泰畤河東后土之祠宜可徙置長安合於古帝王願與群臣議定奏可大司馬車騎將軍許嘉等八人以為所從來久遠宜如故右將軍王商博士師丹議郎翟方進等五十人以為禮記曰燔柴於太壇祭天也瘞薶於大折祭地也兆於南郊所以定天位也祭地於大折在北郊就陰位也郊處各在聖王所都之南北書曰越三日丁巳用牲於郊牛二周公加牲告徙新邑定郊禮於雒明王聖主事天明事地察天地明察神明章矣天地以王者為主故聖王制祭天地之禮必於國郊長安聖主之居皇天所觀視也甘泉河東之祠非神靈所饗宜徙就正陽大陰之處違俗復古循聖制定天位如禮便於是衡談奏議曰陛下聖德匆明上通承天之大典覽群下使各悉心盡慮議郊祀之處天下幸甚臣聞廣謀從衆則合於天心故洪範曰三人占則從二人言言少從多之義也論當往古宜於萬民則依而從之違道寡與則廢而不行今議者五十八人其五十人言當徙之義皆著於經傳同於上世便於吏民八人不案經藝考古制而以為不宜無法之議難以定吉凶太誓曰正稽古立功立事可以永年丕天之大律詩曰毋曰高高在上陟降厥士日監在茲言天之日監王者之處也又曰乃眷西顧此維豫宅言天以文王之都為居也宜於長安定南北郊為萬世基天子從之既定衡言甘泉泰畤紫壇八觚宣通象八方五帝壇周環其下又有群神之壇以尚書禋六宗望山川遍群神之義紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人祠瘞鸞路騂駒寓龍馬不能得其象於古臣聞郊紫壇何焯説以文義求之作柴為是亦不當有壇字按景祐殿本紫都作柴無壇字柴何焯説以文義求之作柴為是亦不當有壇字按景祐殿本紫都作柴無壇字饗帝之義掃地而祭上質也歌大呂舞雲門以俟天神歌太蔟舞咸池以俟地祇其牲用犢其席稿秸其器陶匏皆因天地之性貴誠上質不敢修其文也以為神祇功德至大雖修精微而備庶物猶不足以報功唯至誠為可致景祐殿本都作故朱一新説作故是故景祐殿本都作故朱一新説作故是上質不飾以章天德紫壇偽飾女樂鸞路騂駒龍馬石壇之屬宜皆勿修衡又言王者各以其禮制事天地非因異世所立而繼之今雍鄜密上下畤本秦侯各以其意所立非禮之所載術也漢興之初儀制未及定即且因秦故祠復立北畤今既稽古建定天地之大禮郊見上帝青赤白黃黑五方之帝皆畢陳各有位饌祭祀備具諸侯所妄造王者不當長遵及北畤未定時所立不宜復修天子皆從焉及陳寶祠由是皆罷明年上始祀南郊赦奉郊之縣及中都官耐罪囚徒是歲衡談復條奏長安廚官縣官給祠郡國候神方士使者所祠凡六百八十三所其二百八所應禮及疑無明文可奉祠如故其餘四百七十五所不應禮或復重請皆罷奏可本雍舊祠二百三所唯山川諸星十五所為應禮云若諸布諸嚴諸逐皆罷杜主有五祠置其一又罷高祖所立梁晉秦荊巫九天南山萊中之屬及孝文渭陽孝武薄忌泰一三一黃帝冥羊馬行泰一皋山山君武夷夏后啓母石萬里沙八神延年之屬及孝宣參山蓬山之罘成山萊山四時蚩尤勞谷五床仙人玉女徑路黃帝天神原水之屬皆罷候神方士使者副佐本草待詔七十餘人皆歸家明年匡衡坐事免官爵衆庶多言不當變動祭祀者又初罷甘泉泰畤作南郊日大風壞甘泉竹宮折拔畤中樹木十圍以上百餘天子異之以問劉向對曰家人尚不欲絶種祠況於國之神寶舊畤且甘泉汾陰及雍五畤始立皆有神祇感應然後營之非苟而已也武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動及陳寶祠自秦文公至今七百餘歲矣漢興世世常來光色赤黃長四五丈直祠而息音聲砰隱野雞皆雊每見雍太祝祠以太牢遣候者乘一乘傳馳詣行在所以為福祥高祖時五來文帝二十六來武帝七十五來宣帝二十五來初元元年以來亦二十來此陽氣舊祠也及漢宗廟之禮不得擅議皆祖宗之君與賢臣所共定古今異制經無明文至尊至重難以疑説正也前始納貢禹之議後人相因多所動搖易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之後上以無繼嗣故令皇太后詔有司曰蓋聞王者承事天地文接泰一尊莫著於祭祀孝武皇帝大聖通明始建上下之祀營泰畤於甘泉定后土於汾陰而神祇安之饗國長久子孫蕃滋纍世遵業福流於今今皇帝寬仁孝順奉循聖緒靡有大愆而久無繼嗣思其咎職殆在徙南北郊違先帝之制改神祇舊位失天地之心以妨繼嗣之福春秋六十未見皇孫食不甘味寢不安席朕甚悼焉春秋大復古善順祀其復甘泉泰畤汾陰后土如故及雍五畤陳寶祠在陳倉者天子復親郊禮如前又復長安雍及郡國祠著明者且半成帝末年頗好鬼神亦以無繼嗣故多上書言祭祀方術者皆得待詔祠祭上林苑中長安城旁費用甚多然無大貴盛者谷永説上曰臣聞明於天地之性不可或以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱奇怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥遙興輕舉登遐倒景覽觀縣圃浮遊蓬萊耕耘五德朝種暮穫與山石無極黃冶變化堅冰淖溺化色五倉之術者皆姦人惑衆挾左道懷詐偽以欺罔世主聽其言洋洋滿耳若將可遇求之蕩蕩如係風捕景終不可得是以明王距而不聽聖人絶而不語昔周史萇弘欲以鬼神之術輔尊靈王會朝諸侯而周室愈微諸侯愈叛楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵挫地削身辱國危秦始皇初并天下甘心於神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以仙人黃冶祭祠事鬼使物入海求神采藥貴幸賞賜纍千金大尤尊盛至妻公主爵位重絫震動海內元鼎元封之際燕齊之間方士瞋目扼掔言有神仙祭祀致福之術者以萬數其後平等皆以術窮詐得誅夷伏辜至初元中有天淵玉女巨鹿神人轑陽侯師張宗之姦紛紛復起夫周秦之末三五之隆已嘗專意散財厚爵祿竦精神舉天下以求之矣曠日經年靡有毫氂之驗足以揆今經曰享多儀儀不及物惟曰不享論語説曰子不語怪神唯陛下距絶此類毋令姦人有以窺朝者上善其言後成都侯王商為大司馬衛將軍輔政杜鄴説商曰東鄰殺牛不如西鄰之瀹祭言奉天之道貴以誠質大得民心也行穢祀豐猶不蒙祐德修薦薄吉必大來古者壇場有常處尞禋有常用贊見有常禮犧牲玉帛雖備而財不匱車輿臣役雖動而用不勞是故每奉景祐殿本都作舉朱一新説作舉是舉景祐殿本都作舉朱一新説作舉是其禮助者歡説大路所歷黎元不知今甘泉河東天地郊祀咸失方位違陰陽之宜及雍五畤皆曠遠奉尊之役休而復起繕治共張無解已時皇天著象殆可略知前上甘泉先驅失道禮月之夕奉引復迷祠后土還臨河當渡疾風起波船不可御又雍大雨壞平陽宮垣及三月甲子震電災林光宮門祥瑞未著咎徵仍臻迹三郡所奏皆有變故不答不饗何以甚此詩曰率由舊章舊章先王法度文王以之交神于祀子孫千億宜如異時公卿之議復還長安南北郊後數年成帝崩皇太后詔有司曰皇帝即位思順天心遵經義定郊禮天下説喜懼未有皇孫故復甘泉泰畤汾陰后土庶幾獲福皇帝恨難之卒未得其祐其復南北郊長安如故以順皇帝之意也哀帝即位寢疾博徵方術士京師諸縣皆有侍祠使者盡復前世所常興諸神祠官凡七百餘所一歲三萬七千祠云明年復令太皇太后詔有司曰皇帝孝順奉承聖業靡有解怠而久疾未瘳夙夜唯思殆繼體之君不宜改作其復甘泉泰畤汾陰后土祠如故上亦不能親至遣有司行事而禮祠焉後三年哀帝崩平帝元始五年大司馬王莽奏言王者父事天故爵稱天子孔子曰人之行莫大於孝孝莫大於嚴父嚴父莫大於配天王者尊其考欲以配天緣考之意欲尊祖推而上之遂及始祖是以周公郊祀后稷以配天宗祀文王於明堂以配上帝禮記天子祭天地及山川歲遍春秋穀梁傳以十二月下辛卜正月上辛郊高皇帝受命因雍四畤起北畤而備五帝未共天地之祀孝文十六年用新垣平初起渭陽五帝廟祭泰一地祇以太祖高皇帝配日冬至祠泰一夏至祠地祇皆并祠五帝而共一牲上親郊拜後平伏誅乃不復自親而使有司行事孝武皇帝祠雍曰今上帝朕親郊而后土無祠則禮不答也於是元鼎四年十一月甲子始立后土祠於汾陰或曰五帝泰一之佐宜立泰一五年十一月癸未始立泰一祠於甘泉二歲一郊與雍更祠亦以高祖配不歲事天皆未應古制建始元年徒甘泉泰畤河東后土於長安南北郊永始元年三月以未有皇孫復甘泉河東祠綏和二年以卒不獲祐復長安南北郊建平三年懼孝哀皇帝之疾未瘳復甘泉汾陰祠竟復無福臣謹與太師孔光長樂少府平晏大司農左咸中壘校尉劉歆太中大夫朱陽博士薛順議郎國由等六十七人議皆曰宜如建始時丞相衡等議復長安南北郊如故莽又頗改其祭禮曰周官天墬之祀樂有別有合其合樂曰以六律六鐘五聲八音六舞大合樂祀天神祭墬祇祀四望祭山川享先妣先祖凡六樂奏六歌而天墬神祇之物皆至四望蓋謂日月星海也三光高而不可得親海廣大無限界故其樂同祀天則天文從祭墬則墬理從三光天文也山川地理也天地合祭先祖配天先妣配墬其誼一也天墬合精夫婦判合祭天南郊則以墬配一體之誼也天墬位皆南鄉同席墬在東共牢而食高帝高后配於壇上西鄉后在北亦同席共牢牲用繭栗玄酒陶匏禮記曰天子籍田千畝以事天墬繇是言之宜有黍稷天地用牲一燔尞瘞薶用牲一高帝高后用牲一天用牲左及黍稷燔尞南郊墬用牲右及黍稷瘞於北郊其旦東鄉再拜朝日其夕西鄉再拜夕月然後孝弟之道備而神祇嘉享萬福降輯此天墬合祀以祖妣配者也其別樂曰冬日至於墬上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則墬祇皆出天墬有常位不得常合此其各特祀者也陰陽之別於日冬夏至其會也以孟春正月上辛若丁天子親合祀天墜於南郊以高帝高后配陰陽有離合易曰分陰分陽迭用柔剛以日冬至使有司奉祠南郊高帝配而望群陽日夏至使有司奉祭北郊高后配而望群陰皆以助致微氣通道幽弱當上此之時后不省方故天子不親而遣有司所以正承天順地復聖王之制顯太祖之功也渭陽祠勿復修群望未悉定定復奏奏可三十餘年間天地之祠五徙焉後莽又奏言書曰類於上帝禋于六宗歐陽大小夏侯三家説六宗皆曰上不及天下不及墬旁不及四方在六者之間助陰陽變化實一而名六名實不相應禮記祀典功施於民則祀之天文日月星辰所昭仰也地理山川海澤所生殖也易有八卦乾坤六子水火不相逮靁風不相悖山澤通氣然後能變化既成萬物也臣前奏徙甘泉泰畤汾陰后土皆復於南北郊謹案周官兆五帝於四郊山川各因其方今五帝兆居在雍五畤不合於古又日月靁風山澤易卦六子之尊氣所謂六宗也星辰水火溝瀆皆六宗之屬也今或未特祀或無兆居謹與太師光大司徒宮羲和歆等八十九人議皆曰天子父事天母事墬今稱天神曰皇天上帝泰一兆曰泰畤而稱地祇曰后土與中央黃靈同又兆北郊未有尊稱宜令地祇稱皇墬后祇兆曰廣畤易曰方以類聚物以群分分群神以類相從為五部兆天墬之別神中央帝黃靈后土畤及日廟北辰北斗填星中宿中宮於長安城之未墬兆東方帝太昊青靈勾芒畤及靁公風伯廟歲星東宿東宮於東郊兆南方炎帝赤靈祝融畤及熒惑星南宿南宮於南郊兆西方帝少皞白靈蓐收畤及太白星西宿西宮於西郊兆北方帝顓頊黑靈玄冥畤及月廟雨師廟辰星北宿北宮於北郊兆奏可於是長安旁諸廟兆畤甚盛矣莽又言帝王建立社稷百王不易社者土也宗廟王者所居稷者百穀之主所以奉宗廟共粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟詩曰乃立冢土又曰以御田祖以祈甘雨禮記曰唯祭宗廟社稷為越紼而行事聖漢興禮儀稍定已有官社未立官稷遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種穀樹徐州牧歲貢五色土各一斗莽篡位二年興神仙事以方士蘇樂言起八風臺於宮中臺成萬金作樂其上順風作液湯又種五粱禾於殿中各順色置其方面先鬻鶴髓毒冒犀玉二十餘物漬種計粟斛成一金言此黃帝穀仙之術也以樂為黃門郎令主之莽遂崇鬼神淫祀至其末年自天地六宗以下至諸小鬼神凡千七百所用三牲鳥獸三千餘種後不能備乃以雞當鶩鴈犬當麋鹿數下詔自以當仙語在其傳贊曰漢興之初庶事草創唯一叔孫生略定朝廷之儀若乃正朔服色郊望之事數世猶未章焉至於孝文始以夏郊而張倉據水德公孫臣賈誼更以為土德卒不能明孝武之世文章為盛太初改制而兒寬司馬遷等猶從臣誼之言服色數度遂順黃德彼以五德之傳從所不勝秦在水德故謂漢據土而克之劉向父子以為帝出於震故包羲氏始受木德其後以母傳子終而復始自神農黃帝下歷唐虞三代而漢得火焉故高祖始起神母夜號著赤帝之符旗章遂赤自得天統矣昔共工氏以水德間於木火與秦同運非其次序故皆不永由是言之祖宗之制蓋有自然之應順時宜矣究觀方士祠官之變谷永之言不亦正乎不亦正乎
