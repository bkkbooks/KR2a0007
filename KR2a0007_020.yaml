北萬三千三百六十八里提封田一萬萬四千五百一十三萬六千四百五頃其一萬萬二百五十二萬八千八百八十九頃邑居道路山川林澤群不可墾其三千二百二十九萬九百四十七頃可墾不可墾定墾田八百二十七萬五百三十六頃民戶千二百二十三萬三千六十二口五千九百五十九萬四千九百七十八漢極盛矣凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜亡常隨君上之情欲故謂之俗孔子曰移風易俗莫善於樂言聖王在上統理人倫必移其本而易其末此混同天下一之呼中和然後王教成也漢承百年朱一新説汪本年作王是按景祐殿本都作王王朱一新説汪本年作王是按景祐殿本都作王之末國土變改民人遷徙成帝時劉向略言其域景祐殿本都作地地景祐殿本都作地分丞相張禹使屬潁川朱贛條其風俗猶未宣究故輯而論之終其本末著於篇秦地於天官東井輿鬼之分野也其界自弘農故關以西京兆扶風馮翊北地上郡西河安定天水隴西南有巴蜀廣漢犍為武都西有金城武威張掖酒泉敦煌又西南有牂柯越巂益州皆宜屬焉秦之先曰柏益出自帝顓頊堯時助禹治水為舜朕虞養育草木鳥獸賜姓嬴氏歷夏殷為諸侯至周有造父善馭習馬得華駵緑耳之乘幸於穆王封於趙城故更為趙氏後有非子為周孝王養馬汧渭之間孝王曰昔伯益知禽獸子孫不絶乃封為附庸邑之於秦今隴西秦亭秦谷是也至玄孫氏為莊公破西戎有其地子襄公時幽王為犬戎所敗平王東遷雒邑襄公將兵救周有功賜受岐酆之地列為諸侯後八世穆公稱伯以河為竟十餘世孝公用商君制轅田開阡伯東雄諸侯子惠公初稱王得上郡西河孫昭王開巴蜀滅周取九鼎昭王曾孫政并六國稱皇帝負力怙威燔書坑儒自任私智至子胡亥天下畔之故秦地於禹貢時跨雍梁二州詩風兼秦豳兩國昔后稷封斄公劉處豳大王徙岐文王作酆武王治鎬其民有先王遺風好稼穡務本業故豳詩言農桑衣食之本甚備有鄠杜竹林南山檀柘號稱陸海為九州膏腴始皇之初鄭國穿渠引涇水溉田沃野千里民以富饒漢興立都長安徙齊諸田楚昭屈景及諸功臣家於長陵後世世徙吏二千石高訾富人及豪桀并兼之家於諸陵蓋亦以強幹弱支非獨為奉山園也是故五方雜厝風俗不純其世家則好禮文富人則商賈為利豪桀則遊俠通姦瀕南山近夏陽多阻險輕薄易為盜賊常為天下劇又郡國輻湊浮食者多民去本就末列侯貴人車服僭上衆庶放效羞不相及嫁娶尤崇侈靡送死過度天水隴西山多林木民以板為室屋及安定北地上郡西河皆迫近戎狄修習戰備高上氣力以射獵為先故秦詩曰在其板屋又曰王于興師修我甲兵與子偕行及車轔四臷小戎之篇皆言車馬田狩之事漢興六郡良家子選給羽林期門以材力為官名將多出焉孔子曰君子有勇而亡誼則為亂小人有勇而亡誼則為盜故此數郡民俗質木不恥寇盜自武威以西本胸奴昆邪王休屠王地武帝時攘之初置四郡以通西域鬲絶南羌胸奴其民或以關東下貧或以報怨過當或以悖逆亡道家屬徙焉習俗頗殊地廣民稀水屮宜畜牧古景祐殿本都作故朱一新説作故是故景祐殿本都作故朱一新説作故是涼州之畜為天下饒保邊塞二千石治之咸以兵馬為務酒禮之會上下通焉吏民相親是以其俗風雨時節穀糴常賤少盜賊有和氣之應賢於內郡此政寬厚吏不苛刻之所致也巴蜀廣漢本南夷秦并以為郡土地肥美有江水沃野山林竹木疏食果實之饒南賈滇僰僮西近邛莋馬旄牛民食稻魚亡凶年憂俗不愁苦而輕易淫泆柔弱褊厄景武間文翁為蜀守教民讀書法令未能篤信道德反以好文刺譏貴慕權勢及司馬相如遊宦京師諸侯以文辭顯於世鄉黨慕循其迹後有王褒嚴遵揚雄之徒文章冠天下繇文翁倡其教相如為之師故孔子曰有教亡類武都地雜氐羌及犍為牂柯越巂皆西南外夷武帝初開置民俗略與巴蜀同而武都近天水俗頗似焉故秦地天下三分之一而人衆不過什三然量其富居什六吳札觀樂為之歌秦曰此之謂夏聲夫能夏則大大之至也其周舊乎自井十度至柳三度謂之鶉首之次秦之分也魏地觜觿參之分野也其界自高陵以東盡河東河內南有陳留及汝南之召陵濦強新汲西華長平潁川之舞陽郾許傿陵河南之開封中牟陽武酸棗卷皆魏分也河內本殷之舊都周既滅殷分其畿內為三國詩風邶庸衛國是也鄁以封紂子武庚庸管叔尹之衛蔡叔尹之以監殷民謂之三監故書序曰武王崩三監畔周公誅之盡以其地封弟康叔號曰孟侯以夾輔周室遷邶庸之民于雒邑故邶庸衛三國之詩相與同風邶詩曰在浚之下庸曰在浚之郊邶又曰亦流于淇河水洋洋庸曰送我淇上在彼中河衛曰瞻彼淇奧河水洋洋故吳公子札聘魯觀周樂聞邶庸衛之歌曰美哉淵乎吾聞康叔之德如是是其衛風乎至十六世懿公亡道為狄所滅齊桓公帥諸侯伐狄而更封衛於河南曹楚丘是為文公而河內殷虛更屬于晉康叔之風既歇而紂之化猶存故俗剛強多豪桀侵奪薄恩禮好生分河東土地平易有鹽鐵之饒本唐堯所居詩風唐魏之國也周武王子唐叔在母未生武王夢帝謂己曰余名而子曰虞將與之唐屬之參及生名之曰虞至成王滅唐而封叔虞唐有晉水及叔虞子燮為晉侯云故參為晉星其民有先王遺教君子深思小人儉陋故唐詩蟋蟀山樞葛生之篇曰今我不樂日月其邁宛其死矣它人是偷百歲之後歸于其居皆思奢儉之中念死生之慮吳札聞唐之歌曰思深哉其有陶唐氏之遺民乎魏國亦姬姓也在晉之南河曲故其詩曰彼汾一曲置諸河之側自唐叔十六世至獻公滅魏以封大夫畢萬滅耿以封大夫趙夙及大夫韓武子食采於韓原晉於是始大至於文公伯諸侯尊周室始有河內之土吳札聞魏之歌曰美哉渢渢乎以德輔此則明主也文公後十六世為韓魏趙所滅三家皆自立為諸侯是為三晉趙與秦同祖韓魏皆姬姓也自畢萬後十世稱侯至孫稱王徙都大梁故魏一號為梁七世為秦所滅周地柳七星張之分野也今之河南雒陽穀成平陰偃師鞏緱氏是其分也昔周公營雒邑以為在于土中諸侯蕃屏四方故立京師至幽王淫褒姒以滅宗周子平王東居雒邑其後五伯更帥諸侯以尊周室故周於三代最為長久八百餘年至於赧王乃為秦所兼初雒邑與宗周通封畿東西長而南北短短長相覆為千里至襄王以河內賜晉文公又為諸侯所侵故其分墜小周人之失巧偽趨利貴財賤義高富下貧喜為商賈不好仕宦自柳三度至張十二度謂之鶉火之次周之分也韓地角亢氐之分野也韓分晉得南陽郡及潁川之父城定陵襄城潁陽潁陰長社陽翟郟東接汝南西接弘農得新安宜陽皆韓分也及詩風陳鄭之國與韓同星分焉鄭國今河南之新鄭本高辛氏火正祝融之虛也及成皋滎陽潁川之崇高陽城皆鄭分也本周宣王弟友為周司徒食采於宗周畿內是為鄭鄭桓公問於史伯曰王室多故何所可以逃死史伯曰四方之國非王母弟甥舅則夷狄不可入也其濟洛河潁之間乎子男之國虢會為大恃勢與險崇侈貪冒君若寄帑與賄周亂而敝必將背君君以成周之衆奉辭伐罪亡不克矣公曰南方不可乎對曰夫楚重黎之後也黎為高辛氏火正昭顯天地以生柔嘉之材薑嬴荊羋實與諸姬代相干也薑伯夷之後也嬴伯益之後也伯夷能禮於神以佐堯伯益能儀百物以佐舜其後皆不失祠而未有興者周衰將起不可逼也桓公從其言乃東寄帑與賄虢會受之後三年幽王敗威景祐殿本都作桓桓景祐殿本都作桓公死其子武公與平王東遷卒定虢會之地右雒左沛朱一新説沛當作泲按景祐殿本都作泲泲朱一新説沛當作泲按景祐殿本都作泲食溱洧焉土狹而險山居谷汲男女亟聚會故其俗淫鄭詩曰出其東門有女如雲又曰溱與洧方灌灌兮士與女方秉菅兮恂盱且樂惟士與女伊其相謔此其風也吳札聞鄭之歌曰美哉其細已甚民弗堪也是其先亡乎自武公後二十三世為韓所滅陳國今淮陽之地陳本太昊之虛周武王封舜後媯滿於陳是為胡公妻以元女大姬婦人尊貴好祭祀用史巫故其俗巫鬼陳詩曰坎其擊鼓宛丘之下亡冬亡夏值其鷺羽又曰東門之枌宛丘之栩子仲之子婆娑其下此其風也吳札聞陳之歌曰國亡主其能久乎自胡公後二十三世為楚所滅陳雖屬楚於天文自若其故潁川南陽本夏禹之國夏人上忠其敝鄙朴韓自武子後七世稱侯六世稱王五世而為秦所滅秦既滅韓徙天下不軌之民於南陽故其俗夸奢上氣力好商賈漁獵藏匿難制御也宛西通武關東受江淮一都之會也宣帝時鄭弘召信臣為南陽太守治皆見紀信臣勸民農桑去末歸本郡以殷富潁川韓都士有申子韓非刻害餘烈高士景祐殿本都作仕錢大昭説作仕是仕景祐殿本都作仕錢大昭説作仕是宦好文法民以貪遴爭訟生分為失韓延壽為太守先之以敬讓黃霸繼之教化大行獄或八年亡重罪囚南陽好商賈召父富以本業潁川好爭訟分異黃韓化以篤厚君子之德風也小人之德草也信矣自東井六度至亢六度謂之壽星之次鄭之分野與韓同分趙地昴畢之分野趙分晉得趙國北有信都真定常山中山又得涿郡之高陽鄚州鄉東有廣平巨鹿清河河間又得渤海郡之東平舒中邑文安束州成平章武河以北也南至浮水繁陽內黃斥丘西有太原定襄雲中五原上黨上黨本韓之別郡也遠韓近趙後卒降趙皆趙分也自趙夙後九世稱侯四世敬侯徙都邯鄲至曾孫武靈王稱王五世為秦所滅趙中山地薄人衆猶有沙丘紂淫亂餘民丈夫相聚遊戲悲歌慷慨起則椎剽掘冢作姦巧多弄物為倡優女子彈弦跕屣遊媚富貴遍諸侯之後宮邯鄲北通燕涿南有鄭衛漳河之間一都會也其土廣俗雜大率精急高氣勢輕為姦太原上黨又多晉公族子孫以詐力相傾矜夸功名報仇過直嫁取送死奢靡漢興號為難治常擇嚴猛之將或任殺伐為威父兄被誅子弟怨憤至告訐刺史二千石或報殺其親屬鍾代石北迫近胡寇民俗懻忮好氣為姦不事農商自全晉時已患其剽悍而武靈王又益厲之故冀州之部盜賊常為它州劇定襄雲中五原本戎狄地頗有趙齊衛楚之徙其民鄙朴少禮文好射獵雁門亦同俗於天文別屬燕燕地尾箕分野也武王定殷封召公於燕其後三十六世與六國俱稱王東有漁陽右北平遼西遼東西有上谷代郡雁門南得涿郡之易容城范陽北新城故安涿縣良鄉新昌及勃海之安次皆燕分也樂浪玄菟亦宜屬焉燕稱王十世秦欲滅六國燕王太子丹遣勇士荊軻西刺秦王不成而誅秦遂舉兵滅燕薊南通齊趙勃碣之間一都會也初太子丹賓養勇士不愛後宮美女民化以為俗至今猶然賓客相過以婦侍宿嫁取之夕男女無別反以為榮後稍頗止然終未改其俗愚悍少慮輕薄無威亦有所長敢於急人燕丹遺風也上谷至遼東地廣民希數被胡寇俗與趙代相類有魚鹽棗栗之饒北隙烏丸夫餘東賈真番之利玄菟樂浪武帝時置皆朝鮮濊貉句驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條相殺以當時償殺相傷以穀償相盜者男沒入為其家奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁取無所讎是以其民終不相盜無門戶之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效吏及內郡賈人往往以杯器食郡初取吏於遼東吏見民無閉臧及賈人往者夜則為盜俗稍益薄今於犯禁浸多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮於海欲居九夷有以也夫樂浪海中有倭人分為百餘國以歲時來獻見云自危四度至斗六度謂之析木之次燕之分也齊地虛危之分野也東有災川東萊琅邪高密膠東南有泰山城陽北有千乘清河以南勃海之高樂高城重合陽信西有濟南平原皆齊分也少昊之世有爽鳩氏虞夏時有季崱湯時有逢公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之以封師尚父是為太公詩風齊國是也臨災名營丘故齊詩曰子之營兮遭我呼嶩之間兮又曰俟我於著乎而此亦其舒緩之體也吳札聞齊之歌曰泱泱乎大風也哉其太公乎國未可量也古有分土亡分民太公以齊地負海舄鹵少五穀而人民寡乃勸以女工之業通魚鹽之利而人物輻湊後十四世桓公用管仲設輕重以富國合諸侯成伯功身在陪臣而取三歸故其俗彌侈織作冰紈綺繡純麗之物號為冠帶衣履天下初太公治齊修道術尊賢智賞有功故至今其土多好經術矜功名舒緩闊達而足智其失夸奢朋黨言與行繆虛詐不情急之則離散緩之則放縱始桓公兄襄公淫亂姑姊妹不嫁於是令國中民家長女不得嫁名曰巫兒為家主祠嫁者不利其家民至今以為俗痛乎道民之道可不慎哉昔太公始封周公問何以治齊太公曰舉賢而上功周公曰後世必有篡殺之臣其後二十九世為強臣田和所滅而和自立為齊侯初和之先陳公子完有罪來奔齊齊桓公以為大夫更稱田氏九世至和而篡齊至孫威王稱王五世為秦所滅臨災海岱之間一都會也其中具五民云魯地奎婁之分野也東至東海南有泗水至淮得臨淮之下相睢陵僮取慮皆魯分也周興以少昊之虛曲阜封周公子伯禽為魯侯以為周公主其民有聖人之教化故孔子曰齊一變至於魯魯一變至於道言近正也瀕洙泗之水其民涉度幼者扶老而代其任俗既益薄長老不自安與幼少相讓故曰魯道衰洙泗之間齗齗如也孔子閔王道將廢乃修六經以述唐虞三代之道弟子受業而通者七十有七人是以其民好學上禮義重廉恥周公始封太公問何以治魯周公曰尊尊而親親太公曰後世浸弱矣故魯自文公以後祿去公室政在大夫季氏逐昭公陵夷微弱三十四世而為楚所滅然本大國故自為分野今去聖久遠周公遺化銷微孔氏庠序衰壞地狹民衆頗有桑麻之業亡林澤之饒俗儉嗇愛財趨商賈好訾毀多巧偽喪祭之禮文備實寡然其好學猶愈於它俗漢興以來魯東海多至卿相東平須昌壽良皆在濟東屬魯非宋地也當考宋地房心之分野也今之沛梁楚山陽濟陰東平及東郡之須昌壽張皆宋分也周封微子於宋今之睢陽是也本陶唐氏火正閼伯之虛也濟陰定陶詩風曹國也武王封弟叔振鐸於曹其後稍大得山陽陳留二十餘世為宋所滅昔堯作遊成陽舜漁靁澤湯止于亳故其民猶有先王遺風重厚多君子好稼穡惡衣食以致畜藏宋自微子二十餘世至景公滅曹滅曹後五世亦為齊楚魏所滅參分其地魏得其梁陳留齊得其濟陰東平楚得其沛故今之楚彭城本宋也春秋經曰圍宋彭城宋雖滅本大國故自為分野沛楚之失急疾顓己地薄民貧而山陽好為姦盜衛地營室東壁之分野也今之東郡及魏郡黎陽河內之野王朝歌皆衛分也衛本國既為狄所滅文公徙封楚丘三十餘年子成公徙於帝丘故春秋經曰衛𠨧于帝丘今之濮陽是也本顓頊之虛故謂之帝丘夏后之世昆吾氏居之成公後十餘世為韓魏所侵盡亡其旁邑獨有濮陽後秦滅濮陽置東郡徙之於野王始皇既并天下猶獨置衛君二世時乃廢為庶人凡四十世九百年最後絶故獨為分野衛地有桑間濮上之阻男女亦亟聚會聲色生焉故俗稱鄭衛之音周末有子路夏育民人慕之故其俗剛武上氣力漢興二千石治者亦以殺戮為威宣帝時韓延壽為東郡太守承聖思崇禮義尊諫爭至今東郡號善為吏延壽之化也其失頗奢靡嫁取送死過度而野王好氣任俠有濮上風楚地翼軫之分野也今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也周成王時封文武先師鬻熊之曾孫熊繹於荊蠻為楚子居丹陽後十餘世至熊達是為武王浸以強大後五世至嚴王總帥諸侯觀兵周室并吞江漢之間內滅陳魯之國後十餘世頃襄王東徙于陳楚有江漢川澤山林之饒江南地廣或火耕水耨民食魚稻以漁獵山伐為業果蓏螺蛤食物常足故啙窳偷生而亡積聚飲食還給不憂凍餓亦亡千金之家信巫鬼重淫祀而漢中淫失枝柱與巴蜀同俗汝南之別皆急疾有氣勢江陵故郢都西通巫巴東有雲夢之饒亦一都會也吳地斗分野也今之會稽九江丹陽豫章廬江廣陵六安臨淮郡盡吳分也殷道既衰周大王亶父興岐梁之地長子大伯次曰仲雍少曰公季公季有聖子昌大王欲傳國焉大伯仲雍辭行采藥遂奔荊蠻公季嗣位至昌為西伯受命而王故孔子美而稱曰大伯可謂至德也已矣三以天下讓民無得而稱焉謂虞仲夷逸隱居放言身中清廢中權大伯初奔荊蠻荊蠻歸之號曰句吳大伯卒仲雍立至曾孫周章而武王克殷因而封之又封周章弟中於河北是為北吳後世謂之虞十二世為晉所滅後二世而荊蠻之吳子壽夢盛大稱王其少子則季札有賢材兄弟欲傳國札讓而不受自大伯陳奐説大伯二字疑衍壽夢稱王六世闔廬舉伍子胥孫武為將戰勝攻取興伯名於諸侯至子夫差誅子胥用宰嚭為粵王句踐所滅吳粵之君皆好勇故其民至今好用劍輕死易發粵既并吳後六世為楚所滅後秦又擊楚徙壽春至子為秦所滅壽春合肥受南北湖皮革鮑木之輸亦一都會也始楚賢臣屈原被讒放流作離騷諸賦以自傷悼後有宋玉唐勒之屬慕而述之皆以顯名漢興高祖王兄子濞於吳招致天下之娛遊子弟枚乘鄒陽嚴夫子之徒興於文景之際而淮南王安亦都壽春招賓客著書而吳有嚴助朱買臣貴顯漢朝文辭並發故世傳楚辭其失巧而少信初淮南王異國中民家有女者以待遊士而妻之故至今多女而少男本吳粵與楚接比數相并兼故民俗略同吳東有海鹽章山之銅三江五湖之利亦江東之一都會也豫章出黃金然堇堇物之所有取之不足以更費江南卑溼丈夫多夭會稽海外有東鯷人分為二十餘國以歲時來獻見云粵地牽牛婺女之分野也今之蒼梧鬱林合浦交址九真南海日南皆粵分也其君禹後帝少康之庶子云封於會稽文身斷髮以避蛟龍之害後二十世至句踐稱王與吳王闔廬戰敗之雋李夫差立句踐乘勝復伐吳吳大破之棲會稽臣服請平後用范蠡大夫種計遂伐滅吳兼并其地度淮與齊晉諸侯會致貢於周周元王使使賜命為伯諸侯畢賀後五世為楚所滅子孫分散君服於楚後十世至閩君搖佐諸侯平秦漢興復立搖為越王是時秦南海尉趙他亦自王傳國至武帝時盡滅以為郡云處近海多犀象毒冒珠璣銀銅果布之湊中國往商賈者多取富焉番禺其一都會也自合浦徐聞南入海得大州東西南北方千里武帝元封元年略以為儋耳珠崖郡民皆服布如單被穿中央為貫頭男子耕農種禾稻紵麻女子桑蠶織績亡馬與虎民有五畜山多塵麖兵則矛盾刀木弓弩竹矢或骨為鏃自初為郡縣吏卒中國人多侵陵之故率數歲一反元帝時遂罷棄之自日南障塞徐聞合浦船行可五月有都元國又船行可四月有邑盧沒國又船行可二十餘日有諶離國步行可十餘日有夫甘都盧國自夫甘都盧國船行可二月餘有黃支國民俗略與珠崖相類其州廣大戶口多多異物自武帝以來皆獻見有譯長屬黃門與應募者俱入海市明珠璧流離奇石異物齎黃金雜繒而往所至國皆稟食為耦蠻夷賈船轉送致之亦利交易剽殺人又苦逢風波溺死不者數年來還大珠至圍二寸以下平帝元始中王莽輔政欲耀威德厚遺黃支王令遣使獻生犀牛自黃支船行可八月到皮宗船行可八景祐殿本都作二二景祐殿本都作二月到日南象林界云黃支之南有已程不國漢之譯使自此還矣
