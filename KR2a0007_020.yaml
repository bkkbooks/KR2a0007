body:
  text: 地理志第八昔在黃帝作舟車以濟不通旁行天下方制萬里畫野分州得百里之國萬區是故易稱先王以景祐本無以字建萬國親諸侯書云協和萬國此之謂也堯遭洪水褱山襄陵天下分絶為十二州使禹治之水土既平更制九州列五服任土作貢曰禹敷土隨山刊木奠高山大川冀州既載壺口治梁及岐既修太原至于嶽陽覃懷底績至于衡章厥土惟白壤厥賦上上錯厥田中中恆衛既從大陸既作鳥夷皮服夾右碣石入于河泲河惟兗州九河既道雷夏既澤雍沮會同桑土既蠶是降丘宅土厥土黑墳屮繇木條厥田中下賦貞作十有三年乃同厥貢漆絲厥棐織文浮于泲漯通于河海岱惟青州嵎夷既略惟災其道厥土白墳海瀕廣潟田上下賦中上貢鹽絺海物惟錯岱畎絲枲鉛松怪石萊夷作牧厥棐檿絲浮于汶達于泲海岱及淮惟徐州淮沂其乂蒙羽其藝大野既豬東原底平厥土赤埴墳草木漸包田上中賦中中貢土五色羽畎夏狄嶧陽孤桐泗瀕浮磬淮夷蠙珠臮魚厥棐玄纖縞浮于淮泗達于河淮海惟揚州彭蠡既豬陽鳥逌居三江既入震澤砥定篠簜既敷屮禾木喬厥土塗泥田下下賦下上錯貢金三品瑤琨篠簜齒革羽毛鳥夷卉服厥棐織貝厥包橘柚錫貢均江海通于淮泗荊及衡陽惟荊州江漢朝宗于海九江孔殷沱灊既道雲夢土作乂厥土塗泥田下中賦上下貢羽旄齒革金三品杶幹栝柏厲砥砮丹惟箘簵楛三國砥貢厥名包匭菁茅厥棐玄纁璣組九江納錫大龜浮于江沱灊漢逾于洛至于南河荊河惟豫州伊雒瀍澗既入于河滎波既豬道荷澤被盟豬厥土惟壤下土墳壚田中上賦錯上中貢漆枲絺紵棐纖纊錫貢磬錯浮于洛入于河華陽黑水惟梁州岷嶓既藝沱灊既道蔡蒙旅平和夷砥績厥土青黎田下上賦下中三錯貢璆鐵銀鏤砮磬熊羆狐貍織皮西頃因桓是徠浮于灊逾于沔入于渭亂于河黑水西河惟雍州弱水既西涇屬渭汭漆沮既從酆水逌同荊岐既旅終南惇物至于鳥鼠原隰砥績至于豬野三危既宅三苗丕敘厥土黃壤田上上賦中下貢球琳琅玕浮于積石至于龍門西河會于渭汭織皮昆崙析支渠叟西戎即敘道汧及岐至于荊山逾于河壺口雷首至于大嶽砥柱析城至于王屋太行恆山至于碣石入于海西傾朱圉鳥鼠至于太華熊耳外方桐柏至于倍尾道嶓冢至于荊山內方至于大別崏山之陽至于衡山過九江至于敷淺原道弱水至于合藜餘波入于流沙道黑水至于三危入于南海道河積石至于龍門南至于華陰東至于砥柱又東至于盟津東過洛汭至于大伾北過降水至于大陸又北播為九河同為逆河入于海嶓冢道漾東流為漢又東為滄浪之水過三澨至于大別南入于江東匯澤為彭蠡東為北江入于海崏山道江東別為沱又東至于醴過九江至于東陵東迆北會于匯東為中江入于海道沇水東流為泲入于河軼為滎東出于陶丘北又東至于荷又東北會於汶又北東入于海道淮自桐柏東會于泗沂東入于海道渭自鳥鼠同穴東會于酆又東至于涇又東過漆沮入于河道洛自熊耳東北會于澗瀍又東會于伊又東北入于河九州逌同四奧既宅九山刊旅九川滌原九澤既陂四海會同六府孔修庶土交正砥慎財賦咸則三壤成賦中國錫土姓祗台德先不距朕行五百里甸服百里賦內總二百里納景祐殿本都作內內景祐殿本都作內銍三百里內戛服四百里粟五百里米五百里侯服百里采二百里男國三百里諸侯五百里綏服三百里揆文教二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流東漸于海西被于流沙朔南臮聲教訖于四海禹錫玄圭告厥成功後受禪於虞為夏后氏殷因於夏亡所變改周既克殷監於二代而損益之定官分職改禹徐梁二州合之於雍青分冀州之地以為幽并故周官有職方氏掌天下之地辨九州之國東南曰揚州其山曰會稽藪曰具區川曰三江浸曰五湖其利金錫竹箭民二男五女畜宜鳥獸穀宜稻正南曰荊州其山曰衡藪曰雲夢川曰江漢寖曰潁湛其利丹銀齒革民一男二女畜及穀宜與揚州同河南曰豫州其山曰華藪曰圃田川曰滎雒寖曰波溠其利林漆絲枲民二男三女畜宜六擾其穀宜五種正東曰青州其山曰沂藪曰孟諸川曰淮泗寖曰沂沭其利蒲魚民二男三女其畜宜雞狗穀宜稻麥河東曰兗州其山曰岱藪曰泰野其川曰河泲浸曰盧濰其利蒲魚民二男三女其畜宜六擾穀宜四種正西曰雍州其山曰嶽藪曰弦蒲川曰涇汭其浸曰渭洛其利玉石其民三男二女畜宜牛馬穀宜黍稷東北曰幽州其山曰醫無閭藪曰豯養川曰河泲浸曰災時其利魚鹽民一男三女畜宜四擾穀宜三種河內曰冀州其山曰霍藪曰揚紆川曰漳浸曰汾潞其利松柏民五男三女畜宜牛羊穀宜黍稷正北曰并州其山曰恆山藪曰昭餘祁川曰呼池嘔夷浸曰淶易其利布帛民二男三女畜宜五擾穀宜五種而保章氏掌天文以星土辨九州之地所封封域皆有分星以視吉凶周爵五等而土三等公侯百里伯七十里子男五十里不滿為附庸蓋千八百國而太昊黃帝之後唐虞侯伯猶存帝王圖籍相踵而可知周室既衰禮樂征伐自諸侯出轉相吞滅數百年間列國耗盡至春秋時尚有數十國五伯迭興總其盟會陵夷至於戰國天下分而為七合從連衡經數十年秦遂并兼四海以為周制微弱終為諸侯所喪故不立尺土之封分天下為郡縣蕩滅前聖之苗裔靡有孑遺者矣漢興因秦制度崇恩德行簡易以撫海內至武帝攘卻胡越開地斥境南置交址北置朔方之州兼徐梁幽并夏周之制改雍曰涼改梁曰益凡十三郡楊樹達説郡字誤當作部按景祐殿局本都作部部楊樹達説郡字誤當作部按景祐殿局本都作部置刺史先王之迹既遠地名又數改易是以采獲舊聞考迹詩書推表山川以綴禹貢周官春秋下及戰國秦漢焉京兆尹元始二年戶十九萬五千七百二口六十八萬二千四百六十八縣十二長安新豐船司空藍田華陰鄭湖下邽南陵奉明霸陵杜陵左馮翊戶二十三萬五千一百一口九十一萬七千八百二十二縣二十四高陵櫟陽翟道池陽夏陽衙粟邑谷口蓮勺頻陽臨晉重泉郃陽祋祤武城沈陽褱德徵雲陵萬年長陵陽陵雲陽右扶風戶二十一萬六千三百七十七口八十三萬六千七十縣二十一渭城槐里鄠盩厔斄郁夷美陽郿雍漆栒邑隃麋陳倉杜陽汧好畤虢安陵茂陵平陵武功弘農郡戶十一萬八千九十一口四十七萬五千九百五十四縣十一弘農盧氏陝宜陽黽池丹水新安商析陸渾上雒河東郡戶二十三萬六千八百九十六口九十六萬二千九百一十二縣二十四安邑大陽猗氏解蒲反河北左邑汾陰聞喜濩澤端氏臨汾垣皮氏長修平陽襄陵楊北屈蒲子絳狐囁騏太原郡戶十六萬九千八百六十三口六十八萬四百八十八縣二十一晉陽葰人界休榆次中都于離茲氏狼孟塢盂平陶汾陽京陵陽曲大陵原平祁上艾慮虒陽邑廣武河主王念孫説河主當作句注王先謙説王説是句注王念孫説河主當作句注王先謙説王説是上黨郡戶七萬三千七百九十八口三十三萬七千七百六十六縣十四長子屯留余吾銅鞮沾涅氏襄垣壺關泫氏高都潞崎氏陽阿穀遠河內郡戶二十四萬一千二百四十六口百六萬七千九十七縣十八懷汲武德波山陽河陽州共平皋朝歌修武溫野王獲嘉軹沁水隆慮蕩陰河南郡戶二十七萬六千四百四十四口一百七十四萬二百七十九縣二十二雒陽滎陽偃師京平陰中牟平陽武河南緱氏卷原武鞏穀成故市密新成開封成皋苑陵梁新鄭東郡戶四十萬一千二百九十七口百六十五萬九千二十八縣二十二濮陽觀聊城頓丘發干范茬平東武陽博平黎清東阿離狐臨邑利苗須昌壽良樂昌陽平白馬南燕廩丘陳留郡戶二十九萬六千二百八十四口一百五十萬九千五十縣十七陳留小黃成安寧陵雍丘酸棗東昏襄邑外黃封丘長羅尉氏傿長垣平丘濟陽浚儀潁川郡戶四十三萬二千四百九十一口二百二十一萬九百七十三縣二十陽翟昆陽潁陽定陵長社新汲襄城郾郟舞陽潁陰崇高許傿陵臨潁父城成安周承休陽城綸氏汝南郡戶四十六萬一千五百八十七口二百五十九萬六千一百四十八縣三十七平輿陽安陽城濦強富波女陽鮦陽吳房安成南頓朗陵細陽宜春女陰新蔡新息灈陽期思慎陽慎召陵弋陽西平上蔡浸西華長平宜祿項新郪歸德新陽安昌安陽博陽成陽定陵南陽郡戶三十五萬九千一百一十六口一百九十四萬二千五十一縣三十六宛犨杜衍酇育陽博山涅陽陰堵陽雉山都蔡陽新野築陽棘陽武當舞陰西鄂穰酈安衆冠軍比陽平氏隨葉鄧朝陽魯陽舂陵新都湖陽紅陽樂成博望復陽南郡戶十二萬五千五百七十九口七十一萬八千五百四十縣十八江陵臨沮夷陵華容宜城郢邔當陽中廬枝江襄陽編秭歸夷道州陵若巫高成江夏郡戶五萬六千八百四十四口二十一萬九千二百一十八縣十四西陵竟陵西陽襄邾軑鄂安陸沙羡蘄春鄳雲杜下雉鍾武廬江郡戶十二萬四千三百八十三口四十五萬七千三百三十三縣十二舒居巢龍舒臨湖雩婁襄安樅陽尋陽灊湖陵邑松茲九江郡戶十五萬五十二口七十八萬五百二十五縣十五壽春邑浚遒成德橐皋陰陵歷陽當塗鍾離合肥東城博鄉曲陽建陽全椒阜陵山陽郡戶十七萬二千八百四十七口八十萬一千二百八十八縣二十三昌邑南平陽成武湖陵東緡方與橐巨野單父薄都關城都黃爰戚郜成中鄉平樂鄭瑕丘災鄉栗鄉曲鄉西陽濟陰郡戶二十九萬二千景祐殿本都作十十景祐殿本都作十五口百三十八萬六千二百七十八縣九定陶冤句呂都葭密成陽鄄城句陽秺乘氏沛郡戶四十萬九千七十九口二百三萬四百八十縣三十七相龍亢竹穀陽蕭向銍廣戚下蔡豐鄲譙蘄虹輒與山桑公丘符離敬丘夏丘洨沛芒建成城父建平酇栗扶陽高高柴漂陽平阿東鄉臨都義成祁鄉魏郡戶二十一萬二千八百四十九口九十萬九千六百五十五縣十八鄴館陶斥丘沙內黃清淵魏繁陽元城梁期黎陽即裴武始邯會陰安平恩邯溝武安巨鹿郡戶十五萬五千九百五十一口八十二萬七千一百七十七縣二十巨鹿南䜌廣阿象氏廮陶宋子楊氏臨平下曲陽貰郻新市堂陽安定敬武歷鄉樂信武陶柏鄉安鄉常山郡戶十四萬一千七百四十一口六十七萬七千九百五十六縣十八元氏石邑桑中靈壽蒲吾上曲陽九門井陘房子中丘封斯關平棘鄗樂陽平臺都鄉南行唐清河郡戶二十萬一千七百七十四口八十七萬五千四百二十二縣十四清陽東武城繹幕靈厝鄃貝丘信成莎題東陽信鄉繚棗強復陽涿郡戶十九萬五千六百七口七十八萬二千七百六十四縣二十九涿乃穀丘故安南深澤范陽蠡吾容城易廣望鄚高陽州鄉安平樊輿成良鄉利鄉臨鄉益昌陽鄉西鄉饒陽中水武垣阿陵阿武高郭新昌勃海郡戶二十五萬六千三百七十七口九十萬五千一百一十九縣二十六浮陽陽信東光阜城千童重合南皮定章武中邑高成高樂參戶成平柳臨樂東平舒重平安次修市文安景成束州建成章鄉蒲領平原郡戶十五萬四千三百八十七口六十六萬四千五百四十三縣十九平原鬲高唐重丘平昌羽般樂陵祝阿瑗阿陽漯陰朸富平安德合陽樓虛龍額安千乘郡戶十一萬六千七百二十七口四十九萬七百二十縣十五千乘東鄒溼沃平安博昌蓼城建信狄琅槐樂安被陽高昌繁安高宛延鄉濟南郡戶十四萬七百六十一口六十四萬二千八百八十四縣十四東平陵鄒平臺梁鄒土鼓於陵陽丘般