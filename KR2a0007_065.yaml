body:
  text: 雋疏于薛平彭傳第四十一雋不疑字曼倩勃海人也治春秋為郡文學進退必以禮名聞州郡武帝末郡國盜賊群起暴勝之為直指使者衣繡衣持斧逐捕盜賊督課郡國東至海以軍興誅不從命者威振州郡勝之素聞不疑賢至勃海遣吏請與相見不疑冠進賢冠帶櫑具劍佩環玦褒衣博帶盛服至門上謁門下欲使解劍不疑曰劍者君子武備所以衛身不可解請退吏白勝之勝之開閣延請望見不疑容貌尊嚴衣冠甚偉勝之屣履起迎登堂坐定不疑據地曰竊伏海瀕聞暴公子威名舊矣今乃承顏接辭凡為吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天祿勝之知不疑非庸人敬納其戒深接以禮意問當世所施行門下諸從事皆州郡選吏側聽不疑莫不驚駭至昏夜罷去勝之遂表薦不疑徵詣公車拜為青州刺史久之武帝崩昭帝即位而齊孝王孫劉澤交結郡國豪傑謀反欲先殺青州刺史不疑發覺收捕皆伏其辜擢為京兆尹賜錢百萬京師吏民敬其威信每行縣録囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為飲食語言異於他時或亡所出母怒為之不食故不疑為吏嚴而不殘始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃冒詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者並莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼繇是名聲重於朝廷在位者皆自以不及也大將軍光欲以女妻之不疑固辭不肯當久之以病免終於家京師紀之後趙廣漢為京兆尹言我禁姦止邪行於吏民至於朝廷事不及不疑遠甚廷尉驗治何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉逮召鄉里識知者張宗祿等方遂坐誣罔不道要斬東市一云姓張名延年疏廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自遠方至徵為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭宣帝幸太子宮受迎謁應對及置酒宴奉觴上壽辭禮間雅上甚歡說頃之拜受為少傅太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家視陋非所以廣太子德於天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣繇是見器重數受賞賜太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮在位五歲皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以壽命終不亦善乎受叩頭曰從大人議即日父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供張東都門外送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸鄉里日令家共具設酒食請族人故舊賓客與相娛樂數問其家金餘尚有幾所趣賣以共具居歲餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立産業基址今日飲食費且盡宜從丈人所勸說君買田宅老人即以閒暇時為廣言此計廣曰吾豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫富者衆人之怨也吾既亡以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人說服皆以壽終于定國字曼倩東海郯人也其父于公為縣獄史郡決曹決獄平羅文法者于公所決皆不恨郡中為之生立祠號曰于公祠東海有孝婦少寡亡子養姑甚謹姑欲嫁之終不肯姑謂鄰人曰孝婦事我勤苦哀其亡子守寡我老久絫丁壯奈何其後姑自經死姑女告吏婦殺我母吏捕孝婦孝婦辭不殺姑吏驗治孝婦自誣服具獄上府于公以為此婦養姑十餘年以孝聞必不殺也太守不聽于公爭之弗能得乃抱其具獄哭於府上因辭疾去太守竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公曰孝婦不當死前太守彊斷之咎黨在是乎於是太守殺牛自祭孝婦冢因表其墓天立大雨歲孰郡中以此大敬重于公定國少學法于父父死後定國亦為獄史郡決曹補廷尉史以選與御史中丞從事治反者獄以材高舉侍御史遷御史中丞會昭帝崩昌邑王徵即位行淫亂定國上書諫後王廢宣帝立大將軍光領尚書事條奏群臣諫昌邑王者皆超遷定國繇是為光祿大夫平尚書事甚見任用數年遷水衡都尉超為廷尉定國乃迎師學春秋身執經北面備弟子禮為人謙恭尤重經術士雖卑賤徒步往過定國皆與鈞禮恩敬甚備學士咸稱焉其決疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤定國食酒至數石不亂冬月請治讞飲酒益精明為廷尉十八歲遷御史大夫甘露中代黃霸為丞相封西平侯三年宣帝崩元帝立以定國任職舊臣敬重之時陳萬年為御史大夫與定國並位八年論議無所拂後貢禹代為御史大夫數處駮議定國明習政事率常丞相議可然上始即位關東連年被災害民流入關言事者歸咎於大臣上於是數以朝日引見丞相御史入受詔條責以職事曰惡吏負賊妄意良民至亡辜死或盜賊發吏不亟追而反繫亡家後不敢復告以故寖廣民多冤結州郡不理連上書者交於闕廷二千石選舉不實是以在位多不任職民田有災害吏不肯除收趣其租以故重困關東流民飢寒疾疫已詔吏轉漕虛倉廩開府臧相振救賜寒者衣至春猶恐不贍今丞相御史將欲何施以塞此咎悉意條狀陳朕過失定國上書謝罪永光元年春霜夏寒日青亡光上復以詔條責曰郎有從東方來者言民父子相棄丞相御史案事之吏匿不言邪將從東方來者加增之也何以錯繆至是欲知其實方今年歲未可預知也即有水旱其憂不細公卿有可以防其未然救其已然者不各以誠對毋有所諱定國惶恐上書自劾歸侯印乞骸骨上報曰君相朕躬不敢怠息萬方之事大録于君能毋過者其唯聖人方今承周秦之敝俗化陵夷民寡禮誼陰陽不調災咎之發不為一端而作自聖人推類以記不敢專也況於非聖者乎日夜惟思所以未能盡明經曰萬方有罪罪在朕躬君雖任職何必顓焉其勉察郡國守相群牧非其人者毋令久賊民永執綱紀務悉聰明強食慎疾定國遂稱篤固辭上乃賜安車駟馬黃金六十斤罷就第數歲七十餘薨諡曰安侯子永嗣少時耆酒多過失年且三十乃折節修行以父任為侍中中郎將長水校尉定國死居喪如禮孝行聞由是以列侯為散騎光祿勳至御史大夫尚館陶公主施施者宣帝長女成帝姑也賢有行永以選尚焉上方欲相之會永薨子恬嗣恬不肖薄於行始定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未嘗有所冤子孫必有興者至定國為丞相永為御史大夫封侯傳世云薛廣德字長卿沛郡相人也以魯詩教授楚國襲勝舍師事焉蕭望之為御史大夫除廣德為屬數與論議器之薦廣德經行宜充本朝為博士論石渠遷諫大夫代貢禹為長信少府御史大夫廣德為人溫雅有醞藉及為三公直言諫爭始拜旬日間上幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚上即日還其秋上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說先驅光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪乃從橋後月餘以歲惡民流與丞相定國大司馬車騎將軍史高俱乞骸骨皆賜安車駟馬黃金六十斤罷廣德為御史大夫凡十月免東歸沛太守迎之界上沛以為榮縣其安車傳子孫平當字子思祖父以訾百萬自下邑徙平陵當少為大行治禮丞功次補大鴻臚文學察廉為順陽長栒邑令以明經為博士公卿薦當論議通明給事中每有災異當輒傅經術言得失文雅雖不能及蕭望之匡衡然指意略同自元帝時韋玄成為丞相奏罷太上皇寢廟園當上書言臣聞孔子曰如有王者必世而後仁三十年之間道德和洽制禮興樂災害不生禍亂不作今聖漢受命而王繼體承業二百餘年孜孜不怠政令清矣然風俗未和陰陽未調災害數見意者大本有不立與何德化休徵不應之久也禍福不虛必有因而至者焉宜深迹其道而務修其本昔者帝堯南面而治先克明俊德以親九族而化及萬國孝經曰天地之性人為貴人之行莫大於孝孝莫大於嚴父嚴父莫大於配天則周公其人也夫孝子善述人之志周公既成文武之業而制作禮樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天此聖人之德亡以加於孝也高皇帝聖德受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也書云正稽古建功立事可以永年傳於亡窮上納其言下詔復太上皇寢廟園頃之使行流民幽州舉奏刺史二千石勞徠有意者言勃海鹽池可且勿禁以救民急所過見稱奉使者十一人為最遷丞相司直坐法左遷朔方刺史復徵入為太中大夫給事中絫遷長信少府大鴻臚光祿勳先是太后姊子衛尉淳于長白言昌陵不可成下有司議當以為作治連年可遂就上既罷昌陵以長首建忠策復下公卿議封長當又以為長雖有善言不應封爵之科坐前議不正左遷巨鹿太守後上遂封長當以經明禹貢使行河為騎都尉領河隄哀帝即位徵當為光祿大夫諸吏散騎復為光祿勳御史大夫至丞相以冬月賜爵關內侯明年春上使使者召欲封當當病篤不應召室家或謂當不可強起受侯印為子孫邪當曰吾居大位已負素餐之責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上報曰朕選於衆以君為相視事日寡輔政未久陰陽不調冬無大雪旱氣為災朕之不德何必君罪君何疑而上書乞骸骨歸關內侯爵邑使尚書令談賜君養牛一上尊酒十石君其勉致醫藥以自持後月餘卒子晏以明經歷位大司徒封防鄉侯漢興唯韋平父子至宰相彭宣字子佩淮陽陽夏人也治易事張禹舉為博士遷東平太傅禹以帝師見尊信薦宣經明有威重可任政事繇是入為右扶風遷廷尉以王國人出為太原太守數年復入為大司農光祿勳右將軍哀帝即位徒為左將軍歲餘上欲令丁傅處爪牙官乃策宣曰有司數奏言諸侯國人不得宿衛將軍不宜典兵馬處大位朕唯將軍任漢將之重而子又前取淮陽王女婚姻不絶非國之制使光祿大夫曼賜將軍黃金五十斤安車駟馬其上左將軍印綬以關內侯歸家宣罷數歲諫大夫鮑宣數薦宣會元壽元年正月朔日蝕鮑宣復言上乃召宣為光祿大夫遷御史大夫轉為大司空封長平侯會哀帝崩新都侯王莽為大司馬秉政專權宣上書言三公鼎足承君一足不任則覆亂美實臣資性淺薄年齒老眊數伏疾病昏亂遺忘願上大司空長平侯印綬乞骸骨歸鄉里俟置溝壑莽白太后策宣曰惟君視事日寡功德未效迫于老眊昏亂非所以輔國家綏海內也使光祿勳豐冊詔君其上大司空印綬便就國莽恨宣求退故不賜黃金安車駟馬宣居國數年薨諡曰頃侯傳子至孫王莽敗乃絶贊曰雋不疑學以從政臨事不惑遂立名迹終始可述疏廣行止足之計免辱殆之絫亦其次也于定國父子哀鰥哲獄為任職臣薛廣德保縣車之榮平當逡遁有恥彭宣見險而止異乎苟患失之者矣
