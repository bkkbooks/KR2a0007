body:
  text: 西域傳第六十六上西域以孝武時始通本三十六國其後稍分至五十餘皆在胸奴之西烏孫之南南北有大山中央有河東西六千餘里南北千餘里東則接漢厄以玉門陽關西則限以蔥嶺其南山東出金城與漢南山屬焉其河有兩原一出蔥嶺山一出于闐于闐在南山下其河北流與蔥嶺河合東注蒲昌海蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里其水亭居冬夏不增減皆以為潛行地下南出於積石為中國河云自玉門陽關出西域有兩道從鄯善傍南山北波河西行至莎車為南道南道西踰蔥嶺則出大月氏安息自車師前王廷隨北山波河西行至疏勒為北道北道西踰蔥嶺則出大宛康居奄蔡焉西域諸國大率土著有城郭田畜與胸奴烏孫異俗故皆役屬胸奴胸奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉黎間賦稅諸國取富給焉自周衰戎狄錯居涇渭之北及秦始皇攘卻戎狄築長城界中國然西不過臨洮漢興至于孝武事征四夷廣威德而張騫始開西域之迹其後驃騎將軍擊破胸奴右地降渾邪休屠王遂空其地始築令居以西初置酒泉郡後稍發徙民充實之分置武威張掖敦煌列四郡據兩關焉自二師將軍伐大宛之後西域震懼多遣使來貢獻漢使西域者益得職於是自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領護以給使外國者至宣帝時遣衛司馬使護鄯善以西數國及破姑師未盡殄分以為車師前後王及山北六國時漢獨護南道未能盡并北道也然胸奴不自安矣其後日逐王畔單于將衆來降護鄯善以西使者鄭吉迎之既至漢封日逐王為歸德侯吉為安遠侯是歲神爵三年也乃因使吉并護北道故號曰都護都護之起自吉置矣僮僕都尉由此罷胸奴益弱不得近西域於是徙屯田田於北胥鞬披莎車之地屯田校尉始屬都護都護督察烏孫康居諸外國動靜有變以聞可安輯安輯之可擊擊之都護治烏壘城去陽關二千七百三十八里與渠犂田官相近土地肥饒於西域為中故都護治焉至元帝時復置戊己校尉屯田車師前王庭是時胸奴東蒲類王茲力支將人衆千七百餘人降都護都護分車師後王之西為烏貪訾離地以處之自宣元後單于稱藩臣西域服從其土地山川王侯戶數道里遠近翔實矣出陽關自近者始曰婼羌婼羌國王號去胡來王去陽關千八百里去長安六千三百里辟在西南不當孔道戶四百五十口千七百五十勝兵者五百人西與且末接隨畜逐水草不田作仰鄯善且末穀山有鐵自作兵兵有弓矛服刀劍甲西北至鄯善乃當道云鄯善國本名樓蘭王治扜泥城去陽關千六百里去長安六千一百里戶千五百七十口萬四千一百勝兵二千九百十二人輔國侯卻胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人西北去都護治所千七百八十五里至山國千三百六十五里西北至車師千八百九十里地沙鹵少田寄田仰穀旁國國出玉多葭葦柳柳胡桐白草民隨畜牧逐水草有驢馬多橐它能作兵與婼羌同初武帝感張騫之言甘心欲通大宛諸國使者相望於道一歲中多至十餘輩樓蘭姑師當道苦之攻劫漢使王恢等又數為胸奴耳目令其兵遮漢使漢使多言其國有城邑兵弱易擊於是武帝遣從票侯趙破奴將屬國騎及郡兵數萬擊姑師王恢數為樓蘭所苦上令恢佐破奴將兵破奴與輕騎七百人先至虜樓蘭王遂破姑師因暴兵威以動烏孫大宛之屬還封破奴為浞野侯恢為浩侯於是漢列亭障至玉門矣樓蘭既降服貢獻胸奴聞發兵擊之於是樓蘭遣一子質胸奴一子質漢後二師軍擊大宛胸奴欲遮之二師兵盛不敢當即遣騎因樓蘭侯漢使後過者欲絶勿通時漢軍正任文將兵屯玉門關為二師後距捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使候司胸奴胸奴自是不甚親信樓蘭征和元年樓蘭王死國人來請質子在漢者欲立之質子常坐漢法下蠶室宮刑故不遣報曰侍子天子愛之不能遣其更立其次當立者樓蘭更立王漢復責其質子亦遣一子質胸奴後王又死胸奴先聞之遣質子歸得立為王漢遣使詔新王令入朝天子將加厚賞樓蘭王後妻故繼母也謂王曰先王遣兩子質漢皆不還奈何欲往朝乎王用其計謝使曰新立國未定願待後年入見天子然樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水儋糧送迎漢使又數為吏卒所寇懲艾不便與漢通後復為胸奴反間數遮殺漢使其弟尉屠耆降漢具言狀元鳳四年大將軍霍光白遣平樂監傅介子往刺其王介子輕將勇敢士齎金幣揚言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首馳傳詣闕縣首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重丞相將軍率百官送至橫門外祖而遣之王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之其後更置都尉伊循官置始此矣鄯善當漢道衝西通且末七百二十里自且末以往皆種五穀土地草木畜産作兵略與漢同有異乃記云且末國王治且末城去長安六千八百二十里戶二百三十口千六百一十勝兵三百二十人輔國侯左右將譯長各一人西北至都護治所二千二百五十八里北接尉犂南至小宛可三日行有蒲陶諸果西通精絶二千里小宛國王治扜零城去長安七千二百一十里戶百五十口千五十勝兵二百人輔國侯左右都尉各一人西北至都護治所二千五百五十八里東與婼羌接辟南不當道精絶國王治精絶城去長安八千八百二十里戶四百八十口三千三百六十勝兵五百人精絶都尉左右將譯長各一人北至都護治所二千七百二十三里南至戎盧國四日行地厄狹西通扜彌四百六十里戎盧國王治卑品城去長安八千三百里戶二百四十口千六百一十勝兵三百人東北至都護治所二千八百五十八里東與小宛南與婼羌西與渠勒接辟南不當道扜彌國王治扜彌城去長安九千二百八十里戶三千三百四十口二萬四十勝兵三千五百四十人輔國侯左右將左右都尉左右騎君各一人譯長二人東北至都護治所三千五百五十三里南與渠勒東北與龜茲西北與姑墨接西通于闐三百九十里今名寧彌渠勒國王治鞬都城去長安九千九百五十里戶三百一十口二千一百七十勝兵三百人東北至都護治所三千八百五十二里東與戎盧西與婼羌北與扜彌接于闐國王治西城去長安九千六百七十里戶三千三百口萬九千三百勝兵二千四百人輔國侯左右將左右騎君東西城長譯長各一人東北至都護治所三千九百四十七里南與婼羌接北與姑墨接于闐之西水皆西流注西海其東水東流注鹽澤河原出焉多玉石西通皮山三百八十里皮山國王治皮山城去長安萬五十里戶五百口三千五百勝兵五百人左右將左右都尉騎君譯長各一人東北至都護治所四千二百九十二里西南至烏秅國千三百四十里南與天篤接北至姑墨千四百五十里西南當罽賓烏弋山離道西北通莎車三百八十里烏秅國王治烏秅城去長安九千九百五十里戶四百九十口二千七百三十三勝兵七百四十人東北至都護治所四千八百九十二里北與子合蒲犂西與難兜接山居田石間有白草纍石為室民接手飲出小步馬有驢無牛其西則有縣度去陽關五千八百八十八里去都護治所五千二十里縣度者石山也溪谷不通以繩索相引而度云西夜國王號子合王治呼犍谷去長安萬二百五十里戶三百五十口四千勝兵千人東北到都護治所五千四十六里東與皮山西南與烏秅北與莎車西與蒲犂接蒲犂及依耐無雷國皆西夜類也西夜與胡異其種類羌氐行國隨畜逐水草往來而子合土地出玉石蒲犂國王治蒲犂谷去長安九千五百五十里戶六百五十口五千勝兵二千人東北至都護治所五千三百九十六里東至莎車五百四十里北至疏勒五百五十里南與西夜子合接西至無雷五百四十里侯都尉各一人寄田莎車種俗與子合同依耐國王治去長安萬一百五十里戶一百二十五口六百七十勝兵三百五十人東北至都護治所二千七百三十里至莎車五百四十里至無雷五百四十里北至疏勒六百五十里南與子合接俗相與同少穀寄田疏勒莎車無雷國王治盧城去長安九千九百五十里戶千口七千勝兵三千人東北至都護治所二千四百六十五里南至蒲犂五百四十里南與烏秅北與捐毒西與大月氏接衣服類烏孫俗與子合同難兜國王治去長安萬一百五十里戶五千口三萬一千勝兵八千人東北至都護治所二千八百五十里西至無雷三百四十里西南至罽賓三百三十里南與婼羌北與休循西與大月氏接種五穀蒲陶諸果有銀銅鐵作兵與諸國同屬罽賓罽賓國王治循鮮城去長安萬二千二百里不屬都護戶口勝兵多大國也東北至都護治所六千八百四十里東至烏秅國二千二百五十里東北至難兜國九日行西北與大月氏西南與烏弋山離接昔胸奴破大月氏大月氏西君大夏而塞王南君罽賓塞種分散往往為數國自疏勒以西北休循捐毒之屬皆故塞種也罽賓地平溫和有目宿雜草奇木檀櫰梓竹漆種五穀蒲陶諸果糞治園田地下溼生稻冬食生菜其民巧雕文刻鏤治宮室織罽刺文繡好治食有金銀銅錫以為器市列以金銀為錢文為騎馬幕為人面出封牛水牛象大狗沐猴孔爵珠璣珊瑚虎魄璧流離它畜與諸國同自武帝始通罽賓自以絶遠漢兵不能至其王烏頭勞數剽殺漢使烏頭勞死子代立遣使奉獻漢使關都尉文忠送其使王復欲害忠忠覺之乃與容屈王子陰末赴共合謀攻罽賓殺其王立陰末赴為罽賓王授印綬後軍侯趙德使罽賓與陰末赴相失陰末赴鎖琅當德殺副已下七十餘人遣使者上書謝孝元帝以絶域不録放其使者於縣度絶而不通成帝時復遣使獻謝罪漢欲遣使者報送其使杜欽説大將軍王鳳曰前罽賓王陰末赴本漢所立後卒畔逆夫德莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶遠兵不至也有求則卑辭無欲則嬌嫚終不可懷服凡中國所以為通厚蠻夷愜快其求者為壤比而為寇也今縣度之厄非罽賓所能越也其鄉慕不足以安西域雖不附不能危城郭前親逆節惡暴西域故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防護寇害也起皮山南更不屬漢之國四五斥侯士百餘人五分夜擊刀斗自守尚時為所侵盜驢畜負糧須諸國稟食得以自贍國或貧小不能食或桀黠不肯給擁強漢之節餒山谷之間乞丐無所得離一二旬則人畜棄捐曠野而不反又歷大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石阪道狹者尺六七寸長者徑三十里臨崢嶸不測之深行者騎步相持繩索相引二千餘里乃到縣度畜隊未半坑谷盡靡碎人墮勢不得相收視險阻危害不可勝言聖王分九州制五服務盛內不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆涉危難之路罷弊所恃以事無用非久長計也使者業已受節可至皮山而還於是鳳白從欽言罽賓實利賞賜賈市其使數年而一至云烏弋山離國王去長安萬二千二百里不屬都護戶口勝兵大國也東北至都護治所六十日行東與罽賓北與撲挑西與犂靬條支接行可百餘日乃至條支國臨西海暑溼田稻有大鳥卵如甕人衆甚多往往有小君長安息役屬之以為外國善眩安息長老傳聞條支有弱水西王母亦未嘗見也自條支乘水西行可百餘日近日所入云烏弋地暑熱莽平其草木畜産五穀果菜食飲宮室市列錢貨兵器金珠之屬皆與罽賓同而有桃拔師子犀牛俗重妄殺其錢獨文為人頭幕為騎馬以金銀飾杖絶遠漢使希至自玉門陽關出南道歷鄯善而南行至烏弋山離南道極矣轉北而東得安息安息國王治番兜城去長安萬一千六百里不屬都護北與康居東與烏弋山離西與條支援土地風氣物類所有民俗與烏弋罽賓同亦以銀為錢文獨為王面幕為夫人面王死輒更鑄錢有大馬爵有屬小大數百城地方數千里最大國也臨媯水商賈車船行旁國書革旁行為書記武帝始遣使至安息王令將將二萬騎迎於東界東界去王都數千里行比至過數十城人民相屬因發使隨漢使者來觀漢地以大鳥卵及犂靬眩人獻於漢天子大説安息東則大月氏大月氏國治監氏城去長安萬一千六百里不屬都護戶十萬口四十萬勝兵十萬人東至都護治所四千七百四十里西至安息四十九日行南與罽賓接土地風氣物類所有民俗錢貨與安息同出一封橐駝大月氏本行國也隨畜移徙與胸奴同俗控弦十餘萬故強輕胸奴本居敦煌祁連間至冒頓單于攻破月氏而老上單于殺月氏以其頭為飲器月氏乃遠去過大宛西擊大夏而臣之都媯水北為王庭其餘小衆不能去者保南山羌號小月氏大夏本無大君長城邑往往置小長民弱畏戰故月氏徙來皆臣畜之共稟漢使者有五翕侯一曰休密翕侯治和墨城去都護二千八百四十一里去陽關七千八百二里二曰雙靡翕侯治雙靡城去都護三千七百四十一里去陽關七千七百八十二里三曰貴霜翕侯治護澡城去都護五千九百四十里去陽關七千九百八十二里四曰肸頓翕侯治薄茅城去都護五千九百六十二里去陽關八千二百二里五曰高附翕侯治高附城去都護六千四十一里去陽關九千二百八十三里凡五翕侯皆屬大月氏康居國王冬治樂越匿地到卑闐城去長安萬二千三百里不屬都護至越匿地馬行七日至王夏所居蕃內九千一百四里戶十二萬口六十萬勝兵十二萬人東至都護治所五千五百五十里與大月氏同俗東羈事胸奴宣帝時胸奴乖亂五單于並爭漢擁立呼韓邪單于而郅支單于怨望殺漢使者西阻康居其後都護甘延壽副校尉陳湯發戊己校尉西域諸國兵至康居誅滅郅支單于語在甘延壽陳湯傳是歲元帝建昭三年也至成帝時康居遣子侍漢貢獻然自以絶遠獨驕嫚不肯與諸國相望都護郭舜數上言本胸奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國內相輸遺交通如故亦相侯司見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與胸奴俱稱臣義不可距而康居驕黠訖不肯拜使者都護吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啖都護吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也胸奴百蠻大國今事漢甚備聞康居不拜且使單于有自下之意宜歸其侍子絶勿復使以章漢家不通無禮之國敦煌酒泉小郡及南道八國給使者往來人馬驢橐駝食皆苦之空罷耗所過送迎驕黠絶遠之國非至計也漢為其新通重致遠人終羈縻而未絶其康居西北可二千里有奄蔡國控弦者十餘萬人與康居同俗臨大澤無崖蓋北海云康居有小王五一曰蘇薤王治蘇薤城去都護五千七百七十六里去陽關八千二十五里二曰附墨王治附墨城去都護五千七百六十七里去陽關八千二十五里三曰寙匿王治寙匿城去都護五千二百六十六里去陽關七千五百二十五里四曰罽王治罽城去都護六千二百九十六里去陽關八千五百五十五里五曰奧鞬王治奧鞬城去都護六千九百六里去陽關八千三百五十五里凡五王屬康居大宛國王治貴山城去長安萬二千五百五十里戶六萬口三十萬勝兵六萬人副王輔國王各一人東至都護治所四千三十一里北至康居卑闐城千五百一十里西南至大月氏六百九十里北與康居南與大月氏接土地風氣物類民俗與大月氏安息同大宛左右以蒲陶為酒富人藏酒至萬餘石久者至數十歲不敗俗耆酒馬耆目宿宛別邑七十餘城多善馬馬汗血言其先天馬子也張騫始為武帝言之上遺使者持千金及金馬以請宛善馬宛王以漢絶遠大兵不能至愛其寶馬不肯與漢使妄言宛遂攻殺漢使取其財物於是天子遣二師將軍李廣利將兵前後十餘萬人伐宛連四年宛人斬其王毋寡首獻馬三千匹漢軍乃還語在張騫傳二師既斬宛王更立貴人素遇漢善者名昧蔡為宛王後歲餘宛貴人以為昧蔡讇使我國遇屠相與共殺昧蔡立毋寡弟蟬封為王遣子入侍質於漢漢因使使賂賜鎮撫之又發使十餘輩扺宛西諸國求奇物因風諭以伐宛之威宛王蟬封與漢約歲獻天馬二匹漢使采蒲陶目宿種歸天子以天馬多又外國使來衆益種蒲陶目宿離宮館旁極望焉自宛以西至安息國雖頗異言然大同自相曉知也其人皆深目多須髯善賈市爭分銖貴女子女子所言丈夫乃決正其地無絲漆不知鑄鐵器及漢使亡卒降教鑄作它兵器得漢黃白金輒以為器不用為幣自烏孫以西至安息近胸奴胸奴嘗困月氏故胸奴使持單于一信到國國傳送食不敢留苦及至漢使非出幣物不得食不市畜不得騎所以然者以遠漢而漢多財物故必市乃得所欲及呼韓邪單于朝漢後咸尊漢矣桃槐國王去長萬一千八十里戶七百口五千勝兵千人休循國王治鳥飛谷在蔥嶺西去長安萬二百一十里戶三百五十八口千三十勝兵四百八十人東至都護治所三千一百二十一里至捐毒衍敦谷二百六十里西北至大宛國九百二十里西至大月氏千六百一十里民俗衣服類烏孫因畜隨水草本故塞種也捐毒國王治衍敦谷去長安九千八百六十里戶三百八十口千一百勝兵五百人東至都護治所二千八百六十一里至疏勒南與蔥領屬無人民西上蔥領則休循也西北至大宛千三十里北與烏孫接衣服類烏孫隨水草依蔥領本塞種也莎車國王治莎車城去長安九千九百五十里戶二千三百三十九口萬六千三百七十三勝兵三千四十九人輔國侯左右將左右騎君備西夜君各一人都尉二人譯長四人東北至都護治所四千七百四十六里西至疏勒五百六十里西南至蒲犂七百四十里有鐵山出青玉宣帝時烏孫公主小子萬年莎車王愛之莎車王無子死死時萬年在漢莎車國人計欲自託於漢又欲得烏孫心即上書請萬年為莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不説莎車王弟呼屠徵殺萬年并殺漢使者自立為王約諸國背漢會衛候馮奉世使送大宛客即以便宜發諸國兵擊殺之更立它昆弟子為莎車王還拜奉世為光祿大夫是歲元康元年也疏勒國王治疏勒城去長安九千三百五十里戶千五百一十口萬八千六百四十七勝兵二千人疏勒侯擊胡侯輔國侯都尉左右將左右騎君左右譯長各一人東至都護治所二千二百一十里南至莎車五百六十里有市列西當大月氏大宛康居道也尉頭國王治尉頭谷去長安八千六百五十里戶三百口二千三百勝兵八百人左右都尉各一人左右騎君各一人東至都護治所千四百一十一里南與疏勒接山道不通西至捐毒千三百一十四里徑道馬行二日田畜隨水草衣服類烏孫
