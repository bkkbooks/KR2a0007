body:
  text: 王莽傳第六十九下四年五月莽曰保成師友祭酒唐林故諫議祭酒琅邪紀逡孝弟忠恕敬上愛下博通舊聞德行醇備至於黃髮靡有愆失其封林為建德侯逡為封德侯位皆特進見禮如三公賜弟一區錢三百萬授几杖焉六月更授諸侯茅土於明堂曰豫制作地理建封五等考之經藝合之傳記通於義理論之思之至於再三自始建國之元以來九年于茲乃今定矣豫親設文石之平陳菁茅四色之土欽告于岱宗泰社后土先祖先妣以班授之各就厥國養牧民人用成功業其在緣邊若江南非詔所召遣侍于帝城者納言掌貨大夫且調內故錢豫其祿公歲八十萬侯伯四十萬子男二十萬然復不能盡得莽好空言慕古法多封爵人性實遴嗇託以地理未定故且先賦茅土用慰喜封者是歲復明六管之令每一管下為設科條防禁犯者罪至死吏民扺罪者浸衆又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁盜賊起納言馮常以六管諫莽大怒免常官置執法左右刺姦選用能吏侯霸等分督六尉六隊如漢刺史與三公士郡一人從事臨淮瓜田儀等為盜賊依阻會稽長州琅邪女子呂母亦起初呂母子為縣吏為宰所冤殺母散家財以酤酒買兵弩陰厚貧窮少年得百餘人遂攻海曲縣殺其宰以祭子墓引兵入海其衆浸多後皆萬數莽遣使者即赦盜賊還言盜賊解輒復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起為盜賊莽大怒免之其或順指言民驕黠當誅及言時運適然且滅不久莽説輒遷之是歲八月莽親之南郊鑄作威斗威斗者以五石銅為之若北斗長二尺五寸欲以厭勝衆兵既成令司命負之莽出在前入在御旁鑄斗日大寒百官人馬有凍死者五年正月朔北軍南門災以大司馬司允費興為荊州牧見問到部方略興對曰荊揚之民率依阻山澤以漁采為業間者國張六管稅山澤妨奪民之利連年久旱百姓飢窮故為盜賊興到部欲令明曉告盜賊歸田里假貸犂牛種食闊其租賦幾可以解釋安集莽怒免興官天下吏以不得奉祿並為姦利郡尹縣宰家纍千金莽下詔曰詳考始建國二年胡虜猾夏以來諸軍吏及緣邊吏大夫以上為姦利增産致富者收其家所有財産五分之四以助邊急公府士馳傳天下考覆貪叨開吏告其將奴婢告其主幾以禁姦姦愈甚皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存己夏處南山臧薄冰二曰肅聖寶繼三曰德封昌圖又宗舅呂寬家前徙合浦私與宗通發覺按驗宗自殺莽曰宗屬為皇孫爵為上公知寬等叛逆族類而與交通刻銅印三文意甚害不知厭足窺欲非望春秋之義君親毋將將而誅焉迷惑失道自取此辜烏呼哀哉宗本名會宗以制作去二名今復名會宗貶厥爵改厥號賜諡為功崇繆伯以諸伯之禮葬于故同穀城郡宗姊妨為衛將軍王興夫人祝詛姑殺婢以絶口事發覺莽使中常侍䠠惲責問妨并以責興皆自殺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乘乾車駕川馬左蒼龍右白虎前朱虎前玄武右杖威節左負威斗號曰赤星非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其好怪如此以直道侯王涉為衛將軍涉者曲陽侯根子也根成帝世為大司馬薦莽自代莽恩之以為曲陽非令稱乃追諡根曰直道讓公涉嗣其爵是歲赤眉力子都樊崇等以飢饉相聚起於琅邪轉鈔掠衆皆萬數遣使者發郡國兵擊之不能克六年春莽見盜賊多乃令太史推三萬六千歲曆紀六歲一改元布天下下書曰紫閣圖曰太一黃帝皆仙上天張樂崑崙虔山之上後世聖主得瑞者當張樂秦終南山之上豫之不敏奉行未明乃今諭矣復以寧始將軍為更始將軍以順符命易不云乎日新之謂盛德生生之謂易豫其饗哉欲以誑耀百姓銷解盜賊衆皆笑之初獻新樂於明堂太廟群臣始冠麟韋之辨或聞其樂聲曰清厲而哀非興國之聲也是時關東飢旱數年力子都等衆黨浸多更始將軍廉丹擊益州不能克徵還更遣復位後大司馬護軍郭興庸部牧李曄擊蠻夷若豆等太傅犧叔士孫喜清潔江湖之盜賊而胸奴寇邊甚莽乃大募天下丁男及死罪囚吏民奴名曰豬突豨勇以為鋭卒一切稅天下吏民訾三十取一縑帛皆輸長安令公卿以下至郡縣黃綬皆保養軍馬多少各以秩為差又博募有奇技術可以攻胸奴者將待以不次之位言便宜者以萬數或言能度水不用舟楫連馬接騎濟百萬師或言不持斗糧服食藥物三軍不飢或言能飛一日千里可窺胸奴莽輒試之取大鳥翮為兩翼頭與身皆著毛通引環紐飛數百步墮莽知其不可用苟欲獲其名皆拜為理軍賜以車馬待發初胸奴右骨都侯須卜當其妻王昭君女也嘗內附莽遣昭君兄子和親侯王歙誘呼當至塞下脅將詣長安強立以為須卜善于後安公始欲誘迎當大司馬嚴尤諫曰當在胸奴右部兵不侵邊單于動靜輒語中國此方面之大助也于今迎當置長安稿街一胡人耳不如在胸奴有益莽不聽既得當欲遣尤與廉丹擊胸奴皆賜姓徵氏號二徵將軍當誅單于輿而立當代之出車城西橫廄未發尤素有智略非莽攻伐西夷數諫不從著古名將樂毅白起不用之意及言邊事凡三篇奏以風諫莽及當出廷議尤固言胸奴可且以為後先憂山東盜賊莽大怒乃策尤曰視事四年蠻夷猾夏不能遏絶寇賊姦宄不能殄滅不畏天威不用詔命貌佷自臧持必不移懷執異心非沮軍議未忍致于理其上大司馬武建伯印韍歸故郡以降符伯董為大司馬翼平連率田況奏縣訾民不實莽復三十稅一以況忠言憂國進爵為伯賜錢二百萬衆庶皆詈之青徐民多棄鄉里流亡老弱死道路壯者入賊中夙夜連率韓博上言有奇士長丈大十圍來至臣府曰欲奮擊胡虜自謂巨毋霸出於蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝即日大車四馬建虎旗載霸詣闕霸臥則枕鼓以鐵箸食此皇天所以輔新室也願陛下作大甲高車賁育之衣遣大將一人與虎賁百人迎之於道京師門戶不容者開高大之以視百蠻鎮安天下博意欲以風莽莽聞惡之留霸在所新豐更其姓曰巨母氏謂因文母太后而霸王符也徵博下獄以非所宜言棄市明年改元曰地皇從三萬六千歲曆號也地皇元年正月乙未赦天下下書曰方出軍行師敢有趨歡犯法者輒論斬毋須時盡歲止於是春夏斬人都市百姓震懼道路以目二月壬申日正黑莽惡之下書曰乃者日中見昧陰薄陽黑氣為變百姓莫不驚怪兆域大將軍王匡遣吏考問上變事者欲蔽上之明是以適見于天以正于理塞大異焉莽見四迫盜賊多復欲厭之又下書曰豫之皇初祖考黃帝定天下將兵為上將軍建華蓋立斗獻內設大將外置大司馬五人大將軍二十五人偏將軍百二十五人裨將軍千二百五十人校尉萬二千五百人司馬三萬七千五百人侯十一萬二千五百人當百二十二萬五千人士吏四十五萬人士千三百五十萬人應協於易弧矢之利以威天下豫受符命之文稽前人將條備焉於是置前後左右中大司馬之位賜諸州牧號為大將軍郡卒正連帥大尹為偏將軍屬令長裨將軍縣宰為校尉乘傳使者經歷郡國日且十輩倉無見穀以給傳車馬不能足賦取道中車馬取辦於民七月大風毀王路堂復下書曰乃壬午餔時有列風雷雨發屋折木之變豫甚辨焉豫甚栗焉豫甚恐焉伏念一旬迷乃解矣昔符命文立安為新遷王臨國雒陽為統義陽王是時豫在攝假謙不敢當而以為公其後金匱文至議者皆曰臨國雒陽為統謂據土中為新室統也宜為皇太子自此後臨久病雖瘳不平朝見挈茵輿行見王路堂者張於西廂及後閣更衣中又以皇后被疾臨且去本就舍妃妾在東永巷壬午列風毀王路西廂及後閣更衣中室昭寧堂池東南榆樹大十圍東僵擊東閣閣即東永巷之西垣也皆破折瓦壞發屋拔木豫甚驚焉又侯官奏月犯心前星厥有占豫甚憂之伏念紫閣圖文太一黃帝皆得瑞以仙後世褒主當登終南山所謂新遷王者乃太一新遷之後也統義陽王乃用五統以禮義登陽上遷之後也臨有兄而稱太子名不正宣尼公曰名不正則言不順至於刑罰不中民無錯手足惟即位以來陰陽未和風雨不時數遇枯旱蝗螟為災穀稼鮮耗百姓苦飢蠻夷猾夏寇賊姦宄人民正營無所錯手足深惟厥咎在名不正焉其立安為新遷王臨為統義陽王幾以保全二子子孫千億外攘四夷內安中國焉是月杜陵便殿乘輿虎文衣廢臧在室匣中者出自樹立外堂上良久乃委地吏卒見者以聞莽惡之下書曰寶黃廝赤其令郎從官皆衣絳望氣為數者多言有土功象莽又見四方盜賊多欲視為自安能建萬世之基者乃下書曰豫受命遭陽九之厄百六之會府帑空虛百姓匱乏宗廟未修且祫祭於明堂太廟夙夜永念非敢寧息深惟吉昌莫良於今年豫乃卜波水之北郎池之南惟玉食豫又卜金水之南明堂之西亦惟玉食豫將親築焉於是遂營長安城南提封百頃九月甲申莽立載行視親舉築三下司徒王尋大司空王邑持節及侍中常侍執法杜林等數十人將作崔發張邯説莽曰德盛者文縟宜崇其制度宣視海內且令萬世之後無以復加也莽乃博徵天下工匠諸圖畫以望法度算及吏民以義入錢穀助作者駱驛道路壞徹城西苑中建章承光包陽大臺儲元宮及平樂當路陽祿館凡十餘所取其材瓦以起九廟是月大雨六十餘日令民入米六百斛為郎其郎吏增秩賜爵至附城九廟一曰黃帝太初廟二曰帝虞始祖昭廟三曰陳胡王統祖穆廟四曰齊敬王世祖昭廟五曰濟北愍王王祖穆廟凡五廟不墮云六曰濟南伯王尊禰昭廟七曰元城孺王尊禰穆廟八曰陽平頃王戚禰昭廟九曰新都顯王戚禰穆廟殿皆重屋太初祖廟東西南北各四十丈高十七丈餘廟半之為銅薄櫨飾以金銀雕文窮極百工之巧帶高增下功費數百巨萬卒徒死者萬數巨鹿男子馬適求等謀舉燕兵以誅莽大司空士王丹發覺以聞莽遣三公大夫逮治黨與連及郡國豪傑數千人皆誅死封丹為輔國侯自莽為不順時令百姓怨恨莽猶安之又下書曰惟設此一切之法以來常安六鄉巨邑之都枹鼓稀鳴盜賊衰少百姓安土歲以有年此乃立權之力也今胡虜未滅誅蠻僰未絶焚江湖海麻沸盜賊未盡破殄又興奉宗廟社稷之大作民衆動搖今復一切此令盡二年止之以全元元救愚姦是歲罷大小錢更行貨布長二寸五分廣一寸直貨錢二十五貨錢徑一寸重五銖枚直一兩品並行敢盜鑄錢及偏行布貨伍人知不發舉皆沒入為官奴婢太傅平晏死以豫虞唐尊為太傅尊曰國虛民貧咎在奢泰乃身短衣小袖乘牝馬柴車藉稿瓦器又以歷遺公卿出見男女不異路者尊自下車以象刑赭幡汙染其衣莽聞而説之下詔申敕公卿思與厥齊封尊為平化侯是時南邵張霸江夏羊牧王匡等起雲杜緑林號曰下江兵衆皆萬餘人武功中水鄉民三舍墊為池二年正月以州牧位三公刺舉怠解更置牧監副秩元士冠法冠行事如漢刺史是月莽妻死諡曰孝睦皇后葬渭陵長壽園西令永侍文母名陵曰億年初莽妻以莽數殺其子涕泣失明莽令太子臨居養焉莽妻侍者原碧莽幸之後臨亦通焉恐事泄謀共殺莽臨妻愔國師公女能為星語臨宮中且有白衣會臨喜以為所謀且成後貶為統義陽王出在外第愈憂恐會莽妻病困臨豫書曰上於子産至嚴前長孫中孫年俱三十而死今臣臨復適三十誠恐一旦不保中室則不知死命所在莽侯妻疾見其書大怒疑臨有惡意不令得會喪既莽收原碧等考問具服姦謀殺狀莽欲祕之使殺案事使者司命從事埋獄中家不知所在賜臨藥臨不肯飲自刺死使侍中票騎將軍同侯林賜魂衣璽韍策書曰符命文立臨為統義陽王此言新室即位三萬六千歲後為臨之後者乃當龍陽而起前過聽議者以臨為太子有烈風之變輒順符命立為統義陽王在此之前自此之後不作信順弗蒙厥佑夭年隕命鳴呼哀哉迹行賜諡諡曰繆王又詔國師公臨本不知星事從愔起愔亦自殺是月新遷王安病死初莽為侯就國時幸侍者增秩懷能開明懷能生男興增秩生男匡女曄開明生女捷皆留新都國以其不明故也及安疾甚莽自病無子為安作奏使上言興等母雖微賤屬猶皇子不可以棄章視群公皆曰安友于兄弟宜及春夏加封爵於是以王車遣使者迎興等封興為功修公匡為功建公曄為睦修任捷為睦逮任孫公明公壽病死旬月四喪焉莽壞漢孝武孝昭廟分葬子孫其中魏成大尹李焉與卜者王況謀況謂焉曰新室即位以來民田奴婢不得賣買數改錢貨徵發煩數軍旅騷動四夷並侵百姓怨恨盜賊並起漢家當復興君姓李李音徵徵火也當為漢輔因為焉作讖書言文帝發忿居地下趣軍北告胸奴南告越人江中劉信執敵報怨復續古先四年當發軍江湖有盜自稱樊王姓為劉氏萬人成行不受赦令欲動秦雒陽十一年當相攻太白揚光歲星入東井其號當行又言莽大臣吉凶各有日期會合十餘萬言焉令吏寫其書吏亡告之莽遣使者即捕焉獄治皆死三輔盜賊麻起乃置捕盜都尉官令執法謁者追擊長安中建鳴鼓攻賊幡而使者隨其後遣太師犧仲景尚更始將軍護軍王黨將兵擊青徐國師和仲曹放助郭興擊句町轉天下穀幣詣西河五原朔方漁陽每一郡以百萬數欲以擊胸奴秋隕霜殺菽關東大飢蝗民犯鑄錢伍人相坐沒入為官奴婢其男子檻車兒女子步以鐵鎖琅當其頸傳詣鍾官以十萬數到者易其夫婦愁苦死者什六七孫喜景尚曹放等擊賊不能克軍師放縱百姓重困莽以王況讖言荊楚當興李氏為輔欲厭之乃拜侍中掌牧大夫李棽為大將軍揚州牧賜名聖使將兵奮擊上谷儲夏自請願説瓜田儀莽以為中郎使出儀儀文降未出而死莽求其尸葬之為起冢祠室諡曰瓜寧殤男幾以招來其餘然無肯降者閏月丙辰大赦天下天下大服民私服在詔書前亦釋除郎陽成修獻符命言繼立民母又曰黃帝以百二十女神仙莽於是遣中散大夫謁者各四十五人分行天下博采鄉里所高有淑女者上名莽夢長樂銅人五枚起立莽惡之念銅人銘有皇帝初兼天下之文即使尚方工鐫滅所夢銅人膺文又感漢高廟神靈遣虎賁武士入高廟拔劍四面提擊斧壞戶牖桃湯赭鞭鞭灑屋璧令輕車校尉居其中又令中軍北壘居高寢或言黃帝時建華蓋以登仙莽乃造華蓋九重高八丈一尺金瑵羽葆載以祕機四輪車駕六馬力士三百人黃衣幘車上人擊鼓挽者皆呼登仙莽出令在前百官竊言此似軟車非仙物也是歲南郡秦豐衆且萬人平原女子遲昭平能説博經以八投亦聚數千人在河阻中莽召問群臣禽賊方略皆曰此天囚行尸命在漏刻故左將軍公孫祿徵來與議祿曰太史令宗宣典星曆候氣變以凶為吉亂天文誤朝廷太傅平化侯飾虛偽以偷名位賊夫人之子國師嘉信公顛倒五經毀師法令學士疑惑明學男張邯地理侯孫陽造井田使民棄土業犧和魯匡設六管以窮工商説符侯崔發阿諛取容令下情不上通宜誅此數子以慰天下又言胸奴不可攻當與和親臣恐新室憂不在胸奴而在封域之中也莽怒使虎賁扶祿出然頗采其言左遷魯匡為五原卒正以百姓怨非故六管非匡所獨造莽厭衆意而出之初四方皆以飢寒窮愁起為盜賊稍稍群聚常思歲熟得歸鄉里衆雖萬數亶稱巨人從事三老祭酒不敢略有城邑轉掠求食日闋而已諸長吏牧守皆自亂鬭中兵而死賊非敢欲殺之也而莽終不諭其故是歲大司馬士按章豫州為賊所獲賊送付縣士還上書具言狀莽大怒下獄以為誣罔因下書責七公曰夫吏者理也宣德明恩以牧養民仁之道也抑強督姦捕誅盜賊義之節也今則不然盜發不輒得至成群黨遮略乘傳宰士士得脫者又妄自言我責數賊何故為是賊曰以貧窮故耳賊護出我今俗人議者率多若此惟貧困飢寒犯法為非大者群盜小者偷穴不過二科今乃結謀連黨以千百數是逆亂之大者豈飢寒之謂邪七公其嚴敕卿大夫卒正連率庶尹謹牧養善民急捕殄盜賊有不同心并力疾惡黜賊而妄曰飢寒所為輒捕繫請其罪於是群下愈恐莫敢言賊情者亦不得擅發兵賊由是遂不制唯翼平連率田況素果敢發民年十八以上四萬餘人授以庫兵與刻石為約赤糜聞之不敢入界況自劾奏莽讓況未賜虎符而擅發兵此弄兵也厥罪乏興以況自詭必禽滅賊故且勿治後況自請出界擊賊所嚮皆破莽以璽書令況領青徐二州牧事況上書盜賊始發其原甚微非部吏伍人所能禽也咎在長吏不為意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽略不輒督責遂至延曼連州乃遣將率多發使者傳相監趣郡縣力事上官應塞詰對共酒食具資用以救斷斬不給復憂盜治官事將率又不能躬率吏士戰則為賊所破吏氣浸傷徒費百姓前幸蒙赦令賊欲解散或反遮擊恐入山谷轉相告語故郡縣降賊皆更驚駭恐見詐滅因飢饉易動旬日之間更十餘萬人此盜賊所以多之故也今雒陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭少則亡以威視遠方宜急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積藏穀食并力固守賊來攻城則不能下所過無食勢不得群聚如此招之必降擊之則滅今空復多出將率郡縣苦之反甚於賊宜盡徵還乘傳諸使者以休息郡縣委任臣況以二州盜賊必平定之莽畏惡況陰為發代遣使者賜況璽書使者至見況因令代監其兵況隨使者西到拜為師尉大夫況去齊地遂敗三年正月九廟蓋構成納神主莽謁見大駕乘六馬以五采毛為龍文衣著角長三尺華蓋車元戎十乘在前因賜治廟者司徒大司空錢各千萬侍中中常侍以下皆封封都匠仇延為邯淡里附城二月霸橋災數千人以水沃救不滅莽惡之下書曰夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成曆數故其道駮惟常安御道多以所近為名乃二月癸已之夜甲午之辰火燒霸橋從東方西行至甲午夕橋盡火滅大司空行視考問或云寒民舍居橋下疑以火自燎為此災也其明旦即乙未立春之日也豫以神明聖祖黃虞遣統受命至于地皇四年為十五年正以三年終冬絶滅霸駮之橋欲以興成新室統一長存之道也又戒此橋空東方之道今東方歲荒民飢道路不通東嶽太師亟科條開東方諸倉賑貸窮乏以施仁道其更名霸館為長存館霸橋為長存橋是月赤眉殺太師犧仲景尚關東人相食四月遣太師王匡更始將軍廉丹東祖都門外天大雨霑衣止長老歎曰是為泣軍莽曰惟陽九之厄與害氣會究于去年枯旱霜蝗飢饉薦瑧百姓困乏流離道路于春尤甚豫甚悼之今使東嶽太師特進褒新侯開東方諸倉賑貸窮乏太師公所不過道分遣大夫謁者並開諸倉以全元元太師公因與廉丹大使五威司命位右大司馬更始將軍平均侯之兗州填撫所掌及青徐故不軌盜賊未盡解散後復屯聚者皆清潔之期於安兆黎矣太師更始合將鋭士十餘萬人所過放縱東方為之語曰寧逢赤眉不逢太師太師尚可更始殺我卒如田況之言莽又多遣大夫謁者分教民煮草木為酪酪不可食重為煩費莽下書曰惟民困乏雖溥開諸倉以賑贍之猶恐未足其且開天下山澤之防諸能采取山澤之物而順月令者其恣聽之勿令出稅至地皇三十年如故是王光上戊之六年也如令豪吏猾民辜而攉之小民弗蒙非豫意也易不云乎損上益下民説無疆書云言之不從是謂不艾咨呼群公可不憂哉是時下江兵盛新市朱鮪平林陳牧等皆復聚衆攻擊鄉聚莽遣司命大將軍孔仁部豫州納言大將軍嚴尤秩宗大將軍陳茂擊荊州各從吏士百餘人乘船從渭入河至華陰乃出乘傳到部募士尤謂茂曰遣將不與兵符必先請而後動是猶紲韓盧而責之獲也夏蝗從東方來蜚蔽天至長安入未央宮緣殿閣莽發吏民設購賞捕擊莽以天下穀貴欲厭之為大倉置衛交戟名曰政始掖門流民入關者數十萬人乃置養贍官稟食之使者監領與小吏共盜其稟飢死者十七八先是莽使中黃門王業領長安市買賤取於民民甚患之業以省費為功賜爵附城莽聞城中飢饉以問業業曰皆流民也乃市所賣粱飯肉羹持入視莽曰居民食咸如此莽信之冬無鹽索盧恢等舉兵反城廉丹王匡攻拔之斬首萬餘級莽遣中郎將奉璽書勞丹匡進爵為公封吏士有功者十餘人赤眉別校董憲等衆數萬人在梁郡王匡欲進擊之廉丹以為新拔城罷勞當且休士養威匡不聽引兵獨進丹隨之合戰成昌兵敗匡走丹使吏持其印韍符付匡曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人別鬭聞之皆曰廉公已死吾誰為生馳奔賊皆戰死莽傷之下書曰惟公多擁選士精兵衆郡駿馬倉穀帑藏皆得自調忽於詔策離其威節騎馬呵譟為狂刃所害烏呼哀哉賜諡曰果公國將哀章謂莽曰皇祖考黃帝之時中黃直為將破殺蚩尤今臣居中黃直之位願平山東莽遣章馳東與太師匡并力又遣大將軍陽浚守敖倉司徒王尋將十餘萬屯雒陽填南宮大司馬董忠養士習射中軍北壘大司空王邑兼三公之職司徒尋初發長安宿霸昌廄亡其黃鉞尋士房揚素狂直乃哭曰此經所謂喪其齊斧者也自劾去莽擊殺揚四方盜賊往往數萬人攻城邑殺二千石以下太師王匡等戰數不利莽知天下潰畔事窮計迫乃議遣風俗大夫司國憲等分行天下除井田奴婢山澤六管之禁即位以來詔令不便於民者皆收還之待見未發會世祖與兄齊武王伯升宛人李通等帥舂陵子弟數千人招致新市平林朱鮪陳牧等合攻拔棘陽是時嚴尤陳茂破下江兵成丹王常等數千人別走入南陽界十一月有星孛于張東南行五日不見莽數召問太史令宗宣諸術數家皆繆對言天文安善群賊且滅莽差以自安四年正月漢兵得下江王常等以為助兵擊前隊大夫甄阜屬正梁丘賜皆斬之殺其衆萬人初京師聞青徐賊衆數十萬人訖無文號旌旗表識咸怪異之好事者竊言此豈如古三皇無文書號諡邪莽亦心怪以問群臣群臣莫對唯嚴尤曰此不足怪也自黃帝湯武行師必待部曲旌旗號令今此無有者直飢寒群盜犬羊相聚不知為之耳莽大説群臣盡服及後漢兵劉伯升起皆稱將軍攻城略地既殺甄阜移書稱説莽聞之憂懼漢兵乘勝遂圍宛城初世祖族兄聖公先在平林兵中三月辛已朔平林新市下江兵將王常朱鮪等共立聖公為帝改年為更始元年拜置百官莽聞之愈恐欲外視自安乃染其須髮進所徵天下淑女杜陵史氏女為皇后聘黃金三萬斤車馬奴婢雜帛珍寶以巨萬計莽親迎於前殿兩陛間成同牢之禮于上西堂備和嬪美御和人三位視公嬪人九視卿美人二十七視大夫御人八十一視元士凡百二十人皆佩印韍執弓韣封皇后父諶為和平侯拜為寧始將軍諶子二人皆侍中是日大風發屋折木群臣上壽曰乃庚子雨水灑道辛丑清靚無塵其夕穀風迅疾從東北來辛丑巽之宮日也巽為風為順后誼明母道得溫和慈惠之化也易曰受茲介福于其王母禮曰承天之慶萬福無疆諸欲依廢漢火劉皆沃灌雪除殄滅無餘雜矣百穀豐茂庶草蕃殖元元歡喜兆民賴福天上幸甚莽日與方士涿郡昭君等於後宮考驗方術縱淫樂焉大赦天下然猶曰故漢氏舂陵侯群子劉伯升與族人婚姻黨與妄流言惑衆悖畔天命及手害更始將軍廉丹前隊大夫甄阜屬正梁丘賜及北狄胡虜逆輿洎南僰虜若豆孟遷不用此書有能捕得此人者皆封為上公食邑萬戶賜寶貨五千萬又詔太師王匡國將哀章司命孔仁兗州牧壽良卒正王閎揚州牧李聖亟進所部州郡兵凡三十萬衆迫措青徐盜賊納言將軍嚴尤秩宗將軍陳茂車騎將軍王巡左隊大夫王吳亟進所部州郡兵凡十萬衆迫措前隊醜虜明告以生活丹青之信復迷惑不解皆并力合擊殄滅之矣大司空隆新公宗室戚屬前以虎牙將軍東指則反虜破壞西擊則逆賊靡碎此乃新室威寶之臣也如黠賊不解散將遣大司空將百萬之師征伐劋絶之矣遣七公幹士隗囂等七十二人分下赦令曉諭云囂等既出因逃亡矣四月世祖與王常等別攻潁川下昆陽郾定陵莽聞之愈恐遣大司空王邑馳傳之雒陽與司徒王尋發衆郡兵百萬號曰虎牙五威兵平定山東得顓封爵政決於邑除用徵諸明兵法六十三家術者各持圖書受器械備軍吏傾府庫以遣邑多齎珍寶猛獸欲視饒富用怖山東邑至雒陽州郡各選精兵牧守自將定會者四十二萬人餘在道不絶車甲士馬之盛自古出師未嘗有也六月邑與司徒尋發雒陽欲至宛道出潁川過昆陽昆陽時已降漢漢兵守之嚴尤陳茂與二公會二公縱兵圍昆陽嚴尤曰稱尊號者在宛下宜亟進彼破諸城自定矣邑曰百萬之師所過當滅今屠此城喋血而進前歌後舞顧不快邪遂圍城數十重城中請降不許嚴尤又曰歸師勿遏圍城為之闕可如兵法使得逸出以怖宛下邑又不聽會世祖悉發郾定陵兵數千人來救昆陽尋邑易之自將萬餘人行陳敕諸營皆按部毋得動獨迎與漢兵戰不利大軍不敢擅相救漢兵乘勝殺尋昆陽中兵出並戰邑走軍亂大風蜚瓦雨如注水大衆崩壞號呼虎豹股栗士卒奔走各還歸其郡邑獨與所將長安勇敢數千人還雒陽關中聞之震恐盜賊並起又聞漢兵言莽鴆殺孝平帝莽乃會公卿以下於王路堂開所為平帝命金縢之策泣以視群臣命明學男張邯稱説其德及符命事因曰易言伏戎于莽升其高陵三歲不興莽皇帝之名升謂劉伯升高陵謂高陵侯子翟義也言劉升翟義為伏戎之兵於新皇帝世猶殄滅不興也群臣皆稱萬歲又令東方檻車傳送數人言劉伯升等皆行大戮民知其詐也先是衛將軍王涉素養道士西門君惠君惠好天文讖記為涉言星孛掃宮室劉氏當復興國師公姓名是也涉信其言以語大司馬董忠數俱至國師殿中廬道語星宿國師不應後涉特往對歆涕泣言誠欲與公共安宗族奈何不信涉也歆因為言天文人事東方必成涉曰新都哀侯小被病功顯君素耆酒疑帝本非我家子也董公主中軍精兵涉領宮衛伊休侯主殿中如同心合謀共劫持帝東降南陽天子可以全宗族不昔俱夷滅矣伊休侯者歆長子也為侍中五官中郎將莽素愛之歆怨莽殺其三子又畏大禍至遂與涉忠謀欲發歆曰當待太白星出乃可忠以司中大贅起武侯孫伋亦主兵復與伋謀伋歸家顏色變不能食妻怪問之語其狀妻以告弟雲陽陳邯邯欲告之七月伋與邯俱告莽遣使者分召忠等時忠方講兵都肄護軍王咸謂忠謀久不發恐漏泄不如遂斬使者勒兵入忠不聽遂與歆涉會省戶下莽令䠠憚責問皆服中黃門各拔刃將忠等送廬忠拔劍欲自刎侍中王望傳言大司馬反黃門持劍共格殺之省中相驚傳勒兵至郎署皆拔刃張弩更始將軍史諶行諸署告郎吏曰大司馬有狂病發已誅皆令弛兵莽欲以厭凶使虎賁以斬馬劍挫忠盛以竹器傳曰反虜出下書赦大司馬官屬吏士為忠所詿誤謀反未發覺者收忠宗族以醇醯毒藥尺白刃叢棘并一坎而埋之劉歆王涉皆自殺莽以二人骨肉舊臣惡其內潰故隱其誅伊休侯疊又以素謹歆訖不告但免侍中中郎將更為中散大夫後日殿中鉤盾土山仙人掌旁有白頭公青衣郎吏見者私謂之國師公衍功侯喜素善卦莽使筮之曰憂兵火莽曰小兒安得此左道是乃豫之皇祖叔父子僑欲來迎我也莽軍師外破大臣內畔左右亡所信不能復遠念郡國欲呼邑與計議崔發曰邑素小心今失大衆而徵恐其執節引決宜有以大慰其意於是莽遣發馳傳諭邑我年老毋適子欲傳邑以天下敕亡得謝見勿復道邑到以為大司馬大長秋張邯為大司徒崔發為大司空司中壽容苗欣為國師同説侯林為衛將軍莽憂悶不能食亶飲酒啖鰒魚讀軍書倦因馮几寐不復就枕矣性好時日小數及事迫急亶為厭勝遣使壞渭陵延陵園門罘罳曰毋使民復思也又以墨汙色其周垣號將至曰歲宿申水為助將軍右庚刻木校尉前丙耀金都尉又曰執大斧伐枯木流大水滅發火如此屬不可勝記秋太白星流入太微燭地如月光成紀隗崔兄弟共劫大尹李育以兄子隗囂為大將軍攻殺雍州牧陳慶安定卒正王旬并其衆移書郡縣數莽罪惡萬於桀紂是月析人鄧曄于匡起兵南鄉百餘人時析宰將兵數千屯鄡亭備武關曄匡謂宰曰劉帝已立君何不知命也宰請降盡得其衆曄自稱輔漢左將軍匡右將軍拔折丹水攻武關都尉朱萌降進攻右隊大夫宋綱殺之西拔湖莽愈憂不知所出崔發言周禮及春秋左氏國有大災則哭以厭之故易稱先號咷而後笑宜呼嗟告天以求救莽自知敗乃率群臣至南陳其符命本末仰天曰皇天既命授臣莽何不殄滅衆賊即令臣莽非是願下雷霆誅臣莽因搏心大哭氣盡伏而叩頭又作告天策自陳功勞千餘言諸生小民會旦夕哭為設飧粥甚悲哀及能誦策文者除以為郎至五千餘人䠠惲將領之莽拜將軍九人皆以虎為號號曰九虎將北軍精兵數萬人東內其妻子宮中以為質時省中黃金萬斤者為一匱尚有六十匱黃門鉤盾臧府中尚方處處各有數匱長樂御府中御府及都內平準帑藏錢帛珠玉財物甚衆莽愈愛之賜九虎士人四千錢衆重怨無鬭意九虎至華陰回溪距隘北從河南至山于匡持數千弩乘堆挑戰鄧曄將二萬餘人從閿鄉南出棗街作姑破其一部北出九虎後擊之六虎敗走史熊王況詣闕歸死莽使使責死者安在皆自殺其四虎亡三虎郭欽陳翬成重收散卒保京師倉鄧曄開武關迎漢丞相司直李松將二千餘人至湖與曄等共攻京師倉未下曄以弘農掾王憲為校尉將數百人北度渭入左馮翊界降城略地李松遣偏將軍韓臣等徑西至新豐與莽波水將軍戰波水走韓臣等追奔遂至長門宮王憲北至頻陽所過迎降大姓櫟陽申碭下邽王大皆率衆隨憲屬縣斄嚴春茂陵董喜藍田王孟槐里汝臣盩厔王扶陽陵嚴本杜陵屠門少之屬衆皆數千人假號稱漢將時李松鄧曄以為京師小小倉尚未可下何況長安城當須更始帝大兵到即引軍至華陰治攻具而長安旁兵四會城下聞天水隗氏兵方到皆爭欲先入城貪立大功鹵掠之利莽遣使者分赦城中諸獄囚徒皆授兵殺豬飲其血與誓曰有不為新室者社鬼記之更始將軍史諶將度渭橋皆散走諶空還衆兵發掘莽妻子父祖冢燒其棺椁及九廟明堂辟雍火照城中或謂莽曰城門卒東方人不可信莽更發越騎士為衛門置六百人各一校尉十月戊申朔兵從宣平城門入民間所謂都門也張邯行城門逢兵見殺王邑王林王巡䠠惲等分將兵距擊北闕下漢兵貪莽封戰者七百餘人會日暮官府邸第盡奔亡二日己酉城中少年朱弟張魚等恐見鹵掠趨歡並和燒作室門斧敬法闥呼曰反虜王莽何不出降火及掖廷承明黃皇室主所居也莽避火宣室前殿火輒隨之宮人婦女謕呼曰當奈何時莽紺袀服帶璽韍持虞帝匕首天文郎桉栻於前日時加某莽旋席隨斗柄而坐曰天生德於豫漢兵其如豫何莽時不食少氣困矣三日庚戍晨旦明群臣扶掖莽自前殿南下椒除西出白虎門和新公王揖奉車待門外莽就車之漸臺欲阻池水猶抱持符命威斗公卿大夫侍中黃門郎從官尚千餘人隨之王邑晝夜戰罷極士死傷略盡馳入宮間關至漸臺見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺衆兵追之圍數百重臺上亦弓帑與相射稍稍落去矢盡無以復射短兵接王邑父子䠠惲王巡戰死莽入室下餔時衆兵上臺王揖趙博曲欣唐尊王盛中常侍王參等皆死臺上商人杜吳殺莽取其綬校尉東海公賓就故大行治禮見吳問綬主所在曰室中西北陬間就識斬識斬莽首軍人分裂莽身支節肌骨臠分爭相殺者數十人公賓就持莽首詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉舍東宮妻莽後宮乘其車服六日癸丑李松鄧曄入長安將軍趙萌申屠建亦至以王憲得璽綬不輒上多挾宮女建天子鼓旗收斬之傳莽首詣更始縣宛市百姓共提擊之或切食其舌莽揚州牧李聖司命孔仁兵敗山東聖格死仁將其衆降已而歎曰吾聞食人食者死其事拔劍自刺死及曹部監杜普陳定大尹沈意九江連率賈萌皆守郡不降為漢兵所誅賞都大尹王欽及郭欽守京師倉聞莽死乃降更始義之皆封為侯太師王匡國將哀章降雒陽傳詣宛斬之嚴尤陳茂敗昆陽下走至沛郡譙自稱漢將召會吏民尤為稱説王莽篡位天時所亡聖漢復興狀茂伏而涕泣聞故漢鍾武侯劉聖衆汝南稱尊號尤茂降之以尤為大司馬茂為丞相十餘日敗尤茂并死郡縣皆舉城降天下悉歸漢初申屠建嘗事崔發為詩建至發降之後復稱説建令丞相劉賜發以徇史諶王延王林王吳趙閎亦降復見殺初諸假號兵人人望封侯申屠建既斬王憲又揚言三輔黠共殺其主吏民惶恐屬縣屯聚建等不能下馳白更始二年二月更始到長安下詔大赦非王莽子他皆除其罪故王氏宗族得全三輔悉平更始都長安居長樂宮府藏完具獨未央宮燒攻莽三日死則案堵復故更始至歲餘政教不行明年夏赤眉樊崇衆數十萬人入關立劉盆子稱尊號攻更始更始降之赤眉遂燒長安宮室市里害更始民飢餓相食死者數十萬長安為虛城中無人行宗廟園陵皆發掘唯霸陵杜陵完六月世祖即位然後宗廟社稷復立天下艾安贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者邪莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其姦惡以成篡盜之禍推是言之亦天時非人力之致矣及其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以黃虞復出也乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之內囂然喪其樂生之心中外憤怨遠近俱發城池不守支體分裂遂令天下城邑為虛丘壟發掘害遍生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六藝以文姦言同歸殊塗俱用滅亡皆炕龍絶氣非命之運紫色蛙聲餘分閨位聖王之驅除云爾
