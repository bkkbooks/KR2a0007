body:
  text: 谷永杜鄴第五十五谷永字子雲長安人也父吉為衛司馬使送郅支單于侍子為郅支所殺語在陳湯傳永少為長安小史後博學經書建昭中御史大夫繁延壽聞其茂材除補屬舉為太常丞數上疏言得失建始三年冬日食地震同日俱發詔舉方正直言極諫之士太常陽城侯劉慶忌舉永待詔公車對曰陛下秉至聖之純德懼天地之戒異飭身修政納問公卿又下明詔帥舉直言燕見紬繹以求咎愆使臣等得造明朝承聖問臣材朽學淺不通政事竊聞明王即位正五事建大中以承天心則庶徵序於下日月理於上如人君淫溺後宮般樂游田五事失於躬大中之道不立則咎徵降而六極至凡災異之發各象過失以類告人乃十二月朔戊申日食婺女之分地震蕭牆之內二者同日俱發以丁寧陛下厥咎不遠宜厚求諸身意豈陛下志在閨門未恤政事不慎舉錯婁失中與內寵大盛女不遵道嫉妒專上妨繼嗣與古之王者廢五事之中失夫婦之紀妻妾得意謁行於內勢行於外至覆傾國家或亂陰陽昔褒姒用國宗周以喪閻妻驕扇日以不臧此其效也經曰皇極皇建其有極傳曰皇之不極是謂不建時則有日月亂行陛下踐至尊之祚為天下主奉帝王之職以統群生方內之治亂在陛下所執誠留意於正身勉強於力行損燕私之閒以勞天下放去淫溺之樂罷歸倡優之笑絶卻不享之義慎節游田之虞起居有常循禮而動躬親政事致行無倦安服若性經曰繼自今嗣王其毋淫于酒毋逸于游田惟正之共未有身治正而臣下邪者也夫妻之際王事綱紀安危之機聖王所致慎也昔舜飭正二女以崇至德楚莊忍絶丹姬以成伯功幽王惑於褒姒周德降亡魯桓脅於齊女社稷以傾誠修後宮之政明尊卑之序貴者不得嫉妬專寵以絶驕嫚之端抑褒閻之亂賤者咸得秩進各得厥職以廣繼嗣之統息白華之怨後宮親屬饒之以財勿與政事以遠皇父之類損妻黨之權未有閨門治而天下亂者也治遠自近始習善在左右昔龍管納言而帝命惟允四輔既備成王靡有過事誠敕正左右齊栗之臣戴金貂之飭執常伯之職者皆使學先王之道知君臣之義濟濟謹孚無敖戲驕恣之過則左右肅艾群僚仰法化流四方經曰亦惟先正克左右未有左右正而百官枉者也治天下者尊賢考功則治簡賢違功則亂誠審思治人之術歡樂得賢之福論材選士必試於職明度量以程能考功實以定德無用比周之虛譽毋聽濅潤之譖訴則抱功修職之吏無蔽傷之憂比周邪僞之徒不得即工小人日銷俊艾日隆經曰三載考績三考黜陟幽明又曰九德咸事俊艾在官未有功賞得於前衆賢布於官而不治者也堯遭洪水之災天下分絶為十二州制遠之道微而無乖畔之難者德厚恩深無怨於下也秦居平土一夫大呼而海內崩析者刑罰深酷吏行殘賊也夫違天害德為上取怨於下莫甚乎殘賊之吏誠放退殘酷暴之吏錮廢勿用益選溫良上德之士以親萬姓平刑釋冤以理民命務省繇役母奪民時薄收賦稅毋殫民財使天下黎元咸安家樂業不苦踰時之役不患苛暴之政不疾酷烈之吏雖有唐堯之大災民無離上之心經曰懷保小人惠于鰥寡未有德厚吏良而民畔者也臣聞災異皇天所以譴告人君過失猶嚴父之明誡畏懼敬改則禍銷福降忽然簡易則咎罰不除經曰饗用五福畏用六極傳曰六沴作見若不共御六罰既侵六極其下今三年之間災異鋒起小大畢具所行不享上帝上帝不豫炳然甚著不求之身無所改正疏舉廣謀又不用其言是循不享之迹無謝過之實也天責愈深此五者王事之綱紀南面之急務唯陛下留神對奏天子異焉特召見永其夏皆令諸方正對策語在杜欽傳永對畢因曰臣前幸得條對災異之效禍亂所極言關於聖聰書陳於前陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虛文欲末殺災異滿讕誣天是故皇天勃然發怒甲己之間暴風三溱拔樹折木此天至明不可欺之效也上特復問永永對曰日食地震皇后貴妾專寵所致語在五行志是時上初即位謙讓委政元舅大將軍王鳳議者多歸咎焉永知鳳方見柄用陰欲自託乃復曰方今四夷賓服皆為臣妾北無薰粥冒頓之患南無趙他呂嘉之難三垂晏然靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有為亡吳楚燕梁之勢百官盤互親疏相錯骨肉大臣有申伯之忠洞洞屬屬小心畏忌無重合安陽博陸之亂三者無毛髮之辜不可歸咎諸舅此欲以政事過差丞相父子中尚書宦官檻塞大異皆瞽說欺天者也竊恐陛下舍昭昭之白過忽天地之明戒聽暗昧之瞽說歸咎乎無辜倚異乎政事重失天心不可之大者也陛下即位委任遵舊未有過政元年正月白氣較然起乎東方至其四月黃濁四塞覆冒京師申以大水著以震蝕各有占應相為表裏百官庶事無所歸倚陛下獨不怪與白氣起東方賤人將興之表也黃濁冒京師王道微絶之應也夫賤人當起而京師道微二者已醜陛下誠深察愚臣之言致懼天地之異長思宗廟之計改往反過抗湛溺之意解偏駮之愛奮乾剛之威平天覆之施使列妾得人人更進猶尚未足也急復益納宜子婦人毋擇好醜毋避嘗字毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也後宮女史使令有直意者廣求於微賤之間以遇天所開右慰釋皇太后之憂慍解謝上帝之譴怒則繼嗣蕃滋災異訖息陛下則不深察愚臣之言忽於天地之戒咎根不除水雨之災山石之異將發不久發則災異已極天變成形臣雖欲捐身關策不及事已疏賤之臣至敢直陳天意斥譏帷幄之私欲間離貴后盛妾自知忤心逆耳必不免於湯鑊之誅此天保右漢家使臣敢直言也三上封事然後得召待詔一旬然後得見夫由疏賤納至忠甚苦由至尊聞天意甚難語不可露願具書所言因侍中奏陛下以示腹心大臣腹心大臣以為非天意臣當伏妄言之誅即以為誠天意也奈何忘國家大本背天意而從欲唯陛下省察熟念厚為宗廟計時對者數十人永與杜欽為上第焉上皆以其書示後宮後上嘗賜許皇后書采永言以責之語在外戚傳永既陰為大將軍鳳說矣能實最高由是擢為光祿大夫永奏書謝鳳曰永斗筲之材質薄學朽無一日之雅左右之介將軍說其狂言擢之皂衣之吏廁之爭臣之末不聽浸潤之譖不食膚受之訴雖齊桓晉文用士篤密察父哲兄覆育子弟誠無以加昔豫子吞炭壞形以奉見異齊客隕首公門以報恩施知氏孟嘗猶有死士何況將軍之門鳳遂厚之數年出為安定太守時上諸舅皆修經書任政事平阿侯談年次當繼大將軍鳳輔政尤與永善陽朔中鳳薨鳳病困薦從弟御史大夫音以自代上從之以音為大司馬車騎將軍領尚書事而平阿侯談位特進領城門兵永聞之與談書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦宜在上將久矣以大將軍在故抑鬱於家不得舒憤今大將軍不幸蚤薨絫親疏序材能宜在君侯拜吏之日京師士大夫悵然失望此皆永等愚劣不能褒揚萬分屬聞以特進領城門兵是則車騎將軍秉政雍容于內而至戚賢舅執管籥於外也愚竊不為君侯喜宜深辭職自陳淺薄不足以固城門之守收太伯之讓保謙謙之路闔門高枕為知者首願君侯與博覽者參之小子為君侯安此談得其書大感遂辭讓不受領城門職由是談音相與不平永遠為郡吏恐為音所危病滿三月免音奏請永補營軍司馬永數謝罪自陳得轉為長史音用從舅越親輔政威權損於鳳時永復說音曰將軍履上將之位食膏腴之都任周召之職擁天下之樞可謂富貴之極人臣無二天下之責四面至矣將何以居之宜夙夜孳孳執伊尹之彊德以守職匡上誅惡不避親愛舉善不避仇讎以章至公立信四方篤行三者乃可以長堪重任久享盛寵太伯出西方六十日法當參天今已過期尚在桑榆之間質弱而行遲形小而光微熒惑角怒明大逆行守尾其逆常也守尾變也意豈將軍忘湛漸之義委曲從順所執不彊不廣用士尚有好惡之忌蕩蕩之德未純方與將相大臣乖離之萌也何故始襲司馬之號俄而金火並有此變上天至明不虛見異唯將軍畏之慎之深思其故改求其路以享天意音猶不平薦永為護菀使者音薨成都侯商代為大司馬衛將軍永乃遷為涼州刺史奏事京師訖當之部時有黑龍見東萊上使尚書問永受所欲言永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輒上聞則商周不易姓而迭興三正不變改而更用夏商之將亡也行道之人皆知之晏然自以若天有日莫能危是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也陛下誠垂寬明之聽無忌諱之誅使芻蕘之臣得盡所聞於前不懼於後患直言之路開則四方衆賢不遠千里輻湊陳忠群臣之上願社稷之長福也漢家行夏正夏正色黑黑龍同姓之象也龍陽德由小之大故為王者瑞應未知同姓有見本朝無繼嗣之慶多危殆之隙欲因擾亂舉兵而起者邪將動心冀為後者殘賊不仁若廣陵昌邑之類臣愚不能處也元年九月黑龍見其晦日有食之今年二月己未夜星隕乙酉日有食之六月之間大異四發二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與群惡沈湎於酒書曰乃用婦人之言自絶于天四方之逋逃多罪是宗是長是信是使詩云燎之方陽寧或滅之赫赫宗周褒姒滅之易曰濡其首有孚失是秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效易曰在中餽無攸遂言婦人不得與事也詩曰懿厥哲婦為梟為鴟匪降自天生自婦人建始河平之際許班之貴頃動前朝熏灼四方賞賜無量空虛內臧女寵至極不可上矣今之後起天所不饗什倍於前廢先帝法度聽用其言官秩不當縱釋王誅驕其親屬假之威權從橫亂政刺舉之吏莫敢奉憲又以掖庭獄大為亂阱榜箠㿊於炮格絶滅人命主為趙李報德復怨反除白罪建治正吏多繫無辜掠立迫恐至為人起責分利受謝坐入死出者不可勝數是以日食再既以昭其辜王者必先自絶然后天絶之陛下棄萬乘之至貴樂家人之賤事厭高美之尊號好匹夫之卑字崇聚僄輕無義小人以為私客數離深宮之固挺身晨夜與群小相隨烏集雜會飲醉吏民之家亂服共坐流湎媟嫚溷殽無別閔免遁樂晝夜在路典門戶奉宿衛之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聽邪臣之計去高敞初陵捐十年功緒改作昌陵反天地之性因下為高積土為山發徒起邑並治宮館大興繇役重增賦斂微發如雨役百乾溪費疑驪山靡敝天下五年不成而後反故又廣盱營表發人冢墓斷截骸骨暴揚尸柩百姓財竭力盡愁恨感天災異婁降饑饉仍臻流散冗食餧死於道以百萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不遠在夏后之世願陛下追觀夏商周秦所以失之以鏡考己行有不合者臣當伏妄言之誅漢興九世百九十餘載繼體之主七皆承天順道遵先祖法度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦已多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯發明聖之德昭然遠寤畏此上天之威怒深懼危亡之徵兆蕩滌邪辟之惡志厲精致政專心反道絶群小之私客免不正之詔除悉罷北宮私奴車馬媠出之具克己復禮毋二微行出飲之過以防迫切之禍深惟日食再既之意抑損椒房玉堂之盛寵毋聽後宮之請謁除掖庭之亂獄出炮格之陷阱誅戮邪佞之臣及左右執左道以事上者以塞天下之望且寢初陵之作止諸繕治宮室闕更滅賦盡休力役存恤振救困乏之人以弭遠方厲崇忠直放退殘賊無使素餐之吏久尸厚祿以次貫行固執無違夙夜孳孳婁省無怠舊愆畢改新德既章纖介之邪不復載心則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保唯陛下留神反覆熟省臣言臣幸得備邊部之吏不知本朝失得瞽言觸忌諱罪當萬死成帝性寬而好文辭又久無繼嗣數為微行多近幸小臣趙李從微賤專寵皆皇太后與諸舅夙夜所常憂至親難數言故惟永等使因天變而切諫勸上納用之永自知有內應展意無所依違每言事輒見答禮至上此對上大怒衛將軍商密擲永令發去上使侍御史收永敕過交道廄者勿追御史不及永還上意亦解自悔明年徵永為太中大夫遷光祿大夫給事中元廷元年為北地太守時災異尤數永當之官上使衛尉淳于長受永所欲言永對曰臣永幸得以愚朽之材為太中大夫備拾遺之臣從朝者之後進不能盡思納忠輔宣聖德退無被堅執鋭討之義之功猥蒙厚恩仍遷至北地太守絶命隕首身膏野草不足以報塞萬分陛下聖德寬仁不遺易忘之臣垂周文之聽下及芻蕘之愚有詔使衛尉受臣永所欲言臣聞事君之義有言責者盡其忠有官守者修其職臣永幸得免於言責之辜有官守之任當畢力遵職養綏百姓而已不宜復關得失之辭忠臣之於上志在過厚是故遠不違君死不忘國昔史魚既沒餘忠未訖委柩後寢以尸達誠汲黯身外思內發憤舒憂遺言李息經曰雖爾身在外乃心無不在王室臣永幸得給事中出入三年雖執干戈守邊垂思慕之心常存於省闥是以敢越郡吏之職陳纍年之憂臣聞天生蒸民不能相治為立王者以統理之方制海內非為天子列土封疆非為諸侯皆以為民也垂三統列三正去無道開有德不私一姓明天下乃天下之天下非一人之天下也王者躬行道德承順天地博愛仁恕恩及行葦籍稅取民不過常法宮室車服不踰制度事節財足黎庶和睦則卦氣理效五徵時序百姓壽考庶屮蕃滋符瑞並降以昭保右失道妄行逆天暴物窮奢極欲湛湎荒淫婦言是從誅逐仁賢離逖骨肉群小用事峻刑重賦百姓愁怨則卦氣悖亂咎徵著郵上天震怒災異婁怒災異婁降日月薄食五星失行山崩川潰水泉踊出妖孽並見茀星耀光饑饉荐臻百姓短折萬物夭傷終不改寤惡洽變備不復譴告更命有德詩云乃眷西顧此惟豫宅夫去惡奪弱遷命賢聖天地之常經百王之所同也加以功德有厚薄期質有修短時世有中季天道有盛衰陛下承八世之功業當陽數之標季涉三七之節紀遭無妄之卦運直百六之災厄三難異科雜焉同會建始元年以來二十載間群災大異交錯鋒起多於春秋所書八世著記久不塞除重以今年正月己亥朔日有食之三朝之會四月丁酉四方衆星白晝流隕七月辛未彗星橫天乘三難之際會畜衆多之災異因之以饑饉接之以不贍彗星極異也土精所生流隕之應出於飢變之後兵亂作矣厥期不久隆德積善懼不克濟內則為深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗北宮苑囿街巷之中臣妾之家幽閒之處徵舒崔杼之亂外則為諸夏下土將有樊並蘇令陳勝項梁奮臂之禍內亂朝暮日戒諸夏舉兵以火角為期安危之分界宗廟之至憂臣永所以破膽寒心豫言之纍年下有其萌然後變見於上可不致慎禍起細微姦生所易願陛下正君臣之義無復與群小媟黷燕飲中黃門後庭素驕慢不謹嘗以醉酒失臣禮者悉出勿留勤三綱之嚴修後宮之政抑遠驕妒之寵崇近婉順之行加惠失志之人懷柔怨恨之心保至尊之重秉帝王之威朝覲法出而後駕陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除內亂之路塞矣諸夏舉兵萌在民饑饉而吏不恤興於百姓困而賦斂重發於下怨離而上不知易曰屯其膏小貞吉大貞凶傳曰飢而不損茲謂泰厥災水厥咎亡訞辭曰關動牡飛辟為無道臣為非厥咎亂臣謀篡王者遭衰難之世有飢饉之災不損用而大自潤故凶百姓困貧無以共求愁悲怨恨故水城關守國之固固將去焉故牡飛往年郡國二十一傷於水災禾黍不入今年蠶麥咸惡百川沸騰江河溢決大水泛濫郡國十五有餘此年喪稼時過無宿麥百姓失業流散群輩守關大異較炳如彼水災浩浩黎庶窮困如此宜損常稅小自潤之時而有司奏請加賦甚繆經義逆於民心布怨趨禍之道也牡飛之狀殆為此發古者穀不登虧膳災婁至損服凶年不塈塗明王之制也詩云凡民有喪扶服救之論語曰百姓不足君孰豫足臣願陛下勿許加賦之奏益減大官導官中御府均官掌畜廩犧用度止尚方織室京師郡國工服官發輸造作以助大司農流恩廣施振贍困乏開關梁內流民恣所欲之以救其急立春遣使者循行風俗宣布聖德存恤孤寡問民所苦勞二千石敕勸耕桑毋奪農時以慰綏元元之心防塞大姦之隙諸夏之亂庶幾可息臣聞上主可與為善而不可與為惡下主可與為惡而不可與為善陛下天然之性疏通聰敏上主之姿也少省愚臣之言感寤三難深畏大異定心為善捐忘邪志毋二舊愆厲精致政至誠應天則積異塞於上禍亂伏於下何憂患之有竊恐陛下公志未專私好頗存尚愛群小不肯為耳對奏天子甚感其言永於經書泛為疏達與杜欽杜鄴略等不能洽浹如劉向父子及揚雄也其於天官京氏易最密故善言災異前後所上四十餘事略相反覆專攻上身與後宮而已黨於王氏上亦知之不甚親信也永所居任職為北地太守歲餘衛將軍商薨曲陽侯根為票騎將軍薦永徵入為大司農歲餘永病三月有司奏請免故事公卿病輒賜告至永獨即時免數月卒於家本名並以尉氏樊並反更名永云杜鄴字子夏本魏郡繁陽人也祖父及父積功勞皆至郡守武帝時徙茂陵鄴少孤其母張敞女鄴壯從敞子吉學問得其家書以孝廉為郎與車騎將軍王音善平阿侯談不受城門職後薨上閔悔之乃復令談弟成都侯商位特進領城門兵得舉吏如將軍府鄴見音前與平阿有隙即說音曰鄴聞人情恩深者其養謹愛至者其求詳夫戚而不見殊孰能無怨此棠棣角弓之詩所為作也昔秦伯有千乘之國而不能容其母弟春秋亦書而譏焉周召則不然忠以相輔義以相匡同己之親等已之尊不以聖德獨兼國寵又不為長專受榮任分職於陝並為弼疑故內無感恨之隙外無侵侮之羞俱享天祐兩荷高名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也將軍宜承順聖意加異往時每事凡議必與及之指為誠發出於將軍則孰敢不說諭昔文侯寤大鴈之獻而父子益親陳平共一飯之饌而將相加歡所接雖在楹階俎豆之間其於為國折衝厭難豈不遠哉竊慕倉唐陸子之義所白奧內唯深察焉音甚嘉其言由是與成都侯商親密二人皆重鄴後以病去郎商為大司馬衛將軍除鄴主簿以為腹心舉侍御史哀帝即位遷為涼州刺史鄴居職寬舒少威嚴數年以病免是時帝祖母定陶傅太后稱皇太太后帝母丁姬稱帝太后而皇后即傅太后從弟子也傅氏侯者三人丁氏侯者二人又封傅太后同母弟子鄭業為陽信侯傅太后尤與政專權元壽元年正月朔上以皇后父孔鄉侯傅晏為大司馬衛將軍而帝舅陽安侯丁明為大司馬票騎將軍臨拜日食詔舉方正直言扶陽侯韋育舉鄴方正鄴對曰臣聞禽息憂國碎首不恨卞和獻寶刖足願之臣幸得奉直言之詔無二者之危敢不極陳臣聞陽尊陰卑卑者隨尊尊者兼卑天之道也是以男雖賤各為其家陽女雖貴猶為其國陰故禮明三從之義雖有文母之德必繫於子春秋不書紀侯之母陰義殺也昔鄭伯隨姜氏之欲終有叔段篡國之禍周襄王內迫惠后之難而遭居鄭之危漢興呂太后權私親屬又以外孫為孝惠后是時繼嗣不明凡事多暗晝昏冬雷之變不可勝載竊見陛下行不偏之政每事約儉非禮不動誠欲正身與天下更始也然嘉瑞未應而日食地震民訛言行籌傳相驚恐案春秋災異以指象為言語故在於得一類而達之也日食明陽為陰所臨坤卦乘離明夷之象也坤以法地為土為母以安靜為德震不陰之效也占象甚明臣敢不直言其事昔曾子問從令之義孔子曰是何言與善閔子騫守禮不苟從親所行無非理者故無可間也前大司馬新都侯莽退伏弟家以詔策決復遣就國高昌侯宏去蕃自絶猶受封土制書侍中駙馬都尉遷不忠巧佞免歸故郡間未旬月則有詔還大臣奏正其罰卒不得遣而反兼官奉使顯寵過故及陽信侯業皆緣私君國非功義所止諸外家昆弟無賢不肖並侍帷幄布在列位或典兵衛或將軍屯寵意并於一家積貴之勢世所希見所希聞也至乃并置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此當拜之日暗然日食不在前後臨事而發者明陛下謙遜無專承指非一所言輒聽所欲輒隨有罪惡者不坐辜罰無功能者畢受官爵流漸積猥正尤在是欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之逮身所行不自鏡見則以為可計之過者疏賤獨偏見疑內亦有此類天變不空保右世主如此之至奈何不應臣聞野雞著怪高宗深動大風暴過成王怛然願陛下加致精誠思承始初事稽諸古以厭下心則黎庶群生無不說喜上帝百神收還威怒禎祥福祿何嫌不報鄴未拜病卒鄴言民訛言行籌及谷永言王者買私田彗星隕石牡飛之占語在五行志初鄴從張吉學吉子竦又幼孤從鄴學問亦著於世尤長小學鄴子林清靜好古亦有雅材建武中歷位列卿至大司空其正文字過於鄴竦故世言小學者由杜公贊曰孝成之世委政外家諸舅持權重於丁傅在孝哀時故杜鄴敢譏丁傅而欽永不敢言王氏其勢然也及欽欲挹損鳳權而鄴附會音商永陳三七之戒斯為忠焉至其引申伯以阿鳳隙平阿於車騎指金火以求合可謂諒不足而談有餘者孔子稱友多聞三人近之矣
