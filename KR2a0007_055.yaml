body:
  text: 司馬遷傳第三十二昔在顓頊命南正重司天火正黎司地唐虞之際紹重黎之後使復典之至于夏商故重黎氏世序天地其在周程伯休甫其後也當宣王時官失其守而為司馬氏司馬氏世典周史惠襄之間司馬氏適晉晉中軍隨會犇魏而司馬氏入少梁自司馬氏去周適晉分散或在衛或在趙或在秦其在衛者相中山在趙者以傳劍論顯蒯聵其後也在秦者錯與張儀爭論於是惠王使錯將兵伐蜀遂拔因而守之錯孫蘄事武安君白起而少梁更名夏陽蘄與武安君阬趙長平軍還而與之俱賜死杜郵葬於華池蘄孫昌為秦王鐵官當始皇之時蒯聵玄孫卬為武信君將而徇朝歌諸侯之相王王卬於殷漢之伐楚卬歸漢以其地為河內郡昌生毋懌毋懌為漢市長毋懌生喜喜為五大夫卒皆葬高門喜生談談為太史公太史公學天官於唐都受易於楊何習道論於黃子太史公仕於建元元封之間愍學者不達其意而師誖乃論六家之要指曰易大傳曰天下一致而百慮同歸而殊塗夫陰陽儒墨名法道德此務為治者也直所從言之異路有省不省耳嘗竊觀陰陽之術大詳而眾忌諱使人拘而多畏然其序四時之大順不可失也儒者博而寡要勞而少功是以其事難盡從然其敘君臣父子之禮列夫婦長幼之別不可易也墨者儉而難遵是以其事不可徧循然其彊本節用不可廢也法家嚴而少恩然其正君臣上下之分不可改也名家使人儉而善失真然其正名實不可不察也道家使人精神專一動合無形澹足萬物其為術也因陰陽之大順采儒墨之善撮名法之要與時遷徙應物變化立俗施事無所不宜指約而易操事少而功多儒者則不然以為人主天下之儀表也君唱臣和主先臣隨如此則主勞而臣佚至於大道之要去健羡黜聰明釋此而任術夫神大用則竭形大勞則敝神形蚤衰欲與天地長久非所聞也夫陰陽四時八位十二度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏夫春生夏長秋收冬臧此天道之大經也弗順則無以為天下紀綱故曰四時之大順不可失也夫儒者以六藝為法六藝經傳以千萬數累世不能通其學當年不能究其禮故曰博而寡要勞而少功若夫列君臣父子之禮序夫婦長幼之別雖百家弗能易也墨者亦上堯舜言其德行曰堂高三尺土階三等茅茨不翦採椽不斲飯土簋歠土刑䊪粱之食藜藿之羹夏日葛衣冬日鹿裘其送死桐棺三寸舉音不盡其哀教喪禮必以此為萬民率故天下共若此則尊卑無別也夫世異時移事業不必同故曰儉而難遵也要曰彊本節用則人給家足之道也此墨子之所長雖百家不能廢也法家不別親疏不殊貴賤壹斷於法則親親尊尊之恩絕矣可以行一時之計而不可長用也故曰嚴而少恩若尊主卑臣明分職不得相踰越雖百家不能改也名家苛察繳繞使人不得反其意剸決於名時失人情故曰使人儉而善失真若夫控名責實參伍不失此不可不察也道家無為又曰無不為其實易行其辭難知其術以虛無為本以因循為用無成勢無常形故能究萬物之情不為物先後故能為萬物主有法無法因時為業有度無度因物興舍故曰聖人不巧時變是守虛者道之常也因者君之綱也群臣並至使各自明也其實中其聲者謂之端實不中其聲者謂之款款言不聽姦乃不生賢不肖自分白黑乃形在所欲用耳何事不成乃合大道混混冥冥光燿天下復反無名凡人所生者神也所託者形也神大用則竭形大勞則敝形神離則死死者不可復生離者不可復合故聖人重之由此觀之神者生之本形者生之具不先定其神形而曰我有以治天下何由哉太史公既掌天官不治民有子曰遷遷生龍門耕牧河山之陽年十歲則誦古文二十而南游江淮上會稽深禹穴窺九疑浮沅湘北涉汶泗講業齊魯之都觀夫子遺風鄉射鄒嶧阸困蕃薛彭城過梁楚以歸於是遷仕為郎中奉使西征巴蜀以南略邛筰昆明還報命是歲天子始建漢家之封而太史公留滯周南不得與從事發憤且卒而子遷適反見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絕於予乎汝復為太史則續吾祖矣今天子接千歲之統封泰山而予不得從行是命也夫命也夫予死爾必為太史為太史毋忘吾所欲論著矣且夫孝始於事親中於事君終於立身揚名於後世以顯父母此孝之大也夫天下稱周公言其能論歌文武之德宣周召之風達大王王季思慮爰及公劉以尊后稷也幽厲之後王道缺禮樂衰孔子脩舊起廢論詩書作春秋則學者至今則之自獲麟以來四百有餘歲而諸侯相兼史記放絕今漢興海內壹統明主賢君忠臣義士予為太史而不論載廢天下之文予甚懼焉爾其念哉遷俯首流涕曰小子不敏請悉論先人所次舊聞不敢闕卒三歲而遷為太史令紬史記石室金鐀之書五年而當太初元年十一月甲子朔旦冬至天曆始改建於明堂諸神受記大史公曰先人有言自周公卒五百歲而有孔子孔子至於今五百歲有能紹而明之正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢攘焉上大夫壺遂曰昔孔子為何作春秋哉太史公曰余聞之董生周道廢孔子為魯司寇諸侯害之大夫壅之孔子知時之不用道之不行也是非二百四十二年之中以為天下儀表貶諸侯討大夫以達王事而已矣子曰我欲載之空言不如見之於行事之深切著明也春秋上明三王之道下辨人事之經紀別嫌疑明是非定猶與善善惡惡賢賢賤不肖存亡國繼絕世補弊起廢王道之大者也易著天地陰陽四時五行故長於變禮綱紀人倫故長於行書記先王之事故長於政詩記山川谿谷禽獸草木牝牡雌雄故長於風樂樂所以立故長於和春秋辯是非故長於治人是故禮以節人樂以發和書以道事詩以達意易以道化春秋以道義撥亂世反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弒君三十六亡國五十二諸侯奔走不得保社稷者不可勝數察其所以皆失其本已故易曰差以豪氂謬以千里故臣弒君子弒父非一朝一夕之故其漸久矣有國者不可以不知春秋前有讒而不見後有賊而不知為人臣者不可以不知春秋守經事而不知其宜遭變事而不知其權為人君父者而不通於春秋之義者必蒙首惡之名為人臣子不通於春秋之義者必陷篡弒誅死之罪其實皆以善為之而不知其義被之空言不敢辭夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下大過予之受而不敢辭故春秋者禮義之大宗也夫禮禁未然之前法施已然之後法之所為用者易見而禮之所為禁者難知壺遂曰孔子之時上無明君下不得任用故作春秋垂空文以斷禮義當一王之法今夫子上遇明天子下得守職萬事既具咸各序其宜夫子所論欲以何明太史公曰唯唯否否不然余聞之先人曰虙戲至純厚作易八卦堯舜之盛尚書載之禮樂作焉湯武之隆詩人歌之春秋采善貶惡推三代之德襃周室非獨刺譏而已也漢興已來至明天子獲符瑞封禪改正朔易服色受命於穆清澤流罔極海外殊俗重譯款塞請來獻見者不可勝道臣下百官力誦聖德猶不能宣盡其意且士賢能矣而不用有國者恥也主上明聖德不布聞有司之過也且余掌其官廢明聖盛德不載滅功臣賢大夫之業不述墮先人所言罪莫大焉余所謂述故事整齊其世傳非所謂作也而君比之春秋謬矣於是論次其文十年而遭李陵之禍幽於纍紲乃喟然而歎曰是余之辠夫身虧不用矣退而深惟曰夫詩書隱約者欲遂其志之思也卒述陶唐以來至於麟止自黃帝始五帝本紀第一夏本紀第二殷本紀第三周本紀第四秦本紀第五始皇本紀第六項羽本紀第七高祖本紀第八呂后本紀第九孝文本紀第十孝景本紀第十一今上本紀第十二三代世表第一十二諸侯年表第二六國年表第三秦楚之際月表第四漢諸侯年表第五高祖功臣年表第六惠景間功臣年表第七建元以來侯者年表第八王子侯者年表第九漢興以來將相名臣年表第十禮書第一樂書第二律書第三曆書第四天官書第五封禪書第六河渠書第七平準書第八吳太伯世家第一齊太公世家第二魯周公世家第三燕召公世家第四管蔡世家第五陳𣏌世家第六衛康叔世家第七宋微子世家第八晉世家第九楚世家第十越世家第十一鄭世家第十二趙世家第十三魏世家第十四韓世家第十五田完世家第十六孔子世家第十七陳涉世家第十八外戚世家第十九楚元王世家第二十荊燕王世家第二十一齊悼惠王世家第二十二蕭相國世家第二十三曹相國世家第二十四留侯世家第二十五陳丞相世家第二十六絳侯世家第二十七梁孝王世家第二十八五宗世家第二十九三王世家第三十伯夷列傳第一管晏列傳第二老子韓非列傳第三司馬穰苴列傳第四孫子吳起列傳第五伍子胥列傳第六仲尼弟子列傳第七商君列傳第八蘇秦列傳第九張儀列傳第十樗里甘茂列傳第十一穰侯列傳第十二白起王翦列傳第十三孟子荀卿列傳第十四平原虞卿列傳第十五孟嘗君列傳第十六魏公子列傳第十七春申君列傳第十八范睢蔡澤列傳第十九樂毅列傳第二十廉頗藺相如列傳第二十一田單列傳第二十二魯仲連列傳第二十三屈原賈生列傳第二十四呂不韋列傳第二十五刺客列傳第二十六李斯列傳第二十七蒙恬列傳第二十八張耳陳餘列傳第二十九魏豹彭越列傳第三十黥布列傳第三十一淮陰侯韓信列傳第三十二韓王信盧綰列傳第三十三田儋列傳第三十四樊酈滕灌列傳第三十五張丞相倉列傳第三十六酈生陸賈列傳第三十七傅靳䣙成侯列傳第三十八劉敬叔孫通列傳第三十九季布欒布列傳第四十爰盎朝錯列傳第四十一張釋之馮唐列傳第四十二萬石張叔列傳第四十三田叔列傳第四十四扁鵲倉公列傳第四十五吳王濞列傳第四十六魏其武安列傳第四十七韓長孺列傳第四十八李將軍列傳第四十九衛將軍驃騎列傳第五十平津主父列傳第五十一匈奴列傳第五十二南越列傳第五十三閩越列傳第五十四朝鮮列傳第五十五西南夷列傳第五十六司馬相如列傳第五十七淮南衡山列傳第五十八循吏列傳第五十九汲鄭列傳第六十儒林列傳第六十一酷吏列傳第六十二大宛列傳第六十三游俠列傳第六十四佞幸列傳第六十五滑稽列傳第六十六日者列傳第六十七龜策列傳第六十八貨殖列傳第六十九惟漢繼五帝末流接三代絕業周道既廢秦撥去古文焚滅詩書故明堂石室金鐀玉版圖籍散亂漢興蕭何次律令韓信申軍法張蒼為章程叔孫通定禮儀則文學彬彬稍進詩書往往間出自曹參薦蓋公言黃老而賈誼朝錯明申韓公孫弘以儒顯百年之間天下遺文古事靡不畢集太史公仍父子相繼籑其職曰於戲余維先人嘗掌斯事顯於唐虞至於周復典之故司馬氏世主天官至於余乎欽念哉罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事略三代錄秦漢上記軒轅下至於茲著十二本紀既科條之矣並時異世年差不明作十表禮樂損益律曆改易兵權山川鬼神天人之際承敝通變作八書二十八宿環北辰三十輻共一轂運行無窮輔弼股肱之臣配焉忠信行道以奉主上作三十世家扶義俶儻不令己失時立功名於天下作七十列傳凡百三十篇五十二萬六千五百字為太史公書序略以拾遺補蓺成一家言協六經異傳齊百家雜語臧之名山副在京師以竢後聖君子第七十遷之自敘云爾而十篇缺有錄無書遷既被刑之後為中書令尊寵任職故人益州刺史任安予遷書責以古賢臣之義遷報之曰少卿足下曩者辱賜書教以慎於接物推賢進士為務意氣勤勤懇懇若望僕不相師用而流俗人之言僕非敢如是也雖罷駑亦嘗側聞長者遺風矣顧自以為身殘處穢動而見尤欲益反損是以抑鬱而無誰語諺曰誰為為之孰令聽之蓋鍾子期死伯牙終身不復鼓琴何則士為知己用女為說己容若僕大質已虧缺雖材懷隨和行若由夷終不可以為榮適足以發笑而自點耳書辭宜答會東從上來又迫賤事相見日淺卒卒無須臾之間得竭指意今少卿抱不測之罪涉旬月迫季冬僕又薄從上上雍恐卒然不可諱是僕終已不得舒憤懣以曉左右則長逝者魂魄私恨無窮請略陳固陋闕然不報幸勿過僕聞之修身者智之府也愛施者仁之端也取予者義之符也恥辱者勇之決也立名者行之極也士有此五者然後可以託於世列於君子之林矣故禍莫憯於欲利悲莫痛於傷心行莫醜於辱先而詬莫大於宮刑刑餘之人無所比數非一世也所從來遠矣昔衛靈公與雍渠載孔子適陳商鞅因景監見趙良寒心同子參乘爰絲變色自古而恥之夫中材之人事關於宦豎莫不傷氣況忼慨之士乎如今朝雖乏人柰何令刀鋸之餘薦天下豪雋哉僕賴先人緒業得待罪輦轂下二十餘年矣所以自惟上之不能納忠效信有奇策材力之譽自結明主次之又不能拾遺補闕招賢進能顯巖穴之士外之不能備行伍攻城野戰有斬將搴旗之功下之不能累日積勞取尊官厚祿以為宗族交遊光寵四者無一遂苟合取容無所短長之效可見於此矣鄉者僕亦嘗廁下大夫之列陪外廷末議不以此時引維綱盡思慮今已虧形為埽除之隸在闒茸之中乃欲卬首信眉論列是非不亦輕朝廷羞當世之士邪嗟乎嗟乎如僕尚何言哉尚何言哉且事本末未易明也僕少負不羈之才長無鄉曲之譽主上幸以先人之故使得奉薄技出入周衛之中僕以為戴盆何以望天故絕賓客之知忘室家之業日夜思竭其不肖之材力務壹心營職以求親媚於主上而事乃有大謬不然者夫僕與李陵俱居門下素非相善也趣舍異路未嘗銜盃酒接殷勤之歡然僕觀其為人自奇士事親孝與士信臨財廉取予義分別有讓恭儉下人常思奮不顧身以徇國家之急其素所畜積也僕以為有國士之風夫人臣出萬死不顧一生之計赴公家之難斯已奇矣今舉事壹不當而全軀保妻子之臣隨而媒孽其短僕誠私心痛之且李陵提步卒不滿五千深踐戎馬之地足歷王庭垂餌虎口橫挑彊胡卬億萬之師與單于連戰十餘日所殺過當虜救死扶傷不給旃裘之君長咸震怖乃悉徵左右賢王舉引弓之民一國共攻而圍之轉鬭千里矢盡道窮救兵不至士卒死傷如積然李陵一呼勞軍士無不起躬流涕沬血飲泣張空弮冒白刃北首爭死敵陵未沒時使有來報漢公卿王侯皆奉觴上壽後數日陵敗書聞主上為之食不甘味聽朝不怡大臣憂懼不知所出僕竊不自料其卑賤見主上慘悽怛悼誠欲效其款款之愚以為李陵素與士大夫絕甘分少能得人之死力雖古名將不過也身雖陷敗彼觀其意且欲得其當而報漢事已無可柰何其所摧敗功亦足以暴於天下僕懷欲陳之而未有路適會召問即以此指推言陵功欲以廣主上之意塞睚眥之辭未能盡明明主不深曉以為僕沮貳師而為李陵游說遂下於理拳拳之忠終不能自列因為誣上卒從吏議家貧財賂不足以自贖交遊莫救左右親近不為壹言身非木石獨與法吏為伍深幽囹圄之中誰可告愬者此正少卿所親見僕行事豈不然邪李陵既生降隤其家聲而僕又茸以蠶室重為天下觀笑悲夫悲夫事未易一二為俗人言也僕之先人非有剖符丹書之功文史星曆近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也假令僕伏法受誅若九牛亡一毛與螻螘何異而世又不與能死節者比特以為智窮罪極不能自免卒就死耳何也素所自樹立使然人固有一死死有重於泰山或輕於鴻毛用之所趨異也太上不辱先其次不辱身其次不辱理色其次不辱辭令其次詘體受辱其次易服受辱其次關木索被箠楚受辱其次鬄毛髮嬰金鐵受辱其次毀肌膚斷支體受辱最下腐刑極矣傳曰刑不上大夫此言士節不可不厲也猛虎處深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也故士有畫地為牢勢不入削木為吏議不對定計於鮮也今交手足受木索暴肌膚受榜箠幽於圜牆之中當此之時見獄吏則頭槍地視徒隸則心惕息何者積威約之勢也及已至此言不辱者所謂彊顏耳曷足貴乎且西伯伯也拘牖里李斯相也具五刑淮陰王也受械於陳彭越張敖南鄉稱孤繫獄具罪絳侯誅諸呂權傾五伯囚於請室魏其大將也衣赭關三木季布為朱家鉗奴灌夫受辱居室此人皆身至王侯將相聲聞鄰國及罪至罔加不能引決自財在塵埃之中古今一體安在其不辱也由此言之勇怯勢也彊弱形也審矣曷足怪乎且人不能蚤自財繩墨之外已稍陵夷至於鞭箠之間乃欲引節斯不亦遠乎古人所以重施刑於大夫者殆為此也夫人情莫不貪生惡死念親戚顧妻子至激於義理者不然乃有不得已也今僕不幸蚤失二親無兄弟之親獨身孤立少卿視僕於妻子何如哉且勇者不必死節怯夫慕義何處不勉焉僕雖怯耎欲苟活亦頗識去就之分矣何至自湛溺累紲之辱哉且夫臧獲婢妾猶能引決況若僕之不得已乎所以隱忍苟活函糞土之中而不辭者恨私心有所不盡鄙沒世而文采不表於後也古者富貴而名摩滅不可勝記唯俶儻非常之人稱焉蓋西伯拘而演周易仲尼戹而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子髕腳兵法修列不韋遷蜀世傳呂覽韓非囚秦說難孤憤詩三百篇大氐賢聖發憤之所為作也此人皆意有所鬱結不得通其道故述往事思來者及如左丘明無目孫子斷足終不可用退論書策以舒其憤思垂空文以自見僕竊不遜近自託於無能之辭網羅天下放失舊聞考之行事稽其成敗興壞之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就適會此禍惜其不成是以就極刑而無慍色僕誠已著此書藏之名山傳之其人通邑大都則僕償前辱之責雖萬被戮豈有悔哉然此可為智者道難為俗人言也且負下未易居下流多謗議僕以口語遇遭此禍重為鄉黨戮笑汙辱先人亦何面目復上父母之丘墓乎雖累百世垢彌甚耳是以腸一日而九回居則忽忽若有所亡出則不知所如往每念斯恥汗未嘗不發背霑衣也身直為閨閤之臣寧得自引深臧於巖穴邪故且從俗浮湛與時俯仰以通其狂惑今少卿乃教以推賢進士無乃與僕之私指謬乎今雖欲自彫瑑曼辭以自解無益於俗不信祇取辱耳要之死日然後是非乃定書不能盡意故略陳固陋遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉至王莽時求封遷後為史通子贊曰自古書契之作而有史官其載籍博矣至孔氏籑之上斷唐堯下訖秦繆唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也及孔子因魯史記而作春秋而左丘明論輯其本事以為之傳又籑異同為國語又有世本錄黃帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國並爭秦兼諸侯有戰國策漢興伐秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖于天漢其言秦漢詳矣至於采經摭傳分散數家之事甚多疏略或有抵梧亦其涉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗繆於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞賤貧此其所蔽也然自劉向揚雄博極群書皆稱遷有良中之材服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實錄烏呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉
