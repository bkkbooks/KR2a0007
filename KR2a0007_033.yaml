body:
  text: 樊酈滕灌傅靳周傳第十一樊噲沛人也以屠狗為事後與高祖俱隱於芒碭山澤間陳勝初起蕭何曹參使噲求迎高祖立為沛公噲以舍人從攻胡陵方與還守豐擊泗水監豐下破之復東定沛破泗水守薛西與司馬𡰥戰碭東卻敵斬首十五級賜爵國大夫常從沛公擊章邯軍濮陽攻城先登斬首二十三級賜爵列大夫從攻城陽先登下戶牖破李由軍斬首十六級賜上聞爵後攻圉都尉東郡守尉於成武卻敵斬首十四級捕虜十六人賜爵五大夫從攻秦軍出亳南河間守軍於杠里破之擊破趙賁軍開封北以卻敵先登斬候一人首六十八級捕虜二十六人賜爵卿從攻破揚熊於曲遇攻宛陵先登斬首八級捕虜四十四人賜爵封號賢成君從攻長社轘轅絕河津東攻秦軍尸鄉南攻秦軍於犨破南陽守齮於陽城東攻宛城先登西至酈以卻敵斬首十四級捕虜四十人賜重封攻武關至霸上斬都尉一人首十級捕虜百四十六人降卒二千九百人項羽在戲下欲攻沛公沛公從百餘騎因項伯面見項羽謝無有閉關事項羽既饗軍士中酒亞父謀欲殺沛公令項莊拔劍舞坐中欲擊沛公項伯常屏蔽之時獨沛公與張良得入坐樊噲居營外聞事急乃持盾入初入營營衛止噲噲直撞入立帳下項羽目之問為誰張良曰沛公參乘樊噲也項羽曰壯士賜之卮酒彘肩噲既飲酒拔劍切肉食之項羽曰能復飲乎噲曰臣死且不辭豈特卮酒乎且沛公先入定咸陽暴師霸上以待大王大王今日至聽小人之言與沛公有隙臣恐天下解心疑大王也項羽默然沛公如廁麾噲去既出沛公留車騎獨騎馬噲等四人步從從山下走歸霸上軍而使張良謝項羽羽亦因遂已無誅沛公之心是日微樊噲奔入營譙讓項羽沛公幾殆後數日項羽入屠咸陽立沛公為漢王漢王賜噲爵為列侯號臨武侯遷為郎中從入漢中還定三秦別擊西丞白水北雍輕車騎雍南破之從攻雍斄城先登擊章平軍好畤攻城先登陷陣斬縣令丞各一人首十一級虜二十人遷為郎中騎將從擊秦車騎壤東卻敵遷為將軍攻趙賁下郿槐里柳中咸陽灌廢丘最至櫟陽賜食邑杜之樊鄉從攻項籍屠煮棗擊破王武程處軍於外黃攻鄒魯瑕丘薛項羽敗漢王於彭城盡復取魯梁地噲還至滎陽益食平陰二千戶以將軍守廣武一歲項羽引東從高祖擊項籍下陽夏虜楚周將軍卒四千人圍項籍陳大破之屠胡陵項籍死漢王即皇帝位以噲有功益食邑八百戶其秋燕王臧荼反噲從攻虜荼定燕地楚王韓信反噲從至陳取信定楚更賜爵列侯與剖符世世勿絕食舞陽號為舞陽侯除前所食以將軍從攻反者韓王信於代自霍人以往至雲中與絳侯等共定之益食千五百戶因擊陳豨與曼丘臣軍戰襄國破柏人先登降定清河常山凡二十七縣殘東垣遷為左丞相破得綦母卬尹潘軍於無終廣昌破豨別將胡人王黃軍代南因擊韓信軍參合軍所將卒斬韓信擊豨胡騎橫谷斬將軍趙既虜代丞相馮梁守孫奮大將王黃將軍一人太僕解福等十人與諸將共定代鄉邑七十三後燕王盧綰反噲以相國擊綰破其丞相抵薊南定燕縣十八鄉邑五十一益食千三百戶定食舞陽五千四百戶從斬首百七十六級虜二百八十七人別破軍七下城五定郡六縣五十二得丞相一人將軍十三人二千石以下至三百石十二人噲以呂后弟呂須為婦生子伉故其比諸將最親先黥布反時高帝嘗病惡見人臥禁中詔戶者無得入群臣群臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者臥噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絕乎且陛下獨不見趙高之事乎高帝笑而起其後盧綰反高帝使噲以相國擊燕是時高帝病甚人有惡噲黨於呂氏即上一日宮車晏駕則噲欲以兵盡誅戚氏趙王如意之屬高帝大怒乃使陳平載絳侯代將而即軍中斬噲陳平畏呂后執噲詣長安至則高帝已崩呂后釋噲得復爵邑孝惠六年噲薨諡曰武侯子伉嗣而伉母呂須亦為臨光侯高后時用事顓權大臣盡畏之高后崩大臣誅呂須等因誅伉舞陽侯中絕數月孝文帝立乃復封噲庶子巿人為侯復故邑薨諡曰荒侯子佗廣嗣六歲其舍人上書言荒侯巿人病不能為人令其夫人與其弟亂而生佗廣佗廣實非荒侯子下吏免平帝元始二年繼絕世封噲玄孫之子章為舞陽侯邑千戶酈商高陽人也陳勝起商聚少年得數千人沛公略地六月餘商以所將四千人屬沛公於岐從攻長社先登賜爵封信成君從攻緱氏絕河津破秦軍雒陽東從下宛穰定十七縣別將攻旬關西定漢中沛公為漢王賜商爵信成君以將軍為隴西都尉別定北地郡破章邯別將於烏氏栒邑泥陽賜食邑武城六千戶從擊項籍軍與鍾離眜戰受梁相國印益食四千戶從擊項羽二歲攻胡陵漢王即帝位燕王臧荼反商以將軍從擊荼戰龍脫先登陷陣破荼軍易下卻敵遷為右丞相賜爵列侯與剖符世世勿絕食邑涿郡五千戶別定上谷因攻代受趙相國印與絳侯等定代郡鴈門得代丞相程縱守相郭同將軍以下至六百石十九人還以將軍將太上皇衛一歲十月以右丞相擊陳豨殘東垣又從擊黥布攻其前垣陷兩陳得以破布軍更封為曲周侯食邑五千一百戶除前所食凡別破軍三降定郡六縣七十三得丞相守相大將各一人小將二人二千石以下至六百石十九人商事孝惠帝呂后呂后崩商疾不治事其子寄字況與呂祿善及高后崩大臣欲誅諸呂呂祿為將軍軍於北軍太尉勃不得入北軍於是乃使人劫商令其子寄紿呂祿呂祿信之與出游而太尉勃乃得入據北軍遂以誅諸呂商是歲薨諡曰景侯子寄嗣天下稱酈況賣友孝景時吳楚齊趙反上以寄為將軍圍趙城七月不能下欒布自平齊來乃滅趙孝景中二年寄欲取平原君為夫人景帝怒下寄吏免上乃封商它子堅為繆侯奉商後傳至玄孫終根武帝時為太常坐巫蠱誅國除元始中賜高祖時功臣自酈商以下子孫爵皆關內侯食邑凡百餘人夏侯嬰沛人也為沛廄司御每送使客還過泗上亭與高祖語未嘗不移日也嬰已而試補縣吏與高祖相愛高祖戲而傷嬰人有告高祖高祖時為亭長重坐傷人告故不傷嬰嬰證之移獄覆嬰坐高祖繫歲餘掠笞數百終脫高祖高祖之初與徒屬欲攻沛也嬰時以縣令史為高祖使上降沛一日高祖為沛公賜爵七大夫以嬰為太僕常奉車從攻胡陵嬰與蕭何降泗水監平平以胡陵降賜嬰爵五大夫從擊秦軍碭東攻濟陽下戶牖破李由軍雍丘以兵車趣攻戰疾破之賜爵執帛從擊章邯軍東阿濮陽下以兵車趣攻戰疾破之賜爵執圭從擊趙賁軍開封楊熊軍曲遇嬰從捕虜六十八人降卒八百五十人得印一匱又擊秦軍雒陽東以兵車趣攻戰疾賜爵封轉為滕令因奉車從攻定南陽戰於藍田芷陽至霸上沛公為漢王賜嬰爵列侯號昭平侯復為太僕從入蜀漢還定三秦從擊項籍至彭城項羽大破漢軍漢王不利馳去見孝惠魯元載之漢王急馬罷虜在後常蹳兩兒棄之嬰常收載行面雍樹馳漢王怒欲斬嬰者十餘卒得脫而致孝惠魯元於豐漢王既至滎陽收散兵復振賜嬰食邑沂陽擊項籍下邑追至陳卒定楚至魯益食茲氏漢王即帝位燕王臧荼反嬰從擊荼明年從至陳取楚王信更食汝陰剖符世世勿絕從擊代至武泉雲中益食千戶因從擊韓信軍胡騎晉陽旁大破之追北至平城為胡所圍七日不得通高帝使使厚遺閼氏冒頓乃開其圍一角高帝出欲馳嬰固徐行弩皆持滿外鄉卒以得脫益食嬰細陽千戶從擊胡騎句注北大破之擊胡騎平城南三陷陳功為多賜所奪邑五百戶從擊陳豨黥布軍陷陳卻敵益千戶定食汝陰六千九百戶除前所食嬰自上初起沛常為太僕從竟高祖崩以太僕事惠帝惠帝及高后德嬰之脫孝惠魯元於下邑間也乃賜嬰北第第一曰近我以尊異之惠帝崩以太僕事高后高后崩代王之來嬰以太僕與東牟侯入清宮廢少帝以天子法駕迎代王代邸與大臣共立文帝復為太僕八歲薨諡曰文侯傳至曾孫頗尚平陽公主坐與父御婢姦自殺國除初嬰為滕令奉車故號滕公及曾孫頗尚主主隨外家姓號孫公主故滕公子孫更為孫氏灌嬰睢陽販繒者也高祖為沛公略地至雍丘章邯殺項梁而沛公還軍於碭嬰以中涓從擊破東郡尉於成武及秦軍於杠里疾鬭賜爵七大夫又從攻秦軍亳南開封曲遇戰疾力賜爵執帛號宣陵君從攻陽武以西至雒陽破秦軍尸北北絕河津南破南陽守齮陽城東遂定南陽郡西入武關戰於藍田疾力至霸上賜爵執圭號昌文君沛公為漢王拜嬰為郎中從入漢中十月拜為中謁者從還定三秦下櫟陽降塞王還圍章邯廢丘未拔從東出臨晉關擊降殷王定其地擊項羽將龍且魏相項佗軍定陶南疾戰破之賜嬰爵列侯號昌文侯食杜平鄉復以中謁者從降下碭以北至彭城項羽擊破漢王漢王遁而西嬰從還軍於雍丘王武魏公申徒反從擊破之攻下外黃西收軍於滎陽楚騎來眾漢王乃擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲習騎兵今為校尉可為騎將漢王欲拜之必甲曰臣故秦民恐軍不信臣臣願得大王左右善騎者傅之嬰雖少然數力戰乃拜嬰為中大夫令李必駱甲為左右校尉將郎中騎兵擊楚騎於滎陽東大破之受詔別擊楚軍後絕其饟道起陽武至襄邑擊項羽之將項冠於魯下破之所將卒斬右司馬騎將各一人擊破柘公王武軍燕西所將卒斬樓煩將五人連尹一人擊王武別將桓嬰白馬下破之所將卒斬都尉一人以騎度河南送漢王到雒陽從北迎相國韓信軍於邯鄲還至敖倉嬰遷為御史大夫三年以列侯食邑杜平鄉受詔將郎中騎兵東屬相國韓信擊破齊軍於歷下所將卒虜車騎將華毋傷及吏四十六人降下臨淄得相田光追齊相田橫至嬴博擊破其騎所將卒斬騎將一人生得騎將四人攻下嬴博破齊將軍田吸於千乘斬之東從韓信攻龍且留公於假密卒斬龍且生得右司馬連尹各一人樓煩將十人身生得亞將周蘭齊地已定韓信自立為齊王使嬰別將擊楚將公杲於魯北破之轉南破薛郡長身虜騎將一人攻傅陽前至下相以東南僮取慮徐度淮盡降其城邑至廣陵項羽使項聲薛公郯公復定淮北嬰度淮擊破項聲郯公下邳斬薛公下下邳壽春擊破楚騎平陽遂降彭城虜柱國項佗降留薛沛酇蕭相攻苦譙復得亞將與漢王會頤鄉從擊項籍軍陳下破之所將卒斬樓煩將二人虜將八人賜益食邑二千五百戶項籍敗垓下去也嬰以御史大夫將車騎別追項籍至東城破之所將卒五人共斬項籍皆賜爵列侯降左右司馬各一人卒萬二千人盡得其軍將吏下東城歷陽度江破吳郡長吳下得吳守遂定吳豫章會稽郡還定淮北凡五十二縣漢王即帝位賜益嬰邑三千戶以車騎將軍從擊燕王荼明年從至陳取楚王信還剖符世世勿絕食潁陰二千五百戶從擊韓王信於代至馬邑別降樓煩以北六縣斬代左將破胡騎將於武泉北復從擊信胡騎晉陽下所將卒斬胡白題將一人又受詔并將燕趙齊梁楚車騎擊破胡騎於硰石至平城為胡所困從擊陳豨別攻豨丞相侯敞軍曲逆下破之卒斬敞及特將五人降曲逆盧奴上曲陽安國安平攻下東垣黥布反以車騎將軍先出攻布別將於相破之斬亞將樓煩將三人又進擊破布上柱國及大司馬軍又進破布別將肥銖嬰身生得左司馬一人所將卒斬其小將十人追北至淮上益食邑二千五百戶布已破高帝歸定令嬰食潁陰五千戶除前所食邑凡從所得二千石二人別破軍十六降城四十六定國一郡二縣五十二得將軍二人柱國相各一人二千石十人嬰自破布歸高帝崩以列侯事惠帝及呂后呂后崩呂祿等欲為亂齊哀王聞之舉兵西呂祿等以嬰為大將軍往擊之嬰至滎陽乃與絳侯等謀因屯兵滎陽風齊王以誅呂氏事齊兵止不前絳侯等既誅諸呂齊王罷兵歸嬰自滎陽還與絳侯陳平共立文帝於是益封嬰三千戶賜金千斤為太尉三歲絳侯勃免相嬰為丞相罷太尉官是歲匈奴大入北地上令丞相嬰將騎八萬五千擊匈奴匈奴去濟北王反詔罷嬰兵後歲餘以丞相薨諡曰懿侯傳至孫彊有罪絕武帝復封嬰孫賢為臨汝侯奉嬰後後有罪國除傅寬以魏五大夫騎將從為舍人起橫陽從攻安陽杠里趙賁軍於開封及擊楊熊曲遇陽武斬首十二級賜爵卿從至霸上沛公為漢王賜寬封號共德君從入漢中為右騎將定三秦賜食邑雕陰從擊項籍待懷賜爵通德侯從擊項冠周蘭龍且所將卒斬騎將一人敖下益食邑屬淮陰擊破齊歷下軍擊田解屬相國參殘博益食邑因定齊地部符世世勿絕封陽陵侯二千六百戶除前所食為齊右丞相備齊五歲為齊相國四月擊陳豨屬太尉勃以相國代丞相噲擊豨一月徙為代相國將屯二歲為丞相將屯孝惠五年薨諡曰景侯傳至曾孫偃謀反誅國除靳歙以中涓從起宛朐攻濟陽破李由軍擊秦軍開封東斬騎千人將一人首五十七級捕虜七十三人賜爵封臨平君又戰藍田北斬車司馬二人騎長一人首二十八級捕虜五十七人至霸上沛公為漢王賜歙爵建武侯遷騎都尉從定三秦別西擊章平軍於隴西破之定隴西六縣所將卒斬車司馬候各四人騎長十二人從東擊楚至彭城漢軍敗還保雍丘擊反者王武等略梁地別西擊邢說軍菑南破之身得說都尉二人司馬候十二人降吏卒四千六百八十人破楚軍滎陽東食邑四千二百戶別之河內擊趙賁軍朝歌破之所將卒得騎將二人車馬二百五十匹從攻安陽以東至棘蒲下十縣別攻破趙軍得其將司馬二人候四人降吏卒二千四百人從降下邯鄲別下平陽身斬守相所將卒斬兵守郡一人降鄴從攻朝歌邯鄲又別擊破趙軍降邯鄲郡六縣還軍敖倉破項籍軍成皋南擊絕楚饟道起滎陽至襄邑破項冠魯下略地東至鄫郯下邳南至蘄竹邑擊項悍濟陽下還擊項籍軍陳下破之別定江陵降柱國大司馬以下八人身得江陵王致雒陽因定南郡從至陳取楚王信部符世世勿絕定食四千六百戶為信武侯以騎都尉從擊代攻韓信平城下還軍東垣有功遷為車騎將軍并將梁趙齊燕楚車騎別擊陳豨丞相敞破之因降曲逆從擊黥布有功益封定食邑五千三百戶凡斬首九十級虜百四十二人別破軍十四降城五十九定郡國各一縣二十三得王柱國各一人二千石以下至五百石三十九人高后五年薨諡曰肅侯子亭嗣有罪國除周緤沛人也以舍人從高祖起沛至霸上西入蜀漢還定三秦常為參乘賜食邑池陽從東擊項羽滎陽絕甬道從出度平陰遇韓信軍襄國戰有利不利終亡離上心上以緤為信武侯食邑三千三百戶上欲自擊陳豨緤泣曰始秦攻破天下未曾自行今上常自行是亡人可使者乎上以為愛我賜入殿門不趨十二年更封緤為䣙城侯孝文五年薨諡曰貞侯子昌嗣有罪國除景帝復封緤子應為鄲侯薨諡曰康侯子仲居嗣坐為太常有罪國除贊曰仲尼稱犁牛之子騂且角雖欲勿用山川其舍諸言士不繫於世類也語曰雖有茲基不如逄時信矣樊噲夏侯嬰灌嬰之徒方其鼓刀僕御販繒之時豈自知附驥之尾勒功帝籍慶流子孫哉當孝文時天下以酈寄為賣友夫賣友者謂見利而忘義也若寄父為功臣而又執劫雖摧呂祿以安社稷誼存君親可也
