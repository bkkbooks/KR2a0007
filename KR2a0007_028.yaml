body:
  text: 楚元王傳第六楚元王交字游高祖同父少弟也好書好材藝少時嘗與魯穆生白生申公俱受詩於浮丘伯伯者孫卿門人也及秦焚書各別去高祖兄弟四人長兄伯次仲伯蚤卒高祖既為沛公景駒自立為楚王高祖使仲與審食其留侍太上皇交與蕭曹等俱從高祖見景駒遇項梁共立楚懷王因西攻南陽入武關與秦戰於藍田至霸上封交為文信君從入蜀漢還定三秦誅項籍即帝位交與盧綰常侍上出入臥內傳言語諸內事隱謀而上從父兄劉賈數別將漢六年既廢楚王信分其地為二國立賈為荊王交為楚王王薛郡東海彭城三十六縣先有功也後封次兄仲為代王長子肥為齊王初高祖微時常避事時時與賓客過其丘嫂食嫂厭叔與客來陽為羹盡轑釜客以故去已而視釜中有羹繇是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為羹頡侯元王既至楚以穆生白生申公為中大夫高后時浮丘伯在長安元王遣子郢客與申公俱卒業文帝時聞申公為詩最精以為博士元王好詩諸子皆讀詩申公始為詩傳號魯詩元王亦次之詩傳號曰元王詩世或有之高后時以元王子郢客為宗正封上邳侯元王立二十三年薨太子辟非先卒文帝乃以宗正上邳侯郢客嗣是為夷王申公為博士失官隨郢客歸復以為中大夫立四年薨子戊嗣文帝尊寵元王子生爵比皇子景帝即位以親親封元王寵子五人子禮為平陸侯富為休侯歲為沈猶侯埶為宛朐侯調為棘樂侯初元王敬禮申公等穆生不耆酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市稱疾臥申公白生強起之曰獨不念先王之德與今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者為道之存故也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉遂謝病去申公白生獨留王戊稍淫暴二十年為薄太后服私姦削東海薛郡乃與吳通謀二人諫不聽胥靡之衣之赭衣使杵臼雅舂於市休侯使人諫王王曰季父不吾與我起先取季父矣休侯懼乃與母太夫人奔京師二十一年春景帝之三年也削書到遂應吳王反其相張尚太傅趙夷吾諫不聽遂殺尚夷吾起兵會吳西攻梁破棘壁至昌邑南與漢將周亞夫戰漢絕吳楚糧道士饑吳王走戊自殺軍遂降漢漢已平吳楚景帝乃立宗正平陸侯禮為楚王奉元王後是為文王四年薨子安王道嗣二十二年薨子襄王注嗣十四年薨子節王純嗣十六年薨子延壽嗣宣帝即位延壽以為廣陵王胥武帝子天子有變必得立陰欲附倚輔助之故為其后母弟趙何齊取廣陵王女為妻與何齊謀曰我與廣陵王相結天下不安發兵助之使廣陵王立何齊尚公主列侯可得也因使何齊奉書遺廣陵王曰願長耳目毋後人有天下何齊父長年上書告之事下有司考驗辭服延壽自殺立三十二年國除初休侯富既奔京師而王戊反富等皆坐免侯削屬籍後聞其數諫戊乃更封為紅侯太夫人與竇太后有親懲山東之寇求留京師詔許之富子辟彊等四人供養仕於朝太夫人薨賜塋葬靈戶富傳國至曾孫無子絕辟彊字少卿亦好讀詩能屬文武帝時以宗室子隨二千石論議冠諸宗室清靜少欲常以書自娛不肯仕昭帝即位或說大將軍霍光曰將軍不見諸呂之事乎處伊尹周公之位攝政擅權而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸呂道如是則可以免患光然之乃擇宗室可用者辟彊子德待詔丞相府年三十餘欲用之或言父見在亦先帝之所寵也遂拜辟彊為光祿大夫守長樂衛尉時年已八十矣徙為宗正數月卒德字路叔修黃老術有智略少時數言事召見甘泉宮武帝謂之千里駒昭帝初為宗正丞雜治劉澤詔獄父為宗正徙大鴻臚丞遷太中大夫後復為宗正雜案上官氏蓋主事德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏盛滿也蓋長公主孫譚遮德自言德數責以公主起居無狀侍御史以為光望不受女承指劾德誹謗詔獄免為庶人屏居山田光聞而恨之復白召德守青州刺史歲餘復為宗正與立宣帝以定策賜爵關內侯地節中以親親行謹厚封為陽城侯子安民為郎中右曹宗家以德得官宿衛者二十餘人德寬厚好施生每行京兆尹事多所平反罪人家產過百萬則以振昆弟賓客食飲曰富民之怨也立十一年子向坐鑄偽黃金當伏法德上書訟罪會薨大鴻臚奏德訟子罪失大臣體不宜賜諡置嗣制曰賜諡繆侯為置嗣傳至孫慶忌復為宗正太常薨子岑嗣為諸曹中郎將列校尉至太常薨傳子至王莽敗乃絕向字子政本名更生年十二以父德任為輦郎既冠以行修飭擢為諫大夫是時宣帝循武帝故事招選名儒俊材置左右更生以通達能屬文辭與王襃張子僑等並進對獻賦頌凡數十篇上復興神僊方術之事而淮南有枕中鴻寶苑秘書書言神僊使鬼物為金之術及鄒衍重道延命方世人莫見而更生父德武帝時治淮南獄得其書更生幼而讀誦以為奇獻之言黃金可成上令典尚方鑄作事費甚多方不驗上乃下更生吏吏劾更生鑄偽黃金繫當死更生兄陽城侯安民上書入國戶半贖更生罪上亦奇其材得踰冬減死論會初立穀梁春秋徵更生受穀梁講論五經於石渠復拜為郎中給事黃門遷散騎諫大夫給事中元帝初即位太傅蕭望之為前將軍少傅周堪為諸吏光祿大夫皆領尚書事甚見尊任更生年少於望之堪然二人重之薦更生宗室忠直明經有行擢為散騎宗正給事中與侍中金敞拾遺於左右四人同心輔政患苦外戚許史在位放縱而中書宦官弘恭石顯弄權望之堪更生議欲白罷退之未白而語泄遂為許史及恭顯所譖愬堪更生下獄及望之皆免官語在望之傳其春地震夏客星見昴卷舌間上感悟下詔賜望之爵關內侯奉朝請秋徵堪向欲以為諫大夫恭顯白皆為中郎冬地復震時恭顯許史子弟侍中諸曹皆側目於望之等更生懼焉乃使其外親上變事言竊聞故前將軍蕭望之等皆忠正無私欲致大治忤於貴戚尚書今道路人聞望之等復進以為且復見毀讒必曰嘗有過之臣不宜復用是大不然臣聞春秋地震為在位執政太盛也不為三獨夫動亦已明矣且往者高皇帝時季布有罪至於夷滅後赦以為將軍高后孝文之間卒為名臣孝武帝時兒寬有重罪繫按道侯韓說諫曰前吾丘壽王死陛下至今恨之今殺寬後將復大恨矣上感其言遂貰寬復用之位至御史大夫御史大夫未有及寬者也又董仲舒私為災異書主父偃取奏之下吏罪至不道幸蒙不誅復為太中大夫膠西相以老病免歸漢有所欲興常有詔問仲舒為世儒宗定議有益天下孝宣皇帝時夏侯勝坐誹謗擊獄三年免為庶人宣帝復用勝至長信少府太子太傅名敢直言天下美之若乃群臣多此比類難一二記有過之臣無負國家有益天下此四臣者足以觀矣前弘恭奏望之等獄決三月地大震恭移病出後復視事天陰雨雪由是言之地動殆為恭等臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋玄成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍高許史氏侍中者毀離親戚欲退去之而獨專權為臣不忠幸不伏誅復蒙恩徵用不悔前過而教令人言變事誣罔不道更生坐免為庶人而望之亦坐使子上書自冤前事恭顯白令詣獄置對望之自殺天子甚悼恨之乃擢周堪為光祿勳堪弟子張猛光祿大夫給事中大見信任恭顯憚之數譖毀焉更生見堪猛在位幾己得復進懼其傾危乃上封事諫曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徵表為國欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也況重以骨肉之親又加以舊恩未報乎欲竭愚誠又恐越職然惟二恩未報忠臣之義一杼愚意退就農畝死無所恨臣聞舜命九官濟濟相讓和之至也眾賢和於朝則萬物和於野故簫韶九成而鳳皇來儀擊石拊石百獸率舞四海之內靡不和寧及至周文開基西郊雜遝眾賢罔不肅和崇推讓之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和於內萬國驩於外故盡得其驩心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐麰釐麰麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方眾小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依君子獨處守正不橈眾枉勉彊以從王事則反見憎毒讒愬故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸當是之時日月薄蝕而無光其詩曰朔日辛卯日有蝕之亦孔之醜又曰彼月而微此日而微今此下民亦孔之哀又曰日月鞠凶不用其行四國無政不用其良天變見於上地變動於下水泉沸騰山谷易處其詩曰百川沸騰山冢卒崩高岸為谷深谷為陵哀今之人胡憯莫懲霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚眾大也此皆不和賢不肖易位之所致也自此之後天下大亂篡殺殃禍並作厲王奔彘幽王見殺至乎平王末年魯隱之始即位也周大夫祭伯乖離不和出奔於魯而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣諸侯背畔而不朝周室卑微二百四十二年之間日食三十六地震五山陵崩阤二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見晝冥晦雨大冰李梅冬實七月霜降草木不死八月殺菽大雨雹雨雪靁霆失序相乘水旱饑蝝螽螟蠭午並起當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師於貿戎伐其郊鄭傷桓王戎執其使衛侯朔召不往齊逆命而助朔五大夫爭權三君更立莫能正理遂至陵夷不能復興由此觀之和氣致祥乖氣致異祥多者其國安異眾者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寬容使得並進今賢不肖渾殽白黑不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午膠戾乖剌更相讒愬轉相是非傳授增加文書紛糾前後錯繆毀譽渾亂所以營或耳目感移心意不可勝載分曹為黨往往群朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權藉勢之人子弟鱗集於朝羽翼陰附者眾輻湊於前毀譽將必用以終乖離之咎是以日月無光雪霜夏隕海水沸出陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌迹循詩人之所刺而欲以成太平致雅頌猶卻行而求及前人也初元以來六年矣案春秋六年之中災異未有稠如今者也夫有春秋之異無孔子之救猶不能解紛況甚於春秋乎原其所以然者讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進則眾賢退群枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工驩兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂污辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望陰陽之調不亦難乎是以群小窺見間隙緣飾文字巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍于群小小人成群誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之於朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅茹以其彙征吉在上則引其類在下則推其類故湯用伊尹不仁者遠而眾賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩歷周唐之所進以為法原秦魯之所消以為戒考祥應之福省災異之禍以揆當世之變於遠佞邪之黨壞散險詖之聚杜閉群枉之門廣開眾正之路決斷狐疑分別猶豫使是非炳然可知則百異消滅而眾祥並至太平之基萬世之利也臣幸得託肺附誠見陰陽不調不敢不通所聞竊推春秋災異以救今事一二條其所以不宜宣泄臣謹重封昧死上恭顯見其書愈與許史比而怨更生等堪性公方自見孤立遂直道而不曲是歲夏寒日青無光恭顯及許史皆言堪猛用事之咎上內重堪又患眾口之寖潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣齗齗不可光祿勳何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見眾人聞堪前與劉更生等謀毀骨肉以為當誅故臣前言堪不可誅傷為國養恩也上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百戶勿令典事明主不失師傅之恩此最策之得者也上於是疑會城門校尉諸葛豐亦言堪猛短上因發怒免豐語在其傳又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令顯等專權日甚後三歲餘孝宣廟闕災其晦日有蝕之於是上召諸前言日變在堪猛者責問皆稽首謝乃因下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明論議正直秉心有常發憤悃愊信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退卒不克明往者眾臣見異不務自修深惟其故而反晻昧說天託咎此人朕不得已出而試之以彰其材堪出之後大變仍臻眾亦嘿然堪治未期年而三老官屬有識之士詠頌其美使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隱非所宜明意疑以類欲以陷之朕亦不取也朕迫于俗不得專心乃者天著大異朕甚懼焉今堪年衰歲暮恐不得自信排於異人將安究之哉其徵堪詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中顯幹尚書事尚書五人皆其黨也堪希得見常因顯白事事決顯口會堪疾瘖不能言而卒顯誣譖猛令自殺於公車更生傷之乃著疾讒擿要救危及世頌凡八篇依興古事悼己及同類也遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向向以故九卿召拜為中郎使領護三輔都水數奏封事遷光祿大夫是時帝元舅陽平侯王鳳為大將軍秉政倚太后專國權兄弟七人皆封為列侯時數有大異向以為外戚貴盛鳳兄弟用事之咎而上方精於詩書觀古文詔向領校中五經祕書向見尚書洪範箕子為武王陳五行陰陽休咎之應向乃集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傳禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也然終不能奪王氏權久之營起昌陵數年不成復還歸延陵制度泰奢向上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始窮極事情而是非分明王者必通三統明天命所授者博非獨一姓也孔子論詩至於殷士膚敏祼將于京喟然歎曰大哉天命善不可不傳于子孫是以富貴無常不如是則王公其何以戒慎民萌何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能訓末孫之桀紂自古及今未有不亡之國也昔高皇帝既滅秦將都雒陽感寤劉敬之言自以德不及周而賢於秦遂徙都關中依周之德因秦之阻世之長短以德為效故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵北臨廁意悽愴悲懷顧謂群臣曰嗟乎以北山石為椁用紵絮斮陳漆其間豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石椁又何慼焉夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬不起山墳易曰古之葬者厚衣之以薪臧之中野不封不樹後世聖人易之以棺槨棺槨之作自黃帝始黃帝葬於橋山堯葬濟陰丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢秦穆公葬於雍橐泉宮祈年館下樗里子葬於武庫皆無丘隴之處此聖帝明賢君智士遠覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也夫周公武王弟也葬兄甚微孔子葬母於防稱古墓而不墳曰丘東西南北之人也不可不識也為四尺墳遇雨而崩弟子修之以告孔子孔子流涕曰吾聞之古者不修墓蓋非之也延陵季子適齊而反其子死葬於嬴博之間穿不及泉斂以時服封墳掩坎其高可隱而號曰骨肉歸復於土命也魂氣則無不之也夫嬴博去吳千有餘里季子不歸葬孔子往觀曰延陵季子於禮合矣故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆微薄矣非苟為儉誠便於體也宋桓司馬為石槨仲尼曰不如速朽秦相呂不韋集知略之士而造春秋亦言薄葬之義皆明於事情者也逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王皆大作丘隴多其瘞臧咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳其高五十餘丈周回五里有餘石槨為游館人膏為燈燭水銀為江海黃金為鳧雁珍寶之臧機械之變棺槨之麗宮館之監不可勝原又多殺宮人生薶工匠計以萬數天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宮室營宇往者咸見發掘其後牧兒亡羊羊入其鑿牧者持火照求羊失火燒其臧槨自古至今葬未有盛如始皇者也數年之間外被項籍之災內離牧豎之禍豈不哀哉是故德彌厚者葬彌薄知愈深者葬愈微無德寡知其葬愈厚丘隴彌高宮廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣周德既衰而奢侈宣王賢而中興更為儉宮室小寢廟諸人美之斯干之詩是也上章道宮室之如制下章言子孫之眾多也及魯嚴公刻飾宗廟多築臺囿後嗣再絕春秋刺焉周宣如彼而昌魯秦如此而絕是則奢儉之得失也陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵增埤為高積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘死者恨於下生者愁於上怨氣感動陰陽因之以饑饉物故流離以十萬數臣甚惽焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不說以示眾庶則苦之若苟以說愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聽明疏達蓋世宜弘漢家之德崇劉氏之美光昭五帝三王而顧與暴秦亂君競為奢侈比方丘隴說愚夫之目隆一時之觀違賢知之心亡萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢知穆公延陵樗里張釋之之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚臧以侈生害足以為戒初陵之橅宜從公卿大臣之議以息眾庶書奏上甚感向言而不能從其計向睹俗彌奢淫而趙衛之屬起微賤踰禮制向以為王教由內及外自近者始故採取詩書所載賢妃貞婦興國顯家可法則及孽嬖亂亡者序次為列女傳凡八篇以戒天子及采傳記行事著新序說苑凡五十篇奏之數上疏言得失陳法戒書數十上以助觀覽補遺闕上雖不能盡用然內嘉其言常嗟歎之時上無繼嗣政由王氏出災異浸甚向雅奇陳湯智謀與相親友獨謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得同姓末屬絫世蒙漢厚恩身為宗室遺老歷事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者向遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫甯魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父甯殖出其君衎弒其君剽季氏八佾舞於庭三家者以雍徹並專國政卒逐昭公周大夫尹氏筦朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗錄禍福如此類甚眾皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅勢上假太后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢之言而秦復存二世委任趙高專權自恣壅蔽大臣終有閰樂望夷之禍秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂產呂祿席太后之寵據將相之位兼南北軍之眾擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宮之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門筦執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之說執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進遠絕宗室之任不令得給事朝省恐其與己分權數稱燕王蓋主以疑上心避諱呂霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也雖周皇甫秦穰侯漢武安呂霍上官之屬皆不及也物盛必有非常之變先見為其人微象孝昭帝時冠石立於泰山仆柳起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根臿地中雖立石起柳無以過此之明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁隸縱不為身奈宗廟何婦人內夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以安全之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜遠外戚毋授以政皆罷令就弟以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以襃睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不密則失臣臣不密則失身幾事不密則害成唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之以向為中壘校尉向為人簡易無威儀廉靖樂道不交接世俗專積思於經術晝誦書傳夜觀星宿或不寐達旦元延中星孛東井蜀郡岷山崩雍江向惡此異語在五行志懷不能已復上奏其辭曰臣聞帝舜戒伯禹毋若丹朱敖周公戒成王毋若殷王紂詩曰殷監不遠在夏后之世亦言湯以桀為戒也聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日蝕三十六襄公尤數率三歲五月有奇而壹食漢興訖竟寧孝景帝尤數率三歲一月而一食臣向前數言日當食今連三年比食自建始以來二十歲間而八食率二歲六月而一發古今罕有異有小大希稠占有舒疾緩急而聖人所以斷疑也易曰觀乎天文以察時變昔孔子對魯哀公並言夏桀殷紂暴虐天下故曆失則攝提失方孟陬無紀此皆易姓之變也秦始皇之末至二世時日月薄食山陵淪亡辰星出於四孟太白經天而行無雲而雷枉矢夜光熒惑襲月㜸火燒宮野禽戲廷都門內崩長人見臨洮石隕于東郡星孛大角大角以亡觀孔子之言考暴秦之異天命信可畏也及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有泰山臥石自立上林僵柳復起大星如月西行眾星隨之此為特異孝宣興起之表天狗夾漢而西久陰不雨者二十餘日昌邑不終之異也皆著於漢紀觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起天之去就豈不昭昭然哉高宗成王亦有雊雉拔木之變能思其故故高宗有百年之福成王有復風之報神明之應應若景嚮世所同聞也臣幸得託末屬誠見陛下有寬明之德冀銷大異而興高宗成王之聲以崇劉氏故豤豤數奸死亡之誅今日食尤屢星孛東井攝提炎及紫宮有識長老莫不震動此變之大者也其事難一二記故易曰書不盡言言不盡意是以設卦指爻而復說義書曰伻來以圖天文難以相曉臣雖圖上猶須口說然後可知願賜清燕之閒指圖陳狀上輒入之然終不能用也向每召見數言公族者國之枝葉枝葉落則本根無所庇廕方今同姓疏遠母黨專政祿去公室權在外家非所以彊漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿輒不為王氏居位者及丞相御史所持故終不遷居列大夫官前後三十餘年年七十二卒卒後十三歲而王氏代漢向三子皆好學長子伋以易教授官至郡守中子賜九卿丞蚤卒少子歆最知名歆字子駿少以通詩書能屬文召見成帝待詔宦者署為黃門郎河平中受詔與父向領校祕書講六藝傳記諸子詩賦數術方技無所不究向死後歆復為中壘校尉哀帝初即位大司馬王莽舉歆宗室有材行為侍中太中大夫遷騎都尉奉車光祿大夫貴幸復領五經卒父前業歆乃集六藝群書種別為七略語在藝文志歆及向始皆治易宣帝時詔向受穀梁春秋十餘年大明習及歆校祕書見古文春秋左氏傳歆大好之時丞相史尹咸以能治左氏與歆共校經傳歆略從咸及丞相翟方進受質問大義初左氏傳多古字古言學者傳訓故而已及歆治左氏引傳文以解經轉相發明由是章句義理備焉歆亦湛靖有謀父子俱好古博見彊志過絕於人歆以為左丘明好惡與聖人同親見夫子而公羊穀梁在七十子後傳聞之與親見之其詳略不同歆數以難向向不能非間也然猶自持其穀梁義及歆親近欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸博士或不肯置對歆因移書太常博士責讓之曰昔唐虞既衰而三代迭興聖帝明王累起相襲其道甚著周室既微而禮樂不正道之難全也如此是故孔子憂道之不行歷國應聘自衛反魯然後樂正雅頌乃得其所修易序書制作春秋以紀帝王之道及夫子沒而微言絕七十子終而大義乖重遭戰國棄籩豆之禮理軍旅之陳孔氏之道抑而孫吳之術興陵夷至于暴秦燔經書殺儒士設挾書之法行是古之罪道術由是遂滅漢興去聖帝明王遐遠仲尼之道又絕法度無所因襲時獨有一叔孫通略定禮儀天下唯有易卜未有它書至孝惠之世乃除挾書之律然公卿大臣絳灌之屬咸介冑武夫莫以為意至孝文皇帝始使掌故朝錯從伏生受尚書尚書初出于屋壁朽折散絕今其書見在時師傳讀而已詩始萌牙天下眾書往往頗出皆諸子傳說猶廣立於學官為置博士在漢朝之儒唯賈生而已至孝武皇帝然後鄒魯梁趙頗有詩禮春秋先師皆起於建元之間當此之時一人不能獨盡其經或為雅或為頌相合而成泰誓後得博士集而讀之故詔書稱曰禮壞樂崩書缺簡脫朕甚閔焉時漢興已七八十年離於全經固已遠矣及魯恭王壞孔子宅欲以為宮而得古文於壞壁之中逸禮有三十九書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通臧於祕府伏而未發孝成皇帝閔學殘文缺稍離其真乃陳發祕臧校理舊文得此三事以考學官所傳經或脫簡傳或間編傳問民間則有魯國桓公趙國貫公膠東庸生之遺學與此同抑而未施此乃有識者之所惜閔士君子之所嗟痛也往者綴學之士不思廢絕之闕苟因陋就寡分文析字煩言碎辭學者罷老且不能究其一藝信口說而背傳記是末師而非往古至於國家將有大事若立壁雍封禪巡狩之儀則幽冥而莫知其原猶欲保殘守缺挾恐見破之私意而無從善服義之公心或懷妬嫉不考情實雷同相從隨聲是非抑此三學以尚書為備謂左氏為不傳春秋豈不哀哉今聖上德通神明繼統揚業亦閔文學錯亂學士若茲雖昭其情猶依違謙讓樂與士君子同之故下明詔試左氏可立不遣近臣奉指銜命將以輔弱扶微與二三君子比意同力冀得廢遺今則不然深閉固距而不肯試猥以不誦絕之欲以杜塞餘道絕滅微學夫可與樂成難與慮始此乃眾庶之所為耳非所望士君子也且此數家之事皆先帝所親論今上所考視其古文舊書皆有徵驗外內相應豈苟而已哉夫禮失求之於野古文不猶愈於野乎往者博士書有歐陽春秋公羊易則施孟然孝宣皇帝猶復廣立穀梁春秋梁丘易大小夏侯尚書義雖相反猶並置之何則與其過而廢之也寧過而立之傳曰文武之道未墬於地在人賢者志其大者不賢者志其小者今此數家之言所以兼包大小之義豈可偏絕哉若必專己守殘黨同門妬道真違明詔失聖意以陷於文吏之議甚為二三君子不取也其言甚切諸儒皆怨恨是時名儒光祿大夫龔勝以歆移書上疏深自罪責願乞骸骨罷及儒者師丹為大司空亦大怒奏歆改亂舊章非毀先帝所立上曰歆欲廣道術亦何以為非毀哉歆由是忤執政大臣為眾儒所訕懼誅求出補吏為河內太守以宗室不宜典三河徙守五原後復轉在涿郡歷三郡守數年以病免官起家復為安定屬國都尉會哀帝崩王莽持政莽少與歆俱為黃門郎重之白太后太后留歆為右曹太中大夫遷中壘校尉羲和京兆尹使治明堂辟雍封紅休侯典儒林史卜之官考定律曆著三統曆譜初歆以建平元年改名秀字穎叔云及王莽篡位歆為國師後事皆在莽傳贊曰仲尼稱材難不其然與自孔子後綴文之士眾矣唯孟軻孫況董仲舒司馬遷劉向揚雄此數公者皆博物洽聞通達古今其言有補於世傳曰聖人不出其間必有命世者焉豈近是乎劉氏洪範論發明大傳著天人之應七略剖判藝文總百家之緒三統曆譜考步日月五星之度有意其推本之也嗚虖向言山陵之戒于今察之哀哉指明梓柱以推廢興昭矣豈非直諒多聞古之益友與
