body:
  text: 魏豹田儋韓王信傳第三魏豹故魏諸公子也其兄魏咎故魏時封為寧陵君秦滅魏為庶人陳勝之王也咎往從之勝使魏人周巿徇魏地魏地已下欲立周巿為魏王巿曰天下昏亂忠臣乃見今天下共畔秦其誼必立魏王後乃可齊趙使車各五十乘立巿為王巿不受迎魏咎於陳五反陳王乃遣立咎為魏王章邯已破陳王進兵擊魏王於臨濟魏王使周巿請救齊楚齊楚遣項它田巴將兵隨巿救魏章邯遂擊破殺周巿等軍圍臨濟咎為其民約降約降定咎自殺魏豹亡走楚楚懷王豫豹數千人復徇魏地項羽已破秦兵降章邯豹下魏二十餘城立為魏王豹引精兵從項羽入關羽封諸侯欲有梁地乃徙豹於河東都平陽為西魏王漢王還定三秦渡臨晉豹以國屬焉遂從擊楚於彭城漢王敗還至滎陽豹請視親病至國則絶河津畔漢漢王謂酈生曰緩頰往說之酈生往豹謝曰人生一世間如白駒過隙今漢王嫚侮人罵詈諸侯群臣如奴耳非有上下禮節吾不忍復見也漢王遣韓信擊豹遂虜之傳豹詣滎陽以其地為河東太原上黨郡漢王令豹守滎陽楚圍之急周苛曰反國之王難與共守遂殺豹田儋狄人也故齊王田氏之族也儋從弟榮榮弟橫皆豪桀宗彊能得人陳涉使周巿略地北至狄狄城寸儋陽為縛其奴從少年之廷欲謁殺奴見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國儋田氏當王遂自立為齊王發兵擊周巿巿軍還去儋因率兵東略定齊地秦將章邯圍魏王咎於臨濟急魏王請救於齊儋將兵救魏章邯夜銜枚擊大破齊楚軍殺儋於臨濟下儋從弟榮收儋餘兵東走東阿齊人聞儋死乃立故齊王建之弟田假為王田角為相田閒為將以距諸侯榮之走東阿章邯追圍之項梁聞榮急乃引兵擊破章邯東阿下章邯走而西項梁因追之而榮奴齊之立假乃引兵歸擊逐假假亡走楚相角亡走趙角弟閒前救趙因不敢歸榮乃立儋子巿為王榮相之橫為將平齊地項梁既追章邯章邯兵益盛項梁使使趣齊兵共擊章邯榮曰楚殺田假趙殺角閒乃出兵楚懷王曰田假與國之王窮而歸我殺之不誼趙亦不殺田角田閒以市於齊齊王曰蝮蠚手則斬手蠚足則斬足何者為害於身也田假田角田閒於楚趙非手足戚何故不殺且秦復得志於天下則齮齕首用事者墳墓矣楚趙不聽齊齊亦怒終不肯出兵章邯果敗殺項梁破楚兵楚兵東走而章邯渡河圍趙於巨鹿項羽由此怨榮羽既存趙降章邯西滅秦立諸侯王乃徙齊王巿更王膠東治即墨齊將田都從共救趙因入關故立都為齊王治臨菑故齊王建孫田安項羽方渡河救趙安下濟北數城引兵降項羽羽立安為濟北王治博陽榮以負項梁不肯助楚攻秦故不得王趙將陳餘亦失職不得王二人俱怨項羽榮使人將兵助陳餘令反趙地而榮亦發兵以距擊田都都亡走楚榮留齊王巿毋之膠東巿左右曰項王強暴王不就國必危巿懼乃亡就國榮怒追擊殺市於即墨還攻殺濟北王安自立為王盡并三齊之地項王聞之大怒乃北伐齊榮發兵距之城陽榮兵敗走平原平原民殺榮項羽遂燒夷齊城郭所過盡屠破齊人相聚畔之榮弟橫收齊散兵得數萬人反擊項羽於城陽而漢王帥諸侯敗楚入彭城項羽聞之乃釋齊而歸擊漢於彭城因連與漢戰相距滎陽以故橫復收齊城邑立榮子廣為王而橫相之政事無巨細皆斷於橫定齊三年聞漢將韓信引兵且東擊齊齊使華毋傷田解軍歷下以距漢會漢使酈食其往說王廣及相橫與連和橫然之乃罷歷下守備縱酒且遣使與漢平韓信乃渡平原襲破齊歷下軍因入臨菑王廣相橫以酈生為賣己而亨之廣東走高密橫走博守相田光走城陽將軍田既軍於膠東楚使龍且救齊齊王與合軍高密漢將韓信曹參破殺龍且虜齊王廣漢將灌嬰追得守相光至博而橫聞王死自立為王還擊嬰嬰敗橫軍於贏下橫亡走梁歸彭越越時居梁地中立且為漢且為楚韓信已殺龍且因進兵破殺田既於膠東灌嬰破殺齊將田吸於千乘遂平齊地漢滅項籍漢王立為皇帝彭越為梁王橫懼誅而與其徒屬五百餘人入海居島中高帝聞之以橫兄弟本定齊齊人賢者多附焉今在海中不收後恐有亂乃使使赦橫罪而召之橫謝曰臣亨陛下之使酈食其今聞其弟商為漢將而賢臣恐懼不敢奉詔請為庶人守海島中使還報高帝乃詔衛尉酈商曰齊王橫即至人馬從者敢動搖者致族夷乃復使使持節具告以詔意曰橫來大者王小者乃侯耳不來且發兵加誅橫乃與其客二人乘傳詣雒陽至尸鄉廄置橫謝使者曰人臣見天子當洗沐止留謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫乃為亡虜北面事之其愧固已甚矣又吾亨人之兄與其弟併肩而事主縱彼畏天子之詔不敢動搖我獨不愧於心乎且陛下所以欲見我不過欲一見我面貌耳陛下在雒陽今斬吾頭馳三十里間形容尚未能敗猶可知也遂自剄令客奉其頭從使者馳奏之高帝高帝曰嗟乎有以起布衣兄弟三人更王豈非賢哉為之流涕而拜其二客為都尉發卒二千以王者禮葬橫既葬二客穿其冢旁皆自剄從之高帝聞而大驚以橫之客皆賢者吾聞其餘尚五百人在海中使使召至聞橫死亦皆自殺於是乃知田橫兄弟能得士也韓王信故韓襄王孽孫也長八尺五寸項梁立楚懷王燕齊趙魏皆已前王唯韓無有後故立韓公子橫陽君成為韓王欲以撫定韓地項梁死定陶成奔懷王沛公引兵擊陽城使張良以韓司徒徇韓地得信以為韓將將其兵從入武關沛公為漢王信從入漢中乃說漢王曰項王王諸將王獨居此遷也士卒皆山東人竦而望歸及其蜂東鄉可以爭天下漢王還定三秦乃許王信先拜為韓太尉將兵略韓地項籍之封諸王皆就國韓王成以不從無功不遣之國更封為穰侯後又殺之聞漢遣信略韓地乃令故籍游吳時令鄭昌為韓王距漢漢二年信略定韓地十餘城漢王至河南信急擊韓王昌昌降漢乃立信為韓王常將韓兵從漢王使信與周苛等守滎陽楚拔之信降楚已得亡歸漢漢復以為韓王竟從擊破項籍五年春與信剖符王潁川六年春上以為信壯武北近鞏雒南迫宛葉東有淮陽皆天下徑兵處也乃更以太原郡為韓國徙信以備胡都晉陽信上書曰國被邊胸奴數入晉陽去塞遠請治馬邑上許之秋胸奴冒頓大入圍信信數使使胡求和解漢發兵救之疑信數間使有二心上賜信書責讓之曰專死不勇專生不任寇攻馬邑君王力不足以堅守乎安危存亡之地此二者朕所以責於君王信得書恐誅因與胸奴約共攻漢以馬邑降胡擊太原七年冬上自往擊破信軍銅鞮斬其將王喜信亡走胸奴其將白土人曼丘臣王黃立趙苗裔趙利為王復收信散兵而與信及冒頓謀攻漢胸奴使左右賢王將萬餘騎與王黃等屯廣武以南至晉陽與漢兵戰漢兵大破之追至于離石復破之胸奴復聚兵樓煩西北漢令車騎擊胸奴常敗走漢乘勝追北聞冒頓居代谷上居晉陽使人視冒頓還報曰可擊上遂至平城上白登胸奴騎圍上上乃使人厚遺閼氏閼氏說冒頓曰今得漢地猶不能居且兩主不相厄居七日胡騎稍稍引去天霧漢使人往來胡不覺護軍中尉陳平言上曰胡者全兵請令彊弩傅兩矢外鄉徐行出圍入平城漢救兵亦至胡騎遂解去漢亦罷兵歸信為胸奴將兵往來擊邊令王黃等說誤陳豨十一年春信復與胡騎入居參合漢使柴將軍擊之遺信書曰陛下寬仁諸侯雖有叛亡而後歸輒復故位號不誅也大王所知今王以敗亡走胡非有大罪急自歸信報曰陛下擢僕閭巷南面稱孤此僕之幸也滎陽之事僕不能死囚於項籍此一罪也寇攻馬邑僕不能堅守以城降之此二罪也今為反寇將兵與將軍爭一旦之命此三罪也夫種蠡無一罪身死亡僕有三罪而欲求活此伍子胥所以僨於吳世也今僕亡匿山谷間旦暮乞貣蠻夷僕之思歸如痿人不忘起盲者不忘視勢不可耳遂戰柴將軍屠參合斬信信之入胸奴與太子俱及至頽當城生子因名曰頽當韓太子亦生子嬰至孝文時頽當及嬰率其衆降漢封頽當為弓高侯嬰為襄城侯吳楚反時弓高侯功冠諸將傳子至孫孫無子國絶嬰孫以不敬失侯頽當孽孫嫣貴幸名顯當世嫣弟說以校尉擊胸奴封龍額侯後坐酎金失侯復以待詔為橫海將軍擊破東越封按道侯太初中為游擊將軍屯五原外列城還為光祿勳掘蠱太子宮為太子所殺子興嗣坐巫蠱誅上曰游擊將軍死事無論坐者乃復封興弟增為龍額侯增少為郎諸曹侍中光祿大夫昭帝時至前將軍與大將軍霍光定策立宣帝益封千戶本始二年五將征胸奴增將三萬騎出雲中斬首百餘級至期而還神爵元年代張安世為大司馬車騎將軍領尚書事增世貴幼為忠臣事三主重於朝廷為人寬和自守以溫顏遜辭承上接下無所失意保身固寵不能有所建明五鳳二年薨諡曰安侯子寶嗣亡子國除成帝時繼功臣後封增兄子岑為龍額侯薨子持弓嗣王莽敗乃絶贊曰周室既壞至春秋末諸侯耗盡而炎黃唐虞之苗裔尚猶頗有存者秦滅六國而上古遺烈掃地盡矣楚漢之際豪桀相王唯魏豹韓信田儋兄弟為舊國之後然皆及身而絶橫之志節賓客慕義猶不能自立豈非天呼韓氏自弓高後貴顯蓋周烈近與
