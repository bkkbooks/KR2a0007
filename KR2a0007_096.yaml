body:
  text: 元后傳第六十八孝元皇后王莽之姑也莽自謂黃帝之後其自本曰黃帝姓姚氏八世生虞舜舜起媯汭以媯為姓至周武王封舜後媯滿於陳是為胡公十三世生完完字敬仲犇齊齊桓公以為卿姓田氏十一世田和有齊國二世稱王至王建為秦所滅項羽起封建孫安為濟北王至漢興安失國齊人謂之王家因以為氏文景間安孫遂字伯紀處東平陵生賀字翁孺為武帝繡衣御史逐捕魏郡群盜堅盧等黨與及吏畏懦逗遛當坐者翁孺皆縱不誅它部御史暴勝之等奏殺二千石誅千石以下及通行飲食坐連及者大部至斬萬餘人語見酷吏傳翁孺以奉使不稱免嘆曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨乃徙魏郡元城委粟里為三老魏郡人德之元城建公曰昔春秋沙麓崩晉史卜之曰陰為陽雄土火相乘故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正直其地日月當之元城郭東有五鹿之虛即沙鹿地也後八十年當有貴女興天下云翁孺生禁字稚君少學法律長安為廷尉史本始三年生女政君即元后也禁有大志不修廉隅好酒色多取傍妻凡有四女八男長女君俠次即元后政君次君力次君弟長男鳳孝卿次曼元卿譚子元崇少子商子夏立子叔根稚卿逢時季卿唯鳳崇與元后政君同母母適妻魏郡李氏女也後以妒去更嫁為河內苟賓妻初李親任政君在身夢月入其懷及壯大婉順得婦人道嘗許嫁未行所許者死後東平王聘政君為姬未入王薨禁獨怪之使卜數者相政君當大貴不可言禁心以為然乃教書學鼓琴五鳳中獻政君年十八矣入掖庭為家人子歲餘會皇太子所愛幸司馬良娣病且死謂太子曰妾死非天命乃諸娣妾良人更祝詛殺我太子憐之且以為然及司馬良娣死太子悲恚發病忽忽不樂因以過怒諸娣妾莫得進見者久之宣帝聞太恨過諸娣妾欲順適其意乃令皇后擇後宮家人子可以虞侍太子者政君與在其中及太子朝皇后乃見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后彊應曰此中一人可是時政君坐近太子又獨衣絳緣諸于長御即以為是皇后使侍中杜輔掖庭令濁賢交送政君太子宮見丙殿得御幸有身先是者太子後宮娣妾以十數御幸久者七八年莫有子及王妃壹幸而有身甘露三年生成帝於甲館畫堂為世適皇孫宣帝愛之自名曰驁字太孫常置左右後三年宣帝崩太子即位是為孝元帝立太孫為太子以母王妃為婕妤封父禁為陽平侯後三日婕妤立為皇后禁位特進禁弟弘至長樂衛尉永光二年禁薨諡曰頃侯長子鳳嗣侯為衛尉侍中皇后自有子後希復進見太子壯大寬博恭慎語在成紀其後幸酒樂燕樂元帝不以為能而傅昭儀有寵於上生定陶共王王多材藝上甚愛之坐則側席行則同輦常有意欲廢太子而立共王時鳳在位與皇后太子同心憂懼賴侍中史丹擁右太子語在丹傳上亦以皇后素謹慎而太子先帝所常留意故得不廢元帝崩太子立是為孝成帝尊皇后為皇太后以鳳為大司馬大將軍領尚書事益封五千戶王氏之興自鳳始又封太后同母弟崇為安成侯食邑萬戶鳳庶弟譚等皆賜爵關內侯食邑其夏黃霧四塞終日天子以問諫大夫楊興博士駟勝等對皆以為陰盛侵陽之氣也高祖之約也非功臣不侯今太后諸弟皆以無功為侯非高祖之約外戚未曾有也故天為見異言事者多以為然鳳於是懼上書辭謝曰陛下即位思慕諒闇故詔臣鳳典領尚書事上無以明聖德下無以益政治今有茀星天地赤黃之異咎在臣鳳當伏顯戮以謝天下今諒闇己畢大義皆舉宜躬親萬機以承天心因乞骸骨辭職上報曰朕承先帝聖緒涉道未深不明事情是以陰陽錯繆日月無光赤黃之氣充塞天下咎在朕躬今大將軍乃引過自予欲上尚書事歸大將軍印綬罷大司馬官是明朕之不德也朕委將軍以事誠欲庶幾有成顯先祖之功德將軍其專心固意輔朕之不逮毋有所疑後五年諸吏散騎安成侯崇薨諡曰共侯有遺腹子奉世嗣侯太后甚哀之明年河平二年上悉封舅譚為平阿侯商成都侯立紅陽侯根曲陽侯逢時高平侯五人同日封故世謂之五侯太后同產唯曼蚤卒餘畢侯矣太后母李親苟氏妻生一男名參寡居頃侯禁在時太后令禁還李親太后憐參欲以田蚡為比而封之上曰封田氏非正也以參為侍中水衡都尉王氏子弟皆卿大夫侍中諸曹分據勢官滿朝廷大將軍鳳用事上遂謙讓無所顓左右常薦光祿大夫劉向少子歆通達有異材上召見歆誦讀詩賦甚說之欲以為中常侍召取衣冠臨當拜左右皆曰未曉大將軍上曰此小事何須關大將軍左右叩頭爭之上於是語鳳鳳以為不可乃止其見憚如此上即位數年無繼嗣體常不平定陶共王來朝太后與上承先帝意遇共王甚厚賞賜十倍於它王不以往事為纖介共王之來朝也天子留不遣歸國上謂共王我未有子人命不諱一朝有它且不復相見爾長留侍我矣其後天子疾益有瘳共王因留國邸旦夕侍上上甚親重大將軍鳳心不便共王在京師會日蝕鳳因言日蝕陰盛之象為非常異定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國上不得已於鳳而許之共王辭去上與相對涕泣而決京兆尹王章素剛直敢言以為鳳建遣共王之國非是乃奏封事言日蝕之咎矣天子召見章延問以事章對曰天道聰明佑善而災惡以瑞異為符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正義善事當有祥瑞何故致災異災異之發為大臣顓政者也今聞大將軍猥歸日蝕之咎於定陶王建遣之國苟欲使天子孤立於上顓擅朝事以便其私非忠臣也且日蝕陰侵陽臣顓君之咎今政事大小皆自鳳出天子曾不一舉手鳳不內省責反歸咎善人推遠定陶王且鳳誣罔不忠非一事也前丞相樂昌侯商本以先帝外屬內行篤有威重位歷將相國家柱石臣也其人守正不肯詘節隨鳳委曲卒用閨門之事為鳳所罷身以憂死眾庶愍之又鳳知其小婦弟張美人已嘗適人於禮不宜配御至尊託以為宜子內之後宮苟以私其妻弟聞張美人未嘗任身就館也且羌胡尚殺首子以盪腸正世況於天子而近已出之女也此三者皆大事陛下所自見足以知其餘及它所不見者鳳不可令久典事宜退使就弟選忠賢以代之自鳳之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰微京兆尹直言吾不聞社稷計且唯賢知賢君試為朕求可以自輔者於是章奏封事薦中山孝王舅琅邪太守馮野王先帝時歷二卿忠信質直知謀有餘野王以王舅出以賢復入明聖主樂進賢也上自為太子時數聞野王先帝名卿聲譽出鳳遠甚方倚欲以代鳳初章每召見上輒辟左右時太后從弟長樂衛尉弘子侍中音獨側聽具知章言以語鳳鳳聞之稱病出就第上疏乞骸骨謝上曰臣材駑愚戇得以外屬兄弟七人封為列侯宗族蒙恩賞賜無量輔政出入七年國家委任臣鳳所言輒聽薦士常用無一功善陰陽不調災異數見咎在臣鳳奉職無狀此臣一當退也五經傳記師所誦說咸以日蝕之咎在於大臣非其人易曰折其右肱此臣二當退也河平以來臣久病連年數出在外曠職素餐此臣三當退也陛下以皇太后故不忍誅廢臣猶自知當遠流放又重自念兄弟宗族所蒙不測當殺身靡骨死輦轂下不當以無益之故有離寑門之心誠歲餘以來所苦加侵日日益甚不勝大願願乞骸骨歸自治養冀賴陛下神靈未埋髮齒期月之間幸得瘳愈復望帷幄不然必寘溝壑臣以非材見私天下知臣受恩深也以病得全骸骨歸天下知臣被恩見哀重巍巍也進退於國為厚萬無纖介之議唯陛下哀憐其辭指甚哀太后聞之為垂涕不御食上少而親倚鳳弗忍廢乃報鳳曰朕秉事不明政事多闕故天變婁臻咸在朕躬將軍乃深引過自予欲乞骸骨而退則朕將何嚮焉書不云乎公毋困我務專精神安心自持期於亟瘳稱朕意焉於是鳳起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之欲令在朝阿附諸侯又知張美人體御至尊而妄稱引羌胡殺子蕩腸非所宜言遂下章吏廷尉致其大逆罪以為比上夷狄欲絕繼嗣之端背畔天子私為定陶王章死獄中妻子徙合浦自是公卿見鳳側目而視郡國守相刺史皆出其門又以侍中太僕音為御史大夫列于三公而五侯群弟爭為奢侈賂遺珍寶四面而至後庭姬妾各數十人僮奴以千百數羅鍾磬舞鄭女作倡優狗馬馳逐大治第室起土山漸臺洞門高廊閣道連屬彌望百姓歌之曰五侯初起曲陽最怒壞決高都連竟外杜土山漸臺西白虎其奢僭如此然皆通敏人事好士養賢傾財施予以相高尚鳳輔政凡十一歲陽朔三年秋鳳病天子數自臨問親執其手涕泣曰將軍病如有不可言平阿侯譚次將軍矣鳳頓首泣曰譚等雖與臣至親行皆奢僭無以率導百姓不如御史大夫音謹敕臣敢以死保之及鳳且死上疏謝上復固薦音自代言譚等五人必不可用天子然之初譚倨不肯事鳳而音敬鳳卑恭如子故薦之鳳薨天子臨弔贈寵送以輕車介士軍陳自長安至渭陵諡曰敬成侯子襄嗣侯為衛尉御史大夫音竟代鳳為大司馬車騎將軍而平阿侯譚位特進領城門兵谷永說譚令讓不受城門職由是與音不平語在永傳音既以從舅越親用事小心親職歲餘上下詔曰車騎將軍音宿衛忠正勤勞國家前為御史大夫以外親宜典兵馬入為將軍不獲宰相之封朕甚慊焉其封音為安陽侯食邑與五侯等俱三千戶初成都侯商嘗病欲避暑從上借明光宮後又穿長安城引內灃水注第中大陂以行船立羽蓋張周帷輯濯越歌上幸商第見穿城引水意恨內銜之未言後微行出過曲陽侯第又見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音商根兄弟欲自黥劓謝太后上聞之大怒乃使尚書責問司隸校尉京兆尹知成都侯商擅穿帝城決引灃水曲陽侯根驕奢僭上赤墀青瑣紅陽侯立父子臧匿姦猾亡命賓客為群盜司隸京兆皆阿縱不舉奏正法二人頓首省戶下又賜車騎將軍音策書曰外家何甘樂禍敗而欲自黥劓相戮辱於太后前傷慈母之心以危亂國外家宗族彊上一身寖弱日久今將一施之君其召諸侯令待府舍是日詔尚書奏文帝時誅將軍薄昭故事車騎將軍音藉槀請罪商立根皆負斧質謝上不忍誅然後得已久之平阿侯譚薨諡曰安侯子仁嗣侯太后憐弟曼蚤死獨不封曼寡婦渠供養東宮子莽幼孤不及等比常以為語平阿侯譚成都侯商及位多稱莽者久之上復下詔追封曼為新都哀侯而子莽嗣爵為新都侯後又封太后姊子淳于長為定陵侯王氏親屬侯者凡十人上悔廢平阿侯譚不輔政而薨也乃復進成都侯商以特進領城門兵置幕府得舉吏如將軍杜鄴說車騎將軍音令親附商語在鄴傳王氏爵位日盛唯音為修整數諫正有忠節輔政八年薨弔贈如大將軍諡曰敬侯子舜嗣侯為太僕侍中特進成都侯商代音為大司馬衛將軍而紅陽侯立位特進領城門兵商輔政四歲病乞骸骨天子憫之更以為大將軍益封二千戶賜錢百萬商薨弔贈如大將軍故事諡曰景成侯子況嗣侯紅陽侯立次當輔政有罪過語在孫寶傳上乃廢立而用光祿勳曲陽侯根為大司馬票騎將軍歲餘益封千七百戶高平侯逢時無材能名稱是歲薨諡曰戴侯子買之嗣侯綏和元年上即位二十餘年無繼嗣而定陶共王已薨子嗣立為王王祖母定陶傅太后重賂遺票騎將軍根為王求漢嗣根為言上亦欲立之遂徵定陶王為太子時根輔政五歲矣乞骸骨上乃益封根五千戶賜安車駟馬黃金五百斤罷就第先是定陵侯淳于長以外屬能謀議為衛尉侍中在輔政之次是歲新都侯莽告長伏罪與紅陽侯立相連長下獄死立就國語在長傳故曲陽侯根薦莽以自代上亦以為莽有忠直節遂擢莽從侍中騎都尉光祿大夫為大司馬歲餘成帝崩哀帝即位太后詔莽就第避帝外家哀帝初優莽不聽莽上書固乞骸骨而退上乃下詔曰曲陽侯根前在位建社稷策侍中太僕安陽侯舜往時護太子家導朕忠誠專壹有舊恩新都侯莽憂勞國家執義堅固庶幾與為治太皇太后詔休就第朕甚閔焉其益封根二千戶舜五百戶莽三百五十戶以莽為特進朝朔望又還紅陽侯立京師哀帝少而聞知王氏驕盛心不能善以初立故優之後月餘司隸校尉解光奏曲陽侯根宗重身尊三世據權五將秉政天下輻湊自效根行貪邪臧累鉅萬縱橫恣意大治室第第中起土山立兩市殿上赤墀戶青瑣遊觀射獵使奴從者被甲持弓弩陳為步兵止宿離宮水衡共張發民治道百姓苦其役內懷姦邪欲筦朝政推親近吏主簿張業以為尚書蔽上壅下內塞王路外交藩臣驕奢僭上壞亂制度案根骨肉至親社稷大臣先帝棄天下根不悲哀思慕山陵未成公聘取故掖庭女樂五官殷嚴王飛君等置酒歌舞捐忘先帝厚恩背臣子義及根兄子成都侯況幸得以外親繼父為列侯侍中不思報厚恩亦聘取故掖庭貴人以為妻皆無人臣禮大不敬不道於是天子曰先帝遇根況父子至厚也今乃背忘恩義以根嘗建社稷之策遣就國免況為庶人歸故郡根及況父商所薦舉為官者皆罷後二歲傅太后帝母丁姬皆稱尊號有司奏新都侯莽前為大司馬貶抑尊號之議虧損孝道及平阿侯仁臧匿趙昭儀親屬皆就國天下多冤王氏諫大夫楊宣上封事言孝成皇帝深惟宗廟之重稱述陛下至德以承天序聖策深遠恩德至厚惟念先帝之意豈不欲以陛下自代奉承東宮哉太皇太后春秋七十數更憂傷敕令親屬引領以避丁傅行道之人為之隕涕況於陛下時登高遠望獨不慚於延陵乎哀帝深感其言復封商中子邑為成都侯元壽元年日蝕賢良對策多訟新都侯莽者上於是徵莽及平阿侯仁還京師侍太后曲陽侯根薨國除明年哀帝崩無子太皇太后以莽為大司馬與共徵立中山王奉哀帝後是為平帝帝年九歲當年被疾太后臨朝委政於莽莽顓威福紅陽侯立莽諸父平阿侯仁素剛直莽內憚之令大臣以罪過奏遣立仁就國莽日誑燿太后言輔政致太平群臣奏請尊莽為安漢公後遂遣使者迫守立仁令自殺賜立諡曰荒侯子柱嗣仁諡曰刺侯子術嗣是歲元始三年也明年莽風群臣奏立莽女為皇后又奏尊莽為宰衡莽母及兩子皆封為列侯語在莽傳莽既外壹群臣令稱己功德又內媚事旁側長御以下賂遺以千萬數白尊太后姊妹君俠為廣恩君君力為廣惠君君弟為廣施君皆食湯沐邑日夜共譽莽莽又知太后婦人厭居深宮中莽欲虞樂以市其權乃令太后四時車駕巡狩四郊存見孤寡貞婦春幸繭館率皇后列侯夫人桑遵霸水而祓除夏遊篽宿鄠杜之間秋歷東館望昆明集黃山宮冬饗飲飛羽校獵上蘭登長平館臨涇水而覽焉太后所至屬縣輒施恩惠賜民錢帛牛酒歲以為常太后從容言曰我始入太子家時見於丙殿至今五六十歲尚頗識之莽因曰太子宮幸近可壹往遊觀不足以為勞於是太后幸太子宮甚說太后旁弄兒病在外舍莽自親候之其欲得太后意如此平帝崩無子莽徵宣帝玄孫選最少者廣戚侯子劉嬰年二歲託以卜相為最吉乃風公卿奏請立嬰為孺子令宰衡安漢公莽踐祚居攝如周公傅成王故事太后不以為可力不能禁於是莽遂為攝皇帝改元稱制焉俄而宗室安眾侯劉崇及東郡太守翟義等惡之更舉兵欲誅莽太后聞之曰人心不相遠也我雖婦人亦知莽必以是自危不可其後莽遂以符命自立為真皇帝先奉諸符瑞以白太后太后大驚初漢高祖入咸陽至霸上秦王子嬰降於軹道奉上始皇璽及高祖誅項籍即天子位因御服其璽世世傳受號曰漢傳國璽以孺子未立璽臧長樂宮及莽即位請璽太后不肯授莽莽使安陽侯舜諭指舜素謹敕太后雅愛信之舜既見太后知其為莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴累世既無以報受人孤寄乘便利時奪取其國不復顧恩義人如此者狗豬不食其餘天下豈有而兄弟邪且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良久乃仰謂太后臣等已無可言者莽必欲得傳國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之乃出漢傳國璽投之地以授舜曰我老已死如而兄弟今族滅也舜既得傳國璽奏之莽大說乃為太后置酒未央宮漸臺大縱眾樂莽又欲改太后漢家舊號易其璽綬恐不見聽而莽疏屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命莽乃車駕至東宮親以其書白太后太后曰此言是也莽因曰此誖德之臣也罪當誅於是冠軍張永獻符命銅璧文言太皇太后當為新室文母太皇太后莽乃下詔曰予視群公咸曰休哉其文字非刻非畫厥性自然予伏念皇天命予為子更命太皇太后為新室文母太皇太后協于新故交代之際信於漢氏哀帝之代世傳行詔籌為西王母共具之祥當為歷代母昭然著明予祗畏天命敢不欽承謹以令月吉日親率群公諸侯卿士奉上皇太后璽紱以當順天心光于四海焉太后聽許莽於是鳩殺王諫而封張永為貢符子初莽為安漢公時又諂太后奏尊元帝廟為高宗太后晏駕後當以禮配食云及莽改號太后為新室文母絕之於漢不令得體元帝墮壞孝元廟更為文母太后起廟獨置孝元廟故殿以為文母篹食堂既成名曰長壽宮以太后在故未謂之廟莽以太后好出遊觀乃車駕置酒長壽宮請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壞之且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人嫚神多矣能久得祐乎飲酒不樂而罷自莽篡位後知太后怨恨求所以媚太后無不為然愈不說莽更漢家黑貂著黃貂又改漢正朔伏臘日太后令其官屬黑貂至漢家正臘日獨與其左右相對飲酒食太后年八十四建國五年二月癸丑崩三月乙酉合葬渭陵莽詔大夫揚雄作誄曰太陰之精沙麓之靈作合於漢配元生成著其協於元城沙麓太陰精者謂夢月也太后崩後十年漢兵誄莽初紅陽侯立就國南陽與諸劉結恩立少子丹為中山大守世祖初起丹降為將軍戰死上閔之封丹子泓為武桓侯至今司徒掾班彪曰三代以來春秋所記王公國君與其失世稀不以女寵漢興后妃之家呂霍上官幾危國者數矣及王莽之興由孝元后歷漢四世為天下母饗國六十餘載群弟世權更持國柄五將十侯卒成新都位號已移於天下而元后卷卷猶握一璽不欲以授莽婦人之仁悲夫
