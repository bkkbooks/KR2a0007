body:
  text: 溝洫志第九夏書禹堙洪水十三年過家不入門陸行載車水行乘舟泥行乘毳山行則梮以別九州隨山浚川任土作貢通九道陂九澤度九山然河災之羡溢害中國也尤甚唯是為務故道河自積石歷龍門南到華陰東下底柱及盟津雒內至于大伾於是禹以為河所從來者高水湍悍難以行平地數為敗乃釃二渠以引其河北載之高地過洚水至於大陸播為九河同為迎河入于勃海九川既疏九澤既陂諸夏乂安功施乎三代自是之後滎陽下引河東南為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會於楚西方則通渠漢川雲夢之際東方則通溝江淮之間於吳則通渠三江五湖於齊則通淄濟之間於蜀則蜀守李冰鑿離堆避沫水之害穿二江成都中此渠皆可行舟有餘則用溉百姓饗其利至於它往往引其水用溉田溝渠甚多然莫足數也魏文侯時西門豹為鄴令有令名至文侯曾孫襄王時與群臣飲酒王為群臣祝曰令吾臣皆如景祐殿局本都有如字西門豹之為人臣也史起進曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在其旁西門豹不知用是不智也知而不興是不仁也仁智豹未之盡何足法也於是以史起為鄴令遂引漳水溉鄴以富魏之河內民歌之曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮生稻粱其後韓聞秦之好興事欲罷之無令東伐乃使水工鄭國間説秦令鑿涇水自中山西邸瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺鄭國鄭國曰始臣為間然渠成亦秦之利也臣為韓延數歲之命而為秦建萬世之功秦以為然卒使就渠渠成而用溉王念孫説此溉字涉下溉字而衍注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾於是關中為沃野無凶年秦以富強卒并諸侯因名曰鄭國渠漢興三十有九年孝文時河決酸棗東潰金隄於是東郡大興卒塞之其後三十六歲孝武元光中河決於瓠子東南注巨野通於淮泗上使汲黯鄭當時興人徒塞之輒復壞是時武安侯田蚡為丞相其奉邑食鄃鄃居河北河決而南則鄃無水災邑收入多蚡言於上曰江河之決皆天事未易以人力強塞強塞之未必順景祐汲古殿局本都作應應景祐汲古殿局本都作應天而望氣用數者亦以為然是以久不復塞也時鄭當時為大司農言異時關東漕粟從渭上度六日罷而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易遭度可令三月罷罷罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同而渠下民田萬餘頃又可得以溉此捐罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同損罷字史記無蘇輿疑衍捐字景祐殿本都作損史記同漕省卒而益肥關中之地得穀上以為然令齊人水工徐伯表發卒數萬人穿漕渠三歲而通以漕大便利其後漕稍多而渠下之民頗得以溉矣後河東守番係言漕從山東西歲百餘萬石更底柱之艱敗亡甚多而煩費穿渠引汾溉皮氏汾陰下引河溉汾陰蒲坂下度可得五千頃故盡河堧棄地民茭牧其中耳今溉田之度可得穀二百萬石以上穀從渭上與關中無異而底柱之東可毋復漕上以為然發卒數萬人作渠田數歲河移徙渠不利田者不能償種久之河東渠田廢豫越人令少府以為稍入其後人有上書欲通褒斜道及漕事下御史大夫張湯湯問之言抵蜀從故道故道多阪回遠今穿褒斜道少阪近四百里而褒水通沔斜水通渭皆可以行船漕漕從南陽上沔入褒絶水至斜間百餘里以車轉從斜下渭如此漢中穀可致而山東從沔無限便於底柱之漕且褒斜材木竹箭之饒擬於巴蜀上以為然拜湯子卬為漢中守發數萬人作褒斜道五百餘里道果便近而水多湍石不可漕其後嚴熊言臨晉民願穿洛以溉重泉以東萬餘頃故惡地誠即得水可令畝十石於是為發卒萬人穿渠自徵引洛水至商顏下岸善崩乃鑿井深者四十餘丈往往為井井下相通行水水隤以絶商顏東至山領十餘里間井渠之生自此始穿得龍骨故名曰龍首渠作之十餘歲渠頗通猶未得其饒自河決瓠子後二十餘歲歲因以數不登而梁楚之地尤甚上既封禪巡祭山川其明年乾封少雨上乃使汲仁郭昌發卒數萬人塞瓠子決河於是上以用事萬里沙則還自臨決河湛白馬玉璧令群臣從官自將軍以下皆負薪置決河是時東郡燒草以故薪柴少而下淇園之竹以為揵上既臨河決悼功之不成乃作歌曰瓠子決兮將奈何浩浩洋洋慮殫為河殫為河兮地不得寧功無已時兮吾山平吾山平兮巨野溢魚弗鬱兮柏冬日正道弛兮離常流蛟龍騁兮放遠遊歸舊川兮神哉沛不封禪兮安知外皇謂河公兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿久不反兮水維緩一曰河湯湯兮激潺湲北渡回兮迅流難搴長茭兮湛美玉河公許兮薪不屬薪不屬兮衛人罪燒蕭條兮噫乎何以御水隤林竹兮揵石災宣防塞兮萬福來於是卒塞瓠子築宮其上名曰宣防而道河北行二渠復禹舊迹而梁楚之地復寧無水災自是之後用事者爭言水利朔方西河河西酒泉皆引河及川谷以溉田而關中靈軹成國湋渠引諸川汝南九江引淮東海引巨定泰山下引汶水皆穿渠為溉田各萬餘頃它小渠及陂山通道者不可勝言也自鄭國渠起至元鼎六年百三十六歲而兒寬為左內史奏請穿鑿六輔渠以益溉鄭國傍高卬之田上曰農天下之本也泉流灌寖所以育五穀也左右內史地名山川原甚衆細民未知其利故為通溝瀆畜陂澤所以備旱也今內史稻田租挈重不與郡同其議減令吏民勉農盡地利平繇行水勿使失時後十六歲太始二年趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉臿為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口言此兩渠饒也是時方事胸奴興功利言便宜者甚衆齊人延年上書言河出昆侖經中國注勃海是其地勢西北高而東南下也可案圖書觀地形令水工準高下開大河上領出之胡中東注之海如此關東長無水災北邊不憂胸奴可以省隄防備塞士卒轉輸胡寇侵盜覆軍殺將暴骨原野之患天下常備胸奴而不憂百越者以其水絶壤斷也此功一成萬世大利書奏上壯之報曰延年計議甚深然河乃大禹所道也聖人作事為萬世功通於神明恐難改更自塞宣房後河復北決於館陶分為屯氏河東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兗州以南六郡無水憂宣帝地節中光祿大夫郭昌使行河北曲三所水流之勢皆邪直貝丘縣恐水盛隄防不能禁乃各更穿渠直東經東郡界中不令北曲渠通利百姓安之元帝永光五年河決清河靈鳴犢口而屯氏河絶成帝初清河都尉馮逡奏言郡承河下流與兗州東郡分水為界城郭所居尤卑下土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖高增隄防終不能泄如有霖雨旬日不霽必盈溢靈鳴犢口在清河東界所在處下雖令通利猶不能為魏郡清河減損水害禹非不愛民力以地形有勢故穿九河今既滅難明屯氏河不流行七十餘年新絶未久其處易浚又其口所居高於以分流景祐殿本都有流字殺水力道里便宜可復浚以助大河泄暴水備非常又地節時郭昌穿直渠後三歲河水更從故第二曲間北可六里復南合今其曲勢復邪直貝丘百姓寒心宜復穿渠東行不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白博士許商治尚書善為算能度功用遣行視以為屯氏河盈溢所為方用度不足可且勿浚後三歲河果決於館陶及東郡金隄泛溢兗豫入平原千乘濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所御史大夫尹忠對方略疏闊上切責之忠自殺遣大司農非調調均錢穀河決所灌之郡謁者二人發河南以東漕船五百艘徙民避水居丘陵九萬七千餘口河隄使者王延世使塞以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成上曰東郡河決流漂二州校尉延世隄防三旬立塞其以五年為河平元年卒治河者為著外繇六月惟延世長於計策功費約省用力日寡朕甚嘉之其以延世為光祿大夫秩中二千石賜爵關內侯黃金百斤後二歲河復決平原流入濟南千乘所壞敗者半建始時復遣王延世治之杜欽説大將軍王鳳以為前河決丞相史楊焉言延世受焉術以塞之蔽不肯見今獨任延世延世見前塞之易恐其慮害不深又審如焉言延世之巧反不如焉且水勢各異不博議利害而任一人如使不及今冬成來春桃華水盛必羡溢有填淤反壤之害如此數郡種不得下民人流散盜賊將生雖重誅延世無益於事宜遣焉及將作大匠許商諫大夫乘馬延年雜作延世與焉必相破壞深論便宜以相難極商延年皆明計算能商功利足以分別是非擇其善而從之必有成功鳳如欽言白遣焉等作治六月乃成復賜延世黃金百斤治河卒非受平賈者為著外繇六月後九歲鴻嘉四年楊焉言從河上下患底柱隘可鐫廣之上從其言使焉鐫之鐫之裁沒水中不能去而令水益湍怒為害甚於故是歲勃海清河信都河水湓溢灌縣邑三十一敗官亭民舍四萬餘所河隄都尉許商與丞相史孫禁共行視圖方略禁以為今河溢之害數倍於前決平原時今可決平原金隄間開通大河令入故篤馬河至海五百餘里水道浚利又乾三郡水地得美田且二十餘萬頃足以償所開傷民田廬處又省吏卒治隄救水歲三萬人以上許商以為古説九河之名有徒駭胡蘇鬲津今見在成平東光鬲界中自鬲以北至徒駭間相去二百餘里今河雖數移徙不離此域孫禁所欲開者在九河南篤馬河失水之迹處勢平夷旱則淤絶水則為敗不可許公卿皆從商言先是谷永以為河中國之經瀆聖王興則出圖書王道廢則竭絶今潰溢橫流漂沒陵阜異之大者也修政以應之災變自除是時李尋解光亦言陰氣盛則水為之長故一日之間晝減夜增江河滿溢所謂水不潤下雖常於卑下之地猶日月變見於朔望明天道有因而作也衆庶見王延世蒙重賞競言便巧不可用議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水勢河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌師丹等數言百姓可哀上數遣使者處業振贍之哀帝初平當使領河隄奏言九河今皆置滅按經義治水有決河深川而無隄防雍塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜博求能浚川疏河者下丞相孔光大司空何武奏請部剌史三輔三河弘農太守舉吏民能者莫有應書待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水勢所不及大川無防小水得入陂障卑下以為汙澤使秋水多得有所休息左右遊波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊蕩時至而去則填淤肥美民耕田之或久無害稍築室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防狹者去水數百步遠者數里近黎隄南故大金隄從河西西北行至西山南頭乃折東與東山相屬民居金隄東為廬舍住王念孫説住當作往往王念孫説住當作往十餘歲更起隄從東山南頭直南與故大隄會又內黃界中有澤方數十里環之有隄往十餘歲太守以賦民民今起廬舍其中此臣親所見者也東郡白馬故大隄亦復數重民皆居其間從黎陽北盡魏界故大隄去河遠者數十里內亦數重此皆前世所排也河從河內北至黎陽為石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里間河再西三東迫厄如此不得安息今行上策徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄勢不能遠泛濫期月自定難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨昔大禹治水山陵當路者毀之故鑿龍門辟伊闕析底柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄歲費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位使神人各處其所而不相姦且以大漢方制萬里豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人法然亦救敗術也難者將曰河水高於平地歲增隄防猶尚決溢不可以開渠臣竊按視遮害亭西十八里至淇水口乃有金隄高一丈自是東地稍下隄稍高至遮害亭高四五丈往六七歲河水大盛增丈七尺壞黎陽南郭門入至隄下水未踰隄二尺所從隄上北望河高出民屋百姓皆走上山水留十三日隄潰二所景祐殿本無二所二字朱一新説二字涉上文而衍吏民塞之臣循隄上行視水勢南七十餘里至淇口水適至隄半計出地上五尺所今可從淇口以東為石隄多張水門初元中遮害亭下河去隄足數十步至今四十餘歲適至隄足由是言之其地堅矣恐議者疑河大川難禁制滎陽漕渠足以下景祐汲古殿局本都作卜卜景祐汲古殿局本都作卜之其水門但用木與土耳今據堅地作石隄勢必完安冀州渠首盡當卬此水門治渠非穿地也但為東方一隄北行三百餘里入漳水中其西因山足高地諸渠皆往往股引取之旱則開東方下水門溉冀州水則開西方高門分河流通渠有三利不通有三害民常罷於救水半失作業水行地上湊潤上徹民則病溼氣木皆立枯鹵不生穀決溢有敗為魚鱉食此三害也若有渠溉則鹽鹵下溼填淤加肥故種禾麥更為粳稻高田五倍下田十倍轉漕舟船之便此三利也今瀕河隄吏卒郡數千人代買薪石之費歲數千萬足以通渠成水門又民利其溉灌相率治渠雖勞不罷民田適治河隄亦成此誠富國安民興利除害支數百歲故謂之中策若乃繕完故隄增卑倍薄勞費無已數逢其害此最下策也王莽時徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水猥盛則放溢少稍自索雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里者可空此地勿以為官亭民室而已大司馬史長安張戎言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥今西方諸郡以至京師東行民皆引河渭山川水溉田春夏乾燥少水時也故使河流遲貯淤而稍淺雨多水暴至則溢決而國家數隄塞之稍益高於平地猶築垣而居水也可各順從其性毋復灌溉則百川流行水道自利無溢決之害矣御史臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海勃海地高於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出浸數百里九河之地已為海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜卻徙完平處更開空使緣西山足乘高地而東北入海乃無水災沛郡桓談為司空掾典其議為甄豐言凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無産業民空居與行役同當衣食衣食縣官而為之作乃兩便可以上繼禹功下除民疾王莽時但崇空語無施行者贊曰古人有言微禹之功吾其魚乎中國川原以百數莫著於四瀆而河為宗孔子曰多聞而志之知之次也國之利害故備論其事
