body:
  text: 嚴朱吾丘主父徐嚴終王賈傳第三十四上嚴助會稽吳人嚴夫子子也或言族家子也郡舉賢良對策百餘人武帝善助對繇是獨擢助為中大夫後得朱買臣吾丘壽王司馬相如主父偃徐樂嚴安東方朔枚皋膠倉終軍嚴蔥奇等並在左右是時征代四夷開置邊郡軍旅數發內改制度朝廷多事婁舉賢良文學之士公孫弘起徒步數年至丞相開東閣延賢人與謀議朝覲奏事因言國家便宜上令助等與大臣辯論中外相應以義理之文大臣數詘其尤親幸者東方朔枚皋嚴助吾丘壽王司馬相如相如常稱疾避事朔皋不根持論上頗俳優畜之唯助與壽王見任用而助最先進建元三年閩越舉兵圍東甌東甌告急於漢時武帝年未二十以問太尉田蚡蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬於是助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽而棄之何但越也今小國以窮困來告急天子不振尚安所愬又何以子萬國乎上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵會稽會稽守欲距法不為發助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵罷後三歲閩越復興兵擊南越南越守天子約不敢擅發兵而上書以聞上多其義大為發興遣兩將軍將兵誅閩越淮南王安上書諫曰陛下臨天下布德施惠緩刑罰薄賦斂哀鰥寡恤孤獨養耆老振匱乏盛德上隆和澤下洽近者親附遠者懷德天下攝然人安其生自以沒身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地劗髮文身之民也不可以冠帶之國法度理也自三代之盛胡越不與受正朔非彊弗能服威弗能制也以為不居之地不牧之民不足以煩中國也故古者封內甸服封外侯服侯衛賓服蠻夷要服戎狄荒服遠近勢異也自漢初定已來七十二年吳越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中習於水鬭便於用舟地深昧而多水險中國之人不知其勢阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里阻險林叢弗能盡著視之若易行之甚難天下賴宗廟之靈方內大寧戴白之老不見兵革民得夫婦相守父子相保陛下之德也越人名為藩臣貢酎之奉不輸大內一卒之用不給上事自相攻擊而陛下發兵救之是反以中國而勞蠻夷也且越人愚戇輕薄負約反覆其不用天子之法度非一日之積也壹不奉詔舉兵誅之臣恐後兵革無時得息也間者數年歲比不登民待賣爵贅子以接衣食賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而隃領挓舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時歐泄霍亂之病相隨屬也曾未施兵接刃死傷者必眾矣前時南海王反陛下先臣使將軍間忌將兵擊之以其軍降處之上淦後復反會天暑多雨樓舩卒水居擊櫂未戰而疾死者過半親老涕泣孤子謕號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣臣聞軍旅之後必有凶年言民之各以其愁苦之氣薄陰陽之和感天地之精而災氣為之生也陛下德配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方內無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開鼂不及夕臣安竊為陛下重之不習南方地形者多以越為人眾兵彊能難邊城淮南全國之時多為邊吏臣竊聞之與中國異限以高山人迹所絕車道不通天地所以隔外內也其入中國必下領水領水之山峭峻漂石破舟不可以大舩載食糧下也越人欲為變必先田餘干界中積食糧及入伐材治船邊城守候誠謹越人有入伐材者輒收捕焚其積聚雖百越奈邊城何且越人緜力薄材不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不能其水土也臣聞越甲卒不下數十萬所以入之五倍乃足輓車奉饟者不在其中南方暑溼近夏癉熱暴露水居蝮蛇蠚生疾癘多作兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弒而殺之甲以誅死其民未有所屬陛下若欲來內處之中國使重臣臨存施德垂賞以招致之此必攜幼扶老以歸聖德若陛下無所用之則繼其絕世存其亡國建其王侯以為畜越此必委質為藩臣世共貢職陛下以方寸之印丈二之組填撫方外不勞一卒不頓一戟而威德並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兔逃入山林險阻背而去之則復相群聚留而守之歷歲經年則士卒罷勌食糧乏絕男子不得耕稼樹種婦人不得紡績織紝丁壯從軍老弱轉餉居者無食行者無糧民苦兵事亡逃者必眾隨而誅之不可勝盡盜賊必起臣聞長老言秦之時嘗使尉屠睢擊越又使監祿鑿渠通道越人逃入深山林叢不可得攻留軍屯守空地曠日引久士卒勞倦越出擊之秦兵大破乃發適戍以備之當此之時外內騷動百姓靡敝行者不還往者莫反皆不聊生亡逃相從群為盜賊於是山東之難始興此老子所謂師之所處荊棘生之者也兵者凶事一方有急四面皆從臣恐變故之生姦邪之作由此始也周易曰高宗伐鬼方三年而克之鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後克言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也如使越人蒙徼幸以逆執事之顏行廝輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之陛下以四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾人徒之眾足以奉千官之共租稅之收足以給乘輿之御玩心神明秉執聖道負黼依馮玉几南面而聽斷號令天下四海之內莫不嚮應陛下垂德惠以覆露之使元元之民安生樂業則澤被萬世傳之子孫施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之閒而煩汗馬之勞乎詩云王猶允塞徐方既來言王道甚大而遠方懷之也臣聞之農夫勞而君子養焉愚者言而智者擇焉臣安幸得為陛下守藩以身為鄣蔽人臣之任也邊境有警愛身之死而不畢其愚非忠臣也臣安竊恐將吏之以十萬之師為一使之任也是時漢兵遂出未踰領適會閩越王弟餘善殺王以降漢兵罷上嘉淮南之意美將卒之功乃令嚴助諭意風指於南越南越王頓首曰天子乃幸興兵誅閩越死無以報即遣太子隨助入侍助還又諭淮南曰皇帝問淮南王使中大夫玉上書言事聞之朕奉先帝之休德夙興夜寐明不能燭重以不德是以比年凶菑害眾夫以眇眇之身託于王侯之上內有飢寒之民南夷相攘使邊騷然不安朕甚懼焉今王深惟重慮明太平以弼朕失稱三代至盛際天接地人迹所及咸盡賓服藐然甚慚嘉王之意靡有所終使中大夫助諭朕意告王越事助諭意曰今者大王以發屯臨越事上書陛下故遣臣助告王其事王居遠事薄遽不與王同其計朝有闕政遺王之憂陛下甚恨之夫兵固凶器明主之所重出也然自五帝三王禁暴止亂非兵未之聞也漢為天下宗操殺生之柄以制海內之命危者望安亂者卬治今閩越王狼戾不仁殺其骨肉離其親戚所為甚多不義又數舉兵侵陵百越并兼鄰國以為暴彊陰計奇策入燔尋陽樓船欲招會稽之地以踐句踐之迹今者邊又言閩王率兩國擊南越陛下為萬民安危久遠之計使人諭告之曰天下安寧各繼世撫民禁毋敢相并有司疑其以虎狼之心貪據百越之利或於逆順不奉明詔則會稽豫章必有長患且天子誅而不伐焉有勞百姓苦士卒乎故遣兩將屯於境上震威武揚聲鄉屯曾未會天誘其衷閩王隕命輒遣使者罷屯毋後農時南越王甚嘉被惠澤蒙休德願革心易行身從使者入謝有狗馬之病不能勝服故遣太子嬰齊入侍病有瘳願伏北闕望大廷以報盛德閩王以八月舉兵於冶南士卒罷倦三王之眾相與攻之因其弱弟餘善以成其誅至今國空虛遣使者上符節請所立不敢自立以待天子之明詔此一舉不挫一兵之鋒不用一卒之死而閩王伏辜南越被澤威震暴王義存危國此則陛下深計遠慮之所出也事效見前故使臣助來諭王意於是王謝曰雖湯伐桀文王伐崇誠不過此臣安妄以愚意狂言陛下不忍加誅使使者臨詔臣安以所不聞臣不勝厚幸助由是與淮南王相結而還上大說助侍燕從容上問助居鄉里時助對曰家貧為友壻富人所辱上問所欲對願為會稽太守於是拜為會稽太守數年不聞問賜書曰制詔會稽太守君厭承明之廬勞侍從之事懷故土出為郡吏會稽東接於海南近諸越北枕大江間者闊焉久不聞問具以春秋對毋以蘇秦從橫助恐上書謝稱春秋天王出居于鄭不能事母故絕之臣事君猶子事父母也臣助當伏誅陛下不忍加誅願奉三年計最詔許因留侍中有奇異輒使為文及作賦頌數十篇後淮圣南王來朝厚賂遺助交私論議及淮南王反事與助相連上薄其罪欲勿誅廷尉張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市朱買臣字翁子吳人也家貧好讀書不治產業常艾薪樵賣以給食擔束薪行且誦書其妻亦負戴相隨數止買臣毋歌嘔道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今已四十餘矣女苦日久待我富貴報女功妻恚怒曰如公等終餓死溝中耳何能富貴買臣不能留即聽去其後買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣饑寒呼飯飲之後數歲買臣隨上計吏為卒將重車至長安詣闕上書書久不報待詔公車糧用乏上計吏卒更乞匄之會邑子嚴助貴幸薦買臣召見說春秋言楚詞帝甚說之拜買臣為中大夫與嚴助俱侍中是時方築朔方公孫弘諫以為罷敝中國上使買臣難詘弘語在弘傳後買臣坐事免久之召待詔是時東越數反覆買臣因言故東越王居保泉山一人守險千人不得上今聞東越王更徙處南行去泉山五百里居大澤中今發兵浮海直指泉山陳舟列兵席卷南行可破滅也上拜買臣會稽太守上謂買臣曰富貴不歸故鄉如衣繡夜行今子何如買臣頓首辭謝詔買臣到郡治樓船備糧食水戰具須詔書到軍與俱進初買臣免待詔常從會稽守邸者寄居飯食拜為太守買臣衣故衣懷其印綬步歸郡邸直上計時會稽吏方相與群飲不視買臣買臣入室中守邸與共食食且飽少見其綬守邸怪之前引其綬視其印會稽太守章也守邸驚出語上計掾吏皆醉大呼曰妄誕耳守邸曰試來視之其故人素輕買臣者入內視之還走疾呼曰實然坐中驚駭白守丞相推排陳列中庭拜謁買臣徐出戶有頃長安廄吏乘駟馬車來迎買臣遂乘傳去會稽聞太守且至發民除道縣吏並送迎車百餘乘入吳界見其故妻妻夫治道買臣駐車呼令後車載其夫妻到太守舍置園中給食之居一月妻自經死買臣乞其夫錢令葬悉召見故人與飲食諸嘗有恩者皆報復焉居歲餘買臣受詔將兵與橫海將軍韓說等俱擊破東越有功徵入為主爵都尉列於九卿數年坐法免官復為丞相長史張湯為御史大夫始買臣與嚴助俱侍中貴用事湯尚為小吏趨走買臣等前後湯以廷尉治淮南獄排陷嚴助買臣怨湯及買臣為長史湯數行丞相事知買臣素貴故陵折之買臣見湯坐床上弗為禮買臣深怨常欲死之後遂告湯陰事湯自殺上亦誅買臣買臣子山拊官至郡守右扶風吾丘壽王字子贛趙人也年少以善格五召待詔詔使從中大夫董仲舒受春秋高材通明遷侍中中郎坐法免上書謝罪願養馬黃門上不許後願守塞扞寇難復不許久之上疏願擊匈奴詔問狀壽王對良善復召為郎稍遷會東郡盜賊起拜為東郡都尉上以壽王為都尉不復置太守是時軍旅數發年歲不熟多盜賊詔賜壽王璽書曰子在朕前之時知略輻湊以為天下少雙海內寡二及至連十餘城之守任四千石之重職事並廢盜賊從橫甚不稱在前時何也壽王謝罪因言其狀後徵入為光祿大夫侍中丞相公孫弘奏言民不得挾弓弩十賊彍弩百吏不敢前盜賊不輒伏辜免脫者眾害寡而利多此盜賊所以蕃也禁民不得挾弓弩則盜賊執短兵短兵接則眾者勝以眾吏捕寡賊其勢必得盜賊有害無利則莫犯法刑錯之道也臣愚以為禁民毋得挾弓弩便上下其議壽王對曰臣聞古者作五兵非以相害以禁暴討邪也安居則以制猛獸而備非常有事則以設守衛而施行陣及至周室衰微上無明王諸侯力政彊侵弱眾暴寡海內抏敝巧詐並生是以知者陷愚勇者威怯苟以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數於是秦兼天下廢王道立私議滅詩書而首法令去仁恩而任刑戮墮名城殺豪桀銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊犯法滋眾盜賊不勝至於赭衣塞路群盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明德建太平舉俊材興學官三公有司或由窮巷起白屋裂地而封宇內日化方外鄉風然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也孔子曰吾何執執射乎大射之禮自天子降及庶人三代之道也詩云大侯既抗弓矢斯張射夫既同獻爾發功言貴中也愚聞聖王合射以明教矣未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮大不便書奏上以難丞相弘弘詘服焉及汾陰得寶鼎武帝嘉之薦見宗廟臧於甘泉宮群臣皆上壽賀曰陛下得周鼎壽王獨曰非周鼎上聞之召而問之曰今朕得周鼎群臣皆以為然壽王獨以為非何也有說則可無說則死壽王對曰臣安敢無說臣聞周德始乎后稷長於公劉大於大王成於文武顯於周公德澤上昭天下漏泉無所不通上天報應鼎為周出故名曰周鼎今漢自高祖繼周亦昭德顯行布恩施惠六合和同至於陛下恢廓祖業功德愈盛天瑞並至珍祥畢見昔秦始皇親出鼎於彭城而不能得天祚有德而寶鼎自出此天之所以與漢乃漢寶非周寶也上曰善群臣皆稱萬歲是日賜壽王黃金十斤後坐事誅主父偃齊國臨菑人也與長短從橫術晚乃學易春秋百家之言游齊諸子間諸儒生相與排儐不容於齊家貧假貣無所得北游燕趙中山皆莫能厚客甚困以諸侯莫足游者元光元年乃西入關見衛將軍衛將軍數言上上不省資用乏留久諸侯賓客多厭之乃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴曰臣聞明主不惡切諫以博觀忠臣不避重誅以直諫是故事無遺策而功流萬世今臣不敢隱忠避死以效愚計願陛下幸赦而少察之司馬法曰國雖大好戰必亡天下雖平忘戰必危天下既平天子大愷春蒐秋獮諸侯春振旅秋治兵所以不忘戰也且怒者逆德也兵者凶器也爭者末節也古之人君一怒必伏尸流血故聖王重行之夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威蠶食天下并吞戰國海內為一功齊三代務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絕運糧以行重不及事得其地不足以為利得其民不可調而守也勝必棄之非民父母靡敝中國甘心匈奴非完計也秦皇帝不聽遂使蒙恬將兵而攻胡卻地千里以河為境地固澤鹵不生五穀然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人眾之不足兵革之不備哉其勢不可也又使天下飛芻輓粟起於黃腄琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道死者相望蓋天下始叛也及至高皇帝定天下略地於邊聞匈奴聚代谷之外而欲擊之御史成諫曰不可夫匈奴獸聚而鳥散從之如搏景今以陛下盛德攻匈奴臣竊危之高帝不聽遂至代谷果有平城之圍高帝悔之乃使劉敬往結和親然後天下亡干戈之事故兵法曰興師十萬日費千金秦常積眾數十萬人雖有覆軍殺將係虜單于適足以結怨深讎不足以償天下之費夫匈奴行盜侵敺所以為業天性固然上自虞夏殷周固不程督禽獸畜之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所疾苦也且夫兵久則變生事苦則慮易使邊境之民靡敝愁苦將吏相疑而外市故尉佗章邯得成其私而秦政不行權分二子此得失之效也故周書曰安危在出令存亡在所用願陛下孰計之而加察焉是時徐樂嚴安亦俱上書言世務書奏上召見三人謂曰公皆安在何相見之晚也乃拜偃樂安皆為郎中偃數上疏言事遷遏者中郎中大夫歲中四遷偃說上曰古者諸侯地不過百里彊弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其彊而合從以逆京師今以法割削則逆節萌起前日朝錯是也今諸侯子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計又說上曰茂陵初立天下豪桀兼并之家亂眾民皆可徙茂陵內實京師外銷姦猾此所謂不誅而害除上又從之尊立衛皇后及發燕王定國陰事偃有功焉大臣皆畏其口賂遺累千金或說偃曰大橫偃曰臣結髮游學四十餘年身不得遂親不以為子昆弟不收賓客棄我我阸日久矣丈夫生不五鼎食死則五鼎亨耳吾日暮故倒行逆施之偃盛言朔方地肥饒外阻河蒙恬築城以逐匈奴內省轉輸戍漕廣中國滅胡之本也上覽其說下公卿議皆言不便公孫弘曰秦時嘗發三十萬眾築北河終不可就已而棄之朱買臣難詘弘遂置朔方本偃計也元朔中偃言齊王內有淫失之行上拜偃為齊相至齊徧召昆弟賓客散五百金予之數曰始吾貧時昆弟不我衣食賓客不我內門今吾相齊諸君迎我或千里吾與諸君絕矣毋復入偃之門乃使人以王與姊姦事動王王以為終不得脫恐效燕王論死乃自殺偃始為布衣時嘗游燕趙及其貴發燕事趙王恐其為國患欲上書言其陰事為居中不敢發及其為齊相出關即使人上書告偃受諸侯金以故諸侯子多以得封者及齊王以自殺聞上大怒以為偃劫其王令自殺乃徵下吏治偃服受諸侯之金實不劫齊王令自殺上欲勿誅公孫弘爭曰齊王自殺無後國除為郡入漢偃本首惡非誅偃無以謝天下乃遂族偃偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞之以車為長者徐樂燕無終人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊尺土之地身非王公大人名族之後無鄉曲之譽非有孔曾墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不修此三者陳涉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德未衰而安土樂俗之民眾故諸侯無竟外之助此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之勢雖布衣窮處之士或首難而危海內陳涉是也況三晉之君或存乎天下雖未治也誠能無土崩之勢雖有彊國勁兵不得還踵而身為禽吳楚是也況群臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也間者關東五穀數不登年歲未復民多窮困重之以邊境之事推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之勢也故賢主獨觀萬化之原明於安危之機修之廟堂之上而銷未形之患也其要期使天下無土崩之勢而已矣故雖有彊國勁兵陛下逐走獸射飛鳥弘游燕之囿淫從恣之觀極馳騁之樂自若金石絲竹之聲不絕於耳帷幄之私俳優朱儒之笑不乏於前而天下無宿憂名何必夏子俗何必成康雖然臣竊以為陛下天然之質寬仁之資而誠以天下為務則禹湯之名不難侔而成康之俗未必不復興也此二體者立然後處尊安之實揚廣譽於當世親天下而服四夷餘恩遺德為數世隆南面背依攝袂而揖王公此陛下之所服也臣聞圖王不成其敝足以安安則陛下何求而不得何威而不成奚征而不服哉
