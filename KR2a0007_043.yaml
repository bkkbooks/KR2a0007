body:
  text: 賈鄒枚路傳第二十一賈山潁川人也祖父袪故魏王時博士弟子也山受學袪所言涉獵書記不能為醇儒嘗給事潁陰侯為騎孝文時言治亂之道借秦為諭名曰至言其辭曰臣聞為人臣者盡忠竭愚以直諫主不避死亡之誅者臣山是也臣不敢以久遠諭願借秦以為諭唯陛下少加意焉夫布衣韋帶之士修身於內成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數百姓任罷赭衣半道群盜滿山使天下之人戴目而視傾耳而聽一夫大呼天下嚮應者陳勝是也秦非徒如此也起咸陽而西至雍離宮三百鍾鼓帷帳不移而具又為阿房之殿殿高數十仞東西五里南北千步從車羅騎四馬騖馳旌旗不橈為宮室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉合采金石冶銅錮其內漆塗其外被以珠玉飾以翡翠中成觀遊上成山林為葬薶之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中臣聞忠臣之事君也言切直則不用而身危不切直則不可以明道故切直之言明主所欲急聞忠臣之所以蒙死而竭知也地之磽者雖有善種不能生焉江皋河瀕雖有惡種無不猥大昔者夏商之季世雖關龍逢箕子比干之賢身死亡而道不用文王之時豪俊之士皆得竭其智芻蕘採薪之人皆得盡其力此周之所以興也故地之美者善養禾君之仁者善養士雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也勢重非特萬鈞也開道而求諫和顏色而受之用其言而顯其身士猶恐懼而不敢自盡又乃況於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦針諫瞽誦詩諫公卿比諫士傳言諫庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之內其義莫不為臣然而養三老於大學親執醬而餽執爵而酳祝䭇在前祝鯁在後公卿奉杖大夫進履舉賢以自輔弼求修正之士使直諫故以天子之尊尊養三老視孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無饜也商人庶人誹謗己而改之從善無不聽也昔者秦政力并萬國富有天下破六國以為郡縣築長城以為關塞秦地之固大小之勢輕重之權其與一家之富一夫之強胡可勝計也然而兵破於陳涉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也昔者周蓋千八百國以九州之民養千八百國之君用民之力不過歲三日什一而籍君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所以自養者馳騁弋獵之娛天下弗能供也勞罷者不得休息飢寒者不得衣食亡罪而死刑者無所告訴人與之為怨家與之為讎故天下壞也秦皇帝身在之時天下已壞矣而弗自知也秦皇帝東巡狩至會稽琅邪刻石著其功自以為過堯舜統縣石鑄鍾虡篩土築阿房之宮自以為萬世有天下也古者聖王作諡三四十世耳雖堯舜禹湯文武絫世廣德以為子孫基業無過二三十世者也秦皇帝曰死而以諡法是父子名號有時相襲也以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝者欲以一至萬也秦皇帝計其功德度其後嗣世世無窮然身死才數月耳天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡進諫之士縱恣行誅退誹謗之人殺直諫之士是以道諛偷合苟容比其德則賢於堯舜課其功則賢於湯武天下已潰而莫之告也詩曰匪言不能胡此畏忌聽言則對譖言則退此之謂也又曰濟濟多士文王以寧天下未嘗亡士也然而文王獨言以寧者何也文王好仁則仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心不能盡其心則不能盡其力不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之亡數死則往弔哭之臨其小斂大斂已棺塗而後為之服錫衰麻絰而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣服法服端容貌正顏色然後見之故臣下莫敢不竭力盡死以報其上功德立於後世而令聞不忘也今陛下念思祖考術追厥功圖所以昭光洪業休德使天下舉賢良方正之士天下皆欣欣焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休德今方正之士皆在朝廷矣又選其賢者使為常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也諸侯聞之又必怠於政矣陛下即位親自勉以厚天下損食膳不聽樂減外徭衛卒止歲貢省廄馬以賦縣傳去諸苑以賦農夫出帛十萬餘匹以振貧民禮高年九十者一子不事八十者二算不事賜天下男子爵大臣皆至公卿發御府金賜大臣宗族亡不被澤者赦罪人憐其亡髮賜之巾憐其衣赭書其背父子兄弟相見也而賜之衣平獄緩刑天下莫不説喜是以元年膏雨降五穀登此天之所以相陛下也刑輕於它時而犯法者寡衣食多於前年而盜賊少此天下之所以順陛下也臣聞山東吏布詔令民雖老羸癃疾扶杖而往聽之願少須臾毋死思見德化之成也今功業方就各聞方昭四方鄉風今從豪俊之臣方正之士直與之日日獵射擊兔伐狐以傷大業絶天下之望臣竊悼之詩曰靡不有初鮮克有終臣不勝大願願少衰射獵以夏歲二月定明堂造太學修先王之道風行俗成萬世之基定然後唯陛下所幸耳古者大臣不媟故君子不常見其齊嚴之色肅敬之容大臣不得與宴遊方正修潔之士不得從射獵使皆務其方以高其節則群臣莫敢不正身修行盡心以稱大禮如此則陛下之道尊敬功業施於四海垂於萬世子孫矣誠不如此則行日壞而榮日滅矣夫士修之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴遊與大臣方正朝廷論議夫遊不失樂朝不失禮議不失計軌事之大者也其後文帝除鑄錢令山復上書諫以為變先帝法非是又訟淮南王無大罪宜急令反國又言柴唐子為不善足以戒章下詰責對以為錢者亡用器也而可以易富貴富貴者人主之操柄也令民為之是與人主共操柄不可長也其言多激切善指事意然終不加罰所以廣諫爭之路也其後復禁鑄錢云鄒陽齊人也漢興諸侯王皆自治民聘賢吳王濞招致四方遊士陽與吳嚴忌枚乘等俱仕吳皆以文辨著名久之吳王以太子事怨望稱疾不朝陰有邪謀陽奏書諫為其事尚隱惡指斥言故先引秦為諭因道胡越齊趙淮南之難然後乃致其意其辭曰臣聞秦倚曲臺之宮懸衡天下畫地而不犯兵加胡越至其晚節末路張耳陳勝連從兵之據以叩函谷咸陽遂危何則列郡不相親萬室不相救也今胡數涉北河之外上覆飛鳥下不見伏菟鬭城不休救兵不止死者相隨輦車相屬轉粟流輸千里不絶何則強趙責於河間六齊望於惠后城陽顧於盧博三淮南之心思墳墓大王不憂臣恐救兵之不專胡馬遂進窺於邯鄲越水長沙還舟青陽雖使梁并淮陽之兵下淮東越廣陵以遏越人之糧漢亦折西河而下北守漳水以輔大國胡亦益進越亦益深此臣之所為大王患也臣聞交龍襄首奮翼則浮雲出流霧雨咸集聖王底節修德則遊談之士歸義思名今臣盡智畢議易精極慮則無國不可姦飾固陋之心則何王之門不可曳長裾乎然臣所以歷數王之朝背淮千里而自致者非惡臣國而樂吳民也竊高下風之行尤説大王之義故願大王之無忽察聽其志臣聞鷙鳥絫百不如一鶚夫全趙之時武力鼎士袨服叢臺之下者一旦成市而不能止幽王之湛患淮南連山東之俠死士盈朝不能還厲王之西也然而計議不得雖諸賁不能安其位亦明矣故願大王審畫而已始孝文皇帝據關入立寒心銷志不明求衣自立天子之後使東牟朱虛東褒義父之後深割嬰兒王之壤子王梁代益以淮陽卒仆濟北囚弟於雍者豈非象新垣平等哉今天子新據先帝之遺業左規山東右制關中變權易勢大臣難知大王弗察臣恐周鼎復起於漢新垣過計於朝則我吳遺嗣不可期於世矣高皇帝燒棧道水章邯兵不留行收弊民之倦東馳函谷西楚大破水攻則章邯以亡其城陸擊則荊王以失其地此皆國家之不幾者也願大王孰察之吳王不內其言是時景帝少弟梁孝王貴盛亦待士於是鄒陽枚乘嚴忌知吳不可説皆去之梁從孝王遊陽為人有智略慷慨不苟合介於羊勝公孫詭之間勝等疾陽惡之孝主孝王怒下陽吏將殺之陽客遊以讒見禽恐死而負絫乃從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荊軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之事太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭誠畢議願知左右不明卒從吏訊為世所疑是使荊軻衛先生復起而燕秦不寤也願大王孰察之昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子陽狂接輿避世恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽毋使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷臣始不信乃今知之願大王孰察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也故樊於期逃秦之燕藉荊軻首以奉丹事王奢去齊之魏臨城自剄以卻齊而存魏夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也是以蘇秦不信於天下為燕尾生白圭戰亡六城為魏取中山何則誠有以相知也蘇秦相燕人惡之燕王燕王按劍而怒食以駃騠白圭顯於中山人惡之於魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女無美惡入宮見妒士無賢不肖入朝見嫉昔司馬喜臏腳於宋卒相中山范睢拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妒之人也是以申徒狄蹈雍之河徐衍負石入海不容於世義不苟取比周於朝以移主上之心故百里奚乞食於道路繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素宦於朝借譽於左右然後二主用之哉感於心合於行堅如膠漆昆弟不能離豈惑於衆口哉故偏聽生姦獨任成亂昔魯聽季孫之説逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免於讒諛而二國以危何則衆口鑠金積毀銷骨也秦用戎人由余而伯中國齊用越人子臧而強威宣此二國豈係於俗牽於世繫奇偏之浮辭哉公聽並觀垂明當世故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣今人主誠能用齊秦之明後宋魯之聽則五伯不足侔而三王易為也是以聖王覺寤捐子之之心而不説田常之賢封比干之後修孕婦之墓故功業覆於天下何則欲善亡厭也夫晉文親其讎強伯諸侯齊桓用其仇而一匡天下何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立強天下卒車裂之越用大夫種之謀禽徑吳而伯中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚終與之窮達無愛於士則桀之犬可使吠堯跖之客可使刺由何況因萬乘之權假聖王之資乎然則荊軻湛七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以暗投人於道衆莫不按劍相眄者何則無因而至前也蟠木根柢輪囷離奇而為萬乘器者以左右先為之容也故無因而至前雖出隨珠和璧祗怨結而不見德有人先遊則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲按劍相眄之迹矣是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽乎卑辭之語不奪乎衆多之口故秦皇帝任中庶子蒙嘉之言以信荊軻而匕首竊發周文王獵涇渭載呂尚歸以王天下秦信左右而亡周用烏集而王何則以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沈諂諛之辭牽帷牆之制使不羈之士與牛驥同皂此鮑焦所以憤於世也臣聞盛飾入朝者不以私汙義底厲名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車今欲使天下寥廓之士籠於威重之權脅於位勢之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王孝王立出之卒為上客初勝詭欲使王求為漢嗣王又嘗上書願賜容車之地徑至長樂宮自使梁國士衆築作甬道朝太后爰盎等皆建以為不可天子不許梁王怒令人刺殺盎上疑梁殺之使者冠蓋相望責梁王梁王始與勝詭有謀陽爭以為不可故見讒枚先生嚴夫子皆不敢諫及梁事敗勝詭死孝王恐誅乃思陽言深辭謝之齎以千金令求方略解罪於上者陽素知齊人王先生年八十餘多奇計即往見語以其事王先王曰難哉人主有私怨深怒欲施必行之誅誠難解也以太后之尊骨肉之親猶不能止況臣下乎昔秦始皇有伏怒於太后群臣諫而死者以十數得茅焦為廓大義始皇非能説其言也乃自強從之耳茅焦亦廑脫死如毛氂耳故事所以難者也今子欲安之乎陽曰鄒魯守經學齊楚多辨知韓魏時有奇節吾將歷問之王先生曰子行矣還過我而西鄒陽行月餘莫能為謀還過王先生曰臣將西矣為如何王先生曰吾先日欲獻愚計以為衆不可蓋竊自薄陋不敢道也若子行必往見王長君士無過此者矣鄒陽發寤於心曰敬諾辭去不過梁徑至長安因客見王長君長君者王美人兄也後封為蓋侯鄒陽留數日乘間而請曰臣非為長君無使令於前故來侍也愚戇竊不自料願有謁也長君跪曰幸甚陽曰竊聞長君弟得幸後宮天下無有而長君行迹多不循道理者今爰盎事即窮竟梁王恐誅如此則太后怫鬱泣血無所發怒切齒側目於貴臣矣臣恐長君危於絫卵竊為足下憂之長君懼然曰將為之奈何陽曰長君誠能精為上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宮金城之固也又有存亡繼絶之功德布天下名施無窮願長君深自計之昔者舜之弟象日以殺舜為事及舜立為天子封之於有卑夫仁人之於兄弟無臧怒無宿怨厚親愛而已是以後世稱之魯公子慶父使僕人殺子般獄有所歸季友不探其情而誅焉慶父親殺閔公季子緩追免賊春秋以為親親之道也魯哀薑薨於夷孔子曰齊桓公法而不譎以為過也以是説天子徼幸梁事不奏長君曰諾乘間入而言之及韓安國亦見長公主事果得不治初吳王濞與七國謀反及發齊濟北兩國城守不行漢既破吳齊王自殺不得立嗣濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試為大王明説梁王通意天子説而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接強齊南牽吳越北脅燕趙此四分五裂之國權不足以自守徑不足以扞寇又非有奇怪云以待難也雖墜言於吳非其正計也昔者鄭祭仲許宋人立公子突以活其君非義也春秋記之為其以生易死以存易亡也鄉使濟北見情實示不從之端則吳必先歷齊畢濟北招燕趙而總之如此則山東之從結而無隙矣今吳楚之王練諸侯之兵驅白徒之衆西與天子爭衡濟北獨底節堅守不下使吳失與而無助跬步獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭強是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首絫足撫襟使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘袂而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大説使人馳以聞濟北王得不坐徙封於淄川枚乘字叔淮陰人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡舜無立錐之地以有天下禹無十戶之聚以王諸侯湯武之土不過百里上不絶三光之明下不傷百姓之心者有王術也故父子之道天性也忠臣不避重誅以直諫則事無遺策功流萬世臣乘願披腹心而效愚忠唯大王少加意念惻怛之心於臣乘言夫以一縷之任係千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎮之係絶於天不可復結隊入深淵難以復出其出不出間不容髮能聽忠臣之言百舉必脫必若所欲為危於絫卵難於上天變所欲為易於反掌安於太山今欲極天命之壽敝無窮之樂究萬乘之勢不出反掌之易以居泰山之安而欲乘絫卵之危走上天之難此愚臣之所以為大王惑也人性有畏其景而惡其迹者卻背而走迹愈多景愈疾不知就陰而止景滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之滄一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪而救火也養由基楚之善射者也去楊葉百步百發百中楊葉之大加百中焉可謂善射矣然其所止乃百步之內耳比於臣乘未知操弓持矢也福生有基禍生有胎納其基絶其胎禍何自來泰山之霤穿石單極之綆斷幹水非石之鑽索非木之鋸漸靡使之然也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生如蘖足可搔而絶手可擢而拔據其未生先其未形也磨礱底厲不見其損有時而盡種樹畜養不見其益有時而大積德絫行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而身行之此百世不易之道也吳王不納乘等去而之梁從孝王遊景帝即位御史大夫鼂錯為漢定制度損削諸侯吳王遂與六國謀反舉兵西鄉以誅錯為名漢聞之斬錯以謝諸侯枚乘復説吳王曰昔者秦西舉胡戎之難北備榆中之關南距羌筰之塞東當六國之從六國乘信陵之籍明蘇秦之約厲荊軻之威并力一心以備秦然秦卒禽六國滅其社稷而并天下是何也則地利不同而民輕重不等也今漢據全秦之地兼六國之衆修戎狄之義而南朝羌筰此其與秦地相什而民相百大王之所明知也今夫讒諛之臣為大王計者不論骨肉之義民之輕重國之大小以為吳禍此臣所以為大王患也夫舉吳兵以訾於漢譬猶蠅蚋之附群牛腐肉之齒利劍鋒接必無事矣天子聞吳率失職諸侯願責先帝之遺約今漢親誅其三公以謝前過是大王之威加於天下而功越於湯武也夫吳有諸侯之位而實富於天子有隱匿之名而居過於中國夫漢并二十四郡十七諸侯方輸錯出運行數千里不絶於道其珍怪不如東山之府轉粟西鄉陸行不絶水行滿河不如海陵之倉修治上林雜以離宮積聚玩好圈守禽獸不如長洲之苑遊曲臺臨上路不如朝夕之池深壁高壘副以關城不如江淮之險此臣之所為大王樂也今大王還兵疾歸尚得十半不然漢知吳之有吞天下之心也赫然加怒遣羽林黃頭循江而下襲大王之都魯東海絶吳之餉道梁王飭車騎習戰射積粟固守以備滎陽待吳之飢大王雖欲反都亦不得已夫三淮南之計不負其約齊王殺身以滅其迹四國不得出兵其郡趙囚邯鄲此不可掩亦已明矣大王已去千里之國而制於十里之內矣張韓將北地弓高宿左右兵不得下壁軍不得大息臣竊哀之願大王孰察焉吳王不用乘策卒見禽滅漢既平七國乘由是知名景帝召拜乘為弘農都尉乘久為大國上賓與英俊並遊得其所好不樂郡吏以病去官復遊梁梁客皆善屬辭賦乘尤高孝王薨乘歸淮陰武帝自為太子聞乘名及即位乘年老乃以安車蒲輪徵乘道死詔問乘子無能為文者後乃得其孽子皋皋字少孺乘在梁時取皋母為小妻乘之東歸也皋母不肯隨乘乘怒分皋數千錢留與母居年十七上書梁共王得召為郎三年為王使與冗從爭見讒惡遇罪家室沒入皋亡至長安會赦上書北闕自陳枚乘之子上得之大喜召入見待詔皋因賦殿中詔使賦平樂館善之拜為郎使胸奴皋不通經術詼笑類俳倡為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等而不得比嚴助等得尊官武帝春秋二十九乃得皇子群臣喜故皋與東方朔作皇太子生賦及立皇子禖祝受詔所為皆不從故事重皇子也初衛皇后立皋奏賦以戒終皋為賦善於朔也從行至甘泉雍河東東巡狩封泰山塞決河宣房遊觀三輔離宮館臨山澤弋獵射馭狗馬蹴鞠刻鏤上有所感輒使賦之為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少而善於皋皋賦辭中自言為賦不如相如又言為賦乃俳見視如倡自悔類倡也故其賦有詆娸東方朔又自詆娸其文骫骳曲隨其事皆得其意頗詼笑不甚間靡凡可讀者百二十篇其尤嫚戲不可讀者尚數十篇路溫舒字長君巨鹿東里人也父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編用寫書稍習善求為獄小吏因學律令轉為獄史縣中疑事皆問焉太守行縣見而異之署決曹史又受春秋通大義舉孝廉為山邑丞坐法免復為郡吏元鳳中廷尉光以治詔獄請溫舒署奏曹掾守廷尉史會昭帝崩昌邑王賀廢宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世趙王不終諸呂作亂而孝文為大宗繇是觀之禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至德以承天心崇仁義省刑罰通關梁一遠近敬賢如大賓愛民如赤子內恕情之所安而施之於海內是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天合符宜改前世之失正始受之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆鬱於胸譽諛之聲日滿於耳虛美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻勠力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生絶者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相驅以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歲以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏卻則鍛練而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成練者衆文致之罪明也是以獄吏專為深刻殘賊而亡極偷為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毀而後鳳凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含詬唯陛下除誹謗以招切言開天下之口廣針諫之路掃亡秦之失尊文武之德省法制寬刑罰以廢治獄則太平之風可興於世永履和樂與天亡極天下幸甚上善其言遷廣陽私府長內史舉溫舒文學高第遷右扶風丞時詔書令公卿選可使胸奴者溫舒上書願給厮養暴骨方外以盡臣節事下度遼將軍范明友太僕杜延年問狀罷歸故官久之遷臨淮太守治有異迹卒於官溫舒從祖父受曆數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此及王莽篡位欲章代漢之符著其語焉溫舒子及孫皆至牧守大官贊曰春秋魯臧孫達以禮諫君君子以為有後賈山自下劘上鄒陽枚乘遊於危國然卒免刑戮者以其言正也路溫舒辭順而意篤遂為世家宜哉
