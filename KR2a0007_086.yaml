body:
  text: 貨殖傳六十一昔先王之制自天子公侯卿大夫士至于皂隸枹關擊柝者其爵祿奉養宮室車服棺槨祭祀死生之制各有差品小不得僭大賤不得踰貴夫然故上下序而民志定於是辨其土地川澤丘陵衍沃原隰之宜教民種樹畜養五穀六畜及至魚鱉鳥獸雚蒲材幹器械之資所以養生送終之具靡不皆育育之以時而用之有節屮木未落斧斤不入於山林豺獺未祭置網不布於野澤鷹隼未擊矰戈不施於徯隨既順時而取物然猶山不茬蘖澤不伐夭蝝魚麛卵咸有常禁所以順時宣氣蕃阜庶物蓄足功用如此之備也然後四民因其土宜各任智力夙興夜寐以治其業相與通功易事交利而俱贍非有徵發期會而遠近咸足故易曰后以財成輔相天地之宜以左右民備物致用立成器以為天下利莫大乎聖人此之謂也管子云古之四民不得雜處士相與言仁誼於間宴工相與議技巧於官府商相與語財利於市井農相與謀稼穡於田野朝夕從事不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見奇麗紛華非其所習辟猶戎翟之與于越不相入矣是以欲寡而事節財足而不爭於是在民上者道之以德齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大略也及周室衰禮法墮諸侯刻桷丹楹大夫山節藻梲八佾舞於庭雍徹於堂其流至乎士庶人莫不離制而棄本稼穡之民多商旅之民多穀不足而貨有餘陵夷至乎桓文之後禮誼大壞上下相冒國異政家殊俗耆欲不制僭差亡極於是商通難得之貨工作亡用之器士設反道之行以追時好而取世資偽民背實而要名姦夫犯害而求利篡弒取國者為王公圉奪成家者雄桀禮誼不足以拘君子刑戮不足以威小人富者木土被文錦犬馬餘肉粟而貧者裋褐不完唅菽飲水其為編戶齊民同列而以財力相君雖為僕虜猶亡慍色故夫飾變詐為姦軌者自足乎一世之間守道循理者不免於飢寒之患其教自上興繇法度之無限也故列其行事以傳世變云昔粵王句踐困於會稽之上乃用范蠡計然計然曰知鬭則修備時用則知物二者形則萬貨之情可得見矣故旱則資舟水則資車物之理也推此類而修之十年國富厚賂戰士遂報強吳刷會稽之恥范蠡歎曰計然之策十用其五而得意既以施國吾欲施之家乃乘扁舟浮江湖變姓名適齊為鴟夷子皮之陶為朱公以為陶天下之中諸侯四通貨物所交易也乃治産積居與時逐而不責於人故善治産者能擇人而任時十九年之間三致千金而再散分與貧友昆弟後年衰老聽子孫修業而息之遂至巨萬故言富者稱陶朱子贛既學於仲尼退而仕衛發貯鬻財曹魯之間七十子之徒賜最為饒而顏淵簞食瓢飲在于陋巷子贛結駟連騎束帛之幣聘享諸侯所至國君無不分庭與之抗禮然孔子賢顏淵而譏子贛曰回也其庶乎屢空賜不受命而貨殖焉意則屢中白圭周人也當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我豫能薄飲食忍嗜欲節衣服與用事僮僕同苦樂趨時若猛獸摯鳥之發故曰吾治生猶伊尹呂尚之謀孫吳用兵商鞅行法是也故智不足與權變勇不足以決斷仁不能以取豫強不能以有守雖欲學吾術終不告也蓋天下言治生者祖白圭猗頓用盬鹽起邯鄲郭縱以鑄冶成業與王者埒富烏氏螺畜牧及衆斥賣求奇繒物間獻戎王戎王十倍其償豫畜畜至用谷量牛馬秦始皇令螺比封君以時與列臣朝請巴寡婦清其先得丹穴而擅其利數世家亦不訾清寡婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺秦漢之制列侯封君食租稅歲率戶二百千戶之君則二十萬朝覲聘享出其中庶民農工商賈率亦歲萬息二千百萬之家即二十萬而更繇租賦出其中衣食好美矣故曰陸地牧馬二百蹄牛千蹄角千足羊澤中千足彘水居千石魚波山居千章之萩安邑千樹棗燕秦千樹粟蜀漢江陵千樹橘淮北滎南河濟之間千樹萩陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鐘之田若千畝卮茜千畦薑韭此其人皆與千戶侯等諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也通邑大都酤一歲千釀醯醬千瓨漿千儋屠牛羊彘千皮穀糴千鍾薪稿千車船長千丈木千章竹竿萬個軺車百乘牛車千兩木器漆者千枚銅器千鈞素木鐵器若卮茜千石馬蹄噭千牛千足羊彘千雙童手指千筯角丹沙千斤其帛絮細布千鈞文采千匹答布皮革千石漆千大斗孽麴鹽豉千合鮐鮆千斤鮿鮑千鈞棗粟千石者三之狐貂裘千皮羔羊裘千石旃席千具它果采千種子貸金錢千貫節駔儈貪賈三之廉賈五之亦比千乘之家此其大率也蜀卓氏之先趙人也用鐵冶富秦破趙遷卓氏之蜀夫妻推輦行諸遷虜少有餘財爭與吏求近處處葭萌唯卓氏曰此地狹薄吾聞崏山之下沃野下有踆鴟至死不飢民工作布易賈乃求遠遷致之臨邛大喜即鐵山鼓鑄運籌算賈滇蜀民富至童八百人田池射獵之樂擬於人君程鄭山東遷虜也亦冶鑄賈魋結民富埒卓氏程卓既衰至成哀間成都羅裒訾至巨萬初裒賈京師隨身數十百萬為平陵石氏持錢其人強力石氏訾次如苴親信厚資遣之令往來巴蜀數年間致千餘萬裒舉其半賂遣曲陽定陵侯依其權力賒貸郡國人莫敢負擅鹽井之利期年所得自倍遂殖其貨宛孔氏之先梁人也用鐵冶為業秦滅魏遷孔氏南陽大鼓鑄規陂田連騎遊諸侯因通商賈之利有遊間公子之名然其贏得過當愈於孅嗇家致數千金故南陽行賈盡法孔氏之雍容魯人俗儉嗇而丙氏尤甚以鐵冶起富至巨萬然家自父兄子弟約俯有拾卬有取貰貸行賈遍郡國鄒魯以其故多去文學而趨利齊俗賤奴虜而刀間獨愛貴之桀黠奴人之所患唯刀間收取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起數千萬故曰寧爵無刀言能使豪奴自饒而盡其力也刀間既衰至成哀間臨淄姓偉訾五千萬周人既孅而師史尤甚轉轂百數賈郡國無所不至雒陽街居在齊秦楚趙之中富家相矜以久賈過邑不入門設用此等故師史能致十千萬師史既衰至成哀王莽時雒陽張長叔薛子仲訾亦十千萬莽皆以為納言士欲法武帝然不能得其利宣曲任氏其先為督道倉吏秦之敗也豪桀爭取金玉任氏獨窖倉粟楚漢相距滎陽民不得耕種米石至萬而豪桀金玉盡歸任氏任氏以此起富富人奢侈而任氏折節為力田畜人爭取賤賈任氏獨取貴善富者數世然任公家約非田畜所生不衣食公事不畢則不得飲酒食肉以此為閭里率故富而主上重之塞之斥也唯橋桃以致馬千匹牛倍之羊萬粟以萬鍾計吳楚兵之起長安中列侯封君行從軍旅齎貣子錢家子錢家以為關東成敗未決莫肯豫唯毋鹽氏出捐千金貸其息十之三月吳楚平一歲之中則毋鹽氏息十倍用此富關中關中富商大賈大氏盡諸田田牆田蘭韋家粟氏安陵杜氏亦巨萬前富者既衰自元成訖王莽京師富人杜陵樊嘉茂陵摯網平陵如氏苴氏長安丹王君房豉樊少翁王孫大卿為天下高訾樊嘉五千萬其餘皆巨萬矣王孫卿以財養士與雄桀交王莽以為京司市師漢司東市令也此其章章尤著者也其餘郡國富民兼業顓利以貨賂自行取重於鄉里者不可勝數故秦楊以田農而甲一州翁伯以販脂而傾縣邑張氏以賣醬而隃侈質氏以酒削而鼎食濁氏以胃脯而連騎張里以馬醫而擊鍾皆越法矣然常循守事業積纍王者之利下錮齊民之業皆陷不軌奢僭之惡又況掘冢搏掩犯姦成富曲叔稽發雍樂成之徒猶復齒列傷化敗俗大亂之道也
