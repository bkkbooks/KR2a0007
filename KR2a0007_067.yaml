body:
  text: 韋賢傳第四十三韋賢字長孺魯國鄒人也其先韋孟家本彭城為楚元王傅傅子夷王及孫王戊戊荒淫不遵道孟作詩風諫後遂去位徙家於鄒又作一篇甚諫詩曰肅肅我祖國自豕韋黼衣朱紱四牡龍旂彤弓斯征撫寧遐荒總齊群邦以翼大商迭彼大彭勳績惟光至于有周歷世會同王赧聽譖寔絕我邦我邦既絕厥政斯逸賞罰之行非繇王室庶尹群后靡扶靡衛五服崩離宗周以隊我祖斯微遷于彭城在予小子勤誒厥生阸此嫚秦耒耜以耕悠悠嫚秦上天不寧乃眷南顧授漢于京於赫有漢四方是征靡適不懷萬國逌平乃命厥弟建侯於楚俾我小臣惟傅是輔兢兢元王恭儉淨壹惠此黎民納彼輔弼饗國漸世垂烈于後乃及夷王克奉厥緒咨命不永唯王統祀左右陪臣此惟皇士如何我王不思守保不惟履冰以繼祖考邦事是廢逸游是娛犬馬繇繇是放是驅務彼鳥獸忽此稼苗烝民以匱我王以媮所弘非德所親非俊唯囿是恢唯諛是信睮睮諂夫咢咢黃髮如何我王曾不是察既藐下臣追欲從逸嫚彼顯祖輕茲削黜嗟嗟我王漢之睦親曾不夙夜以休令聞穆穆天子臨爾下土明明群司執憲靡顧正遐繇近殆其怙茲嗟嗟我王曷不此思非思非鑒嗣其罔則彌彌其失岌岌其國致冰匪霜致隊靡嫚瞻惟我王昔靡不練興國救顛孰違悔過追思黃髮秦繆以霸歲月其徂年其逮耇於昔君子庶顯于後我王如何曾不斯覽黃髮不近胡不時監其在鄒詩曰微微小子既耇且陋豈不牽位穢我王朝王朝肅清唯俊之庭顧瞻余躬懼穢此征我之退征請于天子天子我恤矜我髮齒赫赫天子明悊且仁懸車之義以洎小臣嗟我小子豈不懷土庶我王寤越遷于魯既去禰祖惟懷惟顧祁祁我徒戴負盈路爰戾于鄒鬋茅作堂我徒我環築室于牆我既遷逝心存我舊夢我瀆上立于王朝其夢如何夢爭王室其爭如何夢王我弼寤其外邦歎其喟然念我祖考泣涕其漣微微老夫咨既遷絕洋洋仲尼視我遺烈濟濟鄒魯禮義唯恭誦習弦歌于異他邦我雖鄙耇心其好而我徒侃爾樂亦在而孟卒于鄒或曰其子孫好事述先人之志而作是詩也自孟至賢五世賢為人質朴少欲篤志於學兼通禮尚書以詩教授號稱鄒魯大儒徵為博士給事中進授昭帝詩稍遷光祿大夫詹事至大鴻臚昭帝崩無嗣大將軍霍光與公卿共尊立孝宣帝帝初即位賢以與謀議安宗廟賜爵關內侯食邑徙為長信少府以先帝師甚見尊重本始三年代蔡義為丞相封扶陽侯食邑七百戶時賢七十餘為相五歲地節三年以老病乞骸骨賜黃金百斤罷歸加賜弟一區丞相致仕自賢始年八十二薨諡曰節侯賢四子長子方山為高寢令早終次子弘至東海太守次子舜留魯守墳墓少子玄成復以明經歷位至丞相故鄒魯諺曰遺子黃金滿籯不如一經玄成字少翁以父任為郎常侍騎少好學修父業尤謙遜下士出遇知識步行輒下從者與載送之以為常其接人貧賤者益加敬繇是名譽日廣以明經擢為諫大夫遷大河都尉初玄成兄弘為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當為嗣故敕令自免弘懷謙不去官及賢病篤弘竟坐宗廟事繫獄罪未決室家問賢當為後者賢恚恨不肯言於是賢門下生博士義倩等與宗家計議共矯賢令使家丞上書言大行以大河都尉玄成為後賢薨玄成在官聞喪又言當為嗣玄成深知其非賢雅意即陽為病狂臥便利妄笑語昏亂徵至長安既葬當襲爵以病狂不應召大鴻臚奏狀章下丞相御史案驗玄成素有名聲士大夫多疑其欲讓爵辟兄者案事丞相史乃與玄成書曰古之辭讓必有文義可親故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜晻而不宣微哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然怨子傷高而僕為小人也玄成友人侍郎章亦上疏言聖王貴以禮讓為國宜優養玄成勿枉其志使得自安衡門之下而丞相御史遂以玄成實不病劾奏之有詔勿劾引拜玄成不得已受爵宣帝高其節以玄成為河南太守兄弘太山都尉遷東海太守數歲玄成徵為未央衛尉遷太常坐與故平通侯楊惲厚善惲誅黨友皆免官後以列侯侍祀孝惠廟當晨入廟天雨淖不駕駟馬車而騎至廟下有司劾奏等輩數人皆削爵為關內侯玄成自傷貶黜父爵歎曰吾何面目以奉祭祀作詩自劾責曰赫矣我祖侯于豕韋賜命建伯有殷以綏厥績既昭車服有常朝宗商邑四牡翔翔德之令顯慶流于裔宗周至漢群后歷世肅肅楚傅輔翼元夷厥駟有庸惟慎惟祗嗣王孔佚越遷于鄒五世壙僚至我節侯惟我節侯顯德遐聞左右昭宣五品以訓既耇致位惟懿惟奐厥賜祁祁百金洎館國彼扶陽在京之東惟帝是留政謀是從繹繹六轡是列是理威儀濟濟朝享天子天子穆穆是宗是師四方遐爾觀國之煇茅土之繼在我俊兄惟我俊兄是讓是形於休厥德於赫有聲致我小子越留於京惟我小子不肅會同媠彼車服黜此附庸赫赫顯爵自我隊之微微附庸自我招之誰能忍媿寄之我顏誰將遐征從之夷蠻於赫三事匪俊匪作於蔑小子終焉其度誰謂華高企其齊而誰謂德難厲其庶而嗟我小子于貳其尤隊彼令聲申此擇辭四方群后我監我視威儀車服唯肅是履初宣帝寵姬張婕妤男淮陽憲王好政事通法律上奇其材有意欲以為嗣然用太子起於細微又早失母故不忍也久之上欲感風憲王輔以禮讓之臣乃召拜玄成為淮陽中尉是時王未就國玄成受詔與太子太傅蕭望之及五經諸儒雜論同異於石渠閣條奏其對及元帝即位以玄成為少府遷太子太傅至御史大夫永光中代于定國為丞相貶黜十年之間遂繼父相位封侯故國榮當世焉玄成復作詩自著復玷缺之囏難因以戒示子孫曰於肅君子既令厥德儀服此恭棣棣其則咨余小子既德靡逮曾是車服荒嫚以隊明明天子俊德烈烈不遂我遺恤我九列我既茲恤惟夙惟夜畏忌是申供事靡惰天子我監登我三事顧我傷隊爵復我舊我既此登望我舊階先后茲度漣漣孔懷司直御事我熙我盛群公百僚我嘉我慶于異卿士非同我心三事惟囏莫我肯矜赫赫三事力雖此畢非我所度退其罔日昔我之隊畏不此居今我度茲戚戚其懼嗟我後人命其靡常靖享爾位瞻仰靡荒慎爾會同戒爾車服無媠爾儀以保爾域爾無我視不慎不整我之此復惟祿之幸於戲後人惟肅惟栗無忝顯祖以蕃漢室玄成為相七年守正持重不及父賢而文釆過之建昭三年薨諡曰共侯初賢以昭帝時徙平陵玄成別徙杜陵病且死因使者自白曰不勝父子恩願乞骸骨歸葬父墓上許焉子頃侯寬嗣薨子僖侯育嗣薨子節侯沈嗣自賢傳國至玄孫乃絕玄成兄高寢令方山子安世歷郡守大鴻臚長樂衛尉朝廷稱有宰相之器會其病終而東海太守弘子賞亦明詩哀帝為定陶王時賞為太傅哀帝即位賞以舊恩為大司馬車騎將軍列為三公賜爵關內侯食邑千戶亦年八十餘以壽終宗族至吏二千石者十餘人初高祖時令諸侯王都皆立太上皇廟至惠帝尊高帝廟為太祖廟景帝尊孝文廟為太宗廟行所嘗幸郡國各立太祖太宗廟至宣帝本始二年復尊孝武廟為世宗廟行所巡狩亦立焉凡祖宗廟在郡國六十八合百六十七所而京師自高祖下至宣帝與太上皇悼皇考各自居陵旁立廟并為百七十六又園中各有寢便殿日祭於寢月祭於廟時祭於便殿寢日四上食廟歲二十五祠便殿歲四祠又月一游衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衛思后戾太子戾后各有寢園與諸帝合凡三十所一歲祠上食二萬四千四百五十五用衛士四萬五千一百二十九人祝宰樂人萬二千一百四十七人養犧牲卒不在數中至元帝時貢禹奏言古者天子七廟今孝惠孝景廟皆親盡宜毀及郡國廟不應古禮宜正定天子是其議未及施行而禹卒永光四年乃下詔先議罷郡國廟曰朕聞明王之御世也遭時為法因事制宜往者天下初定遠方未賓因嘗所親以立宗廟蓋建威銷萌一民之至權也今賴天地之靈宗廟之福四方同軌蠻貊貢職久遵而不定令疏遠卑賤共承尊祀殆非皇天祖宗之意朕甚懼焉傳不云乎吾不與祭如不祭其與將軍列侯中二千石二千石諸大夫博士議郎議丞相玄成御史大夫鄭弘太子太傅嚴彭祖少府歐陽地餘諫大夫尹更始等七十人皆曰臣聞祭非自外至者也繇中出生於心也故唯聖人為能饗帝孝子為能饗親立廟京師之居躬親承事四海之內各以其職來助祭尊親之大義五帝三王所共不易之道也詩云有來雍雍至止肅肅相維辟公天子穆穆春秋之義父不祭於支庶之宅君不祭於臣僕之家王不祭於下土諸侯臣等愚以為宗廟在郡國宜無修臣請勿復修奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉罷郡國廟後月餘復下詔曰蓋聞明王制禮立親廟四祖宗之廟萬世不毀所以明尊祖敬宗著親親也朕獲承祖宗之重惟大禮未備戰栗恐懼不敢自顓其與將軍列侯中二千石二千石諸大夫博士議玄成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毀毀廟之主臧乎太祖五年而再殷祭言壹禘壹祫也祫祭者毀廟與未毀廟之主皆合食於太祖父為昭子為穆孫復為昭古之正禮也祭義曰王者禘其祖自出以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毀親疏之殺示有終也周之所以七廟者以后稷始封文王武王受命而王是以三廟不毀與親廟四而七非有后稷始封文武受命之功者皆當親盡而毀成王成二聖之業制禮作樂功德茂盛廟猶不世以行為諡而已禮廟在大門之內不敢遠親也臣愚以為高帝受命定天下宜為帝者太祖之廟世世不毀承後屬盡者宜毀今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毀皇考廟親未盡如故大司馬車騎將軍許嘉等二十九人以為孝文皇帝除誹謗去肉刑躬節儉不受獻罪人不帑不私其利出美人重絕人類賓賜長老收恤孤獨德厚侔天地利澤施四海宜為帝者太宗之廟廷尉忠以為孝武皇帝改正朔易服色攘四夷宜為世宗之廟諫大夫尹更始等十八人以為皇考廟上序於昭穆非正禮宜毀於是上重其事依違者一年乃下詔曰蓋聞王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也高皇帝為天下誅暴除亂受命而帝功莫大焉孝文皇帝國為代王諸呂作亂海內搖動然群臣黎庶靡不壹意北面而歸心猶謙辭固讓而後即位削亂秦之迹興三代之風是以百姓晏然咸獲嘉福德莫盛焉高皇帝為漢太祖孝文皇帝為太宗世世承祀傳之無窮朕甚樂之孝宣皇帝為孝昭皇帝後於義壹體孝景皇帝廟及皇考廟皆親盡其正禮儀玄成等奏曰祖宗之廟世世不毀繼祖以下五廟而迭毀今高皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毀太上廟主宜瘞園孝惠皇帝為穆主遷於太祖廟寢園皆無復修奏可議者又以為清廟之詩言交神之禮無不清靜今衣冠出游有車騎之眾風雨之氣非所謂清靜也祭不欲數數則瀆瀆則不敬宜復古禮四時祭於廟諸寢園日月間祀皆可勿復修上亦不改也明年玄成復言古者制禮別尊卑貴賤國君之母非適不得配食則薦於寢身沒而已陛下躬至孝承天心建祖宗定迭毀序昭穆大體既定孝文太后孝昭太后寢祠園宜如禮勿復修奏可後歲餘玄成薨匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上詔問衡議欲復之衡深言不可上疾久不平衡惶恐禱高祖孝文孝武廟曰嗣曾孫皇帝恭承洪業夙夜不敢康寧思育休烈以章祖宗之盛功故動作接神必因古聖之經往者有司以為前因所幸而立廟將以繫海內之心非為尊祖嚴親也今賴宗廟之靈六合之內莫不附親廟宜一居京師天子親奉郡國廟可止毋修皇帝祗肅舊禮尊重神明即告于祖宗而不敢失今皇帝有疾不豫乃夢祖宗見戒以廟楚王夢亦有其序皇帝悼懼即詔臣衡復修立謹案上世帝王承祖禰之大禮皆不敢不自親郡國吏卑賤不可使獨承又祭祀之義以民為本間者歲數不登百姓困乏郡國廟無以修立禮凶年則歲事不舉以祖禰之意為不樂是以不敢復如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃大被其疾隊在溝瀆之中皇帝至孝肅慎宜蒙祐福唯高皇帝孝文皇帝孝武皇帝省察右饗皇帝之孝開賜皇帝眉壽亡疆令所疾日瘳平復反常永保宗廟天下幸甚又告謝毀廟曰往者大臣以為在昔帝王承祖宗之休典取象於天地天序五行人親五屬天子奉天故率其意而尊其制是以禘嘗之序靡有過五受命之君躬接于天萬世不墮繼烈以下五廟而遷上陳太祖間歲而祫其道應天故福祿永終太上皇非受命而屬盡義則當遷又以為孝莫大於嚴父故父之尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止尊祖嚴父之義也寢日四上食園廟間祠皆可亡修皇帝思慕悼懼未敢盡從惟念高皇帝聖德茂盛受命溥將欽若稽古承順天心子孫本支陳錫亡疆誠以為遷廟合祭久長之策高皇帝之意乃敢不聽即以今日遷太上孝惠廟孝文太后孝昭太后寢將以昭祖宗之德順天人之序定無窮之業今皇帝未受茲福乃有不能共職之疾皇帝願復修承祀臣衡等咸以為禮不得如不合高皇帝孝惠皇帝孝文皇帝孝武皇帝孝昭皇帝孝宣皇帝太上皇孝文太后孝昭太后之意罪盡在臣衡等當受其咎今皇帝尚未平詔中朝臣具復毀廟之文臣衡中朝臣咸復以為天子之祀義有所斷禮有所承違統背制不可以奉先祖皇天不祐鬼神不饗六藝所載皆言不當無所依緣以作其文事如失指罪乃在臣衡當深受其殃皇帝宜厚蒙祉福嘉氣日興疾病平復永保宗廟與天亡極群生百神有所歸息諸廟皆同文久之上疾連年遂盡復諸所罷寢廟園皆修祀如故初上定迭毀禮獨尊孝文廟為太宗而孝武廟親未盡故未毀上於是乃復申明之曰孝宣皇帝尊孝武廟曰世宗損益之禮不敢有與焉他皆如舊制唯郡國廟遂廢云元帝崩衡奏言前以上體不平故復諸所罷祠卒不蒙福案衛思后戾太子戾后園親未盡孝惠孝景廟親盡宜毀及太上皇孝文孝昭太后昭靈后昭哀后武哀王嗣請悉罷勿奉奏可初高后時患臣下妄非議先帝宗廟寢園官故定著令敢有擅議者棄市至元帝改制蠲除此令成帝時以無繼嗣河平元年復復太上皇寢廟園世世奉祠昭靈后武哀王昭哀后并食於太上寢廟如故又復擅議宗廟之命成帝崩哀帝即位丞相孔光大司空何武奏言永光五年制書高皇帝為漢太祖孝文皇帝為太宗建昭五年制書孝武皇帝為世宗損益之體不敢有與臣愚以為迭毀之次當以時定非令所為擅議宗廟之意也臣請與群臣雜議奏可於是光祿勳彭宣詹事滿昌博士左咸等五十三人皆以為繼祖宗以下五廟而迭毀後雖有賢君猶不得與祖宗並列子孫雖欲襃大顯揚而立之鬼神不饗也孝武皇帝雖有功烈親盡宜毀太僕王舜中壘校尉劉歆議曰臣聞周室既衰四夷並侵獫狁最彊於今匈奴是也至宣王而伐之詩人美而頌之曰薄伐獫狁至于太原又曰嘽嘽推推如霆如雷顯允方叔征伐獫狁荊蠻來威故稱中興及至幽王犬戎來伐殺幽王取宗器自是之後南夷與北夷交侵中國不絕如線春秋紀齊桓南伐楚北伐山戎孔子曰微管仲吾其被髮左衽矣是故棄桓之過而錄其功以為伯首及漢興冒頓始彊破東胡禽月氏并其土地地廣兵彊為中國害南越尉佗總百粵自稱帝故中國雖平猶有四夷之患且無寧歲一方有急三面救之是天下皆動而被其害也孝文皇帝厚以貨賂與結和親猶侵暴無已甚者興師十餘萬眾近屯京師及四邊歲發屯備虜其為患久矣非一世之漸也諸侯郡守連匈奴及百粵以為逆者非一人也匈奴所殺郡守都尉略取人民不可勝數孝武皇帝愍中國罷勞無安寧之時乃遣大將軍驃騎伏波樓船之屬南滅百粵起七郡北攘匈奴降昆邪十萬之眾置五屬國起朔方以奪其肥饒之地東伐朝鮮起玄菟樂浪以斷匈奴之左臂西伐大宛並三十六國結烏孫起敦煌酒泉張掖以鬲婼羌裂匈奴之右肩單于孤特遠遁于幕北四垂無事斥地遠境起十餘郡功業既定乃封丞相為富民侯以大安天下富實百姓其規撫可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累世賴之單于守藩百蠻服從萬世之基也中興之功未有高焉者也高帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗此孝宣帝所以發德音也禮記王制及春秋穀梁傳天子七廟諸侯五大夫三士二天子七日而殯七月而葬諸侯五日而殯五月而葬此喪事尊卑之序也與廟數相應其文曰天子三昭三穆與太祖之廟而七諸侯二昭二穆與太祖之廟而五故德厚者流光德薄者流卑春秋左氏傳曰名位不同禮亦異數自上以下降殺以兩禮也七者其正法數可常數者也宗不在此數中宗變也苟有功德則宗之不可預為設數故於殷太甲為太宗大戊曰中宗武丁曰高宗周公為毋逸之戒舉殷三宗以勸成王繇是言之宗無數也然則所以勸帝者之功德博矣以七廟言之孝武皇帝未宜毀以所宗言之則不可謂無功德禮記祀典曰夫聖王之制祀也功施於民則祀之以勞定國則祀之能救大災則祀之竊觀孝武皇帝功德皆兼而有焉凡在於異姓猶將特祀之況于先祖或說天子五廟無見文又說中宗高宗者宗其道而毀其廟名與實異非尊德貴功之意也詩云蔽芾甘棠勿鬋勿伐邵伯所茇思其人猶愛其樹況宗其道而毀其廟乎迭毀之禮自有常法無殊功異德固以親疏相推及至祖宗之序多少之數經傳無明文至尊至重難以疑文虛說定也孝宣皇帝舉公卿之議用眾儒之謀既以為世宗之廟建之萬世宣布天下臣愚以為孝武皇帝功烈如彼孝宣皇帝立之如此不宜毀上覽其議而從之制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺故春秋外傳曰日祭月祀時享歲貢終王祖禰則日祭曾高則月祀二祧則時享壇墠則歲貢大禘則終王德盛而游廣親親之殺也彌遠則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於其祖出於情矣禮無所不順故無毀廟自貢禹建迭毀之議惠景及太上寢園廢而為虛失禮意矣至平帝元始中大司馬王莽奏本始元年丞相義等議謐孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟益故奉園民滿千六百家以為縣臣愚以為皇考廟本不當立累世奉之非是又孝文太后南陵孝昭太后雲陵園雖前以禮不復修陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭皇帝後以數故孝元世以孝景皇帝及皇考廟親未盡不毀此兩統貳父違於禮制案義奏親諡曰悼裁置奉邑皆應經義相奏悼園稱皇考立廟益民為縣違離祖統乖繆本義父為士子為天子祭以天子者乃謂若虞舜夏禹殷湯周文漢之高祖受命而王者也非謂繼祖統為後者也臣請皇高祖考廟奉明園毀勿修罷南陵雲陵為縣奏可司徒掾班彪曰漢承亡秦絕學之後祖宗之制因時施宜自元成後學者蕃滋貢禹毀宗廟匡衡改郊兆何武定三公後皆數復故紛紛不定何者禮文缺微古今異制各為一家未易可偏定也考觀諸儒之議劉歆博而篤矣
