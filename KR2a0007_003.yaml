body:
  text: 高后紀第三高皇后呂氏生惠帝佐高祖定天下父兄及高祖而侯者三人惠帝即位尊呂后為太后太后立帝姊魯元公主女為皇后無子取後宮美人子名之以為太子惠帝崩太子立為皇帝年幼太后臨朝稱制大赦天下乃立兄子呂台産祿台子通四人為王封諸呂六人為列侯語在外戚傳元年春正月詔曰前日孝惠皇帝言欲除三族罪妖言令議未決而崩今除之二月賜民爵戶一級初置孝弟力田二千石者一人夏五月丙申趙王宮叢臺災立孝惠後宮子強為淮陽王不疑為恆山王弘為襄城侯朝為軹侯武為壺關侯秋桃李華二年春詔曰高皇帝匡飭天下諸有功者皆受分地為列侯萬民大安莫不受休德朕思念至於久遠而功名不著亡以尊大誼施後世今欲差次列侯功以定朝位臧于高廟世世勿絶嗣子各襲其功位其與列侯議定奏之丞相臣平言謹與絳侯臣勃曲周侯臣商潁陰侯臣嬰安國侯臣陵等議列侯幸得賜餐錢奉邑陛下加惠以功次定朝位臣請臧高廟奏可春正月乙卯地震羌道武都道山崩夏六月丙戌晦日有蝕之秋七月恆山王不疑薨行八銖錢三年夏江水漢水溢流民四千餘家秋星晝見四年夏少帝自知非皇后子出怨言皇太后幽之永巷詔曰凡有天下治萬民者蓋之如天容之如地上有歡心以使百姓百姓欣然以事其上歡欣交通而天下治今皇帝疾久不已乃失惑昏亂不能繼嗣奉宗廟守祭祀不可屬天下其義代之群臣皆曰皇太后為天下計所以安宗廟社稷甚深頓首奉詔五月丙辰立恆山王弘為皇帝五年春南粵王尉他自稱南武帝秋八月淮陽王彊薨九月發河東上黨騎屯北地六年春星晝見夏四月赦天下秩長陵令二千石六月城長陵胸奴寇狄道攻阿陽行五分錢七年冬十二月胸奴寇狄道略二千餘人春正月丁丑趙王友幽死于邸己丑晦日有蝕之既以梁王呂産為相國趙王祿為上將軍立營陵侯劉澤為琅邪王夏五月辛未詔曰昭靈夫人太上皇妃也武哀侯宣夫人高皇帝兄姊也號諡不稱其議尊號丞相臣平等請尊昭靈夫人曰昭靈后武哀侯曰武哀王宣夫人曰昭哀后六月趙王恢自殺秋九月燕王建薨南越侵盜長沙遣隆慮侯竈將兵擊之八年春封中謁者張釋卿為列侯諸中官宦者令丞皆賜爵關內侯食邑夏江水漢水溢流萬餘家秋七月辛巳皇太后崩于未央宮遺詔賜諸侯王各千金將相列侯下至郎吏各有差大赦天下上將軍祿相國産顓兵秉政自知背高皇帝約恐為大臣諸侯王所誅因謀作亂時齊悼惠王子朱虛侯章在京師以祿女為婦知其謀乃使人告兄齊王令發兵西章欲與太尉勃丞相平為內應以誅諸呂齊王遂發兵又詐琅邪王澤發其國兵并將而西産祿等遣大將軍灌嬰將兵擊之嬰至滎陽使人諭齊王與連和待呂氏變而共誅之太尉勃與丞相平謀以曲周侯酈商子寄與祿善使人劫商令寄紿說祿曰高帝與呂后共定天下劉氏所立九王呂氏所立三王皆大臣之議事已布告諸侯王諸侯王以為宜今太后崩帝少足下不急之國守藩乃為上將將兵留此為大臣諸侯所疑何不速歸將軍印以兵屬太尉請梁王亦歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也祿然其計使人報産及諸呂老人或以為不便計猶豫未有所決祿信寄與俱出遊過其姑呂嬃嬃怒曰汝為將而棄軍呂氏今無處矣乃悉出珠玉寶器散堂下曰無為它人守也八月庚申平陽侯窋行御史大夫事見相國産計事郎中令賈壽使從齊來因數産曰王不早之國今雖欲行尚可得邪具以灌嬰與齊楚合從狀告産平陽侯窋聞其語馳告丞相平太尉勃勃欲入北軍不得入襄平侯紀通尚符節乃令持節矯內勃北軍勃復令酈寄典客劉揭說祿曰帝使太尉守北軍欲令足下之國急歸將軍印辭去不然禍且起祿遂解印屬典客而以兵授太尉勃勃入軍門行令軍中曰為呂氏右袒為劉氏左袒軍皆左袒勃遂將北軍然尚有南軍丞相平召朱虛侯章佐勃勃令章監軍門令平陽侯告衛尉毋內相國産殿門産不知祿已去北軍入未央宮欲為亂殿門弗內徘徊往來平陽侯馳語太尉勃勃尚恐不勝未敢誦言誅之乃謂朱虛侯章曰急入宮衛帝章從勃請卒千人入未央宮掖門見産廷中日餔時遂擊産産走天大風從官亂莫敢鬭者逐産殺之郎中府吏舍廁中章已殺産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衛尉呂更始還入北軍復報太尉勃勃起拜賀章曰所患獨産今已誅天下定矣辛酉斬呂祿笞殺呂嬃分部悉捕諸呂男女無少長皆斬之大臣相與陰謀以為少帝及三弟為王者皆非孝惠子復共誅之尊立文帝語在周勃高五王傳贊曰孝惠高后之時海內得離戰國之苦君臣俱欲無為故惠帝拱己高后女主制政不出房闥而天下晏然刑罰罕用民務稼穡衣食滋殖
