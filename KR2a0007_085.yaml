body:
  text: 酷吏傳第六十孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格老氏稱上德不德是以有德下德不失德是以無德法令滋章盜賊多有信哉是言也法令者治之具而非制治清濁之原也昔天下之罔嘗密矣然姦軌愈起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而媮快乎言道德者溺於職矣故曰聽訟吾猶人也必也使無訟乎下士聞道大笑之非虛言也漢興破觚而為圜斲琱而為樸號為罔漏吞舟之魚而吏治蒸蒸不至於姦黎民艾安由是觀之在彼不在此高后時酷吏獨有侯封刻轢宗室侵辱功臣呂氏已敗遂夷侯封之家孝景時鼂錯以刻深頗用術輔其資而七國之亂發怒於錯錯卒被戮其後郅都甯成之倫郅都河東大陽人也以郎事文帝景帝時為中郎將敢直諫面折大臣於朝嘗從入上林賈姬在廁野彘入廁上目都都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進天下所少寧姬等邪陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞之賜都金百斤上亦賜金百斤由此重都濟南瞷氏宗人三百餘家豪猾二千石莫能制於是景帝拜都為濟南守至則誅瞷氏首惡餘皆股粟居歲餘郡中不拾遣旁十餘郡守畏都如大府都為人勇有氣公廉不發私書問遣無所受請寄無所聽常稱曰己背親而出身固當奉職死節官下終不顧妻子矣都遷為中尉丞相條侯至貴居也而都揖丞相是時民樸畏罪自重而都獨先嚴酷致行法不避貴戚列侯宗室見都側目而視號曰蒼鷹臨江王徵詣中尉府對簿臨江王欲得刀筆為書謝上而都禁吏弗與魏其侯使人間予臨江王臨江王既得為書謝上因自殺竇太后聞之怒以危法中都都免歸家景帝乃使使即拜都為鴈門太守便道之官得以便宜從事匈奴素聞郅都節舉邊為引兵去竟都死不近鴈門匈奴至為偶人象都令騎馳射莫能中其見憚如此匈奴患之乃中都以漢法景帝曰都忠臣欲釋之竇太后曰臨江王獨非忠臣乎於是斬都也甯成南陽穰人也以郎謁者事景帝好氣為少吏必陵其長吏為人上操下急如束溼猾賊任威稍遷至濟南都尉而郅都為守始前數尉步入府因吏謁守如縣令其畏都如此及成往直凌都出其上都素聞其聲善遇與結驩久之都死後長安左右宗室多犯法上召成為中尉其治效郅都其廉弗如然宗室豪桀人皆惴恐武帝即位徙為內史外戚多毀成之短抵罪髡鉗是時九卿死即死少被刑而成刑極自以為不復收乃解脫詐刻傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貫貣陂田千餘頃假貧民役使數千家數年會赦致產數千萬為任俠持吏長短出從數十騎其使民威重於郡守周陽由其父趙兼以淮南王舅侯周陽故因氏焉由以宗家任為郎事文帝景帝時由為郡守武帝即位吏治尚脩謹然由居二千石中最為暴酷驕恣所愛者撓法活之所憎者曲法滅之所居郡必夷其豪為守視都尉如令為都尉陵太守奪之治汲黯為忮司馬安之文惡俱在二千石列同車未嘗敢均茵馮後由為河東都尉與其守勝屠公爭權相告言勝屠公當抵罪義不受刑自殺而由棄市自甯成周陽由之後事益多民巧法大抵吏治類多成由等矣趙禹斄人也以佐史補中都官用廉為令史事太尉周亞夫亞夫為丞相禹為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深不可以居大府武帝時禹以刀筆吏積勞遷為御史上以為能至中大夫與張湯論定律令作見知吏傳相監司以法盡自此始禹為人廉裾為吏以來舍無食客公卿相造請禹終不行報謝務在絕知友賓客之請孤立行一意而已見法輒取亦不履案求官屬陰罪嘗中廢已為廷尉始條侯以禹賊深及禹為少府九卿酷急至晚節事益多吏務為嚴峻而禹治加緩名為平王溫舒等後起治峻禹禹以老徙為燕相數歲誖亂有罪免歸後十餘年以壽卒于家義縱河東人也少年時嘗與張次公俱攻剽為群盜縱有姊以醫幸王太后太后問有子兄弟為官者乎姊曰有弟無行不可太后乃告上上拜義姁弟縱為中郎補上黨郡中令治敢往少溫籍縣無逋事舉第一遷為長陵及長安令直法行治不避貴戚以捕桉太后外孫脩成子中上以為能遷為河內都尉至則族滅其豪穰氏之屬河內道不拾遺而張次公亦為郎以勇悍從軍敢深入有功封為岸頭侯甯成家居上欲以為郡守御史大夫弘曰臣居山東為小吏時甯成為濟南都尉其治如狼牧羊成不可令治民上乃拜成為關都尉歲餘關吏稅肄郡國出入關者號曰寧見乳虎無直甯成之怒其暴如此義縱自河內遷為南陽太守聞甯成家居南陽及至關甯成側行送迎然縱氣盛弗為禮至郡遂桉甯氏破碎其家成坐有罪及孔暴之屬皆奔亡南陽吏民重足一迹而平氏朱彊杜衍杜周為縱爪牙之吏任用遷為廷尉史軍數出定襄定襄吏民亂敗於是徙縱為定襄太守縱至掩定襄獄中重罪二百餘人及賓客昆弟私入相視者亦二百餘人縱壹切捕鞠曰為死罪解脫是日皆報殺四百餘人郡中不寒而栗猾民佐吏為治是時趙禹張湯為九卿矣然其治尚寬輔法而行縱以鷹擊毛摯為治後會更五銖錢白金起民為姦京師尤甚乃以縱為右內史王溫舒為中尉溫舒至惡所為弗先言縱縱必以氣陵之敗壞其功其治所誅殺甚多然取為小治姦益不勝直指始出矣吏之治以斬殺縛束為務閻奉以惡用矣縱廉其治效郅都上幸鼎湖病久已而卒起幸甘泉道不治上怒曰縱以我為不行此道乎銜之至冬楊可方受告緡縱以為此亂民部吏捕其為可使者天子聞使杜式治以為廢格沮事棄縱市後一歲張湯亦死王溫舒陽陵人也少時椎埋為姦已而試縣亭長數廢數為吏以治獄至廷尉史事張湯遷為御史督盜賊殺傷甚多稍遷至廣平都尉擇郡中豪敢往吏十餘人為爪牙皆把其陰重罪而縱使督盜賊快其意所欲得此人雖有百罪弗法即有避回夷之亦滅宗以故齊趙之郊盜不敢近廣平廣平聲為道不拾遺上聞遷為河內太守素居廣平時皆知河內豪姦之家及往以九月至令郡具私馬五十疋為驛自河內至長安部吏如居廣平時方略捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡沒入償臧奏行不過二日得可事論報至流血十餘里河內皆怪其奏以為神速盡十二月郡中無犬吠之盜其頗不得失之旁郡追求會春溫舒頓足歎曰嗟乎令冬月益展一月卒吾事矣其好殺行威不愛人如此上聞之以為能遷為中尉其治復放河內徒請召猜禍吏與從事河內則楊皆麻戊關中揚贛成信等義縱為內史憚之未敢恣治及縱死張湯敗後徙為廷尉而尹齊為中尉坐法抵罪溫舒復為中尉為人少文居它惛惛不辯至於中尉則心開素習關中俗知豪惡吏豪惡吏盡復為用吏苛察淫惡少年投缿購告言姦置伯落長以收司姦溫舒多諂善事有勢者即無勢視之如奴有勢家雖有姦如山弗犯無勢雖貴戚必侵辱舞文巧請下戶之猾以動大豪其治中尉如此姦猾窮治大氐盡靡爛獄中行論無出者其爪牙吏虎而冠於是中尉部中中猾以下皆伏有勢者為遊聲譽稱治數歲其吏多以權貴富溫舒擊東越還議有不中意坐以法免是時上方欲作通天臺而未有人溫舒請覆中尉脫卒得數萬人作上說拜為少府徙右內史治如其故姦邪少禁坐法失官復為右輔行中尉如故操歲餘會宛軍發詔徵豪吏溫舒匿其吏華成及人有變告溫舒受員騎錢它姦利事罪至族自殺其時兩弟及兩婚家亦各自坐它罪而族光祿勳徐自為曰悲夫夫古有三族而王溫舒罪至同時而五族乎溫舒死家絫千金尹齊東郡茌平人也以刀筆吏稍遷至御史事張湯湯數稱以為廉武帝使督盜賊斬伐不避貴勢遷關都尉聲甚於甯成上以為能拜為中尉吏民益彫敝輕齊木彊少文豪惡吏伏匿而善吏不能為治以故事多廢抵罪後復為淮陽都尉王溫舒敗後數年病死家直不滿五十金所誅滅淮陽甚多及死仇家欲燒其尸妻亡去歸葬楊僕宜陽人也以千夫為吏河南守舉為御史使督盜賊關東治放尹齊以敢擊行稍遷至主爵都尉上以為能南越反拜為樓船將軍有功封將梁侯東越反上欲復使將為其伐前勢以書敕責之曰將軍之功獨有先破石門尋陿非有斬將騫旗之實也烏足以驕人哉前破番禺捕降者以為虜掘死人以為獲是一過也建德呂嘉逆罪不容於天下將軍擁精兵不窮追超然以東越為援是二過也士卒暴露連歲為朝會不置酒將軍不念其勤勞而造佞巧請乘傳行塞因用歸家懷銀黃垂三組夸鄉里是三過也失期內顧以道惡為解失尊尊之序是四過也欲請蜀刀問君賈幾何對曰率數百武庫日出兵而陽不知挾偽干君是五過也受詔不至蘭池宮明日又不對假令將軍之吏問之不對令之不從其罪何如推此心以在外江海之間可得信乎今東越深入將軍能率眾以掩過不僕惶恐對曰願盡死贖罪與王溫舒俱破東越後復與左將軍荀彘俱擊朝鮮為彘所縛語在朝鮮傳還免為庶人病死咸宣楊人也以佐史給事河東守衛將軍青使買馬河東見宣無害言上徵為廄丞官事辨稍遷至御史及中丞使治主父偃及淮南反獄所以微文深詆殺者甚眾稱為敢決疑數廢數起為御史及中丞者幾二十歲王溫舒為中尉而宣為左內史其治米鹽事小大皆關其手自部署縣名曹寶物官吏令丞弗得擅搖痛以重法繩之居官數年壹切為小治辯然獨宣以小至大能自行之難以為經中廢為右扶風坐怒其吏成信信亡藏上林中宣使郿令將吏卒闌入上林中蠶室門攻亭格殺信射中宛門宣下吏為大逆當族自殺而杜周任用是時郡守尉諸侯相二千石欲為治者大抵盡效王溫舒等而吏民益輕犯法盜賊滋起南陽有梅免百政楚有段中杜少齊有徐勃燕趙之間有堅盧范主之屬大群至數至數千人擅自號攻城邑取庫兵釋死罪縛辱郡守都尉殺二千石為檄告縣趨具食小群以百數掠鹵鄉里者不可稱數於是上始使御史中丞丞相長史使督之猶弗能禁乃使光祿大夫范昆諸部都尉及故九卿張德等衣繡衣持節虎符發兵以興擊斬首大部或至萬餘級及以法誅通行飲食坐相連郡甚者數千人數歲乃頗得其渠率散卒失亡復聚黨阻山川往往而群無可奈何於是作沈命法曰群盜起不發覺發覺而弗捕滿品者二千石以下至小吏者皆死其後小吏畏誅雖有盜弗敢發恐不能得坐課累府府亦使不言故盜賊浸多上下相為匿以避文法焉田廣明字子公鄭人也以郎為天水司馬功次遷河南都尉以殺伐為治郡國盜賊並起遷廣明為淮陽太守歲餘故城父令公孫勇與胡倩等謀反倩詐稱光祿大夫從車騎數十言使督盜賊止陳留傳舍太守謁見欲收取之廣明覺知發兵皆捕斬焉而公孫勇衣繡衣乘駟馬車至圉圉使小史侍之亦知其非是守尉魏不害與廄嗇夫江德尉史蘇昌共收捕之上封不害為當塗侯德轑陽侯昌蒲侯初四人俱拜於前小史竊言武帝問言何對曰為侯者得東歸不上曰女欲不貴矣女鄉名為何對曰名遺鄉上曰用遺汝矣於是賜小史爵關內侯食遺鄉六百戶上以廣明連禽大姦徵入為大鴻臚擢廣明兄雲中代為淮陽太守昭帝時廣明將兵擊益州還賜爵關內侯徙衛尉後出為左馮翊治有能名宣帝初立代蔡義為御史大夫以前為馮翊與議定策封昌水侯歲餘以祁連將軍將兵擊匈奴出塞至受降城受降都尉前死喪柩在堂廣明召其寡妻與姦既出不至質引軍空還下太守杜延年簿責廣明自殺闕下國除兄雲中為淮陽守亦敢誅殺吏民守闕告之竟坐棄市田延年字子賓先齊諸田也徙陽陵延年以材略給事大將軍莫府霍光重之遷為長史出為河東太守選拔尹翁歸等以為爪牙誅鉏豪彊姦邪不敢發以選入為大司農會昭帝崩昌邑王嗣位淫亂霍將軍憂懼與公卿議廢之莫敢發言延年按劍廷叱群臣即日議決語在光傳宣帝即位廷年以決疑定策封陽成侯先是茂陵富人焦氏賈氏以數千萬陰積貯炭葦諸下里物昭帝大行時方上事暴起用度未辦延年奏言商賈或豫收方上不祥器物冀其疾用欲以求利非民臣所當為諸沒入縣官奏可富人亡財者皆怨出錢求延年罪初大司農取民牛車三萬兩為僦載沙便橋下送致方上車直千錢延年上簿詐增僦直車二千凡六千萬盜取其半焦賈兩家告其事下丞相府丞相議奏延年主守盜三千萬不道霍將軍召問延年欲為道地延年抵曰本出將軍之門蒙此爵位無有是事光曰即無事當窮竟御史大夫田廣明謂太僕杜延年春秋之義以功覆過當廢昌邑王時非田子賓之言大事不成今縣官出三千萬自乞之何哉願以愚言白大將軍延年言之大將軍大將軍曰誠然實勇士也當發大議時震動朝廷光因舉手自撫心曰使我至今病悸謝田大夫曉大司農通往就獄得公議之田大夫使人語延年延年曰幸縣官寬我耳何面目入牢獄使眾人指笑我卒徒唾吾背乎即閉閣獨君齊舍偏袒持刀東西步數日使者召延年詣廷尉聞鼓聲自刎死國除嚴延年字次卿東海下邳人也其父為丞相掾延年少學法律丞相府歸為郡吏以選除補御史掾舉侍御史是時大將軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立亡人臣禮不道奏雖寢然朝廷肅焉敬憚廷年後復劾大司農田延年持兵干屬車大司農自訟不干屬車事下御史中丞譴責延年何以不移書宮殿門禁止大司農而令得出入宮於是覆劾延年闌內罪人法至死延年亡命會赦出丞相御史府徵書同日到延年以御史書先至詣御史府復為掾宣帝識之拜為平陵令坐殺不辜去官後為丞相掾復擢好畤令神爵中西羌反彊弩將軍許延壽請延年為長史從軍敗西羌還為涿郡太守時郡比得不能太守涿人畢野白等由是廢亂大姓西高氏東高氏自郡吏以下皆畏避之莫敢與啎咸曰寧負二千石無負豪大家賓客放為盜賊發輒入高氏吏不敢追浸浸日多道路張弓拔刃然後敢行其亂如此延年至遣掾蠡吾趙繡桉高氏得其死罪繡見延年新將心內懼即為兩劾欲先白其輕者觀延年意怒乃出其重劾延年已知其如此矣趙掾至果白其輕者延年索懷中得重劾即收送獄夜入晨將至市論殺之先所桉者死吏皆股弁更遣吏分考兩高窮竟其姦誅殺各數十人郡中震恐道不拾遺三歲遷河南太守賜黃金二十斤豪彊脅息野無行盜威震旁郡其治務在摧折豪彊扶助貧弱貧弱雖陷法曲文以出之其豪桀侵小民者以文內之眾人所謂當死者一朝出之所謂當生者詭殺之吏民莫能測其意深淺戰粟不敢犯禁桉其獄皆文致不可得反延年為人短小精悍敏捷於事雖子貢冉有通藝於政事不能絕也吏忠盡節者厚遇之如骨肉皆親鄉之出身不顧以是治下無隱情然疾惡泰甚中傷者多尤巧為獄文善史書所欲誅殺奏成於手中主簿親近史不得聞知奏可論死奄忽如神冬月傳屬縣囚會論府上流血數里河南號曰屠伯令行禁止郡中正清是時張敞為京兆尹素與延年善敞治雖嚴然尚頗有縱舍聞延年用刑刻急乃以書諭之曰昔韓盧之取菟也上觀下獲不甚多殺願次卿少緩誅罰思行此術延年報曰河南天下喉咽二周餘斃莠盛苗穢何可不鉏也自矜伐其能終不衰止時黃霸在潁川以寬恕為治郡中亦平婁蒙豐年鳳皇下上賢焉下詔稱揚其行加金爵之賞延年素輕霸為人及比郡為守襃賞反在己前心內不服河南界中又有蝗蟲府丞義出行蝗還見延年延年曰此蝗豈鳳皇食邪義又道司農中丞耿壽昌為常平倉利百姓延年曰丞相御史不知為也當避位去壽昌安得權此後左馮翊缺上欲徵延年符已發為其名酷復止延年疑少府梁丘賀毀之心恨會琅邪太守以視事久病滿三月免延年自知見廢謂丞曰此人尚能去官我反不能去邪又延年察獄史廉有臧不入身延年坐選舉不實貶秩笑曰後敢復有舉人者矣丞義年老頗悖素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之無意毀傷也饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按驗有此數事以結延年坐怨望非謗政治不道棄市初延年母從東海來欲從延年臘到雒陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良久母乃見之因數責延年幸得備郡守專治千里不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舍母畢正臘謂延年天道神明人不可獨殺我不意當老見壯子被刑戮也行矣去女東歸埽除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢知其母延年兄弟五人皆有吏材至大官東海號曰萬石嚴嫗次弟彭祖至太子太傅在儒林傳尹賞字子心鉅鹿楊氏人也以郡吏察廉為樓煩長舉茂材粟邑令左馮翊薛宣奏賞能治劇徙為頻陽令坐殘賊免後以御史舉為鄭令永始元延間上怠於政貴戚驕恣紅陽長仲兄弟交通輕俠臧匿亡命而北地大豪浩商等報怨殺義渠長妻子六人往來長安中丞相御史遣掾求逐黨與詔書召捕久之乃得長安中姦猾浸多閭里少年群輩殺吏受賕報仇相與探丸為彈得赤丸者斫武吏得黑丸者斫文吏白者主治喪城中薄暮塵起剽劫行者死傷橫道枹鼓不絕賞以三輔高第選守長安令得壹切便宜從事賞至修治長安獄穿地方深各數丈致令辟為郭以大石覆其口名為虎穴乃部戶曹掾史與鄉吏亭長里正父老伍人雜舉長安中輕薄少年惡子無市籍商販作務而鮮衣凶服鎧扞持刀兵者悉籍記之得數百人賞一朝會長安吏車數百兩分行收捕皆刻以為通行飲食群盜賞親閱見十置一其餘盡以次內虎穴中百人為輩覆以大石數日壹發視皆相枕藉死便輿出瘞寺門桓東楬著其姓名百日後乃令死者家各自發取其尸親屬號哭道路皆歔欷長安中歌之曰安所求子死桓東少年場生時諒不謹枯骨後何葬賞所置皆其魁宿或故吏善家子失計隨輕黠願自改者財數十百人皆貰其罪詭令立功以自贖盡力有效者因親用之為爪牙追捕甚精甘耆姦惡其於凡吏賞視事數月盜賊止郡國亡命散走各歸其處不敢闚長安江湖中多盜賊以賞為江夏太守捕格江賊及所誅吏民甚多坐殘賊免南山群盜起以賞為右輔都尉遷執金吾督大姦猾三輔吏民甚畏之數年卒官疾病且死戒其諸子曰丈夫為吏正坐殘賊免追思其功效則復進用矣一坐軟弱不勝任免終身廢棄無有赦時其羞辱甚於貪汙坐臧慎毋然賞四子皆至郡守長子立為京兆尹皆尚威嚴有治辦名贊曰自郅都以下皆以酷烈為聲然都抗直引是非爭大體張湯以知阿邑人主與俱上下時辯當否國家賴其便趙禹据法守正杜周從諛以少言為重張湯死後罔密事叢以浸耗廢九卿奉職救過不給何暇論繩墨之外乎自是以至哀平酷吏眾多然莫足數此其知名見紀者也其廉者足以為儀表其汙者方略教道壹切禁姦亦質有文武焉雖酷稱其位矣湯周子孫貴盛故別傳
