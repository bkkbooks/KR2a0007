body:
  text: 杜周傳第三十杜周南陽杜衍人也義縱為南陽太守以周為爪牙薦之張湯為廷尉史使案邊失亡所論殺甚多奏事中意任用與減宣更為中丞者十餘歲周少言重遲而內深次骨宣為左內史周為廷尉其治大抵放張湯而善候司上所欲擠者因而陷之上所欲釋久繫待問而微見其冤狀客有謂周曰君為天下決平不循三尺法專以人主意指為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉詔獄亦益多矣二千石繫者新故相因不減百餘人郡吏大府舉之廷尉一歲至千餘章章大者連逮證案數百小者數十人遠者數千里近者數百里會獄吏因責如章告劾不服以掠笞定之於是聞有逮證皆亡匿獄久者至更數赦十餘歲而相告言大氐盡詆以不道以上廷尉及中都官詔獄逮至六七萬人吏所增加十有餘萬周中廢後為執金吾逐捕桑弘羊衛皇后昆弟子刻深上以為盡力無私遷為御史大夫始周為廷史有一馬及久任事列三公而兩子夾河為郡守家訾累巨萬矣治皆酷暴唯少子延年行寬厚云延年字幼公亦明法律昭帝初立大將軍霍光秉政以延年三公子吏材有餘補軍司空始元四年益州蠻夷反延年以校尉將南陽士擊益州還為諫大夫左將軍上官桀父子與蓋主燕王謀為逆亂假稻田使者燕倉知其謀以告大司農楊敞敞惶懼移病以語延年延年以聞桀等伏辜延年封為建平侯延年本大將軍霍光吏首發大姦有忠節由是擢為太僕右曹給事中光持刑罰嚴延年輔之以寬治燕王獄時御史大夫桑弘羊子遷亡過父故吏侯史吳後遷捕得伏法會赦侯史吳自出繫獄廷尉王平與少府徐仁雜治反事皆以為桑遷坐父謀反而侯史吳臧之非匿反者乃匿為隨者也即以赦令除吳罪後侍御史治實以桑遷通經術知父謀反而不諫爭與反者身無異侯史吳故三百石吏首匿遷不與庶人匿隨從者等吳不得赦奏請覆治劾廷尉少府縱反者少府徐仁即丞相車千秋女壻也故千秋數為侯史吳言恐光不聽千秋即召中二千石博士會公車門議問吳法議者知大將軍指皆執吳為不道明日千秋封上眾議光於是以千秋擅召中二千石以下外內異言遂下廷尉平少府仁獄朝廷皆恐丞相坐之延年乃奏記光爭以為吏縱罪人有常法今更詆吳為不道恐於法深又丞相素無所守持而為好言於下盡其素行也至擅召中二千石甚無狀延年愚以為丞相久故及先帝用事非有大故不可棄也間者民頗言獄深吏為峻詆今丞相所議又獄事也如是以及丞相恐不合眾心群下讙譁庶人私議流言四布延年竊重將軍失此名於天下也光以廷尉少府弄法輕重皆論棄市而不以及丞相終與相竟延年論議持平合和朝廷皆此類也見國家承武帝奢侈師旅之後數為大將軍光言年歲比不登流民未盡還宜修孝文時政示以儉約寬和順天心說民意年歲宜應光納其言舉賢良議罷酒榷鹽鐵皆自延年發之吏民上書言便宜有異輒下延年平處復奏言可官試者至為縣令或丞相御史除用滿歲以狀聞或抵其罪法常與兩府及廷尉分章昭帝末寢疾徵天下名醫延年典領方藥帝崩昌邑王即位廢大將軍光車騎將軍張安世與大臣議所立時宣帝養於掖廷號皇曾孫與延年中子佗相愛善延年知曾孫德美勸光安世立焉宣帝即位襃賞大臣延年以定策安宗廟益戶二千三百與始封所食邑凡四千三百戶詔有司論定策功大司馬大將軍光功德過太尉絳侯周勃車騎將軍安世丞相楊敞功比丞相陳平前將軍韓增御史大夫蔡誼功比潁陰侯灌嬰太僕杜延年功比朱虛侯劉章後將軍趙充國大司農田延年少府史樂成功比典客劉揭皆封侯益土延年為人安和備於諸事久典朝政上任信之出即奉駕入給事中居九卿位十餘年賞賜賂遺訾數千萬霍光薨後子禹與宗族謀反誅上以延年霍氏舊人欲退之而丞相魏相奏延年素貴用事官職多姦遣吏考案但得苑馬多死官奴婢乏衣食延年坐免官削戶二千後數月復召拜為北地太守延年以故九卿外為邊吏治郡不進上以璽書讓延年延年乃選用良吏捕擊豪強郡中清靜居歲餘上使謁者賜延年璽書黃金二十斤徙為西河太守治甚有名五鳳中徵入為御史大夫延年居父官府不敢當舊位坐臥皆易其處是時四夷和海內平延年視事三歲以老病乞骸骨天子優之使光祿大夫持節賜延年黃金百斤酒加致醫藥延年遂稱病篤賜安車駟馬罷就第後數月薨諡曰敬侯子緩嗣緩少為郎本始中以校尉從蒲類將軍擊匈奴還為諫大夫遷上谷都尉雁門太守父延年薨徵視喪事拜為太常治諸陵縣每冬月封具獄日常去酒省食官屬稱其有恩元帝初即位穀貴民流永光中西羌反緩輒上書入錢穀以助用前後數百萬緩六弟五人至大官少弟熊歷五郡二千石三州牧剌史有能名唯中弟欽官不至而最知名欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜鄴與欽同姓字俱以材能稱京師故衣冠謂欽為盲杜子夏以相別欽惡以疾見詆乃為小冠高廣財二寸由是京師更謂欽為小冠杜子夏而鄴為大冠杜子夏云時帝舅大將軍王鳳以外戚輔政求賢知自助鳳父頃侯禁與欽兄緩相善故鳳深知欽能奏請欽為大將軍軍武庫令職閒無事欽所好也欽為人深博有謀自上為太子時以好色聞及即位皇太后詔采良家女欽因是說大將軍鳳曰禮壹娶九女所以極陽數廣嗣重祖也必鄉舉求窈窕不問華色所以助德理內也娣姪雖缺不復補所以養壽塞爭也故后妃有貞淑之行則胤嗣有賢聖之君制度有威儀之節則人君有壽考之福廢而不由則女德不厭女德不厭則壽命不究於高年書云或四三年言失欲之生害也男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有間適之心是以晉獻被納讒之謗申生蒙無罪之辜今聖主富於春秋未有適嗣方鄉術入學未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有色聲音技能為萬世大法夫少戒之在色小卞之作可為寒心唯將軍常以為憂鳳白之太后太后以為故事無有欽復重言詩云殷監不遠在夏后氏之世剌戒者至迫近而省聽者常怠忽可不慎哉前言九女略陳其禍福甚可悼懼竊恐將軍不深留意后妃之制夭壽治亂存亡之端也迹三代之季世覽宗宣之饗國察近屬之符驗禍敗曷常不由女德是以佩玉晏鳴關雎歎之知好色之伐性短年離制度之生無厭天下將蒙化陵夷而成俗也故詠淑女幾以配上忠孝之篤仁厚之作也夫君親壽尊國家治安誠臣子之至願所當勉之也易曰正其本萬物理凡事論有疑未可立行者求之往古則典刑無考之來今則吉凶同卒搖易之則民心惑若是者誠難施也今九女之制合於往古無害於今不逆於民心至易行也行之至有福也將軍輔政而不蚤定非天下之所望也唯將軍信臣子之願念關雎之思逮委政之隆及始初清明為漢家建無窮之基誠難以忽不可以遴鳳不能自立法度循故事而已會皇太后女弟司馬君力與欽兄子私通事上聞欽慚懼乞骸骨去後有日蝕地震之變詔舉賢良方正能直言士合陽侯梁放舉欽欽上對曰陛下畏天命悼變異延見公卿舉直言之士將以求天心迹得失也臣欽愚戇經術淺薄不足以奉大對臣聞日蝕地震陽微陰盛也臣者君之陰也子者父之陰也妻者夫之陰也夷狄者中國之陰也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乘夫或臣子背君父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親屬無乖剌之心關東諸侯無強大之國三垂蠻夷無逆理之節殆為後宮何以言之日以戊申蝕時加未戊未土也土者中宮之部也其夜地震未央宮殿中此必適妾將有爭寵相害而為患者唯陛下深戒之變感以類相應人事失於下變象見於上能應之以德則異咎消亡不能應之以善則禍敗至高宗遭雊雉之戒飭己正事享百年之壽殷道復興要在所以應之應之非誠不立非信不行宋景公小國之諸侯耳有不忍移禍之誠出人君之言三熒惑為之退舍以陛下聖明內推至誠深思天變何應而不感何搖而不動孔子曰仁遠乎哉唯陛下正后妾抑女寵防奢泰去佚游躬節儉親萬事數御安車由輦道親二宮之饔膳致晨昏之定省如此即堯舜不足與比隆咎異何足消滅如不留聽於庶事不論材而授位殫天下之財以奉淫侈匱萬姓之力以從耳目近諂諛之人而遠公方信讒賊之臣以誅忠良賢俊失在巖穴大臣怨於不以雖無變異社稷之憂也天下至大萬事至眾祖業至重誠不可以佚豫為不可以奢泰持也唯陛下忍無益之欲以全眾庶之命臣欽愚戇言不足采其夏上盡召直言之士詣白虎殿對策策曰天地之道何貴王者之法何如六經之義何上人之行何先取人之術何以當世之治何務各以經對欽對曰臣聞天道貴信地道貴貞不信不貞萬物不生生天地之所貴也王者承天地之所生理而成之昆蟲草木靡不得其所王者法天地非仁無以廣施非義無以正身克己就義恕以及人六經之所上也不孝則事君不忠涖官不敬戰陳無勇朋友不信孔子曰孝無終始而患不及者未之有也孝人行之所先也觀本行於鄉黨考功能於官職達觀其所舉富觀其所予窮觀其所不為乏觀其所不取近觀其所為主遠觀其所主孔子曰視其所以觀其所由察其所安人焉廋哉取人之術也殷因於夏尚質周因於殷尚文今漢家承周秦之敝宜抑文尚質廢奢長儉表實去偽孔子曰惡紫之奪朱當世治之所務也臣竊有所憂言之則拂心逆指不言則漸日長為禍不細然小臣不敢廢道而求從違忠而耦意臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妒之心興矣如此則匹婦之說不可勝也唯陛下純德普施無欲是從此則眾庶咸說繼嗣日廣而海內長安萬事之是非何足備言欽以前事病賜帛罷後為議郎復以病免徵詣大將軍莫府國家政謀鳳常與欽慮之數稱達名士王駿韋安世王延世等救解馮野王王尊胡常之罪過及繼功臣絕世填撫四夷當世善政多出於欽者見鳳專政泰重戒之曰昔周公身有至聖之德屬有叔父之親而成王有獨見之明無信讒之聽然管蔡流言而周公懼穰侯昭王之舅也權重於秦威震鄰敵有旦莫偃伏之愛心不介然有間然范雎起徒步由異國無雅信開一朝之說而穰侯就封及近者武安侯之見退三事之跡相去各數百歲若合符節甚不可不察願將軍由周公之謙懼損穰侯之威放武安之欲毋使范雎之徒得間其說頃之復日蝕京兆尹王章上封事求見果言鳳專權蔽主之過宜廢勿用以應天變於是天子感悟召見章與議欲退鳳鳳甚憂懼欽令鳳上疏謝罪乞骸骨文指其哀太后涕泣為不食上少而親倚鳳亦不忍廢復起鳳就位鳳心慚稱病篤欲遂退欽復說之曰將軍深悼輔政十年變異不已故乞骸骨歸咎於身刻己自責至誠動眾愚知莫不感傷雖然是無屬之臣執進退之分絜其去就之節者耳非主上所以待將軍非將軍所以報主上也昔周公雖老猶在京師明不離成周示不忘王室也仲山父異姓之臣無親於宣就封於齊猶歎息永懷宿夜徘徊不忍遠去況將軍之於主上主上之與將軍哉夫欲天下治安變異之意莫有將軍主上昭然知之故攀援不遣書稱公毋困我唯將軍不為四國流言自疑於成王以固至忠鳳復起視事上令尚書劾奏京兆尹章章死詔獄語在元后傳章既死眾庶冤之以譏朝廷欽欲救其過復說鳳曰京兆尹章所坐事密吏民見章素好言事以為不坐官職疑其以日蝕見對有所言也假令章內有所犯雖陷正法事不暴揚自京師不曉況於遠方恐天下不知章實有罪而以為坐言事也如是塞爭引之原損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策欽之補過將美皆此類也優游不仕以壽終欽子及昆弟支屬至二千石者且十人欽兄緩前免太常以列侯奉朝請成帝時乃薨子業嗣業有材能以列侯選復為太常數言得失不事權貴與丞相翟方進衛尉定陵侯淳于長不平後業坐法免官復為函谷關都尉會定陵侯長有罪當就國長舅紅陽侯立與業書曰誠哀老姊垂白隨無狀子出關願勿復用前事相侵定陵侯既出關伏罪復發下雒陽獄丞相史搜得紅陽侯書奏業聽請不敬坐免就國其春丞相方進薨業上書言方進本與長深結厚更相稱薦長陷大惡獨得不坐苟欲障塞前過不為陛下廣持平例又無恐懼之心反因時信其邪辟報睚眥怨故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友後將軍朱博鉅鹿太守孫宏故少府陳咸皆免官歸咸故郡刑罰無平在方進之筆端眾庶莫不疑惑皆言孫宏不與紅陽侯相愛宏前為中丞時方進為御史大夫舉掾隆可侍御史宏奏隆前奉使欺謾不宜執法近侍方進以此怨宏又方進為京兆尹時陳咸為少府在九卿高弟陛下所自知也方進素與司直師丹相善臨御史大夫缺使丹奏咸為姦利請案驗卒不能有所得而方進果自得御史大夫為丞相即時詆欺奏免咸復因紅陽侯事歸咸故郡眾人皆言國家假方進權太甚案師丹行能無異及光祿勳許商被病殘人皆但以附從方進嘗獲尊官丹前親薦邑子丞相史能使巫下神為國求福幾獲大利幸賴陛下至明遣使者毛莫如先考驗卒得其姦皆坐死假令丹知而白之此誣罔罪也不知而白之是背經術惑左道也二者皆在大辟重於朱博孫宏陳咸所坐方進終不舉白專作威福阿黨所厚排擠英俊託公報私橫厲無所畏忌欲以熏轑天下天下莫不望風而靡自尚書近臣皆結舌杜口骨肉親屬莫不股栗威權泰盛而不忠信非所以安國家也今聞方進卒病死不以尉示天下反復賞賜厚葬唯陛下深思往事以戒來今會成帝崩哀帝即位業復上書言王氏世權日久朝無骨骾之臣宗室諸侯微弱與繫囚無異自佐史以上至於大吏皆權臣之黨曲陽侯根前為三公輔政知趙昭儀殺皇子不輒白奏反與趙氏比周恣意妄行譖愬故許后被加以非罪誅破諸許族敗元帝外家內嫉妒同產兄姊紅陽侯立及淳于氏皆老被放棄新喋血京師威權可畏高陽侯薛宣有不養母之名安昌侯張禹姦人之雄惑亂朝廷使先帝負謗於海內尤不可不慎陛下初即位謙讓未皇孤獨特立莫可據杖權臣易世意若探湯宜蚤以義割恩安百姓心竊見朱博忠信勇猛材略不世出誠國家雄俊之寶臣也宜徵博置左右以填天下此人在朝則陛下可高枕而臥矣昔諸呂欲危劉氏賴有高祖遺臣周勃陳平尚存不者幾為姦臣笑業又言宜為恭王立廟京師以章孝道時高昌侯董宏亦言宜尊帝母定陶王丁后為帝太后大司空師丹等劾宏誤朝不道坐免為庶人業復上書訟宏前後所言皆合指施行朱博果見拔用業由是徵復為太常歲餘左遷上黨都尉會司隸奏業為太常選舉不實業坐免官復就國哀帝崩王莽秉政諸前議立廟尊號者皆免徙合浦業以前罷黜故見闊略憂恐發病死業成帝初尚帝妹潁邑公主主無子薨業家上書求還京師與主合葬不許而賜諡曰荒侯傳子至孫絕初杜周武帝時徙茂陵至延年徙杜陵云贊曰張湯杜周並起文墨小吏致位三公列於酷吏而俱有良子德器自過爵位尊顯繼世立朝相與提衡至於建武杜氏爵乃獨絕迹其福祚元功儒林之後莫能及也自謂唐杜苗裔豈其然乎及欽浮沈當世好謀而成以建始之初深陳女戒終如其言庶幾乎關雎之見微非夫浮華博習之徒所能規也業因勢而抵垝稱朱博毀師丹愛憎之議可不畏哉
