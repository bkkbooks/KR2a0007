body:
  text: 昭帝紀第七孝昭皇帝武帝少子也母曰趙倢妤本以有奇異得幸及生帝亦奇異語在外戚傳武帝末戾太子敗燕王旦廣陵王胥行驕嫚後元二年二月上疾病遂立昭帝為太子年八歲以侍中奉車都尉霍光為大司馬大將軍受遺詔輔少主明日武帝崩戊辰太子即皇帝位謁高廟帝姊鄂邑公主益湯沐邑為長公主共養省中大將軍光秉政領尚書事車騎將軍金日磾左將軍上官桀副焉夏六月赦天下秋七月有星孛于東方濟北王寬有罪自殺賜長公主及宗室昆弟各有差追尊趙倢妤為皇太后起雲陵冬胸奴入朔方殺略吏民發軍屯西河左將軍桀行北邊始元元年春二月黃鵠下建章宮太液池中公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鉤盾弄田益封燕王廣陵王及鄂邑長公主各萬三千戶夏為太后起園廟雲陵益州廉頭姑繒牂柯談指同並二十四邑皆反遣水衡都尉呂破胡募吏民及發犍為蜀郡奔擊益州大破之有司請河內屬冀州河東屬并州秋七月赦天下賜民百戶牛酒大雨渭橋絶八月齊孝王孫劉澤謀反欲殺青州刺史雋不疑發覺皆伏誅遷不疑為京兆尹賜錢百萬九月丙子車騎將軍日磾薨閏月遣故廷尉王平等五人持節行郡國舉賢良問民所疾苦冤失職者冬無冰二年春正月大將軍光左將軍桀皆以前捕斬反虜重合侯馬通功封光為博陵侯桀為安陽侯以宗室毋在位者舉茂才劉辟彊劉長樂皆為光祿大夫辟彊守長樂衛尉三月遣使者振貸貧民毋種食者秋八月詔曰往年災害多今年蠶麥傷所振貸種食勿收責毋令民出今年田租冬發習戰射士詣朔方調故吏將屯田張掖郡三年春二月有星孛于西北秋募民徙雲陵賜錢田宅冬十月鳳皇集東海遣使者祠其處十一月壬辰朔日有蝕之四年春三月甲寅立皇后上官氏赦天下辭訟在後二年前皆勿聽治夏六月皇后見高廟賜長公主丞相將軍列侯中二千石以下及郎吏宗室錢帛各有差徙三輔富人雲陵賜錢戶十萬秋七月詔曰比歲不登民匱於食流庸未盡還往時令民共出馬其止勿出諸給中都官者且減之冬遣大鴻臚田廣明擊益州廷尉李种坐故縱死罪棄市五年春正月追尊皇太后父為順成侯夏陽男子張延年詣北闕自稱衛太子誣罔要斬夏罷天下亭母馬及馬弩關六月封皇后父驃騎將軍上官安為桑樂侯詔曰朕以眇身獲保宗廟戰戰栗栗夙興夜寐修古帝王之事通保傅傳孝經論語尚書未云有明其令三輔太常舉賢良各二人郡國文學高第各一人賜中二千石以下至吏民爵各有差罷儋耳真番郡秋大鴻臚廣明軍正王平擊益州斬首捕虜三萬餘人獲畜産五萬餘頭六年春正月上耕于上林二月詔有司問郡國所舉賢良文學民所疾苦議罷鹽鐵榷酤栘中監蘇武前使胸奴留單于庭十九歲乃還奉使全節以武為典屬國賜錢百萬夏旱大雩不得舉火秋七月罷榷酤官令民得以律占租賣酒升四錢以邊塞闊遠取天水隴西張掖郡各二縣置金城郡詔曰鉤町侯毋波率其君長人民擊反者斬首捕虜有功其立毋波為鉤町王大鴻臚廣明將率有功賜爵關內侯食邑元鳳元年春長公主共養勞苦復以藍田益長公主湯沐邑泗水戴王前薨以毋嗣國除後宮有遺腹子暖相內史不秦言上聞而憐之立暖為泗水王相內史皆下獄三月賜郡國所選有行義者涿郡韓福等五人帛人五十匹遣歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里令郡縣常以正月賜羊酒有不幸者賜衣被一襲祠以中牢武都氐人反遣執金吾馬適建龍額侯韓增大鴻臚廣明將三輔太常徒皆免刑擊之夏六月赦天下秋七月乙亥晦日有蝕之既八月改始元為元鳳九月鄂邑長公主燕王旦與左將軍上官桀桀子票騎將軍安御史大夫桑弘羊皆謀反伏誅初桀安父子與大將軍光爭權欲害之詐使人為燕王旦上書言光罪時上年十四覺其詐後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毀者坐之光由是得盡忠語在燕王霍光傳冬十月詔曰左將軍安陽侯桀栗騎將軍桑樂侯安御史大夫弘羊皆數以邪枉干輔政大將軍不聽而懷怨望與燕王通謀置驛往來相約結燕王遣壽西長孫縱之等賂遺長公主丁外人謁者杜延年大將軍長史公孫遺等交通私書共謀令長公主置酒伏兵殺大將軍光徵立燕王為天子大逆毋道故稻田使者燕倉先發覺以告大司農敞敞告諫大夫延年延年以聞丞相徵事任宮手捕斬桀丞相少史王壽誘將安入府門皆已伏誅吏民得以安封延年倉宮壽皆為列侯又曰燕王迷惑失道前與齊王子劉澤等為逆抑而不揚望王反道自新今乃與長公主及左將軍桀等謀危宗廟王及公主皆自伏辜其赦王太子建公主子文信及宗室子與燕王上官桀等謀反父母同産當坐者皆免為庶人其吏為桀等所詿誤未發覺在吏者除其罪二年夏四月上自建章宮徙未央宮大置酒賜郎從官帛及宗室子錢人二十萬吏民獻牛酒者賜帛人一匹六月赦天下詔曰朕閔百姓未贍前年減漕三百萬石頗省乘輿馬及苑馬以補邊郡三輔傳馬其令郡國毋斂今年馬口錢三輔太常郡得以叔粟當賦三年春正月泰山有大石自起立上林有柳樹枯僵自起生罷中牟苑賦貧民詔曰乃者民被水災頗匱於食朕虛倉廩使使者振困乏其止四年毋漕三年以前所振貸非丞相御史所請邊郡受牛者勿收責夏四月少府徐仁廷尉王平左馮翊賈勝胡皆坐縱反者仁自殺平勝胡皆要斬冬遼東烏桓反以中郎將范明友為度遼將軍將北邊七郡郡二千騎擊之四年春正月丁亥帝加元服見于高廟賜諸侯王丞相大將軍列侯宗室下至吏民金帛牛酒各有差賜中二千石以下及天下民爵毋收四年五年口賦三年以前逋更賦未入者皆勿收令天下酺五日甲戌丞相千秋薨夏四月詔曰度遼將軍明友前以羌騎校尉將羌王侯君長以下擊益州反虜後復率擊武都反氐今破烏桓斬虜獲生有功其封明友為平陵侯平樂監傅介子持節使誅斬樓蘭王安歸首縣北闕封義陽侯五月丁丑孝文廟正殿火上及群臣皆素服發中二千石將五校作治六日成太常及廟令丞郎吏皆劾大不敬會赦太常轑陽侯德免為庶人六月赦天下五年春正月廣陵王來朝益國萬一千戶賜錢二千萬黃金二百斤劍二安車一乘馬二駟夏大旱六月發三輔及郡國惡少年吏有告劾亡者屯遼東秋罷象郡分屬鬱林牂柯冬十一月大雷十二月庚戌丞相欣薨六年春正月募郡國徒築遼東玄菟城夏赦天下詔曰夫穀賤傷農今三輔太常穀減賤其令以叔粟當今年賦右將軍張安世宿衛忠謹封富平侯烏桓復犯塞遣度遼將軍范明友擊之元平元年春二月詔曰天下以農桑為本日者省用罷不急官減外繇耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之甲申晨有流星大如月衆星皆隨西行夏四月癸未帝崩于未央宮六月壬申葬平陵贊曰昔周成以孺子繼統而有管蔡四國流言之變孝昭幼年即位亦有燕盍上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘敝師旅之後海內虛耗戶口減半光知時務之要輕繇薄賦與民休息至始元元鳳之間胸奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷榷酤尊號曰昭不亦宜乎
