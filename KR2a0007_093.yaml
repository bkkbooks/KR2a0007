body:
  text: 西域傳第六十六下烏孫國大昆彌治赤谷城去長安八千九百里戶十二萬口六十三萬勝兵十八萬八千八百人相大祿左右大將二人侯三人大將都尉各一人大監二人大吏一人舍中大吏二人騎君一人東至都護治所千七百二十一里西至康居蕃內地五千里地莽平多雨寒山多松樠不田作種樹隨畜逐水草與胸奴同俗國多馬富人至四五千匹民剛惡貪狼無信多寇盜最為強國故服胸奴後盛大取羈屬不肯往朝會東與胸奴西北與康居西與大宛南與城郭諸國相接本塞地也大月氏西破走塞王塞王南越縣度大月氏居其地後烏孫昆莫擊破大月氏大月氏徙西臣大夏而烏孫昆莫居之故烏孫民有塞種大月氏種云始張騫言烏孫本與大月氏共在敦煌間今烏孫雖強大可厚賂招令東居故地妻以公主與為昆弟以制胸奴語在張騫傳武帝即位令騫齎金幣往昆莫見騫如單于禮騫大慚謂曰天子致賜王不拜則還賜昆莫起拜其它如故初昆莫有十餘子中子大祿強善將將衆萬餘騎別居大祿兄太子太子有子曰岑陬太子蚤死謂昆莫曰必以岑陬為太子昆莫哀許之大祿怒乃收其昆弟將衆畔謀攻岑陬昆莫與岑陬萬餘騎令別居昆莫亦自有萬餘騎以自備國分為三大總羈屬昆莫騫既致賜諭指曰烏孫能東居故地則漢遣公主為夫人結為昆弟共距胸奴不足破也烏孫遠漢未知其大小又近胸奴服屬日久其大臣皆不欲徙昆莫年老國分不能專制乃發使送騫因獻馬數十匹報謝其使見漢人衆富厚歸其國其國後乃益重漢胸奴聞其與漢通怒欲擊之又漢使烏孫乃出其南抵大宛月氏相屬不絶烏孫於是恐使使獻馬願得尚漢公主為昆弟天子問群臣議許曰必先內聘然後遣女烏孫以馬千匹聘漢元封中遣江都王建女細君為公主以妻焉賜乘輿服御物為備官屬宦官侍御數百人贈送甚盛烏孫昆莫以為右夫人胸奴亦遣女妻昆莫昆莫以為左夫人公主至其國自治宮室居歲時一再與昆莫會置酒飲食以幣帛賜王左右貴人昆莫年老語言不通公主悲愁自為作歌曰吾家嫁我兮天一方遠託異國兮烏孫王穹廬為室兮旃為牆以肉為食兮酪為漿居常土思兮心內傷願為黃鵠兮歸故鄉天子聞而憐之間歲遣使者持帷帳錦繡給遺焉昆莫年老欲使其孫岑阪尚公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑陬遂妻公主昆莫死岑陬代立岑陬者官號也名軍須靡昆莫王號也名獵驕靡後書昆彌云岑陬尚江都公主生一女少夫公主死漢復以楚王戊之孫解憂為公主妻岑陬岑陬胡婦子泥靡尚小岑陬且死以國與季父大祿子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主解憂生三男兩女長男曰元貴靡次曰萬年為莎車王次曰大樂為左大將長女弟史為龜茲王絳賓妻小女素光為若呼翕侯妻昭帝時公主上書言胸奴發騎田車師車師與胸奴為一共侵烏孫唯天子幸救之漢養士馬議欲擊胸奴會昭帝崩宣帝初即位公主及昆彌皆遣使上書言胸奴復連發大兵侵擊烏孫取車延惡師地收人民去使使謂烏孫趣持公主來欲隔絶漢昆彌願發國半精兵自給人馬五萬騎盡力擊胸奴唯天子出兵以救公主昆彌漢兵大發十五萬騎五將軍分道並出語在胸奴傳遣校尉常惠使持節護烏孫兵昆彌自將翕侯以下五萬騎從西方入至右谷蠡王庭獲單于父行及嫂居次名王犂汙都尉千長騎將以下四萬級馬牛羊驢橐駝七十餘萬頭烏孫皆自取所虜獲還封惠為長羅侯是歲本始三年也漢遣惠持金幣賜烏孫貴人有功者元康二年烏孫昆彌因惠上書願以漢外孫元貴靡為嗣得令復尚漢公主結婚重親畔絶胸奴願聘馬騾各千匹詔下公卿議大鴻臚蕭望之以為烏孫絶域變故難保不可許上美烏孫新立大功又重絶故業遣使者至烏孫先迎取聘昆彌及太子左右大將都尉皆遣使凡三百餘人入漢迎取少主上乃以烏孫主解憂弟子相夫為公主置官屬侍御百餘人舍上林中學烏孫言天子自臨平樂觀會胸奴使者外國君長大角抵設樂而遣之使長羅侯光祿大夫惠為副凡持節者四人送少主至敦煌未出塞聞烏孫昆彌翁歸靡死烏孫貴人共從本約立岑陬子泥靡代為昆彌號狂王惠上書願留少主敦煌惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以為烏孫持兩端難約結前公主在烏孫四十餘年恩愛不親密邊竟未得安此已事之驗也今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興其原起此天子從之徵還少主狂王復尚楚主解憂生一男鴟靡不與主和又暴惡失衆漢使衛司馬魏和意副候任昌送侍子公主言狂王為烏孫所患苦易誅也遂謀置酒會罷使士拔劍擊之劍旁下狂王傷上馬馳去其子細沈瘦會兵圍和意昌及公主於赤谷城數月都護鄭吉發諸國兵救之乃解去漢遣中郎將張遵持醫藥治狂王賜金二十斤采繒因收和意昌係瑣從尉犂檻車至長安斬之車騎將軍長史張翁留驗公主與使者謀殺狂王狀主不服叩頭謝張翁捽主頭罵詈主上書翁還坐死副使季都別將醫養視狂王狂王從十餘騎送之都還坐知狂王當誅見便不發下蠶室初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翕侯俱去居北山中揚言母家胸奴兵來故衆歸之後遂襲殺狂王自立為昆彌漢遣破羌將軍辛武賢將兵萬五千人至敦煌遣使者案行表穿卑鞮侯井以西欲通渠轉穀積居廬倉以討之初楚主侍者馮嫽能史書習事嘗持漢節為公主使行賞賜於城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人説烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號宣帝徵馮夫人自問狀遣謁者竺次期門甘延壽為副送馮夫人馮夫人錦車持節詔烏就屠詣長羅侯赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翕侯民衆漢復遣長羅侯惠將三校屯赤谷因為分別其人民地界大昆彌戶六萬餘小昆彌戶四萬餘然衆心皆附小昆彌元貴靡鴟靡皆病死公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之公主與烏孫男女三人俱來至京師是歲甘露三年也時年且七十賜以公主田宅奴婢奉養甚厚朝見儀比公主後二歲卒三孫因留守墳墓云元貴靡子星靡代為大昆彌弱馮夫人上書願使烏孫鎮撫星靡漢遣之卒百人送焉都護韓宣奏烏孫大吏大祿大監皆可以賜金印紫綬以尊輔大昆彌漢許之後都護韓宣復奏星靡怯弱可免更以季父左大將樂代為昆彌漢不許後段會宗為都護招還亡畔安定之星靡死子雌粟靡代小昆彌烏就屠死子拊離代立為弟日二所殺漢遣使者立拊離子安日為小昆彌日二亡阻康居漢徙己校屯姑墨欲侯便討焉安日使貴人姑莫匿等三人詐亡從日二刺殺之都護廉褒賜姑莫匿等金人二十斤繒三百匹後安日為降民所殺漢立其弟末振將代時大昆彌雌粟靡健翕侯皆畏服之告民牧馬畜無使入牧國中大安和翁歸靡時小昆彌末振將恐為所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎將段會宗持金幣與都護圖方略立雌粟靡季父公主孫伊秩靡為大昆彌漢沒入小昆彌侍子在京師者久之大昆彌翕侯難栖殺末振將末振將兄安日子安犂靡代為小昆彌漢恨不自誅末振將復使段會宗即斬其太子番丘還賜爵關內侯是歲元延二年也會宗以翕侯難栖殺末振將雖不指為漢合於討賊奏以為堅守都尉責大祿大吏大監以雌粟靡見殺狀奪金印紫綬更與銅墨云末振將弟卑爰疐本共謀殺大昆彌將衆八萬餘口北附康居謀欲藉兵兼并兩昆彌兩昆彌畏之親倚都護哀帝元壽二年大昆彌伊秩靡與單于並入朝漢以為榮至元始中卑爰疐殺烏日領以自效漢封為歸義侯兩昆彌皆弱卑爰疐侵陵都護孫建襲殺之自烏孫分立兩昆彌後漢用憂勞且無寧歲姑墨國王治南城去長安八千一百五十里戶三千五百口二萬四千五百勝兵四十五百人姑墨侯輔國侯都尉左右將左右騎君各一人譯長二人東至都護治所二千二十一里南至于闐馬行十五日北與烏孫接出銅鐵雌黃東通龜茲六百七十里王莽時姑墨王丞殺溫宿王并其國溫宿國王治溫宿城去長安八千三百五十里戶二千二百口八千四百勝兵千五百人輔國侯左右將左右都尉左右騎君譯長各二人東至都護治所二千三百八十里西至尉頭三百里北至烏孫赤谷六百一十里土地物類所有與鄯善諸國同東通姑墨二百七十里龜茲國王治延城去長安七千四百八十里戶六千九百七十口八萬一千三百一十七勝兵二萬一千七十六人大都尉丞輔國侯安國侯擊胡侯卻胡都尉擊車師都尉左右將左右都尉左右騎君左右力輔君各一人東西南北部千長各二人卻胡君三人譯長四人南與精絶東南與且末西南與杅彌北與烏孫西與姑墨接能鑄冶有鉛東至都護治所烏壘城三百五十里烏壘戶百一十口千二百勝兵三百人城都尉譯長各一人與都護同治其南三百三十里至渠犂渠犁城都尉一人戶百三十口千四百八十勝兵百五十人東北與尉犂東南與且末南與精絶接西有河至龜茲五百八十里自武帝初通西域置校尉屯田渠犂是時軍旅連出師行三十二年海內虛耗征和中二師將軍李廣利以軍降胸奴上既悔遠征伐而搜粟都尉桑弘羊與丞相御史奏言故輪臺東捷枝渠犂皆故國地廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時孰其旁國少錐刀貴黃金采繒可以易穀食宜給足不乏臣愚以為可遣屯田卒詣故輪臺以東置校尉三人分護各舉圖地形通利溝渠務使以時益種五穀張掖酒泉遣騎假司馬為斥侯屬校尉事有便宜因騎置以聞田一歲有積穀募民壯健有纍重敢徙者詣田所就畜積為本業益墾溉田稍築列亭連城而西以威西國輔烏孫為便臣謹遣徵事臣昌分部行邊嚴敕太守都尉尉明熢火選士馬謹斥候畜茭草願陛下遣使使西國以安其意臣昧死請上乃下詔深陳既往之悔曰前有司奏欲益民賦三十助邊用是重困老弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍漢軍破城食至多然士自載不足以竟師強者盡食畜産羸者道死數千人朕發酒泉驢橐駝負食出玉門迎軍吏卒起張掖不甚遠然尚廝留甚衆曩者朕之不明以軍侯弘上書言胸奴縛馬前後足置城下馳言秦人我丐若馬又漢使者久留不還故興遣二師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縛馬書遍視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以虜自縛其馬不祥甚哉或以為欲以見強夫不足者視人有餘易之卦得大過爻在九五胸奴困敗公車方士太史治星望氣及太卜龜蓍皆以為吉胸奴必破時不可再得也又曰北伐行將於釜山必克卦諸將二師最吉故朕親發二師下釜山詔之必毋深入今計謀卦兆皆反繆重合侯得虜侯者言聞漢軍當來胸奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘常使巫祝之縛馬者詛軍事也又卜漢軍一將不吉胸奴常言漢極大然不能飢渴失一狼走千羊乃者二師敗軍士死略離散悲痛常在朕心今請遠田輪臺欲起亭隧是擾勞天下非所以優民也今朕不忍聞大鴻臚等又議欲募囚徒送胸奴使者明封侯之賞報忿五伯所弗能為也且胸奴得漢降者常提掖搜索問以所聞今邊塞未正闌出不禁障候長吏使卒獵獸以皮肉為利卒苦而熢火乏失亦上集不得後降者來若捕生口虜乃知之當今務在禁苛暴止擅賦力本農修馬復令以補缺毋乏武備而已郡國二丈石各上進畜馬方力略補邊狀與計對由是不復出軍而封丞相車千秋為富民侯以明休息思富養民也初二師將軍李廣利擊大宛還過杅彌杅彌遣太子賴丹為質於龜茲廣利責龜茲曰外國皆臣屬於漢龜茲何以得受杅彌質即將賴丹入至京師昭帝乃用桑弘羊前議以杅彌太子賴丹為校尉將軍田輪臺輪臺與渠犂地皆相連也龜茲貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來追吾國而田必為害王即殺賴丹而上書謝漢漢未能征宣帝時長羅侯常惠使烏孫還便宜發諸國兵合五萬人攻龜茲責以前殺尉賴丹龜茲王謝曰乃我先王時為貴人姑翼所誤我無罪執姑翼詣惠惠斬之時烏孫公主遣女來至京師學鼓琴漢遣侍郎樂奉送主女過龜茲龜茲前遣人至烏孫求公主女未還會女過龜茲龜茲王留不遣復使使報公主主許之後公主上書願令女比宗室入朝而龜茲王絳賓亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝元康元年遂來朝賀王及夫人皆賜印綬夫人號稱公主賜以車騎旗鼓歌吹數十人綺繡雜繒琦珍凡數千萬留且一年厚贈送之後數來朝賀樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼撞鐘鼓如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂騾也絳賓死其子丞德自謂漢外孫成哀帝時往來尤數漢遇之亦甚親密東通尉犂六百五十里尉犂國王治尉犂城去長安六千七百五十里戶千二百口九千六百勝兵二千人尉犂侯安世侯左右將左右都尉擊胡君各一人譯長二人西至都護治所三百里南與鄯善且末接危須國王治危須城去長安七千二百九十里戶七百口四千九百勝兵二千人擊胡侯擊胡都尉左右將左右都尉左右騎君擊胡君譯長各一人西至都護治所五百里至焉耆百里焉耆國王治員渠城去長安七千三百里戶四千口三萬二千一百勝兵六千人擊胡侯卻胡侯輔國侯左右將左右都尉擊胡左右君擊車師君歸義車師君各一人擊胡都尉擊胡君各二人譯長三人西南至都護治所四百里南至尉犂百里北與烏孫接近海水多魚烏貪訾離國王治于婁谷去長安萬三百三十里戶四十一口二百三十一勝兵五十七人輔國侯左右都尉各一人東與單桓南與且彌西與烏孫接卑陸國王治天山東乾當國去長安八千六百八十里戶二百二十七口千三百八十七勝兵四百二十二人輔國侯左右將左右都尉左右譯長各一人西南至都護治所千二百八十七里卑陸後國王治番渠類谷去長安八千七百一十里戶四百六十二口千一百三十七勝兵三百五十人輔國侯都尉譯長各一人將二人東與郁立師北與胸奴西與劫國南與車師接郁立師國王治內咄谷去長安八千八百三十里戶百九十口千四百四十五勝兵三百三十一人輔國侯左右都尉譯長各一人東與車師後城長西與卑陸北與胸奴接單桓國王治單桓城去長安八千八百七十里戶二十七口百九十四勝兵四十五人輔國侯將左右都尉譯長各一人蒲類國王治天山西疏榆谷去長安八千三百六十里戶三百二十五口二千三十二勝兵七百九十九人輔國侯左右將左右都尉各一人西南至都護治所千三百八十七里蒲類後國王去長安八千六百三十里戶百口千七十勝兵三百三十四人輔國侯將左右都尉譯長各一人西且彌國王治天山東于大谷去長安八千六百七十里戶三百三十二口千九百二十六勝兵七百三十八人西且彌侯左右將左右騎君各一人西南至都護治所千四百八十七里東且彌國王治天山東兌虛谷去長安八千二百五十里戶百九十一口千九百四十八勝兵五百七十二人東且彌侯左右都尉各一人西南至都護治所千五百八十七里劫國王治天山東丹渠谷去長安八千五百七十里戶九十九口五百勝兵百一十五人輔國侯都尉譯長各一人西南至都護治所千四百八十七里狐胡國王治車師柳谷去長安八千二百里戶五十五口二百六十四勝兵四十五人輔國侯左右都尉各一人西至都護治所千一百四十七里至焉耆七百七十里山國王去長安七千一百七十里戶四百五十口五千勝兵千人輔國侯左右將左右都尉譯長各一人西至尉犂二百四十里西北至焉耆百六十里西至危須二百六十里東南與鄯善且末接山出鐵民山居寄田糴穀於焉耆危須車師前國王治交河城河水分流繞城下故號交河去長安八千一百五十里戶七百口六千五十勝兵千八百六十五人輔國侯安國侯左右將都尉歸漢都尉車師君通善君鄉善君各一人譯長二人西南至都護治所千八百七里至焉耆八百三十五里車師後國王治務塗谷去長安八千九百五十里戶五百九十五口四千七百七十四勝兵千八百九十人擊胡侯左右將左右都尉道民君譯長各一人西南至都護治所千二百三十七里車師都尉國戶四十口三百三十三勝兵八十四人車師後城長國戶百五十四口九百六十勝兵二百六十人武帝天漢二年以胸奴降者介和王為開陵侯將樓蘭國兵始擊車師胸奴遣右賢王將數萬騎救之漢兵不利引去征和四年遣重合侯馬通將四萬騎擊胸奴道過車師北復遣開陵侯將樓蘭尉犂危須凡六國兵別擊車師勿令得遮重合侯諸國兵共圍車師車師王降服臣屬漢昭帝時胸奴復使四千騎田車師宣帝即位遣五將將兵擊胸奴車師田者驚去車師復通於漢胸奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質胸奴亡走焉耆車師王更立子烏貴為太子及烏貴立為王與胸奴結婚姻教胸奴遮漢道通烏孫者地節二年漢遣侍郎鄭吉校尉司馬喜將免刑罪人田渠犂積穀欲以攻車師至秋收穀吉喜發城郭諸國兵萬餘人自與所將田士千五百人共擊車師攻交河城破之王尚在其北石城中未得會軍食盡吉等且罷兵歸渠犁田收秋畢復發兵攻車師王於石城王聞漢兵且至北走胸奴求救胸奴未為發兵王來還與貴人蘇猶議欲降漢恐不見信蘇猶教王擊胸奴邊國小蒲類斬首略其人民以降吉車師旁小金附國隨漢軍後盜車師車師王復自請擊破金附胸奴聞車師降漢發兵攻車師吉喜引兵北逢之胸奴不敢前吉喜即留一侯與卒二十人留守王吉等引兵歸渠犂車師王恐胸奴兵復至而見殺也乃輕騎奔烏孫吉即迎其妻子置渠犂東奏事至酒泉有詔還田渠犂及車師益積穀以安西國侵胸奴吉還傳送車師王妻子詣長安賞賜甚厚每朝會四夷常尊顯以示之於是吉始使吏卒三百人別田車師得降者言單于大臣皆曰車師地肥美近胸奴使漢得之多田積穀必害人國不可不爭也果遣騎來擊田者吉乃與校尉盡將渠犂田士千五百人往田胸奴復益遣騎來漢田卒少不能當保車師城中胸奴將即其城下謂吉曰單于必爭此地不可田也圍城數日乃解後常數千騎往來守車師吉上書言車師去渠犂千餘里間以河山北近胸奴漢兵在渠犂者勢不能相救願益田卒公卿議以為道遠煩費可且罷車師田者詔遣長羅侯將張掖酒泉騎出車師北千餘里揚威武車師旁胡騎引去吉乃得出歸渠犂凡三校尉屯田車師王之走烏孫也烏孫留不遣遣使上書願留車師王備國有急可從西道以擊胸奴漢許之於是漢召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與胸奴車師王得近漢田官與胸奴絶亦安樂親漢後漢使侍郎殷廣德責烏孫求車師王烏貴將詣闕賜第與其妻子居是歲元康四年也其後置戊己校尉屯田居車師故地元始中車師後王國有新道出五船北通玉門關往來差近戊己校尉徐普欲開以省道里半避白龍堆之厄車師後王姑句以道當為拄置心不便也地又頗與胸奴南將軍地接普欲分明其界然後奏之召姑句使證之不肯繫之姑句數以牛羊賕吏求出不得姑句家矛端生火其妻股紫陬謂姑句曰矛端生火此兵氣也利以用兵前車師前王為都護司馬所殺今久繫必死不如降胸奴即馳突出高昌璧入胸奴又去胡來王唐兜國比大種赤水羌數相寇不勝告急都護都護但欽不以時救助唐兜困急怨欽東守玉門關玉門關不內即將妻子人民千餘人亡降胸奴胸奴受之而遣使上書言狀是時新都侯王莽秉政遣中郎將王昌等使胸奴告單于西域內屬不當得受單于謝罪執二王以付使者莽使中郎王萌待西域惡都奴界上逢受單于遣使送因請其罪使者以聞莽不聽詔下會西域諸國王陳軍斬姑句唐兜以示之至莽篡位建國二年以廣新公甄豐為右伯當出西域車師後王須置離聞之與其右將股鞮左將尸泥支謀曰聞甄公為西域太伯當出故事給使者牛羊穀芻茭導譯前五威將過所給使尚未能備今太伯復出國益貧恐不能稱欲亡入胸奴戊己校尉刀護聞之召置離驗問辭服乃械致都護但欽在所埒婁城置離人民知其不還皆哭而送之至欽則斬置離置離兄輔國侯狐蘭支將置離衆二千餘人驅畜産舉國亡降胸奴是時莽易單于璽單于恨怒遂受狐蘭支降遣兵與共寇擊車師殺後城長傷都護司馬及狐蘭兵復還入胸奴時戊己校尉刀護病遣史陳良屯桓且谷備胸奴寇史終帶取糧食司馬丞韓玄領諸壁右曲候任商領諸壘相與謀曰西域諸國頗背叛胸奴欲大侵要死可殺校尉將人衆降胸奴即將數千騎至校尉府脅諸亭令燔積薪分告諸壁曰胸奴十萬騎來入吏士皆持兵後者斬得三四百人去校尉府數里止晨火然校尉開門擊鼓收吏士良等隨入遂殺校尉刀護及子男四人諸昆弟子男獨遣婦女小兒止留戊己校尉城遣人與胸奴南將軍相聞南將軍以二千騎迎良等良等盡脅略戊己校尉吏士男女二千餘人入胸奴單于以良帶為烏賁都尉後三歲單于死弟烏絫單于咸立復與莽和親莽遣使者多齎金幣賂單于購求陳良終帶等單于盡收四人及手殺刀護者芝音妻子以下二十七人皆械檻車付使者到長安莽皆燒殺之其後莽復欺詐單于和親遂絶胸奴大擊北邊而西域亦瓦解焉耆國近胸奴先叛殺都護但欽莽不能討天鳳三年乃遣五威將王駿西域都護李崇將戊校尉出西域諸國皆郊迎送兵穀焉耆詐降而聚兵自備駿等將莎車龜茲兵七千餘人分為數部入焉耆焉耆伏兵要遮駿及姑墨尉犂危須國兵為反間還共襲擊駿等皆殺之唯戊己校尉郭欽別將兵後至焉耆焉耆兵未還欽擊殺其老弱引兵還莽封欽為剼胡子李崇收餘士還保龜茲數年莽死崇遂沒西域因絶最凡國五十自譯長城長君監吏大祿百長千長都尉且渠當戶將相至侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賓烏弋之屬皆以絶遠不在數中其來貢獻則相與報不督録總領也贊曰孝武之世圖制胸奴患其兼從西國結黨南羌乃表河西列四郡開玉門通西域以斷胸奴右臂隔絶南羌月氏單于失援由是遠遁而幕南無王庭遭值文景玄默養民五世天下殷富財力有餘士馬強盛故能睹犀布玳瑁則建珠崖七郡感枸醬竹杖則開牂柯越嶲聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈於後宮蒲梢龍文魚目汗血之馬充於黃門巨象師子猛犬大雀之群食於外囿殊方異物四面而至於是廣開上林穿昆明池營千門萬戶之宮立神明通天之臺興造甲乙之帳落以隨珠和璧天子負黼依襲翠被馮玉几而處其中設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃榷酒酤管鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭因之以凶年寇盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆遠則蔥嶺身熱頭痛縣度之厄淮南杜欽揚雄之論皆以為此天地所以界別區域絶外內也書曰西戎即序禹既就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬胸奴不相親附胸奴能得其馬畜旃罽而不能統率與之進退與漢隔絶道里又遠得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫胸奴尚為所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都護聖上遠覽古今因時之宜羈縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之卻走馬義兼之矣亦何以尚茲
