body:
  text: 文三王傳第十七孝文皇帝四男竇皇后生孝景帝梁孝王武諸姬生代孝王參梁懷王揖梁孝王武以孝文二年與太原王參梁王揖同日立武為代王四年徙為淮陽王十二年徙梁自初王通歷已十一年矣孝王十四年入朝十七年十八年比年入朝留其明年乃之國二十一年入朝二十二年文帝崩二十四年入朝二十五年復入朝是時上未置太子與孝王宴飲從容言曰千秋萬歲後傳於王王辭謝雖知非至言然心內喜太后亦然其春吳楚齊趙七國反先擊梁棘壁殺數萬人梁王城守睢陽而使韓安國張羽等為將軍以距吳楚吳楚以梁為限不敢過而西與太尉亞夫等相距三月吳楚破而梁所殺虜略與漢中分明年漢立太子梁最親有功又為大國居天下膏腴地北界泰山西至高陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為復道自宮連屬於平臺三十餘里得賜天子旌旗從千乘萬騎出稱警入言蹕擬於天子招延四方豪桀自山東遊士莫不至齊人羊勝公孫詭鄒陽之屬公孫詭多奇邪計初見日王賜千金官至中尉號曰公孫將軍多作兵弩弓數十萬而府庫金錢且百巨萬珠玉寶器多於京師二十九年十月孝王入朝景帝使使持乘輿駟迎梁王於關下既朝上疏因留以太后故入則侍帝同輦出則同車遊獵上林中梁之侍中郎謁者著引籍出入天子殿門與漢宦官亡異十一月上廢栗太子太后心欲以梁王為嗣大臣及爰盎等有所關説於帝太后議格孝王不敢復言太后以嗣事事祕世莫知乃辭歸國其夏上立膠東王為太子梁王怨爰盎及議臣乃與羊勝公孫詭之屬謀陰使人刺殺爰盎及他議臣十餘人賊未得也於是天子意梁逐賊果梁使之遣使冠蓋相望於道覆案梁事捕公孫詭羊勝皆匿王後宮使者責二千石急梁相軒丘豹及內史安國皆泣諫王王乃令勝詭皆自殺出之上由此怨望於梁王梁王恐乃使韓安國因長公主謝罪太后然後得釋上怒稍解因上書請朝既至關茅蘭説王使乘布車從兩騎入匿於長公主園漢使迎王王已入關車騎盡居外外不知王處太后泣曰帝殺吾子帝憂恐於是梁王伏斧質之闕下謝罪然後太后帝皆大喜相與泣復如故悉召王從官入關然帝益疏王不與同車輦矣三十五年冬復入朝上疏欲留上弗許歸國意忽忽不樂北獵梁山有獻牛足上出背上孝王惡之六月中病熱六日薨孝王慈孝每聞太后病口不能食常欲留長安侍太后太后亦愛之及聞孝王死竇太后泣極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王女五人皆令食湯沐邑奏之太后太后乃説為帝一餐孝王未死時財以巨萬計不可勝數及死藏府餘黃金尚四十餘萬斤他財物稱是代孝王參初立為太原王四年代王武徙為淮陽王而參徙為代王復並得太原都晉陽如故五年一朝凡三朝十七年薨子共王登嗣二十九年薨子義嗣元鼎中漢廣關以常山為阻徙代王於清河是為剛王並前在代凡立四十年薨子頃王湯嗣二十四年薨子年嗣地節中冀州刺史林奏年為太子時與女弟則私通及年立為王後則懷年子其壻使勿舉則曰自來殺之壻怒曰為王生子自令王家養之則送兒頃太后所相聞知禁止則令不得入宮年使從季父往來送迎則連年不絶有司奏年淫亂年坐廢為庶人徙房陵與湯沐邑百戶立三年國除元始二年新都侯王莽興滅繼絶白太皇太后立年弟子如意為廣宗王奉代孝王後莽篡位國絶梁懷王揖文帝少子也好詩書帝愛之異於他子五年一朝凡再入朝因墮馬死立十年薨無子國除明年梁孝王武徙王梁梁孝王子五人為王太子買為梁共王次子明為濟川王彭離為濟東王定為山陽王不識為濟陰王皆以孝景中六年同日立梁共王買立十年薨子平王襄嗣濟川王明以垣邑侯立七年坐射殺其中尉有司請誅武帝弗忍廢為庶人徙房陵國除濟東王彭離立二十九年彭離驕悍昏莫私與其奴亡命少年數十人行剽殺人取財物以為好所殺發覺者百餘人國皆知之莫敢夜行所殺者子上書告言有司請誅武帝弗忍廢為庶人徙上庸國除為大河郡山陽哀王定立九年薨亡子國除濟陰哀王不識立一年薨亡子國除孝王支子四王皆絶於身梁平王襄母曰陳太后共王母曰李太后李太后親平王之大母也而平王之后曰任后任后甚有寵於襄初孝王有罍尊直千金戒後世善寶之毋得以與人任后聞而欲得之李太后曰先王有命毋得以尊與人他物雖百巨萬猶自恣任后絶欲得之王襄直使人開府取尊賜任后又王及母陳太后事李太后多不順有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與爭門措指太后啼呼不得見漢使者李太后亦私與食官長及郎尹霸等姦亂王與任后以此使人風止李太后李太后亦已後病薨病時任后未嘗請疾薨又不侍喪元朔中睢陽人犴反人辱其父而與睢陽太守客俱出同車犴反殺其仇車上亡去睢陽太守怒以讓梁二千石二千石以下求反急執反親戚反知國陰事乃上變告梁王與大母爭尊狀時相以下具知之欲以傷梁長吏書聞天子下吏驗問有之公卿治奏以為不孝請誅王及太后天子曰首惡失道任后也朕置相吏不逮無以輔王故陷不誼不忍致法削梁王五縣奪王太后湯沐成陽邑梟任后首于市中郎胡等皆伏誅梁餘尚有八城襄立四十年薨子頃王無傷嗣十一年薨子敬王定國嗣四十年薨子夷王遂嗣六年薨子荒王嘉嗣十五年薨子立嗣鴻嘉中太傅輔奏立一日至十一犯法臣下愁苦莫敢親近不可諫止願令王非耕祠法駕毋得出宮盡出馬置外苑收兵杖藏私府毋得以金錢財物假賜人事下丞相御史請許奏可後數復驅傷郎夜私出宮傅相連奏坐削或千戶或五百戶如是者數焉荒王女弟園子為立舅任寶妻寶兄子昭為立后數過寶飲食報寶曰我好翁主欲得之寶曰翁主姑也法重立曰何能為遂與園子姦積數歲永始中相禹奏立對外家怨望有惡言有司案驗因發淫亂事奏立禽獸行請誅太中大夫谷永上疏曰臣聞禮天子外屏不欲見外也是故帝王之意不窺人閨門之私聽聞中冓之言春秋為親者諱詩云戚戚兄弟莫遠具爾今梁王年少頗有狂病始以惡言按驗既亡事實而發閨門之私非本章所指王辭又不服猥強劾立傅致難明之事獨以偏辭成罪斷獄亡益於治道汙衊宗室以內亂之惡披布宣揚於天下非所以為公族隱諱增朝廷之榮華昭聖德之風化也臣愚以為王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有恥辱之心案事者乃驗問惡言何故猥自發舒以三者揆之殆非人情疑有所迫切過誤失言文吏躡尋不得轉移萌牙之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上德通理之吏更審考清問著不然之效定失誤之法而反命於下吏以廣公族附疏之德為宗室刷汙亂之恥甚得治親之誼天子由是寢而不治居數歲元延中立復以公事怨相掾及睢陽丞使奴殺之殺奴以滅口凡殺三人傷五人手驅郎吏二十餘人上書不拜奏謀篡死罪囚有司請誅上不忍削立五縣哀帝建平中立復殺人天子遣廷尉賞大鴻臚由持節即訊至移書傅相中尉曰王背策戒悖暴妄行連犯大辟毒流吏民比比蒙恩不伏重誅不思改過復賊殺人幸得蒙恩丞相長史大鴻臚丞即問王陽病抵讕置辭驕嫚不首主令與背畔亡異丞相御史請收王璽綬送陳留獄明詔加恩復遣廷尉大鴻臚雜問今王當受詔置辭恐復不首實對書曰至于再三有不用我降爾命傅相中尉皆以輔正為職虎兕出於匣龜玉毀於匱中是誰之過也書到明以誼曉王敢復懷詐罪過益深傅相以下不能輔導有正法立惶恐免冠對曰立少失父母孤弱處深宮中獨與宦者婢妾居漸漬小國之俗加以質性下愚有不可移之姿往者傅相亦不純以仁誼輔翼立大臣皆尚苛刻刺求微密讒臣在其間左右弄口積使上下不和更相伺宮殿之裏毛氂過失亡不暴陳當伏重誅以視海內數蒙聖恩得見貰赦今立自知賊殺中郎曹將冬月迫促貪生畏死即詐僵仆陽病徼幸得踰於須臾謹以實對伏須重誅時冬月盡其春大赦不治元始中立坐與平帝外家中山衛氏交通新都侯王莽奏廢立為庶人徙漢中立自殺二十七年國除後二歲莽白太皇太后立孝王玄孫之曾孫沛郡卒史音為梁王奉孝王後莽篡國絶贊曰梁孝王雖以愛親故王膏腴之地然會漢家隆盛百姓殷富故能殖其貨財廣其宮室車服然亦僭矣怙親亡厭牛禍告罰卒用憂死悲夫
