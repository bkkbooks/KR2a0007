body:
  text: 王莽傳第六十九中始建國元年正月朔莽帥公侯卿士奉皇太后璽韍上太皇太后順符命去漢號焉初莽妻宜春侯王氏女立為皇后本生四男宇獲安臨二子前誅死安頗荒忽乃以臨為皇太子安為新嘉辟封宇子六人千為功隆公壽為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃策命孺子曰咨爾嬰昔皇天右乃太祖歷世十二享國二百一十載曆數在于豫躬詩不云乎侯服于周天命靡常封爾為定安公永為新室賓於戲敬天之休往踐乃位毋廢豫命又曰其以平原安德漯陰鬲重丘凡戶萬地方百里為定安公國立漢祖宗之廟於其國與周後並行其正朔服色世世以事其祖宗永以命德茂功享歷代之祀焉以孝平皇后為定安太后讀策畢莽親執孺子手流涕歔欷曰昔周公攝位終得復子明辟今豫獨迫皇天威命不得如意哀歎良久中傅將孺子下殿北面而稱臣百僚陪位莫不感動又按金匱輔臣皆封拜以太傅左輔驃騎將軍安陽侯王舜為太師封安新公大司徒就德侯平晏為太傅就新公少阿羲和京兆尹紅休侯劉歆為國師嘉新公廣漢梓潼哀章為國將美新公是為四輔位上公太保後承承陽侯甄邯為大司馬承新公丕進侯王尋為大司徒章新公步兵將軍成都侯王邑為大司空隆新公是為三公大阿右拂大司空衛將軍廣陽侯甄豐為更始將軍廣新公京兆王興為衛將軍奉新公輕車將軍成武侯孫建為立國將軍成新公京兆王盛為前將軍崇新公是為四將凡十一公王興者故城門令史王盛者賣餅莽按符命求得此姓名十餘人兩人容貌應卜相徑從布衣登用以視神焉餘皆拜為郎是日封拜卿大夫侍中尚書官凡數百人諸劉為郡守皆徙為諫大夫改明光宮為定安館定安太后居之以故大鴻臚府為定安公第皆置門衛使者監領敕阿乳母不得與語常在四壁中至於長大不能名六畜後莽以女孫宇子妻之莽策群司曰歲星司肅東嶽太師典致時雨青煒登平考景以晷熒惑司哲南嶽太傅典致時奧赤煒頌平考聲以律太白司艾西嶽國師典致時陽白煒象平考量以銓辰星司謀北嶽國將典致時寒玄煒和平考星以漏月刑元股左司馬典致武應考方法矩主司天文欽若昊天敬授民時力來農事以豐年穀日德元肱右司徒典致文瑞考圜合規主司人道五教是輔帥民承上宣美風俗五品乃訓斗平元心中司空典致物圖考度以繩主司地里平治水土掌名山川衆殖鳥獸蕃茂草木各策命以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆孤卿更名大司農曰羲和後更為納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工水衡都尉曰豫虞與三公司卿凡九卿分屬三公每一卿置大夫三人一大夫置元士三人凡二十七大夫八十一元士分主中都官諸職更名光祿勳曰司中太僕曰太御衛尉曰太衛執金吾曰奮武中尉曰軍正又置大贅官主乘輿服御物後又典兵秩位皆上卿號曰六監改郡太守曰大尹都尉曰太尉縣令長曰宰御史曰執法公車司馬曰王路四門長樂宮曰常樂室未央宮曰壽成室前殿曰王路堂長安曰常安更名秩百石曰庶士三百石曰下士四百石曰中士五百石曰命士六百石曰元士千石曰下大夫比二千石曰中大夫二千石曰上大夫中二千石曰卿車服黻冕各有差品又置司恭司徒司明司聰司中大夫及誦詩工徹膳宰以司過策曰豫聞上聖欲昭厥德罔不慎修厥身用綏于遠是用建爾司于五事毋隱尤毋將虛好惡不愆立于厥中於戲勗哉令王路設進善之旌非謗之木敢諫之鼓諫大夫四人常坐王路門受言事者封王氏齊縗之屬為侯大功為伯小功為子緦麻為男其女皆為任男以睦女以隆為號焉皆授印韍令諸侯立太夫人夫人世子亦受印韍又曰天無二日土無二王百王不易之道也漢氏諸侯或稱王至于四夷亦如之遠於古典繆於一統其定諸侯王之號皆稱公及四夷僭號稱王者皆更為侯又曰帝王之道相因而通盛德之祚百世享祀豫惟黃帝帝少昊帝顓頊帝嚳帝堯帝舜帝夏禹皋陶伊尹咸有聖德假于皇天功烈巍巍光施于遠豫甚嘉之營求其後將祚厥祀惟王氏虞帝之後也出自帝嚳劉氏堯之後也出自顓頊於是封姚恂為初睦侯奉黃帝後梁護為修遠伯奉少昊後皇孫功隆公千奉帝嚳後劉歆為祁烈伯奉顓頊後國師劉歆子疊為伊休侯奉堯後媯昌為始睦侯奉虞帝後山遵為褒謀子奉皋陶後伊玄為褒衡子奉伊尹後漢後定安公劉嬰位為賓周後衛公姬黨更封為章平公亦為賓殷後宋公孔弘運轉次移更封為章昭侯位為恪夏後遼西姒豐封為章功侯亦為恪四代古宗宗祀于明堂以配皇始祖考虞帝周公後褒魯子姬就宣尼公後褒成子孔鈞已前定焉莽又曰豫前在攝時建郊宮定祧廟立社稷神祇報況或光自上復于下流為烏或黃氣熏蒸昭耀章明以著黃虞之烈焉自黃帝至于濟南伯王而祖世氏姓有五矣黃帝二十五子分賜厥姓十有二氏虞帝之先受姓曰姚其在陶唐曰媯在周曰陳在齊曰田在濟南曰王豫伏念皇初祖考黃帝皇始祖考虞帝以宗祀于明堂宜序於祖宗之親廟其立祖廟五親廟四后夫人皆配食郊祀黃帝以配天黃后以配地以新都侯東弟為大禖歲時以祀家之所尚種祀天下姚媯陳田王氏凡五姓者皆黃虞苗裔豫之同族也書不云乎惇序九族其令天下上此五姓名籍于秩宗皆以為宗室世世復無有所與其元城王氏勿令相嫁娶以別族理親焉封陳崇為統睦侯奉胡王後田豐為世睦侯奉敬王後天下牧守皆以前有翟義趙明等領州郡懷忠孝封牧為男守為附城又封舊恩戴崇金涉箕閎楊並等子皆為男遺騎都尉囂等分治黃帝園位於上都橋畤虞帝於零陵九疑胡王於淮陽陳敬王於齊臨淄愍王於城陽莒伯王於濟南東平陵孺王於魏郡元城使者四時致祠其廟當作者以天下初定且祫祭於明堂太廟以漢高廟為文祖廟莽曰豫之皇始祖考虞帝受嬗于唐漢氏初祖唐帝世有傳國之象豫復親受金策於漢高皇帝之靈惟思褒厚前代何有忘時漢氏祖宗有七以禮立廟于定安國其園寢廟在京師者勿罷祠薦如故豫以秋九月親入漢氏高元成平之廟諸劉更屬籍京兆大尹勿解其復各終厥身州牧數存問勿令有侵冤又曰豫前在大麓至于攝假深惟漢氏三七之厄赤德氣盡思索廣求所以輔劉延期之術靡所不用以故作金刀之利幾以濟之然自孔子作春秋以為後王法至于哀之十四而一代畢協之於今亦哀之十四也赤世計盡終不可強濟皇天明威黃德當興隆顯大命屬豫以天下今百姓咸言皇天革漢而立新廢劉而興王夫劉之為字卯金刀也正月剛卯金刀之利皆不得行博謀卿士僉曰天人同應昭然著明其去剛卯莫以為佩除刀錢勿以為利承順天心快百姓意乃更作小錢徑六分重一銖文曰小錢直一與前大錢五十者為二品並行欲防民盜鑄乃禁不得挾銅炭四月徐鄉侯劉快結黨數千人起兵於其國快兄殷故漢膠東王時改為扶崇公快舉兵攻即墨殷閉城門自繫獄吏民距快快敗走至長廣死莽曰昔豫之祖濟南愍王困於燕寇自齊臨淄出保于莒宗人田單廣設奇謀獲殺燕將復定齊國今即墨士大夫復同心殄滅反虜豫甚嘉其忠者憐其無辜其赦殷等非快之妻子它親屬當坐者皆勿治弔問死傷賜亡者葬錢人五萬殷知大命深疾惡快以故輒伏厥辜其滿殷國戶萬地方百里又封符命臣十餘人莽曰古者設廬井八家一夫一婦田百畝什一而稅則國給民富而頌聲作此唐虞之道三代所遵行也秦為無道厚賦稅以自供奉罷民力以極欲壞聖制廢井田是以兼并起貪鄙生強者規田以千數弱者曾無立錐之居又置奴婢之市與牛馬同蘭制於民臣顓斷其命姦虐之人因緣為利至略賣人妻子逆天心悖人倫繆於天地之性人為貴之義書曰豫則奴戮女唯不用命者然後被此辜矣漢氏減輕田租三十而稅一常有更賦罷癃咸出而豪民侵陵分田劫假厥名三十稅一實什稅五也父子夫婦終年耕藝所得不足以自存故富者犬馬餘菽粟驕而為邪貧者不厭糟糠窮而為姦俱陷于辜刑用不錯豫前在大麓始令天下公田口井時則有嘉禾之祥遭反虜逆賊且止今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田豫九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無法惑衆者投諸四裔以禦魑魅如皇始祖考虞帝故事是時百姓便安漢五銖錢以莽錢大小兩行難知又數變改不信皆私以五銖錢市買訛言大錢當罷莫肯挾莽患之復下書諸挾五銖錢言大錢當罷者比非井田制投四裔於是農商失業食貨俱廢民人至涕泣於市道及坐賣買田宅奴婢鑄錢自諸侯卿大夫至于庶民抵罪者不可勝數秋遣五威將王奇等十二人班符命四十二篇於天下德祥五事符命二十五福應十二凡四十二篇其德祥言文宣之世黃龍見於成紀新都高祖考王伯墓門梓柱生枝葉之屬符命言井石金匱之屬福應言雌雞化為雄之屬其文爾雅依託皆為作說大歸言莽當代漢有天下云總而說之曰帝王受命必有德祥之符瑞協成五命申以福應然後能立巍巍之功傳于子孫永享無窮之祚故新室之興也德祥發於漢三七九世之後肇命於新都受瑞於黃支開王於武功定命於子同成命於巴宕申福於十二應天所以保祐新室者深矣固矣武功丹石出於漢氏平帝末年火德銷盡土德當代皇天眷然去漢與新以丹石始命於皇帝皇帝謙讓以攝居之未當天意故其秋七月天重以三能文馬皇帝復謙讓未即位故三以鐵契四以石龜五以虞符六以文圭七以玄印八以茂陵石書九以玄龍石十以神井十一以大神石十二以銅符帛圖申命之瑞寖以顯著至于十二以昭告新皇帝皇帝深惟上天之威不可不畏故去攝號猶尚稱假改元為初始欲以承塞天命克厭上帝之心然非皇天所以鄭重降符命之意故是日天復決以勉書又侍郎王盱見人衣白布單衣赤繢方領冠小冠立于王路殿前謂盱曰今日天同色以天下人民屬皇帝盱怪之行十餘步人忽不見至丙寅暮漢氏高廟有金匱圖策高帝承天命以國傳新皇帝明旦宗伯忠孝侯劉宏以聞乃召公卿議未決而大神石人談曰趣新皇帝之高廟受命毋留於是新皇帝立登車之漢氏高廟受命受命之日丁卯也丁火漢氏之德也卯劉姓所以為字也明漢劉火德盡而傳於新室也皇帝謙謙既備固讓十二符應迫著命不可辭懼然祗畏葦然閔漢氏之終不可濟斖斖在左右之不得從意為之三夜不御寢三日不御食延問公侯卿大夫僉曰宜奉如上天威命於是乃改元定號海內更始新室既定神祇歡喜申以福應吉瑞纍仍詩曰宜民宜人受祿于天保右命之自天申之此之謂也五威將奉符命齎印綬王侯以下及吏官名更者外及胸奴西域徼外蠻夷皆即授新室印綬因收故漢印綬賜吏爵人二級民爵人一級女子百戶羊酒蠻夷幣帛各有差大赦天下五威將乘乾文車駕坤六馬背負鷩鳥之毛服飾甚偉每一將各置左右前後中帥凡五帥衣冠車服駕馬各如其方面色數將持節稱太一之使帥持幢稱五帝之使莽策命曰普天之下迄于四表靡所不至其東出者至玄菟樂浪高句驪夫餘南出者隃徼外歷益州貶句町王為侯西出者至西域盡改其王為侯北出者至胸奴庭授單于印改漢印文去璽曰章單于欲求故印陳饒椎破之語在胸奴傳單于大怒而句町西域後卒以此皆畔饒還拜為大將軍封威德子冬靁桐華置五威司命中城四關將軍司命司上公以下中城主十二城門策命統睦侯陳崇曰咨爾崇夫不用命者亂之原也大姦猾者賊之本也鑄僞金錢者妨寶貨之道也驕奢踰制者凶害之端也漏泄省中及尚書事者機事不密則害成也拜爵王庭謝恩私門者祿去公室政從亡矣凡此六條國之綱紀是用建爾作司命柔亦不茹剛亦不吐不侮鰥寡不畏強圉帝命帥繇統睦于朝命說符侯崔發曰重門擊𣔳以待暴客女作五威中城將軍中德既成天下說符命明威侯王級曰繞霤之固南當荊楚女作五威前關將軍振武奮衛明威于前命尉睦侯王嘉曰羊頭之厄北當燕趙女作五威後關將軍壼口捶扼尉睦于後命掌威侯王奇曰肴黽之險東當鄭衛女作五威左關將軍函谷批難掌威于左命懷羌子王福曰洴隴之阻西當戎狄女作五威右關將軍成固據守懷羌于右又遣諫大夫五十人分鑄錢於郡國是歲長安狂女子碧呼道中曰高皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之治者掌寇大夫陳成自免去官真定劉都等謀舉兵發覺皆誅真定常山大雨雹二年二月赦天下五威將帥七十二人還奏事漢諸侯王為公者悉上璽綬為民無違命者封將為子帥為男初設六管之令命縣官酤酒賣鹽鐵器鑄錢諸采取名山大澤衆物者稅之又令市官收賤賣貴賖貸豫民收息百月三犧和置酒士郡一人乘傳督酒利禁民不得挾弩鎧徙西海胸奴單于求故璽莽不與遂寇邊郡殺略吏民十一月立國將軍建奏西域將欽上言九月辛巳戊己校尉史陳良終帶共賊殺校尉刁護劫略吏士自稱廢漢大將軍亡入胸奴又今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也劉氏當復趣空宮收繫男子即常安姓武字仲皆逆天違命大逆無道請論仲及陳良等親屬當坐者奏可漢氏高皇帝比著戒云罷吏卒為賓食誠欲承天心全子孫也其宗廟不當在常安城中及諸劉為諸侯者當與漢俱廢陛下至仁久未定前故安衆侯劉崇徐鄉侯劉快陵鄉侯劉曾扶恩侯劉貴等更聚衆謀反今狂狡之虜或妄自稱亡漢將軍或稱成帝子子輿至犯夷滅連未止者此聖恩不蚤絶其萌牙故也臣愚以為漢高皇帝為新室賓享食明堂成帝異姓之兄弟平帝壻也皆不宜復入其廟元帝與皇太后為體聖恩所隆禮亦宜之臣請漢氏諸廟在京師者皆罷諸劉為諸侯者以戶多少就五等之差其為吏者皆罷待除於家上當天心稱高皇帝神靈塞狂狡之萌莽曰可嘉新公國師以符命為豫四輔明德侯劉龔率禮侯劉嘉等凡三十二人皆知天命或獻天符或貢昌言或捕告反虜厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師以女配莽子故不賜姓改定安太后號曰黃皇室主絶之於漢也冬十二月雷更名胸奴單于曰降奴服于莽曰降奴服于知威侮五行背畔四條侵犯西域延及邊垂為元元害罪當夷滅命遣立國將軍孫建等凡十二將十道並出共行皇天之威罰于知之身惟知先祖故呼韓邪單于稽侯狦纍世忠孝保塞守徼不忍以一知之罪滅稽侯狦之世今分胸奴國土人民以為十五立稽侯狦子孫十五人為單于遣中郎將藺苞戴級馳之塞下召拜當為單于者諸胸奴人當坐虜知之法者皆赦除之遣五威將軍苗欣虎賁將軍王況出五原厭難將軍陳欽震狄將軍王巡出雲中振武將軍王嘉平狄將軍王萌出代郡相威將軍李棽鎮遠將軍李翁出西河誅貉將軍陽俊討穢將軍嚴尤出漁陽奮武將軍王駿定胡將軍王晏出張掖及偏裨以下百八十人募天下囚徒丁男甲卒三十萬人轉衆郡委輸五大夫衣裘兵器糧食長吏送自負海江淮至北邊使者馳傳督趣以軍興法從事天下騷動先至者屯邊郡須畢具乃同時出莽以錢幣訖不行復下書曰民以食為命以貨為資是以八政以食為首寶貨皆重則小用不給皆輕則僦載煩費輕重大小各有差品則用便而民樂於是造寶貨五品語在食貨志百姓不從但行小大錢二品而已盜鑄錢者不可禁乃重其法一家鑄錢五家坐之沒入為奴婢吏民出入持布錢以副符傳不持者廚傳勿舍關津苛留公卿皆持以入宮殿門欲以重而行之是時爭為符命封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙並驗治非五威將率所班皆下獄初甄豐劉歆王舜為莽腹心倡導在位褒揚功德安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜歆亦受其賜並富貴矣非復欲令莽居攝也居攝之萌出於泉陵侯劉慶前輝光謝囂長安令田終術莽羽翼已成意欲稱攝豐等承順其意莽輒復封舜歆兩子及豐孫豐等爵位已盛心意既滿又實畏漢宗室天下豪桀而疏遠欲進者並作符命莽遂據以即真舜歆內懼而已豐素剛強莽覺其不說故徙大阿右拂大司空豐託符命文為更始將軍與賣餅兒王盛同列豐父子默默時子尋為侍中京兆大尹茂德侯即作符命言新室當分陝立二伯以豐為右伯太傅平晏為左伯如周召故事莽即從之拜豐為右伯當述職西出未行尋復作符命言故漢氏平帝后黃皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黃皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山歲餘捕得辭連國師公歆子侍中東通靈將五司大夫隆威侯棻棻弟右曹長水校尉伐虜侯泳大司空邑弟左關將軍掌威侯奇及歆門人侍中騎都尉丁隆等牽引公卿黨親列侯以下死者數百人尋手理有天子字莽解其臂入視之曰此一大子也或曰一六子也六者戮也明尋父子當戮死也乃流棻于幽州放尋于三危殛隆于羽山皆驛車載其尸傳致云莽為人侈口蹶顄露眼赤精大聲而嘶長七尺五寸好厚履高冠以氂裝衣反膺高視瞰臨左右是時有用方技待詔黃門者或問以莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲者也故能食人亦當為人所食問者告之莽誅滅待詔而封告者後常翳雲母屏面非親近莫得見也是歲以初睦侯姚恂為寧始將軍三年莽曰百官改更職事分移律令儀法未及悉定且因漢律令儀法以從事令公卿大夫諸侯二千石舉吏民有德行通政事能言語明文學者各一人詣王路四門遣尚書大夫趙並使勞北邊還言五原北假膏壤殖穀異時常置田官乃以並為田禾將軍發戍卒屯田北假以助軍糧是時諸將在邊須大衆集吏士放縱而內郡愁於徵發民棄城郭流亡為盜賊并州平州尤甚莽令七公六卿號皆兼稱將軍遣著武將軍逯並等填名都中郎將繡衣執法各五十五人分填緣邊大郡督大姦猾擅弄兵者皆便為姦於外撓亂州郡貨賂為市侵漁百姓莽下書曰虜知罪當夷滅故遣猛將分十二部將同時出一舉而決絶之矣內置司命軍正外設軍監十有二人誠欲以司不奉命令軍人咸正也今則不然各為權勢恐猲良民妄封人頸得錢者去毒蠚並作農民離散司監若此可謂稱不自今以來敢犯此者輒捕繫以名聞然猶放縱自若而藺苞戴級到塞下招誘單于弟咸咸子登入塞脅拜咸為孝單于賜黃金千斤錦繡甚多遣去將登至長安拜為順單于留邸太師王舜自莽篡位後病悸寖劇死莽曰昔齊太公以淑德纍世為周氏太師蓋豫之所監也其以舜子延襲父爵為安新公延弟褒新侯匡為太師將軍永為新室輔為太子置師友各四人秩以大夫以故大司徒馬宮為師疑故少府宗伯鳳為傅丞博士袁聖為阿輔京兆尹王嘉為保拂是為四師故尚書令唐林為胥附博士李充為奔走諫大夫趙襄為先後中郎將廉丹為禦侮是為四友又置師友祭酒及侍中諫議六經祭酒各一人凡九祭酒秩上卿琅邪左咸為講春秋潁川滿昌為講詩長安國由為講易平陽唐昌為講書沛郡陳咸為講禮崔發為講樂祭酒遣謁者持安車印綬即拜楚國龔勝為太子師友祭酒勝不應徵不食而死寧始將軍姚恂免侍中崇祿侯孔永為寧始將軍是歲池陽縣有小人景長尺餘或乘車馬或步行操持萬物小大各相稱三日止瀕河郡蝗生河決魏郡泛清河以東數郡先是莽恐河決為元城冢墓害及決東去元城不憂水故遂不隄塞四年二月赦天下夏赤氣出東南竟天厭難將軍陳欽言捕虜生口虜犯邊者皆孝單于咸子角所為莽怒斬其子登於長安以視諸蠻夷大司馬甄邯死寧始將軍孔永為大司馬侍中大贅侯輔為寧始將軍莽每當出輒先搜索城中名曰橫搜是月橫搜五日莽至明堂授諸侯茅土下書曰豫以不德襲于聖祖為萬國主思安黎元在于建侯分州正域以美風俗追監前代爰綱爰紀惟在堯典十有二州衛有五服詩國十五抪遍九州殷頌奄有九有之言禹貢之九州無并幽周禮司馬則無徐梁帝王相改各有云為或昭其事或大其本厥義著明其務一矣昔周二后受命故有東都西都之居豫之受命蓋亦如之其以洛陽為新室東都常安為新室西都邦畿連體各有采任州從禹貢為九爵從周氏有五諸侯之員千有八百附城之數亦如之以俟有功諸公一同有衆萬戶土方百里侯伯一國衆戶五千土方七十里子男一則衆戶二千有五百土方五十里附城大者食邑九成衆戶九百土方三十里自九以下降殺以兩至於一成五差備具合當一則今已受茅土者公十四人侯九十三人伯二十一人子百七十一人男四百九十七人凡七百九十六人附城千五百一十一人九族之女為任者八十三人及漢氏女孫中山承禮君遵德君修義君更以為任十有一公九卿十二大夫二十四元士定諸國邑采之處使侍中講禮大夫孔秉等與州部衆郡曉知地理圖籍者共校治于壽成朱鳥堂豫數與群公祭酒上卿親聽視咸已通矣夫褒德賞功所以顯仁賢也九族和睦所以褒親親也豫永惟匪解思稽前人將章黜陟以明好惡安元元焉以圖簿未定未授國邑且令受奉都內月錢數千諸侯皆困乏至有庸作者中郎區博諫莽曰井田雖聖王法其廢久矣周道既衰而民不從秦知順民之心可以獲大利也故滅廬井而置阡陌遂王諸夏訖今海內未厭其敝今欲違民心追復千載絶迹雖堯舜復起而無百年之漸弗能行也天下初定萬民新附誠未可施行莽知民怨乃下書曰諸名食王田皆得賣之勿拘以法犯私買賣庶人者且一切勿治初五威將帥出改句町王以為侯王邯怨怒不附莽諷牂柯大尹周歆詐殺邯邯弟承起兵攻殺歆先是莽發高句驪兵當伐胡不欲行郡強迫之皆亡出塞因犯法為寇遼西大尹田談追擊之為所殺州郡歸咎於高句驪侯騶嚴尤奏言貉人犯法不從騶起正有它心宜令州郡且尉安之今猥被以大罪恐其遂畔夫餘之屬必有和者胸奴未克夫餘穢貉復起此大憂也莽不尉安穢貉遂反詔尤擊之尤誘高句驪侯騶至而斬焉傳首長安莽大說下書曰乃者命遣猛將共行天罰誅滅虜知分為十二部或斷其右臂或斬其左腋或潰其胸腹或紬其兩脅今年刑在東方誅貉之部先縱焉捕斬虜騶平定東域虜知殄滅在于漏刻此乃天地群神社稷宗廟佑助之福公卿大夫士民同心將率虓虎之力也豫甚嘉之其更名高句驪為下句驪布告天下令咸知焉於是貉人愈犯邊東北與西南夷皆亂云莽志方盛以為四夷不足吞滅專念稽古之事復下書曰伏念豫之皇始祖考虞帝受終文祖在璇璣玉衡以齊七政遂類于上帝禋于六宗望秩于山川遍于群神巡狩五嶽群后四朝敷奏以言明試以功豫之受命即真到于建國五年已五載矣陽九之厄既度百六之會已過歲在壽星填在明堂倉龍癸酉德在中宮觀晉掌歲龜策告從其以此年二月建寅之節東巡狩具禮儀調度群公奏請募吏民人馬布帛綿又請內郡國十二買馬發帛四十五萬匹輸常安前後毋相須至者過半莽下書曰文母太后體不安其且止待後是歲改十一公號以新為心後又改心為信五年二月文母皇太后崩葬渭陵與元帝合而溝絶之立廟於長安新室世世獻祭元帝配食坐於床下莽為太后服喪三年大司馬孔永乞骸骨賜安車駟馬以特進就朝位同風侯逯並為大司馬是時長安民聞莽欲都雒陽不肯繕治室宅或頗徹之莽曰玄龍石文曰定帝德國雒陽符命著明敢不欽奉以始建國八年歲纏星紀在雒陽之都其謹繕修常安之都勿令壞敗敢有犯者輒以名聞請其罪是歲烏孫大小昆彌遣使貢獻大昆彌者中國外孫也其胡婦子為小昆彌而烏孫歸附之莽見胸奴諸邊並侵意欲得烏孫心乃遣使者引小昆彌使置大昆彌使上保成師友祭酒滿昌劾奏使者曰夷狄以中國有禮誼故詘而服從大昆彌君也今序臣使於君使之上非所以有夷狄也奉使大不敬莽怒免昌官西域諸國以莽積失恩信焉耆先畔殺都護但欽十一月彗星出二十餘日不見是歲以犯挾銅炭者多除其法明年改元曰天鳳天鳳元年正月赦天下莽曰豫以二月建寅之節行巡狩之禮太官齎糒乾肉內者行張坐臥所過毋得有所給豫之東巡必躬載耒每縣則耕以勸東作豫之南巡必躬載耨每縣則薅以勸南僞豫之西巡必躬載銍每縣則穫以勸西成豫之北巡必躬載拂每縣則粟以勸蓋藏畢北巡狩之禮即于土中居雒陽之都焉敢有趨歡犯法輒以軍法從事群公奏言皇帝至孝往年文母聖體不豫躬親供養衣冠稀解因遭棄群臣悲哀顏色未復飲食損少今一歲四巡道路萬里春秋尊非糒乾肉之所能堪且無巡狩須闋大服以安聖體臣等盡力養牧兆民奉稱明詔莽曰群公群牧群司諸侯庶尹願盡力相帥養牧兆民欲以稱豫繇此敬聽其勗之哉毋食言焉更以天鳳七年歲在大梁倉龍庚辰行巡狩之禮厥明年歲在實沈倉龍辛巳即土之中雒陽之都乃遣太傅平晏大司空王邑之雒陽營相宅兆圖起宗廟社稷郊兆云三月壬申晦日有食之大赦天下策大司馬逯並曰日食無光干戈不戢其上大司馬印韍就侯氏朝位太傅平晏勿領尚書事省侍中諸曹兼官者以利苗男欣為大司馬莽即真尤備大臣抑奪下權朝臣有言其過失者輒拔擢孔仁趙博費興等以敢擊大臣故見信任擇名官而居之公卿入宮吏有常數太傅平晏從吏過例掖門僕射苛問不遜戊曹士收繫僕射莽大怒使執法發車騎數百圍太傅府捕士即時死大司空士夜過奉常亭亭長苛之告以官名亭長醉曰寧有符傳邪士以馬箠擊亭長亭長斬士亡郡縣逐之家上書莽曰亭長奉公勿逐大司空邑斥士以謝國將哀章頗不清莽為選置和叔敕曰非但保國將閨門當保親屬在西州者諸公皆輕賤而章尤甚四月隕霜殺屮木海瀕尤甚六月黃霧四塞七月大風拔樹飛北闕直城門屋瓦雨雹殺牛羊莽以周官王制之文置卒正連率大尹職如太守屬令屬長職如都尉置州牧部監二十五人見禮如三公監位上大夫各主五郡公氏作牧侯氏卒正伯氏連率子氏屬令男氏屬長皆世其官其無爵者為尹分長安城旁六鄉置帥各一人分三輔為六尉郡河東河內弘農河南潁川南陽為六隊郡置大夫職如太守屬正職如都尉更名河南大尹曰保忠信卿益河南屬縣滿三十置六郊州長各一人人主五縣及它官名悉改大郡至分為五郡縣以亭為名者三百六十以應符命文也緣邊又置竟尉以男為之諸侯國閒田為黜陟增減云莽下書曰常安西都曰六鄉衆縣曰六尉義陽東都日六州衆縣曰六隊粟米之內曰內郡其外曰近郡有鄣徼者曰邊郡合百二十有五郡九州之內縣二千二百有三公作甸服是為惟城諸在侯服是為惟寧在采任諸侯是為惟翰在賓服是為惟屏在揆文教奮武衛是為惟垣在九州之外是為惟藩各以其方為稱總為萬國焉其後歲復變更一郡至五易名而還復其故吏民不能紀每下詔書輒繫其故名曰制詔陳留大尹太尉其以益歲以南付新平新平故淮陽以雍丘以東付陳定陳定故梁郡以封丘以東付治亭治亭故東郡以陳留以西付祈隧祈隧故滎陽陳留已無復有郡矣大尹太尉皆詣行在所其號令變易皆此類也令天下小學戊子代甲子為六旬首冠以戊子為元日昏以戊寅之旬為忌日百姓多不從者胸奴單于知死弟咸立為單于求和親莽遣使者厚賂之詐許還其侍子登因購求陳良終帶等單于即執良等付使者檻車詣長安莽燔燒良等於城北令吏民會觀之緣邊大飢人相食諫大夫如普行邊兵還言軍士久屯塞苦邊郡無以相贍今單于新和宜因是罷兵校尉韓威進曰以新室之威而吞胡虜無異口中蚤蝨臣願得勇敢之士五千人不齎斗糧飢食虜肉渴飲其血可以橫行莽壯其言以威為將軍然采普言徵還諸將在邊者免陳欽等十八人又罷四關填都尉諸屯兵會胸奴使還單于知侍子登前誅死發兵寇邊莽復發軍屯於是邊民流入內郡為人奴婢乃禁吏民敢挾邊民者棄市益州蠻夷殺大尹程隆三邊盡反遣平蠻將軍馮茂將兵擊之寧始將軍侯輔免講易祭酒戴參為寧始將軍二年二月置酒王路堂公卿大夫皆佐酒大赦天下是時日中見星大司馬苗欣左遷司命以延德侯陳茂為大司馬訛言黃龍墮死黃山宮中百姓奔走往觀者有萬數莽惡之捕繫問語所從起不能得單于咸既和親求其子登尸莽欲遣使送致恐咸怨恨害使者乃收前言當誅侍子者故將軍陳欽以他罪繫獄欽曰是欲以我為說於胸奴也遂自殺莽選儒生能顓對者濟南王咸為大使五威將琅邪伏黯等為帥使送登尸敕令掘單于知墓棘鞭其尸又令胸奴卻塞於漠北責單于馬萬匹牛三萬頭羊十萬頭及稍所略邊民生口在者皆還之莽好為大言如此咸到單于庭陳莽威德責單于背畔之罪應敵從橫單于不能詘遂致命而還之入塞咸病死封其子為伯伏黯等皆為子莽意以為制定則天下自平故鋭思於地里制禮作樂講合六經之說公卿旦入暮出議論連年不決不暇省獄訟冤結民之急務縣宰缺者數年守兼一切貪殘日甚中郎將繡衣執法在郡國者並乘權勢傳相舉奏又十一公士分布勸農桑班時令案諸章冠蓋相望交錯道路召會吏民逮捕證左郡縣賦斂遞相賕賂白黑紛然守闕告訴者多莽自見前顓權以得漢政故務自攬衆事有司受成苟免諸寶物名帑藏錢穀官皆宦者領之吏民上封事書宦官左右開發尚書不得知其畏備臣下如此又好變改制度政令煩多當奉行者輒質問乃以從事前後相乘憒眊不泄莽常御燈火至明猶不能勝尚書因是為姦寢事上書待報者連年不得去拘繫郡縣者逢赦而後出衛卒不交代歲矣穀常貴邊兵二十餘萬人仰衣食縣官愁苦五原代郡尤被其毒起為盜賊數千人為輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合擊歲餘乃定邊郡亦略將盡邯鄲以北大雨霧水出深者數丈流殺數千人立國將軍孫建死司命趙閎為立國將軍寧始將軍戴參歸故官南城將軍廉丹為寧始將軍三年二月乙酉地震大雨雪關東尤甚深者一丈竹柏或枯大司空王邑上書言視事八年功業不效司空之職尤獨廢頓至乃有地震之變願乞骸骨莽曰夫地有動有震震者有害動者不害春秋記地震易繫坤動動靜辟脅萬物生焉災異之變各有云為天地動威以戒豫躬公何辜焉而乞骸骨非所以助豫者也使諸吏散騎司祿大衛修寧男遵諭豫意焉五月莽下吏祿制度曰豫遭陽九之厄百六之會國用不足民人騷動自公卿以下一月之祿十繌布二匹或帛一匹豫每念之未嘗不戚焉今厄會已度府帑雖未能充略頗稍給其以六月朔庚寅始賦吏祿皆如制度四輔公卿大夫士下至輿僚凡十五等僚祿一歲六十六斛稍以差增上至四輔而為萬斛云莽又曰普天之下莫非王土率土之賓莫非王臣蓋以天下養焉周禮膳羞百有二十品今諸侯各食其同國則辟任附城食其邑公卿大夫元士食其采多少之差咸有條品歲豐穰則充其禮有災害則有所損與百姓同憂喜也其用上計時通計天下幸無災害者太官膳羞備其品矣即災害以什率多少而損膳焉東嶽太師立國將軍保東方三州一部二十五郡南嶽太傅前將軍保南方二州一部二十五郡西嶽國師寧始將軍保西方一州二部二十五郡北嶽國將衛將軍保北方二州一部二十五郡大司馬保納卿言卿仕卿作卿京尉扶尉兆隊右隊中部左洎前七部大司徒保樂卿典卿宗卿秩卿翼尉光尉左隊前隊中部右部有五郡大司空保豫卿虞卿共卿工卿師尉列尉祈隊後隊中部洎後十郡及六司六卿皆隨所屬之公保其災害亦以十率多少而損其祿郎從官中都官吏食祿都內之委者以太官膳羞備損而為節諸侯辟任附城群吏亦各保其災害幾上下同心勸進農業安元元焉莽之制度煩碎如此課計不可理吏終不得祿各因官職為姦受取賕賂以自共給是月戊辰長平館西岸崩雍涇水不流毀而北行遣大司空王邑行視還奏狀群臣上壽以為河圖所謂以土填水胸奴滅亡之祥也乃遣并州牧宋游擊都尉任萌等將兵擊胸奴至邊止屯七月辛酉霸城門災民間所謂青門也戊子晦日有食之大赦天下復令公卿大夫諸侯二千石舉四行各一人大司馬陳茂以日食免武建伯尤為大司馬十月戊辰王路朱鳥門鳴晝夜不絶崔發等曰虞帝闢四門通四聰門鳴者明當修先聖之禮招四方之士也於是令群臣皆賀所舉四行從朱鳥門入而對策焉平蠻將軍馮茂擊句町士卒疾疫死者什六七賦斂民財什取五益州虛耗而不克徵還下獄死更遣寧始將軍廉丹與庸部牧史熊擊句町頗斬首有勝莽徵丹熊丹熊願益調度必克乃還復大賦斂就都大尹馮英不肯給上言自越巂遂久仇牛同亭邪豆之屬反畔以來積且十年郡縣距擊不已續用馮茂苟施一切之政僰道以南山險高深茂多驅衆遠居費以億計吏士離毒氣死者什七今丹熊懼於自詭期會調發諸郡兵穀復訾民取其十四空破梁州功終不遂宜罷兵屯田明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英為長沙連率翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剝之量度五藏以竹筳導其脈知所終始云可以治病是歲遣大使五威將王駿西域都護李崇將戊己校尉出西域諸國皆郊迎貢獻焉諸國前殺都護但欽駿欲襲之命佐帥何封戊己校尉郭欽別將焉耆詐降伏兵擊駿等皆死欽封後到襲擊老弱從車師還入塞莽拜欽為填外將軍封劋胡子何封為集胡男西域自此絶
