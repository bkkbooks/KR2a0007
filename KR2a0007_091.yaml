body:
  text: 西南夷兩粵朝鮮傳第六十五南夷君長以十數夜郎最大其西靡莫之屬以十數滇最大自滇以北君長以十數邛都最大此皆椎結耕田有邑聚其外西自桐師以東北至葉榆名為巂昆明編髮隨畜移徙亡常處亡君長地方可數千里自巂以東北君長以十數徙莋都最大自莋以東北君長以十數冉駹最大其俗或土著或移徙在蜀之西自駹以東北君長以十數白馬最大皆氐類也此皆巴蜀西南外蠻夷也始楚威王時使將軍莊蹻將兵循江上略巴黔中以西莊蹻者楚莊王苗裔也蹻至滇池方三百里旁平地肥饒數千里以兵威定屬楚欲歸報會秦擊奪楚巴黔中郡道塞不通因乃以其衆王滇變服從其俗以長之秦時嘗破略通五尺道諸此國頗置吏焉十餘歲秦滅及漢興皆棄此國而關蜀故徼巴蜀民或竊出商賈取其莋馬棘僮旄牛以此巴蜀殷富建元六年大行王恢擊東粵東粵殺王郢以報恢因兵威使番陽令唐蒙風曉南粵南粵食蒙蜀枸醬蒙問所從來曰道西北牂柯江江廣數里出番禺城下蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘步足以行船南粵以財物役屬夜郎西至桐師然亦不能臣使也蒙乃上書説上曰南粵王黃屋左纛地東西萬餘里名為外臣實一州主今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粵一奇也誠以漢之強巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙以郎中將將千人食重萬餘人從巴苻關入遂見夜郎侯多同厚賜諭以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報乃以為犍為郡發巴蜀卒治道自僰道指牂柯江蜀人司馬相如亦言西夷邛莋可置郡使相如以郎中將往諭皆如南夷為置一都尉十餘縣屬蜀當是時巴蜀四郡通西南夷道載轉相餉數歲道不通士罷餓餧離暑溼死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫弘往視問焉還報言其不便及弘為御史大夫時方築朔方據河逐胡弘等因言西南夷為害可且罷專力事胸奴上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就及元狩元年博望侯張騫言使大夏時見蜀布邛竹杖問所從來曰從東南身毒國可數千里得蜀賈人市或聞邛西可二千里有身毒國騫因盛言大夏在漢西南慕中國患胸奴隔其道誠通蜀身毒國道便近又亡害於是天子乃令王然于柏始昌呂越人等十餘輩間出西南夷指求身毒國至滇滇王當羌乃留為求道四歲餘皆閉昆明莫能通滇王與漢使言漢孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉及至南粵反上使馳義侯因犍為發南夷兵且蘭君恐遠行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南粵者八校尉擊之會越已破漢八校尉不下中郎將郭昌衛廣引兵還行誅隔滇道者且蘭斬首數萬遂平南夷為牂柯郡夜郎侯始倚南粵南粵已滅還誅反者夜郎遂入朝上以為夜郎王南粵破後及漢誅且蘭邛君并殺莋侯冉駹皆震恐請臣置吏以邛都為粵巂郡莋都為沈黎郡冉駹為文山郡廣漢西白馬為武都郡使王然于以粵破及誅南夷兵威風諭滇王入朝滇王者其衆數萬人其旁東北勞深靡莫皆同姓相杖未肯聽勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷滇舉國降請置吏入朝於是以為益州郡賜滇王王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後二十三歲孝昭始元元年益州廉頭姑繒民反殺長吏牂柯談指同並等二十四邑凡三萬餘人皆反遣水衡都尉發蜀郡犍為奔命萬餘人擊牂柯大破之後三歲姑繒葉榆復反遣水衡都尉呂辟胡將郡兵擊之辟胡不進蠻夷遂殺益州太守乘勝與辟胡戰士戰及溺死者四千餘人明年復遣軍正王平與大鴻臚田廣明等並進大破益州斬首捕虜五萬餘級獲畜産十餘萬上曰鉤町侯亡波率其邑君長人民擊反者斬首捕虜有功其立亡波為鉤町王大鴻臚廣明賜爵關內侯食邑三百戶後間歲武都氐人反遣執金吾馬適建龍額侯韓增與大鴻臚廣明將兵擊之至成帝河平中夜郎王興與鉤町王禹漏臥侯俞更舉兵相攻牂柯太守請發兵誅興等議者以為道遠不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽説大將軍王鳳曰太中大夫匡使和解蠻夷王侯王侯受詔已復相攻輕易漢使不憚國威其效可見恐議者選耎復守和解太守察動靜有變乃以聞如此則復曠一時王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉遠臧溫暑毒草之地雖有孫吳將賁育士若入水火往必焦沒知勇亡所施屯田守之費不可勝量宜因其罪惡未成未疑漢家加誅陰敕旁郡守尉練士馬大司農豫調穀積害處選任職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之民聖王不以勞中國宜罷郡放棄其民絶其王侯勿復通如以先帝所立纍世之功不可墮壞亦宜因其萌牙早斷絶之及已成形然後戰師則萬姓被害大將軍鳳於是薦金城司馬陳立為牂柯太守立者臨邛人前為連然長不韋令蠻夷畏之及至牂柯諭告夜王興興不從命立請誅之未報乃從吏數十人出行縣至興國且同亭召興興將數千人往至亭從邑君數十人入見立立數責因斷頭邑君曰將軍誅亡狀為民除害願出曉士衆以興頭示之皆釋兵降鉤町王禹漏臥侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與興子邪務收餘兵迫脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據厄為壘立使奇兵絶其餉道縱反間以誘其衆都尉萬年曰兵久不決費不可共引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立引兵救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降立已平定西夷微詣京師會巴郡有盜賊復以立為巴郡太守秩中二千石居賜爵左庶長徙為天水太守勸民農桑為天下最賜金四十斤入為左曹衛將軍護軍都尉卒官王莽篡位改漢制貶鉤町王以為侯王邯怨恨牂柯大尹周欽詐殺邯邯弟承攻殺欽州郡擊之不能服三邊蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍為吏士賦斂取足於民以擊益州出入三年疾疫死者什七巴蜀騷動莽徵茂還誅之更遣寧始將軍廉丹與庸部牧史熊大發天水隴西騎士廣漢巴蜀犍為吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒飢疫三歲餘死者數萬而粵巂蠻夷任貴亦殺太守枚根自立為邛穀王會莽敗漢興誅貴復舊號云南粵王趙他真定人也秦并天下略定揚粵置桂林南海象郡以適徙民與粵雜處十三歲至二世時南海尉任囂病且死召龍川令趙他語曰聞陳勝等作亂豪桀叛秦相立南海辟遠恐盜兵侵此吾欲興兵絶新道自備待諸侯變會疾甚且番禺負山險阻南北東西數千里頗有中國人相輔此亦一州之主可為國郡中長吏亡足與謀者故召公告之即被他書行南海尉事囂死他即移檄告橫浦陽山湟溪關曰盜兵且至急絶道聚兵自守因稍以法誅秦所置吏以其黨為守假秦已滅他即擊并桂林象郡自立為南粵武王高帝已定天下為中國勞苦故釋他不誅十一年遣陸賈立他為南粵王與剖符通使使和輯百粵毋為南邊害與長沙接境高后時有司請禁粵關市鐵器他曰高皇帝立我通使物今高后聽讒臣別異蠻夷鬲絶器物此必長沙王計欲倚中國擊滅南海并王之自為功也於是他乃自尊號為南武帝發兵攻長沙邊敗數縣焉高后遣將軍隆慮侯竈擊之會暑溼士卒大疫兵不能隃領歲餘高后崩即罷兵他因此以兵威財物賂遺閩粵西甌駱役屬焉東西萬餘里乃乘黃屋左纛稱制與中國侔文帝元年初鎮撫天下使告諸侯四夷從代來即位意諭盛德焉乃為他親冢在真定置守邑歲時奉祀召其從昆弟尊官厚賜寵之詔丞相平舉可使粵者平言陸賈先帝時使粵上召賈為太中大夫謁者一人為副使賜他書曰皇帝謹問南粵王甚苦心勞意朕高皇帝側室之子棄外奉北藩于代道里遼遠壅蔽朴愚未嘗致書高皇帝棄群臣孝惠皇帝即世高后自臨事不幸有疾日進不衰以故悖暴乎治諸呂為變故亂法不能獨制乃取它姓子為孝惠皇帝嗣賴宗廟之靈功臣之力誅之已畢朕以王侯吏不釋之故不得不立今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽侯親昆弟在真定者已遣人存問修治先人冢前日聞王發兵於邊為寇災不止當其時長沙苦之南邵尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰高皇帝所以介長沙土也朕不得擅變焉吏曰得王之地不足以為大得王之財不足以為富服領以南王自治之雖然王之號為帝兩帝並立亡一乘之使以通其道是爭也爭而不讓仁者不為也願與王分棄前患終今以來通使如故故使賈馳諭告王朕意王亦受之毋為寇災矣上褚五十衣中褚三十衣下褚二十衣遺王願王聽樂娛憂存問鄰國陸賈至南粵王恐乃頓首謝願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛因為書稱蠻夷大長老夫臣他昧死再拜上書皇帝陛下老夫故粵吏也高皇帝幸賜臣他璽以為南粵王使為外臣時內貢職孝惠皇帝即位義不忍絶所以賜老夫者厚甚高后自臨用事近細士信讒臣別異蠻夷出令曰毋豫蠻夷外粵金鐵田器馬牛羊即豫豫牡毋與牝老夫處辟馬牛羊齒已長自以祭祀不修有死罪使內史藩中尉高御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論吏相與議曰今內不得振於漢外亡以自高異故更號為帝自帝其國非敢有害於天下也高皇后聞之大怒削去南粵之籍使使不通老夫竊疑長沙王讒臣故敢發兵以伐其邊且南方卑溼蠻夷中西有西甌其衆半羸南面稱王東有閩粵其衆數千人亦稱王西北有長沙其半蠻夷亦稱王老夫故敢妄竊帝號聊以自娛老夫身定百邑之地東西南北數千萬里帶甲百萬有餘然北面而臣事漢何也不敢背先人之故老夫處粵四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色耳不聽鍾鼓之音者以不得事漢也今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣謹北面因使者獻白璧一雙翠鳥千犀角十紫貝五百桂蠹一器生翠四十雙孔雀二雙昧死再拜以聞皇帝陛下陸賈還報文帝大説遂至孝景時稱臣遣使入朝請然其居國竊如故號其使天子稱王朝命如諸侯至武帝建元四年他孫胡為南粵王立三年閩粵王郢興兵南擊邊邑粵使人上書曰兩粵俱為藩臣毋擅興兵相攻擊今東粵擅興兵侵臣臣不敢興兵唯天子詔之於是天子多南粵義守職約為興師遣兩將軍往討閩粵兵未隃領閩粵王弟餘善殺郢以降於是罷兵天子使嚴助往諭意南粵王胡頓首曰天子乃興兵誅閩粵死亡以報德遣太子嬰齊入宿衛謂助曰國新被寇使者行矣胡方日夜裝入見天子助去後其大臣諫胡曰漢興兵誅郢亦行以驚動南粵且先王言事天子期毋失禮要之不可以怵好語入見入見則不得復歸亡國之勢也於是胡稱病竟不入見後十餘歲胡實病甚太子嬰齊請歸故薨諡曰文王嬰齊嗣立即臧其先武帝文帝璽嬰齊在長安時取邯鄲摎氏女生子興及即位上書請立摎氏女為后興為嗣漢數使者風諭嬰齊猶尚樂擅殺生自恣懼入見要以用漢法比內諸侯固稱病遂不入見遣子次公入宿衛嬰齊薨諡為明王太子興嗣立其母為太后太后自未為嬰齊妻時曾與霸陵人安國少季通及嬰齊薨後元鼎四年漢使安國少季諭王王太后入朝令辨士諫大夫終軍等宣其辭勇士魏臣等輔其決衛尉路博德將兵屯桂陽待使者王年少太后中國人安國少季往復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威勸王及幸臣求內屬即因使者上書請比內諸侯三歲一朝除邊關於是天子許之賜其丞相呂嘉銀印及內史中尉太傅印餘得自置除其故黥劓刑用漢法諸使者皆留填撫之王王太后飭治行裝重資為入朝具相呂嘉年長矣相三王宗族官貴為長吏七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連其居國中甚重粵人信之多為耳目者得衆心愈於王王之上書數諫止王王不聽有畔心數稱病不見漢使者使者注意嘉勢未能誅王王太后亦恐嘉等先事發欲介使者權謀誅嘉等置酒請使者大臣皆侍坐飲嘉弟為將將卒居宮外酒行太后謂嘉南粵內屬國之利而相君苦不便者何也以激怒使者使者狐疑相杖遂不敢發嘉見耳目非是即趨出太后怒欲鏦嘉以矛王止太后嘉遂出介弟兵就舍稱病不肯見王及使者乃陰謀作亂王素亡意誅嘉嘉知之以故數月不發太后獨欲誅嘉等力又不能天子聞之罪使者怯亡決又以為王王太后已附漢獨呂嘉為亂不足以興兵欲使莊參以二千人往參曰以好往數人足以武往二千人亡足以為也辭不可天子罷參兵郟壯士故濟北相韓千秋奮曰以區區粵又有王應獨呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟摎樂將二千人往入粵境呂嘉乃遂反下令國中曰王年少太后中國人又與使者亂專欲內屬盡持先王寶入獻天子以自媚多從人行至長安虜賣以為僮取自脫一時利亡顧趙氏社稷為萬世慮之意乃與其弟將卒攻殺太后王盡殺漢使者遣人告蒼梧秦王及其諸郡縣立明王長男粵妻子術陽侯建德為王而韓千秋兵之入也破數小邑其後粵直開道給食未至番禺四十里粵以兵擊千秋等滅之使人函封漢使節置塞上好為謾辭謝罪發兵守要害處於是天子曰韓千秋雖亡成功亦軍鋒之冠封其子延年為成安侯摎樂其姊為王太后首願屬漢封其子廣德為龍侯乃赦天下曰天子微弱諸侯力政譏臣不討賊呂嘉建德等反自立晏如令粵人及江淮以南樓船十萬師往討之元鼎五年秋衛尉路博德為伏波將軍出桂陽下湟水主爵都尉楊僕為樓船將軍出豫章下橫浦故歸義粵侯二人為戈船下瀨將軍出零陵或下離水或抵蒼梧使馳義侯因巴蜀罪人發夜郎兵下牂柯江咸會番禺六年冬樓船將軍將精卒先陷尋狹破石門得粵船粟因推而前挫粵鋒以粵數萬人待伏波將軍伏波將軍將罪人道遠後期與樓船會乃有千餘人遂俱進樓船居前至番禺建德嘉皆城守樓船自擇便處居東南面伏波居西北面會暮樓船攻敗粵人縱火燒城粵素聞伏波莫不知其兵多少伏波乃為營遣使招降者賜印綬復縱令相招樓船力攻燒敵反驅而入伏波營中遲旦城中皆降伏波呂嘉建德以夜與其屬數百人亡入海伏波又問降者知嘉所之遣人追故其校司馬蘇弘得建德為海常侯粵郎都稽得嘉為臨蔡侯蒼梧王趙光與粵王同姓聞漢兵至降為隨桃侯及粵揭陽令史定降漢為安道侯粵將畢取以軍降為膫侯粵桂林監居翁諭告甌駱四十餘萬口降為湘城侯戈船下瀨將軍兵及馳義侯所發夜郎兵未下南粵已平遂以其地為儋耳珠崖南海蒼梧鬱林合浦交址九真日南九郡伏波將軍益封樓船將軍以推鋒陷堅為將梁侯自尉他王凡五世九十三歲而亡閩粵王無諸及粵東海王搖其先皆粵王句踐之後也姓騶氏秦并天下廢為君長以其地為閩中郡及諸侯畔秦無諸搖率粵歸番陽令吳芮所謂番君者也從諸侯滅秦當是時項羽主命不王也以故不佐楚漢擊項籍無諸搖帥粵人佐漢漢五年復立無諸為閩粵王王閩中故地都冶孝惠三年舉高帝時粵功曰閩君搖功多其民便附乃立搖為東海王都東甌世號曰東甌王后數世孝景三年吳王濞反欲從閩粵閩粵未肯行獨東甌從及吳破東甌受漢購殺吳王丹徒以故得不誅吳王子駒亡走閩粵怨東甌殺其父常勸閩粵擊東甌建元三年閩粵發兵圍東甌東甌使人告急天子天子問太尉田蚡蚡對曰粵人相攻擊固其常不足以煩中國往救也中大夫嚴助詰蚡言當救天子遣助發會稽郡兵浮海救之語具在助傳漢兵未至閩粵引兵去東粵請舉國徙中國乃悉與衆處江淮之間六年閩粵擊南粵南粵守天子約不敢擅發兵而以聞上遣大行王恢出豫章大司農韓安國出會稽皆為將軍兵未隃領閩粵王郢發兵距險其弟餘善與宗族謀曰王以擅發兵不請故天子兵來誅漢兵衆強即幸勝之後來益多滅國乃止今殺王以謝天子天子罷兵固國完不聽乃力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所為來者誅王王頭至不戰而殞利莫大焉乃以便宜案兵告大司農軍而使使奉王頭馳報天子詔罷兩將軍兵曰郢等首惡獨無諸孫繇君丑不與謀乃使郎中將立丑為粵繇王奉閩粵祭祀餘善以殺郢威行國中民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善首誅郢師得不勞因立餘善為東粵王與繇王並處至元鼎五年南粵反餘善上書請以卒八千從樓船擊呂嘉等兵至揭陽以海風波為解不行持兩端陰使南粵及漢破番禺樓船將軍僕上書願請引兵擊東粵上以士卒勞倦不許罷兵令諸校留屯豫章梅領待命明年秋餘善聞樓船請誅之漢兵留境且往乃遂發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅領殺漢三校尉是時漢使大司農張成故山州侯齒將屯不敢擊卻就便處皆坐畏懦誅餘善刻武帝璽自立詐其民為妄言上遣橫海將軍韓説出句章浮海從東方往樓船將軍僕出武林中尉王溫舒出梅領粵侯為戈船下瀨將軍出如邪白沙元封元年冬咸入東粵東粵素發兵距嶮使徇北將軍守武林敗樓船軍數校尉殺長史樓船軍卒錢唐榬終古斬徇北將軍為語兒侯自兵未往故粵衍侯吳陽前在漢漢使歸諭餘善不聽及橫海軍至陽以其邑七百人反攻粵軍於漢陽及故粵建成侯敖與繇王居股謀俱殺餘善以其衆降橫海軍封居股為東成侯萬戶封敖為開陵侯封陽為卯石侯橫海將軍説為按道侯橫海校尉福為繚嫈侯福者城陽王子故為海常侯坐法失爵從軍亡功以宗室故侯及東粵將多軍漢兵至棄軍降封為無錫侯故甌駱將左黃同斬西于王封為下鄜侯於是天子曰東粵狹多阻閩粵悍數反覆詔軍吏皆將其民徙處江淮之間東粵地遂虛朝鮮王滿燕人自始燕時嘗略屬真番朝鮮為置吏築障秦滅燕屬遼東外徼漢興為遠難守復修遼東故塞至浿水為界屬燕燕王盧綰反入胸奴滿亡命聚黨千餘人椎結蠻夷服而東走出塞度浿水居秦故空地上下障稍伇屬真番朝鮮蠻夷及故燕齊亡在者王之都王險會孝惠高后天下初定遼東太守即約滿為外臣保塞外蠻夷毋使盜邊蠻夷君長欲入見天子勿得禁止以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真番辰國欲上書見天子又雍閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔何去至界臨浿水使馭刺殺送何者朝鮮裨王長即渡水馳入塞遂歸報天子曰殺朝鮮將上為其名美弗詰拜何為遼東東部都尉朝鮮怨何發兵攻襲殺何天子募罪人繫朝鮮其秋遣樓船將軍楊僕從齊浮勃海兵五萬左將軍荀彘出遼東誅右渠右渠發兵距險左將軍卒多率遼東士兵先縱敗散多還走坐法斬樓船將齊兵七千人先至王險右渠城守窺知樓船軍少即出擊樓船樓船軍敗走將軍僕失其衆遁山中十餘日稍求收散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝願降恐將詐殺臣今見信節請服降遣太子入謝獻馬五千匹及餽軍糧人衆萬餘持兵方度浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐之遂不度浿水復引歸山報天子誅山左將軍破浿水上軍乃前至城下圍其西北樓船亦往會居城南右渠遂堅城守數月未能下左將軍素侍中幸將燕代卒悍乘勝軍多驕樓船將齊卒入海已多敗亡其先與右渠戰困辱亡卒卒皆恐將心慚其圍右渠常持和節左將軍急擊之朝鮮大臣乃陰間使人私約樓船往來言尚未肯決左將軍數與樓船期戰樓船欲就其約不會左將軍亦使人求間隙降下朝鮮不肯心附樓船以故兩將不相得左將軍心意樓船前有失軍罪今與朝鮮和善而又不降疑其有反計未敢發天子曰將率不能前乃使衛山諭降右渠不能顓決與左將軍相誤卒沮約今兩將圍城又乖異以故久不決使故濟南太守公孫遂往正之有便宜得以從事遂至左將軍曰朝鮮當下久矣不下者樓船數期不會具以素所意告遂曰今如此不取恐為大害非獨樓船又且與朝鮮共滅吾軍遂亦以為然而以節召樓船將軍入左將軍軍計事即令左將軍戲下執縛樓船將軍并其軍以報天子誅遂左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓陶尼溪相參將軍王硤相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與王又不肯降陶硤路人皆亡降漢路人道死元封三年夏尼溪相參乃使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成已故遂定朝鮮為真番臨屯樂浪玄菟四郡封參為澅清侯陶為秋苴侯硤為平州侯長為幾侯最以父死頗有功為沮陽侯左將軍徵至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍擅先縱失亡多當誅贖為庶人贊曰楚粵之先歷世有土及周之衰楚地方五千里而句踐亦以粵伯秦滅諸侯唯楚尚有滇王漢誅西南夷獨滇復寵及東粵滅國遷衆繇王居股等猶為萬戶侯三方之開皆自好事之臣故西南夷發於唐蒙司馬相如兩粵起嚴助朱買臣朝鮮由涉何遭世富盛動能成功然已勤矣追觀太宗填撫尉他豈古所謂招攜以禮懷遠以德者哉
