body:
  text: 食貨志第四洪範八政一曰食二曰貨食謂農殖嘉穀可食之物貨謂布帛可衣及金刀龜貝所以分財布利通有無者也二者生民之本興自神農之世斫木為耜煣木為耒耒以王先謙說據顏注作耨是按景祐殿本都作耨耨王先謙說據顏注作耨是按景祐殿本都作耨之利以教天下而食足日中為市致天下之民聚天下之貨交易而退各得其所而貨通食足貨通然後國實民富而教化成黃帝以下通其變使民不倦堯命四子以敬授民時舜命后稷以黎民祖飢是為政首禹平洪水定九州制土田各因所生遠近賦入貢棐楙遷有無萬國作乂殷周之盛詩書所述要在安民富而教之故易稱天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位養成群生奉順天德治國安民之本也故曰不患寡而患不均不患貧而患不安蓋均亡貧和亡寡安亡傾是以聖王域民築城郭以居之制廬井以均之開市肆以通之設庠序以教之士農工商四民有業學以居位曰士闢土殖穀曰農作巧成器曰工通財鬻貨曰商聖王量能授事四民陳力受職故朝亡廢官邑亡敖民地亡曠土理民之道地著為本故必建步立畝正其經界六尺為步步百為畝畝百為夫夫三為屋屋三為井井方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝以為廬舍出入相友守望相助疾病則景祐殿本都作相王先謙說作相是相景祐殿本都作相王先謙說作相是救民是以和睦而教化齊同力役生産可得而平也民受田上田夫百畝中田夫二百畝下田夫三百畝歲耕種者為下易上田休一歲者為一易中田休二歲者為再易下田三歲更耕之自爰其處農民戶人己受田其家衆男為餘夫亦以口受田如比士工商家受田五口乃當農夫一人此謂平土可以為法者也若山林藪澤原陵淳鹵之地各以肥磽多少為差有賦有稅稅謂公田什一及工商衡虞之入也賦共車馬甲兵士徒之役充實府庫賜豫之用稅給郊社宗廟百神之祀天子奉養百官祿食庶事之費民年二十受田六十歸田七十以上上所養也十歲以下上所長也十一以上上所強也種穀必雜五種以備災害田中不得有樹用妨五穀力耕數耘收穫如寇盜之至還廬樹桑菜茹有畦瓜瓠果蓏殖於疆易雞豚狗彘毋失其時女修蠶織則五十可以衣帛七十可以食肉在野曰廬在邑曰里五家為鄰五鄰為里四里為族五族為黨五黨為州五州為鄉鄉萬二千五百戶也鄰長位下士自此以上稍登一級至鄉而為卿也於是宋祁說於里有序於字下當添是字按景祐本有是字里有序而鄉有庠序以明教庠則行禮而視化焉春令民畢出在野冬則畢入於邑其詩曰四之日舉止同我婦子饁彼南畝又曰十月蟋蟀入我床下嗟我婦子聿為改歲入此室處所以順陰陽備寇賊習禮文也春秋張文虎說粵本秋作將是按景祐殿本都作將將張文虎說粵本秋作將是按景祐殿本都作將出民里胥平旦坐於右孰鄰長坐於右景祐殿局本都作左此誤左景祐殿局本都作左此誤孰畢出然後歸夕亦如之入者必持薪樵輕重相分班白不提挈冬民既入婦人同巷相從夜績女工一月得四十五日必相從者所以省費燎火同巧拙而合習俗也男女有不得其所者因相與歌詠各言其傷是月餘子亦在于序室八歲入小學學六甲五方書計之事始知室家長幼之節十五入大學學先聖禮樂而知朝廷君臣之禮其有秀異者移鄉學于庠序庠序之異者移國學于少學諸侯歲貢少學之異者於天子學于大學命曰造士行同能偶則別之以射然後爵命焉孟春之月群居者將散行人振木鐸徇于路以采詩獻之大師比其音律以聞於天子故曰王者不窺牖戶而知天下此先王制土處民富而教之之大略也故孔子曰道千乘之國敬事而信節用而愛人使民以時故民皆勸功樂業先公而後私其詩曰有淹淒淒興雲祁祁雨我公田遂及我私民三年耕則餘一年之畜衣食足而知榮辱廉讓生而爭訟息故三載考績孔子曰苟有用我者期月而已可也三年有成成此功也三考黜陟餘三年食進業曰登再登曰平餘六年食三登曰泰平二十七歲遺九年食然後以景祐本作至王先謙說作至是至景祐本作至王先謙說作至是德流洽禮樂成焉故曰如有王者必世而後仁繇此道也周室既衰暴君污吏慢其經界繇役橫作政令不信上下相詐公田不治故魯宣公初稅畝春秋譏焉於是上貪民怨災害生而禍亂作陵夷至於戰國貴詐力而賤仁誼先富有而後禮讓是時李悝為魏文侯作盡地力之教以為地方百里提封九萬頃除山澤邑居參分去一為田六百萬畝治田勤謹則畝益三升不勤則損亦如之地方百里之增減輒為粟百八十萬石矣又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民毋傷而農益勸今一夫挾五口治田百畝歲收畝一石半為粟百五十石除十一之稅十五石餘百三十五石食人月一石半五人終歲為粟九十石餘有四十五石石三十為錢千三百五十除社閭嘗新春秋之祠用錢三百餘千五十衣人率用錢三百五人終歲用千五百不足四百五十不幸疾病死喪之費及上賦斂又未與此此農夫所以常困有不勸耕之心而令糴至於甚貴者也是故善平糴者必謹觀歲有上中下孰上孰其收自四餘四百石中孰自三餘三百石下孰自倍餘百石小飢則收百石中飢七十石大飢三十石故大孰則上糴三而舍一中孰則糴二下孰則糴一使民適足賈平則止小飢則發小孰之所斂中飢則發中孰之所斂大飢則發大孰之所斂而糶之故雖遇饑饉水旱糴不貴而民不散取有餘以補不足也行之魏國國以富彊及秦孝公用商君壞井田開阡伯急耕戰之賞雖非古道猶以務本之故傾鄰國而雄諸侯然王制遂滅僭差亡度庶人之富者纍巨萬而貧者食糟糠有國彊者兼州域而弱者喪社稷至於始皇遂并天下內興功作外攘夷狄收泰半之賦發閭左之戍男子力耕不足糧餉女子紡績不足衣服竭天下之資財以奉其政猶未足以淡其欲也海內愁怨遂用潰畔漢興接秦之敝諸侯並起民失作業而大饑饉凡米石五千人相食死者過半高祖乃令民得賣子就食蜀漢天下既定民亡蓋臧自天子不能具醇駟而將相或乘牛車上於是約法省禁輕田租什五而稅一量吏祿度官用以賦於民而山川園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費漕轉關東粟以給中都官歲不過數十萬石孝惠高后之間衣食滋殖文帝即位躬修儉節思安百姓時民近戰國皆背本趨末賈誼說上曰管子曰倉廩實而知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至孅至悉也故其畜積足恃今背本而趨末食者甚衆是天下之大殘也淫侈之俗日日以長是天下之大賊也殘賊公行莫之或止大命將泛莫之振救生之者甚少而靡之者甚多天下財産何得不蹶漢之為漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧歲惡不入請賣爵子既聞耳矣安有為天下阽危者若是而上不驚者世之有飢穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之兵旱相乘天下大屈有勇力者聚徒而衡擊罷夫羸老易子而咬其骨政治未畢通也遠方之能疑者並舉而爭起矣乃駭而圖之豈將有及乎夫積貯者天下之大命也苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今毆民而歸之農皆著於本使天下各食其力末技游食之民轉而緣南畝則畜積足而人樂其所矣可以為富安天下而直為此廩廩也鼂竊為陛下惜之於是上感誼言始開籍田躬耕以勸百姓鼂錯復說上曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國亡捐瘠者以畜積多而備先具也今海內為一土地人民之衆不避湯禹加以亡天災數年之水旱而畜積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出也游食之民未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有高城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖飢之於食不待甘旨飢寒至身不顧廉恥人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈母不能保其子君安能以有其民古明主知其然也故務民於農桑薄賦斂廣畜積以實倉廩備水旱故民可得而有也民者在上所以牧之趨利如水走下四方亡擇也夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易臧在於把握可以周海內而亡飢寒之患此令臣輕背其主而民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而飢寒至是故明君貴五穀而賤金玉今農夫五口之家其服役者不下二人其能耕者不過百畝百畝之收不過百石春耕夏耘秋穫冬臧伐薪樵治官府給繇役春不得避風塵夏不得避暑熱秋不得避陰雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐景祐本作賦王念孫說作賦是按通鑑亦作賦賦景祐本作賦王念孫說作賦是按通鑑亦作賦賦斂不時朝令而暮改當具有者半賈而賣亡者取倍稱之息於是有賣田宅鬻子孫以償責者矣而商賈大者積貯倍息小者坐列販賣操其奇贏日游都市乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必梁景祐殿局本都作粱王先謙說作粱是注同粱景祐殿局本都作粱王先謙說作粱是注同肉亡農夫之苦有阡伯之得因其富厚交通王侯力過吏勢以利相傾千里游敖冠蓋相望乘堅策肥履絲曳縞此商人所以兼并農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖忤而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所泄夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二日民賦少三曰勸農功今令民有車騎馬一匹者復卒三人車騎者天下武備也故為復卒神農之教曰有石城十仞湯池百步帶甲百萬而亡粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上乃復一人耳此其與騎馬之功相去遠矣爵者上之所擅出於口而亡窮粟者民之所種生於地而不乏夫得高爵與免罪人之所甚欲也使天下人景祐殿本都有人字通鑑亦有入粟於邊以受爵免罪不過三歲塞下之粟必多矣於是文帝從錯之言令民入粟邊六百石爵上造稍增至四千石為五大夫萬二千石為大庶長各以多少級數為差錯復奏言陛下幸使天下入粟塞下以拜爵甚大惠也竊恐塞卒之食不足用大泄天下粟邊食足以支五歲可令入粟郡縣矣足支一歲以上可時赦勿收農民租如此德澤加於萬民民俞勤農時有軍役若遭水旱民不困乏天下安寧歲孰且美則民大富樂矣上復從其言乃下詔賜民十二年租稅之半明年遂除民田之租稅後十三歲孝景二年令民半出田租三十而稅一也其後上郡以西旱復修賣爵令而裁其賈以招民及徒復作得輸粟於縣官以除罪始造苑馬以廣用宮室列館車馬益增修矣然婁敕有司以農為務民遂樂業至武帝之初七十年間國家亡事非遇水旱則民人給家足都鄙廩庾盡滿而府庫餘財京師之錢纍百巨萬貫朽而不可校太倉之粟陳陳相因充溢露積於外腐敗不可食衆庶街巷有馬阡伯之間成群乘牸牝者擯而不得會聚守閭閻者食粱肉為吏者長子孫居官者以為姓號人人自愛而重犯法先行誼而黜愧辱焉於是罔疏而民富役財驕溢或至并兼豪黨之徒以武斷於鄉曲宗室有土公鄉大夫以下爭於奢侈室廬車服僭上亡限物盛而衰固其變也是後外事四夷內興功利役費並興而民去本董仲舒說上曰春秋它穀不書至於麥禾不成則書之以此見聖人於五穀最重麥與禾也今關中俗不好種麥是歲失春秋之所重而損生民之具也願陛下幸詔大司農使關中民益種宿麥令毋後時又言古者稅民不過什一其求易共使民不過三日其力易足民財內足以養老盡孝外足以事上共稅下足以畜妻子極愛故民說從上至秦則不然用商鞅之法改帝王之制除井田民得賣買富者田連阡伯貧者亡立錐之地又顓川澤之利管山林之饒荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又加月為更卒已復為正一歲屯戍一歲力役三十倍於古田租口賦鹽鐵之利二十倍於古或耕豪民之田見稅什五故貧民常衣牛馬之衣而食犬彘之食重以貪暴之吏刑戮妄加民愁亡聊亡逃山林轉為盜賊赭衣半道斷獄歲以千萬數漢興循而未改古井田法雖難卒行宜少近古限民名田以淡不足塞并兼之路鹽鐵皆歸於民去奴婢除專殺之威薄賦斂省繇役以寬民力然後可善治也仲舒死後功費愈甚天下虛耗人復相食武帝末年悔征伐之事乃封丞相為富民侯下詔曰方今之務在於力農以趙過為搜粟都尉過能為代田一畝三甽歲代處故曰代田古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中苗生葉以上稍耨隴草因隤其土以附根苗景祐殿本都作苗根王先謙說作苗根是苗根景祐殿本都作苗根王先謙說作苗根是故其詩曰或藝或芓黍稷擬擬藝除草也耔王先謙說殿本耔作芓是芓王先謙說殿本耔作芓是附根也言苗稍壯每耨輒附根此盛暑隴盡而根深能風與旱故擬擬而盛也其耕耘下種田器皆有便巧率十二夫為田一井一屋故畝五頃用耦犂二牛三人一歲之收常過縵田畝一斛以上善者倍之過使教田太常三輔大農置工巧奴與從事為作田器二千石遣令長三老力田及里父老善田者受田器學耕種養苗狀民或苦少牛亡以趨澤故平都令光教過以人挽犂過奏光以為丞教民相與庸挽犂率多人者田日三十畝少者十三畝以故田多墾闢過試以離宮卒田其宮壖地課得穀皆多其旁田畝一斛以上令命家田三輔公田又教邊郡及居延城是後邊城河東弘農三輔太常民皆便代田用力少而得穀多至昭帝時流民稍還田野益闢頗有畜積宣帝即位用吏多選賢良百姓安土歲數豐穰穀至石五錢農人少利時大司農中丞耿壽昌以善為算能商功利得幸於上五鳳中奏言故事歲漕關東穀四百萬斛以給京師用卒六萬人宜糴三輔弘農河東上黨太原郡穀足供京師可以省關東漕卒過半又白增海租三倍天子皆從其計御史大夫蕭望之奏言故御史屬徐宮家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復豫民魚乃出夫陰陽之感物類相應萬事盡然今壽昌欲近糴漕關內之穀築倉治船費直二萬萬餘有動衆之功恐生旱氣民被其災壽昌習於商功分銖之事其深計遠慮誠未足任宜且如故上不聽漕事果便壽昌遂白令邊郡皆築倉以穀賤時增其賈而糴以利農穀貴時減賈而糶名曰常平倉民便之上乃下詔賜壽昌爵關內侯而蔡癸以好農使勸郡國至大官元帝即位天下大水關東郡十一尤甚二年齊地飢穀石三百餘民多餓死琅邪郡人相食在位諸儒多言鹽鐵官及北假田官常平倉可罷毋與民爭利上從其議皆罷之又罷建章甘泉宮衛角抵齊三服官省禁苑以豫貧民減諸侯王廟衛卒半又減關中卒五百人轉穀振貸窮乏其後用度不足獨復鹽鐵官成帝時天下亡兵革之事號為安樂然俗奢侈不以畜聚為意永始二年梁國平原郡比年傷水災人相食刺史守相坐免哀帝即位師丹輔政建言古之聖王莫不設井田然後治乃可平孝文皇帝承亡周亂秦兵革之後天下空虛故務勸農桑帥以節儉民始充實未有并兼之害故不為民田及奴婢為限今纍世承平豪富吏民訾數巨萬而貧弱俞困蓋君子為政貴因循而重改作然所以有改者將以救急也亦未可詳宜略為限天子下其議丞相孔光大司空何武奏請諸侯王列侯皆得名田國中列侯在長安公主名田縣道及關內侯吏民名田皆毋過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人期盡三年犯者沒入官時田宅奴婢賈為減賤丁傅用事董賢隆貴皆不便也詔書且須後遂寢不行宮室苑囿府庫之臧已侈百姓訾富雖不及文景然天下戶口最盛矣平帝崩王莽居攝遂篡位王莽因漢承平之業胸奴稱藩百蠻賓服舟車所通盡為臣妾府庫百官之富天下晏然莽一朝有之其心意未滿狹小漢家制度以為疏闊宣帝始賜單于印璽與天子同而西南夷鉤町稱王莽乃遣使易單于印貶鉤町王為侯二方始怨侵犯邊境莽遂興師發三十萬衆欲同時十道並出一舉滅胸奴募發天下囚徒丁男甲卒轉委輸兵器自負海江淮而至北邊使者馳傳督趣海內擾矣又動欲慕古不度時宜分裂州郡改職作官下令曰漢氏減輕田租三十而稅一常有更賦罷癃咸出而豪民侵陵分田劫假厥名三十實什稅五也富者驕而為邪貧者窮而為姦俱陷於辜刑用不錯今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不滿八而田過一井者分餘田與九族鄉黨犯令法至死制度又不定吏緣為姦天下謷謷然陷刑者衆後三年莽知民愁下詔諸食王田及私屬皆得賣買勿拘以法然刑罰深刻它政悖亂邊兵二十餘萬人仰縣官衣食用度不足數橫賦斂民俞貧困常苦枯旱亡有平歲穀賈翔貴末年盜賊群起發軍擊之將吏放縱於外北邊及青徐地人相食雒陽以東米石二千莽遣三公將軍開東方諸倉振貸窮乏又分遣大夫謁者教民煮木為酪酪不可食重為煩擾流民入關者數十萬人置養淡官以稟之吏盜其稟飢死者什七八莽恥為政所致乃下詔曰豫遭陽九之厄百六之會枯旱霜蝗饑饉荐臻蠻夷猾夏寇賊姦軌百姓流離豫甚悼之害氣將究矣歲為此言以至於亡凡貨金錢布帛之用夏殷以前其詳靡記云太公為周立九府圜法黃金方寸而重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為匹故貨寶於金利於刀流於泉布於布束於帛太公退又行之于齊至管仲相桓公通輕重之權曰歲有凶穰故穀有貴賤令有緩急故物有輕重人君不理則畜賈游於市乘民之不給百倍其本矣故萬乘之國必有萬金之賈千乘之國必有千金之賈者利有所并也計本量委則足矣然而民有飢餓者穀有所臧也民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重凡輕重斂散之以時則準平守準平王念孫說景祐本則準平下有守準平三字是也使萬室之邑必有萬鍾之臧臧繈千萬千室之邑必有千鍾之臧臧繈百萬春以奉耕夏以奉耘耒耜器械種餉糧食必取淡焉故大賈畜家不得豪奪吾民矣桓公遂用區區之齊合諸侯顯伯名其後百餘年周景王時患錢輕將更鑄大錢單穆公曰不可古者天降災戾於是乎量資幣權輕重以救民民患輕則為之作重幣以行之於是有母權子而行民皆得焉若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之今王廢輕而作重民失其資能無匱乎民若匱王用將有所乏乏將厚取於民民不給將有遠志是離民也且絶民用以實王府猶塞川原為潢汙也竭亡日矣王其圖之弗聽卒鑄大錢文曰寶貨肉好皆有周郭以勸農淡不足百姓蒙利焉秦兼天下幣為二等黃金以溢為名上幣銅錢質如周錢文曰半兩重如其文而珠玉龜貝銀錫之屬為器飾寶臧不為幣然各隨時而輕重無常漢興以為秦錢重難用更令民鑄莢錢黃金一斤而不軌逐利之民畜積餘贏以稽市物痛騰躍米至石萬錢馬至匹百金天下已平高祖乃令賈人不得衣絲乘車重稅租以困辱之孝惠高后時為天下初定復弛商賈之律然市井子孫亦不得宦為吏景祐殿本都作為官吏為官吏景祐殿本都作為官吏孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盜鑄錢令使民放鑄賈誼諫曰法使天下公得顧租鑄銅錫為錢敢雜以鉛鐵為它巧者其罪黥然鑄錢之情非殽雜為巧則不可得贏而殽之甚微為利甚厚夫事有召禍而法有起姦今令細民人操造幣之勢各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其勢不止乃者民人抵罪多者一縣百數及吏之所疑榜笞奔走者甚衆夫縣法以誘民使入陷阱孰積於此曩禁鑄錢死罪積下今公鑄錢黥罪積下為法若此上何賴焉又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立吏急而一之呼則大為煩苛而力不能勝縱而弗呵呼則市肆異用錢文大亂苟非其術何鄉而可哉今農事棄捐而采銅者日蕃釋其耒耨冶鎔炊炭姦錢日多五穀不為多善人怵而為姦邪願民陷而之刑戮刑戮將甚不詳奈何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也故銅布於天下其為禍博矣今博禍可除而七福可致也何謂七福上收銅勿令布則民不鑄錢黥罪不積一矣僞錢不蕃民不相疑二矣采銅鑄作者反於耕田三矣銅畢歸於上上挾銅積以御輕重錢輕則以術斂之重則以術散之貨物必平四矣以作兵器以假貴臣多少有制用別貴賤五矣以臨萬貨以調盈虛以收奇羡則官富實而末民困六矣制吾棄財以與胸奴逐爭其民則敵必懷七矣故善為天下者因禍而為福轉敗而為功今久退七福而行博禍臣誠傷之上不聽是時吳以諸侯即山鑄錢富埒天子後卒叛逆鄧通大夫也以鑄錢財過王者故吳鄧錢布天下武帝因文景之畜忿胡粵之害即位數年嚴助朱買臣等招徠東甌事兩粵江淮之間蕭然煩費矣唐蒙司馬相如始開西南夷鑿山通道千餘里以廣巴蜀巴蜀之民罷焉彭吳穿穢貊朝鮮置滄海郡則燕齊之間靡然發動及王恢謀馬邑胸奴絶和親侵擾北邊兵連而不解天下共其勞干戈日滋行者齎居者送中外騷擾相奉百姓抏敝以巧法財賂衰耗而不淡入物者補官出貨者除罪選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始其後衛青歲以數萬騎出擊胸奴遂取河南地築朔方時又通西南夷道作者數萬人千里負擔餽餉率十餘鍾致一石散幣於卭僰以輯之數歲而道不通蠻夷因以數攻吏景祐殿本都無吏字平準書亦無吏發兵誅之悉巴蜀租賦不足以更之乃募豪民田南夷入粟縣官而內受錢於都內東置滄海郡人徒之費疑於南夷又興十餘萬人築衛朔方轉漕甚遠自山東咸被其勞費數十百巨萬府庫並虛乃募民能入奴婢得以終身復為郎增秩及入羊為郎始於此此後四年衛青比歲十餘萬衆擊胡斬捕首虜之士受賜黃金二十餘萬斤而漢軍士馬死者十餘萬兵甲輔漕之費不與焉於是大司農陳臧錢經用賦稅既竭不足以奉戰士有司請令民得買爵及贖禁錮免臧王先謙說臧當作減平準書作減減王先謙說臧當作減平準書作減罪請置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵官首者試補吏先除千夫如五大夫其有罪又減二等爵得至樂鄉以顯軍功軍功多用超等大者封侯卿大夫小者郎吏道雜而多端則官職耗廢自公公字據景祐殿局本補孫弘以春秋之義繩臣下取漢相張湯以峻文決理為廷尉於是見知之法生而廢格沮誹窮治之獄用矣其明年淮南衡山江都王謀反迹見而公卿尋端治之竟其黨與坐而死者數萬人吏益慘急而法令察當是時招尊方正賢良文學之士或至公卿大夫公孫弘以宰相布被食不重味為下先然而無益於俗稍務於功利矣其明年票騎仍再出擊胡大克獲渾邪王率數萬衆來降於是漢發車三萬兩迎之既至受賞賜及有功之士是歲費凡百餘巨萬先是十餘歲河決灌梁楚地固已數困而緣河之郡隄塞河輒壞決費不可勝計其後番係欲省底柱之漕穿汾河渠以為溉田鄭當時為渭漕回遠鏧漕直渠自長安至華陰而朔方亦穿溉渠作者各數萬人歷二三期而功未就費亦各以巨萬十數天子為伐胡故盛養馬馬之往來食長安者數萬匹卒掌者關中不足乃調旁近郡而胡降者數萬人皆得厚賞衣食仰給縣官縣官不給天子乃損膳解乘輿駟出御府禁臧以淡之其明年山東被水災民多飢乏於是天子遣使虛郡國倉廩以振貧猶不足又募豪富人相假貸尚不能相救及徙貧民於關以西及充朔方以南新秦中七十餘萬口衣食皆仰給於縣官數歲貸與産業使者分部護冠蓋相望費以億計縣官大空而富商賈或墆財役貧轉轂百數廢居居邑封君皆氐首仰給焉冶鑄煮鹽財或纍萬金而不佐公家之急黎民重困於是天子與公卿議更造錢幣以淡用而摧浮淫并兼之徒是時禁苑有白鹿而少府多銀錫自孝文更造四銖錢至是歲四十餘年從建元以來用少縣官往往即多銅山而鑄錢民亦盜鑄不可勝數錢益多而輕物益少而貴有司言曰古者皮幣諸侯以聘享金有三等黃金為上白金為中赤金為下今半兩錢法重四銖而姦或盜摩錢質而取鋊錢益輕薄而物貴則遠方用幣煩費不省乃以白鹿皮方尺緣以繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又造銀錫白金以為天用莫如龍地用莫如馬人用莫如龜故白金三品其一曰重八兩圜之其文龍名白撰直三千二曰以重差小方之其文馬直五百三曰復小橢之其文龜直三百令縣官銷半兩錢更鑄三銖錢重如其文盜鑄諸金錢罪皆死而吏民之犯者不可勝數於是以東郭咸陽孔僅為大農丞領鹽鐵事而桑弘羊貴幸咸陽齊之大煮鹽孔僅南陽大冶皆致産纍千金故鄭當時進言之弘羊洛陽賈人之子以心計年十三侍中故三人言利事析秋豪矣法既益嚴吏多廢免兵革數動民多買復及五大夫千夫徵發之士益鮮於是除千夫五大夫為吏不欲者出馬故吏皆適令伐棘上林作昆明池其明年大將軍票騎大出擊胡賞賜五十萬金軍馬死者十餘萬匹轉漕車甲之費不與焉是時財匱戰士頗不得祿矣有司言三銖錢輕輕錢易作姦詐及更請郡國鑄五銖錢周郭其質令不可得摩取鉛錢大昭說鉛當作鋊按景祐殿本都作鋊鋊錢大昭說鉛當作鋊按景祐殿本都作鋊大農上鹽鐵丞孔僅咸陽言山海天地之臧宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作煮鹽官與牢盆浮食奇民欲擅斡山海之貨以致富羡役利細民其沮事之議不可勝聽敢私鑄鐵器煮鹽者釱左趾沒入其器物郡不出鐵者置小鐵官使屬在所縣使僅咸陽乘傳舉行天下鹽鐵作官府除故鹽鐵家富者為吏吏益多賈人矣商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寬貸而民不齊出南畝商賈滋衆貧者畜積無有皆仰縣官異時算軺車賈人之緡錢皆有差請算如故諸賈人末作貰貸賣買居邑貯積諸物及商以取利者雖無市籍各以其物自占率緡錢二千而算一諸作有租及鑄率緡錢四千算一非吏比者三老北邊騎士軺車一算商賈人軺車二算般五丈以上一算匿不自占占不悉戍邊一歲沒入緡錢有能告者以其半畀之賈人有市籍及家屬皆無得名田以便農敢犯令沒入田貨是時豪富皆爭匿財唯卜式數求入財以助縣官天子乃超拜式為中郎賜爵左庶長田十頃布告天下以風百姓初式不願為官上強拜之稍遷至齊相語自在其傳孔僅使天下鑄作器三年中至大司農列於九卿而桑弘羊為大司農中丞管諸會計事稍稍置均輸以通貨物始令吏得入穀補官郎至六百石自造白金五銖錢後五歲而赦吏民之坐盜鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能半自出天下大氐無慮皆鑄金錢矣犯法者衆吏不能盡誅於是遣博士褚大徐偃等分行郡國舉并兼之徒守相為利者而御史大夫張湯方貴用事減宣杜周等為中丞義縱尹齊王溫舒等用急刻為九卿直指夏蘭之屬始出而大農顏異誅矣初異為濟南亭長以廉直稍遷至九卿上與湯既造白鹿皮幣問異異曰今王侯朝賀以倉璧直數千而其皮薦反四十萬本末不相稱天子不說湯又與異有隙及人有告異以它議事下湯治異與客語客語被令下有不便者異不應微反脣湯奏當異九卿見令不便不入言而腹非論死自是後有腹非之法比而公卿大夫多諂諛取容天下下子既下緡錢令而尊卜式百姓終莫分財佐縣官於是告緡錢縱矣郡國鑄錢民多姦鑄錢多輕而公卿請令京師鑄官赤仄一當五賦官用非赤仄不得行白金稍賤民弗寶用縣官以令禁之無益歲餘終廢不行是歲湯死而民不思其後二歲赤仄錢賤民巧法用之不便又廢於是悉禁郡國毋鑄錢專令上林三官鑄錢既多而令天下非三官錢不得行諸郡國前所鑄錢皆廢銷之輪入其銅三官而民之鑄錢益少計其費不能相當唯真工大姦乃盜為之楊可告緡遍天下中家以上大氐皆遇告杜周治之獄少反者乃分遣御史廷尉正監分曹往往王先謙說平準書不重往字往字當屬上句其重文蓋衍即治郡國緡錢得民財物以億計奴婢以千萬數田大縣數百頃小縣百餘頃宅亦如之於是商賈中家以上大氐破民偷甘食好衣不事畜臧之業而縣官以鹽鐵緡錢之故用少饒矣益廣開何焯說當從平準書作益廣關開字誤關何焯說當從平準書作益廣關開字誤置左石輔初大農幹王先謙說幹字誤當作斡平準書作管同斡王先謙說幹字誤當作斡平準書作管同鹽鐵官布多置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林上林既充滿益廣是時粵欲與漢用船戰逐乃大修昆明池列館環之治樓船高十餘丈旗織加其上甚壯於是天子感之乃作柏梁臺高數十丈宮室之修繇此日麗乃分緡錢諸官而水衡少府太僕大農各置農官往往即郡縣比沒入田田之其沒入奴婢分諸苑養狗馬禽獸及與諸官官益雜置多徒奴婢衆而下河漕度四百萬石及官自糴乃足所忠言世家子弟富人或鬭雞走狗馬弋獵博戲亂齊民乃徵諸犯令相引數千人名曰株送徒入財者得補郎郎選衰矣是時山東被河災及歲不登數年人或相食方二三千里天子憐之令飢民得流就食江淮間欲留留處使者冠蓋相屬於道護之下巴蜀粟以振焉明年天子始出巡郡國東度河河東守不意行至不辨自殺行西踰隴卒從官不得食隴西守自殺於是上北出蕭關從數萬騎行獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下而令民得畜邊縣官假馬母三歲而歸及息什一以除告緡用充入新秦中既得寶鼎立后土泰一祠公卿白議封禪事而郡國皆豫治道修繕故宮及當馳道縣縣治宮儲設共具而望幸明年南粵反西羌侵邊天子為山東不淡赦天下囚因南方樓船士二十餘萬人擊粵發三河以西騎擊羌又數萬人度河築令居初置張掖酒泉郡而上郡朔方西河河西開田官斥塞卒六十萬人戍田之中國繕道餽糧遠者三千近者千餘里皆仰給大農邊兵不足乃發武庫工官兵器以淡之車騎馬乏縣官錢少買馬難得乃著令令封君以下至三百石吏以上差出牡錢大昭說牡當作牝昭帝始元元年罷天下亭母馬是也按平準書亦作牡牝錢大昭說牡當作牝昭帝始元元年罷天下亭母馬是也按平準書亦作牡馬天下亭亭有畜字馬歲課息齊相卜式上書願父子死南粵天子下詔褒揚賜爵關內侯黃金四十斤田十頃布告天下天下莫應列侯以百數皆莫求從軍至飲酎少府省金而列侯坐酎金失侯者百餘人乃拜卜式為御史大夫式既在位見郡國多不便縣官作鹽鐵器苦惡賈貴或彊令民買之而船有算商者少物貴乃因孔僅言船算事上不說漢連出兵三歲誅羌滅兩粵番禺以西至蜀南者置初郡十七且以其故俗治無賦稅南陽漢中以往各以地比給初郡吏卒奉食幣物傳車馬被具而初郡又時時小反殺吏漢發南方吏卒往誅之間歲萬餘人費皆仰大農大農以均輸調鹽鐵助賦故能淡之然兵所過縣縣以為訾給毋乏而已不敢言輕賦法矣其明年元封元年卜式貶為太子太傅而桑弘羊為治粟都尉領大農盡代僅斡天下鹽鐵弘羊以諸官各自市相爭物以故騰躍而天下賦輸或不償其僦費乃請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官令遠方各以其物如異時商賈所轉貶景祐殿局本都作販販景祐殿局本都作販者為賦而相灌輸置平準於京師都受天下委輸召工官治車諸器皆仰給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如此富商大賈亡所牟大利則反本而萬物不得騰躍故抑天下之物名曰平準天子以為然而許之於是天子北至朔方東封泰山巡海上旁北邊以歸所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農弘羊又請令民得入粟補吏及罪以贖令民入粟甘泉各有差以復終身不復告緡它郡各輸急處而諸農各致粟出東漕益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀諸均輸帛五百萬匹民不益賦而天下用饒於是弘羊賜爵左庶長黃金者再百焉是歲小旱上令百官求雨卜式言曰縣官當食租衣稅而已今弘羊令吏坐市列販物求利亨弘羊天乃雨久之武帝疾病拜弘羊為御史大夫昭帝即位六年詔郡國舉賢良文學之士問以民所疾苦教化之要皆對願罷鹽鐵酒權景祐殿本都作榷榷景祐殿本都作榷均輸官毋與天下爭利視以儉節然後教化可興弘羊難以為此國家大業所以制四夷安邊足用之本不可廢也乃與丞相千秋共奏罷酒酤弘羊自以為國興大利伐其功欲為子弟得官怨望大將軍霍光遂與上官桀等謀反誅滅宣元成哀平五世亡所變改元帝時嘗罷鹽鐵官三年而復之貢禹言鑄錢采銅一歲十萬人不耕民坐盜鑄陷刑者多富人臧錢滿室猶無厭足民心動搖棄本逐末耕者不能半姦邪不可禁原起於錢疾其末者絶其本宜罷采珠玉金銀鑄錢之官毋復以為幣除其販賣租銖之律租稅祿賜皆以布帛及穀使百姓一意農桑議者以為交易待錢布帛不可尺寸分裂禹議亦寢自孝武元狩五年三官初鑄五銖錢至平帝元始中成錢二百八十億萬餘云王莽居攝變漢制以周錢有子母相權於是更造大錢徑寸二分重十二銖文曰大錢五十又造契刀錯刀契刀其環如大錢身形如刀長二寸文曰契刀五百錯刀以黃金錯其文曰一刀直五千與五銖錢凡四品並行莽即真以為書劉字有金刀乃罷錯刀契刀及五銖錢而更作金銀龜貝錢布之品名曰寶貨小錢徑六分重一銖文曰小錢直一次七分三銖曰么錢一十次八分五銖曰幼錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十因前大錢五十是為錢貨六品直各如其文黃金重一斤直錢萬朱提銀重八兩為一流直一千五百八十它銀一流直千是為銀貨二品元龜岠冉長尺二寸直二千一百六十為大貝十朋公龜九寸直五百為壯貝十朋侯龜七寸以上直三百為么貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上二枚為一朋直五十么貝二寸四分以上二枚為一朋直三十小貝寸二分以上二枚為一朋直十不盈寸二分漏度不得為朋率枚直錢三是為貝貨五品大布次布弟布壯布中布差布厚布幼布么布小布小布長寸五分重十五銖文曰小布一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣是為布貨十品凡寶貨五物六名二十八品鑄作錢布皆用銅殽以連錫文質周郭放漢五銖錢云其金銀與它物雜色不純好龜不盈五寸貝不盈六分皆不得為寶貨元龜為蔡非四民所得居有者入大卜受直百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢非井田挾五銖錢者為惑衆投諸四裔以御魑魅於是農商失業食貨俱廢民涕泣於市道坐賣買田宅奴婢鑄錢抵罪者自公卿大夫至庶人不可稱數莽知民愁乃但行小錢直一與大錢五十二品並行龜貝布屬且寢莽性躁擾不能無為每有所興造必欲依古得經文國師公劉歆言周有泉府之官收不讎與欲得即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有賒貸樂語有五均傳記各有斡焉今開賒貸張五均設諸斡者所以齊衆庶抑并兼也遂於長安及五都立五均官更名長安東西市令及洛陽邯鄲臨災宛成都市長皆為五均司市稱王念孫說稱字涉下文四稱字而衍師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱皆置交易丞五人錢府丞一人工商能采金銀銅連錫登龜取貝者皆自占司市錢府順時氣而取之又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不樹藝者為不毛出三夫之布民浮游無事出夫布一匹其不能出布者冗作縣官衣食之諸取衆物鳥獸魚鱉百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及它方技商販賈人坐肆列里區謁舍皆各自占所為於其在所之縣官除其本計其利十一分之而以其一為貢敢不自占自占不以實者盡沒入所采取而作縣官一歲諸司市常以四時中月實定所掌為物上中下之賈各自用為其市平毋拘它所衆民賣買五穀布帛絲綿之物周於民用而不讎者均官有以考檢厥實用其本賈取之毋令折錢萬物卬貴過平一錢則以平賈賣與民其賈氐賤減平者聽民自相與市以防貴庾者民欲祭祀喪紀而無用者錢府以所入工商之貢但賒之祭祀無過旬日喪紀毋過三月民或乏絶欲貸以治産業者均授之除其費計所得受息毋過歲什一羲和魯匡言名山大澤鹽鐵錢布帛五均賒貸斡在縣官唯酒酤獨未斡酒者天之美祿帝王所以頤養天下享祀祈福扶衰養疾百禮之會非酒不行故詩曰無酒酤我而論語曰酤酒不食二者非相反也夫詩據承平之世酒酤在官和旨便人可以相御也論語孔子當周衰亂酒酤在民薄惡不誠是以疑而弗食今絶天下之酒則無以行禮相養放而亡限則費財傷民請法古令官作酒以二千五百石為一均率開一盧以賣讎五十釀為準一釀用粗米二斛麴一斛得成酒六斛六斗各以其市月朔米麴三斛并計其賈而參分之以其一為酒一斛之平除米麴本賈計其利而什分之以其七入官其三及糟酨灰炭給工器薪樵之費羲和置命士督五均六斡郡有數人皆用富賈洛陽薛子仲張長叔臨菑姓偉等乘傳求利交錯天下因與郡縣通姦多張空簿府臧不實百姓俞病莽知民苦之復下詔曰夫鹽食肴之將酒百藥之長嘉會之好鐵曰錢大昭說曰疑當作田按殿局本都作田田錢大昭說曰疑當作田按殿局本都作田農之本名山大澤饒衍之臧五均賒貸百姓所取平卬以給淡鐵布銅冶通行有無備民用也此六者非編戶齊民所能家作必卬於市雖貴數倍不得不買豪民富賈即要貧弱先聖知其然也故斡之每一斡為設科條防禁犯者罪至死姦吏猾民並侵衆庶各不安生後五歲天鳳元年復申下金銀龜貝之貨頗增減其賈直而罷大小錢改作貨布長二寸五分廣一寸首長八分有奇廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨泉二十五貨泉徑一寸重五銖文右曰貨左曰泉枚直一與貨布二品並行又以大錢行久罷之恐民挾不止乃令民且獨行大錢與新貨泉俱枚直一並行盡六年毋得復挾大錢矣每一易錢民用破業而大陷刑莽以私鑄錢死及非沮寶貨投四裔犯法者多不可勝行乃更輕其法私鑄作泉布者與妻子沒入為官奴婢吏及比伍知而不舉告與同罪非沮寶貨民罰作一歲吏免官犯者俞衆及五人相坐皆沒入郡國檻車鐵鎖傳送長安鍾官愁苦死者什六七作貨布後六年胸奴侵寇甚莽大募天下囚徒人奴名曰豬突豨勇一切稅吏民訾三十而取一又令公卿以下至郡縣黃綬吏皆保養軍馬吏盡復以與民民搖手觸禁不得耕桑繇役煩劇而枯旱蝗蟲相因又用制作未定上自公侯下至小吏皆不得奉祿而私賦斂貨賂上流獄訟不決吏用苛暴立威旁緣莽禁侵刻小民富者不得自保貧者無人自存起為盜賊依阻山澤吏不能禽而覆蔽之浸淫日廣於是青徐荊楚之地往往萬數戰鬭死亡緣邊四夷所係虜陷罪飢疫人相食及莽未誅而天下戶口減半矣自發豬突豨勇後四年而漢兵誅莽後二年世祖受命蕩滌煩苛復五銖錢與天下更始贊曰易稱裒多益寡稱物平施書云楙遷有無周有泉府之官而孟子亦非狗彘食人之食不知斂野有餓𦭼而弗知發故管氏之輕重李悝之平糴弘羊均輸壽昌常平亦有從徠顧古為之有數吏良而令行故民賴其利萬國作乂及孝武時國用饒給而民不益賦其次也至于王莽制度失中姦軌弄權官民俱竭亡次矣
