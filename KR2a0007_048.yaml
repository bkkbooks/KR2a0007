body:
  text: 董仲舒傳第二十六董仲舒廣川人也少治春秋孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面蓋三年不窺園其精如此進退容止非禮不行學士皆師尊之武帝即位舉賢良文學之士前後百數而仲舒以賢良對策焉制曰朕獲承至尊休德傳之亡窮而施之罔極任大而守重是以夙夜不皇康寧永惟萬事之統猶懼有闕故廣延四方之豪儁郡國諸侯公選賢良修絜博習之士欲聞大道之要至論之極今子大夫褎然為舉首朕甚嘉之子大夫其精心致思朕垂聽而問焉蓋聞五帝三王之道改制作樂而天下洽和百王同之當虞氏之樂莫盛於韶於周莫盛於勺聖王已沒鐘鼓筦絃之聲未衰而大道微缺陵夷至虖桀紂之行王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚眾然猶不能反日以仆滅至後王而後止豈其所持操或誖繆而失其統與固天降命不可復反必推之於大衰而後息與烏虖凡所為屑屑夙興夜寐務法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或壽或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何脩何飭而膏露降百穀登德潤四海澤臻屮木三光全寒暑平受天之祜享鬼神之靈德澤洋溢施虖方外延及群生子大夫明先聖之業習俗化之變終始之序講聞高誼之日久矣其明以諭朕科別其條勿猥勿并取之於術慎其所出乃其不正不直不忠不極枉于執事書之不泄興于朕躬毋悼後害子大夫其盡心靡有所隱朕將親覽焉仲舒對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹案春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在彊勉而已矣彊勉學問則聞見博而知益明彊勉行道則德日起而大有功此皆可使還至而有效者也詩曰夙夜匪解書云茂哉茂哉皆彊勉之謂也道者所繇適於治之路也仁義禮樂皆其具也故聖王已沒而子孫長久安寧數百歲此皆禮樂教化之功也王者未作樂之時乃用先王之樂宜於世者而以深入教化於民教化之情不得雅頌之樂不成故王者功成作樂樂其德也樂者所以變民風化民俗也其變民也易其化人也著故聲發於和而本於情接於肌膚臧於骨髓故王道雖微缺而筦絃之聲未衰也夫虞氏之不為政久矣然而樂頌遺風猶有存者是以孔子在齊而聞韶也夫人君莫不欲安存而惡危亡然而政亂國危者甚眾所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興詩人美之而作上天祐之為生賢佐後世稱誦至今不絕此夙夜不解行善之所致也孔子曰人能弘道非道弘人也故治亂廢興在於己非天降命不可得反其所操持誖謬失其統也臣聞天之所大奉使之王者必有非人力所能致而自至者此受命之符也天下之人同心歸之若歸父母故天瑞應誠而至書曰白魚入于王舟有火復于王屋流為鳥此蓋受命之符也周公曰復哉復哉孔子曰德不孤必有鄰皆積善絫德之效也及至後世淫佚衰微不能統理群生諸侯背畔殘賊良民以爭壤土廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡畜於上上下不和則陰陽繆盭而妖孽生矣此災異所緣而起也臣聞命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也孔子曰君子之德風小人之德屮屮上之風必偃故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔唯冶者之所鑄綏之斯倈動之斯和此之謂也臣謹案春秋之文求王道之端得之於正正次王王次春春者天之所為也正者王之所為也其意曰上承天之所為而下以正其所為正王道之端云爾然則王者欲有所為宜求其端於天天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成歲終陽以成歲為名此天意也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成歲也為政而任刑不順於天故先王莫之肯為也今廢先王德教之官而獨任執法之吏治民毋乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也臣謹案春秋謂一元之意一者萬物之所從始也元者辭之所謂大也謂一為元者視大始而欲正本也春秋深探其本而反自貴者始故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正而亡有邪氣奸其間者是以陰陽調而風雨時群生和而萬民殖五穀孰而屮木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫自悲可致此物而身卑賤不得致也今陛下貴為天子富有四海居得致之位操可致之勢又有能致之資行高而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明於此是故南面而治天下莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也埽除其迹而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為亡道以失天下秦繼其後獨不能改又益甚之重禁文學不得挾書棄捐禮誼而惡聞之其心欲盡滅先王之道而顓為自恣苟簡之治故立為天子十四歲而國破亡矣自古以倈未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也孔子曰腐朽之木不可彫也糞土之牆不可圬也今漢繼秦之後如朽木糞牆矣雖欲善治之亡可柰何法出而姦生令下而詐起如以湯止沸抱薪救火愈甚亡益也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言曰臨淵羨魚不如退而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治善治則災害日去福祿日來詩云宜民宜人受祿于天為政而宜於民者固當受祿于天夫仁誼禮知信五常之道王者所當脩飭也五者脩飭故受天之祐而享鬼神之靈德施于方外延及群生也天子覽其對而異焉乃復冊之曰制曰蓋聞虞舜之時游於巖郎之上垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也蓋儉者不造玄黃旌旗之飾及至周室設兩觀乘大路朱干玉戚八佾陳於庭而頌聲興夫帝王之道豈異指哉或曰良玉不瑑又曰非文無以輔德二端異焉殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚眾刑者相望秏矣哀哉烏虖朕夙寤晨興惟前帝王之憲永思所以奉至尊章洪業皆在力本任賢今朕親耕藉田以為農先勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神功烈休德未始云獲也今陰陽錯繆氛氣充塞群生寡遂黎民未濟廉恥貿亂賢不肖渾殽未得其真故詳延特起之士庶幾乎今子大夫待詔百有餘人或道世務而未濟稽諸上古之不同考之于今而難行毋乃牽於文繫而不得騁與將所繇異術所聞殊方與各悉對著于篇毋諱有司明其指略切磋究之以稱朕意仲舒對曰臣聞堯受命以天下為憂而未以位為樂也故誅逐亂臣務求賢聖是以得舜禹稷禼咎繇眾聖輔德賢能佐職教化大行天下和洽萬民皆安仁樂誼各得其宜動作應禮從容中道故孔子曰如有王者必世而後仁此之謂也堯在位七十載乃遜于位以禪虞舜堯崩天下不歸堯子丹朱而歸舜舜知不可辟乃即天子之位以禹為相因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡美矣又盡善矣此之謂也至於殷紂逆天暴物殺戮賢知殘賊百姓伯夷太公皆當世賢者隱處而不為臣守職之人皆奔走逃亡入于河海天下秏亂萬民不安故天下去殷而從周文王順天理物師用賢聖是以閎夭大顛散宜生等亦聚於朝廷愛施兆民天下歸之故太公起海濱而即三公也當此之時紂尚在上尊卑昏亂百姓散亡故文王悼痛而欲安之是以日昃而不暇食也孔子作春秋先正王而繫萬事見素王之文焉繇此觀之帝王之條貫同然而勞逸異者所遇之時異也孔子曰武盡美矣未盡善也此之謂也臣聞制度文采玄黃之飾所以明尊卑異貴賤而勸有德也故春秋受命所先制者改正朔易服色所以應天也然則宮室旌旗之制有法而然者也故孔子曰奢則不遜儉則固儉非聖人之中制也臣聞良玉不瑑資質潤美不待刻瑑此亡異於達巷黨人不學而自知也然則常玉不瑑不成文章君子不學不成其德臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之說憎帝王之道以貪狼為俗非有文德以教訓於下也誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趣利無恥又好用憯酷之吏賦斂亡度竭民財力百姓散亡不得從耕織之業群盜並起是以刑者甚眾死者相望而姦不息俗化使然也故孔子曰導之以政齊之以刑民免而無恥此之謂也今陛下并有天下海內莫不率服廣覽兼聽極群下之知盡天下之美至德昭然施於方外夜郎康居殊方萬里說德歸誼此太平之致也然而功不加於百姓者殆王心未加焉曾子曰尊其所聞則高明矣行其所知則光大矣高明光大不在於它在乎加之意而已願陛下因用所聞設誠於內而致行之則三王何異哉陛下親耕藉田以為農先夙寤晨興憂勞萬民思惟往古而務以求賢此亦堯舜之用心也然而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大虖太學太學者賢士之所關也教化之本原也今以一郡一國之眾對亡應書者是王道往往而絕也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市貧窮孤弱冤苦失職甚不稱陛下之意是以陰陽錯繆氛氣充塞群生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非謂積日絫久也故小材雖絫日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然絫日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易為而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄德而定位則廉恥殊路賢不肖異處矣陛下加惠寬臣之罪令勿牽制於文使得切磋究之臣敢不盡愚於是天子復冊之制曰蓋聞善言天者必有徵於人善言古者必有驗於今故朕垂問乎天人之應上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改今子大夫明於陰陽所以造化習於先聖之道業然而文采未極豈惑虖當世之務哉條貫靡竟統紀未終意朕之不明與聽若眩與夫三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉今子大夫既已著大道之極陳治亂之端矣其悉之究之孰之復之詩不云虖嗟爾君子毋常安息神之聽之介爾景福朕將親覽焉子大夫其茂明之仲舒復對曰臣聞論語曰有始有卒者其唯聖人虖今陛下幸加惠留聽於承學之臣復下明冊以切其意而究盡聖德非愚臣之所能具也前所上對條貫靡竟統紀不終辭不別白指不分明此臣淺陋之罪也冊曰善言天者必有徵於人善言古者必有驗於今臣聞天者群物之祖也故徧覆包函而無所殊建日月風雨以和之經陰陽寒暑以成之故聖人法天而立道亦溥愛而亡私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也繇此言之天人之徵古今之道也孔子作春秋上揆之天道下質諸人情參之於古考之於今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也古者修教訓之官務以德善化民民已大化之後天下常亡一人之獄矣今世廢而不脩亡以化民民以故棄行誼而死財利是以犯法而罪多一歲之獄以萬千數以此見古之不可不用也故春秋變古則譏之天令之謂命命非聖人不行質樸之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹於承天意以順命也下務明教化民以成性也正法度之宜別上下之序以防欲也脩此三者而大本舉矣人受命於天固超然異於群生入有父子兄弟之親出有君臣上下之誼會聚相遇則有耆老長幼之施粲然有文以相接驩然有恩以相愛此人之所以貴也生五穀以食之桑麻以衣之六畜以養之服牛乘馬圈豹檻虎是其得天之靈貴於物也故孔子曰天地之性人為貴明於天性知自貴於物知自貴於物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子故孔子曰不知命亡以為君子此之謂也冊曰上嘉唐虞下悼桀紂寖微寖滅寖明寖昌之道虛心以改臣聞眾少成多積小致鉅故聖人莫不以晻致明以微致顯是以堯發於諸侯舜興虖深山非一日而顯也蓋有漸以致之矣言出於己不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著詩云惟此文王小心翼翼故堯兢兢日行其道而舜業業日致其孝善積而名顯德章而身尊此其寖明寖昌之道也積善在身猶長日加益而人不知也積惡在身猶火之銷膏而人不見也非明虖情性察虖流俗者孰能知之此唐虞之所以得令名而桀紂之可為悼懼者也夫善惡之相從如景鄉之應形聲也故桀紂暴謾讒賊並進賢知隱伏惡日顯國日亂晏然自以如日在天終陵夷而大壞夫暴逆不仁者非一日而亡也亦以漸至故桀紂雖亡道然猶享國十餘年此其寖微寖滅之道也冊曰三王之教所祖不同而皆有失或謂久而不易者道也意豈異哉臣聞夫樂而不亂復而不厭者謂之道道者萬世亡弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也故孔子曰亡為而治者其舜虖改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道如一而所上同也道之大原出於天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者陛下有明德嘉道愍世俗之靡薄悼王道之不昭故舉賢良方正之士論議考問將欲興仁誼之休德明帝王之法制建太平之道也臣愚不肖述所聞誦所學道師之言廑能勿失耳若乃論政事之得失察天下之息秏此大臣輔佐之職三公九卿之任非臣仲舒所能及也然而臣竊有怪者夫古之天下亦今之天下今之天下亦古之天下共是天下古以大治上下和睦習俗美盛不令而行不禁而止吏亡姦邪民亡盜賊囹圄空虛德潤草木澤被四海鳳皇來集麒麟來游以古準今壹何不相逮之遠也安所繆盭而陵夷若是意者有所失於古之道與有所詭於天之理與試迹之於古返之於天黨可得見乎夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予祿者不食於力不動於末是亦受大者不得取小與天同意者也夫已受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故眾其奴婢多其牛羊廣其田宅博其產業畜其積委務此而亡已以迫蹴民民日削月朘寖以大窮富者奢侈羨溢貧者窮急愁苦窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以蕃而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足此上天之理而亦太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿又奪園夫紅女利虖古之賢人君子在列位者皆如是是故下高其行而從其教民化其廉而不貪鄙及至周室之衰其卿大夫緩於誼而急於利亡推讓之風而有爭田之訟故詩人疾而刺之曰節彼南山惟石巖巖赫赫師尹民具爾瞻爾好誼則民鄉仁而俗善爾好利則民好邪而俗敗由是觀之天子大夫者下民之所視效遠方之所四面而內望也近者視而放之遠者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者其患禍必至也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絕其道勿使並進邪辟之說滅息然後統紀可一而法度可明民知所從矣對既畢天子以仲舒為江都相事易王易王帝兄素驕好勇仲舒以禮誼匡正王敬重焉久之王問仲舒曰粵王句踐與大夫泄庸種蠡謀伐吳遂滅之孔子稱殷有三仁寡人亦以為粵有三仁桓公決疑於管仲寡人決疑於君仲舒對曰臣愚不足以奉大對聞昔者魯君問柳下惠吾欲伐齊何如柳下惠曰不可歸而有憂色曰吾聞伐國不問仁人此言何為至於我哉徒見問耳且猶羞之況設詐以伐吳虖繇此言之粵本無一仁夫仁人者正其誼不謀其利明其道不計其功是以仲尼之門五尺之童羞稱五伯為其先詐力而後仁誼也苟為詐而已故不足稱於大君子之門也五伯比於他諸侯為賢其比三王猶武夫之與美玉也王曰善仲舒治國以春秋災異之變推陰陽所以錯行故求雨閉諸陽縱諸陰其止雨反是行之一國未嘗不得所欲中廢為中大夫先是遼東高廟長陵高園殿災仲舒居家推說其意屮稾未上主父偃候仲舒私見嫉之竊其書而奏焉上召視諸儒仲舒弟子呂步舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異仲舒為人廉直是時方外攘四夷公孫弘治春秋不如仲舒而弘希世用事位至公卿仲舒以弘為從諛弘嫉之膠西王亦上兄也尤縱恣數害吏二千石弘乃言於上曰獨董仲舒可使相膠西王膠西王聞仲舒大儒善待之仲舒恐久獲辠病免凡相兩國輒事驕王正身以率下數上疏諫爭教今國中所居而治及去位歸居終不問家產業以修學著書為事仲舒在家朝廷如有大議使使者及廷尉張湯就其家而問之其對皆有明法自武帝初立魏其武安侯為相而隆儒矣及仲舒對冊推明孔氏抑黜百家立學校之官州郡舉茂材孝廉皆自仲舒發之年老以壽終於家家徙茂陵子及孫皆以學至大官仲舒所著皆明經術之意及上疏條教凡百二十三篇而說春秋事得失聞舉玉杯蕃露清明竹林之屬復數十篇十餘萬言皆傳於後世掇其切當世施朝廷者著于篇贊曰劉向稱董仲舒有王佐之材雖伊呂亡以加筦晏之屬伯者之佐殆不及也至向子歆以為伊呂乃聖人之耦王者不得則不興故顏淵死孔子曰噫天喪余唯此一人為能當之自宰我子贛子游子夏不與焉仲舒遭漢承秦滅學之後六經離析下帷發憤潛心大業令後學者有所統壹為群儒首然考其師友淵源所漸猶未及乎游夏而曰筦晏弗及伊呂不加過矣至向曾孫龔篤論君子也以歆之言為然
