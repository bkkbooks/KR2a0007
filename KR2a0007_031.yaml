body:
  text: 蕭何曹參傳第九蕭何沛人也以文毋害為沛主吏掾高祖為布衣時數以吏事護高祖高祖為亭長常佑之高祖以吏繇咸陽吏皆送奉錢三何獨以五秦御史監郡者與從事辨之何乃給泗水卒史事第一秦御史欲入言徵何何固請得毋行及高祖起為沛公何嘗為丞督事沛公至咸陽諸將皆爭走金帛財物之府分之何獨先入收秦丞相御史律令圖書臧之沛公具知天下厄塞戶口多少強弱處民所疾苦者以何得秦圖書也初諸侯相與約先入關破秦者王其地沛公既先定秦項羽後至欲攻沛公沛公謝之得解羽遂屠燒咸陽與范增謀曰巴蜀道險秦之遷民皆居蜀乃曰蜀漢亦關中地也故立沛公為漢王而三分關中地王秦降將以距漢王漢王怒欲謀攻項羽周勃灌嬰樊噲皆勸之何諫之曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為周書曰天豫不取反受其咎語曰天漢其稱甚美夫能詘於一人之下而信於萬乘之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀遷定三秦天下可圖也漢王曰善乃遂就國以何為丞相何進韓信漢王以為大將軍説漢王令引兵東定三秦語在信傳何以丞相留收巴蜀填撫諭告使給軍食漢二年漢王與諸侯擊楚何守關中侍太子治櫟陽為令約束立宗廟社稷宮室縣邑輒奏上可許以從事即不及奏輒以便宜施行上來以聞計戶轉漕給軍漢王數失軍遁去何常興關中卒輒補缺上以此剸屬任何關中事漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂何曰今王暴衣露蓋數勞苦君者有疑君心為君計莫若遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大説漢五年已殺項羽即皇帝位論功行封群臣爭功歲餘不決上以何功最盛先封為酇侯食邑八千戶功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰顧居臣等上何也上曰諸君知獵乎曰知之知獵狗乎曰知之上曰夫獵追殺獸者狗也而發縱指示獸處者人也今諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也且諸君獨以身從我多者三兩人蕭何舉宗數十人皆隨我功不可忘也群臣後皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一上已橈功臣多封何至位次未有以復難之然心欲何第一關內侯鄂秋時為謁者進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相距五歲失軍亡衆跳身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬衆會上乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此萬世功也今雖無曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功加萬世之功哉蕭何當第一曹參次之上曰善於是乃令何第一賜帶劍履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖高待鄂君乃得明於是因鄂秋故所食關內侯邑二千戶封為安平侯是日悉封何父母兄弟十餘人皆食邑乃益封何二千戶以嘗繇咸陽時何送我獨贏錢二也陳豨反上自將至邯鄲而韓信謀反關中呂后用何計誅信語在信傳上已聞誅信使使拜丞相為相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀召平獨弔召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜從召平始也平謂何曰禍自此始矣上暴露於外而君守於內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛衛君非以寵君也願君讓封勿受悉以家私財佐軍何從其計上説其秋黥布反上自將擊之數使使問相國何為曰為上在軍拊循勉百姓悉所有佐軍如陳豨時客又説何曰君滅族不久矣夫君位為相國功第一不可復加然君初入關本得百姓心十餘年矣皆附君尚復孳孳得民和上所謂數問君畏君傾動關中今君胡不多買田地賤貰貣以自汙上心必安於是何從其計上乃大説上罷布軍歸民道遮行上書言相國強賤買民田宅數千人上至何謁上笑曰今相國乃利民民所上書皆以與何曰君自謝民後何為民請曰長安地狹上林中多空地棄願令民得入田毋收稿為獸食上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衛尉侍前問曰相國胡大罪陛下繫之暴也上曰吾聞李斯相秦皇帝有善歸主有惡自豫今相國多受賈豎金為請吾苑以自媚於民故繫治之王衛尉曰夫職事苟有便於民而請之真宰相事也陛下奈何乃疑相國受賈人錢乎且陛下距楚數歲陳豨黥布反時陛下自將往當是時相國守關中關中搖足則關西非陛下有也相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也上不懌是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過高祖崩何事惠帝何病上親自臨視何疾因問曰君即百歲後誰可代君對曰知臣莫如主帝曰曹參何如何頓道曰帝得之矣何死不恨矣何買田宅必居窮辟處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪孝惠二年何薨諡曰文終侯子祿嗣薨無子高后乃封何夫人同為酇侯小子延為築陽侯孝文元年罷同更封延為酇侯薨子遺嗣薨無子文帝復以遺弟則嗣有罪免景帝二年制詔御史故相國蕭何高皇帝大功臣所與為天下也今其祀絶朕甚憐之其以武陽縣戶二千封何孫嘉為列侯嘉則弟也薨子勝嗣後有罪免武帝元狩中復下詔御史以酇戶二千四百封何曾孫慶為酇侯布告天下令明知朕報蕭相國德也慶則子也薨子壽成嗣坐為太常犧牲瘦免宣帝時詔丞相御史求問蕭相國後在者得玄孫建世等十二人復下詔以酇戶二千封建世為酇侯傳子至孫獲坐使奴殺人減死論成帝時復封何玄孫之子南䜌長喜為酇侯傳子至曾孫王莽敗乃絶曹參沛人也秦時為獄掾而蕭何為主吏居縣為豪吏矣高祖為沛公也參以中涓從擊胡陵方與攻秦監公軍大破之東下薛擊泗水守軍薛郭西復攻胡陵取之徙守方與方與反為魏擊之豐反為魏攻之賜爵七大夫北擊司馬欣軍碭東取狐父祁善置又攻下邑以西至虞擊秦將章邯車騎攻轅戚及亢父先登遷為五大夫北救東阿擊章邯軍陷陳追至濮陽攻定陶取臨濟南救雍丘擊李由軍破之殺李由虜秦候一人章邯破殺項梁也沛公與項羽引兵而東楚懷王以沛公為碭郡長將碭郡兵於是乃封參執帛號曰建成君遷為戚公屬碭郡其後從攻東郡尉軍破之成武南擊王離軍成陽南又攻杠里大破之追北西至開封擊趙賁軍破之圍趙賁開封城中西擊秦將楊熊軍於曲遇破之虜秦司馬及御史各一人遷為執圭從西攻陽武下轘轅緱氏絶河津擊趙賁軍尸北破之從南攻犨與南陽守齮戰陽城郭東陷陳取宛虜齮定南陽郡從西攻武關嶢關取之前攻秦軍藍田南又夜擊其北軍大破之遂至咸陽破秦項羽至以沛公為漢王漢王封參為建成侯從至漢中遷為將軍從還定三秦攻下辨故道雍斄擊章平軍於好畤南破之圍好畤取壤鄉擊三秦軍壤東及高櫟破之復圍章平平出好畤走因擊趙賁內史保軍破之東取咸陽更名曰新城參將兵守景陵二十三日三秦使章平等攻參參出擊大破之賜食邑於寧秦以將軍引兵圍章邯廢丘以中尉從漢王出臨晉關至河內下修武度圍津東擊龍且項他定陶破之東取碭蕭彭城擊項籍軍漢軍大敗走參以中尉圍取雍丘王武反於外黃程處反於燕往擊盡破之柱天侯反於衍氏進破取衍氏擊羽嬰於昆陽追至葉還攻武強因至滎陽參自漢中為將軍中尉從擊諸侯及項王敗還至滎陽漢二年拜為假左丞相入屯兵關中月餘魏王豹反以假丞相別與韓信東攻魏將孫遬東張大破之因攻安邑得魏將王襄擊魏王於曲陽追至東垣生獲魏王豹取平陽得豹母妻子盡定魏地凡五十二縣賜食邑平陽因從韓信擊趙相國夏説軍於塢東大破之斬夏説韓信與故常山王張耳引兵下井陘擊成安君陳餘而令參還圍趙別將戚公於塢城中戚公出走追斬之乃引兵詣漢王在所韓信已破趙為相國東擊齊參以左丞相屬焉攻破齊歷下軍遂取臨淄還定濟北郡收著漯陰平原鬲盧已而從韓信擊龍且軍於上假密大破之斬龍且虜亞將周蘭定齊郡凡得七十縣得故齊王田廣相田光其守相許章及故將軍田既韓信立為齊王引兵東詣陳與漢王共破項羽而參留平齊未服者漢王即皇帝位韓信徙為楚王參歸相印焉高祖以長子肥為齊王而以參為相國高祖六年與諸侯剖符賜參爵列侯食邑平陽萬六百三十戶世世勿絶參以齊相國擊陳豨將張春破之黥布反參從悼惠王將車騎十二萬與高祖會擊黥布軍大破之南至蘄還定竹邑相蕭留參功凡下二國縣百二十二得王二人相三人將軍六人大莫囂郡守司馬候御史各一人孝惠元年除諸侯相國法更以參為齊丞相參之相齊齊七十城天下初定悼惠王富於春秋參盡召長老諸先生問所以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人厚幣請之既見蓋公蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相蕭何薨參聞之告舍人趣治行吾且入相居無何使者果召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之始參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事無所變更一遵何之約束擇郡國吏長大訥於文辭謹厚長者即召除為丞相史吏言文刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事來者皆欲有言至者參輒飲以醇酒度之欲有言復飲酒醉而後去終莫得開説以為常相舍後園近吏舍吏舍日飲歌呼從吏患之無如何乃請參遊後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆蓋之府中無事參子窋為中大夫惠帝怪相國不治事以為豈少朕與乃謂窋曰女歸試私從容問乃父曰高帝新棄群臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告女也窋既洗沐歸時間自從其所諫參參怒而笞之二百曰趣入侍天下事非乃所當言也至朝時帝讓參曰與窋胡治乎乃者我使諫君也參免冠謝曰陛下自察聖武孰與高皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下言之是也且高皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣參為相國三年薨諡曰懿侯百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靖民以寧一窋嗣侯高后時至御史大夫傳國至曾孫襄武帝時為將軍擊胸奴薨子宗嗣有罪完為城旦至哀帝時乃封參玄孫之孫本始為平陽侯二千戶王莽時薨子宏嗣建武中先降河北封平陽侯至今八侯贊曰蕭何曹參皆起秦刀筆吏當時録録未有奇節漢興依日月之末光何以信謹守管籥參與韓信俱征伐天下既定因民之疾秦法順流與之更始二人同心遂安海內淮陰黥布等已滅唯何參擅功名位冠群臣聲施後世為一代之宗臣慶流苗裔盛矣哉
