易曰炮犧氏沒神農氏作言共工伯而不王雖有水德非其序也以火承木故為炎帝教民耕農故天下號曰神農氏黃帝易曰神農氏沒黃帝氏作火生土故為土德與炎帝之後戰於阪泉遂王天下始垂衣裳有軒冕之服故天下號曰軒轅氏少昊帝考德曰少昊曰清清者黃帝之子清陽也是其子孫名摯立土生金故為金德天下號曰金天氏周𠨧其樂故易不載序於行顓頊帝春秋外傳曰少昊之衰九黎亂德顓頊受之乃命重黎蒼林昌意之子也金生水故為水德天下號曰高陽氏周𠨧其樂故易不載序於行帝嚳春秋外傳曰顓頊之所建帝嚳受之清陽玄囂之孫也水錢大昭説生上脫水字木下衍故字按景祐殿本都作水生木生木故錢大昭説生上脫水字木下衍故字按景祐殿本都作水生木故為木德天下號曰高辛氏帝摯繼之不知世數周𠨧其樂故易不載周人禘之唐帝帝系曰帝嚳四妃陳豐生帝堯封於唐蓋高辛氏衰天下歸之木生火故為火德天下號曰陶唐氏讓天下於虞使子朱處于丹淵為諸侯即位七十載虞帝帝系曰顓頊生窮蟬五世而生瞽叟瞽叟生帝舜處虞之媯汭堯嬗以天下火生土故為土德天下號曰有虞氏讓天下於禹使子商均為諸侯即位五十載伯禹帝系曰顓頊五世而生鯀鯀生禹虞舜嬗以天下土生金故為金德天下號曰夏后氏繼世十七王四百三十二歲成湯書經湯誓湯伐夏桀金生水故為水德天下號曰商後曰殷三統上元至伐桀之歲十四萬一千四百八十歲歲在大火房五度故傳曰大火閼伯之星也實紀商人後為成湯方即世崩沒之時為天子用事十三年矣商十二月乙丑朔旦冬至故書序曰成湯既沒太甲元年使伊尹作伊訓伊訓篇曰惟太甲元年十有二月乙丑朔伊尹祀于先王誕資有牧方明言雖有成湯太丁外丙之服以冬至越茀祀先王于方明以配上帝是朔旦冬至之歲也後九十五歲商十二月甲申朔旦冬至亡餘分是為孟統自伐桀至武王伐紂六百二十九歲故傳曰殷載祀六百殷曆曰當成湯方即世用事十三年十一月甲子朔旦冬至終六府首當周公五年則為距伐桀四百五十八歲少百七十一歲不盈六百二十九又以夏時乙丑為甲子計其年乃孟統後五章癸亥朔旦冬至也以為甲子府首皆非是凡殷世繼嗣三十一王六百二十九歲四分上元至伐桀十三萬二千一百一十三歲其八十八紀甲子府首入伐桀後百二十七歲春秋曆周文王四十二年十二月丁丑朔旦冬至孟統之二會首也後八歲而武王伐紂武王書經牧誓武王伐商紂水生木故為木德天下號曰周室三統上元至伐紂之歲十四萬二千一百九歲歲在鶉火張十三度文王受命九年而崩再期在大祥而伐紂故書序曰惟十有一年武王伐紂作王先謙説以下文故書序曰至作洪範例之太誓上當有作字太誓八百諸侯會還歸二年乃遂伐紂克殷以箕子歸十三年也故書序曰武王克殷以箕子歸作洪範洪範篇曰惟十有三祀王訪于箕子自文王受命而至此十三年歲亦在鶉火故傳曰歲在鶉火則我有周之分野也師初發以殷十一月戊子日在析木箕七度故傳曰日在析木是夕也月在房五度房為天駟故傳曰月在天駟後三日得周正月辛卯朔合辰在斗前一度斗柄也故傳曰辰在斗柄明日壬辰䢅星始見癸巳武王始發丙午還師戊午度于孟津孟津去周九百里師行三十里故三十一日而度明日己未冬至䢅星與婺女伏歷建星及牽牛至於婺女天黿之首故傳曰星在天黿周書武成篇惟一月壬辰旁死霸若翌日癸巳武王乃朝步自周于征伐紂序曰一月戊午師度于孟津至庚申二月朔日也四日癸亥至牧野夜陳甲子昧爽而合矣故外傳曰王以二月癸亥夜陳武成篇曰粵若來三月既死霸粵五日甲子咸劉商王紂是歲也閏數餘十八正大寒中在周二月己丑晦明日閏月庚寅朔三月二日庚申驚蟄四月己丑朔死霸死霸朔也生霸望也是月甲辰望乙巳旁之故武成篇曰惟四月既旁生霸粵六日庚戌武王燎于周廟翌日辛亥祀于天位粵五日乙卯乃以庶國祀馘于周廟文王十五而生武王受命九年而崩崩後四年而武王克殷克殷之歲八十六矣後七歲而崩故禮記文王世子曰文王九十七而終武王九十三而終凡武王即位十一年周公攝政五年正月丁巳朔旦冬至殷曆以為六年戊午距煬公七十六歲入孟統二十九章首也後二歲得周公七年復子明辟之歲是歲二月乙亥朔庚寅望後六日得乙未故召誥曰惟二月既望粵六日乙未又其三月甲辰朔三日丙午召誥曰惟三月丙午朏古文月采篇曰三日曰朏是歲十二月戊辰晦周公以反政故洛誥篇曰戊辰王在新邑蒸祭歲命作策惟周公誕保文武受命惟七年成王元年正月己巳朔此命伯禽俾侯于魯之歲也後三十年四月庚戌朔十五日甲子哉生霸故顧命曰惟四月哉生霸王有疾不豫甲子王乃洮沫水作顧命翌日乙丑成王崩康王十二年六月戊辰朔三日庚午故畢命豐刑曰惟十月景祐殿局本都作有王先謙説作有是有景祐殿局本都作有王先謙説作有是二年六月庚午朏王命作策豐刑春秋殷曆皆以殷魯自周昭王以下亡年數故據周公伯禽以下為紀魯公伯禽推即位四十六年至康王十六年而薨故傳曰燮父禽父並事康王言晉侯燮魯公伯禽俱事康王也子考公就立酋考公世家即位四年及煬公熙立煬公二十四年正月丙申朔旦冬至殷曆以為丁酉距微公七十六歲世家煬公即位六十年子幽公宰立幽公世家即位十四年及微公茀立沸微公二十六年正月乙亥朔旦冬至殷曆以為丙子距獻公七十六歲世家微公即位五十年子厲公翟立擢厲公世家即位三十七年及獻公具立獻公十五年正月甲寅朔旦冬至殷曆以為乙卯距懿公七十六歲世家獻公即位五十年子慎公藝立嚊慎公世家即位三十年及武公敖立武公世家即位二年子懿公被立戲懿公九年正月癸巳朔旦冬至殷曆以為甲午距惠公七十六歲世家懿公即位九年兄子柏御立柏御世家即位十一年叔父孝公稱立孝公世家即位二十七年子惠公皇立惠公三十八年正月壬申朔旦冬至殷曆以為癸酉距釐公七十六歲世家惠公即位四十六年子隱公息立凡伯禽至春秋三百八十六年春秋隱公春秋即位十一年及桓公軌立此元年上距伐紂四百歲桓公春秋即位十八年子莊公同立莊公春秋即位三十二年子愍公啓方立愍公春秋即位二年及釐公申立釐公五年正月辛亥朔旦冬至殷曆以為壬子距成公七十六歲是歲距上元十四萬二千五百七十七歲得孟統五十三章首故傳曰五年春王正月辛亥朔日南至八月甲午晉侯圍上陽章景祐殿本都作童此誤童景祐殿本都作童此誤謠云丙子之辰龍尾伏辰袀服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔卜偃曰其九月十月之交乎丙子旦日在尾月在策鶉火中必是時也冬十二月丙子滅虢言曆者以夏時故周十二月夏十月也是歲歲在大火故傳曰晉侯使寺人披伐蒲重耳奔狄董因曰君之行歲在大火後十二年釐之十六歲歲在壽星故傳曰重耳處狄十二年而行過衛五鹿乞食於野人野人舉凷而與之子犯曰天賜也後十二年必獲此土歲復於壽星必獲諸侯後八歲釐之二十四年也歲在實沈秦伯納之故傳曰董因云君以辰出而以參入必獲諸侯春秋釐公即位三十三年子立公興立文公元年距辛亥朔旦冬至二十九歲是歲閏餘十三正小雪閏當在十一月後而在三月故傳曰非禮也後五年閏餘十是歲亡閏而置閏閏所以正中朔也亡閏而置閏又不告朔故經曰閏月不告朔言亡此月也傳曰不告朔非禮也春秋文公即位十八年子宣公倭立宣公春秋即位十八年子成公黑肱立成公十二年正月庚寅朔旦冬至殷曆以為辛卯距定公七年七十六歲春秋成公即位十八年子襄公午立襄公二十七年距辛亥百九歲九月乙亥朔是建申之月也魯史書十二月乙亥朔日有食之傳曰冬十一月乙亥朔日有食之於是辰在申司曆過也再失閏矣言時實行以為十一月也不察其建不考之於天也二十八年距辛亥百一十歲歲在星紀故經曰春無冰傳曰歲在星紀而淫於玄枵三十年歲在娵訾三十一年歲在降婁是歲距辛亥百一十三年二月有癸未上距文公十一年會于承匡之歲夏正月甲子朔凡四百四十有五甲子奇二十日為日二萬六千六百有六旬故傳曰絳縣老人曰臣生之歲正月甲子朔四百四十有五甲子矣其季於今三之一也師曠曰郤成子會于承匡之歲也七十三年矣史趙曰亥有二首六身下二如身則其日數也士文伯曰然則二萬六千六百有六旬也春秋襄公即位三十一年子昭公稠立昭公八年歲在析木十年歲在顓頊之虛玄枵也十八年距辛亥百三十一歲五月有丙子戊寅壬午火始昏見宋衛陳鄭火二十年春王正月距辛亥百三十三歲是辛亥後八章首也正月己丑朔旦冬至失閏故傳曰二月己丑日南至三十二年歲在星紀距辛亥百四十五歲盈一次矣故傳曰越得歲吳伐之也受其咎春秋昭公即位三十二年及定公宋立定公七年正月己巳朔旦冬至殷曆以為庚午距元公七十六歲春秋定公即位十五年子哀公將殿本作蔣王先謙説作蔣是蔣殿本作蔣王先謙説作蔣是立哀公十二年冬十二月流火非建戌之月也是月也螽故傳曰火伏而後蟄者畢今火猶西流司曆過也詩曰七月流火春秋哀公即位二十七年自春秋盡哀十四年凡二百四十二年六國春秋哀公後十三年遜于邾子悼公曼立寧悼公世家即位三十七年子元公嘉立元公四年正月戊申朔旦冬至殷曆以為己酉距康公七十六歲元公世家即位二十一年子穆公衍立顯穆公世家即位三十三年子恭公奮立恭公世家即位二十二年子康公毛立康公四年正月丁亥朔旦冬至殷曆以為戊子距緡公七十六歲康公世家即位九年子景公偃立景公世家即位二十九年子平公旅立平公世家即位二十年子緡公賈立緡公二十二年正月丙寅朔旦冬至殷曆以為丁卯距楚元七十六歲緡公世家即位二十三年子頃公讎立頃公表十八年秦昭王之五十一年也秦始滅周周凡三十六王八百六十七歲秦伯昭公景祐殿本都作王王先謙説作王是王景祐殿本都作王王先謙説作王是本紀無天子五年孝文王本紀即位一年元年楚考烈王滅魯頃公為家人周滅後六年也莊襄王本紀即位三年始皇本紀即位三十七年二世本紀即位三年凡秦伯五世四十九歲漢高祖皇帝著紀伐秦繼周木生火故為火德天下號曰漢距上元年十四萬三千二十五歲歲在大棣之東井二十二度鶉首之六度也故漢志曰歲在大棣名曰敦牂太歲在午八年十一月乙巳朔旦冬至楚元三年也故殷曆以為丙午距元朔七十六歲著紀高帝即位十二年惠帝著紀即位七年高帝錢大昭説帝字誤按景祐殿本都作后后錢大昭説帝字誤按景祐殿本都作后著紀即位八年文帝前十六年後七年著紀即位二十三年景帝前七年中六年後三年著紀即位十六年武帝建元元光元朔各六年元朔六年十一月甲申朔旦冬至殷曆以為乙酉距初元七十六歲元狩元鼎元封各六年漢曆太初元年距上元十四萬三千一百二十七歲前十一月甲子朔旦冬至歲在星紀婺女六度故漢志曰歲名困敦正月歲星出婺女太初天漢太始征和各四年後二年著紀即位五十四年昭帝始元元鳳各六年元平一年著紀即位十三年宣帝本始地節元康神爵五鳳甘露各四年黃龍一年著紀即位二十五年元帝初元二年十一月癸亥朔旦冬至殷曆以為甲子以為紀首是歲也十月日食非合辰之會不得為紀首距建武七十六歲初元永光建昭各五年竟寧一年著紀即位十六年成帝建始河平陽朔鴻嘉永始元延各四年綏和二年著紀即位二十六年哀帝建平四年元壽二年著紀即位六年平帝著紀即位元始五年以宣帝玄孫嬰為嗣謂之孺子孺子著紀新都侯王莽居攝三年王莽居攝盜襲帝位竊號曰新室始建國五年天鳳六年地皇三年著紀盜位十四年更始帝著紀以漢宗室滅王莽即位二年赤眉賊立宗室劉盆子滅更始帝自漢元年訖更始二年凡二百三十歲光武皇帝著紀以景帝後高祖九世孫受命中興復漢改元曰建武歲在鶉尾之張度建武三十一年中元二年即位三十三年
