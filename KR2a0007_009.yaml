body:
  text: 元帝紀第九孝元皇帝宣帝太子也母曰共哀許皇后宣帝微時生民間年二歲宣帝即位八歲立為太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寬饒等坐刺譏辭語為罪而誅嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也繇是疏太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張倢妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉黃龍元年十二月宣帝崩癸巳太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后初元元年春正月辛丑孝宣皇帝葬杜陵賜諸侯王公主列侯黃金吏二千石以下錢帛各有差大赦天下三月封皇太后兄侍中中郎將王舜為安平侯丙午立皇后王氏以三輔太常郡國公田及苑可省者振業貧民資不滿千錢者賦貸種食封外祖父平恩戴侯同産弟子中常侍許嘉為平恩侯奉戴侯後夏四月詔曰朕承先帝之聖緒獲奉宗廟戰戰兢兢間者地數動而未靜懼於天地之戒不知所繇方田作時朕憂蒸庶之失業臨遣光祿大夫褒等十二人循行天下存問耆老鰥寡孤獨困乏失職之民延登賢俊招顯側陋因覽風俗之化相守二千石誠能正躬勞力宣明教化以親萬姓則六合之內和親庶幾呼無憂矣書不云乎股肱良哉庶事康哉布告天下使明知朕意又曰關東今年穀不登民多困乏其令郡國被災害甚者毋出租賦江海陂湖園池屬少府者以假貧民勿租賦賜宗室有屬籍者馬一匹至二駟三老孝者帛五匹弟者力田三匹鰥寡孤獨二匹吏民五十戶牛酒六月以民疾疫令大官損膳減樂府員雀苑馬以振困乏秋八月上郡屬國降胡萬餘人亡入胸奴九月關東郡國十一大水飢或人相食轉旁郡錢穀以相救詔曰間者陰陽不調黎民飢寒無以保治惟德淺薄不足以充入舊貫之居其令諸宮館希御幸者勿繕治太僕減穀食馬水衡雀肉食獸二年春正月行幸甘泉郊泰畤賜雲陽民爵一級女子百戶牛酒立弟竟為清河王三月立廣陵厲王太子霸為王詔罷黃門乘輿狗馬水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民詔曰蓋聞賢聖在位陰陽和風雨時日月光星辰靜黎庶康寧考級厥命今朕恭承天地託于公侯之上明不能燭德不能綏災異並臻連年不息乃二月戊午地震于隴西郡毀落太上皇廟殿壁木飾壞敗豲道縣城郭官寺及民室屋壓殺人衆山崩地裂水泉湧出天惟降災震驚朕師治有大虧咎至於斯夙夜兢兢不通大變深惟鬱悼未知其序間者歲數不登元元困乏不勝飢寒以陷刑辟朕甚閔之郡國被地動災甚者無出租賦赦天下有可蠲除減省以便萬姓者條奏毋有所諱丞相御史中二千石舉茂材異等直言極諫之士朕將親覽焉夏四月丁巳立皇太子賜御史大夫爵關內侯中二千石右庶長天下當為父後者爵一級列侯錢各二十萬五大夫十萬六月關東飢齊地人相食秋七月詔曰歲比災害民有菜色慘怛於心已詔吏虛倉廩開府庫振救賜寒者衣今秋禾麥頗傷一年中地再動北海水溢流殺人民陰陽不和其咎安在公卿將何以憂之其悉意陳朕過靡有所諱冬詔曰國之將興尊師而重傅故前將軍望之傅朕八年道以經書厥功茂焉其賜爵關內侯食邑八百戶朝朔望十二月中書令弘恭百顯等譖望之令自殺三年春令諸侯相位在郡守下珠崖郡山南縣反博謀群臣待詔賈捐之以為宜棄珠崖救民飢饉乃罷珠崖夏四月乙未晦茂陵白鶴館災詔曰乃者火災降於孝武園館朕戰栗恐懼不燭變異咎在朕躬群司又未肯極言朕過以至於斯將何以寤焉百姓仍遭凶厄無以相振加以煩擾呼苛吏拘牽乎微文不得永終性命朕甚閔焉其赦天下夏旱立長沙煬王弟宗為王封故海昏侯賀子代宗為侯六月詔曰蓋聞安民之道本繇陰陽間者陰陽錯謬風雨不時朕之不德庶幾群公有敢言朕之過者今則不然偷合苟從未肯極言朕甚閔焉永惟蒸庶之飢寒遠離父母妻子勞於非業之作衛於不居之宮恐非所以佐陰陽之道也其罷甘泉建章宮衛令就農百官各省費條奏毋有所諱有司勉之毋犯四時之禁丞相御史舉天下明陰陽災異者各三人於是言事者衆或進擢召見人人自以得上意四年春正月行幸甘泉郊泰畤三月行幸河東祠后土赦汾陰徒賜民爵一級女子百戶牛酒鰥寡高年帛行所過無出租賦五年春正月以周子南君為周承休侯位次諸侯王三月行幸雍祠五畤夏四月有星孛于參詔曰朕之不逮序位不明衆僚久懬未得其人元元失望上感皇天陰陽為變咎流萬民朕甚懼之乃者關東連遭災害飢寒疾疫夭不終命詩不云乎凡民有喪匍匐救之其令太官毋日殺所具各減半乘輿秣馬無乏正事而已罷角抵上林宮館希御幸者齊三服官北假田官鹽鐵官常平倉博士弟子毋置員以廣學者賜宗室子有屬籍者馬一匹至二駟三老孝者帛人五匹弟者力田三匹鰥寡孤獨二匹吏民五十戶牛酒省刑罰七十餘事除光祿大夫以下至郎中保父母同産之令令從官給事宮司馬中者得為大父母父母兄弟通籍冬十二月丁未御史大夫貢禹卒衛司馬谷吉使胸奴不還永光元年春正月行幸甘泉郊泰畤赦雲陽徒賜民爵一級女子百戶牛酒高年帛行所過毋出租賦二月詔丞相御史舉質朴敦厚遜讓有行者光祿歲以此科第郎從官三月詔曰五帝三王任賢使能以登至平而今不治者豈斯民異哉咎在朕之不明亡以知賢也是故壬人在位而吉士雍蔽重以周秦之弊民漸薄俗去禮義觸刑法豈不哀哉繇此觀之元元何辜其赦天下令厲精自新各務農畝無田者皆假之貸種食如貧民賜吏六百石以下爵五大夫勤事吏二級為父後者民一級女子百戶牛酒鰥寡孤獨高年帛是月雨雪隕霜傷麥稼秋罷二年春二月詔曰蓋聞唐虞象刑而民不犯殷周法行而姦軌服今朕獲承高祖之洪業託位公侯之上夙夜戰栗永惟百姓之急未嘗有忘焉然而陰陽未調三光暗昧元元大困流散道路盜賊並興有司又長殘賊失牧民之術是皆朕之不明政有所虧咎至於此朕甚自恥為民父母若是之薄謂百姓何其大赦天下賜民爵一級女子百戶牛酒鰥寡孤獨高年三老孝弟力田帛又賜諸侯王公主列侯黃金中二千石以下至中都官長吏各有差吏六百石以上爵五大夫勤事吏各二級三月壬戌朔日有蝕之詔曰朕戰戰栗栗夙夜思過失不敢荒寧惟陰陽不調未燭其咎婁敕公卿日望有效至今有司執政未得其中施與禁切未合民心暴猛之俗彌長和睦之道日衰百姓愁苦靡所錯躬是以氛邪歲增侵犯太陽正氣湛掩日久奪光乃壬戌日有蝕之天見大異以戒朕躬朕甚悼焉其令內郡國舉茂材異等賢良直言之士各一人夏六月詔曰間者連年不收四方咸困元元之民勞於耕耘又亡成功困於飢饉亡以相救朕為民父母德不能覆而有其刑甚自傷焉其赦天下秋七月西羌反遣右將軍馮奉世擊之八月以太常任千秋為奮威將軍別將五校並進三年春西羌平軍罷三月立皇子康為濟陽王夏四月癸未大司馬車騎將軍接薨冬十一月詔曰乃者己丑地動中冬雨水大霧盜賊並起吏何不以時禁各悉意對冬復鹽鐵官博士弟子員以用度不足民多復除無以給中外繇役四年春二月詔曰朕承至尊之重不能燭理百姓婁遭凶咎加以邊竟不安師旅在外賦斂轉輸元元騷動窮困亡聊犯法抵罪夫上失其道而繩下以深刑朕甚痛之其赦天下所貸貧民勿收責三月行幸雍祠五畤夏六月甲戌孝宣園東闕災戊寅晦日有蝕之詔曰蓋聞明王在上忠賢布職則群生和樂方外蒙澤今朕暗于王道夙夜憂勞不通其理靡瞻不眩靡聽不惑是以政令多還民心未得邪説空進事亡成功此天下所著聞也公卿大夫好惡不同或緣姦作邪侵削細民元元安所歸命哉乃六月晦日有蝕之詩不云呼今此下民亦孔之哀自今以來公卿大夫其勉思天戒慎身修永以輔朕之不逮直言盡意無有所諱九月戊子罷衛思后園及戾園冬十月乙丑罷祖宗廟在郡國者諸陵分屬三輔以渭城壽陵亭部原上為初陵詔曰安土重遷黎民之性骨肉相附人情所願也頃者有司緣臣子之義奏徙郡國民以奉園陵令百姓遠棄先祖墳墓破業失産親戚別離人懷思慕之心家有不安之意是以東垂被虛耗之害關中有無聊之民非久長之策也詩不云呼民亦勞止迄可小康惠此中國以綏四方今所為初陵者勿置縣邑使天下咸安土樂業亡有動搖之心布告天下令明知之又罷先后父母奉邑五年春正月行幸甘泉郊泰畤三月上幸河東祠后土秋潁川水出流殺人民吏從官縣被害者與告士卒遣歸冬上幸長楊射熊館布車騎大獵十二月乙酉毀太上皇孝惠皇帝寢廟園建昭元年春三月上幸雍祠五畤秋八月有白蛾群飛蔽日從東都門至枳道冬河間王元有罪廢遷房陵罷孝文太后孝昭太后寢園二年春正月行幸甘泉郊泰畤三月行幸河東祠后土益三河大郡太守秩戶十二萬為大郡夏四月赦天下六月立皇子輿為信都王閨月丁酉太皇太后上官氏崩冬十一月齊楚地震大雨雪樹折屋壞淮陽王舅張博魏郡太守京房坐窺道諸侯王以邪意漏泄省中語博要斬房棄市三年夏令三輔都尉大郡都尉秩皆二千石六月甲辰丞相玄成薨秋使護西域騎都尉甘延壽副校尉陳湯嬌發戊己校尉屯田吏士及西域胡兵攻郅支單于冬斬其首傳詣京師縣蠻夷邸門四年春正月以誅郅支單于告祠郊廟赦天下郡臣上壽置酒以其圖書示後宮貴人夏四月詔曰朕承先帝之休烈夙夜栗栗懼不克任間者陰陽不調五行失序百姓飢饉惟蒸庶之失業臨遣諫大夫博士賞等二十一人循行天下存問耆老鰥寡孤獨乏困失職之人舉茂材特立之士相將九卿其帥意毋怠使朕獲觀教化之流焉六月甲申中山王竟薨藍田地沙石雍霸水安陵岸崩雍涇水水逆流五年春三月詔曰蓋聞明王之治國也明好惡而定去就崇敬讓而民興行故法設而民不犯令施而民從今朕獲保宗廟兢兢業業匪敢解怠德薄明暗教化淺微傳不云呼百姓有過在豫一人其赦天下賜民爵一級女子百戶牛酒三老孝弟力田帛又曰方春農桑興百姓勠力自盡之時也故是月勞農勸民無使後時今不良之吏覆案小罪徵召證案興不急之事以妨百姓使失一時之作亡終歲之功公卿其明察申敕之夏六月庚申復戾園壬申晦日有蝕之秋七月庚子復太上皇寢廟園原廟昭靈后武哀王昭哀后衛思后園竟寧元年春正月胸奴呼韓邪單于來朝詔曰胸奴郅支單于背叛禮義既伏其辜呼韓邪單于不忘恩德鄉慕禮義復修朝賀之禮願保塞傳之無窮邊垂長無兵革之事其改元為竟寧賜單于待詔掖庭王檣為閼氏皇太子冠賜列侯嗣子爵五大夫天下為父後者爵一級二月御史大夫延壽卒三月癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園夏封騎都尉甘延壽為列侯賜副校尉陳湯爵關內侯黃金百斤五月壬辰帝崩于未央宮毀太上皇孝惠孝景皇帝廟罷孝文孝昭太后昭靈后武哀王昭哀后寢園秋七月丙戌葬渭陵贊曰臣外祖兄弟為元帝侍中語臣曰元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極幼眇少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優遊不斷孝宣之業衰焉然寬弘盡下出於恭儉號令溫雅有古之風烈
