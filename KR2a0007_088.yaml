body:
  text: 佞幸傳第六十三漢興佞幸寵臣高祖時則有籍孺孝惠有閎孺此兩人非有材能但以婉媚貴幸與上臥起公卿皆因關說故孝惠時郎侍中皆冠鵔鸃貝帶傅脂粉化閎籍之屬也兩人徙家安陵其後寵臣孝文時士人則鄧通宦者則趙談北宮伯子孝武時士人則韓嫣宦者則李延年孝元時宦者則弘恭石顯孝成時士人則張放淳于長孝哀時則有董賢孝景昭宣時皆無寵臣景帝唯有郎中令周仁昭帝時駙馬都尉秺侯金賞嗣父車騎將軍日磾爵為侯二人之寵取過庸不篤宣帝時侍中中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯出常參乘號為愛幸其人謹敕無所虧損為其小妻所毒薨國除鄧通蜀郡南安人也以濯船為黃頭郎文帝嘗夢欲上天不能有一黃頭郎推上天顧見其衣尻帶後穿覺而之漸臺以夢中陰目求推者郎見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也文帝甚說尊幸之日日異通亦願謹不好外交雖賜洗沐不欲出於是文帝賞賜通巨萬以十數官至上大夫文帝時間如通家游戲然通無他伎能不能有所薦達獨自謹身以媚上而已上使善相人者相通曰當貧餓死上曰能富通者在我何說貧於是賜通蜀嚴道銅山得自鑄錢鄧氏布天下其富如此文帝嘗病癰鄧通常為上嗽吮之上不樂從容問曰天下誰最愛我者乎通曰宜莫若太子太子入問疾上使太子齰癰太子齰癰而色難之已而聞通嘗為上齰之太子慚繇是心恨通及文帝崩景帝立鄧通免家居居無何人有告通盜出徼外鑄錢下吏驗問頗有遂竟案盡沒入之通家尚負責數巨萬長公主賜鄧通吏輒隨沒入之一簪不得著身於是長公主乃令假衣食竟不得名一錢寄死人家趙談者以星氣幸北宮伯子長者愛人故親近然皆不比鄧通韓嫣字王孫弓高侯穨當之孫也武帝為膠東王時嫣與上學書相愛及上為太子愈益親嫣嫣善騎射聰慧上即位欲事伐胡而嫣先習兵以故益尊貴官至上大夫賞賜擬鄧通始時嫣常與上共臥起江都王入朝從上獵上林中天子車駕䟆道未行先使嫣乘副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后繇此銜嫣嫣侍出入永巷不禁以姦聞皇太后太后怒使使賜嫣死上為謝終不能得嫣遂死嫣弟說亦愛幸以軍功封案道侯巫蠱時為戾太子所殺子增封龍雒侯大司馬車騎將軍自有傳李延年中山人身及父母兄弟皆故倡也延年坐法腐刑給事狗監中女弟得幸於上號李夫人列外戚傳延年善歌為新變聲是時上方興天地諸祠欲造樂令司馬相如等作詩頌延年輒承意弦歌所造詩為之新聲曲而李夫人産昌邑王延年繇是貴為協律都尉佩二千石印綬而與上臥起其愛幸埒韓嫣久之延年弟季與中人亂出入驕恣及李夫人卒後其愛弛上遂誅延年兄弟宗族是後寵臣大氐外戚之家也衛青霍去病皆愛幸然亦以功能自進石顯字君房濟南人弘恭沛人也皆少坐法腐刑為中黃門以選為中尚書宣帝時任中書官恭明習法令故事善為請奏能稱其職恭為令顯為僕射元帝即位數年恭死顯代為中書令是時元帝被疾不親政事方隆好於音樂以顯久典事中人無外黨精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能探得人主微指內深賊持詭辨以中傷人忤恨睚眥輒被以危法初元中前將軍蕭望之及光祿大夫周堪宗正劉更生皆給事中望之領尚書事知顯專權邪辟建白以為尚書百官之本國家樞機宜以通明公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人元帝不聽繇是大與顯忤後皆害焉望之自殺堪更生廢錮不得復進用語在望之傳後太中大夫張猛魏郡太守京房御史中丞陳咸待詔賈捐之皆嘗奏封事或召見言顯短顯求索其罪房捐之棄市猛自殺於公車咸抵罪髡為城旦及鄭令蘇建得顯私書奏之後以它事論死自是公卿以下畏顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪言其兼官據勢也顯見左將軍馮奉世父子為公卿著名女又為昭儀在內顯心欲附之薦言昭儀兄謁者逡修敕宜侍帷幄天子召見欲以為侍中逡請間言事上聞逡言顯顓權天子大怒罷逡歸郎官其後御史大夫缺群臣皆舉逡兄大鴻臚野王行能第一天子以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢私後宮親以為三公上曰善吾不見是乃下詔嘉美野王廢而不用語在野王傳顯內自知擅權事柄在掌握恐天子一旦納用左右耳目有以間己乃時歸誠取一信以為驗顯嘗使至諸官有所徵發顯先自白恐後漏盡宮門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有上書告顯顓命矯詔開宮門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事群下無不嫉妬欲陷害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬衆任天下之怨臣願歸樞機職受後宮掃除之役死無所恨唯陛下哀憐財幸以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜賞賜及賂遺訾一萬萬初顯聞衆人胸胸言己殺前將軍蕭望之望之當世名儒顯恐天下學士姍己病之是時明經著節士琅邪貢禹為諫大夫顯使人致意深自結納顯因薦禹天子歷位九卿至御史大夫禮事之甚備議者於是稱顯以為不妬譖望之矣顯之設變詐以自解免取信人主者皆此類也元帝晚節寢疾定陶恭王愛幸顯擁祐太子頗有力元帝崩成帝初即位遷顯為長信中太僕秩中二千石顯失倚離權數月丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂滿不食道病死諸所交結以顯為官皆廢罷少府五鹿充宗遷玄菟太守御史中丞伊嘉為鴈門都尉長安謠曰伊徙鴈鹿徙菟去牢與陳實無賈淳于長字子孺魏郡元城人也少以太后姊子為黃門郎未進幸會大將軍王鳳病長侍病晨夜扶丞左右甚有甥舅之恩鳳且終以長屬託太后及帝帝嘉長義拜為列校尉諸曹遷水衡都尉侍中至衛尉九卿久之趙飛燕貴幸上欲立以為皇后太后以其所出微難之長主往來通語東宮歲餘趙皇后得立上甚德之乃追顯長前功下詔曰前將作大匠解萬年奏請營作昌陵罷弊海內侍中衛尉長數白宜止徙家反故處朕以長言下公卿議者皆合長計首建至策民以康寧其賜長爵關內侯後遂封為定陵侯大見信用貴傾公卿外交諸侯牧守賂遺賞賜亦絫巨萬多畜妻妾淫於聲色不奉法度初許皇后坐執左道廢處長定宮而后姊孊為龍額思侯夫人寡居長與孊私通因取為小妻許后因孊賂遺長欲求復倢妤長受許后金錢乘輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宮輒與孊書戲侮許后嫚易無不言交通書記賂遺連年是時帝舅曲陽侯王根為大司馬票騎將軍輔政數歲久病數乞骸骨長以外親居九卿位次第當代根根兄子新都侯王莽心害長寵私聞長取許孊受長定宮賂遣莽侍曲陽侯疾因言長見將軍久病意喜自以當代輔政至對衣冠議語署置具言其罪過根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宮莽求見太后具言長驕佚欲代曲陽侯對莽母上車私與長定貴人姊通受取其衣物太后亦怒曰兒至如此往白之帝莽白上上乃免長官遣就國初長為侍中奉兩宮使親密紅陽侯立獨不得為大司馬輔政立自疑為長毀譖常怨毒長上知之及長當就國也立嗣子融從長請車騎長以珍寶因融重遺立立因為長言於是天子疑焉下有司案驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲侮長定宮謀立左皇后罪至大逆死獄中妻子當坐者徙合浦母若歸故郡紅陽侯立就國將軍卿大夫郡守坐長免罷者數十人莽遂代根為大司馬久之還長母及子酺於長安後酺有罪莽復殺之徙其家屬歸故郡始長以外親親近其愛幸不及富平侯張放放常與上臥起俱為微行出入董賢字聖卿雲陽人也父恭為御史任賢為太子舍人哀帝立賢隨太子官為郎二歲餘賢傳漏在殿下為人美麗自喜哀帝望見說其儀貌識而問之曰是舍人董賢邪因引上與語拜為黃門郎繇是始幸問及其父為雲中侯即日徵為霸陵令遷光祿大夫賢寵愛日甚為駙馬都尉侍中出則參乘入御左右旬月間賞賜絫巨萬貴震朝廷常與上臥起嘗晝寢偏藉上褎上欲起賢未覺不欲動賢乃斷褎而起其恩愛至此賢亦性柔和便辟善為媚以自固每賜洗沐不肯出常留中視醫藥上以賢難歸詔令賢妻得通引籍殿中止賢廬若吏妻子居官寺舍又召賢女弟以為昭儀位次皇后更名其舍為椒風以配椒房云昭儀及賢與妻旦夕上下並侍左右賞賜昭儀及賢妻亦各千萬數遷賢父為少府賜爵關內侯食邑復徙為衛尉又以賢妻父為將作大匠弟為執金吾詔將作大匠為賢起大第北闕下重殿洞門木土之功窮極技巧柱檻衣以綈錦下至賢家僮僕皆受上賜及武庫禁兵上方珍寶其選物上弟盡在董氏而乘輿所服乃其副也及至東園祕器珠襦玉柙豫以賜賢無不備具又令將作為賢起冢瑩義陵旁內為便房剛柏題湊外為徼道周垣數里明闕罘罳甚盛上欲侯賢而未有緣會待詔孫寵息夫躬等告東平王雲后謁祠祀祝詛下有司治皆伏其辜上於是令躬寵為因賢告東平事者乃以其功下詔封賢為高安侯躬宜陵侯寵方陽侯食邑各千戶頃之復益封賢二千戶丞相王嘉內疑東平事冤甚惡躬等數諫爭以賢為亂國制度嘉竟坐言事下獄死上初即位祖母傅太后母丁太后皆在兩家先貴傅太后從弟喜先為大司馬輔政數諫失太后指免官上舅丁明代為大司馬亦任職頗害賢寵及丞相王嘉死明甚憐之上𥧲重賢欲極其位而恨明如此遂冊免明曰前東平王雲貪欲上位祠祭祝詛雲后舅伍宏以醫待詔與校祕書郎楊閎結謀反逆禍甚迫切賴宗廟神靈董賢等以聞咸伏其辜將軍從弟侍中奉車都尉吳族父左曹屯騎校尉宣皆知宏及栩丹諸侯王后親而宣除用丹為御屬吳與宏交通厚善數稱薦宏宏以附吳得興其惡心因醫技進幾危社稷朕以恭皇后故不忍有云將軍位尊任重既不能明威立義折消未萌又不深疾雲宏之惡而懷非君上阿為宣吳反痛恨雲等揚言為群下所冤又親見言伍宏善醫死可惜也賢等獲封極幸嫉妒忠良非毀有功於戲傷哉蓋君親無將將而誅之是以季友鴆叔牙春秋賢之趙盾不討賊謂之弒君朕閔將軍陷于重刑故以書飭將軍遂非不改復與丞相嘉相比令嘉有依得以罔上有司致法將軍請獄治朕惟噬膚之恩未忍其上票騎將軍印綬罷歸就第遂以賢代明為大司馬衛將軍冊曰朕承天序惟稽古建爾于公以為漢輔往悉爾心統辟元戎折衝綏遠匡正庶事允執其中天下之衆受制於朕以將為命以兵為威可不慎與是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父恭不宜在卿位徙為光祿大夫秩中二千石弟寬信代賢為駙馬都尉董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣明年胸奴單于來朝宴見群臣在前單于怪賢年少以問譯上令譯報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣初丞相孔光為御史大夫時賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃卻入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賓客均敵之禮賢歸上聞之喜立拜光兩兄子為諫大夫常侍賢繇是權與人主侔矣是時成帝外家王氏衰廢唯平阿侯談子去疾哀帝為太子時為庶子得幸及即位為侍中騎都尉上以王氏亡在位者遂用舊恩親近去疾復進其弟閎為中常侍閎妻父蕭咸前將軍望之子也久為郡守病免為中郎將兄弟並列賢父恭慕之欲與結婚姻閎為賢弟駙馬都尉寬信求咸女為婦咸惶恐不敢當私謂閎曰董公為大司馬冊文言允執其中此乃堯禪舜之文非三公故事長老見者莫不心懼此豈家人子所能堪邪閎性有知略聞咸言心亦悟乃還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不說後上置酒麒麟殿賢父子親屬宴飲王閎兄弟侍中中常侍皆在側上有酒所從容視賢笑曰吾欲法堯禪舜何如閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上默然不說左右皆恐於是遣閎出後不得復侍宴賢第新成功堅其外大門無故自壞賢心惡之後數月哀帝崩太皇太后召大司馬賢引見東廂問以喪事調度賢內憂不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚太后遣使者召莽既至以太后指使尚書劾賢帝病不親醫藥禁止賢不得入出宮殿司馬中賢不知所為詣闕免冠徒跣謝莽使謁者以太后詔即闕下冊賢曰間者以來陰陽不調菑害並臻元元蒙辜夫三公鼎足之輔也高安侯賢未更事理為大司馬不合衆心非所以折衝綏遠也其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬葬疑其詐死有司奏請發賢棺至獄診視莽復風大司徒光奏賢質性巧佞翼姦以獲封侯父子專朝兄弟並寵多受賞賜治第宅造冢壙放效無極不異王制費以萬萬計國家為空虛父子驕蹇至不為使者禮受賜不拜罪惡暴著賢自殺伏辜死後父恭等不悔過乃復以沙畫棺四時之色左蒼龍右白虎上著金銀日月玉衣珠璧以棺至尊無以加恭等幸得免於誅不宜在中土臣請收沒入財物縣官諸以賢為官者皆免父恭弟寬信與家屬徙合浦母別歸故郡巨鹿長安中小民歡譁鄉其弟哭幾獲盜之縣官斥賣董氏財凡四十三萬萬賢既見發裸診其尸因埋獄中賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢尸葬之王莽聞之而大怒以它罪繫殺詡詡子浮建武中貴顯至大司馬司空封侯而王閎王莽時為牧守所居見紀莽敗乃去官世祖下詔曰武王克殷表商容之閭閎修善謹敕兵起吏民獨不爭其頭首今以閎子補吏至墨綬卒官蕭咸外孫云贊曰柔曼之傾意非獨女德蓋亦有男色焉觀籍閎鄧韓之徒非一而董賢之寵尤盛父子並為公卿可謂貴重人臣無二矣然進不繇道位過其任莫能有終所謂愛之適足以害之者也漢世衰於元成壞於哀平哀平之際國多釁矣主疾無嗣弄臣為輔鼎足不彊棟幹微撓一朝帝崩姦臣擅命董賢縊死丁傅流放辜及母后奪位幽廢咎在親便嬖所任非仁賢故仲尼著損者三友王者不私人以官殆為此也
